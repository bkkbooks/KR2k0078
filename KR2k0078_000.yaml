body:
  text: 行水金鑑目錄地理𩔖四河渠之屬河水圖併説附古今黄河通塞圗淮水圗併説附髙家堰圗漢江二水圗併説附西漢水圗洞庭鄱陽二湖圗濟水圗併說附五水濟運圗運河圗併說附太湖圗清江浦圗衛河圗禹王臺圗巻數河水第一巻至第六十巻淮水第六十一巻至第七十巻漢水江水第七十一巻至第八十巻濟水第八十一巻至第八十五卷運河水第八十六巻至第一百五十五巻兩河總説第一百五十六巻至第一百六十三巻官司第一百六十四巻至第一百六十九巻夫役第一百七十巻至第一百七十三巻河道錢糧隄河彚考第一百七十四卷閘壩涵洞彚考漕規漕運第一百七十五卷臣等謹案行水金鑑一百七十五卷國朝傅澤洪撰澤洪字穉君鑲紅旗漢軍官至江蘇按察使是書成於雍正乙巳乃其為淮揚道時所作全祖望鮚埼亭藁有鄭元慶墓誌以為出元慶之手疑其客逰澤洪之幕或預編摹然别無顯證未之詳也叙水道者禹貢以下司馬遷作河渠書班固作溝洫志皆全史之一篇其自為一書者則剏始於水經然標舉源流疏證支派而已未及於疏濬隄防之事也單鍔沙克什王喜所撰始詳言治水之法有明以後著作漸繁亦大抵偏舉一隅専言一水其綜括古今臚陳利病統四瀆分合運道沿革之故彚輯以成一編者則莫若是書之最詳首列諸圖次河水六十巻次淮水漢水江水二十巻次濟水五巻次運河水七十巻次兩河總說八巻次官司夫役漕運漕規凡十二巻其例皆摘録諸書原文而以時代𩔖次俾各條互相證明首尾貫串其有原文所未備者亦間以已意考核附注其下上下數千年間地形之變遷人事之得失絲牽繩貫始未犁然至我國家敷土翕河百川受職仰蒙聖祖仁皇帝翠華親莅指授機宜睿算周詳永昭順軌實足垂法於萬年澤洪於康熙六十一年以前所奉諭㫖皆恭録於編以昭謨訓尤為疏瀹之指南談水道者觀此一編宏綱巨目亦足以見其大凡矣乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀行水金鑑原序四瀆古運河也沿江達淮亂河浮濟禹貢具載之矣而今之運河則自元明始然元創之而不用明用之以轉運荆揚徐兖豫諸州數十百萬之糧貢於京師迄於今三百餘年守之如故不猶之乎古之江淮河濟哉然是運河也亦未始不以四瀆之通塞為利害蓋江出岷山淮出桐柏河出崑崙墟濟出王屋若不辨析其源流而治之得其法安能蕩滌垢濁通百川赴卑注海帖然無事哉然則四瀆治運河亦治相因之勢也夫治之亦甚難矣黄水湍悍為中州病淮水停蓄為髙堰危黄强淮弱為清口梗山左泉源涸水匱竭濟汶諸水俱不足以濟運而運河淺阻治之誠難惟江漢朝宗猶存禹迹矣夫禹之治水疏瀹決排以去民之患而今也無日不以壘堤為事亦無日不以堤決為虞迨一旦有事耗官家百萬金錢若填巨海而治之仍不得其法今日決於此明日復決於彼且今年決明年又決勞民傷財無已時何哉堤日髙河身日因之以俱髙疏瀹決排之不講也僕本固陋謬為水官嘗寒暑風雨於泥淖畚鍤間者二十餘年但因人成事無所建立深自愧悔用是積數年心力目眵手披漁經獵史逺稽勝國之實録近述世祖聖祖兩朝之訓㫖叅以衆說附之管窺纂緝成書凡四瀆運河興廢之由及疏築塞防一切事宜之得失緩急犂然悉備匪曰學前人之故歩即能萬無一失也夫運道有迹之可尋而通變則本乎時勢黄淮當因地制宜而修防則不離夫古法神而明之存乎其人吾願司水政者三復斯編雍正三年冬十月朔閭山傅澤洪題於淮揚官署之鑄錯草堂行水金鑑略例江淮河濟為四瀆見風俗通瀆者獨也各獨出其所而入海見釋名自漢王莽末濟水入河元時河水入淮則三瀆并為一瀆以入海矣而江則依然如故也爰自禹貢以及史書遐稽近考四瀆分合之故瞭如指掌江入海在揚州淮在徐州河在兖州濟在青州今江淮之入海也尚與禹貢同而黄河既亂濟又奪淮並在徐州入海矣漢水以入江而入海故不得以瀆名而河濟猶稱為瀆若與字義不合中國川原以百數莫著於四瀆而河為宗見前漢書河曰河宗四瀆之所宗也見穆天子傳故先紀河河奪淮同入於海河强而淮弱故淮次之濟入河與河相亂不若淮之顯然流見也故濟在江後江固為江漢亦為江也江漢體勢均敵二水合流所以如此其大不以漢附江而泯其入海之實故於漢扵江並言入海而同為瀆也見尚書纂言江為南條水之宗河為北條水之宗語云日月經天江河行地其殆並行而不相悖者乎故不得以次言之若今之運河後之人矯揉造作而為之非若四瀆之發源注海也故以此終焉漕運自古有之禹貢於各州下皆有達河之路達扵河即達於京師也漢漕仰於山東唐漕仰於江淮皆有運道宋都汴梁轉運便易元都北平始終海運至元中開㑹通河歳運不過數十萬石迨明永樂後東南漕運至京至於今不廢是錄所述運河昉於禹貢迄於皇朝其於古也不嫌其略於今也務得其詳黄運兩河自康熈二十三年以前敝敗已極是年冬聖祖南廵親臨河工指授方略首疏海口以導黄注海次闢清口閉六壩築髙堰以障淮敵黄改新舊中河浚淮揚裏河開人字芒稻涇澗等河國計民生均得利賴諸凡河湖隄岸閘壩應修應築睿慮周詳盡善盡美兩河底績永慶安瀾誠足上邁神禹下垂萬禩者矣謹自隨山刋木之年迄於康熈六十年四月十七日上諭而止始之以禹貢終之以聖訓上下千古並傳不朽矣禹貢一篇蓋言禹之治水其本末先後之序無不詳備故古今言治水者必以神禹為宗導水九條皆治蹟也兹不録其始終四水而獨錄江淮河濟者以濟運故耳水經所載之水必表著其出某郡過某縣逕某山某水注之某水出焉㑹某水過某方與某水合入於某處有源有委脈絡井然間有疎闊酈道元又從而補注之班氏地理志所不及也故昔人謂此書為禹貢之忠臣班志之畏友洵不誣矣兹以水經亞於禹貢酈注附焉自周秦以至漢魏參互考索庶觀者有所依據云史記河渠書漢書溝洫志以及兩漢魏晉六朝南北史帝紀臣傳皆摘錄之新舊唐書五代史並不志河渠然紀傳所有悉皆登載宋史備矣金元亦稱詳贍河渠志之外如紀傳五行百官諸志攟拾靡遺諸凡載籍中有闗河務者亦悉登載明自洪武開國至崇禎之末河事頗多今據實錄㑹典明史稾以及直省通志府州縣志南河全考北河續記通漕𩔖編等書旁及傳記碑版稗官小說猶恐未盡搜羅竊滋愧矣禹貢導水皆入河海孟子言疏瀹決排注江注海又曰禹掘地而注之海又曰水由地中行江淮河漢是也朱子言禹治水乃是自下而上了又自上而下又曰禹治水先就土低處用工又曰禹只是先從低處下手若下面之水盡殺則上靣之水漸淺方可下手我聖祖治河先拆攔黄壩疏通海口然後從上靣施功上諭有云黄河底髙灣多以至各處受險又云朕欲将黄河各險工頂溜灣處開直使水直行刷沙若黄河刷深一尺則各河水少一尺深一丈則各水淺一丈如此刷去則水由地中行各壩亦可不用不但運河無漫溢之虞而下河淹沒之患自可永除矣煌煌天語直接列聖心傳大知獨斷功垂萬世治河者惟奉之以為金鑑而已勝國治河名臣若宋尚書陳平江其精神專注多在運河若劉荘襄潘宫保萬少司馬兩河俱有成績荘襄之論莫不切於水詳於治大略於河原其端焉於淮達其委焉扵治河察其趨焉扵防河審其向焉於諸泉輯其出焉於諸河理其入焉於諸湖權其蓄焉於諸閘酌其積焉其歴久可行者尤善於六桞之法焉潘宫保以為通漕於河則治河即以治漕㑹河於漕則治淮即以治河合河淮而同入於海則治河淮即以治海凡四任總河惟以築隄束水借水攻沙為萬全第一義萬少司馬嘗言胸有全河而後可治河如頭年下埽為次年之防一年積料為兩年之用以舟牽舟以運濟運以少淺治多淺以下水束上水三閘四隄五夫八埽十五治水之器諸法俱堪不朽迨我皇朝唯靳文襄張文端二公之行水也可謂不媿前人矣文襄經理河工八疏言言碩畫文端甫下車首陳三事切中肯綮聖祖皆從之河乃大治然二公之功獨於中河最鉅張清恪公在濟寧最有功於閘河其啓閉之法精密無比劉荘襄有問水集潘宫保有河防一覽萬少司馬有治水筌蹄文襄文端皆有治河書清恪有居濟一得兹録登載頗詳河工告成之後二十餘年安瀾無事壬寅間覃懐黄沁水不順軌屢築屢決迨我皇上龍飛御極之歳河伯效靈功成彈指然猶彌厪聖懐勤求善後特遣大臣總理一方開封沿河又設上下兩丞分疆贊治一應工程俱動正項錢糧不勞民力中州八郡之羣黎百姓無不感頌皇仁諸凡事宜當摭拾檔案叧為一集用昭近績云貢賦出於農田江浙五府輸將何啻半天下其間太湖吞納百川震澤在在汪洋受水之利亦未嘗不受水之害若江漢鄱陽洞庭隄防應修應築急宜講求此皆東南水利至於西北河渠溝洫廢弛已久史漢所紀西門豹史起鄭國兒寛白公李冰之徒競言水利者如朔方西河河西酒泉皆引河及川谷以溉田而闗中輔渠靈軹引堵水汝南九江引淮東海引鉅定太山下引汶水蜀鑿離􅕞皆溉田無筭何不尋求其故蹟仿而行之俾轉運之繁苦不獨累在東南此亦萬萬年之計也編集水利約若干巻容當續刻庶為水政之完書欽定四庫全書行水金鑑卷首江南按察使傅澤洪撰黄河圗治黄河無他法逢灣取直聖訓煌煌然疏濬亦不可少禹疏九河蓋疏其下流之淤塞而已下流淤則上流必決故在宋則有疏濬黄河司官明天順初令河道三年一挑浚嘉靖中奏准凡臨河州縣各造上中下三等船并置鐡扒尖鉏疏濬淤淺又奏准野雞岡孫繼口等䖏各置船器具於河水未發之前督率挑濬載在史冊㑹典自隆萬間創以隄束水以水攻沙之說而黄河遂不言疏濬矣先皇帝上諭黄河自決處以下分沙壅河河水陡漲則隄岸之危非此即彼朕知之最為明切大㢤王言如綸如綍司河者亟加之意焉古今黄河通塞圗周定王五年禹河初徙王莽始建國三年河再徙千乗入海歴唐至宋景祐元年決横隴慶歴八年復決商胡合永濟渠注乾寧軍入海是為北流嘉祐五年北流復決為二股河自魏恩東至徳滄入海是為東流元符二年東流塞金明昌五年河決陽武東注梁山濼分兩派一由北清河入海一由南清河奪淮而汲胙之流塞元至元中河徙陽武南奪濄入淮而新鄉之流塞泰定元年改從汴渠至徐城東北合泗入淮即今通行之河也元時新鄉雖塞尚由獲嘉明天順六年自武陟東徙原武而獲嘉之流塞𢎞治以前北流猶未塞也自築斷黄陵岡而北流遂永塞矣准水圗淮水㑹七十二道山河瀦於洪澤加築髙堰以障之又堅閉六壩導淮出清口以刷黄沙以濟運道誠當今之至計也但髙堰愈加愈髙淮揚兩郡終有後虞所以先皇帝勤勤懇懇有保固髙家堰第一要緊又有髙家堰堤作何保守堅固更有何修治善策之上諭也司河者所當思患而豫防之髙堰圗淮之所受山源之水汝潁淝濄濠池為大而僅僅於數十丈之清口出水蓋用以刷黄不得不築髙堰蓄湖水以助其出口之力然堰日髙湖日漲水漲隄危防守為難則髙堰之為利害亦大矣哉漢水江水圗東西兩漢俱出西縣嶓冡而禹貢但言東漢不及西漢蓋漢陽之西縣漢縣也漢川之西縣隋縣也不知西縣有二因誤指漾水為一說經者至此淆亂極矣匪特兩漢即三江亦千古長夜鄭康成言左合漢為北江右㑹彭蠡為南江岷江居其中則為中江故書稱東為中江者明岷江至彭蠡與南北合始得稱中此說最合經意並明著之以為江漢二川另開生面西漢圗洞庭湖圗鄱陽湖圗禹貢雖不言西漢然必另列為圗則兩漢所歴之地各自了然洞庭湖在湖廣相𫝊為神仙洞府之庭即九江也禹貢九江孔殷謂沅漸元辰敘酉澧資湘九水㑹合故名鄱陽湖在江西水連南康饒州九江三府禹貢東滙澤為彭蠡即此二湖雖各自為瀰漫數十百里之大川而總之皆江漢之所瀦也故並附圖之濟水圗濟水三伏三見之說由来舊矣沈存中言歴下凡發地皆是流水世𫝊濟水經過其下東阿之井乃濟水所為蔡氏引以證濟之伏見今濟南兖州二府一十六州縣共二百四十有八泉分為五派瀦之水匱以之濟運自明初至今興廢不一恭憶先皇帝上諭山東運河全賴衆泉流蓄㣲山諸湖以為漕運地方官相度泉源蓄積湖水俾漕運無悮正易易耳然則治山東運河莫先於治濟治濟非難事唯有設官司専主泉政恢復水匱斯閘河運道自不虞其淺阻矣五水濟運圗五水者何汶也泗也沂也洸也濟也汶水由南旺入漕為分水口而諸泉之由汶濟運者凡百四十有四泗水合洙水過孔林至兖州府金口閘沂水雩水入之而諸泉之由泗濟運者凡六十有四由沂濟運者凡二十有七若濟寧之托基浣筆諸泉自入運者不興焉洸水者汶之支流也至濟寧㑹泗沂合流同入天井閘而諸泉之由洸濟運者惟寧陽之西栁蛇眼等九泉濟水伏見不常自有㑹通河而濟遂不可問矣今兖州府之府河俗謂之濟河而諸泉之由濟濟運者北則有汶上西北濼蒲灣諸水南則有滋陽闕黨諸泉運河圗孟子言禹之行水也行其所無事也行其所無事則不與水爭獨黄運兩河不然而運河尤甚呉楚王貢浮江漢自𤓰儀逆流而上渡淮黄入中河運口繇中河至山東閘河即元之㑹通河也明初宋尚書用白老人計於南旺分水四分南流六分北流皆以智力導引之然猶慮其淺澀舟不負重特設水匱引泉源分年挑濬以濟水之不足於是南接准泗北通白衛俾糧艘銜尾依期抵通今水匱召佃居多泉源大半淤塞撈淺夫役盡皆裁去運道毎毎淺阻山東猶循故事三年一大挑而淮南運河則自靳文襄而後三十餘年不言疏濬矣准黄水漲惟以築堤為事蓋黄河挾沙而行水去沙停自淮至江河身日漸淤髙隄在城堞民廬之上伏讀先皇帝上諭有云治河専以築堤終屬無益故居今日而言江南運河之急先務唯有遵循文襄公濬船之法置備器具分地更番以深濬河身使水由地中行而已矣太湖圗清江浦圗衛河圗禹王䑓圗太湖吐吸江海包絡蘇常湖三州運河每與湖之消長為利害若依古制沿湖隄各置閘板以時啟閉備水旱官主其事為利更溥不則頗為三州之害清江浦明平江伯陳瑄所鑿為運道鎻鑰總河及河道㕔行署皆在焉衛河自發源至汶河㑹流處約計千里諸水注之所歴州縣皆有工程自臨清板閘以北藉以濟運禹王臺為減中河水勢而設里俗𫝊㑹神禹治水時鑿山引沭水復建此臺以為扼塞沂剡邳宿諸州縣並賴之亦要害也各自為圖以殿諸運河之後行水金鑑巻首
