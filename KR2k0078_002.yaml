body:
  text: 行水金鑑卷二江南按察使傅澤洪撰河水河水又東徑宜梁縣故城南水經五原西南六十里世謂之石崖城酈注梁廢豐州東有宜縣故城又東徑稒陽城南水經東部都尉治徑河隂縣故城北又東徑九原縣故城南秦始皇置九原郡治此漢武帝元朔二年更名五原也西北接對一城蓋五原縣之故城也酈注即稒陽城稒陽塞在稒陽縣西北後漢永元初竇憲出雞鹿塞鄧鴻出稒陽塞即此城河隂漢屬五原郡元和志敬本古城在中受降城北四十里鄭䖍軍録曰時人以張仁願河外築三城自古未有敬本城周一萬八百七十二步壕塹深峻亦古之堅守賈耽古今述曰以地理求之前代九原郡城也又東過臨沃縣南又東枝津出焉又東流石門水南注之水經水出石門山地理志曰北出石門鄣即此山也自鄣東南流徑臨沃城東東南注於河酈注在臨沃屬五原當稒陽縣西又東徑稒陽縣故城南水經地理志曰自縣北出石門鄣河水决其西南隅又東南枝津注焉水上承大河於臨沃縣東流七十里北溉田南北二十里注於河酈注林五原東部都尉治在榆衛廢勝州西南漢志稒陽縣北出石門鄣得光祿城太初三年光祿徐自為出五原塞築亭障西北至盧朐山謂之光祿塞即此按中受降城本秦九原郡地唐置天德軍元和志云武川城在軍北三百里後魏六鎮從西第三鎮也自北出石門障即光祿城古入胸奴大路又東徑塞泉城南而東注又東過雲中楨陵縣南又東過沙南縣北從縣東屈南過沙陵縣西河水屈而流白渠水注之南入楨陵縣西北水經緣胡山歷沙南縣東北兩山二縣之間南出余以太和中為尚書郎從髙祖北巡親所徑涉縣在山南北去雲中城一百二十里縣南六十許里有東西大山山西枕河河水南流脈水尋經殊乖川去之次酈注塞泉城在今廢勝州界楨陵即廢東勝州也其故城在山西平虜衛西北河東岸沙南故城在西岸沙陵漢屬雲中郡緣胡山在今平鹵衛西北黃河西來折而南流處榆林塞外唐為勝州地經文當云又南徑雲中楨陵縣西又南徑沙南縣東則與酈道元所見者符矣又南過赤城東又南過定襄桐過縣西河水於二縣之間濟有君子之名水經定襄郡漢髙六年置桓帝十一年西幸榆中東行代地洛陽大賈齎金資隨帝後行夜迷失道往投津長曰子封送之渡河賈人卒死津長埋之其子尋求父喪發冢舉尸資費一無所損其子悉以金豫之津長不受事聞於帝曰君子也即名其津為君子濟濟在雲中城西南二百餘里酈注西今山西平鹵衛有君子濟又東南左合一水水經水出契吳東山西徑故里南而北俗謂之契吳亭其水又西流注於河酈注又南樹頽水注之水經水出東山西南流徑沃陽縣左合中陵川亂流西南與一水合北俗謂之樹頽水酈注尉沃陽漢雁門西部都治在今平鹵衛東南又南太羅水注之水經水源上承樹頽河南流西轉徑武州縣故城南十三州志曰武州縣在善無城西南百五十里北俗謂之太羅城水亦藉稱焉又西南流注於河酈注繁武縣故城在今峙縣界又左得湳水口水經水出西河郡美稷縣東南流羌人因水以氏之漢沖帝時羌湳狐奴歸化蓋其渠帥也又西流歷於吕梁之山而為吕梁洪其巖層岫衍澗曲崖深巨石崇竦壁立千仞河流激蕩濤湧波襄雷渀雲泄震天動地昔吕梁未闢河出孟門之上蓋大禹所闢以通河也司馬彪曰吕梁在離石縣西今於縣西歷山尋河乃無遏岨至是乃為河之巨嶮即吕梁矣在離石北以東可二百餘里酈注今平鹵衛西有吕梁山湳水口當在太原府河曲縣西北天橋峽也又南過西河圁陽縣東水經西河郡漢武帝元朔四年置圁水出上郡白土縣圁谷東徑其縣南又東徑圁隂縣北東桑谷水注之圁水又東徑圁隂南東流注於河酈注圁今米脂縣西北有隂故城圁陽當在其東北圁音銀史記晉文公攘戎翟居於圁洛之間即此水又東端水入焉水經水西出號山山海經曰其山朩多漆棕其草多芎窮是多冷石端水出焉而東流注於河酈注又南諸次之水入焉水經水出上郡諸次山山海經曰諸次之山諸次水出是山多木無草鳥獸莫居是多衆蛇其水東徑榆林塞世又謂之榆林山即漢書所謂榆溪舊塞者也自溪西去悉榆林之藪矣酈注州上郡即今陜西延安府綏德榆林塞在廢勝州南界又南湯水注之水經山海經曰水出上申之山上無草朩而多硌石下多榛楛湯水出焉東流注於河酈注又南徑離石縣西奢延水注之水經水西出奢延縣西南赤沙阜東北流又東黑水入焉又東走馬水注之水出西南長城北橋山昔二世賜䝉恬死於此山上有黃帝冢帝崩唯弓劒存焉故世稱黃帝仙矣其水東流昔段熲追羌出橋門至走馬水聞羌在奢延澤即此處也門即橋山之長城門也其水東北流入長城又東北注奢延水又東入於河酈注故離石縣今永寧州奢延城在廢夏州西南又南陵水注之水經水出陵川北溪南徑其川西轉入河酈注又南得離石水口水經離石北山南流徑離石縣故城西又南出西轉徑隰城縣故城南西流注於河酈注今隰城縣故城在孝義縣界又南過中陽縣西水經中陽縣故城在東東翼汾水隔越重山不濱於河也酈注孝中陽縣即今義縣界又過土軍縣西水經吐京郡治故城即土軍縣之故城也胡漢譯言皆訛僞變矣酈注有今汾州府石樓縣土軍縣故城又南合契水水經傍溪東入窮谷其源也酈注又南得大蛇水水經發源溪首西流入河酈注又南右納辱水水經山海經曰辱水出於鳥山其上多桑其下多楮隂多鐵陽多玉其水東流注於河俗謂之秀延水酈注又南過上郡髙奴縣東水經縣有洧水肥可㸐水上有肥可接取用之酈注府今延安膚施縣北百里有金明城即漢髙奴縣也又南蒲川石樓山南徑蒲城東水經即重耳所奔之處也又南歷蒲子縣故城西今大魏之汾州治徐廣晉紀稱劉淵自離石南移蒲子者也闞駰曰蒲城在西北漢武帝置酈注在蒲子縣故城今隰州又南過河東北屈縣西水經河水南徑北屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止山西四十里河南孟門山淮南子曰龍門未闢吕梁未鑿河出孟門之上大溢逆流無有丘陵髙阜滅之名曰洪水大禹疏通謂之孟門孟門即龍門之上口也實謂黃河之巨厄此石經始禹鑿河中潄廣夾岸崇深傾崖返捍巨石臨危若墜復倚古之人有言水非石鑿而能入石信哉其中水流交衝素氣雲浮往來遙觀者常若霧露沾人窺深悸魂其水崩浪萬尋縣流千丈渾洪贔怒鼓若山騰濬波頽疊迄於下口方知慎子下龍門流浮竹非駟馬之追也又有燕完水注之異源合舍西流注河酈注有今吉州北二十里北屈故縣又南得鯉魚水經歷澗東入窮溪首便其源也爾雅曰鱣鮪也出鞏穴三月則上渡龍門得渡為龍矣否則㸃額而還非夫往還之㑹何能便有兹稱乎酈注又南羊求水入焉水經東出羊求川西徑北屈縣故城南城即夷吾所奔邑也酈注又南為採桑津水經春秋僖公八年晉里克敗狄於採桑是也酈注又南過皮氏縣西水經赤水出西北罷谷川東謂之赤石川東入於河酈注今平陽府河津縣西有皮氏故城又南合蒲水水經西則兩源並發俱導一山出西河隂山縣又東北與北溪㑹同為一川東北注河酈注陽隂山縣今平府界又南徑丹水西南水經丹陽山東北徑冶東俗謂之丹陽城城之左右猶有遺銅矣其水東北㑹白水口水出丹山東而西北注之丹水又東東北入河酈注又南黑水注之水經西出丹山東而東北入於河酈注又南至崿谷傍水經東北窮澗水源所導也西南流注於河酈注又南洛水自獵山枝分東派東南注於河水經昔魏文侯築館洛隂指謂是水也皮氏縣故城在龍門東南不得延徑皮氏方届龍門也酈注以今輿地言之河自大積石山東北流徑陜西西寧衛西南塞外至河州西七十里入塞衛在行都司東南七百餘里黃河西自塞外流入經衛之東南與和州分水州在臨洮府西一百八十里西至生番界七十里有小積石山兩崖如削河流其中西南去大積石山千餘里又東北徑州北合灕水又東北合洮水二水已見上文又東北徑蘭州西南湟水合浩亹水自西來注之州在臨洮府北二百十里黃河去州二里闞駰所謂金城河也湟水自州西一百八十里入河唐書吐蕃傳湟水出蒙谷扺龍泉與河合河之上流由洪濟梁西南行二千里世舉謂西戎地曰河湟又東北徑州北夾河有灘宜播五榖引河灌溉甚為民利又東北徑金縣北縣在蘭州東九十里黃河去縣六十里又東北徑靖逺衛北舊名靖虜屬陜西都司本漢鸇隂縣地後漢建初中趙冲追擊叛羌于鸇隂河即此衛北有韋精山黃河自金縣亂山中來至衛西南百里烏蘭關漢祖厲縣地也唐置烏蘭縣屬㑹州有黃河堰刺史安敬宗所築以捍河流又東北徑寧夏中衛南衛屬陜西都司黃河去衛十五里地勢稍平河流益盛衛東南一百五十里有鳴沙城西枕黃河人馬行經此沙隨路有聲故號鳴沙又東北徑靈州所北所在寧夏衛南少西九十里本漢靈州富平二縣地舊志云黃河千里一曲自澆河至故眴卷縣率東北流至富平始曲而北流亦謂之河曲折而北徑寧夏衛東南衛屬陜西都司宋為懷逺鎮乾興二年李德明城此為興州以居景祐中元昊升為興慶府衛西至賀蘭山邉界六十里北至鎮逺關邉界二百里東至榆林衛界三百五十里黃河去衛四十里元和志保靜縣西南至靈州六十里本漢富平縣地賀蘭山在縣西五十三里東望雲山形勢相接迤邐向北經靈武縣又西北徑保靜縣西又北經懷逺縣西又北徑定逺城西又東北扺河其扺河之處亦名乞伏山在黃河西從首至尾有像月形南北約長五百餘里真邉城之巨防山之東河之西有平田數千頃可引水灌溉如盡收地利足以贍給軍儲也顧景范云自寧夏以上民多穿渠溉田而寧夏之利尤博蓋上流勢少緩無溢决之患且泥沙未甚故引河為宜也又北徑平羅所東舊名平虜在寧夏衛東北一百二十里河去所十五里賀蘭山在所西六十里鎮逺關在所北六十里又北徑榆林衛西出塞徑廢豐州西衛本漢上郡龜兹縣地金元為米脂縣地名榆林莊明正統二年築榆林城天順七年置榆林衛治焉北至邉牆十里其外皆戰國時雲中九原地也黃河自靈州所橫城堡西折而北徑寧夏平羅入衛界廢豐州城在衛西北塞外七百里本漢朔方郡之廣牧縣後魏為懷朔鎮隋始置豐州治九原縣明初廢杜佑曰豐州西至黃河百三十里北至黃河四十里東北至黃河八十里折而東徑三受降城南元和志三受降城景雲三年朔方總管張仁願置先是朔方軍北與突厥以河為界河北岸有拂雲堆神祠突厥將入冦必先詣祠祭酹求福因牧馬料兵而後渡河時突厥默啜盡衆西擊突騎施婆葛仁願奏請乘虗奪取漠南之地於河北築三受降城首尾相應絶其南冦之路從之六旬而三城俱就以拂雲祠為中城與東西兩城相去各四百餘里遙相應接北拓三百餘里於牛頭牟那山北置烽堠一千八百所自是突厥不得度山放牧朔方無復冦掠减鎮兵數萬人顧景范云中城在廢夏州北八百里西城在廢豐州北八十里東城在廢勝州東北二百里今按東城本漢定襄郡之盛樂縣後魏嘗都此唐置振武軍元和六年以韓重華為振武營田和糴水陸運使重華請募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲中界極於中受降城出入河山之際六百餘里屯堡相望冦來不能為暴人得肆耕其中少可以罷漕挽之費朝廷從其議秋果倍收嵗省度支錢千三百萬見韓愈送重華歸所治序折而南徑廢勝州東入塞其東岸則平鹵