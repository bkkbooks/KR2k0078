鞍塢渠亦恕所鑿有龍門倉開元二年置所以貯渠田入轉般至京以省闗東之漕者也此即漢時河東太守番係之策史記河渠書所謂河移徙渠不利田者不能償種而唐人當日行之竟獲利是以知天下無難舉之功存乎其人而已謂後人之事必不能過前人不亦誣乎顧炎武日知録河水自皮氏縣西又南出龍門口汾水從東來注之水經昔者大禹導河積石疏決梁山謂斯處也即經所謂龍門矣魏土地記曰梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫迹遺功尚存酈注汾汾水篇水出太原汾陽縣北管涔山東南過晉陽縣東晉水從縣東南流注之又南洞渦水從東來注之又南過大陵縣東又南過平陶縣東文水從西來流注之又南過冦爵津又南入河東界又南過永安縣西又南過楊縣東西南過髙梁邑西又南過平陽縣東又南過臨汾縣東又屈從縣南西流又西過長修縣南又西過皮氏縣南又西至汾隂縣北西注於河又南右合畼谷水又南逕梁山原東水經水自谿東南流逕夏陽縣西北東南注於河又南自原山東南出至河晉之望也在馮翊夏陽縣之西北臨於河上山崩壅河三日不流晉侯以此問伯宗即是處也春秋榖梁傳曰成公五年梁山崩遏河水三日不流召伯尊遇輦者不避使車右鞭之輦者曰所以鞭我者其取道逺矣伯尊因問之輦者曰君親縞素率羣臣哭之斯流矣如其言而河流酈注今夏陽縣即韓城縣地又南崌谷水注之水經水出梁山東南注於河昔韓信之襲魏王豹也以朩罌自此渡酈注又南右合陶渠水水經水出西北梁山東南流又南逕髙門南又東南逕華池南池在夏陽城西北四里許髙門東去華池三里又東南逕司馬子長墓太史公自叙曰遷生於龍門是其墳墟所在矣昔魏文侯與吳起浮河而下美河山之固即於此也酈注又西徐水注之水經水出西北梁山東南流逕子夏陵北東入河酈注又南逕子夏石室水經東南北有二石室臨側河崖即子夏廟室也酈注安今西府郃陽縣東有子夏石室又南過汾隂縣西水經河水東際汾隂魏土地記曰河東郡北八十里有汾隂城北去汾水三里城西北隅曰睢丘上有后土祠封禪書曰元鼎四年始立后土祠於汾隂睢丘是也又有萬歳宫神爵元年幸萬歳宫東濟大河而神魚舞水矣昔趙簡子沈欒激於此曰吾好聲色而是子致之吾好士六年不進一人是過而㸃吾善君子以為能譴矣酈注北今平陽府滎河縣有汾隂故城又逕郃陽城東水經故有莘邑為太姒之國詩云在郃之陽城北有北瀵水城南又有瀵水東流東注於河者即郃水也又南瀵水入焉水出汾隂縣南四十里西去河三里平地開源濆泉上湧大幾如輪深則不測俗呼之為瀵魁古人壅其流以為陂水種稻與郃陽瀵水夾河中渚上又有一瀵水皆相潛通爾雅異出同流為瀵水其水西南流歴蒲坂西流注於河酈注東今西安府郃陽縣四十里有郃陽故城又南逕陶城西水經舜陶河濵皇甫士安以為定陶也然陶城在蒲坂城北城即舜所都南去歴山不逺或耕或陶所在則可何必定陶方得為陶也孟津有陶河之稱盖從此始之南對蒲津關酈注里元和志陶城在臨晉縣北四十即今平陽府之臨晉縣也又南過蒲阪縣西水經地理志縣故蒲也秦始皇東廵見有長阪故加阪也皇甫謐曰舜所都也酈注蒲今蒲州東南有阪故城又南逕雷首山西水經山臨大河北去蒲阪三十里尚書所謂壺口雷首者俗亦謂之堯山山上有故城又曰堯城闞駰曰蒲阪堯都事有似而非非而似千載眇藐非所詳耳酈注又南洓水注之水經水出河北縣雷首山縣北與蒲阪分山有夷齊廟山南有古冢陵柏蔚然攅茂丘阜俗謂之夷齊墓其水亦曰雷水也西南流洓水又西南流注於河春秋左傳謂之洓川者也酈注山洓水篇洓水出河東間喜縣東黍葭谷又西過周陽邑南又西南過其縣南又西南過安邑縣西又南過解縣東又西南注於張陽池注云洓水又西南逕張陽城東又西南属於陂陂分為二東陂世謂之晉興澤西陂即張澤也西北去蒲阪一十五里又南至華隂潼關渭水從西來注之歴船司空與渭水㑹水經漢書地理志曰舊京兆郡之屬縣也左丘明國語云華岳本一山當河河水過而曲行河神巨靈手盪脚踏開而為兩今掌足之跡仍存華巖河在關内南流潼激關山因謂之潼關灌水注之水出松果之上北流逕通谷世亦謂之通谷水東北注於河述征記所謂潼谷水者也酈注名元和志云闗西一里有潼水因以闗渭水篇渭水出隴西首陽縣渭谷亭南鳥䑕山又北過襄武縣北又東過獂道縣南又東過冀縣北又東過上邽縣又東過陳倉縣西又東逕武功縣北又東芒水從南來流注之渭水又東過槐里縣南又東澇水從南來注之渭水又東北逕黄山宫南就水注之渭水又東合田谿水渭水又東逕槐里縣故城南又東合甘水又東豐水從南來注之渭水又東北與鎬水合渭水又東北逕渭城南而沉水注之又東過長安縣北渭水又東與沉水枝津合渭水又逕長安城北又東過鄭縣北又東過華隂縣北又東過覇陵縣北覇水從縣西北流注之東入於河注云春秋之渭汭也水㑹即船司空所在矣地理志渭水東至船司空入河今華隂縣東北五十里有船司空故城黄河自鹽澤西來暨達潼闗其面勢所向凡四大折或與北狄分境或當北狄來路其初一折由積石而逕湟中則鄯蘭也是一折也及至靈州西南遂轉北而行凡千餘里比河西岸即為凉肅甘沙四郡是又一折也迨其北流千里而遥至九原豐州則又轉而東流故豐州北面正拄大河是又一折也豐州之東為榆林北境固抵大河而河從此州之東又轉而南故勝州北東兩面皆抵大河也自此而往直至潼闗皆是河南矣此又一折也程大昌北邉備對以今輿地言之河自韓城縣龍門山南流與汾水合縣志云河自龍門而南距郃陽不百里河壖多客土遇潦輙潰又南逕郃陽縣東其東岸則滎河縣臨晉縣郃陽在陜西同州東北一百十里黄河去縣四十里滎河在山西蒲州東北一百二十里黄河舊在縣西五里明時漸徙而東正徳二年遂至城下今去縣僅七十步臨晉在州東北七十里黄河在縣西三十里又南逕朝邑縣東又南至華隂縣東北與渭水合其東岸則蒲州朝邑在同州東三十里黄河去縣二十八里有臨晉闗華隂在華州東七十里黄河去縣九十里蒲州在平陽府西南四百五十里黄河舊在州西蒲津門外明萬歴八年河决東齧城闉甃石岸以障之今漸徙而西去城十餘里有蒲津闗與臨晉闗夾河相對又南逕雷首山西至潼闗衛北衛在陜西都司東明析華隂地置西至華隂縣界一里黄河在衛北一里潼闗故城在衛東南四里左傳所謂桃林之塞元和志云自靈寳縣以西至潼闗皆是折而東是為河曲春秋文公十二年秦晉戰於河曲即此地此河水南至華隂之所經雍州文所稱龍門西河者也禹貢錐指行水金鑑卷二
