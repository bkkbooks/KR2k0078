body:
  text: 行水金鑑巻四江南按察使傅澤洪撰河水北過降水至於大陸禹貢如釋文降字降水漢書地理志水經皆從洚漢孔氏但以為水名不著所在唐孔氏以為在信都鄭氏謂洚讀為降而酈道元曰案地理志降水發源屯流下亂章津是乃與章得通稱故水流間闗所在著目信都復見絳名而東入於海尋其川殊無他瀆而衡漳舊道遂與屯相亂乃書有過絳之説河過絳當應此矣下至大陸不異經説自甯迄於鉅鹿出於東北皆為大陸語之纒絡厥勢眇矣酈氏此言較諸説差為可信今姑從之尚書全解徳漢鉅鹿縣唐為平鄉鉅鹿二縣属邢州今属順府鉅鹿故城即今平鄉縣治也后山叢談云某官杜子民言大陸今黎陽是也自此而西北降水疑即安陽河是也大陸邢州鉅鹿泊也按宋張洎云降水即濁漳也字或作絳地理志上黨屯留縣下云桑欽言絳水出西南東入海酈道元引此文作入漳云絳水發源屯留下亂漳津與漳俱得通稱也水經所叙漳水自平恩以下皆禹之故道河自斥漳又東北逕平恩曲周以至鉅鹿其西畔為大陸正義云地理志降水在信都縣案漢書以襄國為信都在大陸之西或降水發源在此下尾至今之信都故得先過降水乃至大陸鄭以降讀為下江反聲轉為共河内共縣淇水出焉東至魏郡黎陽縣入河此近降水周時國於此地者惡言降故謂之共此鄭胸臆不可從也渭按襄國今為邢臺縣界属順徳府絶無降源孔説非是酈注濁漳引鄭氏尚書注言降水字不當作絳是也而讀降為郕降於齊師之降以淇水為降水共城為降城則謬又曰今河所從去大陸逺矣館陶北屯氏河其故道與酈以為近是今考地理志館陶縣下云河水别出為屯氏河東北至章武入海今館陶臨清清平髙唐並属山東東昌府景州南皮滄州鹽山並属直𨽻河間府界中並有古屯氏河則屯河行清河之東大河故瀆之西其為禹河故道理或有之然鄴縣故大河在東北入海地志有明文禹河既自宿胥口北行至鄴豈復東行至館陶而與屯氏相接哉其非禹迹亦明矣冀州有三大陸一在鉅鹿郡北班固繫諸禹貢又名鉅鹿澤吕氏春秋云趙有鉅鹿又名廣河澤爾雅晉有大鹿孫炎云今鉅鹿縣廣河澤是也此真禹貢之大陸也一在河内修武縣古寗邑秦置修武縣其故城在今獲嘉縣西北左傳定公元年魏獻子田於大陸還卒於寗杜預云大陸疑即吳澤陂近寗是也一在太原鄔縣今為介休縣地班固云九澤在縣北是為昭餘祁并州藪酈道元云吕氏春秋謂之大陸是也斯二者皆非禹貢之大陸也今按吕覽九藪既云晉之大陸又云趙之鉅鹿如謂大鹿即鉅鹿則一澤不應兩見故道元以鄔澤當之盖晉為唐叔始封大陸宜在其境内而鉅鹿當戰國時實為趙地故分為二澤也要之廣平曰陸是處有之其大者則謂之大陸猶之髙平曰原亦是處有之其大者則謂之太原耳然晉之大陵在漢大陵縣界陸恐是陵字之誤蔡傳引程氏曰大陸云者四無山阜曠然平地杜佑李吉甫以為邢趙深三州之地者得之今按漢志鉅鹿縣禹貢大陸澤在北一而已而唐人所言不一通典有二趙州昭慶縣隋為大陸縣有大陸澤昭慶本漢廣阿縣隋曰大陸唐曰昭慶宋更名隆平今在真定府趙州東南一百里縣志云大陸澤在縣東北三十里杜家莊深州陸澤縣有禹貢大陸澤陸澤本漢下博縣其故城在今深州南唐先天二年分下博及饒陽鹿城地置陸澤縣為深州治今在真定府東二百里是也元和志有四邢州鉅鹿縣大陸澤一名鉅鹿澤在縣西北東西二十里南北三十里葭蘆菱蓮魚蟹之類充牣其中澤畔又有鹹泉煮而成鹽百姓資之鉅鹿本漢南䜌縣亦兼得鉅鹿縣地在今順徳府東北一百二十里漢路温舒鉅鹿東里人取澤中蒲截以牒編用冩書即此澤也趙州昭慶縣廣阿澤在縣東二十五里即大陸别名深州鹿城縣大陸澤在縣南十里鹿城本漢鄡縣今為束鹿縣在保定府祁州南一百三十五里又陸澤縣南三里即大陸之澤是也故程泰之謂以邢趙深三州之地為大陸自杜李始竊謂唐鉅鹿縣東境亦漢鉅鹿縣地澤在西北接昭慶界蓋一澤跨二縣之境即班固所云在鉅鹿縣北孫炎所云今鉅鹿縣廣河澤者也而志家唯以平鄉為古鉅鹿求此澤而不得遂言今盡為丘隴豈知元和志獨詳於鉅鹿原不在平鄉界邪宋河渠志云大觀元年河決陷鉅鹿縣遷縣扵髙地又以隆平下濕亦遷之則二縣地勢最卑澤在其間明矣通典昭慶陸澤縣有澤而鉅鹿鹿城無之可見四澤實止二澤唐人亦似知漳水即禹河故以南宫所出之洚瀆為北過降水以深州之大陸澤為至於大陸意謂如此則大陸在過降之後與經適合故不主鉅鹿而取陸澤然枯洚乃漢時漳水之徙流實非禹迹即以為禹迹此亦是河别為降不可謂之過也大陸在邢趙二州界而深不與焉傅同叔云凡廣河澤以東其地平廣緜延千里皆謂之大陸是瀛滄亦大陸矣河自大陸又北始播為九河誠如傅言則許商所謂九河自鬲以北至徒駭間相去二百餘里者將何所容其地邪程氏禹貢論曰古洚瀆自唐貝州經城北入南宫貫穿信都大抵北向而入故河於信都之北為合北過降水之文又曰大陸地志謂在鉅鹿縣其地逺在枯洚上流不與經應當以深之陸澤為大陸則古河之行貝冀者可用枯洚以應北過降水之文其逕深而入滄者可以謂之至於大陸也今按程氏所稱故河即禹河也據水經濁漳注云絳瀆北逕信都城東東連廣川縣之張甲故瀆河水注云張甲故瀆東北至修縣東㑹清河淇水注云清河自修縣南又東北過東光縣西又東北左與張甲屯絳故瀆合又東北右㑹大河故瀆然則信都之北為絳瀆所入者乃張甲河非漳水也安得謂入故河乎絳瀆合張甲又東北至修縣合清河又東北至東光合大河故瀆即王莽河又東北至阜城合漳水漳水即禹河故道漢志所云東北至阜城入大河者也絳瀆至此始入故河非信都界深州在阜城西北縱移大陸於此亦枯洚之上流河之所行仍先大陸而後降水不與經相應况大陸在鉅鹿班固孫炎俱有明文其可以意為遷就邪禹貢錐指濁漳水出上黨長子縣西發鳩山水經出鹿谷與發鳩連麓而在南淮南子謂之發苞山故異名互見也左則陽泉水注之右則散蓋水入焉三源同出一山但以南北為别耳酈注縣元和志發鳩山在西南六十五里長子縣今属山西潞安府酈注散蓋水今縣志作傘蓋東過其縣南水經又東逕長子縣故城南春秋襄公十八年晉人執衛行人石買於長子即是縣也秦置上黨郡治此其水東北流入漳水漳水東㑹於梁水梁水出南梁山北流至長子縣故城南北入漳水酈注縣故城在今西屈從縣東北流注水經縣注上下疑有闕當云屈從東北流陶水注之陶水南出南陶北流至長子城東西轉逕其城北東注於漳水酈注又東過壺闗縣北水經漳水東逕屯留縣南又屈逕其城東東北流有絳水注之絳水西出榖逺縣東發鳩之谷謂之絳水西出榖逺縣為濫水東逕屯留縣故城南東北流入於漳故桑欽云絳水逕屯留西南東入漳漳水又東陳水注之水出西發鳩山又東逕屯留縣故城北又東流注於漳漳水逕壺闗縣故城西又屈逕其城北有壺口闗故曰壺闗矣漳水歴鹿臺山與鞮水合又東北逕襄垣縣故城南酈注谷壺闗屯留並属今潞安府發鳩一名盤秀嶺又名方山鹿瀆山盤石山後魏地形志藍水出寄氏縣盤秀嶺南山流入濁漳元和志絳水出屯留縣西南方山去縣八十四里寰宇記引冀州圖謂之鹿瀆山屯留新志盤秀山在縣西南九十里一名盤石山按漢志上黨有榖逺縣在今屯留縣界寄氏故城在縣西南七十里藍水即濫水絳水之上源也或分藍絳為二水謂藍出其陽絳出其隂非是地形志屯留縣絳水自寄氏界來入濁漳因名交漳壺口闗今在黎城縣東北太行山元和志鹿臺山在襄垣縣南二十里濁漳水在縣南二十一里襄垣縣故城在今壺闗縣北又東北過潞縣北水經闞駰曰有潞水為冀州浸即漳水也故世人亦謂濁漳為潞水矣漳水又東北歴望夫山湼水又東南流注於漳水漳水又東逕磻陽城北倉石水入焉水出林慮縣之倉石谿又北合白水谿谿水出壺闗縣東白朩川又東逕林慮縣之石門谷又注於蒼谿水蒼谿水又北逕磻陽城東而北流注於漳水漳水又東逕葛公亭北而東去矣酈注縣今潞安府潞城縣西有潞故城望夫山在今黎城縣東北元和志清漳水在黎城縣東北五十里濁漳水在縣西北五十六里林慮縣今河南彰徳府林縣是也倉石水在林縣西北四十里磻陽城在林縣北八十里又東過武安縣水經漳水逕於縣東清水自渉縣東南來流注之世謂之交漳口也酈注里元和志清漳水亦名涉河在陟縣南一今河南彰徳府武安縣有武安故城今涉縣亦属彰徳西北有故城焉又東出山過鄴縣西水經漳水又東逕三户峽為三户津在鄴西四十里又東逕武城南又東北逕西門豹祠前昔魏文侯以西門豹為鄴令引漳以溉鄴民賴其用其後魏襄王以史起為鄴令又堰漳水以灌鄴田咸成沃壤百姓歌之又北逕祭陌西又東逕梁期城南又逕平陽城北酈注臨故鄴城在今彰徳府漳縣西可四十里西接林縣界有太行林慮倚陽天平諸山漳水之所經也三户津在故鄴城西四十里祭陌即西門豹沉巫處田融以為紫陌在故鄴城西北五里梁期城在故鄴城北五十里括地志云臨漳縣西二十五里有平陽故城又東過列人縣南水經漳水又東右逕斥丘縣北即裴縣故城南又東北逕列人縣故城南右合白渠故瀆白渠水出魏郡武安縣欽口山東南流逕邯鄲縣南又東逕肥鄉縣故城北渠道交徑互相纒縻與白渠同歸逕列人右㑹漳津今無水地理志曰白渠東至列人入漳是也酈注列人縣故城在今直𨽻廣平府肥鄉縣北元和志成安縣濁漳水西自滏陽縣界流入斥丘故城在縣東南三十里斥丘裴縣並在東昌府丘縣肥鄉故城在今縣西二十二里魏分邯鄲縣地置又東北過斥漳縣南水經應劭曰其國斥鹵故曰斥漳魏太祖鑿渠引漳水東入清洹以通河漕名曰利漕渠漳津故瀆水舊斷谿東北出涓流濗注而已尚書所謂覃懐底績至於衡漳者也又東北逕平恩縣故城西酈注縣今廣平府曲周東有斥漳故城元和志漳水在曲周縣西二十九里平恩故城在今山東東昌府丘縣西舊在曲周縣東南五十里金省入曲周丘縣志云漳水今唯經曲周不入縣界以今輿地言之屯留壺闗襄垣潞城黎城並属山西潞安府林縣陟縣臨漳並属河南彰徳府成安肥鄉曲周並属直𨽻廣平府界中皆禹貢降水之所經也漢志雜採古記故漳絳二水並存實一川也漳絳本入河及河徙後漳絳循河故道而下故道元云水流閒闗所在著目信都復見絳名而東入於海也然漢志信都之絳水則又有别志云故漳河在北東入海禹貢絳水亦入海蓋縣北故漳即禹河故道而絳水出其南則漳水之徙流道元所謂絳瀆者也濁漳注漳水自南宫縣故城西又北絳瀆出焉今無水故瀆東南逕九門城南又東南逕南宫城北又東南逕繚城縣故城北左逕安城南故信都之安城鄉也又東北逕辟陽亭又北逕信都城東散入澤渚西至於信都城東連於廣川縣之張甲故瀆同歸於海故地理志曰禹貢絳水在信都東入於海也蓋漢時信都之漳水徙其縣南故地志以此為絳水而目縣北之瀆曰故漳河其後漳又復北道故水經叙漳水仍自信都縣西東北過下博縣而酈道元云絳瀆今無水唐人遂謂之枯洚通典云清河郡經城縣界有枯洚渠北入信都郡界是也此渠乃漳水一時之徙流漢志以為禹貢之絳水大謬而杜佑據以分冀兖之界自後説經者動稱枯洚以證導河之所過皆班固禹貢二字誤之也禹貢錐指南宫縣故城在今真定府南宫縣西北元和志絳水故瀆在南宫縣東南六里河水注云張甲河左瀆北逕經城東繚城西又逕南宫縣西又注絳瀆即此水也繚城在今南宫縣東南安城鄉在今真定府冀州東南辟陽亭在今冀州東南二十五里信都城即今冀州治廣川故城在今真定府棗强縣東三十里河水注云張甲河右瀆自廣川縣東北逕其故城西又東北至修縣東㑹清河入漳修與蓚同音條淇水注云清河東逕修縣南又東北左與張甲屯絳故瀆合又東北逕東光㑹大河故瀆又東北逕南皮浮陽滹沱别瀆注焉濁漳注云漳水㑹滹沱别瀆又東北入清河又東北逕章武平舒入海此即信都絳水入海之道也又東北過曲周縣東又東北過鉅鹿縣東水經衡漳故瀆東北逕南曲縣故城西應劭曰平恩縣北四十里有南曲亭故縣也又逕曲周縣故城東又北逕巨橋邸閣西昔武王伐紂發巨橋之粟服䖍曰巨橋倉名鉅鹿水之大橋也衡水又北逕鉅鹿縣故城東漳水又歴經縣故城西有薄落津衡漳又逕沙丘臺東紂所成也在鉅鹿故城東北七十里又逕銅馬祠東漢光武廟廟側有碑述河内修武縣張導字景明以建和三年為鉅鹿太守漳津汎濫土不稼穡導披按地圖與丞彭參掾馬道嵩等原其逆順揆其表裏修防排通以正水路功績有成民用嘉賴題曰漳河神壇碑而俗老耆儒猶謁斯廟為銅馬劉神寺是碑頃因震裂餘半不可復識矣又經南宫縣故城西今漳水既斷絳水非復纒絡矣又北絳瀆出焉今無水酈注城南曲縣故城在今東昌府丘縣西北曲周縣故在今縣東北漳水故瀆在縣東志云漳水舊自縣東北入威縣其後自魏縣東出經流遂為枯瀆鉅鹿順徳府治其故城即今平鄉縣魏收志云平鄉縣治鉅鹿城是也史記項羽救鉅鹿軍漳南括地志云今俗名栁河在平鄉縣南元和志云濁漳水在縣西南十里明成化十八年漳河東決入順徳府廣宗縣界是為新漳而舊漳遂涸經縣故城在今廣宗縣東二十里本後漢經縣地後魏析置二縣此為西經漳水自平鄉流入縣界即古薄落津戰國䇿趙武靈王曰吾國東有河薄落之水後漢初平四年袁紹擊公孫瓚扵薄落津郡國志云經縣西有漳水津名薄落津也通典平鄉縣有沙丘臺今在廣宗縣界廣宗唐平鄉地太平寰宇記銅馬祠在鉅鹿縣北七里漳水舊在縣東唐鉅鹿縣故城在縣南宋北流決入漳水大觀元年邢州言河決陷鉅鹿縣詔遷縣扵髙地即今治其後河復南出漳亦隨之故道多塞禹河自汲縣東北流入黎陽縣界至大伾山西南折而北為宿胥口蘇代曰決宿胥之口魏無虗頓丘虗在朝歌界今濬縣西南有古朝歌城本殷虗頓丘在黎陽界今濬縣西有頓丘故城本衛邑時河己徙而東宿胥口塞故秦欲決之以灌二邑水經河水注云自淇口東至遮害亭亭在濬縣西南五十里又有宿胥口舊河水北入也淇水注云淇水東流逕枋城南在今濬縣西南即淇門渡也古合宿胥故瀆瀆受河於頓丘縣遮害亭東黎山西句北㑹淇水處立石堰遏水令更東北注魏武開白溝因宿胥故瀆而加其功故蘇代曰決宿胥之口魏無虗頓丘即指是瀆也淇水又東北逕雍榆城南在濬縣西南又東北逕同山東在濬縣西南四十五里又北逕其城東東北逕帝嚳冡西元和志帝嚳陵在澶州頓丘縣北三十里又北逕白祠山東歴廣陽里逕顓頊冢西元和志顓頊陵在頓丘縣西北三十五里又北逕頓丘縣故城西在濬縣西又東北逕枉人山東牽城西湯隂縣志云枉人山在縣東南二十五里與濬縣接界又東北逕石柱岡枉人山北連跨巨岡石柱之類也又東過内黄縣南為白溝也即漢志清河今按宋李垂上導河形勢書請自汲郡東推禹故道出大伾上陽三山之間復西河故瀆即道元所謂宿胥故瀆也濬縣舊志故瀆在縣西十里亦曰西河蓋禹迹漢時則流經縣東又縣北四十里有大齊村相傳亦黄河故道也然淇水自東過内黄縣南為白溝而向北之河道不可得聞據本注云内黄縣故城右對黄澤即賈讓所見内黄界中有澤方數十里環之有隄者也内黄故城在今縣西北澤大方數十里當接安陽縣界疑此地亦禹河之所經河徙乃鍾為黄澤耳昔殷王河亶甲居相其子祖乙圮焉而又遷書序仲丁遷於囂河亶甲居相祖乙圯扵耿傳云相地名在河北祖乙亶甲子圯於相遷於耿河水所毁曰圯通典相州治安陽縣殷王河亶甲居相即其地元和志相州内黄縣東南十三里有故殷城河亶甲居相築此則禹河出内黄安陽之間明矣自此而北則為鄴東之故大河洹水注云洹水出山逕鄴縣南殷墟北竹書紀年曰盤庚即位自奄遷於此遂曰殷也據書序盤庚所遷之殷在河南與竹書異孔頴達云盤庚後王或有從河南亳地遷於洹水之南者非盤庚也今按楚語白公子張曰昔殷武丁能聳其徳至於神明以入於河自河徂亳韋昭云從河内徙都亳也此必盤庚後王有自亳遷於奄者又有自奄遷於鄴南之殷者故武丁即位時殷都仍在河北尋復徂亳蓋亦圮而遷焉殷本紀曰武乙復去亳徙河北此即紂都朝歌也武丁自鄴南復遷於亳至武乙則又自亳遷於朝歌淇水注引晉書地道記謂武丁遷居沬邑盖誤以武乙為武丁耳禹河行臨漳之東又明矣自此東北歴成安至肥鄉而合漳是為北過降水也漳絳至此并為河矣及河南徙漳絳循河故道而下故東川復有漳絳之目水經注漳水自斥漳縣南至銅馬祠東皆漢鉅鹿縣境也昔殷王祖乙遷於邢杜佑云即邢州今為順徳府蓋亦瀕河之地故其後盤庚又圯而遷於亳殷書序祖乙圯於耿作祖乙傳云圯於相遷於耿殷本紀云祖乙遷於邢其説不同按耿在漢河東皮氏縣今為河津縣地傳直以圮為遷未安從史記較長抑或序圯於耿下脱遷於邢三字皇極經世云祖乙踐位圮於耿徙居邢此説是也仲丁河亶甲盤庚皆為遷事作書祖乙但圯而不遷何用作書其為遷邢而作無疑矣禹河行鉅鹿之東又明矣以今輿地言之河自濬縣西南折而北歴内黄並属直𨽻大名府湯隂安陽臨漳並属河南彰徳府魏縣属直𨽻大名府成安肥鄉曲周並属廣平府平鄉廣宗至鉅鹿縣並属順徳府大陸澤在焉此即禹河北過降水至於大陸之故道也禹貢錐指又北播為九河禹貢北分為九河以殺其溢孔氏傳釋水載九河之名云徒駭太史馬頰覆釡胡蘇簡絜鉤盤鬲津漢書溝洫志成帝時河隄都尉許商上書曰古説九河之名有徒駭胡蘇鬲津今見在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里是知九河所在徒駭最北鬲津最南蓋徒駭是河之本道東出分為八枝也商上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也爾雅九河之次從北而南既知三河之處則其餘六者馬頰太史覆釡在東光之北成平之南簡絜鈎盤在東光之南鬲縣之北也其河填塞時有故道今河間弓髙以東至平原鬲津往往有其遺處孔氏疏成平故城在今直𨽻河間府交河縣東東光故城在今東光縣東鬲縣故城在今山東濟南府徳州北弓髙故城在河間府阜城縣西南禹貢九河故道漢世近古止得其三唐人遂得其六歐陽忞輿地記又得其一或新河載以舊名或一地互為兩説皆似是而非無所依據王應麟困學紀聞許商云徒駭在成平胡蘇在東光鬲津在鬲縣今徳平樂陵齊河濟陽慶雲海豐界中有土河志以為徒駭妄也漳水不經此安得有徒駭且徒駭最北豈反出鬲津之南哉今東光寧津南皮滄州慶雲海豐界中並有胡蘇河元和志云胡蘇河在饒安縣西五十里寰宇記云一名赤河自臨津流逕饒安無棣入海漢志東光縣有胡蘇亭水經注云清河東至東光縣西南逕胡蘇亭是也今寧津縣本東光縣地其西有胡蘇亭蓋即在東光者齊乘以滄州南之大連澱為胡蘇河得之隋書平原東有豆子䴚通鑑云豆子䴚負海帶河地形深阻蓋在漢平原勃海河間三郡之交顧炎武肇域記云即今滄州南之大連澱也鬲津最南最長較諸河差有考據今徳州北有鬲津枯河漢志鬲縣平當以為鬲津通典鬲縣故城在安徳縣西北元和志鬲津枯河在徳州安徳南七十里按唐徳州治安徳今為陵縣東逕陵縣北北接吳橋縣界元和志鬲津枯河南去將陵縣二十里金志安徳縣有鬲津河按唐將陵縣南至徳州治五十里其故城當在今陵縣北五十里吳橋志云古鬲津河在縣南里許亦名吳川又東逕徳平縣北去縣十五里北接寧津縣界徳平本平昌五代唐改名又東逕樂陵縣北北接南皮縣界寰宇記樂陵縣有鬲津枯河在縣西三里金志樂陵縣有鬲津河南皮新志云在縣東南四十五里又東逕慶雲縣南金志無棣縣有鬲津河其故城在今縣東元分無棣於此置西無棣縣明永樂初改今名縣東南二里有卧龍岡在鬲津河中又東北逕鹽山縣東南新志云鬲津河自慶雲北入縣界又東北逕海豐縣西北此元東無棣縣也明永樂初改今名又東北入海渤海在縣東北一百五十里東南接霑化北接鹽山齊乘以濵州北士傷河為鬲津云即漢時所輔求代劉雄處今按輔代雄處為厭次津在今武定州南東漢大河之經流士傷河在濵州北蓋即唐景福後黄河所徙之道自渤海縣西北六十里東北流逕無棣縣東南六十里又東北逕馬谷小山南而東注於海者見寰宇記非輔代雄處也齊乘指此以為鬲津未審是否據許商言自鬲以北至徒駭間相去二百餘里則當在此地海豐新志云經縣西北五十里又東北入海則徒駭鬲津南北相距太狹殆非也太史馬頰覆釜三河據爾雅次序以許商言證之當在成平之南東光之北通典云馬頰覆釜在平原郡界又云安徳縣有覆釜河按平原郡即徳州治安徳所領有蓚縣寰宇記云馬頰河逕蓚縣界是也而又云篤馬河即古馬頰河人皆斥其謬然唐自有馬頰河出澶州新豐縣界東北流至平昌縣合篤馬河二水合流並得通稱以篤馬為馬頰不可謂謬謬在一古字指為九河之第三耳元和志馬頰河在安徳縣南五十里又在平昌縣南十里久視二年開決亦名新河近志平原商河陽信界中並有馬頰河皆唐之馬頰也在鬲津之南與九河無涉太史河自昔無考而明一統志云在南皮縣北北臆説滄州志又云覆釜河在慶雲縣南二十里即鈎盤北派亦不足信齊乘以為太史等河在漳南清滄二州之間庻幾得之元清州治㑹川即今青縣滄州治清池即今滄州簡絜鈎盤三河據爾雅次序以許商言證之當在東光之南鬲縣之北史記正義云簡在貝州歴亭縣界輿地廣記云簡絜在臨津金志云南皮縣有潔河按唐歴亭縣今東昌府恩縣是也簡河在此則出鬲津之南矣大謬慶雲新志以縣南篤馬河為簡河亦非臨津今寧津北與南皮接界謂簡潔在此理或有之齊乘曰滄州大連澱南至西無棣縣百餘里間有大河沙河蓋即簡潔也漢志平原有般縣韋昭曰音逋垣反師古曰爾雅説九河云鈎般郭璞以為水曲如鈎流般桓也今土俗用韋音按般縣故城在今徳平縣東北縣南二十里有盤河後漢初平二年公孫瓚破黄巾於槃河又瓚與袁紹相攻瓚引軍屯槃河即此後魏志般縣有故般河水經注云篤馬河自西平昌縣故渠川派東入般縣為般河蓋亦九河之一道也通典古鈎盤河在樂陵縣東南元和志陽信縣北四十里有鈎盤河寰宇記樂陵縣東南五十里有鈎盤河金志將陵縣有鈎盤河近志陵縣徳平樂陵商河武定海豐陽信霑化界中並有鈎盤八枝自鬲津而外此河亦有可據齊乘曰東無棣縣北有陷河闊數里疑即鈎盤河按此河自樂陵分為南北二派海豐舊志云南派在縣南名鈎盤河東經霑化縣北又東至久山鎮入海新志云北派在縣西北三十里自慶雲流入又東北經馬谷山前抵土河口入海今縣北盤河村尚以此為名蓋北派即齊乘所謂陷河也或曰陷河即篤馬河之别名許商云在九河南齊乘指此以為古鈎盤恐非然商亦就上流言之耳鬲津出鬲縣篤馬出平原鬲在平原之西北故曰孫禁所欲開者在九河南篤馬河若其下流入海處則商固未之悉也篤馬首受大河大河潰溢縱其所之遇水即合安知篤馬下流非即鈎盤之故道乎禹貢錐指蔡傳引爾雅九河六曰簡潔爾雅本作絜與簡各為一河河以一字名者李廵曰簡大也絜苦也河水多山石治之苦絜唐孔氏宋邢氏疏並同即朱子孟子集注亦曰曰簡曰絜然亦譌為潔矣至鄭康成言齊桓公塞河蓋據尚書中候春秋寳乾圖之文云爾蔡傳駮之謂曲防齊所禁塞河宜非桓公所為亦是尋好話頭其實葵丘五命特以約束諸侯躬自犯者多矣奚有於河唯于欽齊乘曰河至大陸趨海勢大土平自播為九禹因而疏之非禹鑿之而為九也禹後歴商周至齊桓時千五百餘年支流漸絶經流獨行其勢必然非桓公塞八流以自廣也論最確予因思齊桓公卒於襄王九年戊寅至定王五年已未甫四十二年而周譜云定王五年河徙水經注周定王五年河徙故瀆蓋下流既壅水行不快上流乃決理所宜然河之患始此矣善乎朱子有言禹治水只是從低處下手下面之水盡殺則上面之水漸平得之矣閻若璩釋地餘論行水金鑑巻四
