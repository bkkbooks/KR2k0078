body:
  text: 行水金鑑巻五江南按察使傅澤洪撰河水漳水自南宫縣故城西又北過堂陽縣西水經衡水自堰分為二水其一水北出逕縣故城西其右水東北注出石門謂之長蘆水蓋變引葭之名也酈注步元和志堂陽縣長蘆水亦謂之堂水在縣南二百縣因取名堂陽今為新河縣其故城在南宫縣西北衡水即漳水又元和志長蘆水在衡水縣南二百步又東北過扶栁縣北又東北過信都縣西水經衡水又北逕昌成縣故城西又逕西梁縣故城東衡漳又東北逕桃縣故城北合斯洨故瀆斯洨水又東入衡水衡水又北為袁譚渡酈注州扶栁縣故城在今冀西南信都縣即真定府冀州昌成縣故城在冀州西北西梁縣故城在扶栁故城西北五十里桃縣故城在冀州西北元和志信都縣衡水亦曰長蘆水即濁漳水之下流也西北去縣六十二里寰宇記長蘆枯溝在州西二里漳水在州西北六十里又東北過下博縣之西水經衡水又北逕鄔縣故城東又右逕下博縣故城西衡漳又東北歴下博城西逶迤東北注謂之九争西逕樂鄉縣故城南又東引葭水注之酈注束鄔縣故城在今鹿縣東接深州界元和志衡漳水在鹿城縣南下博故城在深州南元和志長蘆橋在下博縣南架長蘆水樂鄉故城在深州東北引葭即長蘆也自此以下衡漳與長蘆互受通稱又東北過阜城縣北又東北至昌亭與雽池河㑹水經漳水又東北逕武邑郡南又東逕武强縣北又東北逕武隧縣故城南白馬河注之水上承雽池東逕樂鄉縣北饒陽縣南又東北右合張平口故溝上承武强淵淵之側有武强縣故治衡漳又東南逕武邑郡北而東入衡水謂之交津口衡漳又東逕武邑縣故城北又逕東昌縣故城北經所謂昌亭也又東北左㑹雽池即沱故瀆謂之合口酈注縣此阜城當在今武邑界今水經滹沱河源出山西繁峙縣東北三十里泰戲山歴代州崞縣忻州定襄五臺盂縣北入真定府平山縣界逕靈夀縣至真定府城南逕晉州過保定府境束鹿縣南三十里達扵深州至阜城縣沙水入焉沙河在沙河縣治南逕廣平府城五十里下達雞澤縣界洺水入之洺河原在遼州太行山至武安縣柏林里伏流至洛逺里復出東逕廣平府城北三十五里至雞澤縣界入扵沙河沙河又逕鉅鹿隆平二縣至寧晉縣滙為大陸澤過冀州境西北三十五里至武邑縣北界二十里為夾河逕阜城縣西北為胡盧河即衡漳之别名也入於滹沱河元和志武邑縣長蘆水北去縣三十二里武强故城在武强縣西南二十五里今縣南冇武强故城二一魏置一西晉置寰宇記衡漳在武强縣南五里元和志武隧故城在武强縣東三十一里武邑故城當在今武邑縣界縣志云漳河在縣西北二十里樂鄉縣廢即今深州地饒陽縣今真定府属縣東昌廢縣在今武邑縣東又東北至樂成陵縣别出北水經衡漳於縣無别出之瀆縣北者乃雽池别水分雽池故瀆之所纒絡也衡漳又東逕弓髙縣故城北又東北右合柏梁溠水又東北右㑹桑杜溝東南通清河西北達衡水春秋雨汎漳澤津渚今觀津城北方二十里盡為澤藪蓋水所鍾也又東逕董仲舒廟南又東逕修市縣故城北地理風俗記曰循縣西北有修市城故縣也又東㑹從陂陂水南北十里東西六十步子午潭漲淵而不流亦謂之桑杜淵從陂南出夾堤東派逕循縣故城北東合清漳漳汎則北注澤盛則南播津流上下互相逕道從陂北出東北分為二川北逕弓髙城西而北注柏梁溠一川東逕弓髙城南又東北陽津溝水出焉左瀆北入衡漳謂之陽決口衡水東逕阜城縣故城北樂成縣故城南酈注即樂成今河間府獻縣境陵縣今山東濟南府属弓髙見前修市故城在今缺循縣即今缺觀冿在武邑縣東南阜城故城在今縣東二十二里樂成故城在今獻縣東南又東北過成平縣南水經衡漳又東逕建成縣故城南成平縣故城在北又東右㑹楊津溝溝水又東北逕建成縣左入衡水謂之楊津口衡漳又東左㑹滹沱别河故瀆又東北入凊河謂之合口酈注漢建成成平二故城並在今交河縣東志成平縣有滹沱河民曰徒駭河又樂成縣滹沱别水首受滹沱河東至東光入滹沱河此滹沱河即漳水古之徒駭也滹沱别河故凟即滹沱别水自樂成來者志云至東光入滹沱河蓋與成平接界處也河水篇曰大河故瀆東北至東光縣故城西而北與漳水合是也縣界清河本西漢大河之經流王莽時河徙清河由此北㑹漳水故酈元云清漳二瀆河之舊道也合口在今青縣南二里接凔州界又東北濊水出焉又東北過章武縣西又東北過平舒縣南東入海水經清漳自章武縣故城西枝瀆出焉謂之濊水東北逕參户亭北又逕東平舒縣故城南又東北分為二水一水右出為澱一水北注滹沱謂之濊口清漳亂流而東入於海酈注州章武漢属勃海郡唐為魯城縣在滄北一百里東平舒故城在今大城縣界淇水篇云清河自濊邑北又東北至泉州縣北入滹沱又東逕漂榆邑故城南入於海今静海縣本漢章武平舒二縣地縣北有漂榆城清漳合流經此入海寰宇記云御河自乾寧軍東北九十里入潮河合流向東七十里於獨流口入海潮河即界河也縣東北九十里有小直沽天津衛設焉本漢章武縣地元為静海縣之海賔鎮明永樂二年築城置衛冇本朝改衛為鎮小直沽即古沽水後魏志章武縣沽水水經云沽水東南至泉州縣與清河合東入於海是也泉州今為實坻漷縣地小直沽受南北諸水東逕天津城北又東南合大直沽而東注於海漢志所云河水東北至章武入海者也海即勃海元和志云在魯城縣東九十里今在静海縣東北一百五十里南接凔州折而東北接寳坻縣界禹貢之逆河後世則為勃海亦謂之海也南參户漢縣兼得章武地宋為乾寧軍今為青縣縣冇參户故城即酈注所謂參户亭也元和志云一名木門城在長蘆縣西北四十里青縣新志云濊水東北流逕天津鎮東南十里為大直沽地勢平衍羣流漲溢茫無涯涘故得厥稱長蘆縣即今縣南七十里衛河西岸之長蘆鎮也以今輿地言之漳水自鉅鹿又北歴南宫新河冀州並属直𨽻真定府束鹿属保定府深州衡水武邑武强並属真定府阜城獻縣交河青縣静海並属河間府大城寳坻並属順天府至天津鎮属河間府注於勃海即古徒駭河之故道也撰水經者不知漳水即徒駭而以王莽河為禹河故云大河故瀆東北逕元城縣西北沙丘堰至於大陸北播為九河按漢元城縣故城在今大名府元城縣東沙麓之側沙丘堰北去鉅鹿尚百餘里謂播為九河自此始與經自大陸又北之文不合唐人疑鉅鹿廣阿東去平原太逺故又以深州之陸澤當禹貢之大陸然自陸澤以東南距鬲縣可三百里禹河亦必不至此始分為鬲津而南入鬲縣也且古之九河並東北出至章武髙城栁縣之東髙城縣故城在今鹽山縣南栁縣故城在縣東合為逆河至碣石入海及周定王時河徙自東光南皮浮陽絶八枝而北合徒駭漢人指此為逆河是九河之所同故王莽改勃海郡曰迎河郡南皮縣曰迎河亭而其實非也以意度之徒駭大勢北行亦迤東八枝太史最北宜最短向南則漸加長鬲津最南最長首受大河當在南宫縣界也要之九河所在後人率多附㑹其名為某河者未必即古之九河不名為某河者又未必非古之九河如濊水浮水無棣冓篤馬河之類馮逡云九河今既滅難明班固云自兹距漢北亡八枝酈道元云城地並存川瀆多亡斯為實録無事深求近志雜亂者勿論即如孔頴達于欽準許商三河以為言亦未可盡信禹貢錐指黄河自鞏洛以東已出險就平大伾以北地勢益廣衍大陸則又鍾水之區也乘建瓴之勢注沮洳之鄉奔騰横溢必不能免禹因而疏之順其性之所便從其地之所近而九河以名此在洚洞之際最為當機而扼要也計初時氾濫乍平九河必勢均力敵既而横流益殺更復冬春消減九河之或盈或涸或通或湮亦理所必有歴時既久後人但見安瀾之效而忘其弭患之功遂置九河於度外壅遏逾逺淫潦乘之河於是起而發大難之端矣凡九河之壊也非一朝一夕之故則九河之興也抑豈僅一手一足之烈哉故曰神禹顧祖禹川瀆異同余嘗往來燕齊西道河間東履清滄熟訪九河故道蓋昔北流衡漳注之河既東徙漳自入海北流之漳古徒駭河歟踰漳而南清滄二州之間有古河隄岸數重地皆沮洳沙鹵太史等河當在其地滄州之南有大連澱西踰東光東至海此非胡蘇河歟澱南至西無棣縣百餘里間冇曰大河曰沙河皆瀕古隄縣北地名八㑹口縣城南枕無棣溝兹非簡潔等河歟東無棣縣北有陷河闊數里西通徳棣東至海兹非所謂鈎盤河歟濵州北有士傷河西踰徳棣東至海兹非鬲津河歟士傷河最南比他河差狹是為鬲津無疑也此本夏彛仲之言蔡氏集傳乃曰自漢以來講求九河皆無依據祖王横之言引碣石為證謂九河已淪於海余按禹貢文北過降水至於大陸又北播為九河同為逆河入於海大陸在邢趙深三州之地爾雅之廣河澤也去海岸已數百里又東至海中始叙九河則大陸與九河相離千里如是之逺而絶無表志不合禹貢之文其不可信一也王横謂海溢出浸數百里而青兖營平郡邑不聞有漂没之處而獨浸九河其不可信二也今平原迤北清滄之間雖為樹藝城邑相望而地形河勢髙隠曲折往往可尋但禹初為九厥後或三或五遷變多寡不同必欲按名而索故致後儒紛紛之論蘇轍疏黄河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理河不兩行真千古名言而禹却疏之為九或曰禹第穿成九道聽河自行其一耳此妄談豈有禹輕百姓力一至此者惟禹貢合注頗得其解夏氏引桓譚新論曰河水濁一石水六斗泥而民競引河溉田令河不通利至三月桃花水至則決以其噎不泄也可禁民勿復引河夫引河且不可况分為九乎然則禹之導為九河也何居蓋河不可分謂其上流耳若入海之處泄之愈速則河愈通利又何害哉今九河之下即為逆河殆謂自此而下即海潮逆入矣蓋名雖為河其實即海也海水内吞九河外灌不惟藉水力以刷沙而海之潮汐亦藉河力以敵之禹之以水治水所為不可及也又曰要以入海之所固宜分疏之使速泄下流速泄則上流不壅河之利也若未及於海則流分力弱無以刷沙適壅之矣故曰河不兩行兩行且不可况九河歟閻若璩四書釋地續同為逆河入於海禹貢同合為一大河名逆河而入於勃海孔氏傳康成云下尾合名為逆河言相迎受王肅云同逆一大河納之於海其意與孔同孔氏疏逆河者既分為九又合為一以一迎八而入於海即渤海也蘇文忠公集逆迎也河分復合以注於海迎為所所受之也河入海處舊在平州石城縣東望碣石漢武帝時河徙從頓丘南東流入渤海其後大風逆河故處皆漸於海舊道堙矣薛季宣書古文訓城石城縣唐初析平州盧龍縣地置其故在今直𨽻永平府灤州南三十里逆河世謂之渤海者也逆河之地比九河又特窪下故九水傾注焉雖其兩旁當有涯岸其實已與海水相合不止望洋向若而已程大昌禹貢論禹河自碣石入海此不言已見也逆河碣石今皆淪於海尚書説禹時河入海蓋在碣石地理志碣石在北平驪城縣西南計渤海北距碣石五百餘里而河入渤海蓋漢元光三年河徙東郡所更注也而言禹時河入勃海何哉困學記聞衛閻百詩云按齊都賦旁出為勃不獨今天津之海名勃碣石之海亦名勃或曰亦别有證乎予曰莫妙扵太史公天官書中國山川東北流其維首在隴蜀尾沒於勃碣班固増其文曰尾沒於勃海碣石益明顯矣碣石之東為滄溟經之所謂海也其西則逆河後世謂之勃海河渠書曰同為逆河入於勃海溝洫志同蓋漢人以勃海為海而不知其為逆河遂謂逆河在南皮浮陽河自章武入海不至碣石矣章武漢屬勃海郡郡治浮陽即今之滄州故孔疏云郡北距碣石五百餘里寰宇記滄州東北至平州五百里河入海處逺在碣石之南禹行碣石不得入河蓋逺行通水之處北盡冀州之境然後南迴入河而逆上也近世學者皆宗其説斥瓚道元之謬是何也碣石在盧龍縣南二十三里離海七八十里而河欲至此入海則必自今天津北行歴寳坻界轉東自豐潤逕灤州廢石城縣南又東過盧龍縣南而南入於海取道迂逺地勢益髙無是理也宋人憂河尾入契丹界蘇子由曰契丹之水皆南注於海地形北髙河無北徙之道故據導河無碣石之文以為河不至碣石入海是殆未有以蘇薛程黄之解示之者也誠知勃海即逆河而碣石負海當逆河之衝則紛紛諸説不攻而自破矣漢志云河自羌中積石山東北至章武入海過郡十六按水經注黎陽以上河水所過冇金城天水武威安定北地朔方五原雲中定襄雁門西河上郡河東馮翊河南河内凡十六郡黎陽以下大河故凟所過有魏郡東郡清河平原信都勃海又六郡共二十二郡而班固云過郡十六殊不可曉今攷禹河所過有魏郡廣平鉅鹿信都勃海而無東郡清河平原過郡凡二十一也行九千四百里以經言之河乃自章武東出為逆河逕驪城至絫縣碣石山入海又過郡二右北平遼西并上二十一為過郡二十三行二百餘里也自禹告成之年下逮東周齊桓公之世九河亡其八枝後數十歳為定王五年已未當魯宣公之七年而河遂東徙凡一千六百六十餘歳地理志勃海郡莽曰迎河南皮縣莽曰迎河亭溝洫志亦云同為迎河入於勃海迎河即逆河説者謂莽多忌諱改逆曰迎也寰宇記云迎河在清池縣西南二十三里從南皮來清池即浮陽余初不解逆河何以在此地求之數月始得其故水經淇水注云清河自東光縣西又東北右㑹大河故瀆又東北逕南皮縣故城西又北逕浮陽縣故城西又東北滹沱别瀆注焉漳水注云衡漳自成平縣南又東左㑹滹沱别河故瀆又東北入清河謂之合口蓋莽時大河南徙清河自東光縣西行其故瀆歴南皮浮陽至成平與漳水合水經東漢時作故指為清河實西漢大河之經流也漢人以九河播自元城之沙丘堰東北至南皮浮陽縣西仍歸大河是謂同為逆河云爾不知禹河自成平東逕二縣之北未嘗由東光而北歴其西九河下尾東北出抵髙城栁縣章武之東同合為一大河以入海南北廣二百餘里東西長三三百里占地甚多非逆河縱而九河横東流至二縣之西為逆河所截而各注之也總之大伾以東漢人不詳禹河之所經而以北瀆為禹河禹河一差則降水大陸九河逆河無所不差矣逆河以班志言之似為横絶之河而鄭王以為迎受之河其義較長然終不能指言逆河在某地至東坡始云逆河即勃海薛士龍又因王横之言更定其義云逆河皆漸於海而後經旨乃大明與鄭王之義亦甚協也河之播而為九也勢至此不得不分非禹有意分之也其同為逆河也勢至此不得不合非禹有意合之也所以名逆者鄭義盡之自漢人以勃海為海而逆河無所容其地唐人亦不明逆河在何處徐堅初學記曰逆迎也言海口有朝夕潮以迎河水此義最優至宋而謬論迭出貽惑滋甚林氏曰王介甫謂逆河者逆設之河非並時分流也其意以同為逆河句釋上文播為九河之義如此則逆河即是九河矣羅泌曰聖人於冀衮間逆設為河以防暴至之患未至則不妨民耕既至則不墮民舍程珌曰禹因地之形而逆設為九河凡河之道則不建都邑不為聚落不耕不牧故謂之逆河董鼎曰格言云逆河是開渠通海以泄河之溢秋冬則涸春夏則泄此皆踵介甫之謬以九河為逆河而縁飾其辭也陳師道曰逆河者為潮水所逆行千餘里邉海又有潮河自西山來經塘泊按潮河一名界河在今静海縣西北受滹沱易巨馬三水巨馬即淶水合御河東至獨流口入海此河在直沽口西亦不得指為逆河明丘文莊濬又言當於直沽入海之後依禹貢逆河法截斷河流横開長河一帶収其流而分其水以逆河為横絶之河承西漢之誤以上諸説總由不知勃海即逆河而求逆河於勃海之外遂愈求愈逺耳太史公天官書曰中國山川東北流其維首在隴蜀尾沒於勃碣漢書天文志云勃海碣石一行言山河兩戒以河濟為北紀江淮為南紀由此觀之禹河從勃碣入海上應天文下協地理漢武帝所謂聖人作事為萬世功通於神明恐難改更者也殷本紀載湯誥之言曰東為江北為濟西為河南為淮四瀆已修萬民乃有居四瀆之由來尚矣爾雅江河淮濟為四瀆四瀆者發源注海者也劉熙釋名曰瀆獨也各獨出其所而入海也自王莽時河徙從千乘入海而北去碣石逺矣然猶未離乎勃海也自金明昌中河徙而河半不入勃海矣元至正中又徙而河全不入勃海矣河南之濟久枯河或行其故道今又與淮渾濤而入海淮不得擅瀆之名四瀆亡其二矣世習為固然恬不知怪愚嘗為杞人之憂萬一清口不利海口愈塞加之以淫潦而河淮上流一時並決挾阜陵洪澤諸湖衝蕩髙堰人力倉卒不能支勢必決入山鹽髙寳諸湖明隆慶四年萬歴三年淮挾湖水以東兩決於髙堰山陽髙寳興鹽諸境悉為巨浸而淮南海口沙壅更甚於曩時怒不得泄則又必奪邗溝之路直趨𤓰洲南注於江至通州入海四瀆并為一瀆拂天地之經奸南北之紀可不懼與欲絶此患莫如復禹舊迹然河之南徙日以逺矣濬滑汲胙之間無河新鄉獲嘉亦無河矣賈讓李垂之策將安所用之或曰金烏蘓克錫克請於新鄉縣西決河水使東北合清河至清州栁口入海其説不可行乎曰今新鄉流絶欲自武陟之東濬其故道約一百三四十里更於新鄉縣西決河使東北流鑿生地五十餘里勞費不訾民何以堪且滎陽以下毎決必潰右隄未聞有決左隄而北者疑此地北髙南下新鄉縣西之故道去清河雖近未必能導之使北也然則河竟將若何曰封丘以東地勢南髙而北下河之北行其性也徒以有害於運故遏之使不得北而南入於淮南行非河之本性東衝西決卒無寧歳故吾謂元明之治運得漢之下策而治河則無策何也以其隨時補苴意在運而不在河也設㑹通有時而不用則河可以北先期戒民凡田廬冢墓當水之衝者悉遷於他所官給其費且振業之兩岸之隄増卑倍薄更於低處創立遥隄使暴水至得左右游波寛緩而不廹諸事已畢然後縱河所之決金龍注張秋而東北由大清河入於勃海殊不煩人力也蓋禹河本有可復之機一失之於元封再失之於永平三失之於熙寧至明昌以後事無可為居今日而規復禹河是猶坐談龍肉終不得飽也河之離舊愈逺則反本愈難但得東北流入勃海天文地理兩不相悖而河無注江之患斯亦足矣求如西漢之河不可得即如宋之北流亦不可得而况降水大陸之區也嗚呼禹河其不復矣乎禹貢錐指夏書曰禹抑鴻水十三年過家不入門陸行載車水行載舟泥行蹈毳山行即橋以别九州隨山浚川任土作貢通九道陂九澤度九山然河葘衍溢害中國也尤甚唯是為務故道河自積石歴龍門南到華隂東下砥柱及孟津雒汭至於大伾於是禹以為河所從來者髙水湍悍難以行平地數為敗乃厮二渠以引其河索隠曰厮漢書作灑史記舊本亦作灑字從水按韋昭云疏決為灑字音疏跬反厮即分其流泄其怒是也二渠其一則漯川其二王莽時遂空也北載之髙地過降水至於大陸播為九河同為逆河入於勃海瓉曰禹貢曰夾右碣石入於河口之入海乃在碣石武帝然則光二年河徙東郡更注勃海禹時不注勃海也十史記河渠書浚同濬説文濬深通川也書堯典封有二山濬川是也書言濬川總言之也孟子言疏㵸決排分言之也今之治水者但知有隄築之能而已浚則安能陂説文阪也一曰池也禹貢九澤既陂四海㑹同言治水功成也風俗通義曰陂者繁也言因下鍾水以繁利萬物也今陂皆以溉灌夫中古之陂以溉灌也勝國之陂以濟運也後人不知此義凡遇陂湖水櫃之處盡請陞科以致水無瀦蓄潦則淹沒民田旱則漕船阻滯嗟乎陞科者徒知聚歛耳富國耳而不知適所以病國且困民也詳見畧例禹無釃渠之事亦見畧例釃二渠引河北載之髙地過降水至於大陸此説不然據經但言東過洛汭至於大伾北過降水至於大陸初未嘗有二渠之説况禹之治水欲使水由地中行自髙而決之於下流者也今乃謂載之髙無是理也據經之所載既無二渠之説則太史公何據而為此言太史公嘗曰九州山川尚書近之矣至於言河流則不知取正於書而自為此説何也意者太史公未嘗得真孔氏古文書其所傳本或有異矣今當以孔氏本為正尚書全解釃釃當作灑今本漢書作傳冩之訛太史公班孟堅謂禹釃二渠以引其河一貝丘一漯川李垂導河書曰東為漯川者乃今泉源赤河北出貝丘者乃今王莽故瀆而漢塞宣房所行二渠蓋獨漯川其一則漢決之起觀城入蒲臺所謂武河者也鼂補之河議曰二渠於禹貢無見王應麟困學記聞河渠書曰厮為二渠復禹舊跡是以二渠出於禹也及考之禹跡河自龍門至於大陸皆為一流至秦河決魏都始有二流子長蓋誤指秦時所决之渠以為禹跡也張燧千百年眼二禹貢原無分渠之説林氏所見極是注云渠其一出貝丘其一則漯川也然史漢皆言引河不言引漯何得遽以漯川實之盖周定王五年河徙自宿胥口東行漯川太史公遂錯認為禹之故迹班氏從而附㑹之注家既知二渠一為漯川而又不能明正其非均失之矣周定王五年河徙周譜洫見漢耆溝志蔡傳周定王五年河徙砱礫砱礫不知在何處按溝洫志賈讓治河奏有滎陽漕渠如淳曰今礫谿口是也師古曰礫谿谿名即水經所云泲水東過礫谿者阿誰讀誤本漢書以今為令又加石作砱殊足使人噴飯即以礫谿言之水經濟水東至北礫谿南東出過滎陽縣北又東句南礫谿水注之道元云水出滎陽城西南李澤澤中有水即古馮池地理志曰滎陽縣馮池在西南是也東北流歴敖山南逕虢亭北又東北過滎陽縣北斷山東北注於濟世謂之礫石澗即經所謂礫谿矣礫谿口即南礫谿水入濟處也古之決口皆在大伾之東金元時所決漸西至明天順中河自武陟徙入原武而獲嘉之流遂絶變斯極矣滎陽今為滎澤縣與獲嘉相對周時河徙寧遽在此邪唯漢平帝世河浸汴濟謂徙從礫谿口則可然亦無砱礫之名也此説當必有所本頃閲王伯厚河渠考引程氏曰周時河徙砱礫至漢又改向頓丘東南流程氏疑即大昌及檢禹貢論其第十一篇有云周定王五年河徙故瀆漢元光三年河水徙從頓丘東南流入勃海却無砱礫字又圖説莨蕩渠口辨引如淳注亦作今礫谿口不作砱礫則二字明係杜撰絶無根據誕妄乖謬莫甚於此而學者宗之以王伯厚之淹博亦不能正其失而且累及於程氏地理之學談何容易禹貢錐指周威烈王十三年晉河岸傾壅龍門至於厎柱大事記春秋時河患見史傳始於此困學記聞行水金鑑巻五
