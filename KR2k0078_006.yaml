body:
  text: 行水金鑑卷六江南按察使傅澤洪撰河水秦始皇帝八年河魚大上史記秦本紀平索隱曰謂河水溢魚大上地亦言遭水害也秦始皇帝二十二年王賁攻魏引河溝灌大梁大梁城壞史記秦本紀河溝者鴻溝也即漢志所謂狼湯渠據水經注隂溝本蒗蕩渠在浚儀縣北自王賁斷故渠引水東南出以灌大梁謂之梁溝於是水出縣南而不徑其北遂目梁溝為蒗蕩渠亦曰鴻溝浚儀故縣在今開封府西北即大梁城魏所都也自智伯引汾水以灌晉陽世皆知水之可以亡人國蘇代云秦正告魏曰決滎口魏無大梁其後王賁竟用之以滅魏按滎口水即職方之滎川後世亦謂之濟水水經注濟水自陽武縣故城南又南徑封丘縣南又東徑大梁城北故亦可決之以灌也賁所引是蒗蕩渠非滎瀆然水不同而其地則總在大梁之北王橫曰秦攻魏決河灌其都決處遂大不可復補宜郤徙完平處更開空使緣西山足乘髙地而東北入海乃無水災則似謂賁所引者大河之經流蓋蘇代述秦告魏又云決白馬之口魏無黃濟陽決宿胥之口魏無虛頓丘二口一在白馬一在黎陽王橫以是謂賁所引者在此間決處即白馬口西山足即宿胥口也然史記明言引河溝則非大河之經流亦審矣水經注云河水舊於白馬縣決通濮濟黃溝故蘇代説燕曰決白馬之口魏無黃濟陽竹書紀年梁惠成王十二年楚師決河水以水長垣之外者也按黃即外黃外黃城在今杞縣東北六十里濟陽城在今蘭陽縣東五十里去魏都尚逺且蘇代所稱皆秦恐喝之辭未嘗實見諸行事白馬之口楚決非秦決也漢書敘傳曰秦決南涯如淳注云秦決河灌大梁遂滅之通為溝入淮泗皆承橫之誤近世河徙經開封城北宋端平元年蒙古決寸金淀灌趙葵軍淀在城北二十餘里明崇禎十五年賊決朱家寨隄以灌城寨在城西北十七里即古大梁城之北其所引者皆大河之經流也與王賁地同而水異嗚呼不仁者之作俑禍及萬世而未有艾痛哉禹貢錐指漢文帝十二年冬十二月河決東郡漢書文帝本紀書史記河渠書漢溝洫志皆云漢興三十有九年文帝時河決酸棗東潰金隄當為文帝之前十六年也而本紀則曰十二年或是志書之誤當云漢興三十有五年也漢武帝建元三年春河水溢於平原漢書武帝本紀漢興三十九年孝文時河決酸棗東潰金隄正義曰括地志云金隄一名千里隄在白馬縣東五里於是東郡大興卒塞之其後四十有餘年今天子元光之中而河決於瓠子東南注巨野正義曰括地志云鄆州巨野縣東北大澤是通於淮泗於是天子使汲黯鄭當時興人徒塞之輒復壞是時武安侯田蚡為丞相其奉邑食鄃索隱曰鄃音輸韋昭云清河縣也鄃居河北河決而南則鄃無水災邑收多蚡言於上曰江河之決皆天事未易以人力為強塞塞之未必應天而望氣用數者亦以為然於是天子久之不事復塞也史記河渠書河決觀徐廣曰觀縣名屬東郡梁楚之地固巳數困而緣河之郡隄塞河輒決壞費不可勝計史記平準書武河決東郡之觀縣當在帝時漢書地理志東郡有畔觀縣也縣在今東昌府觀城縣界漢武帝元光三年春河水徙從頓丘東南流入勃海師古曰頓丘丘名因以為縣本衛地地理志屬東郡今則在魏州界也夏五月河決濮陽汜郡十六師古曰濮陽東郡之縣也水所泛凡十六郡界發卒十萬救決河起龍淵宫漢書武帝本紀東通鑑考異曰武紀云東南流入勃海按頓丘屬郡勃海乃在頓丘東北恐誤因刪去入勃海三字蓋誤以東南二字屬下讀也河水徙從頓丘東南是一句元光三年河水決濮陽瓠子溝洫志言之甚詳而頓丘之決口及入海處與中間經過之地皆不可得聞今以水經注考之北瀆初經頓丘縣西北至是改流蓋自戚城西決而東北過其縣東南歷畔觀至東武陽奪漯川之道東北至千乘入海者也漯川狹小不能容故其夏又自長夀津溢而東以決於濮陽則東南注巨野通淮泗而北瀆之流微漯川之水涸矣及武帝塞宣房道河北行二渠則正流全歸北瀆餘波仍為漯川頓丘之決口不勞而塞故志略之程大昌以為元光以後河竟行頓丘東南非也漢世河兩決瓠子一塞於武帝再塞於王延世河自是不復決而南輒泛溢入平原濟南千乘駸駸乎有向東之勢矣禹貢錐指自河決瓠子後二十餘嵗嵗因以數不登而梁楚之地尤甚天子既封禪巡祭山川其明年旱乾封少雨天子乃使汲仁郭昌發卒數萬人塞瓠子決於是天子已用事萬里沙正義曰括地志云萬里沙在華州接縣東北二十里則還自臨決河沈白馬玉璧於河令羣臣從官自將軍已下皆負薪置決河是時東流漢書無流字郡燒草以故薪柴少而下淇園之竹以為楗如淳曰樹竹塞水決之口稍稍布插接樹之水稍弱補令密謂之楗以草塞其裏乃以土填之有石以石為之天子既臨河決悼功之不成乃作歌曰瓠子決兮將奈何皓皓旰旰兮閭殫為河殫為河兮地不得寧功無已時兮吾山平吾山平兮巨野溢魚沸鬱兮柏徐廣曰柏猶迫也冬日延徐廣曰延作正道弛兮離常流蛟龍騁兮方逺遊歸舊川兮神哉沛不封禪兮安知外為我謂河伯兮何不仁泛濫不止兮愁吾人齧桑浮兮淮泗滿久不反兮水維緩一曰河水湯湯兮激潺湲北渡迂兮浚流難搴長茭兮沉美玉河伯許兮薪不屬薪不屬兮衛人罪師古曰東郡本衛地故言此衛人之罪也燒蕭條兮噫乎何以禦水頽林竹兮楗石災宣房塞兮萬福來於是卒塞瓠子築宫其上名曰宣房宫而道河北行二渠復禹舊迹而梁楚之地復寧無水災史記河渠書蓋記云四十有餘年漢書作三十六嵗自文帝十二年癸酉至武帝元光三年已酉是三十六年也金隄在今開州界漢武帝填河告神玉册文云洚水為災河決瓠子墮損城隍漂殘民物皇帝欽聞乃齊心罪己減膳避殿命駕臨河以閲災變遂刑牲沉璧以告陽侯曰朕聞天一生水潤下為德澤及草木以滋百穀淮海安流帆檣和濟汪洋之德功侔天地何乃逆流洶湧橫溢為眚淹流我田廬漂流我黎庶遂致平疇渥野化作鯨波使我農氓廢耕爰損百穀朕之不德上干天和今乃責躬罪己修德肆赦少邀天眷乃敕司農出金司空調役下淇園之竹以為楗沉嵩陽之石以為基必使金隄永固玉海安瀾神維有靈鑒觀不爽闕古玉圖譜漢武帝元封二年夏四月祠太山至瓠子臨決河服虔曰瓠子隄名在東郡白馬蘇林曰在鄄城以南濮陽以北廣百步深五丈命從臣將軍以下皆負薪塞河隄作瓠子之歌漢書武帝本紀縣水經瓠子河出東郡濮陽北河注縣北十里即瓠子河也濮陽即今東昌府濮州白馬在今延津縣界瓠子河決有蛟龍從九子自決中逆上入河濆沫流波凡數十里西京雜記瓠子在雷澤黃河故道今呼為沙河沙河西北其口猶存土人謂之瓠岡也陳師道後山叢談是時方事胸奴興功利言便宜者甚衆齊人延年上書師古曰史不得其姓言河出昆侖經中國注勃海是其地藝西北髙而東南下也可案圖書觀地形令水工準高下開大河上領出之胡中東注之海如此關東長無水災北邊不憂胸奴可以省隄防備塞士卒轉輸胡寇侵盜覆軍殺將暴骨原野之患天下常備胸奴而不憂百越者以其水絶壤斷也此功一成萬世大利書奏上壯之報曰延年計議甚深然河乃大禹之所道也聖人作事為萬世功通於神明恐難改更自塞宣房後河復北決於館陶分為屯氏河師古曰屯音大門反而隋室分析州縣誤以為毛氏河乃置毛州失之甚矣東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兖州以南六郡無水憂漢書溝洫志于闐之西水皆西流注西海其東水東流注鹽澤索隱曰鹽水也太康地記云河北得水為河塞外得水為海也里正義曰漢書云鹽澤玉門關三百餘里廣袤三四百其水皆潛行地下南出於積石山為中國河括地志云蒲昌海一名泑澤一名鹽澤一名輔日海一名穿蘭亦名臨海在沙州西南玉門關在沙州夀昌縣西六里鹽澤潛行地下其南則河源出焉索隱曰案漢書西南夷傳云河有兩源一出蔥嶺山一出于闐山海經云河出崑崙東北隅郭璞云河出崑崙潛行地下至蔥嶺山于闐國復分流岐出合而東注泑澤已而復行積石為中國河泑澤即鹽澤也一名蒲昌海西域傳云于闐州南山下與郭璞注山海經不同廣志云蒲昌海在蒲類海東也多玉石河注中國而樓蘭姑師邑有城郭臨鹽澤鹽澤去長安可五千里漢使窮河源河源出于闐其山多玉石采來天子案古圖書名河所出山曰昆侖云史記大宛傳禹本紀言河出昆侖髙二千五百餘里日月所相避隱為光明也自張騫使大夏之後窮河源惡睹所謂昆侖者故言九州山川尚書近之矣至禹本紀山經所有放哉漢書張騫傳贊信注云放蕩迂濶不可也張騫及後使者皆未嘗指于闐之山為昆侖武帝自案古圖書以名之耳故史云惡覩禹貢錐指胸奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢厄以玉門陽關西則限以蔥嶺其南山東出金城與漢南山屬焉其河有兩源一出蔥嶺一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤者也漢書西域傳在水經崑崙墟西北去嵩高五萬里地之中也其高萬一千里河水出其東北陬屈從其東南流入於勃海又南入蔥嶺山又西徑罽賔國北又西徑月氐國南又西徑安息南河水與霓羅跂禘水同注雷翥海又西徑四大塔北又西徑陀衛國北河水又東徑皮山國北又東與于闐河合南河又東徑于闐北又東北徑扜彌國北又東徑且末國北北河又東北流分為二水枝流出焉北河自疏勒流徑南河之北又東徑莎車國南又東南徑溫宿國又東徑姑墨國南又東徑注賔城南又東徑樓蘭城南又東注於泑澤即經所謂蒲昌海也水積鄯善之東北龍城之西南龍城故大國地方千里皆為鹽而剛堅故蒲昌亦有鹽澤之稱其中洄湍電轉為隱淪之脈即河水之所潛而出於積石也宣帝地節中光祿大夫郭昌使行河北曲三所水流之藝皆邪直貝丘縣師古曰直當也恐水盛隄防不能禁乃各更穿渠直東經東郡界中不令北曲渠通利百姓安之元帝永光五年河決清河靈鳴犢口師古曰清河之靈縣鳴犢河口也而屯氏河絶成帝初清河都尉馮逡奏言郡承河下流與兖州東郡分水為界城郭所居尤卑下土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙增隄防終不能泄如有霖雨旬日不齊必盈溢靈鳴犢口在清河東界所在處下雖令通利猶不能為魏郡清河減損水害禹非不愛民力以地形有藝故穿九河今既滅難明屯氏河不流行七十餘年新絶未久其處易浚劉奉世曰河不流行不字宜為水字或衍不字又其口所居高於以分流殺水力道里便宜可復浚以助大河泄暴水備非常又地節時郭昌穿直渠後三嵗河水更從故第二曲間北可六里復南合今其曲藝復邪直貝丘百姓寒心宜復穿渠東行不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白博士許商治尚書善為算能度功用師古曰白謂白於天子也遣行視以屯氏河盈溢所為方用度不足可且勿浚後三嵗河果決於館陶及東郡金隄泛濫兖豫入平原千乘濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所御史大夫尹忠對方略疏濶上切責之忠自殺遣大司農非調師古曰大司農名非調也調均錢穀河決所灌之郡謁者二人發河南以東漕船五百㮴師古曰一船為一㮴徙民避水居丘陵九萬七千餘口河隄使者王延世使塞華陽國志云延世字長叔犍為資中人以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成上曰東郡河決流漂二州校尉延世隄防三旬立塞其以五年為河平元年卒治河者為著外繇六月師古曰以卒治河有勞雖執役日近皆得比繇戍六月也著謂著於簿籍惟延世長於計策功費約省用力日寡朕甚嘉之其以延世為光祿大夫秩中二千石賜爵關內侯黃金百斤後二嵗河復決平原流入濟南千乘所壞敗者半建始時復遣王延世治之杜欽説大將軍王鳳以為前河決丞相史楊焉言延世受焉術以塞之蔽不肯見今獨任延世延世見前塞之易恐其慮害不深又審如焉言延世之巧反不如焉且水藝各異不博議利害而任一人如使不及今冬成來春桃花水盛必羡溢有填淤反壤之害師古曰反壤者水塞不通故令其土壤反還也如此數郡種不得下民人流散盜賊將生雖重誅延世無益於事宜遣焉及將作大匠許商諫大夫乘馬延年雜作孟康曰乘馬姓也延世與焉必相破壞深論便宜以相難極商延年皆明計算能商功利足以分别是非擇其善而從之必有成功鳳如欽言白遣焉等作治六月乃成復賜延世黃金百斤治河卒非受平賈者為著外繇六月蘇林曰平賈以錢取人作卒顧其時庸之平價也如淳曰律説平賈一月得錢二千漢書溝洫志漢成帝建始四年秋大水河決東郡金隄師古曰金隄者河隄之名今在滑州界冬十月御史大夫尹忠以河決不憂職自殺漢書成帝本紀漢成帝河平元年春三月詔曰河決東郡流漂二州師古曰兖豫之地校尉王延世隄塞輒平其改元為河平漢書成帝本紀王尊為徐州刺史遷東郡太守久之河水盛溢泛浸瓠子金隄老弱奔走恐水大決為害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫策祝請以身填金隄因止宿廬居隄上吏民數千萬人爭叩頭救止尊尊終不肯去及水盛隄壞吏民皆奔走唯一主簿泣在尊旁立不動而水波稍却回還吏民嘉壯尊之勇節白馬三老朱英等奏其狀下有司考皆如言於是制詔御史東郡河水盛長毁壞金隄未決三尺百姓惶恐奔走太守身當水衝履咫尺之難不避危殆以安衆心吏民復還就作水不為災朕甚嘉之秩尊中二千石加賜黃金二十斤漢書王尊傳人尊字子贛髙陽漢成帝河平四年三月遣光祿大夫博士嘉等十一人行舉瀕河之郡水所毁傷困乏不能自存者財振貸師古曰巡行而舉其狀也財與裁同其為水所流壓死不能自葬令郡國給槥櫝葬埋已葬者與錢人二千避水它郡國在所冗食之文穎曰冗散也漢書成帝本紀漢成帝鴻嘉四年秋勃海清河河溢被災者振貸之漢書成帝本紀鴻嘉四年楊焉言從河上下患底柱隘可鐫廣之上從其言使焉鐫之鐫之裁沒水中不能去而令水益湍怒為害甚於故是嵗勃海清河信都河水湓溢灌縣邑三十一敗官亭民舍四萬餘所河隄都尉許商與丞相史孫禁共行視圖方略禁以為今河溢之害數倍於前決平原時今可決平原金隄間開通大河令入故篤馬河韋昭曰在平原縣至海五百餘里水道浚利又乾三郡水地得美田且二十餘萬頃足以償所開傷民田廬處又省吏卒治隄救水嵗三萬人以上許商以為古説九河之名有徒駭胡蘇鬲津今見在成平東光鬲界中師古曰此九河之三也徒駭在成平胡蘇在東光鬲津在鬲成平東光屬勃海鬲屬平原徒駭者言禹治此河用功極衆故人徒驚駭也胡蘇下流急疾之貌鬲津言其順小可鬲以為津而渡也鬲與隔同自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域孫禁所欲開者在九河南篤馬河失水之迹處藝平夷旱則淤絶水則為敗不可許公卿皆從商言先是谷永以為河中國之經瀆聖王興則出圖書王道廢則竭絶今潰溢橫流漂沒陵阜異之大者也修政以應之災變自除是時李尋解光亦言隂氣盛則水為之長故一日之間晝減夜增江河滿溢所謂水不潤下雖常於卑下之地猶日月變見於朔望明天道有因而作也衆庶見王延世蒙重賞競言便巧不可用議者常欲求索九河故迹而穿之今因其自決可且勿塞以觀水藝河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞滿昌師丹等數言百姓可哀上數遣使者處業師古曰謂安處之振贍之漢書溝洫志志言自塞宣房後河復北決於館陶分為屯氏河東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也元帝永光五年河決清河靈鳴犢口而屯氏河絶成帝初靈鳴犢口又不利清河都尉馮逡奏言郡承河下流土壤輕脆易傷屯氏河絶未久宜復浚以助大河泄暴水此思患豫防之道也而博士許商行視以為方用度不足且勿浚後三嵗河果決館陶及東郡金隄灌四郡三十二縣遣王延世塞之後二嵗河復決平原流入濟南千乘又遣延世塞之費更不訾鴻嘉四年勃海信都河水湓溢灌縣邑三十邑許商與丞相史孫禁共行視圖方略禁以為可決平原金隄間開通大河令入故篤馬河至海五百餘里氷道浚利此因利乘便之術也而商以為禁所欲開者在九河南失水之迹不可許公卿皆從商言又以谷永李尋解光等奏竟止不塞遣患八十餘年至永平十三年而後已嗟乎商以治尚書善為算稱故丞相御史白遣行視而其方略乃如此欲省費而費益多欲循九河之迹而九河不可復經術竟何為哉故諺曰以書御者不盡馬之情以古制今者不達事之變禹貢錐指綏和二年哀帝即位秋詔曰乃者河南潁川郡水出流殺人民敗壞廬舍朕之不德民反受辜朕甚懼焉已遣光祿大夫循行舉籍師古曰舉其名籍也賜死者棺錢人三千其令水所傷縣邑及它郡國災害什四以上民資不滿十萬皆無出今年租賦師古曰什四謂十分損四漢書哀帝本紀哀帝初平當使領河隄奏言九河今皆填滅按經義治水有決河深川師古曰決分泄也深浚治也而無隄防壅塞之文河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜博求能浚川疏河者下丞相孔光大司空何武奏請部刺史三輔三河𢎞農太守舉吏明能者莫有應書漢書溝洫志位平當字子思平陵人以經明禹貢使行河哀帝即徴光祿大夫至丞相見平當本傳刑政修而河伯效順者上也簡賢任能而用得其當者次也禹之治水曰導曰濬原無隄防壅塞之文朱子嘉平當之奏故大書以美之河志平當使領河隄奏按經義治水有決河深川而無隄防壅塞之文宋開寶之詔亦曰朕每閲前書詳究經瀆至若夏后所載但言導河至海隨山浚川未聞力制湍流廣營髙岸今之言治水者計無出於隄塞二事箕子答武王之訪首言鯀湮洪水汩陳其五行帝乃震恐後世治河之臣皆鯀也非其人之願為鯀乃教之使為鯀也是以水不治而彛倫斁也日知録徐節孝先生言禹之治水疏河浚川未嘗有隄防堙塞之義故鯀治水績用不成班固謂禹堙洪水謬矣隄防堙塞蓋起於戰國戰國之時不仁者茍於利已壅防衆川而遺害鄰國故齊與趙魏以河為境趙魏濵山齊地卑下齊乃築隄去河二十五里又諸侯之國引河溉田茍簡一時之利而禹之故道浸徙不復漢興三十餘年乃有河決之患至武帝元光中河決於瓠子南注巨野通於淮泗數塞數壞當此之時去古未逺承文景之盛求九河之道復先王之法豈不易哉乃以二十年之憂二十年之勞卒為隄防堙塞之記而已雖復其渠終不免決溢之患遂令隨其地勢東漸於海使水行地上而隄防竟作遺害後世矣上塞則下決矣南塞則北決矣今日塞明日復決矣今年塞明年復決矣此豈水之性也哉其勢使然也今濵河郡縣嵗治隄其費不下萬計及其大決則所殘無數其小決亦不免傷人禾稼壞人屋廬殺人性命故戍卒聞戍河之命必與其家聚哭及其行則父母妻子送之於道路以為生死之訣豈不痛哉戰國時隄防皆去國數十里以兩隄相去則是不下五十里其水勢尚得往還而不至迫隘不至大暴今之隄防近者數百步逺者不過數里故其勢迫隘不得息決長河之濵浩然之勢積斗筲之土以為禦捍之具是何異捧土而塞尾閭以一杯水救一車薪之火也其説甚為痛快第其欲遵先王之法求索九河故道而穿之未免迂濶夫當宋之時九河其烏可復哉唯如平當所奏求能浚川疏河之人而為決河深川之事九河雖不可復而河患庶可少弭矣河身髙運河身亦髙身既髙矣而又日漸加築運河隄之髙也幾與城埒諺云黃土接城頭淮揚一旦休吁可畏哉而況髙堰去寶應髙一丈八尺有竒去髙郵髙二丈二尺有竒髙寶隄去興化泰州田髙丈許或八九尺其去堰不啻卑三丈有竒矣見潘宮保兩河議老友周竹岡云髙堰原以障洪澤全湖之水每每上年將隄工加髙一尺則次年湖水亦必加髙一尺仍復漫隄而過但湖水長至一丈二尺外再欲加髙修防費大此康熙二十二年之言也四十年間總河張公題奏龍門壩石工原估九層必須加砌五層髙出水面方資捍禦又於六壩全閉之後公議修防之法僉云通共加鑲柴工以七尺為度如六尺者加一尺五尺者加二尺以次第加髙出水面七尺庶可捍禦風浪即此二年觀之可見髙堰之隄益加而益髙矣今髙寶運河沿隄張公所樹木榜及歷來碑碣之類皆埋在土中臨河市店悉自隄頂層級而下更可見一二十年間運河身與隄亦日漸加髙矣夫以淮揚兩郡諸州縣之城郭田廬億萬萬生靈俱在釜底吁可畏哉居今日而言行水決河深川事不可緩巳鄭元慶小谷口薈蕞行水金鑑卷六
