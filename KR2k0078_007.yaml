body:
  text: 行水金鑑卷七江南按察使傅澤洪撰河水待詔賈讓奏言治河有上中下策古者立國居民疆理土地必遺川澤之分度水勢所下及大川無防小水得入陂障卑下以為汙澤使秋水多得有所休息左右遊波寬緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國壅防百川各以自利齊與趙魏以河為境趙魏瀕山齊地卑下作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊蕩時至而去則填淤肥美民耕田之或久無害稍築室宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防狹者去水數百步逺者數里近黎陽南故大金隄從河西西北行至西山南頭乃折東與東山相屬民居金隄東為廬舍往十餘嵗更起隄從東山南頭直南與故大隄會又內黃界中有澤方數十里環之有隄往十餘嵗太守以賦民民今起廬舍其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河逺者數十里內亦數重此皆前世所排也河從河內北至黎陽為石隄激使東扺東郡平剛又為石隄使西北抵黎陽觀下師古曰觀縣名又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫厄如此不得安息今行上策徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄藝不能逺泛濫期月自定難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕析底柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄嵗費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相姦且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水髙於平地嵗增隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口乃有金隄髙一丈自是東地稍下隄稍髙至遮害亭髙四五丈往五六嵗河水大盛增丈七尺壞黎陽南郭門入至隄下如淳曰然則隄在郭內也水未踰隄二尺所從隄上北望河髙出民屋百姓皆走上山水留十三日隄潰二所吏民塞之臣循隄上行視水藝南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘嵗適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以卜之如淳曰今礫溪口是也言作水門通水流不為害也師古曰礫溪溪名即水經所云泲水東過礫溪者其水門但用木與土耳今據堅地作石隄藝必完安冀州渠首盡當卬此水門治渠非穿地也但為東方一隄北行三百餘里入漳水中其西因山足高地諸渠皆往往股引取之如淳曰股支别也旱則開東方下水門溉冀州水則開西方高門分河流通渠有三利不通有三害民常罷於救水半失作業師古曰此一害也水行地上湊潤上徹民則病濕氣木皆立枯鹵不生穀師古曰此二害決溢有敗為魚鱉食此三害也若有渠溉則鹽鹵下濕填淤加肥師古曰此一利故種禾麥更為粳稻高田五倍下田十倍師古曰此二利轉漕舟船之便此三利也今瀕河隄吏卒郡數千人伐買薪石之費嵗數千萬足以通渠成水門又民利其溉灌相率治渠雖勞不罷民田適治河隄亦成此誠富國安民興利除害支數百嵗故謂之中策若乃繕完故隄增卑培薄勞費無已數逢其害此最下策也漢書溝洫志賈讓治河三策古今稱之其上策放河使北入海是即禹之故智也今妨運道已不可行其中策謂據堅地作石隄開水門旱則開東方下水門溉冀州水則開西方髙門分河流然自漢至今千數百年盡中州大名之境率為河所淤泥沙填委無復堅地而河流不常與水門每不相值或并水門而衝決淤漫之濬治無已所溉之地一再嵗而髙矣西方地髙水安可往使讓復作或亦不可行矣丘文莊謂古今無出此策蓋身未經歷非定論也惟宋任伯雨曰河流混濁淤沙相半流行既久迤邐淤澱久而必決者勢也或北而東或東而北安可以人力制哉為今之策正宜因其所向寬立隄防約攔水勢使不至大段漫流此則治水者所當審也賈讓云隄防之制起自戰國然勢不能廢蓋雖不能禦異常之水河底甚髙水易漲溢且自三門下視中州如井然故雖髙厚之隄不能禦而尋丈之水非此即泛濫矣城郭市鎮民居多濵河故也但不宜近河而宜逺爾歷觀宋元迄今隄防形址斷續橫斜曲直殊可駭笑蓋皆臨河為隄河既改而隄即壞爾已擇屬吏之良者上自河南之原武下迄曹單沛上於河北岸七八百里間擇諸隄去河最逺且大者去河四五十里及二三十里者及去河稍逺者一二十里及數里者各一道內缺者補完薄者幫厚低者增髙斷絶者連接創築務俾七八百里間均有堅厚大隄二重已經接合創築蔡家口上下及曹單八里灣侯家林百餘里餘當極力完成雖費不恤自兹茍非異常之水北岸固可保無虞矣劉天和問水集或問馴曰賈讓有云土之有川猶人之有口也治土而防其川猶止兒啼而塞其口故禹之治水以導而今治水以障何也無乃止兒啼而塞其口乎馴應之曰昔白圭逆水之性以鄰為壑是謂之障若順水之性隄以防溢則謂之防防之者乃所以導之也河水盛漲之時無隄則必旁溢旁溢則必泛濫而不循軌豈能以海為壑耶故隄之者欲其不溢而循軌以入於海也譬之嬰兒之口旁潰一癰久之成漏湯液旁出不能下咽聲氣旁泄不能成音久之不治身且稿矣何有於口故河以海為口障旁決而使之歸於海者正所以宣其口也再考之禹貢云九澤既陂四海會同傳曰九州之澤已有陂障而無決潰四海之水無不會同而各有所歸則禹之導水何嘗不以隄哉弗之考耳問者曰隄以防水似矣水髙隄髙不將隆隄於天乎馴曰若謂隄之外即水耶隄外為岸岸下為河平時水不及岸隄若贅疣伏秋異常之水始出岸而及隄然或三日或五日或七日或旬日即復落歸於漕馴隄成之後逾十年矣未嘗有分寸之加何須隆之於天也或問馴曰賈讓有云今行上策徙冀州之民當水衝者治隄嵗費且萬萬出數年治河之費以業所徙之民且以大漢方制萬里豈其與水爭尺寸之地哉此策可施於今否馴應之曰民可徙也嵗運國儲肆百萬石將安適乎問者曰決可行也馴曰崔鎮故事可考也此決最大越三四年而深丈餘者僅去口一二十丈間稍入坡內止深一二尺矣蓋住址陸地非若沙淤可刷散漫無歸之水原無漕渠可容且樹樁基磉在在有之運艘僥幸由此者往往觸敗豈可恃為運道且運艘經行之處雖裏河亦欲築隄以便牽挽乃可令之由決乎然則讓中策所謂據堅地作石隄開水門旱則開東方下水門溉冀州水則開西方髙門分河流何如馴曰河流不常與水門每不相值或併水門而淤漫之且所溉之地亦一再嵗而髙矣後將何如哉矧旱則河水已淺難於分溉潦固可泄而西方地髙水安可往丘文莊謂古今無出此策夫乃身未經歷耶劉中丞問水集中言之甚詳蓋名言也惟宋任伯雨曰河流混濁淤沙相半流行既久迤邐淤澱久而決者勢也為今之策止宜寬立隄防約攔水勢使不大段湧流耳此即馴近築遙隄之意也故治河者必無一勞永逸之功惟有救偏補弊之策不可有喜新炫竒之智惟當收安常處順之休毋持求全之心苛責以最難之事毋以束濕之見強制乎叵測之流毋厭已試之規遂惑於道聽之説循兩河之故道守先哲之成矩便是行所無事舍此他圖即孟子所謂惡其鑿矣潘季馴河防一覽賈讓三策明臣丘濬謂古今治河無出此策而近有詆其謬者是二者皆過也夫論古人者必論其世毋泥其所言平其心毋逞其所快然後吾之論為不易之論而天下服之蓋讓之策乃專為西漢之世黎陽東郡白馬間數受河患而言未嘗全為治河立論也考黎陽即今濬縣東郡白馬即今滑縣冀州之民當水衝者即濬滑二郡之民貪近河肥饒沿金隄而築室廬者非統言冀州全境之民也繕完故隄增卑倍薄為下策者即濬滑二邑曲防遏水使百里之間河再西而三東之隄非專謂隄防為下策也夫河一折即一衝衝即成險彼時百里之間而河凡五衝其患安得不烈故讓欲徙其當衝之民廢其曲防之隄而别為徑直之石隄三百里束河以北入海耳夫讓欲束河而仍用隄隄而必以石石而至於三百里彼之倚隄以治河也亦至矣後世不考其時不詳其地或欲遵而行之或欲辭而闢之不亦過乎或曰潘季馴嘗辨之矣然則潘之言非歟曰何可盡非也其上策徙冀州之民辨之曰民可徙四百萬之嵗運將安適乎蓋漢不行運而明行運然未嘗以之闢讓也其中策多張水門旱開東方溉冀州潦開西方放河流辨之曰潦固可泄而西方地髙水安可往蓋既傍西山作隄則東卑而西亢可知其言是也至若曰河流不常與水門每不相值或并水門淤漫之夫讓所謂水門即今之閘壩涵洞也河流雖不常能淤漫然即季馴治河何以不廢閘壩涵洞耶又曰旱則河亦淺無以分溉則又不然蓋讓所云溉亦止言冀州石隄三百里間耳黃河挾萬里之源合秦晉豫三州之水而至冀安得冀州一旱而河即淺此一時逞快之論非通論也又辨甘州以下濁流不能溉田亦不可以闢讓今平心而論之若所云疆里土田必遺川澤之分使秋水得有所休息左右遊波寬緩而不迫誠萬世之至言無古今之分南北之異者也其他所言則宜於古者未必宜於今宜於北者未必宜於南何也前世土滿而人稀民易徙後世當水衝者往往通都大邑其可徙乎濬滑以上西薄大山地堅而多石故能據堅地作石隄今自開歸以至海口惟徐邳近山岡餘皆浮沙曠土地安得堅石安從取雖三里亦不能況三百里乎且季馴常言河南土最鬆禹導河止經河南一郡故當時之水不甚濁今河南開歸河全經之又距禹三千餘年流日久土日鬆故水愈濁由此言之西漢去今千七百年距禹猶未逺又河未南徙則其水亦未必如今日之濁或尚可引渠而溉田亦未可知若今則但能開涵洞引黃以淤窪已善矣安能通渠而引溉哉然則為今之策亦惟有擇老土築堅隄束河使不他徙建閘壩置涵洞保隄使不內潰而已舍此以外别無竒謀異見矣故曰讓之三策自為西漢黎陽東郡白馬間言未嘗全為治河立論也鑒古而不膠於古不亦善乎自禹貢而後言治河者始於賈讓之三策然即讓之言有不能槩行於讓之時者何也地形水勢隨處不同讓所言乃據黎陽東郡百里間之情形而言使移而行之徐兖中州之境則已有大謬不然者而況欲舉千百年以前之論而行之於千百年以後之河道則亦天下之愚人而已矣夫治河以衛民也徙民非細事也在上世土滿人稀故殷辟河患至五遷其國都而不以為難後世人民稠庶今自開歸以至徐邳而下皆通邑大都萬無可徙之理蓋當時黃河從黎陽東郡間北流入海其地東薄金隄西逼太山唯此二邑之中百餘里間為必經之地而其民貪其近河沃饒競作室廬居住其間又近山多石互為石隄更相抵遏束河於其中所謂百里之內再西三東者是也夫河自底柱以東其勢方澎湃而思逞而咽喉之路頓值迫束如此是以抑於北則潰而南瓠子一決而泛郡十六注巨野通淮泗東郡一決而灌四郡三十二縣居地十五萬頃凡西漢二百年間河患大抵皆在此二邑間雖使大禹復生於此時亦未有不徙民而放河北流者安得不以為上策哉況所謂當水沖者亦不過金隄左右及環內黃隄與東邑白馬故大隄之居民户多不過以千數計耳豈若今日一大村落鎮市動以萬計乎今不察時勢動言賈讓上策在徙冀州之民考西漢冀州該今直隸山西二地其民當不下數千萬户使讓果欲徙其民不知處斯民於何地兼山西處太行之右與河全不相涉不知讓亦何事而欲盡徙之而讓乃以為上策且千百年以來亦遂無有非之者何也蓋今人亦但順讀其書曰其上策當徙冀州之民而忘其下猶有當水衝之語故也且即記有當水衝者一言而忘其但即濬滑二邑曲防居住之民故也請得而斷之曰賈讓徙民在西漢之時在黎陽東郡之地真上策也若時非西漢地非黎陽東郡豈特非上策是為無策至若隄防者治河之要務自西漢以逮元明治河之臣未有不用隄防而能道河使行者近代潘季馴最稱治河能臣而其終身所守唯是築隄以束水束水以刷沙二語耳而今之空談局外者輒曰此賈讓所謂下策也夫讓誠以築隄為下策則前不當云據堅地作石隄矣是讓誠以築隄為下策則必用疏用浚又不當云為築非穿地也但為東方一隄北行三百餘里入漳水矣詳讓所言則其築隄以束水之旨實與季馴同也蓋隄防之言乃大槩之言施之得其當則為束水以導河施之失其當則為壅土以遏河齊作隄以遏河之入海而自利此曲防之隄也趙魏作隄以遏河此防患之隄也皆非以束水導河也故葵丘之會曰無曲防白圭為隄障水以注鄰國則孟子闢之故讓以為隄防之作近起戰國蓋疾其以隄防為民害耳今若不問隄防之是與非而但以隄防為是則是葵丘之載書可無戒而白圭之功果愈於禹也若但以隄防為非則是太原嶽陽可無修而九澤可無陂也今黃河自滎澤而東水常髙於地開封河面且髙於內地者丈餘掘地既不能築隄又以為下䇿而不行是泛漫無束之河何從而入海哉蓋西漢之世文辭朴略不甚分疏使人意會今人亦但順讀其書曰繕完故隄增卑倍薄勞費無已數逢其患此策最下而忘其所謂故隄者乃即百里之間再西三東濬滑二邑之民曲防遏水之隄也今使於雲梯關一帶築南北隄一道遏絶河流人從而非之曰治土而防其川猶止兒啼而塞其口吾忿然而與之爭曰隄防治河之要務爾安得而非之不亦大可笑乎哉亦請得而斷之曰濬滑二邑百里之間再西三東之故隄真下策而讓所議起淇口至漳水石隄三百里放河入海之隄真上策也若其中策多開漕渠張水門旱開東方溉冀州潦開西方放河流潘季馴雖常辨之然距今千七百年其地形既不知何如其河流清濁可溉與否即季馴所言已自有前後不同者不敢妄為論也靳輔治河書莽始建國三年河決魏郡泛清河以東數郡先是莽恐河決為元城冢墓害及決東去元城不憂水故遂不隄塞漢書王莽傳二元和志王翁孺墓在元城縣東百步元后之祖也王莽時徴能治河者以百數其大略異者長水校尉平陵關並師古曰桓談新論云並字子陽材智通達也言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水猥盛則放溢少稍自索師古曰索盡也雖時易處猶不能離此上古難識近察秦漢以來河決曹衛之域其南北不過百八十里者可空此地勿以為官亭民室而已大司馬史長安張戎師古曰新論云字仲功習溉灌事也言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而少淺雨多水暴至則溢決而國家數隄塞之稍益髙於平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢決之害矣御史臨淮韓牧師古曰新論云字子台善水事以為可略於禹貢九河處穿之縱不能為九但為四五宜有益漢書溝洫志穿渠引水非古也自溝洫之利廢而灌溉之事興利於田而河則病矣關中引水溉田自鄭國渠始及漢武時用鄭當時言穿渠引渭以漕且溉南山下用番係言引汾溉皮氏汾隂下引河溉汾隂蒲坂下又用嚴熊言引洛溉重泉以東為龍首渠宣房既塞用事者益爭言水利朔方西河河西酒泉皆引河及川谷以溉田關中則有靈軹渠成樂國湋渠六輔渠白渠皆溉田各萬餘頃它小渠及披山通道者不可勝言故戎以為言蓋河水多泥急則通利緩則淤澱今滎陽之下既有鴻溝華隂以上復有諸渠分水太多則河流日遲河身日髙故水暴至不能容漢人知此者鮮唯戎知之禹貢錐指大司空掾王橫師古曰橫字平中琅邪人見儒林傳中讀曰仲言河入勃海勃海地髙於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出􅎊數百里九河之地已為海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補完郤徙完平處更開空師古曰空猶穿也使緣西山足乘髙地而東北入海乃無水災沛郡桓談為司空掾典其議為甄豐言凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無産業民空居與行役同當衣食衣食縣官而為之作乃兩便師古曰言無産業之人端居無為及發行力役俱須衣食今縣官給其衣食而使修治河水是為公私兩便也可以上繼禹功下除民疾王莽時但崇空語無施行者漢書溝洫志王橫所稱西山即賈讓所謂放河使北西薄大山者髙地即史遷所謂至大伾引河北載之髙地者也皆在黎陽大伾一名黎陽東山則上陽三山為黎陽西山可知矣杜佑曰西山者太行恆山也今按太行在輝縣屬衛輝府西東距濬縣屬大名府可二百里又東北則在林縣與臨漳同屬彰德府西東距臨漳可一百五十里恆山在曲陽縣屬真定府西北南距巨鹿屬順德府可四百里至濬縣則八百餘里其禹河所行在唐衛相洺邢冀深瀛滄諸州之境安得隨二山之足而東北去乎杜説非是程大昌云禹河自澶相以北皆行西山之麓又云古河在貝冀以及枯降之南率皆穿西山踵趾以行今按澶非禹河所經自黎陽以行西山之麓不始於相貝冀界中亦更無西山踵趾殊不可解也或曰水性就下載之髙地是拂其性也疑遷與橫之言為妄余曰高地非謂高於河之上流也賈讓云淇水口金隄髙一丈自是東地稍下隄稍髙至遮害亭髙四五丈因欲決是隄放河使北入海則亭北之地固下於河矣其曰髙地者特以大伾之東地益卑以彼視宿胥口則宿胥口之地較髙耳髙地對上文平地而言非謂髙於河之上流也讀者其可以辭害意乎王橫云禹河隨西山下東北去其言有可證者十五書序河亶甲居相相城在今安陽屬彰德府內黃屬大名府二縣界而其後為河所圮證一也楚語武丁自河徂亳注云從河內徙都亳河內即鄴南殷墟自河徂亳蓋亦為河所圮證二也史記殷本紀祖乙遷於邢其後盤庚又自邢遷於亳下篇曰今我民用蕩析離居罔有定極蓋亦為河所圮巨鹿界明有禹河證三也殷去夏不逺其所居相殷在漢魏郡界邢在巨鹿界以殷都證禹河最確故首注之詩衛風曰河水洋洋北流活活河至大伾山西南折而北徑朝歌之東故謂之北流證四也禮記王制曰自東河至於西河千里而近蓋西河自華隂折而東為南河又東至大伾折而北是為東河計所行不滿千里故曰千里而近若漢河則東過大伾山南至白馬縣今滑縣境之長夀津始折而北西去宿胥口又一百五六十里則為千里而遙矣證五也史記衛世家封康叔為衛君居河淇間故商墟商墟即古朝歌城在今濬縣西南淇縣東北淇水徑其西河水徑其東是為河淇之間故淳于髠曰王豹處於淇而河西善謳證六也戰國策蘇代曰決宿胥之口魏無虛頓丘二邑在今濬縣西南酈道元云宿胥故瀆受河於頓丘縣遮害亭東黎山西證七也橫言使緣西山足乘髙地而東北入海乃無水災小谷口按胡氏篤信河渠書禹厮二渠之説乃據賈讓之言以證北載髙地之確豫特以王橫之言改入之讓橫所見略同亦可為證據賈讓言遮害亭東地益下則黎陽西山之足實為髙地證八也漢書溝洫志賈讓云決黎陽遮害亭放河使北入海西薄大山東薄金隄大山即王橫所謂西山證九也敘傳曰商竭周移正指定王五年事固已知武帝所道非禹舊迹證十也地理志鄴縣有故大河在東茍非隨西山下東北去安得至鄴證十一也孫炎曰大鹿巨鹿北廣河澤河所經蓋此澤本禹河之所滙故亦名廣河證十二也水經注漳水北徑祭陌西俗巫為河伯娶婦祭於此陌蓋鄴本有河故以河伯惑人證十三也杜佑曰漳水橫流至肥鄉縣界入河曽􅌈曰河自大伾折而北流漳水東流注之地形南北為從東西為橫河從而漳橫故謂之橫漳證十四也李垂曰自汲郡東推禹故道出大伾上陽三山之間復西河故瀆證十五也愚以漢時漳水自平恩以下為禹河故道亦有可證者五漢書地理志漳水東北至阜城入大河又滱水東至文安入大河滹沱東至參户合滹沱别從河東至文安入海是水經所敘漳水自成平以下至章武入海者在西漢時猶為大河證一也又成平縣有滹沱河民曰徒駭河與許商所言正合蓋漳水自東昌縣會滹沱河又東徑弓髙阜城至成平世遂謂之滹沱然漳故徒駭也土俗猶能識之不言漳滹沱仍曰徒駭證二也水經濁漳注曰鬲般峙其東北徒駭瀆聯漳絳則漳絳即徒駭之上流通為一川證三也唐書地理志清池縣西五十里有徒駭河西隄是浮陽參户之漳水亦古徒駭證四也齊乘曰河昔北流衡漳注之河既東徙漳自入海安知北流之漳非古徒駭河歟證五也無徴不信庶乎其免矣禹貢錐指髙地對上文平地是發前人所未發朏明先生作錐指時寓吳閶僧舍時豫亦寓吳先生以禹河隨西山下東北去十五證示豫曰此辨證古事無踰此者豫甚韙之今録其書宛如昨日之兩人晤語矣行水金鑑卷七
