body:
  text: 行水金鑑卷八江南按察使傅澤洪撰河水河水自遮害亭南又東右徑滑臺城水經有三重中小城謂之滑臺城舊傳滑臺人自修築此城因以名焉城即故鄭廩延邑也下有延津今時人謂此津為延夀津酈注二林氏據尚書以為禹當日無釃渠之事胡朏明獨信之謂禹釃二渠自黎陽宿胥口始一北流為大河一東流為漯川周定王五年河徙自宿胥口東行漯川右徑滑臺城城故白馬縣治今在滑縣西南即唐滑州治也北直黎陽相距三十里又東北過黎陽縣南水經黎侯國也晉灼曰黎山在其南河水徑其東其山上碑曰縣取山之名取水之陽以為名也今黎山之東北故城蓋黎陽縣之故城也竹書紀年梁惠成王十三年鄭釐侯使許息來致地平丘户牖首垣諸邑及鄭馳地我取枳道與鄭鹿鄭鹿即是城也今城內有故臺尚謂之鹿鳴臺又謂之鹿鳴城濟取名焉故亦曰鹿鳴津又曰白馬濟東南有白馬城衛文公東徙渡河都之故濟取名焉河水舊於白馬縣南決通濮濟黃溝故蘇代説燕曰決白馬之口魏無黃濟陽金隄既建故渠水斷尚謂之白馬瀆故瀆東徑鹿鳴城南又東北徑白馬縣之涼城北又東南徑濮陽縣散入濮水所在決會更相通注以成往復也酈注今黎陽故城在濬縣東北漢溝洫志賈讓奏言河從河內北至黎陽為石隄是也自津東北徑涼城縣水經置涼城在滑縣西南劉宋北齊併入白馬又東北徑伍子胥廟南為長夀津水經述征記曰涼城到長夀津六十里河之故瀆出焉漢書溝洫志注二渠一則漯川則今所流也一則北瀆王莽時空一作塞故世俗名是瀆為王莽河也酈注河至此與漯别行而東北入海水經謂之大河故瀆水經東漢人所撰凡稱故瀆者皆時已無水戚城以下東光以上河水不至又無他水行其中孟康所云王莽時遂空者唯此耳故謂之大河故瀆其自長夀津以西至宿胥口為東漢見行之河則敘入河水東光以北至章武時為清河漳水之所行則敘入清河漳水並不列大河故瀆禹貢錐指故瀆東北徑戚城西水經春秋哀公二年晉趙鞅率師納衛太子蒯瞶於戚宵迷陽虎曰右河而南必至焉今頓丘魏國縣西戚亭是也為衛之河上邑酈注界杜預云是時河北流過元城戚在河外晉軍已渡河故欲出河右而南今開州西南有戚城又徑繁陽縣故城東水經陽故城在今內黃縣東南繁水之繁水即春秋之澶淵杜預云在頓丘縣南亦謂之浮水北徑隂安縣故城西水經縣故城在今清豐縣北通典頓丘北有隂安城寰宇記云王莽河在頓丘縣北十里又東北徑昌樂縣故城東水經和故城在今南樂縣西北元志王莽河西去昌樂縣十六里又東北徑平邑郭西水經竹書紀年晉烈公四年趙城平邑酈注平今南樂縣北有邑故城又東北徑元城縣故城西北而至沙丘堰水經史記曰魏武侯公子元食邑於此故縣氏焉縣北有沙丘堰者不遵其道曰降亦曰潰堰障水也酈注水經此下文曰至於大陸北播為九河酈注云播為九河自此始及齊桓霸世塞廣田居同為一河故自堰以北館陶癭陶貝丘鬲般廣川信都東光河間樂成以東城地並存川瀆多亡今按水經以王莽河為禹河故以沙丘堰為禹迹推其意似謂古河本東行禹作此堰以障之使北而九河自此播焉不遵其道是為降水唐人云河自貴鄉縣界分為九道宗此説也然禹河不經元城此堰必非禹所作黃文叔云今澶州臨河有鯀隄自黎陽入北至恩州清河歷亭皆有之然則降水者自元城以北隄堨之水是也蓋以堰為鯀所作或曰元城為戰國魏地北與趙接壤賈讓云隄防之作近起戰國雍防百川各以自利齊與趙魏以河為境趙魏瀕山齊地卑下作隄遏水使西泛趙魏趙魏亦為隄以防之沙丘堰者疑趙所作以障水使不得北而注於齊魏所謂以鄰國為壑者也禹貢錐指之史記趙世家肅侯十八年齊魏伐我我決河水灌惠文王十八年王再之衛東陽決河水伐魏氏以趙地髙而齊魏卑也水經清水注引馬季長曰晉地自朝歌以北至中山為東陽朝歌以南至軹為南陽東陽春秋晉地戰國屬衛後屬趙河之故瀆自沙丘堰南分屯氏河出焉水經大河故瀆北出為屯氏河徑館陶縣東溝洫志曰自塞宣房後河復北決於館陶縣分為屯氏河其故瀆又東北屯氏别河出焉屯氏别河故瀆又東北徑信成縣張甲河出焉地理志曰張甲河首受屯氏别河於信成縣者也張甲故潰北絶清河於廣宗縣又東北至修縣會清河屯氏别河自信成城南東北至繹幕縣南分為二瀆其北瀆東北至陽信縣故城北而東注於海南瀆自平原城北首受大河故瀆東出亦謂之篤馬河東北至陽信縣故城南東北入海屯氏河故瀆東徑靈縣北又東北徑鄃縣與鳴犢河故瀆合地理志曰河水自靈縣别出為鳴犢河者也按屯氏河自館陶東北至章武入海過郡四行千五百里屯音豚通典魏州治貴鄉元城二縣貴鄉有大河故瀆俗曰王莽河元和志王莽河西去貴鄉縣三里古堰今名愜山在縣西九里成帝時河決王延世募人益運土塞河之處以其愜當人情故謂之愜山蓋即沙丘堰也元和志王莽河在館陶縣東四里禹貢錐指愜山在今大名府北今館陶縣西有館陶故城信成縣即今清河縣廣宗縣即今廣宗縣修縣即今景州繹幕縣在今平原縣界陽信縣故城在今慶雲縣界靈名縣在今博平縣界鄃縣即今夏津縣貴鄉縣即今大縣元城縣即今大名府治今冠縣西有冠氏縣故城隋析館陶縣地為冠氏縣元和志王莽河北去縣十八里河水故瀆東北徑發干縣故城西又屈徑其北水經邑今堂縣西南五十里有發干故城寰宇記王莽河在堂邑縣北十里又南徑貝丘縣故城南水經記故城在今清平縣西南寰宇王莽河在清平縣南十八里又東徑甘陵縣故城南水經又東徑艾亭城南又東北徑平晉城南又東北徑靈縣故城南别出為鳴犢河故瀆又東徑鄃縣故城東酈注直甘陵故城在今清河縣東南風俗記曰甘陵故城東二十里有艾亭城蓋近今博平縣界平晉城未詳疑當在博平縣北寰宇記王莽河在博平縣北十八里靈縣故城在博平縣東北四十里髙唐州西南二十里漢志鳴犢河東北至蓚入屯氏河鄃縣故城在今平原縣西南五十里又東徑平原縣故城西而北絶屯氏三瀆北徑繹幕縣故城東北西流徑平原鬲縣故城西水經地理志曰鬲津也酈注南括地志平原故城在平原縣東十里元和志王莽枯河在縣南五里蓋本在其北縣徙而北故水出其南屯氏三瀆謂屯氏河及屯氏别河之南北二瀆也寰宇記繹幕故城在平原縣西北二十里鬲縣故城在今陵縣北左傳靡奔有鬲氏即其國也陵縣本安德唐德州治州西五十里有長河故城州北五十里有將陵故城元和志王莽枯河在長河縣東五里又在將陵縣西十里長河即今德州治將陵在州東北州志云古黃河在州東南二十餘里今謂之黃河崖又北徑修縣故城東又北徑安陵縣西水經本修之安陵鄉也地理志風俗記曰修縣東四十里有安陵縣故縣又東北至東光縣故城西而北與漳水合一水分酈注括修縣故城在今景州南修音條一作蓚地志云俗名南條城在今蓚縣南十二里安陵故城在今吳橋縣西北大河自宿胥口徙流至成平合漳水復歸禹河故道又東北歷浮陽參戶平舒至章武入海也以今輿地言之濬縣滑縣開州內黃清豐南樂大名元城並屬直隸大名府冠縣館陶堂邑清平並屬山東東昌府清河屬直隸廣平府博平髙唐並屬東昌府平原德州並屬山東濟南府景州吳橋東光交河滄州青縣靜海天津並屬直隸河間府北接大城寶坻並屬順天府諸州縣界中皆周定王五年至西漢末大河之所行也定王五年嵗已未下逮王莽始建國三年辛未而北瀆遂空凡六百七十二嵗禹貢錐指漢明帝永平十二年夏四月遣將作謁者王吳修汴渠自滎陽至於千乘海口汴渠即蒗蕩渠也汴自滎陽首受河故謂石門在滎陽山北一里過汴以東積石為隄亦號金隄成帝陽嘉中所築也漢書明帝本紀千乘即今濟南府濵州曹玉珂曰千乘北去碣石將千里河之入海漢之不同於禹貢者如此漢明帝永平十三年夏四月汴渠成辛已行幸滎陽巡行河渠乙酉詔曰自汴渠決敗六十餘嵗加頃年以來雨水不時汴流東侵日月益甚水門故處皆在河中漭漾廣溢莫測圻岸蕩蕩極望不知綱紀今兖豫之人多被水患乃云縣官不先人急好興它役又或以為河流入汴幽冀蒙利故曰左隄強則右隄傷左右俱強則下方傷宜任水藝所之使人隨髙而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從久而不決今既築隄理渠絶水立門河汴分流復其舊迹陶丘之北漸就壤墳故薦嘉玉潔牲以禮河神東過洛汭歎禹之績今五土之宜反其正色濵渠下田賦與貧人無令豪右得固其利庶繼世宗瓠子之作因遂度河登太行進幸上黨壬寅車駕還宫後漢書明帝紀河汴分流復其舊迹胡寅曰世言隋煬帝開汴渠以幸揚州據此則自漢時已有汴渠矣臣按河即黃河汴乃汴渠也蓋昔河汴隄壞則汴水東與河合日月彌廣而為兖豫民害今隄既成則河東北入海而汴東南入泗是分流復其故迹也丘濬大學衍義補初平帝時河汴決壞未及得修建武十年楊武令張汜上言河決積久日月侵毁濟渠所漂數十許縣修理之費其功不難宜改修隄防以安百姓書奏光武即為發卒方營河功而浚儀令樂後復上言昔元光之間人庶熾盛緣隄墾殖而瓠子河決尚二十餘年不即壅塞今居家稀少田地饒廣雖未修理其患猶可且新被兵革方興力役勞怨既多民不堪命宜須平靜更議其事光武得此遂止後汴渠東侵日月彌廣而水門故處皆在河中兖豫百姓怨歎以為縣官恆興他役不先民急永平十二年議修汴渠乃引見景問以理水形便景陳其利害應對敏急帝善之又以嘗修浚儀功業有成乃賜景山海經河渠書禹貢圖及錢帛衣物夏遂發卒數十萬遣景與王吳水經注作昊修渠築隄自滎陽東至千乘海口千餘里景乃商度地藝鑿山阜破坻迹直􅎒説文截本字溝澗防遏衝要疏決壅積十里立一水門令更相洄注無復潰漏之患景雖簡省役費然猶以百億計明年夏渠成帝親自巡行詔濵河郡國置河隄員吏如西京舊制景由是知名王吳及諸從事掾史皆增秩一等景三遷為侍御史十五年從駕東巡狩至無鹽帝美其功績拜河隄謁者賜車馬縑錢建初七年遷徐州刺史明年遷廬江太守郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起廢蕪教用犂耕由是墾闢倍多境內豐給後漢書王景本傳王景字仲通樂浪􅠗邯人顯宗朝用薦與將作謁者吳共修作浚儀渠吳用景墕流法水乃不復為害後景以侍御史卒官成帝建始四年河決館陶入平原濟南千乘河平二年又決平原入濟南千乘雖兩經修塞而水道猶存王莽時河決魏郡泛清河以東數郡即平原濟南千乘也蓋自元城循此道東出館陶東武陽絶漯水而東北至髙唐又絶漯水東北至千乘入海也水經所敘長夀至委粟之道皆在東郡界中殊不合常深以為疑今按永平十三年詔云自汴渠決敗六十餘嵗蓋河自平帝世行汴渠東南入淮亦行濟瀆東北入海與後世南北清河之分派幾相類矣嵗月逾甚滎陽以下正流漸微迄於永平莽時館陶決口亦必淤淺故王景治河棄而不用河汴既分遂從漯川導河至東武陽始合莽時故道此武陽之西所以異也然史稱景鑿山開澗防遏衝要則其間多所變更即武陽以東豈盡與莽時同哉東漢之河起自始建國三年亦言其大略而巳王景修渠築隄自滎陽東至千乘海口千餘里則其所治者即東漢以後大河之經流也而史稱修汴渠又曰汴渠成始終皆不言河蓋建都洛陽東方之漕全資汴渠故惟此為急河汴分流則運道無患治河所以治汴也自平帝後汴流東侵日月益甚建武十年陽武令張汜上言時濟亦決敗水經河水注載王景事在滎陽蒗蕩渠下太子賢曰汴渠即蒗蕩渠也則河水當從此決入然滎陽以下南岸山脈已盡地平土疏隨處可以決入不獨石門渠口也濟隧亦通河至于岑造八激隄而其流始絶莽時河入濟南千乘則侵濟處更多故築隄自滎陽至千乘海口千餘里永平十三年詔曰河汴分流復其舊迹陶丘之北漸就壤墳十五年景從駕東巡至無鹽帝美其功陶丘今定陶無鹽今東平皆濟水所經之地二渠既修則東南之漕由汴入河東北之漕由濟入河舳艫千里挽輸不絶京師無匱乏之憂矣武帝雄才大略足以有為若移其征伐四夷神仙土木之費以復禹河故道當亦無難而竟不及此則以疏於討論執北瀆為禹河故也及哀平之世人始有知禹河之所經者賈讓請決黎陽遮害亭放河使北入海王橫請徙河緣西山足乘髙地東北入海意皆欲復禹河故道而國祚阽危事不可為矣永平上距平帝時僅六十餘嵗故道豈遽堙滅而王景治河唯從事汴濟蓋當時所急在運道就其利便者為之不暇逺圖耳史稱景鑿山阜截溝澗防遏衝要疏決壅滯十里立一水門費以百億計財力之充裕若是向使講求禹河故道而復之則河流歸北汴濟不勞而治功施到今五代以降潰溢橫流之禍可以免矣惜乎其不及此也河雖徙自周定王時而東光以下至章武入海猶是徒駭之故道至王莽時始改從千乘入海而景遂因之禹迹蕩然無存君子於此有遺憾焉或曰景即以復禹河為難王莽河新絶未久豈不可復乎曰不可漳水之東王莽河之西既有清河又有屯氏河屯氏别河張甲河鳴犢河等瀆津渠交絡冰碎瓦裂若導河行此不久即敗景商度地勢然後興工不復禹河則必用新河固已籌之熟矣禹貢錐指漢和帝永元十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞今廢慢懈弛不以為負刺史二千石其隨宜疏導勿因緣妄發以為煩擾將顯行其罰後漢書和帝本紀漢安帝元初二年春正月詔修理西門豹所分漳水為支渠以溉民田史記西門豹為鄴令發人鑿十二渠引水灌田所鑿之渠在今相州鄴縣西二月辛酉詔三輔河內河東上黨趙國太原各修理舊渠通利水道以溉公私田疇後漢書安帝本紀東順帝陽嘉中自汴口以緣河積石為堰通古淮口見前水經注漢桓帝永興元年秋七月河水溢後漢書桓帝本紀漢靈帝光和六年秋金城河溢水出二十餘里後漢書五行志門先是建寧中增修汴隄石以遏渠口見前水經注河水自涼城縣長夀津東徑鐵丘南水經春秋左傳哀公二年衛太子登鐵丘望見鄭師杜預曰在戚南河南有龍淵宫武帝元光中河決濮陽發卒塞決河起龍淵宫蓋武帝起宫於決河之傍龍淵之側故曰龍淵宫也酈注本元和志鐵丘在衛南縣東南漢濮陽縣地在今開州西南司馬彪不志河渠東漢以後無可考據賴有水經注存其所敘當時見行之河有可徴者為備録之禹貢錐指東北流徑濮陽縣北為濮陽津水經故城在南與衛縣分水城北十里有瓠河口有金隄宣房塸酈注注濮陽故城在今開州西南二十里瓠子水云王景治渠築隄防遏衝要瓠子之水絶而不通唯溝瀆存焉又東北徑衛國縣南又東徑鄄城縣北水經觀漢東郡有畔縣世祖更名衛國今觀城縣地及清豐之南境開州之北境皆是鄄城縣故城在河南十八里今在濮州東二十里又東北徑范縣之秦亭西水經春秋經書築臺於秦者也酈注范今范縣東南有縣故城又東北徑委粟津水經大河之北即東武陽縣也酈注十寰字記觀城縣東南六七里有委粟城蓋與泮相近東武陽即今朝城縣左會浮水故瀆水經故瀆上承大河於頓丘縣而北出東徑繁陽縣故城南故應劭曰縣在繁水之陽張晏曰縣有繁淵春秋襄公二十年經書公與晉侯齊侯盟於澶淵杜預曰在頓丘縣南今名繁淵澶淵即繁淵也亦謂之浮水焉酈注在頓丘縣在今豐縣西南二十五里繁陽縣故城今內黃縣東六十里今開州城南五里有澶淵城東絶大河故瀆又東北至東武陽縣東入河又有漯水出焉水經漯水上承河水於武陽縣東南西北徑武陽新城東曹操為東郡所治也酈注又東北徑東阿縣北河水於范縣東北流為倉亭津水經東阿縣城北門內西側臯上有大井其巨若輪深六七丈歲嘗煮膠以貢天府本草所謂阿膠也故世俗有阿井之名述征記曰倉亭津在范縣界去東阿六十里魏土地記曰津在武陽縣東北七十里津河濟名也酈注縣漢東阿故城在今陽穀縣東北范即今范縣倉亭津在縣西北又東北過茌平縣西北徑碻磝城西水經述征記曰嚚磝李云當作碻磝津名也自黃河泛舟而渡者皆為津也魏立濟州治此即故茌平縣也應劭曰茌山名縣在山之平陸故曰茌平也酈注濟今茌平縣南有州故城即古碻磝城縣西二十里有漢茌平故城又東北徑四瀆津水經津西側岸臨河有四瀆祠東對四瀆口河水東分濟亦曰泲水受河也然自河入濟自泲入淮自淮達江水徑周通故有四瀆之名酈注故通典盧縣東有漢臨邑城盧縣今為長清縣四瀆津當在縣界臨邑故城東北又東北徑楊墟縣東商河出焉水經經此上下相接處不與水相符從錐指也地理志曰楊墟平原之隸縣也城在髙唐城之西南經次於此是不北也商河首受河亦漯水及澤水所潭水也淵而不流世謂之清水自此雖沙漲填塞厥迹尚存歷澤而北俗謂之落里坈徑張公城西又北重源潛發世謂之落里坈亦曰小漳河商漳聲相近故字與讀移耳酈注隄元和志漢鴻嘉四年河水泛溢河都尉許商鑿此河通海故以商為名商河行大河之南漯水之北河水又東徑髙唐縣界水經河水於縣漯水注之水自城東北徑東武陽縣故城南應劭曰縣在武水之陽然則漯水亦或武水也漯水又北徑聊城縣故城西城內有金城周匝有水南門有馳道絶水南出自外泛舟而行矣東門側有層臺秀出魯仲連所謂還髙唐之兵郤聊城之衆者也酈注鄉水經漯水又東北徑清河縣故城北又東北徑文城東南又東北徑博平縣右與黃溝同注川澤又東徑文鄉城又東南徑王城北黃溝又東北徑左與漯水隱覆勢鎮河陸東出於髙唐縣大河右迤東注漯水矣漯水又東北徑援縣故城西又徑髙唐縣故城東又東北徑漯隂縣故城北又東北徑著縣故城南又東北徑崔氏城北東南徑東朝陽縣故城南又東徑漢徴君伏生墓南又東徑鄒平縣故城北又東北徑界東鄒城北又東北徑建信縣故城北又東北徑千乘縣二城間又東北為馬常坈又東北徑楊墟縣東商河出焉商河又北徑平原縣東又徑安德縣故城南又東北徑昌平縣故城南又東徑般縣故城南又東徑樂陵縣故城南又東徑朸鄉縣故城南沙溝水注之商河又東北流徑馬嶺城西北而流屈而東注南轉徑城東又東北徑富平縣故城北又分為二水南水謂之長聚溝北水世謂之白薄瀆注云東北流注於海矣又東北徑髙唐縣故城西水經京相璠曰本平原縣齊之西鄙也大河徑其西而不出其東經言出東誤耳酈注本城在今禹城縣西四十里齊髙唐邑齊趙以河為竟威王曰吾臣有盼子者使守髙唐則趙人不敢漁於河即此河也又北徑張公城臨側河湄水經有津焉名之曰張公渡酈注縣張公城今在平原南六十里又北徑平原縣故城東水經地理風俗記曰原博平也故曰平原矣縣故平原郡治矣晉灼曰齊西有平原河河水北過髙唐縣即平原也故經言河水徑髙唐縣東非也按地理志曰髙唐平原也髙堂漯水所出平原則篤馬河導焉明平原非髙唐大河不得出其東審矣酈注縣故城在今南又左徑安德城東而北為鹿角津東北徑般縣樂陵朸鄉厭次縣南為厭次河水經南今陵縣治即安德故城縣東有故鹿角關以津為名與臨邑縣接界般縣故城在今德平縣東北樂陵故城在今樂陵縣界朸鄉故城在今商河縣西北厭次故城在今武定州東本富平後漢改曰厭次又徑漯隂縣故城北水經漯此北漯隂縣也漯水下注云北隂城伏琛謂之漯陽城當在今青城縣界漯水之北又東北漯沃津水經按孫云漯沃誤漢志千乘郡有溼沃縣説文本作溼或省作漯後又轉為漯字也漯沃縣故城南地理風俗記曰千乘縣西北五十里有大河河北有漯沃城故縣也酈注漯今蒲臺縣東有沃故城又東徑千乘城北水經伏琛所謂千乘北城也酈注城今髙苑縣北有千乘故未知是北城否也又東北徑利縣城北水經改本作黎城縣北今據濟水經文正彼注云地理志齊郡有利縣晏謨曰縣在齊城北五十里今博興縣東有利縣故城又東分為二水枝津東徑甲下城南東南歷馬常坈注濟水經城濟水注云濟水東北至甲下邑南東歷琅槐縣故北又東北河水枝津注之漯水注云漯水徑千乘縣二城間又東北為馬常坈亂河枝流而入於海即此水也甲下蓋亦千乘縣地又東北過甲下邑又東北入於海水經禹貢夾右碣石入於河山海經碣石之山繩水出焉東流注於河河之入海舊在碣石今川流可導非禹瀆也周定王五年河徙故瀆故班固曰商碣周移也漢武帝元光二年河又徙東郡更注勃海是以漢司空掾王橫言曰往昔天嘗連北風海水溢西南出侵數百里故張君云碣石在海中蓋淪於海水也昔燕齊遼曠分置營州今城屆海濵海水北侵城垂淪半王橫之言信而有徴碣石入海非無證矣酈注海河水入處當在甲下邑之東北馬常坈之北按元和志海在勃海縣東一百六十里今分屬利津縣即古千乘海口利津金析唐蒲臺勃海三縣置本漢漯沃縣地蓋南與千乘縣共此海口也以今輿地言之滑縣開州並屬直隸大名府觀城濮州范縣朝城並屬山東東昌府陽穀屬山東兖州府茌平屬東昌府禹城平原陵縣德平樂陵商河武定青城蒲臺並屬山東濟南府髙苑博興並屬山東青州府利津屬濟南府諸州縣界中皆東漢以後大河之所行也禹貢錐指行水金鑑卷八
