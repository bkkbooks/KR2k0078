body:
  text: 行水金鑑卷十一江南按察使傅澤洪撰河水宋仁宗至和元年遣使行度故道且詣銅城鎮海口約古道髙下之勢宋史渠志宋仁宗至和二年十二月丁亥修六塔河宋史仁宗本紀是年翰林學士歐陽修奏疏曰朝廷欲俟秋興大役塞商胡開橫隴回大河於古道夫動大衆必順天時量人力謀於其始而審於其終然後必行計其所利者多乃可無悔比年來興役動衆勞民費財不精謀慮於厥初輕信利害之偏説舉事之始既巳倉皇羣議一搖尋復悔罷不敢逺引他事且如河決商胡時執政不慎計慮遽謀修塞凡科配梢芟一千八百萬騷動六路一百餘軍州官吏催驅急如星火民庶愁苦盈於道塗或物已輸官或人方在路未及興役尋已罷修虛費民財為國斂怨舉事輕脫為害若斯今又聞復有修河之役三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天災歲旱民困國貧之際不量人力不順天時知其有大不可者五蓋自去秋至春半天下苦旱京東尤甚河北次之國家常務安靜振恤之猶恐民起為盜况於兩路聚大衆興大役乎此其必不可者一也河北自恩州用兵之後繼以凶年人户流亡十失八九數年以來人稍歸復然死亡之餘所存者幾瘡痍未斂物力未完又京東自去冬無雨雪麥不生苗將踰暮春粟未布種農心焦勞所向無望若别路差夫又逺者難為赴役一出諸路則兩路力所不任此其必不可者二也往年議塞滑州決河時公私之力未若今日之貧虛然猶儲積物料誘率民財數年之間始能興役今國用方乏民力方疲且合商胡塞大決之洪流此一大役也鑿橫隴開久廢之故道又一大役也自橫隴至海千餘里掃岸久已廢頓須興緝又一大役也往年公私有力之時興一大役尚須數年今猝興三大役於災旱貧虛之際此其必不可者三也就令商胡可塞故道未必可開鯀障洪水九年無功禹得洪範五行之書知水潤下之性乃因水之流疏而就下水患乃息然則以大禹之功不能障塞但能因勢而疏決爾今欲逆水之性障而塞之奪洪河之正流使人力斡而回注此大禹之所不能此其必不可者四也橫隴湮塞已二十年商胡決又數嵗故道已平而難鑿安流已久而難回此其必不可者五也臣伏思國家屢嵗災譴甚多其於京東變異尤大地貴安靜而有聲巨嵎山摧海水搖蕩如此不止者近十年天地警戒宜不虛發臣謂變異所起之方尤當過慮防懼今乃欲於凶艱之年聚三十萬之大衆於變異最大之方臣恐災禍自兹而發也况京東赤地千里飢饉之民正苦天災又聞河役將動往往伐桑毁屋無復生計流亡盜賊之患不可不虞宜速止罷用安人心九月詔自商胡之決大河注食隄掃為河北患其故道又以河北京東飢故未興役今河渠司李仲昌議欲納水入六塔河使歸橫隴舊河舒一時之急其令兩制至待制以上臺諫官與河渠司同詳定之修又上疏曰伏見學士院集議修河未有定論豈由賈昌朝欲復故道李仲昌請開六塔互執一説莫知孰是臣愚皆謂不然言故道者未詳利害之原述六塔者近乎欺罔之繆今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢決之因所以未知故道有不可復之勢臣故謂未詳利害之原也若言六塔之利者則不待攻而自破矣今六塔既已開而恩冀之患何為尚告奔騰之急此則減水未見其利也又開六塔者云可以全回大河使復橫隴故道今六塔止是别河下流己為濵棣德博之患若全回大河顧其害如何此臣故謂近乎欺罔之繆也且河本泥沙無不淤之理淤常先下流下流淤高水行漸壅乃決上流之低處此勢之常也然避高就下水之本性故河流己棄之道自古難復臣不敢廣述河源且以今所欲復之故道言天禧以來屢決之因初天禧中河出京東水行於今所謂故道者水既淤澀乃決天臺掃尋塞而復故道未幾又決於滑州南鐵狗廟今所謂龍門掃者其後數年又塞而復故道已而又決王楚掃所決差小與故道分流然而故道之水終以壅淤故又於橫隴大決是則決河非不能力塞故道非不能力復所復不久終必決於上流者由故道淤而水不能行故也及橫隴既決水流就下所以十餘年間河未為患至慶歷三四年橫隴之水又自海口先淤凡一百四十餘里其後遊金赤三河相次又淤下流既梗乃決於上流之商胡口然則京東橫隴兩河故道皆下流淤塞河水已棄之高地京東故道屢復屢決理不可復不待言而易知也昨議者度京東故道功料但云銅城已上乃特高爾其東北銅城以上則稍低比商胡已上則實高也若云銅城以東地勢斗下則當日水流宜決銅城已上何緣而頓淤橫隴之口亦何緣而大決也然則兩河故道既皆不可為則河北水患何為而可去臣聞智者之於事有所不能必則較其利害之輕重擇其害少者而為之猶愈害多而利少何况有害而無利此三者可較而擇也又商胡初決之時欲議修塞計用梢芟一千八百萬科配六路一百餘州軍今欲塞者乃往年之商胡則必用往年之物數至於開鑿故道張奎所計工費甚大其後李參減損猶用三十萬人然欲以五十步之狹容大河之水此可笑者又欲增一夫所開三尺之方倍為六尺且闊厚三尺而長六尺自一倍之功在於人力已為勞苦云六尺之方以開方法算之乃八倍之功此豈人力之所勝是則前功既大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國勞人所舉如此而欲開難復屢決己驗之故道使其虛費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞以紓目前之患而終於上流必決如龍門橫隴之比此所謂利少而害多也若六塔者於大河有減水之名而無減患之實今下流所散為患已多若全回大河以注之則濵棣德博河北所仰之州不勝其患而又故道淤澀上流必有他決之虞此直有害而無利耳是皆智者之不為也今若因水所在增治隄防疏其下流浚以入海則可無決溢散漫之虞今河所歷數州之地誠為患矣隄防歲用之夫誠為勞矣與其虛費天下之財虛舉大衆之役而不能成功終不免為數州之患勞嵗用之夫則此所謂害少者乃智者之所宜擇也大約今河之勢負三決之虞復故道上流必決開六塔上流亦決河之下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求入海路而浚之不然下流梗澀則終虞上決為患無涯臣非知水者但以今事可驗者較之耳願下臣議裁取其當焉預議官翰林學士承旨孫抃等言開故道誠久利然功大難成六塔下流可導而東去以紓恩冀金隄之患十二月中書上奏自商胡決為大名恩冀患先議開銅城道塞商胡以功大難卒就緩之而憂金隄泛溢不能捍也願備工費因六塔水勢入橫隴宜令河北京東預完隄掃上河水所居民田數詔下中書奏以知澶州事李璋為總管轉運使周沆權同知潭州內侍都知鄧保吉為鈐轄殿中丞李仲昌提舉河渠內殿承制張懷恩為都監而保吉不行以內侍押班王從善代之以龍圗閣直學士施昌言總領其事提點開封府界縣鎮事蔡挺勾當河渠事楊緯同修河決修又奏請罷六塔之役時宰相富弼尤主仲昌議疏奏亦不省宋史河渠志先是富弼用朝士李仲昌䇿自澶州商胡河穿六塔渠入橫隴故道北京留守賈昌朝素惡弼陰約內侍武繼隆令司天官二人俟執政聚時於朝廷抗言國家不當穿河於北方致上體不安彥博知其意有所在然未有以制之後數日二人又上言請皇后同聽政亦繼隆所教也彥博徐召二人詰之曰天文變異汝職所當言何得輒與國家大事二人懼色變彥博曰觀汝直狂愚耳未忍治汝罪自今無得復然既而議遣司天官定六塔方位二人至六塔恐治前罪更言六塔在東北非正北也帝疾愈彥博等始歸第宋史文彥博傳修在翰林八年知無不言河決商胡北京留守賈昌朝欲開橫隴故道回河使東流有李仲昌者欲導入六塔河議者莫知所從修以為河水重濁理無不淤下流既淤上流必決以近事驗之決河非不能力塞故道非不能力復但勢不能久耳橫隴功大難成雖成將復決六塔狹小而以全河注之濵棣德博必被其害不若因水所趨增隄峻防疏其下流縱使入海此數十年之利也宰相陳執中主昌朝文彥博主仲昌竟為河北患宋史歐陽修傳或問馴曰歐陽修有云黃河已棄之故道自古難復而馴之見舍復故道之外無有也無乃不可乎馴應之曰修之言未試之言也且但云難復非不可復也馴嘗考之史曰漢元光中河決瓠子注巨野後二十餘年武帝自臨決河沈璧投馬羣臣負薪塞之復禹舊迹而梁楚之地無水災云夫禹舊迹非故道乎堙淤二十餘載而一塞決即復通之何云故道不可復乎且即以神禹治水言之九河曰疏濟漯曰瀹汝漢曰決淮泗曰排傳者曰疏通也瀹亦疏通之意排決皆去其壅塞也固未嘗有開鑿之説故孟子謂之行所無事而他日告公都子者有曰禹掘地而注之海傳者恐人以掘為疑即解之曰掘地掘其壅塞也蓋天地開闢之初即有百川四瀆原自朝宗於海高卑上下脈絡貫通原不假於人力嵗久湮淤至堯時泛濫之極禹不過審其高卑上下之勢去其壅塞湮淤之處以復天地之故道耳固未嘗創掘一河也吾人知識不逮神禹逺甚乃欲舍故道而另鑿一河可乎禹無論矣即如賈魯治河亦以復故為主傳記可考也且自我朝以來徐邳之間屢塞屢通如以故道為不可復則徐邳久為陸矣藉令欲棄故道而鑿新河無論其無所也即使得便宜之地而鑿之人力能使闊百丈以至三百丈深三四丈以至五六丈如故河乎即使能之將置黃河於何地乎如不可置黃河何擇於新故故則淤新則不淤馴不得而知也盡信書不如無書修言不足信也河防一覽德輿大名府路鈐轄提舉金隄至和中河決小吳掃破東隄頓丘居民避水者趨隄上而水至不得達德輿以巨船五十順流以濟之遂免墊溺宋史康德輿傳宋仁宗嘉祐元年四月壬子朔塞商胡北流入六塔河不能容是夕復決溺兵夫漂芻藳不可勝計命三司鹽鐵判官沈立往行視而修河官皆謫宦者劉恢奏六塔之役水死者數千萬人穿土干禁忌且河口乃趙征村於國姓御名有嫌而大興臿斸非便詔御史吳中復內侍鄧守恭置獄於澶劾仲昌等違詔旨不俟秋冬塞北流而擅進約以致決潰懷恩仲昌仍坐取河材為器懷恩流潭州仲昌流英州施昌言李璋以下再謫蔡挺奪官勒停仲昌垂子也由是議者久不復論河事宋史河渠志四月諸路言沿河決溢河北尤甚宋史仁宗本紀行志載在二年五韓絳知制誥乞守河陽召判流內銓河決商胡用李仲昌議開六塔河而患滋甚命絳宣撫河北時宰主仲昌人莫敢異絳劾其蠧國害民罪不可貸仲昌遂竄嶺表遷龍圗閣學士宋史韓絳傳宋初河道與唐五代略同歐陽修所稱京東故道是也景德元年河決澶州橫隴掃在今開州東尋復修塞景祐元年又決橫隴遂為大河之經流逮慶歷八年河又決州之商胡掃在開州東北三十里而橫隴斷流歐陽修謂之橫隴故道今濮州東河去州六十里自開州入宋橫隴決河蓋由此東注鄆州治須昌縣今東平州西須昌故城是也東平州西范縣東河去州七十里西接范縣界赤河在州西北又有遊河金河歐陽修所謂遊金赤三河也三河俱上接開州界今堙滅陽穀縣東南河去縣六十里東阿縣北縣志云黃河故道在縣北四十里西南自陽穀縣界來經銅城南又東經清泠口又東經陵山又東北經楊劉南又東北入長清縣界按銅城鎮在縣北少西三十八里楊劉鎮在縣北有城舊臨河津皆有舊黃河即宋橫隴決河之所行也自長清而下則與京東故道合矣時黃河在長清縣北五十五里至和二年李仲昌議開六塔河引歸橫隴故道從之六塔地名今清豐縣西南三十里六塔集是也宋時穿渠自今開州北十七里引商胡決河流經此地東南入橫隴故道是為六塔河嘉祐元年六塔河復決修河官皆謫竄自是之後無復言橫隴者而京東故道遂廢後漢書五行志書河溢者二一桓帝永興元年秋河水溢漂害人物而不言某郡一靈帝光和六年秋金城河溢水出二十餘里蓋王景治河未久滎陽以東至千乘海口皆安流如故也魏晉迄隋史皆無可考唐書五行志滎陽之下有河災自長夀二年決棣州始開元十年博棣二州河決十四年魏州河溢十五年冀州河溢河患由是漸多唐會要云元和八年河溢瓠子泛滑州則澶滑之間禍自此始矣後嵗月逾甚而其所以治之者不過築隄置掃開減水河而己殊不知河之淤澱常先下流下流既淤則上流必決徒治澶滑無益也分水愈多經流愈緩海沙日進河沙不出故太和二年棣州河決至壞其城則蒲臺以東塞可知已景福二年河徙從勃海縣北至無棣縣入海職是故也逮宋時滄州海口又淤故大中祥符三年決於棣州五年大決河勢高民屋丈餘徙州於陽信界中而澶滑之間嵗不得寧矣蓋自唐以來治河者皆不知此理故勞而罔功終有橫隴之決然河雖改流而京東故道猶未盡堙茍疏其壅滯先自海口訖於德博則故道可復而澶滑之患亦紓王景千年之舊迹至今存可也橫隴既通又不治其下流而海口先淤遊金赤三河赤淤故復有商胡之決是時縱欲回河亦當先治其下流則橫隴故道復亦無難而顧從事於六塔北流一閉當夕而敗李仲昌之罪所以不可逭也歐陽公奏云下流梗澀終虞上決為患無涯此深得大禹治水之旨宋議河者尚有可採而水官皆不得其人舌敝耳聾不見成功有以也禹貢錐指宋仁宗嘉祐三年秋七月丙子詔廣濟河溢原武縣河決遣官行視民田振恤被水害者十一月已丑置都水監罷三司河渠司宋史仁宗本紀宋仁宗嘉祐五年河流派别於魏之第六掃曰二股河其廣二百尺自二股河行一百三十里至魏恩德博之境曰四界首河七月都轉運使韓贄言四界首古大河所經即溝洫志所謂平原金隄開通大河入篤馬河至海五百餘里者也自春以丁壯三千浚之可一月而畢支分河流入金赤河使其深六尺為利可必商胡決河自魏至於恩冀乾寧入於海今二股河自魏恩東至於德滄入於海分而為二則上流不壅可以無決溢之患乃上四界首二股河圗宋史河渠志韓贄為河北都轉運使河決商胡而北議者欲復之役將興贄言北流既安定驟更之未必能成功不若開魏金隄使分注故道支為兩河或可紓水患詔遣使相視如其䇿才役三千人幾月而畢入判都水監權開封府宋史韓贄傳二股河者商胡決河之别派也韓贄言古大河即王莽河二股河出其東南絶王莽河而東北入海蓋即唐馬頰河之故道也考之近志馬頰河自清豐縣西南東北流徑朝城縣東元和志黃河在清豐縣南五十里馬頰河首受河水蓋即於縣西南三十里六塔集與開州接界處歐陽公曰今六塔止是别河下流已為濵棣德博之患是當時已有六塔河東北經濵州入海者六塔河即馬頰河之别名但李仲昌所開引商胡北流絶六塔河東南入橫隴故道而二股河則派於魏之第六掃東合馬頰河而東北至滄州入海此其所以異耳宋朝城縣城在今南樂縣東二十五里俗稱韓張堡東與今朝城縣接界又北徑莘縣西又北徑堂邑縣西又東北徑博平縣西北絶王莽河而北徑清平縣東又東北徑夏津縣東南又東北徑高唐州西北唐為高唐縣又東北徑恩縣南唐為歷亭縣又東北與平原縣分水又東北絶王莽河徑陵縣南唐為安德縣元和志云馬頰河在安德縣南五十里是也又東北合篤馬河篤馬河自平原流入縣界水經注曰屯氏别河南瀆自平原城北首受大河故瀆東出亦通謂之篤馬河漢志平原縣有篤馬河東北入海五百六十里孫禁欲決金隄今大河入篤馬河即此也東北徑西平昌縣故城北城在今德平縣西南後魏去西字元和志平昌縣有馬頰河在縣南十里久視二年開亦名新河蓋即安德縣南馬頰河東北合篤馬河之道也又東北徑般縣故城北城在德平縣東北德平北接寧津縣界寧津志云縣南二十五里有土河自陵縣流入又東入樂陵界相傳即古篤馬河又東徑樂陵縣故城北城在今縣東寰宇記云馬頰河在樂陵縣東六十里從滳河縣北界來即古篤馬河也金志樂陵縣有篤馬河按二水既合例得通稱故篤馬亦名馬頰水出其東蓋縣自故城徙而西也又東北徑陽信縣故城南城在今海豐縣界北齊移治馬嶺城在今陽信縣南又東北入海勃海在海豐縣東北一百五十里慶雲海豐皆漢陽信縣慶雲志云有馬頰河自樂陵流入至城東南注鬲津河又云長城嶺在縣南四十里勢如岡陵或謂禹所築九河隄也按此亦未是禹迹蓋宋時東流所經築此以為隄耳海豐新志云鉤盤北派在縣西北三十里自慶雲流入又東北徑馬谷山前抵土河口入海按此即古篤馬河亦名陷河齊乘曰東無棣縣樂北有陷河闊數里西通德棣東入海是也舊志云自陵至縣界有古黃河隄在縣西三里繞城北至東北七里而止舊為大河所經蓋即宋東流由篤馬河入海處以今輿地言之二股河合馬頰河東北至德平縣合篤馬河又東北經樂陵海豐入海海豐本無棣與樂陵俱屬滄州故韓贄云二股河自魏恩東至德滄入海禹貢錐指宋仁宗嘉祐七年七月戊辰河決大名第五掃宋史河渠志宋仁宗嘉祐八年秋大水毁河陽中灘河中一洲名曰中灘上有河伯祠水環四周喬朩蔚然嘉祐八年秋大水馮襄了無遺迹中灘由是遂廢容齋隨筆今今懷慶府孟縣西有河陽廢縣中灘即河中之郭家灘也見新志鄭驤為度支副使河決德州入王紀口議欲徙州詔驤往視之還言州不當徙已而州果無患宋史鄭驤傳郭申錫為鹽鐵副使相視決河坐訟李參失實黜知濠州帝明榜朝堂稱其欺誣以警在位宋史郭申錫傳宋英宗治平元年五月已亥始命都水監浚二股五股河以紓恩冀之患初都水監言商胡堙塞冀州界河淺房家武邑二掃由此潰慮一旦大決則甚於商胡之患乃遣判都水監張鞏户部副使張燾等行視遂興工役卒塞之宋史河渠志無河南通志載治平七年黃沁二水溢蓋治平七年也不知二水溢於何年宋神宗熙寧元年六月河溢恩州烏欄隄又決冀州棗強掃北注瀛七月又溢瀛州樂壽掃帝憂之顧問近臣司馬光等都水監丞李立之請於恩冀深瀛等州創生隄三百六十七里以禦河而河北都轉運司言當用夫八萬三千餘人役一月成今方災傷願徐之都水監丞宋昌言謂今二股河門變移請迎河進約簽入河身以紓四州水患遂與屯田都監內侍程昉獻議開二股以導東流於是都水監奏慶歷八年商胡北流於今二十餘年自澶州下至乾寧軍創隄千有餘里公私勞擾近嵗冀州而下河道梗澀致上下掃岸屢危今棗強抹岸衝奪故道雖創新隄終非久計願相六塔舊口并二股河導使東流徐塞北流而隄舉河渠王亞等謂黃御河帶北行入獨流東寨經乾寧軍滄州等八寨邊界直入大海其近海口闊六七百步深八九丈三女寨以西闊三四百步深五六丈其勢愈深其流愈猛天所以限契丹議者欲再開二股漸閉北流此乃未嘗覩黃河在界河內東流之利也十一月詔翰林學士司馬光入內內侍省副都知張茂則乘傳相度四州生隄回日兼視六塔二股利害宋史河渠志是年秋七月壬午以恩冀二州河決賜水死家緡錢及下户粟癸已疏深州溢水宋史神宗本紀宋昌言擢都水監丞熙寧初河決棗強而北昌言建議欲於二股河口西岸新灘立土約障水使之東流候稍深即斷北流縱出葫盧下流以除恩冀深瀛水患詔從之提舉河渠王亞以為不可成不如修生隄朝廷遣翰林學士司馬光往視如昌言䇿不兩月決口塞光奏昌言獨有功若與同列均受賞恐不足以勸詔理提點刑獄資序遷開封府推官同判都水監汴水漲昌言請塞訾家口己而汴流絶監丞侯叔獻倡為昌言罪昌言懼求知陜州歷濮冀二州河決曹村召判都水監往護河隄靈平掃成轉少府監卒贈絹二百匹宋史宋昌言傳昌言字仲謨平棘人張存禮部尚書家居棗強河決勢逼冀城或勸使他徙曰吾家衆所望也茍輕舉動一州吏民何以自安訖不徙宋史張存傳宋神宗熙寧二年正月光入對請如宋昌言䇿於二股之西置上約劈水令東俟東流漸深北流淤淺即塞北流放出御河胡盧河下紓恩冀深瀛以西之患初商胡決河自魏之北至恩冀乾寧入於海是謂北流嘉祐八年河流派别於魏之第六掃遂為二股自魏恩東至於德滄入於海是謂東流時議者多不同李立之力主生隄帝不聽卒用昌言説置上約三月光奏治河當因地形水勢若強用人力引使就高橫立隄防則逆激旁潰不惟無成仍敗舊績臣慮官吏見東流已及四分急於見功遽塞北流而不知二股分流十里之內相去尚近地勢復東高西下若河流併東一遇盛漲水勢西合入北流則東流遂絶或於滄德隄掃未成之處決溢橫流雖除西路之患而害及東路非䇿也宜專護上約及二股隄岸若今歲東流止添二分則此去河勢自東近者二三年逺者四五年候及八分以上河流衝刷已闊滄德隄掃已固自然北流日減可以閉塞兩路俱無害矣會北京留守韓琦言今嵗兵夫數少而金隄兩掃修上下約甚急深進馬頭欲奪大河緣二股及嫩灘舊闊千一百步是以可容漲水今截去八百步有餘則將束大河於二百餘步之間下流既壅上流蹙遏湍怒又無兵夫修護隄岸其衝決必矣况自德至滄皆二股下流既無隄防必侵民田設若河門束狹不能容納漲水上下約隨流而脫則二股與北流為一其患愈大又恩深州所創生隄其東則大河西來其西則西山諸水東注腹背受水兩難扞禦望選近臣速至河所與在外官合議帝在經筵以琦奏諭光命同茂則再往四月光與張鞏李立之宋昌言張問呂大防程昉行視上約及方鋸牙濟河集議於下約光等奏二股河上約並在灘上不礙河行但所進方鋸牙己深致北流河門稍狹乞減折二十步令近後仍作蛾眉掃裹護其滄德界有古遙隄當加葺治所修二股本欲疏導河水東去生隄本欲捍禦河水西來相為表裏未可偏廢帝因謂二府曰韓琦頗疑修二股趙抃曰人多以六塔為戒王安石曰異議者皆不考事實故也帝又問程昉宋昌言同修二股如何安石以為可治帝曰欲作簽河甚善安石曰誠然若及時作之往往河可東北流可閉因言李立之所築生隄去河逺者至八九十里本計以禦漫水而不可禦河南之向著臣恐漫水亦不可禦也帝以為然五月丙寅乃詔立之乘驛赴闕議之七月二股河通快北流稍自閉戊子張鞏奏上約纍經泛漲并下約各已無虞東流勢漸順快宜塞北流除恩冀深瀛永靜乾寧等州軍水患又使御河胡盧河下流各還故道則漕運無壅遏郵傳無滯留塘泊無淤淺復於邊防大計不失南北之限嵗減費不可勝數亦使流移歸復實無窮之利且黃河所至古今未嘗無患較利害輕重而取舍之可也惟是東流南北隄防未立閉口修隄工費甚夥所當預備望選習知河事者與臣等講求具圗以聞乃復詔光茂則及都水監官河北轉運使同相度閉塞北流利害有所不同各以議上宋史河渠志八月河決滄州饒安漂溺居民移縣治於張為村宋史五行志八月已亥光入辭言鞏等欲塞二股河北流臣恐勞費未易或幸而可塞則東流淺狹隄防未全必致決溢是移恩冀深瀛之患於滄德等州也不若俟二三年東流益深闊隄防稍固北流漸淺薪芻有備塞之便帝曰東流北流之患孰輕重光曰兩地皆王民無輕重然北流已殘破東流尚全帝曰今不俟東流順快而塞北流他日河勢改移奈何光曰上約固則東流日增北流日減何憂改移若上約流失其事不可知惟當併力護上約耳帝曰上約安可保光曰今嵗創修誠為難保然昨經大水而無虞來嵗地腳已牢復何慮且上約居河之側聽河北流猶懼不保今欲橫截使不行庸可保乎帝曰若河水常分二流何時當有成功光曰上約茍存東流必增北流必減借使分為二流於張鞏等不見成功於國家亦無所害何則西北之水併於山東故為害大分則害小矣鞏等亟欲塞北流皆為身謀不顧國力與民患也帝曰防捍兩河何以供億光曰併為一則勞費自倍分二流則勞費減半今減北流財力之半以備東流不亦可乎帝曰卿等至彼視之時二股河東流及六分鞏等因欲閉斷北流帝意嚮之光以為須及八分乃可仍待其自然不可施功王安石曰光議事屢不合今令視河後必不從其議是重使不安職也庚子乃獨遣茂則茂則奏二股河東傾己及八分北流止二分張鞏等亦奏丙午大河東徙北流淺小戊申北流閉詔奬諭司馬光等仍賜衣帶馬時北流既塞而河自其南四十里許家東決泛濫大名恩德滄永靜五州軍境宋史河渠志七月戊申河徙東行宋史神宗本紀熙寧初昉為河北屯田都監河決棗強釃二股河導之使東為鋸牙下以竹落塞決口加帶御器械河決商胡北流與御河合為一及二股東流御河遂淺澱昉以開浚功遷宫苑副使又塞漳河作浮梁於洺州兼外都水丞詔相度興修水利河決大名第五掃昉議塞之因疏塘水溉深州田又導葫盧河自樂壽之東至滄州二百里塞孟家口開乾寧軍直河作橋於真定之中渡又自衛州王供掃導沙河入御河以廣運路宋史程昉傳宋神宗熙寧三年二月命茂則鞏相度澶滑州以下至東流河勢隄防利害時方濬御河韓琦言事有緩急工有先後今御河漕運通駛未至有害不宜減大河之役乃詔輟河夫卒三萬三千專治東流宋史河渠志宋神宗熙寧四年二月丁丑詔增漳河等役兵九月丙戍河決鄆州十二月丙申濬河宋史神宗本紀七月辛卯北京新隄第四第五掃決漂溺館陶永濟清陽以北遣茂則乘驛相視八月河溢澶州曹村十月溢衛州王供時新隄凡六掃而決者二下屬恩冀貫御河奔衝為一帝憂之自秋迄冬數遣使經營是時人爭言導河之利茂則等謂二股河地最下而舊防可因今堙塞者才三十餘里若度河之湍浚而逆之又存清水鎮河以析其勢則捍者可回決者可塞帝然之十二月令河北轉運司開修二股河上流并修塞第五掃決口宋史河渠志宋神宗熙寧五年二月甲寅興役四月丁卯二股河成深十一尺廣四百尺方浚河則稍障其決水至是水入於河而決口亦塞六月河溢北京夏津閏七月辛卯帝語執政聞京東調夫修河有壞産者河北調急夫尤多若河復決奈何且河決不過占一河之地或西或東若利害無所校聽其所趨如何王安石曰北流不塞占公私田至多又水散漫久復澱塞昨修二股費至少而公私田皆出向之潟鹵俱為沃壤庸非利乎况急夫已減於去嵗若復葺理隄防則河北嵗夫愈減矣宋史河渠志四月辛未塞北京決河宋史神宗本紀皓僉鎮寧軍判官程昉治河取澶卒八百而虐用之衆逃歸羣僚畏昉欲勿納皓曰彼逃死自歸弗納必亂若昉怒吾自任之即親往啓門拊勞約少休三日復役衆歡踊而入具以事上得不遣昉後過州揚言曰澶卒之潰蓋程中允誘之吾且訴於上皓聞之曰彼方憚我何能為果不敢言曹村掃決皓謂郡守劉渙曰曹村決京師可虞臣子之分身可塞亦所當為盡遣廂卒見付渙以鎮印付皓立走決所激諭士卒議者以為勢不可塞徒勞人爾皓命善泅者度決口引巨索濟衆兩岸並進數日而合特遷太常丞宋史程皓傳行水金鑑卷十一
