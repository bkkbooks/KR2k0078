body:
  text: 行水金鑑巻十二江南按察使傅澤洪撰河水宋神宗熈寧六年四月始置疏濬黄河司先是有選人李公義者獻鐵龍爪揚泥車法以濬河其法用鐵數斤為爪形以繩繫舟尾而沉之水篙工急櫂乘流相繼而下一再過水已深數尺宦官黄懐信以為可用而患其太輕王安石請令懐信公義同議増損乃别制濬川杷其法以巨朩長八尺齒長二尺列於朩下如杷狀以石壓之兩旁繫大繩兩端矴大船相距八十步各用滑車絞之去來撓蕩泥沙已又移船而濬或謂水深則杷不能及底雖數往來無益水淺則齒礙沙泥曵之不動卒乃反齒向上而曳之人皆知不可用惟安石善其法使懐信先試之以濬二股又謀鑿直河數里以觀其效且言於帝曰開直河則水勢分其不可開者以近河每開數尺即見水不容施功爾今第見水即以杷濬之水當隨杷改趨直河茍置數千杷則諸河淺澱皆非所患嵗可省開濬之費幾百千萬帝曰果爾甚善聞河北小軍壘當起夫五千計合境之丁僅及此數一夫至用錢八緡故歐陽修嘗謂開河如放火不開如失火與其勞人不如勿開安石曰勞人以除害所謂毒天下之民而従之者帝乃許春首興工而賞懐信以度僧牒十五道公義與堂除以杷法下北京令虞部員外郎都大提舉大名府界金隄范子淵與通判知縣共試騐之皆言不可用會子淵以事至京師安石問其故子淵意附會遽曰法誠善第同官議不合耳安石大悦至是乃置濬河司將自衛州濬至海口差子淵都大提舉公義為之屬許不拘常制舉使臣等人船木鐵工匠皆取之諸埽官吏奉給視都水監丞司行移與監司敵體當是時北流閉已數年水或横決散漫常虞壅遏十月外監丞王令圗獻議於北京第四第五埽等處開修直河使大河還二股故道乃命范子淵及朱仲立領其事開直河深八尺又用杷疏濬二股及清水鎮河凡退背魚肋河則塞之王安石乃盛言用杷之功若不輟工雖二股河上流可使行地中宋史河渠志初選人有李公義者請以鐵龍爪治河宦者黄懐信沿其制為濬川杷天下指笑以為兒戲安石獨信之遣都水丞范子淵行其法子淵奏用杷之功水悉歸故道退出民田數萬頃詔大名核實彥博言河非杷可濬雖甚愚之人皆知無益臣不敢雷同罔上疏至帝不恱復遣知制誥熊本等行視如彥博言子淵乃請覲言本等見安石罷意彥博復相故傅會其說御史蔡確亦論本奉使無狀本等皆得罪獨彥博勿問宋史文彥博傳宋神宗熙寧七年都水監丞劉璯言自開直河閉魚肋水勢增漲行流湍急漸塌河岸而許家淃清水鎮河極淺漫幾於不流雖二股深快而蒲泊已東下至四界首退出之田略無固䕶設遇漫水出岸牽迴河頭將復成水患宜候霜降水落閉清水鎮河築縷河隄一道以遏漲水使大河復循故道又退出良田數萬頃俾民耕種而博州界堂邑等退背七埽歳減修護之費公私兩濟従之是秋判大名文彥博言河溢壊民田多者六十村户至萬七千少者九村户至四千六百願蠲租稅從之又命都水詰官吏不以水災聞者外都水監丞程昉以憂死十月安石去位宋史河渠志程昉以小黄門積遷西京左藏庫副使熙寧初為河北屯田都監河決棗強釃二股河導之使東為鋸牙下以竹落塞決口加帶御器械河決商胡北流與御河合為一及二股東流御河遂淺澱昉以開浚功遷宫苑副使又塞漳河作浮梁於洺州兼外都水丞詔相度興修水利河決大名第五埽昉議塞之因疏塘水溉深州田又導葫蘆河自樂壽之東至滄州二百里塞孟家口開乾寧軍直河作橋於真定之中渡又自衞州王供埽導沙河入御河以廣運路累遷達州防禦使制置河北河防水利御史盛陶言昉挾第五埽之功專為已力假朝廷威福恐動州縣所開共城河頗廢人户水磑久無成功又議開沁河因察訪官按行始知不便漳河滹沱之役水占邢洺趙深祁五州之田王廣廉孔嗣宗錢勰趙子幾皆嘗論奏其姦欺之狀則多置䃮口指決河所侵便為淤田其事權之盛則舉官廢吏唯其所欲悖慢豪横則受聖旨者三受提㸃刑獄司牒者十二故有違拒小人誤當賞擢驕暴自肆願遣官代還仍行究治神宗曰王安石以昉知河事故加任使令開漳河用工七百萬滹沱八九百萬已議體量矣始安石欲興水利驟用昉昉挾安石勢而慢韓琦後安石覺其虛誕亦疎之以憂死遂罷都大制置河防水利司宋史程昉傳宋神宗熙寧八年十二月丙申濬河宋史神宗本紀宋神宗熙寧十年五月滎澤河隄急詔判都水監俞光往治之七月河復溢衞州王供及汲縣上下埽懐州黄沁滑州韓村乙丑遂大決於澶州曹村澶淵北流斷絶河道南徙東滙於梁山張澤濼分為二派一合南清河入於淮一合北清河入於海凡灌郡縣四十五而濮齊鄆徐尤甚壊田逾三十萬頃遣使修閉八月又決鄭州滎澤於是文彥博言臣正月嘗奏德州河底淤澱泄水稽滯上流必至壅遏又河勢變移四散漫流兩岸俱被水患若不預為經制必溢魏博恩澶等州之境而都水略無施設止固䕶東流北岸而已適累年河流低下官吏希省費之賞未嘗增修隄岸大名諸埽皆可憂虞謂如曹村一埽自熙寧八年至今三年雖每計春料當培低怯而有司未嘗如約其埽兵又皆給他役實在者十有七八今者果大決溢此非天災實人力不至也臣前論此并乞審擇水官今河朔京東州縣人被患者莫知其數嗸嗸籲天上軫聖念而水官不能自訟猶汲汲希賞臣前論所陳出於至誠本圖補報非敢激訐也宋史河渠志是年七月丙子河決澶州曹村埽九月庚戌詔河決害民田所屬州縣疏瀹仍蠲其稅宋史神宗本紀七月河決曹村下埽澶淵絶流又東滙於梁山張澤濼凡壊郡縣四十五官亭民舍數萬田三十萬頃河陽河水湍漲壊南倉溺居民滄衛河濼暴漲敗廬舎損田苗宋史五行志王居卿為京東轉運使青州河貫城中苦泛溢為病居卿即城立飛橋上設樓櫓下建門以時閉啓人誦其智徙河北路河決曹村居卿立軟横二埽以遏怒流而不與水争朝廷賞其功建以為都水法召拜户部副使提舉市易宋史王居卿傳王克臣知鄆州河決曹村克臣亟築隄城下或曰河決澶淵去鄆為逺且州徙於高八十年不知有水患安事此克臣不聴役愈急隄成水大至不没者才尺餘復起甬道屬之東平王陵埽人得趨以避水事定皆繪像祀之進天章閣待制宋史王克臣傳俞充召判都水監河決曹村充往救䕶還陳河防十餘事槩論水衡之政不修因循茍且浸以成習方曹村決時兵之在役者僅十餘人有司自取敗事恐未可以罪嵗也加集賢殿修撰提舉市易宋史俞充傳龔鼎臣留守南京河決曹村流殍滿野鼎臣勞來振拊歸者不勝計拜諫議大夫宋史龔鼎臣傳黄廉為監察御史裏行河決曹村壊田三十萬頃民廬舎三十八萬家廉受詔安撫京東發廩振饑逺不能至者分遣吏移給擇高地作舍以居民流民過取無征算轉行者賦粮質私牛而與之錢養男女棄於道者丁壯則役其力凡所活二十五萬加集賢校理提㸃河東刑獄宋史黄廉傳蘇軾知徐州河決曹村泛於梁山泊溢於南清河滙於城下漲不能洩城將敗富民争出避水軾曰富民出民皆動揺吾誰與守吾在是水決不能敗城驅使復入軾詣武衛營呼卒長曰河將害城事急矣雖禁軍且為我盡力卒長曰太守猶不避塗潦吾儔小人當效命率其徒持畚鍤以出築東南長隄首起戲馬臺尾屬於城兩日夜不止城不沈者三版軾廬於其上過家不入使官吏分堵以守卒全其城請復調來嵗夫增築故城為木岸以虞水之再至朝廷従之宋史蘇軾傳熙寧十年河決澶州北道斷絶河流南徙東滙於梁山張澤濼分為二派一合南清河入於淮一合北清河入於海南清入淮即今沂泗南流由徐邳入淮之道宋元以來未之有改也北道自張秋決塞河不復來而入淮一水遂受河之委倏南倏北去海數百里間而竭國家之力不能制而一之也穀山筆麈宋神宗元豐元年四月丙寅決口塞詔改曹村埽曰靈平五月甲戍新隄成閉口斷流河復歸北初議塞河也故道堙而高水不得下議者欲自夏津縣東開簽河入董固以䕶舊河袤七十里九十步又自張村埽直東築隄至龎家莊古隄袤五十里二百步詔樞蜜都承㫖韓縝相視縝言漲水衝刷新河己成河道河勢變移無常雖開河就隄及於河身剏立生隄枉費功力惟增修新河乃能經久詔可十一月都水監言自曹村決溢諸埽無復儲蓄乞給錢二十萬緡下諸路以時市梢草封樁詔給十萬緡非朝㫖及埽岸危急毋得擅用宋史河渠志五月甲戍朔賜塞河役死家錢宋史神宗本紀章丘河水溢壊公私廬舍宋史五行志宋神宗元豐二年七月戊子范子淵言因䕶黄河岸畢工乞中分為兩埽詔以廣武上下埽為名宋史河渠志宋神宗元豐三年七月庚午澶州孫村陳埽及大吳小吳埽決詔外監丞司速修閉初河決澶州也北外監丞陳祐甫謂商胡決三十餘年所行河道填淤漸高隄防嵗增未免泛濫今當修者有三商胡一也横隴二也禹舊迹三也然商胡横隴故道地勢高平土性疏惡皆不可復復亦不能持乆惟禹故瀆尚存在大伾太行之間地卑而勢固故祕閣校理李垂與今知深州孫民先皆有修復之議望召民先同河北漕臣一員自衞州王供埽按視訖於海口従之宋史河渠志張問提㸃河北刑獄大吳決議築小吳問言曹村小吳南北相直而曹村當水衝賴小吳隄薄水溢北出故南堤無患若築小吳則左強而右傷南岸且決水並京畿為害獨可於孫吳兩埽間起隄以備之耳詔付水官議久不決小吳卒潰徙江東淮南轉運復為河北轉運河再決議者欲調京東民三十萬自澶築隄抵乾寧問言隄未能為益災傷之餘力役勞民非計也神宗従之入為度支副使宋史張問傳宋神宗元豐四年四月澶州臨河縣小吳河溢北流漂溺居民宋史五行志四月小吳埽復大決自澶注入御河恩州危甚六月戊午詔東流已填淤不可復將來更不修閉小吳決口候見大吳歸納應合修立隄防令李立之經畫以聞帝謂輔臣曰河之為患久矣後世以事治水故常有礙夫水之趨下乃其性也以道治水則無違其性可也如能順水所向遷徙城邑以避之復有何患雖神禹復生不過如此輔臣皆曰誠如聖訓河北東路提㸃刑獄劉定言王莽河一徑水自大名界下合大流注冀州及臨清徐曲御河決口恩州趙村壩子決口兩徑水亦注冀州城東若遂成河道即大流難以西傾全與李垂孫民先所論違背望早經制詔送李立之八月壬午立之言臣自決口相視河流至乾寧軍分入東西兩塘次入界河於劈地口入海通流無阻宜修立東西隄詔覆計之而言者又請自王供埽上添修南岸於小吳口北創修遥隄候將來礬山水下決王供埽使直河注東北於滄州界或南或北従故道入海不従九月庚子立之又言北京南樂館陶宗城魏縣淺口永濟延安鎮瀛州景城鎮在大河兩隄之間乞相度遷於隄外於是用其說分立東西兩隄五十九埽定三等向著河勢正著隄身為第一河勢順流隄下為第二河離隄一里内為第三退背亦三等隄去河最逺為第一次逺者為第二次近一里以上為第三立之在熙寧初己主立隄今竟行其言宋史河渠志宋神宗元豐五年正月已丑詔立之凡為小吳決口所立隄防可按視河勢向背應置埽處毋虛設巡河官毋横費工料六月河溢北京内黄埽七月決大吳埽隄以紓靈平下埽危急八月河決鄭州原武埽溢入利津陽武溝刁馬河歸納梁山濼詔曰原武決口已引奪大河四分以上不大治之將貽朝廷巨憂其輟修汴河隄岸司兵五千併力築隄修閉都水復言兩馬頭墊落水面闊二十五步天寒乞候來春施工至臘月竟塞云九月河溢滄州南皮上下埽又溢清池埽又溢永静軍阜城下埽十月辛亥提舉汴河隄岸司言洛口廣武埽大河水漲塌岸壊下牐斗門萬一入汴人力無以枝梧密邇都城可不深慮詔都水監官速往䕶之丙辰廣武上下埽危急詔救䕶尋獲安定宋史河渠志是年秋陽武原武二縣河決壊田廬本紀八月戊寅河決原武相州漳河決溺臨漳縣居民又磁州諸縣鎮夏伏漳釜河水泛濫臨漳縣斛律口決壊官私廬舍傷田稼宋史五行志九月癸卯滑州河水溢十月辛亥洛口廣武大河溢十二月辛酉塞原武決河宗史神宗本紀宋神宗元豐七年七月北京館陶河溢入府城壊官私廬舍八月趙邢洺磁相諸州河水泛溢壊城郭軍營宋史五行志七月甲辰河溢元城埽決横隄破北京帥臣王拱辰言河水暴至數十萬衆號叫求救而錢穀稟轉運常平歸提舉軍器工匠隸提刑埽岸物料兵卒即屬都水監逐司在逺無一得專倉卒何以濟民望許不拘常制詔事干機速奏覆牒稟所屬不及者如所請戊申命拯䕶陽武埽十月冀州王令圗奏大河行流散漫河内殊無𦂳流旋生灘磧宜近澶州相視水勢使還復故道會明年春宫車晏駕大抵熙寧初專欲導東流閉北流元豐以後因河決而北議者始欲復禹故迹神宗愛惜民力思順水性而水官難其人王安石力主程昉范子淵故二人尤以河事自任帝雖藉其才然每抑之其後元祐元年子淵己改司農少卿御史吕陶劾其修隄開河縻費巨萬䕶隄壓埽之人溺死無數元豐六年興役至七年功用不成乞行廢放於是黜知兖州尋降知峽州其制略曰汝以有限之材興必不可成之役驅無辜之民置之必死之地中書舍人蘇軾詞也宋史河渠志李周提㸃京西刑獄時方興水利或請釃湍河為六渠以益鉗廬陂水度用工八十萬周曰湍河原高委下捍以隄猶患決溢若又導之必致為害乃疏言渠成未可必而費已不貲盍姑鑿其一而試之倘可以足用行之渠卒無功明年河溢鄧城幾没始思其議竟以直道罷判西京國子監宋史李周傳魯有開知衞州水災人乏食擅貸常平錢粟與之且奏乞蠲其息徙冀州増隄或謂郡無水患何以役為有開曰預備不虞古之善計也卒成之明年河決水果至不能冒隄而止朝廷遣使河北民遮誦其功狀召為膳部郎中元祐中歴知信陽軍宋史魯有開傳韓璹知澶州坐失舉降太常少卿河決晝夜扞禦神宗念其勞復改官大中大夫宋史韓璹傳年按有開璹二事不知在何姑置於此惟忠為留都大管勾汴河使建議以為渠有廣狹若水闊而行緩則沙伏而不利於舟請即其廣處束以木岸三司以為不便後卒用其議宋史符惟忠傳附按惟忠與富弼同時亦置於此宋神宗元豐八年三月哲宗即位宣仁聖烈皇后垂簾河流雖北而孫村低下夏秋霖雨漲水往往東出小吳之決既未塞十月又決大名之小張口河北諸郡皆被水災知澶州王令圗建議濬迎陽埽舊河又於孫村金隄置約復故道本路轉運使范子奇仍請於大吳北岸修進鋸牙擗約河勢於是回河東流之議起宋史河渠志喬執中提㸃京西北路刑獄時河決廣武埽危甚相聚莫敢登執中不顧立其上衆隨之如蟻附不日埽成元祐初為吏部郎中宋史喬執中傳李南公為河北轉運副使先是知澶州王令圖請開迎陽埽舊河於孫村置約回水東注南公與范子奇以為可行且欲於大吳北進鋸牙約河勢歸故道朝廷命使者行視兩人復以前議為非云迎陽下瞰京師孫村水勢不便又為御史所論詔罰金加直袐閣知延安府宋史李南公傳哲宗立絳為北京留守河決小吳都水議傍魏城鑿渠東趨金隄役甚棘絳言功不可成徒耗費國力而使魏人流徙非計也三奏乞罷之元祐二年以司空檢校太尉致仕宋史絳傳韓趙挺之通判德州魏境河屢決議者欲徙宗城縣轉運使檄挺之往視挺之云縣距高原千歲矣水未嘗犯今所遷不如舊必為民害使者卒徙之財二年河果壊新城漂居民略盡召試館職為祕閣校理宋史趙挺之傳宋哲宗元祐元年二月辛酉以河決大名壊民田艱食者詔安撫使韓絳賑之宋史哲宗本紀二月乙丑詔未得雨澤權罷修河放諸路兵夫九月丁丑詔祕書監張問相度河北水事十月庚寅又以王令圗領都水同問行河十一月丙子問言臣至滑州決口相視迎陽埽至大小吳水勢低下舊河淤仰故道難復請於南樂大名埽開直河并簽河分引水勢入孫村口以觧北京向下水患令圗亦以為然於是減水河之議復起既従之矣會北京留守韓絳奏引河近府非是詔問别相視宋史河渠志初元豐中河決小吳北注界河東入於海神宗詔東流故道淤高理不可回其勿復塞乃開大吳以䕶北都至是都水王令圗請還河故道下執政議瞻曰自河決已八年未有定論今遽興大役役夫三十萬用木二千萬臣竊憂焉朝廷方遣使相視若以東流未便宜急従之若以為可回宜為數嵗之計以緩民力議者又謂河入界河而北則失中國之險昔澶淵之役非河為限則北兵不止瞻曰王者恃德不恃險昔堯舜都蒲冀周漢都咸鎬皆歴年數百不聞以河障外國澶州之役蓋廟社之靈章聖之德將相之智勇故敵帥授首豈獨河之力哉後使者以東流非便水官復請塞北流瞻固争之卒詔罷役如曕所議宋史趙瞻傳初河決小吳議者欲自孫村口導還故處及是役興常言京東河北饑困不宜導河詔罷之宋史李常傳宋哲宗元祐二年二月令圗問欲必行前説朝廷又従之三月令圗死以王孝先代領都水亦請如令圗議右司諌王覿言河北人戸轉徙者多朝廷責郡縣以安集空倉廩以振濟又遣專使察視之恩德厚矣然耕耘之時而流轉於道路者不已二麥將熟而寓食於四方者未還其故何也盍亦治其本矣今河之為患三泛濫渟滀漫無涯涘吞食民田未見窮已一也緣邊漕運獨賴御河今御河淤澱轉輸艱梗二也塘泊之設以限南北濁水所經即為平陸三也欲治三患在遴擇都水轉運而責成耳今轉運使范子奇反覆求合都水使者王孝先暗繆望别擇人時知樞密院事安燾深以東流為是兩疏言朝廷久議回河獨憚勞費不顧大患蓋自小吳未決以前河入海之地雖屢變易而盡在中國故京師恃以北限彊敵景徳澶淵之事可驗也且河決每西則河尾每北河流既益西決固已北抵境上若復不止則南岸遂屬遼界彼必為橋梁守以州郡如慶歴中因取河南熟戸之地遂築軍以窺河外已然之效如此盖自河而南地勢平衍直抵京師長慮却顧可為寒心又朝廷捐東南之利半以宿河北重兵備預之意深矣使敵能至河南則邈不相及今欲便於治河而緩於設險非計也王巖叟亦言朝廷知河流為北道之患日深故遣使命水官相視便利欲順而導之以拯一路生靈於墊溺甚大惠也然昔者專使未還不知何疑而先罷議專使反命不知何所取信而議復興既敕都水使者總護役事調兵起工有定日矣已而復罷數十日間變議者再三何以示四方今有大害七不可不早為計北塞之所恃以為險者在塘泊黄河堙之猝不可濬浸失北塞險固之利一也横遏西山之水不得順流而下蹙溢於千里使百萬生齒居無廬耕無田流散而不復二也乾寧孤壘危絶不足道而大名深冀腹心郡縣皆有終不自保之勢三也滄州扼北敵海道自河不東流滄州在河之南直抵京師無有限隔四也并吞御河邊城失轉輸之便五也河北轉運司嵗耗財用陷租賦以百萬計六也六七月間河流交漲占没西路阻絶遼使進退不能兩朝以為憂七也非此七害委之可緩而未治可也且去嵗之患己甚前嵗今嵗又甚焉則奈何望深詔執政大臣早決河議而責成之太師文彥博中書侍郎呂大防皆主其說中書舍人蘇轍謂右僕射吕公著曰河決而北先帝不能回而諸公欲回之是自謂智勇勢力過先帝也盍因其舊而修其未備乎公著唯唯於是三省奏自河北決恩冀以下數州被患至今未見開修的確利害致妨興工乃詔河北轉運副使限兩月同水官講議聞奏十一月講議官皆言令圗問相度開河取水入孫村口還復故道處測量得流分尺寸取引不過其説難行十二月張景先復以問說為善果欲回河唯北京已上滑州而下為宜仍於孫村濬治横河舊隄止用逐埽人兵物料并年例客軍春夫漸為之可也朝廷是其說宋史河渠志大河北流宰相主水官議必欲回之東注燾以河流入濼淀久必淤淺恐河朔無以禦敵遂上言曰自小吳未決之前河雖屢徙而盡在中國故京師得以為北限今決而西則河尾益北如此不已將南岸遂屬敵界彼若建橋梁守以州郡窺兵河外可為寒心今水官之議不過論地形較功費而獻納之臣不考利害輕重徒便於治河而以設險為緩非至計也帝雖然之而回河之議紛起東北蕭然煩費功亦不就宋史安燾傳百祿改吏部侍郎都水王孝先議回河故道大防意向之命百祿行視百祿以東流高仰而河勢順下不可回即馳奏所以然之狀且取神宗詔令勿塞故道者并上之大防猶謂大河東流中國之險限今塘濼既壊界河淤淺河且北注矣百祿言塘濼有限寇之名無禦寇之實借使河徙而北敵始有下流之憂乃吾之利也先帝明詔具在奈何妄動搖之乃止俄兼侍讀進翰林學士宋史范百祿傳元祐初朝廷起回河之議未決而開河之役遽興詔言河朔秋潦水淫為災民人流徙賴發廩振贍思稍甦其生謂宜安之未可以力役傷也従之宋史王詔傳河性北流而矯之東以致中國疲敝文吕二公不無罪焉南河全考行水金鑑巻十二
