body:
  text: 行水金鑑卷十三江南按察使傅澤洪撰河水宋哲宗元祐三年六月戊戍詔黃河未復故道終為河北患王孝先等議巳嘗興役不可中罷宜接續工料向去決要回復故道三省樞密院速與商議施行右相范純仁言天下大勢惟人君所向羣下競趨如川流山擁小失其道非一言一力可回故居上者不可不謹今聖意巳有所向而為天下先矣乞諭執政前日降出文字却且進入免希合之臣妄測聖意輕舉大役尚書王存等亦言使大河決可東回而北流遂斷何惜勞民費財成經久之利今孝先等自未有必然之論但僥幸萬一以冀成功又預求免責若遂聽之將有噬臍之悔乞選公正近臣及忠實內侍覆行按視審度可否興工未晚庚子三省樞密院奏事延和殿文彥博吕大防安燾等謂河不東則失中國之險為契丹之利范純仁王存胡宗愈則以虛費勞民為憂太后曰且熟議明日純仁又畫四不可之說且曰北流數年未為大患而議者恐失中國之利先事回改正如頃西夏本不為邊患而好事者以為不取恐失機會遂興靈武之師也存宗愈亦奏昨親聞德音更令熟議然纍日猶有未同或令建議者結罪任責臣等本謂建議之人思慮有所未逮故乞差官覆按若但使之結罪彼所見不過如此後或誤事加罪何益臣非不知河決北流為患非一淤沿邊塘泊斷御河漕運失中國之險遏西山之流若能全回大河使由孫村故道豈非上下通願但恐不能成功為患甚於今日故欲選近臣按視若孝先之說決可成則積聚物料接續興役如不可為則令沿海踏行自恩魏以北塘泊以南别求可以疏導歸海去處不必專主孫村此亦三省共曽商量望賜詳酌存又奏自古惟有導河并塞河導河者順水勢自高導令就下塞河者為河隄決溢修塞令入河身不聞幹引大河令就高行流也於是收回戊戍詔書戶部侍郎蘇轍中書舍人曽肇各三上疏轍大略言黃河西流議復故道事之經嵗役兵二萬聚梢樁等物三十餘萬方河朔災傷困弊而興必不可成之功吏民竊歎今回河大議雖寢然聞議者固執來嵗開河分水之策今小吳決口入地巳深而孫村所開丈尺有限不獨不能回河亦必不能分水况黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理縱使兩河並行未免各立隄防其費又倍矣今建議者其說有三臣請折之一曰御河堙滅失饋運之利昔大河在東御河自懷衛經北京漸歷邊郡饋運既便商賈通行自河西流御河堙滅失此大利天實使然今河自小吳北行占壓御河故地雖使自北京以南折而東行則御河堙滅己一二百里何由復見此御河之說不足聽也二曰恩冀以北漲水為害公私損耗臣聞河之所行利害相半蓋水來雖有敗田破稅之害其去亦有淤厚宿麥之利况故道已退之地桑麻千里賦役全復此漲水之說不足聽也三曰河徙無常萬一自契丹界入海邊防失備按河昔在東自河以西郡縣與契丹接境無山河之限邊臣建為塘水以捍契丹之衝今河既西則西山一帶契丹可行之地無幾邊防之利不言可知然議者尚恐河復北徙則海口出契丹界中造舟為梁便於南牧臣聞契丹之河自北南注以入於海蓋地形北高河無北徙之道而海口深浚勢無徙移此邊防之說不足聽也臣又聞謝卿材到闕昌言黃河自小吳決口乘高注北水勢奔決上流隄防無復決怒之患朝廷若以河事付臣不役一夫不費一金十年保無河患大臣以其異已罷歸而使王孝先俞瑾張景先三人重畫回河之計蓋由元老大臣重於改過故假契丹不測之憂以取必於朝廷雖已遣百祿等出按利害然未敢保其不觀望風旨也願亟回收買梢草指揮來嵗勿調開河役兵使百祿等明知聖意無所偏係不至阿附以誤國計肇之言曰數年以來河北京東淮南災傷今嵗河北並邊稍熟而近南州軍皆旱京東西淮南饑殍瘡痍若來年雖未大興河役止令修治舊隄開減水河亦須調發丁夫本路不足則及鄰路鄰路不足則及淮南民力果何以堪民力未堪則雖有回河之䇿及梢草先具將安施乎會百祿等行視東西二河亦以為東流高仰北流順下決不可回即奏曰往者王令圗張問欲開引水簽河導水入孫村口還復故道議者疑焉故置官設屬使之講議既開撅井筒折量地形水面尺寸高下顧臨王孝先張景先唐義問陳祐之皆謂故道難復而孝先獨叛其說初乞先開減水河俟行流通快新河勢緩人工物料豐備徐議閉塞北流已而召赴都堂則又請以二年為期及朝廷詰其成功遽云來年取水入孫村口若河流順快工料有備便可閉塞回復故道是又不俟新河勢緩矣回河事大寧容異同如此蓋孝先俞瑾等知合用物料五千餘萬未有指擬見買數計經嵗未及毫釐度事理終不可為故為大言又云若失此時或河勢移背豈獨不可減水即永無回河之理臣等竊謂河流轉徙乃其常事水性就下固無一定若假以五年休養數路民力沿河積材漸濬故道葺舊隄一旦流勢改變審議事理釃為二渠分派行流均減漲水之害則勞費不大功力易施安得謂之一失此時永無回河之理宋史河渠志宋哲宗元祐四年正月癸未百祿等使回入對復言修減水河役過兵夫六萬三千餘人計五百三十萬工費錢糧三十九萬二千九百餘貫石匹兩收買物料錢七十五萬三百餘緡用過物料二百九十餘萬條束官員使臣軍大將凡一百一十餘員請給不與焉願罷有害無利之役那移工料繕築西隄以護南決口未報己亥乃詔罷回河及修減水河四月戊午尚書省言大河東流為中國之要險自大吳決後由界河入海不惟淤壞塘濼兼濁水入界河向去淺澱則河必北流若河尾直注北界入海則中國全失險阻之限不可不為深慮詔范百祿趙君錫條畫以聞百祿等言臣等昨按行黃河獨流口至界河又東至海口熟觀河流形勢并緣界河至海口鋪寨地分使臣各稱界河未經黃河行流已前闊一百五十步下至五十步深一丈五尺下至一丈自黃河行流之後今闊至五百四十步次亦三二百步深者三丈五尺次亦二丈乃知水性就下行疾則自刮除成空而稍深與前漢書大司馬史張戎之論正合自元豐四年河出大吳一向就下衝入界河行流勢如傾建經今八年不捨晝夜衝刷界河兩岸日漸開闊連底成空趨海之勢甚迅雖遇元豐七年八年元祐泛漲非常而大吳以上數百里終無決溢之害此乃下流歸納處河流深快之驗也塘濼有限遼之名無禦遼之實今之塘水又異昔時淺足以褰裳而涉深足以維舟而濟冬寒氷堅尤為坦途如滄州等處商胡之決即已澱淤今四十二年迄無邊警亦無人言以為深憂自回河之議起首以此動煩聖聽殊不思大吳初決水未有歸猶不北去今入海湍迅界河益深尚復何慮即令有此則中國據上游契丹豈不慮乘流擾之乎自古朝那蕭關雲中朔方定襄鴈門上郡太原右北平之間南北往來之衝豈塘濼界河之足限哉臣等竊謂本朝以來未有大河安流合於禹迹如此之利便者其畍河向去只有深闊加以朝夕海潮往來渲蕩必無淺澱河尾安得直注北界中國亦無全失險阻之理且河遇平壤灘慢行流稍遲則泥沙留淤若趨深走下湍激奔騰惟有刮除無由淤積不至上煩聖慮七月己已朔冀州南宮等五掃危急詔撥提舉修河司物料百萬與之甲午都水監言河為中國患久矣自小吳決後泛濫未著河槽前後遣官相度非一終未有定論以為北流無患則前二年河決南宮下掃去三年決上掃今四年決宗城中掃豈謂北流可保無虞以為大河卧東則南宮宗城皆在西岸以為卧西則冀州信都恩州清河武邑或決皆在東岸要是大河千里未見歸納經久之計所以昨相度第三第四鋪分決漲水少紓目前之急繼又宗城決溢向下包蓄不定雖欲不為東流之計不可得也河勢未可全奪故為二股之策今相視新開第一口水勢湍猛發泄不及己不候工畢更撥沙河隄第二口泄減漲水因而二股分行以紓下流之患雖未保冬夏常流己見有可為之勢必欲經久遂作二股仍較今所修利害孰為輕重有司具析保明以聞八月丁未翰林學士蘇轍言夏秋之交暑雨頻併河流暴漲出岸由孫村東行蓋每嵗常事而李偉與河掃使臣因此張皇以分水為名欲發回河之議都水監從而和之河事一興求無不可况大臣以其符合已說而樂聞乎臣聞河道西行孫村側左大約入地二丈以來今所報漲水出岸由新開口地東入孫村不過六七尺欲因六七尺漲水而奪入地二丈河身雖三尺童子知其難矣然朝廷遂為之遣都水使者興兵功開河道進鋸牙欲約之使東方河水甚漲其西行河道若不斷流則遏之東行實同兒戲臣願急命有司徐觀水勢所向依纍年漲水舊例因其東溢引入故道以紓北京朝夕之憂故道隄防壞決者第略加修葺免其決溢而已至於開河進約等事一切毋得興功俟河勢稍定然後議不過一月漲水既落則西流之勢決無移理兼聞孫村出岸漲水今已斷流河上官吏未肯奏知耳是時吳安持與李偉力主東流而謝卿材謂近嵗河流稍行地中無可回之理上河議一編召赴政事堂會議大臣不以為然癸丑三省樞密院言繼日霖雨河上之役恐煩聖慮太后曰訪之外議河水已東復故道矣乙丑李偉言已開撥北京南沙河直隄第三鋪放水入孫村口故道通行又言大河已分流即更不須開淘因昨來一決之後東流自是順快渲刷漸成淃道見今已為二股約奪大河三分以來若得夫二萬於九月興工至十月寒凍時可畢因引導河勢豈止為二股通行而已亦將遂為回奪大河之計今來既因劈拶東流修全鋸牙當迤邐增進一掃而取一掃之利比至來年春夏之交遂可全復故道朝廷今日當極力必閉北流乃為上䇿若不明詔有司即令回河深恐上下遷延議終不決觀望之間遂失機㑹乞復置修河司從之宋史河渠志是年夏秋霖雨河流泛漲宋史五行志宋哲宗元祐五年正月丁亥梁燾言朝廷治河東流北流本無一偏之私今東流未成邉北州縣未至受患其役可緩北流方悍邊西州縣日夕可憂其備宜急今傾半天下之力專事東流而不加一夫一草於北流之上得不誤國計乎去年屢決之害全由隄防無備臣願嚴責水官修治北流掃岸使二方均被惻隱之恩二月已亥詔開修減水河辛丑乃詔三省樞密院去冬愆雪今未得雨外路旱暵闊逺宜權罷修河戊申蘇轍言臣去年使契丹過河北見州縣官吏訪以河事皆相視不敢正言及今年正月還自契丹所過吏民方舉手相慶皆言近有朝㫖罷回河大役命下之日北京之人歡呼鼓舞惟減水河役遷延不止耗蠧之事十存四五民間竊議意大臣業已為此勢難遽回既為聖鑒所臨要當迤邐盡罷今月六日果䝉聖旨以旱災為名權罷修黃河候今秋取旨大臣覆奏盡罷黃河東北流及諸河工役民方憂旱聞命踊躍實荷聖恩然臣竊詳聖旨上合天意下合民心因水之性功力易就天語激切中外聞者或至泣下而大臣奉行不得其平由此觀之則是大臣所欲雖害物而必行陛下所為雖利民而不聽至於委曲回避巧為之說僅乃得行君權已奪國勢倒植臣所謂君臣之間逆順之際大為不便者此事是也黃河既不可復回則先罷修河司只令河北轉運司盡將一道兵功修貼北流隄岸罷吳安持李偉都水監差遣正其欺罔之罪使天下曉然知聖意所在如此施行不獨河事就緒天下臣庶自此不敢以虛誑欺朝廷弊事庶幾漸去矣八月甲辰提舉東流故道李偉言大河自五月後日益暴漲始由北京南沙隄第七鋪決口水出於第三第四鋪并清豐口一併東流故道河槽深三丈至一丈以上比去年尤為深快頗減北流橫溢之患然今己秋深水當減落若不少加措置慮致斷絶即東流遂成淤澱望下所屬官司經畫沙隄等口分水利害免淤故道上誤國事詔吳安持與本路監司北外丞司及李偉按視具合措置事連書以聞九月中丞蘇轍言修河司若不罷李偉若不去河水終不得順流河朔生靈終不得安居乞速罷修河司及檢舉宋史河渠志宋哲宗元祐六年四月庚子敕竄責李偉宋史河渠志堯俞為吏部侍郎水官李偉議大河可從孫村導之還故道堯俞言河事雖不可億度然比遣使按之皆言非便而偉又繆悠不肯任責豈可以遽興大役朝廷遂置偉議進吏部尚書兼侍讀宋史傅堯俞傳宋哲宗元祐七年三月以吏部郎中趙稱權河北轉運使稱素與安持等議不協嘗上河議其略曰自頃有司回河幾三年功費騷動半天下復為分水又四年矣故所謂分水者因河流相地勢導而分之今乃橫截河流置掃約以扼之開濬河門徒為淵潭其狀可見况故道千里其間又有高處故纍嵗漲落輒復自斷夫河流有逆順地勢有高下非朝廷可得而見職在有司朝廷任之亦信矣患有司不自信耳臣謂當繕大河北流兩隄復修宗城棄隄閉宗城口廢上下約開闞村河開使河流湍直以成深道聚三河工費以治一河一二年可以就緒而河患庶幾息矣願以河事并都水條例一付轉運司而總以工部罷外丞司使措置歸一則職事可舉弊事可去四月詔南北外兩丞司管下河掃今後令河北京西轉運使副判官府界提㸃分認界至內河北仍於銜內帶兼管南北外都水公事十月辛酉以大河東流賜都水使者吳安持三品服北都水監丞李偉再任宋史河渠志龍今水學云禹河從勃碣入海此故道也宋景德景兩決橫隴為大河之經流慶歷又決商胡橫隴斷絶商胡決河自魏至恩冀乾寧入海是謂北流嘉祐河流派别於魏之第六掃遂為二股自魏恩東至德滄入海是謂東流主東流者文彥博吳安持等主北流者歐陽修蘇轍等盈庭聚訟逮後東流斷絶河竟北流矣宋哲宗元祐八年二月乙卯三省奉旨北流軟堰並依都水監所奏門下侍郎蘇轍奏臣嘗以謂軟堰不可施于北流利害甚明蓋東流本人力所開闊止百餘步冬月河流斷絶故軟堰可為今北流是大河正溜比之東流何止數倍見今河水行流不絶軟堰何由能立蓋水官之意欲以軟堰為名實作硬堰隂為回河之計耳朝廷既己覺其意則軟堰之請不宜復從趙稱亦上議曰臣竊謂河事大利害有三而言者互進其說或見近忘逺徼幸盜功或取此捨彼譸張昧理遂使大利不明大害不去上惑朝聽下滋民患橫役枉費殆無窮己臣切痛之所謂大利害者北流全河患水不能分也東流分水患水不能行也宗城河決患水不能閉也是三者去其患則為利未能去則為害今不謀此而議欲專閉北流止知一日可閉之利而不知後日既塞之患止知北流伏槽之水易為力而不知闞村方漲之勢未可併以入東流也夫欲合河以為利而不恤上下壅潰之害是皆見近忘逺徼幸盜功之事也有司欲斷北流而不執其咎乃引分水為說姑為軟堰知河衝之不可以軟堰禦則又為決堰之計臣恐枉有工費而以河為戲也請俟漲水伏槽觀大河之勢以治東流北流五月水官卒請進梁村上下約東狹河門既涉漲水遂壅而潰南犯德清西決內黃東淤梁村北出闞村宗城決口復行魏店北流因淤遂斷河水四出壞東郡浮梁十二月丙寅監察御史郭知章言臣比緣使事至河北自澶州入北京渡孫村口見水趨東者河甚闊而深又自北京往洺州過楊家淺口復渡見水之趨北者才十之二三然後知大河宜閉北行東乞下都水監相度于是吳安持復兼領都水即建言近準朝旨已堰斷魏店剌子向下北流一枝斷絶然東西未有堤岸若漲水稍大必披灘漫出則平流在北京恩州界為害愈甚乞塞梁村口縷張包口開青豐口以東雞爪河分殺水勢呂大防以其與已意合向之詔同北京留守相視時范純仁復為右相與蘇轍力以為不可遂降旨令都水監與本路安撫轉運提刑司共議可則行之有異議速以聞紹聖元年正月也是時轉運使趙稱深不以為然提刑上官均頗助之稱之言曰河自孟津初行平地必須全流乃成河道禹之治水自冀北抵滄棣始播為九河以其近海無患也今河自橫隴六塔商胡小吳百年之間皆從西決蓋河徙之常勢而有司置掃創約橫截河流回河不成因為分水初決南宮再決宗城三決內黃亦皆西決則地勢西下較然可見今欲弭息河患而逆地勢戾水性臣未見其能就功也請開闞村河門修平鄉巨鹿掃焦家等隄濬澶淵故道以備漲水大名安撫使許將言度今之利若舍故道止從北流則慮河下巳湮而上流橫潰為害益廣若直閉北流東徙故道則復慮受水不盡而被隄為患竊謂宜因梁村之口以行東因內黃之口以行北而盡閉諸口以絶大名諸州之患俟春夏水大至乃觀故道足以受之則內黃之口可塞不足以受之則梁村之役可止定其成議則民心固而河之順復有時可以保其無害許將本傳略同時黃河東北二議未決故將言之詔令吳安持同都水監丞鄭佑與本路安撫轉運提刑司官具圗狀保明聞奏即有未便亦具利害來上三月癸酉監察御史郭知章言河復故道水之趨東已不可遏近日遣使按視逐司議論未一臣謂水官朝夕從事河上望專委之知章本傳云知章為監察御史哲宗親政上言大河東北分流生靈被害今水之趨東者己不可遏順而導之閉北而行東其利百倍遷殿中侍御史知章之意與許將同而將猶持兩可乙亥呂大防罷相六月右正言張商英奏言元豐間河決南宮口講議纍年先帝歎曰神禹復生不能回此河矣乃敕自今後不得復議回河閉口蓋採用漢人之論俟其泛濫自定也元祐初文彥博呂大防以前敕非是拔吳安持為都水使者委以東流之事京東河北五百里內差夫五百里外出錢雇夫及支借常平倉司錢買梢草斬伐榆栁凡八年而無尺寸之效乃遷安持太僕卿王宗望代之宗望至則劉奉世猶以彥博大防餘意力主東流以梁村口吞納大河今則梁村口淤澱而開沙堤兩處決口以泄水矣前議纍七十里堤以障北流今則云俟霜降水落興工矣朝廷咫尺不應九年為水官蔽欺如此九年之內年年礬山水漲霜降水落豈獨今年始有漲水而待水落乃可以興工耶乞遣使按驗虛實取索回河以來公私費錢糧梢草依仁宗朝六塔河施行㑹七月辛丑廣武掃危急詔王宗望亟往救護壬寅帝謂輔臣曰廣武去洛河不逺須防漲溢下灌京師已遣中使視之輔臣出圗狀以奏曰此由黃河北岸生灘水趨南岸今雨止河必減落已下水官與洛口官同行按視為簽堤及去北岸嫩灘令河順直則無患矣八月丙子權工部侍郎吳安持等言廣武掃危急刷塌堤身二千餘步處地形稍高自鞏縣東七里店至見今洛口約不滿十里可以别開新河引導河水近南行流地步至少用功甚微王宗望行視并開井筒各稱利便外其南築大堤工力浩大乞下各屬官司躬往相度保明從之十月丁酉王宗望言大河自元豐潰決以來東北兩流利害極大頻年紛爭國論不決水官無所適從伏自奉詔凡九月上稟成算自闞村下至栲栳堤七節河門並皆閉塞築金堤七十里盡障北流使全河東還故道以除河患又自闞村下至海口補築新舊堤防增修疏濬河道之淤淺者雖盛夏漲潦不至壅決望付史官紀紹聖以來聖明獨斷致此成績詔宗望等具析修閉北流部役官等功力等第以聞然是時東流堤防未及繕固瀕河多被水患流民入京師往往泊御廊及僧舍詔給劵諭令還本土以就振濟已酉安持又言準朝旨相度開濬澶州故道分減漲水按澶州本是河行舊道頃年曽乞開修時以東西地形高仰未可興工欲乞且行疏導燕家河仍令所屬先次計度合增修一十一掃所用工料詔令都水監候來年將及漲水月分先具利害以聞癸丑三省樞密院言元豐八年知澶州王令圗議乞修復大河故道元祐四年都水使者吳安持因紓南宮等掃危急遂就孫村口為回河之䇿及梁村進約東流孫村口窄狹德清軍等處皆被水患今春王宗望等雖于內黃下掃閉斷北流然至漲水之時猶有三分水勢而上流諸掃已多危急下至將陵掃決壞民田近又據宗望等奏大河自閉塞闞村而下及創築新堤七十餘里盡閉北流全河之水東還故道今訪聞東流向下地形已高水行不快既閉斷北流將來盛夏大河漲水全歸故道不惟舊堤損缺怯薄而闞村新堤亦恐未易枝梧兼京城上流諸處掃岸慮有壅滯衝決之患不可不豫為經畫詔權工部侍郎吳安持都水使者王宗望監丞郭祐同北外監丞司自闞村而下直至海口逐一相視增修疏濬不致壅滯衝決丙辰張商英又言今年已閉北流都水監長二交章稱賀或乞付史官則是河水已歸故道止宜修緝堤掃防將來衝決而已近聞王宗望李仲却欲開澶州故道以分水吳安持乞候漲水前相度緣開澶州故道若不與今東流底平則才經水落立見淤塞若與底平則從初自合閉口回河何用九年費財動衆安持稱候漲水相度乃是悠悠之談前來漲水并今來漲水各至澶州德清軍界安持首尾九年豈得不見更欲延至明年乃是狡兔三穴自為潛身之計非公心為國事也况立春漸近調夫如是時不早定議又留後說邦財民力何以支持訪聞先朝水官孫民先元祐六年水官賈種民各有河議乞取索照㑹召前後本路監司及經歷河事之人與水官詣都堂反覆詰難務取至當經久可行定議歸一庶免以有限之財事無涯之功宋史河渠志是年河入德清軍決內黃口宋史哲宗本紀曽孝廣為北外都水丞元祐中大臣議復河故道召孝廣問之言不可出通判保州久之復為都水丞入為水部員外郎河決內黃詔孝廣行視遂疏蘇村鑿巨野導河北流紓澶滑深瀛之害遷都水使者洛水頻歲湓涌浸齧北岸孝廣按河隄得廢渡口遺迹曰此昔人所以殺水勢也即日復決之纍石為防自是無水患提㸃永興路刑獄宋史曽孝廣傳馬默為河北都轉運使初元豐間河決小吳因不復塞縱之北流元祐議臣以為東流便水官遂與之合默與同時監司上議以北流為便御史郭知章復請從東流于是作東西馬頭約水復故道為長堤壅河之北流者勞費甚大明年復決而北竟不能使之東宋史馬默傳行水金鑑卷十三
