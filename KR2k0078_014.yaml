body:
  text: 行水金鑑卷十四江南按察使傅澤洪撰河水宋哲宗紹聖元年冬十月丁酉河北流十二月巳丑漳河決溢浸洺磁等州令計置堙塞宋史哲宗本紀至熙寧導東流而北流閉是河竟北流至元符二年東流遂斷絶宋哲宗紹聖二年秋七月庚戌河北流漲沒民田廬遣官振之宋史哲宗本紀七月戊午詔沿黃河州軍河防決溢並即申奏宋史河渠志紹聖末都水使者議建廣武四掃石岸朝廷命先治岸數十步以驗其可否黃流湍悍役人多死一方甚病功不可成而使者申前說愈力文瓘條别利害罷其役宋史謝文瓘𫝊宋哲宗元符元年澶州河溢冬十月丁酉以河北京東河溢遣官振恤宋史哲宗本紀宋哲宗元符二年二月乙亥北外都水丞李偉言相度大小河門乘此水勢衰弱並先修閉各立蛾眉掃鎮壓乞次於河北京東兩路差正夫三萬人其他夫數令修河官和雇三月丁已偉又乞於澶州之南大河身內開小河一道以待漲水紓解大吳口下注北京一帶向著之患並從之六月末河決內黃口東流遂斷絶八月甲戍詔大河水勢十分北流其以河事付轉運司責州縣共力救護隄岸辛丑左司諫王祖道請正吳安持鄭佑李仲李偉之罪投之逺方以明先帝北流之志詔可宋史河渠志六月久雨河北大水河溢漂人民壞廬舍宋史五行志十二月壬辰詔河北黃河退灘地聽民耕墾免租稅三年宋史哲宗本紀先是治平二年始命都水監浚二股五股河以紓恩冀之患熙寧二年從宋昌言程昉議開二股以導東流裁及六分而北流閉河自其南四十里東決泛濫大名恩德滄永靜五州軍境三年令河北轉運司開修二股上流四年北京新堤第四第五掃決下屬恩冀貫御河五年二股河成深十一尺廣四百尺而新隄決口亦塞又以水或橫決散漫常虞遏壅命范子淵于第四第五掃開修直河使大河還二股故道十年大決於澶州之曹村今在開州西南河道南徙東滙于梁山張澤濼分為二派一合南清河入淮一合北清河入海凡灌郡縣四十五而濮濟鄆齊尤甚壞田逾三十萬頃元豐元年決口塞詔改曹村掃曰靈平四年澶州小吳掃大決河復注御河詔東流已填淤不可復將來更不修閉元祐中復議回河久之不決而紹聖初吳安持李偉卒行之然東流堤防未固瀕河多被水患元符二年河決內黃口東流斷絶詔大河水勢十分北流其共力救護隄岸是後不復開二股矣漳水故禹河也清河行漳水之南大河故瀆之北去禹河最近治河者欲復禹舊迹莫如導黃河入白溝以人力為之其可也而况商胡自决北流通快海口廣深此誠千載一遇因禍而為福轉敗而為功在此時矣為當日計但能于魏恩冀滄之境寬立隄防約欄水勢疏其壅積遏其衝要則此河雖不逮禹功猶得比王景之所治千年可以無患而朝議紛紜必欲回河使東六塔既敗二股更興至元豐四年河又北流而神宗之意怠矣王安石委任程昉范子淵濬川之杷幾于以河為戲陳祐甫援李垂之䇿請復西河故瀆帝愛惜民力亦莫之許也哲宗即位復議回河大略謂河尾北向恐入契丹之地則其界踰河而南彼必為橋梁守以州郡中國全失險阻而蘇轍駮之以為契丹之河南注于海地形北高河無北徙之道而海口深浚勢無徙移范百祿亦云界河向去深闊加以朝夕海潮往來渲蕩必無淺澱河尾安得直注北界是亦足以解其惑已而紹聖諸臣力主東流閉斷北口蓋借河事以伸其紹述之說意不在河更無足論元符二年河復決而北地勢可知而建中靖國初猶有獻東流之議者蜩螳沸羮一唱百和自慶歷以來五十餘年凡發言盈庭之日皆坐失機㑹之日也卒委其地于金源氏而河益南徙濬滑汲胙之間化為平陸豈不惜哉禹貢錐指宋哲宗元符三年正月已卯徽宗即位鄭佑吳安持輩皆用登極大赦次第牽復中書舍人張商英繳奏佑等昨主回河皆違神宗北流之意不聽商英又嘗論水官非其人治河當行其所無事一用堤障猶塞兒口止其啼也三月乃以商英為龍圗閣待制河北都轉運使兼專功提舉河事商英復陳五事一曰行古沙河口二曰復平恩四掃三曰引大河自古漳河浮河入海四曰築御河西隄而開東堤之積五曰開朩門口泄徒駭河東流大要欲隨地勢疏濬入海㑹四月河決蘇村七月詔商英毋治河止釐本職其因河事差辟官吏並罷復置北外都水丞司宋史河渠志宗武第進士韓忠彥鎮瀛州辟為河間令值河溢增堤護城吏率兵五百伐材近郊雖葬木亦不免父老遮道泣宗武入府白罷之徽宗即位為祕書丞宋史韓宗武傳宋徽宗建中靖國元年春尚書省言自去夏蘇村漲水後來全河漫流今已淤高三四尺宜立西堤詔都水使者魯君貺同北外丞司經度之于是左正言任伯雨奏河為中國患二千歲矣自古竭天下之力以事河者莫如本朝而狥衆人偏見欲屈大河之勢以從人者莫甚于近世臣不敢逺引祇如元祐末年小吳決溢議者乃譎謀異計欲立竒功以邀厚賞不顧地勢不念民力不惜國用力建東流之議當洪流中立馬頭設鋸齒梢芻材木耗費百倍力遏水勢使之東注陵虛駕空非特行地上而已增堤益防惴惴恐決澄沙淤泥久益高仰一旦決潰又復北流此非堤防之不固亦理勢之必至也昔禹之治水不獨行其所無事亦未嘗不因其變以導之蓋河流混濁泥沙相半流行既久迤邐淤澱則久而必決者勢不能變也或北而東或東而北亦安可以人力制哉為今之䇿正宜因其所向寬立堤防約攔水勢使不至大假漫流若恐北流淤澱塘泊亦祇宜因塘泊之岸增設堤防乃為長䇿風聞近日又有議者獻東流之計不獨比年災傷居民流散公私匱竭百無一有事勢窘急固不可為抑亦自高注下湍流奔猛潰決未久勢不可改設若興工公私徒耗殆非利民之舉實自困之道也宋史河渠志宋崇寧二年嶽飛生未彌月河決內黃水暴至母姚抱飛坐甕中衝濤及岸得免人異之宋史嶽飛傳一按飛死於紹興十年辛酉飛年三十九逆數至徽宗崇寧二年癸未乃飛所生之年也宋徽宗崇寧三年十月臣僚言昨奉詔措置大河即由西路歷㳂邊州軍回至武強縣循河堤至深州又北下衡水縣乃達于冀又北渡河過逺來鎮及分遣屬僚相視恩州之北河流次第大抵水性無有不下引之就高決不可得况西山積水勢必欲下各因其勢而順導之則無壅遏之患詔開修直河以殺水勢宋史河渠志宋徽宗崇寧四年二月工部言乞修蘇村等處運糧河堤為正堤以支漲水較修棄堤直堤可減工四十四萬料七十一萬有奇從之閏二月尚書省言大河北流合西山諸水在深州武強瀛州樂壽掃俯瞰雄霸莫州及㳂邊塘濼萬一決溢為害甚大詔增二掃堤及儲蓄以備漲水是嵗大河安流宋史河渠志宋徽宗崇寧五年二月詔滑州繫浮橋于北岸仍築城壘置官兵守護之八月葺陽武副堤宋史河渠志杜常崇寧中至工部尚書以龍圗閣學士知河陽軍大河決直州西上掃勢危甚常親護役徙處掃上掃潰水溢及常坐而止於是役人盡力河流遂退郡賴以安宋史杜常傳宋徽宗大觀元年二月詔於陽武上掃第五鋪開修直河至第十五鋪以分減水勢有司言河身當長三千四百四十步面闊八十尺底闊五丈深七尺計役十萬七千餘工用人夫三千五百八十二凡一月畢從之十二月工部員外郎趙霆言南北兩丞司合開直河者凡為里八十有七用緡錢八九萬異時成功可免河防之憂而省久逺之費詔從之宋史河渠志是年京東水河溢宋史徽宗本紀是年夏大水河北京西河溢漂溺民戶宋史五行志宋徽宗大觀二年五月霆上免夫之議大略謂黃河調發人夫修築掃岸每歲春首騷動數路常至敗家破産今春滑州魚池掃合起夫役嘗令送免夫之直用以買土增貼掃岸比之調夫反有贏餘乞詔有司應堤掃合調春夫並依此例立為永法詔曰河防夫工嵗役十萬濱河之民困于調發可上户出錢免夫下户出力充役其相度條畫以聞丙申邢州言河決陷巨鹿縣詔遷縣于高地又以趙州隆平下濕亦遷之六月已卯都水使者吳玠言自元豐間小吳口決北流入御河下合西山諸水至清州獨流寨三義口入海雖深得保固形勝之䇿而嵗月寖久侵犯塘堤衝壞道路齧損城寨臣奉詔修治隄防禦捍漲溢然築八尺之堤當九河之尾恐不能敵若不遇有損缺逐旋增修即又至隳壞使與塘水相通于邊防非計也乞降旨修葺從之庚寅冀州河溢壞信都南宮兩縣宋史河渠志是年八月辛已邢州河水溢壞民廬舍復被水者家宋史徽宗本紀是年秋黃河決陷沒邢州巨鹿縣宋史五行志宋徽宗大觀三年六月庚寅冀州河水溢宋史徽宗本紀是年八月詔沈純誠開兔源河兔源在廣武掃對岸分減掃下漲水也宋史河渠志是年河決清河淮安府志宋徽宗政和四年十一月都水使者孟昌齡言今嵗夏秋漲水河流上下並行中道滑州浮橋不勞解折大省嵗費詔許稱賀官吏推恩有差昌齡又獻議導河大伾可置永逺浮橋謂河流自大伾之東而來直大伾山西而止數里方回南東轉而過復折北而東則又直至大伾山之東亦止不過十里耳視地形水勢東西相直徑易㑹不十餘里間且地勢低下可以成河倚山可為馬頭又有中灘正如河陽若引使穿大伾大山及東北二小山分為兩股而過合于下流因是三山為趾以繫浮梁省費數十百倍可寬河朔諸路之役朝廷喜而從之宋史河渠志宋徽宗政和五年置提舉修繫永橋所六月癸丑降德音于河北京東京西路其略曰鑿山釃渠循九河既道之迹為梁跨趾成萬世永賴之功役不踰時慮無愆素人絶往來之阻地無南北之殊靈祗懷柔黎庶呼舞眷言朔野爰暨近畿畚鍤繁興薪芻轉徙民亦勞止朕甚憫之宜推在宥之恩仍廣蠲除之惠應開河官吏令提舉所具功力等第聞奏又詔居山至大伾山浮橋屬濬州者賜名天成橋大伾山至汶子山浮橋屬滑州者賜名榮光橋俄改榮光曰聖功七月庚辰御製橋名磨崖以刻之方河之開也水流雖通然湍激猛暴遇山稍隘往往泛溢近寨民夫多被漂溺因亦及通利軍其後遂注成巨濼云是月昌齡遷工部侍郎八月已亥都水監言大河以就三山通流正在通利之東慮水溢為患乞移軍城于大伾山居山之間以就高仰從之十月丁已中書省言冀州棗強掃決知州辛昌宗武臣不諳河事詔以王仲元代之十一月丙寅都水使者孟揆言大河連經漲淤灘靣已高致河流傾側東岸今若修閉棗強上掃決口其費不資兼冬深難施人力縱使極力修閉東堤上下二百餘里必須盡行增築與水爭力未能全免決溢之患今漫水行流多鹹鹵及積水之地又不犯州軍止經數縣地分迤邐纒御河歸納黃河欲自決口上恩州之地水堤為始增補舊堤接續御河東岸簽合大河從之乙亥臣僚言禹跡湮沒于數千載之逺陛下神智獨運一旦興復導河三山長堤盤固橫截巨浸依山為梁天造地設威示南北度越前古嵗無解繫之費人無病涉之患大功既成願申飭有司以日繼月視水向著隨為堤防益加增固每遇漲水水官漕臣不輟巡視詔付昌齡宋史河渠志蔡京任孟昌齡為都水使者鑿大伾三山創天成聖功二橋大興工役無慮四十萬兩兩河之民愁困不聊生而京僴然自以為稷契周召也宋史蔡京傳宋徽宗政和七年五月丁巳臣僚言恩州寧化鎮大河之側地勢低下正當灣流衝激之處歲久堤岸怯薄沁水透堤甚多近鎮居民例皆移避方秋夏之交時雨霈然一失堤防則不惟東流莫測所向一隅生靈所係甚大亦恐妨阻大名河間諸州往來邊路乞付有司貼築同護從之六月癸酉都水使者孟揚言舊河陽南北兩河分流立中灘繫浮梁頃緣北河淤澱水不通行止于南河修繫一橋因此河項窄狹水勢衝激每遇漲水多致損壞欲措置開修北河如舊修繫南北兩橋從之九月丁未詔揚專一措置而令河陽守臣王序營辦錢糧督其工料宋史河渠志是年瀛滄州河決滄州城不沒者三版民死者百餘萬宋史五行志唐恪知滄州河決水犯城下恪乘城救理都水孟昌齡移檄索船與兵恪報水勢方惡船當以備緩急滄為極邊兵非有旨不敢遣昌齡怒劾之恪不為動益治水水去城得全詔書褒美進龍圗閣待制知揚州召拜户部侍郎京師暴水至汴且溢付恪治之或請決南隄以紓宮城之患恪曰水漲隄壞此無可奈何今決而浸之是魚鱉吾民也亟乘小舟相水源委求所以利導之乃決金隄注之河浹旬水平入對帝勞之曰宗廟社稷獲安卿之力也恪再拜因上疏言水隂類也至犯宮闕天其或者以隂盛之沴警告陛下乎願垂意時事益警天戒宣和初遷尚書靖康初拜同知樞密事中書侍郎金人逼百官立張邦昌令吳幵莫儔入城取推戴狀恪既書名仰藥而死宋史唐恪傳宋徽宗重和元年三月已亥詔滑州濬州界萬年堤全藉林朩固護堤岸其廣行種植以壯地勢五月甲辰詔孟州河陽縣第一掃自春以來河勢湍猛侵嚙民田迫近州城正二三里其令都水使者同漕臣河陽守臣措置固護是秋兩廣武掃危急詔內侍王仍相度措置宋史河渠志蔣興祖知開封陽武縣武古博浪沙地土脈脆惡大河薄其南嘗積雨泛溢掃具潰興祖躬救護露宿其上彌四旬隄以不壞治為畿邑最使者交薦之靖康初死難詔贈朝散大夫宋史蔣興祖傳宋徽宗宣和元年九月辛未蔡京等言南丞管下三十五掃今嵗漲水之後岸下一例生灘河行中道實由聖德昭格神祇順助望宣付史館詔送祕書省十二月開修兔源河并直河畢工降詔奬諭宋史河渠志宋徽宗宣和二年九月已卯王黼言昨孟昌齡計議河事至滑州韓村掃檢視河流衝至寸金潭其勢就下未易禦遏近降詔旨令就書定淃灣對開直河方議開鑿忽自成直河一道寸金潭下水即安流在役之人聚首仰嘆乞付史館仍帥百官表賀從之宋史河渠志宋徽宗宣和三年六月河溢冀州信都十一月河決清河掃是嵗水壞天成聖功橋官吏行罰有差宋史河渠志徽宗本紀是年六月河決恩州清河掃與河渠志異未知孰是宋徽宗宣和四年四月壬子都水使者孟揚言奉詔修繫三山東橋凡役工十五萬七千八百今纍經漲水無虞詔因橋壞失職降秩者俱復之宋史河渠志宋欽宗靖康元年二月乙卯御史中丞許翰言保和殿大學士孟昌齡延康殿學士孟揚龍圗閣直學士孟揆父子相繼領職二十年過惡山積妄設堤防之功多張梢樁之數窮竭民力聚斂金帛交結權要內侍王仍為之奧主超付名位不知紀極大河浮橋嵗一造舟京西之民猶憚其役而昌齡道建三山之䇿回大河之勢頓取百年浮橋之費僅為數嵗行路之觀漂沒生靈無慮萬計近輔郡縣蕭然破殘所辟官吏計金叙績富商大賈爭注名牒身不在公遙分爵賞每興一役乾沒無數省部御史莫能鈎考陛下方將澄清朝著建立事功不先誅竄昌齡父子無以昭示天下望籍其姦贓以正典刑詔並落職昌齡在外宮觀揚依舊權領都水監職事揆候措置橋船畢取㫖翰復請鈎考簿書發其姦贓乃詔昌齡與中大夫揚揆與中奉大夫三月丁丑京西轉運司言本路嵗科河防夫三萬溝河夫一萬八千緣連年不稔羣盜劫掠民力困弊乞量數減放詔減八千人宋史河渠志靖康間求道判都水監陳留河決四十餘日漕輸不通京城大恐開封尹宗澤命求道治之七日河盡復故道宋史陳求道傳先是大中祥符四年河決通利軍治黎陽合御河尋經塞治至慶歷八年自澶州東北三十里商胡掃決而北徑清豐縣西在今大名府東南九十里又北徑南樂縣西在今大名府東南四十里又北至大名府東北合永濟渠即今之衛河元城縣志衛河在縣東北又東北徑冠氏縣西北今山東東昌府冠縣北有冠氏故城又東北徑館陶縣西在今東昌府西一百三十里與平恩縣分水今邱縣西有平恩故城衛河在縣東南四十里又東北徑臨清縣西元和志永濟渠在臨清縣城西門外即今臨清州又東北徑宗城縣東水經注白溝東北徑廣宗縣東為清河其故城在今威縣界宋宗城即故廣宗今為東順德府廣宗縣威縣地清河在威縣又東北徑清河縣東今廣平府清河縣東有衛河廣平府志清河縣冇黃河故道在縣北一里亦名黃蘆河北入南宫縣界又東北徑夏津縣西北在今東昌府高唐州西五十里衛河去縣四十里與清河縣分水又東北徑武城縣西在今高唐州北一百二十里縣西十里有東武城故城水經注云清河徑其西也今衛河在縣西與清河縣分水又東北徑棗強縣西在今真定府東南三百里棗強故城在今縣東南又東徑將陵縣西北將陵唐屬德州五代周省長河入焉宋景祐元年移將陵治長河鎮改屬永靜軍永靜今為河間府景州也元分將陵地置故城縣今衛河在其南與恩縣分水又東徑德州入吳橋界金志吳橋縣有永濟渠吳橋本安陵縣宋景祐二年廢入將陵今衛河在縣西二十里寧津志縣西三十里有古黃河自吳橋入又北入南皮廣可二里兩岸廢堤窿然峭立居人謂之卧龍岡蓋即永濟渠為宋北流之所經也又東徑蓚縣南蓚縣今為河間府景州州志云衛河在州東二十里又東北徑東光縣西在今河間府東南一百五十里水經注清河自胡蘇亭又東北右㑹大河故瀆徑東光縣故城西寰宇記云永濟渠在東光縣南二百步南蓋西字之誤東光新志衛河在縣西三里又東北徑南皮縣西在今河間府東南三百七十里水經注清河自南皮縣西又東北無棣溝出焉東北徑鹽山東北入海清河又東北徑南皮縣故城西按故城在今縣東北衛河在縣西二十里與交河縣分水通典無棣溝隋末填廢永徽元年薛大鼎為刺史奏開之外引魚鹽于海百姓歌其利又東北徑清池縣西而北與漳水合水經注清河自浮陽縣西又東北浮水故瀆出焉詳見後清河又東北徑浮陽縣故城西按浮陽漢勃海郡治唐改曰清池置滄州治焉即今河間府滄州寰宇記云永濟渠在清池縣西三十里水經濁漳篇云衡漳自成平縣北又東北入清河謂之合口今河間府青縣南有合口鎮又東北徑乾寧軍東軍在今河間府青縣南唐乾寧中析長蘆魯城二縣地置乾寧軍周置永安縣為軍治宋改曰乾寧縣大觀三年升軍為清州今為青縣衛河在縣東寰宇記云御河在乾寧縣南十步是也縣南二里有中山山岩聳峙宋時以黃河所經呼為碣石或鐫銘其上元王充耘據以為禹貢之碣石大謬又東北徑獨流口又東至劈地口入于海水經注清河東北至泉州縣北入滹沱又東徑漂榆邑故城南入于海泉州今順天府寶坻縣也漂榆城在今河間府靜海縣北按靜海縣本宋清州地縣境有界河亦曰潮河即易滹沱巨馬三水所㑹自順天府文安縣流經縣西北合衛河入海塘濼既興文安大城之水多入白河其行界河者唯漳衛耳獨流口在靜海縣北二十里九域志云乾寧軍有獨流北獨流東二寨俱在軍北百二十里即此地也劈地口在靜海縣東北又東為三義口蓋即天津衛東北之三岔河志云漳衛水西南自靜海縣來經衛北其流濁潞水西北自武清縣來經衛北其流清至衛東北而合流又東南出小直沽入于海天津亦宋清州地也以今輿地言之開州大名元城並屬直隸大名府冠縣館陶邱縣臨清並屬山東東昌府威縣清河並屬直隸廣平府夏津武城並屬東昌府棗強屬直隸真定府故城屬直隸河間府恩縣屬東昌府德州屬山東濟南府吳橋景州東光南皮交河滄州青縣靜海天津並屬河間府青縣靜海天津北接順天府大城寶坻界諸州縣界中皆宋時黃河北流之所經也商胡決後二十一嵗為神宗熙寧二年已酉導東流而北流閉又十二嵗為元豐四年辛酉河復北流哲宗紹聖初又閉後數嵗為元符二年已卯東流斷絶河竟北流蓋自仁宗慶歷八年戊子下逮金章宗明昌五年甲寅實宋光宗之紹熙五年而河決陽武出胙城南南北分流入海凡一百四十六嵗北流初行永濟渠其後兼混入漳水河渠志熙寧元年河溢瀛州樂壽掃元豐五年河溢永靜軍阜城下掃元祐五年南宮等五掃危急詔固護紹聖元年趙稱請修平鄉巨鹿掃崇寧三年臣僚言奉詔措置大河由西路歷沿邊州軍回至武強縣循河隄至深州又北下衡水乃達于冀四年尚書省言大河北流合西山諸水在深州武強瀛州樂壽掃俯瞰雄霸莫州萬一決溢為害甚大詔增二掃隄及儲蓄以備漲水大觀元年邢州言河決陷巨鹿縣詔徙縣于高地又以趙州隆平縣下濕亦遷之又冀州河溢壞信都南宫兩縣宣和二年河溢信都今按阜城平鄉巨鹿武強衡水樂壽信都南宮等縣皆漳水之所經御河不入其界而屢被大河決溢之害此北流混入漳水之明驗也今廣平府曲周平鄉廣宗巨鹿縣界中並有黃河故道縣志云宋元豐中北流決入漳水遂為大河之所經又清河縣北有黃河故道北入南宮界蓋自宗城清河二縣之御河決入趙稱言初決南宮再決宗城三決內黃皆西決則地勢西下較然可見即其事矣其在阜城樂夀者則自棗強之御河決而北熙寧元年河決冀州棗強掃北注瀛政和五年孟揆言若修閉棗強上掃決口其費不資是也然北流雖混入漳水仍自兩行其下流至清池縣西還與之合故徽宗即位張商英議引大河自古漳河浮河入海蓋欲導全河以入漳而廢永濟之故道浮河即浮水在今滄州東南水經注所稱浮水故瀆也淇水注云浮水首受清河于浮陽縣界東北徑高城縣之宛鄉城北又東徑章武縣故城又東徑篋山北又東北徑栁縣故城南又東北徑漢武望海臺又東注于海應劭曰潮汐往來日再今溝無復有水也今鹽山縣東北七十里有武帝臺地勢東高西下北流屢決而西導全河入漳尤合于禹迹但河由界河趨獨流口入海極其通利而顧欲改從久淤之浮瀆至鹽山縣界入海殊為多事商英亦非知水者也禹河本隨西山下東北去賈讓請決黎陽遮害亭放河使北入海是也時不見用而宋之北流實行其道河入海之路宜近不宜逺孫禁議決平原金隄令入故篤馬河行五百餘里入海是也許商阻之而宋之東流卒由篤馬河入海蓋訏謨逺猶雖為人所格而天必從之屈於一時伸於萬世惟其言之當於理而已矣宋君臣論治河往往有格言熙寧五年神宗語執政曰河決不過占一河之地或東或西若利害無所較聽其所趨如何元豐四年又謂輔臣曰水性趨下以道治水則無違其性可也如能順水所向徙城邑以避之復有何患雖神禹復生不過如此此格言也然施之于商胡北流適得其宜若地平土疏潰溢四出所占不止一河之地者豈亦當順水所向遷城邑以避之乎歐陽修曰河本泥沙無不淤之理淤常先下流水行漸壅乃決上流低處故大河已棄之道自古難復此格言也然瓠子決二十餘嵗而武帝塞之河復北行二渠河侵汴濟注淮泗六十餘年而王景治之仍由千乘入海今橫隴之徙裁二十年安見必不可復但北流實為利便不當更事橫隴耳蘇轍曰黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理此格言也然吾觀宋之二股即唐之馬頰以此為枝渠受河水十之一二亦自無害但不可令指大如股耳張商英曰治河當行其所無事一用隄障猶塞兒口止其啼此格言也語出賈讓然讓意謂正道常流不可效戰國為之曲防耳若衝激之處潰溢可虞非增卑培薄何以禦之任伯雨曰昔禹之行水不獨行其所無事亦未嘗不因其變以道之此格言也然必如北流之合于禹迹者不妨因其勢而利導之若注巨野通淮泗安得不反之使北邪此數說者譬如奕者必勝之著而低手混施之則全局皆空古今經驗之方而庸醫誤用之則殺人無算是故治河之道或新或舊或合或分或通或塞或無事或有事或小有事或大有事神而明之存乎其人茍非其人則必有害孟子所以惡執一也禹貢錐指宋高宗建炎二年冬杜充決黃河自泗入淮以阻金兵宋史高宗本紀行水金鑑卷十四
