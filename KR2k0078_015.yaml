body:
  text: 行水金鑑卷十五江南按察使傅澤洪撰河水金始克宋兩河悉畀劉豫豫亡河遂盡入金境數十年間或決或塞遷徙無定金人設官置屬以主其事沿河上下凡二十五掃六在河南十九在河北金史河渠志按范成大北使録云濬州城西南有積水若河蓋大河剩水也又按宋史隆興再請和以成大充金祈請國信使見范成大傳孝宗隆興之元二即金世宗之大定三年四年也時濬州城下僅有剩水則河離濬滑在隆興之前可知矣朱子語録一條云元豐間河北流自後中原多事後來南流金人亦多事近來又北流見歸正人説蓋其時河嘗南流尋復歸北也禹貢錐指金世宗大定八年六月河決李固渡水潰曹州城分流於單州之境九年正月朝廷遣都水監梁肅往視之河南統軍使宗室宗敘言大河所以決溢者以河道積淤不能受水故也今曹單雖被其患而兩州本以水利為生所害農田無幾今欲河復故道不惟大費工役又卒難成功縱能塞之他日霖潦亦將潰決則山東河患又非曹單此也又沿河數州之地驟興大役人心動搖恐宋人乘間構為邊患而肅亦言新河水六分舊河水四分今若塞新河則二水復合為一如遇漲溢南決則害於南京北決則山東河北皆被其害不若李固南築隄以防決溢為便尚書省以聞上從之宗敘梁肅本傳略同三月拜宗敘為參知政事上諭之曰卿昨為河南統軍時嘗言黃河隄掃利害甚合朕意朕每念百姓凡有差調吏互為姦若不早計而迫期徴斂則民增十倍之費然其所徵之物或委積經年至腐朽不可復用使吾民數十萬之財皆為棄物此害非細卿既參朝政凡類此者皆當革其弊擇所利而行之金史河渠志金世宗大定十一年河決王村南京孟衛州界多被其害金史河渠志金世宗大定十二年正月尚書省奏撿視官言水東南行其勢甚大可自河隂廣武山循河而東至原武陽武東明等縣孟衛等州增築隄岸日役夫萬一千期以六十日畢詔遣太府少監張九思同知南京留守事赫舍哩邈監護工作金史河渠志金世宗大定十三年三月以尚書省請修孟津滎澤崇福掃堤以備水患上乃命雄武以下八掃並以類從事金史河渠志金世宗大定十七年秋七月大雨河決白溝十二月尚書省奏修築河隄日役夫一萬一千五百以六十日畢工詔以十八年二月一日發六百里內軍夫并取職官人力之半餘聽發民夫以尚書工部郎中張大節同知南京留守事高蘇董役先是祥符縣陳橋鎮之東至陳留潘岡黃河隄道四十餘里以縣官攝其事南京有司言乞專設掃官十九年九月乃設京掃巡河官一員金史河渠志金世宗大定二十年河決衛州及延津京東掃瀰漫至於歸德府撿視官南京副留守舒穆嚕輝者言河水因今秋霖潦暴漲遂失故道勢益南行宰臣以聞乃自衛州掃下接歸德府南北兩岸增築隄以捍湍怒計工一百七十九萬六千餘日役夫二萬四千餘期以七十日畢工遂於歸德府創設巡河官一員掃兵二百人且詔頻役夫之地與免今年稅賦二十一年十月以河移故道命築隄以備金史河渠志河決於衛橫流而東滄境有九河故道大節即相宜繕堤水不為害章宗即位擢中都路都轉運使金史張大節傳金世宗大定二十六年八月河決衛州堤壞其城上命户部侍郎王寂都水少監王汝嘉馳傳措畫備禦而寂視被災之民不為拯救乃專集衆以網魚取官物為事民甚怨嫉上聞而惡之既而河勢泛濫及大名上于是遣戶部尚書劉瑋往行户部事從宜規畫黜寂為蔡州防禦使冬十月上謂宰臣曰朕聞亡宋河防一步置一人可添設河防軍數他日又曰比聞河水泛溢民罹其害者資産皆空今復遣官於被災路分推排何耶右丞張汝霖曰今推排者皆非被災之處上曰雖然必其鄰道也既鄰水而居豈無驚擾遷避者乎計其資産豈有餘哉尚何推排為十一月又謂宰臣曰河未決衛州時嘗有言者既決之後有司何故不令朕知命詢其故金史河渠志是年徙衛州胙城縣金史世宗本紀劉瑋擢户部尚書時河決於衛自衛抵清滄皆被其害詔兼工部尚書往塞之或以謂天災流行非人力所能禦唯當徙民以避其衝瑋曰不然天生五材遞相休王今河決者土不勝水也俟秋冬之交水勢稍殺以漸興築庶幾可塞明年春瑋齋戒禱於河功役齊舉河乃復故召還增秩金史劉瑋本傳金世宗大定二十七年二月御史臺言自來沿河京府州縣官坐視管內河防缺壞特不介意若令沿河京府州縣長二官皆于名銜管勾河防事如任內規措有方能禦大患或守護不謹以致疏虞臨時聞奏以議賞罰上從之仍命每嵗將泛之時令工部官一員沿河撿視于是以南京府及所屬延津封丘祥符開封陳留胙城杞縣長垣歸德府及所屬宋城寧陵虞城河南府及孟津河中府及河東懷州河內武陟同州朝邑衛州汲新鄉獲嘉徐州彭城蕭豐孟州河陽溫鄭州河陰滎澤原武汜水濬州衛陜州閿鄉湖城靈寶曹州濟隂滑州白馬睢州襄邑滕州沛單州單父解州平陸開州濮陽濟州嘉祥金鄉鄆城四府十六州長二皆提舉河防事四十四縣令佐皆管勾河防事初衛州為河水所壞命增築蘇門遷其州治至二十八年水息居民稍還皆不樂遷于是遣大理少卿康元弼按視之元弼還奏舊州民復業者甚衆且南使驛道館舍所在向以不為水備以故被害若但修其隄之薄缺者可以無虞比之遷治所省數倍不若從其民情修治舊城為便乃不遷州仍敇自今河防官司怠慢失備者皆重抵以罪金史河渠志是年十一月甲寅詔河水泛溢農夫被災者與免差稅一年衛懷孟鄭四州塞河勞役并免今年差稅金史世宗本紀河決曹濮間瀕水者多墊溺朝廷遣元弼往視相其地如盎而城在盎中水易為害請命于朝以徙之卒改築于北原曹人賴焉出為𢎞州刺史閲歲授大理少卿先是衛城為河所壞增築蘇門以寓州治水既退民不樂遷欲復歸衛于是遣元弼按視還言治故城便遂復其舊金史康元弼傳金世宗大定二十九年五月河溢于曹州小堤之北六月上諭旨有司曰比聞五月二十八日河溢而所報文字如此稽滯水事最急功不可緩稍緩時頃則難固護矣十二月工部言營築河堤用工六百八萬餘就用掃兵軍夫外有四百三十餘萬工當用民夫遂詔命去役所五百里州府差顧於不差夫之地均徵顧錢驗物力科之每工錢百五十文外日支官錢五十文米升半仍命彰化軍節度使內族裔都水少監大齡夀提控五百人往來彈壓先是河南路提刑司言沿河居民多困乏逃移蓋以河防差役煩重故也竊惟禦水患者不過隄掃若土功從實計料薪稿樁杙以時徵斂亦復何難今春築堤都水監初料取土甚近及其興工乃逺數倍人夫懼不及程貴價買土一隊之間多至千貫又許州初科薪稿十八萬餘束既而又配四萬四千是皆常嵗必用之物農隙均科則易輸納自今堤掃興工乞合本監以實計度量一嵗所用物料驗數折稅或令和買于冬月分為三限輸納為便詔尚書省詳議以聞金史河渠志劉璣為户部員外郎上便宜數事世宗謂宰相曰璣言河堤種柳可省每嵗隄防之費及言官錢利害甚可取卿等議其可者行之擢濰州刺史金史劉璣傳金章宗明昌元年春正月尚書省奏臣等以為自今凡興工役先量負土逺近增築高卑定功立限榜諭使人先知無令增加力役并河防所用物色委都水監每嵗于八月以前先拘籍舊貯物外實闕之數及次年春工多寡移報轉運司計置于冬三月分限輸納如水勢不常夏秋暴漲危急則用相鄰掃分防備之物不足則復于所近州縣和買然復慮人户道途泥淖艱于運納止依稅內科折他物更為增價當官支付違者並論如律仍令所屬提刑司正官一員馳驛監視體究如此則役作有程而河不失備制可之金史河渠志伊喇履進尚書右丞初河決曹州帝問曰春秋二百四十二年不言河決何也履曰春秋止是魯史所以鮮及他國事金史伊喇履傳金章宗明昌四年六月河決衛州魏清滄皆被害金史五行志十一月尚書省奏河平軍節度使王汝嘉等言大河南岸舊有分流河口如可疏導足泄其勢及長堤以北恐亦有可以歸納排瀹之處乞委官視之濟北掃以北宜創起月堤臣等以為宜從所言其本監官皆以諳練河防故注以是職當使從汝嘉等同往相視庶免異議如大河南北必不能開挑歸納其月堤宜依所料興修上從之十二月敕都水監官提控修築黃河堤及令大名府差正千户一員部甲軍二百人彈壓勾當金史河渠志金章宗明昌五年春正月尚書省奏都水監丞田櫟同本監官講議黃河利害嘗以狀上言前代每遇古堤南決多經南北清河分流南清河北下有枯河數道河水流其中者長至七八分北清河乃濟水故道可容三二分而已今河水趨北齧長堤而流者十餘處而堤外率多積水恐難依元料增修長堤與創築月堤也可于北岸牆村決河入梁山濼故道依舊作南北兩清河分流然北清河舊堤歲久不完當立年限增築大堤而梁山故道多有屯田軍户亦宜遷徙今擬先于南岸王村宜村兩處決堤導水使長堤可以固護姑宜仍舊如不能疏導即依上開決分為四道俟見水勢隨宜料理尚書省以櫟等所言與明昌二年劉瑋等所案視利害不同按劉瑋本傳明昌二年瑋知大名府仍領河防事三年召拜尚書右丞及令陳言人馮德輿與櫟靣對亦有不合者送工部議復言若遽于牆村疏決緣瀕北清河州縣二十餘處兩岸連亘千有餘里其堤防素不修備恐所屯軍户亦率難徙今嵗先于南岸延津縣堤決堤泄水其北岸長堤自白馬以下定陶以上並宜加功築護庶可以遏將來之患若定陶以東三掃棄堤則不必修止決舊壓河口引導積水東南行流堤北張彪白塔兩河間礙水軍户可使遷徙及梁山濼故道分屯者亦當預為安置宰臣奏曰若遽從櫟等所擬恐既更張利害非細比召河平軍節度使王汝嘉同計議先差幹濟官兩員行戶工部事覆視之同則就令計實用工物量州縣逺近以調丁夫其督趣春工官即充今嵗守漲及與本監官同議經久之利詔以知大名府事內族裔尚書户部郎中李敬義充行户工部事以參知政事胥持國都提控又奏差德州防禦使李獻可尚書戶部郎中焦旭于山東當水所經州縣築護城堤及北清河兩岸舊有堤處别率丁夫修築亦就令講究河防之計他日上以宋閻士良所述黃河利害一帙付參知政事馬琪曰此書所言亦有可用者今以賜卿二月上諭平章政事守貞曰王汝嘉田櫟專管河防此國家之重事也朕比問其曽于南岸行視否乃稱未也又問水決能行南岸乎又云不可知且水趨北久矣自去嵗便當經畫今不稱職如是耶可諭旨令往盡心固護無致失備及講究所以經久之計稍涉違慢當併治罪三月行省并行戶工部及都水監官各言河防利害事都水監元擬于南岸王村宜村兩處開導河勢緣比來水勢去宜村堤稍緩唯王村岸向上數里卧捲可以開決作一河且無所犯之城市村落又擬于北岸牆村疏決依舊分作兩清河入梁山故道北清河兩岸素有小堤不完復當作大堤尚書省謂以黃河之水勢若于牆村決注則山東州縣膏腴之地及諸鹽場必被淪溺設使修築壞堤而又吞納不盡功役至重虛困山東之民非徒無益而又害之也况長堤已加固護復于南岸疏決水勢已寢決河入梁山濼之議水所經城邑已勸率作護城堤矣先所修清河舊堤宜遣罷之監丞田櫟言定陶以東三掃棄堤不當修止言決舊壓河口以導漸水入堤北張彪白塔兩河之間凡當水衝屯田戶須令遷徙臣等所見止當堤前作朩岸以備之其間居人未當遷徙至夏秋水勢泛溢權令避之水落則當各復業此亦户工部之所言也上曰地之相去如此其逺彼中利害安得悉知惟委行省盡心措畫可也四月以田櫟言河防事上諭旨參知政事持國曰此事不惟責卿要卿等同心規畫不勞朕心爾如櫟所言築堤用二十萬工嵗役五十日五年可畢此役之大古所未有况其成否未可知就使可成恐難行也遷徙軍户四千則不為難然其水時決尚不知所歸倘有潰走若何枝梧如今南岸兩處疏決使其水趨南或可分殺其勢然水之形勢朕不親見難為條畫雖卿亦然丞相左丞皆不熟此可集百官詳議以行百官咸謂櫟所言棄長堤無起新堤放河入梁山故道使南北兩清河分流為省費息民長久之計臣等以為黃河水勢非常變易無定非人力可以斟酌可以指使也况梁山濼淤填已高而北清河窄狹不能吞伏兼所經州縣農民廬井非一使大河北入清河山東必被其害櫟又言乞許都水監符下州府運司專其用度委其任責一切同于軍期仍委執政提控緣今監官已經添設又于外監署司多以沿河州府長官兼領之及令佐管勾河防其或怠慢已有同軍期斷罪的決之法凡櫟所言無可用遂寢其議八月以河決陽武故堤灌封丘而東尚書省奏都水監行部官有失固護詔命同知都轉運使高旭武衛軍副都指揮使鈕祜祿奕同往規措尚書省奏都水監官前來有犯已經戒諭使之常切固護今王汝嘉等殊不加意既見水勢趨南不預經畫承留守司纍報輒為遷延以至害民即是故違制旨私罪當的決詔汝嘉等各削官兩階杖七十罷職上謂宰臣曰李愈論河決事謂宜遣大臣往以慰人心其言良是嚮慮河北決措畫堤防猶嘗置行省况今方橫潰為害而止差小官恐失衆望自國家觀之雖山東之地重于河南然民皆赤子何彼此之間乃命參知政事馬琪往仍許便宜從事上曰李愈不得為無罪雖都水監官非提刑司統攝若與留守司以便宜率民固護或申聞省部亦何不可使朕聞之徒能張皇水勢而無經畫及其已決乃與王汝嘉一往視之而還亦未嘗有所施行問王村河口開導之月則對以四月終其實六月也月日尚不知提刑司官當如是乎尋命戶部員外郎何格賑濟被浸之民時行省參知政事胥持國馬琪言已至光祿村周視堤口以其河水浸漫堤岸陷潰至十餘里外乃能取土而堤面窄狹僅可數步人力不可施雖窮力可以暫成終當復毁而中道淤澱地有高低流不得泄且水退新灘亦難開鑿其孟華等四掃與孟陽堤道沿汴河東岸但可施功者即悉力修護將于農隙興役及凍畢工則京城不至為害參知政事馬琪言都水外監員數冗多每事相倚或復邀公議論紛紜不一隳廢官事擬罷都水監掾設勾當官二員又自昔選用都散巡河官止由監官辟舉皆諸司人或有老疾避倉庫之繁行賄請託以致多不稱職擬升都巡河作從七品于應入縣令廉舉人內選注外散巡河依舊亦于諸司及丞簿廉舉人內選注並取年六十以下有精力能幹者到任一年委提刑司體察若不稱職即日罷之如守禦有方致河水安流任滿從本監及提刑司保申量與升除凡河橋司使副亦擬同此選注繼而胥持國亦以為言乃從其請閏十月平章政事守貞曰馬琪措畫河防事未見功役之數加之積嵗興功民力將困今持國復病請别遣有材幹者往議之上曰堤防救護若能成功則財力固不敢惜第恐財殫力屈成而復毁如重困何宰臣對曰如盡力固護縱為害亦輕若恬然不顧則為害滋甚上曰無乃因是致盜賊乎守貞曰宋以河決興役亦嘗致盜賊然多生于凶歉今時平嵗豐少有差役未必致此且河防之役理所當然今之當役者猶為可耳至于科徵薪芻不問有無督輸迫切則破産業以易之恐民益困爾上曰役夫須近地差取若逺調之民益艱苦但使津濟可也然當俟馬琪至而後議之庚辰琪自行省還入見言孟陽河堤及汴堤己填築補修水不能犯汴城自今河勢趨北來嵗春首擬于中道疏決以解南北兩岸之危凡計工八百七十餘萬可于正月終興工臣乞前期再往河上監視上以所言付尚書省而治檢覆河堤并守漲官等罪有差他日尚書省奏事上語及河防事馬琪奏言臣非敢不盡心然恐智力有所不及若别差官相度倘有竒畫亦未可知如適與臣䇿同方來興功亦庶幾稍寬朝廷憂顧上然之命翰林待制鄂屯忠孝權尚書户部侍郎太府少監溫防權尚書工部侍郎行戶工部事修治河防且諭之曰汝二人皆朕所素識以故委任冀副朕意如有錯失亦不汝容金史河渠志是年冬十月壬寅遣戶部員外郎何格賑河決被災人户十二月丁卯免被黃河水災今年秋稅六年四月戊寅以修河工畢參知政事胥持國進官二階翰林待制鄂屯忠孝以下三十六人各一階獲嘉令王維翰以下五十六人各賜銀幣有差金史章宗本紀鄂屯忠孝大定二十二年進士歷擢户部侍郎佐胥持國治決河以勞進一階除河平軍節度使兼都水監遂疏七祖佛河及王村周平道口雞爪孫家港復開東明南陽岡馬蹄孫村諸河忠孝常曰河之為患不免勞民復壘石為岸十餘里民不勝其病矣改沁南軍坐前在衛州勾集妨農軍借民錢不令償由是貧富不相假貸軍民不安降寧海州刺史改滑州金史鄂屯忠孝傳高霖字子約東平人大定二十五年進士歷國史院編修官建言黃河所以為民害者皆以河流有曲折逢隘狹故致湍決按水經當疏其扼塞行所無事今若開雞爪河以殺其勢可免數掃之勞凡捲掃工物皆取於民大為時病乞並河堤廣樹榆柳數年後堤岸既固掃材亦便民力漸省朝廷從之遷應奉翰林文字兼前職金史高霖傳勤鄂屯忠孝高霖皆恐勞民病時其言如此何其勤懇懇也乃忠孝猶以勾集妨農被降何歟大抵金元以前治河者皆以為民也逮至勝國則為運道為祖陵遂置民瘼於二者之外矣明昌五年河犯武城堤明年詔鑿新河修石岸十四里有奇以塞之山東通志自獲嘉縣西南四十里至新鄉縣南又東北至胙城縣又北接汲縣皆有漢古堤城東南有杏園鎮為河津戍守處自金明昌中河徙而汲縣之流始絶衛輝府志先是大定二十七年令沿河京府州縣長二官結銜並帶河防自滎陽以下如南京府之延津封丘祥符開封陳留以上皆屬今開封府胙城今屬衛輝府杞縣屬開封府長垣今屬大名府歸德府之永城寧陵虞城衛州之汲新鄉獲嘉三縣今屬衛輝府徐州之彭城即今徐州蕭豐皆屬徐州曹州之濟隂即今山東曹州滑州之白馬即今直隸滑縣睢州之襄邑即今河南睢州滕州之沛今屬徐州單州之單父濟州之嘉祥金鄉鄆城皆屬兖州府皆為沿河之地則當時河流所經亦大略可覩也雖數遷徙而汲胙之間如故逮明昌五年八月河決陽武故堤灌封丘而東尚書省奏都水監官見水勢趨南不預經畫詔各削階罷職蓋河流至是又一大變矣金吉甫云河至紹熙甲寅南連大野并行泗水入淮于是有南北清河之分北清河即濟水故道南清河并泗入淮今淮安之西二十里對岸清河口是也按宋光宗紹熙五年甲寅即金章宗明昌五年是嵗河徙自陽武而東歷延津封丘長垣蘭陽東明曹州濮州鄆城范縣諸州縣界中至夀張注梁山濼分為二派北派由北清河入海今大清河自東平歷東阿平陰長清齊河歷城濟陽齊東武定青城濱州蒲臺至利津縣入海者是也南派由南清河入淮即泗水故道今會通河自東平歷汶上嘉祥濟寧合泗水至清河縣入淮者是也河滙梁山濼分二派入南北清河自宋熙寧十年始尋經塞治至是復行其道而汲胙之流遂絶朱子語録云因看劉樞家中原圗黃河却自西南貫梁山泊迤邐入淮來神宗時河北流故金人盛今却南來故其勢亦衰謂此事也時朱子年六十五下逮元世祖至元間而河又徙自新鄉出陽武之南凡九十餘嵗河一過大伾而東不決則已決則東南注于淮其勢甚易邱文莊以宋熙寧十年河決為入淮之始非也先是天禧三年河決滑州歷澶濮曹鄆注梁山濼合清水古汴渠東入于淮矣又先是咸平三年河決鄆州浮巨野入淮泗矣又先是太平興國八年河大決滑州泛澶濮曹濟東南流至彭城入于淮矣溯而上之則漢元光三年河決濮陽瓠子東南注巨野通于淮泗矣但皆未幾即塞其歷久而不變至今五百餘嵗河淮并為一瀆則自金明昌五年始禹貢錐指金章宗承安元年七月敕自今沿河傍側府州縣官雖部除者皆勿令員闕金史河渠志金章宗泰和二年九月敕御史臺官河防利害初不與卿等事然臺官無所不問應體究者亦體究之五年二月以崔守真言黃河危急芻藁物料雖云折稅每年不下五六次或名為和買而未嘗還其直敕委右三部司正郭澥御史中丞孟鑄講究以聞澥等言大名府鄭州等處自承安二年以來所科芻藁未給價者計錢二十一萬九千餘貫遂命以各處見錢差能幹官同各州縣清強官一一酬之續令按察司體究金史河渠志衛紹王大安元年徐沛界黃河清五百餘里幾二年以其事詔中外臨洮人楊圭上書曰河性本濁而今反清是水失其性也正猶天動地靜使當動者靜當靜者動則如之何其為災異明矣且傳曰黃河清聖人生假使聖人生恐不在今日又曰黃河清諸侯為天子正當戒懼以消災變而復誇示四方臣所未喻宰相以為妖言議誅之慮絶言路即詔大興府鎖還本管金史五行志五代史載開平元年八月丁卯黃河清注云於此書見不為瑞楊圭之上書其所見卓哉以故前後凡史言河清者皆不録金宣宗貞祐三年四月單州刺史延嘉天澤言守禦之道當決大河使北流德博觀滄之境今其故堤宛然猶在工役不勞水就下必無漂沒之患而難者若不以犯滄鹽場損國利為説必以浸沒河北良田為解臣嘗聞河側故老言水勢散漫則淺不可以馬涉深不可以舟濟此守禦之大計也若曰浸民田則河徙之後淤為沃壤正宜耕墾收倍于常利孰大焉若失此計則河南一路兵食不足而河北山東之民皆瓦解矣詔命議之金史河渠志金宣宗貞祐四年三月延州刺史烏蘇克鍚克言近世河離故道自衛東南而流由徐邳入海以此河南之地為狹臣竊見新鄉縣西河水可決使東北其南有舊隄水不能溢行五十餘里與清河合則由濬州大名觀州清州栁口入海此河之故道也皆有舊堤補其缺罅足矣如此則山東大名等路皆在河南而河北諸郡亦得其半退足以為禦備之計進足以壯恢復之基又言南岸居民既已籍其河夫修築河堰營作戌屋又使轉輸芻糧賦役繁殷倍于他所夏秋租稅猶所未論乞減其稍緩者以寬民力事下尚書省宰臣謂河流東南舊矣一旦決之恐故道不容衍溢而出分為數河不復可收水分則淺狹易渡天寒輒凍禦備愈難此甚不可詔但令量宜減南岸郡縣居民之賦役金史河渠志自宋南渡河離濬滑勢益趨而南至金明昌五年淫于濟泗分派入海汲胙之河遂空其去禹迹益逺矣先是都水監丞田櫟言黃河利害云前代每遇古隄南決多經南北清河分流南清河北下有枯河數道河水流其中者長至七八分北清河乃濟水故道可容二三分而已因欲于北岸牆村決河入梁山濼故道依舊作兩清河分流未及行而八月河決竟如其言蓋是時決勢既成櫟欲因而利導之故為此議然前代河行淮濟未幾即塞曷嘗以是為正道而任其所之也哉金以宋為壑利河之南而不欲其北逮貞祐四年延州刺史烏蘇克錫克言河之故道可復而議者不從蓋國勢己蹙實無暇及此矣原其禍皆宋人築室道旁不盡力于北流馴致此大變金何責焉禹貢錐指宋端平元年葵知應天府南京留守盛暑行師汴隄破決水潦溢糧運不繼未幾北兵南下渡河發水閘兵多溺死宋史趙葵傳金按宋理宗端平元年甲午為哀宗亡國之年行水金鑑卷十五
