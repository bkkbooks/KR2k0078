body:
  text: 行水金鑑巻十七江南按察使傅澤洪撰河水元順帝至正九年五月庚子詔修黄河金隄民夫日給鈔三貫是月白茅河東注沛縣遂成巨浸元史順帝本紀至正以來旋修旋決而濟南河間以至豐沛乆罹昏墊矣是年冬托克托既復為丞相慨然有志於事功論及河決即言于帝請躬任其事帝嘉納之乃命集羣臣議廷中而言人人殊唯都漕運使賈魯昌言必當治先是魯甞為山東道奉使宣撫首領官循行被水郡邑具得修捍成策後又為都水使者奉㫖詣河上相視驗狀為圖以二策進獻二策見前至是復以二策對托克托韙其後策議定乃薦魯于帝大稱㫖元史河渠志元順帝至正十年十二月辛卯以大司農圖魯等兼領都水監集河防正官議黄河便益事元史順帝本紀至正中成遵為工部尚書先是河決白茅鄆城濟寧皆為巨浸或言當築隄以遏水勢或言必疏南河故道以殺水勢而漕運使賈魯言必疏南河塞北河使復故道役不大興害不能已廷議莫能決乃命遵偕大司農圖魯行視河議其疏塞之方以聞十一年春自濟寧曹濮汴梁大名行數千里掘井以量地形之髙下測岸以究水勢之淺深遍閲史籍博采輿論以謂河之故道不可得復其議有八而丞相托克托已先入賈魯之言及遵與圖魯至力陳不可且曰濟寧曹鄆連嵗饑饉民不聊生若聚二十萬人於此地恐後日之憂又有重於河患者托克托怒曰汝謂民將反耶自辰至酉辨論終不能入明日執政者謂遵曰修河之役丞相意已定且有人任其責者公其毋多言幸為兩可之議遵曰腕可斷議不可易也由是遂出為大都河間都轉運使元史成遵傳思誠為河間府總管時河水頻溢決鐵燈干鐵燈干真定境也召其邑吏責而懲之遂集民丁作隄晝夜督工期月而塞復築夾隄於外亘十餘里命瀕河民及弓手列置草舍於上擊木以防盜決是年民獲耕藝嵗用大稔乃募民運碎甓治郭外行道髙五尺廣倍之往來者無泥塗之病南皮民父祖甞瀕御河種柳輸課於官名曰柳課後河決柳俱沒官猶徵之凡十餘年其子孫益貧不能償思誠連請於朝除之元史王思誠傳士思誠至治元年進元順帝至正十一年四月初四日下詔中外命賈魯以工部尚書為總治河防使進秩二品授以銀印發汴梁大名十有三路民十五萬人廬州等戍十有八翼軍二萬人供役一切從事大小軍民官咸稟節度便宜興繕是月二十二日鳩工七月疏鑿成八月決水故河九月舟楫通行十一月水土工畢諸埽諸隄成河乃復故道南滙于淮又東入于海帝遣貴臣報祭河伯召魯還京師論功超拜榮祿大夫集賢大學士其宣力諸臣遷賞有差賜丞相托克托世襲達爾罕之號特命翰林學士承㫖歐陽𤣥製河平碑文以旌勞績𤣥既為河平之碑又自以為司馬遷班固記河渠溝洫僅載治水之道不言其方使後世任斯事者無所考則乃從魯訪問方略及詢過客質吏牘作至正河防記欲使來世罹河患者按而求之其言曰治河一也有疏有濬有塞三者異焉釃河之流因而導之謂之疏去河之淤因而深之謂之濬抑河之暴因而扼之謂之塞疏濬之别有四曰生地曰故道曰河身曰減水河生地有直有紆因直而鑿之可就故道故道有髙有卑髙者平之以趨卑髙卑相就則髙不壅卑不瀦慮夫壅生潰瀦生堙也河身者水雖通行身有廣狹狹難受水水益悍故狹者以計闢之廣難為岸岸善崩故廣者以計禦之減水河者水放曠則以制其狂水隳突則以殺其怒治隄一也有創築修築補築之名有刺水隄有截河隄有䕶岸隄有縷水隄有石船隄治埽一也有岸埽水埽有龍尾攔頭馬頭等埽其為埽臺及推巻牽制薶罣之法有用土用石用鐵用草用木用杙用絙之方塞河一也有缺口有豁口有龍口缺口者已成川豁口者舊常為水所豁水退則口下于隄水漲則溢出于口龍口者水之所㑹自新河入故道之潨也此外不能悉書因其用功之次第而就述于其下焉其濬故道深廣不等通長二百八十里百五十四步而強功始自白茅長百八十二里繼自黄陵岡至南白茅闢生地十里口初受廣百八十步深二丈有二尺巳下停廣百步髙下不等相折深二丈及泉曰停曰折者用古算法因此推彼知其勢之低昻相準折而取勻停也南白茅至劉莊村接入故道十里通折墾廣八十步深九尺劉莊至專固百有二里二百八十步通折停廣六十步深五尺專固至黄堌墾生地八里面廣百步厎廣九十步髙下相折深丈有五尺黄堌至哈只口長五十一里八十步相折停廣墾六十步深五尺乃濬凹里減水河通長九十八里百五十四步凹里村缺河口生地長三里四十步面廣六十步厎廣四十步深一丈四尺自凹里生地以下舊河身至張贊店長八十二里五十四步上三十六里墾廣二十步深五尺中三十五里墾廣二十八步深五尺下十里二百四十步墾廣二十六步深五尺張贊店至楊青村接入故道墾生地十有三里六十步面廣六十步厎廣四十步深一丈四尺其塞專固缺口修隄三重併補築凹里減水河南岸豁口通長二十里三百十有七步其創築河口前第一重西隄南北長三百三十步面廣二十五步厎廣三十三步樹置樁橛實以土牛草葦雜稍相兼髙丈有三尺隄前置龍尾大埽言龍尾者伐大樹連稍繫之隄旁隨水上下以破囓岸浪者也築第二重正隄并補兩端舊堤通長十有一里三百步缺口正隄長四里兩隄相接舊隄置樁堵閉河身長百四十五步用土牛草葦梢土相兼修築厎廣三十步修髙二丈其岸上土工修築者長三里二百十有五步有竒髙廣不等通髙一丈五尺補築舊隄者長七里三百步表裏培薄七步増卑六尺計髙一丈築第三重東後隄并接修舊隄髙廣不等通長八里補築凹里減水河南岸豁口四處置樁木草土相兼長四十七步于是塞黄陵全河水中及岸上修隄長三十六里百三十六步其修大隄刺水者二長十有四里七十步其西復作大隄刺水者一長十有二里百三十步内創築岸上土隄西北起李八宅西隄東南至舊河岸長十里百五十步顛廣四步趾廣三之髙丈有五尺仍築舊河岸至入水隄長四百三十步趾廣二十步顛殺其六之一接修入水兩岸埽隄竝行作西埽者夏人水工徴自靈武作東埽者漢人水工徴自近畿其法以竹絡實以小石每埽不等以蒲葦綿腰索徑寸許者從鋪廣可一二十步長可二三十步又以曳埽索綯徑三寸或四寸長二百餘尺者衡鋪之相間復以竹葦麻檾大繂長三百尺者為管心索就繫綿腰索之端于其上以草數千束多至萬餘勻布厚鋪于綿腰索之上㯻而納之丁夫數千以足踏實推巻稍髙即以水工二人立其上而號于衆衆聲力舉用小大推梯推巻成埽髙下長短不等大者髙二丈小者不下丈餘又用大索或互為腰索轉致河濵選健丁操管心索順埽臺立踏或罣之臺中鐵猫大橛之上以漸縋之下水埽後掘地為渠陷管心索渠中以散草厚覆築之以土其土復以土牛雜草小埽稍土多寡厚薄先後隨宜修叠為埽臺務使牽制上下縝密堅壯互為犄角埽不動揺日力不足火以繼之積累既畢復施前法巻埽以厭先下之埽量水淺深制埽厚薄叠之多至四埽而止兩埽之間置竹絡高二丈或三丈圍四丈五尺實以小石土牛既滿繫以竹䌫其兩旁竝埽密下大樁就以竹絡上大竹腰索繫于樁上東西兩埽及其中竹絡之上以草土等物築為埽臺約長五十步或百步再下埽即以竹索或麻索長八百尺或五百尺者一二雜厠其餘管心索之間俟埽入水之後其餘管心索如前薶罣隨以管心長索逺置五七十步之外或鐵猫或大樁曵而繫之通管束累日所下之埽再以草土等物通修成隄又以龍尾大埽密罣于䕶隄大樁分析水勢其隄長二百七十步北廣四十二步中廣五十五歩南廣四十二步自顛至趾通髙三丈八尺其截河大隄髙廣不等長十有九里百七十七步其在黄陵北岸者長十里四十一步築岸上土隄西北起東西故隄東南至河口長七里九十七步顛廣六步趾倍之而強二步髙丈有五尺接修入水施土牛小埽梢草雜土多寡厚薄隨宜修疊及下竹絡安大樁繫龍尾埽如前兩隄法唯修疊埽臺増用白闌小石并埽上及前洊修埽隄一長百餘步直抵龍口稍北攔頭三埽並行埽大隄廣與刺水二隄不同通前列四埽間以竹絡成一大隄長二百八十步北廣百一十步其顛至水面髙丈有五尺水面至澤腹髙二丈五尺通髙三丈五尺中流廣八十步其顛至水面髙丈有五尺水面至澤腹髙五丈五尺通髙七丈並創築縷水横隄一東起北截河大隄西抵西刺水大隄又一隄東起中刺水大隄西抵西刺水大隄通長二里四十二步亦顛廣四步趾三之髙丈有二尺修黄陵南岸長九里百六十步内創岸土隄東北起新補白茅故隄西南至舊河口髙廣不等長八里二百五十步乃入水作石船大隄蓋由是秋八月二十九日乙已道故河流先所修北岸西中刺水及截河三隄猶短約水尚少力未足恃決河勢大南北廣四百餘步中流深三丈餘益以秋漲水多故河十之八兩河爭流近故河口水刷岸北行洄漩湍激難以下埽且埽行或遲恐水盡湧入決河因淤故河前功遂隳魯乃精思障水入故河之方以九月七日癸丑逆流排大船二十七艘前後連以大桅或長樁用大麻索竹絙絞縛綴為方舟又用大麻索竹絙周船身繳繞上下令牢不可破乃以鐵貓于上流硾之水中又以竹絙絶長七八百尺者繫兩岸大橛上每絙或硾二舟或三舟使不得下船腹略鋪散草滿貯小石以合子板釘合之復以埽密布合子板上或二重或三重以大麻索縛之急復縛横木三道于頭桅皆以索維之用竹編笆夾以草石立之桅前約長丈餘名曰水簾桅復以木搘柱使簾不偃仆然後選水工便捷者毎船各二人執斧鑿立船首尾岸上搥鼓為號鼓鳴一時齊鑿須臾舟穴水入舟沈遏決河水怒溢故河水暴増即重樹水簾令後復布小埽土牛白䦨長稍雜以草土等物隨宜填垜以繼之石船下詣實地出水基趾漸髙復巻大埽以壓之前船勢略定尋用前法沈餘船以竟後功昏曉百刻役夫分番甚勞無少間斷船隄之後草埽三道並舉中置竹絡盛石並埽置樁繫䌫四埽及絡一如修北截水隄之法第以中流水深數丈用物之多施功之大數倍他隄船隄距北岸纔四五十步勢迫東河流峻若自天降深淺叵測于是先巻下大埽約髙二丈者或四或五始出水面修至河口一二十步用工尤艱薄龍口喧豗猛疾勢撼埽基陷裂欹傾俄逺故所觀者股栗衆議騰沸以為難合然勢不容已魯神色不動機解捷出進官吏工徒十餘萬人日加奨諭辭㫖懇至衆皆感激赴工十一月十一日丁巳龍口遂合決河絶流故道復通又于隄前通巻攔頭埽各一道多者或三或四前埽出水管心大索繫前埽硾後䦨頭埽之後後埽管心大索亦繫小埽硾前䦨頭埽之前後先羇縻以錮其勢又于所交索上及兩埽之間壓以小石白䦨土牛草土相半厚薄多寡相勢措置埽隄之後自南岸復修一隄抵巳閉之龍口長二百七十步船隄四道成隄用農家場圃之具曰轆軸者穴石立木如比櫛薶前埽之旁每置一轆軸以横木貫其後又穴石以徑二寸餘麻索貫之繫横木上密罣龍尾大埽使夏秋潦水冬春凌􅑉不得肆力于岸此隄接北岸截河大隄長二百七十步南廣百二十步顛至水面髙丈有七尺水面至澤腹髙四丈二尺中流廣八十步顛至水面髙丈有五尺水面至澤腹髙五丈五尺通髙七丈仍治南岸䕶隄埽一道通長百三十步南岸䕶岸馬頭埽三道通長九十五步修築北岸隄防髙廣不等通長二百五十四里七十一步白茅河口至板城補築舊隄長二十五里二百八十五步曹州板城至英賢村等處髙廣不等長一百三十三里二百步稍岡至碭山縣増培舊隄長八十五里二十步歸徳府哈只口至徐州路三百餘里修完缺口一百七處髙廣不等積修計三里二百五十六步伊斯喇店縷水月隄髙廣不等長六里三十步其用物之凡樁木大者二萬七千榆柳雜梢六十六萬六千帶梢連根株者三千六百藳秸蒲葦雜草以束計者七百三十三萬五千有竒竹竿六十二萬五千葦蓆十有七萬二千小石二千艘繩索小大不等五萬七千所沈大船百有二十鐵䌫三十有二鐵貓三百三十有四竹篾以斤計者十有五萬硾石三千塊鐵鑽萬四千二百有竒大釘三萬三千二百三十有二其餘若木龍蠶椽木麥稭扶樁鐵义鐵弔枝麻撘火鈎汲水貯水等具皆有成數官吏俸給軍民衣糧工錢醫藥祭祀賑恤驛置馬乗及運竹木沉船渡船下樁等工鐵石竹木繩索等匠傭貲兼以和買民地為河併應用雜物等價通計中統鈔百八十四萬五千六百三十六錠有竒魯甞有言水工之功視土工之功為難中流之功視河濵之功為難決河口視中流又難北岸之功視南岸又難用物之效草雖至柔柔能狎水水漬之生泥泥與草并力重如碇然維持夾輔纜索之功實多盖由魯習知河事故其功之所就如此𤣥之言曰是役也朝廷不惜重費不吝髙爵為民避害托克托能體上意不憚焦勞不恤浮議為國拯民魯能竭其心思智計之巧乗其精神膽氣之壯不恤劬瘁不畏譏評以報君相知人之明宜悉書之使執史氏者有所考證也先是嵗庚寅河南北童謠云石人一隻眼挑動黄河天下反及魯治河果于黄陵岡得石人一眼而汝潁之妖寇乗時而起議者往往以謂天下之亂皆由賈魯治河之役勞民動衆之所致殊不知元之所以亡者實基于上下因循狃于晏安之習紀綱廢弛風俗偷薄其致亂之階非一朝一夕之故所由來乆矣不此之察乃獨歸咎于是役是徒以成敗論事非通論也設使賈魯不興是役天下之亂詎無從而起乎今故具録𤣥所紀庶來者得以詳焉元史河渠志河決白茅隄又決金隄方數千里民被其患五年不能塞托克托用賈魯計請塞之以身任其事出告羣臣曰皇帝方憂下民為大臣者職當分憂然事有難為猶疾有難治自古河患即難治之疾也今我必欲去其疾而人人異論皆不聴乃奏以魯為工部尚書總治河防使築決隄河復故道凡八月功成元史托克托傳河入中國古今異宜後世講河事者非一家總之文多實少故罕成跡唯有費才力費日月以俟其自定而已禹貢曰浚川孟子曰水由地中行此二言者古今不可易之定理也後世之明于河事者亦有賈讓之三策亦有賈魯之三法若余闕所謂中原之地平曠夷衍無洞庭彭蠡以為之滙故河甞横潰為患斯言也尤為要切似非諸家所及大抵河患有二曰決曰溢決生于不能達溢生于無所容徙潰者決之小也汎濫者溢之小也雖然決之害間見而溢之害頻嵗有之被害尤大者則當其衝也是與河爭也其原蓋由于戰國非一日矣使賈魯之三法遂而有成亦小補耳且當嵗嵗為之其勞其費可勝言哉今欲治之非大棄數百里之地不可先作河陂以瀦漫波其次則濱河之處倣江南圩田之法多為溝渠足以容水然後濬其淤沙由之地中而後潤下之性必東之勢得矣陸深續停驂録山西髙平縣長平驛為賈魯故宅中庭古松十餘株皆當時物也天朝平定山西宅沒入官以其壯麗不忍毁即以為驛壁間題詩云賈魯修黄河恩多怨亦多百年千載後恩在怨消磨觀此則當時或以亟疾刻深招致民怨而其禦災捍患則後世亦有公論固不可得而盡非之蔣仲舒堯山堂外記平按元史賈魯本傳魯字友徳髙人以明經領鄉薦泰定初恩授東平教授歴工部郎中行都水監工部尚書總治河防使論功超拜榮禄大夫集賢大學士贈魯先臣三世尋拜中書左丞從托克托平徐州托克托既旋師命魯追餘黨攻濠州卒於軍有旨賜文鈔五百錠以給葬事魯之功名令終其所治之河今多遷改然在當時其功甚偉至今猶賴之後人不讀書遂謂魯治河以速元亡曹玉珂作河志至謂魯治河即漢賈讓之譬止兒啼者止之即止然啼止即斃其荼毒浮於宋囘河諸人嗚呼亦寃甚矣昔賈魯治河用沉舟之法人皆稱之明萬歴間僉事俞汝為奏議以為塞決簡便之用無如此者臣竊甞疑之夫河厎淺深坦陷不一惟草栁性柔一經壓擠則周遭充滿故塞決必用埽今以至平之舟厎而沉之淺深坦陷不一之湍流則埽根透溜之患必有不俟終日而見者然以魯之才其成功如此必非孟浪姑試之因于至正河防記沉思尋繹者累日方恍然知魯之沉舟蓋以之代壩而逼水非以之塞決而合龍也蓋彼時故河業巳通流但決河勢大水流多于故河十之八又適當秋漲洄漩湍急埽不能下又其上逼水三隄短弱而勢不支恐埽行一遲水盡湧決決則故河復淤前功盡隳因急沉舟為壩以逼之所謂搶救也故前則曰魯乃精思障水入故河之方後則曰船隄之後草埽三道並舉此並舉之三道乃加築前短弱之三隄也迨至船埽四隄並就河勢南流然後塞決耳不然魯于九月七日沉舟而龍口之合何以直至十一月十一日邪雖然臣以魯于是役也有三忌焉魯自受命以及囘朝僅踰半載昏曉百刻役夫分番無少間斷不恤民力一也築隄塞決正值伏秋用工于河流暴漲之候不審天時二也廢農冒暑聚十數萬軍民于一路不念國家隠憂三也蓋魯惟上恃君相之信任下恃其強敏果敢之才氣力排羣議犯三忌以成功蓋以之治河則有餘以之體國則不足宋濂等諸臣修元史因石人一眼之事意坐以亡元之罪則過矣夫石人一眼之謠是亦大澤中篝火狐鳴之𩔖殆韓山童李芝麻等所為耳何足據哉然而元之亡即不因魯毋乃火將然而投之燧耶靳輔治河書歐陽原功撰至正河防記以為魯能竭其心思知計之巧乗其精神膽氣之壯不惜劬瘁不畏譏評以報君相知人之明此實録非溢美也然魯為㑹通所窘河必不可北其所復者仍是東南入淮之故道耳魯巧慧絶倫奏功神速前古所未有惜乎其大才而小試之也使魯生漢武之世則導河入宿胥故瀆當無所難不僅如史遷所謂復禹舊跡者生明帝之世亦必能導河入清河合漳水至章武入海豈徒與王景等烈哉所遭不偶功成而亂作遂使庸人以魯為口實余深痛之禹貢錐指賈魯治河自黄陵岡南達白茅放于黄堌哈只等口又自黄陵西至楊青村合于故道凡二百八十里有竒仍命中書右丞約蘇和爾托噶同知樞密院事哈斯以兵鎮之元史順帝本紀村哈只口在今歸徳府楊青在今曹縣賈魯河自黄陵南達白茅放于黄堌等口即今賈魯河故道也白茅在曹縣黄堌在單縣萬歴丙申黄堌河決由賈魯河故道出符離集等處蓋即元人所挑矣穀山筆麈黄河故道自虞城以下蕭縣以上夏邑以北碭山以南由新集歴丁家道口馬牧集韓家道口司家道口牛黄堌趙家圈至蕭縣薊門出小浮橋此賈魯所復故道河防一覧賈魯河在東明縣南六十里斷頭隄元漕運所也賈魯所開故名直𨽻通志鄭州北有賈魯河自滎澤縣流入又東入中牟縣岸其源有三西源自密之聖水峪中源自滎陽之煖泉冰泉東源自州境之九仙廟合于張家村名曰合河至京水鎮曰京水河又北受須索二水曰雙橋河元末命賈魯疏治以通漕起鄭州至朱仙鎮皆名賈魯河儀封縣東北有黄陵岡與山東曹縣接界賈魯于黄陵岡開黄河故道今為黄河要害賈魯河在黄陵岡南二里曹縣西南有黄陵岡賈魯開黄河故道始此西北有賈魯河嘉靖前猶有運道自黄陵岡塞而此河遂填其南為大河洪流矣目遊四海記河歴觀諸書大約自南開封之儀封縣歸徳府之睢縣考城商丘虞城夏邑山東兖州府之單縣曹縣至江南徐州而止故𢎞治中河撫徐恪疏云黄陵岡賈魯舊河南經曹縣梁進口下通歸徳丁家道口今梁進口以南則滔滔無阻以北則淤塞將平計其功力之施僅八十餘里若疏而浚之使之由徐入淮又萬歴中科臣楊應文上疏議開趙渠盖商丘虞城而下至於徐州元賈魯故道也據此則賈魯治河之功至今猶烈元順帝至正十一年七月河決歸徳府永城縣壊黄陵岡岸元史五行志元順帝至正十二年春正月丙寅以河復故道大赦天下元史順帝本紀永按河復故道者即賈魯所開之河道也因前一年城河決壊黄陵岡岸至是修復之故頒赦天下亦托克托丞相之張大其事也至正十四年河溢金鄉魚臺墳墓多壊彦斌母卒慮有後患乃為厚棺刻銘曰邳州沙河店史彦斌母柩仍以四鐵環釘其上然後葬明年墓果為水所漂彦斌縛草為人置水中仰天呼曰母棺被水不知其處願天矜憐假此芻靈指示母棺言訖泣涕横流乃乗舟隨草人所之經十餘日行三百餘里草人止桑林中視之母柩在焉載歸復葬之元史史彦斌傳流金鄉河溢害及魚臺墓内之棺至漂三百餘里其害甚劇而元史五行河渠二志俱不載何與元順帝至正十六年河決鄭州河隂縣官署民居盡廢遂成中流元史五行志是年八月黄河決山東大水元史順帝本記元順帝至正十九年九月濟州任城縣河決元史五行志元順帝至正二十二年七月河決范陽縣漂民居元史順帝本記元順帝至正二十三年七月河決東平夀張縣圮城牆漂屋廬人溺死甚衆元史五行志元順帝至正二十五年秋東平須城東阿平隂三縣河決小流口達于清河壊民居傷禾稼元史五行志元順帝至正二十六年二月河北徙上自東明曹濮下及濟寧皆被其害八月棣州大清河決濵棣二州之界民居漂流無遺濟寧路肥水縣西黄水汎溢漂沒田禾民居百有餘里徳州齊河縣境七十餘里亦如之元史五行志大河之流自漢至今遷移變易不可勝紀然孟津以西則禹迹具存以海為壑則千古不易也自孟津而東由北道以趨于海則澶淵其必出之途由南道以趨于海則曹單其必徑之地衝澶滑必由陽武之北而出汲縣胙城之間衝曹單必由陽武之南而出封丘蘭陽之下此河變之托始也由澶滑而極之或出大名歴邢冀道滄瀛以入海或歴濮范趨博濟從濵棣以入海由曹單而極之或溢鉅野浮濟鄆謂濟寧東平挾汶濟以入海或經豐沛出徐邳奪淮泗以入海此其究竟也要以北不出漳衞南不出長淮中間數百里皆其縱横糜爛之區矣自陽武而入封丘河益東南流荆隆口直東則經長垣東明出曹濮直趨大清河矣較之出徐邳合淮泗以入海者道為徑易夫河行之道宜直不宜紆入海之口宜近不宜逺河之兩岸宜濶而歸流宜深歸流即俗語所謂落槽也平水則宜置斗門且多置之用王景更相迴注之意使不得旁洩河未必不可東也後世遙隄之法即兩岸宜濶之意縷隄之法即歸流宜深之意滚水石壩及格隄之法即斗門迴注之意雖然大河東則㑹通河廢㑹通河不廢則大河不可得而東兩者不竝立矣此大河所以屢決而東終抑之使南也顧一柔山居贅論行水金鑑巻十七
