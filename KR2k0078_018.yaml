body:
  text: 行水金鑑卷十八江南按察使傅澤洪撰河水元順帝至正二十六年四月丁已王宣元末為司農掾㑹黃河決省部募淮揚才能之士俾召集民丁疏濬之宣挺身自薦元以為淮南淮北都元帥府都事賫楮至揚州市竹篾募丁夫數月之間得丁夫三萬餘就令宣統領治河數月工成明太祖實録吳元年丁未十一月遣大將軍率馬步被堅者二十有五萬渡江越淮北入中原首服齊魯明年洪武初夏四月定河洛秋八月元君棄城逺遁沙漠又冬轉戰晉冀撫有其地關右望風送欵中原是平嘗云君天下非都中原不可今中原既平必躬親至彼仰觀俯察擇地以居之遂於當年夏四月率禁兵數萬往視之遡流河上是月抵汴梁當是時機務浩繁雖有山川秀麗古今人之事跡一時不暇歌咏至九年秋八月祀社齊於奉天門夕坐道上有儒臣待制李思迪者侍傍皆當時同舟往者因言北狩河水變遷欲為之說未文明日午漏思迪以說來進觀斯文意壯水勢說河源文頗順序朕因以為之述元年夏四月敕有司清江淮水濵及河際故道某日乘巨艘抵瓜洲是時春水方既潦水初興江無洪濤日無酷暑時有清和利征且言舟入運河舍半抵廣陵三日至淮隂舟師入淮是日巽上風多揚帆飛幟不二時而達河淮二水相合之處見水分兩道清濁如介並流二十餘里方見混流東注既而越淮入河方覺水土同流極濁而無清至黃而無黑更無他色所以古今稱黃河宜其然也舟行三旬晝夜居斯水上時刻聽觀其勢若萬馬奔馳其狀若大地轟雷其湍流之速一息莫視其山回石轉之處則水繞勢盤旋如羊角水底玲瓏因風激怒濤飛潑天則珠飛雨降有時巨浪如隄倐然而湧橫亘其河使湍者緩流者止細浪者無文良久之間衆流輻輳其橫亘之水將消忽然一水周旋則水底有聲喑喑嗚嗚又少時間水中一穴若數丈圍有如井狀上通天氣下至河底俗呼旋渦是也其水為旋轉急甚中有飛者上起去渦丈餘霏霏臨岸沸沸觸人其流於兩山峽之處或直而湍或曲而折或繞石而旋或復流以觸岸或怒急而雪浪成堆或使山傾地陷或舟覆而楫摧或巨魚一尾之間雖呼吸之際早十里之程若胎龍美之而出戲或蜿之以一蜿則淵深無底四野成湖若蜒之以一蜒則瞬目千里莫可止焉斯水之急乘利之物則有若是耶斯水人云神水每患於中國為民害者多矣朕親游斯上觀斯水之勢遇兩山之間河狹水急宜其然歟至於平原曠野則東蕩西坍使桑田變遷水勢少慢亦宜其然歟此堅柔之所由孰謂有神者歟若非河之無神却乃有之所以有之者極濁而難澄滔滔東注亘古今而不息此久常者也忽然而極清人影皆毫釐洞見如此者或千百里或數十里斯可謂神者焉故上古人君載在祀典畏之祀之為民祈福焉今朕得觀斯水狹直處如經如弦凡山回石起之處則盤若羊腸若河隂以達於徐宿地曠而原平則不然斯水汗汗漫漫浩浩蕩蕩有不可測焉禹貢注云三門未開呂梁未鑿則河出孟門之上則未為當也必後人訛其文相傳差矣朕曩者既游今思復述以為說耳明太祖御製黃河述洪武元年河決曹州從雙河口入魚臺河防一覽明太祖洪武八年春正月河決開封府大黃寺隄百餘丈詔河南參政安然集民夫三萬餘人塞之明太祖實録是年大河南決挾潁入淮蔡河之下流亦漸絶目遊四海記明太祖洪武十一年冬十月丙辰開封府蘭陽縣言河決傷稼詔免其租十一月戊寅開封府封丘縣言河溢傷稼命免今年田租明太祖實録明太祖洪武十四年秋七月庚辰河南原武祥符中牟諸縣河決為患有司以為言上曰此天災也今欲塞之恐徒勞民力但令防護舊隄勿重困吾民明太祖實録明太祖洪武十五年二月壬子上以河南水災民饑命駙馬都尉李祺往賑之敕諭祺曰河南奏黃河水決瀰漫數百里漂蕩民居百姓遷移不得寧處朕甚憫焉今東作方興民飢窘不得耕作特命爾往賑之無使一夫一婦不獲其所爾其欽哉祺承命而行復命賫敕諭布政司及府州縣曰大河之水天泉也必有神以司之若所在牧守得人政務修舉則其水蜿蜒東注無摧山裂石之患而民安焉茍非其人則衝決城邑蕩析民居而牧守亦與其禍此感應之必然也去嵗河南來奏河水漂沒數州田園一空桑麻盡為所傷良由牧守非人方春東作將興民無衣食何以立命今特命駙馬都尉李祺賫敕往所傷之處優給其民雖不足為厚恩亦庶以少蘇其困苦爾為牧守者宜加修省以惠養其民無違朕命明太祖實録明太祖洪武十六年三月庚午河決朝邑縣募民塞之六月乙卯河溢滎澤陽武二縣明太祖實録明太祖洪武十七年春正月乙已彰德府奏臨漳縣河決宜於磁州築隄以障之詔從其請八月丙寅朔開封府河決東月隄自陳橋至陳留橫流數十里壬申河決杞縣入巴河命户部遣官督所司塞之丙子上諭戶部曰比者河決開封屬邑漂沒民居淹浸田畝受害者必衆其有被水災者悉蠲其賦稅明太祖實録明太祖洪武十八年九月丁亥詔修築漳河隄先是上諭工部臣曰去年河決臨漳民受其患雖嘗修築隄防恐不可久宜遣官與布政司都司㑹議凡隄塘堰壩可以禦水患者預為修治至是有司以黃河沁河漳河衛河沙河所決隄岸丈尺之數具圖計工以聞詔以軍民兼築之明太祖實録洪武二十年河決開封城自安逺門入淹沒官民廨宇其衆河南通志明太祖洪武二十三年秋七月壬辰河南河決漂沒民居命賑恤之被災之家一萬五千七百一十二凡鈔二萬五千二十錠開封府西華等縣雨河水暴溺沒民田廬民多饑困上命賑之明太祖實録是年詔築歸德州鳳池河防時河決鳳池漂沒夏邑永城諸縣有司不以聞民李從義詣闕奏訴從之河南通志明太祖洪武二十四年三月乙丑河南河水暴溢時開封府陳留睢州歸德夏邑寧陵被水患民千三百七十四户詔遣官循例賑之未幾陳州項城縣亦奏河溢民被水患仍遣官往賑之明太祖實録是年河決原武淤安山明㑹典是年河決原武之黑陽山東經開封城北五里又南行至項城經潁州潁上東至夀州正陽鎮全入於淮而故道遂淤河防一覽明太祖洪武二十五年春正月庚寅河決河南開封府之陽武縣浸淫及於陳州中牟原武封丘祥符蘭陽陳留通許太康扶溝杞十一州縣有司具圖以聞乞發軍民修築隄岸以防水患從之丙午以開封府祥符等縣河決詔免今年田租冬十月辛酉發河南開封等府民丁及安吉等十七衛軍士修築陽武縣河防十一月甲辰河南開封府祥符縣民詣闕言昔河決浸沒田土至今不可樹藝而徵稅如故上命免其賦凡萬一千二百餘石絲五千四百餘斤明太祖實録明太祖洪武二十九年夏四月已亥罷開封府馮陵十字河龍堂快活林傘兒三里萬龍及陳州東橋凡八閘明太祖實録是年河南藩臣請修宜陽河防先因洛河泛溢宜陽田廬漂沒殆盡至是始聞於上令預治磚石俟農隙時為之河南通志明太祖洪武三十年春正月乙亥詔除黃河兩岸河泊所魚課先是河決懷慶等府州縣民人貧困上聞之命除懷慶而下至正陽河口黃河兩岸河泊所魚課仍聽其民採魚以給食明太祖實録是年秋八月河溢開封時城三面皆受水將浸及軍儲倉巨盈庫詔令滎陽髙阜處築倉庫以待之冬十有一月蔡河南徙入陳州先是河決由府城北而東行至是下流淤塞故又決而之南也河南通志李至剛洪武中為河南右參議河決汴隄至剛議借王府積木作筏濟之建文中調湖廣左參議明史稿明太宗永樂元年八月丁已修河南安陽縣河隄壬申工部言山東福山縣河決護城隄二百九十餘丈命即修築九月壬午工部言河南陳州西華縣沙河水溢衝決隄堰以通黃河傷民禾稼乞量起民丁趁農隙修築從之十二月丁亥修山西夏縣古河決隄三十餘里明太宗實録明太宗永樂二年五月癸酉修河南府孟津縣河隄九月已酉修河南武陟縣馬由隄岸丁巳河南守臣言開封府城為河水所壞命發軍民修築十月丁丑河南黃河水溢命河南都司布政司城池有衝決者即修之明太宗實録明太宗永樂三年二月丁卯朔河南布政司言河決馬村隄命本司官躬督民丁修治明太宗實録明太宗永樂四年八月癸已修河南陽武縣黃河隄岸及中牟縣汴河北隄明太宗實録明太宗永樂五年七月丁卯黃河泛溢河南傷瀕河苗稼十一月癸丑河南彰德府湯隂縣言河水泛溢沒民田一百九十一頃有竒乞免今年稅糧從之明太宗實録明太宗永樂六年正月甲子河南武陟縣知縣屠任言縣東關至北賈村等處去年淫雨沁水衝決隄岸淹沒田廬請用民力修築從之明太宗實録明太宗永樂七年正月已卯河南陳州衛言河水衝決城垣三百七十六丈護城隄岸二千餘丈請以軍民兼修從之明太宗實録明太宗永樂八年八月庚申河南按察司僉事張翥等言五月至八月霪雨黃河泛溢壞開封舊城民被患者萬四千一百餘戶沒田七千五百餘頃上命户部遣人巡視安撫十二月戊戌河南守臣言汴梁河決壞城二百餘丈宜及時修理上諭工部臣曰汴梁城近黃河不免衝決之患而此國家藩屏之地不可以緩且聞黃河水增三尺其急遣人往視隄防明太宗實録明太宗永樂九年二月已酉河南武陟縣言去嵗天雨浸淫沁河南北九百餘步流潰成河淹土田廬舍請以丁夫修築從之三月壬午浚河南黃河故道蓋河水纍嵗為患修築隄防民用困弊至是河決壞民田廬益甚事聞遣工部侍郎張信往視信訪得祥符縣魚王口至中灤下二十餘里有舊黃河岸與今河面平浚而通之俾循故道則水勢可殺遂繪圗以進詔發河南民丁十萬命興安伯徐亨工部侍郎蔣廷瓚率運木夫同侍郎金純相度開浚丁夫給糧賞且蠲户內今年租稅仍遣定國公徐景昌以太牢祠河神户部侍郎古朴以太牢祭河南境內山川時工部尚書宋禮督工開㑹通河遂命禮兼董之四月癸卯命户部開河自效民丁一體給糧賞免租稅初朝議開㑹通河及浚河南黃河命户部凡民丁皆給米鈔及蠲户內是年租稅而山東河南之人多有自願效力者上聞之遂有是命六月丁未敕諭尚書宋禮等曰曩命卿等浚黃河故道及築塞河港以紓河南水患今久未見成績而河水泛溢日加為民患苦卿等其協心併力無懈夙夜脫民墊溺用副朕委任之意七月已卯遣官視新開黃河隄岸舊為水所溢者悉增築之乙酉河南浚黃河故道訖工凡役民丁十一萬四百有竒月餘而畢自是河循故道與㑹通河合而河南之水患息矣明太宗實録張信祥符人舉建文二年鄉試第一永樂中歷工部右侍郎河決開封遣信視之請疏魚王口至中灤故道二十餘里繪圗以進詔如其議役十萬人浚之決遂塞宣德中以錦衣衛帶俸都指揮同知致仕明史稿明太宗永樂十年六月癸亥河南鄢陵臨漳二縣驟雨河水壞隄岸沒田禾事聞皇太子遣人撫視辛未初河南陽武縣言河決中鹽隄二百二十餘丈漫流中牟祥符尉氏諸縣中鹽隄與原武縣大賔隄皆河流之衝屢塞屢決上遣工部尚書藺芳按視至是芳言隄當急流之衝夏秋之交雨水泛漲往往決阤請以新開河岸捲土為掃樹樁捍禦之庶不至重為民害從之九月丙申工部主事藺芳言天下之水唯河為大故水患唯河為甚今於中灤分導河流使由故道北入於海河南之民免於昏墊誠萬世之利然緣河新築護岸掃座止用蒲繩泥草不能經久臣愚以為若用木編成大囤若欄圈然置之水中以樁木釘之中實以石却以橫木貫於樁表牽築隄上則水可以殺隄可以固而河患可息如允臣所言乞令河南近河府衛徵軍民於農隙採木春和修砌從之十二月戊戌都察院左副都御史李慶等劾奏河南三司官坐視河決為患不奏幸䝉恩宥令躬督修治又轉委僚屬而不親行以致軍民勞而無功上曰下不恤民患上不奉君命其治之如法明太宗實録按芳策與張信同用木囤則王延世竹落遺法也延世以此成功芳襲之而仍效允矣古人之成法不可不知也河志明太宗永樂十一年三月已丑巡按河南御史李琳言軍夫修築河岸者今河水日長難於用力況東作正興請暫停止俟秋收水落用工皇太子從之六月癸亥修朝州衛城以河水衝決故也八月庚午河南遂平縣言河決隄岸漂沒民居四百二十餘所壞田稼六十頃有竒皇太子遣官撫視修築十月戊寅修河南滎澤縣大賔河隄明太宗實録明太宗永樂十二年八月辛亥黃河溢壞河南土城二百餘丈事聞命工部遣官修築九月丁亥修河南武陟縣郭村馬曲等河土隄凡五百六丈閏九月丁已徙陳州宛丘驛及遞運所於沙河北岸初置於州城之北比年黃河淤塞故徙之甲子修河南開封府土城隄岸百六十餘丈明太宗實録明太宗永樂十三年六月甲申山西布政司言遼州淫雨河水暴溢壞民田三十餘頃命戶部除其租是月北京河南山東淫雨河水泛溢壞廬舍沒田稼而東昌府臨清縣尤甚民被害者九萬九千二百户有竒命户部遣官賑恤九月丙申修河間府興濟縣水決隄岸十二月丙子山東館陶縣北京南樂縣民自陳今夏河水泛溢淹沒禾稼秋收不足以輸稅乞折鈔帛從之明太宗實録明太宗永樂十四年七月壬寅河南開封府等十四州縣淫雨黃河決隄岸沒民居田稼明太宗實録是年河決開封經懷逺縣由渦河入於淮淮安府志明太宗永樂十六年七月乙丑大名府魏縣言河決隄岸命修築之十月甲申行在工部言河南黃河溢決掃座四十餘丈命遣官修築明太宗實録明太宗永樂二十年十月壬寅工部言河南開封府仁和門外土城隄舊離黃河五里餘河自邊村經獨樂岡南入淮北河決而西蕩齧城隄雖屢修築旋復衝決宜浚故道以弭其患從之明太宗實録明太宗永樂二十一年五月癸未戶部尚書郭資言河南開封府歸德睢州祥符陽武中牟寧陵項城永城滎澤太康西華蘭陽原武封丘通許陳留洧川杞縣及南陽府內鄉衛輝府新鄉獲嘉汲淇輝縣并鳳陽府宿州去年夏秋淫雨黃河泛溢并傷田稼命遣人按視蠲其租稅明太宗實録王林永樂中知青縣以河決禾稼盡沒痛不能救投水而死尸漂入縣南甬路官民憐之遂於隄上置祠祀焉名曰神隄畿輔通志明太宗永樂二十二年九月庚辰仁宗已登極矣以河南黃河泛溢祥符陳留鄢陵太康陽武原武諸縣多傷禾稼敕免今年稅糧馬草仍命都察院右都御史王彰都指揮同知李信往鎮撫軍民上諭彰曰卿任朝廷耳目之寄且河南鄉邦下情鬱不上達久矣凡有可以利安軍民者悉具奏來各府州縣亦須周歷咨訪庶幾可以得民之情十月辛卯漳河水溢廣宗縣傷民田稼百餘頃有司以聞命户部遣人賑恤十一月庚子敕河南布政司今永城縣奏去年七月黃河泛溢傷稼其被傷去處去年稅糧馬草悉與蠲免明仁宗實録樂薈蕞云河南通志載永九年秋八月庚戌尚書宋禮治河新港成河復故道禮還京皇太子遣人勞視自是無水災者三十餘年噫何記載之失實也宋尚書功在運河至今猶烈而黃河之遷變無常公雖能治水亦焉得保三十餘年之無事耶豫聞實録自九年河復故道之後十年鄢陵臨漳二縣壞隄岸矣十一年朝州衛城被衝決矣遂平滎澤皆河決隄岸矣十二年壞河南開封土城矣武陟修隄陳州徙宛丘馹及遞運所矣十三年河南河水泛溢壞廬舍沒田稼矣十四年開封等府十四州縣黃河決隄岸矣十六年工部言河南黃河溢決掃座四十餘丈矣二十年二十一年河決而西屢修築旋復衝決開封南陽等府浸淫至二十四州縣矣又宣德元年河南布政司奏黃汝二河溢開封南陽等府十餘州縣矣宣德三年開封府鄭州祥符等十縣河水泛溢矣宣德五年南陽府奏衝決河岸漂流人畜矣宣德七年九年河南開封懷慶二府皆以黃沁二河為患豁免錢糧在在興築矣自永樂九年至宣德十年水患如此即正統元年以至十三四年黃河無嵗不決直決至張秋沙灣入海尋決滎澤入淮為黃河之一大變實録歷歷言之可考而知也通志乃云三十餘年無水災何記載若是之失實耶毛西河先生嘗有言曰天下不可信者三一道經紀黃帝君臣一姑布子家談人相有休咎一天下志書所載山川疆域人物災祥斯三者皆不可信而志書為尤甚斯言豈欺我哉以故孟子曰盡信書則不如無書明宣宗宣德元年七月已未河南布政司奏六月至七月連雨不止黃汝二河溢開封府之鄭州及陽武中牟祥符蘭陽滎澤陳留封丘鄢陵原武九縣南陽府之汝州河南府之嵩縣多漂流廬舍淹沒田稼十一月庚戌寧夏總兵官寧陽侯陳懋奏靈州千户所城垣舊距黃河三里今河水衝激切近城下恐致崩陷難於守禦城東有地髙爽寬平請徙城於彼上命行在工部遣官覆視果當徙俟來春用工明宣宗實録明宣宗宣德二年七月乙卯直隸河間府獻縣真定府晉州饒陽縣奏河水衝決宫儉口及窯隄口黃潦漫流田禾淹沒上命行在工部遣人巡視凡水勢衝決之處隄堰當增修者即發民興工八月甲子直隸徐州保定府深澤博野束鹿蠡縣河間府河間縣各奏七月積雨連旬河水泛溢衝決隄岸淹沒禾稼明宣宗實録明宣宗宣德三年二月甲子徙置靈州千戶所於城東先是寧夏總兵官寧陽侯陳懋奏河衝決至城下請徙於城東命俟來春用工至是城成遂徙之閏四月庚子復傅啓讓河南按察司僉事升正品祿啓讓九年考最河南民二百餘人言啓讓公直勤慎有守有為開封城東河水為患啓讓躬率民築隄百五十餘丈捍禦田得耕種民免流移又開歸德州鳳池口以泄河流民受其利乞賜本官復任上諭行在吏部臣曰僉事可謂能興利除患其民愛之當從所欲令赴任而加其祿六月庚寅上諭行在工部臣曰緣河隄岸每嵗多是預防今年雨多潦水泛溢必傷田禾宜遣官督軍衛有司巡視稍有潰決即用修築其他卑薄之處亦令增髙培厚庶不為患九月丙子河南開封府之鄭州祥符陳留滎陽滎澤鄢陵杞中牟洧川等十縣河水泛溢上命户部遣人覆視免其租明宣宗實録明宣宗宣德五年十月癸已河南南陽府奏七月初旬驟雨連日山水泛漲衝決河岸漂流人畜廬舍淹沒農田粟穀豆皆已無收命行在户部優恤乙未直隸廣平府成安縣及大名府內黃縣奏六七月大雨連綿河水漲溢淹沒官民田地苗稼無收上命行在户部蠲其田稅明宣宗實録趙泰永樂癸卯舉人為常州同知開孟瀆得勝二河作魏村閘㑹河決東昌特升公都水郎中往塞河既興功時尚書周公為侍郎巡撫南畿總蘇松諸郡糧賦薦公協同都運詔從之王英撰趙君墓志德按周公巡撫南畿在宣五年之後明宣宗宣德七年六月乙卯巡撫侍郎于謙奏開封祥符中牟尉氏扶溝太康通許陽武夏邑八縣去年七月黃河泛溢衝決隄岸淹沒官民田五千二百二十五頃六十五畝該納秋糧五萬六千八十餘石馬草七萬六千五百餘束乞為除豁從之明宣宗實録明宣宗宣德八年閏八月癸丑大名府魏縣廣平府廣平縣各奏今年七月苦雨河水漲溢淹沒田稼明宣宗實録明宣宗宣德九年正月癸卯河南新鄉縣知縣許宣言比年沁河水漲衝決馬曲灣湍勢湧急經獲嘉縣至新鄉水深成河環繞城垣城北又滙為潭其患滋甚已築隄百餘丈防之終莫能禦蓋修築馬曲灣隄岸不固所致乞令懷慶府縣督工堅築俾水復沁河則水患可息上命行在工部遣人視其地勢及議計用工難易以時興役明宣宗實録明宣宗宣德十年七月戊戌英宗巳即位矣直隸河間淮安等府各奏去嵗天雨連綿河水泛溢所屬州縣田苗淹沒無收上命行在户部遣官覆視除其租稅明英宗實録明英宗正統元年秋七月河南開封府奏淫雨連綿河隄衝決災傷害稼明英宗實録鄭辰南京工部右侍郎正統元年命辰賑南畿河南饑時河隄決即命辰伺便修塞或議自大名開渠引諸水通衛河利灌輸辰言勞民不便事遂寢遷兵部左侍郎明史稿明英宗正統二年四月壬午巡撫河南山西行在兵部右侍郎于謙奏開封彰德河南懷慶衛輝五府所屬州縣自去年閏六月以來天雨連綿河水衝溢淹沒田土其被災地畝糧芻乞為除免從之六月庚辰命行在都察院右副都御史賈諒等賑濟饑民時直隸鳳陽淮安揚州諸府徐和滁諸州河南開封府各奏自四月至五月隂雨連綿河淮泛漲民居禾稼多致漂沒人不聊生勢將流徙上命諒及工部侍郎鄭辰往視之諒陛辭諭之曰民困已甚卿等速往發廩濟之撫恤得宜毋令失所河隄衝決相機築塞毋興大役重困吾民八月戊寅巡按河南監察御史薛希璉奏近因天雨連綿河水泛漲開封府所屬祥符等縣民居學舍田禾頭畜多被淹沒上命行在户部遣官覆視仍戒三司官善加撫諭其一應買辦并未納錢糧勾軍等項悉暫停止九月已酉河南開封府陽武原武滎澤三縣秋雨漲漫決隄岸三十餘處有司請發民二萬軍一千餘協力修築從之十月已未濮州范縣奏八月黃河溢決民居牲畜禾稼皆被漂沒上命該部勘實從宜修築優恤十一月乙已河南左參議吳傑奏所轄各府州縣今年春旱傷麥五月淫雨河溢田禾盡損民饑特甚乞將原定本布政司起運并兌軍糧米二十九萬八千五百石存留以補賑濟上從其言明英宗實録明英宗正統三年七月癸卯巡撫河南山西行在兵部右侍郎于謙奏開封府陽武縣黃河決懷慶府武陟縣沁河決直隸廣平順德二府亦奏漳河決俱傷禾稼上命行在戶部遣官覆視謙又奏請修築沁河以便民耕種從之八月乙丑直隸淮安府邳州河決田禾稼損山東魚臺望鄉嘉祥尤甚巡撫右侍郎曹𢎞以聞詔令隨宜修築戊辰山東兖州萊州二府所屬州縣各奏隂雨連綿河水泛漲淹沒禾苗上命行在户部遣官覆視以聞九月癸未山東濟寧州東平州直隸徐州屬縣各奏七月中驟雨河溢軍民廬舍俱被傾蕩田畝禾稼淹沒無遺上命行在户部遣官覆視明英宗實録行水金鑑卷十八
