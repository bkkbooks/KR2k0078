body:
  text: 行水金鑑巻十九江南按察使傅澤洪撰河水明英宗正統四年六月癸已河南開封衞輝彰徳三府各奏自五月至今淫雨河漲漂民居舍禾稼上命行在戸部遣官覆視以聞明英宗實録明英宗正統五年七月庚辰河南開封彰徳諸府自五月至七月淫雨河水泛漲事聞命行在户部遣官覆視壬寅順天保定河間順徳廣平自六月迨今淫雨連綿河水泛溢事聞命行在戸部遣官覆之明英宗實録明英宗正統八年七月甲子乆雨黄河汴水泛溢壊隄堰甚多詔隨宜浚築之明英宗實錄明英宗正統九年閏七月戊寅直隷大名山東濟南河南開封衞輝懐慶各奏河溢明英宗實録明英宗正統十年九月辛已陜西鄜州奏今夏大雨河水泛漲決本州城垣一隅敗官民廬舍欲先修理城垣而被患之餘工力不堪乞分命屬縣協助從之庚子河決金龍口陽穀隄張家黒龍廟口上命山東三司亟修完之十月辛亥河南睢州磁州祥符杞縣陽武原武封丘陳留安陽臨漳武安湯隂林縣涉縣皆以今夏乆雨河決淹沒民田屋宇畜産無算巡撫少卿于謙以聞上敕河南三司率夫往修之明英宗實録正統十二年秋七月河決張秋沙灣入海尋決滎澤入淮工部尚書石璞治之續文獻通考明英宗正統十三年六月壬申河南陳留縣奏今年五月間河水泛漲衝決金村隄及黑潭南岸已倩人夫修築將完復決比舊深濶難制乞命軍夫協力修築從之秋七月寧夏乆雨河決漢唐壩敗黑山營及沿邊汝箕等口闗牆墩臺總兵都督同知黄真以聞上命真亟率工修完之七月已酉河決河南八柳樹口漫流山東曹州濮州抵東昌壊沙灣等隄傷民田廬無算事聞工部言水勢洶湧恐敗各州縣城垣請令山東三司於附近不被災府衞發工修築視其緩急而先後之察其窮乏而撫䘏之上命工部右侍郎王永和往視其事十二月丁丑工部右侍郎王永和修沙灣等隄未成以冬寒停工且奏河決自衞輝八柳樹口宜敕河南巡河及三司官修塞上敕責之曰八柳樹河決不由金龍口故道東流徐州吕梁以溢運河致妨漕運患及山東特簡命爾往董其事冀在急䘏其患預定其謀躬詢其源以副朕意乃輒以天寒罷工且以築塞之工諉之與人不知朝廷所以委任爾之所以盡職何在且治水有術當先其源先治八柳樹口然後及沙灣則易成功茍治其末不事其源朕知春冬水小暫能閉塞夏秋水漲必仍決溢今正用工之時其令山東三司築沙灣爾即往河南督同三司等官躬措置八柳樹上流如何修塞金龍口等處如何疏通務在河由故道不為民害仍先以爾等經畫方略及合用軍夫物料之數以聞或爾不能獨理宜添重臣亦可奏來明英宗實錄是年河溢滎陽縣自開封府城北經曹濮二州陽穀縣以入運河至兖州府沙灣之東決大洪口諸水從之入海明㑹典黄河經開封府北東行洪武二十四年河決原武縣東南至項城矣正統十三年又決滎陽縣而東抵項城遂達於太和由界溝税子鋪等集東至界牌達和西南達潁州正陽注於淮俗呼為恵民河即宋時漕河也上通古汴下達淮泗太和縣志正統中河溢陽武城郭村落皆盡目遊四海記是年河徙開封西北滎澤縣孫家渡口入汴河至夀州入淮七月河又決滎陽東過開封城西南經陳留自亳入渦口又經䝉城至懐逺界入淮按河決之患三代已然漢文帝時河決酸棗漢武帝而後則決於瓠子決於館陶分為屯氏河東北入海至元成時河始決東郡分流於博州後又決平原決勃海決信都皆東北出青冀之境以達於海自東漢歴魏晉隋唐以及宋初並鮮河患迨宋仁宗至和間河始決大名神宗熙寧始決於澶州曹村北流斷絕河道南徙東滙於梁山濼分為二派一合南清河入於淮一合北清河入於海黄河入淮自兹濫觴矣舊黄河在開封城北四十里至洪武二十四年河決原武故道遂淤至是又決滎陽過開封城之西南而城北之新河又淤自是汴城在河北矣隋唐以前河自河淮自淮各自入海宋中葉後河合於淮以趨海矣此古今河道遷徙不同之大略然前代河決不過壊民田廬而已我朝河決則慮併妨漕運而闗係國計故治河視前代為尤急續文獻通考禹於帝堯八十載癸亥告成功河自右碣石入於海碣石山名在今永平府昌黎縣後一千六百七十六年為周定王五年已未周譜曰河徙水經注云河徙故瀆並不言所在唯漢地理志魏郡鄴縣下注云故大河在東北入海故河入海之一變也鄴縣在今彰徳府臨彰縣西逮漢武帝元封二年壬申既塞宣房後宣帝地節元年壬子前此四十一年間河復北決於館陶分為屯氏河東北至章武入海章武城在今河間府鹽山縣西北此河入海又一變也宋史河渠志神宗熙寧十年丁已七月乙丑河大決於澶州曹村澶淵北流斷絶河道南徙東滙於梁山張澤濼分為二派一合南清河入於淮一合北清河入於海北清河濟水故道南清河即今泗水淮安府清河縣之清口是此又一變矣洪武二十四年辛未河全入於淮而故道遂淤雖永樂九年辛卯復疏入故道而正統十三年戊辰終合并於淮為河入海之又一變於是天壤間所謂四瀆者僅有二瀆耳殆氣運使然恐亦非人力之所能為矣閻若璩四書釋地續正統十四年春三月工部右侍郎王永和奏治河事宜先是沙灣之役永和以冬寒遽停工又以決自河南敕彼共事上切責之至是言黑陽山西灣已通水從泰通寺資運河東昌則置分水閘設三空泄水入大清河歸於海八柳樹工猶未可用沙灣隄宜時啓分水二空瀉上流庶可亡後患從之谷應泰明紀事本末河決山東河南諸郡改而北注漕河被其潰溢公受命往治之浚泄有方軍民受恵者不可勝計比還遂以能事簡預扈從竟殞於國事云陳循撰工部右侍郎贈尚書王公碑山按永和字用節崑人永樂甲午舉人明英宗正統十四年五月辛卯上聞沙灣等河修理略有成績詔工部臣曰河道既通漕運今農務方殷其令軍夫休役河南山東河口隄岸乃命各巡河及三司官乗時率工濬築明英宗實録明景帝景泰三年四月丙子遷河南原武縣治先是黄河決縣治城垣學舍俱淪沒古巻縣址去舊治十餘里地頗髙爽乃遷於其處從巡撫河南右副都御史王暹奏請也八月丁丑陜西大雨黄河泛決延安綏徳等處城圮都督王楨以聞命楨督工亟修完之九月辛卯敕諭太子太保兼都察院左都御史王文近聞南京地震江淮以北直至濟寧水漲淹沒房屋禾稼逺近乏食棲止無所或至流移及東昌府接連河南地方往因黄河奔潰北流散漫衝決漕河隄岸阻滯官民運輸雖甞遣人修濬尚未有經乆計此皆朕所晝夜在心不遑安於寢食者也朕以爾為憲臣之長素有幹濟之才特命往理其事凡所至處茍有可以安輯國家拯濟生民通順河道一切興利除害之事悉聽爾廣詢訪便宜而行有應奏請及與山東河南巡撫方面府州縣及公差官員同議從長處置者並聽行務在停當舉之有益行之無弊凡前數事為之果有成效爾即具奏還京爾其欽承朕命毋怠毋忽仍命文以太牢致祭於朝宗順正恵通靈顯廣濟河伯之神曰朕為民牧神為河伯皆上天所命今河水為患民不聊生伊誰之責固朕不徳所致神亦豈能獨辭必使河循故道民以為利而不以為患然後各得其所而俯無所媿專俟感通以慰懸切明景帝實録明景帝景泰四年六月已丑巡撫河南右都御史王暹奏黄河舊從開封北轉流東南入淮不為害自正統十三年改流為二一自新鄉八柳樹決由故道東經延津封丘入沙灣一決滎澤漫流原武抵開封祥符扶溝通許洧川尉氏臨潁郾城陳州商水西華項城太康等處沒田數十萬頃而開封為患特甚雖甞於城西沿河築小隄内又築大隄皆約三十餘里然沙土易壊隨築隨決往嵗乆雨已沒小隄今嵗復壊大隄之半不即修塞必及城垣其害非小臣㑹同三司計議請於不被災府衞州縣起倩軍夫倍築大隄用防後艱從之七月丙辰朔直隸鳳陽淮安徐州河南開封衛輝南陽山東兖青萊諸府各奏自五月以來淫雨連綿河水泛溢租税無徴俱命户部遣官覆視以聞已未太僕寺少卿黄仕儁奏臣經過河南見黄河一派自滎澤縣南流入項城縣界一派自新鄉縣八柳樹北流入張秋會通河兩派河流皆經六七州縣約有二千餘里俱係民間耕植之地民皆蕩析離居老稚不相保聚或徙或聚為盜而有司猶徴其税民屢訴告户部恐失糧額不與分豁夫古者計地徴税猶恐傷民況取無地之税乎乞敕所司覆視免徴加意撫䘏從之八月乙酉朔户部養病主事鍾成奏黄河衝決被其患者尤莫甚於原武縣蓋原武北自舊黄河黒羊山界南自古汴河陳橋鋪界相去五十餘里水皆浸灌縣治居其中於今已六年矣男欲耕而無髙燥之地女欲織而無蠶桑之所束手愁歎坐待其斃屢䝉朝廷發廩賑濟然水患未除民饑無已倉廩之積恐不能繼乞敕有司疏濬築塞以消水患轉運鄰近糧儲以備賑濟從之明景帝實録是年命官塞沙灣決口乃更作九堰八閘以制水勢復於開封府金龍口即荆隆口銅瓦廂等處開渠二十里引河水東北入運河明㑹典自正統十三年河溢滎陽縣自開封府北經曹濮二州陽穀縣以入運河至兖州沙灣之東決大洪口諸水從之入海至是始命官塞之至景泰七年始塞沙灣之缺而張秋運道復完詳見運河明景帝景泰五年八月山東東昌兖州濟寧三府州大雨黄河泛漲淹沒禾稼明英宗實録明景帝景泰六年六月癸未河決河南開封府髙門隄二十餘里詔修築之七年河南彰徳亦決明英宗實録明英宗天順元年三月癸酉工部奏河南祥符縣逼近黄河舊有大隄四十餘里用䕶城垣近年為雨水衝決千百餘丈不即修築恐妨城垣請令河南三司於無災州縣量起夫修築從之九月丙寅直隸揚州鳳陽淮安三府中都留守司所屬鳳陽等衞及直隸徐州等衞各奏今年三月至五月田苗旱傷六月以來天雨連綿河湖泛溢復被淹沒命户部覆視之十月庚子河南開封府原武滎澤二縣各奏今年六月以來天雨連綿黄河泛溢田禾俱被淹沒命戸部覆視之明英宗實録明英宗天順三年六月戊辰户部奏河南開封府所屬祥符等四縣天順二年雨多河溢淹沒民田千六百三十二頃無收應免秋糧米四萬九千八百零四石馬草六萬二千七百一十四束從之明英宗實録明英宗天順四年八月甲辰朔順天府奏今夏先旱後潦直隸真定廣平河間大名河南開封汝寧諸府各奏六月間驟雨河隄衝決禾稼傷損事下戸部令所司覆視以聞癸酉河南都指揮使司奏本處城垣逼臨黄河雖有隄岸常為衝決水至土城為人害者數矣夫城中所仗土城須髙堅庶保無虞不然倘水溢為害灌土城而内則王府三司衞府務局軍民屋廬悉為魚鼈矣乞敕有司備物料夫役臣等率軍餘於農隙之後歴視其坍塌虛薄者以漸修完從之明英宗實録明英宗天順五年七月丁巳巡按河南監察御史陳璧同都布按三司奏自六月終霖雨黄河漲七月初四決汴梁土城當時築塞磚城五門以備至初六日磚城北門亦決城中稍低之處水入深丈餘官舍民居漂沒過半公帑私積蕩然一空周府宫眷并臣等各乗舟筏避於城外髙處速召鄰近州縣官多率舟筏赴城救濟軍民然死者已不可勝紀許州襄城縣亦奏水決城門淹沒官民廬舍死者甚衆上命工部右侍郎薛逺往視之逺陛辭賜敕諭之曰黄河衝決為患非小卿須多方設法消除水患築塞河隄務令堅完仍巡視下流開通疏濬以泄城中積水尤先撫䘏被災之家有缺食者於附近官廩出粟給之或勸諭富家賑貸被災田畝蠲其租税官舍民居以次修理須水患止息事妥民安然後囘京九月壬子巡按河南監察御史奏開封南陽河南懐慶衞輝汝寧彰徳七府宣武河南睢陽三衞六月以來驟雨彌旬河水泛溢漂流民居淹沒穀豆糧草籽粒無徴上命戸部覆實以聞十一月辛丑河南都司指揮使夏忠按察司副使張諫下錦衣衞獄初河溢入城按察司劾忠賣放築城士卒城未就致水為患忠素惡諫疑所劾皆出於諫遂誣奏諫侵欺賑濟粟麥諸罪上命錦衣衞官往案之互有虛實遂俱下獄忠坐徒諫坐杖俱贖還職明英宗實録天順五年黄河溢決開封府城由安逺門入淹沒官廨民廬甚衆命工部侍郎薛逺塞之河南通志無按逺字繼逺為州人宣徳壬戌進士歴南兵部尚書維開封城周迴二十里外則繚以隄當宋時近於城者惟汴蔡諸水而黄河流經城之東北以達於海至元時河始南徙逼城流合汴泗入淮正統戊辰亦甞分決張秋口東北入海其後復東北入淮如故築隄䕶城其來蓋巳乆矣夫土疏固易遷徙而流雜泥沙又易淤澱以故水載髙地隄日増而城益下也天順五年秋七月四日客水暴至河溢踰防土城遂決越六日風激浪擁突北門以入平地水深丈餘王府及官衞儒黌廬井市㕓無慮數萬區盡浸沒摧圮力能結筏者僅以身免而老弱往往溺死事聞上特命工部右侍郎瓊臺薛君逺往拯治之乃命官督夫下樁捲埽作截水隄二百四十餘丈浹旬隄就決口絶流而水趨故道蓋首事於是年九月十二日而以明年二月二十六日輟工吕原記略是年河自武陟徙入原武而衞輝府之獲嘉縣河流遂絶禹貢錐指明英宗天順六年十二月戊辰内閣臣言河南乃中原重地近年以來水旱相仍軍民饑窘況黄河泛濫衝開城隄淹沒人民至今水患未息宜用人提督修理今副都御史賈銓巡撫山東事情已寧宜令其兼撫河南上從之明英宗實録明英宗天順七年二月庚辰河南布政司照磨金景輝考滿至京奏黄河國初在封丘後徙康王馬頭去城北三十里復有二支河一由沙門注運河一由金龍口達徐吕二洪入海正統戊辰決滎澤轉趨城南并流入淮舊河支河俱湮漕河因而淺澀景泰癸酉因水逼城命築隄四十餘里勞費過甚而水發輒復傾潰然尚未至決城壕為人害也至天順辛已水暴至土城既決磚城隨崩公私廬舍盡沒男婦溺死不可勝紀數十年官民資畜漂失無遺七郡財力所築之隄俱委為無用之地矣皇上憫視元元遣工部右侍郎薛逺往治雖稍平復而人心尚爾疑懼臣惟黄河四瀆之宗天下之水莫大者也今不循故道而併流入淮是為妄行為今之計在疏導之以分殺其勢若止委之一淮仍行隄防之策臣恐開封終為魚鼈之區矣不此慮者或為疏浚之事勞費不任殊不知欲為長乆平治之道雖勞費有弗足計不愈於累年修築之勞費哉或謂濬河不如遷城此尤其妄者城為民設水患不息民困未已城何為焉又況所費不貲豈易為哉臣愚則始終惟疏濬之是計也伏乞皇上不鄙芻蕘即敕該部計議移文巡撫河南右副都御史賈銓令所在三司先以金龍口河開濬寛濶俾水流通以接漕河仍相度舊河或令有泄水之處講求古法酌為時宜而興工開挑不必計其速成務為經乆之計合用軍夫人等皆設法給以器具口糧則勞而弗怨費而弗傷何水患之不息哉章下工部以其言頗合時議請敕吏部如例陞擢即命其往同河南管河參議何陞如其言而行之仍命右副都御史賈銓總督而責其成功從之明英宗實録事有明盛時一切官民人等俱得上書言藩幕金君之奏何其所見之明所慮之逺也朝廷從其言而行之特予之陞擢宜哉明憲宗成化二年閏三月庚辰改築寧夏河西寨城於髙阜地以舊城為河水衝決故也明憲宗實録明憲宗成化四年十一月辛未行人于坦言原籍山西石州城下有河一道流入黄河邇者河路崩塌約長三十餘丈遇天雨水溢崩塌之處復倍於昔請疏通舊河以固城垣事下工部請命三司勘實區處從之明憲宗實録明憲宗成化六年四月已已巡撫寧夏右副都御史張鎣言寧夏屯守之資全賴黄河水利前人創立漢唐二壩引黄河之水分為二渠以滋灌溉啓閉蓄洩專人掌之先以邊警展築唐壩闗堡獨漢壩城堡未立累被搶掠欲得如例修築且請易二壩之木以石環以周垣庶便屯守事下工部以為須待覆實乃報從之五月辛卯巡視河南户部左侍郎原傑奏黄河自古為河南患蓋以水勢瀰漫遷徙不常彼陷則此淤軍民隨處開墾退灘之地以給日食以供租稅蓋以此而補彼也奈何姦詐之徒隂結王府官校槩指為園場屯地投獻邀賞王信之輒便標封界至占收籽粒有不從者興詞委官動經嵗月民不聊生自今有犯者不問軍民舍餘俱終身謫戍附近衞所其王府官亦不許隂結受獻致興詞訟違者一治以法則姦猾有警而民無横擾矣又彰徳懐慶河南南陽汝寧五府山多水漫衞輝一府沙鹻過半軍民稅糧之外僅可養生開封一府地雖平曠然河決無時洪武間蒙太祖髙皇帝恩例除常稅外荒地許民耕種永不起科景泰間乃創起科例致令姦民互相告訐徵斂日重百姓傾家賠納請如舊例凡軍民有告訐不起科者不聽則可免賠累之患矣户部覆奏從之明憲宗實録大明太祖恩例除常税外荒地許民耕種永不起科哉皇仁景泰創起科例長告訐之風貽賠累之患釀毒至今嗚呼仁與不仁而已矣明憲宗成化十二年四月乙未陜西涇陽朝邑及金縣蘭州水漲河決漂沒人畜無算明憲宗實録明憲宗成化十三年四月乙卯巡撫河南右副都御史張瑄奏今嵗首黄河水溢淹沒民居瀰漫田野不得佈種乞將王府禄米改派及賑䘏被災軍民上命户部知之五月癸酉以黄河水災免河南睢州夏税小麥秋糧絲草睢陽衞屯糧籽粒明憲宗實録明憲宗成化十四年七月丙戌十三道御史以異災上言南北直隸山東河南等處五月以後驟雨連綿河水泛溢平陸成川禾稼淹沒人畜漂流死者不可勝紀事下戸部覆奏上遣官賑濟八月壬寅巡按直隸御史范珠奏江北河水為災徐州尤甚夏麥一空秋禾失望疏入下所司知之九月癸亥黄河水溢衝決開封府䕶城隄五十丈居民被災者五百餘家十一月癸亥巡撫河南右副都御史李衍等奏河南地方累有河患皆由下流壅塞以致衝決散漫淹沒民居今宜自開封西南隅新城下抵梁家淺舊河口七里疏濬壅塞以洩杏花營上流水勢又自八角河口直抵南頓分道散漫以免祥符鄢陵諸縣睢陳歸徳諸州淹沒其衝決隄口則俟水落之日興工修築工部覆奏上仍命衍等斟酌行之明憲宗實錄是年春黄河決祥符縣杏花營秋七月河決延津西奡村泛溢七十餘里又明年徙之縣南河南通志河自延津縣南徙入封丘而延津遂無河矣禹貢錐指明憲宗成化十五年正月戊寅遷河南滎澤縣治於北丁鋪以避黄河水患也明憲宗實録成化十七年河決河南詔起復公以工部侍郎往塞之至則集丁夫分工授任決口遂塞王鏊撰兵部尚書薛公神道碑名公逺明憲宗成化十八年五月丁已河南開封府州縣黄河水溢淹沒禾稼明憲宗實録是年六月河南諸水皆溢河南通志楊理巡撫河南值嵗歉河大決汴城幾墊有議遷改者民心洶懼公曰遷豈易事乃増築汴隄髙厚禱於河水亦去潘塤撰工部右侍郎楊公傳理字貫之成化丙戌進士沈杰長洲人成化甲辰進士知歸徳州州當黄河衝隨塞隨決公至相度源流地形髙下乃於城外五里許築長隄捍水樹以榆柳又開白柳等河河水由之入淮睢民始免墊溺入為右軍都督府經歴歴河南右布政王鏊撰公墓表行水金鑑巻十九
