body:
  text: 行水金鑑巻二十江南按察使傅澤洪撰河水明孝宗𢎞治二年四月癸丑河南鎮巡等官奏修築黄河決隄財用浩繁欲將今嵗起運各邊糧存留三分之一戸部覆議邊儲見缺難準存留惟折銀分數可隨宜量減舊例河南輸大同宣府米每石徴折色銀一兩輸真保定者石徴五錢或六七錢今請各遞減一錢於内可得銀六萬餘兩并以布政司積貯十七萬餘兩給之亦可足用五月庚申河南守臣奏河決開封黄沙岡蘇村野場至洛裏隄蓮池髙門岡王馬頭紅船灣六處又決埽頭五處入沁河所經郡縣多被害而汴梁尤甚上曰黄河衝決民居蕩析朕深愍念其即行巡撫官督所司役五萬人修築務使河復故道不為民害以副朝廷救災䘏患之意六月庚寅户科都給事中張九功等以黄河為患言防水三策一欲徙居民以避水患一欲多穿漕渠分殺水勢一欲修築故基頻年勞費終難成立事下工部議謂河南自古都㑹之地今王府城池司府衞大小衙門軍民居址所在規制巳定若乃一旦遷移未易輕議況安土重遷人心所繫亦難遙度宜仍行鎮巡等官詳議其利害以聞從之九月庚辰改南京兵部侍郎白昂為户部左侍郎修治河道賜之敕曰近聞河南黄河泛溢自金龍等口分為二股流經北直隸山東地方入於張秋運河所過閘座間有淹沒隄岸多被衝塌若不趁時預先整理明年夏秋大水必至潰決旁出有妨漕運所繫匪輕今以爾曽監督工程績效著聞特改前職馳驛㑹同山東河南北直隸巡撫都御史督同三處分巡分守并知府等官自上源決口至於運河一帶經行地方逐一踏看明白從長計議修築疏濬應改圖者從便改圖各照地方量起軍民人夫乗時興工務要隨在有益各為經乆不可虚應故事仍須禁約所司毋得指此妄加科派騷擾地方凡用工軍夫皆須撫䘏周備毋令下人逼迫剥害違者輕則聽爾量加懲治重則送各該問刑衙門問理爾為朝廷重臣受兹委託尤須晝夜用心躬親勤勞博采衆長相機行事務使軍民不擾工程易集斯為爾能事完之日爾即囘京仍將修過縁由并用過工料數目造冊奏繳以憑查考故敕十一月庚辰巡按監察御史陳寛等奉㫖議遷汴城以避河患上疏言黄河之水自古為患所以禦防之者亦惟修築隄岸耳今幸下流衝決分為數派徐圖修塞豈無善策固不必多穿漕渠分殺水勢亦不宜輒議遷城搖動人心況當饑饉之餘公私匱乏百爾財力於何仰給上命所司知之遷城之議遂不果行明孝宗實録是年復決金龍口東北至張秋鎮入運河而江荆口并陳留通許二縣俱淤淺命官治之明㑹典是年塞三流之北又新開榆木集口經虞城碭山四口衝出蕭縣出小浮橋五月河決汴城入淮復決黄陵岡入海續文獻通考是年河決原武及封丘荆隆口下曹濮沖張秋又沖中牟并儀封考城命侍郎白昂役丁夫二十五萬塞之淮安府志是年河決支流為三其一決封丘金龍口漫於祥符長垣下曹濮衝張秋長隄一出中牟下尉氏一氾溢於蘭陽儀封考城歸徳以至於宿瀰漫四出不由故道禾盡沒民溺死者衆議者奏遷河南藩省以避其害左布政司徐恪力陳不可乃止命白昂往治之昂舉南京兵部郎中婁性協治乃築陽武長隄以防張秋引中牟之決以入淮浚宿州古睢河以達泗自小河西抵歸徳飲馬池中徑符離橋而南皆浚而深廣之又疏月河十餘以殺其勢塞決口三十六由河入汴汴入睢睢入泗泗入淮以達於海水患稍息昂又以河南入淮非正道恐不能容乃復自魚臺歴徳州至吳橋修古河隄又自東平北至興濟鑿小河十二道引水入大清河及古黄河以入海河口各作石堰相水盈縮以時啓閉蓋東北分治而東南注疏云明紀事本末甚白公建議修古河隄作石堰啓閉善乃其事竟寢不行惜哉是年河徙汴城溢流自金龍口黄陵岡東經曹濮衝張秋運河命刑部尚書白昂治之役夫三十五萬遂塞金龍口於滎澤開渠導河由陳潁至夀州達於淮又築渠堰於徐兖瀛滄之間以殺河勢北河續記李東陽曰河之為患自古有之漢以後衝決無常治法亦異有塞有浚有疏而疏之説勝國朝凡四決後為張秋都憲徐公有貞治之有撓其議者曰不能塞河而顧開之耶使者至徐出二壺一竅五竅者各一注而瀉之則五竅者先涸使歸而議決此白公昂之親得於見聞者也金龍之決山東以為憂而河南復虞其塞議之弗定亦乆矣白公既從其議於是倍增汴隄又疏其下流諸河故兩省之民咸宜之疏之效亦明矣哉康濟論明孝宗𢎞治三年正月辛已户部左侍郎白昂奏臣奉敕修治張秋決河由淮河相度水勢至於河南中牟等縣見其上源決口水入南岸者十之三入北岸者十之七南決者自中牟縣楊橋等處至於祥符縣界折為二支一經尉氏等縣合潁水下塗山入於淮一經通許等縣入渦河下荆山入於淮又一支自歸徳州通鳳陽之亳縣亦合渦河入於淮北決者自原武經陽武祥符封丘蘭陽儀封考城諸縣其一支決入金龍等口至山東曹州等處衝入張秋運河去冬水消沙積決口已淤因併為一大支由祥符之翟家口合沁河出丁家道口等處俱下徐州此河流南北分行之大勢也臣以為合潁渦二水而入於淮者其間各有灘磧水脈頗微宜疏濬以殺河勢合沁水而入於徐者則以河道淺隘不能容受方有漂沒之虞況上流金龍等口雖幸暫淤乆將復決宜於北流所經七縣築為隄岸以衞張秋巳與河南巡撫等官議行之然所司原議第開山東河南北直隸河道而直隸徐淮境内實河所經要地擬議未及其事尚無所統下工部議請復令昻仍㑹同巡撫等詳議修濬事宜以聞從之二月已丑遣祭大河之神以戸部侍郎白昻奏欲開浚河道故也十二月庚戌總督漕運都御史張偉言徐州小黄河舊州城西北上通沁水下接漕渠宋熙寧間河決為患守臣蘇軾隄以巨石鎮以黄樓自是水不為患近年黄河復決改流城北其勢洶湧壊兩岸軍民居舍及城郭俱可憂臣㑹巡按管河等官議疏濬但上流地屬河南請敕工部移文河南巡撫都御史錢鉞等協同勘處併工修濬務為經乆之計從之明孝宗實録公始至河南相度水勢慮水復趨張秋發卒數萬自陽武封丘祥符蘭陽儀封數縣築長隄捍禦遂導河自中牟決口至尉氏下潁州經塗山合淮水入海又修汴隄令高廣如一上樹萬柳使不崩頽又浚宿州古睢河入運道以分徐州之勢又築蕭縣徐集等口以殺汴徐之勢吴寛撰刑部尚書康敏白公傳仕公字廷儀武進人天順丁丑進士至刑部尚書明孝宗𢎞治四年十月戊午黄河溢命有司量賑開封懐慶二府及歸徳宣武睢陽三衞被災之家明孝宗實録是年河決蘭陽都察院右副都御史張文魁墓志舉𢎞治辛亥公方垂髫河決蘭陽城家舟而覆恍有朱衣掖公泊於林杪而免墓志韓邦竒作按河之入海自碣石而千乗自千乗而入淮至是又由汴矣河之三大遷也河志明孝宗𢎞治五年八月庚戌命工部左侍郎陳政兼都察院右僉都御史總理河南等處河道敕曰朕聞黄河流經河南山東南北直隸平曠之地遷徙不常為患乆矣近者頗甚蓋舊自開封東南入淮今故道淤淺漸徙而北與沁水合流勢益奔放河南蘭陽考城山東曹縣鄆城等處俱被淹沒勢逼張秋運道潦水一盛難保無虞廷臣屢請修濬且言事連四省不相統攝須得大臣總理庶克濟事今特命爾帶同本部員外郎陶嵩署員外郎事張謨前去同各該巡撫巡按督同布按二司及直隸府衞掌印并管河官員自河南上流及山東直隸一帶直抵運河躬親踏勘計議何處應疏濬以殺其勢何處應修築以防其決㑹計樁木等料若干著落各該軍衞有司措辦然後相度事勢緩急工程大小起倩附近軍民相兼在官人夫趁時用工務使民患消弭運道通行不可虛應故事然此係國家大計凡事有相關及敕内該載不盡者聽爾計議停當便宜而行文武官職敢有怠慢誤事者輕則量情責罰重則文職五品以下徑自送問四品以上并方面軍職參奏爾受兹重託尤當晝夜籌畫勉圖成功仍撫䘏下人使皆樂於趨事則工易完而人不怨斯無負委任其勉之故敕十一月庚辰山東按察司副使沈鍾言臣提調所屬學校自濟南至兖州第見郊野蕭條場無稼穡流民扶老攜幼呻吟道路葢由今嵗山東天乆不雨曹濮一帶黄河衝決朝廷遣工部侍郎陳政巡視河決役夫數萬修築隄防臣竊謂隄防不可不修而民情亦不可不念今天氣漸寒夫役止月給米三斗其衣裳單薄將必有受凍而死者欲乞暫停工役俟來春二三月後即并督成之庶民不深怨而事亦易集工部覆議請仍行侍郎陳政酌量處置從之明孝宗實録是年復決金龍口潰黄陵岡再犯張秋侍郎陳政督夫九萬治之弗績河防一覽是年七月河決張秋續文獻通考時河溢汴梁之東蘭陽鄆城諸縣皆被其患復決楊家金龍等口東注潰黄陵岡下張秋隄入漕河與汶水合而北行張秋隄乃遣政往政尋卒明紀事本末明孝宗𢎞治六年二月丁已陞浙江布政司左布政使劉大夏為都察院右副都御史修治決河先是河決張秋戴家廟遣工部左侍郎陳政總領疏浚修築之政歴山東河南㑹守臣行視水勢疏言河之故道有二一在滎澤縣之孫家渡口經中牟縣朱僊鎮直抵陳州一在歸徳州之飲馬池與鳳陽府亳縣地相連屬舊俱入淮今已淤塞因致上流衝激勢盡北趨自祥符縣地名孫家口楊家口車船口蘭陽縣地名銅瓦廂決為數道俱入運河以致張秋一帶勢甚危急自堂邑至濟寧隄岸多崩圮而戴家廟減水閘淺隘不能泄水亦有衝決今欲浚舊河以殺上流之勢塞決河以防下流之患修築隄岸増廣閘座已集河南丁夫八萬人山東丁夫五萬人鳳陽大名二府丁夫二萬人隨地興功分官督役奏上未幾政卒管河郎中陳綺請仍遣大臣總其事上命㑹薦才識可用者三四人務在得人不限内外於是吏部尚書王恕等薦工部右侍郎謝綬南京工部右侍郎蕭楨四川布政司左布政使何鑑及大夏皆可用上曰今日治河不但恐其為民害抑恐有妨運道致誤國計所繫尤非輕必得通古今識地勢有巧思者乆任之而後可汝等舉此四人孰可以允當是任於中宜定擬一人或再推可用者以聞僉謂大夏才識最優可當是任而大理寺右少卿馬中錫南京通政使司左通政鄭紀亦次之請簡命一人以往遂以命大夏賜之敕曰朕聞黄河自宋元以來與淮水合流由南清河口入海所經河南山東南北直隸之境遷徙不常屢為民患近年汴城東南舊道淤淺河流北徙合於沁水勢益奔放河南之蘭陽考城山東之曹縣鄆城等處俱被淹沒逼近張秋有妨運道先命工部侍郎陳政㑹同各該巡撫按等官設法修理今幾半年未及即工而政物故有司以聞朕念古人治河只是除民之害今日治河乃是恐妨運道致誤國計其所闗係葢非細故且聞陳政所行多有非宜故詔有司㑹舉僉以爾大夏名聞故特陞爾為都察院右副都御史往理其事爾至彼先須案查陳政所行事務酌量其當否當者緒續之否者改正之㑹同各該巡撫按都布按三司及南直隸府州掌印官並管河官自河南上流及山東兩直隸河患所在之處逐一躬親踏勘從長計議何處應疏濬以殺其勢何處應修築以防其決及㑹計樁木等料有無而設法分派軍民夫役多寡趁時起集必須相度地勢詢訪人言務出萬全毋貽後患然事有緩急而施行之際必以當急為先今已春暮運艘將至敕爾即移文總督漕運巡河管河等官約㑹自濟寧循㑹通河一帶至於臨清相視見今河水漫散其於運河有無妨礙今年漕船往來有無阻滯多方設法必使糧運通行不至過期以失嵗額糧運既通方可遡流尋源按視地勢商度工用以施疏塞之方以為經乆之計必須役不再興河流循軌國計不虧斯爾之能此係國家大事凡敕内該載不盡事理爾有所見或人言可采聽爾便宜而行一應文武職官敢有怠慢誤事者輕則量情責罰重則文職五品以下徑自送問刑衙門問理四品以上並方面軍職參奏爾受朝廷重託尤當晝夜籌畫勉圖成功不許茍且麤率勞民力於無用靡財用於不貲以致生他變仍須撫䘏下人使皆樂於趨事則功易完人不怨斯無負於委任其勉之慎之故敕十二月丁亥巡按河南監察御史余昇言河之為患或決而南則其患在河南或決而北則其患在山東漢既決酸棗復決瓠子北宋決館陶復決澶州元既決汴梁復決蒲口然漢宋都闗中或都大梁河決為患不過害瀕河數郡而巳今京師在北專籍㑹通一河漕東南之粟以供軍國之需若決而北則漕河受患其害有不可勝言者臣甞因巡歴所至博采輿論得治河之策大要有四一曰疏濬夫長河西來一瀉千里非殺其勢而利道之其衝突有不可禦者昔滎鄭之東五河之西飲馬白露等河皆黄河由渦入淮之故道其後南流日乆或河口以淤高而不洩或河身以狹隘而難容水勢無所分殺遂泛溢北決今惟宜躧上流東南之故道相度地勢可疏者疏之可濬者濬之凡堪殺水勢之處無不加疏濬之功則正流歸道餘波就壑下流無奔潰之害北岸無衝決之患矣二曰扼塞夫既殺水勢於東南又須作隄岸於西北今黄陵岡等處舊隄壊缺豈可因循遷就縱水奔齧宜廣起丁夫多收樁料相下流東北之形勢去水逺近可補者補之可築者築之排障百川悉歸東南由淮以入於海則張秋等處無患而漕河可保矣三曰用人竊見河南按察司僉事張鼐㢘幹老誠熟知河道今治河之務請悉以付之俾往來巡視隨宜疏塞庶㡬財不浪費而河患可除四曰乆任邇者都御史劉大夏奉命修河單車就道戴星出入不常厥居謂宜如各巡撫事例令大夏以歸徳州或東昌府為公館居中裁決分屬治事凡所建白一一準行乆任專信使之展布四體竭盡才猷庶幾逺大之功可就上命所司看詳以聞工部覆奏謂所言可用請移文巡撫并治河等官各司其事吏部覆請陞張鼐為布政司參議專管修河俱從之明孝宗實録是年總理河道劉大夏疏略議得河南山東兩直隸地方西南髙阜東北低下黄河大勢日漸東注究其下流俱妨運道雖該上源分殺終是勢力浩大較之漕渠數十餘倍縱有隄防豈能容受若不早圖恐難善後其河南所決孫家口楊家口等處勢若建瓴皆無築塞之理欲於下流修治縁水勢已逼尤難為力惟看得山東河南與直隸大名府交界地方黄陵岡南北古隄十存七八賈魯舊河尚可泄水必修整前項隄防築塞東注河口盡將河流疏道南去使下徐沛由淮入海所經州縣禦患隄防俱令隨處整理庶幾漕河可保無虞民患亦皆有備仍於張秋鎮南北各造滚水石壩一條俱長三四十丈中砌石隄一條擬長十四五里雖有小費可圖經乆若黄陵岡等處隄防委任得人可以長逺仍照舊疏導汶水接濟運河萬一河再東決壩可以泄水流之漲隄可以禦河流之衝倘或夏秋水漲之時南邊石壩逼近上流河口船隻不便往來則於賈魯河或雙河口徑達張秋北下且免濟寧一帶閘河險阻尤為便利北河續記是年又決張秋東堤奪汶水以入海是時議者謂河不可復宜復治海運而朝議弗是也命都御史劉大夏督治之時河流湍悍決口闊九十餘丈大夏行視之曰是下流未可治治上流先導之南行且築長隄以防大名山東之患候河頗循軌而後決可塞也於是發丁夫數萬濬賈魯舊河四十餘里由曹出徐以殺水濬孫家渡開新河七十餘里導使南行由中牟至潁以入淮又濬四府營淤河由陳留至歸徳釃為二一由符離出宿遷一由亳渦㑹於淮於是沿張秋兩岸東西築臺立表貫索綱聯巨艦穴而窒之實以土至決口去窒沈艦壓以大埽合且復決隨決隨築連晝夜不息決既塞繚以石隄隠如長虹又起河南胙城經滑長垣東明曹單諸縣下盡徐州作長隄亘三百六十里即今太行隄也而漕道復通役歴三時用軍民夫十二萬餘人鐵一萬九千斤有竒竹木薪芻不可勝計南河全考明孝宗𢎞治七年五月甲辰命内官監太監李興平江伯陳鋭往同都御史劉大夏治張秋河決賜之敕曰朕惟天下之水黄河為大國家之計漕河為重即今河決張秋有妨運道先命都御史劉大夏往治之未見成功兹特命爾等前去總督修理爾等至彼㑹同大夏相與講究次第施行仍㑹各該巡撫巡按并管河官自河南上流及山東直隸河患所經之處逐一躬親踏勘從長計議何處應疏導以殺其勢何處應修補以防其決何處應築塞以制其横潰何處應深浚以收其泛溢或多為之委使水力分散以瀉其大勢或疏塞並舉使挽河入淮以復其故道雖然事有緩急而施行之際必以當急為先今河既中決運渠乾淺京儲不繼事莫急焉爾等必須多方設法使糧運通行不致過期以虧嵗額斯爾之能然此乃國家大事或敕内該載不盡事理爾等有所見聞聽爾便宜而行其一應合用竹木麻鐵等料應役軍民夫匠人力如原先料派起集不彀方許量為加添不可輕信人言過為科差還念此時瀕河軍民方困饑疫不幸值此大役甚不聊生萬一功有不成物為徒費或生他變悔之何及各該司府州衞等衙門委任集辦并借用順帶夫料等項不許推調稽違誤事有應奏聞者奏來處置其見用官屬非不勝任者不必改委所委文武職官敢有誤事作弊者輕則聽爾量情責罰重則文職五品以下拏送問刑衙門問理四品以上并方面軍職參奏究治爾等受兹重任必思㢘以律已勤以建功廣詢博訪事不必專於一已深謀逺慮計必出於萬全仍禁戢下人使不敢怙勢作威以凌人招賄愛惜物用使不至假公營私以浪費冒支所用軍夫尤宜用心撫䘏必使勞逸均平不至失所如此則役不徒興而大功可成矣不然則勞民力於無用之地棄民財於不測之淵咎將誰歸爾等其欽承朕命毋怠毋忽丁已太監李興平江伯陳鋭奏今兹修築河防固以糧運為急尤以䘏民為先必須處置財力之所從出乃可濟事若全藉一方民力實有不能堪者乞敕該部議處其宜工部覆奏謂先是㑹官奏準已將本部原貯抽分銀二百萬兩運送都御史劉大夏為修河之用凡河南山東在官錢糧除送運外其存留者悉聽取用如尚不足請以浙江蕪湖二抽分厰之銀半濟之其山東河南京班人匠亦聽存留應役修理閘座石壩隄岸所用甎石請以糧船民船帶運城甎量留備用文武職官人等有智識過人可備咨詢辦理者悉聽徑自延訪取用惟假此以希進者不得參與從之九月丁酉禮科給事中孫儒奏黄河自國初以來雖遷徙不常然其勢北髙南下至成化間始南髙而北下以至貽今日之患今欲治之莫若先自丁家道口濬其南岸廣二三仞以容狂瀾復濬桃源宿遷深三四仞以殺水勢開符離歸徳使其勢北髙南下沿張秋而上以竿測之於其淺處樹木横箔下石築土以欄上流又恐明年春水泛漲衝決土壩先於張秋迤西開曠之處挑濬湖蕩以瀦潦水然後於其決口如先年徐有貞故事厚築隄岸修砌石崖為便工部覆奏請下治河太監李興平江伯陳鋭都御史劉大夏斟酌施行從之明孝宗實録行水金鑑巻二十
