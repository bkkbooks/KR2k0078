body:
  text: 行水金鑑巻二十一江南按察使傅澤洪撰河水明孝宗𢎞治七年十月甲戌山東按察司副使楊茂元奏張秋之役官多而責任不專供億甚鉅日費百金臣聞各官初祭河神天氣隂晦帛不能燃久之似焚不焚之處宛然人面耳目口鼻皆具萬目咸見衆口駭歎神示此怪豈偶然哉乞取太監李興總兵陳銳囘京專任都御史劉大夏以責其成功若太監總兵官不可取囘亦乞將帶來匠作人等盡行取囘量留一二名以備役使又言黄河之水必當濬其上流使復故道則漕運可通今欲作滚水壩徒費工力又言河南之民不欲黄河入境但見山東委官往彼增築賈魯隄即謀欲殺之此非細故乞令河南巡撫等官嚴加禁約事下工部議謂治水患䘏民隠俱朝廷重事茂元所言取囘差官人匠乞為裁處其欲止滚水壩請行興等會議處置河南之民阻築河隄亦請行巡撫等官禁約上令會官議處以聞於是會多官廷議以為自興等至張秋之後始與大夏相地勢水勢所宜即決口西南開越河一道致糧運可以通濟且今霜降水落正係修築之時而調到官軍民夫數多亦正可併工修築請仍令興銳大夏同心協力務厎成功仍惜財䘏民減省冗費嚴禁所部人匠不許生事害人其工役人等加意撫䘏毋致失所河南之民該管有司不行禁止者一體治以重罪從之十二月甲戌太監李興平江伯陳銳都御史劉大夏以築塞張秋決口功成奏聞上遣行人齎羊酒往勞之以黄陵岡工程未可即巳命工部集議以聞於是議謂張秋決口雖巳塞完但今天寒土凍恐來春凍土融化或雨水泛溢復有後患其黄陵岡在張秋上流亦宜築塞但水勢洶湧随築随決恐非一時所能成功請仍留興等三人來春量起丁夫再培築張秋決口及新舊河岸務令堅厚以期永久其東昌臨清徳州一帶河道亦須逐一經理復講究黄陵岡事宜可疏可築相機而行必求允當而後巳俟事畢興銳具奏先囘大夏仍會同各巡撫等官用心修理如賈魯河孫家渡口四府營并馬雄家口等處亦宜再加疏築使運道疏通以為經久之計議上有旨命安平鎮等處河道及南旺湖水利仍令興銳大夏設法疏築修濬功完具奏待報囘京明孝宗實録初河南諸口之塞惟黄陵岡屢合而屢決為最難故既塞之後特築隄三重以䕶之其髙各七丈厚半之又築長隄荆隆口之東西各計二百餘里黄陵岡之東西各三百餘里直抵徐州俾河恒南行故道而下流張秋可無潰決之患矣是役也以𢎞治七年十月而畢以八年二月㑹張秋以南至徐州工程俱畢劉健記略鄧舉為河南副使適河決張秋東山劉公檄公問計公曰河即未可治須下流分殺其勢乃築隄防庶幾可塞東山如其言事果濟上善其贊畫陞俸一級張璧撰户部尚書鄧公墓志李善為河南僉事時河決張秋劉公與平江伯偕來求綜理其事者藩臬以公應公為相度水勢開修賈魯河四十八里改河南注築塞黄陵岡決口百十餘丈斷水東流功垂成復決公僅以身免乃更修數月功乃成詔陞俸一級王九思撰南工部尚書李公墓志劉大夏字時雍華容人𢎞治六年河決張秋詔大夏以右副都御史往治河自上流孫家渡疏其壅七十里復疏四府營之壅三十里聫長隄以分大名山東水勢而别河張秋之南至濟寧以通運艘五旬而河就馴功大而費小逾於徐有貞甚璽書褒之尋入為户部左侍郎歴太子太保兵部尚書卒贈太保諡忠宣山東全河備考劉忠宣𢎞治之役始惟治張秋久而弗績迺開上流孫家渡及導河下流由梁靖口出徐州繼治黄陵岡決而張秋之口自塞可以為法矣劉天和問水集先是大夏既受命循河上下千餘里相度形勢乃集山東河南二省守臣議之上言河流湍悍張秋乃下流襟喉未可輙治治於上流分道南行復築長隄以禦横波且防大名山東之患候其循軌而後決河可塞也疏上報可工方興而張秋東隄復決九十餘丈奪運河水盡東流由東阿舊鹽河以入於海決口闊至九十餘丈訛言沸騰謂河不可治宜復元海運或謂陸輓雖勞無虞乃復命銳等協治之河南巡撫都御史徐恪上言臣按地誌黄河舊在汴城北四十里東經虞城下達濟寧洪武二十四年決原武縣黒洋山東經汴城北五里又南至項城入淮而故道遂淤正統十三年決於張秋之沙灣東流入海又決滎澤縣東經汴城歴睢陽自亳入淮景泰七年始塞沙灣之決而張秋運道復完以後河勢南趨而汴城之新河又淤𢎞治二年以來漸徙而北又決金龍口諸處直趨張秋横衝會通河長奔入海而汴南之新河又淤百餘年間遷徙數四千里之内散逸瀰漫乃者上厪聖衷特命都御史劉大夏經理而伏流横溢功力未竟議者以黄陵岡之塞口不合張秋之䕶隄復壊遂謂河不可治至有為海運之說者得毋以噎而廢食哉夫黄陵岡口不可塞者非終不可塞也顧以修築隄防之功多疏濬分殺之功少故湍悍之勢不可遽囘今自滎澤縣孫家渡口舊河東經朱仙鎮下至項城縣南頓猶有涓涓之流計其淤淺僅二百餘年若疏而濬之使之由泗入淮以殺上流之勢又以黄陵岡賈魯舊河南經曹縣梁靖口下通歸徳丁家道口且可以分水勢今梁靖口以南則滔滔無阻以北則淤塞將平計其功力之施僅八十餘里若疏而濬之使之由徐入淮以殺下流之勢水勢既殺則決口可塞運道可完毋求近功毋惜小費毋以小僨敗輙阻幸而成功則萬世之利也命下部議行之大夏發民丁數萬於上流西岸鑿月河三里許屬之舊河使漕通不與河争道乃濬孫家渡口别開新河一道導水南行由中牟至潁州東入於淮又浚祥符四府營淤河由陳留至歸徳分為二道一由宿遷小河口一由亳州渦河會於淮又於黄陵岡南浚賈魯舊河四十里由曹縣出徐州支流既分水勢漸殺乃築西長隄起河南胙城經滑長垣東明曹單諸縣盡徐州長三百六十里五旬而事竣費輕功重逾於徐有貞云璽書褒賞入為户部右侍郎始河自清河縣入淮大夏治之自宿遷小河入淮則北三百里矣巳又北三百里至徐州小浮橋入淮七年九月加山東參政張縉秩為通政使代劉大夏理河道初大夏治決河委縉調度及成功遂陞為通政司右通政時衝決之餘溝防不治縉相其緩急以漸修濬無所遺又於決口之東砌石岸數里以固舊防又新築南旺東隄樹栁其上每嵗夏秋水溢挽卒得分行無阻至今便之明紀事本末河自禹告成之後下迄元明凡五大變而暫決復塞者不與焉一周定王五年河徙自宿胥口東行漯川至長夀津與漯别行而東北合漳水至章武入海水經所稱大河故瀆者是也二王莽始建國三年河徙魏郡泛清河平原濟南至於千乗後漢永平中王景修之遂為大河之經流水經所稱河水者是也三宋仁宗時商胡決河分為二派北流合永濟渠至乾寧軍今青縣入海東流合馬頰河至無棣縣今海豐入海二流迭為開閉宋史河渠志所載是也四金章宗明昌五年河決陽武故隄一由南清河即泗水入淮是也五元世祖至元中河徙出陽武縣南新鄉之流絶二十六年會通河成北派漸微及明𢎞治中築斷黄陵岡支渠遂以一淮受全河之水葢自大伾以東古兖青徐揚四州之域皆為其縱横糜爛之區矣禹貢錐指明孝宗𢎞治八年二月甲戌山東兖州府推官丁伯通上疏言三事一修河防謂黄河為中國患其來久矣今張秋之決雖巳塞而當為後圖臣以為塞下流為力似易而有後患塞上流為力似難而免後虞為今日計莫若舎張秋之初役而專意於黄陵岡雖曰求可責效旦夕然委任之專議論之同上下齊心財力俱備未有無成效者也疏上命所司詳議以聞已夘河復南流故道先是都御史劉大夏等言安平鎮決口巳塞河下流北入東昌臨清至天津入海運道巳通然必築黄陵岡河口導河上流南下徐淮庶可為運道久安之計事下廷臣集議如大夏等言大夏等乃以正月十日興工築塞黄陵岡及荆隆等口七處凡旬有五日而完葢黄陵岡居安平鎮之上流其廣九十餘丈荆隆等口又居黄陵岡之上流其廣四百三十餘丈河流至此寛漫奔放皆喉襟要地諸口既塞於是上流河勢復歸蘭陽考城分流逕徐州歸徳宿遷南入運河㑹淮水東注於海而大名府之長隄起河南胙城歴滑縣長垣東明等處又歴山東曹州曹縣直抵河南虞城縣界凡三百六十里荆隆口等處新隄起于家店及銅瓦廂陳橋抵小宋集凡一百六十里其石壩俱培築堅厚而潰決之患於是息矣四月辛巳先是都御史劉大夏太監李興平江伯陳銳奉命治張秋河決初至祭大河之神時天氣隂晦帛不能燃山東按察司副使楊茂元聞之以為神明示此必有警戒又聞興等參随人衆餼廩之外日費銀七兩又見同知王珣呈銀二千兩不足十日之費遂上奏欲取囘興等專委大夏以免地方煩擾上曰成大事者不惜小費興等皆不取囘惟令工部移文速其成功仍令興節省浮費約束所部毋生事擾民興等因愬茂元所奏皆妄下巡撫都御史熊翀巡按御史王槐勘實以茂元不能無罪刑部因請下御史逮問上不允命執送錦衣衛獄於是刑科都給事中龎泮等并南京十三道皆論救之獄具刑部擬茂元贖杖還職得旨茂元奏事不實降二級調别任七月丁酉内官監太監李興平江伯陳銳都御史劉大夏言臣等奉命修河今安平鎮黄陵岡荆隆等決口與大名府等處隄岸俱修築堅固賈魯河孫家渡四府營南旺湖及諸處泉源并兖州東昌一帶漕河俱疏濬通利囘京之期伏俟進止上賜敕召還明孝宗實録賜是年八月大夏等復命九月李興等受賞未幾復決速成之所致也茂元被誣詔差百户胡節械繋如京山東民沿途遮節泣訴稱寃節亦泣擁莫可行行將濟河濵河民亦然乃慰諭以去及陛見挺身跪不伏上益怒繋錦衣獄僉謂莫測節入見司禮諸中貴備言其深得民心且犯非其罪語與淚俱諸中貴約與之解南北言官交章論救上察其忠謫長沙府同知後治河一如其䇿雷禮撰刑部侍郎楊公傳茂元上言官多則民擾治河既委劉大夏又命李興陳銳事權分而財力匱且水隂也其應為宫闈為四夷宜戒飭后戚防禦邉患疏上興等切齒之誣茂元為妖言逮繋獄科道交章論救乃謫同知茂元守阯子也明紀事本末明孝宗𢎞治九年十月戊戌户部奏河南中牟蘭陽儀封考城四縣以河決民田盡沒今年夏稅糧宜盡令折布每疋折麥一石二斗折米一石本色布止徴銀三錢從之明孝宗實録明孝宗𢎞治十一年七月壬子工部管河員外郎謝緝黄河一支先自徐州城東小浮橋流入漕河南抵邳宿遷地方水利通行河無淺阻往來船隻省盤剥之費今黄河上流於歸徳州小壩子等處衝決與黄河别支會流經宿州睢寧等處通由南宿遷小河口流入漕河其小河口北抵徐州水流漸細河道淺阻又吕梁徐州二洪全賴沁水接濟其源出自山西沁源縣經河内歸徳等州縣至徐州小浮橋流出雖與黄河異源然近年河沁之流混合為一即今黄河自歸徳南決恐牽引沁水俱往南流則徐吕二洪必至淺阻為憂滋甚乞敕工部行直𨽻并河南巡撫都御史各委官於歸徳衝決處所量為築塞疏濬遏黄河之水流入徐州以濟漕運其沁水仍行河南管河官員常加挑濬淤淺修築隄防務使流入徐州以濟徐吕二洪不至為黄河牽引别流如此庶水利深廣漕運通利工部覆奏請下所司會勘計議築塞挑濬從之八月癸未命賑䘏河南祥符縣民之被河患者十二月已未河南按察司管河副使張鼐言臣前此奏擬修築侯家潭口決河接濟徐吕二洪以便運道今自六月以來河流四溢隄防盡決而潭口決嚙彌深比舊廣闊數倍工費浩大卒難成功臣嘗行視河勢見荆隆口隄内舊河通賈魯河由丁家道口下入徐淮其故迹尚在若於上源武陟縣朩欒店别鑿一渠下接荆隆口舊河倘此後河流南遷就引入渠庶沛然之勢可以接濟二洪而糧運不致艱阻事下工部覆奏請移文漕運都御史李蕙與同議處從之明孝宗實録明孝宗𢎞治十二年二月戊申鎮守淮安漕運總兵都督僉事郭鋐等言河南按察司副使張鼐奏欲將荆隆口等處舊河随宜修濬倘後黄河南遷就引沁水入渠庶使徐吕二洪糧運不致艱阻又欲停徴侯家潭缺口買辦樁草等項銀兩止將各該軍衛有司人夫起倩疏濬縁本官專管河道年久且才力足以辦此宜即令其督理待工完量請旌擢工部覆奏從之明孝宗實録明孝宗𢎞治十三年二月戊戌山東兖州府知府龔𢎞奏近河南管河副使張鼐見河勢南行奏欲自荆隆口分沁水入賈魯河又自歸徳州迤西王牌口等處分水亦入賈魯河俱令由丁家道口入徐州以便運道但今秋以來水從王牌口等處東行仍逆流東北至黄陵岡又自曹縣入單縣南連虞城漂没廬舎人畜乞行山東河南守臣㑹勘二省地土之髙下水勢之逆順河南地方如黄河水勢不從丁家道口入徐州當聴其南行將歸徳州等處王牌等決口修築堅固不使水往東流山東地方將大小隄岸俱築至丁家道口為止以防漕運及將兖州府管河通判專在黄陵岡至丁家道口管理隄岸管泉同知不妨疏濬泉源兼管河道事下工部議以預防水患接濟運河各官處置略同然無歸一之論難以遙度宜行河南山東巡撫都御史帶同管水利官親詣二省地界相度計處其管泉同知仍會管泉主事定議管理從之三月已已初安平鎮決河既塞之後侯家潭口復有衝決之患河南按察司副使張鼐議塞之既而以工費浩大再議於丁家道口上下另鑿河渠一道下入徐州以便漕運有旨命行漕運都御史議處未報而兖州知府龔𢎞奏謂河水從王牌口等處而東不由丁家口而南至黄陵岡入曹單虞城諸縣乞賑給諸被患之家仍令山東河南守臣議疏濬修築之䇿於是河南巡撫都御史鄭齡奏謂徐吕二洪為漕運要道藉河沁二水合流東下以接濟之今丁家道口上下河決隄岸者十有二處共闊三百餘丈而河道淤塞者三十餘里上源奔放則曹單受害而安平可虞下流散溢則蕭碭被患而漕流有阻疏濬修築誠今日急務臣等請各盡其力工部覆奏從之十月丙戌巡按直𨽻監察御史曹玉奏徐州并蕭沛碭豐諸縣皆被河患葢因賈魯河丁家道口衝決散漫東注不歸故道巡撫河南都御史鄭齡雖嘗奏請修築久未成功乞遣有幹局官一人歴河南并直𨽻被災之處閲視水決源流咨詢修築方略以為經久之利事下工部覆奏謂宜行河南山東巡撫巡按等官親歴災所覆視各決口修築工程如將完即督所司速成或工鉅費繁奏聞區處管河等官或仍前因循廢職者具奏治罪從之明孝宗實録是年河南水決李家楊家等口淤塞馬水河河水横流曹單被害時河南議挑馬水河身使下濟運河曹縣知縣鄒魯陳言修長隄以捍水兖州知府然其議具實以聞明年春事下巡撫委參政陳某修完復決又委參政杜某因舊隄分命同知李某督夫二萬人給以糧加修之兩閲月告成隄髙一丈五尺基三丈五尺頂一丈二尺自武家口起至馬良集止計一百五十里山東通志是年六月河決李家楊家等口洪水横流曹單等處被害尤甚按以忠宣之善治不能保河之安流數年葢河決者天災人事之所闗不能永保於後來亦不可推究於往日河志按宋濂治河議曰比嵗河決不治以中原之地平曠夷衍無洞庭彭蠡以為之滙故河常横潰為患其勢非多為之委以殺其流未可以力勝也禹治水至於大陸播為九河入於勃海葢流分而其勢自平也今河合汴泗東南以入淮而欲使一淮以疏其怒勢萬萬無此理也方今破金隄踰曹鄆地幾千里悉為巨浸民生墊溺比古為尤甚莫若濬入舊黄河使其水流復於古道然後導入新濟河分其半使之北流以殺其力則河之患庶其有瘳乎濂又謂河流分而其勢自平此治河上䇿又謂宜復黄河古道分其半使之北流近日智謀之士所見亦同備著於左學士張元禎與張憲副鼐書曰聞今黄河以北多存河流舊身但上下湮没巳久若因其舊身開為數支以達平原及直沽等處一可以殺直奔安平之勢一則可以引資灌溉如此將不惟運河無患而北方旱溢之災可常免矣昔禹疏下流為九道而納之海理同勢同霍尚書韜議處黄河疏謂三代前古黄河自孟津至於懐慶東北入海今衛河自衛輝東北至於天津入海猶黄河也今圖便宜之䇿舊河套原武之間擇地形便導引河水注於衛河南北分流水有所歸可免潰溢衝決之患且使黄河環繞畿甸亦可壯京師之形勢舟楫通利南北又可增一運道萬世無窮之利也胡尚書世寧奏議謂舊聞沁水至荆口分流一道六十里通衛河近年始塞是河因沁可以通衛也且黄河與衛河亦相去不逺宜差官踏勘荆口及陽武上下相度地勢相應處所開掘一河北通衛輝稍撥附近糧船於此習運以防會通河一時之塞亦國家之長計也按一統志黄河古道在大名府開州治南經東昌館陶縣西南五十里至滄州南安縣景州吴橋縣河間寧津縣界入海余又按金隄古堰自開封府滎陽縣東經大名府青豐南樂縣界由東郡至千乗海口千有餘里歴代築以禦河患通謂之金隄嗚呼循金隄之遺跡稽黄河之故道合諸賢之卓見踵永賴之茂功推古騐今灼灼可行者但世習樂因循而憚改作此在今日勢尤難行後世哲人有作破拘攣之見或有取於吾言爾矣續文獻通考諸說録以備考而於運道或恐未必相宜明孝宗𢎞治十五年九月乙未以河水為患免河南開封府及直𨽻歸徳衛夏糧籽粒有差明孝宗實録明孝宗𢎞治十七年五月癸已鎮守淮安漕運總兵官郭鋐奏徐州小浮橋一帶河道乾涸有妨糧運葢由曹縣河決上流淤淺所致乞行疏濬工部覆奏下河南及直𨽻巡撫漕運等官查勘處置從之明孝宗實録按明初黄河分六道出滎陽者至夀州入淮出祥符者至懐逺入淮出長垣者至陽穀入漕出歸徳者至宿遷入漕出儀封者由新集趙家圈經蕭縣北至徐州小浮橋入漕此河流經徐之始也葢治河難而治河於徐尤難之難夫星宿發源如此其逺也汴沁與泗水如此其廣也加以秋水時至百川灌河而欲以區區一帶之渠容之勢巳危矣况淤沙漸隆窮年築隄僅與河平曾莫能與争也語見徐州志𢎞治以前小浮橋一帶河道常虞其乾涸有防漕運嗣後更甚當潘宫保治河時據徐州碭山鄉民呈稱老河故道自新集歴趙家圈蕭縣薊門出小浮橋一向安流名曰銅幫鐵厎後因河南水患另開一道出小河口本河漸被沙淺至嘉靖三十七年河北徙忽東忽西靡有定向水行河厎即是平陸潘公嘗上疏欲復小浮橋故河矣萬恭治水筌蹄云黄河由小浮橋會徐洪自小浮橋之上皆閘河也故汶水出髙家閘與小浮橋大河會則汶與河交會在髙家閘嘉靖末水北徙由秦溝則自小浮橋以上逆四十里至茶城悉為大河髙閘沈河中不復見則汶與河交會在茶城矣可見數十年間河流之變遷若此小谷口薈蕞行水金鑑巻二十一
