body:
  text: 行水金鑑巻二十二江南按察使傅澤洪撰河水明武宗正徳元年六月甲子陜西徽州大雨河溢流没居民孳畜廬舎甚衆十二月庚申刑部左侍郎何鑑以黄河巳平議停防河夫役事下巡撫河南都御史陶琰查奏河患不常先年荆隆口決水奔入海漕河失利治河大臣建議起夫併力修塞其患始息因備行一省随户丁之多寡編僉河夫五萬八千七百餘名以備之近巳減五分之一矣若再停革恐非先朝預防之意況所設雖有前數亦惟用於有事之日若河流循軌固不妨廢農業但宜嚴禁有司勿頻擾而私役之耳工部覆奏謂勿革便從之明武宗實録正徳二年黄河徙入泡河大水壊民禾稼居舎沛縣志明武宗正徳四年河溢皮狐營決曹縣之温家口馮家口等處又北徙至儀封縣小宋集而決衝黄陵岡埽壩溢入賈魯河敗張家口等處縷水小隄循運河大隄東南行而賈魯河下流淤塞亦出張家口合而南注遂決楊家口道曹單二縣城下直趨豐沛命官塞之明㑹典十月戊戌户部覆議總督漕運右副都御史邵寳會同平江伯陳熊等所陳八事一黄河遷徙無常往往衝決漕河所當深慮宜訪察熟知水利官員預為隄防以杜將來之患癸夘初黄河水勢自𢎞治七年修理後尚在清河口入淮十八年北徙三百里至宿遷縣小河口正徳三年又北徙三百里至徐州小浮橋今年六月又北徙一百二十里至沛縣飛雲橋俱入漕河因單豐二縣河窄水溢決黄陵岡尚家等口曹單二縣田廬實多淹没九月又決曹縣梁靖等口直抵單縣人畜死者房屋衝塌者甚重圍豐縣城郭兩岸相對闊有百餘里葢南行故道淤塞水惟北趨漸不可遏諸漕運暨山東鎮巡官恐經鉅野陽穀二縣故道則濟寧安平運河難保無虞各陳疏濬修築之宜事下工部議得旨河患重事宜即行各該鎮巡官公同相視用心計處及時修理務須停當不許妄費財力事完之日差科道官勘實以聞明武宗實録是年河東決曹縣楊家口趨沛縣之飛雲橋入運工部侍郎崔巖役丁夫四萬二千有竒塞垂成暴漲潰之巖以憂去侍郎李鏜代之四月弗績盜起而罷通漕類編侍郎崔巖於祥符董盆口寧陵五里鋪各開地四十里按黄河故道引水由鳯陽達亳州又濬孫家渡故道十餘里引水由朱仙鎮至夀州而各入於淮疏賈魯舊河四十餘里以殺水勢築梁靖口下埽以防衝決會霪雨暴漲新築臺埽遂蕩然無遺矣河南通志是年夏河復決楊家口淹及曹單命工部侍郎李鏜治之鏜築隄魏家灣起至沙河驛二百七十里以防北徙山東通志鏜以工部右侍郎督修京倉時汴徐河患告急敕兼左僉都御史總理修浚抵曹縣因巳集人夫築長隄自大名至沛縣三百餘里又自滎澤抵永城縣疏通水道以防潰決是時洊罹劉六劉七兵荒言官乞暫取囘京詔可雷禮撰李公傳化按鏜一作堂字時升靳人成丁未進士明武宗正徳五年二月已亥初黄河自河南原武滎陽分而為三其一自亳州鳯陽通淮入海其一自徳州過丁家道口抵徐州小浮橋其一名賈魯河自窪泥河過黄陵岡亦抵徐州小浮橋𢎞治中河決黄陵岡犯安平鎮遣官視之大名築隄五十里曹州築隄百三十里翼以小隄河患乃息是嵗九月河自儀封北徙衝黄陵岡入賈魯河汎濫横流直抵豐沛御史林茂達等言河勢北趨隄外水髙隄内地下倘北決龍王廟壊安平鎮必為運河害法當先治上流儀封考城等縣疏濬故道引河南流勢有所分然後築塞決口修復故隄自張岡馬頭而東至龍王廟别築月隄倍加髙厚庶幾大隄可全運河可保是時河南上流不以餉道為慮而大名諸郡舊無樁草夫價兵部請下侍郎崔巖會各鎮巡官通融計議務令調度合宜干碍居民田廬亦為區處無得糜財興怨六月已亥工部左侍郎兼右副都御史崔巖奏頃奉命治河自祥符縣董盆口濬四十餘里滎澤縣孫家渡濬十餘里賈魯河濬八十餘里亳州濬四十餘里及長垣諸縣決口修築巳漸有緒曹縣外隄梁靖決口未塞者止四丈為驟雨崩潰臣詢諸父老皆云黄河變遷自有適然之數若正統間沙灣之決𢎞治間黄陵岡之決為患數年所費不貲後上流水勢稍緩方克成功今河勢衝蕩益甚且流入王子河亦河故道若非上流多殺水勢決口恐難卒塞莫若於曹單豐沛沿河處增築隄防毋令北徙庶可䕶障運道且乞别命内外大臣知水利者與臣共議仍俟秋成之時施功工部議覆有旨責巖治河無方仍令與鎮巡官詳議務期成功九月已丑工部右侍郎李鏜上修河事宜大略謂黄河自河南蘭陽儀封考城一帶故道淤塞其流俱入賈魯河經黄陵岡至曹縣勢甚瀰漫衝梁靖楊家二隄決口淹没曹單田畆前此侍郎崔巖亦嘗修濬縁地髙河澱随濬随淤水殺不多而決口又難築塞以今觀之梁靖口以下地勢最卑故衆流奔注成河直抵沛縣凡河流故道湮不復疏况河勢北徙有如建瓴不但直趨梁靖決口其黄陵岡上下及杜勝集縷水隄俱被衝嚙水淹大隄計安平鎮甚近就使梁靖口築成其容受全流無地必致迴激黄陵岡隄岸正妨運道尤為可慮今欲起自大名府地名三春栁至沛縣飛雲橋止築隄共長三百十里正以防河北徙可保運道無虞雖若一時工役重大而於久逺終為有益工部覆請從之明武宗實録明武宗正徳六年二月庚子命修河工部右侍郎李鏜還京初河決儀封考城等縣命工部左侍郎崔巖往治未畢鏜代之至是鏜奏銅瓦廂等隄岸崩頽陳橋集等長隄淤淺低薄俱應增築請設副使一人專理下工部議以河南災荒民窮盜起宜令鏜將𦂳要隄岸決口及淤塞諸處速為濬築其不急者且巳之遂召鏜還京專以副使領之十二月辛丑以畿内山東盜起陞總理河道都察院右僉都御史張鳯為右副都御史巡撫山東兼治河道明武宗實録明武宗正徳七年二月辛未命沿河守巡兵備守備軍衛有司俱聴總理河道都御史劉愷節制明武宗實録是年秋九月以右都御史劉愷總理河道愷築大隄起魏家灣亘八十餘里至雙堌集都御史趙璜又隄三十里續之曹單以寧明紀事本末明武宗正徳八年六月戊戌河決黄陵岡工部議以黄陵岡界在大名及山東河南之間工料夫役各有主掌彼此事權不一宜遣重臣一員專委責成庶克有濟上命管河都御史劉愷兼理其事仍協同各處撫巡官議處九月丁丑總理河道右副都御史劉愷奏河決黄陵岡率衆祭告越二日河南徙山川之效靈祚我國家如此工部尚書李鐩因請遣愷祭河伯之神而愷亦宜奬勵詔賜愷羊酒愷於修河之役束手無䇿乃歸功於神鐩從而獻諛皆可罪云明武宗實録是年七月河決曹縣以西娘娘廟口孫家口二處從曹縣城北東行而曹單居民被害益甚是年驟雨漲娘娘廟口以北五里焦家口衝決曹單以北城武以南居民田廬盡被漂沒河防一覽楊淳字重夫澄城人正徳戊辰進士九年陞都水司郎中管理通州南班河道浚決横汚築復隄防一時糧道稱便京儲頓增國初工部尚書宋公禮治河有大功禮曹議祀以宋居中有司奉行違錯又進都督於其中公具奏改正且修葺其祠宇纂王端毅公之奏議邱文荘公之詩刋為漕河紀事以永宋公之功再補虞衡郎中歴四川布政使吕柟作楊公墓志明武宗正徳十年四月癸丑陞總理河道右副都御史劉愷為兵部右侍郎掌通政司事六月已未陞巡撫山東右僉都御史趙璜為工部右侍郎兼都察院左僉都御史總理河道壬戌添設山東兖州府同知直𨽻大名府通判長垣東明曹縣城武四縣主簿各一員專管修河以河決陳家等口為患甚劇從巡撫山東都御史趙璜等奏也丙寅以黄河水災免山東曹單武城三縣嵗欠備用馬匹明武宗實録是年侍郎趙璜疏分水須水二河先是崔巖功弗就河遂衝決益甚至是璜乃於滎澤東濬分水河鄭州西鑿須水河疏亳州河渠至是水勢漸殺不為害河南通志明武宗正徳十一年二月甲子總理河道工部右侍郎趙璜奏曹州當山東河南北直𨽻之交屯營參錯盜賊竊發且河決黄陵岡等處方議修治宜留兵備副使吴漳仍舊管事兵部議覆從之九月已亥總河趙璜言黄陵岡舊有昭應河神之祠自河決梁靖口以來遂至蕩覆無餘祀禮久缺今治河工成宜答神貺乞重造祠宇令有司以時致祭其沿河考城曹單被災縣分稅糧請減免及賑䘏豐縣為水患尤甚乞下撫按官從長議處從之五月庚戌致仕太子太保兵部尚書劉大夏卒大夏湖廣華容縣人天順已夘鄉試第一登甲申進士改翰林院庶吉士為浙江左布政使癸丑河北徙妨運道擢大夏右副都御史往治之未幾決張秋鎮大夏議於孫家渡四府營疏上流以分水力而築長隄捍之隄起胙城盡徐州亘三百六十里功垂就中人有譖其糜費官錢者遣太監李興共事興密察覈巻籍無所得甲寅冬功成乙夘召還視院事歴兵部尚書加太子太保致仕卒諡忠宣七月丙戌監察御史于鏊等言邇者總理河道工部侍郎趙璜劾奏副使房瑄文皓及通州趙從龍等指以修河為名輙肆侵尅埋没巻宗請逮問俱䝉恩宥免使執法者沮玩法者縱此必瑄皓輩隂有為之地者乞從璜所奏以杜僥倖之門得旨事巳既往且連及者衆巳之九月辛夘黄河決衝没城武縣十二月戊午陞應天府府尹龔𢎞為都察院右副都御史總理河道山東撫按官奏黄河徙決非常恐妨運道故也明武宗實録黄河溢山東守臣言狀廷議才識疏通大臣一人往治之僉以公名上聞拜都察院右副都御史奉敕總理河患厎定已夘兼理運道辛巳進工部侍郎兼都御史領敕如故李充嗣撰工部尚書蒲州龔公墓志公名𢎞字元之嘉定人成化戊戌進士明武宗正徳十二年河溢武城縣壊城郭田廬命官修濬明會典七月總河龔𢎞奏修河事宜一山東河南管河副使宜於秋冬水汛後同各守巡官及沿河知府會計一年修河所用物料多少呈總理衙門覈實起派各官不協力催督者查考黜罰一東昌兖州大名工役頗繁宜分派山東六府及直𨽻所屬大名廣平順徳真定四府以均勞逸其隄岸仍令以時修築庶不妨農廢事一每年修河物料自㑹計後宜即分令各府州縣領價買納庶緩急得用而侵隠之弊絶一各處夫役差遣不均故多有遲悮逃亡者宜令所司通融分派委官管轄赴工其有路逺願出僱直者聴後期不到者罪坐所司下工部議山東直𨽻夫役原有定額難以别議如遇河患非常聴斟酌奏請量添協濟餘如𢎞奏詔可明武宗實録胡堯元蒲圻人正徳辛未進士謫髙郵州同知州運河故䢴溝也水自諸湖入河承下流兼三十六湖之委嵗春秋湖水溢害諸田夏冬水涸不可田民苦之乃請訪古人溝洫之法方一里為溝深一丈六尺廣二丈至興化而止河東故有涵洞石匣如法修之以時啓閉旱潦不能災民甚賴焉戊寅陞瑞州府通判歴廣西參政胡直作胡公傳明武宗正徳十四年五月甲辰巡按山東御史朱裳奏城武單縣二城近因河水漲盡皆淹沒乞相地改遷工部覆議從之十二月丙辰敕工部左侍郎崔巖兼都察院右副都御史修理黄河明武宗實録明武宗正徳十五年正月丁未詔自今沿河軍衛有司貯庫樁草夫價銀非闗河道急務不得擅用從管河郎中畢濟時請也明武宗實録正徳十六年五月乙夘世宗巳登極矣陞總理河道右副都御史龔𢎞為工部右侍郎𢎞言黄河自正徳初變遷不常日漸北徙大河之水合成一派歸入黄陵岡前乃折而南出徐州以入運河其黄陵岡原築三埽先巳決去其二臣兹擬乗水落補築一埽以備衝嚙又虞山陜諸水横發加以霖潦或決二埽徑趨張秋復由故道入海全河之勢湍汛奔騰如建瓴而下不可復禦臣先嘗築隄一帶起自長垣由黄陵岡抵山東楊家口延袤二百餘里廣百尺髙十有五尺今擬於隄後相距十里許再築一隄延袤髙廣並如其數即河水溢甚衝越舊隄流十里而逺性緩勢平可無大決水落則仍修舊隄以為先事之防斯一勞永逸計也從之令計畫周詳以行毋妄費財力明世宗實録明世宗嘉靖元年七月已巳直𨽻鳯陽揚州廬州淮安等府同日大風雨雹河水泛漲壊官民廬舍樹株溺死人畜無算明世宗實録嘉靖二年復決沛縣淮安府志是年秋河決大水壊廬舍民多流亡沛縣志陶諧嘉靖初為河南副使管理河道立法沿河植栁固隄傍植葭葦採取捲埽以當草束樁木􅐨麻則以水利河道贓罪紙米俱準收折纎毫不取於民總理臺臣奏請通行嵗省費十餘萬人渡河每中流苦舟人窘索登岸不識姓名無所訴公令舟刻鳥獸形有被害者即指形詣有司告今天下津渡多刻鳥獸自兹始吕本撰兵部右侍郎莊敏陶公墓志明世宗嘉靖三年九月已巳工部尚書趙璜言河道事重請復設總理大臣慎選才望專任責成上從之命吏部推堪任者以聞於是吏部言撫治鄖陽右副都御史章拯可明世宗實録明世宗嘉靖五年六月戊寅徐沛河水溢十二月丙子以章拯為工部侍郎兼僉都御史會官治河先是禮部尚書吴一鵬上言清河以北兖州以南水勢瀰茫田廬淹沒請訪求渦河湮沒等處或濬故道以通其流或開支河以分其勢巡按御史穆相言兖南徐北去東海不逺於此相度地勢開一渠河立以壩閘設以官守遇水發分流以殺其勢水小鎻閘以截其流庶幾水有所歸不為民患且啓閉有時亦不傷運河也時大學士費宏等亦言黄河之為患久矣禹治洪水以河為先漢宋以來皆專設行河之官講求治河之䇿我朝河勢南趨自入河南汴梁以東分為三支由亳潁等州地方渦河等處或出宿遷小河口或從懐逺縣至泗州出淮河其勢既分故雖有衝決之害亦不甚大正徳之末聞渦河等河日就淤淺黄河大股南趨之勢既無所殺乃從蘭陽考城曹濮地方奔赴沛縣之飛雲橋徐州之溜溝等處悉入運河泛濫瀰淪茫無畔岸自徐州至清河一望皆水耕種失業遞年租税無從辦納官民船隻通無牽挽之路前數年河溢之患也近來沙河至沛縣沙浮湧塞随浚随壅官民舟楫乃從昭陽湖取道往來况昭陽湖積水不多春夏之交湖面淺涸則運道必至阻塞京師嵗收四百萬之糧何由可達官軍數百萬之衆何所仰給此則可憂之甚者也為今之計必須渦河等河如舊通流分殺河勢然後運道不至泛溢徐沛之民乃得免於漂沒若不速為計畫將來河復北決意外之慮又有不可言者巡按直𨽻監察御史戴金亦言黄河入淮之道有三一自中牟至荆山合長淮之水曰渦河一自開封府經葛岡小壩丁家道口馬牧集鴛鴦口徐州出小浮橋曰汴河一自小壩經歸徳城南飲馬池至文家集經夏邑至宿遷曰白河𢎞治間黄河變遷渦河白河二道上源年久湮塞而徐州獨受其害若自小壩至宿遷小河一帶并賈魯河鴛鴦口文家集壅塞之處逐一挑浚使之流通則趨淮之水不止一道而徐州水患可以少殺矣巡按直𨽻監察御史劉欒言曹縣梁靖口南岸原有賈魯河南至武家口一十三里黄沙淤平必須開浚武家口下至馬牧集鴛鴦口一百一十七里即小黄河原通徐州故道水尚不涸須略疏浚此係河南歸徳州地方俱與徐州相連乞行議處興工挑浚時提督漕運總兵官楊宏亦言徐州上流若歸徳州小壩河丁家道口河亳州渦河宿遷小河等處俱有黄沁分流支派故道宜於此開浚或有捷路可開亦從其便庶可以分殺水勢也漕運都御史髙友璣河道都御史章拯亦屢以為言俱下工部議覆言運河國計所闗開封大名地方多有黄河故道不塞則害運河此正今日急務所以黄陵岡荆隆口一帶築浚之工嵗無虛日所幸地居上流河向東行順河築隄堪以保障是以運道無虞今徐與豐沛止是民患又居下流若一例施工恐窮各郡之力不能當全河之勢必欲修治則惟塞支流之口築障水以䕶田廬保城郭以通漕運牽路宜行各官勘議被淹之處有支流決口可以築塞堪否築隄障水俾入正河免致旁溢及運船經行河岸被水淹沒應否增築髙闊以便牽挽一一勘議會奏施行至於浚賈魯之故道開渦河之上源則工夫難成未可輕舉又言沛縣一帶閘河應築之工誠不容緩宜令各官逐一相度黄河水勢向背閘河地勢髙下講求疏浚之法詔如所議又以章拯事權未重命陞工部右侍郎兼都察院右僉都御史令其督同山東河南淮揚撫按官親詣地方逐一相度將戴金楊宏所奏事宜斟酌應築應浚選委司府勤能官員鳩工庀事以濟漕運明世宗實録是年黄河上流驟溢東北至沛縣廟道口截運河注雞鳴臺口入昭陽湖汶泗南下之水從而東而河之出飛雲橋者漫而北泥沙填淤亘數十里管河官力濬之僅通舟楫明㑹典是年夏六月二十七日黄水陷城遷縣治於華山之陽豐縣志明世宗嘉靖六年六月丙午朔總理河道侍郎章拯等言黄河濟漕固為國家之利至於氾濫則為地方之患今欲築濬分殺以免民患而濟運漕者有二處一曰孫家渡在滎澤縣北一曰趙皮寨在蘭陽縣北皆可以引水南流以殺河勢但此二河通亳州渦河東入淮又東至鳯陽長淮衛經夀春王等園寢為患叵測惟考之寧陵縣北坌河一道通飲馬池至文家集又經夏邑至宿州符離橋出宿遷小河口自趙皮寨至文家集凡二百餘里其中壅塞者宜大發丁夫濬治庶水勢易殺而於園寢亦無所患乃為圖說以聞工部請從拯等議上然之命拯等刻期舉工癸亥詔建河神祠於沛縣時漕河浚通議者以為神助請復其故宇春秋致祀工部為請從之九月丙申總理河道工部侍郎章拯考滿再疏自劾治水無効乞罷不許明世宗實録行水金鑑巻二十二
