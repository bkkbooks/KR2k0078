body:
  text: 行水金鑑卷二十三江南按察使傅澤洪撰河水明世宗嘉靖六年十月壬申光祿寺少卿黃綰等言黃河在三代時未嘗為患蓋以水性向北就而道之其流自順故也至於後世引河作渠或以通漕乃不免於隄障而隄障一潰遂不可支漢時瓠子之役道河北行復禹舊跡而梁楚之地稍得砥定至隋開通濟渠自板渚引河入汴而河始入淮今黃河自金龍口至安平鎮一支或時北流其餘不入漕河則入汴河皆合淮入海矣夫跨中條而南為河南山東兩直𨽻所交地勢西南則髙東北則下其墊沒也固宜乃豐沛徐淮之水則自沛河滲流所致夫彭城下邳馬陵諸山皆發跡泰山與䝉羽相接從東轉西以逆水勢水小則循吕梁出清口入淮大則河不能容水為山阻泛溢原野其為豐沛徐淮患必然也若不疏道别行患無巳時臣以為當於兖冀之間求其兩髙中低即中條北條所交者浚之使北至直沽入海乃得免於墊沒夫沛河既去漕河必淤則當自沛縣及吕梁至淮多造滚江龍之類泄之上流則泥沙必隨水而去乃開浚為易或謂沛河雖有豐沛徐淮之患亦為漕河之助殊不知漕河泉源皆發山東不必資於黃河若南旺馬腸樊村安山諸湖實諸泉鍾聚之所宜倍加修浚而引他泉别流者總蓄之則漕河不竭矣又南旺馬腸湖隄之外為孫村湖者地形下濕較之湖水反低若決瀦為湖并道漕河改經於此又可以免濟寧髙原淺澀之艱矣上以其疏下總理河道侍郎章拯議處以聞先是六月間黃河水溢奔入運河沛縣地方沙泥淤填七八里糧船三千餘隻阻不能進御史吳仲以聞且言侍郎章拯郎中邱茂中李煌三臣者必不能為陛下辦此乞推總制都御史一人往代之上命户工二部會議章拯亦言河渠淤塞勢難遽通惟金溝口迤北新衝一渠可以假道令運船由此進昭陽湖出沙河板橋其先阻淺者西歷雞冢寺出廟道北口通行得㫖下工部並議議未決給事中張嵩等言去秋河塞皇上特命章拯邱茂中李煌併力修濬而拯茍且塞責今不得巳又令運船由昭陽湖以出夫湖地庳河勢髙引河灌湖必致瀰漫使湖復阻拯何以為計哉茂中煌嘗議於沽頭閘設官專理是二臣亦逆知有今日拯乃抑而不行以至事勢窮迫貽害至此乞罷拯别推大臣素有心計風裁者往代之上以漕計重大責部臣遷延不即定議引舟入湖終非長䇿誠如嵩言請先飭拯等悉心區畫仍舉大臣才望素著者一人總其事河南山東守臣及藩臬等俱聽節制復選郎中主事各一人為之協理并采綰仲諸議酌量可否其徴發夫役調度工費悉得便宜從事用或不足令户部處給其沽頭上閘宜增設主事一人上以為然因讓拯前報運河疏通旋奏淤塞若遲悮糧運國計何賴兹姑留拯茂中煌等供職吏部即推擇大臣中有諳古今識地理實心經國者往提督之餘悉如議是時建議治河者詹事霍韜左都御史胡世寧兵部尚書李承勛言人人殊韜疏略曰今議者欲引河水自蘭陽注宿遷少殺河勢則徐沛不溢運河不淤臣與方獻夫議以為水溢徐沛猶有吕梁二洪為之東捍東北諸山亘列如垣猶有砥極若自蘭陽注宿遷則鳯陽歸德平地千里河遂奔放數郡一壑其患不獨徐沛而巳臣竊謂今日所急宜先疏通運道然後議處徐沛此緩急之序也前議起河南山東丁夫數萬疏濬淤沙以通運然沙泥隨水自髙而下挑濬未畢水至復淤雖日役萬夫力亦不足今沛縣既塞運舟皆由昭陽湖入雞鳴臺至沙河迂回不過百里湖面寬廣夏秋水溢則患覆溺冬春水涸則慮膠淺若治湖築隄浚為小河河口為閘以時蓄泄水溢可避風濤水涸易為疏濬目前運道可以無阻三月即土隄可成一年即石隄可成用力少取效速黃河愈溢運道愈利較之役丁夫以浚淤土愈浚愈淤勞佚大不侔也按古黃河自孟津至於懷慶東北入海今衛河自衛輝府汲縣至臨清天津入海猶古黃河也今圖便宜之䇿自河隂原武懷孟之間審視地勢引河水注於衛河至於臨清天津則不惟徐沛水勢可殺其半而京師形勢其壯自倍此其為便利一也按元人漕舟涉江入淮至於封丘陸運百八十里至於淇門入於御河達於京師御河即汲縣衛河也今由河隂原武或孟津懷孟之間擇地形便導河水注於衛河冬春水平漕舟由江入淮泝流至於河隂順流至於衛河沿臨清滄州至於天津夏秋水迅乃由徐沛達於臨清至於天津是一舉而兩得運道也此其為利二也承勛言黃河遷徙無常然必避髙而就下善治水者因其性而導之今日之功但當疏浚其下流防遏其上源使不至於大為害耳按黃河入運道支流有六若六道通流以殺水怒當不為患自渦河之源塞則北出小黃河溜溝等處不數年諸處皆塞北併出飛雲橋於是豐沛受害而金溝運道遂閼然幸東面皆山猶有所障故昭陽湖得通舟若益徙而北則徑奔入海安平鎮故道可慮單縣穀亭百萬生靈之命可憂又益北則自濟寧至臨清運道諸水俱相隨入海運何由通臣愚以為相六道分流之勢導引使南可免衝決之患此下流不可不疏濬者也然欲保豐沛單縣穀亭之民必因其舊隄築之障其西北使不溢出為患此則上遊不可不隄防者也識者以為不若於昭陽湖之東引諸泉水甃為運道建閘以節水自留城沙河為尤便然大役一興為費不資誠宜整理鹽法措置餘利以給河工令大小諸臣任事任怨工宜可就世寧言今日之事開運道最急而治河次之然不治河運道不通臣請先述治河之說夫河流分則勢小合則勢大河身寬則勢緩狹則勢急治河者順其性則易逆其性則難故曰不與水爭利此其大法也河自汴以來南分二道一出汴城西滎澤經中牟陳潁至夀州入淮一出汴城東祥符經陳留亳州至懷逺入淮其東南一道自歸德宿州經虹縣睢寧至宿遷出其東分五道一自長垣曹鄆至陽穀出一自曹州雙河口至魚臺塌場口出一自儀封歸德至徐州小浮橋出一由沛縣南飛雲橋出一自徐沛之中境山北溜溝出六路皆入漕河而總南入淮今諸道皆塞惟沛縣一道僅存所謂合則勢大而河身且狹不能容納故溢出豐沛徐為患近又漫入昭陽湖故流緩沙壅運道遂塞今宜因其故道而分其勢其在汴西滎澤近開孫家渡至夀州一道宜長浚以分其上流自汴東南出懷逺宿遷二道及正東小浮橋溜溝二道各宜擇其利便者開浚一道以分其下流或修城武以南廢隄至豐單之黃德賀固楊明等集接至沛縣之北廟道口築隄塞決以防其北流此治河之急務也今為運道計者欲從淤處挑濬修築則沙土不堅欲於昭陽湖築隄則沙積復壅不若於湖之東岸滕沛魚臺鄒縣間獨新安社地更鑿一渠南接留城北接沙河間不過百餘里渠深視地形廣皆五六丈厚築西岸以為湖之東隄令水不得漫而以一湖為河流漫散之區此上䇿也疏並下工部請下總督大臣會議斟酌舉行上從之十一月卒丑總理河道工部右侍郎章拯上疏乞休詔拯還京别敘拯字以進蘭溪人𢎞治丙辰進士歷工部尚書十二月辛酉總督河道都御史盛應期薦蘇州府知府陳文沛才堪治河頃曹濮河道副使王言以病去文沛可代之上曰可令速往視事明世宗實録是年復塞老和尚寺八里屯張家莊等處命官發丁夫數萬於昭陽湖東北起汪家口南抵留城口改鑿新河以避黃河衝塞之患尋以災異罷役命官即故道濬之修築單縣林臺至沛縣舊城隄百四十餘里以塞入湖之道又濬趙皮寨孫家渡口殺上流之勢沛漕復通明會典是年決徐州及曹單城武豐沛等縣楊家口梁靖口吳士舉等處衝入雞鳴臺沛北皆為巨浸東溢逾漕入昭陽湖沙泥聚壅運道大阻續文獻通考盛應期字思徴吳江人𢎞治六年進士遷工部侍郎引疾歸六年黃河水溢入漕渠沛北廟道口淤數十里糧艘為阻侍郎章拯不能治尚書胡世寧詹事霍韜僉事江良材請於昭陽湖東别開漕渠為經久計議未定以御史吳仲言召拯還即家拜應期右都御史以往明史槀明世宗嘉靖七年四月丁已總督河道右都御史盛應期言治河丁夫七萬計工六月約費米十萬餘石乞假留河南山東二省起運糧米四五萬石就近給工詔如所請或米巳起兊許於臨清倉內支用即以修河銀解還太倉七月辛卯命工部右侍郎潘希曾兼都察院左僉都御史總理河道八月辛丑都御史潘希曾言近沛漕沙淤旋挑旋塞蓋由秋水泛漲黃河奔衝所致嘗考河流故道非一其大而要者有三一孫家渡經長淮衛趨淮入海一趙皮寨經符離橋出宿遷小河入海一沛縣飛雲橋經徐州趨淮入海孫家渡趙皮寨乃上流之支河飛雲橋乃下流之支河𢎞治以前三支分流會於淮而入於海故徐沛亡患漕渠不淤今上流二支俱就湮塞全河東下併歸於飛雲橋一支下束徐吕二洪上遏閘河流水溢為遊波茫無畔岸於是決隄壅沙大為漕患今日之計固當挑濬舊漕以通糧運加築隄岸以防衝決然非疏其上流秋來水發沙雖挑而復淤隄雖築而復決近因趙皮寨開浚未通正在疏孫家渡以殺河勢第恐巡撫事繁副使力寡請敕都御史潘塤嚴督管河副使調集夫役選委職官亟為疏浚尅期成功功成聽臣閲實具奏上嘉其議從之八月庚申提督河道右都御史盛應期既奉㫖取回遂引疾乞休不允九月壬午工部覆尚書李承勛治河議請行侍郎潘希曾躬親相度或地勢之髙卑水勢之增減凡淤淺衝決之病修築挑濬之宜務得至當期在可久寧過慮於未事之前毋過悔於巳事之後其稱乞遣六部知水利者二人詣工體察恐希曾聞之自生疑懼且計程蒞事曾無數日即復别有委托不無傷國家信任之誠沮大臣展布之氣宜令每月自以所行奏報因事考言萬一所言不孚一年之後遣科道官從公查勘以驗其成效即今遣官體察之意也從之閏十月丁酉河道侍郎潘希曾言漕渠廟道口以下忽淤數十里者由決河西來橫衝廟道口之上并掣閘河之水東入昭陽湖以致閘水不復南流而沛縣飛雲橋之水時復北漫故也今宜於濟沛間加築東隄以遏入湖之路更築西隄以防黃河之衝則水不散緩而廟道口可永無淤塞之虞仍於黃河上流分浚趙皮寨孫家渡二處夫二水兼通則橫流以殺而運道可保無虞工部覆奏得㫖允行明世宗實録是年河決淤廟道口三十餘里河道都御史盛應期奏開趙皮寨白河一帶分殺水勢又議於昭陽湖東岸鑿開新河夫役九萬八千時以催督過嚴遂起怨謗用工四月以弗績坐免明紀事本末明世宗嘉靖八年二月已丑時豐沛苦河患而南北往來津挽不絶民力大困都御史唐龍建議請仍設夫厰於魚臺之穀亭鎮以分沛縣民力工部覆請從之六月乙酉豐沛單三縣河隄成增設豐縣管隄主簿一員十二月辛未總理河道侍郎潘希曾言河南儀封縣河患巳寧管河主簿宜革孫家渡口巳濬通請於鄭州增設判官一員專駐其地以防復淤工部覆議從之甲戌總制河道侍郎潘希曾引疾乞休且舉布政陶諧副使周忠陳文沛自代不允乙亥工部都水司郎中何棟以修河有功升通政司右通政仍管河道明世宗實録是年飛雲橋水北徙魚臺穀亭舟行閘面續文獻通考明世宗嘉靖九年五月癸卯孫家渡河隄成命加工部右侍郎潘希曾正二品俸級總理河道如故已酉巡按直𨽻御史傅炯言直𨽻河間十州縣及山東東昌諸府瀕河之地水勢嚙決不常舊田淹沒者不為除稅而河壖新墾者輒復起科是地日益遷而糧日益重也請通融勘處以新田與民補灘地之數計地徴糧庶免重困部覆從之十一月丙午總理河道工部右侍郎兼都御史潘希曾奏本年六月以來河決曹縣胡村寺東衝開一道闊三里有餘東南至本縣賈家壩入古蹟黃河由歸德州丁家道口至徐州小浮橋入運河胡村寺東北衝開一道闊一里有餘又分二支東南支經虞城縣至碭山縣合古蹟黃河出徐州東北支經單縣長隄至魚臺縣漫為坡水傍穀亭入運河其單豐沛三縣黃河賴長隄障回今沙淤平滿民多耕作不復為沛曹患夫黃河由歸德至徐入漕者故道也永樂間濬開封支河達魚臺入漕者以濟淺也自𢎞治以來黃河改由單豐出沛之飛雲橋而歸德故道始塞魚臺支河亦塞然以其出於沛橋亦可資以濟淺以其逼近沛漕又恆有衝決沙淤之患修濬惟亟今全河復其故道則患害巳逺支流達於魚臺則淺涸無虞此漕運之利國家之福也詔下所司知之明世宗實録是年自沛北徙橫流金鄉魚臺出穀亭口命官濬趙皮寨抵寧陵故道及築睢州張見口至歸德州長隄百餘里以禦泛漲尋以河流改遷罷役明㑹典是年河由單縣侯家林決塌場口衝穀亭三年水俱不下泄續文獻通考希曾提督南贑軍務召為工部右侍郎還朝值河溢淤漕任事者興新河之役嵗運不繼上憂之廷議必得公代乃可賜璽書兼憲職往蒞事公還甫三月也既受命誓殫慮畢力以沛漕之淤塞因黃河之旁衝黃河之旁衝因上流之未疏今宜疏支河以殺其勢築長隄以防其衝然後挑通沛漕自無復淤之患乃上疏見實録上嘉納焉至濟即達觀徐沛淤漕閲新河險阻沿黃河出豐單以求決囓奔衝之迹洞悉利害而得其要機遂築長隄起單至沛凡百四十餘里時建議者欲别遣官相度意在阻公適有旨下公計處乃復上疏見實録又言臣愚且拙不敢求新竒之功不敢為茍且之計惟欲因舊以為功從省以計事順水性以除患故舍新河而修舊漕者圖其易也沿黃河為隄者防其溢也停槩派夫十數萬僅用河夫二萬餘者恐民勞也罷顧募而行犒助者慮繼費也上復納之劉司空麟遺書言近日議者謂趙皮寨孫家渡不足泄黃河怒漕渠或不免復淤奈何公復書曰黃河為中原患非一日矣智者不與水爭地惟順其勢而導之後世或塞其決或隄其卑或疏其派皆隨時救患者也國家漕渠為南北咽喉勢不得不與河爭地𢎞治初河決荆隆口又決黃陵岡又決張秋當時嘗浚孫家渡宿遷小河而後荆隆黃陵張秋可塞此分泄河怒之驗也况自河南歷直𨽻至山東之曹縣恃長隄以禦河患亦既有年今單豐沛為隄獨不可以捍禦乎蓋事理可據與人力可為者如是而巳若欲别求逺圖則新河之役可為殷鑒公遂毅然行之役夫費銀不滿二萬不期年功成沛漕流通嵗運如故每河漲隄下水退沙回民多耕作焉其後河徙成化間故道出徐州小浮橋合運河而飛雲橋道塞無復沙淤之患矣程文德撰竹澗潘公希曾傳進希曾字仲魯金華人𢎞治十五年士遷工部右侍郎嘉靖七年秋總河侍郎盛應期以治新河無功召還命希曾兼右副都御史往代至則條上形勢自單至沛築長隄百四十餘里以障黃河之衝役夫二萬未期年工成帝嘉之增秩二級九年六月河決曹縣分三道東下其經單豐沛三邑者賴長隄障之得無害後沙淤平滿民多耕作其間交口頌之明年召入京歷兵部左右侍郎卒官明世宗嘉靖十年四月辛未升山東左布政使李緋為都察院右副都御史總理河道九月壬申工科都給事中趙漢條陳河道便宜六事一瀕河故設鋪舍甲夫使修隄撈淺宜整飭如舊制一各處辦納樁草多侵尅冒費之弊宜加查核一黃河變遷無常即橫流南出亦宜防其北徙請勿廢𢎞治中故隄時遣習水者相視緩急預加疏塞庶有備無患一南北管河郎中法當久任及府州縣管河者當居瀕河公廨中專理其職請一切如故事工部覆奏從之癸酉巡按直𨽻御史詹寬劾奏總理河道副都御史李緋稱疾杜門坐視河患請亟罷黜以戒人臣怠事者緋惶恐謝不職上以緋任職未久命奪俸三月明世宗實録乙緋字廷章固始人𢎞治丑進士明世宗嘉靖十一年四月癸卯總督漕運都御史劉節奏黃河舊通淮河口流沙淤塞挑濬方完糧運幸過不意黃淮二河伏水漲發流沙漫入河口直抵淮安府城西浮橋一帶俱被沙淤巳興工挑濬以拯目前之急更乞會議長久之䇿或改河口以避奔流或築長隄以障巨浸疏入工部議覆令行節等以改河築隄二議虛心訪究何者可以永保漕渠杜絶後患計定即興工挑濬毋得後時得旨運河壅塞隄岸坍塌皆因近年管河官員不行疏導修築所致兹所議俱依擬通行各該管河官員用心修治如仍前怠惰御史參奏以聞八月辛巳總理河道都御史戴時宗言黃河水溢魚臺議者皆欲尋復故道臣竊以為未然欲治魚臺之患必先治所以致患之本欲治致患之本必委魚臺為受水之地河之東北岸與運道為鄰惟西南流一由孫家渡出夀州一由渦河出懷逺一由趙皮寨出桃源一由梁靖口出徐州小浮橋往年四道俱塞而以全河南奔故豐沛曹單魚臺以次受害今不治其本而欲急除魚臺之患恐魚臺之患不在豐沛必在曹單間矣今豐沛之民才得息肩而魚臺之地巳經殘破不若弃魚臺為受水之渠因而道之使入昭陽湖過新開河出留城金溝境山等處乃易為力且前四處河口除渦河一支中經鳯陽祖陵未敢輕舉其三支河欲乘此魚臺之壅塞今開封府河夫捲掃填隄逼使河水分流以殺其上源則魚臺水勢漸減俟秋水落工可告成并前三河共為四路以分泄之河流庶可無患疏入詔工部會廷臣議之十二月甲戌朔總督河道都御史戴時宗自劾乞罷不允明世宗實録正時宗字宗道晉江人德甲戌進士是年夏六月大水溢孟津縣城圮民震恐乃議遷於舊城西二十里聖賢莊經始於甲午春二月訖工於夏五月河南通志朱裳字公乘沙河人正德甲戌進士嘉靖癸巳公遷都察院右副都御史敕總理河道時宣府軍士為變隂欲陷之上曰河事非朱裳不可宣府可别著人去時黃河南徙糧運不繼公相厥地宜量水勢規畫以奏上允之未幾丁艱去明史稿明世宗嘉靖十二年六月癸未總理河道都察院右都御史朱裳自陳乞罷不允十月戊子總理河道都御史朱裳條陳治河二事一塞黃河之口以開運道夫黃河之當殺者有三大支孫家渡趙皮寨梁靖口是也三支開則河流可去其七其三分自梁靖口迤東繇魚臺入運河謂之岔口冬春水涸之時計岔口半月可塞塞則黃河之水不至其間穀亭鎮迤南延袤二百餘里開道壅淤者可以及時疏浚矣一借黃河之水以資運河夫黃河自穀亭鎮轉入運河順流而南二日即抵徐州徐州逆流而北四日乃抵穀亭黃河之利莫大於此但河流有北趨之勢或繇魚臺金鄉濟寧漫衍而至安平鎮則運河隄岸為之衝決或三支之水一有壅淤則穀亭鎮迤南運河亦難保其不衝決也二者非繕築隄岸增其髙厚憂且不細臣以為塞河口者事竒而險借河流者事平而易請下廷臣議疏入詔裳會同差出部臣相度處置毋推艱避難以貽後患明世宗實録明世宗嘉靖十三年正月甲子總理河道副都御史朱裳會工部郎中郭秉聰韓廷偉等言黃河自古為患惟我國朝則借之以濟運渠之利故今之治河與古不同古也專除其害今也兼資其利古也導之北以順夫就下之性今也導之南以避其衝決之虞臣等考求其䇿不過疏濬築三者而巳夏禹治河自大伾而下釃為二渠大陸而下播為九河蓋河之流分則其勢自平也况今漕渠窄隘洪閘束捍全河入運勢自不容𢎞治以前四支分流若孫家渡渦河口趙皮寨梁靖口近年俱巳湮塞而以全河東奔自曹單城武等處經趨沛縣又自沛北徙流金鄉魚臺出穀亭口而運道大有可虞竊計今日河患未可以力勝要在分其流以殺其勢而巳今梁靖口趙皮寨幸巳疏通孫家渡亦行挑浚惟渦河一支因趙皮寨下流睢州野雞岡淤正河五十餘里漫於平地注入渦河所宜挑濬深廣導引汶水歸入正河而於睢州張見口起築長隄至歸德郭村計凡一百餘里以防泛濫仍時疏梁靖口下流且挑儀封於莊村月河入之達於小浮橋則北岸水勢殺矣其北岸自河南原武縣至山東曹縣歷年築長隄以防東北入海守護甚嚴但日久坍塌者多不任衝激所宜急為修築兼添築月隄以禦奔潰及照河過魚臺其流漸北將有越濟寧趨安平東入於海之漸議者欲塞岔河之口以安運河然以臣等計之其可虞有三水勢洶湧遽難堵塞一也縱使塞之其勢既逆其流必激夏秋水漲黃陵岡李居莊等處不能無患兼恐橫決北岸二也決口既塞徐州迤上上至魯橋泥沙停滯山東諸泉水微運道必澀三也今宜將魯橋至沛縣東隄一百五十餘里修築堅厚相其要害固之以石泄之以壩自城武縣至濟寧州創築縷水大隄百五十餘里以防北溢魚臺縣至穀亭鎮開通淤河引水入漕以殺魚臺城武之患此所謂順水之性不與水爭地者也其孫家渡渦河二支俱出懷逺縣會淮流至鳯陽縣經皇陵及夀春王陵至泗州經祖陵皇陵地形髙去河逺無可慮者而祖陵東西南三面距河夀春王陵尤為迫近屢有淹浸今宜於祖陵築土隄以遏泛濫夀春王陵砌石岸以防衝決此則事體重大不敢輕舉者也清江浦口正當黃淮會合之衝二河水漲漫入河口以致淤塞阻滯糧運今宜濬使深廣而又築隄以防外漲築壩以護行舟皆不可緩往時淮水獨流入海而海口又有套流安東上下又有澗河馬邏等港以分水入海今黃河滙入於淮水勢巳非其舊而澗河馬邏港及海口諸套俱巳湮塞不能速泄下壅上溢梗塞運道宜將溝港次第開浚海口套沙多置龍爪船往來爬蕩以廣入海之路此所謂殺其下流者也河出魚臺雖曰借以利漕然未有數十年不變者也且他徙則徐沛南北必致乾涸宜大浚山東諸泉以滙於汶河修築南旺湖隄閘壩以通蓄泄則徐沛之渠不患乾涸雖他日岔河之口塞亦非所慮矣疏入工部覆如其議得旨允行明世宗實録行水金鑑卷二十三
