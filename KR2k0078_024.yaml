body:
  text: 行水金鑑卷二十四江南按察使傅澤洪撰河水嘉靖甲午冬十月趙皮寨河南向亳泗歸宿之流驟盛東向梁靖之流漸微梁靖岔河口東出穀亭之流遂絶自濟寧南至徐沛數百里間運河悉淤閘面有沒入泥砥者運道阻絶朝野憂虞於時有引黃河濬漕河二議莫能決總理河道右副都御史劉公天和曰吾誰適從哉吾惟審地形相水土之宜計工役權利害輕重任勞省費以求無負於國無病於民爾吾何容心哉乃博採羣議躬行相度自趙皮寨東流故道凡百二十餘里而至梁靖河砥視南流髙丈有五尺自梁靖岔河口東流故道凡二百七十餘里而始至穀亭巳悉為平陸曰道逺費廣河不可復導矣引黃河幾四百里濬丈有五尺者百二十里餘濬二丈以上者二百七十里餘功倍費矣濬閘河兼浚南旺築曹單長隄幾三百里通融約計浚深丈許功倍省矣兼慮如歐陽修所謂故道雖復旋復淤塞修之言曰黃河巳棄之故道自古難復蓋河流既久砥岸皆髙水行漸壅自不能行乃棄而他徙非若人力堵塞之河渠道猶存也是捐費財力而且以其勞貽後人也公之言曰引河勞費倍於浚淤一也且非數月可畢上誤國儲營建之需二也京師百萬軍民仰給公私匱絶三也縱力引而至旋必復淤目前億萬之費徒捐而浚淤修閘之勞與費卒不可免非忠於謀國吾何忍耶况引之不至至將即淤吾何敢耶况孫渡新河之覆轍當鑒耶孫渡在今滎澤正統間全河從此南徙𢎞治二年淤𢎞治六年至今凡十餘浚矣費幾百萬緡卒莫能通嘉靖癸巳秋浚百五十里甲午夏水大漲一淤而平此巳棄故道難復之明驗也嘉靖戊子沛縣廟道口淤三十里舍漕河而開新河費一十餘萬緡卒於中止仍浚漕河以通舟此漕河不可輕變之明驗也乃議惟濬淤修閘以復先朝成憲為便而時巳寒凍入春運舟且至期限逼甚是時非惟運期逼近營建朩漆之類且至矣非若永樂正統景泰𢎞治間之役可以逺期一二年近至八九月也乃測淤淺深度河廣狹淤以尺計工以日計役巨期迫公乃先測諸閘自水面至淤自淤至閘砥之淺深而後逐里逐假止測水之淺深即知淤之淺深矣淤之淺深自數尺以至丈有九尺通融計算各淤深一丈二尺九寸議止浚一丈為準復度河中心至岸廣狹自三十餘步至四十五步一以四十五步為準復置方斗深廣各一尺取泥實之稱錘一百四十斤每一筐以泥百斤為準浚河則以面廣十丈砥廣五丈通融折算七丈五尺為準浚河工每長一尺廣七丈五尺即得泥一千五十筐為準復計春月每日可行百里許擡泥止以往回五十里為準餘為休息以每里三百六十步計之二人每日可擡泥二百筐然四人擡泥即一人取泥五人總計各得泥八十筐仍減十筐止計七十筐一人用工兩月內以一月為隂雨天泥水妨工止計實工一月是一人可擡泥二千一百筐即該分工二尺先是羣議以前此會通張秋近年新河之役計之非役夫數十萬不可蓋彼皆用工久而兹役止兩月故也公曰審如是民不堪命矣乃竭心思規畫既定而夫役勞費大省定番休以節夫勞兼顧役以省民力復議濬南旺淤淺以免盤剝南旺每二年一大浚役萬六千人羣議姑置公曰運道不可尋丈淺阻乃用前計工法曰六千人足矣委邵君元吉督之浚倍深倍逺且完修河隄自南旺至長溝六十里植栁自長溝至濟寧亦六十里蓋羣䇿畢效云築曹單長隄以防衝決復沽頭管閘部屬及諸閘官胥役夫公手自籌算甫旬日而議定謀協纎悉詳備區畫程度先後條列以聞上深用嘉納賜敕有竭誠體國之褒南北畿輔山東河南文武監司而下悉聽節制許一切便宜從事乃申令戒期分土畫地初令下郡下編夫公曰守令應期無在者興工期逼甚即郡縣怠事後期奈何乃令編夫一以均徭銀數為準即優免無預矣且逐里順編滿五十人即為一隊至即分工十丈故始編可省吏姦而至工絶管工者放免之弊植廬舍以便居處給醫藥以療疾病用是大小臣工罔敢弗協淤深泥陷不能著足之工則雜施土草截河築壩縱橫填路下施新製兜杓方杓杏葉杓魚貫以濬之泥最稀陷最深者則用朩梢栁斗下取猿臂傳遞登岸瓦礫之工則用鍬钁溜沙之工則用兜杓沙姜石之工則製鋸齒鐵叉尺寸鑿之泥陷者施隔子法每州縣各截河為數橫壩壩之內則縱橫填路如井字然兜杓者以鐵為方口繫布為兜以取泥幾至斗許泥稀及溜沙用之方杓者以鐵為平砥而周遭各髙寸許泥稍堅者用之二杓俱前加鋸齒及鐵叉皆創製也杏葉杓者舊有之而加廣厚泥最陷者用斗子法塗泥為坎自下倒戽於上出水隄外濬深泉湧之工則先擇泉稍淺者分番役夫車戽併力急濬而後將泉深者倒水施工浚淤甫數尺泉即湧出盡日車戽一夕復滿不能措手乃併力番休先將下壩徹夜取水歷數坎始達隄外水盡即急浚之淤盡河成方將上壩倒水急浚如前法浚河之功莫難於此濬巳既深工巳垂就而河廣淤深所在隨浚隨墮者則倍給夫值增顧夫役以重浚之河廣淤深及黃河舊口所衝之處上為風日所暴僅可勝足尺寸之下悉為極稀油泥隨浚隨墮無復止極濬河之難尤莫甚於此夫役最苦公乃躬行撫諭曰吾增爾少值且令爾鄉爾族助爾少費爾不堪勞即以之顧役以畢此工毋重困爾也於是衆皆感悅至有泣者相率竭力砥績云凡閘座之頽廢者悉增葺而修復之蓋合朩土金石之工而為工甚巨為力甚難若河之廣狹視上流之南旺慮過廣則水易散也魯橋以下運河黃水衝洗大廣浚河砥廣五丈或病其狹者公曰南旺水源也河砥僅四丈許下流愈廣則愈淺矣如久旱泉微何吾不敢徒為觀美也是嵗自夏秋不雨幾四月而舟行無阻培閘面之低者以齊髙下俾水不易泄也運河諸閘悉前元及我朝永樂至𢎞治間先後所建以故髙低不一如下閘過低則上閘易涸公乃逐閘測其閘面至水面之髙下一以棗林閘為準低者培而平之自閘板水面至閘石面各以三尺為準其下閘砥過低者則量留砥板自是諸閘一律水不驟泄而下流砥板則閘上之水益深運舟可直達上閘免中途淺閣真利及久逺云用平準以測濬之淺深俾舟行無滯也水平法用錫匣貯水浮朩其上而兩端各安小橫板置於數尺方棹之上前豎木表長竿懸紅色橫板而低昂之必於匣上橫板平準以測髙下凡上下閘砥髙低及所浚河砥淺深悉藉此以度之公躬親測量暴露風日行泥淖中遍歷諸閘人不堪其勞公弗恤也復施植栁六法以護隄岸曰臥栁低栁編栁深栁漫栁髙栁濬月河以備霖潦建減水閘以司蓄泄湖坡之利堙廢至是雙龍硯瓦雞鳴臺金溝口留城馬場南旺諸減水閘座皆議復備蓄泄也築縷水隄以防衝決置順水壩以束漫流河直則水潰故隄以縷之河廣則水散故隄以束之且禁鞭撻問疾苦躬撫慰勞飲食役初興工即禁各屬不得輒施鞭朴違者即償其責人心大悅竪旗升降以時其飲食節勞佚時薪米騰貴有以為言者公弗應且榜諭一依時值不少減抑於是商販輻輳終役無匱乏而價大省每州縣即撥醫一人隨夫調治公猶慮其未精乃齊服焚香躬製錠藥數萬計復選醫之明者四人官之勤者二人分攜藥餌逐營遍問疾即療之日一往回神人胥相罔弗效者且常值之外時勞以飲食焉宣諭上德曉以國計至重役民為不得巳之故於是衆心和悅羣力畢效徹水者夜以繼日重浚者至再至三咸忘其勞百工告成運道復通萬艘畢達績聞天子嘉悅晉公工部右侍郎兼左僉都御史仍理河道部屬方面而下勞最者遷官晉秩賞賚有差方役之初興也內外逺近咸以為難就京師百貨騰貴餽餉不至至有議復海運者惟仰賴我天子明聖專任責成以故公等咸感激思奮攄忠報國身親督理野處河濵隨事經畫博采羣䇿竭其心思智力以期於必成公處穀亭鎮廢菴中隘室每集衆計事和顔溫語俾各盡言片善即納且揚於人又日巡考工隨見指授郎署監司而下悉廬於村舍水濵朝夕督視雖顔面黧變形體瘠損弗恤也蓋惟計工以定役故為力甚簡視徭役之成數以調役吏胥無所容其奸故民不擾顧值惟計工不計日故為費甚省畫地分工完即散遣故人自為力廬舍飲食器具醫藥勞勉周至故民不知勞尤仰賴我天子神聖川靈效順雨𤾉時若疾疫不作民命獲全咸前所未有也是役也凡濬河三萬四千七百九十丈築長隄縷水隄一萬二千四百丈修閘座一十有五順水壩八植栁二百八十餘萬株役夫一十四萬有竒白金七萬八千餘緡朩以根計一萬七千四百餘稍草以束計一十九萬五千餘鐵以斤計六萬五千九百餘麻灰磚石之類稱是役始於乙未春正月中旬迄於夏四月初旬財力不多費而功倍於昔人時日不久曠而效收於三月亦前所未有也劉天和問水集河中砥柱有三門南曰鬼門中曰神門北曰人門鬼門神門尤為險惡其中有山號曰米堆舟入三門百日始上執標指揮者名曰門匠諺云古無門匠墓謂皆溺死也嘉靖乙未御史余光河津知縣樊得仁鑿石崖為窟植以柏朩樁鍊鐵為索橫繫樁上凡四十餘丈往者以鐵鈎挽索而上頗易為力朱國楨湧幢小品明世宗嘉靖十四年二月丙午河道都御史劉天和請於曹縣梁靖口東行岔河口添築壓口縷水隄於曹縣八里灣起至單縣侯家林止接築長隄各一道從之明會典載岔河口縷水隄長三里曹單長隄長八十里七月丙寅遷河南孟津縣治於聖賢莊避河患也按河南通志載遷城事於十一年而實録又書於此想題報在後故耳十二月辛亥總理河道都御史劉天和條議治河事宜其一河南原武縣王村厰增築月隄一十里其一孫家渡自正統時全河從此徙𢎞治時淤塞隨開隨淤卒不能通今趙皮寨河日漸衝廣若再開渡口併入渦河不惟二洪水澀恐亦有陵寢之虞當如舊閉塞其一蘭陽縣銅瓦廂月河不必再濬蓋黃河勢難與力爭既巳趨北不能復使東注也其一於祥符縣之磐石口蘭陽縣之銅瓦廂考城縣之蔡家口各築添月隄臣等以為黃河之當防者惟北岸為重且水勢湍悍衝徙不常其隄岸去河逺者間或僅存而瀕河者無不衝決當擇其中去河最逺大隄及去河稍逺中隄各一道塌者增修缺者補完斷絶者接築使北岸七八百里間聫屬髙厚則前勘應築各隄舉在其中不得另築矣但工役甚巨而時詘民窮須以漸修舉工部以其議為當上從之明世宗實録余問水始自中州乃分遣屬吏循河各支沿流而下直抵出運河之口逐段測其深淺廣狹紆直所向而後得其要蓋孟津而下夏秋水漲河流甚廣滎澤漫溢至二三十里封丘祥符亦幾十里許而下流甚隘一支出渦河口廣八十餘丈一支出宿遷小河口廣二十餘丈一支出徐州小浮橋口亦廣二十餘丈三支不滿一里中州之多水患不在兹歟宜預為儲蓄候嵗豐人和大加疏導可也蔡石岡云黃河南徙國家之福運道之利也當衝郡邑作隄障之不壞城郭巳矣被災軍民免其租役不至流徙巳矣石岡睢人也睢河患為甚而其言若此公天下為心矣河性湍悍如欲殺北岸水勢則疏南岸上流支河上䇿也然支河或不順水勢則雖開而復淤舊有馬頭掃之制蓋捲掃出河丈餘稍順水勢連出數掃雖終不能禦然水性極悍一有所觸即折而他注連觸數掃有壞即補多因之以全岸者亦不可廢也黃河舊出穀亭口入運魯橋下至徐沛閘座盡廢嘉靖甲午秋忽一夕遷改然幸分為二支一北出魚臺塌場口猶賴以濟運如即南徙則運河淤滿閘座未復糧運立阻矣一從上源曹縣榆林集南向徐州免北衝濟寧之患如全出塌場口則逼近濟寧魯橋以上閘座盡壞矣至十月運舟南還全河方始南徙二支斷流若稍遲至春南徙則疏浚無及乙未之糧運亦阻矣國計所繫神實相焉以上治河之要摘録四條賈讓云隄防之制起自戰國然勢不能廢蓋雖不能禦異常之水河砥甚髙水易漲溢且自三門下視中州如井然故雖髙厚之隄不能禦而尋丈之水非此即泛濫矣城郭市鎮民居多濵河故也但不宜近河而宜逺爾歷觀宋元迄今隄防形址斷續橫斜曲直殊可駭笑蓋皆臨河為隄河既改而隄即壞爾巳擇屬吏之良者上自河南之原武下迄曹單沛上於河北岸七八百里間擇諸隄去河最逺且大者去河四五十里及二三十里者及去河稍逺者一二十里及數里者各一道內缺者補完薄者幫厚低者增髙斷絶者連接創築務俾七八百里間均有堅厚大隄二重巳經接合創築蔡家口上下及曹單八里灣侯家林百餘里餘當極力完成雖費不恤自兹茍非異常之水北岸固可保無虞矣凡創築隄必擇堅實好土毋用浮雜沙泥必乾濕得宜燥則每層須用水灑潤必於數十步外平取尺許毋深取成坑致妨耕種毋仍近隄成溝致水浸沒必用新製石夯每土一層用夯密築一遍次石杵次鐵尖杵各築一遍復用夯築平隄根宜闊隄頂宜狹俾馬可上下謂之走馬隄毋太峻水易衝嚙凡幫隄必止幫隄外一面毋幫隄內恐新土水漲易壞運河通用中州河北岸隄防重復至四五道者往往而衝決蓋修築不堅一也工程報完巳矣管河監司府二不復省驗二也甲午春所築隄余巡行親驗之盤石口隄巳即衝洗無復形跡原武首面及兩傍各止築尺許中實以虛浮白沙餘率類此爾舊隄日就坍損車馬行人踐踏成路不復巡視完補禁治三也千里之隄壞於蟻穴夫安得而不決哉自今創築者必用新發尺式度長短不一即生弊矣必編號必分定州縣工程丈尺及官夫名數必置籍備紀府二必身親督理指授築法器具詳見前工成監司必親閲實舊隄必委屬時一巡視完補車馬行人路口之隄必兩箱各築闊厚斧創襯隄俾車可上下隄面邉箱路口各限以橫埋丈餘圓朩上覆以土守隄者每遇踐踏朩露即仍以土覆之隄內外栁株稀少者補植之審如是夫安得而復決哉是存乎其人爾運河通用歷年築隄率以髙一丈或一丈二尺為準但地勢不一如地勢原下隄即卑矣地勢頓下猶可見以漸而下者隄益卑而不覺矣凡築隄以髙阜或平地髙若干為準然必逐段用平準法打量余新製水平穩而不搖頗準因地勢髙下而低昂之俾隄面逺近髙下一律甲午築南旺湖隄率髙一丈報完矣余驗而疑之乃施平準法其間有地下八尺者然則隄僅髙二尺爾黃河之隄若是不亦大可畏耶否則貽患非小也但平準極難須水面浮板并於上兩端小橫朩并前朩表橫板之厚薄長短廣狹皆極其均停端正而打量之人目力詳審且再三試果無差忒而後可憑也乙未春浚河修閘之役余甚苦於此必再三躬為之而始效運河通用以上隄防之制四則疏濬塞三法歐陽𤣥之說備矣疏支河以分水勢治河要法顧水有向背地有髙下治水者因其勢而利導之斯善矣然河之所向不可限量趙皮寨口之開冀少殺東流爾不數年而全河從此南徙茍非運道事重是移曹單魚臺之患於睢歸矣不可不審也開河面宜廣俾伏秋水漲有所容砥宜深而狹視面僅可四之一形如鍋砥俾冬春水落流迅可免淤塞近年率為平砥而淺兩失之矣濬河宋人鐵龍爪近時滚江龍之法皆不可用惟先計濬廣若干丈插標水中次計所濬若干逺及夫役之數而約計然後用新製平砥方舟橫排河中為一層船四維各施樁橛插繫水中用新製長柄鐵爬立船中齊濬之每濬深數尺即移船少退以次再濬之後數丈復為一層如前法則雖水中與陸地施工略同若止以船隻往來河中所濬十不及一矣運河同方舟之製非特便於濬河且免役夫入水恤愛之意寓焉運河同疏濬河泥必逺置河岸四十步外平鋪地上免妨耕種用隄者即以之成隄毋仍臨河免致雨水衝洗仍歸河內運河同以上疏浚之制五則凡驗築隄之工必逐假橫掘至砥而後見舊以錐刺無益也運河同隄鋪夫守隄防河所繫甚重子歷詢之多逺地之民赴役有數十百里外者有别州縣編役者且嵗一更易以故隄多坍損栁多砍伐甚至河水巳至或被盜決而官猶未知坐失防禦為害匪輕巳經行令將近鋪居民編當如徭役巳定則將别差更換别州縣者亦將别差兌編以後編役更不必改易仍將本鋪所管隄岸每夫畫地分管專令修隄植栁時閲而勸懲之均為徭役初無損於公家而鋪夫便於守視隄自固矣運河同滄德一帶尤為甚切以上工役之法摘録一條余行中州歷觀隄岸絶無極堅者且附隄少盤結繁密之草與南方大異為之憂虞乃審思備詢而施植栁六法一曰卧栁凡春初築隄每用土一層即於隄內外邉箱各橫鋪如錢如指栁枝一層每一小尺許一枝毋太稀疏土內橫鋪二小尺餘土面止留二小寸毋過長自隄根直栽至頂不許間少二曰低栁凡舊隄及新隄不係栽栁時月修築者俱候春初用小引橛於隄內外自根至頂俱栽栁如錢如指大者縱橫各一小尺許即栽一株亦入土二小尺許土面亦止留二小寸三曰編栁凡近河數里緊要去處不分新舊隄岸俱用栁樁如雞子大四小尺長者用引橛先從隄根密栽一層六七寸一株入土三小尺土面留一尺許却將小栁卧栽一層亦內留二尺外留二三寸却用栁條將栁樁編髙五寸如編籬法內用土築實平滿又卧栽小栁一層又用栁條編髙五寸於內用土築實平滿如此二次即與先栽一尺栁樁平矣却於上退四五寸仍用引橛密栽栁樁一層亦栽卧栁編栁各二次亦用工築實平滿如隄髙一丈則依此栽十層即平矣以上三法皆專為固護隄岸蓋將來內則根株固結外則枝葉綢繆名為活龍尾掃雖風浪衝激可保無虞而枝梢之利亦不可勝用矣北方雨少草稀歷閲舊隄有築巳數年而草猶未茂者切不可輕忽運河黃河通用四曰深栁前三法止可護隄以防漲溢之水如倒岸衝隄之水亦難矣凡近河及河勢將衝之處隄岸雖逺俱宜急栽深栁將所造長四尺長八尺長一丈二尺數等鐵裹引橛自短而長以次釘穴俾深然後將徑直帶梢栁枝如根梢俱大者為上否則不拘大小惟取長直但下如雞子上儘枝梢長如式者皆可用連皮栽入即用稀泥灌滿穴道毋令動搖上儘枝梢或數枝全留切不可單少其出土長短不拘然亦須二三尺以上每縱橫五尺即栽一株仍視河勢緩急多栽則十餘層少則四五層數年之後下則根株固結入土愈深上則枝梢長茂將來河水衝嚙亦可障禦或因之外編巨栁長樁內實稍草掃土不猶愈於臨水下掃以繩繫岸以樁釘土隨下隨衝勞費無極者乎嘗於睢州見有臨河四方土岸水不能衝者詢之父老舉云農家舊圃四圍栁株伐去而根猶存彼不過淺栽一層况深栽數十層乎及觀洪波急流中周遭巳成深淵而栁樹直立略不為動益信前法可行郡邑治水之官能視如家事圖為子孫不拔之計即可望成效將來捲掃之費可全省矣但臨河積年射利之徒殊不便此治水者止知其為父老土著之民惟言是聽而不知機緘之有為也捲掃斧刀隄後逺近適中之處尤宜急栽多栽數層此法黃河用之運河頻年衝決深要去處亦可用五曰漫栁凡坡水漫流之處難以築隄惟沿河兩岸密栽低小柳栁數十層俗名隨河栁不畏淹沒每遇水漲既退則泥沙委積即可髙尺餘或數寸許隨淤隨長每年數次數年之後不假人力自成巨隄矣如沿河居民各分地界築一二尺餘縷水小隄上栽柳栁尤易淤積成髙一二年間隄內即可種麥用工甚省而為效甚大黃河用之六曰髙栁照常於隄內外用髙大栁樁成行栽植不可稀少黃河用之運河則於隄面栽植以便牽挽問水集明世宗嘉靖十五年十一月丙寅升總理河道都察院右副都御史李如圭為兵部右侍郎壬申升右副都御史于湛以原職總理河道明世宗實録治如圭字國寶澧州人𢎞乙未進士歷户部尚書湛字瑩中金壇人正德丁未進士歷户部右侍郎黃河先年由河南蘭陽縣趙皮寨地方流經考城東明長垣曹蕭等縣以入徐州近年自趙皮寨南徙由蘭陽儀封歸德寧陵睢州夏邑永城等州縣流經鳯陽地方入淮其歸德蘭陽等州縣即今水患頗大嘉靖十五年總河李如圭治河疏略明世宗嘉靖十六年七月癸卯命遷河南開封府夏邑縣城以避水患十二月癸丑先是總理河道右副都御史于湛等言地丘店界牌口楊鐸鋪等水俱入亳州經渦河漸近夀春王陵且居鄭家口上流易成淤塞無以接濟二洪若挑飲馬池原淤河身地逺費多宜於地丘店野雞岡等口上流開鑿一河四十餘里由桃源集丁家道口入舊黃河既可以截渦河之水入河濟洪復可以免逼衝王陵之虞工部覆以為便詔從之明世宗實録會典云是年鑿地丘店野雞岡等上流支河四十餘里明世宗嘉靖十七年七月乙酉先是總理河道右副都御史于湛奏原設河夫二千三百餘名今黃河南徙夫役無用量留五百名備修隄岸其一千八百名折銀貯庫以備河道支用工部覆議從之明世宗實録嘉靖戊戌河決金相寺口水出地上一丈許石橋歸德閘方殫為河二洪置壅漕粟不得從河上議者謂自孫繼口至清河口百餘里大興卒塞之非十四萬人不可使領吏且六百人雜作治河卒受平賈與伐買薪石之費期六月計十七萬餘緡是時公諱紹字孟宣棗强人開封府同知實注治河往行河曰是在我即湛祭令水工表獨以徒四萬搴茭而自蹈橇理楗事徒四萬一勸赴臿百餘里雲舉各自以為常見公凡三月河隄成才佐吏數十算九千七百餘緡而巳績上賜爵一級李攀龍滄溟集明世宗嘉靖十八年正月乙酉河道都御史胡纘宗疏言河南睢州考城縣地方新開孫繼口孫祿口各黃河支流以一分殺上源歸睢二處水患一以灌下流徐吕二洪以濟官漕議於孫繼口至孫祿口另築長隄及將考城縣馬牧集等處修堵決口務築髙廣堅實密栽榆栁護之河身既寬土隄亦實大水渙發勢能容受可免衝決散漫之虞而黃河安流二洪順受運道可無患矣疏入下工部議行之三月已巳改胡纘宗巡撫河南以原任副都御史朱裳總理河道五月丙申總理河道都察院右副都御史朱裳卒賜祭葬如例裳直𨽻沙河縣人正德中舉進士授監察御史出守鞏昌纍升都察院右副都御史總理河道未幾以憂去起復原任至是卒裳性峻直有清操歷官三十年攻苦食淡常若一日有先朝名臣之風焉明世宗實録德胡纘宗字世甫秦安人正戊辰進士明世宗嘉靖十九年濬睢州孫繼口至丁家道口淤河五十里明會典是年河決野雞岡由渦河經亳州入淮二洪大涸兵部侍郎王以旗開李景髙支河一道引水出徐濟洪役丁夫七萬有竒八月而成尋淤河防一覽是年決睢州野雞岡由亳入渦河二洪告涸漕舟膠阻命兵部侍郎王以旗同河道漕運二都御史周金郭持平築塞野雞岡濬李景口由蕭縣以達小浮橋凡六百餘里於是渦河堙而河之全力皆入於徐矣蕭縣志歷持平字守衡萬安人正德丁丑進士工部右侍郎兼右僉都御史以旗開支河引水濟洪糧運無阻上悅加秩尋復淤是時河益南徙明紀事本末行水金鑑卷二十四
