body:
  text: 行水金鑑卷二十五江南按察使傅澤洪撰河水明世宗嘉靖二十年四月闕以漕渠水涸遣太常官往祭河淮諸神五月丁亥命兵部右侍郎王以旗督理河道九月壬子詔復河道都御史郭持平俸及管河郎中郭應奎等原職先是持平降俸三級應奎降職一級至是河通特復之從都御史王以旗言也明世宗實録以旗字士招江寧人正德六年進士歷南右都御史嘉靖二十年黃河東決於大清口南竭四十里淮安府志明世宗嘉靖二十一年又鑿野雞岡上流李景髙等口支河三導河東注以濟二洪明會典六月癸丑巡按山東監察御史楊本深趙繼本奏黃河孫繼口李景髙口扈運口俱巳疏濬徐吕二洪水勢通行糧運無阻上覽奏嘉悅詔加督治漕河兵部右侍郎王以旗俸一級總理河道都御史郭持平為工部右侍郎仍管理河道升管河郎中郭應奎等七員各一級員外郎封祖裔等一十五員俸一級餘俱賞賚有差明世宗實録明世宗嘉靖二十二年二月丙子工部請加總理河道尚書周用憲職庶便行事上以祖宗時治河官原無兼職巳之明世宗實録周用疏云今黃河每嵗冬春之時自西北演迤而來固亦未見大害逮乎夏秋霖潦時至吐泄不及震蕩衝激於斯為甚考之前代傳記黃河徙決於夏月者十之六七秋月者十之四五冬月蓋無幾焉此其證也夫以數千里之黃河挾五六月之霖潦建瓴而下乃僅以河南開封府蘭陽縣以南之渦河與直𨽻徐州沛縣百數里之間拘而委之於淮其不至於橫流潰決者實徼萬一之幸也夫今之黃河古之黃河也其自陜西西寧至山西河津所謂積石龍門合涇渭汭漆沮汾沁及伊洛瀍澗諸名川之水與納每嵗五六月之霖潦古與今亦無少異然黃河所以有徙決之變者無他特以未入於海霖潦無所容也溝洫之為用說者曰備旱潦而巳其用以備旱潦者容水而巳故自溝洫至於海其為容水一也夫天下之水莫大於河天下有溝洫天下皆容水之地黃河何所不容天下皆修溝洫天下皆治水之人黃河何所不治水無不治則荒田何所不墾一舉而興天下之大利平天下之大患矣康濟論用字行之吳江人𢎞治十五年進士嘉靖中工刑二部尚書致仕久之以工部尚書起督河道數月改漕運未上召拜左都御史吏部尚書卒贈太子太保諡恭肅明史稿嘉靖癸卯二十二年王湛泉與齡為文選郎中起用周恭肅公以工部尚書總理河道忌王清徑者倡言河道無用尚書故事王以問余余曰永樂初開會通河尚書宋禮實始其事李西涯詩所謂幾度會通河上過竟無人說宋尚書者是也景泰時河決張秋尚書石璞治之正德中李燧亦以尚書治河嘉靖初江南白茅港之役李充嗣亦尚書也鄭曉今言嘉靖二十三年小清河決公僉事山東築長隄禦之瀕河居民得無漂溺詔賜金綺王家屏撰兵部侍郎吳嘉會墓志韓邦竒字汝節朝邑人正德戊辰進士都察院右副都御史嘉靖二十三年總督河道歷南京刑部尚書山東全河備考西邦竒卒諡恭簡見陜通志明世宗嘉靖二十四年由野雞岡決而南至泗州合淮入海遂溢䝉城五河臨淮等縣明㑹典十二月甲寅前太子太保兵部尚書劉天和卒賜祭葬贈少保諡莊襄天和湖廣麻城人正德戊辰進士歷巡撫甘肅陜西升副都御史總理河道工部侍郎改兵部總督三邉軍務拜兵部尚書加太子太保尋召入提督團營以疾致仕卒天和宇度𢎞亮有泛應才凡所揚歷去後必遺跡餘澤為人所稱述至於治水防邉功能尤著在河道嘗手製乘沙量水等器在陜西嘗造單輪車及防火器三眼鎗等後人皆遵用之明世宗實録劉松石人知其花馬池之功而不知其工於治河如閘河之砥深淺不同故盈涸難定公於涸時一以棗林閘為準髙者窪之低者量留砥板閘如一遂為永利湧幢小品明世宗嘉靖二十五年又決曹縣溢入武城金鄉魚臺單縣漂溺甚衆命總理河道都御史會同南北直𨽻山東河南撫按官議築曹縣等處不果明會典明世宗嘉靖二十六年二月甲申户科給事中陳棐疏陳河道二事一除水患以祛民害謂大江以北地勢平衍一遇霖潦輒被淹沒宜放江南水田之法督責長吏時加疏濬通其溝洫使田間溝水盡入於河一減河役以蘇民困謂兩直𨽻山東河南先年設閘夫河夫堡夫逺者徴銀近者給役以供黃河修築之用今皆積有盈餘而嵗徴如故民實不堪宜量為減免待河工興舉銀力不敷仍舊徴派工部議覆報可七月丙辰山東曹縣河決城池漂沒人民死者甚衆工科都給事中劉大直劾河道都御史詹瀚等得旨命巡按御史查核以聞已御史党承賜奏瀚及副使張九敘等隄防失䇿詔奪瀚俸二月九敘等下御史逮問十月戊辰提督漕運署都督僉事萬表奏海口新河淤淺請調順天永平二府及通州衛所軍民夫役挑濬工部覆奏從之明世宗實録萬氏表云黃河自野雞岡而下分為二股其自東南渦河而行者則為河身其自孫繼口出徐州小浮橋者則為支流然皆併合於淮以入海是故黃河入海舍淮無他道也如嘉靖庚子二洪水涸漕舟並阻議者謂黃河改流愚則曰非也夫河流遷改宜必有漫溢之處計今水道惟渦河孫繼口耳今孫繼口之出徐州者既淤則當泛溢於東南之渦河而渦河之水迄今亦微至可截以壩也斷可識矣蓋自清河以至徐沛地勢隆擁節髙一節如往年黃河盛溢之時則上漫濟寧其魯橋諸閘皆為淹沒而淮水亦幾浸城後水勢少降則自魚臺以出谷亭再降則由飛雲橋以出沛縣而淮水亦以次漸小又降而出徐州小浮橋則淮水亦漸平矣近年黃河之水日微故小浮橋之水淤塞宿遷桃源二小河亦塞今淮安河口合流入海之處可以褰裳而涉也此徐水之通塞實本於黃河之嬴縮豈關於河之改流哉續文獻通考明世宗嘉靖二十七年正月癸未總理河道都御史詹瀚以河決曹縣及金鄉魚臺定陶城武等處奏乞於趙皮寨等處多穿支河修築隄岸以捍水患詔可明世宗實録公視河道曰利不當與水爭智不當與水鬬汲汲惟枝河是開長隄是防其見於一政體明職守重運道諸疏可考也偶盜起曹單勢甚猖獗公掣河夫與之格鬭比當事者至則先巳撲滅矣其事不避難如此升刑部右侍郎趙鏜撰刑部左侍郎燕峰詹公墓志按公名瀚字汝約玉山人正德辛未進士胡松之為河道也前使詹瀚以河決議開趙皮寨支河殺水勢公謂開趙皮不如孫家渡近省可十倍詹時佐司寇力沮之而其督漕時以淮安新城據河衝時時潰版築公謂河不易抗宜徙而疏入海亦以遷去弗果然代公者後先卒用公議以濟他所創轉漕法洗清江浦宿蠧著為潔令王世貞撰工部尚書承菴胡公行狀按松字茂卿績溪人正德甲戌進士二十七年公總督漕運時河流忽東南注淮市㕓幾大決議者以為必上聞公曰民危在旦夕而循故事待報此於避形迹為善非任事之體亟下令就決所築隄實土於破舟沈之旋壓以石水勢亦漸緩凡若干月費若干而隄成闊若干丈淮人賴之立碑於鎮河下以紀功德吕本撰工部左侍郎龔公墓志未按公名輝字實卿紹興人嘉靖癸進士方鈍字仲敏巴陵人正德辛巳進士纍官至户部尚書卒贈宫保諡簡肅湖廣通志嘉山東全河備考載鈍督河在靖二十八年鈍誤作純明世宗嘉靖二十八年正月辛卯御史陳其學疏請久任漕河都御史從之時韓士英胡松皆不逾月而罷故其學云然明世宗實録是年公為河南左參政時河決為患至不可禦公親歷決所授吏成法所費不踰萬緡而隄固河寧民無墊溺南刑部尚書馮公家狀丙按公名嶽字望之慈溪人嘉靖戌進士汪宗元字子元崇陽人嘉靖已丑進士歷副都御史督理河道漕流以通嚴嵩嫌其不附已罷為福建參政歷通政使致仕湖廣通志在山東全河備考載宗元督河嘉靖二十九年明世宗嘉靖二十九年六月癸卯命總理河道右副都御史何鼇總督漕運兼巡撫鳯陽等處明世宗實録隂鼇字巨卿山人正德丁丑進士歷刑部尚書明世宗嘉靖三十年七月已亥漕運都御史應檟奏先年黃河入海之道疏通無滯故開清河口通黃河之流以濟運道今黃河入海下流如澗口安東等處俱漲塞河流壅而漸髙瀉入清河口泥沙停淤屢浚屢塞兹欲使黃河之水不入清河口須鑿澗口以決壅滯疏支河以殺水勢工力浩繁未敢輕議勘得三里溝在淮河下流黃河未合之上淮水清多濁少議者未宜閉清河口開三里溝至通濟橋使船由三里溝出淮河達黃河且道里甚近工費不多欲除河患無以易此疏下工部議覆奏從之明世宗實録明世宗嘉靖三十一年三月甲午改總督河道都察院右副都御史連礦總督漕運兼巡撫鳯陽已亥升河南左布政使曾鈞為都察院右副都御史總理河道八月乙未河決徐州自徐州房村至邳州新安等處運道淤阻五十里御史黃國用以聞詔督河漕大臣先議通運船以次塞決疏淺并條列利弊具奏十月壬申以河決免徴安東縣馬十二月壬子河道都御史曾鈞奏上治河方略自房村集至雙溝曲頭諸處當浚自徐髙廟至邳州沂河諸處當築隄約工費當用銀十一萬三千餘兩有竒乞發淮揚餘鹽并鄰省事例銀兩協濟其諸省解京掠剩河道及南直𨽻贓罰等銀亦宜暫留以助大工工部覆議上曰河患異常所在有司漫不經心姑記罪候處鈞所請修浚銀兩俱依擬仍令會同漕運都御史連礦以實舉行自後河道錢糧别衙門不許擅自動支明世宗實録是年又決房村至曲頭集凡決四處淤四十餘里命官濬之役夫五萬餘三閲月而成明㑹典嘉礦字伯全永寧人靖丙戍進士曾鈞字廷和進賢人嘉靖十一年進士三十一年以副都御史總理河道徐邳等十七州縣連被水患帝憂之趣上方略鈞請濬劉伶臺至赤晏廟八十里築草灣老黃河口增尚家堰長隄繕新莊築舊閘閲數月成進工部右侍郎治河四年入為南京刑部右侍郎明史槀明世宗嘉靖三十二年正月戊寅朔遣刑部左侍郎吳鵬賑徐邳等州先是大學士嚴嵩等疏言徐邳等十七州縣連被水患饑民甚衆而剽劫吏不能禁恐生他變乞命户部給發餘鹽銀兩及徐淮等倉存留糧米選差大臣出賑仍令工部行巡撫及河道官急將黃河下流設法疏濬令水歸故道百姓有室廬田可依得以安堵上命河道都御史曾鈞漕運都御史連礦作速勘處以聞至是鈞等奏謂劉伶臺至赤晏廟凡八十里乃黃河下流頃為淤沙壅塞以致奔潰此其疏濬所最先者次則草灣老黃河口衝決淹沒安東一縣亦當急築既成之後宜築長隄磯觜以備衝擊又三里溝新河口比舊口水髙六尺若開舊口雖有沙淤之患而為害稍輕若開新口未免淹沒之虞而漕舟頗便宜將新口暫閉建置閘座及將髙家堰增築長隄原建新莊等閘加石修砌以遏橫流但挑築工料計用銀十三萬九百餘兩乞發淮揚滸墅二鈔關并蕪杭二抽分銀兩解用工部覆議從之巳命發淮徐食米麥四萬石運司餘鹽銀五萬兩遣刑部左侍郎吳鵬往賑之二月辛酉大學士嚴嵩李本言頃徐邳水患挑濬幾成一夕水湧旋淤前功盡棄其或湧或淤若有神使請遣太常官齎香帛往授各巡撫官祭大河泰山沂山金龍廟等神從之閏三月辛酉刑部左侍郎兼僉都御史吳鵬河道都御史曾鈞等奏言黃河自古為患其治之之術不過疏濬塞三法而巳比年淮徐水患議者謂海口積沙壅閼下流所致今臣親歷其地販鬻之舟往來無滯乃知積沙之說出自傳聞無容議矣惟草灣老黃河口劉伶臺宜挑浚築塞使水復故道不致橫潰三里溝新開河口迎納泗水清流可以避黃河之衝墊宜創建閘座以時啓閉但工費不資乞於常鎮二府糧銀數內量給接濟臣又惟黃河西來萬餘里匯納百