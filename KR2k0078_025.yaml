至編虜老則四顧荒漠墩堡為墟朔州乃河之西鴈門陽方諸要害之處遂為虜衝烽火傳報俱不以時至此剝牀及膚患也今如臣計則自老營東二十里為賈家屹屹又東二十里為乃河又東二十一里為顧家堡又東二十里為平虜衛廢堡悉在急宜修舉每堡設軍五百人每五里為立一墩軍勢相連火烽相接逺續大同之手足近復朔州之膏腴東接平虜之血脈南固陽方之門户北明三關之耳目西通老營之咽喉此修復邉防之大計也以上二計臣任其必可行而工費亦不必取之內帑河牆之費則括諸司贓罰乃河之費則改班軍折糧庶幾一勞永逸禦虜之䇿無出於此疏入詔先從其河防事命興工修築乃河事宜仍㑹同大同撫臣詳議行庚戌改總理河道工部右侍郎陳堯為刑部右侍郎丙辰升右僉都御史孫慎為右副都御史總理河道七月癸卯河決沛縣等處運道淤塞百餘里八月癸未改南京刑部尚書朱衡為工部尚書兼都察院右副都御史總理河道及漕運事務辛卯以徐邳河淤命總理河道尚書朱衡祭告大河東嶽等神十月丙子命總理河道都察院右副都御史孫慎回籍候用時河患方亟被命遷延不即赴任都給事中王元春疏劾之故有是命十一月甲午朔總理河道漕運工部尚書朱衡劾奏管理曹濮副使柴淶怠緩不任事宜從調處并乞申飭河道漕運二臣協心共濟毋分彼此仍行各濵河巡撫駐劄近地以便咨確且親督所屬共圖成績詔從之已亥升大理寺左少卿潘季馴為都察院右僉都御史總理河道明世宗實録是年郭貫樓淤遂決華山出飛雲橋截沛以入昭陽湖北泛湖陵城孟陽泊至穀亭南溢於徐命官往治乃接六年所鑿故跡役夫浚之為南陽新河又疏舊河自留城至境山又隄馬家橋遏河流出飛雲橋者使盡歸秦溝魚沛橫流始絶惟茶城時有淺阻明㑹典是年七月河水大淤全河南繞沛縣戚山入秦溝北繞豐縣華山漫入秦溝接大小溜溝泛濫入運河至湖陵城口漫散湖陂從沙河至二洪八月工部尚書朱衡乃請開都御史盛應期原議新河自南陽至留城僉都御史潘季馴請接浚留城舊河并力挑浚八閲月而成河防一覽先是四十三年上六股皆淤而統㑹於秦溝逮四十四年水泛異常決新集塞龎家屯向東又出飛雲橋漫成巨浸迤而南注由秦溝直射茶城而經徐入淮矣蕭縣志行水金鑑卷二十五
