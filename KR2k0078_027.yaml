body:
  text: 行水金鑑巻二十七江南按察使傅澤洪撰河水明隆慶六年六月戊辰神宗巳登極矣輔臣髙拱特請工部尚書朱衡解督理河工總督料理山陵事務従之差江西道御史周于徳督理兩淮鹽課兼理河道七月戊子吏部覆朱衡等守河事宜一議官守一議久任言管河官員防守修築必經歲月駐信地方便責成新築河隄計長三百七十里每六十里用官一員俱以州判縣簿領之又添設府同知一員與管河通判均分調督如遇有急互相協理其每年修守著有成效者年終薦舉紀録次第遷秩如管河主簿則陞管河縣丞縣丞陞州判州判陞州同州同陞通判其係科目者管河通判則陞同知同知陞僉事遞陞參議副使參政按察使布政使累著成效則直以總理河道大用之久其任則河務愈精久其官則河臣益勸衡等所陳誠為確論詔行之甲午工部尚書朱衡言國家治河不過濬淺築隄二䇿濬淺有漕黄交㑹之異濬漕黄者或爬或撈或逼水而衝或引水而避此可人力勝者茶城與淮水㑹則在清河茶城清河之淺無嵗不然蓋二水互為勝負黄河水勝則壅沙而淤及其消也淮漕水勝則衝沙而通雖用人力水力居十七八築隄有截水縷水之異截水之隄可施於閘河不可施扵黄河蓋黄河負湍悍之性挾川潦之勢所向何堅不破顧可以一隄當之乃縷水之隄不然河由淮入海運道實資之故扵兩岸築隄不使従旁潰溢始得遂其就下入海之性盖以順為治非以人力勝水性故至今百五六十年永賴不變查清河之淺應照茶城例每遇黄河漲落時穵挑河潢導令淮水沖刷則雖遇漲而塞必遇落而通惟清江浦水勢最弱出口處所適與黄河相値比因民船由閘往來不閉遂至沙淤壅塞旣有妨運道復貽患淮郡宜扵黄水盛發時閉各閘惟鮮貢船隻聴令經由探有帶入沙淤隨即爬撈毋使停滯若海口訪自隆慶三年海嘯後壅水倒灌低窪之地積瀦難洩今前水固巳消涸尤宜時加試測設有沙淤隨即疏浚毋得積塞有誤大計至於築隄黄河兩岸止是縷水不得以攔截為名報聞乙未詔均派兩直隸山東河南河夫扵各州縣毋偏累瀕河地方八月乙卯總理河道兵部右侍郎萬恭巡撫遼東自陳乞罷不允十月丁卯吏部覆總理河道萬恭照舊供職不宜以患病再行陳乞報可戊辰復歸河南黄河退灘地三百三十頃于杞縣灘地原屬考城永樂間杞人墾荒其稅糧隨派扵杞後杞姦民避重就輕復報入考城奏告紛紜至是撫按查勘明白乃復歸杞庚午工科都給事中張文佳言河道國家命脈所闗海運方過河運之間道輕重緩急甚為較然顧黄河遷徙不常今河流雖安河道諸臣未可自謂安往年河工報完河患繼報至變起倉卒莫可支持凡以防之不預圖之不早尚書朱衡之所經略至為詳盡乞敇河道諸臣及時舉行併力殫圖不得指以海運弛意河工疏下工部朱衡亦言漕河自儀眞至張家灣凡二千八百餘里河勢四段不同儀真至清江浦與臨清至張家灣逺隔黄河不闕力惟茶城至臨清則閘諸泉之水為河與黄河相近清河至茶城則黄河即運河也臣故謂茶城以北當防黄河之決而入茶城以南當防黄河之決以出防黄河即所以保運河故自茶城至邳遷髙築兩隄宿遷至清河盡塞缺口蓋以防黄水之出則正河必淤昨歲徐邳之患是也自茶城秦溝口至豐沛曹單諸處創築増築以接縷水舊隄蓋以防黄水之入則正河必􅌎往年曹沛之患是也二處告竣則河深水束無旁決中潰之虞然沛縣窰子頭至秦溝口應築隄七十里接古北隄與徐邳之間隄逼河身應扵新隄外别築遥隄譬之重門待暴増纊禦寒此二項工程尤當及時修舉奉詔如議命河臣萬恭經理已卯户部奏請開濬榆河自鞏華城達於通州渡口運糧四萬石給長陵等八衛官軍月糧從之十一月乙未以河工告成賞尚書朱衡侍郎萬恭銀幣及郎中呉自新銀兩有差萬恭言國家財賦仰給東南貢運轉輸全資河道徐州以上河廣廣則水有所滙而縈迴徐以下則河狹狹則水無所容而泛溢故欲河不為暴莫若令河専而深欲河専而深莫若束水急而驟束水急而驟使由地中舍隄别無䇿前都御史潘季馴議開一百里故道給事中雒遵議築三百里長隄人情洶洶謂隄費且無益於河獨荷先皇俞允臣等督司道等官申畫地之約下募夫之令期以九十日而工止六十期以六萬兩而費止三萬隄工遂成河流順軌臣等復念築隄如築邊守隄如守邊又㑹題設官布夫建鋪編號沿隄修守以此今年黄水大發而三隄竟不敗河卒無虞北運無一水阻南還無一水阻因陳各官勞勩請加敘奬工部覆從之已酉河道侍郎萬恭奏管隄副使章時鸞築過南隄自蘭陽縣趙皮寨至虞城縣凌家莊長二百二十九里有竒用工五十萬七千七百四十一工除調撥徭夫外仍募夫一十六萬七百一工支河道銀四千八百二十一兩有竒秋分而起未盡十月而成為照前隄係運道上源先議興築南北並峙若南强北弱則勢必北侵張秋等處可虞北强南弱則勢必南溢徐吕二洪可慮又恐占民膏腴致生咨怨今時鸞督數萬之夫僅七十日竣事接續舊隄旣不多損民地鳩集徭役又不多費官銀且隄虞城以上則上源水有所束得沖刷之宜不隄碭山以下則下流水有所容無泛溢之患治河之䇿似為長便時鸞原係添設乞敕注實在衙門庶便補報疏下吏部明神宗實録明神宗萬歴元年正月辛卯河道侍郎萬恭奏先臣工部尚書宋禮開河元勲功在萬世乞照平江伯陳瑄例補給䘏典章下工部覆如恭議詔予禮贈諡廕一孫入監讀書四月乙卯廕總理河道兵部左侍郎萬恭子萬允位入監讀書吏部言恭雖經綸未效扵行檢無礙近科臣劉伯燮奏薦起用具見公論故用給繇子廕焉辛酉工部尚書朱衡覆科臣朱南雍疏言治河之法杜萌銷患者上次則隨時補弊或築隄岸以防其奔潰或建閘隄以嚴其蓄洩或導合流以盪其壅滯或探上源以遏其沖突此外更無竒䇿今防潰決則徐邳之遥隄當舉豐河之長隄當加嚴蓄洩則境山之石閘當復吕孟等湖減水閘當建盪壅滯則茶城之合秦溝清江口之合淮水當分布官夫大加疏浚遏沖突則武家口煉城銅瓦廂等處之倒灣當布列夫料預築埽臺河南山東之太黄隄與縷水南隄當増高厚盜決之禁乞申飭河道諸臣悉心經理多方區畫務圖經久之計毋恃目前之安従之六月甲戌兵科給事中趙思誠奏請清查河道錢糧僱徐淮貧民修挑海口㫖下該部七月辛已工部覆給事中趙思誠疏言黄河挾百川萬壑之勢益以伏秋潢潦之水抜朩揚沙排山倒海所向無堅不破所賴以容納者在海而輸洩之路則海口也海口梗塞一夕則無淮安再夕則無清河無桃源運道沖決傷天下之大計人民昏墊損一方之生靈闗係誠不淺小故必疾使之洩其害始息必多為之委其洩始易淮安舊有八口今止存其一委既少則流必緩誠宜早計急圖至於近年河水未嘗加益特因河決之後沖刷未盡淤墊遂積故河身日髙隄岸日卑日卑日増終當奚極宜行河道諸臣逐一㑹勘具題以請上是之八月甲辰河道侍郎萬恭奏今年七月黄河水漲沔池縣張成口至深五丈徐州黄水驟發閱月方始歸漕皆故老所競言未見者因自稱調度機宜合房村口隄一百餘丈正河千里安流通茶城口淤一十餘里回空千艘速出仍開國初以來治河之法及今所探水處淺深以聞疏下工部明神宗實録是年茶城復淤修建境山閘并護房村等處隄岸及築遥隄四又開草灣導河自安東縣後至金城五港入海然泛濫如故曹豐徐沛之間隨塞隨決明㑹典是年河決萬家口決房村續文獻通考是年河決房村工部題將沛縣窪子頭至秦溝口築隄七十里接古北隄徐邳新隄外别築遥隄而河稍安運道亦利南河全考明神宗萬歴二年正月辛卯工部覆工科給事中吳文佳等題稱茶城為黄漕交㑹之地其勢必淤而徐邳隄近河深其勢易決乞咨河道侍郎萬恭將茶城并房村一帶應築應濬事宜作速従實奏報従之三月丙戌工部覆河道侍郎萬恭議處河漕四事一議疏治茶城淤淺茶城當漕黄之㑹培築小隄預作小河寛止數丈以為束水之計其夫役取之徐州洪夏鎮督發不必更煩經費一議修浚境山閘座境山舊閘錐探至二丈五尺杳不可尋合相度地形従新創建復自兩邊各築一隄東扺山岡髙阜西接黄河縷水長隄水發可閉閘以遏洪流扵兩隄之外落可放水以沖積沙扵方淤之初待運盡之日併力興工毋得延遲一議保䕶房村一帶隄岸徐邳南北兩岸新隄束水中流以防潰決但河形曲直不同急溜埽灣之處伏秋水發不無沖決而房村以上為甚合應正隄一帶大加帮築急溜去處創建遥隄及責田淺以下舊有遥隄者一併加倍高厚但諸臣集議欲扵黄鍾集之上分水由符離集出小河口竊恐有並行之河決無兩盛之理萬一全河棄舊奔新經趨符離集則境山上下四百三十里將為陸地嘉靖甲子之患可鑑也前議亟宜停止一議接窰子頭古隄先年黄河北徙溢入運河為患接築前隄護一時也近自接連縷隄頭通築長隄黄水再無空隙可以北徙前項似可省築惟境山至留城一帶東隄内束河水外障湖波往來牽挽勢必由之見今沖坍數多相應加築其碭山縣陳孟口新沖決口永禁築塞使黄河水發歲歲分洩以圖永利如議行已亥刑科左給事中鄭岳奏國家借黄河為運道上自茶城下至淮安五百餘里乃茶城有沖淤之患徐州有淹城之危邳州有􅌎塞決口之虞稽之歴年可考也臣去年奉差經過淮安正值水發之候民居漂蕩詢之地方父老皆言自嘉靖四十四年五年河水大發淮口出水之際海沙漸淤今則髙與山等此沙既壅自淮而上河流不迅泥水愈􅌎其邳州之淺房村之決吕梁二洪之平茶城倒流之弊皆由此也今不務海口之沙乃扵徐沛吕梁地形髙處日築隄岸以防水勢桃源宿遷而下聴其所之則水安得不大而民之為魚未有巳時也臣聞之惻然嘗見宋人李公義王令圖曽獻濬川耙法以圓朩八尺横扵中以鐵為齒齒列三行兩端有輪以舟駕之行淺水中舟過則泥去此古人巳試之法試倣而用之能疏淮口横沙而去其最下之塞則徐淮自無淹溺之虞能疏吕梁積􅌎而得其髙低之形則茶城自無倒流之患此固言之可采理之必然者工部覆議咨河道侍郎親詣海口踏勘具奏從之四月癸丑總督河道侍郎萬恭回籍聴用八月庚午以淮徐揚州等處積雨海嘯河溢損稼漂産各蠲賑有差九月丁丑工科給事中胡汝欽條議禦災三事一議責成水利道宜令移駐河上仍選委廉能佐貳親歴隄防如各殫心力而水患異常猶従末減不此之務以致沖決者従重參處一議浚築穴口之疏以殺水勢然必有容水之處斯下流不壅上流不塞否則徒勞民傷財一旦淫雨異常河水隄漲為害更重宜詳察地勢務求永利部覆従之戊子河南副使章時鸞革職為民以廵按河南御史褚鈇劾其議築黄河托疾避事也閏十二月已丑先是議開馬橋至子房新河督理河道傅希摯勘稱上段則四十里皆水下段則數十里伏石委難議開惟梁山以下穿羊山出右洪口一帶便扵開濬口向東南與黄流頗順并估合用銀二萬四千二百七十餘兩且新舊兩河必有一通可保萬全宜行開築部覆報可明神宗實録是年決邳州婁兒莊等處決口河南全考是年決鄒家館續文獻通考是年秋七月二十四日辰刻㣲雨入戌風大異雨如注次日夜益猛㧞樹撤屋東海大嘯河淮並溢漂蕩山清安鹽等邑官民廬舍一萬二千五百餘間溺死男婦鄭江等一千六百餘口淮安府志是年河淮並溢漂官民廬舍溺死男婦清河縣志萬恭字肅卿南昌人嘉靖二十三年進士歴僉都御史巡撫山西丁艱隆慶六年春給事中劉伯燮薦恭異才㑹河決邳州運道大阻已遣尚書朱衡經理復命恭以故官總理河道恭與衡築長隄北自磨臍溝迄邳州直河南自離林迄宿遷小河口各延三百七十里費帑金三萬六十日而成髙寳諸湖夏秋氾濫歲議増隄而水益漲恭縁隄建平水閘二十餘以時洩蓄專令浚河不復増隄河遂無患恭强毅明達一時稱才臣治水三年言者劾其不職竟罷歸家居垂二十年卒明史稾黄河自宿遷而下河博而流迅治法宜縦之必勿隄宿遷而上河窄而流舒治法宜束之亟隄可也又徐邳水髙而岸平泛溢之患在上宜築隄以制其上河南水平而岸髙衝刷之患在下宜捲埽以制其下不知者河南以隄治是滅趾崇頂者也徐邳以埽治是摩頂擁踵者也其失䇿均也築隄余以唐張仁愿搶築三受降之法築邳宿三百七十里不用翻工舊制即布五萬夫聯絡扵三百七十里之中分為信地編定字號萬杵齊鳴分之則為各段合之則成長隄火爨蓬居不移而具遲速勤惰不令而嚴始以十萬金計終三萬成之便法也築隄有三禁毋掘房基毋掘古塜毋剗膏腴淮安隆慶中水萬歴壬申又水或云海口淤宜濬之郡有司為探海口則廣三十里望之無際冬中洲渚㣲見海中潮長則煙霧波濤極目耳舟従何繫人從何依工從何施且清河之流甚駛海口即􅌎清河當上行矣古無濬海者有由然哉而怨淮水罪海口者謬矣河隄之法有二有截水之隄有縷水之隄截水者遏黄河之性而亂流阻之者也治水者忌之縷水者因河之勢而順流束之者也治水者便之夫水之為性也專則急分則緩而河之為勢也急則通緩則􅌎若能順其勢之所趨而隄以束之河安得敗唯河欲南而截之使北河欲合而截之使分以逆天地之氣化而反天地之血脈河始多事也巳徐邳順水之隄其始役也衆譁以謂黄河必不可隄笑之其中也隄成三百七十里以謂河隄必不可守疑之其終也隄鋪星列隄夫珠貫歴隆慶六年萬歴元年運艘行漕中若平地河漲則三百里之隄内束河流外捍民地邳睢之間波濤之地悉秋稼成雲此隄之餘也民大恱衆乃翕然定矣智者覩效扵未然衆人定議扵覩效諒哉黄河北徙其北岸西自曹縣原有縷水隄一道長四十里踰豐碭界歴徐州衛地界亦有縷水隄唯曹單之交缺八十八里餘為之聯隄復聯隄碭山界東引之延袤二百餘里若常山之蛇以北䕶泰黄隄南遏漫河自是河北絶水患泰黄若崇墉矣余刻石華山之巔以紀之沿河夫役出之農家徹骨矣猶冀商賈助之也有司者復迫之鋪行官價市且散矣濵河蕭條奉㫖厲禁四省之苦鋪行者追其牌冊而焚之商賈乃安闗鎮漸復𢎞正之風而河夫始有裹糧有寧宇矣河南屬河上源地勢南髙北下南岸多强北岸多弱夫水趨其所下而攻其所弱近有倡南隄之議者是偪河使北也北不能勝必攻河南之銅瓦廂則徑決張秋攻武家壩則徑決魚臺此覆轍也若南攻不過溺民田一季耳是偪之南決之禍小而北決之患深有隄無夫與無隄同有夫無鋪與無夫同邳徐之隄為每里三鋪每鋪三夫南岸自徐州青田淺起至宿遷小河口而止北岸自吕梁洪城起至邳州直河而止為總管府佐者二為分管信地州縣佐者六南鋪以千文編號北鋪以百家姓編號按信地修補隄岸澆灌樹株遇水發各守信地遇水決則管四鋪老人振鑼而呼左老以左夫帥而至右老以右夫帥而至築塞之不勝則二總管以遊夫五百馳而至助之此常山蛇勢之役也黄河之驟急如風雨智者失其謀勇者失其力唯有桑土之徹而巳故勢亟重也語夫則以千計語料則以萬計乃有備無患與防邊同而防河又腹心與防邊四肢之患異今防邊大司農歲發數百萬而防河則否故隄防稍緩者一年備一年可也若河南陶家店銅瓦廂煉城口穵泥河榮花樹山東武家壩徐州曲頭集房村口則樁草􅐨麻柳梢宜兩年之備可也總之黄河要害以頭年下埽為次年之防一年積料為兩年之用事預則立隂雨無虞慎之哉往治河者以刻削工料為能以文移往返為事不知惜小費者妨大計操散權者無專功涓涓不塞遂成江河壞也久矣善治者二言以蔽之曰毋惜費毋掣肘徐州參將營屬總河而總理督兩直隸山東河南四省軍務皆始扵隆慶四年一為護運一為聯絡中原也先是四省多盜一省擒之則逃散三省兵權不一以故中原多盜且劫掠運艘輕齎嵗饑則殺越而奪之糧往往見告矣乃以總河兼制之盜發則檄四省十二兵備㑹擒之隆慶末萬歴初盜亡得脫者自是衰息而又以山東管河副使兼濟寧兵備屬兵一千徐州參將正二三四月運盛行則提徐州軍壯八百名駐扵徐以護運為左哨五六七八月提歸徳卒一千駐扵商丘以備高秫之匿盜者為右哨九十十一十二月提宿州卒七百駐扵宿以右控河南左制江北為中軍盜小發則分營三擒之大發則合營總擒之而十二兵備之兵睢潁翼扵西徐揚振扵南濟沂犄扵東濟曹臨天大名之兵角扵北數千里響應盖朝廷有深意矣總理經費歲用六百餘金併輿皂門快金鼓軍民諸役餼食舊偏累濟寧萬歴元年如各邊軍門例派之四省濟民力紓矣經費僅六百餘金可謂儉矣後之人其能之否乎行水之法治有餘先下流治不足先上源諺云胷有全河而後能治河又云以圖御者不盡馬之情夫圖猶不盡矣况無圖乎余故令善圖者乗𫝊一自孟津二千里達扵海口圖之命曰黄河圖一自張家灣二千八百里達扵𤓰儀命曰漕河圖皆州載而縣紀之渠識而灣書之且布沿革之故扵上端勒石扵總河之四思堂後來者按之其以為全河乎其以為圖御乎黄河㑹計預備河患皆以十月至來年十月止在山東兖州東昌在河南開封歸徳在直隸大名鳯陽徐州邳州泗州俱係黄河先年及即今經行正道皆預料之有八埽曰靠山曰箱邊曰牛尾曰魚鱗曰龍口曰土牛曰截河曰逼水有四隄曰遥曰偪曰曲曰直黄河四隄今治水者多重遥直而輕偪曲不知遥者利扵守隄而不利扵深河偪者利扵深河而不利扵守隄曲者多費而束河則便直者省費而束河則不便故太遥則水漫流而河身必墊太直則水溢洲而河身必􅌎四者之用有權存焉變而通之存乎人也治黄河之淺者舊制列方舟數百如牆而以五齒爬杏葉杓疏厎淤乗急流衝去之效莫覩也上疏則下積此深則彼淤奈何以人力勝黄河哉虞城生員獻䇿為余言以人治河不若以河治河也夫河性急借其性而役其力則可淺可深治在吾掌耳法曰如欲深北則南其隄而北自深如欲深南則北其隄而南自深如欲深中則南北隄兩束之衝中堅焉而中自深此借其性而役其力也功當萬之扵人又其始也假隄以使河之深其終也河深而任隄之毁余曰此深河之法也欲淺河以為洲法若何曰反用之耳其法為之固隄令漲可得而踰也漲衝之不去而又踰其頂漲落則隄復障急流使之别出而隄外水皆緩固隄之外悉􅌎為洲矣余試之為茶城之洲為徐邳之河無弗效者故曰以人治人以事處事以將選將以兵練兵山東河南黄河之北大隄若阜起修武迄沛縣之窰子頭綿亘五百餘里曰泰黄隄河人呼曰南老隄夫隄迄黄河北十餘里不呼北隄而呼南隄蓋先年河行泰黄隄之北始皇隄之南則泰黄固南隄也今河循銅瓦廂武家壩則又藉泰黄為障矣隆慶末復循曹單豐沛跨戚山華山為之縷水隄二百里是泰黄以縷水為膚縷水以泰黄為骨南北相峙犄角之勢也而又續窰子頭之大隄培戚華二山之縷水則魚沛可安枕而南陽至黄家閘永無黄河侵陵之患矣始皇隄二屹壽張范縣之中南北相距數里厚可三十丈崇可五六丈始皇築以象天之二河東人言起咸陽迄登萊一以障河之南徙一以為馳道従咸陽至東海求神仙輦馳南隄屬車馳北隄子路問津河亦湮之為隄焉今視之皆粉土所成東人呼始皇隄又云萬里隄盖萬古雄隄也𫝊曰為馳道之盛至扵如此後世子孫曽不得蓬纍而托足焉今黄河乃穿隄南行三百里豈徒子孫不得托足蓋河伯亦不得托身也已萬恭治水筌蹄行水金鑑巻二十七
