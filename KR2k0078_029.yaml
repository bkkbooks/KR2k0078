body:
  text: 行水金鑑卷二十九江南按察使傅澤洪撰河水明神宗萬歷四年十二月戊辰禮部類奏災異言今年自二月以來河水斷流地震雨雹頻形章奏豈聖世所宜有乞敕大小臣工革心勵行舉錯務協于公功罪必求其當催科或擾則加意撫綏囹圄或寃則悉心昭雪皇上復先謹天戒益懋聖德起居動作類若上帝之式臨號令施為唯恐一物之失所轉異為祥端不外此上納之丁丑免河南本年應徴河夫堡夫銀三萬二千餘兩未調夫役免追曠工巳調實夫更班歇役明神宗實録河水斷流可謂旱之至矣此時宗伯年終類奏能極言致災之由君臣交相警戒真神廟初政之最善者矣是年八月河決自徐州上􅌎梨林鋪直扺睢寧縣治水深丈餘廬舍倉囷牲畜盡空淮安府志是年河決大水浸城三尺許百姓逃亡者三之一睢寧縣志是年八月河決大行隄數處民多流移豐縣志見河水斷流于禮部類奏而八月間徐睢皆大水可見河水乾涸在八月以前明神宗萬歷五年八月癸亥河復決崔鎮閏八月乙酉時河決崔鎮衝開水溜勢分正漕河道都御史傅希摯議堵築決口束水歸漕漕運侍郎吳桂芳欲衝刷成河以為老黃河入海之路持議各異部覆運道關係尤重且急崔鎮決口聽河道衙門及時堵築俾水歸漕其老黃河入海之路俟水勢稍定㑹同議奏報可戊子時徐州河淤澱宿邳清桃兩岸多決淮水為河所迫徙而南髙寶湖隄大壞于是工部都給事中劉鉉建議南河郎中不便顧理淮北請添郎中一員于淮徐適中處專治淮黃一帶河道其徐吕二洪主事可并一員上諭工部近來偶以一事輒便增官增之不便又議裁革殊為輕事添設部員及先年河漕當地分管之議本欲責成反滋推諉并議以聞部覆國家特設總督漕運大臣則凡有關于運務皆其責也又設總理河道大臣則漕河自張家灣直抵瓜儀黃河自河南山東上源至淮安入海皆其地也與其畫地分管之異同孰若漕河之各供厥職之畫一宜各遵頒降敕書行事惟若郎中一員專治淮北裁吕梁洪主事即令郎中帶管則無增官之費而有得人分治之益從之九月乙丑升總理河道都察院右僉都御史傅希摯為右副都御史巡撫陜西戊辰升巡撫山東都察院右僉都御史李世逹為右副都御史總理河道十一月壬戌先是嘉靖三十二年以前黃河由小浮橋後徙由沛縣飛雲橋繼由徐州大小溜溝以入閘河四十四年河大決改由秦溝出口以致茶城歲患􅌎淺至是復南趨小浮橋故道河道都御史傅希摯以聞奏下所司明神宗實録是年秦溝復􅌎自崔家口歷北陳鴈門集等處至九里山出小浮橋其一支自九里溝誼安山歷符離出小河口而崔鎮大決散漫湖泊間桃源以下故渠多淺明㑹典是年河決曹縣韋家樓碭山縣張家屯續文獻通考是年大水城崩知縣伍維藩申請上疏發帑遷新縣治于三台山之陽蕭縣志傅希摯衡水人纍官右僉都御史巡撫山東隆慶末改總理河道以茶城􅌎塞開梁山以下寧洋山出右洪口萬歷五年進右副都御史巡撫陜西明史槀明神宗萬歷六年正月庚午户科給事中李淶條陳治河五事一曰多浚海口以導衆水之歸夫徐邳而下黃河自西而東淮河自南而北俱㑹于清河口東南折而歷安東縣出雲梯關以入于海舊甚深廣嗣以黃水泥􅌎黃淮二瀆皆無所歸故其勢不決徐邳而沖嚙于髙寶諸隄至髙寶諸湖浩蕩無涯先時沿河之西多置塘岸以蓄盱泗諸處暴漲之水故河以東運隄無恙乃今塘岸盡廢而黃淮之水又悉飛瀉于此是以全隄盡圮宜别勘堅實之地以多浚其口仍必自下而上漸去河身之􅌎盡于徐吕二洪而後止若淮安之南寶應之北計八十里每十里建平水閘一座髙郵邵伯各加建平水閘十座閘下每開支河四五十處以導上河之水入于隄下射陽等湖而鹽城興化沿海地方皆宜查其舊地多浚十餘口以導射陽諸水而入于海下四條俱入運河章下所司辛未升總督漕運兼提督軍務巡撫鳯陽等處兵部左侍郎吳桂芳為工部尚書兼都察院右副都御史總理河漕提督軍務上以當事諸臣意見不同動多掣肘以致日久無功今以此事專屬桂芳提督其選用部司等官及處置錢糧俱許便宜奏請巳而桂芳辭免不允二月丁酉升刑部右侍郎潘季馴為都察院右都御史兼工部左侍郎總理河漕兼提督軍務乙已户部題黃淮為患總理河漕吳桂芳巳于正月十八日興工築隄數萬之夫雲集待哺銀糧不可一日有缺所請南京户兵二部庫貯糧剩馬價銀兩各支一萬兩及户部速將見年每幫漕糧奏請準留八萬石行漕運衙門分貯沿河各倉支用從之三月已卯升原任總理河道提督軍務都察院右副都御史李世達巡撫浙江四月壬寅刑部右侍郎潘季馴疏辭總理河漕上以河漕多虞總理重任不許丙午工科都給事中王道成題當今之事莫急治河日者黃淮水發勢且滔天以數千里之巨浸而僅泄于雲梯之一線于是南北併受其害謂宜塞崔鎮之決口築桃宿之長隄修理高家堰開復老黃河仍嚴督當事諸臣務在疏通壅滯庶幾有濟議下所司六月乙已總理河漕都察院右副都御史潘季馴條陳治理六事一曰塞決口以挽正河二曰築隄防以杜潰決三曰復閘壩以防外河四曰創滚水壩以固隄岸五曰止濬海工程以免糜費六曰寢開老黃河之議以仍利涉部覆如議有㫖治河事宜既經河漕諸臣㑹議停當著他著實行各該經委分任官員如有玩愒推諉虛費財力者不時拿問參治全疏詳見于後七月壬子工部覆總河都御史潘季馴等奏河工浩大須多官分督往年一逢升遷竟自代去以致錢糧不明勤惰莫稽今後凡有升調留待工完將經手錢糧併其勤惰稽查明白方許離任至若分布政司屬奉有專敕而有司視之蔑如動有掣肘今後除本地方守巡各有專職自行督責外凡供事河工者俱聽分司責成如有玩愒不遵該上司參奏有㫖河工事重必須委任責成以後該管河官暫停升調候河工完日分别賞罰委官賢否但以該管河道官為主别道不得干預已已總河都察院右都御史潘季馴疏奏復故河其利有五蓋河從潘家口出小浮橋則新集迤前一帶河道俱為平陸曹單豐沛之民永無昏墊之苦一利也河身深廣受水必多每歲可免泛濫之患曹單豐沛之民得以安居樂業二利也河從南行去㑹通河甚逺闊渠可保無虞三利也來流既深建瓴之勢易滌則徐州以下河身必因而深刷四利也小浮橋之來流既安則秦溝可免復沖而茶城永無􅌎塞之虞五利也議下所司詳見于後乙卯差錦衣衛官校拿解淮安府通判王𢎞化水利道僉事楊化隆南河郎中施天麟調外任以總河潘季馴疏參耽誤河工故也辛未巡撫直隸御史崔廷試題稱臣奉命淮甸經過地方所當因勢調停者一曰處工費以恤災地淮揚水患巳極民不聊生其河工等費難以復派陵寢運道關係良巨所當特捐內帑待用之藏暫停本年起解之額以蘇民生也一曰計夫役以安窮民各州邑所派之夫日給三分而逺者一日七八分次亦不下五六分彼里甲所取辦民巳不勝苦矣事竣之時當事者又多裁削之或遇有衝決輒令復築不復計工夫洪水所衝何堅不破而可令窮民賠償耶以後量從寬處免其扣纍庶幾民忘其勞而稱佚道之使也上允行之八月癸卯先是淮安水利道河南僉事楊化隆淮安府通判王𢎞化治河無狀為總河都御史潘季馴所劾上命錦衣衛逮繫來京至是法司擬各照運炭贖罪例完日復職上以楊化隆王𢎞化都著革職律文官犯私罪杖一百的決該罷職不敘今後但據所犯擬罪送吏部擬處毋得槩擬復職以致輕縱已亥總河都御史潘季馴題徐州小浮橋以上一帶河淺查得河南歸德府新集地方下至徐州二百五十里原係黃河故道欲乘今一併開復巳而工科給事中王道成上言治河而疏上流誠為探本之論然而挽淮流北障河決則其工巨矣動衆八萬費逾八十萬金則其用糜矣工費巳大事之究竟尚有不能逆睹者其砥績則甚難矣胡乃此之未為而欲並開數百里之上河即使諸臣不計勞逸不避利害竊恐國家財用終屬有限萬一漫為而不效將若之何不如揆勢度理就中權緩急而圖之乃為計之得也上命下其章于所司十月丁酉先是總河都御史潘季馴漕運侍郎江一麟交章論徐州道副使林紹治河無狀既而紹揭季馴謂遙隄不當築決口不當塞天妃閘不當閉而徐北雁門北陳一帶淺阻可虞其議相左各相論列部覆紹應罷黜季馴一麟身膺重寄不宜搖惑妄議以替初心上然之著林紹冠帶閒住庚子給總督河漕工部尚書兼都察院右副都御史吳桂芳祭葬尋贈太子少保明神宗實録是年議塞崔鎮口因築遙隄束水衝沙其南岸自三山頭至李字鋪長二萬八千五百五十八丈又自歸仁集築橫隄至孫家灣長七千六百八十餘丈又于桃源縣馬厰城築隄長七百四十丈以遏南奔入淮之勢其北岸自谷山至直河長九千四百六十四丈又自古城至清河長一萬八千四百十丈建崔鎮等滚水石壩四座以緩泛溢之水使不能潰隄而出河流乃安明㑹典任此潘公季馴三總河也吳桂芳字子實新建人嘉靖二十三年進士萬歷三年冬以兵部左侍郎總督漕運兼巡撫鳯陽四年春桂芳以淮揚洪潦奔流唯雲梯關一徑入海至海湧橫沙河流泛溢而興鹽髙寶諸州縣所在受災請益開草灣及老黃河故道以廣入海之路修築髙郵東西二隄以蓄湖水皆下所司議行未幾草灣河工告成是年秋河決曹縣徐州桃源給事中劉鉉疏議漕河語侵桂芳桂芳疏辨曰草灣之間以髙寶水患衝齧疏以拯之非能使上遊亦不復漲也今山陽以南諸州縣水落布種斗米四分則臣斯舉亦既得䇿矣若徐邳以上非臣所屬臣何與焉因請罷御史邵陛言諸臣以河漲歸咎草灣阻任事氣乞䇿勵桂芳益砥厥績而詰責河臣傅希摯曠職從之其明年希摯議塞崔鎮決口束水歸漕而桂芳欲衝刷成河以為老黃河入海之道廷議以二人意見不合改希摯巡撫陜西以李世達代未幾又改世達他任命桂芳兼理河漕六年正月詔進工部尚書兼右副都御史居職如故未踰月卒尋以髙郵湖隄成贈太子少保明史稿先是萬歷三年黃決桃源崔鎮淮決髙堰寶應而山陽髙寶興鹽等處滙為巨浸桃源一帶運道梗阻是時議者謂諸決口當毋塞開支河以殺水而濬海口以通之至是總河侍郎潘季馴行相視以為海口固潮汐之所從來往也隨濬隨􅌎何可濬惟導河歸之海則以水治水導河即以濬海也然河未易以人力導唯繕固隄防使無旁決水入地益深則治防即以導河也今河決上流固宜疏今下流決也欲疾赴海而害祛豈必疏哉于是築髙堰起武家墩經大小澗至阜寧湖以捍淮東侵築隄起清江浦沿鉢池山柳浦灣迤東以制河南溢慮河內衝閘而蝕漕也嚴五閘啓閉獨以待漕艘六月運盡築壩官民船隻由壩車盤沙無內灌自徐抵淮亘六百餘里築南北兩隄蜿蜒相望于是淮畢趨清口㑹大河入于海海口不濬而通南河全考河災之羡溢中國也惟急務修築培髙堰以束淮水造遙隄以束黃流尤當極意經理河南則于家店劉獸醫口黃陵岡陶家店馬家湖銅瓦廂挖泥河煉城口榮花樹芝麻莊等溜山東則楊家口梁靖口毛黃寨王家壩侯家村以其地皆掃灣迎溜湍急先年往往失事故當極意經理之若隄堰既堅河淮安流自能久享其利續文獻通考丁丑萬歷五年河決崔鎮淮決髙家堰橫流四溢連年不治詔晉公為右都御史兼工部左侍郎以往仍敕公總理河漕以一事權漕撫侍郎江一麟副他撫臣境內關河道者皆受約束矢心任事日行兩河間延見吏民三老周爰咨度具得其要領而是時廷臣䇿河事者以百數言人人殊其言海口當疏者近是公謂海口不能以人力疏治而可以水勢衝決計莫如築髙堰塞崔鎮束河淮正流使並趨入海且言天下之事不難治河而難衆口天子下其議大司空幼孜對如公䇿仍假公便宜不中制公乃得行一意集羣力三年畢工凡築土隄丈以億計石隄以數千計塞決口以百計浚運河以萬計閘壩涵洞之屬創以數十計而髙堰之工最巨申時行作潘公季馴傳總河潘季馴上兩河經略疏云據司屬䝉臣牌行看得水性就下以海為壑向因海壅河髙以致決隄四溢運道民生胥受其病故今談河患者皆咎海口而以濬海為上䇿則誠然矣第海有潮汐茫無著足不得巳而議他闢豈知海口視昔雖壅然自雲梯關四套以下闊七八里至十餘里深皆三四丈不等縱使欲另開鑿必須深闊相類方便注放則工力艱巨必不能成矧未至海口乾地猶可施工及將入海之處則潮汐往來亦與舊口等耳且海之舊口皆係積沙人力雖不可濬水力自能衝刷乃若新闢之地則土壤堅實不特人力難措而水力亦不能衝故職等竊謂海無可濬之理惟當導河以歸之海則以水治水即濬海之䇿也然河又非可以人力導也欲順其性先懼其溢惟當繕治隄防俾無旁決則水由地中沙隨水去即導河之䇿也顧頻年以來無日不以繕隄為事亦無日不以決隄為患何哉卑薄而不能支迫近而不能容雜以浮沙而不能久隄之制未備耳是以黃決崔鎮等口而水多北潰為無隄也淮決髙家堰黃浦等口而水多東潰隄弗固也乃議者不咎制之未備而咎築隄為下䇿豈得為通論哉又有所未盡者上流既潰隄以旁決矣至于下流復或岐而分之其趨于雲梯關正海口者譬猶強弩之末耳蓋徒知分流以殺其怒而不知水勢益分則其力益弱水力既弱又安望其能導積沙以注于海乎職等故謂今日濬海之急務必先塞決以導河尤當固隄以杜決而欲隄之不決者必真土而勿雜浮沙高厚而勿惜巨費讓逺而勿與爭地斯隄于是乎可固也如徐邳桃清沿河各隄固矣崔鎮等口塞矣則黃不旁決而衝漕力專髙家堰築矣朱家口塞矣則淮不旁決而㑹黃力專淮黃既合自有控海之勢又懼其分之則力弱也則必暫塞清江浦河而嚴司啓閉以防其內奔姑置草灣河而專復雲梯以還其故道仍接築淮安新城長隄以防其末流盡令黃淮全河之力涓滴悉趨于海則力强且專下流之積沙自去下流既順上流之􅌎墊自通海不濬而闢河不挑而深矣此職等所謂固隄即所以導河導河即所以濬海也猶慮伏秋水發暴漲傷隄職等查得吕梁上洪之磨臍溝桃源之陵城清河之安娘城等處土性堅實可築滚水石壩三座若水髙于壩任其走泄則水勢可殺而兩隄無虞矣至若寶應石隄之當復與夫下流支河之當疏揚州運河之當濬皆今時之切務所宜次第併舉而不可緩者也但前項工程自豐沛徐淮以至海口共長千有餘里自清江浦以至儀真共長三百餘里地勢遙逺工程浩大一時錢糧未措人夫難集除前請發銀二十萬兩并截留漕糧八萬石一面先將豐沛縷隄太行遙隄及徐邳一帶縷隄酌量幫築桃清南隄併接淮安新城長隄乘時創築髙家堰兩頭水勢稍緩先行築塞寶應湖先用樁笆修築土隄外其餘各項工程相應大加修舉者一面請發錢糧調集官夫買辦物料次第興舉務保無虞等因到臣臣即㑹同江一麟躬親督率沿河荒度南遡維揚看得儀真東關歷石人頭揚子橋三汊河直抵髙廟止一帶運河􅌎淺寶應一帶湖隄圮壞黃浦決口淹及數邑髙家堰水射淮揚清江浦長隄卑薄柳浦灣至髙嶺無隄障禦西窮鳯泗看得全淮不下清口日益南徙北抵清桃看得崔鎮諸決水從旁泄一望瀰漫正河􅌎淺徐沛以上崔家口新河淺阻北陳一帶水行陸地僅盈尺餘東抵海口看得新挑草灣尋復􅌎塞今自清口至西橋一帶河流復通但不及故河十分之一自安東以下河身漸廣雖有􅌎淺未復全河然河水東下亦無阻礙隨處患害一一查閲明白去後今據前因該臣㑹同右侍郎江一麟議照事師古者罔愆智不鑿者乃大孟子論智一章首以禹之治水為喻而論為政則曰為政不因先王之道可謂智乎是大智者事必師古而不師古則鑿矣故治河者必先求河水自然之性而後可施其疏築之功必先求古人巳試之效而後可倣其平成之業黃水來自崑崙入徐濟運歷邳宿桃清至清口㑹淮而東入于海淮水自洛及鳯歷盱泗至清口㑹河而東入于海此兩河之故道即河水自然之性也昔元嵗漕江南之粟由揚州直北出廟灣入海至永樂年間平江伯陳瑄始隄管家諸湖通淮河為運道然慮淮水漲溢東侵淮郡也故築髙家堰隄以捍之起武家墩經小大澗至阜寧湖而淮水無東侵之患矣又慮黃河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山柳浦灣迤東而黃水無南侵之患矣尤慮河水自閘衝入不免泥􅌎故嚴啓閉之禁止許漕艘鮮船由閘出入匙鑰掌之都漕五日發籌一放而官民船隻悉由五壩車盤是以淮郡晏然漕渠永賴而陳平江之功至今未斬也後因剝蝕既久隄岸漸傾水從髙家堰決入一郡遂為魚鱉而當事者未考其故乃謂海口壅塞遂穿支渠以泄之蓋欲亟極淮民之溺多方規畫以為疏導之計其意甚善而其心良亦苦矣詎知旁支暫開水勢陡趨西橋以上正河遂至􅌎阻而新開支河闊僅二十餘丈深僅丈許較之故道不及三十分之一耳豈能容受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新開尋復􅌎塞故河漸巳通流雖深闊未及原河十分之一而兩河全下沙隨水刷欲其全復河身不難也河身既復面濶者七八里狹者亦不下三四百丈滔滔東下何水不容若猶以為不足而欲另尋他所别開一渠恐人力不至于此也以臣等度之非惟不必另鑿一口即草灣亦須置之勿濬矣故為今之計惟有修復平江伯之故業髙築南北兩隄以斷兩河之內灌而淮揚昏墊之苦可免至于塞黃浦口築寶應隄濬東關等淺修五閘復五壩之工次第舉之則淮以南之運道無虞矣堅塞桃源以下崔鎮口諸決而全河之水可歸故道至于兩岸遙隄或葺舊工或創新址或因髙岡或填窪下次第舉之則淮以北之運道無虞矣淮黃二河既無旁決並驅入海則沙隨水刷海口自復而桃清淺阻又不足言矣此以水治水之法也若夫扒撈挑濬之說僅可施之于閘河耳黃河河身廣闊撈濬何期捍激湍流器具難下前人屢試無功徒費工料但恐伏秋水發淫潦相仍不免暴漲致傷兩隄故欲于崔鎮口陵城安娘城等處再築滚水壩三道萬一水髙于壩任其宣泄則兩隄可保而正河亦無􅌎塞之患矣徐州以南之工如此而巳或有難臣者曰臣等欲順水性今淮水欲東而乃挽之使北黃水欲北而乃挽之使東無乃水性之未適乎臣曰水以海為性也決水乃過顙在山之水也非其性也或者又曰昔禹治河播九河同為逆河入于海今臣等乃欲塞諸決併二瀆而不使之少殺耶縱有滚水壩僅去浮面之水百一耳亦烏能殺其勢也臣應之曰九河非禹所鑿特疏之耳蓋九河乃黃河必經之地勢不能避而禹仍合之同入于海其意蓋可想也况黃河經行之地惟河南之土最鬆禹導河入海止經郟縣孟津鞏縣三處皆隸今之河南一府其水未必如今之濁今自河南府之閿鄉縣起至歸德之虞城縣止凡五府河巳全經其地而去禹導河之時復三千餘年流日久土日鬆土愈鬆水愈濁故平時之水以斗計之沙居其六一入伏秋則居其八矣以二升之水載八升之沙非極湍急即至停滯故水分則流緩流緩則沙停勢所必至者臣等不暇逺引他證即以近事觀之草灣一開而西橋故道遂􅌎崔鎮一決而桃清以下遂澀去嵗水從崔家口出則秦溝遂為平陸此眼前事也又何疑哉謹題請㫖六議在後河防一覽行水金鑑卷二十九
