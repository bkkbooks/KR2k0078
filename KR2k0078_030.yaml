body:
  text: 行水金鑑巻三十江南按察使傅澤洪撰河水一議塞決以挽正河之水竊惟河水旁決則正流自㣲水勢旣㣲則沙􅌎自積民生昏墊運道梗阻皆由此也臣等查得淮以東則有髙家堰朱家口黄浦口三決此淮水旁決處也桃源上下則有崔鎮口等大小二十九決此黄水旁決處也俱當築塞但伏秋之水相繼而至非惟地為水占無處取土抑且波濤洶湧為工不堅除將決口稍窄者見在分投興築外其決至數十丈以上者一面鳩集工料相時興舉一議築隄防以杜潰決之虞照得隄以防決隄弗築則決不巳故隄欲堅堅則可守而水不能攻隄欲逺逺則有容而水不能溢累年事隄防者旣無眞土𩔖多卑薄巳非制矣且夾河束水窄狹尤甚是速之使決耳合無力鑒前弊凡隄必尋老土凡基必従髙厚又必繹賈讓不與争地之㫖倣河南逺隄之制除豐沛太行隄原址遥逺仍舊加幇外徐邳一帶舊隄查有迫近去處量行展築月隄仍扵兩岸相度地形最窪易以奪河者另築遥隄桃清一帶南岸多附髙岡但上自歸仁集以至朱連家墩古隄巳壞相應修復下抵馬厰坡地形頗窪相應接築以成其勢北岸自古城至清河亦應創築遥隄一道不必再議縷隄徒糜財力及查清江浦外河一帶至柳浦灣止為淮城北隄除埽灣單薄量行加幇外但原基短促防護未周仍自柳浦灣至髙嶺創行接築四十餘里以遏兩河之水盡趨扵海自清江浦運河至淮安西門一帶舊隄相應再行幇厚勿致裏河之水走洩妨運如此則諸隄悉固全河可恃矣一議復閘壩以防外河之衝入運河一議剏建滚水壩以固隄岸照得黄河水濁固不可分然伏秋之間淫潦相仍勢必暴漲兩岸為隄所固水不能洩則奔潰之患有所不免今查得古城鎮下之崔鎮口桃源之陵城淸河之安娘城土性堅實合無各建滚水石壩一座比隄稍卑二三尺闊三十餘丈萬一水與隄平任其從壩滚出則歸漕者常盈而無􅌎塞之患出漕者得洩而無他潰之虞全河不分而隄自固矣一議止濬海工程以免糜費照得海口為兩河歸宿之地委應深闊但查海口原身自清口至安東縣面闊二三里自安東歴雲梯闗至海口面闊七八里至十餘里深各三四丈不等止因去年旁決之後自桃清至西橋一帶􅌎塞尋復通流今雖未及原身十分之一而兩河之水全歸故道並流洗刷深廣必可復舊至云相傳海口横沙并東西二尖據土民季真等吐稱並未望見潮上之時海舟通行無滯潮退沙面之水尚深二尺况横沙并東西二尖各去海口三十餘里豈能阻碍河流故臣等以為不必治亦不能治惟有塞決挽河沙隨水去治河即所以治海也别鑿一渠與復濬草灣徒費錢糧無濟扵事一暫寢開老黄河之議以仍利涉照得黄强淮弱每每逼淮東注故議者欲復老黄河故道冀使黄水稍避髙堰民墊可瘳斯亦得䇿但勘得原河七十餘里中間故道久棄無論有水無水之地詢之居民俱失其真無從下手一不便也且巳棄故道欲行開復必須深廣與正河等乃可奪流今見存大河口窄狹不及桃清三分之一而三義鎮入口之處背灣徑直猶恐水未必趨二不便也又其中流如魚溝鐵線溝葉家口隂陽口等處地勢卑窪諸決之水漫流至此一望瀰茫築隄費鉅且恐難保三不便也况今桃清遥隄議築則黄水自有容受崔鎮等決議塞則正河自日深廣髙家堰議築則淮水自能㑹黄清江浦等閘議嚴啟閉新城北隄議行接築則淮安髙寶興鹽等處自無水患此河雖不必復可也部覆奉㫖這治河事宜旣經河漕諸臣㑹議停當依擬都準行著他們悉心著實興建永利各該經委分任人員如有玩愒推諉虚費財力者許不時挐問叅治其未盡事宜及臨時事勢或與原議不合的也著陸續奏聞務求有益應用錢糧你部裏㑹户部上𦂳議來又上河工事宜疏云臣㑹同江一麟議得工役繁興料理宜預官夫蝟集調度須周若不先為申明未免臨事舛錯除兩河疏築之議另行具陳外所有一二事宜不得不上煩聖聽者敬列條款擬議上請一議支放照得鳩工聚材出納甚𤨏收掌銷筭頭緒頗多稽覈不嚴必滋冒破臣與撫臣百責攸萃兼以閱視不常無暇躬親經理合無比照昔年邳工事例將請發銀兩俱解淮安府貯庫各工應給工食應買物料府佐等官開數赴各該分督司道官覈實給票付兩淮巡鹽衙門覆覈掛號方許闗支每季終該府將票𩔖送巡鹽衙門比對號印數目相同發回附巻通候工完𩔖覈造冊奏繳如有姦弊按法追究庶臣等得以專心河工而錢糧亦易扵清楚矣一議分督照得河工浩繁道里遥逺若非多官分理不免顧此失彼分工之後錢糧出入工程次第皆其首尾遇有陞調等項若聽其離任則本官所分之工又須另委補替文移往來便至逾月及到工所茫然無措何以望其竣事而厎績也合無俯念河工重大如遇前項相應離任官員容臣等暫留完工稽其勤惰别其功罪請㫖處分方得離任庶人心專定覬覦不萌而事易責成矣一議責成照得州縣正官職專親民故民易驅而事易集也奈何相沿之弊視河患如秦越視管河官如贅疣即以分司部屬臨之蔑如也妨工僨事實由扵此目今大工肇興諸務叢挫若非責成各掌印官鮮克有濟合無興工之後一應派撥夫役買辦物料俱以責之各掌印正官躬親料理仍選委賢能佐貳管押夫役赴工不許將隂醫等官搪塞如有仍前玩愒派辦失宜以致夫役逃散物料稽遲該工司道官即時叅呈以憑奏治事完之日仍與管理河工諸臣一體分别題請施行庶事權歸一人無推避而大工自易矣一議激勸照得各工委官除府佐縣正外其州縣佐貳府衛首領及雜職隂醫義民等官或管領人夫或措辦樁埽或運取甎石或打造器具衆務紛紜如臂使指但各官出入泥淖櫛沐風雨艱辛畢萃殊可矜憫有功而薄其賞誤事獨重其罰此人心之所以懈弛而事功之所以隳墮也合無工完之後容臣等逐一精覈如有實心任事勞苦倍常者俯賜破格超擢中間間有劣陞王官等項準與改擢其隂醫等官原有部劄冠帶者厚加奬犒如係義民準照題給冠帶榮身仍與隂醫等官一體免其本等差徭庶人心争奮而百事易集矣一議優䘏各工夫役計工者每方給銀四分計日者每日給銀三分而本籍本户幇貼安家銀兩有無聴従其便兹亦不為薄矣但貧民自食其力衝寒冒暑暴風露日艱苦萬狀縦使稍從優厚亦不為過合無每夫一名扵工食之外再行量免丁石一年容臣等出給印信票帖審編之時許令執票赴官告免州縣官抗違許其赴臣告治如此則惠足使民民忘其勞矣一議蠲免照得淮揚河患頻仍民遭昏墊稱最苦者如淮安所屬山陽清河桃源宿遷睢寧安東鹽城鳯陽所屬泗州揚州所屬興化寶應徐州所屬蕭縣十一州縣者一望沮洳寸草不長凋敝極矣適今大工興舉用夫頗多舍近取逺鄰封未免有詞而此中流移貧民亦賴做工得食少延殘喘應派夫役旣不容巳應輸賦稅復加責辦實為繁苦合無軫念災極民窮姑將前十一州縣本年見徴夏秋起運錢糧特蠲一半行臣等揭示通知俾催科少寛人樂趨役一議改折照得大工肇興費用不貲帑藏虚空旣難搜括閭閻窮苦又難加派臣等反覆思維無可為處萬不得巳輒有非分之請而非所敢必也臣等竊聞太倉之粟可備八九年之食積愈久則粟愈朽故官軍之情有不願本色而願折色者稍加變通未為不可合無暫將今嵗漕糧除淮北及河南山東照舊兌運外其淮南并浙江等省姑準改折照例正兊每石連耗米輕齎折銀七錢改兊每石連耗米折銀六錢即以五錢給軍正兌尚餘銀二錢改兌餘銀一錢兌運停止官軍應得行月糧俱可免給以正額解京而以餘銀并行月糧留發河工支用總計可得九十餘萬兩以運軍應得之數而濟國家大工之需在内帑無支發之煩在閭閻無徴派之苦在朝廷為不費之惠在河工免缺乏之虞而在工諸臣亦得悉心疏築可無顧此失彼之慮所謂兩利而俱全者也臣等非不知近該科臣建議奉有明例但錢糧浩繁時當詘乏舍此則惟有請發内帑耳故敢冒昧陳凟伏望敇下該部再加查議如可允行河工幸甚臣等幸甚一議息浮言臣等竊惟治河固難知河不易故雖身歴其地猶苦扵措注之乖舛而况扵遥度乎但勞民動衆之事怨咨易興而往來絡繹之途議論易起至扵將迎之間稍稍簡略則以是為非變黑為白者亦不可謂其盡無也憂國計者以急扵望成之心而偶聞必不可成之語何怪乎其形諸章牘也而不知當局者意氣因而銷沮官夫遂生觀望少為摇奪隳敗隨之勉强執持疎逖難達其苦有不可言者伏望皇上俯垂鑒照容臣等殫力驅馳悉心料理寛臣以三年之期如有不效治臣以罪部覆奉㫖河工事重必須委任責成乃可期效今後分督司道及承委等官都著潘季馴等開送吏部暫停陞調通候河工完日總論功罪大行賞罰若有才幹不相宜的即便遴𨕖具奏更調推諉誤事的不時叅奏處治毋得避怨姑息自誤大事其各委官賢否但以該管河道官為主别道俱不許干預其餘俱依擬又上黄流艱阻疏云黄河來流艱阻後患可虞乞恩速賜查議以圖治安事竊惟今之談河患者莫不曰徐邳河身墊髙水易溢也崔鎮諸口未塞桃清淺阻也髙堰黄浦淮水横流淮揚之民久為魚鼈也淮黄兩河之水漫無歸宿海口沙墊也此徐州迤南之患耳目之所覩記運道之所必資故人人得而言之也臣等巳扵前月二十八日具題陛下俯従臣請兩年之内或可脫淮揚昏墊之苦免運道梗阻之虞而臣等亦得藉以少逭愆尤矣然其大可憂者不在此也臣等與司道諸臣計之故河之復其利有五河從潘家口出小浮橋則新集迤東一帶河道俱為平陸曹單豐沛之民永無昏墊之苦一利也河身深廣受水必多每歳可免泛溢之患虞夏豐沛之民得以安居樂業二利也河従南行去㑹通河甚逺閘渠可保無虞三利也來流旣深建瓴之勢導滌自易則徐州以下河身亦必因而深刷四利也小浮橋之來流旣安則秦溝可免復衝而茶城永無􅌎墊之慮五利也臣等以為復之便至扵復故道難仍新衝易復故道勞仍新衝逸則臣等計之熟矣然舍難就易趨逸避勞慮日後未可必之身謀而不惜將來必致之大患皆非臣等之所以盡忠扵陛下也臣等勘議之後即擬具題但因伏水將發猶望水勢洶湧或可衝刷成渠近又行據同知王琰回稱勘得北陳等處原深一尺六七寸者今止深七八尺臣等看得伏秋暴漲之時水増六尺有餘則客水消落之後不免仍存本體矣伏望敕下該部查議上請特差素識水性科臣一員前來候秋深水落與臣等㑹同山東河南撫臣及兼理河道巡鹽御史躬親勘議如果可復即便估計錢糧㑹本題請早賜施行地方幸甚奉㫖工部知道河防一覽明神宗萬歴七年正月戊辰工科給事中王道成言兩河修築遥隄未成徐邳舊隄宜守查萬歴四年該河臣傅希摯議設隄夫三千七百名每三里建一鋪一里用十人而使管河官晝夜分督水消則隨處幇修水發則併力防塞此亦支持終歲長計其後官夫不復省視遂貽河決之害宜扵舊隄按鋪責成防守従之三月戊申巡按直隸御史陳世寶條陳治河䇿約一移建管河官衙舍要害之地責其晝夜防守一添設新隄堰夫役入運河一増築宿遷縣遥隄宿遷縷河雖有隄岸而侍丘諸湖尚未修築遥隄倘伏秋河漲必遭水患乗時修築誠不可緩一暫寛流移民錢糧民遭水患流移者半幸水去田出漸為歸計但恐居處未遑而舊逋即迨開墾未熟而新課復徴矣捐金治水以為民也今水患漸平而顧以逋負阻絶歸路乎一乞廣築役賞勞扵工食外動支河工羨銀量行犒賞奏上命酌議覆行甲子户部題淮揚地方自隆慶四年以來黄水衝決今築隄就緒水落田出尚屬荒蕪當此流民新集尤宜寛䘏將萬歴六年以前舊欠錢糧盡行蠲免七年以後酌議再免三五年至扵處給牛種加厚貧丁及一切優䘏事冝聴督撫官便宜施行仍悉心體察毋使被災之民横被苛追無災者乗機影射従之七月戊申工部題直隸巡按御史姜璧所陳河工五事一曰一事權將裁革河道明㫖著為令甲而扵撫臣兼御管理河道一曰嚴責成欲將河工專屬府州縣掌印官督同管河官協理如有疎虞一體叅治一曰議支河恐支河一開徒引海潮不惟鹽水淹田民不可耕且河水隨潮洩去商日以困宜即停止一曰修古隄恐范公隄一鑿淡水出灌鹽地而鹽課消薄潮水入汊民田而田租減損尤宜仍舊修築俱依擬行是日工科給事中王道成亦以霖雨不止河水暴溢慮恐河工垂成不無衝壞請督河臣隨地備查及時修築而總理河漕潘季馴等亦奏桃源清河水患議併力疏導作急捍禦俾水勢無致濫行疏上報可十月已丑有議欲開復故河巡撫周鑑巡按蘇民望等題謂開復新集議有三難財用不敷其難一民力不堪其難二且時浚時􅌎其難三至扵北陳一帶疏浚難扵措手惟當各守隄防設官扵豐揚徐沛㑹山東河南協修行縷二隄俾茶城以北無衝決之虞而濁河小浮橋聴其分流無妨濟運部覆依擬行丁酉上以兩河工成賞總督河道官潘季馴江一麟等銀幣有差仍差科道官勘實以聞明神宗實録總河潘季馴河工告成疏題為恭報兩河工成仰慰聖衷事竊照我朝建都燕冀轉輸運道實為咽喉自儀真至淮安則資淮河之水自清河至徐州則資黄河之水黄河自西而來淮河自南而來合流扵清河縣之東經安東達雲梯闗而入扵海此自宋及今兩瀆之故道也數年以來崔鎮諸口決而黄水遂北高堰黄浦決而淮水遂東桃清虹泗山陽髙寶興泰田廬墳墓俱成巨浸而入海故道幾成平陸臣等受事之初觸目驚心所至之處孑遺之民扳輿號泣觀者皆為隕涕然議論紛起有謂故道當弃者有謂諸決當留者有謂當開支河以殺下流者有謂海口當另行開濬者臣等反覆計議弃故道則必欲乗新衝新衝皆住址陸地漫不成渠淺澀難以浮舟不可也留諸決則正河必奪桃清之間僅存溝水淮揚兩郡一望成湖不可也開支河則黄河必不兩行自古紀之淮河泛溢隨地沮洳水中鑿渠則不能别尋他道則不得况殺者無幾而來者滔滔昏墊之患何時而止不可也惟有開濬海口一節扵理為順方在猶豫而工部移咨叮嚀臣等親詣踏看臣等乃乗輕舠出雲梯闗至海濵延袤四望則見積沙成灘中間行水之路不及十分之一然海口故道則廣自二三里以至十餘里詢之土人皆云往時深不可測近因淮黄分流止餘涓滴入海水少而緩故沙停而積海口淺而隘耳若兩河之水仍舊全歸故道則海口仍舊全復原額不必别尋開鑿徒費無益也臣等乃思欲疏下流先固上源欲遏旁支先防正道遂決意塞決以挽其趨築遥隄以防其決建減水壩以殺其勢而保其隄一嵗之間兩河歸正沙刷水深海口大闢田廬盡復流移歸業禾黍頗登國計無阻而民生亦有賴矣蓋築塞似為阻水而不知力不專則沙不刷阻之者乃所以疏之也合流似為益水而不知力不𢎞則沙不滌益之者乃所以殺之也旁溢則水散而淺返正則水束而深水行沙面則見其髙水行河底則見其卑此旣治之後與未治之先光景大相懸絶也每歲修防不失即此便為永圖借水攻沙以水治水臣等䝉昧之見如此而巳至扵復閘壩嚴啓閉疏濬揚河之淺亦皆尋繹先臣陳瑄故業原無竒謀秘䇿駭人觀聽者偶倖成功殊非人力實皆仰賴我皇上仁孝格天中和建極誠敬潜孚而祇靈助順恩威並運而黎獻傾心念轉輸乃足國之資軫昏墊切儆予之慮宵旰靡皇絲綸屢飭其始也併河漕以一事權假便宜以任展布故臣等得效芻蕘之言其旣也逮媮惰以警㝠頑折淆言以定國是故臣等得竟胼胝之力俯從改折之議國計與民困咸紓特頒賞賚之仁臣工與夫役競勸致兹無兢之功遂成一嵗之内今兩河烝黎歌帝徳而祝聖壽者且洋溢乎寰宇矣臣等何敢貪天功以為已力哉謹將完過工程總數開坐請㫖奉㫖該部知道河防一覽明神宗萬歴八年二月乙亥工科給事中尹瑾踏勘河工完將築堰建閘入海處繪圖以進因附奏黄淮之形勢實闗國家之命脈如知其為祖陵之密邇則思培護之當嚴知其為京師之通津則思疏浚之當豫知漕運闗乎國用則思河務之當修知壤地切乎民生則思保障之當急知堰隄之綿亘則思上流之當防知壩閘之布列則思下流之當洩觀今日之順軌當思昔日之横流觀土功之艱鉅當思保守之不易擇人以重其寄久任以責其成歳修以績其工綜核以稽其實言俱切至上留覽之戊戌河工告成工部開敘効勞諸臣上降旨褒賚之加總河潘季馴太子太保陞工部尚書兼都察院左副都御史廕一子陞總漕江一麟都察院右都御史兼户部右侍郎各銀幣同季馴賜敕奬勵加漕運總兵靈壁侯湯世隆太子太保先任山東巡撫趙賢户部尚書張學顔工部尚書曽省吾等俱陞俸級賞銀幣有差三月甲辰以河工告成命太常寺屬官賫告文香帛付總理河漕等官祭告大海河淮之神乙已工科給事中尹瑾陳河工善後七款一重大臣以便責成凡管河諸臣遇三六年考滿者宜加銜管事俟資俸最久績效最著破格超擢應補者即就近遴𨕖一定法制以核歲修令管河司道每嵗嚴督各該管河官率領守隄官夫將各遥隄加幇髙厚兼栽柳葦修緝閘壩年終管河郎中㑹同該道覈驗開報三年遣官一閱視一甃石堰以固要衝入淮河一復閘河以利運艘入運河一防徐北以固上流徐北黄河舊由蕭縣出小浮橋入運小浮橋河深近洪能刷洪以深河實利運道嘉靖四十五年河決邵家口出秦溝入運秦溝河淺近閘每積􅌎以塞河實害運道今幸復趨小浮橋且議修築行縷二隄為之捍禦而邵家壩為秦溝舊口亦宜倍加修理以絶秦溝上流然有隄不守與無隄同今徐北至單縣界現修隄壩長一百五十餘里而夫役止七百餘名其何能濟宜照徐南事例每里補足十名以備修守一備積貯以裕經費河道錢糧山東河南額派原多南直河道起豐沛至淮揚延袤千有餘里淮以北則黄河洶湧淮以南則湖水瀰漫葺修防守費用浩繁及查歲額樁草銀兩僅二千有竒加以連年災沴每歲征收不滿數百安能支持千里之河宜從長計議或河南山東河道銀兩或運司挑河鹽銀或徐淮各處鈔稅或撫按贓罰多方措處每歲共湊銀三千兩為定額解貯淮安府庫專備兩河修守之費部臣酌議覆請上從之閏四月乙已以河工告成分别效勞諸臣擬加陞工部郎中佘􅐧中等級銜得旨令後凡奉特旨以功陞級及添注管事各道遇有員缺不論資俸即便推補以副朝廷覈實勸功之意丁未改張純為山東按察使整飭徐州等處兵備純原為水利副使以河工成陞二級為按察使其原管水利事務併歸徐州道六月辛酉吏部以總督漕河員缺㑹推山西巡撫髙文薦四川巡撫張士佩上以河漕職任繁重宜用重臣乃命凌雲翼以兵部尚書兼都察院右副都御史往同潘季馴經理未盡事宜尋改季馴為南京兵部尚書仍令候九月間水落事寧具奏赴任管事明神宗實録行水金鑑巻三十
