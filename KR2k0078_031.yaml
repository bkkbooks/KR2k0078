body:
  text: 行水金鑑巻三十一江南按察使傅澤洪撰河水萬歴八年總河潘季馴覆議善後疏題為河工告成敷陳善後事宜以圖永利事該工科右給事中尹瑾條陳具題工部覆奉欽依備咨到臣準此除將款開定法制專責成二事應欽遵者通行濵河有司掌印管河官著實舉行外其重乆任甃石堰等五事應議覆者已行司道㑹議詳報前來逐一虚心計處覆議相同堪為永利似應依擬合照款列具陳謹題請旨一重乆任以便責成先該給事中尹瑾題該工部覆議河道關係最重𩔖非可以穿鑿於聰明勾幹於倉卒者全在得人任乆乃可責成及要大小官員俱令乆任或考滿加陞或積勞超叙與夫就近遴補交代親承最為治河先務合咨吏部查照隆慶六年題奉明旨都著乆任事理凡管河部屬司道及府州縣佐貳等官果有熟諳機宜懋著積效者考滿即與陞級照舊管事資深即與超遷用勸異勞有缺就近遴補取其濡染習熟臨行新舊交代令其傳告精詳至於待異等者一如待邉臣由道而撫由撫而督由督而本兵不恡焉合咨臣等年終薦舉預儲可代之才遇缺揭咨必求因才而代徑咨吏部仍知㑹本部以慿㑹同遵行其有才志庸劣及不候交代輒先離任者聽其不時奏劾更易究懲母或拘攣貽誤大計等因行據司道等官議報前來該臣等覆議為照治河固難知河不易部科首以乆任交代為言誠為永頼至計除薦舉賢能汰黜不肖容臣等欽遵著實奉行外所據新舊交代一節管河大小官員地方有難易職掌有緩急再須分别明白庶免臨時掣肘如中南北三管河郎中夏鎭南旺二主事皆係專職俱應交代無容别議外至如徐州海防潁州天津霸州大名臨清七兵備則有兼管河道之責山東河南二副使則有專管河道之責但潁州臨清天津霸州大名五道或距河稍逺或閘渠晏然雖兼河道干係頗輕似應俱免交代其徐州海防二道則為河湖喫𦂳之區山東河南二道則為黄河要害之地四道憲職并其所轄府州縣佐貳管河官如遇陞調去任等項與同各管河分司俱應比照廵撫衙門事例守候交代仍須咨行吏部知㑹凡遇各官陞調去任即便就近推補勒限赴任使舊者得免乆候之苦文憑期限明開交代之日方行計筭使舊者得免違限之愆如不候代輒先離任者容總理河漕衙門查照工部題準事例指名叅奏伏望敕下該部再加查議擬議上請行臣等遵奉施行則人情既便政體畫一而河務聿興矣一甃石堰以固要衝入運河一濬閘河以利運艘入運河一防徐北以固上流先該給事中尹瑾題該工部覆議得全河之勢下流安則徐以南無淺阻之患上流順則徐以北無改徙之虞今南河可以無慮獨徐北未可忘偹合咨臣等除行縷二隄遵照原題興工幇築外其徐北豐沛碭山一帶宜大修隄工以防上流決徙邵家等壩宜併力原築以斷秦溝舊路及縷隄有水埽根去處俱要幇築守隄夫役每里補足十名工食或於山東河南停役銀内觧募或攤派廬鳯揚三府或將洪夫仍舊徭徵而以徐州船稅召募夫役議擬上請至於量地建鋪安插各夫召民居集免派隄租人自為守允稱長便等因行據司道等官議報前來該臣等覆議照得徐北黄河乃運道上源關係尤重今河出小浮橋固能刷洪以深河而徐南一帶決塞隄成水無旁溢河身益深掣水愈駛矣但徐北新衝崔家口上下尚非故道萬一北決則上而閘河不免泛濫之患下而徐邳一帶不免淺涸之虞臣等是以有來流艱阻乞恩查議之請也今該科議將徐北隄壩加意修築并議増夫防守誠為愼重上源至計查得徐北行縷二隄先該臣㑹同各撫按題準大修巳督各官夫見在幇築此外如華山戚山一帶原衝沛縣故道俱倍幇髙厚足恃無恐先年碭山隄根水掃成河近俱另築月隄以為保障而又於碭單接界之所刱築順水斜壩長一千餘丈以截流䕶隄捍外衛内見今伏水止是漫至壩根即順壩歸河不復浸及縷隄至於豐縣邵家大壩乃遏絶秦溝舊口最為喫𦂳今將正壩一百四十餘丈幇厚八丈髙一丈一二尺不等又於壩東添築二百餘丈壩西幇築九百餘丈以防其旁衝而上流蘇許二壩亦俱次第加幇秦溝之患似可杜絶但自碭山以至茶城共隄一百五十五里有奇而修守夫役共止七百二十名委不敷用合無量照徐南事例每里派夫八名共該夫一千二百四十名除巳有七百二十名外仍該添夫五百二十名每名工食銀七兩二錢共該銀三千七百四十四兩查得廬鳳揚三府近年除邳隄夫巳派協濟似難再加又蕭縣因萬歴五年黄河衝漫災傷特甚原編洪淺等夫暫議停編四百餘名今閭閻生氣初回尚難議復合候三二年之後民稍殷阜另議編徵前項増夫工食合於後開議請積貯銀内每歲按季支給其畫地建鋪一節亦應比照徐南每三里建鋪一座以便各夫棲止仍通行各州縣示諭附近居民及復業之人聽其結廬隄上俾人自為守不許輒派隄租以阻受㕓之念但嚴禁牲畜作踐務期保䕶隄工庶沿隄皆夫上源可固而北徙之患自除矣一備積貯以裕經費先該給事中尹瑾題該工部覆議得河道起自豐沛至於淮揚延袤千有餘里以葺修則工料浩費以防守則用度鉅艱乃徒恃歲額不滿數百之銀而支持千里之河道坐視大壞極敝而後請發内帑似為失計見今估修徐北隄工及包砌髙堰石隄所費不貲原剰錢糧四十四萬有奇即使盡留尚未足用宜多方措處約每歲三萬兩積貯淮安以便支費合咨臣等從長酌議或應再行奏請或徑自措處等因行據司道等官議報前來該臣等覆議照得防河之法全在固守隄岸而隄岸止是土築原非鎔鐡而成者河流之汕刷雨水之淋漓人畜之踐踏能保其不損乎嵗修之工必不可缺則工料之費必不可少故積貯實治河第一義也今自徐屬以至揚州一千三百餘里而取給於歲徵災逋數百之銀是所謂無米而炊空拳而搏雖有智者其何能濟每歲一遇水患袖手張目坐視其敝盖由此也近者大工肇興仰荷皇上俯從改折之議在公帑無虧額之虞在閭閻無加派之苦以不費之惠成最繁之工實皆廟筭主持之力也然事莫難於守成患恒弭於有備故臣等於告成之後惓惓以乞留大工餘剰銀料以備每歲修防支費蓋誠慮及於此也今徐北大修行縷二隄巳估用五萬一千有奇加以議甃髙堰石隄必將大工餘銀盡數支銷亦未足用然則預為後日修防之備者容可緩乎但臣等反覆思維若欲派之濵河四郡之疲民則積災孑遺力有不堪若欲派之各省四百萬之漕糧則所在加賦勢又不可欲再以餘鹽贓罰為請則巳經工部咨議未䝉戸部準留似難再凟查得萬歴五年該戸部題覆淮揚撫按㑹題為仰體皇仁亟處荒蕪要區開地利以厚民生事内稱徃年凡遇挑河等役每引帶徵鹽銀以濟工用議將淮南北共九十萬引每引許商人帶鹽六斤赴掣毎斤徵銀五釐并隨餘鹽銀兩上納另項貯庫計每嵗帶徵銀二萬七千兩以濟墾田之費原議至萬歴八年住支查得前項帶徵銀兩徃嵗原供挑河之用不係解部濟邊之數委應徵解河工備用隨該臣等㑹同廵鹽御史姜璧面議得行鹽地方有限若仍照原議墾田之費每歲徵銀二萬七千兩或有未便合無行令兩淮運司自萬歴九年為始每引止帶鹽四斤每斤徵銀五釐計每歲止帶徵銀一萬八千兩解淮安府貯庫聽兩河歲修之用俟積貯稍裕又行停徵數年若支用將匱仍舊徵貯夫銀以挑河為名今自儀眞至邳徐一帶行鹽之河旣於河臣任之則此項銀兩亦係應撥之數非於分外増益也此外别無措處更望軫念徐淮為運道經行之地實為天下襟喉而修河大計原為轉運糧儲戸工二部似屬一體特賜破格議處除山東歲額不多難以協濟外合無於河南河夫銀内每歲量裒六千兩再將揚州淮安二鈔關并徐州倉分司所抽税銀每處各量留二千兩并前帶徵鹽銀共足三萬之數俱解淮庫以濟河工若或再損實難措手伏望敕下該部覆議行臣等遵奉施行其該科原題要令濵河要地俱各建設料厰每歲秋冬之間即行預積明歲修防之具司道置立循環稽考收放總理憲臣歲終奏報夫物料旣備則臨事無縮手之患稽查既嚴則平時無冒破之虞容臣等通行申飭逐一興舉無容别議均乞聖裁奉旨工部知道該工部覆議揚州淮安徐州三分司每年各準支稅銀一千兩河南河夫銀六千兩之外又加三千兩每年共支銀九千兩大工餘剰銀準留一半其餘覆議相同奉旨這河工善後事宜既巳議定著凌雲翼督率各官著實修舉以終前功餘剰解部銀都著留用却要支費明白毋容茍且冒破其餘俱依擬又覆議河工補益疏題為恭覩河工垂成尚有可言懇乞聖慈俯賜亟行以少圖補益事備仰各司道㑹同即將條開事宜逐一㑹議要見移建衙舍作何建設守隄官夫作何増添工食錢糧動支何項庶免分派小民其宿遷遥隄踏勘地形要害斟酌事體緩急如應増築即估計工費錢糧應用數目逐一覆加詳議款列具陳謹題請旨一移建管河官衙舍以重責成一添設新隄堰夫役以便防守一添設管隄官部夫以保新工上三條因今昔異宜故不錄一増築宿遷縣遥隄以順民情先該御史陳世寳題該工部覆議咨行臣等委官前去宿遷一帶地方逐一踏勘如遥隄接築果於民生漕運兩便不妨酌估具奏擇暇舉行等因行據司道等官踏勘議報前來覆該臣等看得濵河郡邑俱因築有遥隄永除昏墊之患獨宿遷傍湖無隄不免向隅之泣情委可矜但該縣北岸自直河至古城一帶從來不議築隄者正以本處為駱馬待丘諸湖停蓄之所湖外馬陵諸山蟺蜿環抱天然遥隄水無他泄不能奪河而水發之時河湖相通縈廻展轉水勢稍得舒緩即漢賈讓所謂使秋水得有所休息游波寛緩而不廹也且山東䝉沂諸水俱由此湖入河若一㮣接築遥隄則河水無所停蓄而下流難受益多潰決之虞湖水不能外出而淹浸愈廣反増胥溺之患耳今據各司道議於直河官隄頭起至王珣地頭止約二十里舊有民間自築小隄每歲三四月間水發尚小若此隄無恙則麥亦有秋如伏秋水漲至有殘缺合行該縣掌印管河官每歲冬春間督率本地民夫或量撥徭夫協助修補此於漕河固無損益而於民生亦有裨補矣伏乞聖裁奉旨工部知道本部覆議相同題奉旨是又計議河工未盡事宜疏題為遵奉明旨計議河工未盡事宜事查議得先年淮北一帶惟恃縷隄束水太廹卑薄雜沙每年伏秋泛漲決口不下數十決愈多則水愈散而沙愈停沙愈停則河愈髙而決愈甚海口衝刷無力遂致淺狹以故徐吕而下兩岸田廬溢為巨浸桃清運道僅同一溝運道民生敝壞極矣幸頼廟堂堅持獨斷部院協心經理自萬歴六年興工以來大小決口悉皆築塞自徐抵清除中間原有髙阜可恃外餘俱創建遥隄然又慮異常暴漲遥隄或亦難容故又於桃清北岸崔鎭徐昇季太三義鎭等處建減水壩四座使得宣洩入湖免傷隄址告成之後又開復邳州北岸直河一道而䝉沂諸水徑出大河開復宿遷南岸小河一道而靈睢積水漸巳消減近又查得沂河毛墩各涵洞一座應改減水壩見在興工若徐州以上茶城口為清黄接㑹之所自改行新河以來地勢中亢泉水力弱每歲運艘過盡之後黄河大漲之時或不免數日淺澀先經題準三年兩挑至期本司照例請挑無容再議是自徐抵清五百餘里之間所以𨗳黄入海為運道民生計者亦可謂算無遺䇿矣以故水力既專奔流迅駛淤沙日滌河身日深海口一帶今歲倍加深闊此皆河淮合流衝刷之明效也所據淮北河工職等再四籌維委的别無未盡若欲勉强搜索恐徒糜費無補惟有遵照部科題奉欽依事例每歲責成掌印管河官將遥隄應幇處所歲加幇築縷隄要害之處隨宜量修所謂乆安長治之道似不出此合行㑹呈具報施行奉旨工部知道河防一覽張養蒙為工科都給事中時都御史潘季馴奏報河工養蒙上言曰二十年來河幾告患矣當其決隨議塞當其淤隨議濬事竣輙論功夫淤決則委之天災而不任其咎濬塞則歸之人事而共蒙其賞及報成未乆懼有後虞急求謝事而繼者復告患矣其故皆由不乆任也夫官不乆任其弊有三後先異時也人巳異見也功罪難執也請倣邉臣例増秩乆任斯職守專而可責成功帝深然之明史稾明神宗萬歴九年五月乙亥戸部題覆鳯揚撫按凌雲翼等奏稱淮安府屬安東縣治濵臨河海嘉靖間河決草灣口水勢直趨該縣田土湮没後雖築塞冷沙淤積不長五穀前廵撫呉桂芳有廢縣之議今兩河工完草灣口漸復淤塞而士民安土重遷俱不願廢况該縣鹽盗充斥廢縣必須設兵反滋多事縣治仍舊存留惟一應差糧須破格優處乞嚴敕該縣掌印治農等官用心撫綏設法招復勿濫準詞狀以生騷擾勿過索供費以肆誅求如三年之内民安地墾縣官疏薦擢用不職者即行叅處疏入允行七月壬戍朔總督漕運凌雲翼言茶城至留城一帶運用咽喉節因黄水倒灌停淤漸髙運船率多淺阻巳督行司道興工挑浚乞照往年事例暫停進貢船隻支用錢糧俟工完核實具奏章下所司明神宗實錄明神宗萬歴十年正月壬午戸部覆鳯陽廵撫凌雲翼題淮安府屬東安縣原額六十一里徐州屬蕭縣四十六里沛縣三十八里邇因黄河變遷地失人逃議併安東縣為四十里蕭縣三十七里沛縣三十里仍嚴督各縣官查明見存人戸照軍民匠竈原籍歸附里甲當差塡注賦役冊内永為遵守報可明神宗實錄是年七月河漲壞民田舍及傷人畜無數清河縣志明神宗萬歴十一年正月辛未浚韓家口引渠出徐州以河防報竣陞碭山縣知縣劉守謙俸一級二月辛卯以總督漕運兼管河道太子少保兵部尚書兼左副都御史凌雲翼為兵部協理京營戎政四月巳亥金州大雨河溢城盡没明神宗實錄是年徐蕭河溢大水衝没符離橋蕭縣志明神宗萬歴十二年六月已酉漕運總督李世逹言河工告成敷陳善後事宜下工部九月戊寅漕運總督李世逹題黄河日進乞修砌郡城石隄以圖永頼章下工部明神宗實錄明神宗萬歴十三年五月丙戍廵撫鳯陽兼河道右侍郎王延瞻奏鳯淮揚三府徐泗等八州縣頻年災沴河役煩興請自今年始備用馬價俱照萬歴九年事例派徵閏九月戊戌起兵部右侍郎楊浚民為戸部右侍郎總督漕河軍務廵撫鳯陽明神宗實錄是年河決范家口時淮城幾為魚鼈亟議修築淮安府志明神宗萬歴十四年十一月辛亥廵撫寧夏都御史梁問孟題近因横城堡修築邊牆石砌馬頭兼之河西地軍西徙衝決則寧夏之境不免黄河之患矣欲於西岔河一帶築隄障水俾漸東流工部議覆從之明神宗實錄是年五月河決范家口水灌淮城全河幾奪又決天妃壩福興漸淤上厪宵旰遣科臣常居敬督塞之續又加築范口石隄全河復故南河全考是年五月十九日郡城東范家口衝決禾稼莊舍盡沉淮安府志北范家口離城十五里與劉伶臺毘連東近南灣澗及栁浦灣西近溝頭菊花莊南近石塘萬歴間為黄河險汛今為民田矣明神宗萬歴十五年正月戊戍刑科給事中李國士上言先年河決桃源崔鎭口等與髙家堰黄浦淺諸處徐邳間俱成巨浸頼舊總河臣潘季馴創建遥隄修閘壩築堰口導氾濫東歸雲梯關入海五六年來無水患頃秋水霪潦横流河決范家口凡百餘丈諸臣用力葺塞稍得緩流可用決排之力若春漲波濤洶湧新塞之口必決值糧運未過之日深為可憂非嚴飭該衙門官員乗時修治不可上曰河渠歲修先年漕臣題有舊例著該衙門嚴督所屬用心毋得怠弛二月乙亥總督漕運廵撫楊一魁奏淮安自新河永清閘越城歴髙堰逹清口遡清江出草灣繇赤晏廟以至安東復繇髙嶺馬家湖蒯家窪張家窪栁浦灣范家口海神廟禮字壩遺惠莊臨淮莊以至西橋往回四百餘里河勢有曲折地形有髙下隄防有緩急數年以來隄潰於衝激地易於陵谷昏墊之後下民其魚待決一口方修一口不惟錢糧糜費無紀而運道所關皇陵所護民生所係匪細務也今議清河上黄河獨行隄制無虞清河下黄淮合流水漲隄微計今查前項工程雖用至七萬餘兩而淮揚百萬生靈可免胥溺之患其召募人夫擇日興工估該實用工費銀七萬一千六百九兩零將淮安府庫貯修砌歸仁隄支剰銀料八千兩工部事例銀二萬二千兩盡數動支而施為之功一曰修髙家堰以保上流一曰砌范家口以防旁決一曰疏濬草灣以殺河勢一曰修禮字壩以保新城一曰買辦料物以杜冒破一曰分定委官以便責成有旨隄堰修防事宜依議行先年開濬草灣不乆淤塞虛費錢糧應否再加疏濬還著漕運等官詳議停當具奏其餘河道工程俱要查照成䂓用心保守毋得疏虞三月壬辰工科給事中郭顯忠上言河工每當伏秋防守水之暴漲也不過旬日其潰決多繇隄頂漫流其直射埽灣而決者絶少今石砌范家口等隄工或難卒辦不可拘限必先就卑薄要害處盡行加幇且清桃而上河道已成使秋漲不決則水流愈急水流急則刷河愈深刷河深則海口愈闊盱泗髙寶等處自可無虞至原設隄淺夫約二千名趁此畫地分工及至伏秋令各管河佐貳帶領原設淺夫使自防守亦可保無事然沿河疲民困苦尤甚其施為之時只宜召募游民不可僉派以滋騷擾命下所司八月癸亥工科都給事中常居敬等題開封等府陜州靈寶等州縣自七月初十等日霪雨黄河泛漲衝決隄防漂没人畜乞敕河南山東凡有河道地方除管河副使專理外各於廵道照所管地方分主督理捲埽築壩補隙塞決明立賞罰晝夜并工務俾安瀾無貽漕患工部覆奏從之明神宗實錄行水金鑑巻三十一
