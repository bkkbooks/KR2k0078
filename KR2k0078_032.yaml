body:
  text: 行水金鑑卷三十二江南按察使傅澤洪撰河水明神宗萬歷十五年十月辛酉先是黃河暴發將原修鎮河堡西岔河大隄並欄水隄衝決巡撫以聞奪督工官指揮陳績等俸半年仍條四事曰酌隄防儲柴草專責成寬期限從之已亥大學士申時行等題國家運道全賴黃河之從東注下徐邳會淮入海則運道通河從北決徐淮之流淺阻則運道塞此咽喉命脈所關最為緊要先年河嘗北決張秋決金龍口等處皆命大臣往治夫役錢糧動以數十萬計然後成功嘉靖以來河之衝決多在徐邳以南自朱衡開南陽新河潘季馴塞崔鎮築髙堰以後河道安流糧運無阻故近年以來惟見下流之通而不虞上流之害河南一帶地方修防疏懈隄岸卑薄者間亦有之今年河流散漫自開封封丘偃師等處及直𨽻東明長垣地方多有衝決失今一不治明年河水再至勢將北徙上流不下徐淮則運道甚可憂慮此不可不亟為之圖也查得先年設有河道都御史凡河南山東南北直𨽻河漕經行之處皆屬統轄近來裁革此官分屬各巡撫管理責任既分事權不得歸一今黃河衝決多在河南餘流所及又在直𨽻若衝安平曹濮又在山東各該巡撫雖已委官相視畫地修築然或彼此不相照應萬一推諉必致誤事臣思河道未至大壞不必復設都御史但差風力老成給事中一員往河南等處踏看衝決處所稽察各該管河官員就便催督興工各處錢糧會同巡撫官隨宜調發期以初春起工夏間畢事即伏秋水發河流不至北徙徐淮以下自然安流而運道可保無患矣是日傳諭工部朕聞河南等處地方黃河漫流先年舊隄多被衝決即今曽否修築未見奏報著各該撫按官督率管河官員用心經理還選差風力老成給事中一員前去各該地方踏看併催督工程如有怠玩曠職推諉誤事以致妨害運道者即指名參奏拏治丙子工科都給事中常居敬陳河道事宜一開報之當時議令管河司屬各官將河道有無通塞河工有無修舉俱季報部科以便查考一錢糧之當稽議令河道諸臣一切歲終經費年終明開條件具疏奏聞奏册清册部科備照庶因錢糧以稽河工而虛冒之弊可免一責成之當嚴議令管河府州縣官查照典制各住分管地方不許别項差委督撫管河司道時常巡視督率修防遇有漲決一面具報一面興修如廢職怠事即據實參奏一河臣之當擇議令河道原缺容本部查司屬中才望相應者咨送吏部勿泥資序部覆如議乙卯敕工科都給事中常居敬查看河道催督工程命禮部鑄給關防十一月戊子工部覆總督漕運楊一魁題挑濬幫築事宜一草灣口應量挑東岸長二百六十丈西岸長四百丈工料銀共六千一百四十四兩六錢零一崔鎮徐升黃家觜三壩止拆石從下另砌量浚引水支河祖陵東南護隄外用荒石砌子隄一道髙四尺根闊三尺長與大隄等工料銀三百一十七兩零一挑濬淮安府臨城澗河四千二百丈計工料銀四千四百四十八兩四錢一幫築范家口隄壩除原估銀四千餘兩外續用過工料等銀六千餘兩一包砌清河口惠濟祠前裏河隄長五十七丈砌石髙一十二層本祠後外河長五十四丈五尺砌石髙一十三層工料等銀共二千五百九十九兩六錢四分一天妃壩加築平滿排釘樁朩內外用石包砌堅固以防衝洗各項工料共該銀一萬九千五百九兩零俱於原題濬草灣未用銀兩動支其拆開崔鎮等壩并築砌天妃壩計費不多俱於河道歲修銀內酌量支用得旨崔鎮壩應否該拆候差科臣到彼再議定奪餘依議行十一月辛邜詔河道隄防節年修築不堅以致衝決該管官五年內者巡撫奪俸三月道官降俸一級內飬病致仕者不許推用見論劾者從重議處餘年逺者姑免究十二月甲申工部覆督理河工給事中常居敬議於大社集南新修月隄之內復取土填實深潭再加修築以聨舊址次將大社集以東至白茅集百餘里隄照舊增修其茅家潭三尖口等處決口與東明縣護城隄併議修築土方工食俱於該府庫貯蒿草及存糧銀內如數動支上從其議明神宗實録是年決祥符劉獸醫口決蘭陽銅瓦廂後決封丘原武又決長垣之大社集毛家口茶城亡何又報􅌎續文獻通考是年冬十月命工科給事中常居敬相度黃河議修治之䇿時黃河漫流自開封封丘偃師及東明長垣多衝決大學士申時行言失今不治河將北徙上流不下徐淮則運道可憂故有是命已而督河楊一魁議因決濟運導沁入衛居敬言衛輝城卑於河恐一決有衝潰之患沁水多沙善􅌎入漕未便不如堅築決口開河身加浚衛河民得灌田尤為完計上從之明紀事本末是年黃河又決荆隆口衝潰長隄入長垣東明二縣尋塞之後二年復創築遙隄長二千九十丈以防漲漫沁河又決蓮花口金屹􅨅水浸獲嘉新鄉一帶尋塞之亦加築隄壩以防漲漫南河全考大名府屬長垣東明二縣舊有長隄一道延亘一百三十里東至山東曹縣白茅集西至河南封丘縣新豐村止隄外即有淘北河一道相傳即黃河故道也萬歷十五年河由河南封丘縣荆隆口決入挾淘北河衝決本隄之大社口兩邑昏墊沁水至武陟縣與黃河會合其湍急之勢較黃河益甚而武陟東岸之蓮花池金屹􅨅最其衝射要害處也萬歷十五年沁從此決新鄉獲嘉一帶俱為魚鱉每年堵築掃壩勞費不資且壩內為商民輳集之處煙㸑不下千餘倚隄為命今議甃石四百三十五丈隨守隨修限以三年告竣此隄一成永久可恃而議者畏難尚未興舉其北岸大樊村亦係掃灣要害幫隄捲掃均在司河者留意焉河防一覽明神宗萬歷十六年正月癸已工部覆總督漕運右僉都御史楊一魁條陳十事一改閘座以便防守謂古洪當黃水之衝為入運咽喉閘制上闊下狹閘板難下水入易淤且閘座太低一遇泛漲水從上漫千夫辟易無可奈何欲將前閘乘此改修髙下廣狹務俱一律此計之善者也擬允行一嚴啓閉以杜淤墊謂古洪內華二閘建設之初原為伏秋水漲恐致漫淤閉閘堅守不得擅開以嚴其防也但地居衝要官使蝟集勢難阻遏欲比照淮安通濟閘事例每年於六月終旬築壩不許擅開即貢鮮船隻亦酌量盤剝此固為運道完計第官民商賈國課攸關一旦築塞不獨困商且稅額縮矣况貢艘舊屯留京又不可輒議乎擬仍舊一開支河以備緩急謂運舟自茶城入閘乃其故道與河隔逺自河決秦溝改繇濁河口入徐淮乃與茶城緊相對衝又戚家港湍溜難挽舟多覆沒前道臣舒應龍另開塔山支河頗稱利便而壩閘未建旋復淤阻中河郎中陳瑛始開古洪內華以代塔山五年於兹而復遭淤塞安可不為之計也欲挑浚塔山支河建立壩閘令與內華相等八九月後公私船隻兩道併出固亦有見第閘河水泉不多分而為二不識能常繼否擬會勘一移官夫以資䇿應謂古洪內華隄夫六百名伏秋水漲修守不足且責閘官以調度弗能也欲將呂梁洪夫分調一半移住古洪以資修浚管河同知原任邳州者移住境山遇有緊急往來督視固屬逺慮第呂梁古洪相去頗遙安土之民難以驟徙與職官改駐不同也擬會勘一復故道以定長䇿謂黃河舊出小浮橋水勢順利運道安行纍歲變遷致梗運道雖建閘啓閉猶時淤塞非本計也欲修復故道自歸德以下丁家道口浚至石將軍廟令河仍自小浮橋出若撫按各為其民則止浚碭山韓家口河五十里誠亦有見第其費有出與否其道可開與否宜行令撫按勘科酌議以請者也擬會勘一放濁溢以固隄岸謂黃河縷隄修築加髙而隄內窪下夏秋間河水外漲雨水內浸其隄易壞欲倣栲栳灣隄勢將徐邳一帶隄內窪處春間開口泄水其與遙隄隔逺者從便築小月隄以防其溢此計之便者也擬允行一引沁水以濟衛河謂黃河挾沁水入衛繇天津下海久矣自河徙而沁與俱南衛水時苦涸竭其流濁也欲倣徐有貞廣濟河之勢引沁入衛不使助河為虐且乘武陟間沁水方決因便疏浚萬夫一月之力耳固自有見第考先臣黃綰霍韜並有分沁入衛之議似欲藉以殺河患非為衛水益也改作入衛經費既難衝決可慮擬會勘一浚河身以抑泛濫謂善治水者以疏不以障年來每遇水發隄上加隄遂令水髙凌空不啻過顙濵河城郭決水可灌可為寒心欲於秋冬之際探測河身深淺隨處挑浚蓋慮患之極思也第黃河之沙從水去來恐難以人力治之且入冬則河南一境堅氷瀰望淺深將安測乎擬會勘一開水門以免橫潰謂黃河發星宿入中國合華夷之水千流萬派歸於一壑泛溢其常也况孟津以下土疏易衝故先臣丘濬請多開水門以殺上流之勢誠為有見今欲於黃河分流故道量設減水石門以泄暴漲是一説也第恐黃水洶湧石門之所泄幾何倘涓滳不禁致成橫決未獲其利先滋之害矣擬報罷一處河費以免偏纍謂河上歲修銀三萬兩內仰給於河南者九千今本省災傷屢聞拖欠甚多而河工勢不容緩欲將本年扣省米價銀三萬七千餘兩留備淮上支用其河南解淮銀九千兩免行起解似亦兩便但戶部咨稱米價原係邊餉難以議留宜將本年額內量留九千兩抵河南解數以後仍照例分解不得偏主於其間也擬允行從之丙申戶科給事中李廷謨奏國家防河如防虜均非可以泄泄制之者今邊臣自督撫而下必閲歷錬習始為推轂賢者久任加銜自僉憲得至參政布政甚則節鉞寄之用是人思竭力而收效者宏河臣則不然按次議差才者不必用用者必才且計日瓜代河之要害緩急既無暇身嘗一得代去即河患孔棘不為纍也又何必計久逺哉宜略倣邊臣法凡差管河司官務擇其人期以歲時著有成勞徑轉河道總督員缺得漸次推用則人人思奮而河工有濟矣疏下該部二月壬戍漕撫揚一魁奏辨御史祝大舟論劾乞敕河臣查勘徐邳遙隄是否如舊縷隄髙堰先經衝損者即今曽否修葺錢糧有無乾沒成功是否毁壞一切不敢規避疏下該部丁丑工部覆議黃河為患自古巳然而治河之難中州為甚何也其地沙壅土疏修築既難平原多曠一望千里無崇山復嶺之束獨恃捲掃以列防自為捍蔽故功難就而費亦滋今據科臣常居敬撫臣袁貞吉按臣王世揚會勘集議工程地亘千里連於縣界兩省而唐家口為黃河要害在考城曹縣之間兩省居民互相盜決尤於運道大有關者宜分地專官嚴程修築工在祥符滎澤中牟三縣者屬河道僉事余希周領之在封丘陽武二縣者屬大梁道參政王來賢領之在蘭陽儀封二縣及考城縣芝麻莊陳隆莊唐家口幫築隄壩屬兵備副使王之屏領之河內武陟沁河諸衛屬河北道參議徐三畏領之隄壩以丈計者凡三萬三千一百五十約費至八萬四千六百餘金事竣一體查敘上命依議及時修築依限報完其兩省交界處有盜決者設法嚴禁毋得推諉三月癸已禮科給事中王士性請開復黃河故道以圖永利謂自徐而下河身日髙而為隄以束之水行隄上與徐州城等束急流益迅委全力於淮而淮不任故昔之黃淮合今黃強而淮益縮不復合矣黃強而一啓天妃通濟諸閘則黃搗運河如建瓴髙寶一梗即江南四百萬石之運坐廢淮縮則退而浸泗為祖陵計不得不為石隄護之隄增河益髙根本之慮不亦可虞也哉河至清河向南衝者凡四折而後入海淮安髙寶鹽興蓋不啻數百萬生靈之命託之一丸泥決則盡成魚鱉將奈之河而紛紛之議有欲增隄泗州者有欲開顔家河灌口河永濟河南甃髙家堰北築滾水壩者近議開月河草灣及崔鎮三壩如蟻穴漏巵補救迄無寧歲總不如復河故道為一勞永逸之圖也河故道繇桃源三義鎮逹葉家衝與淮合在清河縣北别有濟運一河在縣南蓋支河耳河強奪支河直趨縣南而自棄北流之道久且斷河形固在也自桃源至瓦子灘凡九十里地下不耕無室廬墳墓之礙雖開河經費視諸説稍倍而河道一復為利無窮矣疏下行河者議四月甲寅朔直𨽻巡按御史喬璧星奏河道衝決為患請率舊典復設專官以一事權蓋自古治河止於除害我國家仰給東南歲輸四百萬石自淮至徐實藉河利顧潰決淺澀之患往往有之永樂九年分設部司督理或命部院大臣往視事巳輒罷正德四年乃議專設憲臣為總理河南之開封歸德山東之曹濮臨沂北直之大名天津南直之淮揚徐潁咸屬節制建牙如督撫重河防也然理河者不復慮漕而理漕者亦不復慮河則亦專設河臣之釁矣萬歷五年偶因兩臣意見相左遂并河於漕在河南山東北直者以巡撫兼領之責分而官無專督故修濬之功怠於無事急於臨渴河患日深頃者勘科常居敬亦有專設大臣之議非直備官要在得人試按嘉靖以來河漸北徙濟寧以下多淤而劉天和之修復魯橋朱衡之開通南陽潘季馴之濬刷崔鎮河道賴之此專設得人之明驗疏下部覆如議上命督河再設以老成才望者任之癸亥勘理河道科臣常居敬會同督臣舒應龍再上河工一十四款一添造閘座以便防守議於古洪閘外加鎮口閘一座外禦濁水內蓄漕河一接築縷隄以防中潰計自茶城以下塔山支河西岸起至河口止長五百丈闊四丈又補築舊河缺口一道長六丈一議修掃壩以防危急王公隄纍經衝決與黃河止隔丈許兩河夾之勢最危急議於本隄設法增築實土石於鴈翅之內密釘樁朩於捲掃之外并設順水壩以逼黃水之北流一開建月河以避衝決於運河南岸另開月河以引漕水之南去則二水相隔頗遙時加培築可保無虞中四款入運河一移調官夫以資䇿應呂梁徐州二洪水勢既平洪夫稍暇且屬流寓隨地可安議撥六百三十三名均派新舊五閘餘者留二洪拽運而管河同知改住境山䇿應又一款入運河一停拆三壩以保成功崔鎮徐升季太三壩原為泄水而設議拆者為其髙而壩外隄岸更髙於壩是存之未礙宣泄之利拆之反滋泛濫之虞也一停濬草灣以節財用草灣一河闊二百餘丈先嘗開之以保淮城且淮黃之水藉以分流而開塞靡常無煩濬鑿俱如議行庚午工科給事中梅國樓薦原任刑部尚書潘季馴堪總河之用時季馴巳鐫職為民而科臣謂其向在河上有築濬功會李棟董子行蔡宗周常居敬亦先後薦之故部覆起都察院右都御史總督河道兼理軍務上諭之敕六月巳未勘科常居敬奏黃河故道開復甚難宜罷役而訾家營支河之議起癸酉勘科常居敬上修理河道圖考報聞圖考留覽閏六月已酉總理河道都察院右副都御史潘季馴題黃河之水濁而強汶泗之流清且弱交會之處則茶城是也每伏秋黃水盛發則倒灌入淮沙停而淤勢所必至黃水消落漕水隨之沙隨水刷不待濬而自通矣縱有淺阻不過旬日如萬歷十年中河郎中陳瑛創建古洪內華二閘每遇黃水暴發即下板以遏濁流之橫而閘內無壅阻之害黃水消落則啓板以縱泉水之出而閘外有洗滌之功去伏稍失開閉之防遂至漂壅失常厪惟當寧臣於前月望至宿遷閲視同知徐申謂本月望前黃水偶長丈餘漫入洪口即合嚴下閘板至二十一日報黃水消落於是啓板通漕衝刷成河通行無滯至閏六月等日復然前不過七日後不過三日隨長隨落此即二水勝負通塞之故也勘科常居敬復建口閘一座去河愈近則吐納愈易足為水利但建閘易守閘難運貢之馳行固急勢豪之開放不時數日之羈程不能待而千百年之利害且決裂矣乞特賜綸音如萬歷八年清江浦三閘之法以嚴啓閉庶河渠永有賴矣部覆如請十月甲申工部覆總督河道潘季馴條上河工八事一久任部臣謂水性有順逆河情有分合地勢有險夷如某處迎溜作何捲築以當其衝某處掃灣作何幫護以防其泄事在分司宜委任南中兩河郎中滿三考方與優擢則鍊督久而河防自熟一責成長令謂理河如理家然家務繁瑣不妨分任而庀材鳩工則家督主之今瀕河州縣長猶家督也調集夫役備辦料物宜專屬之至於巡行督率責之行河者而郡守亦有總理之責焉疏虞並坐一禁調官夫謂治河有補偏救弊之法無一勞永逸之事禹奏平成不數百年而祖乙之都圮則防守弛也故曰防河無止工宜申飭沿河官夫專以河為事不得别差擅調致誤河防一預定工料謂黃河泛漲每在伏秋修築不預往往為河所乘宜於十月中旬即行踏勘分工備物務令正月興作四月報竣後時者罰一立法增築謂徐淮之間咫尺河流倚遙隄一線為捍蔽而風雨剝蝕車馬蹂躪日就卑薄宜令每歲修隄髙厚俱以五寸為限遇低薄處隨宜加築遍植樟栁不如法者聽總河參治一添設隄官一加幫真土一接築舊隄以上三條入淮河命依議行丙午工部覆總河潘季馴題請罷開復黃河故道及鑿支渠合沁衛諸議一意修築隄防上報可仍申飭河臣毋因循以致疏虞紛議以妨實事違者聽總河參究十一月甲子工部覆河南巡按御史王世揚奏河南境內黃河自潼關至歸德開封等處奔流二千餘里去總河督臣甚逺利害之切見聞之近必先撫臣宜於撫臣敕書增兼理河道一條與督臣協同行事詔從之十二月甲申添設河南開封府同知一員駐劄荆隆口祥符縣丞滎澤主簿各一員專管河務戊子工部尚書石星覆總督河道潘季馴題稱河南黃河上流三門七澤而下地平土疏每易衝決特非運道所經往往忽視以為無虞而不知上源既決運道未有不阻者故修守之法在河南尤屬緊要其故道繇新集出小浮橋銅幫鐵底所當開復而歲儉費繁未能遽行惟愼加修守庶保無虞因條列六議一黃河北岸逼漕南岸逼省先臣劉大夏於兩岸各築長隄綿亘千有餘里百年來頗受其利乃坍塌衝汕歲修易湮宜刻期修築一沁水發源沁州至武陟與黃合勢最湍悍而蓮花池金屹􅨅其險要也生靈無算寄命一隄危若纍卵而最險處止四百餘丈即盡甃以石工亦易辦所當亟議石隄以圖永賴者也一河工甚巨而所恃工費止河堡夫銀而巳近緣併入條鞭有司輒急京運而緩河道任民逋負甚至已徵而别用竟不扣還河工所以墜誤也今議從前借用者如數抵還在民者徵解貯開封待不時之用一役民用其力當恤其私今議開歸懷三郡近隄沒官田地給堡老六畝堡夫五畝不足則以曠工銀置産以授之則民有身家之患防隄益力矣一河之害在河南尤大則治河之功在河南尤難往秋防舉劾僅行於淮徐而不及河南誠為缺典宜一體甄别以示激勸一河南雖非運道所經而河情水性與淮徐無異固當以治淮徐之法治之則夫責郡邑長吏以一事權核歲修工程以預興舉增補捲築以固隄防所當通行者也詔如議行癸卯訾家營支河工罷從總河潘季馴議也明神宗實録河潘季馴四任總也是年五月十一日敕諭都察院右都御史潘季馴該科臣建議先年河道原設有總理大臣近年裁革分屬各該巡撫官兼管事權不一目今河患不常工程重大要將原官復設簡擇熟知河務任事大臣管理該部議覆相應兹特命爾前去總理河道駐劄濟寧州督率原設管河管洪管泉管閘郎中員外主事及各該三司軍衛有司掌印管河兵備守巡等官將各該地方新舊漕河并淮揚蘇松常鎮浙江等處河道及河南山東等處上源著實用心往來經理遇有淤淺衝決隄岸單薄應該幫築挑淺去處務要先事預圖免致梗塞并查先年工部題覆事宜一一著實舉行合用人夫照常於河道項下附近有司軍衛衙門調取應用其各省直歲修河工錢糧悉聽通融計處動支所屬大小官員果能盡心河務功迹昭著者奬薦擢用敢有不服調度怠玩誤事及權豪勢要之家侵占阻截并違例盜決河防應拏問者徑自拏問應參奏者指名參奏其餘開載未盡及河道緊要事宜悉聽爾便宜處置其有干漕運撫按衙門事體公同計處重大者奏請定奪每年終將修理過河道人夫錢糧照例備細造册畫圖貼説奏繳其南直隸淮揚潁州徐州山東曹濮臨清沂州河南睢陳北直𨽻大名天津各該地方軍務亦聽爾兼理其各兵備道悉聽節制務要防護運道永保無虞如遇盜賊生發即便會同各該巡撫嚴督該道官兵上緊緝勦毋致延蔓若兵備各官縱寇貽患者參奏處治爾為重臣受兹委託須殫心竭慮輸忠效勞務俾河道安流糧運無誤斯稱委任如或處置乖方以致誤事責有所歸爾其欽承之毋忽故諭河防一覽見萬歷五年因河漕兩臣意相左遂并河於漕至是以薦仍用公為總督其間沿革之故不可以不知也故特書於此戊子萬歷十六年河大潰天子以言官言拜公田間至是不特公習河而河亦習公矣既告成録其功所加築土隄縷隄月隄格隄長隄橫隄守舊隄寄子隄凡三十四萬七千八百八十五丈有竒磯閘料厰凡二十有四座石壩土壩月壩護壩凡五十一道濬淤淺塞決口鑿老土凡三十萬一千一百丈有竒栽護隄栁八十三萬有竒前後十餘年軺車所至更數千里公與役夫雜處畚鍤葦蕭間沐風雨裹霜露髮白靣黧而後兩河合軌數萬艘轉運無害緣河之民始復見室廬丘隴煙火彌望焉公之言曰通漕於河則治河即以治漕會河於淮則治淮即以治河合河淮而同入於海則治河淮即以治海故竟公在事止以築隄束水借水攻沙為萬全第一義王錫爵撰潘公墓志行水金鑑卷三十二
