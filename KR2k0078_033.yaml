body:
  text: 行水金鑑巻三十三江南按察使傅澤洪撰河水萬歴十六年都給事中常居敬上河工大舉疏云議照中州惟河患為最鉅故其治河也為獨詳邇年人心玩於積習法制廢於因循致厪聖懐特旨修築即今兩河工程臣等不敢不竭心力矣然必料理精詳庶可垂示永乆若非奉有明旨無以警惕人心既經該道㑹議前來又該臣等覆議相同合照款列具陳謹題請旨一預積埽料以防未然臣等查得河南水平岸髙而土疏其湍急埽灣之處患常在下雖有髙厚之隄卒然坍塌無所措手故防河之患無愈於捲埽而捲埽之料全資於稍草樁麻與土也徃年所用樁朩􅐨麻俱分派於出產州縣買運而柳稍榖草俱於臨河地方召商收買已有定議近因沿河各縣連年苦旱復遭大水百榖無收欲暫將榖草派之别府州縣買納解送亦通融之䇿但道途隔遠不惟脚價浩費抑恐反滋騷擾及查徃年榖草定價每束連耗草二十二斤給銀二分今年榖草缺乏價貴合無每束増銀一分共給價銀三分仍舊召商收買此後豐年酌量估裁庶草價既増而商販自至矣至於捲埽胚胎純用好土始得堅完必須預積平日庶可取辦倉卒近因乆無水患管河員役不復議積每遇急廹取土窵遠緩不濟事竟日搬運不成一埽遂至決口漸闊為害滋大矣合無令各守隄守壩堡夫於閒曠之時查照成法令各管河官督令預運埽土堆垜於埽壩及𦂳要隄岸之上每年㑹計之時查算某處該積土若干責令各夫如數運積著實查驗無容虚報其河流衝射之處仍當預置旱埽如伏秋水發微有衝刷即時添補管河官一面督行一靣申報則有備無患而埽不虚費隄防愈有頼矣一議處工食以䘏窮民臣等查得估計修築隄壩工程每築方廣一丈髙五寸為一工每夫一名日完一工方給工食銀三分三釐三毫夫以一人而日築一工已為難完况取土有遠近之不一塡築有險夷之不同槩以一例計工既不能依期報完復又計工給銀安得盡滿所望且今歲米價騰貴數倍徃昔一工給銀三分三釐三毫亦不足其食用若一日不完一工則所得工食益不足以糊口無惑乎每遇募夫召之不至也合無將今歲做工夫役每一工給工食銀四分如取土在百歩之内及在平地修築者俱仍以方一丈髙五寸為一工若在坑坎水内塡築及在百歩之外取土者酌量減其寸數俱每工給銀四分如此則工食既加而飬贍足工程有等而勞逸均人心亦知樂從矣其已後成熟年分仍照舊查給一議設堡房以愼守禦臣等查得黄河兩岸長月等隄并埽壩之處先年每二里建堡房一間僉堡老地方各一名統領火夫十名廵守以防河患原無工食數年以來天時亢旱河患稍息人心懈弛堡房傾倒而孑遺災民星散求食各隄防守遂無人矣惟各埽壩處堡房尚存數名然為數亦少不足應用昨歲河患雖出異常之災未必不由疎虞所致也合無於黄河兩岸各新舊長月等隄每二里仍建堡房一間每堡僉鄰近堡夫二名每五堡僉勤能堡老一名統率各堡夫晝夜徃來廵守栽培栁樹但有盗決隄防及砍伐隄栁者即便擒拏送官究治遇有河水泛濫衝刷損傷即行塡補每堡老一名月給工食銀五錢各役每名月給工食銀三錢俱於河道官銀内支給至於臨河埽壩尤係要害修守之工倍當加謹仍每二里建大堡房一重三間盛放埽料以備急用每堡設堡夫五名每二堡設堡老一名管河官不時查㸃遇有𦂳急衝刷不拘晝夜本堡鳴鑼各堡老督率各夫前來接濟併力堵塞其堡老必於鄰近鄉民中選精勤守法者充役如此庶防守俱各得人而河患可保無虞矣一議處厰夫以杜偏累臣等查得臨河祥符等縣設有官厰八處收貯稍草樁麻以備捲埽每厰原有厰夫二名或三名令其看守物料先年俱於各州縣堡夫内選殷實大戸充之凡管厰官合用心紅紙劄并僱覔書手造寫循環倒換盤纒及僱人晒晾物料并修理厰房牆垣冗費百出每名每年費銀五六十兩如遇不才官員需索常例費至百金者有之後因稱累以堡夫二名朋應厰夫一名每年工食銀四十八兩至萬歴十三年該前任廵撫臧惟一允河道議每名裁定工食銀三十六兩以其數非不多也不知工食有限而額外之費無窮夫厰夫原以看厰為名惟晒晾物料是其職守乃至責以不貲之費磨累無休身家蕩敗無惑乎合口稱苦不敢承役也相應痛革以後每厰夫一名以二人當之給條鞭工食銀二十四兩扣除銀十二兩存貯官庫不許復僉正頭惟召募鄰近土民充當一切雜費如管河官心紅紙劄等項量於編派其登報文冊修理牆垣即於前扣銀内申請動支不許濫派厰夫出辦惟稍草等料有浥爛數多各役失於苫蓋晒晾者姑免問罪令其量賠如此庶需索之弊既革而厰夫之害可免矣一及時給散以杜侵尅臣等查得河工全頼人夫夫役全資工食河道錢糧俱貯府庫管河官不得自由必至河岸衝決方議調人夫請支錢糧已無及矣合無每遇春時該道行管河同知通判等官赴府領銀分發沿河州縣專聽不時之需遇有河患一靣募夫一靣申請事完稽查庶不耽誤至於給散工食徃時獨責之各縣管河佐貳官各官多不親理又委之部夫陰醫等官稱鑿給散其中不免扣尅以致各夫鮮受實惠合無以後給散河夫工食俱聽該府管河官督同各縣掌印官眼同包封唱名給散再不許令各縣部夫官總領致滋奸弊如府管河官偶在别縣督工一時不暇者聽各縣掌印管河官徑自散給如此庶扣減之弊既除而夫役之逃可免矣一責成正官以便查覈臣等竊惟設官定制在府州縣雖有清軍管糧捕盗理刑管河等官分任佐理而兼總條貫則掌印官事非謂各官之外掌印官全無相干也故一州縣之中河渠要害孰非正官之所當料理防守者况中州生靈命脈係於黄河可以正官而漫不關心乎乃向來河務該道止行文府管河官府管河官止行文州縣管河官而該府州縣全不經由故問河水衝決非不曰某州某縣之某口決也問應用人夫應動錢糧所以治其決者則曰有管河官在非本州本縣事也不知河患係民瘼最切不此之究而徒委之於一二佐貳彼其威令不行召集人夫既多阻撓操持不定動用錢糧又難清楚况修理工程必動錢糧管河官身任其事則錢糧自有粘帶每年㑹計既令其查議矣乃年終覈實亦令其自為而自覈之無論工程虚薄錢糧冒破無由而覺即工程堅固錢糧明白誰則信之是尤不可解也合無自後申飭各府州縣掌印官凡遇河務雖有管河官專管至於催攢人夫給發錢糧各掌印官務破積習協心共濟其㑹計工程亦與管河官㑹同估議每年河防畢日該道將各掌印管河官分别勤惰開呈兩院量行奬戒如此則精神流貫而法亦昭明責任各專而功可永頼矣一議豁隄糧以蘇民困臣等看得黄河兩岸皆係民間納糧田地而新舊所築長月縷水減水等隄壩南北兩岸上下綿亘六七百里其根闊有七八丈者有十餘丈者所壓占民地不下千百餘頃自來地内夏秋稅糧并各項差銀尚係地主賠納臣等竊謂築隄乃為一縣小民捍患非一人一家私事其占用各戸之地既不償以原價復令包納虚糧誠於人情有所不堪合無候部議行臣等轉行臨河各縣逐查各該地方除年遠舊隄外其有五年以内新創及幇築隄壩若干道某道根闊若干長若干共計壓占民田若干每年共計稅糧差銀若干即與除豁均派槩縣地内徵收抵數及查見今種麥挑穵者量給倉榖以補子種之廢庶包賠之糧不致偏累而沿河之民可免向隅矣奉旨依議著實行又酌議河道善後事宜疏云治河者既欲袪其害復欲資其利誠難之難者矣考之國家之功令諸臣之經略犂然具備若可持循然而時勢稍殊則法制不可不講人心易怠則申飭不可不嚴桑土之謀當於未雨况河道多艱補偏救弊之方其容以或已乎臣疎庸無似誤䝉皇上任使日夕兢兢罔知報稱日來奔走河漕酌之事機詢之輿論稍得其槩除各項工程㑹同撫按諸臣另疏具題外敬抒一得列為八事用備採擇少效涓埃謹題請旨一復河臣以一事權竊惟今所稱漕河者南盡𤓰儀北通燕冀天下所由飛芻輓粟而通塞之機所關於國計甚重也第河道源流既遠名稱亦殊分合異形決塞靡定即使精神專而料理密尚恐不足以濟事也先年設尚書侍郎或都御史一員總理河道以故事體畫一興作甚便議定而行無敢格者諸臣經略之蹟至今班班可考乃邇年罷不設歸諸總督漕運而各省則令廵撫兼之不思河道變遷常在指顧呼吸之間非專一則牽制而難行非身親則怠緩而誤事稍顧忌則齟齬而敗績或猶豫則後時而罔功此其所係何如者至於各廵撫專制一方辨官邪審刑名稽錢榖理鹽盗日不暇給乃欲出其什一辦河務其將能乎非獨此也河南之令不能行於山東山東之令不能行於淮揚即一舉而可以垂永利此最忠國便計而各省牽連甲可乙否卒亦憤惋而止至於氣脈不貫事體牴牾此其害未可一二言也嗟夫禹平水土稷教稼穡未聞兼理奈何令并漕運河道而兼之也即今督臣初任經理方新才品卓然足以勝此但以河道事理論之仍當專設總督重臣庶權不分而事易集矣一嚴啓閉以杜淤淺一催糧運以謹河防上二款實錄載其部議略見運河一定賢否以便責成照得東南之所急者無大於河漕而所以重河防而責成效者無過於賢否今時河道督臣總理於上部司分理於下乃各府佐官則專率州縣管河判官主簿聴候部司分委辦料興工且吏部給與文憑塡注專管河道不許營求别委法甚善也乃賢否則各衙門主之而部司不與焉夫河道艱虞脫有緩急若救火追亡猶恐弗及乃部司曽不得操賞功酬勞之權是求前於却欲責其功力難矣以故别衙門執賢否以便差委而各官亦或冀差委以圖親信反視河道若駢拇枝指然及潰決而圖之已無及也合無查照清江造船厰官事例凡係管河官專屬河道部司年終考覈分别賢否徑呈督撫咨部施行不許别謀差委及查濵河處所俱有各官公署仍量行修理常川駐劄母使混居府城以妨職業庶賢否定而人心趨責成專而分理便矣一議近轉以勵人心語云耕當問奴織當問婢語專一也夫耕織細事猶不可泛任况河道重務茍非得其人專其任徒使素不經事者嘗使而漫為之猶未能操刀而使割也驟而語地利孰知險夷驟而語版築孰辨工苦及舉事不當始議更置錢糧實已耗費亦無及矣故任河務者非得忠勤任事之人乆任而責成之不可也第州縣佐貳官卑祿薄欲使之數年不調其志易隳故欲勵人心莫若近轉如廵司之守隄堰也州縣佐貳之司歲修也通候部道年終覈實分别𩔖呈督撫咨部紀錄倘主簿缺則推大使判官缺則推主簿縣令缺則推判官否則加銜以俟遇缺推補其同知通判等官亦照此行但宜愼重考覈果有顯蹟方得推舉則雖陞遷不出淮揚四府異日舉大役興大工令此素習者為之輕車熟路蔑不濟矣矧其人尚留地方即不稱吾得而議處之夫既叨顯庸而又知茍且之無所逃罪也有不視河事如家事者乎一議錢糧以濟河工一稽工料以資實用一重修守以謹河防天下之事作之者固不易而守之者尤難况於河道關漕運重計乎何也水勢之緩急夫役之調度錢糧之盈縮工料之磨算是無一事可忽也正月辦料二月興工三月終工未就而桃花水發五六月而伏水發七八月而秋水發是無一時可忽也若遥縷各隄若歸仁集若髙家堰若王公隄若西橋范口等處是無一地可忽也此其責甚重而其勞為獨至然實不外於歲修之中但在人見其無竒功在巳見其守舊轍於是茍安者多玩愒好事者喜紛更其於河漕何所裨益不知治河如治邊防水如防敵今各邊之臣謹斥堠修城堡練士卒飭器械豈必騁逺略計首功而後可以言勞哉然而秋防有叙歲終有薦閱邊有錄以故人心有所激勵而興起今河臣出入風濤奔走拮据勞瘁之狀不減邊臣乃歲修之功末由自見非情也臣以為有怠事之罰亦當有勤事之賞合無除興舉大工外每年歲終總河大臣將部司以下各官查其修守勤惰分别注考移咨吏工二部紀錄案候三年該部𩔖題請旨賞罰以昭勸懲果有成勞雖破格超遷或加服俸亦不為過如或持祿飬髙偷安廢事致妨河務者即行議處如是則人知職業修而事功自見防守嚴而河道永頼矣工部摘將嚴啓閉等五款覆議相同題奉旨依議行又該吏部摘將定賢否議近轉二款覆議相同題奉旨近年管河佐貳等官多有營求差委妨廢職務不行用心防守的總理衙門務遵敇諭拏問重治不許姑息其餘依擬行又該吏工二部㑹議復河臣一款題奉旨這總理河道官凖復設著推練逹老成有才望的去漕運河道衙門各職掌還查擬停當來說河防一覽明神宗萬歴十七年六月癸已總理河道潘季馴言黄水暴漲洶湧異常衝開獸醫口月隄者一漫出李景髙口新隄者一衝入夏鎭内河没壞田廬溺死居民者一其餘或水與隄平或隄不没者尺許勢且不測科臣張養䝉等因言前此工程培之未髙築之未堅以召此患部議咨行河道督率各官築塞増修要使束水歸漕又以河臣駐劄濟寧去河南千餘里該省撫臣咫尺黄河本院先經題覆凡倉卒有患則撫臣一靣相機築浚一靣馳報河臣議處得旨隄完未乆遽有衝決顯是修築不堅經管官各奪俸三月乙未工科都給事中張飬䝉又上疏曰近覩總理河道潘季馴報成叙功兩疏諸臣勞績瞭然在目極稱工程堅固足保無虞陛下且不吝爵賞以酬之矣蓋成功非難保功為難􅌎決委之天災挑塞歸之人力報成未幾俱有後虞求脫紛紛此其故皆繇於河臣不乆任也官不乆任不便有三後先異見也人已異謀也功罪難執也功名之心孰不有之前者以功陞賞矣代其任者守畫一而襲故常則疑於無所事事於是不曰某故道當開則曰某新壩當改不曰某堰工可廢則曰某湖地可耕倖邀異績欲求多前人此後先之易見也人情易分爾我功出於我則修守常勤功出於人則修守常懈勤則修築可保無虞懈則隄渠必至漸壊此人已之異謀也功罪可執而後賞罰不淆假令一隄之築也倐堅倐潰一渠之濬也倏通倏壅前者蔽罪於後工之不繼後者推罪於前工之本虚罪前已非見任之官幸免追論罪後又以新任之故得從亮原此雖賞罰之不明亦繇功罪之難執也查萬歴五年有管河司道等官都著乆任不許陞轉之旨世宗末年有查分管官員職名籍記在簿日後有不堅固即便指名叅治之㫖今右都御史潘季馴三任河漕熟諳水道陛下起用之意固欲責其新功自宜乆任以重河務其司道各官併令一體乆任蓋治河如治虜邊方總督有十年一鎭者矣兵備有僉事加至布政司者矣河道之臣胡為不行乆任哉再惟人臣報君職掌有在豈足言功今兹之敘完有成議矣以後年年修築疏防皆河臣職守所當自盡更不必𤨏𤨏敘錄致啓幸途從之十月癸卯黄河決口塞河工告竣工部敘治河各官潘季馴等賞賚有差明神宗實錄是年河決雙溝單家口於是專議築趙皮寨至李景髙口遥隄築將軍廟至塔山長隄築羊山至土山横隄河防幸無事明紀事本末是年河由李景髙口決衝月隄入睢陳故道尋塞之其明年自趙皮寨起至本口加築遥隄長二千三百二十九丈以防浸溢南河全考是年以清水河月隄隸豐縣每被浸汕又添築月限長二千五百丈以邵家壩遏斷秦溝舊路最為喫𦂳又接築數百丈復幇築髙厚山東通志是年草灣河大通先是草灣河通塞不常至是大通奪正河十分之七至赤晏廟仍歸大河清江浦外居民恃以為安而河靣較之正河僅三分之一上流未免稍稍逗遛耳又築塔山隄長九百餘丈淮安府志是年六月黄水大發合睢水注縣城平地丈餘睢寧縣志是年春夏霪雨六旬秋復大水河溢知縣康煒申疏廵撫唐應龍奏蠲發賑衆頼以安蕭縣志明神宗萬歴十八年十月癸已總理河道右都御史潘季馴引年乞休不允十二月壬申原任工部尚書朱衡治河有功土人立祠至是都御史潘季馴請加修葺改為敕建祠宇從之明神宗實錄是年又築塔山隄長七百餘丈新築單口辛安雙溝馬家淺洋山峰山諸格隄縷隄既不可恃萬一決縷而入横流遇格而止可免泛濫水退本格之水仍復歸漕淤溜地髙最為便益永無分流奪河之患淮安府志明神宗萬歴十九年二月已已總理河道都御史潘季馴再疏乞休兩經票擬俱不批發大學士申時行等以漕運將行河防甚急本官既已告病恐因循誤事為患匪輕具題請㫖壬辰河道都御史潘季馴因病乞休吏部題覆催請三次工部催請一次大學士申時行等先曽揭請俱不報時行等恐誤河防或妨運道復具疏題請三月庚申總理河道潘季馴題稱河防喫𦂳伏秋為嚴而臣三疏乞休病已阽危須著司道官畫地廵行如有疎虞照地叅究從之仍著在任調治用心經理督察四月辛酉工部覆禮科給事中胡汝寧言徐州河患乗氷消之時宜修培依議行五月癸酉總督河道都御史潘季馴議開魁山支河條議四事一甃石隄以固保障一設長夫以備修守一改隄夫以專疏浚一信法令以防淤阻部覆俱依議行六月丙申總督河道都御史潘季馴言去冬十月間聞徐城積水未消議者要改河就城時巳牌行徐州道將魁山支渠查勘開洩而改河之說牢而不破迨題明速開後新渠告成積水消盡衆議頓息僉謂改河遷城俱可免議矣今接邸報廣西廵按御史錢一本題及徐城積水一事以城内之水疑及外河要疏浚徐呂二洪下流謂臣泄泄欺罔當錢一本過徐之時正雨雪之候城中積水委多此時行濬魁山之渠已逾兩月内水委與外河無干徐州所報十二月消水印揭見存何敢泄泄欺罔至於挑浚二洪下流須塞而後開今二洪之水河深流迅縱欲疏浚從何下手乎上曰徐州積水已消該部勘議已定已有㫖了十一月癸亥工部題覆河道都御史潘季馴條議一放水淤平内地以圖堅乆謂縷遥二隄俱為防河善法但宿遷以南有遥無縷獨直河以西地勢卑窪歲歲患水宜將遥隄查閱堅固却將縷隄相度地勢開缺放水沙隨水入地隨沙髙庶消患而費可省一接築遥隄以防奪河謂黄河之勢分則河遂奪緩則沙遂停宜自永頼亭以下接築遥隄計五百四十丈至黄家溝止庶河無分流而事可永頼一増支渠大隄以杜淤淺謂徐城積潦悉繇新開支河洩出惟魁山迤北王家林一段約長十餘丈迤南倪家林一段約長三十餘丈宜倣支河新隄之法築大隄一道自無塌損之患積水勢若建瓴矣後二條分入淮運二河合依所議備行淮揚撫按官查勘另行題請著依議行甲戍以河湖並漲修守事竣將知府陳亷等及州縣官五十三員優奬知府張問禮等及縣官四十七員量奬主簿賈應元王階提問縣丞鄧鴻等六員各行戒飭十二月壬辰總理河道右都御史潘季馴以先年給繇加太子太保工部尚書兼都察院左都御史照舊管事辛亥工部尚書曽同亨等奏今秋河決山陽隄田衝潰及江都邵伯等處湖水下注州縣浸傷皆繇管河各官怠悞修守科臣朱維藩欲特設廵河御史一員督理宜即敕管河各官務要著實修守有怠悞者㑹總河衙門叅究不必另設憲臣以滋勞費從之明神宗實錄行水金鑑巻三十三
