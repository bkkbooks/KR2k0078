body:
  text: 行水金鑑卷三十六江南按察使傅澤洪撰河水山東險要山東兖州府曹單二縣有太行隄六十九里有竒創自𢎞治十年河決黃陵岡大傷張秋運道先臣都御史劉忠宣公自河南以至碭沛築長隄一道即太行隄也向來修守止及近水縷隄而行隄置於度外萬歷四年河決魯家口則曹單金魚被淹殆盡萬歷八年題準大加修築屹然可恃以後每二年一次加幫著為定例當事者慎毋居安忘危爽期廢格可也河南險要河南黃河南岸逼近省城藩封重地最為喫緊如滎澤縣之小院村中牟縣之黃煉集祥符縣之瓦子坡槐疙疸劉獸醫口陶家店張家灣時和驛兔伯堽掃頭集陳留縣之王家樓蘭陽縣之趙皮寨儀封縣之李景髙口普家營商丘縣之楊先口俱為要害劉獸醫口先年築有掃壩壩內有月隄一道惟恐月隄不支又於萬歷十七年築遙隄一道長二千七百三十二丈足為屏翰本年題準掃壩不足恃專守月遙二隄訖又陶家店幫接隄長一千八百七十一丈壩長三千六百二十九丈張家灣加修舊壩一道舊隄一道時和驛幫築隄長九百二十丈壩長三百二十七丈又兔伯堽至掃頭集止有一隄倘被衝決則水直至野雞岡趨鳳泗重干陵寢萬歷十八年增築遙隄長二千九百三十丈重門待暴或可無虞又趙皮寨起至李景髙口一帶係黃河舊趨鳳泗故道萬歷十七年創築遙隄長二千三百五十九丈九尺最為要害宜愼守之北岸迫近漕河關係運道最為要害如滎澤縣之甄家莊郭家潭陽武縣之脾沙堽原武縣之廟王口封丘縣之于家店中欒城荆隆口祥符縣之黃陵岡陳橋貫臺馬家口陳留寨蘭陽縣之銅瓦廂板厰樊家莊張村集馬坊營儀封縣之穵泥河煉城口榮華樹三家莊考城縣之陳隆莊芝麻莊孝城口俱為要害荆隆口萬歷十五年河決長東二縣幾溺萬歷十七年創築遙隄長二千九十丈所當加意防守又榮華樹幫築隄長一百七十五丈六尺壩長五百五十九丈三家莊創築壩長二百七十丈芝麻莊創築壩長八十六丈孝城口補築隄長二十八丈壩長二十丈四尺皆係喫緊隄岸並宜分撥官夫防守不懈者也以上南北兩岸要害處所每歲冬春掌印管河官沿隄相度或預捲乾掃以防其汕或多築磯觜以遏其衝各該管河官駐守河濵該道不時巡閲四防二守之法務須三令五申丁寧告戒愼之愼之𢎞治十年河決黃陵岡張秋運道淤阻都御史劉忠宣公築有長隄一道荆隆口之東西各二百餘里黃陵岡之東西各三百餘里自武陟縣詹家店起直抵碭沛一千餘里名曰太行隄蓋取聳峙蜿蜒如山之狀南岸亦舊有長隄一道起自虞城縣至滎澤縣止兩隄延亘一千五百餘里實為該省屏翰但地鮮老土最易衝汕卑薄巳甚已經題加幫築於萬歷十七年計築完隄壩共長四萬八千一百二十二丈庶幾可恃以後年分管河官各照地方但有剝損悉如歲修事例覔取老土實杵加幫髙厚不得擁沙塞責管河官不時巡視探驗加意毋忽直𨽻險要直𨽻大名府屬長東二縣舊有長隄一道延亘一百三十里東至山東曹縣白茅集西至河南封丘縣新豐村止隄外即有淘北河一道相傳即黃河故道也萬歷十五年河由河南封丘縣荆隆口決入夾淘北河衝決本隄之大社口兩邑昏墊該工科都給事中常會同撫按題奉欽依修築隄完然隄外有月隄三壩名曰三尖口吳家口劉家口在長垣利在泄水不肯閉塞在東明懼其受淹堅欲堵截兩相掣肘雖有壩名終屬虛應即今長隄專設府佐駐守杜勝集而又畫界分理長垣縣管九十七里東明縣管三十三里建鋪設夫以時修守隄既固矣三壩有無不足較也夫壩之有無係於長隄而隄之利害全在荆隆一帶故添設開封府同知專駐劄荆隆雖衛河南實衛長東二縣也總之荆隆堅守則長隄無事長隄無事則三壩不用二縣之民永帖袵席此探本遡源之論不可不知也長東河官須時時偵探荆隆口隄岸少有衝汕即申總院施行以上河防險要一築隄凡黃河隄必逺築大約離岸須三二里庶容蓄寬廣可免決齧切勿逼水以致易決隄之髙卑因地勢而低昻之先用水平打量毋一槩以若干丈尺為準務取真正老土每髙五寸即夯杵三二遍若有淤泥與老土同第須取起曬晾候稍乾方加夯杵其取土宜逺切忌傍隄穵取以致成河積水刷損隄根驗隄之法用鐵錐筒探之或間一掘試隄式貴坡切忌陡峻如根六丈頂止須二丈俾馬可上下故謂之走馬隄工費凡創築者每方廣一丈髙一尺為一方計四工土近者每工銀三分最近者二分土逺者四分如隄根六丈頂二丈須通融作四丈折算此計土論方之法也如幫隄則先計舊隄若干今增髙闊各若干亦以前法折算一塞決凡隄初決時急將兩頭下掃包裹官夫晝夜看守稍待水勢平緩即從兩頭接築如水勢洶湧頭裹不住即於本隄退後數丈穵槽下掃如裹頭之法刷至彼必住矣此謂截頭裹也如又不住即於上首築逼水大壩一道分水勢射對岸使回溜衝刷正河則塞工可施矣塞將完時水口漸窄水勢益湧又有合口之難須用頭細尾粗之掃名曰鼠頭掃俾上水口闊下水口收庶不致滚失而塞工易就也掃以土勝為主掃臺須要卧羊坡以便推挽揪頭繩須要緊扯以防下淌又須時時打鬆令其深下仍覔慣會泅水之人入水探驗砥掃著地方下簽樁簽樁須要酌中掃掃釘著方為堅固倘有數寸空懸無有不敗事者如寒天或水急不能泅水即看揪頭寬鬆便是著地之驗繫繩留橛令人專守略有走動便須另下一橛橛頭上填記第幾掃揪頭滚肚明白以便點查收放掃靣出水未髙寧加一小掃不可多用土牛推掃時易動故也此等事須要勇往直前俗諺謂之搶築稍稍逗遛必有後悔以上數端茍不詳審勞費罔功輒疑鬼怪甚可嗤也如用大掃長五丈髙六七尺者用草六百束每束重十斤價銀二釐該銀一兩二錢栁梢一百二十束每束重三十斤價銀一分該銀一兩二錢如無栁梢以葦代之草繩六十套每套四十二條每條長二丈四尺價銀三分該銀一兩八錢樁朩五根每根銀一錢該銀五錢揪頭滚肚繩四條共用􅐨二百五十斤每斤價銀五釐該銀一兩二錢五分每大掃一箇約共該料價銀五兩九錢五分挑土夫土逺近不等難以預計中掃并土牛工料以次遞減一下護根乾掃凡隄係掃灣須預下乾掃以衛隄根此掃須土多料少簽樁必用長壯入地稍深庶不坍蟄如下長三丈髙三尺掃一箇用草一百六十束該銀三錢二分栁梢四十束該銀四錢草繩十二套該銀六錢樁朩三根該銀三錢量用􅐨作行繩用隄夫二十工不議工食每掃一箇約共該料價銀一兩六錢二分一栽栁護隄卧栁長栁須相兼栽植卧栁須用核桃大者入地二尺餘出地二三寸許栁去隄址約二三尺密栽俾枝葉搪禦風浪長隄須距隄五六尺許既可捍水且每歲有大枝可供掃料俱宜於冬春之交津液含蓄之時栽之仍須時常澆灌長栁宜用棘刺圍護以防盜拔畜嚙一栽茭葦草子護隄凡隄臨水者須於隄下密栽蘆葦或茭草俱掘連根叢株先用引橛錐窟深數尺然後栽入計闊丈許將來衍茁愈蕃即有風不能鼓浪此護臨水隄之要法也隄根至靣再採草子乘春初稍鋤覆密種俟其暢茂雖雨淋不能刷土矣四防一曰晝防隄岸每遇黃水大發急溜掃灣處所未免刷損若不即行修補則掃灣之隄愈漸坍塌必致潰決宜督守隄人夫每日捲土牛小掃聽用但有刷損者隨刷隨補毋使崩卸少暇則督令取土堆積隄上若子隄然以備不時之需是為晝防二曰夜防守隄人夫每遇水發之時修補刷損隄工盡日無暇夜則勞倦未免熟睡若不設法巡視恐夤夜無防未免失事須置立五更牌靣分發南北兩岸協守官并管工委官照更挨發各鋪傳遞如天字鋪發一更牌至二更時前牌未到日字鋪即差人挨查係何鋪稽遲即時拏究餘鋪倣此隄岸不斷人行庶可無誤巡守是為夜防三曰風防水發之時多有大風猛浪隄岸難免撞損若不防之於微久則坍薄潰決矣須督隄夫捆札龍尾小掃擺列隄靣如遇風浪大作將前掃用繩樁懸繫附隄水靣縱有風浪隨起隨落足以護衛是為風防四曰雨防守隄人夫每遇驟雨淋漓若無雨具必難存立未免各投人家或鋪舍暫避隄岸倘有刷掃何人看視須督各鋪夫役每名各置斗笠簑衣遇有大雨各夫穿帶隄靣擺立時時巡視乃無疏虞是為雨防二守一曰官守黃河盛漲管河官一人不能周巡兩岸須添委一協守職官分岸巡督每隄三里原設鋪一座每鋪夫三十名計每夫分守隄一十八丈宜責每夫二名共一段於隄靣之上共搭一窩鋪仍置燈籠一箇遇夜在彼棲止以便傳遞更牌巡視仍畫地分委省義等官日則督夫修補夜則稽查更牌管河官并協守職官時常催督巡視庶防守無頃刻懈弛而隄岸可保無事二曰民守每鋪三里雖已派夫三十名足以修守恐各夫調用無常仍須預備宜照往年舊規於附近臨隄鄉村每鋪各添派鄉夫十名水發上隄與同鋪夫併力協守水落即省放回家量時去留不妨農業不惟隄岸有賴而附隄之民亦得各保其田廬矣各鋪相離頗逺倘一有警别鋪不聞有誤救護須令隄老每鋪竪立旗竿一根黃旗一靣上書某字鋪三字燈籠一箇晝則懸旗夜則挂燈以便瞻望仍置銅鑼一靣以便轉報一鋪有警鳴鑼為號臨鋪夫老挨次傳報各鋪夫老併力齊赴有警處所即時救護首尾相顧通力合作庶保萬全守隄之法隄防盜決最為喫緊蓋盜決有數端坡水稍積決而泄之一也地土磽薄決而淤之二也仇家相傾決而灌之三也至於伏秋小漲處處危急鄰隄官老陰伺便處盜而泄之諸隄皆易保守四也巡警稍怠或乘風雨之時或乘酣睡之處即被下手矣防禦者不可不知河防全在歲修歲修全在物料而州縣河官視為竒貨歲估既定冒銀入已括取里遞草束河夫攀折栁梢遮掩一二便為了事近日徐州判官彭鶴靈璧主簿元仲賢之事可鑒也今議於十一月間司道官估計停當各掌印官領銀收買法固善矣又須特委亷能職官一二員專管收支工完之日將捲築過掃壩收支過物料數目開報總河衙門查考庶幾事有責成而錢糧無冒破矣又冬初修守稍暇即督夫於漫坡中採取野草每束十斤者每夫每日可採四十束積至百萬可省千金裨益非小草料既備掃護必周衝決之患可免即脫有不測而物料在手計日可塞何致延閣縻費此河道第一喫緊工夫也以上修守事宜河防一覽明神宗萬歷二十一年二月甲午起補廣西副使楊德政於河南專管修河乙未工部覆今日河道之患皆起於河身髙故自魚沛至徐邳一帶泛漫淹滋大為可虞甚且淮流梗塞瀰及祖陵致厪聖明隱憂特差給事中張貞觀會議查勘今本官報命內議開歸徐一帶逹小河口以救徐邳之溢議導濁河入小浮橋故道以行鎮口之患事經閲歷聞見必真又議引沁一節其剖析利害鑿鑿可據合行河臣會集地方司道等官逐一從長計議要見鎮口之壅作何宣泄徐邳之溢作何消導小河濁河兩議利害事體孰為緩急錢糧孰為繁省或應與前項腰鋪工役一并舉行或應於支河三議之中求一長䇿至其引沁之䇿事出創議更宜詳慎如利多害少務在必行或有患無功毋得輕動三月已卯升兵部車駕司署郎中事主事于若瀛為河南僉事專管修河七月甲寅先是工科都給事中劉𢎞寶等題總理河道尚書舒應龍題霪雨異常疏請賑沿河各州縣至是工部覆淮徐一帶被水災民敕撫按作速勘實破格蠲賑不允八月甲申總理河道舒應龍疏五月既望以來大雨傾注河流漲溢邳州城邑業已陷沒髙寶等處湖隄衝決及今修築其要有四一優夫役宜從寬估二亟賑貸冀發帑金及所積金花銀三溥聖惠徐淮數郡山東河南二省均乞遍及四專委任在假河臣便宜下所司議九月甲子旌表邳州河決負親避溺孝子廪生張縝從巡按李時華請也癸酉南京御史陳邦科題治河之法不外疏築濬疏者多穿漕渠以分其勢邇河身日髙恐分之則流緩而沙愈壅築者固隄束水以刷沙然徐邳以南節年增卑培薄不遺餘力矣卒未收刷沙之利而反滋衝決之害至於揚州髙廟一帶至儀真閘口地勢本亢兼之積淤漸墊當事者未務浚揚儀之淺而歲增髙寶之隄湖水常蓄深至一二丈餘而運隄遂以不支則河之未可專恃築而刷沙之未可專恃水亦明矣濬者去沙以滌其淤其方有三趁冬春水涸之候率沿河淺夫乘時撈淺則沙因撈取不停而去此濬之不費官錢者也官舟運舟商舟民舟往來如織舟尾悉繫犂耙乘風搜滌則沙因搜滌未寧而去此濬之不動官夫者也水碓水磨水激自旋若令智巧匠倣其意置為朩機乘水滚蕩則沙因滚蕩不留而去此浚之不勞人力者也用此三者積日纍月水赴海則沙亦赴海河不挑而深矣漫隄則沙亦墊隄岸不培而髙矣水決坎則沙亦盈坎窪不填而平矣用此法以濬黃流則黃身日就剝落淮出可以無梗而免鳳泗之危用此以濬揚儀則揚儀不虞淺澀湖水方可以少蓄而免運隄之危此外如淮必不可不會黃故髙堰斷不可棄湖水盈溢必傷隄故周家橋潰處斷不可開巳棄故道必淤滿故老黃河草灣等處決難復下所司議明神宗實録是年河復大為患決汶上決魚臺決濟寧決巨野其泛漲則宿遷髙郵興化邳州續文獻通考是年五月河決單縣之黃堌口一由徐州出小浮橋一由舊河逹鎮口閘南河全考是年五六月怪風猛雨海嘯河溢淮沭泇濴諸水會合所衝決者萬萬計溺死居民無算淮安府志明神宗萬歷二十二年二月乙卯戶部郎中華存禮請復老黃河故道并浚草灣工部侍郎沈節甫以為復者誠難輕議浚者似或可從乞命總河委官查勘兼查與原題腰鋪工程利害孰多事體孰當費孰省疏內所稱桃源四壩及小河口董家溝等處浚塞是否可行又言近來河患在於河身日髙髙在清口則淮水不得出而為祖陵憂故開腰鋪者所以使黃讓淮而安祖陵髙在鎮口則閘河之水不得出而為運道憂故開韓家莊者所以泄閘河之水而保運道然皆補偏救弊臣部日求治本之䇿而未得乃議者紛然多不可行之事宜槩覆停上曰可庚午工部覆總河舒應龍疏言河工巳有次第請停止月報通候工完類奏錢糧其委用官員甄别議處上以應龍忠勤候特旨優敘餘官分功罪具報九月已卯以總督河道工部尚書舒應龍回部管事壬午升兵部左侍郎顧養謙為工部尚書總理河道明神宗實録明史稿飬謙傳無總理河道之命以未任故也明神宗萬歷二十三年二月丁未詔以南京都察院右都御史楊一魁升工部尚書兼都察院右副都御史總督河道三月甲戌工科都給事中吳應明奏淮黃二流會於清口而海口一帶則淮黃之尾閭也先因黃河遷徙無常設遙縷二隄束水歸漕乃水過沙停河身日髙徐邳以下居民盡在水砥今清口以外則黃流阻遏清口以內則淤沙橫截強淮倒灌上流約百里許淮水僅出沙上之浮流而瀦蓄於盱泗者遂為祖陵患矣先年科臣張貞觀所議自腰鋪開一支河歸之草灣或從清河南岸另開小河至駱家營馬厰等處出會大河建閘啓閉一遇運淺即行此河亦䇿之便者至治泗水則有議開老子山百折而入之江者即排淮泗注江之故道也宜於此處建閘淮平則閉秋漲則開使不得為陵泗患又考河形北髙南下張福口居淮河北流與清口對隄張福則水向南而淮病隄清口則水向北而淮不病故拆張福隄而於清口造隄以束之亦兩利也疏下工部覆稱腰鋪支河之開及濬清口之議容臣等行總河詳勘次第舉行至疏海口開老子山決張福隄與夫建閘扒沙實土甃石之議事難遙斷恭候命下行漕部院及各御史會勘畫一以憑覆請裁奪詔如部議丙申工部議覆淮安府管河同知唐民敏因勘徐州管河州判彭鶴侵尅河工歲修銀一百八十兩以致牛市口潰決先經總河潘季馴題參民敏不即承問致彭鶴亡去遂并劾民敏革職蓋民敏與彭鶴先同官徐州季馴疑其有庇也乃勘科張貞觀極稱民敏清吏止爭磨臍河總河主塞民敏主留遂銜民敏借彭鶴事以發之除彭鶴追贓發遣民敏相應憐惜遇缺推補從之四月癸亥巡按直𨽻牛應元因瞻謁祖陵目擊河患乃繪圖以進隨上疏言黃淮交會其來已久今獨責黃髙淮壅者起於嘉靖末年管河部臣見徐呂二洪巨石巉巖橫亘水中運船不便令鑿去河中衝激之勢淤沙日停河身日髙於是潰決起矣當事者計無所之旁河兩岸築長隄以夾束之名曰縷隄縷隄復決更於數里外築重隄以防之名曰遙隄雖歲決歲補而莫可誰何矣但黃淮原有交會處黃從西北來自清河縣北二十里駱家營折而東至大河曰會淮所稱老黃河是也永樂初準平江伯陳瑄以其迂曲從駱家營開一支河為見今河道而老黃河淤矣萬歷年間復從草灣開一支河黃舍故道而趨以致清口交會處二水相持淮不勝黃則竄入各澗口淮安士民於各澗口築一土埂以防之嗣後淮黃暴漲水退沙停清口遂淤今稱門限沙是也此時當事者不思挑闢門限沙唯習築塞之故智費巨萬金錢傍土埂築大堰橫亘六十里名曰髙堰全淮正流之口置不為理復將從旁入黃之張福口一并築隄塞之遂倒流而為祖陵患矣前歲勘科張貞觀始議闢門限沙裁張福隄其所重又在支河腰鋪之開總之全口淤沙未盡挑闢即腰鋪功成淮水未能出也况目今下流鮑王諸口已決難以施工豈若復黃河故道盡闢清口淤沙之為要乎至欲於上流施工則不如科臣吳應明疏中所云就草灣下流浚諸決口俾繇安東歸伍港是一䇿也不則原議周家橋量為疏通亦為一䇿若乃急將黃堌戎家等見決水口早為隄防又於蕭碭等瀰漫處挑成渠道又於符離集一帶河身淺阻處量為疏利至宿遷縣西舊有小河一道為淮水入黃正路急宜挑闢使有所歸大意唯以復淮故道闢門限沙為主而腰鋪之開海口之浚在所緩者已而總河舒應龍報稱張福隄已決百餘丈闢口挑沙見在行功至腰鋪之開尤不可廢事下工部侍郎沈思孝因奏言臣頃道出淮口詢諸父老皆謂黃髙勢猛淮弱倒灌抑此患者唯有復老黃河於上以奪其勢闢清口沙於下以通其流因詢所謂老黃河則自桃源縣三義鎮起至葉家衝僅八千餘丈河形尚存工費似易一意開浚河勢必分為二一從故道抵顏家河入海一從清口會淮患必可弭矣第議論甲乙未定既奉有差官踏看之旨請著風力工科一人會同總河總漕與各御史從長計議務期僉謀畫一永有利賴可也上詔著風力科臣一員去會同地方官計議其工易舉者作速隨宜疏泄以安陵寢事干重大垂永利者仍確議奏報不得仍前怠玩以取罪戾五月戊戌御史秦懋義稱河工艱巨督臣楊一魁力薄難肩欲以總漕戶部尚書禇鈇代之吏部覆稱用人須盡其長當機不宜輒易宜令照舊供職從之明神宗實録行水金鑑卷三十六
