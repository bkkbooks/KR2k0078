body:
  text: 行水金鑑卷三十七江南按察使傅澤洪撰河水明神宗萬歷二十三年六月癸卯總理河道工部尚書楊一魁以御史秦懋義論其力薄不堪艱巨乃上疏乞罷且言清口宜浚黃河故道宜復髙堰不必修石隄不必砌減水閘壩不必用乞查臣先後奏議并行司道文移茍有可采勿因臣去而廢其言詔以盡心任事不允辭庚戌禮科左給事中張企程言臣奉命勘河或憚於炎暑懾於波濤而涉覽有遺地或誤聽人言拗執巳見而商確有遺謀或蓄疑猶豫持論模稜有所諱而不言或阿附要津阻撓豪右有所畏而不行皆臣之罪若其身先庶職虔始慮終則總河臣之責也至於督漕巡漕部司諸臣所與共事地方者職各有屬人各有謀倘據先入之説持偏執之見秦越異視齟齬難合陽是而陰非甫行而輒罷則勘為徒勞而議為徒説矣候命下備咨總河漕部院行令司道管河各官及咨都察院轉行巡歷各御史務秉虛心以圖永利詔如所議九月巳卯江北巡按御史崔邦亮條陳治河事宜有曰今日之事不在勘議而在果斷今日之功不在謀始而在考成欲事之成必専責之巡河御史而御史中當於髙舉牛應元內擇一人任之以二臣舊按江北經歷指陳皆所素練且言開決處欲取地方甘結疏上工科給事中林熙春等言遣臺臣巡河有三不便莫若令科臣張企程寬限以相度成功為按臣蔣春芳加敕以稽核錢糧敕諸臣以同心共濟毋爭職掌以隳成功而圖規避戶科給事中程紹復言邦亮意在分爭不為通論均為王臣茍利社稷何分臺省謂科臣主於勘議心無窮而限易滿則何不代請寬限而必欲另遣一人以滋紛更之議哉今意救祖陵不敢謂於運道生民全未有礙然亦當次第行之可耳若必欲取士民甘結而後行事則築舍道旁之説也疏下工部部臣據熙春二説以請上報可壬辰勘河科臣張企程總河楊一魁等議欲分殺黃流以縱淮别疏海口以𨗳黃蓋以淮壅由於河身日髙河髙由於海口不深若上流既分則下流日減清河之口淮無黃遏則泗之積水自消而祖陵永保無虞總漕禇鈇以江北歲遭大祲民不堪大役欲先泄淮而徐議分黃工部謂𨗳淮分黃勢實相須不容偏廢宜將𨗳淮分黃并疏浚海口等處工程逐一舉行其一應工費酌議動支事完日分别勸懲悉報可丙申時治河諸臣議論稍異河臣既欲分黃以𨗳淮而漕臣以黃家壩之役工力重大宜在所緩御史牛應元折衷其説言治水猶治病病有的症藥有緩急黃淮的症也初因草灣之開宣泄不利遂致黃流上壅繼因黃流之壅遇漲逼阻遂致淮流下決尋因淮流下決清口空隙河水乘而上演遂致有門限沙之勢至沙勢隄防淮壅而潰為患遂滋今欲為治標之圖則如漕臣言𨗳河南下大破曲防諸潰俱泄勢便而功甚易若清口之壅如故則病根原在欲為治本之圖則如河臣言分黃他避淮流無侵功大而利逺但水勢之通塞難定而交會之風脈有妨若歲月不效則受病無巳科臣林熙春河臣楊一魁業奉重托科臣張企程業奉特遣分黃勘議業奉明旨是河臣既身肩大役原疏所請亦不過六十八萬金而止國家亦何靳於此唯是蠲免不可不議勸賚不可不先侵尅不可不禁紀律不可不嚴願俯允河臣之請以鼓億兆之心工部兩具覆上從之十月壬寅工部覆治河諸臣酌議分黃𨗳淮大工四事一曰議錢糧二曰議官夫三曰議分委四曰議肅法并留科臣張企程督工完日回朝上悉從之丁未留江北鳳廬等府漕糧二十四萬石為河工挑濬口糧仍留太倉助工銀十二萬兩抵折亦以江北被災故也戊申南京四川道試御史陳煃舊令寶應慮周家橋既開則必以髙寶邵伯為壑運道民産鹽場交受其害上疏言之語甚激且言治水必先疏下流自興鹽迤東如白塗河石䃮口廖家港等處條為數河分門出海然後從下而上將清水潭子嬰溝等處疏濬深廣使水有所容又於瓜儀多開閘口以廣分泄之路庶免潰決之患又云河強淮弱淮退則河進萬一逆行為害更大五港口之議亟宜舉行大意欲分黃為先而淮不必深治且欲多開入海之路令髙寶諸湖之水次第東行而後周橋武墩之水受納有地工部謂分黃𨗳淮二役伊始重巨難支復有興鹽開河之役工費更當何砥請下治河諸臣勘議報可辛亥勘河給事中張企程奏限期巳迫専候部覆回京而河臣楊一魁邀與共事因言有一可留四不可留意欲専責撫按與河臣同心共濟勿以意見之嫌致誤成功工部據疏具覆且謂河臣疏留科臣巳奉明旨無容别議但望堅始終委任之心假以便宜以消疑阻上悉從之十一月辛未時分黃流巳有成議漕臣禇鈇終以為慮遂據淮安府知府馬化龍分黃五難之説潁州兵備道李𢎞道謂宜開髙堰具疏上請大意以𨗳淮功小易成分黃功巨難就唯漸開髙堰急闢清口河方於祖陵王氣無礙而運道民力亦胥賴之疏上科臣林熙春言積水為患淹及祖陵者淮也流行不駛致有退縮者非淮也障淮不東令無旁泄者堰也泥沙日澱致淮滯流者非堰也故𨗳淮分黃之議不自今日而巳然矣馬化龍五難之説可置勿問唯是李𢎞道力主開髙堰一節關係非小若以長淮之水盡決髙堰而下之滔滔東注有不潰漕渠而壞田廬乎或者曰祖陵運道民生三者髙堰未修而無事髙堰既修而多事殊不知淮猶昔日之淮而河非昔日之河先是河身未髙而淮尚安流今則河身日髙而淮受倒灌此𨗳淮固以為淮分黃亦以為淮乞敕工部亟為議覆如事有緩急不妨酌量次第舉行工部覆言先前議開腰鋪支河以分黃流以倭警災傷竟至停寢遂貽今日之患上厪聖怒重譴河臣今黃家壩分黃之工再行阻格萬一淮壅為害誰任其咎合備行治河諸臣殫心畢慮將𨗳淮分黃工程亟行興舉其髙堰應決與否仍聽科臣會同河漕諸臣從長酌議詔報可丁亥調河南左參政兼僉事王嘉謨管理修河十二月乙巳南京吏科給事中祝世祿奏禹之治水濬之也非隄之也三十年來當事者不師禹而師鯀徐淮之河束之以縷隄隄善決決而塞不勝塞也又外加以遙隄蓋緣曲護運道故以築塞奏功亦以築塞貽害頃者議主疏浚分黃以治其本𨗳淮以治其標分黃功先下流安東五港别開海口至為得䇿獨𨗳淮除浚清口外議開髙良澗子嬰溝放淮從廣洋湖東入於海議開武家墩注河放淮從射陽湖東入於海廣洋湖闊僅八里射陽名為湖實則為河闊僅二十五丈離海且三百里迂回淺窄髙寶等七州縣之水唯此一線宜泄之宣泄不及即苦淹沒而又淮注焉田廬鹽場必無幸矣廣洋湖東有一湖名太湖方廣六十里湖北口有舊官河自官蕩直至鹽城石䃮口通海只五十三里此河見闊六七丈若加挑深廣此𨗳淮下流入海之一便也至云周家橋放淮下髙寶諸湖從金家灣芒稻河南入於江而此灣此河入江之路甚隘十不能入其一二非開廣十五丈深五丈許不可工部據疏覆請詔令與勘河科臣總河總漕及各御史等官從長酌議以奏明神宗實録余嘗考山海經河自崑崙歷數千餘里至徐邳出清口會淮而東入於海淮自桐柏挾七十二溪至泗眙經清口會黃而東入於海而我祖陵王氣屹然中峙誠聖子神孫億萬年鍾祥孕秀之地也漢唐若宋都秦都汴歲漕粟不過數十萬三十萬二十萬石而已我國家定鼎北平非四百萬石無以恃命非浮江絶淮挽河越濟無以通逹京師國家邊陲半倚鹺餉無論六十萬金場竈星布淮揚即林林總總之生齒髙寶興鹽通泰者亦不可勝算矣以故我朝經理漕河之臣最稱隆重其經理漕河之費亦最稱浩繁宜祖陵之鞏固如磐石漕渠之輸挽有利涉民生之攸奠有寧居也夫何頻年以來霪潦為災洪水泛溢河勢猛疾不受淮流沙為波激壅遏清口遂使淮水不得東注盱泗無從宣泄而陵園始有侵蕩之虞耳識者謂宜殺河流之強徑使不得為淮梗宜泄淮水之停蓄俾不得為泗病斯二者即醫家標本之説相為表裏而不可偏廢者也夫水之流於地中猶人身之血脈也血脈不調不察其所以受病之原與所以療病之䇿則撫視雖勤督理雖切均非對症之藥故曰緩則治其本急則治其標執此以投劑則病去而神王神王而營衛自固寧有潰裂而四出者乎寧有壅閼而不宣者乎萬歷二十三年淮水逆壅遂至泗城飄泊陵麓以外滙為巨浸民居田廬變為池沼致厪皇上宵旰焦勞詔旨屢頒督責嚴切衆議盈庭終成道旁之築莫可適從惟時總漕禇公則謂時有重歉𨗳淮宜先而分黃可已總河楊公則謂患有相因分黃宜急而𨗳淮繼之勘科張公則謂分黃𨗳淮折衷宜慎按臺蔣公毅然主持務在分𨗳並舉而楊與張意遂決矣乃於黃家壩開新河分黃由周伏莊袁家莊陳溪岔廟嵇朝口挂甲墩五港灌口入海又因鮑王決口議建閘座俾河水分泄亦入周伏莊與黃交會同至灌口入海夫分黃之議其説衆矣有從腰鋪開者但恐清河縣治夾於兩水之中漂泊侵嚙或有可慮有從老黃河開者雖係故道緣水勢背灣且原口淤為平陸惟黃家壩在清河之上黃流入口既順舊渠又有可因且與鮑王口下流交會誠為便利此分黃之大略治本之不得不先者也又於清河口酌議𨗳淮闢開門限沙裁去張福隄於周家橋則疏濬深闊於髙良澗議建滚水石壩於涇河疏渠築隄以通武墩之下流由射陽湖入海於子嬰溝濬渠築隄以分周橋髙澗之下流由廣洋湖入海又於金灣芒稻河闢一新渠俾之入江此𨗳淮之大略為治標之不得不急者也及黃壩工完放水之日黃水從新河入者十之五六從清口出者十之三四水勢頓減四尺有餘兼之清口淤沙盡闢周橋武墩髙澗堰壩疏通淮水滔滔順流會黃東注祖陵積壅向者漸逼幽宫今退至金橋數十丈盱泗民廬一旦脫昏墊而登樂土此有目者所共見有耳者所共聞謂非總河力任之功勘科贊襄之力按臺主持之決不可也議者謂淮黃交會清口乃祖陵一大合襟今從黃壩分流王氣稍泄殊不知二流之合始於武廟初年祖陵之葬肇於勝國末造我國家熙運天成非士庶家丘壑可比黃不東南而東北總為環繞同入東海即為會合豈在區區一清口哉况黃壩之水與鮑王之流會於周伏莊由灌口而入海黃河正流又與長淮之水會合於清口同由雲梯而入海是合襟之外重添一合襟矣何弗思之甚耶方泗州淹沒祖陵告危當事者既不敢言又莫能救初於外建隄以障之而隄內之水自若也尋又於內建子隄以障之而子隄內之水自若也尋又設水車於子隄以撤之一如泗州城中撤水移之城外之法然一月之撤不過一日之雨而即盈一日之雨加以一月之撤而不盡况地泉已滿縱撤何益大水常盈有隄何用臣子至此惟痛心疾首恨欲以身赴之尚可信堪輿之謬談拘合襟之俗説束手坐視而不為一拯乎天下未有浸先人於水砥而尚哆言形勝者也議者又謂泗陵水患病在髙堰求解祖陵之厄非去髙堰不可勘科洛源張公疏曰髙堰之築非始於近日乃漢陳登創之我朝平江伯陳瑄稍為增築至後髙寶淮揚連遭淹沒前河臣始大加修砌以捍禦之而水患稍息其功不可盡泯蓋髙堰勢髙淮水陡下疾若建瓴瀰漫平湖汪洋停蓄卒然不能入江逹海西風駕濤狂瀾東擊淮南一線之隄潰如破竹髙寶興鹽之民求為魚鱉不可得矣其為運道民生之患可勝言哉科臣祝公有言曰陵寢國脈也運道鹽場國計也民生國本也一病四痛有緩急而無彼此為運道民生鹽場任祖陵之沉淪誠悖德也為祖陵一利貽運道民生鹽場三害非完計也今周橋武墩髙澗即所稱髙堰也武墩周橋列於首尾髙澗當其中開此三處即拆髙堰無異也奚必盡屠其形迹而後謂之拆耶抑尚有隱憂也夫淮流行至清口會河入海能拒強河之不內灌者以全力勝也如髙堰一拆或周橋大開淮水大泄勢分力弱難以控河安保河之不躡其後而與淮南注乎是二水反背奔騰淮與黃風馬牛不相及合襟安在哉大都治河之法各有不同治弱者利用合治強者利用分宋儒曰以數千里湍悍難治之河而欲使一淮以疏其怒萬無此理分其半以殺其力則河患可平味宋儒之言則分殺河流楊公固自有見功在社稷三祖在天之靈當不使勞臣與草朩同朽腐也議者又曰欲𨗳淮須先疏黃欲疏黃須先開海口夫防河諸臣屢屢有究心海口者矣率多為雲梯一海口所拘也夫以萬里之橫流而泄以雲梯關之一口下流安得不壅遏上流安得不潰決哉論者率曰疏草灣曰復老黃河故道總之歸此雲梯海口耳浪談者且欲濬此海口嗟嗟海口套沙幾二十里潮退則沙見潮灌則深不測矣即驅十萬之衆費百萬之金何所著力鋓鋤釟蕩從何施乎訪之土人云雲梯關以北别有海口可以泄水者蓋河自清口南奔衝決鮑王口西入周伏莊陳溪等湖况開黃壩口分黃亦由周伏莊會合北趨東入羅家口桑墩等湖此處可析為五支一支入五港口一支入平望湖皆從灌口入海一支入五丈河入海一支從板浦入海一支從海州新壩連河入海諸口稍加疏濬便可通流今急建鮑王口閘使決口之水從閘而入分黃之水從黃壩而入會合於周伏莊由陳溪等湖從五口而入海黃河正流仍出清口會長淮從雲梯關而入海則分流之路既多宣泄之勢自易今日所謂下流計者莫善於此矣海口分司灌南樊公先任贛榆時業已究心於此至是疏請當寧見之施行五港一支業已沛達正圖循次漸舉不虞坐毁罷去未竟其志惜哉張兆元曰河之為患自古記之矣然未有害及陵寢如今日者當事者乃開黃壩以分黃闢清口以縱淮而又開周橋武墩髙澗以消盱泗積水又濬五港灌口以廣下流所謂治本治標之䇿可謂曲中肯窾矣總之急除祖陵之患以紓君父之憂耳乃有疾成而喜敗者吾不知其何以為心也張兆元分黃𨗳淮議保分黃𨗳淮大工告成薦升級工部議覆同知張兆元管轄新河迢遙辛勞回異尋常近經按臣疏薦應升服俸一級奉旨河工告成奠安陵寢有禆漕務朕心喜悅合宜升賞以酬勞勩張兆元升服俸一級是年三月總河楊一魁會禮科給事中張企程并撫按各院會題分黃𨗳淮明年行委郎中詹在泮等開桃源黃壩新河自黃家觜起至五港灌口止分泄黃水入海以抑黃強𨗳淮闢清口沙七里建武家墩涇河閘泄淮水由永濟河達涇河下射陽湖入海又建髙良澗減水石閘子嬰溝周家橋減水石閘泄淮水一由岔河下涇河一由草子河寶應湖下子嬰溝俱通廣洋湖入海仍恐淮水宣泄不及南注各湖為患又挑髙郵茆塘港通邵伯湖開金家灣下芒稻河入江以疏淮漲南河全考是年九月總督漕運禇鈇議𨗳淮總理河道楊一魁議先分黃次𨗳淮御史牛應元議合行之又為祖陵計黃堌口決當制小林口淤當挑歸仁隄當培上從之括帑五十萬役夫二十萬分黃𨗳淮自黃江觜𨗳河分趨五港灌口徑入海以殺黃勢毋盡入淮𨗳淮則自清口闢積沙數十里又於髙堰旁若周家橋武家墩稍引淮支流入於湖為預浚入江入海路以泄之祖陵水漸退而水患息明紀事本末黃河身髙至清口與淮會而黃性常強淮性常弱兼因沙墊遏淮流使不得急下水積泗盱間髙堰又無閘壩泄水總河尚書楊一魁専主分黃而總督漕撫尚書禇鈇力言分黃不若建髙良澗諸閘壩以泄淮為便會楊一魁先行部司諸官勘議分黃巳有成説乃會題準依興舉淮安府志是年巡按髙舉疏黃淮受病之原略云臣於去年奉命巡按淮揚比五月入徐時徐州月河新成積水盡泄臣一望黃流見城外有隄幾與城齊隄外有河水與隄齊且水日益漲隄日益增將不知其所終是黃水之日髙為徐城害者如此既由徐而泗一望淮水見城牆以內積水占之城牆以外淮水環之傾頽民舍淹沒民田是淮水之日髙為泗城害者如此又由淮安歷揚州見揚州迤邐漕渠三百餘里所恃一線長隄乃其所以為隄者皆岸上加土水髙平地多者丈餘少亦不下五六尺夫隄髙則漸薄薄則易潰今日報決清水潭明日報決濠家灣又明日報決邵伯口築土砌石歲無虛日聚料鳩工日無停晷閭閻日疲於奔命田舍悉滙為巨浸是漕水之日髙為地方害者又如此臣嘗得之咨諏蓋黃河之水自星宿海歷關陜奔騰萬里而入於海淮河之水自桐柏涉夀潁夾七十二溪之水由泗會黃而逹於海夫此沆漭兩河納百川需此一海口以沛其朝宗之脈則海口其咽喉也海口沙壅咽喉作梗斯則河泥日結淤而髙泥髙於河水漲於上向所稱吕梁一洪至為險峻今則履為坦途而不知有洪於是乎黃漲而徐城坐困矣強黃外抗弱淮中停况又截以髙堰隄以張福即向所稱洪澤等湖各有界限今則滙而浩渺無涯淮漲而泗城告急矣淮不此出勢必南注故每遇夏秋都管塘周家橋等處茫乎四十餘里水漫而南於是乎水漲而漕隄決矣於此而按其勢揆其源則鳳泗淮揚之陷溺病在淮淮停病在黃黃之泛漲病在海口是故疏海口以𨗳黃抑黃水以泄淮此誠首務第恐茫茫海口工力難施則於今昔所議三乂鎮耿公廟訾家營鮑家口等處另開支河驅由灌口而注之海以治其本黃水既分淮無壅遏或又盡決張福之隄大闢清河之口而縱之以治其標則祖陵以奠運道以安而鳳泗髙寶之民可措之袵席矣是年冬十月工部覆議得分黃𨗳淮大工事宜一議錢糧河工用銀六十八萬各役該領銀兩責成各道督率各府佐官每十日一驗依期給領不許稽遲致誤工程一議官夫該夫八萬餘名每夫給銀一兩五錢凡科索苦纍夙弊盡行禁革赴工之日照行伍之法每十有長每百有率各設旗牌以便識認稽查分界止宿以杜爭鬧設局施藥以療疾病調兵巡鑼以防意外之虞一議分委以便責成河工重大工費不資所賴以督率夫役稽查錢糧者惟大小官員也各府推官等兼督各州縣官分理周橋武墩涇河子嬰溝等處五港口三岔墩工程専屬之海口分司官并黃家壩三大工每工以部司及兵道各一人管理雇募人夫及放錢糧措備器具照查夫役責之各部司與各道查催工程核驗土方給散工食柴米等項則屬之府佐官一應收放河工錢糧屬之淮安府掌印官查盤分黃錢糧屬之廬州府推官各官如遇升遷不許離任一議肅法紀以整肅人心大工肇舉怨謗易生所賴以整肅人心鼓舞衆志者惟法紀嚴明也宜甄别勸懲有錢糧明白工程如式者定行紀勸否則紀罰總河以此甄别司道司道以此甄别各委官如橫生疑畏致隳大工者許指名具奏重治詔從之通漕類編以實録止存其目録此見當時治河之要行水金鑑卷三十七
