body:
  text: 行水金鑑卷三十八江南按察使傅澤洪撰河水萬歷二十三年九月二十四日工部題為𨗳淮分黃議論未一仰乞聖裁速決大計亟責成功事工科都給事中林熙春等題稱臣等辦事該科於本月初五日接得總漕戶部尚書禇鈇一本為直言災民艱苦之狀河工緩急之宜懇乞聖明酌議以祛祖陵積患以消地方隱憂事奉㫖工部知道又於本月初九日接得總河工部尚書楊一魁勘河禮科左給事中張企程各一本為祖陵水患日深國脈關係匪細懇祈聖明鑒照亟敕當事臣工早決治水長䇿以圖保安大計事俱奉㫖該部知道又於本月十一日接得四川道監察御史牛應元一本為河工㑹勘平成有期當事諸臣意見稍異敬陳致一之畫以決萬全之效事奉㫖工部知道臣等竊惟天下有大興作亦有大議論使議論而合也人得持定見而奏膚功議論而不合也人將憚異謀而隳成績今讀漕臣之疏則謂時有重歉𨗳淮宜先矣讀河臣之疏則謂患有相因而分黃宜急矣讀臺臣之疏則謂分黃導淮折衷宜慎矣大都誼切奉公何嫌彼此心在為國焉問異同惟是旁觀者身在委任之外而持議也易當局者身在付託之中而任事也難臣等請以淮河關係及疏濬稗議為皇上陳之河自崑崙歷數千餘里而至徐邳淮自桐柏挾七十二溪而至泗眙而祖陵王氣屹然中峙蓋聖子神孫億萬年鍾祥矣漢唐若宋都秦都汴歲漕粟不過數十萬三十萬二十萬石而巳國家定鼎北平非四百萬石無以恃命亦非浮江絶淮挽河越濟無以通達京師矣且邊陲半倚鹺餉亡論六十萬金場竈星布淮揚即林林總總之生齒髙寶興鹽通泰等處者亦不可勝算矣以故我朝經理漕河之臣最稱隆重其經理漕河之費亦最稱毁繁而不虞其今日之昏墊至是也為今之計倘亦一併分黃乎則珠米桂薪之地何堪大興九死一生之民何當重役萬一外變激發禍不在祖陵而且在地方此漕臣之所以有酌議之請也倘亦一意𨗳淮乎則淮勢既分强河不無倒灌河勢益振弱淮豈能相容萬一祖陵再淪禍不止運道而且移郡邑此河臣之所以有並舉之請也臣等私心以為天下事當論利害亦當論利害之重輕蓋利害在人者人猶得而握其權利害在天者人不得而操其柄則治人治地之别也治人無法則有河工亂無河工亦亂治地有法則無災不亂即災亦不亂顧其機則又在人而不在天耳今河臣楊一魁業已奉有重託科臣張企程業已奉有特遣上流分黃一併勘議具奏業巳奉有明㫖是淮河大役悉以付河臣矣在河臣之疏一則曰效有可必一則曰利亦甚多是淮河大役亦悉以身肩之矣河臣既以身肩淮河則據其原疏所請亦不過六十八萬金而止也國家雖甚稱詘措處亦可茍完倘此時猶泄泄未決恐日甚一日如根本重地何獨不可及今責成令其得以便宜從事乎如其只𨗳淮而可也則周家橋武家墩髙良澗金家灣芒稻河子嬰溝涇河之一一疏泄也惟河臣如其必分黃而可也則黃家壩毛家溝漁溝五港口之一一疏泄及娘子莊鮑王口之當有待也亦惟河臣如其𨗳淮分黃即折衷而可也則金家灣芒稻河之當從省黃家壩之當略濬鮑王口之當盡挑髙良澗之當建閘淮安城北之當益廣也亦惟河臣大率以數十萬兩而聽其設施以數萬餘衆而任其調度自是而某處當增也不得為虛冒自是而某處當減也不得為刻削務求一勞永逸無負朝廷任使乃為快耳不然而糜費金錢粉飾功績臣等且以白簡從之矣惟是勞民動衆容有意外他虞臣等所以處之者則諸臣疏中猶未及焉永樂中宋禮原武之役發丁夫十有六萬而無怨言者以蠲租百十萬石也景泰中徐有貞張秋之役發丁夫五萬八千而無怨言者以蠲瀕河民牧馬庸也况今大祲何妨破格是蠲免不可不議也董率官員惟亷生威惟能集事倘得正官解印専理庶為上䇿即不可得就擇佐領懸以旌書而省義原非受祿果效有勤勞省祭咨吏部超選義民亦給扁冠帶有差是勸賚不可不議也海口郎中樊兆程曽有河防末議謂十六年開裏河丈報二錢其實未給毫末十六年開魁山日報四分其實只給一半合無僉派之夫仍就丁免差召募之夫只就工算值其工食毋經胥吏牌長有司不妨煩瑣逐名包封唱名給散是禁尅不可不議也聚衆數萬豈盡一心謂宜定以界限編以字號以一約十以十約百庶免喧譁亦杜强竊是紀律不可不議也誠如是則興作之中即沾帝賑災罷之衆豈憚子來將見應協神人靈效山嶽即書所稱地平天成何以加焉伏乞敕下該部覆議速行河道諸臣分猷共念刻期舉行至於犒工之惠恩出自天并乞俯允河臣之請以鼓億姓之心臣等無任悚息待命之至奉㫖工部知道先該四川道監察御史牛應元題為河工㑹勘平成有期當事諸臣意見稍異敬陳致一之畫以決萬全之效事頃臣巡按江北目擊祖陵水患於是繪圖為說及條陳疏𨗳方略上聞荷䝉聖明嘉納特遣科臣張企程㑹勘節據本官同總河工部尚書楊一魁奏報疏泄要宜及陵園水消尺寸不獨聖心喜慰滿朝臣工莫不快稱二十年醖釀之患從此可以解除且冀旦夕確有成畫速奏砥績也不謂近接邸報該巡按御史崔邦亮題請治河臺臣期臻實效等因聞者莫不訝異臣以邦亮素有才名豈詎孟浪多事若此近又接總漕戶部尚書禇鈇揭帖為直陳災民艱苦之狀河工緩急之宜懇乞聖明酌議以祛祖陵積患以消地方隱憂事大都謂地方災傷九死一生之民不能供極大難成之役欲先將髙良澗建壩及周家橋金家灣芒稻河子嬰溝涇河等處各亟議疏通以為目前𨗳淮之計可以計日成功而黃家壩分黃之役工力重大姑在所緩等因則其意似與楊一魁張企程奏稱已勘定自黃家壩為分黃之計者若少相左然後知邦亮之疏蓋有激乎其言之也今照添差非宜業經科臣林熙春等建白該部具覆無容别議惟是事在為公何嫌異同而斟酌萬全總歸一致則諸臣之見正所以相濟而非所以相左也臣嘗躬歷其地體察頗真敢忘固陋再以諸臣之見折衷論之蓋治水猶治病然病有的證善醫者對證投劑而尤分君臣佐使以為緩急先後則其術周詳穩妥而病無不治矣若持一偏之見舉一而廢一昧標本之宜百藥而難試豈所以語國手也哉臣請先言黃淮的證而後及今日治病之方則標本當分而功難偏廢也夫黃淮的證何在乎初因草灣之開宣泄不利遂致黃流上壅繼因黃流之壅遇漲逼阻遂致淮流下決尋因淮流下決清口空隙黃水乘而上演遂致有門限沙之墊至於沙墊隄防淮壅而潰為患遂滋甚矣此則千百年主受之海口向未告阻數百年交㑹之黃淮向未告逆而獨二十年來醖釀之患所由致也謂非黃淮之的證歟的證在此今誠欲為治標之圖則如督臣言𨗳淮南下曲防大破諸潰俱泄其勢誠便而其工誠甚易者但旁溢之積浮可期盡祛而岸內之正流終難倒行若清口之壅如故則病根固自在也豈完計乎此河臣之不敢専力於彼者良非無見巳誠欲為治本之圖則如河臣言分黃他避淮流無侵百病盡郤其功誠大而其利誠甚逺者但水勢之通塞難盡預定而交㑹之風脈不可有妨若歲月之效莫必則受病殆無巳也豈急務乎此督臣之不欲首議乎此者良非無見已督臣有見則司道偏主分黃而將髙良澗通不議估者非也其必周家橋雖云衝開而伏落以後之淺阻仍加疏濬可也武家墩雖已開放而涇河子嬰溝之下流仍加挑闢可也至若髙良澗之建壩讓水猶或有限曷若抽砥建閘所泄更屬無滯乎如是則出口儘多自可以助清口宣泄之所不及而淮流泛溢之病將無不除矣其金灣芒稻二河既稱泄水甚快則再闊十丈之工姑從省焉可也少俟前工報完再看水勢緩急而為之圖可也無巳先將三閘中間隔砌拆去令其全口廣利常常通流亦可也何者水一落岸即旁堰諸泄口終歸涸斷又何必過需逺際之河道虛令空闊為乎則節其財力以充正項急用似為計之得耳是則以河臣之見酌行督臣之䇿乃所以相濟而非以相左矣河臣有見則司道専主𨗳淮而於五港等工槩不之急者亦非也其必清口沙雖云見闢而伏落水砥之板泥期於盡挑之可也鮑王口雖已衝決而運河五港之下流期於盡疏之可也至若淮安城北之故道商民向願疏通以便船貨往來曷若量與准行益廣分流乎如是則下流迅利自可以助草灣宣泄之所不及而黃流逼阻之病將無不除矣其黃家壩分黃工力既稱浩大即小估四十餘萬之費姑從省焉可矣稍俟前工報完再看水勢緩急而為之圖可也無已先順決口以下凡有淺阻去處略加疏濬拆去入口原壩或更置稍寬使水漲則分泄以殺清口强逼之勢水落則順流以保清口交㑹之脈兩利而俱存之亦可也何者清口一通則黃淮相附而行原自順軌又何必過為上流之强挽虛糜金錢為乎則節其財力以充正項急用似為計之得耳是則以督臣之見酌行河臣之䇿亦所以相濟而非以相左矣蓋良醫治病期於病除斯已故不可使方外有餘證亦不可使證外有餘方臣愚所謂標本宜分而功難偏廢者此也其財力之省而易就無俟言也伏祈敕下該部行令㑹勘諸臣再加采擇施行未必非合異為同終奏砥績之一助矣他如黃堌口之果否可無節制小河口之果否可無開通歸仁隄之果否可恃永賴誠恐早不為所萬一涓涓不塞流成江河他日引全黃而南徙不但地方淪溺可虞而關係祖陵利害尤不啻淮溢之患止於漫衍浸漬巳也此臣業已備陳曩者原題疏中而部覆未之及者伏乞天語并加叮嚀申飭當事臣工通一勘議漸次修舉則尤萬全無弊之術也緣臣犬馬愚悃欲始終少禆大計兼恐諸臣意見稍持亦不無耽延誤事之憂故敢不厭喋喋徒避馮婦之誚乃爾統惟聖明鑒照臣不勝瞻仰屏營之至奉㫖工部知道通抄到部送司案呈該部看得今日治河要務不越𨗳淮分黃二者而已故督臣禇鈇之欲先𨗳淮者謂時詘難以舉嬴也河臣楊一魁之欲併分黃者謂一勞可以永逸也已經本部覆請舉行無容别議外兹臺臣牛應元之條陳則又折衷二臣之疏總為一致之論謂如督臣之欲先𨗳淮當酌以河臣之見濟其所不及如河臣之欲併分黃當參以督臣之議助其所不逮庶彼此相濟而績用可成然又為祖陵萬年慮也則謂黃堌口之決當制小河口之淤當挑與夫歸仁隄之恃賴當培蓋臺臣原歷地方得於聞見之真故其所以酌量區畫者若此其深且逺也而科臣林熙春等之具奏則又權衡臺臣之論而専重於責成謂或先治標以泄淮壅或併治本以殺黃勢責在河臣或髙良之當建閘或金家灣等處之當從省或鮑王等處之當盡闢亦責在河臣庶責任既専而功效易就然又為勞民動衆計也謂宜急蠲免以恤災民厚勸賚以鼓衆志禁侵尅以惠夫役嚴紀律以肅人心蓋科臣看閲奏章得於參考之詳故其所以決策定謀者若此其周且悉也總而論之大要誼切為國而非所以為私志期相成而非所以相戾其為今日河工之禆益也豈淺渺哉恭候命下備行河道諸臣將二臣所奏各項事宜遵照逐一舉行惟黃堌口等處應否處置再加勘議俟工費稍有餘剩次第修舉其蠲免一節再俟撫按衙門酌議具奏定奪緣係𨗳淮分黃議論未一仰乞聖裁速決大計亟責成功謹題請㫖奉㫖是題覆河工奏議明神宗萬歷二十四年正月甲申工部覆工科都給事中林熙春題河工疏竊念𨗳淮分黃兩役並舉至為重巨而分黃之工比之𨗳淮分數尤多在事諸臣矢心協力業有成效但今漕船過淮在邇淮鳳播種届期春夏雨水多少尤難預度若不趁此春和刻期儹完將來國計民力何能兼濟科臣林熙春題議及此誠為有見乞敕各官將𨗳淮分黃一應工程各照分管地方責令夫役晝夜兼工依期完報若有怠玩誤事許該督與勘河科臣指實參奏庶祖陵永安河患永弭而運道農時兩無妨礙矣詔如議行辛卯工部覆工科都給事中林熙春題河工乘時報完等事上命便行與管河各官嚴督工程毋致延緩二月甲子直𨽻巡按况上進題河工已無遺䇿運道切有後艱宜將不急之工停止一面竭力分黃一靣併力清口庶分𨗳諸務方收實效部覆如議工部題秋冬河防已竣經管各官羅大奎等十一員髙郵等州知州等官許一誠等五十三員嘉奬髙郵等州判官等官施奉等五十五員優奬徐州等州同知等官丁偕等四十四員量奬睢州等州判官等官都鍾等十二員戒飭斥逐提問從之三月丙申工部覆御史蔣春芳題分黃𨗳淮之說真是石畫第分黃即所以𨗳淮而分黃之工未就則清河口之闢沙髙良澗武家墩之建閘周家橋之疏河撫臣之議亦確乎其不可易者蓋所以避時下泛漲之水紓祖陵眉睫之急也若分黃大工就緒門限淤沙盡闢祖陵無恙黃淮順軌則此數處不妨堵塞使淮水専由清口而出亦無不可今二瀆春流無恙各工漸次砥績乃喜事異論叢爾多口泥堪輿者曰分黃之工遂成則淮黃不交有傷王氣拘區見者曰髙堰不拆則淮流泛濫終淹祖陵不知武家墩髙良澗周家橋即所稱髙家堰也髙良澗其中而武家墩周家橋其首尾也開此三處即拆髙家堰矣必如何方謂之拆也而堪輿之說尤無根據蓋二流之合始於武廟初年祖陵之葬肇於勝國末造我國家熙運過卜原不係此况分黃工程毋論淮黃依合且有重添一合襟者而論者特未之思耳信如彼拆堰之說水直南射與黃風馬牛不相及合襟安在風氣安在信口而談其於國事若秦越人之視肥瘠不足聽也徒使當事者聞之囂然灰其任事之心唯是分黃與闢清口沙為第一要務但往者黃流未分一時積淮宣泄未及故不得不開周家橋武家墩等處以泄泛漲之水權為急救祖陵之計若髙家堰之不當拆則固無容議者乞禁浮言庶便責成議論既定而膚功可奏疏入從之四月甲辰戶部覆總督禇鈇奏摘陳緊要河工上曰河工重大夫役待哺錢糧不敷準借與鹽銀五萬兩令工部作速補還仍截留漕米六十萬石濟用八月辛丑禮科左給事中張企程題祖陵防患宜固河流分泄當亟乞將前勘應開下流諸工俟秋冬農隙集夫興舉其一應開泄入海白駒場等處河道都俟再勘不妨暫停以省勞費章下工部壬寅工部題覆總督河道工部尚書楊一魁條議分黃𨗳淮事宜十事一議展河岸以固隄防蓋舊河身闊二百餘丈尚有縷隄遙隄以束之而新河靣窄土鬆伏秋之防不可不慮宜於新渠中堅處所再闢二十丈以廣容納兩岸效遙隄之制另築厚隄一道以固衝擊其王家口周莊為運道經由之地令加浚鑿并築堅隄以便牽挽工期三載費約八萬於大工餘剩數內支用一議長夫以時修守蓋黃壩至五港口約三百餘里河隄始創勢易潰決議設夫一千七百名以待修救之用而州縣之加派果難乃於鎮口閘原設夫內裒四百名并髙家堰隄夫八百名盡調新河防守於山陽長夫裒撥髙堰清江浦諸處分守又以折鹽引銀歲募五百名責令遇有淺阻亟為挑浚則夫不增而用足一議設専官以便責成蓋修浚雖以夫役而督率要在専官其娘子莊以下應以府同知張兆元専為督察仍管清軍馬政而以總捕巡鹽二事改委通判其舊用巡檢者改設主簿二員各有信地則管理可以無虞一議裁新隄以免壅淮一議修祖陵以培國脈一議立河官以理淮泗俱入淮河一議設官兵以嚴稽察蓋五港口淮口地界四鄰河海既通奸凶出沒應添設五港巡檢司安東縣提調官吏弓兵俸糧於鹽課募夫數內動支専司稽察一議放湖水以疏漕渠入運河一議建廟宇以答靈貺蓋河之有神所從來矣而自建功以至竣役河伯效順酬報宜隆除坌廟及五港口立廟外議於黃壩周莊處所各建廟祀請賜廟額以示崇報一議備錢糧以儲歲用蓋守救之官既立則物料亦宜并儲宜於瓜洲通濟鎮口諸閘如儀真事例量取船稅以濟河工之用一議闢清口以𨗳淮流一議浚海口以免內漲俱入淮河疏上如議行九月戊戌工部奏河工告成宜加叙録以酬積勩如楊一魁禇鈇李戴沈思孝徐作吕鳴珂張天秩樂元聲張企程蔣春芳楊俊民荆州玉張允濟楊光訓等及有司官共效贊襄俱應分别升録廕叙即一手一足槩當酬賚以竣通漕護陵分黃𨗳淮之績甲辰總督漕運禇鈇奏再議分𨗳未盡事宜條陳塞黃堌口等事章下工部十月丙寅工部覆直𨽻監察御史蔣春芳題河工告成善後事宜條為一十六款乞敕河漕部院等官遵照施行一築邊隄以障潰決一砌新河以禦衝刷一裁張福隄以縱淮流一歲浚清口以防壅塞一疏籍家河以分橫流一闢五港口以助宣泄一建減水壩以分暴漲一積物料以濟緩急一設鋪舍以處夫區一議修閘以杜陵害一復淺船以疏河身一填泗城以護陵寢一治溝渠以興水利一塞黃堌口以防河徙一固王公隄以保漕渠一専責成以臻實效其說與漕臣合部覆如議議詳見後而後復有㑹勘之議工科署科事刑科給事中李應䇿奏河漕意見稍分乞敕協謀以急國患事部議黃堌口之決而南也在肅碭睢宿則病於淹沒在徐州至宿遷三百三十餘里運道頗艱故漕臣禇鈇謂黃堌旁淺太多徐邳之河幾奪以塞黃堌口為一義河臣楊一魁謂決口至一千二百餘丈深三丈兩岸浮沙堅築固難措手雖下楗捲築猶之無益河性趨下勢不可回况往年全河盡注徐邳下流壅塞鎮口張秋每患灌淤今年黃堌分流暴漲得泄既於鎮口有補又於運道無傷唯當於水澀地靣築草壩制朩閘引諸湖之水以濟目前浚小河口增築邊隄通睢宿一路之墊護鳳泗萬年之脈蓋漕臣主運河臣主工各自為見而方經賞賚之餘遽為異同之見故不得不再行析議者也丁卯河道尚書楊一魁漕運總督禇鈇各奏辭廕上以治河砥績加恩巳有成命不允所辭辛未吏題河工諸臣楊一魁禇鈇徐作等各升敘廕録如工部議報可乙亥工部題漕河黃堌口應塞應止公同㑹勘十一月巳亥吏部題原任郎中黃承𤣥駐劄徐睢兼管吕梁洪徐州洪事務報可已未工部覆總督禇鈇黃堌口速行疏浚報可十二月巳巳工科給事中楊應文奏勉留漕臣禇鈇與河臣楊一魁同心協理章下工部丁丑河道尚書楊一魁奏酌復漕河舊制謂黃堌口一股由虞城夏邑接碭山蕭縣宿州至宿遷出白洋河一小股分蕭縣兩河口出徐州小浮橋相去不滿四十里且係先年河經故道所當疏浚與正河㑹接濟運道夫役之用集山東河南徐邳徭夫二萬限止兩月更於鎮口閘以裏諸湖之水通放與小浮橋二水㑹則黃堌口不必塞而運道益無阻滯之患部覆如議行明神宗實録是年黃堌口決經年寸草不生睢寧縣志按黃堌口地屬山東單縣緊接河南虞城界由夏邑永城及南直隸蕭碭宿睢地方至小河口白洋河復入運河此口南射歸仁集石隄關係祖陵最稱要害本口初決時闊一千二百五十丈深二丈七八尺萬歷二十五年間復勘止闊六百餘丈內有沙渚二水中分各闊四五十丈經虞城孔家樓接碭山縣劉家集至王家橋九十餘里俱有河形口闊三百餘丈水深七八尺自王家橋至狐父橋十里係黃河故道口闊一百餘丈水深一丈四尺自狐父橋至蕭縣界三十里有大河形口闊一百三十餘丈水深二丈二三尺自蕭縣界起入盤岔河至兩河口七十三里亦有河形口闊一百二三十丈水深一丈五六尺自兩河口由山西坡瓦子口入永堌湖至宿州地方徐溪口七十餘里俱坡水散漫深七八尺自徐溪口至符離橋時村一百一十里闊六十餘丈深一丈七八尺自時村由靈璧縣地方孟山睢寧縣地方廟灣口宿遷縣地方耿車至小河口俱三十里小河口迤南有白鹿湖邸家湖二湖雖係瀦水湖靣闊逺一遇北風則怒濤奔逸勢必南侵慮為祖陵之患近自歸仁集起至孫家灣特築遙隄一道捍禦之名曰歸仁隄計長七千六百八十二丈八尺况今黃堌決口之水復經其下則其關係於祖陵也更甚而其防範於先事也宜周當事者須急堵黃堌口俾黃水盡入徐邳正河以濟運道仍堅守歸仁隄使橫流不致衝突盱泗以保祖陵此正今日第一要務特表而出之以告後之任斯責者張兆元黃堌口歸仁隄考行水金鑑卷三十八
