body:
  text: 行水金鑑卷四十一江南按察使傅澤洪撰河水明神宗萬厯三十年正月丁酉工部請給總河右侍郎李頤敕書得以便宜行事許之壬寅署工科右給事中田大益言黃河為患巳極治河失時日甚請亟將楊一魁罷削勘處嚴督李頤星夜到任不報二月戊辰工部尚書楊一魁覆河南巡撫曽如春疏近因蒙牆等口衝決黃河盡皆南徙勢趨邳宿今不亟圖轉盼水漲狂流非唯生民受昏墊之虞抑恐陵園有侵囓之患修築汴隄以障南徙誠目前保護至計第工程浩大費不下九萬該省嵗修止六萬餘應留漕折臨德二倉贓罰事例等銀以濟急需又汴隄上自歸德下至靈虹接連歸仁隄數百餘里若今河南地方已修完固而靈虹一帶尚為殘缺則狂瀾盡復奔南前工虛費應一并修築髙厚始保萬全宿遷小河口乃睢水出泄故道河渠尚未深廣兼以耿車兒灘橫隄年久殘廢莫能障禦為今之計速應疏浚小河口山渠仍倍築耿車等隄使黃流盡歸小河口則瀰漫自消而祖陵庶無他虞第前隄槩築決口既塞倘下流不浚上源必復淤塞恐衝決之患又必不免應通行各該撫臣同心興舉毋分爾我以上工程俱限春月報完詔嘉納之閏二月甲午朔鳳陽巡撫李三才議治河緊要之䇿鎮口閘起至磨兒莊倣閘河之制每三十里建閘一座依時啓閉以濟新運及堅城集至鎮口閘止挑濬河渠約費銀一十九萬有竒須留漕糧乃克濟事工部覆請詔濬河建閘及留漕糧等事令該總理巡撫悉心講求擔任行之許便宜處置動用興工毋得推延誤事丁未户部總督倉場右侍郎趙世卿以鳳陽巡撫李三才議留江北江南漕米抵河工支用疏爭之曰自河決以來運道梗塞臣為倉儲計且欲躬負土石以障洪流豈其一念杞憂甘後諸臣顧今太倉匱竭一歲所入不足以當一歲所出竊計二年後六軍萬姓將必待新漕舉炊而又逺在數千里外萬一水旱不時輸納愆期則數百萬生靈束手待斃尚復有京師耶如此景象極可寒心乃欲借留漕米為河工需不待智者而知其不可矣詔歲漕既難截留河工正需急用有何長䇿可以設處諉責總漕衙門亦非政體户工二部還詳議來戊午陜西河州運花寨等處黃河水乾見砥三月丁丑給事中胡欣言總河李頤病篤情真宜即允放敕該部就近推用責令刻期任事詔從之辛已吏部尚書李戴覆巡按御史吳崇禮議國家大務無過漕河往年並設漕河二大臣不惟繁劇各有攸司抑且艱大期於共濟頃因分黃𨗳淮之議所見不同防海備倭之虞為患孔急遂以詰戎專責之巡撫而以漕運歸并之河臣亦一時權宜之計未可以垂久逺況昔之漕運河道其要在淮揚故可以一人兼今漕運於東南而河決於西北欲以一人之身而東督儲西治河雖有智巧亦苦於力之不足矣請復舊制將總河衙門專管河務仍駐劄濟寧往來督理其總督漕運衙門仍兼管鳳陽巡撫防海軍務駐劄淮安咨行各該部換給敕書以便行事詔曰可陜西河州黃河水漲將河橋邊墩院房屋衝去蓋河水自閏二月二十五日流絶見砥至是日突漲也甲申升河南巡撫曽如春為工部右侍郎兼都察院右僉都御史總理河道提督軍務四月壬寅總理河道都察院右都御史李頤卒頤餘干人歷兵部尚書總理河道卒於任談者謂其有經幹可謂近代名臣工部尚書姚繼可以河患孔棘工費維艱請即檢臣纍疏命九卿科道計議百萬之費作何處辦其間浚河築隄建閘十九萬之數户部協濟三分之一先年成例具在并乞申諭刻期舉行報可乙已禮部以黃河淺涸疏言據陜西總督李汶巡撫賈待問揭報本年二三月間河州運花寨等處水深不過三尺往來人畜直渡交子岡綽遜河口黃河上流水盡乾竭等因臣等不勝駭愕今嵗天變頻仍火星失度日光如赭風霾黃霧種種示異未有若此河之為變者竊謂河瀆之行地猶元氣之周身而貨財流布於天下也今天下財力可謂匱詘而血氣亦已耗矣閭閻貧府庫貧獨礦稅監使及參隨土棍之家富耳神河天險源涸流徙而中更挾百川之勢以衝祖陵扼運道此脈竭財壅之象也伏乞皇上憬然深思罷礦稅撤中使人心既恱天意自回將見四海安瀾九河順軌在一念轉移間耳疏入不報乙卯工科給事中孟成已言陵運剝膚河工束手近得㫖允工部之請下九卿科道㑹議唯借內帑一切方可救急目前舍此不唯無神運鬼輸之術亦且緩不及事望早賜俯俞不報庚申總理河道侍郎曽如春疏上年蒙牆口決勢難南徙而蒙牆十二里之下若徐家口至李吉口百有餘里涓涓之流固在也屹然之隄如故也此東行故道所宜速為開復者但故道自歸徐至宿遷不下六百餘里非集夫數千萬備金百萬何能展手臣備查各屬衙門報前總河庫册總計猶不滿三萬之數日夜籌畫非請發內帑無䇿矣臣豈不知國用浩繁第念國家莫重於陵寢億萬年王氣所鍾又莫重於運道百萬斛漕糧所繇南徙之衝刷愈深故道之梗塞愈甚倘陵寢委之洪濤胡越起於輦下即盡捐內帑何及臣即萬死其何補哉不報五月乙丑工部尚書姚繼可言河工缺乏無措唯有請發內帑及河道歲積錢糧近以稅使搜括五萬三千有竒望諭令照數還給以濟目前急用得㫖內庫缺乏各項進供待用有何餘積兹不得已且借用太僕寺馬價三十萬兩其原屬河道錢糧五萬三千亦令留用以後不必搜括其户部原議之數依擬此外尚須接濟爾部悉心計處丁卯大學士沈一貫朱賡題昨蒙諭發馬價以濟河工具見皇上注念陵漕德意但京師外庫錢糧更無他積獨此馬價一項耳邊餉已借百萬今又借三十萬倘有本等急用於何取資且河工浩繁又非三十萬所能即了臣等敢獻一籌切照河漕所以久而無敝者實以歲修不輟之故而所以能歲修不輟者實以河道頗有餘積之故自稅使搜括以來所在罄竭如洗遂令工作無資河乃決裂今至借馬價矣若尚搜括不休譬猶方喂飢人以食而復割其肉豈但無益大憂將立見矣謂宜明敕稅使毋復將河道錢糧搜括毋復將河道工程騷擾同心協力以圖禆助而後河有可治之時此不過費皇上一言而殊勝作許多區處也自礦稅來皇上屢有不許加派小民之㫖但天下財力止有此數今工部措處豈有神運鬼輸之術不過議加派耳而不得不與前㫖相背矣又總河侍郎曽如春書來言山東巡撫黃克纘偏執王家口不可開之說所轄道府無敢眀目張膽以持忠議者事勢人情終難歸一究竟必祈遣官一勘始可定囂臣等看詳甚以為宜凡舉大事必有勘差昨工部有疏已經票上未蒙允俞臣等以為勘科關係河務緊要早乞皇上俯賜檢發更祈天語叮嚀委任責成五月丙戌工部尚書姚繼可言皇上既為陵寢根本慮而又念時詘之可憫為東南河漕計而免行搜括之貽害睿算周詳俾河臣可旦夕舉事不至束手無䇿而臣等亦得效犬馬以仰紓宵旰之憂除馬價銀三十萬兩已經移咨太僕寺查發其河道錢糧五萬三千移文稅監扣留聽總河徑自取用外所據河工百萬之費缺六十四萬有竒先年户部允協濟一十二萬尚缺五十二萬有奇邇來內外工作頻興監庫傳派繁巨外解纖微庫貯無餘此舉朝所共知非臣所敢推諉也及查河工大興歲修可已之數此內尚可通融伏秋在邇疏築宜勤若候設處全完未免耽延時日唯將前項見在銀兩先行解用其餘不足即於本部河道歲修銀兩陸續那湊且工程浩大其間可省可加或增或減總河臨期另有酌處臣等似難遽定也得㫖河工需用緊急便令各衙門遵行內稅監五萬三千兩如未解準留用若已解進不必扣留果有不敷另行具題議處六月癸已工部尚書姚繼可覆山西沁州知州余汝為條陳河務一沿河任事之責宜均夫河南山東鳳陽巡撫俱兼河務中河南河張秋夏鎮泉閘俱係管河特以事權不一設總河都御史節制之耳今秦越其心獨纍總河以致物故者削奪者後先相繼而總河遂為陷穽請申明璽書各處有河地方分任其責功罪一體庶同舟之念自專而事可永濟一河工緩急之勢宜審治漕治淮原非兩事疏濬塞三法本自相資夫淮水泛濫為祖陵患者黃水灌入淮水不出湧而起耳往時淮安閘口水漲則築水涸則啓年來規制廢格黃水倒灌入淮遂成巨浸故分黃𨗳淮此議甚當夫南流不斷又增決口水入止藉瓜州一閘豈能宣泄宜修舊制先斷淮安閘次塞蒙牆口使黃水不入再疏下流如芒稻白塔射陽三湖引淮入海使有所歸如是而淮泗之間不安流祖陵尚憂淹灌萬無是理也決口之初宜急包裹兩頭不使掃闊此為上䇿今已無及擇其稍緩稍狹處可施工者塞之下流既壅上流必淤乘其既淤然後補塞決口於力最便一山脈河水之性宜熟形家言黃河以南大江以北為中龍由陜入嵩過曹縣起泰山盡於蓬萊三島左一支自桐柏分水曰淮右一支自河南分水曰渭而黃河北流從天津入海此禹故道也自宋熙寧間引河入汴勢遂入淮貽患迄今此不察地脈之故也夫黃河萬里逺來合水既多更加雨澤湍急難制以區區人力事之不知量矣然水本就下帶土而行急則深緩則淤宜急不宜緩故可合不可分可以停而淤亦可以刷而闊沙與土異不可聚而可囊揚之則浮刷之則去凝之則堅此其性也識沙之性故令河不必開借水刷之堅土難立致借囊沙築之識水之性故支河必不宜鑿欲塞上口必疏下流欲通故道必塞決口此理甚明人所易見者唯山之土石有骨起伏有勢髙下分合本自天然善治水者因其勢而利𨗳之乃以奏功合選知地理有心計者沿州逐縣相度形勢俾全河在目庶不致漫嘗而徒費一錢糧經畫之制宜豫上䇿宜借內帑發水衡錢或議漕糧改折如先臣潘季馴所奏上則倣兵興故事內外省直協濟下則責成河南山東鳳陽院道各從地方工力酌議方略其行漕地方量派夫工助之而河道督臣總其成庶可措手今請發內帑已奉㫖內庫缺乏似難再瀆水衡金錢之匱舉朝共知唯請留漕糧先往户部咨允協濟五分之一本部題將漕糧抵數已奉旨準留其內外直省協濟河南山東鳳陽派夫值河工大舉之時近河諸臣自當分憂正所謂責任宜均之說也一治河簡便之法宜采不必别鑿此河向有故道如李吉口至徐碭間隄岸尚可因也不必議開全河中間略開小河一道通水自下而上近水處量留數丈以俟塞口將成并力運之黃水自然歸漕沙逐水走自然深闊此以水治水之法也舊議塞口必用捲掃每掃長闊不過以丈尺計所塞幾何往時崔鎮口決長不過一里深不過一丈二尺計用人工樁草􅐨麻等物并斜築上流共用銀一萬六千兩今䝉牆口長數里深倍之當用銀三十餘萬且有憂其難成者如臣前議不拘決口逺近從中擇其可施工者兩岸築入先用柳條單土隨宜築之次用囊沙之法中流最急處用船船不必另造也查各處運糧船拆造原有定額每拆一船除篷桅外估價不過二三十兩計費止三四掃之值耳宜於糧船回南過淮時查該拆卸者留用在厰者責令各處船夫駕至淮上收管約有千隻似省而便囊沙不必用布也江南米包每個值銀八釐再加草繩二丈即用百萬不及萬金即以開河夫裝貯沙土每包定以六斗以草塞口以繩緊束一人可負而走運至工所俟釘樁一定以掃捲邊運沙連包入水時日可集至中流急處方用舊糧船先期令夫船運土石或沙草滿載撐駕河濵每船用朩樁三四根下釘以篾䉡相挽以鐡猫扎定然後加土鑿沈一時而下水自阻塞更新開水道并力挑通使黃水流通故道自然深闊其費之省約事之速成可坐而照也一夫役募集之方宜酌河工重大役民動以萬計當此災傷之後沿門起夫裹糧從役大拂民情倘行臣前議開河止於通水借水刷之可省工力十分之四塞河用船用囊沙二法可省工力十分之三往時用夫十二萬十四萬者今可用夫七八萬而此七八萬先借留河南山東鳳陽班軍次宜借洪夫閘夫及淮安牙募夫總計二萬有餘此輩有本等工食每日每人加給銀一分約束頗易然後議起民夫選能幹有司統之并力興作河工自可計日就緒矣一天時寒暑之候宜乘河上之役入伏則水發難禦至凍則鋤畚難入唯春月夏四月與九十月乃可施工若不預為區處將來鮮不誤事宜行總河督臣速將築塞開浚事宜及錢糧夫役料理應分三四工以淮安塞口為一工以蒙牆塞口為一工以開浚舊河水道分作兩工各以本處道府官董理之坐名請旨而以往來相度稽察催督責之贊畫一切停妥待時而行庶臨期無誤其疏下流如芒稻白塔等處俟事定後相度議行一泇河挑浚之工宜罷先臣朱衡覆勘泇河謂性義嶺有沙礓侯家灣有巨石自梁城以至馬蹄灣湘砥板石長五百五十丈闊七丈工力難施費以三百九十萬計勘科議覆今疏𨗳之豈收全功不過借湖水以資糧運為目前計耳查泇河起自吕梁十里之下至宿遷之上落馬嶺正中有柳湖周湖連江蛤蟃二湖接濟最便而吕梁以北宿遷以南勢必取資於河若南北不通開泇奚益是開泇河不能不治黃河工有二用費益難處應停止并力河工詔俱依擬行治河大事令照防邊例總河與各巡撫共任其責功罪同論八月甲寅工科給事中胡欣疏臣惟河患上侵陵寢下妨漕運治河者求其無害於陵運而已不必於地方俱有利無害也頃者我皇上軫念河工事急特命漕河御史崔邦亮㑹同總河及山東河南直𨽻撫按等官勘議近諸臣投揭到科謂山東曹縣王家口有迎溜入淮之勢必欲挽全河而東無逾開王家口已而人言嘖嘖有謂王家口之開河南以為利山東以為害者有謂河身低王家口髙即開水未必來者有謂山東巡撫以開王家口為不可故㑹勘無疏且告病以自明者有謂總河亦知其不可故持論兩端以築隄建閘為得䇿以復全河耗財疲力為多事者於是河南道御史牛應元疏請詳議蒙下部覆勘臣愚謂河自蒙牆決口而下暨徐邳宿遷之間經歷三省豈能盡有利無害哉第當度地勢視水性為陵運計耳地誠髙難以引之東即利河南豈可縱使嘗試地誠下可以挽全河而復故道即不利山東安能從旁尼止藎臣先國家而後私圖不當各分畛域王家口誠不可開何不於㑹勘時明證可否若之何輪蹄鱗集而議者始從中格謂事體何臣竊為山東撫臣不取也至於總河皇上既挈全河付之治則其功不治則其罪果能實見得是即宜斷在必為天下非之不顧持兩可之說何為者若曰錢糧無出恐生變夫人未有自絶命脈斷咽喉者國家即匱乏寧坐視陵運阽危河臣受困乎臣意春初我皇上憤河事決裂斥逐誤事之臣簡任河臣假之便宜若朝不待暮陵運庶幾無恙顧不於無事時興工料理為陵運長久計一旦水患叵測隄潰閘涸起而圖之何及哉伏望皇上以和衷責撫按司道等官以佐事責河臣務期商確具題刻期舉事於陵寢非小補矣戊午工部以奉旨㑹勘河工等事覆李思孝疏奉聖㫖國家興舉大役不嫌再三斟酌河工既前有㫖著再勘昨科臣疏內又有異同還行與在河諸臣矢公矢愼務求至當永利不得有分彼此以妨國事爾部裏一面處治錢糧以待興作免致臨時無措十二月壬子禮部題河工鳩衆二十餘萬浚二百里此國家非常之役乞倣古人沈璧之意允總河所請令擇日致祭庶賴神庥以便經理報可明神宗實録是年三月河決蒙牆寺入歸德商永南徙而河與淮會入洪澤有關陵麓總河侍郎曽如春開挑王家口至明年秋工垂成而單縣蘇莊之河又大決矣南河全考是年秋河淮俱漲田廬畜産俱盡比壬辰水更大淮安府志是年河決荆隆口山左撫臣建議以天下莫非王土決南則見北決北則見南河不能兩據也今河趨於宋但遷民而避之賑其貧者即以宋為河纖毫不費而河已大治矣河南撫臣賈豐抗疏爭之廟堂憂及陵寢卒就豐議濬新河六百里强之北徙大工之役破中人之産數百萬家大工之後繼以瘟死者又數百萬家賈開宗治河議是年李公頤掌南京都察院事時黃河泛溢總河大臣或以罪去或以憂死迄無成功致厪主上旰食擇可為荒度者廷臣㑹推十數人未允及推公次日命下以御史大夫兼司空總督河漕兼程赴任䝉霜露涉風波奔馳千里而遙周咨計畫唯順下流為永賴具疏奏報先定期日鳩工疏略云必須上築決口下疏故道乃能鞏固皇陵永濟漕運先為隄防挑浚以救目前一時之急繼則殫力疏鑿以為日後經久之計第恐汴隄增修新土未堅則難禦排山之勢閘坐增建黃水斷流則實慮膠舟之患泇河備運濵湖支渠未開則又虞風波之險每一念及心悸股栗寢食俱廢敢不唯力是視幸而有濟何敢言功敬陳施為之略少紓宵旰之憂疏上天子以為然溫㫖慰勞時公方督率各屬巡行經理更念脂膏已竭時絀舉贏日夜焦思即積瘁嘔血輿回濟署卒贈兵部尚書劉應麒撰大司馬李公行狀戊按頤字惟貞號及泉餘干人隆慶辰進士行水金鑑卷四十一
