body:
  text: 行水金鑑卷四十二江南按察使傅澤洪撰河水明神宗萬厯三十一年正月乙丑工部言山東巡撫黃克纘奏開王家口固為得䇿而塞蒙牆口亦屬急務蓋王家口為蒙牆上源上源既達則下流不宜旁泄下流泄則沙易壅沙既壅則上源潰決之虞必有所不免者宜命總河酌覆從之戊寅工科都給事中白瑜等以總河曽如春揭稱河工見在銀七十萬兩尚缺三十萬兩錢糧不繼恐盡棄前工因上言國家既欲護帝鄉陵園之氣又欲漕江南百萬之粟挽全河而歸之故道皇上何愛三十萬不為陵寢民生永逺計乎且河程四百里而遙其錢糧分管當先立碑碣自司道以下承管諸官某人某地一一勒名若開歸地方防隄與防邊同增卑倍薄歲有修銀候人番卒各有疆界與其查參於後來不若嚴核於今日碑碣分樹功罪自明不報丁亥户部覆總河曽如春條陳河上切要事宜二款一儲薪米將濵河一帶州縣動榖碾米運赴工所以備治河人夫食用蘆草秫楷徑行附近有司先發官銀時值采辦一議蠲恤查僉派河夫州縣各將本年存留錢糧酌量蠲免其二十八年以前帶徴係未徴在民者準三十一年停徴一年以寬民力至於漕河挑沙築隄之地既屬小民恆産悉聽河臣㑹同該省撫按劑量安插毋致失所上曰省直屢遭河患今工作繁興夫役衆多百姓辦納艱難著各官加意撫恤接濟俾令鼓舞趨事二月已丑吏部言總河曽如春疏河工切要三事一示激勸見任河工州縣正官著實分别舉刺一明職掌河上委官專以該管河道為主别道不得干預一設贊畫二員比東征事例四月庚寅兵部以河工急需請於南京部總庫動支二十萬兩淮揚馬價一十萬兩兵部疏議陪京備用亦屬吃緊不得巳酌動十五萬先後給發兵部覆請從之丙午總理河道工部右侍郎曽如春卒如春臨川人乙丑進士清修勤職其治河也力主開王家口不撓羣議上方憚財用獨不愛六十萬畀之責成之命日下春亦竭智畢力至是卒於官議者惜之工科右給事中宋一韓等以治河任重時迫請令淮撫李三才帶管上曰河工垂成忽失總理大臣陵運所關萬分急切該部便即㑹推才望任事的二三員候旨簡用馳去以奏膚功已酉吏部㑹推河道將各衙門所舉彚名上請上命李化龍以工部右侍郎總理河道且曰河工重大著便星馳前去不必例辭庚戌工科右給事中宋一韓請急㸃總河并簡用河南巡撫上以河工緊急令李三才就近暫管候代其河南巡撫事務關係河道者該省巡撫暫與管理癸丑工部尚書姚繼可題總河應照邊鎮事體令江北河南山東等處巡撫官悉聽節制載入敇書一體遵行其藩臬有司等官有所推舉撫按衙門相同俱準正薦玩忽不遵者不時參治從之五月戊寅原任川貴總督李化龍辭總河新命上不允且以河工甚急令速赴任六月癸卯工科給事中鍾兆斗題自新河口開而故道漸通攔河壩築而決口漸塞在事諸臣之所稱說一惟以併力下掃盡塞決口使全河東注為第一義今則下流未塞上源已決且下流又多旁溢之水前此集百萬之生命畢力於新河今此合數省之物力盡用於決口未塞尚可為也塞者復決何以繼之伏秋水漲而不及塞猶可託也水退之後而不可塞何以禦之壩功垂成而忽廢新河既通而復淤而新總河兩奉明旨督促尚未任事乞行申飭上曰河工成否未定緩急難措李化龍著刻期赴任毋得再行延緩乙已工科右給事中宋一韓因李三才揭遂上言黃河故道已復陵運無虞惟是蒙牆決口未盡堵塞李吉口堅城集間有淺阻未盡挑浚南岸隄防單薄未盡挑築義安山清入小浮橋未盡歸一徐邳以下隄岸傾圮未盡增築而且戛戛乎歎河之難塞也防河猶防敵師有三鼓河有三候六月是其一鼓作氣時也七月則再鼓而盛八月則三鼓而竭矣今以河勢虛憍鋭不可擊合用李牧急入收保之法謹避其鋒急保掃壩并固守諸要害可也然河非持久之水也每泛漲一次不過三四日旋落矣俟其水勢消落機有可乘合用張仁願搶築三城之法即日萬杵齊發水漲復上可也至於李吉口堅城集以下水勢漫散決口既難猝塞而堅城諸處既無泄水之區恐其奔決口也愈怒其為力也愈專此時合用周亞夫以梁委吳楚之法姑少嘗之以殺其勢仍候水信以為工程可也若堅城以上深其中流徐邳以下髙其南岸使下流有所容上流不得決而舊河率以塞此十全之䇿固非今日所能辦亦今日所不可不辦也伏望亟敕工部飛檄諸臣速依舊總河分派工程悉心料理以圖萬全上令采其語與新總河行之壬午工科署科事給事中孟成已以河運喫緊信地俱屬中州請簡河南撫臣因言今之治河者汲汲塞舊河為第一要務矣臣以為浚新河為尤要何也蓋水惟下流則上通下淤則上決惟歸一則流散漫則淤河若潰決淺滯水勢散漫無所歸著上流復奔騰而下水難容注不決何待以故黃堌未塞而蒙牆即決者坐此弊也若新河不疏無論舊河難塞即塞矣而上流之處必有繼蒙牆而復決者此在新總河當有逺識灼見也不報九月戊申贈原任總河工部右侍郎李頤為兵部尚書廕一子入太學十二月壬辰工科都給事中候慶逺以河決蘇家莊禍中豐沛餘波且穿漕而東皆由管河運同許一誠獻議舊河臣減其濬河闊深丈尺疏請治其罪下之所司明神宗實録是年河決歸德都御史曽如春挑北河引河入淮謝肇浙曰當決歸德時所害地方不多時議皆欲勿塞山東河南二中丞議論不合廷推即以河南中丞曽如春總督河道不使齊人有異議也河南通志是年河決蘇莊衝入沛縣太行隄灌昭陽湖入夏鎮橫衝運道南河全考曽如春治河力主開王家口領六十萬金竭智畢慮既開新河雖深廣其南反淺隘故水不行所決河廣八十餘丈而新河僅三十丈不任受或告如春曰若河流既回勢如雷霆藉其自然之勢衝之何患淺者之不深如春遂令放水河流濁下皆泥沙流勢稍緩下已淤半矣一夕水漲衝魚臺單縣豐沛間如春聞之驚悸暴卒明紀事本末明神宗萬歷三十二年三月乙卯户部尚書趙世卿言河工用乏宜動支徐州分司庫貯商稅并漕米變價銀四萬四千三百三十八兩協濟從之四月庚戌工部尚書姚繼可題泇河業有成績泇成而漕可藉矣至於黃河衝徙魚鱉豐沛若非因勢利𨗳何以拯救元元總河議於堅城集以上開渠引河而下流多通復分六座樓苑家樓二路而水勢多殺既可以移豐沛之患又不至沿碭山之城行所無事莫善於此自今開泇分黃兩工並舉需錢糧若然眉除蘆課五萬兩本部行南部查發外其所望漕庫馬價等銀乞敕各該臣工曲為體亮速發以濟急需上允之八月辛丑山東巡撫黃克纘言自河決蘇家莊水淹豐沛下流壅滯黃水倒灌濟寧魚臺平地成湖況加狂雨彌旬城門之外即成巨浸單縣被淹雖止一隅而連歲河工人夫物力半取足於該縣運柳派及孤寡供應纍及諸生此三州縣必大加賑恤庶有起色至於漕運臨德倉糧非破格改折是趨之斃也請於存留糧內照以分數蠲免無糧貧民準免丁口鹽鈔災民酌量倉榖分别賑貸保定巡撫孫瑋亦言霪雨連綿田廬漂沒請留漕糧十萬石并留撫按贓罰少拯顚連俱下户部十月甲子大學士沈一貫等言總河李化龍丁憂已逾四月久留未代而河道一役必須總領之臣蓋雖堯舜在上不能遙斷水事必使伯禹盡力胼胝遲之歲月以責成功今所推李三才黃克纘曹時聘皆可用之才望簡命一人庶不致妨明歲漕務留中已已吏部署部事左侍郎楊時喬題黃河從東北來順而南則資運決而北則妨漕今據河臣揭行隄水髙再潰單縣決口北奔魚臺不辨牛馬又南則決淮安之老隄西則河南大浸夫決在西南特民生之昏墊決在東北實運道之咽喉胡可緩計且河已入魚濟之北境或不必盡東也即東而昭陽湖不必任受也即東受而李家口不必盡南也先年張秋之決其殷鑒矣乞遴㸃總河大臣以資防禦謹題請旨癸酉升巡撫應天右僉都御史曹時聘為工部右侍郎總理河道提督軍務明神宗實録是年秋八月河決朱旺口及太行隄數處民舍漂沒蕩漾三載河徙午溝始定蕭縣志同豐縣志略袁應泰知河內縣時河決朱旺役夫多死者應泰設席為廬飲食作止有度民歡然趨事治行冠兩河遷工部主事明史稿明神宗萬歷三十三年正月乙酉總理河道少保兵部尚書丁憂李化龍奉旨查勘兩年河工失事緣由大約三十二年之決豐先單後豐之失失於巡視之不嚴單之失失於下掃之不早而總之則三十一年蘇家莊之決釀之也蘇莊之失或謂先淤後決或謂先決後淤南直山東交相推諉第查新河放水數日即有劉肅等口之溢非下壅何遽有此則開挑不如式之罪南直任之水已南行三月因隄防不固始有蘇家莊之決非大潰何為使然則防護不如法之罪山東任之然而補苴多勞陵運無恙功過亦有不相掩者在事各官除黜降物故不議外見在郎中劉不息參政來三聘同知張執劉崇正計仲譽知縣戴一松相應分别罰治而臣更有說者年來緩於隄防急於挑浚及至隄壞水溢尚不引咎於守隄之不力而且委罪於浚河之不深則何不取河勢觀之也河北岸自曹縣以下無入張秋之路南岸自虞城以下無入淮之路惟是向來運道由徐邳以達鎮口故河北決曹單豐沛間則由昭陽湖出李家口而運道溢南決虞夏徐邳間則由小河口及白洋湖而運道涸今泇河一成自直隸以至夏鎮以三百六十里之淤途易而為二百六十里之捷徑此後黃河在山東直𨽻間能係運道之命脈者寡矣獨朱旺口以上決單則單為沼決曹則曹為魚與夫豐沛徐邳魚碭數十萬生靈總懸命於遙遙之一線則隄防亦何可緩也至於中州有更重者荆隆口銅瓦廂等處皆入張秋之路也孫家渡野雞岡及蒙牆寺等處皆入淮之路也一不守而北壞運南犯陵又豈直一城一邑之利害已哉故隄防固則上無泛溢下必順流不固而下雖通行上必旁奪此一恆人能辨之而何持議者之紛紛也前年水行隄北則曰昭陽湖不能容水水且倒灌矣昨歲水分隄南則曰新河不能容水水且倒灌矣倒灌之說興築塞之事緩卒之隄潰河淤水之取道昭陽湖而南者自如夫安見其倒灌也則又何不取地勢觀之也自朱旺口由苑家樓杜家樓以至小浮橋上下相較可低三四尺北髙南下居可知矣若水入新河兩兩分行縱伏秋暴漲不過溢岸而止豈能自卑趨髙自下趨上哉故上隄誠守則河必在朱旺口上下亦其自然之勢也又何倒灌之足患也倒灌之說原為失隄者逃罪之地乃其弊也人心不定人力不齊延緩失機逡巡待變甚者持隂陽之說以求兩中操縱橫之權以求兩合卒使河臣疲於奔命而河事壞於多岐則以不明於地勢與河勢而𡨕冥決事者之過也請西自開歸東至徐邳必無不守之地上自司道下至府縣必無不守之人在府縣掌印官必與管河佐二同其賞罰在地方守巡道必與管河司道同其功罪庶人人在事自不得分藩籬人人著肩自不暇騰口說其有怠事墮成而巧辨自文以圖分功嫁禍者重加參治勿事姑息下工部覆如議得旨劉不息等各罰俸半年仍行新任總河嚴加申飭違者不時參治二月庚午豫原任總理漕河工部尚書兼右都御史劉東星祭葬如例四月已酉山東撫臣黃克纘言皇天降割河伯為祟自三十一年王家口大開堅城集未竣上通下淤而蘇家莊大決則全河北徙魚臺一縣淪為水國矣十五社之地存者一舍有餘八千餘頃之田存者不及千頃而環城之水髙於城者二三尺隄防垂壞旦夕不支議者遂欲將縣事改併他邑錢糧派之通省誠不得已之計也臣等不忍以祖宗數百年舊封一朝遽棄苦心搜括銀米令其修隄寓賑或可圖存而今歲之事又不得不為曲處也下户部覆議從之六月甲子工科宋一韓言今日工程所稱勞費無已者無如黃河人言黃河天上來經萬里挾百川四瀆莫敢望焉前代正避其害我朝兼收其利所謂利者便漕也所謂害者善徙也河之為害所從來久逺有時而為利者人力勝之耳先是河決蘇家莊入昭陽湖夏鎮以南運道為梗當事者謂河險可避遂併力以事泇矣竭公私之費拮据幾二年工力就緒雖勞費不減治河餉道亦既經復矣臣等復何置喙緣臣一韓來從河濵聞諸長老之議先年開泇皆因黃河南徙二洪淺涸今全河北趨二洪湓溢何至為咽喉憂河之奪兩鎮口也亦奚以異於經二洪也平溜繕隄漕事自定如去年糧艘半由河半由泇此其證也河不勝徙安可勝避如曰南陽故事可倣臣等未見張秋之可移也乃今視泇為緊著視河為緩圖故以全力治泇以半力治河緩急利害之衡尚猶有未盡者臣等竊謂有三可惜二可慮焉濁河河之中道治河而欲其有利無害舍濁河將安之乎當時祗以減費縮工卒貽後患猶幸河形宛然畚鍤易施若以原估之數竟原挑之工議既不煩更端事必不至再誤乃曰濁河者議之所不敢出也遂使河身益髙分疏罔效豈不可惜南守汴隄北守太行隄令河遊衍容與其中雖二賈復生不能易也乃單隄既決太行獨以一線與全河抗衡雖四防二守三令五申大吏有王尊之精誠小吏有主簿之忠勇猶不能保前人以艱難成之後人以容易失之豈不可惜分黃黃淤守隄隄潰河之情形亦既可睹矣泇工既罷謂宜急復濁河使河為正道泇為間道竒正相生涸溢兼濟斯稱兩利俱存一勞永逸善之善者計不出此而躊躇不斷蹉跎未已將使河泇交困勞費罔終又豈不可惜凡河之性壅生潰瀦生湮今河滙昭陽且漸淤矣眼底伏秋已至霖潦奔發湖量有涯不溢則潰可使豐沛之患移之魚濟倘如先年浸黃陵岡衝張秋故事運道且中斷四百萬國儲謂何得無慮乎河之南害陵也尤甚於北害運往年黃堌失守大司空落職可為炯鑒矣今其故道尚在也假令走賈魯河出符離橋猶曰天幸倘如近日蒙牆之決潰沙岡趨固鎮將淮泗之間滿而患且上及陵麓億萬年王氣謂何得無慮乎大抵河道有全局治河有正經肩斯任者但當以精一營職以公愼矢謀以利鈍誹譽付之身外以豫奪聽之朝廷而以公論歸之士大夫濟則其分也臣力何有不濟則其遇也臣力既竭寧宅平而守正毋履險而設竒也或見時勢難圖物力匱詘而始擇輕避重圖易辭難是為遷就窺瞷意嚮以決進止成則居功敗則逭咎是為觀望遷就或人諒其心觀望則人訾其行今日河上諸臣倘亦有一於是乎則臣等誠過慮顧河事而業已如此矣奈何不以憂而以賀也泇工未成梅守相加四品服俸泇工未核又進太僕寺少卿咨未得則請一不巳而再何太急也其無乃職業之內而有市心都人士有言王家口之役六座樓以下守相實監督之下流未暢上流自壅雖許運同謬議減工守相何不爭執是前工尚有佚罰後工纍徼異數恐來三聘劉不息有後言矣況科臣侯慶逺漕臣孔貞一所議泇河事宜猶未盡舉何責報之速也即謂目前勞勩不可不一諷勸亦須今歲漕事無虞及回空無阻然後請官核實論功有差斯亦責實之政振飭河臣之機乎第大河未得安流泇河終難久恃耳乞敕新任總河亟將前河浚塞事宜據實上請計日砥績庶幾可惜者收功於補牢而可慮者銷患於徙薪疏入不報七月壬子以黃河洶溜運船過淮過洪期限照上年例量寬一月其衝決處所著總河嚴督司道等作速修治八月癸卯河道總督曹時聘言自蘇莊一決全河北注者三年矣初泛豐沛繼沼單魚陳燦之塞不成南陽之隄盡壞今且上灌全濟旁侵運道其勢益岌岌也臣受事未幾親詣曹單等處上視王家口新築之壩下視朱旺口北潰之流相度地形體察水勢咨詢於沿河故老以求所謂挽河之䇿因知河之大可憂者三而機之不可失者二何也水性就下惟下有所歸斯上無所溢惟下之往也順而且駛斯上之來也過而不留今河決行隄泛濫平地之上昭陽日墊下流日淤水之出李家口者日漸微緩勢不得不退而上溢溢於南則孫家渡野雞岡皆入淮之故道毋謂蒙牆己塞而無虞於陵溢於北則芝麻莊荆隆口皆張秋之故道毋謂泇役己成而無虞於運且南之夏商北之曹濮其地益卑其禍益烈其挽回益不易毋謂災止魚濟等處而無虞於民此三者覩指知歸杞憂方大河之不得不治也明甚矧及是時而治之人有可乘之機乎自王家口以達朱旺口新𨗳之河依然在也因而疏通下流以出小浮橋所費有限非復昔比從此三百里長河上下條暢可冀久安機之可乘者一自徐州而下清黃並行沙隨水刷河砥日深河崖日峻此亦數十年所未有也因而𨗳水歸徐容受有地昔年議挑之費皆在可省機之可乘者二蓋以水為師因勢利𨗳惟此時為然萬一坐失事機忽而不治或治而仍量挑以徼天幸至於前功盡棄後患相尋其勞費可勝悔哉今司道各官殫心竭力熟思審處謂河之中路有南北二股北股出濁河再疏再壅往事可鑑惟南股出小浮橋地形卑下其勢甚順度長三萬一千四百丈有零議開口闊四十丈以至二十丈不等深皆一丈五尺共該土方四百六十九萬五千有零用夫六萬名自千而上約四百日可完水由小浮橋徐城適當其衝議於義安山建滚水壩以分其流復用石砌護石隄以垂永賴庶幾其為完䇿乎惟是前項土方工價及是壩工程估該銀八十萬兩及查河道錢糧則馬價錢糧支消己盡庫金倉榖搜括已窮且江北河南山東三省直者槩有天災之苦槩有無藝之征物力匱然公儲虛耗臣等祗奉宸綸集思廣益既不敢蹈前車之轍又不能為無米之炊惟有仰乞聖恩多方處給或在工部或在别部約湊六十萬再留附近漕糧四十萬石共足八十萬之數聽臣等於今歲九月間嚴催東兖開歸淮徐等處本折漕糧先解工所募夫支用其餘銀兩陸續起解定限歲裏通完蓋南陽水勢日異而月不同入伏以來黃流旁溢淤澱漕渠者六七尺不等金鄉護隄又為魚臺之續逾此而北直灌張秋失今不治來歲新運即有泇可通而自夏鎮以至安山豈能無翼而渡耶疏留中十月已酉工部覆河道總督曹時聘催請大挑工費疏議截漕糧以八十萬三分之一該改折銀二十七萬兩再借兵部淮揚馬價銀五萬兩南京兵部總庫船料草場馬價共十萬兩南京工部協助三萬兩此外如科臣議於有漕省直七處照依糧數多寡均行攤派銀二十萬兩再開納河工事例搜括歲修銀兩及河南布政司山東東兖二府庫貯河道挑壩樁草等銀悉聽便宜取用務足八十萬之數各該部省不得推諉遲延以稽工作在河諸臣即當刻期挑穵用收全功得旨黃河北徙南陽運道被灌大挑朱旺口舊河使水歸故道費用浩大各部原當協濟雖帑藏處處空匱但此真不得己之役所宜應付亦難執例吝惜今次户部可勉從工部之請如數借給若漕糧必不可留亦須設法處足與他其兵部淮揚馬價及南京兵工二部錢糧俱著如數借給寧於别項撙節毋得自分彼此此外均攤開納搜括等事俱依擬著㑹同各撫按便宜處置行刻期興工毋輕誤妄費明神宗實録行水金鑑卷四十二
