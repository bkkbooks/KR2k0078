body:
  text: 行水金鑑卷四十三江南按察使傅澤洪撰河水明神宗萬厯三十三年十一月癸酉原任總督河道李化龍奏臣愚不肖蒙皇上授以總河之任以其年七月入境八月視事至次年七月丁母憂今年三月旋里中間開過泇河二百六十里行運二年計船一萬六千以上今年運事視往年更早二月已經巡漕御史及河漕二總督具疏報明臣以為可幸無罪矣近見邸報工科右給事中宋一韓條陳河事多反於臣科臣所以少臣者其説非一總之棄黃工泇致失行隄而巳其意豈不曰開泇分黃費亦不少併力以挑黃河則一了百了河因泇河又豈不曰河即不成但棄泇而守隄亦何至失隄嗟夫臣何嘗一息敢忘黃河哉惟是當年時勢有難以即興大工者查前總督所估大挑計費一百四十萬金起夫動至一二十萬彼時現銀尚不數萬工何敢即興大役之後僵尸數萬民間視挑河如就死地工又何敢即興縱使有銀矣有夫矣開挑之工遲以二年計速以一年計再速以半年計而運船不能待矣然則臣非敢棄黃工固必不得速也臣非欲工泇勢固必不得已也且泇非目下可以代黃也以二百六十里之安流代三百六十里之險道日者八千運船不兩月而過盡即謂之百年永利非耶今談河者多以南陽之漕為慮不知泇成而後可慮者止此百里之漕泇成而後為漕防河者止此百里之間耳以連年之物力連年之事變相提而論泇縱不即開河亦不即成河既不即成隄亦不即保縱使河成矣隄保矣黃水之泛濫雖掣而李家口之漕尚費挑修濁河之故道雖復而徐邳間之溜猶然險惡是魚濟徐邳上下數百里之漕皆可慮也泇成而漕有所歸乃敢少以治黃用以休飬民力待其喘息少定驅之再事大挑則泇不但為黃代漕亦且為黃助治也此臣開泇之意也泇甫就而臣值憂始不得復治黃矣丁憂之後尚有河工時不可失之疏有奉旨估計河工之疏臣何敢一息忘黃河哉向非丁憂則一年開泇一年挽黃運既不誤河亦可成何至煩言官之評議耶至於行隄之失則與泇工無預泇河所代者夏鎮以南之運道行隄固無與也若當時遽罷泇工而盡調官夫以守一隄未必有隄先已無漕憂漕事者且在夏鎮以南何暇及南陽哉且自三十一年七月河決蘇家莊攔水壩是日即決該縣縷水隄又一日即決沛縣四鋪口太行隄蓋臣未至濟寧太行隄沛縣者在河豐單者在水其半已失而其半已必不能守矣尚幸分黃之後全河一半南行故南陽之漕是年不淤今年之淤則以八月大水全河北行之故耳泇何與焉嗟夫使行隄無三十一年之失則劉蕭口之決河可以成河使無三十二年之失則朱旺口之分河可以成河乃隄再失而河再不成雖曰天災亦有人事臣職司行河分按信地罰治各官乃議未脫於口而謗議四騰臣已為射的矣臣所心折於科臣者謂臣實有僥幸圖成之心夫開泇分黃所恃者狹所欲者奢安得不謂僥幸然實以時勢艱窘工程浩大故情急慮生欲以救目前之急且圖為國家省數百萬錢糧為地方省數十萬民命無米而為全家之炊徒手而搏負嵎之虎臣之遇誠窮臣之心良苦矣泇之成早故臣得以二三十萬成前估二三百萬之工河之成遲故臣不得以數萬成今估七八十萬之事蓋其所能者人也所不能者天也臣實不職無所逃罪伏乞俯賜宸斷將臣先行削籍以謝人言然後下工部嚴行查勘臣之審於治黃是否有合機宜臣之急於開泇是否有裨緩急行隄之失果否起自臣身臣之經營是否有誤何事皇天后土必能知之天下後世必能亮之臣即伏死苫塊有餘榮矣下工部覆議大約謂化龍能以二三十萬之費治泇而不能以今估七八十萬之數治河能以強弩之末爭衡於河伯而不能以造化之忌不奪於憂制至今日而河且日徙日北勢幾無漕奚怪乎科臣之拾其後哉任事者為物力計贏詘勢有難於兼舉議事者為運道計安危言非涉於求多今錢糧既經措處大挑時已興工惟嚴飭在事諸臣同心協力底有成績可也得旨頃年河工未成祗因財力困詘有難措手所以前局未竟今已措處錢糧著河道各官上緊用心疏治務同心協力底於成功不必多滋議論無禆實濟十二月庚戌工部覆河道總督曹時聘條議大挑事宜一處錢糧謂剖派各項經費勢難猝至議咨三省直撫按不拘庫貯現征錢糧各照應募夫數暫借應用俟各項經費到日補還一募夫役謂烏合之衆漫無統紀勢不得不借力於有司議派山東募夫十萬河南六萬江北四萬聽各司道劑量均派掌印官親押赴工督催開濬其庫獄城池另委佐二官看守一嚴稽核謂河工錢糧以十分為率五分貯之山東三分貯之河南二分貯之江北各委府佐一員專司支放凡應給工食應買物件聽該司道核實出給印領赴各巡按衙門挂號存案另委推官一員隨事稽查十日一報工完之日聽按臣委官查核造册奏繳一儲薪米謂夫役雲集米價必至騰湧議借山東司庫銀三萬兩河南司庫銀一萬兩分發州縣收買米麥運赴工所再撥徭夫數百名沿河采草以供炊㸑一議禁戢謂人情聚則必爭矧災傷之後人心思亂不得不為預防議布署官夫悉照行伍之法病者給以藥資死者給以葬具更調濟寧兖西淮徐三道官兵各二百名犄角戌守仍聲明約束無相擾害一酌蠲恤謂省直地方河患頻仍河工困纍兼之連年水旱凋敝已極議將募夫州縣本年見征錢糧存留者破格蠲免起運者停徴一年其挑土覆壓民田額稅照數豁除一明激勸謂在工各官募夫辦料運餉督工餐宿河壖披履氷雪非破格優處何以示勸議事竣之日將府佐州縣正官已有恩典者於推升行取之日準俸一年未有恩典者特準給與其佐領等官照例一體議敘省祭隂醫等官冠帶者厚加賞犒餘者給以冠帶仍通免雜泛差役一固上源謂舊河既疏決口已塞勢必沛然東下新挑之河其深廣僅半上源則放水之後無論豐單行隄亟宜補築即曹縣之王家口曹家樓儀封之小宋集蘭陽之銅瓦廂祥符之張家灣比之伏秋防守更宜加謹其最險要者王家大壩黃壩新隄皆洶溜經行之處合行管河各官各照信地儲料集夫儼如大敵在前不得時刻懈弛得旨依議行戊午工部姚繼可又言總河大挑之役業已奉旨興工矣緣朱旺口二股原係黃河中路北股出濁河者再疏再壅南股出小浮橋者地形卑下可因就下之河形復已湮之故道其間義安之建壩徐州之砌隄正使水不旁溢滔滔東注弗蹈往者黃堌符離之故轍為泗濵憂蓋濟運護陵未始不兩利而兼成耳今南科臣金士衡建議謂南股上流逼近龍脊侵嚙可虞下流分水𨗳河有關風氣娓娓數千言大都為陵寢慮甚悉夫河臣既已躬親荒度詢謀僉同毅然建必然之畫豈其狃目前之見而智不及此而科臣周咨博訪有慨於中穆然抱根本之思故寧設為不必然之慮以佐廷議總之南股向係行水之路況在趙家圈北距陵千有餘里其間無甚層岡髙阜亦無事大費閘斸所可慮者挑浚不如法水不東而南耳倘工力既備深闊合式放水之後直逹徐邳恐亦不致南奔橫截有傷龍脈是在河臣曲為之防其於科臣詳愼之議固相合而不悖乎合咨總河覆勘果朱旺南股原無妨礙徑如前議疏浚引水東注或於南岸倍加幫築勿令侵潰致干王氣仍將下流分水之説再行詳酌務求至當以底成功從之明神宗實録是年總河侍郎曹時聘題準大挑朱旺發河南山東直隸丁夫挑濬由堅城集出徐州小浮橋河長六萬丈至明年工完於是河回故道民生奠安時聘鋭意挽河於是復請於朝發部寺漕折馬價等銀八十餘萬以冬十月興工自蘇莊至徐州幾二百餘里悉州縣正官受役分地而濬之州縣官急欲竣事其私派夫役謂之跨夫河垂成惟徐州之上有八九里許未及濬而蘇莊逼近黃河隄土單薄忽從地下穿入新渠震撼東下不待放水也流至未開處稍梗塞遂泛濫於新河之外三四十里然大勢已定可以隄約束之而魚沛單濟金鄉之水悉歸大河民免魚鱉矣未及論功行賞竟以憂去南河全考是年秋七月壬午吕梁河澀給事中宋一韓論前總督李化龍泇河之誤不報明紀事本末明神宗萬厯三十四年正月壬午署工部事刑部右侍郎沈應文言挑河之役三省直官統領二十五萬衆鱗集河上而所謂原估工費八十萬奉旨處給六十五萬者今户部止十七萬爭執縮去三萬五千南京兵部十萬以省直久欠馬價柴值抵去五萬南京工部三萬兩以應天等府拖欠匠班織造等銀抵數均派有漕直省二十萬應天該銀七萬三千七百有奇巡撫周孔教又以災民丐免而銓部事例復因酌議延閣致令河臣皇皇無䇿乞下明詔一應允給之餉未足之銀應催應補者俾令速赴河濵以資急用庶免他虞上嚴旨命該部馬上移文南京工兵二部各省直撫按照數措發不得再有爭執事例出於不得已其速議行二月甲寅河南撫臣沈季文奏頃者大挑朱旺口河南出夫六萬外加跨夫十二萬食用甚夥恐臨期缺食況三省夫役蝟集一方河上米價每斗用銀二錢二分各夫工食幾何而能堪此合將開歸二府逼近河工處所州縣應解臨德二倉麥折米扣留一萬石以救目前即扣河工銀八千兩起解户部以償米價從之四月癸亥大挑河工成自朱旺口逹小浮橋延袤一百七十里渠勢深廣築隄髙厚潰流復歸故道用衆共五十萬費金錢八十萬兩自十一月至今五閲月而功成河道總督曹時聘上疏報聞兼請建祠賜祭以旌河神破格蠲征以酬力役皆從之六月已亥郭暖樓人字口河決北股至茶城鎮口直隸按臣黃吉士漕臣陳宗契疏聞下部覆議署工部侍郎沈應文言朱旺而上徐州而下舊河甚闊悉百丈以至二百丈今所挑新渠寬者不過三四十丈耳廣狹相懸吞吐不及勢必盈漫龎家屯乃河臣原題量挑以分殺水勢者雖有郭暖樓之潰暴漲所乘原非決裂而不可收拾也目今行南股者十之七行北股者十之三滔滔大勢仍趨新渠且壩工止留六丈官夫雲集畚鍤立俟待衝刷稍廣水勢必殺數丈決口直一鼓舞之力但兩股並駛勢不兩強河性變遷滄桑互易且出之水不獨蕭縣楊家樓一帶上下四方亦皆有之轉盻伏秋寧無橫決則長河南北增築新隄修補行縷不可不豫也全河既已東注惡溜必平今雙溝栲栳之險未夷尾閭不暢上流終梗眀歲漕艘可又於治黃之後而盡由泇乎是在河臣嚴飭各屬虔始厚終以收一簣奉旨河工垂成尤宜萬分加謹著河臣於應塞決口相機堵築朝廷不為中制不責近功務保萬全方稱竟局如蹈前轍不爾貸也明神宗實録明神宗萬厯三十五年四月壬子河道總督曹時聘以黃漲異常土壩潰決宜責令參政顧雲鳳等戴罪修築章下工部十一月壬寅河道總督曹時聘以河工告竣請敘勞績以勵臣工事下該部吏科給事中姚士愼疏曰臣唯國家有不可爽之爵賞人臣有不可冒之事功往者蘇莊河決河臣議大挑朱旺口使水歸故道用帑金八十萬然朱旺之役甫罷而彭家樓之決旋報即云築塞新功舊料可籍然皆國家積蓄安知今歲塞責明秋泛漲不又為彭家樓之續也且河上之役上原下隰廬處客宿嘗其甘苦者寧有幾人潰決則幕流雜職受其罰隄成則髙牙大纛享其功往時大決故議大挑大挑故議大功使河再決而再挑再挑而再議功是歲歲敘功無已時也先是巡河御史黃吉士查勘回奏亦言臣觀是役塞蘇莊以開朱旺挽北流而使東注河臣焦心兼收羣䇿其慮未嘗不愼謀未嘗不臧也第河性善潰未易約束去歲城放水即有人字河之溢今歲勘閲正值秋水泛漲四望瀰漫楊村集以下陳家樓以上兩旁隄岸衝決多口徐屬州縣滙為巨浸而蕭碭受害更深逮至勘後黃堌口復決業經築塞時日非久而趙家圈壘土新成洪水隨至勢甚危岌工程繁多水更散漫不可稱全功自吉士之疏出而議者時起工科給事中孫善繼又上疏曰臣觀按臣勘疏內云城放水即有人字河之溢又云楊村等處衝決多口徐屬州縣滙為巨浸又云河身旁溢漂沒田廬不可以稱全功臣咨嗟歎息謂當事者不知何如責躬乃亡何而敘功之疏至矣夫豐沛蕭碭死者長為魚鱉生者又無居食以昏墊胥溺之危而談地平天成之績無論國典所靳幸不可徼即反之於心亦或未忍矣河臣得無以黃流已東運道無梗功不可朝夕緩乎不思直口以下之黃即不治未嘗有妨於運直口以上之黃即治何嘗涓滴有濟於漕二三年所為支吾茍完運務者唯泇河一衣帶水耳夫泇非能自為泇所恃者泰山諸泉之助而沂直諸河之來也今嵗夏前稍稍苦旱沂直諸泉即無以潤泇而泇告急黃淤則漕泇泇格又誰漕乎故治河如治病病有緩急治有標本專事泇以為標而忘治黃以為本非計也今謂徐邳之間水多跌溜操舟之險比於龍門漕黃故道流漸淤淺隄岸頽傾卒難整理為此説者皆狃目前而忽逺慮有如泇不足恃漕運告急駭而圖之豈能及乎宜乘此冬春水涸起古洪閘抵滿家閘大加挑浚堅築隄岸以復故道錢糧取之歲修工程假以時月即雙溝馬家淺跌溜難行議開月河以避其險何不可者又言今之治漕者無論黃無完局即泇亦多遺䇿直口溜急一船挽拽常數百人銜尾而上前船斷纜則後船雷擊軍旗糧石俱委河流至於梁城以上韓莊以下千艘鱗集經月剝淺勞人長姦乍遇霖潦蒙嶧水出瀰野滔天縴路窮絶糧運稽遲實坐於此故欲免直口之危莫若巨梁橋東西開闊丈餘以殺其勢欲免守淺之苦莫若頓家閘上下浚深數尺以𨗳其深欲免暴漲之衝莫若築隄王市口以東使水歸浪茫湖以避其害蓋總一河也自徐州以上必南不害陵北不害運中不害民如是者功成徐州以下必我欲漕黃則黃欲漕泇則泇我欲互用黃泇則黃泇互為我用如是者功成功成而後議敘則敘不浮敘當而後議酬則恩不濫如竭有限之財驅重勞之民假便宜之權需歲月之久而東衝西決有如漏巵方河臣飲氷之時奈何為玄圭告成之會乎疏上而廷議益違久之不得論功十月戊辰以河工告成紀録管河參政顧三鳳罰治兖州同知許仲譽從總督曹時聘請也明神宗實録是年河決單縣東南水勢洶湧灌入城北四十里一望汪洋民舍漂流山東通志是年五月大雨電雷黃淮交溢田廬災清河縣志明神宗萬厯三十六年二月庚申工部右侍郎劉元霖題黃河之難大治自昔苦之先因蘇莊水決河臣議挑朱旺口使水歸故道逾年工完遵例奏報本部覆行巡按御史查勘去後兹據按臣黃吉士勘報謂新河告成南陽魚臺等處其功實不可泯獨陽村集以下陳家樓以上河身旁決徐屬受患不可以稱全功欲候三年新河果無衝決不次升擢又據河臣疏謂楊村而下陳家樓而上地形卑窪自衝一渠每遇伏秋不無溢岸然亦河性之常總不出長隄之北行縷之南於是科臣孫善繼姚士愼各有參疏未奉明旨臣竊謂按臣勘閲當伏水泛漲然滔滔東逝會歸正陵運既兩無侵南陽水患亦去此其工成大較亦可覩已河臣論功誠不可緩唯其疏敘不無少浮是在核實酌議耳至科臣孫善繼疏謂漕泇不可常恃議於古洪閘抵滿家閘大加挑浚堅築隄岸通舊運河以接黃河於雙溝馬家淺開月河以避跌溜此兩利俱存之䇿謂泇流尚多遺䇿議開巨梁橋以免直口之危浚頓家閘以免守淺之苦築隄王市口以避暴漲之衝此桑土綢繆之計然談者又謂泇貴蓄而虞泄黃善徙而難恃須泇河展拓已完開壩已足不為旁泄而後及黃庶無他虞此當另行河臣從長勘奏者上俱是其議八月已未升應天巡撫都察院右僉都御史周孔教為右副都御史總理河道十一月乙未工科都給事中孫繼善劾新推總河周孔教工於媚竈驟躐通顯乞賜罷斥不報明神宗實録明神宗萬厯三十七年三月辛丑總督河道工部尚書曹時聘卒明神宗實録萬厯三十九年六月河決狼矢總河都御史劉士忠命中河郎中吳大山淮徐道袁應泰築塞之明年春工竣南河全考明神宗萬厯四十年九月丙辰吏部覆河道總督劉士忠言黃水衝決徐州縷隄長二百八十丈玄字遙隄口闊一百四十丈荒字遙隄口闊四十丈梨林鋪以下二十里正河悉為平陸邳睢河水陡耗司道議開韓家壩隄外小渠引水歸河由是壩以東河流漸深可通舟楫大約挽回水十分之三惟玄字決口尚淺改為板築請留徐邳睢寧宿遷桃源等屬州縣正官免覲共襄河事從之十月已卯御史田生金疏言邊患河患孔殷邊臣河臣可議邊事不録三山口決據報闊深若干丈矣乃河臣劉士忠疏不言淹沒人民屋舍幾何作何查恤而第曰無傷於泇無礙於運而已豈唯靈邳睢宿之衝其民皆巢居山處者哉聞河隄夜決迤東一帶不知幾千萬遽登鬼籙乃不一奏報猶徐徐然誇挽回之有機侈韓壩為天授非唯不仁亦不忠矣請賜罷斥明神宗實録是年河決徐州三山水灌睢寧等處出白洋小河口入黃總河都御史劉士忠檄中河司道吳大山袁應泰開挑引水河復故道明年塞之南河全考明神宗萬厯四十一年正月乙酉總督河道右副都御史周孔教卒孔教臨川人萬厯八年進士以三品未任豫祭一壇七月庚寅大學士葉向髙疏言河道為南北咽喉漕運命脈河臣劉士忠既已豫歸一切河務無人料理所當與各省撫臣亟為點用者也上報允九月庚申總理河道工部侍郎兼都察院右僉都御史李景元卒景元大名人萬厯進士以守制未任明神宗實録是年秋七月河決祁家店口城南胥溺徐州志明神宗萬厯四十二年正月戊寅南京工部右侍郎吳桂芳改工部右侍郎兼都察院右僉都御史總理河道提督軍務七月已已南大理卿劉士忠卒士忠華州人萬厯二年進士士忠以右僉都御史總理河道開復三山河升南大理寺卿其總河時曽以擒獲海洋倭冦受賞金綺明神宗實録是年六月河決靈璧縣陳鋪入冬淤平河流復故南河全考明神宗萬厯四十三年正月乙丑先是徐州黃河縷隄決口二百餘丈遙隄決口一百七十餘丈先後河臣或欲估計應動錢糧親詣築塞或欲浚正河以便水之歸闊下流以便水之出屢經奏聞是時管理中河工部郎中吳大山淮徐道副使袁應泰督同多官以次挑浚三山故道創築遙縷各隄計二萬三千餘丈用人夫四萬七千四百八十六名實用銀八萬七千一百餘兩然不煩內帑不派里甲較諸原估尚省銀五萬三千三百有奇總督漕運陳薦疏列效勞各官以聞下工部覆二月乙酉準總河侍郎吳桂芳回籍調理病痊奏薦起用仍諭河工甚亟不可缺員吏部作速推補五月庚戌工部侍郎林如楚覆督漕陳薦疏稱黃河所恃唯遙縷二隄可為束水歸漕之計邇因黃泇役煩自徐州以下各隄單薄河臣計地七百餘里料估九萬有奇議動三府正稅佐以采石餘銀足襄兹舉而又責成於府佐州縣正官畫地分工先儘徐靈睢邳四處工完而後及於山陽隄工至於一勞期於永逸其經始有法其要終必實科臣所謂分丈尺以專其責核虛實以要其成明賞罰以警其惰於所委府州縣官重致意焉誠補前議所未備而於河務深有禆者也上是其言四月甲辰協理京營戎政兵部尚書舒應龍卒應龍全州人嘉靖壬戌進士萬厯二十年工部尚書總理河道尋回部管事加太子太保厯兵部尚書乞歸卒於家明神宗實録是年黃河決狼矢溝工部郎中王命禹督工塞之江南通志萬厯四十四年五月河復決狼矢溝水由蛤蟃周柳等湖入泇河出直口復與黃會運船入口迎溜稱艱帶管河道陳薦檄中河郎中黃景章開武河等口泄水平溜後二年決口新長淤沙河復故道總河侍郎王佐加築月壩以為保障是年八月又決陶家店張家灣水由會城大隄陳留等處入亳州渦河帶管河道陳薦命河南管河道全良範管河同知徐可大挑河挽水本年冬決口淤平加築大壩河流復故南河全考明神宗萬厯四十五年六月丙午工部奏河臣自劉士忠解任推補未奉俞綸厯今多年而總漕則陳薦久已堅志乞歸今且奉旨致仕上無實政下有玩心百事隳頽諸方決裂有謂自清河口上逹濟汶泇黃兩道皆非利涉安瀾者有謂河決清河則全河之水盡漫於田疇墟里間者有謂自徐至邳宿險阻艱難舟多滯留者甚至吕梁至深至險之處幾於褰裳可涉此於運道為梗實切剝膚之災漕河兩缺總理無人除總漕户部催請外伏望皇上即簡吏部原疏將總督河臣王佐陳禹謨點用一員令刻期赴任視事使統馭專而綜理常周則河渠通而挽輸益利矣七月丁丑升右都御史王佐為工部左侍郎兼都察院右僉都御史總理河道明神宗實録是年大水河決狼矢溝淹東北各鄉村吕梁洪水乾徐州志明神宗萬厯四十六年閏四月庚午以江西巡撫王佐為河道總督佐言治河以無事為智不求穿鑿如狼矢決口不可不塞黃河故道難聽久湮直河泛濫可虞泉源微涸當浚泇身尚多沙淺水匱漸作桑田凡如此類亟應修舉五月丙申命暫止河工候秋班軍至日挑浚明神宗實録明神宗萬厯四十七年六月辛已豫原任總理河道太子少保工部尚書兼都察院右副都御史潘季馴祭四壇造墳安葬季馴歸安人嘉靖一十九年進士歷右僉都御史總理河道間住尋起原官晉刑部尚書十六年復起總理河道右都御史升工部尚書總河如舊二十年致仕卒於家至是禮部覆稱季馴四任河漕民免魚鱉草年修築國賴轉輸雖有身後之株連難泯生前之偉伐誥命巳還恤典宜逮故有是命十二月已卯總督河道王佐乞休不允明神宗實録典薈蕞云崇禎五年禮部為諡愆期已久咨訪會議宜速懇請明旨申飭以伸公論以彰激勸事具題奉旨易名重典不得久稽於是部臣自萬厯四十五年起至崇禎五年止將諸臣事迹彰明功在社稷者彚送兩京九卿部寺詹翰臺省各衙門虛公博訪循聲核實於宫保尚書潘季馴名下書的應諡三字又開注云本官勤績風餐露卧宏猷地負海涵當橫流衝決之時而四膺河任胼胝奚啻乎八年逮衆議紛紜之日而獨奠安瀾籌度更奇於三䇿以隄束水借水攻沙鑿鑿真稱碩畫日修繼月月修繼歲彬彬載有成書元協公評允宜的諡於時朝廷槩靳而不與疏本朝順治五年三月總督河道都御史楊方興特為請明祀典以崇報功事奉旨陳瑄宋禮潘季馴等六人淮黃永奠功在兩河凖從祀禹王廟而易名之典以故國遺臣終未能逮也明季吾鄉三列九卿十數公董宗伯張司寇馬溪沈端靖竹溪沈恭靖皆科名繼世子孫簪貴而公且蟬聯五代至於今福廕猶未艾也豫往來河上公之䡍事猶嘖嘖在人口角司河者略能記誦其河防一覽中一二語其所施設便出人一頭地公之功真曠世而難泯公之名雖千載亦不滅矣是年九月河決河南脾沙堽水由封丘曹單至考城復入舊河總河侍郎王佐命河南管河道於本年十一月築塞之南河全考行水金鑑卷四十三
