body:
  text: 行水金鑑卷四十四江南按察使傅澤洪撰河水明泰昌元年九月丙申熹宗巳登極矣以總督河道侍郎王佐為工部尚書十月癸丑升河道總督王在晉為添設兵部左侍郎丁卯改刑部左侍郎陳道亨為工部左侍郎兼都察院右僉都御史總理河道明熹宗實録明熹宗天啓元年正月壬寅總理河道工部左侍即陳道亨疏辭新命不允明熹宗實録是年河決靈璧雙溝黃浦由永姬湖出白洋小河口仍與黃會故道湮涸總河侍郎陳道亨役夫築塞時淮安霪雨連旬黃淮暴漲數尺而山陽裏外河及清河決口甚衆滙成巨浸水灌淮城民皆蟻城以居舟行街市久之漸築塞明史稁是年河決靈璧雙溝黃鋪而淮安山陽之裏河則決王公祠楊家廟清江浦磨盤莊謝家墩鳯直二厰等處外河則決安樂鄉顔家莊張家窪髙堰武家墩等處清河則決龍王廟徐家路等處惟時水灌淮安新聯二城小民蟻城而居裏外河清河一帶滙成巨浸知府宋統殷知縣練國事力塞王公祠總河陳道亨行郎中徐待聘率同知趙廷琰估料荒度興工本年八月南河郎中朱國盛方受事奉行嚴督河官畢力堵塞其髙堰武家墩則躬親課工清查鐵鍋石灰諸料照段拆修浪窩盡塞至明年工竣南河全考是年五月霪雨河淮交溢清河縣志明熹宗天啓二年二月丙申復原任河道工部尚書楊一魁原職其子舉人楊時嘉奏請部覆從之五月甲子詔恤已經復職原任工部尚書楊一魁並妻張氏任氏一魁山西解州人嘉靖乙丑進士授行人選入南臺歷郡守藩臬晉總漕河周咨荒度開武墩開黃壩以殺黃流陵寢獲安既涉冬卿竟以河決蒙牆追咎削籍今上御極言者訟寃狀得蒙恩恤十一月壬寅升江西巡撫房壯麗為工部右侍郎總理河道十二月乙亥原任工部尚書兼太子太傅王佐卒佐鄞縣人萬厯癸未進士繇水部出守南昌逮晉工侍拮據漕河隨陟司空以疾請告終於里佐清白大節始終如一士論稱之明熹宗實録是年四月大水決郭家觜平地水深七尺徐州志是年七月黃河口決圍繞睢城廬舍漂沒睢寧縣志明熹宗天啓三年三月丁已河道總督户部右侍郎房壯麗中途稱病請告不許五月已亥以河決盡蠲睢寧縣糧閏十月甲辰工科給事中楊所修疏陳三事一河工祖陵之衛宜周也曹縣東平等處水歸故道而青田靈璧一帶尚在汪洋吕梁洪夙號巨浸今竟淤淺可渡水從旁溢逆折而南踰縷隄遙隄且逼近集石隄矣此隄近障祖陵誠不可尺寸踰及今水涸宜嚴諭治河諸臣審度料理以寬根本之慮明熹宗實録是年決徐州青田大龍口徐邳靈睢河並淤吕梁城南隅陷沙髙平地丈計雙溝決口亦滿上下百五十里盡成平陸五月庚子河決睢陽明史稿是年七月山陽外河決乾溝新河西河決馬湖閘月壩等處南河郎中朱國盛暨淮海道宋統殷會行淮安府同知張元弼於是年秋築塞之更於清口大王廟分水處建立磯觜以遏上流之勢南河全考明熹宗天啓四年二月乙酉提督操江熊明遇請軫念根本疏曰黃河為四瀆之長今乃羡溢大決流漂逼陵秋水灌涯徐淮間殫為河諸臣負薪沉璧勞逾瓠子費倍宣房斯固隂盛違經之應而潤州毗陵一帶河水盡竭民不能漕此逆盩見於地者又如此六月癸酉河決黃水洶湧魁山隄潰四散奔流衝裂徐州東南城垣平地水深丈餘淹死人畜甚多明熹宗實録是年六月決徐州魁山隄一向東北倒灌州城淹人畜房屋甚衆城內水深一丈三尺一自南門至雲龍山西北天安橋入石狗湖一由舊支河南流至鄧二莊歷租溝東南以逹小河出白洋仍與黃會徐民苦淹溺議集資遷城給事中陸文獻上徐城不可遷六議而勢不得已遂遷州治於雲龍而河事置不講矣明史稁天江南通志訛在啓二年是年六月初二日奎山隄決是夜由東南水門陷城頃刻丈餘官廨民房盡沒漂百姓溺死無數六七年城中皆水漸次沙淤議復舊城張璇髙邑人由舉人天啓四年任户部主事時黃水暴漲上下驚懼六月初二日璇促裝移署戲馬臺之聚奎堂是夜河決城陷典守無失人皆服其先見八月大雨河溢九月豐縣河決西洋廟口及十七鋪徐州志河決徐州總河侍郎房壯麗題請帑金鳩夫集料行中河郎中金元嘉大挑故道復加掃築塞之南河全考明熹宗天啓五年四月癸已升福建巡撫南居益為工部右侍郎總理河道九月丙辰兵科給事中陸文獻條上徐州城守不宜改遷六議一為運道不當遷每歲糧艘由清河而入近雖有泇河可行然河勢狹窄冬春回空必資黃河故道黃水多泥而善走六十年前徐州以下號為銅幫鐡砥以河至此安瀾也嗣後吕梁之間當事者去其中流石挫以為利於行舟不知河無關鎮常至泛濫所恃者官以倉庫錢糧民以身家性命為防禦故不至他徙倘城一變遷則繕修防守必疏潰決之勢其妨運道不小也二為要害不當遷徐城三面阻山一面臨河南引邳宿北扼兖濟西扼汴泗一瀉千里之勢以障江淮險要之設舊矣金陵恃徐為南北咽喉且黃河自西而東閘河自北而南皆合於徐城之東北而下阻河勢河阻城勢居然一重鎮也如近歲蓮妖發難環攻浹月而不得渡以故河南江北得免於難倘道鎮逺移餘孽竄伏而無扼要以根之無地方官督率居民以捍之萬一姦宄不測乘舊城之虛而據其內是又藉寇以窟而自失其天造地設之險也三為有費不當遷蓋主徙城之説者亦為城基易陷不可復居耳然黃水所灌無不立淤者誠戽去城中積水使黃有所容去敗垣之當水衝者使黃有所入愈入愈淤不久已成平地就此酌量加髙凡公廳之陷泥中者增其舊址取其舊材仍舊添新而告成亦易也四為倉庫不當遷徐設衛所宿重兵貯庫運倉改兊米一十九萬六千有奇差户部漕郎領之今城遷則倉儲將徙之新城乎將因仍舊地乎圖新則倉糧之旱腳滋繁如仍舊則積貯之防衛誰屬况部司兼攝稅務則部署不能逺河倉厫又豈能逺河至官軍之防衛道鎮之彈壓其不能去河又明矣五民生不當遷古有徙民實關中實塞下者明王難之恐其便於富民而不便於貧民也今徐城之有蓋藏者已他徙也其城外臨河而居者皆負販之細民也舉盈於時詘而輕徙焉民方失廬舍之安又無濵水漁鹽舟車之利民生無賴而國計妨矣六為府治不當遷徐淮以險重故有改州為府之議若退處平地三十餘里其去邳宿幾何而不已撤府之險阻乎况府屬道里適均輔車相依碭與豐原各逺州百八十里而僻處一隅去屬縣益逺亦何以成府之尊無已則有雲龍山延亘於城之西南角相距可二里其間支河溝澮見漲為平原即於府城南稍培之以土俾與山相接因髙而立之基再建一子城設立郡縣倉庫於其內而以道部臣統隸之其舊城則設衛驛遞而以鎮將統隸之以防雀行不測則有突至之水患可無虞矣至原議留搜括八萬以興新役國用既匱民力愈疲不如守此厄要留四萬以因仍修築捐四萬以助工助遼所省巨而所全多也得旨徐州負山臨河南北咽喉夙稱扼要只宜固隄保城不必更州為府其搜括八萬兩留四萬以備修築四萬解進助工丁已吏科給事中黃承昊劾總理河道侍郎南居益依傍門户躐躋閩撫及升總河遷延不至乞速令休致得旨南居益依傍門户削籍為民仍追贓誥命戊辰升總督三邊軍務兵部右侍郎兼右僉都御史李從心為工部尚書總理河道明熹宗實録人居益字思受渭南萬厯二十九年進士巡撫福建五年遷總河魏忠賢銜居益遂削籍去閩見明史稿明熹宗天啓六年七月壬申淮揚廬鳳各府屬春夏旱蝗為災入秋霪雨連旬河溢海嘯濵河之邑如泰興一縣海潮江浪一夜驟湧廬舍衝沒人民溺死者無算總漕蘇茂相具狀乞賑下其疏於部明熹宗實録是年七月初九日黃河決匙頭灣洪流倒入駱馬湖左右自新安鎮以下邳宿城外周圍皆水蕩然大壑田廬淹沒數月少減淮安府志明熹宗天啓七年正月乙亥特命原任司禮監秉筆太監崔文升著總督漕運疏通河道查核京通等倉前去會同該部科道及漕臣河臣等官將天下地畝等項額數銀兩及漕運歲到糧儲數目於出納之際本折若干存發若干各按册籍細加查核必盡翻窠臼徹砥澄清朕既各委親近內臣亦必重其事權專其責任而後可以責其成功其各用敕諭關防所司各行擬給使振刷夙弊丕變新猷以復我祖宗設立京通漕運等倉之初意明熹宗實録天啓七年九月庚辰以藩封大典敘録沿河效勞諸臣總理河道都御史李從心加太子太師升廕一級巡撫山東都御史李精白加兵部尚書總督漕運都御史郭尚友加户部尚書十月已酉河工積逋銀自天啓元年至六年止共二十七萬六千八百三十兩太監崔文升疏聞旨令勒限嚴追仍令以後徴收樁草等銀總解一庫歲終會同總督細加查核並立考成法以殿最有司十二月戊戌以少保兼太子太師總理河道李從心改户部尚書總督倉場庚子大理寺卿張九德疏辭總河新命不允丙辰張九德升工部尚書兼都察院右副都御史總理河道提督軍務崇禎長編崇禎元年二月丁未浙江道御史范良彥言河流自潼關入汴延袤千里開封以西多山水行地中未甚為患至銅瓦廂而東盡皆平野沮洳下濕潰決不時故羅家口蘇家林王家壩諸處歲築塞無虛日而其所需一應掃料若柳稍樁草􅐨麻等項例招商運買緣官價太少未及其半故商人不承遺纍里甲兼之行水之地樹朩凋殘咸市之數百里外腳力有費雇船有費搬運有費交卸上納又有費合計歲發官銀一萬兩百姓必賠五千餘金而遼餉等額外之輸不與焉中州腹心之地困苦至此若不講求長策兩河赤子何有見天之日因思河南各府原有額定河道歲修錢糧有司征解不時拖欠數多夫此項錢糧即使在民若無拖欠係别項借支亦當速抵原數聽河臣湊手即發如臣所言柳梢等項招商辦買一一準之民間公平價值或使少沾利息人自樂就濵河小民其有瘳乎旨命飭行四月甲午升總理河道提督軍務丁啓濬為刑部左侍郎七月已已河道總督李從心罷崇禎長編崇禎二年十二月庚午總督河道李若星入援崇禎長編是年春河決曹縣十四鋪口四月決睢寧至七月中城盡坍總河侍郎李若星請遷城避之而開邳州壩泄水入故道且塞曹家口匙頭灣逼水北注以減睢州之患從之明史稿是年四月大水決郭家觜灌石狗湖平地深七尺由下洪漸入黃河徐州志是年辛安口決大水衝城沒及女牆官舍民居漂流一空睢寧縣志崇禎三年二月辛亥總督河道李若星疏奏睢寧水患至於城池潰決人民蕩析固百年來未有之竒慘也臣與司道廳縣諸臣僉議淤沙壅塞之場根基既不堅固又沿河數十里盡皆泥沙深者丈餘淺者七八尺求一段故隄不可得若於此築隄恐隨築隨潰徒擲金錢於洪波巨浪中河患毫無補救則南岸新隄之不必驟修也明矣若露鋪決口始於天啓丁卯之憂迄今四年於兹涓涓不止漸成巨川其漭漾澎湃之勢方山嶽可撼陵谷可遷此豈尋常決口而欲掃料塞之乎則露鋪決口之不能堵塞也又明矣計惟有開邳壩復故道沿河築舊隄以為補偏救弊之䇿耳今細尋邳州新築壩內别有一泓環繞羊山之前從此挑濬便可泄水入故道俟工完水漲即開攔河壩分正派以殺水勢將露鋪來口之壩借作迎水之用在堵塞曹家口匙頭灣諸處逼水北注則泛濫之勢自消而睢寧之患可減此目前最急工程不容時刻緩者其睢寧舊城湮潰已經三次去年四月十四日水漲湮而未潰至七月十五日隄壞而城始坍其間歷時三月士民猶得移徙若再因循不遷貪沃饒之利而忘沉溺之害洚水復至未有不胥人民而化為魚鱉者况此城昔如釡砥今已淤塞就平仍此故墟終為陷穽所當即行撫按定議移城不得以縣民安土重遷付之不問也前項募夫辦料計用銀八千六百二十六兩有奇應於淮安府山陽縣河道項內動支所當并力上奏四月辛亥總理河道李若星疏解俸薪銀五百兩充餉優旨納之五月戊戌總督河道李若星疏解祖陵皇陵節省銀助建德陵命到日核收十月甲子起朱光祚為工部尚書兼都察院右副都御史總理河道崇禎長編崇禎四年十月丁未刑科給事中常自裕上言今歲災異疊見黃河橫決淹沒原武陽武封邱延津四縣盡成湖沼民為魚鱉詎意昊天不吊夏旱秋霖河水懷襄載胥及溺致産賦之區一望灌莽淪滔之後大半逃亡詩云民靡有黎具禍以燼哀恫中國具贅卒荒言念及斯不覺澘然為民父母者於此時敬天之怒毋敢戲豫憫民之艱不遑啓處拯溺救焚恤災捍患朝夕皇皇猶慮弗及而尚畏考成之令嚴催科之條恐此二三孑遺非垂而就斃則挺而走險耳兩河之間不又為秦晉之續乎崇禎長編是年夏河決原武湖村鋪又決封丘荆隆口敗曹縣塔兒灣太行隄六月黃淮交漲海口壅塞河決建義諸口下灌興化鹽城水深二丈村落盡漂沒逡巡踰年始議築塞興工未幾伏秋水發黃淮奔注興鹽為壑而海潮復逆衝壞范公隄軍民及商竈户死者無算少壯轉徙丏江儀通泰間盜賊千百嘯聚至六年鹽城民徐瑞等言狀帝憫之命議罰河漕官而是時總河朱光祚方議開髙堰三閘淮揚在朝者合疏言建義諸口未塞民田盡沉水砥三閘一開髙寶諸邑蕩為湖海而漕糧鹽課皆害矣髙堰建閘始於萬厯二十三年未幾全塞今髙堰日壞方當急議修築可輕言開浚乎帝是其言事遂寢又從御史吳振纓請修宿寧上下西北舊隄以捍歸仁明史稿二御史吳振纓疏載在六年是年河決荆隆口趨張秋六年始塞河南通志是年八月大雨河溢徐州志是年九月河決西洋廟口及十七鋪口邑大水蕭縣志豐縣志同申佳胤字孔嘉永年人崇禎四年進士授儀封知縣霪雨河決艤舟怒濤中率衆塞其口以才調杞縣歷太僕丞殉節贈少卿本朝賜諡端愍明史稿崇禎五年二月癸未工部尚書曹珖疏覆河南巡按李曰宣條議河道四款其一為職掌宜明從來印官河官均任河防責原相等按臣議印河分認職掌以各按功罪不惟交制且以相成從前諉卸之習今始可以盡破至中州之河道即運河之部臣一切防河事宜尤應躬親督核其一為支收當講凡河工物料買辦收存支放弊竇多端耗費無紀按臣立議官買通計物料就歸德開封二府裒益價值使之均平責成印官自買小民既免派擾物料必無折乾此為便計其一為核實工役河防易墮率由夫役多虛冒與工糈無實用耳必使夫役既無影占工食始免虛糜是宜按月消算通行截給每月終印官出印領關支不遲一日不冒一工如有包占侵剋與工料不實即以為印河之功罪其一議遷改河官防河重在秋水泛漲之時呼吸安危頃刻而判此後道臣升遷務在冬季之後期於不誤秋防至河廳設立同知通判從來已久其升遷選授當一遵此法不至大相懸絶可也三月丁未河道總督朱光祚疏奏崇禎四年夏秋霪雨為災黃淮湖海交漲衝決淮安府山陽縣黃河新溝口三百五十丈中深一丈六七尺蘇家觜一百六十五丈中深一丈二三尺工大費繁迄今未經修築臣會同總漕李待問及司道廳縣親行勘估約新溝口工料二萬七千八百七十兩有奇蘇家觜工料一萬七千六百五十雨有奇二項共需銀四萬五千五百三十餘兩臣已陸續湊集各項錢糧責成郎中徐標暫駐淮安府料理乞敕工部酌覆行臣轉行瀕河司道督同各府佐河官一體遵照辦築如限報完章下所司五月丙午擢天津兵備參政朱大典為右僉都御史巡撫山東時東撫久缺户部尚書畢自嚴工部尚書曹珖等請以總河尚書朱光祚移鎮省城兼攝其事下部酌議吏部尚書閔洪學覆奏會推新撫勢必少需時日而事機難緩河臣朱光祚威望夙著見在濟寧可以朝夕受事應令兼攝巡撫料理戰守實係便計即以總河關防行事俟新撫入境接管可也帝以新撫已簡用當令刻期赴任光祚不必移鎮印務付劉宇烈兼攝八月癸未直隸巡按饒京疏報黃河漫漲泗州虹縣宿遷桃源沭陽贛榆山陽清河邳州睢寧鹽城安東海州盱眙臨淮髙郵興化寶應諸州縣盡為淹沒而天長髙郵寶應泰州興化處處盜賊公行懇求皇上大沛恩膏因使再飢之民不愁追呼而專求生計庶恆心少留寇盜亦可少弭也帝命撫按嚴督道府州縣撫字勦戢仍將被災實情勘明以聞十一月丙辰直隸巡按饒京以江北淮安諸郡連歲災荒流殍載道疏奏為災民年年之計莫如築新決河口一著淮之鹽城廟灣揚之興化寶應皆棊布於河海之濵黃河之水順流入海所恃此兩岸之隄今年水泛河身倐遷復將蘇觜建義等處決兩大口各二三百丈河水直從兩決口奔迅而下入射陽湖遂使相近各邑盡沉水中民所以無家無食而思盜也雖塞決工力頗大然不塞恐所失倍多所當乘時議築即驅此飢民為荷鋤戴畚之舉將兩利俱存此又救災之長計也已未直𨽻揚州府髙郵州寶應縣災民楊元逹等疏言寶應首當黃淮下流之衝去歲六月既遭水患流移尚未盡復不意今年六月黃河漲溢淮安蘇家觜復潰數百里之間廬舍悉沉水砥寶應逼近淮黃水之來也獨先水之去也獨後自六月至今已及半年水勢不退無復種植之望加以功令嚴切漕米轉盼開徵民間各項催科雜然並起窮民無衣無食舍死計復何之願垂念瀕河下邑兩被異災準將本年漕米及一切逋欠錢糧慨賜蠲停仍大發帑金賑濟俾守死不去之飢民不至畏徵而再竄則祝頌皇恩世世以之矣章下所司十二月丁卯山東道御史吳甡以揚州府屬興化等州縣自崇禎四年六月水漲隄壞決新河蘇家觜建義口等處修葺未成至今年六月蘇家觜等口又復大潰由鹽城而興化而寶應髙郵無處不被其害其髙寶一帶漕隄如金門閘九里七顆柳及淮安二城闕等處又在在告潰數百里內村舍田廬漂蕩一空老弱飢溺之情鄭圖難繪在計臣亦知興鹽為異常災傷矣而興化漕糧止議半折又每石折銀八錢夫興化受水劇於鹽城即令全折亦難完納神祖時曽截漕糧數十萬石以振山東飢民今獨奈何吝此數千石米不以恤災黎也至按臣言塞河一事尤中肯綮業蒙明旨詰責矣然時日已久若長隄不為速築黃淮永無歸海之期而興鹽等州縣長為衆水之壑兩淮鹽課數百萬何所取給大盜出沒其間漕運咽喉從此斷矣其關係何如者及今冬末春初水勢稍退施力頗易至若明年桃花水泛瓠子興歌農時一奪終歲失望伏望嚴敕漕河諸臣選委廉能府佐州縣正官會勘確估分理其事責道府董其成而撫按操三尺繩其後嚴限今冬十二月內興工明年三月內報竣更預懸賞格築塞堅完者紀録優擢遲緩疏虞者重議加罰如是則金錢不致委之逝波而責任克專功罪不爽方無委卸之弊矣帝謂河決貽害如此所設總河重臣謂何著朱光祚會同總漕李待問速行勘估刻期興工務在堅整早竣其蠲恤事并議以聞崇禎長編是年六月河決孟津口橫浸數百里明史稿五行志行水金鑑卷四十四
