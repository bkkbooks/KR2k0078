body:
  text: 行水金鑑卷四十五江南按察使傅澤洪撰河水崇禎六年五月已未吏科給事中吳麟徴疏言河決之患於今三年總河朱光祚望洋而歎幾幸於神河之時徙識者已知其不能矣然以運道言則亦漕臣事也以地方言則又撫臣事也今督漕而兼撫者李待問也待問安得晏然已乎按黃河之勢如歸仁隄決以泗州為壑而祖陵有泛濫之憂睢寧河決以淮揚為壑而州縣被吞嚙之患今蘇家觜新溝口各決數百丈河水不東歸海而從決口南下灌山鹽髙寶興泰數州縣淮揚淪溺則鹽課不興運道堙塞則京師坐困此孰非漕臣之憂而度外置之矧此二决去河臣千里去漕臣僅六七十里乃坐視昏墊之民了無纓冠之救使百萬生靈無半菽之果腹無寸椽之棲身田廬塜墓陸沉海底登城而號仰天而泣誰司民命而曰治河非我事也兩淮為南北咽喉國家以重臣鎮之轉運之外俾以軍務責之撫綏非尋常節鉞可比今民生日見死亡盜賊日見生發彼紅袍黃巾出沒於江淮湖海間者儼然與撫臣爭衡逼處而莫敢問至若通泰之鹽徒蕭徐之妖孽古今竊據之雄往往出此倘河工無告成之期災黎絶更生之望聯翩四起滔天之勢不在淮黃而在封疆待問即欲諉卸亦何從而諉卸乎章下所司六月已已鹽城民徐瑞等疏言淮揚兩郡計二十一州縣四面地形皆髙而興化鹽城地居窪下所謂澤國也且四瀆之水黃淮最巨交合於清河口而東歸於海瀕海一帶鹽竈星列有范公隄障之始免浸沒之患自四年六月黃淮交漲隄潰河決水不歸海而從建義諸決口下灌興鹽等縣懸水數仞勢若建瓴數日之內水深二丈千村萬落漂沒一空至五年四月始議築塞費金錢數萬止完新溝一處延至七月伏秋水發前功盡廢黃淮之水奔流下注皆以興鹽為壑尤可異者四月三日海潮迅發范公隄衝壞數處狂濤巨浪排空而來近隄鹽場室廬牲畜及軍民商竈漂者沒者死者無算失今不治久之興鹽兩縣與大海混合為一而鹽課漕運從此俱壞此豈尋常水患可不為之寒心也至小民流離死徙之苦前此兩年尚有稍裕之家儲積之餘竭資盡力從事南畝不謂攴祈著孽兩肆稽天將垂熟稻田盡付陽侯處處村舍悉為蛟窟而人與財俱盡矣今年水積不退浩瀚仍前自去歲七月以來如江如海併往日水澤之利魚蝦荷藻之屬一望茫茫何處尋覔今二麥未種三春不耕欲采樵而無路欲煮海而無鹽欲賣女而無受買之家欲鬻田而無交易之主衣裳無典質之具富室絶稱貸之門身衣鶉結之衣人食犬彘之食以故老弱僵卧道殣相望少壯轉徙飛鴻滿路乘桴流丐於江儀通泰之境而其力不能移飢不能支者或夫妻引頸雉經樹梢或子母投河葬身魚腹而最可傷者新任教官王明佐無俸可支欲歸無計忍餓經旬自縊衙署官尚如此而况民乎怨號之聲上震天地水熱交蒸結為癘疫而死亡者又不可以數計也嗟乎使人止於死亡則亦已耳而無奈閭左惡少城市不逞之徒莫肯忍飢待斃甘心為盜東西嘯聚千百成羣以棹楔為矜㦸以帆檣為戰馬殺人如麻膏血川原如近日沙家莊湖北莊等處所過殘滅其來也千人為隊勢同席捲其去也湖天為家任其出沒而海外巨寇以千萬計飄忽無定縱橫任意新興上岡一帶幾同戰場臣等有不忍言者逃亡之家反作寇盜之寨蛟龍之窟盡為豺虎之場致河道阻絶糴販不通市無米肆厨絶烟炊比之晉豫慘毒萬倍按户口圖籍民之死者十三逃者散者及聚而盜者十四僵卧孤城難保旦夕者十存一二耳有司雖賢慈母不能撫斷哺之子循吏豈能保垂死之民哉惟我皇上惻然而為之計臣等雖死為餓鬼亦感天恩不朽矣得旨淮揚屬邑淪沒朕甚憫之河漕各官不繕治隄防致兹流離其議處以聞八月癸亥以劉榮嗣為工部尚書兼都察院右副都御史總理河道崇禎長編是年三月十五日廣東道監察御史臣吳振纓謹題為河隄修築久稽祖陵浸嚙可慮謹以籲控未及河患緊要仰祈嚴敕急築以救墊溺以固根本事竊惟我國家千百年之王氣本於鳳泗祖陵即如黃河之發源星宿海不可淤遏者也神河遷徙不常衝決靡定所可以人力用事者不過溢者捍之則恃隄瑕者堅之則恃修潰者塞之則恃築費半而功倍乘隄未全潰水未泛濫之時晝夜拮据人工物料皆實少侵冒塗苴之弊則恃速夫沙泥逐水而下故河身漸髙徐邳睢宿之間往往水平於城蟻穴不支遂同魚鱉室廬漂蕩畛隰江湖自崇禎四年黃河橫流處處受馮夷之害至五年霪雨挾稽天之浸東南瀕漕之州邑無不載胥及溺上下號呼然如睢寧災民僅控沉淪之苦求改折蠲恤而未陳河患之繇前御史吳甡河決一日不塞之疏繪真情慘深切聖主警余之憂然髙寶興鹽一帶所急在新河蘇家觜建義口三處業奉旨查勘估計責成興役然黃河歸墟之下口非祖陵關係之上流也蓋鳳泗之水淮近而河逺故歸仁一帶之隄防淮而不防河以睢寧上下舊築西北長隄數百里障河之橫而束其流以歸於海此歸仁之外捍也向漕運走徐邳則為漕護隄歲勤修築自直河改運而急漕者視此隄為緩且邳州築其攔壩羊山塞其分流水盡逼於睢寧有不容不決之勢矣故如餘堡雲堡露堡湯家園諸口先後俱決是向之黃與淮至清河始合而今之黃水潰漫睢寧最下與淮合併浩渺無涯歸仁隄失其捍蔽而兼之黃强淮弱狂怒奔衝非一隄之力所能砥故修歸仁所以衛祖陵而不堅塞雎寧外隄之決口則水勢吞天歸仁單薄每歲黃河泛漲桃花瓠子非但數百萬生靈不堪久作沉蛙而祖陵萬一再驚何以慰皇上之孝思此憂河者所未全計而不知為治河之要著也錢糧浩繁河臣蒿目然當大壞極蠱之日不得不為一勞永逸之圖夫古今治亂以抑洪水與兼夷狄治亂臣賊子並稱則不得以闕齊晉之禍為烈而以懷山襄陵之割為淺也至於災疲之民死亡流竄什不存一則穫薪久浸不宜復派工料使殘黎苦賠纍之波萍梗無依豈可空役孑遺俾顚仆作淪胥之續地方有司倘仍踵夙弊奸胥猾吏攤派擾民沿河大黠賤收貴賣通同管河之官每兩止發七八錢而買運交納費至三兩者又闔縣報差報役用賄買脫及包夫顧募得財無夫者又一掃用柳枝朩樁蘆繩柴草等件大者百金以次俱數十金而以少作多虛冒官錢者種種騷害弊難盡書故河決之禍大而顯治河之虐慘而深夫不見淮揚之光景乎有水無地有地無田有田無人有人無稅自徐邳而下大江而上千餘百里以商旅輻輳之區為盜賊依踞之所邑里蕭條水陸幾斷不知者以為鹽賦所出疑為富庶而民愈貧商亦愈困災日久鹽亦日艱竈户蠢蠢必為將來之憂且曹濮相連海氛不測不思以生之養之勞之來之如愛身者先護咽喉以通五榖而後可講調理滋益之方是在州縣實心愛民董河官親身查歷毋使難設處之金錢委諸逝浪已陷溺之赤子再納溝中是所當嚴加申飭者也伏惟聖明采擇施行奉聖旨本內歸仁等隄修塞事宜著該部詳酌議奏其官胥通同侵冒差派害民等弊該督撫按向來何無紏參即著確查指實奏來不得庇縱淮揚災患堪軫已有屢旨著嚴飭有司核實節糜以示存恤該衙門知道七月十一日御史吳振纓又題為河患潰壞已極漕河分合宜明祈愼簡才智精敏之臣以責半載成功以保國家命脈事竊我朝之治河與前代異何也前之河以河論利害今之河以漕論利害故害河即以害漕漕重則河愈重夫設總河以董河工設總漕以管漕務皆以重臣稱督在無事之日如庖人尸祝各有所司彼此不必代也然漕之於河正猶舟之於水泛濫多漂沒之患淺涸有梗塞之憂宜修築者一以為鞭長而不暇及一以為局外而若罔聞宜疏濬者一以有分司而聽其開除一以有專局而漫無經理及河決民魚溜險漕誤輸載者方為將伯之呼分過者似有代桃之惜臣以為河工之錢糧在河臣而地方之禍烈在督撫如遇風者豈坐待乎長年救懸者不倩梯於魯匠此主伯亞旅各殫心力彼此難相諉也故以漕論漕凡水次之稽延官旗之玩縱淮洪之過期此漕之罪也至旱乾水溢出於天而欲以人力齊之不能不與河臣同司其咎不幾為巡漕屈乎以河論河督臣既領專轄部司各有分提至如兵巡等道原有備兵治民之煩而漕既推挽恐後河亦奔命不遑功未同居罰與並議不幾為司道屈乎然總之急漕以急河以功令之切挽漕事之窮諸臣亦難辭責也况河之害又不止於漕乎臣讀淮安災民徐瑞等奏而為之泫然涕零且猶有未盡之籲也試以鹽城言之淮安原係水國十一州縣為宇內極貧苦之邦惟鹽城一縣産米故漕米三萬三千每年九月全完尚載米十餘萬石賣鄰封以完漕兌鹽城既沒必轉鬻於江楚淮民其能堪乎謂淮之無漕可且鹽城興化地窪瀕海鹽場獨多范公隄一障之內萬竈星連而決口蕩然商竈盡沒謂淮揚之無鹽課可又髙寶亦非故隄淪胥處處見告湖海淮黃盡作盜藪謂江北之無淮揚可以此言之而河功之萬利萬害其可寢食寧旦夕緩乎然治河難言之矣非有驅鱷射潮之精誠不能與海若爭順逆非有舟車輴樏之艱瘁不能以精衛鼓百司非有竹頭朩屑之細密不能使錢糧無尾閭非有相髙下度分合因勢利導一勞永逸之明智不能使𤣥圭告成事如河臣朱光祚敏練長才前以老成見推而年當榆景視聽不全言者未嘗求多用舍自宜速斷漕臣李待問揚歷巳深視漕不為不苦災患年甚一年縱河有可卸之擔而撫無代諉之咎在逺近皆以為不可即兩臣自信其難勝矣皇上洞觀萬里根本所係每念惻然明旨屢申嚴加鞭䇿然臣之任事者氣與神耳氣暮者不再朝神苶者不復旺今計水怒將偃自九月以至二月半歲之間氷沍居半一人誤則誤千萬人之功一日弛則害億萬家之命堯以不得禹為已憂今固無禹豈無聰明無恙精力鼓舞者足以破因循之習為瞑眩之圖乎此臣之所以繼諸臣部覆而再請也抑臣緣河事而有慨於捐助節省之名其為害不淺已祖宗每事設制豈節約之意獨疏而嘗以有餘供經費如河上歲修二十萬使以二十萬金每年處處巡督實實修濬河患必不至此而前總河李若星何邀捐助之名以歲修輸十餘萬也捐助奉㫖而停則不得不言節省矣不於稽核務實修而借吝惜為撙節於是決口應築以補苴塗目前淤塞應挑以虛役消故事醖釀決裂今節省者何在乎因而推之直省自撫按以至守令果真心為地方者有節省可報贖鍰可捐多積榖以備凶荒繕城池儲火藥製器械以防戎莽庫藏大小亦必有多寡之積以應急需必不至一動倉皇立時潰敗如萊州七月之圍非前官貯庫中硝黃萬計復掘地得油若干則城必不守若人人厪此逺慮過於曲突徙薪乞皇上以此為天下風凡地方有節省捐助錢糧即聽為地方備禦之用造冊申報以俟查核毋騖涓滴之名虛善後之䇿敢因河漕而并及之伏祈聖明采擇施行奉旨河漕國儲甚重決口未塞公私交害玩誤諸臣已經分别示警嚴飭責成如再不效自當重論至河防積壞總由各官玩泄豈得以捐助節省藉口該部知道吳侍御奏疏號侍御名振纓儉育烏程人萬厯壬戍進士疏中所言捐助之銀不由天降不從地出豈果出之私囊節省錢糧無非浮估於前實銷於後巧立名色愚弄朝廷此乃明末之敝政乎崇禎七年二月壬申賜漕運總督楊一鵬河道總督劉榮嗣等銀幣有差以建義決口告成也六月甲戌河決沛縣之滿壩及陳岸水口崇禎長編崇禎八年八月丙午巡漕御史倪於義糾河道總督劉榮嗣欺罔誤工諸狀帝令所司按問以聞崇禎長編是年九月庚戍總理河道侍郎劉榮嗣下獄瘐死明史藳崇禎九年七月辛亥總理河道周鼎疏言塞決將成忽有旁潰嚴旨責成確估辦料刻期報竣經管官指參重治崇禎長編是年河決長山參議徐標率河防同知張俊英塞之江南通志是年六月河決長山隄口塞之八月豐蕭河溢大水先是懼河之決㑹通也北築太行隄西起虞城界東抵沛縣復築縷隄用護太行西起虞城界東抵張村站又上自茶城下厯三山抵雙溝兩岸長隄之上每三里設鋪一所每鋪設夫十名外更設游夫巡邏協力防守房村設貯河料厰徐州志是年八月河溢大水蕭縣志是年秋霪雨三月黃河泛溢邑大水豐縣志崇禎十年六月辛酉以河水潰溢將道㕔官文運衡陳六韐分别降處并敕總河臣作速詳查決口辦料修築十月庚申徐礦管理清河崇禎長編崇禎十一年三月丁亥總督河道周鼎疏言挑濬愆期印官悠忽內糾滕縣知縣王俊民宿遷知縣劉育秀汶上知縣葉增光應加議處帝從之仍諭晝夜儹工不得玩泄八月已未工部疏核河工得旨新河浪費錢糧不準消算姜采既非經管錢糧其經手之官何置不問著該撫按一并核議抵補具奏九月辛酉浙江巡撫熊奮渭疏報兩浙疊罹水蝗章下所司崇禎長編崇禎十二年三月已卯河道總督周鼎疏言恭進捐助帝命照數察收七月丁已大學士薛國觀等捐助河工旨照數驗收八月庚寅帝以河江急需命將王體乾沒籍銀兩盡數發與管工侍郎乘時挑濬崇禎長編崇禎十三年正月丁已升張國維為工部右侍郎兼都察院右僉都御史仍帶住俸降二級總理河道提督軍務崇禎長編是年大旱黃河水涸睢寧縣志崇禎十四年八月戊申敕封河神金龍四大王加𢎞佑感應四字九龍神加翊運二字崇禎長編崇禎十五年正月乙未守備印司奇誣奏總督河道張國維十二大罪帝令回奏國維具疏辨司奇先為國維以浮躁參劾者也九月壬午黃河決朱家寨衝破汴城并衝賊巢溺死者過半周藩踉蹌趨渡河北冠紫絨帽衣藍狐裘乘四人柳朩肩輿並王妃世子宫眷三十餘人內侍三四人攜舊簏三隻暫寄柳園坊所司馳聞得旨汴城水患異常周藩暫渡河北倉皇遷徙深軫朕懷所有護安事宜禮部速奏十月戊申總河張國維疏請飬母不允壬子工科給事中李士焜疏言臣聞賊欲決河非一日矣然不即引水灌城者其志在金帛子女坐困城亡恣其所取耳遙聞秦兵出關恐盡力迎敵則圍汴必疏是以藉河北之捲噬當鋒敵之屠戮嗟此數萬生靈葬於魚腹金隄一決玊璧難沉誰取淇竹而障之哉督臣侯恂不據實入告乃曰河徙異變夫黃河效順三百年於兹矣何無事之日則為安瀾賊圍未解忽爾泛漲耶皇上無隱不燭恂敢於欺朦是誠何心也昔賊困歸德恂之子舉人侯方夏率領家丁斬關而出殺死守城生員數人滿城鼎沸遂不可守皇上試問恂家於郡城既破矣家口何以獨全臣不知其何辭以對也恂有倡逃誤國之子使之髙擁旌旄能服三軍之心哉若孫𫝊庭藉口募練逗遛不前發兵匝月尚未抵汴致闤闠化為蜃宫尚侈言軍容之盛紀律之嚴是國法所不貸也得旨汴寇久稽殲勦督鎮俱難辭咎嚴諭屢頒侯恂孫𫝊庭正在辦賊朝廷惟課成功不必苛議侯恂見遭家難何得云獨全已未總督河道張國維奉詔趨京道奏鎮臣劉澤清面語臣流寇乘九月水漲令黑蛇劉都古決河灌汴汴城被衝周藩播遷賊壘亦潰又别開水道遏入城根兩月以來城內之水幾與城平臣愚請浚故道引歸淮泗庶二陵無虞運道不枯已飛札督臣侯恂撫臣王永吉髙名衡調發官兵扼防決口帝是其言命所在協力修築庚申禮科都給事中沈允培疏言河患與寇患並亟請專敕才望大臣經理其事得旨狡寇逋誅致河水潰決藩國播遷援師已集該督鎮力圖𠞰蕩不得藉口河變縱寇壑鄰總督河道張國維疏言舊河臣周鼎以阻淺罷職宜復其官帶劉榮嗣以淤運並其子追比斃獄止存幼孫宜賜矜宥章下所司丙寅浙江南御史周燦疏言汴城河決請敕按臣確察是否天災抑由賊計則督臣之欺罔不可飾也且河形已徙則漕運必誤宜敕河臣相度經理得旨汴溺情形是否由賊灌天災著速行察明目今築塞應否設官督理所司看議十一月乙亥總督河道張國維疏言先臣宋禮治河通漕功在社稷今廟祀南旺薄田數畞敗屋數楹世祀生員宋崇光衣巾酬恩未盡請優與錦衣世廕永鎮南旺章下所司山東巡撫王永吉疏奏黃河之決大抵水衝朱家寨衝決汴城東門直走睢陽洶洶東南直下鄢陵鹿邑正當其奔嚙之衝則亳州泗州必受其害泗州地形窪下祖宗重地在焉恐不免昏墊之虞矣曹單定陶一帶皆山東地方在汴河下流若論徐邳清宿一帶皆南直地方則曹單復為上流皆見行黃河故道也今新河既開則舊河自涸上流既斷則下流自淤固相應之理而必至之勢耳千里運河一旦遷改乾涸之久漸成平陸思及於此真可寒心至於賊衆俱在河西歸德府及隔越於河北山東河險已無可恃非派撥大兵分信扼防難免暗渡此河形賊勢之大略也伏乞皇上立簡總河臣星馳受事或築塞以遏狂流或疏鑿以分水勢并乞敕下督臣侯恂河南撫臣髙名衡酌調兵將按地計程築墩堡置火器設遊兵防河一如防邊之法保全一線咽喉若夫鳳泗水勢有無浸及陵園總漕臣史可法行將馳報今尚未敢遙揣耳得旨汴河衡決關係陵運水勢直下情形詳議馳奏河臣黃希憲著星馳捍禦丁丑總督侯恂疏奏汴城河決兼賊勢披猖標下副總兵丘磊懷標署總兵白邦政率兵駕船濟渡難民十餘萬盡歸北岸請賜賑恤得旨察明議叙見今村集散處飢困可驗該撫按設法安排賑濟不得坐視十二月已卯命工部侍郎周堪賡修治汴河發御前銀十萬兩并敕所司不拘何項錢糧實撥濟用期以二月峻工十二月戊子巡漕御史沈向疏請治河略曰汴梁城後有老隄以障之再後有黃金隄以障之宋帝建都仗此黃河保護東西二京乃一時不察遽從朱家寨決開小隄欲灌賊而賊復大決以灌城汴城已成新河舊河竭矣河北失此天險可憂甚大且虞水注二京所關更巨况目今尤急者澎湃之巨波盡泄新河而董口無水回空糧艘何能越乎從董口至清口臣雖飭該管各官造壩蓄水然褰裳而過之水即戮力挽拽亦似登天再入深冬下注之勢已靜而中蓄之漲盡絶來年重漕將何計哉又閒原決兩口水已不流又從西越二里新決一口濶一里餘其洶湧之勢較之前口更急計水九分而舊河止一分矣是前決一口今決兩口矣先口止窄而緩新口愈寬而險矣伏乞皇上速遣督工大臣星夜抵豫不惜巨萬金錢乘此冬令水馴之日繕堵決口逆挽狂瀾還返故道則目前之回空得行而來歲之重運亦通陵寢可以無虞而神京亦恃天險此正呼吸俄頃之際倘緩須㬰水勢南奔日久益難挽回勿謂臣言之不早也章下所司崇禎長編流賊圍開封久守臣謀引黃河灌賊偵知預為備乘九月中水漲令其黨黑蛇劉都古決河灌城城內之水幾與城平民盡溺死總河侍郎張國維方奉詔赴京奏其狀山東巡撫王永吉上言黃河決汴城直走睢陽東南注鄢陵鹿邑必害亳泗侵祖陵而邳宿運河必涸帝令總河侍郎黃希憲急往捍禦希憲以身居濟寧不能攝汴請特設重臣督埋命工部侍郎周堪賡督修汴河明史稿崇禎壬午寇圍大梁汴人死守不降有獻䇿髙巡撫名衡者曰賊營附大隄決河灌之盡為魚鱉矣周王募民壘羊馬城髙厚如岸援兵掘朱家寨口賊黨覺移營髙岸多儲大航巨筏反決馬家口以灌城河驟決聲震百里排城北門入穿東南門出流入渦水渦忽髙二丈士民溺死數十萬靜志居詩話開封城北十里枕黃河至是賊圍城久人相食壬午夜河決開封之朱家寨溢北城越數日水大至灌城周王恭枵走磁州以巡按御史王漢舟迎之也巡撫髙名衡推官黃澍等俱北渡吏卒倉猝各奔避士民湮溺死者數十萬人城俱圮賊屯髙地獨全開封古都㑹富庶甲於中原竟成巨浸水大半入渦入泗入淮與故河分流邳亳皆災明紀事本末自汴城灌壞蘭陽縣黃河涸如平陸目遊海記四是年流寇決河灌汴於是河南一帶流緩沙停河身淤澱之禍實基於此淮安府志崇禎十六年二月乙丑總理河道黃希憲疏奏河決日甚請增重臣督理因薦淮漕道徐標原任湖廣巡撫余應柱奉召還朝現抵淮上請擇用一人又請截留邳州沭陽寄頓餉銀三十五萬為河工經費一勞永逸之計得旨周堪賡曽否抵汴興工著察催嚴飭其應動錢糧及遴委道員所司速議戊辰督修汴河侍郎周堪賡疏奏河決朱家塞馬家口上下兩口相距三十里至汴隄之外合為一流直衝汴城得旨兵部看議速奏庚午御史黃澍疏言臣復命至涿州接邸報見工科給事中陳燕翼國賊未除一疏蓋為臣守汴奇苦之疏而發也臣讀竟歎曰燕翼為皇上發奸至於稱引祖宗申明賞罰其氣壯其辭激其理直可謂不愧諫臣不顧私交然惜燕翼借題則是吠影則非也立議似正排陷則非也顧守汴一案亦大矣河決一案亦重矣天下至大且重之事須要天下人明目張膽言之以求一當誰敢隻手蔽天臣請就其疏一一應之疏云決河灌之乎臣應之曰黃河之不遑修築者五年矣崇禎十四年七月二十八日河從黃金壩朱家寨等處決進七八里衝入土隄周王發銀錢數千連夜招人堵塞撫臣髙名衡以下皆半夜出城修築當時賊未圍汴約以次年春間大興版築至十二月而賊又攻汴矣狠攻二十晝夜而賊去竭兩月之力僅修完城垣而賊又來自四月二十八日賊困城下消息不通七月間賊謡言決河以惑我衆然自七月至九月初旬城下俱無水九月十四日水到城下十六日四門齊壞洪流萬丈臣等方痛哭求死遑知水所自來乎聞按臣嚴雲京曽疏請決河劉源清亦自認決河皇上惟敕二臣從實回話并責舊督臣侯恂河北巡道楊千古各陳當日確聞確見仍一面敕問周王及汴梁渡河士民果否十四年有決之事則臣言可復燕翼說謊之罪自見矣疏云河水驟至豈真艤舟城中以待臣應之曰水自十六日湮城臣絶火城頭者五日臣素募死士十餘人中李用柳體直二人善浮水十七日泛一朩於水上飄流渡河三晝夜始達大隄監軍臺臣王燮正在隄上催船運糧見臣血書捶胸痛哭駕舟進城先覔周王以火漸渡王燮見在可召而問也疏云百萬生靈俱死而撫按何以獨生撫按要緊官獨生而么麼不急之佐領何以偏死臣應之曰汴梁百姓周王宫眷而外臣七月初旬以㸃保甲為名實在人丁三十七萬八千有零至九月初旬再一查㸃秪存奄奄待斃者三萬餘人耳城中白骨山齊斷髮地滿神號鬼哭天日為昏蓋死於餓者十之九至撫臣及臣等所以不死者皆分信城頭以城垜為家也按臣嚴雲京所以不死者在河北也蘇同知彭通判原未有專守信地且以久餓之身歸衙與妻子同聚餓死所以水到不救也此死不死之所由分也疏云決河避賊未有髙名衡不職倡而嚴雲京敢職和者也未有心腹推官不預謀於兩臺而能以一人一時獨生之者也臣應之曰當賊之久困城下也凡五閲月撫臣且不識按臣之面倡和當從何來臣自六月過河至封丘縣親詣按臣輕騎渡河彈壓按臣畏縮不前臣切齒而去此後左兵失利內外隔絶血書不通臣能飛身預謀乎臣有異術能起白骨驅餓鬼而用之乎疏云臣以二年餘推官借題速化臣理開封時未及三年前兩番禦寇七晝夜之失而復得二十晝夜萬死一生他人即不知之今科臣劉昌臺臣鄭封先後同患難者試以問之臣之苦見臣之心見矣况臣此番業已蒙恩行取已出城而復入城速化者豈如是乎疏云臣所播弄者祖宗朝廷之威福豫奪皆神人之憤怒也臣應之曰威福子奪出自皇上面奏之日原自認罪皇上憐臣而官之臣疏有云臣若乘此機㑹以茍且於功名天地鬼神必誅臣以為躁妄者戒臣出都時曽有手字與職方司郎中尹民興求其勿叙臣功民興可問也臣豈茍於功名者燕翼以微臣僥幸得官皇上以私行賞又何以示臣民垂久逺伏乞收回成命并乞革禠臣職以俟論定將燕翼之疏與臣今疏併前守汴奇苦一疏取至御前仍遍召九卿科道從公參議以守汴還守汴之人以河決問河決之人以失事罪失事之人仍廣咨博訪之河南河北宗襟士民之口如燕翼之言是乞速下明詔某臣當得某罪明定其案則可以服人心否則立正其誣則可以存清議矣帝言已有屢旨不必滋辨三月丙子命暫停河工癸未總理河道周堪賡報河決馬家口十一月辛丑工科都給事中汪惟效疏奏汴河塞決無聞帝言汴河修築經年近來何無奏報殊屬延誤著查錢糧有無全到及工程限期逐一奏明該部速行振飭十二月丁卯命河臣周堪賡將修過河工繪圖以進崇禎長編總河周堪賡上言河之決口有二一為朱家寨寬二里許居河下流水面寬而水勢緩一為馬家口寬一里餘居河上流水勢猛深不可測兩口相距三十里至汴堤之外合為一流決一大口直衝汴城以去而河之故道則涸為平地怒濤千頃工力難施必廣濬舊渠逺數十里分殺水勢然後畚鍤可措顧築濬並舉需夫三萬河北荒旱兖西兵火竭力以供不滿萬人河南萬死一生之餘未審能應募否是不得不借助於撫鎮之兵也乃敕兵部速議而令堪賡刻期興工至四月塞朱家寨決口修隄四百餘丈馬家口工未就忽衝東岸諸掃盡漂沒堪賡請停東岸而專事西岸帝令急竣工六月堪賡言馬家決口百二十丈兩岸皆築四之一中間七十餘丈水深流急難以措手請俟霜降後興工已而言五月伏水大漲故道沙灘壅涸者刷深數丈河之大勢盡歸於東運道已通陵園無恙疏甫上決口再潰帝趨鳩工未及奏績而明亡矣河之決也開封推官黃澍脫身抵京進守汴至苦疏帝令議叙擢御史給事中陳燕翼攻之謂決河灌賊皆其謀澍以巡按御史嚴雲京嘗疏請決河具疏申辨給事中李永茂因劾雲京而其同官光時亨劉昌先後言河決有因請治首事乃命撫按確核於是河南巡按御史蘇京核奏始末言雲京為禍本云㑹國亡雲京竟獲免明史藳是年九月河決入渦河先是四月闖寇李自成圍汴決河灌汴水但繞城隍而已九月十七日夜雨大風河自朱家寨南決壞汴北門及曹宋二門而出南入於渦河南通志行水金鑑卷四十五
