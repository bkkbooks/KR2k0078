body:
  text: 行水金鑑巻四十六江南按察使傅澤洪撰河水世祖章皇帝順治元年命兵部尚書楊方興治河淮安府志然按方興字浡鑲白旗人是年夏黄河自復故道秋温縣河北塌三十里時村落盡沒河南通志世祖章皇帝順治二年河決考城之流通口次年隨塞淮安府志世祖章皇帝順治三年劉通口決水北徙午溝至徐一帶河流涸竭豐縣志世祖章皇帝順治四年以黄河疏通決口工成河督楊方興豫撫吳景道加級賞賚有差河南通志是年九月十六日河溢餘流自單入豐注太行堤深丈餘豐縣志世祖章皇帝順治五年河決蘭陽河南通志是年八月大水薄城堤下蕭縣志世祖章皇帝順治七年河決封邱朱源寨築荆隆口隄河南通志是年七月霪霖黄河溢八月九月雨大水秋禾皆沒蕭縣志世祖章皇帝順治八年築祥符單家寨堤封邱李七寨堤又築陳橋堤鄭家莊隄河南通志世祖章皇帝順治九年河決封邱大王廟口衝毁封邱縣城水從長垣趨東昌壊安平堤北入海大為漕渠梗河督楊方興豫撫亢得時親駐決口起大名東昌兖州及河南丁夫數萬治之旋築旋決乃于丁家寨鑿渠引河殺其勢祥符時和驛築隄又築常家寨隄商邱王家壩堤考城王家道口隄河南通志是年河決邳州雲南道御史楊世學疏陳治河事宜疏畧云今之水勢與前代雖異而實同前代止治河今則兼治淮矣盖淮為河之下流而濵海諸州縣如鹽城興化泰州劉莊白駒諸鹽塲則又淮之下流也各處下有海口上有閘壩河水暴漲多開閘壩使出海口則自無潰決乃前代已行之利臣聞定鼎之初居民因新昌餘賊縁海遁去漸次堵塞繼而行水之處變為圩田土豪衙蠧據為已有遂乆假不歸此海口所由塞也火東入海鹽船重載逆挽而西致費人力今海口既塞則行船安穩商人便之不樂復開此海口所以終塞也雖有安東廟灣亦可入海而其流不疏則勢不急水行壅溢所以潰決因是而上之則決扵開封矣中之則決扵髙寳矣間有謀及海口者其中奸人阻撓一曰海潮灌入則民田竈塲俱被其害不知海潮原有定時海口之内亦有防閘自有海口以來未聞田不可耕鹽不可煮也一曰水所經行之處城郭廬舍恐被衝漂不知入海之渠深濬之則無泛溢且海口盡開則水勢分散必不致衝漂也一曰沿海多冦須設兵以防不測不知水門啟閉必有專司入海之水其勢甚迅舟難逆行且水中但設暗樁則舟可斷也凡此皆鹽商衙蠧私溺其利而簧鼓其辭以亂當事者之心耳伏乞勅下河漕重臣親至其地毅然必行將凡有海口之處盡行開濬其漕堤閘口開閉各因其時然後循下流而上至扵河身别其淺隘去其淤沙使河身益深足以容水則河之波不及扵陸河之委易達扵海河南淮右之民庶幾其有瘳乎江南通志是年河口潰決城垣傾圮士民房屋什器淪扵洪波者十居六七幸三日後水盡退邳州志是年河決自鯉魚山南下逼武官營口遷塌民田三十餘里衝斷遙月等堤一十八道雎寧縣志是年河決祥符之朱源寨全河北徙浚支河以分之越五載始復舊日逰四海記世祖章皇帝順治十年武陟沁水決浸及修武是年築祥符黒堈回龍廟李七寨等堤原武趙家莊堤蘭陽板厰堤月堤考城芝麻莊隄河南通志世祖章皇帝順治十一年築陽武慕家樓隄商邱夏家樓隄虞城土樓隄考城王家道口隄河南通志是年河趨陽武縣西南潭口寺勢與堤平畚鍤逾兩月始息日逰四海記世祖章皇帝順治十二年築祥符守公寨堤回龍廟月隄陳橋堤蘭陽板厰堤陽武潭口寺堤包家厰隄及築封邱中灤城隄決口始告成又築考城王家道口堤武陟沁河傅村隄河南通志是年大王廟決口塞按大王廟逼近荆隆口自荆隆口決後下流之河身已經淤澱及大王廟又決下流益淤且自七年至十二年歴五載餘河身日就澱髙祗因彼時河身尚深數丈是以雖有淤沙將河底逐漸澱髙而人不知其害也然其後下流之易決實由扵此云淮安府志世祖章皇帝順治十三年築祥符蘭陽陽武商邱虞城隄壩河南通志世祖章皇帝順治十四年河決祥符之槐疙疸淮安府志時朱之錫為總河之錫字孟九義烏人順治丙戍進士是年築祥符槐疙疸堤清河集堤魁星樓堤陳留孟家埠遙堤又月隄蘭陽劉家樓堤儀封三家莊隄陽武隄封邱大王廟樓堤滎澤南岸堤商邱王家壩堤河南通志是年七月十九日上諭吏部總河事務重大必得其人方能勝任吏部右侍郎朱之錫氣度端醇才品勤敏著陞兵部尚書兼都察院右副都御史總督河道提督軍務寫敕與他特諭二十一日奏辭二十四日奉㫖卿以才品特簡河督著即遵㫖任事不必遜辭八月十七日奏請陛見疏畧云臣惟河道修濬在扵冬月水涸之時料理預備刻不容緩近閲邸報見舊河臣楊方興特叅黄河南岸修防失守官員一疏内稱槐疙疸小長堤一處漲溢漫沒孟家埠口一處頂衝崩潰臣責任攸闗毎一念及不遑寧處雖舊河臣楊方興見在河干而臣既膺委任何敢稽留且臣筮仕以來備員禁近日侍天顔今赴任出京去天漸逺犬馬之誠不勝戀戀伏祈皇上敕定日期允臣陛見恭謝天恩臣既得親承訓誨服膺勿忘刻期起程星馳趨任亦可以免遲悞之咎奉㫖著扵二十四日陛見九月初九日又奉㫖召赴景山恩賜御衣於十月初二日到任朱之鍚河防疏畧是年黄河南徙陳留孟家埠口潰決扵隄南築縷月堤五百丈復築堤一千二百丈陸續坍盡水衝遙隄知縣張重潤濬河一道引河折入新河南面遂免衝決浚儀封縣三家莊河長一千丈以殺北來水勢而黄渡河涸為田目逰四海記世祖章皇帝順治十五年二月十一日總河朱之錫疏報丁艱奉㫖河道闗係重大卿以才望特簡著即在任守制不必回籍三月二十二日上泣陳守制疏奉㫖河務重大知卿才堪總理前已有㫖慰留著遵行不必再有陳請九月初十日上籲請終制疏奉㫖河道重務正資料理仍遵前㫖勉留視事不必再行陳請河防疏畧是年河決山陽之柴溝姚家灣随即堵塞淮安府志是年築祥符黒堈堤常家寨堤儀封三家莊隄封邱楊家樓堤大王廟堤虞城歡堌寺堤河南通志是年河復決陽武縣城南慕家樓築河堤賴以無患目逰四海記是年九月河溢大水蕭縣志是年冬十月大雷雨河淮交漲流沒治南北田舍甚衆清河縣志世祖章皇帝順治十六年正月初八日總河朱之錫題奏兩河利害疏略云黄河建瓴萬里及入河南以下土壤既鬆羣流奔匯泛溢之害無代無之元以前河猶從北入海其間議塞議防官窮於智計民困扵徵徭者載在史册難以縷數迨至前明用河資運夫有嵗編銀有額設戒毖之法非不周也乃二百餘年之間被大害興大役者猶至五十餘見當時所稱治水能臣如徐有貞塞張秋役夫五萬八千劉大夏塞荆隆口用軍民夫十二萬餘潘季馴先後行河役夫俱以三十萬計所請帑金亦復不貲河之悍激湍流未易以人力勝盖其性然也我朝因明之舊數百萬京儲仰給東南黄河自滎澤以至山陽南北兩岸垂四千里茍蟻穴不戒漕且中斷則凡所以籌河者豈能與前明有異臣自䝉恩受事稽之故籍問之水濵前明經營遺蹟數十年來廢弛已甚如太行遙堤正宋任伯雨所謂寛立堤防約攔水勢者治河要䇿無以出此竟以工鉅帑詘議寢運河自通恵至清口止計二千餘里防淤防淺舊時規制僅存十五以臣職掌論之何事不宜修復然今司農告匱民力彫敝無論舉贏未易即斤斤嵗修常例河帑缺額漸苦捉襟臣早夜焦思實有不能一刻即寧者為今之計亦惟是内約盈虚外權緩急隨時補苴期不失為治標之䇿而已除應急修工程俟司道勘報容臣酌議具題外今據見行事例有宜稍加損益以禆河政萬一者共得十事一曰陳明河南夫役一曰酌議淮工夫役一曰查議通恵河工一曰特議建設栁園一曰嚴剔河工弊端一曰釐覈曠盡銀兩一曰慎重河工職守一曰申明河官專責一曰申明激勸大典一曰酌議撥補夫食各為一疏仰請睿鑒一特議建設栁園疏畧云黄河悍激湍流勢若奔馬禦險塞決非埽罔功毎捲一埽用栁動以千百束計千里長堤嵗用栁料數且不貲况伏秋河勢陡變埽料在手咄嗟之頃轉危為安可以免塞決之費即萬一有決埽料在手旋決旋塞不致正流日淤旁口日豁可以免塞大決之費故必使生植之數常有餘扵採辦之數然後可以源源相繼不然而樹藝不廣卒然有急無術㸃金縱有不竭之金錢無窮之人力亦不免束手坐困耳觀扵瓠子之歌有云河伯許兮薪不屬似可見栽栁一事竹頭朩屑似乎瑣細而其實乃治河者之第一義也查前河臣楊方興題請責成印官各扵河干按汛栽栁分别多寡照例勸懲俱經部覆奉有俞㫖惟是黄河一帶遼逺偏僻夫役偷安澆灌難徧臣等亦未能徧履長堤為虚為實尚未可知臣竊以為尤宜責令黄河經行各州縣印官扵瀕河處所各置栁園數區或取之荒地或就近民田量給官價毎園安置徭堡夫數名布種澆灌既便責成而道㕔等官可以親詣稽察秋冬驗明行以勸懲之例將見數年之後徧地成林不但有濟河工而河帑亦可以少節民力亦可以少甦矣再照官給栁價毎束五分雖不為少但一工用栁多至數萬既非市販之物又重以轉運之難斷非一二人所能辦故屢經部覆照例令印官責成里甲均採均運奉㫖通行已乆今惟嚴行申飭照地均買有栁之家聴其轉售如有包攬掯索扣刻準折等弊司道等官力行掲報到臣以憑叅究毋徇毋縱河道民生兼濟之䇿無以易此又嚴剔河工弊端疏畧云臣惟天下之事一事立則一弊生錢榖有錢穀之弊刑名有刑名之弊河工大矣豈能獨無要在有犯必懲而斷不能因去弊之故輙議變法併以悞河如語所云因噎廢食也臣履任以來詳加體訪約有數端一曰工程有石工有土工有埽工有樁笆工工力不到法式非宜一弊也料物虚浮徙事粉飾一弊也一曰器具有方船活閘刮板戽斗鐵鏟鐵钁布㨮竹筐鐵杏葉杓鐵簸箕五齒鐵扒鐵杵朩夯石硪雲梯等項儲備不預徒手莫施一弊也製作潦草不堪適用一弊也之二者是皆誤工者也一曰夫役有厰夫堡夫溜夫堤夫泉夫閘夫淺夫鋪夫或食條編或食河銀有募夫食估計河銀尅減工食一弊也奸豪包佔一弊也賣富僉貧一弊也賄鬻私逃一弊也一曰物料有樁朩栁梢磚石草柴蘆􅐨灰鐵糯米桐油等項交修掯索一弊也扣減價值一弊也折乾肥私一弊也盜用官物一弊也之四者是皆誤工而兼以病民者也然有在官在衙蠧地棍之不同除屢經禁飭外臣以為在官者宜責司道府㕔互相覺察據實報臣以憑題叅不得曰河道不預我事故行推諉如隠諱不報别有發覺即查嵗終原開賢否各官中間考語如有大相悖謬者治以徇庇之罪在衙蠧地棍者一如訪蠧之例責成各屬推官不時開報重者題叅輕者究治一嵗之内全無察報注以劣考庶奸弊可除而河工克濟是則勞民費財中樽節撫恤之一道也一慎重河工職守疏畧云總河一官所轄黄運兩河不下四千餘里豈能分身一一親理所恃以共濟者道府㕔印官耳而印官又未必能一意辦河則司㕔尤其要也是必預選而後綢繆可以無悞盖因材器使用人所亟而獨治河之事非澹泊無以耐風雨之勞非精細無以察防䕶之理非慈斷兼行無以盡羣夫之力非勇徃直前無以應倉猝之機若徒事繩尺以為無過去之無名留之有害事後議懲悔已晚矣故非預選不可然人之才畧可信操守難信人事可期意外難期預選固未易也但為河道起見何敢逆為過計改轍貽悞惟有白簡從之預選之法有二一曰薦用除道印各官不係專司者不敢薦用外伏讀敕書内開稱若所屬大小官員果能盡心河務即指實薦舉擢用又查前河臣楊方興扵順治十年十一月内題為就近請補㕔官毋誤黄運兩河事請以鉅野縣知縣佟養鉅補運河同知定陶縣知縣張鍾英補黄河同知俱經部覆奉㫖俞允似應題請照例遵行者也一曰儲材凡河官懸缺吏部陞補之日凖扵臣嵗終題薦官員内照其本等職級循序陞轉庶始終練達駕輕就熟而河防有恃似應題請酌議者也又必諳習而後幹濟可以圖成盖不學能知賢哲所難而况治河之事水性之變遷不常修防之方略異致器具物料之瑣屑百出夫役錢糧之盈縮多端若姑俟體訪而後施行機變之來呼吸不及事後補救損已多矣故非諳習不可然人之喜遷轉而惡淹滯則畏其留憚勞怨而圖安便則幸其去諳習亦未易也但為河道起見何敢代為私計信賞必罰惟有功罪分明耳諳習之法有二一曰乆任除道印各官不係専司管河㕔官俸滿為期不便更議外查工部題覆前河臣楊方興為請復河差三年舊例事内稱河臣疏稱河道事宜必須乆任諳練以觀其成非三年鮮濟中河一差相應改復三年更換等因奉有俞㫖欽遵在案查各河差俱以三年為滿惟通恵一差一年代更但邇來通恵河道地畝經圈錢糧甚費籌盡人夫更難整齊若一年一易毋論初任頭緒不知甫得通曉而報代之期又至功効難集且恐𫝊舍視之誰肯為數年經乆之圖者工作不堅錢糧益費亦有可慮合無凖照各河差例改為三年運道河帑不無禆益似應題請酌議者也一曰交代河防職掌刻灘乏人員缺代署不惟利害不切即驟然經營省解不易難免誤事除分司例應交代毋容更議查前河臣潘季馴河防書開稱徐州海防二道為河湖喫緊之區山東河南二道為黄河要害之地四道憲職併其所轄府州縣佐貳管河官如遇陞調去任等項與同管河分司一例守候交代又稱新舊交代以河上事體轉相𫝊告等因今除不係専司各道不便更議外其河南管河道併各省府州縣管河佐貳官合無查照往例陞調降用俱令候代離任仍將任内修防事宜備造清冊𫝊告新官違者容臣指叅庶綜理周密便於責成似應題請酌議者也以上四欵要在相濟而行則人材可以不匱而河道亦可以無虞矣又申明河官専責疏略云天下之事刑名錢榖皆可以理斷臆決文移辦治獨河道一事非足到眼到則形勢之委曲工程之堅瑕鮮不有錯施而悞事者查先臣潘季馴修築淮工調委附近司道八員分管且申飭各官總有應理公務止許工上幹辦此可見經理河事非身親不可而况乎分内職業又何暇舍已而耘人也况運河當旱涸之際黄流在暴漲之時一二河官逺者所轄不下千里州縣佐貳汛内河道亦不下百里刻刻往來尚不免顧此失彼若更有他營豈能無悞案查前河臣楊方興題請申飭河官不許别委己經奉有俞㫖但事乆易弛上司差遣必係急事河官自恐取罪勢又不敢强辭甚至有寧悞本職而黽勉從事者河漕闗係甚重誠不得不逆為過計仰請天語特賜申飭若河官奉委即自行具報到臣庶萬一因之貽悞責有所歸河官不報即坐以營求差委之罪又照按臣考察事闗大典豈容茍免但恐值河道多故時郡城相去河干道路必逺若河干不在竟以修防付之老人夫役臨流頓足何濟扵事合無容令該轄同事道府代為申明俟河事稍定凖赴補考庶責成専而河防得以有恃矣各疏工部議覆具題俱奉㫖依議卜疏俱切中時宜今止録其四十一月初四日上哀懇歸𦵏疏奉㫖覽卿奏具悉至情特凖暫假數月扶櫬回籍事竣仍作速赴任料理不必請代河務著遣官暫署河防疏畧是年築祥符陳家寨隄貫台堤儀封蘇家樓堤虞城羅家口堤考城王家道壩河南通志世祖章皇帝順治十七年河決陳州郭家埠築祥符班家埠堤魁星樓堤儀封楊家堂堤封邱新龍口堤商邱蘇家樓堤考城王家道壩河南通志苗是年茂勲任總河澄署理總河事並見山東全河備考十二月初三日朱之錫假滿回任見河防疏畧是年堵塞槐疙疸又河決虞城之羅家口本年隨即堵塞淮安府志世祖章皇帝順治十八年二月初五日總河朱之錫題估計考城王家道口嵗修工程錢糧一疏部議題覆奉㫖河道設立總督原宜總覈屬官稽察工程俾無冒濫今王家道口一工估銀一萬一千二百餘兩較十七年嵗修估銀太多朱之錫未經詳覈止憑縣冊輒爾草率具題豈是委任總督之意大不合理仍著朱之錫親赴本工勘騐另行確估具奏十月初十日總河朱之錫題看得河患惟河南為甚而修防之嚴密夫料之繁多較之他省猶費區畫此臺臣余縉所以據其前任封丘閲歴扵塞決大工者見之敷奏而有河防六欵之議也臣轉行司道屢加詳議據查得疏鑿之政宜講一欵河溜所衝無堅不克雖重隄累埽而坍塌勢陷補救不遑故莫善扵挑引河一著但形勢不同引河有可挑不可挑之異水性難定挑引河又有得成不得成之異是又在司河者相機設防期不致扵潰決成害耳採青之弊宜禁一欵嵗修栁料均派均運原不専事採青己經臣扵夫栁為河工大弊等事敬陳河工管見等事疏内詳議具題部覆奉有俞㫖在案但嵗修之功可以先期估派陸續催交至扵河勢驟變搶塞決工事機之來爭在呼吸若俱俟一一分派運到而後舉事則險者必潰已潰者必致不易收拾連年如塞雷家集決口槐疙疸決口皆扵境内亟採曠地隄路栁枝不動錢糧幸而告塞已事昭然似又不便膠執一端坐成貽悞唯是嚴禁河夫殘毁園圃果朩及借端索詐有犯重究不致擾民可也濵河之居民宜䘏一欵查兩岸堡夫率皆取之傍河居民既已效力河干何堪復充别役所有本身門夫雜差似應量與豁免以示體䘏至于劈柴一項嚴禁已乆併堡夫應辦課程俱經前撫臣賈漢復扵瀝陳堡夫之劇累等事疏内查明具題部覆奉㫖在案相應仍照部咨通飭遵行者也逺郡之夫役宜免一欵河夫苦役凡人之情未有不好逸而惡勞者但塞決大工尚不免調及各省毎年嵗修夫數雖少逺地既曰宜䘏近者又曰河患原闗通省不宜偏累近地之民前按臣李及秀條陳疏内固已曽言之矣况臣前覆按臣李粹然河夫之徵派當更等事一疏河南一省原係分别逺近照地出夫其在五百里外者仍議間年始一調用未嘗不曲示寛䘏至云免僉河夫派以供兵喂馬等役則差徭各有分𨽻逺近未必相當彼此紛紜似屬不便現今按臣劉源濬復有免夫觧銀之議容臣㑹同撫臣另議具題以聽部覆可也隄栁之䕶視宜勤一欵河防之法全資栁料若樹藝不繁即使錢糧不乏人力衆多亦終扵束手無䇿耳查部覆前河臣楊方興遵諭敬陳河道錢糧一疏内開河干一帶有栽栁三萬株及二萬一萬株者分别叙録有栽栁不及三千株并全不栽者分别叅處總河臣題報臣部具覆請敇吏部查照勸懲奉有俞㫖臣前者特議建設栁園一疏濵河州縣各置栁園數處栽植栁株秋冬驗明行以勸懲之例亦准部覆奉㫖在案但作何叙録未有定議㕔印各官合無定例有能自置栁園栽至二萬株以上者許將栁園地名栽過栁株呈報該道務扵秋冬之時驗明成活確數具結報臣准與具題紀録其動支官價置買栁園者務至三萬株方准紀録如有怠扵裁植及栁株枯損不行補栽者指名題叅分别議處庶勸懲明而鼓勵爭先修防有賴是亦節帑甦民之一大端也場厰之舊制宜復一欵建厰貯料仍設厰書以資登記設厰夫以資看守原係舊例特縁工食除荒裁革已乆今議厰書即扵河官書手内選充厰夫即于河夫正身内殷實守法者選充工食不必别議而責成既切稽覈自是倍嚴矣奉㫖工部知道河防疏畧是年築祥符王盧集隄中牟遙隄儀封楊家堂隄考城王家道壩河南通志行水金鑑巻四十六
