body:
  text: 行水金鑑卷四十七江南按察使傅澤洪撰河水聖祖仁皇帝康熙元年六月開封黃練口河決祥符中牟陽武杞縣通許尉氏扶溝七縣田禾盡被淹沒七月淇縣沁水溢灌入御河浸沒民田甚衆是年築祥符狼城岡堤馬家店堤陽武姜家莊隄原武趙家莊堤修商邱髙家莊堤虞城侍賔寺隄河南通志是年五月河決曹縣之石香爐口十一月歸漕山東通志是年河決曹縣之石香爐又決武陟之大材中牟之黃練集俱本年堵塞淮安府志是年河決孟家灣口雎寧縣志聖祖仁皇帝康熙二年築祥符單家寨遙堤青谷堆幫堤瓦子坡隄又與中陽二縣㑹築隄岸又築陳留梁家寨堤蘭陽常家樓堤王家樓堤原武趙家莊隄河南通志是年河決武官營口睢寧縣志是年十一月初二日總河朱之錫題請復河差三年舊例疏云黃運兩河上關轉漕通塞而民生安危亦於此焉攸寄其間修防之方略異致節序之流轉相催即使明敏之官亦必得身親歷練然後當機應變施措咸宜無貽事後之悔以故前明河臣潘季馴有管河分司三年一換猶恐不能觀成請以六年九年為滿而科臣尹瑾復以管河司道等官遇三六年考滿加銜照舊管事凖與破格超遷之議此皆昔日慎重其事以為不若此誠不足以専責成而期實效載在河防刻書之中歷歷可考也即我朝前河臣楊方興于順治十四年四月內亦具有請復河差三年舊例等事一疏臣于順治十六年正月內復具有慎重河工職守事一疏俱經部覆奉有俞㫖遵行在案今因六部司官輪流升轉又兼滿漢並差議將管河分司亦改為一年更替之例敢不欽遵成命第河工關係既重水性變遷爭在呼吸又與他事不同若一年一換初則生手未諳茫然無措及至稍知頭緒而差期已滿年復一年豈免貽誤合無仰請皇上軫念兩河重計或將兼管鈔務所差滿官一年一換其管河分司漢官仍遵前㫖三年一換差內暫停遷轉俟其回部考核之後凖與叙升既於新例無礙而國計民生可以收駕輕就熟之效所禆河政非淺鮮也奉㫖該部議奏部議題覆奉㫖這河差滿漢官俱著三年更換河防疏略聖祖仁皇帝康熙三年杞縣河決築祥符黑缸月堤陳留貫台堤蘭陽銅瓦廂堤儀封蔡家樓堤虞城羅家口縷堤河南通志是年河決朱官營口睢寧縣志聖祖仁皇帝康熙四年四月河決虞城永城夏邑三縣廬舍田禾多被淹沒築封邱大王廟隄河南通志是年河決安東茒良口淮安府志聖祖仁皇帝康熙五年二月二十二日總河朱之錫卒故事節鉞重臣皆由廷推而公出自特簡實異數云公於丁酉孟冬受事凡為修守綢繆計者無不悉心擘畫以圖經久如夫役工程錢糧職守及諸弊端中間興革損益皆商確至當一一條上幾數十疏俱覆議報可於是河政煥然改觀庚子季冬復任殫力盡職益勤於初經營河上什一在署什九在外兼以雨暘勿若非旱憂淺即潦憂衝每當各工並急則南北交馳寢食俱廢值盛暑介馬暴烈日中隆冬嚴寒觸冒霜雪誠所謂勞不乘暑不蓋駸駸有古大臣風以故首尾十年無大工巨役數省之民獲免昏墊公亦坐是日憊欲乞身者屢矣㑹事格不果乙已冬督催空艘扺臨清夕處兩閘間風露浩浩夜以繼日不少休息及東旋形神憔悴入春後閲視大挑奔馳東臨邳宿間積勞日甚因繕疏請告未拜發而公遽薨是時經紀後事家無餘財其歷年所節河帑甚裕公在日不欲以餘羡邀功至是督撫㑹疏陳公勤事狀具言嵗修額銀為朝廷節省多至四十六萬有竒即此一端可以槩其官守公之治河也戊戍冬董口淤公從石碑口迤南别開新河二百五十丈接連大河以通飛挽已亥春駐山陽蘇觜五大險工叢弊一清復太行老隄民修之制各保廬聚條議中州夫役悉照十五年以年熟地分别逺近漸次調用人服其公清釐曠盡銀兩達部充餉辛丑冬清口至髙郵三百里間悉成平陸公集夫挑浚疏請分給食米故工巨而人不勞壬寅夏曹縣石香爐工決幾成大患賴公駐工籌畫夫料手口卒瘏凡五閲月塞決告成其他險工如王家道口孝成集槐疙疸黃練集俱著有成效而惠民莫如軫恤夫役泲州路當子午挽舟之夫動以萬計偃卧于道者不可勝數公具縴夫苦纍一疏備陳其不堪者六曲有調劑者四上嘉其奏下部議覆民困少蘇㑹嵗祲山左中州淮南道殣相望公設法倡賑全活者衆姦民朱明量誣胡守法不逞事株連數百十家公親讞欵伏良善獲安其他慈祥惠養固未易更僕數先是公欲纂輯河防一書續潘公季馴後㑹世廟升遐遂罷詩文書稿隨手散軼今僅存疏稿數十卷未鋟李之芳撰宫保尚書梅麓朱公墓志銘節略是年築祥符魁星樓堤黑缸口堤封邱于家店月堤儀封石家樓月堤河南通志字時盧崇峻為總河崇峻山斗廣寧人聖祖仁皇帝康熙六年築祥符黑缸堤中牟黃練集堤陽武穆家樓堤儀封石家樓縷隄河南通志總時楊茂勳再任河是年河決桃源之烟墩次年堵塞淮安府志是年縣西北長堤決石將軍廟蕭縣志聖祖仁皇帝康熙七年七月彰德府屬大雨河水湧漲平地水深五尺官民房倒塌無算是年築祥符一覽臺堤聶家寨堤黑缸堤魁星樓堤陽武趙家寨月堤蘭陽谷家營堤儀封石家樓堤小宋集堤河南通志是年河決桃源之黃家觜塞之復決次年堵塞淮安府志是年河決屋宇蕩然無餘邳州志是年四月河決衝沒西北居民田盧數十里三汊以下水不沒骭涉者褰裳而行漕艘不渡六月從土神廟決入治儀門內水深三尺自明天啓元年水決入治于今五十年再見決三義壩衝沒治後田廬數十里邑治幾廢清河縣志聖祖仁皇帝康熙八年築祥符瓦子坡堤魁星樓堤陳留梁家寨堤中牟原墩寺隄蘭陽梁家埠堤谷家營堤河南通志滿時羅多為總河多洲人是年河決三汊口清河縣志聖祖仁皇帝康熙九年築祥符李七寨堤守公寨隄中牟小潭溪堤原武廟王口隄趙家莊堤封邱大王廟堤河內仁孝寺堤武陟朩欒店堤河南通志是年八月河決曹縣之牛市屯次年修築完固河歸故道山東通志縣遭河決者五年是年五月再入治王家營二堡盧家渡文華寺皆先後而決邑內百里皆水其大堤決時衆見大火如毬旋轉堤上火焰蓬勃少頃雨雹疾擊人畜號聲震野是日之夜永興集亦大風雨火光灼然著人如熱是年河水大漲三決隄流離載道總河羅多自桃源界起東至龍王廟皆因舊址加築髙一丈面二丈廣闊六丈長三千三百三十四丈計程十八里半及入臘河冰水溢剷截村居廬舍及林朩無數清河縣志是年決單縣之譙樓寺漂沒民舍目逰四海記是年三月工科李宗孔又題河患萬分危急修塞刻不容緩方查覆估工之次五月暴風雨淮黃大漲浪撞卸髙堰石工六十餘段衝決五丈有餘又將烏沙河西堤岸衝倒淮黃之水直注于髙寶湖當是時髙堰幾崩淮揚二郡殆矣哉水之合淮黃從諸決口以注于湖也江都髙寶諸有司無嵗不防隄晝夜巡警增堤與水俱髙然以數十里奔悍之水攻一線孤髙之隄值西風鼓浪堤奔聲如雷一瀉萬頃其決愈遲為害愈劇而江髙寶泰迤東無田地興化以北無城郭室廬矣十五載中堤決者八而堤東下河自明隆慶間黃流入墊射陽其他如渌陽平望諸湖淺狹不能受水水驟至輒漫無所歸各河港疏濬不時淤塞日甚而范公堤下諸閘久廢入海港口盡塞雖經大臣㑹閲嚴飭開壩出水而年深工大所費不資兼為傍海奸竈所格竟不果行康熙七年戶刑二部會同河督漕撫親行踏看覆奏白駒場四閘當開石撻天妃口由新洋港入海之處當挑挖未見奉行水迂回從東北至廟灣口方入海七邑田舍沈水底者動閲嵗時比及宿水方消而新嵗之橫流又已踵至矣自九年後黃運等河并歸仁堤翟家壩白洋河等工俱用正賦濬塞黃河以外分為三大工分司道官總管餘各以佐二督工于是年九月開工始皆總河羅多所請也揚州府志是年秋河溢大水蕭縣志聖祖仁皇帝康熙十年築祥符黑缸隄陳橋隄中牟小潭溪隄儀封石家樓堤鄭州王家樓堤商邱蔚家閣隄考城芝麻莊隄河內武陟各築沁河堤河南通志是年二月羅多調别任總督河道改用王光裕于是光裕復勘議兩河情形移建季太壩前潘總河建四壩以泄黃水之過漲者一季太一徐升一三義一崔鎮七年題明重修八月題報安東茆良諸決口就塞然黃河故道愈淤正東雲梯關海口積沙成灘亘二十餘里黃河迂回從東北入海清口為黃水灌入裴家場悉起油沙天妃閘底淤墊本年回空漕船不能進口乃于清河縣南腰鋪地方支河之連張福口者疏濬通舟由周家閘行刑科彭之鳯疏言其害揚州府志遼按光裕字中立東人是年茆良決口塞先是山安一帶之小決口甚多而茆良口為大茆良決于康熙四年歷今七載而始塞故下流海口流緩沙停而淤澱日久云是年河決桃源之陳家樓即塞之又決七里溝十二年堵塞淮安府志是年六月河又決五堡堤八月決桃源七里溝清河縣志是年三月十八日河溢八月河又大溢髙下淪沒蕭縣志聖祖仁皇帝康熙十一年虞城黃河水溢築祥符黑缸堤白石缸堤陳留赫家寨堤中牟辛莊縷隄陽武潭口寺隄封邱大王廟堤儀封石家樓隄蔡家樓隄商邱蘇家林隄考城芝麻莊隄河內大馬口堤武陟大原村堤河南通志是年水決塘池舊城居民鳥棲堤上兩夜啼號聲聞數里邳州志是年七八月黃河四溢兩河口隄決山西坡大水各處村屋倒塌蕭縣志聖祖仁皇帝康熙十二年築祥符回河寺月堤陳留赫家寨堤中牟陽武㑹築堤陽武又築王家店堤封邱築大王廟隄儀封築蔡家樓堤商邱築禹王廟前堤虞城築劉家莊隄考城築史家樓等處堤河南通志是年三月河決桃源新莊口並王家營又自新河郭家口北決堤內外皆水田無立苗清河縣志聖祖仁皇帝康熙十三年築祥符貫台堤陽武張家莊堤儀封蔡家樓堤考城芝麻莊堤河南通志聖祖仁皇帝康熙十四年築陽武王家店月堤河南通志是年河決徐州之潘家堂及宿遷之蔡家樓俱于本年堵塞淮安府志是年河決花山壩口辛安黃山白山劉家莊董家莊青羊朩社等處當其下衝淹沒民田七百餘頃雎寧縣志是年六月河決入治田禾淹盡民多流徙清河縣志聖祖仁皇帝康熙十五年築蘭陽銅瓦廂月堤河南通志是年黃流倒灌洪澤湖髙堰潰決三十四處黃淮合并東下淮揚大困江南通志桃源新莊決于十二年至是始堵塞蓋因十三年八月堵塞將完遇秋水漲甚復衝九十餘丈更將舊決口之底衝深以致禍延數載而河身之淤澱彌甚云是年河決宿遷之白洋河及于家岡二處又決清河之張家莊王家營安東之邢家口二鋪口山陽之羅家口夏家口吕家口洪家口竇家口淮安府志是年淮黃復大決髙家堰時頻年被水諸堤工皆未竣河淮正道日益阻塞是年五月因久雨遂大潰決前此諸工盡廢髙堰一帶倒卸三十餘處水浸揚屬又過往年三之一漕堤殆不能支隨亦崩潰髙郵之清水潭陸漫溝江都之大潭灣等處共決三百餘丈殘缺不可勝數深及四五丈不等自堤以東浩浩乎茫無際涯矣報聞特遣大司空冀如錫少司農伊桑阿等親行相視訪究利病刻期奏報揚州府志聖祖仁皇帝康熙十六年春二月總河王光裕解任勘問命安徽巡撫靳輔總督河道三月敕諭總督河道提督軍務兵部尚書兼都察院右副都御史靳輔兹以總河關漕運大計特命爾總督河道提督軍務駐劄濟寧州凡山東曹濮臨清沂州河南雎陳直𨽻大名天津江南淮揚徐潁各該地方俱照舊督理爾督率原設管河管閘郎中員外主事及守巡河道官將各該地方新舊漕河及河南山東等處上源往來經理遇有淺澀衝決堤岸單薄應該幫築挑濬者皆光事預圖免致淤塞有礙運道合用人夫照常于河道項下附近有司軍衛衙門調取應用其各省直嵗修河工錢糧但係河道工程俱照近日新行事例通融計處支放務要規畫停當毋得糜費若所屬大小官員果能盡心河務即據實舉薦有侵漁溺職怠玩誤事及權豪勢要之家侵占阻截並違例盜取河防應拏問者徑行拏問應參奏者指名參奏其河道緊要機宜有干漕運督撫衙門㑹同計議施行若有重大事情奏請定奪年終將修理過河道人夫錢糧照例備細造册圖畫貼說奏繳或有土賊不時竊發慮河運為梗爾當精選將領嚴核兵馬勤加訓練申明紀律如遇賊寇窺竊即督發鎮將官兵勦滅勿使蔓延如有將領臨陳退縮殺良冒功及糧運稽遲失誤軍機者武官自四品以下文官自六品以下㑹同提督巡撫准以軍法從事鎮道等官飛章參處務期消弭亂萌保安地方其山東河南各巡撫悉聽爾節制河道軍務有開載未盡者許以便宜舉行不從中制爾以才望簡用須殫竭忠猷不避勞怨斯稱委任毋或因循怠忽及處置乖方有負委托爾其朂之特諭六月大挑山清髙寶等四州縣運河并清口爛泥淺引河四道及清口以下至雲梯關河道靳文襄治河全書按公甫到任即大挑運河及清口以下至海口河道乃不于堤築為事而能使水由地中行可謂得治水之要領矣是年七月河決楊家莊二百餘丈時河流僅一線亦有水從旁泄而河之故道竟成平陸者總河靳公上經理河工事宜八疏先于宿桃清三邑內開引河以濟運又于清口以下直出雲梯關外並開引河以導入海之勢淮安府志是年總河靳輔陳經理河工事宜八疏上悉俞其請復大發帑金専任委成是年裁髙郵分司南河工部于是開白洋清河以東引水河而黃河始入海開清口兩傍引水河而淮水始出河又築河岸遙隄縷堤修髙堰堵翟壩上流載導而揚境以內工亦同時並舉揚州府志總督河道靳輔題為河道敝壞己極等事疏略云備稽當日所以敝壞之緣由力求今日所應補救之次第大抵治河之道必當審其全局將河道運道為一體徹首尾而合治之而後可無弊也蓋運道之阻塞率由于河道之變遷而河道之變遷總由向來之議治河者多盡力于漕艘經行之地若于其他決口則以為無關運道而緩視之殊不知黃河之治否攸繫數省之安危即或無關運道亦斷無聽其衝決而不為修治之理矧決口既多則水勢分而河流緩流緩則沙停沙停則底墊以致河道日壞而運道因之日梗是以原委相關之處斷不容于岐視也今若不察全局之情形事勢而因循故事漫為施工則堵東必西決堵南必北決徒費時日徒糜錢糧而終歸無益豈惟無益將河患日深而莫可救藥矣何也黃河之水從來裹沙而行水大則流急而沙隨水去水小則流緩而沙隨水漫沙隨水去則河身日深而百川皆有所歸沙停水漫則河底日髙而旁溢無所底止故黃河之沙全賴各處清水併力助刷始能奔趨歸海而無滯也查今日河患之所以日淺者皆因順治十六年至康熙六七年間所衝之歸仁堤古溝翟家壩王家營二鋪邢家口等處各決口不即堵塞之所致也蓋歸仁一堤原以障雎水并永涸邸家白鹿諸湖之水不使侵淮且令由小河口白洋河二處入河助黃刷沙者也自順治十六年歸仁堤衝決之後雎湖諸水悉由決口侵淮不復入黃刷沙以致黃水反從小河口白洋河二處逆灌停沙積漸淤成陸地至康熙六七年間各處水大黃淮并漲黃漲而王家營邢家口二鋪口等處衝潰矣淮漲而古溝翟壩等處衝潰矣王家營邢家口二鋪口等處衝潰之後黃河之水由決口四漫者多而由雲梯關外入海者少古溝翟壩等處衝潰之後淮河之水由髙寶諸湖直射運河衝決清水潭下淹髙江等七州縣之田者多而赴清口㑹黃入海者少河淮兩水俱從他處分泄不復并力刷沙以致流緩沙停海口積墊日漸淤髙從此由逺至近由外至內河沙無日不停河底無日不墊海口淤而雲梯關亦淤雲梯關淤而清江浦清口并淤矣逮至康熙十五年間各處又復水大黃淮又復并漲清口以下之河身既髙不能奔趨歸海而雎湖諸水又合淮水并力東激以故除古溝翟家壩等原衝九處之外又將髙良澗板工衝決大小二十六處髙家堰石工衝決口大小七處諸水盡由各決口直注運河加衝清水潭三淺等處各決口下淹七州縣之田而涓滴不出清口黃水又乘髙四潰衝決于家岡等處又復灌入爛泥淺將武家墩板工衝決五十丈入故明所開之廢河歷楊家廟㑹合淮水直奔清水潭其武家墩上流刷成大河寬一二百丈不等又分一股入洪澤湖由髙家堰石工決口㑹淮并歸清水潭而于各舊決口之處則又浸淫四漫較之以前勢愈分泄以致下流更淤而河身之髙墊更不可言矣查自清江浦至海口約長三百里向日黃河水面在清江浦石工之下今則石工與地平矣向日河身深二三四丈不等今則深者不過八九尺淺者僅有二三尺矣黃河淤運河亦淤今淮安城堞卑于河底矣運河淤清口與爛泥淺盡淤今洪澤河底漸成平陸矣况尤有堪慮者目今現在之河身既已墊髙若此而黃流裹沙之水則自西北萬里而來晝夜不息一至徐邳宿桃等處即便緩弱散漫臣目見河沙無日不加積河身無日不加髙若此時不及早大為修治則不特洪澤湖漸成陸地將南而運河東而清江浦以下淤沙日甚行見三面壅遏而黃流無去路矣夫以萬里逺來浩浩滔天之水竟至無路可去則勢必衝突內潰而河南山東二省恐俱有淪胥沉溺之憂彼時雖費千萬金錢亦難以尅期補救臣是以謂今日敝壞已極修治刻不可緩也但既經修治則必使無旋修旋圮之虞更必使有可行可久之道始為有當臣逐細籌酌其間修舉情形有必當師古者有必當酌今者有須分别先後者有須一時並舉者總以因勢利導隨時制宜為主臣謹竭臣之愚備采衆論而詳加斟酌將應行事宜分為八疏條列具題貼黃難盡伏乞皇上睿鑒全覽敕部速議允行庶已淹之田可耕見在之地可保運道可通額賦可復其於國計民瘼誠均有攸賴矣靳文襄公奏疏行水金鑑卷四十七
