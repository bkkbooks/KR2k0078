body:
  text: 行水金鑑卷四十九江南按察使傅澤洪撰河水十二月十一日總河靳輔題覆第一疏略云募夫一節廷議謂逺派各省恐不肖官役借端擾民請敕臣酌量設法就近募夫不致誤工等語臣思道遙工長不肖官役借端擾民之事誠難保其必無然就近召募則斷不能取齊若倣照舊例多加工食以鼓舞招徠之則動須增費數十萬兩從何設處且即使加給工食而淮揚被水已久困苦災黎除死亡賣身之外其逃散四方者一時不能聚集應募者少必至誤工臣反覆籌酌更得驢駝代挑之法凡下鍬掘土并夯杵成堤俱用人力其往來運土則以驢駝約可省夫一半并原限二百日完工者改為四百日完工則前擬每日用夫十二萬有竒者今止須用夫三萬餘名并驢三萬餘頭足矣又其餘各工每日亦需夫七八萬其間但有可用驢駝以省人力之處容臣隨時斟酌而行則需夫不至太多可以仰遵廷議就近設法召募濟工矣至所需驢頭查江南非出産之處但若議派東豫二省雇募恐仍有不肖官役借端擾民之事容臣竟動錢糧行濟東兖開歸等府價買解淮濟用若夫兩岸遙堤臣原題面寬三丈底寬七丈髙一丈二尺每堤一丈用土六十方然臣又各處閲歷細察情形遙堤固屬必需而縷堤尤不可少蓋黃河流急則沙行流緩則沙墊而河身窄則流急寬則流緩今莫妙於築縷堤以束水而以遙堤并加築格堤用防衝決使守堤人等盡力防護縷堤設或大水異漲即有漫衝至遙堤格堤而止自不至于奪河成缺該守堤人等隨即星將縷堤仍舊築起為工亦易臣請將原估築遙堤之土六十方分築遙縷二堤并量增格堤其縷堤頂寬二丈底寬六丈髙六尺每縷堤一丈用土二十四方遙堤頂亦寬二丈底亦寬六丈髙八尺每遙堤一丈用土三十二方二共用土五十六方較之原估每丈餘土四方或隔五七里或隔十餘里即以所餘之土再築格堤一道格堤頂寬二丈底寬六丈髙五尺以上各堤均令守堤人等一併加意防護并將各堤逐年加幫務極髙厚可也靳文襄公奏疏以下七疏俱與原題無甚異同故不録是年秋堤決大水蕭縣志是年七月河決宿遷孫家塘清河縣志是年築中牟小潭溪月堤蘭陽銅瓦廂月堤儀封堌陽集月堤商邱楊家堂月隄虞城周家樓堤河南通志是年創築雲梯關外束水堤一萬八千餘丈塞于家岡武家墩髙家堰等處大決口十六處靳文襄公治河書下同聖祖仁皇帝康熙十七年奉旨這河工各本著議政王貝勒大臣九卿詹事科道掌印不掌印官會同詳確議奏二月初七日和碩裕親王等會覆第一第二第三第四第五第七等疏俱奉旨依議第六疏奉旨治河著動用正項錢糧捐助事例候旨行第入疏奉旨沿河地畝撥給兵丁又強令地主作為幫丁是否相合著再確議具奏後議覆不行命更定河工處分之例命撤回南北中河三分司部員其河道工程委該地方監司府佐二管理命設江南河兵八營凡五千八百六十名罷淮揚徐靈璧四府州縣堤淺等夫三月命豫省嵗修工程責成河南撫臣創建王家營張家莊減水壩二座塞山清安三縣黃河兩岸張家莊王家營邢家口二鋪口羅家口夏家口吕家口洪家口竇家口等處決口餘諸小口並塞之十一月再陳經理河工第一疏內未盡事宜部覆奉旨河道關係重大特簡靳輔専任一切修築事宜今該督以節省錢糧建立減水壩挑濬引水河具題爾部不即準行議令伊桑阿等會議故為耽延殊屬不合著照該督所題行其撥動民夫之處著會同各該督撫定議具奏餘依議又為彚報黃河湖堰各決盡行閉合龍門等事奉百覽卿奏黃河湖堰大小決口數十餘處盡行堵塞完竣具見籌畫周詳實心任事有禆河工勤勞可嘉著議敘具奏該部知道是年決口盡堵水勢消落隨召夫數萬一面壓掃一面築堤奈雲梯關數百里入海故道自堰堤潰決以來盡屬沙淤水難入海兼之草莽蓬蘆叢雜交錯又非人力可施故將翟壩至周橋二十五里湖陂從來不曽築堤者速築大堤又將髙家堰一帶長堤復行加髙幫寬蓄水以衝海口又相勢挑挖引河以導水勢上命部堂伊桑阿部司傅達查勘覆命江南通志是年總河靳自龍王廟起至四鋪溝止接築四千九百三十八丈計程二十七里半其縣前玉皇閣一帶地勢當衝題定樁掃要工五百餘丈嵗加修繕又自桃源東界至石人溝止築縷堤一道長一千八百六十三丈計程十里三分五釐派本邑民夫三百名修防清河縣志聖祖仁皇帝康熙十八年二月淮徐災荒各處工程緊急允總河靳輔題請留漕米二十萬石濟工五月題為遵例自陳事奉旨卿才品優長簡任河督殫心修浚有禆河工籌畫周詳勞績茂著克副委任著照舊供職該部院知道靳文襄公冶河書是年創建宿遷縣之朱家堂溫州廟桃源縣之古城清河縣之王家營安東縣之茆良口減水壩共六座淮安府志聖祖仁皇帝康熙十九年築祥符白石缸堤中牟小潭溪月堤及格堤商邱徐家莊月堤又築虞城堤河南通志是年夏秋南北皆霪雨七十日黃淮並漲有滔天之勢堤岸衝嚙甚多工亦為之阻然衝嚙之隄隨圮隨葺不致大患率賴新築工堅之所致云淮安府志聖祖仁皇帝康熙二十年塞楊家莊決口聖祖仁皇帝康熙二十一年四月命戶部尚書伊桑阿刑部侍郎宋文運給事中王曰溫御史伊喇喀勘閲河工候補布政司崔維雅條陳河道奉旨著勘工大臣帶往工所會同總河確議五月河決宿遷縣徐家灣塞之六月河決宿遷縣蕭家渡九月尚書伊桑阿等同崔維雅勘工畢復命王曰溫崔維雅啓奏河道若從靳輔修治必不能成功其所建各減水壩當盡行拆毁别圖良䇿大加挑築方可奏績十月工部傳出上諭著令靳輔急速至京十一月初七日赴闕十三日傳同九卿詹事科道進見皇上問爾向來力任治河必可成功今楊家莊方塞而徐家灣已開徐家灣方堵而蕭家渡又決功如何得成輔奏云臣受事之初河道壞極彼時挑浚疏塞皆至緊至要之處蕭家渡原係嵗久民工尚可支吾擬大工畢後再行續估請修不意諸口全塞各處漫流盡歸正河其勢驟加猛急而河身尚未衝刷寬深以致漲決此皆臣智識卑短不能早見于事先之罪也皇上云如今依爾度量此工究竟可以成功否輔回奏河工最是艱難但人事既盡亦無不可成之功即如清水潭從前屢寨屢決臣為避深就淺之計越湖築堤駱馬湖淺澀不通臣相度地形水勢改挑皂河别通運道彼時大小屬官皆以為創行新建相顧畏懼臣一力擔任示以必可成之理即有後纍不以相及究竟清水潭築成皂河開通此皆人力既盡工無不成之明驗也今蕭家渡之決總由人事耳臣蒙皇上不加重譴召臣入京得面承聖訓唯當竭盡人事明年春分節前務期竣工以仰副皇上宵旰之憂勤至南北兩岸未經估修舊堤及地勢卑窪之處俱應一律加修以為善後綢繆之計仰賴皇上洪福自然成功也十五日部議蕭家渡處分擬將總河以下凡在河工諸臣皆褫職督工其不合式處責令賠修奉旨免其賠修仍準動錢糧加修十九日辭朝傳上諭河道關係重大事本極難朕代爾擔憂爾反看得容易從今當小心謹慎凡源流緩急之間細心采訪時時看作難治之事方可奏績戒之戒之靳文襄公治河書是年築祥符回河寺月堤儀封堌陽集月堤考城王家道壩河南通志是年河決宿遷之徐家灣隨經堵塞復決宿遷之蕭家渡先是河流一線業經挑引河疏通然不勝其挑勢必用借水刷沙之法是以靳公輔盡堵楊家莊以壯其怒刷之力但引河淺窄至極雖有減水壩泄之而飽極漩搜勢如鼎沸遇徐灣之堤卑遂致漫決及徐灣堵後又加怒刷引河雖漸加寬深然方其既飽之際漩刷鼎沸則又如堵楊莊時故乘蕭渡之土鬆則又決蓋徐灣蕭渡原係逺年舊堤其曩時夯築之堅否無由窮詰志此一以見治河于極敝之後必當作盡堵怒刷之法方可漸通毋為屢潰所懾致啓更張一以見治堤者務期夯硪堅固慎毋貪茍完于一時而貽將來之瑕隙也是年大修兩河各堤工告竣奉旨將地勢稍卑之處再行增髙并逺年舊堤悉為加築完固前此經理案內之碭蕭豐徐邳靈睢宿桃清山安十二州縣黃河兩岸堤工并邳宿兩州縣北運河兩岸堤工清山寶髙江五州縣南運河兩岸堤工以及髙家堰一帶濵湖堤工俱經築竣總河靳輔方疏請大臣閲驗及蕭家渡潰決後有候補藩司崔維雅者著河防二書疏請盡變前法而更張之于是上遣廷臣勘驗復召輔星馳陛見咨詢治河情形至則備悉條奏辨論維雅剿襲之謬於上前雅無以對上韙輔議令之卒功復俞善後之請發帑金增築前工之稍卑者以防漲漫更將逺年舊堤盡為加築更挑積淤數千丈增建貓兒窩攔馬河唐梗邵伯南減水壩以為萬全之計云淮安府志聖祖仁皇帝康熙二十二年正月總河靳輔題為謹請加修善後工程等事一疏部覆奉旨靳輔仍著革職帶罪并經管修築各官俱著革職帶罪勒令將蕭家渡決口堵塞俟工完之後黃河果否盡歸故道不致再決具題再議具奏河工關係重大所需錢糧浩繁若責令賠修恐致貽誤仍凖動用錢糧勿得借端科派擾纍民間三月塞蕭家渡口兩河會歸故道是月靳輔題為全河歸故之後險汛日漸加增等事奉旨據奏蕭家渡決口堵塞黃河大溜直下七里溝等處逐漸坍塌險工甚多關係緊要應速行修築務令堤岸堅固不致再有衝決所需銀兩著該督將就近見在錢糧先行動用後以河銀補項其五省蠲荒缺額銀兩作何撥補著速議具奏六月靳輔題為請修上流堤岸等事部覆奉旨河工關係運道民生最為緊要下流既已築塞上流堤岸自應堅固修築嚴加防護以免潰決這本內事情該部速行確議具奏再覆題奉旨河工關係緊要蕭家渡決口築塞方完河南堤岸工程専令河南巡撫暫行料理如有應會同總河事情仍移文商確勿致貽誤十月請增江南營河兵六百名又請添設河員俱報可十二月特命復總河原職靳文襄公治河書是年築祥符堤陳留楊家寨堤中牟堤原武馬家渡月堤張家水口堤陽武脾沙岡隄又南岸堤蘭陽孫家莊月堤又北岸堤儀封修陸家口堤又北岸堤築鄭州堤又與滎澤會築沈家莊月堤商邱築傅家莊月堤考城築小閻家集堤河南通志聖祖仁皇帝康熙二十三年九月二十七日總河靳輔題今嵗黃漲數倍去年徐州迤上自七月二十二日即與去年大漲水迹相平臣以為不日消落乃又疊長無消隨放減水石壩暫為分疏而南岸十八里屯北岸李道華樓髙地無堤之處亦復漫灘過水又將碭山北岸王家堂堤工漫缺三十餘丈約略上流泄去之水不下十分之二而徐城水勢不減仍復增長不止髙于去年二尺五寸直至九月初六日方始消落城社幸免潰衝至徐州以下三山頭房村并靈璧縣張寒來等各堡原屬窪區水漫隄根八九尺丈餘不等各官冒雨衝風百計防護至八月二十日夜大雨颶夙將來字堡漫缺堤工四十餘丈而徐州北岸長樊大堤嵗修險工又因水溜至急衝去掃工兩段幸有月堤未斷獲免套河阻運至宿桃山清安五縣黃河賴攔馬河減水壩分泄兩岸堤工俱無漫缺唯安東北岸二鋪原非修防之處塌卸堤工六十餘丈幸有月堤不至為患若山清髙寶一帶運河先因淮水微弱黃流倒灌臣將歸仁堤官路河穵開放水歸湖助淮嗣此淮流亦漲運河仍係清水髙堰湖水九月方長今較去年更髙尺餘亦賴減水壩宣泄不致漫堤除漫缺二處臣見在嚴行飭催勒限十月內修完俟其果修築完竣臣照例開列職名具題外謹將本年水勢情形特疏題報奉旨工部知道部議覆題奉旨徐州長樊大壩等處雖經衝決河流未徙該管各官革職賠修俱著寬免嗣後堤岸衝決若河流遷徙應照定例處分倘係河水漫決河流不移者應否免其革職止令賠修著確議定例具奏部議查堤岸衝決河流遷徙者照舊例處分至河水漫決河流不移者若不責令賠修恐經修官員不行堅固修理防守官員怠玩亦未可定嗣後限年之內堤岸漫決河流不移者令經修之官賠修如過年限漫決不移者令防守之官賠修俟命下之日永為定例可也奉旨依議是年十月聖祖仁皇帝南巡閲工總河靳輔迎駕於紅花埠上問今年河道如何比前深通否長樊大壩却如何了回奏河道比前更深通但今年水大異常將長樊大壩衝去幾掃幸內有月堤今已下掃保護住矣上問河道既已深通果然可以保得無虞否回奏如今全在多備料物修防險工為主險工無失即可永逺無虞又問當日舊黃河在何處從何路入海幾時潰決衝斷運河回奏前代黃河原從大名府德州海豐利津等縣入海至宋仁宗時遷徙往南由徐州淮安會淮入海明末流冦掘堤以灌開封河底墊髙至順治初河決河南荆隆口黃河由張秋南北運河兩分并由山東鹽河入海上笑顧左右云朕原説是如此爾等還不信是晚上駐蹕紅花埠侍衛趙昌傳旨云朕為河道憂心異常有許多言要問爾爾同衆官行過禮在此伺候少頃奉諭傳進初問髙寶興泰下河積水語在運河上問前崔維雅奏各減水壩不當建依爾見識還是當建不當建回奏這減水壩是必要的若無此各壩河道斷難成功又問爾有什麼博古通今的人否回奏學問臣也看不出通曉政事有一人又問是何姓名回奏姓陳名潢問是何處人回奏浙江杭州人又問爾衙門在何處回奏在濟寧又問因何不在宿遷回奏濟寧衙門是向來所設因河道北至天津南至杭州西至開封濟寧是適中之地所以設立標兵又俱濟寧分汛漕在江南是總漕専催山東是臣専催十八日皇上御製祭河文命學士孫在豐致祭河神駕臨攔馬河上問靳輔這攔馬河減水壩的水往何處去回奏這水從縣東湖由沭陽海州一帶入海又問此處離北運口多少路回奏十五里是晚駐蹕宿遷賜靳輔餅二盤兔五隻十九日聖駕自宿遷起行一路見栽栁繁茂云這栁栽得甚好將來不愁缺栁矣隨問云水而比堤裏平地是那邉髙俟水涸可打量明白再行具題回奏云必須俟冬底水涸時從徐州一路逐處打量方得盡行明白上云更好至蕭家渡見上年所走之掃問這掃怎麼淌去了回奏將合龍門之時水湧溜急衝去幾箇又問值多少銀子回奏大掃值千數銀子中掃七八百兩不等還淹死一箇好掃總皇上云好利害隨問吏部尚書伊桑阿云目今河道比爾當初來看時如何回奏比先漸漸治成矣皇上又問云你在先為何不保奏回奏河工關係重大臣不敢保本日駕至桃源駐蹕二十日駕自桃源起行將至清河縣望見清口問云此是清口否回奏是上又云我為河道關係國計民生刻刻在念將爾進的河圖日日展看情形都看熟了今日河道己成是爾的運氣回奏是皇上洪福本日至淮安南幸十一月初九日上回鑾至淮安初問下河事語在運河至王公堤老壩口上云此處也算得險工又令侍衛二哥往前再看有無險工二哥回奏是大險工至天妃閘座諭添建閘語在運河上諭靳輔云今年黃水倒灌運河不可為訓爾必須酌一至妥之䇿使之永不倒灌方好回奏臣再三籌畫别無他䇿惟有分黃助淮一法今年黃水倒灌因黃強淮弱所致臣欲于徐雎黃河南岸再造減水壩幾座如遇黃淮並強之時啓黃河北岸減壩開泄若黃強淮弱則南北兩岸減壩並啓以北壩泄黃以南壩引黃助淮敵黃如此防法可無倒灌之患上連聲稱好云此法甚妙爾再細斟酌作速具題初十日駕臨視武墩上云爾前奏將南北河道各分司部官裁去極好他們知得甚麼河道不過每日打圍罷了是晚上駐蹕桃源縣十一日自桃源起行上諭云如今河道成了你該著一部治河的書回奏臣亦有此志因無暇時所以未著上又云你如今作速著起來再俟二三年河道無恙即便進呈以垂永久又問錢糧節省了多少回奏節省了八十萬都在添做工程上用去是晚駕至宿遷侍衛納爾泰詹嶽等傳旨江寧杭州二滿洲將軍副都統石文炳京口協領董元卿今地方無事你們四人送駕至京其餘各督撫將軍副都統俱回本任不必逺送靳輔啓奏臣衙門駐劄山東以地方論應過德州傳旨云送朕事小料理河工要緊你不必逺送爾隨我行走多日朕的心事爾也知道了爾的心事朕也知道了諸凡事務俱説完了爾治河好我甚喜悅還有奬爾的詩待我今晚寫出明日賜爾次早侍衛納爾泰齎出賜輔御製五言律詩一首云防河紓旰食六御出深宫緩轡求民隱臨流歎俗窮何年樂稼穡此日是疏通已著勤勞意安瀾蚤奏功輔叩頭謝恩少頃侍衛出云皇上著你自已進去謝恩遂詣上前叩謝上云如今河道已成爾治河已勞苦了但善後事宜著實用心斟酌必期永保無虞操守以清亷為主回奏云臣謹遵聖訓力圖善後事宜唯當捐糜頂踵仰報皇恩至于清廉之諭臣雖幼年失學然亦粗解文義頗知忠孝廉恥之道若一介不與一介不取臣亦不能如軍興之際差遣標兵剿殺賊冦必須犒賞奬勵大兵過往必須幫助馬匹軍器多屬公務此等去處必須費用總之交以道接以禮以及衣食在所不免若欲圖富厚顛倒是非以直為曲孜孜為利此盜跖之徒罪不勝誅臣斷不為也上笑語左右云他説的是實話輔叩頭出次日侍衛納爾泰傳出本月十二日朕自通州帶來佳哈船于大江黃河並不耽遲甚好著將一隻賞給總河以便緊急行走如若有益著聽靳輔酌造應用輔叩頭謝恩恭領到佳哈船一隻并旗纛幃幔鋪氊等項俱全靳文襄公治河書行水金鑑卷四十九
