body:
  text: 行水金鑑卷五十江南按察使傅澤洪撰河水十二月十二日翰林院檢討張鴻烈題為聖心愛民已極等事竊念淮揚水患關係運道民生淮安以南則山陽鹽城髙郵寶應興化泰州江都七邑受害淮安以北則清河桃源宿遷邳州雎寧沭陽安東海州八邑受害今我皇上準臺臣李時謙條議疏浚淮揚下河以救七邑之民適值聖駕省方親過淮揚洞察情形特遣大臣踏勘後復經㑹議遂發帑金速往經理大哉帝德如天好生七邑災黎何幸至此但臺臣只知淮安以南七邑之害而不知淮安以北八邑之害其苦一也只知七邑之民田昔受決口之水今受滚壩之水而不知八邑之民田在黃河兩岸以內者其苦尤甚也臣世籍淮人何忍不為八邑生靈再請命于聖主之前乎查黃河兩岸明臣潘季馴設有季泰徐升等四壩今則添設十三壩以殺黃河怒漲之勢䇿誠善矣但黃水冬涸時民田似屬無恙即如本年十月間乘輿由宿遷縣至清河縣四顧平沙若無水患及至夏秋之間黃水盛漲倘水從壩上滚入則勢如建瓴禾苗在地必盡付之汪洋若非挑浚支河使之有所容納有所宣泄則糧田被溺正賦安供當河工未成之日自無暇及此即已成之後費過金錢不下數百萬國計至重孰敢遽以此為請也今幸值我皇上發帑救民另行遣官督理是以懇求聖慈同仁一視先及淮南次及淮北查桃源縣一帶舊有祠堂湖邸家湖等處可以瀦水又有小河可以泄水自宿遷縣以下至清河縣以上亦舊有衝開河形兩岸隱隱尚在而東可達沭陽縣之沭河安東縣之潮河以入于海年來處處淤塞以致水無可泄合無請敕新遣大臣㑹同地方官詳細踏勘相其髙下度其逺近將十三座壩內隨形量勢或分或合各挑浚泄水河一道以待壩上所滚之水俾水來則歸支河不致瀰漫平地田既不淹糧自可辦有補國賦何減山鹽髙寶等之七邑哉又按挑浚支河與堵塞決口加築堤岸不同夫堵塞決口則有樁朩栁枝蘆葦稻草􅐨麻等費加築堤岸則有採石辦灰燒磚運土夯硪幫修等費故河工錢糧至為浩繁若挑浚支河不過穵土而己絶無此等繁費其便一也河工所用之夫逺或數百里百餘里近或數十里最為勞苦若挑浚支河則隨處莊農皆可應募各挑自已田頭之河非同河夫逺纍其便二也山鹽髙寶等七邑溝洫原多海口遙逺而串場河又為保護鹽場故環繞迂回今黃河兩岸皆一望平衍地廣田荒穵河原不足惜較之七邑為易其便三也河夫做工一日例給銀四分以其離家逺近不等今挑浚支河只須募田頭之夫每夫做工一日給銀三分小民未嘗不樂于趨命其便四也更請特敕踏勘諸臣共計十三處支河通達某處其逺幾何挑寬幾何挑深幾何以河工挑土方之法算之酌量每夫一名做工一日約挑幾尺幾丈共該夫幾何共該工銀幾何徹底清算則一見了然矣但河工耗費已多而挑浚七邑之下河費又浩繁今若挑浚十三壩之支河所費又不知多少雖我皇上拯救民命不吝金錢然當此節省錢糧之際何敢不為國家愛惜物力而代黃河兩岸之民作馮婦之請乎臣有愚䇿本諸歷代國史若能倣其大概而行之上可裕國下可救民于以濟挑河之用綽有餘矣臣本文臣無言事之責但以災民困苦已極即使臣如班馬而于聖心仁政國計民生毫無禆益亦何用乎是以不避罪戾冒昧獻議如果芻蕘可采伏乞睿鑒施行奉㫖該部知道部議應行令總河確勘查明具題到日再議奉㫖依議十二月十九日總河靳輔題奏徐州以上直至河南滎澤縣之西河道雖寬數百丈若遇伏秋異漲漫灘而上直抵兩岸堤工其寬不下數十里逮至徐州北岸係山觜南岸係州城中央河道僅寬六十八丈將千支萬派浩浩無涯之水緊緊束住不能暢流既難于下達則自難免上壅是以明朝二百餘年間徐城屢屢潰衝而徐州迤上南岸之漫溢迄今嵗嵗見告也臣先于大修案內將黃河南岸碭山縣毛城鋪地方創建減水石壩一座又于黃河北岸徐州大谷山地方創建減水石壩一座蓋擬分泄徐城迤上之異漲也乃康熙二十一二十二兩年已賴兩壩宣泄得以無患至康熙二十三年河流異漲兩壩不足宣泄又復于李道華樓十八里屯等髙阜無堤之處漫灘而行且將碭山北岸王家堂堤工漫缺三十餘丈此徐州州城以上之情形也今臣細酌善後之計在黃河南岸必須于碭山縣毛城鋪地方減水壩之上再添建減水深底石閘一座不獨分泄異漲而石閘之水先至壩後可免建瓴傷壩之虞又于徐州王家山十八里屯二處就山根開鑿減水深底石閘三座更于徐州北岸大谷山等處添鑿減水深底石閘二座統計徐城以上共添減水石閘六座遇平常水則閉閘束流遇非常異漲則啓閘分泄每閘一座約可泄水一丈方可殺徐城大河水勢一尺徐城以上統計添閘六座共可殺大河水勢六尺則徐城自免潰衝而徐城以上各堤俱可保固矣又河流自徐城下行一百餘里至雎寧縣鯉魚山地方北岸係鯉魚山南岸一帶為峯山龍虎山兩山相峙夾黃河于中央河而僅寬百丈而河底乃係山腳衝刷不深河水到此又為一束以致今年有來字堡之漫缺也臣擬于南岸峰山龍虎山之旁開鑿天然減水深底石閘四座以為隨機分泄之計又南岸各閘壩減水之下必由歸仁堤經過目今止有五堡減壩一座并便民閘一座不足分泄應于五堡附近添建深底石閘一座減水大石閘一座並將便民閘再行改深五六尺以資分泄庶可無虞又攔馬河先後共建減水壩六座今必須再添建深底石閘一座使河流由閘先進積水以養壩尾俾免傷壩之虞又南岸各閘壩既建之後不特可以殺黃河怒漲之勢而淮流微弱之時又可藉以分引黃河之水由歸仁堤下注洪澤湖使助淮流然洪澤湖周圍數百餘里所引上流分黃之水一時不能灌滿仍難免黃水倒灌運河之患今必須再于清河縣西建雙金門大石閘一座并于閘下挑引河萬餘丈如遇黃河十分異漲則立啓此閘由引河分泄歸海則黃淮㑹合之處又可減黃水一二尺有禆運道最為喫緊至于清河縣運口添建石閘一座更屬保運濟漕至要之工亦應于運口閘之上乘時速建者也奉㫖九卿詹事科道㑹議具奏張文端治河書是年築原武封邱蘭陽儀封滎澤商邱虞城考城隄河南通志聖祖仁皇帝康熙二十四年二月初一日九卿詹事科道㑹議題覆奉㫖這建造減水閘壩若俟該督撫等㑹議具題必致遲誤靳輔前曽奏稱建造此等閘壩將無用滚水壩舊石可用等語這事情著差前經看閲河道諳練河工司官一員速往與靳輔詳議若建壩分水不致多損民田著即一面興工一面具題倘水無歸路多致淹沒著㑹同該地方督撫等官確議具奏九卿詹事科道復㑹議查得郎中党愛與該督撫等㑹議疏稱建造各閘壩以泄黃流洶湧之勢由漸而入于河湖則有禆黃河堤岸運道若不行建造閘壩黃河堤岸潰決泛溢則有害運道民生復行糜費錢糧等語應照郎中党愛等所題速行成造其餘俱照工部前議可也奉㫖依議靳文襄公疏略九月初二日總河靳輔題為欽奉上諭事案照康熙二十三年冬間臣恭隨聖駕閲視河工䝉皇上面問臣云河南工程爾都見過麼臣面奏云河南商丘縣以上堤工臣俱未見隨䝉皇上面諭臣云爾亦該去看看臣隨于康熙二十四年四月內前赴河南看得自河道敝壞之後䝉皇上不惜帑金命臣等大加修治近年以來河歸故道堤漸可觀此非我皇上睿鑒之明乾斷之確不能若此也但江南居河南之下必河南永保安瀾斯江南亦可無患若河南上遊有失則江南河道不旋踵而淤澱矣臣是以於請加上流堤岸疏內請敕豫撫將河南工程確勘加修䝉皇上洞悉原委立賜俞允也今臣凛遵上諭勘閲河南兩岸工程凡經豫撫就近加修者俱皆寬厚可保無虞唯有在先年視之尚屬可緩而據目前形勢確應早為未雨之謀者則有考城儀封陽武三縣創築加幫隄工共長七千九百八十九丈又封丘縣荆隆口應築大月堤三百三十丈又滎澤縣應修築掃工二百一十丈統計共需土方夫工銀二萬七千三百七十八兩零然此工既竣之後不特河南足保無虞而實可為江南保障者也伏乞皇上睿鑒敕下部臣將此五縣堤壩工程照例凖動裁剩裁扣銀兩即行興築必於康熙二十五年桃汛之前一律告竣以防上流異漲有禆河防良非淺鮮矣部議題覆奉㫖依議九月十八日總河靳輔題聖心愛民已極一疏云竊照康熙二十三年冬恭逢皇上閲視河工睿鑒照臨之下無不洞悉幾微及聖駕巡歷黃河一帶堤岸之日諄諄以減水各壩泄出之水作何善法歸海毋或淹損民田為諭是黃河一帶之災黎已久厪皇仁拯救之至意矣今又䝉皇上俯俞部議將原任詞臣張鴻烈條奏一疏行臣確勘題覆查鴻烈疏稱邳宿桃清山安沭海八州縣並受水患請挑支河宣泄等語是矣但沿河州縣之並受水患者實不止此八州縣也臣逐一查勘除上流地亢原無積水之處不議外在黃河南岸則有碭山蕭縣徐州宿州靈璧雎寧宿遷虹縣泗州桃源清河等十一州縣黃河北岸則有碭山豐縣沛縣徐州邳州宿遷桃源清河山陽安東沭陽海州贛榆等十三州縣合而計之凡受行潦積水與減泄河水之漫淹難涸困民生而逋國賦者實關徐州鳯陽淮安等三府州屬之十九州縣地方而不止于邳宿等八州縣也至于治之之法不在挑河而在築隄若止議挑而不髙築堅堤則水至無束散漫田間不特仍前淹地而所挑之河不久淤成平地是徒勞民傷財而無濟于民生國計也惟竟以築隄為主量築堤需土之多寡以定挑河穵土之寬深俾隄成而河亦成則水不旁泄或徑直趨海或就近趨湖由湖歸河由河入海庶為永逺利民之舉今臣約略估勘欲永治此十九州縣積水漫淹之患必須共築束水堤約長三十萬丈隨地髙低牽築頂寬二丈底寬六丈髙八尺每丈需土三十二方查黃河兩岸土性稍鬆連挑帶築并隂雨食米等項每方止擬給銀一錢六分五釐通共需銀一百五十八萬四千兩此項銀兩臣斷不敢孟浪費帑查此各州縣被積水沉廢之無糧湖灘一經築隄束水之後可以涸出開屯墾種凡全書所載額田盡聽民間自種外其額餘官田請照臣另疏欽奉上諭事案內議墾髙寶等處下河額餘官田事宜一律而行惟下河額餘官田每畝擬令佃戶納佃價銀九錢者黃河兩岸額餘官田每畝止令佃户納佃價銀四錢蓋黃河兩岸之地土鬆而瘠不比下河地土之膠而肥也至此項額餘官田止作有四萬頃科算而挑河築堤之經費一百五十八萬四千兩便可全得臣請皇上敕部凖借撥銀五十萬兩先為興工餘俟陸續分收籽粒并取佃價銀兩逐漸接濟若此工限期必得六年方可告竣工完之後不特向來蠲除災荒之額賦可以盡復而每嵗更可加增新賦十餘萬兩且河工可以永固民生可以永逺一舉而數善備焉真國家萬世之利也疏上奉㫖九卿詹事科道㑹議具奏議覆具題奉㫖這黃河工程應否即行修築著河道總督靳輔再行確議具奏張文端治河書九月闕日上傳吏部員外郎靳治豫至乾清宫御榻前問河道近日水漲異常汝父家信內有無工程情形治豫回奏畢皇上又諭云朕去年閲工親看黃河兩岸堤工在爾父人力已盡無可再加倘或更有疏虞亦是異常之天災矣又諭今年如此大水若保得無事黃河必能加刷寬深將來就可恃矣十月題請豁免河南堡夫課程栁料允十月二十三日大學士勒德洪明珠王熙吳正治宋德宜學士麻爾圖牛鈕禪布穆成格吳興祖王起元徐乾學韓菼傳上諭髙家堰下河黃河兩岸堤工事情關係甚要應令總河靳輔進京面與九卿詹事科道㑹同確議著靳輔于成龍馳驛作速進京河務交與該管官員謹慎看守交與該部十一月赴闕㑹同九卿科道公議十二月初四日辭出都靳文襄公治河書是年部覆總河靳輔疏稱山東單縣南岸堤工錯雜河南虞城縣境內應改歸虞城縣就近修防又河南考城縣北岸堤工界連山東曹縣境內應換歸曹縣就近修防奉㫖依議山東兖寧道冊是年築陽武封邱儀封虞城考城隄河南通志聖祖仁皇帝康熙二十六年十月內題恭報兩河水勢情形并進河圖奉㫖此疏圖同本送京城內院番清畢即交與九卿議此議之時將圖問靳治豫是年總河靳輔罷任聖祖仁皇帝康熙二十八年正月南巡閲河渡浙江至㑹稽瞻禹陵二月日駕至宿遷召見原任總河靳輔詢問河工善後事宜賜貝酪酥糕一盆蘋果一盆三月二十一日大學士伊桑阿王熙梁清標學士凱音布拜禮邁圖索諾和西安郭世隆彭孫遹李振裕郭琇奉㫖朕南巡閲河聞江淮等處衆民及行船夫役俱稱頌原任總河靳輔感念不忘且見靳輔疏理河道及修築上河一帶堤岸於河工似有成效實心任事克著勤勞前革職屬過著照原品致仕官例復其原有銜級靳文襄公治河書聖祖仁皇帝康熙三十年九月十九日大學士伊桑阿等奉上諭河道關係甚屬緊要今河道情形如何修理如何之處須差大臣前往勘閲應差大臣著列名具奏本月二十四日奉㫖看閲河道著博濟李光地徐廷璽去聖祖仁皇帝康熙三十一年二月初六日工部題奏臣等議得戶部侍郎博濟等疏稱黃河南岸自徐州以上毛城鋪起至河口止北岸自大谷山起至雲梯關六套止所有減水閘壩現無衝損黃河底刷深寬數年以來黃水並未出岸海口迅流無阻其黃河南岸楊橫莊險工堤內地勢甚窪且無月堤見今所下之掃亦屬卑薄煙墩險工水勢湍溜而掃根之水甚深所下之水單薄馬邏險工水勢湍溜又無月堤北岸朱家莊險工逼近皂河運道所下之掃亦屬單薄安東縣便益門南東門二險工逼近城垣以上六處俱屬危險應令河臣修造月堤培掃修築其餘險工亦應令河臣預為修防本月十一日奉㫖九卿詹事科道㑹議具奏㑹議得侍郎博濟等疏稱黃河南北兩岸所有減水閘壩現無衝損黃河底刷深寬黃水並未出岸海口迅流無阻後有運河事宜俱無庸議其黃河南岸楊家橫莊險工堤內地勢甚窪且無月堤見今所下之掃亦屬單薄煙墩險工水勢湍溜而掃根之水甚深所下之掃單薄馬邏險工水勢湍溜又無月堤北岸朱家莊險工逼近皂河運道所下之掃亦屬單薄安東縣便益門南東門二險工逼近城垣以上六處俱屬危險應令河臣修造月堤培掃修築其餘險工亦應令河臣預為修防中多淮運兩河事宜俱入淮運查河工關係重要今靳輔既任總河俱應交與靳輔照侍郎博濟等所議作速修築堅固如內有照原議難行應急應緩修造之處亦令總河酌量緩急修造可也十八日奉㫖依議十月二十五日總河靳輔題為請豁開河築堤廢地之糧并清淤出成熟地畝之賦以期上不虧國下不纍民公私兩便仰祈睿鑒事竊臣輔于康熙十六年奉命治河興舉大工十有餘載上下于淮揚鳯徐四府州之間各有開河築堤建造閘壩栽栁等項之處俱係民間納糧田地理應豁免錢糧但查揚屬之髙郵江都鳯屬之靈璧盱眙徐屬之豐縣等五州縣工程無多廢地尚少而淮屬之山陽安東清河桃源宿遷邳州雎寧徐屬之徐州蕭縣碭山等十州縣工程甚多廢地亦廣臣輔前此正欲確查旋以去任未經題請小民至今不無包賠之纍每每環呼臣輔訴求上聞臣等伏覩我皇上愛民之心仁民之政逺邁唐虞而且賜賑賜蠲天恩無嵗不下似此開河築堤之廢糧敢不亟請恩綸以除民纍耶至兩河歸故中河告成之後涸出向年黃水將原係河湖低窪沮洳之所淤成膏腴熟地者亦復不少保無豪强占種而不納糧夫隱糧律自有明條前項廢地既請豁免則此項白占亦應升科但此升科豁免二者俱係督撫之事以督撫為之呼應更靈所當仰請皇上特沛綸音敕下江南督撫遴委賢能道府就近親查則升者升而豁者豁庶豪强不得再占無糧之田而貧民獲免無田之糧在國賦無虧窮簷幸甚誠公私兩便之道也伏乞睿鑒奉㫖九卿詹事科道㑹議具奏議覆題奉㫖這事情著遣部院堂上官一員前往㑹同該督撫將應豁免應升科錢糧確察定議具奏應遣官員開列具奏又奉㫖著熊賜履去覆題奉㫖依議是年十一月十九日總河靳輔卒輔字紫垣遼陽人由翰林院編修巡撫安徽都察院右副都御史加兵部尚書十六年以原官總督河道二十六年詔問治淮揚下河之䇿公持議謂治下河當竟治上河與羣議異言者蜂起公遂罷二十八年春上再南巡視河公迎于淮安上顧問河工善後事宜甚悉詔㫖復公官以原品致仕有實心任事之褒公家居三載上念公功不忘凡三命閲河一賜召對三十一年特㫖起公田間以原官總督河道以老病辭不許㑹西鳯災有㫖截留南漕二十萬石泝河而上備貯以賑秦民仍命公董其役公力疾就道經畫西運自清河至滎澤以達三門底柱安流無恙西運將竣遂以病狀疏聞特命公歸淮上調理時公病已劇猶疏陳兩河善後之策及河工守成事宜幾萬言又請豁開河築隄廢田之糧并請清淤出地畝之賦上特命大學士張公玉書尚書圖公納尚書熊公賜履前後往相度清釐之尋復以病求罷上猶不許再疏始得請則公以是日考終官舍矣實康熙三十一年十一月十九日也遺疏上聞上臨軒歎息靈輀既歸特命入都城返厝其家前此所未有也命大臣侍衛奠酒賜茶命禮部議賜祭葬命內閣議易名賜諡文襄公著治河書十二卷前後奏疏若干卷王貽上撰靳文襄公墓志銘節略命內閣大學士張玉書刑部尚書圖納視髙堰堤工吏部尚書熊賜履往鳯淮揚三府徐州㑹同督撫清查開河築堤建造閘壩栽栁田畝盡豁錢糧并兩河歸故中河告成後淤成熟地應升科田糧允總河尚書靳輔請也內閣傳㫖問九卿詹事科道等故總河尚書靳輔居官如何對任事年久諳練河務賜諡文襄王貽山居易録告聞之公於二十一二年間與總漕帥相訐謫公為安柬長樂司巡檢到任一月復任總河又二十六年與于成龍不合劾公破冒錢糧成龍被逮公亦赴京面質隨又復任後又為開屯事被總漕慕天顔所劾天顔罷官而公又復任俱不能得其詳三十年間事即至放軼如此姑識之以見公之於仕途雖屢遇坎軻而天卒全之何者其自反而縮也公真不可及哉行水金鑑卷五十
