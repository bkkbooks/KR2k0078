body:
  text: 行水金鑑卷五十一江南按察使傅澤洪撰河水自禹之後治水之人多矣而不詳其所治之法詳所治之法者蓋自歐陽玄至正河防紀始也夫治水非徒法也因乎地形察乎地勢而加之以精思神用焉然規矩備而婁之明輸之巧不更加乎河防一覽備矣臣不才奉命督河十有餘年治防事宜不能希附前人然河流變遷運道改易宜於今者或不必膠於古故凡見之施行者亦不敢不録而存之以備後此芻蕘之采其繁且大者辭不厭詳焉凡大工之興必先審其全勢全勢既審則必以全力為之未有畏其大且難而曰吾姑以紓目前之急已也康熙十六年以前淮潰於東黃決於北運涸於中而半壁淮南與雲梯海口且滄桑互易若不將兩河上下之全勢統行規畫源流並治疏塞俱施而但為補苴旦夕之謀勢必潰敗決裂而不可收拾臣受事之始正值軍興旁午籌餉維艱而經理河工八疏工程極大請帑至數百萬計廷臣不無其難其慎而我皇上睿謀獨斷不惜大費悉準施行此兩河之得以復故也大興經理天下事莫不成於明作而敗於因循但人情當積疲之後委靡不振無論賢不肖皆狃以為故然非有以大震動之則賢者無以勸而不肖者無以懼自兩河失故十有餘年夙弊相沿廢弛日甚司道委之府佐府佐委之州縣佐雜而府州縣之正印則袖手旁觀辦物料則纍月經年計夫役則有名無實核工程則茍且支吾懲不勝懲雖河臣亦無如之何康熙十六年題請嗣後凡黃運隄岸修築各定年限其汛地衝決及催夫不發辦料不前推缷遲誤并不行轉催不行確查具題之上司增定新例較昔彌嚴其薦舉大計等典凡有河之道府州縣正印佐二等官俱將河工一併考成從此人知警惕舉千數百里之大工俱屈指限期以告竣焉首嚴處分兩河襟帶數千里贊襄戮力全在大小羣有司必使人如臂指而後其令行必使人無觀望而後其心一必使人知懲勸而後其力殫往時河工設分司四員以部郎領其事三年一易以為常夫部郎之親民也視郡邑有間舉事率多格滯且以年之有限也往往履任之初皆疏迂及車輕路熟又以瓜期去故請撤部郎而歸之監司郡丞蓋監司郡丞之於郡邑呼吸一氣公事易集且可遴選其諳練者以名聞又綿其嵗月責其成功是以吏習民安而政克舉然大工龎雜又非數郡丞可理故又分設監理分理畫疆任責俾各専其事展其長以課其殿最而黜陟行焉而河工無不效力之員矣改增官守舊制沿河隄岸額設河夫以供修防之役然有司按籍簽點必假手於吏胥由吏胥而及之鄉長里甲大都冒張虛數臨時倩應老弱故名存實亡而功以隳也今改設河兵八營營領以守備遞為千把總一以軍政部署之令其亡故除補有報逐日力作有程各畫疆而守計功而作視其勤惰而賞罰行焉有事則東西并力彼此相援無事則索綯藝栁巡視狐獾窟穴較額夫舊制有條而不紊有實而可核矣然守辨惟以督率興作為務至於錢糧出入稽查商確非文職不可故有一備即以一廳員監之然後文武相資而事易集焉設立河營塞決之方必先殺其勢平其怒而後人力得施焉則莫如引河之善也引河之用有三一曰分流以緩衝也河一決則全流盡趨決口奔騰激蕩樁掃無所施應於對面上流别開一河以引之則決口緩矣一曰預浚以迎溜也河身既淤為平陸即異日黃流歸故必漲溢而他潰故必預開一渠以迎之務使水至歸渠遂其湍迅之勢則刷沙有力而後無旁出之虞一曰挽險以保隄也河性猛烈方其順流而下也則藉其猛以刷沙當其橫突而至也則恣其力以崩岸故當其倐忽激射之時宜酌左右之間急開一渠以挽所衝之溜頭引入中流以奪其勢而後危隄可保故曰其用有三也至於度土地髙卑之數以定挑挖之淺深驗土性淤鬆之殊以酌渠路之去取又在任事者之盡心焉挑河之法固宜相土地之淤鬆以施浚然亦有必無鬆土不得不於淤處挑挖者後水到之時不比浮沙易刷定多阻滯之處此等水中之淤最難施力必須分外挑深乃可挑濬引河雲梯關者不知名自何時乃黃淮二瀆所由以入海者也往時關外即海自宋神宗十年黃河南徙距今僅七百年而關外洲灘離海逺至一百二十里大抵日淤一寸海濱父老言更歷千載便可策馬而上雲臺山理容有之此皆黃河出海之餘沙也自河道內潰會同之勢弱下流不能暢注出海而海口之沙日淤海口日淤而上流愈壅以致漫決頻仍內瀇而不之止凡議河事者莫不力言挑浚而不知其勢有必不可者何也挑濬之河最狹且淺亦須寬至里深及丈方可通流以土方之算授工計萬夫三日之力不及里且漸近海濱人難駐足加以稽天潮汐一日再至不特隨浚隨淤尤恐內水未及出而潮水先從之而入矣夫海口之髙皆因關外原屬坪厰漫灘以故出關之水亦隨地散淌散淌則無力無力則沙停耳禹貢紀河之入海曰同為逆河入於海夫河也而曷以逆名海湧而上河注而下兩相敵而後入故逆也禹既播之為九又曷為而同之不同則力不一力不一則不能逆海而入也禹貢聖人之書其言不可易也又考河防一覽潘季馴有言曰海無可俊之理惟有𨗳河以歸之海然河非可以人力𨗳惟有繕治隄防俾無旁溢則水由地中沙隨水去也季馴近世之能臣其言當不易也今日之雲梯關外是即今日之逆河也而不堤以求其同不同以求其入海也得乎爰自清口以下至雲梯關三百餘里挑引河以𨗳其流於關外兩岸築堤一萬八千餘丈凡出關散淌之水咸逼束於中涓滴不得外溢從此二瀆就軌一往急湍衝沙有力海口之壅積不浚而盡闢矣開闢海口河水當泛濫奔溢之時決口必非一處或大或小或上或下議塞者莫不先大而後小先上而後下而不知其理有不然者蓋大口難塞非踰旬纍月不能竣逮大口工竣而小口又復汕刷而成大雖用裹頭套護之法第能使之不濶不能使之不深然亦未有中泓既深而兩端不塌陷者則是所塞之工處處皆大口矣夫大口既已寬闊至於成河止矣必不至更刷而大急將諸小口盡行堵塞而後以全力施之大者至於先下而後上從事於其所易其理亦然截其尾毌攖其鋒下口盡通而後以全力施其上或挑引河或築攔水壩或中流越築審勢制宜而大者上者亦不難矣塞決先後至柔莫如水然茍不得其平則雖天下之至剛者不能禦平水之法奈何曰量入為出而已今使上流河身至寬至深而下流河身不敵其半或更減而半之勢必懷山襄陵而潰決之患生夫河面窄狹之處或城鎮山岡不可開闢我則於其上下流相度地形多建滾水閘壩及􅚱洞放入通水之溝渠以測土方之法移而測水務使所泄之水適稱所溢之數則其怒平矣至其下或復寬闊如故又恐其力弱而流緩流緩而沙停則仍引上流所泄之水歸之正河以一其力如是則雖以洪河之浩瀚而盈虛消長之權操之自我不難擇便而疏𨗳之矣量水減泄河之防隄也然隄太逼則易決逺則有容而水不能溢故險要之處縷隄之外又築遙隄以備異漲隄稍瑕即潰與無隄同也必選擇淤土每覆土一尺即夯硪三面築畢用鐵鎚杵空沃以水水不滲漏為度然亦有純淤土而水漏者則其土必太堅鎚不易入其捍水尤有力且土必龜坼為驗堤之髙卑因地勢而低昂之用水平打量毋一槩以丈尺為凖以水面為凖築隄之法陡則易圮如隄根六丈頂止二丈俾馬可上下堤面及根必多種茸草以蓋之蓋草能柔水性能庇雨淋而坦坡又可殺風浪之怒也其取土宜於十五丈之外切忌傍隄挖取以致積水成河刷損堤根然取土有逺近難易之辨故其工值之多寡視其逺近難易而增減之又土方之數有虛實上下之辨故其工值之多寡復視其虛實上下而差等之堤既成必密栽栁葦菱草使其茁衍叢布根株糾結則雖遇飇風大作終不能鼓浪興波此護堤之最要策也堅築河隄防河之要惟有守險工而已河之易決莫如中州其地土鬆而沙多每一坍塌輒至數百丈然其地寬曠不與水爭地其築隄甚逺至近者亦三五里此堤不守復築一隄以守之河流去正身既逺則浮波寬緩亦不能深入勢必復引而他去而淤灘仍為平陸故雖險而易守也江南自徐邳而下大抵皆城郭村鎮不得不畫地戒嚴亦其勢然矣守險之方有三一曰掃二曰逼水壩三曰引河三者之用各有其宜當風抵溜其掃必栁七而草三何也栁多則重而入底然無草則又疏而漏故必骨以栁而肉以草也禦冰凌之掃必丁頭而毋橫何也冰堅鋒利橫下掃則小擦而糜大磕必折也然掃灣之處則丁頭掃又兜溜而易衝必用順掃魚鱗櫛比而下之然後可以攩溜而固堤至十分危急搜根刷底上堤而下坐掃不能禦則急於上流築逼水壩回其溜而注之對岸或一二三道若止一道恐河流悍烈壩一摧而堤即不可救也若開引河則其費甚巨又必酌地形而為之若正河之身迤而曲如弓之背引河之身徑而直如弓之弦則河流自必舍弓背而趨弓弦險可立平若曲折逺近不甚相懸河雖開無益也諸如此者殆如禦侮然掃之用是固其城垣者也壩之用捍之於郊外者也引河之用援師至近開營而延敵者也夫吾既已內修其守備而外又或捍之或延之敵雖強未有不遷怒而改圖者保險之法盡矣防守險工浚河築隄之遲速一視運土之遲速而已初以人力有限以驢代之然終莫若車運之便也夫驢之力雖勝於人然芻秣之費喂養之勞倒斃之患合而較之殆不得當矣車之製當用獨輪小車蓋挑土之處大抵原隰髙低溝坑斷續雙輪則不行且小則往來捷而不滯也一車所載可得土二百斤每日二夫一車之所運可抵三夫之運較之於驢則無芻秣喂養倒斃之纍較之於人又無召募逃亡及隂雨坐食之害且設遇農工興作之時工程方亟而夫役不繼則車之利尤大矣計一車之工本不及五錢河例每夫工食一日四分不過出十二夫之工食用之經年可得三百六十夫之用矣運載土方護堤塞決之用莫善於掃捲掃之用惟草栁二者而已蓋栁遇水即生草入水而腐為土性既宜之且又費甚省而採易辦也栁隨地可種草近則取之湖塘逺則取之海濵湖塘之蘆葦不如海濵所出之堅實長大一束可抵二三束之用但地逺採辦稍艱若抵衝塞決非此不可酌其工程之緩急而用之可也酌用蘆葦凡沿河種栁自明平江伯陳瑄始也其根株足以護堤身枝條足以供捲掃清隂足以蔭縴夫栁之功大矣然種栁不得其法則護隄之用微且成活者少惟明臣劉天和六栁説曲盡其妙當倣其法行之統計每年嵗修需栁不下一百萬束自康熙二十年勸令各官種栁已得若干株自二十六年以來所用之栁半取諸此再行各營辨凡春初防守稍暇之時每丁計地各課種栁若干不過三年沿河成林一有不測捲掃搶防不煩斫運於他處即以本汛之栁供本汛之工力省而工易集所益非小也栽植栁株土以方一丈髙一尺為一方然有上方下方之别焉有專挑兼築之分焉至挑河又有起土淺深之不同焉築堤亦有運土主客之不同焉其土方工值更有人力強弱之不同焉以江南而論自邳州雎寧縣起至碭山縣止每築堤土一方給銀一錢四分自宿遷縣起至山陽縣止并揚屬各州縣每一方增銀一分此題定之例也土方則例主土者就近挑挖之土以所築之堤為凖者也取土之法最忌逼堤逼堤則堤址卑窪便有積水傷堤之患故必離堤十五丈之外取之取起之土挑至隄基之上用大石夯硪之或以七寸為一層夯至五寸或以一尺為一層夯至七寸然後再上一層土如前法夯務要自底至頂層層夯硪打就則徹底堅固可免滲水之患每堤髙一尺兩面坦坡必須築寬六尺如髙一丈之堤應築寬六丈之堤再加堤身二丈則頂寬二丈底當寬八丈髙一丈用勾股法科之每丈計築成上方土五十方每方一錢五分應給銀七兩五錢也主土客土者迤逺挑運之土以所起之土為凖者也如此處必須築堤而沿堤去處俱係積水湖蕩畚鍤難施勢必别處取土用船裝運髙寶定例以五十大籮為一方每籮約重二百餘斤每方約重一萬斤連搬運上船工銀六分運至工所又工銀八分由船而運至堤上又工銀五分堤基之上再用硪夫夯硪又工銀二分統計虛土一方共費銀二錢一分止築成上方土七分也客土專挑者止挑去河身之土而不係築堤者也所挑之土必離河邊四五丈方許缷棄若就近竟缷則一經淋雨仍復淌入河內矣其挑河工價以所挑河之淺深為凖凡挑三四尺深者每方給銀六分五六尺深者加一分七八尺深者九尺一丈深者一丈一二尺深者一丈三四尺深者遞加一分至一錢一分止蓋六尺深以上之河無翻塘戽水之勞不過每方六七分而止其挑深七尺者未免有水一丈以外泉水愈多故給銀遞加若黃河之內流沙陷足施工最難必須設法挑挖大抵每方又遞加一分七八尺深者給銀九分至一丈三四尺深者給銀一錢二分然又當審工程之難易如人夫易募雨水不多地髙泉涸之處尚可省一分也專挑兼築者即用挑河之土以築防河之堤也如所挑之河有必須築隄者其所挑之土必須缷於應築堤基之上照依前式徹底夯硪成堤如此則一舉而堤河成每挑土一方照挑河工銀外另加攤土夯硪銀二分此挑河兼築隄作下方工價科算以河工挑成為凖者也更有雖挑河而重在築隄者每上方土一方給銀一錢六七分不等此以堤工築成為凖者也總之視工程之難易而斟酌之兼築上方下方者以築成堤工之實土為上方土塘所取之鬆土為下方也然一堤之中亦自有上方下方之别如築堤一丈則以平地起至五尺為下方自六尺至一丈為上方如築堤一丈二尺則以一尺至六尺為下方七尺至丈二為上方蓋築堤愈髙則愈難故必先為斟酌難易而等差其工價庶鋪底者不致以易工而多取價收頂者不致以難工而寡受值則勞逸之勢雖殊而髙下之酬原均也然土方工價雖題有定額亦舉大槩而言若築堤髙至一丈四五尺不得泥一定之例況取土更有逺近之不同甚至扎簰鋪路逺取稀泥於汙淖之中其工價不啻加倍有至三錢餘一方者更難執一而論相地勢之髙卑逺近而增減之可也上方下方於水中築堤取土甚逺或至數十里外工費不資者當用水中取土之法其法先定堤基隨用船􅑽逺土於水中築成圍埂其埂出水二尺中間三十丈長五十丈圍埂既成用草料防護隨將埂內之水車乾然後於離堤基十五丈之外啓土挑至堤基之上密加夯硪築成大隄其隄如應頂寬二丈底寬十丈髙一丈六尺每堤一丈用土九十六方連船􅑽築埂之土并車水防埂一切夫工器具料物以及隂雨食米等項每方約需銀二錢六分較之尋常就近取土之費約省過半就水築隄河決之始如用掃裹頭以防汕刷築逼水壩開引河簽樁必須深釘入底以防懸空誤事河防一覽所載備矣至於沉繫掃箇全在揪頭繩索其力尤重於樁樁必須多而壯掃必須重而後沉當栁七而草三填土之後倘掃工之外忽起翻花大浪急須於堤內下掃填土晝夜壓截其翻花浪起於數十丈之內猶易若百丈之外則危矣其堤工若但坍毁而平下猶可填土加掃一若懸空則危矣若內外傾欹亦不可救此河防所不載堵決者不可不知也堵築決口昔人四防二守之制皆以保堤也然防守之制雖立而防守之人不足勢必塌圮相尋與無防守同則嵗修之法不可不籌也今營兵之設僅足以巡守隄防及運料捲掃栽栁之用至於嵗修加築其勢有不能者何也汛逺而隄長也按自碭山以下黃運兩岸及歸仁髙堰至海口一帶縷遙月格等隄統共四十五萬四千丈而河兵僅七千二百名計丈分修每兵當修六十六丈有奇堤髙一丈頂寬倍之增卑培薄各堅土五寸須下土七寸以土方計之每丈須土二方一分是每兵常役之外又當嵗挑築下土一百四十五方二分也豈能也哉前以河兵不足供嵗修擬令每丁許其召募幫丁四名或其子弟家屬每丁給以堤內空地俾耕種其中以自食而課其嵗修巳經題請未及舉行然臣深思河道善後之圖惟有嵗修以保隄而幫丁一議實與河兵之設表裏為用者也蓋易夫役而設營兵無召募往來之淹滯無逃亡之慮無雇替老弱之弊若幫丁之設則其利有八堤工髙厚永無潰決其利一授田力役貧民有歸其利二堤近民居風雨可守其利三羣聚樂業兵無逃竄其利四猝有河患不煩召募其利五室廬相望寇盜無警其利六深耕易耨狐兔絶蹤其利七刈穫所餘藁秸充盈其利八或難之曰每兵一名幫丁四名驟增丁二萬八千八百名河岸安得如許間田若查隱占則良民擾若給額田則正賦虧何可行也曰不然黃河兩岸二千數百里自十六年以前非一望汪洋即沮洳葦渚此身所目覩者也今兩河復故淤灘盡出置之不問則去地若聽民私種亦無利於國將計畞起科而灘岸之田其糧甚微不過數釐至二分極矣增丁二萬八千八百名丁授田十五畞應田四千三百餘頃所納正賦從重科輸不過八九千金耳夫即減八九千金正賦之額田而嵗得二萬八千八百名丁夫之用以保四十五萬四千丈之堤嵗加髙厚永無意外之虞運道長通民無災害其為利孰多而孰少而況賦未必畝二分所授未必盡額田也哉嵗修永計難之者又曰河臣怨府也督撫為朝廷養民而河臣勞之督撫為朝廷理財而河臣糜之故從來河臣得謗最多得禍最易也今既設河兵又設幫丁分地授宇在河岸二千數百里之境其中隱占必多一經畫地怨言滋作且兵民並居勢必生釁將來挑土修堤圍場植栁鬨鬭訐告從此而起在督撫必左民而右兵嫌猜內積挑搆外作小則河屬諸員受其禍大則彼此交參而河臣不得一日安其位夫為河堤圖萬全而先置其身於不自全之地何如循常守故用帑嵗修之無譽而無毁耶臣應之曰不然河臣與督撫皆天子大臣也河臣司水土以保運安民督撫諸臣司政教以養民理財職雖不同同於為國也夫今百姓之得以降丘宅土無昏墊之憂者何也今百姓之得以耕種貢賦尺土必爭者何也皆以兩河歸故隄岸堅固而無潰決也督撫為國養民理財自當返念民之何以得養財之何以得理必不為一二姦民喋喋而市恩邀譽上失體國之忠下失寅恭之義也今使隄岸不固潰決一生則千里滔天室廬為魚鱉之居膏腴皆荇藻之産彼正賦之額田且不能保而有之尚得隱占夫非所固有也哉且幫丁之法一行亦必會同督撫檄行地方有司公同經理立石分界而後撥給非冒昧為之也如果有民田近堤者亦可以空處之間田互相換易其家屬有願為幫丁者即除其額田應納之糧亦無不可也夫朝廷設嵗修之河帑非不知循常守故為無譽無毁之身圖但汛逺堤長將來河患久弭人情怠玩忘舊日之艱危司河事者或意在借帑狃於補苴旦夕之計設一變生慮外即又費數百萬之金錢竭數年之民力尚恐不能奏功也其如運道民生何夫河道重任也必圖其大而毋惜其小必計其久逺而毋籌其近必忘私體國而毋沽名市惠以便其私圖否則碌碌者皆足以任之夫豈聖天子疇咨而命之旨哉幫丁二難水土之工料物最難雖經畫之以總理又有諳練之屬員與子來之兵役而所需不給以致萬夫束手以待其誤事非淺淺也然物料非難採辦為難查舊例一曰官辦所需之物行文於各出産地方有司給價買解一曰商辦聽各商人赴工領銀送料交官夫地方有司必假手於吏胥由吏胥而及各行户層層剝蝕至料户或分文不給及運料到工専管之官貪婪不職者更須分外苛求勒賄小民不堪其命此官辦之害也工料之大莫如樁木而商人領價大都真偽相半其真商領銀入已分派各小行其值必虧偽者實無資本夤緣冒領花費拖欠此商辦之害也在大工方急於星火而文檄追比催督不前常至四五年種種誤工則一也臣蒞事以來稔悉此弊再三斟酌終無至當之策若竟委之在工各官恐破冒多若專委之胥役又恐勢輕而無濟惟有擇賢而任以勸懲鼓勵之為稍愈耳除嵗修物料不多不必差員其大工物料若葦草􅐨麻之屬當委之鄰近各邑佐二彼即與工近習知在工所需之物必不敢欺且淹其樁木之屬當精選廉幹之府佐二専行買辦所辦之木果堅大如式價直不浮又往來迅速克濟大工者工竣題請優敘否則請黜亦如之庶人知自勵採辦不前之弊或可免矣採辦料物中州黃河兩岸築隄多者至四五里江南境宿遷以下北岸則縷堤之內復築遙隄南岸則否蓋以南亢北下南有湖淮之限不致奪河而北易奪故耳然自徐州南岸歷靈雎宿桃至清口裴家場約五百里除諸湖淮水外别無分流之河雎河雖通流窄隘不能多受碭徐邳雎一帶壩閘所減之水率漫灘四溢民田悉被淹沒夫前此大興經理之日正值河道壞極之時惟奪河阻運是懼故隄防北岸不遺餘力而南岸未遑及之今兩河復故五六年無潰決之告則綢繆善後更當為大害去而大利興之圖南岸遙堤一工其利有四黃患不測作重門之障一也束散漫之水匯湖入黃沮洳涸而為沃壤二也引黃入淤嵗久加高即岸成隄不煩再築三也挑工築堤即開成小河一道伏秋保險運料便易四也統計此隄約長八九萬文自房村至峰山有子縷二堤今應將子堤為縷堤而以縷堤為遙堤自峯山至宿遷便民閘舊有遙越隄皆須量為加修至吳城亦有見在之堤不煩另築然此隄所束者徐州以下之水而蕭碭以上隔於山岡尚未有所束也再於毛城鋪起築堤一道至王家山止以束徐州以西碭山以東并十八里屯二閘之水使悉由鹽河歸雎溪口入靈芝等河歷歸仁堤以匯於洪澤則自碭山以及清河縣境七百里别無霪潦之虞矣南岸遙堤河之有限沙如人之患噎小噎則傷氣大噎則傷食故雖痛癢不形而治之不可不預也自河流順軌以來河底日深然尚有礓砂三處為河之梗不可不及暇以圖之三砂者桃源之古城清河之曹家窑安東之蓮花庵也然三砂之中古城砂不甚崇嶐水涸時尚深丈許蓮花庵近海且河流日就南刷更一二十年必然從蘇家觜正流可與砂不相涉惟曹家窑砂最巨橫亘者一二百丈每冬春水落時去水面不過一二尺夫河流迅疾一遇限沙則回瀾旋洑從底而起舟行甚險且河流為之不快但去之甚難雖乘冬春水落用釘犁鐵耙等具鏟削終難施力計惟有於其南岸側伏砂斷絶之處另開越河里許引河流使之避砂而行但所開之河不過深一丈寬五六丈聽河流自行汕刷此等工程當於春初河防少暇時調河兵挑浚不煩募役也夫此砂既無大害又非運道經行之地然設遇亢旱之嵗河水淺涸一則限砂之阻勢必流緩而砂停此亦淤積之一漸茍有防於河雖小毋忽可也黃河三砂黃淮二瀆敵也然黃強之時多淮強之時少強則易潰而河不兩行可減而不可分弱則易奪而自泗盱以東淮無他河之會惟即以黃濟淮使強者不獨強則二瀆交得其半而會同之勢成此減水各閘壩之最為得也黃河莫窄於徐州其至寬者莫能過百丈一遇伏秋大漲奔騰激蕩必有衝突他潰之憂淮水北出清口每患為黃流之所抵淮少弱即不免乘虛而內注康熙二十三年冬皇上南巡閲工親臨清河運口蒙上諭今年黃水倒灌運口須酌一至妥之策期永逺無虞臣欽遵之下再三規畫思善後利運之圖唯有殺黃以濟淮而殺黃濟淮之策無如閘壩善建置閘壩之地又無如徐州上下善乃經營相度於黃河南岸碭山毛城鋪徐州王家山十八里屯雎寧峰山龍虎山等處為減水閘壩共九座其因山根岡址鑿為天然閘者居其七既以殺黃且使所過之水各隨地勢由雎溪口靈芝孟山等湖以入洪澤而助淮如遇淮漲而黃消則淮自足以敵黃而閘壩亦無可過之水如遇淮消而黃漲則九閘壩所過之水分流而并至即借黃助淮以禦黃而淮之消者亦漲倘更遇黃淮俱漲則彼此之勢略等有中河以泄黃周橋六壩以泄淮亦不至偏強為害矣夫減水莫善於閘壩但建於運河則易建於黃河則難何也黃河兩岸俱浮沙基既不固加以水勢之排蕩溜頭之緊駛率不越嵗而頽圮今以天然之岡址鑿天然之閘座雖驚濤動地終不能迸山根而敗之真千載之利也雖然黃善淤自古記之引黃入湖數年後洪澤湖且淤而為平陸奈何曰不然夫黃流急則挾沙而行緩則停過閘壩之水其流必緩又越數百里歷諸湖而入安能淤洪澤為平陸蓋大與宿桃清三邑南岸潰決逼近而能墊湖者不可同日語也不惟是也靈芝諸湖等處地最卑窪誠使黃水數年一過流清而停濁久之亦當如宿遷之侍邱倉基安東之碩項等湖沮洳悉變為沃壤其利又不特以殺黃而助淮已也夫猶是黃也閘壩未建之先清口河流黃常強而淮弱自建有閘壩即遇異漲而上下六百里遞互灌輸回環平凖一似黃不得淮即上無以泄其怒而下無以佐其勢淮不得黃則孤獨無援而勢不敵二瀆相須齊驅而東騖化敵仇而為好合是直以黃淮為秦晉而以各閘壩為蹇修也黃淮交濟川之善潰莫如黃蟻穴之漏不終日而滔天故防河最難然有決而害小有決而害大沿河兩岸數千里無在不當防尤必審其害之孰大孰小而經略施焉決之害北岸為大何也南亢而北下也且開封南岸從汴河可以達淮歸德徐邳而下其地山陵其堤歸仁其湖靈芝孟山洪澤其去無路久之而亦必復其故又與運道無係也然同一北岸而其害又有大小之不同若上自閿鄉下迄滎澤六百里大抵山多而土堅不甚潰決不具論至安東以下雖北岸然與海近不逺漫徐邳北岸即潰決而岡阜四合盤紆東下貫皂河入駱馬而並歸中河曹單潰決由魚臺上下以入運或匯荆山口彭家河以入運皆無奪河之患若宿桃清河北岸一有潰決則運道首阻而自海沐以南馬陵迤左周圍千里渺然巨浸矣開封北岸一有潰決則延津長垣東明曹州三直省附近各邑胥溺近則注張秋由鹽河而入海逺則直趨東昌德州而赴溟渤而濟寧上下無運道矣且開封之境地皆浮沙河流迅駛一經潰決如奔馬掣電瞬息數百丈工必大而下掃更難故前代河決之患此地常十居七八自明臣劉大夏築太行堤西起黑羊山東至曹州以及灃沛高厚堅固北岸恃以無恐歲久不修風雨之飄零車馬之蹂躪殘缺過半臣任事十年屬以江南大工屢興未遑及也宿桃清河境內無山岡阻滯其河流之迅駛亦如之故其害之大亦略等國初封邱荆龍口大王廟之決前河臣楊方興塞之工六七年而始竣費帑者八十萬近則宿遷楊家莊之塞亦二十二萬若蕭家渡一工止旁決非頂衝然猶費帑十萬兩有竒而徐灣因南岸費僅三萬徐州花山之役則以馬陵山之阻駱馬湖之匯費一萬餘而已故曰決之害北岸為大而北岸之害莫大於開封及宿桃清一帶而曹單次之徐邳又次之若安東以下非所憂也然此亦就黃言黃未嘗統兩河南北之大勢而言也夫黃自滎澤以至雲梯海口兩岸堤工三千二百里潰決之害人人知之淮自桐柏而至泗盱境八百里自清口至海三百餘里上下千一百里所堤防者止一髙堰而堰之固不固未有知其利與害者知之者曰淮地最下平水者謂淮城睥睨與湖面等堰不固則淮其沼而高寶七邑其魚也此知其一未知其二者也又有知之者曰堰不固則淮水東注黃且躡淮之後而清口必淤黃失長淮之援無以刷沙而海口亦必淤也此知其二未如其全者也夫河決於上者必淤於下而淤於下又必決於上此一定之理下口俱淤勢必以漸而決於上從此而桃宿潰邳徐潰單曹潰開封潰奔騰四溢東省諸山泉亦阻塞而不得暢泛濫之勢更挾黃水而愈漲而運道民生不可復問矣故髙堰一堤全淮係之全黃亦係之非特淮揚二郡與運口之害已也此兩河南北之大勢也然則如之何而可北固開封之障增卑培薄中慎宿桃清之守幫築中河兩岸之堤南謹高堰之守歲壩坦坡以保之茍大者無虞則其他隄岸但遵四防二守之制即有潰決亦隨決隨塞跂足治之矣黃淮全勢治以上俱靳文襄公河書行水金鑑卷五十一
