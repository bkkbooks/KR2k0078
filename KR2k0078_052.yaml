body:
  text: 行水金鑑卷五十二江南按察使傅澤洪撰河水靳文襄公行水之法治紀廣矣備矣謹録其梗概而櫽括之得一十二條此萬世之津筏也豈特為淮揚一方之永賴也哉一開浚引河引河之用有三一則曰引水以濟運也蓋河當極敝之後黃流悉從各決口旁注其正流一線曽不足以方舟則不得不鑿之使寬而後運艘可浮也一則曰預浚以迎溜也河身既積為平陸矣而土有磽坳之不齊者又懼將來黃流歸故之日或激而他潰或澓而渟淤也故必相度形勢預開一渠以迎之務令水至歸渠成其湍迅之勢則刷沙有力而亦無岐出之他虞矣一則曰挽險以保堤也河性猛烈其順流而下也則藉其猛以刷沙而河受其益其橫突而衝也則挾其猛以觸岸而堤受其傷方其倐左倐右衝突激射之時被衝之隄危於纍卵是宜酌左右之中急開一渠一面將衝突之處迅行掃堵一面挽所衝之溜頭引入中流以奪其勢而後彼堤可保故曰其用有三也但三者之用雖有不同然度上下髙卑之數以定挑挖之淺深驗土性淤鬆之殊以酌渠路之去取凡此皆屬利𨗳之要則又勢異而理同者也挑河之法固當相土性之淤鬆以施浚然亦有必無鬆土不得不向淤處挑挖者後來水到之時自是必多澀滯此等水中之淺人力難施司馬創造鐵犂數十箇每箇約重二百斤上具二十餘齒沉至水底則爬土有力又置造浚船數百隻每二船繫犂一箇乘流鼓棹往來爬刷且令各船更番叠上淤河得以漸通此又以物力代人力所窮之一法也二浚築雲梯關關在清口之下者二百餘里黃淮俱從此關以出海口者也前此海口壅積治之者莫不議挑浚矣特未察所以壅積之故率因關外之土原屬坪厰漫灘以故出關之水亦隨地散漫散漫則流緩流緩則沙停是以如是其壅積耳公既悉其故因念水不歸一則力不厚力不厚則溜不急溜不急則沙必停欲救其弊非築堤束水不可如是創築土隄凡一萬八千餘丈夫然後水就束於堤內一往急湍刷沙有力海口停積之弊去而尾閭始通矣三築髙家堰入淮河四築清水潭入運河五堵築決口康熙十六年以前黃河兩岸決口二十一處南北運河及髙堰等處決口七十一處前此率旋堵旋決或堵東決西為患公乃以水平法測地形之高卑衡水勢之順逆相機下掃凡掃之大小邊幫底套丁順之制以及物料之輕重堅脆無不精晰畢當故費不糜而工克濟焉其在南運河者自堵高堰清潭後餘者固已漸次竣築矣其在黃河者決口有大小則堵塞有難易人無不以先難後易應先堵楊莊為說公則先堵小者小口堵畢而後一力以堵楊莊於是用工既專而又無小口刷大之患至於徐灣蕭渡之決人莫不為公危者公又謂久淤之河原不能求通於一旦唯有盡人力以求其必成而已每遇決潰之頃皆安心靜氣以臨之果三堵而後告成焉人無不歎服其智量也六建減水壩淮屬三十年以前之黃河廣濶各二三百丈水卑於岸者丈餘河底復深四五丈不等寬深如是是以雖有萬餘里之洪濤猝至足以容納而無患也自淤成平陸之後雖竭疏浚之力挽歸故道然欲其驟為刷深而容納如故理所必無也夫既不能容而又不令有所泄則怒漲奔流者勢必橫衝四潰矣公乃以推測土方之法移而推測水方其法以上流之寬深凖下流之淺窄量入為出以泄之然漕中之水又必須留以滌沙而後可冀其日刷則其間應留應泄之數又不可不斟酌至當也公為之審度地宜於黃河兩岸建減水閘壩十餘座且酌定髙卑之數既可以泄所應泄又可以留所應留是以上游奔赴之水一及閘壩則即可泄其餘漲而不至於衝崩其正流之在漕者未及閘壩則仍有所蓄使其力可刷沙而不至於緩弱夫然後堤工既可保固而河身又可日深是乃拯極敝而救變通之一法也七改南運口八改北運口俱入運河九均劑黃淮入淮河十堅築堤工河之有堤也舊矣然堅則難摧瑕則易釁故公之督築也必令選擇淤土每覆土一尺即夯硪三回築畢用鐵鎚杵孔沃以水水不滲漏為度然亦有純淤土而水漏者則其土必大堅鎚不易入且土必龜坼為驗不一律繩也臨水之面坡必坦而坡面必令蓄茸草以蓋之蓋以草能柔水性而坦坡又可免風浪之擊也然值不稱則工易偷故取土有逺近而逺者則有增焉又土方之數有堅實鬆浮之辨浮者每下土一方堆成上土一方相去無幾實者下土一方僅築上土七分故堅實者亦有增焉且遇冬時或挑土於水中而以河土築堤也慮夫之寒則體有皮褲皮鞾之具啜有火酒薑漿之助遇漘暑慮穢蒸而易病也則廣備靈砂萬應玉樞等丹藥以濟之是以投醪挾纊之感役數千萬人無不甘心者而堤工用以益堅云十一改增官守先是河官之制設分司四員以部郎領其事三年一易以為常夫部郎之親民也視郡邑為有閒舉事率格滯而未浹且以其年之有限也往往履任之初多乖忤及車輕路熟則又以瓜期去人多嗟惜焉公懲是疏請撤部郎而權歸郡丞且令監司統轄之丞之於郡邑也呼吸為一氣事易集且遴其諳練者以名聞及受事綿其嵗月責其成功夫是以吏習民安而政克舉焉至於大工繁龎一時並舉為尤劇公又題設監理分管諸員畫疆别務以任之俾各治所事各展所長日課其殿最布公信而行黜陟於俄頃故羣心悅服效忠者衆蓋功之成也其又有鼓舞之神乎十二設立河營舊制沿河堤岸皆額設河夫以供修防之役然率張虛數臨時倩應故名存實亡而工因以隳也公欲立綜核之法專責成考功過而鼓舞之於是以兵法部署疏請設兵夫八營令其亡故除補有報逐日力作有程而虛實無遁情且營以守備領之遞為千把總凡官若兵與郡丞河衙佐雜各文職皆畫疆而守無冒無諉而責成以專臧則陟否則黜而功過以明人無不鼓舞盡力者且揆時度務東工劇則調西營協應之呼應既靈而緩急有濟其於畚鍤也較額夫之舊制為有實益云淮安府志治文襄公治河真所謂審全局於胸中徹首尾而之前後十年兢兢以築堤岸疏下流塞決口但有先後無緩急守此數言以為治河之而金針以故功髙砥績雖以下河屯田為人所中傷聖明益信其公忠始終隆眷不替云聖祖仁皇帝康熙三十二年六月初七日總河于成龍為逺方之民應募河工等事奉旨該部知道部議先經原任總河靳輔等疏稱從前興舉河工派募里民不勝苦纍臣輔乃易派募為雇募重堤一工力圖早竣令各員賫銀往江北東豫等處分頭雇募每名預給銀數兩不等正在興築奉㫖停工各夫四散而去預給銀兩無憑扣追查從前工程凡有預給工完扣除是以在工有預給之實而冊報無預給之名惟重堤一工忽然中止遂有預給之名仰請蠲免臣部以一切工程並有預給工價之例應將該督等題請豁免之處毋庸議題覆奉㫖這事情著新任總河察明具奏今據總河于成龍等疏稱訪察無異應如前河臣靳輔所題仰祈皇恩特賜豁免七月十三日題本月十八日奉㫖這預給夫役銀兩工程中止且已經年久著免追取餘依議張文端治河書聖祖仁皇帝康熙三十四年八月工部題覆趙山察勘河工一疏奉㫖察勘河工原欲嚴虛冒錢糧之弊以期河工堅固所差官員理應矢公詳加嚴察前遣趙山等察勘時並未察明河工堅固與不堅固及虛冒錢糧之處且有管河官員以為不堅意欲重加修理而伊等閲視反稱堅好者明係朦混狥庇大負差委之意趙山等著吏部嚴察議奏這察勘無益嗣後差遣察勘著永行停止京鈔聖祖仁皇帝康熙三十五年十月十二日總河董安國題兩河情形等事奉㫖著江南總督漕運總督江寧安徽巡撫公同速行㑹勘確議具奏該部知道㑹議得黃淮交匯起歷山陽安東以抵海口黃河兩岸縷堤卑矮不足捍禦業經河臣於謹陳河工幫築等事案內題明加幫在案若照本年異漲水跡似宜再加髙寬但江海湖河一時並漲從未有如今嵗之甚者相應仍照原估加幫俟來年伏秋聽河臣相度水勢酌量另題外惟海口乃全黃去路案查雲梯關迤下為昔年海口今則日淤日墊距海二百餘里下流之宣泄既遲則上游之壅積愈甚水勢不能容受小則倒灌大則漫溢斷斷不免矣見今河臣於雲梯關下馬家港地方挑穵引河一千二百餘丈𨗳黃河之水由南潮河東注入海急應儧挑開放又清河縣之甘羅城卞家汪堤工單薄亦應一律加幫又天妃壩石工今秋異漲水上石工築堰防禦應行加砌又山陽之老壩口大小車路口險工當全黃之頂衝今秋異漲竭力搶救方保無虞業經河臣於三壩大漲水勢等事案內題明急應修築創堤一道以為內障又山陽之王公堤石工卑矮本年漫堤過水應行加髙并應加幫月堤以為外護又自清河歷桃源宿遷邳州睢寧靈璧以抵徐州除兩岸縷堤見在髙寬未至損傷者毋庸加幫外查黃河兩岸清河縣之南河觜為黃淮門户河身寬濶黃水每多倒灌應築攔黃大壩一道直接縷堤并於甘羅城西創建草壩使口門小一分則黃水少灌一分再清河縣內縷堤一千三百五十九丈五尺陡坡塌缷桃源縣界內縷堤四千六百五十丈并靈璧縣界內縷堤一千二百丈地勢低窪以及宿遷界內彭家堡險工一千二十二丈掃臺卑矮蔡家樓磯觜壩一百三十二丈舊壩單薄均應加幫雎寧縣界內戴家樓險工三百三十五丈全黃頂衝勢甚危險應建挑水磯觜大壩并於對岸漲出沙灘酌挑引河一道𨗳水中行以防衝激其武官營子堤七百零四丈亦屬單薄並應加幫徐州界內小店月堤三百九十五丈單薄不堪急應加幫并接月堤一道楊家窪楊橫莊兩險工水勢南遷全黃頂衝應於楊家窪加幫掃臺添築月堤并於楊橫莊北岸沙灘酌挑引河以避危險其徐州護城石岸五百一十五丈為州城保障本年異漲水與岸平急應酌量加髙查黃河北岸縷堤自清河縣界石人溝起由桃源至宿遷縣卓家莊迤上止共工長一萬八千九百九十二丈內係中河外係黃河一線長堤兩面受敵兼之地勢低下堤工汕缷均應酌量分别加幫上而宿遷縣界內河北鎮照舊修理其南北兩岸束水子堤卑矮單薄逼水太窄一遇泛漲即有漫溢汕刷之虞應於北岸仍循舊址加幫南岸臨河逺者亦照舊址加幫臨河近者酌量改寬興築并建小閘減壩置板啓閉水大則藉以分泄水小則收束濟運再於頂衝掃灣之工照運河例簽釘排樁鑲填丁頭第中河之水由仲莊閘直注黃河逼溜南趨黃水勢强每易倒灌運口議於黃河之下糧艘由陶莊閘進口入中河北上使清水由陶莊閘出黃庶不助黃水倒灌其雙金門石閘格堤應移建於陶莊閘之下束水行運但今新運在邇未便驟改俟伏秋後河臣相機改建可也又清河宿遷之護城隄并清河萬家營之遙堤俱屬低矮均應加幫又宿遷劉老澗減壩均應照河臣前題建造減水石壩磯心置板啓閉迤下引河淺澀之處應行挑濬𨗳引入海再查皂河兩岸堤工除邳州東堤無誤運道毋庸議築外宿遷縣東堤五千二百七十六丈七尺邳宿二州縣西堤九千零八十四丈七尺漫溢殘缺而閻王廟一帶尤汕刷殆盡有阻運道民生均應酌量一律修築以上各工俱經臣等公同親履勘確除今秋異漲黃運兩河漫溢水口悉已修築完竣其童家營一工亦見在修築堵塞并嵗搶工程照常修防不議外所有㑹勘過應修應築之處理合繕疏題覆其需用土方工料應聽河臣確估具題興工可也張文端治河書河南巡撫李國亮疏言滎澤縣北臨黃河丹沁二水㑹歸黃流逼近城下查滎陽郡舊基髙阜將縣城移建於此可永無衝決之虞部覆不允得旨這遷滎澤縣城著照該撫所題行居易録三聞其事在康熙十五年聖祖仁皇帝康熙三十六年正月二十三日奉㫖河工關係重大這㑹勘應修應築工程俱著照該督等所題作速興工該部即將錢糧撥給其海口為黃水入海之道所關甚屬緊要河道總督每年委賢能河官專管修理勿致壅滯該部知道張文端治河書聖祖仁皇帝康熙三十七年十二月初一日上諭大學士伊桑阿阿蘭泰王熙李天馥吳琠學士布泰噶里溫奏錢齊保恩丕顧藻徐嘉炎李録豫河道緊要董安國工程未完之處儘多關係錢糧今若不清楚日後董安國于成龍至于彼此推諉差部院堂官一員帶領才能章京前往㑹同總漕桑格等將工程已完未完之處用過錢糧數目逐一查明丈量開造清冊帶回欽此本日緑頭牌啓奏奉㫖著尚書馬奇侍郎常綬喻成龍去張文端治河書聖祖仁皇帝康熙三十八年三月初一日聖駕巡幸髙家堰閲視畢隨諭大學士伊桑阿阿蘭泰尚書馬奇侍郎常綬喻成龍李柟總漕桑格總河于成龍協理河務府尹徐廷璽江寧巡撫宋犖員外郎赫韶瑟登德費揚古等朕念河道國儲民生攸關親行巡幸由運河一帶以至徐州迤南黃河細加看閲黃河底高灣多以至各處受險又至歸仁堤高家堰運口等處留心細閲見各堤岸愈髙而水愈大此非水大之故皆因黃河淤墊甚高以致節年漫溢黃河若淤高二尺則水高二尺淤高一丈水即髙一丈若治河專以築堤終屬無益如不將黃河刷深徒費錢糧且運口太直黃水倒灌兼之湖水淤墊以致清水不能暢流各河與洪湖之水如何得能敵黃若將清河至惠濟祠掃灣由北岸挑引入惠濟祠後入河而運河再向東斜流入惠濟祠交匯黃水如何得能倒灌朕欲將黃河各險工頂溜灣處開直使水直行刷沙若黃河刷深一尺則各河水少一尺深一丈則各水淺一丈如此刷去則水由地中而行各壩亦可不用不但運河無漫溢之虞而下河淹沒之患似可永除矣朕意如此是否爾等直奏不得以朕必是朕亦是一時意見亦不保其必然且攔黃壩灣曲馬家港窄狹雖將時家馬頭之口堵築而黃水不能暢流山陽南岸韓家莊等處險工甚屬可虞至於下河不必挑濬如將上河修築堅固則下河不治而自治矣今朕念民生運道親行巡幸如不遡本窮源分晰條治於民生何益將來每嵗加幫髙家堰等隄堵築時家馬頭等口徒致糜費錢糧淹害百姓今應將清口之西壩臺加添挑水壩修築堅固加長過於東壩臺將清口安置裏邊洪澤湖擇其水深之處開直成河使湖水流黃河灣曲之處直挑引河使各險處不得受衝董安國馮佑將河道廢壞已極此各工程責令賠修贖罪其下河見有積水不得不引出歸海將串場河射陽湖蝦䰅沙溝一帶挑通引積水流出歸海其攔黃壩應行挑拆時家馬頭暫緩堵築使黃水流定汰黃堤築成之日再將時家馬頭決口堵塞至於歸仁堤人皆稱係保護明季皇陵此俱係妄誕三四十里路之隄如何護得明季皇陵此隄之修專因水漲之時毛城鋪等處發來之水至歸仁堤攔回仍歸黃河之意此隄亦應酌量修築至於運河之水少有不濟治之甚易爾等係河臣係爾等專責若此治法一成則河道可保無虞如不然另想别䇿務必將被淹州縣之水災盡除方不負朕南巡救民之意爾等若挑穵引河其原有工程仍照舊令各官修防不可怠忽俟挑穵引河黃河歸入故道再將下河串場河與射陽湖涇河蝦䰅沙溝挑數處通流使水歸海至於邳州清河桃源安東山陽寶應髙郵江都泰州興化鹽城等州縣百姓困苦已極如欲拯濟而窮民不沾實惠殷實之人反得行其冒瀆每一州縣或截留漕糧一萬石或截留數千石比時值減價糶賣則窮民實有禆益邳州差部官一員糶賣其餘别處米石責成總漕桑格總河于成龍同地方大臣委令地方官糶賣如此救治諒百姓似不致流離河道永無衝決朕意如此是否允當爾等直奏不得以朕㫖為必是爾等速㑹議具奏上謹按此黃運兩河并髙堰下河諭備述等處修築事宜全録在此而運河髙堰等處事宜再分録於各條之下是日總河于成龍協理河務徐廷璽等奉上諭諭將攔黃壩坼開新河口亦不必堵塞其時家馬頭亦不必合龍門俟汰黃堤築成之日另行定奪初三日聖駕親閲黃河堤岸初四日奉上諭朕未到之前將王家營陶家莊引河挑完放水即寫摺子具奏四月二十二日河道總督于成龍協理河道府尹徐廷璽奉㫖引河挑水壩可曾建築奏稱清河縣陶家莊舊河水溜甚逺兼料物未曾運到俟大溜稍近引河口再行建築又奉㫖河身創堤可曽建築奏稱一因料物未到又因離堤甚逺尚未修築奉㫖此堤不論逺近必與要修朕業已指示不用髙寬止用髙五尺底寬二丈頂寬七八尺以遏水頭董安國等引河工成方可贖罪功若不成如何贖罪二十三日河道總督于成龍協理河道府尹徐廷璽奉㫖堤內有水之處必下掃方好幫築時家馬頭舊河從前淤墊之處挑穵引河決口趁此時亦應堵築至修河之圖朕至京斟酌妥當發來二十七日奉㫖這黃河灣曲之處俱應挑穵引河于成龍奏稱徐州楊橫莊一帶灣曲臣見已遵㫖行該道㕔挑穵其各險灣曲之處容臣陸續挑穵奉㫖是凡有灣曲之處俱各挑直二十八日據郎中朱成格員外郎赫韶瑟摺開康熙三十八年四月二十七日皇上坐船出清口喚郎中朱成格員外郎赫韶瑟𫝊上諭這南岸所堆石塊今若不令收起恐大水之時被衝流失著速令收起皇上下船上南岸𫝊上諭這南岸若不修挑水壩新挑引河必不能暢流朱成格赫韶瑟奏稱前日於接駕之前于成龍等親至看過修挑水壩基址若在陳家莊修挑壩恐清河縣東關危險在陳家莊迤下二里餘對引河觜處之上一里餘應修挑水壩打過樁又奉上諭理應速修為何遲了朱成格等奏稱挑水壩尾堤若不接著南大壩恐水漲之時水從挑水壩尾衝進挑水壩難以存立且應修堤岸甚逺所需料物甚多因一時未能齊備是以稍遲又奉上諭從朕所釘樁處修挑水壩二三十丈挑出水頭大溜向北以至引河流暢尾堤在陳家莊旱地面築髙五尺水長之時若從陳家莊南任其流去無礙這事關要緊朕㫖交與爾等張文端治河書是月總河于成龍等謹奏為嵗夫徒滋苦纍亟請變通以收實用事竊照連年河道敝壞小民昏墊致厪聖慮巡幸江南不惜帑金指授修治更沐皇恩蠲恤頻施截漕平糶無非愛民如傷之至意臣等庸愚荷䝉不次殊恩復畀督河重任今有無濟於工有纍於民之事不得不為我皇上陳之查江南黃運兩河額設河營兵夫修防之外每嵗額撥徐屬邳州雎寧宿遷桃源清河山陽安東寶應各州縣嵗夫共六千九百五十名協助河兵共相修防臣等往來閲視河工各屬士民咸以嵗夫苦纍紛紛見告訪聞百姓每派嵗夫一名終年約費銀至二十兩及至到工非老幼充數即旋到旋逃揆厥所由多係河棍人等包折肥已徒有嵗夫之纍終無嵗夫之實臣等何敢輕議裁減若不亟為變通究無實濟臣等再三籌酌莫若將徐屬等州縣嵗夫盡行裁免止於每嵗每名量徵銀五兩編入正項地丁之內照河銀一例催徵起解河工但嵗夫既裁必須添設戰守兵三千三十名以遊擊一員守備二員千總二員把總四員管理當伏秋水發之際酌量緩急分撥搶救即以裁夫銀兩以充俸餉之用在小民亦所樂輸在河工亦得實際矣再查海州山陽等處官蕩出産葦柴歷年以來或發刀工或給委員原期砍斫運濟兩河嵗搶工程之用乃因日久弊生或借􅏻運愆期雨浥黴爛或稱野火焚燒及海潮漂淌遂而拖缺纍纍今查各蕩每年約得額柴一百一十八萬餘束即責成該遊擊等管理每當九月霜降後撥兵開采照額計日采完運貯水口調撥各營浚船交給該備辨運送各工收用每嵗可得柴價銀二萬六千餘兩除凑給官兵俸餉外尚有節省銀一萬五千二百餘兩如䝉皇上俞允凖行其於河工民生均有裨益矣為此恭具奏摺上請伏候敕㫖五月初二日工部議覆應如該督所題奉㫖依議此設立葦蕩營所自昉也康熙五十九年間總河趙世顯以蕩地淤墊不産葦柴徒費糧餉無益工㫖需題請裁汰大學士馬等將裁營折本啓奏奉設立似這事有因先經部議駁回此營係原任總河靳於河工有益豈可輕易裁汰將本發回尚書張與部會同將此營裁汰與夫有益無益有因無因之處一併確議具奏會議者竟准其裁汰奉盡領墾徒有升科之名而無增㫖依議迄今四年蕩地未賦之實現奉部駁未能結案七月二十五日工部議查時家馬頭先經該督等題請發帑先期備料堵塞臣部以照例責令經修防守官員賠修等因屢次議覆在案今該督等並不照例責令董安國等賠修何得題請動帑修築應仍行該督等作速照例賠修完工報部可也奉㫖時家馬頭地方最關緊要如有修築機宜恐致遲誤著該督不拘何項錢糧動用修築工完之日將數目明白題報著原修人等賠補十月二十日總河于成龍等題奏臣查淮揚徐三府州屬黃運湖河均關運道民生最為重大全賴堤岸髙寬方資捍禦但一切險工掃臺窄隘隄岸卑薄殘缺不堪非自今日為然久宜加幫髙寬凡有黃流頂衝灣曲之處俱應相機挑穵引河以分急溜臣於前任時蚤經勘明條議陳奏在案雖原任河臣董安國請帑修築尚未成功而臣於去冬復膺簡命再督兩河到任之初即㑹同欽差部臣并協理河務府尹徐廷璽自徐州以至海口黃運湖河皆遍履踏勘又䝉皇上親臨勘閲凡有應修應築之處一一面為指示臣等欽遵俞㫖當即檄行該道㕔逐處分别緩急詳加確估但念工程緊急如循舊先估題修住返需時必致有誤臣等將先經勘明之處酌量工程之最險最急者一面發帑興工或檄急公人員儹築然後陸續題估其各屬工程正在儹築之際不意伏秋水汛暴發兼因天雨連綿堤根土塘多被水占人夫雖多畚鍤難施取土艱難是以各工不能一時告竣今值霜降已過水勢漸消見在勒催各官添募人夫乘時協力儹修指日可告完工唯是加修創建石工甎工等料辦自逺方不無尚需時日其各屬嵗搶工程如徐州之郭家觜吳家莊邳雎之三官廟戚字堡以及宿桃山安之烟墩朱家莊老壩口等工最為險要皆臣等不拘往例先事預防或加幫創堤搶築掃臺不惜夫料錢糧得以保固平穩河防志見奉水㫖詳淮是年十二月初六日巡視北城監察御史李題為河防各有疆界變例苦樂不均等事一疏奉㫖該部速議具奏部臣等議得臺臣李疏稱山東河隄北岸止曹單兩縣共計一百九十里單縣六十里曹縣一百三十里此應分修築之工也其自戴家樓起至儀封縣交界止堤工三十里計長五千餘丈係河南考城縣地方歷來修築無紊康熙二十五年將考城縣三十里河汛險工歸併曹縣十餘年來代為修理官民交困且河防設官各有責成河南設通判一員主簿一員専駐考城以治豫省兩河之堤山東設同知一員主簿一員専駐曹縣以治東省兩河之隄今考城三十里堤工推諉於曹縣則駐考城之通判主簿何所事事又查曹縣額設徭夫三百六十四名曹州定陶金鄉城武協濟徭夫六百二十三名嵗修一百三十里堤工如有險工臨時尚須協調今又增考城堤工三十里夫不加增何能無誤恐不能無顧彼失此之虞伏乞敕下河臣于成龍協理河臣徐廷璽㑹同東撫臣王國昌豫撫臣李國亮親詣河汛正明疆界將此三十里堤工照二十五年以前仍歸河南考城縣官民修築庶兩省連界之民各得相安無事而河工不致貽誤等因前來查總河等現在河工看修緊要之處此事不甚緊要應行總河等俟閒暇之日㑹同河南巡撫山東巡撫詳勘定議具題到日再議可也康熙三十八年十二月十九日題本月二十一日奉㫖這事情著河南巡撫山東巡撫委官㑹同詳勘定議具奏河南管河道治河檔案是月十一日巡視東城浙江道監察御史廖騰煃題為帑金糜費日多河工迄無成功等事一疏奉㫖該部確議具奏部臣等議得臺臣廖騰煃疏稱我皇上軫念民瘼於淮揚水患宵旰憂勤不啻堯舜咨警自原任總河董安國糜費嵗修案內及各案大工帑金不下四五百萬總河于成龍接任以來河庫錢糧及屢次給過帑金又幾及二三百萬河工無一案報竣追賠各款並無一案還項臣以為考成不嚴則無任事之員限期不立則無完庫之數日復一日國帑終歸虛耗請嗣後有隄岸衝決者管河各官俱革職帶罪賠修分司道官俱住俸督賠成例限以半年完日開復逾限不完者照例分别降革離任賠補至總河身膺重任百官皆其統屬責成尤不可不嚴如此庶河臣知所警畏河工成效可期而帑金無侵蝕之弊等語查定例內黃河水勢洶湧與運河不同修築黃河堤岸仍定限一年運河堤岸仍定限三年如黃河隄岸半年內運河堤岸一年內衝決者經修防守同知通判州縣等官均行革職分司道官降四級調用總河降三級留任如黃河堤岸過半年運河堤岸過一年限內衝決者將經修防守同知通判州縣等官降三級調用分司道官降二級調用總河降一級留任如過限年衝決者將管河各官俱革職帶罪修築分司道官住俸督修工完開復總河罰俸一年等因又定例堤岸衝決河流遷徙者照舊例處分至河水漫決河流不移者限年之內令經修之官賠修如過年限令防守之官賠修等因各在案今雖稱賠修未據報完之處若不嚴定勒限處分之例終無報竣之期嗣後有隄岸衝決河流遷徙者仍照舊例處分外河流不移者將管河各官俱革職帶罪勒限半年賠修分司道官俱各降四級督賠工完開復如限內不完將承修官員革職分司道官降四級調用總河降一級留任未完工程仍令賠修現今應賠工程總河具題動帑修築者甚多將此應賠銀兩亦照賠修之例勒限處分如限內不完分司道官不行揭報總河不行題參照狥庇例議處俟命下之日永為定例遵行又疏稱修理河工人員雖有一定丈尺然地名繁雜若不畫一定界表以石樁恐將來一遇衝決彼此推諉狥情庇護移甲作乙將現在舊堤指為新堤請嚴敕總河特委能員將應修之河堤細為丈量編立號數以每十丈為一號立一石樁上鐫號數下鐫修理人員姓名其舊隄亦一體編號立樁鐫明舊隄字樣造冊報部以便稽查等語應如所奏立石但每十丈為一號立一石樁殊為繁雜應令總河等將現今所修堤岸細為丈量於接連交界之處各立石樁上鐫號數下鐫修理人員姓名其舊堤亦照此立石編號鐫明舊堤字樣備造細冊報部可也康熙三十九年正月二十日題本月二十二日奉㫖依議河南管河道治河檔案行水金鑑卷五十二
