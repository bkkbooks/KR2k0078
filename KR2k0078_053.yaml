body:
  text: 行水金鑑卷五十三江南按察使傅澤洪撰河水聖祖仨皇帝康熙三十九年三月初九日大學士伊桑阿等傳上諭河工錢糧甚屬紊亂于成龍見經病故江南江西總督張鵬翮操守好著調補河道總督爾等即傳旨與張鵬翮鵬翮即奏為請旨事竊臣一介庸愚荷蒙皇上高厚之恩鞠躬盡瘁固臣素心但河工關係國計民生甚為重大臣才識短淺未諳河務誠恐有負任使伏乞皇上另簡才堪治河之人庶幾早奏平成等因轉奏未蒙俞允臣思河道至今日潰壞已極恐涉畏難就易之嫌不敢再行瀆請我皇上軫念河工宵旰厪懷自有聖謨方略指示微臣奉以遵行但臣一得之愚不揣冒昧上陳天聽一總河之責任宜專也從來定制祗設總河一員督管河道廳官專心致志相機修築歷有成效自靳輔于成龍為總河時始帶府尹臣徐廷璽名曰副總河事權不一議論參差不疏下流今黃口塞矣不修時家馬頭今河流旁決矣不疏清口而黃水倒灌矣不築髙堰不塞塘梗六壩而淮水東下邵伯髙寶一帶隄岸潰決矣河壞已極糧艘難進糜費帑金無算毫無著落是徐廷璽在河工多年不曉河務明矣徐廷璽之不能清理錢糧抑又明矣豈可姑留河工令再貽誤伏乞皇上乾斷將徐廷璽撤回别用如謂需人助理則見在之管河道廳等官皆堪量材指使者也一河工隨帶之人員宜撤也于成龍隨帶人員甚多在成龍初意原欲衆擎易舉協力相助詎意一到河工花費國帑鑽刺題官河工之壞亦由於此前經科臣汪煜條奏奉旨撤回成龍又以經手工程未完錢糧未清為辭殊不知工程淹沒從何稽核錢糧耗用從何究追皆由瞻徇情面以致迄無成功應請敇該部仍遵前旨盡數撤回將未清錢糧交部照追可也一部臣之不宜掣肘也河工者司空之事河工成則司空之職舉是工部與河臣事關一體理宜同心共濟以期底績乃部臣每事掣肘估修奏銷任意混駁種種弊端難逃皇上洞鑒之中伏乞皇上敇諭部臣寬其文法責以成功庶精神得以專一而河務不致旁撓矣以上三條臣雖在工言工但據理直言必觸人忌臣受皇上特達之知超擢至此唯祈河工蚤成仰副皇上堯咨舜警之意臣雖受怨招謗亦所不恤也為此具奏謹奏請旨本月十四日奉旨該部議奏部議覆皆如所請奉旨依議又題為請旨事臣恭聞天語河工花費錢糧因你做官不要錢可以清理欽此臣思兩江總督惟潔已率屬有守足矣若夫河道潰壞之際總河之臣貴乎有守而尤貴乎有才然河臣有守必須屬員人人有守而後錢糧皆歸實用可杜冒破之弊河臣愧非長才必得有才之人同心協力贊勷河務庶幾可奏砥績之效謹就臣素所深知之人臚列姓名上達天聽見任陜西甘山道王謙才守超卓堪任河務請將王謙補授淮揚道則其守可以清理錢糧其才可以贊勷河務原任陜西咸寧縣知縣陳明綬居官廉潔百姓愛戴原任四川潼川知州劉可聘前任浙江泰順知縣係臣屬員臣見其操守謹飭才幹優長兩人俱因公革職廢棄可惜請取用河工以勵後效原任江蘇按察使趙世顯見任刑部員外丁易見任徐州知州孔育珣此三員俱臣江南屬員才守兼優辦事勤敏見任工部郎中王進楫見任浙江湖州府同知趙泰甡此二員俱臣浙江屬員操守謹飭才能辦事見任禮部員外蔣陳錫前任富平知縣士民稱其有守有才臣奉差陜西審事親聞最確候補守備紀之慧前任江西守備不扣兵餉則有守整飭營伍則有才會經軍政卓異以上人員祈皇上凖臣帶往河工效力其見任者仍照原銜食俸遇有相當員缺另疏題補以收臂指之用臣從仰體皇上軫念國計民生務求有益河工起見絶無情面私心伏乞皇上俞允施行等因本日奉旨此等人員俱依議帶去又面奉聖訓古人之法與今河勢不同其最緊者黃河何以使之深清水何以使之出爾詳加籌畫十七日又面奉聖訓將黃河曲處挑穵使直水流暢快則泥水不淤四月初四日尚書王鴻緒謹奏恭請皇上聖躬萬安臣恭誦聖諭云仍將交與董安國所挑引河再行挑濬使黃河循北岸而流清口作何疏濬方為有益又蒙聖諭云伊等意見又復如何之處速議具奏欽此除同尚書范承勳等公議具摺啓奏外臣謹再四循繹聖訓真洞達精微直抉黃淮強弱之機指示臣等雖大禹之神智無以過也兹仰體聖慮所及合諸今昔議論謹為我皇上陳之伏查河防一覽云歸仁堤所以捍禦黃水雎水湖水使不得直射泗州并攻髙堰又遏雎水湖水使之并入黃河益助衝刷關係最為重大等語自白洋河等處淤墊堤內之水不入黃河及由歸仁堤減壩泄入洪澤而洪澤為之加漲皇上洞鑒情形時令河臣挑河以引堤內之水入黃刷沙最為有益乃河臣久未興工因衆議以胡家溝一帶地方河身淤髙難以出水不若自胡家溝挑接以至清口清口黃流比白洋河等處約低丈餘可以𨗳之助清敵黃一面將歸仁堤減壩堵塞則洪澤湖亦不致增漲此説訪之新舊河員相同者頗多在臣之愚見以為不必直挑至清口止須挑至皇上所指挑水壩之上令其出黃直頂大溜今正當挑穵引河之時而又有南岸清水隨挑壩直射勢必益循北岸而流矣臣據所聞陳奏愚昧罔知可否聖明自有裁鑒惟仰冀慈看謹奏奉旨這摺子交與工部行文河道總督張鵬翮如照王鴻緒所奏開得即行速開二十三日張鵬翮題看得部臣王鴻緒奏摺內稱歸仁堤挑河以引堤內之水自胡家溝接挑至皇上所指挑水壩之上令其出黃等語其地形之髙下道里之逺近摺內未之及也臣率部員河官量度形勢至桃源縣鍋底湖鍋底者水入不能出之謂也相繼又有卜家湖誠恐引水至此合連湖水泛濫難禦桃源縣治有漂沒之患打量水平挑水壩黃河地形亦髙且道里有一百二十餘里之逺挑穵工程需用錢糧甚多如引水不出則屬無益且據道廳等官衆論僉同臣再三訪求出水之處不若自涵洞口起至老堤頭迤東挑穵引河出黃河乃為近便除臣已於欽奉上諭事案內另摺啓奏請旨外應將此處毋庸再議理合具題奉旨該部知道二十一日為題明盡拆攔黃壩以疏海口事臣維𨗳河入海順水之性古人治河之道也自原任河臣董安國等創築攔黃壩拂水之性以致黃水倒灌清口淤塞下流不通上流潰決淮揚常受水患勞費罔效以迄於今臣仰體皇上軫念國計民生至意履任之後即親勘河工於四月十八日過雲梯關到攔黃壩看得攔黃壩巍然如山中間一線涓涓細流下流不暢無怪乎上流之潰決也臣率領州縣各官於攔黃壩上流相度正黃河水面寬八十三丈餘則攔黃壩亦應照此丈尺拆挑一律寬深方足宣泄今查前河臣于成龍上年委郎中朱成格止拆壩一十七丈見今水出其中續經署總河印務臣徐廷璽委同知佟世祿等又拆壩二十八丈七尺估挑引河亦未挑成尚有攔黃壩並積土三十七丈三尺未拆且壩基髙昂終屬壅滯盡行拆去挑穵深通與正黃河八十三丈之水面相符亟堵馬家港於月內合龍使水勢不致旁泄盡由正河而行俟黃水大長時將新挑之河始行開放資其暢流之勢衝刷淤墊直達海口臣恐海口或有沙淤之處舟行一百一十五里於二十日至八灘之地直到海口一望東海汪洋無際此壩開拆深通則黃水入海自是暢達其閉髙堰疏清口於秋後水落可以次第舉行因關緊要工程趁伏秋水發急於興工臣一面動帑委原任知州劉可聘候選州同劉于沂督催承修官馮大奇王鎮王廷翰薑逢彩賈𢎞獻邵允貴劉長璉張其祉等作速儹工拆挑勒限完竣其所用錢糧核實估計另疏題報五月初八日奉旨九卿詹事科道會同速議具奏議覆奉旨依議五月十四日員外郎拖克拖和中書張古禮傳奉上諭康熙三十九年五月初六日大學士伊桑阿馬奇奉上諭員外郎拖克拖和中書張古禮著馳驛前往河道總督張鵬翮處將修過河工情形閲看伊等無有專責將工程令河道總督張鵬翮明白繕寫摺子交與伊等帶來啓奏總河張鵬翮為欽奉上諭事謹將應修工程一一為我皇上陳之一海口之運料河宜開也修工應用蘆葦柴草等項多産海濱黃河轉運維艱舊有運料小河一道自清江浦起至海口止年久淤塞今應加挑浚深通便於運料於河工大有禆益一六壩之宜閉也一髙堰滾水壩宜修也一武家墩至小黃莊石工宜加砌也一古溝至六壩石工宜修也以上四條俱入淮河一運河之宜挑深也一髙寶江都一帶西岸土石堤宜修也一髙郵城南之石壩宜修也以上三條俱入運河一歸仁堤臨河石工入淮河一運口以至濱海一帶兩岸堤工亟應加幫也攔黃壩已經拆去海口已經疏通馬家港已經堵塞時家馬頭飭令速堵完竣轉盼糧船過完運口築隄堵截使黃水盡皆下注入海涓滴不令旁溢正值伏汛屆期水勢必較往年甚大山清安東黃河兩岸堤工必須加幫髙厚以資捍禦但此堤工有前經動帑加幫者有撥捐工人員修築者俱未奏銷之後方行加幫恐致遲誤見在飭令該管道廳確查山清安三邑堤工原髙寬丈尺若干領帑幫過若干捐工幫過若干今仍令再幫髙寬若干一面查明造册具題一面發帑委員加幫庶不致貽誤一王家營引河宜挑也此河原令馮佑挑穵贖罪今已淤墊飭令馮佑作速挑穵深通凖其贖罪如不成河不凖贖罪一新改中河堤岸宜修也入運河一王家營減水壩之宜開也查前河臣靳輔於此修減水大壩以泄黃河漫溢之水以免王家營民房淹沒後經于成龍築堤堵塞遇黃河大漲漫溢之水無處宣泄淹沒王家營今臣親往查看居民咸請開壩泄水臣審度形勢應動帑酌開十餘丈兩頭下掃裹住泄黃漲漫溢之水由鹽河而出一桃源縣黃河南岸堤工宜加幫也臣親看近長湖一帶土堤長四千二百餘丈單薄不堪兩面受水在在堪虞應動帑加幫髙厚以資捍禦一駱馬湖口竹絡壩宜築也此口坐落宿遷縣黃河北岸與駱馬湖口正對原築有竹絡壩一座長五十五丈節宣黃湖大漲之水今看得黃河身髙自去嵗水漲漫缺二段共七丈黃水反流入駱馬湖口匯入中河亟宜堵築以禦黃水無致淤墊中河俟此口堵後使黃水不得內灌中河然後酌量將中河頭煞壩堵塞引駱馬湖水由舊中河進石閘入黃河助黃刷沙如遇黃水大漲恐其倒灌則閉閘以禦之伏秋二汛派該管縣丞胡徵堪住宿閘上不分晝夜風雨防守查此閘係原任知州李經邦承修因金門下窄上寬不能下板到底應飭令李經邦改修金門合式挑穵引河深通然後議堵中河引水入黃一王家堂之缺口宜加築也此工坐落雎寧縣黃河南岸地方臣親往驗看大溜頂衝最屬險要所修月堤浮沙堆築單薄不堪而舊缺口又與月堤逼近無庸另修應令該廳陳謙吉將月隄賠修髙厚作為正隄但該廳已經告病一時難以設措恐致誤工應動嵗修錢糧交與署事同知金玉衡作速儹工修築以禦伏汛用過錢糧仍令陳謙吉等照例追賠還項一徐州郭家觜之險工宜修也此工在黃河南岸逼近徐城對岸沙觜挺入河心二里許以致大溜直射郭家觜甚屬危險城池民生關係不小應將沙觜挑穵引河直出俟水勢大漲資其衝刷河嘴以殺大溜水勢郭家觜舊有石工至北門迤西而止每年釘樁下掃補救一時不能經久每年嵗修搶修糜費錢糧臣親往查看據耆民咸稱對岸石山采石甚易加砌石工庶可經久臣率河官量度自北門石工頭起至段家莊止長六百五十餘丈加砌石工與舊石工一律平整不惟可保城池且可省嵗修之費又蘇家山石觜挑出河心以致南岸韓家山一帶頂衝崩潰逼近徐城應自楊家樓起至段家莊月堤止築月隄長四百餘丈以作重門之障庶徐州城池得以保固無虞一黃運中三河堤岸有領帑興修者有捐工修築者多有未完即已完者單簿不堪見在飭其堅固修築勒限五月二十九日完工如敢抗違不完另行題參究追此等工程實屬不堪遇伏秋水漲有衝刷塌缷之處而承修人員多不在工看守行文往催緩不濟事應責令本管河官動帑搶護用過帑銀仍於承修人員名下追補一徐州邳州雎寧宿遷桃源清河山陽安東各州縣黃河險工逐一看明應照例動支嵗修錢糧進掃防護仍飭該管河官當伏秋二汛無分晝夜風雨畫地防守務期保固謹將應修工程繕寫摺子具奏伏乞皇上睿鑒施行五月二十五日奏六月初八日奉旨九卿詹事科道會同速議具奏議應均如所奏奉旨依議速行五月二十五日總河張鵬翮題為欽奉上諭事康熙三十九年五月十四日接奉上諭跪聆之下仰見我皇上至仁至聖無刻不以國計民生為念臣雖庸愚受兹督河重任適值河工潰敝之後敢不殫心竭力任勞任怨勉勵河員實心任事蚤圖安瀾以仰抒我皇上宵旰厪懷之意但從前之工程極敝目前之修理紛紜臣遍歷河干廣集衆思斟酌施工次第謹將見修工程一一為我皇上陳之一水以海為壑臣見攔黃壩巍然如山堵塞海口下流不暢隨委賢能官動帑盡行穵去挑浚河身寬濶深通曾經題明在案今盡行穵去開闊深通水流暢達沛然入海用過錢糧及請賜大通口佳名以埀永久建立海神廟以答神庥臣已另疏具題一馬家港係董安國誤開海口也今已堵塞完工曾經題報在案一時家馬頭決口坐落安東縣黃河北岸地方經董安國于成龍等任內兩次發帑十萬餘兩興工尚未堵塞臣已親臨工所嚴飭作速進掃勒限堵完該同知佟世祿任意遲延不完希圖冒帑已經題參一陶家莊引河坐落清河縣北岸地方今奉旨命部臣范承勳等挑浚並建對岸挑水壩見在修理未竣然必須上緊儹工蚤完俟水長便於開放以下十一條入淮運二河奉旨九卿詹事科道會同速議具奏議覆奉旨依議速行六月初四日總河張鵬翮摺奏河工潰敝之後修治之法必須帑金以辦工料如石與磚􅐨麻蘆葦樁木柴草須預發帑金於五六七八四箇月預行備齊俟秋盡水落并力興工臣采集衆議請先發帑金一百萬兩以備辦工料但物料必須船隻運送目今河海清晏地方無事先借京口崇明沙船共一百隻運料尚不敷用交與江蘇江西巡撫動正項錢糧遴委賢員照河工式樣共造船四百隻發於河官運料其蘆葦柴草産於海套官蕩由黃河逆流轉運甚屬艱難查有海口運料小河一道見今淤塞臣已委趙世顯估計工料另疏題請挑浚有禆河工清江浦五方雜處見有河工效力旗員每遇旗民爭競地方官不敢查問且無巡緝盜賊專員稽查巡夜無人料理河庫見貯錢糧關係重大擬將船政同知裁去改設理事同知一員揀選滿洲賢能官員補授以之審理旗民詞訟捕緝盜賊兼管船政仍屬總漕巡撫管轄與河工地方均有禆益奉旨工部議奏部議覆奉旨依議速行沙船見今差人前往察看俟到時將沙船借用之處再議具奏是月十七日總河張鵬翮為謹陳治河條例一堤工之宜堅築也取土有逺近故價值有多寡取土之逺者每土一方估銀二三錢不等取土之近者每土一方亦估銀一錢四五分不等逺土或取於百丈之外或取於里餘之外最近之土亦應離堤二十丈及十五丈之外此定例也今見現築各堤即於堤根取土且於近隄一帶先穵下一二尺並將周圍剷平以作假隄希圖虛冒錢糧又舊例每堆土六寸謂之一皮夯杵三遍以期堅實行硪一遍以期平整虛土一尺夯硪成隄僅有六七寸不等層層夯硪故堅固而經久雖雨淋衝刷不致有水溝浪窩汕損坍塌之虞今見各堤俱無夯杵止有石硪又自底至頂俱用虛土堆成唯將頂皮陡坦微硪一遍以飾外觀是以隄頂一經雨淋則水溝浪窩在在不堪堤底一經汕刷則坍塌捐壞崩潰繼之故年來糜費錢糧迄無成效自今以後加幫之隄俱將原堤重用夯杵密打數遍極其堅實而後於上再加新土創築之隄先將平地夯深數寸而後於上加土建築層層如式夯杵行硪務期堅固照依估定逺近土方取土加幫不許近堤取土亦不許穵傷民間墳墓該道廳督率該管員辨不時往來巡查如有近堤取土飾作假隄夯硪不堅挖傷墳墓者即將義民人夫先行懲處仍將承築官揭報以憑參究如不揭報經臣察出定將該道廳一併糾參一樁工之宜用整木也運河中河原因頂衝刷灣之處水勢湍急恐其汕刷工堤是以估用整木簽釘排樁估用整柴丁頭鑲壓以資捍禦今見兩河排樁俱係一木二截浮簽淺土所鑲柴束俱係一柴二截粉飾外觀及將舊隄老工穵鬆一遇雨淋水漲樁木欹斜脹折柴草隨水漂淌承築人員既圖短少物料侵帑以肥已該管廳員人冀呈報搶修膜視而不問河工竟成漏巵矣嗣後排樁工程購木到工該道廳先赴工圍驗是否與原估尺寸相符勒令承築人員樁用整木簽釘入地甚深掃用整柴鑲壓極其堅固如將木柴截用修築不堅旋修旋壞該道廳不時指名揭報以憑參究如或瞻徇容隱經臣察出即一併糾參該汛員辨咨斥究治一龍尾掃之宜停也臣遍查河工見工程堅固者首在石工次則密釘馬牙樁足資捍禦其頂衝大溜之處用丁頭掃密釘大木排樁深埋入土亦屬有益至於平常工程槩用龍尾掃稀釘排樁淺埋浮土一遇風浪即行塌缷徒飾外觀虛糜帑金應行停止一石工之修砌宜得法也湖河堤岸原因長湖巨浪堤岸卑薄樁掃板工不足以資捍禦是以估砌石工以為經久之計故各估册內有馬牙梅花等樁有向裏丁頭等石有鐵錠鐵鋦汁米炭柴等料各匠夫役工食以及祭祀之類無一不備故小黃莊石工每丈估銀八十四兩之多若照數辦料依法修砌自能堅固永久安有旋砌旋倒之事臣遍閲湖河修砌石工之處不惟石塊碎小不足尺寸而且鏨鑿草率參差不平雖有石灰而不見過篩搗杵堆貯樁木率皆一木數截零星之甎不足原估尺寸三甎不能抵二甎之用鐵錠鐵鋦全未之見釘樁短小不足以擎數層巨石石塊碎小不足以符原估丈尺石灰米汁短少何以合甎石而聯成一片鐵錠鐵鋦全無何以扣石縫而使之合筍再加以減少匠工潦草修砌自必旋砌旋壞安能經久與其參究於已壞之後何如嚴督於修砌之前嗣後一切石工無論馬牙梅花等樁皆用整木深釘務期極其堅深無論面裏丁頭等石皆照原估置辦鏨鑿極其平整石灰須重篩篩過多用米汁調和搗杵極其膠黏滿灌而入使之無縫不到又用鐵錠鐵鋦聯絡上下合為一片凡有石工將興備料到工該道廳先驗料物次勘工程如或料物不堪短少灰米以及修砌草率有一於斯立即指名揭報以憑摘工參究若徇庇容隱經臣察出一併糾究該汛員辨咨斥究懲一掃工之宜核實也掃箇工程大工堵決之外嵗搶各工用掃最多柴草麻􅐨等料漕規久已核定無容更張而虛冒之弊全在工程以平報險用料以少報多本年修理次年估銷掃箇新陳相因其中易於牽混廳營通同朦蔽員辨承其意旨以險工為奇貨視工帑為固有虛開冒報遂成牢不可破之弊是以大工在在興舉而嵗搶錢糧有增無減業經諄諄告誠嗣後報險呈詳一到該道親行查勘果係險工即令動料搶修一面估計申報以憑稽查如係假捏即以謊報參處該道徇隱經臣親行查出一併題參一挑河之積弊宜除也挑濬工程無論大河引河舊例止挑河而不築隄者每土一方估用銀九分以挑河之土而復築成隄者每方估用銀一錢六分所估原有贏餘若照估挑穵自然河深隄堅無淤墊坍塌之患不謂分工人員領帑到手任意花銷河身微微挑挖不及原估十之三四堤用虛土堆成並不肯如式夯硪且將挑出之土堆於臨河堤上使堤岸髙聳以作假河之尺寸甚至工未及半帑金告匱自知虧空難掩故將臨水之處有意挖開引水入於河身報稱淹沒及至水退涸出報稱淤墊是以年來挑濬甚多成河甚少侵帑誤工莫此為甚嗣後挑河工程挑出之土盡堆於原估隄上層層夯硪成隄使之髙寬以資捍禦不許估計散土以滋堆髙假河之弊挖河人員務須照估挑挖寬深敢復蹈前轍花費錢糧潦草工程以及引水淹漫虛報淤墊者除挑過土方用過錢糧一槩不準銷算外仍以侵冒誤工參究一黃河淤墊之曲處宜取直也恭奉上諭將黃河曲處挑挖使直水流暢快則泥沙不淤仰見我皇上洞悉治河良法臣查閲河工見頂衝大溜之處對岸必有沙觜挺出此河曲之故也從此曲處挑挖引河以煞水勢則對岸險工可平誠如聖諭指示極其精當因詢河官何以不即遵行據稱挑挖引河需費錢糧甚多挖後引水大溜始能成河若逢緩水必至沙淤例應追賠是以人心懼縮不敢挑挖臣思河工虛應故事挑挖不如式者理應賠修若實心任事挑挖深寬偶致淤墊者此非人力之罪應請免其賠修庶幾人無畏縮我皇上挑直之上諭可以實見之奉行而河工有底績之期矣一河工用人宜立勸懲之法也治河濬築之功首在得人而人才必需鼓舞方能奮發勉勵以圖報效臣請河工官員有實心任事不避勞怨不侵帑金修防堅固者工成之日請優敘即用其怠玩推諉虛冒錢糧工程不堅固者一經題參請嚴加治罪將勸懲立而賢者知勉不肖者知懼河工之奏效不難也一夫役之宜優恤也河工興舉須用民力如挑河築隄雇夫動至數千曝日之下風雨之時手操畚鍤不敢自逸夜則露處沿堤捲席為棚以藏身雖有雇值帑金止可糊口工成之日照所給印票該地方官查驗免其雜項差徭以酬其勞則夫役益歡欣鼓舞而趨事恐後矣以上各條俱關治河要務伏候皇上聖裁允行敬請天語申飭勒石河工俾得永逺遵守有禆河道良非淺鮮奉旨覽奏條陳河工弊端詳悉切要極其周備著九卿詹事科道會同速行確議具奏議覆奉旨依議以上俱張文端治河書行水金鑑卷五十三
