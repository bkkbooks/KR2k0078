body:
  text: 行水金鑑卷五十四江南按察使𫝊澤洪撰河水七月二十五日大學士伊桑阿馬奇折本啓奏奉㫖見今遣人往張鵬翮處著將這次各省行取知縣職名鈔出問他此知縣內張鵬翮有曽經識認居官優為人好者著明白開寫摺子即付遣去筆帖式關住齎回啓奏又河水情形各處工程修理若何亦著明白開寫摺子並交與遣去筆帖式齎回啓奏總河張鵬翮摺奏黃河入秋以來水勢亦大臣於七月十九日至海濱六套一帶勘閲工程詢據土人僉云今年水勢甚大幸而大通口開通水流入海故隨長隨消不致泛溢唯徐州黃河水長城南石狗湖水勢亦長七月初八日將東門外石岸平蟄一段長十二丈內坍塌一段長七丈已經下掃防護無虞仍令原修官俟水落賠修其餘邳州宿遷桃源清河山陽安東等處黃河工程俱各保固平穩此目前水勢之情形也陶家莊引河部臣范承勳等原擬七月內完工因秋雨太大河身受有積水見在車戽挑挖王家營引河係奉旨令馮佑挑穵贖罪之工屢行嚴催據道㕔等官詳報馮佑違抗不挑應遵不成河不准贖罪之㫖將馮佑交與該道治罪另估挑穵雎寧黃河王家堂加幫月堤作正隄動帑修築據該管署事同知金玉衡呈報已完工九分見在勒催全完山清安東黃河兩岸隄工卑矮之處見在確估造冊加幫臣查勘河工至安東二塘汪家莊地方見署同知趙泰甡及守備姜逢彩住宿工所親儹加幫創隄保固險工實心任事海口攔黃壩盡行拆去見今黃水通流入海䝉欽定大通口佳名萬姓感悅時家馬頭工程已經具題動帑委令趙泰甡張士伸等辦料俟水落作速堵塞馬家港工程合龍之後西壩被大水漫開已經題報見在責令承修官馮大奇等購備料物俟水勢稍落速行賠修堵塞如敢遲延另疏題參大通口迤下濱海兩岸隄工委員傅澤洪等分段加幫見在儹修嚴催上緊修竣其海口運料小河桃源黃河兩岸隄工古溝至六壩石工髙郵城南滾水壩髙寶江都一帶土石堤工歸仁堤相度引河駱馬湖口竹絡壩王家營減水壩徐州郭家觜等處石工段家莊月堤嵇家閘缺口處處工程需帑興修户部所撥五十萬兩委不敷用見在分案估計請撥錢糧辦料興修臣謹具摺付筆帖式關住齎捧奏聞淮運兩河分見於後八月初一日總河張鵬翮題請見任浙江西安縣知縣陳鵬年候補內閣中書舍人張伯行等一十四人調往河工以便分派工程遇有相當員缺保題升補部議覆允行之十二月初二日題估挑穵引河看得黃河下流最窄之處無如安東便益門以及對岸韓家莊臣率同道㕔等官探量兩岸相距僅六十餘丈又兼時家馬頭至尹家莊河身太曲對岸沙洲逼溜直衝南岸韓家莊而韓家莊已下又突出沙觜逼溜直射北岸便益門且堤髙於城勢甚危險應將兩處沙洲於中開穿挑穵引河二道使黃流直下以固城池以保險工行據淮揚道參議王謙詳估黃河北岸沙洲自時家馬頭東對南岸引河尾新河頭起至便益門西河尾止估挑引河長五百四十丈應用土方銀二千一十四兩五錢又黃河南岸自黃家莊東對北岸引河尾止估挑引河長五百二十丈應用土方銀一千五百六十六兩二引河下脣又估下掃二箇應用掃料銀五十兩一錢二分連引河并掃箇共估土方工料銀三千六百三十兩六錢二分等因詳估前來臣查時家馬頭已經合龍淮黃已經交㑹二水合流來春自必增長急應乘時儹挑引河完竣俟桃汛水長開放使黃水直下得以暢流則尹韓二莊便益門三處險工可以稍平又可保安東城社民生除發帑委員乘此冬令水小儹挑速竣並將原冊送部查核外理合具疏題估奉旨這本內事情著照該督所題行該部知道是月二十日總河張鵬翮題為挑挖黃河灣曲引河事勘得徐屬之楊橫莊邳州之戚字堡桃源之談家口安東之汪家莊四處工程緊要急宜先挑引河部議奉旨依議速行聖祖仁皇帝康熙四十年三月十三日內閣中書殷德珠捧旨內開康熙四十年三月初五日張鵬翮題請河員應照臺灣例用賠修錢糧應豁免等因據九卿㑹議不凖行具題折奏奉旨這本收貯爾衙門著爾衙門能馳馬中書一員前往張鵬翮處張鵬翮悉知河務何處作為第一險要工程何處作為其次險工何處作為嵗修工程詳加分晰逐段開明再何處衝決應賠修何處衝決不應賠修之處一併定議具奏這本著差去中書帶來啓奏回奏江南徐屬㕔邳雎㕔宿虹㕔桃源㕔外河㕔山安㕔所管之黃河自碭山縣起至海口止頻年河身墊髙一遇水發驚濤澎湃湍悍難禦江南裏河㕔髙堰㕔山盱㕔所管之湖河自石勘起至髙家堰六壩止洪湖水勢洶湧一遇西風暴發巨浪如山處處堪虞裏河㕔所管運河自大墩起至淮關止面臨黃河背坐洪湖兩岸受險江南揚河㕔所管運河自寶應黃浦起至邵伯更樓止襟帶三湖若遇大水湖河相連關係運道江南安清中河㕔宿桃中河㕔所管運河自古城起至仲莊閘止逼近黃河土係虛沙且孫家集迤下于成龍創築子堤河身窄狹束水太緊因係已成之土不便廢棄以上俱屬第一險要工程其裏河㕔所管運河自淮安起至涇河止揚河㕔江防㕔所管運河自灣頭起至瓜洲止宿桃中河㕔所管中河自劉老澗起至張家莊止宿虹㕔所管運河自支河口起窑灣迤南止邳睢㕔所管運河自窑灣迤北起至猫兒窩迤北止以上俱屬其次險工江南險要工程每年必須修理者名為嵗修工程如徐屬㕔之郭家嘴楊家窪楊家莊小店長樊大壩狼矢溝吳家莊谷家莊等處邳睢㕔之羊山寺董家堂戚字堡三官廟戴家樓王家堂等處宿虹㕔之蔡家樓彭家堡朱家莊大古城陳家道口等處宿桃中河㕔之劉老澗上灣兜桃源㕔之烟墩上渡口龍窩九里岡三岔七里溝雞觜壩談家莊等處外河㕔之湯董莊大茭陵韓家莊尹家莊柴市大車路口朱家溝新港童家營胡家莊御橛挑水壩等處山安㕔之便益門鄭家馬頭時家馬頭等處江南黃運中三河及臨湖工程有頂衝掃灣及風暴打壞浪窩之處隨時補救名為搶修工程更有河性靡常倏爾變遷恐掃工不足捍禦或築越堤或幫裏創或加幫髙厚或挑引河或釘排樁或修石工或建閘壩名為大修工程總之水勢無定目前形勢如此將來或次險變為險要或險要變為次險亦未可定惟在因時制宜難以逆料若得實心任事之人不恤嫌怨不辭勞苦不避風雨相機修防或事出意外非由人力所致者無論限內限外情實可原案查康熙二十三年十二月初一日奉旨徐州長樊大壩等處雖經衝決河流未徙該管各官革職賠修俱著寬免欽遵在案嗣後第一險要工程應遵㫖免其賠修其次險工限外疏虞者照例不賠修若限內疏虞者仍應賠修如此則賢者知所奮勵不肖者知所戒勉咸思保固工程不致虛糜帑金有禆河道匪淺鮮矣今三月初四日髙家堰風暴大作臣親率河官搶修險工濤聲如雷巨浪濺衣身歷不測之地設有不虞身命介於俄頃河官之勞苦臣所目擊據九卿云臺灣地處海島涉歷風濤故三年即升黃運兩河非臺灣可比等語殊不知臺灣官員只赴任與去任時兩涉風濤耳河官每年桃伏秋三汛搶修防守常歷風濤之中較安居衙署者迥乎不同又云挑河修隄係河官專責而臺灣之受祿赴官者獨非職任所在乎且臣閲邸鈔吏部議覆直隸撫臣李光地題補子牙河主簿楊芳一疏如三年果能稱職照清河之例即行升用等語此又有例可援者也蓋鼓勵勞員正欲保固河工節省帑金永保安瀾之績以仰副皇上宵旰厪懷河工至意況臣行年五十三嵗形神疲憊鬚髮蒼白三年為期甚遙保題河官之時能保臣之尚在河工乎此亦可以白臣心之無私矣至於直隸除永定河外其餘工程及山東河南河官所管工程次於江南應仍照見行例行黃淮交㑹河工埀成仰荷我皇上聖明獨斷睿慮精詳乃克有此臣謹遵旨敬陳末議伏乞皇上乾斷施行是月十七日部覆河南巡撫徐潮題為題明事一疏奉㫖該部知道臣等議得先經臺臣李原吕條奏疏稱自戴家樓起至儀封交界止隄工三十里計長五千餘丈係河南考城縣地方康熙二十五年歸併曹縣修理請將此三十里堤工仍歸河南考城縣官民修築等因經臣部覆令總河等㑹同河南山東巡撫等定議具題等因奉㫖這事情著河南巡撫山東巡撫委官㑹勘定議具奏今據河南巡撫徐潮㑹同山東巡撫王國昌疏稱據河南管河道李言署山東濟寧道事兖州府運河同知羅景㑹勘定議前來查此工乃前任河臣靳輔奉皇上面諭親看全河形勢以河南考城縣北岸堤工五千餘丈界連山東曹縣境內所衛者係曹縣之地換歸曹縣就近修防歷今十有餘年深有益於運道民生應仍遵照題定改換之成規但查曹邑換歸堤工考邑已協夫五十名兹再議於南北兩岸各縣鄉堡夫內抽撥夫四十名共工食銀一百四十四兩同協夫銀一百八十兩共銀三百二十四兩移解曹縣雇夫取具曹縣印領報銷等因前來應均如該撫等所題可也奉㫖依議四月初四日內閣中書殷德珠捧㫖內開康熙四十年三月二十六日大學士伊桑阿馬奇王熙吳琠熊賜履張英學士法良辛保希福納傅紳范承烈王九齡曹鑑倫等以九卿議覆河道總督張鵬翮題為河員應照臺灣之例叙用及懇免賠修錢糧等事毋庸議並分晰險要嵗修工程摺子奏請奉㫖據張鵬翮疏稱黃河自碭山縣起至海口止湖河自石磡起至髙堰六壩止運河自大墩起至淮關止自寶應起至更樓止自古城起至仲莊閘止俱屬第一險要工程運河自淮安起至涇河止自灣頭起至瓜洲止自支河口起至猫兒窩迤北止中河自劉老澗起至張家莊止俱屬其次險工等語但水性靡常倏爾變遷嵗修工程或變為險要險工淤塞即變為嵗修督理此等工程各官內亦有實心效力奉行者然不無隨衆塞責之員豈可俱照臺灣之例一體叙用又疏稱九卿但知臺灣官員赴任去任俱有冒涉風濤之險殊不知風濤之險河員不時冒涉等語其臺灣官員定有歷俸三年即行升遷之例本意迥殊並非僅為越海冒涉風濤起見張鵬翮未悉此意這事情前著九卿題覆㑹議准行與九卿無涉朕以事關更改條例難以遽為准行故遣人詢問此情節張鵬翮未嘗不知且河員見今俱係保題從優補授若將河員照臺灣之例叙用必致更改條例如此更改則吏兵工三部條例俱致更改矣今將河員若照臺灣之例叙用或仍補授河工員缺乎或升補他省員缺乎若升補他省則河工歷練之員同時升去獨剩新任之員有無禆益河工之處未經議及即今河員已經歷任二載其限三年自任事之日扣算或自今嵗明嵗扣算又疏稱伊行年五十三嵗再過三載能保尚在河工等語如此則張鵬翮後接任河臣焉知從前官員賢否乃欲將河員遽為升用此等情由並未聲明行令張鵬翮將三部條例逐一再行詳查確議具奏仍著原遣中書前去將九卿議覆准行稿鈔寫給前往中書齎去與張鵬翮看回奏切念河工潰敝之後荷䝉我皇上指授治河方略明晰精詳乃致黃河漸次刷深中運二河深通糧船遄行六壩全閉淮黃交㑹黃童白叟皆感頌我皇上如天之仁微臣受聖主知遇深恩慚無報稱竊喜河工垂成鼓勵勞員盡心河務故援三年即升之例上請兹伏讀聖諭仰見我皇上至聖至明洞鑒深逺微臣愚陋見不及此河員若照臺灣之例敘用誠如聖諭非僅為風濤起見又必致更改條例如歷練之員或同時升補他省誠恐新任之員未必盡諳河務倘䝉俯允定例之後扣算三年為期甚遙其中並無過愆合例之人亦難多得且將來接任河臣未必盡知從前官員之賢否似應將照臺灣三年即升之例照九卿毋庸議其河員之中有實心效力奉行者容臣於河工告成之日照例具題請敘如怠廢河務侵冒錢糧者不時糾參總之微臣受恩最深凡有關河工之事雖一得之愚冒昧陳請可否伏候聖裁恭遇我皇上聖明在上恩同天地明並日月不加譴責容臣再行詳議具奏不勝感激涕零臣謹具摺付中書殷德珠齎捧謹奏請旨七月三十日總河張鵬翮題報開放陶莊引河日期九月初一日奉旨張鵬翮奏稱開陶莊引河黃河水向北岸流去等語若黃河水向北岸流離清口甚逺乘此時自范承勳等所築挑水壩起寬長加築隄岸過清口將黃河清口之水儘向下流再合為一處則黃河之水可永無倒灌之虞朕先曽面敕過于成龍今在河官員亦有知者著張鵬翮將此事問知道的官員詳明定議其修堤所需錢糧即為估計所修之處著畫圖速行具奏此事甚為緊要不得輕忽該部知道九月二十三日總河張鵬翮題凖部咨到臣敬誦天語仰見我皇上至仁如天大智若神治河方略睿照於事前應驗於事後指示周詳平成永賴誠超越萬世之聖謨也臣自工所星馳至清口齊集衆河官詢問曾知此事之員止據原任同知常維禎筆帖式馬泰回稱曾聞得前任總河于成龍云奉旨接長挑水壩過清口使黃水不得倒灌但我等未聞其詳等語臣謹遵聖謨指示自范承勳所築挑水壩起加築堤工至清口西壩長四百八十丈五尺頂寬六丈底寬十丈再查西壩見長二十丈今再接長五丈新舊合長二十五丈俾清口黃河之水向北下流過惠濟祠後合為一處益加暢沛黃水可永無倒灌之虞十月初六日奉㫖九卿詹事科道㑹同速議具奏議覆奉㫖依議速行十一月二十六日總河張鵬翮謹題為河工仰賴聖謨底績有慶恭祈聖駕親幸閲視指授善後方略以永保平成事伏惟我皇上至仁如天大智若神勵精圖治中外晏安獨有河工一事尚厪聖懷宵旰憂勤親臨閲視洞悉原委區畫精詳畀臣督河重寄臣本庸愚未諳河務凡治河事宜一一仰遵聖訓夙夜兢惕恆以弗獲欽承聖訓是慮䝉我皇上指授疏通海口乃得水有歸路黃河刷深指授堅築髙堰并廣闢清口乃得引淮水暢流而出指授築歸仁堤導泗州上源之水入於河指授疏人字芒稻等河引運河之水注之江指授築挑水壩疏陶莊引河逼黃水而暢清流使永無倒灌之虞指授挑蝦鬚等河引下河積水入於海其餘各處工程指授周悉莫能殫述今黃運兩河水循故道漕運利涉民田樹藝淮揚蒼生黃童白叟咸頌皇上天授神智峻德豐功亘古莫比其盛但河工甫得就緒保固更為緊要其間尚有應修之處與善後之計微臣學識淺陋罔知所措日夕兢兢恭祈聖駕於來春二月桃汛未發之前親臨河工再賜指授應修工程與善後方略俾臣知所遵循始終仰賴聖訓永保安瀾克奏平成之績且東南臣民深受皇恩戀主之心實為誠切顒望翠華臨幸亦得慰瞻天仰聖之忱矣奉㫖這所奏知道了該部知道十二月二十日為題明事看得山陽縣黃河南岸運料河原任河臣董安國在於遵㫖具奏事案內題准動帑挑穵未竣旋被童營漫缺淤墊經署理總河印務原任府尹徐廷璽題參撥給捐工人員挑築亦未完工臣查明具題催追在案臣往來看工相度形勢查運料河頭起於檀度寺閘久已築壩堵閉詢問其故據土人云運河髙於運料河數尺恐其開放建瓴之勢直泄無餘是以歷來堵閉臣測量水平果與土人之言無異夫既堵閉則此河為無源之水不能通濟下流亦難運料是此河已無益於運河矣且汰黃堤原為黃河南岸重門保障運料河身居汰黃縷堤二隄之中從前挑穵此河將草灣并小茭陵二處汰黃堤穿斷雖築有單壩難資捍禦是此河又有礙於堤工矣況歷來運料因此河未成係由黃河射陽湖轉運以濟工需是此河既不能分泄運河水勢反將有用之汰黃堤穵斷誠屬無益應停其挑穵將穿壞汰黃堤二處填築堅實以作黃河重門之保障固淮安地方大有禆益其各員應追銀兩追解河庫以備别工之用奉㫖該部議奏議覆奉㫖依議以上俱張文端治河書行水金鑑卷五十四
