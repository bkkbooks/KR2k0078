body:
  text: 行水金鑑巻五十五江南按察使傅澤洪撰河水聖祖仁皇帝康熙四十一年六月初三日大學士伊桑阿馬齊張玉書吳琠熊賜履學士來道常壽鐵圖紀爾塔渾王九齡曹鑑倫劉光美等奉上諭朕因永定河南岸不時衝坍特㫖令將南岸修築石隄看來甚有禆益今黄河南岸自徐州以下至於清口通行修築石堤可否永逺有益若果有益見在國帑不為缺少朕於錢糧一無所惜修築此堤應於何處採取石料作何轉運約幾年可以告成著張鵬翮齊集河員詳議具奏總河張鵬翮摺奏我皇上仁徳如天欲河定民安萬世永賴之盛心也臣以事闗重大隨調集衆河官詳議咸稱堤岸建修石工必得地基堅實釘樁砌石庶有捍禦之資若黄河水性無常遷徙靡定沙土虛鬆險工之處水深三四丈不等難以釘樁若另築越隄修砌石工而臨河險工每年嵗修仍不可廢恐致重費錢糧若棄險工而不修異漲之水勢若排山又恐石工有坍卸之虞即如髙堰土性堅實從前所修龍門大壩等石工尚有坍卸之虞況黄河鬆虛之地乎故黄河止有徐州之郭家觜清河之惠濟祠縁山根土岡量修石工其餘兩岸並未通行興修誠以土有虛實之不同也且委員查看黄河自河口至徐州南岸長六萬六千七百零一丈五尺約需銀一千二百七十八萬五千九百六十兩五錢零北岸除山岡不修隄外計長五萬四千三百九十八丈二尺約需銀九百九十九萬七百六十二兩五錢零工巨費繁曠日持久錢糧易致花費告成難以預料臣等愚昧所以未敢輕為擬議伏惟我皇上聖明天縱治河方略咸荷聖謨指授乃克底績臣等識見卑陋實無補於涓滴謹將黄河兩岸土性虛鬆遷徙靡常情由據實奏明其應否修砌石工之處伏候睿裁七月二十二日總河張鵬翮謹題為恭報㣲臣勘明黄運兩河水勢漸消隄防保固仰慰聖懷事竊照今年伏汛水勢大長甚久已於恭報伏汛水勢情形疏内題明在案詎意題報後水勢猶復浸長黄河兩隄之烟墩車路口韓家莊童家營鄭家馬頭二塘王家堂戚字堡狼矢溝雞觜壩顧家莊等處險工屢報危險又髙家堰湖水漸長於閏六月二十三日至七月十四等日常起西風大暴巨浪拍擊堤岸處處報險臣四下奔馳親督各汛官晝夜竭力搶救幸獲無恙但積水難消堤根浸虛風浪撞擊在在堪虞正在籌畫宣洩之際見惠濟祠下黄水漸落三四寸從北各汛亦報漸消據山安同知裘陳珮報稱閏六月二十六日大通口下二十餘里有西磡汛之臧家溝值黄水頂衝漫約開三百餘丈河流不移深省水勢分支由運料小河六十里直出海口分洩黄溜以致水勢漸消而各處險工得保無虞臣聞報遄往查看臧家溝以下俱係一片蘆蕩溢出之水由運料河至八灘㑹同正河入海查此處在大通口下原屬海濱曠衍無闗運道民生乃先年宣洩黄流入海之處原無堤工自前河臣靳輔因黄水未㑹故創築縷堤水大聴其漫溢水落仍復歸漕于工程絶無妨礙查舊案内靳輔曾云河道大壞之時非築堤不能束水河道俱已寛深此堤雖有坍卸亦屬無礙等語今淮黄㑹流通暢兼之今年水勢異漲大通口以下堤岸逼窄實難容納正可仍留此處口門宣洩異漲以保上源各處險工俟水落淤淺再行相度形勢或堵或留酌議奏聞臣勘馬家港口門漸淤全黄盡趨大通口寛闊深暢八灘以下海口積沙盡去極其深通復勘烟墩等工各官奮力搶䕶見在平穏運河工程亦俱保固平穏髙家堰六壩一帶工程遇有汕刷隨即修補平稳疏内題明宣洩異漲之鮑家營茒良口天然壩清水溝等口門俱可暫停開放其下河一帶稻禾成熟民居晏然臣所遍歴之處據土人咸稱今年水勢大過三十五年幸賴聖主軫念民生指授治河方略精詳周至以致河底深通堤岸堅固小民獲享盈寧感頌皇恩歡聲遍野除秋汛情形至期照例另疏題報外臣思我皇上仁徳如天無時不以河工為念所有目前㣲臣勘明水勢漸消隄防保固情形理合具疏報聞恭慰聖懷伏乙皇上睿鑒施行奉㫖該部知道九月初六日總河張鵬翮謹題為恭報秋汛水勢情形事該臣看得今年秋汛黄運湖河水勢情形據各㕔呈報黄河自徐州以至海口加長六尺四寸及三尺九寸不等然皆漸次消落兩岸嵗搶工程相機修防俱各平穏馬家港前此水深數丈今巳淤平黄水盡由大通口暢出海口極其深通其大通口迤下之臧家溝漫水今由髙門港口門歸入正河入海中河之水由鹽河及劉老澗減壩分洩淮揚運河之水由涇澗人字芒稻等河分洩各處工程俱已修防平穩歸仁堤工程亦俱防守平穏髙家堰及六壩工程遵㫖加謹保固畫地防守隨時搶修隄防俱保固平穏其髙承爵承修髙澗大壩未完工程見在嚴催修理如再遲延另疏題報天然二壩竟未開放扶淮水使强暢出清口以敵黄水大長之勢今伏秋二汛黄淮并漲大過三十五年之水賴有挑水壩加築寛長逼黄河大溜直趨陶莊引河循北岸而行引河首尾刷成大河故清水得以暢出黄水絶無倒灌之虞立大墩一望滿河皆屬清水惟見一線黄流河濱土著耆老歎以為從古未有今年入夏始而雨水連緜繼而水勢大長幸河道深通水由地中行即如髙寳興泰等處最稱窪下俱得田禾收穫民居晏安黄童白叟咸頌聖主盛徳豐功拯救數百萬生靈出昏墊而登樂土歡聲雷動徧於郊原此皆我皇上指畫精詳聖謨獨斷乃克臻此所有秋汛水勢情形理合具疏題報伏乞皇上睿鑒施行奉㫖覽奏挑水壩築成逼黄河大溜直趨陶莊引河循北岸而行黄水從大通口暢出海口極其深通淮水從清口暢流敵黄絶無黄水倒灌之患髙家堰堤工完固加謹防守經伏秋大漲俱獲平穏運河水由涇澗河人字芒稻等河分洩各處工程亦皆保固知道了該部知道是月十五日總河張鵬翮謹奏為仰賴聖謨河工底績恭請睿裁指示善後機宜事欽惟我皇上勵精圖治中外敉寧聖徳神功亘古莫並獨有河工一事每厪睿慮念國計民生攸係親臨閱視洞悉原委區畫精詳宸衷獨斷指授方略盡拆攔黄壩以通海口加築挑水壩開陶莊引河以𨗳黄汛北行加培髙堰堵築六壩以束淮敵黄挑張福口裴家場張家莊等引河以暢淮流修築歸仁堤引河閘座以節宣睢水加築黄河堤岸以固隄防堵邵伯更樓等口以利轉輸塞時家馬頭以杜黄水旁溢修理運河兩岸排樁濬深運河改修中河以利漕運疏人字芒稻河涇澗等河以洩運河異漲之水挑海溝蝦鬚等河以洩下河積水新建髙郵南闗車邏等處滾水壩以資蓄洩開王家營減壩挑鹽河以洩清黄異漲之水穵戚字堡等引河逢灣取直以分水勢一應𦂳要工程次第修理俱已完畢今嵗伏秋大水黄淮并漲逾月不消水勢大過三十五年依然隄防保固淮水敵黄海口通暢目今運道深通民田耕穫黄童白叟感戴天恩咸頌聖主天縱神智又不惜數百萬帑金治河底績拯救億萬生靈出昬墊而安樂土歡聲如雷洋溢郊原此皆我皇上睿慮周詳聖謨獨斷燭照於事前符驗於事後徳同天地功邁百王誠萬世永賴之偉績也㣲臣自慚學識淺陋前此治河工程皆荷皇上指示今工程修畢經過大水之後一切善後機宜伏乞皇上親臨指示不特㣲臣知所遵循即東南黎庶亦得遂瞻天仰聖之望矣臣謹具疏繪圖差淮徐道張弼同知李梅恭呈御覽伏候聖裁河圖總説欽惟我皇上徳侔天地澤被寰區武功著定文徳覃敷功化之隆亘古莫比其盛河工一事猶厪睿慮今仰賴聖謨平成底績方略周詳名言莫罄臣謹考黄河自崑崙歴雍豫兗徐至淮之清口㑹淮而入海淮瀆自洛及鳳歴盱泗至清口㑹黄而入海是清口為河道之關鍵也但黄勢怕强而淮勢怕弱必有以抑其强而扶其弱乃資其利自前河臣誤築攔黄壩而海口淤塞六壩潰決而淮水東注二瀆不交國計民生俱受其敝矣我皇上天縱神智軫念民生三巡河道洞悉形勢宸衷獨斷指畫精詳如拆攔黄壩以通海口築挑水壩濬陶莊引河以疏黄流開張福口裴家場等河以導淮水加培髙堰堅築六壩以束淮敵黄而淮黄交㑹矣濬運河增漕堤而運道安開人字芒稻等河引水注之江濬涇澗海溝蝦鬚等河引水注之海而下河治其他疏築工程具有成效而最要者在清口大闢黄淮交㑹雖遇伏秋異漲依然清淮透出逼黄逺避絶無倒灌順軌安流淮揚一帶黄童白叟歡欣歌舞感頌皇仁謂為數十年來所未有皆我皇上睿謨深逺聖慮精㣲臣愚唯有潔已奉公殫力河干以凜遵成算而已兹值工完理合繪圖恭呈御覽兵部尚書兼都察院右都御史總督河道提督軍務臣張鵬翮恭進十月初五日奉旨已有諭旨了該部知道繪圖并發是月十六日總河張鵬翮謹題為據呈代題恭請聖駕來春蚤臨河工以慰臣民顒望事據文華殿大學士兼禮部尚書致仕張英原任福建巡撫宫夢仁日講官起居注翰林院侍讀學士史䕫翰林院編修吳世燾翰林院庶吉士劉師恕原任右春坊右諭徳兼翰林院修撰楊大鶴翰林院庶吉士周彝翰林院編修顧圖河翰林院庶吉士徐昂發候補僉事道程兆麟原任吏部文選清吏司郎中劉始恢原任山東提學道劉謙吉原任山東提學道陸鳴珂原任陜西提學道陸徳元原任湖廣提學道岳宏譽原任福建提學道史陸輿原任福建提學道汪薇候補主事李淯仁候補刑部主事程兆彪原任工部屯田司主事劉愈原任福建延平府知府張楷原任浙江麗水縣知縣賈其音原任浙江台州府同知連璧原任内閣中書舍人李時震原任直隷故城縣知縣許國璠原任浙江嘉興縣知縣許肇起原任直𨽻贊皇縣知縣成永健原任廣東英徳縣知縣劉洛中原任河南夏邑縣知縣張豹進士杜光先史泓許迎年舉人髙天驥喬崇烈邱聞衣王式丹賈良璧賈珩賈邦楨張默王蕙成申朱纘喬兆棟喬儆王爵王懋訥李同聲劉肇鋏張翥髙克騫周憲沈儼生員張千來張湛蔡公錫蔡日芝等呈為恭請聖駕臨視河工以慰臣民顒望事我皇上堯仁溥被禹智旁周文徳武功亘天彌地含生負氣食福飲醇惟兹淮揚一路頻罹水沴上厪聖懷法駕三臨指授方略不惜萬億帑金拯此一方民命諸如建挑水壩開陶莊引河使黄流不致倒灌闢清口拆攔黄舊壩使二瀆得以歸墟上河治則下河自治黄如隄障洪湖清流出則濁流自通惟在堅閉六壩濬人字芒稻等河以疏入江之路塞邵伯更樓諸口以收轉漕之功大挑運河去二十年之淤墊堅築歸仁灑數百里之漫流下及涇澗蝦鬚諸河無不通利商民兩便田廬俱復桑麻被野童叟歡呼此皆我皇上愛民之周憂民之切心叅造化手畫平成之所致也昨䝉具疏恭請聖駕閱視河工指授善後方略英等不勝懽欣迎至宿遷見所在紳衿百姓無不踴躍欣感翹首雲霄伏聞聖駕未即臨幸老幼提攜叩顙瞻天忱悃殷切懇乞代為題達恭請聖駕來春蚤臨河工以慰輿情瞻仰蟲魚草木待鑾輅以春囘父老人民覩翠華而雷動等情又據淮揚二府各州縣士民陸權韓文挺于廷諫張國瑞張敬李自明韓邦佐李長年楊天培楊起先余仲林余祥白華徐子觀金朝興殷士貴葉起管章張東曉等公具呈為聖恩𢎞敷萬民感謝懇賜代題請駕南幸以慰輿情事切惟黄淮二瀆自古為患數年以來疊被水災幸䝉我皇上德邁唐堯功髙神禹軫念民生頻蠲租賦三次親閱河工指授方略不惜數百萬帑金堅堵六壩大闢清口束淮刷黄海口深通河流順軌水不旁溢歴來沉沒之田盡獲耕種巨浸澤國一旦變為膏腴萬姓樂業永奏平成今䝉恭請聖駕親臨閱視再授善後方略民生慶幸市野歡騰兹聞聖駕未即臨幸環謝下情未能上達瞻天仰聖之心翹望愈切為此䖍叩軫念輿情准賜題請恭迎聖駕蚤幸江南以遂萬民欣覩天顔之願等情又據河工効力内閣學士兼禮部侍郎張榕端翰林院侍講張希良翰林院侍讀學士史䕫候補左春坊左諭徳鄭開極原任詹事府少詹事邵逺平候補僉事道程兆麟原任貴州布政司王毓賢原任山東提學道劉謙吉原任湖廣岳常道姚淳燾原任山東提學道陸鳴珂原任陜西提學道陸徳元原任湖廣提學道岳宏譽原任福建提學道史陸輿原任福建提學道汪薇工部屯田司郎中丁易原任員外達古禮工部郎中王進楫工部員外王登魁候補刑部主事程兆彪候補中書科中書張伯行候補内閣中書楊守知候補内閣中書楊穆候補知府李雯候補知府傅澤洪原任同知夏宗堯原任同知連璧等恭請聖駕閱視河工懇賜代題以慰臣工瞻仰事欽惟我皇上徳邁唐堯功髙神禹念淮揚二郡頻罹水患不辭勞苦三次親臨河工相度情形指授方略不惜帑金數千百萬拯此一方之民建挑水壩開陶莊引河闢清口疏海口閉六壩培髙堰挑運河築歸仁堤浚人字芒稻等河國計民生萬世永賴皆係睿筭所周亘古軼今史冊罕覯向䝉恭請聖駕親臨閱視指授善後事宜江淮之間歡聲雷動至榕端等望日瞻雲尤為迫切不啻百谷之仰膏雨草木之被陽春兹聞聖駕未即臨幸瞻望㣲忱未能上達為此懇代題恭請鑾輿於春陽和煦之時蚤臨河工以慰瞻天仰聖之意各等情到臣據此該臣等㑹看得據江南鄉紳致仕大學士張英等士民陸權韓文挺等効力河工官員張榕端等呈稱我皇上堯仁溥被禹智旁周文徳武功亘天彌地含生負氣食福飲醇惟兹淮揚一路頻罹水沴上厪聖懷法駕三臨指授方略不惜萬億帑金拯此一方民命諸如建挑水壩開陶莊引河使黄流不致倒灌闢清口拆攔黄舊壩使二瀆得以歸墟上河治則下河自治莫如隄障洪湖清流出則黄流自通惟在堅閉六壩浚人字芒稻等河以疏八江之路塞邵伯更樓諸口以收轉漕之功大挑運河去二十年之淤墊堅築歸仁灑數百里之漫流下及涇澗蝦鬚諸河無不通利商民兩便田廬俱復桑麻被野童叟歡呼此皆我皇上愛民之周憂民之至心叅造化手畫成平之所致昨聞聖駕閱視河工再授善後方略臣民無不踴躍欣感翹首雲霄伏聞聖駕未即臨幸老幼提携叩顙瞻天忱悃殷切叩懇代為題達恭請聖駕來春蚤臨河工以慰輿情等因前來臣等見江南臣民感戴天恩顒望聖駕來春蚤臨河工共伸瞻覲之誠情詞懇切不敢壅於王聞謹㑹同江南江西總督臣阿山總漕臣桑格江寧巡撫臣宋犖安徽巡撫臣俞成龍具疏題達伏乞皇上睿鑒施行奉㫖知道了該部知道聖祖仁皇帝康熙四十二年二月初三日河道總督臣張鵬翮奉上諭看黄河磯觜壩太短不能逼溜今欲照永定河修長挑水壩回奏永定河與黄河水勢不同黄河萬里而來勢大水深磯觜加長一遇水長易致衝壞河官慮賠修之苦不敢接長又奉上諭將一兩處試作長挑水壩即有衝壞免其賠修又奉上諭烟墩甚險雖有越堤必須保守縷堤此挑水壩應行建築初四日辰時河道總督臣張鵬翮奉上諭桃源烟墩至龍窩一帶堤工卑矮應行加髙三月初三日河道總督臣張鵬翮奉上諭王家營對過鮑家營開引河洩黄漲之水以保障清江淮安地方著即開挑兩岸築堤以衛民田又奉上諭黄河逢灣取直開挑引河必須於對岸水淺之處築挑水壩逼溜入引河方為有益又奉上諭開減水壩須於水緩之處不可迎溜以防奪河初四日奉上諭半路劉河流埽時堤岸單薄應修挑水壩御製河臣箴舟中書賜河臣張鵬翮自古水患惟河為大治之有方民乃無害禹疏而九平成攸賴降及漢唐決復未艾漸徙而南宋元滋溢今河昔河議不可一昔止河防今兼漕法既弭其患復資其力矧此一方耕鑿失職澤國波臣痌瘝已極肩兹鉅任曷容怠佚毋俾金堤潰於蟻穴毋使田廬淪為蛟窟毋徒糜國帑而勢難終日毋虛動畚築而功鮮覆實務圖先事盡利𨗳䇿莫悔後時飭補苴術勿即私而背公勿辭勞而就逸惟潔清而自持兼集思而廣益則患無不除績可光冊示我河臣敬哉以朂十月初一日奉上諭諭吏工二部黄淮兩河闗係運道民生最為重要朕念治河國家大事夙夜厪懷未嘗少釋披圖咨衆雖已悉其源流顧水勢變遷不常必真知洞悉方可實見施行是以不憚勤勞屢親巡閱察其險易之形勢審其疏𨗳之機宜緩急次第具有成畫至於簡命河臣倚任甚切凡所屬官吏皆聽選用大修工程費以數百萬計嵗修帑金亦以數十萬計乃康熙三十七年黄淮並漲總河董安國不堅築隄堰疏通海口因而河身墊髙溢出河岸以致倒灌洪澤湖口湖水從六壩旁洩由運河入下河淹没民田於是罷董安國以于成龍代之朕隨授以治河方略詳加指示三十八年親往閱河駐蹕清口河干又面諭于成龍清口宜築挑水壩挑黄水使趨北岸方可免黄水倒灌之患隨指定其地再三申命于成龍不遵朕㫖致無成功及用張鵬翮為河道總督面諭云頃已發帑數百萬令大臣官員往髙堰築隄閉六壩使逼洪澤湖水暢出清口而清口築挑水壩尤為緊要此壩不築則黄水頂衝斷不能使向北岸湖水不得暢流張鵬翮遵朕言壩工築成黄溜遂直趨陶莊清水因以直出疊經伏秋大漲並無倒灌之事其浚張福口引河築歸仁隄疏人字芒稻涇澗等河開大通口皆遵朕㫖一一告竣今年春朕閱河至桃源見龍窩等處頂衝危險命増築挑水壩此壩工刻日訖事河勢遂平中河仲莊閘口以與清口相對特命改由楊家莊漕輓安流商民利濟曩時黄水泛漲或與岸平或漫溢四出今黄河深通河岸距水面丈餘縱遇大漲亦無可虞矣張鵬翮所修工程雖悉經朕裁斷而在河數載殫心宣力不辭艱瘁又清潔自持一應錢糧俱實用於河工無纎毫浮耗朕心深為喜悦所屬大小河員並皆勉力赴工共襄河務亦屬可嘉自總河以下各官爾二部即詳加議叙具奏特諭已上俱河防志其河防志即張文端公治河書也初不知改名故前後皆仍其舊十一月初六日總河張鵬翮奉上諭河南黄河係處上游宋元以來每煩修治爾將河南黄河兩岸勘閱有工程險要之處令修理堅固河南管河道治河檔案一烟墩險工於四十二年皇上親閱在於大王廟東指示建築挑水壩一座長十五丈三尺五寸寛五丈發帑遣分司齊蘇勒建築一龍窩張家莊險工四十二年皇上親閱指示建築挑水壩一座壩臺長二十七丈三尺壩身出水長十丈寛八丈發帑遣分司齊蘇勒建築一九里岡險工於四十二年皇上親閱在於大王廟東指示建築挑水壩一座長九丈八尺寛四丈發帑遣分司齊蘇勒建築一九里岡險工四十二年上南巡回鑾指示舊龍門處建壩二座内第一座長十四丈寛五丈第二座長十三丈寛五丈一半路劉險工四十二年皇上南巡在於上水頭頂衝處所指示建築挑水壩一座長五丈寛八丈上下雁翅各長八丈發帑建築淮徐道屬三㕔冊聖祖仁皇帝康熙四十四年四月十九日河南巡撫趙闕題為欽奉上諭事部議得囘囘寨與韓羅灣一帶乃祥符陳留蘭陽三縣連界地勢極為卑窪復有大堤一道並無重堤可恃即大堤之處卑矮單薄倘遇黄流暴發不足以資防禦今估築加幇接髙堤工長二千一百三丈連填墊河形共計土方夫工銀一萬三千三百四十六兩四錢並無浮冒等因應如所題速行幇築工完核減造冊題銷可也奉㫖依議河南管河道治河檔案聖祖仁皇帝康熙四十六年五月十五日上諭黄河兩岸工程河官修理的好伏汛水長再加謹防䕶惟河南黄河上游工程闗係最為緊要伏汛水長著加謹修防其黃堌壩工程更為緊要著差賢能官員前往防險相度形勢修建挑水壩挑溜開行時總河張鵬翮遵即動帑修建挑水壩一座并下䕶涯埽七十丈歴年委官駐防河南管河道治河檔案聖祖仁皇帝康熙四十八年二月三十日河南巡撫汪灝題為建壩已成等事部議得先經河道總督今陞户部尚書張鵬翮㑹同河南巡撫汪灝以河南黄河南岸黄堌壩係舊日險工居黄河上游闗係緊要奉上諭修建挑水壩一座挑溜開行又於上水埽灣處下䕶涯埽七十丈其黄堌壩險工既已剏建挑水壩應照江南嵗修例每年用料修防以垂永久令撫臣就近料理又據河南巡撫汪疏稱挑水壩工修建已竣第險要之處新建壩工及下過埽箇大溜衝刷誠恐桃伏秋三汛水發勢必蟄陷嵗修防䕶萬不容緩應如所題准其修理奉㫖依議河南管河道治河檔案挑水壩一座亦奉趙世顯又題請於挑水壩上再建㫖允行聖祖仁皇帝康熙五十年六月二十八日河南巡撫鹿祐題為新壩建築已成等事部議得先經河南巡撫鹿祐以馬家道口新建壩工正當舊壩上流先受頂衝之勢比舊壩更為緊要應照舊壩請給嵗修銀兩辦料修防等因臣部以黄河工程例有保守年限今前項工程甫經告竣未及一年何得遽請嵗修覆令該撫俟保守限滿具題到日再議今據該撫疏稱虞城縣馬家道口新建挑水壩係康熙四十九年六月内建築完工業已保固一年且新建之壩居大壩之上流先受頂衝之勢較之舊壩更為緊要若不照例嵗修一遇汛水漲發恐新壩蟄陷而大壩亦難保固嵗修防䕶誠不容緩請給嵗修銀兩辦料修防應如所題准其嵗修奉㫖依議康熙五十三年因河流北行壩前漲出淤灘巡撫李㑹題停修河南管河道治河檔案聖祖仁皇帝康熙五十九年十二月内淮揚道傅澤洪詳揭報料物本道屬各河㕔逺近不一其所運料物之虛實與做過工程之勤惰一時耳目不及周知是以飭令揭報便於臨工稽查舊例㕔官嵗搶修各工以及大工料物辦運到工該汛員弁查明各料觔重尺寸數目收貯各厰五日一次揭報本部院暨本道衙門存查開工之後每日將所下埽箇鑲填髙寛丈尺簽樁尺寸根數以及力作兵夫數目亦五日一次揭報院道聽候勘驗法良意美歴久遵行無異詎今日久法弛各汛員弁陽奉隂違有名為五日一揭或積至三五揭十餘揭一總彚報者有前後日期料物數目牽混不清故為朦混者有任意延捱竟不揭報者各工料物收支數目揭報既已不清及臨工勘驗勢必將無作有以少報多茫無頭緒從何稽查總縁積玩相沿以致良法雖存奉行不實除本道一面嚴飭遵行外相應詳請查照舊例通飭嗣後各㕔工料該汛員弁查明收支數目以及兵夫名數據實五日一次開揭呈報查考如敢仍前抗違牽混及彚揭總報者照溺職例詳揭咨斥如此則積習可除揭報不混料物清而稽查便有裨工程多矣嚼梅軒偶存聖祖仁皇帝康熙六十年正月日淮揚道傅澤洪詳請發帑淮揚所屬黄運湖河工程在在俱稱險要下闗民命上厪宸衷為各省漕運之咽喉作兩郡州邑之保障若不及早修防設有貽誤干係匪輕舊例每年霜降後即將明年各㕔嵗搶修各工應用料物准照今年用過料物多寡數目酌核預發料價飭令各㕔遵領乘此工務稍暇之時分頭購辦早運貯工以備明春開工應用如領帑不即辦料以致遲延誤工者查出嚴加叅處此真未雨綢繆有備無患之良法美意也自憲臺榮莅以來歴今十有餘年悉照舊例而行並無遲誤惟查今年批發六十年分預備料物銀兩按照上年所發之數有不及一半者有僅及三分之一者即使照數領出購辦已恐工用不敷乃無如河庫又槩以無銀我支為辭即間有找支者為數亦復無幾各㕔蒿目撫心束手無䇿坐虛寛閒辦料之日月徒多相與諉過之後辭本道即嚴加督催亦不能責各㕔以無米之炊也現䝉憲諭明嵗有欽差大人看工著各㕔將應修工程上緊料理本道有催督之責敢不凜遵但修工必先備料備料必先發帑帑不照例早發則料物何從購辦後即找支已誤時日責其依限運工修防無誤勢必不能本道目擊情形不敢緘默用敢詳請憲臺查照上年各㕔批發預備之數飭令具領速為給發使其及早辦運以濟工需以免坐誤如有帑銀領足並不辦料以及遲延誤工本道據實查揭仰請憲叅以儆怠玩再詳請發帑淮揚所屬黄運湖河各處隄岸工程最為險要攸闗國計民生向例各㕔嵗修搶修各工應用料物於每年霜降後即照本年用過料物數目酌核預發明年料價飭令各㕔遵領採辦貯工以備明春開工應用此歴來舊例遵循已久惟是今年批發六十年分預備料物銀兩按照上年所發之數或不及一半或止及三分之一各㕔遵批請領而河庫輒以無銀找攴為辭閒有找支其數亦復無幾以致各㕔束手無措勢必坐誤本道有催督之責難辭嚴譴用是憂心如焚已於本月十五日詳請憲臺未蒙批示頃接閱邸抄㑹清河一案查勘工程處分甚嚴同屬河工諒無岐視倘明年欽差大人來南看工設有貽誤干係甚鉅本道寢食靡寧不憚煩瑣用敢再籲憲臺迅賜查照往例將各㕔應領預備銀兩酌量再為批發給領俾得及早辦運既有以濟目前喫緊之工需又可以杜後來卸過之口舌若仍前因循在各㕔因河庫扣項繁雜無銀找支推諉延挨勢所不免萬一有誤工需則㑹清河之覆轍可鑒而上下考成均干未便至於各㕔領足帑銀並不辦料或辦料無多不足應用以致遲誤工程本道察實詳揭聽候憲叅以儆怠玩前詳已悉兹不復贅三詳請發帑河工修防料物為主年前預辦成例昭然查六十年分預備料物銀兩前經本道兩次詳請查照上年之例給發蒙批云云當即飭行各㕔遵照去後兹據各㕔呈稟有稱年内奉憲批發預備料物銀兩除河庫儘除扣項外所餘有二三百兩三四百兩不等者或稱盡數除扣無餘者或稱預備料物銀兩年内並未領發者或稱雖係署事並未經手預備料物銀兩者本道稔知河工重大兼之身任督催實難含糊責各㕔以無米之炊也惟山安一㕔領發較之別㕔頗覺不同即本道責之以速辦儹運事亦頗易然安得淮揚道屬盡如山安㕔者使本道得以督責之今裏河同知錢士鏞置預備料價於不詳不領矣署外河同知胡璉推卸修防工程於題補引見之王徳祚矣髙堰通判楊三炯安清通判孔傳煥揚河通判夏建鼎止就領發之數儘銀辦料矣山旴通判張杓年方少壯縁病請休置預備料價於不問矣江防同知或應署事之甘士調領辦或應復任之胡璉領辦時已入春尚無定局將來桃汛一臨各㕔有全不辦料者有雖辦料而不敷應用者倘遇暴風異漲勢必束手無措本道代人受過固所甘心然而國計民生闗係甚鉅杞人之憂不得不鰓鰓過慮也查五十九年分嵗搶修淮揚道屬如外河山安裏河江防等㕔估報銀五萬四萬兩上下不等揚河㕔估報銀二萬五六千兩山旴㕔估報銀一萬四五千兩髙堰安清等㕔亦估報銀九千一萬兩不等現䝉憲臺確核陸續具題是五十九年分各㕔所用料價業有成數今六十年分應發預備料物銀兩自應倣照給領飭令各㕔預為購備方免貽誤今查各㕔詳領之數無多除扣之項甚夥且不詳不領者又比比皆是是六十年分預備之事較之五十九年之例大相徑庭矣再查五十九年分河銀存庫等事案内䝉憲題請原疏内稱緊要工程臨時請撥遲緩莫及況六十年嵗搶修料物例於年前發帑預辦尤難遲緩查六十年嵗搶修料物銀三十萬兩以十五萬兩扣留鹽庫補還風浪殘缺等事案内借動銀兩以清款項以十五萬兩解交河庫俾帑項有備而工程得無貽誤等語是鹽庫借項業已扣還淮闗額徵仍屬全支以此現在之銀儘作六十年分預備料價及各案大工之用原自有餘今本道所屬之裏河㕔迎水庵等處大工及外河㕔王家莊大工銀兩雖䝉憲檄飭知批發而河庫究未全給其六十年分各㕔預備料物銀兩又概以河庫無銀為辭其中事宜各有司存原非本道職所應知更非本道職所宜言但工程闗係國計民生修防必須有備無患懇祈俯鑒愚忱恩賜查照上年成例將各㕔應發預備料物銀兩趁此初春之候再為飭發雖或不能悉如五十九年之數然多得一分之帑銀即多辦一分之物料早得一時之詳領即早濟一時之急需本道竭力督催各㕔竭力辦運若能不誤修防皆出自憲臺福庇矣四月日又詳請嚴飭備料河工修防料物為先必宜預儲於暇日乃可取給於臨時是以本道於上年嵗底暨本年春初疊次呈詳請照往例批發帑銀嚴飭各㕔預辦六十年料物以備修防之用業蒙憲批各屬應解河銀已經嚴檄催提仰候解到另行飭領該道仍轉飭各㕔將領過銀兩先行辦料運工修防毋得遲誤干咎當經遵行轉飭至再至三乃邇者桃汛已過伏秋瞬息即屆查各㕔所備嵗搶修料物有竟未到工者有到工寥寥無多者有竟未動工者有動工而僅以些㣲料物草草補苴者此皆各㕔狃安目前僥倖將來之故習耳曷思今春旱𤾉已久即伏秋霪潦之徵黄淮水勢目今微弱即伏秋盛長之兆盈虛倚伏夫豈待智者而後知邪茍不及今水勢未發之前嚴催運料急儹做工誠恐一入伏秋雨霪水漲當此時始言備料斷難取辦於崇朝當此時始言做工豈能施工於徒手臨事張皇必致貽誤則未雨綢繆之計不得不早為究圖者也除各㕔辦運到工料物以及做工動用料物數目本道按月造具清冊送憲核查外相應呈請憲臺俯念工需最重嚴飭各㕔將所有奉憲批發過嵗搶修料價銀兩急速購料運貯工所以資捍禦庶免臨時束手本道身在同舟豈敢坐為秦越之視不得已而大聲疾呼非以茍塞督催之責正求為河工收先事預防之效也伏祈俯賜嚴飭各㕔一體遵奉如有仍前觀望辦運不前者本道據實查揭仰請憲叅以警怠玩有禆河工洵非淺鮮矣嚼梅軒偶存行水金鑑巻五十五
