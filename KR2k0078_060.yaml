body:
  text: 行水金鑑卷六十江南按察使傅澤洪撰河水桃源縣薈蕞云桃源縣在淮安府西北一百六十里黃河在治北百十餘步由淮達海徐邳泗河之下流治西六十里有白洋河上通汴河下達黃河鎮東屬桃源鎮西屬宿遷有黃壩新河萬厯二十四年分黃導淮開挑自三義鎮上起由毛家溝等處達灌口下海黃河南岸上自宿遷縣交界白洋河起下至清河縣交界駱家營止計程八十八里北岸上自宿遷縣交界古城起下至清河縣交界駱家營止計程八十二里設有桃源河務同知管轄其汛四南岸曰煙墩汛龍窩汛北岸曰九里岡汛磯觜汛煙墩汛臨河堤上自宿遷縣交界白洋河鈔關口起下至舊縷堤止長一千四十一丈康熙十九年創築白洋河舊縷堤自宿遷縣界起至臨河堤頭止長七百六十丈康熙十七年築今廢自臨河堤頭起至煙墩舊險工東頭止縷堤長七千二百九丈六尺康熙十七年創築內四千四百二十六丈六尺三十六年加幫自半邊店起至熊家莊止縷堤長八百三十丈康熙四十年修築半邊店一名野飯店河防雜説云自宿遷以至白洋河四十里之間兩岸堤工離河俱不甚逺加以蕭家渡徐家灣楊家莊三大工掃臺緊貼河邊東水太急若下流再不稍為寬縱則必有疏失之虞是以白洋河迤下南岸堤工不築於近河而直興築於離河七八里之外也但築堤之處其地髙低不等內有謝家窪野飯店等窪區數十丈最危最險二十二年已經全釘排樁本年伏秋異漲賴此樁工護土不特堤無損傷而堤外窪灘俱淤髙三四五六尺不等業巳改險為平此又皆遙堤之功也煙墩歲修險工舊長二百五十八丈康熙四十一年東頭新生險工一百五丈此工近來對岸沙觜日長逼溜南射以致加險四十一年閏六月間大水暴至舊掃衝盡堤土坍卸亦幾無餘臣督率河員晝夜搶築不數日而創堤成以次下掃畢復幫築掃臺長三百六十丈又於對岸開引河長五百九十二丈以殺水勢又煙墩迤東舊有護城堤長五百七十丈今加幫髙厚又接築六百一丈共長一千一百七十一丈為煙墩之月堤以資防禦以上俱張文端治河書煙墩險工於康熙四十二年皇上親閲在於大王廟東指示建築挑水壩一座長十五丈三尺五寸寬五丈發帑遣官建築桃源廳治河事宜册龍窩汛自煙墩舊險工東頭起至駱家營清河縣交界止縷堤長七千七百四丈八尺康熙九年創築內自煙墩舊險工東頭起至髙家灣止三十八年加幫卑薄處自髙家灣起至駱家營止四十年加幫卑薄處張家莊歲修險工舊長四百三十丈康熙四十一年又新生險工五十四丈此工於三十五年七月間漫缺三百五十二丈是年堵塞四十一年閏六月間異漲之水復於張家莊之下顔家莊漫缺八十餘丈至十月間堵塞張文端治河書龍窩張家莊險工於康熙四十二年皇上親閲指示建築挑水壩一座壩臺長二十七丈三尺壩身出水長十丈寬八尺發帑遣官建築桃源廳治河事宜册張家莊北岸顧家灣引河長九百二十丈康熙四十年開穵談家莊歲修險工舊長二百七十丈康熙四十一年又新生險工五十丈康熙四十年置鐵犀一座以鎮水四十一年創築月隄長六百一十六丈又加幫掃工尾縷堤長一百二十丈九里岡汛自宿遷縣交界起至河北鎮止縷堤長八千一十二丈五尺康熙三十六年修築歲修險工長三百三十三丈三尺掃臺長三百二十八丈康熙三十八年加修張文端治河書九里岡險工於康熙四十二年皇上親閲在於大王廟東指示建築挑水壩一座長九丈八尺寬四丈發帑遣官建築又於四十四年聖駕南巡回鑾指示舊龍門處建壩二座第一座長十四丈寬五丈第二座長十三丈寬五丈桃源廳治河事宜册崔鎮石壩一座康熙三十二年閉塞徐升石壩一座康熙二十五年閉塞上渡口歲修險工長六十丈壩臺長二十八丈四尺康熙三十八年加修磯觜壩汛自河北鎮起至清河縣交界止縷堤長六千八百二十九丈一尺康熙三十六年修築內馬家莊一段長四百四十丈三十八年又加幫七里溝磯觜壩歲修險工長五十七丈支河石壩一座康熙三十二年閉塞新莊口排樁工長一百四十丈康熙二十七年建築三義石壩一座康熙三十二年閉塞三岔歲修險工舊長一百一十九丈康熙四十一年又新生險工長二十丈三岔險工壩臺長二十四丈康熙三十八年加修張文端治河書半路劉險工於康熙四十二年皇上南巡在於上水頭頂衝處指示建築挑水壩一座長五丈寬八丈上下雁翅各長八丈發帑建築桃源廳治河事宜册險靳文襄公治河書云桃源南岸大工三曰煙墩曰龍窩曰李家口北岸險工五曰九里岡曰上渡口曰七里溝雞觜壩曰新莊口曰三岔河防雜説云桃源縣南岸李家口一工向來溜走堤工祗因北岸七里溝新莊口楊家莊等工相繼潰決大溜北瀉是以不為修防今河歸故道此工險倍平時若挑引河一道并築挑水壩一座相機修守自可永保無虞矣清河縣薈蕞云清河縣在淮安府西五十里河去縣一里縣西三十里有三汊河口泗水至此分為大小二清河大清河經縣治東北入淮俗稱老黃河今湮其小清河於縣治西南入淮即今之清口也但舊以泗流清於淮故名清河至𢎞治初黃河從徐邳入本河而水愈濁遂為黃河矣黃河北岸上自桃源縣交界駱家營起下至山陽縣交界泗鋪溝止南岸上自桃源縣交界吳城薈蕞云吳城去清河縣治南三十里在大河之涯東西有二城相隔五里宋紹興三年罷楚州吳城縣為鎮自此城廢起下至山陽縣交界季家淺止山陽縣薈蕞云山陽縣即淮安府治東北至草灣黃河二十五里北至老壩口黃河三十餘里西北至清口六十里東至海口二百三十里黃河自汴至徐經邳宿桃源三義鎮入口由毛家溝抵清河縣後謂之大河口會淮流過漁溝達安東下雲梯關入海謂之老黃河明嘉靖初三義口塞南從清河縣前亦與淮合謂之小清口徑清江浦至草灣轉西南過淮安新城北達安東萬厯四年兵備副使舒應龍開草灣河成分為兩道各四十餘里復合過安東總下雲梯關入海十六年勘河給事中常居敬因淮侵陵寢抵于強黃而不能泄鋭意欲復老黃河故道知府張允濟力持不可乃止黃河南岸上自季家淺清河縣交界起下至海口止北岸上自泗鋪溝清河縣交界起至安東縣薈蕞云安東縣在淮安府東北九十里淮水在治南百餘步經雲梯關東北入海蓋自清口至此皆古淮水為黃河所奪也縣志過縣南東流五十里又東北過雲梯關折旋入海雲梯關在縣東北一百里又東北一百二十里為海岸墩臺又東北六十里為大海閻百詩先生曰雲梯關海口濶處幾十四五里或七八里安東而上大約二三里此即禹貢以來淮水入海之道也王宗沭曰海州東海口在州東一十五里黃淮之正流於此入海安東縣張綱海口在縣東北一百二十里黃淮之支流於此入海諸説不同未知孰是淮南水利考曰海道自兖而北以至於薊自揚而南以至於廣其海口內外皆有山有島唯淮口獨有沙潮落微露其形潮來則翻騰而上勢若排天也河防一覽云議者因海壅河髙致決隄四溢遂以浚海為上策不知漲沙當海口之中潮退則見潮長則沒無可施工之處縱乘潮退施工而一沒之後濁流淤泥隨復如故矣故海無可浚之理唯當導河以歸之海繕治河堤俾無旁決則合流勢勇沙隨水去海口自不虞淤若堤日繕而決日聞非痺薄不能支即迫近不能容與雜以浮沙而不能久耳誠多築縷隄以束之又為遙堤使水有所遊蕩築必以真土則復何患哉如上流聼其旁決下流復岐而分之水勢益分則其力益弱安能導積沙以達之海乎支河一開正河必塞近事良可鑒也交界顔家河止下又自安東縣交界雲梯關起至海口止安東縣上自北岸顔家河山陽縣交界起下至雲梯關山陽縣交界止三縣黃河南岸共計程二百六十餘里北岸共計程二百四十餘里分屬山清外河山安河務兩同知管轄山清外河同知所轄黃河北岸自駱家營起至泗鋪溝止南岸自吳城起至陳家社迤下止其汛五在北岸曰清河北岸汛在南岸曰清河南岸汛山陽外河汛山陽上河汛山陽下河汛清河北岸汛自駱家營桃源縣交界起至中河口西岸止縷堤長二千三百四十丈五尺自中河口東岸起至泗鋪溝山陽縣交界止縷堤長六千四百六十三丈一尺康熙三十八年修築三十九年加幫地勢窪下堤身卑薄處龍王廟黑魚汪一帶五百七十六丈及前工未竣王家營至泗鋪溝八百六十三丈五尺四十一年又加幫自護縣堤頭起至玉皇閣掃工止二百二十一丈五尺又玉皇閣險工卑薄處四百八十五丈石人溝歲修險工長五百丈玉皇閣歲修險工長六百九丈河防雜説云清河縣北岸玉皇閣一工緊貼縣治計長二百二十五丈二十二年大溜侵堤而河髙地窪危險非常雖嚴督下掃不時蟄陷此清河之第一險工也陶家莊堤外引河長七百八十丈康熙三十八年聖駕南巡親閲水勢恐黃流逼近清口淮水不得暢出詔開引河引黃北注乃屢穵屢澱至四十年臣復題請開穵寬深已經告成護縣堤在縣治後自娘娘廟起至龍王廟止長一千四十二丈八尺康熙二十六年前河臣靳輔開鑿中河築堤以護縣治四十一年陶莊引河告成水勢附近縣東縷堤恐致侵害創築撑隄於縣治東護縣堤之內自縷堤起至護縣堤止長二百八十四丈又加幫護縣堤於撑隄之外自撑堤頭起至縷堤止長一百九十丈以為縣治重門之障王家營迤西縷堤上舊有減水壩歷久圮廢康熙四十年重建土壩口寬三十丈壩內挑引河以泄黃水異漲由鹽河入海河防雜説云清河北岸西王家營大減水石壩一座泄水之地計長一百丈此係創建之功更當加築三合土并添建磯心以資啓閉又中減水壩寬十二丈六尺東減水壩寬十二丈六尺俱係創建之係尚須添置木枋清河南岸汛自吳城桃源縣交界起至張福口橫堤頭止縷堤長三千五百一十丈康熙三十八年修築未竟四十年重修張福口橫堤自縷堤起至清口西壩止長四百九十二丈康熙三十七年築清口兩岸東西兩壩俱三十七年建陳家莊東挑水新壩一座康熙三十八年聖駕南巡駐蹕於此相度河勢親定方所命築壩挑黃水北入陶莊引河不致逼向運口今土人俱稱御壩四十年建設雁翅一道又清口西壩亦添築雁翅又自挑水壩至西壩築順堤長四百八十丈五尺今河溜全趨北岸淮流暢出四十一年異漲之水清黃俱順軌而東絶無壅抑之虞矣自挑水壩尾起至縷堤止撑堤長三百四十六丈康熙四十一年創築自陳家莊至挑水壩順水小堰一道係民築清口東甘羅城隄自甘羅城西南角迤西裏河交界起至卞家汪工頭止長一百三十一丈舊樁掃工康熙三十八年修築內接卞家汪長五十五丈搶修薈蕞云甘羅城舊傳秦甘羅築徐節孝以為即淮陰故城水經注淮水東北經淮隂故城即此相近有韓信城即韓侯舊釣處也煙波渺然孤城西枕渡者從城隅接流而過片帆一葉捷如鳬蕩波中豪客騷人每多歌詠寰宇記云信封侯築五河防雜説云清河南岸草羅城樁掃工二百一十丈當黃淮交會之衝防守最宜嚴密卞家汪堤自甘羅城北起至天妃壩石工頭止長八十四丈舊搶修樁掃工今題準改建石工康熙四十年置鐵犀一座以鎮水以上俱張文端治河書康熙五十一年奉上諭今年清水小黃水大黃河大溜過西壩直向卞家汪激成回溜以致倒灌清口逮後清水暢出刷通清口船行無阻今欲於天妃壩以上卞家汪以下相度形勢倣照御壩規模建壩一座內蓄清水之勢外禦黃水回溜諭總河趙世顯勘明形勢酌妥即行具奏再將陶莊引河疏濬深通務必導流仍由北岸而行清口自無倒灌之虞遂遵旨估計題請發帑在於卞家汪建壩一座挑溜仍由北岸至陶莊引河遵奉皇上指示再加疏浚亦估計加挑寬深黃流暢行現今成河外河廳河工事宜册天妃壩石工三百四十七丈康熙二十九年建砌三十一年添設雞觜壩一座長十丈搶修河防雜説云清河南岸天妃壩磚石工三百三十餘丈此工當黃淮交會之下內運外黃最為險要厯年既久工程不堪每逢大漲則黃水漫過每漫磚石之上所賴迤裡尾土必須加髙數尺捲掃擋溜以為經久之計也惠濟祠後舊掃工自天妃壩尾起至龎家灣止長一百六十二丈康熙三十九年題準改建石工張文端治河書康熙三十八年十月內前部院于疏稱清河縣惠濟祠後一工乃黃淮交匯掃灣之處一線孤堤每遇風浪撞擊危險堪虞奉上諭將惠濟祠後題請改建石工又康熙四十四年四月內恭逢皇上南巡指授方略於惠濟祠前後建築挑水壩二座并卞家汪舊挑水壩亦加寬厚前河院張題請發帑建築挑溜開行以保運道外河廳河工事宜册自龎家灣起至季家淺山陽縣界止縷堤長四百六丈五尺康熙三十八年修築山陽外河汛自季家淺起至三岔止縷堤長一萬一百九十五丈康熙三十八年修築內自上張莊至三岔一千四百八丈四十年又加髙二尺王公堤石工靳文襄公治河書云此堤一線石工內捍運河外抵黃淮二瀆之衝為數百萬魚國儲咽喉地一有所失不特其上煙火萬家舉為鱉而自清江浦以至髙寶一帶遂無運道清水潭必至再決下河周圍千里必盡陸沈是時即更費數百萬金錢竭數年之民力恐未易竣然此一堤最難保護若開引河則地形未便非捐帑四五十萬不能唯有歲修石工排樁固址一有坍陷便行補葺而於上流層次築逼水壩二三重以護之一則溜以禦衝一則回湍以聚砂使其日漸壅墊若石工之外得淤灘二三十丈則堤址愈固永無衝決之虞矣自海神廟至老壩口長五百九十五丈明萬厯三年漕督王宗沐捐俸創築以禦河患民為立碑廟祀號曰王公堤歲久淤墊乃築外越堤長六百二十丈三十八年加幫護以樁掃張文端治河書石河防雜説云山陽縣黃河南岸乃清江浦王公堤工也計長五百九十五丈亦係內運外黃勢屬頂衝其險要情形更甚於天妃壩康熙十六年之前黃河淤髙堤外有沙灘數百丈不等附近居民蓋屋於沙灘之上者不可勝計且堤頂有僅露石一二層者有俱埋沒沙內者近年以來淮黃漸次歸還故道堤外沙灘盡行洗去前此居民築室之處水且深二三丈矣大溜直衝回漩漰湃年逺未修之工或裂或缷不時報險除十八二十一兩年修過之外其餘不堪舊工俱應通長加髙以禦異漲也上自王公堤石工東盡頭起下至雲梯關止二百里之間有老壩口湯董莊潘家窑髙家莊顔家河上張莊朱家觜真武廟周家渡唐家堡小莢陵大茭陵何家莊沈家圍馬邏左家口時家塢等各險工掃臺竟如林立皆緣河勢南行是以北岸河灘多係離堤甚逺而大溜屢屢南侵也然其間工程有大有小匆險匆不險總要隨機度勢加緊修防以衛民生運道耳康熙三十八年三月初三日聖駕南巡看閲黃河堤岸上諭王公堤甚屬險要務須加幫修築堅固遵即具題加幫又於康熙四十二年聖駕南巡上諭王公堤關係運道民生最為緊要堤岸單薄樁掃亦漸朽應再加幫河院張即估計題請發帑加幫又於康熙四十四年恭逢聖駕南巡上諭王公堤建築挑水壩一座河院張即估計題請發帑在於王公隄外建築挑水壩一座挑溜北向外河廳河工事宜册老壩口歲修險工長一百四十二丈小車路口歲修險工長六十丈大車路口歲修險工長二百五十丈兩車路口月堤長三百三十丈康熙三十七年創築朱家溝歲修險工長一百九十四丈洪福莊歲修險工康熙四十年長六十丈四十一年又新生三十二丈幫築裏創堤長二百丈以資防護自老壩口至洪福莊五險工相連康熙四十年置鐵犀工上以鎮水柴市歲修險工長一百九十三丈雞觜壩一座康熙二十八年築湯董莊歲修險工長二百四十二丈此兩險工相連上張莊歲修險工長五百一十九丈自車路口起至上河汛大茭陵止汰黃堤長一萬二千二百五十九丈八尺康熙三十八年修築山陽上河汛自三岔起至葉家營止縷堤長八千八百九十七丈三尺康熙三十八年修築未竟四十年加幫卑薄處長六千三百八十四丈一尺尹家莊歲修險工長二百七十丈韓家莊歲修險工長一百六十五丈此二工相連康熙四十一年築大月堤一道長八百八十丈又加幫韓莊掃臺長八十丈尹韓二工對岸引河長六百四十丈又韓莊東引河長五百二十丈一以分尹韓二工之水勢一以分安東便益門之水勢俱康熙四十年開穵新港歲修險工長一百五十丈周家渡歲修險工長二百四十丈唐家堡歲修險工長六百六十七丈小茭陵歲修險工長一百四十四丈小茭陵格堤自縷堤起至汰黃堤止長一百八丈康熙三十六年創築何家莊歲修險工長九十丈大茭陵歲修險工長四百二十六丈以上五險工相連山陽下河汛自葉家營起至陳家社迤下山安交界止縷堤長一萬三千一十二丈康熙三十六年修築自上河汛土壩頭起至下河汛童家營止共長三千二百九十三丈又自馬家社起至時家塢流泉溝止長一千八百四十一丈俱康熙三十八年簽釘排樁胡家莊歲修險工長一百六十丈童家營歲修險工長一百七十八丈此工於康熙三十五年決口至三十六年堵閉大溜衝決於外積水蕩漾於內新堤單弱難恃康熙四十年建月堤一道長六百七十丈於對岸開引河一道長六百二十丈又堤內下掃壓土幫創以資捍禦左家口舊險工長一百二十丈今堤外沙淤停修薈蕞云靳文襄公治河書言山陽之險俱在南岸險工最多凡十有二曰王公堤曰老壩口曰草灣湯董莊曰顔家河上張莊曰真武廟曰周家渡曰唐家堡曰小茭陵曰何家莊曰大茭陵曰馬邏沈家圍曰羅家左家口二十里今較之張公所載者多寡又不同也自馬家社起至塗州馬頭止排樁工長一千八百四十一丈康熙三十八年修建北沙臨河堤民修陳家社迤下縷堤其下有泉水迸出屢築屢陷康熙四十年於隄外築兩小月隄以護陷處又築大月堤長四百八十丈護小月堤之外山安河務同知所轄黃河北岸自泗鋪溝起至海口六套止南岸自陳家社迤下山清外河交界起至海口陸家社止其汛五在北岸曰安東汛上河汛下河汛北岸汛在南岸曰南岸汛南岸自陸家社竈工尾至海計程五十四里北岸自六套堤尾至海計程六十九里安東汛自泗鋪溝山清外河交界起厯顔家河至安東縣東門止縷堤長九千一百四十一丈八尺康熙三十六年修築三十九年又加修邢家河險工長六百五十丈康熙四十年於掃牛之上加鑲丁柴髙四尺又壓土二尺以資捍禦鄭家馬頭歲修險工長一百三十五丈時家馬頭險工歲修新舊共長二百二十九丈八尺又搶修三十五丈此工於康熙三十六年漫缺周五十餘里民田廬墓盡沒水中至三十九年堵塞四十年又築磯觜壩一座便益門歲修險工長三百一十八丈康熙四十年置鐵犀工上以鎮之南東兩門歲修險工共長二百五十丈安東一邑頻遭水患康熙四年河決茆良口又小決口數處漂溺廬舍人畜無算九年九月二十六日風雨大作城闕衝決城內水深數丈溺死男婦甚衆十年河決邢家河口二鋪口張駱二口至十七年堵塞邢家湖等決口在康熙十年今郡縣志載十五年者誤三十五年七月初二日中河水溢由便民塘入城本年居民自行堵塞三十六年六月初十日河決時家馬頭以致便民塘又開次年六月居民又自行堵塞前河臣以此非黃河堤岸故置弗理數年來城中積水地上行舟房屋坍塌人民遷徙至四十年臣設法開放涸出平陸民始復業西北郊外一帶汪洋今皆得而耕種矣上河汛自安東縣東門起至彭家灘止縷堤長八千九百三十三丈康熙三十六年修築三十九年加幫險要處汪家莊搶修險工長二百五丈康熙四十年建築磯觜壩一座長十二丈二塘搶修險工長四十丈汪莊二塘兩險工相連康熙三十九年水勢洶湧幾至漫溢至四十年汪莊西頭建築磯觜逼溜開行兩工稍平所以題穵汪莊引河業經奉旨允行復題停止汪莊二塘月堤長五百九十丈康熙三十九年創築窑灣搶修險工康熙三十七年搶修一百四十二丈三十九年搶修一百五十五丈四十年河身漸深水勢稍平止搶修挑水壩二丈七尺四十一年異漲之水搶修一百五十七丈八尺下河汛自彭家灘起至雲梯關山陽縣交界止縷堤長八千七百一十一丈五尺康熙三十六年修築三十九年重修龍潭口搶修險工長五百五十丈此工內外積水汪洋風浪蕩激最屬險要康熙四十年堤外創建排樁鑲柴堤裏下掃填土共資防禦老堤頭歲修險工長三十四丈康熙四十年建築磯觜壩一座佃湖搶修險工長四十五丈康熙四十年建築磯觜壩一座北岸汛自雲梯關起至六套止縷堤長八千一百四十二丈五尺內有康熙三十六年修築卑薄之處又有三十八年捐工人員領工未經興修之處三十九年俱重修雲梯關乃黃淮入海故道相傳當年關下即為海口所以立關設營有守備駐劄關以外舟楫所不及也潮落沙淤滄海漸為桑田南北兩岸有港有套有渠本無堤岸前河臣靳輔以一望平灘不分是河是地若不為之一東則雖黃河全歸故道而大溜到此四散而去究無入海之路因築兩岸長堤南岸地勢窪下多築二千丈然沙淤之土時合時開是堤保守之難未可與他處同年而語者河防雜説云雲梯關外以至海口竟有百餘里之遙向來原無堤堰自靳公於大修案內題允始築此兩岸長堤也良以一望平灘不分孰是河孰是地若不為之一束則雖黃淮全歸故道而大溜到此隨便四散而去究竟不能成河終無入海之路雲梯關外既無入海之路則關內壅遏無歸之水衝決頻仍殆無底止是以不得不為加築此兩岸長堤也然北岸止築堤至六套南岸止築堤至陸家社者蓋河至此處稍稍寬深可以不至四散至如北岸之堤短二千餘丈南岸之堤長二千餘丈者則因南岸地勢窪於北岸惟恐水到旁泄是以多為之東此二千餘丈耳目今一帶河漕俱寬一二百餘丈深二三丈不等海口大闢急溜奔騰而下較之數年前之形勢實有大不同者皆兩堤之功也馬家港康熙三十五年前河臣董安國以海口淤淺開穵引河導黃由小河口入海至三十九年二月間前河臣于成龍堵塞是年六月間被水衝開復築未就今大通口寬深河流順軌此港盡淤四十年置鐵犀堤上以鎮之大通口即舊攔黃壩處康熙三十八年議拆攔黃前河臣僅拆其半至三十九年臣遵旨盡行拆去是年賜名大通口淮水由清口經安東出雲梯關以達於海此自夏禹至今數千年之故道黃河自宋神宗時南徙而與淮合今亦六百餘年其出海之口廣至數百丈深至數丈非人力所能為者或因上流不治水緩沙停以致梗塞而遂欲别尋一道以達於海此必無是理明潘季馴辨之甚詳邇來河臣不察誤築攔黃壩欲令河水盡由馬家港出下流既窄則上流愈益壅遏東衝西決將無已時幸蒙皇上宸謨獨運命盡毁攔黃壩賜名大通口又命廣闢清口淮水悉出會黃二瀆合流奔騰東注積沙盡滌今河面寬至二百餘丈即水落亦一百八九十丈深至四丈五六尺即水落亦三丈五六尺自大通口至惠家港八灘入海之處俱深三四丈不等自此兩河皆復其故而淮海之間永慶安瀾矣栁園頭新生險工長二百九十五丈六尺四套險工舊長五十二丈康熙四十年水勢漸平止修二十五丈四十一年水勢更平停修其題築月堤亦暫停止南岸汛自陳家社下山清外河交界起至陸家社竈工尾止縷堤長一萬二百六十一丈五尺內有康熙三十六年修築卑薄之處又有三十八年捐工人員領工未經興修之處三十九年俱重修歪枝套堤長二千三十五丈九尺康熙四十年加幫髙厚辛家蕩滚水大壩一座現在興築陳家莊新生險工正在大溜頂衝之處嚮年各處堤岸漫缺水勢至此平緩自康熙四十年清黃並下衝刷堤根遂為危險西磡險工即在陳家莊下水勢頂衝兼以河面窄狹河中突出沙觜洶湧愈甚康熙四十年加幫外坦堤八十丈內創堤三百一十五丈臣又督令官辨挑穵沙觜及對面河灘舊水面僅寬六十丈今衝刷至一百餘丈矣掌家港險工在西磡之下康熙四十年七八月間陳家莊西磡危急此猶稍緩今西磡河面漸寬大溜直衝掌家港防護更須加謹矣以上俱張文端治河書薈蕞云按靳文襄公治河書所載險工凡六曰二鋪曰便益門曰南門曰東門曰茒良口曰佃河而今張公所記則又多矣修防事宜勝國河臣言之詳矣文端公所記事近而言簡尤可法也凡應用掃箇須捲長十丈八丈者方穩髙一丈者掃臺要寬七丈方捲得緊如遇堤頂窄狹者架木平堤名曰軟掃臺然後捲下先將栁枝捆成掃心拴東充心繩揪頭繩取蘆柴之黃亮者􅶇打小䙅總繫於掃心之上每丈下鋪滚肚麻繩一條或不必用麻者即用蘆纜又將大蘆纜二條行繩一條密鋪於小䙅之上鋪草為筋以栁為骨如栁不足用柴代之均勻鋪平需夫五六十名如長十丈者共需夫五六百名八丈者四五百名用勇健熟諳掃總二名一名執旗招呼一名鳴鑼以鼓衆力牽拉捆捲後用牮稈創推掃將臨岸將小䙅均束於掃掃岸上每丈釘下留橛二根將滚肚繩挽於留橛之上每楸頭繩一根亦釘留橛一根看水勢之緩急定楸頭繩之多寡漸次將掃推入水中將橛頭滚肚用活扣結於留橛之上然後慢慢壓土俟掃將次沈下然後下樁每丈用一尺八寸木一根若水勢湍激頂衝掃灣並合龍之掃須用大木不在一尺八寸之例每丈用料物細數照現行工部則例配用可也捲掃下掃之法運河同凡黃河內掃工有修防有救險有搶險有新生險修防工程於霜降後水勢退消驗查舊掃傾欹者蟄陷者卑矮者朽爛者須將舊掃清消平妥相機補下層層簽釘大樁照依大汛水漲之痕仍髙出數尺一律下成順掃薄敷以土俟其蟄定方可下丁頭掃若掃未蟄實即下丁頭掃前順掃一有蟄陷將别掃俱為帶動矣其救險工程將有危陷掃尚未去急須臨河添壓大掃長樁靠堤急清舊掃恐為匯崖填之以軟草將兩傍安穩之掃亦須補下大樁併力救護勿使走動則工程平穩矣其搶險乃因舊掃朽爛或因頂衝急溜將掃下衝空舊掃全去水匯崖岸舊堤坍卸岌岌堪虞當此之際人皇皇莫知所措搶險工程事有先後掃有緩急若誤下一掃誤釘一樁反致逆溜湍激衝刷舊堤欲去不能每至僨事須責令久慣掃手或熟諳工程人員殫心料理責任既專令其度量穩妥然後急為接下掃箇晝夜搶下庶舊堤無虞兩旁之掃平穩矣其新生險工每於舊險工之上下黃河大溜一時衝至掃傍舊堤坦坡坍卸急須下掃直至開溜之處而止大率掃料黃河之內以栁柴為重次則枯草樁必長大繩須堅實至於壓土非比清水掃箇黃水一入掃中即泥沙停滯若壓土太厚反恐欹卸俗云下掃無法全憑土壓者乃是言清水之掃也黃河內下掃之法凡黃河初決且不必急計裹頭亦不必急計堵塞初開之時水勢洶湧未可以爭看其出口急溜若有奪河情形須建挑水壩以遏其勢上流挑穵引河以挽其流速運積料物料物既積矣猶在得時時可堵矣裹頭舊堤務必多下邊掃堅固停妥然後逐漸進掃掃不可緩緩恐決口漸深又不可急急恐下掃有失掃必欲其大而長長大則穩捲掃首重於繩纜其揪頭滚心滚肚必須長壯務使繩勝掃莫使掃勝繩掃既下矣薄用土壓掃將沈於水方釘簽樁再加套掃其樁亦必須長大計掃將到底方可再進沈水將次合龍之際須查在工料物除合龍之外仍多積料物須防合龍之後必有一大蟄陷每於合龍之後復開決者率因蟄陷故也於合龍之時晝夜兼工堵塞遇有毛道過水或係樁頂不平或係掃手作弊故留罅隙必須急為壓土使其平實於罅隙用稻草或紅草塞之務使斷流若涓涓不息漸至蟄陷蟄陷不急搶救則潰矣欲杜樁掃手之弊惟有恤其勤勞厚以賞賚不必按日計值惟以成工為主則工易舉而成亦速也至決口初開時不係頂衝之處出口勢緩去口平散亦不必急計堵塞久之率多挂口淤墊也黃河塞決之法凡黃河迎溜之處宜建築挑水壩又名順水又名磯觜又名馬頭其功最大如清河縣境內之運口每為黃水急溜直逼卞家汪關攔清水不得暢出以致運口淤墊陶家莊引河數挑不成仰遵聖謨指示於運口迤西築挑水壩一座將黃水挑逼北徙清水得以暢出陶莊引河得以成功今二瀆合流河工告成者攸賴於是凡遇有險工之處照式築之禆益非小酌試建築之法壩欲其寬不可甚長須做雁翅邊掃以順上流勿使掃頭逆溜有掀揭之虞若離縷堤逺者須接築格堤捍禦以防異漲時黃水溢壩後衝刷之虞建築挑水壩之法上諭黃河灣曲之處俱應挑穵取直於是挑穵陶家莊引河工成而淮水暢流挑穵戚字堡楊橫莊引河工成而險工遂平仰見聖謨精詳黃流取直之明效也挑引河之法審勢貴於迎溜而施功宜於深濶且俟水大漲乘機開放則有一瀉千里之勢若挑穵太窄則受水無多遽難挽溜以入新河若挑穵太淺水不全趨勢緩則墊若挑引河太短水流不舒為正河所抑洄洑漩淤須挑穵六十丈或四十丈即窄亦須十餘丈須長二千丈或千餘丈即短亦須八九百丈方趨溜有勢而成河若挑穵引河太直固屬節省錢糧又恐直則平緩而無波瀾湍激之勢久亦漸淤也須隨黃河大勢開挑俾其河頭迎溜河尾泄水中間灣處急溜衝刷漸次河岸倒卸再於河頭築接水掃壩河尾築順水壩掃壩對河築挑水掃壩庶引河可成也挑穵引河之法凡屬河道必築堤束水歸漕以防旁溢無論創築加幫總以老土為佳但黃河兩岸率多沙土恐難盡覔老土須於堤完後務尋老土蓋頂蓋邊栽種草根以禦雨淋衝汕築堤之法每土六寸行硪其岐縫處用夯堅築其新舊堤交界又用鐵杵力築層層夯硪期於一律堅實總以簽試不漏為度幫築堤工之法河防志行水金鑑卷六十
