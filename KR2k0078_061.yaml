body:
  text: 行水金鑑卷六十一江南按察使傅澤洪撰淮水導淮自桐柏禹貢地理志云桐柏山在南陽平氏縣東南淮水所出傳言南陽郡之東也孔氏疏淮水出南陽平氏縣胎簪山東北過桐柏山水經山海經曰淮出餘山在朝陽東義鄉西風俗通曰淮均也春秋說題辭曰淮者均其勢也釋名曰淮韋也韋繞揚州北界東至於海也淮水醴水同源俱導西流為醴東流為淮潛流地下三十許里東出桐柏大復山南謂之陽口水南即復陽縣在大復山之陽故曰復陽也山南有淮源廟酈注朝今南陽府新野縣西有陽故城桐柏縣東有復陽故城漢並屬南陽郡元和志云桐柏山在唐州桐柏縣西南九十里淮瀆廟在縣西六十里山之東北桐柏縣志云縣西三十里有淮井石砌水池方七尺許有泉三處湧出即於池邊伏流地中經六七里成川醴水西流徑平氏故城東北又西至唐縣界而入沘水醴亦作澧又元和志云唐州桐柏縣本漢平氏縣東界梁置義鄉縣開皇十八年改以桐柏山為名山在縣西南九十里一名大復山渭按此山東南接湖廣德安府隨州界西接襄陽府棗陽縣界峰巒奇秀餘山乃桐柏之異名縣志云大復山在縣東三十里胎簪山在縣西北三十里皆其支峰禹貢則總謂之桐柏也以今輿地考之淮水出桐柏縣西北桐柏山縣在河南南陽府東南三百里東南流徑其縣南禹貢所謂導淮自桐柏者也禹貢錐指東㑹於泗沂東入於海禹貢與泗沂二水合入海孔安國傳沂水先入泗泗入淮耳以沂水入泗處去淮巳近故連言之孔氏疏過水經沂水篇云沂水出泰山蓋縣艾山南琅邪臨沂縣東又南過開陽縣東又東過襄賁縣東屈從縣西南流又屈南過郯縣西又南過良城縣西又南過下邳縣西南入于泗泗水篇云泗水出魯卞縣北山西南徑魯縣北又西過瑕丘縣東屈從縣東南流漷水從東來注之又南過平陽縣西又南過高平縣西洸水從北西來流注之又南過方輿縣東菏水從西來注之又屈東南過湖陸縣南洧涓水從東北來流注之又東過沛縣東又東徑山陽郡又東南過彭城縣東北又東南過吕縣南又東南過下邳縣西又東南入於淮㑹者以二水相敵故也入海在淮浦蔡沈尚書集注淮浦漢屬臨淮郡其故城在今江南淮安府安東縣西泗沂二水均敵不以沂既入泗而沒其名如朝宗並稱江漢之例吳澄書纂言淮出桐柏初甚湧復潛流三十里然後東馳亦尚淺其深處為十四潭至并汝潁始大汝潁禹時不費治導故不書自桐柏至海凡千七百里金履祥尚書表注地志沂水出泰山郡蓋縣艾山今沂州沂水縣也南至下邳西南入泗曽氏曰徐州水以沂名者非一酈道元謂水出尼丘山西北徑魯之雩門亦謂之沂水又水出太山武陽之冠石山亦謂之沂水而沂水之大則出太山也古沂水入泗泗水入淮今泗入河與淮合矣泗水出魯國卞縣桃虛西北陪尾山源有泉四四泉俱導因以為名西南過彭城又東南過下邳入淮卞縣今襲慶府泗水縣也泗水縣今隸兖州許慎說文泗水受泲水東入淮按泗受泲者桑欽云濟水至濟隂乘氏縣分為二一水東北流為北濟一水南流為南濟通志云今此水與濟不通但菏水亦自乘氏至方與入泗而菏水通濟則泗可以達菏菏可以達濟而自濟可以通河矣黃鎮成尚書通考以今輿地言之沂水出沂水縣屬青州府厯沂州郯城並屬兖州府至邳州合泗水又東南至清河縣入淮邳州清河並屬淮安府導淮云東㑹於泗沂是也泗水出泗水縣厯曲阜滋陽濟寧鄒縣魚臺滕縣並屬山東兖州府沛縣徐州沛縣屬江南徐州邳州宿遷桃源至清河縣入淮並屬淮安府此禹迹也今其故道自徐城以南悉為黃河所占而淮不得擅㑹泗之名矣漢志淮水出平氏桐柏山東南至淮陵入海過郡四南陽汝南九江臨淮行三千二百四十里疑太逺按易氏曰淮自桐柏縣東流二百八十里至真陽又三百里至汝隂又二百十里至下蔡又五百里至蘄縣今宿州南有蘄縣故城又二百四十里至臨淮又二百七十里至漣水縣入海通計一千八百里金吉甫云自桐柏至海凡千七百里二說近是漢志云至淮陵入海淮陵故城在今盱眙縣西北八十五里此地距海甚遙淮何得于縣界入海淮陵乃淮隂之訛三千字亦謬也淮之所納其山源之水泗沂汝潁為大汝潁不見於經以未嘗施功故耳汝受滍灈瀙潕等水潁受潧洧潩㶏等水皆山源也潧與溱同及滎陽下引河東南與濟汝淮泗㑹則隂溝汳水鴻溝沙水濄水睢水諸川或自入淮或由潁泗以達淮而淮之所納愈多矣今全河又悉注於淮淮雖大其何以堪河不歸北徐揚間昏墊之患恐未有巳時也禹貢錐指淮水自平氏縣又東徑義陽縣水經縣南對固成山山有水注流數丈洪濤灌山遂成巨井謂之石泉水北流注於淮酈注府義陽今河南汝寧信陽州也又徑義陽縣故城南水經義陽郡治也晉太始中割南陽東鄙之安昌平林平氏義陽四縣置義陽郡於安昌城有九渡水注之酈注陽安昌故城在今信州西北七十里東過江夏平春縣北水經故今信陽州東南有平陽城本後漢平春縣又東油水注之水經水出縣西南油溪東北流徑平春縣故城南淮水又東屈岸北有一土穴徑尺泉流下注沿流波三丈入於油水亂流南屈又東北注於淮淮水又東北徑城陽縣故城南酈注有漢志汝南郡城陽縣又東北與大朩水合水經水西出大朩山東徑城陽縣北而東入於淮酈注又東北流左㑹湖水水經傍川西南出窮溪得其源也酈注車今信陽州界有臺湖輞湖馮家楊家蔡家等湖又東徑安陽縣故城南水經江國也今其地有江亭地理志曰漢乃縣之酈注陽今正縣東有安陽故城與光州息縣接界又東得溮口水水經源南出大潰山東北流翼帶三川亂流北注溮水東南流厯金山北山無樹朩峻峭層峙又東徑石城山北又東徑七井岡南又東北注於淮酈注又東徑新息縣南水經東徑故息城南酈注北在今新息縣三十里又東徑浮光山北水經亦曰扶光山即弋山也徑新息縣故城南東合慎縣水水出慎陽縣西而東徑慎陽縣故城南應劭曰慎水所出東北入淮慎水又東流積為燋陂陂水又東南流為上慎陂又東為中慎陂又東南為下慎陂皆與鴻郤陂水散流其陂首受淮川左結鴻陂漢成帝時翟方進奏毁之建武中汝南太守鄧晨修復之起塘四百餘里百姓得其利陂水散流下合慎水而東南徑息城北入淮謂之慎口淮水又東與申陂水合水上承申陂於新息縣北東南流分為二水一水徑深丘西又屈徑其南南派為蓮湖水南流注於淮淮水又左迤流結兩湖謂之東西蓮湖酈注今慎陽故城在正陽縣北四十里鴻郤陂又名鴻池陂秦觀曰鴻池陂非特灌溉之利菱芡蒲魚之饒實一郡瀦水處也陂既廢水無歸宿汝水所以散漫為害與又東右合壑水水經水出白沙山東北徑柴亭西俗謂之柴水又東徑黃城西故弋陽郡也又東北入於淮謂之柴口酈注在黃城今光州西十二里弋陽郡即今光州固始縣界又東北申陂枝水注之水經水首受陂水於深丘北東徑釣臺南臺在水曲之中臺北有琴臺又東徑陽亭南東南合淮酈注又東徑淮隂亭北又東徑白城南水經楚白公勝之邑也又東北去白亭十里酈注息白城在今縣東又東徑長陵戍南又東青陂水注之水經分青陂東瀆東南徑白亭西又南於長陵戍東東南入於淮酈注長今息縣東北八十里有長陵城疑即陵戍也新蔡縣西南有青陂又東北合黃水水經水出黃武山東北流朩陵關水注之又東北徑弋陽郡又東北入於淮謂之黃口酈注弋朩陵關在今光山縣陽郡即今光州固始境又東過期思縣北水經縣故蔣國周公之後也楚滅之以為縣城之西北有楚相孫叔敖廟酈注有今固始縣西北期思故城又東北淠水注之水經水出弋陽縣南垂山東北注淮俗曰白鷺水酈注縣固始南五十里有淠水東過原鹿縣南汝水從西北來注之水經江原鹿故城在今南潁川南富陂之西汝水篇云汝水出魯陽縣之大盂山東南流徑原鹿縣故城西而南入於淮所謂汝口又東過廬江安豐縣東北決水從北來注之水經廬江故淮南也應劭曰故廬子國也決水自舒蓼北注不於北來也安豐東北注淮者窮水矣又非決水皆誤耳酈注在今霍邱縣西南有安豐故城決水縣西八十里與固始縣分界又東谷水入焉水經水上承富水東南流世謂之谷水也又東於汝隂城東南注酈注入谷水東南流至汝隂城淮城即今潁州治又東北左㑹潤水水經水首受富陂東南流為高塘陂又徑汝隂縣東徑荆亭北而東入酈注淮東入入於也又東北窮水入焉水經水出安豐縣窮谷左𫝊楚救灊司馬沈尹戍與吳師遇於窮谷者也又東為安豐津水南有城故安豐都尉治後立霍丘戍淮淮中有洲俗號關洲酈注縣今霍邱西有窮水又東北至九江壽春縣西泚水洪水合北注之又東潁水從西北來流注之水經淮水又東左合沘口又東徑中陽亭北為中陽渡水流淺磧可以厲也酈注壽漢志灊縣泚山沘水所出北至春入芍陂師古曰沘音比又音布几反水經訛為泚今正之潁水篇云潁水出潁川陽城縣西北少室山東南流徑蜩蟟郭東俗謂之鄭城又東南入於淮春秋昭公十二年楚子狩于州來次于潁尾蓋潁水之㑹淮也鄭城即潁上故城在今潁上縣南又東流與潁口㑹東南徑倉陵北又東北流徑壽春縣故城西水經縣即楚考烈王自陳徙此秦始皇立九江郡治此兼得廬江豫章之地故以九江名郡漢高帝四年為淮南國孝武元狩六年復為九江焉文穎曰史記貨殖𫝊曰淮以北沛陳汝南南郡為西楚彭城以東東海吳廣陵為東楚衡山九江江南豫章長沙為南楚是為三楚者也酈注今壽春故城即壽州治又北左合椒水水經水上承淮水東北流徑蛇池南又厯其城東亦謂之清水東北流注於淮水謂之清水口者左合椒水焉酈注又東過壽春縣北肥水從縣東北流注之水經謂之肥口又北夏肥水注之俱入於淮酈注壽肥水在今州東北十里自合肥來注於淮州志謂之東肥河夏肥水在壽州西北州志謂之西肥河東流至下蔡故城西南十里入淮又北徑山硤中謂之硤石水經對岸山上結二城以防津要又北徑下蔡縣故城東本州來之城也春秋襄公二年蔡成公自新蔡遷於州來謂之下蔡又東徑八公山北山上有老子廟酈注在硤石山在壽州西北夾淮為險王氏地理通釋曰西岸者屬下蔡在東岸者屬壽春明初省下蔡入壽州故一統志云山在州西北二十五里八公山在今壽州北少東淮水之南晉謝𤣥北禦苻堅於八公山堅望山上草朩咸為人狀寰宇記云一名肥陵山在壽春縣北四里又北徑莫邪山西水經山南有隂陵縣故城項羽自垓下從數百騎夜馳渡淮至隂陵迷失道者也酈注有今鳯陽縣西南莫邪山又東過當塗縣北濄水從西北來注之水經淮水自莫邪山東北徑馬頭城北魏馬頭郡治也故當塗縣之故城也酈注山當塗故城在今懷逺縣東南塗在縣東南八里淮河東岸濄水在縣北一里隂溝水篇云濄水受沙水於扶溝縣東南徑荆山又東注於淮荆山在縣西南一里與塗山隔淮對峙其下有荆山堰梁天監中築又東北濠水注之水經水出莫邪山東北之溪溪水西北引瀆徑禹墟北又西流注於淮酈注和濠水在今懷逺縣南元志謂之西濠水又北沙水注之水經經所謂蒗蕩渠也郡國志曰淮出於荆山之左當塗之右奔流二山之間而揚濤北注之酈注縣沙水在懷逺南渠水篇云沙音蔡許慎正作沙音言水散石也續述征記曰汴沙到浚儀而分汴東注沙南流至義城縣西南而東注於淮謂之沙汭杜預曰沙水名也漢志沛郡有義城縣其故城在懷逺縣東北十五里今名拖城魏收志曰汴水在大梁城東分為蔡渠即今祥符縣東南首受汴之蔡河蔡與沙字異而音近當讀如二百里蔡之蔡又東過鍾離縣北水經縣故鍾離子國濠水出隂陵縣之陽亭北東北流徑小城而北流注於淮酈注水今臨淮縣東有鍾離故城濠在縣西元和志謂之東濠水又東徑夏丘縣南水經又東渙水西入九里注之渙水又東南流徑雍丘縣故城南又東南徑白石戍南徑蚿城南洨水注之水首受蘄水於蘄縣東南流徑穀陽縣又東南流於洨縣故城北縣有垓下聚漢高祖破項羽所在也洨水又東南入於淮淮水又東至巉石山潼水注之水首受潼縣西南潼陂縣故臨淮郡之屬縣又東南流入淮酈注州夏丘縣即今虹縣巉石山在今五河縣東與泗接界新志云有鐵鎖嶺在縣東三十里橫跨淮口與盱眙之浮山對峙蓋即古巉石也潼縣在今虹縣東北七十里有潼城又東徑浮山水經山北對巉石山梁天監中立堰於二山之間逆天地之心乖民神之望自然水潰淮矣酈注縣浮山在今盱眙西元和志浮山堰在招義縣西北六十里與荆山堰同築又東徑徐縣南厯澗水注之水經導徐城西北徐陂陂水南流絶蘄水徑厯澗水西東南流注於淮酈注徐今泗州西北三十里有縣故城古徐國又東池水注之水經水出東城縣東北流徑東城縣故城南又東北流厯二山間東北入於淮謂之池口也酈注有今定逺縣東南東城故城又東蘄水注之水經水首受睢水於穀熟城東北東徑建城縣故城北又東南徑蘄縣又東入夏丘縣東絶潼水又東南徑潼縣南又東徑大徐縣故城南又東注於淮酈注今蘄縣即懷逺縣地夏丘縣即今虹縣地穀熟建城潼縣俱未詳所在大徐縣亦在泗州西北又東厯客山徑盱眙縣故城西水經又東徑廣陵厯淮陽城北臨泗水岨於二山之間述征記淮陽太守治自後置戍縣亦有時廢興也酈注今清河縣西南有淮陽廢縣晉義熙中置淮陽郡領角城等縣寰宇記云在徐城縣東北百五十里西臨淮水徐城舊泗州治又東北至下邳淮隂縣西泗水從西北來流注之水經淮泗之㑹即角城也左右兩川翼夾二水決入之所所謂泗口也酈注是泗口亦名清口導淮東㑹於泗沂即處也今清河縣東南五里有淮隂故城漢屬臨淮郡後漢改屬下邳國晉初為廣陵郡治角城縣故城在縣西南去故淮陽城十八里寰宇記云角城在宿遷縣東南一百十里又東過淮隂縣北中瀆水出白馬湖東北注之水經淮水右岸即淮隂也城西二里有公路浦昔袁術向九江將東奔袁談路出斯浦因以為名焉又東徑淮隂縣故城北北臨淮水漢高帝六年封韓信為侯國昔信去下鄉而釣於此處也城東有兩冢西即漂母冢周回數百步高十餘丈昔漂母食信於淮隂信王下邳蓋投金增陵以報母矣東一陵即信母冢也縣有中瀆水首受江於廣陵郡之江都縣昔吳將伐齊北霸中國自廣陵城東南築邗城城下掘深溝謂之韓江亦曰邗溟溝自江東北通射陽湖地理志所謂渠水也西北至末口入淮自永和中江都水斷其水上承歐陽引江入埭六十里至廣陵城中瀆水自廣陵北出武廣湖東陸陽湖西二湖東西相直五里水出其間下注樊梁湖舊道東北出博芝射陽二湖西北出夾耶乃至山陽矣至永和中患湖道多風陳敏因穿樊梁湖北口下注津湖徑渡渡十二里方達北口直至夾耶興寧中復以津湖多風又自湖之南北口沿東岸二十里穿渠入北口自後行者不復由湖故蔣濟三州論曰淮湖紆逺水陸異路山陽不通陳敏穿溝更鑿馬瀨百里渡湖者也自廣陵出山陽白馬湖徑山陽城西即射陽縣故城應劭曰在射水之陽中瀆又東謂之山陽浦又東入淮謂之山陽口者也酈注古射陽故城在今山陽縣東南縣西有山陽瀆即邗溝縣北五里有北神堰即古末口也又東兩小水流注之水經淮水左徑泗水國南故東海郡也地理志曰王莽更泗水郡為順水陵縣為生夌淩水注之水出淩縣東流徑其縣故城東而東南流注於淮即經所謂之小水者也酈注宿淩縣故城在今遷縣東南又東至廣陵淮浦縣入於海水經應劭曰浦岸也蓋側淮濆故受此名淮水於縣枝分北為游水厯朐縣與沭合又東北徑贛榆縣北東側巨海有秦始皇碑在山上去海一百五十步潮水至加其上三丈去則三尺所見東北傾石長一丈八尺廣五尺厚三尺八寸一行一十二字地理志曰游水自淮浦入海爾雅曰淮别為滸游水亦枝稱者也酈注晉今安東縣治或云即淮浦故城淮浦舊屬臨淮郡改屬廣陵漢志平氏縣下云淮水東南至淮陵入海蓋隂字之誤淮隂去海尚一百四五十里而志云淮隂入海者亦猶江都去海甚逺而湔氐道下云江水東南至江都入海不言海陵也淮陵作淮隂無疑安東即淮浦亦無疑淮自荆山而下即受黃河從渦河一支之水至清河則全受河水矣議者云黃河泛濫中土蓋海口近年漲沙下壅上溢致然巳議濬海口矣初亦甚奇之及觀於淮海而始知其妄蓋淮隂之地甚卑而徐吕之洪甚高信然則淮隂當陸沈而徐吕為安流矣審察之乃河淮入海之處北口實有漲沙而南口更衝廣爾劉天和問水集淮水昔不病淮安今病淮揚蓋黃河正流往經河南或出潁川或出壽春匯淮入於海其入小浮橋經徐邳入海者支流也勢故卑且弱河淮合則為一家直湧而東奔是淮以河利也安能害淮安今全河舍河南之故道併流徐邳經清河而淮水自西來㑹是二家也不相統一故河落則淮乘高而凌之淮安以燥秋水灌河河恃勢而驕亘淮安之東北若大行焉而淮水方挾潁川壽春諸平陸之水勢與强河鬭於清河不能衝中堅則氣喪而潰散淮安之郊暫為憩息俟河之消鋭乃假道㑹弱河始入海淮安安得不病淮河哉若導黃河經河南㑹淮水於潁川壽春勢既不能若任淮水灌淮安勢又不可唯朝廷定策固高寶諸湖老隄建諸平水閘大落高寶諸湖之巨浸廣引支河歸射陽湖入海之洪流乃引淮河上流一支入高寶諸湖如黃河平則淮水㑹清河故道從淮城北同入於海如黃河長則淮水㑹高寶湖新道由射陽湖從淮城南同入於海則淮安全得平土而居之神禹疏瀹排決之法今不講久矣考之正字疏者水密為患則綱舉以疏之瀹者水散為患則合水以瀹之排者水侵為患則拒堵以排之決者遲回為患則搜剔以決之朱子云汝泗皆入淮而淮自入海夫淮之入海此三代以後事也禹治水先審中國大勢北水之大唯河南水之大唯江而四瀆特姑以淮漢配耳豈真可敵江河哉故導汝泗入於淮又導淮入於江東北注海䢴溝淮入江故道也今失之而淮自入海蓋失禹決排之法而淮之南北始多水患矣萬恭治水筌蹄河自中牟以下奪汴徐州以下奪泗清口以下奪淮凡三奪而後注於海今嵗久河身日高淮泗又不能容廟堂之議既視其奪以為常司水之臣又乘其決以為利不獨害民生妨國計而於天地氣運未必不有關也江河淮濟謂之四瀆今以一淮受黃河之全蓋合二瀆而為一也宋以前河自入海尚能為並河三州郡之害況今河淮合一而清口又合汴泗沂水以同歸於淮也哉曩時河水猶有所瀦如巨野梁山數處猶有所分如毛氏赤河之斷雖以元人挑河入淮而東北之道猶微有存焉者今則以一淮而受衆水之歸而無涓滴之滲漏矣丘仲深謂以一淮受黃河之全然考之先朝徐有貞治河猶疏分水之渠於濮汜之間不使之并趨一道自𢎞治六年築黃陵岡以絶其北來之道而河流總於曹單之間乃猶於蘭陽儀封各開一口而泄之於南今復塞之故河之在今日欲北不得欲南不得唯以一道入淮淮狹而不能容又高而不利下則頻嵗決於邳宿以下以病民而妨運而邳宿以下左右皆有湖陂河必從而入之吾見劉貢父所云别穿一梁山濼者將在今淮泗之間而生民魚鱉之憂殆未巳也日知録黃河行至清河縣南與淮水交㑹是為清口由清口而合流東北行三百餘里入海方康熙十六年以前河道敝壞之時清口一片淤沙自清口以至海口微水緩流河寬處不過十餘丈窄處僅有六七尺深處不過五六尺淺處僅有二三尺及全淮歸故之後漸漸刷開逮黃河亦復歸故而水力所至淤沙盡闢清口寬二三百丈河漕深二三丈不等巳漸復當日之舊矣迤下三百餘里河身俱寬一二百丈不等河漕俱深二三丈不等惟安東縣蓮花菴迤下河漕一千餘丈僅深一丈二三尺須多置二百餘斤重之大鐵犂數十架乘船施治必期深至二丈之外方為永久之道也周洽河防雜說淮河發源於河南桐柏山由開封至歸德至亳州出小清口至大河口㑹黃入海今則開封至歸德一段已經淤塞必大加開通中間有可以開通河道挑挖溝洫引水灌田者聽其自便則黃河以南西北之水利大興矣古時清口止出淮水而黃河由清河縣後往東行至大河口淮黃交㑹所以黃水無倒灌之患今黃河遷於清河縣前直逼清口若改於大河口之下使之㑹黃入海自無倒灌之患矣張清恪居濟一得行水金鑑卷六十一
