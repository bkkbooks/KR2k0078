body:
  text: 行水金鑑卷六十三江南按察使傅澤洪撰淮水萬厯八年總河潘季馴題河工善後事宜一甃石堰以固要衝先該給事中尹瑾題該工部覆議高家堰西當淮泗衝流東護淮揚沃土即今築塞巳固要將當中大澗口二十餘里用石包砌合咨臣等今嵗預行估計幹辦合用石料若干工費若干責成徐潁海防三道併力分工同心協慮自萬厯九年興工酌寬限期合用錢糧於大工餘剩銀內支用等因行據司道等官議報前來該臣等覆查得本堰自漢陳登創築之後至我朝平江伯陳瑄復大築之向不甃石者非謂石之不堅亦以采石之難也去嵗堰工告竣即設官夫畫地分守每嵗四月以前八月以後水及堤根者不滿二百丈防守甚易惟是五月中至八月盡最為喫緊如有汕刷浪窩隨時補修可保無恙然嵗久月深官更吏換首尾不知疏虞難免誠不如甃砌山石之為一勞永逸科臣所云三利可謂委曲明盡矣況內土既巳堅厚廂石亦易為力但淮安原不産石俱於徐州取辦而節年采伐不歇勢必窮山逺搜石巖既逺則出山腳價自倍於昔水次去工尚餘五百里糧艘帶運勢必病軍民舟搭載勢必病商則自備官船專人管運之費不可惜也採石數萬丈聚匠必須數千名非逺募於山東江南之間不得也其直不多誰肯樂就及卸石工次搬運至堰逺者將十餘里近亦五六餘里泥塗深陷舉趾艱難比之伐石出山之苦又有甚焉大工甫畢民勞方休勢難驟舉故須濡遲嵗月事難獨任故須分責三道該科慮之詳矣今該臣等公同勘得大澗口極窪去處自列字號至水字號止計長三千丈合派南河分司三百丈徐海潁三道各九百丈每堰長一丈應砌高一丈內外用石二層該石二十丈共該石六萬丈約計在山採辦工價出山腳價并鑿砌工食每丈該銀五錢九分共該銀三萬五千四百兩合用船隻除南河分司查有見在混江龍船免造外每道該造船九十隻共船二百七十隻每隻連篷桅什物該價銀五十兩共銀一萬三千五百兩每船雇募水手六名共募一千六百二十名每名每年工食銀七兩二錢大約四年為期共該銀四萬六千六百五十六兩募夫搬石上船下船及擡石到工大約每丈費銀三錢共銀一萬八千兩每砌石一丈用石灰二斗銀八釐共該銀二百四十兩堰基三千丈每丈約截用長杉二十五根共計七萬五千根每根價銀一錢三分共該銀九千七百五十兩樁手每丈三十工該銀一兩二錢共銀三千六百兩管工官廩糧比照大工事例合用府佐二員每員每日廩給銀一錢書辦一名口糧銀四分州縣佐二官十二員每員每日廩給銀六分書辦一名口糧銀三分隂醫省祭等官三十員每員每日銀四分每年該銀九百七十二兩共銀三千八百八十八兩以上通共該銀一十三萬一千三十四兩應於大工用剩解還戶部銀一十二萬奏請留用尚缺銀一萬一千三十四兩再於原留用剩銀內動支除南河分司見有船隻一面行令采運外其三道工程今嵗時月巳促止可打造船隻置辦器具雇募夫匠完備明嵗採運石塊陸續細鑿備用萬厯十年方可下樁甃砌隨砌隨採定限四年以裏工完聽總理衙門將各效勞官員分别勤惰題請核實賞罰如司道等官處置得宜能於限前早竣工堅費省者破格優處其原造船隻事畢量行變價作正支銷庶料理周悉而隄防永固矣河防一覽明神宗萬厯九年十一月乙亥修泗州城外石隄泗城陵寢重地勢極窪下舊有石包土堤藉以護城禦水久被淮流衝壞撫按凌雲翼陳用賔等各請大舉修築以為一勞永逸之計詔亟行之明神宗實録明神宗萬厯十一年正月丁未以高家堰河工成參政舒大猷等紀録十月已酉以高堰工完尚書潘季馴原任兵部尚書凌雲翼等賞賚有差明神宗實録明神宗萬厯十六年十月甲申總督河道潘季馴條上河工八事前五條入黃河一添設隄官謂高堰栁浦灣二堤綿亘二百餘里一大使往來防守未免疏虞宜另增栁浦灣大使一員夫役即於高堰南河數內裒出五百餘名屬之以密隄防一加幫真土謂淮水發源桐柏挾七十二溪之水經鳯泗入海而基運山橫截河中湧漲時作僅恃石堤一帶為捍禦而石內之土多係浮沙一遇霖雨輒至坍損土既圮矣石將安附宜覓取真土幫築完固以捍洶湧一接築舊堤謂清口乃淮黃交㑹而淮黃原自不敵然清口不至壅淤者以王家口之隄築全淮皆從此出其勢足與黃敵也自商販盜決前堤挖渠利涉淮勢漸分將來清口必致淤阻宜接築長隄就近責清河令監守稍有疏虞即行參治命依擬行明神宗實録是年八月總河都御史潘季馴請加泗城護堤行潁州兵備副使王之猷督知州汪一右等修築除內換老土外自新橋口起北至西門牌坊止加修石堤長一千九百三十二丈加高二尺用大石長一千八百六十四丈添建子堤長一千六百八十丈又自西門牌坊起至迤南新橋口止砌高二尺用碎石長一千一百六十五丈又添修新橋迤南大堤并窑西石堤共長八十六丈俱於十八年完工南河全考潘季馴條上河工八事一添設隄官以免遙制竊惟當官之事兼攝為難而以最卑之官攝最逺之事為尤難臣於萬厯七年建復高堰之隄以捍橫流於淮郡之東創築栁浦灣之堤以遏狂瀾於淮郡之北十餘年間利賴於二隄者良不淺矣第因比時冗員之禁方嚴不敢多求添設故止請高堰大使一員兼攝栁浦灣一帶隄務但查高堰之隄增築巳幾百里而栁浦灣之隄起自清江浦以至高嶺戴百戶營延袤一百三十餘里伏秋之時顧此失彼一大使豈能日奔走於二百里之間耶縱委義民等官不過虛應故事豈肯在隄防守前嵗范家口之決實由此也臣請添設栁浦灣大使一員住劄本堤要害去處自清江浦起至戴百戶營一帶遙堤付之管理應用夫役即於高堰八百名數內裒出三百再於南河隄淺夫內裒出二百共夫五百與之其高堰大使專管本堤各令晝夜巡邏遇汕即補庶地有專轄而功可責成矣一加幫真土以保護堤查得淮水發自河南桐柏山挾七十二溪之水經鳯泗東入於海然至泗州而龜山橫截河中即基運山圖中所云灣如牛角勢樣非凡者是也下沙一轉回瀾西顧此於風氣實為完美然伏秋之時不免湧漲亦由此也臣讀宋臣歐陽修先春亭記其略有云景祐三年泗守張侯問民之所素病而治其尤暴者曰暴莫大於淮明年春作城之外堤因其舊而廣之高三十三尺土實石堅捍暴備災可久而不壞又云泗天下之水㑹也又云先時嵗大水州幾溺張侯夏守是州築隄以禦之今所謂因其舊者是也夫曰尤暴者莫大於淮則知淮之為暴於泗舊矣曰隄高三十三尺則知水之高矣先後州守惟以築堤為事則知禦淮之策舍隄之外無策矣今查泗州護城隄高不及宋三之一然幸當水一面甃石可恃但石內土堤皆係浮沙一遇霖雨輒至坍損土隄一圮石將安附不可不慮也臣於六月間躬往閲視即行潁州兵備道及該州知州浦朝柱令其覓取真土另加堅築第本隄丈數頗多工費不少錢糧難處延久未報臣請敕下工部咨行撫按衙門多方計處覆請施行庶護隄可恃而州民獲安矣再查基運山去州一十餘里地勢高峻嘉靖十四年間該先任總理劉天和令匠役王良等量得地形迥高二丈三尺一寸則又與州不同東麓石堤見在查修臣故未及之也一接築舊隄以防淤淺竊惟清口乃黃淮交㑹之所運道必經之處稍有淺阻便非利涉但欲其通利須令全淮之水盡由此出則力能敵黃不為沙墊往嵗高堰潰決淮從東行清口遂為平陸高堰既築獨慮清河縣對岸王家口等處淮水從此決出則清口之力微矣臣於萬厯八年行郎中余毅中即於本處築隄一道以防其溢數年之間清口利涉實賴於此不意鳯泗商販船隻又於本堤之東盜挖一渠取便往來嵗久成河巳闊九十餘丈淮水盡由此出清口不免沙淤臣查得此處係清河對面地方該縣知縣出入之間一覽在目何致任其盜決汪洋北注而若罔聞知且不以報也其秦越肥瘠亦甚矣除臣見在查理及行司道官候淮水消落接築長隄一道務期堅久可恃外臣請隄成之後專責清河縣知縣管理每嵗派定官夫時加幫補如遇水發率同地方人等晝夜巡邏以防盜決儻有疏虞即將掌印官參治蓋此隄即在縣治之前較之他所不同而掌印官常川在縣較之管河官尚有他處奔走者又不同也河防一覽其略見實録兹特鈔全者明神宗萬厯十八年六月乙酉總理河道都御史潘季馴以增修泗州石堤經用不足工部議給淮安庫貯停濬草灣銀四百四十餘兩許之明神宗實録是年五月十二日以後大風雨淮水漲漂禾麥浥爛淮安府志明神宗萬厯十九年三月戊午以築泗州一帶護城石堤工完各官紀録奬戒悉依部覆施行九月戊辰時泗州水患異常公署州治水淹三尺其城內原有水關後因淮水高於城濠故塞水關以防水灌至城內積水不泄居民十九淹沒工部尚書曽同亨上其事上令河漕督撫㑹同巡按御史勘議要見泗城積淤何以宣泄淮水停漲何以疏通填土增高有無可以捍禦周家莊是否應濬施家橋是否可開張福堤是否阻礙或别有可開之處為地方之利者具奏以聞十月壬寅時揚州風雨連日淮湖漲溢江都縣北一淺邵伯淳家灣舊隄衝決五十餘丈高郵州南北關等處俱被衝決總理河道潘季馴上其事工科都給事中揚其休劾管河通判劉汝大州判張九思等故違節制海防道張允濟查核疏虞總理潘季馴俱宜同坐部覆海防通判州判等官俱應議罰潘季馴既屢次催督宜速行道府上緊備築以勵後效得㫖劉汝大等各罰俸三箇月張允濟姑免究十一月癸亥工部題河道都御史潘季馴條議前三條入黃河一增砌石堤以固保障謂高家堰當湖之處中段原鑲石堤足當風浪其石隄南北俱係土堤嵗修無巳議照中段一槩砌石徐州道與河南分司各管砌工以二十一年為始應用錢糧俱於嵗修銀內割處八年之內准可通完矣後一條入運河依擬行明神宗實録風高堰容納淮水西鼓浪甚是洶湧南北土堤何能捍禦掀天之勢潘公始議概用石堤始稱堅固公於高堰之功洵巨然雖一律石堤亦何能免嵗嵗之修防耶是年五月以後恆雨六月二十七日至七月初三等日暴風霪雨不息河淮泛漲山清安桃宿沭海贛平地水丈餘房屋牲畜漂溺無數淮安府志同清河縣志略是年秋九月泗州大水淮水泛溢高於城溺人無算浸及祖陵總督河道潘季馴上言水性不可拂河防不可弛地形不可强治理不可鑿人欲棄舊以為新而臣謂故道必不可失人欲支分以殺勢而臣謂濁流必不可分霖霪水漲久當自消時季馴凡四治河河皆治季馴之議以為河性湍悍善徙者水漫而沙壅也法莫若以隄束水以水攻沙循河故道束而湍之使水疾沙刷無留行而又近為縷隄縷隄之外復為遙堤故水益淺逺不至旁決明紀事本末或有問於馴曰淮不敵黃故決高堰避而東也今復合之無乃非策乎馴應之曰禹貢云導淮自桐柏東㑹於泗沂東入於海按泗沂即山東汶河諸水也厯徐邳至清口而與淮㑹自宋神宗十年七月黃河大決於澶州北流斷絶河遂南徙合泗沂而與淮㑹矣自神宗迄今六百餘年淮黃合流無恙乃今遂有避黃之說耶夫淮避黃而東矣而黃亦尋決崔鎮亦豈避淮而北乎蓋高堰決而後淮水東崔鎮決而後黃水北隄決而水分非水合而隄決也問者曰兹固然矣數年以來兩河分流小潦即溢今復合之溢將奈何馴曰水分則勢緩勢緩則沙停沙停則河飽尺寸之水皆由沙面止見其高水合則勢猛勢猛則沙刷沙刷則河深尋丈之水皆由河底止見其卑築隄束水以水攻沙水不奔溢於兩旁則必直刷乎河底一定之理必然之勢此合之所以愈於分也或有問於馴曰高家堰之築淮揚甚以為便而泗州人苦其停蓄淮水何也馴應之曰此非知水者之言也夫高堰居淮安之西南隅去郡城四十里而近堰東為山陽縣之西北鄉地稱膏腴堰西為阜陵泥墩范家諸湖西南為洪澤湖淮水自鳯泗來合諸湖之水出清口㑹黃河經安東縣出雲梯關以達於海此自禹迄今故道然也堰距湖尚存陸地里許而淮水盛發輒及堰秦周以前無考矣史稱漢陳登築堰禦淮至我明朝平江伯陳瑄復大葺之淮揚恃以為安者二百餘年嵗久剝蝕而私販者利其直達以免關津盤詰往往盜決之至隆慶四年大潰淮湖之水洚洞東注合白馬汜光諸湖決黃浦八淺而山陽高寶興鹽諸邑匯為巨浸每嵗四五月間淮隂畚土塞城門穴竇出入而城中街衢尚可舟也淮既東黃水亦躡其後濁流西沂清口遂堙而決水行地面宣泄不及清口之半不免停注上源而鳯陽壽泗間亦成巨浸矣故此堰為兩河關鍵不止為淮河隄防也馴戊寅萬厯六年之夏詢之泗人曰鳯泗之水蓄於高堰未決之前乎抑既決之後也僉曰高堰決而後蓄也清口塞於高堰未決之前乎抑既決之後也僉曰高堰決而後塞也馴曰堰決而塞築則必通堰決而蓄築則必達堰成而清口自利清口利而鳯泗水下馴何疑乎遂鋭意董諸臣築之二月決工告竣而清口遂闢七月隄工告成清口深闢如故今將考訂志𫝊卷牘中語開列一禹貢云導淮自桐柏東㑹於泗沂東入於海職按泗沂即山東汶河諸水也厯徐邳至清口而與淮㑹宋神宗後黃決而南遂併泗沂而與淮㑹矣故昔之東㑹於泗沂即今之東㑹於黃也一中都志云淮河自五河東來經州城南東至清河口㑹泗水東入海職按泗即泗沂之泗清河口即清口也此與禹貢所云無異要之淮由清口入海自禹迄今故道今至清口板沙若門限然欲舍故道而出高堰似不可也一查萬厯三年工部郭子章勘得水勢洶湧風浪衝擊崖岸漸坍包砌石工長二百二十六丈及查巡按邵亦於此時行州砌護城隄至今賴之稱邵公隄按前開工程皆職未任時事比時淮水竟從高堰決衝淮揚黃水從崔鎮決出五港入海兩河巳不㑹於清口無堰可阻無黃可遏其勢如此今之水漲未可歸咎黃與堰也一中都志與歐陽文集載宋臣歐陽修先春亭記略云景祐三年泗守張侯問民之所素病而治其尤暴者曰暴莫大於淮明年春作城之外隄因其舊而廣之高三十三尺土實石堅捍暴備災可久而不壞又曰泗天下之水㑹也先時嵗大水州幾溺張侯夏守是州築隄以禦之今所謂因其舊者是也職按修曰尤暴者莫大於淮則知淮之為暴於泗舊矣曰隄高三十三尺則知水之高矣大水幾溺州而先後州守惟以築隄為事則知禦淮之策舍堤之外無策矣今查泗州護州堤高不及宋三之一是今之水較宋為甚小矣再查黃河自宋神宗十年七月大決於澶州北流斷絶河遂南徙合南清河而入於淮而先臣丘濬大學衍義補曰此黃河入淮之始則仁宗景祐三年黃河尚未㑹淮業巳為泗州暴矣今乃歸罪於黃或未可也一泗州舊志載元知州韓居仁所撰淮水泛漲記內稱大德丁未夏五月淮水泛漲漂沒鄉村廬舍南門水深七尺止有二尺二寸未抵圈甎頂城中居民驚懼因考宋辛丑之水大此二尺丙寅小此二尺今取高低尺寸刋之於石以後水漲官民視此勿驚懼云職按韓居仁記此以慰泗州官民令其勿驚勿懼良工之心可謂獨苦且以州守載州事必無不真者夫云漂沒鄉村廬舍未抵城門圈甎頂者止二尺二寸宋辛丑之水大此二尺則巳抵城門圈頂無疑矣宋元泗州水患景象如此此與歐陽文忠公所云暴莫大於淮州幾溺者可為互相參考此時巳有高堰官民何不請毁如其無堰則水漲與堰無預矣今乃歸罪於堰不亦過乎或有問於馴曰高堰之築是矣而南有越城并周家橋淮水暴漲從此溢入白馬湖寶應縣河水遂溢此與高堰之決何異馴應之曰馴與司道勘議巳確籌之熟矣其不同者有三而其必不可築者一夫高堰地形甚卑至越城稍亢越城迤南則又亢故高堰決則全淮之水內灌冬春不止若越城周家橋則大漲乃溢水消仍為陸地每嵗漲不過兩次每溢不滿再旬其不同一也高堰逼近淮城淮水東注不免盈溢漕渠圍繞郡郭若周家橋之水即入白馬諸湖容受有地而淮城晏然其不同二也淮水從高堰出則黃河濁流必遡流而上而清口遂淤今周家橋止通漫溢之水而淮流之出清口者如故其不同三也當淮河暴漲之時正欲藉此以殺其勢即黃河之減水壩也若并築之則非惟高堰之水增溢難守即鳯泗亦不免加漲矣然則即於周家橋疏鑿成河以殺淮河之勢何如馴曰漫溢之水不多為時不久故諸湖尚可容受若疏鑿成河則必能奪淮河之大勢而淤塞清口泛溢淮揚之患又不免矣況私鹽商舶由此直達寧不壞鹺政而虧清江板閘之稅耶一嘉靖十四年先任總理劉天和題勘議都御史朱裳所請祖陵東西南三面量築土隄以障泛溢內開行據稱祖陵在泗州城東北相距一十三里坐北向南地俱土岡其岡西北自徐州諸山發脈經靈璧虹縣逶迤起伏數百里而來㑹秀含靈至兹聚止陵北有土岡聨絡倚負南有小岡橫亘依憑小岡之北間有溪水漲流先年置橋利涉凡謁陵官員俱至此下馬是西北二面土岡聨屬永奠無虞其南面小岡之外即俯臨沙湖西有陡湖之水亦匯於此沙湖之南為淮河自西而來環繞東流上有塔影廬湖龜山韓家柯家等湖但遇夏秋淮水泛漲則西山黃岡口東由直河口瀰漫浸溢與前項湖河諸水通連㑹合間或淹及岡足及下馬橋邊惟正德十二年大水異常漲至陵門遂侵墀陛此則曠百年而一見也今欲遵奉原題東西南三面量築土隄一節職等淺見欲自下馬橋邊及林朩左右築堤則板築震驚鍤斧掘伐關係匪細固非職等所敢輕議欲自陵前平地築隄則積水長盈羣工難措抑且逺無所禦近有所妨亦非職等所敢輕議又欲東自直河口西自黃岡口上下五十餘里間逺築圍繞但恐此隄一成淮河一時泛漲之水雖稍能障蔽傍溢而陵前湖河諸水又將阻遏北侵名雖防河實則蓄水逺流未及為患而近水先有可憂者矣尤非職等所敢輕議者也又據匠役王良等量得自淮河見流水面至岸地北水高七尺又自岸至下馬橋邊地高八尺四寸橋邊至陵門地髙六尺陵門地至陵地高一尺七寸共高二丈三尺一寸況基運山雖俱土岡百餘年來每嵗水溢未聞衝決實我三祖陵寢萬年根本之地百祥肇始之區委的事體重大未敢遽擬等因到職隨該職公同各官恭詣祖陵伏瞻環仰博訪備詢亦與各官㑹議相同竊惟祖陵數百年來奠安巳久今一旦添築土隄雖水患固當預防而工役豈宜輕動委的事體重大非職等所敢輕議等因職按前疏係嘉靖十四年所題地勢水勢頗為明悉據稱陵地迥高二丈三尺一寸則雖極大之水亦無高出元宫者且陵前湖河諸水向來伏秋漲溢如此要知非築高堰後始然矣一查據泗州申稱萬厯三年該奉祀朱宗唐具題䝉南京工部委主事郭子章前來㑹同潁州兵備道勘得水勢洶湧風浪衝擊崖岸逐漸坍塌逼侵柏林包砌石工計長二百二十六丈至泄泗州之水此言甚易惑人既非志乘有據之言又非合衆通方之論執已見以淆國是如之何其可哉纍經勘議並未有考訂詳確闡發明悉者若知泗州伏秋淮水之漲即知徐邳河南每嵗黃河之漲必不可免止宜隄防則其議自息矣高堰為淮揚門戶隄防不可不嚴修守不可不預內除石堤三千丈外兩頭土堤每嵗伏秋畫地分守隨汕隨葺似可無虞矣但幫護之法須於冬春門樁內貼席二層緊捆草牛挨席密護毋使些須漏縫然後實土堅夯則是以樁席護草牛以草牛護土浪窩何從得來至於密植橛栁茭葦以為外護須於水落即種庶免淹浸是在當事者加之意耳清口乃黃淮交㑹之所運道必經之處稍有淺阻便非利涉但欲其通利須令全淮之水盡由此出則力能敵黃不為沙墊偶遇黃水先發淮水尚微河沙逆上不免淺阻然黃退淮行深復如故不為害也往嵗高堰潰決淮從東行黃亦隨之而東清口遂為平陸今高堰築矣獨慮清河縣對岸王家口等處淮水過盛從此決出則清口之力微矣故於清河縣南岸築隄一千一百八十丈今又接築張福口隄四百四十餘丈以防其決蓋為此也工若甚緩而關係甚大巳經題奉明㫖每嵗專責清河縣掌印官責差的當員役看守如遇塌損即便修築更有一事尤宜稽察河南鳯泗等處商販船隻最利由此直達每為盜決須嚴防之泗州先春亭記云景祐三年秋清河張侯以殿中丞來守泗上既至問民之所素病而治其尤暴者曰暴莫大於淮越明年春作城之外堤因其舊而廣之度為萬有九千二百尺用人之力八萬五千泗之民曰此吾利也而大役焉然人力出於州兵而石出乎南山作大役而民不知是為政者之私我也不出一力而享大利不可相與出米一千三百石以食役者堤成髙三十三尺土實石堅捍暴備災可久而不壞既曰泗四達之州也賔客之至者有禮於是因前蔣侯堂之亭新之為勞餞之所曰思邵亭且推其美於前人而志邦人之思也又曰泗天下之水㑹也嵗漕必廩於此于是治常豐倉西門二夾室一以視出納曰某亭一以為舟者之寓舍曰通漕亭然後曰吾亦有所休乎乃築州署之東城上為先春亭以臨淮水而望西山是嵗秋豫貶夷陵過泗上於是知張侯之善為政也昔周單子聘楚而過陳見其道穢而川澤不陂梁客至不授館羇旅無所寓遂知其必亡蓋城郭道路旅客寄寓皆三代為政之法而周官尤謹著之以為禦備今張侯之作也先民之備災而及於賔客往來然後思自休焉故曰善為政也先時嵗大水州幾溺前司封員外郎張侯夏守是州築隄以禦之今所謂因其舊者是也是役也隄為大故余記其大者詳焉閲此則知淮漲於泗自古為然又何咎於高堰也河防一覽郡丘劄記云高家堰不見於史而僅見志為漢建安五年廣陵太守陳登所築余因考三國志注登曽仕典農校尉乃巡土田之宜盡鑿溉之利蓋精於水利者當時廣陵太守江表𫝊以為治射陽則此堰尤其密邇為登築復奚疑獨怪自建安五年至明永樂平江伯陳瑄修治時凡一千二百十五六年中間並無人云及高堰者豈湮廢無迹與抑堰止受洪澤諸湖黃淮尚未合而不聞其有潰決之患與及讀宋史楚州司戶參軍李孟𫝊加葺境內徐積墓修復陳公塘有灌溉之利陳公塘即今高堰也堰固不乏修治第史文不備耳同時真州東有陳公塘一名愛敬陂漕臣錢沖之修復門下李道𫝊為作記何一時而並舉與豫於此别自有感矣史稱陳元龍才兼文武志在濟民其時吳冦壓境蓋岌岌矣乃能興屯彊兵保障江淮一南一北水利永賴今平江既有專祠矣吾以上當冠以元龍下當祠以潘季馴為三公合祠蓋皆勤於高堰者或亦此地食安瀾之福者所宜動心也與行水金鑑卷六十三
