body:
  text: 行水金鑑卷六十五江南按察使傅澤洪撰淮水世祖章皇帝順治六年夏五月息縣淮水溢壞民舍田禾平地水深數尺牛畜俱淹死河南通志深是年泗州城中水丈餘見州志世祖章皇帝順治九年戶部左侍郎王永吉詳陳導淮入海情形并議夫料錢糧諸務疏曰治河必先治淮而導淮必先開海口按黃水自邳宿而下至清河口淮泗之水聚於洪澤湖亦出清河口淮黃交會東入於海然黃強淮弱勢不相敵淮泗逼而南趨直走四百餘里出瓜州儀真方能達江一線運河收束甚緊即有大小閘河沿途宣泄而海口不開下流壅塞來水無窮去水無路所以河堤潰決修築嵗費金錢九載以來八年昏墊海口之當開固時刻不容再緩者也查海口之在興化縣境內則有丁溪場小海場劉莊場神台場廖家港白駒場之斗龍港等處在泰州境內者則有河垜場之茅墩港草堰場之鴨兒港近丁溪場之馮家壩合洋溝等處以上諸口俱被豪棍鹽徒漁利阻塞間有開者亦於口外築壩橫攔水不通行若在鹽城縣境內者縣治東南則有石墶海口西北則有天妃海口先年俱各造有石閘又有薑家堰海口流出推船港先年亦曽議造石閘以上三處係淮揚六州縣泄水要道今石墶閘既稱逼近城郭不利風水而天妃薑堰二口復被附近姦民將閘門實塞河口填平滴水不通咽喉重地嵗嵗陸沈日不聊生死徙載道害民病國關係匪輕而未即舉行者其故有二一則恐姦徒造言阻撓然萬水東流勢必趨下沿海州縣各有海口乃天造地設非人力所為行水河港皆有舊迹近因湮塞未免淤淺開鑿深通還其故道豈屬創舉況先年舊閘巳圮者加工修葺未造者量議增添題定閘官閘夫以時啓閉有利無害固灼然無可疑者一則因河道甚長河帑有限工料既難措處民夫復奉新旨不許僉派凡事甚多掣肘然海口既開則河隄不決修閘造閘之費較之塞決修隄孰多孰少若挑濬淤淺需用人夫動輒數萬自當州縣協濟豈能盡動官帑百姓自救身家何辭力役此一勞永逸之計固士民所心悅而樂輸者也伏乞聖恩敕部酌議亟行江南通志世祖章皇帝順治十五年淮水溢民稼為傷河南通志世祖章皇帝順治十六年歸仁堤決水自翟壩谷溝下灌諸湖江都瀕湖田舍水深六七尺高寶則浸及城郭月餘乃潰漕堤而東注興化墊焉揚州府志聖祖仁皇帝康熙元年歸仁堤再決時部司有開周橋閘者淮水大泄而黃河逆入清口又挾睢湖等水從歸仁堤決口入與洪澤湖相連直抵高堰衝決翟家壩流成大澗九條在上流泗人既利積水得泄而下流揚屬姦民亦利私販直達可避征𣙜互為掩覆不以籲聞以故患日益深翟壩周橋晝夜水常東注悉歸諸湖淮揚自是嵗以災告揚州府志聖祖仁皇帝康熙六年七年黃河屢決清口亦塞淮不出口刷黃而黃之下流既阻上流奔注洪澤之勢益甚揚州府志黃強淮弱勢本不敵淮為黃扼别由大澗口施家溝周家橋高良澗武家墩等處散入射陽湖白馬湖草子湖高寶等湖由湖迤邐入江此淮之支流也明隆慶六年淮大溢適黃水亦漲相逼不得直下沙隨波停遂將清河淤塞所謂門限沙者是也萬厯二年淮又溢總河潘季馴始為高家堰祗築大澗口一處淮猶可泄後將小澗口等處凡入湖舊道盡築隄防自是清沙日高淮水益壅而泗大病矣郡紳常三省遍揭當道力辨其非但隄工巳成持議益固至萬厯二十一年水患益烈巡按牛應元親行踏勘始議開金家灣芒稻河泄湖水入江繼議開周家橋泄淮水入湖又以淮受黃逼乃先開武家墩以殺其勢此議開三閘之由來也是後定計分黃以腰鋪地勢不若黃家觜為便特奏請監督大發河南山東江北等處民夫自黃家觜而下直至漁溝浪石由安東北俱疏為河身歸五港口使獨入海不趨清口逼淮令得縱出又督撫褚鈇定計導淮先濬金家灣芒稻河以為湖水入江之路又開子嬰溝由射陽廣洋湖入海下流既通上流仍阻始建武家墩閘由永濟河達涇河下射陽湖入海建高良澗閘由岔河亦入涇河下射陽湖入海建周家橋閘由草子湖寶應湖入子嬰溝下廣洋湖入海上下之水流通自不橫逆為害不獨泗境安即淮揚高寶亦安此建三閘以分黃導淮治湖之所由來也本朝定鼎康熙三年淮溢武家墩高良澗閘堤頽卸且土石填塞周家橋復啓閉失時淮水遂無從分泄矣是後定計蓄淮刷黃乃復築翟家壩夫翟家壩至周家橋三十里在高家堰南地勢高亢原無堤埂康熙七年奉朝命明馬二大人同河漕兩臺踏勘明白回疏稱為天然減水壩水漲聽其漫溢仍責令高寶等縣之民但填平衝開決口不許一概加土增高以塞水路今則堤非昔比矣然與其堰水為功何如分導開閘舊制猶可倣也泗州志聖祖仁皇帝康熙九年五月暴風雨淮黃大漲浪撞卸高堰石工六十餘段衝決五丈有餘又將烏沙河西堤岸衝倒淮黃之水直注於高寶湖見總漕帥疏當是時高堰幾崩淮揚二郡殆矣哉水之合淮黃從諸決口以注於湖也江都高寶諸有司無嵗不防隄晝夜巡警增堤與水俱高然以數千里奔悍之水攻一線孤危之堤值西風鼓浪堤崩聲如雷一瀉萬頃其決愈遲為害愈劇而江高寶泰迤東無田地興化以北無城郭矣時御史徐越高堰關係最重疏曰臣之向請修復歸仁堤石工使由白洋河入黃者不止以清刷黃實為截住高家堰西北水勢使此堰僅受西南淮水而為運道民生一大屏障也今因歸仁堤工尚未舉而此堰黃淮併受前報巨浪搏擊巳壞石工六十餘處而全堰幾至潰決此九年事其洪波橫流排山倒海巳衝開淮揚一帶數十餘處決口遂至城郭僅存關廂陸地有水高丈餘者萬一高堰突有疏虞尚復有淮揚數十州縣之城郭乎而況民生乎尚復有漕河運道可以飛挽乎而況鹽課與商稅乎則此堰之關係如何重大此堰之保障如何緊要故臣今不得不亟陳高家堰也高家堰石工曩皆鑿石扣準鎔鐵灌釘後來年深日久各處有朽裂從未大修經今年一翻波浪衝擊動搖處處罅損若不亟議錢糧預備物料乘今冬水勢少落之一時大修堅築明年西水漲發臣愚竊慮此堰萬難幸保堰若失守淮揚數十州縣城郭廬舍百萬生靈俱屬波臣運道梗廢京師重地所緊需嵗漕數百萬石何道輸轉且雲梯關之海口全賴黃淮二河併力衝刷一決高堰清口必淤止餘濁流一股海口必塞海口一塞則下壅上潰即今日之大修兩河工程勢必仍歸潰壞此高堰之利害不僅僅在淮揚而實有關於天下者也布政司慕天顔備陳黃淮全局疏曰高家堰捍衛洪澤蔽於淮城之南迤西則連髙良澗翟家壩中設周橋閘其地比高堰稍亢故壩閘亦比高堰稍低蓋夏秋淮水盛發高堰必危高堰危而淮地陸沈矣故不使翟壩增高正欲從壩滚水出汜光白馬高寶諸湖不惟鳯泗之漲潦可稍抑且高堰之築工永固及至水平壩西即閉閘不流高寶漕堤亦無傷害往昔防河如此周密止因康熙元年間南河工部分司吳煒擅開周橋姦商利通私販往往盜決翟壩諸處以致淮水湍下諸湖盡巳盈滿及桃花水漲湖不能容浪擊風摧漕堤大壞清水潭之決所從來矣淮水既東黃躡其後濁流西泝清口遂湮清水漸微黃力愈悍灌入天妃閘沙隨水漫而運道淺塞矣黃淮相背淤沙罔滌雲梯關入海之路日墊日高下流哽咽而上流四潰必然之勢也又云淮瀆自桐柏千溪萬壑匯為洪澤湖注出清口其水會黃入海者十之八引資漕渠者十之二唯清口無病則湖水直瀉而北勢盛足以敵黃而黃沙不致倒灌運道惟海口無病則黃水疾趨而東其勢迅激自無淤墊之阻而奔流不致橫潰四決此以清刷黃用水治水千古不易之法也王乾清紀周橋閘曰按周橋關係利害前河郎中黃曰謹辨疏極為詳明黃疏略曰高家堰與周家橋相接一堤也堰以內與橋以內之水相連一淮也使周橋可開則高堰何所事守高堰必守則周橋斷不可開故開周橋者乃開堰之别名也又曰水之就下性也周橋地形高下勢甚相越誠開之是導以建瓴之勢矣彼得其勢則流必急流急則一瀉千里孰得而禁之故謂周橋開而淮不盡東淮盡東而黃不復躡必無之理也又曰開周橋而注之湖是以湖為壑矣夫高寶之湖四時彌望連天所恃一線漕堤為之保障若引淮入湖則淮水之浩蕩無涯湖面之容受有限不至決裂湖堤而奔潰四出不止也又曰淮之入湖也易湖之入江也難何也湖堤以外地形窪下與江面不甚昂故今通江之路晝夜宣泄而湖水不見大消使復益之以淮源源不竭則七州縣不胥而為沼乎後因萬厯二十五年淮水大漲浸及泗陵總河楊公建閘以泄一時暴流稍平即閉從未常開前賢亦云東去最宜開海口西來切莫放周橋蓋周橋開而海口塞黃遏淮也周橋閉而海口通淮刷黃也淮出清口刷黃濟運則涓滴皆為利益淮入內湖潰堤病民則涓滴皆為害源若內湖增一分漲堤病民之淮則清口便減一分刷黃濟運之淮故周橋之啓閉實為利害之關不可不察也高郵志紀翟家壩曰壩屬山陽在周橋迤南接盱眙境界長二十五里比高堰石工低二尺許稱天然減水壩中有古溝深不過尺許舊有石閘亦有石限止留四尺水頭水入民田不通河路近因淮水漲發土被衝刷年久漸成低陷加以私鹽漁戶時行偷挖漸成河港淮水徑入寶應湖匯於高郵嵗嵗決堤為漕大害康熙七年奉旨令山江高寶四州縣民力合修盱泗之民妄行阻撓如明萬厯間阻撓修築高堰故事給事中李宗孔疏參致煩大臣勘復按壩北接連周橋閘閘尾石工尚存與壩相平又古溝廟基亦是見存式樣宜復舊制豈欲加高惟水衝盜挖儼成澗河淮水平時直流無阻灌滿諸湖水發湖盈遂不能受致害漕堤為國大患每嵗起民夫修築不過補苴一時一遇水至即被刷衝纖毫無益必另議興工或磚或石築成隄岸平鋪壩基方可過水經久不壞工科李宗孔參阻修翟壩疏曰竊思高寶七邑連年疊遭水災者則以淮水南流入湖決堤之所致也淮水舊由鳯泗自老子山北直出清口與黃水會流入海此厯年北流之利安瀾便漕之故道也自老子山南周橋閘翟家壩一帶注射髙郵寶應邵伯諸湖而下流阻於漕堤曽無入淮之路以致每年潰決此南流之害淮揚七邑被災之由皆因泗盱地方私開決口也蓋淮水至清而流急必全淮皆出清口則淮水力強可以拒黃流之淤泥有濟於運道而高寶七邑復無水災故昔人設有周橋閘翟家壩二處蓄泄有方淮水漲則量使漫壩南下而鳯泗之水患不作淮水不漲則阻其南去傍流而清口之水力不分法甚善也邇來泗盱之民不惟私啓閘壩又且潛開決口自古溝鎮南鎮北以及谷家橋夏家橋等處新開溝路至有八條淮水大半入注湖清口水分力薄無以刷黃河之濁泥下流壅則上流易潰而高寶諸湖受水而無所泄乃至衝決堤岸為淮揚七邑之害臣詳查近日地形翟壩以南固有殘缺而衝決大溜盡在翟家壩之北今將古溝鎮南鎮北等處原係平地者止令塞其決口并不築堤加高其閘壩地形不過復從前未決之舊址使全淮盡由清口會黃不至潰決入湖可永杜高寶七邑之災倘有時淮水暴漲仍可從壩上滚水南下亦不為鳯泗州縣之害誠兼利無患之至計也揚州府志聖祖仁皇帝康熙十二年河決洪澤湖之高良澗又決高郵運河之清水潭淮安府志聖祖仁皇帝康熙十五年河決武家墩板工一處髙家堰石工七處高良澗板工二十六處淮安府志是年大水淮黃復大決高家堰時頻年被水諸堤工俱未竣淮河正道日益阻塞是年五月因久雨遂大潰決前此諸工盡廢高堰一帶倒卸三十餘處水侵揚屬又過往年三之一漕堤崩潰髙郵之清水潭陸漫閘江都之大潭灣等處共決三百餘丈殘缺不可勝數深及四五丈不等自堤以東浩浩乎茫無際涯矣揚州府志聖祖仁皇帝康熙十六年六月總河靳輔大挑清口爛泥淺引河四道及清口以下至雲梯關河道是年創築雲梯關外束水堤一萬八千餘丈塞于家岡武家墩高家堰等處大決口十六處靳文襄公治河書聖祖仁皇帝康熙十七年創築周橋翟壩堤工二十五里塞高良澗等處大小決口二十五處淮水始歸故道淮安府志聖祖仁皇帝康熙十八年六月總河靳輔恭報翟家壩成河九道盡行閉合龍門各日期奉旨據奏翟家壩成河九道盡行閉合龍門具見殫力籌畫有禆河務深為可嘉知道了該部知道靳文襄公治河書聖祖仁皇帝康熙十九年大挑爛泥淺裴家厰等處皆成大河淮水始暢注會黃不致阻滯創建周橋高良澗武家墩唐梗古溝東西減水壩共六座是年夏秋南北皆霪雨七十日淮黃並漲有滔天之勢堤岸衝嚙甚多工亦為之阻然衝嚙之堤隨圮隨葺不致大患卒賴新築工堅之所致云淮安府志是年再大挑清口爛泥淺裴家場帥家莊引河四道淮水全出清口靳文襄公治河書是年淮水暴漲壞泗州城郭公私廬舍漂沒無算居易録聖祖仁皇帝康熙二十三年十一月初十日聖駕南巡閲高家堰工是日微風小浪上云今日風不大就是這樣浪若再風大怎麼處總河臣靳輔回奏風再大時就要打上堤頂若西北大暴風一起浪俱從屋上過了上云真是利害又問照黃河險工下大掃防護如何回奏大掃下了總是大浪來當時就掣去了除非是下丁頭掃庶幾略加攩護然亦要每年修補的上曰朕前番差人出來看工俱是瞎看是看銀子罷了聖祖仁皇帝康熙二十四年九月總河靳輔題為霪霖之漫漲非常等事部覆奉旨這高家堰堤工應否加修著總河靳輔再行確議具奏十月二十三日大學士勒德洪等傳上諭高家堰堤工關係最要應令總河靳輔進京面與九卿詹事科道會同確議詳見黃河聖祖仁皇帝康熙二十八年正月二十九日聖駕南巡駐蹕瓜洲陳家灣地方奉上諭高堰石工著修理聖祖仁皇帝康熙三十一年二月初二日工部題奏臣等議得戶部侍郎博濟等疏稱高家堰減水壩六座內有古溝東減水壩底被水衝損其三官廟等六口向來下掃今改竹絡巳完三處尚有未完應令照此修完七里閘雁翅以內底石被水衝損二丈有餘應令河臣速行修理太平閘并傍束水壩仍應令酌量開放十一月二十四日奉旨高堰障淮敵黃關係最為緊要若使堤內受水則內外浸灌衝激甚屬危險高堰之堤不固雖另增堤數層有何禆益這運料小河增加隄岸無用高堰應作何加修以期永逺堅固應遣大臣前往察視所遣大臣職名開列具奏十二月初一日奉旨著張玉書圖納去靳文襄公治河書行水金鑑卷六十五
