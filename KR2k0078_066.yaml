body:
  text: 行水金鑑巻六十六江南按察使傅澤洪撰淮水聖祖仁皇帝康熙三十五年十月十二日總河董安國題奏兩河見在情形奉㫖著江南總督漕運總督江寧安徽巡撫公同速行㑹勘確議具奏㑹議得查清口為黄淮門户引清敵黄所係甚大祗因爛泥淺帥家莊裴家塲三道引河勢分力弱每逢倒灌動輒淤墊應從大墩接築長堤挑濬裴家塲引河逼令全湖之水匯歸出口併力敵黄又自清口歴武家墩髙家堰髙梁澗徐壩以抵翟家壩除小黄莊以南新石工見在興砌外其武家墩元帝廟後堤工卑窄昔為沙灘今成巨浸急應加幇髙寛舊石工五千八百餘丈内倒卸石工八百七十八丈急應修砌又石工頂上排樁風浪衝擊日久朽壞應重修釘并於排樁之内加以木板填築土方再於堰堤之上已築子堤者普面加髙未築子堤者一律加築堤裏内戧霪雨淋漓亦應如式酌修茅家圍等減水六壩應加修砌并添設磯心建置閘板淮弱則下板蓄水以敵黄淮漲則啟板減水以宣洩翟壩一帶堤工低窄不堪今秋異漲漫堤過水均應加幇奉㫖河工闗係重大這㑹勘應修應築工程俱著照該督等所題作速興工該部即將錢糧撥給其海口為黄水入海之道所闗甚屬緊要河道總督每年委賢能河官耑管修理勿致壅滯該部知道河防志總河王新命疏言禹王古河自盱眙聖人山歴黑林橋桐城鎮楊村天長縣以連六合之八百橋各有河形溪澗山岡不等若開引入江則天長楊村桐城各汊澗大水發時可不入髙郵邵伯諸湖湖水不致泛溢而下河之水可減至古河之口見與淮水不相通流必建立閘座水小則閉閘以濟漕水漲則開閘以洩水庶淮水洶湧之勢可殺髙堰減水壩即不便遽塞而水亦可少減是古河所減者乃於淮水暴漲之時而非時常分洩淮河之水似無不可以敵黄至天長楊村桐城挑河入江之後若入湖舊河一帶居民用水灌田或建閘或建壩再行酌議等因九卿詹事科道㑹議得開復禹王古河之處無庸議奉㫖古河是否必可開濬後有無禆益河道民生著該督撫等再行確議具奏按李翺來南録自淮沿流至於髙郵乃泝至於江沈括以為淮泗固常入江此乃禹之舊蹟也熙寧中曾遣使按圖求之故道宛然居易録禹貢沿於江漢逹於淮泗自古江不通淮江之通淮自隋開皇大業間始閻百詩先生曰淮水入江自孟子一時誤記朱子所謂不必曲為解説最是然鄭夾漈已强為之説曰按左𫝊哀公九年吳城䢴溝通江淮自是江淮始相通孟子蓋據哀公後吳王夫差所掘之道以為禹迹而忘却禹貢不知亦非然也千百年眼亦有孟子盖指夫差所掘之溝以為禹迹之説杜注明謂於䢴江築城穿溝東北通射陽湖西北至末口入淮乃引江逹淮與孟子排淮入江者不合直至隋開皇開山陽瀆大業開邗溝皆自山陽至揚子入江水流與前相反至是孟子之言始驗蓋古時江髙淮低故江水入淮今淮為黄河所奪淤沙日久轉而為淮髙江低也先生嘗謂孟子説錯了淮入江後九百餘嵗果自淮南入江若孟子預為之兆者亦屬異事又按筆麈言夫差溝通江淮以窺中國後人以淮水低溝水髙故立堰以防之舟行度堰入淮謂之北神堰在楚州城北五里即今土壩所由始也周世宗南征以舟師自淮入江阻於此堰乃鑿楚州西北老河水以通其道而淮水之舟皆達於江其説亦有理百詩先生又於潛丘劄記中昌言之曰孟子錯言排淮入江至隋文帝開皇七年將伐陳韓擒虎於揚州開山陽瀆以通漕煬帝大業元年以䢴溝水道屈曲發民濬治自山陽至揚子入江渠廣四十步孟子之言始驗所以唐白居易詞汴水流泗水流流到𤓰州古渡頭是也近河臣疏云孟子大賢去禹僅千餘年必不為無據之言况舊迹至今可考以盱眙縣治東二十里有聖人山山下有禹王河一名古河土人咸稱大禹治水導淮入江故道為據余考之明一統志盱眙縣山川有新河在彭城鄉宋發運使蔣之奇開浚以避淮流之險猶未詳及讀宋史蔣之奇列𫝊元豐六年之奇擢江淮荆浙發運副使請鑿龜山左肘至洪澤為新河以避淮險自是無覆溺之患詔增二秩陞發運使河渠志元豐六年正月戊辰開龜山運河二月乙未告成長五十七里闊十五丈深一丈五尺初發運使許元自淮隂開新河屬之洪澤避長淮之險凡四十九里久而淺澀熈寧四年皮公弼請復濬治起十一月壬寅盡明年正月丁酉而畢人便之至是發運使羅拯復欲自洪澤而上鑿龜山裏河以逹於淮帝深以為然㑹發運副使蔣之奇入對建言上有清汴下有洪澤而風浪之險止百里淮邇嵗溺公私之載不可計凡諸道轉輸涉湖行江已數千里而覆敗於此百里間良為可惜宜自龜山蛇浦下屬洪澤鑿左肘為複河取淮為源不置堰牐可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年田棐任淮南提刑嘗言開河之利其後淮隂至洪澤竟開新河獨洪澤以上未克興役今既不用牐蓄水惟隨淮面髙下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦博矣祐甫曰異時淮中嵗失百七十艘若捐數年所損之費足濟此役帝曰損費尚小如人命何乃調夫十萬開治既成命之奇撰記刻石龜山後建中靖國初之奇同知樞密院奏淮水浸淫衝刷堤岸漸成墊缺請下發運使及時修築自是嵗以為常乃知疏所謂聖人山者即盱眙縣東北龜山也下有禹王河即蔣之奇元豐六年所開龜山運河也一名古河又即一統志所載之新河豈可以土俗無稽之言而據為金條玉律哉又豈可以孟子一時之誤記而謂禹貢為不足信哉曩嘗聞諸先輩言江髙而淮下禹必自淮浦入海者正行其所無事以下為趨也今欲從𤓰埠入江無論謝家鍾家曾家岡及分水嶺為所畫斷勢必燒山鑿道且江受淮水而地形實髙淮水趨江而形實窊下奈何疏又云循沿河形細閱有現在河形淤涸成田者有溪流溝澗寛窄不一者有山岡平陸髙低不等者疏已自言有山岡禹時導淮入江不虞此山岡阻塞乎抑此山岡乃陡生於禹治水之後乎自相矛盾莫此為甚至淮徑入江不復濟淮揚運道不數年而國計民生交受其病有不可言者則人所共曉不復贅云記中所言河臣即築攔黄壩之董安國也安國亦誤聽泗州莫之翰之言遽行入告不學無術一至於此泗州志有莫之翰請開禹王古河詳文曰禹之治淮原有二道禹貢之書曰導淮自桐柏東㑹於泗沂東入于海此一道也孟子曰排淮泗而注之江又一道也子輿去大禹治水時僅一千九百餘年使無實據必不著之於書况其舊跡則至今可考也查盱眙縣治東二十里有聖人山山下有禹王河據土人咸稱為大禹治水導淮入江之故道汴宋時尚通舟楫為東南運道迨宋南渡以迄元明日就陻塞而明初又於山麓穿渠之處増土築斷以避祖陵風水反跳之嫌其見在河形深淺不一始盱眙歴天長六合以逹大江在在皆有遺址每風雨晦冥氣勢蜿蜒如長河雲烟霧靄中土人嘗彷彿見風帆舟檝如鼓棹挽拽狀其天時晴明河身地内間作簫管聲居民呼朋引𩔖相率往聽不一而足大抵江淮流通之脉絡不肯終秘而以開導鴻功黙啟後賢也此河一開可分淮流十分之四而濵淮上下可免魚鱉其利一也三閘之水可勺滴不入髙寶將見沮洳之民降丘宅土下河之工計日可成其利二也其洪澤湖渟滀之水不至大盈亦不至大涸不大盈則鴻濤無所肆其號怒而遥堤鞏如磐石下流州縣可無燕雀處堂之禍其利三也不大涸則漕艘往來得以安行入河既免狂濤之險復無膠剥之煩其利四也且江淮交通檣帆絡繹利在商賈其利五也土著之民引水溉田蓄洩以時無憂旱澇其利六也天長縣志亦有其説志云或問孟子言排淮泗而注之江今何以㑹黄而注之海也曰淮泗未嘗不可以注之江也注江之路有三今由髙郵邵伯白馬草子湖從𤓰儀閘一也由盱眙天長六合一也今此渠變為桑田矣由邵伯入芒稻河入江一也又問史稱隋煬帝鑿汴梁以通揚州看瓊花閱龍舟渠成剪綵為芰荷錦纜牙檣美人撁拽則自汴至揚州有河無疑世𫝊自天長六合間以逹揚州觀音閣為聚舟馬頭今羅四橋之西北河身猶存循而尋之徑自河南分勢下洩或直逹揚州儀真或中出泥汊河以洩淮泗之水可乎曰此第一義也皆捕風捉影之語不足據也小谷口薈蕞聖祖仁皇帝康熙三十八年三月初一日聖駕巡幸髙家堰閱視畢隨諭大學士伊桑阿等朕念河道國儲民生攸闗親行巡幸由運河以至髙家堰運口等處留心細閱見運口太直黄水倒灌兼之湖水淤墊以致清水不能暢流各河與洪湖之水如何得能敵黄若將清河至惠濟祠掃灣由北岸挑引入惠濟祠後入河而運河再向東斜流入惠濟祠交匯黄水如何能得倒灌今應將清口之西壩臺加添挑水壩修築堅固加長過於東壩臺將清口安置裏邊洪澤湖擇其水深之處開直成河使湖水流黄河灣曲之處直挑引河使各險處不得受衝上謹按詳諭甚且悉今止録髙堰餘見黄河四月二十四日河道總督于成龍協理河道府尹徐廷璽奉上諭髙家堰速速修完下河田地不過一二年可以見出二十八日奉㫖于成龍爾回去即看歸仁堤髙家堰其歸仁堤作何修補爾等即議明具奏清口甚屬緊要九月十三日上諭大學士學士九卿今歳朕南巡看得黄河逼近清口黄水每多倒灌以致淤墊洪澤湖水不出自髙堰各壩流入髙寶諸湖自髙寶湖流入運河以至下河田地盡被淹没淮揚所屬錢糧雖頻年蠲免賑濟動帑修理堤岸羣黎尚在水中朕深為軫念遂諭于成龍動帑挑濬洪澤湖出水堤岸令其完工近差工部官員前往查勘清口仍然淤墊洪澤湖水仍未出口堤岸尚未告竣等語清口甚為緊要如不將清口挑濬湖水不出髙堰堤工并運河堤工雖加髙厚均屬無益董安國所挑之河再加挑濬此河如不可挑或將清口迤北逺移挑濬之處大學士九卿詹事科道㑹同看閱河圖速行詳議具奏㑹議得臣等看閱河圖黄河逼近清口是以淤塞應作速挑浚不可不將黄河移逺應請勅下總河于成龍等將清口挑濬令其出水或將黄河移逺清口或即將董安國所挑之河再加挑濬詳看趁今冬急為興工不至水長之處速行定議具題可也總河題覆九卿復議得河道總督于成龍等疏稱臣等率同道㕔各官歴清河縣石人溝以上沿河踏勘逐段簽探徧處盡係淤泥深有七八尺丈餘不等人夫無立足之地難以施工臣等再四思維竊以黄河大溜勢若排山若逺移改挑工大費繁且清口對過北岸一帶積水淤沙畚鍤難施臣等未奉俞㫖之先已經催督降調同知常維楨見挑裴家塲爛泥淺等引河不日可竣又委堵閉唐埂等處減壩應俟各壩堵塞之後使湖水不能東洩引岀敵黄以免淤墊之患再將董安國所挑引河復加挑穵挑水壩再為接築黄水由引河而趨北岸可無倒灌之虞至於逺移改黄之處統俟湖水出後酌定形勢另行奏請遵行董安國已經病故未完引河挑水壩二工應否動帑挑築理合一併具題等因前來相應均如該督等所題董安國未完引河挑水壩應准其動帑挑築俟河工告成之日將用過錢糧准銷等因奉㫖依議二十日户科掌印給事中張睿題奏邇年以來淮南水溢下河數被奇災皇上恤念民生親臨閱視灼見清水不出黄水必不能疏黄水不除清水必不能出乃特賜指授命前河臣董安國等將黄河灣曲處挑引水河一道使水直下逺避清口免其倒灌此殆神靈天授非臣下意計所及萬姓歡呼竚看底績但新挑引河必俟水汛大發始行開放則刷沙有力一舉成功因放水太早以致復淤頃恭讀上諭清口甚為緊要如不將清口挑濬湖水不出髙堰堤工并運河堤工雖加髙厚均屬無益真聖明洞鑒全河瞭若指掌臣下所宜仰體聖懐蚤夜以圖者也臣聞居民𫝊説中河水從仲莊出口建瓴之勢逼溜使南是以直射湖口不獨清水難出而黄水反為易入則欲挑浚清口不得不制中河之水以制黄河之水矣又讀上諭謂將董安國所挑之河再行挑濬或將清口迤北逺移挑浚之處速行詳議臣恭繹再四則有分黄導淮之法蓋黄分則勢强而清口不當頂衝從此疏浚自不難矣其分黄之䇿不必另闢河道工費繁多合無於仲莊閘以下見有不係運道之中河自清河縣起至山陽之草灣附近地方止約長七八千丈挑寛十餘丈以足二十丈之闊上口將縷堤挖通使黄水由此分洩至下口亦挖通縷堤仍歸大河㑹流入海再於挖通縷堤之上下口倣明紹興知府湯紹恩三江口遺制建立雙板石閘中實以土以時蓄洩如此則中河之水由此而去黄河之水亦由此而分北岸水勢既殺則南岸之水勢必趨而北矣董安國所挑之新河有不刷深直下誠如聖慮者乎再將清口去其淤墊引湖水暢洩不獨清水刷黄以濟運由是清水東下而唐埂六壩過水漸少然後周橋翟壩易於修築得以閉塞庶免下河昏墊之憂且省朝廷嵗發帑金之費其於治河之道或有小補也如云河不兩行謂分則力弱緩則沙停而獨非所論於清口以清刷黄原取其弱以水攻沙不患其停况建閘又可以蓄洩也臣生長淮土素聞土人之言無所折衷不敢漫信因奉上諭所及謹擇其稍合者具疏上聞以備採擇奉㫖這本説得是著河道總督速議具奏總河題覆分黄導淮之法未嘗不得河防機宜但黄河之水勢大力强難以輕議分洩何也穵堤挑河而水勢不趨或趨之而溜行不急開放之後立見沙淤董安國所挑之引河坐於河身之中對河又築挑水大壩歴過伏秋二汛水勢大漲猶不能挑之北行奚能强之入於雙金門閘下之中河乎若開穵縷堤而溜趨引河則排山之勢難於止遏從前漫缺皆係罅隙之間即成缺口安能必之循軌而行由二十丈寛之中河逹之草灣仍復紆迴使之入於黄河而不他溢乎且清口對過北岸皆係淤沙人夫無立足之地畚鍤難施臣等鰓鰓過計而不敢遽議改遷也前奉上諭將清口迤北逺移挑浚臣等已將見挑裴家塲等處引河堵閉唐埂等減壩加挑陶家莊引河接築南岸挑水大壩具題在案今䝉皇上撥發帑銀臣等見在分檄提催俟銀兩解到惟將周橋以南一帶堤工簽釘排樁修築堅固唐埂等減壩一槩堵塞湖水涓滴不令東洩盡由裴家塲爛泥淺等處引河暢流外注敵抵黄流將陶家莊引河再加挑穵南岸挑水壩再加接築俟水勢大溜挑近引河然後相機開放加以清口引出之水敵黄衝刷黄河由引河而趨北岸似可無倒灌之虞至於三江口雙板石閘止可行之清水而不可行之黄水今既不議改穵縷堤則雙板閘之式亦無容更議矣至於逺移改黄之處統俟湖水出後相度形勢另行奏請遵行奉㫖九卿詹事科道一并㑹議具奏㑹議得河道總督于成龍等疏稱户科給事中張睿條奏稱中河水從仲莊閘出口建瓴之勢逼溜使南是以直射湖口不獨清水難出而黄水反為易入等語誠為有理相應行令總河于成龍等將清河縣以下所有陶莊閘開放挑浚出水或將董安國所挑引河以下酌量挑穵建閘之處親身詳看速行具題可也奉㫖依議十月二十日總河于成龍等題奏為敬陳兩河堤岸修治情形竊照臣一介庸愚荷䝉聖恩畀以督河重任臣雖衰老病軀敢不刻夜圖維欲求久安長治之策以祈仰報髙深於萬一臣查淮揚徐三府州屬黄運湖河詳見黄河再查髙堰堤工為淮揚保障運道民生實係於此所當急為整理難容刻緩貽悞者不謂從前膜視承修五年迄今尚未成功節年水發之時湖内不能容蓄以致東洩淹没民田水勢既分而黄流倒灌清口淤塞遂致運河一帶河身墊髙皆由堰工未完湖水不出之故久在皇上洞鑒之中臣故於今嵗履任之後即首先挑穵爛泥淺等處引水敵黄以濟運行一面嚴飭原修各官上緊儹砌其如原撥堰工銀兩被原任河臣及道㕔各官那為别工用去故雖日事嚴催或以料物不齊為諉除分委監工各員修砌已經修完者不議外其未經興砌完工者見在另疏題叅追帑將未完工段委令候補道程兆麟等領帑辦料乘時儹運前經具准題部議不准動帑駁令仍責原委之官修砌勢必不能驟告成功也况凡賠修緊急工程動帑修理臣於去冬陛辭之時業曾預為奏明以期早告成功似此部駁往返豈不有悞臣今見在調齊賢能官員簽釘排樁下釘頭葦埽勒限報竣如髙堰一帶工程告成則清水自出淤沙可刷矣伏乞皇上睿裁乾斷允臣所請之後容當逐疏題估蚤收實効庶可仰副聖懐其攔黄壩雖經拆毁尚須開穵寛深以引大溜時家馬頭一工已經委員辦運料物一俟齊集即興工堵築相應一并奏明伏乞皇上睿鑒施行奉㫖朕撫御寰區愛養兆民視同赤子務期無一人不獲其所比年淮揚所屬地方罹於水患百姓田廬俱被淹没生業蕩然朕懐深切軫念屢經蠲租賑濟乃黄河墊髙清口底下淮水不能流出百姓仍被水災弗獲寧處念此淮揚數州縣生靈豈可不急為拯救乎今海内無事惟河工最為緊要水患未平民生失所朕用是時厪於懐若何修理河道以濟生民爾等九卿詹事科道各官亦宜念切頃問南省來人云黄水比淮水髙一尺有餘若將髙堰堤岸增加堅築以束淮水使刷黄而行亦似有益但淮水瀦聚而黄河桃汛又至則髙堰危險亦未可定今或堅修髙堰堤岸以束淮水使之刷黄或移清口於清江之左右或另濬河道以通舟楫俱宜一一講求此事闗係甚鉅爾等㑹同九卿詹事科道等官細閱河圖詳議再將二本一并議奏㑹議得臣等恭聆上諭仰見我皇上軫念淮揚地方百姓必欲拯除水患底於安全河務闗係運道民生甚屬緊要難以懸議總河于成龍徐廷璽見在地方應令率同賢能道㕔等官親身前往將作何興工之處詳勘速行定議具題到日臣等再行㑹同請㫖可也奉㫖河工闗係重大豈惟另尋河道不可得從新創作亦屬繁難髙堰堤岸縱多方堅築清水亦不能出今惟當議移清口於他處兩岸俱用石工堅砌使清水流通朕南巡時曾以另開清口面諭于成龍于成龍亦奏稱淮水可從武家墩向清江浦移改此事著總河于成龍及府尹徐廷璽㑹同河道各官詳看清口當移於何處所用石工等項作速行辦備著即詳議於歳前具奏餘依議十二月十七日工部等衙門㑹覆侍郎常綬等疏奉㫖若將髙堰減水壩堵閉建造滚水壩土堤加幇髙厚則湖水必髙黄水又大湖水不出之時髙堰堤工危險而泗州等處必至水淹著大學士九卿詹事掌印不掌印科道㑹同確議具奏㑹議得侍郎常綬等既稱武家墩村北元帝廟稍逺之處應行開口又將髙堰加築髙厚減壩盡行堵塞臨湖汕刷之處亦應修補不許堤根取土應添挑引河二道等語查武家墩開口改移清口甚好但見今物料未備恐明年雨水之前不能完工漕運甚屬緊要雖改移清口其髙堰亦必須加幇相應將髙堰照侍郎常綬等所奏速行加幇髙厚不致遲悞明年漕運所需約估銀一百二十八萬五千零令户部就近撥給再先前各工撥給銀一百八十萬兩分給各官至今工程尚未完竣此加幇髙堰挑穵引河等工若又交與伊等必致遲悞修此工程應差部院堂官一員督催并簡賢能堂司官員分給段落令其節省錢糧堅固作速修造至邵伯更樓髙郵九里等處決口至今尚未堵塞完工此亦闗係運道亦應差部院堂官一員督催作速完工應差堂官并分段修工堂司官員恭請欽㸃二十二日㫖依議這督催工程著范承勲王鴻緒王掞田雯布雅努喻成龍顧藻壽鼐王紳髙裔去分修工程著董訥王樑朱𢎞祚江有良王啟元宫夢仁線一信陳汝器王日藻衞既齊李應廌馬世濟髙承爵金鋐楊雍建去張文端治河書行水金鑑巻六十六
