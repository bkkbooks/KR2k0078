body:
  text: 行水金鑑巻六十七江南按察使傅澤洪撰淮水聖祖仁皇帝康熈三十九年三月十一日工部等衙門㑹覆兵部尚書范承勲等奏奉㫖著九卿詹事科道㑹議具奏㑹議得先經兵部尚書范承勲等奏稱自武家墩起至小黄莊止可以稍緩其小黄莊起至周家橋止急宜先築又周家橋起至棠棃樹止堤内有未堵減壩三處仍聽河臣催堵完工惟是原估柴草分頭採辦一時難集臣等酌量惟衝決水深之處仍用丁埽其堤内加幇土方除頂寛加髙二項悉照原估丈尺惟底寛概幇十丈太坡無益酌量覈減其未挑引河一道俟河臣于成龍到浦商酌舉行經臣等㑹議以均如所奏奉㫖這挑浚運料小河將何處水引入水又從何而出並未聲明這事情并武家墩等處堤工事理俱行文范承勲等㑹同總河于成龍等詳細速議具奏部議據尚書范承勲等㑹同署理河道總督印務府尹徐廷璽奏稱髙堰堤工武家墩等處應幇頂髙丈尺照原估外惟是底寛十丈未免太坡合㑹議得每堤髙一丈坡出二丈工力可免虚費其臨湖一面原估概用丁埽臣等公同酌議水深之處仍用樁埽其餘出水之堤概用柴草丁鑲用土堅築與用丁埽無異其小黄莊至周橋先􅍐興築武家墩至小黄莊見在丈尺即日興築周橋至棠棃樹内有三壩未堵無如清口黄流倒灌見在打壩禦黄若將壩遽行全堵淮水無處宣洩而壩口之堤單薄必難捍禦臣等㑹議未堵茆家圍南壩唐埂北壩暫留夏家橋一壩再於棠棃樹以西暫築裹頭草壩以備伏秋漫溢候水消應閉之期堵塞幇築六壩一帶地方最為危險修防刻不可緩前撥河㕔常維禎等修築今著伊等上緊修築務期堤岸無虞其再挑引河一道目今黄流増漲舊引河俱係灌淤若再加挑浚必仍復淤塞徒費工力應俟堵塞夏家壩之先清水河出之時兼工挑穵方為有益前來均應如尚書范承勲等所奏可也奉㫖依議本月二十九日工部等衙門㑹覆兵部尚書范承勲等奏奉㫖九卿詹事科道㑹議具奏㑹議得先經臣等㑹議以時至桃汛其未堵髙堰減水壩暫行停堵將髙堰可修之處乘時速行修築完工如桃汛水發有修築不及之處停其修築將物料備辦秋汛水落即行修築完工如别有善策將淮黄兩河并髙堰堤作何修治禆益運道民生之處所去大臣河道官員公同詳議速行具奏奉㫖這本内事情著行文前往河工尚書范承勲等㑹同河道總督這所議可否伊等意見又復如何之處速議具奏將董安國所挑引河再行挑濬堵閉黄水倒灌清口之日或將清江閘堵閉及查看修理更樓決口等工著侍郎常綬前往看閱具奏四月十二日部議據尚書范承勲等奏稱先經臣等猶望六壩水勢稍可搶䕶即竭力上前加工不料三月十三十五兩日西風大暴更兼湖水日長茆家圍唐埂一帶堤面在在過水將已堵三壩復行衝開而漫決之口更增數處今水勢日長且無寸堤足恃時候水勢兩處其難無從下手六壩全開萬難於伏秋之前盡即堵塞髙堰小黄莊至周橋修築已將告竣其周橋至棠棃樹一帶見今漫水無土可取應俟河臣堵壩之後臣等㑹同河臣作速幇築其武家墩至小黄莊工程亦應俟堵壩後同時幇築目下備辦料物為險工之用仍令原委河員協同承辦毋得阻悞其六壩一帶地方土埂出水之處及浪窩殘缺之處照例動搶修錢糧責令河員修築仍儧完石工所撥髙堰帑金除小黄莊工程及備辦料物所餘甚多應貯河庫俟堵壩後為幇築大工之用等因前來查尚書范承勲等既稱小黄莊至周橋修築巳將告竣其周橋至棠棃樹一帶并武家墩至小黄莊見今漫水無土可取應俟河臣堵壩之後幇築等語均應如所奏將料物備辦俟堵壩後速行幇築其六壩一帶地方有土埂出水及浪窩殘缺之處應行總河責令河員作速照例修理未完石工嚴飭承修人員速行儧完至髙堰餘剩錢糧應暫貯河庫毋得那移别用仍為幇築髙堰大工之用可也奉㫖依議四月初四日工部尚書王鴻緒摺奏臣恭誦聖諭云仍將交與董安國所挑引河再行挑濬使黄河循北岸而流清口作何疏濬方為有益又䝉聖諭云伊等意見又復如何之處速具奏欽此除同尚書范承勲等公議具摺啟奏外臣謹再四循繹聖訓真洞達精微直抉黄淮强弱之機指示臣等雖大禹之神智無以過也兹仰體聖慮所及合諸今昔議論謹為我皇上陳之伏查河防一覽云歸仁堤所以捍禦黄水睢水湖水使不得直射泗州并攻髙堰又遏睢水湖水使之并入黄河益助衝刷闗係最為重大等語自白洋河等處淤墊堤内之水不入黄河反由歸仁堤減壩洩入洪澤而洪澤為之加漲皇上洞鑒情形時令河臣挑河以引堤内之水入黄刷沙最為有益乃河臣久未興工因衆議以胡家溝一帶地方河身淤髙難以出水不若自胡家溝挑接以至清口清口黄流比白洋河等處約低丈餘可以導之助清敵黄一面將歸仁堤減壩堵塞則洪澤湖亦不致增漲此説訪之新舊河官相同者頗多在臣之愚見以為不必直挑之清口止須挑至皇上所指挑水壩之上令其出黄直頂大溜今正當挑穵引河之時而又有南岸清水隨挑壩直射勢必益循北岸而流矣臣據所聞陳奏愚昧罔知可否聖明自有裁鑒謹奏奉㫖這摺子交與工部行文河道總督張鵬翮如照王鴻緒所奏開得即行速開十八日九卿詹事科道㑹議得侍郎常綬等奏稱臣等㑹同尚書范承勲王鴻緒等府尹徐廷璽等看得原任總河董安國所挑黄河之引河巳經淤墊挑水壩亦已毁壞今將引河挑寛三十丈長七百八十丈深一丈三尺河口挑及大溜其挑水壩務令寛長盡力修築使水溜挑入引河此修築之處交與范承勲董訥將捐修官員内揀選十人乘時修完等語查黄河挑引河築挑水壩之處先經尚書范承勲等估計具奏臣等㑹議題覆令速行挑築在案今侍郎常綬等既經㑹同尚書范承勲等驗看具奏應如所奏又疏稱清口爛泥淺三道引河雖然出水止能入運並不能出清口入黄不閉清口黄水一長運河淮河俱致倒灌淤墊若口門下埽堵塞漕船一到隨開已過隨閉必致堤根刷深難以修堵應於清口之内見有兩岸之堤横截清口排樁下埽僅留船行之口漕船過完之日隨即堵塞俟漕船回空之時開壩過完仍行堵塞此所修之處一面修築一面將所用錢糧詳估造冊報部再見今三道引河既已出水只應照尚書范承勲等所議將裴家塲引河一道照原估丈尺再加挑穵寛深此三道引河出水之口築壩攔堵以防黄水倒灌漕船過完清口堵塞之時將引河攔堵之壩開放使水入運俟淮水蓄聚可以抵黄之時將清口堵塞之堤開放抵黄等語均應如侍郎常綬等所奏可也奉㫖依議四月二十一日總河張鵬翮題清口為淮黄交匯之處目今糧艘北上最為緊要今河身淤墊竟成平陸清水隔絶不通獨有黄水流入運河深不過三尺五寸四尺不等與去歳所見大不相同兹部臣常綬議築攔黄壩糧艘過盡竟行堵塞使黄水不入運河再將裴家塲三處引河開浚廣寛深通引清水入運河是亦權宜之計臣親到此地相度形勢博採輿論僉謂黄河比裴家塲引河身髙爛泥淺係流沙旋挑旋淤裴家塲與帥家莊相連不逺即開浚深通當夏秋黄水大長力强之時引河清水終虞力弱不能相敵應於張福口挑引河一道身長一千五十丈面寛十丈深一丈餘或八九尺不等引清水於黄河口相近處入運河勢在裴家塲引河之上上下水勢相濟當夏秋水長之時兩處清水匯合庶可敵黄蓋因清口淤塞之後甚為廣闊非多挑引河鮮克有濟比之引湖水入江既有金灣三閘之河又有鳳凰橋雙橋灣頭等四處之水引入人字河芒稻河水勢得以暢流入江此成法之有效者也故宜開張福口引河以導清水使之暢流建閘一座以司啟閉若俟具題部覆後方始興工恐伏汛水發緩不濟事趁今水勢未長正可兼工挑濬臣謹具題九卿詹事科道㑹議題覆奉㫖依議速行張福口引河挑一千五十丈之外又挑河一百八十五丈緊接工港湖水處方能引水暢流其河頭舊堤有水口四處共長四十七丈必須堵塞方不使湖水散漫盡歸引河河尾先接草壩方可束水濟運五月二十五日總河張鵬翮摺奏應修工程一六壩之宜閉也逼清水出口以㑹黄入海其闗鍵全在六壩而六壩之最要者尤在夏家橋一壩以全湖水勢趨此故也今夏水方盛若急於堵塞一則髙堰堤岸危險可虞一則湖水洶湧恐旋塞旋衝糜費金錢可惜目前正須備料俟水落堵塞庶為萬全之計一髙堰滚水壩宜修也髙堰容納七十二處山河之水古人設壩原以洩異漲之水非以洩平槽之水也今冬六壩閉後來年桃汛黄淮並漲宣洩湖水非壩不可按南河志云武家墩髙良澗周家橋古溝俱報有閘又河防一覽云翟家壩地亢為天然滚水壩今周家橋髙良澗等閘俱已堵塞臣親至翟家壩見湖形漸淤水勢不由此出是古今變遷不一翟家壩亦非出水之處也前河臣于成龍等相度地勢將六壩改為四滚水壩臣覆加相度地勢相去不逺併為三滚水壩亦屬妥協今宜備辦石料修建於壩下就原有草家河唐曹河閘為引河并築順水堤則民間田廬無淹没之虞一武家墩至小黄莊之石工宜加砌也查此一帶臨河舊有石工僅出水面二三尺不等必須加砌使髙與小黄莊見修石工一律齊髙正在確估工料興修并查覈從前領銀不修情弊另疏題叅一古溝至六壩之石工宜修也臣查臨湖石工至古溝而止自此迤下俱係土堤每年嵗修搶修麋費錢糧似宜修砌石堤在目前用帑雖多然計之數年之後可省嵗修之費宜於滚壩告成之後漸次修舉一歸仁堤臨湖石工加灰抹縫將畢臣乘舟往看尚有罅隙樁朽之處飭其補砌滚水壩一座尚未修築有涵洞缺口洩水盡入洪澤湖故白洋地方可無水患若將缺口堵塞水無去路今見在訪求出水之處另疏奏聞又摺奏見修工程一運口修築攔黄壩准有部文動帑興工今先築兩岸土壩俟糧船過完再堵運口使黄水歸海引清水入運河一裴家塲引河部臣委王毓賢挑穵寛深正在動工挑穵務期一律寛深俟水長開放一挑張福口引河一道引清河水濟運經臣題明動帑興修在案今正在挑穵工已及半飭其尅期完工俟水長開放一髙家堰係淮揚二郡保障闗係甚鉅其自武家墩至小黄莊一帶塌卸排樁堤身衝刷之處臣同部臣范承勲王鴻緒等㑹議動大工帑銀先將臨湖釘埽修築曾經題明在案今正在修工將髙堰闗帝廟至小黄莊緊要之處先行修完再將闗帝廟至武家墩堤工修理務期速竣以禦伏汛一小黄莊至周家橋一帶堤工經部臣范承勲等具題交與分修官王日藻等分十四段加幇今正在興工尚未全竣必須上緊加幇一律全完前後九條分入黄運二河六月十五日上諭大學士伊桑阿馬奇見在清口淤墊著差人往總河張鵬翮處明年漕船行走有無遲悞至其漕糧􅋔載沙船可否從江下海入黄河海口由中河行走此外有無另見之處議明具奏十九日總河張鵬翮題該臣看得堵塞六壩逼清水出口㑹同入海此目今要緊工程先經河臣于成龍等㑹同侍郎臣常綬疏稱髙堰加築髙厚減壩盡行堵塞估銀一百二十八萬五千餘兩九卿㑹覆奉㫖差部臣范承勲等督催續經部臣范承勲等疏稱臣等㑹議先堵茆家圍南壩唐埂北壩俟水清應閉之期堵塞幇築等因續又經部臣范承勲等疏稱六壩全開萬難於伏秋之前盡即堵塞應俟河臣堵壩之後幇築等因九卿㑹覆俱奉㫖依議欽遵在案臣履任後接到堵壩部文轉行淮徐道施世綸䕶理淮揚道同知馬鑲遵行去後今據詳稱裏河同知常維禎堵閉唐埂南壩用銀四千二百餘兩山盱通判孫調鼎堵閉茆家圍北壩用銀二千一百餘兩又堵閉唐埂中壩用銀一千一百餘兩俱被本年三月十四五等日湖水大漲衝開又唐埂北壩上年前河臣于成龍等題報衝開部議賠修應同三月内衝開三壩一并責令常維禎等照例賠修堵塞其夏家橋原未堵塞茆家圍南壩未合中泓十二丈六尺二共估銀一萬四百餘兩乘時辦料興築等因前來臣覆查無異隨照數發河庫大工錢糧交承修官工部員外郎王登魁等作速辦料俟水落堵閉委原任按察使趙世顯監工督催再照加幇六壩堤工前河臣于成龍等發銀二萬餘兩交孫調鼎等加幇不完經侍郎常綬以遲誤題叅議處在案此輩錢糧花費若俟追出加幇緩不濟事因係緊要工程先動正項錢糧令裏河同知常維禎等作速加幇用過錢糧於原承修官名下追賠還項可也理合一併題明部覆奉㫖依議速行七月初七日部議河道總督張鵬翮疏稱清口築壩漕船過完隨即堵塞臣准部咨即行發帑委令裏河同知常維禎儧築已照式築壩下埽僅留口門令漕船盡數過淮指日出口即可煞壩且張福口引河挑成引出清水已至壩口只待煞壩便可開放入運其一應進貢以及差使官兵船隻應過壩者聽其過壩應起旱者即行起旱不得擅自開放俟漕船回空之時啟壩過完仍行堵塞相應具疏題明等因前來應照該督所題可也奉㫖依議速行九月初二日九卿㑹議得河道總督張鵬翮疏稱發帑大修髙堰工程特差部臣范承勲等督修部臣將小黄莊至周橋分為十四段派與分修官王日藻等加幇兹王日藻病故楊雍建江有良年老髙承爵赴任所遺工程部臣范承勲等派河官常維禎等修理查常維禎賠修唐埂南壩尚未興工孫調鼎賠修茆家圍等三壩亦未興工朱廷植接受靳治齊南堰石工久未興工羅京加幇濵海堤工見在興修今又領大工錢糧誠恐顧此失彼不惟工程兩誤且帑銀不無牽混應將此工交與効力學道姚淳燾劉謙吉史陸輿陸鳴珂修理彼家有厚貲不敢侵蝕帑銀且與發往髙堰効力之俞㫖相符等因前來查先經尚書范承勲等奏稱姚淳燾有樁木事未完係見任岳常道暫令其回任料理劉謙吉史陸輿陸鳴珂俱巳年老不能行走既已捐力應令其回籍等因續經尚書范承勲奏稱王日藻病故楊雍建江有良年老髙承爵已赴任所伊等所遺工程見在分修諸臣各有分地難以兼顧原􅍐分王日藻者係孫調鼎協築楊雍建者係朱廷植髙承爵者係常維禎江有良者係羅京與夏景松今即著此協築之員領帑幇築仍令淮徐道施世綸監工催築并查覈錢糧等因經九卿㑹議覆准俱各在案今總河張鵬翮既稱常維禎等有賠修唐埂南壩等工恐顧此失彼將此工交與姚淳燾劉謙吉史陸輿陸鳴珂修理等語應將王日藻等所遺工程交與姚淳燾等四人將姚淳燾等行文尚書范承勲等總河張鵬翮速行調赴工所領帑修築再行先經尚書范承勲等奏稱催工辦料必須地方賢能道㕔一同辦理方得上呼下應無悞工程等因奉㫖准行在案常維禎等原係􅍐分協築之員又見住髙堰工所前項幇築工程亦應仍令常維禎等協同料理至髙堰工程闗係緊要凡在河工大臣理應和衷協同料理使工程速行告竣今范承勲等張鵬翮彼此互異具題俱屬不合嗣後一應事件務須公同商酌具題如仍前不行公同商酌彼此互異具題交與該部察議可也奉㫖總河職任宜專這遣往督修髙家堰范承勲等九臣俱著撤回其督修工程著交與總河張鵬翮餘依議十三日總河張鵬翮摺奏臣欽遵前㫖已令河官將運口兩壩築畢僅留口門以放糧船指日糧船過完將新挑張福口引河開放入運河裴家場引河將湖内淤沙二百丈挑通之後亦可引清水入運再將六壩閉塞逼清水滔滔出口此二處之水必然暢沛運道可以通行况今嵗河道極其潰敝糧船阻於邵伯以下不得前進臣恭逢聖訓指授方略堵塞邵伯決口糧艘即便通行尚不致有悞此時運河各決口盡行堵塞清水又已引出乘時將運河淤墊之處再加疏浚來嵗糧船自是通行不致有悞至於改載沙船雇募人夫水手恐致糜費錢糧且由江入海從黄河海口進中河之處潮汐消長水勢不一風濤不測甚屬難行臣愚一得之見未知是否伏乞皇上睿鑒奉㫖知道了摺子交與户部部議將海運之處毋庸議奉㫖總督阿山將修理沙船之處具題前因運河難以行走欲由海内運糧曾差官查看沙唬船隻總河張鵬翮既稱運河淤墊處再加疏浚來嵗糧船不致有悞等語是漕船不必海運總河張鵬翮又稱將沙船暫行取用此所查沙船俱給張鵬翮應用之處交與該部議九月二十日總河張鵬翮題康熙三十九年四月二十五日准部咨到臣行淮揚淮徐二道親勘議詳外臣於五月初三日率部員㕔縣等官親往查勘又於八月初十二十四等日復往查勘兹據淮揚道王謙淮徐道施世綸㑹詳據裏河同知常維禎詳稱建築夾堤束水東行由桃源清河出口之説勢須挑河築堤約長一百二十餘里未免工費繁鉅設或清水不出恐徒勞無益等情又據山清外河同知羅京宿虹同知鄧之琮桃源同知孟時芳詳稱該卑職等㑹勘得三邑一帶地勢雖其間髙下不等但西髙而東下此又大勢皆然今自胡家溝以至清境挑水壩之處相距一百二十餘里由髙而下宜可導清入黄為睢水之尾閭然桃屬自胡家溝至煙墩數十里不特地勢低亢而外逼險工内臨縣治闗係甚重且經由鍋底湖水勢難涸未易施功若繞出鍋底湖由養馬墩奶奶廟前至卜家湖似或可行但查胡家溝老堤頭起卜家湖止用水平打量地勢頗髙兼有四十餘里土岡起伏不一皆係沙礓之地挑穵維艱則錢糧費大而挑水壩之上陳家莊仍屬外髙内低倘清水不暢流致黄倒灌事闗重大卑職等未敢擅專謹㑹繪河圖具詳本道轉詳施行到道道詳到臣該臣看得部臣王鴻緒奏摺内稱歸仁堤挑河以引堤内之水自胡家溝接挑至皇上所指挑水壩之上令其出黄等語其地形之髙下道里之逺近摺内未之及也臣率部員河官量度形勢至桃源縣鍋底湖鍋底者水入不能出之謂也相繼又有卜家湖誠恐引水至此合連湖水泛濫難禦桃源縣治有漂没之患打量水平挑水壩黄河地形亦髙且道里有一百二十餘里之逺挑穵工程需用錢糧甚多如引水不出則屬無益且據道㕔等官衆論僉同臣再三訪求出水之處不若自涵洞口起至老堤頭迤東挑穵引河出黄河乃為近便除臣於欽奉上諭事案内另摺啟奏請㫖外應將此處無庸再議理合具題奉㫖該部知道十月初闕日部議總河張鵬翮疏稱武家墩起至小黄莊止一帶順湖舊石工樁朽石欹必另行拆砌方可堅固經久今於舊殘石工之上疊柴壓土以為越壩於内建砌石工共長五千五百二十六丈四尺共估銀六十八萬六千二百四十八兩零除撥發錢糧等事案内撥過銀五十萬兩外尚有不足銀兩應請撥給等因奉㫖這修築髙堰不足銀兩著照該督所請速行撥給乘此冬令水涸作速修築完工勿致遲悞該部知道十三日工部覆議得兵部尚書范承勲等奏稱臣等奉命督催春初到工詳加體訪并細覈河員估冊知決口必須釘埽其餘鑲築可止用下柴内戧坦坡亦稍可減損裁去土方埽料銀四十二萬餘兩先築小黄莊至周橋止原估土方價值取土百丈之外及隔河船運者牽筭每方三錢臣等將此段工程㑹同河臣張鵬翮議定乾土每方二錢水土及百丈以外者每方二錢二分省銀六萬七千餘兩又鹽壩一段臣等查照舊例仍令商人承築又省銀一千九百餘兩將各分修用帑細冊移送河臣察核彚銷又臣等前奏開運料小河不另用帑金一面築堤一面挑浚今小黄莊以南至周橋止各分修或咨報已完或以水占尚未挑浚亦聽河臣兼催竣工又裴家塲引河照覆估丈尺令王毓賢常維禎等挑完今應聽河臣一并核減彚銷前來相應行文總河將髙堰小黄莊等處并運料小河催令分修及河員速行修築挑浚完工其裴家塲引河既經完工應令該督將用過錢糧查核造冊題銷可也奉㫖依議先是七月二十五日大學士伊桑阿馬奇折本啓奏奉㫖見今遣人往張鵬翮處著將各處工程修理若何著明白開寫摺子交與遣去筆帖式賫回啓奏詳見黄河十月十五日總河張鵬翮摺奏黄運二河分見本條小黄莊至周橋一帶隄工分修官朱宏祚等分十四段加幇值七月初六初七兩日大雨淋漓多有浪窩倒卸之處見移咨部臣轉催作速修補完工髙堰史家㓠湯家西髙堰壩北捐工尚有未修工程若俟修完方令分修官加幇恐其遲誤請敕部臣范承勲等速令分修官作速加幇以資捍禦用過錢糧於原捐人員名下追賠還項髙堰闗帝廟至小黄莊一段隄工委同知李梅等將隄身衝刷之處臨湖釘埽修築將完其自闗帝廟至武家墩一帶堤工見在釘埽修理嚴催作速竣工武家墩至小黄莊一帶應拆砌石工五千五百二十六丈四尺見在道㕔等官估計造冊另行具題唐埂六壩已經題明責令常維禎等賠修四壩其夏家橋茆家圍二壩已發帑委員外郎王登魁等辦料俟水落即動工堵塞唐埂等六壩改建三滚水壩已經題估委令河南管河道李言等領帑辦料修砌俟九月霜降後河南河道無事即檄催李言等親身速赴工所勒限儹催六壩加幇堤工已委原任同知劉光業等領帑俟水勢稍落即行加幇臣謹具摺付筆帖式闗住齎捧奏聞河防志行水金鑑巻六十七
