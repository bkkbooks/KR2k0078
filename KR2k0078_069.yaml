body:
  text: 行水金鑑卷六十九江南按察使傅澤洪撰淮水聖祖仁皇帝康熈四十年七月三十日總河張鵬翮為題報開放陶莊引河日期事具奏奉㫖張鵬翮奏稱開陶莊引河黄河水向北岸流去等語若黄河水向北岸流離清口甚逺乘此時自范承勲所築挑水壩起寛長加築堤岸過清口將黄河清口之水儘向下流再合為一處則黄河之水可永無倒灌之虞朕先曾面勅過于成龍今在河官員亦有知者著張鵬翮將此事問知道的官員詳明定議其修堤所需錢糧即為估計所修之處著畫圖速行具奏此事甚為要緊不得輕忽該部知道總河張鵬翮奏稱臣自工所星馳至清口齊集衆河官詢問曾知此事之員止據原任同知常維楨筆帖式馬泰回稱曾聞得前任總河于成龍云奉㫖接長挑水壩過清口使黄水不得倒灌但我等未聞其詳等語臣謹遵聖謨指示自范承勲所築挑水壩起加築堤工至清口西壩長四百八十丈五尺頂寛六丈底寛十丈再查西壩見長二十丈今再接長五丈新舊合長二十五丈俾清口黄河之水向北下流過惠濟祠後合為一處益加暢沛黄水可永無倒灌之虞估計工料銀兩不另請帑動支節省銀兩備料修理但臣識見淺陋所議恐有未當伏候皇上聖訓裁示奉㫖九卿詹事科道㑹同速議具奏㑹議具題奉㫖依議速行九月初三日都察院左都御史李柟題皇上軫念淮揚疊遭水患親幸河工指授方略不惜百萬金錢堅築髙家堰必欲淮水之出將裴家場等處引河開浚深廣又灼見淮水之不出者皆係黄水所阻若非逼令黄水北流止其倒灌淮水何得寛暢而出乃於清口相對黄河曲流處之陶莊直穵引河又於清口外黄河大溜處築挑水壩分引大溜歸入陶莊引河此誠我皇上天授神智洞悉本源知捨此再無善策非一日矣近見河臣張鵬翮疏稱開放陶莊引河黄水北流隨奉㫖乘此時自范承勲所築挑水壩起寛長加築堤岸過清口又命張鵬翮將此事問知道的官員詳明定議益見我皇上愛民之深憂民之切淮揚在朝諸臣莫不感激涕零臣敢不據所聞為我皇上陳之陶莊引河既開之後務令斷不復淤方為有濟築堤勢在難緩誠如睿慮而河心水急沙虚一時恐難著力當於未築堤之先急商一法以遏水勢臣衙門御史武進賢平日出言慎重偶向臣云曾効力河工遇大風時目擊百餘糧艘阻於清口外銜尾停泊黄水忽被逼而北由此觀之土人有用木筏之説似乎可行夫木乃嵗修所必需筏非波浪所能壞打散仍可撈取借用不費帑金臣請聚木為大筏聮以竹纜直接南北之壩分為數筏可離可合風大暫泊兩岸風小仍結一處以鐵猫沉水鈎定筏上安蓆篷遴善識水性者居之晝夜巡守河工必預貯樁木堆積多層入水約可丈許將黄河大溜永如聖算北流淮水自寛暢而出然後堤工可以次第舉行臣又聞古人於大溜處築堤不就輒沉船以塞之其法每船用五六大鐵鍋鍋底鑄鐵環中穿以木倒釘鍋於船底乃實船以土石鑿之使沉鍋口䧟入泥内則牢不可動黄河至深處不過二丈餘倘用木筏不能搏激大溜將廢壊之官船糧船沙嗁船調齊兼如此法行之則目前黄河大溜之土下均被擋隔自流入陶莊引河將來築堤即以此為根脚較柳枝柴草最為堅固臣非為此説必可行請勅下河臣議築堤之外並商用筏用船二策酌其難易權其後先遵㫖速行則萬世攸賴矣抑臣更有請者陶莊引河雖黄河大溜一入即可刷令深廣但水性就下今引河不及黄河大溜之深夏秋兩汛落後焉能捨卑就髙故土人謂黄河徙之使北不但河底宜深亦且河面宜廣臣思此河共用銀二萬三千兩有零若再加倍深廣其銀亦不過加倍而巳大抵黄河之沙冬則堅固縱人工稍費易於施工今嵗冬月或相其地勢機宜再加挑浚深廣亦一勞永逸之計臣前隨駕河干見我皇上乘坐小舟往來洪濤之上多方區畫備極焦勞救此百萬生靈今髙堰已修六壩已閉而收功於一著端不能踰此逼黄北徙之法用敢妄抒管見伏乞御覽採擇施行奉㫖這事情著張鵬翮速行詳議具奏該部知道十月初二日總河張鵬翮議覆臣集衆河官前往清口南北兩壩令汛官探量黄河水勢水深三四丈餘不等水深溜急木筏難以存住又河底稀淤土虚鐵錨難以抵實鑿船沉鐵恐礙重運糧船行走且欽奉特㫖於范承勲所築挑水壩至清口築寛長堤岸足以逼溜向北已經具題請㫖在案似且不必用筏用船矣又疏稱陶莊引河不及黄河大溜之深焉能捨卑就髙臣思此河共用銀二萬三千餘兩再加倍深廣其銀亦不過加倍而已今嵗冬月相其地勢機宜再加挑浚深廣等語應如所題再加挑浚深廣恭候聖裁訓示奉㫖該部知道部議覆准奉㫖依議速行以下俱張文端治河書聖祖仁皇帝康熈四十一年五月二十八日總河張鵬翮題竊照髙堰運料小河原屬淺窄經尚書范承勲等具題議以不動公帑以加幇大堤取土挑穵面寛八丈底寛五丈深五尺以資運料以保堤工九卿議覆應如所題等因奉㫖依議欽遵在案臣查此河南自周橋横堤起北至武家墩止乃屬無源之水必須堤内積水匯流入河方克有濟今臣等㑹勘髙堰工程并查驗分修諸臣所捐挑運料小河雖報完工但小黄莊一帶地形低窪見今堤裏積水與河面相平若遇風浪汕刷堤根深為可虞蓋部臣初估時六壩未閉一片皆水未得確實情形今工程已畢保固堤工最為緊要公議將原挑小河再加挑深使積水洩流河中由武家墩鹽河出口以免汕刷堤工約需銀一萬餘兩不另請撥發應將髙堰大工節省銀兩動支濟用早為竣工實與髙堰工程深有禆益矣奉㫖這河著照該督所題挑浚應否永逺存留該督確議具奏八月初八日總河張鵬翮題查髙堰一帶堤根地形窪下積水浸汕堤根難免坍卸之虞今若將運料小河再挑深通一以宣洩堤根積水一以運送修工料物而且通商便民利益不淺或慮土塘水洩偶致消淤每俟春融令河兵撈浚草壩六座每年修葺以收束水勢應宜永逺存留以保堤利民隨據該道等估計共應挑新土一十六萬六千八百一十八方零每方銀九分共銀一萬五千餘兩估建草壩六座每座銀四百五十餘兩通共銀一萬七千七百餘兩造具估冊一并呈詳臣覆核無異應動支髙堰大工節省銀兩委闕照估儹挑修建闕監工督催并原冊送部查核外相應具題奉㫖該部議奏部議准覆奉㫖依議十一月十二日總河張鵬翮題稱歸仁堤引河閘座等工程仰遵聖謨動帑修浚次第告竣今年伏秋二汛黄水異漲髙於湖水迨霜降後黄水漸消臣行令道㕔等官將臨湖歸仁安仁閘壩堵塞蓄湖水盡行引河流至臨黄祥符閘盈科開放今據報清水髙過黄水一尺九寸於十一月初七日開放湖水滔滔出黄河臣親往勘視清水暢流沛然莫禦百姓聚觀莫不欣喜感頌皇恩歡聲雷動此皆仰賴我皇上聖謨獨斷指授方略睿鑒髙深時發帑金開浚歸仁湖導睢湖諸水刷黄日益寛深宿桃等處民生得所淮泗上流水勢少減誠天授之神智垂萬世之利賴者也謹將開放歸仁引河出黄日期具疏題報奉㫖據奏歸仁引河開放清水暢流出黄知道了該部知道聖祖仁皇帝康熈四十二年二月初五日上諭歸仁堤引河開放分洩洪澤湖水勢若黄水加長恐清口水弱著將祥符閘下板堵閉草壩將五堡牐應酌量開放以助清水之勢三月初三日上諭髙堰工程闗係重大保安最為緊要朕今日乘舟由洪澤湖閲視見有殘缺石工以葦草鑲填倘遇水發危險堪虞閲至六壩見新修石壩堅固方慰朕懷其殘缺石工著即興修乘水未長之前完工以資捍禦總河張鵬翮遵㫖疾儹完竣以固堤岸以上俱張文端治河書又奉上諭朕今見髙家堰防險人員用候選縣丞經歴等微員不過例監書辦出身家産微薄倘有疎忽干係不小須於候選職銜稍大身家殷實者委其防險如此則彼知自愛身家又有選用之望自然盡心防險有禆工程總河張鵬翮遵㫖選派職銜稍大每堡一員住工防守於桃汛日赴工霜降後掣回髙堰山盱二㕔河工事宜冊初四日上諭清口西壩乘此水淺再加長數丈有益初八日上諭髙家堰石工闗係緊要必須嚴催早完張文端治河書十一月内淮徐道張弼奉上諭洪澤湖風浪危險每致捐壊船隻民命攸闗著於沿湖坡釘樁木以廣救濟總河張鵬翮遵㫖於髙堰山盱二處簽釘樁工以下係髙堰山盱二㕔河工事宜冊聖祖仁皇帝康熈四十四年閏四月初一日上諭石工完者准其先為銷算保固三年免其賠修初十日聖駕臨幸髙家堰閱視工程上諭朱廷植石工老堤頭轉灣處甚屬險要宜作速修完十一日聖駕臨幸惠濟祠石工召總河張鵬翮及河官淮揚道張弼等又召大學士馬齊等跪於河干上諭朕三十八年閱河爾等所跪之處俱屬黄水今清水暢流逼黄竟抵北岸僅成一線朕心甚為快然觀此形勢朕之河工大成矣互見運河十月初四日上諭諭工部方今海宇昇平惟以安阜黎元為急東南要務莫重於河防朕數經南巡指示修築方略凡以籌運道濟民生也自曩嵗兩河先後衝決而黄流淤墊繼以髙堰唐埂壩久決未塞而洪澤湖水直從決口旁洩以致淮水力弱黄水倒灌全河幾至潰壊于是分遣廷臣發帑金數百萬增築髙堰盡閉六壩俾淮水全注清口又特築挑水壩以逼黄溜趨向北岸仍開浚陶莊引河以導黄北流然後黄水無倒灌之患四十二年以河工漸可底績躬親臨視時髙堰石工尚多未竣飭令迅速修築又因仲莊閘水勢湍急恐逼黄流倒灌清口隨命閉仲莊閘改建楊家莊閘閘工既成今年春復往巡閱比至髙堰見石工仍未完固舊埽亦多朽塌諄諭河臣張鵬翮謂水勢無常修防宜豫一有疎忽則前工盡隳且甫奏安瀾旋報衝決天下其謂之何張鵬翮猶奏稱堤工捍禦可以無虞迨伏汛大水驟發果衝決古溝唐埂清水溝等處淮揚一路田畝被淹者甚衆今已嚴飭堵塞決口刻期竣工朕屢親莅河干詳度形勢當水漲之時若髙堰及運河減水壩不令開放則堤堰甚為危險若開壩宣洩則閭閻壠畝必致潦傷方春水涸民間盡皆播種一經夏水驟漲開壩放流而所播之種悉被淹没朕心惻然殊為不忍使不設法導流俾水有所收束則瀕湖及下河民田究不免於水患朕再三籌畫宜於髙堰三壩之下挑濬一河兩旁築堤束水入髙郵邵伯諸湖湖外亦量築土堤不使漫溢其髙郵減水壩下亦挑濬一河兩旁築堤束水由串塲河入白駒丁溪草堰等河白駒等河淤淺之處并開濬深通俾之入海如此則各壩所出之水不致有渙散衝流之害又洪澤湖水勢大漲泗州盱眙等州縣俱被水災應於泗州一帶受水之地亦酌量築堤收束毋令泛濫則所全於淮安揚州鳳陽三郡民生者多矣此事原於河道無涉在河官止知保䕶河道不復詳計民生朕惟民間田畝所繫甚重宜圖萬全可久之策築堤束水行之北河業有成效則施之南河當亦有濟應從何地築堤延袤若干里需費幾何行令江南總督總漕總河江蘇巡撫㑹同確勘詳議具奏爾部即遵諭行特諭總河張鵬翮㑹同總漕總督巡撫㑹勘估計於三滚水壩下挑河築堤蔣家壩添建石閘水大開放循河歸入髙郵諸湖并請發内帑遣官修築奉㫖依議著孫渣齊徐潮鐵圖黑中逹爾花蔡毓茂前往督修完工迄今開壩之水悉由壩下之河歸入髙郵諸湖由束堤壩下各引河歸海不致散漫淮揚二郡億兆生靈桑麻樂業莫不感頌皇仁與天地不朽矣聖祖仁皇帝康熈四十五年二月十五日河工効力知府陳九陛等賫到康熈四十五年正月二十日大學士馬齊西哈納張玉書陳廷敬學士阿錫担拉都渾赫壽二哥蔡升元王之樞奉㫖見今所議應築之堤應挑之河與漕運河道絶無闗涉特為淮揚所屬田畝不致淹没有禆民生之故但髙家堰堤岸甚屬緊要不可不嚴加防守去嵗朕南巡閱河至髙家堰立於堤上於衆官民前面諭張鵬翮髙家堰堤岸甚屬緊要今石工尚有未完之處若不嚴加防守伏汛水漲之時必致衝決張鵬翮保奏以為斷然無虞去嵗水大古溝唐埂清水溝等處俱被衝決今歳髙家堰若不嚴加防守朕不能保其無衝決之患爾等繕寫諭㫖著來奏河工事務陳九陛等賫去交與張鵬翮是年月日又奉上諭髙家堰酌看險要之處再添建救生樁工五處需用錢糧著估計具奏總河張鵬翮遵㫖估計具題奉㫖所需錢糧無多著於蘇州織造處取用以上俱髙堰山盱二㕔河工事宜冊桐柏縣西三十里胎簪山之隂有泉曰淮井即淮河發源處井口縱横各七尺水深五六尺雖大旱不乾蓋其泉眼三出昔人因之砌磚為井井上置亭其水伏流東二十餘丈泉眼遂多水始羣出至桐柏縣繞城北門而東有山曰桐柏淮水出其南昔禹導淮自桐柏即此也水深五六寸至尺餘寛四五丈漸流成渠矣又東二十餘里月河水入焉月河發源泌陽縣南流合圍山諸水入於淮自淮井以西凡山澗之水俱向西流入南陽歸漢江淮井以東水皆東流注淮河桐柏縣之水有東西分流之異也淮瀆廟舊建於桐柏鎮西二十五里淮井鋪漢延熹六年移建桐柏鎮東一里許明洪武中定各神號稱東瀆大淮之神廟内古柏五株相𫝊漢時所植康熈三十三年御書靈瀆安瀾四字匾額遣官賫建以下俱張文端治河書淮水又東過信陽州北薈蕞云州在河南汝寧府西南二百七十里長淮繞其後溮水經其前為一州之形勝溮水即水經所謂溮口水也去州四十五里游河明河洋河水入焉淮水至此深二三尺寛至六七十丈其勢漸大游河在州西五十里源出四望山流至出山店入於淮四望山在州西六十里極髙峻登眺見數百里外明河在州北九十里源出天木山白龍潭流至杜家灣入於淮天木山在州西北百二十里明河即水經所云大木水也今俗訛大為天或以木為目皆非洋河在州東北六十里源出大埠闗之西港東流入淮淮水又東過羅山縣北薈蕞云在信陽州東一百二十里縣南百里有羅山隋因山以名其縣有子路山有石門世𫝊子路所宿處淮水舊自確山縣南流入羅山正陽二縣界元和志云淮水在朗山縣南一百二十里是也今不入其界朗山即今確山河南通志云淮水在真陽縣南九十里經信陽州流入潁水界去縣二十里溮河濼清河月兒灣河竹竿河水入焉溮河源出隨州黄土山為黄土河經信陽州㑹九曲河北流抱州城至縣西北六十里入淮九曲河即九渡河源出信陽州雞翅山雞翅山即雞頭山在信陽州南七十里濼清河今名濼水澗在縣北二十里入於淮月兒灣河在縣東北三十里源出掘山北流入於淮竹竿河在縣東北三十里㑹小黄河水北流入於淮小黄河源出靈山流繞縣城南門東入竹竿河靈山在信陽州東南六十里跨羅山縣境方輿勝覽云視衆山最髙每雲起覆頂天必雨淮水又東過息縣南薈蕞云在汝寧府西北九十里縣境濮山獨峙淮汝交流縣西北有珉玉坑舊出珉玉其色潔白隋時置官采之唐時為淮水所没開元中淮水東移坑重出焉後復没於淮宋紹興十一年與金人議和以淮水為界也去縣四里澺河谷河泥河閭河營河清水港水入焉澺河在縣北十里下流東南為葛陂逹於淮葛陂在縣東南三十里即費長房投杖化龍處谷河在縣東南四十里源出堅斧堰東流逹於淮泥河在縣東南四十五里源出萬安塘東流入淮閭河在縣東北九十里源出確山縣髙黄陂東流逹於淮營河在縣東北一百五十里源出汝河東南逹於淮清水港在縣南三里源出汝陽牛團塘東流入淮淮水又東過光山縣北薈蕞云在汝寜府西四十里縣北八十里有弋陽山仰淩碧落俯映長淮每有浮耀如玉藴於山又名浮光山中有濮公洞俗名濮公山相傳濮公煉丹於此光浮於天州邑皆以此名去縣九十里寨河水入焉寨河在縣北二十里合清流河北入淮清流河在縣西四十五里寨河殆即水經注所謂柴水也柴與寨聲相近淮水又東過光州北薈蕞云在汝寧府東南二百七十里車谷南蹲而接嶺黄河東注而匯淮潢橋門上有鎮淮樓宋建淮河内有雲㘭亭皆古蹟也去州三十里小黄河水入焉小黄河源出麻城縣北九十里分水嶺經光山縣東至光州西北流貫城東出㑹恨溝入淮按水經注黄水出黄武山東北流木陵闗水注之今俗稱小黄河州誌黄加水作潢非淮水又東過固始縣北潁州南薈蕞云固始縣在光州東一百四十里縣東南四十里有茹陂後漢末揚州刺史劉馥所築為耕屯之利其後鄧艾等嘗修治之今故址僅存縣南百里青峰嶺下出水名梅山河東流入淮里潁州在江南鳳陽府西四百四十里南一百二十有金黄嶺淮水北岸近朱臯鎮汝水入焉州去淮水源自桐柏東過信陽又東過潁州之褒信汝水自西北來入焉又東過下蔡潁水從西北來入焉又東過壽春有淝水從東南來入焉州西二里有西湖歐陽永叔嘗築室其上去固始北七十里潁州南一百二十里淠河史河汝河谷河水入焉淠河一名白鷺河在固始縣西五十里源出麻城縣分水嶺東流入固始㑹春河至期思鎮逹於淮白鷺今作白露史河在固始縣東三十里源出商城縣東流入固始㑹石漕河曲河至臨水鎮逹於淮石漕河在固始縣南四十五里源出大蘇山曲河在固始縣西十五里源出斛山東北流至東曲里入史河設有閘壩以灌田大蘇山在商城縣東四十里世傳蘇真人升仙處西南抵六安東抵霍邱周圍約五百里斛山在商城光山二縣間上廣下狹形方似斛汝河在潁州南一百里入淮按汝水源出汝州天息山東南入西平徑上蔡汝陽新蔡以逹於淮元季水溢為害自舞陽之渦河截其流約水東注因陞蔡州為汝寧府而西平雲莊遂平馬鞍諸山水仍合流古渠至潁州入淮谷河在潁州南七十里上源莫詳由新蔡入境經黑塔坡東南過老軍屯又東過楊宅橋繞七里岡北為崇灣匯於中邨岡南至水臺西入淮淮水又東過霍邱縣北潁上縣南薈蕞云霍邱縣在鳳陽府西南三百一十里淮河渡處有安風津即水經之安豐津因縣名也南北朝為安豐縣隋改霍邱潁上縣在鳳陽府西三百一十里西南與霍邱分界又東三十五里與壽州入界潁水在縣南門外亦曰沙河東南流至正陽鎮入淮謂之潁口即春秋之潁尾也鎮在縣東南七十里淮水之西去霍邱北四十五里潁上南二十五里灃河東河清河潤河潁河水入焉灃河在霍邱縣西十里源出棗木河東北流入淮東河在霍邱縣東五十里源自六安北東流合􅚉河水入淮􅚉河在霍邱縣東南二十五里源自六安香和嶺分小河灣東流入東河按灃河􅚉河即水經之窮水也窮音戎並聲相近字隨讀轉豐與戎二水本出一源後因塘堰變遷遂分而命之而各加以水耳薈蕞云江南通志載有灃河又有戎河又有豐水灃河在縣西十里發源棗木河豐水在縣西南十里源出窮谷舊名窮水後改今名按水經東北左㑹潤水又東北窮水入焉注云水出安豐縣似當從豐不當從灃霍邱形勝曰􅚉灃如游龍探水則􅚉灃又似為一水也清河在潁上縣西南六十里漕口鎮南流入淮潤河有大小潤河大潤河源出潁州土坡地泉及諸坡積流成河東過磚橋受小潤河水出椒坡至潁上縣漕口鎮過靈臺入淮小潤河出潁州蠶坊以東溝澗積水成河東流至磚橋東入大潤河潁河亦名沙河源出登封縣乾陽山東南過陳州合洧水又東南過南頓合㶏水又東南徑潁州至潁上縣東門外東南流入淮汝水發源天息山者自元季於舞陽截斷南流亦東歸於潁河薈蕞云州志潁河在州北發源自乾陽山至小窑西華縣東滙徐南頓明洪武初黄河自通許之西支分陳州商水入南頓混潁東流項城趙家渡潁州境澎湃乳香臺東過沈丘楊橋繞西古城折而東北為長灣又折而南為私擺渡經王莊鋪繞北城門外依黄霸堆而東合舊黄河過留陵出港口經甘城至正陽入淮黄河自周家口分界經州三里灣東流至壽州正陽鎮注淮正統十二年上流淤塞惟西華境一支入潁合流下逹於淮泗行水金鑑卷六十九
