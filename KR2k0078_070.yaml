加審看聽信徐光啓之言將無益之河妄行啓奏殊屬溺職應將總河張鵬翮革職查張鵬翮係革職留任之員相應解任原任總督今升刑部尚書阿山既奉特旨著將溜淮套詳勘確實乃不詳加審勘妄行題請挑浚甚屬輕浮大溺皇上委任之職應將阿山革職查阿山係革職升任之員相應解任總漕桑格安撫劉光美江撫于凖既奉特旨會勘並未詳議妥確輒行合詞會題亦屬不合應將總漕桑格安撫劉光美江撫于凖各降五級調用革職通判徐光啓係罷斥小人妄行條陳輕生事端應將徐光啓枷號河干兩箇月示衆責四十板遞解原籍可也五月二十六日奉旨阿山著革職張鵬翮著革去所加宫保桑格著降五級劉光美于凖著降三級俱從寬留任餘依議淮揚道治河檔案聖祖仁皇帝康熙四十七年五月初八日奉旨朕南巡閲河時見洪澤湖風浪危險堤岸陡立商民船隻觸石損壞傷人甚多朕心時切軫念因特令河臣沿湖堤創設救生大樁自設樁以來數年內並未損船傷人於商民大有禆益此樁應時加增修愈多愈善嗣後著江寧蘇州杭州織造每嵗於節省銀內各捐五百兩解送總河衙門以備救生樁之用該督逐嵗修理在案不必入奏銷如不實行修理於别項支用者從重治罪髙堰山盱二廳册聖祖仁皇帝康熙六十年三月日淮揚道傅澤洪詳請濬運料小河髙堰山盱兩廳所屬運料小河於康熙四十一年間蒙前院張具題奉旨挑濬深通保堤運料誠為善策迄今一十九年日久漸成淤墊兼之五十八年奇風駭浪水溢漫堤因而堤工汕卸淤墊更甚運料船隻艱澀難行又於五十九年補築大工之時隄邊取土地益窪下以致積水汪洋宣泄無路風浪汕刷堤根受傷實屬危險兹據兩廳會詳請憲挑浚本道遵奉憲批親往確勘一線長堤為全湖保障運料保工委屬要務此河挑濬深通既可保護堤工又可宣泄積水運送物料船隻無艱澀之虞積貯土方兵夫無望洋之歎一舉而四善具備則詳請題估發帑興挑誠不可一日稍緩者也嚼梅軒偶存行水金鑑卷七十
