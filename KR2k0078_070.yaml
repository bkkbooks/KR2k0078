body:
  text: 行水金鑑卷七十江南按察使傅澤洪撰淮水淮水又東北過壽州西薈蕞云州在鳳陽府西南一百四十里淮水之南淝水之北有八公山漢淮南王安與其賔客八公俱登此山學仙東南有壽昌城梁武帝堰淮水以灌壽陽水勢日增元魏揚州刺史李崇於八公山東更築一城以備大水州人號曰壽昌城州北二十里有硤石山兩岸相對淮水經其中禹鑿舊迹猶存芍陂在州南廢安豐縣也楚相孫叔敖所築淮南子曰孫叔敖決期思之水灌雩婁之野即此去州六十里清河西淝河東淝河洛河水入焉清河源出六安州界木厰山至州西南七十里入淮西淝河上源莫詳自太和縣流入州至硤石山入淮東淝河源出合肥縣雞鳴山北流二十里許分為二其一東徑合肥南入巢湖其一西北流二百里至州北西入於淮薈蕞云水經肥水出九江成德縣廣陽鄉西注呂忱字林曰肥水出良餘山俗謂之連枷山亦或以為獨山也北流分為二水施水出焉肥水又北徑獲城東又北徑荻江東又右會施水枝津首受於合肥縣城東西流徑成德縣注於肥水也經又曰肥水别出過其縣北入芍陂又北過壽春縣東北入於淮按漢書地理志九江郡縣十五一曰壽春今為鳳陽府壽州二曰逡遒今為廬州府合肥縣三曰成德注莽曰平阿五曰槖臯後漢書郡國志注春秋左傳會吳於槖臯在逡遒縣東南志又云平阿故屬沛有塗山塗山今在鳳陽府懷逺縣懷逺與鳳陽接界而成德縣不知在今何處蓋在廬鳳之間歟鳴又按流大清一統志稿云肥水出廬州府西北雞山北分為二其一東南流過府城東又東南而入巢湖其一西北流經鳳陽府壽州城東北又西至州北入淮爾雅歸異出同曰肥唐六典淮南道大川曰肥水自昔為廬壽要津今則水陸變遷故道俱不可問云江南通志廬州府肥水下注云在府城南七十五里源出紫蓬山東北經雞鳴山入金斗河一支西北流復東轉南下至東門外余公廟前二水相合故曰合肥鳳陽府肥水下注云東淝河在壽州城東北西流十里入淮西淝河在下蔡廢城西南境東流十里入淮下蔡廢城在今壽州北三十里合觀之則知東西肥本一水同源而異流者也肥當依爾雅釋後人誤加水旁耳洛河自定逺縣白望堆流入壽州境至新村南入淮淮水又東北過懷逺縣東薈蕞云縣在鳳陽府西七十里東南八里有塗山與荆山兩岸對峙淮水經其中禹會諸侯於塗山即此西南有禹墟及禹會村圖經云平阿縣東有荆塗二山相為一脈而水繞荆山之右禹鑿為二以通之今兩崖之間鑿痕猶存平阿漢縣即今懷逺縣也去縣二里洱河芡河天河渦河淝河水入焉洱河在縣西六十里源發蒙城縣至縣南歐村入淮芡河在縣西南十里源發蒙城縣至縣荆山南入淮天河在縣南五里源出鳳陽縣之利山西北流至塗山南入淮渦河在縣北一里發源自葛河口由鹿邑至亳州界黃河支流從西北來注之至亳城北與馬尚河合經蒙城流至懷逺縣北東入淮謂之渦口淝河源出宿州龍山湖東流至縣之正義村匯為巨浸東入於淮薈蕞云宿州南與懷逺縣接界懷逺南與壽州接界則肥水當經由於三州縣之間而其源不始出於宿州也淮水又東過鳳陽縣北縣為鳳陽府治去城十里禹貢錐指南薈蕞云水經淮水過莫邪山西莫邪在今鳳陽縣八十里江南通志鳳陽府淮水在府城北十里發源桐柏東過信陽合汝水過安豐南合決水北合豐水過下蔡合潁水過壽春合肥水過荆山合渦河過鍾離合濠水過盱眙合汴泗水東入於海蓋鳳陽縣西接懷逺東接臨淮為淮水必經之地不當遺去淮水又東北過臨淮縣北薈蕞云縣在鳳陽府東北二十里按志淮水經潁壽至懷逺合渦水又經蚌埠鳳陽縣北至縣東南二里流入五河水常為患明成化中築東西二壩約髙丈餘後屢加修築賴此捍禦正德六年夏水髙於壩衝開北城官民房屋傾頽過半嘉靖萬歷間兩壩以大水後漸增髙一丈又自城東北至濠梁驛修築石堤長三百二十四丈居民恃以無恐去縣一里濠河月明湖水入焉濠河有二源東源出濠塘山西源出鏌鋣山二水至升髙橋合流至城西由廣運橋入淮薈蕞云濠塘山即鍾乳山在臨淮縣南六十里山穴中出鍾乳也鏌鋣山在鳳陽縣南八十里相傳於此鑄劒故名縣城中有市河濠水舊從清流門入與此河會入淮宋連南夫作守始決濠水徑逹於淮濠水合流至城西南有石絶水謂之濠梁莊子嘗觀魚於此月明湖在縣東一里北流入淮淮水又東北過五河縣東薈蕞云縣在府東北一百一十里以沱澮淙潼四水合於淮故名縣東三十里有浮山介五河盱眙之間寰宇記云俯臨長淮山下有穴淮水泛溢其穴即髙水減還低有似山浮故名浮山一名臨淮山與浮山對峙曰鐵鎖嶺橫跨淮口去縣二里淙河澮河沱河潼河水入焉淙河俗作漴在縣南二里源出南湖東流入淮澮河在縣南門外源出河南永城縣馬長河東流徑宿州過靈璧縣固鎮橋至縣南入淮沱河在縣北二里源出宿州紫蘆湖經靈璧縣東南至縣西北會澮水東入於淮通志云沱河在縣西北通虹縣五河口入淮潼河在縣東北三里源出虹縣羊城湖通沱河徑天井湖南至鐵鎖嶺入淮北至虹縣石䃳子亦入淮淮水又東過泗州南盱眙縣北薈蕞云泗州在鳳陽府東二百一十里水去州一里有浮橋為南北要道州西百二十里有巉石山在淮北岸與南岸浮山對峙即梁武帝築堰以灌壽春處河防一覽云淮挾汝潁肥濠等處七十二溪之水至泗州下流龜山橫截河中故至泗則湧譬咽喉間湯飲驟下吞吐不及一時厄塞其勢然也城外有堤明萬歷四年巡按御史邵陛砌以石周圍二千八百四十五丈髙九尺有奇闊一丈有奇泗民德之立石曰邵公堤城諸門皆有水關宋時通漕艘後漸湮塞明知州王升填城記云自萬歷年來河髙城低關門之閉而不敢啓者幾十餘年以故壅溢成患而㕓市沮洳廨宇蕩析可為寒心凡為泗人計久逺者莫不以填城為長策御史周盤奏請截留漕米二萬石發夫填城共填過大小街巷二十一道軍民署房基土方一萬四千有奇本朝順治六年六月間淮大溢東南堤潰水灌州城深丈餘居民猝無所備溺死甚衆至十月水漸退官廨民房十圯四五鄉鄙田疇一望皛渺今猶積水盈城長淮拍浪安土之居終無日矣州志云泗州瀕淮為泗患者莫如淮淮非能為泗患也以下流壅塞阻其入江入湖之路則髙堰是巳髙堰之病泗自前代名臣勘議先正揭爭幸有三閘之建泗得以息肩今三閘復閉泗苦沉淪矣彼主於閉閘者不曰為髙寶計則曰刷清口沙為漕計也固已獨是自古善治水者莫如禹未聞當日舍疏瀹決排而築堤堰水以為治也閲前志如治河則有分黃導淮之策治淮則有設閘啓閉之宜治湖則有入江逹海之利失此不圖而務為補塞曲防計是徒以泗為壑也己蓋淮自濠梁五河會諸湖之水至界溝入泗境由泗北岸則自草觜劉溝洪澤一路東至清河縣河口會黃入海又一路由大澗口入湖由湖逹江以入於海兩路通行泗乃無患雖然泗之人祗知為桑梓切膚之計而不知當今地形水勢之髙下也蓋河身日髙水行地上即使大澗口開放將湖水盡泄泗州雖可涸出勢必清口水微黃水倒灌運道阻廢四百萬漕糧無繇逹於太倉而河之性急則通流緩則沙停沙停則海口必淤上流阻漲河南山東在在崩潰豈特淮揚兩郡下河七州縣億萬之生靈俱遭昏墊哉然則泗城積水終於不出奈何惟有浚河深川之一法使水由地中行則泗州之水患可除而運道亦無所礙國計民生均得利賴矣縣盱眙縣在州南五里有盱眙山縣以此名淮水去二里有長沙洲長二里淮水泛漲賴以捍禦今廢縣西北有護城堤沿淮河南岸明萬歷五年巡按御史邵陛所築自翟家河起至五塔山麓止長七百二十丈曰邵公堤萬歷二十一年重修西南一里有上龜山東北三十里有下龜山為龜山鎮下為運河川瀆異同曰泗州與盱眙兩城相距凡七里自昔為漕運要衝今惟涓流可辨耳由州城而東三十里龜山峙焉嶽瀆經所載禹治水鎖支祁於龜山之足殆不可信淮流至龜山乃益折而北又二十餘里而洪澤富陵泥孰萬家等湖環匯於淮之東岸淮水泛溢恆在於斯州逼淮而地下故也禹貢錐指云按古汴水東流經彭城縣北而東入於泗唐貞元中韓愈佐徐州幕有詩曰汴泗交流郡城角是其時汴水猶於州城東北隅合泗入淮也不知何年改流從夏邑永城宿州靈璧虹縣至泗州兩城間而入於淮宋時東南之漕率由此以逹京師南渡後漸湮元泰定初河行故汴渠仍於徐州合泗水至清口入淮而泗州之汴口遂廢其南許家河澗溪水注之其北又與柳山甓山陡安崙墩塔影龜山洪澤諸湖水合而出清口與黃河會東流入於海許家河自定逺縣流至盱眙縣境由查家埠入淮澗溪盱眙縣西南山澗之水由舊縣小河口入淮柳山湖在泗州西北九十里柳山下甓山湖在泗州西甓山下長十餘里陡湖在泗州西二十五里安湖舊名安河在泗州北一百二十里崙墩湖在安湖西中有髙墩塔影湖在泗州北長六十里闊五十里北連溧河東連洪澤湖相傳城中大聖寺塔曾見影於此龜山湖在泗州東北三十里洪澤湖在泗州東北闊一百二十里湖之在泗者五十有二不勝悉載州西北東三面皆湖南面為淮每遇夏潦秋霖小大匯注害禾稼浸城市為泗民患張文端治河書洪澤湖在山陽之西南北距大河東俯髙寶諸壑淮水逺自豫省復挾汝潁渦汴羣川之水匯而入焉瀠洄激蕩惟下之是趨而其地東北為下趨而北則出清口而逹於海趨而東則髙寶諸壑滔天而淮揚之民其魚矣漢末陳登為廣陵守大興水利首建髙堰障其東而使之北淮南千餘里地無沮洳後世治水者皆守其舊而不變自唐以來南北通運至宋黃又徙而南湖日寬廣成巨浸而是堰之所係愈重慶歷間一修於發運使張綸明初再修於平江伯陳瑄至萬歷間河臣潘季馴復大修之且砌以石者三千餘丈愈鞏固焉顧西南一帶自周橋至翟壩三十里空之而弗堤曰此處地形稍亢天然減水壩也但當時湖底深而能納雖不築堤湖水常低於岸面惟遇霪霖異漲始漫溢而出故季馴又曰周橋漫溢之水為時不久諸湖尚可容受也逮黃流倒灌之後湖底墊髙湖底髙則湖水亦因之而髙况決口九道淌刷成河地形愈陷以愈髙之湖放愈陷之地於是此三十里稍亢之區昔所稱漫溢不久者今且終歲滔天東注而不止不特清口之力分無以敵黃而淮且反引黃水以俱東二瀆交騰髙寶諸湖盈科而不受此清水潭所以大決而不可塞而下河七邑遂同溟渤也臣奉命大修將諸決盡塞自清口至周橋九十里舊堤悉增築髙厚并將周橋至翟壩三十里舊無堤之處亦創堤之蓋今日之地形水勢與明萬歷間大異即使季馴而在今日亦未有不堤者也然仍舊減水者六處計二百丈壩之而弗堤何也湖水之髙於黃水者常五六尺若一任其建瓴而出則所蓄無幾一逢亢旱上源微細既不足以濟運更恐黃水之乘其弱而入故爛泥淺一帶湖灘昔人稱之為門限今不使盡闢欲清水常留有餘然設遇大水連旬洪波驟溢清口一道之所出不勝數百里全湖之漲不有以減之勢必尋隙而四潰故堤以防之不虞之溢復壩以減之然後節宣有度旱不至於阻運而潦不至於傷堤也雖然洪澤周圍三百餘里合阜陵泥墩萬家諸湖而為一又上受全淮之委空濛浩瀚每西風一起怒濤山湧而以一線之長堤捍之浪頭之所及土崩石卸雖歲歲增髙培薄終不能禦切思水柔物也惟激之則怒茍順之自平順之之法莫如坦坡乃多運土於堤外每堤髙一尺填坦坡八尺如堤髙一丈即填坦坡八丈以填出水面為凖務令迤斜以漸髙俾來不拒而去不留是年秋黃水大漲奇風猛浪倍異尋常而洶湧之勢一遇坦坡而其怒自平惟有隨坡上下而無所逞其衝突始知坦坡之力反有倍蓰於石工者故障淮以會黃者功在堤而保堤以障淮者功在坦坡也惟是填積坦坡以來垂及十載風濤之所汕刷平鋪卸去離堤已四五十丈矣若用帑填積既所費不資又工程難見應每年著河兵嵗夫逐漸加工立為定制每嵗堤工一丈填土二方務使所增之數適稱所耗之數則善矣久而久之離堤百丈之內必漸墊而髙因叢植柳蘆茭草之屬俟其根株交結茂盛蔓延則雖狂風動地雪浪排空終不能越百餘丈之茂林深草而潰堤矣靳文襄公治河書為文襄公坦坡保隄之説甚卓見故大書特書於此司河者請寓目焉淮水又東北徑清河縣南與泗水合謂之清口清河在淮安府西少北五十里淮水去縣五里洪澤湖在縣南六十里洪澤鎮西長八十里接盱眙縣界新志謂之富陵湖夏允彛曰清河縣北有老黃河本沂泗東趨合淮入海故道開此則河之赴海必勇雲梯關下淤塞葦場當自蕩滌而海口廓矣渭按此必近世決河入海之故道非淮水東會泗沂之舊迹也水經泗水注云下邳縣為沂泗之會沂水注云於下邳縣北西南入泗是沂泗合流入淮也今沂水挾泇武祊浚諸水至邳州入黃河即古沂水入泗處黃河是泗水故道邳州本秦下邳縣新志云沂水舊在州西一里今為黃流淤塞改道自郯城入運河矣又東北徑山陽縣北山陽淮安府治射陽湖古射陂也在縣東南八十里與鹽城寶應分水髙家堰在縣西南四十里後漢建安中太守陳登防淮此其故址也明永樂初平江伯陳瑄始為築治長六十里清江浦在縣西即新運河也舊名沙河宋志楚州北有山陽灣淮流迅急每致沉溺雍熙中漕臣劉蟠議開沙河避淮水之險喬維嶽繼之自楚州至淮隂開導凡六十里舟行便之其後淤塞明永樂中陳瑄修治運河乃鑿清江浦引水由管家湖至鴨陳口逹海又東北徑安東縣南又東北入於海安東在府東北六十里本漢淮浦縣水去縣二里海在縣東五十餘里自鹽城縣東北經山陽縣東折而西北為淮水入海之口其北岸則安東也縣志云自縣西三十里顔家河渡直下過縣南東流五十里又東北過雲梯關折旋入海此導淮會泗沂東入海之故道也自元時河奪汴泗以入淮而兩瀆并為一瀆清口以東淮悉成河矣禹貢錐指也河防雜説曰清口乃淮流從出以會合黃河之地從前原極深通自髙堰潰決全淮東泄黃躡其後濁流倒灌而盡淤成平陸矣康熙十六年以後節次挑穵爛泥淺武家墩裴家場等引河四道共長六千餘丈一面將武家墩以上至翟家壩一切臨河決口并成河九道之處盡行堵塞完固挽水下注不令旁泄數載以來四道引河俱經衝刷寬深淮流暢注足以敵黃而無倒灌之患者引河之力也髙家堰所以障全淮之水使不得分流旁出而并力北趨以與黃敵乃兩河之關鍵也志稱後漢廣陵太守陳登所築唐宋以來不可悉考至明則平江伯陳瑄大葺之其後少保潘季馴復大葺之堰之上下其地不一而曰髙堰者舉其大而稱之也自河工敝壞黃河之水逆入清口清口湮塞淮水潰六壩而東出山鹽髙寶諸州邑幾為巨浸堰雖存與無堰等幸我皇上南巡親覽形勢洞燭機宜命堅閉六壩廣闢清口且大舉增築髙堰上自武家墩下至秦家髙岡長八十七里屹立如山於是堰以西之水涓滴皆出而會黃而堰以東沮洳之地復為膏壤矣此皆廟算精詳功同造化以致兩河普利億兆更生後之防河者奉為一定之制守而弗失即千萬年可長治也設髙堰山盱兩通判管理修防其汛有三北曰髙堰汛屬髙堰通判南曰徐壩汛屬山盱通判中曰髙澗汛則分屬焉髙堰通判所轄北自山清交界武家墩後橫堤頭起南至髙良澗禹王廟前止計程五十里山盱通判所轄北自髙良澗禹王廟前起南至秦家髙岡止計程四十三里皆總河于成龍題設家河防雜説云自山陽縣武家墩北起歷髙堰髙良澗周家橋古溝唐埂至盱眙縣翟家壩止一帶堤工有石工樁工土工通共長一萬五千六百四十四丈六尺內惟髙家堰最窪康熙二十二年伏秋大漲之際髙堰水深一丈二尺有餘逮隆冬消落則深七尺有餘方其大漲之時石工頂上水深數寸或一二尺不等樁工水與管木相平即有簽樁極髙者亦不過露頂尺餘若以前當此異漲則頃刻之間即便潰決東泄而是年歷八月之久得保無恙者一則恃挑土加築之子堤尚髙過水面三四尺不等人夫有立足之地可以用力修防也一則賴挑土填築之水內坦坡擁護堤根石縫不至過水石工之內尾土無蟄陷之虞石工之外風浪有消殺之勢樁不至拔起土不至於全傾也一則藉減水壩六座隨長隨減水深至一丈二尺外而止不至更為加長也此等各工俱濵臨洪澤大湖所以捍一望無際之水故須於頂衝之處預備物料加意堅築以圖永逺者也自山陽縣武家墩北至盱眙縣翟家壩止一帶堤工原以障全湖之水然每每上年將堤工加髙一尺則次年湖水亦必加長一尺仍復漫堤而過是以前朝潘宫保季馴將古溝翟家壩一帶二十餘里之地不築障水大堤止加三尺髙之小堰使水小之時由湖下注水大之時漫堰而去也然明時黃河尚深湖水易出近來黃河墊髙往往頂住湖水不得暢注故不特古溝翟壩一帶三尺髙之小堰悉皆衝洗無存而又衝成河九道且不特成河九道也髙良澗髙家堰一帶之樁石工亦復不時潰決於是清水潭隨圯隨塞築而復圮十餘年間費帑無窮而河道漸至大壞也今於臨湖一帶共建減水壩六座計其泄水之地武家墩壩長十丈髙良澗壩長十丈二尺周家橋壩長十四丈古溝東壩長三十四丈五尺古溝西壩長五十三丈五尺唐埂壩長四十八丈二尺內周家橋一壩係康熙十九年嵗修案內工程其餘五壩皆大修案內動帑創建改修之工也當髙堰湖水止深八尺以上之時雖建此六壩可使湖水涓滴不泄以為敵黃之資及湖水長至八尺五寸以上始從壩底漸減方二十二年淮流不息滔滔下注歷八月之久而隨長隨減不至壅積漫堤者實此各壩減水之益也但湖水長至一丈二尺外再欲加髙修防費力愚意再添建五十餘丈長之減水壩一座即使將來之湖水雖遇極漲之時而深不出一丈二尺之外多一處減水自然不致壅積漫堤庶幾不十分擔險且易防守也髙堰汛自武家墩西堤歷攔河壩至東堤歷鹽壩至土地廟前大堤頭攔河壩止長七百六十六丈七尺自武家墩土地廟起至髙堰大壩北止大堤長二千四十一丈八尺自髙堰大壩北頭起至小黃莊止大堤長三千七百二十六丈七尺髙澗汛自小黃莊起至髙良澗禹王廟山盱交界止大堤長二千三百七十四丈五尺六寸以上屬髙堰廳自髙良澗禹王廟起至周家橋止大堤長三千二百二十七丈四尺徐壩汛自周橋起歷棠梨樹至秦家髙岡止大堤長四千三百七丈以上屬山盱廳髙堰大堤於康熙三十八年冬命原任户部尚書王日藻等領帑分修命兵部尚書范承勳等督催康熙三十九年二月題請將工分為三段自武家墩至小黃莊為一段小黃莊至周橋為一段周橋至棠梨樹為一段先從中段興修本年四月臣始履任見湖堤衝刷殘缺難禦伏汛於五月內題準武家墩至小黃莊臨湖釘掃工程先行儧築以資捍禦至堵閉六壩塞茆家圍南北壩及夏家橋唐埂中壩北壩俱於八九月完工是役也湖溜湍激堵塞倍極艱難幸秋令八十餘日西風不作洪濤不興得以就緒此皆皇上至誠格天之所致也是年九月奉旨撤回范承勳等九人臣奉命專督各工至康熙四十年冬告竣北自武家墩堤頭起南至棠梨樹止長二萬四千九百八十一丈二尺三寸髙二丈三四五尺不等臨湖鑲柴髙一丈一二三四尺不等頂寬八丈四尺又臨湖鑲柴寬八尺底寬一十三四丈不等臣又慮柴工不能經久自武家墩至小黃莊堤底舊石工年久殘缺淤墊題請重砌新石岸自小黃莊以南至古溝前河臣于成龍委員建砌石岸有未完工者嚴飭儧完有被水衝殘者遴員修補又自古溝以南至林家西亦俱創砌石岸又自天然壩南起至秦家髙岡止俱臨湖鑲柴以資保障又置鐵犀五座於髙堰大壩髙良澗龍門大壩茆家圍夏家橋諸處以鎮之又康熙四十年三月桃汛大發湖水蓄長題準自武家墩起至棠梨樹止加築子堤以出水面七尺為度以禦風浪康熙四十一年伏汛黃淮並漲水勢異常全賴子堤捍禦武家墩西堤東堤原係明季行運新河之東西堤也西堤於康熙十五年間被水衝決堵築今歷年加修東堤係舊堤康熙三十九年議修以為西堤重門之障山清交界東攔河壩長四十丈康熙三十六年創築因每嵗修葺西堤築此以便取東岸之土真武廟東攔河壩長三十丈康熙十六年建因新河不復行運築壩河上以便往來鹽壩長五十八丈五尺康熙三十四年鹽商築南攔河壩長三十四丈康熙二十二年創築以攔湖水髙堰大壩外越壩長一百八十一丈五尺康熙十六年創築六安溝外越壩長六十八丈五尺康熙三十九年鑲柴修築髙澗大壩內有深潭不能幫築康熙四十年創築裏月堤長二百五丈五尺估砌石工又臨湖外月堤簽釘排樁鑲柴長一百五丈龍門大壩臨湖掃工長二百二十一丈五尺裏月堤石工長一百七十丈清水潭堤內有深潭不能幫築康熙四十年創築裏月堤長九十六丈周橋迤南舊減水壩六座康熙三十五年大水衝壞康熙三十九年堵塞今另建滚水石壩三座上下兩座金門口寬各七十丈中一座金門口寬六十丈又建天然壩草壩二座一口寬六十丈一口寬六十二丈三尺大堤內運料小河自武家墩起至周橋止前河臣靳輔開穵未成康熙三十九年范承勳等題準以挑河之工築大堤河面寬八丈底寬五丈深五尺為度因水淺未能通舟康熙四十一年題準加挑運料河堤土人稱為二堤自武家墩起至周橋撑堤止前河臣靳輔築周橋東草字河順水堤自周橋大壩東起至仁和集西止長四千八百九十五丈康熙四十年修築唐漕河堤自天然壩南大堤起至界溝止長三千三百一十五丈康熙四十年創築蔣家壩攔水堤自蔣家壩起至周家圍止長一千一百五十三丈康熙四十年築洪澤湖築髙堰南北堤岸所以束淮水出清口敵黃濟運也於清口築新大墩一座導水七分敵黃三分濟運若遇桃伏秋三汛湖水盛長水大易起風暴欲保堤岸以衛運道民生於山盱汛建滚水石壩三座其由身尺寸與清口黃水形勢相照應取勢足敵黃過則聽其滚去此四季測量水平審度至當乃定壩址歷年著有成效如春夏之交黃水先長湖水勢微清口清水稍弱恐不足以敵黃則啓歸仁湖三閘之版放水入洪澤湖以助清口水勢敵黃而濟運此皆聖主數次閲視河工指示方略精詳盡善乃克平成奏績萬世永賴屬在臣工敬奉遵行勿穿鑿私智變易成法則淮揚生靈永蒙利賴於無窮矣洪澤湖北滚水壩一座長七十丈由身髙六尺八寸康熙四十五年七月十八日開放時量髙堰關帝廟前水深一丈三寸新石工髙出水面三尺七寸北滚水壩外水深六尺九寸由身過水一寸每年水大開放驗髙堰關帝廟前新石工出水三尺七寸為則八月十二日湖水盛長髙堰關帝廟前新石工髙出水面一尺二寸時北壩由身過水一尺九寸九月初九日湖水落二尺八寸髙堰關帝廟前新石工髙出水面四尺時北壩斷流壩外水深六尺中滚水壩一座長六十丈由身髙六尺八寸康熙四十五年七月十八日開放時量髙堰關帝廟前水深一丈三寸新石工髙出水面三尺七寸中滚水