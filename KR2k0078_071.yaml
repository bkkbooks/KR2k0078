body:
  text: 行水金鑑巻七十一江南按察使傅澤洪撰漢水嶓冢導漾東流為漢禹貢作漾史記作瀁漢書養古字通用泉始出山為漾水東南流為沔水至漢中東流為漢水孔氏𫝊嶓冢山在興元府金牛縣東二十八里漢水出焉經南鄭縣南去縣一百步禹貢嶓冢導漾東流為漢是也元和志在金牛舊縣在今漢中府寧羌州西北其嶓冢山今沔縣西南接寧羌州界南鄭今漢中府治其故城在今府城東北漢有沔漾之名皆東漢水也地理志西漢水出西縣嶓冢山南入廣漢白水蓋潛漢也經不著其所出自古皆以為東西兩漢俱出嶓冢則或然矣而西漢固無沔漾之名漢志漾水出隴西氐道至武都為漢武都東漢水受氐道水名沔是則沔漾俱為東漢也獨氐道武都脈絡不通川渠阻隔武都受漾為不可據而桑欽遂徙氐道漾水為西漢之源由是愈紛錯酈道元委曲遷就通之以潛伏之流證之以難驗之論更覺齟齬故當盡廢諸說而一之以經文杜佑通典秦州上邽縣嶓冢山西漢水所出經嘉陵曰嘉陵江經閬中曰閬江漢中金牛縣嶓冢山禹導漾水至此為漢水亦曰沔水其說為可據上邽今廢入清水金牛今廢入褒城尚書說府上邽故城在今鞏昌秦州西南岷嶓潛沱之義難解今蜀山連綿延亘凡居左者皆曰岷右者皆曰嶓凡水出於岷者皆曰江出於嶓者皆曰漢江别流而復合者皆曰沱漢别流而復合者皆曰潛恐屬方言爾故岷謂之汶今汶川是也漢謂之漾或謂之沔或謂之羌今沿漢水而東有寧羌州有沔縣又東有洋縣即古洋州也洋漾聲相近豈皆得名於漢水云陸深蜀都雜抄出沔縣西門曲折行亂山中沔水流經其中畧如棧道但山􅋻無林木沔流舒緩不及褒水湍悍耳西涉沮水抵大安驛有土城廢址宋置大安軍沔沮之間闊者未丈許狹者才二三尺沙石磷磷深不没踝自大安西南亂山益稠至金牛驛北望見嶓冢山峩然雲表一小水自西東流即所謂嶓冢導漾者也水纔濫觴不没鳬鴈合五丁峽水東流為沔其流始大金牛驛西三里稍南入五丁峽一名金牛峽在寧羌州北三十里峽口縣崖萬仭陰風颯然水自峽中噴薄而出寧羌州在亂山中無城堞本沔縣羊鹿坪地明洪武中以山冦作亂置寧羌衛於此成化中即衛建州治自州行十里渡水過百牢闗闗下有分水嶺嶺東水皆北流至五丁峽北合漾水入沔嶺西水皆南流逕七盤闗龍洞合嘉陵水為川江常璩言沔出嶓冢合白水為西漢明與導漾之文相悖按通典嶓冢山有二一在天水上邽一在漢中金牛雍大記云西漢水在西和縣源出嶓冢山西流與馬池水合此乃上邽之嶓冢在今秦州又云漢江源出沔縣嶓冢山東流入金州此乃金牛之嶓冢禹貢嶓冢導漾乃沔縣之嶓冢非秦州之嶓冢知嶓冢有二則東西二漢源流各自了然漾之與沔本為一流與隴西之嶓冢都無交涉常氏之誤可不辯而明矣王阮亭蜀道驛程記東漢中記嶓冢以東水皆流嶓冢以西水皆西流故俗以為分水嶺新城先生言分水嶺與記異恐記是山海經云漢水出鮒嵎山蓋嶓冢之異名也本在漢中郡沔陽縣界沔陽故城在今沔縣東南十里後魏正始中析沔陽置嶓冢縣屬華陽郡故地形志云其縣有嶓冢山隋省沔陽入嶓冢屬梁州大業初改置西縣其故城在沔縣界西北去唐西縣治白馬城五里故隋志云西縣有嶓冢山唐武徳二年分利州綿谷縣之通谷鎮置金牛縣金牛故城本漢廣漢郡葭萌縣地蜀為漢夀縣地晉為晉夀縣地東晉為綿谷縣地而山入其境故括地志云嶓冢山在金牛縣東二十八里通典云金牛縣有嶓冢山四年又分綿谷置三泉縣其故城在今寧羌州西北東至西縣一百五十里天寳初徙治於此西南去舊縣一百二十里寶厯初省金牛入三泉故寰宇記云嶓冢山在三泉縣東宋至道二年升三泉縣為大安軍紹興三年改建軍于西縣界復置三泉縣𨽻軍今為大安驛在沔縣西南九十里接寧羌州界故輿池紀勝引宋朝郡縣志云今之言漢水以西縣之嶓冢山為源後又省三泉入軍故地理通釋云嶓冢山在大安軍西元降軍為縣故大一統志云漢水源出大安縣嶓冢山明初以其地改置沔縣又于縣西南置寧羌衛成化二十二年即衛置州而山入其境故漢中府志云嶓冢山在寧羌州北九十里蓋此山本在漢沔陽界西南接葭萌自後魏以來言山之所在曰嶓冢曰西縣曰金牛曰三泉曰大安曰寧羌地名六變而山則一皆在古梁州之域其為禹貢之嶓冢無疑也嶓冢山孔傳不言所在之郡縣而正義引地理志以實之曰隴西郡西縣嶓冢山西漢水所出夫此水即嘉陵水之上源非禹貢之所謂嶓冢導漾東流為漢者也而班固以西縣之嶓冢為禹貢之嶓冢謬矣自是以後言嶓冢者率依班氏如張衡西京賦云終南太乙連岡乎嶓冢潘岳西征賦云面終南而背雲陽跨平原而連嶓冢玩其辭意皆主隴西而言司馬彪郡國志亦云漢陽郡西縣有嶓冢山無異議也自後魏正始中析沔陽地置嶓冢縣以表其山而名始著酈道元卒于孝昌二年上距正始置縣之時凡二十餘嵗本朝典故生所親見而注水經不言豈事在成書之後不及追改抑亦因其晚出而疑之乎然漾水注引漢中記曰嶓冢以東水皆東流嶓冢以西水皆西流故俗以嶓冢為分水嶺作者亦似知班志之謬而以禹貢嶓冢為當在漢中也者不然於漢中記奚為詳及隴西之山邪由此觀之則魏收以前已有知嶓冢在漢中者不待地形志出而後知也頴達豈未之考乎然班志雖以西縣嶓冢為禹貢之山而養水則自繋氐道之下不言出某山自水經云漾水出氐道縣嶓冢山而氐道亦有嶓冢矣常璩華陽國志云東源出武都氐道縣漾山為漾水而氐道之嶓冢且有漾山之目矣郭璞志山海經云嶓冢今在武都氐道縣南酈道元注水經云東西兩源俱出嶓冢而同為漢水則似一山跨二縣之境而在西縣者為西源在氐道者為東源矣輾轉迷惑愈久愈譌說經者不能出其窠臼而禹貢之嶓冢㡬不可問矣西縣故城在今秦州西南氐道今不知所在蓋自晉永嘉之亂隴西没於氐羌郡縣荒廢常璩郭璞皆云氐道屬武都而晉志武都郡無之則此縣之不可考乆矣要之二縣在隴西皆古雍州域也而禹貢嶓冢乃梁州之山不應䦨入雍域故唯魏收所言為得其實而况秦州之嶓冢與寧羌之嶓冢南北相距五六百里也禹貢錐指沔水出武都沮縣東狼谷中水經沔水一名沮水闞駰曰以其初出沮洳然故曰沮水也縣亦受名焉導源南流泉街水注之出河池縣東南流入沮縣㑹於沔酈注東元和志沮水出興州順政縣北八十二里按沮縣故城在今漢中府略陽縣界晉永嘉後没於氐羌縣廢後魏改置武興縣又僑置畧陽縣西魏改畧陽曰漢曲隋又改曰順政唐為興州治宋復改順政曰畧陽今在寧羌州北二百二十里河池今徽州屬鞏昌府泉街水在畧陽縣北又東南逕沮水戍而東南流注漢曰沮口水經所謂沔漢者也尚書曰嶓冢導漾東流為漢山海經所謂漢出鮒嵎山也東北流得獻水口虞仲雍云是水南至闗城合西漢水又東北合沮口同為漢水之源也故如淳曰北方人謂漢水為沔水故孔安國曰漾水東流為沔蓋與沔合也至漢中為漢水是互相通稱矣酈注縣沮水戍在畧陽縣東南沔縣志曰沮水在西七十里與畧陽接界漢水自寧羌州東北流逕沔縣故大安軍南又東北至青羊驛沮口在焉宋開禧二年金人入大散闗叛將吳㬢退屯罝口旋還興州罝口即沮口也又東逕白馬戍南濜水入焉水經水北發武都氐中南逕張魯城東魯沛國張陵孫陵學道於蜀鶴鳴山傳業衡衡傳於魯魯至行寛恵百姓親附供道之費米限五㪷故世號五㪷米道初平中劉焉以魯為督義司馬往漢中斷絶谷道因逺城治即崤嶺周迴五里東臨濬谷杳然百尋西北二面連峯接崖莫究其極從南為盤道登陟二里有餘濜水又南逕張魯治東對白馬城一名陽平闗濜水南流入沔謂之濜口其城西帶濜水南面沔州二水之交故亦曰濜口城矣酈注縣地形志沔陽縣有白馬城今在沔西南即漢陽平闗亦曰白馬戍濜水在縣西三十里又東逕武侯壘南水經諸葛武侯所居也南枕沔水水南有亮壘背山向水中有小城迴隔難解酈注在小城亦名石馬城今沔縣南又東逕沔縣故城南水經城蕭何所築也漢建安二十四年劉備并劉璋北定漢中始立壇即漢王位於此其城南臨漢水北帶通逵南面崩水三分之一觀其遺畧厥狀時傳南對定軍山諸葛亮之死也遺令葬於其山因即地勢不起墳壟唯深松茂柏攢蔚川阜莫知墓營所在山東名髙平是亮宿營處有亮廟鍾士季征蜀枉駕設祠營東即八陣圖也遺基畧在崩裭難識酈注宇沔陽故城寰記在西縣東南十六里今在沔縣東南十里又東逕西樂城北水經在山上周三十里甚嶮固城東容裘谿注之谿水又北逕城東而北流注於漢酈注南城在今沔縣西漢水南岸又左得度口水水經出陽平北山水有二源一曰清檢出佳蠖二曰濁檢出好鮒常以二月八日取之美珍常味度水南經陽平縣故城東又南逕沔陽縣故城東而南流注於漢水酈注南水在沔縣二里又東黄沙水左注之水經水北出逺山山谷邃險人跡罕交谿曰五丈谿谿水側有黄沙屯諸葛亮所開也其水南注漢水南有女郎山有女郎廟言張魯女也有小水北流入漢謂之女郎水酈注郎沔縣東四十里有沙水女山在褒城縣西南又東合褒水水經水西北出衙嶺山東南逕大石門歴故棧道下谷俗謂千梁無柱也諸葛亮與兄瑾書曰前趙子龍退軍燒壊赤崖以北閣道縁谷一百餘里其閣梁一頭入山腹其一頭立柱於水中今水大而急不得安柱此其窮極不可强也又云頃大水暴出赤崖以南橋閣悉壊時趙子龍與鄧伯苗一戌赤崖屯田一戍赤崖口但得縁崖與伯苗相聞而已後諸葛亮死於五丈原魏延先退而焚之謂是道也自後案舊修路者悉無復水中柱逕渉者浮梁振動無不摇心眩目也褒水又東南得丙水口水上承丙穴穴出嘉魚常以三月出十月入地穴口廣五六尺去平地七八尺泉縣注魚自穴下透入水穴口向丙故曰丙穴下注褒水故左思稱嘉魚出於丙穴良朩攢於褒谷矣褒水又東南歴小石門門穿山通道六丈有餘刻石言漢明帝永平中司𨽻校尉犍為楊厥之所開逮靈帝建和二年漢大中大夫同郡王升嘉厥開鑿之功琢石頌徳以為石牛道來敏本蜀論曰秦惠王欲伐蜀而不知道作五石牛以金置尾下言能屎金蜀王負力令五丁引之成道秦使張儀司馬錯尋路滅蜀因曰白牛道厥蓋因而廣之矣石門在漢中之西褒中之北褒水又東南歴褒口即褒谷之南口也北口曰斜所謂北出褒又南逕褒縣故城東褒中縣也本褒國矣又南流入於漢漢水又東逕萬石城下酈注谷元和志褒山在褒城縣北五里南口為褒北口為斜長四百七十里褒水在今褒城縣東萬石城在褒城縣東又東逕漢廟堆下水經昔漢女所遊側水為釣臺後人立廟於臺上世人覩其頽基崇廣因謂之漢廟堆傳呼乖實又名之為漢武堆酈注縣堆在今南鄭西南又東過南鄭縣南水經耆舊傳云南鄭之號始於鄭桓公桓公死於犬戎其民南奔故以南為稱即漢中郡治也漢高祖入秦項羽封為漢王蕭何曰天漢美名也遂都南鄭酈注今南鄭陜西漢中府治以今輿地言之漾水出寧羌州北嶓冢山寧羌在漢中府西北三百八十里東北流逕沔縣西南合沔水又東逕沔縣南沔縣在府西少北九十里又東逕褒城縣南在府西北四十里沔水去縣二十四里又東逕南鄭縣南為漢水去縣三里經所謂嶓冢導漾東流為漢者也漢志隴西氐道下云禹貢養水所出至武都為漢師古曰氐夷種名也氐之所居故曰氐道邑有蠻夷曰道晉永嘉後地没於氐羌縣多荒廢氐道今不知所在武都郡武都縣下云東漢水受氐道水一名沔過江夏謂之夏水入江武都本白馬氐地漢元鼎六年開以為武都郡治武都縣今鞏昌府成縣西北百里有仇池山山上有仇池城城東南有武都縣故城即漢武都郡治也水經漾水出隴西氐道縣嶓冢山東至武都沮縣為漢水常璩華陽國志漢水有二源東源出武都氐道縣漾山為漾水禹貢導漾東流為漢是也此皆依漢志以為言然氐道漾水至武都為東漢水卒莫有能言其所經者今按酈注濁水出濁城北今成縣有濁水戍亦曰濁水城胡三省云在上禄縣東南武街城西北東流與丁令溪水㑹又東逕武街城南今廣業郡治城在今成縣西三十里又東𢎞休水注之又東逕白石縣南白石今為成縣治又東南渥陽水注之又東南與仇鳩水合又東與河池水合又東南兩當水注之水出陳倉縣之大散嶺西南流入故道川謂之故道水西南逕故道城東又西南入廣漢郡界與沮水枝津合謂之兩當溪水上承武都沮縣之沮水凟沮縣今畧陽沮水在縣東西南流注於兩當溪又西南注於濁水濁水南逕槃頭郡東今畧陽縣西北一百里有長舉廢縣後魏於此置槃頭郡而南合鳳溪水又東注於漢水觀此文則漢志以沮水枝津上承氐道水下為東漢水可知也氐道雖未詳其處所以池望度之當在西縣之東河池之西上邽之南下辨之北濁水所受有丁令溪水𢎞休水渥陽水皆出其北蓋自氐道來也其中或有漢志所謂養水者但今無可考耳然沮水枝津上承沮瀆自東入西非自西入東也昔之觀水作記者不察地勢之髙下不辨川流之去來遂以為氐道養水合濁水兩當溪由枝津以達沮沔是為東漢之源而不知其非也班固因之故有此誤水經於武都下加沮縣二字蓋亦以氐道水下通沮水為東漢之源也然漢志不言養水出何山而水經復附㑹之曰嶓冢則氐道亦有嶓冢山矣常璩知其非是故又因水以名其山曰漾山而為之殊目要知氐道水所出别是一山非嶓冢也近世言漢水者皆知班固之誤而不知其誤所由來故詳著其原委如此漢志隴西西縣下云禹貢嶓冢山西漢水所出括地志秦西垂宮即漢西縣在秦州上邽縣西南九十里元和志嶓冢山在上邽縣西南五十八里然則山在故西縣東北去西縣三十二里也上邽漢屬隴西郡唐為秦州治今鞏昌府秦州是志云西縣故城在州西南一百二十里嶓冢山在州西南六十里山不甚髙而峯岫延長連屬若冢是山在西縣故城東北六十里也與括地元和二志里數不同蓋唐之上邽在今州之西南去西縣故城當較近但山不當更差二十八里耳州志城與山必有一誤南入廣漢白水東南至江州入江元和志利州景谷縣本漢白水縣屬廣漢郡宋為平興縣隋改曰景谷今四川保寧府昭化縣之白水鎮是也鎮在縣西百里白水在縣北二十里至縣東三里合嘉陵江漢巴郡治江州縣其故城在今重慶府巴縣西大江在縣東南嘉陵江至此入大江過郡四隴西武都廣漢巴郡行二千七百六十里此與氐道之養水全無交涉水經非一時一手作漾水篇首云漾水出隴西氐道縣嶓冢山東至武都沮縣為漢水此不過依漢志氐道一條以立文惟加嶓冢沮縣為不同耳其所謂漢水即東漢亦與西縣之西漢全無交渉及觀下文東南逕白水葭萌閬中至江州入江則又確是西漢水與武都一條全無交涉矣首尾横决必魏晉間人所續也經文有曰廣魏者故廣漢也蓋曹氏改名漢後人續經此亦其一證尋其意指蓋以氐道水南合濁水兩當溪歴槃頭郡東而南為西漢水也槃頭治長舉亦漢沮縣地故酈注以為東西兩川俱出嶓冢而同為漢水其言曰劉澄之云有水從沔陽縣南至梓潼漢夀入大穴暗通罡山郭景純亦言是矣罡山穴小本不容水水成大澤而流與漢合庾仲邕又言漢水自武遂川南入蔓葛谷越野牛逕至闗城合西漢水故諸言漢者多言西漢水至葭萌入漢則兩川通波更在沮縣之南矣嘗試以圖志考之漾沮雖有枝津與西漢通要皆自東入西非自西入東也蓋嶓冢亘絶東西俗謂之分水嶺地勢東髙而西下故西漢水自畧陽縣南入寧羌州界即折而西南避髙就下其性則然豈有東入之理澄之所言即禹貢之潛仲邕所言即通谷水也二水皆東漢之枝津西流入西漢水而說者乃謂西漢水至葭萌入漢顛倒之矣今嶺東漾沮枝津皆入西漢嶺西谿澗之水亦皆入西漢川流去來有目者盡能驗之其可是古而非今乎酈道元雖有東西兩川俱出嶓冢之說而終以西漢為主注云今西縣嶓冢山西漢水所導也西流與馬池水合又西南合楊㢘川水又西南逕始昌峽始昌縣故城西城在今西和縣北又西南逕宕備戍南戍在西和縣東北又西南逕祁山軍南祁山在嶓冢之西七十許里今在西和縣西北七十里又西逕蘭倉城南今禮縣東南有蘭倉故城又南入嘉陵道而為嘉陵水禮縣夲漢嘉陵道地屬武都郡西漢水至此為嘉陵水傅同叔云嘉陵江出鳳州大散闗西南嘉陵谷至興州北境當㑹東漢水而東行安得越東漢而為西漢乎宋人以故道水為嘉陵江大非近志皆承其謬故道水合濁水至槃頭郡入西漢水至今猶然何言㑹東漢而不為西漢耶又東南逕瞿堆西又屈逕瞿堆南瞿堆即仇池山在今成縣西北百里又東南逕濁水城南亦曰濁水戍在成縣西又東南逕修城道南今畧陽縣西北有修城廢縣漢志作循城屬武都治又東南於槃頭城南與濁水合詳見前又東逕武興城南今畧陽縣治即武興故城唐為興州順政縣元和志嘉陵江經順政縣南去縣百步又西南逕闗城北闗城即今陽平闗在寧羌州西北八十里東至沔縣一百七十里又西南逕通谷唐武德二年分綿谷縣之通谷鎮置金牛縣在今寧羌州金牛驛西三十里庾仲邕曰漢水自武遂川南入蔓葛谷越野牛逕至闗城合西漢蓋即此通谷水也通溪上承漾水曰獻水口又西南寒水注之寰宇記大寒水在三泉故縣南十五里西流至龍門山入大石穴龍門山在故三泉縣西七十里今在廣元縣東北八十二里其水即禹貢之潛郭璞所謂從沔陽南流至漢夀入大穴中通峒山下西南潛出者也又西逕石亭戍又逕晉夀城西又南合漢夀水在今廣元縣南水經又東南至葭萌縣東北與羌水合注云白水西北出臨洮縣西傾山又東南逕白水縣故城東又東南逕小劍戍北西去大劍三十里又東南至吐費城南即西晉夀之東北也東南流注漢水水有津闗元和志晉夀故城在利州益昌縣東南五十里本漢葭萌縣也此為西晉夀今在昭化縣界白水即桓水嘉陵江自陜西寧羌州界東南流逕四川廣元縣西又西南逕昭化縣東南又南逕劍州東又東南入倉溪縣界白水闗在寧羌州西南九十里接昭化界東北去闗城一百八十里水經又東南逕巴郡閬中縣注云巴西郡治也閬水出閬陽縣而東逕其縣南又東注漢水又東南逕宕渠縣又東南合宕渠水水北出南鄭縣南巴嶺謂之北水東南流與難水合又東南流逕宕渠縣謂之宕渠水又東南入漢三巴記云閬白二水南流曲折三回如巴字即嘉陵江也自蒼溪縣界東南流逕閬中縣西南又東南逕南部縣東北又東南逕蓬州東又西南逕南充縣東又南入定逺縣界寰宇記云嘉陵水又名閬中水亦曰閬江亦曰渝水華陽國志曰閬中有渝氷賨民多居水左右天性勁勇銳氣善舞今所謂巴渝舞也宕渠故城在今渠縣東北七十里宕渠水亦名渠江重慶府志云嘉陵江自定逺縣流入合州界又一百九十里合渠江又十里至州城東南合涪江又南四十里入巴縣酈道元以宕渠水為禹貢之潛非是水經又東南逕江州縣東南入於江注云涪水注之故仲邕謂涪内水者也江州作江津誤今據漢志改正以今輿地言之秦州西和禮縣成縣並屬陜西鞏昌府畧陽寧羌並屬漢中府廣元昭化劒州蒼溪閬中南部並屬四川保寧府蓬州南充並屬順慶府定逺合州巴縣並屬重慶府諸州縣界中皆西漢水之所經也禹貢雖無西漢水然必周知其所歴之地而後可以折東漢受氐道水之妄且廣元以下即禹貢之潛昭化合白水亦即禹貢之桓皆有闗于經故備著之禹貢以嶓冢繫梁州而漢志嶓冢在雍域之隴西一誤也禹貢云嶓冢導漾而漢志以嶓冢所出為西漢水其漾水則出氐道二誤也禹貢之潛乃漾水枝津西出為西漢水而漢志西漢水出西縣之嶓冢三誤也漢志不言漾水出何山而水經云出氐道縣嶓冢山是氐道亦有嶓冢四誤也漾者東漢之源而續水經者以西漢接漾水為一川五誤也漾沔枝津皆自東入西而酈注從舊說云西漢水至葭萌入漢六誤也川流離合地上灼然可見而酈注惑闞駰之說以為原始要終潛流或一故東西俱受漢漾之名七誤也羣言殽亂學者靡所折衷今說漢水當排棄諸家專主禹貢以沮沔為漢之别源以西漢為漾之枝津而氐道水則存而不論是亦理亂絲觧連環之術也禹貢錐指寧按今陜西通志漢中府羌州有嶓冢山在州北九十里形如冢漢水所出東入襄陽禹貢嶓冢導漾即此沔縣有漾水在舊大安軍南禹貢嶓冢導漾東流為漢褒城縣有沔水在縣南四里源出古金牛縣界南流合沮水南鄭縣有漢江在城南三里東流至漢陽府㑹大江水此與禹貢錐指所言相合又按黄宗羲今水經嘉陵江即東漢水源出陜西鳳縣東嘉陵谷歴兩當縣過畧陽縣治西㑹東谷諸水流經漢中府城南三里歴陽縣石泉縣南過金州北漢水又東過鄖西縣南又東北屈東南過均州東北過光化縣西南漢水又南逕榖城縣東均水入之漢水又東過襄陽城北又東南淯水從北來注之漢水又南經安陸州治西過宜城縣東夷水東流注之漢水經潛江縣分為潛江入於江漢水又東南臼水注之又經當陽縣之東漢水又東南溳水入焉漢水又東南至荆門州東九十里至大别山入於江其水自嶓冢為漾水沔縣為沔水漢中為漢水至荆山東為滄浪水蓋因地而稱名也其中所叙之水又與錐指所記詳畧不同備錄之以俟參考行水金鑑巻七十一
