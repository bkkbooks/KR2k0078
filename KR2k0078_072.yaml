body:
  text: 行水金鑑卷七十二江南按察使傅澤洪撰漢水又東為滄浪之水禹貢張平子南都賦云流滄浪而為隍廓方城而為墉李善注引左氏傳屈完所謂楚國方城以為城漢水以為池則是滄浪即漢水也蓋漢水至於楚地則其名為滄浪之水也尚書全解漢水自興元南鄭縣又七十二里至城固縣北二里又三百里至洋州興道縣百步又經金州之漢陰縣南二里又五百里至金州西城縣北百步又經洵陽縣又經均州之豐利鄖鄉二縣又六百八十里至均州武當縣西北四十里水中有滄浪洲至此又名滄浪水易祓尚書説屬武當漢屬南陽郡今為均州湖廣襄陽府傳云别流在荆州正義云傳言别流似分為異水按經首尾相連不是分别當以名稱别流也按水經夏水注云康成注尚書滄浪之水言今謂之夏水來同故世變名焉劉澄之著永初山水記云夏水古文以為滄浪漁父所歌也因此言之水應由沔今按夏水是江流沔非沔入夏假使沔注夏其勢西南非尚書又東之文也此辨最為明晰孔傳實出康成之後以夏水為滄浪故曰别流滄浪者漢水之色也非因洲而得名李白襄陽歌云漢水鴨頭緑正所謂滄浪説卦震為蒼筤竹漢童謡朩門倉琅根字雖不同而音義則一皆言其色青也禹貢錐指漢水自南鄭縣東南又東得長栁渡水經長栁村名又東徑胡城南南對扁鵲城漢水出於二城之間右會磐余水水出南山巴嶺上泉流兩分飛清派注南入蜀水北注漢津謂之磐余口酈注今胡城在城固縣西四十里又左會文水水經水即門水也出胡城北山石穴中東南流徑胡城北三城竒對隔谷羅布深溝固壘髙臺相距門水右注漢水謂之髙橋溪口酈注又東黑水注之水經水出北山南流入漢諸葛亮箋曰朝發南鄭暮宿黑水四五十里謂是水也道則百里也酈注縣黑水在城固西北五里又東過城固縣南又東過魏興安陽縣南涔水出自旱山北注之水經涔水出西南而東北入漢左谷水出西南而東北入漢右谷水出漢北即聓水也聓水歷胸奴城張良渠樊噲臺大城固北城韓信臺東回南轉又徑其城東而南入漢水謂之三水口也漢水又東會益口水出北山益谷東南流注於漢水酈注縣元和志漢水徑城固南去縣二里今城固縣北有城固北城漢置即大城固也胸奴城在今固城縣西大城固北城在今城固縣境內蔡傳云安陽今洋州真符縣也真符在今洋縣東六十里元省入洋州旱山在今南鄭縣東南漢志安陽鬵谷水出西南北入漢師古曰鬵音潛其字亦或從水涔鬵古字通或以為禹貢之潛非是酈注云涔水即黃水也益水在洋縣西北二十五里又東至灙城南與洛谷水合水經水北出洛谷谷北通長安其水南流右則灙水注之水發西溪東南流合為一水亂流南出際其城西南注漢水酈注也灙城今洋縣東北二十三里興勢故城是洛當作駱灙谷在縣北即駱谷之南口又東徑小城固南水經州治大城固移縣北故曰小城固漢水東歷上濤而徑於龍下蓋伏石驚湍流屯激怒故有上下二濤之名龍下地名也自白馬迄此則平川夾勢水豐壤沃利方三蜀矣度此溯洄從漢為山行之始酈注治今洋縣即興道故城小城固城在縣東元和志漢水經興道縣南去縣一百步寰宇記云漢水自發源至此屈曲行三百七十里入金州漢陰縣界又東徑石門灘水經山峽也東會酉水水北出秦嶺酉谷南歷重山與寒泉合水東出寒泉涌山頂望之交橫似若瀑布頽波激石散若雨灑勢同厭源風雨之池其水西流入於酉水酉水又南注漢謂之酉口酈注五灘在洋縣東十里又東徑媯虛為灘水經世本曰舜居媯汭在漢中西城縣或言媯虛在西北舜所居也後或姓姚或姓媯媯姚之異事妄未知所從酈注又東徑猴經灘水經山多猴猿好乘危綴飲故灘受斯名酈注又東徑小大黃金南水經山有黃金峭水北對黃金谷有黃金戍旁山依峭嶮折七里氐掠漢中岨此為戍與鐵城相對酈注縣並在洋東八十里又東合蘧蒢溪口水經水北出就谷在長安西南其水南流徑陽都坂東坂自上及下盤折一十九曲西連寒泉嶺漢中記曰自西城涉黃金峭寒泉嶺陽都坂峻崿百里絶壁萬尋既造其峯謂已踰嵩岱復瞻前嶺又倍過之言陟羊腸超煙雲之際顧看向塗杳然有不測之險山豐野牛野羊騰巖越嶺馳走若飛觸突樹朩十圍皆倒山殫艮岨地窮坎勢矣其水南歷蘧蒢溪而南流注於漢謂之蒢口酈注子陽都坂蘧蒢水皆在洋縣東北又有午道在縣東一百六十里元和志黃金縣有驛即子午道也舊道在金州安康縣界梁王神念别開此路又東右會洋水水經洋水導源巴山東北流徑平陽城又東北流入漢謂之城陽水口酈注八隋志西鄉縣有洋水元和志經縣東里平陽城在今西鄉縣南界又東歷敖頭水經水陸嶮湊魏興安康縣治有戍統領流雜酈注即安康縣今漢陰縣又東合直水水經水北出子午谷巖嶺下又南枝分東注旬水山上有戍置於崇阜之上下臨深淵張子房燒絶棧閣示無還也又東南歷直谷徑直城西而南流注漢酈注西直城與今石泉縣接界寰宇記漢水在石泉縣東百步又東徑直城南水經又東徑千渡而至蝦蟇嶺歷漢陽潕口而屇於彭溪龍竈矣並溪澗灘磧之名也酈注直魏地形志金城郡治城縣其故城在今漢陰縣西又東徑晉昌郡之寧都縣南水經縣治松溪口又東徑魏興郡廣城縣酈注漢寧都故城在陰縣東七十里晉置屬晉昌郡唐改漢陰寰宇記漢水在漢陰縣南二里今在縣西沈約宋志魏興郡有廣城縣其故城在今紫陽縣東南漢水在縣南門外又東徑魚脯溪口水經舊西城廣城二縣指此谷而分界也酈注又東過西城縣南水經又東徑鱉池南鯨灘鯨大也蜀都賦曰流漢湯湯驚浪雷奔望之天回即之雲昏者也又東徑嵐谷北口嶂逺溪深澗峽嶮邃氣蕭蕭以瑟瑟風颼颼而飀飀故川谷擅其目矣酈注又東右得大勢水經勢岨急溪故亦曰急勢也依山為城酈注右對月谷口水經山有阪月川於中黃壤沃衍而桑麻列植佳饒水田酈注又東徑西城縣故城南水經漢中郡之屬縣也漢末為西城郡魏文帝改為魏興郡治酈注本漢水自紫陽界折而東北流入興安州界州漢西城縣唐為金州治元和志漢水去州城百步水出麩金又東為鱣湍水經洪波渀蕩漰浪雲頽古耆舊言有鱣魚奮鰭溯流望濤直上至此則暴鰓失濟故因名湍矣酈注又東合旬水水經水北出旬山東南流注漢謂之旬口酈注陽旬口在今洵縣東南漢志漢中旬陽縣北山旬水所出南入沔又東徑朩蘭塞南水經左岸壘石數十行重疊數十里為朩蘭塞云酈注又東左得淯溪水經興晉旬陽二縣分界於是谷漢水又東注谷甲水口又東徑上庸郡北與關柎水合關柎水又南入上津注甲水甲水又東南流徑魏興郡之興晉縣南又東右入漢水酈注入漢志上雒縣甲水出秦嶺山東南至錫沔當在今白河縣界白河漢錫縣地晉旬陽二縣在今漢中府境上庸郡在今鄖陽漢中二府境又東徑魏興郡之錫縣故城北水經陽鍚音為白石灘縣故春秋鍚穴地也故屬漢中王莽之鍚治也縣有鍚義山又東徑長利谷南酈注利漢志漢中長縣有鄖關其故城在今鄖西縣西南又東過堵陽縣堵水出焉自上粉縣北流注之水經堵水自建平縣界故亭谷東歷新城郡郡故漢中之房陵縣也房陵故縣有粉水縣居其上故曰上粉縣也堵水又東徑方城亭而東北歷嵾山下而北徑堵陽縣南北流注於漢謂之堵口酈注堵堵水在今鄖縣南陽縣在今鄖陽縣南界上粉縣在今房縣境又東過鄖陽縣南又東徑鄖鄉縣故城南水經今鄖陽縣在鄖陽府境鄖鄉唐屬均州元改鄖縣元和志鄖鄉縣漢水西自豐利縣界流入南去縣三里豐利今白河也又東徑琵琶谷口水經梁益二州分境於此故謂之琵琶界也酈注又東北流又屈東南過武當縣東北水經陽今為均州在襄府西北三百九十里西去興安州七百里縣西北四十里漢水中有洲名滄浪洲庾仲雍漢記謂之千齡洲非也是世俗語訛音與字變矣地説曰水出荆山東南流為滄浪之水是近楚都故漁父歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足余按尚書禹貢言導漾水東流為漢又東為滄浪之水不言過而言為者明非他水決入也蓋漢沔水自下有滄浪通稱耳纒絡鄢郢地連紀郢咸楚都矣酈注浪自均州以至漢陽皆名滄之水故曰是近楚都以今輿地言之漢水自南鄭縣南又東徑城固縣南城固在漢中府東少北七十里水去縣四里舊志云縣東二里有飲馬灘每子午二時潮響如雷又五里為上濤下濤龍亭廢縣在縣東龍亭山下即龍下也又東徑洋縣南洋縣在府東南一百二十里水去縣二里又東徑西鄉縣東北西鄉在府東南二百二十里又東南徑石泉縣南石泉在興安州西二百五十里水去縣五十步又東徑漢陰縣南漢陰在州西少北一百六十里水去縣八十里又東徑紫陽縣南紫陽在州西南一百八十里州志云有怯灘在縣西十五里水陡如鬪又大力灘在縣西八里兩岸夾石左右有兩石觜最為舟楫患又石梁灘在縣西當任河水口中宮灘在縣東南一里極髙險中流有柱石怒濤之聲如雷長灘在縣東四里近汝河灘不甚險商舟停集漁火絡繹皆漢水所經也又東北徑興安州北州志云州境漢江多灘麩灘串灘二郎灘為險而神灘尤甚明成化十三年知州鄭福於沍冬時用火燒石疏鑿以殺其勢舟行利焉州東一里有長春堤成化八年為水衝壞十五年鄭福增築高堅萬厯二十年復加修築又東徑洵陽縣南洵陽在州東一百二十里水在縣南門外又東徑白河縣北白河在州東南一百七十里又東徑鄖西縣南鄖西在湖廣鄖陽府西一百四十里水去縣五十里又南徑鄖縣南明成化十二年置鄖陽府治鄖縣舊志云漢江自城西繞城南寶蓋天馬諸山皆錯列漢濱又東徑均州北均州在襄陽府西北三百九十里水去州四十里經所謂又東為滄浪之水者也禹貢錐指過三澨至于大别南入于江禹貢地説曰沔水東行過三澨合流觸大别山陂故馬融鄭玄王肅孔安國等咸以為三澨水名也許慎言澨者埤增水邉土人所止也春秋左傳曰文公十有六年楚軍次于勾澨以伐諸庸宣公四年楚令尹子越師於漳澨定公四年左司馬戌敗吳師於雍澨昭公二十三年司馬薳越縊于蓬澨服虔或謂之邑又謂之地京相璠曰杜預亦云水際及邉地名也今南陽淯陽二縣之間淯水之濱有南澨北澨矣而諸儒之論水陸相半又無山源出處之所津途關路唯康成及劉澄之言在竟陵縣界經云邔孟康曰邔音忌縣北池然池流多矣而論者疑焉而不能辨其所在酈注池北池之經本作地池流池字酈注亦誤三澨鄭康成説水在竟陵司馬貞引水經以為地名在邔縣北謂今竟陵有三參水俗云三噬非也今漢陽漢川有汊水自復州景陵縣來東入於漢寰宇記亦名澨水疑即三澨之一然據左傳漳澨薳澨之屬皆其水際未可強通今江漢之水漫流沱潛尚不可辨况所謂三澨乎書古文訓過者三澨之水分流别派至是而始合於漢水也蓋漢水既東流為滄浪之水矣於是過三澨水所入之處於是觸大别山以與江合也尚書全解按左傳澨有五睢澨宋地故酈注不引今就其所引者論之不知何者可當禹貢三澨之目蔡傳以漳澨薳澨與汊水為三澨而句澨雍澨其地皆有可考却不數韓汝節宗之以汊澨漳澨薳澨為三澨汊澨古無此名薳澨不知所在紛紛推測終無定論所可知者三澨為漢水之三大防其地當有名川來入漢上不越滄浪下不踰大别愚意當在淯水入漢處一在襄城北即大堤一在樊城南一在三洲口東皆襄陽縣地在邔縣之北也言在竟陵者非是邔縣故城在今襄陽府宜城縣東北其北即襄陽縣之東境是也史記索隱曰三澨地名在南郡邔縣北蓋即水經所言今無地以應之淯水注云淯水左右舊有二澨所謂南澨北澨者水側之濆此京相璠云在南陽淯陽之間者與邔縣無涉若以為入漢之水名則二澨不可為三澨水經沔水從襄陽縣東屈西南淯水從北來注之注云襄陽城東有東白沙白沙北有三洲東北有宛口即淯水所入也淯水今名唐河在襄陽縣東北及會白水一名濁水一名弱溝水又謂之唐白河而淯水之名遂晦其入漢處名三洲口三國時吳將朱然攻樊司馬懿救之追至三洲口大獲而還又王昶屯新野習水軍于三洲謀伐吳水經邔北之三澨豈即此三洲邪然洲澨不同水中可居者曰洲埤增水邊土人所止者曰澨以洲為澨吾終不能無疑鄭劉皆言三澨在竟陵界故後世説三澨者多求之此地索隱曰今竟陵有三參水俗云是三澨水參音去聲蔡傳曰三澨水名今郢州長壽縣磨石山發源東南流者名澨水至復州景陵縣界又名汊水韓汝節云汊楚駕反今按唐沔州有汊川縣杜佑曰汊音乂宋避太宗嫌名改曰漢川則汊與義同音可知廣韻汊魚肺切水名蔡傳作汊從俗也元和志云汊川水在汊川縣南二里漢陽府志云楊子港自景陵縣流徑漢川縣北又東入溳水即汊水也疑即三澨之一據左傳漳澨薳澨則為水際未可曉也湖廣通志曰沔陽州黃蓬之山下枕大江其東南有三澨焉北為滄浪之水按山臨大江而所稱三澨者又在其東南與漢水絶無交涉通志大謬承天府志以司馬河為一澨即出磨石山者馬溪河為一澨石家河為一澨自京山合流入景陵界謂之三汊水蓋即索隱所稱三參水也參去聲讀若篡蓋上音由汊轉而為參也蔡氏謂即三澨之一者專指司馬河而言大别山在漢陽府城東北半里漢水西岸左傳小别至於大别杜預云禹貢漢水至大别南入江然則此二别在江夏界水經注江水東徑魯山南古翼際山也地説曰漢與江合于衡北翼際山傍者也山上有吳江夏太守陸渙所治城蓋取二水之名地理志曰夏水過郡入江故曰江夏也舊治安陸吳乃徙此山左即沔口矣沔左有却月城故曲陵縣後乃沙羡縣治也羡音夷元和志魯山一名大别山在漢陽縣東北一百步其山前枕蜀江北帶漢水山上有吳將魯肅神祠渭按禹貢大别山杜元凱已知在江夏不在安豐酈氏亦主杜説而終不能指魯山為大别至唐人始能言之左傳定四年吳子伐楚舍舟於淮汭自豫章與楚夾漢史皇謂子常必速戰乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇止之十一月庚辰陳于柏舉吳師大敗楚師子常奔鄭孔疏云小别當在大别之東何則子常從小别與吳戰退而至大别明自東而漸西也今按豫章杜注云漢東江北地自豫章與楚夾漢謂吳軍漢東楚軍漢西也子常濟漢而陳自小别至於大别言其師衆為長陳自西及東若此其逺兩軍合戰則自大别以東尋傳文無從小别與吳戰退而至大别之事也小别當在大别之西孔説正相反今漢川縣東南有甑山即小别山元和志云小别山在汊川縣東南五十里唐汊川縣在今漢川縣北三十里故里數不同寰宇記云山形如甑土諺謂之甑山索隱云大别山土人謂之甑山蓋承孔疏之誤二别相去一百二十餘里禹貢錐指漢水自武當縣東北又東為佷子潭水經潭中有石磧洲長六十丈廣十八丈世亦以此洲為佷子葬父於斯酈注又東南徑武當縣故城北水經又東平陽川水注之水經水出縣北伏親山南歷平陽川徑平陽故城下又南流注於沔酈注今平陽故城在均州境又東南徑縣城東水經又東曾水注之水導源縣南武當山一曰太和山山形特秀曾水發源山麓徑越山陰東北流注於沔謂之曾口酈注又東徑龍巢山下水經山在沔水中髙十五丈廣員一里二百三十步山形峻峭酈注又東南徑涉都城東北水經故鄉名也郡國志築陽縣有涉都鄉均水於縣入沔謂之均口酈注南築音逐涉都城在今榖城縣界均水自陽府淅川縣流徑均州至榖城入漢今故道已湮又東南過酇縣之西南水經縣治故城南臨沔水謂之酇頭酈注酇今光化縣北有縣故城又南徑穀城東又南過陰縣之西水經沔水東徑穀城南而不徑其東矣城在穀城山上又東南徑陰縣故城西故下陰也酈注穀今穀城縣北有故城陰縣故城在今光化縣東北又東南得洛溪口水經水出縣西北集池陂東南流徑洛陽城北抗洛溪溪水東南注沔水也酈注又南過築陽東築水出自房陵縣東過其縣南流注之水經沔水又南泛水流注之水出梁州閬陽縣泛水又東徑巴渠北新城上庸東徑泛陽縣故城南晉分築陽立自縣以上山深水急枉渚崩湍水陸徑絶酈注縣房陵即今房縣地界閬陽泛陽未詳所在又東徑學城南水經梁州大路所由也舊説昔有人立學都於此值世荒亂生徒罔依遂共立城以禦亂故城得厥名矣泛水又東流注於沔謂之泛口也沔水又南徑闕林山東酈注城闕林一作開林在穀縣西北四里又南徑築陽縣東水經又南築水注之杜預以為彭水也水出梁州新城郡魏昌縣界東南流徑築陽縣築水又東徑築陽縣故城南又東注於沔謂之築口又南徑髙亭山東酈注今穀城縣治即築陽故城築水在縣南髙亭山在縣北又東為漆灘水經新野郡山都縣與順陽築陽分界於斯灘矣酈注又東過山都縣東北水經沔南有固城城側沔川即新野山都縣治也舊南陽之赤鄉矣秦以為縣沔水又東偏淺冬月可涉渡謂之交河兵戎之交多自此濟酈注有今襄陽縣西北山都故城又東徑樂山北水經昔諸葛亮好為梁甫吟每所登遊故俗以樂山為名酈注里今襄陽縣西北六十獨樂山是也又東徑隆中水經歷孔明舊宅北亮語劉禪曰先帝顧臣於草廬之中咨臣以當世之事即此宅也酈注里今襄陽縣西三十隆中山是也又東過襄陽縣北水經又東徑方山北山上有鄒恢碑魯宗之所立也山下潭中有杜元凱碑元凱好尚後名作兩碑並述已功一碑沈之峴山水中一碑下之於此潭曰百年之後何知不深谷為陵也山下水曲之隈云漢女昔遊處酈注縣方山一名萬山元和志萬山一名漢臯山在襄陽西十一里與南陽鄧縣分界古諺曰襄陽無西言其界促近又東合檀溪水水經水出縣西栁子山下東為鴨湖溪水自湖兩分北渠即溪水所導也北徑漢陰臺西臨流望逺按眺農圃情邈灌疏意寄漢陰故因名臺矣又北徑檀溪謂之檀溪水溪水旁城北注於沔一水東南出應劭曰城在襄水之陽故曰襄陽是水當即襄水也城北枕沔水即襄陽縣之故城也建安十三年魏武平荆州分南郡立為襄陽郡冠蓋相望一都之會也城南門道東有三碑一碑是晉太傅羊祜碑一碑是征南將軍杜預碑一碑是安南將軍劉儼碑並是學生所立城北枕沔水水中常苦蛟害襄陽太守鄧遐負其氣果拔劍入水蛟繞其足遐揮劍斬蛟流血丹水自後患除無復蛟難矣酈注謂今襄陽縣治即襄陽故城之壘城在郡治之西又徑平魯城南水經城魯宗之所築也東對樊建安中關侯圍于禁於此城會沔水泛溢三丈有餘城陷禁降酈注三樊城在縣北里舊志隄防至切者在襄樊二城間蓋二城並峙中流如峽口且唐鄧之水從白河南注橫截漢流以故波濤激射城隄為害最切又從縣東屈西南淯水從北來注之水經襄陽城東有東白沙白沙北有三洲東北有宛口即淯水所入也酈注口淯水入漢處名三洲在襄陽縣東北行水金鑑卷七十二
