body:
  text: 行水金鑑卷七十三江南按察使傅澤洪撰漢水沔水中有魚梁洲水經龎徳公所居士元居漢之陰在南白沙世故謂是地為白沙曲矣司馬德操宅洲之陽望衡對宇歡情自接泛舟褰裳率爾休畼豈待還桂柁於千里貢深心於永思哉水南有層臺號曰景升臺蓋劉表治襄陽之所築也言表盛游於此表性好鷹嘗登此臺歌野鷹來曲其聲韵似孟達上堵吟矣酈注又逕桃林亭東水經又逕峴山東羊祜之鎮襄陽也嘗登之及祜薨後人立碑於故處望者悲感杜元凱謂之墮淚碑酈注亭桃林在襄陽縣東南山在縣南七里亦曰峴首又東南逕蔡洲水經漢長水校尉蔡瑁居之故名蔡洲侍中襄陽侯習郁依范蠡養魚法作大陂池池中起釣臺東北二邊限以髙隄楸竹夾植蓮芡覆水是游宴之名處也山季倫鎮襄陽每臨此池未嘗不大醉而還恒言此是我髙陽池其水下入沔酈注又東南逕邑城北水經習郁襄陽侯之封邑也故曰邑城矣酈注又東合洞口水經水出安昌縣故城東北大父山西南流謂之白水水北有白水陂有漢光武故宅所謂白水鄉也酈注本安昌漢春陵縣後漢曰章陵魏更名安昌在今棗陽縣界又東過中廬縣東淮水自房陵縣淮山東流注之水經縣即春秋廬戎之國也縣故城南有水出西山山有石穴出馬謂之馬穴山酈注中今南漳縣東有廬故城又東南逕黎丘故城西水經建武四年朱祐自觀城圍秦豐於黎丘是也酈注紀光武注云黎丘故城在今襄州率道縣北率道後改為宜城又南過邔縣東北水經江元和志宜城本漢邔縣城東臨漢古諺曰邔無東言東逼漢江其地短促也又南得朩里水會水經楚時於宜城東穿渠上口去城三里漢南郡太守王寵又鑿之引蠻水灌田謂之木里溝逕宜城東而東北入於沔酈注又南過宜城縣東夷水出自房陵東流注之水經夷水蠻水也桓温父名彞改曰蠻水夷水導源中廬縣界康狼山山與荆山相隣其水東南流歴宜城西山謂之夷谿又東歴宜城西山謂之深谿東流合於夷水謂之深口也與夷水亂流東出謂之淇水夷水又東注於沔昔白起攻楚引西山谷水即是水也水從城西灌城東入注為淵今熨斗陂是也水潰城東北角百姓隨水流死於城東者數十萬城東皆臭因名其陂為臭池臭池溉田陂水散流又入朱湖陂朱湖陂亦下灌諸田餘水又下入朩里溝朩里溝故渠引鄢水也灌田七百頃白起渠溉三千頃膏良肥美更為沃壤也酈注城元和志漢水在宜縣東九里又逕鄀縣故城南水經古鄀子之國也楚昭王都之所謂鄢鄀盧羅之地也秦以為縣酈注縣故城在宜城東南又東敖水注之水經水出新市縣東北又西南流注於沔實曰敖口又南逕石城西酈注府新市縣即今京山縣境石城即今安陸治漢水自宜城南流百七十里至府濁流齧决最為可虞明嘉靖末下滯上圯漂溺不可勝計又東南與臼水合水經水出竟陵縣東北耶屈山西流注於沔魯定公四年吳師入郢昭王奔随濟於成臼謂是水也又東過荆城東酈注景竟陵縣即今陵縣自荆城東南流逕當陽縣之章山東水經禹貢所謂内方山至於大别者也既濱帶沔流寔會尚書之文矣酈注州在今荆門東北又東右會權口水經水出章山東南流逕權城北古之權國也權水又東入於沔酈注有荆門州東南權城又東南與陽口合水經水上承江陵縣赤湖逕郢城南東北流謂之楊水又東北流白湖水注之又東北流得東赤湖水口又東入華容縣又北逕竟陵縣西又北注於沔謂之楊口中夏口也沔水又東得滻口其水承大滻馬骨諸湖水周三四百里及其夏水來同渺若滄海洪濤巨浪縈連江沔故郭景純江賦云其傍則有珠滻丹漅是也酈注水陽水即楊水漢志漳水東至江陵入陽陽水入沔是為陽口古之漳澨也又東南逕江夏雲杜縣中夏水從西來注之水經即堵口也為中夏水縣故䢵亭禹貢所謂雲土夢作又故縣取名焉縣有雲夢城城在東北酈注沔通典復州陽縣有漢雲杜縣故城在縣西北有夏水沔水今沔陽州南長夏河即夏水也自監利縣流徑州南四十里與潛江縣分水又東北注於漢堵口今失其處蓋為水所湮也漢水在州北一百里自潛江流入與景陵分水又東入漢川縣界又東逕左桑水經昔周昭王南征渡沔中流而没百姓佐王䘮事故曰佐䘮左桑字失體耳酈注又東合巨亮水口水經水北承亮河南達於沔酈注又東得合驛口又東謂之横桑又東謂之鄭潭又東得死沔水經言昭王濟自是死沔王尸豈逆流乎但千古芒昧難以昭知推其事𩔖似是而非矣酈注又東與力口合水經有溾水出竟陵郡新陽縣西南河地山又東南流注宵城南又南入於沔水是曰力口酈注陵力口在今景縣東南又東南溳水入焉水經沔水又東逕沌水口水南通縣之太白湖湖水東南通江又謂之沌口酈注也元和志安陸縣溳水故清發水西北自随縣流入注於沔今在漢陽縣西北又東逕沌陽縣北水經處沌水之陽也又東逕林鄣故城北酈注臨今漢陽縣西嶂山下有沌陽廢縣林鄣故城在臨嶂山上又南至江夏沙羨縣北南入於江水經庾仲邕曰夏口一曰沔口矣禹貢曰漢水南至大别入江左傳定公四年吳師伐郢楚子常濟漢而陳自小别至於大别京相璠春秋土地名曰大别漢東山名在安豐縣南杜預釋地曰二别近漢之名無緣乃在安豐也案地說言漢水東行觸大别之陂南與江合則與尚書杜預相符但今不知所是矣酈注本漢陽縣漢沙羨縣地後漢末嘗為沙羨縣治東晉置沌陽縣齊廢隋改置漢陽唐沔州治宋為漢陽軍江水在城東南漢水在城北三里元和志漢陽縣漢水一名沔水西自㲼川縣界流入漢口在縣東亦曰夏口左𫝊謂之夏汭章懐太子注後漢書云漢水始欲出大江為夏口又為沔口實在江北孫權於江南築城名為夏口而夏漢之名移於江南沔水入江之口止謂之沔口或謂口夏口之名遂與漢口對立分據江之南北矣以今輿地言之漢水自均州北又東南逕光化縣西南光化襄陽府西北一百八十里水去縣十五里又東南逕穀城縣東北穀城在府西北一百二十里水去縣二十五里又東南逕襄陽縣北縣為襄陽府治東南三十里漢水中有龍尾洲縣志云漢水重濁與大河相似襄陽實當其衝為害最劇自唐以來皆築隄遶城以防潰决又東南逕宜城縣東宜城府東南一百二十里水去縣四里又南逕鍾祥縣西鍾祥為安陸府治又南逕荆門州東荆門府西九十里水去州一百二十里又東南逕京山縣西南京山府東一百五十里又東逕潛江縣北潛江府南少東二百十里水去縣二十里又東逕景陵縣南景陵府東南二百十里水去縣五十里又東逕沔陽州北沔陽府西少東三百三十里水去縣一百里州志云漢水由荆門州界折而東大小羣川咸滙焉勢盛流濁浸淫盪决為患無已而潛江地居汙下遂為衆水之壑一望瀰漫無復涯際漢水經其間重湖浩渺經流攴川不可辨也蓋漢水為湖北之害而襄郢二州為甚潛江又承襄郢之委流當漢江曲折迴合之處瀦為大澤勢不能免矣而景陵沔陽又潛江之委流也今沔陽四境唯湖陂連亘㡬數百里皆為漢水所滙蓋漢水性曲往往十里九灣語曰勁莫如濟曲莫如漢郢沔之間波流迴盪自必豬為藪澤小民見填淤之利復從而隄防之為民牧者又不講於節宣之宜䟽瀹之理歲月之間茍幸無事大水時至則委之洪濤中耳童承叙曰漢水至濁與江湖水合其流必澄故常填淤而沮澤之區因成沃壤民漸芟剔墾為阡陌又因其地之髙下修隄防以障之大者廣輪數十里小者十餘里謂之曰垸其不可隄者悉棄為萊蕪昔時垸必有長統丁夫主修葺其後法久弊滋修不以時垸愈多水愈廹客堤愈髙主堤愈卑故水至不得寛緩湍怒迅激勢必衝齧主隄先受其害客堤随之泛濫洶湧悉為巨浸矣又東逕漢陽縣北縣為漢陽府治水去縣三里又東至大别山折而南是為漢口經所謂過三澨至大别南入於江者也隄防考云舊時漢水從黄金口入排沙口東北折抱牯牛洲至鵞公口又西南轉北至郭師口對岸曰襄河口約長四十里然後下漢口成化初忽於排沙口下郭師口上直通一道約長十里漢水徑從此下而故道遂淤今魚利畧存不通舟楫俗呼為襄河以上流自襄陽來也按漢水夲東行觸大别之陂而南囘入江今則自郭師口以上决而東逕大别山後入江非復古之夏汭矣漢志云東漢水一名沔過江夏謂之夏水入江又云沮水南至沙羨南入江過郡五武都漢中南陽南郡江夏行四千里蓋曲莫如漢故其所行有若是之逺也禹貢錐指東匯澤為彭蠡禹貢匯迴也水東迴為彭蠡大澤孔氏𫝊彭蠡今鄱陽湖也納江西饒信州諸水自南康軍星子縣東北至湖口縣入江書古文觧城彭蠡在今江西南昌府東北一百五十里饒州府城西四十里南康府城東五里九江府城東九十里周迴四百五十里浸四州之境彭蠡之為澤寔在大江之南然以地勢北高而南下故其入於江也反為江水所遏而不得遂因却而自瀦以為是瀰漫數十百里之大澤朱子全書江漢之水相合而其流浸大於是東流於彭蠡大澤水既鍾於彭蠡則有所迴旋曲折不至於泛溢漂悍以衝突下流之勢故東為北江入於海也蓋先為之滙而後為之歸也尚書解叙漢江皆言東者主岷嶓居西而云非指曲折為文也黄潤玉書解三江相會而南不能以敵中北西來之勢故中北遏南而南相與迴旋而為一大澤者其來久矣今禹夲其所由有澤之因故歸之於漾而為之言曰東滙澤為彭蠡而於江亦曰會於滙耳其實彭蠡一澤三江之水為之也說者未有𤼵明此義禹貢集解江漢二水勢均力敵皆能自達於海者也故禹貢雖紀其合流仍各見其首尾紀其合流故於漢水言南入於江江漢朝宗於海各見其首尾故於漢水言東滙澤為彭蠡東為北江入於海於江水則言東迤北會為滙東為中江入於海彭蠡固江漢之所滙者也今春月江水暴漲則滙而入湖蓋江流浩渺而其下束以小孤山水道狹甚其勢不得不逆流而入此澤故有𤼵舟湖口無風而一夕達鄱陽之安仁者問其故乃舟乗逆流行甚迅速猶隨潮而上者也故江水之滙衆所共知今乃疑之顧弗深考耳且謂漢自大别入江合流已七百餘里安能復識其滙澤者為漢水邪亦可謂膠固之甚者矣夫單敘漢水源流則其勢不得不以漢水為主但既云南入江則東滙澤為彭蠡即江漢共滙可知矣不成曰南入於江東與江共滙澤為彭蠡然後為明白耶又謂彭蠡在大江之南當曰南滙不當曰東滙滙既在南則當曰北為北江不當曰東為北江其論南北反戾㡬為可笑蓋江漢兩水皆發源西蜀而東流入海獨漢水到大别入江則折而南流與江相合仍舊東流而滙為彭蠡又東流為北江以入海其東西南北以天下大勢論不主一江南北而言也今若欲改云南滙彭蠡則是南流入江之後又南滙彭蠡則漢水當逆流向洞庭矣滙澤之後不云東為北江而云北為北江則漢水又當决破安慶横入淮河矣王充耘讀書管見贛水出豫章南野縣西北過贛縣東水經山海經曰贛水出聶都山東北流注於江入彭澤西也班固稱南野縣彭水所發東入湖漢水庾仲初謂大庾嶠水北入豫章注於江者也地理志曰豫章水出贛縣西南而北入江蓋控引衆流總成一川雖稱謂有殊言歸一水矣故後漢郡國志曰贛有豫章水雷次宗云似因此水為其地名雖十川均流而此源最逺故獨受名焉豫章水導源東北流逕南野縣北贛川石岨水急行難傾波委注六十餘里逕贛縣東右會湖漢水水出雩都縣西北流逕金雞石又西北逕贛縣東西入豫章水酈注贛今按次宗豫章記十川者廬牽淦盱濁餘鄱僚循也此源謂贛水也贛即豫章湖漢牽即南水濁當作蜀循當作修淦潦則漢志所無酈元悉從雷記聶都山在南安府崇義縣西南六十里王象之曰章水所經非所出也府志云章水出湖廣郴州南三十六里黄岑山自宜章縣流入崇義縣界經聶都山漢志謂之彭水是知彭豫章實一水在南壄為彭行至贛為豫章猶禹貢嶓冢導漾東流為漢導沇水東流為濟随地而異名也劉澄之云贛縣東南有章水西有貢水縣治二水之間二水合贛字因以名縣酈元非之然近世皆宗其說以豫章為章水湖漢為貢水二水合流自縣至萬安縣凡十八灘唯黄公灘最險俗誤稱惶恐灘又西北過廬陵縣西水經十三州志稱廬水西出長沙安成縣吳寶鼎中立以為安城郡東至廬陵入湖漢水也酈注故此漢廬陵縣也城在今吉安府泰和縣北三十里又東北過石陽縣西水經漢和帝永平九年分廬陵立漢獻帝初平二年吳長沙桓王立廬陵郡治此豫章水又逕其郡南酈注陵今廬縣北六十里有石陽故城又東北過漢平縣南又東北過新淦縣西水經牽水西出宜春縣東逕吳平縣又東逕新淦縣而注于豫章水湖漢及贛並通稱也又淦水出其縣下注于贛水酈注漢漢志新淦縣注應劭曰淦水所出西入湖師古曰淦音紺又古含反今臨江府清江縣東六十里有新淦故城漢平縣即今新喻縣宜春縣即今袁州府治吳平縣即今新喻縣又北過南昌縣西水經盱水出南城縣西北流逕南昌縣南西注贛水又有濁水注之水出康樂縣故陽樂也濁水又東逕望蔡縣建成縣又東至南昌縣東流入於贛水贛水又北逕南昌縣城西秦以為廬江南部漢髙祖六年始命灌嬰以為豫章郡治此王莽更名縣曰宜善郡曰九江焉劉歆云湖漢等九水入彭蠡故言九江矣建安中更名西安晉又名為豫章城之南門曰松陽門門内有樟樹高七丈五尺大二十五圍枝葉扶蘇垂蔭數畝漢官儀曰豫章郡樹生庭中故以名郡矣贛水又逕郡北為津步水之西岸有盤石謂之石頭津步之處也西行二十里曰散原山北五六里有風雨池東太湖十里二百二十六歩北與城齊南縁迴折至南塘水通大江増減與江水同漢永元中太守張躬築塘以通南路兼遏此水冬夏不増減水至清深魚甚肥美每於夏月江水溢塘而過民居多被水害宋景平元年太守蔡君西起隄開塘為水門水盛則閉之内多則洩之自是居民少患矣又北逕龍沙西沙甚潔白髙峻而陁有龍形連亘五里中舊俗九月九日升髙處也又北逕椒丘城下又北逕鄡陽縣餘水注之水東出餘汗縣餘水北至鄡陽縣注贛水贛水又與鄱水合水出鄱陽縣東西逕其縣南又西注於贛又有僚水入焉其水導源建昌縣又經海昏縣謂之上僚水又謂之海昏江分為二水縣東津上有亭為津渡之要其水東北逕昌邑而東出豫章大江謂之慨口其一水枝分别注入於循水也酈注新今瑞州府昌縣東有康樂故城本漢建成縣地今鄱陽縣西北一百二十里有鄡陽故城鄡音口堯反今南康府建昌縣西六十里有昌邑城豫章大江謂贛水非潯陽江也南昌即今南昌府治餘汗縣即今餘干縣海昏縣今奉新武寧二縣境又北過彭澤縣西水經循水出艾縣東北逕永循縣又東北注贛水其水總納十川同湊一瀆俱注於彭蠡也酈注艾彭澤即今彭澤縣即今寧縣西境今南康府安義縣西南四十里有永循廢縣漢志循水東北至彭澤入湖漢行六百六十里北入於江水經大江南贛水總納洪流東西四十里而清潭逺漲緑波凝凈而會注於江川酈注以今輿地言之贛水自湖廣郴州宜章縣流入江西崇義縣界歴上猶南康並屬南安府贛縣贛州府治萬安泰和廬陵吉水永豐並屬吉安府峽江新淦清江並屬臨江府豐城至南昌入彭蠡湖並屬南昌府又北歴星子都昌並屬南康府徳化湖口並屬九江府注于大江春夏時彭蠡浩蕩無涯及乎霜降水涸則贛川如帶而已此水自昔有南江之稱鄭康成說三江云右會彭蠡為南江南史王僧辯傳陳霸先自嶺南起兵討侯景出南江行至湓口胡三省云贛水謂之南江唐張九齡都督洪州有望南江入始興郡路詩又自豫章南還江上作云歸去南江水磷磷見厎清豫章水之為南江其來已久非宋人臆說也禹貢錐指沔水與江合流又東過彭蠡澤水經尚書禹貢滙澤也漢與江鬭轉東成其澤矣酈注又東北出居巢縣南水經古巢國也江水自濡須口又東左會柵口水遵巢湖東逕烏上城北又東逕附農山北又東左會清谿水又東左會白石山水又東南積而為竇湖湖水東出謂之竇湖口柵水又東南逕高江産城又北委折蒲浦出焉柵水又東南流注於大江謂之柵口水酈注秦置居巢縣即今廬州府之無為州巢縣界也又東過牛渚縣南又東至石城縣水經經所謂石城縣者即宣城郡之石城縣也牛渚在姑熟烏江兩縣界中也于石城東北減五百許里安得逕牛渚而方界石城也蓋經之謬誤也酈注縣漢置石城今江南池州府貴池縣是也姑熟今太平府當塗縣烏江在今和州蓋江水先經無為州然後至和州境也水經此後一徃多誤故置不錄東為北江入於海禹貢自湖口以東江滙固同流矣而有北江中江之號者以今江西言之謂之北江荆揚言之為中江也大江過湖口東行至通州海門縣入海尚數千里禹貢止于滙者揚州無江患也書古文訓漢既入江與江混為一水而又曰東為北江入於海有似别為一水然何也蓋漢水源逺流大可亞於江兩相匹配其他小水入大水之例不同故於荆州言朝宗於海必以江漢並稱蓋曰江之入海非獨江水實兼漢水江固為江漢亦為江也故漢得分江之名而為北江記其入海者著其為瀆也三瀆皆自為一瀆惟江與漢共為一瀆導水九條始之以三水終之以二水而中間記四瀆其一河一瀆也其二漢與江一瀆也其三濟瀆其四淮瀆河瀆非無他水入之然皆小水入大水故河得以大并小而專為瀆江漢勢體均敵二水合流所以如此其大不以漢附於江而冺其入海之實故於漢於江並言入海而同為瀆也若漢不為瀆則東為北江入於海七字衍文而其序當殿導洛之後矣書纂言禹貢於嶓冢導漾之下則曰南入於江東滙澤為彭蠡東為北江入於海於岷山導江之下則曰東迤北會為滙東為中江入於海此二條者朱子及九峯蔡氏皆以彭蠡乃江西諸水所瀦固無仰於江漢之所滙而江漢二水並持東下又不見所謂北江中江者執是以疑經之誤其說甚備愚嘗親歴其地細觀其說而以經文証之乃知經文無誤二先生之說皆過論也夫滙本訓迴乃下流泛溢他水勢不能洩於是迴旋渟蓄瀦而為澤之謂也今春夏之間江漢水漲則彭蠡之水鬱不得流而逆注倒積漭為巨浸茫然數百餘里無復畔岸其滙為澤蓋如此雖無仰於江漢之所入然是因其下流牣故湖水壅閼沮抑而不能出方能成其澤爾非謂江漢之水截入澤内而為滙也若其截入為澤則但如他條曰至曰入可也何必變文言滙哉此東滙澤為彭蠡東迤北會為滙本無誤矣漢水不言會者為江水所隔與彭蠡不相接也江水不言彭蠡者與漢互見也逮夫二水漸消則彭蠡之水溢出大江循南岸而行與二水頡頏趨海所謂其北則江漢之濁流其南則鄱陽是矣第江水濬發最在上流其次則漢水自北岸而入又其次則彭蠡之水自南岸而入三水並持東下則江為中江漢為北江而彭蠡之水入江並流為南江者不言可知非謂分支各派判然殊途為二江也此東為北江東為中江入於海亦無誤也而理明義精如我朱子九峯又其髙弟乃皆不能無疑於斯何與况經文簡奧其言南入於江東滙為澤蓋亦無逺不包而曰南曰東與今水道屈折迤邐勢正相符今却又云經文自有謬處與今水道全然不合不可强解此不可曉也又按江水自東陵而下漢水自漢陽而下其勢皆漸趨東北湖口為江漢所滙之處正在東陵漢陽東北與經文亦合今却又云於漢水則宜改曰南滙彭蠡於導江則宜改曰南會於滙此又不可曉也若夫所謂横截南入於鄱陽又横截而北流為九江又謂至此而後一先一後以入於彭蠡既滙之後又復循次而出以為二江此自說者之誤非經文之誤也蓋經意以為漢雖入江而自循北岸以達於海不可冺滅故有東滙北江入海之文朱子偶未之思以為二水既合則有江無漢故既疑其誤而復有取於鄭樵之說以為東滙澤為彭蠡東為北江入於海二句宜衍蔡氏篤信朱子不復别求其說遂再立論以疑經皆非也或曰南之有江猶北之有河皆大水也然渭水洛水皆入於河不言中河北河安知中江北江之說不為誤乎是不然河源逺出悶磨黎山自積石龍門而下氣勢雄猛流波洶洽而洛渭二水近出鳥鼠同穴熊耳諸山不數百里遂達於河㡬不能見安得與河為敵若夫江源出於嶓冢既不相逺而其通流之地大小雖殊終不相揜則漢雖入江猶得各紀其為滙為江入海之實夫豈過乎河可以包渭洛而江不得以包漢故於兖州則曰九河既道不兼渭洛而言荆州則曰江漢朝宗於海對舉二水而並言之禹貢之立義精矣嗚呼經賴真儒而明禹貢有朱子及蔡氏者為之辨析其義猶晦信乎說難矣張吉禹貢疑誤辯漢既入江所行與江同道故於導江下釋之禹貢錐指行水金鑑巻七十三
