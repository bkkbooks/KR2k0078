body:
  text: 行水金鑑卷七十六江南按察使傅澤洪撰江水又東徑竹畦南水經江中有觀詳溠溠東有大洲洲東分為爵洲洲南對湘江口也酈注又東至長沙下巂縣北澧水沅水資水合東流注之水經凡此諸水皆注於洞庭之陂是乃湘水非江川也􅐱注洞下巂故城在今武昌府通城縣西巴陵亦下嶲地庭湖在其西南水經注澧水流注于洞庭湖俗謂之曰澧江口也水經沅水出牂牁且蘭縣為旁􅗂水又東至鐔城縣為沅水東徑無陽縣又東北過臨沅縣南又東至長沙下巂縣西北入于江注云沅水下至洞庭湖方會于江也資水出零陵都梁縣路山東北過夫夷縣東北過邵陵縣之北又東北過益陽縣北又東與沅水合于湖中東北入于江也注云湖即洞庭湖也所入之處謂之益陽江口益陽今長沙府屬湘水從南來注之水經江水右會湘水所謂江水會者也􅐱注陵水經湘水出零始安縣陽海山東北過零陵縣東又東北過洮陽縣東又東北過泉陵縣西又東北過重安縣東又東北過酃縣西承水從東南來注之又東北過隂山縣西洣水從東南來注之又北過醴陵縣西漉水從東注之又北過臨湘縣西瀏水從縣西北流注之又北溈水從西南來注之又北過羅縣西汨水從東來流注之又北過下嶲縣西微水從東來流注之又北至巴丘山入于江湘水會資沅微澧四水同注洞庭而北會大江名曰五渚巴丘山在湘水右岸山有巴陵故城西對長洲南湘浦北對大江三水所會謂之三江口孫光憲北夢瑣言云湘江北流至嶽陽達蜀江夏潦後蜀江漲遏住湘浦溢為洞庭湖凡數百里而君山宛在水中秋水過此山復居于陸唯一條湘川而巳山海經言洞庭沅澧之交瀟湘之淵是為九江之門按澧鼎沅湘合諸蠻黔南之水滙為洞庭至巴陵與荆江合而東州據其上水經云湘水右會小青口資水也世謂之益陽江右則沅水注之謂之橫房江東到微湖世謂之靡湖西流注為江謂之靡湖口左則澧水謂之武陵江凡此五水注為洞庭北會為大江名曰五瀦戰國䇿曰秦與荆戰大破之襲郢取洞庭五瀦楚辭帝子降兮北瀦皆其地也樂史言大江在巴陵東北流入洞庭今洞庭水會於江非江流入洞庭也荆江出巴蜀自高注下濁流洶湧夏秋暴漲則逆泛洞庭瀟湘清流頓皆渾濁嶽人謂之翻流水南至青草湖或三五日乃還俗云水神朝君山嶽陽風土記以今輿地言之江水自宜都縣北合夷水又東徑枝江縣北枝江在荆州府西一百七十里又東徑松滋縣北松滋在府西南一百二十里本漢髙縣地又東徑江陵縣南江陵荆州府治隄防考云大江流入郡境自西而北而東而南勢多紆折南北兩岸俱平衍下隰水易漫流故有決溢之害濱江諸縣皆築隄以為捍衛自松滋至巴陵之城陵磯長亘六百餘里北岸有陽州茅埠隄長亘七百餘里咫尺不堅千里為壑又東徑公安縣北公安在府東南一百二十里本漢孱陵縣有涔陽鎮在公安故城東南又東徑石首縣北石首在府東南一百八十里本漢華容縣地又東徑監利縣西華容縣北監利在府東南二百里本楚容邑漢置華容縣三國吳析置監利縣其故城在今縣東北章華臺在縣西北六十里夏水篇云夏水東徑華容縣南又東徑監利縣南韋昭曰雲夢在華容縣郭景純言東南巴丘湖是也今嶽州府亦有華容縣在府西少北一百五十五里本漢孱陵縣地晉分置南安縣隋改名華容非古華容也又東至巴陵縣西北會洞庭之水巴陵嶽州府治本漢下嶲縣地荆江口在縣西北洞庭水入江處亦名西江口又名三江口元和志巴陵城對三江口岷江為西江澧江為中江湘江為南江按三江口北岸有楊林浦一名楊葉洲蓋即水經注所謂巴陵故城西對長洲者此後世大江之經流酈道元所稱北江者也禹之所𨗳則異於是袁中道澧遊記曰酈注水經於江陵枚回洲下有南北江之名南江即江水由澧入洞庭道也陵谷變遷今之大江始獨專其澎湃而南江之迹稍稍湮沒僅為衣帶細流然江水會澧故道猶可考云今按小修此義最為精核水經注澧水出武陵充縣西歷山東過其縣南今嶽州府慈利縣所轄永定九溪二衛皆漢充縣地歷山在永定衛西澧水自衛界流徑九溪衛西又東婁水入焉水出巴東界東徑零陽縣注于澧水又東徑零陽縣南今慈利縣北有零陽故城又東徑澧陽縣右會泄水謂之泄口今石門縣西北有泄水又東徑澧陽縣南縣南臨澧水晉天門郡治今在澧州西一百十里又東徑作唐縣北作唐即今安鄉縣在澧州東南一百二十五里北至公安縣界六十里左合涔水水出西南天門郡界南徑岑評屯屯堨涔水溉田數千頃又東南流注於澧水岑評屯在今澧州界州在嶽州府西四百二十里北至公安縣八十里本漢零陽縣地隋析置澧陽縣其故城即今州治澧水在州南三里又東淡水出焉澧水又南徑故郡城東東轉徑作唐縣南今安鄉縣東南有作唐故城又東徑安南縣南今華容縣是淡水注之謂之淡口又東與赤沙湖會湖水北通江而南注澧謂之決口赤沙湖在今華容縣西南亦謂之赤亭湖西接安鄉縣界又東至長沙下嶲縣西北東注洞庭湖俗謂之澧江口澧水自石門以西與𨗳江無涉其南江會澧故道參以近志有可得而言者江陵縣西南二十里有虎渡口在龍洲之南後漢郡守法雄有異政猛虎渡江去因名宋乾道七年湖北漕臣李燾修虎渡堤即此水經注江水自枚回洲分為南北二江北江有故鄉洲其下為龍洲南江從此東南流注於澧水同入洞庭蓋即所謂涔水也澧州志云涔水為岷江别𣲖從公安入境為四水口在州北七十里東接安鄉湖口北連荆江又東南流過焦圻一箭河至滙口入澧故稱涔澧楚辭望涔陽兮極浦今公安舊縣東南有涔陽鎮即其地也澧水又東徑安鄉縣南會赤沙湖東距巴陵縣百里而東入洞庭湖湖在巴陵縣西南一百五十步見元和志此𨗳江東至于澧過九江至于東陵之故道也春秋傳曰物莫能兩大故二水並行一盛則一微自然之理也昔禹既疏鑿三峽水勢并注其中而北谷村之舊流遂為斷江其後魚復江所出之夷水亦致淺狹不可行舟近事如句容縣故江乘地北瀕大江今皆為洲渚江水南去岸二十里揚子江舊濶四十里瓜洲本江中一洲今北與揚子橋相連而江面僅七八里又如靖江縣大江舊分二派繞縣南北明天啓以來潮沙壅積北派竟成平陸與揚州之泰興相連以今驗古小修云北江漸盛而南江日微殆非臆説然自屈原九歌云望涔陽兮極浦橫大江兮揚靈蓋涔陽在涔水之北大江又在涔陽之北則戰國時固以北江為正流而南江為涔水矣年代久逺世鮮有知者地志水經所言宜乎與禹貢不合也禹貢錐指東迆北會于滙禹貢迆者斜出之辭江漢二水皆自西來至其合處則其勢迆靡而相屬故漢水自發源嶓冢皆東流至其將與江合也其稍折而南江水自發源岷山皆東流至其將與漢合也則稍折而北蓋江在漢南漢在江北漢稍南江稍北則其勢相屬故會于彭蠡而復東也滙者彭蠡之澤也不言會于彭蠡者蓋蒙上東滙澤為彭蠡之文且見其與漢水共注此澤也漢孔氏以東迤為一句以北字屬于下謂北會于滙故其説以謂迤溢也東溢分流都共北會為彭蠡鄭氏又以東迆者為南江夫既以迆為溢而又以東溢為分流展轉相訓乃成義其文勢不相屬非經意也據經文言北江中江者是自彭蠡而東方分為二江鄭氏以東迆為南江則是自東陵而下已分為三矣此説尤不合尚書全解江至東陵始與漢合而徑于東陵之下記其東行斜迆而北者著其與漢既合之形勢也繼曰會于滙者著其同為彭蠡澤也經之文明潔如此何得不信而猶惑于孔鄭之鑿説乎禹貢集解江水迆北由沙羡始漢自大别以至彭蠡大勢皆東江自沙羡以至彭蠡則東且迆北矣經先漢後江東滙為彭蠡者漢也而江水亦至其處故曰東迆北會于滙言與漢所滙之彭蠡會也于字俗訛作為則其義不可通矣禹貢錐指江水又東左得二夏浦水經夏浦俗謂之西江口又東徑忌置山南山東即隱口浦矣江之右岸有城陵山􅐱注宋今巴陵縣北有忌置洲書檀道濟等討謝晦至忌置洲列船過江即此其東有城陵磯東北接臨湘縣界磯下為三湘浦元和志云在巴陵縣東北十二里黃潤玉云今江水衝城陵磯而臨江驛至嶽陽湖口六十里皆淤沙漲起南環湖北􅜲江塞隘九江之口其章華臺之水亦淤窄矣又東徑彭城口水經水東有彭城􅑑故水受其名􅐱注江水自彭城􅑑東徑如山北水經北對隱􅑑二􅑑之間大江中有獨石孤立山東江浦世謂之白馬口酈注云彭城􅑑在臨湘縣西江中元和志在巴陵縣東北九十四里即今臨湘縣也縣東北十里有白馬磯山又有隱磯又左徑白螺山南水經右歷鴨蘭􅑑北江中也東得鴨蘭治浦二口夏浦也􅐱注左徑止烏林南水經村居地名也又東徑烏黎口江浦也即中烏林矣又東徑烏林南吳黃蓋敗魏武於烏林即是處也􅐱注又東左得子練口水經北通練浦又東合練口江浦也江之右岸得蒲􅑑口即陸口也水出下嶲縣西三山溪又入蒲圻縣北又徑蒲􅑑山北入大江酈注里蒲磯山在今蒲圻縣南五十圻與磯通元和志云赤壁山在蒲圻縣西一百二十里北臨大江蓋其時未有嘉魚也今蒲圻臨江之地盡入嘉魚而蒲圻無江水左得中陽水口又東得白沙口水經一名沙屯即麻屯口也本名蔑默口江浦矣􅐱注東右得聶口水經江浦也左對聶洲􅐱注左徑百人山南水經右徑赤壁山北昔周瑜與黃蓋詐魏武大軍所起也酈注西百人山在漢陽縣南八十里東徑大軍山南又東徑小軍山南水經西大軍山在漢陽縣南六十里小軍山在縣西南五十里又東徑雞翅山北又東北至江夏沙羡縣西北沔水從北來注之水經沌水上承陽縣之白湖東南流為沌水徑陽縣南注於江謂之沌口酈注今江夏本漢沙羡縣地為武昌府治又東徑歎父山南對歎洲水經亦曰歎步矣江之右岸當鸚鵡洲南有江水右迤謂之驛渚三月以末水下通樊口水酈注府鸚鵡洲在漢陽城西南二里大江中尾直黃鵠磯明季蕩滅又東徑魯山南水經古翼際山也山左即沔水口矣江之右岸有船官浦歷黃鵠􅑑西而南直鸚鵡洲之下尾江水溠回狀浦是曰黃軍浦船官浦東即黃鵠山東北對夏口城魏黃初二年孫權所築也酈注東魯山即大别在漢陽府城北半里黃鵠山在府城內西隅聳峙江口與大别對夏口故城在今江夏縣西南左得湖口水通大湖又東合聶口水上承沔水於安陸縣而東徑聶陽縣北東南注于江又東湖水自北南注謂之嘉吳江右岸頻得二夏浦北對東城洲西浦側有雍伏戍江之左岸東會龍驤水口出北山蠻中江之右武口水上通安陸之延頭水經荆州界盡此􅐱注東徑若城南又東過邾縣南水經庾仲雍江記曰若城至武城口三十里者也南對郭口夏浦而不常泛矣江水東徑白虎􅑑北山臨側江濆又東會赤溪夏浦二口江水右迤也又東徑貝􅑑此庾仲雍謂之沛岸矣江右岸有秋口江浦也􅐱注右得黎􅑑北水經亦曰黎岸也北對舉口舉水出龜頭山西又南東歷赤亭下又謂之赤亭水又分為二水南流注於江謂之舉洲南對舉洲左傳定公四年吳楚陳于柏舉疑即此也酈注又東徑邾縣故城南水經南對蘆洲酈注有邾縣即今黃岡黃陂縣地黃岡縣西北邾縣故城蘆洲在今武昌縣西二十里一名伍洲鄂縣北江水右得樊口水經西鄂縣即今武昌縣樊口在縣北五里陸遊曰黃州與樊口正相對樊山在縣西一里江水又左徑赤鼻山南水經山臨側江川􅐱注東赤鼻山在黃州府城西北蘇坡誤認為赤壁者也又東徑西陽郡南郡治即西陽縣也江之右岸有鄂縣故城水經九州記曰鄂今武昌也孫權以魏黃初元年自公安徙此改曰武昌縣鄂縣徙治于袁山東今武昌郡治城南有袁山即樊山也北背大江江上有釣臺江中有節度石三段廣百步高五六丈是西陽武昌分江於斯石也又得東五丈又得次浦江浦也東徑五磯北有五山沿次江隂故得是名矣仲雍謂之五圻酈注左則巴水注之水經水出雩婁縣之下靈山即大别山也與決水同出一山故世謂之分水山亦或曰巴山南歷蠻中又南徑巴水戍南流注于江謂之巴口􅐱注郡雩婁縣漢屬廬江大别山在漢陽府又東徑車犬縣故城南水經故弦國也城在山之陽南對五洲也􅐱注州車犬縣即今黃府蘄水縣地東會希水口出灊縣霍山西麓山北有灊縣故城水經地理志曰縣南有天柱山即霍山也有祠南嶽廟齊立霍州治此西南流分為二水枝津出焉希水又南積而為湖謂之希湖湖水又南流徑車犬縣東而南流注于江是曰希口水水流急濬霖雨暴病漂濫無常行者難之酈注水希水在今蘄縣南大江右岸有厭里口安樂浦水經從此至武昌尚方作部諸屯相接枕帶長江又東得桑步步下有章浦本南陽郡治今悉荒蕪􅐱注左得赤水浦水經夏浦也􅐱注又東徑南陽山南水經仲雍謂之南陽圻水勢迅急酈注又東徑西陵縣故城南水經史記秦昭王遣白起伐楚取西陵者也酈注黃故城在今州府蘄州西東歷孟家溠江之右岸有黃石山水徑其北水經即黃石􅑑也東山偏髙謂之西塞對黃公九􅑑所謂九圻者也酈注西黃石􅑑在武昌府大冶縣東北三十里塞山在縣東九十里元和志云在武昌縣東八十五里蓋與大冶分山也又東過蘄春縣南蘄水從北東注之水經又東徑蘄春縣故城南又東徑積布山南西陽尋陽二郡界也酈注春蘄春縣即今蘄州水經蘄水出江夏蘄縣北山南過其縣西又南至蘄口南入于江又東過下雉縣北刋水從東陵西南注之水經興今武昌府國州東有下雉故城又東左得青林口水經水經注江水自下嶲以東所紀山水地名或瑣細難考沔水自石城以東尤多舛錯道元亦自謂未必一得其實今據府州縣志以為之綱而掇取水經注及羣書要語附載於其下江水自巴陵縣西北會洞庭湖又東徑其縣北又東徑臨湘縣北臨湘在湖廣嶽州府東北七十五里晉以後為巴陵縣宋析置臨湘縣又東徑嘉魚縣西北與沔陽州分水嘉魚在武昌府西南二百五十里漢沙羡縣地隋為蒲圻縣地南唐分置嘉魚縣沔陽在安陸府南少東三百三十里本漢州陵縣又東北徑江夏縣西漢陽縣東又北漢水自北來注之江夏為湖廣武昌府治本漢沙羡縣地漢陽為漢陽府治本春秋之夏汭亦漢沙羡縣地又北折而東徑武昌縣北其對岸則黃陂縣黃岡縣武昌在武昌府東北一百八十里本漢鄂縣黃陂在黃州府西二百四十里本漢邾縣地黃岡為府治本漢西陽邾西陵三縣今縣西北有邾縣故城又東徑大冶縣北蘄水縣南大冶在興國州西北一百五十里本漢鄂下雉二縣地蘄水在黃州府東少南一百十里本漢軑縣又東徑興國縣北蘄州南興國在武昌府東南三百六十里本漢下雉縣兼鄂縣地蘄州在黃州府東少南一百八十里本漢蘄春縣又東徑瑞昌縣北廣濟縣南瑞昌在江西九江府西九十里本漢柴桑縣地廣濟在湖廣蘄州東七十里本漢蘄春尋陽二縣地大江去縣七十里又東徑德化縣北黃梅縣南德化九江府治晉永興初于此置尋陽郡隋因改柴桑曰尋陽而江北之名遂移于江南黃梅在蘄州東一百六十里本漢尋陽縣其故城在今縣東北元和志大江在黃梅縣南一百里彭蠡澤在德化縣東南九十里其水北注于江此𨗳江東迆北會于滙之所經也今洞庭湖遇江漲其水亦為江波所遏而經獨于彭蠡言滙澤者蓋禹時巴陵未有洲渚九江即是江身與彭蠡異故不言滙澤也吳幼清移前東滙澤為彭蠡六字于此東迆北會于滙之上其説曰鄂北對漢陽軍大别山漢水自北來入江江水與之會合流曰滙故曰東迆北會于滙不言會于漢者以漢有漾沔滄浪之異名不可指定一名而言故但曰會于滙也金吉甫則直以滙為誤字其説曰當作會于漢蓋江勢迆北處正受漢口若至彭蠡則東流久矣滙字必因上文而誤也今按江漢合流入揚州之域會彭蠡水始有三江之目若以滙指漢水則北江中江不待過彭蠡而始有其名矣禹貢于荆州言江漢無中江北江之名于揚州始言三江蓋必會南江而後可命之曰北曰中也周禮荆州曰其川江漢揚州曰其川三江與禹貢若合符節匯非漢口明矣自宋以來説此經者遇難解處不以為衍文則以為錯簡不以為錯簡則以為誤字真禹貢之一厄也禹貢錐指東為中江入于海禹貢漢江二水既合于彭蠡矣然後由彭蠡分出為北江中江入于海此言東為中江入于海而上文導漾東為北江入于海有北江中江則是必有南江矣即揚州所謂三江既入是也尚書全解傳曰有北有中南可知曽氏曰豫章九江合于湖漢東至彭蠡入江此九江蓋南江也南江乃江之故迹非禹所𨗳禹𨗳漢水入焉與舊江合流而水之派分為南北故漢為北江又𨗳岷山之江入焉其流介乎二江之中故為中江南江乃故道故經不志程氏曰經云東滙澤為彭蠡東迤北會于滙是二語者附著直略切南江以槩其所不書者也彭蠡為南江無疑禹之行水嘗經疏𨗳則雖小而見録無所致力則雖大而不書南江源派誠大且長正以不經疏𨗳故自彭蠡而上無一山一水得見于經然于其合并江漢而以滙會名之使天下因鼎錯之實參北中之目而南江隱然在二語中此聖經之書法也邵氏曰江水濬發最在上流其次則漢自北入其次則彭蠡自南入三江並持而東則江為中江漢為北江彭蠡所入為南江可知巳非判然異派之謂也且江漢之合茫然一水唯見江不見漢也故曰中江曰北江然其勢則相敵也故曰江漢朝宗凡集傳謂經誤者非是餘干張克修亦云渭按三江之説自康成子瞻以後得三氏而愈明江漢共為一瀆而其入海也則漢為北江江為中江即朝宗于海並舉二川已為之張本矣南江無所致力不用循行故𨗳水無文以今輿地言之江水至江西九江府德化縣東北贑水合彭蠡湖從南來注之江水又東北徑湖口縣北又東北徑彭澤縣北其對岸則宿松縣望江縣湖口在江西九江府東六十里本漢彭澤縣彭澤在府東一百二十里本漢彭澤縣地縣北大江中有馬當山陸龜蒙銘曰天下之險在山曰太行在水曰吕梁合二險而為一又聞乎馬當宿松在江南安慶府西南二百六十里本漢皖縣地大江在縣南一百二十里縣志云小孤山在縣東南一百二十里舊時峙江北岸與南岸彭郎磯相對江水經此湍急如沸明成化十二年江水忽分流于山北流日益廣自是屹立中流大江澎湃環于四面望江在府西南一百二十里亦漢皖縣地晉置大雷戍即今縣治大江在縣南十五里楊溪河即古雷水也亦曰雷池乂東北徑東流縣西其對岸則懷寧縣東流在江南池州府西少南一百八十里亦漢彭澤縣地大江去縣一里懷寧為安慶府治本漢皖縣大江在南門外又東北徑貴池縣北其對岸則桐城縣貴池池州府治本漢石城縣大江去縣五里桐城在安慶府東北一百二十里春秋桐國漢置樅陽縣史記秦始皇自雲夢浮江渚下觀籍柯括地志云在同安縣東隋改樅陽曰同安也漢書武帝自尋陽浮江薄樅陽而出今縣東南有射蛟臺又東北徑銅陵縣西又東北徑繁昌縣北其對岸則無為州銅陵在池州府東北一百里本漢陵陽春穀二縣地大江去縣里許鵲頭山在縣北左傳昭五年楚伐吳吳人敗諸鵲岸即此繁昌在太平府西南一百三十里本漢春穀縣大江去縣五十里赭圻城西臨大江吳赭圻屯也縣東北三十里江中有鵲尾洲無為在廬州府東南二百七十里春秋巢國地漢置居巢襄安臨湖三縣水經志沔水與江合流又東合彭蠡澤又東北出居巢縣南古巢國也湯伐桀桀奔南巢即此江水自濡須口又東左會柵口水水遵巢湖東過故東關城又東南流注于大江按州東少南九十里為巢縣漢居巢縣地巢湖在縣西亦作漅湖又名焦湖方輿勝覽云湖周四百餘里占合肥舒城廬江巢四縣之境納諸水而注之江濡須水在縣南源出巢湖亦曰東關水又按寰宇記江水在含山縣南一百七十里九域志亦云含山縣有大江蓋唐宋時其南境本瀕江自明初割縣南周興銅城梅山等鄉入無為州而縣界遂無江矣又東北徑蕪湖縣西又北徑當塗縣西其對岸則和州蕪湖在太平府南少西六十里春秋吳鳩兹邑漢置蕪湖縣大江去縣五里蟂磯在縣西七里江中中江在縣南一名蕪湖水元和志云蕪湖水在當塗縣西南八十里源出丹陽湖西北流入大江寰宇記云蕪湖在蕪湖縣界長七里縣志以縣東十五里天成湖當之一名天聖湖當塗太平府治本漢丹陽縣牛渚山一名采石山在縣西北二十五里西臨大江渡江至和州二十五里陸遊云古來江南有事從采石渡者十之九從京口渡者十之一蓋以江面狹于瓜州也和州在江寧府西一百三十里本漢厯陽縣大江在州東南江上有梁山宋大明七年祀梁山大閲江中立雙闕于山上元和志云梁山在歷陽縣南七十里東岸有博望山屬姑熟二山隔江相對望之如門南朝謂之天門山橫江浦在州東南元和志云歷陽縣東南二十六里直江南采石渡處烏江浦在州東北元和志云在烏江縣東四里即亭長𣟵船處又東北徑江寧縣西其對岸則江浦縣江寧與上元縣並為江南江寧府治本戰國楚金陵秦改曰秣陵漢置秣陵縣屬丹陽郡其故城在今縣東南五里寰宇記云大江從江寧縣西一百二十里承當塗縣分鮆浦上田為界紆回屈曲二百九十三里與和州烏江揚州六合並分中流為界胡三省曰江水東流自武昌以下漸漸向北蓋南紀諸山所迫陂陀之勢漸使之然也至于江寧江流愈北蓋建康當下流都會望潯陽武昌皆直南望歷陽夀陽皆直西故建康謂歷陽皖城以西皆曰江西而江西亦謂建康為江東建康謂姑孰為南州京口為北府皆地勢然也三山在縣西南五十七里一名三山磯又有歷山慈姥山落星山皆西臨大江江浦在府西四十里本漢堂邑全椒二縣地舊志云大江在縣東南三里自浦子口渡江至府城觀音門二十里而近一名安陽渡又云大江自梁山來曰揚子江抵浦子口接六合縣界曰宣化江又東北徑上元縣北其對岸則六合縣上元本漢秣陵縣地大江去縣二十餘里有山踞江而出者曰焦家觜又東曰觀音山燕子磯又東歷濤山以接黃天蕩在縣東北八十里胡三省曰大江過升州界浸以深廣自老鸛觜渡白沙橫濶三十餘里俗呼黃天蕩六合在府東北一百三十里漢堂邑縣地大江在縣東南六合山在縣西北七十五里隋開皇九年晉王平陳于此臨江觀渡兵馬瓜步山在縣東南宋元嘉二十七年魏主燾至六合登瓜步隔江望秣陵才數十里寰宇記引南兖州記云瓜步山東五里有赤岸南臨江中潮水自海入江衝激六七百里至此岸側其勢始衰按枚乘七發言廣陵曲江之濤曰凌赤岸篲扶桑郭璞江賦云鼓洪濤于赤岸淪餘波于柴桑皆謂此也輿地紀勝云滁河即古塗水源出合肥縣東流徑全椒滁州六合至瓜步入江瓜步之東又有石帆山矗居江中山東即黃天蕩江流至此波濤甚險又東徑句容縣北其北岸則儀真縣句容在府東九十里本漢句容江乘二縣大江去縣七十里龍灘鎮在縣西北八十里逼臨大江儀真在揚州府西七十里本漢江都縣地唐為揚子縣縣西二十里宣化鎮有五馬渡晉五王于此渡江故名又東徑丹徒縣北其北岸則江都縣丹徒鎮江府治春秋吳朱方邑漢置丹徒縣北固山在府城北下臨長江京峴山在城東五里即秦所鑿泄王氣處吳謂之京口以此蒜山在府西五里有西津渡北與瓜洲對岸舊名蒜山渡金山在城西北七里江中周必大筆録云此山大江環繞每大風四起勢若浮動名浮玉山唐有裴頭陀于此開山得金賜名金山焦山在城東北九里江中後漢焦先隱此因名旁有海門二山金焦相望十五里江都揚州府治漢舊縣故城在今府城南四十六里為江水所侵魏志文帝黃初六年行幸廣陵故城臨江觀兵即此地瓜洲鎮在府城南四十五里有渡以通鎮江元和志云江都縣大江南對丹徒之京口舊濶四十餘里今濶十八里日知録云古時未有瓜洲蔡寬夫詩話潤州大江本與今揚子橋對岸而瓜洲乃江中一洲耳今與揚子橋相連矣以故自古南北之津上則由采石下則由江乘而京口不當往來之道史記秦始皇登會稽還從江乘渡正義云江乘故縣在今潤州句容縣北六十里吳徐盛作疑城自石頭至江乘晉蔡謨自土山至江乘鎮守八所城壘凡十一處皆以沿江為防守之要今江乘去江幾二十里以外皆為洲渚而渡口乃移于龍潭又瓜洲既連揚子橋江面益狹而隋唐之代復以丹陽郡移置丹徒于是渡者舍江乘而趨京口宋乾道四年築瓜洲南北城而京口之渡至今因之按揚子江今北去揚州府城四十里胡三省曰今之揚子橋或是唐揚子縣治所橋以此得名也地理志江都有江水祠又東徑丹陽縣北又東徑武進縣北其北岸則泰州丹陽在鎮江府東六十四里本漢曲阿縣大江在縣東北六十里又東北十里為包港南接嘉山北通大江又東十里則武進之孟瀆河口也武進為常州府治春秋吳延陵邑漢置毗陵縣大江在縣北五十里地理志毗陵季札所居北江在北東入海水經注云毗陵縣北二百步有故城本毗陵郡治舊去江三里岸稍毁遂至城下江即北江也泰州在揚州府東一百二十里本漢海陵縣唐為吳陵縣大江在州南漢志海陵有江海會祠又東徑江隂縣北其北岸則泰興縣靖江縣如臯縣江隂在常州府東北九十里本漢毗陵縣地大江在縣北有馬馱沙與泰興縣分領君山臨江南去縣二里亦名瞰江山泰興在揚州府東南一百四十里唐為海陵縣地靖江在常州府東北一百十里本唐海陵吳陵二縣地宋為泰興縣地元改屬江隂縣明成化五年析置靖江縣孤山舊在縣東北二十五里江中成化八年後潮沙壅積轉而成田今山在平陸新志云大江舊分二𣲖繞縣南北天啓以來潮沙壅積縣北大江竟為平陸因開界河與泰興分界而大江唯經其東南縣遂為江北之地矣如皋在泰州東南一百四十里里本後漢廣陵郡地晉分廣陵置山陽郡有如皋縣隋省唐析海陵縣地置如皋鎮五代時南唐升為縣大江在縣南又東徑常熟縣北其北岸則通州常熟在蘇州府北八十里本漢吳毗陵二縣地大江去縣四十里福山臨江有港東連大海曰福山港通州在揚州府東四百里本漢海陵縣之東境狼山在州南十八里布洲峽在州南四十里江中黃子鴻曰常熟與通州相對古時縣界濶逺故東北濵海自明中葉分置太倉州後凡縣境濵海之地已割屬之今江自太倉之七鴉口始折而南是為大洋其在本縣境者自福山北距通州之狼山水面不過百里止可謂之江尾而非海也又東徑太倉州北其北岸則海門縣又東入于海太倉在蘇州府東北一百十里本漢婁縣地梁以後為崑山縣地明初置太倉衛𢎞治十年始割崑山常熟嘉定三縣地置太倉州婁江在州南大海在州東北南接嘉定北接通州郟亶水利書云今崑山之東地名太倉俗號岡身朱長文吳郡續圖經云濵海之地岡阜相屬謂之岡身州東北有七鴉浦大江由此入海海中有姚劉沙直江口之東南今為崇明縣在州東二百八里元時海運從劉家港出海至此放洋海門在通州東一百里本唐海陵縣之東洲鎮五代時置海門縣海舊在縣東十五里有六港皆東通大海潮漲則盈退則涸其地為海水所侵吞食日廣門本朝康熙初縣治遂淪于海今為海鄉併入州境此東為中江入于海之所經也禹貢錐指行水金鑑卷七十六
