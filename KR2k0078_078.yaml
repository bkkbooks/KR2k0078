body:
  text: 行水金鑑卷七十八江南按察使傅澤洪撰江水明宣宗宣德十年七月戊戌英宗已即位矣湖廣黃州等府奏今嵗天雨連綿江水泛溢所屬州縣田苗淹沒無收上命行在户部遣官覆視除其租稅明英宗實録明英宗正統元年十月甲戌江西吉安府知府陳夲深言府城外緣江隄岸損壞宜修築以備水患從之丙子湖廣荆州府奏江陵公安二縣及荆門州大雨江水泛漲衝決墟岸實為民患事下行在工部覆奏請令荆州府暨荆州衛協力修築從之十一月戊午直𨽻揚州蘇州常州府各奏十月初一日颶風大作海潮漲湧所屬州縣居民漂蕩者各數百家湖廣荆州府所屬州縣各奏六月至七月天雨連綿江水泛漲淹沒民田上命行在户部遣官覆視以聞明英宗實録明英宗正統二年三月已酉命襄城伯李隆禱於大江之神以南京龍江關等處隄岸屢決故也十月已未湖廣江陵松滋公安石首潛江監利六縣各奏近江隄岸俱為水決淹沒禾苗甚多事下行在工部覆奏請移文勘實修治從之十一月戊戌修湖廣老龍隄以其為漢水所決也十二月丁丑修江南通江橋東西一帶江岸明英宗實録明英宗正統四年二月乙卯湖廣荆州府奏府城西四十里江水高城十餘丈倘遇霖潦隄壞水即灌城為害不小乞專命府通判一員荆州等三衛千户三員常巡隄岸少壞輒修庶可以防水患從之明英宗實録明英宗正統五年六月甲午南京守備襄城伯李隆奏積雨壞南京中新河上新河隄并濟川衛新江口防水隄請俟水退量撥丁夫修築從之七月庚辰江西南昌饒州九江南康自五月至七月淫雨江水泛漲事聞命行在户部遣官覆視明英宗實録明英宗正統六年二月辛卯命南京守備豐城侯李賢禱於江神以江水決隄故也四月丙子江西布政司言寧縣武寧縣建昌縣江通舟楫而多灘石兩岸樹朩叢生乞興役修築從之五月乙卯修江西吉安府城南近江隄六月已卯直𨽻當塗縣大信巡檢司前漕河南通大江舟行避險者悉由此行後以江水泛漲沙土壅積不通有司請疏濬從之九月癸未先是南京江岸纍決巳命工部侍郎吳政等修築政等言水深未便工力請於農隙時疏江中沙洲以殺水勢然後用工至是復以興役請上命守備豐城侯李賢太監劉寧同政提督仍戒其務恤軍民毋容侵擾明英宗實録明英宗正統七年五月丙辰江西廣昌縣縣丞張夀芳奏請修近縣江岸從之七月築南京浦子口大勝關隄先是江中有洲激水橫流決隄豐城侯李賢請鑿洲引水直流則隄可固上可之會詔蠲天下徭役遂不果鑿止令築隄遣兵部右侍郎徐琦祭告大江之神然後興役壬戌湖廣荆州府奏東門外小江接荆門潛江等處近為沙土淤塞者三十餘里請疏浚以便民九月辛酉先是江西九江府城以邊大江為水頺者二百餘丈隄決倍之巡按御史及有司以聞命九江衛率軍工修築至是以人夫物料不足為請事下工部議宜諭三司官計其所需與之第毋優民從之明英宗實録明英宗正統九年閏七月戊寅應天湖廣嶽州各奏江溢丙申巡按直𨽻監察御史段信奏江都縣揚子江沙洲上民户不下數百餘七月間中夜風雨大作江潮泛漲沙洲水髙丈五六尺溺男女千二十人資産田禾淹沒無算越三日風息水始縮上命御史府縣官出官錢葬溺死者而給存者以食淹沒田畝悉蠲其稅明英宗實録正統九年江潮泛漲漂溺江都等縣一千七百餘人揚州府志明英宗正統十一年八月辛酉湖廣龍陽縣奏今年二月以來大雨洞庭湖隄決居民男婦多被溺死漂沒廬舍禾稼牲畜無算上命布政司亟發人夫修完湖隄存恤被災民户明英宗實録明景帝景泰元年六月己丑先是南京風雨江水泛漲壞城垣官舍民居甚衆拔神營監樹木二十餘株至是詔有司修理之明英宗實録明景帝景泰二年六月乙亥命以直𨽻揚州府瀕江新漲地土與坍江失田人户耕種明英宗實録明景帝景泰三年十二月戊午四川綿州奏本州西坌河名飲馬池者以通大江數敗隄岸請率民修築從之明英宗實録明景帝景泰五年九月丁巳四川都司奏七月大雨江水泛溢漫入東城水關決城垣三百餘丈壞駟馬萬里二橋欲同布按二司起附近府衛軍夫備料修理從之明英宗實録景泰六年江水泛漲遣巡撫王竑祭於江神揚州府志明英宗天順二年八月乙丑安慶府屬縣江水泛溢浸爛秧苗秋成無望糧草無從徴納上命户部知之明英宗實録明英宗天順四年八月甲辰朔湖廣都布按三司奏武昌黃州漢陽襄陽德安辰州常德荆州諸府衛自四月至六月隂雨連綿江水泛溢衝決隄防淹沒麥禾民多流徙上命所司加意安撫賑濟除其租稅十月壬戌巡按江西監察御史奏瑞州南昌南康等府四月以來江水泛溢二麥淹死顆粒無收上命户部勘之明英宗實録明英宗天順五年十一月丁巳直𨽻揚州府奏所屬海門等縣今年春夏旱傷七月以來江潮泛溢淹沒田禾事下户部覆視之明英宗實録明英宗天順七年五月壬辰襄王瞻墡奏襄陽城逼漢江自昔有隄號曰老龍環護城郭嵗久為水衝激已漸坍決及城南有救生橋水大人可度橋登山以免水患今亦損壞非大起工匠修築不足捍災禦患請敕附近府州縣并本處有司軍衛為之事下巡撫湖廣左僉都御史王儉核實儉以為宜上命儉督有司修築九月乙酉巡按江西監察御史陸平奏九江府德化彭澤二縣今年六月以來天雨連綿江水泛溢邉江民田淹沒無收欲徴秋糧恐逼民逃竄乞量為優免上命户部理之明英宗實録明憲宗成化三年六月癸卯湖廣江夏縣水衝隄岸起竹􅑉門外江口迄夏口驛漢陽馬枋閘長八百五十丈有竒從巡撫都御史羅箎等各言隄岸逼近城址近者不滿十步宜命有司採辦物料量役軍民以漸修築明憲宗實録夏時正成化五年遷大理寺卿明年春命巡視江西災傷增築南昌濵江隄及豐城諸縣陂岸民賴其利明史稿明憲宗成化六年十月戊午南京守備成國公朱儀奏江水泛溢衝塌上新河口岸南北共長一百三十四丈河口坍入三十五丈兩岸軍民房屋災者四十八間事下工部覆奏移文南京工部會守備等官勘議明憲宗實録明憲宗成化七年四月丁卯禮部奏南京江東門外江水泛溢崩頽北岸損壞民居請遣南京守備成國公朱儀祭告江神從之明宣宗實録明憲宗成化八年二月辛卯襄王瞻墡及巡撫右僉都御史吳琛并湖廣守臣各奏襄陽府江岸石橋被水衝塌俱宜修築事下工部以為其事已經勘議但今彼處民困未蘇合俟秋成之後勘酌修築從之明憲宗實録明憲宗成化十三年二月甲戌直𨽻安慶府大雨江水暴漲明憲宗實録明憲宗成化十四年五月丙戌吉王見浚奏長沙府地西臨大江水勢洶湧岸無回曲往來客舟灣泊多為風濤所損聞府外西南原有通江一港年久淤塞不便舟楫今左少監唐宏員外郎劉琛奉敕于此營造府第工完之日宜令督工疏通之工部議以宏琛事完即當復命其疏浚河道宜移文巡撫等官核實令有司行之上曰事果無礙當從所請六月丁巳襄世子祁鏞奏今年四月中旬久雨江漲漂流居屋衝決隄岸水幾入城驚惶無地乞敇所司同議修築俾無後患事下工部議以水患急務宜移文撫按并三司分守等官核實修築務在髙廣堅厚以為久計詔可明憲宗實録明憲宗成化二十二年冬十月丙子南京守備成國公朱儀奏新江口操演戰船俱于中下二新河住泊以避風濤今二河為泥沙淤塞至秋深水涸出塢為難請敕工部循往年例督軍修浚庶船出入便利遇警不至誤事從之明憲宗實録𢎞治三年春二月施州石信山崩有大石二如人形卓立路旁距五里清江南岸山崩大石塞江水為不流遂壅為灘湖廣通志明孝宗𢎞治七年七月戊子直隸蘇常鎮三府風雨驟作潮水泛溢拔朩飄瓦平地水高五尺餘沿江地水髙一丈坍塌房屋城垣民多溺死九月丙申禮部尚書倪嶽等言近日南京風雨大作蘇松等府海潮逆湧江水泛濫湖廣武昌等府州縣天雨不止洪水泛漲一望無涯軍民房屋俱被淹沒明孝宗實録𢎞治十二年安陸漢水溢田廬漂沒民多溺死湖廣通志明孝宗𢎞治十三年十月丙申遼王寵綬奏荆州府舊有護城隄岸長五十里近隄崩壤致江水衝決城門橋樓房屋為患甚急請命修築工部覆奏從之明孝宗實録明孝宗𢎞治十五年八月庚戌遣官祭告孝陵太廟先是南京太常寺卿楊一清等奏南京自本年六月一日霪雨浹旬平地皆水至七月三日猛風急雨震蕩掀播江潮洶湧江東諸門之外浩浩波濤浸入城五尺有餘軍民房宇倒塌者千百餘間男婦有淹溺死者新江口中下二新河等處官民船飄沒人多溺死鎮江揚州諸府沿江風潮亦復如是故有是命明孝宗實録𢎞治十六年江潮入望京門浦口城圯江南通志明武宗正德十一年八月戊寅命南京守備魏國公徐俌祭大江之神以江水衝決浦子口上新河等處故也明武宗實録是年平蟇頥灘安盤記云蜀之灘以千計戎州之西最險戎以西灘以百計犍為之蟇頥最險灘在犍為西十里石牙中橫江水走其上前壅後迫勢不得不起而立衝撞噴薄叫號怒激聲聞十數里外舟人上下咸默吻重足睜目屏氣以幸無事一失其勢輒破壞漂溺不可救人死是灘者嵗以千數也昔李氷守蜀鑿豚崕以避沫水之害豚崕在嘉州犍為今之犍為嘉屬邑也相去不逺不應舍之不治然氷之治水也多沉犀以彈壓湍急犍為故有沉犀驛豈氷嘗治之而無成歟抑江流變遷當時水由他道而無是險歟不可知也正德十一年丙子蘄陽張公思齊以憲僉行縣邑人赴訴萬口一辭時適有幾公可與事公進諸生而語之吾受天子命官以水利為名豈一一利之去害乃以為利也計度安出諸生曰濬其西岸水放而西灘其可夷公曰然吾意如是驗其同耳且事委曲得俞監臨監臨者巡按監察御史盧公雍也乃卜乃虔臨江用牲萬夫齊奮身自為督壅石為隄以朩為捍既鑿既疏自下而上時天大寒雪雨交集公撤去麾蓋勞來巡行率至夜乃息凡在後者益感公意并力趨事兩月告成𨗳江之日人士走觀空其一邑歡呼嗟歎不圗成功乃至於此由是灘險遂虛而夜亦可航矣四川總志明武宗正德十二年七月壬辰大學士梁儲等言湖廣荆襄等處以霪雨江水泛漲疏入不省明武宗實録是年安陸漢水溢田廬漂沒民多溺死湖廣通志明武宗正德十三年三月甲寅湖廣衡州府大風雨江水溢浸入城郭房屋及人民多漂沒者明武宗實録明武宗正德十四年六月已卯漢江溢漂溺人口用承奉張佐言購人駕舟拯救其後又出資糧築隄四十餘里自是水患乃絶而軍民瀕水之田皆恃以安明武宗實録是年揚州大風江海溢數丈漂沒廬舍民多溺死揚州府志明世宗嘉靖元年七月己巳南京暴風雨江水溢郊社陵寢宫闕城垣吻脊欄楯皆壞拔樹至萬餘株大江船隻漂沒甚衆八月庚子敕諭兩京文武羣臣朕以眇躬嗣守祖宗鴻業代天理物負荷維艱夙夜兢兢罔敢自逸黽勉逾嵗治效未臻災異迭見近者南京守臣奏報七月二十五日猛風驟雨砂石飛揚江水湧溢郊社陵寢宫闕城垣等處吻脊闌楹多被損壞并各衙門樹株拔倒甚多大江船隻漂溺甚衆上新河等處邉江軍民房屋被水衝塌者不計其數又前此湖廣江西地方水患尤甚朕心祗懼莫究其端意者政事乖違刑罰不中民困未蘇國是未定以致上干天和昭示譴告朕方致齋積誠祗告于天地宗廟社稷凡事關朕躬者痛自省循爾兩京文武羣臣宜同加修省務在守法奉公勉修職業以圗消復其被災軍民之家各遣官巡視量行賑恤庶幾天意可回用保我國家億萬年太平之祚欽哉故諭十二月辛巳湖廣荆州府潛江縣知縣敖鉞疏請開濬淤洲以弭水患但沿江一帶淤洲盡屬皇莊未敢擅興工作户部覆議江洲原非額田嵗入無幾茍可救一縣之民何惜于此請令巡撫湖廣都御史行守巡官親詣縣治相度地形水勢果為民患即及時併工疏濬淤洲新增子粒悉蠲勿徴從之明世宗實録是年七月二十五日揚州大風雨江潮湧漲溺死男婦一千七百四十五口揚州府志嘉靖五年漢水決洋渡初渡口忽陷成穴有女子衣絳緑恆坐其上一夕痛哭河遂決湖廣通志明世宗嘉靖六年八月辛未御史郭希愈言江北岸善崩凡坍江田地約有四萬二千餘畝所損賦額咸取償於民而江西新漲灘田九萬八千餘畝漸成沃壤豪民霸占爭訟致傷人命數年不決前奉明詔下有司覆勘不報宜責南京巡江御史勘理户部覆請上命南京巡江御史委有司踏勘其坍漲田數相應抵補者咸通融撥給以足糧額餘皆賦民耕之先已告田納糧者咸與公斷以杜爭訟明世宗實録嘉靖八年秋漢水溢湖廣通志嘉靖十一年僉事張彥果議築都江堰石工不果江漢之水出自岷嶓其勢建瓴而注全蜀神禹疏濬之功兹最烈焉至秦李氷鑿離堆以疏沫水衆渠順流沃野千里號稱陸海厥後文翁白敏中張詠咸加修浚迄今賴焉嗟夫郡國之有流渠猶人身之有脈絡也一縷不通合體皆病按方而治之則鬱滯決而精神流通矣守土者其尚因時修之以蘇蜀哉蜀中諸水咸出岷江江源在羌地之列鵝村所謂羊膊嶺者分為二𣲖一西南流為尖囊大渡河一正南入溢村至石紐過汶川歷今灌縣境又有湔水出焉灌之上流西北十數里有水出尤溪口又數十里有水出白沙口同會于灌經灌西南流者今謂之南江即禹所𨗳岷江正流自秦李氷鑿離堆引江水循灌城東注北折于是始以東南正流為南江經離堆薄灌城而東北注者為北江北江出自寶瓶口穿三泊洞而北注者為外江自寶瓶口直東入五斗口而東北注者為內江蓋北江析為二江并南江而三其北行入五斗口一支在南北二江之上故以內江别之外江北經崇寧彭縣新繁漢州界出金堂峽內江東經郫縣崇寧界內下過府城北南會府城前江以趨于彭合彭山金堂諸水會于瀘州合綿涪諸水并嘉陵江經合州會于重慶合碉雅諸水會于嘉定合松潘之西南入尖囊大渡河者會于敘州逺近溉田不可勝計然各府塘堰皆民間自修官課其成而巳獨李氷所鑿離堆山設立都江堰在岷江中流時嵗工費巨萬元至元元年廉訪僉事吉當普建白用石包砌諸堰為石門以時啓閉國初加意水利每嵗冬春之會令得水州縣與軍衛屯所共役人夫五千竹朩工料計田均輸修葺堰得不壞成化九年巡撫都御史夏塤以逺人赴役不便又將郫灌二縣雜𣲖科差均敷得水州縣專備工料以供堰務𢎞治九年添設按察司僉事一貟專一提督都江堰併各府州水利于時灌縣知縣胡光伐石冶金即舊址甕砌為防貫以鐵錠柱三各長一丈二尺使當湍勢石隄中貫鐵處固以油灰直長一十五丈髙一丈三尺濶五尺首濶一丈二尺用鐵三萬餘石一千二百髙廣丈餘長倍之桐油五百麻線二百朩二千五百各色工役計二十五萬三千二百有竒正德間水利僉事盧翊親詣督理疏濬直抵鐵板得秦人所書六字訣曰深淘灘淺作堰大書觀瀾亭上以昭永鑒先是每年起工役有不均之歎翊乃下令以糧三石𣲖夫一名分八班凡八年一周仍啓蜀府每年助青竹四萬竿委官督織竹籠裝石為堰嘉靖初僉事劉隅重修都江堰觀瀾亭十一年僉事張彥果議築石工復吉普當胡光之舊以工費浩大不果謹按四瀆惟江最大蜀水自江之外有七皆注于瞿唐由荆達揚以入于海世傳杜宇命其相鱉靈作三峽以通江水而李氷離堆之鑿最有功于蜀然總之則大禹平成功在萬世矣書曰岷山𨗳江東别為沱蓋水出于岷者皆謂之江出于江而别流别而復合皆謂之沱此禹治功之神流澤之逺也或謂灌縣都江堰乃諸堰綱領而分江流之第一咽喉當事者嗣而修築之亦一方之利也謹附著之四川總志行水金鑑卷七十八
