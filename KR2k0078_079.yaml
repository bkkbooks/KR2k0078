body:
  text: 行水金鑑卷七十九江南按察使傅澤洪撰江水明世宗嘉靖十七年正月壬寅以南京江水衝囓詔守備鎮逺侯顧寰祭江神明世宗實録嘉靖三十九年江水漲至三山門秦淮居民水深數尺江南通志是年湖廣江隄決按湖廣境達八省凡秦關巴蜀中原貴竹嶺右諸水俱注之𨗳為三江瀦為七澤即禹貢江漢九江沱潛雲夢之故區也江發岷山抵巴東入荆襄流至嶽陽與洞庭水合其受決害者惟荆州一郡為甚漢發嶓冡抵上津入鄖地流至漢陽與大江水合其受決害者鄖襄安漢四郡而襄安為尤甚九江是沅漸元辰敘酉澧資湘諸水合流入洞庭湖沿匯八百里經嶽陽樓西南出湖口與江流合其受決害者常武嶽陽二郡也三水總會于武昌其江身始濶直注而東以故武昌蘄黃之境無大水害大較隄防多在襄安常武荆嶽間蓋古七澤正其地也漢唐以來代苦水患至宋為荆南留屯之計多將湖渚開墾田畝復沿江築隄以禦水故七澤受水之地漸湮三江流水之道漸狹而溢其所築之隄防亦漸潰塌明嘉靖庚申嵗三江水泛異常沿江諸郡縣蕩沒殆盡舊隄防存者十無二三而後來有司雖建議修築然旋築旋圯蓋民私其力而財用贏絀之勢異也又案禹貢岷山𨗳江東别為沱又東至于澧過九江至于東陵東迤北會為滙東為中江入于海今澧州巴陵正澧與九江東陵故地也江水方出三峽口如建瓴勢夏秋一漲頃刻千里然遡彝陵而上山阜夾岸勢不能溢嘉魚而下江面浩濶順流直注中間郡縣兩岸俱平衍下隰水易漫流但江當江陵公安石首監利華容間自西而北而東而南勢多迂回至嶽陽自西南復轉東北迸流而下故決害多在荆州夾江南北諸縣縣各沿岸為隄南岸自松滋至城陵磯隄凡長亘六百餘里北岸自當陽至茅埠隄凡長亘七百餘里咫尺不堅千里為壑且決口四通湖泊盜賊竄伏其間江陵之龍灣市監利之分監所公安石首澧州安鄉之四水口嘉魚之簰洲東江腦俱為盜賊藪蓋以防隄不修則津渡散漫盜可四出故也自元大德間決公安竹林港又決石首陳甕港守土官每議築隄竟無成績始為開穴口之計按江陵舊路有九穴十三口其所可開者惟郝穴赤剝楊林采穴調弦小嶽六處餘皆湮塞逮明初六穴復湮其五故隄防不時泛決然未甚也惟嘉靖三十九年決後殆無虛嵗而荆嶽之間幾為巨澤矣漢陽縣舊有襄陽口在漢口北岸十里許即古漢水正道漢水從黃金口入排沙口東北轉折環抱牯牛洲至鵝公口又西南轉北至郭師口對岸曰襄陽口約長四十里然後下漢口明成化初于排沙口下郭師口上直通一道約長十里漢水徑從此下而古道遂淤且漢口雖為漢水㵼流之地但為江水洶湧橫截其口流不能泄復逆折而上故太白新灘馬影蒲潭沌口刀環等湖易於泛溢而春夏水漲郡治常苦浸沒之患其障禦全藉大别一山故從來未設隄防漢川縣東至漢陽南至沔陽西至景陵北至雲夢正當漢江下流故有長湖橫湖觀湖龍車小松等湖以蓄水又有城北南湖魚湖蓼湖西岡水洪等垸以禦水且漢江至此分流一由張池口經縣治一由竹筒河出劉家隔二水復合流出漢口故無大水患明嘉靖三十九年漢水大溢各垸隄俱潰而竹筒河衝塞五十里許其張池口江身又復淺狹以故水多壅滯於鍾祥景陵間而劉家隔之估船不得通於漢川民亦病之頃年查勘上自河口中經排子口至東湖流水口大約淤塞一千三百一十二丈上河口地勢稍低不便受水改從沙臺寺前去舊口約數十丈許中排子口至東湖流水口舊河身甚曲新改直勢以順水性約直二百丈零下口呌子臺出風門又半淤計二百丈餘巡撫劉慤奏請贖鍰一萬餘兩募夫開濬親臨閲工乘流下上河勢大通自春二月興工至三月告成按禹貢九江孔殷謂沅漸元辰敘酉澧資湘九水會合滙為洞庭一湖是也今以郡縣志考之辰常衡永枝河會流于洞庭者無慮數十水而其會衆流而注之湖則有三焉曰沅江湘江澧江而止沅發自牂牁經辰溪合麻陽諸溪洞水過常武出湖之北湘發自廣西新安海陽山至分水嶺分為二𣲖一為灕水一為湘水至永州合瀟水汨羅過長沙出湖之南澧發自武林古克縣東流過武水口合焦溪如溪諸水經慈利石門至澧州出湖之西而漸沅辰敘酉資共合流而滙為洞庭以為之壑故沅辰衡永長沙得免水患惟常武當沅江之下流嶽陽當江湖之會合故嵗遭浸溺而隄防之設最宜急圗者也兵州府城西嶽陽樓一帶正臨洞庭湖春夏水漲波濤撼城勢甚可慮宗守滕宗諒築偃虹一隄障之逮明初隄漸崩洗城漸退縮後移城于岡阜至嘉靖三十九年以後岡阜半摧而懸城孤危嶽陽樓亦將頽塌知府李時漸顧募夫役用辦磚石繕修城垣自嶽陽樓而南凡二百六十餘丈城下築土隄以殺水勢其屬邑臨江常苦水患者有四安鄉華容巴陵臨湘也但安鄉四面皆水難以設隄臨湘半倚山城雖可捍禦然西北俱濵江水口又多勢難築隄巴陵隄防祗在江北諸里惟華容四十八垸之堤最為要害湖廣通志嘉靖四十五年十月江隄大決江水之患全在荆州一郡夾岸南北凡六縣北岸則江陵監利隄凡四萬九千餘丈南岸則枝江松滋公安石首隄凡五萬四千餘丈明嘉靖庚申嵗洪水決隄無慮數十處而極為要害者枝江之百里洲松滋之朝英口江陵之虎渡黃潭鎮公安之􅘸頭鋪艾家堰石首之藕池諸隄衝塌深廣最難為力者也每嵗有司隨築隨決迄無成功至四十五年十月知府趙賢估議請築務期堅厚自丙寅歷戊辰凡三冬六縣隄稍就緒始立隄甲法每千丈隄老一人五百丈隄長一人百丈甲一人夫十人江陵北岸總共隄長六十六人松滋公安石首南岸總共隄長七十七人監利東西岸總共隄長八十人夏秋守禦冬春修補嵗以為常然荆州郡治濵江郡西上六十里有萬城隄在當陽江陵之界嘉靖十一年一決直衝郡西城不浸者三版十二年有司挽築更築李家埠重隄護之二十九年又決此隄乃郡治之大要害也後江陵縣專為修理始得無虞按禹貢嶓冢𨗳漾東流為漢又東為滄浪之水過三澨至于大别南入于江今考漢江圖西自漢中流至漢陽大别山出漢口與江水合即漢水故道也水多泥沙自古遷徙不常但均陽以上山阜夾岸江身甚狹不能溢襄樊以下景陵以上原隰平曠故多遷徙潛沔之間大半滙為湖渚復合流至乾鎮驛中分一由張池口出漢川一由竹筒河出劉家隔以故先年安襄一帶雖遷徙而無大患者由湖渚為之壑三流為之㵼也明正德以來潛沔湖渚漸淤為平陸上流口以壅滯嘉靖初年安陸石城故道改徙沿山灣二十六年決荆門沙洋鎮三十九年決紅廟隄四十五年決襄陽老龍隄宜城故道改徙鴇潼新河而竹筒河復湮淺十餘里下流又日澀阻故水患多在荆襄安陸潛沔間矣鄖陽府西北控扼秦豫東南接連荆襄四面皆疊山峻嶺屬邑半依山城獨郡治孤立川原之間正當水衝故上津竹山諸縣雖臨漢濵不必隄防其水患祗在郡治而禦水又以城為隄自古無大決害至明嘉靖四十五年九月初九日衝決東南門外土隄城半傾塌民多漂浸襄陽古有大隄曲是隄防之設自商周巳然矣漢夀亭侯決水灌樊城是漢水為襄樊患最切要害明初水流故道不復為災故大隄漸塌民多侵為已業而有司並無築隄慮嘉靖四十五年洪水四溢郡治及各州縣城俱潰民漂流以數萬計郡西老龍隄一決直衝城南而東故郡治之患為尤甚副使金世龍秦淦徐學謨先後條議估修踰二年工成薈蕞云按唐書神龍元年漢水齧城張東之罷政事還襄州因壘為隄以遏湍怒自是郡置防禦守隄使隄在縣東北樂府有大隄曲謂此也江之故道逼近安陸府治石城而下明嘉靖初徙新洪繞沿山灣東去城彌逺水患日深考其故在豐樂則舊有九龍灘龍㧒港桐朩嶺金花尉斗等湖之分泄至石城則舊有城北湖池河殷家等河之注蓄後皆淤平軍民官莊爭墾為業而下流竹筒河復淤下滯上泛固一郡水患之源也屬邑大半濵江而受害甚者北岸則鍾祥京山景陵之紅廟南岸則荆門潛江沔陽之沙陽也湖廣通志試薈蕞云頃晤家魚山侍讀于淮隂院以黃河利害相質問魚山曰子知黃河之害而不知長江之害為尤甚也豫前使楚見濵江州縣受江水之囓岸者小民深以為苦惜乎史志不能悉載閲湖廣通志隄防考略獨言嘉靖三十九年四十五年之事為詳為備録于此是年漢水溢樊城城北舊有大隄城南面江一帶皆甎城盡潰決議者謂樊城潰則襄城無患于是疏塞不蚤樊城之富庶漸衰禹貢錐指明穆宗隆慶二年四月辛巳湖廣撫按官劉慤等言承天府元祐宫故玄妙觀也自陶仲文請易今名以為祝延聖夀之所而髙士劉永德因奏乞供養之田嵗入千七百餘金又比顯陵興邸例使有司季為估修撫按歲為奏報僣擬不經無過於此請追奪入官徴其租以供漢江築隄之費户部覆奏報可明穆宗實録明穆宗隆慶三年四月辛卯巡撫湖廣都御史劉慤請開竹筒河以泄漢江之勢工部覆議從之明穆宗實録明神宗萬歷二年三月辛丑工部覆河道侍郎萬恭題瓜洲花園港等處原設建閘蓋俾江南糧運可以直達免闕之費也自隆慶六年花園港豬市上下閘成迄今二載糧艘無滯省民間不資之費但上閘重建方畢而下閘衝囓又壞合行河道侍郎將瓜洲應改下閘及詹家洲應建中閘作速興舉并議運河揚子橋亦于明年接續修建以收全功其江商應該協助修閘銀兩嚴行追解濟用從之四月乙巳湖廣撫按趙賢李栻題築荆州采穴新衝二口承天泗港謝家灣各穴口以殺水勢工費重大錢糧不敷已將德安倉糧銀并各王府減存備用祿銀接濟户部覆如議行辛酉户部覆工部咨稱湖廣撫按趙賢等題湖省當江漢之委荆州承天等處頻遭水患其民恃隄為命而隄所恃以固者惟穴口分泄之力祗因舊穴湮塞以致水勢橫決今議開荆州采穴新衝二口承天泗港謝家灣各穴口以殺水勢前此節經撫按奏修隄塍請銀一萬五千餘兩水患如故合將庫貯德安倉糧銀并減存備用各祿銀三千二百二十二兩未完廣阜倉銀五千三百三十一兩五錢準令支用以後年分徴解濟邉不許一槩混用從之九月癸酉湖廣荆嶽等府松滋等縣老垸隄新築不堅水勢異常撫臣趙賢請將公安石首等處五縣南兊二糧照例改折內公安等縣仍與安鄉縣蠲免存留多方賑濟及將衝決前隄仍令原管官戴罪修築部覆報可明神宗實録是年通泰等州縣風雨異常江潮漂沒人民無數揚州府志萬歷四年三月都江堰功成陳文燭記略云灌縣都江堰蓋江之會云禹𨗳江自岷山西入大渡河南過於汶歷于灌堰在江中流為二有南河者會新津有寶瓶口者流為三至于漢至于崇寧至于華陽故稱灌口堰外低而寬堰內髙而狹水勢也作堰灌田始于秦李氷司馬遷著河渠書瞻蜀之岷山大李公之功且云渠可舟行民饗其利蜀人廟祀焉漢唐以及宋元堰法漸壞至元間僉事吉當普鑄鐵龜民利之昭代以來屢修屢圯嘉靖間復鑄鐵牛銘曰問堰口準牛首問堰底尋牛趾堰隄廣狹順牛尾水沒角端諸堰豐須稱高低修減水真名言云萬歷乙亥江大溢堰盡壞成都知府徐元氣灌縣知縣蕭竒熊列狀修復巡撫都御史曽公羅公慨然允行後先軫念巡按御史郭公慮益深長增以鐵柱命尋牛趾而濬之自堰以下如仙女三泊洞寶瓶五陡口虎頭諸岸間植三十二柱每柱長丈餘共用鐵三萬餘斤又樹柱以石護岸以江水遇重則力分安流則堰固大都倣古云水利僉事杜公詩悉心區畫始萬歷三年十一月越四年三月工成費金三萬灌溉千里民咸歌頌四川總志是年修桑落洲隄萬衣記略云豫郡德化縣桑落洲之有隄也有司者奉巡撫都御史烏程潘公名季馴繼封郭隄而築也隄延亘七十餘里視封郭三倍有強才五閲月而告成當其告成之時都御史言曰往豫在江郡視若州土田黑壤沙磧雜壤中江水溢輒善潰矧新簣鮮實欲速唯難而可以為成乎復命按察僉事劉公來視按察故懇懇民瘼者即轡行隄上鎮日終日不為輟審隄虛實狀檄九江知府李君規書方略同知宋君專領其事率其民卒增高若干尺廣稱是又沿隄種栁無慮數十萬以護之江之所趨則布樁捲掃以防外衝水之所聚則開渠𨗳引以避內漲分隄而守則德化湖口黃梅宿松四縣之民南昌九江蘄州三屯之卒畫疆勒石限地以責其成不閲月而績奏西江志江按入蜀記江自湖口分一支為南江蓋西路也江水渾濁每汲用皆以杏仁澄之過夕乃可飲南江則極清徹合處如引繩不相亂晚抵江州州治德化縣即唐之潯陽縣柴桑栗里皆其里也南唐為奉化軍節度今為定江軍岸土赤而壁立東坡先生所謂舟人指點岸如赬者也澎浪磯屬江州彭澤縣三面臨江倒影水中亦占一山之勝舟過磯雖無風亦浪湧蓋以此得名也昔人詩有舟中估客莫漫狂小姑前年嫁彭郎之句傳者因謂小姑廟有彭郎像彭郎廟有小姑像實不然也德化縣今為九江府治府東六十里曰湖口縣又東一百里曰彭澤縣通志小孤山在彭澤縣十里大江中一名髻山取其形如髻也江側有澎浪磯俗訛云彭郎磯遂叫為小姑壻廟像婦飾而敕額為聖母云大孤山在府城東南彭蠡洪濤中屹然獨時唐顧况詩大孤山盡小孤出月照洞庭歸客船是年巡撫江西先在九江見德化桑落洲隄崩不及修至是發廩捐築四十餘里視封郭三倍有餘遂成沃壤宫保尚書潘季馴傳築季馴由嘉靖庚戌進士為九江府推官不及隄越二十七年始克成之萬歷十年漢水溢壞興安州城公私廬舍皆盡溺死者數千人湖廣通志明神宗萬歷十一年四月甲戌承天府大雨江水暴漲入城漂沒官民廬舍溺死人畜無算明神宗實録明神宗萬歷十三年二月丁未淮安揚州廬州及應天上元江寧江浦六合俱江濤沸騰明神宗實録明神宗萬歷十五年十二月庚申直𨽻應太等府自五月以來霪雨連綿江湖泛溢平地水深丈餘田廬沒為巨浸七月中颶風大作漲漫滋甚壞數百里之地一望成湖太平地勢最低被禍更烈詔被災地方錢糧停免有差明神宗實録一萬歷十九年江陵黃灘隄決二十年逍遙隄潰並見後萬歷二十一年修紫陽堤吳國倫記略云南康南城當彭蠡湖一面湖受章貢弋三江之水而成巨浸禹貢所謂滙澤為彭蠡是也揚瀾左蠡懸流而下稱江湖極險南康以斗城扼之能保無陵谷之虞乎宋淳熙間水勢漸迫城西時朱元晦為太守大治隄以障之至今號紫陽隄不朽邇年水勢徙而漸南南城人患之以告太守田公公鳩工伐石聚傭操畚鍤距城半里許纍為長隄由大南門繞文昌閣黃婆磯以下延袤可千餘尺廣可二十尺未數月隄成公名琯字希舜閩之大田人起家進士西江志明神宗萬歷三十六年六月丙子南京守備太監劉朝用報江潮水災乞行賑濟得旨留都重地水災異常百姓漂沒合行修省賑濟事宜令該部議乙卯南京科道內外守備大小九卿應天巡撫各揭稱地方霪雨連綿江潮泛漲自留京以至蘇松常鎮諸府皆被淹沒蓋二百年來未有之災大學士朱賡等請速議蠲賑并乞罷免以塞其災明神宗實録是年湖廣常德府江隄決按郡治與武陵龍陽二縣地皆濵江歷來嵗遭水害南齊永明十六年沅江諸水暴至常德沒城五尺宋淳熙十六年沒城一丈五尺漂民廬舍後唐沈如常砌二石匱以殺水勢得保城垣元延祐六年郡監哈薩于府學前又砌石匱一座髙二丈餘益加保固明嘉靖元年大水決隄十二年江漲幾欲衝城隆慶五年萬歷三十六年皆大水頻遭淹沒頃年修築民始有寧居湖廣通志萬歷四十一年築封郭洲隄葛寅亮記略云封郭洲者在江北其隄綿亘三十里先是萬歷三年督撫楊公觀察魏公始築外隄易沮洳為場圃三十六年直指史公又建石閘以備隄內之蓄泄嵗癸丑淫雨大浸稽天泊所築外隄潰其七口新建石閘亦崩圯十之三乃悉發贖鍰及稅募夫培築以癸丑年十月闕日始事告成闕月闕日取決七口咸復其故隄長三千八百丈有竒悉培而髙廣之西江志明神宗萬歷四十四年七月乙未時江西報水忽漲民居蕩析浮尸蔽江湖廣亦報水怪突發明神宗實録崇禎五年十月丁丑兵科署科事給事中劉安行上言臣鄉襄陽大水為災上自漢口下及武昌濵江一帶俱遭淹溺崇禎長編崇禎七年二月已巳錦衣衛鄒之有請移公安縣治於城南四十里祝家岡以避水患帝令撫按看議以聞崇禎長編是年夏江水暴溢溺死老幼無算儀真縣志崇禎十三年七月乙巳兵科給事中宣國柱疏言安慶一府屏蔽陪京壤連楚豫頻年遭冦焚殺蹂躪民之流徙四方者又不知幾何矣近雖安集招徠瘡痍稍蘇不料四五月間霪霖不止江水暴漲濵江田禾俱成巨浸即高田之不被沒者傷於多雨亦復萎敗成秕以故米價騰貴小民併日一飱或枵腹待斃菜色鳩形觸目堪涕夫水患泛溢江南江北所同而至兵燹之餘復遭水荼毒則安慶所獨臣仰體皇上救民水火之仁不敢不為呼籲伏乞皇上亟敕撫按實核被災分數作何蠲賑災民幸甚帝命該撫按察奏崇禎長編揚州以南瓜儀並通漕江西湖廣上江之舟並由大江入黃泥灘過儀真通江閘以溯揚淮所謂江漕也洪武中餉漕卒者從儀真上淮安由鹽城泛海餉梁晉者亦從儀真赴淮安盤壩入淮江口則設壩置閘凡十有三浚揚子橋河至黃泥灣九千餘丈永樂間浚儀真清江壩下水港及夾港河修沿江隄岸洪熙元年浚儀真壩河後定制儀真壩下黃泥灘直河口二港及瓜洲二港常州之孟瀆河皆三年一浚成化中建閘於儀真通江河港者三江都之留漕通江者二已而通江港塞𢎞治初復開之既又於總港口建閘蓄水儀真江都二縣間有官塘五區築閘蓄水以溉民田豪民占以為業真揚之間運道阻梗嘉靖二年御史秦鉞請復五塘從之萬歷五年御史陳世寶言儀真江口去閘太逺請於上下十數丈許增建二閘隨潮啓閉以截出江之船盡令入閘庶免遲滯疏上議行白塔河者在泰州上通邵伯下接大江與常州孟瀆河斜對江船由此可免瓜洲盤壩之纍與泰興北新河皆浙漕間道也自陳瑄始開尋稍淤宣德間從趙新陳祚請命瑄役夫四萬五千餘人浚之建新閘潘家莊大橋江口四閘正統四年白塔河水潰閘塞都督武興因閉不用仍自瓜洲盤壩瓜洲之壩洪武中置凡十五列東西二港永樂間廢東壩為厰以貯財朩其港盡淤止存西港七壩漕舟失泊屢遭風險英宗初年復浚東港及是漕舟盡由之既而巡撫周忱築壩白塔河之大橋閘以時啓閉漕舟稍分行成化中定白塔河三年一浚視瓜儀例正德二年復浚白塔河及江口四閘自鎮江裏河開浚漕舟出甘露新港徑度瓜洲而白塔北新皆以江路險逺捨而不由矣明史稿行水金鑑卷七十九
