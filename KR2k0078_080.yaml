body:
  text: 行水金鑑卷八十江南按察使傅澤洪撰江水世祖章皇帝順治六年庚寅江水大漲湖廣通志世祖章皇帝順治九年江水決于萬城湖廣通志世祖章皇帝順治十一年甲午江水決於沙洋之下湖廣通志聖祖仁皇帝康熙二年江水決於周尹店湖廣通志聖祖仁皇帝康熙三年郝穴隄潰洚洞滔天飢饉遍於巢窟湖廣通志聖祖仁皇帝康熙十五年五月郝穴江隄潰湖廣通志聖祖仁皇帝康熙二十年二十一年辛酉壬戌江隄連潰漢水並溢胡在恪江陵隄防議曰江出岷山漢自嶓冡壠萬川以東注而荆州正當其衝稱澤國焉蓋江水在瞿塘灔澦間為諸山所束屹崒盤礴雷詬而電激既出峽口始得展逸勢以前驅夏秋一漲頃刻千里而經江陵公安石首監利華容間自西而北而東而南勢多迂回至嶽陽自西南復轉東北迸流而下故決害多在荆州夾江南北諸縣縣各沿岸為隄以禦水勢由來久矣江北之隄自當陽以下之逍遙萬城以至監利不下四百餘里而江陵之黃灘隄在縣東南二十餘里一決則江陵潜江監利沔陽荆門皆為魚鱉蓋古所謂衝巫峽以迅激躋江津而起漲者以東至沙市有砥突出大江數十丈捍蔽江水水為之稍紆抱而黃灘之怒差殺其後蕩焉無存而水之向黃灘者駭崩浪而相􅓓矣稽古大禹灑沉淡災以奠髙山大川而自漢晉以暨有明南郡大水荆州大水史不勝書嘉靖二十六年沙洋隄決以後水災殆無虛嵗萬歷十九年江陵黃灘隄决民之溺死者無算二十一年癸巳逍遙隄旋潰距今九十餘載國朝庚寅年江水大漲時幸瓦全嗣後癸巳夏江水決于萬城郡城東數百里茫然巨浸户遍逃亡矣癸卯秋江水決于周尹店逮丙辰之五月麥秋方至而郝穴之江堤潰矣犬哭鳥散鳩面鵠形真繪圗所難盡者展轉數年流移略集而辛酉七月黃灘倐决一望直溟渤尾閭耳人自為築功爰告成壬戌六月江隄復決漢水並溢所謂隄防者衝蕩漂流於斯為盡湖廣通志聖祖仁皇帝康熙二十八年二月日總河王光裕㑹同江督傅總漕董疏稱應仍挑新洲舊河身直通四閘一切糧艘令循沙漫洲尾轉入新河口可以通行其日後或有淤阻聽河臣酌量挑浚奉㫖朕前巡行江南經過儀真地方見水淺閘壞行船艱難俱宜修理著再議具奏部議據該督疏稱新河口之北新洲可否挑挖成河難以預必即挑成之後果否不復淤長尤難逆料且糧艘皆由瓜洲一閘經行未見阻滯其儀真挑河修閘俱應暫停飭令量為修葺等因臣部以各省糧船盡由瓜洲一閘進口勢必頂阻守候以致遲悮亦未可定請敕總河總漕江督㑹同確勘定議具題等因題覆奉㫖儀真河閘關係運道著河道總督㑹同江南江西總督漕運總督詳閲定議具奏臣部以應如該督等所題交與總河確估具題題覆應准其開銷題覆奉㫖依議江防㕔冊聖祖仁皇帝康熙三十二年十月日總河于成龍題請將瓜洲儀真河道閘座事務就近改交江防同知專管疏詳運河部議覆奉㫖依議江防㕔冊聖祖仁皇帝康熙五十五年三月日總河趙世顯奏稱瓜洲河道乃糧艘經由要區關係綦重荷蒙聖明洞悉機宜睿慮精詳修建頭四兩閘蓄水濟運甚有禆益伏查瓜洲自四閘起至江口止計長二百九十七丈統名花園港渡江船隻賴以屯泊上年六月內江流北徙將四閘之下運河南岸花園港地方淤蘆田畝中間坍塌一百二丈以致屯船無多總漕施移商臣恐糧艘遲滯令將瓜洲繞城河開壩行漕重運糧船已於三月初九日盡數過完臣慮非經久之計率領道府㕔縣河官細加看議相度現今情形應於四閘之旁運河北岸挑挖月河一道以為屯船之地此議挑月河江防同知胡璉情願捐俸挑挖以備屯船倘來年江流北徙逼近四閘則預將四閘石塊錠鋦拆起存貯臨期細勘另行酌議其瓜洲繞城河逼近城垣護崖掃工不敢議動錢糧江都縣知縣李蘇情願捐備加謹保護再照瓜洲之息浪庵前石馬頭己坍塌去十分之六廟宇因坍塌逼近拆去兩層拆後地遂坍塌蓋因江潮浪湧大溜北趨所致㑹同總漕施世綸具題著令阿達哈哈畨張杓賫奏閏三月十一日奏事雙全等𫝊㫖此事甚屬緊要著大學士帶領張杓當面具奏本日大學士松柱帶領阿達哈哈番張杓而奏奉㫖據趙世顯奏稱花園港地方及息浪庵前石工馬頭俱被江水衝坍屯艘之處狹窄風浪可虞題請挑挖月河等因乃伊慮及河工之意朕以普天之下生民為念無處不預為籌畫倘江水日漸北流衝刷不已則瓜洲城垣必致危險其荆州杭州等處俱有護城隄岸瓜洲地方修建護城隄工作何保護不致危險庶瓜洲一帶地方始得完固齎奏張杓為人明白著九卿向伊問明詳加確議具奏㑹議查該督既稱江口花園港地方向來渡江糧艘賴以停泊因上年六月內江流北徙將花園港坍塌一百二丈以致屯船無多恐遲悮糧船將夲年重運糧艘暫由繞城河行走又風浪驟作江口停泊不便請於四閘傍運河北岸挑挖月河預儲屯船等語應如所題速行挑挖并繞城河岸捐備掃工加謹保護至瓜洲城垣與息浪庵相去四十餘丈息浪庵已漸坍缷我皇上軫念民生誠恐江流日漸汕刷逼近城垣應照荆州杭州等處建築護城隄岸此誠睿慮周詳聖謨𢎞逺預為百萬生民籌畫萬全之至意也但護城隄岸作何建築併築城之後作何保護不至危險臣等因地方遼逺水勢靡常不能深悉難以懸議應行總河㑹同江南督撫漕運總督作速親勘相度形勢詳加確議具題到日再議可也具題奉㫖據趙世顯奏稱江溜北徙花園港地方被衝坍塌一百二丈瓜洲息浪庵前石馬頭亦被汕刷坍塌等語倘江流日漸北徙衝刷瓜洲城垣必致危險事關民生若不預為籌畫修堤保護斷乎不可著江南督撫總河總漕速行親往詳加察勘作何修隄保護城垣勿致危險之處作速詳議一面動帑修築一面奏聞督撫四院親詣瓜洲察勘議于息浪庵門首建築護城隄掃工長二百七丈護城石工長三百一丈花園港越掃長一百八十丈及開寬挑深渡軍橋起等處河道並設文武汛官河兵住工每年入嵗搶修案內修防奉㫖依議江防㕔冊聖祖仁皇帝康熙五十九年冬奉上諭岷山𨗳江今江源所出之地番人名阿那是知岷山岷江古人即取土音京抄江防㕔所管臨江工段一息浪庵前建築掃工長二百七丈內康熙五十五年四月二十二日興工夲年七月十五日完竣息浪庵彌勒殿自西山拐角起至馬頭東轉角止長十二丈又馬頭東轉角石墻長五丈二共長十七丈大觀樓西首起至息浪菴西山止沿江一帶築隄岸一道連越灣長一百五丈息浪庵東山石馬頭下首起至東土隄上首止沿江一帶築護城隄岸一道長八十五丈以上共長二百七丈康熙五十五年四月二十二日興工夲年七月十五日完竣一自花園港三官殿後起至四閘下劉家涵洞止築護灘隄一道長一百八十丈康熙五十五年五月初十日興工六月十二日完竣一瓜洲城自北水關起至西北城拐角下首止建石工長三百一丈康熙五十五年五月二十日興工夲年九月二十日完竣一繞城河間段開挑寬深工長一千三十一丈內渡軍橋起至北水關止河長二百二十六丈北水關起至掃工迤南止河長三百二十五丈掃工頭南起至南關壩止河長二百四十丈南關壩起至基心橋止河長二百四十丈以上共長一千零三十一丈康熙五十五年五月二十日興工夲年九月二十日完竣一花園港建築掃工長四百丈康熙五十五年九月十五日興工夲年十一月二十日完竣一花園港建築越隄掃工一道長五百三十丈以作重門保障康熙五十七年五月初二日興工夲年十月三十日完竣一江防􅈦捐挑瓜洲西門城西越河一道長二百丈康熙五十七年十一月十五日興工十二月十三日完竣一瓜洲正人洲開挑引河二道內第一道長五百五丈第二道長五百二丈康熙五十七年十二月十三日興工康熙五十八年二月十六日完竣一花園港西立家巷建築挑水壩二座并雁翅包灘裏創共工長一百八十五丈又舊四閘西龍王廟建築護掃工長一百三十八丈康熙六十一年七月初六日興工夲年十月十五日完竣江防㕔冊聖祖仁皇帝康熙六十年開武曲港萬承蒼記略云贑水徑南昌北流匯為彭蠡湖又北過湖口縣㑹湖漢九水入江瀦盛泄湍兩石鐘山扼之驚濤怒奔虹洞駭目我國家置𣙜關於此縣城下故有虹橋港甚隘隆冬水涸舟不可入夏漲僅㭬百杙餘悉艤江漘每西南風作觸石抵巖或彼此互相擊撞檣折砥脫人溺死無算皇上御極六十年洞悉九州水道别其平險南顧咨嗟嵗丁酉大中丞白公潢持節江右陛辭諭及之公蒞任一年案行關所周覽形便得武曲港故址距下石鐘五里依山帶洲約可舶千舫沙礫壅陷厥流弗通爰具疏繪圗請捐俸錢浚治以利行舟得報可於是下令鳩工挽水鑿石堙者闢之障者决之公以時臨視人歡功倍五閲月告成自江干至港口道以丈計袤九十有三廣八十二深二或倍之因港為塘袤如港口之數加七廣强半於袤深視港取中焉距江建軟掃左右各一以遏淤沙袤四十丈廣八丈高二丈許外加排樁衛之又酌捐嵗修費使可恆守是役也費白金二萬六千兩有竒皆出公私庫中上無煩國帑下無妨民力迄工畢而所部不知其勞西江志舟湧幢小品云鄱陽湖出江處地名曰八里江至此皆泊于江北蓋南有湖口稅關故也風濤盜賊之患嵗無虛月盜猶可言若夜半大風陡起千百艘一捲無跡矣議者欲于北岸鑿潭屯船建一堡移衛軍守護余致書南操江丁改亭合江省撫臣議之丁欣然力任竟以江撫異議不果行此明萬歷年間事改亭名賔吾鄉嘉善人作小品者烏程相國朱文肅公也事關地方大患少有仁心者亟宜為民請命乃為異議所阻至百餘年後白公始毅然舉行之恩流汪濊湖漢九水間將名垂千古矣江漢源流昔人言之詳矣而莫簡明於湖廣通志所載漢水引祝穆曰天下之大川以漢名者二班固謂之東漢西漢而黎州之漢水源于飛越嶺者不與焉固之所謂東漢則禹貢之𨗳漾自嶓冢徑梁洋金房均襄郢復至漢陽入江者也西漢則蘇代所謂漢中之甲輕舟出於巴乘夏水下漢四日而至五渚者其源出於西和州徼外徑階沔與嘉陵水合俗謂之西漢又徑大安利劍果合與涪水合流入于江江水云江出岷山源自西羌萬山來至嘉州而沫水自嶲州合大渡河穿邉界十山以㑹之至敘而馬湖江㑹之又十五里而南廣江㑹之至瀘州而內江又自資簡㑹之至重慶而嘉陵江自利閬果合等州㑹之至涪州而黔江合南畨諸水㑹之至萬縣而開江水自開達等州㑹之然後總而入峽是江自峽而西受大水凡八及出峽而下嶽陽則㑹之者洞庭湖所受湖南北諸水也又自是而下鄂渚則㑹之者漢口與興元諸水也又自是而下黃州東四十里則㑹之者巴河也又自是而下九江則㑹之者彭蠡今名鄱陽湖所受江東西諸郡水也又自是而下則㑹之者皖水所受淮西諸水也然後總而入海是以自峽而東又受大水凡五略計天下之水㑹于江者居天下之半其名稱之大而可考者凡十有三故曰江源其出如瓮而能滔滔萬里達海所受者衆也此言江漢之大凡也再就大清一統志稿夲分省所紀櫽括而合觀之更灼然矣陜西漢水源出寧羌州嶓冡山經沔縣褒城南鄭城固洋縣西鄉石泉漢隂紫陽諸縣俱屬漢中府又經興安州洵陽縣白河縣亦屬漢中府而入湖廣鄖陽府界一名東漢水又有西漢水源出秦州屬鞏昌府西南嶓冢山經西和縣成縣徽州俱屬鞏昌府合兩當水又徑略陽縣寧羌州俱屬漢中府而入四川之廣元縣界亦名嘉陵江四川岷江源出岷山漢志江水出湔氐道徼外岷山元和志江源鎮在松州交川縣西北三十里輿程記江源出松潘衛北二百二十里大分水嶺南流經松潘衛南至叠溪所界二百里叠溪所南至茂州界三十里茂州屬成都府至灌縣屬成都府𨗳流益多包絡於成都其正流徑崇慶州屬成都府眉州嘉定州皆直隸州又經敘州府瀘州直隸州又經重慶府涪州忠州俱屬重慶府又徑蘷州府而入湖廣界亦曰汶江亦曰都江亦曰外水其在州縣城邑間往往隨地立名而都江外水則岷江之通稱也通釋云自蜀而言大江之外其水有七曰綿水曰雒水曰湔水漢志雒水出雒縣章山南至新都谷入湔又綿水出綿竹縣紫岩山南至新都北入雒又湔水出綿虒縣東南至江陽入江過郡二行千八百九十里是以湔水為經流也水經注洛水出洛縣南流至新都與綿水合又與湔水合亦謂之郫江又南至江陽入江謂之綿水口亦曰中水是以雒水為經流兼有綿水之稱也今雒源出漢州什邡縣西北東南流經德陽縣南又東南徑漢州東又南合綿水其水出綿竹縣西北東南流經德陽縣東又東南徑漢州東而入雒雒水又南徑金堂縣東合湔水其水出大江自灌縣分流東徑郫縣及新繁新都縣北漢州及金堂縣南而入雒雒水又南出金堂峽徑簡州東一名牛鞞水又名雁水又東南徑資陽縣東又東南經資縣南為資江又名珠江又東南徑內江縣西又東南徑富順縣東又東徑隆昌縣西南又東南至瀘州北入大江雒江之名隨境而更而中水為其通稱元和志謂之中江曰涪水漢志涪水出刪氐道徼外南至墊江入漢過郡二行千六十九里今涪江出松潘衛東九十里小分水嶺東南流徑小河所北又東南徑龍安府南又東南徑江油縣東又南徑綿州西又東南徑潼川州東及射洪縣東又南徑蓬溪縣西遂寧縣東折而東徑合州南㑹嘉陵江又東南至重慶府北入大江曰嘉陵水曰巴水曰渠水巴水源出陜西南鄭縣南之大巴陵南流入保寧府界徑南江縣及巴州東又東南至夔州府達州西合渠江渠江出達州太平縣東北之萬頃池西南流徑東鄉縣及州南又西南徑順慶府渠縣東又西南徑廣安州南曰篆水亦曰洄水又西南至重慶府合州城東北而入于嘉陵江又東南入于大江七水合於江而江始大今按綿水湔水入雒而巴渠合為一水則大江之外為巨川者四而已矣其出于夷中入中國而附於江者又不與焉嘉陵江即古西漢水也水經注西漢水南流入嘉陵道為嘉陵水在今陜西鞏昌府成縣界九域志始以故道川為嘉陵江在今漢中府鳳縣界二水至徽州合流南徑寧羌州入四川界其流雖同其源則異自陜西寧羌州南流經廣元昭化二縣屬保寧府合白水又徑劍州蒼溪縣又徑府城西又徑南部縣俱屬保寧府又徑蓬州屬順慶府順慶府城東又徑合州屬重慶府合渠江又合涪江又至重慶府城東北入大江亦曰閬水以流徑閬中也亦曰巴水以水流曲折也亦曰渝水王貽上行棧中二十四馬鞍嶺記云棧中之水大約有四支茶坪以北衆水北流為清澗河入渭為一支茶坪以南衆水西流至階州西和成白水江為一支鳳縣以北斜谷大散嘉陵諸水西流由徽州兩當界成嘉陵江為一支柴關以南青羊水西南流至武關北褒水從東來注之合流至武關石溝水從西來注之合流至馬道驛樊水從西來注之又南合青橋沙河諸水以入漢江其大較如此蜀又有瀘水大渡河亦入大江瀘水即古若水漢志若水出旄牛徼外南至大莋入繩又繩水出遂久徼外東至僰道入江行千四百里水經注若水與繩水合亦通謂之繩水又經越嶲馬湖縣為馬湖江又東北至朱提為瀘江水又曰永昌有瀾滄水即瀘水也今瀘水亦名打衝河自寧畨衛西徼外東南流徑建昌衛西鹽井衛東又東南徑㑹川衛西南與雲南金沙江合又東徑東川土府西折而東北經烏䝉土府西北又東北經馬湖府南又東經敘州府南而北入岷江南大渡河即古渽水漢志渽水出汶江道徼外南至安東入江過郡三行三千四十里說文作涐水唐時始謂之大渡河韋皋拒吐畨李德裕拒南詔皆經營于此今水自茂州徼外南流徑黎大所西折而東徑所南又東徑建昌衛北又東徑嘉定州峩眉縣南又東北至州城東南入大江湖廣江水自四川巫山縣流入界經巴東縣歸州俱屬荆州府歷華容縣屬嶽州府至嶽州府北又徑臨湘縣屬嶽州府嘉魚縣屬武昌府又北至漢陽府城東武昌府城西而㑹於漢水復北折而東歷武昌府北東南歷廣濟黃梅二縣屬黃州府南而東入江南宿松縣界江之南岸則江西德化縣界矣漢水自陜西白河縣流入界徑鄖陽府城南至襄陽府城北折而東南又南徑安陸縣屬德安府西荆門州屬安陸府東復東南至漢陽府城東北大别山下㑹于大江又有沮水入于大江又湘水沅水並入洞庭湖沮水出鄖陽府房縣西南景山東南流徑襄陽府南漳縣南境又南徑荆州府夷陵州逺安縣東而入安陸府荆門州界至當陽縣北又東南合于南漳縣境東南徑當陽縣北又東南與沮水合流達縣南之沱江至荆州府枝江縣而入于大江湘水自廣西全州東北流入界經永州府東安縣南至府城西南引而北㑹瀟水謂之瀟湘又徑衡州府城南引而東北有蒸水㑹焉謂之蒸湘又北流過湘潭縣西至長沙府城西環城而下過湘隂縣西又北而達青草湖注于洞庭湖沅水源自貴州鎮逺府㑹羣川之流至辰州府沅州界而益大因名沅江徑州城及黔陽縣城南又東接靖州㑹同縣西界東北流徑辰溪縣北瀘溪縣南又過辰州府城南東北至常德府桃源縣南又東徑常德府城南龍陽縣北至沅江縣之西注于洞庭湖今辰州以西五溪之水皆附沅水而達洞庭澬水出靖州綏寧縣東南唐糾山東北流徑寶慶府武岡州北又徑府城北邵水㑹焉或謂之邵江北流至新化縣東而至長沙府安化縣境徑縣西又東北出益陽縣南寧鄉縣北而入常德府沅江縣西南境注于洞庭湖洞庭湖在嶽州府城西南一里湖之南為青草湖北去巴陵縣七十九里南去長沙府湘隂縣百里周回二百六十五里自冬至春青草彌望水溢則混合洞庭之西為赤沙湖東去巴陵縣一百里西北去常德府龍陽縣三十里周回一百七十里夏秋水泛亦與㓊庭為一洞庭南連青草西吞赤沙名三湖亦名巴丘湖湧幢小品云湖水與江相連者惟洞庭最闊夏漲則江濁而湖高以清秋落則江清而湖低以濁又云江自嘉州至荆門灘險地凡千百餘舟人一一能言之其灘之外有洞有磧凡數十皆見于字書今載其略洞疾流也水流沙上曰瀨水出尾下曰瀵回流旋轉曰漩石積水淺曰磧水疾崖傾曰碥灘磧相湊曰沝水如轉轂曰漕水漫不流曰沱潭下急流曰灘其名尢多不能盡書也江西大江自湖廣興國州流來橫亘於九江府北廣二十里東流百二十里經尋陽驛又百七十里入江南望江縣徑雷港驛亦名潯陽江也贑水因章貢二水合流而名自贑州府城北㑹流北注一名南江徑吉安臨江二府過豐城縣西北至南昌府城西繞城而流東北入于鄱陽湖北出湖口縣西注於大江鄱陽湖即彭蠡湖在南昌府東北百五十里饒州府西四十里南康府城東五里九江府東南九十里周四百五十里浸四郡之境江南大江自江西彭澤縣流入宿松縣界屬安慶府下流過江寧府城北又東至通州東入海東西橫亘幾二千里若貴州之烏江雲南之金沙江其流亦入大江烏江在貴陽府北二百里出水西境內與四川遵義府分界其渡處有烏江關東北流徑平越府餘慶縣又甕安縣西又北經石阡府西又北入思南府徑府西北流入四川重慶府彭水縣界而為涪陵江徑縣南又東北徑武隆縣治南復折而西北徑涪州城東而入于大江金沙江源出麗江府西北旄牛徼外下流至四川敘州府東南注于大江詳見黑水竊按一統志稿所載江南江西大江失之太簡崑山鄭若曽作江防圗考自江西九江起至江南鎮江揚州沿江信地頗有里數可稽為摘録之江西則有南湖信地南岸上自九江府下巢湖起下至馬當止計三百二十五里北岸上自湖廣龍坪鎮起下至沙角灣止計二百四十里江南則有安慶信地南岸池州北岸安慶南岸上自馬當起下至池口止計二百九十里北岸上自史家溝起下至老洲頭止計三百六十里荻港信地南岸池州太平北岸安慶廬州南岸上自池口起下至東梁山止計三百五十里北岸上自老洲頭起下至西梁山止計三百里逰兵信地南岸太平江寧鎮江北岸和州江寧南岸上自東梁山起下至高資止計三百四十里北岸上自西梁山起下至黃天蕩止計二百四十里儀真信地南岸總載後北岸江寧揚州北岸上自瓜埠黃天蕩起下至瓜洲止計一百四十里瓜洲信地南岸總載後北岸揚州北岸上自花園港起下至深港止計三十里三江口信地南岸總載後北岸揚州北岸上自瓜洲起下至廟港止計一百四十里圌山信地南岸鎮江常州蘇州南岸上自高資港起下至包港止計二百五十里以上八營信地沿江共計一千五百餘里江南省城去句容九十里句容抵龍潭抵斜溝俱七十里長江一帶洲渚限隔唯斜溝龍潭二處船隻由此出入故黃天蕩為賊淵藪而龍潭斜溝則津要之地也揚州府信地上自儀真縣東溝起至青山白茅墩止江面四十里自青山起至羅漢洲止江面八十里中間青山為黃天蕩最要自下江口起至窑港止江面四十里自窑港起至何家港止江面缺里自羅漢洲起至舊江口止江面八里自舊江口起至蔣八港止江面十里自蔣八港起至深港止江面十里自深港起至穿心港止江面六十里三江㑹口上至瓜洲鎮下至廟港止江面一百五十里乃瓜儀險要之最自穿心港起至急水港止江面三十里自急水港起至李家港止江面三十里圌山兀處江邉與周家橋相對乃鎮江之咽喉江寧之門户也鎮江府東西二馬頭皆濵大江逼近城郭亦為要地北至瓜洲儀真以備江冦南至圌山安港以防海賊三江㑹口係江都縣地方西至瓜洲鎮一百三十里東至周家橋四十里與江南圌山相對中有順江洲江面頗窄水流湍急最為險要瓜洲鎮係江都地方南濵大江東至沙河港二十里西至花園港七里北至揚州府城四十五里與江心金山寺相對建有甎城居民稠密商賈輻輳江南糧運由此過焉花園港係江都地方東至瓜洲鎮七里西至何家港十五里商船多於此住泊何家港係儀真地方東至花園港十五里西至舊江口十里舊江口係儀真地方東至何家港十里西至下江口六十里與江心新洲相對下江口係儀真地方東至舊江口十里西至青山觜三十里與江心天寧洲相對其洲接連何家港為江洋要害儀真縣城東至瓜洲鎮四十里西至六合縣六十里東北至揚州府七十里南濵大江貨財輳集漕運糧船由此過焉上江口係儀真地方東至下江口約一里去下江口不逺青山觜係儀真地方東至下江口三十里西至東溝二十里東溝係儀真六合二縣交界正當黃天蕩大江之中險要尤甚此皆沿江一帶設兵防守之處雖無預於河工亦以見王公設險之至意也小谷口薈蕞行水金鑑卷八十
