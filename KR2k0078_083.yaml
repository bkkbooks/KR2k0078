body:
  text: 行水金鑑卷八十三江南按察使傅澤洪撰濟水漢建安九年春正月濟河遏淇水入白溝以通糧道三國志北齊河清元年四月濟溢河南通志帝高宗也東封泰山以許敬宗領使次濮陽帝曰書稱浮于濟漯今濟與漯斷不相屬何故而然對曰夏禹導沇水東流為濟入于河今自濟至溫而入河水自此洑地過河而南出為滎又洑而至曹濮散出於地合而東汶水自南入之所謂泆為滎東出于陶丘北又東㑹于汶是也古者五行皆有官水官不失職則能辨味與色潜而出合而更分皆能識之帝曰天下洪流巨谷不載祀典濟甚細而在四瀆何哉對曰瀆之言獨也不因餘水獨能赴海者也且天有五星運而為四時地有五嶽流而為四瀆人有五事用而為四支五陽數也四陰數也有奇偶陰陽焉陽者光曜陰者晦昧故辰隱而難見濟潜流屢絶狀雖微細獨而尊也帝曰善敬宗退矜曰大臣不可無學唐書許敬宗傳宋乾德三年十月丙寅濟水溢鄒平宋史太祖本紀師中知濟兖二州濟水堙塞久師中訪故道自兖城西南啓鑿之功未半而去宋史李師中傳古說濟水伏流地中今厯下凡發地皆是流水世傳濟水經過其下東阿亦濟水所經取濟水煮膠謂之阿膠用攪濁水則清人服之下膈疏痰止吐皆取濟水性趨下清而重故以治淤濁及逆上之痰今醫方不載此意夢溪筆談元至正二年六月癸丑夜濟南山水暴漲衝東西二關流入小清河黑山天麻石固等寨及卧龍山水通流入大清河漂沒上下居民千餘家溺死者無算元史順帝本紀濟之性徑源於晉伏流地中乍見乍伏一支穿太行為百泉為衛水一支為濟源出山東為七十二泉空同子濟因㑹通河借水通漕而其流竟莫可考古言禹貢濟河惟兖州又道沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北㑹于汶又北東入于海周官兖州其川河濟是已水經注及山海經云濟水出河東垣縣王屋山初名沇水東出溫縣西北始名濟水又東南流當鞏縣之北而南入河與河並流過成臯溢出為滎水東流過陽武及封丘縣北又東過寃朐縣南至定陶縣南又東北流與菏水㑹東至乘氏縣西分而為二其一東北入巨野澤過壽張西與汶水合又北過榖城縣西又東北過盧縣北經齊郡東萊郡而入海也唐李賢謂濟自鄭以東貫滑曹鄆濟青以入于海宋樂史謂東平濟南淄川北海界中有水流入海謂之清河今按濟水在漢時伏流不見惟汶水自泰安州出者由故道東北流入海自元人引汶水入洸為運河明因之凡汶水入海處皆築堰壩以遏其流而入海之道遂多湮塞今所謂大清河者乃汶水出洸河者復從張秋分流而入㑹徐東南諸山泉溝澤北經長清齊河至厯城㑹濼水經濟陽齊東武定青城濱州蒲臺利津諸州縣界入海實濟河之故道也所謂小清河者即濼水發源濟南趵突諸泉趵突泉在府城西一名爆流平地泉湧高或至數尺蓋濟水伏流至此而發濼水之源也由東北至小清河入海宋曽鞏二堂記曰按圖泰山之北與齊之東南諸谷之水西北滙於黑水之灣又西北滙於柏崖之灣而至於渴馬之崖蓋水之來也衆其北折而西也悍疾尤甚及至於崖下則泊然而止而自崖以北至於厯城之西蓋五十里而有泉湧出高或至數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄糠於黑水之灣者而見之於此蓋泉自渴馬之崖潜流地中而至此復出也趵突之泉冬溫泉旁之蔬甲經冬常榮故又謂之溫泉其注而北則謂之濼水達於清河以入於海舟之通于濟者皆於是乎出也齊多甘泉冠於天下其顯名者以十數而色味皆同以豫驗之蓋皆濼水之旁出者也濼水嘗見於春秋魯桓公十有八年公及齊侯㑹于濼杜預釋在厯城西北入濟水自王莽時不能越河西南濼水之所入者清河也蓋預失之澄金線泉在府城西石甃方池泉亂發其下東注城壕徹見底波心南北有金線一道隱起水面珍珠泉在府城內有二南珍珠泉在鐵佛巷街東今淤北珍珠泉在都司西北白雲樓前後規入德府城中泉爆起粒粒如珍珠滙為古明湖之按一統志濟南名泉七十二趵突為上金線珍珠次其餘不能與三泉侔矣今按趵突金線珍珠杜康舜泉舊志已收其曰皇華曰栁絮曰卧牛在金線東曰東高曰南漱玉北漱玉在金線南曰無憂曰石灣在趵突南或云在檻前西南曰酒泉曰湛露在無憂西曰滿井曰煮糠在趵突北曰散水曰溪亭在北珍珠東曰劉氏曰濯纓在北珍珠西曰灰泉在濯纓西北曰知魚在灰泉東南曰硃砂在灰泉西曰白雲在劉氏南曰登州曰望水在萬竹園內曰洗鉢在登州東北曰淺井曰馬跑在洗鉢西南曰香泉在舜泉西曰鑑泉在舜泉南或云即檻泉也曰金虎在李承務巷或云即黑虎也曰東密脂在金虎西南曰西密脂在東密脂西曰孝感在孝感坊內曰玉環在布政司前曰羅姑在塔巷街東曰混沙曰灰池在城西南角場下曰芙蓉在姜家亭前曰滴水在西務北曰灰灣曰賢清在城西五龍堂東曰雙桃在城西丁字街北曰溫泉在城西石橋北城下曰汝泉在神童寺內曰龍門在神童寺東曰染池在龍門東曰懸泉在中宫東或云在龍洞口曰都泉在中宫鎮東南曰栁泉曰車泉在中宫東曰煮糠在四里山南曰爐泉在南山下曰甘露在大佛山曰林汲在佛谷內曰白泉在玉舍莊北五里曰金沙曰白龍在龍洞山曰花泉在張家泊曰獨孤在靈巖寺或云在天麻嶺下曰金泉在章丘黌堂嶺或云即醴泉也北曰漿水在龍山鎮東南曰南煮糠在䗶山窩北曰苦苣在栁鋪東一名萵苣曰尉斗在梨峪門家莊曰鹿泉在石固寨曰龍居在章丘長城嶺西合趵突諸泉及章丘百脈泉總七十二見名泉碑齊乘曰濟南名泉碑論七十二泉逺至中宫靈巖諸泉具載而華不注之華泉明水鎮之净明泉皆失不取况其名亦未雅稱蓋殘金俗筆也永樂間山東僉事晏璧作七十二泉詩其泉名視名泉碑所載間亦不同蓋歲久泉源淤塞者多好事附㑹訛傳固亦不足辨云流至城北古明湖湖在府城內西北隅源出厯下諸泉一名西湖其地占三之一由北水門出流注大小清河入海按酈道元水經注濼水北為古明湖湖水引瀆東入西郭而側城北注又上承東城厯下泉源競發北流出郭一統志源出舜泉今按濼水繞城北流向東不入城舜泉亦止成一井不流惟北珍珠濯纓諸泉今在德府內者北流入古明湖而自北水門出注濼水如舊豈湖中自冇泉源暗發人不及見耶今湖多為民居填塞治圃夾蘆為沼小舟僅通曲港而蔬果蓮藕菱芡魚蟹之利民頗資之出而合之由華不注山下東流㑹巨合水水在府城東七十里東源曰榆科泉西源曰江水泉北流各五里合小清河又東經章丘㑹淯河河在章丘縣東一里即繡江也源發㑹仙山下合百脈泉及東西二麻灣泉西北滙為白雲湖流入小清河又㑹漯河河在章丘縣東七里齊乘作獺河一名楊緒水源出長白山之王村峪西北流至栁塘口入小清河三水合流經鄒平長山新城又㑹孝婦河河在淄川縣西門外源出青州益都縣顔神鎮合瀧萌二水北經長山新城縣界流入小清河又東經高苑入博興樂安界合於烏河河在新城縣東三十里源出益都矮槐樹北即時水也亦作耐水流入小清河舊志謂時水在陽信縣城西者非又北至馬車瀆入海或云古濼水自華不注山東北入為大清河自僞齊劉豫道之東行始為小清河云大清河即濟水故道濟水伏流不見汶水自泰安州出者由故道自寧陽界西南流至汶上縣北泗汶村至東平州南西北流入東阿縣界又東北經長清齊河厯城濟陽齊東武定青城濱州蒲臺利津等州縣入海自元時於寧陽縣東築堽城壩遏汶水入洸以通運河明永樂間又於東平州東築戴村壩盡遏汶水入㑹通河於是入海之道多塞汶水既入運河者又從張秋分流復由故道㑹諸州縣溝泉之水合小清河東北注海小清河一名濼水源發府城西趵突泉由華不注山下東行㑹巨合水又東經章丘㑹清河又㑹漯河合流經鄒平長山新城又㑹孝婦河又東經高苑博興至樂安馬車瀆入海俗名鹽河按古濼水自華不注山東北入大清河僞齊劉豫乃導之東行為小清河今海運久廢河道漸淤其水復自華不注東北入於大清河而小清河所受止鄒平而下滸山泊河白條溝鄭黃溝孝婦河烏河諸流而巳又按酈道元謂濟水在王莽時枯竭鄭樵通志亦曰濟水多涸竭自今觀之濟水徑疾能穴地伏流隱見無常乃其本性非真涸竭也濟水既伏流地中則發地皆泉又不特厯下諸邑為然是故一見為濟源再見為滎水又見為山東諸泉水而溢為大小清河其實皆濟水也又何嘗見其枯竭邪淮南子曰濟水通和宜麥周官曰鸜鵒不踰濟風俗通曰濟齊也齊其度量劉向說苑稱濟能蕩滌垢濁通百川於海蕩出雲雨則濟水之德又古今所並稱云山東通志四瀆水之易變者莫若河變而至於絶者莫若濟豫嘗討論濟瀆積至五載始評以二言曰新莽後枯而復通唐高宗前通而復枯咸出天數夫豈人謀蓋後漢郡國志曰濟水王莽時大旱遂枯絶者此初絶也酈注濟水條曰其後水流徑通津渠勢改故杜釋春秋郭注山經並云今濟水至博昌入海者此復通也章懷太子賢循吏傳注曰濟水王莽末旱因枯涸但入河內而巳似素不知有中古復通之事者此終絶也潜丘劄記濟水三伏三見與夫南北大小清河朏明先生辨之詳矣至引或說謂山左諸泉實皆濟水溢為大小清河其說本之山東通志具有確見則濟水伏流發自地中者豈獨七十二泉哉春秋襄十八年㑹于魯濟莊三十年遇于魯濟注濟水厯齊魯界在齊界為齊濟在魯界為魯濟由此觀之今濟南府之新泰萊蕪二縣泰安州肥城縣兖州府之平陰縣東平州汶上寧陽泗水曲阜滋陽五縣濟寧州魚臺鄒滕嶧四縣青州府之䝉陰縣皆有泉濟南青州皆齊地兖州魯地齊魯之界皆有泉則皆是濟水矣故將各州縣之泉臚列如左小谷口薈蕞東平州泉十四舊九新五安圈泉吳家泉張胡郎泉小黃泉新大黃泉新王老溝泉席橋泉净泉新源泉新冽泉新杷頭泉獨山泉鐵鈎觜泉坎河泉俱入汶舊有徐家莊灰蘆三泉今廢汶上縣泉三舊二新一龍鬭泉濼當山泉雞爪泉新俱入汶舊有馬莊泉今廢平陰縣泉一舊栁溝泉入汶滋陽縣泉八舊四新四東北新泉闕黨泉古溝泉新負假泉上蔣詡泉新下蔣詡泉新西北新泉驛後新泉新俱入濟鄒縣泉十二舊八新四鱔眼泉程家莊泉新孟母泉陳家溝泉白馬泉岡山泉黃港溝泉新淵源泉栁青泉馬山泉新勝水泉新俱入白馬河二角灣泉入魯橋河舊有白莊泉今廢曲阜縣泉二十舊十七新三橫溝泉埠下泉新安泉變巧泉俱入泗青泥泉栁青泉車輞泉逵泉茶泉雙泉曲水詠歸泉溫泉連珠泉新泉曲溝泉濯纓泉鄒村泉新文水泉新栁莊泉新俱入沂蜈蚣泉㑹鱔眼泉入白馬河舊冇潺聲泉今廢泗水縣泉五十三舊三十新二十三趵突泉珍珠泉淘糜泉黑虎泉四泉俱出陪尾山林泉寺左㑹為泗源繁星泉白石泉新蓮花泉新開泉新響水泉紅石泉甘露泉七泉在林泉寺南㑹趵突等泉入泗下莊泉三台泉新湧珠泉石露泉新甘露新泉新奎聚泉新琵琶泉新七泉俱㑹趵突等泉入泗潘波舊泉潘波新泉新黃陰泉吳家泉杜家泉曹家泉蔣家泉里潦溝泉新石井泉新鮑村泉合德泉新趙家泉龜陰泉龜眼泉新龜尾泉新東巖石縫泉珍珠泉在縣東南尚舒社黃溝泉嶽陵泉石河泉璧溝泉小玉溝泉大玉溝泉蘆城泉西巖石縫泉三角灣泉雪花泉新新開第二泉新天井泉新醴泉新醴前泉新七里溝泉新馬莊泉新馬跑泉新魏莊泉新俱入泗滕縣泉十八舊十五新三北石橋泉三里橋泉大烏泉絞溝泉