body:
  text: 行水金鑑巻八十五江南按察使傅澤洪撰濟水曲阜縣薈蕞云曲阜故神明之區也其山防其水沂泗其設都為大庭神農有熊少昊氏其封國為魯代有升降而間氣不薄迨孔子生而曲阜益為宇内重爾雅曰大陵曰阜應劭曰曲阜在魯城東委曲長七八里故曰曲阜東泗水西滋陽南鄒北泰安嶧縣在其東南寜陽在其西北西南為濟寜東北為新泰縣之東南六十里尼山峙焉孔子故里在縣城中是名闕里今為宣聖廟杏壇在廟殿前孔子舊居也屬兖州府逵泉距縣東南三里在馬跑泉村東出土中水中石如伏黿怒鼉活潑可玩即左傳所稱逵泉是也西南流三十步㑹兩觀泉兩觀泉出土中東南流十五步㑹近逵泉近逵泉出土中西流二十步㑹車輛泉車輛泉出土中東南流五步㑹雙泉雙泉出土中西南流二十步入茶泉茶泉出土中東南流八步㑹栁靑泉栁靑泉出土中西流十步㑹曲溝泉曲溝泉距縣東南二里在馬跑泉村西北出土中東㑹茶泉數步與栁青雙泉車輛近逵兩觀逵泉相去亦各止十步或二十步共滙南流一里出口入沂以下全河備考通沂泉距縣東南四里出馬跑泉村東土中西北流一里徑入沂洙泗河泉距縣東南三里出馬跑泉村西土中南流十步㑹新泉新泉出土中地名竹園西南流一百步㑹曲水詠歸泉曲水詠歸泉出土中南流二十步㑹濯纓泉濯纓泉出土中北流三步㑹浴沂潺聲泉浴沂潺聲泉出土中西南流半里同㑹諸泉入沂城南新開泉在南關南一里出土中北流一里入海河㑹文獻泉文獻泉在城東二步出土中即魯頌思樂泮水二歩入海河又西南流三里入沂温泉距縣東南十里雖寒沍水常暖即曽㸃浴處也在張曲村東北出土中廕泉五西流一里㑹近温泉近温泉距縣東九里在張曲村東北出土中西北流一里㑹黒虎泉黒虎泉距縣東南八里出張曲村土中西北流半里㑹連珠泉連珠泉距縣東南七里出張曲村北土中西北流六里同諸泉入沂青泥泉距縣東南十五里出河頭村西北土中地名萬栁莊西南流五里入沂埠下泉距縣東北十五里出句石橋村東土中西南流二里入泗横溝泉距縣東北十六里出陶樂村北土中西南流三里入泗新安泉距縣北二十五里出泉頭莊東北土中西南流十五里入泗暎安泉距縣西北三十里出泉頭莊土中西南流半里㑹新安泉入泗城北新開泉距縣西北三十里去新安泉四里出栁莊村東土中南流十三里入泗變巧泉距縣西北三十五里出姚村南沙中西南流八里入泗蜈蚣泉距縣南二十里出大薛村西南西南流一里㑹鄒縣鱔眼泉入白馬河滋陽縣薈蕞云滋陽魯瑕丘地曠野平疇無山谿之險獨嵫陽一山童然培塿耳而縣故藉以名宋大觀四年置嵫陽縣明成化間因其地多火災欲以水壓之故去山添水改名滋陽東曲阜西濟寜南鄒北寧陽顔子陋巷在縣前路南小巷湫隘前有勒石即顔子簞食瓢飲處屬兖州府東北新泉距縣東北五里出井家林莊地名東隅社渠長一里西流㑹闕黨泉闕黨泉距縣東北四里古闕黨地西流㑹古溝泉元對泉距縣東北六里㑹入照星泉照星泉距縣東北五里半㑹入惠泉惠泉距縣東北五里半㑹入既濟泉既濟泉距縣北五里長八十五步㑹入古溝泉古溝泉距縣北五里長一百五十步㑹入負瑕泉負瑕泉距縣北五里當以古瑕丘得名長三十步㑹入蔣詡泉廕泉一西流㑹闕黨泉三義泉距縣東北四里在三義廟前長七十步二里㑹入負瑕泉上蔣詡泉距縣北五里在紅花厰西地名紙房長七十步西流㑹下蔣詡泉下蔣詡泉距縣北五里在紙房厰東長九十步南流轉西㑹西北新泉西北新泉距縣西北五里在郡厲壇東長六步一里㑹入紙房頭泉紙房頭泉距縣西四里在舊關東長九步三尺右流轉南㑹驛後新泉驛後新泉距縣西二里渠長一里㑹諸泉至平政橋入濟又十五里至婁閘又二十里至杏林閘二十里舖為濟寧州交界舊入天井閘今㑹入馬場湖濟運濟寧州薈蕞云濟寜古任國也唐為濟州元為濟寜路明改為州南控江淮北拱畿輔水陸衝途河督建節宿兵於此泗沂汶洸繚繞境内諸泉由之入運無慮百有餘泉而州之蘆溝泉托基泉馬陵泉浣筆泉皆徑入於漕此可考而得者屬兖州府蘆溝泉距州東南七十里出兩城店土中泉頭五長十八里南流入南陽閘由磨䥥溝出水濟運馬陵泉發源馬陵山西距州東南六十里東泉頭一西泉頭二長六里西流入魯溝閘由龍家橋出水濟運托基泉泉頭二距州五十里出土中長二里西流入棗林閘由龍家橋出水浣筆泉在州城東關外去㑹通河不數武出土中一方池一圓池相傳為唐時李太白浣筆處南流由通濟橋徑入運鄒縣薈蕞云鄒本春秋小邾國戰國改為鄒後遂以名縣東南接滕西界濟寜滋陽北鄰曲阜故邾城在嶧山之陽春秋魯文公十三年邾文公卜遷於繹即此孟子曝書臺在南門子思書院西有臺高丈許者是臺西為斷機堂相傳即孟子故居有孟母祠孟廟在城南一里墓在四基山之西麓距縣東北三十里屬兖州府陳家溝泉距縣北二十里出原蹇社原蹇村平地土中西北流三里入白馬泉又五里㑹馬山孟母二泉口十里㑹崗山屯頭二泉一里至白馬橋三里㑹鱔眼泉口五里至雙橋村五里㑹新泉程莊泉口十里至内官橋五里㑹黄港泉口三十里至徐鎮橋十里至白莊泉口十五里至黄路橋三里至紙房頭村五里㑹淵源泉口七里㑹栁青勝水二泉口十二里至圈裏村方同入泗河轉入魯橋白馬泉距縣北二十里出原蹇社原蹇村平地土中西北流五里㑹馬山孟母二泉口馬山泉距縣北三十里出莊朱社傅莊村平地土中南流八里㑹孟母泉四里㑹陳家溝白馬二泉十里㑹崗山屯頭二泉口一里至白馬橋孟母泉距縣北二十五里出公孫社宣村平地土中西南流