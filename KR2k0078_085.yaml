水伏流時出地上原無定體定形故汶泗皆有源有委而濟獨無可以概見乃萬兩溪謂泰山諸泉皆濟水所沸滙於汶則東省之水惟有一濟汶反為下流而據滋陽之說則濟又為汶之下流矣考濟水禹貢𨗳沇水東流為濟又東北㑹于汶又北東入于海今在汶上縣北一名大清河即汶水入濟之道水經濟水故瀆又北合洪水註云洪水上承鉅野又北經闕鄉與濟合則前說為是湧幢小品大前明劉珝修大小清河碑記云濟青之區有河曰濟曰小濟小濟之源出於厯城之趵突泉中滙淯漯孝婦諸水東北抵東安高家港達于海大濟則濟水渠也自東阿之張秋東北抵利津富國鹽場達於海此言大小清河源流甚為簡明合之胡朏明閻百詩之言便可瞭然於心目間矣胡閻說見前又按山東通志濟水在汶上縣北一名大清河禹貢濟水東出于陶丘北又東至于菏又東北㑹于汶又北東入于海酈道元謂濟水當王莽之世川瀆枯竭不與昔同宋蔡沈謂今厯下凡發地皆是流水世謂濟水經流其下然則今濟水伏流不見惟汶水由濟之故道入海其實發於岱陰諸山者皆濟水既伏而見也予以山東諸泉附於濟水之後者盖據此云張純廢泉論曰泉之資於漕大矣而亦有不必用者如䝉沂之泉所以濟邳河然自塞孫家口黄河悉由徐吕至邳則邳無資於泉也是以𢎞治中巡撫徐公源議棄此泉并夫省之䝉沂之民至今利焉滕嶧魚之泉所以出沙河而并及二洪然自鑿新河諸泉雖由吕孟等湖入運而湖波浩蕩自有餘濟則滕嶧魚之泉有可也無可也停夫以寛民非與然河之遷徙靡常姑自我朝論之嘉靖十三年水行趙皮寨穀亭流斷二洪告涸向非天助其順自衝夏邑以出小浮橋則人力如之何哉十九年決雞鳴岡由渦經亳以入淮二洪又涸向非王公以旂力開李景高口則二洪幾不濟矣然猶幸其可以智力成則人亦天也今所恃者天耳萬有不測甚而人力無所施則二洪涸安得不賴滕嶧魚之泉乎邳河澀又安得不賴䝉沂之泉乎是不可不預待也又胡瓚議廣泉源畧曰夫所貴乎泉者謂其濟運也若冬春枯澀夏秋暴長無為貴泉矣近據所閲新泰諸泉皆此𩔖也訪得䝉陰廢泉如官橋卞莊二泉下流俱入汶河夫非漕渠涓滴之助愚以為勞力於無源之水莫若施功於有用之泉况其故道可尋因舊為易或者以為復泉仍須復夫查該縣原額泉夫百五十名自𢎞治十四年暫議停役今經百年所省當二萬計何莫非王土而困此兩郡民乎合無將前項廢泉亟為修濬量復人夫仍以附近新泰泉官督之便又張克文新泉序曰國家輓東南數百萬粟遡流達於京都南旺其襟喉而泉源其血脈也舊泉凡二百二十有六分濟南北前人之計周矣文奉命兼理之明年壬申遍厯諸泉其曲徑危梁不能輿者躡履從之務窮其源凡舊泉所出悉按圖治之矣顧圖所不載者厯州縣有之召父老問故曰泉豈有窮夫則有限如開一泉必増數夫故使者不及睹有司不以告余因進諸長吏而矢之必不以泉益夫以水困民也惟取盈於舊額蠲其逺役而調停焉如是而民心恱遂報新泉三十六處併而入河計所助之利視昔亦加多或曰新泉中有甚微細者顧亦取而濬之而記之何抑不見閘乎水涸舟膠既障之板又從而固之加蓆草焉懼其涓滴不為用也夫巳涓滴而塞其流不涓滴而導其源可乎矧今不紀後將何稽并叙其說如此厯觀前人之論泉之所係重矣而酌其緩急則分水天井魯橋之派尤屬漕河命脈每嵗春夏宜嚴督官夫疏濬庶克有濟至于山泉沙磧頗多汶河每為淤墊須於大挑之期一併挑濬使泉流無阻名曰理白河其各處泉源必於三四月查挑貴及時而用之也乃自泉夫裁而挑濬無人泉為之壅矣且蔭泉宜多植栁斯溝渠得以遮蔽盛夏烈日水不消耗尤需人培䕶之夫閘河千里所藉以利漕者惟此十七州縣之泉源屈曲灌注而後為我用茍以裁夫而致壅塞則病漕之害豈區區役食所能較其輕重耶是泉夫之宜復有不待再計而決者山東全河備考聖祖仁皇帝康熈二十三年十一月十六日駕自費縣至泗水東境經泉林寺駐蹕觀泉御製泉林記曰朕被服至道誦法孔子於詩書簡册之中羮牆載見如聞其言論而接其聲容者匪伊朝夕矣嘗以不得一登闕里之堂觀其車服禮器山川風物慨然至聖之音徽每低徊於中而不能自已廼者在廷之臣咸謂古者天子巡省方岳觀察民俗朕俞其請因念岱宗在望于邁魯郊夙昔所懐今兹可慰歲之冬月輿衞北還抵於泗水東境距其縣治五十里陪尾山之陽衆泉出焉石竇㟏岈清流蕩潏下合沂泗逺波悠然相傳為子在川上處云旁有古寺厥名泉林坡陁幽曠樹木茂密雖古今異時陵谷不改去聖人之居如此其近意者當日杖履所經周覽原泉黙契道體喟然發水哉之歎者其即斯地耶於是停驂弭節瞻眺乆之恍乎如有所得殆移晷而後去也夫天地無終窮流水之出於天地者亦無終窮聖人之道川流敦化萬古不息與天地流水同其無終窮焉其何能已於予懐耶孔子繫易其言天也曰行健言地也曰無疆孟子之言水也曰盈科而後進君子之於聖人之道也溯源窮流學水至海亦若是焉而已矣朕既幸宫牆親覿至止非遙而又喜泉源勝地聖跡所存而得游厯其處也遂為之記幸魯盛典行水金鑑巻八十五
