body:
  text: 行水金鑑卷八十六江南按察使傅澤洪撰運河水冀州夾右碣石入于河禹貢堯所都也碣石海畔山夾此山之右而入河逆上此州帝都不說境界以餘州所至則可知孔氏傳今堯都平陽山西平陽府臨汾縣西南平陽故城是也傳云禹夾行此山之右而入河蓋非是此言貢道非言導水也以故自正義而下凡言治水皆從下為始者皆不之録河自碣石山南渤海之北入海夾挾也自海入河逆流而西右顧碣石如在挾掖也蘇軾尚書解冀州東兖南豫西雍三面臨河夾右者海壖在其左也薛季宣書古文訓冀州無貢貢者諸侯貢天子也唯諸侯有貢故獨載島夷貢道島夷自外至也黃度尚書說他州皆舉山川以為界獨冀不言者帝都不必言觀餘州所至可知亦以見王者無外之意也夾右碣石入于河帝都通漕運之道也九州必有漕運之道以一人統天下之大絲牽繩聨凡所貢賦不可無道以達於帝都也時瀾增修東萊書說此記島夷入貢之道耳餘不必專自碣石入河也觀西傾因桓是來可見不獨西傾雍之浮積石亦然記逺不記近此經文之妙傅寅禹貢集解冀北去帝都逺者自海逆流而西右顧碣石如在挾掖九州貢道皆達河達河則達冀州矣胡士行尚書詳解冀州之域三面距河自積石東北流入于中國則折而南流雍州在其西故曰西河至華隂則折而東流豫州在其南故曰南河至于大伾則又折西北流兖州在其東故曰東河以三州考之則冀州在東河之西南河之北西河之東王制曰自東河至于西河千里而近自恆山至于南河千里而近此則冀州之境界也此篇雖不言冀州之境界而冀州境界亦可以互見餘州之間林之竒尚書全解或問河入海之道曰新安王氏辨之詳矣王氏曰禹貢言夾右碣石入于河此禹河之舊也周定王五年河徙已非禹之故道漢元光三年河徙東郡更淫渤海繼決于瓠子又決于魏之館陶遂分為屯氏河大河在西屯河在東二河相竝而行元帝永光中又決于清河靈鳴犢口則河水分流入于博州屯河始壅塞不通後二年又決于平原則東入齊入青以達于海而下流與漯為一王莽時河遂行漯河夫河不行于大伾之北而道于相魏之南則山澤在河之濱者支川與河相貫者悉皆易位而于禹貢不合故欲辨冀州山川不可不先講求河之故道也陳大猷書傳或問冀州為中土古軒轅陶唐有虞夏后殷人所都及實沈臺駘孤竹之封皆在焉春秋時可考者晉古實沈之虛唐人是因以服事夏商及周成王滅之以封弟叔虞為唐侯至子燮改名曰晉魏霍冀黎書西伯戡黎即此今為黎城縣楊郇或作荀賈沈姒蓐黃帝封臺駘於汾川沈姒蓐黃實守其祀潞赤狄弼鄘衛始封在朝歌邢共凡原雍邘虞檀溫中山鼓肥鮮虞冀北燕韓無終山戎凡三十五國戰國時屬燕趙魏而秦衛亦兼得其地秦並天下置三十六郡此為巨鹿邯鄲上谷漁陽右北平遼西河東上黨太原代郡鴈門雲中三川北境是漢武置十三州此為冀州領郡國九幽州領郡國十並州領郡九後漢魏晉竝因之晉冀州領郡國十三幽州七並州六南北朝土地分裂增置漸多不可勝紀唐承隋制州即是郡貞觀初因山川形便分天下為十道開元中又析為十五道此為河北道之汲郡衛州鄴郡相廣平洺巨鹿邢信都冀趙郡趙常山鎮博陵定河間瀛文安莫饒陽深上谷易范陽幽順義順歸化分順州置歸德燕媯川媯漁陽薊密雲檀北平平栁城營等郡河東道之河東蒲州絳郡絳陜郡陜北境是平陽晉高平澤上黨潞樂平儀陽城沁大寧隰文城慈西河汾太原並昌化石鴈門代定襄欣安邊蔚馬邑朔雲中雲等郡又都畿之河內郡懷州關內道之單于大都護府按以上通典所列信都當全屬兖鄴郡之內黃堯城臨河汲郡之黎陽東境當分屬兖以今輿地言之山西太原平陽汾州潞安大同五府澤遼沁三州河南則懷慶衛輝彰德三府唯衛輝之胙城縣舊在大河之南當屬兖直𨽻則順天永平保定廣平順德五府及真定河間二府之西北境當以漢時漳水故道為界水西屬冀水東屬兖大名府濬縣之西境以宿胥故瀆為界西屬冀東屬兖又新置宣化府舊為萬全都司及故遼東都司之西境以大遼水為界西屬兖東屬青其北則踰塞直抵隂山下西起東受降城之北東訖于大遼水皆古冀州域也冀西距河河自今塞外東受降城南而東至山西大同府廢東勝州界折而南經平虜衛及太原府之河曲保德興縣汾州府之臨縣永寧寧鄉石樓平陽府之永和大寧吉州鄉寧河津榮河臨晉蒲州是為西河與雍分界冀南亦距河河自蒲州過雷首山折而東經芮城平陸垣曲及河南懷慶府之濟源孟縣溫縣武陟衛輝府之獲嘉新鄉汲縣是為南河與豫分界冀東亦以河與兖分界自周定王五年河徙之後禹河故道堙廢而冀兖之界難分今按漢志魏郡鄴縣下云故大河在東句北入海故大河者即王橫所云禹之行河水本隨西山下東北去者也河自汲縣南東北流至黎陽縣西南出大伾上陽三山之間大伾山一名黎陽山今在濬縣東南二里即賈讓所謂東山也枉人山一名善化山在縣西北二十五里俗名上陽三山即賈讓所謂西山也蘇代謂之宿胥之口酈道元謂之宿胥故瀆李垂謂之西河故瀆濬縣舊志云在縣西十里蓋禹迹也河徙由縣東故稱此為西河自此而北歷湯陰安陽鄴縣斥丘東接內黃魏縣至列人斥漳之境左㑹衡漳經所謂北過洚水也應劭曰斥漳縣漳水出治北入河杜佑曰漳水橫流至肥鄉縣界入河斥漳今曲周縣地肥鄉漢列人縣地蓋漳水由二縣境注於河也河自此東北入海及定王時南徙則衡漳東出循河故道而下至東光縣西與大河合王莽時河益徙而南漳水遂專達于海故斥漳以下水經通謂之漳水東北歷平恩曲周巨鹿經縣南宫堂陽扶栁信都昌成西梁桃縣鄡縣下博樂鄉武强武隧武邑東昌弓高阜城樂成建成成平浮陽至章武平舒入海蓋皆禹河之故道也而說經者皆以王莽河為禹河謬矣大河故瀆一名北瀆王莽時穿俗遂稱王莽河以今輿地言之濬縣屬直𨽻大名府湯陰安陽臨漳並屬河南彰德府成安肥鄉曲周並屬直𨽻廣平府平鄉廣宗巨鹿並屬順德府南宫新河冀州並屬真定府東鹿屬保定府深州衡水武邑武强並屬真定府阜城獻縣交河滄州青縣靜海天津並屬河間府皆禹時冀東瀕河之地中流與兖分界王制謂之東河北播為九河其經流爾雅謂之徒駭又同為逆河東至碣石入海後世謂之勃海者也冀東北與青分界處于古傳記無可考今按碣石以西之渤海即禹時逆河也自天津衛直沽口與兖分界又北歷寶坻縣東南折而東歷豐潤灤州樂亭盧龍昌黎縣南昌黎漢絫縣碣石在其地渤海之北岸皆冀域也自此以東則為大海東歷撫寧縣東南又東歷山海關南又東歷遼東寧逺廣寧等衛南是為漢遼西郡地又折而南歷海州衛西南衛在故遼東都司城南一百二十里曰梁房口關大遼水于此入海關在蓋州衛西北九十里海運舟由此入遼河水經注云大遼水出塞外衛白平山亦言出石山東南入塞直遼東之望平縣西屈而西南流徑襄平縣故城西襄平漢遼東郡治明為遼東都司郭下定遼中衛地又南徑遼隊縣故城西又南小遼水注之水出元菟高句麗縣之遼山又東南徑房縣西左㑹白狼水水出右北平白狼縣又東徑安市縣西南入于海漢志望平縣遼水出塞外南至安市入海行千二百五十里明一統志遼河自三萬衛西北入塞南流徑鐵嶺瀋陽都司之西境廣寧之東境又南至海州衛西南入海望平襄平遼隊房縣安市皆漢遼東郡之屬縣而遼水徑其西是知遼西為冀域遼東為青域而碣石以東梁房以西之海則二州共之矣冀之北界亦無可考約略言之當得陰山侯應曰北邊塞至遼東外有隂山東西千餘里是也昔戰國時趙北破林胡樓煩築長城自代竝陰山下至高闕為塞師古曰髙闕山名在朔方之北而置雲中鴈門代郡燕亦築長城自造陽至襄平師古曰造陽地名在上谷界置上谷漁陽右北平遼西遼東郡以距胡燕趙所築長城自雲中以迄遼西延袤可三千里疑即堯時冀州之北界但今之長城未必皆古跡其詳不可得聞耳北之西頭當起東受降城唐景龍二年張仁願築置振武軍元和志云在朔州北三百五十里本漢定襄郡之觱樂縣也武德四年於此置雲州麟德三年置單于大督護府即舜所分並州之西界東頭當抵醫巫閭山即舜所分幽州之東界山在故遼東都司廣寧衛西五里衛東去都司城四百二十里職方氏幽州山鎮曰醫巫閭是也明一統志云舜分冀州東北為幽州即今廣寧以西之地分青東北為營州即今廣寧以東之地秦以幽州為遼西郡營州為遼東郡蓋仍燕之舊以大遼水為限也漢志右北平驪成縣下云大揭石山在縣西南莽曰揭石遼西郡絫縣下云有揭石水南入官謂下官水不言有山也及文穎注武紀曰碣石在遼西絫縣絫縣今罷入臨渝此石著海旁師古曰碣碣然特立之貌頴字叔良南陽人為荆州從事見干寶搜神記即王粲贈詩送聘劉璋者也謂此山臨渝海旁之孤石與班固異自頴始水經有魏晉間人所附益故亦云碣石在臨渝後漢志無驪成劉昭補注遂於臨渝言碣石晉省臨渝入肥如故後魏志碣石在肥如隋省肥如入新昌尋又改新昌曰盧龍故隋志碣石在盧龍自後漢迄隋言此山之所在曰絫縣曰臨渝曰肥如曰盧龍縣名四變而山則一要皆在今昌黎縣東絫縣故城之南也至括地志始云碣石在盧龍縣南二十三里與文頴異唐志及寰宇記則云石城縣有碣石而歐陽忞輿地廣記曰石城故驪成也易祓據之以釋禹貢按石城有四一在今大寧廢衛界漢舊縣屬右北平縣去龍城可百里一在今永平府西北後魏置屬建德郡通典平州西北到石城一百四十里者是此二縣皆不瀕海一在今灤州南唐置屬平州縣北去灤州三十里一即今撫寧縣唐臨渝改曰石城亦屬平州有臨渝關大海碣石山此二縣皆瀕海忞所稱石城故驪成者今之撫寧乎抑灤州之南境乎撫寧本漢臨渝今縣北有臨渝故城為遼西郡之東偏勢不得越令支今遷安絫縣今昌黎肥如今盧龍海陽今灤州而屬右北平也驪成必不在此地嘗試按圖而索之今灤州所領樂亭縣縣在州東南唐初為石城縣地後為盧龍縣地又為馬城縣地金大定末析置樂亭縣有古城在西南三十里似即漢驪成治忞所稱石城蓋指此地非臨渝更名之石城今為撫寧者也然樂亭縣境平衍無山即以州南瀕海之地為驪成地而亦無山唯縣西南四十里有祥雲李家桑坨三島迫近海濵豈即所謂大碣石與通典平州盧龍縣下云有碣石山碣然而立在海旁故名之仍用文頴說金元以來人皆知昌黎為絫縣而碣石在焉求之海旁不得求之水中又不得乃更求之向北之地故明一統志云碣石在昌黎縣北二十里或又以仙人臺上之巨石為天橋柱蓋皆依文頴言之然其山去海八九十里殊違夾右入河之義不可從也欲辨碣石之所在莫若以今所謂灤河者證之灤河即濡水也漢志遼西肥如縣濡水南入海陽師古曰濡音乃官反讀若難後訛為灤以聲相近也遼因置灤州世遂目其水曰灤河不復知為古之濡水矣今碣石雖無其迹而灤河仍自遷安盧龍灤州至樂亭東南入海與酈注濡水入海之道無異則碣石舊在灤口之東可知矣贊水卑耳之溪淪于海中者當亦在樂亭縣西南也山有名同而繫之以大小者如大别小别太華少華太室少室之類是也古書太少與大小通用驪成之山稱大碣石則必有小碣石在蓋即絫縣海旁之石矣酈道元既宗文頴以為碣石在絫縣又引驪成大碣石以證之若以其山為跨二縣之境也者今按濡水從塞外來東南徑令支故城東又南徑孤竹城西又東南徑牧城西分為二水北水枝出世謂之小濡水東徑樂安亭北東南入海濡水東南流徑樂安亭南東與新河故瀆合新河即魏武征踏頓時所開也又東南至絫縣碣石山而南入于海樂安亭者蓋即今樂亭縣東北之樂安故城也東晉於此置樂安縣絫縣在其南驪成在其西據濡水歷亭南而東又東南至碣石則碣石在亭之東南與驪成西南之大碣石相去闊絶安得連為一山郭璞注山海經曰碣石在臨渝或云在驪成蓋兩存之愚謂在臨渝者為是或云漢志其可違乎曰班氏所言間有紕繆西縣之嶓冢氐道之養水武都之東漢水其尤甚者也他如安豐之大别安陸之陪尾尋陽之九江居延之流沙後人皆以為非而不從豈獨一驪成之碣石哉嶓冢漢水承誤數百年至魏收而始正世皆遵用其說文頴以建安時正班固之碣石猶王橫之以新莽時正史遷之禹河也不逺而理無可疑橫說長于遷固即採之地理志云故大河在鄴東叙傳云商竭周移皆橫說也頴說長于固今奚不可用耶山海經曰碣石之山繩水出焉西流注于河此驪成之大碣石也何以知之絫縣之碣石在濡水之東繩水茍出其山勢不得越濡水而西注于河也又有二碣石史記索隱引太康地志云樂浪遂成縣有碣石長城所起通典云秦築長城起自碣石在今高麗舊界非盧龍之碣石北齊文宣帝紀天保四年大破契丹于青山還至營州登碣石山臨滄海唐志營州栁城縣北接契丹有東北鎮醫巫閭祠又東有碣石山此即文宣之所登與前在遂城者皆非禹貢之碣石也劉昭注補郡國志言常山九門縣有碣石山按孔疏引鄭說云戰國策碣石山在九門縣蓋别為碣石不與此同今驗九門無此山也今真定府藳城縣西北二十五里有九門城故縣也四面五百餘里皆平地無一山至若燕昭王所築之碣石宫以事騶衍者史記正義云在幽州薊縣西三十里寧臺之東旁近無此山特取為宫名耳凡言九門薊縣有碣石山者皆妄也史記秦始皇三十二年至碣石使燕人盧生求羡門高誓刻碣石門日知録云始皇刻石之處凡六史記書之甚明於鄒嶧泰山之罘琅邪會稽無不先言立後言刻者惟於碣石則云刻碣石門門自是石不須立也二世元年東行郡縣到碣石漢書武帝元封元年東巡海上至碣石此海濵之山斗入海者封禪書成山斗入海索隱曰謂斗絶曲入海也故成帝時賈讓言禹之治水鑿龍門闢伊闕析底柱破碣石凡山陵當路者毁之蓋伊闕類龍門夾峙兩岸水出其間者也碣石類底柱橫絶中流當河之衝者也析之破之不容已矣但此石猶著海旁不知何年苞淪于海水經曰碣石山在遼西臨渝縣南水中酈注云大禹鑿其石右夾而納河說本賈讓鑿即破也秦始皇漢武帝皆嘗登之海水西侵歲月逾甚而苞其山故言水中矣又云漢司空掾王璜漢書儒林傳琅邪王璜平仲傳古文尚書溝洫志作王橫言往昔天嘗連北風海水溢西南出侵數百里故張君云碣石在海中蓋淪于海水也後漢志注禹貢正義並引張氏地理記張氏不知其名豈即此所稱張君耶程大昌以為張揖按隋經籍志有魏博士張揖撰廣雅二卷而無張氏地理記未審張君是揖否昔燕齊遼曠分置營州今城屆海濵海水北侵城垂淪者半王璜之言信而有徵碣石入海非無證矣又云濡水自樂安亭南與新河故瀆合又東南至絫縣碣石山文頴曰碣石在遼西絫縣絫縣並屬臨渝地理志曰大碣石山在右北平驪成縣西南王莽改曰碣石也漢武帝亦嘗登之以望巨海而勒其石於此今枕海有石如甬道數十里當山頂有大石如柱形往往見之立于巨海之中潮水大至此句下似有闕文及潮波退不動不沒不知深淺世名之天橋柱也今遼東廣寧前屯衛西南七十里有孤山屹立海中高百餘丈周圍三十餘步天橋柱即此類狀若人造要亦非人力所就韋昭亦指此為碣石濡水於此南入海又按管子齊桓公征孤竹至卑耳之溪涉贊水今亦不知所在昔在漢世海水波襄吞食地廣當同碣石苞淪洪波也酈氏三言碣石淪于海有其故有其時有其證有其狀鑿鑿可據如此而世或詆為妄談以自伸其無稽之說不亦傎乎曹孟德詩曰東臨碣石以觀滄海水何淡淡山島竦峙建安十二年征烏桓過此而作濡水注云魏太祖征踏頓與泃口俱導者世謂新河新河會濡水東南至碣石山而南入海則曹公征烏桓時道經碣石可知後魏文成帝太安四年東巡登碣石山望滄海改山名樂遊蓋此山雖淪于海而去北岸不逺猶可揚帆覽勝車駕東巡大軍出塞者率皆登山觀海以修故事道元家酈亭距臨渝才五六百里所謂碣石苞淪洪波者乃以目驗知之而引王璜以為證豈若程泰之生於南宋目不覩溟渤而徒憑古人之一言以恣其臆斷者哉世因程氏之妄而並疑酈氏之真亦惑矣所可恨者此山不知至何時復遭蕩滅今昌黎縣南海中無一山自撫寧以東更二三百里海中亦無一山此酈氏之說所以不信于今也按道元卒于魏孝昌二年嵗在丙午下距齊文宣登碣石之嵗天保四年癸酉凡二十八年而文宣所登乃在營州前此營州未聞有碣石疑是時平州之碣石已亡故假營州臨海之一山為碣石而登之以修故事不然豈有舍此登彼之理自是以後登碣石者無聞焉隋煬帝大業八年親征髙麗三月渡遼水七月班師九月至東都而不聞登碣石唐太宗貞觀十九年親征髙麗大破之九月班師十月丙午次營州而不登碣石蓋以其山非真而高洋之故事不足修耳丙辰入臨渝關戊午次漢武臺刻石紀功水經注云魏氏土地記章武縣東一百里有武帝臺基高六十丈俗云漢武帝東巡海上所築困學紀聞曰九域志滄州有漢武臺唐太宗紀貞觀十九年伐高麗班師次漢武臺刻石紀功臺餘基三成燕齊之士為漢武求仙處今名望海臺在滄州東北一百五十里而不刻碣石則其時無此山可知矣妄意推測碣石之亡當在魏齊之世丙午至癸酉二十八年間也宋儒不加考核而沿襲舊聞謂在平州南海中去岸五百餘里宋時平灤二州陷于契丹唯據滄州地望言之故云然非謂去北岸五百餘里也豈知曩立于巨海之中者後併化為波濤也哉近世有郭造卿著碣石叢談以昌黎縣北十里仙人臺當之曰臺即碣石之頂也絶壁萬仞上凌霄漢其臺崇廣頂有巨石為天橋柱人莫能至夫天橋柱者酈氏明言在海中其又可移之平陸邪劒去逺矣而鍥舟以求之非大愚不至此也言有似是而非者為害最甚如經云太行恆山至于碣石說者謂碣石與二山並舉則必髙大相敵故以昌黎縣北之山為碣石昌黎本漢絫縣後漢省入臨渝晉以後為肥如縣地隋唐為盧龍縣地後僑置營州栁城縣遼改縣曰廣寧金又改曰昌黎而其實不然經云砥柱析城至于王屋今底柱見在其能與析城王屋爭雄乎觀底柱則碣石可知矣不信海中之碣石而以昌黎縣北之山為碣石則亦將不信河中之底柱而以陽城縣南之山為底柱陽城縣在山西澤州西八十里近志縣南有底柱山而傳記無之與昌黎縣北之碣石正是一類然底柱無異論而碣石多枝辭何也一在一亡故也善言禹貢者當憑古記以推尋不可以在亡為疑信海中之碣石水經注具有明文若昌黎縣北離海數十里之碣石孰言之而孰傳之邪蘇秦說燕曰南有碣石國人必皆識其處秦之滅燕未久也始皇豈誤刻漢之去秦亦未久也武帝豈誤遊曹孟德魏文成相望在數百年間也豈皆誤登道元北人家又近碣石其本朝故事亦必熟諳豈誤認海中一山為先帝之所幸而改名如其誤也必别有一處為秦漢諸君之古跡號曰碣石者而它書絶無聞焉舍道元之所說將安據乎世之言禹貢者抱攣拘之識廢昭曠之觀謂碣石無亡理而必求見在之山以實之斥古記為荒唐奉近志為典要吾末如之何也巳矣周希聖謂天子之都必求其舟楫之所可知使夫諸侯之朝貢商賈之貿易雖其地甚逺而其輸甚易此說得之冀州三面距河是其設都之意實有取于轉輸之利朝貢之便也禹貢所載上言田賦貢篚之事而于下言所由以達帝都之道其始末曲折莫不具備而皆以河為主蓋達于河則達于帝都故也傳以為禹治一州之水既畢遂還帝都白所治非也禹欲白所治不必身入帝都即使身入帝都亦何難于陸行而必循各州紆回之水道以廢時失事哉鄭康成謂治水既畢更復行之觀地肥瘠定貢賦上下如此則不當叙于田賦貢篚之後王肅謂功主于治水故詳記各州往還乘涉之水名今按所載皆達河之道非有往還乘涉之事諸說皆不可通至周氏之言出而其義始定此實後人勝前人處謂今必不古若者曲士之見也禹貢錐指行水金鑑卷八十六
