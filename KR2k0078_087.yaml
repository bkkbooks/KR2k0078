body:
  text: 行水金鑑卷八十七江南按察使傅澤洪撰運河水濟河惟兖州浮于濟漯達于河禹貢東南據濟西北距河濟漯兩水名因水入水曰達孔氏傳濟河惟兖州以濟水河水之間為兖州也鄭樵書辨訛浮水運也兖州朝貢之道或浮于濟或浮于漯以入于河而達冀州不言冀州舉河而冀州可知矣書古文訓舟行水曰浮漯者河之支流也兖之貢浮濟浮漯以達于河蔡沈書傳濟自菏又東北㑹于汶又北東入于海此兖之東南與豫徐青分界處河自大伾北過洚水至于大陸又北播為九河同為逆河入于海此兖之西北與冀分界處兖州有古帝顓頊之虚杜預曰東郡􅗛陽縣古帝顓頊之虚故曰帝丘鬲觀有窮昆吾韋固之封皆在焉春秋時可考者衞文公遷于楚丘成公又遷于帝丘郕胙燕南燕姞姓凡四國戰國時為衞魏宋齊趙五國地秦幷天下置東郡碭郡東北境是齊郡北境是鉅鹿上谷二郡東境是漢復置兖州領郡國八後漢魏晉竝因之唐為河南道之靈昌滑州濮陽濮濟陽濟東平鄆等郡河北道之清河貝州魏郡魏博平博平原德樂安棣景城滄等郡按以上通典所列有當往屬者東平之須昌鉅野宿城及夀張之東境此為東原大野之地須昌宿城夀張三縣故城並在今東平州界鉅野故城在今鉅野縣西魯郡之任城龔丘任城今為濟寧州及嘉祥縣之東境龔丘今為寧陽縣並在古濟水東改屬徐濟陰之南華在菏澤西今為東明縣靈昌之匡城在南華西今為長垣縣改屬豫濟陽之長清今属濟南府及東阿之東境今東阿縣是平隂之北境改屬青其南境改屬徐也平隂側岱跨南北故分属青徐又有當來屬者冀域信都郡及鄴郡之内黄堯城臨河内黄堯城二縣故城並在今内黄縣界臨河故城在今滑縣北汲郡之黎陽東境其豫域則濟隂之乘氏也乘氏在菏澤東今為曹州以今輿地言之河南衛輝府之胙城縣胙城本在河南自金明昌五年河徙出縣南而縣始為河北地直隸大名府唯濬縣之西境當属冀長垣東明二縣當属豫及真定河間二府之東南境當以漢時漳水故道為界東南属兖西北属冀山東則東昌府其兖州府則曹州陽榖夀張鄆城濟南青州二府則西北境當以漢時濟水故道為界西北属兖東南属豫徐青皆古兖州域也東南據濟與豫分界當自兖州府之曹州始何以知之按導水濟入河溢為滎東出于陶丘北又東至于菏菏澤在今定陶縣境經繫諸豫雷夏在今曹州境經繫諸兖故知二澤之間為兖豫之界也濟水至曹州西分為二一水東南流為菏水一水東北流入鉅野澤為濟瀆春秋僖公三十一年取濟西田左傳云分曹地自洮以南東傅于濟酈道元云濟水自是東北流出巨澤即此地也濟水又北過東昌府之濮州范縣東與徐分界又北為陽榖茌平東與青分界轉東為濟南府之齊河濟陽齊東青城又東為青州府之高苑博興樂安樂安縣東北一百十里有琅槐故城漢属千乘郡古濟水入海處也南與青分界今歴城以東有小清河即濟水入海之故道其北為兖南為青也西北距河與冀分界河自今河南衛輝府胙城縣北東至直隸大名府濬縣大伾山西折而北經河南彰德府界中又東北經直隸廣平順德真定河間四府界中東入于海此禹河之故道曲周以下即漢時漳水之所行也九河濟漯入海竝在兖東徒駭最北八枝次之漯在鬲津之南濟又在漯之南其所入皆勃海也自天津衛直沽口與冀分界南歴静海縣東又南歴滄州東又南歴霑化利津蒲臺縣東折而東歴樂安縣北以小清河入海處與青分界漢志東郡東武陽縣下云禹治漯水東北至千乘入海東武陽即今朝城縣應劭曰在武水之陽酈道元曰漯水亦或武水也其故城在今縣西千乘縣為千乘郡治後漢始改郡為樂安國疏引班志不當加樂安二字又平原郡髙唐縣下云桑欽言漯水所出今按禹引河自大伾山西折而北循大陸東畔入海而漯首受河自黎陽宿胥口始不起東武陽也水經注所叙河水自宿胥口又東右逕滑臺城故白馬縣治在今滑縣西南又東北逕黎陽縣南黎陽故城在今濬縣東北又東北逕凉城縣在今滑縣東北又東北逕伍子胥廟南廟在晉頓丘郡界今清豐縣之西境是又東北為長夀津河之故瀆出焉津在凉城廢縣東北六十里河水又東逕鐵丘南元和志鐵丘在滑州衛南縣東南十里衛南本漢濮陽縣地丘今在開州之西南又東北逕濮陽縣北開州西南二十里有濮陽故城又東北逕衛國縣南縣故畔觀也其故城在今觀城縣西清豐之南境開州之北境皆得其地又東逕鄄城縣北今濮州東二十里有鄄縣故城唐濮州治也又東北逕范縣之秦亭西春秋書築臺於秦者也今范縣東南二十里有范縣故城又東北逕委粟津寰宇記觀城縣東南六十七里有委粟城蓋與津相近皆古漯水也自周定王五年河徙從宿胥口東行漯川至長夀津始與漯别其津以西漯水之故道悉為河所占而上游較短矣然河之故瀆不經東武陽亦不經高唐迨漢成帝建始末河決館陶属魏郡由東武陽絶漯水而東北至髙唐又絶漯水東北至千乘入海雖嘗塞治而故道猶存王莽始建國三年復決于此莽為元城冢墓計不隄塞明帝永平中王景修之遂為大河之經流自是委粟津以西漯水之故道又為河所占上游益短矣漯水一出于武陽再出于髙唐據成帝後言之耳水經注委粟津河北即東武陽也漯水出焉河自此與漯别東北逕東阿茌平等縣至千乗入海水上承河水於武陽縣東南而北逕武陽新城東引水自東門石竇北注于堂池水帀隍塹于城東北合為一瀆東北出郭逕陽平縣之岡城西陽平故城今為莘縣治岡城在縣西南七里通典莘縣漢陽平縣地有武陽城無此水矣元和志武河在朝城縣東十步盖即漯水也新志云故流今湮惟縣城西門外少南三里許有大坡廣十餘里其勢突城而東與陽榖縣西大陂連夏秋積潦幷成巨浸相傳為古漯河滙流處又北絶莘道城之西北今莘縣西十三里有莘亭故城又東北逕樂平縣故城東本漢清縣後漢改名樂平其故城在今堂邑縣東南三十里又北逕聊城縣故城西城在今聊城縣西十五里又東北逕清河縣故城北城在今清平縣南清平本漢貝丘縣其西南有貝丘故城又東北逕文鄉城東南城亦在清平縣南又東北逕博平縣故城南城在今博平縣西北三十里右與黄溝合溝承聊城郭水東北出逕清河城南又東北逕攝城北春秋所謂聊攝以東也又東逕文鄉城又東北出於高唐縣東至漯水又東北逕援縣故城西杜預釋地曰濟南祝阿縣西北有援城今在禹城縣西南漢志作瑗又逕髙唐縣故城東左傳哀公十年趙鞅帥師伐齊取黎及轅毁髙唐之郭杜預曰轅即援也祝阿縣西北有高唐城今在禹城縣西四十里禹城本漢祝阿縣桑欽地理志曰漯水出高唐余按穆天子傳稱丁卯天子自五鹿東征釣于漯水以祭淑人丁已天子東征食馬于漯水之上尋其沿歴逕趣不得近出髙唐桑氏所言蓋津流出次于所間去聲也俗以是水上承于河亦謂之源河矣源河乃漯之再出者桑欽唯知此而不知起東武陽則疎矣河既與漯合復分為二漯由漯隂故城北河由平原故城東蓋自高唐以西至武陽河在南而漯在北自高唐以東至海則漯在南而河在北矣今禹城縣南有源陽故城唐縣在源河之北故名漯水又東北逕漯隂縣故城北伏琛謂之漯陽城地理風俗記曰平原漯隂縣今巨漯亭是也按臨邑縣西有漯隂故城元和志漯水北去臨邑縣七里又東北逕著縣故城南城在今濟陽縣西南著竹庶反又東北逕崔氏城北城在今章丘縣西北又東北逕東朝陽故城南城亦在章丘西北又東逕漢徵君伏生墓南碑碣尚存又東逕鄒平縣故城北城在今鄒平縣北與齊東縣接界又東北逕東鄒城北今青城縣界有東鄒故縣又東北逕建信縣故城北應劭曰在臨濟縣西北五十里今在髙苑縣西北又東北逕千乘縣二城間伏琛云千乘城在齊城西北一百五十里隔會水即漯之别名也元和志千乘故城在淄州高苑縣北二十五里又東北為馬常坈盖亦在千乗縣界玉篇坈音而勇切地名今按下文里數則坈乃澱泊之𩔖坈東西八十里南北三十里亂河枝流而入于海河水注云河水自千乘北城北又東分為二水枝津東逕甲下城南東南歴馬常坈注濟濟水注云濟水自甲下邑南東歴琅槐故城北又東北河水枝津注之盖即漯之所亂者此自西漢末以迄後魏漯川之原委也以今輿地言之濬縣滑縣開州清豐並属直隸大名府觀城濮州范縣朝城莘縣堂邑聊城清平博平並属山東東昌府禹城臨邑濟陽章丘鄒平齊東青城並属濟南府高苑属青州府諸州縣界中皆古漯水之所經自宋世河決商胡朝城流絶而舊迹之存者鮮矣濟漯二水為東南四州貢道之所必由非獨兖也青承兖曰達于濟則由濟入漯可知矣徐承青曰達于菏則由菏入濟可知矣揚承徐曰達于淮泗則由淮入泗由泗入菏可知矣淮通泗泗通菏菏通濟濟通漯漯通河四州之貢道無不由濟者而總與陶丘滎澤之間無涉此其所以不言逾也禹時濟實通漯林少穎云案經文無濟漯相通之道非也但孔疏云從漯入濟自濟入河則必有舍舟行陸之事是為大謬耳周希聖更定其文曰由濟而入漯由漯而入河經㫖灼然矣近惟朱長孺深知此意其所著禹貢長箋曰古時濟漯通流漢以後遂不相屬孔疏與經文所次水道不合當是從濟入漯從漯入河鄭端簡亦云舊作二道者非是此適與周氏闇合也新唐書許敬宗傳云高宗東封泰山次濮陽問書稱浮于濟漯今濟與漯斷不相屬何故敬宗對曰沇濟自温入河伏地南出為滎澤又伏而出曹濮之間汶水從入之故書又言浮汶達濟不言合漯者漯自東武陽至千乗入海也或據此以駮濟與漯通之說余曰濟漯本相附近迨西漢末河行濟漯之間高唐以西至東武陽二水為河所隔唐世猶然故高宗謂濟漯斷不相屬敬宗不知古今水道之變遷而憑臆以對殊失經㫖未可以證禹貢也然則濟與漯通當在何處曰是不可知按水經鄧里渠與將渠合北逕茌平縣東臨邑縣故城西北流入于河河水又東北逕四瀆津注云河水東分濟亦曰濟水受河也水經注濟或作泲又因泲而訛為沛今悉改從濟自河入濟自濟入淮自淮達江水徑周通故有四瀆之名蓋其時濟漯之間為河所隔故云河分濟又云濟受河在禹時則固漯分濟或濟受漯也漢臨邑縣在今茌平縣東通典漢臨邑故城在盧縣東按今長清縣西南二十五里有盧縣故城西與茌平接界漢臨邑當在此間今臨邑本漢漯隂縣劉宋僑置臨邑非漢縣也四瀆津在臨邑故城東北寰宇記四口故闗在聊城縣東八十里一名四瀆口當為古濟漯通波處此亦不敢定以為是然濟與漯通必在㑹汶之後又北將東之際而臨邑適當其地東北接高唐故城為漯之所經枝津徑通理無可疑黄文叔云或浮濟或浮漯而皆逹于河愚謂兖之北境可徑浮漯以達河而其南境則必由濟入漯也準此以推則青之汶徐之淮揚之江海荆之江沱潛漢雍之龍門雖並列于經而或由或不由各隨其便唯豫之洛梁之潛沔渭為道所必由耳禹貢錐指海岱惟青州浮于汶達于濟禹貢岱岱宗也青州貢道由汶入濟濟固達于河矣書古文訓里岱宗即㤗山也山東通志云㤗山在㤗安州北五為東嶽岱宗其山周廻一百六十里屈曲盤道百餘徑南天門東西三天門至絶頂高四十餘里上有石表巍然俗云秦時無字碑有碧霞祠東岳廟封禪壇其峰曰日觀曰秦觀曰越觀曰丈人曰獨秀曰雞籠曰老鴉曰獅子曰蓮花曰懸石其崖曰百丈曰捨身曰馬棚曰鵓鴿其峪曰石經曰石壁曰佛寺曰鬼兒曰椒子曰酆都曰桃花曰馬蹄曰谿里其嶺曰廻馬曰鴈飛曰黄峴曰思鄉曰青峯曰西横其石曰牛心曰龍口曰試劒曰龍紋曰虎阜其洞曰迎陽曰吕公曰白雲曰遥觀曰蝙蝠曰鬼仙曰山亷其池曰玉女曰王母曰白鶴曰白龍又岳頂有東西神霄山岳隂有孤山襁山鶴山相去俱十里雖山各異名皆㤗岳之峯巒也日觀者雞一鳴時見日始欲出長三丈秦觀者望見長安越觀者望見㑹稽亭亭云云梁父徂徠諸山俱在㤗嶽東南即所謂導沇水東流為濟東至于菏又東北㑹于汶是也謂此州將欲達于帝都當浮于汶以達于濟然後由濟以達于河也尚書全解汶水五源皆出襲慶奉符縣界至東平中都縣貫鉅澤入濟青州貢道由汶入濟由濟入河不言河兖已見也尚書說地理志云汶水出泰山萊蕪縣原山西南入濟易氏云唐兖州乾封縣本漢泰山郡博縣後改為襲慶府奉符縣汶水出縣東北原山蓋博與萊蕪皆在兖州之西南故汶水所出之原山介兩邑間又有北汶嬴汶柴汶牟汶述征記云泰山郡水皆名汶今縣界有五汶皆源别而流同其原山之汶水西南流經乾封縣治南去縣三里又西南流九十里入鄆州中都縣孔子為中都宰之地自濟之上流既絶故汶水入大野陂而不入濟尚書纂傳川原山在今萊蕪縣東五十里連淄縣界今名岳陽山淄水出其隂汶水出其陽見一統志孔疏曰堯時青州越海而有遼東舜分青州為營州即遼東也漢公孫度據遼東自號青州刺史矣書纂言按成王賜太公履曰東至于海季札聞齊音曰表東海者其太公乎齊湣王謂張儀曰齊僻陋隠居東海之上是東據海也而傳兼言北楚子謂齊侯曰君處北海蘇秦說齊王曰北有渤海蓋自今成山以至樂安者是也故云東北據海然自朝鮮以至日照皆青也所遺多矣專言東則固可該琅邪與朝鮮也地理志岱山在㤗山郡博縣西北今山東濟南府㤗安州東南有博縣故城山在州北五里於故城為西北也公羊傳曰越在岱隂齊蘇秦說齊王曰南有㤗山史記曰㤗山之陽則魯其隂則齊岱主南言與徐分界也而傳兼言西則岱不足以表其界蓋青西以濟為兖界齊語正封疆西至于濟其眀徵也北自琅槐以西亦以濟為兖界故王莽改漢齊郡曰濟南而經不言濟者蒙兖濟河之文從可知也傳兼言西則欲密而反疎甚矣說經之難也周禮正東曰青州其疆域與禹貢大異鄭注云青州則徐州地也蓋以其山鎮曰沂山其川淮泗其浸沂沭知之經曰海岱及淮惟徐州又曰淮沂其乂又曰浮于淮泗是知徐幷于青也賈疏云周之青州於禹貢侵豫州之地蓋以其澤藪曰望諸知之望諸即孟豬經于豫州曰導菏澤被孟豬是知侵豫之地也疏又云周時幽州南侵徐州之地蓋以其澤藪曰豯養知之地理志琅邪長廣縣西有奚養澤琅邪郡屬徐州是知侵徐之地也渭按長廣故城在今登州府萊陽縣東漢屬徐州實古青州域幽之所侵乃青地非徐地也不但此也其川河洓其浸菑時皆青地為幽所侵而賈不言何其疎也蓋今青登萊三府之地在青域者周時皆割入幽其西又為兖所侵而損豫之東南境以益之徐則岱山大野皆入于兖是青亦不全得齊也鄭云青州即徐州亦言其大畧而已青州有古爽鳩氏之虗為季崱有逢伯陵蒲姑氏之所因及斟灌斟尋寒過之封皆在焉春秋時可考者齊紀譚州夷介萊凡七國戰國時為齊燕二國地秦幷天下置齊郡琅邪東境是遼東漢復置青州領郡國六後漢魏並因之領郡國五晉分置平州青州領郡國六平州領郡國五後改曰幽州唐為河南道之北海青州濟南齊淄川淄高密宻東萊萊東牟登等郡河北道之安東都䕶府按以上通典所列髙密之莒縣及諸城之南境當往屬徐又有當來屬者兖域濟陽之盧縣及東阿之東境後漢榖城縣地在濟東者即今東阿縣平隂之北境徐域魯郡乾封萊蕪之北境是也以今輿地言之山東登州萊州二府其青州府則益都臨淄昌樂安丘夀光臨胊及諸城高苑博興樂安之南境濟南府則肥城長清歴城章丘鄒平長山新城淄川及㤗安萊蕪之北境兖州府則唯東阿及平隂之北境三府之地南以齊長城故址與徐分界西及北以漢時濟水故道與兖分界其東北跨海為故遼東都司之東境及朝鮮國皆古青州域也青之東境登萊二府之地斗入大海中東西長八九百里形如吐舌史記徐世家云齊自㤗山屬之琅邪北被于海膏壤二千里蓋幷登萊計之也海水自日照縣東與徐分界日照本漢海曲縣属琅邪郡今属青州府莒州北歴諸城縣東折而東北歴膠州即墨萊陽棲霞文登諸縣南又東北出而西折歴寧海州及福山蓬萊二縣北蓬萊登州府治海在府城北五里北與遼東相望自新開海口而東北抵遼東金州衛南之旅順口三百里而近有沙門砣磯鐵山諸島可以泊舟避風一帆徑度亦不甚險漢書元封二年遣樓船將軍楊僕從齊浮勃海擊朝鮮元和志大人故城在登州黄縣北二十里司馬宣王伐遼東造此城運糧船從此入今新羅百濟往還常由于此又西歴招逺登州府掖縣昌邑濰縣俱萊州府北與兖分界青西及北以濟為界鄭漁仲云不言濟者以兖州見之也按水經注濟水自臨邑過平隂盧縣歴城臺縣梁鄒臨濟安平樂安利縣至琅槐入海以今輿地言之平隂長清齊河歴城界中之大清河及章丘鄒平常山新城高苑博興樂安界中之小清河即漢時濟水㑹汶入海之故道古青兖分界處也青之東北界無可考疏云越海而有遼東之地恐未盡通典云青州之界東跨海從岱山東歴密州東北經海曲萊州越海分遼東樂浪三韓之地西抵遼水此說近是然三韓地太逺而𤣥莬不可遺竊疑漢武所開二郡皆古嵎夷之地在青州之域者而三韓不與焉蓋嵎夷羲和之所宅朝鮮箕子之所封不應在化外先儒但云有遼東非也漢書言東夷天性柔順異于三方之外故孔子悼道不行設浮于海欲居九夷後漢書言東夷率皆土著喜飲酒歌舞或冠弁衣錦噐用爼豆所謂中國失禮求之四夷者也觀其土俗則青之東北界不止于遼東明矣史記秦始皇本紀云地東至海暨朝鮮北據河為塞竝隂山至遼東朝鮮列傳云自始全燕時略屬真番朝鮮為置吏築鄣塞秦滅燕屬遼東外徼燕秦之所經畧蓋禹貢嵎夷之地唐一行所謂北戒山河抵恒山之右乃東循塞垣至濊貊朝鮮以限戎狄者是也星傳謂北戒為胡門明遼東都指揮使司兼轄漢遼東西二郡之地都司城西四百二十里為廣寧衛本遼東無慮縣也衛西幽州域衛東營州域都司城東至鴨緑江五百六十里與髙麗分水太康地志云樂浪遂城縣有碣石長城所起通典云在今高麗舊界盖即䝉恬所築起臨洮至遼東者也東漢以來故阯湮没都司城北至三萬衛三百三十里古肅慎氏地衛西有開元城金置會寧府號為上京禹貢青州之北界當極于此衛東北距長白山千餘里其水北流為混同江南流為鴨緑江唐書東夷傳云高麗馬訾水出韎􅞘之白山色若鴨頭即此江也都司城南至旅順海口七百三十里去登州不逺順風揚帆信宿可達明初遼東士子附山東鄉試後以渡海之艱改附順天猶周之幷營于幽也按此經䝉兖之文曰達于濟則由漯以入河可知矣其東北境徑浮濟不必從汶也水經注汶水出泰山萊蕪縣原山萊蕪縣在齊城西南原山又在縣西南六十許里從征記曰汶水出縣西南流自入萊蕪谷夾路連山數百里水隍多行石澗中按原山在今萊蕪縣東北七十里東接益都西接章丘北接淄川縣界高聳出群山之上亦名馬耳山魏収志嬴縣有馬耳山汶水出是馬耳即原山矣今又名岳陽山西南逕嬴縣故城南城在今萊蕪縣西北又東南逕奉高縣北今泰安州東有奉高廢縣屈從縣西南流與一水合俗謂之牟汶水出牟縣故城西南阜下俗謂之胡盧堆西南逕奉高縣故城而西南流注於汶今萊蕪縣東有牟縣故城牟汶水在縣南門外西流至㤗安州東入汶又南右合北汶水出分水谿東南流逕㤗山東合天門下谿水又東南流逕南明堂下昔漢武令奉高作明堂引水為壁雍世謂之石汶又左入于汶水今㤗安州南有泮水出㤗山分水嶺考其源流蓋即北汶也又西南逕徂徠山西山在州東南四十里又南逕博縣故城東城在州東南漢置唐改曰乾封又西南逕龍鄉故城南又西南逕亭亭山山在州南三十里又南左㑹淄水世謂之柴汶水出㤗山梁父縣東西南流逕莬裘城北又逕梁父故城南又西南逕柴縣故城北又逕成邑北春秋齊師圍成成人伐齊飲馬于斯水者也淄水又西逕陽關城南西流注于汶水今按州南有廢柴縣梁父故城西南有陽關城柴汶水在州東三十五里俗名司馬河又南逕鉅平縣故城東城在州西南又西南逕魯國汶陽縣北又西逕汶陽縣故城北城在今寧陽縣東北又西洸水出焉吕忱曰洸水出東平上承汶水於岡縣西闡亭東爾雅汶别為闡其猶洛之有波矣洸水西南流逕乘丘縣故城東又東南注于洙水按乘丘故城在今滋陽縣西北又西逕蛇丘縣南今肥城縣南有蛇丘故城本魯蛇淵囿漢置縣又西南逕岡縣北縣本魯闡邑在今寧陽縣境又西南逕東平章縣南今東平州東有章縣故城又西南逕桃鄉縣故城西城在今汶上縣東北四十里又西南逕夀張縣北夀張本夀良後漢光武更名又西南至安民亭入于濟今州西南十里安山鎮即故安民亭汶水自桃鄉四分當其派别之處謂之四汶口即今戴村􅄵地其左二水雙流西南至無鹽縣之郈鄉城南又西南逕東平陸故城北又西逕危山南世謂之龍山又西合為一水西南入茂都澱即今南旺湖次一汶西逕郈亭北又西至夀張故城東遂為澤渚其右一汶西流逕無鹽縣故城城在今東平州東又西逕洽鄉城南又西南逕夀張縣故城北城在州西南又西入于濟以今輿地言之汶水自萊蕪歴㤗安肥城寧陽至東平以濟合流以至于海此禹迹也迨元人引汶絶濟為㑹通河明永樂中又築戴村壩遏汶水盡出南旺以資運而安山入濟之故道填淤久矣元和志乾封縣界有五汶源别而流同五汶者曰北汶嬴汶柴汶牟汶其一則經流也四汶口乃下流岐分處不在五汶之數按酈注無嬴汶嬴汶在今萊蕪縣南三十里源出宫山之陰流合牟汶宫山者新甫之别名也山在新泰縣西北泮水源出泰山分水嶺即北汶州志謂之塹汶在今㤗安州南五汶之外有小汶在州東南七十里源出宫山流逕徂徠山南又西入汶水所謂大汶口也嬴汶流合牟汶故酈注不言五汶以小易嬴斯為當矣又有水出萊蕪縣寨子村流合牟汶者近志指為浯汶據漢志琅邪靈門縣有高䂞山浯水所出東北入濰說文云水出靈門山世謂之浯汶浯水合東汶入濰故有此名在今莒州界與萊蕪無涉志妄言耳東汶出朱虚縣小㤗山北流至淳于縣入濰在今臨胊安丘界淮南子曰汶出弗其西流入濟高誘云弗其山名在朱虚縣東是即入濰之東汶言入濟者淮南之誤也曾彦和曰汶水有二出萊蕪縣原山入濟者徐州之汶也出朱虚縣㤗山入濰者青州之汶也渭按原山北接淄川延袤跨青徐之境汶雖徐水其導源處猶為青域故青之貢道書浮于汶云禹貢錐指行水金鑑巻八十七
