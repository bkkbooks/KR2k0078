body:
  text: 行水金鑑卷八十八江南按察使傅澤洪撰運河水海岱及淮惟徐州浮于淮泗達于河禹貢依河字應作菏許氏説文東至海北至岱南及淮孔氏傳一州之境必有四面之至兖青揚荆豫梁雍皆載二面而徐州則載三面與諸州異者不得不然若言海岱則嫌于青州若言淮海則嫌于揚州故必曰海岱及淮然後可以别其為徐州之界然徐州雖言三面而其四境猶互見他州案爾雅曰濟東曰徐州是徐州之西境而水之所經也雖不言濟而濟在徐州東蓋可得而考尚書全解菏謂菏澤説文菏字下云禹貢浮于淮泗達于菏從水苛聲徐鉉音古俄切隸從草作菏俗遂訛為荷又訛為河也許慎時經猶作菏而史記漢書並作河蓋後人傳寫之誤濟水瀦為菏澤此經蒙青之文曰達于菏則由濟入漯可知矣兖青徐揚四州貢道相因河行乎兖而合兖一境言之其地必有逺河者故隨其便于濟漯則使浮之以達于河故兖貢曰浮于濟漯達于河也青之浮汶入濟蓋期至河而非以至濟也經書青貢止曰達濟而不竟之於河者達濟則河自可徑不待復書也揚之道可沿江海以達淮泗而徐貢兼有淮泗亦可達濟然經于徐貢既越濟不書而又泗上更得一水乃可因濟而求達于河經之越濟其例既異他州而泗又無經達大河之道則水道又不可曉故臣久求詳考始知泗之北濟之南有菏水者自定陶而下經昌邑金鄉東緡魚臺四邑而與泗水合是水也班固以為河水許叔重以為菏水菏河古字應通然後知徐貢之書達河也非以越濟也正因菏以達也夫唯有菏以為達濟之因則江海淮泗菏濟自南而北交相灌注水道既不闕絶而經文書例巳書者更不再書通此經一例也禹貢山川地理圗説自程氏是調停之説總不離自江至海自海至淮淮至菏自菏至濟自濟至河也還當依説文爾雅濟東曰徐州郭注云自濟東至海似為禹貢徐州之舊域然堯時揚州之境跨江北至淮而爾雅云江南曰揚州蓋殷割淮南江北之地以益徐視堯時之徐則大矣周禮正東曰青州禹貢徐州之山水皆在焉蓋以徐為青青地大半入幽而徐之西則又入于兖云吕氏春秋泗上曰徐州鄭漁仲釋之曰泗水出陪尾山至下邳入淮源委皆在徐州非若淮之與揚共濟之與兖共也故不韋亦得以為説焉徐州有古大庭少皥之虛左傳梓慎登大庭氏之庫注云大庭古國名在魯城內或曰大庭即炎帝也劉楨魯都賦云戢武器於有炎之庫有緡大彭奄邳之封皆在焉春秋時可考者魯滕茅薛徐邾莒蕭郯遂任宿須句顓臾鄫鄅陽鄣郳後為小邾向極牟鑄鄟邿逼陽根牟鍾吾甲父凡二十九國戰國時屬魯而宋齊楚亦兼得其地秦並天下置泗水琅邪西境是薛郡漢改置東海郡復以其地為徐州領郡國四後漢魏晉並因之魏晉領郡國七唐為河南道之彭城徐州臨淮泗魯郡兖東海海琅邪沂等郡按以上通典所列唯魯郡乾封萊蕪之北境當往屬青其當來屬者兖域東平之須昌巨野宿城及夀張之東境濟陽平隂之南境青域高密之莒縣及諸城之南境是也以今輿地言之江南徐州及鳳陽府之懷逺五河虹縣泗州宿州靈璧淮安府之桃源清河安東邳州宿遷睢寧海州贑榆山東兖州府則滋陽曲阜寧陽鄒縣泗水滕縣嶧縣金鄉魚臺濟寧嘉祥巨野東平汶上沂州郯城費縣及平隂南境濟南府則新泰及泰安萊蕪南境青州府則蒙隂沂水莒州日照及諸城南境皆古徐州域海自江南山陽縣東折而西北為淮水入海之口其北岸則安東縣也是為徐域海自縣東而北歷海州東中有鬱林山亦名鬱洲北齊置東海縣元和志云本漢贑榆縣地俗謂之鬱州亦謂之田橫島又北歷贑榆縣東又東北歷山東日照縣東又東北歷諸城縣東至琅邪臺過此則為青域徐北至岱岱西南為東平南為泰安所謂汶陽之田也東南為萊蕪新泰沂州莒州諸城皆以長城故址與青分界淮水今自鳳陽府夀州界東流經懷逺五河泗州南又東北經淮安府清河縣南與黃河合又東經安東縣南而東北入于海中流與揚分界故曰南及淮也岱濟之間與兖分界蓋在東平汶上巨野之西濟淮之間與豫分界蓋在金鄉碭山宿州懷逺之西金氏曰達於河古文尚書作菏説文亦作菏蓋菏澤與濟水相通而泗水上可通菏下可通淮徐州浮淮入泗自泗達菏也渭謂菏澤在今定陶縣東北金説固明而程氏云濟水瀦為菏澤此經蒙青之文曰達于菏則由濟入漯其説更明徐東北境可浮沂泗以達濟不必從淮其西北境亦可浮汶以達濟不必從泗也兖青徐揚四州之貢道前後相承不復不亂汶與濟連故青曰浮于汶達于濟徐揚道由淮泗從泗入濟必由菏澤故書曰達于菏若作河則復而無理河漯青且不言矣而徐復云逹于河陵亂失次禹貢必無此書法而人猶謂作河為是者總由不知菏澤之原委耳水經注泗水出魯卞縣故城東南桃墟西北左傳昭七年以孟氏成邑與晉而遷於桃杜預曰魯國卞縣東南有桃虛也墟有澤方十五里澤西際阜俗謂之媯亭山西北連岡四十餘里岡之西際便得泗水之源博物志曰泗水陪尾蓋斯阜者矣石穴吐水五泉俱導穴各徑尺元和志泗水出泗水縣東陪尾山其源有四四泉俱導因以為名今兖州府泗水縣東五十里有陪尾山又西徑其縣故城西城在今泗水縣五十里縣志云陪尾山下有泗水神祠祠前有泉林寺寺之左右皆深林茂樹有大泉十數渟泓澄徹互相灌輸會而成溪是為泗水南經卞城東有橋曰卞橋自卞橋西至縣城復有大泉數十南北交會入于泗水以達曲阜大抵縣境數十里內泉如星列皆泗水也又西南徑魯縣北分為二今曲阜縣治即魯故城北為洙瀆春秋莊公九年浚洙杜預曰洙水在魯城北音殊南則泗水洙泗之間即夫子領徒之所從征記曰闕里有四門其北門去洙水百餘步今泗水南有夫子冢泗水又南徑魯城西南合沂水水出魯城東南尼邱山西北平地發泉流徑魯縣故城南水北對稷門亦曰雩門門南隔水有雩壇曾點所欲風舞處也又西徑瑕丘縣東瑕丘魯邑即負瑕今滋陽縣西有瑕丘故城元和志瑕丘縣泗水東自曲阜縣界流入與洙水合屈從縣東南流徑平陽縣故城西縣即山陽郡之南平陽縣也故城在今鄒縣西又南徑高平縣故城西洸水注之泗水南徑高平山縣取名焉洸水者洙水也蓋洸洙相入受通稱矣故城在鄒縣南又南徑方與縣東菏水從西來注之水經注菏或作荷又作河今悉改從菏酈云菏水即濟水包注以成湖澤東與泗水合於湖陵縣西六十里榖庭城下俗謂之黃水口黃水西北通巨野澤蓋以黃水沿注於菏故因以名焉按菏水入泗經言在方與縣東注言在湖陵縣西必二縣以是水為界非有兩處也今魚臺縣北有方與故城縣東南有湖陵故城與沛縣接界湖陵秦置後漢章帝改曰湖陸又屈東南過湖陸縣南左會南梁水水出蕃縣之東北平澤俗以南鄰於漷亦謂之西漷水蕃音皮又南漷水注之水出東海合鄉縣西南流入泗春秋哀公二年季孫斯伐邾取漷東田及沂西田是也又南徑薛之上邳城西奚仲自薛遷于邳則下邳也有下故此為上今滕縣西北有薛縣故城又南徑沛縣東黃水注之水出小黃縣黃溝國語曰吳子會諸侯於黃池者也元和志沛縣泗水自西北流入東去縣五十步又南徑小沛縣東縣治故縣南垞上東岸有泗水亭漢祖為泗上亭長是也元和志泗水亭在沛縣東南一里按寰宇記沛縣東南微山下有故沛城尚存後漢吕布傳注云小沛即沛縣也又東南徑廣戚縣故城南城在沛縣東北又徑留縣而南徑垞城東元和志故留城在沛縣東南五十五里故垞城在彭城縣北二十六里兖州人謂實中城曰垞也今徐州北有垞城垞音茶又東南徑彭城縣東北元和志泗水在彭城縣東去縣十步今徐州即彭城百步洪在州東南二里泗水所經也水中若有限石懸流迅急亂石激濤凡數里始靜俗名徐州洪又南徑彭城縣故城東城在徐州東南又東南徑吕縣南吕宋邑春秋襄元年楚子辛侵宋吕留是也縣對泗水水上有石梁焉故曰吕梁懸濤崩渀實為泗險孔子所謂魚鱉不能遊又云懸水三十仞流沫九十里今則不能也元和志吕梁在彭城縣東南五十七里按徐州北有吕梁故城州志吕梁山在州東南五十里山下即吕梁洪也有上下二洪相距凡七里巨石齒列波濤洶湧明嘉靖二十三年管河主事陳洪範鑿吕梁洪平之自是運道益便又東南徑下邳縣葛嶧山東又東南徑其故城西元和志嶧陽山在下邳縣西六里泗水西自彭城縣界流入下邳故城在今邳州東三十里又東南沂水注之又東南得睢水口睢水注云出陳留縣西蒗蕩渠東流徑下相縣故城南又東南入泗謂之睢口元和志下相故城在宿遷縣西北七十里又徑宿預城西又徑其城南故下邳之宿留縣也今宿遷縣東南有宿預故城又東徑陵柵南西征記曰舊陵縣治也按漢志泗水國有淩縣其故城在今宿遷縣東南又東南徑淮陽城北今桃源縣西北有淮陽故城又東南徑魏陽城北陸機行思賦曰行魏陽之枉渚故無魏陽疑即泗陽縣故城也今在桃源縣東又東徑角城北而東南流注于淮角城縣故城在今清河縣西南晉義熙中置以今輿地言之泗水出泗水縣歷曲阜滋陽濟寧鄒縣魚臺滕縣並屬山東兖州府沛縣徐州沛縣屬徐州隸江南邳州宿遷桃源至清河縣入淮並屬淮安府此禹迹也今其故道自徐城以南悉為黃河所占而淮不得擅會泗之名矣漢志山陽郡湖陵縣下云禹貢浮于淮泗達于河水在南漢時湖陵縣安得有黃河此河字明係菏字之誤水在南謂菏水在縣南也酈道元泗水注引此文云菏水在南水經濟水篇言菏水過湖陸縣南東入泗皆確證不獨許慎作菏也今按水經注菏水分濟于定陶東北自菏澤分流東南徑乘氏縣故城南縣即春秋之乘丘在今巨野縣西南又東徑昌邑縣故城北城在今金鄉縣西北又東徑金鄉縣故城南城即今縣治城北有金鄉山又東徑東緡縣故城北城在金鄉縣東北又東徑方與縣北又東徑武棠亭北有高臺下臨水昔魯侯觀魚于棠謂此在方與縣故城北十里經所謂菏水也今魚臺縣北十三里有武唐亭又東徑泥母亭北春秋僖公七年盟于寧母即此也寧泥聲相近遂訛為泥母今魚臺縣東有寧母亭又東與巨野黃水合又東徑湖陸縣南東入于泗水今魚臺東二十里榖亭鎮即酈注所謂榖庭城菏水入泗處也元和志兖州魚臺縣菏水一名五丈溝西自金鄉縣流入去縣十里又東南流合泗水泗水東北自任城縣界流入經縣東與菏水合又東北入徐州沛縣界任城即今濟寧州也魚臺縣在湖陵故城西六十里而菏水更在縣北十里與地志水經所云在湖陵縣南者不合蓋水道改矣以今輿地言之定陶巨野金鄉魚臺界中並屬兖州府皆菏水之所經也然此水乃菏澤之枝流泗水與澤相通之道經所謂菏主澤而言自乘氏以至湖陵名曰菏水乃出自後人禹時未有也蘇傳云自淮泗入河必道于汴世謂隋煬帝始通汴入泗禹時無此水道以疑禹貢之言按漢書項羽與漢約中分天下割鴻溝以西為漢以東為楚文穎注云於滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會即今官渡是也魏武與袁紹相持于官渡乃楚漢分裂之處蓋自秦漢以來有之安知非禹迹邪禹貢九州之水皆記入河水道而淮泗獨不能入河帝都所在理不應爾意其必開此道以通之其後或為鴻溝或為官渡或為汴上下百餘里間不可必然皆引河水而注之淮泗也故王濬伐吳杜預與之書曰足下當徑取秣陵自江入淮逾于泗汴泝河而上振旅還都濬舟師之盛古今絶倫而自泗汴泝河可以班師則汴水之大小當不減于今又足以見秦漢魏晉皆有此水道非煬帝創開也吳王夫差闕溝通水與晉會于黃池而江始有入淮之道禹時則無之故禹貢曰沿于江海達于淮泗眀非自海入淮則江無入淮之道今直云浮于淮泗達于河不言自海則鴻溝官渡汴水之類自禹以來有之明矣渭按蘇氏因説者有謂河當作菏而以為不必然故發此論元黃公紹為之辨曰浮于淮泗達于河説者牽合傅會或指鴻溝引河入泗為禹迹或謂當時必有可達之理朱氏書傳亦莫知所折衷今按説文菏字注引禹貢此文是則達于菏非達于河也許慎所見蓋古文尚書後人傳寫例以上下文達于河之句改菏為河陸德明又以河音如字遂啓後人淮泗不能達河之疑然其下復云説文作菏工可切水出山陽湖陵南則非九河之河明矣如字之音陸氏誤也見韻會閻百詩曰禹貢濟入于河南溢而為滎而陶丘而菏而汶而海此禹時之濟瀆發源注海者也史記河渠書禹功施乎三代自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會此禹後代人于滎澤之北引河東南流故水經謂河水東過滎陽縣蒗蕩渠出焉者是亦引濟水分流故漢志謂滎陽縣有狼湯渠首受洓東南流者是又自是之後代有疏濬枝津别瀆不可勝數則酈氏注所謂滎波河濟往復徑通者也雖然其來古矣蘇秦説魏襄王曰大王之地南有鴻溝則戰國前有之晉楚之戰楚軍於邲邲即汳水則春秋前有之爾雅水自河出為灉灉本汳水則爾雅前有之然莫不善于道元之言曰大禹塞滎澤滎澤莽時方枯豈禹塞之乎又曰昔禹塞其淫水而于滎陽下引河滎陽河非禹引而謂禹之時已有乎余是以斷自河渠書參以滎陽下引河不見禹貢之書為出禹以後頗自幸其考比蘇氏差詳矣渭按河當作菏得黃氏之辨而愈明蘇氏引髙紀文穎注而忘其出于河渠書也又安知上文有自是之後四字乎非但蘇氏酈道元亦不察也今百詩唯據此四字判鴻溝非禹迹真老吏斷獄手而愚更有進焉者謂由泗入菏由菏入濟是矣而自陶丘以西舍鴻溝無達河之道也焉得不指為禹迹乎謂滎陽下引河出禹以後是矣而由濟達河莫知其所經不顯示以一塗終何以破千古之疑乎是當于濟漯之間求之蓋兖青徐揚之貢道皆由濟入漯以達河而宋儒謂濟漯二水無相通之處則浮濟者泝陶丘而西且北勢不得不出于滎陽此蘇氏之論所以近理而人不敢深折其非也誠知經所謂浮于濟者乃至菏會汶之濟而非陶丘滎澤之濟則濟之所以通河者漯也非鴻溝官渡汴水也而紛紜之説不攻自破矣蔡傳許慎曰汳水受陳留浚儀陰溝至蒙為灉水東入于泗則淮泗之可以達于河者以灉至于泗也許慎又曰泗受洓水東入淮蓋泗水至大野而合洓然則泗之上源自洓亦可以通河也渭按前説即道汴入河之意後説不知許氏所謂泗受洓者洓即湖陵入泗之菏而乃云泗水至大野而合洓謬甚蓋泗水南流合菏不西注大野也上源亦可通河仍是鴻溝為禹迹之説禹貢錐指至尚書通考云泗受洓者桑欽云濟水濟陰乘氏縣分為二一水東北流為北濟一水南流為南濟通志云今此水與濟不通但菏水亦自乘氏至方與入泗而菏水通濟則泗可以達菏菏可以達濟而自濟可以通河此説亦似有理存之以俟參考淮海惟揚州沿于江海達于淮泗禹貢順流而下曰沿沿江入海自海入淮自淮入泗孔氏傳揚州北距淮東南距海杜佑通典蔡傳同海岸雖自東北迤西南而經云東漸于海則青徐揚之海皆主東言可知也傳于青兼言北既為失之而于揚專言南則失之愈甚通典改為東南視傳為優矣禹貢錐指揚州貢路自江順流入海又自淮泗入菏泝洓入河傳謂吳王夫差始通𨝍溝以禹貢考之淮南虞夏之間無水道也書古文訓禹之時江未有入淮之道自揚州入帝都則必由江而入海然後入于淮泗至吳王夫差掘溝通水與晉會于黃池然後江淮始通若禹之時則未有此道也而孟子曰禹疏九河瀹濟漯而注之海決汝漢排淮泗而注之江此蓋誤指吳王夫差所通之水以為禹迹其實非也使禹時江已與淮通則何須自江而入海自海而入淮為是之迂回也哉孟子生周末去禹之世為未逺而猶誤指當時所見之水以為禹迹自孟子而來至今千餘年矣禹之舊迹漫滅者亦已甚矣而世之儒者乃欲以今日所見之水而配合禹貢之書豈不猶膠柱而調瑟者哉尚書全解黃文叔云揚州吳越之域地盡南海皆揚土也杜佑分嶺南為古南越以為非禹貢九州之域何所據依哉禹貢冀北界標碣石而著島夷則地窮沙漠凡今雲朔燕薊諸夷居于山者皆是也揚南界表海而著島夷則地窮漲海凡甌閩交廣諸夷居于山者皆是也是蓋聲教所暨聞盛德而皆徠臣為唐虞之盛安有四海之內而非禹貢九州之域者渭按説文島海中有山可依止也雲朔燕薊甌閩交廣之地皆不在海中安得謂之島夷且雲朔燕薊杜氏已列在薊域甌閩亦列在揚域獨交廣為南越耳交廣南距海謂海內皆九州之域可也若北海西海不知所極胸奴為北海內地西域三十六國皆西海內地豈亦在九州之域者哉此不足深辨唯裴駰史記集解於略定揚越下引張晏曰揚州之南越顔師古漢書敘例張晏字子博中山人次張揖蘇林之後如淳孟康之前皆三國魏人而晉太康地志云交州本屬揚州取交趾以為名虞之南極也二説相承已久習非不悟今駮正如左古有百越之稱一在禹貢揚州之域史記秦始皇本紀二十五年王翦悉定荆江南地降百越之君置會稽郡東越列傳秦并天下廢閩越王無諸及越東海王搖以其地為閩中郡是也一即南越又名揚越在五嶺之南揚荆梁三州之徼外秦始皇本紀三十三年發諸嘗逋亡人贅壻賈人略取陸梁地索隱曰嶺南之人多處山陸其性強梁故曰陸梁為桂林象郡南海以適讀曰謫遣戌是也漢復立無諸為閩越王王閩中故地都冶徐廣曰今侯官又立搖為東海王都東甌徐廣曰今永寧此皆句踐之後在揚域地理志以會稽為吳分者是也漢會稽郡有冶縣師古曰本閩越地戰國䇿蔡澤云吳起為楚南收揚越史記吳起列傳楚悼王時相楚南平百越南越列傳云秦已並天下略定揚越置桂林南海象郡又云漢立尉他為南越王使和集百越太史公自序云漢既平中國而他能集揚越以保南藩賈誼過秦論云南取百粵與越同之地以為桂林象郡鼂錯上書云揚粵之地少隂多陽秦之戌卒不能其水土嚴安上書云秦使尉他屠睢將樓船之士南攻百越此百越即揚越秦時號陸梁地地理志以蒼梧鬱林合浦交址九真南海日南為粵分者是也漢分秦三郡地為七郡屬交州揚越猶於越閩越駱越之類字義古無可考安見為揚州之南越邪自張晏倡為此説而顔師古張守節皆從之師古曰本揚州之分故云揚越守節曰夏禹九州本屬揚州故云揚越學者翕然宗之至杜佑作通典始于九州之外别列南越且云嶺南鄰接荆州不當捨荆而屬揚今按兩廣輿圖唯南雄韶州廣州惠州四府地在古揚州之徼外而自肇慶以西至潯州綿地千餘里皆在古荆州之徼外南寧以西至安南則又在古梁州之徼外矣禹分九州揚地不當斗入西南數千里據後漢獻帝紀建安十八年復禹貢九州注云省交州以並荆州益州則南越縱在九州之域亦當分繫荆梁張晏魏人乃不諳故事而以南越專屬揚州又誤中之誤據揚雄交州針曰爰自開闢不羇不絆周公攝祚白雉自獻則自周以前南越未嘗通中國况有其地乎太康地志雖有交州本屬揚州之説然沈約蕭子顯撰宋齊州郡志並不言交廣為禹貢某州之域至唐人修晉書始據太康地志于交廣二州直書曰禹貢揚州之域隋書同而其説遂牢不可破然神功元年狄仁傑上疏以為北橫大漠南阻五嶺天所以限戎狄而隔中外是亦不從晉書至杜氏於九州之外别列南越頗協經義而世猶不信愚請以一事折之舜以青州越海分齊為營今五嶺橫絶南北曷不分揚之南境自為一州冀州南北太廣分衛為並燕以北為幽今揚南之廣大不啻如冀北曷不分後世交廣之地增置二州而乃止于十有二乎近史之誤眀甚殷割淮南江北之地以益徐故爾雅云江南曰揚州蓋視夏之揚為小然其西又得禹貢荆州之地何以知之按導水文漢至大别入江而爾雅云漢南曰荆州蓋漢水之名至大别山而止其曰漢南者謂大别以西漢水之南也曰江南者謂大别以東江水之南也荆揚之界當于此分然則殷揚州之境縮于北而贏于西與夏之揚廣狹適相當矣周禮東南曰揚州其藪澤川浸不殊于禹貢特未知與殷制異同如何耳揚州有古汪芒氏之封春秋時可考者蓼六越楚東境是吳蔣弦黃舒宗巢舒庸舒鳩英桐鍾離濮左傳昭元年吳濮有釁杜注云吳在東濮在南今建寧郡南有濮夷凡十七國戰國時初屬越後楚滅越而有其地秦並天下置九江鄣郡會稽閩中南海東境今潮陽郡是漢復置揚州領郡國七後漢魏晉並因之晉領郡國二十二唐為淮南道之廣陵揚州淮陰楚鍾離濠夀春夀永陽滁歷陽和廬江廬同安舒蘄春蘄弋陽光等郡江南東道之丹陽潤晉陵常吳郡蘇吳興湖餘杭杭新定睦新安歙會稽越餘姚明臨海台縉雲處永嘉溫東陽婺信安衢建安建長樂福清源泉漳浦漳臨汀汀潮陽潮等郡江南西道之豫章洪鄱陽饒潯陽江臨川撫廬陵吉宜春袁南康虔等郡按以上通典所列無可更定者以今輿地言之浙江江西福建皆是江南則江寧揚州廬州安慶池州太平寧國徽州鎮江常州蘇州松江十二府滁和廣德三州其鳳陽府則鳳陽臨淮定逺夀州霍丘盱眙天長淮安府則山陽鹽城河南則汝寧府之光州光山固始湖廣則黃州府之羅田蘄水蘄州廣濟黃梅廣東則潮州府皆古揚州域也淮水自今河南汝寧府息縣南東流經光山縣北是為揚域又東經光州北又東經固始縣北又東北經江南鳳陽府穎州北又東經霍丘縣北穎上縣南又東徑夀州北與豫分界又東北經五河縣東南又東經泗州南盱眙縣北又東北經淮安府清河縣南又東經山陽縣北又東經安東縣南而東北注于海與徐分界海自山陽縣東北折而東南歷鹽城興化如臯縣東又南至通州東為江水入海之口其南岸則太倉州也自州東又東南歷上海縣金山衛東又南歷浙江鎮海象山縣折而西歷寧海縣東又西南歷黃巖太平樂清瑞安平陽縣東又南歷福建福寧州東又西南歷羅源連江長樂福清縣東又西南歷莆田惠安同安縣南又西南歷海澄漳浦詔安縣東南又西歷廣東澄海縣南又西至潮陽縣南揚州之海于斯極矣揚之南界經無可見據通典以潮陽隸古揚州蓋自江西大庾嶺東南群山綿亘以達于廣東潮州府之揭揚即揚之南界也大庾嶺在南安府大庾縣南十二里縣本漢豫章郡南壄縣地南接廣東南雄府保昌縣界縣亦南壄縣地水經注以為五嶺之最東亦名東嶠漢書謂之塞上南越相吕嘉破漢將軍韓千秋于石門送漢節至于塞上即此地也後漢志名臺領山唐以後又稱梅嶺其西為聶都山贑水所出與湖廣郴州宜章縣接界裴淵廣州記曰五嶺大庾始安臨賀桂陽揭陽也此與水經注小異桂陽即騎田而無都龐有揭陽顔師古云嶺者西自衡山之南東窮於海一山之限耳而别標名則有五蓋依裴氏五嶺訖揭陽揭陽山一名揭嶺在今揭陽縣西北百五十里南北二支直抵惠州府興寧海豐二縣界山南揭陽故城漢縣也今西自越城騎田萌渚陂陀相屬直趨大庾嶺又循眷而下東包揭陽屬之海堧與江西福建分險唐一行所謂南戒山河至衡陽東循嶺徼達東甌閩中以限蠻夷者是也星傳謂南戒為越門揚之西界經亦無可見今據通典所隸郡縣約略言之蓋自河南光山縣與豫分界其南為湖廣之羅田蘄水蘄州廣濟舊謂九江在黃州黃梅界故光山以下並屬荆今以洞庭為九江當屬揚也踰江而南則為江西之瑞昌又西南為武寧寧州萬載萍鄉永新永寧又東南為龍泉崇義大庾皆與荆分界處也陳大猷曰循行水涯曰沿水之險者莫如江海遇風濤多沿岸而行所以獨言沿不言浮以著其險也此説亦通然吳語夫差曰余沿江泝淮又越師沿海泝淮以絶吳路則沿對泝言明是順逆之辭與左傳沿漢泝江同當仍舊説揚之貢道自常熟縣北之大江順流而下至太倉州北七鴉浦入海而東北經通州東又北經如臯興化鹽城山陽縣東而西入淮口泝流而上歷安東縣南山陽縣北又西至清河縣西南之清口入泗所謂沿于江海達于淮泗也清口本名泗口今其道為黃河所奪漢志江都渠水首受江北至射陽入湖水經志中瀆水首受江自廣陵至山陽入淮是其水乃自南入北非自北入南也即以𨝍溝既開時言之孟子云淮注江亦誤然班固言渠水入湖而不言入淮頗有分刌撰水經者乃云淮水過淮隂縣北中瀆水出白馬湖東北注之酈道元遂以為此水直至山陽口入淮而其説牢不可破矣竊疑高郵寶應地勢最卑若釜底然潘季馴兩河議曰高家堰去寶應高丈八尺有竒去高郵高二丈二尺有竒𨝍溝首受江水東北流至射陽湖而止杜預云自射陽西北至末口入淮此不過言由江達淮之糧道耳路可通淮而水不入淮也水經殆不如地志之確禹貢錐指行水金鑑卷八十八
