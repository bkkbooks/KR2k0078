body:
  text: 行水金鑑巻九十一江南按察使傅澤洪撰運河水黒水西河唯雍州浮于積石至于龍門西河會于渭汭禹貢龍門之河在冀州西積石山在金城西南河所經也沿河順流而北千里而東千里而南龍門山在河東之西界水北曰汭孔氏傳河在雍州之東而謂之西河者龍門之河在冀州西界故王制曰自東河至於西河千里而近是河相對而為東西也地理志云積石山在金城河關縣西南羌中龍門山在馮翊夏陽縣北毛詩傳曰汭水涯也鄭云汭之言内也盖以人皆南面望水則北為汭也且涇水南入渭而名為渭汭知水北曰汭孔氏疏縣漢河關在今陜西西寜衛西南塞外夏陽今西安府之韓城縣也積石龍門見前雍州西盡黒水東界西河貢道自積石乘河而下其東出於渭水凡有二河皆㑹西河書古文訓河自積石東北流至中國折而南至華隂又折而東至大伾又折而北至冀州帝都界於三河之間故王制曰自恒山至于南河千里而近自東河至于西河千里而近其曰東曰西曰南皆自冀州而言之也濟河唯兖州此東河也盖在冀州之東荆河唯豫州此南河也盖在冀州之南黒水西河唯雍州此西河也盖在冀州之西雖自冀州而言之有此三河其實一也冀州之西接於雍州以河為境雖冀州之西河然其實雍州之東境也黒水歴雍州梁州之西入於南海此二州皆以黒水為境漢孔氏曰西距黒水東據龍門之河孔氏所謂據乃跨而越之也冀州之與雍州分河之東西不應言據唐孔氏曰計雍之境被荒服之外東不越河而西踰黒水王子雍曰西據黒水東距西河所言得其實也徧簡孔氏皆云西距黒水東據河必是誤此説是也九州之末載通于帝都之道皆以逹於河為至盖帝都介於三河之間逹于河則至於帝都矣此州逹于帝都有二道浮于積石至于龍門西河者一道也自渭汭以逹于河者又一道也尚書全解㑹言貢道之㑹非㑹貢也禹貢集解雍梁荆三州其貢道相因者臣論沔漢嘗及其詳矣荆之貢不徑浮江漢而兼用沱潛者隨其貢物所出之便或由正途或循枝派期便於事而已也遡漢之極無水可浮則陸行至洛以期逹河故曰浮于江沱潛漢逾于洛至于南河也荆之貢道其先梁而書者顯詳如此而梁貢南道亦與之同盖自岷江順下至今之漢漢陽遡漢以北與荆之入貢正共一途故經既書之於荆而不再書於梁也梁之北境貢入之道去江則遠故必自今閬劒之北金洋興元之南取逕入潛以求逹乎漢也然則不浮漢潛者凡漢水支流皆可名潛隨其逕便可逹即逹不容必待至漢乃浮也自今日利閬北上轉東而道乎金牛以及漢中卻為夷徑而此時逺在秦前今金牛縣五丁之道未開則凡巴郡在北而逺江者其貢入正以浮潛為便而非舍劒利不由也旣浮潛達沔又可以求逾乎襃而展轉達斜以入於渭其逕道當然也襃今不名為沔然漢上為沔此襃旣據漢水上流正與沔應雍之貢入亦有兩道其北道自後世朔方西涼浮河者無所因於他州故特記其詳曰浮于積石至于龍門西河其南道自今陜西入河者與梁之北貢所謂浮于河者同道而可以會合積石之貢於河故又因梁州前文而特致其略止曰㑹于渭汭而巳其義例與梁荆一律也禹貢山川地理圖說爾雅河西曰雝州注云自西河至黒水疏引李廵云兼得梁州之地周禮正西曰雍州疏云周之雍豫於禹貢兼梁州之地按梁併於雍說本漢志然雍州西北二邊世有戎翟之患自夏桀時畎夷入居邠岐之間成湯旣興伐而攘之及殷室中衰諸夷皆叛至于武丁征西戎鬼方三年乃克故其詩曰昔有成湯自彼氐羌莫敢不來享莫敢不來王言武丁能繼湯之烈也及武乙暴虐犬戎寇邊周古公踰梁山而避於岐下及太丁之時李歴伐燕京之戎戎人大敗周師文王為西伯西有昆夷之患北有玁狁之難遂攘戎翟而戍之莫不賔服厲王無道戎狄寇掠乃入犬丘殺秦仲之族宣王承厲王之後玁狁孔熾整居焦穫侵鎬及方至于涇陽雍州之域為戎翟所侵陵如此則其疆埸未必能悉如禹貢又禹貢梁州之山水無一入職方者故杜氏言梁州當夏殷之間為蠻夷之國蓋即牧誓所稱庸蜀盧彭等是也雍之併梁亦虚名耳今据周禮言之正東曰青州其南則有揚其北則有幽而西則不然目雍州以正西其西北西南兩隅皆缺焉然則梁地為羈縻之國固不待言而雍之西境如西傾積石豬野流沙三危黒水之區皆没於戎翟禹貢之舊疆不可復問矣爾雅目雝州以河西則華山以南不在界中可知其西北亦當虧損殷周之雍實小於禹貢或因併梁之說而反以為大此耳食之學未可與道古也雍州為奥區神臯后稷始封於邰一作駘又作斄公劉處豳太王徙岐文王作豐武王治鎬及扈崇密須之封皆在焉春秋時可考者虢文王弟所封曰西虢周召畢豐鄭初封咸林之地漢為鄭縣属京兆今華州是秦芮梁崇密驪戎白狄晉西境是凡十四國戰國時屬秦而魏趙亦兼得其地秦并天下置内史上郡北地九原隴西雲中西南境唐榆林郡是漢以其地之西偏置凉州領郡十漢志云改雍曰凉而三輔則領於司隸後漢並因之魏分置秦州晉又分置雍州領郡國七治京兆凉州領郡國八治武威秦州領郡六治上邽唐為京畿之京兆府雍州華陰華馮翊同扶風岐新平邠等郡關内道之汧陽隴安定涇彭原寜安化慶平凉原靈武靈五原鹽寜朔宥洛交鄜中部坊延安延咸寜丹上郡綏銀川銀新秦麟朔方夏九原豐榆林勝安北大都護府分豐勝二州界置等郡隴右道之天水秦隴西渭金城蘭㑹寜㑹安鄉河臨洮洮和政岷寜塞廓西平鄯武威凉張掖甘酒泉肅晉昌𤓰燉煌沙伊吾伊交河西北庭庭州後為都護府安西都護府等郡按以上通典所列伊吾交河北庭安西自古為戎狄不在禹貢九州之限又河湟之間吐谷渾故地未嘗為郡縣故不入雍域以今輿地言之陜西臨洮平凉慶陽延安鳳翔五府其西安府則唯商州洛南山陽鎭安商南鞏昌府則唯鳳縣兩當徽州成縣階州文縣為梁域餘皆屬雍又榆林衛寜夏衛寜夏中衛及靖逺岷州洮州三衛行都司所領甘州莊浪等諸衛所其在化外者南至西傾積石西踰三危北抵沙漠皆古雍州域也夏殷之衰雍州西北境皆為戎翟所據及周室東遷舊都八百里之地悉棄以予秦秦染夷俗諸侯擯之不與中國㑹盟輶軒之使莫有過而問焉况三危西裔之區乎故屈原天問曰黒水𤣥趾三危安在蓋自戰國時此地之山川巳與崑崙弱水同其渺茫僅得之傳聞而無從目驗矣秦火之後載籍淪亡漢興治尚書者不能言黒水三危之所在武帝通西域玉門陽關之外使者往來數十輩不聞涉大川而西有可以當古之黒水者故班志張掖酒泉敦煌郡下並無其文司馬彪亦無可言至酈道元始云黒水出張掖雞山而其所謂南流至燉煌過三危入南海亦不過順經為義與他水歴敘所過之郡縣者詳略相去逺矣故杜佑云道元注水經銳意尋討亦不能知黒水所經之處唐初魏王泰撰括地志又云黒水出伊吾縣北此與張掖雞山未知孰是然其所謂南流絶三危者竟亦不可復尋按伊吾縣唐伊州治也本伊吾盧地貞觀初内附乃置郡縣自甘州以至伊州凡一千五百餘里郵傳不絶宦游之士商旅之徒與夫出使西域者往來如織而不聞言燉煌之西有黒水焉此杜佑所以復有年代久逺或至堙涸之說也難者曰黒水行及萬里黄河之亞也何至於堙涸余曰湮涸之故嘗觀於黃河而知之矣夫下流壅塞則上流必決而徙道水之常也齊桓公時九河塡閼下逮周定王五年不過四五十歲而全河南徙鄴東之故大河黎陽之宿胥故瀆漢世巳不可得詳矣黒水當亦如此蓋三危以南禹功不及易致壅塞下流旣然則上流決而徙道從塞外行不復經燉煌界中此三危之西鹽澤之東所以終不見有黒水也難者又曰水即不至其枯瀆寜無遺跡乎曰凡黃河旣徙之後其枯瀆風沙塡塞未幾而化為平陸况黒水經流沙之域風吹沙擁抑又甚焉遺迹無存固其所矣周定王時河徙史遷亦不能言頼有周譜載其事王橫始得據此以推知禹河本從西山下東北去彼黒水者不由中國入海又雍西久没於戎翟新流故道夫孰為紀之而孰為傳之邪禹治黒水不若治河之詳河歴千六百餘年而亦不免於徙則黒水之改流較速疑當在定王之前自屈原已不能知而况伏生輩乎自古文尚書家巳不能知而况班固司馬彪酈道元魏王泰諸人乎至若樊綽程大昌金履祥李元陽等紛紛辨論如繫風捕景了無所得徒獻笑於後人而巳西河東與冀分界自今榆林衛故勝州東北折而南且西經府谷神朩又西南經葭州吳堡又南經綏德淸澗延川延長又東南經宜川並属延安府又南經韓城郃陽朝邑以至于華陰並属西安府與豫接界河行凡一千七百餘里雍之南界自華陰太華山以西為華州渭南藍田鄠縣盩厔並属西安府郿縣寶雞並属鳳翔府皆以南山與梁分界又西為鳳縣有大㪚嶺又西為徽州有鐵山朩皮嶺又西為成縣有鷲峽羊頭峽龍門戍並属鞏昌府又西為岷州衛又西為洮州衛有西傾山皆與梁分界處自西傾又西歴吐谷渾南至大積石自積石又西歴吐谷渾南党項白蘭之北至於黒水吐谷渾本遼東鮮卑種也東晉初徙居枹罕宋景平中其子孫有阿豺者升西疆山觀墊江源則其地南至西傾矣又數傳為夸呂始自號可汗治伏俟城在靑海西十五里據有甘松之南洮水之西南極於白蘭其地東西三十里南北千餘里党項羌在古析支之地漢時燒當羌亦嘗居之白蘭者羌之别種也其地皆與吐谷渾接吐谷渾在河湟之間即先零燒當諸羌故地積石在其西南南枕析支河曲禹導河自此始則湟水之南積石之北西傾之西其為雍州之域無疑矣雍之北界經無可見約畧言之自今塞外東受降城之西與冀分界元和志云東受降城在勝州榆林縣東北八里又西四百里為中受降城元和志云南至麟州四百里又西四百餘里為西受降城元和志云在豐州西北八十里唐景龍二年張仁愿所築南直今榆林衛黄河經三城之南謂之北河河北有陰山為華夷大限侯應曰北邉塞至遼東外有陰山東西千餘里是也又西為高闕山戰國時趙築長城並陰山下至高闕為塞及秦始皇斥逐匈奴城河上為塞又使蒙恬度河取高闕陶山北假中築亭障以逐戎人是也其地又有光禄塞雞鹿塞漢受降城皆雲中五原二郡境也又西為河西四郡之北鄙漢太初中收匈奴休屠渾邪王地置武威張掖酒泉敦煌以通西域隔絶羌胡往來武威姑臧縣北三百里有白亭軍元和志云在馬城河東岸天寳十年哥舒翰置因白亭海為名也張掖東北一千五百餘里有地曰居延元狩二年霍去病出北地二千餘里過居延太初三年使路博德築居延澤上今甘州衛塞外居延故城是也亦曰居延塞元為亦集乃路地理志云在甘州北一千五百里城東北有大澤西北俱接沙磧乃漢居延故城明洪武初馮勝拔肅州進至掃林山亦集乃路是也合黎山在張掖縣西北二百里弱水由此東北入居延澤遮盧障在肅州酒泉縣北二百四十里李陵與單于戰處敦煌即今廢沙州衛衛北抵大磧磧外即古伊吾盧地唐置伊州今為廢哈密衛也自雲中至敦煌六郡皆古雍州之域後為戎翟所據至秦漢始收復者其北皆臨大磧大磧即沙幕漢人謂之幕唐人謂之磧東西數千里南北逺者千里無水草不可駐牧雖禽獸亦不能居之蔡傳雍之貢道有二其東北境則自積石至于西河其西南境則㑹于渭汭王氏樵曰東北當云西北蓋雍東距河若東北境則直浮西河不須浮于積石也渭按雍之西北境逺近不同各從其便以至龍門不盡由積石其曰浮于積石者舉逺以該近耳㑹於渭汭言出渭之舟逆流而上與浮河之舟相㑹于渭水之北閻百詩云渭汭汭字解有作水北者有作水之隈曲者有作水曲流者有作水中州者總不若說文汭水相入也於此處為確解左氏一書莊四年曰漢汭閔二年曰渭汭宣八年曰滑汭昭元年曰雒汭四年曰夏汭五年曰羅汭二十四年曰豫章之汭二十七年曰沙汭定四年曰淮汭哀十五年曰桐汭水名下繫以汭者衆矣又何疑於禹貢渭按汭水相入與水之隈曲曰汭二義適相成而不相悖蓋兩水相入其水㑹襟帶處必有隈曲詩大雅芮鞫之即芮即職方涇汭之汭水名也漢志扶風汧縣下云芮水出西北東入涇詩芮阸雍州川也師古曰阸讀與鞫同余因此悟水北曰汭之義蓋涇水東南流至邠州長武縣東芮水自平凉府靈臺縣界流經縣南而東注于涇公劉所居故豳城正在二水相㑹内曲之處及其後人衆而地不能容則又營其外曲以居之故曰止旅迺密芮鞫之即鄭箋曰水之内曰隩水之外曰鞫外即南内即北也推之洛汭亦然召誥太保以庶殷攻位于洛汭傳云洛水北今河南城也漢河南縣即周之王城東去鞏縣之什谷尚百有餘里召公治都邑之位豈逼側洛水入河之口乎知洛汭則知渭汭矣或曰雍州有二渭汭從孔義則凡渭北之地皆為渭汭此渭汭當為漢高陵縣地後渭汭當為漢褱德縣地今朝邑同一渭汭而前後所指各别經豈支離若是邪曰地異而其為渭汭則同高陵者涇渭二水之㑹也褱德者河渭二水之㑹也均為水北均為水相入均為水之隈曲渭汭兼地而言不專指水口也渭汭在河之西岸華陰朝邑韓城之地皆是也東與蒲州榮河分水此言雍之貢道故特以西岸言之韓汝節云今蒲州舜所都也渭水之北今朝邑縣南境渭水至此東入河折而北三十里即蒲州故舟皆㑹于渭北今按北船出龍門至榮河縣北汾水入河處便當東轉泝汾無緣更順流而下至朝邑與南船㑹也且禹告成當堯時帝都平陽距蒲阪三百餘里韓城北連龍門東對汾口南北貢船相㑹當在其間曷為引蒲州以證乎禹貢錐指導黒水至於三危入於南海傳曰三危西裔之山山在西裔為黒水所經則禹當日導黒水實未嘗究其源但自雍導起經三危過梁境入南海傳曰自北而南經三危入南海非是蓋三危去黒水之源尚逺雍州經三危旣宅傅同叔曰三危旣宅此治黒水之成功也林三山曰三危距南海凡數千里禹導黒水至三危即得其故道從此以達南海之二說者講導水甚明夫禹所導之黒水與雍梁二州之黒水同一水耳明導水經文之黒水則知雍梁二州之黒水矣自古言黒水者紛紛不一胡朏明先生言黒水三危並見雍州雍州以若水為黒水考据詳明然與經文入南海之文未有合至云梁州黒水别是一川非界雍之西者其說本之韓汝節終非篤論予故不取焉唯雲南通志載明人史秉信岡脊黒水辨以土人而言彼中之水道當自不謬姑引其文而以諸說參注之雖未嘗有所折衷然以此而求黒水當亦不逺矣辨曰昔辨黒水者有如聚訟或問余曰黒水地志出犍為謬矣漢書地理志犍為郡符縣下温水南至鄨入黚水黚水亦南至鄨入江愚按說文黚淺黄黒也廣雅黚黒也則是黚水即黒水矣犍為漢郡今四川敘州府治此即張機所謂北金沙江一名黒水下流至敘州入岷江者是也水經出張掖至燉煌過三危入南海燉煌𤓰州也實未嘗有此水跨越諸山入南海武彛熊氏之說詳矣武夷熊氏曰考古今地志雍州之地即無黒水所謂導黒水至於三危或云在燉煌郡則今𤓰州也曷嘗有此水踰跨諸山以至於南海哉若以河源崑侖推之崑侖山脊以西人跡所未到其東中一支則重岡積嶺直至終南太華皆是雍之南山而𤓰州乃在河西五郡實當西北界上漢人所謂㫁匈奴右臂者以其不與西戎相接也史當有錯唐樊綽又指麗水為黒水麗水金沙江也金沙果黒水乎余曰金沙出吐蕃經麗江鶴慶姚安武定入馬湖㑹岷江入東海此為黒水所謂入於南海何居易氏曰樊綽蠻書載蠻水之入南海者有四西洱河與瀾滄江合一也麗水與瀰渃江合二也新豐川合勃弄諸水三也唐蒙所見盤江四也綽指麗水為黒水一名禄禆江而羅些城北有山即三危山其水從羅些城三危山西南行上流出於西羌吐蕃下流南至蒼望城又南至雙王道勿川有瀰渃江西南來㑹南經驃國之東而入海羅些乃南詔吐蕃南北相距之地其西接吐蕃其東接劒南東北之西境程大昌辨之曰案此之麗水下流經驃入海而驃與東天竺接其南皆際南海即在南海一角其去雍梁分境之地實為太逺故臣不敢主執其語也而秉信所指則與張機所考北金沙江源流相合機曰北金沙江源出吐蕃共隴川犂牛石下謂之犂牛河亦曰犂水訛犂為麗又名麗江即古麗水以其江産黃金故名金沙元憲宗取大理用革囊以濟者即此也其流經吐蕃鐵城橋東經麗江府巨津寶山二州又東經鶴慶府北勝州姚安府又自武定府北界黎溪州䝉氏僭封為四瀆之一亦即此江也又自武定下流入濟慮部夷人鑿桐槽船以通往來行旅遂名金沙渡又西過四川東川府一名黒水一名納夷然皆金沙江别名又經四川行都司㑹川建德德昌打衝等衛所又經烏䝉府又經馬湖府蠻夷長官司與馬湖江相合下流至敘州入岷江矣或又曰程氏以麗水狹不足界二州西洱河與漢葉榆澤相貫廣可二十里其流正趨南海西洱今大理海也西洱果黒水乎余曰西洱源一發於鶴分水嶺一發於浪穹罷谷此為黒水所謂惟雍州者何居程大昌曰樊綽直以麗水為三危之黒水其語必得之夷俗所傳然臣疑其源流狹小不足以合二大州疆境又三危旣宅載之雍州則三危當在雍不當在梁今以唐史考之驃在蠻為南在蜀為西南於海亦為西南一角而麗水西行入驃始得南海則恐雍境決不斜入梁徼如此之多也至其所稱西洱河即與漢志葉榆澤相貫其廣處可二十里旣足以界别兩州綽及道元皆謂此澤以葉榆所鍾得名則其水之黒似榆葉積漬所成凡其名實悉皆可證而古黒水祠又正在益州即其地也而尚書通考載李京雲南志云西洱河即葉榆水在大理㸃蒼山下方圓三百餘里勢如人耳故名其源不出三危且在中慶西境去梁雍絶逺不可以别界二州矣或又曰西逺夷方有大金沙江發源崑侖西北吐蕃地廣五里産黄金緑玉琥珀水晶其流正趨南海西南惟此水為大張機曽有考然則大金沙為黒水乎余曰洱水之西爲瀾滄再西為潞江又再西為大金沙大金沙者長廣三倍於瀾潞逺出蕃域上流巳闊澄若重溟黝然深碧夏秋漲溢江色不變金齒黃貞元言之甚悉第此水去梁荒逺此為黒水所謂華陽者何居所謂至於三危者又何居張機曰大金沙江發源崑崙山西北吐蕃地即禹所導黒水也雖與雲南小金沙江及瀾滄潞江皆發源吐蕃然大金沙之源較三江最荒逺且其源於三江源邈不相近其下流亦十倍小金沙江及瀾潞二江之外按禹貢華陽黒水唯梁州黒水西河唯雍州周文安辨疑録云甘州志甘州之西十里有黒水流入居延海肅州之西北有黒水東流遐逺莫窮所之是其源入雍州之西流入梁州之西南其正西别流遶西極之外而無所據見地勢西北最高故能經西而西南也雲南志載金沙江出西番流至緬甸其廣五里徑趨南海得非黒水源出張掖流入南海者乎河源在中國西南直四川馬湖蠻邦之正西三千餘里雲南麗江宣撫司之西北一千五百餘里愚觀黄河源近雲南之地則大金沙江源自番雍之地南入緬海論雍梁間水唯此大耳此水為黒水無足辨矣黃貞元又云大金沙江瀾潞三水雖皆入南海大小逺近迥不同瀾僅潞四分之一大金沙倍於瀾潞瀾潞所出地名在鹿石山在雍望俱可窮源上流亦狹大金沙江上源相傳近大宛國自里麻茶山至孟養極北不聞有所往號赤髮野人境峭壁不可梯繩弱水不任舟栰土人唯逺見川外隠隠有人馬形似殆西羌之域也今姑略其源唯自其經流支流入海可見者言之水流至孟養陸阻地有二大水自西北來一名大居江或云大車江一名㯽榔江二水至此合流又名大盈江今騰越人總甸内諸水亦曰大盈江殆竊侈其名也江流至此夷人方名其為金沙江江中產緑玉黃金鈿子金精石墨玉水晶間出白玉濵江山下出琥珀舊志以琥珀緑玉出在瀾滄江者謬矣昔年王靖逺蔣定西追麓川叛賊思機發思卜發弟兄造船飛渡孟養及復與思禄盟誓江乾石爛乃許其過江者皆此江也滇人相傳名大金沙江若以别麗江北勝武定馬湖之小金沙江耳自此南流經宦猛莫噉莫即至猛掌有一江西來入大金沙江又南下昔朴怕蚱猛莫猛外經蠻莫有一江源自騰越大盈經鎭夷南甸干崖受展西茶山古湧諸水伏流南牙山麓出經蠻莫入大金沙江江又經蠻法魯勒孟拱遮鼇管屯大菖蒲山峽小菖蒲山峽課馬孟養怕崩山峽戸董鬼哭山戛撒昔年緬人攻孟養以船運兵餉到戛撒為孟養所敗者此江也正統中蔣雄率兵追思機發為緬人所壓殺於江中亦此江也大約江自蠻莫以上山聳水陡正統中郭登自貢章順流不十日至緬甸者亦此江也下流經温板有一江源自騰越龍川江經界尾高黎共山隴川猛乃猛密所部莫勒江至太公城江頭城入於金沙江下流又經猛吉準古溫板又名温板江又名流沙河皆金沙江也猛戛馬噠喇至江頭江中有大山極秀聳山有大寺又有一江源自猛辦洗戛母南來入大金沙江又經止即龍大馬革底馬撤躋馬入南海其江至蠻莫以下地勢平衍闊可十五餘里舊志云五里者非也經南江益寛流益慢緬人善舟又善泅水操櫓楫者如涉平地至是江海之水瀦為一色矣合張機黄貞元二說觀之大金沙江源流甚長自徼外流入南海似與導黒水至於三危入於南海之經文相合葉榆李仁甫黒水辨以瀾滄江為黒水云蜀隴滇三省鼎立隴西南斜長入蜀滇西北斜長近隴蜀則尖長入滇滇隴之間如三足旛然黒水源正在旛頭故雍以黒水為西界以山論麗雪山與蜀松州諸山相接松去雍不逺計瀾滄之源當在雍之西元張道立使交阯由黒水入三崇山瀾滄經其麓地有黒水祠仁甫考究不無㨿李仁甫名元陽號中谿太和人嘉靖丙戍進士由庶常歴知荆州府罷歸四十餘年著述等身其辨黒水曰黒水之源固不可窮而入南海之水則可數也夫隴蜀無入南海之水唯滇之瀾滄江潞江皆由吐蕃西北來蓋與雍州相連但不知果出張掖地否水勢並洶湧皆入南海是豈所謂黒水者乎然潞江西南趨蜿蜒緬中内外皆夷其於梁州之境若不相属唯瀾滄由西北迤邐向東南徘徊雲南郡縣之間至交阯入海今水内皆為漢人水外即為彛緬則禹之所導於分别梁州界者唯瀾滄足以當之孟津之㑹曰髳人濮人以今考之皆在瀾滄江内則瀾滄江之為黒水無疑矣地理志謂南中山曰昆彌水曰洛山海經曰洱水西流入於洛故瀾滄江又名洛水元史至元二年大理勸農官張立道使交阯並黒水跨雲南以至其國觀此則瀾滄江之為黒水益彰彰明矣大都為傳論者未嘗知三省地形但謂隴在蜀之北蜀在滇之東也而禹貢言黒水為雍梁二州之界又入南海故不得不疑其跨河知跨河非理又不得不疑其湮涸曽不知隴蜀滇三省鼎足而立隴則西南斜長入蜀滇則西北斜長近隴蜀則尖長入滇隴之間正如三足旛然黒水之源正在旛頭故雍以黒水為西界對西河而言也梁以黒水為南界對華陽而言也蓋各舉兩端若曰西河在雍東黒水在雍西華山在梁北黒水在梁南云爾故曰梁州可移而華陽黒水之梁不可移也雍梁之間其名黒水者非一然皆枝水而流又不入南海諸葛亮箋所謂朝發南鄭暮宿黒水之𩔖皆非禹貢之黒水也而本朝康熙癸卯孝亷闞楨兆通海人又有考以駮元陽曰導黒水至於三危入於南海是黒水自雍之西北而直出梁之西南明矣九州輿圖黒水出雍州汾關山汾關在崑侖北周文安辨疑録云肅州之西北有黒水東流荒逺莫窮所之此與水經黒水出張掖雞山南至燉煌過三危山流入南海其說有合李中谿乃以瀾滄江當黒水新都楊愼亦主此說又有指潞江為黒水者紛紛無據不知瀾潞所出地名在鹿石山在雍望俱可窮源上流亦狹若黒水逺出汾關上流巳闊澄若重冥黝若深碧夏秋漲溢江色不變自雍經梁獨來獨往瀾僅潞四分之一此水三倍於瀾潞李氏以瀾滄為黒水吾未聞瀾滄盡界梁州之域况逺溯雍州耶雲南志載金沙江出西蕃流至緬甸徑趨南海非謂麗江入馬湖之金沙江蓋名為大金沙江者意即界雍梁二州入於南海之黒水也黒水出西北界雍梁入南海其源甚逺故其流獨大南至宣慰之鐵壁關江勢平闊金寶叢生則大金沙江之名所從來也潞江流出永昌至朩邦為喳哩江在大金沙江之東瀾滄江流出蒙順界至姚關為錦龍江又在潞江之東夫瀾潞之水源雖出於吐蕃距滇不過十餘日其濴洄大理䝉化順寜永昌而入南海僅界梁州之西南不能逺界雍州說者以瀾滄當黒水謂瀾潞為梁州西南境内入南海之水則可謂禹貢雍梁之黒水則不可故論黒水者莫若以經為㫁經之黒水一也唯雍唯梁同此也區區執滇以求黒水豈非狹視宇宙之山川而不知廣所見聞哉試以山驗之中國山勢岡脊大抵皆自西北來積石西傾岷山岡脊以東之水旣入於河漢其岡脊以西之水即為黒水而入於南海大經大緯燦若日星闞氏此說則與張機之南金沙江相合而其末言岡脊又本之蔡注與史氏同矣考蔡注云梁雍二州皆以黒水為界黒水自雍西北直出梁西南中國山勢岡脊皆自西北來積石西傾岷山岡脊以東之水旣入於河漢岷山岡脊以西之水入於南海即為黒水此說廣而有據何也鶴之山皆自西北來凡脊以東之水皆歸東海金沙江是也脊以西之水皆歸南海瀾滄江是也則此中為岡脊疇能易之如鶴走榆經山神哨舊名分水嶺草間湍出盡亂流耳北流者入漾江㑹金沙歸東海南流者合浪穹水滙為西洱歸南海夫咫尺間分水東南海之異於岡脊之說誠有脗合者人自不察耳或曰信斯言脊以西之水皆黒水瀾滄也西洱也大金沙也皆黒水矣此属游移之見瀾滄西洱非黒水也酈道元謂西洱葉榆積漬所成謂之黒水豈岡脊以西皆榆乎余曰脊以西雖不必皆榆然西南之山干霄翳地隨刋未施時山朩積漬成渠何必榆始黒也朱子云黒水從雍梁西界入南海不經中國知言哉山海西山經云崑崙之邱西流於大扞軒轅之邱洵水出焉南流注於黒水所指皆西南是黒水實不入中國也或又曰顧野王輿地志黒水由僰道入江余曰僰道烏䝉地也入南海者曰入江可為噴飯若夫遼東黒河趨東海肅州有黒水無跨河越脊理若水名黒水即北金沙入東海皆非禹貢之黒水不足辨矣吾友閻中書詠刋大淸一統天下全圖據云本之政治典訓方略㑹典一統志諸書其山川位置自無茍且按圖金沙江一源自阿六江一源自烏思藏皆南流至共龍旄牛石下枝分東流為金沙江折而南又東流經永北府南又東至程湖又東至馬喇東瀘水即古若水自北來注之又東南流少西至大姚又西折而南又東至姚安姚州又東至元謀復西南流至楚雄府而旄牛石分枝之麗江南流至劒川又南流至浪穹折而東至大理太和為西洱即古葉榆水也又東流至賔川又東至定逺而與金沙江合又東南流至南安少西而瀾滄江自西南流至蘭州漾備江亦自西南流至蘭州與瀾滄江合又南流至㸃蒼山少東至打牛平又東南流與金沙江合又南流至茶山西又南流至元江少折而東為九龍江即瀾滄江流入安南界入於南海者也其金沙江東南流至馬喇與瀘水合流處又東流至㑹川西孫水自北來注之又自㑹川東北流至大赤口羅羅小赤口羅羅少東其處亦名金沙江又東北至馬湖又東至敘州宜賔流入岷江而金沙江又自大赤口羅羅分枝南流至東川之西㑹理之東又南流至烏蒙之西禄勸之東又西南流至雲南滙為昆明池即滇池也據此則金沙江瀾滄江瀘水孫水皆異源同流合而入於南海者而其分枝則又入於岷江入於滇池皆非禹貢之黒水也張機以大盈江為大金沙定為禹貢之黒水閻氏圖亦載之大盈江自西天竺萬山中來西南流有㯽榔江自西來注之合流至孟養折而東至猛卯有麓川江自北來注之合流至猛密而潞江亦自北來注之合流至緬甸之東八百媳婦之西入於南海而大盈江之來自西天也圖中亦莫究其源按而求之蓋在星宿海大流沙之西北抵三危過沙州至哈密漢之燉煌郡北境即伊吾廬也括地志言黒水出伊吾南流絶三危山此正與圖相合亦與張機所稱大金沙江發源崑崙山西北吐蕃地相合此乃禹貢之黒水無可疑者經云華陽黒水唯梁州黒水西河唯雍州蓋伊吾沙州為雍之西境雅黎天全徼外吐蕃以及於南海皆梁之西境是可見黒水源流至逺且大如此眞足以界二州之疆域矣小谷口薈蕞行水金鑑卷九十一
