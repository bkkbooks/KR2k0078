body:
  text: 行水金鑑卷九十二江南按察使傅澤洪撰運河水哀公九年秋吳城邗溝通江淮左傳於邗江築城穿溝東北通射陽湖西北至末一作宋口入淮通糧道也今廣陵邗江是杜預春秋左傳注在射陽湖古射陂也今山陽縣東南八十里與鹽城寶應二縣分水縣西有山陽瀆即古邗溝其縣北五里之北神堰即古末口也吳王夫差既殺申胥不稔於歲乃起師北征闕為深溝於商魯之間北屬之沂西屬之濟以會晉公午於黃池國語江淮漕運尚矣春秋時吳穿邗溝漢吳王濞開邗溝通道海陵隋開邗溝自山陽至揚子入江宋徽宗宣和三年詔揚州沿於江海逹於淮泗東坡書傳云吳王夫差闕溝通水而江始有入淮之道禹時則無之愚按吳之通水有二焉左氏傳哀公九年吳城邗溝通江淮此自江入淮之道也哀十三年會黃池注云陳留封邱縣南有黃亭近濟水此自淮入汴之道也閻若璩云按此句從初刊本增補困學紀聞吳越春秋吳將伐齊自廣陵闕江通淮曰渠水漢志江都縣有渠水首受江北至射陽入湖是也又名中瀆水水經注中瀆水首受江於江都縣縣城臨江昔吳將伐齊北霸中國自廣陵城東南築邗城城下掘深溝謂之韓江亦曰邗溟溝自廣陵出山陽白馬湖徑山陽城西又東謂之山陽浦又東入淮謂之山陽口是也山陽本漢射陽縣屬臨淮郡晉義熙中改曰山陽吳幼清云江北淮南地高於水雖曰溝通江淮二水之間掘一橫溝兩端築隄壅水在溝中若欲行舟須自江中拽舟上溝行溝既盡又拽舟下淮江淮二水實未嘗通流也渭按後世堰閘之法可以隨時啓閉舟至則開舟過則閉今運河諸閘皆然不聞有拽舟之事邗溝當亦如此且左氏明言溝通江淮何以云未嘗通流邪或問吳自哀九年溝通江淮之後十年伐齊十一年又伐齊十二年會魯於槖皋十三年會晉於黃池國語云夫差既退使告勞於周曰余沿江泝淮闕溝深水出於商魯之間其所沿泝者非即邗江至末口之道乎曰非也射陽以南之水引江以通湖不可謂之江射陽以北諸路由湖以達淮不可謂之淮其所稱沿江泝淮蓋即禹貢揚州之貢道耳何以知之邗溝之開杜注但云通糧道其水未必能深廣觀隋開皇中山陽瀆既開而猶不勝戰艦則吳人所乘餘皇戈船之類不可由此瀆明矣故哀公十年公會吳伐齊左傳云徐承帥舟師將自海入齊齊人敗之吳師乃還十三年黃池之役於越入吳國語云越師沿海泝淮以絶吳路嚮使伐齊由邗溝則徐承何獨帥舟師泛海其自會而歸越師欲絶其路亦必泝江而不泝淮矣故知吳王沿江泝淮仍用禹貢揚州之貢道也禹貢錐指管子曰粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則衆有飢色孫武曰千里餽糧士有飢色食敵一鍾當吾二十鍾是言粟不可推移則糴之者無利糶之處受害按禹貢百里賦納總二百里納銍三百里納秸服四百里納粟五百里米則物重而粗者為近賦物輕而精者為逺賦若數千百里漕運其費百倍秦欲攻胸奴運糧使天下飛芻挽粟運載芻藳令疾至故曰飛芻也挽粟謂引車兩也音晚起於黃腄直瑞反又音誰琅琊負海之郡轉輸北河黃腄二縣並在東萊言自東萊及琅琊緣海諸郡皆令轉輸至北河也黃即今黃縣腄即今文登縣並今東牟郡縣琅琊今高密琅玡郡地北河今朔方之北河也率三十鍾而致一石六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石杜佑通典漢興漕轉山東粟以給中都官歲不過數十萬石索隱曰説文云漕水轉穀也一云車運曰轉水運曰漕中都猶都內也皆天子之倉府以給中都官者即今太倉以穡官儲者是也書史記平準漢初致山東之粟不過歲數十萬石至孝武而歲至六百萬石幾十倍其數矣雖征斂苛煩取之無藝亦由河渠疏利致之有道也文獻通考孝文時賈誼上説曰天子都長安而以淮南東道為奉地鏹道數千不輕致輸郡或乃越諸侯而遂調均發徵至無狀也古者天子地方千里中之而為都輸將繇使其逺者不在五百里而至公侯地百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺方人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少而人之所苦甚多也通典當是時漢孝武建元中通西南夷作者數萬人千里負擔饋糧率十餘鍾致一石音義曰鍾六斗四升又興十餘萬人築衛朔方轉漕甚遼逺自山東咸被其勞史記平準書鄭當時為大農言曰異時關東漕粟從渭中上度六月而罷而漕水道九百餘里時有難處引渭穿渠起長安並南山下至河三百餘里徑易漕度可令三月罷而渠下民田萬餘頃又可得以溉田此損漕省卒而益肥關中之地得榖天子以為然令齊人水工徐伯表索隱曰舊説徐伯表水工姓名也小顔云以為表者循行穿渠之處而表記之若今竪標表不是名也悉發卒徐廣曰一云悉衆數萬人穿漕渠三歲而通通以漕大便利其後漕稍多而渠下之民頗得以溉田矣其後河東守番係言漕從山東西索隱曰番音婆又音潘詩小雅云番維司徒潘氏也係音系從山東西者謂從山東運漕而西入關也歲百餘萬石更底柱之限敗亡甚多而亦煩費穿渠引汾正義曰括地志云汾水源出嵐州靜樂縣北百三十里管涔山北東南流入并州即西南流入至絳州蒲州入河也溉皮氏汾陰下正義曰括地志云皮氏故城在絳州龍門縣西百三十步自秦漢魏晉皮氏縣皆治也汾陰故城俗名殷湯城在蒲汾陰縣北九里漢汾陰縣是也引河灌汾陰蒲坂下度可得五千頃五千頃故盡河壖棄地韋昭曰壖音而緣反謂緣河邉地也索隱曰又音人兖反民茭牧其中耳索隱曰茭乾草也謂民牧茭及牧畜於中也今槩田之度可得榖二百萬石以上榖從渭上與關中無異而砥柱之東可無復漕天子以為然發卒數萬人作渠田數歲河移徙渠不利則田者不能償種久之河東渠田廢豫越人令少府以為稍入如淳曰時越人有徙者以田與之其租稅入少府少索隱曰其田既薄越人徙居者習水利故與之而梢其稅入之於少府其後人有上書欲通褎斜道韋昭曰褎中縣也斜谷名音邪瓉曰褒斜二水名水正義曰括地志云裦谷在梁州裦城縣北五十里斜源出裦城縣西北九十八里衙嶺山與裦水同源而派流漢書溝洫志裦水通河斜水通渭皆以行船是也按褒城即裦中縣也及漕事下御史大夫張湯湯問其事因言抵蜀從故道正義曰括地志云鳳州兩當縣本漢故道縣也在州之西五十里故道多阪回逺今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽正義曰南陽縣即今鄧州也上沔入褒褒之絶水至斜間百餘里以車轉從斜下下渭如此漢中之穀可致山東從沔無限正義曰限之言多也山東謂河南之東山南之東及江南淮南皆經砥柱主運今並從沔便於三門之漕也便於砥柱之漕且褒斜材朩竹箭之饒擬於巴蜀天子以為然拜湯子卬為漢中守發數萬人作裦斜道五百餘里道果便近而水湍石徐廣曰湍字一本作溲不可漕史記河渠書番係欲省底柱之漕穿汾河渠以為溉田作者數萬人鄭當時為渭漕渠回逺鑿直渠自長安至華陰作者數萬人朔方亦穿渠作者數萬人各歷二三期功未就費亦各巨萬十數史記平凖書漢武帝元光六年春穿漕渠通渭漢書武帝本紀漢明帝永平十二年夏四月遣將作謁者王吳修汴渠後漢書明帝本紀致堂胡氏曰世言隋煬帝開汴渠以幸揚州文士考禹貢言堯都冀州居河下流而入都貢賦重于用民力故每州必記入河之水獨淮與河無相通之道求之故迹而不得乃疑汴水自禹以來有之不起於隋世既久逺或名鴻溝或名官渡或名汴渠大概皆自河入淮故淮可引江湖之舟以達於冀也今據後漢書則平帝時巳有汴渠曰河汴決壞則謂輸受之所也至是發卒數十萬修渠隄則平地起兩岸而汴水行其中也十里立一水門更相洄注則以節制上流恐河溢為患也是正與今之汴渠制度無異特未有導洛之事耳史曰渠隄自滎陽而東則上疑其為鴻溝下疑其為官渡者恐未得其要官渡直黃河也故袁曹相距沮授曰悠悠黃河吾其濟乎汴渠自西而東鴻溝乃橫亘南北故曰未得其要也獨所謂自禹以來有汴者此則不易之論也文獻通考鄧訓字平叔南陽新野人永平中理呼沱石臼河從都慮至羊腸倉今嵐州羊腸坂是也欲令通漕太原吏人苦役連年無成轉運所經三百八十九隘前後沒溺死者不可勝算建初三年拜訓謁者使監領其事訓考量隱括知大功難立具以上言肅宗從之遂罷其役更用驢輦歲省費億萬計全活徒士數千人遷護烏桓校尉注後漢書平古今注云永十年作常山呼沱河蒲吾渠通漕船也即此漢章帝建初三年夏四月已巳罷常山呼沱石臼河漕後漢書章帝紀訓石臼河名也在今定州唐縣東北時鄧上言此漕難成遂罷之虞詡遷武都太守先是運道艱險舟車不通驢馬負載僦五致一詡乃自將吏士按行川谷由沮至下辨沮及下辨並縣名沮今興州順政縣也下辨今成州同谷縣也沮音七余反數十里皆燒石剪水開漕船道續漢書曰下辨東三十餘里有峽中當泉水生大石障塞水流每至春夏輒溢沒秋稼壞敗營郭詡乃使人燒石以水灌之石皆坼裂因鐫去石遂無泛溺之患也以人僦直雇借傭者於是水運通利歲省四千餘萬後漢書虞詡傳府興州今陜西漢中略陽縣成州今鞏昌府成縣漢並屬武都郡唐為興州成州明一統志載虞詡武都太守開漕船道水運通利初到郡户才盈萬詡招還流散增至四萬戶明徐貞明作西北水利議亦曰虞詡復三郡激河浚渠為屯田而省內郡之費皆以表揚其有功德於民也今陜西通志詡名宦傳竟軼其事漢獻帝建安九年春正月濟河遏淇水入白溝以通糧道三國志漢獻帝建安十一年鑿渠自滹沱入𣲖水𣲖音孤名平虜渠又從泃河口泃音句鑿入潞河名泉州渠以通海三國志三國時遼西烏桓以袁尚兄弟入塞曹操將討之乃鑿二渠以通運一自滹沱入𣲖水謂之平虜渠一自泃口入潞河謂之泉州渠以通海運説文𣲖水出鴈門葰人戍夫山東北入海水經泃水出無終西山西北流至平谷又南流入于潞河又東合泉水渠口曹操所築也渠東至樂安亭南與瀘水合入海按二水當時通漕以制遼左所謂平虜渠者在今都城之南疑即滹沱入運處也唯泉州渠乃在京北而東入遼海不知定在何處若因其遺迹通之以饋平盧遼西亦一便也泉州故城在幽州雍奴筆麈漢獻帝建安十八年九月鑿渠引漳水入白溝以通河三國志入水經注是年魏太祖鑿渠引漳水東淸洹以通河漕名曰利漕渠漢獻帝建安二十四年上穿陽渠引洛水為漕百姓得其利後漢書張純傳渠在洛陽城南陽賈逵為豫州刺史州南與吳接逵外修軍旅內治民事遏鄢汝造新陂又斷山溜長溪水造小弋陽陂又通運渠二百餘里所謂賈侯渠者也三國志賈逵傳績逵黃初中刺豫州考二千石以下不如法文帝稱為真刺史布告天下以豫州為法逵卒吏民追思為刻石立祠見一統志鄧艾遷尚書郎時欲廣田蓄榖為滅賊資使艾行陳項以東至夀春艾以為田良水少不足以盡地利宜開河渠可以引水澆溉大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間上下田良可省許昌左右諸稻田并水東下令淮北二萬人淮南三萬人十二分休常有四萬人且田且守水豐常收三倍於西計除衆費歲完五百萬斛以為軍資六七年間可積三十萬餘斛於淮北此則十萬之衆五年食也以此乘敵無不克矣宣帝善之事皆施行正始二年乃開廣漕渠每東南有事大軍興舉泛舟而下達於江淮資食有儲而無水患艾所建也三國志鄧艾傳魏正始三年三月奏開廣漕渠引河入汴溉東南諸陂始大佃於淮北四年秋九月大興屯守廣開淮陽百尺二渠又修諸陂於潁之南北萬餘頃自是淮北倉庾相望夀陽至于京師農官屯兵連屬焉晉書宣帝本紀大皇時使陳勳於句容縣鑿開水道立十二埭以通吳會諸郡故船不復由京口吳録晉武帝泰始十年鑿陜南山決河東注洛以通運漕晉書武帝本紀杜預都督荆州舊水道唯沔漢達江陵千數百里北無通路又巴丘湖沅湘之會表裏山川實為險固荆蠻之所恃也預乃開楊口起夏水達巴陵千餘里內㵼長江之險外通零桂之漕南土歌之曰後世無叛由杜翁孰識智名與勇功晉書杜預傳李矩為汝陰太守永嘉初使矩與汝南太守袁孚率衆修洛陽千金堨以利運漕晉書李矩傳河南十二縣境簿曰河南縣城東十五里有千金堨洛陽記曰千金堨舊堰穀水魏時更修此堰謂之千金堨積石為堨而開溝渠五所謂之五龍渠渠上立堨堨之東首立一石人石人腹上刻勒云太和五年二月八日庚戌造築此堨更開溝渠此水衡渠上其水此有誤當云此水衝渠止其水助其堅也必經年歷世是故部立石人以記之云爾蓋魏文帝修王張故績也堨是都水使者陳協所造也語林曰陳協數進阮步兵酒後晉文王欲修九龍堰阮舉協文王用之掘地得古承水銅龍六枚堰遂成水歷堨東注謂之千金渠逮於晉世大水暴注溝瀆泄壞又廣功焉石人東脅下文云太始七年六月二十三日大水并瀑出常流上三丈蕩壞二堨五龍泄水南注瀉下加歲久漱齧每潦即壞歷載消棄大功今故為今堨宋本作損棄大功故為今堨更於西開泄名曰代龍渠地形正平誠得為宋本作㵼泄至理千金不與水勢激爭無緣當壞由其卑下水得輸宋本作踰上漱齧故也今增高千金於舊一丈四尺五龍自然必歷世無患若五龍歲久復壞可轉於西更開二堨二渠合用二十三萬五千六百九十八功以其年十月二十三日起作功重人少到八年四月二十日畢代龍渠即九龍渠也後張方入洛破千金堨公私賴之水積年渠堨頽毁石砌殆盡遺基見存朝廷太和中修復故堨按千金堨石人西脅下文云若溝渠久疏深引水者當於河南城北石磧西更開渠北出使首孤立故溝東下因故易就磧堅便時事業巳訖然後見之加邊方多事人力苦少又渠堨新成未患於水是以不敢預修通之若於後當復興功者宜就西磧故書之於石以遺後賢矣雖石磧淪敗故迹可馮水經注兖州既平幼度患水道險澀糧運艱難用督護聞人奭謀堰呂梁水樹柵立七埭為派擁二岸之流以利運漕晉書謝幼度傳隋文帝受禪薛胄三遷兖州刺史先是兖州城東沂泗二水合而南流泛濫大澤中胄遂積石堰之決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兖渠北史薛胄傳隋文帝開皇三年朝廷以京師倉廩尚虛議為水旱之備於是詔於蒲陜虢熊伊洛鄭懷邵衛汴許汝等水次十三州置募運米丁又于衛州置黎陽倉洛州置河陽倉陜州置常平倉華州置廣通倉轉相灌注漕關東及汾晉之粟以給京師又遣倉部侍郎韋瓉向蒲陜以東募人能于洛陽運米四十石經砥柱之險達於常平者免其征戍其後以渭水多沙流有深淺漕者苦之四年詔曰京邑所居五方輻輳重關四塞水陸艱難大河之流波瀾東注百川海瀆萬里交通雖三門之下或有危慮若發自小平陸運至陜還從河水入于渭川兼及上流控引汾晉舟車來去為益殊廣而渭川水力大小無常流淺沙深即成阻閡計其途路數百而巳動移氣序不能往復操舟之役人亦勞止朕君臨區宇興利除害公私之弊情甚愍之故東發潼關西引渭水因藉人力開通漕渠量事成功易可成就巳令工匠巡歷渠道觀地理之宜審終久之義一得開鑿萬代無毁可使官及私家方舟巨舫晨昏漕運沿泝不停旬日之功堪省億萬誠知時當炎暑動致殷勤然不有暫勞安能永逸宣告人庶知朕意焉於是命宇文愷率水工鑿渠引渭水自大興城東至潼關三百餘里名曰廣通渠轉運通利關內賴之其後山東頻年霖雨杞宋陳亳曹戴譙潁等諸州達於滄海皆困水災所在沈溺十八年天子遣使將水工巡行川源相視高下發隨近丁以疏導之因乏者開倉賑給前後用榖五百餘石遭水之處租調皆免自是頻有年矣隋書食貨志隋文帝開皇四年六月壬子開渠自渭達河以通運漕隋書高祖本紀蘇孝慈為太子右衛率兵部尚書明年上於陜州置常平倉轉輸京下以渭水多沙流乍深乍淺漕運者苦之于是決渭水為渠以屬河令孝慈督其役渠成上善之隋書蘇孝慈傳開皇中徵衍為開漕渠大監部率水工鑿渠引渭水經大興城北東至潼關漕運四百餘里關中賴之名曰富人渠北史郭衍傳隋文帝開皇七年夏四月庚戌於揚州開山陽瀆以通運漕隋書高祖夲紀隋煬帝大業元年辛亥發河南諸郡男女百餘萬開通濟渠自西苑引穀洛水達於河自板渚引河通於淮隋書煬帝本紀昔禹於滎澤下分大河為陰溝出之淮泗至浚儀西北復分二渠其後或曰鴻溝或曰浪宕渠或曰浚儀渠或曰石門渠石門渠東合濟水與河渠東注至於敖山之北而兼汴水又東至滎陽之北而旃然之水東流入汴滎陽之西有廣武二城汴水自二城間小澗中東流而出濟水至此乃絶桓溫將通之而不果者晉太和之中也劉裕浚之始有湍流奔注以漕運者義熙之間也皇甫誼發河南丁夫百萬開之起滎陽入淮千有餘里更名之曰通濟渠者隋大業之初也後世因其利焉曽子固集隋煬帝大業四年春正月乙巳詔發河北諸郡男女百餘萬開永濟渠引沁水南達于河北通涿郡隋書煬帝本紀大業元年發河南道諸州郡兵夫五十餘萬開通濟渠自河起滎澤入淮千餘里又發淮南諸州郡丁夫十餘萬開𨝍溝自山陽淮至于揚子入江三百餘里水面闊四十步造龍舟兩岸為大道種榆栁自東郡至江都二千餘里樹蔭相交每兩驛置一宫為停頓之所自京師至江都離宫四十餘所三年六月敕開永濟渠引汾水入河又自汾水東北開渠合渠水至於涿郡二千餘里通龍舟大業雜記元唐允恭曰綱鑑大業年發丁百萬開通濟渠自西苑引穀洛水達於河復自板渚引河入汴引汴入泗以達於濟又發民十萬開𨝍溝入江溝廣四十步傍築御道樹以栁發明云𨝍溝即官河在揚州府城北一百二十里昔吳王夫差將北霸中國自廣陵城東南𨝍城下築深溝謂之𨝍江亦曰𨝍溝自江東北通射陽湖又西北入淮一名漕河江溝未詳處所愚按江字連上當以開𨝍溝入江句絶溝字連下當以溝廣四十步為句觀大業拾遺可知發明以開𨝍溝入江溝為句且云江溝未詳處所良由句讀誤也睢陽有王氣出占天耿純臣奏後五百年當有天子興煬帝觀廣陵圖翼日與大臣言欲泛巨舟自洛入河自河達海入淮至廣陵時有諌議大夫蕭懷靜奏曰臣聞秦始皇時金陵有王氣始皇使人鑿􅓟砥柱王氣遂絶今睢陽有王氣又陛下喜在東南欲泛孟津又慮危險况大梁西北有故河道乃是秦時王離畎水灌大梁之處欲乞陛下廣集兵夫於大梁起首開掘西自河陰引孟津水入東至淮放孟津水出此間地不過千里况於睢陽境過一則路達廣陵二則鑿穿王氣帝聞奏大喜羣臣皆默帝乃出敕朝堂有諌開河者斬之詔以征北大總管麻叔謀為開河都護以蕩冦將軍李淵為副使淵稱疾不赴即以左屯衛將軍令狐達代淵為開渠副使都督自大梁起首於樂臺之北建修渠所署命之為卞渠因名其府署為卞渠上源傳舍也詔發天下丁夫男十五以上五十以下者皆至如有隱匿者斬帝以河水經於卞乃賜卞字加水丁夫計三百六十萬人乃更五家出一人或老幼或婦人等供饋飲食又令少年驍卒五萬人各執杖為吏如節級隊長之類共五百四十三萬餘人叔謀乃令三分中取一分人自上源而西至河陰通連古河道迤邐趨愁思臺而至北去又令二分丁夫自上源驛而東去乃隋大業五年八月上旬建功畚鍤既集東西橫布數千里及開汴梁盈灌口點檢丁夫約折二百五十萬人其部役兵士舊五萬人折二萬三千人功既畢上言於帝決下口注水入汴梁帝自洛陽遷駕大渠詔江淮諸州造大船五百隻使命至急如星火民間有配著造船一隻者家産破用皆盡猶有不足枷項笞背然後鬻貨男女以供官用龍舟既成泛江沿淮而下至大梁又别加修飾舳艫相繼連接千里自大梁至淮口聨綿不絶錦帆過處香聞百里開河記通典汴渠在河南府河陰縣南二百五十步今名通濟渠隋煬帝開導西通河洛南達江淮河陰後屬孟州汴州有通濟渠隋煬帝開引黃河水以通江淮漕運兼引汴水即浪與浪蕩同渠也隋志在浚儀縣九域志汴水古通濟渠也在開封縣周語穀洛鬬注云洛在王城之南榖在王城之北東入於瀍至靈王時穀水盛出于王城之西而南流合於洛水山海經澗水西北流注於穀水通典榖水本澗水經苑中入於洛板渚水經河水又東合泛水又東經板城北注云有津謂之板城渚口在孟州汜水左傳吳城𨝍溝通江淮注云於𨝍江築城穿溝東北通射陽湖西北至末口入淮通糧道也今廣陵韓江是隋開𨝍溝自山陽至揚子入江渠廣四十步自楚州寶應縣北流入淮困學紀聞注閻若璩按王氏引杜注末口與水經注合足證今疏作宋口者非又自楚州寶應縣十字宜衍蓋上文是淮入江不應旋云江入淮也大業六年十二月敕開江南河自京口至餘杭郡八百餘里水面闊十餘丈又擬通龍舟驛宫草頓並足欲東巡會稽大業雜記隋煬帝開通濟渠自東都西苑引穀洛之水達於河又自板渚引河水達於汴又自大梁東引汴水入泗達於淮又自山陽至揚子達於江於是江淮河汴之水相屬而為一矣煬帝又開永濟渠因沁水南連於河北通涿郡又穿江南河自京國至杭州八百里蓋今所用者皆其舊迹也夫會通河自濟汶以下江河淮泗通流為一則通濟之遺也滹沱豫章則永濟之遺也煬帝此舉為其國促數年之祚而為後世開萬世之利可謂不仁而有功者矣秦皇亦然今東起遼陽北至上郡延袤萬里有邊城之利皆非長城之墟耶嗟夫此未易與一二淺見者道也筆麈隋雖無道然開此三渠以通天下漕百世之後賴以通濟通漕類編行水金鑑卷九十二
