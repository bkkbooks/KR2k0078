body:
  text: 行水金鑑卷九十三江南按察使傅澤洪撰運河水唐都長安而關中號稱沃野然其土地狹所出不足以給京師備水旱故常轉漕東南之粟高祖太宗之時用物有節而易贍水陸漕運歲不過二十萬石故漕事簡自高宗以後歲益增多而功利繁興民亦罹其弊矣初江淮漕租米至東都輸含嘉倉以車或駝陸運至陜而水行來逺多風波覆溺之患其失常十七八故其率一斛得八斗為成勞而陸運至陜才三百里率兩斛計庸錢千民送租者皆有水陸之值而河有三門砥柱之險唐書食貨志唐高祖武德八年水部郎中姜行本請於隴州開五節堰引水通運許之舊唐書食貨志隴州汧源縣有五節堰引隴川水通漕武德八年水部郎中姜行本開唐書地理志汧源縣今省入陜西鳳翔府隴州陜西通志云五節堰今廢唐高宗顯慶元年苑西監褚朗議鑿三門山為梁可通陸運乃發卒六千鑿之功不成其後將作大匠楊務廉又鑿為棧以挽漕舟挽夫繫二鈲於胸而繩多絶挽夫輒墜死則以逃亡報因繫其父母妻子人以為苦唐書食貨志唐高宗咸亨三年關中饑監察御史王師順奏請運晉絳州倉粟以贍之上委以運職河渭之間舟楫相繼會於渭南自師順始之也舊唐書食貨志趙州昭慶縣有澧水渠儀鳳三年令李𤣥開以溉田通漕唐書地理志縣昭慶今為直𨽻真定府趙州隆平澧水渠在縣城下朗州武陵縣有永泰渠武后光宅中刺史胡處立開通漕且為火備唐書地理志志武陵縣今為湖廣常德府附郭一統云永泰渠在府城北鳳翔府虢縣西北有升元渠引汧水至咸陽武后垂拱初運岐隴水入京城有高泉渠如意元年開引水入縣城唐書地理志在虢縣今為鳳翔府寶雞岐山二縣地一統志汧河隴州治西南源出汧山流經汧陽縣至寶雞縣東入渭高泉陜西通志云在寶雞縣東八十里泗州漣水縣故有新漕渠南通淮武后垂拱四年開以通海沂密等州唐書地理志東漣水縣今為江南淮安府安東縣今安縣有中漣河東漣河西漣河中漣在治北三里河闊八十餘丈北通官河南通市河下流三里為東漣闊三十餘丈上流三十里為西漣闊如東漣源自西北大湖來東南入淮殆即當時之遺跡歟陳留郡開封縣有湛渠武后載初元年引汴注白溝以通曹兖賦稅唐書地理志一開封縣今為河南開封府祥符縣統志湛渠在府城外唐則天皇后大足元年六月於東都立德坊南穿新潭安置諸州租船舊唐書食貨志河南府河南縣有洛漕新潭大足元年開以置租船唐書地理志府河南縣今為河南河南洛陽縣唐中宗神龍三年滄州刺史姜師度於薊州之北漲水為溝以備奚契丹之寇又約舊渠傍海穿漕號平虜渠以避海難運糧舊唐書食貨志韋景駿神龍中歷肥鄉令縣北瀕漳連年泛溢人苦之舊防迫漕渠雖峭岸隨即壞決景駿相地勢益南千步因高築鄣水至隄址輒去其北燥為腴田又維艚以梁其上而廢長橋功少費約後遂為法唐書韋景駿傳云舊唐書景駿傳漳水舊有架柱長橋每年修葺景駿又改造為浮橋自是無復水患至今賴焉泗州盱眙縣有直河太極元年敕使魏景淸引淮水至黃土岡以通揚州唐書地理志注盱眙縣今為江南鳳陽府屬一統志直河在泗州東北二十里則與盱眙縣通流可知也齊浣定州義豐人開元初為汴州刺史以淮至徐城險急鑿渠十八里入淸水人便其漕唐書齊浣傳姜師度魏人開元初遷陜州刺史州西太原倉控兩京水陸二運常自倉車載米至河際然後登舟師度遂鑿地道自上注之便至水次所省萬計再遷同州又於朝邑河西二縣界就古通靈陂擇地引雒水及堰黃河灌之以種稻田凡二千餘頃內置屯十餘所收穫萬計特加金紫光祿大夫舊唐書姜師度傳唐明皇開元二年河南尹李傑奏汴州東有梁公堰年久堰破江淮漕運不通發汴鄭丁夫以濬之省功速就公私深以為利舊唐書食貨志李傑本名務光滏陽人開元初為河南尹先是河汴間有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以浚之省功速就公私深以為利刋石水濵以紀其蹟尋代宋璟為御史大夫舊唐書李傑傳孟州河陰縣有梁公堰在河汴間開元二年河南尹李傑因故渠浚之以便漕運唐書地理志封河陰縣今為河南開府屬華州華陰縣西二十四里有敷水渠開元二年姜師度鑿以泄水害五年刺史樊忱復鑿之使通渭漕唐書地理志華陰縣今為陜西西安府屬陜西通志敷水渠在華陰縣西三十里源出大敷谷唐明皇開元十年二月四日伊水泛漲毁都城南龍門平地水深六尺以上入漕河水次屋舍樹朩蕩盡舊唐書五行志唐明皇開元十四年七月十四日瀍水暴漲流入洛漕漂沒諸州租船數百艘溺死者甚衆舊唐書五行志唐明皇開元十五年正月令將作大匠范安及檢行鄭州河口斗門先是洛陽人劉宗器上言請塞汜水舊汴河口於下流滎澤界開梁公堰置斗門以通淮汴擢拜左衛率府胄曹至是新漕塞行舟不通貶宗器等安及遂發河南府懷鄭汴滑三萬人疏決兼舊河口旬日而畢舊唐書食貨志唐明皇開元十八年六月乙丑東都瀍水暴漲漂損揚楚淄德等州租船壬午東都洛水泛漲壞天津永濟二橋及漕渠斗門漂損提象門外助鋪及仗舍又損居人廬舍千餘家舊唐書五行志唐明皇開元十八年宣州刺史裴耀卿朝集京師𤣥宗訪以漕事耀卿條上便宜曰江南戶口多而無征防之役然送租庸調物以歲二月至揚州入斗門四月巳後始度淮入汴常苦水淺六七月乃至河口而河水方漲須八九月水落始得上河入洛而漕路多梗船檣阻隘江南之人不習河事轉雇河師水手重為勞費其得行日少阻滯日多今漢隋漕路瀕河倉廩遺跡可尋可於河口置武牢倉鞏縣置洛口倉使江南之舟不入黃河黃河之舟不入洛口而河陽柏崖太原永豐渭南諸倉節級轉運水通則舟行水淺則寓於倉以待則舟無停留而物不耗失此甚利也𤣥宗初不省二十一年耀卿為京兆尹京師雨水穀踊貴𤣥宗將幸東都復問耀卿漕事耀卿因請罷陜陸運而置倉河口使江南漕舟至河口者輸粟於倉而去縣官雇舟以分入河洛置倉三門東西漕舟輸其東倉而陸運以輸西倉復以舟漕以避三門之水險𤣥宗以為然乃於河隂置河隂倉河西置柏崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河隂倉自河隂西至太原倉謂之北運自太原倉浮渭以實關中𤣥宗大悅拜耀卿為黃門侍郎同中書門下平章事兼江淮都轉運使以鄭州刺史崔希逸河南少尹蕭炅為副使益漕晉絳魏濮邢貝濟北之租輸諸倉轉而入渭凡三嵗漕七百萬石省陸運傭錢三十萬緡是時民久不罹兵革物力豐富朝廷用度亦廣不計道里之費而民之輸送所出水陸之直增以函腳營窖之名民間傳言用斗錢運斗米其糜耗如此及耀卿罷相北運頗艱米嵗至京師才百萬石二十五年遂罷北運而崔希逸為河南陜運使歲運百八十萬石其後以太倉積粟有餘歲減漕數十萬石唐書食貨志裴耀卿遷京兆尹明年秋雨害稼京師饑帝將幸東都召問所以救人者耀卿曰陛下既東巡百司畢從則太倉三輔可遣重臣分道賑給自東都益廣漕運以實關輔關輔既實則乘輿西還事蔑不濟且國家大本在京師但秦地狹水旱易匱貞觀永徽時祿廩者少歲漕粟二十萬略足今用度寖廣運數倍且不支故數東幸以就厫粟為國大計臣願廣陜運道使京師常有三年食雖水旱不足憂今天下輸丁約四百萬使丁出百錢為陜洛運費又益半為營窖用分納司農河南陜州又令租米悉輸東都從都至陜河益湍沮若廣漕路變陸為水所支尚贏萬計且河南租船候水始進吳工不便河漕處處停留易生隱盜請置倉河口以納東租然後官自雇載分入河洛度三門東西各築厫倉自東至者東倉受之三門迫險則旁鑿以開車道運數十里西倉受之度宜徐運抵太原倉趨河入渭更無留阻可減費巨萬天子然其計拜黃門侍郎同中書門下平章事充轉運使於是置河陰集津三門倉引天下租繇盟津泝洛而西三年積七百萬石省運費三十萬緡或曰以此緡納於上足以明功答曰是謂以國財求寵其可乎敇吏為和市費遷侍中唐書裴耀卿傳潤州丹陽縣開元二十二年刺史齊浣以州北隔江舟行繞瓜步回逺六十里多風濤乃於京口埭下直趨渡江二十里開伊婁河二十五里渡楊子立埭歲利百億舟不漂溺唐書地理志年舊唐書明皇本紀載其事在開元二十六冬未知孰是丹陽縣今為江南鎮江府屬一統志伊婁河在鎮江府城南成都府溫江縣有新源水開元二十三年長史章仇兼瓊因蜀王秀故渠開通漕西山竹朩唐書地理志川溫江縣即今四成都府屬瀛州河間縣西南五里有長豐渠開元二十五年刺史盧暉自束城平舒引滹沱河東入淇通漕溉田五百餘頃唐書地理志任河間縣今為直𨽻河間府附郭一統志長豐渠在邱縣西北自河間府舊束城引滹沱水東流通漕溉田齊浣遷潤州刺史潤州北界隔大江至瓜步尾紆滙六十里船繞瓜步多為風濤所漂損浣乃移漕路於京口塘下直渡江二十里又開伊婁河二十五里即達楊子縣自是免漂損之災歲減腳錢數十萬數年復為汴州刺史淮汴水運路自虹縣至臨淮一百五十里水流迅急舊用牛曳竹索上下流急難制乃奏自虹縣下開河三十餘里入於淸河百餘里出淸水又開河至淮陰縣北岸入淮免淮流湍險之害久之新河水復迅急又多僵石漕運艱澀行旅弊之浣因高力士中助連為兩道採訪使遂興開漕之利以中人主意復勾剝貨財賂遺中貴物議薄之舊唐書齊浣傳宿州虹縣廣濟新渠開元二十七年採訪使齊浣開自虹至淮陰北十八里入淮以便漕運既成湍急不可行遂廢唐書地理志陽本紀略同虹縣今為鳳府屬虹縣志康熙十一年知縣龔起翬詳開河北從陸家溝至洋河南由界溝至淮河南北交通南來糧艘由高郵洪澤至泗州上五河界溝至虹縣又由虹至陸家溝出白洋河入駱馬湖北回糧艘由駱馬湖至虹縣出高郵亦然為漕運之間道然虹縣開河不專恃陸家溝一道今年水漲河形悉見一道由渭橋入長直溝竟達五河一道由渭橋入長直溝橫入汴河出城東至靑洋達泗州此四道皆可開唯渭橋近徐溪口接靈璧孟山諸湖可引以資漕閘若陸家溝至秦橋水勢直瀉一決百里無涓滴之蓄恐不足以資漕挽也據此則虹之運道開之可以永利魏州貴鄉縣有西渠開元二十八年刺史盧暉徙永濟渠自石灰窠引流至城西注魏橋以通江淮之貨唐書地理志大明皇本紀亦載之在是年九月貴鄉縣今為直𨽻名府元城縣一統志永濟渠在臨河廢縣西北三十里自濬縣入界東北入內黃縣臨河廢縣在開州西六十里本漢黎陽縣地平州馬城縣古海陽城也開元二十八年置以通水運唐書地理志十馬城廢縣在今直𨽻永平府灤州城南二里海陽城在府城南三十里唐明皇開元二十九年陜郡太守李齊物鑿三門山以通運闢三門巔踰巖之險地俾負索引艦升於安流自齊物始也舊唐書食貨志是年陜郡太守李齊物鑿砥柱為門以通漕開其山巔為挽路燒石沃醯而鑿之然棄石入河激水益湍怒舟不能入新門候其水漲以人挽舟而上天子疑之遣宦者按視齊物厚賂使者還言便齊物入為鴻臚卿以長安令韋堅代之新唐書食貨志於齊物鑿山巔棄石河致水激舟難入門功不成矣幸乘水漲行賄言便入為鴻臚二人欺君之罪大矣哉是年暴水伊洛及支川皆溢損居人廬舍秋稼無遺壞東都天津橋及東西漕河南北諸州皆多漂沒舊唐書五行志唐明皇天寶元年春正月甲寅陜郡太守李齊物先鑿三門辛未渠成放流舊唐書明皇本紀陜州平陸縣天寶元年太守李齊物開三門以利漕運唐書地理志志齊物行賄粉飾食貨既明著之地理志復言其利則激水湍怒之處至元年始克成之平陸縣今山西平陽府屬是年命陜郡太守韋堅引滻水開廣運潭於望春亭之東以通河渭京兆尹韓朝宗又分渭水入自金光門置潭於西市之兩衙以貯材朩舊唐書明皇本紀唐明皇天寶二年三月壬子韋堅開廣濟潭畢功盛陳舟艦舊唐書明皇本紀華州華陰縣有漕渠自苑西引渭水因石渠會灞滻經廣運潭至縣入魏天寶三載韋堅開唐書地理志韋堅萬年人天寶元年為陜郡太守水陸轉運使自西漢及隋有運渠自關門西抵長安以通山東租賦奏請於咸陽擁渭水作興成堰截灞滻水傍渭東注至關西永豐倉下與渭合於長安城東九里長樂坡下滻水之上架苑牆東面有望春樓樓下穿廣運潭以通舟楫二年而成舊唐書韋堅傳堅始鑿潭多壞民冢墓起江淮至長安公私騷然及得罪林甫遣使江淮鈎索堅罪捕治舟夫漕史所在獄皆滿郡縣剝斂償輸責及鄰伍多祼死牢户林甫死乃止新唐書韋堅傳韋堅為陜郡太守兼水陸運使治漢隋運渠起闕門抵長安通山東租賦乃絶灞滻並渭而東至永豐倉與渭合又與長樂坡瀕苑牆鑿潭於望春樓下以聚漕舟堅因使諸舟各揚其郡名陳其土地所産寶貨諸竒物於栿上先時民間唱俚歌曰得體紇那邪其後得寶符於桃林於是陜縣尉崔成甫更得體歌為得寶𢎞農野堅命舟人為吳楚服大笠廣袖芒屩以歌之成甫又廣之為歌辭十闋自衣闕後緑衣錦半臂紅抹額立第一船為號頭以唱集兩縣婦女百餘人鮮服靚妝鳴鼓吹笛以和之衆艘以次輳樓下天子望見大悅賜其潭名曰廣運潭是歲漕山東粟四百萬石自裴耀卿言漕事進用者常兼轉運之職而韋堅為最初耀卿興漕路請罷陸運而不果廢自景雲中陸運北路分八遞雇民車牛以載開元初河南尹李傑為水陸運使運米歲二百五十萬石而八遞用車千八百乘耀卿罷久之河南尹裴逈以八遞傷牛乃為交場兩遞濵水處為宿場分官總之自龍門東山抵天津橋為石堰以遏水其後大盜起而天下匱矣唐書食貨志天寶中上以三河道險束漕運艱難乃旁北山鑿石為月河以避湍急名曰天寶河歲省運夫五十萬又無覆溺淹滯之患天下稱之其河東西經直長五里餘闊四五丈深三四丈皆鑿堅石匠人於石得古鐵鏟長三尺餘上有平陸二字皆文也上異之藏於內庫遂命改河北縣為平陸縣旌其事也傳信録唐肅宗末年史朝義兵分出宋州淮運於是阻絶租庸鹽鐵泝漢江而上河南尹劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使江淮粟帛繇襄漢越商於以輸京師及代宗出陜州關中空窘於是盛轉輸以給用廣德二年廢勾當度支使以劉晏顓領東都河南淮西江南東西轉運租庸鑄錢鹽鐵轉輸至上都度支所領諸道租庸觀察使凡漕事亦皆決於晏晏即鹽利顧傭分吏督之隨江汴河渭所宜故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河陰斗米費錢百二十晏為歇艎支江船二千艘每船受千斛十船為綱每綱三百人篙工五十自揚州遣將部送至河陰上三門號上門填闕船米斗減錢九十調巴蜀襄漢麻枲竹篠為綯挽舟以朽索腐材代薪物無棄者未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河陰河船之運積渭口渭船之運入太倉歲轉粟百一十萬石無升斗溺者輕貨自揚子至汴州每駝費錢二千二百減九百歲省十餘萬緡又分官吏主丹陽湖禁引溉自是河漕不涸唐書食貨志唐代宗廣德二年二月巳未第五琦開決汴河舊唐書代宗本紀唐代宗永泰二年九月庚申京兆尹黎幹以京城薪炭不給奏開漕渠自南山谷口入京城至薦福寺東街北抵景風延喜門入苑闊八尺深一丈渠成是日上幸安福門以觀之舊唐書代宗本紀元新唐書載其事在大歷年唐代宗大歷八年以關內豐穰減漕十萬石度支和糴以優農晏自天寶末掌出納監歲運知左右藏主財榖三十餘年矣及楊炎為相時建中二年以舊惡罷晏轉運使復歸度支凡江淮漕米以庫部郎中崔河圖主之及田悅李惟嶽李納梁崇義拒命舉天下兵討之諸軍仰給京師而李納田悅兵守渦口梁崇義扼襄鄧南北漕引皆絶京師大恐唐書食貨志劉晏領東都河南江淮轉運租庸鹽鐵常平使時大兵後京師米斗千錢禁膳不兼時甸農挼穗以輸晏乃自按行浮淮泗達於汴入於河右循砥柱硤石觀三門遺迹至河陰鞏洛見宇文愷梁公堰厮河為通濟渠視李傑新隄盡得其病利然畏為人牽制乃移書於宰相元載以為大抵運之利與害各有四京師三輔苦稅入之重淮湖粟至可減徭賦半為一利東都雕破百戶無一存若漕路流通則聚落邑㕓漸可還定為二利諸將有不廷戎虜有侵盜聞我貢輸錯入軍食豐衍可以震耀夷夏為三利若舟車既通百貨雜集航海梯嶠可追貞觀永徽之盛為四利起宜陽熊耳虎牢成臯五百里見戶才千餘居無尺椽㸑無盛煙獸游鬼哭而使轉車挽漕功且難就為一病河汴自寇難以來不復穿治崩岸減朩所在廞淤涉泗千里如罔水行舟為二病東垣砥柱澠池北河之間六百里戍邏久絶奪攘姦宄夾河為藪為三病淮陰去蒲坂亘三千里屯壁相望中軍皆鼎司元侯每言衣無纊食半菽挽漕所至輒留以饋軍非單車使者折簡書所能制為四病載方內擅朝權既得書即盡以漕事委晏故晏得盡其才歲輸始至天子大悅遣衛士以鼓吹迓東渭橋馳使勞曰卿朕鄼侯也凡歲至四十萬斛自是關中雖水旱物不翔貴矣唐書劉晏傳晏字士安南華人唐德宗建中初宰相楊炎用事惡晏乃奪其權其年三月以金部郎中杜佑權勾當江淮水陸轉運使舊唐書食貨志杜佑以秦漢運路出浚儀十里入琵琶溝絶蔡河至陳州而合自隋鑿汴河官漕不通若導流培岸功用甚寡疏雞鳴岡首尾可以通舟陸行才四十里則江湖黔中嶺南蜀漢之粟可方舟而下繇白沙趣東關歷潁蔡涉汴抵東都無濁河泝淮之阻減故道二千餘里㑹李納將李洧以徐州歸命淮路通而止戶部侍郎趙贊又以錢貨出淮迂緩分置汴州東西水陸運兩稅鹽鐡使以度支總大綱貞元初關輔宿兵米斗千錢太倉供天子六宫之膳不及十日禁中不能釀酒以飛龍駝負永豐倉米給禁軍陸運牛死殆盡德宗以給事中崔造敢言為能立事用為相造以江吳素嫉錢穀諸使顓利罔上乃奏諸道觀察使刺史選官部送兩稅至京師廢諸道水陸轉運使及度支巡院江淮轉運使以度支鹽鐵歸尚書省宰相分判六尚書事以戶部侍郎元琇判諸道鹽鐵𣙜酒侍郎吉中孚判度支諸道兩稅增江淮之運浙江東西歲運米七十五萬石復以兩稅易米百萬石江西湖南鄂嶽福建嶺南米亦百二十萬石詔浙江東西節度使韓滉淮南節度使杜亞運至東西渭橋倉諸道有鹽鐵處復置巡院歲終宰相計課最崔造厚元琇而韓滉方領轉運奏國漕不可改帝亦雅器滉復以為江淮轉運使元琇嫉其剛不可共事因有隙琇稱疾罷而滉為度支諸道鹽鐵轉運使於是崔造亦罷滉遂劾琇常餫米淄靑河中而李納懷光倚以搆叛貶琇雷州司戶參軍尋賜死是時汴宋節度使春夏遣官監汴水察盜灌溉者歲漕經砥柱覆者幾半河中有山號米堆運舟入三門雇平陸人為門匠執標指麾一舟百日乃能上諺曰古無門匠墓謂皆溺死也陜虢觀察使李泌益鑿集津倉山西徑為運道屬於三門倉治上路以回空車費錢五萬緡下路減半又為入渭船方五板輸東渭橋太倉米至凡百三十萬石遂罷南路陸運唐書食貨志李泌貞元元年拜陜虢觀察使始鑿山開車道至三門以便餉漕以勞進檢校禮部尚書唐書李泌傳宗日知録通鑑唐德貞元二年李泌奏自集津至三門鑿山門車道十八里以避砥柱之險按舊唐書李泌傳並無此事而食貨志曰開元二十二年八月明皇從京兆尹裴耀卿之言置河陰縣及河陰倉河淸縣柏崖倉三門東集津倉三門西鹽倉開三門北山十八里以避湍險自江津而泝鴻溝悉納河陰倉自河陰送納含嘉倉又送納太原倉謂之北運自太原倉浮於渭以實京師凡三年運七百萬石省陸運之傭四十萬貫又曰開元二十九年陜郡太守李齊物鑿三門山以通運闢三門巔踰岩險之地俾負索引艦升於安流自齊物始也天寶三載韋堅代蕭炅以滻水作廣運潭於望春樓之東而藏舟焉是則北運始於耀卿尚陸行十八里河運始於齊物則直達於長安也下距貞元四十五年無緣有李泌復鑿三門之事豫按舊唐書泌傳固無此事而新唐書傳及食貨志則有之但通鑑以鑿山開車道訛為鑿三門車道則考訂之不愼揚州江都縣有愛敬陂水門貞元四年節度使杜亞自江都西循蜀岡之右引陂趨城隅以通漕溉夾陂田唐書地理志亞拜淮西節度使治漕渠引湖陂築防庸入之渠中以通大舟夾隄高卬田因得灌溉疏啓道衢徹壅通堙人皆悅賴唐書杜亞傳比一統志愛敬陂在江都縣西五十里南儀真縣漢廣陵太守陳登浚塘築陂百姓愛之因名亦名陳公塘上有石磨鐵碾行水金鑑卷九十三
