body:
  text: 行水金鑑卷九十四江南按察使傅澤洪撰運河水唐德宗貞元八年詔東南兩稅財賦自河南江淮嶺南東道至於渭橋以戶部侍郎張滂主之河東劒南山南西道以户部尚書度支使班宏主之舊唐書食貨志諸道鹽鐵轉運使張滂復置江淮巡院及浙西觀察使李錡領使江淮堰埭𨽻浙西者增私路小堰之稅以副使潘孟陽王上都留後李㢲為諸道轉運鹽鐵使以堰埭歸鹽鐵使罷其增置者自劉晏後江淮米至渭橋寖減矣至㢲乃復如晏之多新唐書食貨志唐順宗即位以杜佑判鹽鐵轉運使理於揚州元和二年三月以李㢲代之先是李錡判使天下𣙜酤漕運由其操割而國用日耗㢲既為使大正其事舊制每歲運江淮米五十萬斛至河隂留十萬四十萬送渭倉劉晏殁久不登其數唯㢲秉使三載無升斗之闕焉㢲卒以河東節度使李鄘代之舊唐書食貨志李吉甫為淮南節度使居三歲築富人固本二塘溉田且萬頃漕渠庳下不能居水乃築隄閼以防不足泄有餘名曰平津堰唐書李吉甫傳津吉甫節度淮南在元和三年見宰相表平堰在高郵州境見一統志唐憲宗元和五年李鄘為淮南節度使以宣州觀察使盧坦代之舊唐書食貨志初揚州疏太子港陳登塘凡三十四陂以益漕河輒復堙塞淮南節度使杜亞乃濬渠蜀岡疏句城湖愛敬陂起隄貫城以通大舟河益庳水下走淮夏則舟不得前節度使李吉甫築平津堰以泄有餘防不足漕流遂通然漕益少江淮米至渭橋者才二十萬斛諸道鹽鐵轉運使盧坦糴以備一歲之費省冗職八十員自江以南補署皆專屬院監而漕米亡耗於路頗多刑部侍郎王播代坦建議米至渭橋五百石亡五十石者死其後判度支皇甫鎛議萬斛亡三百斛者償之千七百斛者流塞下過者死盜十斛者流三十斛者死而覆船敗挽至者不得十之四五部吏舟人相挾為姦榜笞號苦之聲聞於道路禁錮連歲赦下而獄死者不可勝數其後貸死刑流天德五城人不畏法運米至者十亡七八鹽鐵轉運使栁公綽請如王播議加重刑唐書食貨志長公綽領鹽鐵轉運在元和末年慶元年復為京兆尹孟簡字幾道平昌人為常州刺史元和八年就加金紫到郡開古孟瀆長四十一里灌溉沃壤四千餘頃為亷使舉其課績是有就加之命是歲徵拜為給事中舊唐書孟簡傳常州武進縣有孟瀆引江水南注通漕溉田四千頃元和八年刺史孟簡因故渠開無錫縣有泰伯瀆東連蠡湖亦元和八年孟簡所開唐書地理志西一統志孟瀆在常州府城二十八里南通運河北接吕莊入大江泰伯瀆在無錫縣東南五里西枕運河東連蠡湖越州山隂縣北五里有新河西北十里有運道塘皆元和十年觀察使孟簡開唐書地理志紹山陰縣今屬浙江興府唐憲宗元和十一年十二月甲寅初置淮潁水運使運楊子院米自淮陰泝流至夀州四百里入潁口又泝流至潁州沈邱界五百里至於項城又泝流五百里入溵河又三百里輸於郾城得米五十萬石茭一千五百萬束省汴運七萬六千貫舊唐書憲宗本紀興州長舉縣元和中節度使嚴礪自縣而西疏嘉陵江三百里焚巨石沃醯以碎之通漕以饋戊州戍兵唐書地理志漢長舉廢縣在今陜西中府沔縣西一百里王播復領鹽鐵轉運使時揚州城內官河水淺遇旱即滯漕船乃奏自城南閶門西七里港開河向東屈曲取禪智寺橋通舊官河開鑿稍深舟航易濟所開長一十九里其工役料度不破省錢當使方圓自備而漕運不阻後政賴之文宗即位就加檢校司徒舊唐書王播傳揚州江都縣寶歷二年漕渠淺輸不及期鹽鐵使王播自七里港引渠東注官河以便漕運唐書地理志唐文宗太和初歲旱河涸掊沙而進米多耗抵死甚衆不待覆奏秦漢時故漕興成堰東達永豐倉咸陽縣令韓遼請疏之自咸陽抵潼關三百里可以罷車挽之勞宰相李固言以為非時文宗曰茍利於人陰陽拘忌非朕所顧也議遂決堰成罷挽車之牛以供農耕關中賴其利故事州縣官充綱送輕貨四萬書上考開成初為長定綱州擇淸彊官送兩稅至十萬遷一官往來十年者授縣令江淮錢積河陰轉輸歲費十七萬餘緡行綱多以盜抵死判度支王彥威置縣遞羣畜萬三千三百乘使路傍民養以取傭日役一驛省費甚博而宰相亦以長定綱命官不以材江淮大州歲授官者十餘人乃罷長定綱送五萬者書上考七萬者減一選五十萬減三選而巳新唐書食貨志李石隴西人開成元年領鹽鐵轉運使奏咸陽令韓遼請開興成渠舊漕在咸陽縣西十八里東達永豐倉自秦漢以來疏鑿其後堙廢昨遼計度用功不多此漕若成自咸陽抵潼關三百里內無車挽之勤則轅下牛盡得歸耕永利秦中矣李固言曰王涯巳前巳曽陳奏實秦中之利但恐徵役今非其時上曰莫有陰陽拘忌否茍利於人朕無所慮也舊唐書李石傳華州華陰縣有敷水渠開成二年姜師度鑿以泄水害五年刺史樊忱復鑿之使通渭漕唐書地理志唐文宗開成二年夏揚州運河竭唐書文宗本紀唐宣宗大中五年二月以戶部侍郎裴休為鹽鐵轉運使明年八月以本官平章事依前判使始者漕米歲四十萬斛其後至渭倉者十不三四漕吏狡蠧敗溺百端官舟之沉多者歲至七十餘隻緣河姦犯大紊晏法休使寮屬按之委河次縣令董之自江津達渭以四十萬斛之傭計緡二十八萬悉使歸諸漕吏巡院胥吏無得侵牟舉之為法凡十事奏之帝大悅詔曰裴休興利除害深見奉公盡可其奏由是三歲漕米至渭濵積一百二十萬斛無升合沉棄焉舊唐書食貨志戶部侍郎裴休為使以瀕河縣令董漕事自江達渭運米四十萬石居三歲米至渭橋百二十萬石凡漕達於京師而足國用者大略如此其他州縣方鎮漕以自資或兵所征行轉運以給一時之用者皆不足紀新唐書食貨志桂州理定縣西十里有靈渠引灕水故秦史祿所鑿後廢寶歷初觀察使李渤立斗門十八以通漕俄又廢咸通九年刺史魚孟威以石為鏵隄亘四十里植大朩為斗門至十八里乃通巨舟唐書地理志西薈蕞云理定縣明省入廣永福縣今因之一統志靈渠在興安縣北其源即灕水昔秦始皇南戍五嶺命史祿鑿渠以通舟楫漢馬援南征餉道亦出於此唐觀察使李渤立斗門以通漕刺史魚孟威以石為隄乃通巨舟宋提刑李師中亦嘗修浚洪武末渠道湮壞遣御史嚴震直重修安吾鄉嚴尚書震直奉命廣西理鹽法桂林屬邑興有靈渠滙湘灕二江之水而分導焉南自蒼梧注於海北自靈川入於洞庭渠以㘰名者三十有六隄防善圯屢至湮塞比至召縣屬審地勢鳩工用計浚源疏流循其故道延袤五十餘里架梁鑿竇濟行旅溉耕隴功訖以聞上喜謂廷臣曰老嚴成此巨功豫備述其事入於郡志唐同光二年二月辛巳詔蔡州刺史朱勍浚索水通漕運水經注車關水出於嵩渚之山發於層阜之上一源兩枝分流瀉注世謂之石泉水東流為索水西注為車關水索水在成臯北通鑑唐長興四年二月三司使奏洛河水運自洛口至京往來牽船下卸皆是水運牙官每人管定四十石今洛岸至倉門稍逺牙官轉運艱難近日例多逃走今欲於洛河北岸别鑿一灣引船直至倉門下卸從之五代史補晉天福三年冬十月戊寅帝以大梁舟車所㑹便於漕運建東京於汴州自此歷漢周至宋皆都於汴梁建東都於汴州以汴州為開封封鑑通後漢乾祐二年右補闕盧振上言臣伏見汴河隄兩岸隄堰不牢每年潰決正當農時勞民功役以臣愚管沿汴水有故河道陂澤處置立㪷門水漲溢時以分其勢即潦歲無漂沒之患旱年獲澆溉之饒庶幾編氓差免勞役五代史補周顯德二年十一月乙未汴水自唐末潰決繇甬橋東南悉為汚澤上謀擊唐先命武寧節度使武行德發民夫因故隄疏𨗳之東至泗上議者皆以為難成上曰數年之後必獲其利謂淮南既平藉以通漕將獲其利也通鑑周世宗顯德四年四月乙酉詔疏汴水北入五丈河河自都城歷曹濟及鄆其廣五丈舊名五丈河宋開寶六年詔改名廣濟河薛史曰浚五丈河東流於定陶入於濟以通齊魯運路由是齊魯舟楫皆達於大梁五代史周顯德五年春正月已丑上欲引戰艦自淮入江阻北神堰不得度北神堰在楚州城北五里吳王夫差溝通江淮後人以此立堰者以淮水低溝水高防其泄也舟行度堰入淮今號為平水堰欲鑿楚州西北鸛水以通其道今楚州城西老鸛河是也遣使行視還言地形不便計功甚多上自往視之授以規畫發楚州民夫浚之旬日而成用功甚省巨艦數百艘皆達於江唐人大驚以為神三月浚汴口𨗳河流達於淮於是江淮舟楫始通此即唐時運路也自江淮割據運漕不通水路湮塞今復浚之通鑑周顯德六年春世宗遣朴行視汴口作斗門五代史王朴傳是年二月丙子朔命王朴如河陰按行河隄立斗門於汴口壬午命侍衛都指揮使韓通宣徽南院使吳廷祚當作延祚發徐宿宋單等州丁夫數萬浚汴水甲申命馬軍都指揮使韓令坤自大梁城東𨗳汴水入於蔡水魏收地形志曰汴水在大梁城東分為蔡渠九域志曰浚儀縣之琵琶溝即蔡河也三朝㑹要曰惠民河與蔡河一水即閔河也建隆元年始命陳承昭督丁夫𨗳閔河自新鄭與蔡水合貫京師南歷陳潁達夀春以通淮右舟楫相繼商賈畢至都下利之於是以西南為閔河東南為蔡河至開寶六年始改閔河為惠民河以通陳潁之漕命步軍都指揮使袁彥浚五丈渠東過曹濮梁山泊以通靑鄆之漕發畿內及滑亳丁夫數千以供其役通鑑周顯德間渡汴口之渠𨗳河水達於淮水以通江淮之漕又自大梁城東𨗳汴水入於蔡水以通陳潁之漕又於都城之東浚汴水為五丈渠東過曹濟梁山濼以通齊魯之漕此皆宋之漕運所由始也筆麈世宗開御河本為薊燕漕運計御河其不可廢也聞見近録吳越自唐末有國而楊行密李忭據有江淮吳越貢賦朝廷遣使皆由登萊泛海歲常飄溺五代史吳越世家楊行密據有江淮審知歲貢使泛海自登萊朝貢於梁使者入海覆溺歲常十三四五代史閩世家建胡三省通鑑音注自福入貢大梁陸行當自衢信取饒池界度江取舒廬夀度淮而後入梁境然自信饒至廬夀皆屬楊氏而朱楊為世仇不可得而假道故航海入貢今自福州洋過溫州洋取台州洋過天門山入明州象山洋過涔江掠冽港直東北度大洋抵登萊岸風濤至險故沉溺者衆王溥字齊物祁人周顯德初為華州刺史未幾改鎮潁州州境舊有通商渠距淮三百里歲久湮塞溥疏𨗳之遂通舟楫郡無水患歷鄭州團練使升宿州防禦課民鑿井築城北隄以禦水災宋史王溥傳周顯德六年春詔通河北按行河隄因發徐宿宋單等州民浚汴渠數百里宋史韓通傳韓令坤武安人周世宗入揚州命權知軍府六年春命以汴亳民𨗳汴水入於蔡宋史韓令坤傳宋太祖即位仁朗從討李重進還與右神武統軍陳承昭浚五丈河以通漕宋史田仁朗傳劉載字德輿范陽人宋初浚五丈河自陳橋逹曹州之西境命載護其役建隆四年權知貝州宋史劉載傳宋太祖建隆二年正月丁巳𨗳蔡水入潁二月壬申疏五丈河甲戌幸城南觀修水匱宋史太祖本紀漕運宋都大梁有四河以通漕運曰汴河曰黃河曰惠民河曰廣濟河而汴河所漕為多建隆以來首浚三河令自今諸州歲受稅租及管榷貨利上供物帛悉官給舟車輸送京師毋役民妨農汴河自隋大業初疏通濟渠引黃河通淮至唐改名廣濟宋都大梁以孟州河陰縣南為汴首受黃河之口屬於淮泗每歲自春及冬常於河口均調水勢止深六尺以通行重載為準歲漕江淮湖浙米數百萬及至東南之産百物衆寶不可勝計又下西山之薪炭以輸京師之粟以振河北之急內外仰給焉故於諸水莫此為重其淺深有度置官以司之都水監總察之然大河向背不常故河口歲易易則度地形相水勢為口以逆之遇春首輒調數州之民勞費不資役者多溺死吏又並緣侵漁而京師常有決溢之虞太祖建隆二年春𨗳索水自旃然與須水合入於汴三年十月詔緣汴河州縣長吏常於春首課民夾岸植榆栁以固隄防宋史河渠志汴渠派分洪河自唐迄今皆以為莫大之利然迹其事實抑有深害何哉凡梁宋之地畎澮之利湊流此渠以成其大至隋煬帝將幸江都遂析黃河之流築左右隄三百餘里舊所湊水悉為橫絶散漫無所故宋亳之地遂成沮洳卑濕且昔之安流今乃湍悍覆舟之患十有二三昔之漕運冬夏無限今則春開秋閉歲中漕運止得半載昔之泝沿兩無艱阻今則逆流而上乃重載而行其為難也甚矣沿流而下即虛舟而往其為利也背矣矧自天子建都而汴水貫都東下每歲霖澍決溢為慮由斯觀之其利安在然歷世浸逺詎可卒圖異日明哲之士開悟積惑言復曩迹始信兹言之不謬丁晉公談録蔡河貫京師為都人所仰兼閔水洧水潩水以通舟閔水自尉氏歷祥符開封合於蔡是為惠民河洧水自許田注鄢陵東南歷扶溝合於蔡潩水出鄭之大隗山注臨潁歷鄢陵扶溝合於蔡凡許鄭諸水令堅白鴈丈八溝京索令西河禇河湖河雙河欒霸河皆㑹焉猶以其淺涸故植朩橫棧棧為水之節啓閉以時建隆二年四月命中使浚蔡河設斗門節水自京距通許鎮三年詔發畿甸陳許丁夫數萬浚蔡水南入潁川廣濟河𨗳菏水自開封歷陳留曹濟鄆其廣五丈歲漕上供米六十二萬石太祖建隆二年正月遣使往定陶規度發曹單丁夫數萬浚之三月幸新水門觀放水入河先是五丈河泥淤不利行舟遂詔左監門衛將軍陳承昭於京城之西夾汴水造斗門引京索蔡河水通城濠入斗門俾架流汴水之上東進於五丈河以便東北漕運公私咸利三年正月遣右龍武統軍陳承昭護修五丈河造西水磑洛水貫西京多暴漲漂壞橋梁建隆二年留守向拱重修天津橋成甃巨石為腳高數丈鋭其前以疏水勢石縱縫以鐵鼓絡之其制甚固四月具圖來上降詔褒美開寶九年郊祀西京詔發卒五千自洛城菜市橋鑿渠抵漕口三十五里饋運便之其後𨗳以通汴金水河一名天源本京水𨗳自滎陽黃堆山其源曰祝龍泉太祖建隆二年春命左領軍衛上將軍陳承昭率水工鑿渠引水過中牟名曰金水河凡百餘里抵都城西架其水橫絶於汴設斗門入浚溝通城濠東滙於五丈河公私利焉乾德三年又引貫皇城歷後苑內庭池沼水皆至焉開寶九年帝步自左掖按地勢命水工引金水由承天門鑿渠為大輪激之南注晉王第宋史河渠志睢陽當漕舟之路定陶乃東運之衝其後河截淸水頗涉艱阻宋史地理志是年宋州汴河溢宋史五行志陳承昭江表人宋初入朝太祖以承昭習知水利督治惠民五丈二河以通漕運都人利之建隆二年河成賜錢三十萬四年春大發近甸丁壯數萬修幾內河隄命承昭董其役又令督諸軍子弟數千鑿池朱明門外以習水戰宋史陳承昭傳宋太祖乾德元年二月癸丑𨗳潩水入京丁巳浚汴河四月甲辰詔疏鑿三門宋史太祖本紀宋太祖乾德三年二月令陳承昭率丁夫數千鑿渠自長社引潩水至京師合閔水潩水本出密縣大隗山歷許田會春夏霖雨則泛溢民田至是渠成無水患閔河益通漕焉宋史河渠志四月癸亥募諸軍子弟𨗳五丈河通皇城為池宋史太祖本紀宋太祖乾德四年八月宿州汴水溢壞隄宋史五行志李符字德昌內黃人乾德中遷起居郎建議鑿橫江河以通漕運發和州三縣丁壯給其役宋史李符傳宋太祖開寶二年秋七月癸酉汴決下邑宋史太祖本紀宋太祖開寶四年六月乙酉汴決穀熟七月癸亥汴決宋城宋史太祖本紀六月汴水決宋州穀熟縣濟陽鎮宋史五行志宋太祖開寶五年六月已丑汴決穀熟宋史太祖本紀六月汴水決忠州宋史五行志宋太祖開寶六年七月歷亭縣御河決宋史五行志宋太祖開寶八年十二月庚子幸惠民河觀築堰宋史太祖本紀開寶間議征江南詔用京西轉運使李符之策發和州丁夫及鄉兵凡數萬人鑿橫江渠於歷陽令符督其役渠成以通漕運而軍用無闕宋史河渠志李懷忠范陽人改日騎左右廂都指揮使上幸西京愛其地形勢俾天下中正有留都之意懷忠乘間進曰東京有汴渠之漕歲致江淮米數百萬斛禁衛數十萬人仰給於此帑藏重兵皆在為根本安固巳久一旦遽欲遷徙臣實未見其利上嘉納之宋史李懷忠傳周瑩景城人歷事唐漢周習水利嘗浚汴口𨗳鄭州郭西水入中牟渠修滑州河隄太宗潛邸瑩得給事左右即位補殿直歷西上閣門使與郝守濬護塞宋州決河歷知澶州卒贈侍中諡元惠宋史周瑩傳宋太宗太平興國二年六月開封府汴水溢壞大寧隄浸害民田宋史五行志七月開封府言汴水溢壞開封大寧隄浸民田害稼詔發懷孟丁夫三千五百人塞之白河在唐州南流入漢太平興國二年正月西京轉運使程能獻議請自南陽下向口置堰回水入石塘沙河合蔡河達於京師以通湘潭之漕詔發唐鄧汝潁許蔡陳鄭丁夫及諸州兵凡數萬人以弓箭庫使王文寶六宅使李繼隆內作坊副使李神祐劉承圭等護其役塹山陻谷歷博望羅渠少柘山凡百餘里月餘抵方城地勢高水不能至能復請多役人以致水然不可通漕運會山水暴漲石堰壞河不克就卒陻廢焉宋史河渠志九月汴水溢宋史太宗本紀李繼隆太平興國二年改六宅使嘗詔與王文寶李神祐劉承圭同護浚京西河又與梁迥竇神寶治決河迥體肥碩所乘舟弊不能濟繼隆易以巳舟而繼隆舟果覆棲枯桑杪賴他舟以度宋史李繼隆傳是年京西轉運使程能議開新河自襄漢至京師引白河水注焉以通湘潭之漕詔發唐鄧汝潁許蔡陳鄭丁夫數萬赴其役發諸州兵萬人助之命文寶與六宅使李繼隆作坊副使李神祐劉承圭分往護作宋史王文寶傳宋太宗太平興國三年正月戊戌開襄漢漕渠渠成而水不上卒廢辛丑浚廣濟惠民及蔡三河乙巳浚汴口宋史太宗本紀是年正月命發近縣丁夫浚廣濟河發軍士千人浚汴口六月宋州言寧陵縣河溢隄決詔發宋亳丁夫四千五百人分遣使臣護役宋史河渠志五月汴水決宋州寧陵縣境六月泗州汴水又漲一丈塞州北門宋史五行志梁迥以平江南功領順州團練使太平興國三年夏汴水大決詔迥發畿內丁男三千護塞汴口宋史梁迥傳宋太宗太平興國四年河又決於宋城縣以本州諸縣人夫三千五百人塞之宋史河渠志史圭太平興國四年為右衛將軍領平州刺史督浚惠民河自尉氏達京九十里數旬而畢民咸便之宋史史圭傳曹翰大名人太平興國五年為幽州行營都部署詔督役開南河自雄莫以通漕運議築大隄以捍之宋史曹翰傳先是四河所運未有定制太平興國六年汴河歲運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱蠲放民租未嘗不及其數至道初汴河運米五百八十萬石大中祥符初至七百萬石江南淮南兩浙荆湖路租糴於真揚楚泗州置倉受納分調舟船泝流入汴以達京師置發運使領之諸州泉帛雜物軍器上供亦如之陜西諸州菽粟自黃河三門沿流入沛以達京師亦置發運司領之粟帛自廣濟河而至京師者京東之十七州由石塘惠民河而至京師者陳潁許蔡光夀六州皆有京朝官廷臣督之河北衛州東北有御河達乾寧軍其運物亦廷臣主之廣南金銀香藥犀象百貨陸運至䖍州而後水運川益諸州金帛及租市之布自劒門列傳置分輦負擔至嘉州水運達荆南自荆南遣綱吏送京師宋史食貨志河北諸水有通轉向者有為方田限遼人者太宗太平興國六年正月遣八作使郝守濬分行河道抵於遼境者皆疏𨗳之又於淸苑界開徐河雞距河五十里入白河自是關南之漕悉通濟焉宋史河渠志宋太宗太平興國七年秋七月易水溢宋史太宗本紀七月大名府御河漲壞濟口京兆府咸陽渭水漲壞浮梁工人溺死者五十四人宋史五行志行水金鑑卷九十四
