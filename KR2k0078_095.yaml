body:
  text: 行水金鑑卷九十五江南按察使傅澤洪撰運河水宋太宗太平興國八年六月雄州易水漲壞民廬舍河南府澍雨洛水漲五丈餘壞鞏縣官署軍營民舍殆盡榖洛伊瀍四水暴漲壞京城官署軍營寺觀祠廟民舍萬餘區溺死者以萬計又壞河淸縣豐饒務倉庫軍營民舍百餘區宋史五行志七月滹沱及祁之資滄之胡盧雄之易惡池水皆溢為患宋史太宗本紀盧之翰字維周祁州人太平興國時為工部員外郎建議𨗳潩河合于淮逹許州以便漕運以勞加戶部員外郎宋史盧之翰傳宋雄幽州人雍熙中知均唐二州未幾護河隂屯兵以知河渠利害因命領護汴口均節水勢以逹轉漕京師賴之宋史宋雄傳初楚州北山陽灣尤迅急多有沉溺之患雍熙中轉運使劉蟠議開沙河以避淮水之險未完而受代喬維嶽繼之開河自楚州至淮隂凡六十里舟行便之宋史河渠志喬維嶽為淮南轉運司淮河西流三十里曰山陽灣水勢湍悍運舟多懼覆溺維嶽規度開故沙河自末口至淮隂磨盤口凡四十里又建安北至淮澨五堰運舟所至十經上下其重載者皆卸糧而過舟時壞失糧綱率緣此為姦潛有侵盜維嶽始命創二斗門於西河第三堰二門相距踰五十步覆以夏屋設縣門積水俟潮平乃泄之建橫橋岸上築土纍石以牢其址自是弊盡革而運舟往來無滯矣罷使職權知楚州宋史喬維嶽傳宋太宗端拱元年供奉官閣門祗候閻文遜苖忠俱上言開荆南城東漕河至師子口入漢江可通荆峽漕路至襄州又開古白河可通襄漢漕路至京詔八作使石全振往視之遂廢丁夫治荆南漕河至漢江可勝二百斛重載行旅者頗便而古白河終不可開宋史河渠志孔守正浚儀人淳化初擢高陽關副都明年護浚惠民河塞澶州決河就知州軍宋史孔守正傳宋太宗淳化二年六月乙酉以汴水決浚儀縣帝親督衛士塞之宋史太宗本紀是年六月汴水決浚儀縣帝乘步輦出乾元門宰相樞密迎謁帝曰東京養甲兵數十萬居人百萬家天下轉漕仰給在此一渠水朕安得不顧車駕入泥淖中行百餘步從臣震恐殿前都指揮使戴興叩頭懇請回馭遂捧輦出泥淖中詔興督步卒數千塞之日未旰水勢遂定帝始就次太官進膳親王近臣皆泥濘沾衣知縣宋炎亡匿不敢出特赦其罪是月汴又決於宋城縣發近縣丁夫二千人塞之是年從河北轉運使請自深州新寨鎮開新河𨗳胡盧河分為一派凡二百里抵常山以通漕運胡盧河源於西山始自冀州新河鎮入深州武強縣與滹沱河合流其後變徙入大河至神宗熙寧中內侍程昉請開決引水入新河故道詔本路遣官按視永靜軍判官林伸東光縣令張言舉言新河地形高仰恐害民田昉言地勢最順宜無不便仍復遣劉璯李直躬考實而璯等卒如昉言伸等坐貶官四年春詔六宅使何承矩等督戍兵萬八千人自霸州界引滹沱水灌稻為屯田用實軍廩且為備禦焉初臨津令黃懋上封事盛稱水田之利乃以承矩洎內供奉官閻承翰殿直張從古同制置河北緣邊屯田事仍以懋為大理寺丞充屯田判官其所經畫悉如懋奏是年以汜水泛溢浸許州民田詔自長葛縣開小河𨗳潩水分流二十里合于惠民河宋史河渠志宋太宗淳化三年七月洛水溢宋史太宗本紀七月河南府洛水漲壞七里鎮國二橋宋史五行志李繼宣浚儀人淳化三年知保州又轉莊宅使築關城浚外濠造船二百艘入雞渠泉河以運糧人咸便之宋史李繼宣傳宋太宗至道元年九月帝以汴河歲運江淮米五七百萬斛以濟京師問侍臣汴水疏鑿之由令參知政事張洎講求其事以聞其言曰禹𨗳河自積石至龍門南至華陰東至砥柱又東至于孟津東過洛汭至于大伾即今成臯是也或云黎陽山也禹以大河流泛中國為害最甚乃于貝邱疏二渠以分水勢一渠自舞陽縣東引入漯水其水東北流至千乘縣入海即今黃河是也一渠疏畎引傍西山以東北形高敝壞堤水勢不便流溢夾右碣石入于渤海書所謂北過降水至于大陸降水即濁漳大陸則邢州巨鹿澤播為九河同為逆河入于海河自魏郡貴鄉縣界分為九道下至滄州今為一河言逆河者謂與河水往復相承受也齊桓公塞以廣田居惟一河存焉今其東界至莽枯河是也禹又於滎澤下分大河為陰溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠一渠元經陽武縣中牟臺下為官渡水一渠始皇疏鑿以灌魏郡謂之鴻溝莨菪渠自滎陽五出池口來注之其鴻溝即出河之溝亦曰莨菪渠漢明帝時樂浪人王景謁者王吳始作浚儀渠蓋循河溝故瀆也渠成流注浚儀故以浚儀縣為名靈帝建寧四年於敖城西北壘石為門以遏渠口故世謂之石門渠外東合濟水濟與河渠渾濤東注至敖山北渠水至此又兼邲之水即春秋晉楚戰於邲邲又音汳即汴字古人避反字改從汴字渠水又東經滎陽北旃然水自縣東流入汴水鄭州滎陽縣西二十里三皇山上有二廣武城二城相去百餘步汴水自兩城間小澗中東流而出而濟流自兹乃絶唯汴渠首受旃然水謂之鴻渠東晉太和中桓溫北伐前燕將通之不果義熙十三年劉裕西征姚秦復浚此渠始有湍流奔注而岸善潰塞裕更疏鑿而漕運焉隋煬帝大業三年詔尚書左丞相皇甫誼發河南男女百萬開汴水起滎澤入淮千餘里乃為通濟渠又發淮南兵夫十餘萬開𨝍溝自山陽淮至于揚子江三百餘里水面闊四十步而後行幸焉自後天下利于轉輸昔孝文時賈誼言漢以江淮為奉地謂魚鹽穀帛多出東南至五鳳中耿壽昌奏故事歲增關東穀四百萬斛以給京師亦多自此渠漕運唐初開通濟渠為廣濟渠開元中黃門侍郎平章事裴耀卿言江淮租船自長淮西北泝鴻溝轉相輸納於河陰含嘉太原等倉凡三年運米七百萬石實利涉於此開元末河南採訪使汴州刺史齊浣以江淮漕運經淮水波濤有沉損遂浚廣濟渠下流自泗州虹縣至楚州淮陰縣北八十里合于淮踰時畢功既而水流迅急行旅艱險尋乃廢停却由舊河德宗朝歲漕運江淮米四十萬石以益關中時叛將李正巳田恱皆分軍守徐州臨渦口梁崇義阻兵襄鄧南北漕引皆絶于是水陸運使杜佑請改漕路自浚儀西十里疏其南涯引流入琵琶溝經蔡河至陳州合潁水是秦漢故道以官漕久不由此故填淤不通若畎流培岸則功用甚寡又廬夀之間有水道而平岡亘其中曰雞鳴山佑請疏其兩端皆可通舟其間登陸四十里而巳則江湖黔嶺蜀漢之粟可方舟而下由是白沙趨東關經廬夀浮潁步蔡歷琵琶溝入汴河不復經泝淮之險徑於舊路二千里功寡利溥朝議將行而徐州順命淮路乃通至國家膺圖受命以大梁四方所湊天下之樞可以臨制四海故卜京邑而定都天下甲卒數十萬衆戰馬數十萬匹並萃京師悉集七亡國之士民於輦下比漢唐京邑民庶十倍甸服時有水旱不至艱歉者有惠民金水五丈汴水等四渠派引脈分咸會天邑舳艫相接贍給公私所以無匱乏唯汴水橫亘中國首承大河漕引江湖利盡南海半天下之財賦并山澤之百貨悉由此路而進然則禹力疏鑿以分水勢煬帝開河以奉巡遊雖數湮廢而通流不絶於百代之下終為國家之用者其上天之意乎宋史河渠志宋太宗至道二年三月內殿崇班閻光澤國子博士邢用之上言請開白溝自京師抵彭城吕梁口凡六百里以通長淮之漕詔發諸州丁夫數萬治之以光澤護其役議者非之會宋州通判王矩上表極陳其不可且言用之田園在襄邑歲苦水潦私幸渠成遂罷其役宋史河渠志六月河南瀍澗洛三水漲壞鎮國橋七月宋州汴河決穀熟縣宋史五行志宋時漕運自荆湖南北米至真揚交卸舟人皆市私鹽以歸每得厚利故舟人以船為家一有損漏旋即補葺久而不壞運道亦通太宗嘗謂侍臣曰篙工柁師有少販鬻但無妨公不必究問真帝王之度哉溪山餘話王嗣宗為江浙荆湖發運使初漕運經泗州浮橋舟多覆壞嗣宗徙至城隅遂獲安濟咸平三年以漕運稱職就拜太常少卿宋史王嗣宗傳宋真宗咸平四年知靜戎軍王能請自薑女廟東決鮑河水北入閻臺淀又自靜戎之東引北注三臺小李村其水溢入長城口而南又壅使北流而東入于雄州五年順安軍兵馬都監馬濟復請自靜戎軍東擁鮑河開渠入順安軍又自順安之西引入威虜軍置水陸營田於渠側濟等言役成可以達糧漕隔遼騎帝許之獨鹽臺淀稍高恐決引非便不從其議因詔莫州部署石普并護其役踰年功畢帝曰普引軍壁馬村以西開鑿深廣足以張大軍勢若邊城壕溝悉如此則遼人倉卒難馳突而易追襲矣其年河北轉運使耿望開鎮州常山鎮南河水入洨河至趙州有詔褒之宋史河渠志王能定陶人咸平中知靜戎軍建議決鮑河斷長城口北注雄州塘水為戎馬限方舟通漕以實塞下宋史王能傳宋真宗咸平五年六月京師大雨漂壞廬舍民有壓死者積潦浸道路自朱雀門東抵宣化門尤甚皆注惠民河河復漲溢軍營宋史五行志七月乙巳疏丁岡河宋史真宗本紀七月京師霖雨溝洫壅惠民河溢泛道路壞廬舍知開封府寇準治丁岡古河泄𨗳之宋史河渠志宋真宗咸平六年邢用之為度支員外郎又令自襄邑下流治白溝河𨗳京師積水而民田無害宋史河渠志楊日嚴改京東轉運使開淸河八十里抵暖水河並隄起倉廩以便漕運加直史館徙益州宋史楊日嚴傳宋真宗景德元年正月壬子開定州河通漕宋史真宗本紀九月宋州言汴河決浸民田壞廬舍遣使護塞踰月功就是年夏北面都鈐轄閻承翰自嘉山東引唐河三十二里至定州釃而為渠直蒲陰縣東六十二里會沙河徑邊吳泊遂入于界河以達方舟之漕又引保州趙彬堰徐河水入雞距泉以息挽舟之役自是朔方之民灌溉饒益大蒙其利矣八月詔滄州乾寧軍謹視斗門水口壅潮水入御河東塘堰以廣溉廕四年五月知雄州李允則決渠為水田帝以渠接界河罷之因下詔曰頃修國好聽其盟約不欲生事姑務息民自今邊城止可修葺城壕其餘河道不得輒有濬治大中祥符七年四月涇原都鈐轄曹瑋言渭北有古池連帶山麓今濬為渠令民𨗳以溉田六月知永興軍陳堯咨𨗳龍首渠入城民庶便之並詔嘉奬天禧末諸州屯田總四千二百餘頃而河北屯田歲收二萬九千四百餘石保州最多逾其半焉江淮兩浙承偽制皆有屯田克復後多賦與民輸租第存其名在河北者雖有其實而歲入無幾利在畜水以限遼騎而巳宋史河渠志宋真宗景德二年六月開封府言西京沿汴萬勝鎮先置斗門以減河水今汴河分注濁水入廣濟河堙塞不利帝曰此斗門本李繼源所造屢詢利害以為始因京索河遇雨即泛流入汴遂置斗門以便通泄若遽壅塞復慮決溢因令多用巨石高置斗門水雖甚大而餘波亦可減去宋史河渠志宋真宗景德三年六月京城汴水暴漲詔覘候水勢并工修補增起堤岸工畢復遣使致祭宋史河渠志七月應天府汴水決南至亳州合浪宕渠東入於淮宋史五行志九月甲子浚汴口宋史真宗本紀是年內侍趙守倫建議自京東分廣濟河由定陶至徐州入淸河以達江湖漕路役既成遣使覆視繪圖來上帝以地有隆阜而水勢極淺雖置堰埭又歷吕梁灘磧之險非可漕運罷之宋史河渠志宋真宗景德四年六月鄭州索水漲高四丈許漂滎陽縣居民有溺死者宋史五行志李溥河南人景德中任制置江淮等路並發運使高郵軍新開湖水散漫多風濤溥令漕舟東下者還過泗州因載石輸湖中積為長隄自是舟行無患宋史李溥傳謝德權提總京城四排岸領護汴河兼督輦運前是歲役浚河夫三十萬人而主者因循隄防不固但挑沙擁岸址或河流泛濫即中流復填淤矣德權須以沙盡至土為垠棄沙隄外遣三班使者分地以主其役又為大錐以試築隄之虛實或引錐可入者即坐所轄官吏多被譴免者植樹數十萬以固岸改崇儀副使宋史謝德權傳宋真宗大中祥符元年春正月甲戌大雪停汴口蔡河夫役宋史真宗本紀六月開封府言尉氏縣惠民河決遣使督視完塞宋史河渠志宋真宗大中祥符二年四月陳州言州地汙下苦積潦歲有水患請自許州長葛縣浚減水河及補棗村舊河以入蔡河從之八月汴水漲溢自京至鄭州浸道路詔選使乘傳減汴口水勢既而水減阻滯漕運復遣浚汴口宋史河渠志是年八月丙戌京東惠民河溢居民避水所過津渡戒有司勿算九月甲子浚汴口宋史真宗本紀是年十月京畿惠民河決壞民田宋史五行志宋真宗大中祥符四年八月大名府御河溢合流壞府城害田人多溺死宋史五行志宋真宗大中祥符五年八月庚戌淮南旱減運河水灌民田仍寬租限州縣不能存恤致民流亡者罪之宋史真宗本紀至大哉王者之政仁恩普遍今讀之猶令人雪涕宋真宗大中祥符七年六月河南府洛水漲宋史五行志宋真宗大中祥符八年六月詔自今後汴水添漲及七尺五寸即遣禁兵三千沿河防護八月太常少卿馬元方請浚汴河中流闊五丈深五尺可省修堤之費即詔遣使計度修浚使還上言泗州西至開封府界岸開砥平水勢薄不假開浚請止自泗州夾岡用功八十六萬五千四百三十八以宿亳丁夫充計減工七百三十一萬仍請于沿河作頭踏道僻岸其淺處為巨牙以束水勢使其後成河道止用河淸下卸卒就未放春水前令逐州長吏令佐督役自今汴河淤澱可三五年一浚又於中牟滎澤縣各置開減水河並從之宋史河渠志宋真宗大中祥符九年知許州石普請于大流堰穿渠置二斗門引沙河以漕京師遣使按視四月詔遣中使至惠民河規畫置壩子以通舟運宋史河渠志宋真宗天禧元年九月甲寅詔能拯救汴渠覆溺者給賞或溺者貧者以官錢給之十二月壬辰遣使緣汴河收瘞流尸宋史真宗本紀宋真宗天禧二年八月乙卯詔畎索河水入金水河宋史真宗本紀是年江淮發運使賈宗言諸路歲漕自真陽入淮汴歷堰者五糧載煩於剝卸民力罷於牽挽官私船艦由此速壞今議開揚州古河繚城南接運渠毁龍舟新興茱萸三堰鑿近堰漕路以均水勢歲省官費十數萬功利甚厚詔屯田郎中梁楚閣門祗候李居中按視以為當然明年役既成而水注新河與二堰平漕船無阻公私大便宋史河渠志宋真宗天禧三年六月癸未浚淮南漕渠廢三堰宋史真宗本紀薛奎字宿藝正平人為江淮制置發運使疏漕河廢三堰以便餉運進吏部員外郎宋史薛奎傳是年十二月都官員外郎鄭希甫言汴河兩岸皆是陂水廣浸民田隄腳並無流泄之處今汴河南省自明河接澳入淮望詔轉運使規度以聞宋史河渠志宋真宗天禧四年正月丙寅開揚州運河宋史真宗本紀王臻擢淮南轉運副使時發運使建議濬淮南漕渠廢諸堰臻言揚州召伯堰實謝安為之人思其功以比召伯不可廢也濬渠亦無所益召為三司度支判官而發運司卒濬渠以通漕臻坐前異議降監察御史知睦州宋史王臻傳崔立字本之鄢陵人天禧中知江陰軍開橫河六十里通運漕纍遷太常寺少卿宋史崔立傳陳知微歷京東轉運副使決古廣濟河通運路罷夾黃河歲減夫役數萬計遷右司諫宋史陳知微傳劉湜為鹽鐵副使兼領河渠事汴水絶鑿河陰新渠通漕運如故宋史劉湜傳徐起徙江東轉運使請開長淮舊浦以便漕運宋史徐起傳張君平管勾汴口建言歲開汴口當擇其地則水湍駛而無留沙歲可省功有百餘萬又請沿河縣植榆栁為令佐使臣課最及瘞汴河流尸悉從其言宋史張君平傳宋仁宗天聖二年春二月庚午遣內臣收瘞汴口流尸仍祭奠之宋史仁宗本紀二月崇儀副使巡護惠民河田承説獻議重修許州合流鎮大河堰斗門創開減水河通漕省迂路五百里詔遣使按視以聞宋史河渠志宋仁宗天聖三年汴流淺特遣使疏河注口四年大漲隄危衆情恟恟詔度京城西賈陂岡地泄之于護龍河宋史河渠志宋仁宗天聖四年五月已酉復陜西永豐渠以通解鹽宋史仁宗本紀閏五月陜西轉運使王博文等言準敕相度開治解州安邑縣至白家場永豐渠行舟運鹽經久不至勞民按此渠自後魏正始二年都水校尉元清引平坑水西入黃河以運鹽故號永豐渠周齊之間渠遂廢絶隋大業中都水監姚暹決堰濬渠自陜郊西入解縣民賴其利及唐末至五代亂離迄今湮沒水甚淺涸舟楫不行詔三司相度以聞宋史河渠志是年汴水溢決陳留隄又決京城西賈陂入護龍河以殺其勢宋史五行志王曽以門下侍郎兼戶部尚書天聖四年夏大雨傳言汴口決水且大至都人恐欲東奔帝問曾曾曰河決奏未至第民間妖言爾不足慮也巳而果然宋史王曽傳宋仁宗天聖五年八月都大巡護惠民河王克基言先準宣惠民京索河水淺小緣出源西京鄭許州界惠民河下合橫溝白鴈溝京索河下合西河湖河雙河欒霸河丈八溝各為民間截水蒔稻灌園宜令州縣巡察宋史河渠志宋仁宗天聖六年七月尚書駕部員外郎閻貽慶言五丈河下接濟州之合蔡鎮通利梁山濼近者大河決蕩溺民田壞道路合蔡而下漫散不通舟請治五丈河入夾黃河因詔貽慶與水官李守忠規度計功料以聞是年勾當汴口康德輿言行視陽武橋萬勝鎮宜存斗門其梁固斗門三宜廢去祥符界北岸請為别竇分減溢流而勾當汴口王中庸欲增置孫村之石限悉從其請宋史河渠志高化遷蜀州團練使天聖六年夏大雨命護汴隄夜馳至城西隄欲壞督守兵負土不能過時夏守恩方典軍積材朩城隅化盡取以塞隄乃得無患仁宗嘉之進神龍衛四廂都指揮使宋史高化傳宋仁宗天聖七年康德輿言修河芟地為並灘農戶所侵詔限一月使自實檢括以還縣官是年王克基言按舊制蔡河斗門棧板須依時啓閉調停水勢宋史河渠志康德輿天聖中遷內殿崇班河陰兵馬都監建沿汴斗門以節水會積雨汴水將溢德輿請自京西𨗳水入護龍河水得不溢宋史康德輿傳張綸除江淮制置發運副使築漕河隄二百里於高郵北旁錮巨石為十䃮以泄橫流泰州有捍海堰延袤百五十里久廢不治歲患海濤冒民田綸方議修復論者難之以為濤患息而蓄潦之患興矣綸曰濤之患十九而潦之患十一獲多而忘少豈不可耶表三請願身自臨役命兼權知泰州卒成堰復逋戶二千六百州民利之為立生祠居淮南六年纍遷文思使昭州刺史綸有材略所至興利除害為人恕喜施豫在江淮見漕卒凍餒道死者衆歎曰此有司之過非所以體上仁也推奉錢市襦千數衣不能自存者宋史張綸傳淮南漕渠築埭以蓄水不知始何時舊傳召伯埭謝公所為按李翺來南録唐時猶是流水不應謝公時巳作此埭天聖中監真州排岸司右侍禁陶鑑始議為復閘節水以省舟船過埭之勞是時工部郎中方仲荀文思使張綸為發運副使表行之始為真州閘歲省冗卒五百人雜費百二十五萬運舟舊法舟載米不過三百石閘成始為四百石船其後所載浸多官船至七百石私船受米八百餘囊囊二石自後北神召伯龍舟茱萸諸埭相次廢革至今為利豫元豐中過真州江亭後糞壤中見一卧石乃胡武平為水閘記略敘其事而不甚詳具夢溪茟談宋仁宗景祐元年閏六月甲子泗州淮汴溢宋史五行志宋仁宗慶歷元年三月汴流不通宋史五行志宋仁宗慶歷四年三月省廣濟河歲漕軍儲二十萬石宋史仁宗本紀宋仁宗皇祐元年二月甲戌河北黃御二河決並注于乾寧軍河朔頻年水災宋史五行志宋仁宗皇祐三年宋史仁宗本紀五行志作二年是年命使詣中牟治堤明年八月河涸舟不通令河渠司自口浚治歲以為常舊制水增七尺五寸則京師集楚兵八作排岸兵負土列河上以防河滿五日賜錢以勞之曰特支而或數漲數防又不及五日而罷則軍士屢疲而賜豫不及是歲七月始制防河兵日給錢薄其數才比特支十分之一軍士便之明年遣使行河相利害宋史河渠志楊佐遷河陰發運判官幹當河渠司皇祐中汴水殺溢不常漕舟不能屬佐度地鑿瀆以通河流於是置都水監命佐以鹽鐵判官同判京城地勢南下涉夏秋則苦霖潦佐開永濟河疏溝澮出野外自是水患息又議治孟陽河議者謂不便佐言國初歲轉京東粟數十萬今所致亡幾倘不濬復舊迹後將廢矣乃從其䇿出為江淮發運使孟陽之役調民七八千夷邱墓百數怨聲盈塞詔開封鞠治官吏獨舍佐不問糾察刑獄劉敞請加貶黜不聽召為鹽鐵副使宋史楊佐傳郭咨嘗謂作汴乘素河三十六陂之流危京師請自鞏西山七里店孤株嶺下鑿七十里𨗳洛入汴可以四時行運詔都水監楊佐同往計度歸未及論功卒宋史郭咨傳陳襄知常州運渠橫遏震澤積水不得北入江為常蘇二州病襄度渠之丈尺與民田步畝定其數授以浚法未幾遂削望亭古堰水不復積入為開封推官宋史陳襄傳按襄以富弼入相薦為祕閣校理知常州弼相在至和二年王素知開封府至和二年秋大雨蔡河裂水入城詔軍吏障朱雀門素曰皇上不豫兵民廬舍多覆壓衆心怦怦然奈何更塞門以動衆違詔止其役水亦不害宋史王素傳行水金鑑卷九十五
