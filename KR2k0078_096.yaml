body:
  text: 行水金鑑巻九十六江南按察使傅澤洪撰運河水宋仁宗嘉祐元年九月癸卯自京至泗州置汴河木岸宋史仁宗本紀宋仁宗嘉祐三年正月戊戌鑿永通河秋七月丙子詔廣濟河溢遣官行視民田宋史仁宗本紀正月開京城西葛家岡新河以有司言至和中大水入京城請自祥符縣界葛家岡開生河直城南好草陂北入惠民河分注魯溝以紓京城之患宋史河渠志司馬旦知宜興縣時王安石守常州開運河調夫諸縣旦言役夫而亟民有不勝則其患非徒不可就而已請令諸縣歲遞一役雖緩必成安石不聽秋大霖雨民苦之多自經死役竟罷宋史司馬旦傳按王安石知常州在嘉祐三年見本傳陜西諸州菽粟自黄河三門沿流入汴以達京師嘉祐四年罷所運菽減漕船三百艘自是歲漕三河而巳宋史食貨志宋仁宗嘉祐六年汴水淺澀常稽運漕都水奏河自應天府抵泗州直流湍駛無所阻惟應天府上至汴口或岸闊淺漫宜限以六十步闊於此則為木岸狹河扼束水勢令深駛梢伐岸木可足也遂下詔興役而衆議以為未便宰相蔡京奏祖宗時已嘗狹河矣俗好沮敗事宜勿聽役即半岸木不足募民出雜梢岸成而言者始息舊曲灘漫流多稽留覆溺處悉為駛直平夷操舟往來便之宋史河渠志余良肱改知明州朝廷方治汴渠留提舉汴河司汴水澱淤流且緩執政主狹河議良肱謂善治水者不與水爭地方冬水涸宜自京左浚治以及畿右三年可使水復行地中弗聽又議伐汴隄木以資狹河良肱言自泗至京千餘里江淮漕卒接踵者行多病暍藉䕃以休又其根盤錯與隄為固伐之不便屢爭不能得乃請不與其事執政雖怒竟不為屈改太常少卿知潤州宋史余良肱傳符惟忠提㸃開封府界縣鎮公事惠民河與刁河合流嵗多決溢害民田惟忠自宋樓鎮碾灣横隴村置二斗門殺水勢以接鄭河圭河自是無復有水患陜西用兵除涇原路兵民鈐轄兼知涇州三司使鄭戩奏留都大管勾汴河使建議以為渠有廣狹若水闊而行緩則沙伏而不利於舟請即其廣處束以木岸三司以為不便後卒用其議再遷西上閣門副使宋史符惟忠傳張方平自益州召為三司使建言國家都陳留當四通五達之道非若雍谷有山川足恃特倚重兵以立國耳兵恃食食恃漕運以汴為主汴帶引淮江利盡南海天聖巳前歳調民浚之故水行地中其後淺妄者爭以裁減役費為功汴日以塞今仰而望焉是利尺寸而喪丘山也乃畫上十四䇿富弼讀其奏漏盡十刻帝稱善弼曰此國計大本非常奏也悉如其說行之遷尚書左丞宋史張方平傳包拯字希仁合肥人知開封府中宦勢族築園榭侵惠民河以故河塞不通適京師大水拯乃悉毁去或持地劵自言有偽增歩數者皆審驗劾奏之遷諫議去宋史包拯傳王守䂓明道時遷入内殿頭選治京城水決汴河於公賈村決蔡河於四里橋水患以息加帶御器械宋史王守䂓傳鍾離瑾為江淮制置發運使殿直王乙者請自揚州召伯埭東至𤓰州浚河百二十里以廢二埭詔瑾䂓度以工大不可就止置牐召伯埭旁人以為利宋史鍾離瑾傳馬仲甫廬江人為度支判官内侍楊永徳言漕舟淮汴間惟水遞鋪為便詔仲甫偕往證可否還言其害十餘條議遂格繇戸部判官為發運使自淮隂經泗上浮長淮風波覆舟歲罹其患仲甫建議鑿洪澤渠六十里漕者便之拜天章閣待制知瀛州宋史馬仲甫傳王琪知潤州轉運使欲浚常潤漕河琪陳其不便詔寢役而後議者卒請廢古城埭破古函管而浚之河反狹舟不得方行公私交病徙知江寧宋史王琪傳鄭向為兩浙轉運副使疏潤州蒜山漕河抵於江人以為便宋史鄭向傳周湛徙京西路鄧州美陽堰歲役工數十萬溉州縣職田而利不及民湛奏罷之宋史周湛傳徐的為淮南江浙荆湖制置發運副使奏通泰州海安如臯縣漕河詔未下的以便宜調兵夫浚治之出滯鹽三百萬計得錢八百萬緡遂為制宋史徐的傳李師中提㸃廣西刑獄桂州靈渠故通漕歲久石窒舟滯師中即焚石鑿而通之宋史李師中傳賈逵為歩軍副都指揮使都城西南水暴溢注安上門都水監以急變聞英宗遣逵督護亟囊土塞門水乃止議者欲穴隄以洩其勢逵請觀水所行諭居民徙髙避水然後決之遷馬軍副都指揮使宋史賈逵傳劉彛從胡瑗學瑗稱其善治水神宗擇水官以彛悉東南水利除都水丞久雨汴漲議開長城口彛請但啟楊橋斗門水即退為兩浙轉運判官知處州宋史劉彛傳李禹卿判蘇州築隄太湖八十里為渠益漕運又蓄水溉田千餘頃江南通志宋神宗熙寧元年十月詔杭之長安秀之杉青常之望亭三堰監護使臣並以管幹河塘繫銜常同所屬令佐巡視修固以時啟閉從提舉兩浙開修河渠胡淮之請也宋史河渠志滹沱河源於西山由真定深州乾寧與御河合流神宗熙寧元年河水漲溢詔都水監河北轉運司疏治六年深州祁州永寧軍修新河八年正月發夫五千人并胡盧河増治之宋史河渠志御河源出衛州共城縣百門泉自通利乾寧入界河達於海神宗熙寧二年九月劉彛程昉言二股河北流今已閉塞然御河水由冀州下流尚當疏𨗳以絶河患先是議者欲恩州武城縣開御河約二十里入黄河北流故道下五股河故命彛昉相度而通判冀州王庠謂第開見行流處下接胡盧河尤便近彛等又奏如庠言雖於河流為順然其間漫淺沮洳費工尤多不若開烏欄隄東北至大小流港横截黄河入五股河復故道尤便遂命河北提舉糴便糧草皮公弼提舉常平王廣廉按視二人議協詔調鎮趙邢洺磁相州兵夫六萬濬之以寒食後入役宋史河渠志宋神宗熙寧二年三月甲申先是凌民瞻建議廢吕城堰又即望亭堰置牐而不用及因濬河隳敗古涇函石牐石䃮河流益阻百姓勞弊至是民瞻等貶降有差宋史河渠志是年閏十一月庚子濬御河宋史神宗本紀宋神宗熙寧三年正月韓琦言河朔累經災傷雖得去年夏秋一稔瘡痍未復而六州之人奔走河役逺者十一二程近者不下七八程比常歲勞費過倍兼鎮趙兩州舊以次邊未嘗差夫一旦調發人心不安又於寒食後入役比滿一月正妨農務詔河北都轉運使劉庠相度如可就寒食前入役即亟興工仍相度最逺州縣量減差夫而輟修塘隄兵千人代其役二月𤦺又奏御河漕運通流不宜減大河夫役於是止令樞宻院調兵三千并都水監卒二千三月又益發壯城兵三千仍詔提舉官程昉等促迫功限六月河成詔昉赴闕遷宫苑副使宋史河渠志宋神宗熙寧四年創開訾家口日役夫四萬饒一月而成纔三月巳淺澱乃復開舊口役萬工四日而水稍順有應舜臣者獨謂新口在孤柏嶺下當河流之衝其便利可常用勿易水大則泄以斗門水小則為輔渠於下流以益之安石善其議七月程昉請開宋家等隄畎水以助漕運八月三班借職楊琰請増置上下壩牐蓄水以備淺涸詔琰掌其事宋史河渠志宋神宗熙寧五年先是宣徽北院使中太一宫使張方平嘗論汴河曰國家漕運以河渠為主國初浚河渠三道通京城漕運自後定立上供年額汴河斛斗六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運止給太康咸平尉氏等縣軍糧而巳惟汴河專運粳米兼以小麥此乃太倉蓄積之實今仰倉於官廩者不惟三軍至於京師士庶以億萬計大半待飽於軍稍之餘故國家於漕事至急至重然則汴河乃建國之本非可與區區溝洫水利同言也近歲巳罷廣濟河而惠民河斛斗不入太倉大衆之命惟汴河是頼今陳說利害以汴河為議者多矣臣恐議者不巳屢作改更必致汴河日失其舊國家大計殊非小事願陛下特回聖鑒深賜省察留神逺慮以固基本方平之言為王安石發也宋史河渠志宋神宗熙寜六年都水監丞侯叔獻請儲三十六陂及京索二水為源倣真楚州開平河置牐則四時可行舟因廢汴渠帝曰白溝功料易耳第汴渠歲運甚廣河北陜西資焉又京畿公私所用良材皆自汴口而至何可遽廢王安石曰此役茍成亦無窮之利也當别為漕河引黄河一支乃為經久馮京曰若白溝成與汴蔡皆通漕為利誠大恐汴終不可廢帝然之詔劉璯同叔獻覆視八月都水監言白溝自濉河至於淮八百里乞分三年興修其廢汴河俟白溝畢功别相視仍請發榖熟淤田司并京東汴河所隸河清兵赴役從之是年夏都水監丞侯叔獻乞引汴水淤府界閒田安石力主之水既數放或至絶流公私重舟不可盪有閣折者帝以人情不安嘗下都水分析并詔三司同府界提㸃官往視十一月范子竒建議冬不閉汴口以外江綱運直入汴至京廢運般安石以為然詔汴口官吏相視卒用其說是後高麗入貢令泝汴赴闕九月戊辰將作監尚宗儒言議者請置蔡河木岸計功頗大詔修固土岸宋史河渠志熙寧中濉陽界中發汴隄淤田汴水暴至隄防頗壞陷將毁人力不可制都水丞侯叔獻時蒞其役相視其上數十里有一古城急發汴隄注水入古城中下流遂涸急使人治隄陷次日古城中水盈汴流復行而隄陷巳完矣徐塞古城所決内外之水平而不流瞬息可塞衆皆伏其機敏夢溪筆談宋神宗熙寧七年正月都水監言自盟河畎𨗳汴南諸水近者失於疏浚為害甚大於是輟夫修治而白溝之役廢初王安石欲罷白溝修汴南水利帝曰人多以白溝不可為而卿獨見可為安石曰果不可為罷之誠宜若可為即俟時為之何必計校人言也是年春河水壅溢積潦敗隄八月御史盛陶謂汴河開兩口非便命同判都水監宋昌言視兩口水勢檄同提舉汴口官王琉琉言訾家口水三分輔渠七分昌言請塞訾家口而留輔渠時韓絳呂惠卿當國許之是年趙濟言河淺廢運自此物賤傷農宜議興復以便公私詔張士澄楊琰修治八月都提舉汴河隄岸司言欲與通津門汴河岸東城裏三十歩内開河下通廣濟以便行運從之宋史河渠志宋神宗熈寧八年春王安石再相叔獻言昨疏浚汴河自南京至泗州槩深三尺至五尺惟虹縣以東有礓石三十里餘不可疏浚乞募民開修詔檢計工糧以聞七月叔獻又言歲開汴口作生河侵民田調夫役今惟用訾家口減人夫物料各以萬計乞減河清一指揮從之未幾汴水大漲至深一丈二尺於是復請權閉汴口是年詔京西運米於河北於是侯叔獻請因丁字河故道鑿隄置牐引汴水於蔡以通舟運不可行尋廢十月詔都水監展惠民河欲便修城也是年又遣楊琰同陳祐甫因汴河置滲水塘又自孫賈斗門置虛隄及滲水入西賈陂由減水河注霧澤陂皆為河之上源程昉與劉璯言衛州沙河湮没宜自王供埽開浚引大河水注之御河以通江淮漕運仍置斗門以時啟閉其利有五王供危急免河勢變移而别開口地一也漕舟出汴横絶沙河免大河風濤之患二也沙河引水入於御河大河漲溢沙河自有限節三也御河漲溢有斗門啟閉無衝注淤塞之弊四也德博舟運免數百里大河之險五也一舉而五利附焉請發卒萬人一月可成從之宋史河渠志是年六月丙午釃汴水入蔡河以通漕宋史神宗本紀宋神宗熈寧九年詔以原額漕粟京東仍修壩牐為啟閉之節三月詔遣官修廣濟河壩牐七月提轄修京城所請引霧澤陂水至咸豐門合京索河由京索簽入副隄河下合惠民都水監謂不若於順天門外簽直河身及於染院後簽入護龍河至咸豐門南復入京索河實為長利從之是年秋程昉奏御河畢工中書欲論賞帝令河北監司案視保明大名安撫使文彦博覆實十月彦博言去秋開舊沙河取黄河行運欲通江淮舟楫徹於河北極邊自今春開口放水後來漲落不定所行舟栰皆輕載有害無利枉費工料極多今御河上源止是百門泉水其勢壯猛至衛州以下可勝三四百斛之舟四時行運未嘗阻滯隄防不至高厚亦無水患今乃取黄河水以益之大即不能吞納必致決溢小則緩漫淺澀必致淤澱凡上下千餘里必難歲歲開浚况此河穿北京城中利害易覩今始初冬巳見阻滯恐年歲間反壞久來行運倘謂通江淮之漕則又不然自江浙淮汴入黄河順流而下又合於御河大約歲不過一百萬斛若自汴順流徑入黄河達於北京自北京和僱車乘陸行入倉約用錢五六千緡却於御河裝載赴邊城其省工役物料及河清衣糧之費不可勝計又去冬外監丞欲於北京黄河新隄開置水口以通行運其策尤疎此乃熙寧四年秋黄河下注御河之處當時朝廷選差近臣督役修塞所費不貲大名恩冀之人至今瘡痍未平今奈何反欲開口𨗳水耶都水監雖令所屬相視而官吏恐忤建謀之官止作遷延回報謂俟修固御河隄防方議開置河口况御河隄道僅如蔡河之類若欲吞納河水須如汴岸増修猶恐不能制蓄乞别委清彊官相視利害并議可否又言今之水官尤為不職容易建言僥倖恩賞朝廷便為主張中外莫敢異議事若不效都無譴罸臣謂更當選擇其人不宜令狂妄輩横費生民膏血已而都水監言運河乞置雙牐例放舟船實便與彦博所言不同十二月命知制誥熊本與都水監河北轉運司官相視本奏河北州軍賞給茶貨以至應接沿邊𣙜場要用之物並自黄河運至黎陽出卸轉入御河費用止於客軍數百人添支而已向者朝廷曽賜米河北亦於黎陽或馬陵道口下卸倒裝轉致費亦不多昨因程昉等擘畫於衛州西南循沙河故迹決口置牐鑿隄引河以通江淮舟楫而實邊郡倉廩自興役至畢凡用錢米工料二百萬有竒今後每歲用物料一百一十六萬廂軍一千七百餘人約費錢五萬七千餘緡開河行水纔百餘日所過船栰六百二十五而衛州界御河淤淺巳及三萬八千餘歩沙河左右民田淹浸者幾千頃所免租稅二千貫石有餘有費無利誠如議者所論然尚有大者衛州居御河上游而西南當王供向著之㑹所以捍黄河之患者一隄而巳今穴隄引河而置牐之地纔及隄身之半詢之土人云自慶厯八年後大水七至方其盛時游波有平隄者今河流安順三年矣設復礬水暴漲則河身乃在牐口之上以湍悍之勢而無隄防之阻泛濫衝溢下合御河臣恐墊溺之禍不特在乎衛州而瀕御河郡縣皆罹其患矣夫此河之興一歲所濟船栰其數止此而萌每歲不測之患積無窮不貲之費豈陛下所以垂世裕民之意哉臣博采衆論究極利病咸以謂葺故隄堰新口存新牐而勿治庶可以消淤澱決溢之患而省無窮之費萬一他日欲由此河轉粟塞下則暫開亟止或可紓飛輓之勞未幾河果決衛州十月詔都水度量疏濬汴河深淺仍記其地分宋史河渠志是年四月戊戌復廣濟河漕九月戊午浚汴河宋史神宗本紀宋神宗熙寧十年范子淵請用濬川杷以六月興工自謂功利灼然請候今冬疏浚畢將杷具舟船等分給逐地分使臣於閉口之後檢量河道淤澱去處至春水接續疏𨗳大抵皆無甚利巳而清汴之役興宋史河渠志國朝汴渠發京畿輔郡三十餘縣夫歲一浚祥符中閤門祇候使臣謝德權領治京畿溝洫權借浚汴夫自爾後三歲一浚始令京畿民官皆兼溝洫河道以為常職久之治溝洫之工漸弛邑官徒帶空名而汴渠有二十年不浚歲歲堙澱異時京師溝渠之水皆入汴舊尚書省都堂壁記云疏治八渠南入汴水是也自汴流堙澱京城東水門下至雍丘襄邑河底皆高出隄外平地一丈二尺餘自汴隄下瞰民居如在深谷熙寧中議改疏洛水入汴予嘗因出使按行汴渠自京師上善門量至泗州淮口凡八百四十里一百三十歩地勢京師之地比泗州凡高十九丈四尺八寸六分於京城東數里白渠中穿井至三丈方見舊底驗量地勢用水平望尺量之不能無小差汴渠隄外皆是出土故溝水令相通時為一堰節其水候水平其上漸淺涸則又為一堰相齒如階陛乃量堰之上下水面相高下之數㑹之乃得地勢高下之實夢溪筆談孫洙知海州方春旱發運使調民浚漕渠以通鹽河洙持之不下三上奏乞止其役宋史孫洙傳劉𤦺為侍御史浙西開漕渠役甚小使者張大其事以功遷官言者論其非詔𤦺就劾官吏人人惴恐𤦺但按首謀二人而已宋史劉𤦺傳宋神宗元豐元年五月西頭供奉官張從惠復言汴口歲開閉修隄防通漕纔二百餘日往時數有建議引洛水入汴患黄河囓廣武山須鑿山嶺十數丈以通汴渠功大不可為去年七月黄河暴漲水落而稍北距廣武山麓七里退灘高闊可鑿為渠引洛入汴范子淵知都水監丞畫十利以獻又言汜水出玉仙山京水出嵩渚山合洛水積其廣深得二千一百三十六尺視今汴流尚贏九百七十四尺以河洛湍緩不同得其贏餘可以相補猶慮不足則旁隄為塘滲取河水每百里置木牌一以限水勢兩旁溝湖陂濼皆可引以為助禁伊洛上源私引水者大約汴舟重載入水不過四尺今深五尺可濟漕運起鞏縣神尾山至士家隄築大隄四十七里以捍大河起沙谷至河隂縣十里店穿渠五十二里引洛水屬於汴渠疏奏上重其事遣使行視宋史河渠志宋神宗元豐二年正月使還以為工費浩大不可為上復遣入内供奉宋用臣還奏可為請自任村沙谷口至汴口開河五十里引伊洛水入汴河每二十里置束水一以芻楗為之以節湍急之勢取水深一丈以通漕運引古索河為源注房家黄家孟家三陂及三十六陂高仰處瀦水為塘以備洛水不足則決以入河又自汜水闗北開河五百五十歩屬於黄河上下置牐啟閉以通黄汴二河船筏即洛河舊口置水澾通黄河以泄伊洛暴漲古索河等暴漲即以魏樓滎澤孔固三斗門泄之計工九十萬七千有餘仍乞修護黄河南隄埽以防侵奪新河從之三月庚寅以用臣都大提舉𨗳洛通汴四月甲子興工遣禮官祭告河道侵民塚墓給錢徙之無主者官為瘞藏六月戊申清汴成凡用工四十五日自任村沙口至河隂縣瓦亭子并凡水闗北通黄河接運河長五十一里兩岸為隄總長一百三里引洛水入汴七月甲子閉汴口徙官吏河清卒於新洛口戊辰遣禮官致祭十一月辛未詔差七千人赴汴口開修河道宋史河渠志是年三月庚寅疏汴洛宋史神宗本紀是年浚淮南運河自召伯堰至儀真十四節玉海宋神宗元豐三年二月宋用臣言洛水入汴至淮河道漫闊多淺澀乞狹河六十里為二十一萬六千歩詔四月興役五月癸亥罷草屯浮堰宋史河渠志宋神宗元豐四年正月北外都水丞陳祐甫言滹沱自熙寧八年以後汎濫深州諸邑為患甚大諸司累相度不決謂其下流舊入邊呉宜子淀最為便順而屯田司懼填淤塘濼煩文往復無所適從昨差官計之若障入胡盧河約用工千六百萬若治程昉新河約用工六百萬若依舊入邊呉等淀約用工二十九萬其工費固巳相逺乞嚴立期㑹定歸一䇿詔河北屯田轉運司同北外都水丞司相視五年八月癸酉前河北轉運副使周革言熙寧中程昉於真定府中渡創繫浮梁増費數倍既非形勢控扼請歲八九月易以板橋至四五月防河即拆去權用船渡從之宋史河渠志行水金鑑巻九十六
