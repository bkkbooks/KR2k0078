body:
  text: 行水金鑑巻九十八江南按察使傅澤洪撰運河水宋徽宗重和元年二月前發運副使柳庭俊言真揚楚泗髙郵運河堤岸舊有斗門水牐等七十九座限則水勢常得其平比多損壞詔檢計修復六月復命藍從熈孟揆等増堤岸置橋槽壩牐濬澄水道水入内内庭池籞既多患水不給又於西南水磨引索河一派架以石渠絶汴南北築堤導入天源河以助之白溝無山源每歲水潦甚則通流纔勝百斛船踰月不雨即竭宋史河渠志唐恪拜戸部侍郎京師暴水至汴且溢付恪治之或請決南隄以紓宫城之患恪曰水漲隄壞此亡可若何今決而浸之是魚鼈吾民也亟乘小舟相水源委求所以利𨗳之乃決金堤注之河浹旬水平入對帝勞之曰宗廟社稷獲安卿之力也恪再拜因上疏言水隂類也至犯宫闕天其或者以隂盛之沴儆告陛下乎願垂意時事益謹天戒宣和初遷尚書宋史唐恪傳宋徽宗宣和元年五月都城無故大水浸城外官寺民居遂破汴堤汴渠將溢諸門皆城守起居郎李綱奏國家都汴百有六十餘載未嘗少有變故今事起倉猝遐邇驚駭誠大異也臣嘗躬詣郊外竊見積水之來自都城以西漫為巨浸東拒汴堤停蓄深廣湍悍浚激東南而流其勢未艾若或淹浸旬時因以風雨不可不慮夫變不虗發必有感召之因願詔廷臣各具所見擇其可采者施行之詔都城外積水縁有司失職隄防不修非災異也罷綱送吏部而募人決水下流由城北注五丈河下通梁山濼乃巳七月壬子都提舉言近因野水衝蕩没汴堤岸及河道淤淺若止役河清功力不勝望俟農隙顧夫開修從之宋史河渠志五月大雨水都城自西北牟駝岡連萬勝門外馬監居民盡没詔都水使者決西城索河堤殺其勢城南居民冢墓俱被浸水至溢猛直冒安上南薰門城守凡半月已而入汴汴渠將溢於是募人決下流由城北入五丈河下通梁山濼乃平宋史五行志向子諲字伯恭臨江人欽聖皇后從姪也補承奉郎宣和初除江淮發運主管文字有欲浚河與江淮平者子諲言河髙江淮數丈而欲浚之使平决不可曩有司三日一啟閘復作堰儲水故水不乏比年直達之法啟閉無節堰閘率不存今復故制嚴禁約則無患使者用其言漕復通進秩一等宋史向子諲傳陳遘徙淮南轉運使朝廷方督綱餉運渠壅澀遘使決呂城陳公兩塘達於渠漕路甫通而花石綱塞道遘捕繫其人上章自劾宋史陳遘傳宋徽宗宣和二年九月以真揚等州運河淺澀委陳亨伯措置三年春詔發運副使趙億以車畎水運河限三月中三十綱到京宦者李琮言真州乃外江綱運㑹集要口以運河淺澀故不能速發按南岸有泄水斗門八去江不滿一里欲開斗門河身去江十丈築軟壩引江潮入河然後倍用人工車畎以助運水從之四月詔曰江淮漕運尚矣春秋時呉穿䢴溝東北通射陽湖西北至末口漢呉王濞開邗溝通運海陵隋開邗溝自山陽至揚子入江雍熈中轉運使劉蟠以山陽灣迅急始開沙河以避險阻天禧中發運使賈宗始開揚州古河繚城南接運渠毁三堰以均水勢今運河嵗淺澀當詢訪故道及今河形勢與陂塘瀦水之地講究措置悠久之利以濟不通可令發運使陳亨伯内侍譚稹條具措置以聞六月臣僚言比縁淮南運河水澀逾半歲禁綱舟篙工附載私物今河水増漲其令如舊初淮南連歲旱漕運不通揚州尤甚詔中使按視欲濬運河與江淮平㑹兩浙有方臘之亂内侍童貫為宣撫使譚稹為制置使貫欲海運陸輦稹欲開一河自盱眙出宣化朝廷下發運使相度陳亨伯遣其屬向子諲視之子諲曰運河髙江淮數丈自江至淮凡數百里人力難濬昔唐李吉甫廢牐置堰治陂塘泄有餘防不足漕運通流發運使曽孝藴嚴三日一啟之制復作歸水澳惜水如金比年行直達之法走茶鹽之利且應奉權倖朝夕經由或啟或閉不暇歸水又頃毁朝宗牐自洪澤至召伯數百里不為之節故山陽上下不通欲救其弊宜於真州太子港作一壩以復懷子河故道於𤓰洲河口作一壩以復龍舟堰於海陵河口作一壩以復茱茰待賢堰使諸塘水不為𤓰洲真泰三河所分於北神相近作一壩權閉滿浦牐復朝宗牐則上下無壅矣亨伯用其言是後滯舟皆通利云宋史河渠志宋徽宗宣和五年三月詔吕城至鎮江運河淺澀狹隘監司坐視無所施設兩浙專委王復淮南專委向子諲同發運使李淙措置車水通濟舟運四月又命王仲閎同廉訪劉仲元漕臣孟庾專往來措置常潤運河又詔東南六路諸牐啟閉有時比聞綱舟及命官妄稱專承指揮抑令非時啟版走泄河水妨滯綱運誤中都嵗計其禁止之五月詔以運河淺涸官吏互執所見州縣莫知所從其令發運使提舉等官同廉訪使者參訂經久利便列奏是月臣僚言鎮江府練湖與新豐塘地理相接八百餘頃灌溉四縣民田又湖水一寸益漕河一尺其來久矣今堤岸損缺不能貯水乞候農隙次第補葺詔本路漕臣并本州縣官詳度利害檢計工料以聞十二月庚寅詔沿汴州縣創添攔河鎖柵嵗額公私不以為便其遵元豐舊制宋史河渠志宋徽宗宣和六年九月盧宗原復言池州大江乃上流綱運所經其東岸皆暗石多至二十餘處西岸則沙洲廣二百餘里諺云折船灣言舟至此必毁折也今東岸有車軸河口沙地四百餘里若開通入社湖使舟經平水徑池口可避二百里風濤折船之險請措置開修從之宋史河渠志宋徽宗宣和七年九月丙子又詔宗原措置開濬江東古河自蕪湖由宣溪溧水至鎮江渡揚子趨淮汴免六百里江行之險並從之宋史河渠志周因累遷京西轉運副使宣和中春旱朝廷欲決漯口伊洛二水以益汴因奏洛民恃二水為生決之不能益汴請於河隂決黄流入汴民亦不失二水之利福建通志陳求道靖康間判都水監陳留河決四十餘日漕輸不通京城大恐開封尹宗澤命求道治之七日河盡復故道建炎四年命為襄鄧隨郢鎮撫宋史陳求道傳靖康後汴河上流為盜所決者數處決口有至百歩者塞久不合乾涸月餘綱運不通南京及京師皆乏糧責都水使者措置凡二十餘日而水復舊綱運沓來兩京糧始足又擇使臣八員為沿汴廵檢每兩員各將兵五百人自洛口至西水門分地防察決溢云宋史河渠志宋髙宗建炎元年詔諸路綱米以三分之一輸送行在餘輸京師二年詔二廣湖南北江東西綱運輸送平江府京畿淮南京東西河北陜西及三綱輸送行在又詔二廣湖南北綱運如過兩浙許輸送平江府福建綱運過江東西亦許輸送江寧府三年又詔諸路綱運見錢并糧輸送建康府戸部其金銀絹帛並輸送行在紹興初因地之宜以兩浙之粟供行在以江東之粟餉淮東以江西之粟餉淮西荆湖之粟餉鄂岳荆南量所用之數責漕臣將輸而歸其餘於行在錢帛亦然宋史食貨志宋建炎間呉中甫江淮發運使自洪澤鑿渠六十里以避長淮漕運之險江南通志紹興初髙宗次越以上虞縣梁河堰東運河淺澀今廢六千五百餘工委本縣令佐監督濬治既而都省言餘姚縣境内運河淺澀壩牐隳壞阻滯綱運遂命漕臣發一萬七千餘卒自都泗堰至曹娥塔橋開撩河身夾塘詔漕司給錢米蕭山縣西興鎮通江兩牐近為江沙壅塞舟楫不通宋史河渠志紹興初漕粟嘉陵濟軍興率七十五斛而至一斛胡承公為帥議轉般法費減十七故蜀人謂承公為湖州鏡此法我朝用之極便鏡之所及逺矣朱國禎湧幢小品宋髙宗紹興三年十月宰臣奏開修臨安府運河淺澀帝曰可發旁郡廂軍壯城捍江之兵至於廩給之費則不當吝宰臣朱勝非等曰開河非今急務而餽餉艱難為害甚大時方盛寒役者良苦臨流居人侵塞河道者悉當遷避至於畚牐所經沙泥所積當預空其處則居人及富家以僦屋取貲者皆非便恐議者以為言帝曰禹卑宫室而盡力於溝洫浮言何恤焉宋史河渠志宋髙宗紹興四年詔燒毁揚州灣頭港口牐泰州姜堰通州白莆堰其餘諸堰並令守臣開決焚毁務要不通敵船又詔宣撫司毁拆真陽堰牐及真州陳公塘無令走入運河以資敵用宋史河渠志宋髙宗紹興五年正月詔淮南宣撫司募民開濬𤓰洲至淮口運河淺澀之處宋史河渠志宋髙宗紹興七年兩浙轉運使向子諲言鎮江府吕城夾岡形勢髙仰因春夏不雨官漕艱勤尋遣官屬李澗詢究練湖本末始知此湖在唐永泰間巳廢而復興今堤岸弛禁致有侵佃冒決故湖水不能瀦蓄舟楫不通公私告病若夏秋霖潦則丹陽金壇延陵一帶良田亦被淹没臣已令丹陽知縣朱穆等増置二斗門一石䃮及修補隄防盡復舊蹟庶為永久之利宋史河渠志宋髙宗紹興八年命臨安守臣張澄發廂軍壯城兵千人開濬運河堙塞以通往來舟楫宋史河渠志宋髙宗紹興十六年五月壬申浚運河宋史髙宗本紀宋孝宗隆興二年臨安守臣呉芾言城裏運河先巳措置北梅家橋仁和倉斜橋三所作壩取西湖六處水口通流灌入府河積水至望仙橋以南至都亭驛一帶河道地勢自昔髙峻今欲先於望仙橋城外保安牐兩頭作壩却於竹車門河南開掘水道車戽運水引入保安門通流入城遂自望仙橋以南開至都亭驛橋可以通徹積水以備緩急計用工四萬從之宋史河渠志宋孝宗乾道三年六月知荆南府王炎言臨安居民繁夥河港堙塞雖屢開𨗳縁裁減工費不能迄功臣嘗措置開河錢十萬緡乞候農暇待詔有司用此專充開河支費庶幾河渠復通公私為利上俞其請守臣言募人自西興至大江疏沙河二十里并濬牐裏運河十三里通便綱運民旅皆利復恐湖水不定復有填淤且通江六堰綱運至多宜差注指揮一人專以開撩西興沙河繫銜及發捍江兵士五十名專充開撩沙浦不得雜役仍從本府起立營屋居之宋史河渠志宋孝宗乾道四年臨安守臣周淙出公帑錢招集遊民開濬城内外河疏通淤塞人以治辦稱之宋史河渠志宋孝宗乾道六年淮東提舉徐子寅言淮東鹽課全仰河流通快近運河淺澀自揚州灣頭港口至鎮西山光寺前橋垜頭計四百八十五丈乞發五千餘卒開濬從之宋史河渠志宋孝宗乾道七年二月詔令淮南漕臣自洪澤至龜山淺澀之處如法開撩是年以臣僚言丹陽練湖幅員四十里納長山諸水漕渠資之故古語云湖水寸渠水尺在唐之禁甚嚴盜決者罪比殺人本朝寖緩其禁以惠民然修築嚴甚春夏多雨之際瀦蓄盈滿雖秋無雨漕渠或淺但泄湖水一寸則為河一尺矣兵變以後多廢不治堤岸圯闕不能貯水彊家因而專利耕以為田遂致淤澱嵗月既久其害滋廣望責長吏濬治堙塞立為盜決侵耕之法著於令庶幾練湖漸復其舊民田獲灌溉之利漕渠無淺涸之患詔兩浙漕臣沈度專一措置修築宋史河渠志宋孝宗淳熈二年兩浙漕臣趙磻老言臨安府長安牐至許邨廵檢司一帶漕河淺澀請出錢米發兩岸人戸出力開濬又言欲於通江橋置板牐遇城中河水淺涸啟板納潮繼即下板固䕶水勢不得通舟若河水不乏即收牐板聽舟楫往還為便宋史河渠志宋孝宗淳熈五年以漕臣陳峴言於十月募工開濬無錫縣以西横林小井及犇牛吕城一帶地髙水淺之處以通漕舟浙西運河自臨安府北郭務至鎮江江口牐六百四十一里淳熈七年帝因輔臣奏金使往來事曰運河有淺狹處可令守臣以漸開濬庶不擾民宋史河渠志宋孝宗淳熈九年知常州章沖奏常州東北曰深港利港黄田港夏港五斗港其西曰竈子港孟瀆泰伯瀆烈塘江隂之東曰趙港白沙港石頭港陳港蔡港私港令節港皆古人開𨗳以為溉田無窮之利者也今所在堙塞不能灌溉臣嘗講求其說抑欲不勞民不費財而漕渠旱不乾水不溢用力省而見功速可以為悠久之利者在州之西南曰白鶴溪自金壇縣洮湖而下今淺狹特七十餘里若用工濬治則漕渠一帶無乾涸之患其南曰西蠡湖自宜興太湖而下止開浚二十餘里若更令深逺則太湖水來漕渠一百七十餘里可免浚治之擾至若望亭堰牐置於隋之至德而徹於本朝之嘉祐至元祐七年復置未幾又毁之臣謂設此堰牐有三利焉陽羨諸瀆之水奔趨而下有以節之則當潦嵗平江三邑必無下流淫溢之患一也自常州至望亭一百三十五里運河亦有所節則沿河之田旱嵗資以灌溉二也每嵗冬春之交重綱及使命往來多苦淺涸今啟閉以時足通舟楫復免車畎灌注之勞三也詔令相度開浚宋史河渠志耿秉淳熈十年知鎮江軍上疏曰如遇亢旱聽民車河水孝宗問大臣曰水豈可不令百姓灌田對曰恐人使往來水淺故不許孝宗曰稼穡事大可從秉請江南通志遇人使往來者謂貢使往來之運道也聞之明季如旱年運河水淺不令民放涓滴之水以灌田也南宋君臣何其愛民之深哉宋孝宗淳熈十一年冬臣僚言浙西運河之浚自北闗至秀州杉青各有牐堰自可瀦水惟沿河上塘有小堰數處積久低陷無以防遏水勢當以時加修治兼沿河下岸涇港極多其水入長水塘海鹽塘華亭塘由六里堰下私港散漫悉入江湖以私港深運河淺也若修固運河下岸一帶涇港自無走泄又自秀州杉青至平江府盤門在太湖之際與湖水相連而平江閶門至常州有楓橋滸墅烏角溪新安溪將軍堰亦各通太湖如遇西風湖水由港而入皆不必浚惟無錫五瀉牐損壞累年常是開堰徹厎放舟更江隂軍河港勢低水易走泄若從舊修築不獨瀦水可以通舟而無錫晉陵間所有楊湖亦當積水而四傍田畆皆無旱暵之患獨自常州至丹陽縣地勢髙仰雖有犇牛吕城二牐别無湖港瀦水自丹陽至鎮江地形尤髙雖有練湖緣湖水日淺不能濟逺雨晴未幾便覺乾涸運河淺狹莫此為甚所當先濬上以為然宋史河渠志宋孝宗淳熈十四年揚州守臣熊飛言揚州運河惟藉𤓰州真州兩牐瀦積今河水走泄緣𤓰州上中二牐久不修治獨潮牐一座轉運提鹽及本州共行修整然迫近江潮水勢衝激易致損壊真州二牐亦復損漏令有司葺理上下二牐以防走泄從之宋史河渠志張孝祥知荆南湖北路安撫使築守金隄自是荆州無水患置萬盈倉以儲諸漕之運宋史張孝祥傳蔡洸知鎮江府時久旱郡民築陂瀦水灌溉漕司檄郡決之父老泣訴洸曰吾不忍獲罪百姓也卻之巳而大雨漕運通嵗亦大熟民歌之曰我瀦我水以灌以溉俾我不奪蔡公是頼宋史蔡洸傳陳敏為都統制兼知髙郵軍自寳應至髙郵按其舊作石䃮十二所自是運河通泄無衝突患敏言長淮二千餘里河道通北方者五清汴渦潁蔡是也通南方以入江者唯楚州運河耳北人舟艦自五河而下將謀渡江非得楚州運河無縁自達昔周世宗自楚州北神堰鑿老鸛河通戰艦以入大江南唐遂失兩淮之地由此言之楚州實為兩朝司命願朝廷留意宋史陳敏傳李浩知靜江府兼廣西安撫上諭大臣曰李浩營田議甚可行大臣莫有應者浩至郡舊有靈渠通漕運及灌溉嵗久不治命疏而通之民頼其利宋史李浩傳貝欽世知江隂縣縣有運河堙塞欽世浚治之大家争捐金相助不踰月而成江南通志宋光宗紹熈五年淮東提舉陳損之言髙郵楚州之間陂湖渺漫茭葑彌滿宜剏立隄堰以為瀦泄庶幾水不至於泛溢旱不至於乾涸乞興築自揚州江都縣至楚州淮隂縣三百六十里又自髙郵興化至鹽城縣二百四十里其隄岸傍開一新河以通舟船仍存舊隄以捍風浪栽栁十餘萬株數年後隄岸亦牢其木亦可備修補之用兼揚州墟鎮舊有隄牐乃泰州泄水之處其牐壞久亦於此剏立斗門西引盱眙天長以來衆湖之水起自揚州江都經由髙郵及楚州寳應山陽北至淮隂西達於淮又自髙郵入興化東至鹽城而極於海又泰州海陵南至揚州泰興而徹於江共為石䃮十三斗門七乞以紹熈堰為名鑱諸堅石淮田多沮洳因損之築隄捍之得良田數百萬頃奏聞除直秘閣淮東轉運判官宋史河渠志宋寧宗慶元五年兩浙轉運浙西提舉言以鎮江府守臣重修吕城兩牐畢再造一新牐以固隄防庶為便利從之宋史河渠志宋寧宗嘉泰元年守臣李珏言州境北邊揚子大江南並太湖東連震澤西據鬲湖而漕渠界乎其間漕渠兩傍曰白鶴溪西蠡河南戚氏北戚氏直湖州港通於二湖曰利浦孟瀆烈塘横河五瀉諸港通於大江而中間又各自為支溝斷汊曲繞參錯不以數計水利之源多於他郡而常苦易旱之患何哉臣嘗詢訪其故漕渠東起望亭西上吕城一百八十餘里形勢西髙東下加以嵗久淺淤自河岸至厎其深不滿四五尺常年春雨連綿江湖泛漲之時河流忽盈驟減連嵗雨澤愆闕江湖退縮渠形尤亢間雖得雨水無所受旋即走泄南入於湖北歸大江東徑注於呉江晴未旬日又復乾涸此其易旱一也至若兩旁諸港如白鶴溪西蠡河直湖烈塘五泄堰日為沙土淤漲遇潮髙水泛之時尚可通行舟楫若值小汐久晴則俱不能通應自餘支溝别港皆巳堙塞故雖有江湖之侵不見其利此其易旱二也况漕渠一帶綱運於是經由使客於此往返每遇水澀綱運便阻一入冬月津送使客作壩車水科役百姓不堪其擾豈特溉田缺事而巳望委轉運提舉常平官同本州相視漕渠并徹江湖之處如法浚治盡還昔人遺跡及於望亭修建上下二牐固護水源從之宋史河渠志宋寧宗嘉泰二年六月壬午浚浙西運河宋史寧宗本紀宋寧宗嘉定間臣僚言國家駐蹕錢塘綱運糧餉仰給諸道所繫不輕水運之程自大江而下至鎮江則入牐經行運河如履平地川廣巨艦直抵都城蓋甚便也比年以來鎮江牐口河道淤塞不復通舟乞令漕臣同淮東總領及本府守臣公共措置開撩宋史河渠志汪綱知髙郵軍興化民田濵海昔范仲淹築堰以障舄鹵守毛澤民置石䃮函管以疏運河水勢嵗久皆壞綱乃増修之部使者聞於朝増一秩知紹興府蕭山有古運河西通錢塘東逹台明沙漲三十餘里舟行則膠乃開浚八千餘丈復創牐江口使泥淤不得入河水不得洩於涂則盡甃以達城闉十里創一廬名曰施水主以道流於是舟車水陸不問晝夜暑寒意行利渉歡訢忘勩宋史汪綱傳陳居仁守鎮江治古海鮮界港為石䃮丹徒境上蓄洩以時以通漕運加寳文閣待制知福州宋史陳居仁傳李庭芝主管兩淮制置司事至揚鑿河四十里入金沙餘慶場以省車運兼浚他運河放亭戸負鹽二百餘萬亭民無車運之勞宋史李庭芝傳行水金鑑巻九十八
