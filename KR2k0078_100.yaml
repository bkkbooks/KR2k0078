body:
  text: 行水金鑑卷一百江南按察使傅澤洪撰運河水歐陽原功中書右丞相領通惠河都水監事政績碑中書右丞相定柱公自居平章首席既而升左相又升右相被命領都水監事至正癸卯之正月迄今數年之中濬治舊規抑塞新弊水政大修都水監長二賓佐共具實蹟請於翰林歐陽𤣥文其事於石以貽後世𤣥曰丞相上佐天子下理百官日綜萬幾朝野政務莫非相業所經綸也奚獨於水政紀述乎其長二賔佐進曰我國家之置都水也始於至元之辛卯丞相諤勒哲實倡其端當時聖君賢相為慮甚周為制甚密𨗳昌平白浮之水西流循西山之麓㑹馬眼諸泉瀦為七里東流入自城西水門滙積水潭又東並宫牆環大內之左右金水河南流東出自城東水門又潞水之陽南㑹白河又南㑹直沽入海凡二百里是為通惠河置閘二十有四跨諸閘之上通京師內外經行之道置橋百五十有六閘以制蓄泄橋以惠往來乃即運糧提舉司車戶千四百五十有一隸監專治其事閘與橋初置于延祐中易木以石次第而械之命閘戶學為石工木鐵煉堊皆習其技嵗械閘工與費若干有司㑹其凡而籍之嵗以為常約嵗若干諸閘皆石一切工役取具閘戶不擾而集國計之不匱民用之不乏皆利賴焉近年有司擅以閘戶抑配各驛以給驛至元延祐以來祖宗之良法美意日就蠧壞今右丞相以聞有㫖復還若干戶餘州縣之侵軼閘戶者悉禁絶之他戶有避徭役之類仍因而亡者咸復其舊故得水利不隳漕法不滯有關國計民用甚重也且通惠河之將入海也衡漳貫之遡漳西南涉瀛博之野南至于臨清堂邑之壩過壩而南為㑹通河盡豫兖青徐四州境上之水入河絶淮至大江而止二河相通其為水利博矣有如京城西之金口下視都邑水勢如建瓴一蟻穴之漏則橫潰莫制守隄吏與閘戶晝夜分番邏視不贍則借兵士於樞密所係尤重故水政之修閘戶之復丞相有功于斯甚大可無紀述乎𤣥聞其言乃考古而徴今水在唐虞為澤虞在成周為川衡西漢太常大司農少府內史主爵都尉皆置都水長二武帝置水衡都尉成帝置左右都水使者東漢改置河隄謁者晉改都水臺又置前後中左右五水衡以五使領之劉宋置水衡令蕭梁改為大舟卿宇文置都水中大夫隋置都水臺使者尋復置監少監又改令少令唐沿革不一或稱都水局或稱司津監或稱水衡監或置使者或置都尉趙宋為都水監置判監判及丞主簿等員大抵掌川澤津梁渠堰陂池之政兼總舟航桴筏之算就司其政以充用故漢太常諸卿各有水衡盡征其入給俸祿所稱水衡錢是也聖代捐國家之厚費以利天下而秋毫不征其資視古之都水有不可同年語者矣但歷代建都秦漢唐多都雍州隔關隘之險漕運極艱用水極少其後有都洛陽大梁亦不過濬洛入汴瀹汝蔡入淮而巳我元東至于海而暨于河南盡于江北至大漠水涓滴以上皆為我國家用東南之粟水漕數百萬石由海而至者道通惠河以達東南貢賦凡百上供之物嵗億萬計絶江淮河而至道通惠河以達商貨懋遷與夫民生日用之所須不可悉數二河泝沿南北物貨或入或出遍天下者猶不在是數又自崑崙西南水入海者繞出南詔之後歷交趾闍婆真臘占城百粵之國東南過琉球日本東至三韓逺人之名琛異寶神馬竒産航海而至或踰年之程皆由漕河以至闕下斯又古今載籍之所未有者也水政之重可不以重臣領之乎昔者舜舉十六相共治海內禹治水土益治川澤今之水政禹益蓋嘗司之然則重臣之典水政唐虞以來之遺事也歟𤣥職在太史紀載為宜右丞相喀喇氏鼎珠其名乃祖乃父三世宿德逮事列聖篤于忠貞數從王師戰金入鄰多積功伐不妄俘戮不希寵榮有隂德餘慶施于後人丞相踵之敡歷臺閣三十餘年清慎如一熟知國家典故及居台揆雅量鎮浮坐決大政不徴辭色百度自貞有古大臣之風來求文以紀其蹟者都水伊蘇岱爾段達􅓫少監諤勒哲特穆爾太平努色徹圖監丞索諾木曼濟布哈實喇藏布穆爾濟雅經歷沙克善知事祁思道爰系以詩曰國治水官象天𤣥冥都水有政治國大經於穆皇元龍興朔方秉令天一並牧八荒乃據析津乃建神州囊括萬派衡從其流東濬白浮遵彼西山即是天津流畢昴間西挹紫宫南出皇畿又東注海萬派攸歸東溟天池若為我瀦給我漕挽徑達宸居河濟淮江陳若指掌我鑿二渠利盡穹壤雖云盡利我則不征損利利民治水水平維今右相自董水政舉措不煩戶籍先正昔命閘戶習煆習礪鍵木膠堊各程其藝制水有閘通道有梁息耗有則啓閉有常夫何閘戶俾役驛厩是求善書俾掣之肘相君既告閘戶內復每嵗鳩工羣匠來族水政既舉國計以滋都人日用源委莫知彼水在國血脈在身百體輸精五官嗇神相為股肱水利實興榮衛不凝股肱宣能維相君量彭蠡大野汪洋淵渟安靜整暇維相君力砥柱龍門捍彼衝潰國之樊垣有方斯定有量斯寬燮調雍容嵗溢旱乾重華在位禹益作相庶工砥績百川是障世皇濬渠相曰諤勒哲身先水官相彼原隰洵美相君海內稱賢罔俾哲輔專美于前六府三事治先乎水九叙惟歌作者太史太史作歌載以龜趺圭齊集大通河發源于昌平之白浮村神山泉西南㑹一畝馬眼玉泉繞出甕山後滙為七里泊東入都城西水門貫積水潭又稍東由月橋入內府環繞宫殿南出玉河橋水門東行㑹南北城河二流由大通橋東下通州髙麗莊入白河周夢暘水部備考河薈蕞云通惠河即今之大通也水自玉河出繞都城東南經大通橋流至髙麗莊入白河此其源流歸宿之大凡也玉河之水在玉泉山流出玉泉山在順天府西北三十里山上有金章宗避暑行宫芙蓉殿故址泉出石罅中如沸明宣宗命甃石為池搆亭其上池前為石橋水過橋為溪曲折三百步許瀦為西湖秋髙氣清泓徹渟滀水光接天皛然一白南有一洞洞旁石崖髙百餘尋刻玉泉二字大足丈許其地總名西山舊記云太行山第八陘在燕强形巨勢雲從星拱都城西望翠若列屏春雨羃䍥夏樹菁葱秋花爛熳冬雪瓊瑶四時風景百幅畫圖也至於諸峰羅列雖因地得名總曰西山而紺閣琳宫懸亭聳榭不可勝紀其尤竒者氣煦泉甘木不凋冬卉不枯霰居然冀北之江南云甕山去阜成門二十餘里上赤墳童童無草木山南若洞而圮者小鬲臺也山臨西湖水田碁布山後一畝泉今不知所在處處可陂可塘可隄可苑白浮山通志云在昌平州南十里上有二潭水經白浮村元郭守敬引水西折而南經甕山泊入積水潭以濟漕運蓋通惠河之源雖言自白浮諸泉水而其實皆自西山一帶千巖萬壑之水滙於西湖流入大內出東南水門注大通河流入髙麗莊入於白河者也蓬窗日録云北京青龍水為白河出密雲南流至通州城白虎水為玉河出玉泉山經大內出都城注通惠河與白河合朱雀水為盧溝河出大同桑乾入宛平界出盧溝橋𤣥武水為濕餘髙梁黃花鎮川榆河俱繞京師之北而東與白河合梓溪集云京師形勝以堪輿家論之玉河之水當直出㑹南海子從天地壇前轉東入潞河方為自然崇文門外閘河宜塞之庶幾左臂不斷此乃帝王建都萬代之計也白浮甕山即通惠河上源之所出也白浮泉水在昌平縣界西折而南經甕山泊自西水門入都城焉成宗大德七年六月甕山等處看閘提領言自閏五月二十九日始晝夜雨不止六月九日夜半山水暴漲漫流隄上衝決水口於是都水監委官督軍夫自九月二十一日入役至是月中輟工實役軍夫九百九十三人十一年三月都水監言巡視白浮甕山河隄崩三十餘里宜編荆笆為水口以泄水勢計修笆口十一處四月興工十月工畢仁宗皇慶元年正月都水監言白浮甕山隄多低薄崩陷處宜修治來春二月入役八月修完總修長三十七里二百十五步計七萬三千七百七十三工延祐元年四月都水監言自白浮甕山下至廣源閘隄堰多淤澱淺塞源泉微細不能通流擬疏滌由是㑹計工程差軍千人疏治泰定四年八月都水監言八月三日至六日霖雨不止山水泛溢衝壞甕山諸處笆口浸沒民田計料工物移文工部關支修治自八月二十六日興工九月十二日工畢役軍夫二千名實役九萬工四十五日元史河渠志壩河亦名阜通七壩成宗大德六年三月京畿漕運司言嵗漕米百萬全藉船壩夫力自氷開發運至河凍時止計二百四十日日運糧四千六百餘石所轄船夫一千三百餘人壩夫七百三十占役俱盡晝夜不息今嵗水漲衝決壩隄六十餘處雖巳修畢恐霖雨衝圯走泄運水以此㸃視河隄淺澀低薄去處請加修理自五月四日入役六月十二日畢深溝壩九處計一萬五千一百五十三工王村壩二處計七百十三工鄭村壩一處計一千一百二十五工西陽壩三處計一千二百六十二工郭村壩三處計一千九百八十七工千斯壩下一處計一萬工總用工三萬二百四十元史河渠志雙塔河源出昌平縣孟村一畝泉經雙塔店而東至豐善村入榆河至元三年四月六日巡河官言雙塔河時將泛溢不早為備恐至潰決臨期卒難措手乃計㑹閉水口工物開申都水監創開雙塔河未及堅久今已及水漲之時倘或決壞走泄水勢誤運船不便省準制國用司給所需都水監差夫修治焉凡合閉水口五處用工二千一百五十五元史河渠志庸薈蕞云水經濕餘水出上谷居關東又東流過京都縣南注云水南流出關謂之下口水流潜伏十許里重源潜發積而為潭謂之濕餘潭即今榆河之源也方輿記要云榆河一名濕餘河或名溫榆河蓋濕餘之訛也竹垞先生云按後漢書王霸為上谷太守陳委輸可從溫水漕以省陸轉輸之勞事皆施行章懷太子注引水經注本作溫餘水遼史順州有溫渝河金更懷柔縣為溫陽豈盡無據又昌平多溫泉有流入雙塔河者溫餘之名竊疑因此水經注既無善本今人習見坊刻遂指溫字為濕字之訛正恐類昔人所云以不悖為悖也昌平州志云榆河源出州西南四十里月兒灣下流為沙河經順義㑹白河盧溝河其源出于代地名曰小黃河以流濁故也自奉聖州界流入宛平縣境至都城四十里東麻谷分為二派太宗七年嵗乙未八月敕近劉冲祿言率水工二百餘人巳依期築閉盧溝河元破牙梳口若不修隄固護恐不時漲水衝壞或貪利之人盜決溉灌請令禁之劉冲祿可就主領毋致衝塌盜決犯者以違制論徒二年決杖七十如遇修築時所用丁夫器具應差處調發之其舊有水手人夫內五十人差官存留不妨巳委管領常切巡視體究嵗一交番所司有不應副者罪之元史河渠志渾河本盧溝水從大興縣流至東安州武清縣入漷州界至大二年十月渾河水決左都威衛營西大隄泛溢南流沒左右二翊及後衛屯田麥由是左都威衛言十月五日水決武清縣王甫村隄闊五十餘步深五尺許水西南漫平地流環圓營倉局水不沒者無幾恐來春氷消夏雨水作衝決成渠軍民被害或遷置營司或多差軍民修塞庶免墊溺三年二月十二日省準下左右翊及後衛大都路委官督工修治至五月二十日工畢皇慶元年二月十七日東安州言渾河水溢決黃堝隄一十七所都水監計工物移文工部二十七日樞密知院達實特穆爾奏左衛言渾河決隄口二處屯田浸不耕種巳發軍五百修治臣等議治水有司職耳宜令中書戒所屬用心修治從之七月省委工部員外郎張彬言巡視渾河六月三十日霖雨水漲及丈餘決隄口二百餘步漂民廬沒禾稼乞委官修治發民丁刈雜草興築延祐元年六月十七日左衛言六月十四日渾河決武清縣劉家莊隄口差軍七百與東安州民夫協力同修之三年三月省議渾河決隄堰沒田禾軍民䝉害既巳奏聞差官相視上自石徑山金口下至武清縣界舊隄長計三百四十八里中間因舊修築者大小四十七處漲水所害合修補者一十九處無隄創修者八處宜疏通者二處計工三十八萬一百役軍夫三萬五千九十六日可畢如通築則役大難成就令分作三年為之省院差官先發軍民夫匠萬人興工以修其要處是月二十日樞府奏撥軍三千委中衛僉事督修治之七年五月營田提舉司言去嵗十二月二十一日屯戶巡視廣賦屯北渾河隄二百餘步將崩恐春首土解水漲浸沒為患乞修治都水監委濠寨㑹營田提舉司官武清縣官督夫修完廣武屯北陷薄隄一處計二千五百工永興屯北隄低薄一處計四千一百六十六工落垈村西衝圯一處計三千七百三十三工永興屯北崩圮一處計六千五百十八工北王村莊西河東岸至白墳兒南至韓村西道口計六千九十三工劉邢莊西河東岸北至寶僧百戶屯南至白墳兒計三萬七百十二工總用工五萬三千七百二十二泰定四年四月省議三年六月內霖雨山水暴漲泛沒大興縣諸鄉桑棗田園移文樞府於七衛屯田及見有軍內差三千人修治元史河渠志盧溝河出太原天池伏流至朔州馬邑從雷山陽湧為金龍池迤邐東下曰桑乾河鴈門雲中諸水皆㑹由大同古定橋抵宣府保安州過懷來行兩山間至京城西四十里石徑山之東地平土疏衝激遷徙不常至看丹口分為二一東流至通州髙麗莊入白河是為渾河一南流至霸州合易水又南至丁字沽入運河吳文恪公集盧溝本桑乾河俗曰渾河在都城西南四十里有石橋橫跨二百餘步橋上兩傍皆石欄雕刻石獅形狀竒巧金明昌間所造兩崖多旅舍以其密邇京師驛通四海行人使客往來絡繹疏星曉月曙景蒼然亦一竒也戴司成集本薈蕞云盧溝河在順天府西南二十五里桑乾水又名漯水俗名渾河黃河别源也源出山西大同府桑乾山下經太行山入宛平縣境在上流曰桑乾在下流為盧溝以其濁故呼渾河以其黑故呼盧溝燕人以黑為盧水本一也白河在漷州東四里北出通州潞縣南入于通州境又東南至香河縣界又流入于武清縣境達於靜海縣界至元三十年九月漕司言通州運糧河全仰白榆渾三河之水合流名曰潞河舟楫之行有年矣今嵗新開閘河分引渾榆二河上源之水故自李二寺至通州三十餘里河道淺澀今春夏天旱有止深二尺處糧船不通改用小料船搬載淹延嵗月致虧糧數先是都水監相視白河自東岸吳家莊前就大河西南斜開小河二里許引榆河合流至深溝壩下以通漕舟今丈量自深溝榆河上灣至吳家莊龍王廟前白河西南至壩河八百步及巡視知榆河上源築閉其水盡趨通惠河止有白佛靈溝一子母三小河水入榆河泉脈微不能勝舟擬自吳家莊就龍王廟前閉白河於西南開小渠引水自壩河上灣入榆河庶可漕運又深溝樂嵗五倉積貯新舊糧七十餘萬石站車挽運艱緩由是訪視通州城北通惠河積水至深溝村西水渠去樂嵗廣儲等倉甚近擬自積水處由舊渠北開四百步至樂嵗倉西北以小料船運載甚便都省准焉通惠河自通州城北至樂嵗西北水陸共長五百步計役八萬六百五十工大德二年五月中書省劄付都水監運糧河隄自楊村至河西務三十五處用葦一萬九千一百四十束軍夫二千六百四十九名度三十日畢於是本監分官率濠寨至楊村歷視壞隄督巡河夫修理以霖雨水溢故工役倍元料自寺泃口北至蔡村清口孫家務辛莊河西務隄就用元料葦草修補卑薄創築月隄頗有成功其楊村兩岸相對出水河口四處葦草不敷就令軍夫採刈至九月住役楊村河上接通惠諸河下通滹沱入江淮使官民舟楫直達都邑利國便民奈楊村隄岸隨修隨圯蓋為用力不固徒煩工役其未修者候來春水涸土乾調軍夫修治延祐六年十月省臣言漕運糧儲及南來諸物商賈舟楫皆由直沽達通惠河今岸崩泥淺不早疏浚有礙舟行必致物價翔湧都水監職專水利宜分官一員以時巡視遇有頽圯淺澀隨宜修築如功力不敷有司差夫助役怠事者究治從之至治元年正月十一日漕司言夏運海糧一百八十九萬餘石轉漕往返全藉河道通便今小直沽汊河口潮汐往來淤泥壅積七十餘處漕運不能通行宜移文都水監疏滌工部議時農作方興兼民多艱食若不差軍助役民力有所不逮樞密院言軍人不敷省議若差民丁方今東作之時恐妨嵗事其令大都募民夫三千日給傭鈔一兩糙粳米一升委正官提調驗日支給令都水監暨漕司官同督其事四月十一日入役五月十日工畢泰定元年二月福府臣奏臨清萬戶府言至治元年霖雨決壞運糧河岸宜差軍修築臣等議誠利益事令本府差軍三百執役從之三年三月都水監言河西務菜市灣水勢衝嚙與倉相近將來為患宜於劉二總管營相對河東岸截河築隄改水道與舊河合可杜後患四年正月省臣奏准樞府差軍五千大都路募夫五千人日支糙米五升中統鈔一兩本監工部委官與前衛董指揮同監役是年三月十八日興工六月十一日工畢致和元年六月六日臨清御河萬戶府言泰定四年八月二日河溢壞營北門隄約五十步漂舊樁木百餘崩圯猶未已工部議河岸崩摧理宜修治既都水監㑹計工物各處支給其役夫三千人若擬差民方春恐妨農務宜移文樞密院撥軍省准修舊隄岸展闊新河口東岸計工五萬九千九百三十七用軍三千木匠十人天厯二年三月漕司言元開劉二總管營相對河北舊河運糧迂逺乞委官相視復開舊河便四月九日奏准差軍七千委兵部員外郎鄧衡都水監丞阿爾漕使台哈布哈等督工修浚後以冬寒候凍解興役三年工部移文大都於近甸募民夫三千日支糙粳米三升中統鈔一兩兵部改委辛侍郎暨元委官修闢至順元年六月都水監言二十三日夜白河水驟漲丈餘觀音寺新修護倉堤巳督有司差夫救護今水落尺餘宜候伏槽興作元史河渠志白河經密雲諸山全受渾榆諸河之水夏秋暴漲隄防不能禦源逺流迅水勢漫散河皆溜沙深淺通塞不常運行甚艱惟用兜杓數千具治河官夫遇淺即濬庶盤剝可省矣近有議於白河建閘者河廣水盛漲必他決砥皆淤沙閘必易損且河徙無定閘難改移蓋未達水土之宜也問水集謹按白河源出密雲縣霧靈山南經通州漷縣香河武清㑹榆渾諸河凡三百六十里至直沽㑹衛河同入於海榆河源出昌平州南月兒灣下流為沙河㑹清河經順義縣入白河潮河源出密雲縣至順義縣牛欄山入白河富河源出甕山口㑹霸河至通州東北入白河桑乾河源出山西大通府桑乾山流至宛平縣盧溝橋南看丹口分為二其一名渾河一名盧溝河渾河東流至通州張家灣下馬頭入白河三里河出都城西過都城東南十里河至煙墩巷入渾河白榆渾三河之水合流名曰潞河盧溝河東南流經固安縣又經霸州苑家口至武清縣丁字沽凡四百里入白河以上諸水併入白河而通惠泉源混混又來自上流白河渠狹而流長勢險而禍烈舉目即瞭然矣張兆元白河源流考龍薈蕞云畿輔通志潮河在寶坻縣東一名白港源發梨河至寶坻三汊口與泃河鮑丘河合流為糧河入海又密雲縣東南有潮河下流順義縣界合白河方輿紀要云潮河在密雲縣東南自古北口流入縣界西南流至順義縣合于白河春明夢餘録云三里河元時名文明河接通惠河為漕儲運道今鐵閘尚存御河自大名路魏縣界經元城縣泉源鄉于村度南北約十里東北流至包家渡下接館陶縣界三口御河上從交河縣下入清池縣界又永濟河在清池縣西三十里自南皮縣來入清州今呼為御河也至元三年七月六日都水監言運河二千餘里漕公私物貨為利甚大自兵興以來失於修治清州之南景州以北頽闕岸口三十餘處淤塞河流十五里至癸已年朝廷役夫四千修築浚滌乃復行舟今又三十餘年無官主領滄州地分水面髙于平地全藉隄堰防護其園圃之家掘隄作井深至丈餘或二丈引水以溉蔬花復有瀕河人民就隄取土漸至闕破走泄水勢不惟澀行舟妨運糧或致漂民居沒禾稼其長蘆以北索家馬頭之南水內暗藏樁橛破舟船壞糧物部議以濵河州縣佐二之官兼河防事於各地分巡視如有闕破即率衆修治拔去樁橛仍禁園圃之家毋穿隄作井栽樹取土都省准議七年省臣言御河水泛武清縣計疏浚役夫一十工八十日可畢從之至大元年六月二十九日左翼屯田萬戶府呈五月十八日申時水決㑹川縣孫家口岸約二十餘步南流灌本管屯田巳移文河間路武清縣清州有司多發丁夫管領修治由是樞密院檄河間路左翼屯田萬戶府差軍併工築塞十月大名路濬州言七月十一日連雨至十七日清石二河水溢李家道東南橫流詢社長髙良輩稱水源自衛輝路汲縣東北連本州淇門西舊黑蕩泊溢流出岸漫黃河古隄東北流入本州齊賈泊復入御河漂及門民舍竊計今嵗水勢逆行乃下流漳水漲溢遏絶不能通以致若此實非人力可勝又西關水手佐聚稱七月十二日卯時御河水驟漲三尺十八日復添四尺其水逆流明是下流漲水壅逆擬差官巡治延祐三年七月滄州言清池縣民告往年景州吳橋諸處御河水溢衝決隄岸萬戶齊諾為恐傷淇屯田差軍築塞舊泄水郎兒口故水無所泄浸民廬及巳熟田數萬頃乞遣官疏闢引水入海及七月四日決吳橋縣栁斜口東岸三十餘步千戶伊􅓫又遣軍閉塞郎兒口水壅不得泄必致漂蕩張管許河孟村三十餘村黍榖廬舍故本州摘官相視移文約㑹開闢不從四年五月都水監遣官與河間路官相視元塞郎兒口東西長二十五步南北闊二十尺及隄南髙一丈四尺北髙二丈餘復按視郎兒口下流故河至滄州約三十餘里上下古跡寬闊乃減水故道名曰盤河令為開闢郎兒口增濬故河決積水由滄州城北達滹沱河以入于海泰定元年九月都水監遣官督丁夫五千八百九十八人是年二月八日興工十月二日工畢元史河渠志通薈蕞云畿輔志廣平府下御河在清河縣東南二十五里即衛河漢為屯氏河隋為永濟渠亦曰御河發源於河南衛輝府之輝縣至臨清合閘下天津為今運道大名府下衛河在魏縣東南經清源達直沽水清渠深不為害又云御河即白溝水隋煬帝引洹水為遊覽之所故名今不見亦并於衛河然土人猶曰御河云河南通志衛河在衛輝府北一里源出蘇門山東入大名府濬縣界畿志云在魏縣東南豫志又云入濬縣界魏濬本不接壤何言之互異若此行水金鑑卷一百
