body:
  text: 行水金鑑卷一百二江南按察使傅澤洪撰運河水兖州閘已見前至元二十七年四月都漕運副使馬之貞言準山東東西道宣慰使司牒文相視兖州閘堰事先於至元十二年蒙丞相巴延訪問自江淮逹大都河道之貞乃言宋金以來汶泗相通河道郭都水按視可以通漕於二十年中書省奏準委兵部李尚書等開鑿擬修石閘十四二十一年省委之貞與尚監察等同相視擬修石閘八石堰二除已修畢外有石閘一石堰一缸城石堰一至今未修據濟州以南徐邳沿河撁道橋梁二十二年添立邳州水站移文沿河州縣修治已完二十三年調之貞充漕運副使委管閘接放綱船沿河撁道元無崩損去處在前年例當麻麥盛時差官修理撁道督責地主割刈麻麥并滕州開決稻堰泗源磨堰差人於吕梁百步等谼及濟州閘監督江淮綱運船隻過谼出閘不令阻滯客旅茍取錢物據新開會通并濟州汶泗相通河非自然長流河道於兖州立閘堰約泗水西流缸城立閘堰分汶水入河南會於濟州以六閘撙節水勢啓閉通放舟楫南通淮泗以入新開會通河至於通州近去嵗四月江淮都漕運使司言本司糧運經濟河至東阿交割前者濟州運司不時移文瀕河官司修治撁道若有緩急處所正官取招呈省路經歷縣逹嚕噶齊以下就便斷罪今濟州漕司革罷其河道撥屬都漕運司管領本司糧運未到東阿凡有阻滯並是本司遲慢迤南河道從此無人管領不時水勢泛溢隄岸摧塌澀滯河道又濟州閘前濟州運司正官親臨監視其押綱船户不敢分爭即日各處官司差人管領與綱官船户各無統攝爭要水勢及攙越過閘互相毆打以致損壞船隻浸沒官糧擬將東阿河道撥付江淮都漕運司提調管領庶幾不誤糧運都省準焉又準江淮都漕運司副使言除委官看管閘堰外據汶泗缸城二閘一堰泗河兖州閘堰濟州城南閘乃會通河上源之喉襟去嵗流水衝壞缸城汶河土堰兖州泗河土堰必須移文兖州泰安州差夫修閉又被漲水衝破梁山一帶隄堰走泄水勢通入舊河以致新河水小澀糧船乞移文斷事等官轉下東平路修閉上流撥屬江淮漕運司下流屬之貞管領若已後新河水小直下濟州監閘官并泰安兖州東平修理據兖州石閘一所石堰一道缸城石閘一道合用材物已行措置完備必須修理雖初經之貞相視會計即令不𨽻管領乞移文江淮漕司修治其泰安州缸城安梁山一帶隄岸濟州閘等處雖是撥屬江淮漕司今後倘若水漲衝壞隄堰亦乞照會東平濟寧泰安如承文字亦仰奉行又東阿須城界安山閘為糧船不由舊河來往江淮所委監閘官已去目今無人看管必須之貞修理以此權委人守焉元史河渠志濟州河者新開以通漕運也世祖至元十七年七月耿參政阿里尚書奏為姚演言開河事令阿哈穆特與耆舊臣集議以鈔萬錠為傭直仍給糧食世祖從之十八年九月中書丞相和爾果斯等奏姚總管等言請免益都淄萊寧海三州一嵗賦入折傭直以為開河之用平章阿哈穆特與諸老臣議以為一嵗民賦雖多較之官給傭直行之甚便遂從之十月和爾果斯等奏安巴蘇所開河經濟州而其地又有一河傍有民田開之甚便臣等議若開此河阿八失所管一方屯田宜移之他處不阻水勢世祖令移之十二月差鄂囉齊劉都水及精算數者一人給宣差印往濟州定開河夫役令大名衛州新附軍亦往助工三十一年御史臺言膠萊海道淺澀不能行舟臺官伊蘇特穆爾奏安巴蘇所開河省遣雅伊密實來謂漕船泛河則失少泛海則損多既而漕臣曩嘉岱萬户孫偉又言漕海舟疾且便右丞瑪哈丹又奏鄂諾鄂諾岱凡三移文言安巴蘇所開河益少損多不便轉漕水手軍人二萬舟千艘見間不用如得之可嵗漕百萬石昨奉旨候蒙古台來共議海道便則安巴蘇河可廢今蒙古台已自海道運糧回有一二南人自願運糧萬石已許之曩嘉岱孫萬户復請用軍驗試海運省院官暨衆議安巴蘇河所用水手五千軍五千船千艘畀揚州省教習漕運今擬以此水手軍人就用平灤船從利津海漕運世祖從之安巴蘇所開河遂廢元史河渠志揚州運河宋時嘗設軍疏滌世祖取宋之後河漸壅塞至元末年江淮行省嘗以為言雖有旨濬治有司奉行未見實效仁宗延祐四年十一月兩淮運司言鹽課甚重運河淺澀無源止仰天雨請加修治明年二月中書移文河南省選官洎運司有司官相視會計工程費用於是河南行省委都事張奉政及淮東道宣慰司官運司官會州縣倉場官遍歷巡視集議河長二千三百五十里有司差瀕河有田之家雇倩丁夫開修一千八百六十九里倉場鹽司不妨辦課協濟有司開修四百八十二里運司言近嵗課額增多而船竈反日益貧苦宜令有司通行修治省減官錢省臣奏準諸色户內顧募丁夫萬人日支鹽糧錢二兩計用鈔二萬錠於運司鹽課及減駁船錢內支用差官與都水監河南行省淮東宣慰司官專董其事亷訪司體察樞密院遣官鎮遏乘農隙併工疏治元史河渠志練湖在鎮江元有江南之後豪勢之家於湖中築隄圍田耕種侵占既廣不足受水遂致泛溢世祖末年參政諳達拉奏請依宋例委人提調疏治其侵占者驗畝加賦至治三年十二月省臣奏江浙行省言鎮江運河全藉練湖之水為上源官司漕運供億京師及商賈販載農民來往其舟楫莫不由此宋時專設人夫以時修濬練湖瀦蓄潦水若運河淺阻開放湖水一寸則可添河水一尺近年淤淺舟楫不通凡有官物差民運遞甚為不便委官相視疏治運河自鎮江路至吕城壩長百三十一里計役夫萬五百十三人六十日可畢又用三千餘人浚滌練湖九十日可完人日支糧三升中統鈔一兩行省行臺分官監督所用船物今嵗預備來春興工合行事宜依江浙行省所擬既得旨都省移文江浙行省委參政董中奉率合屬正官親臨督役於是董中奉言所委前都水少監崇明州知州任奉政鎮江路總管毛中議等議練湖運河此非一事宜依假山諸湖農民取泥之法用船千艘船三人用竹䈒撈取淤泥日可三載月計九萬載三月之間通取二十七萬載就用所取泥增築湖岸自鎮江在城程公壩至常州武進縣吕城壩河長百三十一里一百四十六步擬開河面濶五丈底濶三丈深四尺與見有水二尺可積深六尺所役夫於平江鎮江常州江隂州又建康路所轄溧陽州田多上戶內差倩若濬湖開河二役並興卒難辦集宜趁農隙先開運河工畢就濬練湖省準所言與都事王徴事等於泰定元年正月至鎮江丹陽縣洎各監工官沿湖相視上湖沙岡黃土下湖茭根叢雜泥亦堅硬不可䈒取又議兩役並興相離三百餘里往來監督供給為難願以所督夫一萬三千五百十二人先開運河期四十七日畢次濬練湖二十日可完繼有江南行臺侍御史及浙西亷訪司副使俱至乃議首事運河備文咨稟遂於是月十七日入役二月十八日省臣奏開濬運河練湖重役也宜依行省所議仍令便宜從事後各監工官言已分運河作三壩依原料深濶丈尺開浚至三月四日工畢數內平江崑山嘉定二州實役二十六日常熟吳江二州長洲吳縣實役二十八日餘皆役三十日已於三月七日積水行舟又監修練湖官言任奉議指劃元料增築隄堰及舊有土基共增濶一丈二尺平面至髙底灘腳增築共量斜髙二丈五尺依中堰西石䃮東舊隄卧羊灘修築如舊隄髙濶已及所料之上者遇有崩缺修築合完中堰西石䃮至五百婆隄西上增髙土一尺有缺亦補之五百婆隄至馬林橋隄水勢稍緩不須修治其隄底間有滲漏者窒塞之三月六日破土九日入役至十一日工畢實役三日歸勘任少監元料開運河夫萬五百十三人六十日畢濬練湖夫三千人九十日畢人日支鈔一兩米三升共該鈔萬八千一十四錠二十兩米二萬七千二十一石六斗實徴夫萬三千五百十二人共役三十三日支鈔八千六百七十九錠三十六兩糧萬三千十九石五斗八升比附元料省鈔九千三百三十四錠三十四兩糧萬四千二石二升其練湖未畢相視地形水勢再議參政董中奉又言練湖舊有湖兵四十三人添補五十七名共百人於本路州縣苗糧三石之下二石之上差充專任修築湖岸設提領二員壕寨二人司吏三人於有出身人內選用工部議練湖所設提領人等印信即同湖兵宜咨本省遍行議擬又鎮江路言運河練湖今已開濬若不設法關防徒勞民力除關本路逹嚕噶齊烏魯斯哈雅總治其事同知哈克繖知事程郇專管啓閉斗門行省從之元史河渠志元憲宗三年癸丑即宋理宗寶祐元年世祖募民受鹽入粟轉漕嘉陵元史世祖本紀元憲宗四年甲寅即宋理宗寶祐二年張柔移鎮亳州以渦水北隘淺不可舟軍既病涉曹濮魏博粟皆不至乃築甬路自亳抵汴堤百二十里流深而不能築復為橋十五或廣八十尺橫以二堡戍之元史憲宗本紀元憲宗五年乙卯即宋理宗寶祐三年秋九月張柔會大帥於符離以百丈口為宋往來之道可容萬艘遂築甬道自亳而南六十餘里中為橫江堡又以路東六十里皆水可致宋舟乃立柵水中唯密置偵邏於所逹之路由是鹿邑寧陵考柘楚丘南頓無宋患陳蔡潁息皆通矣元史憲宗本紀元世祖中統二年即宋理宗景定元年秋七月辛已命西京宣撫司造船備西夏漕運八月甲寅敕西京運糧於沙井北京運糧於魚兒泊九月丙子敕今嵗田租輸沿河近倉官為轉漕不可勞民元史世祖本紀元世祖中統三年即宋理宗景定二年夏四月辛卯修河中禹廟賜名建極宫八月已丑郭守敬請開玉泉水以通漕運從之元史世祖本紀守敬字若思邢臺人從劉秉忠學中統三年用薦世祖召見面陳水利六事其一中都舊漕河東至通州引玉泉水以通舟嵗可省雇車錢六萬緡通州以南於藺榆河口徑直開引由蒙村跳梁務至楊村還河以避浮雞􅞇盤淺風浪逺轉之患其二順德逹泉引入城中分為三渠灌城東地其三順德灃河東至古任城失其故道沒民田千三百餘頃此水開修成河其田即可耕種自小王村經滹沱合入御河通行舟筏其四磁州東北滏漳二水合流處引水由滏陽邯鄲洺州永年下經雞澤合入灃河可灌田三千餘頃其五懷孟沁河雖澆灌猶有漏堰餘水東與丹河餘水相合引東流至武陟縣北合入御河可灌田二千餘頃其六黃河自孟州西開引少分一渠經由新舊孟州中間順河古岸下至溫縣南復入大河其間亦可灌田二千餘頃每奏一事世祖歎曰任事者如此人不為素餐矣授提舉諸路河渠四年加授銀符副河渠使至元元年從張文謙行省西夏先是古渠在中興者一名唐來其長四百里一名漢延長二百五十里他州正渠十皆長二百里支渠大小六十八灌田九萬餘頃兵亂以來廢壞淤淺守敬更立閘堰皆復其舊二年授都水少監守敬言舟自中興沿河四晝夜至東勝可通漕運及見查泊烏梁海古渠甚多宜加修理又言金時自燕京之西麻峪村分引盧溝一支東流穿西山而出是謂金口其水自金口以東燕京以北灌田若干頃其利不可勝計兵興以來典守者懼有所失因以大石塞之今若按視故迹使水得通流上可以致西山之利下可以廣京畿之漕又言當於金口西預開減水口西南還大河令其深廣以防漲水突入之患帝善之十二年丞相巴延南征議立水站命守敬行視河北山東可通舟者為圖奏之二十八年守敬陳水利十有一事其一大都運糧河不用一畝泉舊源别引北山白浮泉水西折而南經甕山泊自西水門入城環匯於積水潭復東折而南出南水門合入舊運糧河每十里置一閘北至通州凡為閘七距里許上重置斗門互為提閼以過舟止水帝覽奏喜曰當速行之於是復置都水監俾守敬領之帝命丞相以下皆親畚鍤倡工待守敬指授而後行事先是通州至大都陸運官糧嵗若干萬石方秋霖雨驢畜死者不可勝計至是皆罷帝還自上都過積水潭見舳艫蔽水大恱名曰通惠河賜守敬鈔萬二千五百貫仍以舊職兼提調通惠河漕運事守敬又言於澄清閘稍東引水與北壩河接且立閘麗正門西令舟楫得環城往來志不就而罷三十一年拜昭文館大學士知太史院事大德二年召守敬至上都議開鐵幡竿渠守敬奏山水頻年暴下非大為渠堰廣五七十步不可執政吝於工費以其言為過縮其廣三之一明年大雨山水注下渠不能容漂沒人畜廬帳幾犯行殿成宗謂宰執曰郭太史神人也惜其言不用耳延祐三年卒元史郭守敬傳郭守敬奉詔興水利上自昌平縣白浮村引神山泉西折而南過雙塔榆河一畝玉泉諸水經甕山泊至西水門入都城按神山白浮皆在州之東南地勢西髙東下守敬乃能引之而西是不可曉顧炎武昌平山水記元世祖至元元年即宋理宗景定五年二月壬子發北京都元帥阿海所領軍疏雙塔漕渠四月戊申以彰德洺磁路引彰滏洹水灌田致御河淺澀鹽運不通塞分渠以復水勢五月乙亥詔遣蘇爾迪延郭守敬行視西夏河渠俾具圖來上元史世祖本紀元世祖至元二年即宋度宗咸淳元年十二月戊辰命選善水者一人沿黃河計水程逹東勝可通漕運馳驛以聞六月辛已大霖雨自是日至癸已不止京師河南北水溢御河沁河渾河水溢沒人畜廬舍甚衆秋七月已亥漳河泛溢至廣平城下元史世祖本紀元世祖至元三年六月衛輝淫雨至七月丹沁二河泛漲與城西御河通流平地深二丈餘漂沒人民房舍田禾甚衆民皆棲於樹木郡守僧家奴以舟載飯食之移老弱居城頭日給糧餉月餘水方退十一月戊戌瀕御河立漕倉十二月丁亥鑿金口導盧溝水以漕西山木石元史世祖本紀元世祖至元六年十二月戊子築東安渾河堤元史世祖本紀元世祖至元七年三月丙辰浚武縣御河元史世祖本紀朱文英知平鄉縣至元七年奉命開南和之澧河將通漕渠文英相視地形曰此濡濕之地農事方殷安可奪有用之功以興無益之務乎慨然言之於總府遂罷役去官後邑人思之刻石頌德畿輔通志元世祖至元九年十月乙未築渾河堤元史世祖本紀元世祖至元十三年正月甲午穿濟州漕渠七月甲寅以楊村至浮雞泊漕渠洄逺改從孫家務八月已已穿武清蒙村漕渠九月辛丑遣瀘州屯田軍四千轉漕重慶元史世祖本紀元世祖至元十四年十二月乙亥永年縣水免今年田租導任河元史世祖本紀董文用藁城人為衛輝路總管至元十四年詣汴漕司言事適漕司議通沁水北東合流御河以便漕文用曰衛郡地最下大雨時行沁水輒溢出百十里間雨更甚水不得逹於河即浸淫及衛今又引之使來豈唯無衛將無大名長蘆矣會朝廷遣使相地形上言衛州城中浮屠最髙者才與沁水平勢不可開也事遂寢元史董文用傳元世祖至元十六年六月辛丑以通州水路淺舟運甚難命樞密院發軍五千仍令食祿諸官雇役千人開浚以五十日訖工元史世祖本紀元世祖至元十七年二月庚子發侍衛軍三千浚通州運糧河七月戊午用姚演言開膠東河及收集逃民屯田漣海元史世祖本紀元世祖至元十九年十二月癸卯浚濟川河元史世祖本紀是年命張君佐率新附漢軍萬人修膠西閘壩以通漕運二十一年兼海道運糧事元史張君佐傳炮君佐為鎮國大將軍仍手元帥元世祖至元二十年五月已卯用王積翁言江南運糧於安巴蘇新開神山河及海道兩道運八月丁未濟州新開河成十月癸卯中書省臣言安巴蘇新開河二處皆有倉宜造小船分海運從之元史世祖本紀是月涿州拒馬河溢元史五行志元世祖至元二十一年二月辛已浚揚州漕河已亥罷阿巴齊開河之役以其軍及水手各萬人運海道糧四月已亥涿州拒馬河決衝突三十餘里十月戊子命北京宣慰司修灤河道十二月乙已以丁壯人開神山河立萬户府以總之元史世祖本紀俞時中修任城東閘記云至元二十年朝廷初以江淮水運不通乃命前兵部尚書李鄂囉齊等調丁夫給庸糧自濟州任城委曲開穿河渠導洸汶泗水由安民山至東阿三百餘里以通轉漕然地勢有髙下水流有緩急故不能無阻艱之患二十一年有司創為石閘者八各置守卒春秋觀水之漲落以時啓閉雖嵗或亢暘而利足以濟舟楫惟是任城閘東距師家莊袤六十里土壤疏惡霖潦灌注承乏嵗月至是始壞時都水少監分都水監事舒穆嚕奉議適膺其任聞之中書省易而新之陶土為甓采石於山其材用所需不費於官不取於民率指授役夫為之不數月厥功告成仍即其地之西偏修飾廳事以為使者往來休憩之所公退因録其同事者職役姓氏俾刻諸石以告後之來者山東全河備考元世祖至元二十二年春正月戊寅發五衛及新附軍浚蒙村漕渠二月乙已增濟州漕舟三千艘役夫萬二千人初江淮嵗漕米百萬石於京師海運十萬石膠萊六十萬石而濟之所運三十萬石水淺舟大恆不能逹更以百石之舟舟用四人故夫數增多塞渾河堤決役夫四千人穿河西務河丙辰詔罷膠萊所鑿新河而以軍萬人𨽻江浙行省習水戰萬人載江淮米泛海由利津逹於京師戊辰增濟州漕運司軍萬二千人十一月癸巳敕漕江淮米百萬石泛海貯於髙麗之合浦元史世祖本紀元世祖至元二十三年十一月乙丑中書省臣言朱清等海道運糧以四嵗計之總百一萬石斗斛耗折願如數以償風浪覆舟請免其徴從之遂以昭勇大將軍沿海招討使張瑄明威將軍管軍萬戶兼管海道運糧船朱清並為海道運糧萬戶仍佩虎符元史世祖本紀元世祖至元二十四年春正月戊辰以修築栁林河堤南軍三千浚河西務漕渠三月乙卯命都水監開汶泗水以逹京師汴梁河水泛溢役夫七千修完故堤十二月丁丑以朱清張瑄海漕有勞遙授宣慰使元史世祖本紀元世祖至元二十五年正月戊申詔中興西涼無得沮壞河渠二月庚申浚滄州鹽運渠四月癸亥渾河決發軍築堤捍之冬十月庚午僧格言安山至臨清為渠二百六十五里若開浚之為工三百萬當用鈔三萬錠米四萬石鹽五萬斤其陸運夫萬三千戶復罷為民其賦入及芻粟之估為鈔二萬八千錠費略相當然渠成亦萬世之利請以今冬備糧費來春浚之制可元史世祖本紀何榮祖廣平人為山東東西道按察使時宣慰使樂實姚演開膠州海道有制禁戢諸人沮撓糧舶遇暴風多漂覆樂實弗信督諸漕卒償之搒掠慘毒自殺者相繼按察官懼違制莫敢言榮祖曰第言之若朝廷見譴吾自當之即草辭以奏詔免其徴召入為尚書參知政事元史何榮租傳元世祖至元二十六年正月壬寅海船萬戶府言山東宣慰使樂實所運江南米陸負至淮安易閘者七然後入海嵗止二十萬石若由江隂入江至直沽倉民無陸負之苦且米石省運估八貫有竒乞罷膠萊海道運糧萬戶府而以漕事責臣當嵗運三十萬石詔許之二月辛亥濬滄州御河夏四月庚午沙河決發民築堤以障之五月庚辰發武衛親軍千人浚河西務至通州漕渠辛丑御河溢入惠通渠漂東昌民廬舍秋七月辛已開安山渠成河渠官禮部尚書張孔孫兵部郎中李處巽員外郎馬之貞言開魏博之渠通江淮之運古所未有詔賜名會通河置提舉司職河渠事元史世祖本紀韓仲暉至元間為夀張尹時糧運艱難暉奏開會通河以便公私漕販于是遣官總理河成至今賴之山東通志至元中以夀張縣尹韓仲暉等言自安民山開河北至臨清凡二百五十里引汶絶濟直屬漳御建閘三十有一度髙低分逺近以節蓄泄賜名會通河丘文莊曰會通河之名始見於此然當時河道初開岸狹水淺不能負重每嵗之運不過數十萬石非若海運之多也是故終元之世海運不罷通漕類編行水金鑑卷一百二
