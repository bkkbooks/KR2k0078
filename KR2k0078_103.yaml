body:
  text: 行水金鑑卷一百三江南按察使傅澤洪撰運河水元世祖至元二十六年七月甲午御河溢癸卯沙河溢鐵燈扞隄決元史世祖本紀元世祖至元二十七年七月魏縣御河溢害稼免其租九月丁未御河決髙唐沒民田命有司塞之十一月乙丑易水溢雄莫任丘新安田廬漂沒無遺命有司築隄障之元史世祖本紀元世祖至元二十八年十二月辛卯浚運糧壩河築隄防元史世祖本紀是年都水使者請鑿渠西導白浮諸水經都城中東入潞河則江淮之舟既逹廣濟渠可直泊於都城之匯帝亟欲其成又不欲役其細民敕四集賽人及諸府人專其役度其髙深畫地分賦之刻日使畢工伊徹察喇率其屬著役者服操畚鍤即所賦以倡趨者雲集依刻而渠成賜名曰通惠河公私便之帝語近臣曰是渠非伊徹察喇身率衆手成不速也元史伊徹察喇傳是年源遷都水監開通惠河由文明門東七十里與㑹通河接置閘七橋十二人蒙其利授同知湖南道宣慰司元史髙源傳元世祖至元二十九年閏六月辛亥中書省臣言今嵗江南海運糧至京師者一百五萬石至遼陽者十三萬石比往嵗無耗折不足者八月丙午用郭守敬言浚通州至大都漕河十有四役軍匠二萬人又鑿六渠灌昌平諸水十月戊子詔浚浙西河道導水入海元史世祖本紀元世祖至元三十年三月庚申以平章政事范文虎董疏漕河之役七月丁丑賜新開漕河名曰通惠十月癸未賜冠城疏河董役軍民衣各一襲戊子詔修汴堤是月甲辰以假貞董開河修倉之役加平章政事元史世祖本紀是年秋車駕還自上都過積水潭見舳艫蔽水天顔為之開懌特賜都水監郭公錢一萬二千五百緡仍以舊職兼提調通惠河漕運事元名臣事略都人呼飛放泊為南海子積水潭為西海子按海子之名見於唐季王溶為鎮帥有海子園嘗館李匡威於此北人凡水之積者輒目為海若寶坻之七里海昌平北之四海冶是也元時運船直至積水潭王元章詩燕山三月風和柔海子酒船如畫樓想見舟楫之盛自武寧改築北平城後運河海子截而為二城內積土日髙雖有舟楫橋梁不能度矣詠歸録禁城中外海子即古燕市積水潭也源出西山一畝馬眼諸泉繞出甕山後匯為七里濼紆回向西南行數十里稱髙梁河將近城分為二外繞都城開水門內注潭中入為內海子繞禁城出巽方流玉河橋合外隍入於大通河湧幢小品元世祖至元三十一年八月已丑成宗已即位以大都留守假貞平章政事范文虎監浚通惠河給二品銀印十月乙未朱清張瑄從海道嵗運糧百萬石以京畿所儲充足詔止運三十萬石元史世祖本紀元成宗元貞元年十二月甲子減海運腳價鈔一貫計每石六貫五百文著為令元史成宗本紀元成宗元貞二年十一月辛未增海運明年糧為六十萬石元史成宗本紀元成宗大德二年三月丁亥朔罷大名路故河隄堰元史成宗本紀元成宗大德三年八月平灤郡南灤河溢元史成宗本紀元成宗大德四年春正月癸卯浚淮東漕渠元史成宗本紀元成宗大德五年十月丙辰朔以畿內嵗饑增明年海運糧為百二十萬石元史成宗本紀元成宗大德六年春正月乙卯築渾河隄長八十里仍禁豪家毋侵舊河令屯田軍及民耕種夏四月乙亥浚永清縣南河戊子修盧溝上流石徑山河隄五月歸德府徐州邳州睢寧縣雨五十日沂武二河合流水大溢東安州渾河溢壞民田一千八百餘頃元史成宗本紀元成宗大德七年五月甲寅浚上都灤河六月乙已命甘肅行省修阿合潭曲尤壕以通漕運十月戊子以浙江年穀不登減海運糧四十萬石元史成宗本紀元成宗大德八年五月壬申中書省臣言吳江松江實海口故道潮水久淤凡湮塞良田百有餘里况海運亦由是而出宜於租戶萬五千人浚治嵗免租人十五石仍設行都水監以董其程從之十一月壬申增海漕米為百七十萬石元史成宗本紀是年建魚臺孟陽薄石閘趙文昌記略云聖元以神武定天下遐邇率職來享來庭而江淮漕運商旅之轉販仕宦之往來非舟楫無以濟不通此㑹通河之所以作也河工告成於今幾二十年嵗月滋久霖潦浸淫岸移谷遷不無堙塞都水監上下巡視求其利病以沛縣之金溝沽頭魚臺之孟陽薄沙深水淺地形峻急皆不能舟遇有官物往來必驅率瀕河之民推之挽之者不下千餘妨農動衆民恆苦之遂條陳其事都省委右都事王潛都水太監馬之貞等臨視與所說合議曰夫水積之不厚不足以負大舟蓄之不廣不足以供下泄今莫若立堰以積水立閘以通舟堰貴長閘貴堅漲水時至使漫流於上如斯而已矣於是視地之髙下程廣狹量淺深繪圖計工以報都省議修之從孟陽薄始今值嵗晚先辦物料興工以春首為期用夫匠一千二百三十二名監夫不足於近邑差雇五百七十二名就給工價米糧一切物料官為和買給中統鈔五萬五千緡不敷於濟寧路官錢內支選差核實司提舉仇鋭來董是役預辦所需金石材木諸物指分工役其堰橫長一十二丈中為閘門外石內甓髙一丈四尺基縱廣八丈閘下廣五丈殺之如壇級以及於上五分廣之三起於大德八年正月訖於五月凡用工十七萬六千九百九十中統鈔十萬三千三百五十緡糧一千二百四十七石落成之日鼓聲四起閘門啓鑰篙師序次以進前旗一指通數十百艘於談笑之頃乃命謝里髙立不逺千里而來請文至再豫不揆因記修閘之嵗月如此山東全河備考元成宗大德十年春正月丙午浚吳松江等處漕河庚戍濬真陽等州漕河令鹽商每引輸鈔二貫以為傭工之費元史成宗本紀元成宗大德十一年九月丙子武宗己登極矣中書省臣言兩淮漕河淤澀官議疏浚鹽一引帶鈔二貫以為傭費計鈔二萬八千錠今河流已通宜移以賑饑民制可十月丙辰中書省奏常嵗海漕糧百四十五萬石今江浙嵗儉不能如數請仍舊例湖廣江西各輸五十萬石並由海道逹京師從之元史成宗本紀元武宗至大三年二月已未浚㑹通河給鈔四千八百錠糧二萬一千石以募民命河南省平章政事達實哈雅董其役七月已亥禁權要商販挾聖㫖懿㫖令㫖阻礙㑹通河民船者十月壬申江浙省臣言曩者朱清張瑄海漕米嵗四五十萬至百十萬時船多糧少顧直均平比嵗賦斂橫出漕尸困乏逃亡者有之今嵗運三百萬漕舟不足遣人於浙東福建等處和顧百姓騷動本省左丞沙布迪音其弟哈卜齊勒及瑪哈木丹德爾澉浦楊家等皆有舟且深知漕事乞以為海道運糧都漕萬戶府官各以已力輸運官糧萬户千戶並如軍官例承襲寬恤漕戶增給顧直庶有成效尚書省以聞請以瑪哈木丹德爾為遙授右丞海外諸蕃宣慰使都元帥領海道運糧都漕運萬戶府事設千戶所十每所設逹嚕噶齊一千戶三副千戶二百戶四制可十一月戊子以朱清子虎張瑄子文龍往治海漕以所籍宅一區田百頃給之元史武宗本紀元仁宗皇慶元年九月丁酉增浙江海漕糧二十萬石元史仁宗本紀元仁宗延祐元年六月涿州范陽房山二縣渾河溢壞民田四百九十餘頃七月乙亥武清縣渾河隄決淹沒民田發廪賑之十二月庚子遣官浚揚州淮安等處運河元史仁宗本紀是年於金溝沽頭兩閘中置隘閘二以限船自新開㑹通河路為大船阻礙餘船不得往來乃置隘閘濶一丈限大船止去一百五十料船行其後愚民嗜利故造減舷添倉長船至八九十尺甚至百尺皆五六百料入閘重輒淺閣乃又於隘閘下約八十步河北立二石中間相離六十五尺舟至量如式方許入閘長者罪遣退之南河全考元仁宗延祜二年春正月丙寅霖雨壞渾河隄堰沒民田發卒補之又發卒浚漷州漕河元史仁宗本紀元仁宗延祐四年十一月已卯復浚揚州運河元史仁宗本紀是年重修金口閘劉德智記云皇元膺天命撫方夏極天地之覆載皆臣服惟謹東南去京師萬里粟米絲枲纎縞貝錦象犀羽毛金珠琨蕩之貢視四方尤繁重車挽陸運民甚苦之至元中穿㑹通河引泗汶㑹漳以逹於幽由是天下利於轉輸泗之源㑹雩於兖之東門其東多大山水潦暴至漫為民患職水者訪其利病隄土以防其溢束石以泄其流其一洞嵗久石摧不足以吞吐今近北改作二洞以閘啓閉中書省以聞天子可其議命下之日當延祐四年都水太監庫庫分治山東寬勤恪恭敏於事㑹曹掾王元從理簿書壕寨官李克溫董工役役長張聚李林路詳宋贇秦澤分任其事夫匠一千九十石二千五百甎三萬灰五萬木六千四百鐵錠鐵鉤鐵環不敷取諸官錢以買兖州知州尋敬提調州吏鹿果經始於四年閏正月成於三月工告訖大祠𤣥冥釃酒割牲燔燎瘞埋吹擊笙鼓風日清明役徒謳歌人神歡恱乃相與請辭鑱諸石以紀其始終遂以命德智洪惟皇元起漠北以深仁厚德奄有天下公家世鼎鼐參贊化育今誠能實於已而勤於官忠於上而信於下言不妄發事不輕改故民易信而功易成雖然又豈水曹為然推此誠實以理天下則被澤溥矣辭不獲命因書所聞以為記山東全河備考元仁宗延祐六年閏八月甲子浚㑹通河九月癸卯浚鎮江練湖十月已卯浚通惠河元史仁宗本紀元仁宗延祐七年八月英宗己登極矣霸州文安大成二縣滹沱河溢害稼是嵗滹沱决文安大成等縣渾河溢壞民田廬元史仁宗本紀元英宗至治元年三月丁丑發民丁疏小直沽白河六月已已渾河溢被災者二萬三千三百戶霸州大水渾河溢被災者三萬餘戶秋七月戊寅通州潞縣榆棣水決庚辰滹沱河及范陽縣巨馬河溢乙酉大雨渾河防決元史英宗本紀張仲仁都水丞至治元年改建㑹源閘自臨清南至彭城延袤七百里疏其淤塞築其隄防為杠九十有八為梁五十有八建分司及㑹源石佛師莊閘署揭徯斯記云皇帝元年夏六月都水丞張侯改作濟州㑹源閘成明年春二月具功狀遣其屬孟思敬至京師請文勒石惟我元受命定鼎幽薊經國體民綏和四海辨方物以定貢賦穿河渠以逸漕度乃改任城為濟州以臨齊魯之交據燕吳之衝導汶泗以㑹其源置閘以分其流西北至安民山入於新河逮於臨清地降九十尺為閘十六以逹於漳南至沽頭地降百十有六尺為閘十又南入於河北至奉符為閘一以節汶水東北至兖州為閘一以節泗水而㑹源閘制於其中嵗久政弛漕度用弗時先皇帝以為憂延祐六年冬詔以侯分治東阿始修復舊政南疏北導靡所寧處明年冬以及期請代弗許行視濟閘峻怒狠悍嵗數壞舟楫土崩石泐岌不可持乃伐石區里之山轉木淮海之濵度工即功明年皇帝建元至治三月甲戍朔侯朝至於河上率徒相宜導水東行堨其上下而竭其中以儲衆材撤故閘夷坳泓徙其南二十尺降七尺以為基下錯植巨栗如列星貫以長松實以白灰槩視其地無有罅漏衡五十尺縱百六十尺八分其縱四為門縱遜其南之三北之一以敵水之奔突震蕩五分其衡二為門容折其三以為兩墉四分其容去其一以為門崇廉其中而翼其外以附於防三分門縱間於北之二以為門中央樹石鑿以納懸板五分門縱去其一以為鑿崇翼之外更為石防以禦水之洄洑衝薄縱皆三百三十尺爰琢爰甃犬牙相入苴以白麻固以石膠關以徑鐵冠以飛梁越六月十有三日乙卯訖功大㑹羣屬宴於河上以落之工徒咸在旄倪四集酒舉樂作揮閘決堨􅋈櫂啓鑰水平舟行伐鼓歡呼稱功頌德雷動雲合且拜曰惟聖天子繼志述事不易任以成厥功惟億萬年享天之休是役也以工計石工百六十人木工千人金工五人土工五人徒千四百二十人以材計木萬一百四十有一石五千一百二十有八其廣厚皆倍於舊甓二億一千二百有五十以斤計鐵二萬五千五百麻二千三百石之灰三億二萬三百三十有四以石計粟千二百有五十視他閘三之視故閘倍之其出於縣官者鐵若麻十之七石五之一粟五之三餘一以便宜調度不以煩民初侯至之明年凡河之隘者闢壅者滌決者塞拔藻荇禁芻牧隆其防而廣其址修其石之岩阤穿漏者築其壤之疏惡者延袤贏七百里防之外增為長隄以閼暴漲而河以安流潛為石竇以納積潦而瀕河三郡之田民皆得耕種又募民采馬藺之實種之新河兩涯以錮潰沙北自臨清南至彭城東至陪尾絶者通之鬱者澌之為杠九十有八為梁五十有八而挽舟之道無不夷矣乃建分司及㑹源石佛師莊三閘之署以嚴官守樹河伯龍君祠入故都水少監馬之貞兵部尚書李鄂囉齊中書斷事莾蘇祠三以迎休報勞凡河之所經命藏氷以待渴者種樹以待休者遇流殍則男女異瘞之餓者為粥以食之死而藏饑而活者嵗數千人是以上知其忠下信其令用克果於兹役然古者三載考績三考黜陟幽明故人才得以自見向使侯竟代去雖懷極忠甚智無能究於其職是亦侯之遇也惟此閘地最要役最大馬氏之後侯之功為最盛故詳於是碑以告後之人侯名仲仁河南人其辭曰昔在至元惟忠武王自南還歸請開河渠自魯涉齊以逹京師河渠既成四海率從萬世是資朝帆夕檣垂四十年孰慢而隳翼翼張侯受命仁宗號令風馳徴工發徒既滌既疏濟閘攸基先雞而興既星而休觸冒炎曦疾者藥之死者槥之奚有渴饑拊循勞徠信賞必罰勿亟勿遲十旬之間遹績於成知罔或遺洋洋河流中有行舟若遵大逵舳艫相銜罔敢後先亦罔敢稽賢王才侯自北自南顧盼嗟咨曰惟京師為天下本本隆則固惟帝世祖既有南土河渠是務四方之共於千萬里如出跬步聖繼明承命官選材惟侯之遇昔者舟行日不數里今以百數昔者舟行嵗不數萬今以億慮惟公乃明惟勇乃成惟廉則恕汶泗之㑹有截其閘有菀其樹功在國家名在天下永世是度山東全河備考王結改東昌路境有黃河故道而㑹通隄遏其下流夏月潦水壞民麥禾結疏為斗門以泄之民獲耕治之利至治二年參議中書省事元史王結傳元英宗至治二年五月已已修滹沱河隄六月丙子修渾河隄元史英宗本紀元英宗至治三年二月已已修廣惠河閘十有九所十二月壬戌浚鎮江路漕河及練湖役丁萬三千五百人元史英宗本紀至治三年江浙行省言鎮江運河全藉練湖之水為上源漕運商販舟楫無不由此以供億前朝嘗濬此湖豬蓄潦水若運河水淺開放練湖一寸可添河水一尺近年淤淺以致遞運不通乞加修治制可工畢又置河兵百人專任修理通漕類編元泰定帝泰定元年夏四月甲子發兵民築渾河隄六月大同渾源河真定滹沱河皆溢並漂民廬舍七月戊申大都路固安州清河溢順德路任縣沙澧洺水溢定州屯河溢山崩免河渠營田租八月丁丑罷浚玉泉山河役九月癸丑奉元路長安縣大雨澧水溢延安路洛水溢十月壬申真州珠金沙河松江府吳江州諸河淤塞詔所在有司傭民丁浚之元史泰定帝本紀元泰定帝泰定二年閏正月已已修滹沱河堰三月辛酉咸平府清河滱河合流失故道壞隄堰敕蒙古軍千人及民丁修之八月辛丑衛輝路汲縣河溢九月丁丑浚河間陳玉帶河開元路三河溢是嵗御河水溢元史泰定帝本紀元泰定帝泰定三年七月東安檀順漷四州雨渾河決溫榆水溢傷稼元史泰定帝本紀元泰定帝泰定四年春正月丁卯浚㑹通河三月壬戍渾河決發軍民萬人塞之五月睢州河溢七月雲州黑河水溢八月滹沱河水溢發丁浚冶河以殺其勢元史泰定帝本紀策丹改工部員外郎中書省委開渾河自當往視之以為水性不常民力亦瘁難以成功言於朝河役乃罷元史䇿丹傳元文宗天歷二年夏四月壬辰浚漷州漕運八月乙已浚通惠河元史文宗本紀元文宗至順三年三月奉元朝邑縣洛水溢五月丁酉滹沱河決沒河間清州等處屯田元史文宗本紀元順帝元統元年二月灤河漆河溢永平諸縣水災六月涇河溢關中水災元史順帝本紀李黼潁人遷宣文閣監書博士中書命黼巡視河渠黼上言曰蔡河源出京西宋以轉輸之故平地作隄今河底填淤髙出地面秋霖一至橫潰為災宜按故迹修浚他日東河或有不測之阻江淮運物當由此分道逹京萬世之利也不報升祕書太監元史李黼傳元順帝至元二年五月乙卯至於六月甲申湍河白河大溢水為災元史順帝本紀行水金鑑卷一百三
