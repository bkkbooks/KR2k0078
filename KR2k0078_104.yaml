body:
  text: 行水金鑑卷一百四江南按察使傅澤洪撰運河水元順帝至元三年六月辛已大霖雨自是日至癸已不止京師河南北水溢御河黃河沁河渾河水溢沒人畜廬舍甚衆元史順帝本紀至元五年改作東大閘李惟明記曰泗别於滋陽兖道之汶支於奉符之堽城洸引之西南會於任城會通河受之昔汶不通洸國初嵗丁已濟倅奉符畢輔國請於嚴東平始於汶水之隂堽城之左作一斗門堨汶水入洸益泗漕以餉宿蘄戍邊之衆且以溉濟兖間田汶由是有南入泗淮之派至元二十年朝議以轉漕弗便乃自任城開河分汶水西北流至須城之安民山以入清濟故瀆通江淮漕至東阿由東阿陸轉僅二百里抵臨清下漳御輸京師二十六年又自安民山穿渠北至臨清引汶絶濟直屬漳御於是汶之利被南北矣始輔國直堽城西北隅作石斗門一後都水少監馬之貞又於其東作雙虹懸門閘虹相連屬分受汶水既又以虹石水易圯乃改西虹為今閘制通謂之東閘謂輔國所作斗門為西閘後改作址髙水不能入獨東閘受水汶水盈縮不常嵗常以秋分役丁夫采薪積沙於二閘左絶汶作堰約汶水三之二入洸至春全堨餘波以入霖潦時至慮其衝突則堅閉二閘不聽其入水至徑壞堰而西循故道入海故汶之堰嵗修延祐五年改作石堰五月堰成六月為水所壞水退亂石齟齬壅塞河底增髙自是水嵗溢為害至元四年秋七月大水潰東閘突入洸河兩閘被其害而洸亦為沙所塞非復舊河矣初之貞為沙堰也有言作石堰可嵗省勞民之貞曰汶魯大川底沙深濶若修石堰須髙平水五尺方可行水沙漲淤平與無堰同河底填髙必溢為害况河上廣石材不勝用縱竭力作成漲濤懸注傾敗可待晉杜預作沙堰於宛陽堨白水溉田缺則補之雖屢勞民終無水害固知川不可塞也且曰後人勿聽浮議妄興石堰重困民壅遏漲水大為民害重修堽城閘因自作記勒其言於石至是果如其言閘壞岸崩碑沉於水為土石所壓是年九月都水監馬烏公來治會通河行視至堽城謂衆曰堽城洸汶之交會通之喉襟閘壞河塞上源要害役有先於此者乎於是用前監丞沈溫公闢為一大閘之議命濠寨官梁仲祥李讓計徒庸度材用量工程乃以狀上從其請明年二月命工入山取石陶甓煆灰以濠寨官王守恭董之市物於有司謀將以五月經始衆議以為兹役實大非朝夕可成暑雨方行必妨興事曷以來年公曰霖雨天道豈可預必安能優遊度日待來年以已事諉後人乎乃親為經營揆度以舊址敝於屢作改卜地於其東掘地及泉降汶河底四尺順水性也袤其南北為尺百廣其東西為尺八十下於平地為尺二十有二土木之工又入其下八尺上為石基以承閘閘之崇於地平自基以上縮掘地之深一尺兩壁直南北為身皆長五十尺其南張兩翼為雁翅皆長四十五尺其北短折以東西各附於旁亦長四十五尺不為兩翼斂其前隘漲水也前盡基肩岸受水欲其前也後遜基八之一壘石為崖承之出基之髙五尺長為尺二十有五五分基之廣濶其中之一以為明入明三分身之一為金口廣尺深咫板十有三方盈金口之廣長亘明入金口兩端各盡其身上下以啓閉者十二其一不動閾以大石為兩臬夾制其前郤始議參用新舊石舊石皆薄小而新石少公因為度材所堪差别其用無尺寸之枉新遂以嬴又皆大石自基至顛凡十一疊舊一不用焉石相疊比則以鐵沙磨其際必吻合無間故其締構之工扣砌之密會通諸閘所未有凡用石大小以假計二千六十有竒自方以尺計三萬三千六百五十甓以萬計一十有六石灰以斤計四十六萬三千瓦礫以擔計二萬四千木大小以株計一萬三百一十鐵剛柔以斤計三萬九百一十五麻炭諸物稱是糜錢一萬七千餘緡徒役千人木石之工二百八十人始事於五月七日畢役於九月十日閘既成衆請識其事於石屬筆於豫豫曰汶古名川昔畢公馬公用之則為轉漕之益為灌溉之利後人用之則有橫潰之憂有墊溺之患水性非異蓋用之善不善也馬公既善用之又碑其言以示來者其為慮深矣不有兹役曷彰馬公之識其言已驗碑仆於水而改作石堰之碑尚存豈天忌馬公之言先發其機耶將使後人獨受其害而不蒙其利耶惟是雨㿩時若漕運無愆天其或者悔禍於人俾思馬公之言乎既不獲辭遂為敘其始末以見今日堽城閘水利喉襟且表馬公之言為鑒額森布哈都水監丞至正初建黃棟林新閘楚惟善記曰會通河導汶泗北絶濟合漳南復泗水故道入於河自漳抵河袤千里分流地峻散渙不能負舟前後置閘若沙河若穀亭者十三新店至師氏莊猶淺澀有難處每漕船至此上下畢力終日叫號進寸退尺必資車於陸而運始逹議立閘久不決都水監丞額森布哈分治東平之明年緝熙前功以紓民力慨然以興作為已任乃躬相地宜黃棟林適居二閘間遂即其地庀徒􅟹事經始於至正改元春二月訖工於夏五月辛酉閘基深常有四尺廣三其深有六尺長視廣又尋有七尺閘身長三分基之一崇弱五寸不及身之半又於東岸創河神祠西岸創公署制度纎悉備極精緻落成之日舟無留行役者忘勞居者聚觀往來者歡忭稱慶僚佐耆宿衆相與謀謂不伐石以識無以彰公之勤且懼來者之功不繼而前功遂隳也先是役民於河凡大興作率有常廪是役將興時適薦飢公請俾貧窶者得竄其身藉以有養久未獲命不忍坐視斯民餓且殍遂出公帑人貸錢二千緡約來春入役還官無何糧亦至民爭趨令其軫民瘼如此又初開月河於河東岸闢地及咫礓礫錯出鍤無所施逮營閘基近西數武黃壤及泉訖無留礙精誠感格鬼神隂有以相之也公為人明敏果斷操守絶人讀書一過目輒不忘律學醫方靡不精究始由近侍三轉官受今除是役也董工於其所者令史李中壕寨官薛源政其工師徒長具列碑隂二記並山東全河備考許有壬轉中書左丞後至正二年囊嘉特青薩巴及博囉特穆爾獻議開西山金口導渾河踰京城逹通州以通漕運丞相托克托主之甚力有壬曰渾之之水湍悍易決而足以為害淤淺易塞而不可行舟况地勢髙下甚有不同徒勞民費財耳不聽後卒如有壬言元史許有壬傳元順帝至正二年正月丙戌開京師金口河深五十尺廣一百五十尺役夫十萬元史順帝本紀巴延徹爾同知東平路事至正二年浚洸河淺澀者五十六里李惟明記云洸河乃汶水之支流也名不載於傳記或因舊而加以新名尤不可知其源則出於泰山郡萊蕪縣原山之陽折而之南逹於會通漕運南北其利無窮會通之源洸也洸之源汶也時霖雨作泰岱萬壑溝瀆之間合注而之汶洪濤洶湧泥沙溷奔徑入於洸此洸所以淤填也至元六年監丞宋公浚自閘口至石刺事鐫於珉然洸之源雖通而其流猶梗公謂不疏其流源將安之又恐前功徒費後患復萌使會通之津從而涸也詢及其佐得壕寨嶽聚所度自石刺至髙吳橋南王家道口淺澀者延袤五十六里百八十步呈準中書符下東平濟寧兼贊厥役本監及二路夫以口計者萬有二千浚自至正二年二月十八日落成於三月十四日以舉武計者二萬三百四十有竒以尺為工計者四十萬七百數同知東平路事巴延徹爾僉議少監公之功宜勒石以昭悠久乃請文於豫義弗獲辭遂援筆而記其嵗月山東全河備考元順帝至正四年六月河南鞏縣大雨伊洛水溢漂民居數百家七月灤河水溢出平地丈餘元史順帝本紀是年夏五月大雨黃河水溢平地深二丈許北決白茅隄六月又北決金場瀕河郡邑濟寧單州虞城碭山金鄉魚臺豐沛定陶楚丘武城以至曹州東明巨野鄆城嘉祥汶上任城等處皆罹水患民老弱昏墊壯者流離四方水勢北侵安山沼入會通運河省臣以聞朝廷患之督大臣訪求治河方略南河全考元順帝至正九年三月丁酉壩河淺澀以軍士民夫各一萬浚之五月白茅河東注沛縣遂成巨浸元史順帝本紀元順帝至正十年八月庚午命樞密院以軍士五百修築白河隄元史順帝本紀元順帝至正十一年六月發軍一千從直沽至通州疏浚河道元史順帝本紀是年崔敬遷同知大都路總管府事直沽河淤數年中書省委敬浚治之給鈔數萬錠募工萬人不三月告成咸服其能除刑部侍郎元史崔敬傳元順帝至正十三年五月已已命東安州武清大興宛平三縣正官添給河防職名從都水監官巡視渾河隄岸或有損壞即修理之元史順帝本紀元順帝至正十四年四月命各衛軍人修白浮甕山等處隄堰六月河南府鞏縣大雨伊洛水溢漂沒民居溺死三百餘人元史順帝本紀丁好禮蠡州人除京畿漕運使建議置司於通州重講究漕運利病著為成法人皆便之除戶部尚書元史丁好禮傳國初都金陵則漕於江其餉遼卒猶漕於海自永樂都燕後嵗漕東南四百萬石由江涉髙寶諸湖絶淮入河經會通河出衛河白河遡大通河以逹於京師諸洪泉壩閘以次修舉至於今纎悉具備故並載焉大通河即潞河舊為通惠河其源出昌平州白浮村神山泉過榆河會一畝馬眼諸泉滙為七里濼東貫都城由大通橋而下至通州髙麗莊入白河長一百六十餘里元初所鑿賜名通惠每十里為一閘蓄水通舟以免漕運陸挽之勞永樂以來諸閘猶多存者仍設官夫守視然不以轉漕河流漸淤成化正德間纍命疏之功不果就嘉靖六年遣漕運總兵錦衣衛都指揮及御史會濬之自大通橋起至通州石壩四十里地勢髙下四丈中間設慶豐等五閘以蓄水每閘各設官吏共編夫一百八十名每名工食銀八兩造剝船三百隻每隻價銀三十五兩分置各閘責經紀領之使製布囊盛米雇役遞相轉輸軍民稱便明會典伯薈蕞云水部備考大通河成化十二年始命平江陳鋭疏通之漕舟會至大通橋下後射利之徒妄假黑眚之説事竟阻壞正德二年復疏之功不就桂文襄公奏議云成化十二年平江伯陳鋭不察其故建言修復憲宗皇帝命戶部左侍郎翁世資工部左侍郎王詔挑浚仍浚西湖諸泉以益水勢可放運船千餘直抵大通橋下既而水急岸狹船不可泊未幾即耗船退幾不能全遂不復行正德七八年亦嘗挑浚竟無成功蓋京師之地西北髙峻自大通橋下視通州勢若建瓴而強為之未免有害非徒無益而已病逸漫記云白浮泉今入清河一畝泉在甕山後已塞甕山下玉龍雙龍青龍等泉入西湖經髙梁橋注皇城濠一自西流入內一自東會入通惠四里至慶豐慶豐十一里至平津慶豐地形髙平津一丈許水陡絶故平津開則慶豐河身立見矣張兆元通惠河考云青龍閘在都城西北三十里廣源閘在白石閘西二里白石閘在西直門西六里髙梁閘在西直門外往北一里許澄清閘在都城萬寧橋西慶豐閘在大通橋東五里平津上閘在慶豐閘東十一里平津下閘在上閘東四里普濟閘在平津下閘東十三里通流閘在通州城內至普濟閘十二里以上諸閘皆通惠河經行之所丘文莊云自通州陸挽至都城僅五十里耳而元人所開之河總長一百六十四里其間置閘壩凡二十處所費蓋亦不資今廢墜已久慶豐以東諸閘雖存然河流淤淺通運頗難且今積水潭即今海子在都城中禁城之北漕舟既集無停泊之所而又分流入大內然後南出其啓閉蓄泄非外人所得專者言者往往建請欲復元人舊規似亦便利然以陸挽與河運利害略亦相當故議復元舊欲於城東鑿潭以容漕舟議通陸運欲開新路以逹東挽此其大略也桂文襄公奏議云正陽門外東偏有古三里河一道東有南泉寺西有玉泉菴至今基下俱有泉脈由三里河繞出慈源寺八里莊五箕花園一帶直抵張家灣煙墩港地勢低下故道俱存冬夏水脈不竭見今天壇北蘆葦圍草場九條巷其地下者俱河身也髙者即舊馬頭明白易見不假經畫稍加修治即可復也但附近勢家莊園故成化六年楊茂雖嘗建議而不敢盡言但請置壩而已後亦竟沮不行成化十二年亦踏勘而勢家賄通欽天監以為地居京師子午方位為説不知三里河乃在都城巽已實非子午方也今誠按此修浚則分私大船俱可直抵三里河不但便船剝而已明疏議輯略云成化六年漕運總兵官都督楊茂上言京城南原有三里河直通張家灣煙郭橋自橋往西疏浚深濶二十餘里郤將煙郭木橋改作弔橋糧船到彼灣泊可免漂流之患若將此河浚深直至三里河作平水壩三四截於內置扁淺剝船令運船由此盤壩以逹京師嵗可省車腳數百萬白河南去通州二百里其源出胡地經密雲縣合大通榆渾諸河凡三百六十里至直沽會衛河入海源逺流迅河皆溜沙每夏秋暴漲最易衝決每決輒發丁夫修築屢築屢決正統三年命官相視地勢自河西務徑二十里改鑿順下河遂安流每淤淺處設鋪舍置夫甲專管挑浚舟過則招呼使避淺而行自此而南運河淺鋪以次而設明會典運薈蕞云水部備考密雲運道即白河上流密雲官軍餉者也嘉靖三十四年自密雲城西楊家莊地方築塞新口疏通舊道令白河與潮河合流至牛闌山水勢甚大故通州漕糧得抵密雲城下吳文恪公集云密雲河本白河上流自牛闌山而下與潮河交會初薊遼總督駐密雲從通州至牛闌山以車轉餉勞費特甚嘉靖中總督劉燾發卒浚潮河川水逹通州用小舟轉粟直抵密鎮矣衛河舊名御河源出河南輝縣之蘇門山東北流會淇漳諸水過臨漳分為二其一北出經大名至武邑以入滹沱其一東流經大名東北出臨清至直沽會白河入海長二千餘里今為運河自臨清至直沽凡五衛十七州縣淺一百五十七處此河自德州而下漸與海近河狹地卑易於衝決每決輒發丁夫修治嘉靖十三年議準恩縣東光滄州興濟四處各建減水閘一座以泄漲溢之水明會典衛薈蕞云今水經河一名御河漢名為屯氏河源出河南衛輝府輝縣西北七里蘇門山東流徑衛輝府城北一里又東流淇水西北來注之淇水源出彰德府林縣西大號山流徑淇縣西北三十里合清水清水源出輝縣西南七十里山陽鎮東南流徑獲嘉縣界又東南至淇縣界注於淇淇水又東流入衛衛水又東流過大名府濬縣內黃界漳水入焉漳水之源有二一名濁漳出山西潞州長子縣西五十里發鳩山東北流徑潞州城西南二十里過襄垣黎城二縣自林縣西北入彰德府境一名清漳出平定州樂平縣西南二十里少山西南流過和順之西北四十里石堠嶺下流徑遼州東七十里又西南入潞州黎城縣界自涉縣西入彰德府境二漳俱東至林縣合流至彰德府為漳河徑臨漳入廣平府境歷城安廣平肥鄉曲周入於衛河衛水又東北入東昌府館陶縣西三里至臨清汶水即會通河北流入之過東昌府武城縣界入濟南府境徑德州城西北過河間府界去景州城東二十里歷故城吳橋東光縣境下至滄州西流徑興濟縣入清縣界合滹沱河滹沱河源出山西繁峙縣東北三十里泰戲山歷代州崞縣欣州定襄五臺盂縣北入真定府平山縣界徑靈夀縣至真定府城南徑晉州過保定府境束鹿縣南三十里逹於深州至阜城縣沙水入焉滹沱河歷河間府獻縣城南易水注之至交河縣與髙河合為交河至青縣入於衛衛水又東北過靜海至武淸與桑乾河合桑乾河源出大同府馬邑縣西北十里洪濤山下與金龍池水合東流過渾源州北徑宣府保安州新城西南四十里洋河東南流來注之又東入宛平縣界為盧溝河至看丹口分為二派其一東流出通州髙麗莊入白河其一南流徑固安至武淸縣小直沽入於衛河衛水又東北入於海會通河自臨清迤南至濟寧州元初由任城即今濟寧開渠至安民山即安山一百五十里復自安民山之西南開渠由夀張西北至東昌又西北至臨清凡二百五十里引汶絶濟直歸漳衛洪武二十四年河決原武縣黑陽山由舊曹州鄆城縣兩河口漫過安山湖而會通漸淤永樂九年因海運艱阻遣尚書都督等官疏鑿元人故道乃於東平州戴村汶水入海處築一土壩橫亘五里遏汶水使西流盡出南旺分流四分往南接濟徐吕六分往北以逹臨清自後添設新閘修築舊岸大為漕運之利自臨清抵徐州七百里間全資汶泗沂洸諸水接運總曰閘河舊為閘四十有三前元建者二十餘永樂以來先後增建者二十餘而減水通河諸閘不與焉兩閘之間每存稍淺一處約數丈多不過十餘丈用留泄水令積易盈今建設改革益多見閘壩條下明會典汶河一出新泰縣宫山之下曰小汶河一出泰安州仙臺嶺一出萊蕪縣原山一出縣寨子村俱至州之靜封鎮合流曰大汶河出徂徠山之陽而小汶來會經寧陽縣北堽城歷汶上東平東阿又東北流入海元於堽城之左築壩遏汶入洸南流至濟寧合沂泗二水以逹於淮自永樂間築戴村壩汶水盡出南旺於是洸沂泗自會濟而汶不復通洸今沂州亦有汶河一出蒙山東澗谷一出沂水縣南山谷俱入邳州淮河洸河乃汶水之支流出寧陽縣北三十里堽城西南流又循縣南流三十里會寧陽諸泉又六十里經濟寧城東與泗合出天井閘河明會典沂河源出曲阜縣尼山西南分流為二一西流至金口壩上即與泗會一南流亦與泗會出塂里河又有出沂水縣艾山者會蒙隂沂水諸泉與沂山之汶合流至邳州入淮明會典泗河源出泗水縣陪尾山四泉並發西流至兖州府城東又南流經橫河與沂水合元時於兖州東門外五里金口作壩建閘遏泗之南趨國朝因而修築每夏秋水長則啓閘放使南流會沂水由塂里河出師家莊閘冬春水微則閉閘令由黑風口東經兖城入濟又南流會洸水至濟寧出天井閘明會典濟河出王屋山至河南濟源縣二源合流其水或伏或見東出於陶丘北又東北會於汶今在汶上縣北一名大清河元人作金口壩傍有河即黑風口西通濟流並入會通河明會典沁河出山西沁源縣綿山東谷由太行山麓至河南原武縣黑陽山與河汴合流至徐州入運河以濟徐吕二洪每年水勢淺深尺寸管洪官按季奏報前代嘗引沁以通衛正統以前其支流猶自武陟山原村東北由紅荆口經衛輝凡六十里與衛通天順七年河趨陳潁入淮乃開沁以逹徐復引河以合泗而故道始湮明會典南陽新河在昭陽湖之東起南陽至留城一百四十一里八十八步嘉靖六年以河決命官開濬垂成而止四十四年復決乃因舊迹疏鑿又起留城至境山濬復舊河五十三里凡役夫九萬一千有竒八閲月而成隆慶元年山水衝決復淤新河之三河口薛河沙河趕牛溝會此故名乃經理沙薛上流各開支流築黃家口豸裏溝等壩引薛河由吕孟湖出地濱溝築宋家壩引沙河由尹家湖出鮎魚口築黃甫壩引沙河由滿家湖入南陽湖次年工成又為三河口石壩一座南陽湖石隄三十餘里凡建閘九築壩十三減水閘二十開支河九十六里三年又於昭陽湖以東沙薛二水所從入舊河處開鴻溝廢渠逹李家口回回墓而東出留城閘計六十餘里積水俱有宣泄滕沛利之明會典徐州洪在徐州為運河要害亂石峭立凡百餘步故又名百步洪成化四年命官鑿石以利舟楫又甃石路長一百三十餘丈以便牽挽二十年置石壩長八十丈遇有損壞管河官隨時修築嘉靖二十年於洪下置石閘一座明會典吕梁洪在徐州東南六十里有上下二洪相距七里亦運河要害成化八年命官甃二石隄共長七十餘丈十六年命官築石壩長一百六十五丈復於壩西築隄二十餘丈洪東甃石路四百二十丈遇有損壞管河官隨時修築嘉靖二十年於洪下置石閘一座明會典羊山新河萬歷十一年議準由昭靈祠南黃河出口歷羊山內華山梁山接境山開河置閘以避戚港之溜明會典淮安運道自漢以來即有髙家堰在淮安之東南永樂間通淮河為運道築隄堰上以防淮水東侵又自府北鑿河蓄諸湖水南接青口凡六十里曰清江浦乃運船由江入淮之道建清江等閘遞互啓閉又築土壩以遏水勢後閘壩禁弛河渠淤塞嘉靖八年疏治復舊隆慶中髙家堰廢淮水由黃浦口決入漫衍民田萬厯四年開草灣河渠長六十二里分殺黃河以緩清口之衝七年復築髙堰起新莊至越城長一萬八百七十餘丈堰成淮水復由清口會黃河入海而黃浦不復衝決又以通濟閘逼近淮河舊址塌損改建於甘羅城北仍改濬河口斜向西南使黃水不得直射因廢拆新莊閘又改福興閘於夀州厰適中處所其清江板閘照舊增修又議修復五壩惟信字壩久廢不用禮智二壩加築仍舊車盤船隻仁義二壩與清江閘相鄰恐有衝漫移築天妃閘內八年用石包砌髙堰九年又於府城南運河之旁自窯灣楊家澗歷武家墩開新河一道長四十五里曰永濟河因置三閘以備清浦之險十一年建清江浦外河石隄長二里磯觜七座又建西橋石隄長九十八丈以禦淮黃之衝明會典揚州髙寶運道自清口引淮為清江浦至烏沙河滙管家白馬二湖隄黃浦八淺及寶應縣槐角樓南諸湖相接西抵泗州盱眙縣界皆運道所經湖東有隄長三十餘里洪武九年用甎修髙家潭等處成化二十一年造石隄漸修至二十餘里其南髙郵邵伯等湖皆有石隄運船觸隄往往敗溺𢎞治三年命官於髙郵河迤東開新河以避其險曰康濟河中為圈田南北置閘以時啓閉兩岸俱甃以石嘉靖五年題準於泛光湖東傍舊隄開新河長三十里遂棄康濟河又自寶應至界首凡有溝可通注於海者造平水閘十座十年又自寶應湖東築月隄長二十一里萬厯五年淮水由黃浦口決入石隄多壞七年命官修築改建減水閘四座加髙石閘九座自是寶應諸湖隄岸相接十二年題準於石隄之東傍隄開新河三十餘里以避槐角樓一帶之險曰𢎞濟河明會典儀真上下江口及瓜州便河皆由江逹淮運道襟喉宋時儀真嘗建三閘洪武中即其地築為壩𢎞治元年始建東關羅泗二閘十二年復於濵江建攔潮閘嘉靖五年題準潮長開閘放船潮退盤壩不許候閘延久萬厯四年於朱輝港鑰匙河清江等處各開河以便停泊瓜洲江口舊建土壩江北糧船空回撤壩以出而江南重船反令盤壩搬剝艱難風濤守候隆慶六年題準自時家洲以逹花園港開渠六里有竒建瓜洲通江閘二座自此漕艘始免車盤之苦萬厯四年於瓜洲開港塢以泊運船明會典行水金鑑卷一百四
