body:
  text: 行水金鑑巻一百五江南按察使傅澤洪撰運河水元時海道自平江劉家港入海經通州海門縣黄連沙觜萬里長灘開洋沿山嶼抵淮安路鹽城縣歴海寧府東海縣又經密州膠州界放靈山洋投東北行路多淺沙旬月始抵成山計自上海至直沽楊村馬頭凡一萬三千三百五十里其後再變自劉家港出楊子江開洋落潮東北行離萬里長灘至白水綠水經黒水大洋轉成山西行過劉家島入沙門島放萊州大洋抵界河至直沽其道差直三變自劉家港入海至崇明三沙放洋向東行入黒水大洋直取成山轉西至劉家島入沙門放萊州大洋至直沽如遇風順由浙西至京師不過旬月而已其道徑便國初海運猶仍元舊自㑹通河成報罷嘉靖中尋膠萊故道燒鑿馬家壕十五里逹於麻灣隆慶五年議因其故開新河令江南之糧由淮安至江浦口歴新壩口馬家壕麻灣口海倉口徑抵直沽天津止一千六百里半從河行其海行者止由海套不泛海洋惟馬家壕分水嶺二處開鑿為難遣科官勘報竟以無源水多沙磧而止以下皆明㑹典湖泉之水導引蓄洩皆以濟漕為運道所闗徐沛山東諸湖在運河東者儲泉以益河之不足曰水櫃在運河西者分漲以洩河之有餘曰斗門而淮揚諸湖即為運道其山東新舊各泉可引以濟漕者派分為五入汶者為分水派入泗沂濟及天井閘漕河者為天井派入白馬河及南陽棗林魯橋閘河者為魯橋派入南陽新河者為新河派即沙河派入邳州河者為邳州派今備載焉安山湖在東平州週圍八十三里零一百二十二步舊有二閘底髙於河水不能入湖之下口無閘水不能出嘉靖六年止於湖中築隄十餘里而湖益狹後乃漸復焉南旺湖在濟寧州周圍一百五十餘里漕渠貫其中西岸為南旺西湖東岸為南旺東湖汶水自東北來界分東湖為二二湖之下北為馬踏湖又北為伍莊湖南為蜀山湖又南為馬塲湖各湖通連無間凡與西湖盡處相對者即為東湖東西湖中為長隄二西隄設斗門為減水閘十有八隨時啓閉以濟運河遇有淤淺隨時挑濬毎二年一大挑隆慶中開南旺月河二十里有竒以便大挑北至王家窪南出尹家窪稍北里餘各建通河大閘一座馬塲湖週圍四十里舊有堤壊與運河相通河水稍盈即洩入湖毎致淺涸嘉靖十四年築隄長六十里内外各植栁以䕶之更置減水閘五座運河易盈湖水亦有蓄洩蒲灣泊武家湖在汶上縣南陽湖在魚臺即獨山坡滙為湖週圍七十六里引沙河經其中入新河昭陽大湖長十八里小湖長十三里二湖相連北屬滕南屬沛週圍八十餘里納諸縣之水湖口置石閘放水入薛河由金溝口以逹舊運河後以河決棄沽頭於湖東開新河則南陽在東昭陽在西去黄水益逺運河乃安赤山湖微山湖吕孟湖張莊湖四湖相連長八十里在徐州引薛河出地浜溝入新河蛤蟃湖長二十里連汪湖長一十五里周湖長二十里栁湖長一十五里在邳州落馬湖長六十里茅茨湖長六十里黄墩湖長二十里侍丘湖長三十里倉基湖長三十里埠子湖長八十里在宿遷縣大莊湖長十里崔鎮湖長三十里在桃源縣杜村湖長十里萬家湖長十里在清河縣管家湖在淮安府城西門外舊有堤永樂十四年命官於湖中築長堤以便運舟隨時修築白馬湖長三里汜光湖即寳應湖長三十里界首湖即津湖長三里在寳應縣新開湖長三十五里在髙郵州邵伯湖長十八里在江都縣諸湖延袤髙寳以抵揚州上下相接以上諸湖東平州泉十四舊九新五汶上縣泉三舊二新一平隂縣泉一舊滋陽縣泉八舊四新四鄒縣泉十二舊八新四曲阜縣泉二十舊十七新三泗水縣泉五十三舊三十新二十三滕縣泉十八舊十五新三嶧縣泉五舊三新二寧陽縣東十二舊魚臺縣泉十四舊五新九濟寧州泉三舊泰安州泉三十八舊三十五新三新泰縣泉十四舊十二新二肥城縣泉九舊五新四萊蕪縣泉十六舊十一新五蒙隂縣舊泉五沂水縣舊泉十水以上諸泉詳見濟兹不復贅宛平縣閘五青龍閘白石閘廣源閘髙梁閘澄清閘大興縣閘三慶豐閘平津上下二閘通州閘五普濟閘南普閘土橋閘廣利閘通流閘舊普濟通流俱有上下二閘今各廢其一石壩一臨清州閘五南板閘新開上閘沙灣減水閘潘官屯減水閘觀音觜減水小閘舊有㑹通臨淸二閘今廢清平縣閘三戴家灣閘李家口減水閘魏家灣減水閘堂邑縣閘四梁家鄉閘土橋閘土橋進水閘新開口進水閘舊有土城中閘二減水閘今廢博平縣閘五第一至第五五減水閘舊有老堤頭北減水閘今廢聊城縣閘十通濟橋閘李海務閘周家店閘龍灣西栁行二進水閘官窯口裴家口方家口李家口耿家口五減水閘陽穀縣閘六七級上下二閘阿城上下二閘荆門上下二閘寧陽縣閘二洸河東西二閘嘉靖六年建舊有堽城石壩堽城閘今廢滋陽縣閘一壩一金口閘金口石壩成化八年因元舊易為石堰舊有土婁杏林二閘今廢鄒縣舊有港里積水閘小閘今廢東阿縣閘一通源閘夀張縣閘一壩一堰一沙灣積水閘師家壩野豬腦堰東平州閘七壩二戴村閘舊戴家廟閘嘉靖十九年建安山閘成化十二年建靳家口閘嘉靖四年建袁家口閘安山湖東西二小閘戴村壩坎河口堤壩舊有魚營減水閘今廢汶上縣閘十六開河閘南旺上下二閘寺前鋪閘界首石口二積水閘舊焦欒張全劉元彭秀孔家邢家常家闗家李泰田家口十減水閘鉅野縣閘一壩一長溝減水閘嘉靖十九年建蓬子山壩濟寧州閘十四天井閘在城閘趙村閘石佛閘新店閘新閘六閘俱因元舊嘉靖間重修仲家淺閘宣徳四年建師家莊閘魯橋閘二閘永樂間建上新閘中新閘下新閘三閘俱成化十一年建棗林閘永樂間建四里灣減水閘舊有分水閘廣運上下二閘永通上閘耐牢坡閘官村閘呉泰閘片玉閘碎玉閘今廢濟寧衛閘四永通減水閘五里營平水閘十里鋪平水閘安居平水閘魚臺縣閘十六壩一南陽閘宣徳二年建利建閘即宋家口閘隆慶元年建新河十四減水閘嘉靖四十五年建蘇家壩舊有穀亭八里灣硯瓦溝陽城湖泥河五閘今廢滕縣閘一壩五佃戸屯減水閘東邵壩王家口壩豸裡壩宋家壩黄甫壩以上閘壩俱隆慶二年建築沛縣閘七壩三珠梅閘楊莊閘夏鎮閘滿家閘西栁莊閘馬家橋閘留城閘以上七閘俱隆慶元年以舊河孟陽泊沽頭上中下胡陵城廟道口謝溝七閘改建沙河口壩隆慶元年築薛河口石壩隆慶二年築懽城壩嘉靖四十五年築湖舊有新興閘金溝口飛雲橋雞鳴臺昭陽中東西六積水閘今廢徐州閘四壩二黄家閘天順三年建梁境閘即境山舊閘萬歴二年復内華閘古洪閘二閘萬歴十一年建徐州洪石壩吕梁洪石壩舊有徐州洪閘吕梁洪上下二閘今廢邳州閘一匙頭灣減水閘萬厯八年建桃源縣閘一壩四馬厰坡減水閘萬歴八年建崔鎮徐昇季太三義四減水石壩萬歴七年築遥堤建清河縣閘一壩一通濟閘嘉靖中建萬歴七年改建甘羅城出口之處題準毎年六月初旬水漲築壩攔截九月初旬水落開壩行舟天妃壩萬歴七年建舊有新莊閘天妃閘萬歴七年俱廢山陽縣閘七壩六隄一福興閘萬厯七年改建夀州厰清江閘板閘龍汪閘永清閘窯灣閘三閘萬歴十年永濟河建黄浦減水閘萬歴二年建方家壩新建閘仁義禮智四字壩髙家堰石堤萬歴七年建舊有移風閘甎閘新城上下二閘及萬歴元年建涇河平河橋二減水閘又有清江東西淮安滿浦南鎖五壩信字壩今俱廢寳應縣閘十三𢎞濟河南北二閘長沙溝減水閘朱馬灣減水閘劉家堡減水閘五閘俱萬歴十二年建江橋北等八減水閘嘉靖萬歴年間建舊有七里溝菜橋口魚兒溝三減水閘白馬湖七里溝槐角樓滚水壩今俱廢髙郵州閘九壩一康濟河南北二閘萬歴四年建城南河堤三減水閘嘉靖中建新中堤四減水閘萬歴五年建蛤蜊壩舊有觀橋上下二閘車邏王琴二減水閘今廢江都縣閘十六壩十一廣惠閘通惠閘二閘隆慶六年𤓰洲建邵伯九減水閘芒稻河減水閘萬歴十一年建沙壩裔家馬家渡南潭四平水閘萬歴元年建𤓰洲十壩舊十一灣頭滚水壩舊有朝宗上下通江新開大同潘家大橋江口留潮九閘及新廟等十一減水閘邵伯小壩揚子橋古壩𤓰洲減水䃮雷公上下二塘小新塘句城塘今俱廢儀真縣閘四壩六嚮水閘通濟閘羅泗閘一名臨江閘攔潮閘一壩至五壩新壩舊有清江等八閘裏河口閘及東門新髙橋二減水閘劉塘茅家山北山陳公四塘蔣家溝張家溝二減水䃮今俱廢丹徒縣閘一大犢山閘萬歴十一年建丹陽縣閘一黄泥壩閘萬歴十一年建以上二閘俱為挑復練湖設以上皆明㑹典㑹通河之源以南為逆以北為順南接豐沛北迄天津凡一千五百餘里而推輓之勞不事焉然河之源其最微者莫若㑹通黄水衝之則隨而他奔而漕不行故壩以障其入源微而支分則其流益少而漕亦不行故壩以障其出流駛而不積則涸故閉閘以須其盈盈而啓之以次而進漕乃可通潦溢而不洩必潰於是有減水閘溢而減河以入湖涸而放湖以入河於是有水櫃櫃者蓄也湖之别名也而壅水為埭謂之堰沙澥之處謂之淺淺有鋪鋪有夫以時挑濬焉以下皆河程記由沛縣北九十里入魚臺境為閘者二曰利建即宋家口明嘉靖四十五年建月河長七十五丈迤北十八里曰南陽元至順二年建月河長三十五丈明宣徳七年重修減水閘十四俱明隆慶二年建以洩新河水入南陽湖者也壩一曰南陽明隆慶元年建淺鋪二十一湖一曰獨山即南陽湖明隆慶元年北岸築石堤三十餘里舊運河在昭陽湖西為閘者三曰孟陽泊在縣治東元大徳八年建月河長十二丈迤北八里曰八里灣明宣徳八年建月河長二十七丈又北八里曰穀亭元至順二年建月河長五十八丈積水閘二壩一今皆廢淺二十一由魚臺而北九十里逹於濟寧其東岸鄒縣境也為小閘一明成化十年建淺一曰捲里由鄒縣而北入濟寧境自州以西則濟寧衛分地也為閘十四曰棗林距南陽十二里元延祐五年建月河長八十丈明正徳二年重修迤北六里曰魯橋明永樂十三年建正徳二年重修月河長一千一百六十五丈在河西岸明隆慶四年改為正河又北五里曰師家莊元大徳二年建月河長四十丈又北十五里曰仲家淺明宣徳五年建月河長五十一丈明萬歴十二年重修又北五里曰新閘元至正元年建月河長五十一丈又北八里曰新店元大徳元年建月河長五十一丈明嘉靖十四年重修又北十八里曰石佛元延祐六年建掘土中得石佛像十二故名月河長七十九丈明𢎞治六年重修又北八里曰趙村元至正七年建月河長九十八丈明𢎞治十二年重修又西北三里曰在城元大徳七年建明𢎞治十二年重修又西北一里曰天井元至治元年建一云唐尉遲敬徳所剙也其西南曰分水元大徳五年建月河閘三上下二閘俱明天順三年改建曰下新即在城月河曰中新至上新一里明成化十一年建曰上新即天井月河減水閘六新店新閘仲家淺各一屬州五里營十里鋪安居鎮各一屬衛明萬歴十七年建壩一曰趙村月河石壩明𢎞治初建淺十七曰硯瓦溝曰棗林曰魯橋曰師家莊下曰師家莊上曰仲家淺曰新閘曰新店曰花家曰石佛曰楊灣曰趙村曰五里曰十里曰安居曰永通曰曹井橋湖一曰馬塲一名任湖在五里東周圍四十里上受獨山湖之水起魚臺至濟寧有舊運道焉有閘四曰廣運上明𢎞治四年建曰廣運曰永通下明成化十一年建曰永通明洪武四年建今俱廢淺二十由濟寧而北一百里至汶上縣之開河驛其左為鉅野有閘一曰通濟距天井三十五里明萬歴十