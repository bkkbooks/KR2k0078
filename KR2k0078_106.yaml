body:
  text: 行水金鑑卷一百六江南按察使傅澤洪撰運河水元至正二十五年十月乙已徐達兵趨泰州浚河通舟師明太祖實録明洪武元年河決曹州從雙河口入魚臺大將軍徐達開塌場口入於泗以通運河防一覽時薛祥為京畿都漕運使管長淮大河等衛官軍分司淮安自揚至蔡達濟壩堰皆沙塞崩塌疏通修築晝夜無息役使均平衆皆恱從黃金撰工部尚書薛公傳祥字彥卿無為州人明太祖洪武四年二月辛未上謂中書省臣曰臨濠為朕興王之地今置中都宜以傍近州縣通水路漕運者隸之於是省臣議以夀邳徐宿潁息光六安信陽九州五河懷逺定逺中立蒙城霍丘英山宿遷睢寧碭山靈璧潁上泰和固始光山豐沛蕭一十八縣悉隸中都明太祖實録明太祖洪武五年二月辛已命兩淮都轉運鹽使司移通泰等州批驗所于儀真縣仍疏濬運河以便商旅明太祖實録明太祖洪武六年傅友德鎮北平歲旱疏陳五事一永平府民接運軍儲由雅洪橋至北平道里頗逺宜通清河淶水故道漕運則用力少而成功多矣十二月庚申工部奏河南開封府自小木至陳州沙河口十八閘淤塞六十三處宜疏濬以通漕運從之明太祖實録明太祖洪武十三年冬十月乙亥致仕兵部尚書單安仁言由大江入黃泥灘口過儀真縣南壩入轉運河自南壩至朴樹灣約三十里宜濬以通往來舟楫其湖廣江西等處運糧船可由大江黃泥灘口入轉運河過淮安壩以達鳳陽及迤北郡縣其兩淮鹽運船可由揚子橋過縣南灘入黃泥灘出江以達京師其浙江等處運糧船可從下江入深港過揚子橋至轉運河過淮安壩以達鳳陽凡運磚朩之船皆自瓜州過堰不相混雜如是則官船無風水之虞民船無停滯之患其轉運河及江都縣深港亦宜考其故道而疏濬之上曰所言雖善然恐此役一興未免重勞民力姑緩之明太祖實録明太祖洪武十四年十一月乙巳浚揚州府官河自揚子橋至黃泥灘凡九千四百三十六丈明太祖實録明太祖洪武十五年十二月癸未浚揚州儀真湖九千一百草丈置閘壩十三處明太祖實録明太祖洪武十七年閏十月壬寅修築江都縣深港壩浚河道五百六十七丈明太祖實録明太祖洪武二十年春正月癸酉命工部主事楊德禮往髙郵督有司修築並湖隄岸因揚州府同知任祥之言堤岸圯壞故有是命明太祖實録王晏洪武二十年歷山東右參政督開運河濱岸有梁山泊者在勝國時塋垣皆甃以巨石公悉取造梁莊諸閘共事者初有難色公曰此非名賢其事不經無補風教今先務為急吾但知紓民力耳遑問其他其謀事向方而敢於為義類此陳道撰王公傳取晏字士寧盱眙人塋石作閘雖紓民力其如虧損隂德何澤及枯骨者應不如是明太祖洪武二十四年春正月辛亥北平布政使司左參議周倬言通州白河北接太山諸河水道東南至直沽海口每霖雨時降水潦泛漲橋梁頺圯修築勞民其通州舊有糧船六十餘艘罷運已久宜改為浮梁於白河之上以便經行十一月已未命景川侯曹震往四川治道路震至瀘州按視有枝河通永寧界鑿石削崖直接其地以通漕運復闢陸路作驛舍郵亭架橋立棧自茂州一道至松潘一道至貴州以達保寧通陜西由是往來者便之明太祖實録是年河決原武縣黑陽山由舊曹縣鄆城兩河口漫過安山而會通河淤乃自濟寧以北陸運至德州入河北河續紀按此河決而未治也故次年命舳艫侯朱夀率舟師海運河志明太祖洪武二十六年八月丙戌命崇山侯李新往溧水縣督視有司開胭脂河上面諭之曰兩浙賦稅漕運京師嵗實繁浩一自浙河至丹陽捨舟登陸轉輸甚勞一自大江泝流而上風濤之險覆溺者多朕甚憫之今欲自畿甸疏鑿河流以通於浙俾運輸者不勞商旅獲便故特命爾往督其事爾其蒞事惟勤役民勿暴新頓首受命而行暨河成人皆便之明太祖實録崇山侯李新督有司開胭脂河於溧水西達大江東通兩浙以濟漕運河成民甚便之明史稿明太祖洪武二十九年二月丙午常州府武進縣言本縣奔牛呂城二壩河道淺澀請浚深以便漕運從之明太祖實録劉辰金華人建文中知鎮江府瀕江田八十餘頃久淪於水賦如故辰請除之京口閘廢轉漕者道新河出江舟數敗辰修故閘公私便之漕河易涸仰練河益水三斗門久廢辰修築之運舟既通河下田益稔明史稿辰知鎮江府京口閘廢東南漕運轉新河江隂二港以出江多為風濤阻溺公乃自京口至呂城百二十里去淤塞甃石作壩修閘門順水勢之出入於是公私便之然漕河源淺易涸每仰練河以益水湖有三斗門亦廢公又修築之三斗門成漕運之舟既通湖下之田益稔時浙湖轉輸之民道其境上死者為收瘞疾者給米命以小舟送出境賴以活者數百人永樂元年以預修國史知故實賜白金文綺龍衣升江西左參政胡儼吏部左侍郎劉公墓志明洪武三十五年即建文四年壬午十一月癸未太宗已登極矣修常州府武進縣剩銀河閘明太宗實録明太宗永樂元年三月戊戌瀋陽中屯衛軍士唐順言衛河之源出衛輝府輝縣西北八里太行山下其流自縣治北經衛輝城下抵直沽入海南距河陸路才五十餘里若開衛河距黃河百步置倉厫受南方所運糧餉轉至衛河交運公私兩便上曰此策亦是命廷臣更詳議如議可行亦俟民力少蘇行之四月戊午浚松江華亭上海運鹽河金山衛閘港曹溪分水港等處七月丙申户部尚書郁新等言淮河至黃河多淺灘跌坡饋運艱阻請自淮安用船可載三百石以上者運入淮河沙河至陳州潁岐口跌坡下復以淺船可載二百石以上者運至跌坡上别以大船載入黃河至八栁樹等處令河南車夫運赴衛河轉輸北京從之九月戊子修兖州府郯城縣沭沂二河決口十月壬戌以河道淤塞革濟寧州之耐牢坡聊城縣之周家店李海務臨清縣之臨清閘會通閘五壩官甲戌修山東膠州水決隄岸十一月丙子修山東濰縣白浪等河決岸丙申浚鎮江府丹徒縣甘露港等處河渠閏十一月庚午浚揚州府江都縣瓜洲壩河道十二月已卯修揚州府江都縣永真沙邉江墟岸明太宗實録明太宗永樂二年正月戊申揚州府髙郵州耆民言自州北門至張家溝湖岸兩京之要路民田之巨防湖納天長盱眙諸水雨潦漲溢風波衝決隄岸每嵗修築旋復傾圯阻絶驛路傷損民田乞遣人相度重為修理從之五月癸丑修山東鄒平縣小清河隄岸三百八十四丈九月已卯修順天府固安縣渾河決岸十一月癸卯鎮守淮安都指揮施文言淮安諸壩舟航往來每遇天旱壩下淤淺重勞人力近城舊有清江浦二閘比年坍壞乞命有司修砌以便往來從之浚儀真清江壩下水港丙辰工部侍郎趙毅等奏鎮江府民言乙於本處鑿山開河以便漕運約用九十八萬人數月可成請遣官驗視上曰爾任大臣顧不能料制其事而必欲遣人驗視耶數年以來民困為甚非有大不得已之事豈可輕役且役九十八萬人即復用如許人供給之騷動數十州縣為百姓植禍矣豈不殆哉毅等惶恐頓首謝遂寢不行明太宗實録明太宗永樂三年三月壬申修山東歷城縣小清河等處水決堤岸五月癸亥淮安府海州言臨洪場民嵗於管瀆場界耕種輸作陸運艱難州北舊有河上通髙橋下接臨洪近年淤塞乞疏濬以便舟楫從之七月已亥浚淮安府山陽縣運鹽河計一十八里十一月乙丑浚淮安府支家河長一萬一千九百七十丈明太宗實録明太宗永樂四年八月壬辰工部言呂梁洪霖雨水決近河路并圈溝橋一十九丈六尺宜發民修理從之九月癸亥揚州府泰州判官黃通理言州境舊有運鹽官河每遇霪雨輒泛溢傷民田宅乞於普定秦潼河及西溪南儀阡三處各開水口使下流經興化鹽城界入海仍各置閘以時啓閉永為民利從之十月已亥浚蘇州府常熟縣福山塘計三十六里十一月癸亥戶部言髙郵州東河等處塘岸傾圯江都縣劉家墟港淤塞命有司發民修浚十二月丁亥常州府孟瀆河閘官裴讓言河自蘭陵溝北至閘六千三百三十丈南至奔牛鎮一千二百二十丈年久湮塞艱於漕運乞發民疏治命右通政張璉發蘇松鎮江常州民丁十萬浚之明太宗實録明太宗永樂五年二月辛亥修淮安隄庚午東昌府言衛河隄岸自臨清至渡口驛潰決凡七處命工部遣官修築明太宗實録明太宗永樂七年六月癸卯順天府固安縣言漳河決賀家口傷禾稼命工部亟遣官修築明太宗實録明太宗永樂八年三月己卯修鎮江府丹陽縣練河塘十二月癸卯蘇州府吳江縣言石塘官路右臨太湖左邉松江南至平望嘉興連年土石坍塌橋梁斷壞請及時修理計用三萬七千四百餘人半月可完從之敕通政趙君任督之務令堅固毋虛勞民力明太宗實録明太宗永樂九年正月丙戌揚州府髙郵州言城北張家溝塘岸三十里舊用磚石包砌防遏甓社等九湖及天長諸水近因夏雨浸淫各水暴漲衝決塘岸九百八十丈又自張家溝北至寶應縣南至江都縣東至興化縣界塘岸百餘里間有坍塌乞發丁夫如舊修治皇太子令工部核實修築二月已亥山東沂州言沭河口水衝決五百三十餘丈請發民修築從之庚戌山東齊東縣知縣張升言境內小清河納湖雞諸山溪澗之水去嵗洪水橫汜陂堰衝決淹沒下固隄官臺等處鹽場及青州郡縣民田請浚上流修隄防使水由故道皇太子令工部速遣官相度修浚已未開會通河河自濟寧至臨清舊通舟楫洪武中沙岸衝決河道淤塞故於陸路置八遞運所每所用民丁三千車二百餘輛嵗久民困其役永樂初屢有言開河便者上重民力未許至是濟寧州同知潘叔正言會通河道四百五十餘里至淤塞者三之一浚而通之非唯山東之民免轉輸之勞實國家無窮之利乃命工部尚書宋禮都督周長往視禮等還極陳疏浚之便且言天氣和霽宜及時用工於是遣侍郎金純發山東及直隸徐州民丁繼發應天鎮江等府民丁併力開浚民丁皆給糧賞而蠲其他役及今年田租命尚書宋禮總督之遣吏部侍郎周逵以太牢祭山川城隍之神仍命御史二員監督三月壬申浚揚州府瓜洲壩河道及修通江減水二閘庚辰修蘇州至嘉興石土塘橋路七十餘里泄水洞百三十一處六月辛丑淮安府沭陽縣知縣王泰言縣南沭河北連山東南通淮安洪武間常疏浚以便轉運今壅塞四十餘里轉輸既艱水復為患乞於農隙浚治從之乙卯會隙河成河以汶泗為源汶水出寧陽縣泗水出兖州府至濟寧州而合置天井閘以分其流南流達於淮而河則其西北流也由開河過東昌府入臨清縣計三百八十五里深一丈三尺廣三丈二尺役軍夫三十萬用工十旬蠲租稅百一十萬二千五百有竒自濟寧至臨清置閘十五閘置官立水則以時啓閉舟行便之八月甲午浚常州府江隂縣青暘等處河道壬寅濟寧州同知潘叔正及耆民百三十七人以會通河成詣闕謝恩上以開河之議肇自叔正賜紗衣一襲鈔一錠耆民人五錠庚戌工部尚書宋禮等百六人開會通河畢還京師命禮部定賞格禮部言都督周長循私廢公虐害軍夫不當給賞其餘宜分四等總督官尚書宋禮等三員人賞鈔二百錠綵幣二表裏續差管事興安伯徐亨等三員人賞鈔百錠綵幣一表裏分遣管工戶部郎中竇竒等五十四員人賞鈔四十錠工部事官藺芳等三十五員人賞鈔十錠命如所定給之甲寅巡按北京監察御史朱敏言大名等府漳衛二水決隄岸淹田禾請發民修築從之戊午工部尚書宋禮言會通河以汶泗為源夏秋霖潦泛溢則馬常泊之流亦入焉汶泗合流至濟寧分為二河一入徐州一入臨清河流淺深舟楫通塞繫乎泊水之消長然泊水夏秋有餘冬春不足非經理河源及引别水以益之必有淺澀之患今汶河上流自寧陽縣堽城閘已築壩堰使其水盡入新河東平州之東境有沙河一道本汶河支流至十路口通馬常泊比年流沙淤塞河口宜趂時開浚况沙河至十路口故道具存不必施工河口當浚者僅三里河中宜築堰計百八十丈從之十一月丁丑修浙江仁和海寧海鹽三縣土石塘岸萬一千一百八十五丈閏十二月已卯革常州府武進縣之剩銀河閘時河淤塞已别開孟瀆河故革之明太宗實録宋禮字大本永寧人洪武中以國子生為山西按察司僉事永樂二年拜工部尚書七年丁母憂詔留視事九年命開會通河會通河者元至元中以夀張尹韓仲暉言自東平安民山鑿河至臨清引汶絶濟屬之衛河為轉漕道然岸狹水淺不任重載故終元世海運為多明初輸餉遼東北平專用海道洪武二十四年河決原武絶安山湖會通遂淤成祖初建北京河海兼運海運險逺多失亡而河運則由江淮達陽武發山西河南丁夫陸挽至衛輝入河歷八遞運所民苦其勞至是濟寧州同知潘叔正上言舊會通河四百五十餘里淤者乃三之一濬之便於是命禮及刑部侍郎金純都督周長往治之至則發山東及徐州應天鎮江民三十萬蠲租一百十萬二千石有竒二十旬而河成初禮以會通之源必資汶水乃用汶上老人白英策築堽城及戴村壩橫亘五里遏汶流使無南入洸而北歸海匯諸泉之水盡出汶上至南旺中分之為二道南流接徐沛十之四北流達臨清十之六南旺者地勢髙決其水南北皆注所謂水脊也又相地置閘以時蓄泄自分水北至臨清地降九十尺置閘十有七而達於衛南至沽頭地降百十有六尺閘二十有一而達於淮禮又奏濬沙河入馬常泊以益於汶是年興安伯徐亨工部侍郎蔣廷瓚濬祥符魚王口至中灤下復舊黃河道命禮兼董之明年命相度衛河水患奏請自魏家灣開支河二泄水入土河復自德州西北開支河一泄水入舊黃河使至海豐大沽河入海帝命俟秋後成之禮等還京論漕渠功禮第一賜寶鏹文繡以潘叔正首建河議賜衣及鈔旌其功金純字德修泗州人國子監生歷刑部左侍郎永樂九年命與宋禮同治會通河又同徐亨蔣廷瓚濬魚王口黃河故道初太祖用兵梁晉間使大將軍達開塌場口通河於泗又開濟寧西耐牢坡引曹鄆河水以通中原之運其後故道寖塞至是純疏治之自開封北引水達鄆城入塌場出穀亭北十里為永通廣運二閘還改禮部左侍郎進禮部尚書明史稿周長天長人從靖難歷官督府永樂九年奉命同宋禮治漕駐濟寧修浚會通河卒贈萊陽伯諡忠毅潘叔正仙居人永樂九年由太學生任濟寧州同知奏請開漕渠自濟寧抵臨清以通東南漕挽朝廷嘉之賜寶鏹錦幣山東全河備考是年夏五月甲申罷築漳河隄防先因臨漳主簿趙永中言去年漳河泛溢決張固村河口與釡陽河合流低下田土悉為汪浸今若復修隄防或終決潰是虛負民力也乞令沮洳之民别於漳河之旁近擇髙阜荒地開種從之河南通志明太宗永樂十年正月已酉巡按山東監察御史許堪言去秋衛河水溢河岸低窪之處四散漫衍其時雖略修理今已復有倒塌者自臨清至直沽大率皆然乞敕有司預期修理上命工部移文尚書宋禮相度措置四月庚申浚北京通流寺四閘河道共一萬七百三十七丈壬戌尚書宋禮奏近因御史許堪言衛河水患命臣相度措置臣嘗因衛輝至直沽視河岸低薄非止一處竊謂若不究其源析其流但務修築隄岸恐水復衝坍不免連年動勞民力今欲除患須定長久之計臣先視會通河至魏家灣與土河相連宜於彼開二小河以泄於土河則雖遇水漲下流衛河自然無漫衍之患見已分撥軍夫用工今復視德州城西北亦可開泄水小河一道蓋自衛河岸東北至舊黃河一十二里內五里舊有溝渠五里係古路二里係平地今開通泄水以入舊黃河則至海豐縣大沽河入海凡四百五十七里約用軍夫三千餘人十日可完上諭工部臣曰禮所言誠當但今農務方興可令俟秋成後為之十月甲寅修山東安丘縣紅河等處水決隄岸戊午修揚州府海門縣捍潮隄岸縣故有隄東抵海南並江延袤百三十餘里年久決隤有司奏請修築上命平江伯陳瑄督丁夫四十萬築之計萬八千餘丈壬申浚山東平度州濰縣白浪河十一月丙戌修揚州府儀真縣緣江隄岸及浚夾港等處河道戊戌北京行太僕寺卿楊砥言吳橋東光興濟交河諸縣及天津等衛屯田雨水決隄傷稼切見德州良店驛東南二十五里有黃河故道州南有土河與舊河通若於二處開河置閘則水勢分可以便民時土河已命置閘上命工部侍郎藺芳往經理之德州東有古黃河南有鬲津枯河即枯河也河間府獻縣言夏雨霖淫西山暴水衝決真定之饒陽武強恭儉等處堤岸淹沒田廬乞集夫修築從之丙午浚鎮江府京口新港甘露三港達於江十二月甲寅修靜海縣至青縣河隄癸亥保定府安州奏大雨決直亭等河口八十九處計用六千三百人修築一月可完上以天氣寒沍命俟春暖築之辛未湖廣華容縣言縣安津等四十六處水決隄防傷民禾稼方今農隙可以修築然本縣民少未易成功上曰東作在邇亟興旁縣民丁併力修之明太宗實録藺芳夏縣人從宋禮治會通河復為工部主事以禮薦遷右侍郎亡何行太僕卿楊砥言吳橋東光興濟交河及天津屯田雨水決隄傷稼乞開德州良店東南黃河故道以分水勢復命芳往治之所經郡邑有不便民者輒疏以聞楊砥禮部左侍郎坐巡視河渠失職降工部主事歷太僕寺卿吳橋至天津等衛大水決堤傷稼砥請開德州東南黃河故道及土河以殺水勢帝命工部侍郎藺芳經理之明史稿太祖建都金陵四方運舟悉由大江至洪武十三年海運遼東以供軍餉文皇肇建北京江南糧船一由江入海出直沽口白河運至通州一由江入淮歷黃河至陽武縣陸運至衛輝府由衛河運至通州永樂九年以濟寧州同知潘叔正言命工部尚書宋禮都督周長等發山東丁夫十六萬五千濬元會通河自濟寧至臨清三百八十五里漕舟始達於通州而永樂十年宋禮以海船造辦太迫議造淺船五百艘撥運淮揚徐兖等處嵗糧一百萬石由會通儹運以補海運一年之數永樂十三年始罷皇甫録明紀略明太宗永樂十一年正月丁亥蘇州府同知栁敬中言崑山之太平河東通大海西接福興河上達楊城湖為利最博近年淤塞旱潦俱不便今欲疏浚約用人七萬八千四百計二十五日可完上曰役久則民勞遲則妨農其徵旁近民夫十萬亟成之庚子順天府保定縣言去年秋淫雨決河岸五十四處接文安大成二縣之界乞以三縣民協力修築從之二月壬戌修河間府水決隄岸三月癸未應天府言新河口墟岸為風濤衝齧四十餘丈皇太子命工部修築明太宗實録明太宗永樂十二年八月甲辰浚淮安府海州城南官河二百四十里丁未修通州三河等處水決隄岸九月丁卯修山東聊城縣龍灣河及濮州紅船口范縣曹村河隄岸丙子順天府武清縣言河決耍兒渡口六百五十餘丈命工部遣官修築辛已修鳳陽府安豐塘水門十六座及牛角壩至新倉鋪傾塌隄岸萬三千五百餘丈十月甲午常州府江隂縣請浚萬嵗河及塘涇等河從之十一月辛亥浚蘇州府崑山縣太平河明太宗實録是年平江伯陳瑄請鑿徐呂二洪以通漕運更於洪口建閘按宋元祐四年京東轉運司言清河與江浙淮南諸路相通因徐州呂梁百步兩洪湍淺險惡多壞舟楫水手牛驢牽戶盤剝人等邀阻百端商賈不行朝廷已委官度地勢穿鑿今若開修月河石堤上下置閘以時啓閉通放舟船實為長利此即瑄所鑿之道而當時開鑿之官邈不可考南河全考明太宗永樂十三年二月已已朔浚揚州府瓜洲壩河道一至瓜州巡檢司一至江口通六百餘丈三月辛亥山西解州言硝池水溢決豁口等處流入鹽河蓋由姚暹渠涑水河并流水道淤塞乞發民修治從之五月乙丑開清江浦河道凡漕運北京舟至淮安過壩度淮以達清河口挽運者不勝勞平江伯陳瑄時總漕運故老為瑄言淮安城西有管家湖自湖至淮河鴨陳口僅二十里與清河口相直宜鑿河引湖水入淮以通漕舟瑄以聞遂發軍民開河置四閘曰移風曰清江曰福興曰新莊以時啓閉人甚便之十二月乙丑河南彰德府磁州言今夏多雨滏漳二河水溢漂民廬舍淹沒田稼間有髙阜稼亦不實乞免民間今嵗稅糧從之明太宗實録是年建淮安五壩運船經壩入淮仁字壩義字壩在新城東門外東北自城南引湖水抵壩口外即淮河遇清江口淤塞運船經此入淮禮字壩智字壩信字壩在新城西門外西北引湖水抵壩口外即淮河遇清江口淤塞則官民商船經此達於淮南河全考明太宗永樂十四年正月庚午東昌府臨清縣臨清壩成置壩官一員四月壬午設直隸淮安府山陽縣之清河福興清河縣之新莊邳州之乾溝徐州之沽頭上沽頭下沛縣之金溝山東濟寧州之谷亭孟陽泊魯橋十閘置閘官各一員五月庚子修揚州府邵伯鎮上下二閘明太宗實録是年平江伯陳瑄疏濬故沙河置閘通舟先是漕至淮安悉從府東北車壩入淮逆水行六十里至是瑄因宋喬維嶽所開沙河舊渠益加疏治置閘通舟踰年而功成漕人德之為立祠焉南河全考明太宗永樂十五年五月乙未遣官巡視北京通州至儀真河道明太宗實録劉觀都察院左都御史永樂十五年督浚河漕十九年巡撫陜西明史稿明太宗永樂十七年秋七月庚申遣鎮逺侯顧興祖巡視呂梁洪初上以洪險隘舟楫邂逅多傾覆特命欣城伯趙彛鎮徐州兼理洪道而彛以貪縱廢事至是復遣興祖巡視仍以敕諭彛曰朕急於利民念徐州呂梁洪險厄命爾兼理爾乃溺於酒色貨賄坐視民患恬不究心得免於罪乎今姑宥不問宜改志易行以蓋前愆明太宗實録明太宗永樂十九年九月丙寅修直隸髙郵州新開湖塘岸十月丁酉修浙江海寧等縣塘岸明太宗實録趙泰永樂中為常州府同知浚孟瀆得勝二河作魏村閘諸所興築民無言勞者遷工部郎中奉命塞東昌決河周忱薦為協同都運益勤其職明史稿永樂二十二年十月辛卯仁宗巳登極矣平江伯陳瑄上言七事一蘇民力今天下嵗運糧餉惟湖廣浙江江西三布政司及直隸蘇松等府州去北京甚逺又河道有洪閘壩及淺凍之阻往復踰嵗所費數倍正糧上逋公租下妨農務皆由於此乞令運於近便淮安徐州等處交納别令官軍接運至北京如此則民力可蘇而農務不妨上覽奏以付翰林臣曰瑄言皆當令所司速行明仁宗實録行水金鑑卷一百六
