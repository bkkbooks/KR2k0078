body:
  text: 行水金鑑卷一百七江南按察使傅澤洪撰運河水明洪熙元年秋七月戊辰朔宣宗已登極矣順天府通州武清固安漷縣各奏六月二十二日驟雨河溢衝決河西務白浮宋家口隄岸丙戌河南臨漳縣奏六月大雨漳滏二河皆漲衝決三家等村隄岸二十四處上命行在工部郎發所在軍民修築辛卯真定府奏六月以來霖雨滹沱等河皆漲衝決隄岸定晉深三州藳城無極饒陽新樂寧晉五縣低田皆沒上命行在戶部遣人勘視丙申北京順天河間保定三府順義懷柔肅寧任丘靜海慶都清苑雄八縣及永平府灤州各奏今年夏秋多雨河水泛溢淹沒田苗命戶部遣人勘視十一月癸亥濬儀真瓜州壩河先是平江伯陳瑄奏儀真瓜洲壩下河道年久淤塞請發附近軍民疏濬上以東作方興姑俟農隙至是命鎮江揚州常州三府儀真揚州鎮江三衛共以軍民二萬疏濬仍命瑄董之癸已行在工部奏去年冬平江伯陳瑄總軍夫疏濬儀真瓜洲壩下河道至嵗終罷役今尚有未疏導者請仍以舊集軍夫及時用工從之明宣宗實録明宣宗宣德三年六月庚寅順天府武清固安二縣言霖雨連旬洪水衝決河西務及當渠里秦家口隄岸傷民田禾上命二縣民及屯軍合力亟修丁酉霖雨通州河溢及城趾深一丈餘城壞者一百三十餘丈甲辰巡按北直𨽻監察御史張瑩奏五月六月連雨不已河決隄岸溺死軍民壞通州良鄉等處官民屋宇及淹沒宛平大興順義大城保定文安永清寶坻香河霸州并保定等府新城等縣田苗上諭尚書夏原吉曰災不虛至必有其咎宜勉思寬恤之道丁未命左都御史劉觀巡視河道敇諭之曰比年以來緣河提督官徇私滅公貪弊百出侍郎曺本催督秋糧所至諸閘作威肆害唯以所督運者得度其他處運糧及運民商賈皆不得行舟楫積滯雨水緣發傷壞者多今特命卿自北京直抵南京巡視凡河道淤淺閘壩損壞躬自提督修浚務俾舟楫順利輸運無阻公私兩便卿其夙夜盡心無怠所事庶稱委任十二月庚辰修盧溝橋凌水所決河口行在工部言通州耍兒渡河渡水從東注而正河淺澀舟行不便請急修築從之明宣宗實録明宣宗宣德四年正月戊辰平江伯陳瑄言山東濟寧以北舊河自長溝至棗林閘一百二十里沙土淤淺漕舟難行今凍漸解餽運將興約計用十二萬人疏濬半月可成命山東起集民兵與今運朩軍士相兼用工二月戊寅命隆平侯張信同太監沐敬浚河西務河道及修隄岸先是河西務耍兒渡等處河岸衝決命行在工部修築水急民少久無成功至是命信等往督發在京操備軍士五萬一千人益之四月丁亥上語右都御史顧佐等曰臨清以南諸閘專為蓄水以便行舟比聞閘官軟罷多為權勢所脅不時開放輕泄水利強梁者即度良善者候經旬日甚至忿鬭溺死者有之爾即揭榜禁約惟進薦新物者舟行不禁其餘不分公私必候積水及則方得開閘若有公事不可緩者即於所在官司轉給馬驢以行有仍前脅制聽從者皆論罪不貸六月已卯命山東三司遣官專理河道時總兵官平江伯陳瑄奏濟寧長溝至棗林閘河道淤淺漕運不便初朝廷專命侍郎藺芳及山東三司遣官督視疏濬往來無阻比年不遣大臣惟都司按察司有官如舊督視而布政司亦不遣官乞令遣官如故仍乞敕三司所遣官專理河道不與他事庶幾以便漕運從之十一月壬子直𨽻廣平府成安縣奏本縣今年四月五月苦雨漳滏二河泛濫淹沒田苗一百二十八頃有竒上命行在戶部覆視免其秋租丙辰總兵官平江伯陳瑄奏自徐州至濟寧河水多淺轉運甚難今遣官巡視謝溝胡陵城八里灣南陽淺皆當置閘其徂徠諸山泉源所出舊有湖塘今多淤塞乞加修濬庶有停蓄得以通利往來從之明宣宗實録明宣宗宣德五年五月癸卯總兵官平江伯陳瑄言淮安西湖河岸乃牽挽舟船往來通路比因風浪衝激岸多崩塌椿朩下存淮安府滿浦五壩間廢已久其官吏壩夫俱無差役乞令守視西湖隄岸遇有損壞就令修治從之丁卯命永康侯徐安行在工部侍郎羅汝敬自張家灣抵直沽緣河提督運朩敕令設法俾軍民商賈舟楫通行不相妨礙如河岸衝決就督軍夫修築七月丁已行在吏部郎中趙新自江西還言臨清河道穿狹往來舟楫阻滯廣積倉納糧民船離倉灣泊負米上倉甚難乞遣官會平江伯陳瑄於倉東開月河泊船于河北置壩一所則車船往來皆便上諭行在戶部臣曰開河置閘令平江伯計議用人力多少即及時興工九月壬子直𨽻巨鹿縣奏六月苦雨漳河泛溢衝決隄堰瀕河低田皆被災上命行在戶部臣曰凡被災傷處皆覆勘除其租十月癸酉總兵官平江伯陳瑄言臨清至安山河道春夏水淺舟難行張秋西南舊有汊河通汴朝廷嘗遣官修治遇水小時于金龍口堰水入河下注臨清以便漕運比年缺官遂失水利漕運實難乞仍其舊上命行在戶部從其言明宣宗實録明宣宗宣德六年二月戊戌命濬金龍口引河水達徐州以便漕運用御史白圭之言也河南布政司言祥符縣舊有新開河直抵黃陵岡凡四百五十餘里中多淤塞請加疏濬從之庚申巡撫侍郎趙詢言五事一揚州儀真設五壩以通江南舟楫二壩專過官船及官運竹朩諸物餘三壩專過糧船民船晝夜往來亦常阻滯有旬日不得渡者又壩下河窄舟無泊處乞令有司衛軍再開二壩以便舟行泊及增開河一道上覽之謂侍臣曰置壩開河令六部會議以聞五月壬申順天府奏霸州保定縣地低窪臨邉渾河往者河岸缺壞皆是保定文安大城諸縣民夫同軍衛修築今河水衝決岸土漸薄且有坍塌之處若水溢決潰必傷田苗請如舊集衆預修庶幾有備無患從之六月丁未順天府固安縣奏今夏久雨渾河漲溢衝決徐家等口上命工部撥工修築之七月壬寅疏滹沱舊河時巡按章聰言真定府滹沱淤塞比山水泛濫又衝壞河岸及軍民廬舍舊有護城河隄亦被沖決宜令修築八月已未浚白塔河及儀真等壩河先是御史陳祚言白塔河宜開浚置閘又侍郎趙新言宜浚白塔河及儀真舊江口鑰匙河黃泥灘清江閘俱宜浚導上遣主事潘厚及揚州淮安府官審視仍與平江伯陳瑄議可否及所用人力至是厚還奏開浚實便白塔河儀真壩河約用四萬五千八百人計四十日可完清江閘河用一萬八千人計十五日可完上從之於是工部請發揚州淮安軍夫先開白塔河置閘工畢就浚清江閘儀真鑰匙河上曰三處用工勞人太甚其儀真鑰匙河俟明年農隙修浚九月戊子直𨽻武進縣民奏閩浙官民舟船及今漕運必由本縣孟瀆河出逆水行三百餘里始達瓜洲壩往往為風浪漂溺縣舊有新河四十餘里出江正對揚州府泰興縣新河入至泰州壩一百二十餘里至揚子灣出運糧大河比今白塔河尤為便利第嵗久泥淤難通重載乞加修浚實為便利命平江伯陳瑄侍郎周忱審計十月乙未濟川衛奏六月苦雨河水泛溢溺死屯軍十七人淹田稼一十六頃甲辰蘇州府教諭唐敏言常熟縣舊有耿涇塘南接梅里塘通昆明湖北通揚子大江旱嵗資其灌溉年深壅塞洪武中嘗發長洲等縣民浚導民獲其利今復壅塞請如舊例發民浚導從之明宣宗實録明宣宗宣德七年正月已丑重建大興縣平津閘修通州羊營閘橋時平橋之水衝閘隄岸皆圮羊營者挽運所經之路橋壞已久行在戶部以聞故有是命三月壬戌水決固安縣馬莊等處隄岸命順天府發民修築行在工部尚書李友直奏通州至直沽河道紆曲尤多灘淺舟行阻滯永樂中嘗命侯伯一人總督浚治乃得通行請如故事上命行在戶部侍郎王佐往督之七月辛未順天府霸州三河香河豐潤漷東安永清六縣及永平府灤州各奏今夏苦雨河水漲溢低田所種黍穀俱傷無收壬申置吕梁漕渠石閘初平江伯陳瑄以吕梁上洪地陡水急漕舟難行奏準令民于舊洪西岸鑿梁渠深二丈闊五丈有竒夏秋有水可以行舟至是復欲深鑿置石閘二時其啓閉以節水庶幾往來無虞事聞命附近軍衛及山東布政司量發民夫工匠協力成之十一月辛酉初行在戶部右侍郎王佐言通州至河西務河道淺狹漕船動以萬計兼四方商旅舟楫往來無港汊可泊張家灣之西舊有渾河若疏濬近京師一二十里更加充廣瀦為巨浸令可泊船公私俱便命都督馮斌尚書李友直同佐審視至是斌等以圖進上覽之謂其役重大命姑止之明宣宗實録宣德七年平江伯陳瑄築髙郵寶應汜光白馬諸湖長堤以度牽道又開揚州白塔河置新閘潘家莊大橋江口四閘令江南糧船從常州府西北孟瀆河過江入白塔河至灣頭達漕河以省瓜洲盤壩之費初江南舟由瓜洲車壩入漕河自白塔河開瓜壩棄不用近白塔置壩舟行瓜儀南河全考明宣宗宣德八年九月丙寅平江伯陳瑄卒瑄永樂中嵗董漕事時以海運艱險浚山東舊河通北京瑄建議造平底淺舟以運人便之嵗增運至三百萬石又建議於淮安城北開清江浦有管家河入鴨陳口以達清河免過壩及風濤之患又緣管家河築隄十餘里以蓄水益河且便行者於清江浦江上及徐州臨清通州皆置倉受糧以次轉運疏儀真瓜州壩下渠鑿吕梁徐州洪傍亂石於刁陽湖南旺湖皆築隄緣河多置閘以時閉泄利舟楫凡所經營俱有條理明宣宗實録陳瑄字産純合肥人成祖即位封平江伯先是漕舟道海島島人恐多閉匿瑄招令互市平其直人交便之海溢隄圯自海門至鹽城凡百三十里命瑄以四十萬卒築治之為捍潮隄萬八千餘丈瑄言嘉定瀕海地江流衝會海舟停泊無髙山大陵可依請於青浦築土山方百丈髙三十餘丈立堠表識既成賜名寶山帝親為文記之宋禮既治會通河成朝廷議罷海運仍以瑄董漕運議造淺船二千餘艘初運百二萬石寖至五百萬石國用以饒時江南漕舟抵淮安率陸運過壩踰淮達清河勞費甚巨瑄用故老言自淮安城西管家湖鑿渠二十里為清江浦導湖水入淮築四閘以泄宣之又緣湖十里築隄引舟由是漕舟直達於河省費不訾其後復濬徐州至濟寧河又以吕梁洪險惡於西别鑿一渠置二閘蓄水通漕漕舟便之又築沛縣刁陽湖濟寧南旺湖長隄開泰州白塔河通大江又築髙郵湖隄於隄內鑿渠四十里避風濤之險又自淮至臨清相水勢置閘四十有七作常盈倉四十區於淮上及徐州臨清通州皆置倉便轉輸慮漕舟膠淺自淮至通置舍五百六十八舍置卒導舟避淺復緣河隄鑿井樹朩以便行人凡所規畫精密宏逺自理漕河者三十年舉無遺策終明之世漕運賴之卒封平江侯諡恭襄明史稿平江伯陳恭襄公瑄既通運河緣隄皆樹楊棗二朩並淮北所宜且楊枝可薪棗實可噉又易長多隂悉聽運夫為利其後土民并根伐之其棗近官舍者並輸入官運夫既不敢謀而官司亦不復問矣明良記明宣宗宣德九年六月丙辰行在工部尚書吳中奏北京城東南有兩水磨及通惠河諸閘皆為河水所壞今南門外舊有減水河若加疏鑿長二十餘丈即與郊壇後河通流可泄水勢上曰盛夏炎暑未宜疲勞民姑緩之庚午水決北京渾河東岸自狼窩口至小屯厰乙亥右副總兵都指揮僉事吳亮言督糧船萬餘艘已達北河而河水泛溢難進且河西務東西上下水決隄防一十五處奔流迅激勢益猛悍重載之舟恐失利乞早修築上命行在工部發軍民修築命豐城侯李賢總督之明宣宗實録明宣德十年六月甲辰英宗已即位矣直𨽻廣平府永平縣縣丞李祐奏請修閉漳河以防民患疏通衛河以濟舟楫事下行在工部請從所言其漳衛二河宜遣本部官一人往會所在官司發軍民從宜濬治上命河道不必遣官第令所在軍衛有司理之七月已卯修桑乾河橋通州直沽耍兒渡口等處隄岸九月壬辰儹運糧儲總兵官及各處巡撫侍郎與羣臣會議軍民利益及正統元年合行事宜內一淮安清江浦淮河口及濟寧至東昌運河淺滯宜加疏濬一徐州吕梁洪原引睢水入焉今睢水過隋隄會汴入淮各洪淺狹宜于鳳池口或歸德新隄處設閘復引睢水以濟各洪一沙灣張秋運河舊引黃河支流自金龍口入焉今年久沙聚河水壅塞而運河幾絶宜加疏鑿一彰德河往時東入衛河至臨清與運河會今北流入滹沱而衛河亦淺宜障而東之上以所議皆當從之明英宗實録明英宗正統元年七月乙未命行在工部左侍郎李庸修狼窩口等處隄先是大雨浹旬水溢渾河狼窩口及盧溝橋小屯厰西湖東笆口髙梁等閘隄岸皆決命庸治之至是庸奏請工匠千五百人役夫二萬人上從所請且諭之曰此皆要害汝其盡心理之必完必固毋徒勞民已酉運河耍兒渡決行在工部奏請令副總兵都督僉事武興發漕運軍士及近河軍衛有司發丁夫併力修築上以漕卒不可重勞特敕太監沐敬安逺侯栁溥尚書李友直别為從宜區處九月甲午直𨽻河間府獻縣奏滹沱河溢大郭黿窩口隄乞命河間府遣官及河間等衛與獻縣協力修築之儹運糧儲總兵官及各處巡撫侍郎至京會議軍民利便事宜以聞一鎮江府新港壩至常州奔牛壩運河一百五十里原有水車車捲江潮灌注河內通利舟楫浸溉田禾年久廢弛宜命巡撫侍郎提督有司支給官錢置車給壩官領之以時灌注通漕溉田一浙江等處軍民運船俱由常州夏港孟瀆河出或河道淺澀爭占攙越宜專委工部主事一員提督令軍民糧船務循資次爭占攙越者罪之至事間之時仍聽巡撫侍郎差遣催糧一東南漕運船俱於瓜洲過壩原有東西二港置壩一十五座永樂中營造立厰貯朩東港淤塞止存西港七壩比年大江風浪險惡糧船無港收泊多至失所請以堆貯朩植歸併附近取回看厰內外官員革去厰房仍疏東港修築舊壩以通漕運一金龍口水接張秋大黃寺鳳池口水接徐州吕梁二洪俱是引水通運之處宜令工部委官一員巡視提督遇有淤塞會同河南三司鳩工疏濬一徐吕二洪中溜穿狹水淺石峻重船至彼剝空方可往來洪西原有小河運朩剝淺甚為便利宜於農隙之時量起附近軍夫命管洪官提督疏濬合用剝船水車令江西湖廣浙江衛所給之仍令淮安船厰改造小船備用上命俱準行之明英宗實録農愚按第一條車水灌田甚有益於民宜聽民自為車戽可也若以之通漕則甚不可徒為擾民之事究與漕事無濟後之人不可因其言而誤用之明英宗正統二年正月戊午減省直𨽻揚州府邵伯鎮閘壩官吏并江都等縣守塘夫先是揚州府奏邵伯鎮二閘一壩各設官吏人夫以防髙郵湖水泛溢今湖水既平往來無虞乞裁其半又江都儀真二縣有雷公上下白城陳公四塘舊設夫三百三十五人守之今運河轉輸不絶塘水宜泄入河夫可盡罷事下巡撫侍郎曺𢎞覆實至是𢎞奏塘水無源若盡泄之則涸矣仍留二百人時其蓄泄以濟運河但舊夫𨽻鹽運司今宜改𨽻揚州府為便其邵伯鎮閘壩官吏各一人夫九十人俱宜減省從之二月癸酉以運河耍兒渡決敕五軍各營發軍一萬工部發畿內夫一萬往築之三月丙辰行在工部奏運河時有淤淺恐妨糧船往來乞命官總督上以河道重事濟寧以南敕侍郎鄭辰治之以北敕副都御史賈諒治之王瑜武興亦令更相往來協心提督務使河通人便且須處分得宜毋重勞擾三月庚戌行在工部奏耍兒渡口修隄已完又新開河人甚便之乞令武清縣復民三十家常巡視其隄毋致傾壞且立神廟以鎮之上從其請賜號為通濟河之神九月乙卯山東寧海州夀張東阿汶上陽穀鄆城范等縣各奏六月以來淫雨河漲衝決隄防淹漂田廬牲畜等物上命行在戶部遣官覆視賑恤其民明英宗實録明英宗正統三年三月壬子升山東按察司僉事袁文為本司副使文提督濟寧等處河道興水利以通輸運民便之九載任滿東昌等府耆民二千餘人奏乞留之故有是命八月已未築髙郵湖隄隄長四百二十五丈舊用土築遇風撞激輒敗間有朩橛葦束蔽護亦不經久至是甃以磚石復以糯米糊和灰以固之始堅緻可久矣九月辛卯巡按山東監察御史陳韶奏膠州新沽二河東平州嘉祥等縣皆因大雨隄岸衝決民居淹沒濟寧州城北門及清寧衛軍器局亦被灌塌上命布政司及管河官俟農隙發民修築九月庚戌增置山東東昌府通判一員專理河道以本府通判戴浩言所屬河道八百餘里壩閘十有二所督理疏濬必得專責故也明英宗實録明英宗正統四年六月壬午小屯厰西隄為渾河水所決通州至直沽隄閘三十一處為雨潦所決詔發附近丁夫修築以工部侍郎李庸董之七月庚戌久雨滹沱沁漳等水決饒陽醜女隄獻縣郭家口隄衛輝彰德等處隄有司以聞詔隨宜修築八月丙子朔久雨白溝渾河二水溢決順天府保定縣及保定府安州隄五十餘處有司乞借附近丁夫協力修理從之壬午先是雨水決河西務隄岸發順天府寶坻等縣民夫修築至是行在大理寺右少卿李畛奉敕存問被災州縣具疏請罷修不急隄堰徴回督工官員從之九月壬子直𨽻深州滹沱河決淹民居田稼百餘里命有司修築之甲子應天府奏所屬溧水溧陽句容上元江寧五縣因天雨山水泛漲衝淹人口頭畜倉庫糧鈔官民房屋田地已委官賑濟踏勘謹具以聞十月壬午順天府大興縣請修平津閘河間府青縣請築衛河隄岸俱從之明英宗實録正統四年都督武興奏揚州白塔河泄水閉不行仍從瓜壩過船惑於浮言故也南河全考明英宗正統五年正月壬子初監察御史李匡等言儀真瓜洲二壩下港淺狹水落則大舟俱艤於江宜浚其港邵伯至寶應湖隄或決輒壞民田宜令漕舟歸者載石付所司築隄事下督漕總兵官都督僉事武興等覆之至是興奏壩下港以湖泥淤淺農暇輒浚以為常湖隄壞者方興役築塞若欲盡甃以石又役漕卒恐勞力費過當也上從其言江浙七府漕糧由瓜入運江廣及江南等府由儀入運若屯艤江外風浪堪虞開浚不可緩湖隄用石庶能堅久但不可役及漕卒上從其言何其當也二月壬午初直𨽻淮安府知府彭逺言永樂中平江伯陳瑄總督漕運於淮安西湖中築隄十餘里為挽舟路令淮安滿浦南鎖三壩夫巡視之又令漕卒順載小朩暨土積之隄上遇隄壞即修今壩夫止役故隄弗完請仍行瑄故事事下巡按御史及總督漕運總兵官核實至是御史李彬等奏宜令淮安府邳州等州縣發丁夫於旁近地採雜朩運之河壖候漕舟還令載以往若土則令漕舟及商舟皆載以輸從之三月乙已直𨽻淮安府鹽城縣奏伍祐新興二場運河壅塞阻商旅行舟乞浚之事下行在工部覆奏請下淮安府俟豐年興役從之七月壬寅山東兖州諸府自六月逮今淫雨連綿湖河泛溢事聞上命行在戶部遣官視之丁卯修宿遷縣邵店社至黃墩社一帶隄九月辛亥修河西務及直沽等處河隄十月丁丑命修香河縣白河隄從知縣張嵩言河水衝決民田被淹故也明英宗實録行水金鑑卷一百七
