body:
  text: 行水金鑑巻一百八江南按察使傅澤洪撰運河水明英宗正統六年二月辛已直𨽻髙郵州知州韓簡言州管河西接新開河東通興化縣舊設上下二閘以時啓閉舟行甚便今閘壊河不通且子嬰溝塞溝旁田皆荒蕪又減水隂洞常閉塞其岸東田旱潦輒不收請俱浚治之事下行在工部請令揚州府覈實興役毋輕擾民從之五月癸亥徙張家灣至河西務沿河民舍三百十三家以礙運船牽路故也六月壬辰漕運右參將都指揮僉事湯節言徐州至濟寧諸閘本積水以便漕舟今使客怙威至即起閘吏胥莫能禁臣見徐州吕梁二洪剥淺小船可令給與各閘傳送使客庶利於積水從之七月甲寅漕運右參將都指揮僉事湯節言閘河水淺糧艘不能進縁河南金龍口及山東徂徕金溝等泉缺官提督疏濬之故臣請遴選㢘幹官分投提督及移文河南山東各委官及時疏理上皆從之八月癸酉命修髙郵州北門起至張家溝一帶河隄十二月丁酉命廟祀平江恭襄侯陳瑄初瑄為總兵官督糧運疏鑿清江浦等處増設移風等閘堅築隄防以蓄水行舟立常盈倉積糧甚多及沒民感其恵於清江浦東立祠堂愬像崇奉禱者屢有靈應至是上聞命有司春秋致祭明英宗實録由楊士竒作瑄神道碑言公疏清江浦引水管家湖入鴨陳口達淮以免淮河風濤之患就管家湖築隄亘十里以便引舟浚儀真𤓰洲二壩潮港之湮鑿吕梁徐州二洪巨石以平水勢築沛縣刁陽湖濟寧南旺湖長隄開泰州白塔河通大江築髙郵湖隄隄内鑿渠亘四十里自淮至臨清剙閘四十有七建倉置舍以便漕舟縁隄鑿井樹朩以便夏月行者種種河政俱堪不朽宜乎血食千秋也明英宗正統七年七月癸亥久雨水決武清縣匡兒港漷縣中馬頭小䝉村河西務上馬頭隄岸共三十二處詔修其易為功者其功力繁多者計費以聞癸未修築淮安西湖中路十餘里以便漕運明英宗實録正統七年參将湯節因洪水迅急數壊舟楫建議於徐州洪之上流築堰逼水悉歸月河於月河南口設閘以壅積水勢至景泰間水漲閘壊南河全考明英宗正統八年三月壬午濬𤓰洲壩東港洪武間𤓰洲壩有東西二港永樂間廢東港壩為厰以貯材朩正統初廷臣議徙朩濬港未果至是督漕總兵官都督僉事武興言壩廢港塞非唯舟楫往来遲延且艤泊大江有風濤之虞請俟秋成於鎮江揚州二府僉夫七千餘人修復從之乙酉漕運總兵官都督僉事武興巡撫侍郎周忱等奏常州府武進縣民言漕舟出夏港泝大江風濤險阻害不可勝言常州西城有徳勝新河北入江江北揚州府泰興縣有北新河中間有淤淺者俱宜浚之以避大江險阻浙江都司署都指揮僉事蕭華言永樂宣徳間漕舟自常州府孟瀆河出江入白塔河江行不踰半日今孟瀆河淤淺請浚之廣東按察司知事黄武浙江處州衞指揮使牛通皆以為言事下臣等計議華等所言皆有據請先浚孟瀆河其白塔河有四閘可於其中大橋閘築壩俟運河水泛則啓閘行舟水落則仍閉塞徳勝河亦宜修浚惟北新河計當役一十五萬五千人一月方完比者連年災傷不可興大役請俟浚理孟瀆河白塔河徳勝河完再議上從之明英宗實録明英宗正統九年正月庚辰福建按察司謝荘奏請浚鎮江府丹徒縣甘露壩至常州府城東河道從之閏七月辛已工部右侍郎王佑言臣奉勅與太監阮安往視水決河岸自蒲溝兒至漷縣二十餘處其耍兒渡尤甚乞發丁夫物料修築為便從之庚子工部言河南山水泛溢灌衞河没衞輝開封懐慶彰徳民舍壊宣武衞懐慶守禦所城上命所在隨宜修理民失所者撫恤之八月壬子革臨清壩官初平江伯陳瑄奏設臨清閘壩遂廢至是乃革其官八月辛未直𨽻固安縣奏請築水屯厰等隄從之十月丙午修徳州耿家灣等處隄十二月戊申疏常州鎮江運河明英宗實録明英宗正統十年五月丙子漕運參将都指揮僉事湯節言滕縣七里河近者淤塞水不至運河致糧船不能進乞濬自沛縣魏家潭直抵雞鳴臺流出運河仍置閘以時開閉其沙河泥溝泉河濟寧州盧家溝等泉源鄒縣淵源舊泉河口亦宜疏通各置小閘蓄水事下工部尚書王卺言宜令所司按實起夫疏濬從之九月丙申河南按察司副使榮華言運河沽頭上閘至金溝閘幾十里淤淺糧船停滯雖減糧挑淺然終非長久計宜於淺處置金溝上閘如遇沽頭上閘糧船膠淺即啓二閘兩水交下積水必深可無停滯又吕梁上洪之西舊有石閘二因水勢陡險無船經行徒為虚設宜拆之以為金溝上閘庶不勞他費事下工部尚書王卺等請移文漕運總兵官都督武興勘視宜否從之十二月辛酉湖廣廣濟縣奏本縣及附近黄梅縣每嵗輸運秋糧於望牛墩常不下三萬餘石皆雇小車盤運一車止載四石而雇直二斗及天隂雨雇直倍之民實不堪臣見本縣連城湖港廖家口舊有溝直抵望牛墩第沙塞水淺不能行船請同黄梅縣各率夫役疏濬用船載運實為民便從之明英宗實録明英宗正統十一年三月癸已巡按直𨽻監察御史奏淮安府滿浦淮安南鎖三壩舊以無閘而設後立移風等五閘其三壩皆廢不用揚州邵伯閘壩舊以築隄恐泄水利而設今隄已完其閘壩亦皆不用白塔河大橋潘家荘新開江口等閘舊以地勢斗峻泄水而設今築塞年久其所設官吏人夫皆冗濫乞減省之事下工部覆奏滿浦淮安南鎖每壩留官吏各一員人夫去其半邵伯閘壩官吏革去止留夫四十名𨽻邵伯驛大橋潘家荘二閘官吏革去其夫𨽻新開江口二閘從之明英宗實録明英宗正統十三年二月乙已徐州吕梁二洪皆分黄河水以通舟楫其泰皇寺巴河原係分水之處年久淤塞水脈微細先此都督同知武興奏請疏濬以冬寒土堅而止至是復請上命所司發軍夫濬之丙寅湖廣五開衞奏本衞地臨苗境山路險側軍餉難於轉輸去衞三十餘里有水下通靖州江其中亂石沙灘二十餘處計役五百人疏濬一月有餘可以成功於轉輸甚便從之三月戊子監察御史林廷舉言漳河自山西沁州發源七十餘溝會而為一至肥鄉縣等處隄岸逼隘水勢湍激以故為民患元時分支流入衞河以殺其勢永樂間漂塞舊跡尚存去廣平大留村十八里宜發丁夫鑿通仍於漳河置閘遏水轉入之其肥鄉等處亦宜疏廣之如此非惟漳河水減可免居民之患而衞河日増亦足為漕舟之便從之是年秋河決滎陽東過開封城之西南經曺濮以入運河決張秋地至兖州府沙灣之東隄大河口而決濟汶諸水皆從之又經䝉城縣至懐逺界入於淮海會通河遂淤治水之閘疏水之渠渠起張秋金隄之首東南行凡數百里經澶淵以接河沁名渠曰廣濟閘曰通源凡河流之旁出而不順者則堰之堰有九長衺皆萬丈九堰既設其水遂不東衝沙灣乃更北出以濟漕渠之涸由是遂濬漕渠由沙灣而北至於臨清凡二百四十里南至於濟寧凡二百一十里復作淤水之閘於東昌之龍灣凡八役夫五萬八千有竒材九萬六千有竒竹以竿計倍之鐵十三萬斤有竒鋌三千絙百八釜三千八百有竒麻百萬檾倍之藳桔又倍之石若土則不可以數計糧五萬石續文獻通考是年秋七月河決滎陽經曺濮衝張秋潰沙灣東隄奪濟汶入海尋東過開封城西南經陳留自亳入渦口又經䝉城至淮逺界入淮命工部尚書石璞治之弗就尋復以侍郎王永和代璞舊黄河在開封城北四十里洪武二十四年河決原武東經開封又南經潁上東至夀州正陽鎮全入於淮而元㑹通河遂淤永樂九年尚書宋禮濬㑹通河開新河自汶上縣袁家口左徙二十里至夀張之沙灣接舊河九閱月而績成侍郎金純從汴城金龍口下達塌塢口經二洪南入淮漕事定為罷海運至是又決滎陽過開封城西南而城北之新河又淤自是汴城在河北矣隋唐以前河與淮分自入海宋中葉以後河合于淮以趨海然前代河決不過壊民田廬至明則妨漕矣故視古尤急紀事本末明英宗正統十四年春正月辛夘修山東金口堰三月癸已工部右侍郎王永和奏黒洋山西灣已通其水由泰黄寺資運河東昌之水復置分水閘設三空放水自大清河入海其八栁樹猶未宜用工沙灣隄宜常啓分水閘二空以泄上流之水則不為後患上皆從之仍戒永和等速修完以休軍夫毋久憊人誤其生業四月辛未修直𨽻髙郵州甎河塘九月庚辰巡按直𨽻監察御史錢清等言臨清四閘為黄河水決上下船皆失利其南舊有撞圈灣河可濬之令船自此達衞河為便工部請下委官主事黄瓚等議行從之明英宗實録明景帝景泰元年四月癸已監察御史陳全言初黄河水決山東沙灣隄已修其大半止留西岸二缺口泄水近者東阿縣以西大洪口鯉連河水落河身漸露與缺口相去甚近恐将㑹通河水落掣入東去不便漕運乞築其二缺口為便從之五月癸酉久雨決通濟河東西岸命有司修築之七月丁已直𨽻江都儀真二縣以水災聞命所司修其圩壩之被決恤其人民之被災者十二月丁酉工部奏通州抵徐州運河一帶皆淤塞不通不預疏濬恐妨漕運徐州等處請勅僉都御史王竑通州等處宜遣在京大臣一員提督疏濬詔不必遣大臣其令都察院擇御史㢘能者一人往理之明英宗實録是年設淮安漕運都御史兼理通州至儀真河道明會典明景帝景泰二年正月甲子濬直𨽻鎮江常州運河二月壬午敇山東左參政王驄按察司僉事王琬督工浚沙灣運河以河決水淺故也丙戌巡按直𨽻監察御史陳全奏運河沙灣常以衝決修置土壩故今損壊不能蓄水致妨漕運請以拆毁舊船改造板閘二座從之六月戊辰朔勅巡撫山東河南左副都御史洪英右副都御史王暹曰近者黄河衝決水失故道自臨清抵徐州以南漕運艱難爾等即各督兩處三司官從長計議相度地形水勢畫圖計工量起軍民夫河南疏滌故道淤塞或取捷徑分引水勢灌注徐州以南山東因其水勢緩處修築岸口使分灌南北濟寧臨清閘河應用物料俱聴爾等從宜措辦務令水歸漕河軍民儹運商旅往来無阻爾等欽哉毋負朕命七月庚申初以河決沙灣水皆東注徐吕二洪淺澀勅右副都御史王暹處置至是暹上言黄河自崑崙發源流入中國其所經歴之處自陜州以西有山峽不能為害陜州以東則地勢平緩水易泛溢故為害甚多國朝自洪武二十四年河改流從汴梁北相離四五里許東南轉至鳳陽入淮者為大黄河其支流分出徐州以南者為小黄河以通漕運自正統十三年以来河復故道從黒洋山復徑趨沙灣入海止存小黄河從徐州出岸髙水低隨濬隨塞故徐州之南不得飽水臣等遵聖諭自黒洋山東南直至徐州督同河南三司疏濬其臨清以南可令副都御史洪英督同山東三司疏浚從之八月壬辰給事中張文質劾巡撫都御史王暹洪英治水無績且言濟寧以西耐牢坡閘南直抵魚臺縣南陽閘有塌場河可引水濟徐吕二洪沙灣之決可於潘家渡以北濬支流以減水勢其沙灣浮橋以西開築河口閘座引水以灌臨清宜别命官以責其成詔不允仍令暹英調度慎無偏執誤事十月已丑浙江台州衞百戸王武奏徐州洪先因巖石嶇嶮舟船失利平江伯陳瑄於洪東設二閘行船後以閘逼水急仍於舊洪行船近者黄河水小洪閘淺涸臣見舊閘北有土岸長二百餘步可鑿成河道將閘移置此處則水勢平緩舟楫可行事下工部覆奏令總督漕運右僉都御史王洪相度處置從之明英宗實録王暹巡撫河南奉勅修築沙灣奏修河用工次第宜自黒洋山抵蕭縣每十里置舖專人提督修治姚夔撰王公墓表明景帝景泰三年正月已夘監察御史練綱言江南漕船俱從江隂夏港并孟瀆河出大江遡流三百里抵𤓰洲往往風水失利今江南岸有南新河在常州府城西江北岸有北新河在泰興縣正相對江北又有白塔河在江都縣與江南孟瀆河參差相對若由此二處横渡江面甚近但北新河白塔河淤塞俱用疏濬北新河須二十萬夫白塔河須七萬夫可就宣徳間曽於白塔河置閘潮漲入閘則沙土積塞潮落啓閘則運河水洩今可易閘以壩章下工部覆奏綱言是當以蘇松常鎮揚淮六府共事帝以未經按視令移文尚書石璞措置丙辰山東右參議劉整僉事王琬以沙灣河決率丁壮塞之日久無功人多逃逸為右僉都御史王竑所劾詔宥其罪俾隨尚書石璞立功自劾五月丙申築沙灣隄成自河決沙灣水徑趨海運河膠淺或言沙灣以南地髙水不得南入運河或云引耐牢坡水可灌運河但不免經沙灣宜别開河以避其衝決之勢或云引耐牢坡水南去則自此以北枯澀矣或言沙灣水勢湍急石鐵沈下若羽非人力可為宜以戒行僧道設齋醮符呪其說荒唐可發一笑命工部尚書兼大理寺卿石璞往治之封河神為朝宗順正恵通靈顯廣濟河伯之神璞至以決口未易築濬自黒洋山至徐州以通漕舟而沙灣之決如故乃命内官黎賢阮落御史彭誼往協璞等於沙灣築石隄以禦決河開月河二引水以益運河且殺其決勢至是水流漸微細克築塞之六月大雨浹旬河復決沙灣北馬頭七十餘丈掣運河之水以東旁近田地悉皆淹没七月戊戌河南按察司僉事劉清奏沁河至武陟入黄河正統四年沁河決馬曲灣入衞河因此沁河黄河衞河三水相通舟楫往来将及半年今決口已塞衞河膠淺運船皆由黄河常遭沈溺請勅廷臣相沁河原決之處濬其水以資衞河使軍民運船或由黄河或衞河視其逺近之便而為轉輸長久之計事下工部請移文巡撫右都御史王暹率三司官議其利否而為行止從之八月甲子直𨽻清河縣儒學訓導唐學成言臨清河涸自沙灣決而然其所以決者以地下隄薄黄河徑趨甚急勢莫能禦故今年四月修完而五月即決也沙灣決而臨清寧有不涸者乎臨清至沙灣有閘十二有水之日其勢甚陡請俟今秋漕運畢日洩乾閘河於臨清濬月河以通船不必由閘其臨清以南俱從月河疏濬不動原閘直抵沙灣其隄岸低薄者培厚之河道狹窄者濬廣之如此則水勢自緩衝決無由而漕運通矣章下工部請令學成往同巡撫山東右都御史洪英及巡河御史有司等官相度宜否從之乙丑山東兖州府奏雨水泛漲禾稼渰没人民缺食糧草無徴御史羅澄亦奏徐州抵濟寧一帶平地水髙一丈民居盡皆坍塌老穉妻孥流離道路事下戸部請差官赴山東會同巡撫官右都御史洪英於各府縣設法賑䘏從之浙江參政胡清言直𨽻鎮江府有河通常州府河有新港奔牛等壩止能容小船往来而輸運糧草大船俱涉歴大江風濤不測常致損溺請勅有司開疏其河革去其壩惟置石閘以蓄水則船通而害除矣事下工部移文覈實咸以為便從之丁丑先是總兵官都督僉事徐恭奏沙灣北馬頭復決乞勅有司修築詔巡撫山東右都御史洪英督三司官理之至是英言水勢洶湧未易用工請俟冬月水消量添夫料修築奏下工部請如英言從之九月癸夘山東右參議劉整奏臣同僉事王琬專理河道北抵河間之吳橋南至徐州之沛縣道路一千餘里閘壩四十餘座臣等不能周歴凡有急務必移文各州縣官奈各官不即躬視修理止令隂陽醫生等董率夫役致常逃竄誤事乞勅吏部於臨河府州縣各添設官一員專理河道仍賜臣等勅提督修理庶事有統屬不致乖誤從之戊申勅山東布政司右參議劉整按察司僉事王琬修築沙灣隄岸以已完之隄又復衝決也壬子初訓導陳冕以治沙灣河陞教授至是沙灣復決冕奏欲息斯患在用臣言事下工部惡冕妄詐請遣人送往山東巡撫都御史等官處責其成功否則械送京師懲治詔從之給事中陳嘉猷言朝廷嘗降榜求治河之畧然而未有言者也冕嘗有修治之績矣今以為言而工部嫉之必欲置諸有罪之地臣惟河決莫大之患若仗一人之力而能成功則原遣諸臣已成之於曩昔而無復告患於今日矣况區區一冕而使之受制於巡撫等官望其有效不亦難哉且冕所言皆為朝廷也若以言而見罪臣恐聖諭雖切人皆緘口不言其河道通行方畧終不得以上聞而其他利病有甚於此者孰肯復言哉一冕不足惜而所闗國體甚重伏望令冕協同巡撫等官設法築修為巡撫者毋賤其卑而自尊為冕者亦毋是其言而自肆在和同計議以求成功果有優績量加賞擢若然臣将見天下之人有長策者俱為陛下言也又何憂乎河道之功之不成哉從之十二月癸已以沙灣河決久未成功而運河膠淺有妨漕運復勅内官黎賢武艮工部左侍郎趙榮往理之丙辰遣工部左侍郎趙榮祭河伯之神以疏濬東昌沙灣故也明英宗實録是年春二月河決沙隄灣命左都御史王文巡視河道明紀事本未趙榮字孟仁景泰中遷工部侍郎張秋河決命榮董治之卒復故道天順初升本部尚書獻徴録明景帝景泰四年正月壬午河復決沙灣新塞口之南二月乙未以沙灣累修累決詔加封河神為朝宗順正恵通靈顯廣濟大河之神戊戌工部左侍郎趙榮言黄河之趨運河勢甚峻急而沙灣抵張秋舊岸低薄故此方築完彼復決溢不為長計恐其患終不息也臣等議請於新決之處用石置減水壩以殺其勢使東入鹽河則運河之水可蓄以通運舟矣然後加髙厚其隄岸填實其缺口庶無後患從之仍命京厰給鐵牛十八鐵牌十二與之四月戊子朔復築沙灣決口畢工監察御史彭誼言河隄僅完人力實罷今民夫雖已疎放寧家而原設看橋撈淺者猶供役且貧難無食乞每人月給糧三斗從之五月癸酉山東布政司右參議陳雲鵬奏運河之水偶爾泛漲三月四日敗沙灣減水壩越七日又敗南分水墩自是抵五月水益浩瀚墩岸橋梁皆被衝壊而北馬頭決五丈有竒漕舟今雖暫通臣恐此後水勢益大一帶隄岸皆未能必其無虞宜預積工料為修築計竹朩之𩔖已於浙江等處順帶其石料柴草動億萬計雖有山東諸司罪人折納恐不足用臣謂在京造作已息請以山東河南南直𨽻等處該班石鐵等匠量發前来於附近山場採運准其班次其河南囚犯亦如山東之例運石於沙灣贖罪事下工部言河南北直𨽻旱潦人民艱食聴其於山東起取匠二萬人採運物料務在修築堅完漕運不阻從之乙酉沙灣大雷雨決北馬頭河岸四十餘丈運河水掣入鹽河漕運之舟悉阻不行七月乙丑命太子太保兼工部尚書石璞往治沙灣決河時有㫖命工部司務吳福往治已就道給事中國盛等言沙灣之決累勅大臣尚不能為經久計吳福庸下豈能濟事况決口甚大費用工料甚繁亦不宜獨仗山東其河南并南北直𨽻人匠淮安臨清及龍江瓦屑壩諸抽分朩料亦宜許其取用詔是之乃徴福還而以璞往監察御史練綱言沙灣之決昨見教諭彭塤請立閘以節制水勢開河以分析上派其言頗似近理又往来舟人淹留日久必皆愁困躁急但得設法前進雖或稍傷其財力無不樂趨事功者可因而借用之詔是其言令與尚書石璞措置丁夘河南右參議豐慶言江南漕船阻於張秋之決計無所出臣請自淮安清河口入黄河至開封府滎澤縣河口轉至衞輝府胙城縣泊於沙門陸輓三十里至衞河船運至京往時議者以河道初改恐阻礙不行今河道已通數年往来船不絶豈糧船獨不可行章上命總督漕運都督僉事徐恭等覆實回報壬午漕運總兵官都督僉事徐恭奏沙灣河決水皆東注以致運河無水舟不得進者過半雖設法令漕運軍民挑濬月河築隄遏水北流然北髙東下時遇東南風則水暫北上舟可通行設遇西北風則水仍東注舟不得動况秋氣已深西北之風常多經旬累月舟行不過數里誠恐天寒水凍不敢必其得達京師乞早為定計事下戸部議宜勅恭與石璞王竑計補如舟可前進則令運赴通州上納如不得進則令沙灣以北者於臨清上納以南者於東昌及濟寧上納漕輓軍民令回本處運次年糧儲從之明英宗實録行水金鑑巻一百八
