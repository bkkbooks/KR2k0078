body:
  text: 行水金鑑卷一百十江南按察使傅澤洪撰運河水明英宗天順五年二月丙戌漕運總兵官右都督徐恭奏運河諸閘多狹隘臨清一閘尤甚而近造糧船髙大閘殆不能容請敇山東軍衛有司積工措料修移舊閘五十丈濬深三尺六寸增廣三尺庶不阻漕運上曰臨清南北要衝之地其閘乃淺狹如此即令有司修築之乙未陜西按察司僉事李觀言涇水出涇陽仲山谷道髙陵至櫟陽入渭袤二百里晉漢穿渠溉田萬頃宋元俱設官主之今雖有瓠口鄭白二渠督其事者不職隄堰摧決溝洫壅瀦民弗䝉其利官稅因之拖缺乞敇布按二司堂上官督同被利州縣人夫依時疏鑿上命有司浚之七月乙丑修河西務耍兒渡口明英宗實録明英宗天順六年三月丁已命疏浚淮安以南運河明英宗實録明英宗天順八年正月已未命修髙郵湖岸三十餘里以年久風浪撞激其磚石樁朩皆脫落故也明英宗實録明天順八年七月壬申時憲宗巳登極矣都察院都事金景輝言㑹通河自安山北至臨清二百五十餘里僅有汶水若春月少雨則水脈漸微而舟行淺滯其汴梁城北陳橋舊有古河一道北由長垣經曺州至巨野縣安興墓巡檢司地界乃出㑹通河合汶水通臨清每秋水溢有舟往來其間唯陳橋迤西一舍許水道淺狹水小之際不能流通請興工開浚亦可分引沁水仍置二閘以司啓閉則徐州臨清二河均得利濟而衛河之水亦皆增長且長垣曺鄆諸處糧稅可免飛挽之勞而江淮民舟又可由徐之浮橋達於陳橋至臨清而無濟寧一路壅塞之苦其利多矣事下工部請按實以聞十二月壬午工部主事郭升請修臨清新開上閘從之乙未直𨽻邳州知州孟琳奏本州榆行諸社俱臨沂河以久雨河岸為水所崩者二十有八處諸社卑田淹沒殆盡乞量興工役修築工部覆奏從之明憲宗實録明憲宗成化元年三月戊申朔浚通濟河耍兒渡口命工部主事蔣瑄都督同知陳達董其役五月庚午總督漕運副都御史陳恭請修築髙郵湖岸自杭家嘴北起至張家溝鎮南止凡三十里有竒從之明憲宗實録明憲宗成化二年四月辛酉浚薊州等處新開沽河十二月甲子命御史一員提督通州迤南抵臨清及衛輝一帶河道先是命巡鹽御史兼巡河道至是總督漕運右副都御史滕昭言河道淺澀非專任不能疏通工部請如所言從之九月丙子户部會官議南京管糧都御史及漕運總兵等官所言事宜一兖州府城東舊有金口壩蓄水接濟運河每遇山水泛漲輒衝決費工修築宜將濟兖二府原設泉夫秋冬空間之時采石塊包砌前壩一通州直抵儀真瓜洲一帶河岸壩堰閘座近年多有坍塌損壞蓋沿河軍衛有司官不遵舊例以時修築遂致河道淤淺阻滯船行乞各委堂上佐二官專一修理以便漕運議上俱從之明憲宗實録明憲宗成化三年七月戊辰總督漕運右副都御史滕昭言儀真瓜洲孟瀆諸處河港乃貢賦必由之道舊因淺滯命旁近揚州鎮江常州諸府衛興工疏浚是後著令三年一浚然有司怠玩浚不以時直至窮冬召衆興役則手足皸瘃雖浚無實徒為勞耳請自後每於冬初即為興工從之九月壬申戶部會六部等衙門官議漕運總兵及各處巡撫等官所言事宜條奏一徐吕二洪全藉河南脾沙岡等處水灌注接濟運船先年設主事一員後又添設河南參議一員專理近乃罷去兼管於河南布政司分巡官以致二源淤塞水利不興請如舊增置參議為便一濟寧州小長溝至開河驛隄上接汶泗等河下通黑馬等溝導引泉水以濟糧運元時州之西蓄孫村南望二湖之水設減水閘十餘座水大量為減泄小則流入官河甚利今久失修葺日就坍塌且每嵗山水先壞隄岸春時無水接洽夏則漫流淹沒田禾舟楫難行請如前修築一儀真至通州俱係運道而淮揚一帶水路各有專官管理唯自直河至通州俱係運道事多廢墜請令張家灣收甎主事督同所在軍衛有司委官提調各淺夫老以時採取樁草每春糧運之時遇有水淺漫流如法築置壩堰逼水歸洪庶糧運無滯流之患上皆准議行之明憲宗實録明憲宗成化四年六月癸卯工部管洪主事郭升奏徐州洪勢最險自昔兩隄庳隘稍遇水漲舟行無路往來甚艱而閘河上口一壩勢亦如之雖頻年修築亦唯取辦一時殊非經久之策又如外洪翻船等石裏洪壩下一灣尤為險惡屢壞行舟今欲以大石修砌兩隄其外則錮以鐵錠其內則填以雜石而又鑿去外洪翻船惡石用石鋪平裏洪隄岸以便來往須勸率往來中外官員及逺近客商以給其費量倩所屬各淺夫及本洪溜夫以供其役工部以聞詔可明憲宗實録中洪形象川字有三道曰洪外洪裏洪在徐州明憲宗成化五年三月丁未工部奏自通州抵天津衛河道淤塞漕運不通宜加疏浚其自天津迤南直抵揚州一帶河道亦有淤淺宜敇總督等官通行疏通以便漕運從之明憲宗實録明憲宗成化六年七月庚子監察御史康驥奏請疏濬張家灣橫河口小灣套以泊運船修墊自京城抵通州往來要路以便糧運上命俟年豐為之壬寅工部奏通州至武清縣蔡家口河口并隄岸被水衝開一十九處宜起倩兵民并工修築以便漕運上從之命侍郎李顒董其役癸卯巡按直𨽻御史張誥奏請修築靜海以南臨清以北一帶河口之被水衝塌者以便漕運從之九月已丑鎮守密雲署都指揮僉事王榮奏山水泛溢衝塌古北口潮河白河龍王峪沿邊一帶關城墩寨隄壩及密雲中衛南北城垣請撥軍修繕從之十月已酉戶部會官議巡撫漕運等官所陳事宜一運糧船隻凡遇淤淺之處宜行漕運衙門令各該把總都指揮指揮等官督各管糧船旗軍及當地淺夫併力挑撈淤沙疏通河洪使前船既過後船接續而行違者究問明憲宗實録明憲宗成化七年正月甲申總督漕運兼巡撫淮揚等處右副都御史陳濓奏運河一帶濟寧居中而南北分流久不疏浚蓄水不多况兩京往來內外官多不恤國計不俟各閘積水滿板輒欲開放以便已私而南京進貢內臣尤甚以此走泄水利阻滯糧運今欲會同山東巡撫守臣計工挑浚且請㫖禁約事下工部覆奏從之十月乙亥改南京刑部左侍郎王恕為刑部左侍郎奉敇總理河道升工部員外郎郭升為郎中山東按察司僉事陳善為副使與工部郎中陸鏞分理之時太監韋煥等奏運河淤淺請量增升等職專理河道事下戶部會同吏部尚書姚夔等擬議覆奏以為太宗皇帝肇建北京以元人海運非便命平江伯陳瑄經略糧運河道是以六七十年間漕運通利京儲山峙其良法美意度越前代近年以來河道舊規日以廢弛灘沙壅塞不加挑洗泉源漫伏不加摉滌湖泊占為田園鋪舍廢為荒落人夫虛設樹井皆枯運船遇淺動經旬日轉雇盤剝財殫力耗及至通州雨水淫潦僦車費多出息稱貸勞苦萬狀皆以河道阻礙所致因循既久日壞一日殊非經國利便煥所言誠為急務然自通州至儀真瓜洲二三千里往來修治非一二人能辦况首尾不接嵗月不常時無統制功難責成今宜進升郎中專理沛縣至儀真瓜洲一帶善副使專理山東地方見管通州河道郎中陸鏞專理通州至德州一帶仍簡命風力大臣一員賜敇總理其事凡河道事宜根究本末以次修復其舊務為久便禁侵占阻滯者仍須審度人情事勢隨其緩急輕重以為先後他有便宜方略可奉行者聽斟酌之限以三年砥於成效不得虛應故事致誤國計上從其議賜恕敇曰朕惟京師糧儲仰給東南漕運自平江伯陳瑄經理河道之後管河者多不得人舊規日以廢弛糧船阻淺轉輸延遲若非委任責成豈不有誤國計今分官管理一帶河道特命爾總理其事爾宜往來巡視嚴督各官并一帶軍衛有司人等用心整理閘壩損壞者修之河道淤塞者浚之河泊務謹隄防泉源毋令淺澀沿河淺鋪樹井及一應河道事宜但係平江伯舊規者一一修復不許諸人侵占阻滯凡有便宜方略可舉行者悉聽爾斟酌施行一應官員人等敢有違誤者或量情懲治或具奏拿問爾仍須審度人情事勢隨其緩急輕重以為後先毋急以擾人毋怠以廢事限以三年務砥成績如或因循不理致誤國計責有攸歸爾其勉之慎之丙戌戶部尚書楊鼎工部侍郎喬毅上浚通惠河舊道事宜先是漕運總兵官都督楊茂奏每嵗漕運自張家灣舍舟陸運遇雨泥濘每車雇銀一兩僅載八九石其費皆出於軍看得通州至京城四十餘里古有通惠河故道石閘猶存永樂間曽於此河船運大朩以此度之船亦可行先年曽奏欲於此河積水般運又有議欲於三里河從張家灣煙墩橋以西疏挑二十里灣泊糧船以避水患者二事俱未施行今此河道通流其水約深二尺不勞疏挑唯用閘蓄水令運糧衛所每船二十五隻造一剝船自備米袋挨次剝運如此則運士得省腳費而困憊少蘇矣事下工部尚書王復同太傅會昌侯孫繼宗吏部尚書姚夔等官議得古通惠河道閘座設若開通修砌可以泊船可以運糧誠有益於國計但地形水勢髙下并合用軍夫物料俱難約度宜請㫖簡命戶工二部堂上官各一員會漕運參將袁佑率識達水利官匠前往相度如果相應就將該用軍夫物料修理事宜具奏會議定奪上以命鼎毅遂同參將袁佑等親詣昌平縣元人引水去處及宛平大興通州地方三里河各河道將行船故迹逐一踏勘及據元史并各閘見樹碑文所載事迹稽考回奏云閘河原有舊閘二十四座以通水道但元時水在宫牆外船得進入城內海子灣泊今水從皇城中金水河流出難循故道行船須用從宜改圖除元人舊引昌平東南山白浮泉水往西逆流經過祖宗山陵恐於地理不宜及一畝泉水經過白羊口山溝兩水衝截俱難導引外及勘得城南三里河至張家灣運河口袤延六十餘里舊無河源正統間因修城濠作壩蓄水兼恐雨多水溢故於正陽橋東南低窪處開通濠口以泄其水始有三里河名自濠口三里至八里始接渾河舊渠兩岸多人家廬舍墳墓流向十里迤南全接舊河入張家灣白河其水深處止有二三尺淺處一尺餘闊處僅丈餘窄處未及一丈今若用此河行船凡河身窄狹淤淺處必用浚深開闊凡遇人家房垣墳所必須拆毁那移且以今寬處一丈許之水深二尺若散於五尺之寬止深四寸况春夏天旱泉脈易乾流水更少糧船剝船俱難行使兼且沿河隄岸髙者必須剷削低者缺者必須增築填塞又有走沙急湍處俱要創閘派夫修挑倘水淺少又須增引别處水來相濟若引西河之水則自河口迤西直至西湖隄岸未免添置閘座若引草橋之水必須於大祀壇邊一路創鑿溝渠亦恐有礙况其源又止出彰義門外玉匠局等處馬跑等地泉亦不深逺大抵此河天旱則淤壅淺澀雨潦則散漫衝突徒勞人力率難成功決不可開况元人開此河曽用金口之水其勢洶湧衝沒民舍船不能行卒為廢河此乃不可行之明驗也今會勘得玉泉龍泉及月兒栁沙等泉諸水其源皆出於西北一帶山麓堪以導引滙於西湖見今大半流出清河若從西湖源頭將分水青龍閘閉住引至玉泉諸水從髙梁河量其分數一半仍從皇城金水河流出其餘從都城外濠流轉通會流於正陽門東城濠再將泄入三里河水閘住併流入大通橋閘河隨時開閉天旱水小則閉閘瀦水短運剝船雨潦水大則開閘泄水放行大舟况河道閘座見存不用增造官吏閘夫見有不須添設臣等勘時曽將慶豐平津通流等閘下板七葉剝船已驗可行若板下至官定水則其大船亦可通行止是閘座河渠間有決壞淤淺處要逐加修浚較之欲創三里河工程甚省况前元開創此河漕運七八十年公私便宜後來廢弛今若復興則舟楫得以環城灣泊糧儲得以近倉上納在內食糧官軍得以就近關給通州該上糧儲又得運來都城與夫天下百官之朝覲四方外夷之貢獻其行李方物皆得直抵都城下卸此事舉行定實天意暢快人心歡恱足以壯觀我聖朝京師萬萬年太平之氣象也伏望聖明早賜裁處乞敇各該衙門會計物料量撥官匠并在營見操官軍人等自西山玉泉一帶并都城周圍濠塹大通橋直抵通州張家灣一路河道分工逐一修浚如此則不惟損一時糧運之腳價實足以垂萬世無窮之利益矣疏入命下所司十一月癸丑霸州知州蔣愷固安縣知縣賈貴各奏霸州城北古有草橋界河一道上接渾河下至小直沽順流東注於海永樂間渾河改往西南流道經固安新城雄縣沿至霸州新河一帶水勢不順漸已淤塞纍衝決為居民患近者衝決孫家口東流入河又東抵三角淀小直沽入海乃其故道請因其自然就下之勢修築隄岸使順流注海免貽後患上命順天府官勘實從之明憲宗實録王恕遷刑部右侍郎父憂服除以原官總督河道浚髙郵邵伯諸河修雷公上下勾城陳公四塘水閘旋改南京戶部左侍郎明史稿明憲宗成化八年正月已未工部奏漕運總兵官楊茂先乞敇通州至大通橋舊河石閘以免官軍車運之費有㫖命戶部尚書楊鼎等勘報鼎等報云自西山玉泉并京城濠塹抵張家灣一路河道俱宜修浚已准撥官軍九萬餘名修理矣會有災異停各項工役而修河一事宜取㫖上命依原擬量撥官軍四萬令總兵官趙輔郭登統領先浚京城濠塹仍以太監王順工部尚書王復兼董其役其通州一路俟工完以聞二月戊辰朔鎮守永平山海總兵官東寧伯焦夀言薊州新開沽河淤塞一千二百丈糧運不通而欲照先年奏准三年一浚事例於順天永平二府及東勝等衛起撥軍民興工緣今灾傷人民缺食且農事將興欲行巡按御史親詣其城勘視酌量暫濟漕運候明年三月以後并工疏浚庶於民力少蘇邉運亦濟從之八月癸已修築淮安抵儀真瓜洲湖河隄岸衝決者一十五處明憲宗實録是年河道侍郎王恕請治揚州至淮安湖塘造閘䃮引塘水接濟運河南河全考明憲宗成化九年正月辛亥巡按直𨽻御史婁謙言漕河自通州直抵臨清多淤淺請於通州一帶各設管河官一員及委軍衛官相兼管理疏通并令捕盜事下河道侍郎王恕議以為當工部遂請移文吏部於順天河間淮揚四府各添設管河通判一員通州等州各設判官一員各該衛所俱推選廉幹官相兼管理仍行總理管河等官往來提督奏上上曰河道只仍舊委官管理不必添設已未總督漕運平江伯陳鋭奏儀真瓜洲運河原無水源全賴揚州雷公陳公二塘及髙郵寶應邵伯等湖積水接濟清河迤北至徐吕二洪則藉河南黃河鳳池口金龍口沁河等處諸水濟寧南北閘河則賴徂徠沂泗泰山曲阜等處諸泉源并昭陽南旺孫村等湖水近所司視為泛常不為疏浚修築是致水利不通糧運有阻揆厥所由蓋因通州至儀真相離二三千里往來巡視非一二人力所能辦宜酌量逺近自通州至德州責令郎中陸鏞專理自德州至濟寧則責之副使陳善自沛縣至儀真則責之郎中郭升仍敇大臣一員總督其事庶事體歸一而工力可成工部議以為宜從之三月丙申總河侍郎王恕言淮安南抵儀真瓜洲湖河隄岸被水衝決者一十五處其餘坍塌者二百餘里及儀真三壩衝倒修理物料俱揚州出辦今連年灾傷民力不給欲於池州安慶二府支取遺甎并南京龍江瓦屑壩二竹朩局所抽分支作樁朩令南京兵部馬快船運送事下工部請行南京工部查勘定奪從之明憲宗實録李恭敏公鐩湯隂人成化壬辰進士為都水司主事管河臨清改作板閘郭朴撰工部尚書李公傳改刑部郎中從侍郎何喬新賑荒山西開麗澤渠以灌田進鴻臚少卿明史稿明憲宗成化十年八月辛亥戶部會官議覆漕運巡撫等官所言事宜一睢寧縣所管運河北自徐州南至宿遷二百餘里水多淺澀宜添設管理河道官一員其通州儀真一帶管河官止令專理河道不許别有差委一江浦縣地方北城墟舊有古溝河一道北通滁河其浦子口城東亦有黑水泉古溝一道南入大江兩溝之間中有岡隴截斷若因其舊蹟去其岡隴開成河道旱則可引江潮以資灌溉潦則可殺水勢宜行令巡視屯田御史督同應天府及浦子口橫海等五衛軍民開通務責成效疏入從之明憲宗實録明憲宗成化十一年八月辛已命浚舊通惠河敇平江伯陳鋭右副都御史李裕戶部左侍郎翁世資工部左侍郎王詔督漕卒疏浚先是鋭等奏通州至京舊有運河一道廢閘尚存但年久淤塞損壞欲照尚書楊鼎奏准事理就借漕卒用工疏浚閉閘積水以運糧儲至是特令鋭等會議提督漕卒自下流為始疏浚壅塞修閘造船合用糧料匠作於各司取用務求成功仍委附近公差御史察其不聽約束者以聞九月已酉巡撫山東左僉都御史牟俸奏山東舊有小清河上接濟南趵突等泉下通樂安沿海髙家港等鹽場大清河上接東平坎河等泉下通濱州海豐利津富國等鹽場後因淤塞衝決舟楫不通民苦般剝兼雨水淹沒其患尤甚近勸農參政唐澞為之修浚造閘水利始通繼今非得人提督恐久而或廢乞令澞兼治水利後繼任者亦如之詔可十月癸未增設工部管理河道官一員漕運總兵官平江伯陳鋭等奏比奉詔疏浚通州至京河道工將就緒請設官理之并提督青龍等橋廣源等閘及西山一帶泉源時工部郎中陸鏞丁憂服闋因以命之十二月辛卯置儀真縣河港三閘先是工部郎中郭升奏江南進貢糧運等船至儀真壩雖夏月潮盛亦須人力絞挽方能達河少有錯失船即損壞而裏河壩岸恐為潮水衝決多開缺口以殺其勢水退復修為費甚大儀真縣羅泗橋舊有通江河港上至裏河幾四里許潮大之時內外水勢相等此港可置三閘潮來先啓臨江閘使船隨潮而進俟潮既平乃啓中二閘放之如此不惟往來舟船利便而裏河水勢亦即疏泄不待決口重費也詔可之升會督漕都御史李裕勘議修完而儀真店戶惡其奪已利賄囑所司假以走泄水利閉之至是升復條陳開閘之利不開之患工部覆奏以升言誠有益經久之策宜允所請從之明憲宗實録明憲宗成化十二年二月已丑工部言永平府暨通州等衛各奏原派疏浚通惠河并直沽新開沽人夫地方多有逺近欲得彼此相易為便會保定等縣亦言各縣河岸衝決數多有妨耕種乞存留原派協濟通惠河人夫以便修築而本部委官徐九思等亦各言盧溝橋及直沽天津迤北南營耍兒渡口一帶河道衝決淤塞有妨漕運比之通惠河尤急宜如所奏准其存留移易其直沽蘆溝一帶河岸道路亦宜酌量緩急暫撥通惠河人夫用工唯耍兒等渡則照原定人夫不必更動為便從之五月壬戌漕運總兵官平江伯陳鋭等奏邇者修造通惠河閘成欲將山東泉源河道并通州等處水關閘座與永通橋圈俱量為疏浚修改以便漕運上從其議下所司知之六月丁亥浚通惠河成自都城東大通橋至張家灣渾河口六十里興卒七千人費城磚二十萬石灰一百五十萬斤閘板樁朩四萬餘􅐨鐵桐油各數萬計浚泉三增閘四凡十月而畢漕舟稍通都人聚觀增平江伯陳鋭祿米嵗二百石賞侍郎翁世資王詔綵緞表裏鋭又為浚河官乞恩乃命邳州衛指揮僉事單鏞髙郵州判官林烈等十員俱升署職一級其餘職役匠卒皆賜綵緞絹布有差是河之源在元時引昌平縣之三泉俱不深廣今三泉俱有故難引獨引西湖一泉又僅分其半而河制窄狹漕舟首尾相銜至者僅數十艘而已無停泊之處又沙水易淤雨則漲淤旱則淺沍不踰二載而淺澀如舊舟不復通然鋭之所增祿米猶嵗給不絶識者愧之丙申升山東兖州府通判陳翼為順天府通判專理通州以上河道并西山一帶泉源漕運總兵官平江伯陳鋭等言翼長於治水嘗疏濟寧州永通河改修耐牢坡等閘具有成績故有是命七月丙午總漕李裕等奏新開揚州白塔河潮水往來恐久而淤淺宜下所司與瓜洲儀真諸河皆三年一浚又言江南孟瀆河亦多淤淺乞下巡撫巡按等官勘驗疏浚以便漕運工部覆奏從之甲寅增設直𨽻江都縣留潮通江二閘九月丙辰漕運總兵官平江伯陳鋭奏通惠河雖已通行然其間猶有未畢工者欲再疏浚使加深闊擬摘江北運糧衛所軍約一萬名委都指揮等官督管於明年二月興工乞官給以廩給口糧食鹽從之明憲宗實録行水金鑑卷一百十
