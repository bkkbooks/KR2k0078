body:
  text: 行水金鑑巻一百十一江南按察使傅澤洪撰運河水明憲宗成化十三年七月戊子管理河道工部郎中楊恭奏六月以來久雨水溢運河東西兩岸衝決甚多有妨糧運乞撥京營官軍修築仍命文武大臣董之庶克濟事章下工部議宜移文都督同知陳逵同楊恭於通州直𨽻天津等衛附近處所量起軍餘三千名順天府沿河州縣起民夫一千名相兼隄淺人夫并工修築以便漕運并行户部每名給與行糧仍令董工官盡心提督務在堅厚以圖經久從之明憲宗實錄李裕成化中進右副都御史總督漕運兼巡撫江北諸府浚白塔孟瀆二河以便漕張秋南旺及淮安西湖舊編朩捍衝激勞費無已裕與郎中楊恭等謀易以石遂為永利明史稿明憲宗成化十四年二月丙午管河郎中楊恭奏兖州汶上縣直抵濟寧運河隄岸衝決一百一十里今欲葺理每夫一名乞月支口糧三斗從之三月辛夘太監汪直言髙郵邵伯寳應白馬四湖每遇西北風作則糧運官民等船多被隄石樁朩衝破漂没宜築重隄於隄之東積水行舟以避風浪工部議合行漕運總兵巡撫等官相度增築從之明憲宗實錄明憲宗成化十五年九月壬申詔修南京内外河道先是南京監察御史何舜賓奏南京城内外河道淤淺宜發丁夫疏浚下南京工部曁守備等官按視以為宜如所奏其工力於京民丁多而家富者量役之及浙江蘇松等府大戸運糧至京亦令量助仍令舜賓等管理聼其設法以補不給從之十月壬子陞工部郎中楊恭為通政司右通政仍管河道恭管理北河直抵濟寧一帶河道六年考滿漕運總兵等官奏保陞職仍舊任事吏部議擬通政司叅議詔曰恭旣管河勤能准陞右通政恭在河道承奉太監汪直故有不次之擢也明憲宗實錄恭於二十三年以京察聞住亦見實錄明憲宗成化十六年九月闕戸部會官議漕運及巡撫等官所陳事宜一大名府元城縣小灘官軍兌糧河道淤淺宜於元城館陶二縣増置主簿一員職專疏濬是年甃吕梁洪二石堤長七十餘丈築石壩一百六十五丈復於壩西築隄二十餘丈吕梁洪在徐州東南六十里有上下二洪相距七里亦運道要害南河全考自二洪在萬厯三十四年以前最為險要李化龍開泇河而二洪不為運路矣明憲宗成化十七年五月庚辰南京工部員外郎吳珵言近御史何舜賓建議乞疏濬南京河道以便糧運今天時亢旱人心靡寧乞暫為停止以蘇民困事下工部覆奏請如珵言候豐年再陳區處上曰河實淤淺宜在疏濬惟慎擇官董之不必止也明憲宗實錄成化十七年既塞河南決口又自揚州鑿河四十里以泄積潦蠲災賑饑伐材為屋以居流民比還民遮道留之王鏊撰兵部尚書薛公神道碑公名逺以工部侍郎治河明憲宗成化十八年二月己未工部以管河右通政楊恭巡河監察御史趙英會勘漕運總兵官陳鋭所奏欲於臨清縣南三里開通月河分減水勢誠為利便但言東平州戴村修砌減水石堰欲行山東科派夫料而歳荒不能給宜於鋭原借本部修路銀内支用或人力不足於附近無灾縣分取之庶事易集而民不勞從之秋八月久雨衛漳滹沱等河漲溢運河口岸多決自清平縣至天津衛凡八十六處大蒙等村屯凡九處明憲宗實錄明憲宗成化十九年九月丁巳戸部會官議奏漕運巡撫等官所上事宜一武陟等縣沁河其源出太行山下流接徐州運河舊各縣無管河官巡視修理遇夏秋水泛堤岸多被衝決請於武陟新鄉獲嘉原武陽武封丘祥符等縣各增設主簿一員専巡河道如議明憲宗實錄明憲宗成化二十年十月丁巳停總理河道通政司右通政楊恭俸三月以漕河淺澀運船多過期不至為戸部所叅奏也十二月戊午吏部尚書兼華蓋殿大學士萬安等言我朝建都於北上下供用多取給江南然必藉船運而後可達京師是運道水利所係甚重如河南懐慶府地方築隄障沁水以濟徐吕二洪及邳州宿遷桃源運道山東兖州等處導引汶泗洸河諸泉以濟濟寧上下運道今沁水衝決隄岸流入黄河汶泗洸諸泉歳久不浚亦多壅塞以致河身淺澀糧運稽遲及四方進貢方物等船不便往來雖工部亦嘗奏行兩地巡撫巡按管河官員督工修理但恐仍前泛視來歳運道不得水利接濟所誤非輕請敇工部重臣一員選領諳練屬員一員詣彼會撫按督有司一一踏勘衝決壅塞之處修築疏浚上是之命工部侍郎杜謙率其屬郎中蕭冕員外郎李濬往董其事因敕謙曰朕唯國家公私物用取給江南而運道水利闗係甚重近年以來河水淤淺加以天旱沁水決入黄河汶泗洸諸泉又多壅塞以致水利不通有妨漕運特命爾謙自通州臨清直抵淮揚一帶會同山東河南巡撫巡按督責三司府衛官并管河管泉官員逐一踏勘凡係蓄水接濟運河堤岸何處衝決所當修築泉源何處壅塞所當疏浚及㑹計合用工作朩料預為措辦待明年凍開相度事勢緩急工程小大起集軍民趂時修理務俾水利通行舟楫無阻斯為有益此誠國家大計凡事有相闗及敕内該載不盡者聼爾計議便宜而行文武官敢有怠慢誤事者輕則量情責罰重則文職五品以下徑自執送問刑衙門問理四品以上并方面軍職叅奏執問各巡撫巡按有不用心者亦具實來聞明憲宗實錄明憲宗成化二十一年正月庚戌詔修河夫月給米人三斗時遣工部左侍郎杜謙自通州抵淮揚督修謙以所在民饑請量給官廩戸部議如其言從之七月辛未工部左侍郎杜謙奏奉敕修浚河南山東等處運道沁衛二水已經相度緩急修浚頗有次第臣今竊究其弊縁無大臣總理雖有管河官員多為親臨上司改委顧彼失此不得專於職務乞如侍郎王恕總理河道事例増設工部侍郎一員其沁衛二河河水經涉地逺遇有旱澇人夫浚治無官管攝乞如山東泉源事例増設主事一員及臨清以北至徳州俱無管河官乞依臨清以南事例增設管河判官主簿一員本部議覆上曰侍郎不必増設餘如所議明憲宗實錄杜謙字益之昌黎人景泰甲戌進士授工部主事即涖徐吕二洪洪當運道中迅流立石齰如齒列盤渦盪潨舟稍失制則人與貨俱没公至相其地勢詢其水患稍加平治舟賴以濟歳適歉山東淮北流離飢餓之民叢集兩岸隨舟上下號呼乞食公設法勸率得米為淖糜以食之全活甚衆後佐工部時漕河淤塞糧道不繼衆議舉公往任修浚之事公自通州循河流以抵淮揚相地勢去淤塞導源泉修閘壩漕河復通竣事復命上嘉之有交綺楮幣之賜杜公墓誌成化壬辰鋭鎮淮揚挂漕運印已亥於淮河壩改石閘修造移風清江福興四閘包砌塘岸疏通泉源辛丑仍於濟寧分水龍王廟自南距北可十里各置一閘以節蓄水利總漕事十四年河道之修築轉漕之利弊政事之得失前後建百有餘章廿一年乙巳改管南京中府事陳鎬平江伯陳銳傳明憲宗成化廿三年二月庚辰工部奏直沽迤東海口新開沽河道例應三年一浚宜遣官并行巡撫都御史李田等如例起夫六千給以口糧并工疏浚從之明憲宗實錄明成化間開濟寧西湖自耐牢坡至塌塲口長九十里汶水入焉改耐牢坡閘名永通北河讀記成化間有議疏天津水運至宣大省兵餉主事楊讃相度地有游沙不可濬水勢相懸有至二百丈又多天險人力難施遂止朱國楨湧幢小品明孝宗𢎞治元年二月辛亥修儀真瓜洲二處壩下河口及淮安府福興閘八月丁巳南京守備太監蔣琮奏揚州儀真地方羅泗橋舊有通江港可開閘放船成化間巡河工部郎中郭㫒奏濬通河面置二閘潮滿則開潮退則閉船隻經過無復盤費損傷之患時有奸豪侵占牽路於沿河水次起蓋浮舖為買賣者恐斯閘一開必致折改往往以河水易洩為辭欲隳其成昇因力辨浮議條陳五利冀以行之久逺而司漕運者悮聼奸詞擅行築塞致令往來船隻仍前受害近壩居民謂為得計就於臨河牽路起蓋文天祥祠宇欲使後來不敢輕易改拆而守備指揮亦於閘上擅自蓋亭索取財物乞依前修濬開放及將奸豪侵占牽路所蓋舖屋祠宇但為折改則奸弊可革便利可興工部覆奏命巡撫官會同總兵官從公勘議以聞明孝宗實錄明孝宗𢎞治二年四月丙午修滹沱河白馬口及近城隄共三千九百餘丈明孝宗實録𢎞治二年河失故道泛及汴堤巡撫大臣具疏奏聞事下工部集議舉可以治水者令刑部左侍郎白公昂居南京兵部僉以其名對詔可乃改公戸部遣人特敕賜之以行公受命乃言河患甚急非臣一人所能獨治唯郎中婁性為臣屬官其才可任詔亦可於是婁君往受公謀畫以河舊自歸徳府之飲馬池東入雎水經宿州靈璧至宿遷小河口入泗唯雎淺隘不能受故其勢瀰漫横溢并及永城夏邑蕭縣碭山睢寧等處其治之無緩婁君以為然乃協謀於巡按憲臣命鳯陽知府章銳相其便宜以興工役而推官李渭宿州知州萬本分行治之自宿遷而上至歸徳而止並加疏浚使淺者以深隘者以闊其旁民居田畞悉築堤以䕶其崇一丈又於符離橋南鑿月河一道長五百丈闊十丈深二丈五尺沿河置減水閘七及浚渠一皆為防河計也凡役工夫三萬人經始於三年之夏五月至秋八月而畢宿州志吴瑞字徳徵成化乙未進士𢎞治已酉厯工部郎中治濟寧以南河道值久旱舟膠不前公知之兼程抵任相宜從事鑿新河浚舊河增壩閘時蓄洩水通而舟前軍民稱便髙郵甓社湖風濤覆舟舟人多溺死公度傍湖田鑿複河延袤四十里遇風舟由複河可免覆溺功成而田賦額存民患之同事者議撥荒田補賦公以為非便上疏乞蠲除下戸部議卒如公疏至今利賴辛亥以疾乞歸黄雲撰吴郎中墓志明孝宗𢎞治三年二月辛夘疏浚直沽迤東海口并新開沽一帶河道十一月癸未侍郎白昻奏處置河道事宜乞令揚州府管河通判常居瓜洲總管閘壩不許回府營幹他事南北直隸山東府州縣管河官令其沿河居住管理河道不許别有差委其兖州府通判則令常居南旺分水地方專管撈淺并提調各閘若山東布政司勸農叅政則令兼管河道修理疏濬事下兵部覆奏從之明孝宗實錄白公昻見髙郵之甓社湖風浪時作多覆舟或舟觸岸輒壞議即其東開複河以避其患河成舟安行無險名其河曰康濟人思公惠别名白公堤吴寛白公傳白公昻視運道自山東抵揚州議所以濬治時監察御史孫君衍工部郎中呉君瑞董河事與巡撫右副都御史李公鼎漕帥署都督僉事都公勝署都指揮同知郭君鋐合議髙郵州運道九十里入新開河湖東直南北為隄舟行其下自國初以來障以樁朩固以磚石決而復修者不知其㡬其西北則與七里張良甓社石臼平阿諸湖通縈迴數百里每西風大作波濤洶湧舟與沿隄故樁石遇輒壞多沈溺前此董河事者嘗議修湖東鑿複河以避風濤便往來不果行今欲舉運河便利宜莫先於此者白公議運遂相地興工開鑿起州北三里之杭家嘴至張家溝而止長竟湖廣十丈深一丈有奇而兩岸皆壅土為隄樁朩磚石之固如河岸首尾有閘與湖通岸之東又為閘四涵洞一每湖水盛時使從減殺焉以三年三月始事凡四閲月而成自是舟經髙郵者人獲康濟白因采衆議聞之上名曰康濟河劉健髙郵州新開康濟河記畧四年漕運總兵官都勝請濬揚州揚子橋灣頭河道發丁夫萬餘渠中掘得都巡檢漢壽亭侯都統制觀察使印四顆南河全考明孝宗𢎞治五年六月已未南京戸科給事中羅鑒等應詔言五事一理漕河金溝淺之阻宜於大河西岸開河避之南旺湖之阻宜於孫村西岸開河避之八月丙寅惜薪司左司副何鼎奏通州倉貯糧一時權宜初非經久軍士不便於闗支警急不便於防守請於都城隙地增置倉厫移通州倉糧於其中且請修濬大通橋以東石閘河道令漕舟直至橋下以省轉輓之勞戸部會議以為京倉之建固善但時詘未可舉贏河閘之說果便然後施行從之九月已巳朔直隸鳳陽府知府章銳應詔言六事一謹河防沛縣迤北臨清迤南閘座多被附近無籍小人作弊有於始建之時通同匠作將閘厎髙起致水搏激又有陽雖閉蓄陰實泄放乞敕各處管河郎中御史等官治下所司知之明孝宗實錄李景繁字邦泰儀封人成化五年進士厯都水郎中管漕河時漕塞自儀真入淮凡三百里舟膠不行有詔命都御史暨郎中治景繁獨任之募夫八萬人初濬邵伯湖揚子橋三汊河廣皆六丈次濬廣陵驛東廣倍於三汊次濬樸樹灣廣三倍於初次濬儀真瓜洲二壩廣倍於樸樹者三深於舊者各五景繁行瓜洲隄上見東南多沮洳區問土人此何所也曰江潮之滙也景繁導之自古劄港劉家灣入漕渠曰今漕渠非得巨流濟之舟終不可行如值江潮時開壩閘恣江北走已即塞之天復大雨漕事成矣土人曰河亢而江下非壩障之則河水悉倒流入江漕渠益淺都御史而下咸謂李䇿非善景繁曰江水故平潮至則悍激耳潮退水亦易制也遂下令有司具土曁石潮至大決壩閘江水奔漕水聲洶洶如雷景繁乃塞壩閲數日會大雨漕渠水瀰瀰襄岸舟乃大行河經徐州盪州將嚙居人震恐景繁又作石堤河不能為害𢎞治六年遷山西右叅議理儲轉四川右叅政致仕朱睦㮮山西叅政李公傳明孝宗𢎞治六年十月戊辰巡撫河南都御史徐恪奏言河南府有伊洛二渠彰徳府有髙平萬金二渠懐慶府有廣濟渠及方口堰許州有棗祗河渠南陽府有召公等渠汝寧府有桃陂等堰其他故渠廢堰在在有之濬治之功灌漑之利故老相𫝊舊志所載不可誣也雖行分守等官疏導然事非專委難以責成請敇布政司撫民參政朱瑄專領其事從之賜瑄敕曰邇者官奏河南郡縣踰時不雨輒赤地相望流移載道水利一事所當預圖其河南等府伊洛等渠歳乆湮蕪多被王府屯營侵塞及勢要之家占作碾磨雖已行令分守分巡官提督修舉然不責攸歸未免顧此失彼且更代不一難以責成以爾素有才謀不避艱險可委專理爾其親詣前項渠堰再行酌量時宜以次興舉合用朩石等料於各該田多有力之家從公勸諭或别為措置量起所在附近軍民人夫相兼整理選委的當官員人等提調務臻實效無事虛文原置閘處仍舊置立以時啟閉仍將得利之家地土頃畆遂一勘明籍記在官遇旱則官為斟酌驗畝分水以杜紛争以後堙塞就令得利軍民併工開濬有潰決之處亦就培築隄防務圖經久其豪强軍民敢有仍前截水安置碾磨占作稻田者依律究問故敇甲申增設工部主事一員管理沽頭上中下三閘先是大理寺左少卿屠勲言沽頭水勢最為易涸從來嘗設主事管理人以為便近因革去往來有勢力者不時啟閉民船動淹旬月乞敕工部移文管河郎中常川在彼管理工部覆奏以為管河郎中自濟寧以至儀真所經地方千有餘里若坐守一方不免顧此失彼宜仍設主事一員專理從之明孝宗實錄𢎞治癸丑河決張秋甲寅六月公奉敕往治之加太子太保乙夘回京加太保兼太子太傅陳鎬平江伯陳鋭傳明孝宗𢎞治七年三月壬子工部言頃河決張秋命右副都御史劉大夏往治之今聞河防修築未完自臨清至沛縣運河俱淤淺而管河郎中陳綺方在彼督役恐不能周厯諸地本部欲遣屬官有幹局者往會大夏計處以相其成遇淤淺之所則多方疏濬事畢而還從之五月即命内官太監李興平江伯陳鋭同來治河語在河水七月乙丑髙郵康濟河成初南京兵部左侍郎白昻奏凡髙郵湖行船最忌西北風往來舟楫多致覆溺若於磚塘内開複河一道引水行舟可免風濤之患於是巡河監察御史孫衍管河郎中呉瑞因共挑濬并置閘堰築隄岸以利牽挽往來稱便焉康濟河於三年告成見前劉健記而實錄紀於七年蓋至是始得開於上也十月戊寅副使楊茂元奏山東連年荒旱今歳積雨為災兼修塞張秋決河供給不貲差科繁數請取回鎮守臨清右監丞李全别用兵部覆奏謂臨清鎮守官嘗取回别用一旦復設中外駭訝宜從茂元所請凡在臨清内外供給亦請悉從節省上曰臨清地方亦須用人鎮守李全不必取回餘如議行之十二月壬申陞山東布政司左參政張縉為通政司右通政提調沙河至徳州河道太監李興等言縉修河有功今決河已塞仍須令管理河道因以命之明孝宗實錄張縉為山東參政𢎞治癸丑河決張秋上命平江伯陳銳都御史劉大夏治之百需悉委調度甲寅功成遂陞其秩為通政司右通政屬之行河時衝決之餘溝防不治縉相其緩急以漸修浚無所遺又於決口之東甃石岸數里以圖勿壞又新築南旺東堤樹桞其上每歳夏秋水溢輓卒得分行無阻至今便之雷禮户部尚書張縉傳明孝宗𢎞治八年十月丙寅内官監太監李興平江伯陳鋭都御史劉大夏奏河防糧運六事一謂漕河水利全藉山東諸泉每年夏秋瀦蓄南旺等湖至旱乾時以濟糧舟近豪强軍民或決堤泄水以圖栽蒔或阻遏泉源以資灌溉乞照先年侍郎白昻奏行事例禁治一謂南北運河止是汶水分流接濟春夏旱乾水源微細必藉各閘積水以時啟閉庶可行船往往官員隨到隨開以致糧運阻滯乞申明列聖詔旨嚴加榜示一謂管河官員責任太輕事多掣肘乞敇河南管河副史張鼐大多府帶管隄防參政李瓚俱照管河管屯官事例常川巡視聼其便宜行事巡撫等衙門不得有所阻撓一謂安平鎮黄陵岡荆隆口及新築于家店以下隄防俱用人守視水涸則積土備用水漲則防䕶修築若有重大工程臨時調附近丁夫協同修理一謂大名府所築長隄必須逓年增修庶保經久乞行參政李瓉以所屬隄北人戸編定班次毎年農隙之時調發若干增修一月疎放隄北軍屯與寄居人戸亦一體從輕編定輪流調發庶免起夫科擾之弊一謂濟寧迤北南旺開河戴家廟一帶比之他處最要而安平鎮池方土脈疎薄新築決口尤須提調官員不時檢㸃今自濟寧直抵通州相去一千八百餘里而天津北上逆水尤難若止責與一人提調恐致誤事乞敕該部依臣等前奏仍分其地為三南北各設工部郎中一員中間増設通政一員提調下工部覆奏俱從之明孝宗實錄喬縉字廷儀洛陽人成化八年進士為都水司主事督理山東泉源初漕由魚臺至臨清行洸汶沂泗四水其地復有泉百七十餘道㑹於四水而分流於漕渠為閘凡三十有六設守津吏以時啟閉為淺二百二十各有津老以時疏治然歳逺法弛諸泉湮塞或為豪宦侵匿漕運屢屢告艱縉行郡得堙塞泉四百有奇侵匿泉二百有奇合六百餘泉會於四水漕運大濟工部以績奏改兵部職方厯四川參議朱睦㮮作喬公傳行水金鑑巻一百十一
