body:
  text: 行水金鑑巻一百十五江南按察使傅澤洪撰運河水二洪古稱懸水三十仞流沫四十里舊各有閘徐州洪一吕梁洪二近方革其一而莫知建置之由志稱正統間叅將湯節因洪水淺急數壞舟建議於洪上流築堰逼水盡歸月河徐州洪則於南口吕梁洪則於上下二口各建閘積水以行舟蓋正統戊辰黄河從河南滎澤孫家渡南徙二洪僅受閘河之水迺從河南懐慶之武陟導沁水下入梁靖口出徐州小浮橋以濟二洪水猶淺澀故節議建閘爾志不悉言其故迄今天旱水澀即築攔河壩逼水入内洪猶建閘遺法也今梁靖之流巳甚微冬則流春夏雖仍通流然深不過數尺河厎髙於南河丈有五尺夏口近衝之溜水勢甚盛而蕭縣城南之口亦阻山甚狹通塞靡常甲午春二洪㡬不通舟然則建閘之法不可不預講也如月河各以石砌堅而修閘以俟冬春水澀即築壩從閘永久之利也但二洪役夫藉險以為利非果斷以必行之不可得也有云二洪之後皆可開月河以建閘者蓋上下口及中連建三四閘節水啓閉水盛則由洪水澀則由閘二洪之險失矣但山脈皆堅石所費良不貲爾然二洪之役夫歳餘二萬緡如出數歳之費以鑿之萬世之利也以上言徐吕二洪淮自荆山而下即受黄河從渦河一支之水至清河則全受河水矣議者云黄河泛濫中土蓋海口近年漲沙下壅上溢致然已議濬海口矣初亦甚奇之及觀於淮海而始知其妄蓋淮陰之地甚卑而徐吕之洪甚髙信然則淮陰當陸沉而徐吕為安流矣審察之乃河淮入海之處北口實有漲沙而南口更衝廣爾言淮海淮清江浦頻年外河黄水漫入輒淤濬治無已運舟每為阻滯詢之父老有云自板閘而下相度地形中道别開一支河河口亦建閘各髙其隄防淤則濬其一而開其一以行舟可免停泊矣淮揚諸湖每遇暴漲風浪觸隄則隄壊舟行遇之則損溺近范光湖議於隄外開支河行舟以避前患用心仁矣議者謂不獨范光凡諸湖之廣而水勢盛者皆可為支河蓋堤外之地本下取土為堤不數尺即可通舟費亦無多治水者歳歳圖之久則效矣余深有望焉但支河至湖塘岸須多留隙地密栽深栁每濬河淤泥即以培之塘岸永固矣諸湖更多開滚水石壩壩厎平鋪巨石而酌其淺深俾湖水淺不致阻漲不致衝岸壩下則開深渠以通瀕海魚鹽之利民田亦免漫沒之害矣儀真河口舊無閘近方建閘謂俟潮入則閉閘以積水俾舟可達壩下似矣然五壩之舟舉由一閘以入已多擠塞每江上風起運舟一時不能猝入閘内衝撞飄損其害甚大權其輕重閘固可廢也言淮揚諸湖南旺湖志稱縈迴百五十里漕渠貫其中則東西兩岸之湖皆為南旺甚明蓋宋司空導汶水自東北流至湖中而後分流南北則湖析而為三矣近年惟以西岸為南旺湖而東岸界分之二湖悉冺其名迹居民指其北為馬踏坡湖南為蜀山坡湖率皆侵占耕稼其上余疑而歴詢之久乃得𢎞治中韓通政鼎所䥴南旺圖說碑在今安平鎮顯惠廟中明甚蓋西岸為南旺西湖東岸二湖為南旺東湖二湖之下方為馬踏蜀山坡湖而馬踏之下為伍莊坡湖蜀山之下為馬塲坡湖也但諸湖通連中無限隔爾審其形勢凡與西湖盡處相對者即為東湖其下方為别湖也韓碑宜移置南旺分司以免殘燬南旺西湖減水閘十有八舊稱汶水伏秋盛漲則開閘引水以入湖冬春則閉閘蓄水以防旱謂之水櫃余甲午夏承乏治水時久旱河皆淺涸及詢南旺則西岸環湖三面之堤盡圮矣水不能瀦迺委屬役夫修治之週凡五十一里餘復諸減水閘之淤廢者及秋雖旱水亦頗積但湖中地形窪下止可從舊忙生閘下出廣運閘口濟魚臺以下運河爾無仍濟南旺運河之理蓋水既從此以入湖又安能從此以出邪議者不察謂運河淤髙故湖水不能出殆未審地形髙下之宜也今南旺二閘如故濬河與閘厎平止矣安有淤髙邪惟南旺分水湖口地勢猶髙如仍倣宋司空引河就下之遺意導汶直至今南旺西湖中之最窪下處南則從忙生閘舊河出廣運閘口或出永通閘口北則從舊河直出安山閘口以避此南旺二百餘里之淺澀固運道無疆之利也且皆舊河先年凡水漲即從此行舟故道近雖淤廢不過修治及移南旺數閘而已如以改創為難姑修復以為南旺一月河未為不可也西河堤修復外仍有見存堤一十餘里臨河堤六十里四面共百二十餘里若連二東湖則百五十里矣汶水大發閘河不能容北則注於南旺東湖及馬踏坡伍莊坡三湖南亦注於南旺東湖及蜀山坡馬塲坡三湖而伍莊坡馬塲坡二湖為尤深廣水勢就下故爾今若以南旺東湖蜀山坡之下各地形稍髙水勢稍淺之處横築髙厚土堤中留滚水石壩俾各蓄水各開減水小閘以通運河旱則出之以濟力省而利大矣蓋東岸諸湖地形本髙水可以出非若南旺西湖也若馬踏坡上下水勢通連未可槩議耳安山湖昔稱縈迴百餘里而不詳其界至𢎞治十三年韓通政鼎始踏四界東至馬家湖西至舊東湖南至安山北至運河其十里鋪在湖中界自鋪至安山湖廣十五里四圍東自馬家口西至戴家廟長二十二里六分自戴家廟北至壽張集長二十四里三分自壽張集東至趙家莊長二十四里七分自趙家莊南至馬家口長八里八分週圍共八十里四分置立界牌栽植栁株用心勤矣但積水通湖二閘厎髙河水非甚漲不能入四圍多侵占而湖之下口無閘水不能出嘉靖六年間治水者不攷其故止於湖中新築堤週迴僅十餘里號為水櫃湖之廣益狹矣以漸復之可也馬塲坡湖與運河相通舊有堤湖水風浪衝壊運河水稍盈即洩入湖而湖廣㡬二十里運河安得免淺涸邪十四年冬委屬役夫為築堤六十里内外各植栁以䕶之湖甚廣風浪甚巨近堤則多植蒲葦堤根堤頂内外各遍植栁可也楊水部旦邵水部元吉協力成功更置減水五閘運河之水易盈湖之水蓄洩有備矣昭陽湖舊甚廣南口建二閘啓閉出金溝口以濟沽頭諸閘嘉靖七年黄河衝決東堤入昭陽湖淤漫漸髙二閘已没入泥厎不復見湖亦狹而金溝口之流亦微濬河則淤深費廣惟湖上流北口通雞鳴臺小河如下口因黄河已淤髙仰之地更築横堤以益之遏湖水由雞鳴臺入運則自此以至沽頭七十里皆可濟矣蓋因其勢而利導之爾十四年夏秋已濬雞鳴臺口出水入運但下口堤猶未修築髙厚當培益之更將湖東新河隔絶之泉闕築壩悉引以入湖則水積而利益大矣以上言閘河諸湖運道以徐兖閘河為喉襟閘河以諸泉為本源泉源修廢運道之通塞繫焉可不重邪泉志紀載詳矣惜未能紀泉所出及測其穴數大小形狀以故官夫疏濬率多虛文未可考矣至有堙没莫知所在者且泉源四時微盛各殊大率冬春微夏秋盛旱微澇盛渠流深廣亦不一必四時遍測而後可驗迺各紀其方向在州縣東南西北或四隅逺近去州縣治若干里保社某里分村莊某村莊東西南北若干步所出或山谷或平地或津泉穴數若干穴眼大小形狀如盤如盞如酒鍾如鷄子如棗栗如錢之𩔖備測泉口成渠之深廣尺寸自泉流若干步成渠深廣若干入汶運之里至逺近流㡬里合某泉或入汶或入運沿途之渠道堤防罔不詳備有無衝決坍塌淤塞盜引司泉者若有所稽有未盡復者嗣而求之備載於志可免堙没矣近𫝊黄河入運山東諸泉悉皆堙廢蓋逺地未始經歴之訛傳也閘河自徐達衛七百里黄河正徳已巳方決沛縣飛雲橋所濟自沛至徐百餘里爾嘉靖九年十年間漸北出孟陽泊泥河口出穀亭口所濟自魚臺至徐二百餘里爾餘猶全資汶泉也如盡堙漕運不遂廢邪泥於近小而忘其逺且大者可乎惟魚臺滕縣而下泉源渠道為黄水淤漫近雖疏治而或猶未盡其利爾嗣而濬之復其舊矣齊魯之地多泉近於東平州詢訪即得新泉五第民間病於開渠占地之勞費匿不肯言爾凡久旱地潤之處其下必泉司泉者能懸以厚賞而遍求之雖尺寸之水有益運道矣漢李尋解光言陰氣盛則水為之長故一日之間晝減夜増歴試之信然以上言諸泉問水集明世宗嘉靖十五年五月已未總理河道副都御史李如圭條治河五事一任才能以舉泉政漕河全賴泉水頃年泉源淤塞以致泉流微細宜専設兖州府同知一員管理一置閘座以均水利漕河一帶閘座隨時增改者多此盈彼涸往往稱淺宜仍舊便此後必相度得宜乃聼改作一砌閘壩以垂永久漕河閘壩𩔖皆土築善崩宜採石修砌一治湖陂以裨運道山東漕河固資泉流而昭陽南旺蜀山馬塲五丈安山等湖陂俱受水所可為運河之濟但年久不治委之無用甚至湮没為害或被人侵占宜積令退出官為修治一嚴稽考以革奸弊河道銀兩先年散貯各衙門遂致那借侵欺無從查考宜令所司專聽河道支用從之六月丙午致仕右都御史盛應期卒應期呉江縣人𢎞治癸丑進士授主事歴今官致仕卒應期有膽智遇事敢為所至有績效而殊不理於口留城新河之濬實漕道永利應期創議而撓於浮言功無成而敗蓋首事之難如此九月壬午户部等衙門會議漕運事宜一議將管理通州郎中移劄楊村等處地方每年當仲春秋杪之際嚴督各該夫老人等遇有淤淺即酌量工力疏濬候運船到灣仍詣通惠河提調其臨清迤南自東昌以至南旺等閘應添設主事専管開河等閘督令各該官夫如法啟閉詔如議行閏十二月壬子朔總督漕運周金言淮安清河口抵瓜儀四百餘里乃運道咽喉其座閘止藉白馬范光髙郵邵伯諸湖津派皆無源之水往黄河北徙或由沛縣飛雲橋或由穀亭鎮流入漕渠是以沽頭諸閘頗得其濟自嘉靖六年後河流益南一支入渦河直下長淮一支仍由梁靖口出徐州小浮橋一支由趙皮寨出宿遷小河口各入清河口匯由新莊閘入裏河水退沙存日就淤塞訪諸故老皆言河自汴來本渾而渦淮泗清新莊閘正當二水之口河淮既合昔之為沛縣害者今移淮安矣興工挑濬公私勞費動以萬計臣甚慮之竊計新莊口南諸閘一遇水發必須築壩及貢使與勢官經過旋復掘放恐非長計請於新莊閘更置一渠約長五丈立閘三層重加防䕶水發即三板齊下貼席封固雖有滲漏勢亦微細而挑濬不難仍戒管河屬官毋得營求别差擅離職業下工部議可從之明世宗實録戴䲀字時化鄞縣人嘉靖乙未進士丁酉授工部主事治徐州洪洪故有二道外洪大石獸踞小者㦸列時時破舟殺人而内洪則紆迴滯澀沙石壅閼不可以舟又堤岸善崩齧而窪者大半公至則殫力經畫琢其巉巖碎其䂬磧直其掩曲抉其壅塞以堤以路延袤二里許舳艫上下如履平地而數十年之害一旦夷之督漕大司農約菴周公稱之張時徹撰戴公墓志明世宗嘉靖十七年二月乙夘山東巡撫胡瓚宗奏青登萊三府舊有元時新河一道南北距海三百餘里原設閘座故跡猶存惟馬家橋中多頑石乃元人疏鑿未竟者今已募夫鑿通尚有停口窩淺隘淤塞乞動支官帑開浚永為民利從之丁夘覆巡撫順天都御史黨以平奏薊州運河自殷留莊大口至舊倉店淤淺一百十六里請發樁草銀六百四十兩糧米五萬石及時疏濬詔可七月丙子修濬地丘店丁家道口河工完賞總理河道都御史于湛巡撫河南都御史易瓚巡按御史王鎬各銀幣有差按察司副使張綸等各陞俸一級明世宗實錄嘉靖十七年漕運都御史周金奏修寳應一帶堤岸時工部郎中凃棣畢鸞揚州知府朱懐幹通判凃相淮安府同知陳昉協贊成工南河全考歸懷幹字守正號霅峰安人嘉靖壬辰進士歴知思南府有能聲明世宗嘉靖十九年九月壬寅運糧千户李顯疏築運河三事其一謂揚州南自儀真北抵淮安俱藉寳應范光湖諸水接濟乃湖南北相去三百里廣百二十餘里卒有暴風漂蕩不測議於范光湖堤迤東開築月河以免水患其一謂北自淮安南至瓜儀水勢上下相去丈許惟賴瓜儀二壩闗防先年壩決水衝河道淤淺宜令瓜洲陳家灣儀真新城地方并揚子橋及揚州東闗各增一閘若𤓰洲壩衝決則下陳家灣閘儀真壩衝決則下新城閘如二閘閉水不及則下揚子橋閘再不及則下東水闗閘以留水利其一謂儀真下接揚子橋大江商舶輻輳河道壅塞糧運阻悞成化年間嘗令將新城通江舊河疏浚寛廣亦置一壩河道疏通官民稱便後廢不修今宜仍前修浚以禆漕政上命工部議行明世宗實録萬表字民望定逺人襲世職歴漕運叅將至南京中軍都督僉書嘉靖庚子二洪水涸漕舟竝阻議者謂黄河改流公著論折之力言漕河惟用洸汶沂泗諸泉足以濟正統十二年黄河決滎陽入漕河潰沙灣入海景泰四年都御史徐有貞塞之乃分流自蘭陽東至徐入漕必疏濬而黄水始來稍稍與清合至正徳六年黄始盛來漫漫衝決方黄河來衝時清河狹淺水涸易盈沿河設淺舖每年轉運無滯也今二洪舊堤宛然可見但向者黄河漫漫一旦水落石出清河淺涸人心乍見不能無異其實則故河也蓋自洪達濟自會通至衛河一路堤防原備河衝入為漕害今二洪以下反用黄河之水而忘其故及水不來至疏濬以引之此所謂以病為藥也渦河在淮之南商船皆自淮入渦至祥符銅瓦箱以達陽武去衛河六七十里議者欲鑿而通之直至白河則㑹通河可罷公議㑹通河之塞自濟寧至臨清計三百八十里尚書宋禮發山東丁夫十五萬鑿河建閘為費不貲以彼棄七十里之易而事三百八十里之難此無異故蓋鑿而通之則黄衞二水合二水合則衝決非常誰能障之此會通之運誠永利不可易也若以衛輝置倉歳以鳳陽諸衛之卒部鳳陽諸郡之糧令由渦河達陽武歴七十里輸於衞輝其勢甚易如昔山東流賊之變運道中梗又可為備變一策海運雖極險逺第浙中海船於逺畨皆能通之松江與太倉通泰州有沙船淮安有海雕船嘗由海至山東蓬萊貿易云離天津不逺若以松江太倉近海歳糧厚與僱直量運三四萬石使海道漸諳為事變之備又一策也太倉則例每糧一石耗七升至槩斛若輕齎之羨以還運卒故卒有餘力運無愆期後官悉收之脧削四出人不聊生公憤曰此其患不獨在貧軍而且移之國計矣大者疏小者議累累百千萬言詳具國史漕運志中且極陳本末通融為國長利而又欲開河北山東圻内一帶荒田重農薄賦為漸減歳漕之地尤根本至論識者韙之焦太史澹園集明世宗嘉靖二十年四月甲戌總督漕運左都御史周金奏黄河支流淤塞徐吕二洪水淺并鎮江等處河道阻滯請及時挑浚以濟糧運總理河道右副都御史郭持平巡撫河南右僉都御史魏有本各奏黄河遷徙大勢自睢州野雞岡至亳州入淮其由孫繼口并考城縣至丁家道口虞城入徐吕二洪者十分之二此運道所闗非特河南一省之責即今沙淤四十餘里疏濬之費動計鉅萬乞發山東南北直隸樁草夫役銀兩數萬於雎州貯庫協濟工部議覆從之已而户科給事中劉繪奏黄河大勢南徙其支派細微以致徐吕二洪涸淺有妨運道乞嚴責河道官疏浚丁家道口等處及汶濟諸泉工科左給事中沈良才奏山東泰安州等處計一百七十六泉舊設管泉主事并同知等官邇者視為泛常以致泉源微細乞行撫按及管泉主事督率人役極力浚導兵科給事中張翼翔奏黄河南入渦河經亳州逼近陵寢乞浚孫繼口等處以濟漕河並築隄防以止黄河南下工部覆議上曰徐吕二洪阻淺非尋常挑浚所能通濟即行漕運河道都御史及撫按督率各官盡心議處以聞五月丁亥工科都給事中韓威等劾奏總理河道都御史郭持平等修河半載尚未成功給事中林庭學復奏持平已報睢州野雞岡孫繼口挑濬新河工完徐吕二洪糧運無阻而漕運都御史周金等又稱桃源宿遷等處淺澀徐吕水不盈尺歳運艱難各相背戾上乃降持平等俸因命兵部右侍郎王以旂往督理以旂遂條陳河道事宜疏下工部覆議一管河官止令專理河道不得别遣効勞著績者不問崇卑一體旌擢一河道貯庫及樁草銀兩并本部事例户部無礙官銀俱聽隨宜支用一各項船隻停泊已久一遇河通勢必兢先宜申明條約先儘運船及進鮮黄船發行餘皆不許攙越把總等官無得遲延帶貨一國初漕河惟導徂徠諸泉及汶泗諸水至景泰𢎞治年間黄河始自至於時督理大臣如徐有貞白昻劉大夏猶極力排塞不資以濟運也以其勢猛水濁來則衝決去則淤塞且遷徙不常害多利少耳今幸黄河南徙諸閘復舊其野雞岡新開河道宜浚山東諸泉入之以濟徐吕二洪沛縣南仍築長堤聚水如閘河制務在有司利漕運而已又今之議者有謂引沁水自武陟而東至曹州向濟寧出永通閘入運河者有謂引漕舟由江淮入黄河達於陽武陸運百里入衞河直達天津通州者又謂海運固難中間平度州東南有南北新河一道元時嘗有治閘直達安東北悉由内洋而行路捷且無險者此皆今日所當多方講求擇便而從事者也上曰海運迂逺難行不必妄議生擾決浚山東諸泉乃今日要務其如議行湖廣布政司右叅議方逺宜請開海運上曰運河一時淺阻已命官往治海運有旨勿得妄議方逺宜多言亂謀姑勿究明世宗實録明世宗嘉靖二十一年二月辛酉總督漕運都御史王杲總理河道都御史郭持平奏睢州野雞岡原有支河通徐吕二洪以資運道近因黄河衝野雞岡流渦河經亳泗大勢南徙於是孫繼口遂淤徐吕二洪水微而泗州祖陵鳯陽白塔壽春等王墳水遂歸焉乞築野雞岡口挑濬孫繼口扈運口李景髙口三河使水勢東行由蕭碭自徐州入運河以濟二洪庶運道有利陵寢無虞又邳州桃源河廣流逺多淺塞處乞循依古法築壩撈沙水流中漕可無壅滯疏下工部覆如其言詔差工部郎中郭應奎及欽天監官㑹同撫按官查議勘報九月庚午督理河道都御史王以旂疏陳四事一漕河仰給山東諸泉貴以時疏浚近已會同各官清查舊泉一百七十八處復開新泉三十一處俱入河濟運但恐一失疏濬尋即湮塞主事一員勢難遍歴乞分隸各地方守巡兵備等官兼理其事一徐吕二洪為運道咽喉山石險峻非水深數尺莫能行舟聞舊曾置閘束水乞於境山鎮二洪下各建石閘旁留月河以洩暴水沙坊等淺由河廣漫流更宜築四朩壩武家溝小河口石城匙頭灣諸淺預置方船以備撈浚一漕河兩岸原有南旺安山馬塲昭陽四湖名為水櫃所以匯諸泉濟漕河也被豪强占種蓄水不多而昭陽一湖淤成髙地大非國初設湖初意乞委官清查添置閘壩斗門培築堤岸多開溝渠浚深河厎以復四櫃一黄河南徙舊口俱塞惟孫繼口獨存導河出徐州小浮橋下徐吕二洪此濟運道之大者近巳俱工挑浚但黄河變遷無常難保不復淤塞乞於本口多開一溝及時疏濬庶上流有所受下流有所洩而二洪常得接濟矣疏入工部覆議當從但以管泉責之有司事體不一仍令各部官司之惟於總督河道官加工部侍郎銜以便督責上依擬仍詔管河官委任嚴切遵行永久不許始勤終怠以隳前功癸酉督理河道兵部右侍郎兼都察院右僉都御史王以旂奉命回京辭免兼官許之明世宗實録王以旂以左副都御史佐院事辛丑陞兵部右侍郎是歳徐吕洪竭漕舟滯不行淮安濟寧兩院以聞臺諫諸臣合詞言宜如先朝故事簡大臣一員督治於是公受命兼右僉都御史以行至則先求故道視泉脈循經流塞分殺自徐洪南抵沽頭增置閘若干座又相地形引水暫築土壩若干座河流時匯漕舸皆如期達京師汶上寧陽間故有四水櫃置湖中勢豪侵没多獻徳邸藉其牽制放水灌田成沃壤官因循而不問民隱忍而諱言為弊頗久乃公廉實謂四水櫃復庶蓄洩有地河溢則懸河以入湖河澀則懸湖以入河足備緩急遂任怨力復之至今賴焉事竣上嘉悅之加俸一級癸卯陞右都御史掌南院謝少南撰宫保兵部尚書襄敏王公行狀進以旂字士招江寧人正徳辛未士行水金鑑巻一百十五
