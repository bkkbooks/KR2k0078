body:
  text: 行水金鑑巻一百十六江南按察使傅澤洪撰運河水明世宗嘉靖二十三年十月辛夘工部管河郎中歐陽烈奏木欒店河口及各堤岸衝決乞加補塞衛河自臨清抵直沽止有三減水閘乞於德州以北増修減水石壩一座仍於沿河築攔水月堤以䕶河岸并將天津等衛軍補淺夫審編正副逐堤編廵修補工部議覆從之明世宗實録都御史于湛題名記畧云或謂海運由浙西不旬日可逹都下較之河運費省而功倍丘文莊衍義補言之詳矣近年言者亦多厭河運之勞而欲舉文莊之䇿子顧極言河運之利而欲侈諸臣之功示諸乆逺何也曰海運之法作俑於秦效尤於元祖宗已棄之䇿三代以前未聞也文莊計漂溺之米而不計漂溺之人故以海運為便不知米漂而載米之舟駕舟之卒管卒之官能獨免乎考之元史至元二十八年海運漂米二十四萬五千六百有奇至大二年漂米二十萬九千六百有奇即如文莊言每舟載米千石用卒二十人則歲溺而死者殆五六千人此勝國之所忍於民人也奈何今日亦忍於民人哉河運之費費於人所謂人亡人得損上益下者王者以天下為家又奚惜哉河防𣙜十薈蕞云公治河山東全河備考云嘉靖六年任二十四年復任則是兩任總河矣題名記不知作於何年其意念仁矣潘公摘其語以示後人見海運之害若必思有以佐河運之窮莫若萬表言自淮入渦河至祥符銅瓦廂以逹陽武去衛河六七十里鑿而通之直至白河則㑹通河可罷此䇿勝於海運多矣萬表説在前巻于湛字瑩中金壇人正德辛未進士歴右都御史廵撫陜西㑹黄河徙運道艱阻遷總督河道鑿野雞河九十餘里以逹運河乞終養服除起户部右侍郎撫治鄖陽卒賜祭葬祀鄉賢江南通志明世宗嘉靖二十八年七月辛未戸兵二部議覆廵倉御史阮鶚疏陳漕運事宜一天津以北河道宜令管河郎中每年三月親詣淺所疏濬一天津一帶河道宜分屬廵倉御史管理一河西務起至石土二壩宜刻立水則淺深其起剥多寡可坐而定議入從之明世宗實録明世宗嘉靖三十一年十二月已未工科右給事中李用敬奏開膠萊新河其畧謂邇者河道湮塞深妨國計聞之膠萊之間有新河一道在海運舊道之西乃元人欲開通以避海濤島嶼之險而未成者先是山東廵海副使王獻憫登萊之民土瘠人稀生理不足皆由舟楫不通嘗按元遺跡鑿馬壕石厎以通淮安商賈建新河等閘八座以蓄洩水患導張魯白現諸湖以濟水道見今淮安之船由淮河直厎麻灣即新河之南口也由海倉直厎天津即新河之北口也自南口以至北口僅三百三十餘里各有潮水深入中有九穴湖大沽河諸流可引其淤塞未通宜量加浚者一百五里宜深加浚者三十餘里元人用工以開其二今之用工當任其一此皆彰明可見者乞選才望官一二員㑹同撫按官亟為修舉疏入工部覆行所在撫按詳議具奏報可明世宗實録是年大水衛河決工部員外郎周思兼督衆築塞之北河續記連鑛字伯金永年人嘉靖丙戌進士辛亥歴都察院右副都御史奉敕總理河道是歲澍雨運堤衝潰阻後幫四千七百餘艘公自濟趨邳極力疏通至十一月而悉就下流矣上疏曰北河張秋濟寜地髙而水易涸患在春月故啓泉門以濟之南河自徐州小浮橋引莆河以濟運而清淮一帶横流浩蕩犯之尤難必春夏未盛之前可循也運早過淮則南河免泛濫之憂北河當順利之勢識者皆以為確論因請造運船補軍夫先時徴兊早督過淮挑浚新莊等閘以為來春運地壬子上命以原職總督漕運兼撫治鳳陽等處是歲五月運即過淮矣六月雨決新安房村復阻後幫二千餘艘公往來二地之間至十月兩運事亦竣因請疏治房村􅌎塞及浚黄河下流使循故道公始至淮實漲水殘傷之後蕭徐邳宿匯為巨川百姓轉死劫掠者不可勝數公奏蠲夏稅秋糧發粟振饑使民應募河工水落田出則示有司給牛種勸樹畜而淮徐之間稍休息矣去之日疾作於途卒於家郭鎜作連公神道碑陳茂禮字履卿慈谿人嘉靖庚戌進士授工部主事壬子河決徐邳漕運阻塞言官議開膠萊新河通南北海道天子下其議時當道方憂徐邳幸海運或可必行大司空請以茂禮往視可否茂禮歴膠萊觀南北所謂海道者上議曰石礦既難開鑿而絶無他泉可引通舟必須穿引海水非掘地十餘丈不可且航海必湏更造海船而海冦方出没諸利害有難逆覩至於工鉅之難成又其小者於是議寢省大司農金錢以億萬計兩浙名賢録明世宗嘉靖三十二年二月甲戌南京兵科給事中賀涇條陳治河事宜一酌挑濬之法以濟新運謂徐州以上河道􅌎塞宜借撥驛逓夫役及山東河南淮揚羡餘銀兩以助河工一開新河之利以備非常謂自膠州由新河以逹滄州僅百七十里中間不通者惟分水嶺十五里耳宜疏鑿新河以省漕運之費工部請下所司勘處報可十二月辛丑漕河工完詔陞總理河道右副都御史曽鈞為工部右侍郎兼右僉都御史視職如故仍令禮部祭告河神明世宗實録是年七月河趨東北叚家口則分六股為大溜溝小溜溝秦溝濁河胭脂溝飛雲橋皆由運河至徐入洪又分一股由碭山堅城集下郭貫樓散五小股為龍溝毋河梁樓溝胡店溝亦從小浮橋入洪續文獻通考明世宗嘉靖三十三年三月丁已議開膠萊新河遣雲南道監察御史何廷鈺賫敕視之五月戊午廵按山西御史宋儀望請疏桑乾河通宣大糧餉言桑乾河發源於金龍池下甕城驛古定橋㑹衆水東入盧溝橋一千餘里在大同則卜村稍有亂石在宣府則黒龍灣有石崖頗險其險與亂石不越四五十里水淺處亦深二三尺誠疏鑿之為力甚易當時撫臣侯鉞嘗駕小舟至懐來過卜村踰黒龍灣坦行無虞又自懐來載米三十石逆水而上竟逹古定橋則河足便漕有明徴矣時朝廷新行穵運之法山谷﨑嶇率三十石而致一石部臣謀所以易之未得其便及儀望疏下兵部任其可行且稱都御史趙錦嘗使人從桑乾河水行千里直抵大同城下若稍加疏鑿不惟通漕且因可以捍虜詔㑹工部計之工部謂逺河重役請俟詳勘舉行遂報罷六月壬申詔復設管河郎中一員於江南既而罷之初漕運侍郎鄭曉奏糧船過淮愆期皆坐鎮江以南内河淤阻之故乞特遣一部臣督帥有司疏通河道章下工部議以為便從之吏部因言江南舊有水利郎中一員兼管鎭江運道後因權輕不便鈐轄乃以其事專責之廵撫今復設部官他日又將以為不便矣上曰管河郎中既有前旨裁革罷勿遣其經理河道事宜仍責成廵撫如故七月丙午以乆雨通惠河水溢命有司修築閘壩堤岸明世宗實録制宋儀望請開桑乾時司馬聶豹言河成便漕兼敵騎司空歐陽必進言道逺役重遂報罷两人意見之不同如此明世宗嘉靖三十四年二月癸酉朔罷開膠萊河議先是御史何廷鈺請疏濬新河詔遣廷鈺往㑹山東撫按官勘報至是言膠萊新河一帶係元人巳開故道特因馬家壕南北長四里内有石岡難鑿而止前海道副使王獻曾鳩工聚財焚以烈火鑿通此濠隨於分水嶺南北河道併力挑濬設立閘座八處工已十之三四尋以本官遷去工竟未就即今此濠舊迹猶存特兩岸沙土日乆頺下遂致􅌎塞挑濬亦不甚難至於分水嶺地夲髙阜故白河之水至此分流然度其地勢終不甚峻今在南者為積沙所􅌎水惟北流若加開濬深廣中間雖有碙灘諸石亦是人力可施司道諸臣稱舊估二百七十餘萬恐必有増減其委官通判羅士賢等所估亦稱一百六十萬兩臣雖心計不足竊欲估如士賢所擬數三分之歲給一分年終總挈工費幾何而次歲固可定矣其通海一節則中間地勢既髙若必使兩潮兩接須濬深及八九丈恐海濱之地鑿下數尺水泉溢出人無所置足勢必難成而所費真不下數百萬矣計惟一意引河添設上下閘座疏理各處泉源隨宜因勢而為之雖未免重費而視鑿通兩河猶為稍省第現河之流不雨即涸而白河其流亦微遇夏秋水泛則二河自合而沙恒多其膠河無沙視現白河源亦稍盛顧又在分嶺以北不逹於南張魯河雖無源而中有泉亦必從東都泊之地引之計二十餘里然後可通沽河水勢大而沙尤多若於吳家口閘之下因小派而引之可以濟南行之水但恐沙隨水走河益深􅌎蓋新河原係人力所開南北俱潮水所入之地惟其勢不甚峻故水泛不甚衝決而水因潮逆則沙雖隨水泛而流亦因水緩而停必湏歳歳挑浚而後可此司道諸臣所慮泉源不足者臣意於疏理之時廣加尋引而於王副使所設八閘如陳村楊圈已損壞者興而葺之其餘完存者添而修之及膠河等處之口亦添設小閘大約共計大小十三四座所增既密啟閉以時自足濟用若猶慮水微閘小不足恃則如委官築壩之説亦可瀦蓄不洩諸臣乃復慮山水驟發衝激之虞及出入河海船隻搬剥慮患計費至此可謂纎悉無遺矣至於南北兩海臣備查博訪知之頗悉在北者無風可以篙行南自淮安海口由雲梯關至馬家濠風便不過三四日之程中有鶯逰山可以灣避又沿海崖一路係行鹽地方少加疏達而行尤為穏便且新河南北迂廻計二百四十餘里俱挑深廣為力固難然不計工費而為之則亦無不可成者其所難者如諸臣之慮所引泉源恐或未足歳加挑濬其費不窮兼之此時南北兵革未寜而近日災傷尤異常時工役今且暫停此役一興雖假以三年之從容亦湏毎嵗給以銀兩五十餘萬當此財力詘乏之時何從出辦又况開河建閘所費已百萬以上之財而三四次轉剥必湏多造船隻費益無所出東土窮荒公私俱竭此河若開又必循㑹通河設官編夫體例方可永乆通行不無愈增虧損此則又當相時審力而處之者也乞下工部酌其行止焉得旨報罷丙子總督薊遼保定軍務都御史楊博疏請開密雲白河以濟糧運於楊莊地方築塞新口使白河之故道疏通與海潮之水合而為一仍於密雲城西修築泊岸以防城墉崩塌之患從之明世宗實録明世宗嘉靖三十七年淤新集趨叚家口析為六攴入運河又由碭山趨郭貫樓析為五支出小浮橋㑹徐州洪明㑹典明世宗嘉靖三十八年十二月乙丑先是廵撫遼東都御史侯汝諒以遼東大饑議開山東之登萊北直隸之天津二海道轉粟入遼陽部臣以海道迂險行令覆勘既而汝諒勘上天津入遼之路自海口發舟至右屯河通堡不及二百里可逹遼陽中間若曹泊店月沱桑陀美女墳桃花島咸可灣泊各相去不過四五十里可免風波盜賊之虞請動支該鎮賑濟銀五千兩造船二百艘約每舟可容粟一百五十石委官督發至天津通河等處招商販運仍令彼此覺察不許夾帶私貨下户部議覆據勘天津海道路近而事便當如議行第造船止湏一百艘令與彼中島船相兼載運其登萊海道姑勿輕議以啟後患從之明世宗實録嘉靖中河道都御史王廷奏畧曰宋禮陳瑄經營漕河既巳成績乃建議請設水櫃以濟漕渠在汶上曰南旺湖在東平曰安山湖在濟寜曰馬塲湖在沛縣曰昭陽湖名為四水櫃水櫃即湖也非湖之外别有水櫃也漕河水漲則減水入湖水涸則放水入河各建閘壩以時啓閉故問刑條例一欵凡故決盜決山東南旺湖沛縣昭陽湖蜀山湖安山積水湖各隄岸為首之人發附近衛所係軍調𤼵邉衛各充軍此見在條例可考仰測累朝嚴禁之意豈不知各湖可蠲以與民以取征賦之入哉蓋以利有大於此慮有逺於此者不可以小害大以近妨逺也昔人云事有煩而不可省費而不得已者正今日湖地之謂耳臣近廵歴泰安寜陽等處竊見漕河所資止泰山諸泉自新泰萊蕪等縣經流汶上故曰汶河雖以河名而實諸泉之委匯也然諸泉之水濬則流不濬則伏雨則盛不雨則微故汶河至南旺分流南北則水勢益小非有閘座以時蓄洩則其涸可立而待也毎年春夏之交天旱水涸而阿城七級之間如置水堂拗之上舟膠而不可行非借安山等湖之水以濟縴挽即進鮮船隻亦不能依限入京矣故宋禮諸臣議設水櫃者誠有見於此耳計今一百六七十年為國家乆長之利豈其微哉今四湖俱在而昭陽湖因先年黄河水􅌎平漫如掌已議召佃而安山南旺二湖不知何時被人盜決盜種認納籽粒以致河乾水少民又於安山湖内復置小水櫃以免淹漫遂致運道枯澀漕輓不通嘉靖十二三等年加以黄河南徙兩洪水澀其時在朝諸臣講海運則迷失其故道修膠萊河又徒費而不成上厪皇上宵旰之憂敕遣兵部侍郎王以旂往視漕河并為經理以旂至此訪究弊源建議修復官湖築堤岸建水門閘座以圖永乆素嘗盜種盜決之民盡行問遣驅逐不許佃種以啟弊端題奏欽依施行迄今漕河無阻然自官湖議復後而東平汶上之民垂涎湖地何嘗一日忘情哉今據各官開報之數湖中水落露出髙阜地土止四百四十三頃非不可以召人佃種但成事不可破巨方不可開且小民奸頑日甚惟欲利已罔知國法頃者議復官湖已嘗懲創恬不知畏若再奉例召令佃種辦籽粒則將一家開報數名占種不計頃畆遇水發入湖恐傷禾稼必盡決堤防以滿其望是所名水櫃者將來為一望禾黍之場耳而漕河何所賴哉今山東地方鄒滕沂費泰安等州縣即東平汶上之間抛荒地土不知幾千百萬頃即安山湖外荒地亦不知幾千百頃而東平汶上之民必欲舍彼而就此者以民田納糧養馬當差寜抛荒而不顧湖地止認納籽粒更無别差期必種而後已况未必皆貧困之民也昔東平民曾以安山湖地投獻德府隠占地畆莫能誰何後被查出方歸於湖且安山湖舊稱延袤百里今止量七十三里以此推之寜望其辦納籽粒保全湖堤耶今據郎中汪泓主事陳南金嘉靖三十六年任並見山東全河備考召納過人數計算每畆照今例五分止得銀六百兩有奇若盡湖中髙阜地止得二千二百兩有奇亦非有大利也今每年河漕轉輸四百萬石之外輸將於京師者又不知幾千百萬焉則其利孰多孰寡而京儲與邉餉孰重孰輕此不較而知也萬一湖水告竭漕河失利臣恐所得不償所失而其為費又不知其幾往年山東議開膠州河布政司即議費銀六十萬兩又未必其能成也今之欲種湖地者乃倡為水入而不能出之説臣近親厯各湖湖髙於河殆六七尺春夏水涸每借各湖之水以濟河漕況各湖原設水車各三百五十輛若遇盛旱亦令車水以濟奚謂入而不出乎臣又覽觀地勢詢訪民謡湖櫃之設不但漕河有利而庶民亦有賴焉蓋泰山以西地漸窪下夏秋水𤼵俱奔注此中宋末嘉祥鉅野曹濮夀張之間遂成巨浸是以有梁山水泊之亂今東平去梁山不逺而水既入湖湖外皆納糧民田也若堤防稍廢則水將漫衍淹没而嘉祥鉅野曹濮夀張之間又成巨浸矣是所利者止數百家而所害者將幾千百萬家及數州縣也事有召釁法有啓奸不尤可慮乎此就其害於下者言之耳若湖廢河乾漕運不通其所關係尤重且大又不可不深慮也北河續記山東水櫃原以蓄洩濟運遇有􅌎淺即當開浚深通復其舊界無如濵水之民貪利占佃庸吏槩令陞科水櫃盡變民田以致潦則水無所歸汎濫為災旱則水無所積運河龜拆大為公私之害不獨山東為然如淮北之射陽湖江南之開家湖皆水櫃也今盡行陞科蓄洩無繇官民交困為水官者有能知其所以然之故乎或曰然則陞科不可行歟曰陞科原上為朝廷增賦才吏之所為也而於濟運之處獨不可明成化中杜謙以工部侍郎行河自通州抵淮揚相地勢去􅌎塞復水櫃導泉源修閘壩河乃復舊此十五字誠為治河司運者之要訣矣匪但水櫃即黄河淤灘亦不可陞科昔髙御史明曰河徙無常稅糧不改平陸忽復巨浸常稅猶按舊額民何以堪旨哉言乎或曰然則將聽其棄為汙萊歟曰此又不可不若仍為官地責令汛官廣植榆栁蘆葦之𩔖歲收其材以為河工之料不亦利乎夫陞科之法斷不可行於兩河之間其為利甚小而其為害甚大也鄭元慶今水學明世宗嘉靖三十九年九月壬辰大同廵撫李文進奏大同邉儲缺乏米價翔貴乞開桑乾河以通運道自大同縣古定橋至盧溝橋務里村水運五節計程七百二十七里陸運二節計程八十八里總該造船二百六十隻置驘三百五十頭夫役一千三百四十餘人官十九員春秋二運可得米二萬五千餘石日乆大通貿易寖廣公私俱利又盧溝迤南逹天津另造淺船運米百石者改小灘兊運由天津逕逹盧溝橋務里村交兊尤為省便仍乞倣通恵事例於務里村青白口等八處建公廨倉厫以備撥運堆積工部議覆本河不係長河泛溢則迅激難制乾涸則一葦不通又多山石阻礙每議輒止今撫臣既有成畫當令如議舉行如有窒碍亦當從實奏罷上從部議明世宗實録徐九思貴溪人歴工部郎中治張秋河道漕河與鹽河近而不相接漕水溢則泛濫為田患九思議築減水橋於沙灣俾二水相通漕河溢則有所洩以入海而不侵田少則有所限而不至於涸工成遂為永利遷髙州知府明史稿嘉靖四十三年髙郵河堤議用石河道都御史陳堯謂石取道逺而河勢薄不至嚙多樹朩隔以板茭土實之費率省半及萬厯中卒易以石費不貲於隄不足有無大半實用事者槖余親見之如樁木估用杉則以堤楊代之採石不及十一而賦民輸辦凡中戸以下階砌及市廛石塊無得免者零星凑成不乆即潰湧幢小品行水金鑑巻一百十六
