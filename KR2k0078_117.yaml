body:
  text: 行水金鑑卷一百十七江南按察使傅澤洪撰運河水明世宗嘉靖四十四年郭貫樓􅌎遂決華山出飛雲橋截沛以入昭陽湖北泛湖陵城孟陽泊至榖亭南溢於徐命官往治乃接六年所鑿故迹役夫浚之為南陽新河又疏舊河自留城至境山又堤馬家橋遏河流之出飛雲橋者使盡歸秦溝魚沛橫流始絶唯茶城時有淺阻明會典是年秋七月河盡北徙決沛之飛雲橋橫截逆流東行踰漕入昭陽湖泛濫而東平地水丈餘散漫徐邳沙河至二洪浩渺無際而河變極矣初漕渠左視昭陽湖其地沮洳去河不數十里識者危之嘉靖初盛應期督漕議鑿渠湖左以避河患朝廷從之鳩工未半為異議所阻至是漕湮以吏部侍郎朱衡出督濬鑿衡與僉都御史潘季馴尋應期所開故道以為運道之利無逾於此疏請鑿之開新河自南陽逹留城百四十一里濬舊河自留城逹境山五十三里役丁夫九萬餘八月而成而水始南趨秦溝明紀事本末是年總河朱衡奏略臣初至沛縣乘舟遍歷黃水無處不漫獨南陽河口直抵留城一帶黃水少浸先年曾挑間類河形臣於彼時竊已在念猶冀水消工畢再行詳勘處理詎意運河漫水未消黃河又難分導則於此地應亟勘理臣即與河道都御史孫愼漕運都御史馬森山東巡撫户部左侍郎霍冀河南巡撫户部右侍郎遲鳳翔又委郎中程道東主事李汶吳善言王纘宗副使梁夢龍徐節張任胡湧參政熊桴僉事劉贄等前往南陽留城一帶相勘隨據道東等呈稱遵依踏勘南陽閘起至留城一帶新河計一百四十一里八十八步先年曾挑間類河形須加創挑方可成河隨委鄒縣知縣章時鸞濟寧衛指揮李肇芳等即日帶領吏書及慣熟知地人等勘得上自南陽閘起至新莊橋六十里下自滿家橋起至留城四十里中假新莊橋至滿家橋四十里尚未成河合用人工挑挖方可通水又勘得三河口沙河一道每年山水大發應築壩堵塞為防水患東有薛河中有趕牛溝上有山東滕縣關橋諸泉發源水向西行出金溝今議於兩岸築壩二道引水入河接濟共算挑土三十四萬九百一十方該用夫六十八萬一千八百二十工又勘得地形北髙南下水易傾泄合於沙河兩崖等處建閘六座修築兩崖堤岸及打壩補塞缺口為照國家重務莫切於漕運妨運莫重於黃水黃水之性湍激浩蕩難以禦治即或治之而工費不資况其變遷無常屢為運害如嘉靖六年決於沛縣十三年決於魚臺縣皆旋挑旋淤迄無成績今歲黃水復決徐沛泛溢運河􅌎連百里至今水尚未消工難措手驚惕於中莫知為計蒙委遍歷踏勘看得此地兩岸形髙土俱堅實三十餘年黃水不侵雖今歲水勢瀰漫亦未侵及况河路徑直挽輸更便成功以後可保無虞實天留此以貽國家億萬年通漕之利者也臣看得黃河上源既難分導水勢散漫不能施工雖湖坡之水暫藉行舟然乾涸無常終不可恃來歲糧運實切隱憂反覆思維計無所出所據勘議開通新河以便轉漕委宜亟處臣即與河道都御史等前往南陽留城一帶看得此處地逺黃水可免侵􅌎人力堪施開挑成河不惟近可以濟來歲之運而又逺可以垂無疆之休此實我皇上至德潛孚精誠昭格天啓其機地顯其靈載觀人情僉謀允協臣願督率羣工於此效力務期一勞永逸少申微臣體國之念以仰答皇上知遇之恩北河續記舊河自南越沛縣上中下沽頭等閘處今􅌎平是年黃河水異常郭貫樓􅌎平全河逆行泛濫自沙河至徐州全河俱入北股至曹縣棠林集以下向北分二股南一股繞沛縣戚山楊家集入秦溝至徐北一股繞豐縣華山向東北由三教堂出飛雲橋分十三股或橫截或逆流汪洋入運河至湖陵城口散漫湖坡逹徐南河全考黃河泛徐州將溜溝以上運河􅌎凡一百六十餘丈以下􅌎七十餘丈又自境山至茶城五里許小閘至沛金溝口一十三里許俱􅌎其沛縣黃河赤徑衝魯村淺西岸循謝家莊至上閘上淺仍東北衝由三教灣一帶一十五里盡􅌎乃以朱衡為工部尚書往治河衡議開南陽口至留城一帶新河以備運道又開留城口至白洋淺一帶舊河以接新河費銀四萬有奇粟三萬有奇功猶未就言官劾奏衡等乃濬自南陽口至仲家口俱砥績可行舟但三河口至夏村口二十餘里微淺澀是年六月黃河水發遂決長堤二百餘丈其所挑舊河與沽頭閘數里復􅌎百中橋至留城一帶新河堤又決百十餘丈及留城至白洋淺運河仍􅌎言官復劾奏通漕類編章時鸞號孟泉青陽人嘉靖甲午舉於鄉知鄒縣時河􅌎漕阻天子遣尚書朱公衡經理其事令沿河官集議公首創開南陽新河用其䇿砥績論功升兖州同知仍管河務隆慶六年九月用給事中雒遵薦升河南按察司副使督築黃河南堤往來相視不避風雨舟居經年遂中濕以病乞歸陳頥正撰章公墓志明世宗嘉靖四十五年二月辛巳遣工科右給事中何起鳴往勘河工時尚書朱衡定計開沂山一帶新河築堤於呂孟等湖以防隤決河道都御史潘季馴獨以為新河土淺泉湧勞費不資不如濬留城故道由是與衡有隙衡持前疏益堅身自督工吏卒不用命者用重法繩之時浮議籍籍有謂衡違衆自用故興難成之役以要功者有謂衡擅用腰斬截髮之刑致死萬餘人者給事中鄭欽信之上疏言狀工部覆非常之功怨謗易起請遣官勘視問新河與舊河孰便然後議衡功罪報可三月已未詔開新河工科右給事中何起鳴奉詔至沛縣勘河工還上言舊河之難復有五黃河全徙必殺上流如新集龎家屯趙家圈等處然以不資之財而投之於河流已棄之故道勢必不能一也自留城至沛莽為巨浸無所施工二也橫亘數十餘里褰裳無路十萬之衆何所棲身三也挑濬則淖陷築岸則無土且南塞則北渀四也夏秋潰潦大降濬後難保不􅌎五也新河內多舊堤髙埠黃水難侵開鑿之費視舊河為省且可逺將來潰決之患故尚書朱衡任其必可開開成運道必利而議者見謂難成亦有三焉一以夏村迤北十六七里地髙恐難接水然地勢北髙南低大約止深二丈一照水平加深夫何患水淺一以三河口積沙深厚水勢湍急不無滯阻然既建壩攔截或用石包砌每歲挑淺如例夫何患沙壅一以馬家橋兩岸築堤五里微山取土不便又水口投掃勢必不堅恐難經久然此亦在委任得人培築髙厚無必不可措力之理臣又觀居民之情在新河者則稱新河可開在舊河者則執舊河可復皆為市廛之私非為國家運道計也夫天下之事勢窮則變變則通沛縣河患至此極矣往時舊河􅌎塞未深都御史盛應期開新河垂成而廢至今惜之今黃水異常伏漕無日尚可溺於人情安土而不為通變之謀哉故臣斷以為開新河便宜如衡言開新河而不全棄舊河宜如季馴言疏入下工部會廷臣議俱合上意乃決詔勒限開新河仍不得藉口速成茍且完事七月戊午始通天津海運轉漕永平諸軍永平自庚戍邊患後燕河石門二路所增主客兵餉歲計三十萬石有餘而該郡土墝歲收不給稍稍水旱水陸絶無商販全恃穵運前巡撫都御史溫景葵遂倡通漕之議會以疾去詔繼任都御史耿隨朝勘奏及是勘上該郡有青灤二河青河為工巨不可開灤河自永平西門外經流一百五十四里至紀各莊入海自紀各莊至天津衛四百二十六里悉並岸行舟中間開洋僅一百二十里沿途有建河糧河小沽大沽河流遇風可以引避宜於紀各莊修建倉厫自天津漕粟於此卸囤轉載小舟由灤河逹之永平永豐倉力半功倍可為左輔永利部覆報可自是每歲通漕省國帑十二灤東諸邑漸稱饒阜云九月庚戍新河工成工科都給事中王元春以新河未通劾奏總理河道工部尚書朱衡幸功欲速無為國計長久意宜罷黜因請訪求元人海運故道初衡議開新河自南陽至留城凡一百九十四里有奇八月間工垂成矣祗餘十餘里未通值黃河暴漲堤岸有潰決者於是朝議紛紛謂新河必不可成元春及給事中何起鳴御史黃襄等咸請亟罷衡起鳴初主新河之議者至是亦自變其説疏俱下部覆而衡與河道都御史潘季馴以新河工告成言大幫運由境山進河過薛河至南陽出口隨處河水通滿堤岸坦平並無閡阻於是羣嚻寂然吏工二部乃覆諸臣疏謂河工既有成績衡宜留用令會同季馴悉心料理以圖永久從之十月已未詔濬豐潤縣環香河轉運太平等寨軍餉從順天巡按御史鮑承蔭奏也河濬自成化間設豐盈倉於該縣舟運粟十萬餘石貯之以便東路官軍支給倉厫及所設官攢具存乃河道堙廢舟楫不通久矣近歲薊鎮警報日棘其太平寨一路主客兵餉俱赴薊州關領如喜峯三屯等處逺者至四五百里公私俱稱不便承蔭乃查復舊河運道仍於北徐莊張官屯鴉鴻橋設三閘以瀦水云明世宗實録公念新渠在昭陽湖之東河即橫決得湖而止勢必不來規以為渠宜無河患乃決䇿奏請有詔從尚書畫公廬於河旁晝夜調度目不交睫手不停書六月正午去蓋立堤上汗流被面或深夜風雨單車小舸出入波濤衣帷濕裂又其時役夫多疾公親行其中問疾施藥與同甘苦吏人戴其恩義有流涕者聚衆十餘萬竟無他虞其明年丙寅功且就緒諸故河堤市人以渠他徙賈販不通流言新渠不便上命都諌何公起鳴往視還奏故渠難復者五詔如初議明年渠成萬艘流通頌聲大著上嘉其功賦詩四章志喜以示在直諸臣方議爵公而龍馭上升矣穆廟登極晉太子少保加一品秩留經理漕河事宜又閲歲河渠大備屬大司空缺召還掌部事于慎行撰鎮山朱公行狀衡字士平萬安人嘉靖壬辰進士明穆宗隆慶元年正月辛未吏科給事中何起鳴言按會典沿河閘壩每三處設御史一員主儹運今宜復國初之舊於南直隸浙江杭嘉湖添差御史一員給之敕書令其專理漕運其濟寧以南河道舊屬兩淮巡鹽御史帶管者并以委之鹽兊時則巡歷淮安以南水盛時則巡歷徐州以北此河道漕運可兼攝而並舉者也戶部覆奏從之四月丁未工部覆御史李惟觀奏言城河閘壩工程宜定為規制三歲一舉用省積久浩大之費廣源青龍二閘相去密邇宜令閘官兼攝并太原派閘夫之一從之五月已未河工成先是黃河決新集龎家屯等處泛濫徐沛間故道沮洳不可復浚尚書朱衡議從南陽以南東至夏村及東南至留城凡一百四十一里故都御史盛應期所鑿河形在焉又其地髙阜黃河即至昭陽湖不能復東乃鑿舊渠因深廣之引鮎魚諸泉薛沙諸河注其中壩三河口疏舊河築馬家橋堤遏河之出飛雲橋者使盡入秦溝自留城至赤龍潭又五十三里凡為閘八減水閘二十為壩十有二為堤三萬五千二百八十丈有奇石堤三十里已而鑿黃家口導薛河入赤山湖鑿黃甫導沙河入獨山湖凡為支河八旱則資以濟漕潦則泄之昭陽湖由是運道遂通癸亥總河尚書朱衡言河工告成宜分官督理黃河上自曹縣直抵豐縣堤界新河自南陽起至宋家口可屬之山東驛傳道自宋家口而南及黃河自豐縣堤界而南可屬之徐州兵備道其預防黃河繕理新河事宜皆聽計畫合用夫力黃河得調閘溜淺夫新河得調曹單等縣堤夫互相協助其扣貯山東漕河徭夫工食及河道銀兩有事許呈請支費諸管河官員悉聽二道委用又請於曹縣上下築縷水壩修掃臺以防秋水衝決之患其工費於兩淮工本銀及山東河南料價支給上皆從之詔運船過臨清免其帶磚以漕軍重困也甲子總理河道尚書朱衡條議新河應舉事宜一改移官夫議以舊河謝溝等八閘官夫改撥新河留城馬家橋滿家橋夏村宋家口楊莊西栁莊西馬家口八閘應役其沛縣宋家口北入山東界中宜割屬濟寧主事滕縣西栁莊南入直𨽻界中宜割屬沽頭主事各提調兊管以便約束一建設堤夫議以新河南自留城至佃户屯北自南陽至新莊橋新築堤岸及三河口壩堰俱建鋪設夫防護修理即以舊河堤夫充役一查復淺夫議以三河口及留城以南至梁山皆有沙淺其淺夫除防守堤壩外俱應留用仍如南旺事例三年兩挑與南河徭夫并力開濬一改移驛遞議移沛縣泗亭驛遞運所於三河口山東河橋驛谷亭遞運所於南陽沛縣夫厰於河口令豐蕭等縣協濟如故一分定職掌議自宋家口以南至白洋淺屬南河郎中督理自宋家口以北屬北河郎中督理各州縣掌印管河等官悉聽察舉其沽頭分司移建夏村徐州沛縣魚臺管河官移駐瀕河以便巡視一申明漕規議令徐淮臨德管倉主事嚴限催督運船查革私載遷延希圖寄囤等弊一蠲免稅糧議新河獨山等處水占地土免其租稅及南陽一帶積水之地立法瀦水以濟運道上皆從之癸未修理普濟閘以河水衝溢也六月乙酉新河鮎魚口等處山水暴決漂沒運船數百隻人民溺死無算乙未修理河西務馬營道口等處堤岸以水災衝決也丙申敘治河功加工部尚書朱衡太子少保仍升俸一級升都察院右僉都御史潘季馴為右副都御史禮科都給事中何起鳴候四品京堂缺推用先後經理河道漕運都御史馬森霍冀遲鳳翔張瀚孫慎冀練洪朝選孟養性先後巡按御史尚德恆蘇朝宗韓君恩孫丕揚孫以仁李文續管河郎中程道東員外郎遊季勳主事陳楠李承緒吳善言副使徐節原任參政熊桴副使梁夢龍胡湧郎中李汶等主事唐練等各賚銀幣有差丙午御史劉翾奏北直隸武清縣等處山東汶上縣等處水災異常壞漕河堤岸橋閘及民間廬舍田禾甚衆請下撫按官查勘蠲賑章下所司八月癸未朔工科左給事中吳時來言臣屬者從漕河來睹記治河之事弊在議論繁而要實未審也其甚者惟新河三難之説臣請得而解之夫黃河運河故道難復無論已乃今新河以三難稱者豈不以馬家橋易淺沙河易淤薛河易衝為患哉臣以為此患在委耳源之不通委將安屬故治源者急也夫新河與青原山至近也而東兖以南費嶧鄒滕之水注焉以一堤而捍羣流又當大山㵼下之勢與素號瀦水之區能保其不潰乎故疏濬分殺之謀宜豫也夏村迤邐數十里地勢居髙必導水於薛河非開支河引薛河上流以分其派及三河口鮎魚泉諸地鑿口築堤益以啓閉之閘能免衝決淤塞之虞乎故蓄泄之計宜慎也願自今以河渠事命憲臣一人與藩臬之佐一人專之罷濟沽南旺部臣之分理者上然其言命尚書朱衡計處以聞甲申南京工科給事中張應治等言近日三河口之決以新渠地髙不能受汶泗滕薛諸水故一遇霖雨至於潰溢而工部尚書朱衡故多大言功不補患昔既棄彼三河而為大河波及之區今又穴此一溝而萃全兖合流之水咎有所歸宜加罰治得旨降衡俸一級仍令悉心經理以圖後效十月總河尚書朱衡請於東邵開支河三道以泄河流又於東邵之上别開支河歷東倉橋以逹百中橋鑿豸裏浦諸處為渠使水入赤山湖繇之以歸吕孟湖下景山而去至沙河水築壩於支河之下令水繇此以出鮎魚泉而於泉之對河開塘築堤以納其流而殺其勢因言楊莊南陽佃户屯留城諸閘或宜改建或宜修理俱必不可巳之工而有司多不得人如徐州守鄒臣督建為馬家橋閘旋就傾圯宜重懲之上從其言下撫臣巡按御史按問且誡治河官以實心幹理毋蹈前轍已丑工科都給事中馬成能言臣從新河所來相度南北地勢可慮者有三一新河自南陽而下至鮎魚口與三河口地形俱髙水以平流積滯之故漫溢四野致奪樹藝之地又諸閘半就淹沒而長堤崩潰未已此上流之患可慮者也一三河匯萬流以西注既湍悍難制而其下達新河猶髙屋建瓴衝擊彌甚故泥沙填壅之區潦則懼衝旱則懼淺此中流之患可慮者也一夏村以南諸閘水勢髙下相懸幾及一丈啓閉之節蓄泄為難此下流之患可慮者也以上三患皆繇三河上下地既居髙水復平衍雖目前告成宜逆為未然之備上以其疏示尚書朱衡令熟計以聞明穆宗實録按三河口在滕縣西南五十里以上源薛河沙河趕牛溝三處之水俱由此會故謂之三河口本年三河口復􅌎乃於薛河則築王家口壩豸裏溝等壩開支河引水由吕孟湖出地濱溝於沙河則築皇輔等壩開支河引水會趙溝等泉出滿家湖坡入南陽湖建閘九座一名利建屬北河其珠梅以南八閘屬夏鎮壩十三處又薛河口石壩一座南陽湖石堤三十餘里減水閘一十四座南河全考明穆宗隆慶二年十月庚辰總河尚書朱衡奏言黃甫東邵宋家口王家口至豸裏溝續挑支河四處皆係納糧民地乞行履畝除豁或將昭陽湖官地及􅌎平舊渠償之人夫量免雜差一年又近河州縣勞役三載如山東之濟寧滕嶧魚臺滋陽鄒平隂巨野宜分派靜德等州闊布東平等州存留米一二年而南直𨽻之徐邳沛三州縣亦宜寬惜部覆從之癸巳巡按浙江監察御史蒙詔條議四事一河工既成請悉按民田受患者獨山以南自湖陵城至回回墓薛河新改支河自王家口至吕孟湖宜設法開導使水有所歸不重為民害其三河壩堰功緒初成當倍加葺濬預為久逺之謀一寶應湖風濤叵測往往有沉覆之虞宜如髙郵康濟河故事别鑿一河以近隄民田為之使之計畝受值免其征稅一髙郵康濟河故有木匣涵洞相旱潦為啓閉之節今歲久浸廢加之節年大水衝齧內外堤僅如一線宜及其未敗以次經理一徐吕二洪相距二舍事務可以兼攝宜罷徐州部使令吕梁分司總之且汰各閘官夫之虛設者工部覆奏詔如議行巳而工科都給事中孫枝言比來江淮諸郡蕭然煩費不任興作即欲如詔議開寶應越河以避險阻亦當俟國用少裕徐為之圖上是之明穆宗實録行水金鑑卷一百十七
