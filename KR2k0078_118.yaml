body:
  text: 行水金鑑巻一百十八江南按察使傅澤洪撰運河水明穆宗隆慶三年三月戊辰裁革山東利建魯橋棗林新閘師家莊各閘官一員及各處閘夫溜夫泉壩夫淺鋪夫停役夫共六千餘名時新渠既成都御史翁大立乃建議請裁冗費以便民而尚書朱衡上其奏曰今運河自魚沛一帶乃元人故道而我成祖命先臣宋禮濬治之於時測量水平計濟寜平地視徐州境山山頂相準北髙南下懸至三十丈故魯橋閘以南稍啓立涸自徐州至濟寜往往待水須半月始逹雖屢議增閘添夫猶不免膠淺之患蓋東兖之民苦於力作者百六十年於兹矣屬者改鑿新渠舍卑就髙因之逺避黄流而地形平衍泉源宻邇異時舊河之陡駛今皆無之是以自楊莊閘迄新店閘俱不事啟閉舟楫日行可百餘里即徐州至濟寜度不過三四日止耳而濟寜以北舊渠之水亦遂停蓄不竭故閘官與各夫徒株守河濵漫無事事請如大立言罷各官之虛設者以所汰夫役僦直悉改編銀差徴解東省用儲河渠之費報可四月丁丑總河翁大立言新河之成勝於舊河者其利有五地形稍仰黄水南衝一也津泉安流無事隄防二也舊河陡峻今皆無之三也泉地既虚黍稷可藝四也舟楫利渉不煩牽挽五也顧道路之言或稱未便者以魚臺滕沛沮洳成湖谷亭沽頭市㕓失利乃倡浮言以揺國是耳臣請以一得之慮熟陳於前夫漕河故資泉水而地形東髙西下非有湖為之積瀦則涸故漕以東皆有水櫃非有湖為之宣洩則潰故漕以西皆有水壑此先臣宋禮之紆畫蓋殫悉獨到者今新河寔師其意遇黄流逆奔則以昭陽湖為散衍之區遇山水東突則以南陽為蓄瀦之地慮不可謂不周矣然水有歸壑堤始無虞宜大興人卒繇回回墓一帶開通以逹於鴻溝令谷亭湖陵之水皆入昭陽湖又引昭陽湖水沿鴻溝以出留城其湖地退灘者盡上腴之田按之可得千頃令民得種藝其中計畆出賦以供河渠之費計無便於此者上從之閏六月丁夘總河翁大立言薛河之水夙稱湍悍今盡注於郗山湖入㣲山湖以逹於吕孟湖此尚書朱衡經理之績也惟吕孟湖之南為邵家嶺黄流填閼地形髙仰以故秋水時至翕納者小而反浸淫平野奪民田之利又微山之西為馬家橋屬者草創一堤以開運道土未及堅而時為積水所撼以尋丈之址二流夾攻慮有傾圮宜鑿邵家嶺令水由地浜溝出境山以入漕河則湖地可耕河堤不隤而更於馬家橋建減水閘相旱澇以為啟閉之節斯通漕之長䇿也上採納之九月癸酉總河翁大立言臣按行徐州循子房山過梁山至於境山入地浜溝直趨馬家橋上下八十里間可别開一河以漕其利有十自秦溝濁河至徐州洪諸狂瀾激湍逺不相渉一也依山為堤雖有洪濤必不泛濫二也漕舟循堤而上牽挽不難三也無茶城淤淺之患省盤剥之費四也由馬家橋至境山四十里由境山至徐州洪四十五里視舊河為近驛逓夫價並可減省五也驛路改從新堤往來徑㨗六也徐州募夫可併吕梁二洪徭夫可遂裁革七也計沛縣六舖至境山築堤百里當用銀十三萬有奇今開新河則長堤可緩費益大省八也糴榖貯食假工役以濟饑民兼節財賑荒弭盜之術九也棄舊河以為水壑即河決谷亭沛縣從鴻溝以泄徑從小浮橋下徐洪運道無梗十也顧其難亦有三地浜溝當築大壩接黒龍潭堤至楊山壩西當别開一道至舊河繞出茶城及開渠建閘費皆不貲此其難在工費歲屬大饑而徭夫工食往往不繼待哺之民怨讟易生此其難在工食役夫二萬仍聽畨休而錢糧不益淹以歲月必招謗議此其難在工程犯此三難以興十利臣固未易辦也惟上速集廷臣議之章下工部以大立議為便請行撫按及廵鹽官相度地形并議錢糧夫役以請從之丙子山東莒州沂州郯城等處水溢從直河出邳州人民溺死無算河道都御史翁大立以聞都給事中嚴用和言淮安徐邳皆輸糧咽喉壅淤潰決運道為梗關國計不細疏濬修築之務不可不亟宜令趙孔昭及翁大立協心共濟不得廢事失時工部覆如用和議且言淮安湖陂故有大堤往時商人決以逃稅故多水患宜及今修築今河決草灣北合鹽河至海州入海亦可疏濬以殺水勢并行二臣㑹勘興工從之十二月丙辰時淮河自板閘至西湖嘴開濬垂成而裏口等處復塞總督漕運侍郎趙孔昭以工費不給請議處錢糧因言清江一帶黄河五十里宜築堰以防河溢淮河髙家澗一帶七十餘里宜築堰以防淮漲工部覆請以錢糧事下孔昭及河道都御史翁大立通融借助其裏口等處亟行開濬以築堰事宜及海口築塞寳應越河二事均酌議舉行從之乙丑總理河道都御史翁大立言治河之役宜以調撥夫役收發樁草屬部臣計處錢糧追徴工食屬兵備令畫地責成則河工可計日而就於是工部覆議以儀真至揚州淤淺髙郵一帶湖堤剥蝕屬淮揚兵備㑹同南河郎中儀眞主事經理以通濟閘内外清江浦上下淤淺屬淮揚徐州二兵備㑹同南河郎中清江厰主事經理以廬鳳二府協濟樁草錢糧役夫工食及寳應湖堤泗洲等處堤岸屬潁州兵備㑹同南河郎中經理以大淮兩岸沙嘴清河縣東西河堤魚溝河以下屬徐州兵備㑹同南河郎中經理以邳州沂武二河與乾河口淤塞房村及境山黑龍潭堤屬徐州兵備㑹同南河郎中管洪主事經理以沛縣三鋪四鋪大堤豐縣縷水堤接華山塞飛雲橋故道及薛河下流屬徐州兵備㑹同夏鎮主事經理以臨清萊市口尖塜集白廟兒等處堤岸屬臨清兵備㑹同北河郎中甎厰員外郎經理以内黄南樂二縣正河淤塞及小灘上下膠淺黄廬河乙家河屬大名兵備㑹同北河郎中經理以吳橋縣衝決朱官屯交河縣衝決徐家馬頭等處青縣衝決盤古口等處與滄景二州南皮静海二縣及天津衛堤屬天津兵備㑹同北河郎中經理以蒙村蔡村耍兒渡等處堤岸河西務上下淤淺屬霸州兵備㑹同通州郎中經理上皆從之明穆宗實録劉應節字子和濰人嘉靖二十六年進士隆慶初歴右僉都御史廵撫順天建議永平西門抵海口距天津止五百里可通漕請募民習海道者赴天津領運同運官出海逹永平部議以漕卒冐險不便發山東河南粟十萬石儲天津永平官民自運焉四年秋進右副都御史廵撫如故旋進兵部右侍郎總督薊遼保定軍務又建議通漕密雲上疏曰密雲環控潮白二水天設之以便漕者也向二水分流至牛欄山始合通州運艘至牛欄山以上陸運至龍慶倉輸輓甚苦今白水徙流城西去潮水不二百武近且疏渠植壩合為一流水深漕便報可明史稿明穆宗隆慶四年二月癸亥總理河道都御史翁大立言挑濬運河請發運司餘鹽銀二萬兩濟工部覆餘鹽銀係供邊之需宜量發五千兩不足於淮安揚州二府商稅及河夫樁草存留賍罰内動支詔可三月壬申工部覆御史楊家相所陳一開河道以利漕輓謂朝陽門外故有河渠雖歲乆漸湮尚可復之以便東倉之運與夫寳應湖之議開康濟河鎮江一帶之議濬淺阻填卑窪者皆通漕孔道所宜亟舉一建閘座以省耗費謂𤓰州土壩剥運甚艱莫如建閘之便又境山諸閘日就頽毁宜及時修理上命如議行四月甲子總理河道都御史翁大立奏髙郵等處湖堤剥蝕請將徐州倉現貯截留漕糧二萬六千餘石移置淮南召集饑民修築從之五月乙酉工部覆總河翁大立條陳議處河工錢糧三事一寳應河濱碧霞元君祠香錢宜擇府佐之治河者綜其出入一開新莊閘以通商船量船廣狹徴稅徑一丈六尺以上者銀五兩一丈四尺以上者三兩一丈以上者銀一兩由儀真閘者以逓減之一濟汶以北各湖地皆膏沃之土壤宜募民田作毎畆徴銀四分輸之工所從之八月庚戍詔建河神祠於夏鎮梁山各一賜名曰洪濟昭靈命夏鎭閘徐州洪主事以春秋致祭先是河道都御史翁大立欲濬治梁山河禱於神忽水落成渠可以通舟大立以為此神助非人力也請建立祠宇領於有司以答靈貺故有是命十月已酉以運河淤阻漕舟不至詔奪提督漕運總兵官鎮逺侯顧寰總督漕運侍郎趙孔昭總理河道侍郎翁大立各禄俸半年降管河郎中張純徐州兵備副使劉經緯㕘將顧承勲各一級俱戴罪管事尋以工部言純初自北河徙官而南尚未視事復宥之明穆宗實録是年七月河決睢寜縣曲頭等集數口兩分閃運道百里淤重儲船九百餘潘季馴築塞決河水歸正道儲船盡出南河全考是年九月河決小河口自宿遷至徐州三百里皆淤而坡反為河時河水横流漕舟飄損八百餘艘溺死漕卒千餘人失米二十餘萬石御史萬恭疏言河自西而東淮自南而北㑹於清河口東南入海夏秋海潮既盛河水復湧河不得入海乃流入淮淮不能容則必衝決今惟疏其下流捍其決口水將自順毋煩多謀以滋勞費科臣李貴和言河決不能轉餉請開膠萊新河以濟運其䇿又在萬恭下矣按萬恭之䇿深得河性古有分上流之説萬恭專主浚下流之議簡便可行然未有幾於海運之議蓋萬恭與貴和論皆未行也河志馮敏功字元卿平湖人嘉靖乙夘舉於鄉隆慶四年陞山東按察司副使飭徐州兵備兼治漕河甫至而河決睢寜繇白浪淺而入青陽決者六皆巨新安左右決者七差小其水不制睢寜之陸滙為湖曹口而上故河百餘里以南盡為陸淤泥半之漕艘之阻者數千計漂廬舍人畜無筭公甫至受計大吏調士民晝夜併作與其下分功任難無何決塞水就緒漕舟漸通而大風雨彌旬水暴漲諸塞盡潰湖與河一來攻邳公時按部邳下令土其門水勢重不能禦公即解衣裙囊沙而塞之諸從官吏卒市人争效公闉沙皆滿水逡廵解公乃行視諸決口皆就塞僅月餘而水復漲敗閻家口以西半戈山左右堤百餘丈公又築之自是堤土漸堅實不受侵矣㑹徐州靈璧諸邑舊堤潰公又受計大吏所獨治者南自曲頭抵青田八十里北自陸灣至吕梁四十里所與監司曹郎合治者直河以下南岸幾千丈又自茶城踰華戚山曹築單堤一百六十里以遥衛漕河之閘者諸經畫版築楗木薪土之費與䕶視斥堠約束唯公行之最精監司曹郎咸取則焉王世貞馮公傳二敏功事再見三見於萬厯年十年明穆宗隆慶五年二月癸卯户科給事中宋良佐等劾奏總理河道侍郎翁大立總督漕運侍郎趙孔昭前以治河無䇿遲誤漕糧方議薄罰不宜遽使離任俾脫後責宜罷斥以儆任事諸臣又請飭都御史潘季馴陳炌協心共濟如運到而河尚未通則罪河道河通而運不過淮則罪漕運户工二部覆請上是其言令大立孔昭戴罪回籍俟河通運完之日奏處三月丁夘初嘉靖間山東按察司副使王獻建議請循元人海運遺蹟於膠萊間開河渠一道舟繇淮安清江浦厯新壩口馬家壕蔴灣口海倉口以逹天津道里甚徑度不過千六百里又可避海洋之險業已從其議開鑿將畢㑹獻去官遂罷役至是户科給事中李貴和言比歲河決轉餉艱難請修獻遺䇿開膠萊新河復海運以濟餉道上以事體重大遣工科給事中胡檟往視之五月壬申工科給事中張博請改𤓰洲土壩為閘以便漕舟工部覆言兹議行勘已乆而所司莫為奏報此必狥私牟利之徒倡言阻撓而當事者憚於改作故議乆不決宜督河道漕運諸臣刻期㑹勘以聞有旨從之庚辰户科都給事中宋良佐以漕舟尚未抵洪入閘請嚴敕河道漕運二臣悉心經畫得旨潘季馴陳炌各務盡心幹理俾河道疏通糧運早至不得推諉誤事辛丑廵倉御史唐鍊條奏漕運事一白河沙谷等淺僅五里淺而以轉般厚費運軍不勝其苦宜令所司及時疏濬戸工二部覆議詔允行六月庚申工科左給事中胡檟勘視膠萊諸河及山東撫按議皆以為不便疏治乃奏言今為新河之議者徒指元人故渠及副使王獻臆説非能渉厯三百餘里間親覩其利害也臣嘗濬分水嶺驗問獻所鑿渠皆流沙善崩雖有白河一道徒涓涓細流不足灌注至如現河小膠河張魯河九穴都泊稍有潢汙亦不深廣膠河雖有微源然地勢東下不能北引且陳村閘以下夏秋雨集衝流積沙為河大害縱謂諸水可引亦安能以數寸之流濟全河之用則諸水之不足恃明矣或謂新河頗多積水可引用為渠不知潢潦所聚皆以下流壅滯之故設皆濬深水必盡洩則蓄水之不足恃明矣或欲引濰河之水不知濰河在髙密西去新河百二十餘里中間髙嶺甚多雖竭財力終不可濟則濰河之不可引明矣分水嶺以南至陳家閘以北至周家莊雖云邊海通潮又皆岡石糜沙終難鑿治則海水之不可逹明矣大抵上源則水泉涸枯無可仰給下流則浮沙易潰不能持乆二者皆治河之大患也故元史食貨志以為勞費而無成國初徧訪運道舍此而不顧自獻以後屢勘而不行良由於此茍率意輕動捐内帑百萬之費以起三百里無用之渠如誤國病民何臣請亟罷其事并令所司明示新河必不可成之端勿使今人既誤而復誤後人也上乃罷之令自今不必更議以滋紛擾八月丙午總督漕運都御史陳炌上疏報邳州河決漕船淹阻狀户部覆今歲漕船過淮獨早而入閘者十不及二三雖河流為梗然諸臣怠誤之罪亦不容辭乞遣風力憲臣督視以重國計㑹給事中宋良佐御史唐錬亦以為言得旨炌與總兵陳王謨參將顧承勲俱停俸戴罪管事命雲南道御史張憲翔沿河督趣之九月辛酉總督倉場侍郎陳紹儒條上漕政五事一時疏濬言京口小灘等處原設淺溜人夫宜令有司從宜督治丙寅户科都給事中宋良佐等奏國初糧運率因元故道自㑹通河成而海運始罷然而遮洋一總猶寓存羊之意至嘉靖末年科臣胡應嘉欲市恩淮大諸衛桑梓之軍建議罷廢而海運遺意無復有存者矣今河變頻仍運道屢梗宜乘此遺跡未冺之時將遮洋一總盡行議復務足原額以存海運遺意仍稍稍推拓如該總𨽻北諸衛兊北糧者令由天津入洋抵薊州頴南諸衛兊南糧者令由淮入洋抵京通仍博訪國初並海諸衛所舊制使列障聯屯彼此相望即河渠少梗而此塞彼通亦思患預防之術也戸部覆言遮洋一總先時徑渡天津海口不過八九十里今欲渉海運餉事難造次請先復遮洋一總而以良佐所上事宜下漕司詳議以聞報可戊寅戸部覆漕運都御史陳炌等㑹議漕政事宜一疏濬常鎭寜國及浙江海寜崇德等處河道仍開復練湖以濟運河之用報可乙酉山東廵撫都御史梁夢龍等上海運議曰今漕河多故言者争獻開膠河之説此非臣等所敢任也第嘗考海道南自淮安至膠州北自天津至海倉各有商販往來舟楫屢通中間自膠州至海倉一帶亦有島人商賈出入其間臣等因遣指揮王惟精等自淮安運米二千石自膠州運麥一千五百石各令入海出天津以試海道無不利者其淮安天津一道計三千三百里風便兩旬可逹况舟皆由近洋洋中島嶼聯絡遇風可依非如横海而渡風波難測比之元人殷明畧故道實為安便大畧每歲自五月以前風順而柔過此稍勁誠以風柔之時出並海之道汛期不爽占侯不失即千艘萬櫓保無他患可以接濟京儲羽翼漕河省牽挽之力免守幇之苦而防海衛所犬牙錯落又可以嚴海禁壯神都甚便事下户部覆云海運法廢巳乆非常之事難以盡復乞敕漕司量撥近地漕糧十二萬石自淮入海工部即發與節省銀五千兩為僱募海舟之資淮揚商稅亦許暫支萬五千兩充傭召水手之費從之明穆宗實録翁大立字孺參餘姚人嘉靖十七年進士隆慶二年命督河道朱衡既開新河漕渠便利大立因頌新河之利有五而請濬回回墓以逹鴻溝引昭陽之水沿鴻溝出留城以灌湖下腴田千頃未幾又請鑿邵家嶺令水由地浜溝出境山入漕河帝皆從之三年七月河大決沛縣漕艘阻不進帝從大立請大行賑貸大立又請漕艘後至者貯粟徐州倉平價出糶詔許以三萬石賚民大立以下民昏墊閭閻愁困狀帝莫能周知乃繪圖十二以獻且言時事可憂更不止此東南財賦區而江海泛溢粒米不登京儲可慮一也邊關千里悉遭洪水墩堡傾頺何恃以守賊騎可慮二也畿輔山東河南霪雨既久城郭不完猝有冦盜何以備之内地可慮三也江海之間颶風鼓浪舟艦戰卒悉入波流海防可慮四也淮浙鹽塲鹹泥盡没竈户流移商賈不至國課可慮五也望陛下以五患十二圖付公卿博議速求拯濟之䇿帝留圖備覽下其奏於所司當是時黄河既決淮水復漲自清河縣至通濟閘扺淮安城西淤三十餘里決方信二壩出海平地水深丈餘寳應湖堤往往崩壞山東沂莒郯城水溢從沂河出邳州人民多溺死大立奔走經營至四年六月鴻溝境山諸工及淮流疏濬次第告成帝嘉錫賚有差時大立巳陞工部右侍郎旋改兵部為左㑹代者陳大賔未至而山東沙薛汶泗諸水驟漲決仲家淺諸處黄河又暴至茶城復淤已而淮自泰山廟至七里溝亦淤十餘里其明年遂為給事中宋良佐劾罷明史稿明穆宗隆慶六年正月丁夘禮科左給事中雒遵條治運河五事一自茶城至清河五百五十里為運道咽喉宜修築長堤増卑倍薄三里置鋪鋪置十夫十五鋪設一官畫地而守以防潰決一自淮抵揚州一路堤岸衝決閘座廢壞者宜令補築自大江以南抵浙江水有淺澀者宜令疏濬一濟寜南旺閘河全藉洸汶二水宜疏通泉源而臨清河西務等處修濬之工亦不可緩工部覆奏上皆允行二月丁酉山東撫按等官梁夢龍等言邇因河患異常廟堂畫䇿傍海通運誠千萬年經乆之圖顧今經理之急其要有四沿海城池廢墜不修不可言備如大嵩靈山等數衛宜及時修葺以壯門户杜窺伺一也海運既開奸人或乘便通畨宜嚴諭商民不得輒私下海即下海者第行島嶼間不得逺泛大洋違者許官兵擒住二也自海禁乆弛私販極多欲驟革之則海道藉其指引即縱緩之則接引之奸不可勝詰今宜明諭商民入海者責令往回給引查銷則廵察者既有所驗而私販者難容其奸三也海運既行如利津等縣三廵檢司各有沿海信地運船往來有䕶送警備之嚴宜復廵檢司及弓兵原額四也戸工二部覆議如夢龍等言從之閏二月戊辰廵按山東御史吳從憲言淮安而上清河而下正淮泗河海衝流之㑹河潦内出海潮逆流停蓄移時沙泥旋聚以故日就壅塞宜以春夏時濬治則下流疏暢泛濫自平工部議行尚書朱衡河道漕運各都御史及時勘議從之壬申禮科左給事中雒遵㑹勘泇口河議以為不便乃言泇口河從馬家橋東過微山赤山吕孟等湖踰葛墟嶺而南經侯家灣良城至泇口鎮又渉蛤鰻周栁諸湖乃逹邳州直河口以入黄河凡二百六十里取道雖㨗施工實難葛墟嶺髙出河厎六丈餘開鑿僅至二丈硼石水泉湧出侯家灣良城雖有河形水中多伏石不可施鑿縱鑿之湍石不可以通漕且蛤鰻周栁諸湖築堤水中功費無算微山赤山呂孟等湖雖可築堤然可鑿葛墟嶺以洩正𣲖開地浜溝以散餘波要其施工又自有序夫與其煩勞厚費以開泇口之河孰若時加修防如期儹運保百數十餘年之故道疏上詔尚書朱衡㑹同總理河道都御史萬恭覆勘以聞三月辛夘工部尚書朱衡條陳經理北河八事一復舊革山東徭夫七十餘名接興河工一復夏津魚臺二縣管河主簿隨時看守修葺一清查馬場湖南旺湖南陽湖蓄水以濟運河之涸南旺西湖安山湖洩水以宣運河之溢毋使居民侵占一吕孟微山張莊諸湖為山東滕嶧山水之㑹宣洩無路衝溢稅地損傷堤岸乞建二閘以洩積水一築馬家橋東岸石堤一河南􅸄子船納稅於吕梁洪殊為不便乞改納於徐州洪一管河官不許差委以妨河務一修河築隄樁草錢糧積年逋負乞嚴有司之罰每於年終聽河道官開數具奏詔如所擬丙午總督漕運都御史王宗沐言國計之有漕猶人身之血脈血脈通則人身康漕運通則國計足我朝運河幾百六十年法度修明疏通無滯邇来事多滋弊兼以黄河泛溢數患漂流故科臣復議海運而縉紳之慮猥云風波夫風波在海三尺童子知之然其利害有辨古語云地不滿東南東南之海衆水所委渺茫無山則趨避靡及近南水煖則蛟龍窟居故元人海運多驚以起自太倉嘉定而北也若自淮安而東引登萊以泊天津兹謂北海中多島嶼可以避風又其地髙而多石蛟龍有往來而無窟宅行舟至登萊因其曠逹以取其速而標記島嶼以避其患則名雖同於元人而利實專其便易佐河運之缺計無便於此者然此猶舉時宜而言耳若語全勢則其説有三一曰天下大勢二曰都燕專勢三曰目前急勢唐人都秦右據岷凉而左通陜渭是有險可依而無水通利也宋人都梁背負大河而面接淮汴是有水通利而無險可依也若國家都燕北有居庸巫閭以為城而南通大海以為池金湯之固天造地設聖子神孫萬年之全利也而乃使塞不通焉豈非太平之遺慮乎此所謂天下大勢也夫三門之險天下之所謂峻絶也然唐人裴耀卿劉晏輩百計為之經營者以彼都在關中輸輓所必由故也若夫都燕則面受河與海矣然終元之世未嘗事河而專於海者彼終歲用兵無暇於事河也彼又以為河運入閘則兩舟難並不可速也魚貫逆遡一舟壞則連捎數十舟同時俱靡不可避也一夫大呼則萬櫓皆停此腰脊咽喉之譬先臣丘濬所憂不可散也若我朝太平熙洽主於河而協以海自可萬萬無慮故都燕之受海猶憑左臂從脇下取物也元人用之百餘年矣梁秦之所不得望也此所謂都燕專勢也黄河西來禹之故道雖不可考然不過自三門而東出天津入海是腹雖稍南而首尾則東西衡也我朝𢎞治二年決張秋奪汶入海其首猶北向乃今則直南入淮而去歲之決閻家口支出小河近符離靈璧則又幾正南矣自西北而直東南途益逺而合諸水益多則其勢大而決未可量也故以漢武之雄才尚自臨決塞王安石之精博且開局講求河之為患詎直今日然哉且去年之漂流諸臣聞之有不變色者乎夫既失利於河又不能通變於海則計將安出故富人造室必啓傍門防中堂閉則可自傍入也此所謂目前急勢也風波係天數臣豈能逆覩其必無然趨避占候使其不爽當不足以妨大計惟聖明采擇因條上海運七事一定運米言海運既行宜定撥額糧以便徴兊除隆慶六年巳有缺船糧米足備支用以後請將淮安揚州二府兊改正糧二十萬一千一百五十石盡派海運行令各州縣於附近水次取便交兊遇有災傷改折則更撥鳳陽糧米足之一議船料言漕運二十餘萬通計用船四百三十六艘淮上木貴不能猝辦宜酌派湖廣儀真各厰置造其合用料價一十一萬八千四百兩有奇即將清江浙江下江三厰河船料價并浙江湖廣本年折糧減存及湖南班匠等銀解用不足以撫按及廵鹽衙門罰贖銀兩抵補一議官軍言起運糧船宜分派淮大台温等一十四衛責令撥軍領駕毎艘照遮洋舊例用軍十二人以九人赴運其三人扣解粮銀添顧水手設海運把總一員統之其領幇官員於沿海衛所選補所須什物即將河船免運軍丁糧銀扣解置辦一議防範言糧船出入海口宜責令廵海司道等官定派土島小船置備兵仗以防盜賊一議起剥言糧船至天津海口水淺舟膠湏用剥船轉運至壩毎百石給水脚銀二兩九錢其輕齎銀兩先期委官由陸路起解聽各督糧官收候應用一議回貨言海運冒險比之河運不同旗軍完糧回南毎船許私貨八十擔給票免稅以示優恤一崇祀典言山川河瀆祀典具載今海運所畏者蛟與風耳宜舉廟祀以妥神明疏下部覆如宗沐言詔允行之四月戊辰廵按直隸御史張憲翔疏劾管理河道主事詹世用失時不修閘壩及招集客舟壅塞河口以致漕艘漂損諸罪狀得旨世用降三級調外任已夘吏科都給事中雒遵言南陽魚沛之間開濬閘河淹沒民田者數千畆往者雖有蠲賦之令而有司旋復徴稅又督責徐邳諸郡逋負甚亟民何以堪請賜民數年租稅及緩征逋賦以廣軫恤之惠户部覆用其言五月丙戍工部尚書朱衡及河道漕運諸臣㑹議𤓰州建閘事宜有五便詔從之戊申工部尚書朱衡等奏言防河如防虜守堤如守邊河南累被水患大為堤防今幸有數十年之安者以防守嚴而備禦素也徐邳為糧運正道既多方以築之則宜多方以守之因上議夫役議舖舍議定期三事自徐州至小河口新築堤三百七十里設防守夫三千七百名三里建一舖計屋三楹四舖設一老人統率晝夜廵視其期以伏秋水發時五月十五上堤九月十五日下堤願攜妻子居住者聽疏上得旨允行明穆宗實録行水金鑑巻一百十八
