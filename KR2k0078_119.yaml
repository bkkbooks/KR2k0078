body:
  text: 行水金鑑巻一百十九江南按察使傅澤洪撰運河水朱衡字士平萬安人嘉靖十一年進士四十四年進南京刑部尚書其秋河決沛縣飛雲橋東注昭陽湖運道淤塞百餘里改衡工部尚書兼右都御史總理河漕衡馳至決口舊渠已成陸而故都御史盛應期所開新河故址尚在乃定議開之築堤吕孟湖以防潰決河道都御史潘季馴以為濬舊渠便議與衡不合衡持益堅引鮎魚薛沙諸水入新渠築馬家橋堤以遏飛雲橋決口身自督工劾罷漕濮副使柴淶重繩吏卒不用命者浮議遂起明年給事中鄭欽劾衡虐民倖功詔遣給事中何起鳴往勘工垂竣矣及秋河決馬家橋議者紛然謂功不可成起鳴初主衡議亦變其説與給事中王元春御史黄襄交章請罷衡㑹新河已成乃止河長一百九十四里漕艘由境山入通行至南陽未幾季馴以憂去詔衡兼理其事隆慶元年加太子少保山水驟溢決新河壞漕艘數百給事中吳時來言新河受東兖以南費嶧鄒滕之水以一堤捍羣流豈能不潰宜分之以殺其勢衡乃開支河四洩其水入赤山湖明年秋召還部又明年衡上疏曰先臣宋禮濬治舊渠測量水平計濟寜平地與徐州境山巔相準北髙南下懸流三十丈故魯橋閘以南稍啓立涸舟行半月始逹東兖之民増閘挑淺苦力役者百六十年屬者改鑿新渠逺避黄流舍卑就髙地形平衍諸閘不煩啓閉舟行日可百餘里夫役漫無事事近河道都御史翁大立奏請裁革宜可聽於是汰閘官五夫役六千餘以其僦直為修渠費四年秋河決睢寜起季馴總理明年冬閱視河道給事中雒遵劾罷季馴言廷臣可使無出衡右者六年正月詔兼左副都御史經理河道穆宗崩大學士髙拱以山陵工請召衡㑹邳州工亦竣衡遂還朝明史稿六年侍郎萬恭更請建𤓰洲閘自時家洲以逹於花園港開渠長六里有奇其年冬閘成一名廣惠一名通惠於是五總船始下壩南河全考隆慶六年六月己已神宗巳登極矣督理河道工部都水司使署郎中事主事陳應薦奏挑挖海口新河工竣河長十里有奇闊五丈五尺深一丈七尺凡用夫六千四百八十九名支米九百六十七石八升已夘工部尚書朱衡疏報徐邳等處河堤工完并請寢泇河之議言泇口河開鑿之難有三一則葛墟嶺開深之難一則良城侯家村鑿石之難一則吕孟等湖築堤之難先是漕河淤塞損船傷米臣思前河臣翁大立請開泇河以救燃眉之患今漕河通利徐邳之間堤髙水深使歲加修葺之工自可無患固不煩别為建置况公帑空虚支費不給瀕河生靈從事徐邳之役勞者未息呻吟猶聞揆之時勢誠所弗宜庚辰定漕運程限毎歲十月開倉十一月兊完十二月開幇二月過淮三月過洪入閘四月到灣永為定例從尚書朱衡議也壬午派魚沛南陽留城等處堤木河木於各州縣仍給前築堤沿闗河所占民田價值又以獨山微山吕孟等水櫃有傷民地蠲其湖米七月丁亥初通漕運於密雲尋復密雲漕糧五萬石先是總督侍郎劉應節等言塞備以儲餉為急軍需以漕輓為便密雲一城環控白潮二水若天開以便漕者向二水分流至牛欄山始合故剥船自通州而上者亦至牛欄山止若至龍慶倉從陸輸輓軍民艱苦之狀水次露積之虞難以悉狀今白水徙流西城下去潮水不二百武前於城東北業築三合土堤障水防城近有疏渠於上塡壩於下邀潮入白合為一𣲖水漕深便剥船可逹密雲無碍漕渠既通漕額宜復八月戊寅工部言南旺三河等處三年兩挑正月興工二月告完既據河臣萬恭等議糧運既早則明春大挑之日正來年運行之時擬改九月中興工十月依限告完挑浚之時惟進氷鮮船隻設法前進其餘俱暫停止且言大挑莫便於秋冬莫不便於春間新運踵至停積河流既慮風濤又稽程限不便一均役更換夫役未集追呼號召毎至愆期不便二春事方殷民無暇力廹之工作田野不安不便三青黄未接室如懸罄頭㑹箕歛工食艱窘不便四堅氷初解時尚嚴寒驅之泥淖之中責以疏鑿之力不便五如今改擬則回空已盡築壩流絶疏浚一完藉氷封閉春融凍解溯流無碍則新運便舊夫未更按冊可籍正役者不勞再籍僱役者無事更張則徴夫便秋事完成農多暇日既無私慮自急公家則民力便今秋豐稔民多蓋藏閭閻利以供輸夫役易於徴歛則工食便天霽秋清氣候凉爽河鮮沮洳鍁鍤易施則用工便上是之十月巳未先是南京戸科給事中張煥疏論總督漕運王宗沭六月内飛報海運米十二萬石於某日由淮安次天津抵灣粒米無失比聞人言嘖嘖咸謂海運八舟米三千二百石忽遭風漂没渺無影響宗沐蓋預計有此令人齎銀三萬兩糴補臣思宗沐受國家財賦之託鋭意此事意非不良糧船有失據實陳乞未為不可何至粉飾觀聽大臣實心任事之體當不若是米可補人命亦可補耶當今之行海運譬北方之種稻始必樹藝少許以試地利何如而漸次為之可也若不論南北之髙下寒燠菽粟與稻並樹則雖三尺之童亦知稻之所獲不如菽粟之嘗多矣河運之與海運其經取乆暫之宜殆亦𩔖此來年倍加米數一節乞敕該部從長計畫疏下户部覆言先該科道請叙海運之功臣等謂萬世之利在河一時之急用海繼因漕臣議增海運二十四萬臣等謂海道風波難定但當習熟此路以供緩急不必加增今煥意畧與臣等議同至言漂没糧石發銀買補臣等不意宗沐之明逹弄巧成拙至此但事出風聞難以深求而首事勇敢之臣可以情恕以觀後效萬厯元年為始海運止以十二萬為則候數年之外另行裁酌宗沐亦疏辨臣固知駭見之難諧俗成事非易可居然不意乃懸空妄傳若此使臣有一毫不誠但為身計則按守舊規可以畢事何必更端革故力舉海運自添一事以致彈射也况海運人船募數省之人發行經數月之久按厯渉三省之途其同事而不可欺者各省撫按十數人沿海守令及䕶行守備等官百餘人官軍水手三千餘人使有沉溺豈待言官今日始言三萬出之淮庫自有巻籍人船出於僱募各有貫趾乞敕户部㑹同法司行廵按御史查核疏亦下部十一月丙申河道侍郎萬恭奏議河夫工食言二洪閘溜淺夫山東東兖二府額一萬二千七百餘名毎名工食一十二兩歳該銀一十五萬三千餘兩江北淮揚徐三府州額五千三百餘名工食八兩二錢歲該銀六萬四千餘兩各樁草銀不與焉在銀兩視舊額俱已増加在戸夫視今編悉已安便然漕糧朝廷之命脈漕河朝廷之咽喉當以朝廷之力治漕不當以瀕河之民力治漕今運道工役十倍於前民力凋敝十倍于舊竭疲民以事弊河亟宜改轍查舊議單有兊運所折耗銀有剥運所省脚價近新建𤓰閘又有所省過壩米三項歲不下十餘萬兩若悉給發以治河道可減派各疲弊府州之半工部言耗米銀後改徴本色給軍脚價除扣修通惠河餘解太倉濟邉惟有過壩餘米可歲給河道少助夫役工食報可甲辰漕運總督王宗沭奏辨海運漂没事乞囬籍聽勘户部以漕運在邇請敕宗沐矢心任事仍照原議習熟海道偹一時權宜之計從之庚戍河道侍郎萬恭條奏河漕事宜四欵一嚴遲速之令黄河伏秋水髙運船所避宜令江南糧儲道各督尾幇遵限過徐州洪勿至與怒河鬬三月過洪者以上勞叙薦四月過者次之延至五月後者議罰因而遇水漂没者從重擬議一别逺近之宜南北河道迥殊到灣之期非可槩定宜令各省運船不過閘者限二月到灣過閘限三月過閘又過黄者限四月過閘過黄又過江者限五月廵漕御史按限期行殿最焉一專兊運之權今議早運徴發期㑹急如星火監兊部臣無殿最之權有司慢而軍衛易又轉求督糧煩難兊運必致愆期宜照浙江例各省俱以御史帶理兊運則官與軍民俱便一順官民之情江南山谷州縣仲冬水涸不可以舟迨水發時兊運已緩宜從其便齎銀至㑹城市米候兊但責早兊不必問所從來農末相資官民相利兊運自早過江過淮入閘抵灣自然如期疏下户部議覆惟監兊部臣照舊恭又言春間大挑待本年之運者累朝之舊法秋中大挑待來年之運者皇上之新規今南旺一帶及三河口諸處河道九月興工十月竣事但臣所治者河耳使運船不速至將焉用河明歲全運四百萬石計船一萬艘須以正二三四月盡數過洪逺避黄水計毎月當過洪入閘者二千五百艘毎日當八十餘艘乞敕各糧儲道如期督至庶河有實用疏下工部明神宗實録明神宗萬厯元年正月乙巳河道侍郎萬恭奏創建𤓰洲二閘工完免挑盤僱剥之苦因叙郎中吳自新及道府諸臣勞績恭先又檄浚蘇松常鎮一帶河道建三汊河東水吊橋自是吳浙之運可與江西湖廣徴發相同因言𤓰閘既成商舶由壩者可去險就安應比照儀眞事例一體抽分疏下工部俱覆行之三月壬寅河道侍郎萬恭奏江南糧運開幇期於歲十二月在江楚長江大河則可至若湖浙之舟阻於京口閘必待季春開閘方可開幇今年早運者實由臣挑浚京口所致顧事必專官而後善計必逺慮而後成江南河道水利原設有都水司郎中一員後革郎中令兵備道帶管權阻於遥制力分於他務三江運道遂至湮滯今宜比照惠通北河南河事例復設郎中駐劄鎮江以其餘力兼治三吳水利工部言三吳水利積弊已極非工部郎中所能任巳責成應天廵按督理其京口閘挑浚事務仍舊分責各道而亦統領於督臣便上從部議行之戊申令昌平兵備僉事張廷弼疏濬鞏華城外舊河廷弼原勘河通可省陸運費歲八千金及運船至而淤塞不前穵運司官楊可大以為言户部奏行廷弼速濬之四月辛未河道侍郎萬恭奏事莫善於法祖法莫病於因循今年之運既得以善其終明年之運不可不慮其始祖宗以四百萬之糧兊近萬之淺船豈不知滿載省舟之為便而為是經年造船紛紛者以閘河故蓋南旺運河之春又得全汶之利故毎船可運四百石然夏旱則汶流微又不敢過四百石特為淺船之制厎平倉淺厎平則入水不深倉淺則負載不滿又為限淺船用水不得過六挐今各省不務遵原運而務搭原僱船有三害搭運有五害皆足以病河道今年賴皇上主持諸臣竭力上水諸淺深皆四尺至七尺旱枯之時幸不敗事然終非全算乞敕該部勿以目前幸濟而忽逺圖勿循今日弊端而廢祖制務足近萬之額船載四百萬之額糧盡復入水不過六挐之舊制令船力勝米力水力勝船力其僱船搭運坐困之弊一切痛革部覆從之乙亥工部請建復淮南平水閘與淺船淺夫及建天妃廟口石閘修復境山閘從之儀真建平水閘二座江都一座髙郵十座寳應八座山陽二座凡二十三座座三百金自儀真至山陽有五十一淺淺設撈淺二小船船七金淺夫十名天妃口大閘一門除堪改廢閘石料仍用二千五百金境山舊閘五百二十金凡費工料一萬餘金悉聽河道便宜酌處不煩請發閘多則水易落而堤堅浚勤則河愈深而堤厚建天妃閘則時閉時啓而省挑浚修境山閘則有留有接而省盤剥既禆運道且資民生議發於恭而衡覆行之誠萬世之利云五月乙未開通廣西府江水陸諸路巳亥漕運都御史王宗沭奏請申飭運務二事一濬河渠以利邉運言王家淺銀魚厰一帶河道淺澀難前宜令挑濬深廣堤岸卑薄者修築髙厚一造官船以便民運言白糧民船大小參差横塞河道宜依漕船式様打造官船下户部六月辛酉户科都給事中賈三近奏往因運渠梗咽當事者議復海運悉心講畫法非不周然風濤險阻終屬可虞所以歲運祗限十二萬石意正為此今聞海運至山東即墨縣福島等處忽遭異常風雨衝壞糧船七隻哨船三隻漂消正耗糧米幾五千石淹死隨軍水手十五名臣因此反覆其事海道之勢與河道異河道之可恃者常海道之可恃者暫特數百艘行數千里巨浸僥倖於暫可恃未有無虞者也海運畏途當時建議者計出於不得已始既以不得已議行則今當因可巳以議罷近漕渠一帶諸臣綜理振飭大異昔時據今年江南諸艘入閘最早即更加十餘萬何有焉世有夷途安取九折坂人有參苓薑桂可以攝生何試命烏附以茍萬一乞敕詳勘將海運姑暫停止仍以額糧十二萬盡入河運時廵倉御史鮑希顏山東撫按傅希摰俞一貫疏俱如三近指疏下户部議停之甲戍兵科給事中趙思誠奏請撫馭山東島人教習海運船卒以避風險㫖下該部七月丁酉山東按察使兼右參政潘允端條陳軍民二運事宜一議建轄以速糧運凡沿河管河官員乞聽臣兼攝庶便督責修濬及時運船不至淺閣部覆如議行戊戍工部覆御史田樂疏言四府所屬州縣頻年水災昏墊已極蓋滹沱黒洋白溝諸水㑹合經行之地下流壅塞輸洩無路一遇暴漲則卑窪漫渚方數千里田産被其覆沒臣等請勅責成二處按臣蓋水之瀦處多在順河二府水之出口多在真定所屬利不必出其土害不可委於隣令踏勘被災地方下流阻滯作何疏通上源泛濫作何約束應挑浚者浚之應堤壩者築之故道可復則復橋梁可建則建茍有利於生靈宜無分於彼此合用夫役錢糧及淤出地土錢糧應否加𣲖渰占田産賦稅應否蠲豁嚴限具奏請自上裁報可八月丁未工部奏今歲河道通利糧餉早逹乃聞茶城於八月内淤淺致回空糧船阻滯不得南還者數千隻回空之船既遲則新運之期必愆今湏晝夜疏利方保不誤兊事且茶城之淤歳甚一歳宜照舊説於境山上下髙建一閘沙灌則閉而避水積則放而衝至於徐邳一帶堤岸逼近河身土疎浪髙今秋房村之役方合迅決可為明鑑宜照原議再築遥堤凡一應河防事宜務兼聽集思紓謀逺慮求建長治之䇿勿茍目前之安報曰運船淤淺至數千隻明年糧運必致有誤便行與萬恭上𦂳設法挑浚毋慕虚聲務收實效工科署都給事中朱南雍㕘河道侍郎萬恭言防河甚於防邉為河臣者事必預報廟堂方可據以處分功必實圖國計方可藉以利濟臣備詢河務咸謂茶城淤塞二十餘里萬恭起夫數萬挑浚罔效回空糧船數千阻泊於上河者不下五十餘里幸黄水旁衝小溝恭督軍民拖拽空船從小溝出日不能七八隻正河仍未開通今據恭奏河通於九月十二日距恭具疏纔五日耳縱神運鬼輸安能於五日間盡回數十里糧船始之失事既屬隠蔽今之奏詞又屬䑃朧彌縫一時之失職僥倖後日之成功且不圖目前之難而談古法之沿革不虞上流之塞而計下流之淺深恭蓋曰河道通塞自古巳然下流俱深一淺何害又何莫非掩過倖功之心夫今歲南回之空船即明年北上之重船使茶城一日不開則空船即一日不下明年之運將有欲早而不可得者乞敕令萬恭戴罪管事悉心河務以贖前愆工部覆亦罪恭下嚴㫖切責之甲寅江西道御史盧明章奏開濬河道事宜一曰詳踏勘一曰專修理言順保河真廵按岐而為二兵備分而為四勢既不相統屬議自不能通融其兵備及州縣正官方在開濬忽令遷轉不惟本處工程不完即上承下接均有不便功何由成宜差司官一員駐劄通中地方同各州縣正官細加踏看預定河身凡干係開河兵備州縣正官及承委官員俟工有次第方得循資遷轉工部以司官權輕仍守前議而請停遷各官以便責成上是之辛酉工部奏明年春照例挑浚天津衛海口新河恐礙運艘也九月庚寅户部覆漕運都御史王宗沐議覆遮洋總言國初海運歲運七十萬石以給遼海後㑹通河成海運遂廢然尚留遮洋一總原有深意至嘉靖末給事中胡應嘉建議裁革并入山東江北諸總前制盡罷應嘉以鄉土之故忍變成法有識者未嘗不扼腕而歎近因河道淤阻當事諸臣復起新議勞費更多海運二年道路稍諳今雖議罷宜查復遮洋一總即改海運把總為遮洋把總領兊河運北糧仍知㑹兵部海汛有警暫調海口為狼山聲援從之十一月壬午河道侍郎萬恭奏江南運道延袤八百餘里毎歲夏初開運河水充溢運道無虞今改於年前十二月開幇正屬各河淺滯諸壩斷流京口封閉之候挑浚工費動以數萬計仰給扵導河銀是以杯水救車火且病農派夫扵丁田則病民借辦扵舖行則病商取給扵協濟則病隣俱屬偏枯非乆計也查江南漕運幾二百萬石毎石舊帶徴僱船脚米七升近𤓰洲建閘運船徑抵水次交兊此米遂蠲宜仍毎石徴一升歲折銀一萬兩查各府河務輕重分發收貯名曰運河銀凡運漕渠挑淺築堤建閘修壩僱募夫役買辦什物一應工費悉扵此項動支應用分毫再不干擾農商貽累隣境以𤓰閘所省江南之費為江南運道通融之用似為長便下工部覆行之明神宗實録王宗沭字新甫臨海人嘉靖二十三年進士厯山東左布政使隆慶五年給事中李貴和請開膠萊河宗沭以其功難成不足濟運遺書中朝止之拜右副都御史總督漕運兼廵撫鳳陽極陳運軍之苦請㫖優恤又以河決無常運道終梗欲復海運上疏曰自㑹通河開濬以來海運不講巳久臣近官山東嘗條斯議廵撫都御史梁夢龍毅然試之厎績無壅而慮者輒苦風波夫東南之海天下衆水之委也茫渺無山趨避靡所近南水暖蛟龍窟宅故元人海運多驚以其起自太倉嘉定而北也若自淮安而東引登萊以泊天津是謂北海中多島嶼可以避風又其地髙而多石蛟龍有往來而無窟宅故登州有海市以石氣與水氣相搏映石而成石氣能逹於水靣以石去水近故也北海之淺是其明驗可以佐運河之窮計無便於此者因條上便宜七事明年三月遂運米十二萬石自淮入海五月扺天津叙功與夢龍俱進秩賜金幣而南京給事中張煥言比聞人舟漂没失米三千二百石宗沭預計有此私令人糴補夫米可補人命可補乎宗沭掩飾視聽非大臣誼宗沭疏辯求勘詔行前議習海道以備緩急未幾海運至即墨颶風大起覆七舟都給事中賈三近御史鮑希顔及山東廵撫傅希摰俱言不便遂寢時萬厯元年也明史稿運河一帶平江伯陳瑄用力於南工部尚書宋禮宣勞於北禮用臨清知州潘叔正之言其言本之老人白英言築壩戴村亘五里遏汶水至南旺分析兩河以其七北注臨清度地降九十尺閘十七三南注豐沛度地降百十六尺閘二十一禮没後至萬厯元年總河萬恭追頌其功立祠贈禮太子太保一孫入監白英先以平頂巾執工簿立于傍亦賜冠帶坐世令一人充冠帶老人管河夫坎河之灘湧幢小品行水金鑑巻一百十九
