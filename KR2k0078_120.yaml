body:
  text: 行水金鑑巻一百二十江南按察使傅澤洪撰運河水明神宗萬厯二年六月丁未調河南左參政馮敏功扵山東七月癸巳吏部候選歳貢生員許汝愚上言東南運道水勢之澀莫甚於丹陽地勢之髙莫甚於夾港國初於此置為閘者四曰京口曰丹徒二閘居上以防三江之易涸曰呂城曰奔牛二閘居下以防五湖之易洩自丹陽起至鎮江蓄為湖者三曰練湖曰焦干曰杜墅以濟漕河之用遂免海運之艱以故四月交兊五月過淮維時雨澤大降江潮盛行不假湖水亦足以濟歲久延襲居民侵為田畆焦杜二湖俱為平陸僅存練湖猶有侵者而四閘俱空設矣今改為十月臨倉雨澤既少江水枯落不免剥淺纔數十里之區有閱三四月而不得盡逹於江者雖添設儹運枉費推挽而開河之議起矣夫夾港兩岸髙者數十丈而河僅闊數丈許下之開鑿愈深則上之坍塌愈速頻冬役民以浚之春來淤塞如故年年興此大役民何以堪為今之計莫若修三湖之故址就四閘之完基蓄洩以時下修呂城奔牛二閘以時糧運之入上修京口丹徒以時糧運之出况乎上流既溢則奔牛而下又何不通之患哉破此説者必以淹沒民田為辭不知前此占湖為田今仍舊修葺非廢田以為湖也即欲補此數頃之田則沿江一帶新漲常稔洲田無慮千頃民方爭佃搆訟不息其皆隸於丹徒以此相易不亦可乎年年官司欲興水利輒為豪富破壞遂以湖淺河長為解試併修三湖而於丹陽水關下板則河如此其長湖亦如此其闊寜有不足之理此皆上下習見而緘口不言則利害之心愓之也工部覆行彼處撫按踏勘具奏從之九月丙子工部覆工科給事中吳文佳言茶城黄淮交㑹數千糧艘皆由此一線之路如數十里之茶城一淤即有計疏通無救旦夕查得先年總理河道都御史翁大立建議欲從子詹山梁山至馬家橋上下約八十餘里另開新河置舊河於堤外凡黄河出口之地並不相及而波濤可避良為得䇿但稱由梁山之下張孤山之東南花山之西新衝河形南出戚家港㑹於黄河亦可通舟因勢利導就下為川頗與原議稍異宜令總理河道等官親詣茶城踏勘從之閏十二月乙未議查濟寜汶上二湖舊界總理河道傅希摰勘請湖地髙者准令佃種分等徴租低者照舊蓄水濟漕嚴禁佃户不許曲為堤防侵那疆界工部覆言委於國計民生有裨但照先原任尚書朱衡稱支河新河之身堤基皆係民間田地合將昭陽湖官地及淤平舊河准令對畆給業免其納稅以河之棄土補河之占地亦可舒濵河失業之困應行併議從之明神宗實錄漢唐以前至春秋戰國大江由六合遡䢴溝取道於髙郵寳應諸湖之西北逹長淮江南之漕俱由䢴溝而苦淺阻陳平江乃堤揚州以及於淮西遏諸湖之水遂匯為一湖港相通三百七十里逹於黄河餉道大通䢴溝遂絶今不必泥古妄圖恢復惟濬之洩淮則可髙郵諸湖西受七十二河之水歳苦溢乃於東堤建減水閘數十洩水東注閘下為支河總㑹於射陽湖鹽城入海歲乆悉湮𢎞治中乃開儀眞閘苦不得洩治水者歲髙長堤而湖水歲溢隆慶初水髙於髙寳城中者數尺毎決堤即髙寳興化悉成廣淵隆慶六年萬厯元年建平水閘二十一於長堤又加建𤓰洲閘併儀真閘為二十三湖水大平淮漲不能過寳應又復淺船淺夫但許深湖不許髙堤舊制初建𤓰洲花園港通惠閘得故金焚韓世忠船板改廣惠閘又得故閘基樁石樁大四圍基因之則花園港故閘道也而或恐二十三閘洩髙寳八百里七十二河之水欲閉𤓰儀蓄諸湖利餉道誤哉各湖水南注者儀河窄而淺𤓰湖廣而深余懼𤓰之奪儀也乃於三汊河建揚子橋橋口如閘制以節束之儀湖不病淺矣而𤓰閘江潮近六十里則早至而遲落更便於儀閘鎮江截流官舫徑趨江都眞州省續食征夫之役又利儀閘云髙郵湖𢎞治三年白公以七十餘萬金成康濟河商誠便也第不當東繞圍民田一萬八千畆康濟與湖通水如城田若盂不得巳於月河之厎沉三涵洞穿月河而東洩船行洞之上方未七十年松板洞窒不復能穿月河水匯田中是老堤之東又益一萬八千畆之田湖也左哉左哉老隄如綫浸萬頃中八靣受敵而大堤壞中堤故卑薄大湖擁田湖濤擊之而中堤壞二堤俱壞則康濟東堤直弱繒當萬石之弩耳豈不危哉今議固老堤塞金門決康濟涸湖田乃循老堤之東去十丈為之東堤一䕶老堤一成月河歳加修築則運與民與商舶萬世之利也寳應湖堤袤三十里軍民舶由湖中西風大作歳溺湖中以數千人運之險道也今為東䕶堤如議髙郵新月河之制東堤成則月河成一舉兩得之計了此不過十萬金耳省中堤故也視白公縮費六十萬金歳加修築可保數百年無事謀國者各有見乎天妃口自陳平江開清江浦六十里由此入黄河官民便之嘉靖中黄水泛入清江淤河臣費十萬開新河以北接於淮其說以為接清流勿接濁流可不淤不知黄河非安流之水也伏秋水盛則西擁淮流併灌新開河夫天妃口一黄水之淤耳若淮黄㑹於新開口是二淤也乃歲役千夫濬淮黄交㑹之淺而患愈博矣余於天妃口建石閘直出黄河黄水盛則閉閘謝絶黄水以杜淤黄水落又啟閘以利官民新開口勿濬可也新河焉用哉夏秋髙寳諸湖水溢𤓰儀二閘宜洞開之髙寳諸湖今建平水閘俱引支流入射陽湖注於海正道也而鹽城范公堤有入海五道今湮其四下流不疏此髙寳興鹽之多水患乎夏鎭新河馬家橋之左吕孟微山諸湖夏水泛漲外傷漕堤内淹民田者徐州七分滕縣二分嶧縣一分公私未便也余自北堤漸家壩至鐵河止開水口建石閘宣洩湖水以左出民田右濟漕河而夫役以履畆出之二年乃成泇口河從馬家橋入微山諸湖穿梁城侯家灣取道於利國監經蟃蛤栁諸湖出邳州直河入黄河有六難焉微山諸湖水中不可堤一也梁城侯家灣葛墟嶺皆數十里頑石不可鑿二也碙石水中隨撤隨合金火不可施三也嶺南去徐吕二洪一舍耳二洪髙下相等避徐吕二洪險葛墟洪險復生四也假令治泇河即不治徐邳河尤可萬一泇河成歳治之而徐邳河非無事之水也而又治是兩役也勞不巳甚乎五也計鑿梁城侯家灣非五百萬不可視今治徐邳河五百年之費也况未必成六也治泇河䇿宜永罷之糧運盛行運舟過盡次則貢舟官舟次之民舟又次之閘乃肅汶水微而南旺析七分北濟張秋東昌臨清三分南注濟寜南陽夏鎮是北濟者道近分數多南濟者道逺分數少則恃吕孟昭陽等湖也故運盛行則濟寜而上發蜀山湖南陽而下左發吕孟諸湖右發昭陽湖以濟黄家閘勢不得不汲汲矣夏鎮新河萬世之計也往閘由南陽榖亭沽頭沛縣出留城地勢太卑視南陽以上髙下相懸各閘水峻故多淺又昭陽湖在其東黄水毎踰漕趨昭陽故閘河多淤隆慶初朱少保開南陽至留城一百四十里地故聳與南陽等置新閘焉舊閘多沉水中漕水大平不患諸淺第三湖口受沙薛二河之水夏秋水發流沙入漕為梗乃扵二河上源為皇甫東邵諸壩遏二河入微山諸湖即沙入湖中若石投水新河無沙患矣石堤累累如墉栁隂依依若茨樓船月夜簫鼓中流百里湖光萬頃金碧蓋不讓西湖蘇堤焉南旺分水河毎年汶水大發則流沙及新河三河口沙薛二河水發則流沙舊制三年二挑俱正月興工三月竣事是治本年之河為本年之運者也倉卒周張今運期早蓋二月有過南旺者矣則挑期亦宜早故隆慶六年改期大挑是治頭年九月之河為次年二月之運者也餉道遂大利焉故糧務舊以冬兊而夏開幇兩年事也今則冬兊而冬開幇合之而為一河務舊以春挑而夏行舟一年事也今則秋挑而春行舟分之而為二或合或分百世不能易矣兩河大挑有五不便有五便舊以正月興工二月竣事則新運踵至停積河流既慮風濤復稽程限一不便夫役年終徭役更換舊役已滿新役未來二不便春事方興民無暇力廹之工作田野不安三不便未接青黄室如懸罄頭㑹箕歛工食艱窘四不便堅氷初解時尚嚴凝驅之泥淖之中責以疏鑿之力五不便若改期九月興工十月竣事則回空已盡築壩絶流疏濬甫完藉氷封閉春融凍解河即有待是新運之便也舊夫未更按冊可籍正役者不勞於再籍僱役者無事於更張是徴夫之便也秋事告成農多暇日既無私慮自急公家是民力之便也新秋豐稔民多蓋藏閭閻利以供輸夫役易於徴歛是工食之便也天霽秋髙氣候清爽河鮮沮洳鐝鍤易施是用工之便也略見實録天津逆入白河至張家灣源出密雲山後諸流五六月水漲則流沙三四月行舟輒膠非無水也蓋頭年漲漫沙平河闊則淺耳余復夫老如大挑故事歲濬之以待次年春夏之運運畢水溢流沙復平九月復濬以待蓋歲工也創𤓰洲上下二閘及開花園港六里買石僱夫費河道銀萬金有奇亦萬世之利也焉論費𤓰洲上曰通惠閘下曰廣惠閘青石市諸蘇州麻石市諸上元閘匠取諸夏鎭丁夫募之江北經三月而後成排萬口而始定議百年而方興難矣哉南旺大挑舊制壩南北而絶之流舟楫弗通余先為之南壩偪汶盡北流而挑其南北舟悉􅋈南旺而待南挑畢余又為之北壩偪汶盡南流而挑其北乃決南壩舟順流而趨於黄河此濬淺行舟兩利之䇿也植栁固堤六栁之法盡之矣然必立春前所植交春後則生氣動多蟲嚙之患舊制不活者罰銀錢余念貧夫安所得銀錢第一株罰栽五株耳而栁益衆自張家灣以及於𤓰儀循河二千餘里萬厯初植至七十餘萬株後來者踵行之則栁罨二千里捲埽者有餘材輓運者有餘䕃矣黄河堤同山東濱東海水盡東注海者勢也逆水而西以濟㑹通河始於元然其時主海運海運為寇所扼則治賈魯河而元因以亡是元人不得㑹通河之利也宋少保禮於永樂九年因元舊始開㑹通河五百里然非述者蓋作者也夫元人因山東之泉悉入汶河又以汶河雜洸洸併泗不能勝東注則為堽城壩截汶㑹洸泗西南流以㑹於濟寕州之天井閘而分水焉蓋以濟寜以南截諸淮安入海濟寜以北截諸天津入海云耳不知陽榖夀張之交地勢聳於濟寜數丈而可倒使北注如尉遲敬德武德七年之訛事乎夫敬德為盧龍節度使一鎮之餉耳嘗試為之也而元以全運餉上都而又可襲訛嘗試乎宋康惠弗之是也乃壩戴村遏汶西南流入於南旺據陽榖之脊而分水得之矣然併諸泉而歸諸汶是也汶水盛發勢不能攻戴村壩則從戴村之東龍山之西攻開名曰坎河口注鹽河以復歸於青州故道而山東水復東傾蓋九分東注特一分析入南之安東北之天津餉道頻年幸河不乏絶隆慶六年余以主事張克文言循南旺百里而上歴戴村壩壩故堅汶不可破也又東數里為坎河口東北注若駛余顧張水部曰何縱汶曰歲堤坎河口歲敗亡益也余顧東龍山彼有亂石盍取石灘坎河之口里許若天成平水焉汶溢則縱之令還東注面目汶平則留之令全汶西南注以其七北灌入天津之海又以其三南灌入淮安之海是因勢而鼎足分之者以坎河灘故也遂灘坎河口萬厯元年漕大利嗟後之人使㑹通河可廢則坎河口請勿灘如不可廢治水者尚愼旃哉尚愼旃哉宋少保禮河南永寜人永樂初治㑹通河先是國朝都金陵餉道悉仰給於南江右湖廣之粟江而至兩浙吳㑹之粟浙河而至鳳泗之粟淮而至河南山東之粟黄河而至而金陵據舟楫之㑹而灌輸焉置餉道弗講永樂中治北京上供百官六軍悉待哺於江南之稻粱永樂初治海運運艘兩浙自浙入於海吳㑹自三江入於海湖廣江西自洋子江入於海淮北河南自河淮入於海山東各以濵海州縣入於海皆㑹直沽逹於天津而懐慶衛輝以其舟順衛河入天津來㑹俱遡白河逆於張家灣輸上都而舟溺亡算計臣曰海道險不可運乃令江南之運皆入髙寳諸湖渡淮逹黄河陸運百七十里入衛河指天津輸上都而車費亡算計臣曰陸道費不可運少保乃請治㑹通故道顧元末鼎沸不暇治餉事故道廢自汶上至臨清五百里悉為平沙公乃究尉遲公之舊跡及元人之遺則自汶之上流唐元為堽城壩遏汶入洸河㑹泗水東南注濟寜濟寜今天井閘尉遲建也以天井之南注淮安以天井之北注天津而南旺地特聳濟寜水上行終元之世第舟載上供數十石耳海運若故少保公患之適有戴村老人白英者獻䇿曰南旺地聳盍分水焉第勿令汶南注洸河北傾坎河導使趨南旺南九十里流於天井北百八十里流於張秋樓船可濟也少保乃造梁窒汶之入洸者大壩戴村遏汶之入坎河者開新渠百十有餘里抵南旺而分注之九年道大通淺船約萬艘載約四百石糧約四百萬石浮閘從徐州至臨清幾九百里直渉虚然為罷海運河成㑹北京建宫殿五敕公採大木六十四卒於蜀乃以餉道統屬平江公平江居河上三十年功多在淮南而㑹通河則仍少保之舊平江以帝姻且乆河工昭景鑠而少保自蜀葬於永寜曾學士棨表墓又不著河工子孫皆微為庶人又不克揚先人之烈𢎞治中僅僅廟食公南旺足矣白英尤冺不聞悲夫隆慶末余治水厯戴村遂灘坎河口披楚茨渉流沙謁白老人之廟則棟撓像頺冠平定巾老人已爾返謁宋公祠則凄凉古舍中工部尚書已爾亡有贈諡䕃叙余以聞廟堂悲之乃贈公太子少保諡康惠䕃一孫入監讀書而英亦給冠服英之後世冠帶老人而國家所以報開河元勲者備矣無巳則必如平江例乃同勲同賞乎而况少保有明堂之功亡獻舟之過也閘之啓閉宜以水為則不宜以日為則水盈板而不啓則溢不及板而啓之則洩視水而疏數焉可也兖州府有泗水穿城而過之西注于報功祠自濟寜左而㑹汶水由長溝東注於報功祠自濟寜石而㑹則任城固一都㑹也故建國最乆泗水故道多堙水溢則經兖府東潰金口堰而南出魯橋豈徒少濟六十里之運且導洩兖城之氣而絶任城之青龍水又不利於商舶之泛兖府者萬厯春余築金口導泗流一貫城一遶城北濠而皆㑹於天井焉閘有三叢石為之有龍門有鴈翅有龍骨有燕尾曰石閘漕長恐水之洩也則朩板為之視漕之廣狹而多寡焉中留龍門十有八尺遇淺則施深則否可導而上下者也曰活閘閘水出口與河上下相懸為之壩以留水與河接也龍門如制曰土閘皆濟石閘之不及也閘漕與河接若河下而易傾則萃漕船塞閘河之口數重閘水為船所扼不得急奔則停廻即深留一口牽而上逓相為塞障而壅水也命曰船堤是以船治船者也閘漕下流通河者必留一淺長數丈戒勿濬以蓄上流以一淺省多淺若棄之與啓閘等而上流諸淺見矣此以淺治淺也閘漕一里藉令舟滿漕可容九十艘舊制魚貫三十艘而過之余令之九十艘盈漕焉漕盈則水溢且上閘之水不得直遂也而善停蓄水可逆灌上閘矣此以漕治漕者也白河天津至通州凡五十九淺有淺夫以濬淺有堤夫以築堤百八十年堤夫猶故也而以淺夫為引舟夫者誤余為之復舊制云河道夫役以𩔖從焉一曰堤夫若髙寳邳徐閘崖從事笆鐝修築者是也二曰淺夫若髙寳湖之用船閘漕之用五齒爬杏葉杓水刮板者是也三曰閘夫若諸閘之啓閉支篙執靠打火者是也四曰溜夫若河洪之拽溜牽洪諸閘之絞關執纜者是也五曰壩夫若奔牛之勒舟淮安之絞壩者是也而今白河以淺夫改為引夫髙寳以淺夫併為堤夫失制乆矣今悉改正之淮南建閘舊取石江南綱運殊為勞費不貲萬厯元年髙寳諸閘余令石工鑿徐州山第給匠氏之餼耳而令回空糧船順載之毎歳約回空八千餘艘每艘載石者三則毎歲當得石二萬四千可建二十閘矣勿勞舟費勿擾商舶便計也而何苦江南之官民為國家造黄册之法若奇零不可窮詰且滋弊藪也為之法曰逢三丢逢七收蓋如以分計者如遇三釐則損之為一分如遇七釐則益之亦為一分善數也今乃推之以至於不可盡之數吏縁為奸余令佑河工堤如百丈者止於尺千丈者止於丈萬丈者止於十丈銀如百兩者止於錢千兩者止於兩萬兩者止於十兩糧如百石者止於斗千石者止於石萬石者止於十石檾灰如百斤者止于兩千斤者止于斤萬斤者止于十斤假令不盡奇零則三丢而七收之分數明吏弊絶黄運兩河估計皆同𤓰儀天妃各閘啓閉不定期限以江河消長為候如江河消則啓板以通舟悉令由閘使商者省盤剥之艱如江河長則閉板以障流悉令由壩使居者得挑盤之利若水長閘閉願候水落由閘者不强之使由壩水消閘啓自願過壩者亦不强之使由閘則閘壩俱安商民兼利閘河水櫃凡八一曰馬塲湖隸濟寜周四十里有奇俱水占可櫃不可田二曰南旺湖隸汶上周七十九里有奇可田者三百七十四頃六十畆可櫃者一千六百七頃八十畆三曰蜀山湖隸汶上周長五十九里有竒可田者一百七十二頃可櫃者一千五百三十九頃五十畆四曰馬踏湖隸汶上隆慶元年均地踏丈陞科者為官占不經陞科者為民占可櫃者無幾方稽核而未報也五曰大昭陽湖隸沛縣原額五百頃可田者三百九十七頃可櫃者一百三頃六曰小昭陽湖隸沛縣原額二百一十八頃有奇可田者一百八頃可櫃者一百一十頃七曰安山湖不可櫃八曰沙灣湖可櫃夫可櫃者湖髙於河不可櫃者河髙於湖故也然而昭陽可櫃不能大濟蓋洪溝之出涓涓耳無足恃也若獨山赤山微山吕孟原非櫃也新河障田成湖而馬家橋諸口決之大濟運無櫃之名有櫃之實盍捐田稅毋病民而櫃焉以益運乎余蓋嘗請之不報運河之存也以堤堤之固也以民自張家灣南迄𤓰儀延袤二千四百餘里河臣鄙懼民居之毁堤也而逐之余大召民之居堤者與約法三章耳商賈輻輳者為上堤嵗輸地租如例民集而商賈不停者為中堤三載量征之若野曠民稀者為下堤直令世業也永勿征蓋半稔而來者三千廬焉循是行之則二千四百里間童叟往來朩樹掩映舟行兩堤之中亦天下之至安至適也巳是全堤也焉用逐通州至天津為淺鋪者九十五鋪設淺夫十名小甲老人一名每歲水溢沙平則濬之是嵗工也百七十年河臣以淺夫為引夫有司革淺役為民役白河之不治也乆矣萬厯元年復之治水筌蹄行水金鑑巻一百二十
