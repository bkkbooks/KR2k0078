body:
  text: 行水金鑑卷一百二十一江南按察使傅澤洪撰運河水儀真至淮安河止務髙堤不務深河勢擁諸湖安所紀極萬歷元年治之乃測江都縣三汊河起至楊子橋止計半里舊水深四尺測寶應縣大潭起至三官殿嘴止河心舊水深四尺五寸測白馬湖口起至錢家直止河心舊水深四尺二寸測山陽縣化骨亭起至趙家莊止一里舊水深四尺二寸是三百七十里運道中淺者止此總之不踰五里餘皆五尺至一丈極深有至一丈八尺而止淺夫淺船治之月計之工也凡四尺者可濬至七尺而止則以運舟用水三尺乘之髙寶諸湖從平水二十餘閘中尚可泄去四尺夫水落四尺則河岸視舊可髙四尺一以固堤一以利田此祖宗但令深河不令髙堤之微意也余故痛復之百餘年來乃不為濬淺之易而為高堤之難未之思也夫治閘漕之淤有二法遇淤泥之淺利用爬杓不利於刮板遇沙淤之淺利用刮板不利於爬杓瓜儀濵江閘外春運江潮未盛潮至則通潮落則滯司河者為濬渠焉愈深愈滯蓋潮帶漕水同落故也余止濬渠獨令閘外與江相接之所置壩焉以留舊潮而接新潮且令渠之不直泄也而又免濬渠之勞費漕舟乃利境山閘者閘漕之外户也年逺變遷棄焉不治上下多淺萬歷初乃更為之而黃家閘始有重關矣外阻黃內束漕兩利之䇿也坎河口者其運漕之槖籥乎旱則止汶以濟漕潦則泄汶以全漕石灘天壤俱弊可也後來者時為槖時為籥有權存焉酌而用之存乎人閘河水平率數十里置一閘水峻則一里或數里一閘焉舊制漕淺即濬夫數十里濬深一尺勞費則何益一板焉則數十里水深尺半餉耳故救急莫如加板理閘如理財惜水如惜金糧艘入水深不踰三尺五寸濬至四尺則水從下過廣不踰一丈五尺濬至四丈則水從旁過皆非惜水之道也故法曰凡濬法深不得過四尺博不得過四丈務令舟砥僅餘浮舟之水船旁絶無間曠之渠所謂以少淺治多淺以下水束上水啓閉諸閘法若潮信焉如唘上閘即閉下閘唘下閘即閉上閘節縮之道也不然將恐竭又唘板時上下水舟俱泊五十步之外每唘一板輒停半餉命曰晾板則水勢殺舟乃不敗若通閘若頂閘是竭河毁舟之道也漕大忌之沂泗之水經兖府自北而南由金口壩南出魯橋其流頗順故古建金口壩以遏南奔特分一派由黑風口西流穿兖城出天井閘其流頗細余濬黑風由兖城至濟寧深廣可舟而固金口西趨者盛則南奔者微多濟運道商舶直達兖府兩崖膏腴無淹沒之患一舉三利之也山東水惟汶最大伏秋暴漲出南旺南奔濟寧者勢盛則橫遏沂泗之水天井閘咽不得下而濟寧東偏數萬頃膏腴悉為廣川溢南陽則斷諸堤且左逼獨山諸湖不得疏泄右奔入昭陽二湖魚沛滕成淵東南射茶城則黃河得汶十之一助為虐也萬歷元年謹備南旺七月淫雨連旬汶暴發丈餘余亟閉栁林寺前二閘斷南流而令全汶上源多北歸鹽河入青州之海下悉北歸張秋入天津之海其流於濟寧南陽出茶城者特沂泗二水耳流細而力薄通天井閘咽之裕如也東全膏腴數萬頃南陽諸堤其若常山之蛇焉獨山諸湖徐徐入新河而新河特涓涓者入昭陽魚滕沛疇昔之為湖者今皆成膏腴秋大稔矣而射茶城入黃河者一衣帶之多黃河亦少失所助乎其樞在南旺其機在栁林寺前二閘蓋南旺地聳制之固形便勢利也汶平則栁林寺前復開汶發復閉不言所利大矣哉南陽新河堤三空減水閘湖水盛則從空中衝對岸之堤堤多毁河水盛則從空中奔沿堤之湖運舟吸入空中多敗余益之小閘十數口僅僅六尺許夫閘多則水勢大殺口狹則水力大弱亡吸舟決堤之患矣閘河八百里大湖之中多産蘆葦長堤之間多長草蒿棄於地也余令九月刈之蘆葦可以代栁稍蒿草可以代谷藁捲掃之資誠取之無禁用之不竭者矣省令夫之徵本色者改折色貯庫以備不虞不亦公私兩利乎閘河無源非真無源也蓋合徂徠諸山二百八十泉者尺疏而丈導之合則流散則否有似於無源耳故閘河之水以深三尺為制祖宗法運舟載不過四百石入水深不得過六拿拿字借用蓋用人之大指與食指直之謂之一拿一拿者五寸也六拿則三尺矣六拿者三尺也故船力勝米力水力勝船力若不務足船而徒搭運以省船河力安能運船而漕大困矣歸罪無源之河何益哉制閘三法一曰填漕凡開閘糧船預滿閘漕以免水勢從旁奔泄如甘蔗置酒杯中半杯可成滿杯下漕水可使逆流入上漕二曰乘水打閘時船皆銜尾其間不能以尺如前船拽過上閘口七分即付運軍為牽之溜夫急回拽後船循前船水漕而上使後船毋與水頭鬭閘夫省路一半過船快利一倍三曰審淺凡下活閘蓄水如係上水淺則於船頭將臨淺處安閘如係下水淺則於淺尾下流水深處安閘故活閘必從深淺相交之界則淺者自深若騎淺安之則一半淺者深一半淺者愈淺矣南旺脊水也閉諸北閘則南流閉諸南閘則北流水如人意者莫如汶故命之左則左灌濟寧命之右則右灌臨清萬歷元年臨清稍滯運余以尾幫入南旺閉之南閘令全汶趨臨清一日而出板閘者七百十日而出運艘六千有竒此所謂役水者也諸閘漕以汶為主而以諸湖輔之若蜀山馬踏南旺安山沙灣諸湖皆輔汶北流者也獨山微山昭陽吕孟諸湖皆輔汶南流者也顧汶水微於春夏之交而灌輸方盛湖水溢於夏秋之交而運事以竣要在節宣諸湖秋終則悉閉之以待運春終則漸發之以濟運則得之矣閘河身博不踰六丈故水束而深唯自留城以下往年為黃水所蕩漕博至有數十丈者夫以半汶南流而鋪數十丈淺固宜然今立小河之法於秋盡水落之候因勢創築縷水小堤以小漕身如平淺則兩旁夾縷之如偏淺則於一旁淺處偏縷之延袤以淺為度大都漕博止六丈堤高止五尺根四尺頂二尺欄以小樁草夏秋水漲則任其敗水落復修每千夫日可小二三里漕立小則水立深浮舟俄頃耳此歲工也江南運道自萬歷元年始屬總理自杭州以達於鎮江凡八百餘里遡杭及常之七墅堰大勢地卑且多湖蕩即崇德吳江長洲之間淺不甚也唯自常之白家橋以至鎮之京口地勢漸聳河止一經更無支流可引每旱乾秋冬水涸輒淺滯不可舟而洋子江復下丈許此京口所以冬築春開今建瓜洲二閘大挑常鎮諸湖遂使臘月初旬京口可開千艘並入誠二百年僅見江南百世之利也顧自白家橋抵京口僅三百里濬之以漸而下引七墅堰以南之水注之北流如南旺北河故事則京口永無患矣常州以北三十里為奔牛閘又二十里為呂城閘官夫故在唯作新而用之此事半功倍者也每歲奔牛築壩兩浙回空皆由江隂下江口歷青陽出無錫之高橋抵蘇杭此其捷徑也但青陽一帶河身狹淺阻塞商賈不通今濬之不惟江隂運舟徑可抵城而每京口大挑此其間道也經略江南三䇿一曰處工費以備修濬江南河道宜兩年大挑如北河故事為費甚巨取之屬邑是以杯水救車火也則病官取之丁田是以公家纍私室也則病民取之河銀是以漕渠廢水利也則病農取之商賈是以水纍陸也則病商取之協濟是欲舍己田耘人田也則病鄰今查蘇松常鎮杭嘉湖漕糧二百萬石每石雇船抵瓜壩腳米七升瓜洲閘成淺船悉抵江南水次交兊而悉蠲雇船米余請於七升之內免去六升以利民量徵一升以利河名曰運河銀分貯各府鎮江河工獨多貯亦以多常次之蘇次之嘉又次之杭又次之大挑雇役辦料諸費悉資於此一切亡纍也夫民免六升省二百年額內之舊派修河一升亡八百里額外之偏纍以瓜閘所省江南之費為江南運道通融之用便計也二曰設江渚以避風濤七郡運五千餘艘俱出京口渡江以入瓜洲閘河風濤不利則􅋈於大江之濱後舟鱗集欲進不得欲退不能至危事也則於京閘之外藏風處濬而深之可容五六百艘固樁築堤若湖蕩焉而以一口通出入南北渡江者乃即安矣三曰改閘座以免阻塞奔牛吕城二閘砥石頗髙而運河深七尺以平江水則閘砥限之故深河宜深閘砥乃利涉爾夏春運盛之時正汶水微弱之候南北分流之則不足并流之則有餘特為番休之法如運舸淺於濟寧之間則閉南旺北閘令汶盡南流灌茶城逆舟屯於汶之上源以待北決如運舸淺於東昌之間則閉南旺南閘令汶盡北流灌臨清此役汶全力者也萬歷元年始用此法漕大利治水筌蹄馮敏功遷河南左參政時少年喜事者欲從泇口穿葛塢諸山抵南北大湖中界兩長堤為運道以示竒柄相以敏功熟於河徵敏功與議且將屬之敏功念諸山道約二百餘里多盤石硜砂不可鑿大湖相連十四不易堤民力之幾何而虐用之持不可乃寢而喜事者又欲别繇海通膠河其視漕稍徑而中皆髙嶺巨石東土瘠人疲不勝役甫舉事而驚潰者再矣乃移敏功山東敏功議以膠工不易興且不易竟即竟亦終塞縣官故不乏金錢奈何悉捐以填無用而窮此數十萬人力也撫臣採敏功議上聞失柄相意遂舍敏功而他屬卒如敏功言費至十三萬金而無尺寸利柄相稍恧沮始用廷議罷之丁艱去兩浙名賢録敏功服除起佐漕運見十年是年漕撫都御史王宗沭淮安知府陳文燭加修淮安長堤幫築西義橋樁岸又修鹽城石䃮海口以疏下流入海之路南河全考考宗沭文燭俱在萬歷二年去任全錯入在四年故移置於此巷淮安長堤在郡西自清江浦藥王廟起東歷大花由西橋相家灣直抵新城過金神廟至栁浦灣六十里而近詳見淮河王公二堤記石䃮口在鹽城縣東門外里許諸海口可開而石䃮口獨不可開明胡希舜嘗有記矣略云萬歷丙子鹽城令杜君善教以興化巨公主議浚河建閘河通潮大至壞閘水澎湃震蕩大沒民田一時居民溺死者無算於是鹽人鼓喙而爭言塞石䃮口矣庚辰歲揚令瑞雲言之巡鹽御史姜公璧是年題請塞石䃮口修宋丞相范文正捍海故堤而命楊令董其役自是海潮不得奪隄而上鹽人永永無海患矣諸海口可開石䃮口則不可開何者石䃮口薄城故憂不獨在田也明神宗萬歷三年正月丙午巡撫順天都御史王一鶚條上弭盜六䇿一議定守備汛地漕河一帶南起丁字沽北至王家擺渡崔黃口與霸州二守備分河東西岸而守之兩岸兩屬彼此互諉不盡屬之崔黃口而霸州則專以近京要路責之一議增巡河哨船宜置八槳船六隻每船用兵十名分布巡哨一遇有賊併力齊棹與岸上巡緝互為聲援一議明管河職掌謂管河舊設一把總一主簿皆髙坐河西膏地職守湮廢宜於夾河武清營州二衛選驍勇有才官一員充為總領責以護糧把總主簿責令沿河修濬巡緝如有失事通與守備及巡簡官一體查究疏下兵部覆核無異詔如議行併令撫按官申飭所屬有隱匿盜情規避罪責者事發一體治罪二月庚午先是聽選歲貢生員許汝愚奏稱鎮江府練湖焦干杜墅三湖修之堪以濟運京口丹徒吕城奔牛四閘因而可廢事下地方踏勘至總理河道傅希摯言練湖先巳疏築無容别議焦干杜墅二湖地窪源少無益運道四閘若廢有妨蓄泄其事遂寢戊戌總理河道都察院右僉都御史傅希摯上言治河當視其大勢慮患務求其永圖頃見徐邳一帶河身墊淤壅決變徙之患不在今秋則在來歲幸而決於徐吕之下猶可言也若決於蕭碭之上則閘河中斷兩洪俱涸矣幸而決於南岸猶可為也若決於北岸則不走張秋必射豐沛矣臣日夜憂懼悉心講求禹之治水順水之性耳今以資河為漕故强水之性以從吾雖神禹亦難砥績惟開創泇河置黃河於度外庶為永圖耳泇河之議嘗建而中止謂有三難而臣遣錐手步弓水平畫匠人等於三難去處逐一勘踏起自上泉河口開向東南則起處低窪下流趨髙之難可避也南經性義村東則葛墟嶺髙堅之難可避也從堤溝河經郭家西之平垣則梁城侯家灣之伏石可避也至於泇口上下則河渠深淺不一湖塘之聫絡相因間有砂礓無礙挑穵大較上泉河口水所從入也下至大河口水所從出也自西北而東南計長五百餘里北之黃河近八十里河渠湖塘十居八九源頭活水脈絡貫通此天之所以資漕也昔尚書朱衡之開新河都御史潘季馴之開邳河權救一時其情事忙促工費浩大難盡名言今雖尚幸無梗然相時度勢要之不免卒有不虞而後竭天下之財力以通咽喉何啻如新河邳河之情事洶洶而巳哉若拚十年治河之費以成泇河泇河既成黃河無慮壅決矣茶城無慮填淤矣二洪無慮艱險矣運艘無慮漂損矣洋山之支河可無開境山之閘座可無建徐口之洪夫可盡省馬家橋之隄工可中輟今日不資之費他日所有省尚有餘抵也故臣以為開泇河便因列為議工費酌工程擬督工請監工四欵上之章下户工二部看議三月丁巳泇河之議工科都給事中侯于趙疏言事體重大宜集廷臣㑹議或行地方覆勘又瀕河一帶水災頻仍大役驟興地方隱憂不可不慮户科都給事中湯聘尹言曩者新河之役議用費七萬及其成功殆十倍焉今日雖議百萬而大役難料中道難輟恐不能無倍於初議矣宜大集心計博采衆思工費約用幾何支給出自何所開列奏聞必儲蓄可備六年然後可下詔興工二疏俱得旨下部臣覆請㑹議上曰開河事理傅希摰所奏固巳明確但事體重大不厭詳慎廷臣㑹議亦是虛文甲可乙否終難成事命侯于趙親往㑹希摰及儹運按臣確議以聞丁卯工科給事中侯于趙舉原任都水司郎中張純久歷河防周知地理乞添注原銜同往勘議泇河許之四月甲午總理河道都御史傅希摰謂髙寶之間桃花泛漲陡齊堤岸宜急捐徐邳二州河道船稅堤夫等項四萬以備修築於是工科右給事中蕭崇業等疏東南咽喉重地重罹災變宿水未消新潦增毒蠲恤修築以蘇瘡痍是或一道也若開草灣浚石䃮二䇿則未可輕議何也泇河之役國儲所關必不容已若兩役並興馳騖不足顧尾失首非計宜俟泇河告竣淮揚稍稍安業乃可徐圖耳户科都給事中光懋亦言之事下户工二部覆議命河漕諸臣及勘泇河科臣博訪羣䇿議定明白以聞六月辛卯工科都給事中侯于趙等題㑹勘泇河事宜自泉河口至大河口五百三十餘里內自直河至清河三百餘里自來河道無恙無賴於泇斷在可巳惟是徐吕至直河上下二百餘里宜開以避二洪邳河之害約費可一百五十餘萬金特良城伏石長五百五十丈比原勘多四百七十丈開鑿之力難以逆料性義馬陵俱限隔河流之處二處既開則豐沛河決必致灌入宜先鑿良城石土預修豐沛堤防而後前功可徐議也户部亦覆如科臣言又謂正河有目前之患而泇河非數年不成故治河為急開泇為緩奉旨看侯于趙等所奏與傅希摰原議大不相同傅希摰久歷河道他當初若無的見豈敢謾興此役此必該道等官畏工久羈官故難其說隂肆阻撓勘官據其所言謾爾回奏其言先開良城伏石徐議興工都是搪塞了事之語深負委託今人平日都㑹說利道害沽名任事及至著落他實幹便百計推諉只圖優游無事捱日待時詎肯視國如家忠謀逺慮者似這等人如何靠得他成功濟事且泇口之議止欲通漕非欲棄河而不理今他每既說治河即可以兼漕使著他一意治河别工不必再議今後漕糧開兊遲誤責在漕運舟行梗塞責在河道有曠職廢事的都拿來重處管河司道等官都著久任不許升轉吏部該科記著七月已未國初糧運自儀真直抵淮安謂之裏河俱分入五壩轉盤黃河謂之外河原不相通後平江伯疏開清江浦河由天妃口徑通黃河仍設閘以司唘閉每歲三月以後糧運過完即將原閘封閉隔絶黃水官民船盤剝如故其後漕規廢弛閘不能閉而黃水灌入河臣乃議塞天妃口以杜黃水創開三里新河設通濟閘以通淮水其後閘廢不修淮水不息黃水盛大淮亦因之髙寶湖堤年年衝決鹽興等處歲歲被災矣至是御史劉光國議以天妃閘地勢髙於通濟淮水灌溢多於黃水謂宜將通濟閘及福興新莊二閘增卑倍薄務令髙厚堅固仍令清江厰分司專司啓閉每五月以後九月以前二水盛發之候嚴加封閉官民船聽其自行轉盤惟回空船至每二日啓放一次隨放隨閉不許官民船越規擅進以貽水患從之八月甲戌工科都給事侯于趙疏言髙寶湖堤大壞蘇松水利久湮宜專委任督理以禆國計巡鹽巡撫俱難兼管宜於南京巡江巡倉屯田三差歸併一員專理河工部覆如議丁丑先是總理河道都御史傅希摰言茶城一帶運道咽喉頻年淤決迄無成功宜自梁山以下挑濬與茶城交相為用淤舊則通新而挑舊淤新則通舊而挑新惟築壩斷流通其一以備不虞部覆得㫖如議九月已亥南京工部尚書劉應節等上疏言海運之難以放洋之險覆溺之慮耳今欲去此二患惟自膠州以北楊家圈以南計地約一百六十里其應挑濬者不過百里非有髙山長坂之隔也宜因山東班軍一枝屯駐膠州者合附近該營起軍數千度地分工量工命日以實心任事大臣一員董之可成百世之功部覆原議聞見既真籌畫又熟若以他臣督之恐議非已出别生異見宜專敕一道付本詣膠州相度經營并未盡事宜悉聽便宜行事得㫖這膠萊河議即經行勘俱為浮議所阻劉應節等既的有所見不必覆勘就著徐栻改工部右侍郎兼都察院右僉都御史㑹同山東撫按官將開濬事宜一一計處停當具奏來行朝廷屢議開河止為通漕與治河事務不相干涉再有造言阻撓的拿來重處十月壬午總理河道傅希摯議上江四河道及山東泉源主事要將江南運河歸併水利御史就近統管兖州泉務歸併該府管河同知仍將清軍同知除去管泉字樣部覆從之明神宗實録徐公栻擢南少司空時黃河東決漕道為梗上南顧太息宰臣以下咸蒿目焦心思所以别為計而南大司空濟南劉公者熟登萊事公亦諳習水道心然其言遂並疏上計上報可俾劉尚書往視而公則以少司空兼僉都御史專敕理膠河㑹山東當事者言開膠河非便所役夫且乏餉而羣譁言不便者交和之遂從中報罷張元忭撰南工部尚書徐公墓志栻字世寅嘉靖丁未進士是年五月髙郵西堤決清水潭丁志等口本部郎中屠元氷暨接管郎中陳詔督築塞之行水金鑑卷一百二十一
