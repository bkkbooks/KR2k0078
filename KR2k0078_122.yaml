body:
  text: 行水金鑑卷一百二十二江南按察使傅澤洪撰運河水明神宗萬歷四年正月辛丑以原任登州府知府升陜西行太僕寺少卿李承選改添注遼東行太僕寺少卿兼山東僉事駐萊州開浚新河已酉髙郵州清水潭堤口衝決時督漕侍郎張翀以修復老堤工力浩大數年始可成功恐新運巳臨決口未就且令糧船暫由田圈裏行而御史陳功則稱圈田淺澀不便牽挽外湖水面闊四十餘里風有不順必至稽阻工科給事中侯于趙亦以兩臣持議未決恐致過淮後期乞敕所司速議并欲以淮南運道專責漕臣而以淮北運道命河臣傅希摰一意經理務時加挑濬以圖萬全從之已酉督漕侍郎張翀以修築寶應堤工議於江南各府州縣并浙江江西湖廣每糧一石加派一斗折銀五分兊于餘鹽銀內借用候次年徵完補解弗許詔以漕糧腳米六升每歲計銀三萬三千三百餘兩及蠲免七升內量復一升每歲計銀一萬兩為修築之費又命於河道衙門轉發修河銀五萬兩如不敷或留漕米或借工本鹽銀或山東河南香錢例銀及德州倉銀并準湊用壬子開浚新河工部右侍郎兼右僉都御史徐栻等議新河二百五十八里中間鑿山引水築堤建閘工必不可議省漕河舊規每方廣一丈深一尺為一方每方二工計工給銀四分共該銀九十萬八千七百六十一兩八錢費必不可不儲得旨膠河在嘉靖間該道官自行開浚工已十之六七當時未聞請給錢糧多用夫役今特竟其未成之緒縱工費銀巨何至動稱百萬據所委勘各司道官多推艱避事其中工程道里丈尺大率虛估未見詳確顯是故設難詞欲以阻壞成事且就近有司官員豈無堪用者乃委及王府長史長史以輔𨗳為職豈宜侵有司事徐栻始議云何今觀其所措畫殊無勤誠任事之忠户工二部其會同原建議劉應節並二科勘議以聞栻等又言前題匡家莊地委髙峻難于施工改扦黃阜嶺道里稍近而髙處亦復不減泉水仍不可通惟治都泊由船路溝一帶原係便路相傳謂都泊為水所匯船路溝為行舟處似有待於今日者在黃阜嶺迤北既逺其髙峻在分水嶺迤南又避其淤沙地形平衍水勢浸漫且旁有可濟之河水可引之源泉其上流為沽膠等河濬之以為血脈其下流為張奴等河濬之以為經絡多建閘座以通其咽喉廣開水匱以資其榮衛立堤塍以障其流沙開月河以泄其橫溢或遇大旱水淺仍照會通河事例預造剝船以備剝淺每年春初大挑小挑務期通利其海倉口等處俱有舊設倉厫仍查復製造以備積貯是可以備海運之長䇿稱轉輸之便途矣報可丁巳命漕運及河道衙門嚴督郡縣將清水潭原決堤口設法堵塞勿得恃圈田外湖致稽糧艘二月丙寅户科都給事中光懋言國家建都極北軍國之需悉仰給東南近因漕渠多梗識者謂宜别通一路與運河並行然初議挑浚僅百里起夫約數千經費數萬即可通潮信而海水自來頃勘報又謂海潮必不可通矣三徙匡家莊而都泊是主矣深挑量浚計地長百有七十里矣旁引接濟之水又逺百六十里與正河等矣夫役過四萬矣時限三年矣估計工費又幾百萬矣前後矛盾恐糜竭無餘而漕事未必有禆乞命尚書劉應節暫輟營事赴開河地方與徐栻虛心講求實用若出百萬之費未足收永賴之功不妨奏請中止下所司已巳工部尚書郭朝賓等言新河之議劉應節原以通海為主今查姚家莊以南至集墓溝計三十里自孫家口以南至髙崖頭玉皇廟共一百一十八里餘又自髙崖頭至旋河觜量浚七十丈俱係海水必由之路宜即興工其開引水河一百四十六里應命停止惟是千聞不如一見徐栻親見海不可通故議引泉乃欲使之捨泉就海責以必通萬一無成則栻得自諉而費過錢糧已不可追矣必須公同應節商度至當可通則通可止則止慎於經始以圖萬全上命應節暫解營務會同栻并該省撫按官親到地方虛心計議先將難處開浚試驗果否可行細估具奏毋得拘泥原議含糊兩可致誤大計户工二部各先發銀三萬兩付應節支用以後工費另行議處丙子議浚新河工部右侍郎徐栻題山東屢罹災傷青登萊三府尤甚今大舉河工必賴居民安業乞將一應拖欠錢糧自隆慶六年以前免徵萬歷元年二年緩徵疏入命所司分别京邉緩急以副恤民德意刑科給事中王道成言新河一事劉應節主通海徐栻主引泉臣愚以為膠州在南海口之中土最髙厚萬一堅石隱伏挑浚安施至於漕運紓長河泉脈細易盈易涸閘匱徒勞况海船河船決難通用而山東錢糧不滿二萬即南北區處百萬易備使復有不足其將再請乎疏入上曰人臣任事最難巳令虛心議處不當預為難成之説以恐之命仍前議戊子工部右侍郎兼右僉都御史徐栻以條議新河事奉旨切責倉皇具疏陳謝而所録旨意差訛為工科論劾上以栻在逺傳寫致誤貸之三月辛亥巡按山東御史商為正言臣奉命亟趨膠州擇分水嶺難開處挑驗用夫一千一百名方廣十丈餘挑下數尺即碙石又數尺即沙此下皆黑沙土未丈餘即有水泉湧出隨挑隨汲愈深愈難今十日餘矣而所挑深止一丈二尺所費銀已五百餘兩尚未與水面相平若欲通海及海船可行更須增深一丈雖二百餘萬金不足以了此且麻灣海倉海口兩頭淖沙數十里隨挑隨淤雖使别開一渠數月後潮至沙壅亦復如是况海運必出自淮安海口髙寶其所必經髙寶不治此河雖通亦不能越而飛渡觀其緩急先後之勢此河之不必通亦眀矣而况有未必能通之勢若此乎乞命停止毋事虛糜下部議丙辰河道總督漕運侍郎吳桂芳言髙郵河南隄乃永樂間平江伯陳瑄所建運舸俱行湖內波濤為患至𢎞治間侍郎白昂議開越河中為土堤東為石堤兩頭建閘名為康濟河其中堤之西老堤之東約成民田數萬畝即今所謂圈子田也彼時未傍西堤為河而别作越河於數里內舳艫安流軍民稱便但河去老堤大逺瞻顧不及缺壞不修遂至水入圈田又成一湖而中土堤遂潰壞則東堤猶受數百里湖濤故有昨歲清水潭之決蓋勢所必至也今若盡復白昂舊迹䇿非不善但據估銀二十三萬有竒比之白昂所費尚不及半誠恐修築不堅數年復壞反成虛費則不如照𢎞治年間侍郎王恕議就老堤為越河只修築東西二堤為費既省而循堤牽挽亦可隨壞隨修髙郵既完徐及寶應謹將切要事宜條為四議其一曰設處錢糧二曰燒採磚石三曰分募夫役四曰委官分理下所司壬戌工科給事中戴光啓言臣觀吳桂芳所奏髙郵築堤一事舊河方病太逺終不忘軍民稱便之功開河令傍老堤又自為二面皆水之慮臣竊探桂芳意若曰三堤並修一河復舊良可垂逺但前估工費不足應用今又不便更估不若姑省中東二堤之費云爾按其疏中有據估不及白昂之半又曰必復康濟之舊非增二十萬不濟其意可見矣夫圖大事者忘小費何必過為嫌憚求幸於目前茍安哉下部議四月戊辰先是漕運侍郎吳桂芳以議修髙郵湖堤為工科給事中戴光啓所摘下工部議言漕臣躬親相度必有所見但疏意似因工巨財詘改疏越河故戴給事反覆辨之事應覆勘惟是合用磚石數多採燒船運非倉卒可辦所議河南庫貯河工銀五萬兩應節轉發其磚石行各府州縣如式燒採至興大役應分派各府縣撥夫一體應役計時省放得旨吳桂芳原任揚州河工事理知之必真前已有旨委任責成不必又行覆勘餘如議户部亦以江北各府樁草香錢船稅等銀五千兩漕撫罪贖銀五千兩廬鳯淮揚徐滁和事例納板銀二萬五千兩俱免解部各總輕齎內河工銀共五萬八百六十四兩兩淮鹽運司庫貯挑河銀三萬兩俱留濟用上俞其請仍留廬鳯等府應解馬價銀二萬二千兩以濟之庚午勘議新河兵部尚書劉應節言新河地形如掌水勢成渠較之黃埠嶺誠便且兩海口水甚深闊下皆實地乘潮自可通舟惟南海口迤北十五里積沙數段從古路口另開十三里許直接麻灣以避之可以永恃又橫建一閘於新舊河水之交則潮水流通浮沙不入矣北海口以南三十里為龍王廟有客沙二里四十步撈沙二尺下即實地若旁闢一渠築堤五百餘丈以約水障沙自無他患由廟前達新河閘口中間一二淺阻并令挑深亦可無虞矣分水嶺一帶地形本髙泉水四溢拽泥運水工力固難然起工當自卑而髙泄水當自髙而卑難易未可執一論也至王家丘船路溝一段地勢趨下白河適當其衝秋水暴漲最為河患宜岸口建閘一座沂水上流建壩二座尋常水流壩下引以濟河秋漲則水經壩上內以停沙亦為善䇿大都北自海口抵亭口南自麻灣朱鋪通潮最易所慮者惟朱鋪抵亭口四十餘里耳然臣意主於通漕原不泥於通海也若造船宜準漕臣王宗沭所造海船式而稍儉其制載糧不過四百石納水不過三四尺則河海可並行無患矣山東巡撫李世達言南海麻灣以北劉尚書謂沙積難除徙古路溝以避之每里約費五千八百餘兩十三里總約七萬五千餘金然南接鴨緑港達東龍家屯沙積甚髙渠口一開沙隨潮入故復有建閘障沙之議竊以謂閘閉則潮安從入閘啓則沙又安從障也北海倉口以南至新河閘大率沙淤潮淺劉尚書從東岸試挑二里僅去沙二尺給過工食巳二千一百金而大潮一來沙壅如故故復有築堤約水障沙之議竊以為障兩岸之沙則可若沙自隨潮衝激安能障也分水嶺髙峻試一工長止二十丈而費近千五百金舊河身原深一丈一尺新挑止深一丈四五尺最深亦不過一丈九尺為下多碙石又掣水甚艱也故復有改挑王家丘之議竊以吳家口至亭口共髙峻者五十里大概多碙石以分水嶺一工計之費當何若試過三工俱的無可行况全河長亘一百七十里乎潮信有常遇大潮始稍逺然亦止近陳村閘楊家圈耳曽未至朱鋪亭口也况日止二潮乎此潮水之難恃也自店口至新河口紆曲餘二百里張魯白膠三水微細都泊行潦業巳乾涸設遇亢旱何泉可引引泉亦難恃也海中小舟載三百石者必納水六七尺始可行王侍郎船式果可行乎元人自至正十七年開浚此河至三十一年竟以淺澀奏廢元史謂其勞費不資終無成功足為前鑒今當緝髙寶之堤無徒殫財力於不可必成之膠河也巡按御史商為正亦以為言上以撫按奏報與劉應節所奏利害懸殊恐難砥績命工部集議以聞於是工部覆言撫按議既眀確則應節所謂可成可恃者詢謀原未僉同委應停罷上然之召應節及栻遂并罷諸添設員役焉六月乙丑罷新河兵部尚書劉應節猶以用過夫役器具等項銀共三萬二千二百二十餘兩請下所司丁丑總理河道右僉都御史傅希摰言山東兖東二府運河額編有現役夫有徵銀夫共一萬四十一名今查工程繁簡酌量裁留現役夫六千七十五名存用革去徵銀夫三千九百六十六名所徵工銀按季解貯府庫備河工支用從之甲申總理河道右僉都御史傅希摰言南闕往來要區素稱大淺二年議一闕春秋興工輒于糧船有礙宜倣濟寧月河制建通河一閘遇大挑則船隻俱出月河工畢仍出大河用夫約九千名用銀約四千七百餘兩下所司明神宗實録是年工部覆止膠河疏曰看得尚書劉應節侍郎徐栻題稱南海口地方有積沙橫絶中流巳從古路溝另開十一里許以避此沙又議於新舊河水之交橫建一閘俾浮沙不入北海口一帶築堤五百餘丈以約水障沙分水嶺一帶試開一處深至三丈以上運水甚難因而停工自王家丘至船路溝另開七里為一便路此處白河一道適當分水嶺之衝議建閘壩以遏之仍引水為用及造船之式欲以侍郎王宗沐海船為準而稍儉其制載糧三四百石納水三四尺河海並行永永無患要動用原奏留銀三十萬其餘銀兩另行細估補發巡撫李世達題稱試過三工俱巳的無可行潮水引泉俱不可恃乞將二臣回部管事巡按商為正題稱淖沙為梗海水難通及又揭稱淖沙難去丈尺難據工程難計沙石難去潮水不足恃引河不足濟海運難行乞命二臣回京河工即為停止各一節議照尚書劉應節侍郎徐栻建議新河要捨故河而尋便道在於匡家莊一帶開濬以通海為主蓋兩海相貫則河渠充滿海舟直達於河由河復入於海往來無滯誠為得䇿隨該二臣改議黃阜嶺又改船路溝今却於分水嶺開試勘稱河形太髙而海最下勢不可通遂議及乘潮導河障沙造舟等事意在多方求濟大約以兩頭所恃者潮南自麻灣以抵朱鋪凡五十里北自海口以抵亭口一百八十里皆可通潮巡撫李世達却謂南潮止及陳村閘距海口二十里北潮止及楊家圈距海口六十里間或至朱鋪亭口者蓋一年之內有大風迅烈潮流疾速則然不可以為常也且潮水倏焉而長倏焉而落落則未免守候耽延踰時况潮之所及為有限乎潮不足恃明矣又以中段所恃者張奴河至膠乃最下之地為秋潦所歸十月以後日漸消耗至春月泉脈微細適糧運湧到之時雖置匱建閘以時啓閉終不能使之源源而來滔滔不竭也至謂白河流沙為害議建壩二座以遏水之入而謂水流壩下引以濟河秋漲水經壩上則沙必與水俱入而謂內以停沙又皆臣等所未喻也河不足恃亦明矣兩海口地方各有淖沙至謂為淺沙客沙亦能為害全河長亘二百七十里內沙洲頗多自王家丘至船路溝七里雖為便路其下有沙與否亦未可知沙在海中者潮水湧進沙必隨之而入沙在地中者疏濬所及沙必隨之而出雖土沙相半土可蕩盡而沙則下沈日積日多愈挑愈有固非祛除所能絶亦非堤閘所能障也乘潮導河皆無足恃沙多水淺置舟則膠雖稍儉其制載糧三四百石亦非淺淺者所能勝也剝淺易舟建倉等議必將復起尚書劉應節亦謂善後之䇿難以逆覩竊恐所謂利者未必利而害將不止於什一矣國家舉事固不嫌於導河若無禆漕計亦奚以導河為哉今以百萬之銀驅數十萬之衆而希冀不可必成之功殊非萬全之謀亦非二臣建議之初意也且尚書劉應節原奉有明旨會同徐栻等并該省撫按官虛心計議先將難處開濬試驗果否的有可行今撫按官李世達商為正俱各親到地方公同開濬試驗而執論互異如此則劉應節所謂為而可成成而可恃者詢謀原未僉同事體委多窒礙相應停罷以省勞費河防𣙜是年五月漕撫吳桂芳題請委郎中陳詔殷建中兵備程學博知州吳顯修復髙郵西湖老堤傍老堤繇圈田改挑康濟越河并築中堤糧運民生至今賴之按髙郵捍湖老堤長亘四十里永樂年建至𢎞治間白昂於境內越民田三里鑿康濟越河通餉避河者為東堤其捍隔民田者為中堤中堤之中有田數十萬畝則圈田也嗣後圈田淹沒老堤傾圮萬歷三年泗水南下衝決清水潭等處故塞決後即議修老堤甃砌磚石改越河廢東堤改築中堤以便牽挽湖堤迄今堅固越河利涉南河全考明神宗萬歷五年二月已卯總督漕運侍郎吳桂芳言髙郵石堤工將砥績宜及時開挑越河查先年侍郎白昂開康濟越河去老堤太逺河成之後人心狃於目前越河之安而忘老堤外捍之力年復一年不復省視遂致老堤與中堤俱壞而東堤不能獨存今宜倣侍郎王恕之議挨老堤十數丈取土成河使堤上往來共由人得照管不致蹈前頺圯旨下所司三月戊子朔工部覆給事中劉鉉奏丹陽一帶河身淺涸漕艘阻滯參政王敘果不行挑濬臨事倉皇倡為開孟瀆河壩之議得旨奪俸二月孟瀆可開俟秋水落後興工為來歲運計癸卯直隸巡按御史郭思極因京口漕河淺涸條上三吳水利一復練湖以永資蓄泄蓋江南漕河北髙南下京口一帶地形髙亢河流易涸雖奔牛吕城建閘起閉蓄水以待運船而實仰藉練湖為之源也練湖北去丹陽城百步而近漕河縈繞其側周圍四十餘里仰受長山八十四溪之水滙為巨浸唐宋以來築有中梗斗門石閘國朝天順成化間屢常疏濬增修夏秋戽水溉田冬春放水濟運故有湖水放一寸河水漲一尺之諺自往時守令狃於近利令豪右告佃成田寖失舊額而傍湖之民私開涵洞網取漁利年涸一年今且揚塵矣為漕河經久計急宜請復倘慮貧民失業使佃湖之民轉佃於萬頃澤等處可也一修孟瀆以旁通舟楫奔牛呂城二閘例應冬閉春啓蓄水以待運船然秋冬之交回空運船與往來官船必取道於此欲恪守成規勢不可得有不由二閘而可以間道達江者為武進之孟瀆河河延袤六十餘里外通長江內資灌溉自嘉靖間防倭入寇築壩堵塞於是河流漸微日就阻塞而船不復經行矣全計開濬約費五萬餘金取諸漕運衙門無令獨纍武進一縣此河一開既有私道以通舟楫而運閘得啓閉之宜又引江潮以進奔牛而運河資接濟之力矣部覆得旨練湖并孟瀆河撫按督同水利官修復開浚責令秋間完報為來歲轉漕計占湖阻運不行治罪已是寬恩如何又議勘償如有抗拒阻撓及司道因循茍且者撫按參來重處壬子巡按直隸御史陳世寶條陳河道江北四事江南二事一復老黃河故道先是河自三義鎮歷清河縣北出大河口與淮水會流出海運道自淮安天妃廟亂淮而下十里至大河口從三義鎮出口向桃源大河而去謂之老黃河至嘉靖初年三義鎮口淤而黃河改趨清河縣南與淮會合入海自是運道不由大河口而徑詣清河縣北上矣邇者崔鎮屢決河勢漸趨故道若仍開三義鎮口引河入清河縣北或令出大河口與淮流合或從清河西另開一河引淮水出河上遊會合則運道無恐而淮泗之水亦不為黃河所漲民難其永舒矣一修寶應湖堤補古堤以固其外于古堤東再起一堤以通越河而使運舟於此經行一請復上下練河一開復孟瀆河一增建儀真二閘因江口去閘太逺欲於上下江口迤邐十數丈許各建一閘潮始來預啓板以納之潮初退即下板以閉之使出江之船盡數入閘以免遲滯一開瓜洲河港塢將屯船塢挑浚深闊使船之先入者屯聚於內又於鹽壩之東開一曲港與新閘外港相合使船之後至者續泊於內以免金山挂江之險部覆允行五月甲午孟瀆河以三月初興工至是報竣共用銀一萬六千五十餘兩閏八月壬辰禮科左給事中湯聘尹言京口水涸漕挽愆期近議開練湖矣然可以資丹陽不能資丹徒議開孟瀆矣然可以資江隂不能資京口也蓋京口與洲對壘而孟瀆去洲頗遙空船可以泝流糧艘難以涉險則運道必出京口矣宜於京口之傍另建一閘引江流內注低舊閘可丈許視冬間水勢而定之準焉潮長則開縮則閉可免涸轍之患章下所司庚戌御史尹良佐條陳漕運事宜一通便道以速漕運孟瀆河口渡江入白塔河抵灣頭為運道捷徑宣德七年平江伯開通至正統四年都督武興復閉今孟瀆河既開則自河渡江入黃家港水面雖闊江流甚平且由黃家灣至泰興以達灣頭髙郵運河僅二百餘里可免瓜儀不測之患一開江道以泊運舟糧船自京口乘風北渡瞬息可達瓜閘但金山而下觸浪洶湧中流遇風則瓜鎮之收閘者朱盡而京口之出口者難迥回難免漂沒之患惟鎮江城西北有甘露港約長十餘里夾岸洲田宜挑使深闊以便回泊部覆二港可否踏勘行之報可十一月癸已漕臣吳桂芳奏髙郵湖土石二堤新開越河南北二閘及老堤加髙石層增設護堤朩城各工竣事報聞明神宗實録是年漕撫侍郎吳桂芳命主事張譽知府邵元哲等增築山陽運堤自板閘至黃浦長七十里閉通濟閘建興文閘及修新莊等閘築清江浦南堤以禦湖水加河岸以禦黃淮加清江閘以便運舟之牽挽創板閘漕堤北接舊堤南接新堤南河全考行水金鑑卷一百二十二
