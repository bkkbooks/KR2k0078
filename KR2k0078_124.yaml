body:
  text: 行水金鑑卷一百二十四江南按察使傅澤洪撰運河水眀神宗萬歷十一年三月已亥工部覆漕運尚書凌雲翼題稱徐州戚字港溜急運艘難行開新渠建閘境山廢閘曰梁境閘新河中閘曰內華閘新河口閘曰古洪閘乞移咨吏部於梁境閘專設閘官一員內華古洪二閘共設閘官一員并鑄給條記從之十月戊午工部覆總督漕運户部右侍郎傅希摰奏清江浦至西橋一帶堤岸當黃淮掃灣之衝近年黃流日刷堤根單薄萬一嚙決則運道生民俱受其害今將舊堤亟為修砌限萬歷十二年秋黃水未發之先報完完日將工費核實奏繳從之已未以漕河工完賜尚書潘季馴原任兵部尚書凌雲翼等賞賚有差眀神宗實録明神宗萬歷十二年七月壬午漕撫李世達恭報堤河工完部覆賞各銀兩有差八月丁已吏科給事中陳大科言江南漕艘歷髙寶抵淮寶應汜光一湖浩蕩無際槐角樓一帶據湖之中其形如兜兩翼向為運道梗所司議開越河而一主圈田以防夾攻一主靠堤以省修築昔白侍郎昂康濟一湖圈田之制也比吳尚書桂芳靠堤開越河十餘年來未聞衝圯臣以為靠堤便總督漕運李世達亦然其議部覆報可九月丙子南京右僉都御史趙煥奏髙寶湖堤大壞乞敕憲臣督理章下都察院十月戊午漕運總督王廷瞻奏寶應新開越河分為三工每工司道二員相兼總管報可十一月甲申禮部儀制司主事陳應芳奏頃見漕臣開越河一疏其稱論方取土以丈計之約用工銀九萬六千有竒而朩石之費十二萬其派夫必得五萬人而後可竊意夫以五萬每名日工食二分則當一日千金矣是所謂九萬六千者止可供五萬人三月之費借曰更番迭用亦止足供六月之食大約計之則九萬六千者可足一年夫役之募乎其不足者撫按自有處乎抑令民自為賠也臣往見河工之舉撫按下之司道司道下之州縣州縣下之里甲里甲不足於是以家資之上下為出夫之等第籍名在官而趣之役牌票追呼之擾遍於閭閻叫號怨謗之聲盈於道路其狀有不可勝言者此籍名之苦一也及其不可脫而為之辦夫一夫逺者月有一兩二錢之值近者月有九錢之值有稱是而計月以安家之值以一家為率辦夫五名則月幾十金之費矣往往傾資以償其費不則鬻産又賣子女數月之間閭閻一空此雇夫之苦二也及其以應雇之夫而往即工所也多方影射百計索求一不遂則撻鞭之夫往往多逃去則以逃夫呈而移檄州縣逮之原籍名之人則又雇夫以補其額而就逮之費亦復如前是重困也至如官銀即使盡所議者給之猶不足以償十分之一而况所給者受值之人非出值家也以故不才佐二通同胥役恣意侵尅以故官徒有募夫之名而害歸於籍名者之家利入於管工者之手此赴役之苦三也請以三䇿籌之與其使當事諸臣陽為節省之虛名而閭閻小民隂受包賠之實害則孰若照糧起科明為加派而以九年十年拖缺存留錢糧酌為蠲免其舊而加派其新人情未有不樂從者至於東南孔道各省協濟之銀揆之事理必不可無昨撫臣議五萬臣以為少奈何不允而使獨纍淮揚赤子也夫錢糧足則官操其值以募人如各驛遞等夫則非以利民而且飬民此理之正䇿之上也瓜儀巨商大賈往往有建寺修橋者向倭夷之變揚州外城俱係鹽商倡築不期月而集或懸旌表之令開事例之門或授以冠帶或給以旌匾必有應之者而往來商船除鈔關外量於湖口抽其稅課以佐急此事之權䇿之次也如其不責名實而曰加派不可協濟不可事例抽稅又不可而忍聽民自為賠焉此則可為無䇿矣工科右給事中馮露亦言總漕侍郎王廷瞻三議欲將舊堤備用之石加之新工以石砌潭原議者八今減而六反覆陳舊堤之石不可移八潭之砌不可已工部覆給事主事言皆是報可明神宗實録是年三月髙郵東通興化各場運鹽東河一道堤岸久圮不治民田一派汪洋鹽艘縴䉡稽阻知州邵夢弼通詳河鹽各院創築東堤屹然髙峙北下低田盡為沃壤鹽船行人俱稱便涉商民誠兩利焉九月都御史李世達㑹同按鹽二院題准命郎中許應逵等挑寶應汜光等越河三十六里南北閘二座往來船隻永避湖險先是郎中揚最曽奏開不果至是給事中陳大科上疏極言利害始有是役明年河成賜名𢎞濟後以閘水湍溜損船改平水閘南河全考明神宗萬歷十三年四月戊申以僉都御史張嶽為左副都御史協理院事如故時張嶽進四議其論治河謂夏鎮固當開而沽頭不可棄禮科給事中苗朝陽兵科都給事中王致祥交章駁之遂寢六月壬子寶應越河工成先是寶應有汜光湖素稱重險國初平江伯陳瑄築石堤於湖之東蓄水以為運道上有所受而下有所宣因決為八淺匯為六潭則興鹽諸場皆沒而淮水又間從周家橋漫入洶湧排空萬歷十年一日而弊者千人十二年糧艘溺者數十總漕李世達按臣馬永登鹽臣蔡時鼎議於石堤之東開越河以避其險乃命工科給事中馮露往視之河身長一千七百七十六丈凡為石閘三減水閘二為堤九千二百四十丈石堤三千三十六丈子堤五千三百九十丈費公帑二十餘萬民不知役總河王廷瞻以聞賜名𢎞濟七月戊子論寶應河功河道都御史王廷瞻升户部尚書兼官巡撫如故總督漕運太子太保靈璧侯湯世隆加少保中河郎中許應逵加正四品服俸京堂內推補先任中河郎中陳英主事羅用敬兵備副使莫與齊各升一級海防兵備按察使舒大猷升一級照舊致仕故曹儲左參政馮敏功贈太僕寺卿淮安府知府張允濟升服俸一級與尚書楊兆王遴李世達何起鳴等各賞銀幣有差因詔以後河功邉功疏中不得叙內閣輔臣明神宗實録是年六月初十日漕撫王廷瞻等題奏寶應地方澤國委流汜光一湖尤居窪下上接淮泗長合七十二山之水下通興鹽新興伍祐等場之疆由射陽湖穿廟灣東注於海地勢沮洳素稱險阻國初宣德間平江伯陳瑄築堤於湖之東蓄水以為運道上有所受下無所宣一線之堤當萬頃之波是以決為八淺匯為六潭興鹽田廬竈場俱被淹沒而糧運往來至不可以舟近來髙堰既築足禦伏秋之漲而淮水間從周家橋漫入則橫流白馬湖而直射寶應亦勢所必至也矧其東西相望浩渺無涯洪濤迅浪不時常作加以西風號起洶湧排空蕩擊石堤摧殘舟楫人人不能必命而葬之魚腹中者無月無之無論其逺如萬歷十年間一日而斃者千餘人即萬歷十二年間糧船沉溺者數十隻漂沒漕糧至七八千石殊為運道之梗逺近之民談此湖不寒而栗且東南財賦轉輸以充軍國之需命脈所係豈容哽噎若此臣仰遵廟畫殫力經營夫役用銀募招未嘗派擾里甲朩石差官採買亦不干及有司雖勿亟之令屢申而胼胝之趨益勵興工甫及八月用費猶有餘銀兩堤並築五閘屹然數十里之湖患屏之藩維千百萬之生靈盡居袵席且舊堤有重關之險永無潰決之虞不唯行旅藉之以為安而又居民恃之以無恐萬口歡呼咸稱不朽再照先年髙郵越河開成得䝉欽定河名康濟近年淮安新河開成亦䝉欽定河名永濟今寶應越河視之二河尤為緊要自此而南由髙儀以達于江自此而北由淮浦以出於河實為運道咽喉第一之關利害懸殊事體更重伏乞皇上特賜嘉名以光萬世無疆之業部覆奉㫖是河名與做𢎞濟𢎞濟河奏疏李世達字子成涇陽人嘉靖三十五年進士萬歷二年進右副都御史總理河道未上十二年總督漕運兼巡撫鳯陽黃河南侵淮安告警世達請修石堤捍城寶應汜光湖風濤險惡歲漂溺請開越河殺水勢俱報可明史稿王廷瞻字稚表黃岡人嘉靖三十八年進士以右都御史出督漕運兼巡撫鳯陽諸府寶應汜光湖堤蓄水濟運平江伯陳瑄所築也下流無所泄決為八淺匯成巨潭諸鹽場皆沒淮流復奔入勢益洶湧前撫李世達等議開越河避其險廷瞻承之鑿渠千七百七十六丈為石閘三減水閘二石堤三千三十六丈子堤五千三百九十丈費公帑二十餘萬八月竣事詔㫖褒嘉賜河名𢎞濟進廷瞻戶部尚書巡撫如故明史稿敏功起復故官為漕儲道淮之南故有邵伯寶應髙郵三湖相連為巨浸漕舟過者往往多漂溺因議濬內河通之御史大夫王廷瞻疏上得請而敏功任其囏敏功于河事故心通而役者皆習其能工以故大集敏功益不愛其精力水陸奔走凡七晝夜不休遂得疾臨卒且曰內河成於國計甚利第太逼湖湖善潰而堤薄萬一如瓠子數百里魚鱉矣幸語當事者别創堤以護之兩浙名賢録贈萬歷十年任漕儲道卒太僕寺卿是年八月都御史王廷瞻行郎中許應逵包砌髙郵護城堤杭家觜六百丈又小湖口堤五百三十丈工成郵民至今永賴蓋以寶應越河大工剩有餘料從許應逵之請也南河全考眀神宗萬歷十四年正月已酉工部覆直隸巡按蘇酇題少卿徐貞眀奉命經略水患窮源遡委遍歷周咨惜處財用一一列欵於畿甸水患大有禆益一疏浚深州霸州等處河道共該夫役銀一萬九千三百一十三兩一錢除霸州道屬現有堪動官銀三千七百八十餘兩於真定府存留贓罰銀內動支二千兩保定府五千兩河間府八千五百三十三兩一錢凑足前數委官及時興舉務要挑浚如法河流通利一疏浚安州雄縣保定等處河身及挑築束鹿深州河堤所用人夫隨便役民其工食之費要於各府州縣積榖內酌量動支仍勸諭富民有能慕義偶衆捐資助役者酌量旌異以示勸率一修建河間任丘橋梁及墊築道路共該銀三千六百八十八兩有竒宜暫借該府官銀抵用一挑浚河間獻縣滹沱舊行子牙河之故道因路逺工多難以驟舉宜行撫按轉行道府估工議費另行題請從之三月庚子大學士申時行等陳安民之䇿內云昔成化中議開通惠河京師訛言至以為黑眚之應遂命停止嘉靖初始復開浚成之至今為利臣等以為墾田之舉但宜斟酌地勢體察人情其沙鹻不堪之處不必盡開其見種黍麥之田不必改作應用夫役官為雇募如滹沱等河既難疏治暫行停罷要在不拂民情不失地利乃為謀國之長䇿若以此為害民之事則臣等不敢以為然也上曰覽奏深切治理實議舉行癸卯福建道監察御史王之棟題尚寶司司丞徐貞眀奉詔書興西北水利事其他不敢臆說以瀆天聼惟滹沱一河為真定大患詢諸父老謂此河不可以人力治者併貞明所建議别為不可者十有二事一謂水迅土沙難以修築徵派分出地方滋擾二謂堙塞無定故道難復三謂深州故道枉費無成且水潦漂湃流派難分四謂挑浚狹淺難殺水勢且淤沙害田難資灌溉五謂費少不敷必資剝削恐生民怨六謂羣聚不遏勤勞不息恐致他變七謂引流入衛恐妨運道八謂三輔庫藏倉貯不可罄竭九謂減價易地奪民業生怨十謂工夫鱗集蹂躪為害十一謂不可侵擾附邑十二謂供費浩繁羽士募化非體辨駁甚悉上命㑹議工部覆事無全利亦無全害徐貞眀自奉璽書以來勞瘁道路已垂一年續所報開墾成熟田數則巳三萬九千餘畝其為畿輔利不淺鮮也但盧溝滹沱二河之工實有不便如御史所言者上曰國家舉事當順人心這墾田水利既稱不便先前踏勘時何不題請停止以致輕動擾民建議各官本當追究但本為公姑恕之水田事務著遵㫖停罷徐貞明即便回京先為上覽部覆欲罪建議諸臣輔臣力為救解得免五月癸卯雲南道監察御史毛在題臣巡按貴州事竣報命路由運河見水道淺澀糧艘壅滯當事諸臣隨事料理悉心計議糧船之進不宜專急於過淮過洪先須通其咽喉使閘河無礙上令該管稽查整理十一月辛丑河南撫按官𠂻貞吉等題中土灾沴百姓流離欲將開封等府地方湮淤河渠動支倉庫銀榖小民願自出力者通行修浚并建設閘壩以備旱潦以為興利聚民之政工部議覆上從之明神宗實録明神宗萬歷十五年四月乙亥户部覆兩淮巡鹽御史陳遇文條陳海州舊有薔薇河一道以通臨供興莊鹽運乃年久淤塞遂致繞道東海方達淮安中間苦難較前十倍乃自窰灣起至周家堰共長二千六百三丈五尺工價銀共一千二百五十四兩九錢七分五釐此處挑濬有便鹽運上曰可丁亥工部奏黃淮二瀆逼近祖陵關係甚重自寶應以下鹽河興化一帶海口應濬應通合咨漕撫巡按衙門管河司道議之淮揚水患西南有淮泗西北有黃河髙寶江都有西山諸湖之水以衝動漕堤湮沒民田已非一日聞寶應至廣洋射陽與髙郵江都各路皆有入海惟支河淤塞而不通湖水泛濫而無歸為今之計又當備查疏通支河海口不患其不深矣七月庚子廣西巡按御史蔡系周陳鹽法七事六曰謹河道廣東至梧州水勢甚平梧州至桂林雖險亦易惟桂林至全州中經興安縣陡河原有陡門三十六座向係五年大修三年小修十餘年來廢弛弗舉舟楫難通遂致鹽運坐守日月所費不資今查興安分水塘中間直下入中江原設大石減水陂一座一百餘丈截水不致直瀉要南一路自興安縣北門至三十六陡南岸衝壞去處估計修築計費不滿千金即於鹽利內動支七曰專職守議將鹽務併之清軍同知章下户部丁未蘇松常鎮所轄諸縣俱颶風驟雨數月不息洪水暴漲漂民廬舍無算詔各府錢糧蠲免停折有差戊申鳯陽撫按楊一魁等各題淮揚二府屬髙郵等六州縣富安等十五場俱被湖堤積水淹沒田地議設建閘疏水計估工費共用銀五萬四千七百七兩議將兩淮運司歲修鹽河積年積貯在庫銀一萬四千七百兩淮安府庫原修歸仁堤節省支存銀七百七十兩及撫按鹽三衙門㑹批不應起解贓罰紙贖及原准工部題留徐州採辦花石料價等項銀內截流凑支户工二部如議覆奏報可九月乙卯文書房口𫝊聖㫖河道歲用多少錢糧如何常有淤阻沿河該管官曾否開報著工部查職名來看工部列名以奏得㫖近年河道安流該管官不無懈弛間有淤淺亦不即行開報疏濬致有阻滯仍通行嚴飭有怠玩誤事者該部科指名參奏十二月丁卯工部題泉河閘壩事宜將衛水先儘漕運勿以灌溉相妨茶城口務保萬全勿以茍且塞責坎河口作何捍禦使蓄泄可恃管泉官作何責成使職守不隳至閘河禁例奉有纍㫖一應官民船隻待積水而行有違抗爭先者毋問官豪勢要徑呈本部以憑參治從之明神宗實録眀神宗萬歷十六年二月乙丑工部題覆沁水入黃河衛水入運河其來巳久頃者沁水決朩欒蓮花口而東督河楊一魁有因決濟運之議謂沁水方決其勢悍塞之難固而導沁入衛其勢便而助運易固一說也及科臣常居敬往勘㑹撫臣衷貞吉按臣王世揚議謂衛輝府治卑于河藩封新建恐決開而勢不可禦有衝激之慮且沁水多沙善于入漕恐反為患不如堅築決口闢河身以吐南行之氣而衛河急加疏濬下民間引水灌田之禁尤完計也詔從勘議四月已未工部覆科臣常居敬條上漕河事宜一嚴啓閉以杜淤淺請申飭山陽通濟等閘三月初運畢即為封鎖瓜州二閘俟蘇浙運畢封鎖官私船隻照舊車盤勢豪干撓者法無赦一催糧運以謹河防謂四月黃水生則河波驟發漕糧俱二月終盡數過淮則壩可築而白糧一運每至愆期不得不緩壩以待之宜督所司填注限單務令漕白二糧次第過淮以便修築一議錢糧以助河工謂河工銀歲額三萬而費至六七萬每以不敷停修貽害不小宜核所在逋負立限追解無為墨吏積胥所沒以致匱竭無措一稽工料以資實用謂運河延袤千有餘里歲用樁草繩檾灰石之屬皆河工急須而名實不相覆上下因循恣為奸弊宜慎加釐飭及修築未久旋報奔潰者追還料價一重修守以謹河防蓋治河如治邉防水如防虜邉臣守邉有叙勞之效而河臣奔走風濤拮据之苦視邉臣尤甚宜于歲終分别紀録三年類題果有成勞豫之優擢則人心競勸而河防益飭上依議癸亥勘理河道科臣常居敬㑹同督臣舒應龍再上河工一十四欵前二欵入黃河一築寶應西堤以東流漕蓋寶應湖口運道所必經近來挑濬徒勞淺澀日甚緣水勢散緩泥沙易停議於山陽一帶培築西堤以束水勢令無壅淤則糧艘不阻一砌邵伯湖堤以免歲修蓋邵伯湖一淺二淺等處正當波濤衝擊而排樁廂板其何能禦應盡包石以捍其鋭一濬理河身以利長運自淮安至儀真內河舊三年一濬後歲一浚之久之且置勿濬矣合於重運過畢清口大壩工完之後乘時挑浚并查復淺船之制一酌議分地以便責成以梁境至首閘屬之夏鎮主事茶城至清口黃河屬之中河郎中而夏鎮及南旺兩主事并給關防敕書視河道郎中例以重事權中三欵入黃河一設山陽長夫以便河工蓋山陽河夫向皆市儈雇覔故增減之弊滋而逃亡莫可禁議令諸儈入銀官雇注名立冊按冊撥夫實為長便一寢開支河以防善淤蓋閘河水泉不多難分為二宜寢其工一查議故道以損繁費蓋閘河出口無不與黃值即改避而南亦難逺害况弱末之流不足以濕淤沙故道之議固應並寢後二欵入黃河俱如議行五月丙戌勘科常居敬疏新運已臨天時亢旱再條八事一濬泉源以資灌注一復湖地以預瀦蓄一築汶河以防滲漏一建閘座以便節宣一設閘官以肅漕規一給關防以重事權一嚴築壩以便挑浚一復夫役以備修防部覆如議七月戊寅工部尚書石星題山東淮陽一帶河道應修應築如總河潘季馴勘科常居敬所議添設鎮河閘接築塔山縷堤清江浦草壩創築寶應西堤石砌邵伯湖堤疏濬裏河淤淺增設栁浦灣料厰此當在淮揚興舉者也查復南旺馬踏蜀山馬場四湖建築坎河滚水壩加建通濟永通二閘查復安山湖地此當在山東興舉者也地里寥逺工程浩大宜將郎中羅用敬副使周夢暘等分地責成御史不時稽察而總河大臣仍親自查閲工堅可久者從實奏報推諉誤事者即時參處上是之仍諭河工著各照分定地方用心管理上緊完報不許踈玩九月丙辰直隸巡按御史髙舉奏報魏縣頻年旱荒今秋又被漳水淹沒請蠲秋糧五分仍酌行賑濟上從之甲子駕幸石景山欲觀渾河趨召輔臣時行等三人及定國公文璧臨淮侯言恭飛騎而至上巳御河岸幄次叩頭畢起乘橋橋為二道諸臣從上異道而行上命同道後隨臨流縱觀目時行前曰朕每聞黃河衝決為患不常故欲一觀渾河今水勢洶湧如此則黃河可知時行對渾河來自西北古稱桑乾河是也從此出盧溝橋至直沽入海水漲時亦多洶湧至如黃河發源崑崙自積石龍門㑹淮入海衝決之勢不啻數倍黃河每一潰決逺至數千里自徐州至淮安屬當運道所關最重上曰行河官應恪乃職時行對近奉詔委任責成並知警惕上曰經理須要得人時行對皇上留意河道拔用舊人一時在任皆稱諳練不敢輕率誤事上首肯言須得人者再時行對如諭立良久乃下命從官先詣功德寺候駕仍賜酒饌丁卯大學士申時行題臣等隨侍聖駕幸石景山臨觀渾河伏䝉皇上召臣至橋次示以水勢且言黃河衝決經理須人臣等承面諭不勝歡躍仰見皇上一遊一豫莫不以國家為心民患為慮即堯舜其咨之憂俾乂之命不是過也倉卒應對未及周詳兹敢以河道利害為皇上悉陳之渾河來自西北古桑乾河至天津直入沽海當其泛漲之時亦有衝決之患然不關運道亦不近城郭猶未足為深慮也至若黃河發源崑崙流入中國至積石龍門已數千里經陜西河南則涇渭伊雒諸水皆入其中又經徐州至淮安與淮水合當其壅淤則數丈之渠一夕而成平地及其潰決則數千里之堤一瞬而成洪流湍激洶湧比渾河不啻十倍先朝時決時塞皆命重臣經理而後成功未有數十年無事者也今之治河者為鳯泗祖陵則防其西侵為漕糧運道則防其北徙為淮安數百萬生命則防其南決故功力巨而責任難未有不得人而成功者也皇上得人之諭於治河要務一言蔽之第臣等雖奉德音而在廷及河道諸臣或未能仰體欲乞特降明㫖轉諭河臣俾曉然知皇上憂勤之意而從事河渠者且惕然有夙夜奉公之心矣報曰朕聞黃河衝決為害不常欲觀渾河以知水勢昨見河流洶湧應知黃河經理倍宜加慎河道官應行文知㑹務一勤永逸勿以勞民傷財為故事至選用務要得人吏工二部知之明神宗實録行水金鑑卷一百二十四
