body:
  text: 行水金鑑巻一百二十五江南按察使傅澤洪撰運河水萬歴十六年都給事中常居敬上查理沁衞二河疏云牌行該道看得此番行查係奉欽依事體重大駁行二府掌印官行令劉薛二同知及㑹委臨河汲新河武等七縣各掌印官勘議俱親詣沁衞二河踏勘間當據汲新輝獲等縣社里老等告稱衞河發源在於輝縣蘇門山下其水陡峻通流灌田不過㱔須並無淤阻其沁水河身寛一里有餘衞水河身寛不過三四丈先年曽遭沁水衝開朩欒店蓮花池堤口附近地方俱受渰沒且流入獲新二縣城門用土屯塞漂流民舍渰沒民田一百二十餘里衞輝府闗廂巷口行舟衝倒民房八千餘間壓死男婦陳可立等百十餘口等情各具告到官㑹看得引沁入衞固殺黄河之流且濟運道之便但恐沁水本大若一入衞河二水合流勢必滔害不惟各縣民居民田深有可虞况潞府新建方將髙其堤預其防惟恐不固而敢引沁以貽不測之患等因到府又准本府同知劉應聘㑹同衞輝府同知薛應麟闗稱各親詣衞河源頭踏勘得衞水流清土堅原無淤阻雖有軍民水田葢為水由地行故乗勢以資其灌溉非敢阻塞以專其利也前此雨暘時若源泉不枯河水盈溢漕舟無滯年來亢旱泉源不流而漳河以下諸水亦俱淺澀因此衞流愈覺細微此議者不得不歸咎於居民灌田至于引沁入衞謂扵漕河有濟也但查沁水原無支流可以通衞今欲因衝決之道而遂挽之以入衞則目前似足以助衞濟漕而將來水緩沙停其終必致淤塞則既見其利而又思其害是不可不為深長慮也等因㑹闗到府尤恐不的隨該本府知府趙以康㑹同衞輝府知府周思宸親詣前項河口逐一踏勘㑹看得衞水枯澀併沁於衞則衞水大而漕舟可行豈不曰運道有所禆益哉但衞小沁大則其勢難容衞清沁濁則末流必淤如先年沁河一決而臨清東昌等處遂至淤塞徵之往事竊恐不減黄河之害而又増運道之梗斯時歸咎誰其任之且沁衞地勢髙下殊縣必須創開河身沿河築堤此其費地費工固為不貲而伏秋水漲横流滔天則生靈城池不可不為之計也此皆前人已有成説利害較然如曰姑舍是而輕試以建非常之功非職等之所敢擅議也至若引水灌田誠當禁止但末流之㣲細實起於源頭之枯竭即今三年亢旱泉源幾至不流有如昨歳運道阻澀漕院差官守視衞源盡導上流而管河道亦駐劄輝縣親至泉所禁之非不嚴也斯時田禾日槁而衞水不増則其故仍不係於淤阻也惟是漕運重務係闗匪細合無以後水源有餘則從民之便而不妨與民同利亦可也如水源不足則禁其引灌而專以濟漕等情該臣㑹同巡撫衷貞吉巡按王世揚議得古今論治水者孰不曰順水之性行所無事哉然而地當中土勢有重輕利害所闗又非可以甞試而漫為者沁河發源西晉經帶河内沛然東下勢若建瓴惟至武陟城東復折而南與黄河㑹流以故昨秋暴漲束隘難行遂致潰溢直衝朩欒店決蓮花口滔滔東注則引沁通衞其勢良便也但細查衞輝府治地既卑下河復狹隘狂流灌注容受為難即今獲嘉已成巨浸新郷亦若浮盂該府城垣去河不逺衝決之患殊為可虞况今藩封新建闗係尤重昔人所謂不與水争利者誠有不得而槩論者矣且沁水沙多善淤一入漕渠淤墊閘座昔有左驗恐利未得而害且隨之也既經道府勘議明悉又該臣等親閲相同仍應堅築堤壩寛闢河身務使南行無滯庶為長策至于漳衞上源據稱天旱泉㣲誠有之矣但民間灌溉壅遏泉流致妨運道合行該道將一應私壩悉行拆毁如遇雨少泉微盡令導入漕渠以濟糧艘河北分巡道仍不時周行巡察禁治如有阻撓許巡漕御史拿究如是則沁不得以病衞衞又得以濟漕其于國計民生均有禆益矣已畧見實録再書其全疏扵此又查理河漕疏云照得國家定鼎燕京歳輸漕糧四百萬石運艘涉江淮經徐邳入運河抵京師濟寧以北必資汶洸泗沂諸水而徐邳以南必資淮黄二水濟之俱㑹淮安外河掠草灣歴雲梯闗入海北髙南下勢若建瓴淮弱黄强時有衝阻𢎞正以前姑不必論嘉靖末年河道日益多故歸德而下丁家等口忽然衝塞黄水不從小浮橋故道達徐初徙扵溜溝再徙於秦溝三徙扵濁河口扵茶城相近全河逆行至嘉靖四十四年徐邳一望瀰漫不辨州里該先任尚書朱衡改建南陽新河運道復通自老黄河故道既失雲梯海口未疏隆慶年間河決扵崔鎮淮決扵髙堰寳應興鹽等州縣遂成巨浸水泛沙停轉運甚艱至萬歴六年先任右都御史潘季馴創築遙堤盡塞諸決束水歸海使由故道民獲安堵漕得順利巳逾八年其功昭昭在人耳目惟是支河既塞海沙尚髙一帶河身日漸淤墊決塞之患比歳稍多在淮安上流不分全河直衝范家天妃等口通濟福興諸閘歳苦衝淤王公堤屏蔽清浦歳遭二瀆嚙射隨修隨圯勞費不貲在徐州下流不分黄水倒灌古洪内華諸閘淤塞日乆今幸極力挑通萬一黄河暴漲不免復淤阻滯運道闗係不小髙寳一帶由淮引黄河渠日髙雖有河堤越河足避風濤然邵伯寳應二堤尚未包砌土堤單薄巨浪乗風傾潰可慮善後之計不可不圖謹將淮揚應議應舉工程欵列開呈等因到臣臣先同劉懷恕等自上而下由豐沛經徐邳以至桃清復同侍郎舒應龍等自下而上由清浦以至古洪梁境一帶或艤舟閲視或登陸荒度看得豐縣田劉口河勢掃灣原有縷堤坍入河中新築月堤一道堪以防禦郭家灣匙頭灣栲栳灣等處雖係迎溜見今修築埽壩亦無大害徐邳自桃源五百餘里河身就下河岸甚髙遙縷二堤俱無衝決歸仁集髙家堰范家口續修石工俱各堅厚寳應越河運艘甚便惟古洪河口去秋濁河倒灌今雖挑通尚屬可虞清江浦一帶運河與黄河僅隔丈餘王公堤二百九十丈二瀆南徙衝刷日甚堤懸一線勢甚危急至扵髙寳西堤邵伯石堤俱屬要害委不容已一一查閱眀白議照我國家輓漕東南全頼河渠古洪以北必資汶泗諸水徐邳以南悉藉淮黄二瀆河雖不同利害相因故理漕必先於理河治黄即所以治漕誠不可一日不講也然徐州以上之河恐其潰而入有衝決之患徐州以下之河恐其潰而出有漫散之虞審水性之順逆酌時勢之緩急要非可以執一而論者往無論矣嘉靖初年河漸北徙濟寧魯橋以下河道􅌎填至嘉靖十三年該副都御史劉天和挑濬河身復修閘座四十四年河決沛縣舊河􅌎塞該工部尚書朱衡開通南陽至留城新河徐邳以上河道頼之隆慶以來黄河決崔鎮等口淮河決髙堰等處二瀆漫流水緩沙􅌎運道艱阻該右都御史潘季馴創築遙堤盡塞諸決兩河復合沙刷水深運道民生均有禆益徐邳以下河道頼之雖先後河臣經畧良畫尚不止此此其功之最著者也惟自萬歴十四年以來清河以下一決范家口而全河幾奪一决天妃壩而福興漸􅌎徐州以上濁河灌注古洪阻塞要害之地委屬可虞然則有思患預防之心者安得不為補偏救弊之謀哉但據稱上源小浮橋之路乆塞故道當復也支河當開也下流之老黄河難復三壩當拆也草灣當濬也此其計慮甚周而用心良勤矣臣等隨處查勘虛心商度故不敢曲狥以茍同亦豈敢有心以求異然而勢當酌其所急功必期其可成茍或心思雖竭而經理實乖議論雖多而治效則鮮於河道終無補也今據司道㑹詳臣等復加酌議謹將應舉應停工程事宜欵列分别上請其當行者雖無新竒之見而實切扵事機其當止者雖嫌意見之殊而實採之輿論河漕重務彼此何心要皆求以便國計謹題請㫖條上一十四欵畧見實録又疏云照得國計莫重於漕河漕河必資乎水利我成祖文皇帝定鼎燕薊輓漕東南自徐邳以北臨清以南千有餘里全頼汶泗沂洸諸泉之水以濟運道雖祖元人㑹通遺意然壩戴村遏汶流分濟南北則尚書宋禮用老人白英之議也其間設官立法建閘築壩至精至備二百年來運道其永頼矣第泉源雜於沙礫則湮塞甚易湖地侵於豪右則清復為難至於事權間多牽制法制廢於因循兼之天時久旱地脈漸㣲運艘經行不無遲滯乗時經理委不容緩兹者上厪聖懷特申聖㫖臣等周行河上逐一查勘博采羣䇿列為八事雖率循不外于舊章而經畫似關乎要務謹題請㫖一濬泉源以資灌注查得㑹通河南北千里盡頼十八州縣百八十餘泉之流分為五派至于新泰萊蕪平隂汶上蒙隂寧陽等九州縣入南旺者為分水派泗水曲阜等四縣入濟寧者為天井派其功最大其所需尤甚切也夫藉泉以資運則涓滴當惜必使源流充溢庶於漕渠有濟若飬身者氣血周流無滯始無壅閼之患也乃平昔之疏濬既疎天時之亢旱又乆是以泉政多弛通流無幾近據管濟寧道按察使曹子朝分守濟南道叅政吕坤新濬出㤗安州謝過城等六泉新㤗縣劉官莊等五泉萊蕪縣韓家莊等五泉東平州源頭泉一處曲阜縣新跑泉一處發源頗盛導入汶河堪以接濟則自此之外安知無湮沒於沙礫而散漫於草莽者乎但濬泉雖易治汶實難葢河廣沙深屈曲之流不足以潤乆渴之吻臣等親見龍灣等泉源源而來至汶則一吸而盡猶無泉也又必督令撈淺等夫擇其積沙淤漫者濬為河泓俾深五尺闊一丈則水得所歸而趨壑亦易矣然各泉坐落各府州縣近者四五十里逺者三四百里管泉分司豈能遍歴近奉聖㫖各分守道兼管巳為得䇿矣臣以為仍當責成各州縣掌印官督率夫老不時疏濬每年終分守道㑹同管泉分司將各官新泉搜出若干舊泉廢棄若干𩔖報總河衙門分别奬戒庶人心有所警惕而泉流足濟運道矣一復湖地以預瀦蓄查得山東泉源有時微細故設諸湖積水以濟飛輓盜決有禁占種有禁誠重之也乃今則不然南旺安山蜀山馬塲等湖始因歳旱水涸地屬閑曠當事者召人佃種徵租取息以補魚滕兩縣之賦於是諸河之地平為禾黍之塲甚至奸民壅水自利私塞斗門復倡為湖低河髙之説申禁非不嚴而占恡若故矣除安山湖批查未報外今勘得南旺湖周圍九十三里計地二千七百頃原有斗門一十四座止存闗家大閘常明口二處其餘邢通口孫强口等十二處俱巳湮塞合行修復本湖東邉髙阜地量留䕶岸一里共計一百六十二頃南北留䕶岸地半里共計一百一十六頃一十畝令原主佃種納課其餘專備蓄水仍築子堤一道以為封界湖内北髙南低應於中亘築長堤一道自吳家巷天字號起至黄家寺止長一十四里根闊一丈五尺頂闊八尺髙八尺界為二區寺前舖張住口建斗門一座以便上下接濟馬踏湖周圍三十四里零二百八十步計地四百一十餘頃俱應退出還官其東北空缺處長十里零二百四十步應築土堤一道約束湖水不使洩漏西岸原有王岩口滚水石壩年乆渰沒合行修復蜀山湖周圍六十五里零一百二十步計地一千八百九十餘頃除宋尚書香火地六頃并高亢地八頃五十三畝照舊令民佃種納租外其餘地一千八百七十五頃四十六畝二分俱築堤蓄水東岸季泰口閘以下十五里原有馮家滚水大壩相應修復馬塲湖周圍四十里零三分内髙阜地九十三頃二畝先年召種納課抵補魚滕縣糧今查前項補足責令退業還官并低窪地六百四十頃四十二畝九分俱築堤蓄水内有安居斗門三座合行修復至各湖占種麥田法應追奪但念年荒民貧且成業已乆收成將近候麥熟之日令其芟刈照地退還以上各湖應修復斗門閘壩堤岸工料人夫等項細數冊報外通共該銀四千七百一十七兩七錢於兖州府庫河道銀内動支修完于湖口竪立大石明註界址斗門以杜侵占如是庶法紀眀而漕河永有頼矣一築坎河以防滲漏查得汶合諸泉之水西流抵南旺分注南北以成漕而濟運故汶蓄則漕盈汶洩則漕涸夏秋之間水固有餘冬春之後不可使有涓滴他適明矣乃戴村以上有坎河口西趨鹽河為入海故道沛然就下勢若建瓴先年總河侍郎萬恭堆集石灘蓋謂溢則縱之平則留之意甚善也但時乆灘廢非不歳有修築而沙堤一線亂石數堆其走洩甚易矣萬一泉河盡趨則運道之涸可立而待豈得為完計哉臣等督同管河同知陳昌言東平州判官張汝榮等㑹估得本口應修滚水石壩一座計長六十丈面闊一丈厎闊一丈五尺深入土四尺出土三尺并鴈翅細石及樁朩鐡灰工食等項除細數冊報外通共計銀八千一百六十七兩四錢一面辦料興工水溢則由頂以上任其宣洩水落則由壩以内盡資實用且以免鹽徒盜決之弊也汶其有全利乎或者以地多沙磧恐築之不堅不知石灘之外原有老土石壩不髙入土巳深其勢自固且汶河隨漲隨消終非黄河比也又何衝決之患耶如是則一勞永逸而歳歳補石之費亦可免矣一建閘座以便節宣夫漕河之水名曰無源葢謂其出有限而其流無窮所以撙節積蓄俾盈科而進全有頼於諸閘也故地有髙下則閘有疎密要之勢相聫絡庶幾便於唘閉惟濟寧寺前舖閘至天井閘則延長七十里東昌通濟橋閘至梁家鄉閘則延長五十里閘唘水洩積蓄為難司河者每當糧運盛行之時排朩堵水名為活閘茍且一時終非乆計甚至各幇運軍船一經過捧土築壩流入河中愈成灘淺運艘正行不便挑濬無惑乎舟行之艱也合扵二處適中之所南則鉅野縣火頭灣地方建閘一座名曰通濟北則博平縣梭堤集地方建閘一座名曰永通俱照各閘事規啓閉濟運除各匠役工食候工完扣算外每閘估計粗細石料并木樁鐡麻船隻等項各該銀三千九十五兩八錢九分五釐於東兖二府河道銀内動支每閘閘夫三十名溜夫五十名即於各縣停役夫内撥用如是則闗束有具節宣得宜水利有所停蓄而運艘不致淺閣矣一設閘官以肅漕規國家之設官也有似大而實冗者裁之為宜有似小而實切者増之為便查得運河一帶閘座每閘設官一員統領夫役葢唘閉有人責成良便頃縁新河告成棗林上下水平閘面不行唘閉遂將棗林閘官裁而不設間付之南陽閘官兼理之邇來天時乆旱河流細微木閘水淺唘閉為急尚可以南陽之官攝之乎夫一唘南陽一閉棗林互相闔闢勢如呼吸一不得人直瀉而盡矣近且無官付之一二閘夫之手在官船則莫敢誰何在民船則大為簸弄既以病商復以弊運以故漕舟至此殊費牽輓而往來者亦稱不便也不知閘官雖卑職掌猶在且廩俸無多國家亦何惜此五斗而令河道要害之地為無人之境哉合於棗林并新添二閘各設官一員俾司閘務庶職守得人而漕規不廢矣一給關防以重事權國家之事莫重於河漕故於泉閘特設部臣經理之所以重委任而專責成也各管河郎中俱奉有敕印是以文移稱便惟南旺管泉主事其設巳乆闗防未給因循至今夫管泉管閘先年曽以二人理之今并責之一官其任亦重矣督理乎十六州縣之泉而相隔數百里之逺止以空白文移臨之即旁午載道鮮不以弁髦視河臣欲其昭法守而一衆志也難矣且糧船過閘例應十日一報漕撫衙門相隔千里無闗防則驛逓不行事多掣肘殊非一端夫以一閘官之微尚有條記闗防何獨於部臣而反靳之也至於漕河黄河二同知職守既專責任亦重凡工程之勤惰錢糧之出入咸頼稽察事緒孔棘弊竇易生使少失於防閑未免稽違河務近見邸報楊村管河通判巳奉明㫖給與闗防則兖州府管河同知事體相同合無將管河主事并兩河同知均賜鑄給庶文移便而事權重矣一嚴築壩以便挑濬照得汶水入湖接濟運道每歳寒沍之時遂將河口築壩合流分洩蜀山馬踏等湖候來春氷泮之日開壩受水是冬則以河之水滙於湖春則以湖之水濟於河故南旺臨清一帶因得乗時挑濬不致淤淺法至善也除隔歳大挑巳奉有欽定期限外其餘每年當天氣漸寒正宜築壩絶流也而往來船隻力以緩築為請多方阻撓甚至十一月中尚不得築者不知天寒氷合乃驅荷鍤之夫裸體跣足鑿氷施工其將能乎及寒氷初解正宜固封蓄水也則又以速唘為請百計催促至有正月初旬放水行舟者不知隔歳之水所蓄無幾三春無雨則運艘方至又將何以濟之乎法制未明事體掣肘管河官徒茹苦而不敢言也合無請賜明㫖除大挑年分外每年定以十月十五日築壩絶流至次年二月初一日開壩行舟勢豪船隻不得横擾該管官員不計阿狥違者聽督撫衙門叅究大書刊石於南旺板閘二處以便觀覽如是則明㫖森嚴人心惕怵不但便於挑河亦且足以蓄水一舉而兩得之矣一復夫役以備修防山東河道淺深不一而汶河衝發淤塞為多各項夫役俱不可缺查得兖州府屬如汶上鉅野嘉祥濟寧魚臺南陽利建等處原額設撈淺淺舖堤夫名數不等共計二千四百五十二名後因河流稍順遂裁減一千一百三十三名扣銀入官以備支用止存見役夫一千三百一十九名不知扣存有節省之名而雇募起無窮之弊一時河道淤淺調度徵發為難工之弛廢乆矣今議於汶上縣量復撈淺夫七十四名淺舖夫三十名鉅野嘉祥二縣量復撈淺夫三十八名淺舖夫五名濟寧衞量復撈淺夫一十一名濟寧州量復撈淺夫三十二名淺舖夫十二名魚臺縣量復撈淺夫十名淺舖夫二十名南陽利建量復堤夫八名東平州量復泉夫二十名東昌府通濟橋閘量添閘夫十名庶挑河濬泉不致乏人矣然猾民之包攬肆意安閑管工之代替任情隠射甚至逃故不報占恡私意種種情弊雖増猶弗増也合行管河同知陳昌言通判王心逐一汰選嚴加稽覈庶工役得有實濟而河防不致稽違矣部覆奉㫖依議行實録止載欵目故扵此備録之又清復湖地疏云查得安山一湖周圍共一百里其間東北自通湖閘起至西北焦天禄莊止計長十三里自焦天禄莊起至西南王禹莊止計長七里零自王禹莊起至東南青孤堆止計長九里零自青孤堆起至通湖閘止計長七里零周圍共計三十八里此係水櫃堪以積水者也但湖形如盆碟髙下不甚相懸水積於中原無堤岸東南風急則流入西北燥地西北風急則流入東南燥地未及濟運消耗過半且自許民佃種以來百里湖地盡成麥田先年總理河道傅都御史履畝分析除徵租銀二千六百五十三兩歳抵魚滕二縣秋糧外其低窪處所封為水櫃法非不善但統籠無界禁例不嚴民情無厭漸至今日殆無曠土矣為今之計應將水櫃三十八里築一髙堤堤以外照舊佃種徵銀堤以内挑深蓄水管河通判等官不時巡歴庶堤界既明人無盜種之弊矣至于安山閘邉原無通濟積水二閘不便出水訪得萬歴九年有金把總曽于八里灣掘溝放水人甚稱便至今形迹猶存應於此處建閘一座又西北地名似蛇溝其地更低水勢散漫應於此處亦建閘一座庶於舊閘入者於新閘出蓄洩得宜漕河有頼矣等因臣等㑹議得設湖蓄水本漕政之良規清湖濟漕實治河之要務自南旺而下四百餘里始達衞河其間全頼安山一湖積水濟運所係之重何如也惟自召佃之弊政一行而豪民之侵占無巳變沮洳為膏腴視官湖為已業日侵月削乆假不歸寸土無遺殊可痛恨即今乆旱河淺百計疏濬如抱漏巵沃焦釜傍徨無䇿皆縁水櫃未復之故也及今則清湖蓄水真若蓄艾豈非第一義哉侵盜奸民本應盡法重究槩奪還官亦不為過但私相授受其來巳久展轉耕佃巳非一人且四外髙亢之地不便瀦蓄終成曠廢據勘將少窪之地三十八里周圍築堤封為水櫃既可以免滲漏易竭之患又可以杜强梁無厭之謀似亦計之得也外八里灣似蛇溝二處便於放水委應建立閘座其築堤建閘之費初據各官議將盜種湖麥刈半入官以為工料之需但恐饑民乗機起釁且非大公之體仍聽本主收割前項經費相應動支河道銀兩應用清理之後大竪石碑眀立文冊又必嚴盜決之禁定巡視之法如是則一勞永逸而國朝水櫃之良規庶幾可復矣濟運通漕豈曰小補之哉謹題請㫖發部議覆奉㫖這湖地依議築堤仍畫定界限永逺遵守如有侵占盜決等弊照前㫖着實叅治其各處泉湖蓄水濟運的都着一體查清整理河防一覽是年都給事中常居敬題准増修鎮口閘一座先是山東汶泗清流勢必假道茶城出口㑹黄自隆慶四年至萬歴十一年每為黄流倒灌稽阻重運漕撫尚書凌雲翼議改漕河於古洪出口建内華古洪二閘逓為唘閉以避黄淤前年黄水大發河與閘平淤塞甚逺挑濬稱難至是居敬請建前閘去河僅八十丈以行糧運自開泇後預行挑濬專備囘空南河全考是年開諸閘月河板閘清江福興通濟新莊各閘上隔黄河倒灌之患下便節宣之勢近來黄强淮弱五壩不通閘座不閉以致泥沙内侵伏秋水溜漕舟上閘難若登天每舟用縴夫三四百人猶不能過用力急則斷纜沈舟故是年於各閘旁俱開月河一道避險就平以便漕輓淮安府志行水金鑑巻一百二十五
