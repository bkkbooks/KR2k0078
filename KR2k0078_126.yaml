body:
  text: 行水金鑑卷一百二十六江南按察使傅澤洪撰運河水明神宗萬厯十七年三月甲子工部言運河水源淺澀全賴南旺蜀山馬場等湖蓄水接濟嘉靖間兵部侍郎王以旗築大堤封為水匱年久圮廢往年科臣常居敬踏勘議於南旺湖築長堤蜀山馬場湖各築子堤今總理河臣潘季馴言水勢瀰漫長堤子堤俱在湖心難以施工宜將嘉靖年間舊堤培築髙厚其納水處所不便築堤仍密栽栁樹以為封界報可五月己未詔修守清江浦運道七月丙辰南京禮科給事中朱維藩言南京內城三山門直溯江流舟船如織而今巳湮塞各府倉糧悉由水道用進今盡失其舊舍舟而徒費不可言臣以為在倉糧則宜會計其數凡支幾年少則分投督催又不敷則於豐足處收糴在河渠則由城外以達城隅責成所司作速挑浚章下戶工二部議覆各府未完米糧除現災緩徴外餘嚴督徴解工覆河渠淤塞責成都水司及應天府水利官查勘設處俱允八月已邜漕運總督舒應龍等條議漕務五事一渡江限期下江浙江原有挑河銀一萬兩今則什不及一以致松蘇一帶裏河淺涸宜每嵗秋盡築壩之時盡行疏導使漕艘得以及期渡江一逺船起剝糧船赴北向以張家灣為住泊起剝之地至隆慶四年議由通惠河至石土二壩請自今到灣悉聽雇船起剝部議覆從之十一月辛酉巡撫應天右副都御史周繼言上海縣李家濱老鸛觜築塘包石以捍海水不可已武進縣橫林等處􅌎淺巳甚運河泥砥盡露築濬之功不可緩據所用工費在築海塘計該銀八萬兩在開運河該銀六萬兩乞於南京帑銀內給發責令趁時興工工部覆內外匱乏大工並舉恐非所宜南京帑題發巳四十萬兩亦難再請合候水利工完漸次舉行漕河果係淤塞應行挑濬即於河道漕運衙門修河正項銀兩動支報可明神宗實録是年總河都御史潘季馴修建邵伯湖石堤一道長一千二百八十丈補舊石堤六百十三丈南河全考是年築西土堤寶應縣之西十餘里有白馬湖於湖之東築八淺石堤長八十五丈六尺又兼漕水旁潰入寶應湖以致流緩沙停自黃浦至三官廟之西築西土堤長三千六百三十五丈束水由漕以省挑浚之費淮安府志明神宗萬厯十八年七月庚申以南京河渠工完敘有功員役侍郎張檟等升賞有差仍詔以其餘銀嵗修河渠明神宗實録明神宗萬厯十九年三月乙已總理河道潘季馴議以鎮口閘去河甚近雖淤易為疏通宜照舊道挑濬科臣復稱引衆議欲開月河以分水勢通蘇洵湖以導積水部覆上命河漕等衙門勘議妥當具奏閏三月巳丑兵部題右都御史潘季馴議稱漕河自溜溝至薑家橋一帶堤岸係運舟牽挽必經之地因在湖中屢遭風浪衝塌宜用石包砌每三里留水門一道計用銀九千四百四十兩於嵗修并輕賫米銀內動支著如議行七月丁邜鎮口一閘遇挑濬時糧艘民船停留數日巡漕御史賈名儒請將本閘之東有新開支河處再開一口建閘三座名為東鎮閘與西閘遞相啓閉使挑濬行舟各不相礙其工費取辦嵗修銀內乞作速勘議十一月癸亥工部題河道都御史潘季馴條議前四條分入黃淮二河一浚河湖以利漕渠謂自夏鎮閘迤南起經李家口等處挑開裏河一道計七十餘里從滿家閘西築攔河一壩使汶泗上源之水盡歸新挑河不得泄入諸河以致勢分力弱又于李家口設減水閘以泄沛縣積水將仍前議新砌湖邉石堤移建東岸以當風浪則新河既可隔絶湖水砌石又可捍禦河堤於運道民生所利非淺但功費浩大合依所議備行淮揚撫按官查勘另行題請著依擬行明神宗實録明神宗萬厯二十年九月乙酉工部覆總河舒應龍漕撫陳于陛勘河張貞觀按臣曹楷王明會題先年議開鹽河海口泄湖水固運堤分為東西北三工今東工告竣北工有緒惟南工錢糧缺乏未舉而東工尚當濬港開支北工改挑取直南工開新河浚舊河通計工費一萬五千八百議動運司挑河等銀及先復江都三塘以驗灌溉乞行總河督撫科院諸臣照限興工報完詔可十月丁亥兵部覆議給事中張貞觀言淮揚運地咽喉徐邳則繇海入江之徑道宜再募土兵一千合瓜儀等兵增一參將専駐揚州再於徐邳募土兵一千五百量與各衛軍丁訓練以備調發報可明神宗實録或有問於馴曰清江浦一線之堤廣者不過三四十丈窄者僅二十餘丈兩河掃汕能無慮乎馴應之曰陳平江開鑿清江浦一帶通河濟運所留堤址原只如此問者曰何以徴之馴曰不觀車盤五壩乎五壩去河僅二十餘丈進船水溝每為濁流所淤常事撈濬如更廣也何以能車盤也今河由草灣清江浦淤沙稍逺船遂不能進矣此正陳平江之妙用也又不觀之惠濟祠前之石堤乎乃宣德年間之所築也其廣亦不滿二十丈此古迹也豈亦剝削而然哉且各處遙縷堤面廣不過二丈餘尚欲恃以為固矧於二十丈者乃云不能守乎若每嵗掃護之工及磯觜壩之築則不可少耳或有問於馴曰泇河膠河與海運之議何如馴應之曰二河之不可成備載勘議諸臣之疏一覽自悉然馴之意則謂不當辨其可成與否也假令膠泇告成海運無阻將置黃淮於不治乎亦將併治之也夫治河之䇿莫難於我朝而亦莫善於我朝蓋自宋元以前惟欲避河之害而巳故賈讓不與河爭之説為上䇿自永樂以後由淮及徐藉河資運欲不與之爭得乎此之謂難然以治河之工而收治漕之利漕不可以一嵗不通則河不可以一嵗不治一舉兩得乃所以為善也故宋元以前黃河或北或南曾無寧嵗我朝河不北徙者二百餘年此兼漕之利也今欲别尋一道遂置兩河於不治則堯舜之時泛濫於中國者此河也縱使漕艘無阻民可得而食乎况膠河去河尚逺若泇河必從直河沂河等處出口復與黃合而中假相隔之地近者僅三四里每嵗水漲勢必漫入可不治乎如欲併治則張官置吏設夫備料嵗費不資一之不支其可再乎至於海運之説尤為支漫往嵗巳有明鑑不必瀆陳卷查萬厯五年十二月內節奉聖旨近來河淮為患民不安居朕何嘗一日不以為念先年以運道梗塞不惜重費欲别求一道以利轉漕乃議者謂治河即所以通漕遂降旨專責當事諸臣著一意治河欽此大哉王言可為萬世蓍鑑馴又河容復贅問者曰夏鎮新河非别尋一道乎馴曰此河僅於閘河中直截一假至留城仍歸原河出茶城即今鎮口仍與黃會此與三沽舊河無異特欲避卑就髙非棄黃河於不治也治河者審之或有問於馴曰濬睢河以為通運旁行一道且可殺河流也其説何如馴應之曰考之括地志云睢水首受浚儀縣浪蕩渠水東經取慮縣入泗過沛浚儀取慮二縣皆隸河南漕河圖志云宿遷縣小河在本縣東南十里源自開封府黃河來流經歸德州虹縣宿州至睢寧縣東南流六十餘里至小河口以入漕河蓋括地志所載乃黃河入北海之時故止云睢水而不及黃河漕河圖志所載乃黃河南徙之後故直指黃河來流也淮安志云小河在宿遷東南十里以其淺狹故名查得𢎞治六年侍郎白昂曾導水自歸德小壩地方經睢寧至宿遷小河口入漕河比因河決河南之金龍口衝張秋勢甚危急故濬此河以殺水勢耳然不久遂淤蓋河不兩行徐邳之河與小河必無並行者今自徐溪口迤北直至永城縣一帶俱成平陸復之亦頗不難但恐此河一開則徐邳必塞若徐邳不塞則此河必復為平陸且均一濁流也在徐邳大河則淤在新復之小河則不淤恐無是理也况小河口而南至清河縣尚有二百三十餘里假如近嵗河決崔鎮桃清為塞不知南來運艘將從何路逹睢河也問者曰止濬雙溝永涸湖一帶使艘從九里溝出小浮橋倘徐邳正河淤塞此不通而彼通可無阻也馴曰此河原甚淺狹且湖水常盈濬工難施若正河淤塞黃水盡從此河則泛濫無歸非特牽挽無路而經行於樹樁基磉之間必致觸敗與由決何異也若正河不塞而此河僅分支流則徑由正河可也何必去平就險為哉或有問於馴曰改沁入衛以殺黃河之勢何如馴應之曰黃可殺也衛不可益也移此與彼不可也衛漳暴漲元魏二縣田地每被淹浸民巳不堪況可益以沁乎且衛水固濁而沁水尤甚以濁益濁臨德一帶必至湮塞不可也又問水集有引沁至長垣界經張秋出永通閘入運濟旱語亦未知沁之濁也一溝之渠寧能當此濁流乎沁可引黃亦可引矣或有問於馴曰五塘蓄水濟運先年設有隄閘今皆圮矣可不復舉乎馴應之曰馴初至之時亦嘗鋭意求復反覆行勘查得小新塘與雷公上下二塘相接西去揚州郡城十餘里水由淮子河入漕河句城塘西去揚郡幾三十里水徑奔儀真由響水閘出江四塘皆隸江都縣唐長史李襲譽所築也陳公塘隸儀真縣其水亦奔響水閘出江漢廣陵太守陳登所築也句城陳公二塘地形髙阜水俱無源惟藉雨積小新上下雷三塘受觀音閣後及上方寺後并本地髙田所下之水而局面窄小蓄水無多故漢唐二臣築塘積水以為溉田之計非以資運也今若慮漕渠淺涸借此水以濟之則應任其直下不宜築塘以障其流且冬春運河水淺彼先涸矣若慮湖水漲漫借此塘以障之則諸水皆從揚儀徑奔出江與諸湖了不干涉也如欲復前人之故業蓄水以溉髙亢之田於民未必無益但民間承佃為田輸價不資嵗納之課亦不資必須盡行償貸築堤建閘費尤不資必須大為處分矧田髙之民欲積田窪之民欲泄築堤建閘之後盜決者多必須添設官夫防守當此勞費之後災傷之餘種種難於措辦故馴謂其是尚可緩也以上河議辨惑諸湖堤岸見議加幫髙厚且多減水閘尋常之水似可無虞矣但或霪潦彌月山水併發則又不可不預為之計也查得沙壩并芒稻白塔二河俱可泄水當事者應慮私販鹽徒潛通間道每每築壩斷流殊不知欲禁舟航何須築塞何必密布樁柵仍委白塔巡檢嚴防越渡船隻瓜儀諸閘一體開放閘口攔以朩柵則湖水可泄而鹽政稅課亦無妨矣寶應縣之西十餘里有白馬湖其當湖心而東即所謂八淺堤也往嵗堤決湖水奔逸建瓴而下舟楫過者少遇西風輒沉溺不可救其決處闊八十餘丈深且二丈五六尺而水勢湍急莫可名狀雖不惜費寧能與水角力哉屢築無功覆轍可鑒也乃議從湖心淺處先築西堤一道以捍其外仍於河之南北截壩二道暫令運艘越湖而行堤壩成則八淺正決瀦水不流捧土而塞之矣是築西堤者乃所以塞東決也但東決雖塞西堤終不可棄必須嵗加修築仍密種橛栁茭葦之類使其能當濤浪則東堤不守而自固矣此當於冬初預行寶應縣掌印管河官料理可也寶應縣月河自黃浦至三官廟前長二十里水多旁潰入湖是以流緩沙停新閘一帶淺阻為梗今加築西土堤一道長三千六百三十五丈以束漕水可省挑濬之費須責夫看守栽植茭桞加意培護嵗修之工可勿緩也河口諸閘之設先臣平江伯陳瑄殊有深意蓋節宣有度則外河之水不得突入運河之水不得盈漕非惟清江板閘一帶隄岸易守而寶應諸湖亦緩此一派急流矣但啓閉之法非嚴不可如啓通濟閘則福清二閘必不可啓啓清江閘則福通二閘必不可啓啓福興閘則清通二閘必不可啓河水常平船行自易單日放進雙日放出滿漕方放放後即閉時將入伏即於通濟閘外填築軟壩秋杪方啓悉照先年舊規與近日題準事例行之其於河道關係不小也舊通濟閘逼近外河河形淺直水勢洶湧不便啓閉而朱家口一帶堤岸尤為難守今移閘於甘羅城旁改河於西南隅而於舊閘內半里許築攔水大壩一道置朱家口於度外似為得䇿矣但大壩最為喫緊萬一傾圮則新河與舊河之水併㵼入閘勢必不支每嵗四月初須専委一的當義民官撥夫十餘名量備樁草守之毋忽毋忽議者又謂從大壩迤東兩頭直接泰山築堤一道僅三里許則壩東與髙堰七里墩迤北兩岸一帶堤岸俱不須守而堤內之田皆可耕矣冬涸之時夫力稍暇即宜圖之江南丹徒丹陽一帶河道原無水源藉江為源潮長則開京口閘以放舟潮落則下板以蓄水倘若水涸舟膠則丹徒閘亦係通江支河放水可濟潮水既落車戽亦可須臨時斟酌申嚴啓閉守閘者勿弛禁也徐北鎮口黃運交會之處伏秋黃水大發時多灌入本口動至淤阻原任中河郎中陳瑛創建古洪內華二閘近該工科都給事中常題建鎮口一閘如遇水發下板謹閉俟黃水消落即啓閘縱水外衝而漕河無淤墊之患啓一閉二悉如清江裏河事規與近日題奉明例行之其鎮口閘外東西兩堤原係挑河所積客土未堅內水湧出未免剝損伏秋之前密護樁笆堤固則閘無虞矣司閘者宜加愼焉鎮口古洪二閘以東多傍山麓以西一望平曠濁河經流更無隄防黃水出岸橫截閘河腹心受病故于塔山支河接築縷堤九百四十二丈而牛角灣係茶城運河舊渠又築壩一道東接塔山西接長堤幾二里許以遏黃流傍入但壩地原係河身下多積沙創築卑薄連嵗失守肘腋為患已於本壩之南自舊縷堤支將軍廟起東接塔山增築長堤七百餘丈頗得重門禦暴之意冬春之際多加幫護伏秋之時晝夜防守預辦樁草以備不虞夏鎮第一要害宜殫心力勿忽邳州東南六十里原有直河以宣泄蒙沂諸山之水近年因濁流倒灌直河遂塞諸山水俱迤邐由駱馬湖經董陳二溝以出大河水勢紆回則近邳田地常被淹浸湖波渺渺則候風舟楫遲滯艱危不特直河居民失市門里之利巳也昔已開復通行而迤裏閻家集等口乃原通落馬湖故道復築長堤遏水此堤之堅瑕乃直河所視以通塞者每嵗仍須加髙加厚水發之時嚴行防守不令復出落馬湖庶直河可保不淤也奈何繼者失守長堤復決直河因之復塞矣務須查倣先年規制為之此與耿車時灘之隄同一關棙在司河者加之意耳曹縣武家壩王家壩迎溜掃灣逼近老堤最為險要而武壩險又甚焉萬一此壩潰決則城武金鄉數邑悉成沮洳且逼近閘河甚為可虞須於正月間多捲釘頭磯觜掃壩以遏直射及將老長堤幫厚增髙伏秋防守官夫時刻勿懈萬厯十七年武家壩外忽成淤灘此亦一時之幸未可恃以勿修防也汶水從陶泰而來就鹽河由博興車瀆入海自宋司空築壩戴村蜒蜿九里屹如天成回狂瀾而逆之西會通河始得濟運此壩係全河屏障先年設夫增土植柳培護周密嵗久防弛以漸單薄萬一乘瑕復歸故道不無可慮宜令東平汶上管河官督夫培土栽栁悉如舊制此運河第一喫緊關鍵故首及之坎河口與戴村壩無異蓋因戴村既築之後水無傍泄嵗久復衝此口泉水決入鹽河運河每至淺涸萬厯十六年都給事中常會同撫按題請築壩馴於十七年創築石壩一道長六十丈水漲則任其外泄而湖河無泛濫之患水平則仍復內蓄而漕渠無淺涸之虞利賴甚重防守當嚴必每嵗六月初旬即令東平州管河官駐劄壩上備料集夫相機捍禦九月初旬始得撤守著為定例永保萬全馮家壩係蜀山湖之門戶地卑而水易泄故築壩以障之蓄可益運泛不病民何家口係南旺湖之尾閭此口稍卑汶水就西而下每決房家口而傷運河之堤南旺之水則涸矣今築石壩平時任其南逝水漲泄而之西良得䇿也每嵗伏秋専責管河官不時巡視少有圮壞即便修砌二壩皆係都給事中常會題創築馴督築頗固真永賴也坎河口石壩固為完䇿但可以泄水而不可以通沙日久淤停沙填河內則能致水漲漫或沙觜橫射河灣則能逼水衝決宜督管河官乘暇集夫挑濬使水不東逼徑直南趨誠為保全石壩要務運艘全賴于漕渠而漕渠每資于水匱五湖者水之匱也止因舊堤浸廢界址不明民乘乾旱越界私種盡為禾黍之場先臣兵部侍郎王原建土堤南旺湖周圍隄長一萬九千七百八十八丈三尺蜀山湖隄自馮家壩起至蘇魯橋止長三千五百八十丈自蘇魯橋西至田家樓止原係收水門戶栽植封界髙栁馬場湖隄東面長一千六百二十丈北面原留入水渠道栽植封界髙栁馬踏湖隄自𢎞仁橋起至禹王廟止長三千三百一十三丈安山湖隄長四千三百二十丈而斗門閘壩悉巳完備可收濟漕永利萬厯十六年又該都給事中常會題增修馴因舊為新督築完固但近湖射利之徒覬覦水退希圖耕種盜決之弊禁令當嚴每年冬春管河官周回巡閲責令守湖人役投遞甘結庶河防飭而水利無滲泄之患疆界明而姦民杜侵越之萌矣南旺分水地形最髙所謂水脊也決諸南則南流決諸北則北流惟吾所用何如耳當春夏糧運盛行之時正汶水微弱之際分流則不足合流則有餘宜效輪畨法如運艘淺于濟寧之間則閉南旺北閘令汶盡南流以灌茶城如運艘淺于東昌之間則閉南旺南閘令汶盡北流以灌臨清當其南也更發濵南諸湖水佐之當其北也更發濵北諸湖水佐之泉湖兼注南北合流即遇旱暵克有濟矣此以智役水以人勝天力不勞而功倍計無逾此臨時酌之南旺舊例兩年一大挑築壩斷流不通舟楫始開月河官民稱便欲挑正河必先挑月河一時兩役並興夫多苦纍時迫則工必略工略則沙必淤自今萬厯十八年挑正河為大挑十九年挑月河為小挑以後著為定規庶舟楫往返既不阻於稽緩夫役用工亦不病於煩難矣閘河地亢衛河地窪臨清板閘口正閘衛兩水交會處所每嵗三四月間雨少泉澀閘河既淺衛水又消髙下陡峻勢若建瓴每一起板放船無幾水即盡耗漕舟多阻宜于閘口百丈之外用樁草設築土壩一座中留金門安置活板如閘制然將啓板閘先閉活閘則外有所障水勢稍緩而于運艘出口易于打放衛水大發即從拆卸嵗一行之費無幾何此亦權宜之要術也衛水發源於河南輝縣蘇門山名曰搠刀泉經新鄉等處合淇漳二水逾館陶至臨清合汶河之水經德州出天津直沽入海板閘以下全賴此水濟運夏秋之交糧運盛行每患淺澀蓋因輝縣源頭建有仁義禮智信五閘壅泉灌溉民田以致水不下流殊妨國計宜行分巡東昌道每歲糧運北行衛水消涸呈報總河衙門移文河南管河道速將五閘封閉俾水盡歸運河其餘月分或水勢充盈仍聽民便庶公私兩不相妨而運艘不滯矣按山東泉源屬濟兖二府一十六州縣共一百八十泉分為五派以濟運道新泰萊蕪泰安肥城東平平隂汶上蒙隂之西寧陽之北九州縣之泉俱入南旺分流其功最多關係最重是為分水派也泗水曲阜滋陽寧陽迤南四縣之泉俱入濟寧關係亦大是為天井派也鄒縣濟寧魚臺嶧縣之西曲阜之北五州縣之泉俱入魯橋是為魯橋派也滕縣諸泉近入獨山吕孟等湖以達新河是為新河派也又沂水蒙隂諸泉與嶧縣許池泉俱入邳州徐吕而下黃河經行無藉於此是為邳州派也酌其緩急則分水天井魯橋之派均屬漕河命脈每嵗春夏聽司道嚴督管泉官夫疏濬通達俾源源而來庶幾有濟但數月不雨其流必竭萬厯十六年漕渠乾涸百計疏濬卒無涓滴之流至閏六月初旬大雨連朝諸泉俱湧河渠遂盈則地利未嘗不係于天時也至于山泉沙磧頗多汶河每為淤墊須于大挑之期一併挑濬使泉流無阻亦一策也通惠河發源于昌平州神山泉會馬眼諸泉經都城入內府南出玉河橋由大通橋至通州而與白河合白河發源于霧靈山由密雲縣會榆渾諸河至張家灣總名曰潞河至通州而與通惠河合勢並南流楊村以北通惠之勢峻若建瓴白河之流淤沙易阻夏秋水漲則懼其潦冬春水微則病其澀浮沙之地既難建閘以備節宣惟有濬築之工殊為喫緊萬厯十五年創設管河通判専駐楊村其為修防計得矣但查沿河兩堤如搬罾口火燒屯通濟厰東耍兒渡口王家務華家口閻家口綿花市豬市口觀音堂蔡家口桃花口以上堤岸坍塌卑薄最為險要水發即決濵河州縣淹漫為患漕艘漂淌人甚危之應行司道督行管河官每嵗冬間辦積樁草春初率夫將前隄加髙幫厚真土實杵不得雜沙塞責糧運將至設法疏濬或築束水小壩衝刷深廣俾漕舟無膠滯之虞民業免沮洳之害以上河防險要一築順水壩俗名雞觜又名馬頭専為喫緊迎溜處所如本堤水刷洶湧雖有邊掃難以久恃必須將本隄首築順水壩一道長十數丈或五六丈一丈之壩可逼水逺去數丈隄根自成淤灘而下首之隄即涸矣安掃之法上水箱邊掃宜出將裹頭掃藏入在內下水掃宜退藏入裹頭掃內庶水不得揭動掃也如築長六丈闊四丈髙一丈用掃兩面廂邊每邊用掃二行褁頭二行中間填土每行用掃三層共計用中掃十八箇每箇長五丈髙三尺用草四百束栁稍八十束草繩四十條排樁簽樁共用樁朩四根人夫二十五工共用捲掃隄夫四百五十工運土隄夫二百工俱不議工食共用草七千二百束該銀一十四兩四錢栁梢或葦一千四百四十束該銀一十四兩四錢草繩七百二十套該銀二十一兩六錢樁朩七十二根該銀七兩二錢行繩十二條每條重四十斤共用􅐨四百八十斤該銀二兩四錢約共該銀六十兩如無栁梢以葦代之一造滚水石壩即減水壩也為伏秋水發盈漕恐勢大漫隄設此分殺水勢稍消即歸正漕故建壩必擇要害卑窪去處堅實地基先下地釘樁朩平下龍骨朩仍用石楂鐵縫方鋪砥石壘砌鴈翅宜長宜坡跌水宜長迎水宜短俱用立石攔門樁數層其地釘樁須劄鷹架用懸硪釘下石縫需用糯汁和灰縫使水不入如石壩一座壩身連鴈翅共長三十丈壩身根闊一丈五尺收頂一丈二尺髙一尺五寸迎水闊五尺跌水石闊二丈四尺四鴈翅各斜長二丈五尺髙九尺用粗細石計長一千三百九十餘丈并地釘樁龍骨朩鐡錠鐡銷煤炭朩炭石灰糯米􅐨麻及各匠工食約共該銀一千九百餘兩其運石抬石搬料夫船并官夫廩糧工食臨期酌給一建石閘建閘節水必擇堅地開基先挖固工塘有水即車乾方下地釘樁將樁頭鋸平縫上用龍骨朩地平板鋪砥用灰麻艌過方砌砥石仍于迎水用立石一行攔門樁二行跌水用立石二行攔門樁八行如地平板鋪完工過半矣自金門起兩面壘砌完方鋪海漫鴈翅金門長二丈七尺兩邊轉角至鴈翅各長五丈共用石三千一百丈閘砥海漫攔水跌水共用石九百丈二項共用石四千丈并鐵錠鐵銷鐵鋦天橋環地釘樁龍骨朩地平板萬年坊閘板絞關閘耳絞軸托橋朩石灰香油􅐨麻柴炭等項及各匠工食約共該銀三千兩有竒其官夫廩糧工食臨期酌給一建涵洞涵洞以泄積水基址亦擇堅實方可下釘樁砌石水多則建二孔少止一孔假如涵洞一座口闊一丈五尺身長二丈中立石墻一堵亦長二丈寬五尺分為二孔每孔寬五尺兩邊四鴈翅各一丈五尺共用石二百丈並地釘樁鐡錠石灰板朩并各匠工食約該銀一百八十餘兩其夫役工食臨期酌給一建車船壩先築基堅實埋大木于下以草土覆之時灌水其上令軟滑不傷船壩東西用將軍柱各四柱上橫施天盤朩各二下施石窩各二中置轉軸朩各二根每根為竅二貫以絞關朩繫篾纜于船縛于軸執絞關木環軸而推之一挑河凡挑河面宜闊底宜深如鍋底樣庶中流常深且岸不坍塌如不用堤須將土運于百餘丈外以免淋入河內凡創開河者每方廣一丈每夫日開深一尺為一工挑濬泥水相半者減十分之五全係水中撈取者減十之七八取土登岸就而築隄者亦以半折算焉一閘河偶淺急疏之法凡閘河淺處如水溜在中須兩岸築丁頭壩以束之水溜在傍將淺邊順築束水長壩以逼之水由壩中其勢自急中溜自深如淺處不多或排板插下泥內逼水湧刷或排小船用杏葉杓挖濬必不得已則用樁草製活閘節水亦一䇿也凡涵洞所以泄水本是無妨但須明設石閘以嚴啓閉若暗開隄址草朩蒙叢便難覺察萬厯八年姦民私囑管河主簿將南岸遙隄暗開涵洞數座十七年伏水暴漲單家口水從涵洞泄出勢甚洶湧一鼓而開遂成大決此可謂明鑑矣司河者知之以上修守事宜河防一覽行水金鑑卷一百二十六
