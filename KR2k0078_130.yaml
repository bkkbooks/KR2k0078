body:
  text: 行水金鑑巻一百三十江南按察使傅澤洪撰運河水明神宗萬厯四十六年五月庚寅山東廵按畢𢡟康陳東省急務在通海運國初漕運由海後以漂沒為虞始開㑹通河然河徙不定莫若修膠萊新河與㑹通表裏而行繇淮之六套口入海至麻灣口入河繇海倉口出海至天津約可一千四百餘里沿崖揚帆不渉大洋善風不數日可達非若河道之迂艱居恒則兩路並進遇梗則此滯彼來庶轉輸不匱亦國家無窮之利也五月庚子調山東驛傳道副使陶朗先為登萊道副使總理海運九月辛丑工部題汶上等縣地方淤淺先期挑浚以便新運從之十月丁邜直隸廵按董元儒奏陳漕運六議一曰議建閘座濟寧以北自戴家灣閘至臨清磚閘相距三十餘里河勢陡㵼宜於適中狄家樓處建石閘一座而又於王家淺回龍橋諸處各建一座於鰲頭磯前另鑿月河立小閘以資蓄洩庶回瀾一倒水勢自平一曰疏浚白河天津至通州計五十九淺每年額派各州縣衛淺夫一千七百餘名費工食萬餘金宜將額派銀兩解通惠河衙門轉發管河通判及四總委處募夫浚築自潞河以至津門畫地分工勿令衙役經手即衛軍亦以此法行之查無浚築之功即扣留月米僱募充役庶夫無虚冒年終各官聽部臣舉劾而又編選旗軍分别三等以正丁領運以餘丁幇貼庶漕運有禆該部是其䇿上命俱依擬行有司怠玩從事的各御史㨿實叅處十一月乙邜浙江道御史江日彩陳救時四務國家轉漕東南賴盈盈一水萬一水涸運乾或有如前盜據淮揚臨德而扼其吭且奈何聞浙江海船松江太倉沙船淮安雕船時至山東寧海買米離山海闗不逺宜令南京近海州縣有糧米者衛所厚僱前船歳運四五萬石熟其路逕以為有事之備則海運之議宜講也明神宗實錄明神宗萬厯四十七年五月已亥總督倉場戸部尚書張問達言邊氛猖獗日甚運船轉輸可虞謹擬沿途防䕶京通起剥事宜以固根本稱漕糧四百萬石由江淮達泇黄由泇黄抵津壩風濤阻險與陽侯河伯爭權萬一防䕶疎虞起剥濡滯致生他變軍國可憂乞嚴檄所司照先年水涸漕遲例多僱民船幇運其應得脚價即于通濟庫見行給支不許短直小民唯利是趨自當樂從應募而又嚴督淺夫隨時挑浚務使河渠深廣船不留行庶於漕政有禆奉㫖漕運闗係匪輕况今邊警戒嚴䕶衛尤宜加謹其防守加剥及支運等事俱依擬着實舉行應另議者着再議具奏明神宗實錄是年八月總河侍郎王佐檄行郎中徐待聘修髙郵西門審港口起迤南石工五百九十八丈於天啓元年六月築完其半徐候另詳興舉十月江都三汊河淤三百二十三丈界首鎮南淤三百五丈鎮北淤三百二十二丈梗阻重運郎中徐待聘嚴督官夫挑濬糧運稱利南河全考明神宗萬厯四十八年三月癸未工部覆廵漕御史毛一鷺所陳漕河三事一泇河之完工當議謂漕運河道前此惟治黄為急自泇河開而糧艘避險即安真永頼之利也唯是初浚尚多潦畧河身不無淺狹至于崖岸衝缺牽輓難前則疏浚補葺之功皆不可巳泇河三百里内屬夏鎮者有閘九座屬中河者止藉草壩逐年費且不貲而分司官亦有以直口等處建閘之議又經漕臣叅酌以為當及時修舉須移咨總河臣及劄行管河司官并前淺狹去處委宮覆勘估費若干動支何項錢糧酌議詳妥至如駱馬湖之修砌隄岸在漕臣亦以為功頗浩繁似當從緩酌議一水櫃之清查當議謂漕渠若濟寧等處去歳遇旱阻淺運舟稽遲蓋以一衣帶水涸可立待耳先朝尚書宋禮曽於汶上東平濟寧沛縣有湖處所設立水櫃可蓄可洩河漲而洩則水勢可殺河涸而放則涓流可濟誠便計也乃歳月既乆滄桑已變豪右既擅為耕藝之常官司復利其租税之入遂至不可問亦不肯問矣漕臣建議欲得任怨任勞之人擔當清查循故道而復舊䂓於以濟漕河之窮誠為有見應敕總河臣嚴督各司道并力查復勿阻於雌黄之浮言務求臻黒白之實效效則破格優處不則無功議罰一衛河之疏浚當議謂衛河乃小灘運道益以漳流始大自漳河北徙遂多壅遏之患曽經道臣翟師雍查勘欲於臨漳淤口起至小灘鎮止約長二百餘里大加挑浚於近口處所築一横隄以障北流使歸故道然費至萬金工亦非易且大名臨清亦有受漳流之患者似難輕議唯小丹河自清化鎮起至合河鎮止泉流回以濟運議欲挑濬深闊費僅千金較之障漳北流為力甚易為費甚省宜敕總河臣行委山東河南兩道臣㑹議舉行而處辦錢糧則聽總河主持上命俱依議行明神宗實錄明光宗泰昌元年八月二十三日戊辰颶風壞海運船御史陳王庭疏議酌處先是七月初海運船開洋至馬頭觜以風不便停泊數日時聞海鳴如金戈鐵馬之聲百里間黒氣糾連天海彷彿中見有物隱顯搏擊波濤潑天所泊糧船盡行拍碎及查傷登屬運船八十五隻僅完二十二隻漂沒糧米二萬五千八百六十四石有竒萊屬傷船一十六隻漂沒糧米一萬三千八百一十石水手溺死者無算於是廵撫御史陳王庭具題請敕該部將山東明歳應運糧數從長酌處勘覆其漂失糧米船隻用過價費行該道查明造册報部作正開銷溺死人數酌量議䘏明光宗實錄泰昌元年十一月已亥熹宗巳登極矣工部覆總理河道侍郎王佐疏言水匱濟用為其汪洋瀦水河身深下而堤岸完固也今計蜀山馬場馬踏南旺各湖界址既明侵盜巳復矣昭陽一湖舊河盡廢新河反低無容糜金錢以加修濬獨安山湖延袤頗廣向以三十八里為水櫃而歳月乆逺法弛弊生故河臣復豪强之侵佔濬河身之淤澱并原額而廣之共五十五里有竒以至於隄外湖池俱清丈明白額徴租銀是目前之水誠可以利達漕舟矣若夫歳修當固界限當定示禁當嚴必須通計各湖歳加修浚俟年終𩔖奏而治河等官仍以水櫃之興廢分别殿最著為永利可也上是之十二月癸亥工部覆總理河道侍郎王佐疏言北河通漕專藉衛水然上源未暢則下流必壅今漳河巳徙衛流已塞獨有挽漳而引沁闢丹三䇿而巳顧漳水東下之處勢竟及泉挑浚難施未易挽也若沁水之闢新汲一帶地方郵署相連廬舍鱗次必闢渠以受沁此地不為丘墟乎丹水湧溢雖勢與沁同然丹口既闢則修武而下皆成安流此闢丹之議無容再計者其條列展河砌閘築堰平租示禁僱役動支經費各欵河臣籌計不遺餘力循而行之可垂永利惟是河徙不常闢丹不無再阻則挽漳引沁不妨並存其議以待異日講求上然之明熹宗實錄明熹宗天啓元年正月戊子戸科左給事中韋蕃條奏足餉六事并議通海運開膠河章下所司二月乙丑海運遭風遣山東撫臣及薊遼等處道臣致祭海神閏二月甲申廵按直隸御史張新詔言考通惠河即元郭守敬所修故道國朝平江伯陳銳疏通之運船直達大通橋下彼時勢豪欲尅取脚價壊其事後因御史呉仲言乃命郎中何棟呉嗣忠仍濬裏河計費纔七千兩所省脚價十二萬此繇通州至大通橋省費之大較也若由大通橋至朝陽門尚有三里許其地平衍閑曠有掘就河身現在倘導玊河之水稍遡而北至朝陽門量建閘座及剥船若干隻糧運到時徑于門下上車似為便計蓋㑹典開載車户脚價自大通橋至東倉毎石銀一分六釐近又議加三釐至西倉銀二分三釐若復省路三里許則東倉脚價可減十之六七西倉脚價可減十之三四互而計之總減一半每歳京糧以二百六十萬為率即可省脚價二萬六千餘兩彼從通州至大通橋凡四十里止費銀七千此三里許之地能費㡬何即除挑濬外建閘造船等費只消一年脚價之半便巳寛然有餘一成之後每歳省銀二萬六千以三十年之通計遂得七八十萬入太倉矣詔部議覆十月辛已濬京城壕成自東便朝陽東直安定德勝西直阜城西便正陽九門及重城共用夫一百五十萬八百九十名匠一千二百八十九名班軍積日三萬三千十二名費水衡銀六萬一千六百二十九兩司農銀一千七百三十三兩米三千三百一石諸樁朩灰磚繩斗百物及運價咸具而鍁鐝以歸盔甲厰收為甲械之需監工科道魏大中等因言壕之源出玊泉山徑髙梁橋抵都城西北而派為二一循城之左而東而南一循城之右而南而東宜按舊閘為地形髙下次第布之未可以丈尺槩也德勝門之水南入闗周行大内出玊河近且北淤南壅而嘉靖庚戌所築重城地勢既髙有掘未及泉而止者俟異日清其源審其勢疏其脈達其支以總匯於大通橋又須理葺諸閘節宣蓄洩以壯金湯而固風氣下工部丁亥授加銜都司黄允思都司僉書先是天津由北岸抵遼運道未有行者自允思始開之嗣後歳可四五運遼餉因之不乏又督發水兵出海積有勞勲督餉戸部侍郎李長庚薦於朝請加實授從之明熹宗實錄是年黄淮漲溢決裏河王公祠外河十餘口淮安知府宋統殷山陽知縣練國事力塞王公祠明史稿是年六月霖雨不止裏河隄岸衝倒水由二舖灌入三城平地深一丈淮安府志是年大水隄決九里北髙郵州志明熹宗天啓二年三月庚申工部尚書王佐題覆漕臣余合中疏飭漕政三欵一漕之難難在淺澀舟行遲速可以定地方殿最今後務盡力挑濬管河都司總其成沿河州縣分其任隨淤隨濬濬必期深土必逺運無使復歸於河以滋淺阻違者以曠職叅論詔如議六月辛未刑科給事中傅櫆言六䇿一防隄堰徐淮水髙地下民居如在釡底萬一隄決遂成魚鼈之宫有司急行修築以戒不虞下部俱如議乙亥妖賊陷夏鎮河道總督陳道亨告急請亟調隣近省直官兵兼留援遼粤兵以䕶漕運仍速下山東撫按二臣増兵加餉上許留粤兵三千以䕶運道其添兵著該部即議覆道亨字孟起新建人萬厯十四年進士光宗立進工部右侍郎總理河道拜南京兵部尚書七月庚子差工部屯田司主事陸之祺管㑹通河十二月戊子督理遼餉戸部右侍郎畢自嚴言朝鮮運道險逺登萊假途便㨗乞速行該撫按轉行道府及時措置海運事宜章下該部明熹宗實錄是年四月寳應西隄風浪衝卸一淺等處石工六百餘丈臣國盛督令河官甃石補砌加培土隄盡塞低陷漏穴本年十月工竣是年興化知縣邊之靖請修丁溪草堰小海白駒劉莊攔潮五閘并呈廵鹽御史房可壯允發鹽鏹修建至明年湖河大漲百川沸騰滙流入海海潮突髙數尺賴諸閘堵禦而潮無内灌河流亦迅駛入海民田禾麥得以有秋按髙寳等處上河一帶河隄閘洞及旁溢之水俱由興化五場入海若海口無閘以攔之則潮入而河水壅阻今建閘堵禦潮退水洩無泛濫渰田之患更於每閘令場官僉百長保長二人著守又于海邊修築舊壩十道俱可通河禦水復禁奸民盗壩行舟而場官依時啓閉嚴加防範俾水有所束而五閘亦得永乆云南河全考明熹宗天啓三年正月戊申督理遼餉戸部左侍郎畢自嚴以守備陳良䇿議改朝鮮運道於登萊因上疏極言其便言朝鮮海運必論道里之逺近覈地勢之險夷較脚價之省費計糧料之貴賤察事理之難易而後可從事今以天津與登州相提而論朝鮮運務必由津海抵登而後入鮮在登較近一千五百里是逺近不敵也由津抵登中多礓石及鐵板以觸舟立碎即如今秋運甫至霑化即損船十餘隻糧料千石若由登運此禍可免是險夷不敵也由津入鮮以登州為半途天津登運每石脚價四錢若改登州便可減半給發是省廢不敵也津門逼近京師仰給截漕其餘糧料價頗騰翔登萊米豆皆無措處小民習用市斗每斗視津斛斗兩倍而贏之是貴賤不敵也登州陸續發運一年可二三次津門路遥以極西抵極東歳僅一次是難易又不敵也良䇿登運之説無煩再計但恐登以無船為解及查運船有官民二種官船原用官錢自造計難猝至民船實貪脚價前來一呼可集再有不足即於津門南船量行撥給上命戸部議登萊廵撫袁可立上疏争之章下戸部併議戸部署部事左侍郎陳邦瞻覆言非便遂不果行二月丙子南京江西道御史陳必謙陳安攘六事一河上各閘河夫名存實亡宜清扣工食貯庫𩔖解充餉十月癸亥差工部都水司員外郎呉昌期管理中河明熹宗實錄是年秋外河復決數口尋塞建清口磯觜築髙郵中隄及露筋祠湖口石隄濬界首北淤沙其冬濬永濟新河自凌雲翼開是河未㡬而閉總河都御史劉士忠嘗開壩以濟運巳復塞而淮安正河三十年未浚故議先挑新河俾運船回空由之乃濬正河自許家閘至惠濟祠長千四百餘丈復建通濟月河小閘運船皆由正河新河復閉時王家集磨兒莊湍溜日甚漕儲叅政朱國盛謀改濬一河以為漕計令同知宋士中自泇口迤東抵宿遷陳溝口復泝駱馬湖上至馬頰河往廻相度乃議開馬家洲且疏馬頰河口淤塞上接泇流下避流口之險又疏三汊河流沙十三里開滔莊河百餘丈浚深小河二十里開王能莊二十里以通駱馬湖口築塞張家等溝數十道以束水歸漕計河五十七里名通濟新河五年四月工成糧運從新河無劉口磨兒莊諸險之患明年總河侍郎李從心開陳溝地十里以竟前工明史稿通濟新河即駱馬湖也時王家集磨莊等七十里有十三大溜阻運漕儲道朱國盛行邳宿同知宋士中詳勘議于董陳二口入駱馬湖抵泇六十里遂從馬頰口至陳家溝達宿遷縣北西出大河以上接泇流下避劉口等險運道比舊為近捷而坦便云江南通志髙郵中隄長亘四十餘里歳乆不修每遇夏秋水漲隄力不支農田被潦先惟塞南北金門二閘以為障而船由外湖以行時遭覆溺且以築壩擾民天啓三年臣國盛莅任清出揚屬曠夫銀八百兩因㑹揚州海道郭士望呈詳總河房公壯麗漕撫吕公兆熊修築之計長六百四十四丈前銀不足佐以公帑酌其緩急分年砌之其險工已完隄下田廬亦可恃以無恐矣八月界首運河迤北一帶當髙寳接界處河身仍淤水且涸先是市猾雍愛輩擅淺剥之利故雖屢經撈濬而無功至是悉置於理而令髙寳河官于淺澀處先築草壩使得束水衝刷復加撈濬而重運無梗九月修築露筋廟湖口石隄長一百六十丈俱從水中壘土砌隄工程堅鉅至四年十一月工完先是邵北湖㳺浪一遇西風大作鼓浪拍隄行舟往往觸石覆溺臣國盛惻然憫之先於二月呈詳行委髙江二處河官運土實基外砌磚石内用樁板隄外復栽茭栁以禦驚濤一切工料俱係設處夫曠并請部院贓罰以成之不動官帑十一月㑹呈河漕部院詳允挑濬新河淤淺自楊家廟至文華寺止長七百一十七丈四閱月工完放水以行回空按萬厯初年重運由清江出口稱艱漕撫凌雲翼開新河七十里自楊家廟至文華寺止行運一年而以部稅旋閉三十九年總河劉士忠開壩濟運一年復塞而淮安正河三十年來未挑故議先挑新河内有乆湮荒涸者照段分挑深闊回空等船經行無阻南河全考天啓四年二月㑹挑淮安正河自許家閘至惠濟祠止長一千四百一十六丈八尺復堵許家閘埽工十餘丈建通濟月河小閘一座俱于四月工完漕船仍由正河新河復壩閉塞按淮安正河年乆不挑河夫雖冒領工食竟無實加澇濬者至是大淤臣國盛㑹同淮海道宋統殷拘集夫頭而庭詰之欲按工勘視諸夫伏辜遂革前季内工食一千一百五十兩貯庫㑹詳先闢新河通囘空次挑正河以行重運九月㑹築淮安包家圍洋信港淮城䕶隄磚石工長一千六百丈於十一月報竣時物料夫匠先行齊備故奏不日之工按淮郡當漕輓輻輳之地商賈畢集而城堞如在釡底惟恃一線土隄禦淮黄諸湖滔天之勢每年加埽䕶隄包土塞城人民惴惴焉魚鼈是懼臣國盛先於上年㑹詳漕河兩院預備物料分調夫匠是以工成最速其詳具載記中六月徐州黄水大漲内灌州城是時水由夜發平地丈餘徐民苦于渰溺遂有遷城之議南河全考明熹宗天啓五年二月丙午南工科給事中徐憲卿等以東南歳荒米貴條陳五欵一開𤓰儀二閘以通咽喉之地命著實行七月已已舊時小灘兊運設有監兊都司自裁革之後督以糧道顧河南糧道與東省衛并原無統轄往往跋扈咆哮不受約束廵撫河南都御史楊方盛以為言請將灘運移屬臨清道俾督率本屬武弁便於彈壓其小灘舊有大名道公署一所乞稍加修葺以為臨清道駐節之地從之明熹宗實錄明熹宗天啓六年六月乙亥河道總督李從心奏我國家定鼎燕冀歳運漕糈四百萬石藉此運河一線轉輸在邳以南則資淮黄二水在臨清以北則資漳衛洹淇滏陽諸水在直口至臨清延袤八百餘里則資汶泗洸沂挾各州縣諸泉水灌濟以達京通闗係最重職二月謁陵行河經宿遷崔淺劉口磨兒莊等處中河分司趙濓及府州縣官稱連年運船到此一船挽拽夫以百計一夫工食動以數錢窮旗典鬻以償官夫人力與水勢争衡䉡䌫中斷前船横下後船互相磕撞官儲民命須臾歸之逝波風激浪髙竟日不能移一舟前阻後壓千艘俱皆等待各官㑹議要自馬頰口起下至陳瑶溝止計程六十七里另挑一河於靈睢宿桃邳五州縣募夫七千二百名協力併作或以濬兼築則計河工不計堤工或以築兼濬則計隄工不計河工或因勢順導或改曲從直河底沙礓用鋤鑿開使深水中隄下以船載土壘築使髙隄之殘缺者加修河之沙淤者加濬陳溝十里平地濬與築兼舉計挑生河長一千九百一十八丈築朩墩水占隄長二百八十丈又兩頭坍塌隄長四十五丈西岸平地築隄長一百八十丈王能莊前後雙河尾築隄長一百丈幇築殘隄長七百四十二丈濬深淺河長二千二百四十丈其根頂口底俱照覆估丈尺于五月初十全完從此運船改由陳口諸溜逺近公私幇拽之費可省漂蕩磕撞之虞以杜風波不能為之阻而各船銜尾直進可以計日計程無復躭延阻壓之苦擇吉開龍門放水行舟直抵黄淮之河旱澇可無虞矣得㫖是乙酉廵撫直隸御史徐卿伯疏言運道所經每各有湖貯水以備旱涸故民間呼為水櫃如汶上之南旺蜀山馬踏東平之安山濟寧之馬場沛縣之昭陽諸湖是也而丹陽有所謂練湖者周廣四十里納長山諸水八十四流為石閘者七朩函者十有六國家東南財賦浮運而北遇涸則啓閉以濟近湖民田數百頃遇旱則啓函以資灌溉夫何近年以來鄉官大家侵者侵占者占遂舉此湖之制蕩然不可問所䂓者近所失者逺伏乞嚴敕諸臣留心治河至如練河有為豪强占據者速請還官仍追租正法得㫖運道淤淺管河各官自當及時挑濬練河蓄水備旱豈容豪强侵占著作速清查還官追贓正法戊子山東道御史袁鯨題頃見廵漕御史徐卿伯疏言丹陽練湖水利被豪勢侵佔業奉㫖清查還官還租正法矣第臣原丹陽令也佃田抵餉臣任内事也丹陽舟車凑集之地疲苦特甚毎年額編遼餉一萬一千二十六兩九錢二分既歳征不缺而巳難堪命矣臣查上下練湖二處上練湖延袤數十里先年建閘瀦水以防冬涸後改春運水盈無所須閘以十之六七瀦水以十之二三為田亦天地自然之利也沿岸一帶陸續詳佃共得八千三百一十三畆每畆上田納價一兩中者八錢前後共得七千五百二兩六錢一分後復摉括湖稅等銀三千五百二十四兩共凑抵三年分額餉一萬一千有竒毫未加派于民每年所得租銀於本驛加馬四匹加支應銀三百兩請立循環簿不許妄入公費此練湖成田之始末也自臣離任之後聞水利蕩然非舊乞將豪强倚勢無帖侵佔者盡數追租正法而居民帖内正佃者令繳帖還官抑或免繳加價以助大工俱非臣愚所敢擅議也得㫖這豪强侵占者著遵前㫖還官正法小民繳銀給帖承佃的仍著計畆加價助工七月乙酉以清口發水糧船速濟加封河神䕶國濟運龍王通濟元帥從總漕蘇茂相請也薈蕞云清口發水者清水能刷黄也不知治水之道而徒謟媚於鬼神且不遵祖制妄加神號德陵君臣何不學無術至此甲午戸部尚書郭允厚奏漕糧以至壩為實數以進倉為安堵故往歳秋月必盡數儹輸自二年阻於妖賊始不得依期前進然其守凍者纔三十餘萬耳三年則有八十餘萬四年則一百餘萬而五年又且一百三十餘萬矣今歳運河阻塞不常濡滯巳極㨿今報實數進倉者僅得四十餘萬比往歳又少其半矣萬一寒風乍起河氷頓合則此二百萬漕糧勢必凍阻彼浩渺寥廓之地一切疎虞豈待問哉伏乞敕下經管地方衙門設法疏通及期儹運其抵壩者行河西務鈔闗速輸進倉不得抵壩者暫貯露囤仍令該道臣嚴法守䕶俟來春凍解輸運從之九月甲申廵漕御史徐卿伯奏運道厯淮安而上黄河水多而泥半之惟是淮流猛汛衝去泥沙不致壅塞故謂之以淮刷黄運道頼以無阻夫何入夏以來北地苦雨淮泗苦旱於是黄水暴漲淮流淺涸河身日髙淮勢日弱而黄河竟以淮為壑矣稽之父老皆以黄河倒灌為患叵測今漕運難前勢在危廹但有撈淺起剥二義乞敕諸臣應動何項錢糧即著就便支給刻期舉事工科給事中郭興治亦以為言得㫖撈淺起剥着漕河二臣相機料理以無悮運務明熹宗實錄明熹宗天啓七年正月丙申河道總督李從心言三王舟行挑濬工程已畢但濟寧以北諸閘所以蓄飬水力恐三王隨從人役不知䂓例擅自開閘或帶板而行或後水不繼船必淺閣速而反遲矣得㫖㨿厰臣約束嚴明解銀内臣安静不擾築壩挑河工程巳畢三王行舟可以無滯朕心嘉恱設閘啓閉闗係漕䂓隨從員役自應遵守恃强違擾的准指名叅處二月壬子工部覆隄工查勘巳明得㫖覧奏河歸正脈大小諸臣拮据之勞祖陵運道實嘉賴之然聞淤塞尚多未盡流濬即今重運尚阻回空猶滯藩舟國計朕與厰臣尚深軫慮還行河臣用心料理候王舟過日委無停淺去年漕事一切報竣方行叙賚以酬勞績五月甲申總督漕運戸部右侍郎郭尚友題報回空糧船盡數過洪過淮得㫖今歳凍阻既多又兼王舟鱗集覽回空糧船過淮日期較往年倍早這本説厰臣慮殫儲糈計周軍國補偏救敝見今京通紅腐之積朕所鑒知兩内臣協力同心分督淮濟勤勞可嘉自縂河以下有功大小諸臣都與紀錄以後各省直督糧道臣照本内派定地方各押糧船盡數送訖方許回任其遲早完欠分别叙錄叅處務要挽遲為速以濟國儲七月丙子總督漕河崔文昇報修築隄工得㫖漕糧轉輸全在河流順軌這駱馬湖新隄初成兼暑雨淹浸淺阻可虞該監體厰臣綢繆徹桑至意多方設法船行無礙忠勞可嘉其俟守凍空船裝糧到淮親詣湖隄相度形勢為修築之計待秋深水落即勘估急修以圖乆逺八月癸邜總督漕河崔文昇題修築隄工事得㫖覽奏河決由于隄薄秋深相度地勢起工務為一勞永逸説是駱馬湖沙土難築邳土堅凝預督淺夫開掘俟回空糧船帶取委屬可行地方正官管河官有推諉躭閣回空船的叅來處治還著總河衙門通行速舉有衝決處督河官勒限堵塞其未完工的刻期作竣庶無悮運艘以稱厰臣通漕速運綢繆徹桑至意明熹宗實錄行水金鑑巻一百三十
