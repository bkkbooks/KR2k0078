body:
  text: 行水金鑑卷一百三十一江南按察使傅澤洪撰運河水天啓七年十一月壬辰愍帝巳即位矣中書舍人李不伐疏訟故兵部尚書李化龍開泇之功言其議開泇也廟廊之議紛如臣叔化龍一力擔當于上郎中梅守相以勤劬拮據于下決百年未定之議于一旦以二十萬之估省三四百萬之金錢以二百六十里之安流代二百六十里之險道不半年而錫圭告成所謂計便一時永賴百世者也至今未蒙録敘懇乞皇上敕下所司核實覆奏庶勞臣之功不至湮沒從之十二月乙巳海運糧艘抵南海口以不即起剝致驟風壞船二十四隻失米一萬一千餘石戶部請議處各員役從之戊申直𨽻巡按何可及以漕運事竣疏陳四事一催空船一速兊運一查河道一查限單下所司崇禎長編崇禎元年正月癸未戶部題覆巡按直𨽻監察御史何可及轉運告成疏言河道通塞漕運遲滯所關祖宗設有總河專理于上部道府佐諸臣分理于下誠重之也但以地逺界分遂爾心力不協致河道淤塞縴路殘缺如馬湖之決黃河之溜可為永鑒河臣原以治河當漕糧盛行之時正河臣盡職之日所宜止宿河干使洪夫閘夫溜夫淺夫一一各效其力無敢偷安而後金錢得以實用即於漕運可無阻滯報可二月丙午敘開泇河功廕故兵部尚書李化龍子中書舍人三月甲申巡倉御史李遵以倉差新復疏陳二弊四宜一曰河道宜濬遇有淺阻河官親詣河干督同閘官先期挑濬一曰漂沒宜稽在內地不許輕給印烙在海運不許輕用雜流方可稽查實數從之八月乙巳戶科給事中張承詔言漕運稽遲請改巡漕御史為大差待兩運告竣方許報命旨以儹運官改差兩年未協祖制今後巡漕御史自九月內具題即赴通灣到任一面督催回空隨卸隨發一面移文各省直州縣趂禾稼初收民力充裕之日將本年應解漕糧盡征在倉來春正月以內悉行起兊務漸復祖宗朝三月過淮舊制應行未盡事宜漕臣奉命之日悉心條奏各司道州縣官有奉行怠玩及該管河道官不先行修濬致稽重運者許不時參奏處治俟明嵗運完果無凍阻紀録示優永為定例丙辰原任吏部文選司主事沈景初為父南京吏部尚書沈應文請恤典應文餘姚人隆慶元年進士由推官歷藩臬府尹刑部尚書署工部時通惠河決嚙陵梗運委曲協濟河臣得以奏功後起南吏部以疾辭卒年八十有三十月甲寅總理河道侍郎李若星報過洪漕船六千七百七十一隻運糧除南京截留外凡三百四萬六千五百二石二斗零十一月壬戌封護漕河神張六五為靈應英濟侯崇禎長編此薈蕞云按封典尤為濫觴崇禎二年五月丙午禮部左侍郎羅喻議等疏言前大學士張居正作相之日其隄防陵運則請開泇河開衛河膠河復練河築石土隄修減水各閘壩計八百餘里核省工價十四萬崇禎長編崇禎三年五月丙午廣西道御史劉士楨上言查運河自密雲直達天津實為京東天塹但由津至通二百餘里由通至密一百三十餘里中間水勢高下參差淺深不一遂未能槩限敵騎而我無可恃耳今誠興工浚築于上水挑濬使深築壩以壅其下流使三百餘里河水俱深丈餘人馬即難飛渡或五里或十里或數十里隨勢高卑建閘蓄水每閘內又量地逺近為分兵之多寡設船以作遊兵船之兩傍各開炮眼增以遮牌船內實以火器撑船軍士俱擇習練火器者充之俾借船為城因河為塹用火器以及逺既可以阻敵騎長驅而糧運無虞戰守有地非特神京永無薄城之憂而密雲通津咸可聫為臂指仗為掎角是誠今日急著也或謂此時徵調巳空挑濬之役派軍難而騷民亦未易也不知通州以下户部原有穵運夫各州縣原有淺夫通州以上尚有欽依把總領軍八百駐牛欄山以供挑濬今誠用穵運之夫役牛欄之卒加以省直班軍而又移中東二協修工班軍之行糧鹽菜以給之量加犒賞以為鼓舞軍固不煩調募糧亦不必多增而事可舉矣然責任不專則推卸易課督無法則收效難今密雲有禆將通州有大將天津有額兵額將沿途又有援兵援將若畫地分工責之各禆將使擇諸軍之強者磨勵以待敵弱者荷鍤以治河而統提衡于通州一大將又令原設河廳往來巡督淺夫州縣同心協濟總責成于地方之撫按亷其勤惰而黜陟賞罰行焉數月即可報竣秋防庶幾有賴矣章下部議覆上帝命分任責成仍嚴限報竣直𨽻巡按董羽宸上疏爭之曰通州上下一河若帶誠神京左臂第一重扼塞也臺臣建議欲挑河堆土因髙就深使東顧有天塹之形敵騎無衝突之患臣躊躇終日有不能必其決成者謹按京左漕河發源塞外匯萬山泉源以入密鎮又從頑石溜沙以抵潞河自密至通州計二百四十餘里為淺五十九則純沙無土沙之挑積岸際者皆浮盈靡漫日炙風吹乾如細麵若遊塵揚于空中復飄水底旋淤旋穵且時際亢暘涓滴一溜驟遇霖雨浩渺無涯甚而河道改徙平陸成淵通流倐涸向名自在流沙此地勢然也祖制自密而下户部穵運差轄之由通而下工部通惠差疏之止能因勢利導未聞有開掘丈許之深堆土數尺之高者非謀不出此勢不能也今以五六百里之長渠當千萬糧艘之湧至河流既不可堰雨涸又不可期畚鍤諸夫何處著腳加以額設穵運夫淺夫但可併力穵淺不能處處興工部覆謂用力既倍于平時工食豈沿于常格淺夫議增漕鏹省直班軍胥令其竭蹶以從不知漕鏹見在不敷何術增設省直班軍修邊正急何得撤外障以事內濠况今郡邑初復自各城濠以及關墻屯堡延綿數千里秋防轉眼撫道拮據不遑顧安得置此急務而皇皇于旦暮莫效之功哉漕河一帶軍國命脈攸關目前宜嚴責河職極力濬穵淺阻必罪勿宥不言高深而高深自在其中其密通挑濬雖奉有分任責成之旨然熟察時勢恐未易按程而責也倘徒勞人力徒費金錢濬之終不成深堆之終不成髙異日皇上責諸臣之不用命地方撫按自無所辭而糜去金錢已不可返臣今日安得默默而處此乞敕所司再加酌議直截條奏若以成命難回乞敕臺臣親行踏勘與撫院道部確商可否以取進止崇禎長編是年淮安蘇家觜新溝大壩並決沒山鹽高泰民田明史稿崇禎四年八月戊午河道總督朱光祚以江南連月大雨淮黃驟漲髙郵寶應江都儀真山陽清河六州縣大水泛溢害及陵寢漕運具疏奏聞并陳疏濬障隄大略帝以修築疏濬事宜俱命朱光祚率屬籌度力行十月辛丑直𨽻巡按饒京疏奏江南水利以河漕為先而灌田次之漕河之水利以鎮江之丹徒丹陽為先而他邑次之何也長江之水自京口分入鎮江為運河河水歷丹徒九十里達丹陽又九十里達常州之武進由無錫以及蘇州之吳江而通于浙凡浙之運船與松蘇常之運船總由此河溯流而上達京口以出江此河乃運船之孔道也然地形有髙下而水勢亂流有若建瓴易泄易涸南去數百里皆無水源而冬春幾成陸地臣嘗聞丹陽有上下二練湖蓄其水可以濟運河之窮而利漕艘之涉臣於七月杪出巡丹陽即為詢訪親歷其地見其汪洋浩瀚無異于汶上之南旺東平之安山濟寧之馬場沛縣之昭陽等湖是天于無水處生此湖以貯水濟運非等間也臣考練湖又名練塘仰受長山驪山八十四溪之水滙而為湖即古之曲汲湖也他不具論即以本朝言之洪武三十四年太祖命鎮江知府劉辰重修練湖以丹陽令周復昌董其事始塞上湖三斗門一石䃮引水入下湖塞二石䃮理廢䃮之石先修中斗門次修下斗門最後上斗門隨湖勢崇卑板為五級以泄水歷一年餘功乃成正統中令耆民築梗植櫛修東埂二斗門成化𢎞治中復修斗門至嘉靖中丹陽知縣李道學復修治之另開運河引水入漕蓋上練湖在丹徒髙下湖數尺而下練湖即仰流焉下練湖在丹陽髙運河數尺而運河即承流焉勢亦若建瓴上練湖中埂有石閘三座蓄水以濟下湖之渴下湖亦有石閘三座蓄水以待運河之涸水出丹陽防其下泄又于水之下流離丹陽四十里地名吕城有石閘一座過吕城二十里名奔牛亦有石閘一座以護其外水滿又恐上泄又于水之上流京口有石閘二座前人之制可謂甚備亦總為此運船計耳逮至萬厯年間漕船移為夏秋之運不苦無水所以每年兩湖棄置空曠之地變為桑田上下之石閘與奔牛吕城京口之石閘俱成虛設矣然而閲其故址固宛然星列也今漕規已復起運在冬每苦無水奈何不復修祖宗舊政而乃勞民費財臨時挑濬將無已時也則臣得倡言曰二湖之水當蓄而既壞之諸閘當理也閘能止水而涵洞為尾閭之泄傍湖之馬林上新等處十三涵洞當議也湖水蓄而臨期不過一啓閉之勞浙直漕船可無遲誤之慮而數萬生民每年無浚掘之苦真天地生成水利古今獨擅勝場修容可緩乎或謂棄置已久一旦復修未免廣費金錢臣聞浙直有協濟鎮江修河銀鎮江府庫貯在外省國家頻年之冒破勞民一載而可省百姓每嵗之咨嗟正所謂一勞永逸暫費永寧者也惟聖明採納焉上謂所奏深於漕務有禆所司確議以聞崇禎長編是年夏雨五六尺隄決南北共三百餘丈南門吊橋閘崩城市行舟人多溺死高郵州志崇禎五年十一月丙辰直𨽻巡按趙振業疏奏河道與漕運相表裏漕之遲速以河之安危河有安流斯漕無滯艘則治河正所以理漕也臣於查歷河南河道後即馳至張秋遍閲汶濟一帶南旺河口居南北之脊一水貫注潺湲如縷每遇春旱涸竭可慮目前正當大挑之候速敕挑濬所關甚巨倘淺處不濬濬處不深挖挑僅循故事重運其何以濟至于北河口尤汶水北㵼之衝今嵗大水沒隄此口必塞始能挽汶全力而注之漕此中又有馬踏蜀山諸湖名為水匱時其盈詘而節宣之斯可借潤特患經過內外官員倚勢決壩湖水泄漏則蓄積不厚何以待運臣與管河諸臣約嚴禁放決力飭修築倘有犯者即據實奏請定奪若夫上源諸泉派分流逺而導之湯湯皆濟運洪波國家特設泉部之臣其職誠重邇來嵗久事湮水利盡歸占籍泉夫幾為虛設源之湮矣流曷能遂臣移文泉部等官親行踏勘修復倘諸臣以急公為務濬河身蓄水利疏泉源一一實做北河自不患於淺阻而近日最可患者莫如駱馬一湖此湖至陳窯口清流安瀾縴挽最便賜名順濟歷嵗賴之不意今年黃水突決自清墩隄漫黃草湖出駱馬而歸宿遷直河故道一望平原陳窯新口細流就淤轉盻明春重運踵至遡流而上縴挽安施則所謂力塞決口復河故道尤當及時鳩工即投璧沈馬似亦未可深惜也乞亟敕總河督臣嚴飭中河分司及管河道府早辦物料多發丁夫刻期竣工無誤新運此萬不可緩之役毫不可省之費也崇禎長編是年決建義北壩總河尚書朱光祚濬駱馬湖避河險十三處名順濟河明史稿崇禎六年五月壬辰鐫總督河道朱光祚級以漕艘愆期也崇禎長編厯山東全河備考云光祚字世貞江陵人萬乙未進士天啓四年任崇禎四年再任崇禎七年冬十一月漕運總督楊一鵬議濬泇河從之明紀事本末崇禎八年秋九月逮總理河道尚書劉榮嗣明紀事本末初榮嗣以駱馬湖運道潰淤創挽河之議起宿遷至徐州别鑿新河分黃水注其中以通漕運計工二百餘里費金錢五十萬而其所鑿邳州上下悉黃河故道浚尺許其下皆沙挑掘成河經宿沙落河坎悉平如此者數四逮引黃水入其中波流迅急沙隨水下率淤淺不可以舟及漕舟將至而駱馬湖之潰決適平舟人皆不願由新河榮嗣自往督之欲繩以軍法有入者輒告淤淺辨卒多怨巡漕御史倪于義劾其欺罔誤工南京給事中曹景參復重劾之逮問坐贓父子皆瘐死獄中郎中胡璉分工獨多亦坐死其後駱馬湖復潰舟行新河無不思榮嗣功者當是時河患日棘而帝又重法懲下李若星以修濬不力罷官朱光祚以建議蘇觜決口逮繫六年之中河臣三易給事中王家彥嘗切言之光祚亦竟瘐死而繼榮嗣者周鼎修泇利運頗有功在事五年竟坐漕舟阻淺用故決河防例遣戍煙瘴給事中沈胤培刑部侍郎惠世揚總河侍郎張國維各疏請寬之乃獲宥免云是年榮嗣被劾得重罪侍郎周鼎繼之乃專力於泇河浚麥河支河築王母山前後壩勝陽山東隄馬蹄崖十字河攔水壩挑良城閘抵徐塘口六千餘丈明史稿萬山東全河備考云劉榮嗣字敬仲號半舫曲周人厯丙辰進士崇禎六年任周鼎字實甫宜興人萬厯癸丑進士崇禎八年任是年東河水淺運復由徐參議徐標於徐洪上流創開月河北與舊運河接連運得無滯明年漕運復由東河徐運道又廢徐舊漕河即泗水也泗水經流州界凡二百餘里自沙河至謝溝一百六里為沛縣境自謝溝至雙溝一百二十五里為本州境其他支流入漕在沛境者三曰泡河曰薛河曰雞鳴臺東小河在州境者四曰留城小河曰境山溝曰溜溝河曰烏觜溝至州城北則受汴水合流歷二洪下接於淮其後汴挾黃河之勢決嚙隄岸為漕之患至萬厯三十二年都御史李化龍浚泇河口漕漸移而東北以避黃河衝突及三十八年化龍開東運河告成而徐之運道遂廢本朝康熙初閉鎮口閘自是黃專合汴而交流之所墊為平壤泗自入會通河不復達徐矣徐州志崇禎九年夏四月泇河重濬成明紀事本末是年夏泇河復通由宿遷陳溝口合大河周鼎又修髙家堰及新溝樣田營隄增築天妃閘石工去南旺湖彭口沙礓浚劉吕莊至黃林莊百六十里而是時黃淮漲溢日甚倒灌涸漕鼎在事五年卒以運阻削職繼之者侍郎張國維甫蒞任即以涸漕被責明史稿崇禎九年八月庚寅天津河道淤阻帝諭姚應翀戴罪晝夜督濬再違定行拿究并諭督臣回奏十二月辛卯總理河道周鼎疏報挑河據司道府州再四確勘于陵無礙于運有禆州治民生所全甚大册開上自茶庵迤西舊欄壩入口起下至顧家莊後出口止共計應挑河長二千一百丈俱口闊十二丈底闊六丈深一丈五尺計土二十八萬三千五百方共銀三萬四千二十兩又截河大壩一百丈合用銀三千六十三兩零工部酌議上從之崇禎長編崇禎十年正月戊午敘泇河功周鼎朱大典張任學張宸極等敘功有差劉遵憲賞銀幣蔡國用鍾炌賞銀崇禎長編崇禎十一年四月丁未倉場總督李遇知疏稱淮限巳逾河流淤淺帝令嚴飭各糧道嚴押飛挽照限赴幫德州桑園一帶責成管河各官晝夜疏濬毋得徇誤壬戍河道總督請旨立榜帝以閘禁甚嚴權要擅啓泄水周鼎何不立糾殊屬瞻徇榜牌即行修復五月戊子巡漕楊一俊疏報東溝口一帶漕船淺阻帝令經管官先行革職戴罪星夜挑濬自贖楊一俊嚴督各河道躬住河干上緊催儹作速運行十一月癸亥工部主事于穎疏言臣管理淮安天妃閘以江南至儀真一帶河道挑濬自崇禎十年正月起至本年十二月終止將年例清册呈送部科備照崇禎長編崇禎十二年正月壬戌總理河道周鼎疏言臣身在行間河工勢難兼理請專敕管河司道各官畫地分治無誤急工以濟新運帝以河當大挑不及時興工殊屬延玩即著分地勒限速濬以濟新運三月巳未戶科給事中傅鍾秀疏言漕艘往以津途延滯釀弊叢姦但今日河濟用兵其水次觀望中途趦趄此情理之必然者然則三月過淮四月過洪之限果能一一如期乎若夫萑苻乘間保無沿途疏虞之患則提調防護亦當十倍疇昔伏乞申飭漕河諸臣悉心料理早抵通灣帝是之七月庚申工科右給事中宋之普疏言臣家沂州西泇河東淶河入漕運泇河之處俱在泇口原自通行年久湮淤每致有河身髙於平地者是在疏通河身使諸水盡歸于河引之既以濟漕而屯田民田皆可為沃壤實兩利之道也至沂河之為臣州患者總之在駱馬湖下流湮淤但得湖流疏通則沂水之患自淺全漕之利思過半矣帝命河臣酌議以聞九月戊寅户部李待問疏言海運一議所以濟河漕之不及漕臣朱大典籌度加詳焉然國初備邊每在西北故海上徑行無礙今日之患輒在東方帆檣粟米皆可以啓敵心運道一通海禁彌弛保無有交通為難者臣仰窺聖明建久長之慮當不以全漕之大倚辦海若而早計豫圖以此為不必然之畫亦一䇿也今漕臣先募大海船數隻自維揚至津門各攜工役詳録島嶼往來審視以圖經始蓋途有所必經而後不失于迂事有所必習而后能審其便此乘風破浪之要務實長慮却顧之極思也帝命所司確奏以聞崇禎長編崇禎十二年二月太監曹化淳議京城外開河以通漕糧自是年三月十九日起至辛已六月所開河自廣渠門起至大通橋運糧河北岸挑河長三千八百六十二丈又東直門外關帝廟挑月河長二百七十丈鬬虎營至關帝廟大石橋挑河長三千一百五十一丈命內監于躍為河工總理而以兵部司官輪督班軍共用班軍二百三萬二千餘工五城兩縣募夫二萬九百餘名兵部侍郎吳甡視工以為勞費無益且傷地脈抗疏止之春明夢餘録崇禎十三年閏正月辛亥登萊巡撫徐人龍疏言國家嵗漕百萬所道會通河一線以達京師而洪閘停留則苦搬運黃河衝塞則苦推移甚至臨清德州屢聞烽警亦岌岌可憂矣臣見有議復海運者夫海運危險安可以國脈輕付之不可知之地若膠口以北海倉以南元運舊河儼然在焉臣出巡膠萊自南海口麻灣至海倉北海口共二百七十里或塞或淺計工可開若修而復之既近且安利害較著而説者謂分水嶺馬家濠難于開鑿大姑河小姑河易于壅沙欲自黃埠巔云河口諸所創開一道以接之而臣以為不必然夫馬家濠兩岸阻石舟不可觸近經削治海船大行不煩人力一易也二姑衝沙為害然廢越二百年沙僅尺許冬春水涸嵗加潦刷二易也分水嶺地勢固高然河底泉水可儲河旁支流可引更修閘壩蓄泄有備三易也而且沿岸而行萬無一失既非黑海之險疏浚一通經久可賴又無黃河之虞居恆則兩路兼行遇變則此或有滯彼尚可來無意外隔絶之患有禆國計亦可通商係河運非專海運係疏導非專開鑿可用海船亦可用河船有益西河非欲廢西河也計淮口開洋由安東入麻灣海口行三百三十里由海倉至直沽沿海岸行三百五十里較漕河之運捷速十倍而中間所道新河又且安利疏挑之費度不過數十萬此會通河剝淺一嵗之所費耳倘可議行另疏以請帝謂河漕儘可轉輸安用海運若遇變復由膠萊仍與漕無異且疏挑與海船河船為用不下數十萬可否著所司詳確酌議以聞四月巳未工部主事薑天樞以運河膠淺疏濬不時糾劾博平縣知縣錢銓署清河縣印同知辛志諤管河通判張鶴齡帝命削籍戴罪督挑候工完定奪五月巳酉巡視漕儲盧世㴶言以漕艘鱗集膠滯難前管河水利道副使葉重華管河同知談系并濟寧州魚臺縣等官泄緩誤漕帝命將葉重華談系并濟寧魚臺印官俱先削籍令戴罪作速通浚盧世㴶職在巡漕著沿河星夜嚴催不得徒請申飭取罪七月壬辰帝諭漕糧關軍國命脈乃今時已入秋津南尚無片帆如此違玩國儲何賴總河漕儲及管河分司州縣正印把總等官俱先降一級仍各戴罪盡赴河干催儹依限早抵京通不得延玩致干重譴巳酉帝以自五月至今雨澤未降運河涸淺漕糧阻滯命順天府總河等官并各撫按一體潔虔祈禱八月庚戌巡漕御史盧世㴶疏報開放馬踏湖匱口使湖水北流以濟漕運未及一夜濟北臨南刻期利涉即德津間亦沾灌注糧艘銜尾而進報聞十月乙丑河道總督張國維疏言衛河發源輝縣之蘇門山搠刀泉合漳沁淇洹諸水北流至臨清會閘河以濟運為功甚大續因漳河返跳而衛流遂弱先年雖有挽漳引沁之議終亦未行致嵗嵗苦淺與其浚之于委又孰若導之于源也今嵗大旱臨德河流枯澀臣遣東昌府通判張鶴齡前往彼處清理而水即稍漲此非明效大驗歟今臣請于輝縣地方南旺事理特設泉司一員專董浚導衛河泉源并令細察漳水沁水之可復可引丹水闢支與淦洹三水之入衛與否將一切疏通搜浚事務悉令專致料理以濟糧運凡有泉河府廳州縣印河等官皆暫轄其所駐分署察彼處空間衙舍俱可棲止供應輿皂夫役所費約亦不多此固不難於增置者命河南撫按踏勘酌妥以聞崇禎長編行水金鑑卷一百三十一
