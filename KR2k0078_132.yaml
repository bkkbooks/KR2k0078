body:
  text: 行水金鑑巻一百三十二江南按察使傅澤洪撰運河水崇禎十四年正月庚辰總理河道張國維疏言濟寧州運道自棗林閘溯師家莊仲家淺二閘嵗患淤淺重艘維艱考之泉志泗河由魯橋入運濟漕棗林閘名為泗河派伏秋水勢洶湧足資利濟而挾沙注河水退沙積利害亦參半焉傍有白馬河涯鄒縣諸泉并藎云二河之水經埢里與泗合流而出魯橋向因泗水猛悍白馬力弱不敵以致河身半歸淤塞不為漕運者久矣今嵗船滯棗林牽挽莫施鄒縣管泉縣丞王訪吾集夫挑濬白馬河口一泓初出而停滯遂疏今廣為咨訪逐加丈量察泗河南出魯橋水道迂逺河形漸狹白馬河上源甚窄而泗流扼之以致下流遂化溝渠且魯橋一帶地勢高亢展浚不易為力近改入師家莊已多濟一閘而流尚涓涓白馬上源寛處止與仲家淺閘對不里許且地勢獨窄若導令入仲家淺較之魯橋師家莊迂直高下逺近之勢自不侔矣易細流為洪流一便也入運直捷減沙滲之患二便也濟仲家淺而并濟師家莊棗林閘三便也又恐泗河漲發仲家淺之受沙亦與棗林等議於白馬與泗河所改水口各竪大樁伏秋之時預築土壩遏水仍由故道水消則啟壩以納清流周咨輿論僉謂救涸之著無踰於此臣即備行南旺濟寧等管河官就近酌調官夫展濬俟工完再報可也帝令酌議以聞國維又言南旺汶河水分處原係地脊其勢最髙於此而流分南北也惟藉泰安新泰萊蕪寧陽汶上東平平隂肥城八州縣泉源由汶入運故運河得通今東平平隂肥城三州縣因沙淤中斷東平猶藉其半至平隂肥城全不收涓滴之用矣臣察㑹河自泰橋北至栁溝泉之下原係東平平隂肥城三州縣接壤令徧行分派起徐家橋至張家橋計長十五里派平隂縣挑起張家橋至王家橋計長二十里派肥城縣挑起王家橋至太平橋計長二十五里派東平州挑業經分責三州縣令泉夫開濬又復行通判李松并南旺司臣楊之易督率印泉各官亟行料理待正河挑濬事畢即調各州縣泉夫儹工挑濬若此河一疏不獨漕渠得灌注之助而民田亦免淹漫之患誠一舉兩利所闗國計民生者非淺矣上令所司速議甲申總理河道張國維疏言疏運六䇿一曰開東平平隂肥城㑹河以益汶流二曰復安山湖以濟北閘三曰改挑白馬湖出仲家淺以迅河流四曰改挑滄浪河從萬年倉出口以利四閘五曰展浚汶河陶河上源以濟邳派六曰改道沂河出徐塘口以並利邳宿乙酉總理河道張國維疏言行水之道疏其上游則可以并濟下流而去其壅勢使然也邳宿運道原有沂水一支發源於䝉隂令沂水經沂州郯城而南流於駱馬湖以濟運自運道不經駱馬猶傍水一小支從嵎頭集入迨長山口決嵎頭水出之口遂為黄流倒灌成淤全流俱空趨駱馬矣宿遷於薛家口馬胡店兩處引沂入運然但濟宿遷而上不能挽流溯邳也以故邳之梁王城英莊猫兒窩馬莊等處一經暵乾在在報淺奈何以如許名河竟無禆輸將之涓滴耶因遍考河志見有邳河涸不得不賴䝉沂之泉之文而察前科臣宋之普條議亦謂駱馬下流淤塞全沂之昏墊彌深曷若疏以入運使運收其利而沂治其害臣因躬詣沂河見其水浩𣺌不減南旺之汶河而入運者曽未一二再勘嵎頭集出水處濬復不難然界在邳宿之交濬之亦止濟宿而邳毫不得其用也不改從上游不可而為下不因又恐力難而費鉅察徐塘一口其流雖細實從沂水分來而據邳之上流者也於此疏之濬之所謂事半工倍者又盧家口分流下宫湖橋尚多淤阻徐塘出水之渠亦覺淺窄併濬深闊則濟全邳之涸并可益宿遷之深而邳與宿三分其流以殺奔趨駱馬之勢不第漕得其利并可減全沂之害洵一舉而數善備焉上命議覆丙戌總理河道張國維上言水櫃之設收衆流而兼酌濟其法最善察舊制安山湖周圍共一百里其間可為水櫃者延袤三十八里築以髙隄髙而田者計地七百頃有竒卑而櫃者四百六十一頃有竒今溝渠三道沙淤其二其一尚通而蓄水處障岸反髙出水處闗鍵不閉甚失導蓄之宜毋怪其盡為平陸也臣今欲清其界培其隄導其淤塞其決務還四百六十一頃之舊制專委知州河官遴殷實地老司其水利候霖雨沛發収貯湖中運事緩急端有賴焉上令所司議覆四月戊辰山東登州府生員田士龍疏言海運避險趨易之要謂海運貴在乗時惟是三月以至七月風柔水輭海不揚波及是時自淮口揚帆不經月而即至天津萬萬無虞若云成山始皇橋之險卧龍石之危則有知路之鄉導自能避險而之易避危而之安此外臣又有開渠之捷徑焉以臣之衛迤正東三十里名曰成山所迤西北五里名曰召陽口内有一小海迤南七里名曰養魚池内有一小海迤正西為進京大路南北小海相隔一線止十二里許此地並無峭山堅石俱是沙岡土阜由此而開鑿一渠引兩小海之水合為一處徃來運船可行永避成山所而興利萬世且開鑿之費不煩發帑勞民但留東三府京邊兩班軍丁挑掘不日即可告成其圖可驗也倘慮海運為通畨臣以為商船必於淮安撫臣登州撫臣各討給引行票至成山衛先設一官挂號驗引兩票相同方許放出海口轉至天津則天津撫臣亦必討給引票驗號不差始為眞商且又有登府額設巡海之兵船兼治沿海墊官瞭望更有何路可通畨也此皆一一可行之實事惟皇上俯賜採納焉七月乙未帝以時值孟秋過半糧艘抵津抵通者杳然國儲何賴其漕河運䕶及地方各官玩悞之罪實所難宥總河張國維已降三級再降二級巡漕吳邦臣尤難辭責降五級俱戴罪總漕史可法授事方新姑免降其餘經管文武各官應拿問應降革應戴罪者限三日内計倉二臣分别擬議具奏仍飛檄在事各官星夜儹運務期八月内盡數過津抵通其黄允恩沈廷揚海運一併責令速輓戊戌戸科給事中張元始疏言今嵗漕運稽遲而清口淤沙苦不能吐董口築壩苦不能茹又適值黄流倒灌遂有首尾並阨茹吐兩窮之患事勢甚難為今之計莫若大搜津屬剥船即著海運津弁帶海船戸前徃臨徳間迎漕剥兊優其水脚補其篩揚抵津之日即上海船此當責之津撫者也黄允恩海運如淮揚二郡半未及額應將昨年掣截津糧不拘某幇就便借發以速允恩之行如水脚不給船隻不備即係地方官誤事此責之漕撫者也章下所司察議以聞庚子戸部主事邢國璽疏言國家財賦倚辦東南邇因漕河淺阻議者欲開膠萊新河以費大工鉅而止然膠河之可開與今日之急切宜開臣敢歴歴言之蓋膠河自元初時萊人姚演建言新開故又名新河其自麻灣口以南直抵淮揚海倉口以北直抵天津中間相去僅二百四十六里且兩岸之土如膠一水中流若練下無流沙旁無疏土諺云銅幇鐡底河也今海口新河口陳村等閘遺跡尚存海倉即元時囤糧之所我朝嘉靖年間海道副使王獻復舉行之南北引潮舟楫畢達中間未及通者僅三十五里而獻以陞遷去任至萬厯年間工部尚書劉應節奉敕徃勘巳㑹議分工但以佐費數多致有異議事遂寢格彼時運道無虞即報罷可也今内外交訌漕艘梗阻而猶謂新河不可開得毋曰物力既絀工費之難乎試括戢東三府見役班軍免其㡬千里之跋涉令其服役於本土除應支月糧工食外即將節裁快壯工食項下每日量給鹽菜銀一二分彼必踴躍趨事登萊撫臣曽櫻察勘過此與臣酌議亦云大約費七八萬金足矣得毋曰積沙太多疏通之難乎夫兩口皆有潮水灌入堪以行舟止有沽河並白河二處積沙約長七八里皆疏濬甚易者視漕河數千里每嵗挑濬穵運豈止十倍於此乎又得毋曰中有伏石不便行舟乎聞其右喇港有大小青黒石然盡没沙中舟行潮上絶不相涉原無崇山峻嶺視海運始皇廟成山諸險又豈止十倍此乎總之此河一開沿崖溽港萬無一失非黑海開洋之比且南北直截轉輸甚便可省數月之程及一切盤剥折耗之費兩河並運在西河則糧數既分運事自速亦可免挨幇積氷之堅處變則二百餘里防䕶甚易可無咽喉一線之虞其在東土則商旅可通足資貿易即通運邊方則闗寧薊永一水可達亦免召買穵運之苦此正濟漕運之窮免海運之險無冦盜之警䇿無有善於此者章下所司看議以聞八月甲辰總河張國維疏言汶上縣河至南旺分流各湖聮絡在西為南旺湖名曰水壑主於洩以備澇也在東為蜀山馬踏兩湖名曰水櫃主於收以待匱也又南至濟寧境為馬場湖北至東平境為安山湖亦係水櫃近來蜀山馬踏皆廢瀦蓄馬場安山久化平陸矣去夏曽收馬踏蜀山之水以濟北河滯船之急惟安山湖向為民間占種臣復於去冬具疏請復迨今嵗入夏以來甘霖應禱蜀山馬踏安山三湖水俱盈滿又馬場西連蜀山例須蜀山盈滿然後啟斗門以入馬場今蜀山初滿斗門未啟而馬場已收水五分是由運河同知譚綵去冬於府之西創開一渠以通馬場故伏秋水發奔騰灌入譚綵此舉實馬場湖之水利也見今河滿湖溢糧艘運務不難立竣矣是日上諭漕事大壞至今日而更甚不有大法嚴懲安能唤起聾瞶目今屈指冬寒漕船不銜尾前進抵通抵津無期總漕巡漕及漕糧等道各逮問正罪重幇停滯河乾淺阻不能飛渡總河及管河等官各立置重典至於沿河一帶掲竿之徒猖獗問誰實司兵而令路斷人稀一至於此各府鎭兵備將領等官以文到之日為始俱令移駐河干調集兵馬以全力衛漕不許隙疎刻懈如糧艘稍有不虞定以三尺重治漕糧有未完者即刻期兊發趕幇若復希冀改折蠲免稽誤漕政撫按官革職為民糧道推諉一并提問州縣責漕河撫按嚴行挐究仍敇令立限自認以便察考十月丁未總督漕運史可法疏言管河同知張以謙管理董口一帶能督率宿遷縣主簿嚴之麟於舊設隄閘外復造兩面髙隄共長千丈又於通河溜口倣月城創造圓閘一道計四十丈餘當河流暴漲之時有此層層攔攩始得免於衝決見今閘口通利日可過船二三百隻臣隨優賞主簿嚴之麟花紅正欲為以謙叙勞而緹騎忽至臣以為罪固當治而功亦不可泯因特上聞章下所司核覆丙辰總督漕運史可法疏報漕糧遲悞之故大概由回空之未到僱船之驛騷年嵗之灾荒米糧之踴貴運口之淤阻而亦由各糧道拘執舊規不思權變因參玩悞河工同知許鳴逺湖廣糧道李于堅浙江糧道瞿士達常鎭糧道李時茪丁巳河道總督張國維言漕政與河政相輔而行有定為漕限參諸天時酌諸人事守之則漕河兩利踰之則漕河兩壞者必然相因之勢也今嵗自開兊至過淮無不愆期迨出清口遂遇灌黄察清口舊例運艘過盡伏水將發築壩遏流今年伏水發而重運始來不敢築壩遏流致此淤墊咎實在誰夫清口遏流事宜載在先臣潘季馴河防一覽河官奉為蓍龜者謹送閣部科臣披閲復摘録清口事宜另疏上聞伏惟俯賜垂覽可洞照淮洪二限之深意矣總之漕規不復則河政難修此斷然不爽者伏乞敕下漕臣預為來嵗計可耳崇禎長編張國維巡撫應天崇禎十年浚江陰運河十一年築鎭江漕渠晉工部右侍郎總督河道兼提調徐臨通津四鎭漕餉事務值天旱泉枯禱於泰山得大兩乃上下泉源挖浚蓄水以濟糧運晉兵部尚書國變後投水死浙江通志崇禎十五年正月丁亥淮海總兵黄允恩疏奏臣惟皇上因漕梗而敕行海運以五萬石小試奈交兊延緩甚至隆冬後幇猶有過成山者保全無恙似已推行有序矣臣且三次禦冦䕶運至膠萊河地界周巡按視有不煩剏鑿不損地形可永為漕運之絶計者謹為我皇上陳之按先朝有開膠萊故道者不一而足然意美而法未良不知所謂分水嶺者既為山根石骨難施五丁之功是以倐鑿倐止金錢徒費臣詳察其地南北縱横共計二百四十餘里潮水深入者百里河溪湖畔量加疏濬即可通潮者百里此外惟是嶺頭脊脈不可鑿動者約四十里意今之漕河每嵗急應挑剥者亦不下數十處今獲此利即留此領脊為盤剥之地也能㡬何哉計將淮揚重船其運至膠河洞水津之空船令接至中間通濬小河多造脚船飛輓如通州抵壩故事獨於嶺山接建倉厫留本省京邊操軍推駕輕車儘足盤剥之用倣古河碭洛口之運以待回空受載是南自淮河抵膠北自海倉抵津計日直逹較河漕水程固逺邇霄壤而比成山一轉亦縮近數倍每一年而三運四運無不可者河渠有淤淺冦賊之患海洋有風波島嶼之險此正用海以輔漕而用膠萊又所以輔海一舉而數事得事捷而功倍實為萬世之利也章下所司三月戊戌總理河道張國維疏報挑濬山陽清河髙郵江都儀眞三百里運河計費四萬餘金章下所司四月癸夘天津巡撫馮元颺疏奏海運要著莫如復總運之制一總運統轄二十運官以一運官督押二十號船每號立一幇長每幇長領十九船戸五船取一互結二十船取一總結臂指相使首尾相銜兊運之日幇長率本號船依次排列河下倉官在倉主發運官在船主收裝載一完立加封驗餉道即呈水脚冊餉司即給運價銀總運即時押至海口運官即時押發開洋不許片刻逗遛不許隨地停泊但使浪恬風順三日可達闗寧若有一船落後幇長隨行稽察即盜賣之風自絶挂欠之累自銷直截清通轉運無滯期至七八月盡行運完原額即得風得水無患無驚並無失風舉火之虞何能藉口妄揑此眞提綱挈領拔本塞源之要著也章下所司六月癸夘上諭戸部連日不兩運河水消著河臣挑濬濟運聞各船遷延不進押漕官何無催儹今嵗津運已經該撫具題各省先到者先行截留著兼程進發以足應截之數其遲到者不得攙越求截又聞寄囤舊糧殊多侵蝕揷和著管催舊漕科道等官嚴行察飭如官弁私役仍踵前弊即重懲之辛亥戸部郎中沈廷揚疏奏臣遵㫖詣淮與總漕臣熟籌海運事宜如原題募沙船僱水手禦海冦夫海船非比内河無船可募不得不造造船必募殷實船户預給錢糧船戸得人則造船始堅而水手自得矣至於水脚自淮至遼每石止給七錢先發五錢至天津乃足其二而此五錢中又除留一錢二分有零所得者止三錢耳其誰願之伏乞敕下總漕臣從長酌議揆民情恤時艱計里定價計石預給鼓舞招徠則逺近富室大戸争至不惟濟遼且可濟京不惟運糧且可禦冦矣章下所司甲子戸部疏覆開復膠河十萬兩宜責之工部軍餉孔亟戸部不能辦給從之十一月辛未工科給事中金汝礪疏言河患妨漕請敕新河臣星馳疏濬並令海運宜急膠河宜開又言周藩罹水凡同城遇患士民宜推恩賑濟得㫖修復河漕故道目前急務黄希憲著星馳受事膠萊河責成登撫及賑濟難民事宜所司詳議閏十一月辛酉沈廷揚疏奏海運出聖明獨斷使臣試運以通南北乃為朱大典所阻及部議置臣於山東以召買津糧并解臨徳二倉徑運闗寧不費朝廷水脚又省民間數十萬金錢運速而遼濟矣乃議者初言海運必不可行及臣行之稍有端緒則言海運易行及召臣來淮反言海運不當行無非私意逐臣請自此罷得旨海運既屬可行何故人多阻撓所司察奏崇禎長編崇禎十六年二月壬申總漕史可法疏奏今嵗漕船北上於六月内已盡過洪所遲至八月者惟趕幇零船耳方望全幇回空早濟新運不意北河淺阻南下無多臣方以此為慮乃突報開封河決下流盡淤向之洶湧而來者今且褰裳而涉矣嘗考河決入淮從來為害即以國朝言之洪武二十四年決於原武由陳潁至夀州正陽鎭全入於淮元賈魯所挑之河遂成淤塞時猶未有河運也及正統十三年決於崇陽過開封城西南經陳留入亳州之渦口又經蒙城懷逺東北入淮全河南徙以達於海嘉靖九年河決野雞岡由渦河經亳州入淮吕梁二洪告涸萬厯十五年決于單縣之黄堌口溢於河南夏邑永城界經宿州符離橋出宿遷新河口入大河半由徐州入舊河濟運二洪告涸時司河者每至冬月即其地開一小河春夏則引水以下徐州濟運至秋即淤漕舟至京徃徃愆期又三十年河決蒙墻寺入歸徳商丘永城南徙而河與淮全入洪澤湖有妨陵寢總之挾淮而東未有不為陵運之害者今亳州蒙城懷逺等州縣巳被水衝臨淮泗州水勢日長與伏秋洶湧深廣相同洪澤一河斷難容受其勢必漫過髙家堰之上樁石乆圯立見衝崩淮揚之間盡為沼矣所求椿石之需不容時刻緩者也况河并於淮盡由清口吐出滔滔東注誰能挽之自清河至宿遷二百五六十里之河身將歸淤澱而囘空南下與新運北上盡為阻絶矣先年京倉儲積足資數年運道暫淤猶堪補救今則嵗漕四百萬僅支目前一有愆期所闗豈小伏乞敕下該部速行確議或捐金錢濟潰及早興工或擇望重之臣專為經理務於正二月内塞決完工庶陵免震驚漕無昏墊之灾矣章下所司速覆丙子上言汴河屬周堪賡運河屬黄希憲責雖分任事實相闗一應築濬等項俱著詳審速圖并嚴飭沿河道府有司協力料理蚤襄運務如有玩違㕘來重治三月巳亥工科給事中金汝礪疏奏汴口沙塞請敕河臣黄希憲及時修築得㫖汴口沙塞情形未確著嚴催竣工不得悞漕十二月癸未諭工部前議開膠萊河以通海運曽否動支其戸部所發及河工銀十萬兩曾否支用著即察奏昨計臣奏文登開養魚池尤為通漕便道係賀王盛所議是否可行即著王盛前去詳悉勘明確議奏以聞崇禎長編崇禎十七年正月丙辰太僕寺寺丞賀王盛疏奏膠萊海運並繪圖以進帝言賀王盛著即踏勘成山一帶海運形勢事宜詳確速奏圖留覽崇禎長編東薈蕞云膠州南北三面皆海北有膠萊新河自州東南三十里麻灣海口北流合沽河又西北經平度州西南合膠水又北至掖縣海倉口入海即元人姚演所浚也元至元時萊人姚演獻䇿開新河由膠西縣東陳村海口西北達於膠河出海倉口由海道達直沽以通漕謂之膠萊海口從之既而罷明正統間昌邑人王坦言徃者江南嘗海運自蘓州太倉轉輸膠州膠州有河故道可浚之轉運至掖縣再浮海至直沽可避東北數千里大海之險視河漕為便嘉靖十一年巡按方逺宜亦議開新河中有馬家濠數里皆石岡十九年巡海道王獻焚以烈火鑿而通之工未半去萬厯三年用南京工部尚書劉應節言以徐栻㑹同山東撫按開浚栻奏工費九十萬金有竒巳為廷臣阻罷其大略自淮河北岸之支家河疏為渠至山東之漣河口凡三百八十里出海自海州贛榆安東衛石臼所夏河靈山衛至膠州之麻灣口凡二百八十里自麻灣以北鑿為新河歴平度州至掖縣之海倉口出海凡三百七十五里又北抵直沽四百里通計一千四百五十里云王獻原疏云元人海運自淮安循海而行至靈山之東浮山勞山之西有薛島陳島石砑林立横伏海中若橋號槐子石橋最險難越元人避之故抵萊州放洋于三沙黒水歴成山正東踰登州東北又東北海倉然後出直沽以達天津按膠萊河道自薛島之西有山曰小竺兩峯夾峙中有石岡曰馬壕馬壕之麓南北皆接海崖其北即麻灣又少北即新河又西北至海倉直沽由麻灣抵海倉三百三十里由淮安踰馬壕抵直沾千五百里若逕出於此可以免遶海之患元人嘗治此道遇石而止今因其故迹鑿馬壕以趨麻灣長十四里廣六丈有竒深半之而江淮之舟可逹新河新河兩旁皆有水泉溢出疏淺決滯為九閘以節宣之可以佐㑹通河之窮從之於是於舊河迤西七丈有餘鑿石開渠工未半而罷劉應節原疏云膠州南自淮子口大港頭出海自州治西抵匡家莊四十里俱岡溝黄土宜開自劉家莊北抵臺頭河張奴河至亭口牐三十里俱黒泥下地下深數尺宜浚自亭口牐歴陶家崖陳家口孫店口至玉皇廟六十里河寛水淺宜於舊河之旁别開一渠玉皇廟至楊家圈二十里水深數尺宜浚自楊家圈以北則悉海潮無煩工作矣以工力計之創者什五因者什三略施工力者什二以地勢計之宜挑深丈餘者什一挑深數尺者什九欽差工部侍郎徐栻疏云匡家莊地髙難開改於都泊船路溝地形平衍有河可引宜建牐設櫃如㑹通河事科臣王道成言膠州在兩海口之中土最髙厚萬一巨石隠伏功將安施難一水性湍急流石走沙即有泉源易涸易盈難二海船不可入河河船不可入海難三崇禎十五年戸部郎中沈廷揚試行海運復請開膠萊河十六年命戸工兩部發銀十萬兩開浚未行而流冦事棘矣説者謂㑹通一河嵗糜費國家金錢無算而膠萊河開自麻灣以至海倉南北相距僅三百餘里當潮水深入之時其間二百餘里量加挑浚可以行舟况馬壕既通唯平度州之分水嶺地多積沙水流㣲細所當疏鑿者僅三十餘里使新河果開則棄㑹通之迂道㕘用元人之捷徑誠國家永利也或又謂此水海沙所壅終不可通使舎㑹通巳成之緒而鑿膠萊萬一不就得毋為宇文融之九河李仲昌之六塔乎兩説互異吾願後之人慎勿因前説而誤信之行水金鑑巻一百三十二
