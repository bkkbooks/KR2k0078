body:
  text: 行水金鑑巻一百三十三江南按察使傅澤洪撰運河水國家定鼎燕京嵗漕東南四百萬石由江涉淮入黄河進董口由徐塘口經泇河㑹通河衛河遡大通河以達京師康熙七年董口淤運道改由駱馬湖十八年駱馬湖淺挑皂河口接温家口達徐塘口遞年修築挑濬所有執掌事宜備載於後至支河及湖泉閘壩有裨運道者亦附載焉大清㑹典大通河即潞河舊為通惠河其源出昌平州白浮村神山泉過榆河㑹一畝馬眼諸泉匯為七里濼東貫都城由大通橋而下至通州高麗莊入白河凡一百六十餘里自大通橋至通州石壩四十里中設六閘蓄水以濟輓運設閘夫一百二名康熙十九年遣官挑濬通州至天津河道天津以南仍令總河挑濬大清㑹典白河去通州二百里源出闗外經密雲縣南流過通州合通惠榆渾諸河至直沽㑹衛河入海大清㑹典衛河舊名御河源出河南輝縣蘓門山東北㑹淇漳諸水過臨漳分流為二其一北出經大名至武邑以入滹沱其一東流經大名東北出臨清合㑹通河至直沽㑹白河入海此水既濟北河運道兼溉輝安河内三縣民田故於源頭建仁義禮智信五閘隨時啟閉漕運民田均有利焉大清㑹典㑹通河自臨清迤南至濟寧州元初由任城即濟寜開渠至安民山即安山一百五十里復自安民山西南開渠由夀張西北至東昌又西北至臨清凡二百五十里引汶絶濟直歸漳衛明洪武間河決原武縣黒羊山由舊曹州鄆城縣兩河口漫過安山湖而㑹通漸淤永樂初遣官疏鑿元人故道乃於東平州戴村築壩遏汶水使西流盡出南旺至分水龍王廟分為二四分南流以接徐沛六分北流以達臨清相地勢髙下増修閘座以時啟閉國朝時加修濬運道利焉大清㑹典明初運道經徐州吕梁二洪懸流三十丈水險害運後開泇河自夏鎭達董口共二百六十餘里避黄河之險三百三十里建良城臺莊侯遷頓莊丁家廟萬年莊張家莊徳勝等閘國朝於韓莊閘西岸増築石隄漕運安行大清㑹典淮揚運河由瓜洲儀眞迤北至清江浦天妃閘皆運道所經明永樂間通淮河為運道於淮安府東南高家堰上築隄以防淮水東注又自府北鑿河蓄諸湖水南接清口凡六十里曰清江浦乃漕運由江入淮要道建清江等閘遞相啟閉本朝康熙九年大修淮揚隄岸並髙郵州東西二隄決口十年挑濬淮揚裏河十一年大修髙家堰並歸仁隄十四年邵伯隄決次年工成而淮楊兩岸隄潰田舎皆没遣官查勘又山東厰等處衝決歸仁隄七堡八堡漫溢嵗餘工竣十六年大修江南河道於洪澤湖下流髙家堰以西至清口一帶河身兩傍各挑引水河一道自運河西岸歴七里墩至周橋閘北共築隄一萬二千八百餘丈自周橋閘至翟家壩築隄三十二里並堵髙良澗決口三十四處自清口至清水潭大加挑濬十七年增築髙家堰隄又從文華寺挑濬至七里閘以為運口並大修清江浦大小閘座十八年大修歸仁隄塞清水潭決口更挑新河一道改名永安又塞翟家壩決口十九年山清髙寶江都漫決五十餘處加築山陽潘家窪遙隄挑永安新河并髙郵城南淺工又加挑南岸大引河及改建運口大石閘令糧船由七里新莊二閘出口二十一年大修工竣命大臣科道查勘仍令河道大小各官修築二十五年特發帑金遣大臣修濬下河海口大清㑹典支河榆河源出昌平州南月兒灣下流為沙河㑹清河經順義縣入白河大清㑹典盧溝河源出太原之天池伏流至朔州馬邑從雷山發為渾泉即渾河㑹桑乾河河源出馬邑之金龍池百湖湧泉東下㑹盧溝河及雲中諸水經太行山入宛平縣界東南至看舟口分為二派一東流至通州髙麗莊入白河一南流至霸州合易水至丁字沽入運河大清㑹典滹沱河源出山西繁峙縣泰戲山歴代崞等州縣東流經眞定府南至武邑縣合漳水又東北流至坌河口入運河大清㑹典胡良河在涿州自拒馬河分流至通州東入渾河大清㑹典琉璃河在良鄉縣自磁家務發源潛流地下至良鄉東入渾河大清㑹典汶河一出新泰縣宫山之下曰小汶河一出泰安州仙臺嶺一出萊蕪縣原山一出縣寨子村俱至静封鎭合流曰大汶河遶出徂徠山之陽而小汶來㑹經寧陽縣北堽城歴汶上東平東阿又東北五百里入海元時於堽城之左築壩遏汶入洸南流至濟寧合泗沂以達於淮明築壩戴村遏汶水盡出南旺南北分流以濟運道而汶之為利直與江淮黄河埒矣大清㑹典洸河出寜陽縣堽城繞縣南流三十里㑹寧陽諸泉又六十里經濟寧城東與泗合出天井閘河大清㑹典沂河源出曲阜縣尼山西南分流為二俱與泗合由塂里河出師家莊閘河又有出沂水縣艾山者㑹蒙隂沂水諸泉與沂山之汶合流至邳州入淮大清㑹典泗河源出泗水縣陪尾山四泉並發故名泗水西流至兖州府城東又南流經横河與沂水合元時於兖州東門外五里金口作壩建閘遏水南流明時増修閘洞夏秋水漲啟閘使南流出師家莊閘冬春水㣲則閉閘遏水入城出濟寧天井閘大清㑹典濟河即沇水也發源河東垣曲縣王屋山下既見而伏東出河南濟源縣東西分流至温縣而合歴虢公亭西南入於河復溢而為滎東出於陶丘北又東北會於汶一名大清河元人作金口壩傍有河曰黒風口西通濟流並入運河沁河出山西沁源縣綿山東谷繞太行山麓至河南原武縣黒陽山與河汴合流至徐州入運河共長一百三十五里隄岸八十一里大清㑹典丹河發源自白姑山由河内縣境直入衛河共長四十里以上諸河湖泉之水導引蓄洩皆以濟漕為運道所闗徐沛山東諸湖在運河東者儲泉以益河之不足曰水櫃在運河西者分漲以洩河之有餘曰斗門而淮揚諸湖即為運道其山東新舊各泉可引以濟漕者派分為五入汶河為分水派入泗沂濟及天井閘漕河為天井派入白馬