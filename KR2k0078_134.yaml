body:
  text: 行水金鑑卷一百三十四江南按察使傅澤洪撰運河水世祖章皇帝順治四年六月以久雨水漲河隄再決亦隨就塞自後無事者十年然自明末漕規久廢閘不時閉淮流常泄河沙嵗浸洪澤湖底日髙即分入運河者沙亦隨入運河日以淤淺為漕計者唯嵗益增隄下河仰隄髙與城等而前此諸塘既廢潦水别無所瀦又歸仁隄嵗久不治髙堰防護亦疏泗州常沈水底伺間決防為壑鄰計揚州患伏於隱莫之省憂揚州府志是年大水六月雨不止鄉官孫宗彛條議上巡撫陳之龍檄令掘丁溪白駒二閘水即退髙郵州志世祖章皇帝順治六年北水大漲南北隄決數百丈民大饑髙郵州志世祖章皇帝順治七年河決荆隆口張秋一帶隄岸皆潰由大清河入海東兖濟北皆罹其害山東通志是年荆隆朱源寨口決直趨沙灣運隄衝潰挾汶水由鹽河東奔入海次年總河楊方興塞之山東全河備考是年總河楊方興築姚港口石隄髙郵州志世祖章皇帝順治八年大挑漕河募民為之多雨工未盡善髙郵州志世祖章皇帝順治九年大王廟口決沙灣復潰衝斷運道總河楊方興修築隄岸又自西岸河邊起至八里廟河邊止開引河一道長五百丈至順治十三年工始告成蓋張秋為黃河下流其決於明世者正統十三年徐有貞治之𢎞治五年劉大夏治之皆費極浩繁工極艱難然運道得以無恙者垂三百年防禦之法周矣至是三嵗再見不重可慮哉山東全河備考世祖章皇帝順治十三年五月日工部題總河臣宜將河道工程確實查勘緊急工程不妨加工多修其可稍緩者即止移緩以就急庶不擲金錢於無用其司道州縣若有虛冒估計即當據實指參修過各處工程亦應年終奏銷奉旨依議行河南管河道治河檔案故開銷河道工程錢糧運河最多置於此世祖章皇帝順治十五年十一月初八日河南道監察御史何可化題臣先任浙江曽經淮黃地方留心體訪頗得其槩今於邸報見總河臣朱之錫并漕臣亢得時等疏屢報水勢隄岸突決城池浸沒一方漂陷若是乎岌岌矣然但言一時之事而不及前後也但言衝決之地而不言形勢也臣請以所聞奏夫淮泗之來自泗州入於陂射等湖北折於清口而黃水合流矣自邵伯而北歷髙郵寶應山陽安東皆受湖患而城低於隄者丈有四尺其西為髙家堰髙良澗二隄以障水勢而水過大則浮漫而行至淮揚城外西隄皆沙土即嵗有修補終不能固勢必多為旁㵼之路而後可則治湖之形勢不可不詳也又黃河自清口合淮迄東而至五險為隄曲折僅百里其寬者不過四五丈耳而河路之狹僅四五百步夫黃水在河南一帶即狹者亦經五六里今以里餘之地收兩河之水雖神禹不能善其後也又山陽以東有隄其來久逺名曰太荒長亘蜒蜿僅三百里在前朝出自民間地頭夫每嵗增補髙厚焉自御史秦世禎題准官築以寬民力而嵗修亦無定額則官民修築之利害不可不講也又險隄而外為鹽城等縣直達江都每嵗鹽課百四十萬取給於此若五險隄岸一決則鹽城盡被淹沒且非一嵗興工可便補塞國家幾百萬金錢不可不重為慮也况險工一決遭漂溺者七州縣房田墳墓盡壞於洪波民命且不可測况租稅耶則五險太荒諸隄不可不防患於未然救災於未事也請敇下河臣親到淮揚審量形勢湖水若河而蓄若何而泄黃河東下何以收其流何以殺其勢查前朝之故事量今日之情形不病國不損民悉心經畫以圖久安漕儲力役均有賴焉奉旨據奏淮黃隄工關係地方鹽課著詳議具奏部覆請敕總河臣親赴淮揚審度地方形勢湖水應如何蓄泄黃水東下窄狹處所應何以收流殺勢以及五險太荒隄工應如何修築逐一審勘詳確務求有利於國無妨於民經久可行酌議妥確題覆以便臣部另議可也奉㫖依議行河防疏略世祖章皇帝順治十六年五月初一日總河朱之錫題據該司道㑹看得淮揚之治河也較他處不同在揚屬運道與湖水相連在淮屬運道係淮黃交流淮河自西而來至泗州入諸湖出清口達於黃河以資利涉是以治河治漕必並行而不相悖方於國計民生兩有禆益敢以淮黃之勢言之夫黃强淮弱黃濁淮清二瀆同至於清口匯合東由安東雲梯關以入海此從來不易之勢也但黃流濁河易致沙淤必藉淮流蕩滌方不至梗運病民先年嘗有分黃𨗳淮之議分黃者於桃源縣迤南黃家觜闢一支河使其從旁分泄以殺强黃之勢𨗳淮者𨗳引淮流歸於海以通運道故淮水偶有暴漲於南設有髙良澗周家橋二閘以備宣泄溢入寶應髙郵諸湖相聮澎湃各建閘座挑挖河渠纍築隄岸捍禦衝決由邵伯金家灣入芒稻河或從瓜儀注江或通廟灣歸海此蓄泄湖水之法外此再無庸於旁㵼矣至於雲梯關之灌口固為黃淮㑹流一路寬廣歸海之處每遇河流泛漲無處分殺必從清河上四十五里仍挑黃家觜經清河至安東五港口東流入海分殺暴漲之勢不致南下而清口得免黃强抵淮阻運之患至新溝等五險工亦可稍免全河洶湧衝漫之虞誠為保運安民長䇿奈河長二百四十里淤澱年久工繁費巨難以輕舉應俟年豐物阜另議舉行其太行老隄山陽境內延袤三百里原係民修民守自秦按院題免鄉夫之後數年未修又值去嵗洪流衝漫處處坍塌卑薄不堪捍禦業蒙本部院具題巳經司道會議查照舊例仍按原籍責成鄉民分修另詳在案再照此隄之內五險工下流關切淮揚髙寶等七州縣鹽課亦攸係之嵗嵗修防勢難緩怠若得有引水一支流旁㵼以減正河之勢以免直射之衝誠保五險之要著第查蘇建北岸宫家營地方舊有引水一河久經淤塞每有興濬議皆未果蓋緣引河必使深廣同於正河方能借勢而下况黃河諺稱神河闊數百丈底深水溜不惟挑濬匪易借使如式寧能保其不旋挑而旋淤乎亦惟有廣積夫料加意修防以收補偏救弊之功舍此無他竒也該臣看得淮揚郡屬地處卑下匯為諸湖淮黃由之歸墟江海於焉受注客水時至一望汪洋如線之隄曾不足以禦稽天之浸則疏泄固所在亟亟也爰自前明挽河資運閲數百載變故即費數百載經營今其遺迹非不具在然舊貫固有可仍而時宜又有不得不審者臣請條晰而備陳之淮水自西南來趨東北黃水自西來橫截於清口外淮之支流由清口折而南注通江者所謂運河也淮之正流㑹黃並驅東下入海者所謂黃河也伏秋之間淮黃交漲淮被黃遏周旋而不得出清口以上匯而為洪澤等湖則髙堰危故堰南有髙良澗周家橋兩閘泄水東入髙寶白馬等湖髙寶湖東通連運河南從瓜儀入江而地勢微昂宣泄不及則運隄危故運河東岸有涇河子嬰金灣等閘泄水東下射陽廣洋等湖入海有灣頭閘有芒稻河泄水南入於江此運河及諸湖之形勢也隄閘舊制今皆現存間有嵗久圮壞者應行酌量估計以時修葺者也淮黃交㑹由清口而東濁流湍悍衝潰易告查前明萬厯年間曽於桃源縣黃河北岸挑黃壩新河二百四十里分黃一支由五港口歸海以𨗳淮保運即以殺南岸河患但淤澱已久工役繁巨興復實難又崇禎年間塞蘇觜建義兩決口曽挑宫家營引河十里暫殺水勢未幾仍淤蓋河不兩行既恐徒費况今嵗淮工坌集亦有未易並舉者姑俟民力稍裕另行酌議至于現今河身闊者數里狹者亦不下數百丈兩隄去河尚有陸地水長則及隄址水落則復河渠洪流衝蕩不啻奔馬豈俟人力開鑿收流之議似無庸贅此黃河之形勢也總之太行老隄實淮揚七州邑一大保障自前朝來原係莊民自修而中間頂衝掃灣諸險工亦有鹽城各縣出夫協濟之例順治九年間黃河北決淮屬士民燕雀怡堂具控按臣遂為題免沮格廢弛去嵗冬漲幾成大害此臺臣何可化特以力役為言蓋實有見於往例之不當廢耳除裏外兩河隄掃各工仍應照例每嵗勘確詳估題修其太行五險隄修築事宜臣近于淮工夫役疏內已經㑹議題明應候部覆前疏請㫖遵行以垂永久可也部覆奉㫖是依議河防疏略是年歸仁隄決水自翟壩古溝下灌諸湖江都瀕河田舍水深六七尺髙寶則浸及城市月餘乃潰漕隄而東注興化墊焉揚州府志李昌祚漢陽人順治壬辰進士十六年由翰林任河北道參議築堌陽隄以禦黃河濬廣濟渠以分沁水民賴其利河南通志世祖章皇帝順治十七年三月初十日部議據總河臣朱之錫疏稱嵗修之制原以防一嵗之伏秋濟本年之運事即據一嵗之中車道狼窩所在必有徑寸不修便可成患今前人預立結狀誰則敢任以後嵗修工程相應照舊估修等因具題前來請敕下河臣嚴行司道印捕等官照舊估修工完之日各官各具可保本年伏秋無虞印結同册一併奏銷如有本年衝決即指名題參以憑從重議處可也奉㫖依議河南管河道治河檔案姜天樞餘姚人順治中為工部郎中督視北河纍年亢旱河渠不通山東諸泉亦竭總河束手無䇿天樞曰昔僉事江良村曽言𨗳河注衛增一運道今獨不可借良材之議而反用之𨗳衛注於河乎總河從其議而運道於是添設衛河主簿著為令浙江通志聖祖仁皇帝康熙元年開周橋淮水東下隄決自此州境水患不息髙郵州志聖祖仁皇帝康熙二年九月十九日總河朱之錫題為敬陳河漕事宜以速飛挽大計事竊惟我朝奠鼎燕京轉漕東南上供玉食下給百官六軍之需運河一線悉仍明舊則凡所以利涉者自不得不一循舊章修明而謹守之也順治十三年以前河道多故糧運率遲自十四年迄今仰賴朝廷洪福幸漸免凍阻之患矣第有一二規制或自明季相沿或有日久弛廢尚須急為講求者臣謹徵考故籍為我皇上陳之一曰閘座運河臺莊以南臨清以北原無閘座節宣每遇旱乾尤易淺閣者姑且勿論其臺莊以北臨清以南將及千里之內惟恃山東諸泉之水從石罅泥穴中尺疏寸𨗳㑹流於南旺河渠分濟南北而南旺南距臺莊髙一百二十尺北距臨清髙九十尺其間或數十里置一閘或數里置一閘必上啓下閉互相灌輸方可浮運春夏之交雨澤愆期源枯流細更必倍費守候以漸積水然後盈漕否則建瓴之勢一瀉無餘舟膠而不可行也查㑹典一欵凡運糧及解送官物並官員軍民商賈等船到閘務積水至六七板方許開放若公差內外官員人等乘坐馬快船或站船緊急公務就於所在驛分給與馬驢過去不許違例開閘進貢緊要不在此例又一欵凡閘惟進鮮船隻隨到隨開其餘務待積水若豪强擅開走泄水利及閘開不依幫次爭鬭者聽閘官拿送管閘並巡河官究問因而閣壞船隻損失進貢物件及漂流官糧並傷人者各依律例從重問罪干礙豪勢官員參奏究治而且附搭黃馬快船有禁貢鮮船隻夾帶有禁令甲森嚴歷歷可考即順治十三年十二月內工部題覆巡漕臣侯于唐申嚴閘座等事一疏內開閘座啓閉原關糧運務照舊例首先糧艘次及官商等因亦經奉有依議嚴飭行之㫖奈邇來官差船隻只顧一巳速行之私罔念朝廷京儲之重每到閘口輒聽船役喝令啓板么䯢官夫稍有違拗則捶楚繼之積水既泄閘內糧船不免淺閣即使泄而復蓄亦不免加倍耽延甚或有隨帶貨船須水浮送則上閘應閉而不聽閉下閘當開而不容開年來爭競之端實由於此如是而欲責糧運之速行無滯是何異於却步而求其前也除臣屢示禁飭本年四月內具有據報題參一疏並將搶閘緣由題請議飭外但往來滿漢官船絡繹如織河水非易舊典空存未免由而不察仰懇睿鑒特賜嚴㫖申飭容臣衙門仍照舊例刋刻紅牌通行竪立各閘除緊急兵船暫應讓行外其餘官差船隻一體遵守隨漕啓放如有逼勒官夫開閘搶越泄水誤運者應拿究者照例問發應參奏者據實指參庶人心知警而漕法不廢此所宜講者一也一曰船式重運自過淮後經由黃運兩河抵通交納黃河逆水溜急運河源流細微必須船米輕便一律然後可銜尾速挽是以漕船名曰淺船各省漕糧共計四百萬石各衛所淺船舊額共計一萬二千餘隻查㑹典所開淺船頭稍底棧俱有定式龍口梁闊不過一丈深不過四尺內隆慶四年一款如糧船過淮驗烙之時查有船不如式者該管官員不分軍職有司一體參奏又一欵將江北南京等積年損壞缺船行督糧道照依湖廣江西二省船式就於瓜儀設厰打造約載正耗米可五百石務要底平艙闊入水不深又漕運議單一款漕司及各該巡撫等官備查各總下漕船若干原缺若干補造若干現少若干嚴飭各糧儲道催行該厰補造足額不許仍前雇覓民船及將損壞者補數派搭本幫以致船重難行如不足額照例參奏即治河書內亦有閘河運船載正米不得過四百石入水深不得過六捺六捺者三尺也故船力勝米力水力勝船力若不務足船而徒搭運以省船河力安能運船而漕大困矣歸罪無源之河何益哉等語此皆先年巳試之法有可考據者也邇來惟江南山東河南船式米數不異往制江西湖廣浙江漕船梁頭闊至一丈六七尺深至七八尺不等空船入水巳四五捺且又船數不足往往倍載票糧入水多至十捺以外如式船糧經過黃運兩河不難相連而進而一遇重船在黃河則合幫人夫逐船倒縴始得過溜在運河則守板蓄水集船起剝倍費日時一程間斷積而數程相距必逺在後船隻固被阻壓即前船之在下閘者緣上閘候水封閉過時無水下注亦不得不停橈以待兩河之水勢猶昨而今昔之船米迥殊雖沿河各官凜遵功令百計催䟎亦豈能别有異術使之飛渡哉除臣巳㑹同總漕臣檄行各省糧道備查該省漕船因何打造不如淺式又因何缺船倍載不行補造某衛某所額船若干現缺若干今應作何補造議妥通詳以憑核奪外但比年以來重運回空較之十三年以前為期雖早而該省船隻屢行體式過重阻礙全漕江西一省尤多違例若不從長酌議誠恐將來必致貽誤合無請敕該部查議飭行各省糧道遵照舊例漸次補造以備挽運庶舊制可復而全漕無阻此所宜講者二也河漕事宜雖不止此而此二者實運事遲速之大關鍵也至於言新運者每責成於回空之早然又必自受兊開幫以至過淮一一如期然後抵通上倉無所不早查㑹典開載重運抵通完糧屢經酌議初則九月為期嗣始移於六月即據最後一條大約自淮以北仍有三月水程而其間必先於冬兊冬開二月過淮之限預為嚴切者此可以見由先及後遲早相因之故矣况回空各船茍不至凍沮嵗前自亦不難到次是又在該省之受兊開幫力圖振作無致後時耳時已深秋轉盼新運如果臣言可採伏乞敕部速議具覆施行奉㫖該部議奏部覆奉㫖依議河防疏略聖祖仁皇帝康熙四年大水隄決七月初三日颶風大作湖水漲城市水湧丈餘有水怪色白長丈餘向東去壞漕船客船居民溺死無算髙郵州志是年十一月二十一日總河朱之錫題臣惟運河所憂在淺每嵗春月例應築壩大挑而沙隨水至水落沙留遇有淺滯又復隨時撈濬臣勘督飭催不遺餘力如果有怠玩從事者自不惜以白簡嚴繩其後何敢少為寬假第閘河情形原與現成江河回異其間瑣細曲折一端難竟臣始言其大略即如上自南旺以至臨清四百餘里地勢建瓴止是一脈水源歷二十一閘層次灌輸而後下接衛河惟當霪雨漲溢方可通漕行舟每嵗之間不過數日耳此外則必須閉板浮送下閘閉而上閘啓水微之時亦可使深下閘啓而上閘閉水旺之日亦不免淺故必船米一律啓閉隨漕而後船行無遲速之異又重運北上板宜常閉不宜輕啓回空南下板宜勤啓不宜久閉故必過淮過董如限而後無相值相妨之慮此雖神禹復出亦不能别有智巧出其範圍也今嵗三春迄於孟夏天旱源微臣督司道等官南北疏通設法積水終覺艱澀及五月得雨之後于七月十二日止南漕過濟者共四千四百三十八隻然重運少遲回空自是不能甚早臣方昕夕倣徨不意尾船八百餘隻五月末旬淮黃交漲淮郡之天妃閘水髙溜湧致礙打放總漕臣林起龍就近駐督臣復親馳勘視六月末旬水勢少平多人牽挽倍費時日嗣於八月二十四日過董於九月初五日過濟臣慮南旺以北别無支流運河之水原以六捺為限尾船之後又有江漕二百餘隻船大倍載必致阻壓專委標營副將談捷元尾催仍諭以設法起剝幸即於九月二十三日盡數過臨北上較之歷年自濟過臨之期原無遲滯但是時北來空艘陸續抵臨重運在上閉板蓄水下閘之水已泄上閘之水未來回空停待自是不免若欲泄水浮空又致淺阻重運是欲速而反遲矣惟是時序入冬河氷凝結回空亦不容緩臣于十月初一日兼程至臨幸重船出口既久而炮船兵船適已相繼北去因思河內既無别船回空用水有限臣復申明上諭嚴禁阻擾通行各閘勤啓少閉接濟下流幸而仰賴國家洪福重運過東臨而北今巳卸完回空過東臨而南今盡過濟此可見因重運而積水因倍載而起剝皆運河不得不然之勢而五月內題報過淮各船究獲於萬難拮据之中挽遲為速則河之未嘗淺阻固有不待繁詞而灼然易見者矣臣身親閲歷彼時情形實實如此職掌所關不得不具疏題明仰祈睿鑒奉㫖該部知道河防疏略聖祖仁皇帝康熙五年運河自儀真至淮多有淤淺冬月春初般駁甚艱總河按地親勘儀真界內朴樹灣西方寺五里鋪三處急需挑浚工費浩繁非淺夫所能勝任知縣何崇倫奉文不支官錢不行私派多方勸募人皆樂從浚之深通如故儀真縣志聖祖仁皇帝康熙六年決江都運河之露筋廟隄次年堵塞淮安府志聖祖仁皇帝康熙七年六月飄風驟雨十日不止環城水髙二丈城門堵塞鄉村飄淌死人民數萬城中號哭震地墻宇多傾上聞遣官蠲賑冬遣大臣明珠等相視海口開天妃石䃮白駒等閘毁白駒奸民閉閘碑舊制東下河屬南河統轄為閘水東去必入海口關係漕河宣泄非輕也近各場海口多廢不修其港口或為勢家所占而奸民營種隄外草場為稻田不利開閘過水是以各閘俱廢間有閘口尚存閘板無有唯用土實填待下河水聚髙興田畝盡行淹沒水漫范公隄然後挖閘放水且河身間有淤淺則瀦而不流是以下河窮民昏墊特甚今雖奉㫖開放白駒諸閘而弊未盡除開不徹底時開時塞議於白駒場等處設河㕔一員専司之上河水盛放閘即徹底開放各場閘河始與漕河有濟閘河舊名運河亦名東河亦名下河東抵興化縣由縣直東入白駒劉莊二閘下海南入草堰小海丁溪等閘入海北入石䃮天妃廟灣等閘入海白駒劉王小海草堰丁溪五場俱屬興化石䃮天妃廟灣屬鹽城三十鹽場俱有海口泄運鹽河之水髙郵州志是年決江都運河之崇灣隄淮安府志聖祖仁皇帝康熙八年周橋未閉清水潭決民田仍被淹沒髙郵州志聖祖仁皇帝康熙九年閏二月十九日部覆總督河道羅多疏稱黃運兩河衝決之處勢必用栁應如該督所請委官名色專管裁種若於栽栁之人三年後應授何項雜職應請敕下吏部議覆等語查黃運兩河所裁之栁每嵗果能如該督疏內所定之數成活者其栽栁之人三年後該督造册咨部俟工部查明過臣部授以巡檢録用可也奉㫖依議河南管河道治河檔案蔽運河隄岸最宜栽栁一則取材掃料一則蔭挽運故鼓勵栽栁尤當於運河著力是年決清河縣運河之窯灣文華寺髙郵州運河之茶庵清水潭江都縣運河之東隄四淺淮安府志是年淮水大漲由翟壩入髙郵湖民田淹沒殆盡髙郵州志行水金鑑卷一百三十四
