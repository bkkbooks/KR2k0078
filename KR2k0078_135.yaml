body:
  text: 行水金鑑卷一百三十五江南按察使傅澤洪撰運河水聖祖仁皇帝康熙十年清口為黃水灌入裴家場悉起油沙天妃閘底淤墊本年回空糧船不能進口乃於清河縣南腰鋪地方支河之連張福口者疏浚通舟由周家閘行是年總河都御史王光裕親勘河患情形疏略云循天妃閘而下見黃流倒灌直入運河以天妃一閘不能下板漕河淤墊兩岸潰決查天妃閘內舊有五閘遞互啓閉以防灌淤今僅存二閘其閘俱廢今宜照舊基復建福興一閘啓一閉二再於秋冬大挑運河使深以復河身之舊部覆相應準其復建福興一閘啓一閉二無得阻滯往來商民船隻先是康熙六年通政司經歷王明德上治水法未盡備疏內請復漕規閉天妃閘次年部覆據河漕臣會疏稱天妃閘逼近黃淮難以啓閉又御史徐越屢疏言之至是光裕復疏言之揚州府志髙郵鄉官王永吉修復天妃二閘議揭云竊照漕河閘座沿途建置甚多遇泉源枯涸則下板以待其盈若遇河流泛漲則亦下板或啓板以殺其怒總之權緩急酌盈虛故縴挽無澀滯之虞而舟楫鮮衝激之患未有陟峻奔嚙險惡艱危如淮安府境內天妃頭閘之甚者此閘南至清江浦十里北至清口不足二三里口外正當黃淮交會之衝淮水東注黃水北來擁逼淮泗之水合併南下入口極猛宜其勢重而力大也每當水發之時閘水髙四五尺或六七尺不等飛瀑怒濤驚魂奪魄下水放閘之船疾如飛鳥若墜深淵浮沈難定一入回溜人船兩傷上水打閘之船頭稍倒竪難若登天水石相搏中流斷纜孟賁烏獲力無所施篙師長年都無人色鱗次何干日日屠宰羊豕演戲賽神繹絡奔走呼號拜跪雜沓爭先糜費金錢無算額設閘夫皆係積年地棍熟知水性放閘打閘俱能巧弄機關操人禍福勒取錢財除商民船隻每隻索銀若干方肯包管拽放外即如漕糧白糧亦必預先講定每石索銀八釐一分不等積算通漕糜費金錢亦無算凡此脧削之脂膏總是挂欠之實數良可惜也稍不遂意絞關左右繩纜鬆緊閘棍略顯神通磕撞立時粉碎漕糧白糧每年每幫定損數隻水手搶救剝船撈運盡是閘棍一黨獲利更多而軍民之性命身家遂斷送於此矣似此利害關係非小然與其懲創閘蠧不如節宣水勢永吉停舟數日察閲情形乃知天妃閘之下直至清江浦才有一閘此閘亦久不下板外河水髙內河水低復無閘座關攔收東而蓄聚之建瓴直瀉安得不髙低懸絶奔突而湍急乎查得山東之臨清州濟寧州揚州之瓜洲儀真皆有石閘三座一閘灌滿才放一閘閘板啓閉各有定規所以上水下水船隻平坦安穩不費氣力縱有閘棍不能恐嚇以取財也何獨天妃止有一閘心竊疑之及詢土人僉云先年原有天妃二閘基址在清江造船直隸厰邊旁舊有月河一道此閘即在月河中間後因天時亢暵河水乾枯黃流徑入淮河泥沙淤墊從此月河湮塞而二閘遂廢矣由此觀之前人制度原極精詳今日揣摹偶然暗合伏望台臺委官相度或即以清江閘為三閘而於天妃清江兩閘適中地方添造天妃二閘抑或以清江閘改為天妃二閘而於清江浦上下酌量逺近揀擇相應地方另造清江一閘各置堅厚閘板設立閘官閘夫倣南北臨濟瓜儀成規以時啓閉但使天妃頭閘之水平得一尺二尺則下水放閘與上水打閘十分之中省得四五分危險軍民商賈便無顚覆沈溺之憂不必乞靈於鬼神而閘棍雖姦刁亦無所用其巧矣一閘之費極多不過四五千金仍有舊閘廢石可以起用所費極省而所全最大况係修復閘座與創設閘座不同諒非格礙不可行之事也抑永吉尤有慮焉二閘或三閘下板則天妃閘內之河水固以蓄積而漸平但恐天妃閘外之河水亦以迂緩而漸滿西邊帶月河隄岸單薄恐易潰決所當併議估計或加樁板增闊培髙抑或包砌石工用垂永久約計丈尺為數不多成功甚易此地最為黃淮要害平日亦當綢繆不宜滴水滲漏耳倘蒙采擇會計詳確即賜會題漕運商旅百世永賴之矣王鐡山疏議是年淮水漲十餘日清水潭隄決田盧盡沒民多流亡髙郵州志聖祖仁皇帝康熙十一年總河王光裕修寶應縣子嬰黃浦永安等七閘是年水漕隄決揚州府志是年四月清水潭復決民飢髙郵州志聖祖仁皇帝康熙十二年總河王光裕自至江都芒稻河改造閘門迎金灣河建滚水壩於邵伯南揚州府志是年大水時修築清水潭西隄將竣復決田稼存者無幾髙郵州志聖祖仁皇帝康熙十三年清水潭決口塞寶應縣志聖祖仁皇帝康熙十四年決江都運河之邵伯淮安府志聖祖仁皇帝康熙十五年水浸揚屬漕隄殆不能支隨即崩潰髙郵之清水潭陸漫溝江都之大潭灣等處共決三百餘丈殘缺不可勝數深及四五丈不等自隄以東浩浩乎茫無際涯矣報聞聖心惻然中夜倣徨憂不能釋特遣工部尚書冀如錫戶部侍郎伊桑阿等親行相視訪究利病刻期奏報罷河臣王光裕知安徽巡撫靳輔才移為總河都御史揚州府志是年夏五月水發清水潭西隄再決及城南東隄上下河俱淹髙郵州志是年清水潭復決先是十四年有秋布政使慕天顔題準災田成熟者三年後方起科納糧時官兹土者以蠲租不便於已也謂田既涸出應改為本年起科巡撫馬從其議委淮揚道副使黃桂踏勘是為十五年五月也桂至興化鹽城方肆苛求會大霪雨清水潭復決髙郵江都東隄凡決數十處汪洋六百餘里不獨涸田盡沒於水水且及民屋簷民繫舟屋角穿瓦為穴出入其中耕牛無托足之地被災之慘是年為最寶應縣志民是年若不遭清水潭之復決馬黃二人將纍無已苛政不猛於水哉馬名祜滿洲人黃桂正黃旗人是年五月髙郵漕隄決興化水驟長以丈計舟行市中漂溺廬舍人畜無算興化縣志是年決山陽運河之山東厰淨土菴其髙郵之清水潭塞而復決又決髙郵城南小口三十餘處并江都之大潭灣四淺竹林寺邵伯等處淮安府志聖祖仁皇帝康熙十六年總河都御史靳輔疏稱運河自黃流內灌之後日墊日髙今年八月內河底竟致乾涸隨閉隄挑浚因回空不能久待止量挑一二尺不等擬於明年立春後十日土凍方解時即行閉壩大挑總限百日完工其明年春運過淮之期必俟略為展限臣擬四月初旬內完工開壩放船五月終可以盡數過淮嚴加催趕務於七月初旬盡催過臨不誤十七年回空以濟十八年之春運也揚州府志聖祖仁皇帝康熙十七年築江都漕隄以髙郵清水潭決口深不可築更於湖中繞回開河一道改築東西隄與舊隄相屬河成名曰永安河揚州府志是年又三月題為恭報先挑運河工程告竣等事奉旨覽卿奏挑浚山清等處運河完工開壩淮水已歸故道具見實心料理可嘉再大挑山清髙寶江五州縣運河增築兩岸其決口三十二處並塞之十月疏報更改南運口十一月題為酌改運口等事部覆奉旨河道關係重大特簡靳輔專任一切修築事宜今該督以節省錢糧另開運口具題爾部不即準行議令伊桑阿等會議故為耽延殊屬不合這本內事情俱著照該督所奏行靳丈襄公治河書聖祖仁皇帝康熙十八年四月恭報清水潭決口工竣日期奉旨覽卿奏修築清水潭東西隄決口閉合龍門節省錢糧甚多具見殫心料理深為可嘉知道了該部知道六月改置南運口於三汊河大江以南各省漕運自瓜儀而北凡四百五十餘里至清江浦天妃閘以入黃河此明臣平江伯陳瑄之所開也萬厯間河臣潘季馴以天妃閘直黃河故不免內灌因移運口於新莊閘以納清而避黃後亦以天妃名之非其故矣然其口距黃淮交會處不過二百丈黃水仍復內灌運河墊髙年年挑浚無巳兼以兩河滙合瀠洄激蕩重運出口牽挽者每艘常七八百或至千人鳴金合噪窮日之力出口不過二三十艘而濁流奔赴直至髙寶城下河水俱黃居民至澄汲以飲於是建閘置壩申啓閉之條嚴旨刻石除重運回空及貢鮮船隻放行外即閉壩攔黃凡官民商艇俱令盤壩往來夫閉壩之制不獨不便於民且空重往來之時仍不能禁黃流之不入乃不得巳之圖非不易之䇿也蓋因當時太山墩一帶及七里墩外皆渺然巨浸舍新莊閘之外别無彼善於此之地地形水勢實限之以不得不然耳自黃河倒灌以來西北自白洋河于家岡一帶直接泗州東北自吳城張福口一帶直至武家墩卑窪者悉變為髙原清口以內裴家場帥家莊爛泥淺周圍數十里凡墊成平陸之處臣挑引河四道淮水仍出清口是則黃流之灌在當時誠大為運河之害而在今則頗受其利矣何也清口兩岸墊髙天然成隄黃淮不得交漫一利也太山墩上下洪濤盡涸而運河之地形愈加完固建閘置壩可以惟我之所擇二利也清口之內橫亘灘洲淮盛則泗水滔滔北注淮弱則湖水常有所蓄以濟運而不至於盡泄即黃漲內乘亦限於灘洲而不得縱不久而淮水盛長即便抵回三利也因而譬之清口全淮之口也洪澤湖其腹也所挑裴家場帥家莊爛泥淺諸河則其咽喉而新莊閘河岸則其唇吻也夫以黃河之悍烈而運口出於唇吻之間宜其淺露而無庇徑直而受灌濟運之清淮反為濁黃之所抵而不得入也於是酌議拜疏移運口於爛泥淺之上自新莊閘之西南挑河一道至太平壩又自文華寺永濟河頭起挑河一道引而南經七里閘復轉而西南亦接之太平壩俱達爛泥淺之引河內則兩渠並行互為月河以舒急溜而備不虞外則河渠離黃水交淮之處不下四五里又有裴家場帥家莊二水乘髙迅注以為之外捍而爛泥淺一河分其十之二以佐運仍挾其十之八以射黃運艘之出清口譬若從咽喉而直吐即伏秋暴漲黃水不特不能內灌運河并難抵運口間遇東北風大作纍日不止濁流乘之而風回溜駛不旬日而停沙一刷無遺矣是以邇年以來重運過淮揚帆直上如歷坦途運河永無淤墊之虞淮民嵗省挑浚之苦矣雖然旱潦不常湖水設有時而淺涸諸引河勢不能暢注而俱出則寧使裴家場之水斷流而爛泥淺一道務須挑浚深寬毋或緩此而顧彼此則意外之虞不得不預為之籌者也是年增挑南運河起土加築兩岸隄靳文襄公治河書是年開滚水壩於江都之鰍魚觜揚州府志是年塞清水潭大決口山陽運河戚家橋隄工衝決五十餘丈本年隨塞淮安府志聖祖仁皇帝康熙十九年水再置滚水壩於髙郵城南八里又置於寶應子嬰溝揚州府志是年淮水大漲七月朔南水關潰水入城闤闠往來皆以舟楫壞民屋廬無算髙郵州志是年大水漕隄決興化縣志是年創建山陽運河之鳯陽厰減水壩一座創挑皂河四十里以通北運淮安府志是年創建碭山毛城鋪大谷山宿遷攔馬河歸仁隄邳州運河東岸馬莊集減水壩十一座開皂河上接泇河通運又開張家莊通運口明萬歷三十一年總河李化龍開泇河行運自夏鎮達於直河口不由徐吕二洪避黃河之險者三百里漕運利之後直河口塞改行董口及董口復淤遂取道於駱馬湖由汪洋湖面西北行四十里始得溝河又二十餘里至窯灣口而接泇第駱馬湖本窯田也因明季黃河漫溢停積而成湖夏秋水發不礙行舟至冬春水涸其淺處不流束楚且水面遼闊縴纜無所施每重運入口即役兵夫數萬於湖中撈浚浮送北上而所撈之渠不旋踵而汩沒於風浪之中年年畚鍤宿邑騷然苦之况黃河復故雨潦各有所歸湖水必致日涸且撈浚無所施實漕運咽喉之大虞矣查宿邑西北四十里皂河集其地溝渠斷續有舊淤河形一道若挑新濬舊因而通之可以上接泇河之委而下達於黃但啓土於沮泇之地為力甚艱又南患黃河之逼北慮山左羣山之水不有隄防不可以行運乃揆測規畫即取水中之土以築水中之隄南起皂河口北達溫家溝水深之處挑水旱工共二千四百丈兩岸築隄四千八百丈凡邳宿兩州縣舊河內一切漫流旁泄決口三十餘處盡行築塞又起自溫溝歷窯灣至邳境貓兒窩計四十里從無隄岸每山泉暴漲即一望滔天復兩岸築隄二萬七千丈然貓兒窩一帶為徐兖諸水之所注納水太盛則隄必傷故建減水大壩三座以泄之至如貓兒窩以上地亢土堅則空之而弗隄又貓兒窩以西至唐宋山三千餘丈乃霪霖暴漲之所從出入者則隄之蓋自皂河而上者無不治矣惟是下口直截黃河遇伏秋暴漲不無內灌之虞於是復加斟酌相得皂河迤東二十餘里張家莊其地形卑於皂河口者二尺餘而黃河上下水勢大抵每里髙低一寸自皂河至張家莊二十餘里黃水更低二尺餘內外水面髙低相準乃復挑支河一道自皂河歷龍岡岔路口達之張莊出口蓋前此皂河出口如丁字形黃水自西而東皂河水自北而南兩溜相抵而不相比且黃強清弱故易灌今張莊之出口如人字形黃水與張莊口之水俱自西而東與溜相比而不相抵况又以皂河地髙之水下注於二十餘里地卑之出口其迅流更足以抵黃也由是上則東省河流滔滔奔注常束本等之水於漕中而泄暴漲之水于壩外下則運口常通永無淤塞之慮矣張莊運口為皂河尾閭東通駱馬湖甚近若不堵塞則皂河之水與湖水必半從此入黃中河之水必弱春初重運難行閉之則夏秋水發又恐內漲傷隄應將張莊口閉塞於其東建分水閘二座以減之尤恐異常霪潦如康熙十九年二十四年之水洶湧漫溢今河臣王新命倣東省坎河口壩之制堆積亂石為壩誠為深慮然尚虞宣泄不及當再建一平水大壩䇿方萬全但湖口一帶沙土鬆浮須於宿遷治西馬陵山址土堅處為之更自張莊順見行之河開復河一道經駱馬湖東至馬陵山接巾河以行運而置見行之河以為月河泄水之地則往來船隻行不經壩可無掣舟之患兼以逺黃而備不虞此亦善後之計勿以為過慮而忽之也皂河運道自窯灣至吳家溝十餘里東西隄相去二三百丈地極卑下水一出岸即浩瀚滔天每東北風起西隄衝塌殆盡而西隄內外皆湖河沮洳無從取土修築甚難又河形灣曲一里數折縴挽者苦之蓋當時因大工屢興請帑已數百萬又正值軍興旁午故力圖節省但循河形而挑築故也今應于冬春之候窯灣口以上放水東入駱馬湖使涸出河底凡河道灣曲處皆挑直之即以所挑之土填築岸隄移西隄引近東隄俾兩岸相去不過五六十丈則河形漸束隄工無風浪之虞且重運飛挽亦易前矣靳文襄公治河書壩河防雜説云皂河一工建減水二座堵大小決口數十餘處內窯灣一口乃近年通運之處也此工成於十九年之冬至二十年七月內黃流大漲頃刻淤墊一千餘丈不能通舟彼時紛紛議論俱欲拆去窯灣掃臺仍由駱馬湖靳公力辨其非親督官辨兵丁人夫將淤墊處酌量挑挖丈餘黃水稍落清流隨出仍舊刷成大河矣蓋測探水勢知黃河由皂河口至駱馬湖口計程不過四十餘里而皂河黃水較之駱馬湖口黃水實髙三尺其皂河運口有淤墊之患者良由清水之長以漸而增而黃河則每每陡長數尺方黃水陡長之時而清水不長則黃流自是倒灌一經倒灌則淤墊立見也隨將皂河口攔黃壩暫行閉斷另於皂河迤東歷龍岡岔路口至張家莊止挑新河三千餘丈使出皂河石磡之清水由此新河內行至張家莊歸入黃河是為張莊運口二十二年九月內黃水忽從龍岡漫入新河又復淤阻隨於石磡添築攔黃壩一道弗使黃水內灌一面設法疏通不過旬餘而新河水仍暢行矣然新河之南應築隨河大隄三千餘丈以攔黃漲此工若成新河可恃以不淤而運道永無阻滯矣康熙七年以前糧艘抵宿遷率從董口北達自董口淤塞之後遂取道於駱馬一湖特是湖底淺澀土性埿爛篙師率謝技殫力且水面遼廣縴纜復無所施於是銜尾者膠濘不得前每逐艘挑挖舁送宿邑騷然猶栗栗以滯運懼靳公毅然救其弊因創開皂河四十餘里以達之然其地沮洳取土既匪易又北受山左諸山之水慮不支且南接黃流亦有內灌之慮公又為之揆測規畫取水中之土即築水中之隄而束水有藉備減水之區以防山水之至而泄漲有賴然皂河之口直接黃水則遇黃漲時必有內灌沙澱之虞公又細測地形灼見自皂河迤東至張莊路僅二十里許乃皂河之北髙三尺張莊之北卑三尺即黃河迤東髙卑之數亦同於是將皂河通黃之口竟行堵塞而於皂河迤東復開新河一道直達張莊以皂河地髙之清水下注於地卑之張莊出口夫然後清水常強足以敵黃俾黃水永無倒灌之虞五年以來飛挽迅利而地方寧息軍民實慶永賴云淮安府志聖祖仁皇帝康熙二十年增置髙郵南北滚水壩前後增置凡八座壩口二三十丈不等對壩皆開越河以防舟行之險凡舊隄險要處皆更以石揚州府志是年創建寶應子嬰溝髙郵永平港南關八里鋪柏家墩江都鰍魚口減水壩共六座改建髙郵五里鋪車邏港減水壩二座靳文襄公治河書聖祖仁皇帝康熙二十一年十一月十三日總河靳輔至京陛見上問巳見黃河輔回奏河工最是艱難但人事既盡亦無不可成之功即如清水潭從前屢塞屢決臣為避深就淺之計越湖築隄駱馬湖淺澀不通臣相度地形水勢改挑皂河别開運道彼時大小屬官皆以為創行新建相顧畏懼臣一力擔任示以必可成之理即有後纍不以相及究竟清水潭築成皂河開通此皆人力既盡無不可成之明驗也餘語俱見黃河書靳文襄公治河聖祖仁皇帝康熙二十二年大修兩河各隄工告竣奉旨將地勢稍卑之處再行增髙并逺年舊隄悉為加築完固前此經理案內之邳宿二州縣北運河兩岸隄工山清髙寶江五州縣南運河兩岸隄工以及黃河兩岸髙堰一帶濵湖隄工俱經築竣靳公陛見後復俞善後之請發帑增築前工之稍卑者更加築逺年舊隄建邵伯南減水壩以為萬全之計云淮安府志是年兩河會歸故道靳文襄公治河書聖祖仁皇帝康熙二十三年重挑金灣人字河揚州府志是年建惠濟閘在馬頭東南七里溝舊名通濟閘明嘉靖年建引淮水以達漕運後以河水南侵閘底淤墊至是新鑿漕河於迤南三里更建閘座為新運口閘名惠濟今現行漕清河縣志是年九月二十七日總河靳輔題山清髙寶一帶運河先因淮水微弱黃流倒灌臣將歸仁隄官路河穵開放水歸河助淮嗣此淮流亦漲運河仍係清水髙堰湖水九月方長較去年更髙尺餘亦賴減水壩宣泄不致漫隄奉旨該部知道河防志是年冬聖祖仁皇帝南巡駐蹕紅花埠侍衛趙昌傳諭總河靳輔進問髙寶興泰一帶下河為何積水不去臣輔回奏髙寶興泰是窪下之區如同釡底向來河道淤塞是以下雨積水并減壩泄下之水一時難去又問開挑下河工程要費多少錢糧臣輔回奏當日因科臣許承宣條陳臣照議曽估計過約用錢糧一百多萬但臣一時不敢輕議况費錢糧甚多或用民夫開挑方可節省國帑上又問若用民夫挑浚幾時可以完工臣輔奏必得十餘年方可告成上云太遲若到十年知道將來河道如何不若仍動錢糧速速興工為是如今科道見有條陳帶在此間要問爾臣輔奏下河工程臣還細細看明方敢具題十一月初六日吏部尚書伊桑阿等奉上面諭朕車駕南巡省民疾苦路經髙郵寶應等處見民廬舍田疇被水淹沒朕心深為軫念訪問其故具悉梗槩髙寶等處湖水下流原有海口以年久沙淤遂致壅塞今將入海故道浚治疏流可免水患自是往還每念及此不忍於懷此一方生靈必圖拯濟安全咸使得所始稱朕意爾同工部尚書薩穆哈往被水災州縣逐一詳勘期於旬日內覆奏務期濟民除患總有經費在所不惜爾等體朕至意速行初九日上回鑾至淮安問云河道情形我俱詳細曉得只是下河之水因無去路民田尚然淹著該得開浚這工程爾可兼任得麼臣輔奏臣加修工程未完况嵗修險工甚多臣不能兼顧又問另委人做使得否臣輔奏極好駕至天妃閘問云天妃閘這樣險何不再造一閘分殺水勢臣輔奏已建有七里閘一座駕至七里閘口上云這閘造得有理連聲稱好上見運口新閘問云這閘是為何而造臣輔奏臣恐黃水大漲天妃閘不能承當所以又造這清水閘束水專為天妃閘而設的又問建了此閘天妃閘雖好了此閘水勢難行何不也造兩座臣輔奏再造一座果然極好只是多費錢糧又問添這一閘要費多少銀子臣輔奏要費二萬多銀子上云於往來船隻有益就費二萬兩也罷了又奉上諭云今年黃水倒灌運河不可為訓爾須酌一治安之䇿令永不倒灌靳文襄公治河書許承宣議復五塘舊制上命督撫河漕鹽諸臣會勘時司馬原具有挑浚海口之議祗以帑費不資故未及舉行至是上面諭吏部尚書伊桑阿等於是帶領淮安府知府髙成美前往泰州興化鹽城等處一一勘明十一月十八日回奏二十八日奉旨九卿詹事科道會同確議具奏淮安府志十二月初六日九卿詹事科道會議得吏部尚書伊桑阿等疏稱臣等祗遵上諭將興化鹽城等州縣海口詳勘得山陽寶應髙郵江都泰州興化鹽城等州縣之水原從車路河白途河等處流入運鹽串場河出白駒場丁溪場草堰場劉莊場等十餘口由苦水洋鬬龍港信陽港廟灣入海今因年久車路等河串場河及各場出口俱被沙土淤淺比髙郵興化等處河身反髙以故水雖仍流而蓄水不能出口今將減水壩一帶運河水口決濬𨗳流將會流串場河之車路等河及串場河白駒丁溪草堰場等口俱挑濬深闊引髙郵等州縣滀水入海庶永免水患生民得以樂業矣等因具題前來查得髙郵寶應等處因水漲漫將民廬舍田疇淹沒是以皇上軫念將錢糧盡行蠲免復屢次賑濟窮民今皇上巡幸見民廬舍田疇被水淹沒深為軫恤特旨差大臣將被水患州縣並入海舊河逐一確勘不惜經費務期挑浚下流令被災億萬窮民盡復産業涸田得以耕種使其得以永安雖堯舜如天之仁不是過也相應將河挑浚以濟生民又查總河靳輔管河各官治河年久熟識地方形勢水性應令總河靳輔親往車路等河并串場河白駒丁溪草堰場等口逐一確勘作何挑浚深闊使髙郵等州縣減水壩一帶運河水口引流入海其所用錢糧細數造册具題到日工部確議具覆至興工之日若見任官員不足該督題請可也奉旨靳輔見在督理黃河隄岸又令兼理海口必致兩誤且黃河海口係在兩處應另差官督理著再確議具奏部議將安徽按察使于成龍差出專責料理髙寶等處下河事務具題奉旨依議河防志行水金鑑卷一百三十五
