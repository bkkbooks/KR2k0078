body:
  text: 行水金鑑卷一百三十六江南按察使傅澤洪撰運河水聖祖仁皇帝康熙二十四年九月十八日總河靳輔題奏髙寶興泰山鹽等七州縣下河田畝被積水沈淹者自明代巳然其患非一日矣我皇上親幸斯土目擊黎民昏墊之苦特沛恩綸大加修治既遣臬臣于成龍専管督理又以臣任河年久應知挑浚機宜并命臣綜理其事敢不捐頂糜踵黽勉奮發力圖報效惟是治之一法宜握要領審全局而曲圖節省也蓋七州縣下河海口髙昂而地低於海潮不下五尺從前海潮內灌不可以耕曾經宋臣范仲淹築隄以障之隄成而民享其利名其隄曰范公隄頌之感之至今不衰今若循先挑海口之議則是引潮內浸與范隄障水之意相悖不特積水必不能泄而糜帑殃民將無底止矣治之之法全在束水注海夫內地既卑於海潮五尺則應於內地築隄髙一丈六尺以髙一丈六尺之隄自足以束髙一丈之水內水既束髙一丈則髙過海潮五尺其趨海之勢必速而無流滯之虞矣隄既髙一丈六尺則隄頂髙過水面六尺其束水之力必堅而無旁潰之患矣臣所謂宜握要領者此也築隄束水固為握要之計然運河之新舊減水閘壩何止數十處即下河七州縣之河渠溝港所以承運河各閘壩之水者何止數十道若不盡行築隄以束各處減下之水則水仍散亂無收漫淹田畝若欲一槩興築則其費數倍何止須帑千餘萬金臣再四籌維查減水壩之最大而多者莫過髙郵城南今應將髙郵城北并車邏以南邵伯鎮以北之零星閘壩俱行閉塞拆取石料移於髙郵城南邵伯鎮南二處改建深底大石閘二座俾洪澤湖減下之水并天長盱眙各山澗之水由髙郵城南之南關大壩五里八里柏家墩車邏等壩并新議建之大石閘內泄去十分之八邵伯鎮南巳建之減水壩并新議建之大石閘內泄去十分之二邵伯鎮南所泄之水半由芒稻河并通州入江半由串場河入海髙郵城南所泄之水應自車邏鎮起築大橫隄一道直抵髙郵再自髙郵城東起築大隄二道厯興化縣白駒場至海東各閘壩泄下之水彚歸一處直達大洋且必量入為出寧使出水之地寬大於進水之地使所進之水安流下注而無擁刷隄工漫潰決裂之虞故內地窪區築隄髙一丈六尺之河止寬一百五十丈海灘髙地築隄髙一丈之河必寬一百八十丈也臣所謂宜審全局者此也至於各工隄堰艱於取土者舊例每方給銀三錢尚有攤鍬夯硪之夫在外然三錢一方之土近者不過數里之外遠者不過一二十里之外今此畨隄工興築於萬頃汪洋一望無際之中近者數十里見土逺者百餘里見土艱難既數倍於尋常則其不資之費從何措處查難築之各工共長六萬三千丈牽需土六百零四萬八千方毋論取土之艱數倍常時即以加價一倍計之而此六萬三千丈工程即需帑三百六十餘萬兩矣且夫船兩難曠日持久不知竣工於何日臣百計籌畫作就近取土之䇿其法先定隄基隨用船裝逺土於水內築城圍埂其埂出水二尺中間寬三十丈長五十丈圍埂既成一面用草料防護一面將隄內之水車乾然後於離地基十五丈之外穵土挑至隄基之上密加夯硪築成大隄其隄應築成頂寬二丈底寬十丈高一丈六尺每隄一丈用土九十六方連船裝築埂之土并車水防埂一切大工器具物料以及隂雨食米等項每方止需銀二錢六分六萬三千丈共止需銀一百五十七萬二千四百八十兩較之尋常估費者約省過半臣所謂曲圖節省者此也司臣于成龍於奉旨任事之後閲厯月餘其訪採輿論審量經營之處頗饒苦心臣與該司面為商酌作聚水之形區畫開濬儧築諸法除各工六萬三千丈需銀一百五十七萬二千四百八十兩外其餘一切挑築工程大約與舊例相同止於築隄者每方連隂雨食米等項給銀一錢六分連挑帶築者以築成隄土為準每方連隂雨食米等項給銀一錢八分內一自白駒場至海口應挑大河二道共約長二萬四千丈即以挑河之土築成頂寬二丈底寬七丈髙一丈之大隄二道每隄一丈用土四十五方連挑帶築每方給銀一錢八分二萬四千丈共需銀一十九萬四千四百兩又自白駒場北至廟灣南厯海安泰州至芒稻河約共應築隄十五萬丈其隄大小不等用土多寡不等土方價值一錢六分一錢八分不等共需銀七十六萬八千兩髙郵州邵伯鎮南各建大石閘一座白駒場南北兩岸亦各建大石閘一座共建石閘四座除拆取廢閘石塊外其添買石塊轉運舊石以及樁朩灰米錠鋦夫匠工食等項并閘旁添建朩涵洞二百箇分引河流稍殺閘門內建瓴之勢共需銀六萬兩又前工盡完之後上流湖河之水悉由新築水工大河內入海涓滴不能旁泄若遇大旱之年難免禾苖枯稿今創建朩涵洞二百箇隨時啓閉以資灌溉為永逺裕國利民之計每箇需銀一百兩共需銀二萬兩又水工大隄六萬三千丈地勢最卑而河寬水急風浪時侵若不預為保護之計則一時風起便有倉皇無備束手莫措之虞此隄一有損失則全功盡棄為害非輕今估將此六萬三千丈工程盡捲四五尺髙順掃再加丁頭草橫疊鑲護每隄一丈估用草蘆樁栁夫匠工食等項共計銀二兩四錢三分六萬三千丈共需銀一十五萬三千零九十兩又白駒場至海口共隄二萬四千丈雖地勢稍髙而河寬水急亦應用草防護每丈需草價銀六錢共需銀一萬四千四百兩以上修治髙寶等七州縣下河工程共需銀二百七十八萬二千三百七十兩伏乞皇上敕下部議將所需前項銀兩先賜撥發一半以便乘時儧工餘容臣陸續請撥限三年告竣庶事無諉卸可免曠日持久之虞矣臣擬將此項銀兩俱作工所暫時借支請於工完三年之後分為五七年解還户部其解還之法又當分為二項內如築水工大隄海口大隄并護隄掃料以及建髙郵城南石閘一座引水灌田朩涵洞二百箇乃専為七州縣田畝而舉者也若北自廟灣起南至芒稻河止兩岸隄工并邵伯鎮南白駒場兩岸石閘共三座乃係創興各場鹽運之大利者也何也蓋水工海口隄河工竣之後各減水閘壩之水既盡歸新河入海則七州縣水淹原額地畝必皆盡行涸出地既涸出則串場河亦涸而淮南綱鹽一百三四十萬引無從挽運故必須并築串場河兩岸之隄再并建邵伯鎮南白駒場新河兩岸之石閘三座也臣查見在淮商運鹽之艱有三一則串場河底髙低不一天氣稍旱則河底稍髙之處即便淤塞多挽拽之費二則串場河不通運河凡引鹽出場必另用小船由漫灘積水湖內盤壩而過方到運河船上是又多盤腳雇船之費三則鹽船必經芒稻河每遇水漲之候大溜掣船異常危險非用數百人增添繩纜設法挽拽不能過溜是又多雇夫之費以上三費每鹽一引必須增費一二錢不等若此築隄束水之工一成則運河大船可以竟至串場河受載自串場河開行或過髙郵閘或過邵伯閘寬河大港一水直達揚州既無淺澀之艱又無盤壩之阻更免溜掣之險省費既多而鹽船又得安流計日可到故曰創興運鹽之大利也臣竊擬補帑之法凡因有利田畝而興築者則所費之帑應於田畝項下陸續補還其因有利運鹽而興築者則所費之帑應於鹽引項下陸續補還查應於田畝項下陸續償還者臣遍厯下河七州縣地方西至運河東至大海南至江泰舊河北至黃河遙隄按其廣袤之逺近察其積水之淺深約略料之將來工完之後除去河湖城郭村鎮墳塋鹽場柴蕩外可得田十四五萬頃此七州縣全書所載額田不過十一萬頃是額外餘田不下三四萬頃矣即以泰州而論地方平衍廣濶按法而稽應有田四五萬頃今全書額田僅九千二百餘頃蓋所種實田止有此數餘皆沮洳沈沒之區一州如此他可類推故曰工完之後則額田而外可得餘田三四萬頃也今擬將涸出之地逐一清丈先將原額數內之田盡行給主其原額之外者曰額餘官田當廣招窮民墾種給為永業地畝肥瘠不等肥者止取佃價銀一兩二錢瘠者止取佃價銀六錢每畝止牽取佃價銀九錢額餘官田最少亦有三萬頃可得佃價銀二百七十萬兩內以一百九十六萬餘兩解交户部抵還借支之項其餘七十餘萬兩應將髙家堰臨湖隄工并山寶髙江四州縣運河隄工再加髙厚更將山清盱寶髙江六州縣境內凡有關於髙寶下河之零星應挑應築工程逐一料理以期永保無虞為久奠下河之計真國計民生萬世之利也其應於引鹽項下陸續償還者查淮南綱鹽每嵗一百三四十萬引河隄告成之後每引每年既可省盤剝之費一二錢不等今止令其於所省之內每引每年納河隄銀九分以七年為率七年數足之後免其再納計每年可得銀十二萬兩不過七年而此八十一萬餘金之帑又可補還無欠此在鹽商量捐省費之資而坐享久逺之利者也靳文襄公治河書聖祖仁皇帝康熙二十六年正月十七日工部等衙門會覆監修下河侍郎孫在豐等所奏之疏等因該臣等會議得皇上親見髙寶等七州縣生民遭罹水患軫念疾苦特遣大臣責任修理下河事宜欲使被水災黎亟離昏墊以此冬季停工之際奉有宣總河靳輔詢問之旨欽遵將靳輔宣來詢問據稱髙郵以南大減水壩二座自正月起至五月盡止可以閉塞小減水壩三座自正月起至三月盡止可以閉塞其髙家堰等處各壩髙郵州以南五壩萬難閉塞車邏以南邵伯鎮以北所有閘壩俱於去年閉塞髙郵以北閘壩亦可以閉塞者今挑浚下河最為緊要應將髙郵以北閘壩閉塞等語且監修下河侍郎孫在豐等疏稱先將近海口之石䃮白駒丁溪等處估計興修靳輔先前請修疏內稱髙郵以北閘壩并車邏以南邵伯鎮以北零星閘壩俱欲堵塞等語今將車邏以南邵伯鎮以北所有閘壩於去嵗堵塞髙郵以北閘壩亦有可以閉塞等語如此則於孫在豐等會議之時將此處應行議出乃不行議出不合將靳輔交與該部議處可也謹題奉旨修理下河成功不在髙郵州所有閘壩而在乎堵塞髙家堰之壩并黃河南岸毛成鋪等處所有減水閘壩皆堵塞則黃河之水不流入洪澤湖如洪澤湖既無黃河流入之水唯止有淮水將髙家堰之壩暫行堵塞一年後挑濬下河方得有益二十三日工部等衙門會題該臣等會議得先經臣等詢問總河靳輔閉塞閘壩挑濬下河之處議奏奉旨云云仰見聖心溯流窮源之至論謂下流之水由於上河而開浚之功務詳閉啓面詢廷議諄諭河臣若能暫閉上流庶可施工下水誠見聖謨洋溢睿鑒髙深豈唯七州縣生靈亟除昏墊將見億萬年偉績立奏平成敕下詢問靳輔據稱髙郵州閘壩關係髙家偃隄壩此處仰見皇上睿鑒甚明髙郵州五壩之內三小壩自正月堵塞至四月初一日啓二大壩自正月堵塞至六月初一日啓將髙家堰所有古溝唐埂二座減水壩亦自正月堵塞至四月初一日啓并四座減水壩自正月堵塞至六月初一日啓黃河南岸減水壩一座閘八座俱暫堵塞一年等語應將髙郵州南減水壩五座并髙家堰減水壩六座俱令照所定之限堵塞黃河南岸減水壩一座閘八座應令暫堵一年侍郎孫在豐等先稱將海口所有石䃮白駒丁溪等處估計興修次第題報等語應請敕下孫在豐等作速興修可也奉旨下河工程今年著止將髙郵州大小壩及髙家堰閘壩照靳輔等所奏定限堵塞令孫在豐等挑濬海口其黃河南岸閘壩著于來年堵塞一年并髙郵髙堰等閘壩俱仍照見議限期堵塞令其預先備齊工料人夫自今年十二月興工挑濬下河勿致違誤河防志是年七月十五日靳治豫奉旨來至淮安清江浦寓署口傳上諭髙寶一帶下河朕自閲工時目擊水勢情形之後無刻不念此昏墊災黎爾父主築隄之議固是但凡事須順人情且恐水中築隄工程不易如得除水患三四分使民受三四分之益朕心亦可稍慰今作何説法修治有何意見爾可問明爾父來奏靳文襄公治河書聖祖仁皇帝康熙二十七年四月十八日以河工事召滿洲大臣學士等滿漢九卿詹事科道等及往看中河官員令入行宫諭曰前于成龍奏云靳輔開中河無所禆益甚為纍民河道巳為靳輔大壞令凱音布往看中河云現有商賈船行不絶若塞支河之口則駱馬湖支河之木滙流中河水勢現大漕艘可通于成龍又奏王新命曾向伊云靳輔從上河放水今若以此問王新命王新命其肯任受乎前召九卿至乾清門會議皆畏懼于成龍無一人敢與辨難悉順于成龍之説以河務盡為靳輔所壞矣惟朕獨與衆人異謂靳輔不為不盡心于河務若云靳輔治河不善全無禆益即靳輔亦不心服朕未親至下河不甚深知若上河則自宿遷至清河之兩岸河底及髙家堰以至廟灣并運河諸處朕皆洞悉數年來河道未嘗衝決漕艘亦未至有誤若謂靳輔治河全無禆益朕亦不愜於心矣于成龍在直𨽻愛民緝盜居官頗優故賜以朕所親御黃鞍馬匹復賜銀一千兩但懷挾私仇阻撓河務殊為不合朕非欲起用靳輔祗以河工所關甚大耳今九卿巳將靳輔議罪皆言其治河無益若王新命聞之亦必順從于成龍之説以靳輔所治不善因將原修之處盡行更改是伊等各懷私忿遂致貽誤河工可乎且使黃河自宿遷以下衝決猶可修治若宿遷而上或致泛溢則為害甚大所關非小元時曾因挑河致生變亂今據凱音布等奏稱中河漕船慕天顔勒令退回支河之水不許閉塞慕天顔如此阻撓深為可惡著即提拿夾詢問誰唆使自然真情畢露此等之人不嚴加懲治不可也今應遣明悉大臣看閲將作何修治之處詳確定議前者令馬竒前往俄羅斯但尚有同遣大臣馬竒著停其遣往此看閲河道著圖納馬竒張玉書前去其漢軍漢人官員尚應添遣爾等開列具奏伊等前往須將毛城鋪髙家堰等地方遍閲就靳輔所築之處甚善而斷不可改者有幾不善而應更治者有幾著詳悉商酌定議以聞朕素不食言亦不為異日無驗之語向嶽州洞庭湖進勦戰船衆議謂宜撤回朕議船隻不可退返嶽州之役萬一疏虞則各處皆危朕確然堅定卒致成功靳輔以丈出民間餘田作為屯田及阻抑開浚下河其罪誠不可逭至有言黃河底漸髙此斷不可信譬之盆內貯水遇風且溢出使黃河底果髙一有風濤其有不漫漲橫流決隄潰岸者乎爾等明晨速往同九卿會議具奏河防志是年夏大雨水中河水漲隄四決淹治內糧田數千頃漂沒人畜不可勝計清河縣志十二月十三日總河王新命題奏河道關係運道民生水勢從來變遷不一以致上厪聖慮躬親閲視宵旰經營多方指授黃河始歸故道日見安瀾順流復令將挑中河以避黃河之險溜以利運艘之飛挽實為萬世永賴之平成臣以庸愚謬蒙殊恩備員河道往來確勘唯期仰副聖明於萬一查工部等衙門會覆張玉書等欽奉上諭一案於閘壩之應留應塞工程之應舉應停河口之應挑應濬詳悉確當誠如所議臣巳檄行河道各官逐一遵行外至攔馬湖泄黃水之壩應否閉塞奉有著臣詳看議奏之旨臣欽查攔馬湖泄黃水三壩原以宣泄黃河異漲之水今若永行閉塞恐黃水異漲宣泄無路不無衝漫之慮似應仍留如遇黃水異漲隨機開放以保隄工如水勢平緩則行暫閉以免中河淤澱與黃河縷隄內外汕刷之虞再駱馬湖減水壩三座議留二座於隄內減水入中河留一座在遙隄之外又以中河逼近黃河而運河駱馬湖水俱入此河河窄不能容納令於中河往東蕭家渡楊家莊新莊口有黃河衝決入海舊河形之處量建減水壩三座減泄臣愚以為既以運河駱馬湖俱入中河河窄不能容納是此駱馬湖二座減水壩之水為無用何必又留此二壩之水減入中河復於蕭家渡等處建壩減出多此一番周折况查舊案建一減壩所需不下一二萬金不等似不若將此三座減壩俱留遙隄之外令由舊河形入海於蕭家渡舊河形三處量留缺口二處用竹絡裝入石塊酌水勢之髙下堵塞宣泄以免衝漫以省錢糧之為妥也又以支河口議令閉塞於鄰近建板閘一座隨時啓閉但查支河口乃北運河會同微山湖荆山口彭河沂河泇河白馬等河並鎮口閘之水流入黃河之口一板閘至大不過二丈四丈以二丈四尺之板閘豈能宣泄北運河之水勢必衝漫似不若照舊聽其通流若彼年水勢充足則不必閉塞如水勢淺阻則建草壩閉塞令其全入中河以濟運俟糧艘過完即行啓壩循舊入黃以免衝漫淺阻之為便也又駱馬湖入黃河之口令臣驗明建減水壩二座臣於十月初二十一月初三等日水落之時兩次親驗隄外湖口寬一百餘丈深五六丈以致二丈三丈不等若迎水建減水壩則汪洋浩瀚無從下手若迎水下掃築隄再於兩隄頭建減水壩則全湖排山之勢似非掃隄減壩之所能禦必致衝壞且一隄兩壩所費不下數萬金是年修年壞徒以有用之金錢填無窮之巨浸而究無底止也臣愚以為不若於兩隄頭暫用掃料堵塞黃水淺深用髙出水面二三尺大竹絡裝石下於臨河外面旁依草掃挨次排列數層兩面再用密排樁夾持水小則逼水入中河以濟運水大則由竹絡上下以泄水所費少而工程易似尤可以省嵗嵗修理之金錢臣現在責令該管官極力舉行再查駱馬湖原止滙沂河白馬湖運河微山等湖泛溢之水會入黃河未有如今日之洶湧緣郯城之東十五里舊有沭河自山口流出西行約有四五里轉而南沿紅花埠㟃峿一帶復東由沭陽入海郯城之東八里許迎沭水之口有名釣魚臺又俗名禹王臺者相傳大禹治水引沐水穿山而西恐其害郯故築此臺以遏水勢及明季變亂遂毁臺取石修城以致數年來沭水西流由郯城城北會白馬湖沂河等水入駱馬湖不唯沂郯邳宿嶧各州縣嵗受淹沒之害而駱馬湖黃河亦添一沭河之水愈覺泛溢奔騰而不可遏考之記載甚明詢之土人最確臣復親勘沭河故道斷流而禹王臺水口之水涓涓不絶似應於禹王臺舊基處所迎水亦用竹絡裝石堵塞內築土隄斷流令其照舊由故道入海非但駱馬湖黃河之水勢得以減殺而郯沂邳宿嶧各州縣亦可免淹沒之患矣再歸仁隄五堡減水壩被水衝壞議令修理堅固但臣會同查勘切近五堡之格隄尚有官路河口約二三十丈亦在過水而六七八九堡倒壞漫溢之口不止一處若止修五堡減壩而各處不修仍為無益且歸仁隄土工石工約長一萬餘丈廢壞多年非數十萬帑金可以修築之工程似不若暫停以損無益之費也奉旨這本內事情著隨來諸臣確議具奏河防志行水金鑑卷一百三十六
