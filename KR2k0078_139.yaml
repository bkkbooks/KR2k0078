body:
  text: 行水金鑑卷一百三十九江南按察使傅澤洪撰運河水聖祖仁皇帝康熙三十九年二月二十四日總漕桑格題為題明事三月十五日奉㫖這邵伯更樓決口自去嵗奏報後屢據奏稱儧工修築乃迄今尚未報完以致漕艘十有餘隻漂沒擊碎其阻滯江干及瓜揚一帶地方不能前進者甚多遲誤漕運關係重大在工官員所司何事怠緩延玩殊為可惡著嚴加議處具奏仍著該督設法倍料兼工堵築刻期報完勿致再誤邵伯更樓係船隻往來要地巳經衝決十箇月有餘船隻阻滯不能前進之處桑格並不題報至于成龍故後始行具題不合著一并察議具奏該部知道三月初九日侍郎常綬口奏皇上指示黃河挑引河打挑水壩于高堰管工大臣內交給某人修築之處恭請欽㸃奉㫖著差出董訥范承勳承修令他們二人於捐修人內將捐銀多者揀選十人帶領修造爾等將邵伯決口月河芒稻河人字河亦俱著奏或堵塞黃水入湖之清口或閉塞清江閘之處㑹同徐廷璽議此係河官専責如巳定即交徐廷璽修造爾等俱馳驛前去十四日河道總督臣張鵬翮恭聆天語朕親書河工事宜二條差筆帖式馬泰交與于成龍你到衙門查看就知河工流弊早巳知有今日豈至今日而始言也臣鵬翮到清江浦詢筆帖式馬泰檢出御書上諭一條由清字譯出係康熙三十八年七月初三日上諭諭河道總督于成龍畫河圖去的董殿邦等于七月初三日到來問你身上好麼伊說你臉色甚瘦如今你身上好了麼飲食如何再細觀河圖內要緊應修兩處今特諭在南方面諭你將人字河芒稻河緊急挑穵等諭聞得至今未曾動工若真未動工大有所失似此遲誤不但運河東隄難保關係民生最重如今若不緊緊挑寬五六十丈使不得為此又傳𫝊爾等又一件事看得河圖內歸仁隄便民閘等口俱已堵塞毛城鋪以下等口俱未堵塞將便民閘等口堵塞毛城鋪等口所出之水將歸何處必定散漫各處民大受害此處關係緊要宜速籌一䇿這二事外各處工程修至何等光景將水勢情形緊急奏聞為此特諭又一件據馬泰回稱御書上諭已繳有録出原稿係康熙三十八年三月初七日欽奉上諭初六日到清水潭九里等處測量水平看得河水與湖水相髙二尺三寸九分這一帶隔河石隄關係緊要宜當速造朕在此處步行看工未見一個做工之員著查明參處至髙郵等處河水向湖而流河水似髙一尺乘黃水未深通之前這些處隄工雖一丈不可忽略不可不急速儧做為此特諭十七日河道總督臣張鵬翮面奉聖訓引湖水使之由人字河芒稻河入江朕所見最真爾必須要行以上並河防志是年三月內上諭特遣侍郎常綬等至清口指示方略將裴家場引河再加挑穵寬深清口築攔黃壩漕船過完堵閉回空之時開壩過完仍行堵閉總河張鵬翮於欽奉上諭事案內委原任布政使王育賢等加挑裴家場引河長一千七百六十丈並築攔黃掃壩于本年秋汛工完堵禦黃水不出便於放引河水入裏河至八月回空糧船南下開壩裏河㕔冊是年四月二十二日總河張鵬翮題奏我皇上明見萬里洞晰河勢指示周詳仁愛之心無所不用其極臣將所閲形勢縷晰陳之一人字河宜挑濬深濶也自金灣閘至孔家渡為河之脈絡見今狹窄宜開廣濶自此至芒稻山河分兩派又名芒稻河此處水口兩岸亦狹又有土嶺二處前河臣尚未穵完目今湖水方盛宣泄宜急應多募人夫尅期盡行穵去使其暢流水口下有芒稻閘年久塌壞磯心頗髙宜穵深另修因時啓閉以防江潮一鳳凰橋引河之宜再挑也此河經前河臣新挑因未挑深從橋口至胡家樓河水絶流竟成平地宜加挑深通引水從王家莊入運鹽河滙入芒稻河一雙橋灣頭二河之宜挑深也此二河見今水流同入芒稻河但河底亦有淺處應俟冬時挑濬深通其灣頭閘座雁翅塌陷宜及時修砌此三處之水俱相繼㑹入芒稻河流十八里入江臣觀江口寬闊河底深通兩岸居民二麥成熟不慮水患此江都金灣以下至仙女廟之形勢也唯髙郵自擋軍樓起至東西灣止因髙堰洪湖之水滔滔東下西隄淹沒漫入運河東隄一望汪洋水由城南大壩而出洶湧泛溢當伏秋水漲恐東隄單薄難以捍禦致有不虞宜將見閉三壩相機酌開以保城池隄岸俟秋盡水落修築隄岸堅固之後再行閉塞因係緊要工程挑浚宜急臣一面委官動帑興工一面估計另疏具題理合題明九卿詹事科道㑹議具題奉㫖依議速行鳳凰橋起至裏河王家莊止工長一千四百五十四丈六尺又灣頭入裏河王家莊引河口攔河南壩一道長一十四丈三尺共估挑河築壩土方工料銀二萬四百六十二兩又芒稻河西土嶺長八十丈三尺東土嶺長八十九丈又東土山下口挑叙觜一段長十丈又金灣閘下自李家渡迤南起由孔家渡至新橋止工長二千二百九十三丈共估土方銀一萬六千三百兩以上共估土方銀三萬六千七百九十五兩內節省銀一千五百二十六兩五月初六日大學士伊桑阿馬竒奉上諭員外郎拖克拖和中書張古禮著馳驛前往河道總督張鵬翮處將修過河工情形閲看伊等無有専責將工程令河道總督張鵬翮明白繕寫摺子交與伊等帶來啓奏總河張鵬翮摺奏黃淮各條分入本水一運河之宜挑深也自清河縣運口至髙郵州界首一帶裏河頻年黃水入運淤墊從未挑浚前河臣每以加高為事以致河身日髙一遇水漲往往潰決堪虞訪之輿論宜加挑浚深通即取河底之泥以加隄身庶為有益臣前已面奏奉㫖俞允欽遵在案俟今冬糧船過盡即煞壩挑浚一切進貢差使暫由陸行一髙寶江都一帶西岸土石隄宜修也今洪澤湖水東下水勢方大西隄盡淹河湖一片俟冬時水落估計興修一髙郵城南之石壩宜修也今髙郵湖水洶湧經由城南壩上而出以勢漸逺不能盡入人字河而泄宜于秋盡水落照前河臣所估將五壩改為四滚水壩辦料興修於壩下相度形勢開引河使水有去路一新改中河隄岸宜修也兩岸隄工單薄不堪水漲可虞臣查新築隄長一萬七百五十八丈候選州同馬勳等三百五十員領帑承修內頂衝刷灣處估釘排樁二千八百三十四丈桃源縣知縣王玥等十八員領帑承修迄今並未完工除敕令各官上緊照估修築勒限完固如再違抗另疏查參追帑仍治以誤工之罪臣看新挑中河窄狹不如舊中河寬深足以容水俟糧船過完於深秋水涸之時臣再率河官復加查勘若舊中河可以修築仍由舊中河行運如果不能築隄再將新中河審度形勢另疏奏聞又摺奏黃淮各入本水一運口修築攔黃壩准有部丈動帑興工今先築兩岸土壩俟糧船過完再堵運口使黃水歸海引清水入運河一邵伯更樓決口已經修壩堵塞完工糧船通行無阻居民亦鮮水患其舊缺口雖不堵築亦屬無礙且河工需用錢糧浩繁之際似可暫緩一髙郵護城隄工關係緊要經臣題明興修在案今正在修築尅期告竣以資捍禦一嵇家閘缺口今正在堵築未完但湖水方盛邵伯南壩巳堵若將此口堵塞無處泄水東岸隄工可虞應暫留此口泄水以保隄工經臣題明在案俟秋盡建閘以資宣泄一人字河芒稻河引湖水入江關係要緊經臣題明挑濬在案今正在上緊挑穵務期寬深速完以資宣泄其芒稻閘俟秋盡水落方可修建一鳳凰橋引河引湖水由芒稻河入江前因挑穵不深河心又係髙岡以致水不能流經臣題明挑穵深通在案今正在上緊挑穵使深務期速竣引水暢流一劉老澗遙隄造石減水壩內建磯心八座係㑹勘案內候選知縣佟世燕等領帑承修之工壩牆磯心俱完尚有底石正在鋪砌未完飭其作速砌完壩下挑引河一道宣泄中河異漲之水自鮑家莊至殷家口入漣河下海馮佑領帑桃浚總未挑完飭其作速挑濬竣工如不竣工另疏題參一九里決口坐落髙郵州九里地方已經堵塞完工一清河北岸子隄缺口坐落清河縣中河北岸巳經堵塞完工謹將見修工程繕寫摺子具奏伏乞皇上睿鑒施行初十日總河張鵬翮題臣奉命視河三月十九日到通州看石壩因其單薄沙築水長可虞交與分司臣王作舟加謹保固四月初二日自濟寧上任後乘舟南下山東一帶運河隄岸閘座俱皆完固河道並無淺阻其北直挑淺夫銀兩與倉場相近者交與總督與巡撫相近者交與該撫各就便清查初五日由新改中河閲兩岸隄工單薄不堪詢之河官僉云隄工例係隄外臨河坦坡隄內平地陡坡蓋以坦坡可禦風浪之故今新改中河將北岸子隄改為南岸子隄且兩岸狹窄不能容水其清河子隄地居下流兩岸皆水况係虛鬆沙土難抵風浪內外衝激甚屬危險飭行原修各官將單薄虛鬆及殘缺塌卸者加幫高厚夯硪堅實一律完竣如有違抗另疏查參初六初七等日由清江浦至淮安寶應髙郵江都等處查看土隄及排樁工程俱有塌卸殘缺卑矮單薄不堪之處其西隄自江都縣東西灣起至髙郵擋軍樓止被湖水淹沒一望汪洋其永安界首等處石隄修砌十不及一二見在嚴飭經手各官上緊修築堅固速行竣工如有抗違另疏查參嵇家閘決口尚未堵塞查原係減壩邵伯南壩既堵應留此口宣泄以保隄工黃淮各條分入本水至于挑人字芒稻河引湖水入江開張福口引河以濟運道均屬緊急工程臣已經一面動帑興工具疏奏明在案其餘工程有應挑應疏之處容臣逐一確估次第入告所有微臣勘過河工情形理合具疏題報奉㫖該部知道七月二十一日總河張鵬翮題臣到任後檢查舊案行據員外王登魁等詳稱沂河水勢原有七分入盧口由官河出徐塘口等處流入中河南下濟運有三分由沂河流入壩頭集歸宿邑駱馬湖從西寧橋引河經桃源沭陽安東入海此向來兩分之水勢也近來如遇水發宿邑民田尚且受災若將盧口一帶建閘攔截恐水多由宿境歸於駱馬湖未免湖水泛溢關係宿遷桃源安東沭陽之田舍不無顧此失彼之慮相應備叙原委具覆到臣臣隨於七月初八日自清江浦起行初十日至猫兒窩率同宿虹同知鄧之琮邳州知州佟國玿等至盧口查看沂水至此分為二派一由正河東流入駱馬湖一直趨盧口東南流出徐塘口入運河盧口面寬八十餘丈水勢急溜河砥積沙詢據邳州居民戴題名等供稱自順治十六年衝開此口水大之年被其淹沒須築隄閉塞方免水患問據盧口東岸宿遷縣居民戴天祥等供稱若堵塞盧口則盧沂河東岸全被淹沒等語此二處之民各執偏見以利於此者又不利於彼也該臣看得邳州民劉三靈等將盧口受患情形叩閽一案先經前河臣于成龍等疏稱沂河兩岸築隄盧口建閘可免漲漫之患部議令河臣親身前往確看具題等因奉㫖依議欽遵在案今臣委官踏看據稱若將盧口一帶建閘築壩恐水多歸駱馬湖未免湖水泛溢關係宿桃安沭之田舍是有顧此失彼之慮等語臣復率㕔州等官親往盧口查看沂河水勢直趨盧口面寬溜急且係沙底不便建閘應於廬口河兩傍隄岸殘缺之處修補一律束水流入徐塘口既可濟運又使民生得所矣理合恭疏具題部議覆奉㫖依議同日總河張鵬翮題該臣看得科臣張睿條陳將清河縣以下所有陶莊閘開放出口建瓴之勢逗遛使南等語部議將清河以下所有陶莊閘開放挑濬出水或將董安國所挑引河以下酌量挑穵建閘之處親身詳看具題等因臣率淮揚道王謙等及衆河官詳看得若將中河改由陶莊閘而行至董安國所挑引河尾入黃河但清河縣地處窪下面臨黃河背坐清水二水并漲恐有漂沒之虞必遷移縣治又多繁費且引河尾地亦窪下恐黃水倒灌雖建閘可禦若糧船進口行下水數里水溜風猛難以進口且陶莊閘外黃河北岸皆係坡灘糧船至此難以停泊不若仍舊入運河沿隄溯流而上至陳家莊渡河直進仲莊閘草壩從無阻滯應無庸更張者也理合具題部議覆奉㫖依議二十五日大學士伊桑阿馬竒折本啓奏奉㫖見今遣人往張鵬翮處著將河水情形各處工程修理若何著明白開寫摺子交與遣去筆帖式賫回啓奏總河張鵬翮摺奏查黃運中河伏汛水勢情形臣於六月二十一日題報在案七月初六初七兩晝夜大雨秋汛水勢大長臣於初八日乘舟前往邳州地方看閲盧口見山東諸湖水發瀰漫而來陡長丈餘幸由猫兒窩運河流入駱馬湖從竹絡壩出黃河故運河隄工俱保平穩中河水勢驟漲將劉老澗上年原有泄水裹頭草壩漫開水勢泄入壩下兩岸虛鬆子隄雖有水溝浪窩坍卸之處亦皆幸獲平穩高郵水勢雖大由南關柏家墩二處滚壩泄水荷䝉我皇上指授方略挑穵人字河芒稻河深通泄水暢流入江髙寶江都一帶運河隄工皆保平穩黃淮二河分入木條運口遵㫖於七月初三日煞壩初五日斷流攔截黃水不致內灌張福口引河一道挑穵工完於七月初八日開放裴家場引河一道河身穵完亦於七月初八日開放二水暢流入於運河見今水深四五尺不等俱經題報在案運河自清口至界首一帶自放引河清水以來止能衝去浮沙其河底淤泥積墊年久衝刷不動臣擬於今冬十一月十五日以前回空糧船過完煞壩挑穵深通六壩閉後黃淮二水并流入運河有所容納伏祈敕下倉場侍郎及沿河撫鎮等官嚴催回空糧船務于十一月十五日以前盡數過淮庶不誤挑浚其浙江等省尾幫糧船恐回空遲滯河凍氷阻請敇下該撫將減存糧船動苫蓋銀兩修艌照例冬兌冬開庶漕務不致貽誤高郵護城隄掃工一千六百五十丈前經題明委令髙郵州知州謝廷瑞等領帑修理已經完工足資捍禦城池民生兩有攸賴邵伯更樓繞挑月河築壩工程巳於四月二十七日完工前經題報在案人字河芒稻河委張弼等巳挑開寬深引湖水暢流入江鳳皇橋引河因中段土岡堅硬挑穵頗艱見催委員王進楫等上緊挑深刻期完工陶莊引河部臣范承勳等所擬七月內完工因秋雨太大河身受有積水見在車戽挑完駱馬湖李經邦所修石閘上寬下窄不能下板題明發帑委通判葉增英宿遷縣知縣胡三俊辦料改造見在勒限竣工劉老澗引河係馮佑領帑承挑之工屢催不行挑穵見在查明侵帑數目另疏參追其引河估計發帑挑浚改挑中河子隄未完分數及水溝浪窩之處勒令承修官馬勳等修築填補其頂衝掃灣之處責令承修官王玥等簽釘排樁見在勒限嚴催修理速竣如再不完工另疏查參其髙郵城南滚水壩髙寶江都一帶土石隄工駱馬湖口竹絡壩處處工程需帑興修户部所撥五十萬兩委不敷用見在分案估計請撥錢糧辦料興修此係各處修理之工程也臣謹具揭付筆帖式關住齎捧奏聞九月二十日總河張鵬翮題該臣看得先經臣具奏舊中河可以修隄仍由舊中河行運如不能築隄將新中河審度形勢另疏奏聞九卿議覆俟具題之日再議等因移咨到臣臣率淮揚道王謙等查勘得新中河必須全身挑穵兩岸子隄全行加幫但所需錢糧頗繁而河頭灣曲糧船行走不順且三義壩以上三十一里河身狹淺遇湖水大漲恐不能容納舊中河自河頭起三十二里至三義壩河甚寬深但三義壩以下至仲莊閘二十五里河身甚淺南岸河水散漫難築子隄且距黃河岸甚近今衆議在三義壩將舊中河築攔河隄一道改入新中河則舊中河之上段與新中河之下段合為一河糧船可以通行無滯至中河應挑應築之處關係運道緊要工程一面發帑委官作速興修一面確估造册另疏具題外理合先行題明奉㫖前于成龍奏稱將中河改移朕屢經諭其恐有未便今張鵬翮所奏中河事宜甚當著照所奏行該部知道清河縣改挑中河煞壩修隄簽釘排樁等工實用銀二萬四千餘兩節省銀四千二百餘兩桃源縣中河煞壩挑河幫築北岸隄工簽釘排樁及宿遷駱馬湖閉壩等工實用工料土方銀一萬四千餘兩節省銀二千四百餘兩共實用銀三萬八千餘兩節省銀六千七百餘兩十月十一日總河張鵬翮題案准部咨㑹議得河道總督張鵬翮疏稱駱馬湖水由舊中河進石閘入黃河助黃刷沙如遇黃水大漲恐其倒灌則閉閘以禦之此閘係原任知州李經邦承修因金門下窄上寬不能下板到底應飭令李經邦改修金門合式挑穵引河深通然後議堵中河引水入黃等語應如所奏一面興工一面將需用銀兩估確具題奉㫖依議速行部咨到臣行據該道㕔詳稱李經邦係正藍旗人並未來工查此閘係緊要難容遲緩照例動帑委官如式拆修所有應用錢糧行據淮徐道詳估銀七千九百餘兩造册前來除原册送部查核外此係李經邦應賠之項仰祈敕部行令該旗都統於李經邦名下照追還項理合具題部議准覆奉㫖依議二十八日總河張鵬翮題看得髙郵城南減水五壩原任河臣于成龍題改滚壩四座臣親往查勘見髙郵湖水洶湧經由城南壩上而出以勢漸逺不能滙入人字河而泄宜于秋盡水落照前河臣所估將五壩改為四滚水壩於壩下開引河使水有去路不致旁泄經臣於應修二疏內奏明九卿議覆應如所奏等因奉㫖依議速行今據淮揚道參議王謙詳估南關大壩迤南遷建大滚壩一座仍長六十六丈估銀二萬三千餘兩車邏壩迤南遷建大滚壩一座長六十四丈估銀二萬二千餘兩實堵南關並柏家墩二大壩共估掃料土方銀一萬五千餘兩並無浮冒臣親勘覆核無異具疏題估部議准覆奉㫖依議速行堵南關柏家墩二舊壩原估銀一萬五千餘兩髙堰六壩久堵揚屬水勢銷落改估止需料物土方銀三千三百餘兩較前估節省銀一萬二千餘兩四十一年閏六月二十八日題銷又二十八日總河張鵬翮題該臣看得清河運口至髙郵州界首一帶裏河頻年黃水內灌運河淤墊久未挑浚以致河身日髙宜加挑浚深通俟今冬糧船過盡即煞壩挑浚一切進貢差使暫由陸行已經奏明九卿議覆應如所奏等因奉㫖依議速行又於欽奉上諭事案內具奏擬於十一月十五日以前回空糧船過完煞壩將運河挑穵深通在案行據淮揚道參議王謙詳稱自張福口起厯清河山陽寶應三縣至髙郵界首止應挑工段共長三萬一千一百七十九丈二尺共計土二百零三萬六千六十四方連運逺土並築攔河隄壩共估土方工料銀二十二萬六千六百四十八兩零造册詳估前來臣覆核無異委官照所管工段承挑監工除原册送部查核外相應具疏題估部議准覆奉㫖依議速行十一月初九日刑科掌印給事中陳銑題竊惟黃淮為患匪伊朝夕皇上神明獨運睿照所及洞達無遺巳將兩河情形熟悉區畫特簡張鵬翮總理河道面受方略殫心奉行又遣大臣督修髙堰天心眷答河伯效靈今年伏汛水勢消落較往年十之三四竚見安瀾就下立慶平成矣乃皇上睿慮周詳猶恐淮黃交漲或致危險此誠至聖至明事所或有誠不可不早為計及者也臣思黃河之工規模已經大定不過實心修築自可告成唯是罅隙之處尚宜早補罅隙既修則一定之規垂之萬世永逺無弊蓋黃河之患最懼旁泄不可兩行即兩岸清水亦不可分泄清水不泄則助黃刷沙水落之時日夜滔滔長流入河若異漲之際河流亦有倒灌之時然六七天後異漲即平淤沙未堅清水仍出沙隨水流隨流隨去此南北兩岸所以必築隄以障湖障湖以敵黃也自南之歸仁隄潰而胡家溝之口塞矣髙堰潰而清口塞矣北之禹王臺泄水而駱馬湖之董口塞矣其塞者非黃水之能塞清而清水之自不能出也黃水塞清不過一時之泛漲清不能出則旁分流弱黃水隨清而入一往不返淤沙愈積愈老河身反髙於湖矣今皇上命張鵬翮修歸仁隄閘胡家溝以出濉湖之水命大臣幫髙堰以出洪澤湖之水此真一定不易之經乃猶有罅隙當塞者則莫如復天妃閘以防淮水入運閉中河以𨗳束水入河蓋髙堰既築淮水必髙若黃漲不能復出則必擇空地而行舊天妃閘離淮黃交㑹之處二百餘丈原用閘板閉斷自天妃閘至清江浦共有五閘重運到時遞互啓閉重運一過即行鎖斷官民船隻俱用車盤是以淮之全力俱注於黃其引入運河者不過暫時資其濟運耳自廢天妃閘移七里閘改草壩無復閘板啓閘則淮黃相距之中復有運河以為尾閭桃伏兩汛黃障其北堰障其東無所分泄勢必盡趨運河運河淺澀迫近淮城萬一潰決清江浦居民可危誠有如聖慮所及者故臣以為必復天妃閘以塞其罅然後淮水可出而清口可通也至中河之意亦復相同借其通漕可以避黃河之險任其分泄亦復生倒灌之虞近年黃水灌入中河至于嚙隄淺涸皆復由此今張鵬翮遵奉俞㫖亦巳煞中河頭壩引湖水從石閘出黃矣臣愚以為宜倣天妃閘舊制之意於新舊兩河中酌量逺近多建閘座重運來時節級啓閉重運過後官民船隻或車盤或走黃河勿令常行開通使清水但資送運一應減水壩盡行堵塞令其俱入黃河不唯宿遷以下河流廣深抑且仲莊閘出口之水不致逼溜使南而清口亦易開通此不過一二補苴而大工可以告成永逺可以遵守矣奉㫖這事情應否可行著總河張鵬翮速議具奏該部知道十二月十八日總河張鵬翮題該臣看得科臣陳銑疏稱自天妃閘至淮安共有五閘必復天妃閘以塞其罅然後淮水可出等語臣按南河志平江伯陳瑄建通濟新莊福興清江板閘等五閘遞相啓閉以防黃河之淤又慮水發湍急難於啓閉築壩以遏水衝每嵗至六月初旬糧艘過盡伏水將發即於通濟閘外暫築土壩以遏橫流一應官民船隻俱暫行盤壩出入至九月初旬開壩今天妃福興板閘久廢新莊閘亦以無用棄之唯存龍汪閘一座金門參差不能下板但古今異宜不能盡復五閘臣相度地勢博訪輿論公議酌復天妃閘一座以防黃水內灌將見存之龍汪閘寶應閘拆修金門下板設遇水涸遞相啓閉蓄水濟運但目前運河淤墊正在挑穵俟清水衝刷淤沙使盡河底之尺寸既定方可安建閘基將修閘事宜另疏題請又科臣陳銑疏稱新舊兩中河多建閘座重運來時節級啓閉重運過後勿令常開等語查中河頭每年糧船過後即行煞壩引湖水由石閘出黃新運到時又行啓壩需費錢糧不若於中河頭及中河尾各建石閘一座以時啓閉節宣水勢於新中河孫家集以上修石閘一座如遇水大泄入鹽河以殺水勢其修閘需用錢糧另疏估計具題以上運中兩河科臣題請建閘之處乃河工告成善後之計事屬可行臣謹具疏題覆部議覆准具題奉㫖依議速行中河頭建造石閘一座并上下築壩及挑月河建草壩共該工料銀二萬八千七百八十五兩零中河尾建石閘一座并上下築壩及挑引河裏頭等工共該工料銀二萬九千七百三十七兩零又建孫家集小石閘一座共該工料銀九千一百一十九兩零三共銀六萬七千六百四十二兩零天妃閘舊基閘塘年久深窪戽水難乾故樁碎石有礙下樁鋪底議於運口頭草壩迤北建造大石閘一座拆新莊閘石料添用以節省錢糧又東西各築縴隄一道即以挑引河之土築隄再於閘座上下穿開舊隄處所各建草壩一座以固隄東水共估工料銀二萬八千二百四十二兩零寶應南宏濟大閘建造年久閘底閘牆向被水衝壞今議從新估建石閘一座金門鑿槽下板以資啓閉并開挑越河建築掃壩通共需料物工價銀一萬六千四百九十八兩零十二月初二日總河張鵬翮題奏臣檢查舊案康熙三十八年三月初一日奉上諭下河見有積水不得不引出歸海將串場湖射陽湖蝦鬚沙溝一帶挑通引積水流出歸海欽此仰見我皇上軫念民生指畫周詳下河數百萬蒼生莫不感頌我皇上如天之仁矣因前河臣于成龍未暇兼顧今臣遵聖訓疏通海口黃水有歸路矣堵塞六壩開闢清口引淮水㑹黃二瀆合流入海矣上河漸次就緒乃親往查勘下河見水勢漸消髙原巳經種麥唯興化縣形如釜底積水一時不能全消較泰州鹽城水患尤甚臣相度形勢博採輿論髙寶山陽鹽城一帶之水由射陽湖之蝦鬚二溝入廟灣以達于海今蝦鬚二溝因童營漫溢淤為平地雖有戛梁河出水但河身淺狹不足宣泄是以泛濫於興化鹽城一帶今宜將蝦鬚二溝淤塞之處約計四十餘里挑穵口寬十丈深九尺一丈不等引水入朦朧河以達於海約需銀五萬餘兩髙郵滚水壩下之水由興化縣安豐鎮至白駒場以達於海今自鮑家莊至白駒八十餘里地髙水壅宜挑口寬八丈深六七尺不等引水由白駒場入海約需銀六萬餘兩其髙郵一溝以下見有河形一片汪洋興化白駒閘以下暢流入海俱不須挑穵又自興化車路河至丁溪由撈魚港以達於海今撈魚港淤塞八十餘里應挑口寬八丈深六七尺不等引水入海約需銀六萬餘兩寶應縣之水由子嬰溝老河口入射陽湖以達於海今老河口一帶淤淺三里餘應挑口寬十丈深六七尺不等引水入湖約需銀二千五百餘兩泰州之水自淤溪至車兒埠滔子河以入於海今滔子河三十餘里被土商築壩釘樁淤塞不通宜開口寬八丈深六七尺不等約需銀二萬餘兩引水由苦水洋入海如此則水有去路而積水可以漸消至於串場河自泰州以至鹽城長三百餘里多有淤淺若挑至廟灣入海商民兩便但舊例係鹽商挑浚范公隄長三百里昔人築以捍海今巳殘缺修治需費不資應俟下河積水消後民有起色漸圖修舉可也其挑浚蝦鬚溝等河應用銀兩擬於加捐銀兩動用如䝉允行容臣遴員估計另疏具題奉㫖這本內事情著照該督所題行該部知道蝦溝鬚溝射陽湖尾閭共計工長一萬六百七十丈各寬深丈尺不等共估土方銀四萬二千三百八十五兩零其河底板沙之下或有油淤五六尺不等人難站立難以施工則挑至油淤而止就以扣除土方銀略為疏篦令其通行再攔水壩三條估銀二百五十五兩零老鸛尖油葫蘆港瓦子莊應篦疏沙淤共估銀四百九十四兩零合之蝦鬚二溝土方通共估銀四萬三千一百三十五兩零寶應縣之水由子嬰溝老河口入射陽湖以達於海除子嬰閘下至胭脂溝止一帶河道深通無庸估挑外唯自胭脂溝起由老河口至姚家港止河長六百丈河身淺窄應一律加挑面寬八丈底寬四丈深六尺為度需用土一萬五千二百六十一方每方銀九分該銀一千三百七十三兩零以上並河防志行水金鑑卷一百三十九
