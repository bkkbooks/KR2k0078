body:
  text: 行水金鑑巻一百四十江南按察使傅澤洪撰運河水聖祖仁皇帝康熙四十年正月十七日總河張鵬翮題髙寳江都一帶隄岸闗係運道最為𦂳要去夏水盛西隄盡淹河湖一片經臣奏眀俟冬時水落估計興修九卿議覆准修奉㫖依議速行在案今唐埂等六壩堵閉髙寳江都西岸隄根漸次涸出行據淮揚道參議王謙詳稱除寳應縣北城灣南唐隄五淺龍王廟江都西隄排樁等工尚屬可緩不計外查髙郵陸漫閘西岸原屬土隄每遇伏秋水長危險堪虞應建石工興永安界首二處石工上下相接以資捍禦計工長一千六百二十五丈五尺估用工料夫匠銀十六萬四千九百五十九兩江都西隄殘缺石工二百四十四段共長一千二百二十七丈五尺亟令補修以資捍禦估用工料銀二萬九千一百四十五兩髙郵州東隄朱家田頭單薄危險亟應下掃壓土工長四十八丈估用工料銀四千四百一十九兩清水潭草大王廟東隄裏口險工舊埽年乆朽爛堪虞應下埽加工以禦風浪計工長一百五十丈估用工料銀二千八百四兩又金灣三閘裹頭磯心倒缺不堪亟應修理估用工料銀一千二百六十五兩以上各工不在從前估修之内又永安東隄裏口龍門北灣險工計工長一百丈估用工料銀一千六百六十八兩又永安東隄龍門南北灣裏口坍卸險工計工長一百二十六丈估銀一千八百九兩此二工查係前河臣于成龍等委主事孫叔貽筆帖式泰保等幇築完工復被風浪撞擊坍卸難資捍禦例應賠修若俟催提到工始行補築勢必遲誤亟應先發帑銀修築完日㕘追還項以上估修七工共需工料銀二十萬六千七十二兩零除原册送部查核外謹具疏題估部議准覆奉㫖依議速行二十二日總河張鵬翮題臣按南河志清口至淮安建有五閘逓相啓閉以防黄水之淤又慮水發湍急難於啓閉築壩以遏水衝每嵗糧船過盡即於閘外建壩以遏横流一應官民船隻俱暫行盤壩由此而觀則是伏秋水𤼵黄河倒灌自古而已然矣故建閘築壩以防淤墊之患今運河初經挑穵俟清水衝刷使深河底尺寸既定方可建閘臣於覆科臣陳銑復閘疏内曾經題明在案茲清水雖巳出黄轉盻桃伏秋汛繼至節宣之道預防之法不可不急籌也今於張福口裴家塲中間開引河一道㑹張福裴塲等引河之水並力敵黄但黄水㑹合衆流來自萬里頻年河身墊髙勢大而力强淮水止發源桐柏迄今方出清口一半敵黄又一半濟運終虞力分而勢弱故蓄髙堰之水以助其勢幸而黄水不大亦足以敵之若遇黄水大發在糧船過完之後仍遵㫖堵閉攔黄壩使不得倒灌且可以刷深黄河在糧船正行之際遇黄水大發將裴家塲引河口門暫閉引清水由三汊河至文華寺入運河以濟運行倘運河水大山陽一帶由涇澗二河洩水入射陽湖下海寶應一帶由子嬰溝洩水入射陽湖下海髙郵一帶仍由城南柏家墩二大壩洩水江都一帶由人字河鳳皇橋等河洩水入江若遇黄淮並漲清水由翟家壩天然滚壩洩出黄水由王家營減水壩洩入鹽河至平旺河下海若糧船過完黄水不大發將運河頭壩煞壩令清水全入黄河以資衝刷一切官民船隻照往例盤壩俟回空糧船到日方可啓壩止留三汊河清水仍由文華寺入運河即古人設天妃閘於糧船過後閉閘築壩之意也奉㫖這所奏已得河工秘要著九卿詹事科道㑹同速議具奏九卿等議准覆題奉㫖依議速行六月初八日總河張鵬翮題髙郵城南南闗車邏二壩經臣題估改建滚壩二座壩下引河因水占難以深量俟水退後逐段估計另疏具題部議奉㫖依議速行在案又髙郵滚壩洩下之水由興化縣安豐鎮至白駒以達於海今自鮑家莊至白駒八十餘里地髙水壅亟宜挑濬引水由白駒塲入海需用銀兩擬於加捐銀内動用具題奉㫖這本内事情著照該督所題行今行據淮揚道參議王謙詳估髙郵南闗大壩以下自攔馬河起至朱三家橋止應挑引河一道長三百九十一丈估土方銀三千九十六兩車邏壩以下自攔馬河起至商家莊止應挑引河一道長三百三十丈估土方銀二千六百一十二兩興化之海溝河自鮑家莊至白駒閘止共長一萬四千四百八十七丈加挑寛深估土方工料銀三萬六千餘兩通共估銀四萬二千餘兩並無浮冒臣覆核無異除照數動支加捐銀兩委官作速挑穵並估冊送部查核外相應具題部議准覆奉㫖依議十月初八日總河張鵬翮題淮陽運河係各省糧艘經由要道最闗𦂳要向因黄水倒灌河底墊髙一遇水長盈隄溢岸前河臣于成龍於康熙三十八年春發帑委員簽釘排樁内填龍尾小埽以衞隄工三厯伏秋又值運河大挑之後清水暢流兩岸泥土漸次衝刷排樁日見倒壊亟應乗時修理以禦來年桃伏秋三汛今據淮揚道王謙詳估淮屬山陽境内攙補排樁改鑲丁埽需用銀一萬八千餘兩揚屬高寳江三州縣境内攙樁換柴改築坦坡鑲柴壓土需用工料銀一萬八千餘兩通共估銀三萬七千餘兩並無浮冒造册詳估前來臣覆核無異不另請撥錢糧一面動支大挑運河節省銀兩武家墩石工樁朩節省銀兩作速購料乗時儧修以資捍禦并原册送部查核外相應具疏題估奉㫖該部議奏部議准覆奉㫖依議速行十一月十四日大學士伊桑阿等學士辛保等以工部議覆總河張鵬翮請將高郵州陸漫閘西岸改築土隄拆本啓奏奉㫖陸漫閘西岸改築土隄内外鑲柴見今錢糧雖省但蘆柴易致朽爛不能堅乆二三年後又致重修張鵬翮在任時雖無可虞若張鵬翮或離任或淮黄水漲有危險之處鑲柴工程朽爛豈不更難著將這情由備寫差員前往張鵬翮處令其確議具奏總河張鵬翮摺奏接内閣中書永竒捧㫖到臣内開云云臣跪誦之下仰見我皇上至聖至明區畫深遠無微弗照臣愚先因湖水消落將陸漫閘西岸石工改築土隄内外鑲柴原從節省錢糧起見臣今跪讀俞㫖蘆柴易致朽爛不能堅乆二三年後又致重修聖主睿鑒甚明應仍修石工以垂永乆以資捍禦臣謹遵㫖確議奏聞奉㫖遣人問張鵬翮今奏稱陸漫閘西岸應仍修石工以垂永乆以資捍禦等語著修石工奏摺并發十二月二十日總河張鵬翮題奏山陽縣黄河南岸運料河原任河臣董安國署理總河印務徐廷璽具題動帑挑築未完其河頭起於檀度寺閘乆巳築壩堵閉詢問其故據土人云運河髙於運料河數尺恐其開放建瓴之勢直洩無餘是以厯來堵閉臣測量水平果與土人之言無異夫既堵閉則此河為無源之水不能通濟下流亦難運料是此河巳無益於運河矣且汰黄隄原在黄河南岸重門保障運料河身居汰黄縷隄二隄之中從前挑穵此河將草灣并小茭陵二處汰黄隄穿斷雖築有草壩難資捍禦是此河又有碍於隄工矣况厯來運料因此河未成係由黄河射陽湖轉運以濟工需是此河既不能分洩運河水勢反將有用之汰黄隄穵斷誠屬無益應停其挑穵將穿壊汰黄隄二處填築堅實以作黄河重門之保障於淮安地方大有裨益其各員應追銀兩追解河庫以備别工之用部議准題奉㫖依議河防志聖祖仁皇帝康熙四十一年二月二十七日總河張鵬翮題運口為糧艘轉輸要道初春運行之際在桃汛未發之前水尚未長漕運需水甚亟去嵗於石磡築草壩開渠引三汊河之水以濟運糧艘得以通行至桃汛水發即行堵閉今臣率道㕔等官再加相度與其每嵗開閉需用錢糧不若建造石閘相時啓閉不獨於漕運有益且省每嵗修築之資行據淮陽道王謙詳估工料銀二萬三千餘兩並無浮冒造具估册前來臣覆核無異不另請撥錢糧動支停挑王家營引河銀兩給發辦料興修除原册送部查核外理合具題奉㫖該部議奏部議准覆奉㫖依議三月十四日總河張鵬翮題酌復天妃閘以防黄水内灌將見存龍汪等閘拆修金門下板設遇水涸逓相啓閉蓄水濟運經臣題明將修閘事宜另疏題請部覆俟具題之日再議等因在案今據淮揚道參議王謙詳稱除龍汪閘見在另文議詳外唯是天妃閘舊基閘塘年乆深窪戽水難乾故樁碎石有碍下樁鋪底議於運口頭草壩迤北建造大石閘一座拆新莊閘石料添用以節省錢糧又東西各築縴隄一道即以挑引河之土築隄再於閘座上下穿開舊隄處所各建草壩一座以固隄東水共估工料銀二萬八千二百四十二兩並無浮冒冊估前來臣覆核無異相應題估奉㫖該部議奏部覆奉㫖依議速行十一月十六日總河張鵬翮題運河為糧艘經由要津山清寳應河道自惠濟祠後起至界首止已於康熙三十九年内經臣題估發帑挑穵工完現今沖刷寛深其界首迤下一帶河道向年湖河相連水勢甚大故未挑浚今六壩乆閉髙寳湖水消落運河水勢平緩上流所刷之沙聚積下流平緩之處河底未免淤墊恐重運未能利涉並應挑穵一律深通以利遄往茲據淮揚道王謙詳稱髙郵泥甸橋起至永安南裹頭止應挑河長四千九百九十五丈估挑面寛八丈底寛四丈深一丈並兩頭煞築攔河壩共估土方工料銀二萬四千餘兩委無浮冒册詳前來臣覆核無異但挑穵運河闗係𦂳要隨動支髙郵大工節省銀兩於囬空糧船過完作速閉壩挑浚一切進貢及差使官兵船隻仍照前過壩者聽其過壩起旱者即行起旱不得擅自開放俟來年新運糧船到時起壩開行除委監工督催并原冊送部查核外相應具疏題估奉㫖界首以下運河若極其淤淺有碍運道即照所題挑浚如漕船尚屬可行則挑浚著停止將此項銀兩留於𦂳要工程動用該部知道河防志聖祖仁皇帝康熙四十二年正月初一日摺奏界首以下河道康熙三十九年因湖水相連水大未能挑穵今六壩堅閉髙郵湖水消落運河流緩沙停江西湖廣糧船身重入水更深不無淺澀盤剥仍應遵㫖挑穵深通以利糧船遄行嚴催承挑人員晝夜疾儧巳於十二月二十六日完工二十八日開壩放水理合具摺奏明二月初二日聖駕南巡總河張鵬翮奉上諭駱馬湖竹絡壩口門宜留初四日總河張鵬翮奉上諭仲莊閘清水出口逼溜使南恐運口有碍應於陶家莊以下楊家莊處著挑引河令中河之水従此出口於運口有益雖楊家莊地勢低窪即使倒灌不過一二里清水仍然頂出著即相度形勢估計具奏仲莊石閘暫停初五日總河張鵬翮奉上諭禹王臺沭水由沭陽入海其沭河淤墊之處應勘明疏浚初七日總河張鵬翮在邵伯更樓奉上諭此地舊日被災形狀與今山東飢民無異豈朕今日觀此地安居景象而忘山東之飢民乎朕念運糧賑濟闗係𦂳要乘今日順風爾作速回清江料理轉運截留漕糧差官前往散賑距揚州十五里沙壩橋河道情形朕自細閲回鑾時面説與爾知之三月初二日總河張鵬翮奉上諭王公隄闗係運道民生最為𦂳要隄岸單薄樁工漸朽應再加幇以資捍禦不可因淤灘可恃而忽之也河防志是年十二月二十日大學士馬竒等奉上諭朕這次巡幸西省閱視汾渭俱屬大河直與黄河相通河南等處米石似可由黄河運送但聞三門砥柱水勢甚溜船不能上朕欲親往閲視因陜州知州奏無路徑斷難行走遂未果行命三貝勒同近御侍衞往看據回奏云伊等差人乗騎渉河一道閲有神人鬼三門俱係鑿石開通水從三門流出水勢甚寛水流甚溜古人於岸上鑿有拉船孔眼但未經以船試驗不知可否行走前總河靳輔亦曾奏黄河通於汴河但淤墊年乆若行疏導即可運米等語朕至河南閱河南府居各省之中水路四達最為𦂳要之地應於此處儲積米榖每年米榖豈能必皆豐收倘山陜等省間或收成歉薄即可將此積貯米榖修造船隻由黄挽運若到三門砥柱船不能上亦可於三門砥柱造船剝運以至山陜誠使河路疏通則商賈人民大有裨益所宜於無事之時預為籌畫者也豫省每年觧京漕糧二十萬石有竒若將豫省三年漕糧截留備用則陜西等省雖值歉收之年將此米榖運至彼處賑濟殊屬有益俟眀嵗遣大臣徃看河南管河道治河檔案聖祖仁皇帝康熙四十三年正月二十一日奉㫖著川陜總督陜西巡撫山西巡撫河南巡撫速行㑹勘確議具奏河南管河道治河檔案是年四月初八日總河張鵬翮奉上諭昨嵗西巡時總河張鵬翮迎至行在朕因山東河道衝決坍壊之處甚多曾命張鵬翮及時修理於新運漕船未到之時報竣至今曾否修完尚未奏聞著行文張鵬翮乘此無事之時親身速赴臨清察明臭題回時自中路兖州一帶察看東省人民目前情形及散賑有無實濟並二麥秀實如何著一一具奏是月總河張鵬翮奏明臣前往臨清一帶查看其間隄岸有去年大水漫缺之處巳經修補完竣利於縴挽漕艘通行仍飭地方印河等官將本管工程加謹修防以禦伏秋二汛奉㫖知道了該部知道山東兖寧道冊是年四月初九日川陜總督博陜西巡撫鄂山西巡撫噶禮河南巡撫徐潮㑹勘三門河路情形疏稱臣等伏惟我皇上功髙三古德冠百王軫恤軍民如同保赤經營庻政宵旰不遑去嵗䝉皇上俯念西疆要地并順軍民想望至誠不憚氷霜特賜巡幸由山西陜西以至河南簡閲軍旅諮訪民艱大沛恩膏蠲租錫賞費逾百萬臣等親隨扈從凡大小事宜無不仰䝉聖主指示三省臣民沾荷天恩均非淺鮮我皇上於巡視之餘洞悉天下地方形勢以河南府居各省之中水路四達山陜汾渭二河皆與黄河相接於此積貯米榖以備不時我皇上愛民念切凡稍有益於民生者睿慮經營纎悉必至恐三門砥柱船不能上特命臣等㑹勘確議具奏臣等欽遵諭㫖齊至陜州㑹同前赴三門親身查勘三門在陜州東北四十里兩岸石山鑿分三澗中流謂之神門水勢正溜南岸則為鬼門石崖曲折水更洶湧北岸則為人門水畧舒緩至三門之下約百餘步則有砥柱再其下二里許則有卧虎灘臣等用陜州船隻從神門放下空舟順流頗覺利便又従卧虎灘下挽舟上行因船方水溜又無舵無篷自辰至申僅止拽行半里臣徐潮先期以河南有篷舵之派子船令新安縣知縣張琦於二月二十四日從新安縣狂口地方坐船由澠池一帶溯流而上計程二百六十餘里此間水溜甚急如卧虎灘之險阻難行者共二十三處兩岸絶無縴道者甚多若遇順風則一日可行三四里逆風則坐守竟日無風而有縴路處亦可行二十餘里每船約用夫二三十名所以該縣於三月初九日始至三門卧虎灘臣等即將新安空船於卧虎灘下挽縴使篷乘風而上業巳從人門徑過又以船載糧三十石用夫三十餘名從上挽行自巳至未亦從人門過去兩岸晉豫人民觀者如堵其中父老皆云自有生以來三門河路未見行船今船由三門逆流直上此真為聖時盛事不勝賛揚臣等察看情形此路船隻自屬可行但溜急灘多水漲則無縴路行船未免艱難且每船載糧不過三四十石今上挽空船二百六十里行程十有七日若係重載則必至遲延多費人工需滯時日似此水運不如陸路剥運之便豫省漕糧截留於河南府備貯是誠經國聖謨於三省人民均有裨益應遵㫖舉行將河南漕糧即於該府加謹收貯若山陜需糧則竟由河南府陸路運至陜州西門外太陽渡上船計程厪三百餘里䭾送不過四五程車行止須七八日脚費更比河路減省至於汴河離三門砥柱六百餘里其黄河通於汴河淤墊年乆之處臣徐潮查明另題外再汾渭兩河雖現在行船不無淤墊或某處可用大船某處水淺應用小船或船隻難行應従陸路起剥相度河流製備船隻臣鄂臣噶禮查明另疏題報謹將臣等查勘情形三門一帶河路繪圖進呈御覽伏祈皇上睿鑒敕部議覆施行奉㫖九卿詹事科道㑹議具奏圖併發㑹議查得山西存倉米榖共九十五萬三千九百餘石陜西存倉米榖九十萬一百餘石甘肅存倉米榖共四十一萬六千六百餘石前項米榖現貯兩省者尚多若將豫省漕糧截留三年共六十萬餘石積貯年乆恐致浥爛虧空應暫截留四十四年起運四十三年分漕糧備貯此後漕糧仍行解京如有不足用之時該撫等題明再行截留其所截留一年漕糧二十餘萬石應嚴飭該府州縣加謹收貯毋致浥爛虧空如致浥爛虧空該撫及布政使以下各官俱照例處分仍將收貯數目咨報户部查核又陜西巡撫鄂疏稱渭河西至鳳翔東至潼闗由渭入黄由黄入汾可抵山西之平陽即或三門水溜客商不敢冒險而汾渭兩河可通舟楫㡬二千里然商賈多捨水路而就陸路者皆由陜西船隻方頭平底無舵無篷而水手又不善於操舟若逆挽拽日行止二三十里所以舟行者甚少臣同督臣博酌量捐資於江南等省僱覔造船良工熟練水手量水性造船使本地人演試如果可行民船亦照式修造倘遇歉收即可將商民船隻挽運等語又山西巡撫噶禮所稱汾河自河津縣起絳州止裝載一百石之船可以行走自絳州起至平陽府城以及洪洞縣止裝載五六十石之船亦屬可行惟是介休之義棠橋則積石纍纍灘多水急兩岸多山向無縴路自介休以至省城則在在淤淺若非秪遵諭㫖製造小船難以行走須用小船似應倣照􅤭船麻陽船式様製造移咨楚省酌調船匠水手數名來晉成造如果可行捐造一百隻交與本地水手看守豐年聴其攬載倘遇歉收即於汾河接運漕糧等語又據巡撫噶禮疏稱隨即預造有桅有漿之小船三隻内一隻可裝糧四十石一隻可裝糧三十石一隻可裝糧二十石在於汾河内詳加演試自省城以至介休之義棠橋又自義棠橋以至趙城縣小船俱可行走其自洪洞以至平陽府城自平陽府城以至接運黄河之河津縣止可行走等語均應如該撫等所題准其照原題捐造船百隻以備挽運其汾渭兩河有積石無縴路並淤墊之處令該撫等不動正項錢糧設法修治又河南巡撫徐潮疏稱汴河故道一由中牟縣東經祥符等州縣至永城縣出境厯江南省之宿州而達於淮乆矣湮塞皆成陸地一由中牟縣東南經朱仙鎮至沈邱縣出境厯江南省之太和縣而達於淮係元臣賈魯修濬今名賈魯河現在流通應於淤淺處量加挑浚等語又稱賈魯河河身之外尚有支河貼近黄河止隔一隄地名花園康熙十年曾掘開䕶隄放運栁船以入黄河事畢堵塞今花園塌入黄河人民徙居於南名為新莊若從新莊挑浚建閘設壩以時啓閉便可開入黄河由黄入洛而通舟楫等語均應如該撫所題不動正項錢糧設法將賈魯河淺處挑浚并従新莊挑浚建閘設壩以時啓閉便可開入黄河以通舟楫仍令該撫及地方汛官不時防䕶其工程丈尺造冊報部查核可也奉㫖依議河南管河道治河檔案里河南府至陜州太陽渡水路計程四百五十中有淺灘約數十餘處縴路雖窄儘容牽纜止澠池一帶縴路年乆問有塌卸閲視澠池以下河流頗緩下水船可載三百餘石上水半之澠池以上河身漸髙灘水愈迅雖有縴路僅可挽數十石之舟至砥柱而上河中大石分峙列為三門神門本無縴路若小舟乘東南風猶或可上鬼門水勢最為洶湧從未見有行舟唯人門之水稍緩石崖鑿有縴路縴路之上排列鑿有方眼約離二尺其上三尺又鑿有石鼻約離丈餘詢之土人俱稱不曉臣愚揣石鼻可穿鐵索縴夫援手以著力方眼之設石路滑潤裝木限以助足力亦未可知臣將本地小方船令從人門放空而下亦覺平穩復令從下流輓上人門因湍急退下砥柱自午至申仍由人門而上盖船方頂溜併無桅舵人又不善操舟故也揆此則厯代輓運之蹟猶存誠如聖諭再太陽渡至西安府河水平穩船可通行俱有輓運路徑並繪圖奏上又議運糧之法河南府至陜州之三門一帶河道現在無可覔之船謹議以河南府至陜州太陽渡陸路計程三百五里今運榖二十萬用車裝運計程五日可到每車裝榖八石毎日給脚價三錢五分沿途州縣逓運以惜牛力共需車脚銀四萬三千七百五十兩自太陽渡至西安黨家馬頭水運為便毎石給水脚銀錢三分共需銀二萬六千兩自黨家馬頭至西安府陸路毎石給車脚銀二分共銀四千兩共裝榖口袋照依河撫原議定價三萬兩置備以上通共需銀十萬三千七百五十兩脚價統於豫省支銷抑臣更有請者運榖二十萬石止得十萬之米其一半盡屬糠粃徒費脚價無益合令以二榖易一米起運則脚價更省一倍矣此總漕施世綸行述中所載備録之以資參考江川陜總督佛倫上籌秦疏言湖廣襄陽府有自襄進小江口通於陜西商州龍駒寨水路一道自襄陽府至小江口二百四十里襄江大船載運毎船可八九十石至百石自小江口換小船至河南淅川縣荆子闗二百餘里毎船可四五十石又於淅川縣換小船至陜西商南縣徐家店二百餘里河狹灘多每船可載七八石自徐家店至商州龍駒寨二百里此段水路多灘險毎船可載五六石至龍駒寨巳上不通舟楫龍駒寨至西安府相距四百餘里中間有秦嶺藍闗七盤等嶺則係嶺路有百里許臣唯小江口至龍駒寨雖係山河亦古來轉運河道但近代乆不行運恐河道間有淤廢若此運道果能廣運楚米至龍駒寨積貯較之陸路輓運殊為便易龍駒寨至省城不遠所積糧㫖米自可隨時調度以備不虞奉下九卿議覆准奉㫖命内閣學士德珠往㑹同查勘此居易錄中所載并附録之以見西北未嘗無轉運之道也是年十月十三日濟寧道張伯行為請築汶河隄岸以衞民田以救民生事竊照康熙四十一二兩年寧陽汶上濟寧滋陽魚臺滕縣嶧縣及江南之沛縣徐州邳州連遭水患者皆由於汶河隄岸不修之故也查寧陽汶河南岸有石梁口最稱險要厯來各州縣之所被水者皆由於此至四十一二兩年為害更烈而汶河南岸之沖決者又不止石梁一口也又有桑家等口俱經沖決淹沒之慘較往倍甚今年雨水稀少幸未沖決然而不可恃也本道於九月間親往查看見隄工甚是單薄直係頂沖而離隄數十丈内有髙阜之地可以加築越隄又見石梁口上下隄岸殘缺甚多若於石梁口内添築越隄再於桑家等口堵築堅固又於沿河一帶隄岸加幇髙厚不惟寧陽不受水災而汶上濟寧滋陽魚臺滕縣嶧縣及江南之沛縣徐州邳州俱䝉寧陽之福矣盖石梁等口一開先淹寧陽次及濟寧滋陽汶上漸至魚臺滕縣嶧縣而並及於江南之沛縣徐州邳州是此十數州縣之被淹皆由於寧陽石梁等口之沖決也夫堵築石梁等口加幇汶河隄岸非有浩大工程難以奏績也為功甚少而造福無窮従前皆因循誤事逮至沖決即欲補救而巳無及矣直至十數州縣被淹之後而始行堵築則何益矣若及今不早為修築將來山水發時勢必仍屬難免祈憲行司轉行該府令其嚴飭該縣將石梁口加修越隄桑家等口堵等堅固沿河隄岸加幇髙厚並嚴飭汶上縣令其照依寧陽加幇汶上隄岸庻水不為害而寧陽汶上濟寧滋陽等十數州縣之民均免水患淹沒之害矣又為詳明南旺大小挑之定制以利漕運以蘇民生事案查宋尚書祠記云用白英計作壩戴村横亘五里遏汶水令盡出於南旺乃分為二水以其三南入於漕河以接徐吕以其七北㑹於臨清以合漳衛此定制也其三分往南者盖以南有府河泗河洸河並馬塲獨山南陽昭陽㣲山各湖又有彭家口大泛口二河其餘諸泉不可勝數此所以三分往南而不患其水少也不知始自何年今竟改為七分為南矣惟其七分往南所以毎逢雨澇之年濟寧魚沛一帶民田在在淹沒今議仍改為三分往南民田得免淹沒之患矣其七分往北者盖以北止有安山一湖以為之接濟所以七分往北而不患其水多也不知始自何年今竟改為三分往北矣惟其三分往北水勢甚微而安山一湖又經招租起科無水接濟所以每逢亢旱之年東昌一帶在在淺阻今議仍改七分往北庶糧船無淺阻之患矣呈院院批據詳南旺水勢今改為七分往南三分往北等語始於何年改自何人水之分數有何憑據未經聲明又云今議仍改七分往北等語查安山湖乆涸民佃起科無水濟運故旱年東昌一帶有膠舟之患今作何開引河導水作何修閘壩蓄水濟運未據籌畫指陳遽云改七分往北何其言之易也仰道率府㕔州縣印務等官虚心勘議明確果可見之施行勿為紙上空談即定議通詳如無定見慎勿紛更薈蕞云按宋尚書用白英老人計築戴村壩遏汶流使無南入洸而北歸海滙諸泉之水盡出汾上至南旺中分之為二道南流接徐沛十之四北流達臨清十之六所謂水脊也見明史稿宋禮傳明㑹典亦云然則是四分往南六分往北矣唯靳輔重修宋康惠祠記有云南旺分水三分濟南漕七分北㑹臨德合漳衛之語張公所云木此又為詳明閘座之制以便遵守事竊查栁林為南旺上閘十里為南旺下閘山東一千餘里之運道其闗鍵總在於南旺則南旺之所係為最要也查南旺以南接濟之水甚多南旺以北並無涓滴之水助運則栁林閘與十里閘正未可等視也今議將栁林閘為界水閘則使汶河之水盡濟北運而南運則用府泗等河馬塲湖之水以濟之其要在栁林閘之啓閉宜嚴也尋常有水之時十里閘與栁林閘照舊啓閉無容分别一遇北河水小之時將栁林閘板嚴下十里閘板盡啓使水盡往北行若汶河水長兩閘仍舊下板使水俱由斗門入南旺湖蓄以濟運迨至水勢盛大之時則啓十里閘板而栁林閘板仍行嚴閉使水由彭石口孫强口劉賢口入南旺湖若水漫過栁林閘板仍將寺前舖閘板嚴下使水由張廂口盛進口焦鸞口入南旺湖是以栁林閘為界水頭閘寺前舖閘為界水二閘總使汶河之水專濟北運不令南行也而又用蜀山湖之水出分水口以濟北運用馬踏湖之水出新河頭宏仁橋以濟北運又用南旺湖之水出闗家大閘五里舖滚水壩以濟北運則北河之水自不至於太小而東昌一帶糧船自無淺阻之患矣如或謂南旺之水盡濟北運栁林閘下不慮水小乎不知若遇栁林閘水小再將十里閘板嚴下將栁林閘板酌量啓閉而南河亦不患無水矣總之必須南旺閘官汶上主簿小心謹慎啓閉得宜方克有濟詳院批春夏汶水微弱運艘淺於南則閉南旺北閘以濟之運艘淺於北則閉南旺南閘以濟之以智役水臨時酌之此潘公之成法也今年五月臨清水小倣此法行之而東昌迤北運艘得以魚貫而下以運艘盡過南旺故栁林閘可乆閉也今詳稱水大嚴閉栁林閘使水由彭石等口入南旺湖若水漫栁林閘仍嚴閉寺前閘使水由張廂等口入南旺湖等語但運艘盛行之際閘閉不便日乆且水既漫閘則南旺湖水亦大若南北二閘同閉不惟湖不能納且恐有衝突之患不可不慮之周也又云蜀山湖水出分水口馬踏湖水出宏仁橋南旺之水出闗家大閘五里舖滚水壩俱濟北運等語各口閘壩現在果無殘缺可以開放開時果於運道民地兩有利乎尚須勘議妥當勘明確議詳奪居濟一得行水金鑑巻一百四十
