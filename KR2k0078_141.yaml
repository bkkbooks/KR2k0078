body:
  text: 行水金鑑卷一百四十一江南按察使傅澤洪撰運河水聖祖仁皇帝康熙四十四年聖駕南巡駐蹕三月十一日奉上諭運河東隄保守最為緊要隄岸應行加幫髙郵迤南河水髙於湖水東西兩隄卑薄應加幫修砌量建石工揚河廳册是年閏四月十一日聖駕臨幸惠濟祠石工召總河張鵬翮淮揚道張弼等大學士馬竒等跪於河干奉上諭朕三十八年閲河爾等所跪之處俱屬黃水今清水暢流逼黃竟抵北岸僅成一線朕心甚為快然觀此形勢朕之河工大成矣髙堰山盱二廳册此條互見淮河是月二十一日奉上諭戴村壩遏汶水出南旺分濟南北運道關係緊要著總河巡撫各差官前往看視總河張鵬翮會同山東巡撫飭行分巡濟寧道僉事張伯行分巡東兖道副使蕭會看得戴村壩工遏汶水出南旺分水口分流濟運所關甚重祇緣年嵗久逺水中殘缺壩工裹頭俱宜修葺若令徹底拆修工程浩大需費浩繁東省又無動帑之例且現今汶河淤髙河砥與壩面相平拆修必多更改未敢輕議今議就現在之壩照依舊制量加修理缺者補之矮者髙之零亂者整齊之裹頭石塊亦照舊壘砌髙堅務令束水濟漕不致旁泄除泉夫在工力役外需灰十萬斤匠役二千工共需銀一百八十兩本道等倡率廳州照數公捐應用上不動帑下不纍民實于壩工有濟詳院會題凖行又為辨明事行河工效力二載有餘尋補山東濟寧道有臺臣樊一疏為請陳東省湖閘情形等事行不能無辨焉據疏稱查運河修工始於戴村壩引汶水一支由東平而南遞汶邑西以抵南旺即分水龍王廟是也查永樂九年宋尚書用白英計分水南旺築壩戴村橫遏汶水南流會通河始得濟運每水潦則掘坎河口以殺之不足則開滚水壩又不足則開減水諸閘或順之入海以披其勢或蓄之入湖以納其流水微則盡塞使餘波悉歸於漕此戴村壩所由來也既築壩戴村遏汶水入海者注之南旺水無旁泄留坎河口不壩以備分泄入海每重運過時用刮沙板作一沙壩于坎河口涓滴盡趨南旺若水長則連沙衝出坎河後河身漸移近坎河口全河之水直灌坎口故土壩嵗築嵗決每嵗勞費不資且全流漫衍而入鹽河南旺每至膠舟萬厯初侍郎萬恭疊石為灘十七年總河潘季馴築石壩四十丈髙三尺水髙於壩漫而西出漕無溢也水卑於壩順流而南漕無涸也二十一年水大發尚書舒應龍又於河口之下開渠泄水故於兩旁各築石堰以防衝刷當石壩未築之先主事佘毅中議建欲為經久之計莫若連建數閘以時蓄泄如堽城閘之制蓋堽城可閘則坎河亦可閘也其後主事張文竒又議仍築土壩計每嵗之費大約不踰百金且水直衝坎河則上源之勢既殺而下源之勢稍微王堂諸口不致盡決汶邑民田得免淹沒以利害計雖嵗有數十金之費利倍於害矣夫以佘毅中言之則當建石閘此一勞永逸之計也以張文竒言之則宜仍嵗築土壩此補偏救弊之説也建石閘則工大而費繁築土壩則力省而較易然近日東平汶上之所以被水者以石灘石壩僅百丈耳夫以汶水全河之勢而恃此百丈之壩以泄之且過三尺而始泄之石壩既窄土壩又髙所以蓄水既髙則汶上被淹及其衝決坎河則驟水所經而東平亦被淹所謂川壅而潰其傷必多也為今之計建石閘則酌奪啓閉固屬萬全即嵗築土壩亦無不可而獨是築土壩宜準石壩之制而稍髙尺許使水小之時則全蓄以濟運水大之時則任其衝決一俟水落或霜降後即為修築庶汶上東平兩不受害矣或曰為汶上計則得矣東平以百丈之壩而猶不免于淹沒今曰土壩準石壩之制水大則任其衝決東平之受害不更甚乎豫曰不然東平之所以受害者以土壩既髙蓄水日甚一經衝決則驟水所經而民田乃被其害也若曰土壩卑則東平被淹然當日未分水南旺之時全汶之水盡由鹽河下海亦未聞東平之受害若何也今南旺既分一半而東平又慮其淹無是理也此戴村壩坎河口之大較也據疏稱又恐汶水一支不足濟運爰導諸泉使之同歸運河然孟冬挑淺汶無所注仲春重運河無所資終未盡善再查運河之東有二湖北曰馬踏南曰蜀山皆在汶邑境內所以停蓄諸水漕艘備至則次第開放以濟運道之不足土人名曰水匱運河之西有湖曰南旺亦在汶邑境內挑淺則由斗門撒水以入於湖或河水湧溢則開斗門泄水亦歸於湖此其大槩也但既曰孟冬挑淺汶無所注而又曰有馬踏蜀山二湖所以停蓄諸水非汶之所注乎既曰仲春重運河無所資而又曰漕艘備至則次第開放以濟運道之不足非即河之所資乎據疏稱從來雨澤水勢常不足於冬春而盛於秋夏故於秋夏之交汶水迅發勢如黃淮兼之泉流合聚諸泉洶湧攜汶勢而並注於湖湖不能容因而洋溢民田罹災矣查南旺之北原有何家滚水石壩又有王堂口水大則從此泄入石頭口等處入運河南旺之北又有新河頭泄馬踏湖水以入運河是既有以濟北運而南亦不至於泛濫也蓋南旺以南如馬場湖府河泗河硯瓦溝磨鐮溝蜀山湖南陽湖昭陽湖微山湖彭口大泛口其餘諸泉不可勝數濟運之水不患其少也南旺以北舊止有安山一湖而今盡成民田張秋以南沙河棗林河亦係濟運而今盡淤塞是南旺以北無涓滴之水以濟運也有餘之水宜泄於北而不宜泄於南者也為今之計何家石壩當為修整王堂口宜建石閘一座伏秋遇汶水盛大則開放以泄之春夏之交遇運河水小則開放以濟北運蓋重運一過南旺則栁林閘嚴行封閉使南旺蜀山馬踏三湖之水由龍王廟往北而汶河之水則由王堂口往北入運則南旺以北之運河自無膠舟之患矣據疏稱昔人計出萬全於蜀山湖之南置滚水壩於南旺湖之西南建忙生閘遇水勢泛漲越滚水壩以達濟寧之西湖由西湖以入於河自河以入於南旺湖湖滿水溢則開忙生閘入牛頭河厯南陽等處下抵海口其時流順瀾安運通而民田無恙夫曰越滚水壩以逹濟寧之西湖由西湖以入於河其説是矣又曰由河以入於南旺湖夫西湖之十里閘安居閘皆入運河者也其去南旺尚有五六十里不知何以能逆流而上以入於南旺湖也此行之所不解也據疏稱後世不師古人懷私自利髙築滚水壩蜀山之水無出路矣堵塞忙生閘南旺之水無所泄矣查滚水壩雖髙築而利運閘巳建蜀山湖之水未嘗無出路也忙生閘雖經堵塞而十字河已經開通南旺湖之水未嘗無所泄也但堵何家石壩王堂諸口使水涓滴不向北流而又建利運閘以放蜀山湖水開十字河以放南旺湖水使水盡往南行此則運河廳任同知之懷私自利者也蓋南旺以南為運河廳境而南旺以北則漸至捕河廳境矣止顧一境不慮全河運河同知任璣誠有不能辭其責者矣據疏稱湖水猛溢蜀山之北如平原顔氏次丘及汶城東北一帶村落南旺之西北如宋家窪大屯小屯一帶屯莊盡行淹沒雖數日之內水順河下不致久停然近湖之地如宋家等窪民田數千百頃至今二十餘年汪洋浸瀚無一可施犂鋤查平原次丘俱在汶邑西南而其所以被淹者以何家石壩堵塞王堂諸口不能泄水水不北行自必向南此其所以被淹也而顔氏一村又與宋家窪等屯俱在汶邑西南其所以被淹者以南旺湖隄二十餘年不經修補故也夫南旺湖隄舊係民修今嵗見百姓災荒故令運河廳蘇稷督汶上縣主簿劉聲浩率淺夫於今春已經修補完竣而宋家窪一帶之紳襟士民於今夏又經加髙加寬而南旺湖之水已不得過宋家窪宋家窪二十餘年不施犂鋤之地巳漸耕種殆盡矣使早修湖隄又何至淹沒二十餘年乎查南旺湖原有關家大閘口在十里閘下又有五里鋪滚水石壩在關家大閘之下皆泄南旺湖之水以濟北運者也數十年關家大閘巳廢壞無存矣五里鋪滚水壩又經堵塞矣此二處不以泄水而乃開十字河使南旺以北每逄天旱之年處處膠舟而南旺以南無論旱潦處處淹沒二十餘年不得耕種如宋家窪濟寧南鄉魚臺沛縣滕縣各處又何止數千頃哉自今歲閉利運閘堵十字河嚴下栁林閘板盡啓十里閘板開新河頭使水盡向北行所以宋家窪濟寧南鄉魚臺滕縣沛縣各處俱經耕種而南旺以北重運亦得遄行並無淺阻之患矣且又令疏關家大閘引河並令疏五里鋪滚水石壩引河將來仍開關家大閘滚水石壩使南旺湖水仍向北行出兼濟閘濟運而忙生閘無容議開矣且宋家窪之水又自有路也查宋家窪以北原有引河一道由開河閘下兼濟閘入河既得以濟北河之運又以泄民田之水今俱經淤塞已飭令運河廳及汶上縣主簿且勸諭一帶鄉民照舊開通矣據疏稱曩經具詳指畫區處同濟寧嘉祥會勘無如行而復止謂事可行於古而不可行於今夫自古迄今水性有不就下者乎忙生閘乃牛頭河之北口自前運河廳任璣堵閘令淺夫多收掃草遂將忙生閘水道不行漸至壅阻夫濟寧嘉祥之受水猶之汶邑也汶邑之水南下濟寧嘉祥先受其害矣在汶邑顧汶上之百姓而濟寧嘉祥獨不顧百姓乎至於忙生建置諸書無考想任璣之意以為昔日由牛頭河行運開忙生閘所以濟運也今牛頭河既不行運故將忙生閘堵閉開十字河放湖水入河以濟今運此亦為運道計而非必有他意也但不知南旺湖之水宜開關家大閘五里鋪滚水壩以濟北運而不當開十字河以濟南運使南旺以南一帶之民田受淹也何也南運原未嘗缺水也據疏稱疏浚牛頭一河疏浚之事亦不過令沿河有田之民髙者平之水草芟之湖水一泄隨河而南則湖河不致倒溢民田不致淹沒矣查前會題疏內原令地方官各縣修築各縣隄岸各縣疏浚各縣河道俱令各縣疏浚各縣牛頭河並未嘗令其不行疏浚也今宜據此再行嚴飭地方官令沿河有田之民速為疏浚無致再淹民田據疏稱山東撫臣彚題兩閘一開濟寧之水一泄無餘抑何其言之不經也閘所以司啓閉備蓄泄也蓄泄因時啓閉由人何至一泄無餘查宋尚書挑河之始原深三尺數百年來河底漸淤加以隄土淋漓運河之底髙於牛頭河底一泄無餘又何足怪乎若曰閘所以司啓閉備蓄泄也是矣但司啓閉者亦必有官備蓄泄者亦必有人信如是也則閘官閘夫又當添設不多此一費乎且南旺湖往北既有關家大閘又有五里鋪滚水壩濟北運往南又有十字河放水濟南運今必欲開忙生閘將閉十字河而不濟南運乎况一開一閉不又多此一畨更改乎無論其不必更改也即使開忙生閘泄盡南旺湖之水既有妨於漕運果何益於百姓且失百姓魚藕菱蒲之利矣夫南旺為四大水匱之一原係蓄水之所今不用以蓄水而使之出忙生閘入牛頭河則以有用之水置之無用之地且驟水所經而牛頭兩岸如嘉祥濟寧魚臺之民田受害將無窮也即曰牛頭河之水原有南陽湖昭陽湖入微山湖下抵海口獨不思徐州迤西九十里無隄岸伏秋水漲漫入微山湖且將逆流而上逼微山湖水使往北行而牛頭河之水又安能獨向南行乎是開忙生閘徒見其有害而未知利之何從也據疏稱如督撫所題使兩閘永塞諸邑永困非所以安民生而利運道也再為秉公細查思當日所以設閘之意並訪後來閉閘之害如其按形查情則必復滚水壩開忙生閘浚牛頭河以利運道者利民生查全河考云忙生閘係泄湖水入永通閘牛頭河由魚沛運河而下者近年魚沛水盛南泄不多常苦滙積濟寧東南之境是在當日巳淹濟寧矣且開忙生閘亦止可以泄南旺湖水而不能泄宋家窪水蓋湖隄間隔宋家窪水固不能入南旺湖又何由而出忙生閘乎若夫馮家滚水壩前開後閉皆非無故查馬場湖原受蜀山湖之水故開馮家壩引水東流又於馬場湖東五里營建湖隄一道以禦之又於五里營西建閘一座十里鋪建閘一座安居建閘一座放水濟運是馬場湖原受蜀山湖之水而不受泗河之水矣泗河之水原由楊家壩至蓮亭門前入河濟運楊家壩在濟寧城東泗河之水貫兖州西流合洸水同經此口南入運道原未嘗設壩正德間因劉寵之亂築壩引水西繞以為濟城外護始有壩基自明季崇禎十七年流冦猖獗東省震動於是復築此壩障水護城至今未改泗洸之水為此壩所遏由夏家橋入馬場湖濟運後又將馮家滚水壩堵築使蜀山湖之水不至馬場湖自此以後馬場湖止受泗河之水而不受蜀山湖之水矣數十年來府河淤塞泗河之水亦不能至馬場湖湖地盡皆涸出姦民俱經盜種矣故在今日宜將馮家滚水壩西另建蜀山湖隄一道以禦蜀山湖之水再將府河大加疏通使依舊寬深兩岸築隄束水引水至馬場湖又將馬場湖西至馮家壩之舊河大加開通引水至馮家壩又將馮家壩改閘一座外挑引河一道放水至大長溝西頭入河濟運再將獲麟古渡建閘一座蓋獲麟古渡即今之大長溝擺渡口是也在昔馬場湖受蜀山湖之水水從西來故宜由安居閘十里鋪閘五里營閘放水濟運今馬場湖不受蜀山湖之水而受泗河之水矣故馬場湖之水不宜由五里營閘十里閘安居閘放水濟運而宜由馮家滚水壩至大長溝西頭入河濟運矣如此則泗河之水始得以濟南運而汶河之水口又不宜在南旺而宜改於五里鋪矣水口既改使汶河之水由湖入河運河不至淤墊可以不必挑穵即使挑穵兩岸平坦施功甚易亦不至如南旺兩岸如山工夫百倍也如此則用泗河之水以濟南運用汶河之水以濟北運則濟寧以南既可免淹沒之患而東昌一帶亦不至有淺阻之虞矣此誠萬全之䇿也馮家壩所以障蜀山湖水而滚水壩所以泄蜀山湖有餘之水者也若任璣所建之利運閘則並蜀山湖砥之水而亦泄之矣宜將利運閘永行堵塞重修滚水壩使水由大長溝西頭入運以備蓄泄此古制不可不酌復者也據疏稱南旺湖泄運河之湧盛非蓄水以備用湖心髙於河身湖水即泄何涉於河又何至有妨於濟運之水等語查宋尚書經理運河既成又恐泉水不足設四大水匱以濟之在汶上曰南旺湖在濟寧曰馬場湖在東平曰安山湖在沛縣曰昭陽湖即以南旺湖言之十里閘下有關家大閘所以放水濟北運者也再下有五里鋪滚水壩亦所以放水濟北運者也南有濟運閘所以放水濟南運者也今但開何家滚水壩王堂口使水往北行而南且不淹矣且開馬踏湖之新河頭𢎞仁橋以泄馬踏湖之水而蜀山湖之水亦可由馬踏湖而泄之也總之為民生計而忙生閘不當開為運道計而忙生閘愈不當開若曰汶上被淹獨不思雨潦之年濟寧魚臺皆不免淹沒之患乎然而南旺以南每苦於民田之淹沒南旺以北每苦於膠舟之難行者則又有故也查宋尚書分水原係往南三分今則往南七分矣而又開利運閘以放蜀山湖之水又開十字河以放南旺湖之水南旺以南焉得而不淹乎原係往北七分而今則往北三分矣而又將關家大閘五里鋪滚水壩堵築矣南旺之水不能濟北運也又將𢎞仁橋新河頭閉塞矣馬踏湖之水不能濟北運也南旺以北又安得而不淺阻乎今巳開新河頭矣𢎞仁橋巳行疏通矣關家大閘引河現在疏通矣五里鋪滚水壩亦將開放矣如此則南自不至淹沒北自不苦於膠舟諸邑又何至於永困乎行到任未久二十餘年淹沒不能悉知但就今年言之平原次丘顔氏大屯小屯麥俱全收秋亦全收並無淹沒之患若曰今年天旱故得收成豈從前二十餘年盡係雨潦之年乎即今現在平原次邱顔氏大屯小屯早麥俱經種完晚麥現在播種即在宋家窪砥未種餘巳俱經耕種矣又何至於永困乎汶上不至永困而諸邑又何至於永困乎然而諸邑之所以被水者又有故也查尚書宋禮聽白英之計改河南旺後以微過蒙督責方以儒巾治事未幾奉命取材川蜀其一二未竟之緒至平江伯陳瑄始成之是宋尚書之改河原未竟也舊運河引汶水一支出堽城閘由洸河入濟寧始得濟運而於堽城閘下建堽城壩一道中留七空如閘制然亦係下板遇冬春之際汶河之水俱係清流閉堽城壩開堽城閘引清水濟運一遇夏秋之交山水泛漲沙隨水行則閉堽城閘開堽城壩使濁水向鹽河下海洸河不至淤墊而濟寧塘河未聞嵗嵗挑穵也此古人之制度盡善盡美無復遺憾者使宋尚書得終其事改河既完自必倣堽城壩之制以建戴村壩倣堽城閘之制以建戴村閘南旺運河分水口上流亦如洸河之制止納清流而不納濁流則南旺塘河沙不得淤亦可免嵗嵗大小挑之費矣無奈改河未成而去而平江伯又不求其盡善遂貽後世無窮之害雖萬恭壘石為灘潘季馴築石為壩總不出馬之貞所逆料之貞謂石壩能走水不能走沙沙漲淤平與無堰同斯言誠是也為今之計惟有坎河口石壩之下將戴村壩北頭倣堽城壩之制亦留七空如閘制然現今汶河俱是流沙不能建閘而又於東岸擇土性堅實之處倣堽城閘之制建閘三座即於南北各開引河一道使水由閘而行然後將往南旺之汶河築土壩以堵之遇冬春水小之際閉壩開閘納清以濟運如伏秋山水大發之時則閉閘開壩放濁流以入海則南旺之塘河止納清流而不納濁水自不至於淤墊矣即曰分水口以上現今河淤勢必歸塘河一時不能免於挑穵然而用工亦少矣是萬世之利也或曰今兩河分流而東平仍嵗受水患若將戴村建閘遇河水大發將閘嚴閉使水盡由鹽河下海東平州不更虞淹沒乎獨不思古時未有堽城閘未有洸河之先汶水盡由鹽河下海東平州何以不淹也未有分水南旺之前汶水盡由鹽河下海東平州又何以不淹乎然而東平之所以被水者亦有故也河底沙淤日髙而鹽河兩涯又無隄岸此其所以被淹也今惟添築鹽河兩岸隄工而又加幫汶河兩岸隄工則水有所束諸邑俱可以不淹矣此又一勞永逸之法也居濟一得是年總河張鵬翮奉上諭地方官膜視河工致有貽誤爾題參到日將地方官處斬以示懲戒又奉上諭直𨽻山東河道與總河相距甚逺應照河南例各交該省巡撫就近料理山東兖寧道册行水金鑑卷一百四十一
