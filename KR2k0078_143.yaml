body:
  text: 行水金鑑卷一百四十三江南按察使傅澤洪撰運河水國家朝祭之需以及百官之匪頒六軍之餽餉皆仰給於東南漕渠之攸繫綦重矣前代海運有風濤之險由黃河轉運則逆流而上經吕梁洪至鎮口三百餘里不勝艱阻而運道之興廢聚議棼如我皇上睿謨周詳區畫盡善闢清口濬中河以利運道江南浙江江西湖廣等省之漕運於水次受兊後依限開幫經長江進瓜儀入揚州運河銜尾過淮俱出清口進中河由山東泇河厯濟寧東昌臨清德州天津以逹通州俱從運河利涉早登倉庾國用充足既無海運風濤之險又避黃河溯流逆挽之患古來運道之善莫踰於此誠萬世永賴之鴻模矣以下俱河防志通州香河武清薈蕞云通州在京城東四十里秦屬漁陽郡漢置潞縣以潞河得名後魏置潞郡唐五代遼皆為潞縣金為通州取漕運通濟之義至今不改香河縣在京城東南一百二十里西至通州界十五里南至武清縣界二十五里唐之武清縣也遼置香河縣黃山北聳白水西來縣南四十里為龍灣又南為小龍灣遼之運河也武清縣在通州南五十里東至寶坻縣界五十五里漢為雍奴縣隸漁陽郡唐為武清縣至今因之縣南有三角淀周匝二百餘里或云即古雍奴地也水經云雍奴者藪澤之名三州縣運河其北自白河富河在通州城北石壩處合流四十里許至張家灣薈蕞云灣在通州南即白河下流舊有張氏族大居此故名而通惠桑乾諸河入焉南流至天津出海所謂潞河也亦稱白河自通州石壩起至天津衛交界止計程三百四十二里設有楊村通判一員管理河務通州河道北自本州石壩起南至香河縣交界止計程一百一十五里運河隄岸自龍潭口起至白浮圈下老隄頭止計長八百二十七丈康熙三十三年修築香河縣河道北自通州交界扳罾口起南至武清縣交界紅廟村止計程三十一里運河隄岸官修長四百一十六丈民修長三百一十九丈武清縣河道北自香河縣交界紅廟村起南至天津衛交界望海寺止計程一百九十六里運河東岸隄工二十號第一號東耍兒渡口隄長一千九百一十丈康熙三十四年六月內被水衝決修築三十七年又修造水隄五百一丈二尺三十九年六月內又衝坍四十年二月內修築第二號八百戶口隄長九百六十五丈係舊隄第三號十百戶口隄長九百七十丈係舊隄第四號東黑龍口隄長六百四十八丈係舊隄第五號四百户口即小王家甫隄長七百丈康熙三十五年衝決修築第六號三里淺口隄長一千四百一十四丈康熙三十二年六月內衝決三百五十五丈三十三年二月內修築第七號北蔡村口隄長八百六十七丈康熙三十四年六月內漫開十二丈五尺三十五年四月內修築第八號桃源口隄長九百六十丈係舊隄康熙三十九年五月內漫開奉上諭此隄離河逺不必修築第九號筐兒港隄長一千一百七十八丈七尺康熙三十六年三十八年並被水衝決三十九年二月內奉旨另開新河築隄兩道第十號徐官屯口隄長一千八百丈康熙三十五年八月內衝決三十九丈五尺三十六年修築第十一號東竇家口隄長六百一十丈康熙三十九年五月內漫開四十年四月內修築第十二號承安口即閻王廟口隄長七百六十丈康熙三十二年六月內衝決四十五丈三十三年二月內修築第十三號朱龍口隄長二百六十五丈康熙三十五年八月內漫開六丈本年九月內修築第十四號閻家灣口隄長一千八百九十丈康熙三十九年五月內衝決本年九月內修築第十五號孫明口隄長一千八百丈康熙三十九年五月內漫開本年九月內修築第十六號白馬灣口隄長一千四百四十丈係舊隄第十七號閻洪口隄長九百丈係舊隄第十八號張官屯口隄長六百三十丈康熙三十五年八月內漫開九十二丈三十六年七月內修築第十九號小新流口隄長九百丈康熙三十五年八月內漫開五十一丈五尺三十六年十月內修築第二十號信艾口隄長七百二十丈康熙三十五年六月內漫開七十五丈修築西岸隄工二十四號第一號沙河李家口隄長七百七十六丈康熙三十四年六月內衝開一百四十八丈三十五年修築第二號閻家口隄長三百一十丈係舊隄第三號車營口隄長五百四十四丈係舊隄第四號劉吉口隄長一百四十一丈係舊隄第五號棉花市口隄長七十三丈係舊隄第六號鐵牛口隄長十八丈係舊隄第七號西耍兒渡口隄長四百三十二丈係舊隄第八號白廟口隄長八百五十二丈係舊隄第九號西黑龍口隄長八百一十丈康熙三十五年八月內漫開八丈五尺三十六年九月內修築第十號黃鬚口即傅官屯隄長一千一百五十丈康熙三十三年六月內衝決八十三丈三十三年二月內修築第十一號西王家甫口隄長一千六百一丈康熙三十五年八月內漫開八丈五尺三十六年六月內修築第十二號灰堝口隄長一千一百二丈五尺係舊隄第十三號聶卞官屯口隄長一千二百一十五丈康熙三十五年八月內漫開二十八丈三十六年七月內修築第十四號白駒厰口隄長一千八百丈康熙三十九年五月內漫開四十年特發帑委官修築第十五號鄭陳官口隄長九百三十丈第十六號梓宫􅞇口隄長一千二十一丈第十七號王才口隄長一千三十丈第十八號西竇家口隄長八百一十丈第十九號馬家口隄長一千九百八十丈第二十號劉灤口隄長一千六百二十丈第二十一號蔡家口隄長二百二十丈第二十二號桃花口隄長三千二百四十丈第二十三號毛家口隄長三百六十丈第二十四號李家口隄長七百二十丈俱係舊隄白河源出密雲縣霧靈山南流過順義縣入通州境至北關外石壩處與富河會流是謂潞河按志霧靈山在密雲縣東北一百里今在邊城外通州志云河岸皆白沙不生青草故名白河富河源出順天府西甕山口由順義縣界至通州北關外與白河會按富河昔稱榆河志云榆河源發昌平州月兒灣下流為沙河經順義縣與白河合通惠河舊名大通河發源詳見元史明會典經大通橋至通州分流一自舊城西水門流入城內至東水門出一自新城西門外繞新舊城南折而東北乃合流至張家灣城東南外入潞河自大通橋至通州設閘四曰慶豐閘平津上閘平津下閘普濟閘潘季馴曰楊村以北通惠之水勢若建瓴白河之流淤沙易阻夏秋水漲則懼其潦冬春水微則病其澀浮沙之地既難建閘以備節宣惟有濬築之工殊為喫緊渾河源出大同府桑乾山下經太行山入宛平縣境出盧溝橋下東南至看丹口分二支一流至通州髙麗莊入潞河一南經固安縣至武清縣小直沽與衛河合流入海直沽在武清縣東南衛河白河丁字沽合流於此又東南四十里為海口通典謂之三會海口元於此置海津鎮武清縣志云大河以北之水多從直沽入海此即大禹治水九河入海之處地勢卑下遇霖潦直與海平昔人嘗欲因其填淤置稻田以足賦今府境諸水類以直沽為壑以上皆河防志大薈蕞云直沽在靜海縣東北一百里小二處小即天津城也丁字沽在靜海縣小直沽西南天津運河南自山東臨清州衛水與汶水合流而北至天津會潞河入海故亦名衛河北自武清縣交界三岔河起南至東岸南皮縣交界西岸交河縣交界白楊橋止厯天津衛靜海霸州青縣滄州薈蕞云天津衛天津左衛天津右衛俱在直𨽻河間府東北三百里靜海縣小直沽南至靜海縣七十五里北至楊村驛六十里千淀歸墟百川赴壑輸將要地商賈通津明永樂二年築城城邊有三汊沽潞河衛清河濁合流東注於海又有清沽港西接安沽港東合丁字沽由直沽入於海靜海縣在河間府東北一百八十里東至海一百七十里北至武清縣界六十里縣東一百二十里有鹹水沽出海要地屯軍戌焉大小直沽丁字沽皆在縣地密邇三津作海防之門戶往來萬軸綰漕運之咽喉霸州在順天府南二百里東至靜海縣界一百二十里南襟河濟北揖天山有沙河南與塘河合至入海處名為飛魚口寰宇志曰五渠水又曰長鳴水即此城東七十里有髙橋淀周匝三十里栲栳圈諸水所匯青縣在河間府東北一百五十里東至滄州八十里南至交河縣界七十里北至靜海縣界五十里有獨流河北至靜海縣四十五里其地有蒲葦之利有劈池宋元豐中李立之言河決自乾寧軍劈池入海故名滄州在河間府東一百四十里南至南皮縣界七十里北至青縣界四十里當水陸之要衝為勃碣之都會州西南五十七里有毛河開元中開又呼為屯氏河流經鹽山縣城南東入海又有浮河在舊滄州南十里漢浮陽縣地有衡漳隄在州境廢清池縣西四十里唐顯慶初築又縣西北六十里有衡漳東隄開元中築又廢清池縣西北五里有永濟隄二唐永徽二年築所轄共計程三百四十五里八分屬天津同知管轄天津衛所轄河道隄岸二十九處錯落於靜海青縣滄州間天津天衛東岸十處潑漲淺新莊淺王官淺馬家淺東漫撒淺西漫撒淺罾魚口淺王家淺界宿淺蔡家淺天津左衛東岸八處張家口淺大掃灣淺髙家馬頭淺安都寨淺索家馬頭淺北橫隄淺南橫隄淺南捷地淺天津右衛東岸五處北陽口淺南陽口淺白洋橋淺蕭家樓淺馮家口淺天津天衛西岸係霸州靜海地方天津左衛西岸六處石塘口淺蓮花池淺許家口淺官莊口淺北捷地淺流佛寺淺天津右衛西岸係交河縣地方靜海縣所轄河道北自小園起南至趙家窪止計程一百四十四里霸州所轄河道隄岸六處共計程二里八分錯落於靜海縣境內盧家口程家口程家口蘇家口馮家口北蘇家口青縣所轄河道隄岸主簿經管河東八里塘淺計長十四里李家淺計長五里栁巷淺計長五里安家淺計長十里流洪淺計長十里巡檢經管河東王家淺計長六里安堵寨淺計長六里主簿經管河西務新莊淺計長三十里流河淺計長二十里留小淺計長二十五里巡檢經管河西李家淺計長二十七里運坊淺計長四十里磚河淺計長一十五里滄州所轄河道隄岸朱家墳淺華嚴菴淺紅孩口淺回回灣淺寇家圈淺王家圈淺磚河鎮滹沱河發源山西繁峙縣東流經獻縣城南十一里單家橋至青縣南岔河口入運盤古溝在青縣南十五里深三丈雖大旱水亦不竭東流入於衛水濟運以上俱河防志交河南皮東光吳橋景州薈蕞云交河縣在河間府南一百二十里東至南皮縣界五十里北至天津衛界四十里襟衛水而帶滹沱抱廣川而負瀛海縣西五里有洚河縣名洚陽以此東北五十里有倒流河即蔡河水西流四十里入三汊河縣北二十五里有蛤螺河縣東三十里有沙河今涸里南皮縣在滄州南七十里西至交河縣界一十八南至東光縣界一十五里通志云縣有古九河故道渠岸尚存徒駭在西北太史在古皮城南馬頰在城南覆釡在東南胡蘇在西城下簡潔在城西鈎盤在西北鬲津在東南其一則河之經流也此説殆不可信九河豈在區區一縣之間辨悉播為九河經下注縣西北二十五里有齊家堰即衛河東岸河流至此湍悍迅激明萬厯四十一年知縣徐殷修築里東光縣在景州東北七十里南至吳橋縣界三十北至南皮縣界四十里跨衛引津襟滄麗景有永濟渠其深莫測有靳水河自安陵入浮河唐開元中開今涸吳橋縣在景州東五十里北至東光縣界四十里縣城南門外有吳川古黃河隄也鏡懸千頃虹駕雙河景州在河間府南二百里東至吳橋縣界一十八里南至山東德州界三十里州東二十里有衛河衛水之下流經此入海東北三十里有千頃窪明宣德末河決被害知州劉深開渠入窪民免水患五州縣河道此自天津衛交界白洋橋起南至山東德州