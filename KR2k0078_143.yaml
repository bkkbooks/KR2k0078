民除害則用本縣之民力救本縣之百姓當亦人情之所欣然者矣四女寺北舊有減水閘一座原以泄運河有餘之水上不致為害於山東下亦不致為害於北直此古制之最善也數百年來閘座廢壞不修引河淤塞巳平運河之水無處宣泄泛濫於南則山東受其害泛濫於北則北直之吳橋東光等處悉受其害此不可不復者也然閘座之復猶易而引河之復甚難蓋引河久已淤平百姓悉皆佃種今欲仍挑為河此人情所甚難者故必照原舊河身挑挖則人亦無辭但工程浩大費無所出此工一成併有益於北直若北直之吳橋東光及天津一帶州縣肯相幫助則亦何難之有居濟一得城四女寺在恩縣地方其對岸則故縣與德州衛接界處上河北自直隸廣平府清河縣界臨清州鹽店起南至兖州府陽榖縣界官窑口鋪止計程共一百七十七里設閘九座屬東昌府上河通判管轄臨河臨清州清平縣德州衛德州左衛博平縣堂邑縣聊城縣以上並河防志會薈蕞云臨清在東昌府西北一百二十里南有通河自清平縣入元至元間自安民山開渠導汶絶濟直抵臨清建閘三十有一州治當汶河之北衛河之東汶水自南旺分流至此漸微沿途置閘啓閉極嚴出州之南板閘始與衛河合流而北漕舟過此謂之出口無復閘矣西有衛河自館陶縣入合會通河又入夏津縣界亦名清河即隋煬帝所開之永濟渠也闊一百七十尺深二丈四尺南自汲郡引清淇二水東北入白溝穿永濟縣入臨清蓋漢屯氏故溝隋修之宋皇祐初河合永濟渠注乾寧軍用李立之言以永濟延安鎮在大河兩堤間相度遷於堤外崇寧初詔開臨清埧子口增修御河西堤開置斗門決大名恩兾滄州永靜軍積水入御河枯源西有中洲汶衛二水合處築以石名鰲頭磯延亘二十餘里突峙中流有四閘曰會通曰臨清在汶北曰新開曰南板在汶南俗名觀音嘴今會通臨清巳廢止存新閘南板而已又有廣濟顯晦等泉皆助會通河流者東有古堤脈自南來為會通河所斷城東南枕其半俗呼東堤轉東北至柴二莊入夏津縣境其委瀕海蓋古之堤防也州境淺鋪十有九四在汶河北餘在衛河又有渡十二五在汶河七在衛河今或存或廢清平縣在東昌府北七十里縣治在運河東岸二十里運河水自堂邑博平二縣流入下接臨清河東岸北自潘官屯南至博平之減水閘三十九里西岸北自臨清之潘家橋南至堂邑之函谷洞三十三里淺鋪九西有古黃河與堂邑博平接界有馬頰河自堂邑入上流為漕河所截今自魏家灣溢出繞城西去縣六七里許東北入恩縣盈涸不時南有古漯水久堙北有古屯氏河久堙西有直渠漢大河所經今堙博平縣在東昌府北四十里縣治在運河東岸四十里與聊城堂邑接界又西北入清平縣境自西莎隄至梁家港北魏家灣南共淺鋪五北有大河故瀆自清平入又入髙唐界西北有馬頰河自會通溢出北過倫家橋入清平界南有漯水入自聊城出自髙唐西南有湄河一名七里河自府東南受漕河減水閘之水北流至縣界又北經鄧家橋入故河十堂邑縣在東昌府西四十里縣治在運河西南三里運河水自聊城縣入北至清平縣界西岸北自清平魏家灣南至聊城呂家灣三十五里置淺鋪七北有古黃河與館陶清平接界今堙東南有古漯河與莘縣聊城接界今堙西有馬頰河自莘縣入再入清平界聊城縣即東昌府治在運河西岸二里運河水自陽榖縣入北入堂邑縣河東岸北至博平之梭堤兒三十里西岸南自陽榖縣之官窑北至堂邑之南梁家鄉三十五里淺鋪二十有三南有古黃河與東阿荏平接界今堙北有古漯河與堂邑博平接界今為會通所截亦堙有四閘又有裴家口米家口官窑口栁家口等減水閘四又有泄水閘在會通河岸皆於水大泄水非通州之閘也臨清州河道北自直隸清河縣界鹽店起南至清平縣界二十里鋪止計長四十里內立二閘板閘一磚閘一西南衛水自館陶縣流入臨清板閘下與汶河合流閘河地亢衛河地窪臨清板閘口正閘衛兩水交會處每嵗三四月間雨多泉澀閘河既淺衛水又消髙下陡峻勢若建瓴每一啓板放船無幾水即耗盡漕船多阻潘季馴謂宜於閘口百丈之外用樁草設築土壩中留金門安置活板如閘制然將啓板閘先閉活閘則外有所障水勢稍緩運艘出口易於打板衛水大發即從拆缷此亦權宜之要術也山東全河備考山東四十餘閘放船皆易惟板閘放船獨難蓋板閘之下即係外河更無閘以蓄水也而獨外河水小之時放船為尤難蓋以板閘一啓板則塘內之水一泄無餘糧船每致淺擱須於磚閘灌塘之時板閘放船之時磚閘多下板塊無使水勢下泄直至塘內淺阻不能出口然後亮磚閘板一塊或二塊以接濟之然又不可待其既淺而後亮板也既淺而後亮板則糧船一時恐難行動須於將淺之時即行亮板如放二十隻後淺則放至十五隻時即行亮板則水足接濟到底不淺矣然必磚閘板閘多下板塊上源蓄水盛滿然後可行不然上源無水恐板亦難亮矣磚閘灌塘必先於板閘多下板塊使水不下泄則無論船之多少皆可灌放而無難若下閘下板太少灌塘之時板閘水已下泄則船必不能多放而上源恐致淺擱惟於磚閘灌塘時板閘多下板塊板閘放船時磚閘多下板塊則水不妄泄而船皆可出口矣或板閘不能放完塘內淺阻或磚閘亮板一塊以接濟之或板閘下板磚閘啓板再灌入數十隻一時開放惟在臨時相機酌奪審時度勢以一心權衡之而巳閘上之水若可以過一百五十隻船者止過一百隻即送會牌俟戴家灣再放一塘有水接濟然後再放若放船太多水之消耗已盡則戴家灣閘船恐難放矣此處之水常使有餘無使不足蓋一經水小則接濟甚難也磚閘上水有十四五捺時即送會牌令戴家灣閘放船接濟若至十三捺則不可放船矣須候至戴家灣放下船來板閘方可放船豫聞磚板放船每日止放三二十隻或十數隻心竊疑之故親來放船每日放船一百二三十隻甚至一百八十五隻豫乃悟從前之放船極少者以放水之時不放船放船之日巳無水也何以言之戴家灣放船之時磚板閘水大之時也磚板閘既不放船而候會牌又不多加板塊使水直從板上空過至戴家灣放完船而水亦盡矣會牌始至磚閘啓板放船已無水矣况外河水小板閘一啓板水去而船留故放船無多也豫力為改之使放水之時即放船放船之日始放水故一日過船至一百八十五隻惟於閘上酌量水勢水將大則亮板以放船水將小則加板以蓄水不過啓閉得宜蓄泄有方而巳居濟一得閘板閘在汶衛交流處磚閘在板之南相隔止五里又三十里則為戴家灣閘矣行水金鑑卷一百四十三
