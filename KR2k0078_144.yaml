body:
  text: 行水金鑑卷一百四十四江南按察使傅澤洪撰運河水衛河即隋之御河也源出河南輝縣薈蕞云輝縣在河南衛輝府西六十里汲縣新鄉縣接界有三渡河源出百泉之南流入衛河有清水源出山陽鎮東南入獲嘉縣蘇門山之百門泉亦名搠刀泉方池二十畝許泉出其中不可數計南流至新鄉縣薈蕞云新鄉縣在河南衛輝府西南五十里與輝縣汲縣接界有古黃河元至元九年河徙自原武出陽武南而新鄉之流遂絶境漸深廣通舟楫蜿蟺而東經汲縣淇縣湯隂安陽薈蕞云汲縣即衛輝府治與新鄉濬縣接界衛河在城北一里入大名府濬縣界南有古黃河金大定時河決徙城後漸徙而南自武陟東經原武陽武不入郡界矣淇縣在衛輝府北五十里與汲縣湯隂縣接界有清水源出輝縣西南七十里山陽鎮東南流經獲嘉縣界又東北入淇縣界合於淇水湯隂縣在彰德府南四十五里北至安陽縣界一十五里又與內黃􅉸縣接境有羑水源出湯隂縣北八里鶴山流至羑城北成淵東㑹防水入湯河東南有黃河故道安陽縣即彰德府治南至湯隂縣界三十里有西河卜子夏田子方段干朩所遊之地以魏趙多儒在魯鄒之西故名西河非龍門西河也直隸濬縣滑縣內黃大名元城薈蕞云濬縣在直𨽻大名府西南二百里與汲縣滑縣接界有溝河出內黃南自濬滑經顓頊帝嚳二陵之南達東明波羅河在童山西麓南流至龍口峽伏流值潦溢則㑹於長豐泊滑縣在大名府南二百三十里與濬縣內黃縣接界有滑河自洛以西衆水㑹於滑唐沈亞之作魏滑分河録有靈昌湖依靈昌津闊十餘里有陳公隄州守陳堯佐築內黃縣在大名府南一百里與滑縣大名縣接界有白溝水經注云恆水徑內黃縣北東流注於白溝有宜師溝水經注云淇水自晉鄙城又東謂之宜師溝東北至內黃澤有永濟渠隋大業中修有鸕兹陂集賢坡有黃澤隄有鯀隄有倪公隄倪寬所築大名縣在大名府南十里與內黃元城接界有雕馬河在縣北元城縣即大名府治與大名館陶縣接界有屯氏河土人誤呼為王莽河有沙河近沙麓地舊自西南引漳入城灌御河復西北出城灌流沙河南北長二十里東西闊二里流常轉徙不定至山東館陶縣薈蕞云館陶縣在山東臨清州西南一百二十里與元城縣臨清州接界衛河在縣西二里合漳河北流至臨清州與㑹通河合流入海漢書河決館陶分為屯氏河即此隋為御河亦為永濟渠北入臨清州與汶河㑹自發源至汶河㑹流處共計九百二十三里零其間水之入焉者六其他細流不與焉曰小丹河斫脛河淇河湯河安陽河漳河按自臨清州板閘以北全賴衛水濟運然春夏之交漕船盛行每患淺澀康熙二十九年原任河臣王新命議以丹河口分渠九道每嵗三月初用竹絡裝石橫塞八河渠使水歸小丹入衛而留涓涓之水與民間溉地至五月盡重運過畢則開八河渠用竹絡裝石塞小丹口以防山水漫溢奉㫖行河撫閻興邦再議如雨水足時照河臣議倘遇亢旱令每三日放水濟漕一日塞口灌田五月十五日以後聽民便用中有淺阻責令各官量濬王新命又議衛河於輝縣境內民間設立五閘蓄水灌田往例於五月初一日封板放水濟運惟是五月正當農人需水之時未免有妨農務應亦用竹絡裝石量渠口之髙下堵塞使各渠之水常盈而所餘之水晝夜常流濟運其萬金渠出自安陽縣西南六十里善應村山下約二十餘里至髙平村昔人建閘開渠引水溉地其水仍由縣東北五里許入安陽河亦應照五閘之法用竹絡裝石塞閘通渠漕民兩便康熙三十年俱奉㫖允行厯嵗以來漕運無阻農民樂業莫不頌皇仁於無既矣輝縣所管衛河自百門泉起至新鄉縣界止計長二十五里二百四十八步河寬三四五丈深四五尺不等舊有民建閘五座曰仁義禮智信新鄉縣所管衛河自輝縣界塊村營起至汲縣界曲里村止計九十二里深至一丈七八尺不等小丹河西自獲嘉縣境至岔河尖入焉汲縣所管衛河自新鄉縣界曲里村起至濬縣界雙鵝頭止計一百四十五里河寬至六七丈深一丈五六尺不等淇縣所管衛河在汲縣河之北岸自西沿村起至薛村口止計長一十五里河寬至十三四丈深至二丈一二尺不等斫脛河北自太和泉流至西沿村入焉淇河北自林縣境流至薛村口入焉淇河西岸屬淇縣東岸屬濬縣濬縣所管衛河自汲縣界雙鵝頭起至滑縣界伍隆固止計一百七十五里內有石岡一道自屯子鎮至老鸛觜十八里綿亘河底水稍落則為重艘礙河寬至十四五丈深一丈七八尺不等滑縣所管衛河自濬縣界泥灘口起至內黃縣界韓西口止內有湯隂縣所管河三段計共長十里滑縣河道計九里一十三步河寬至十五六丈深一丈八九尺不等內黃縣所管衛河自滑縣界草坡村起至大名縣界張兒莊止內有湯陰縣所管河三段計共長二十七里零內黃河道計九十里河寬十四五丈深一丈七八尺不等湯河西自湯隂縣入焉安陽河北自安陽縣入焉湯隂縣所管衛河六段三段在滑縣境內自南而北第一段長一百八十丈第二段長五百四十丈第三段長一千八十丈三段在內黃縣境內自南而北第一段長一千丈第二段長三千八百四十丈第三段長一百七十二丈九步共計長三十七里三百一十三步大名縣所管衛河自內黃縣界張兒莊起至元城縣接界曹家道口止計九十六里河寬至十六七丈深至二丈三四尺不等元城縣所管衛河自大名縣接界趙家站起至館陶縣接界善樂營止計七十三里河寬十五六丈深二丈一二尺不等館陶縣所管衛河自元城縣接界遷隄鋪起至臨清州界尖塜集止計一百二十里河寬十六七丈深二丈三四尺不等漳水自北而入焉臨清州所管衛河自館陶縣界尖冡集起至南板閘汶衛合流處止計六十里河寬至十七八丈深至二丈四五尺不等小丹河漢書髙都縣莞谷丹水所出也髙都即今山西髙平縣其水流至河內丹谷口自大丹河石斗門分流為小丹河經河內武陟修武獲嘉至新鄉縣岔河尖入衛自大丹石斗門起至新鄉入衛合流長一百九十二里零斫脛河以紂斫朝涉之脛故名發源淇縣太和泉至西沿村入衛自太和泉起至西沿村入衛長三十里河寬一丈五六尺深五六尺淇河衛詩所云淇澳者是也水經淇水出河內隆慮縣西大號山隆慮即今林縣發源縣南臨淇集至合河口又淅水自西來注之至淇縣薛村口入衛自林縣臨淇集發源至合河口淇淅合流處計長二十里自合河口至淇縣長六十里至薛村口又四十里共長一百二十里河寬至二十二三丈深至一丈二三尺湯河發源湯隂縣西牟山東流至髙漢橋又永通河自西來注之至內黃縣境入衛自牟山發源至髙漢橋永通合處長六十五里至內黃入衛又五十里安陽河一名洹河左𫝊聲伯夢濟洹而歌注水出汲郡林慮縣林慮即隆慮今林縣也伏而瀑於安陽縣西南六十里善應山下流二十餘里至髙平村建閘疏渠引水溉田名曰萬金渠蓋始自唐刺史李景後人相繼修之其水仍由縣東北五里許合于洹河流至內黃縣境入衛自善應山至小河口由內黃入衛共長一百五十三里半漳河其源有二一出山西潞州長子縣名濁漳一出平定州樂平縣名清漳至林縣東北涉縣境合流經臨漳縣又分為二一北流入滹沱河一東流至館陶入衛明𢎞治至隆慶間出沒不常萬厯中北徙入曲州滏陽河邇復歸入衛蓋自丹衛淇洹而北實資漳以濟漕久湮而復通休徴之至非偶然也以上並河防志衛河㑹洪漳諸水過臨漳分流為二其一北出經大名至武邑以入滹沱其一東流經大名東北出臨清合㑹通河至直沽㑹白河入海愚按臨清以北運河每有淺阻此河既至臨漳分流為二若遇臨清迤北水小之時將臨漳分流處其北出入滹沱者堵閉則東流出臨清合㑹通河者水自大矣再將武城蔡河開通又何水小之足患乎外河水大則板閘之船易於出口若外河水小板閘之船出口甚難須於魏河漳河築壩使水由支河經元城館陶而入衛河則外河之水自然有餘而無淺阻之患矣但魏縣元城係大名府轄非山東之官所可專行須預先詳明河憲使行文大名道則事無不濟矣但漳河之水小時固足為運河之利而一經漲發又恐為元城館陶之害須於重運到臨清時將漳河築壩引水入衛濟運至重運過完仍將漳河壩開通將入衛支河堵塞則元城館陶俱不受害矣居濟一得清平縣河道北自臨清州界二十里鋪起南至博平縣界魏家灣迤南田家口止計長三十九里內有戴家灣閘一座河防志清平縣魏家灣迤南大壩下引河一道水勢情形應行挑浚有利運道民生戴家灣閘上離土橋三十里下離磚板閘四十里乃運河一大關鍵也此處最宜斟酌得宜蓄積有方必先計算船數之多寡水勢之大小或土橋放兩塘此閘放一塘或土橋放一塘此閘放一塘或土橋放一塘半此閘放一塘則土橋三塘可分為此閘二塘要使水勢足用運行無阻乃為盡善然此處放船必酌量磚板閘之水使不大不小蓋水大則恐漫溢水小則恐其淺阻必審度至當使之得宜則既無淺阻之虞亦無漫溢之患矣此閘宜多備板塊若水勢太大則此閘可蓄積倘一放至磚板閘勢不能留矣然此閘放船尤宜多無論磚板閘能出不能出皆宜多放蓋外河水小則船難出口而磚板閘以上不可不多存船隻者則以船蓄既多外河水一長即可俱出矣若不先存船數百隻恐外河水一漲即欲放而無船矣故戴家灣閘放船宜多也居濟一得德州衛收并左衛南河河道計長六里二百六十一步零在清平縣河道境內河防志博平縣河道北自清平縣界魏家灣迤南田家口起南至聊城縣界吕家灣鋪止計長三十五里係東岸一邊與堂邑縣對岸其河道截分一十七里半東岸有減水閘五座如遇河水漲發則開此泄水東流入海河防志博平縣減水閘五座自南而北其北界河岸名逃戶口者為第五閘遇河水稍長則由此閘泄出以殺其勢再長則四三二閘漸次開泄由古漯河入海以保河岸以護民田後因年久閘廢出水之河亦淤塞不通每遇河水漲發必至漫溢隄岸淹沒民田所當急為修浚居濟一得堂邑縣河道北自清平縣界函谷洞起南至聊城縣界梭隄止計長三十五里係西岸一邊與博平縣對岸其河道截分一十七里半內建二閘曰土橋曰梁家鄉西岸有進水閘三座如遇伏秋霖潦坡水積聚則開此引水入河以利漕運河防志土橋至梁家鄉止十二里至戴家灣乃三十五里故十二里之水每不足三十五里之用必須土橋放兩閘戴家灣始可放一閘則上下之水俱足而無淺阻之虞矣若照常例一塘灌一塘則土橋以上必致淺阻而難行若土橋放兩次而戴家灣水勢仍小即再放一塘是土橋放三塘而戴家灣始放一塘合三塘之水以為一塘之水合三塘之船以為一塘之船而水焉有不足者乎而船又焉有淺阻者乎土橋放船法宜戴家灣閘上常存船數十隻或百餘隻則此塘之水可以接濟土橋之水土橋放船自無淺阻之患土橋放完然後戴家灣閘啓板將前數十隻或百餘隻盡行放出却將土橋新放下之船存在塘內使土橋再放一漕然後啓板將此船放出又將再放之船存入塘內以濟接後船如此節節放去則淺阻之患庶可免矣居濟一得東昌衛收并平山衛河道在東昌府東南隅地名南龍灣北自本營界牌起南至鄧家樓界碑止西岸一邊長三里河防志聊城縣河道北自堂邑縣界西岸梭隄博平縣界東岸吕家灣鋪起南至兖州府陽穀縣界官窯口鋪止計長六十三里閘四座曰永通曰通濟橋曰李海務曰周家店西岸有進水閘二座如遇伏秋霖潦坡水積聚則開此引水入河以利漕民田不致淹沒東岸有出水閘四座如遇河水漲發則開此泄水東流入海隄岸不致衝決本縣河道內有平山衛河道一段僅長三里係西岸一邊河防志聊城縣有七里河一道凡遇漕河水漲以備泄水之河相應挑浚深廣分泄水勢流至博平歸海東昌府第一閘為周家店其上閘為七級下閘七級既放兩次周家店始放一次七級二里之塘所容不過四五十隻船是七級放二塘其船不過百隻若七級放二塘周家店水仍不足用不妨再放一塘是七級放三次周家店始放一次約周家店之船少不過百隻多不過百五十隻其以下各閘之水諒無不足用者倘或再不足用須兩塘併一塘如此塘水小船不可過閘即將上塘之船合併此一塘內再無不足之理或疑船多一塘不能盡放不知船愈多則水愈髙四月初間催民船進京各閘水小乃將五塘歸併一塘民船六百二十五隻皇朩筏十七弔糧船二十四隻各閘俱過並無淺阻用此道也蓋船少則用水多船多則用水少此至當不易之理也治水者使水有所歸而已孟子曰禹疏九河瀹濟漯而注之海即今山東之河是也數年以來迭被水患皆因入海之路淤塞不通故泛溢平野而民田悉受其害查東昌府舊有減水閘九座皆泄運河有餘之水以入海者今閘座廢壞河底墊髙水不能出故常盈溢甚則衝決此必至之勢也居濟一得張秋河北自陽穀縣官窯口接東昌府聊城縣河道南界起南至東平州靳家口上接汶上縣河道北界止計程一百五十五里設石閘九座屬兖州府捕河通判管轄臨河陽穀縣東阿縣夀張縣東平州東平所河防志縣薈蕞云陽穀縣在東平州西北一百二十里治在運河西四十里穀山在縣治東北四街之中東有沙河由范縣夀張入雨潦則滙羣川北流至東昌龍灣入運河蓋黃河故道南有清水河亦自夀張入經張秋南減水壩入運河東有阿澤西有西河陂亦名黑龍潭長三十餘里東西闊八九里雨潦則淹稼西北有鵝鴨陂長二十餘里東西闊六七里東阿城鎮有阿井巨若輪深七八尺蓋濟水所經試攪濁水則清今水不盈數尺水色正緑而重周於垣掌之於官嵗取井水煮膠入貢東阿縣在東平州西北七十里縣治在運河東六十里西有大清河西岸有魚山即漢武帝瓠子歌所謂吾山也河水自東北入平隂縣界北有古黃河蓋古瓠子河也北有赤河亦黃河决後支流也入州界東南有狼溪河源出本境狼山入大清河西有馬頰河西南有小鹽河即運河泄出之汶水支流也由東平入經馬頰河故道入大清河西南有安平鎮運河所經與夀張陽榖接界明正統間河決滎陽東衝張秋潰沙灣遣使修塞景泰中沙灣復決徐有貞為廣濟渠於張秋西又於張秋建通源閘而㑹通復治𢎞治初河徙汴北分為二支其一東下張秋入漕河與汶合而北行𢎞治六年又決張秋東岸截流奪汶入海而漕河中絶劉大夏等於上流西岸疏為月河三里許塞決口九十餘丈而漕復通又疏塞其上流數處於兩岸築隄減水南下由徐淮故道又於舊決口南一里築滚水石壩以防之亦謂之減水壩功成賜名安平鎮抱河為城周八里北河都水分司治焉鎮南有金隄參差隆起延亘鄆濮漢文帝時河決酸棗東潰金隄處十夀張縣在東平州西北九十里縣治在運河西三里東南有黃河故道一名范城河今湮西南有清水河今淤東有梁山濼今州境積水諸湖即其餘流東北有沙灣明㑹通皆元故道唯於開河閘至沙灣北故河道北徙幾二十里又引黃河支流自河南封丘縣荆隆口東至沙灣以達臨清之衛河𢎞治中河決於此自是築塞黃陵岡而沙灣之流漸涸西有廣濟渠明徐有貞塞決河先於上流為渠起張秋金隄通夀張沙河至於范濮以達河沁名曰廣濟渠即通源閘也又有金隄上接鄆濮南有野猪腦堰縈紆三十里周土石修築以瀦河水使不得衝決沙河隄岸今堙塞東平州在兖州府西北一百五十里州治在運河東北十二里西南五十里有梁山周二十餘里上有虎頭崖下有黑風洞下即梁山泊五代宋金黃河屢決注梁山泊後河移故道退地甚廣安置屯田自是遂為平陸西南有安山亦名安民山山下有湖瀠洄數十里四面築隄置閘以時蓄泄名曰水匱西南即㑹通河汶濟合流處西有舊黃河明𢎞治間河決於下流十里許改作戴村廟金線閘以泄其流由鹽河入海後築隄黃陵岡障河流盡出於南而舊河盡湮廢南有汶水自寧陽縣入至州東戴村又西經州城南至安山湖合濟明永樂時築戴村壩遏其入濟之道遂西南流八十里至汶上為分水河今導為運河又有沙河其源有二南沙河即汶水故道由戴村西出至州城東名銀河潦則滙為巨浸民不得田又西轉州城南循隄而西繞城北至城西北與北沙河㑹北沙河亦名鹽河㑹南沙河至東阿入大清河西有古濟水元開㑹通引汶絶濟使不得東而清濟不入汶矣東北有古坎河即汶水下流泄入鹽河處鹽河即濟河别名自戴村壩築而汶水不復由此入濟陽穀縣河道北自官窯口鋪接東昌府聊城縣南界起南至五里鋪接東阿縣北界止計長六十里內石閘六座曰七級下閘曰七級上閘曰阿城下閘曰阿城上閘曰荆門下閘曰荆門上閘河防志七級塘河亦係上啓下閉下啓上閉者也但七級塘河止二里許而至周家店則有十二里二里塘河之水焉能足十二里河之用此周家店所以每有淺阻而七級放船必兩閘並啓也夫兩閘並啓既慮泄上源之水而下啓上閉二里塘河又不足十二里之用為之奈何則惟有並塘之法焉七級放兩塘周家店始放一塘若仍不足七級放三塘周家店始放一塘再無不足之理船愈多則水愈髙至船盡歸下塘而水仍留上塘此法之至善者也查七級塘河可灌六七十隻兩塘則有百餘隻三塘則有二百隻即發㑹牌於周家店令周家店啓板放船此一定不易之理若一塘灌二三十隻兩塘止灌四五十隻而周家店即行啓板則水仍多泄矣故七級必儘塘灌放乃為得法也若閘上積船太多亦宜上下兩閘齊啓放船更為便捷阿城兩閘其上啓下閉下啓上閉亦與荆門閘等其在荆門之下猶天井在城之有趙村石佛也蓋其斟酌得宜古人不知幾經籌畫而始建此良規年來齊啓齊閉以致水勢大泄每逄水小之年北運輒有淺阻今悉遵古制一啓一閉則水勢有餘而糧運無阻矣若閘上積船太多亦宜上下兩閘齊啓放船又不可執定一啓一閉反致船行遲滯也阿城上下閘皆陽榖主簿所管主簿衙門現在張秋今宜移於阿城亦管二閘之鎖鑰蓋此二閘與趙村石佛相對故宜如趙村石佛之例一啓一閉遞為開放以蓄水勢庶糧運不至於淺阻亦如荆門閉繳上閘鑰匙則領下閘鑰匙繳下閘鑰匙則領上閘鑰匙則水有所蓄而不至大泄矣荆門閘塘河與磗板閘天井在城均為水門關蓋不使水之下泄也自司閘者不詳察古人建閘之義往往兩閘齊啓齊閉以致上源之水一泄無餘湖水甚大船猶可行天旱水小東昌一帶在在淺阻故宜倣磚板閘天井在城閘例上啓下閉下啓上閉務使船皆可出而水不大泄此誠運河之一大關鍵也如閘上積船太多又不可拘此例須兩閘齊啓板則放船更快但船少之時須一啓一閉決不可兩閘齊啓致泄水勢上下兩閘板俱要各下二十塊少則不足以蓄水矣荆門上閘所以關南旺以北運河之水也其閘與天井閘相對故宜設鎖如天井閘之制而其鑰匙宜掌之捕河㕔一啓一閉繳上閘鑰匙使領下閘鑰匙繳下閘鑰匙使領上閘鑰匙不得混行開放以泄水勢荆門下閘亦宜設鎖其鑰匙亦宜掌之捕河㕔蓋此閘與在城閘相對故亦宜照在城閘之例與上閘之一啓一閉庶乎蓄泄得宜而水勢常足矣陽穀縣有西湖在城西離城八里地處窪下南接濮州范縣朝城夀張四州縣之水俱入陽邑由孔家橋灌入西湖境內尚有戴家故莊水渠一道因年逺淤塞久成民間熟地以致積水難於下流淹沒民田此溝應行挑浚開掘疏通使其水分泄於朱家河劉家口烏龍潭等處入莘縣境盛家河黃家河仍入陽邑蓮花橫鵝鴨坡統入聊城縣境龍窪歸入運河俾水既可濟運而民又免淹潦之患曹州有賈魯河一道自桃園集入州境迤東九十八里折北而至閻什口出州境共長一百八十里州東南二方之水俱入此河自元季為分泄黃河之别渠及塞黃陵岡決口河歸故道而賈魯隨成廢河前經紳襟耆庶㑹議止將久淤河心挑掘一溝自通堌集至黃家口共計三十二里便可承受夏秋雨漲之水順流而下不至淹沒田禾矣按河兩旁地土有主者令其照河身自挑無主者官捐募夫亦易為力竝不滋擾民間其餘新挑河天家河等處俱照此插工但通堌等處於東明縣壤地相連然實工小費省應徑移知令彼處業戶協力疏通而賈魯河天家河新挑河等處皆入濮州境內亦行知一體開浚歸入張秋運河其清浪集於巨野縣之龍堌集田家橋相接亦聽行知齊力開導彼此無妨再按賈魯河形勢曲折時盈時涸決其淤塞一往無阻即水達運河竝無有礙運河之處居濟一得行水金鑑卷一百四十四
