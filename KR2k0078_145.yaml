body:
  text: 行水金鑑卷一百四十五江南按察使傅澤洪撰運河水東阿縣河道北自五里鋪接陽穀縣南界起南至沙灣鋪接夀張縣北界止計長一十五里其隄岸北自陽穀縣河道荆門閘上紅廟起南至沙灣鋪止計長二十里而安平鎮居其中安平鎮舊名張秋春秋為衛地秦漢以來為東阿夀張陽穀三縣地或屬濟北或屬東平周世宗時遣宰相李穀治隄自陽穀抵張秋口鎮名昉此宋改為景德鎮明𢎞治七年塞決河功成賜鎮名安平抱河為城北河都水郎中治之其地仍為東阿夀張陽穀三邑邊界云河防志張秋城南曰廣濟渠在運河西岸明景泰四年徐有貞治沙灣河決時先為疏水之渠起張秋金隄通夀張之沙河西南至於竹口又西南至大渚潭乃踰范暨泊而上又西北接河沁之水命曰廣濟渠渠口為通源閘有石隄二道自大感應廟起至沙灣長一百六十丈運隄自沙灣起至荆門驛長一千九百三丈有五空橋在張秋城南與沙灣相對即為減水石壩廣袤各十五丈又於上甃石為五竇以漕渠餘水入之小鹽河順治七年黃河決荆隆衝張秋南北隄岸俱潰唯此石隄巍然獨存復行修整以便牽挽實為利漕有淺八曰掛劔曰新添曰沙灣曰北灣曰安家口曰仲渡口曰南浮橋曰北浮橋東岸戴家閘東有三空橋大河神祠北有五空橋俱泄入鹽河西岸南自老黃河口次即沙灣閘又次坎河斜對東岸之五空橋而西岸沙河由夾河出減水壩乃在五空橋之北至荆門上閘東岸稍逺又有黑龍潭亦泄入鹽河此處遏汶西北與故道清河東北之處呼吸關通旱不令運河枯澀潦不致運河漲溢節宣最宜慎云山東全河備考張秋迤南八里廟有沙河一道出道人橋入運其源出滑縣開州有魏河洪河小流河三道俱由濮州范縣以達張秋每遇雨潦之年其水盛大勢莫能禦再往南沙灣有棗林河一道出小閘入運其上源自荆隆口舊決口至張秋有六七百里之遙每逄大雨之年此六七百里逺之水俱至張秋出小閘入運河沙河棗林河之水俱入運河運河勢不能容曹家單薄必致衝決此以前屢決屢塞最稱險要者也然曹家單薄地既窪下土又虛鬆勢難建閘故宜於大感應廟東地勢髙阜之處開引河一道建閘一座使水過閘東行仍由曹家單薄舊河入鹽河下海則既可以泄運河有餘之水又可使鹽船直入運河且可以通商賈往來而濮州范縣陽穀夀張東阿永無淹沒之患矣居濟一得沙灣在張秋南十二里黃河舊決口也明𢎞治間塞黃陵岡口有裏河一道由鄆城來經夀張黑虎廟至此入漕河防志棗林河由沙灣小閘入運其上為壈丘坡之水又其上為天鵝坡之水遞而上之以至於荆隆口六七百里之遙若稍為疏通其利當無窮也奈今處處淤塞水滯不行急宜疏通以利運道此河自張秋南沙灣小閘起係東阿縣地方三里至丁家橋又七里至萬家橋河東岸係東平州地方河西岸係陽穀縣地方又三十一里至黑虎廟係夀張縣地方又十四里至李家橋係汶上縣地方又九十里至紅船口橋係鄆城縣地方又二十五里至閻什口橋係濮州地方直至雙河集兩坌分流一入小黃河至南旺下入牛頭河一即為棗林河其源自陳橋古黃池來居濟一得夀張縣河道北自沙灣鋪接東阿縣南界起南至東平州界戴家廟閘下三空橋止計長二十里內沙灣運河西岸有積水閘一座舊黃河口自前成化七年建每歲伏秋鄆濮等處倒坡之水接流於此濟運東平州河道北自戴家廟閘下三空橋接夀張縣南界起南至安山閘接東平所河道止計長三十里內石閘二座曰戴家廟閘曰安山閘又北自安山閘起南至靳家口汶上縣北界止內除東平所河道一十二里實管河道一十八里內石閘一座曰靳家口閘共計東平州所管河道四十八里靳口閘至安山閘三十里安山閘至戴家廟閘三十里戴家廟閘至荆門上閘四十五里閘路頗逺向藉安山湖水為之節宣今安山湖久為平陸倘遇亢旱之歲閘逺路長水力不厚慮有膠淺應於三閘適中之地增建一二閘以節水勢路近則水力自厚可無阻澀之虞矣以上並河防志戴家廟閘舊候荆門閘會牌以致遲滯今不宜候荆門閘會牌但安山㑹牌一到即便啓板放船蓋荆門閘舊止一閘下板不候㑹牌恐致通漕今上下兩閘俱經下板一啓一閉必無通漕之患矣安山閘板宜多下蓋以靳口閘地勢太髙若此閘一少下板則靳口閘水勢必致太峻且閘上之水一泄無餘而袁口開河上下必致淺阻此必然之理也然亦宜俟靳口放兩塘此閘始可放一塘靳口閘地勢最髙故閘上之水視閘下之水每髙四五尺必須安山閘多下閘板則此閘上下之水不至大相懸逺若此閘上水比閘下髙四五尺即知安山閘少下板塊須速著人去呌安山閘下板安山閘既多下板則此閘上下水勢自不大差無論啓板之時糧船易放而閘上之水亦不至一泄無餘袁口上下亦不至淺阻矣此閘放船一完即送袁口㑹牌而不送安山㑹牌須俟袁口再放一塘來此閘再放一塘去然後送安山㑹牌使安山放船蓋此閘放兩塘安山始可放一塘也居濟一得安山湖即安民山湖以此得名在運河隄西岸周圍一百餘里永樂間宋禮陳瑄經營漕河既成建議設水匱以濟漕渠在汶上為南旺在東平為安山在濟寧為馬場在沛縣為昭陽名曰四水匱漕河水漲則減水入湖水涸則放水入漕各建閘壩以時啓閉凡盜決侵種者有禁萬厯六年清丈安山湖原廣百里其髙而宜田者止七十七頃有竒其卑而宜匱者止四百一十六頃有竒當時建議欲於髙下相承之處築束湖小隄畫分二區隄以內匱水濟運隄以外聽佃稅糧萬厯十七年築土隄共長四千三百二十丈又于似蛇溝八里灣增建二閘以為蓄泄永利自通河口起過焦天祿以西吳家口止共十七里係幫湖運隄自吳家口運隄起至王禹莊又至青姑堆環轉復至通河口共十九里皆縮內湖隄其間不無缺口自吳家口至青姑堆中有橫截東西子隄一千八百一十五丈亦多缺口又運隄四閘之內各有隨隄小河自南而北共約二十餘丈引流順下以出濟運皆宜修治然總論諸湖唯蜀山馬踏在漕岸之東可稱水匱南旺西湖及安山湖在漕岸之西但稱水壑不可稱水匱且自順治年間河決荆隆泛張秋安山湖淤成平陸前河臣盧崇俊㑹議挑復湖心計費帑金二十餘萬無可設法因而中止今湮塞巳二十餘年聽民開墾倘國用嬴餘力可修復或滄桑變更勢必資之以為漕利則豁賦仍加挑濬未為不宜也山東全河備考康熙十八年聽民開墾佃種共開地九百二十五頃三十八畝九分零起科銀兩載入全書本州起解邳睢㕔河庫永以為例是向之所謂安山湖者今一望皆禾黍之場矣河防志安山湖原以蓄水濟運最關緊要自前河憲靳題明開墾輸租充餉是以蓄水無資致河北一帶節年淺阻前據東平州詳以地畝鹻荒懇請豁租當即詳憲行查在案但查原報開墾湖地九百二十餘頃今據州詳荒地止四百二十餘頃查鹻荒之地俱在湖西其東尚有湖地四百七十餘頃方與運河相接本道再四查閲如止除四百二十餘頃即不能蓄水濟運須將原報開墾九百二十餘頃之地一槩豁租俱作蓄水官湖庶湖水得蓄而于運道方有禆益居濟一得東平所河道北自安山閘接東平州河道南界起南至東平州河道北界碑止計長一十二里在東平州河道之內河防志南旺南河北自汶上縣袁家口閘迤北東平州交界起南至魚臺縣辛莊橋王家口止計程共二百七十五里一百八十步設閘十九座屬兖州府運河同知管轄臨河汶上縣嘉祥縣巨野縣濟寧衛濟寧州魚臺縣河防志南薈蕞云汶上縣在東平州東南六十里西有㑹通河自濟寧入合諸陂澤水入東平合汶水今汶水悉入南旺合流而北出所管河岸南接嘉祥界首北至東平靳家口長七十二里南為南旺湖東為蜀山湖中為上下二閘以節宣之東北有汶水自東平州入又西南入㑹通河明永樂中開㑹通河於寧陽縣北增築堽城壩遏其入洸又於縣北汶河西創築戴村壩遏其入濟使盡出於縣北二十五里受濼澢諸泉謂之魯溝又西南流至城北二里受蒲灣泊水謂之草橋河又西南流十里謂之白馬河又二十里謂之鵝河蓋宋運道也涸而為渠汶水由之又西南流十五里謂之黑馬溝又西南注於南旺至分水龍王廟分為二支四分南流至徐沛六分北流至臨清蓋運河全藉汶矣又按戴村壩即汶泗口之地今縣界之汶即其南流二支而南旺湖即茂都澱也西南有南旺湖在運河西岸其地特髙謂之水眷汶水西南流注於此而南北異流湖在巨野之東偏縈回百五十餘里宋時河再決澶滑與梁山張澤兩濼滙而為一渺然巨浸後漸淤澱壅近城民田乃自下流浚至濱州又漸淺涸永樂九年開㑹通河遂畫為二隄漕渠貫其中隄東岸有蜀山湖名南旺東湖周六十五里隄北有馬踏湖名南旺北湖周三十四里有竒兩旺皆蓄水以灌渠故設南旺上下閘北有開河閘按河防考蜀山東有馮家壩地卑而水易泄因壩以障之南旺南有何家口稍卑汶水西下每決房家口傷運隄而南旺之水易涸是馮家壩乃蜀山之門戶而何家口為南旺之尾閭皆不可無備故設水匱以濟漕在汶上曰南旺東平曰安山濟寧曰馬場沛曰昭陽皆漲減涸開名曰四水匱西南有石溝濼周三十里西北有魚營濼周四十里北有蒲灣濼周十餘里俱入汶東北有龍鬭泉㑹諸泉入蒲灣東南有馬莊泉入蜀山湖嘉祥縣在濟寧州西五十里縣治在運河西二十五里南接巨野大長溝北至汶上界首長十八里淺鋪四石隄十里北有舊黃河南有淡臺河亦黃河支流也又有桓公溝自巨野入再入魚臺又有浴河明正德中疏通舊址三十餘里以泄水民賴之今淤里巨野縣在濟寧州西一百里縣治在運河西八十南自濟寧火頭灣北至嘉祥大長溝長二十五里凡五淺石隄十二里上有蓬子山壩障大薛湖水西有舊黃河自張秋決塞此渠不通西有濟水自定陶入北入鄆城南有菏水即濟水分流亦名泗水北有巨野澤亦曰巨澤南北三百里東南百餘里亦曰大野禹貢大野既瀦自隋以後濟流枯竭巨野漸微五代時河南徙復滙於此連南旺蜀山諸湖方數百里元末為河所決河徙涸為平陸濟寧州在兖州府西南六十里州南門外即運河也自魚臺縣流入合泗水又經天井閘合濟洸二水經分水閘入嘉祥縣界久而淤塞明永樂中疏鑿北達臨清衛河南入徐州黃河中間七百里皆曰閘河置閘凡十有二初由徐州達清河入淮後改由微山湖入八閘出董口入淮自董口淤乃議他徙濟寧所管河隄自魚臺之界牌淺至本州之五里淺長六十八里自五里淺至巨野之火頭灣淺屬濟寧衛長二十五里本州淺鋪十有七東南有泗水自滋陽縣入南入㑹通河東北有洸水自府城至州城東隅與泗水合西有牛頭河有馬場湖湖北岸有減水閘三東隄西壩以時蓄泄東南有蘆溝泉入南陽閘託基泉入棗林閘馬陵泉入魯橋閘魚臺縣在兖州府西南一百五十里運河在縣東三十里有新舊二道舊道淤塞明嘉靖末治河尚書朱衡開夏鎮新河一百四十里以逹南陽避河決之患及昭陽湖之險至今因之東有泗水即舊運河也北有魯侯觀魚臺縣以此名縣管漕隄自沛縣珠梅閘至本縣南陽閘凡八十五里皆新河也珠梅閘北實有滕境二十里然在南岸者必由昭陽湖入運在北岸者必由獨山湖入運二湖俱在縣境故河岸盡屬縣管蓋昔之漕也㑹河合濟北走燕都西通汴路總由穀亭則縣為綰轂今之漕也沂泗汶洸㑹於濟寧直貫南陽以輸夏鎮亦縣為綰轂然則兖也者京師之門戶而魚臺又東省之咽喉也汶上縣河道北自靳家口東平州南界起南至孫村嘉祥縣北界止計長五十六里一百八十步閘五座曰袁家口曰開河曰南旺下曰南旺上曰寺前鋪河防志南按南旺下閘即十里閘旺上閘即栁林閘袁家口閘不放水北注運道淺阻勢所必至故糧船至此必須積至三百或二百餘隻則水自充足有餘而後啓板放船若水非有餘船決不可放必將開河閘板南旺下閘板盡啓使南旺之水全注於此若開河閘上有船即將上塘之船歸併此塘以便蓄水蓋船不虞多惟患水小耳此閘板須全下始足以蓄水南旺下閘開河閘不下板始無淺阻之虞茍此閘下板或少則南旺下閘開河閘上下未有不致淺阻者且南旺上閘不能蓄水南運勢必不足此不可不知也此閘船多水足始無淺阻若船少即放未有不淺阻者蓋塘內水大固可以水送船塘內水小亦可以船送船何為以船送船數塘合一塘是也如此塘之船不能行走即將上塘之船歸并此塘蓋船多則水亦長而船俱可下矣如半盆水內置西瓜兩三個則盆內之水立刻長滿是其驗也此又各塘放船之法不獨袁口為然也袁口積船既多將啓板放船必須先著人令開河下板則水不至於大泄矣俟袁口放完船下板之後開河仍舊啓板矣若開河下板袁口之船不能放完上下或有淺阻即將開河亮板一二塊船自無不行矣此法固善但昨於閏四月初一日下板少而上下俱經淺阻又不可不慮也是不若開河仍舊下板開河放兩塘袁口放一塘袁口放兩塘靳口放一塘自無淺阻之患若一塘有三二百勢必不能容兩塘者亦可以一塘放一塘矣此又在人之隨時變通耳袁家口閘上下河水甚淺每逄天旱船最難行此閘放船須先將南旺上閘板嚴下用人看守然後將下閘板全啓放水北注若閘上有船即令隨水放下至開河閘又將開河閘板全啓放水北注若閘上有船亦令隨水放下並放到袁口閘然後將袁口閘板全啓放船自無淺阻之虞放過袁口將此板勿下再啓靳口閘板放船直待船放完時却先將靳口閘下板然後再下袁口閘板却將南旺上閘板全啓將閘上之船直放至袁口若開河閘上水淺將板略下一時水足即啓自無不通行者開河閘要與南旺下閘上閘酌量啓閉尋常水足用時一例啓閉無容置議矣獨至北運水小之時則此閘啓閉須要得法如水甚小南旺下閘既不下板矣此閘或下板六塊或下板四塊或下板二塊或可不下板亦竟不必下矣如南旺塘河內糧船淺阻則酌量下一二塊或三四塊使糧船得行便止不必多下或曰開河不下板南旺下閘下糧船淺阻奈何曰俟糧船淺阻時再將開河酌量下板三五塊至糧船齊幫後則將板盡啓放船及船放完時閘板又不必下矣然亦當視分水口水勢之大小若分水口不足五尺五寸則南旺下閘宜酌量下板矣此閘不下板其法固善但恐袁口閘一少下板而上源之淺阻立見是不若開河仍下板開河放兩塘袁口放一塘或船太多有三兩幫塘內不能容者仍一塘放一塘開河閘亦宜下板十八塊積水使由關家大閘及五里鋪滚水石壩入南旺湖中蓄以待用南旺下閘不宜下板故糧船一過南旺上閘上閘下板即可竟過下閘與開河閘直抵袁家口閘矣若北運之水既盛而上閘以南水或不足用即將此閘下板上閘亮板一塊而南運自無不足矣然又宜視分水口水勢之大小若分水口不足六尺下閘即宜酌量下板數塊若仍不足六尺即宜再下幾塊若足六尺即止若過六尺即酌量啓板蓋以六尺為率過即當啓板不足即當下板而開河亦當下板矣總貴相機啓閉斟酌得宜然此為北河水小故也若北河水勢足用遇汶河水大即宜將南旺上下兩閘閘板全下使水由斗門入南旺湖蓄之備用南旺下閘啓閉宜得法平常水足之時宜與上閘一例啓閉不可或偏獨至北運水小之時則此閘宜少下板一二塊如水仍小則再少下一二塊如北邊水勢十分小時則此閘之板竟可不下使此塘之水南至南旺上閘北直至開河閘南旺下閘竟可不用如北邊水仍小則開河閘亦宜酌量下板矣然此閘之板要少遲而啓使汶河之水灌滿塘河則水之所蓄既盛南旺下閘一開往北之水自多矣上閘閉板之後必遲一二日下閘方可啓板南旺上閘為南運之第一閘南旺以南湖水甚多不虞水少故上閘宜常閉南旺以北止恃此一線之水故下閘開河閘宜常開但恐北既有餘而南或不足又宜暫閉下閘將上閘亮板一塊以接濟南運然此北運之水有餘然後可不然恐南有水而北又無水矣不可不慮也南旺塘河原所以酌南北之宜南運水小宜啓上閘板放水使南北運水小宜啓下閘板放水使北若南北水俱足用而汶河之水仍大則宜閉上下二閘使水由斗門入南旺湖仍以備南北不時之需舊例南旺上下閘一例啓閉豫今直以上閘為界水第一閘常閉此閘堵水使不南行汶水專濟北運泗水專濟南運上閘下糧船積至二百方可開放一次決不可輕易啓板使水南泄也蓋南運原不少水多泄於南不惟隄岸難保民田受淹而糧船亦難行走况北運之需水更急乎宜以上閘為北界水閘使汶河之水不得南行直注北河則自南旺以至臨清可無淺阻之患矣此閘宜下板十八塊若運河水大使由五斗門入南旺湖中蓄以待用寺前閘最宜嚴謹蓋南旺之水南行最順此閘一不嚴謹則水之泄於南者太多而北運勢必淺阻此一定之理也若逄天旱之年汶水不足濟運開利運閘以濟北運則此閘尤為緊要此閘既嚴而南旺上下二閘開河閘俱不下板而水始可以通行北注乙酉初夏汶河水微不能濟運巳經用此法以濟北運甚覺有益寺前鋪閘不可多開啓板太勤則泄水必多閘下糧船必積二百餘隻足滿一塘方可啓板閘板一啓即速開船船過完即速閉板則水之所泄必少矣寺前鋪閘宜下板十八塊蓋板須多下則水不大泄如閘上水大則令由盛進口張箱口入南旺湖以蓄之務使水足濟運而止水大則宜加板草塞席貼毋使泄水乃妙宜於寺前鋪閘作中界水閘使泗水不得北行汶水不得南行則汶泗各有専濟之功矣此閘亦宜下板十八塊積水使由焦鸞口盛進口張箱口入南旺湖中蓄以待用關家大閘亦所以泄運河有餘之水且蓄水以濟運者也年久廢壞無存遂失古人之制宜重為修整利運閘在寺前鋪閘之北在南旺上閘之南為蜀山湖之門戶相𫝊以為濟南運不濟北運豫始亦信以為然見南來濟運之水甚多而北運每苦無水故二年以來堅閉利運閘不令開放使蜀山湖水由田家樓口邢家林口入汶河出南旺分水口濟運今初夏皇上回鑾見運河自南旺以北水勢甚小乃相度形勢量水淺深知利運閘之水可以北注於是令閘官堅閉寺前鋪閘並啓南旺上下開河三閘二板開利運閘放水北注其勢暢流心竊喜之遂赴臺莊接駕豈期閘官不用吾命寺前鋪閘數日並不下板以致水盡南注南旺以北水勢仍小聖駕一到子恐有淺阻乃閉開河袁口靳口三閘板俟聖駕到時即為啓板幸得龍舟無阻方皇上在五里鋪下營見河水甚小一夜之間內侍到閘數次問水大小衆河官紛紛議論有謂利運閘濟南運而不濟北運者有謂當閉利運閘者有謂當閉南旺上閘者豫雖有百口無能置辨及聖駕巳過河水更小蓋因隨駕船隻不時北上閘板難下泄水太過糧船停泊南旺塘內已月餘矣不能行走乃堅閉寺前鋪閘啓南旺上閘下閘開河閘各板開利運閘放水北注而從前停泊之糧船遄行無阻自此以後河官閘官乃皆知利運閘可以濟北運矣前言濟南運而不濟北運者蓋以利運閘之水一過寺前鋪閘至通濟閘有三十餘里之逺且地勢最下水性就下安得而不往南乎北過南旺上閘至下閘止十里逺又有汶水南行上閘一啓板汶河之水且往南流利運閘之水又安能北往乎是利運常開則止濟南運而不濟北運矣余今用一法南北兼濟將閘板常閉南邊少水則閉上閘啓寺前鋪板開利運閘放水以濟南運水勢足用即行下板不可多泄北邉少水則閉寺前鋪閘啓南旺土下開河三閘之板開利運閘放水以濟北運水勢足用即行下板則南北可以兼濟而水勢不致妄泄似為得節宣之要矣以上並居濟一得行水金鑑卷一百四十五
