body:
  text: 行水金鑑巻一百四十六江南按察使傅澤洪撰運河水馬踏湖周三十四里其上為釣臺泊水漲則滙入北湖出開河閘迤北由𢎞仁橋入運其幇湖運堤自禹王廟起至𢎞仁橋止二千六百六十三丈其湖堤亦自禹王廟起至𢎞仁橋止三千三百餘丈係土築以蓄水濟運歴歳收蓄汶水原有北月河口王士義口徐建口亦無子堤盖東湖地勢漸髙無需防遏止於官民界分植柳豎石以杜侵冒而南至長溝小河口蘇魯橋北至田家樓受水之處亦堤而築之視西湖工倍焉為閘者三在李泰口𢎞仁橋為壩者二在馮家口王巖口其戴村王堂二口皆蓄洩要害處至於闗闌全湖伸縮漕河則有南北端二閘東西岸十七斗門以時啓閉實為水櫃盜決侵種宜禁云山東全河備考馬踏湖所以濟北運也其湖口有曰徐建口有曰王士義口皆放湖水入汶河出分水口者也有曰新河頭有曰𢎞仁橋皆放湖水入運河者也故徐建口王士義口不宜開放至北河水小或開新河頭或開𢎞仁橋以接濟之若北河水勢足用仍宜堵閉蓄水此一定而不可易者也湖計一百四十餘頃與𢎞仁橋相通故水大之時盡由𢎞仁橋洩入運河以故不能蓄水稍遇天旱便成乾渇今宜於開河以東築湖堤一道其髙寛宜與運河之堤相等則水有所蓄而不至於乾涸矣𢎞仁橋馬踏湖之門户也馬踏湖水大毎由此分洩入運但未有閘座蓄洩不便故急宜建置居濟一得五里鋪滚水石壩盖洩運河有餘之水入南旺湖蓄以濟運者也毎逢運河水有餘則洩入湖中及運河水不足則由開河之下兼濟閘放出濟運不知始自何年竟為堵築矣運河水大既不能洩入湖中運河水小又無憑開放以濟之古人之法盡廢矣今宜仍為開通以備蓄洩庶於漕運大有禆益此壩底髙於河底四尺有餘小則蓄以濟運大則洩入湖中查南旺上以南有盛進口張廂口焦鸞口三斗門洩水入湖此不用斗門而用石壩者盖北運無水接濟倘或過洩恐不足以濟運故用石壩以備蓄洩此古人制度之盡善者也老壩口舊在徐建口之下壩下係大挑之工不知始自何年竟改築於王士義口之下矣以致王士義口之上至徐建口一段並不挑挖殊非大挑之意今應仍築於徐建口之下自大壩至分水口一段遇大挑年照舊挑穵庶塘河不致淤墊而大挑之工較省矣小壩口所以致汶河有餘之水入蜀山湖蓄以待用者也汶水小則堵塞此口令汶水盡出大壩口以濟運汶水大則將大壩口酌量收束小壩口開放使運河水足用而止餘者盡由小壩口入蜀山湖俟汶水小時仍行堵塞宜建小閘一座以備蓄洩更為妥當居濟一得南旺湖在汶上縣西南周漕渠兩涯共一百八十里中為二長堤漕渠貫其中畫而為三漕渠西者為西湖即名南旺湖一名汶河漕渠東者為東湖在汶河隄南名蜀山在汶河堤北名馬踏南旺縈迴九十三里成化間始為石堤湖多菱芡蒲荷茭荻魚鼈居人采擷為利嘉靖間周築四圍堤岸一萬五千六百餘丈萬厯間除幇湖運堤三千六百丈外幇築湖堤南西北三面共一萬二千餘丈復添築東面子堤一千一百八十八丈又於五里鋪建石壩一座長五丈以便蓄洩濟運原湖二千七百頃向除子堤畫界處髙亢地及宋尚書白老人香火地二百八十頃外其二千四百餘頃為水櫃隨堤内開有大渠以湖身北髙南下復穿小渠二十餘道縱横聫絡使湖水通流備濟萬厯十七年張居敬奏請南旺等湖各查頃畝於髙下相承之地築一束湖小隄隄内永為水櫃堤外作為湖田聽民耕種庶限界分明内外有辨小民難於侵占官司易於稽查詔從之是南旺諸湖有淤髙之地可耕自昔巳然其所以不令召種者慮其有礙於運也今西湖積沙日久髙地雖多而低窪之處仍以蓄洩濟運宜開濬深通復其舊界否則漸為平陸矣南旺分水地形最髙所謂水脊也主事王寵論蓄洩之大略曰南旺旱乾常在二三四月方其旱也毎有淺阻之患前此或濬泉源或放湖水或築土壩多方以蓄之愚以為不若一日一啓閘為上策毎泛濫於六七八月當其溢也毎有衝覆之患前此或開南旺湖或開減水閘或決金口壩多方以洩之愚以為不若不閉閘開月河行船為上策予嘗當旱涸之時自分水逆流而上至黒馬溝凡二十里或三百料或五百料或千料船皆能通行於兩河而無阻則閘座之為緊要可知又嘗窮歴汶源至萊蕪原山之陽不過三百餘里以三百餘里之泉源而欲分流以供二千餘里之漕渠使非築塞疏濬啓閉有方又安能行轉運哉則閘座之為緊要又可知矣至於旱乾之甚則當行車水之法試以百船論之毎船漕卒十人至南旺盤剥當費百也此法行則毎船止用一人給車二十輛什二守閘什八踏車以挽湖水毎車用四人二十車用八十人一車加水七寸二十車則加一丈四尺逮五十里之湖水乾則天雨必至矣此所以可行而無弊也水大之甚則開南旺以收水開永通閘以行船不惟可分殺滔天之勢且免濟寧一帶閘河之險矣而潘季馴則曰南旺地髙決諸南則南流決諸北則北流惟吾所用耳當春夏糧運盛行之時正汶水㣲弱之際分流則不足合流則有餘宜效輪番法如運艘淺於南則閉南旺北閘令汶盡南流如運艘淺於北則閉南旺南閘令汶盡北流當其南也更發濵南諸湖水佐之當其北也更發濵北諸湖水佐之泉湖兼注南北合流即遇旱暵靡不克濟此誠力不勞而功倍也南旺大挑舊例三年再舉正月十五築壩絶流興工至二月中完主事笪東光議創上源閘壩以省大挑畧曰竊照運河實國家命脉攸闗而其最莫如南旺分水毎遇大挑征夫以萬計支銀以千計非惟勞費不貲且斷流二月南北舟楫不通是一利亦一害也歳丁卯一挑越已已又挑三年之内再舉大役民力得無竭乎推原其故皆因南旺上接汶河及徂徠諸泉平時固皆清流霖雨驟至則數百里之沙泥盡洗而流入汶河至南旺則地勢平洋而又有二閘横攔故沙泥盡淤比他處獨髙毎水漲一次則淤髙一尺積一年則髙數尺二年不挑則河身盡填此大挑之役亦勢之不得不然者也乃從來大挑用工甚拙不識分工自下而上放水為便毎築隔起水晝夜不息皆用力於無益之地其始也有打壩築隔之勞其既也有起水之苦其終也又費起壩挑隔之力曠日既久大壩一開上水隨至各處淤淺俱不及挑傾堤亦不能築名曰大挑實非完工矣曷若於上源打壩之處設立石閘一座隨時啓閉又於閘之左右各建減水閘一座名曰斗門一通馬踏湖一通蜀山湖平時則斗門盡閉中閘常開放水入運一遇洪水則斗門盡啓中閘下板五塊沙泥盡隨斗門入湖如此則二湖之役不惟可為水櫃亦可為沙櫃矣縱横水溷濁未可盡汰亦能去其十之七八雖十年一挑亦可也萬一各處或有淤淺傾頽欲行濬撈則一札板之下可以斷流不用樁草夫力之煩又無曠日稽遲之苦用力少而成功多雖毎年一挑亦不為勞矣河道侍郎萬恭議改於九月誠為先事預圖且量地施工力既不費於槩挑乘時興役夫又不苦於凍沍回空已盡築壩絶流疏濬一完藉冰封閉是新運之便也萬厯四年開鑿月河間年一大挑毎年一小挑大挑之期定於九十月起工其回空及一應船隻皆由月河行走官民稱便自明季崇禎壬午年間土宼旱荒一時並作月河堙廢於是改為十一月開壩十二月正月挑浚祁寒膠凍墮指裂膚人夫施力十倍艱辛今閘基河形俱在設法修復猶屬易事國用稍裕即應整理至南旺運河兩岸毎年挑河積土成山一經霖雨仍淋入河中徒勞挑浚殊為無益南岸積沙近已捲去北岸尚未興挑應於閒曠之時展運使平嗣後責令挑河夫役務將所挑沙土擡至廣衍處所不得即置岸旁庶為得之山東全河備考南旺湖蓄水原以濟運河之不足者也南運不足則開濟運閘放水使南今之十字河是也北運不足則開闗家大閘五里鋪滚水石壩放水北注不知始於何人起自何年竟將闗家大閘滚水石壩實行堵築矣而所常開者十字河也南運湖水既多而又常開十字河故濟寧魚臺民田毎受淹沒北運既無湖水接濟而人將闗家大閘滚水石壩永行堵塞所以東昌一帶糧船毎遭淺阻也今宜將十字河永行堵塞將滚水石壩仍行開通或再將闗家大閘開通或將王化家莊對岸河南開通建石閘一座以濟北運則北河永無淺阻之虞矣南旺大壩正月議定開壩之期即於先期三日將南越河口北越河口田家樓口徐建口盡行堵築堅固勿令過水然後開壩開壩之後先通漕放水三日然後各閘下板南旺上下二閘板皆全下以後南河水小將上閘板少下下閘板多下如北河水小將上閘板多下下閘板少下如水太小即將下閘板全啓如過船之時恐船淺擱下板數塊蓄水養船船過之後依舊全啓大壩既開之後即宜赴州縣疏浚泉源使水暢流濟運南旺開壩安居閘十里閘楊家壩金口壩十字河俱不宜開止宜開魯橋壩俟南河水小之時先開安居閘如水再小方可開十里閘如遇天旱之年北河水小南旺塘内及開河塘内不得存船以致壅蔽水勢不得暢流南旺各斗門俱宜重修仍照舊下板毎遇伏秋水長河水入湖則啓板收水入湖湖水入河則下板蓄水不使洩出至秋後無水可收仍於湖口築壩堵水直至春夏水小糧運難行時方可酌量開放陸續接濟南旺分水最宜斟酌如春月重運盛行之時南邊淺阻則多放水往南北邊淺阻則多放水往北若遇伏秋水長運河水大重運在北則水往南放重運在南則水往北放可使水勢常平糧船易行宜以南旺分水改為汶河口專往北行不分水於南則北河之水自足濟運矣如糧船盛行水不足用則納量出蜀山湖水以助之如再不足則宜開洪仁橋放馬踏湖水以助之則北河一帶之水自無不足之患矣王堂口宜建石閘一座北運水小時則啓板從此放水接濟北運如南旺水小則開蜀山湖口以助之若汶河水發亦可啓板從此分洩蓄之沙河棗林河内若安山湖復設亦可蓄之安山湖内此最為得策何家口壩距汶上縣十三里係南旺湖之尾閭此口稍卑汶水就西而下毎決房口傷運河堤南旺之水遂涸萬厯二十四年築石壩平時任其南逝水漲洩而之西良得策也然必須將何家壩改閘一座北運水小可以開放接濟汶河水發亦可分洩蓄積其用與王堂口等居濟一得戴村壩距東平州六十里一名周李村長五里十三步汶水從陶泰而來就鹽河由博興車瀆入海永樂九年宋尚書用老人白英計分水南旺築此壩横遏汶水南流㑹通河始得濟運誠全河之屏障也其壩屢修屢圯營費不資天順五年知州潘洪増築髙厚上植以柳至今不壞先年設夫増土植柳培䕶周密張純守壩論曰漕河之有戴村譬人身之咽喉也咽喉病則元氣洩走四肢莫得而運矣昔在創建之初歳増土以培之植柳以䕶之多設夫以守之其防禦盖甚密也後土日増柳日固則夫議停役所以寛民力也然物久則壞防弛則廢即今單薄日甚而原植䕶柳什無一二存矣況兖地土疎汶性湍急萬一水失其性得無慮與然則為之奈何乘泉夫之餘力歳加修築増鋪舍植新柳令現役之夫力加守䕶則盤錯根深壩將自固壩固將無所事節乎曰不可也彼其澎湃浩蕩之勢非有以順之則拂非有以蓄之則溢拂與溢等害耳故毎遇水潦須決坎河口以殺之殺之不足則開滚水壩又不足則開減水諸閘或順之入海以披其勢或蓄之入湖以納其流㣲則盡塞令餘波悉歸於漕是節之者固所以守之也此營衞吐納之説也不然三汶爭趨源大流長夏秋水潦怒激奔逸豈一壩所能支誠篤論也今宜如舊例督夫培土栽柳乃運河第一闗鍵山東全河備考戴村壩在坎河口石壩之南五里土堤是也今直呼坎河口石壩為戴村壩矣後人之誤也戴村壩以下宜築草壩四五處束水南流則南旺運河之水自不至於漫溢而為南北數十州縣之害草壩之上搭橋以便行人而渡船亦可不設矣更有一法將戴村壩下用土實築壩一道以攔正河却於東岸建閘或三座或四座若挑引河使水由閘而南則汶上各縣不致湮沒而閘亦可啓可閉以備蓄洩則漕運民田均有賴矣居濟一得坎河口閘在戴村東宋尚書既築壩戴村遏汶水之入海者注之南旺水無旁洩留坎河口不壩以備分洩入海毎歳重運過時止用刮沙板作一沙壩於坎河口即涓滴盡趨南旺若水漲則連沙衝出坎河後河身漸移近坎河口全河之水直灌坎口故土壩歳築歳決萬厯初侍郎萬恭壘石為灘毎歳築壩勞費不貲且全流漫衍而入鹽河南旺毎至膠舟萬厯十七年總河潘季馴築石壩四十丈髙三尺上博丈五尺下益尺六之一兩翼之長視壩減五之二其髙倍之左右為土堤二百三十丈東岸為石堤厚一丈其法用丈許大石夾砌如墉實細石其中塗以堊坿上鋭下豐狀如魚背水髙於壩漫而西出漕無溢也水卑於壩順流而南漕無涸也二十一年水大發尚書舒應龍又於河口之下開渠洩水因於兩傍各築石堰以防衝刷之患先是石壩未築主事余毅中議應築石壩略曰汶河原從迤南松山之麓衝向戴村入海故宋公築壩戴村遏汶趨南旺而留坎河口不壩以備分洩入海比時松山之麓正河深廣水性就下即順流而南故坎河口止用沙壩近松山一帶沙漸淤平河身移近坎河全河之水俱入故土壩歳築歳決萬厯以來創為石灘似亦良法但重運水渇之時有隙可以洩水而伏秋水溢之日則無路可以通沙以故正河淤塞日甚毎歳築壩之勞費如故為今之計急宜大集泉壩人夫從正河見流之身挑去淤沙使漸近松山一帶照舊深廣水入正河既順則入坎河漸㣲但坎河口深廣倍昔沙土堤壩必不足恃欲為經久之策莫若連建數閘以時蓄泄如元人堽城壩之制盖國朝運道之有戴村猶元人運道之有堽城堽城可閘則坎河亦可閘也其次莫若採大石為壩如馮家滚水壩之制查迤東龍山一帶可取大石去坎河僅五里許合無量動河道官銀募工製器如式開鑿運砌西接戴村東盡坎河俱挑沙入地數尺先砌石基後酌量水平建滚水長壩其兩土岸俱用大石砌為雁翅以防水之旁衝又主事張文奇議應仍築土壩略曰宋公築壩戴村而留坎河不壩者勢不可也諸泉合流三汶爭趨勢何嘗一日不欲東注之海哉況霖潦之時乎故方其水涸春夏三四月秋冬九十月運道咽喉所係即涓滴當盡歸南旺湖可洩也若夏秋之間則南旺濟寧一帶通漕啓板水尚漲溢與運河岸平坎河口雖開而迤下王堂王巖何家缺口十餘處且不免一二衝決汶邑民田多罹淹没宋公之慮亦深逺矣邇來議者因土壩歳築勞費創為石灘但方其水溢勢甚洶湧若石灘阻壅不能大洩勢必多潰裂於王堂諸口及草橋上下驟水所經民田受害非細不便一且灘能走水不能走沙淤沙日積河身日髙漸與灘平反助障阻不便二況未及兩年石灘衝動水涸之時乘隙而洩土壩仍不能免乂奚賴焉議者又欲築建滚水大壩以淤沙不得衝出弊亦與石灘等為今之計坎河既決一俟霜降後即當仍舊歳築土壩計毎歳之費大約不踰百金且水直衝坎河則上源之勢既殺而下源之勢稍㣲王堂諸口不致盡決汶邑民田得免淹沒以利害計雖歳有數十金之費利倍於害矣加之歳挑西岸沙觜使正河深廣漸復故吾水不東逼徑流趨南則戴村壩根既避衝刷之患坎河壩兩際亦不至盡決無存議者慎無重惜小費輕議難成壅遏漲水而貽意外之虞也二公之議不無異同然其慮未始不周迨張公居敬循行汶上規畫建言而潘公季馴之石壩始成宋公之渠於以永賴乃知創建非常昔人不敢輕視一坎河也宋公留其口而不壩萬公以石為灘潘公以石為壩因時異建罔弗合宜盖慎之也後之人披覽往迹其可妄行舉廢哉山東全河備考坎河口壩宜照堽城壩金口壩之制連建數斗門以時啓閉但今沙淤日積河底漸髙將與壩平故宜比舊制稍髙當南接戴村北盡坎河其間設斗門八座如閘之制石壩既長斗門又多則可以洩水而戴村壩無衝決之虞矣又恐壩底太髙水不能洩但照舊制於石壩之上毎當春月再築土壩一道或二尺髙或三尺髙蓄水濟運至伏秋水發聽其衝去來歳再築所費無幾甚為妥便石壩止百餘丈不足以備分洩毎逢水長戴村土壩常被衝決故今宜將石壩再加寛一百丈庶乎水易分洩而戴村壩可保而汶上亦免淹沒之患矣汶河之水發源松山及新泰萊蕪至汶上而河始大故毎逢水長則汶上先受其害今宜於汶河兩岸加築堤岸則汶河水長庶不至於淹沒矣汶河中閘之板當視分水口之誌樁以為啓閉如運河五尺水足以濟運則止用五尺水過五尺則酌量下板使水至五尺則止不足五尺則酌量啓板使水至五尺而止如中閘下板則將東西二斗門啓板收水入湖俟中閘啓板之時仍將二斗門閉板毋洩湖水如中間之板全啓運河水猶不足用則將斗門酌量啓板放出湖水接濟足用即止不可過洩盖湖中之水常使有餘毋使不足也居濟一得堽城舊有堽城在焉壩距寧陽縣北三十里元至正間築土壩以遏汶水入洸明永樂中宋禮移置青川驛成化中張盛改築以石當汶水中一百二十丈闊一丈七尺為水門七又於新堰鑿河十里南入於洸謂之洸河為閘者二曰堽城閘在堽城西北隅百步元至元建曰堽城新閘距舊閘八里在新堰上流明成化中建乃遏汶之要津也然自永樂中改從南旺分水於西南下流增築戴村壩而堽城稍輕矣𢎞治中巡撫徐源奏毁石壩命侍郎李璲勘議尋已之張純議棄堽城壩略曰堽城石壩築於成化之十三年然非始於是年也在昔有元畢輔國曽於堽城之左作斗門遏汶入洸矣其後如馬之貞作雙虹門馬元公改作東大閘皆有事於堽城者也然則何可棄乎盖元分水在濟故遏汶入洸㑹沂泗以出天井自宋公移分水於南旺則遏汶之功全在戴村而汶遂不通洸矣議者徒以元人遺迹乃復事於堽城移其壩於青川改建以石糜財疲力置諸無用之地未幾壩亦隨壞盖未解宋公之意與元人所以設壩之由也以今觀之堽城之議當以徐公之見為是後人幸無借口李公也萬厯二十五年大水衝決南岸石梁土堤主事胡瓚重築五百餘丈今歳久南岸石梁皆傾雖與運道無闗然有舉無廢地方之責且石俱在河止需工而不需料仍修築以資利涉未為不可山東全河備考此壩雖廢錄之以備考焉行水金鑑巻一百四十六
