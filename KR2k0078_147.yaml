body:
  text: 行水金鑑卷一百四十七江南按察使傅澤洪撰運河水嘉祥縣河道北自汶上縣孫村交界起南至巨野縣小長溝迤北交界止計長十六里河防志蜀山湖周六十五里一山獨峙湖心蜀者獨也故名其幫湖運堤屬嘉祥者自馮家壩至孫村二千三百四十四丈屬汶上者自孫村至分水口南一千五百丈其湖堤自馮家壩起至蘇魯橋止共長三千五百十丈以蓄水濟運厯嵗收蓄汶水原有南月河口林家村口田家樓口及胡家樓口而無子堤每水大則出長溝滚水壩入馬場湖而石壩自明季以來久廢現從蘇魯橋陳蔡口注之又本壩以北别有嵗築草壩一道兩頭泄㵼接聫湖堤其東北受水處植栁以禁侵佃山東全河備考蜀山湖所以蓄水濟運也故冬月挑河之時則汶河之水盡收入湖以備春夏之用故此湖之水較他湖為最緊要但從前湖水盛大則由馮家壩滚入馬場湖今馮家壩已經堵築閉塞矣蓋馬場湖巳受府河泗河之水故不必再加以此湖之水也但數年以來開利運閘則此湖之水多泄于南故北運每苦淺阻今宜將利運閘永為閉塞而此湖之水専濟北運逮北河水小然後開田家樓邢家林河口出分水口閉栁林閘開十里閘使水北注則北河之水自無不足矣湖地計一千八百九十餘頃除宋尚書祭田地十二頃并髙亢地八頃五十三畝令民佃種外其餘一千八百六十九頃四十六畝二分蓄水有南月河口邢家林口田家樓口胡家樓口又長溝有滚水石壩一道東岸有陳蔡口每湖水大則從此出入馬場河十字河不可輕開蓋南旺湖水原蓄以濟北運者也若南運水小需用南旺湖水亦必待金口壩黑風口五里營閘十里鋪閘安居閘竝楊家壩盡皆開放而水仍不足以濟運然後開十字河十字河既開須俟重運一過南旺即將十字河堵閉蓋南水之入海既逺而中間之水如彭口大泛口徐塘口之入運河者又多且兼以獨山湖南陽湖昭陽湖微山湖各處之水滙流入運河以達海運河既小宣泄不及勢必泛溢民田此十字河之必不可開蓋恐其助南行之水而為虐者也古人分水三分往南良有故也十字河形如十字河在柳林寺前二閘之間蓋馬場河之下流也過寺前閘之下則為通濟閘白嘴宜建閘一座使馬場湖水由此入運則不致一泄無餘蓋此處宜與通濟閘相照應如通濟閘下板須使馬場河水灌滿運河然後送㑹牌到寺前鋪使寺前啓板則南旺之水不至大泄於南矣居濟一得巨野縣河道北自嘉祥縣大長溝迤南交界起南至濟寧衛曹井橋迤北交界止計長二十五里內有通濟閘一座河防志馮家壩在大長溝萬厯十七年建長十餘丈係蜀山湖之門户地卑而水易泄故築石壩以障之水大則泄入馬場湖不至病民水小則蓄以濟運實為要區山東全河備考通濟閘舊例下板十二塊但閘夫利於少下故閘之上下每有阻澀須時為稽查使板全下則運艘自可通行矣時船少時自當一塘灌一塘若濟寧以南一帶船多須天井閘過四塘或過五塘此閘始放一塘則水不妄泄上下自無淺阻之虞若上下水勢足用又不必儘塘灌放耽延時日須一塘約過二百隻可滿寺前閘一塘足矣豫斟酌南北之宜專以此閘為界水第三閘蓋寺前閘啓板放船則此閘之板嚴下水自不至於南泄也此閘宜下板十八塊蓋必多下板方能蓄水而閘板又不宜多啓蓋多啓則泄水太甚故或三日一次啓板或二日一次啓板必不得已亦必一日一次啓板斷不可一日二次或三次啓板以致泄水太甚後不能繼必致淺阻啓板之後船已過完即速下板而㑹牌亦不可早送必俟次日方可送到寺前鋪閘使馬場湖水必由白嘴入運河將通濟閘上一塘灌滿然後啓寺前鋪閘則上源之水不致多泄而南旺上下不致淺阻矣居濟一得濟寧衛河道北自曹井橋迤北巨野縣交界起南至五里營迤東濟寧州交界止計長一十七里八分河防志濟寧之西湖曰馬場又名任湖在漕渠北岸周圍四十里上受蜀山湖水北岸為減水閘三即五里營十里鋪安居鎮是也東為堤一道長一千六百餘丈湖之西口為馮家壩山東全河備考蜀山湖之水由馮家滚水壩入湖故於五里營建束水堤一道以蓄水又建減水閘一座以泄水又於十里鋪安居各建減水閘一座以備蓄泄此古制也自馮家滚水壩堵築開五里營堤口而馬場湖乃不受蜀山之水而受府河之水矣府河即泗河也既引泗河之水入馬場湖自應於馬場湖內開河一道於長溝開一泗河口放水濟運如南旺汶河口之制則泗水始為有用矣以泗水濟南運以汶水濟北運而北運之水自無不足之患矣馬場湖承受洸泗二河之水蓄以濟運最關緊要原額七百三十餘頃載明濟寧州志緣湖北無堤公私混雜以致濵湖居民僉以淹沒民田屢呈放水築堤前經詳憲飭查在案而該府輒以水內難查為詞尚未清界今湖水已經開放殆盡地畝俱已涸出若不及時清查築堤將來又蹈前轍則湖終無蓄水之日矣理合詳憲迅賜委員及時查丈清界築堤庶湖地原額得復民田免淹湖水得蓄而運道民生均有攸賴矣十里鋪閘在五里營閘之上五里營閘已經廢壞不必修矣至十里鋪閘亦不可輕開蓋此閘界在湖心一經開放則湖水一泄無餘必運河水涸糧船淺阻萬不得已然後可開此閘且看後邊糧船多少如糧船無多可開若糧船尚少必不可輕開恐後不接濟也惟白嘴開放無妨安居閘亦不可輕開為其泄水太甚也必俟白嘴不能入運方可開放此閘然開放亦當有節須閘上下板酌量放水使僅足濟運無致太泄仍於閘內引河兩旁開副河二道每道開導水之小渠五處二道共十處如用水時先開一渠如不足再開一渠又不足乃再開一渠漸次開放水足即止不可多開致水盡泄十里鋪閘亦宜倣此居濟一得居十里鋪平水閘安平水閘俱在衛境牛頭河西自耐牢坡口在濟寧州境東至魚臺之塌場口九十里係明初徐達所開不惟可以通運而濟寧以南窪地之水由之泄入昭陽實濟寧以南之水道也自穀亭淤而塌場口塞濟寧南鄉遂歲受水患應仍浚牛頭河使達昭陽諸湖以通蓄泄而濟寧南鄉一帶窪地倘能築岸分墟效江南插秧種稻之法以獲水田之利即可轉荒瘠而變膏腴亦存乎其人之興舉也昔商輅記平江伯陳鋭開耐牢坡略曰前史云有志者事竟成此可為遇事而不為與為事而無成功之勸昔洪水為害禹受命治之疏三江導九河鑿龍門排伊闕而後水順其道人得寧居此聖人之功萬世永賴卓乎不可及已後世若李冰疏江水以利民范仲淹築海堤以捍患皆足惠當時而傳後世孰謂天下果有不可為之事有不可成之功乎若今漕運總兵平江伯陳君鋭可謂勇於有為而果於成功者已君故平江恭襄公曽孫年富力强才髙識卓縉紳大夫咸推重之遂自兩廣總鎮移董漕運期歲之間凡恭襄所遺良法美意悉舉而行漕途坦坦人自以為弗勞頃至濟寧見運舟上閘之難因以所聞耐牢坡舊河詢之居民有進而告者曰是河不通舟楫已踰百年宣德初恭襄公嘗命工疏浚未及成而公捐館至今人猶惜之君乃躬詣相度果有可行之勢遂㑹總督漕運都憲李君裕移檄山東管河副使陳君善通判陳翼出公帑之積鳩工市材卜日舉事自耐牢坡至塌場口計九十八里其間石橋土堰灘淺淤塞一一疏之耐牢河口舊有減水閘移進二里許改置大閘又增置塌場口閘以節下流之疾於是水勢平夷舟行便利因改耐牢坡河曰永通河閘曰永通閘其新設塌場口閘曰廣運閘閘各有㕔皆三楹一軒翼以兩廂拱以門樓衛以垣墉挽舟有具供役有夫經始於成化乙未春二月畢工於是歲夏五月事聞朝廷特設閘官蒞之蓋是河故蹟郡志載至元六年黃河水溢自曹縣界東北流瀦巨野澤從東南經嘉祥縣蓮花池抵古濟州以西二十五里為耐牢坡南經魚臺縣大塌場入㑹通河即今運河當時江南舟楫俱此經行洪武戊辰河水復溢而此河因塞自魯橋以北皆舍舟從陸設為車站永樂辛卯復命大臣疏濬河道止從近州閘河用工而是河遂廢夫廢於前而興於後果誰之功乎於是漕運中都留守把總都指揮髙興南京各衛把總指揮徐升夏堅輩相率來徴豫文立碑示久遂次第其始末為記翁大立開廢渠泄積水疏略曰臣查國初洪永間開濟寧迤西耐牢坡引曹鄆黃河水經塌場出穀亭以為運道今上有忙生閘通南旺中有永通閘通濟寧下有廣運閘通穀亭者謂之舊黃河自舊黃河以下湖陵城水道尚存舟航可達惟湖陵城之下黃水既退地形反髙臣乃督令兖州府同知章時鸞沛縣知縣李時自留城之回回墓大開決口以達佃戶屯自佃戶屯再開淤澱以達李家口遂與鴻溝相通使穀亭湖陵城之水皆入昭陽湖昭陽湖之水又由鴻溝以出若汶泗水漲則斗門宣泄鴻溝可以納流汶泗水消則斗門封閉漕河可以免涸唇齒相依之形也由忙生閘以至廣運閘由廣運以至湖陵城由湖陵城以出回回墓上下三百里皆與漕河相接首尾相銜之勢也漕河為主鴻溝為輔譬之閥閲之家傍開側户艨艟之艦尾繫輕舠緩急相濟之意也由二公之言觀之則耐牢坡之復開不惟可以變濟寧以南之窪地為膏腴而漕河藉此以吐納亦未始非蓄泄之利也方恆嘗有瀕運諸湖水田議略曰近歲承乏河干時履疆域相度丘原得觀滕沛魚濟各被水淹之處益知東南之水田未嘗不可立致也誠仿東南治田法就其被水患者中間開為支河四圍築以墟岸最為便易乃為之時其耔耘以種秧苗備其桔橰以資車戽則水荒棄地不難變為沃壤獨此國用匱乏生民困苦之時以牛種廬舍問之上上無餘財以升科告佃責之下下無餘力是以逡巡而不敢行是莫若仿元人虞集所言視田授官之意開力田之科有能闢水田若干頃者豫以幾品冠帶多者秩以遞增其田即授為永業如是永著為令則既有閒田以酬其開墾之勞復有冠帶以勵其急公之念凡有餘力之家有不踴躍趨事者乎并附載以備採擇山東全河備考耐牢坡復開甚得蓄泄之利漕運民生均賴至水田之議用意深長果能行此興西北之水利紓東南之民困國家之計孰有大於斯者乎永通閘所以泄運河之水入牛頭河者也每逢水漲運河難容則由此閘宣泄故天井閘水不甚大糧船得以遄行自永通閘堵閉運河之水無處宣泄天井閘水勢湍激糧船難行一船用數百名夫一日僅過數船此糧運所以遲滯也今議復建此閘水大則泄之水小則蓄之居濟一得濟寧州河道北自五里營東濟寧衛交界起南至魚臺縣四里灣交界止計長七十五里閘十座曰天井曰在城曰趙村曰石佛曰新店曰新閘曰仲家淺曰師家莊曰魯橋曰棗林又月河閘三曰上新曰中新曰下新河防志元改任城為濟州開㑹通河導汶泗以㑹其源置閘以分其流南自濟寧至沽頭地降百十有六尺為閘九南入於河曰分水曰天井曰在城曰趙村曰石佛曰新店曰師家莊曰棗林曰南陽其北至奉符為閘以接汶水曰堽城東北至兖州為閘以節泗水自北而南曰金口出魯橋自東而西曰黑風口由府河以出㑹源閘㑹源即天井閘也此未開㑹通以前所建西北自安民山入於新河至臨清地降九十尺為閘十六以達於漳河曰戴家廟曰荆門上曰荆門下曰阿城上曰阿城下曰七級上曰七級下曰周家店曰李海務曰通濟曰永通曰梁家鄉曰土橋曰戴家灣曰新開上曰南板此既開㑹通以後所建皆在至元大德延祐之間至元中又於金口閘南建減水閘曰沂河引沂入泗又建一閘於兖州之西十里曰土婁建一閘於兖州之西三十里曰杏林節泗沂之西流者受闕黨諸泉謂之府河亦謂之濟河西流至天井閘又於濟寧東北四十里建閘曰吳泰曰宫村以接汶水又於馬驛北建閘曰減水以殺洸水大德間又於南陽之南建一閘曰孟陽泊以通江淮至正間又於新店師莊二閘之間建一閘曰黃棟林新閘至順間又於孟陽泊南建一閘曰穀亭滙黃良艾河等泉以厚水勢合觀所建壩閘元人之於㑹通一河計已周矣而南旺一帶止於至正間建開河一閘其他未及講也明初用兵梁晉大將軍徐達於濟寧西二十里耐牢坡口建一閘曰永通從牛頭河以達魚臺之塌場口出穀亭運道逮永樂間宋禮浚㑹通河開袁家口至沙灣之二十里用老人白英計移堽城壩於清川驛又築壩於東平州之戴村橫遏汶水全流南出汶上之南旺分水於是成化間於分水口南建一閘曰南旺上於分水口北建一閘曰南旺下三年大挑以疏其淤塞又於閘之左右各建減水閘一名曰斗門一通馬踏湖一通蜀山湖平時則斗門盡閉中閘常開放水入運一遇洪水則斗門盡啓中閘下板沙泥盡隨斗門入湖大挑始為省力又於濟寧在城天井二閘南穿月河四里許益以閘曰上新下新上下之間更建一閘曰中新於師莊閘北增一閘曰仲家淺於師莊閘南增一閘曰魯橋魯橋師莊之間復建一小閘曰埢里橫遏泗水入漕自濟寧北至巨野境築石堤十二里自巨野北至嘉祥境亦築石堤十里南旺西湖始砌石堤并建靳家口安山沙灣髙口諸閘又修沙灣以北元人所建十六閘又於廣濟渠口築石堤二道自大感應廟起至沙灣長一百六十丈自沙灣起至荆門驛長一千九百三丈又於永通閘南增建三閘曰永通下曰廣運曰廣運上又築濟寧西蓬子山壩濟寧趙村月河石壩又於孟陽泊閘南建一閘曰八里灣修天井以南諸閘又於寧陽縣西四里洸河兩涯引柳泉之水橫過洸河東西立閘曰洸河東西水漲則閉閘以防其淤水澀則啓閘以達其流又於堽城石堰上流建一閘曰堽城新閘自永樂至嘉靖初北至臨清南至穀亭或壩或閘或堰或堤歲有修建㑹通一河得以無阻而曹單黃河屢決南衝穀亭漕渠淤塞嘉靖四十五年自南陽至留城開新河以避穀亭之淤建閘八曰利建曰珠梅曰楊莊曰夏鎮曰滿家曰西柳莊曰馬家橋曰留城接舊河自留城南至鎮口又建閘五曰黃家曰梁境曰內華曰古洪曰鎮口又減水閘二十開月河於閘之旁者六為土若石之壩十有二築兩涯土堤五十三里石堤三十里又於內華閘築伊家林橫堤於戴家山築戴家山橫堤鑿支河八築夾堤六千三百四十餘丈又築獨山湖北岸石堤三十餘里各留口引水入運建減水閘十四座大者二各三洞小者十二建南陽壩以障獨山之流開回回墓支河以引昭陽之水又於濟寧之北建通濟閘建小河口減水閘六築馮家滚水壩修大長溝獲麟古渡又於戴村之東築坎河口石壩以遏汶水入海之路使水大則漫而西出漕不至溢水小則順流而南漕不至涸又開南旺上下月河各建大閘大挑之日汶河及上下二閘各築土壩於此通舟又建五里鋪滚水石壩以備運河水大泄入西湖又修南旺湖漕渠長堤築西湖缺口加築舊堤一萬二千餘丈添築東面子堤一千二百餘丈築蜀山湖東堤蓄水濟運築長溝減水二閘以備蜀山湖水大泄入馬場湖又築馬踏湖土堤三千二百餘丈自嘉靖末至萬厯中北自臨清南至鎮口或壩或閘或堰或堤亦歲有修建新舊運河僅能通漕而地逼於黃每足為害萬厯三十四年又自季家港口至黃林莊開泇河以避鎮口之淤并避徐吕二洪之險建韓莊德勝張莊萬年丁廟頓莊侯遷臺莊等八閘又建彭家口之三洞閘郗山之減水閘韓莊之湖口閘以備旱潦蓄泄濟運又築韓莊湖護閘石堤一道築朱姬莊至韓莊縴道堤十八里以障郗山韓莊諸湖之水又築彭家口壩以遏許由三山龍灣諸泉之由彭口出者築拖泥溝壩以遏許池滄浪諸泉之由大泛口出者築滿壩以遏河水之由滿閘河泄者築吕壩以遏河水之由李家口河泄者自元至元迄明萬厯開泇工成之日建築壩閘堰堤奚止數百而一舉一廢要必於漕運有關表而出之以見古人用意之周云山東全河備考天井閘亦視南陽一帶水之大小如南陽一帶水大則將天井閘以上如南旺之十字河先行堵閉如水仍大則五里營閘十里鋪閘及安居閘酌量堵閉務使水不甚大而後已如南陽一帶水小則將安居閘十里鋪閘及五里營閘酌量開通如再不足用然後將南旺之十字河開通若蜀山湖之利運閘則斷斷不可開者也往年天井閘水勢甚溜每過一船需夫四五百名一日過船不過一二十隻至多不過三四十隻以致在城閘下糧船積聚至數百隻或千餘隻皆因在城閘祗下板十二塊天井閘板一啓水勢建瓴而下在城閘之泄水既多不獨天井閘糧船難過而曹井橋及安居一帶在在淺阻又不思咎由於在城閘之下板甚少而反歸咎於上源之來水太微則又開蜀山湖之利運閘以助之利運閘一開而獨山湖南陽湖與運河一派汪洋湖河莫辨由是濟寧南鄉及魚臺沛縣徐州數百萬頃良田俱受淹沒矣豫在天井閘催船見水勢甚溜一船需夫數百名縴挽呼號之聲不絶而船之過也維艱且天井閘船未過完而曹井橋安居一帶又報淺阻矣豫詢之咸曰非開利運閘則糧船必不能前進豫曰利運閘必不可開者也乃令在城閘增板至一二塊而水勢仍溜又增至三四塊而水勢稍平更增至五六塊連前共十八塊而水勢悉平天井閘過一船不過需夫三五名而已且船未過完而曹井橋安居一帶糧船俱已行動嗣後天井閘一日一夜過船二百八十餘隻而糧船乃不知有天井閘之難過矣豫恐日久弊將復生故書之以備後人之採擇此閘舊例下板十五塊此一定之制也板不全下則上源必致淺阻閘官宜常稽查閘牌同知州判亦宜常稽查閘官蓋閘夫利於少下少下一塊則少啓一塊此好逸而惡勞之常情也若聞閘上一帶水淺必此閘下板未足之故急宜查考加板則上源永無淺阻之虞至於此閘之船必須隨到隨放不可稍遲以致濟寧以南一帶之船壅滯不行此閘放四次或五次通濟閘始可放一次若此閘水小不能放船即令通濟閘放船則此閘有水矣然又不專恃通濟閘上之水須馬場湖水常盈滿或開安居閘或開十里鋪閘水自足用若長溝建閘則止開長溝閘十里鋪安居閘俱可不開在城閘舊例下板十八塊始足蓄水蓋天井閘髙此閘最下若下板或少則水一泄無餘故此閘最關緊要其稽查之勤宜倍於天井閘始足以關住上源之水而不至於下泄此南運之一大關鍵也其放船之法亦宜隨到隨放則濟寧以南之船自不至於壅積矣然此塘之船須儘塘灌放庶水不至於多泄而上源亦免淺阻之患此閘啓閉視南陽一帶水之大小如南陽一帶水大則將在城閘板小啓在城閘下積船一百二三十隻足滿一塘然後啓板灌塘則水之所泄必少而南陽一帶不患乎水大矣如南陽一帶水小需水甚急則在城閘啓板宜勤到一幫即過一幫不拘船數之多少則水之所泄必多而南陽一帶不患乎水小矣總之下用水則宜泄於下下不用水則蓄於上務斟酌得宜蓄泄有方乃為盡善在城閘地勢甚低而其閘背亦低故不能多下板塊不能多下板塊即不能關上源之水故宜將此閘背再接髙五尺則板可以多下或下二十塊或下二十二塊則上源之水有所關而不至於過泄矣蓋前言下板十八塊者以閘背太低不能多下故也非謂十八塊足以關水也趙村西北三里曰在城元大德中建又西北一里曰天井其西南即分水矣諸閘毗連不過一二三里何在城地勢之低若此趙村閘閘背亦低在城閘背既接髙五尺趙村閘背亦宜接髙四尺閘板宜下十六塊始足蓄水而糧船不至淺阻石佛閘閘背亦低趙村閘背既接髙四尺石佛閘背亦宜接髙三尺閘板宜下十四塊則上源有蓄不至過泄此閘宜酌量上下水勢上下水勢俱足則此閘宜下板蓄水糧船既過棗林閘棗林閘閉板即啓師莊閘板如仍淺阻即竝啓仲家淺閘則船自易行矣棗林閘上下俱不深通故每遇天旱之年輒有淺阻而以上師家莊仲家淺新閘竝無淺阻之患乙酉初夏又遇淺阻船不得行豫設一法令啓師家莊閘板而船仍不行又啓仲家淺閘板而船遂通行直過上兩閘上下俱無淺阻此已試之一法也然又須南陽利建邢莊多下閘板草塞席貼不使過水則水不妄泄而船可通行濟寧以南不患水少故宜隨到隨過到一幫即過一幫到兩幫即過兩幫到三幫即過三幫切不可一塘止灌一幫令一幫占一塘則山東四十八閘四十八幫船占住而船遂無可行之理矣故宜隨到隨過不論幫之多少總不使船有留滯也居濟一得楊家壩在濟寧城東泗河之水貫兖府西流合洸水同經此口南入運道原未嘗設壩正德間因劉寵之亂築壩引水西繞以為濟城外護始有壩基然事平即開仍得通運自崇禎十七年流寇猖獗東省震動於是復築此壩障水護城此特一時固圉之計至今未改每遇伏秋水漲不能泄瀉歸湖兩岸民田大受淹沒之害且泗洸之水為此壩所遏由夏家橋入馬場湖而後濟運其道反迂不若改壩為閘時啓時閉急則借以濟運緩則儲以待用民田可無淹沒之虞矣山東全河備考楊家壩自總河楊方興已經奉㫖堵築濟寧紳襟士民旋謀馬場湖地肥美盡皆占種故楊家壩時常盜開楊家壩一開而西湖之水涸矣故楊家壩必不可開今議必為嚴禁如有盜開者即以盜決河防論然禁止者官而賄賂之說行官亦不肯認真矣非極有操守而不顧情面者萬不能禁也居濟一得涸薈蕞云壩則兩岸民田受害不壩則西湖之水又然則如何唯有改壩為閘相機啓閉之法得矣行水金鑑卷一百四十七
