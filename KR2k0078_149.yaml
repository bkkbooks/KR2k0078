body:
  text: 行水金鑑卷一百四十九江南按察使傅澤洪撰運河水邳州運河上自山東嶧縣交界黃林莊起下至宿遷縣交界窑灣口止計河程一百二十里屬邳睢河務同知管轄河防志十薈蕞云邳州在江南淮安府北四百五里東南至宿遷縣石橋界五十里西北至嶧縣陶溝界四十二里西南有磬石山近沂水或謂泗濵浮磬即此州治舊在嶧陽今遷於艾山黃河在舊城南有彭城歷吕梁由睢寧界上至五工頭迤東始入邳境流四十里接皂河抵宿遷縣境治清水河即舊黃河南岸屬睢寧北岸屬邳州自順在初塘池壩塞始由今河而清水河迄今猶存其跡舊城護城堤南董家堂北源泗河在嶧山左去城八十里今淤沒龍化河分泗河在猫兒窩西南去城五十里今淤沒西泇河亦淤沒西堤自猫兒窩起至窑灣口止計長四千二百一十三丈八尺康熙三十六年修築自猫兒窩迤西起至唐宋山止格堤一道長三千五十丈東堤自猫兒窩起至窑灣口止計長三千九百六十六丈六尺五寸康熙四十年補修東岸猫兒窩迤上滚水大壩一座康熙二十二年建萬家莊石壩一座馬莊集石壩一座俱康熙十九年建又上下竹絡壩三座康熙二十七年建又窑灣竹絡壩一座康熙二十九年建俱泄運河出岸之水由隅頭湖入駱馬湖河防志漕河即運河自黃泥莊入邳境歷泇口鎮經徐塘猫兒窩馬莊集萬家莊窑灣口東流抵宿遷界引河去城二十里出自沂州抱犢堌經黃石山泇口考究泉入運黃墩河出自南旺湖由徐州荆山口至全河汴塘入邳境歷彭家河分成子河歸沙溝湖至猫兒窩入運曲吕河去城東南四十里源自壩頭入洪河沂河出自䝉山經沂州沂水縣南流至受賢鄉分派一支出盧口西流二里許復分二支一經城南㑹武河二十五里入運一經官湖出徐塘口入運其本支南流至趙家莊社各溝亦分二支一經炮車繞廟防山歸駱馬湖一經龍池隅頭歸駱湖二水舊俱由臧家口入運今運壩築俱歸駱湖入運矣武河自山東馬旺湖由邳米湯湖出經艾山西流繞城南㑹沂水入運邳州志宿遷運河上自邳州交界窑灣口起下至宿遷張莊運口中河頭止計河程四十七里屬宿虹河務同知管轄以下俱河防志至薈蕞云宿遷縣在淮安府西二百四十里北邳州百三十里東南至桃源縣百二十里縣北二里有馬陵山山前阻河西堤自邳州交界窑灣對岸起至皂河石磡止計長四千八百七十丈九尺東堤自邳州交界窑灣口起至皂河石磡止計長五千二百七十六丈七尺俱康熙十八年創築三十六年加幫自石磡起至張莊運口止支河北岸堤一道計長三千四百一十八尺康熙三十八年修築支河南岸即黃河北岸縷堤宿遷運道因明之舊由宿遷西北十餘里董家溝進口名為董口自康熙六年董口淤斷遂由駱馬湖繼駱馬湖亦淤乃另開皂河康熙二十年七月黃河大漲頃刻淤斷一千餘丈不得通舟前河臣靳輔於皂河迤東挑新河歷龍岡岔路口至張家莊長三千餘丈使清水至張莊出黃河是為張莊運口今俗稱支河者即新河也康熙二十六年又開中河運艘竟由中河入新河而張莊運口不復通黃河矣以上俱河防志運河舊在治西二十步濟汶沂泗諸水流自直河入境經流小河以㑹黃河自古城入桃源縣界小河在治南十里其源出汴入泗易以淺狹故名皂河在治北四十里發源港頭社流入泗水以土色黑故名白洋河在治南四十里今涸故道猶存駱馬湖在治西北十里由溝口入泗白鹿湖在治南五十里由小河入泗土丘湖在治東五十里由新溝入泗宿遷縣志或曰潘季馴專築堤以束水然獨宿遷北岸不築堤今既欲修遙堤又築重堤不亦異乎曰束水歸漕乃季馴終身治河之要㫖實亦萬世不易之至言也然其言曰宿遷北岸有馬陵山及倉基侍丘等湖此皆天然遙堤故獨空之而弗堤若今日之地形水勢則大不然黃河之底與黃河之岸較之明萬厯時既髙數丈而倉基侍丘等湖又皆已淤為平陸無尺寸瀦水之地河水一或出漕漫岸不有隄防必建瓴而四決故臣獨以修遙堤而築重堤為必不可緩也靳文襄公治河書治水之法大者泄之小者蓄之黃河水之至大者也故祇宜泄不宜蓄今又增以駱馬湖之水又焉得而不為害乎故豫謂竹絡壩宜閉也或曰黃河沙重借湖水以刷之不然則黃河恐淤矣豫曰宿遷以上之黃河果誰為刷之乎而何以不聞其遂淤也豈不淤宿遷以上之黃河而獨淤宿遷以下之黃河乎其不足信也明矣或曰中河水小借黃河以濟運也豫曰宿遷以上之中河初無借於黃河之水而何以亦足濟運也況宿遷以下之中河又有駱馬湖水以助之乎豈宿遷以上之中河不借黃河以濟運而宿遷以下之中河必借黃河以濟運乎又豫之所不能解也黃河之水滔滔而來勢不可遏顧可使駱馬湖之水助黃為虐乎故宜閉之使黃河少此一水即少此一水之害矣或曰黃河之沙全借清水以刷今使清水不入黃河則宿遷以下二百里之黃河不慮淤乎豫曰借清水以刷黃河理或有之獨是宿遷以下之黃河慮淤而宿遷以上之黃河獨不慮淤乎宿遷以下之黃河借湖水以刷之而不淤宿遷以上之黃河果誰為刷之而何以卒不聞其淤也且遙遙數千里之黃河數百年以來何以不聞其偶然或淤也此固不待辨而自明者也或曰往時湖水涸時中河水小仍借黃水濟運今而閉之倘中河水小糧船何以遄行乎豫曰現有李經邦閘在倘慮不足以濟運則於此閘之上下再建一閘使兩閘之水並入中河豈猶不足以濟運乎或曰湖水大長時仍由竹絡壩口以泄入黃河今為閉之倘湖水大長中河不虞泛濫乎豫曰於錫成澄泓橋之上下多開減壩使由髙山頭入鹽河下海又於其下中河兩岸多開涵洞北岸引水入預備河南岸將土塘河挖成引水入其中兩岸仍多穿溝渠使中河南北盡成水田又於遙堤之下多建涵洞使預備河之水有餘則從涵洞泄出遙堤之外使入鹽河下海而中河之水自不至於泛濫矣且將駱馬湖邊多開引河使水大之時由西寧橋河下海則湖水亦不至甚大矣居濟一得郯城縣薈蕞云郯城縣在山東兖州府沂州東南一百二十里古郯子國也沭水經其東沂水經其西兩河之間又有白馬河發於本縣之馬陵山南入於沂沂河發源於沂水縣沂山狗兒泉㑹衆流南經淮泗入於海其沭水源出三泉歷莒州㑹北來馬耳諸山之水由穆陵關等處澎湃而下直抵馬陵山口旋折而南過沭陽達海州各自入海原不與沂㑹也及明季沭忽衝決直搗郯之北門西行衝入白馬河合流南下復與沂㑹三水合一由直河南注並入於駱馬湖每遇水漲漫山蔽野室廬田地盡付汪洋郯有嚙城之尾旁及沂邳宿遷咸受淹沒之害考厥所由原因郯城之東七里許直對馬陵山口在昔有臺曰釣魚臺一名逼水臺俗呼為禹王臺相傳神禹治水時沭在馬陵山東不能入海故鑿山而引之使西復建臺而逼之使南是以歷千百年郯不罹沭之患明有邑令黃琮者視此臺為廢棄之物毁臺取石以甃城垣而沭水遂無所禦百餘年來民受其病於康熙二十八年聖駕南巡之時閲視河道上諭中河挑浚有益所關甚大下河漕諸臣㑹議收束散漫之水拯救被災之民使淹沒民田得以涸出又以中河之水全藉於駱馬湖而駱馬湖乃受沂沭白馬諸水受水既多故時常泛溢於是修土石兩壩為堵截沭水之計壩之南北各接土堤而石壩之上建禹王臺以存古蹟石壩之外又挑引河一道引河之下又浚子河一道皆相度形勢而為之由是沭水循行故道各自入海不惟中河水勢因之少減而嚮之被災田地俱得播種至今桑麻遍野室廬安堵郯城以南羣頌聖天子之洪恩於無既也以下俱河防志禹王臺沭河口大土壩一道長六十三丈大壩北頭接築小堤一道長六十丈大壩南頭舊接築小堤一道長一百四十九丈因沭水衝逼塌缺康熙三十三年築圈堤一道長一百七十九丈石壩一道用竹絡五層東面長二十八丈西面長二十五丈四尺康熙三十三年東面加砌坦坡石壩北頭接築大土堤一道長二十九丈七尺五寸根闊七八丈頂闊三四丈髙九尺一丈不等東面舊下鑲邊竹絡三十一丈康熙三十三年加砌坦坡大堤北頭接築小長堤一道長二百六十一丈石壩南頭接築大土堤一道長五十八丈三尺底闊六七八丈四五尺頂闊二三四五丈二三尺髙四五尺三四寸不等東面舊下鑲邊竹絡十丈五尺康熙三十三年加砌石坡石壩南頭接築斜雁翅一道長七丈四尺接大土堤南頭挑出引河廢土築成一堤通長二百五十七丈石壩南頭迤東挑穵引河一道長三百二十丈四尺河頭口闊一十八丈五尺河尾口闊一十一丈五尺引河身內加挑子河一道長三百四十三丈四尺禹王臺一工為減中河之水勢而設中河之水全藉於駱馬湖而考湖水之源則郯城之西之沂與白馬二水合流濟運由來舊矣初不與沭㑹也其後三水合一並滙於湖自毁禹王臺始水多河溢難以容納不無奪河之患沂郯邳宿並罹昏墊則臺之存廢關係固何如乎以上俱河防志沭河在沂州東五十里源出沂山自莒州西南流入州境㑹諸澗水南經馬陵山入郯城縣注於泗周禮職方氏其浸沂沭即此沂河在沂州東二里源出蒙隂縣東北南河川徑蒙隂沂州郯城南經邳州注淮泗入於海禹貢淮沂其乂水經沂水出泰山郡蓋縣艾山即此白馬河在鄒縣北三十里源發九龍山㑹鱔眼孟母陳家溝白馬諸泉西流入泗水山東通志白馬河之水原出魯橋以濟南運者也自河身淤淺每逢天旱則河水阻斷不能出而濟運矣故議大加挑浚使之寬深庶河水可出而南運為有賴矣居濟一得嚮者漕艘自清口出黃河溯流而上至支河口入運河康熙二十六年前河臣靳輔以黃河風濤之險請自駱馬湖鑿渠歷宿桃二邑至清河仲家莊出口名曰中河以通行運三十八年前河臣于成龍因桃清中河南岸逼近黃河地勢卑下瀦水瀰漫難以築堤乃自桃源盛家道口至清河棄中河下段改鑿六十里名曰新中河及次年臣鵬翮任事見新中河淺狹未足行運且盛家道口河頭灣曲重艘挽運不順仰遵聖謨於三義壩以下用新中河之半三義壩以上用舊中河之半合為一河重加挑濬一律深通於是運道始成而漕艘利涉矣設有宿桃中河安清中河各通判一員管理修防以下俱河防志宿桃中河通判所轄運河上自宿遷境內張莊運口起下至桃清交界三岔止計程一百四十里零薈蕞云桃源縣在淮安府西北一百六十里東至清河縣界四源十里西至宿遷縣界七十里縣北三百步許有泗河出山東即徐邳泗州之下流又北四十里有崇河其源西接宿遷劉老澗東入安東漣河杜村湖在縣東南三十里通淮倉基湖在縣南七里東流達河入淮大莊湖在縣東南三十五里通丁家溝入河湖西中河上自張莊運口起下至駱馬湖止長一千二百二十一丈三尺七寸湖東中河上自駱馬湖起下至攔馬河迤上止長一千一百三十七丈一尺三寸湖西中河北岸堤一道長一千二百二十三丈三尺七寸湖東中河北岸積土長一千一百三十七丈湖東中河頭迤南挑穵小越河一道長三百二十丈議建石閘一座南岸子堤一道上自攔馬河頭起下至桃清交界止計長二萬三千一百二十七丈六尺康熙三十九年擇險簽釘排樁工一千三百丈康熙四十年又修築工三千七百五十九丈二尺北岸子堤一道自攔馬河頭起至桃清交界止計長二萬二千八百六丈五尺內康熙三十八年新築工長一千八百八十二丈康熙三十九年加幫髙厚又簽釘排樁二百四十丈五尺攔馬河大王廟險工一段長五十六丈宿遷縣護城堤一道自北山根起至黃河縷堤止長八百五丈護城格堤一道長一百六十丈康熙三十五年修築北岸遙堤自張莊運口起至駱馬湖西岸止長一千一百二丈五尺又自駱馬湖東岸起至攔馬河迤上砂礓觜止長八百九十六丈又自髙山頭起至劉老澗舊壩止長七千五百五丈又接舊壩起至宿桃交界古城止長一千五百四十九丈又自宿桃交界起至桃清交界止長一萬四千五百六丈康熙三十二年修築髙山頭險工一段長一百四十二丈以上俱河防志宜於髙山頭東新建格堤之東中河北岸子堤建涵洞一座使由格堤土塘河入預備河至蕭家渡建閘一座穿過遙堤使水由蕭家渡河入海宿遷縣北車路口中河北岸子堤有石涵洞一座子堤內宜挑河一道引入預備河亦使由蕭家渡入海新建格堤之東亦穵成河子堤亦建小涵洞一座引中河水由格堤土塘河入預備河順流而下則子堤之北遙堤之南俱作水田矣居濟一得灣兜險工一段長七十二丈河防志劉老澗越壩一道長六十丈康熙三十四年築又減水石壩一座長二十丈金門九洞康熙三十九年建於壩下開引河一道泄中河有餘之水經三尖北魏碩項湖下龍溝歸海河防志劉老澗以上預備河數十丈已經淤平宜於通中河之處不必築堤建滚水壩一道壩底宜比河底髙八尺使中河之水常深八尺餘者盡皆泄出而於劉老澗對過中河北岸子堤宜堅築蓄水勿令亦由劉老澗泄出其由此以上數十丈亦宜多建涵洞使中河之水泄出預備河由劉老澗而出若將西草壩閉塞再建閘數座則預備河祗宜疏濬深通無需建壩矣劉老澗以下崔鎮正對遙堤處其遙堤外之河與遙堤相去甚近此處亦宜建減水閘以泄預備河之水使劉老澗以下中河黃河之水亦由此泄出居濟一得一桃源中河一道自盛家道口起至桃清交界止計長七千三百六十一丈五尺於康熙三十八年四月內前總河于成龍面奏中河南岸甚窪子堤不能久立水勢直至縷堤成溜衝刷甚險將北岸改作南岸北岸另築北堤從中相度挑河奉㫖好准改挑其河身不必挑寬若有虛鬆之處挑挖成河之日仍下樁等因欽此隨蒙分派人員挑河長七千三百六十一丈并北岸子堤長七千三百六十一丈五尺擇其迎溜頂衝掃灣之處簽釘排樁共長五百五十九丈於康熙四十一年閏六月內在於欽奉上諭事案內造冊詳蒙題銷在案淮徐道屬三㕔冊一駱馬湖口竹絡石壩一道長五十五丈康熙二十八年奉前總河王新命建設為湖黃出入之所宣泄上源山東諸湖並駱馬湖異漲之水康熙三十五年異漲衝卸奉前總河董安國題修估入㑹勘案內竹絡石壩長五十五丈駱馬湖口東西裹頭長六十五丈嗣因工未報銷已被衝淌康熙四十年前總河張鵬翮於欽奉上諭事案內題估興修續於康熙四十二年三月十九日蒙前總河張鵬翮飭行康熙四十二年二月初二日奉上諭中河口門宜留當經題請建築東竹絡長十二丈西竹絡長十丈各寬三丈康熙四十四年九月十九日前總河張鵬翮於本案內止照做過工程三十二丈題銷准部覆奉㫖依議淮徐道屬三㕔冊安清中河通判所轄清河縣運河上自桃源縣交界三岔起下至清河縣西三里許黃河口門止計程一十七里以下俱河防志桃薈蕞云清河縣在淮安府西五十里西至源縣界二十五里南至山陽縣九十里運河元時故道由府東入淮至清口亦稱險要故平江伯改自府西經清江浦入本縣七里溝東界迤南出三里溝達於淮以溯河營河在縣東北十里胡賢口北其左右皆軍營田故名康熙十年河決七里溝三汊下流沙澱漕艘回空者由新河入營河南經半邊店出西營溯於淮即此縣西北四十五里有新河自黃家觜經漁溝娘子莊永興集以東北達安東入海萬厯二十三年為分黃而開今淤廢永濟河在治東南運河之旁自窑灣楊家澗歷武家墩至新莊舊閘接運河四十六里萬厯九年開以備清浦之險今久廢崇河之源西接宿遷經本邑崇河集南㑹沭河東通漣河者今淤夏允彛曰清河縣北有老黃河本沂泗東趨合淮入海故道開此則河之赴海必勇雲梯關下淤塞葦場當自蕩滌而海口廓矣胡朏明駁之曰此必近世決河入海之故道非淮水東㑹泗沂之舊迹也水經泗水注云下邳縣為沂泗之㑹沂水注云於下邳縣北西南入泗是沂泗合流入淮也今沂水挾泇武祊浚諸水至邳州入黃河即古沂水入泗處黃河是泗水故道邳州本秦下邳縣新志云沂水舊在州西一里今為黃流淤塞改道自郯城入運河矣此說甚明愚按夏允彛所云老黃河者即萬厯二十三年為分黃而開之新河朏明亦未能深知其詳也南岸子堤上自桃源縣交界起下至廣濟閘止長二千七百六十七丈係舊中河北岸堤康熙三十八年改作新中河之南岸堤北岸子堤上自桃源縣交界起下至舊河邊止長三千四十一丈五尺係康熙三十八年創築其兩堤險要處於康熙三十八年簽釘排樁共長二千二百七十五丈康熙三十九年兩岸堤工加幫髙厚又加排樁一千五百六十九丈清河縣河口康熙四十年題建石閘一座以資蓄泄北岸子堤孫家集迤上題建小石閘一座以泄中河暴漲之水撑堤一道自北岸子堤起至遙堤止長一百八十六丈堤上雙金門石閘一座小石閘一座泄水入鹽河鹽河一道自清河縣中河北岸鹽壩口起歷山陽縣朱元莊至安東縣迤下平旺河止計長一萬三千四百五十丈康熙二十六年開濬行鹽運料併泄中河漲溢之水由南潮河歸海康熙三十六年六月時家馬頭決口黃水盡入中河臣鵬翮恭奉聖謨於康熙三十九年十一月堵塞完工然水退沙停鹽河淤墊一千九百一十丈康熙四十年題准挑濬一律深通其平旺河尾孫家林起至新安鎮盧家溝止共河長六千四十四丈內除新衝河上口長三百五十丈不挑外計挑河長五千六百九十四丈引水由北潮河入海康熙四十一年伏汛異漲之水衝刷故道一支由北滷溝經徐家泓入南潮河下海一支由莞瀆場經頭圖口入北潮河下海是以駱馬湖之清水與王營減壩之黃水均得分泄而工料亦藉兹通行無阻矣清河縣中河北岸遙堤一段上自桃源縣交界起下歷山陽縣境至安東縣交界止長一萬三百三十九丈七尺康熙三十二三十六兩年修築安東縣中河北岸遙堤一段上自山陽縣交界起下至平旺河止計長一萬三千五百五十丈康熙三十六年時家馬頭決口至三十八年黃水異漲衝缺塌卸於康熙四十年題准修築完固薈蕞云安東縣在淮安府東北九十里東至淮河五十里西至清河縣界五十里南至山陽縣界九十里北至海州界一百一十七里海州南至安東縣界一百五十里東至東海一十五里安東縣中河南岸護城堤一道上自五里墩起下至平旺河止長九千四百五十九丈康熙三十八年修築四千九百四十四丈四尺六寸其餘康熙四十年修築完工以上河防志一清河縣向無中河一切漕艘官舫由清口出黃河歷桃源宿遷至駱馬湖口入運河康熙二十六年總河靳輔念漕艘涉黃河數百里之險每多漂沒之患於二十六年聖心愛民已極等事案內題請動帑開挑中河一道自駱馬湖口起至清河口門止并於河尾建廣濟石閘一座收束水勢以利運行又於宿桃山安清五縣境內創築遙堤以為中河北岸之屏障并於清河縣治西另開河頭自清河縣起由山陽縣朱元莊歷安東縣經平旺河至潮河歸海挑鹽河一道專運鹽柴斯時漕運商民均受利便於安東縣境內南岸築護城堤一道又為安邑之保障安清中河㕔冊百川莫險於黃河然自南北通運以來浮黃河而達者凡五百餘里議者莫不以為治河即所以治漕一似乎舍河别無所謂漕也雖然水性避髙而就下地為之不可逆也運道避險而就安人為之所慮者為之或不當耳有明一代治河莫善於泇河之績然其議倡始於隆慶年間都御史翁大立而傅希摯斷之再歷舒應龍劉東星兩河臣屢興屢阻逮至萬厯三十一年河臣李化龍實始通運卒避黃河三百里之險至今賴之嗣後直口塞董口淤駱馬湖又淺澀不行臣因有開皂河之請而泇河之尾閭復通然自清口以達張莊運口河道尚長二百里重運泝黃而上雇覓縴夫艘不下二三十輩蟻行蚊負日不過數里每艘至費四五十金遲者或至兩月有奇方能進口而漂失沉溺往往不免蓋風濤激駛固非人力所能勝也康熙二十五年題覆詞臣張鴻烈聖心愛民已極案內加築北岸遙堤後復加籌酌若於遙縷二堤之內再挑中河一道上接張莊運口并駱馬湖之清水下歷桃清山安入平旺河以達於海而於清口對岸清河縣西仲家莊建大石閘一座既可以泄山左諸山之水而運道從此通行避黃河之險溜行有縴之穩途大利也乃決計題請奉㫖興工至二十七年正月而工竣連年重運一出清口即截黃而北由仲莊閘進中河以入皂河風濤無阻牽拽有路又避黃河之險二百里抵通之期較歷年先一月不止回空船隻永無守凍之憂在國家歲免漂失漕米之患在各運大則無沉溺之厄小則省雇夫之費蓋自吳開䢴溝隋開御河歷唐宋元明漕東南以濟西北者無不仰藉黃河以為灌輸既欲去其害又欲收其利故治河愈難至今上康熙二十七年而運道之利黃河者僅七里矣或議於中河北岸宿遷境內建減水壩數座以泄漲者臣曰不可蓋中河之水但患其弱而不患其强若北岸遙堤減壩一建則清水弱而黃必有內灌之憂河身立淤矣今當大工屢興之後錢糧未敷未敢輕議若工帑稍充再將遙堤加修髙厚更於中河之北挑重河一道即以挑河之土築成重堤於西寧錫成兩橋之間建閘一座既以分泄東省之異漲又以灌溉宿桃清等七州縣之田畝即遇黃淮並漲亦可分泄入中河以并出平旺歸海真永賴之策而臣初議挑中河之舉原擬如是故有中河之名也又運艘自清口入仲家莊閘雖曰截流而北然逆流而西者居多若於清河治東陶家莊再建一閘重運則由陶莊而入回空則由仲莊而出則俱順流矣且兩閘並建用備不虞尤為萬全統志之以俟來者靳文襄公治河書康熙三十二年總河于成龍等於請築中河子堤等事案內創築中河兩岸子堤收束水勢康熙三十八年四月聖駕南巡總河于成龍面奏見前淮徐道屬㕔冊成龍即於欽奉上諭事案內題請動帑康熙三十八年五月內委員上自桃源盛家道口起挑穵成河北岸另築北堤一道內建草壩一座依期告竣康熙三十九年於欽奉上諭事案內總河張鵬翮以新中河河頭灣曲糧艘徑行不順三義壩迤上三十一里河身淺窄恐湖水散漫不能容受舊中河自三義壩至河頭三十二里河身甚深且三義壩迤下二十五里河身淺窄且距黃河甚近酌議於三義壩以上之舊中河築攔河壩一道改入新中河合為一河以挑河之土幫築南北兩岸子堤於每年漕船過完將河尾煞壩使湖水由小石閘入鹽河下海回空糧船仍由宿遷縣駱馬湖口出黃河赴次新運到時又行開壩漕船遄行無阻題奉俞允欽遵改挑至康熙四十年鵬翮巡行中河見鹽河內被三十六年黃河時家馬頭漫缺將鹽河淤墊鹽柴挽運維艱於謹陳節宣之法等事案內題請不動正帑令鹽商損項曽經挑濬又於康熙四十二年聖駕南巡駐蹕清口奉上諭仲莊閘清水出口逼流使南恐運口有礙應於陶家莊以下楊家莊處著挑引河令中河之水從此出口於運口有益雖楊家莊地勢低窪即使倒灌不過一二里仍然頂出著即相度形勢估計具奏仲莊閘暫停遂遵㫖估計將仲莊閘二草壩之上煞築攔河大壩一道將雙金門閘拆去磯心改為石裹頭裹頭之上另改河頭又將中河尾於河工底績可期等事案內動帑估砌石閘一座移建楊家莊縷堤之上下築頭二草壩二座束水敵黃又於花家莊迤下築撑堤一道將鹽河頭移於撑堤之處併建鹽河石閘一座迤下鹽河一道濟運鹽柴水小則下板閉塞鹽河閘蓄水出口敵黃濟運水大則開鹽河閘分泄歷今一十八載糧艘利涉河道安瀾康熙四十五年黃水泛漲黃河老壩口等處各工危險建造王家營減壩開放宣泄奈黃流直射中河以致中河兩岸受險總河張鵬翮於請㫖事題請王營減壩迤下疏建鮑家營舊河故道由戴范河張家集范家河三岔口歷碩項湖入武漳河頭圖口下北潮河分泄黃流歸海兩岸建堤建壩如黃水大開放鮑營河如清水大開放東草壩隨時啓閉操縱由人堤工得保無恙而運道民生均賴之矣安清中河㕔冊聖祖仁皇帝康熙六十一年九月二十九日淮揚道傅澤洪詳請料物以防險工鹽河閘外口起至東草壩歷朱家灣髙臺子張家莊等工至平旺河北過五丈河直達板浦謂之舊河即中河也又於東草壩少上而北為鮑營引河北至張家集逶迤而東亦至五丈河謂之新河即西河也今自鮑營河頭而下久已淤涸不通舟楫康熙五十二年間前中河㕔佟倅詳稱商人請於舊河濟運查舊河兩岸堤工內有朱家灣髙臺子張家莊等處險要應修東壩口門亦應修理既據該商呈請行走此河其修防料物有應商人捐備等因前道據詳前院批如詳移咨鹽院知照在案從此中河一帶工程商人每年捐備料物自交該㕔及時修防相沿為例本年七月間署中河㕔梁主簿詳稱朱家灣髙臺子張家莊等處堤薄工險請循例飭商備料貯工等情前來本道親詣各工查勘第一工朱家灣坐落中河北岸遙堤長八十丈內有三小壩每壩長七丈壩形微存護岸掃工全無第二工髙臺子坐落中河南岸護城堤長一百四十丈第三工張家莊坐落中河南岸護城堤長九十丈內各有三小壩並皆壩形微存護岸掃工全無甚屬險要本道詢據土人及該汛百隊僉云自康熙五十四年修過之後歷年俱未動工又聞有該㕔折收料價官商分肥之弊當即飭行淮安分司查覆去後今據該分司詳據商人程長泰等呈稱每年修補工銀四千兩俱交歷任中河㕔辦料修防其官商分肥之處堅執不承查此項銀兩自五十五年起至六十年止該㕔已收過銀二萬四千兩既不以之辦料修防其為朋分不問可知但官遷吏故難以深求現今朱家灣等處及東壩口門急宜上緊下掃修理若仍責之各商辦料加工是復啓其抑勒肥已之故智究與工程分毫無益相應飭商將六十一年分應捐銀四千兩解交河庫著令該㕔將朱家灣等工應修之處確估造冊請憲批發辦料儧修工完核銷其原捐之銀倘有羸餘留作下年工用庶各商有用之金錢不致僅供中飽而於城社民生大有禆益矣嚼梅軒偶存行水金鑑卷一百四十九
