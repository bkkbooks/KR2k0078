body:
  text: 行水金鑑卷一百五十江南按察使傅澤洪撰運河水裏河北自清口山清外河交界甘羅城迤西起南至揚河交界黃浦止計水程九十六里一百一十八步二尺自甘羅城迤西至季家淺長一十五里五十丈係清河縣境自季家淺至黃浦長八十一里六十八丈係山陽縣境屬山清裏河同知管轄其汛三曰運口汛裏河上汛裏河下汛河防志府薈蕞云山陽縣即淮安治東至海濵界二百三十里西至清河縣界三十里南至寶應縣界八十里北至安東縣界三十里西北五十里有淮隂故城秦置水經注淮水東北經淮隂故城韓信釣此節孝先生有淮隂故城序即甘羅城也運口汛自甘羅城迤西起至季家淺止南岸堤長三千六百六十八丈北岸堤長二千九百一十三丈五尺又七里閘西岸太山湖周圍一帶堤長二千五百五十六丈六尺以下俱河防志清口於康熙三十五年七月間唐埂六壩潰決淮水東注黃流倒灌諸引河一概淤塞臣鵬翮於康熙三十九年恭奉聖謨開穵張福口引河一道長一千二百三十五丈次年正月又開張家莊引河一道長一千六百七十丈又裴家場爛泥淺三岔等引河俱先後挑濬深通合衆引河之水會出清口併力敵黃而淮黃交會矣運口曽經屢改今仍在舊大王廟前有迎清逼黃之勢舊築大墩一座置頭二三四草壩束水濟運康熙四十年於舊大墩西接築攔湖堤一道長一百四十丈內外排樁鑲掃又接建新大墩一座周圍三十五丈逼清水七分敵黃三分濟運又於大墩下運河口門築攔河壩南北共長二十四丈以禦湖水異漲置造鐵犀一座於新大墩上以鎮水勢刻詞於犀曰維金尅朩蛟龍藏維土制水龜蛇降鑄犀作鎮奠淮揚永除昏墊報吾皇南岸自舊大墩前起經七里閘至文華寺後止內除髙阜外堤工長二千八百三十九丈康熙三十八年修築文華寺後髙阜歷年未修武家墩後橫堤一道長一千一百三十二丈康熙四十年加幫臨湖釘樁鑲掃北岸自甘羅城迤西起至惠濟祠旁新石工頭止內除甘羅城東門髙阜九十丈外堤工長一千八百八十九丈五尺康熙四十年補修完工惠濟祠旁新石工一段長一百四十七丈康熙三十八年創砌清河縣志南祠在舊新莊閘口明正德三年建武宗巡止蹕祠下瞻顧久之嘉靖初章聖皇太后過此賜黃香白金禮獻之物賜額曰惠濟祠南岸石磡於康熙四十一年題建石閘一座相時啓閉引三岔河之水濟運七里閘西岸堤長二千五百五十六丈六尺七里閘河一道長一千五百七十三丈七尺自惠濟祠後起至季家淺止運河長七百四十二丈俱康熙三十九年題準挑濬深通裏河上汛自季家淺起至南角樓止河道計長四十里四十四丈康熙三十九年題準挑濬深通南岸堤長七千三丈七尺北岸堤長七千三百九十一丈九尺兩岸排樁於康熙四十年改龍尾掃為丁頭掃五孔橋於康熙三十五年前河臣董安國建石閘一座因地勢低窪土性虛鬆未便開放久經堵塞龍汪閘一座金門寬二丈一尺二寸康熙三十八年加髙石四層金門上寬下窄不能下板月河閘金門寬二丈七尺六寸兩岸皆砌石北岸檀度寺新閘一座康熙三十五年創建北岸版閘關口石工一段長一百二十丈康熙三十八年創砌康熙四十年完工南岸盤糧廳前石工一段長五十五丈康熙三十八年創砌康熙四十年完工北岸府城西門護城石工一段長三百六十丈康熙三十八年創砌以上俱河防志府城北角樓一工與小壩一工同一危險蓋因此二處水勢頂衝舊堤單薄堤裏地形低窪俱係深塘兼之城池官廨民居鱗集於此澤洪屢欲啓請河憲建造石工庶幾一勞永逸因需用錢糧浩繁未敢輕舉今年冬氷凌水漲沖刷塌卸堤根水深至二丈有餘亟調集員辨夫役并工搶護方得平穩此處建造石工斷不可遲嚼梅軒偶存裏河下汛自南角樓起至黃浦揚河交界止河道計長四十一里二十四丈二尺康熙三十九年題準挑濬深通以下俱河防志東岸堤長七千三百五十四丈五尺西岸堤長七千三百七丈五尺兩岸排樁康熙四十年修補完固東岸舊有興文閘一座閘內澗河一道至涇口入射陽湖由廟灣歸海泄三城之積水通商賈之舟楫其利非小歷年黃水內灌河身淤墊康熙三十九年復加挑濬以上俱河防志本汛東岸興文小閘一座口寬二尺八寸有澗河一道至涇口水入射陽湖康熙三十八年總河于成龍於欽奉上諭事案內估挑後于請旨事案內撥給捐工人員挑浚又於康熙三十九年總河張鵬翮題為黃淮交會謹陳善後一策等事案內動帑修砌興文閘座以備宣泄運河水勢裡河廳册興文閘南有頭石工二石工兩段頭石工長三百一十八丈北磚工三十丈中石工一百五十七丈南磚工一百三十一丈其二石工長一百五十丈俱係磚工康熙三十八年題準加髙二層河防志涇河閘一座其河下通射陽湖計長八千二百五十丈面寬五丈底寬二丈五尺深六尺康熙三十九年挑濬深通又補修閘座以備蓄泄河防志王永吉修復涇河舊閘議揭云竊照黃淮外河水勢蕩蕩滔天來路甚猛逼入清口內河河身窄狹兩岸束縛迂回四百五十里直至瓜洲才得入江出路甚長甚細前賢恐其震蕩洶湧髙寶地卑水聚中飽勢不能容必致決裂所以於山陽縣南去百里之內造涇河閘分水一支直趨射陽湖東北入於海此閘既成固疏淮安下流之壅實減髙寶上流之勢矣年久失修遇水崩決司水者憚於興造遂築土壩一道人馬通行因循數年閘基遂廢此處滴水不通則閘內行水之河身以及接連射陽湖一帶原無主管之水泊盡被衙蠧土豪瓜分圍占低下者取魚斫草髙阜者種麥插禾官河變作私田野水化成膄地宜其百計阻撓牽制官府不肯造閘及奉憲檄勒限督催不得不造却又賄囑經承人員將閘門改小閘底增髙草草了事泄水無多當夏秋水漲之日即徹底全開尚恐宣泄不足乃啓不數板開不數日旋築月壩堅閉終年閘雖報完全無實用至於子嬰雙閘復以委官承行剋減工料樁短灰少閘底石不齊縫不敢全槽開放稍有滲漏損傷隨即填泥下掃歲歲如此亦僅存有閘之名耳夫昔人造芒稻河閘導水入江造涇河子嬰閘導水入海今芒稻河既被棍徒占塞涇河復被豪蠧官胥把持水不出頭激之愈怒以致八年之內年年潰決漕堤耗費官帑民財數十萬築塞殆無虛日糜朝廷之金錢竭小民之膏血徒作棍徒豪蠧官胥人等肥家潤槖之資漏卮不塞長此安窮伏望老公祖台臺移文會勘遴委亷能風力職官監造堅厚闊大石閘一座其閘底須與下河河底相平庶無髙昂吊口之弊朩樁務要長大粗壯挨緊密釘底石務要二層細鑿套筍塊塊勾連層層合縫然後多將糯米熬汁打灰灌漿才可支持幾年不致旋砌旋崩泛水而衝石也閘門兩旁襯石縱不能多數層斷不可少若一二層之外便是泥土水鑽石縫土必虛鬆安能壁立而不仆哉凡不利於有此閘者必曰閘底太低則水頭甚髙誠恐民田淹沒殊不知此閘與子嬰閘同是一般閘內河南河北兩條大堤較之運河更髙更闊只是單行水道直通射陽湖滙合下海原與民間田地絶不相通倘或此堤小有殘缺修補不難如果堤岸全無多年閘水不行內堤因何坍塌必是附近有田豪強耕攤挖毁占踞河身渾成一片令人莫可查考此等姦徒不追從前花利寬貸實多責令培補原堤亦情法之允協者耳又或有不知淮揚水利者必曰沿堤減水閘洞多矣何必爭此涇河一閘殊不知髙寶之南惟有芒稻河泄水極大直捷入江髙寶之北惟有子嬰涇河泄水極大轉折入海全不侵灌民田既可泄水又不傷稼故為甚利而無害也若沿堤小閘名曰斗門所泄之水不及大閘五之一況當上河水滿之時下河溝港俱已泛漲田地將沉再加各閘齊放既不通江又難到海一望汪洋廬舍盡沒東風一起巨浪拍天直捲堤根一線漕堤內外洗刷所以崩決最易繇此觀之欲保堤利運導水安民舍修復涇河之外固無他法也事關利害故不避嫌怨詳切盡言之仰希採擇立賜施行河漕幸甚王鐵山集本汛東岸涇河閘一座口寬一丈下有涇河一道通塔兒頭金吾莊水下射陽湖康熙三十八年總河于成龍於欽奉上諭事案內估挑後於請旨事案內撥給捐工人員挑浚又於康熙三十九年總河張鵬翮題為黃淮交會謹陳善後一策等事案內動帑修砌涇河閘座以備宣泄運河水勢裡河廳册東岸舊有頭淺涵洞六座二淺涵洞二座三淺涵洞五座又風水涵洞二座西岸涵洞四座河防志西岸楊家廟新河一道康熙二十五年挑浚河防志運河古山陽瀆也隋開皇六年鑿然吳王城𨝍溝出於末口即新城北辰坊之北閘也三國以無運而塞隋因平陳而廣之五代亦以不運而湮周以平吳而濬之元以兵阻而廢明初以漕運而復之時巳築新城則又倣宋轉運使喬維嶽之制自郡城西北逶迤轉西南建閘通清河口皆陳恭襄公力也以下俱淮安府志永濟故沙河即烏沙河在治西北一帶三十里古運自淮城艮隅入淮不免灣山陽六十里風濤之險宋轉運使喬維嶽開此直達清口後蔣之奇又開濬洪澤歲久俱淤永樂初平江伯陳因舊渠開通置閘蓄泄更名清江浦復置常盈倉於旁積糧以備轉兌為公私便共置五閘以備蓄泄永濟河治西南自楊家廟上達清河口萬厯九年總漕尚書凌雲翼開挑通漕避清江浦黃河嚙堤之虞及清江築堤運艘仍舊由城西故沙河以出清口而此河並存今資以灌溉民田中有涵洞十餘處涇河治南五十里西通運河河口有閘水漲則啓泄入射陽湖嘉隆間濬修萬厯丁已南河郎中李之藻重修鄉官胡效謨為記澗河治東南上泄三城瀦水下通濵海舟楫歲久湮淤巨工不易舉黃流一泛沙漫平陸督撫王公宗沐乃環城築堤長數十里黃流不復入而三城內潦水不可泄乃濬澗河長三十里東通射陽建閘河澨備蓄泄及委人守之歲各餼金二鍰歲取府𣙜金二百兩為繕修之費先後蒞土者加意深濬各有碑記在乃食貨大通之區也河兩旁溝洞灌田歲久積淤天啓四年知府宋祖舜挑深利民故城河又名壽河治東南五十里東入射陽湖上接黃浦澗河考之知府邵元哲及給事中朱維籓二碑記則故城河是澗河之支河自射陽湖淤塞直至車家橋水遂下趨於故城河而澗河水道不濟則東南三十餘里民田呼癸不應河原有壩為界壩存則澗河之田灌溉有餘壩去則故城河之民田收成亦足是壩之去留關二河民田之利害甲子秋月皇上東巡議開海口以蘇民瘼二十四年按察使于成龍踏勘海口一帶經此議開射陽湖並澗河澗河濬不但民田便利淮城積水亦得消退矣草灣河先年海口橫沙黃淮下流勢緩嘗苦淺涸每水發則有逼城之患萬厯四年兵備副使舒應龍議開此河直達安東於是郡城水患稍紓射陽湖府治東南七十里東通寶應山陽鹽城三縣分湖為界其闊約三十里周回三百里明嘉靖隆慶間黃淮交漲潰髙寶堤防并注於湖日見淺淤因盈溢浸諸州縣萬厯九年總漕凌雲翼請帑金三千委鹽城知縣楊瑞雲督開由廟灣新豐市入海其害乃止管家湖望雲門外明永樂初平江伯於湖東北畔界水築堤砌石自西門抵板閘以便漕運名謂新路又謂西湖即仁濟橋之北湖也以上俱淮安府志洪澤在府治西南九十里舊有閘宋魏勝運糧至洪澤出閘入淮即此江南通志清河縣治東南六十里有洪澤鎮濵淮河古南北大道設洪澤驛及巡檢司蓋劇鎮也有橋後漢書載陳登廟祀於泗之洪澤橋即此自髙堰築後黃河復屢決入淮湖水泛溢全鎮俱沒水中所餘髙阜數家寄生浮梗非舟筏不行清河縣志王永吉重浚射陽湖議揭云竊照淮揚兩府之民歲苦水災而淮之鹽城山陽揚之興化髙郵寶應江都泰州為尤甚二十年中無歲不受水災而六七年來為尤甚蓋黃河水溢則勢重南徙淮既避黃以直下若淮泗水溢則力猛東注淮復引黃而合趨以髙寶一線漕河容納南北兩河滔天浴日之水而下流壅淤無所宣泄水聚中飽安得不奔潰決堤病漕而害民哉士民苦於水患因下流不通輒紛紛陳控求開海口殊不知海口之在泰州興化鹽城界內者如丁溪場白駒場劉莊場神台場四口現開原無阻塞若泰州河垜場一口萬厯十三年本州鄉官林海樓議開地方抗阻鹽城城東之天妃口天啓六年興化鄉官李碧海議開地方抗阻凡事有礙於地方知其不可為而強為之者終畫餅耳至於山陽境內之廟灣海口此口空闊實為七州縣之尾閭更無一毫阻塞之處夫各處海口既無阻塞何以水不趨下反泛濫而橫行乎永吉蒿目心傷考之傳記詢之土人乃知射陽一湖全然淤墊中間隔斷上下不通雖有海口水不東注病漕害民根原在此為今之計重濬射陽湖真有一日不可再緩者查得鹽城縣志書內載射陽湖在城西一百四十里西接寶應縣界西北接山陽縣中流為界濴回約三百里南北淺狹自故晉地方至喻口北流入海東屬鹽城西北屬山陽縣故晉而上至射陽屬寶應嘉隆以來湖乃大淤萬厯七年民李雯等建議開濬萬厯九年春知縣楊瑞雲申詳具題請發帑金重濬水繇廟灣新豐市入海水患稍息民賴以安至崇禎四年淮北蘇家嘴柳鋪灣新溝建義口並決築塞久無成功黃流灌注三年水退沙停支河小港大半壅淤而射陽湖幾化為平陸矣然湖形現在疏鑿不難有硬沙墊髙者亦有泥水夾雜深淺不等者里數不多若合七州縣之力認真實做成功何難約算大槩分為三段其上一段自寶應鹽城界上射陽鎮起至安豐鎮止約長二十五里自安豐鎮至山陽縣東作地方止約長十六七里自東作至涇口止約長五里以上係泥水相雜之工自東作至山陽鹽城界上清溝止約長二十里係泥沙旱工此處接連湖面查湖面舊制三十六丈闊今止存三四丈極闊者七八丈耳湖面盡淤安能受水宜裁闊如舊自清溝至南馬駱一林地方約十五六里長此處亦甚逼窄鑿之使寬則下流通暢繇此入山陽之軋東溝繇溝入濛瀧喻口繇喻口入廟灣則入於海矣中一段自鹽城奪基廟起至林上止約十二里長自林上繇舊浦河此河泄江都泰州髙郵寶應興化五州縣之水今淤塞至馬家蕩止約三十里長自馬家蕩至陶家林止約十里長以上亦係泥水相雜之工應用鐵口罱子撈濬其泥用船裝載去湖稍逺庶不再淤此處舊名蝦溝從此至東尤莊約二十里長則入鬚溝而水直達於射陽湖矣其西一段則單在鹽城縣境內舊名東塘河西塘河西塘河自黃土溝起至許家灣止約二十里長只此淤淺急宜挑濬從此入於樓下莊唐橋鎮則一路闊深直達射陽出廟灣入海通行無礙也東塘河自唐子鎮起至安豐王莊約三十里長自王莊過界河至大港鎮約二十里長自大港至九曲河廟止約三十里長從此二十里至古吉寺又二十里至院道港入濛瀧喻口達射陽入廟灣則入於海矣此與鹽城縣近河生員周國顯梁卓徐行等面相考訂明白者雖未盡確或亦不逺大約黃自北來淮從西下如人身喉項廟灣各口如人身尾閭而射陽湖則如人身之胸膈腸腹也若人身日進飲食而胸膈不得通腸腹不能納縱有尾閭無從消導安得不鬱而病病而至死哉全湖形勢了然疏瀹決排原無難事而坐視淪胥無人肯救者何也各州縣有司畫於封域未必周知即或知之而彼疆此界觀望推諉不肯擔當殊不知所淹沒者本州縣之田禾所漂淌者本州縣之廬舍築塞漕隄決口所起派者本州縣之人夫利害相關剝膚切骨孰大於此又或精神疲於催徴工夫分於獄訟視此畚插之勞反為不急之務殊不知湖淤河決水滿歲荒死亡流竄十室九空錢糧從何出漕米從何完差徭從何供贖鍰從何納老幼男女粗衣糲食從何來國課根本萬民性命舍此别無活路州縣正官急務亦孰有急於此者奈何不深思也至於治水衙門不肯著力必謂此係下河不是上河殊不知下河之水不通則上河之堤必決治湖正以治河表裏原是一事又必謂河帑不敢輕動日後難於開銷殊不知所淹者下河之民田所決者上河之漕堤堤決年年築塞築堤月月起夫民間每歲起派人夫或百萬或數十萬固可憐朝廷每歲銷算錢糧或數萬或數千亦可惜公私交困何不急圖一舉兩便之策乎欲興大工事關題奏務求詳確未敢草草敷陳管見大約有五一曰先估勘揭中所開淤塞村落地名及道里長短原係採訪未曽親到必得真心為民實心做事憲司公祖不辭辛苦督率山陽鹽城髙郵寶應興化江都泰州正印父母各帶鄉導乘駕小舟同到射陽湖上下各處淤淺地方逐節逐段從長打算商量務要直捷鈔近不得遷就迂回恐有姦民假公濟私避害趨利希圖本村本鎮便宜其應開濬處所要見得自某處起至某處止該挑若干里數長若干丈尺深若干丈尺闊一一詳悉開寫如有與揭開不合者即行改正估勘既有清册則工程難易人人共知酌逺近淺深闊狹品搭派工庶無多寡不均之歎一曰專責成各州縣印官分定工程則一切人夫器用船隻稽察督催等事自應逐項料理但印務煩雜未能嘗駐工所除淮揚兩府各有提調憲司公祖及分委府佐公祖監督外每湖灘十里須於兩府各州縣中選委能幹職官一員義官數員分頭催趲庶無照管不到之虞一曰派人夫湖水無阻則漕堤堅固運道通行可省年年塞決幫堤之費似當量動官銀以襄大役然河帑空虛難以輕議止可酌估犒賞或官備竹鐵罱子合掀等項以省民間擾纍亦無不可各州縣欲圖永利合派民夫如東塘河西塘河若果單泄鹽城一縣之水者俟查確另議外其餘關係山鹽江泰髙寶興七州縣利害者自當勻均酌派庶無偏私不平之鳴一曰嚴功罪先年亦曽興工開濬上司正官足迹未到湖邊提調諉之各州縣各州縣諉之佐二佐二諉之義官義官與夫頭通同折夫無人實做遇水泊無載泥之船遇淤泥無撈淺之具朦朧報完徒費民財毫無成效似當預先題準若有急公勤事者紀録優升倘或茍且塞責工完不合式報完不及期人夫遲誤器具缺少摘參重處至於包夫折夫誤事殃民情法難恕但有犯者不論有職無職立置重典則積弊可除不難事平而功倍也一曰定期限霜降前後水勢泛漲雖極淤淺亦沉水底難以相度目前牌行會勘須限十一月上旬估完詳報以便仲冬具題如此大工既不多動河帑部覆必無留滯似當一面入告一面擇日部署開工若以九年正月為始定限一百日報竣斷無不完之工程不通之水利矣此湖僻在東北一方非若上河為南北咽喉秋冬有回空春夏有重運築壩開壩甚費掣肘議早定則今冬亦可舉行工難成則來冬亦可補足兩府士民異地心同雖勞不怨七省漕船波恬浪靜飛渡無憂國計民生漕堤運道關係重大如此永吉生長淮揚聞見最確不揣庸愚敷陳管見如果所言非妄伏乞老公祖台臺俯垂採納再加訪察立賜施行謹揭王鐵山集行水金鑑卷一百五十
