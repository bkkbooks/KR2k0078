body:
  text: 行水金鑑卷一百五十二江南按察使傅澤洪撰運河水江都縣河道自髙郵州交界起至金灣滚壩止計程六十五里設閘二曰露筋閘三溝閘東隄閘壩五曰昭關滚水壩金灣三閘金灣滚水壩長十四丈以下俱河防志西隄露筋閘起至三溝閘止殘缺石工二百四十四段計長一千二百二十七丈五尺康熙四十一年修補完工東隄舊有嵇家閘即鰍魚壩因水衝卸康熙四十年題準改於昭關廟建滚水壩一座長十丈將嵇家閘缺口堵塞四淺二閘三閘康熙三十八年修築邵伯更樓康熙三十八年六月衝決長五十六丈五尺水深四丈波濤洶湧難以堵塞糧艘阻滯於邵伯之下銜尾相連四千餘隻雖於西岸另挑越河一道而決口湍激不能前進康熙三十九年臣鵬翮恭奉聖謨下掃堵築刻日成功於是糧艘利涉如限抵通康熙四十年置鐵犀一座以鎮之邵伯晉步丘也謝安鎮廣陵見步丘地勢西髙東下每春夏湖水漲輒東浸民田而西又苦旱安為築埭以界之髙下兩利民以比邵伯甘棠名邵伯埭金灣三閘康熙四十年題準補修東西灣東隄康熙四十年題準修築長五百七十二丈金灣三閘之水由人字河芒稻河宣泄嚮年二河淤塞水無去路康熙三十九年臣鵬翮恭奉聖謨挑濬人字河長二千二百九十三丈芒稻河長八十五丈一律寬深泄水入江隄岸保固民田不致淹沒鳳皇橋引河因土質堅硬屢挑未成康熙三十九年題準加挑寬深計長一千四百九十二丈四尺六寸水勢暢流入江灣頭閘一座為運鹽河路兼泄運河之水芒稻河舊有東西二閘現議補修以上俱河防志揚之上流在河淮下流在江海昔日河渠距江淮之上憂常在旱今日河渠伏河淮之下憂常在水故明初以前講求瀦蓄而巳明末至今則有二法焉曰防曰𨗳防之使不來而運道所資不能不來也來之使可受受之使可去無泛濫於平地而已矣於是有謹固髙堰之説於是有毋開周橋之説於是有必塞翟壩之説於是有啓閘以時深濬河身嚴飭淺鋪增置滚壩之説而逺溯其源則在淮黃交而入海利也則又有堅築歸仁分黃建壩諸説焉𨗳之使速去其去有兩途江與海是巳然入江易而較紆入海難而較捷蓋入海即沿隄東下入江必循隄而南又海為百川壑而江亦朝宗於海也今瓜洲儀真河為入江正道而其最徑且捷者莫若自金灣河以達芒稻河治此則漕河可入於江矣而水猶不速去者則海口之未通也海口去漕隄二三百里隄東諸河不疏無由達於海濵也瀕海有隄隄下有閘沿隄閘座不開無由出於海口也隄外海灘近百里諸港口年久盡淤港口不濬無由入於海洋也此漕河入海之大槩正今日所講求也御史李宗孔水患日深疏曰漕河自淮安山陽縣至江都邵伯鎮二百六十餘里河東有隄與河俱長即現在修工修補之漕隄是也隄之東係髙郵江都興化寶應泰州鹽城山陽各州縣民田地形低窪如在釡中全恃此隄護七邑之居民障二百餘里之湖水水漲隄潰則糧艘有傾阻之虞居民有淹沒之患説者委之天災無可如何不知使有去路以宣泄之何致水聚為害乎謹按河水去路原有舊制東可入海南可入江查淮南涇河閘乃水入海之去路若將此閘深濬兩岸增隄一逢水漲即行開放則浩漫之勢自減乃閘河以下皆係漕田河臣勢難專主地方官惟閉閘以圖保護逮水勢愈大愈不敢啓直至隄潰而七邑淹沒閘下田地同為陸沉矣此河水不得入海之由也又查瓜儀雖有各閘惟芒稻河閘出水甚速乃由泰州運鹽河入江之去路若將裏河間深數尺則水勢直注於江雖西湖諸水泛濫此閘如建瓴直下則隄自不致潰決矣乃運鹽河自明季至今久未開濬今淤淺至極若一啓放鹽艘即為阻閣故隄東隄西哀號望救之日正諸商閉閘蓄水之時鹽課所關誰敢輕啓此河水不得入江之由也水不得入江海如養癕而不使外潰必致毒攻肢體矣我朝定鼎二十餘年隄凡六潰此康熙五年以前漕臣疏稱重運五十餘隻由湖冒險回空五百餘隻盡阻髙郵閘河臣竊憂之必將涇河等閘河底深濬築隄衛田疏通海口使水注海將泰州運鹽河刻期開濬使水注江若年復一年不行開濬徒事修隄而望其不決是猶閉賊城垣中而欲以竹籬茅壁拒之也若洪水一發又不知傷民命幾何淹田地蠲錢糧幾何矣御史徐越大挑運河疏曰淮揚一帶內河原係人力開鑿以黃河挾沙之水既奪淮水南下之位灌入天妃閘而內河淺隘水緩沙停數十年來運河之底墊髙益甚而東西兩岸每年逐漸加增隄薄土浮何恃不潰且也運河淺阻淮湖相連不能宣泄使速歸江以致髙郵沿河地方屯蓄為災在順治七八年間奉旨大挑究因河帑不繼未經實濬又時值大兵往來啓閉不一難遲時日故未得復當年舊制耳如欲運道永通民無水患必實實大加挑濬將何泥盡幫兩岸隄外惟令平厚不許增髙其迂回三百里內土性之剛柔沙油地形之髙下闊狹山陽與寶應不同者以近湖逺湖也寶應與髙郵不同者以髙郵有通湖水口連設兩閘而寶應無之也髙郵與江都不同者以江都有芒稻河瓜洲鎮儀真縣入江之口而髙郵正屬諸水之所鍾也何處當束之使狹何處當濬之使深何處當先施畚鍤何處當相度水平應直穵者當計土以分方應水刷者當逼岸以瀹底訪取習知熟諳之人詳審預定不致措施孟浪有始鮮終則開消一分金錢即得一分實濟不必别議宣泄而運河既已深通入江自爾湍速不僅上而天庾通濟亦下而地方民生得免昏墊之虞矣康熙十六年總河都御史靳輔疏稱運河自黃流內灌之後日墊日髙十六年八月內河底竟致乾涸隨閉隄挑浚因回空不能久待止量挑一二尺不等擬於十七年立春後十日土凍方解時即行閉壩大挑總限百日完工其十七年春運過淮之期必俟略為展限臣擬四月初旬內完工開壩放船五月終可以盡數過淮嚴加催趕務於七月初旬盡催過臨不誤十七年回空以濟十八年春運也刑科張惟赤河工計須萬全疏曰切惟河工保民通運以裏河之漕隄為主今年州縣盡成澤國運道盡作洪流皆此隄衝決所致向聞漕規舊制沿河額設淺夫唯令浚河使深幫隄闊厚不許隄上加髙所以使漕河日深漕隄日厚河湖水發勢足承當至明季止知增隄並不浚河致今隄雖日髙河身日淺易於衝潰今工築方興所宜申明濬深幫闊之規務期久逺髙郵志論淺鋪曰按舊制沿河設立淺鋪額造淺船編住淺夫以時撈浚是以河身深下閘洞疏通旱年不妨糧運且有餘水救濟下河水年去水甚速不致泛濫所以無壅塞衝決之弊為制之最善也邇年以來雖置淺夫實無一人在淺淺鋪亦廢惟聽隄決築隄之用額設錢糧外令里民貼幫工食而官河凡一二十年不加撈濬一遇水發但令居民用土包加培塘岸日益加髙河底日益壅塞且客土杵築不堅易至攤塌雨淋水洗其勢復低是非帶土加岸實則帶土填河也河身既髙則蓄水必淺治水者惟恐運船之不能行也不得已而復加河塘以為囤水之計焉昔日之河在低田之下今日之河乃在髙田之上矣且河塘既髙易致崩潰如纍棋子愈髙愈危隄防少有不固千里一壑矣矧田禾耶總河都御史靳輔疏請設立守隄兵將疏濬修葺事宜一切責成又請設官辨看守而立勸懲之法又請將歷設官兵即為預設協同築隄康熙十八年添設揚河營守備一員千總二員把總三員分管髙寶江運河將舊設淺夫改為淺兵淺夫與濬河相為用者也使淺夫之制常舉河可不興工大濬矣經制雖設頑民易偷名存實亡貴時飭之王乾清紀金灣閘曰金灣閘在邵伯鎮南五里西接湖口東南十六里至芒稻河又十八里下江乃漕河泄水第一捷徑萬厯二十二年撫按題請建閘開河原擬建八閘十六門新河闊三十丈以泄湖水後止建三閘六門河闊不足十丈又兩岸泥沙最易淤墊故不能大泄湖水以致漲決漕隄紀芒稻河曰揚城東北十里曰灣頭入運鹽河東十里南岸通江河曰芒稻河西北接金家灣通邵伯湖口自湖口至江共三十四里萬歷二十二年原擬建四閘十二門後止建二閘六門然閘底深下應運鹽河底故水發啓閘則邵伯湖水驟消漕隄賴以無潰後因商人不循三年一浚鹽河之制只顧蓄水行船於天啓六年將閘底改造增髙六尺以故湖水難消漕隄易決康熙元年總河朱之錫於對閘北岸開挑月河一道行鹽以免閘口溜吸令將閘底改深如舊後止改下一尺五寸比舊底尚髙四尺五寸國朝大學士王永吉新河水勢三阻説曰芒稻河閘新河之下口也兩閘六門共計十一丈則上口金灣閘當較闊兩倍雖二十餘丈不為過也今金灣上口三閘六門止八九丈耳是所入少而所出多此水勢一阻也今若於金灣閘南或石工中間再開數口以泄湖水則此一阻可無慮矣自閘而下河路甚寬有闊至二十丈者有闊十餘丈者惟孔家渡南約一二里許闊止五六丈水大止深四五尺稍小則涸矣水勢至此中梗此亦一阻也今若將凡淺狹之處挑深改闊如萬厯年間舊制俱闊十五丈使水通行則此一阻又無可慮矣至於新開月河水橋之南有兩舊河直對芒稻河東西兩閘之口所謂人字河是也每年水發運河水至漫隄而此河有數箭之地深不過二三尺以至水勢東西分流不能直射閘口此又一阻也今若將此河挑深則水勢直注閘口下江此一阻又無可慮矣不然三阻不治則是有泄水之名而無泄水之實欲漕隄之不崩決人民之不飄溺豈可得也康熙十二年總河王光裕將芒稻河原設三門閘西改為六門閘一座二十三年總河靳輔復挑江都境內邵伯南金灣閘入裏人字河又金灣閘迤南建造滚水壩一座滚水壩在南寶之人曰建滚水壩即古人之議建平水閘也但必廣為之制與翟壩二十五里相應然後可在興泰之人又曰興泰七邑之民皆版圖也多開閘座盡宣泄於下流而竟不為下流畫一䇿焉不幾以七邑為壑乎滚壩既設若更疏開下河引水歸海使隄東民田不憂泛濫則上下皆利而滚壩可收全功矣今總河靳輔將寶應子嬰溝新建滚水石壩一十九年建髙郵州北界首南七里新建滚水石壩二十年建州南南閘新建滚水石壩一二十年建五里壩新建滚水石壩一二十年建八里鋪新建滚水石壩一十九年建柏家墩新建滚水石壩一二十年建車邏鎮新建滚水石壩一二十年建江都邵伯北新建滚水石壩一十九年建三州縣共壩八座各湖暴漲之水源源得以宣泄矣揚州管河通判聶文魁勘河詳議曰按髙郵泄水入運鹽河此下河運鹽河者現今止有南門弔橋之琵琶閘閘口僅寬七尺豈能通利考舊制南首尚有華嚴寺一閘已拆廢其最易修復者莫如通湖橋閘向由北水關引水入城直出南關之馬飲塘與琵琶閘水會合東注此外尚有蛤蜊壩舊有石閘係萬歷年間填塞閘具在不難清理繳關壩無閘朱家壩有閘已壞東關閘尚存此皆曩時興化糧艘運道由泰山廟出口愚民惑於風水之説以褊見塞之反致大壞秦郵地脈今輿情亦既曉暢矣但通湖閘口不過一丈二尺六寸三里閘尤為窄小無用擬將琵琶閘改作雙門大閘以資啓閉西有私鹽港為月河可免掣船之患再將北關閘壩盡復古制徹底疏通其利賴有不可勝言者矣職竊以揚屬全河之大勢揆之黃浦子嬰溝所以泄寶應上流之溢也芒稻白塔河等閘所以殺江都之下流之勢也各場入海故道實所以救髙郵中滿之患也況今沿隄滚水諸壩無不東趨誠使之隨長隨消則無所往而不利矣滚壩之設今已不可謂無利矣試舉五年以來湖西田雖非豐稔亦頗有秋此非前此巨浸乎可不謂有利焉況滚壩實與海口相表裏開滚壩即開海口之先資也功以次舉下邑號呼孔迫何其不能稍緩須臾乎揚州府志聖祖仁皇帝康熙五十九年十二月日淮揚道傅澤洪詳請開芒稻河竊照揚屬一帶湖河地形窪下衆水滙歸北接淮流西受天長盱泗之水兼之上遊水漲天然各壩開放洪澤湖水建瓴下注西風一作波浪掀天嚙岸吞隄在在危險全藉宣泄之故道無阻得以預期開通分殺水勢庶幾隄工可保民生無害案查康熙四十年間升任前河憲張任內欽遵聖訓挑浚金灣三閘迤下人字河芒稻河及鳳皇橋引河修砌芒稻河東西二閘董家溝壩因時啓閉水勢隨長隨泄隄無潰決之虞田無淹沒之患而糧艘鹽船亦俱運行無誤是芒稻河閘及董家溝壩等處乃泄水下江最捷最便之要道載在閲河方略誠不容一日阻閉者也祗緣從前修建閘座錢糧例係商捐不動正帑是以册估雖由廳泛而承修則竟委之商人既不熟諳工程又其中不無侵漁等弊以致修砌不堅未久而閘底衝壞閘牆崩裂不能下板啓閉屢據揚河廳詳請照例飭商辦料重修本道俱經轉詳奉批飭催在案奈各商置若罔聞惟於二閘上口築壩堵塞并將董家溝壩堵塞不開每遇水長必待盈隄溢岸方始開壩其勢已晚何能分泄且各商更私設壩頭看守每乘廳汛相隔窵逺旋開而旋塞宣泄之路不通泛濫之勢益甚去年伏秋水漲髙寶江三處工程衝激殘缺而下河七邑民生俱遭昏墊實由此兩處築壩不能預期分泄之所致也夫以遵旨開挑泄水下江之要道乃公然築壩堵塞即云鹽運上關國課然以運道民生相較亦有緩急輕重之分況水大而後開閘壩一歲之中宣泄亦無多日於鹽運究無妨礙其執意梗阻誠不知是何意見查今年底水較之去年髙二尺有餘現在各憲會勘案內殘缺石工浸在水中者有四五六層不等必須預為宣泄方可無誤修砌且桃汛伊邇泛水將至若不將底水宣泄勢必不能容受本道前據廳詳一面詳院一面移催鹽運道在案今髙江紳襟士民吳世燾謝逢吉等以事關切膚連名公籲本道遵奉憲批移明鹽運道並轉行揚州府揚河廳公同查議去後兹催據該廳議詳前來詳稱此閘一日不修土壩一日不去則宣泄無門勢必壅積為害亦蒿目時艱之切論也事關緊急難任商議延緩應請憲臺為運道民生作主將芒稻河董家溝兩壩速行開放其倒壞閘座飭廳確占先發河帑遴委幹員儹修一面移咨鹽憲將借用帑銀著商公捐解庫還項庶要工不致稽遲而閘座得以依時啓閉水發則開閘暢泄保工水落則閉閘蓄水濟運隄工永固民患永除鹽船漕艘運行永便矣至所呈鹽艘仍由故道過壩是否可行俟鹽法道議覆至日另行詳覆嚼梅軒偶存一東隄自黃浦起歷髙郵至江都壁虎橋止計程二百三十三里舊隄坍卸單薄卑矮每遇湖河水漲漫隄過水康熙三十八年四月內總河于成龍等於欽奉上諭事案內發帑委員加幫底寬四丈髙三尺頂寬二丈臨河簽釘排樁迄今隄工髙厚河水長發賴以捍禦以下揚河廳册一西隄稱鈎灣臨湖石工長二百二十八丈又宋家尖西隄臨湖石工長九十丈久已倒廢康熙三十八年八月內總河于成龍等於欽奉上諭事案內估修仍建石工迄今湖水長發賴以捍禦一寶應觀音寺起至髙郵罕盱澗止引河一道在淮屬蔣家壩之下於康熙四十六年四月內總河張鵬翮於欽奉上諭事案內題估隨奉旨著部堂徐帶領各員分工挑穵蔣家壩下引河一道自山盱交界觀音寺起至罕盱澗止長九千五百二十丈三尺迄今壩下之水直達寶應髙郵湖內由東隄各閘壩分泄一清水潭東西二隄康熙十五年大水衝決深至四五丈不等一片汪洋報聞聖心惻然特簡總河靳輔修治以清水潭決口深不可築於湖中繞回開河一道改築東西二隄與舊隄相屬河成名曰永安河至康熙三十六年四月內總河董安國於謹陳兩河等事案內題估將永安西隄九百七十丈創建石工特命督撫漕河四院會勘題覆奉旨允行一界首鎮西隄舊石工一千七十五丈七尺年久倒廢磚石浪掣無存每遇湖河水漲闔鎮民生攸關康熙三十八年八月內內總河于成龍等於欽奉上諭事案內題估創建石工奉旨允行一髙郵城南舊建南關大壩一座長六十六丈柏家墩大壩一座長五十四丈康熙三十八年九月內總河于成龍等為特疏題明等事案內請開減水石壩二座因舊壩衝廢相度地勢於南關迤南遷建滚水石壩長六十六丈車邏迤南遷建滚水石壩長六十四丈水大分泄保隄水小堵蓄行漕奉旨允行一二壩下口原無引河康熙四十年七月內總河張鵬翮於欽奉上諭事案內題請挑穵引河南關壩下自攔馬河起至朱三家橋止長三百九十一丈車邏壩下自攔馬河起至齊家莊止長三百三十丈奉旨允行一康熙四十四年十月內總河張鵬翮於欽奉上諭事案內估修髙寶江運河東西二隄卑薄石掃土工迄今捍禦有資河防攸賴一城南五里中壩一座長五十丈因南關車邏二大壩不敷宣泄康熙四十四年十二月內總河張鵬翮題請建減水壩一座奉旨允行其壩底較南關車邏二壩之底甚深每遇湖河暴漲開放暢泄以保隄工民命又題請開引河一道自中壩下起至寶應三王河射陽鎮止長一萬七百三十六丈八尺奉旨差都統孫等帶領旗漢官員分工挑穵迄今減壩之水由引河直達鹽城入海以上俱揚河廳册淮揚二郡運河東隄各閘每當伏秋水漲即行開放由各引河宣泄入海以保隄工必須河道深通隄岸完固方免水勢旁溢致傷田廬查山鹽之蝦鬚二溝涇澗二河及戛糧河老鸛觜引河寶應之黃浦閘子嬰溝興化之海溝車路白塗以及丁溪草堰白駒各閘河髙郵之臨澤河江都之金灣三閘鳳皇橋人字河芒稻河董家壩白塔壩各處引河在在淤淺甚至姦民攔河築壩阻塞下流民受其害查地方官原有疏通溝洫之例除飛飭道廳并地方官作速疏浚一律深通以備水長開放宣泄暢流入海外相應咨明此張文端公於康熙六十一年為吏部尚書時咨行河上者也公留心江南念念不忘疏浚運河其為國為民也至矣運河西岸自淮安至揚州宜多建進水閘壩引湖水入運河濟運若運河水大又宜於東岸多設減水閘壩放運河之水由各支河入海引湖水入河濟運則河水自不患其或小放河水由支河入海則河水又不患其或大矣此誠萬全之䇿也國家數百萬糧漕皆資一線之運河豈可不使之深通哉兩年以來見運河口每苦淺澀而界首一帶如興文閘子嬰溝等處放水灌田則舟苦難行蓄水行舟則民苦無水此豈善全之謀乎故於運河口及界首至揚州一帶宜大為挑濬務使深通而於全河尤宜大挑務使水由地中行而不專借隄以束水則水雖有盛大之時終無泛溢之虞或以既經挑穵不便再題請帑則於年終題明閉壩自十二月十五閉壩至正月十五日開壩用河兵分段挑穵每年一次歲以為常則運河不患其不深矣要比現今河底再深二丈則運河乃成雖有大水淮揚不至受害矣再將運河東減水閘壩底低下數尺則河既不淺而水有所歸自無湮沒之患矣居濟一得急薈蕞云大挑運河此目前河工第一務頃者年幾大有禾稼將登會洪湖異漲閘壩盡開髙寶下河一帶田廬頓時淹沒使運河開浚深通水有容瀦亦烏得至此行水金鑑卷一百五十二
