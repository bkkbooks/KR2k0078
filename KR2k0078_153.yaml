body:
  text: 行水金鑑卷一百五十三江南按察使傅澤洪撰運河水下河七州縣屬淮安者山陽鹽城也薈蕞云山陽縣見前鹽城縣在淮安府東南二百三十里東至海西至射陽湖有舊運河新運河封子河蘆溝河有大蹤湖馬鞍湖有建港有捍海塘即范公堤也屬揚州者寶應髙郵泰州興化如臯也薈蕞云寶應縣髙郵州見前泰州在揚州府東一百二十里東至海北至興化縣有南北運河西運河濟川河有鴨子湖雞雀湖包老湖仇湖有海陵溪西溪淤溪有捍海塘自鹽城入海陵綿亘百里又有楊公堤濟川東西諸壩鹽興化縣在髙郵州東一百二十里東至泰州北至城有運鹽河蚌沿串場等三十二河皆通運河及射陽大蹤平望諸湖縣志云興化地濵大海考其地勢視髙寶低丈餘髙寶之地視髙家堰一帶又低丈餘黃淮之水挾髙寶諸湖之水建瓴而下以興化為壑故治興化之水必自上流始治上流之水必自黃淮諸水始考之禹貢導河自積石至大陸播為九河入海導淮自桐柏東㑹於泗沂入海揚州之境無河淮之患也自淮水泛濫漢陳登築髙堰以防之宋熙寧時黃河大決河流斷絶河勢漸南徙至元人開㑹通河明代因其故蹟引水濟漕而西北千萬里之水始盡滙於淮揚兩郡水勢愈髙為患愈劇然而堤堰塘閘上下參錯常恃人力以為防衛永樂年間平江伯陳瑄大葺髙堰建清江浦五閘以時啓閉使黃淮之水不至橫溢諸郡縣而清口黃河之沙賴淮水衝刷直達雲梯關入海又築髙郵寶應白馬汜光諸湖長堤以護運道浚瓜儀之水開江都沙壩泰州芒稻白塔河以利宣泄建置寶應髙郵江都儀真十四塘以備瀦蓄淮揚諸州縣享豐樂者百餘年至於萬厯初河決崔鎮分決白洋河而河勢逐北淮水大破髙堰溢髙寶興諸州縣而淮勢遂東流沙淤塞雲梯關入海之路大阻興化巨浸稽天城不沒者三版時則有總督都御史潘季馴申平江伯故畫塞崔鎮決口築黃河兩岸遙堤縷堤束水衝刷又築歸仁堤以遏南奔入准之勢築髙堰起新莊至越城長一萬八百七十餘丈堰成淮水復由清口㑹黃河入海興化自是無水患南畝得耕穫者又數十年逮本朝定鼎後歸仁堤一决於順治十六年再決於康熙元年不復修治而髙堰一帶防護盡疏於周家橋古溝翟家壩等處堤岸崩塌衝成大澗日夜灌入髙寶湖內每值伏秋水發一望汪洋數十里奔湍南下而清口入海之路日就淤塞芒稻河雖開閘底增髙已非舊制白塔沙壩仍閉塞不通十四塘自嘉靖倭亂業皆折毁無餘於是潰堤決防運道民生遂以大困興化勢處釜底民不葬魚腹者鮮矣維時朝廷憂之特遣內大臣相度河事治河諸奏不啻章滿公車歲費內帑數十百萬而平成之功尚未即奏自今河使者已先葺歸仁堤修築髙堰翟壩周嬌使黃水不入淮淮水不入湖庶可望底績乎不然而徒治漕堤開海口譬如以升斗之甕而欲其容數百斛之水未有不橫溢四出而不能止者故治黃淮上流此興化治水之第一䇿也如臯縣在泰州東南一百六十里東至海南至江蓋海東北自鹽城而南經興化泰州如臯折而東通州海門諸鹽場皆其濵也江自黃天蕩入儀真境東至江都歷泰興如皋通州海門上下五百餘里至料角觜入海其南與丹徒靖江江隂常熟崑山諸縣境相對此揚州境內江海之大略也有運鹽河九十九灣河小溪河㲼河有芹湖六祥符湖有瀧溪蟠溪其地勢卑下西控漕堤南枕江岸北接廟灣之平陸東連沙岡之亘衍四圍髙而中央窪故諺有釡底之喻自河道失治六壩長開上河之水竟以下河為壑而七州縣之田廬沒為巨浸者久矣皇上洞悉情形謂上河治則下河自治指授方略開塞六壩使上流之水不致東注而又開人字芒稻等河以達江濬蝦鬚海溝等河以達海既杜其源又泄其流自康熙三十九年迄今七州縣之田盡成沃野民舍悉得安居黃童白叟莫不感頌聖主睿算精詳超越千古云以下俱河防志山陽縣澗河水自興文閘入折而東北七十五里至鹽城縣界之劉均溝入馬家蕩由蕩東北一支入蝦溝十一里至軋東溝一支入鬚溝十七里至魏家灘兩溝㑹流又一支入戛梁河二十里至徐家社亦㑹流皆由朦朧鎮入射陽湖經廟灣下海蝦溝鬚溝二河俱康熙四十年挑穵深通共計工長一萬六百七十丈山陽縣大涇河閘水亦東北入馬家蕩至射陽湖下海寶應縣子嬰溝閘水流六十里至時堡入郭真湖東北由西塘河建陽河至老鸛尖亦㑹蝦鬚戛梁水入朦朧河髙郵州之界首小閘看花涵洞二閘頭閘等處之水皆由興化縣護金蕩至鮑家莊分為二股一由釣魚廟至海溝河下海一由中堡莊入太湖東北經北宋莊岡門鎮繞鹽城縣城至新洋港下海新洋港一作信陽港興化縣海溝河東流至白駒閘分為三支一支中閘一支北閘一支南閘皆經串場河㑹流戚家團牛灣河入滷河口歸鬭龍港下海海溝河自鮑家莊至白駒閘長一萬四千四百八十八丈康熙四十年挑穵寬深興化縣白塗河水流入草堰閘亦歸鬭龍港下海車路河承得勝湖水流入丁溪雙門閘至苦水洋下海泰州淤溪水經河垜由舀子河亦至苦水洋下海江都縣金灣三閘並滾壩之水十八里至人字河分小支由蕭家口入艾陵湖正流十八里入芒稻河閘下江鳳凰橋壁虎橋灣頭閘三支之水流至董家溝小支下芒稻河正流三里㑹人字河水勢七分入芒稻河三分由運鹽河東流經宜陵鎮抵泰州城又東流經江堰鎮海安鎮由律法橋下海范公堤一名捍海堰宋天聖間范仲淹監西溪鹽倉時所築從廟灣沙浦頭歷鹽城興化泰州如臯至通州界止共長五百八十二里沿堤墩臺四十三座閘洞八座此堤束內水不致傷鹽隔外潮不致傷稼乃濵海一帶之屏障也以上俱河防志范公堤即捍海堤安東志名古淮堤云堤在鹽城二里自東北直抵通泰海門唐大厯中黜陟使李承式為淮南節度判官謂海潮漫為鹹滷雖良田必廢請自楚州鹽城南抵海陵修築捍海堤綿亘兩州潮汐不得浸淫宋天聖中張綸刺泰州專圖修復時范仲淹監西溪鹽倉悉力贊之謂當移堤勢而西稍避其衝仍疊石以固其外紆斜迤邐如坡形不與水爭天聖五年功成因名范公堤長一百四十三里有奇腳闊三丈面一丈髙一丈五尺元詹士龍為興化縣尹請發九郡人夫併築十六月成延亘三百餘里興工時掘石一方上刻四大字曰逢詹再修又刻景祐二年八月仲淹記九字士龍決志修之卒底成功萬厯十年總漕都御史凌雲翼題准修築建泄水涵洞水渠一十七處石閘一座用帑金四萬二千四百有奇泄捍兩得十五年巡撫都御史楊一魁以黃淮交漲而舊閘泄水不及山鹽六邑田沉水底挑濬廟灣射陽湖等處河道水有所泄范堤乃固民竈兩利淮安府志間按揚州府志云宋開寶中王文祐增修後圮天聖范仲淹監西溪鹽倉建議更築發運副使張綸上其事且自請知泰州以仲淹令興化董修築之故至今人稱之曰范公堤云御史宫夢仁疏理下河海口疏曰黃水視淮水為通塞所以捍淮水使專㑹黃水者髙堰翟壩一帶堤岸耳其上流為阜陵洪澤湖淮水於此停蓄堰壩逆之西注㑹黃水以滌淤沙下流為白馬諸湖五湖之間皆為漕渠要害漕渠自清口對岸入天妃閘南下六十里達於山陽折而西南經黃浦八十里達於寶應逾汜水越清水潭百二十里達於髙郵沿邵伯湖堤折而西流歷金灣茱萸灣百有十里達於江都又折西南十里由三汊河分三𣲖於瓜洲儀真入江曰裏河亦曰上河自茱萸灣閘東南從芒稻河百有十里訖於泰州曰鹽河自泰州東西二壩過港口而北百四十里為興化稍折而西南八十里為髙郵再折而西北百二十里為寶應又折而東北九十里為鹽城其間膏腴錯繡阡陌比鄰草蕩鹽場星羅碁布周回千里祗憑舟楫為往來而出廟灣白駒丁溪諸口入海曰下河上下河惟恃一線河堤蜿蜓其間登岸而望內如釡底外若建瓴淮揚兩府數十萬之田賦鹺利由兹出焉淮揚六七州縣數百萬之户口室廬由兹存焉故內開行水支河無慮數十凡以串場達海道相絡也人知髙寶邵伯河堤為下河州縣之門户髙堰翟壩又上河之籓籬籓籬不固門户因之失守固也殊不知昔人云射陽諸湖喉也髙寶諸土田腹也海口尾閭也灌於喉而漲腹所必至者況多其入少其出大於口小於尾閭而謂不洚洞滔天也有是理哉古今稱善治水者莫如禹禹貢一曰入於海再則曰入於海孟子亦曰四海為壑是海之能受水而為水所歸也明矣豈歷官河上諸臣獨不見聞而故為是泄泄從事乎緣歲久日湮漸積壅塞民之豪有力者盤踞其間安土重遷因緣為奸煽惑衆聽謂此不可創而開也開之將不利於商若竈且恐生奸人窺伺固不自今日而多聚訟矣抑思黃淮入海以雲梯關為首稱其淮安廟灣海口以南有新興之匣子港鹽城有天妃口石䃮口之新洋港伍估之老人港興泰有劉莊之新團河白駒之牛灣河草堰小海之苦水洋滷河口丁溪馮家壩之龍鬭港以及車兒浦載在志乘舊跡可循而何云創始也即欲為居人計獨不可就附近之地因下而别為澤也至民竈田在范公堤內豈海潮所能驟侵又何有於鹹水傷禾淡水傷鹽之說乎況濬而深之煮海者得不負戴而舟焉利當不在民後抑海口僅取出水勢不等於大洋帆檣難以競渡也此誠萬世永賴之休矣揚州管河通判聶文魁勘沿海閘河詳議曰看得揚屬瀕河諸邑惟江都地勢稍髙寶應次之髙郵為中窪泰州亞於髙郵興化真如釜底其沿海各場地勢南髙而北窪故鹽城又居興化之下流而羣水皆趨東北職此由也或謂沿海髙於內地殆不其然大郡各場與髙江地勢略相等察驗水平可見祗因興泰二邑獨處窪下故聚水而不能泄自明季迄今數十年來各場諸閘圯廢運鹽河到處淤塞西水東注而不知所歸則瀰漫民田長為澤國矣故舊制諸閘經畫周詳各流分派井井不獨正河寬大即支流旁泄之處口面皆闊數丈今已盡成平陸水行地中之謂何尚何水利之可言哉按鹽場閘座原以拒外潮而泄內漲故范堤為瀕海金湯即今唯白駒四閘潮水直灌閘門消納利便宜照舊制修復草堰宜稍改閘門迎溜他若小海丁溪二閘距潮汐甚逺蓋滄桑易變鹽場沙地視昔增綿數十里故潮水不能相應商竈惟知蓄水運鹽每於閘外通潮之處攔築土壩或遇水汛盛時即在土壩上另挖深溝引水內灌濁水既停淤沙日積遂致閘與河俱廢總因閘在上流無所甚繫於蓄泄故也擬將丁溪雙閘改寬數尺移置馮家壩之上下里許小海閘姑置另議劉莊場宜添造大團一閘何垜場亦添造一閘於凹子港之上流不必定泥沿堤故蹟有失時宜庶竈場不致屢屢築壩而河渠可保深泄矣髙郵土民治下流入海說曰淮揚之災自已亥至今二十六年於兹矣民之救死不能須臾緩茍治之不得其道曠日持久虛縻帑金重勞民力而紛更迄無成功溝中之瘠其能待耶故治水在先定其規模而後從事其道不可不亟講也若雲梯關通而河注於海清口導而淮出於河歸仁堤髙堰翟壩築而黃淮不東灌於漕河上流之治兹不更贅矣所當講求者則漕河之自淮而南寶應髙郵江都間沿堤所新建之滚水壩既連二百餘丈之廣泄水於堤以東矣堤東皆山鹽髙寶江興泰之田而興鹽則城在焉迤東橫截而捍海者又有范公堤然則滚壩下之水何以行地中而不至漫溢乎平陸興鹽及諸湖之水又何以達范堤而不至留滯於釡中范堤之下從何道而出於堤范堤以外經何港而入於海必瞭然悉指諸掌然後治得其道而躋昏墊於平成也今試言之堤東之河縱橫交錯又有諸湖蕩間雜於其中其名目不可勝舉而條理脉絡所貴乎分明也治之之法當分為二大支皆從髙郵州治分南北始其一將髙郵南六滚閘之下各開支河數里使之北入運鹽河南入淥洋湖㑹注於興化之下流再將興化原舊支河三股一名車路河迤東由串場河直達丁溪海口一名白塗河迤北轉東由串場河直達小海草堰海口一名海溝河亦斜迤東北由串場河直達白駒海口則南六滚閘之水行矣其一將髙郵北二滚閘之下開子嬰溝舊河從臨澤沙溝由串場河下石䃮天妃海口則北滚水閘之水亦行矣若夫沿堤各場其出海閘座港口皆有故道可尋也試更一一述之一則石䃮天妃二口上受漕河之水下為子嬰溝之門户從來泄水甚速載在成書後因閉塞涓滴不行於康熙七年欽命户刑二部查出水去路㑹同河督漕撫各部院親行踏勘始開放無阻但一路河道日久淤塞不能迅駛下海所宜大加開浚相形造閘一則大團地在劉莊場北二十五里即相傳老人港處也舊有石閘一座今廢上口攔築土壩其壩下亦通潮水西接串場河之新港東由陳家磉韋家竈出鬭龍港之下口入海宜開浚建閘一則白駒場舊制南有雙門石閘一座北有單門石閘二座現今微通潮水其迤東三十里至牛灣河又三十里至梅花樁由梅花樁至洋尚有四十餘里苐牛灣河一帶河形淺窄流水不迅必逐段挑挖建設閘座方泄水無阻一則草堰場北首有三門土閘一座單門石閘一座宜改造其迤東四十里至大東河現通舟楫再東去二十里至西團而團下舊有土壩今廢其壩外十五里接龍鬭港俱乾涸無水宜開濬一則小海場與草堰相連南有石閘一座今廢東至小海團五十里舊有土壩又東十二里至萬盈墩雖有河路只深二尺水面寬六七丈以至二丈不等惟直去四十里至王家港下海俱係淤塞其水漸淺僅深數寸宜開浚一則丁溪場舊有雙門石閘閘下河窄水淺不能行舟東去五十里至馮家壩而壩下亦有閘座今廢石跡尚存再由沙河小東港從龍鬭港下苦水洋共五十里其一路河道水面寬一二丈亦間有三四丈其水之淺深僅存尺許亦間有二尺以至於光沙無水不等皆宜開浚造閘一則河垜場自車兒埠口四十里至滔子河尚通舟楫惟從朱家竈歷董家窩頭至西川家奄地方三十里下苦水洋係無水光沙俱宜挑挖添造閘座以上七處海口從五路下洋請次第開濬兼造閘壩水大則引水歸海水小則閉閘以灌溉民田則范公堤以內之水皆由閘至港以入於海矣總之一帶支河并串場河以及閘外之海河細詳水勢要槩寬十丈深一丈方泄淮黃之水惟髙郵西運鹽河受諸閘之水更為澎湃洶湧必寬二十丈乃泄水甚捷且海口朝夕兩潮潮落則六箇時辰水泄潮長則六箇時辰水停若不盡開支河則宣泄不迅其應開應浚之處必一槩開廣浚深自田可耕而賦可復於國計民生胥有裨矣揚州府志淮揚運河東堤之東一片窪區南北約長三百餘里東西約寬二百餘里其間千支百派各有河溝通流入海謂之下河下河直東為范公隄范公隄之東為淮南鹽場范公隄之西貼隄有小河一道名為串場河淮南鹽商藉此河以撥運引鹽者也此一片窪區合而計之不下三十萬頃內極窪之地為仇湖鮑湖淤溪湖賈湖喜雀湖平望淥洋廣洋得勝射陽等湖約居大半而淮揚兩郡所屬之山陽鹽城寶應髙郵興化泰州江都等七州縣田畝約居小半然七州縣之間惟興鹽泰三州縣之地全在其中若山寶髙江四州縣之地則半在其中約有一半在運河之西而此七州縣地畝之在下河者各又有髙窪之分大抵逺河之地稍髙而近湖皆屬窪地遇水則窪地每每被淹而大旱則河底亦成陸地此其大槩也若夫近日情形則較之二十年前又實有異蓋二十年前河道未壞之時雖運河東隄各閘壩涵洞所泄之水俱歸此一片窪區之內而自有千支百派之河溝為之分頭下泄逮清水潭等工屢次潰決之後淮黃交注大水漫淹者十有餘載水溜之所衝風浪之所擊泥沙停積河埂削平而河溝盡墊矣自今新舊各閘壩涵洞之水源源泄下而無通流之溝河為之分泄其勢不得不由卑窪之地淹漫而東七州縣之被淹猶在也余與陳子天一再四籌度若欲去其弊而收其利則莫如上接運河下達海口通長特挑大河數萬丈挑河之土即以之堅築沿河兩岸長隄使新舊各閘壩涵洞減下之水全歸大河入海而兩岸長隄之上仍聽民間多建涵洞小閘以為灌溉之資計議巳定商之靳公靳公即欣然疏請如此工一成不特見在額編被淹田畝盡皆可耕而仇鮑射陽等一切諸湖俱可變為膏田自然國賦日增而民生日利矣周洽竹岡日記一康熙三十二年十月內部議河道總督于成龍等前疏內廟灣同知兼管鹽城海州知州兼管州同等語句讀未明應令該同知兼管鹽城海州二州縣河務奉㫖依議以下海防㕔冊一蝦鬚二溝曩因童家營漫溢淤平雖有戛梁河出水淺狹不足宣泄積水故興鹽一帶每多泛溢康熙四十年間於欽奉上諭事案內總河張鵬翮仰遵聖訓將蝦鬚二溝淤塞處計長四十餘里估計挑挖寬深引水入朦朧河以達於海又箆疏戛梁河西塘河東塘河使其通暢特邀俞允發帑委員挑疏深通一下河為上源湖河各壩受水之區素稱澤國蒙皇恩宵旰憂勤再三籌畫於康熙四十四年十月初四日特頒上諭指示方略令於各壩下開河築堤使減出之水不致渙散沖流為害敕行四院㑹勘確議題覆估挑四十五年欽差督修都統孫渣齊帶領分修各官將蝦溝河自馬家蕩山墩起至衛家灘止長五千四百丈並鹽邑境內之串場河自便倉起至石䃮口止長六千五百四十一丈三尺派委分修各員逐段挑濬深通田是積水暢流歸海以上俱海防㕔冊一康熙三十一年十二月日總河于成龍題江南揚州府管河通判管轄髙寶江儀四州縣之運河事務頗繁更兼興泰如通四州縣下河地方遼闊一員不能兼顧且下河已設立運河減水壩又且建閘疏通一切溝血渠堰必得專員豈可置之不問應將下河興泰如通并范公堤串場河等處分與揚州府管糧通判兼管移駐泰州部議覆奉㫖著照該督所題行以下俱揚糧河㕔冊一康熙四十年內總河張鵬翮為欽奉上諭事將髙郵南關大壩車邏二減水壩改建滚水壩而滚水壩下之水由興化安豐鎮至白駒場以達於海其海溝河內自鮑家莊至白駒閘止計八十餘里工長一萬四千四百八十七丈地髙水壅亟宜挑浚等因具題奉㫖著照該督所題行一康熙四十五年內河院張鵬翮為欽奉上諭事同漕督撫三院㑹勘題估挑浚興化縣車路河白塗河并興化泰州鹽城縣串場河淤淺處開浚深通分泄髙郵減水壩下之水入丁溪草堰白駒閘歸海并請發內帑奉㫖差部堂孫等帶領旗漢官員分工挑挖自車路河至丁溪閘止工長三千丈又白塗河至草堰閘止工長一萬一千二百六十丈二尺又串場河自泰州境內起歷興化至鹽城縣界止工長二萬五千八百四十四丈開浚以來迄今髙郵減壩之水悉由車路等河歸海以上俱揚糧河㕔冊山鹽興泰諸州縣地皆濵海原無海塘唯藉范公堤以禦潮患明季後久不修築殘缺甚多雍正二年七月十八十九等日海嘯漫過范堤傷毁場廬人畜最慘雖奉有修築海塘之恩㫖有司以費繁工大僅循行故事徒滋上下文移往復而已鹽城令于本宏以新洋港之石䃮天妃兩口為衆水滙歸入海之處每遇內河水弱則鹽潮灌入地成斥鹵春夏之交田疇無水灌溉民飲鹽水苦不勝言欲於石䃮口舊有閘處復建一閘其天妃口最屬緊要應特設大閘一座更多立斗門以時啓閉不特於田廬民命攸關更可以稽察鹽徒之私販誠為一方之便益也且援引欽奉上諭內開修築海塘使失業居民藉此傭役工所以資糊口諄諄上請乃奉各上司批飭是否可援海塘例興修等語恐道旁築舍將來未必能舉行矣再按江南通志載胡希舜築鹽城石䃮口記有云諸海口可開石䃮口獨不可開語見前萬厯二年運河注中今于令上請建閘用啓閉之法亦達權通變之一道也今水學瓜儀運河自江都三汊河以南經瓜洲出大江計程二十七里又自三汊河以西經儀真出大江計程七十二里舊屬揚河通判康熙三十二年改歸江防同知管轄以下俱河防志何薈蕞云瓜洲臨江昔為鎮有城不知築於年揚州府志不載唯於古蹟條內載江山風月亭在江都縣瓜洲鎮熊氏建張翥詩風起西津斷客艘熊家亭子獨憑髙雲移鳥影沉江樹雨帶龍腥出海濤開闢自天留壯觀登臨惟我老英豪放舟擬就金山宿一夜清寒襲錦袍江都縣志漫漶僅可辨識者云瓜洲鎮城在府城南四十五里東西跨壩周一千五百四十三丈有竒髙二丈有竒中又云乾道四年鎮江都統軍王方直始奉詔缺二字南北城後廢嘉靖丙辰以倭變復築以後丈皆缺别條又載有漕運府今改漕儲道有江防㕔有磚厰公館儀真縣在揚州府西南七十五里東至江都縣界四十里南至揚子江五里運河即官河自縣治西南迤東行四十里過烏塔溝入江都界自三汊河迤南起至大江口止係江都縣地設閘二曰廣惠閘通惠閘自三汊河迤南起西至石人頭儀真縣交界止係江都縣地計程十一里自石人頭江都縣交界起至沙漫洲大江口止係儀真縣地計程六十一里設閘四曰響水閘通濟閘羅泗閘攔潮閘河水至此分流入江江潮吞吐消長靡常故兩河皆置閘啓閉行漕然兩岸皆髙阜平田曠野無事堤防河底間有淺處每至冬時行令江儀二縣管河官撥夫撈濬而巳以上俱河防志元薈蕞云真揚閘堰宋以前尚已明洪武十六年兵部尚書單安仁請浚開河道儀真縣城南重建清江閘一廣惠橋腰閘一南門潮閘一以瀦泄水利分濟漕挽上達運河以入揚楚之境成化十年工部提河郎中郭升建議置儀真外河羅泗通濟響水東關四閘𢎞治間總督漕運都御史張敷華建議創攔潮閘閘在羅泗橋西一里楊一清記略曰儀真為漕河歲漕東南粟以供京師多此焉道蓋襟喉最要地也顧漕河諸水至是當入江髙卑勢殊河易泄且涸宋嘉定間守臣建白置三閘為蓄水計尋廢再廢再舉洪武辛亥始即其地築而壩之舟上下必車壩乃達不盡剝載則不敢以舉力稍不齊舟輒壞由是儀真之地舸艫雲委販鬻喧闐罔利之徒萍聚而蟻附居貨食力咸壩是賴閘不復講矣成化甲午巡河郎中郭君升建議置閘四為東關為響水為中閘為羅泗以通於江一時稱便獨妨罔利者煽為泄水之說任耳者和之閘送閉不用𢎞治戊申朝廷用言者下工部檄郎中施恕相所宜復東關羅泗二閘廢響水拓中閘而新之舟復通利焉然江濵無閘潮無所瀦上閘既啓注不可遏於是復起泄水之議漕運總戎郭鋐嘗欲增置瀕江攔潮閘或曰江濵多浮沙不果𢎞治已未冬都察院右都御史張敷華奉敕為巡撫總漕有以攔潮閘之䇿獻者公遂以疏聞既得㫖乃毁言日至而閘愈不用比年以來漕運遲滯督促之使方爾旁午江河水溢橫潰四出正德戊寅春工部主事楊汝圭分司於真始至循行閘壩召邑父老詢廢置之故審利害之宜而復參之同事者曰吾有以處之矣乃亟修諸閘之崩損及器體之朽敗者各立亭其側以便休憩然役夫啓上閉下俟水緩而進舟舟人不費牽挽坦然中流無異平水當夏秋景長日可千艘而漕運無阻矣又慮內河耗泄乃候潮至洞啓諸閘以受灌注既平而閉之計其所受足償所泄又舟咸由閘往來轉般之費有司供億之需十省八九而人咸稱便云一江防㕔衙門從前並未經管河道康熙三十二年總河于成龍題為湖河險汛工長等事案內將瓜儀河道閘座事務改交江防㕔管理以下俱江防㕔冊一瓜洲頭四兩閘康熙二十八年二月內總河王新命題為漕白經由要津等事奉㫖朕前巡幸江南經過儀真地方見水溜閘壞行船艱難俱宜修理著再議具奏一修理儀真閘康熙二十九年九月內總河王新命於漕白經由要津等事案內奉㫖依議一修理瓜洲閘康熙三十一年十一月內總河靳輔等於漕白經由要津等事案內奉㫖依議以上俱江防㕔冊修防事宜凡清水河內塞決於初開之時若舊堤原係沙土須將舊堤多下邊掃保護堅固次計裹頭俟掃臺平穩方可進掃其掃料首重軟草用柴用柳掃之初下多用揪頭繩壓之以土俟掃將沉水方可簽樁恐樁一釘早則掃不能沉底俟掃將沉底再為套掃至合龍時須兼工急儹庶水不致沖深合龍之後髙加柴草勢若馬鞍清水之掃多以土勝清水河塞決下掃法凡運河排樁工昔皆鑲以龍尾掃不久則蟄陷零落如遇漲發則掃隨水去前經具題排樁工槩用下頭整柴鑲掃庶不致漂淌奉㫖允行欽遵在案宜久為遵守凡近城市街道人跡踐踏之處用排樁鑲柴若運河兩岸無民居者可以不釘排樁止用整柴搭鑲下掃逐層壓土堅築更屬省便運河內樁掃工程運河防志決江北江南凡係糧艘經行之處皆稱河苐塞樁掃工程唯江北有之故此二條特見於此方聖時序北河紀曰天下大經濟人必天下真讀書人以豫觀河工之壞往往壞於不學無術之人蓋古人制度卓有成見確然可守後人不審古人立法之意而妄行已私變亂成規及至河工已壞而歸咎於河曰河之難治也茍循古人之成法而恪遵之或有宜於古而不宜於今者則稍為變通焉而仍不失乎古人之意又何河之不可治哉然非天下真讀書人必不能也豫故有感而發焉天下真讀書人其平居時即以天下為巳任其所讀諸書皆經濟大文章由是措之於用又焉有不合者哉潘印川先生曰時勢懸隔修防異宜可因則因如不可則急返焉勿以僕誤後人後人而復誤後人也若泥古人成法而不達時變是又不善讀書者也書曰事不師古無以克永世又曰神而明之存乎其人是在治河者之善㑹之耳居濟一得行水金鑑卷一百五十三
