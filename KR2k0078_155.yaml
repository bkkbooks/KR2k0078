body:
  text: 行水金鑑卷一百五十五江南按察使傅澤洪撰運河水吉安府在江西省城西領縣九曰廬陵附郭曰泰和曰吉水曰永豐曰安福曰龍泉曰萬安曰永新運糧共九萬八千一百四十七石零本五大清會典百通志十萬八千三五十石零而永寧一縣無糧也府城南有贑江歷十八灘到萬安縣東流六十里逾泰和縣達於府東禾水自泰和西界合永新江又合安福江至府西神岡山入贑江龍泉縣有遂水源有左右二溪左溪出自南安上猶之大林至南江口始與右溪水合右溪出自衝之茶陵沴陽經雙溪坑至西溪口由渡口而東歷八十四灘乃入贑江泰和縣南有雲亭江源發興國縣界西北流至珠林入贑江東有仙槎江源發興國縣界小窰嶺西北流其間有大蓬江水仁善江水皆經此入贑江又有牛吼江發源龍泉拔鐵山其間有清江蜀水禾溪橫江諸水皆經此入贑江永新縣有秀水西南入縣分兩支繞縣舊學轉北入江若秀字安福縣有盧水發源盧山距縣一百八十里合二小江東流繞縣北與王江合又東會永新縣水出神岡山下入贑江萬安縣南有早口江源出贑縣三龍經上造下造流入贑江又南有梁口江源出西平江黃塘南流入贑江北有城江源出蕉源經南州觀合盧溪經兩江口流入贑江西北有韶江源自西韶會黃鵠水東入贑江又有射州江源出龍泉經泰和牛吼江入贑江永豐縣東南有恩江源出撫州樂安贑州寧都興國三縣界其間合麻江諸小水流出吉水入贑江吉水縣南有永豐水源自撫州樂安贑州寧都興國三縣界有麻江黃竹渡搖步永寧龍門永豐白水陽豐廬陵峽烏江諸水皆會入贑江又有吉水贑江下流與永豐江合有洲亘江中水深曲折狀若吉字故灘曰吉陽水曰吉水又南有明德水源出永豐縣界西北流為義倉水又西北至瀟瀧下流白沙會於大江西北有南溪水源自中鵠鄉東流二十里為羅陂經柘溪又五里出柘口入於贑江又西北有同江源出分宜安福廬陵之境其間有楓子江柿陂河諸水皆經此入贑江由府治至省城五百九十里江西通志云贑江在府城南原本章貢二水北流至贑縣始合故謂之贑三百里至萬安縣其間有八灘水性湍險惟黃公灘為甚東坡南遷訛為惶恐舟過此其險始平趙抃守虔州時未置萬安縣地尚隸虔嘗疏鑿惶恐以上八灘按陳史贑水舊有二十四灘多巨石陳髙祖發虔州氷暴漲髙數丈三百里間巨石皆沒今止有十八灘云折而東六十里逾泰和東北流八十里經邑界以達郡城又東北四十五里經墨潭而下吉水過臨江至南昌而滙於彭蠡臨江府在省城西領縣四曰清江附郭曰新淦曰峽江曰新喻運糧共四萬九千二百七十三石本典大清會通志八萬七千二百八十九石零府境有贑江由吉安府北至府南入清江清江在府南五里袁贑合流太平江在府西三十五里出蒙山之陽經華陽江會袁江入贑峽江縣北二十里有􅢰水合新喻界頭水東流入清江南有踏石水自吉水界巷里經員嶺黃金江入峽西有亭頭水南有黃金水俱入峽新淦縣南一里有湄湘水發源髙嶺經會政橋入贑又十里有泥江水源出樂安縣西北流入於清江北有金水西有藍陂水逆溪水俱入江新喻縣有喻水一名秀水源出萍鄉之盧溪經縣境達於贑江縣南二里有睦宦水源出鼎山北流入喻水東北有距河水出袁州分宜之洞村有兩源一塗塘一龍塘合距村南三十里經過濟橋合渝水又有板陂水自分宜之崇法院東流過界首入縣江寰宇記所謂五浪者即江口之合流處也由府治至省城二百二十里江西通志云清江在府南五里袁贑合流宋羅知古詩層層碧嶂來無盡滚滚清江逺莫追於是有清江碧嶂之名蕭水在府城西又名小陽水源出栖梧山及烏塘合流而為蕭水中有灘曰蕭灘下流至南昌府境入江沉香溪在府城北即閣山水也閣山左界水會淦水至鎮入江右界水出沉香溪南流又東折至豐城界小江口入江瑞州府在省城西北領縣三曰髙安附郭曰新昌曰上髙運糧共七萬二千九百十石本六大清會典百通志萬八千四十九石零府城有錦江貫南北二城之中合上髙之凌江新昌之滕江歷府城而東注南昌府境新昌縣滕江自西而南杭橋之水入焉上髙縣凌江發源萬載縣之八疊山於龍河渡東流分脈經縣城與滕江合流入於章由府治至省城一百二十里江西通志云錦江一名錦水一名蜀江自袁州府之萬載縣發源至上髙合新昌水入江經府城東入於贑鍾口江在府城南源發荷山入錦江曲水在府南發源蒙山流出潦滸口東入贑龍口水在府西南源發蛟湖北流至花園渡入錦江華陽水在府西南有小溪自新喻縣界流至華陽北入錦江隱泉水在府南均山之東北泉沸湧出於平田自三十六陂流出曲水橋入清江界合於贑水自吉安府十里至羅紫山十里至大洲頭三十里至三曲灘十五里至元壇觀五里至富口十里至童江灣十里至長牌十里至新淦縣金川驛二十五里至河埠十里至石口十五里至太陽洲十里至永泰十五里至臨江府潚灘驛十五里至臨江河口十五里至樟樹鎮十里至老虎口十里至揚子洲十五里至黃土腦十五里至豐城縣劒江驛十里至曲江十五里至小港口十里至大港口三十里至張吳渡二十里至市汊驛左往瑞州十里至象牙潭二十里至河泊所二十里至生米潭二十里至江西省城通志自象牙潭至省城八十里建昌府在省城南少東領縣五曰南城附郭曰新城曰南豐曰瀘溪運糧共二萬一千一百四十七石零本大清會典十通志四萬七百四三石零而南城廣昌二縣並無糧也府境有盱水自廣昌南豐經府城南會新城飛鳶水流入撫州新城縣有黎灘水源自福山之赤芾澗及巖嶺下流四十里至孔家渡即今南津雙港合流至縣又西北經硝石至府城下一百四十里會盱水入彭蠡南豐縣東至許有蔓翠湖湖口會盱水瀘溪縣在府之東北盱江在其西江西通志云盱水源出血朩嶺流六十里為盱水又二十里為巴溪又十五里為小勳溪又七十里至廣昌縣前又三十里入南豐縣境東北流百里府城東南會新城縣飛鳶水又東北流二百餘里入撫州府境飛鳶水在新城縣東七十里一名悲猿港東北流至郡城與盱水合撫州府在省城南少東領縣六曰臨川附郭曰崇仁曰金溪運糧共三萬五千十石本萬大清會典八通志八三千六百石零餘三縣俱無糧也府境有汝水自金溪西流府城東抱城而北下流南昌臨水自崇仁流至西津與汝水合曹水源出崇仁界雙坑至合處四十里又東北流入臨川界受禪和仙蓋諸原之水過上頓渡數里入於臨川諸水合流由金玉臺出烏鴉石折而北過虎頭洲至髙洲港受黨溪樟源以西櫧山以南之水至金溪城受金溪東鄉西注之水而西北略豫章入彭澤此郡流之大經也江西通志云汝水源自廣昌伏村血朩嶺北流二百八十里受南豐之水又百二十里至建昌府治受新城赤芾飛鳶之水為盱合流二百里至梁安峽入臨川之境為汝至石門受金溪清江諸水過夢港臨水源自崇仁縣流至西津與汝水合羅山水其源二一出暗坑東流五十里至羅陂入寶塘一出東塔龍潭至合臨水處八十里東至鷺渡入臨川之境受沿流諸溪之水又東至龔家渡合宜黃水下數里至西津合於汝水西寧水在崇仁縣西五里源出華蓋山下流曲折五百餘里至西津與汝水合福水在金溪縣南一十里源出於閩經南城梅峰至鼓樓岡下會石門港水苦竹水在金溪縣北四十五里乃汝水之上流也金溪水在金溪縣上幕嶺東水色如金縣因以名自建昌府北至撫州府臨川縣九十里臨川縣至省城二百里廣信府在省城東南領縣七曰上饒附郭曰玉山曰弋陽曰貴溪曰永豐曰興安運糧共三萬六百十石本大清會典十通志四萬九千八百一石零鉛山一縣無糧也府城北有上饒江上流會諸溪水經弋陽貴溪流入饒州櫧溪自府西流入江玉山縣在府東永豐縣在府東南並通上饒江蓋玉山縣為上饒江之上流自上饒而興安而弋陽而貴溪至饒州府之安仁界歷三百里又六十里至鄱陽縣界入於湖江西通志云破水石在府城西源出福建建陽縣界北流六十里入上饒江靈山水在府東源出靈山南流百里入上饒江弋陽江在弋陽縣東二十里又名弋溪源出上饒河南昌府為江西省會領縣七曰南昌曰新建並附郭曰豐城曰進賢曰奉新曰靖安曰武寧運糧共十四萬二百七十三石本三大清會典百通志二十萬五千二一石零而寧州無糧也府城西南章江自南來歷滕王閣北抱龍沙注鄱陽湖章江門外有鳳皇洲橫阜經夕佳樓抵石頭口如鳳翼然水次倉在焉府城北八十里有慨江口源發寧州經建昌又東流至此與章江合俗訛為漢口東五十里有南湖源出進賢縣羅溪嶺東北流合三陽水出鄱陽湖西南有蜀水即筠河也亦名錦江源出髙安縣東流合象牙潭水入章江劒水源出章貢經清江繞豐城縣折而西北為劒水一名劒江又東流入鄱陽湖豐城縣有富水源出羅山東流會豐水槎水入劒江豐水源自杯山西北流繞劒池會富水小港口入章江進賢縣東南有院澤水源出槲山會臧溪灣旋九曲入於湖明會典萬厯十一年江西饒州等五所淺船改并進賢縣水次奉新縣西二十里有龍溪水源出越王山南合馮水至靖安縣同入於湖武寧縣在寧州下流有修水源出黃龍山納衆流東北行六七百里入於湖江西通志云章江在府城西南源出南安之聶都山東北至大庾經南康會豫水是為豫章水至贑州會貢水是為贑水章水發源最逺控引衆流至此故江獨以章名統計上遊自南贑吉袁臨瑞撫建而下為八郡水之所會府城東隅有東湖舊通大江漢太守張躬築隄以通南路謂之南塘酈道元稱東太湖十里二百二十六步北與城齊南緣回折至南塘水通大江者是也曲江在豐城縣磯頭山之濵形如半月中分三潭岸旁居民繚繞榆柳成行水波之豔如蕩金碧漁舟上下宛然畫圖自省城南浦驛十里至石頭口二十里至八字腦二十里至樵舍驛三十里至牛欄三望三十里至昌邑六十里至吳城驛右往寧州三十里至珠磯十里至鶯子口十里至左蠡東往饒州撫州十里至南康府匡廬驛饒州府在省城東北領縣七曰鄱陽附郭曰樂平曰浮梁曰德興曰萬年運糧共六萬七千九百六十石零本四大清會典十通志十二萬千七百二八石零而餘干安仁二縣並無糧也府城南鄱江一名長港其源有二一出洎山合婺源經德興樂平而來一出祁門婺源經浮梁而來會於城東環城而西折北十餘里分為二支名雙港水入鄱陽湖浮梁縣南有昌江源出縣東八十里西流會諸溪水下入鄱江樂平縣南有樂安江源出婺源之芙蓉嶺繞婺源縣治而下與德興衆水合入樂平之樂安鄉故名樂安江東北之洪源諸水西南之洎川諸水相次入焉德興縣東南有洎水出洎山西流百餘里至縣治二十里至小港口入樂安江趨鄱陽湖萬年縣在安仁縣錦江之北樂平縣樂安江之南俱至鄱江入鄱陽湖鄱陽湖在府城西四十里一名宫亭一名楊瀾闊四十里長三百里禹貢東滙澤為彭蠡即此水連南康饒州九江三府號為巨浸大孤山砥柱下流最稱雄勝江西通志云府城東有東湖又名督軍湖秦鄱令吳芮習水戰處納風雨薦福諸水由德新橋出鄱江康郎湖在餘干縣西七十里即鄱陽湖之南涯錦江在安仁縣前每天朗氣清水雲蕩漾如錦源自廣信經安仁會白塔河流經餘于入鄱陽湖自府之芝山驛十里至竹雞林二十里至八字腦十里至洪家閲十里至團砧二十里至棠隂巡司十里至打石灣十里至周溪五里至釣臺十五里至柴棚巡