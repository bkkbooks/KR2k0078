body:
  text: 行水金鑑卷一百五十七江南按察使傅澤洪撰兩河總說總理河道都御史戴時宗上疏為備陳黃河事宜以寬聖慮事臣歷魚臺縣按視新隄工程及黃河水勢適新水泛漫兩崖無土工力難施乃捨舟陸行繇金鄉縣歷曹武入河南界開挑梁靖口通賈魯舊河闢趙皮寨越汴梁抵孫家渡隨處分派丁夫督以官屬蓋欲疏濬上流分殺水勢徐為下流築塞之計乃放舟黃河中流遍觀大名等府舊嘗決處返棹曹單循魚臺出沙河驛泊雞鳴臺往來魚沛間督築新隄決口時已六月盡間矣臣竊伏自念頃者黃河變遷運道阻患陛下日夕憂勤乃用言官議不以臣愚不肖謬承其任臣圗報無方不敢愛死雖溽暑馳驅豈敢辭勞即今各處工程雖未報功而始終本末已得梗槩用敢預先上陳庶幾稍寬陛下宵旰之憂亦臣區區犬馬之微誠也臣初受任時訪求士大夫及道途來往皆以魚臺水勢洶洶似不可為乃今觀之殊有未然夫天下之事可以遙斷者理而不可遙定者形故耳聞不如目見意料不如身親今議者欲尋故道而不知故道之未可盡復欲除近患而不知近患之未可亟去臣請終言其說夫黃河遷徙自古不常今北自天津南至豐沛無尺寸地無黃河故道其在當時無不受其害者古今言治河者俱無上䇿唯漢賈讓言不與河爭尺寸之地先儒韙之以為至論今必求河之故道則禹貢時九河乃在河間滄定間隋引河水入汴南逹江淮又引河鑿渠北通涿郡今涿水路絶惟淮流如故然巳非向者之舊漢唐皆都關中不借河水之用宋以都汴切近河災其防河與防北邊糜費若等然自始迄終河患莫絶我朝定鼎燕都一切漕運取給東南自淮達徐皆藉河水之力往年河入豐沛沽頭上下諸閘皆廢而舟楫反利今年天旱不雨運道幾涸濟寧以南若無魚臺之水則漕舟非旬月可至此河水不可無之明驗也臣到河南見河東北岸比西南低下不啻四五尺若引而決之繇東平張秋入海為力甚易魚臺之水涸可立待然中梗運道東兖以下必皆厄塞故國家立法盡三省之力自開封府筒瓦廂以至考城縣流通集等處防守東北岸如防盜賊意固有在然猶未也又必如議者之說地道變遷九河可復繇鄭衛滄景以至天津入海庶幾河患永絶然恐徐淮以下一帶皆涸尤不可之大者也昔者禹治九河不過達海而止古今以行所無事稱之今欲治河之患而又欲借以濟吾用使禹復治必不用往日之法矣臣所謂故道之不可盡復者此也河水所至必為民患今不暇逺舉且如𢎞治年間河溢曹單湮沒一二十年至正德年間河徙豐沛而後曹單之患息又一二十年至前年夏秋復徙魚臺而後豐沛之患息今飛雲橋路絶髙過平地又純是淤沙人力難施決無復通之理縱使復通不過移魚臺之患於豐沛是一患未除而一患復生也夫河水驟至名曰天災人猶嗷嗷今豐沛之民方且息肩又欲引水而灌注之民其謂何昔宋神宗時河決滄景司馬光議棄北流而治東流以俟二三年河流深廣然後徐議神宗曰東北流之患孰為重輕光曰兩地皆吾赤子然北流巳殘破而東流尚完議者以神宗所問有君人之度而司馬光所見得權時之宜援古酌今何以異此臣所謂近患之未可亟去者此也臣歷考河志洪武元年河決舊曹州自雙河口入魚臺縣太祖髙皇帝用兵梁晉間使大將軍徐達開塌場口入於泗以通運道後因河口塞淤乃修師家莊石佛諸閘又開濟寧州西耐牢坡接引曹鄆黃河水以通梁晉之粟永樂九年太宗文皇帝復命刑部侍郎金純看視河勢發河南運朩丁夫開濬故道自開封引水復入魚臺塌場口出榖亭北十里以修太祖時故事今所謂永通廣運二閘是也繇此言之則魚臺乃河之故道議者偶未之考耳為今之計欲治魚臺之患必先治魚臺所以致患之本欲治魚臺致患之本必委魚臺以為受水之地蓋河之東北岸與運道為鄰惟有西南流一繇孫家渡出壽州一繇渦河出懷逺一繇趙皮寨出桃源一繇梁靖口出徐州小浮橋往年四道俱塞而以全河南奔故豐沛曹單魚臺以次受害今不治其本而欲急除魚臺之患臣恐魚臺之患不在豐沛必在曹單間矣然臣所以欲暫委魚臺而不治者其說有三其䇿亦有三夫治朩者先正其本濬流者先𨗳其源上源既分而下流自殺其說一也臣初到魚臺夏麥巳收新水適至被水之鄉已為棄地縱欲耕種須待明年今歲不治民不大病其說二也河流既久將自成渠因而𨗳之當易為力既免勞費無益之憂且無東奔西突之患其說三也五月二十二日臣已將梁靖口開通賈魯河六月初五日又將趙皮寨加闢深廣但魚臺之功未完以此未敢具奏惟孫家渡雖已挑通而行水尚少方議開濬渦河一道議者以中經祖陵未敢輕舉今山陜巨商往來汴梁者皆繇小浮橋直泝梁靖口趙皮寨河口舊止五十餘步今已闊一里許下流不能容乃至漫入夏邑此二河皆上年所未有之事大約河勢已殺十之三四然魚臺之水所以未即消者以前人議築新隄橫亘其東無所於泄故也臣初到時即已病之今議於新隄開設水門數處使入昭陽湖及盛應期所挑新河出金溝留城境山庶幾西岸之水可以少平然一時朩石俱難卒辦聊以樁葦權宜應變而已候秋水稍落之後另議興工魚臺之水雖多然皆泛漫實未成河其趙皮寨與開封府筒瓦廂大名府杜勝集等處相對梁靖口與曹州娘娘廟考城縣流通集等處相對臣巳預戒官夫重加捲掃乘此魚臺之水下壅之時逼之使西南流一䇿也二河既通孫家渡冬月可完雖渦河一道方在别議然以其一出魚臺四道並行其勢巳弱則所來之水反足以濟吾運道之不足如往年河出豐沛沽頭上下諸閘不事啓閉而舟楫通利一䇿也萬一溢出榖亭以北則候其河流漸深河渠漸廣因而通塌場口故道今永通廣運二閘俱存閘夫編設如故嘉靖六七年間曽因大水糧運皆繇此行比與濟寧諸閘近便甚多此可以復國初之舊又何患焉一䇿也夫有前三說并此三䇿故臣斷然以賈讓司馬光之言為可行然臣私憂過計黃河變遷自古不常以臣之愚豈能逆料於三䇿之中但審觀事勢為今之計不過如此萬一此後果如愚慮出臣前䇿則河有西南之漸永無運道之虞固其上也出臣後䇿則借此河水之力足資運道之利亦其次也臣才識迂疏不逮前人而又承此久殘極弊之餘東馳西驅奔救未及伏望陛下鑒臣愚慮察臣愚忠不棄芻言不惑流議特與密勿大臣參議可否使臣得以一意從事庶幾少畢犬馬之力以報陛下知遇之恩尤望陛下少寬南顧之憂以享和平之福臣不勝惓惓願望候命之至吳山治河通考十戴公之疏實録巳載其略任黃河二十三卷嘉靖一年茲以其言黃運相關之故又備録於此國朝黃河入運洪武元年河決曹州從雙河口入魚臺大將軍徐達開塌場口入於泗以通運時戴村未壩汶由坎河注海運阻故引河入塌場以濟之二十四年河決陽武東南由陳潁入淮而故元㑹通河悉淤永樂九年以濟寧州同知潘叔正言命尚書宋禮役丁夫一十六萬五千濬㑹通河乃開新河自汶上縣袁家口左徙二十里至壽張之沙灣接舊河九閲月而成績侍郎金純從汴城金龍口下達塌場口經二洪南入淮漕事定為罷海運正統十三年河決滎陽衝張秋尚書石璞侍郎王永和都御史王文相繼塞之弗績景泰四年都御史徐有貞役丁夫五萬八千作九堰八閘以制水勢塞之凡十有八月而成𢎞治三年河決原武支流為三一決封丘金龍口漫祥符下曹濮衝張秋長隄一出中牟下尉氏一泛濫儀封考城歸德入於宿以布政使徐恪言命侍郎白昻役丁夫二十五萬塞之𢎞治五年復決金龍口潰黃陵岡再犯張秋侍郎陳政治之弗績六年訛言沸騰有云河不可治宜復海運有云陸運雖費餉事亦辦朝議弗之是也乃命都御史劉大夏平江伯陳鋭役丁夫十二萬有竒一濬孫家渡口開新河𨗳水南行由中牟至潁川東入於淮一濬四府營淤河由陳留至歸德分為二派一由宿遷小河口入淮一由亳州渦河入淮分土命工始塞張秋二年告成自是河南嵗計河工矣正德四年河東決曹縣楊家口趨沛縣之飛雲橋入運患之工部侍郎崔巖役丁夫四萬二千有竒塞垂成暴漲潰之巖以憂去侍郎李鏜代之四月弗績盜起而罷七年都御史劉愷築大隄自魏家灣起至雙堌集亘八十餘里都御史趙璜又隄三十里續之嘉靖六年河決曹單城武楊家口梁靖口吳士舉莊衝雞鳴臺七年淤廟道口三十里都御史盛應期開趙皮寨白河諸支流殺水勢役丁夫五萬八千三月而成乃議開夏村新河役夫九萬八千四閲月朝議不一罷之八年飛雲橋之水北徙魚臺榖亭舟行閘面九年由單縣侯家林決塌場口衝榖亭十一年十二年水竟不耗十三年廟道口淤都御史劉天和役丁夫一十四萬三千九百九十四濬之四月始成而忽由趙皮寨向亳泗俄驟溢而東向梁靖口漸奔岔河口東出榖亭之流遂絶運河淤二洪阻涸秋冬忽自河南夏邑縣太􅉌四村諸集攻開數口轉向東北流經蕭縣城之南仍出徐州小浮橋下濟二洪趙皮寨俄塞十九年決野雞岡由渦河經亳州入淮二洪大涸兵部侍郎王以旗開李景髙支河一道引水出徐濟洪役丁夫七萬有竒八月而成尋淤二十六年決曹縣衝榖亭運河不淤三十二年決房村約淤三十里都御史曽鈞役丁夫五萬六千有竒濬之二月而成三十七年新集淤七月忽向東北衝成大河而新集河由曹縣循夏邑丁家道司家道出蕭縣薊門由小浮橋入洪七月淤凡二百五十餘里趨東北假家口柝為六股曰大溜溝小溜溝秦溝濁河胭脂溝飛雲橋俱由運河至徐洪又分一股由碭山堅城集下郭貫樓又析五小股為龍溝母河梁樓溝楊氏溝胡店溝亦由小浮橋㑹徐洪河分為十一流遂不淤然分多則水力弱水力弱則併淤之幾也四十四年七月河果大淤郭貫樓淤平全河逆行自沙河至徐州俱入北股至曹縣崇朴集而下北向分二股內南之一繞沛縣戚山徐州楊家集入秦溝至徐州北一繞豐縣華山北又分二股南之一自華山東馬村集漫入秦溝接大小溜溝泛濫入運河逹徐北一大股自華山向東北由三教堂出飛雲橋而又分十三股或橫截或逆流入漕河至湖陵城口漫散湖坡達徐從沙河至二洪浩渺無際而河變極矣八月少保尚書朱衡乃請開盛應期新河濬留城舊河同都御史潘季馴開新河自南陽達留城一百四十一里有竒濬舊河自留城逹境山五十三里有竒役丁夫九萬一千八閲月而成七月河復決沛縣衝運河而運河亦由湖陵城口入湖坡九月馬家橋隄成水始南趨秦溝冬沛流遂斷隆慶元年正月河南衝濁河雞爪溝入洪二年專由秦溝入洪而河南北諸支河悉併流秦溝三年四年河大漲徐州上下悉為巨浸舟行梁山之麓而茶城至呂梁兩崖為山所束不得下又不得決五年乃自雙溝而下北決油房口曹家口青羊口南決關家口曲頭集口馬家淺口閻家口張擺渡口王家口房家口白浪淺口凡十一口枝流既散幹流遂微乃淤自匙頭灣八十里而河變又極矣議者欲棄幹河而行舟於曲頭集大枝間冬初水落則幹巳平沙而枝復阻淺損漕舟千有竒則又議棄黃河運而膠河泇河海運紛沓焉莫可歸一都御史潘季馴乃役丁夫五萬開匙頭灣僅僅一溝遂塞十一口併衝口溝大疏𨗳而八十里之故道漸復明年議大隄兩崖北隄起磨臍溝迄邳州之直河南隄起離林鋪迄宿遷之小河口六年二月少保尚書朱衡兵部侍郎萬恭至悉罷膠泇之議而一意事徐邳河役丁夫五萬有竒分工畫地而築之夏四月兩隄成各延袤三百七十里始列鋪布夫議修守如河南山東黃河例河乃安運通萬歷元年運又大通議始定夫黃河有幹有枝嘉靖四十四年以前析十一枝上流而復歸於徐州之幹河故幹通而枝淤隆慶五年以前析十一枝上決而不歸於邳州之幹河故枝通而幹淤若植朩焉枝榮則幹瘁幹榮則枝瘁與其瘁幹孰若瘁枝治河者與其枝通孰若幹通故黃河合流防守為難然運之利也國家全藉河運往事鏡之何嘗一年廢修守哉或者欲分河以茍免修守之勞而不欲事隄以永圗餉道之利又不虞河分之易淤隄廢之易決其未達祖宗之所以事河與河之所以利運者歟治水筌蹄河兼漕而專言河者何防河所以治漕也河者漕之藉也然則古之防河也避其害今之防河也資其利乎曰唯唯否否漕之藉河禹貢以來有之匪自今也禹畫九州冀為都㑹河流碣石以入于海兖浮濟漯青浮汶濟徐浮淮泗揚浮江漢豫浮于洛梁浮潜沔以入于渭雍浮積石至于龍門未有不通於河者也漢唐皆都關中漢漕山東粟百萬更砥柱之險以達於渭唐漕江淮之粟由汴入河由河入洛以達于渭亦未嘗不藉于河也獨今日哉于慎行河防一覽序太常卿佘毅中全河說云洪惟我國家定鼎北燕轉漕吳楚其治河也匪直祛其害而復資其利故較之往代為最難然通漕於河則治河即以治漕㑹河於淮則治淮即以治河合河淮而同入於海則治河淮即以治海故較之往代亦最利邇歲以來委寄靡專論議滋起于是有以決口為不必塞而且欲就決為漕者不知水分勢緩沙停漕淤雖有旁決將安用之無論沮洳難舟田廬咸沼也是索途于𡨕者也又有以縷隄為足恃而疑遙隄之無益者不知河挾萬流湍激異甚隄近則逼迫難容隄逺則容蓄寬廣謂縷不如遙是貯斛于盂者也又有謂海口淺墊須别鑿一口者不知非海口不能容二瀆乃二瀆失其注海之本體耳使二瀆仍復故流則海口必復故額若人力所開豈能幾舊口萬分之一别鑿之說是穿咽于脅者也又有謂髙堰築則泗州溢而欲任淮東注者不知堰築而後淮口通淮口通而後入海順欲拯泗患而訾堰工是求前于却者也它如絶流而挑方舟而濬疏渠以殺流引洫以灌溉襲虛舊之談而懵時宜之窽者紛紛藉藉載道盈廷至于釣奇之士則又欲舍其舊而新是圖于是有泇膠睢三河之說焉不知既治河而又别治漕是以財委壑也又有興復海運之說焉不知歲用民賦而又歲用民命是以民委壑也嗟嗟謀室于路則三年靡成回車于岐則千里坐失又何惑乎漕幾成陸而民胥為魚耶然諸為前議者豈故好是鑿且奇哉總之不達于水可攻水之理耳蓋黃河之性合則流急分則流緩急則蕩滌而疏通緩則停滯而淤塞故以人力治之則逆而難以水力治之則順而易今太子少保潘公屢膺河寄洞照委源才諝精誠並稱絶世爰偕故右都御史江公決策上請事悉具兩河經略疏中大都盡塞諸決則水力合矣寬築隄坊則衡決杜矣多設減壩則遙隄固矣并隄歸仁則黃不及泗矣築髙堰復閘壩則淮不東注矣隄桞浦繕西橋則黃不南侵矣修寶應之隄濬揚儀之淺則湖捍而渠通矣故自告竣以來河身益深而河之赴海也急淮口益深而淮之合河也急河淮併力以推滌海淤而海口之宣泄二瀆也急用是河嘗秋漲而涯畛屹然淮嘗夏溢而消耗甚速貢賦舳艫若履枕席轉徙孑遺寢緣南畝蓋借水攻沙之效已較然顯白矣若謂水循于分湧于合恐其合而湧也則隄址既遙而奔騰可恣是寓分於合矣若謂胡不用濬而純用築也則築堅而水自合水合而河自深是藏濬于築矣若謂胡不使黃淮分背而乃使淮助河勢河扼淮勢也則合流之後海即大闢蓋河不決固自深得淮羽翼則益深是用淮于河矣若謂河決為天數不可以人力彊塞故曰故道難復也然既塞之後河即安瀾是全天于人矣若謂胡不創開一渠而拘拘膠柱為也則二百年地紀之故道天儲之懿規本無庸創而自今復之是兼創于守矣若謂閘壩之復行李稍滯然河渠既奠而行李益通何便如之是含速于滯矣記禮者謂其數可陳也其義難知也治河之事良亦類此是故排河淮非難而排天下之異議難合河淮非難而合天下之人情難史遷氏曰甚哉水之為利害也余則曰甚哉人情之為利害也故今日之功非當事大臣暨余等諸臣之功皆聖明之功也蓋知河固難而知知河之人尤難知知河之人固難而任知河之人尤難語曰千夫輿瓢不如一人負而趨也千夫牧羊不如一人驅而走也使非聖明之併合河漕而事權歸一也其何能功縶騏驥之足則難望其必至縛孟賁之手則難望其必敵使非聖明之寬假便宜而不從中制也其何能功蜚蝗蔽天則農稷不能善稼奔駟曳轍則王造亦廢馳驅使非聖明之不惑浮言而私撓必黜也其何能功千仭而坡則牧豎陵其阜數尺而峭則樓季不敢踰使非聖明之嚴懲墮窳而凛莫可干也其何能功空柯無刃則公輸不能以斫虛􅑄乏粒則易牙不能以炊使非聖明之破格折兊而大費不吝也其何能功張鵠以行賞然後人罔不射計程以齊足然後人罔不奔使非聖明之綜核明允而微勞必録也其何能功昔晉富平津河橋之成武帝謂杜預曰非卿此橋不立預曰非陛下聖明不成今日之功良亦類此善乎部疏有云其本在明良之相遇其機在賞罰之必行真識體之論哉後之治河者其尚仰體君相任人圖治之心俯察河臣嘔心腐舌之意相與踵而行之期于勿壞勿以事既即安而玩愒勿以功非巳出而更張如周郊之有陳畢終始協心如漢法之有蕭曹寧一作頌如此則漕河之允翕當與國家億萬年靈長之祚同垂罔極也斯豈非國家甚盛隆事哉斯豈非國家甚盛隆事哉余謹不嫌侈大贅筆于簡作左契焉河防一覽歷毅中字子執銅陵人萬甲戍進士嘗謂治河者必先求河水自然之性而後可施其疏築之功必先求古人巳試之效而後可倣其平成之業黃水自崑崙入徐邳歷桃宿至清口㑹淮而東入於海淮水自桐柏入鳯睢歷盱泗至清口㑹河而東入于海此兩河之故道即河水自然之性也故元歲漕江南之粟由揚州直北出廟灣入海至國朝永樂年間平江伯陳瑄始隄管家諸湖通淮河為運道淮以南自山陽起至瓜儀計三百餘里淮以北自清河起至徐州計六百餘里又四十里而至鎮口矣糧艘一入鎮口則運事可冀保全自古餉道之便無逾於此此平江陳公獨為注念而矢謀以禆國計者也方其始事慮淮水漲溢東侵淮郡也故築髙家堰隄以捍之自新莊鎮起至越城止計一萬八千一十八丈橫亘西南而淮水無東侵之患矣又慮黃河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山至柳浦灣而黃水無南侵之患矣尤慮河水自閘衝入不免泥淤也故嚴啓閉之禁止許漕艘鮮船由閘出入匙鑰掌之都漕五日發籌一放而官民船隻悉由五壩車盤是以淮郡晏然漕渠永賴民到于今受其賜此古人巳試之良規也為今之計惟在修復平江之故業而隨時斟酌之可也宋儒朱子有言禹之治水只從低處下手下面之水盡殺則上面之水自消由斯以談欲得上流之沛達必先下流之疏通明矣試自興鹽迤東擇其便利之所如白塗河石䃮口廖家港等處條為數河分門出海然後從下流而上將髙郵北界開清水潭寶應南界開子嬰溝山陽東北開涇河口濬其壅淤闢其窄隘使河深廣中有所受下有所泄而餘水易逹於海則興鹽泰之水有所歸宿而髙寶之水次第東行矣如是則汜光諸湖可令虛腹而武墩周橋髙澗之水容納有地矣倘慮西來水多一時宣泄不及再於瓜洲十壩開十閘口儀真五壩開五閘口灣頭閘旁增置一壩令入通泰鹽河則分泄之路既多潰決之患可免即使伏秋暴漲不能為災自淮以南之運道可永保其無虞也傳曰水由地中行江淮河漢是也釋者曰地中兩崖之間也由斯以觀則河水之行非泛溢四出明矣試將戎家口新衝口黃堌口義安山口盡行堵築使全河之水悉歸故道或如萬歷二十五年故事引水從小浮橋入正河則水合力强積沙自去河不濬而深矣如慮霪雨為潦黃水溢決除崔鎮徐升季太三義减水壩四道外另於呂梁上洪之磨臍溝桃源之陵城清河之安娘城增建減水壩三座如水髙於壩任其宣泄水與壩平任其停蓄則下流疏通上流利達不惟兩隄可保而正河亦無壅淤自淮以北之運道可永保其無虞也議者謂河水溢決病在兩隄束水太急勢乃中潰故古之治水惟曰疏曰瀹曰排曰決未聞築隄而反障之也殊不知古之治河者去民之害而止故可疏可瀹可排可決隨勢利𨗳不與水爭今且資之以為利一則環帶陵寢一則灌輸漕餉而民生又其次也治之者去其害且虞併去其利留其利又虞併留其害利與害相倚去與留相持展轉圖維求為良䇿乃興築隄之議蓋築隄所以束水束水所以刷沙計無善于此者若散漫無制任其所之則潰敗決裂茫無下手而于祖陵運道民生胥失之矣嗟嗟遙縷二隄之設先臣卓有深見非可易視之也自徐抵淮兩隄相望蜿蜒綿亘勢如長山挾河中行即使異常泛漲縷隄不支而溢至遙隄勢力淺緩容蓄寬舒必復歸漕不能潰出譬之重門待暴則暴必難侵增纊禦寒則寒不能入自然之勢也故在遙隄之內則運渠可無淺阻在遙隄之外田廬亦免淹沒雖不能保河水之不溢而能保其必不奪河固不能保縷隄之無虞而能保其至遙隄即止嘗考𢎞治以前張秋屢塞屢決先任都御史劉公大夏將黃陵岡一帶增築太行隄一道而張秋之患遂息此其巳試之明驗也頻年以來無日不以繕隄為事亦無日不以決隄為害何哉卑薄而不能支也迫近而不能容也雜浮沙而不能久也隄之制未備耳議者不咎制之未備而咎築隄者之為下䇿豈得為通論哉築隄之法必真土而勿雜浮沙必髙厚而勿省工力必讓遠而不與爭地斯隄於是乎可固也議者又謂泗陵水淹咎在髙堰遂上疏極言堰之為害欲盡撤髙堰而後可殊不知髙堰一去淮水南注峻若建瓴山陽髙寶以下盡為池沼且淮水大泄力不能控黃萬一黃躡其後與之俱南不惟運道既傷而祖陵合襟王氣亦從此大損矣然則堰亦何負於治河者而諄諄欲去之耶况一堰之間三開溝澗自足泄水其與拆堰同也發言者特未之思耳議者謂黃不兩行黃壩新河之開得非添足之蛇乎余曰不然當祖陵淹浸之時天威震赫臣下憂危總河楊公一時分黃泄水使淮水通流而泗水尋即消减總之急君父之難而他非所計也今黃水從新河行者若湍急如初由清口出者猶安然如故則運道原不相妨無容别議若清口日漸淺澀而新河浩蕩奔騰則有奪正改移之勢前議鮑王決口建立閘座似不可已運船從此入口轉入新河以就正道此總河公初意也若新河勢緩土淤則止建一減水壩以備滿溢不必重濬復費工力也凡此皆黃淮之大較運道之坦途亦治兩河者之要法其他如儀真東關等淺歷石人頭揚子橋三汊河直抵髙廟止一帶運河淤淺寶應一帶湖隄圯壞黃浦決口髙堰隄埂均應修理清江浦長隄卑薄柳浦灣至髙嶺舊隄塌損桃清邳宿兩岸遙縷二隄時加修築或葺舊工或創新址或因髙阜或填窪下一一次第舉之則運道通行自垂永利此在當事者臨時區畫隨地制宜非搦管者所能殫述也張兆元曰當今運道其藉力淮黃二瀆不淺矣若令黃不旁決則衝漕力專淮不旁決則㑹黃力專淮黃既合則控海力專河不必闢而沙自刷海不必濬而水自深此正以水治水行所無事之智也雖神禹復起不易吾言矣張兆元兩河指掌行水金鑑卷一百五十七
