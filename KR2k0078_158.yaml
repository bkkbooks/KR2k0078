body:
  text: 行水金鑑卷一百五十八江南按察使傅澤洪撰兩河總說我朝黃河之役比之漢唐以後不同逆河之性挽之東南行以濟漕運故河患時時有之自海運既罷中灤運又罷專出䢴溝入淮泝河以達㑹通河故河水不得如禹貢故道入北海而河之東南行者又分數道蓋自經汴以來支流益演南出二道皆徑入淮東南出一道東出五道皆入漕河并入於淮乘淮入海今數道皆塞止存沛縣一道河流大而所受狹不能容勢必橫溢而決決而東南有山限閡為禍不大決而東北非東昌則河間等處故往歲張秋潰決運道不通宋時澶州一決灌壞州縣數十為禍不小况今之防河自底柱而下行於平地既防決大名又防決臨清又防決濟寧又防決徐州又防決潁夀以犯鳯陽又欲遏其流不南出不北走循我運道而接江淮之舟此其計誠難也今河南修河之役盡民力竭民財矣隄密於田畔地破於潰瓜及今不處禍未巳也為今之計盛都御史新河之役不可全謂其無功也顧其喜功無漸程役太嚴又忤安仁遂爾中止今猶可復也或於汴西濬孫家渡一道汴東南原出懷逺宿遷二道正東出徐州小浮橋溜溝二道擇濬一道以少殺其勢少分其流可也或修武城以南廢堤以防豐沛漫流或修築沛北廟道口堤以防新決河口可也或講求海運之法即不能如國初婁淞開洋歷大洋之險宜考禹貢碣石入河沿江入海海運之說及秦時起琅琊負海之郡之說唐人雲帆遼海糯稻東吳之說或於淮口入海繞出登萊大洋經海倉昌邑海豐以至天津可也或云登萊外洋有白蓬頭水有官緑大洋黑水大洋又有礁石之險則由淮之清口入海繞出東陬山風帆一日夜可達青州安東衛篙師柁工皆安東人商賈時時往來由安東衛風帆三日可達膠州其間惟石臼島唐島二山頗大而險今私舶往來繞出山後未嘗有覆沒者既至膠州入新河可二百四十里至海倉復入海新河者即膠水也東為膠東西即膠西也相傳勝國時亦嘗濬此以避東海數千里之險者蓋膠之東南出即墨鰲山成山折而西出登州北海始達海倉不若由膠河之為便易也又自海倉一夜便可到天津蓋相去三百里今天津海倉間人販易載小艇乘月夜往來也所謂新河者原出髙密界中大水泊南北分流南新河流入南海北新河流入北海雖出髙密亦由諸野川澗合流始大夏秋為甚南至膠州東界北即海倉巡司海倉有大舟載米麥可三五百石意即古者運青萊之粟由海入薊之處也自海倉至天津海濵更無山陵之險如昌邑濰縣壽光樂安博興濵州利津海豐蒲臺陽信鹽山慶雲滄州迤東皆平衍斥鹵之地可見矣河北有警臨清濟寧可憂也淮西北有警清口豐沛可憂也江北有警䢴溝上下可憂也故海運之說亦不可不預為之計正統額森之難喜寧道之據臨清正德劉齊之亂運船煨燼者五六千艘此往事明徴今直恬然謂無事耳憂國者宜有先事之防矣鄭曉吾學編餘以是又一丘文莊海運之利之說也隆萬泰天至明亡言新河者皆本此從古治水稱神禹禹治水首黃河黃河自崑崙發源萬里而來禹𨗳之自積石龍門蓋特遡其流入中國之始以為肇端後人必追窮河源好博矣而不適於用故論禹治水𨗳河斷自龍門積石始河從積石東北而南計三千里至龍門為西河龍門在冀州呂梁山石勢崇竦其流激震禹治其北鑿龍門分殺其勢西因其回流之性而𨗳之又南而至華隂在陜之華隂縣自南而東至底柱在河南陜州之三門山又東經孟津河南府孟津縣過洛汭鞏縣至於大伾為大名府濬縣􅎔河之山北過洚水為真定冀州北枯降渠至於大陸屬中山郡今真定邢趙深三州之地北分其勢播為九河復同聚一處而為逆河逆迎也蓋迎之以入於海簡潔一水九河其一則河之經流也徒駭等八河故道皆在河間滄州南皮東光慶雲獻縣山東平原海豐由寧津吳橋南皮諸處直達東海是為禹之故道禹之載河髙地以入海蓋自河隂始河隂以西之故道終古不失以東入海之故道後世一失從此泛濫南下四出於冀豫兖徐之區其勢不可勝窮矣周定王五年河徙砱礫始失故道漢文帝時決酸棗東潰金堤在河南延津滎陽諸縣至大名清豐一帶延亘千里武帝時溢平原屬德州徙頓丘今清豐縣又決濮陽瓠子口開河界注巨野屬濟寧州即大野通淮泗蓋河始與淮通尚未入淮也元帝時決館陶舊屬大名今屬臨清又決清河靈鳴犢口今髙唐州舊屬清河郡成帝時決東郡金堤決平原溢渤海清河髙唐州一帶信都今冀州界唐元宗時決博州今東昌溢魏州今大名冀州五代時決鄆州今鄆城縣博之揚劉今東平之東阿縣揚劉鎮滑之魚池宋太祖時決東平之竹村開封之陽武大名之靈河澶淵太宗時決溫縣滎澤頓丘泛於澶濮曹濟諸州東南流至彭城界即今徐州入於淮自此為河入淮之始真宗時決鄆及武定州尋溢滑澶濮曹鄆諸州邑浮於徐濟而東入淮仁宗時決開州館陶神宗時決冀州棗强大名州邑一合南清河以入淮一合北清河以入海南渡後河上流諸郡為金所據獨受河患其亡也始自開封北衛州決而入渦河南直壽亳蒙城懷逺之間元初決衛輝之新鄉開封之陽武杞縣之蒲口滎澤之塔海莊歸德封丘諸界其時專議疏塞而已自至元二十六年開㑹通河以通運道而河遂與運相終始矣蓋至元以前河自為河治之猶易至元以後河即兼運治河必先保運故治之較難至正初河決白茅金堤等處瀕河郡邑皆罹水患水勢北侵安山沿入㑹通河延袤濟南河間將壞兩漕司鹽場用都漕運使賈魯言挽河使東行以復故道五月功成命翰林學士歐陽𤣥製平河碑文並作河防記略其法制工用為世取法明洪武元年河決曹州雙河口二十五年河決原武㑹通河淤河自洪武中決陽武東經開封城北五里又南行至項城經潁上東至夀州正陽鎮全入於淮故道遂淤至永樂時歲為決徙修築隄防民困國敝至九年決益甚議濬黃河故道尚書宋禮加濬㑹通河用老人白英計改從南旺分水遏汶北合漳衛遏泗南入沂淮其北道魏家灣與土河相連開二小河以泄之有溝渠於衛東北岸通黃河可直至海豐者如舊其南道在南旺之北者開新河自汶上袁家口左徙二十里至壽張之沙灣接舊河以免陸運之艱侍郎金純導河支流從汴城金龍口至塌場仍合㑹通河以入淮漕事定於是運必借黃欲通運不得不先治黃也正統十三年河決新城八柳樹漫流山東經曹濮衝張秋潰沙灣東堤奪濟汶入海路以去諸水俱泄壞民廬無算景泰三年又大決沙灣近河地皆沒翰林侍講徐有貞承命以都御史往治之作制水之閘疏水之渠而河流之旁出不順者則堰之水遂不東衝沙灣更北出而濟漕渠之涸𢎞治三年決陽武河自原武中牟分流為三其大者切近汴堤西北隅合沁河泛陽武封丘祥符陳留杞縣蘭陽儀封考城曹縣寧睢歸虞永夏碭蕭而下徐淮其次者橫流封丘之于家集決孫家口漫長垣曹濮鄆城陽榖夀張東昌至臨清下衛河延患於德滄與青縣靜海天津始入於海又其次者自中牟南下尉氏雖稍成川不通舟楫至其故道自汴城西南杏花營入渦河者則淤澱矣侍郎白昻治之河倐北徙去汴城三十里金龍決口自淤昻乃築北堤以防張秋之衝激衛諸郡之泛濫𨗳南河自原武中牟下南頓至潁州由塗山達於鳯陽故道合淮以入海又於東平州戴家廟及德州之南一帶多鑿裏河每河口各建減水閘以節運河之水盈則泄之海而東兖德滄之患紓縮則蓄之河而漕艘商舶之行利隨河修堤二千餘里隨堤植桞百萬餘株又濬萊蕪諸泉二百八十餘處以濟漕河南塞決口三十六疏月河十餘使由河入汴汴入睢睢入泗泗入淮以達於海又以河南入淮非正道恐不能容復自魚臺歷德州至吳橋修古河堤自東平北至興濟鑿小河十二道引水入大清河及古黃河以入海𢎞治五年決張秋入漕河與汶水合僉都御史劉大夏治之謂宜疏治上流黃陵岡孫家渡工方興而復決張秋東堤百丈漕舟一經決口挽力數倍稍失手輒覆溺時訛言沸騰疑河不可治應復元海運大夏於西岸稍南鑿月河長三里許引舟次第以濟嵗運不失及冬水落始為塞決計乃親行相視潰決之源於孫家渡口開七十餘里濬祥符四府營淤河二十餘里以達淮疏賈魯舊河四十餘里由曹縣糧道口出徐州運河支流既分水勢漸殺為築兩長堤蹙水南下由徐淮故道自武陵屬之碭沛凡三百六十里曰太行堤自金龍口起于家店及銅瓦箱東橋抵小宋渠凡百六十里曰新堤又以兩堤綿逺河或失守必復至張秋為漕患相地於舊決之南一里許為減水壩以殺衝齧自春徂夏張秋之決塞賜名安平鎮九年考城縣境東來水勢徑衝賈魯河曹縣梁靖口水溢大堤遂於賈魯河東岸築小隄以護之正德四年河決曹單八年復決黃陵岡嘉靖六年決曹單城武楊家口衝雞鳴臺阻運尤甚下廷臣議刑部尚書胡世寧疏言河自經汴以來新舊分疏六道皆入漕河而總南入於淮今聞諸道皆塞止存沛縣一道當因故道而分疏之若運道則宜於昭陽湖東岸獨山新安社等處擇其土堅無石之處另開新河一道南接留城北接沙河口二處舊河應止百四十里隔出昭陽湖在外以為河流漫散之區是則所謂不與水爭地者七年後決徐沛漕渠不通詔舉才幹大臣治之衆推御史盛應期奉命單車就道親詣相度乃請疏趙皮寨以殺河勢𨗳之亳泗歸宿以入淮别開昭陽湖左新渠一百四十餘里以通漕垂成謗興詔罷役奪職嘉靖十二年河決亳泗歸宿等處淤濟寧至徐沛數百里運道命劉天和督浚時議紛紜或謂引黃河便或謂浚漕河便天和躬親相度自趙皮寨東流故道淤一百二十餘里而至梁靖又自梁靖岔河口東流故道淤二百七十餘里始至榖亭遂定計用浚河扒浚南旺淤淺以免盤剝築曹單長堤以防衝決植栁株以護堤岸浚月河以備霖潦建減水閘以司蓄泄置順水壩以束漫流運道暫復十九年決睢州野雞岡經渦入淮二洪大涸命侍郎王以旗督理以旗特言所資河者以濟運也河今南徙第疏山東諸泉入之洪沛以南障之堤如㑹通河制運即通矣於是開李景髙支河一道引水出徐濟洪八月而成三十一年決房村三十七年河北徙新集淤而為陸者二百五十餘里視故道髙三丈有竒河分流弱離為十一河南山東徐邳皆苦之四十四年河決以南京刑部尚書朱衡僉都御史潘季馴協治之既至舟行樹杪力無所施得鄒縣章時鸞新渠規度遂開新渠舊渠之東湖曰昭陽河從西來匯之其勢遂絶渠而左故舊渠不可復而新渠在湖之東河即橫決得湖而止乃決䇿往廬於河畔撫循十萬衆與同甘苦明年新渠成南陽至留城百四十里疏舊渠留城至境山五十三里隆慶元年開廣秦溝以通運道先是河決沛縣議者欲復古道從事於新集郭貫樓諸處上源衡言上源之議可罷惟廣開秦溝使下流通行修築長堤以防奔潰乃鑿舊渠深廣之為閘八減水閘二十壩十二堤三萬五千二百八十丈石堤三十里旱則資以濟漕潦則泄之昭陽湖運道盡通是名夏鎮河於是河專由秦溝入洪夏五月山水驟漲衝坍薛河石壩壞糧艘議復譁然給諌吳時來言舊河不必議惟新河所受上源山水宜亟疏濬仍詔衡區處遂經理挑築薛河沙河各支河堤壩以資蓄泄運道俱由新河矣隆慶三年河水溢自清河抵淮安城西淤者三十餘里決方信二壩出海平地水深丈餘寶應湖堤崩壞山東莒郯諸處水溢從沂河直河入邳州山東巡撫洪朝選疏言黃河出口之處必多然後可容其萬里逺來之勢請開支河以為宣泄利導之方四年河決邳州自睢寧白浪淺至宿遷小河口淤百八十里溺死漕卒千人失米二十餘萬石總督翁大立言邇來黃河之患不在河南山東豐沛而專在徐邳故先欲開泇口河以逺河勢開蕭縣河以殺河流詔令大立躬自相度條其利害以聞復上疏言治邳河閼阻之䇿有三一開泇河一就新衝一復古道五年河決雙溝北決油房曹家青羊諸口南決關家曲頭集馬家淺閻家張擺渡王家房家白浪淺諸口凡十一枝流既散幹流遂微乃淤自匙頭灣八十里而河變又極矣議者欲棄幹河而行舟於曲頭集大枝間冬初水落則幹巳平沙而枝復阻淺遂欲棄黃河運而紛紛及於膠河泇河海運乃復起潘季馴開匙頭灣塞十二口大疏八十里故道漸復已而以漕舟壞被劾去六年河決邳州運道阻朱衡於茶城南北築兩隄以防河水之出入北堤自磨臍溝迄邳州之直河南堤自離林鋪迄宿遷之小河口各延袤三百七十里運艘束於河流設軍民守之河流乃安萬歷元年黃河水平先是運道多梗户科賈三近小試海運至山東即墨縣福島異常風雨壞糧船七隻哨船三隻漂沒糧米五千石淹死運丁五名隨罷海運專行河運二年黃河沙淤海口決房村傅希摯議開泇河不果行三年河從崔鎮等口北決淮從髙家堰東決徐邳以下至淮南北漂沒千里總漕吳桂芳上言淮揚洪潦萬民號泣蓋由濵海汊港歲久道堙入海惟恃雲梯一徑至海擁橫流盡成泥溢鹽安髙寶遂不可收拾矣國家轉運惟知急漕而不暇急民故朝廷設官亦主治河而不知治海請另設一官專疏海道講求捷徑如草灣及老黃河皆趣海不必專事雲梯為便又上言今日之河雲梯關塞而不通髙家堰通而不塞兩者為病蓋髙堰決則淮水東黃水隨躡其後清口塞而堰內皆住址陸地其泄不及清口之半故泗州之水并聚矣塞髙堰所以通清口而泄泗州之水也又髙堰塞黃浦上游則黃浦之工自易黃浦既塞則興寶鹽城田地盡出自茲兩河橫流涓滴皆由正道千里之內民業可安海口河身日見深刷亦可免壅潰之患矣六年復起潘季馴時髙堰崔鎮決口猶然未塞運道沮梗議者謂諸缺口當勿塞别開支河殺水而浚海口以通之季馴則謂海口潮汐往來隨浚而亦隨淤惟導河以歸之海則導河即以浚海而導河未易以人力惟慎固隄防使無旁決水入地益深則治防即以導河也若令河決土流固宜用疏今下流之決但欲其疾赴海而害祛豈必疏哉於是築堤堰自徐抵淮六百餘里南北兩堤淮水畢趨清口㑹大河入海二口不浚得通十五年命張居敬踏勘黃河時河漫流開封封丘縣及東明長垣等處禮科王士性言宜復河故道居敬謂故道難復議開柴家營支河尋諸決口皆塞而淤者復疏十六年復起潘季馴督理河道十九年泗州大水淮水泛起髙於城溺人無算季馴上言人欲棄舊為新臣謂故道必不可失人欲支分以殺其勢臣謂濁流必不可分霖雨水漲久當自消季馴三仕三已一以求故道築堤束水偕水衝沙為主是年有條議河道疏一放水淤平內地一接築遙堤一增支渠大堤一增砌石堤一浚河避湖諸事並於運道民生有利二十三年泗水為患總河楊一魁疏言分黃導淮明年開桃源黃壩新河自黃家觜起至五港灌口止分泄黃水入海以抑黃强闢清口沙七里建武家墩涇河閘泄淮水由永濟河達涇河下射陽湖入海又建髙良澗減水石閘子嬰溝周家橋減水石閘泄淮水一由岔河下涇一由草子湖寶應湖下子嬰溝俱通廣洋湖入海二十五年河大決單縣之黃堌口溢於夏邑永城經宿之符離橋出宿遷新河口入大河二洪告涸楊一魁大挑李吉口以挽黃流謂黃堌口深淵難塞議浚小浮橋築小河口功成東利運尋久旱運河澀而河又決義安東壩一魁乃議浚黃堌口及上歸灣活觜以受黃水救小浮橋泗上之涸因繪河圖上言謂小浮橋股引之水李吉言未斷之流已足濟運以汶泗沂兖之水建閘節宣運道自裕何必殫力決塞以回全河而用之哉三十年于黃家口漲衝魚單豐沛三十一年特用李化龍遍行淮徐鳯泗間得前所開泇河遺跡喟然興歎遂專力浚成之於是運艘通行昔稱過洪今稱過淮為出險矣按開泇之議始自隆慶年間中丞翁大立萬歷三年中丞傅希摯建議詳明未得允行二十年中丞舒應龍於韓家莊引湖水注之泇始啓厥緒二十六年中丞劉東星鑿侯家灣梁城通泇口遂可行舟然總未能通達至是始共贊成出竒道以避至險迄今運道無阻開泇之功蓋亦偉哉然東南之漕自清江浦出口由清河溯桃源經宿遷從董溝口入駱馬湖而抵泇河尚有一百八十里假道於黃河雖河伯安瀾不受其害不可謂非黃與運究相終始也然則治黃者固先保運而利運者不尤急於治黃也哉天啓六年總河李從心以運舟過宿遷淺劉口磨兒莊等處一船挽拽夫以百計一夫工費動以數錢窮旗典鬻以償官夫人力與水爭衡䉡纜中斷前船橫下後船互相磕撞官儲民命須臾歸之逝波風急浪髙竟日不能移一舟前阻後壓千艘等待乃自馬頰口起下至陳瑶溝止另挑一河計程六十七里運船改從陳口諸溜逺避公私幫拽之費遂省漂蕩磕撞之虞亦遂以杜崇禎八年駱馬湖淤泇河運道中阻總河劉榮嗣自宿遷至徐州别鑿新河分黃水注之通運計二百餘里費五十萬其鑿處皆河故道尺許下皆沙挑掘成河沙落河坎數四引黃水注之沙隨水下為淺為澀明年漕至駱馬湖之淤適平仍專行泇河榮嗣被逮然駱馬湖間淤此河亦可行舟其功不容盡泯漕運一河泇河以南勢不得不借黃以達淮而閘河以內茍一近黃未有不受其害者故避之務逺防之務至即使黃流水大不得巳為減水之䇿亦宜疏之使南不宜逼之使北也運河經宿遷入董家口由駱馬湖進泇河此開泇後初制也後因淺劉口磨兒莊等諸溜水急壞舟改從陳家口進駱馬湖及至駱馬湖淤劉榮嗣遂有别鑿新河之舉而究無成功是駱馬湖乃必經之要路也邇年黃河身髙黃水倒灌駱馬湖每至淤淺議者必將别開一河以達泇河始得避駱馬之淤恆謂莫若即於駱馬湖東岸近馬陵山腳隔出一河設閘以司啓閉使黃水之沙不得倒灌而入則永久可無淺淤之患但恐需費浩繁猶之泇河未成之先格而難行耳并識臆見以備采擇山東全河備考行水金鑑卷一百五十八
