body:
  text: 行水金鑑巻一百六十江南按察使傅澤洪撰兩河總説余闕曰南方之地本髙於北河之南徙難而北徙易自宋南渡至今殆二百年而河旋北議者慮河之北則㑹通之漕廢當築隄起曹南訖嘉祥東西三百里以障遏之不使之北予則以爲河北而㑹通之漕不廢何也漕以汶而不以河也渭按此言正與挽河之議相左蓋河在梁衛之郊北流爲順其曰南徙難而北徙易是也謂河北而㑹通之漕不廢則大非明中葉河屢貫㑹通挾其水以入海而運道淤河不可北也嚮使河北而無害於漕則聽其直衝張秋東北入海數百年可以無患奚必歳歳勞費防其北決邪邵國賢治河論以為禹治水至於地平天成六府三事允治其功盛矣以今觀之其所空之地甚廣所處之勢甚易所求之效甚小今治水者其去禹也逺而所空之地乃狹於禹所處之勢乃難於禹所求之功乃大於禹禹𨗳河自大伾以下分播合同隨其所之而疏之不與争利故水得其性而無衝決之患今夫一杯之水舉而注之地必得方尺乃能容之其勢然也河自大伾以上水之在杯者也大伾以下水之在地者也以在地之水而欲拘束周旋如在杯之水大禹不能而况他人乎今河南山東郡縣棊布星列官亭民舍相比而居凡禹之所空以與水者今皆為吾有蓋吾無容水之地而非水據吾之地也固宜其有衝決之患也故曰所空之地狹于禹禹之治水隨地施功無所拘礙今北有臨清中有濟寧南有徐州皆轉漕要路而大梁在西南又宗藩所在左顧右盼動則掣肘使水有知尚不能使之必隨吾意况水無情物也其能委蛇曲折以濟吾事哉故曰所處之勢難于禹况禹之治水去其墊溺之害而已此外無求焉今則賴之以漕不及汴矣又恐壊臨清也不及臨清矣又恐壊濟寧也不及濟寧矣又恐壊徐州也使皆無壊也又恐漕渠不足於運也了是數者而後謂之治故曰所求之功大於禹由其言觀之則河水南趨之勢已極而一代之臣不過補苴罅漏以塞目前之責安望其爲斯民計百世長利哉袁黄曰昔陳平江瑄宋司空禮之治㑹通河也驅汶水逆流至南旺北至安民山地降九十尺因析六分之水北達臨清爲閘十有七南至沽頭地降百十有六尺因析四分之水南接徐沛爲閘二十有一貯六分之水者其閘長貯四分之水者其閘短後人以意増損而水之分數紊矣紊而常淤固其宜也顧不此之察乃更閘而東焉當時故閘由茶山而南地甚峻勢如建瓴故入河無礙後更夏鎮以南地平而水緩黄强清弱每㑹必淤此河渠之一壊也徐州呂梁二洪其流甚駛其石如牙永樂間運道初開人惡其傷舟欲稍平之宋司空不可蓋欲藉山之險激水之流使泥沙先下而河流不壅後人相繼磨其崖石而呂梁無洪矣無洪則水平而河身漸髙此河渠之再壊也至淮河入海之處平曠無山而海沙逆上尤易壅塞陳平江就山陽之滿浦坊在淮安府城累西北五里石爲山蜿蜒千尺即古鋸牙遺制鋸牙見宋史水得翻騰踴躍以入海俗謂之磯嘴取相激而名今皆没於土中此河渠之三壊也磯觜之制下布七星樁樁上甃以石石有筍筍相入縫有錠錠三層灌以糯汁砌以油灰長千尺袁氏以爲陳平江所創或云天順間遣都水郎中督工於滿浦坊作石鋸牙未知孰是磯觜爲治河要䇿萬歴初漫入水中微露形跡今清江浦尚有之其濁流不入運河河不勞挑濬者磯觜之力也河渠考云隆慶四年淮決於髙堰河亦決於崔鎭漕臣王宗沭修塞之宗沭決河記云是年淮決髙堰河躡淮後徑趨大澗口破寳應黄浦口入射陽湖清口遂淤海口幾爲平陸萬歴三年髙堰復決於是山鹽髙寳興泰諸處悉爲巨浸黄水躡淮之後濁流西溢浸及鳯泗清口填淤海口亦復阻塞而漕黄交病矣河臣潘季馴以爲髙堰者淮揚之門户而黄淮之關鍵也欲𨗳河以入海勢必藉淮以刷沙淮水南決則濁流停滯清口亦堙河必決溢上流水行平地而邳徐鳯泗不免皆爲巨浸是淮病而黄病黄病而漕亦病相因之勢也於是築髙堰長八十里起自武家墩任髙堰北十餘里經大小澗大澗在髙堰南十三里又南五里即小澗也大澗口爲衝決要處築石隄以䕶之長數百丈歴阜陵湖在堰西南二十餘里周家橋北去堰四十餘里翟壩在周家橋南二十餘里爲山陽盱眙接界處或曰周橋翟壩長二十五里與髙郵南北金門兩閘及西隄四十里石工相對周橋翟壩決則髙郵南北衝溢無時矣以捍淮之東侵又以淮水北岸有王簡張福二口淮水每從此洩入黄河致淮水力分而清口淤淺且黄水泛漲亦往往由此倒灌入淮於是并築隄捍之隄在清口西三里後議者又以束淮太廹於張福隄窪處黄韶王簡二口置減水二閘淮溢則縱之外出黄溢則遏其内侵王簡口亦曰王家口使淮無所出黄無所入全淮畢趨清口㑹黄以入海而河與漕俱治蓋髙堰之築始於漢末之陳登修治於明初之陳瑄而復於季馴云隆慶四年王宗沐修築髙堰卑薄無所加隨即圮壊至是經理始盡制焉二十一年淮復決於髙良澗在淮安府西南七十里志云九十里凡二十二口旋築塞之明年黄水大漲清口沙墊阻遏淮水不能東下於是挾上源阜陵諸湖與山溪之水暴侵泗州陵州城渰没科臣張企程請導淮分注江海以救祖陵二十三年淮復決髙堰髙良澗諸處㝷築塞之明年河臣楊一魁以黄淮衝溢乃議分黄𨗳淮闢清口沙七里達淮之經流建武家墩涇河閘涇河在寳應縣北三十里以洩淮之旁溢又建髙良澗減水石閘子嬰溝在寳應南六十里周家橋減水石閘一自岔河下涇河一自草子湖在寳應縣西南五十里寳應湖下子嬰溝俱通廣洋湖在寳應縣東南四十里及射陽湖入海猶慮淮水宣洩不及南注各湖為患又開髙郵西南之茆塘港在州西南六十里通邵伯湖開金家灣下芒稻河在揚州府東三十里入江以殺淮漲一魁所舉行大抵本企程之説自是淮患漸平雖時有決溢而培固髙堰増置壩閘之外無所爲治淮長䇿矣季馴兩河議曰髙堰去寳應髙丈八尺有竒去髙郵髙二丈二尺有竒髙寳隄去興化泰州田髙丈許或八九尺其去堰不啻卑三丈有竒矣昔人築堰使淮不南下而北趨者亦因勢而𨗳之不然淮一南下因三丈餘之地勢灌千里之平原安得有淮南數郡儼然一都㑹邪萬歴二十一年淮漫髙堰隄上且數尺周家橋口原自通行又加決焉決髙良澗至七十餘丈南奔之勢若倒海髙寳邵伯諸湖隄一日崩者百十餘處于時泗城亦復灌溢而所減之水不過尺許則以淮南之地自髙寳而東則下由邵伯而南則又昻自興鹽以東濵海諸鹽場比内地亦復昻也泗州之地比髙堰爲下與髙寳諸州縣皆若釡底然安能免淮之浸哉今髙堰一帶修守不嚴奸商鹽販之徒無日不爲盜決計泗州之人未究利害之源但見髙堰増築勢必遏淮以入泗惟恐堰之不速潰也且淮之旁流日多則正流日弱於是刷沙無力而黄水益横清口就淤勢不得不倒灌淮南決隄堰而敗城郭委運道於茫無畔岸中矣善乎先哲之言曰禦黄如禦敵淮日退則黄日進論者以𨗳淮為秘計而不察其為弱淮之先徴也淮之患曷有窮已耶元末河復北徙自東明曹濮下及濟寧而運道壊明洪武初命徐達自曹州東引河至魚臺入泗以通運永樂九年又命宋禮自曹疏河經濮州東北入㑹通河是北流猶未絶也迨遷都之後仰給於㑹通者重始畏河之北北即塞之𢎞治中兩決金龍口直衝張秋議者為漕計遂築斷黄陵岡支渠而北流於是永絶始以清口一綫受萬里長河之水焦弱侯云明興河之自汴出者猶有六其二入淮其四合漕以入於淮出滎澤者至壽入淮出祥符者至懐逺入淮出長垣者至陽榖入漕出曹州者至魚臺入漕出儀封者至徐之小浮橋入漕出沛之南者從飛雲橋入漕出徐沛之中境山之北者從溜溝入漕是猶有禹分之遺意也其後或塞或徙而以一徐受全河之灌矣陽武以下河之所經繕完故隄増卑培薄但期不害於漕而漢之下䇿轉為明之上䇿矣至於黄淮既合則惟以堰閘為務堰髙家堰閘淮南諸湖閘口因時修固則淮不南分助河刷黄使海口無壅故潘尚書論治河之要曰河性宜合不宜分宜急不宜緩合則流急急則蕩滌而河深分則流緩緩則停滯而沙淤此以隄束水借水攻沙為以水治水之良法也又曰通漕於河則治河即以治漕㑹河於淮則治淮即以治河合河淮而同入於海則治河淮即以治海自漢以來治河者莫不以分水爲長䇿唯張戎之論不然潘公深得其意觀其所言若無赫赫之功然百餘年來治河之善卒未有如潘公者蓋㑹通必不可廢則河唯宜注淮以入海雖有賈魯之才智亦無所施故邵文莊有治之以不治乃所以深治之之說語曰守病不治常得中醫此之謂也禹貢錐指自周定王時河徙歴漢唐至宋熈寧十年而始與淮合河曷為徙也中髙者外溢流緩者沙停水性下也地勢北髙而南下也上流急下流淤不決不得也決不南不得也合于淮奈何曰昔之淮敵河今之淮從河敵河而淮强從河而淮弱淮强而流迅淮弱而沙壅必致之勢也武陟之決口塞矣乎河底之髙皆是也淤不滌流不暢将别有潰決之處可憂也於是有斷黄右臂之法有助淮刷黄之法沁水之入黄也黄益熾非古也沁水古入衛者也隋大業七年始引入黄征髙麗恐河不能濟運引沁水以大其勢故也河之南徙也沁仍入衞矣天順間沁再入河無制之者也今莫若仍引沁水入衞以殺黄勢或疑衞不能容今日而不能容大業天順獨能容耶夫誠能分沁水使不入黄則黄之右臂斷矣睢水受商邱寧陵永城夏邑豐碭虹靈璧無源之水從宿遷白洋河小河口入黄前人防其入淮築歸仁隄以捍之順治時河決入小河口而白洋河入黄之道遂淤靳文襄開便民閘𨗳之入淮淮不能容而旁洩六壩遂為髙寳興泰七邑之災張文端建安仁利仁諸閘束水入黄去白洋河小河口僅數里地勢髙仰不能入河今莫若相形勢開引河使永逺入黄水小則助淮出清口以刷黄水大則清口以上淮不能刷沙睢為之刷是謂助淮刷黄之法右臂斷安豫也黄沙刷又淮也曷爲必於斯二者復故道不能行築隄坊不可恃鮑斐英治河説河源出土番有泉百餘泓望之如列星是為星宿海我聖祖仁皇帝上諭有云朕於地理從幼留心凡古今山川名號必詳考圖籍詢問方言務得其正如河源之星宿海元史謂之鄂端諾爾今番名鄂端塔拉䝉古名呼喇穆爾譯語皆星宿海之字耳至哉王言廣見博聞信而有徴矣東流三百里羣川流合浸大遂名黄河又東六七百里至崑崙山山綿亘五萬里河隨山足而東又東北流千餘里有細黄河自西南來注之又東北四五百里至西寧衞之西南又四百餘里至積石山即禹貢𨗳河之處矣由積石山入塞經陜西臨洮府河州北西寧衛南又東經蘭州北又東經寧夏衞南又東北出塞外經三受降城之南河套之北又經榆林衞北至山西廢東勝州復折而南入塞内南經延安府府谷縣東神朩縣南而入葭州界又經州城東河之東岸為山西河曲縣及保徳州興縣之境又東經呉堡縣東及綏徳州東河之東岸爲山西臨縣及永寧州寕鄉縣之境又南經清澗縣東及延川延長二縣之東河之東岸為山西石樓及永和大寧三縣之西境又經宜川縣東河之東岸為山西吉州及鄉寧縣之西境又南經陜西西安府韓城縣東龍門在焉自龍門南流與汾水合又南經陜西郃陽縣東河之東岸為山西滎河縣臨晉縣又南經陜西朝邑縣東又南至華隂縣東北與渭水合河之東岸為山西蒲州又南經雷首山西至潼關衞北折而東是為河曲經河南陜州之閿鄉縣北又東經靈寳縣北河之北岸為山西芮城縣又東經陜州北河之