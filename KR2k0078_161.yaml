body:
  text: 行水金鑑卷一百六十一江南按察使傅澤洪撰兩河總説康熙二十三年五月十九日早出河署起行過龍汪閘西北行至惠濟祠過河又西北行六七里至清河縣東大王廟西玊皇閣險掃工二百餘丈隔岸清口相去五六里此段河形自西北而南也從新縷隄西行二十二里即清桃交界此三十里乃一大灣沿河栁樹最盛又八里至三岔有月隄不甚險又從西北行數里有三義廟舊壩從新隄西北行二三里有大王廟舊決口內尚有積水六七里至黃家觜宿二十日從黃家觜縷隄西北行有支河小壩二里許至七里溝舊決口南壩尾新險工二里西北行至雞觜壩又西行十五里即上渡口挑水壩過劉家莊外新險工徐升減水小壩對岸即桃源縣又西北隄行二十里下隄沿河走十里至崔鎮又沿河西行數里至九里岡險掃工有一百八九十丈水東北頂衝下有挑水壩從此西南行十五里至古城有髙土岡有宿桃界碑近河止百步有黑土堆髙丈餘攩水是日宿古城二十一日從古城隄上西行二三里南行四五里對岸即白洋河西北行五六里北行七八里至溫州隄隄有七十丈內有舊遙隄直至朱家堂又西北行四五里至楊家莊南壩壩外南有撑隄二道北有撑隄一道隄往西北越出五六里即楊家莊掃工外有舊北壩掃臺攩水甚有力從此一帶臨河縷隄至朱家堂石壩北首止又有減水朩壩繞隄外百餘丈雖有是壩水難泄也又北行七里過蕭家渡舊決口內有積水又北三四里即宿遷縣西門沿隄城內外窪處有水臨隄略北行有岡繞岡北行五里許即攔馬河減水壩六座兩頭新添朩工中四座俱磚石工中間矮橋流水頗急自駱馬湖至此兩邊皆係土岡不怕旁決極善但水減至縣東湖今有淤塞之象恐後來難泄也宿遷縣宿二十二日從宿遷縣城西下灘陂沿河西行五里許此處黃河寬有二百餘丈東北即駱馬湖又三里許大王廟即舊日運道也駱馬湖口今巳淤墊若水漲即連之其湖有六七十里寬八十里長水從西南流入攔馬壩歸東湖合沂水等出海共西行十六里至支河口兩邊始有隄內有舊遙隄上即張家莊也從壩西北行中間離河寬狹不等二十五里至皂河石磡南行二百餘丈皂河口有兩岸直隄從大灘坡西北行七八里復上隄此隄從石磡起東北行三四里漸轉西南數里即邳宿界內有朱家灣河形一大兜將成險工復西行舊直河向北近運河隄岸轉西北即青墩營樁工三百丈又西行五里許隄外有三官堂樁工外有灘坡有積水從此西北有五工頭董家堂二險工共行三十餘里至邳州宿是日亭午蒸熱隄草長蔓難行從東隄看至羊祐山一望煙光紅日西沈逺山村落荒城漫水俱堪入畫朱家灣即今朱家海巳早見及此二十三日從羊祐山直隄行西南五里許復西行至青羊山其河勢從此山直東略南衝南岸象山繞而西北頂衝堂池險工從東南去折回東北即董家堂險工也由山坡西行過劉家寨馬家山涵洞皆南北直隄過交龍山下至鳯凰山陳家樓宿枕上因想涵洞旁開一小河引水定可救百頃之田二十四日從陳家樓西北行黃家山窩過直隄繞鯉魚山西至廟山下約二十里過鯉魚險工隄西北行徐州界復西行花山決口龎山下又西北行至吕梁城小憩內過盧家山趙家樓樓有八九座山村之最盛者薄暮遊石屋山懸水村登鳯冠山山有孔子碑象禹王廟復穿城回寓二十五日從吕梁豐山口迤西北過一帶峰頭及邢家莊尖頭山米山約七八里河形從吕梁往西南繞至腳下至張家橋河身漸近此一灣比前稍大河甚濶內有天生壩隄九十丈又西北行望見出頭山王家山約八里至長樊大壩險掃工內有遙隄從出頭山起西北接玖山又從大壩西北行過一帶長山煙墩土山寺邢家莊狼矢溝獅子山駱駝山隄外華家樓又北至子房山上有留侯祠石公殿來鶴亭臨池塢下小民隄至館驛渡河對徐州東門北有小子隄接平山口自子房山迤西北隄共一千三四百丈接陡山口再東九里山東南蘇山大谷山是日宿徐州東門二十六日從徐州東門石隄繞西北舊隄至九里溝對過南門外有雲龍山户部山此山來龍從湖廣發脈由西南來中有亞夫塜即繫馬臺北岸對蘇家山又西行十八里至霸王墓户部山下有季札挂劍臺南門外有王陵母墓三里至黃家山再西行十五里至蕭縣界又略西北十里李曲集十八里至北辰集宿南去千山萬山不知幾許隄外離河頗逺灣曲不少近河處有徐家樓侯家樓薛家灣孔家店賈家廟等處即三大灣之始也二十七日隄上西北行三十里順河集又三十里碭山界又西行十里南行二十里至毛城鋪宿此處黃河離隄頗逺灣子亦甚大二十八日從毛城鋪從隄上帶西北行二十里朱家店又四十里至河南虞城縣界又數里小喬家集宿河離隄甚逺外有清水套甚長大離交界二十里內有月隄三里許二十九日西行隄上十餘里有舊決水套舊隄坍毁從新隄西南灣至西北約五里又從縷隄行內有月隄二道直隄四道共三十里下隄南行六七里劉家集隄頗逺即從隄內西南行二十里至虞城縣西門宿六月初一日從虞城縣西北行數里上隄西行數里南行二三里又西北行數里又西行數里劉家口即商邱交界處一帶縷隄月隄新舊隄錯落不等栁陰蔽天居民稠密又帶西北隄二十里兩邊栁樹頗盛亦有月隄廢隄又西行三里南行五里宿潘家口初二日天氣熱甚暫憩一日商邱在府城西南三里髙百尺周二百步邱之精氣上應列星世稱閼臺栁河在縣南三十里自汴河東流入於永城經清河口達於淮巴河在縣北二十里今名果河流入徐達於淮泗以濟漕運睢河在縣北一里漢帝輅車入榖泗及睢水之處白河在縣南五里源自歸德馬牧分流於永城達於小河口澮河在縣南二十里自亳州徑流入蒙城達於淮孟瀦澤在縣西北四十里禹貢所謂𨗳菏澤被孟瀦是也汴河故道今涸初三日從潘家口北行三里上隄西行五里邢家樓又北行五六里至辛集又數里傅家莊險工離河八丈又楊家塘至考城縣界一里至鐡佛寺離河二里又九里至小顔家集臨河有大顔家集又隄西行過郝家樓嶽家樓宿考城縣東門初四日從考城縣東門外上隄西行十里過石家莊六里下隄行里許石家樓隄離河數十丈有大灣內有月隄兩道直隄一道此處即儀封縣界又西北行半里許上月隄又五里趙家莊過此縷隄直西行矣下隄南行四五里宿儀封縣西門黃陵岡河在縣東北五十里巴河縣南八里賈魯河去黃陵岡二里龎家河縣北八里黃陵岡縣東北六十里堌陽鄉髙數丈周數百步曹魏所築明帝葬此為黃河通塞要害初五日從儀封縣西北行五六里上隄西行七八里至蘭陽儀封交界又西南行數里至蘭陽縣自儀封繞隄行約三十五里至蔡家水口耿家水口梁家水口管家水口數里至河集又數里至陳留蘭陽交界是日宿曲興集初六日五更西北行七八里大王廟上隄數里祥符陳留交界十八里過掃頭集聞水聲甚響下隄東北行四五里至河涯見水滿平坡勢亦甚溜詢土人云陡長三四尺巳三日矣復上隄西南行至康家寨薑家莊四段舊水口又十里進開封府北門宿初七日連日苦旱熱極困疲難行初八日進謁河撫王諱日藻號即周係同鄉盤桓竟日十一日連日極熱難行將王撫軍所送豫省圖并各州縣呈送地圖按程布置繪成一圖其間名山古迹具載志書不及備録各水源流略志於此溱洧二水之源出密縣東北至新鄭合金眀池在開封府城西鄭門外西北周回九里餘周世宗鑿習水戰東門池在陳州城內東北隅滴􅅹泉在密縣天仙廟前石澗水出滴瀝如雨晝夜不息鴻溝在河隂縣東楚漢分界處北接廣武山與滎澤相連圃田澤中牟縣西北七里周職方豫州藪曰圃田其澤東西五十里南北二十六里西限長城東極官渡髙者可耕窪者成滙今為澤者八若東澤西澤之類為陂者三十有六若大灰小灰之類其實一圃田澤耳隋隄在杞縣北五里闕塞山在河南府城西南三十里左傳晉趙鞅納王使如寬守闕塞即此又名伊闕大禹疏龍門伊水出其間漢服虔謂南山伊闕是也一名龍門山唐白居易有龍門銘并序白石山澠池縣東北二十里澗水出焉陽城山登封縣東一名車嶺山洧水所出孟子曰禹避舜之子於陽城即此陽乾山在少室正南潁水所出一名耿山龍頭山永寧縣西四十里上有快風亭下有洛水五渡源出嵩縣太室東谷自山頂下流疏二十八浦過大潭中平廣多石其水瀠紆回流者五故名緣溪聚村稱五渡焉洛水源出陜西洛南縣冡嶺山東北流經盧氏永寧宜陽入嵩縣界去城南五里歷偃師至鞏縣北十里入河名洛口一名洛汭伊水源出盧氏縣悶頓嶺徑永寧宜陽入嵩縣界由伊闕而北轉折而東會洛水入於河商阿衡之得姓以此瀍水源出穀城山自髙廟溝起與九眼泉合東南流經孟津二十里始入嵩縣即山西北注而東南至縣復轉折而東行始逶迤而南入於洛澗水婁冢山西四十里曰白石山澗水出焉北流注於穀白石山在新安縣澗水徑七里橋南流轉東入洛穀水出嶓冢東流注於洛甘水源出宜陽縣孝水源出廆山之隂入澗水相傳晉王祥卧氷於此洛汭在鞏縣洛水入河之處清濁異流亦名什谷黃河在懷慶府城南七十里濟源之濝水入焉孟縣溴與沇入焉武陟沁水入焉濟瀆在濟源縣北三里許濟水出王屋山為沇水潛行地下平地發為二源注曰東源出原城東北西源出原城西今東源在濟瀆廟內西源即今所稱龍潭在廟西二里許溴水出濟源春秋會諸侯於溴梁即此其源有三一出五指山紙坊一出曲陽西南二源俱流經修武縣治南一出晉陽城南溪或斷或續至莽山雙泉寨發源為白澗水又伏發源修武縣治西又東南流經城南與二源合水經注曰溴出原城西北原山勳掌谷按白澗自莽山來或呼莽河沁水在懷慶府城北二里源出沁州謁戾山出枋口附郡城東南流徑武陟入黃河乘髙瀉浪瀑漲不常丹水在懷慶府東北十里源出髙平縣山海經曰沁水之東有林焉名曰丹林丹水出焉預河即小丹河由修武縣南門外東流至獲嘉入衛河漕運水淺則藉以濟運天漿水在濟源縣東南二十里水有二源東北合為一川入於溴堯池水在府西北三十里太行山麓泉畔有堯廟廟前處處有泉掬手可飲滙而東南流葦荷交映可灌粳田二十里入於沁濝水源出王屋西山枋口在濟源縣東北二十五里沁水倚山回屈至此始長㵼平原亦謂之沁口載舟蕩漾使人胸次浩然山崖多唐宋鐫題望仙溪在濟西八十里源出王屋山北伏流南入於河錦溪源出濟源太乙池在濟源西天壇山上濟水出此大峪澗在濟源西七十里源發王屋山南入河東陽澗在濟源西一百四十里南流入河神農澗在溫縣境內相傳神農采藥至此以杖畫成澗廣濟河在五龍口即古枋口枋之義從朩司馬孚壘石為門水勢乘髙注下石門易崩渠旋淤塞河內令袁應泰鑿山穿洞懸閘於兩崖間啓閘受水閉閘障水永無崩塞之患曰廣濟河鑿山引水為渠由濟源孟縣河內溫縣武陟至唐郭入於黃河渠濶八丈長百五十里分永孟等二十四堰各有時刻勒石詳記溫泉有五一在開封府城東北一在偃師縣南一在嵩縣西一在澠池縣東一在新安縣西是夜大雨暑氣頓減十二日從開封府大街出西門西北行過土城斷隄棘針寨後堽上小長隄約三十里從隄西行隄外有彭家店段家莊即黑堽口復轉南三四里李盟寨大王廟蔣家寨又西北行二里許至堽舊大王廟此一帶河西來直衝一大灣寬有五六里漸注東南又西灣過黑堽工回龍閣至馬家寨又里許中牟縣交界一路隄岸雜亂河頗逺又行數里至杏樹鎮宿十三日從杏樹鎮西行上隄過小薛廟小潭溪此處曽衝決斷隄二三道河濶五六里過郝家寨磚寨原武土寨原武西寨即原武縣界又隄西行數里原武境隄有馮尚書大寨馬家渡俱離河數丈河濶七八里縷隄南行即鄭州界又西行四五里見村莊內築新隄隄外有官莊沿河十餘里即縷隄傍河面約有數里寬賈魯河舊河形在此今改在隄內又三里許至河邊花園寨宿是滎澤縣界矣十四日從花園寨下河灘西行三里許有淤窩不時坍土河身約四五里又行數里河更寬過滎澤縣南門其城即在河邊新隄在南向東接到賈魯河在隄內去縣南十里住北關看掃工有二百餘丈從栁園南行約數里上土山坡俱係低窪北望有東西兩土城云是楚漢二城中即鴻溝也過此即河隂縣界又行七八里至縣宿十五日從河隂縣西南行二十餘里至汜水縣界又五十里入汜水縣出西門度汜水過虎牢關又十五里鞏縣界洛河依北岸山根東北行入黃河有山一帶西去西望兩山夾水繞南山根沿河行甚灣曲也又行過二山澗有杜工部故里碑進縣東門出南門宿十六日從鞏縣上南山峪中行二十里即繞洛南行五里至黑石渡過洛河繞河行五里入偃師縣界南望嵩山煙雲縹眇峰巒秀拔層疊而南回顧土山大不同矣繞河西南行渡石梁橋山根曲折土窰連絡有寨有垜人家稠密此為孫家灣又四十里進偃師縣東門過二程夫子祠下馬進謁云過洛水南去二三里即二夫子故里出西門宿十七日從偃師縣西門外行五里許渡河即伊洛合流處東南行二十五里至登封縣界又二十餘里上嵩山石路崎嶇山巒環繞於東南西望蒼茫無際北望邙山逶迤遙映伊洛帶水林朩鬱茂再山髙處為萼嶺口視嵩峰羅列如立山岡之上稍西南御寨如屏列山上白雲起滅變態百狀從西南小路行數里至少林寺規模𢎞整惜漸坍圯又繞路看初祖面壁處復東南行每過髙岡看嵩山時時變幻即御寨亦愈出愈奇髙低逺近在在秀拔南望諸峰又如屏繞真奇觀也約二十里至登封縣東門宿十八日遊嵩嶽廟古樹參天廟模𢎞敞緑琉璃大殿新落成晤曹羽士問及興廢具言火患即大殿屢建屢燬因鼓興寫中流砥柱圖於北壁二十餘年後有嵩山道士來江南向人談及嶽廟向苦於火甲子年有松江周君過嵩適大殿新落成因寫中流砥柱圗於北壁自後火患遂息至今畫壁如新十九日至嵩陽書院耿先生諱介號逸菴由翰林不仕講學於此就學者甚衆書院對聮云道本中庸只是君臣父子夫婦昆弟朋友理豈髙逺須要博學審問慎思眀辨篤行二十日由登封縣舊路西北行過郭家十里鋪望見少林寺前一派平田又過二十里鋪漸漸登髙又五里至萼嶺口即登封偃師界下坡陡絶步行五六里始有坦道望嵩髙一帶之山宛似岑樓之朩也又五里至參駕店自萼嶺口以北俱是立土山岡山峪有深至數丈土峯壁立不可勝數又數里非舊路矣過分守關涉馬澗水至緱氏鎮出西門小憩鶴道觀聞轟轟雷聲狂風吹雨因急行十五里渡伊水又十里至翟家莊是洛陽第一大鎮店也宿劉雙槐家二十一日早起行十五里蒙正窰十里潘家寨十餘里過洛河從東上坡岸又數里至洛陽東門飯後熱甚即歇南門午後散步上邙山遊上清宫老君殿小小五間梁柱瓦俱用鐡鎔成後有玉皇閣翠雲洞下清宮邙山縣北五里郡之主山也古名郟山綿亘四百餘里起關中附二華而東層層起伏為狀不一隨地立石屹然峙河洛之中闕塞山縣正南二十五里郡之朝山也兩山相對望之若闕元魏胡太后崇信浮屠琢為佛像大小不可勝數二十二日南行里許過洛水四里又西去二里許林朩陰森處即邵康節先生安樂窩也下馬瞻謁又南去十里牆垣寬廣殿宇軒敞乃曹操葬關夫子處瞻拜出南行十里至伊闕有一石臺上有方池二丈餘池內有水珠上出臺邊涓涓不絶向三四處㵼下云旱潦不斷上有閣供大禹牌位前有小亭亭左右亦有流泉詢人云百果泉乃俗稱無考䅢南上石磴即賓暘洞共有三大石洞俱鑿大佛像外有僧舍檻臨伊水東岸石壁亦甚峭聳飯後衝熱再行風雨大作復回故道至寓宿上浮橋在縣西跨洛水上流即天津橋故處有中浮橋下浮橋皆跨洛水建焉二十三日西行過周公廟因甚早不得進謁三十五里至磁澗人家皆居堡寨窰洞澗水環繞於前人馬可涉又三十里至漢函谷關舊函谷關在靈寶此為新函谷關里許至新安縣東門訪芝泉書院係吕維祺維禧兄弟講學處午後大雨衣衫濕透山路泥滑難行三十里又過澗水至闕門店宿俗名鐡門瞻渚山縣東南二十一里淇水出其隂密山縣南十五里豪水出焉爛柯山縣西南三十五里王喬洞即此羣山秀錯佳朩繁密有清溪泄於山峽之間其石如爛朩取石塊剖開有樹葉痕亦物理之不可解者巖下有數洞內一洞深邃莫測相傳樵子王喬遇仙處鳯皇山縣西三十里與青龍山相對如闕澗水中流謂之闕門沙崖縣北五十五里羣山四拱中有似水自張家莊北流入黃河即馬陵川匡渡口縣北六十里黃河南岸一名狂口渡觀音磧縣北六十里黃河灘有巉石自南岸入河數十步壅遏水勢二十四日西行三十五里義昌驛十里千秋鎮十里擔泥鎮五里入澠池縣出西門過正學坊為眀理學諡靖修曹月川先生立又過盟會臺三十里下坡至土壕鎮宿馬頭山東北六十里穀水出焉廣陽山縣西二十里澠水出於此天池縣東南五十里橫潦無源鴻雁依焉唐太宗改澠池為天池二十五日從土壕鎮西南行二十里至石壕二十五里至峽石北首髙山為崤陵東南有金銀山南去髙峰疊出此一路上高嶺者五六過溪澗者二三上有石壁崚嶒下臨深溝百丈迎面髙峰不計其數路極寬廣好行然愈行愈髙矣至陜州界又從西北行二十里為張茅鎮路之最高處又二十五里磁鍾鎮從此漸漸下坡過橫渠堡路旁有魏野草堂碑再下進陜州東門城頗大內惟頺垣破屋瓦礫滿目荒涼為甚宿酒樓砥柱山城東四十里三門山在砥柱上流百餘武槖山州東九十里槖水出焉黃河自潼關流入陜境自西繞北至於砥柱東入澠界公主河在三門山之左唐開元中鑿河通漕以避三門之險百丈許復入河馬象河城東二十里水源自梨山流入於河槖水南門外一名永定澗出槖山西流入河其水暴悍益以山澗諸水甚為民害鐡牛城黃河中頭南尾北世傳禹鑄以鎮河患二十六日出陜州東門北行上高坡十五里會興頭又東北行上土岡極險峻陡絶難行下馬步行下坡二十餘里復上坡陡峻更甚沿河行數里初兩岸皆土山至此漸見石山其巖峭拔水勢曲折洶湧上石坡二里許見中流立大石一塊水從南入繞東北流為鬼門中一道西流為神門北一道為人門皆衝激雷鳴南岸多石巖有一巖壁立甚峭上鑿峭壁雄流四大字旁有三行小字識年月人名真鬼斧神工也東去百步外又有立石三塊又有大小四峰如柱南離數丈有小石亦立兩岸石山俱極雄壯洵稱大觀步行處頗多至會頭鎮宿二十七日行十五里至陜州城東門繞城北行上坡二里許轉西下臨黃河北望河北林朩稠密樓閣參差於北岸山腳下有小城乃山西平陽府平陸縣也進北門出南門西行十五里至橋頭溝又二十五里至曲沃入靈寶縣界此一帶官道離黃河五里許岸亦甚髙河即於陜城北繞南帶西南漸西至靈寶亦然北岸逶迤幾百里皆係極髙土岡北去重山疊嶂髙低無定而南岸從陜州見河至曲沃亦有髙坡遮目人行岸上如常在谷中行也十里至好陽河十里至靈寶縣東門繞至南門宿𢎞農澗縣西一里源出米陽鎮藏牛谷魚腹寺石窟中北流漸大至縣西北入河好陽澗縣東十三里源出峴頭山北流入河二十八日繞靈寶縣城西門至北門東北河邊上有老君堂即老君故宅復回西南行三里許入山谷過函谷關關前澗水急流入河南去髙山北倚黃河兩邊髙土岡行如巷內如上髙坡髙山大河俱在左右矣數里下坡漸行地上河離半里許又十里涉柔桑河過柔桑鎮入谷南行一望髙山迤邐數十里即女郎山接秦山一帶矣行數里閿鄉縣界又二十餘里至達紫營二十里至閿鄉縣河北即中條山綿綿不斷河之曲折不能計數又二十里至盤頭鎮宿郎水西二十里出自棗鄉峪北流於河玊溪澗文峪水西南五十里源出秦山會合入河二十九日從盤頭鎮行二十里至舊閿鄉涉澗水此水百餘步即入河十五里上坡四五里到潼關東門關城繞山而西關口下臨河河面亦寬北岸土山巳盡河亦北流依灘二里許東望皆髙山北岸皆平地進門上坡城池廟宇俱壯麗但俱坍毁約三里許出西關繞河里許宿三十日西行離河半里許北岸中條再北望無山矣路旁栁樹連綿不絶南去土山綿亘二十里土山盡處見華頂連絡秦山數十里峰巒峻峭翠壁嵯峨華頂獨聳出諸峯之上漸行漸轉十五里到嶽廟規模𢎞壯金壁輝煌外東西大牌坊中建鳯樓進門西百有老君繫青牛古樹上如杖下甚擁腫光潔蒼古無枝葉而不死前有柏槐樹碑碣亦多松柏槐椿蔥鬱參天大殿寢殿及兩邊鐘鼓樓極髙敞後大院牆有大池最後有萬年閣三層極髙聳東西連轉藏殿牆角有十字頂樓並有敞軒髙閣看華峰可以及底西望秦嶺盡處蒼茫無際東望渭水如帶黃河直在東北隅矣欲一一登臨暢所欲遊恨終不能怏怏出廟西行五里至華隂縣城甚卑隘出西門宿下午至華山口遊巖洞集靈宫等處黃河自龍門南下經本縣東北葫蘆灘寺南至潼關折而東注渭水源出隴西首陽縣橫縣北境與朝邑分壤逶迤至寺南東北入河春秋所謂渭汭汭者水相入也周洽看河紀程行水金鑑卷一百六十一
