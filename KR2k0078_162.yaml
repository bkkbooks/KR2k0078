body:
  text: 行水金鑑巻一百六十二江南按察使傅澤洪撰兩河總説七月初一日僱山轎入山因前大雨水衝壞山路石塊壘塞下轎步行崎嶇之至過十八盤二十里始抵青柯坪過陡山盤上千尺嶂百尺峽二仙橋元帝殿又上老君犁溝轉折至北嶺上坐片時下宿道院初二日畧領大概疲極而止悤悤囘寓燈下閱志書有云華山三峰南曰落㕍峰李白登之歎曰呼吸之氣可通帝座恨不擕謝朓驚人句來搔首問青天耳東曰眀星玉女峰西曰蓮花峰其間名勝甚多恐悮長行未能作數日盤桓書之以志吾恨初三日從華陰東門東北行十五里渡渭河此河東行不逺即入黄河又北行二十里過洛河不甚濶水亦濁五里至趙渡鎮二十里到朝邑縣大西門宿河自龍門而南繞於邑左逕跨洛鎮金水今廢經趙渡鎮注洛水經金龍渡注渭水三水滙東南一巨浸也世稱三河口洛源出延安子午谷經郏州洛川中部過白水蒲城同州至趙渡鎮入於河初四日從朝邑縣北行土岡數里上岡入谷時出時入如是者四十里至良女鎮岡上人家㫁續又從土山溝西北行三十里至北當又四十里至郃陽縣宿城隍廟是日約行百餘里道路紆折上坡下坡有極陡之處且久旱鬱熱灰土蒙面甚難行也夏陽渡縣東南四十里韓信擊田豹朩罌渡軍處秦晉要津也初五日出郃陽縣北門東北溝行漸高復下坡過深溝甚陡有流水上坡甚逺四十里至北良鎮又下深溝過澗水上大坡十里至大棗鎮有玊皇殿亦土窯石山頂上山係土山壁削如石峰巒起處極聳秀林朩邨寨窯洞亦多望原上層層如盤皆田也又十里到芝川鎮係舊韓城縣城雖小皆瓦房人烟稠叠鎮西南髙阜處有漢太史司馬遷墓上有司馬廟極雄壯下坡穿城出北門半里許有牌坊係白樂天故宅西面上山林朩蔥鬱東望黄河僅里許東岸髙岡如山乃山西境也又里許有張太保大塋内多樹朩亭臺路旁兩邉地土膏腴值旱即取井水灌溉井亦多農亦勤人家亦稠密東邉臨河處亦有髙原如山直至韓城縣城亦壯麗四望皆山澽水芝水環繞入河二十里間風景逈異經月之行未之見也是日宿韓城縣澽水出麻羨嶺西北來入河芝水出方山東南入河龍門者韓北境之山也禹鑿山而壑之以通厥流若門然山海經謂應龍相云故于門上加龍字盖歸功于神也宜川縣有埽工初七日出韓城北門東北行二十里昝村鎮五里潘莊五里後潘莊五里謝村二里臨皋村三里李村五里夏餘口三里喬南村十里朱頭村十里到龍門從縣來三十里許東岸汾河入河處一路村庄皆好廟宇亦多喬南村多髙樓云發科甲者此為最盛大約東通大河環轉村北從龍門梁山來脈甚壯麗故也朱頭村大磚石城亦龍門前之大鎮也登大石巖謁禹廟巖石如拳叠覆水上對岸大石巖𥪡立髙聳亦有禹廟髙泉乃龍門之口雄壯特甚後覆大山髙峻大斧劈石天工巧妙令人驚愛後面之山亦雄厚西岸梁山麻皮皴法髙峯秀拔一望西北秀山無盡矣水則盤旋而出勢亦鋭渡則棹入口内借東壁急溜而下船皆方横出口亦異登岸東南行十里清澗大鎮十里到河津縣西門宿龍門在縣西北二十五里兩山壁立東西濶八十步一云禹門汾源東至太行西入於河黄河縣西十五里禹墳龍門前里許中流石磧挺然大水不没按禹𦵏㑹稽蓋因異俗傳之初八日出河津縣南門西南行二十里渡汾水龍門在西北東面土原西臨黄河十里雙營鎮南行沿河二十里原上有湯陵西岸髙原即韓城境漸入土谷行數里有破闗口云穆陵闗無考五里有漢武秋風樓有碑今没入河矣又二十五里至滎河縣南門宿黄河距城西百丈許汾河縣北數里后土祠旁西流於河今移河津葫蘆灘南入河初九日從滎河縣南行土谷中盤旋屈曲路徑如麻五十里下坡至臨晉縣初行十里許近河漸漸東南南望中條秦嶺逶迤西岸髙岡不㫁即郃陽縣境也宿東闗初十日從臨晉縣南行四十里栲栳鎮又西南行三十里至蒲州東闗宿歴山州南六十里媯汭二水出焉上有舜井舜廟黄河在蒲津門外今徙去十里涑水渠州東三十里源出綘縣横嶺山十一日從蒲州南行二十里漸近黄河繞中悰山頭又東南行沿河三十里南望泰華如屏逺甚谷行數里對潼闗又原行四十里至小吕村娘娘廟少坐對岸原内即盤頭鎮矣河亦寛中多淤灘東行二十里至永東宫鎮宿十二日從永東宫東行四十里至芮城縣東門岳廟宿十三日從芮城東門東行三十里下深溝上坡十里陌底鎭宿十四日從陌底鎮東南行五里許即沿河行矣兩岸髙原屈曲之甚對岸乃靈寶東境河亦隘一路河灘行數里下極陡步行三四里行過澗水二道至焦家村又三十里到平陸縣宿土城坍圯不堪之甚砥柱峯在三門東迤南中流峭立數仞有老君爐險不可升上流有列石蓋𣆀於此渡河十五日出平陸東門西南行三里下河灘行三四里上船渡至官道東南繞陜州城行三十里磁鍾鎮四十五里至峽石驛宿十六日從峽石鎮上坡東南行因夜大雨路濕難行二十里觀音堂二十五里土壕鎮二十里至澠池縣繞南門行二十里舗又五里千秋鎮宿十七日從千秋鎮東行三十五里至鐡門鎮宿十八日從鐡門鎮行三十里新安縣又七十里至河南府宿十九日從洛陽城東北行三十里上邙山二十里下坡到孟津縣宿穀城山舊名替亭縣西六十里聳出岡阜之上瀍水出其下瀍水縣西五十里平地發源東南流六十里至洛陽東南入洛二十日從孟津縣東北行二十里至孟津渡口古城惟存基址而巳南傍邙山北依大河南北不過三四里是日東風渡河甚快渡口少隘此二十里内對縣處河闊有數里中有灘有五六里長二三里闊再西兩邉髙原又隘矣東行沿邙山又寛望邙山盡頭即鞏縣界過此岸稍髙數餘里到孟縣西闗宿二十一日出孟縣北門西北行數里上土坡過石橋又土谷中行二十五里下坡又二十五里至濟源縣進南門出西門宿一路柿棗樹極多是日大霧西有層巒乃王屋一帶也東北是太行皆隐隠望見瀧水縣西源出莽山其水或㫁或續至雙泉寨始盛出琮山口穿石暗流至勲掌村如溝渠又東至縣西四里水始洶湧經縣西城下繞流城北又東南入于溴水古謂之溴今謂之瀧即白澗水武山在西北十五里姑嫂山在武山北溴水出焉天井如盤在西北石上有數頃其流若井水自上溢相接而落若倚劒然二十二日因瀧水漲難渡進西門出東門西北行五里許謁濟瀆廟碑石雖多皆御祭文也從元朝起者傍有古柏枝榦如虬龍稱將軍焉多娑羅樹枝葉茂盛俱合抱者白楊亦多合抱旁有三瀆神祠後有北海神廟亦多御祭碑殿前即東原也俗稱通北海出廟西行三里許有龍潭潭皆蘆葦約二畆許云此源三年來三年去然去來實無定或其年水來民以此種水稻並無大溝通流也又西北行五六里上靈山北望太行髙而平西望王屋則重巒叠嶂峰岫參差秀拔之甚遙見天壇頂髙出諸峯之上是日復至濟源縣宿二十三日進濟源縣西門出東門東行三里許段家園面前一帶俱繞瀧河五里過石橋十五里北望太行諸峰卓立重重無盡因微雨不甚眀白低處即五龍口沁水出焉廣濟河出此又東南行十里柏鄉鎮又東行四十里至懷慶府由西門繞南門到東門宿一路道路寛平濟水低而清直繞城河荷花極盛從南流其勢亦緩廣濟河髙而濁東流甚急與清水交處下清上濁髙低緩急各行其性絶不相和也丹河縣東北十五里源出澤州界内穿太行曰丹河口唐改懷水南流二十里入沁二十四日從懐慶東北繞城行三里許渡沁河值水漲流甚濁又七里許過大丹河水亦濁比沁河一半之寛過二十里舗又五里至許良大鎮又北行十里到山下丹河南行小丹河名為九道堰實従丹河支分第一條沿山麓東行淺隘如溝常因水發淤墊以此濟運甚覺艱難因昨夜大雨泥濘難行四五里許至湯王廟宿二十五日早過河内縣治即向東南行過廣濟河橋瓦屋村龍津橋夾樹頭至温縣宿是日行五十里二十六日從温縣東北行十五里趙堡鎮又十五里司馬鎮武陟縣界十五里至小司馬十五里至武陟縣南闗宿黄河縣南十五里沁河源出沁州綿山穿太行達濟源合丹水繞武陟縣城北由東而南入于黄河沁河性善變遷衝決之害甚於黄河毎年修築不能一勞永逸也二十七日從武陟縣北闗東北行過沁河闊約二三十丈水甚淺且濁繞城東行上南入河東岸即木欒鎮居民稠密約數千家兩面隄岸亦髙三十里至修武縣南門過預河橋至西闗丹河約七八里寛五六尺深進西門出東門過小丹河橋河繞城北行又東行滿澤圖鞏莊鋪萬箱鋪離縣二十里一片平田丹河兩岸及四野棗栁俱多又過二三村庒至獲嘉縣西門宿清水河縣北十五里源出輝縣西南小清河縣南四十里二十八日進獲嘉縣西門出東門東北行二十五里至合河鎮北行過石橋橋有九洞不甚髙東通大船又東北行三十里至輝縣宿縣在髙原上一路林朩脩竹水溝蘆葦乃水鄉景象也百門泉源出蘓門山下泉通百道故名一名衛源以衛河發源于此雖以百門名然實踰千萬不可勝數自山麓平地遍湧石竇中仰出纍纍如珠滙為巨陂方廣數頃淵涵澄澈净無塵滓上有威惠王祠殿名清暉外有靈源湧金噴玉穠翠洗心諸亭亭有古今名賢題咏甚多衛河縣西即百泉滙流南經新鄉東繞府城北㑹淇水流入于隄口經大名府濬縣山東館陶臨清入漕河以納于海蓮花泉縣西五里突出于地一曰小百泉世傳晉水伏流至此東南入衛卓水泉縣西八里平地湧泉東南入衛三渡縣西四里百泉之支清水縣西南七十里峪河縣西南五十里源發太行山麓二十九日從輝縣東闗北行五里至梅村過此即百門泉陂渟數頃泉如聮珠而上中有清輝閣頗似西湖湖心亭松柏迴繞北倚山麓樓閣殿亭排列于後小山上嘯臺安樂窩亦頺壞從西岸南行看頭閘二閘復回東南行五里許向西步行二里許看禮字閘水頗猛又西行四里許看智字閘水稍緩又五里許看信字閘水更緩此三閘俱用兩水門又南五里許至雲門鎮又東南行三十里到新鄉縣北闗過橋黄河係東西城脚下行也近因水大河面寛有數丈繞城至東闗宿衞河源發蘇門山詩云泉源在左是也泉通百道湧自山麓石竇及平地水勢屈曲至合河鎮凡三十里此衞水合小丹處稍行而東逕新鄉北門民樂橋歴河透曲里二村凡六十五里自此東流徑賀生屯瀕衛輝府北門一里東入大名濬縣界卓水源在輝縣城西十里平地湧出經雲門流新鄉縣合河鎮西北入衛清河源出輝縣西南七十里山陽鎮東南經獲嘉縣界至新鄉合河店正西與衛合今自獲嘉境内即㑹于小丹河此河止存故道毎逢雨集太行萬壑之水滙焉衛水溢出邑西北苦之按改丹入衞議曰改丹入衛猶改沁入衛也其地形之高下水勢之緩急泥沙之淤塞開築之阻絶與沁水同衛不能容沁而受其害矣獨能容丹而受其害乎丹河源出山西穿太行屹坦坡狄家嶺南注而下中間分散有十八道小溝渠民間引為灌田總流南經張店至劉村入沁水首尾三十餘里與衛水相通者係上下溝渠内東流第二道由清化鎮南有金鎗狗跑等泉水相聚迤邐而東經修武治南北轉城東門外又東經獲嘉縣北又東名蔣河至新鄉縣西北名河店入小清河而因以入于衞相沿凡百餘里名為丹之支流而實非丹水矣若欲將丹水全身由張店改折而東過狗跑泉達衛則丹至張店地勢傾下入沁甚易勢不能挽若從上面東流第二道小溝渠決河達衛則丹正向山嶺而下奔潰傾跌横截不住何由東流議者徒欲引丹入衞殺沁一二耳而増衛害十九奚為可哉總之改丹改沁為救徐邳以南漕運計耳而北地運道如兖豫芻糧所係療腸内而塞咽喉此所謂救一河患添一河患也萬厯間總河舒委勘後其事遂寢八月初一日從新鄉縣稍西行四十餘里至八栁樹店又西南行三十里到原武縣宿初二日進原武縣城出東門東行二十五里過張家隄口五里至陽武縣北闗又東南行過兩道隄到古倫集宿初三日從古倫集南行至縷隄東行四十里至于家店十五里荆隆口鎮二十餘里荆隆口大工内有積水隄旁有古黄池碑未詳稍東即栁園頭渡口兩日水漲漫灘竞無渡船又東行二十里到陳橋鎮宿初四日從陳橋鎮南行七八里上船北風頗厲揚帆破浪自辰至午後到南岸淤灘拖行約兩時始抵灘岸從淤泥中行四五里至乾岸二十里劉家店又數里入汴城東門宿即開封府省城也初五日撫軍又留住數日初九日午刻始行三十里至黒江口渡頭水漲流甚急無船可渡行人俱望洋而歎仍回舊寓宿初十日覓船不得復住一日十一日早出北門北行三十里上船順風渡甚利三十里到封邱縣宿十二日從封邱西北行二十里東戴村里許西戴村二十里到延津縣東闗東北行二十里過沙門鎮一派沙地滿目荒涼十五里進胙城縣宿黄河故道在延津縣二十八里明天順間遷于于家店淹没土地沙鹻黄河原自今之陽武北新鄉西南東北經延津汲縣胙城至大名府濬縣大伾山北入海即禹貢東過洛汭至于大伾處胙之河禹之舊跡也周定王五年河徙砱礫胙流乃塞漢文帝十二年河決酸棗東南流經封邱入大名府長垣縣至山東東昌府濮州張秋入海水經所謂東至酸棗又逕東燕縣故城北是也隋唐以來屢經決溢胙不詳其有無宋熈寧十年河溢衞州自王供埽至汲懷州等處北流遂絶胙于是宜無河矣縣圮于河疑在熈寜前也金正大中復以河患徙縣當是二十年決衛州之時但不知北流既絶何時而復注也既徙且復湮矣金明昌五年河犯武城隄泛至金山明年詔鑿新河在今新鄉縣南復經于胙元自原武決而東南流經陽武封邱兹流復絶沙没新州蓋其時也迨至明時遷徙不常皆未去境内正統十三年大溢仍循陽武故道直抵張秋景泰四年又徙而南百年來故道皆積沙為患今其遺跡自小店伍疃社新州城棘針舗呉安屯董固班棗丁家莊林家莊等處以至滑縣廣狹不同宛宛可見其經縣南乃決酸棗故道也今自沙門一帶縣西呉安屯至縣西北董固等處積沙綿延數十里皆飛礫走磧之區胙之土田無㡬矣沁河故道俗名孟姜女河自武陟縣流經胙境北行與汲縣相接在漢隄西久塞漢隄自新鄉西南入衛境東北至胙城又北入汲縣小店西南有大隄一股由店南而東蜿蜒㡬百里一股由店西而北入汲縣界一名古陽隄䕶河隄自汲縣東接胙城抵直𨽻滑縣䕶城隄縣東西南接延津北抵滑縣十三日由胙城西北行三十里一派沙地并無樹朩村莊飛沙成堆衰草零落始至一村莊長里許十五里到衛輝府城郭巍峩舊為潞王府宫牆猶存有望京樓緑琉璃瓦極髙聳下即如村樓四方磚築迴闌玲瓏進東門出西門過大石橋即衛河也水不甚深兩沙岸人家稠密至闗廂宿衛河在汲縣西源出輝縣蘇門山南經新鄉東遶府城北會淇水經濬縣達臨清至天津入海斮脛河源出淇縣西北五里東南流入衛河昔商紂斮朝涉之脛因名一名太和泉又名陽河淇水源出林縣西南七十五里闊五步深可二尺水經注曰淇水出河内林慮縣即林縣西大號山山海經曰淇水出沮洳山疑大號沮洳一山異名也綿厯太行而東自濬境西北入界南流至枋頭入衞水簾洞在青巖山東南層崕上寛廣丈許深可數丈洞中出泉澄瑩可鑒枋頭城在淇縣南八里衛河北即淇水口也魏志曹操于淇水口下大枋朩以城堰遏淇水東入白溝以通漕運因名枋頭十四日從衛輝府出西門東北行十五里官路西三里許謁比干墓内多古碑夫子書殷比干墓四字出廟門狂風大作飛沙滿天又行二十五里至界碑有麥秀古墟碑雨漸大風吹雨如細石撲面又五里過斮脛河橋又五里有衛多君子碑至淇縣南門外有殷三仁故里碑東立賢聖君六七故都碑有大牆門内琉璃殿因雨大不及進謁進南門有柏臺縣治前書古朝歌雨大衣濕風吹寒甚即宿北門十五日從淇縣北二十五里至髙村橋橋平多孔水流甚急水從東來折南流箭許過橋漸往西行是日風雖大喜天霽一路西望諸山甚近峰巒大小不一水簾洞海子等俱在内三十五里至宜溝驛兩旁多栁樹有栁廊牌額路旁有扁鵲墓碑有嵇侍中血濺帝衣坊有墓祠進湯陰縣南門内即岳武穆故里有廟下店宿蕩水縣北二里源出牟山下水經注曰蕩水東與長沙溝水合二水旣合下流河隘難容而洹水亦時泛溢萬歴初屢潰居民苦之萬歴中郡守常公由大坡青塜髙城改入衛河安瀾數十年嵗久壅淤復屢決害順治十四年知縣康允叔奉府檄疏河二十里閱兩月竣工刻石記之羑水縣北八十里源出西山水經注曰羑水出蕩西北韓大牛泉四十里流羑城北水積成淵方十餘步深丈餘東至内黄與防水㑹地理志曰羑水至内黄入蕩者也今與蕩水别流入衛水冝師溝縣西南二十五里即長沙溝也經晉鄙故壘北以下伏流至小灘出經伏道東北流至桓人山與蕩水合淇水縣西七十里東流三十餘里入淇縣界廣潤陂在府東南四十里安湯二縣界地勢窪下蕩河及萬金渠二水注焉盈則入洹以達于衞後漳水南下塞洹故道陂水不能入洹而洹水反洩于陂陂日益廣當夏秋漲溢没田數千畆民病之郡守常公覽地形為疏治由葛家莊鑿渠𨗳蕩水至髙城河口入衛自枉流橋至楊家莊補築舊隄以障渠水又自戴家溝疏濬𨗳陂水入洹於是二水有歸黄河故道縣東夏莊小張等處看河紀程行水金鑑巻一百六十二
