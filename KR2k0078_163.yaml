body:
  text: 行水金鑑卷一百六十三江南按察使傅澤洪撰兩河總說十六日從湯隂縣北行四十里至彰德府隂雨甚久泥濘難行進南門過萬金渠橋不甚寬從西東流繞城支分灌溉原入安陽河過鼓樓北門五里至安陽橋河面四五丈闊又北行四十里至豐樂鎮北臨漳河下灘四五里至河邉濁水急流北岸坍圮西望羣山東望林朩有曹操疑塜銅雀臺此水往東更寬水發汪洋地濕難行復回至府宿洹水縣北四里俗曰安陽河源出上黨洹氏縣洹山在長子縣東過隆慮北黃水注之又東北出山徑殷墟又東北過鄴城南謂之新河自鄴東經安陽縣故城又東過內黃縣北東入于白溝春秋左氏曰聲伯夢涉洹水圖經曰洹水源出林慮西北平地涌出初甚微小東流九十里至安陽界泉脈漸大又曲屈東北流六十里至州北入洹水縣今曰洹氏縣在澤州髙平然無洹水蓋邑遷改不常天下之水皆發源于山洑而再發出自平地濟與百泉是也夫淄澠之合古人能嘗而知之洹水洑發於林慮浸發于安陽無可疑矣漳水俗曰濁漳河尚書禹貢曰覃懷底績至于衡漳職方氏曰河內曰冀州其川漳水經注曰濁漳源出上黨長子縣西之發鳩山東過縣南合堯水梁水曲屈從縣東北流東過壺關屯留潞縣合衆水其流頗大又東過武安縣東清漳出樂平南少山自涉縣東南來注之世名其處曰交漳口遂東過鄴縣西而東徑三户峽為三户津又東而汗水注之又東徑西門豹祠自祠北徑趙閲馬臺西遂自縣東北入滏陽縣即今磁州州之東北有永樂浦浦西五里俗謂之祭陌河即西門豹投巫處在安陽界魏武帝引入鄴城經銅雀臺下水激有聲不絶長鳴溝在臨漳縣西門豹史起李仁偉所作引水渠曰西門曰天平曰金鳯曰菊花曰望雲曰百陽皆天平曰天井曰利物今曰漳河舊自安陽豐樂鎮北東流過臨漳南又東北至館陶縣南入衛正德庚辰秋水溢南決自安陽顯王村南流折而東至崔家橋又東過永和呂村入衛袤百餘里當水盛時廣四十里凡安陽土田悉注汙潦其患甚巨萬金渠在縣西北二十里深一丈五尺闊八尺鄴都故事曰魏都鄴後起石塞堰自安陽南引洹水入鄴自鄴入臨漳東至洹水縣當時溉田有萬金利因名髙平渠源出縣西三十里自髙平村堰洹水入渠東流灌溉至縣西南流至官道七里越道入廣潤陂十七日從彰德府南行一路爛泥十五里魏家集十里二十里鋪路旁栁樹成隂西有羑里城稍南有文王演易處碑離城七里過湯河石橋再進湯隂縣北門出東門東南行十五里乃至土岡又十五里到皮家莊天微雨將至屯頭見衛河有一道河從西來問土人云有四十八里長雨水所積從山邉起二十里到屯頭即衛河馬頭因水大兩岸樹朩皆在水中又大雨積水難行二十五里到大名府濬縣西門過橋宿橋頗大兩邉俱有店房衛河自淇門入界受淇水徑縣城西又東北受洹漳二水至直沽入海波羅河在童山西麓白祀童山二陂在城西二十里亭子陂在城西一里長豐泊在縣西二十里即白祀童山二陂所匯每逢夏秋雨集水泛淹田後疏鑿成渠南起交卸村北扺屯子鎮工成九十餘里野鮮沮洳蒸民乃粒白龍潭黑龍潭在縣西南四十里一在大隄之西一在大屯東南四時不竭井固潭在井固村其源不測相傳中有水獸東北入衛檻泉在善化山下共七十有二爾雅曰檻泉正出正出者涌出也近日湮塞過多荆家寨張家窪王楓園石橋頭東陽澗西陽澗大屯之大泉小泉則最著者梨水今湮沒無考黃河故道縣西南自石濟徑黎陽遮害亭走大伾山下南為黎陽津宋南渡後河身南徙流沙壅積山阜重疊大有深谷為陵之勢十八日大雨不及行十九日從濬縣西門繞城至南門南行二十五里至滑縣北門繞城至南門衛河水溢道上水積難行宿滑河在縣南徑北而東淇河一名王莽河冀州圖云西從河內界入黎陽慶臨河西十四里至王莽河東行永濟渠在慶臨河西北三十里自濬縣入界東北入內黃界黃河故道在縣西北二里縣東北有苗固魚池蔡胡諸漯皆河經流處今淤二十日出滑縣北門稍東行三十里白馬陂有斬顔良處碑西望大伾山東一帶白沙即黃河故道又四十里至井泉鎮宿二十一日從井泉鎮東北行約五十里至內黃縣因雨大即宿二十二日從內黃縣東北行四望雨水如河泥爛難行辰刻雨止行三十里至雙黃集臨衛河由東北過河河水泛溢兩崖立土頗髙又二十里至泊口鎮北行二十里過雙廟一名紅廟東北行二十餘里至魏縣南門宿二十三日從魏縣東南行四十里至大名府西門八里至大名縣西門宿地形卑窪昔多衛漳水患今漳水北遷廣平衛河修隄堅厚可無水患一路栁隂甚盛二十四日從大名縣北行繞大名府城東門外東北行三十五里至小灘鎮過衛河出鎮北門東北行數里淤沙一道寬五六里又三十五里到東昌府冠縣南門宿二十五日從冠縣南門少西行五十里至館陶縣又東北行三十五里至孫兒寨宿二十六日從孫兒寨東北行二十里過衛河河甚灣曲至東南復西北穿臨清州城入運河運河從東南來為汶河十五里到臨清州進西門過運河至東門住飯後南行二里許至板閘看汶運衛三坌口交界處本州城跨兩河新舊周連二十九里巍然巨觀由水路泝㑹通出崇武遵淮泗按汶水為㑹通河元自安民山開渠𨗳汶絶濟直扺臨清建閘三十有一度地髙下逺近以節蓄泄衛水為永濟渠始煬帝𨗳百門泉東北引淇滏漳洹之水為大河以巡幸名御河或曰即漢屯氏河流八百里至元城又五百十里入臨清閘四曰會通臨清闕橋四曰廣濟𢎞濟永濟通濟廣濟在衛河中𢎞濟在汶南支永濟俗名天橋通濟石橋如閘制水漲涸以時蓄泄並在汶北支洲一在汶衛環流之中財貨聚焉自元以來名曰中洲其東砌以石如鼇頭突出築觀音閣于上四閘建左右如足廣濟尾其後曰鼇頭磯俗謂觀音嘴天下河渠涓滴之水皆關漕運餘俱不論論濟以北東惟汶水發源泰安萊蕪至堽城挾沂泗南入漕北流四百五十里達州西衛河出衛輝東北流九百五里達州州受兩河之水合流北放千一百七十里扺大通河距京師百六十里州實據河漕之喉當南北之衝故曰第一津州舊設有閘有壩有淺鋪沿河穿泉植栁以便漕惟汶流遇旱輒淺嵗加浚挑如故蓋關天時非人力也二十七日出臨清城過河三十五里孔家集十五里至竇父坊屯宿二十八日從屯南行二十五里梁家淺四十里至東昌府北關又四十里至栖雞渡河東宿此一帶傍河河從府大灣直南北又一大灣餘小灣亦多二十九日從栖雞繞河南行二十里窩城二十里張秋城北渡河出正南門西南行至大壩漫地皆水云係沙河水從西來者南壩實土北壩有三石洞桿船過水必須拔壩又西行路濕泥爛牲口俱陷地勢低窪者一望如河如此二十五里至扠河過大石橋宿橋下水亦大東南流里許通沙灣入運河運河水發則有水少旱即乾其積水在曹州洪閘口三十日從扠河口東南繞出大路行淤泥中二十五里至黑虎廟又東南繞小路二十五里過硝皮口又三十五里至鄆城縣西關宿九月初一日從鄆城東南繞水行至西南三十里武安集二十五里鄧家樓二十五里清浪集俗呼沙土集宿一路因水大皆繞道行初二日從沙土集西南繞道行三十里楊寡婦集三十里定陶縣又泥水路行五十餘里至曹縣東關宿初三日暫歇一日初四日從曹縣東關東南行數里八里灣二十餘里過新月隄數里至護堤頭西望二里許傅家集大半坍入河中南行二里許至斷堤頭西乃一大掃灣掃斷河從西冲東復折西南行對岸亦係曹縣地一帶栁樹甚盛又從護堤東南行數里過桑村寺東小堤頭東行二三里謝家集隄內東行十二里望魯集數里石香爐舊決口又數里下小堤東北行十餘里曹家集宿初五日從曹家集東行十二里浮堽集即單縣界又東行數里外即董家營水渡口有月堤從馬家寺起至朱家樓前止八百餘丈係三堤縷河因水大難涉不及到又二三里至大王廟直北半里許即黃王廟直北半里許即黃堽集亦係大村莊又東行數里望孟家樓河亦近從此東行三十餘里朱家樓格堤又數里姜家莊至馬良集宿初六日從馬良集東南行數里王家莊上堤西去里許接單縣縷堤堤帶西北上東南透出皆成廢堤堤外郭家寨堤內朱家樓東行三十餘里王家堂水漲漫堤斷有四五十丈小船過口行數里范家集又十餘里盤龍集宿此一帶離河逺近不等立堤上皆不見河又因水漲一望汪洋大約此處對毛城鋪此堤共長七十二里從盤龍集到堤頭止有二十二里至徐州一百三十六里毛城鋪離徐州約一百四五十里初七日從蟠龍集東南行里許上堤東行十餘里孫家寨至堤盡頭李道華雙樓下堤皆泥水路十餘里又小堤行數里有南宫寺往東北行數里陳家樓東南行二十里李伯調家集宿初八日從東南水路行十八里李家集繞水行二十里官莊從小堤行數里皆黃河近邉處東北望大谷山小谷山南望王家山三面峯巒無數又行至河邉有一樓及草房數間特出河岸急流衝激不至淹沒下係石岸故也內即大谷山離河里許有石壩接到小谷山之麓俱有栁樹村莊沿河灘行二十里至河灘衝道一山獨髙山足聳出河內水溜鏗然有聲此為蘇家山又行二三里至徐州觀音門過渡沿城西南行三四里至下洪宿簸箕山州城南九里東西有二下有簸箕窪處久成湖南山之水交注于此民田多汙萬厯間作二石狗鎮之湖終未底今賴奎山一線㵼之泗水源出山東泗水縣陪尾山其源有四因名其水由境山厯茶城南流至州城東北與汴水合嘉靖間汴水北徙出秦溝泗水至茶城即與汴水合循城東南以達于淮汴河一名沁河一名小黃河按一統志汴源出河南滎陽縣大周山東流至中牟縣入黃河沁河出山西沁源縣徑山東流至河南懷慶府入黃河又按漕河志河居中汴居南沁居北河南徙則與汴合北徙則與沁合故此立名有三今沁水久不達惟河合于汴爾汴由西來勢甚湍悍迤州城東北與泗水合故稱汴泗交流自嘉靖末從西北出秦溝流至州城東南而下亦通塞靡恆至百步洪今湮新洪城東南里許有橋呂梁洪城東南五十里共長七里孔子觀于呂梁懸水見丈人即此九里溝城東九里秦溝城東北三里隆慶中成大河今汴由之夾溝城北六十里有驛有橋雙溝城東九十里有鎮大彭溝龍溝湖澱溝揚尸溝皆在城西北三十餘里與五河並分流以達于汴狼豕溝城東南二十里今為黃河要衝漷河源出山東滕縣入昭陽湖薛河出滕薛境西流㑹昭陽湖自金溝口達於泗初九日登雲龍山有黃茅岡子房山諸舊蹟雲龍山在州城南二里許時有雲氣蜿蜒如龍東巖有石峰匝圍中峰因裝成大佛面方數丈覆以殿宇及諸大士參差錯置初十日從徐州下洪東堤行數里繞三山頭東南行三十里至楊家窪新掃工對岸張家橋東北即呂梁城因水大惟河堤髙處始有人家過三山頭東行無山矣又數里至小店險掃工又十餘里至房村村落頗大八里至雙溝西有新沖口子過渡至雙溝宿此一帶堤外淤灘頗髙堤內地窪如井南走四五十里乃靈璧磬石山羣山環繞離河甚逺十一日從雙溝上堤東行數里轉東北行即綏寧縣界數里至豐山頭西邉低者為龍虎山西近河邉有小土岡上有廟對岸即王家山豐山對岸即鯉魚山復東南行至陳家樓又二十里對岸即鳯皇山稍東為董家樓內有靈璧一段張韓二堡樁工又東南行十里南行十里朱家樓內有王家塘余家塘孟家灣等處堤南有土山又東行十里至戴家樓險掃工二百三十餘丈又有一灣頂塘險工向東南又成韓家莊險工向西北去又五工頭險工此處河身從西北繞東南至象山復往西北從東繞過邳州諸險工又東南行十里至韓家莊宿有大險工四百餘丈十二日從塘東行數里火神廟南行數里復東南行魏家莊東行王家樓對岸即皂河口里許至張家嘴一帶有樁工巳至睢宿界矣又東行數里蔡家樓險工往東南行彭家堡險工內皆有月堤又數里朱衣城九龍廟內有缺口水潭至小古城涉水至渡口過宿遷至公署宿此一路南望皆平田水窪北岸馬陵山一帶黑土岡宿遷城後即在土岡上矣十三日留宿遷公署十五日從宿遷東南行過二郎廟蕭家渡楊家莊東行至河北鎮渡白洋河過草壩復西行望河自從西北來也又里許即歸仁堤起頭有閘兩邉有河堤西河往南頗寬至虹縣歸仁集有五十里石堤因㵼水開斷閘北有舊縷堤一道通鎮市南接草壩因天雨不及逺去仍回白洋河宿十六日從白洋河街行三里許桃源縣界至新堤頭東南行三里許連著堤頭又行五里對岸古城又十五里有草亭對岸九里岡險工又十五里西南一灣又連幾灣至烟墩險工內有月堤上水壩臺甚長七八里至桃源縣以土堤為城離堤約半里三里至龍窩險掃工月堤內有潭水東行數里有草菴對岸王家嘴又南行數里復東行五六里李家口大王廟地方宿十七日東行二十里復南行數里髙家灣東行數里西吳城內有舊縷堤對岸有吳城南去遙堤又南即洪澤湖近來水漲堤北有千丈缺口田土皆水又東行河邉陳家莊對岸玉皇閣險工又東對岸清河縣此處舊時即張福口今斷又東上小橋過河從皮家厰稍南過清口到甘羅城上岸河從清河縣西來順清口北灣惠濟祠北始繞東行爛泥淺至惠濟祠乃南北矣近因清水大皮家厰及清口皆清水又二十里至龍汪閘過橋進署二十日早出署從西南行二十五里至武家墩上堤即洪澤湖髙家堰之長堤也傍湖俱石岸可稱堅固惜太低不無水漲搧空之虞置有減水壩寬數丈又十五里至髙家堰關帝廟內有碑文及御祭亭係眀總河潘公季馴夢神授訣成功奏請建廟者也又二十里至石工頭從此皆朩工矣二十里至髙良澗有減水壩又二十里至周橋宿云昔年此地亦通運道今築斷置減水壩一座二十一日早行五里許古溝東減水壩寬二十餘丈又里許古溝西減水壩寬五十餘丈又數里至唐埂減水壩闊四十餘丈又里許唐埂又十餘里即翟家壩因有土埂最髙不用築堤此去西北數里渡闕家口三十里可到老子山有數千家烟火商賈往來甚多三面皆水淮水即出其西南陸路可通盱眙約八十里盱眙至翟家壩止六十里壩之東去地土稍髙其堤東一帶地勢低窪一望惟見水草而已復回騎過髙良澗至髙家堰宿二十二日從髙家堰過武家墩由橫堤至大墩視三岔口出水以一半繞墩灌入運河置東水閘以緩其勢不至直衝難受以一半歸助爛泥淺同入黃河此處為新清口又從七里閘繞太山墩堤堤北岸有甘羅城舊運河即甘羅而西南入運河因黃河灌淤今改數里又北行新莊閘對岸惠濟祠又北行至文英店望隔岸止以一堤而攩黃河矣又過鳯陽厰減水壩至清江浦進署是役也因靳公每年所進河圖俱不稱㫖凂豫繪黃運兩河圖進呈然非親歷山川城郭則位置豈能無誤於是束裝就道自五月十九日出河署至九月十七日進署歷三省閲四月計程則萬有餘里非揮汗於炎雲亦日之中即委頓於烈風暴雨之下道途所經古蹟間志一二諸水源有關繫兩河者俱一一考訂詳明至名山勝蹟具載各府州縣志書不敢獵取以侈博雅雲間周洽竹岡氏識看河紀程行水金鑑卷一百六十三
