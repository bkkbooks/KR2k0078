body:
  text: 行水金鑑卷一百六十四江南按察使傅澤洪撰官司舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓於稷契暨皋陶帝曰俞汝往哉舜典據舜典有云嵗二月東巡守至于岱宗五月南巡守至于南嶽八月西巡守至于西嶽十有一月朔巡守至于北嶽覲四方諸侯而考制度其首協時月正日同律度量衡夫其考制度既以律厯為先則四嶽為羲和四子必矣有能奮庸熙帝之載者謂有能奮起其功以廣堯之事見於巳試之效者將使之宅百揆也蓋舜未即位凡在位者所以言事無非堯之事也使宅百揆者將使之居度百官之任猶後世之為宰相也亮采者輔相之義與寅亮天工之亮同爾雅曰亮左右也以是知亮有輔相之義亮采者輔相朝廷之事疇如九疇之疇謂天下之事各以其類無不順也惠疇此蓋宰相之職也載事也采亦事也既曰熙載又曰亮采者蓋前之所言熙堯之事見于巳試之效也後之所言將責之以將來之效以亮舜之事也於是四嶽同辭薦禹曰伯禹作司空蓋禹于是時以司空居平水土之任巳有成績矣故四嶽舉之將使舜自司空擢升百揆之任也薛氏以百揆為司空之職其說失之矣俞者然其所舉也既然其所舉於是稱美其平水土之功而勉之曰惟時懋哉懋勉也禹拜稽首盡敬於君也讓於稷契暨皋陶所謂推賢遜能也俞然其所推之賢也汝往哉不許其讓也林之奇尚書全解事薈蕞云蔡傳解四嶽謂以一人而總四嶽諸侯之通考遂附㑹之曰四嶽所領四方諸侯有在朝者皆非也林據孔傳謂即上羲和之四子亦未然愚意四嶽即四方諸侯之長猶周之二伯也下文十有二牧即十二州牧則知四嶽為四方諸侯長矣禹平水土有成績即擢升百揆之任今之司河者能盡厥職亦得入居黃閣豈得謂古今人遂不相及哉季春之月命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞月令廣平曰原國也邑也平野也溝瀆與道路皆不得不通所以除水潦便民事也古者溝上有路鄭康成注夫司空掌土之官凡此所命皆土之事故以命焉時雨應時之雨也方春物生需雨澤之時故其雨謂之時雨時雨然或過淫則趨下之水反上騰而為災故命以預備之術也循行則行之有序周視則視之無遺修利則修而利之使無害道達則道而達之使無壅開通則開而通之使無窮皆欲其無有障塞而巳障言蔽顯以為隱塞言窒虛而為實凡此皆預備水災之術也方慤禮記解義關此經言預備水災之術語語與今之河政相切月令之命司空乃行水者之所當遵循而無怠者也道路即道路之有水者障塞二字最有味不修利不道達不開通即為水所障塞矣孟秋之月命百官始收斂完隄防謹壅塞以備水潦月令順秋氣收斂物也八月宿值畢畢好雨完隄防謹壅塞以備八月也鄭注陽為出故春主發散隂為入故秋主收斂聚土而壅之之謂壅升土而壅之之謂塞隄防大故欲完而全壅塞小故欲謹而慎凡此所以備水潦而巳禮記解義夏氣舒發則修利堤防無有壅塞秋氣收斂則全隄防謹壅塞水在天地間最為流通不可壅之物而其盛衰消長亦因乎時夏潦不可隄也故修利而無壅秋潦則可隄矣必壅塞之唯謹雖一通一障不同而其為民禦患則一而巳應鏞禮記纂義大此經言百官猶之乎今之小河官也八月正秋汛之時完全隄防謹慎壅塞深得行水之精藴矣川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之周禮川流水也禹貢曰九川滌源舍其守者時按視守者於其舍申戒之鄭注川衡者平知川之逺近寬狹及物之所出官及師徒多者以其川路長逺巡行勞逸故也中川小川之等自若常法故少差水鍾曰澤澤與川不同官今川衡兼云澤者澤與川連者則川衡兼掌之謂若濟水溢為滎澤滎澤則與濟連則管濟川者兼滎澤掌之如此之類皆是賈公彥疏澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡澤虞掌國澤之政令為之厲禁使其地之人守其財物周禮澤水所鍾也水希曰藪禹貢曰九澤既陂爾雅有八藪鄭注虞亦度也度知澤之大小及物之所出用中士尊於川衡者以其澤之所出物衆多胥徒少者以其巡行處近故也中澤小澤巳下皆如川衡者自是常法山虞林衡川衡皆不言國獨澤虞云國澤者又有不同皆互見賈疏王氏曰使其地之人守其財物則人自為守所以澤雖大莫或害其養蕃李嘉㑹曰澤屬乎國懼民因地以致爭今海之沙岸潮之波渚凡利入之厚無不租撲於官而後漁焉此之謂也王與之周禮訂義即按經言大澤大藪如今山東濟運之昭陽蜀山等湖江南瀦水之射陽汜光等湖以及山陽海州奉裁之葦蕩營是也為之厲禁則小民不得侵占而容蓄之水足以濟運守其財物則葦草不致荒蕪而刈穫之後足以供料豈不大有禆于河工者哉掌固上士二人下士八人府二人史四人胥四人徒四十人掌修城郭溝池樹渠之固周禮樹枳棘之屬有刺者也鄭注掌修城郭溝池者謂環城及郭皆有溝池云樹渠者非直溝池有樹兼其餘渠上亦有樹也云之固者總城郭已下數事皆是牢固之事也賈疏劉執中曰浚溝之土所以為城也鑿池之土所以為郭也溝池深于外則城郭固于內用其深以增髙也渠又在其外所以出水因之設固植朩其上守固之材出焉鄭鍔曰城郭本于築者有時而傾溝池本於鑿者有時而塞樹則所植以為阻塞之朩也渠則所𨗳以通不行之水也渠有時而淺涸樹有時而枯槁則吾所依以為固者不足恃矣故掌固修之蓋治壞之名也周禮訂義字此經言掌固雖指固守疆圉然樹渠二似與河事相關渠水道樹種栁渠以通水樹以固隄亦河上之最要務也當倣而行之司險中士二人下士四人史二人徒四十人司險掌九州之圖以周知其山林川澤之阻而達其道路設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路周禮周猶遍也達道路者山林之阻則開鑿之川澤之阻則橋梁之五溝遂溝洫澮川也五涂徑畛涂道路也樹之林作藩落也鄭注開鑿之者謂若禹鑿龍門之類橋梁之者若十月輿梁成之類是也賈疏矣愚按川澤之阻疏云則橋梁之固此通達其陸路也若川澤有壅塞處則疏浚之水路不亦通乎二義相兼乃備司空公一人本注曰掌水土事凡營城起邑浚溝洫修墳防之事則議其利建其功凡四方水土功課嵗盡則奏其殿最而行賞罰韓詩外傳曰山陵崩阤川谷不通五榖不植草朩不茂則責之司空世祖即位為大司空建武二十七年去大建安十三年又罷司空置御史大夫屬長史一人千石掾屬二十九人漢官目録云二十四人令史及御屬四十二人漢承秦凡山澤陂池之稅名曰禁錢屬少府世祖改屬司農考功轉屬太僕都水屬郡國孝武帝初置水衡都尉秩比二千石别主上林苑有離宫燕休之處世祖省之并其職於少府每立秋貙劉之日輒暫置水衡都尉事訖乃罷之少府本六丞省五又省水衡屬官令長丞尉二十餘人州郡皆置諸曹掾史漢官曰監津渠漕水掾二十五人後漢書百官志初秦漢又有都水長丞主陂塘灌溉保守河渠自太常少府及三輔等皆有其官漢武帝以都水官多乃置左右使者以領之至漢哀帝省使者官至東京凡都水皆罷之并置河隄謁者漢有水衡丞五人亦有都水丞後漢都水使者有參軍二人蓋亦丞之職任舟楫署令漢主爵中尉屬官有都船令丞水衡都尉有楫櫂令丞文獻通考水衡都尉從第五品都水使者從第五品河防謁者第六品下監淮海津都尉從第六品中永平二年正月尚書令髙肇奏都水臺請依舊二使者參軍事謁者并録事令史亦隨事更立詔曰使者置二可如所奏其下屬司唯須充事耳亦何勞多也參軍録事並更置一謁者加二令史依舊肇又奏諸州咨議記室户曹刑獄田曹水曹集曹士曹參軍悉并省之魏書官氏志魏尚書郎有水部晉武帝受命置水部後又置運漕凡三十五曹康穆以後有水部後又省大司農統都水長東西南北部護曹掾及渡江哀帝省并都水孝武復置侍御史有水曹都水使者漢水衡之職也漢又有都水長丞主陂池灌溉保守河渠屬太常漢東京省都水置河隄謁者魏因之及武帝省水衡置都水使者一人以河隄謁者為都水官屬及江左省河隄使者置謁者六人諸州置都水從事各一人晉書職官志晉元康中初都水使者有參軍二人復有水衡都尉有主簿為前後左右中五水衡令悉皆有之又有船曹吏文獻通考司空一人掌水土事舜攝帝位以禹為司空契之子曰冥亦為夏司空殷湯以咎單為司空周時司空為冬官漢西京初不置成帝綏和元年更名御史大夫為大司空哀帝建平二年復為御史大夫元夀二年復為大司空光武建武二十七年去大字獻帝建安十三年又罷司空置御史大夫魏初又置司空魏世晉景帝為大司空置掾十人有水曹一人無屬咸熙中晉文帝為相國有水曹掾屬各一人晉楊駿為太傅掾屬有水曹置屬趙王倫為相國亦置掾屬四十人其中必有水曹宋髙祖為咨議諸曺有水曹初晉元年鎮東丞相府有運漕其後又有水曹髙祖為相曹則猶二也尚書晉西朝有水部曹又有運曹江左有運曹康穆以來猶有水部曹後又省宋髙祖初加置水部侍御史晉西朝有水曹凡十三曹而置御史九人都水使者一人掌舟航及運部此宋世之事秦漢有都水長丞主陂池灌溉保守河渠屬太常東漢省都水置河隄謁者魏因之漢世水衡都尉主上林苑魏世主天下水軍舟船器械晉武帝省水衡置都水使者而河隄為都水官屬有參軍二人謁者一人令史減置無常員晉西朝有參軍而無謁者謁者則江左置也懷帝永嘉六年胡入洛陽都水使者爰濬先出督運得免然則武帝置職便掌運矣江左省河隄此追叙晉世之事都水使者第四品參軍謁者第七品此又宋世之品級也宋書百官志宋孝武帝孝建元年冬十一月癸卯復立都水臺置都水使者官宋書孝武帝本紀宋都水使者有參軍二人文獻通考凡諸將軍公督府諸曹有水曹都官尚書有水部曹南齊書齊有都水臺使者一人有官船典軍梁初亦有都水臺使者一人又有大舟卿有丞有主簿陳因之後魏北齊有水部屬都官尚書掌舟船津梁之事亦置都水臺二使者有參軍後周有司水大夫小司水上士有舟中士文獻通考隋尚書省有水部郎天監七年以都水使者為大舟卿是為冬卿置丞及功曹主簿大舟卿梁初為都水臺使者一人參軍事二人河隄謁者八人七年改焉位視中書郎列卿之最末者也主舟航隄渠陳承梁皆循其制隋書百官志隋初有水部侍郎屬工部煬帝除侍字開皇二年廢都水臺入司農十三年復置仁夀元年改臺為監更名使者亦為監煬帝又改為使者尋又為監加置少監又改監及少監並為令領舟楫河渠二署都水有丞舟楫署有令丞煬帝置河渠署令丞各一人文獻通考唐工部尚書其屬有四四曰水部凡津梁道路治以九月水部主事二人龍朔二年改水部曰司川天寶十一載改水部曰司水水部令史四人書令史九人掌固四人水部郎中員外郎各一人掌津濟船艫渠梁隄堰溝洫漁捕運漕之事京畿有渠長斗門長諸州隄堰刺史縣令以時檢行而蒞其決築有埭則以下户分牽禁爭利者都水監使者二人正五品上掌川澤津梁渠堰陂池之政總河渠諸津監署凡漁捕有禁溉田自逺始先稻後陸渠長斗門長節其多少而均焉府縣以官督察丞二人從七品上掌判監事凡京畿諸水因灌溉盜費者有禁水入內之餘則均王公百官主簿一人從八品下掌運漕漁捕程㑹而糾舉之武德初廢都水監為署貞觀六年復為監改令曰使者龍朔二年改都水監曰司津監使者曰監武后垂拱元年改都水監曰水衡監使者曰都尉開元二十五年不隸將作監有録事一人府五人史十人亭長一人掌固四人初貞觀六年置舟楫署有令一人正八品下掌舟楫運漕漕正一人府三人史六人監漕一人漕史一人典事六人掌固八人上元二年置丞二人正九品下掌運漕隱失開元二十六年署廢河渠署令一人正八品下丞一人正九品上掌河渠陂池隄堰魚醢之事凡溝渠開塞漁捕時禁皆顓之饗宗廟則供魚鮍祀昊天上帝有司攝事則供腥魚日供尚食及給中書門下嵗供諸司及東宫之冬藏渭河三百里內漁釣者五方捕治之供祠祀則自便橋至東渭橋禁民漁三元日非供祠不採魚唐有河隄使者貞觀初改曰河隄謁者有府三人史六人典事三人每渠及斗門有長一人掌固三人魚師十三人初有監漕十人從九品上大歷後省興成五門六門龍首涇堰滋隄凡六堰皆有丞一人從九品下府一人史二人典事一人掌固二人貞觀六年皆廢河隄謁者六人正八品下掌完隄堰利溝瀆漁捕之事涇渭白渠以京兆少尹一人督視諸津令各一人正九品上丞二人從九品下掌天下津濟舟梁壩橋永濟橋以勳官散官一人蒞之天津橋中橋則以衛士拚掃凡舟渠之備皆先擬其半袽塞竹􅦜所在供焉唐改津尉曰令有録事一人府一人史二人典事三人津吏五人橋丁各三十人匠各八人京兆河南諸津隸都水監便橋渭橋萬年三橋有丞一人從九品下府一人史七人典事二人掌固二人貞觀中廢唐書百官志唐工部尚書一員正三品南朝謂之起部有所營造則置起部尚書畢則省之隋初改置工部尚書龍朔為司平太常伯光宅改為冬官尚書神龍復舊也侍郎一員正四品下龍朔為司平少常伯尚書侍郎之職掌天下百工屯田山澤之政令其屬有四一曰工部二曰屯田三曰虞部四曰水部總其職務而行其制命凡中外百司之事由于所屬咸質正焉水部郎中一員從五品上龍朔為司川大夫員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌天下川瀆陂池之政令以𨗳達溝洫堰決河渠凡舟楫溉灌之利咸總而舉之凡天下水泉三億二萬三千五百五十九其在遐荒絶域殆不可得而知矣其江泗自西極達于東溟中國之大川者也其餘百三十五水是為中川其又千二百五十二水斯為小川也若渭洛汾濟漳淇淮漢皆亘達方域通濟軸轤從有之無利於生人者也凡天下造舟之梁四河則蒲津大陽河陽洛則孝義也石柱之梁四洛則天津永濟中橋霸則霸橋朩柱之梁三皆渭川便橋中渭橋東渭橋也巨梁十有一皆國工修之其餘皆所管州縣隨時營葺其大津無梁皆給船人量其大小難易以定其差都水監使者二人正五品上漢官有都水長屬主爵掌諸池沼後改為使者後漢改為河隄謁者晉復置都水臺立使者一人掌舟楫之事梁改為大舟卿北齊亦曰都水臺隨改為都水監大業復為使者尋又為監復改監為令品第三武德復為監貞觀改為使者從六品龍朔改為司津監光宅為水衡都尉神龍復為使者正五品上仍隸將作監使者掌川澤津梁之政令總舟楫河渠二署之官屬凡虞衡之採捕渠堰陂池之壞決水田斗門灌溉皆行其政令丞二人從七品上主簿二人從八品下録事一人府五人史十人掌固三人舟楫署令一人正八品下丞二人正九品下舟楫署令掌公私舟船運漕之事河渠署令一人正八品下丞一人正九品上府三人史六人河隄謁者六人掌修補隄堰漁釣之事典事三人掌固四人長上漁師十人短番漁師一百二十人明資漁師一百二十人河渠令掌供川澤魚醢之事祭祀則供魚醢諸司供給魚及冬藏者每嵗支錢二十萬送都水命河渠以時價市供之諸津令一人正九品上丞一人從九品下津令各掌其津濟渡舟梁之事舊唐書職官志五代史無職官志唐臣蕭希甫傳有河堰牙官李筠告本軍謀反周本紀顯德五年秋七月乙酉水部員外郎韓彥市銅於髙麗二事則五代時亦有水部與都官屬官矣餘無聞小谷口薈蕞晉天福二年九月判詳定院梁文舉奏以前汴州楊武縣主簿左墀進策十七條可行者四其一請于黃河夾岸仍防秋水暴漲差上戶充隄長一年一替委本縣令十日一巡如怯弱處不卑處置旋令修補致臨時偷決有害秋苗既失王租俱為墮事隄長處死縣令勒停敕曰修葺河岸深護田農每嵗差隄長巡檢深為濟要逐旬遣縣令看行稍恐煩勞隄長可差縣令宜止四月詔曰近年以來大河頻決漂蕩人戶妨廢農桑言念蒸黎因茲凋弊凡居牧皆委山河既在封巡所宜專功起今後冝令沿河廣晉開封府尹逐處觀察防禦使刺史等並兼河隄使名額任便差選職員分擘勾當有隄堰薄怯水勢衝注預先計度不得臨時失于防護治河通考宋工部尚書掌百工水土之政令稽其功緒以詔賞罰侍郎為之二水部郎中員外郎掌溝洫津梁舟楫漕運之事凡隄防決溢疏𨗳壅砥以時約束而計度其嵗用之物修治不如法者罰之規畫措置為民利者賞之分案六置吏十有三紹興纍減吏額都水監舊隸三司河渠案嘉祐三年始專置監以領之判監事一人以員外郎以上充同判監事一人以朝官以上充丞二人主簿一人並以京朝官充輪遣丞一人出外治河掃之事或一嵗再嵗而罷其有諳知水政或至三年置局于澶州號曰外監元豐正名置使者一人丞二人主簿一人使者掌中外川澤河渠津梁隄堰疏鑿浚治之事丞參領之凡治水之法以防止水以溝蕩水以澮㵼水以陂池瀦水凡江淮海所經都邑皆頒其禁令視汴洛水勢漲涸增損而調節之凡河防謹其法禁嵗計筊揵之數前期儲積以時頒用各隨其所治地而任其責興役以後月至十月止民功則隨其先後毋過一月若𨗳水溉田及疏治壅積為民利者定其賞罰凡修隄岸植榆栁則視其勤惰多寡以為殿最南北外都水丞各一人都提舉官八人監掃官百三十有五人皆分職涖事即干機速非外丞所能治則使者行視河渠事元豐八年詔提舉汴河隄岸司𨽻本監先是𨗳洛入汴專置隄岸司至是亦歸之元祐四年復置外都水使者五年詔南北外都水丞並以三年為任七年方議回河東流乃詔河北東西漕臣及開封府界提㸃各兼南北外都水事紹聖元年罷元符三年詔罷北外都水丞以河事委之漕臣三年復置重和元年工部尚書王詔言乞選差曽任水官諳練者為南北兩外丞從之宣和三年詔罷南北外都水丞司依元豐法通差文武官一員分案七置吏三十有七所𨽻有街道司掌轄治道路人兵若車駕行幸則前期修治有積水則疏𨗳之建炎三年詔都水監置使者一員紹興九年復置南北外都水丞各一員南丞于應天府北丞于東京置司十年詔都水事歸于工部不復置官宋史職官志宋太祖乾德五年正月詔開府大名府鄆澶滑孟濮齊滋滄埭濱德博懷衛鄭等州長吏並兼本州河隄使蓋以謹力役以重水患也宋史河渠志宋太祖開寶五年三月詔曰朕每念河渠潰決頗為民患故署使職以總領焉宜委官聮佐治其事目今開封等十七州府各置河隄判官一員以本州通判充如通判缺員即以本州官充宋史河渠志宋太宗淳化二年三月詔長吏以下及巡河主掃使臣經度行視河防勿致壞隳違者當置于法宋史河渠志宋真宗咸平三年詔緣河官吏雖秩滿須水落受代知州通判兩月一巡隄縣令佐迭巡隄防轉運使勿委以他職宋史河渠志宋仁宗皇祐三年五月壬申置河渠司宋史仁宗本紀宋仁宗嘉祐三年十一月巳丑置都水監罷河渠司宋史仁宗夲紀宋神宗熙寧四年命程昉為都大提舉黃御等河宋史河渠志宋神宗熙寧六年四月始置疏濬黃河司自衛州浚至海口人船朩鐡工匠皆取之諸掃官吏俸給視都水監丞司行移與監司敵體宋史河渠志宋神宗熙寧九年九月丙寅詔罷都大制置河北河防水利司宋史神宗本紀宋神宗元豐三年五月甲申詔改都大提舉𨗳洛通汴司為都提舉汴河隄岸司宋史神宗本紀宋哲宗元祐四年復置修河使宋史河渠志宋哲宗元祐五年罷修河使及檢舉宋史河渠志宋哲宗元祐七年四月詔南北外丞司管下河掃今後令河北京西轉運使副判官府界提㸃分認界至內河北仍于御內帶兼管南北外都水公事宋史河渠志宋哲宗紹聖二年詔武進丹陽丹徒縣界沿河隄岸及石䃮石朩溝並委令佐檢察修護勸誘食利人户修葺任滿稽其勤惰而賞罰之從工部之請也宋史河渠志宋哲宗元符三年七月復置北外都水丞司宋史河渠志宋徽宗崇寧元年十二月置提舉淮浙澳閘司官一員掌杭州至揚州瓜洲澳閘凡常潤杭秀揚州新舊等閘通治之宋史河渠志宋徽宗政和五年置提舉修繫永橋所宋史河渠志宋徽宗宣和四年臣僚言都水監因恩州修河舉辟文武官至百二十餘員授牒家居不省所領何事皆乘傳給劵第功希賞詔除正官十一員外餘並罷所𨽻有東京四排岸司監官各以京朝官閣門祇侯以上及三班使臣充掌水運綱船輸納顧直之事汴河上下鎖蔡河上下鎖各監官一人以三班使臣充掌算舟船朩筏之事天下堰總二十一監官各一人渡總六十五監官各一人皆以京朝官三班使臣充亦有以本處監當兼掌者宋史河渠志行水金鑑卷一百六十四
