body:
  text: 行水金鑑卷一百六十五江南按察使傅澤洪撰官司金泰和四年吏部定考課法準唐令作四善十七最之法十一曰隄防堅固備禦無虞為河防之最工部尚書一員正三品侍郎一員正四品郎中一員從五品掌修造工匠屯田山林川澤之禁江河隄岸道路橋梁之事員外郎一員從六品主事二員從七品覆實司管勾一員從七品主事有令史十人都水監街道司𨽻焉分治監專規措黃沁河衛州置司監正四品掌川澤津梁舟楫河渠之事興定五年兼管勾沿河漕運事作從五品少監正六品以下皆同兼漕事少監從五品明昌二年增一員衛州分治丞二員正七品內一員外監分治貞元元年置掾正八品掌與丞同外監分治大定二十七年添一員眀昌三年并罷之六年復置二員勾當官四員準備分治監差委明昌五年以罷掾設二員興定五年設四員都巡河官從七品掌巡視河道修完隄堰栽植榆栁凡河防之事分治監巡河官同此諸都巡河官掌提控諸掃巡河官明昌五年設以合得縣令人年六十者選充大定二年設滹沱河巡河官二員散巡河官於諸局及丞簿亷舉人并見勾當人六十以下者充黃汴都巡河官下六處河隂雄武滎澤原武陽武延津各設散巡河官一員黃沁都巡河官下四處懷州孟津孟州城北各設黃沁散巡河官各一員衛南都巡河官下四處新鄉崇福上崇福下衛南淇上散巡河官各一員滑濬都巡河官下四處武城白馬書城教城散巡河官各一員曹甸都巡河官下四處東明西佳孟華陵城散巡河官各一員曹濟都巡河官下四處定陶濟北寒山金山散巡河官各一員凡二十五掃掃兵萬二千人諸掃物料場官掌受給本場物料分治監物料場官同此唯崇福上下掃物料場官與當界官通管收支南京延津渡河橋官兼譏察事管勾一員同管勾一員掌橋船渡口譏察濟渡給受本橋諸物等事內譏察事𨽻留守司餘浮橋官同此皇統三年四月懷州置黃沁河隄大管勾司未詳何年罷正大二年外監東置歸德西置于河陰散巡檢正九品內泗州以管勾排岸兼之皆設副巡檢一員為之佐大慶關管勾河橋官兼譏察事一員正八品掌解繫浮橋濟渡舟楫巡視河道修完掃岸兼率掃兵四時功役栽植榆栁預備物料譏察姦偽等事同管勾一員司吏二人女直漢人各一人提舉三門集津南北岸正六品南遷後置史百官志金金世宗大定十年二月滹沱河創設巡河官二員金史河渠志金世宗大定十九年九月設京掃巡河官一員金史河渠志金世宗大定二十七年二月丁亥命沿河京府州縣長二官並帶管勾河防事金史世宗本紀金章宗泰和六年春正月癸卯始以沿河縣官兼管勾漕河事州府府官兼提控金章宗本紀十二月通濟河創設巡河官一員與天津河同為一司通管漕河閘岸上名天津河巡河官𨽻都水監金史河渠志元工部尚書三員四員二員一員不等侍郎員外郎亦多少不等巡河提領所提領二員副提領一員都水監秩從三品掌治河渠并隄防水利橋梁閘堰之事都水監二員從三品少監一員正五品監丞二員正六品經厯知事各一員令史十人蒙古筆且齊一人回回令史一人通事知印各一人奏差十人壕寨十六人典吏二人至元二十八年置二十九年領河道提舉司大德六年升正三品延祐七年仍從三品大都河道提舉司秩從五品提舉一員從五品同提舉一員從六品副提舉一員從七品河南山東都水監至正六年五月以連年河決為患置都水監以專疏塞之任行都水監至正八年二月河水為患詔于濟寧鄆城立行都水監九年又立山東河南等處行都水監十一年十二月立河防提舉司𨽻行都水監掌巡視河道從五品十二年正月行都水監添設判官二員十六年正月又添設少監監丞知事各一員都水庸田使司至元二年正月置都水庸田使司于平江既而罷之至五年復立至正十二年因海運不通京師闕食詔河南窪下水泊之地置屯田八處於汴梁添立都水庸田使司正三品掌種植稻田之事庸田使二員副使二員僉事二員首領官經厯知事照磨各一員司吏十二人譯史二人元史百官志元有天下內立都水監外設各處河渠司以興舉水利修理河防為務元史河渠志以自元以來都水河渠設官專以興舉水利為民也不專主漕運于此可見元世祖中統四年九月乙酉立漕運河渠司元史世祖本紀按史百官志凡漕運之事中統二年初立軍儲所尋改漕運所至元元年改漕運司十二年改都漕運司十九年改京畿都漕運使司二十四年內外分立兩運司而京畿都漕運司如舊屬户部據此則漕運專司運糧不理河務矣是年立漕運河渠司似為兼職與明季相同元世祖至元十四年三月癸已以行都水監兼行漕運司事元史世祖本紀元世祖至元十九年四月庚戌設懷孟路管河渠使副各一員元史世祖本紀元世祖至元二十五年二月丙寅改河渠提舉司為轉運司元史世祖本紀至元二十六年會通河成後四年始建都水分監於東阿之景德鎮掌河渠壩閘之政山東全河備考元世祖至元二十七年十月甲戌立會通汶泗河道提舉司從四品元史世祖本紀元世祖至元二十九年正月巳亥命太史令郭守敬兼領都水監事仍置都水監少監丞經歷知事凡八員四月壬子敕都水監分視黃河隄堰罷河渡司元史世祖本紀元成宗大德二年二月乙丑立浙西都水庸田司專主水利元史成宗本紀元成宗大德三年四月巳未自通州至兩淮漕河置巡防捕盜司凡十九所元史成宗本紀尚野改懷孟河渠副使會遣使問民疾苦野建言水利有成法冝𨽻有司不冝復置河渠官事聞于朝河渠官遂罷遷國子助教元史尚野傳元成宗大德八年正月辛巳自滎澤至睢州築河防十有八所元史成宗本紀元武宗至大元年八月戊申寧夏立河渠司秩五品官二員參以二僧為之特授奎騰太史元史武宗本紀元參以二僧為之政之紀綱亂矣至大三年十一月河北河南道亷訪司言于汴梁置都水分監妙選亷幹深知水利之人專任其職量存員數頻為巡視職掌既專則事功可立於是省令都水監議黃河泛漲止是一事難與會通河為比先為御河添官降印兼提點黃河若使專一分監在彼則有妨御河公事况黃河巳有拘該有司正官提調自今莫若分監官吏以十月往與各處官司巡視缺破會計工物督治比年修完來春分監新官至則一一交割然後代還庶不相誤工部議黃河為害難同餘水欲為經逺之計非用通知古今水利之人專任其事終無補益河南憲司所言詳悉今都水監别無他見止依舊例議擬未當如量設官精選亷幹奉公深知地形水勢者專任河防之職往來巡視以時疏塞庶可除害省凖令都水分監官專治河患任滿交代治河通考元泰定帝泰定二年閏正月壬申罷松江都水庸田使司命州縣正官領之仍加兼知渠堰事二月庚子姚煒以河水屢決請立行都水監於汴梁倣古法備捍仍命瀕河州縣正官皆兼知河防事從之六月丁未立都水庸田使司浚吳松二江元史泰定帝本紀元泰定帝泰定三年正月壬子置都水庸田司于松江掌江南河渠水利元史泰定帝本紀元順帝至正六年五月丁酉以黃河決立河南山東都水監元史順帝本紀元順帝至正九年春正月癸卯立山東河南等處行都水監專治河患元史順帝本紀元順帝至正十二年海運不通立都水庸田使司於汴梁元史順帝本紀元順帝至正十五年十月巳卯立黃河水軍萬户府於小清口元史順帝本紀元順帝至正二十六年二月癸丑朔立河淮水軍元帥府於孟津縣元史順帝本紀明工部尚書左右侍郎掌天下百工營作山澤採捕窯冶屯種𣙜稅河渠織造之政令屬有水部後改水部為都水清吏司郎中員外郎主事分掌川瀆陂池橋道舟車之事明會典凡運河職官永樂初年差主事一員疏𨗳寧陽縣等處泉源以濟運河後又差通政郎中各一員又差主事一員專管閘河臨清閘則令提督衛河提舉司主事兼管皆三年更代十二年議罷海運令工部尚書一員及都督一員疏濬運河十五年令伯一員充總兵官創行漕事又遣都督侍郎各一員及尚書一員伯二員往來提督以本部員外郎主事二員分理又遣侍郎提督監察御史錦衣千户等官巡視十九年遣侯伯各二員分理濟寧等閘及徐州呂梁二洪通州等處河道徐州洪差御史一員又差郎中一員呂梁洪差少卿一員又差河南按察司官一員又差郎中一員今二洪各差主事一員專管三年更代遂為定制宣德中設濟寧管閘主事正統四年定巡視河道部屬官六員提督侍郎都御史各一員以濟寧為界其南屬侍郎其北屬都御史又以都督一員遞相提督景泰元年令提督河道專屬都御史二年減巡視河道主事一員復減巡河御史二員以巡鹽御史兼理三年設山東府州縣管河官六年令總督漕運都督兼理河道天順元年減淮安臨清沙灣巡河主事三員仍差主事一員管揚州一帶河道成化初定設主事一員專管寧陽縣等處泉源七年始分河道為三節北自通州至德州南自沛縣至儀真各屬郎中一員中自德州至濟寧屬山東按察司官一員又以侍郎一員總理罷主事御史惟管洪閘主事如故八年復令長蘆巡鹽御史兼理通州臨清一帶河道又御史一員兼理濟寧至南京河道十三年奏淮管河郎中兼理河道驛傳捕盜夫役等事又令河道自通州至濟寧濟寧至儀真仍以郎中二員分理十九年令沛縣沽頭等閘别差主事一員提督二十一年罷河南布政司管河沁二水官添設主事一員𢎞治元年罷沽頭閘主事令濟寧以南河道令巡鹽御史兼理又罷管河沁二水主事令徐州洪主事提調三年令山東勸農參政兼理山東河道又令各府州縣管河官帶領家口專在該管去處坐住管理河道不許私回衙門營幹他事七年復差沽頭主事八年因治河工完奏準仍以河道分三節設官三員理之革淮揚二府山陽等縣管河通判主簿十八年令浙西水利僉事濬常鎮河道以便糧運正德二年革河南新鄉獲嘉武陟等縣管河主簿八年設大名府通判一員東明長垣武城曹縣主簿各一員專管河道嘉靖二年復罷沽頭閘主事并罷湖陵沽頭上中下金溝射溝新興黃家等八閘官吏令徐州洪主事帶管又議準遣都御史一員提督河道事務山東河南南北直𨽻巡撫三司等官俱聽節制仍添設郎中員外郎各一員分理七年罷提督衛河提舉司主事令管磚主事帶管閘座又以修濬大通河成設郎中一員駐劄通州往來督理兼管天津一帶河道八年罷户部督運官令管河郎中兼理又令徐州兵備副使兼理曹沛徐淮一帶黃河十三年復設沽頭閘主事并新興黃家湖陵等七閘官吏人夫十四年復設直𨽻景州滄州管河通判十五年設兖州府同知一員疏濬泉源聼管泉主事提調又令清江浦抽分主事兼管移風等五閘二十年設南旺管閘主事置饒山鎮閘及官吏人夫又令濬南旺安山馬場昭陽四湖築堤開渠添置閘壩斗門仍照地界分𨽻本部郎中帶管二十四年革南旺管閘主事令管泉主事帶管添設歸德府通判一員商邱縣主簿一員專管河道二十五年改兖州府管泉同知駐劄曹縣添設單縣管河主簿一員隆慶元年移沽頭主事于夏鎮駐劄管理新河一帶三年革棗林魯橋利建各閘官以南陽閘帶管革師家莊新閘閘官以仲家淺帶管六年添設河南副使一員給敕專管黃河修築隄岸又題復夏津魚臺二縣各主簿一員專管新河石隄閘壩設廣惠閘官吏帶管通惠閘萬厯元年題準蘇常鎮三府運河責之蘇松兵備副使浙西運河責之浙江水利僉事照所轄地方時加疏濬如有疏濬不早致誤糧運者俱聽總理河道侍郎并儧運御史參究革移風閘帶管板閘官吏三年革兖州府南旺管河通判令本府管河同知帶管仍兼管泉濟寧衛管河指揮一員四年添設山東督濬官東平濟寧二州各判官一員泰安州吏目一員汶上曲阜鄒滕四縣各縣丞一員泗水魚臺二縣各主簿一員新泰萊蕪肥城平陰寧陽滋陽嶧七縣各典史一員巨野嘉祥各典史一員每州縣設管泉義官一員或兼管壩惟魚臺平隂不設泉官以濟寧東平帶管又泰安州泉官二員革一員鄒嶧二縣各泉官俱革以濟寧滕縣帶管其各州縣管泉老人並革添設淮安府管河同知一員五年添設總理河漕都御史一員後以工完停止革提督河道都御史其事務并歸各該巡撫照地分管又革呂梁洪主事添設中河郎中一員駐劄吕梁兼管洪事六年革徐州洪主事併屬中河郎中兼管其鈔務歸併户部分司七年議準山東河南南北直𨽻各巡撫銜內添兼管河道四字給與專敕添設髙堰栁浦二隄大使一員歸仁集遙隄義官一員八年革土橋李海務二閘閘官以良家鄉周家店官各帶管十一年議準淮安府管河同知二員原駐邳州者改于甘羅城專管清桃山鹽等處河道駐徐州者改于邳州管徐州至宿遷河道設梁境古洪各閘官一員內華閘以古洪帶管十三年令山東濟青登萊四府管糧通判及所屬州縣管糧官俱帶管水利凡漕河正閘各設閘官一員吏一名其無官吏者以别閘帶管明會典明太宗永樂二十一年五月丙戌設直𨽻淮安府山陽縣移風閘置閘官一員明太宗實録明英宗天順元年七月戊子初工部奏河道有郎中主事及巡河御史管理上敕右都督徐恭專管漕運至是恭言平江伯陳瑄總督漕運兼理河道今令臣不得兼理河道恐有悮漕運上從之令如平江伯故事十月乙巳漕運總兵右都督徐恭奏揚州一帶寶應汜光邵伯髙郵等處隄岸衝決數多清江提舉司造船主事不能兼理乞增設管河主事一員從之明英宗實録按國初或以工部尚書侍郎侯伯都督提督運河自濟寧分南北界或差左右通政少卿或都水司屬分理又遣監察御史錦衣衛千户等官巡視其沿運河之閘泉及徐州吕梁二洪皆差官管理或以御史或以郎中或以河南按察司官後皆革去而止設主事三年一代然俱為漕運之河不為黃河也惟總督河道大臣則兼理南北直𨽻河南山東等處黃河亦以黃河之利害與運河同也總督之名自成化𢎞治間始或以工部侍郎或以都御史常于濟寧駐劄其河南山東二省巡撫都御史則璽書所載河道為重務又二省各設按察司副使一員專理河道山東者則以曹濮兵偹帶管其巡視南北運河御史亦以各巡鹽御史兼之不别差也成化十年令凡漕河事悉聽專掌官區處他官不得侵越凡所徵樁草并折徵銀錢備河道之用者毋得以别事擅支凡府州縣添設通判判官主簿閘壩官專理河防不許别委凡府州縣管河及閘壩官有犯行巡河御史等官問理别項上司不得徑自提問治河通考明憲宗成化二十二年十月巳丑户部會官議覆漕運巡撫等官所陳事冝一揚州府朝宗二閘宜增設閘官一員從之明憲宗實録明孝宗𢎞治三年五月增置濟寧州廣運上閘設閘官一員明孝宗實録明孝宗𢎞治八年九月丁未裁革揚州淮安二府管河通判及山陽清河睢寧儀真四縣管河主簿各一員明孝宗實録缺淮揚二府所屬河務多矣所設通判主簿斷不可無端裁革殊不可解冝乎後來部議之不從何臺中所奏也明孝宗𢎞治十七年五月丁巳工部覆議監察御史何天衢所陳裁革管河冗員之奏謂先年安平鎮衝決始則甚微本處官司互相推調遂成大患朝廷特遣大臣修築動費萬計終年不巳今天衢所言固節財省費之意但管河郎中比别項官不同專選主事止是分管洪閘其餘河渠壩堰隄岸決口或溢或涸與夫樁草之徵需官夫之代替至如蓄少泄餘興利除害專官督理尚恐有失設若革去萬一如先年衝決及今年旱乾舟楫阻滯誰任其責况今廷臣議奏專設之數未可裁革從之明孝宗實録正德七年敕命都察院右副都御史劉愷總理河道愷擢兵部侍郎掌通政司事回京整理曹州等處兵備兼理河道山東按察司副使吳漳督同曹州知州吳瓚濟寧州同知賈存哲往來巡視祭告河神獲完達撫按請大臣總理擢巡撫都御史趙璜為工部右侍郎仍兼憲職總理其事璜請兖州府添設同知大名府添設通判曹縣武城東明長垣各設主簿一員專事河防璜具工完始末繪圖以聞治河通考明世宗嘉靖元年六月丁酉河南考城縣添設管河主簿一員從總理河道侍郎李瓚奏也明世宗實録明世宗嘉靖十年五月辛丑裁革嘉祥東阿館陶三縣管河主簿添設景州滄州管河判官明世宗實録明世宗嘉靖十四年二月戊申裁革直𨽻豐縣河南陽武縣管河主簿各一員復設直𨽻景州滄州管河判官河南原武封丘蘭陽儀封夏邑等縣管河主簿各一員添設河南睢州歸德州管河判官及直𨽻蕭縣主簿各一員明世宗實録復景州滄州既于十年添設判官矣至是又設之豈二州設有兩員耶明世宗嘉靖十七年三月庚辰增設河間府所屬故城吳橋東光南皮交河興濟青縣靜海等縣主簿各一員專管治河裁革兖州府同知一員單縣豐縣主簿各一員從河道都御史于湛奏也明世宗實録按明初之制自瓜儀以至通州河道皆屬漕撫設郎中二員南北專理之其諸洪閘各有主事一員專司漕運都御史敕諭則各有自通州至揚州一帶水利皆當蓄泄者嚴飭該管官司并巡河御史管河管洪郎中等官設法疏築以便糧運怠職誤事者一體參奏凡有便于糧運者利于軍民者悉聽爾等便冝處置之命河漕事原歸一其後偶遇黃河潰決則專敕大臣一員往治竣事還京不常設後遇有水患遂以為定員其職專管黃河於曹州駐劄河南山東管河副使則屬之管河郎中洪閘主事不相屬也故總河敕云今特命爾前去總理河道其黃河北岸長隄并各該隄岸應修築者亦要著實用工修築髙厚以為預防之計如各該地方遇有水災即便相度訪究水源可以開通分殺并可築實隄防處所仍嚴督各該管官員斟酌事勢緩急定限工程分投用工作急修理凡修河事冝敕內該載未盡者俱聼爾便冝處置事體重大者奏請定奪此原敕也後增入云近年沛縣迤北漕河屢被黃河衝決已經差官整理今特命爾前去總理河道督率管河管洪管泉管閘郎中主事及各該三司軍衛有司掌印管河兵備等官時常往來親厯多方經畫遇有淤塞去處務要挑浚深廣蓋此敕亦為黃河衝塞漕河故有是命其實專為黃河也先年總漕都御史每嵗押糧運進京會議往回查看河道其後私託巡按奏留自嘉靖元年都御史俞諫後更不赴京矣至嘉靖二十年二洪淺阻糧運不通總漕乃具疏盡推河道奉旨切責自管河都御史而下俱戴罪料理自此總河總漕分為二竟以漕為米不知為河矣而且彼此水火漕法始亂靳文襄公治河書明世宗嘉靖二十六年閏九月乙酉復設山東兖州府管河同知單縣管河主簿各一員明世宗實録總按此可見十七年河于湛奏裁之非是也明世宗嘉靖四十一年二月庚申裁革山東夏津直𨽻吳橋興濟河南商丘四縣各管河主簿一員明世宗實録設官分職在祖宗朝原有深意山東河南各縣河務殷繁之所河官專責豈容旋復旋革紛更制度甚矣明中葉君臣紀綱之紊亂也漕河經始官無定員當其時故道久廢天子鋭意規畫一時恢𢎞奇偉之士獻智略者輻輳上前故自工部尚書宋禮都督周長平江伯陳瑄而下有若尚書劉觀侍郎藺芳張信新寧伯談清襄城伯李隆員外郎夏濟主事劉文勇等凡數公往來督視其後河工既成天子重其事遣泰寧侯鎮逺侯新寧遂安兩伯分理濟寧諸閘及徐吕二洪通州諸處河道最後遣大理少卿工部郎中員外主事監察御史河南按察副使等官景泰二年都御史王竑始奉敕總漕兼領河道自通州至揚州一切水利有當蓄泄者得以便宜督所司行之六年乃命都御史陳泰提督濟寧至儀真瓜洲河道亡何罷不設成化六年漕河處處淺澀遣户部尚書薛逺工部侍郎􅔬毅分行疏濬御史丁川上言請如先年用陳泰事專設提督官令其久任工部議以為運河洪閘有本部郎中一人主事八人巡河御史二人河南黑羊山有參議一人山東張秋河道有僉事一人兖州有同知一人管泉及各府皆有通判一人管河立法已密冝勿設便至是言者復以為河道因無專主以至廢弛乃命郎中陸鏞郭升分治南北副使陳善則治沙河以北德州以南而刑部侍郎王恕總之主事則分理洪閘其提督淮安至儀真河道主事及巡河御史奏罷不用自恕以後總理不復設間值河有他故遣大臣行視圖方略治之事竟還朝正德十一年始專設總理以工部侍郎兼都御史或左右副都御史兼侍郎兼軍務其沿河分理河務則有工部郎中三人北河張秋一中河吕梁一南河髙郵一又通惠員外一人主事五人一臨清一南旺一夏鎮一徐州一青江浦隆慶元年始分巡漕御史兼管其各府州縣瀕漕河者長吏與有修治之責此外有管河同知通判州判主簿等官專領其事衛亦有巡河指揮諸閘壩有閘官壩官南河全考明永樂都燕最重漕政始差主事一員疏𨗳山東泉源及分汶水以利漕其後或以通政少卿及監察御史錦衣衛千户等官巡視運河閘泉宣德中設主事管理濟寧閘座兼管河道又設主事提督徂徠等處泉源巳而罷遣以山東參政副使管理河漕天順二年以河南道副使一員整理濟寧以北河道成化初改命通政駐劄張秋掌衛河會通河漕政北至天津南至魚臺一帶凡泉湖閘壩隄淺之事皆𨽻焉旋以山東副使兼攝之尋改都水司郎中奉敕行事凡沿河有司及管河文武官員悉聽節制又除都水司主事二員奉部檄行事一駐劄寧陽管泉源一駐劄濟寧管閘座其南陽以南沛縣所轄用平江伯陳鋭議命主事一員駐劄于上沽頭以治水事𢎞治十八年以南旺南北二閘係水泉總會分派之所最為要害二閘一官一吏管理職卑任小往來官豪得以擅自啓閉常至走泄水利糧艘淺閣别設分司以寧陽管泉主事兼攝之正德間專差主事一員駐劄南旺又設主事一員管理臨清閘座嘉靖間罷遣南旺主事仍以寧陽主事兼攝其政亦罷臨清主事屬其事於甎厰移沽頭分司于夏鎮隆慶初議併濟寧閘務於管泉主事遂以都水主事一員管理徂徠等處泉源兼管南旺濟寧閘座改稱南旺分司萬厯十六年以科臣張居敬請夏鎮南旺各給關防以重事權山東全河備考漕河至山東為府者三為州者四為縣者六自魚臺至臨清得洸汶泗沂四水其泉百七十餘會於四水而分流於漕渠有水部郎一人以掌之為閘凡三十有守津吏以啓閉為淺凡二百二十各有津老以時疏治又黃河常決張秋決曹單魚臺其道非一有司空兼御史臺一人水部郎一人按察副使一人統州邑判官主簿以分治其事漕河之有藉於山東者煩重如此此舊制也唯有水性遷徙靡常隆萬之間總河潘季馴為之疏浚建置凡湖河壩口泉閘多所創修山東通志自虞舜命伯禹作司空帝曰俞咨禹汝平水土至秦漢有都水長丞漢武帝以都水官多乃置左右使都以領之成帝以王延世為河隄使者哀帝初平當為巨鹿太守以明禹貢使行河為騎都尉領河隄晉武帝置都水臺而河隄為都水官屬梁改都水使者為大舟卿其最卑者主舟航河隄後魏初有水衡都尉及河隄謁者都水使者隋煬帝河渠署置令丞各一人唐因之開元中以宇文融為九河使石晉置隄長宋置都水監黃御等河都大提舉巡河主掃使提舉河防司元以工部尚書為總治河防使明或以工部尚書侍郎侯伯都督提督運河自濟寧分南北界或差左右通政少卿或都水司屬又遣監察御史錦衣衛千户等官巡視運河閘泉宣德以後遣郎中一人提督濟寧河道主事一人提督徂徠等處泉源已而部郎罷遣以山東參政副使管理河漕天順二年以河南道副使一員整理濟寧以北河道成化初改命通政駐劄張秋掌衛河會通河漕政北至天津南至魚臺一帶凡泉湖閘壩隄淺之事皆𨽻焉旋以山東副使兼攝之巳改都水司郎中奉敕行事凡沿河有司及管河文武官員悉聽節制又除都水司主事二員奉部檄行事一駐劄寧陽一駐劄濟寧掌諸泉源閘壩之政凡有司管泉管河官員皆屬焉𢎞治十八年南旺别設分司以寧陽都水兼攝正德十四年專差主事一員駐劄南旺嘉靖二十四年罷遣南旺主事而以寧陽主事兼攝其政隆慶三年罷遣濟寧主事而三分司之政俱屬寧陽今止南旺分司一員駐劄濟寧管理泉閘其臨清閘座則正德間設都水司主事一員管理嘉靖七年罷之而屬其事於甎厰甎厰今順治八年裁歸併北河然地雖分管而總理之者北河郎中也其在所屬者文武官郡有丞判州有判縣有簿尉閘有官衛有指揮所有千百户今易以守備千總各守其疆不相踰越北河續紀明神宗萬厯二十五年十二月乙卯初設備倭遊擊一員於濟寧州地方聽河道總督山東撫鎮節制以濟寧乃運道咽喉宜防倭侵犯從河道尚書楊一魁之請也明神宗實録明神宗萬厯三十三年四月丁未以順天府通州管河同知改兼土壩專督通糧事務管糧通判官改兼石壩專督京糧白糧事務俱選用正途三年之內果賢能稱職咨部優轉明神宗實録行水金鑑卷一百六十五
