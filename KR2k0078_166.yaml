body:
  text: 行水金鑑卷一百六十六江南按察使傅澤洪撰官司國家漕運全資黃運兩河特設河道總督一員駐劄濟寧總理兩河事務至於通惠北河南望夏鎮中河南河衛河各設分司管理以下俱大清會典通惠河分司駐劄通州順治初差漢司官一員三年更代十二年添差滿洲理事官一員筆帖式一員一年更代十四年裁滿官三年更代康熙元年復設一年更代六年裁九年復差滿司官一員筆帖式二員三年更代十年裁筆帖式十八年照內外河差例一年更代二十年仍改三年更代二十三年改令各部院衙門掣籖差遣北河分司駐劄張秋順治初差漢司官一員三年更代康熙九年添差滿司官一員筆帖式二員十年裁筆帖式十七年裁分司歸併濟寧天津二道管理南旺分司駐劄濟寧州順治初差漢司官一員三年更代康熙九年添差滿司官一員筆帖式二員十年裁筆帖式十五年裁分司歸併濟寧道管理夏鎮分司駐劄夏鎮順治初差漢司官一員三年更代康熙九年添差滿司官一員筆帖式二員十年裁筆帖式十五年裁分司原管滕嶧二縣河道閘座歸東兖道管理沛縣河道閘座歸淮徐道管理十七年滕嶧河務改歸濟寧道管理中河分司舊駐呂梁洪後移駐宿遷縣順治初差漢司官一員三年更代四年添差滿司官一員八年裁十二年復差滿官一年更代十四年裁其間有三年更代四字疑衍康熙元年復差一年更代四年裁九年復添滿司官一員筆帖式二員十年裁筆帖式十七年裁分司分歸淮揚淮徐二道管理南河分司駐劄髙郵州順治初差漢司官一員三年更代康熙九年添差滿司官一員筆帖式二員十年裁筆帖式十七年裁分司分歸淮揚淮徐二道管理衛河分司駐劄輝縣順治十三年差漢司官一員本年裁歸衛輝府同知兼理十四年復差三年更代康熙四年裁歸分守河北道及衛輝府通判管理六年裁河北道令通判專理九年復設河北道順治初設河南管河道一員駐劄開封府康熙五年裁九年復設濟寧管河道一員駐劄濟寧州康熙六年裁九年復設開封府南河同知一員駐劄本府專管南岸河務康熙七年裁歸清軍同知九年復設開封府北河同知一員駐劄祥符縣陳橋鎮專管北岸河務歸德府河捕通判一員駐劄考城縣專管歸屬南北岸河務康熙七年裁九年復設又商邱虞城考城三縣管河主簿各一員懷慶府糧河通判一員駐劄本府河內武陟二縣管河縣丞各一員徐屬河務同知一員駐劄徐州邳宿同知一員駐劄邳州山清同知一員駐劄淮安府康熙九年設宿桃同知一員駐劄宿遷縣桃清同知一員駐劄桃源縣歸仁堤同知一員駐劄宿遷之白洋河兼設宿遷縣主簿二員桃源縣主簿一員各隨同知駐劄十年設淮安府同知一員安東縣主簿一員俱駐劄安東縣又巨野縣管河主簿一員十三年設淮安府同知一員駐劄盱眙縣又盱眙縣主簿一員十七年裁山清同知將河務歸併旴眙同知管理改為山清盱𣅿同知駐劄淮安府外河裁安東同知併山清同知原管外河河務俱歸宿桃同知管理改為山清安海同知駐劄安東縣裁桃清同知將河務歸併歸仁隄同知管理改為宿桃歸仁同知駐劄白洋河其邳宿同知改為邳睢靈璧同知仍駐邳州以上俱大清會典世祖章皇帝順治四年五月日工部覆總河楊方興為分司權輕判簿職微仰祈皇上嚴飭道印各官毋誤河工事看得河道修濬工程責任料理在分司佐二其地方夫役治辦物料皆賴於道府州縣正官故前朝議定凡有關河務者年終列名考成如或有誤一體題參移咨吏部按以降調黜革戴罪之例今總河臣具題道印等官視河務非己任而整飭措辦之責全不料理卸擔於分司佐二以致漕河廢弛已極請飭前來伏乞敕下臣部咨行山東河南督撫按衙門嚴行申飭各道府州縣印官照依往例務要同心協理無誤河務如有仍前故違許該督撫按即指名題參請旨治罪庶人心知警而河道有賴矣奉旨依議行河南管河道治河檔案世祖章皇帝順治十年正月日工部覆總河楊方興為河患日亟夫料日艱請復舊規責成印官募夫辦料以濟急工毋誤河漕事看得治河要務全在責成得人今據河臣楊疏稱欲以修築責之河官募辦責之印官且照新增之數夫給現銀料給現價於治河各官功罪相同鼓舞有法河工喫緊無出於此合應復請敕下總河臣會同督撫按嚴行司道府縣印官嗣後凡係河務俱要印河等官相助為理不得推諉永著為令如有故違聽河臣指名參處奉旨以後河務著各司道府州縣官同河官協力料理有推諉的河道總督指名參處河南管河道治河檔案世祖章皇帝順治十六年三月日吏部覆總河朱之錫為申明激勸大典事據總河朱之錫疏稱前吏部覆臣特請嵗行舉劾之例一疏內敕下該督每年嵗修告竣即行舉劾奉有依議行之旨於內督撫年終舉劾奉旨停止不敢冒昧具題今十五年河工久已報竣合無仍遵前旨亦合令臣照例分别舉劾以示勸懲再照管河佐二等官亦應量擇其尤另疏薦録至於貪婪不職一槩題參等語查十五年九月臣部覆漕督亢請眀漕竣舉劾之例一疏內議總漕衙門似難與督撫事例同論相應仍舊舉劾奉有依議之旨今河臣專司河道原就本年濬築之勤惰别其臧否若槩停舉劾則管河之官無以勸懲不便與督撫事例同論相應如其所請照舊舉行至管河佐二等官職雖微其河工之責成頗重如有勤勞盡職者應行荐舉寧嚴勿濫其貪婪不職者聽河臣一體題參可也奉旨依議河南管河道治河檔案聖祖仁皇帝康熙十六年為謹酌河工繁簡等事總河王光裕題奉旨將南旺夏鎮二司所管河道泉源閘座夫役等項歸併濟寧東兖淮徐三道分管山東兖寧道册聖祖仁皇帝康熙十七年七月日總河靳輔題為敬陳經理河工事宜第七疏事臣惟修治河工必先以措設錢糧為要今措設錢糧之處已經臣條議上請倘蒙皇上俞允則大工自應刻期興舉矣惟是大工興舉之日協理必需多員而大工告竣之後保護尤資羣力與夫事可兼攝者則冗員應裁權宜歸一者則職守應併是皆當因時度宜先為酌𣲖定其責成使之可遵可守無紛雜掣肘玩忽坐誤之弊庶可望其樂於黽勉不為推諉而共相維持以保永久也竊思臣身任總河凡直隸東豫江浙各省有河地方并河務河官皆臣總理統轄不待言矣其自臣而下兼理兼轄者則為分司各道專管者則為廳印諸員分管者則為各州縣之佐二雜職等員雖官無大小各有所司然其職掌之紛淆事權之雜出以致掣肘貽誤者皆宜確議釐定也查河道項下興修守護等事既有專管分管各官駐宿河干朝夕料理其司道等官原以兼總大綱承上接下膺督率屬員指揮提調之任只須一官而兼轄數府不必一府而兼設數官也今淮揚兩府既設淮揚道淮徐道又設南河中河兩分司其間實多冗贅兹臣於司道之中權衡攸當竊見分司三年一換自以一官為傳舍而他人亦以客官目之未免呼應不靈且無地方錢榖刑名之任其於民情之休戚風俗之姦良不能一一熟察道臣係久任之官則凡所舉行必圖久逺而又兼管錢榖刑名之事於地方情形自能周知一切調撥協濟事宜庶易得當而官民之奉行尤稱惟謹臣愚以為宜將南河中河兩分司裁去其該管各務量其地形事勢分歸淮揚淮徐兩道兼理淮郡之山陽清河安東鹽城海州沭陽贛榆并揚州府屬河道俱責成淮揚道兼理令該道仍駐淮安郡城其淮郡之桃宿邳睢并鳯陽府之靈璧以及徐州所屬河道俱責成淮徐道兼理令該道移駐邳州至北河通惠兩分司亦應併裁將北河分司事務照省歸併分交濟寧天津二道管理通惠分司事務交給通永道管理又東兖道逺駐沂州而兼轄滕嶧兩縣河務亦屬未當應併歸濟寧道兼理庶為妥協也又淮安一府共有同知十員而管河者居其八皆係節次添設也殊不知河工事務全在用人之當而不在設官之多矧知河之法疏浚防塞各有攸宜同知為專管官與分管防守之佐雜微員不同乃畫河為兩岸而分管之是竟置河於不問矣且其間有彼此意見不同而推諉觀望者有屬員奉行不一而奔命不遑者事權之雜出誠為未便也臣愚以為同知八員之內今宜裁去三員將山清同知原管運河事務歸併山盱同知多𢎞安管理駐淮安府山清同知原管外河并安海同知河務俱交宿桃南岸同知董安國管理改為山清安海同知駐安東縣俱令淮揚道兼轄宿桃兩縣河務并歸仁一隄俱歸併歸仁同知佟國聘管理改為宿桃歸仁同知駐白洋河邳宿靈璧三州縣河務仍令邳宿同知蘇嵋管理改為邳宿靈璧同知仍駐邳州徐屬同知事務仍令祖文眀管理仍駐徐州俱令淮徐道兼轄其所裁山清同知魏師段安海同知李朝事宿桃山清北岸同知黃道𢎞俱應赴部改補又宿桃兩縣既有主簿四員理應每縣各設二員不宜彼此牽混臣請將宿遷主簿王振先改為宿遷北岸主簿宿桃南岸主簿改為宿遷南岸主簿桃源縣主簿王金改為桃源南岸主簿宿桃北岸主簿夏文象改為桃源北岸主簿庶職掌畫一而無混淆之虞此臣所謂事可兼攝冗員應裁權宜歸一職守應併者是也若夫河道一事攸關民生休戚地方安危良非渺小凡膺民社之寄者皆當曲圖補救力為保護不宜徒諉河官坐視敝壞如撥夫運料等事在正印官有人民地方之責設法自易其管河同知通判等官與民絶不相親於錢榖刑名街坊里下諸務毫無關涉安能設施且府州縣之正印官往往視河務為餘事目河官為贅瘤雖遇疾呼未必馳救每有膜不相關之狀而無同舟共濟之情以致掣肘誤工不一而足臣請嗣今以後凡遇河防沖決之事不論欽工民工俱倣照盜案之例將該管之道府廳州縣佐雜等官一併照例題參議處仍勒限半年修復完固亦照盜案定承修督修之例而責成之如有諱決者照諱盜例處分至於薦舉大計等典凡有河地方之司府州縣正印并道廳佐雜等官俱將河工之治否一併考成以分殿最必任內無河道沖決之事并遇決旋修不致殃民損課者方準保舉卓異如此庶各官知警共相維持綢繆於未雨之先而河道之沖決自少即有沖決亦自速為修治不致蔓延滋害如今日之甚此臣所謂大工告竣之後保護尤資羣力者是也以上事宜皆指平日而言如蒙俞允則可為將來章程靳文襄公治河書聖祖仁皇帝康熙二十四年九月日總河靳輔疏稱豫省河道居江南之上遊豫省河道安則江南之河道亦安臣亦於另疏陳眀矣惟是河道全資修守而修防專賴得人是以州縣管河官員品職雖微而關係甚重非年力強壯熟諳河工者不足勝任也又已得幹員矣尤必諒其力所能及者而責成之庶不致於貽誤今豫省沿河如蘭陽儀封滎澤三縣兩岸均有堤工俱長數十餘里乃向來止有管河官一員不特奔馳難及而每嵗伏秋異漲之時處處出漕河面寬數十餘里且急溜非常一過渡而費窮日工夫安得依往來修守之計又如虞城縣堤長百里而修防僅有一主簿亦萬難兼顧者也此四縣者必須添設河官四員但增官勢必增俸是以臣等行令藩司河道等官酌裁可省之員添設至緊之缺今據該藩司郎永清該道祖文明等再三酌議前來查濟源縣原無修防之責所有額設主簿一員儘可裁去又修武封邱兩縣縣丞虞城石榴堌驛驛丞職掌俱間均可裁去內一議裁濟源縣主簿一員移設蘭陽改為蘭陽縣管河主簿與見任蘭陽縣縣丞分管該縣兩岸工程一議裁修武縣縣丞一員移設儀封改為儀封縣管河縣丞與見任儀封縣主簿分管該縣兩岸工程一議裁封丘縣縣丞一員移設滎澤改為滎澤縣管河縣丞與見任滎澤縣主簿分管該縣兩岸工程一議裁虞城縣石榴堌驛驛丞一員另添設虞城縣管河縣丞一員與見任虞城縣主簿分管該縣工程又陽武縣主簿止能管北岸工程其南岸工程查該縣見有縣丞一員應歸該縣丞就近管理又原武南岸有堤六百餘丈界在鄭州境內應歸併鄭州見任州判帶管更查得山東單縣有南岸堤工二千餘丈錯雜於河南虞城縣堤內應該歸歸德府管河通判督虞城縣印河官就近修防河南考城縣北岸有堤工五千餘丈界連山東曹縣境內應換歸兖州府黃河同知督曹縣印河官就近修防內考城北岸堤工甚為殘損應俟修完更換如此一轉移間而繁簡緩急均得其宜修防者足以施其力則責成既專自免貽誤之虞矣除山東省尚有未盡事宜容臣會同東撫臣核眀另題外臣謹會同河南撫臣王日藻合詞題請伏乞皇上睿鑒敕部議覆施行奉旨該部議奏部議覆皆如其請奉旨依議河南管河道治河檔案聖祖仁皇帝康熙三十一年十二月日吏部等衙門為微臣在河言河等事會覆原任河道總督靳疏稱山東東昌府通判原管德州等十餘州縣衛河道共計六百餘里道里綿長不能分身兼顧今查德州有原設管河州判一員但德州河道止一十八里誠可歸併州同帶管將此州判裁去添入東昌府改為下河通判分轄德州一州二衛恩縣夏津武城直隸之清河故城八州縣衛河道駐劄武城縣仍以見任通判改為上河通判分轄聊城堂邑博平清平臨清館陶六州縣河道駐劄郡城又直隸河間府管河通判一員專轄景州吳橋等十一州縣衛河道綿長八百里內天津同知止於分催滄州青縣靜海并天津三衛六州縣衛之重空漕船其修防疏浚之事不與焉今應將景州吳橋東光交河南皮五州縣河道與夫重運回空漕船照舊責令通判修防挑浚催儹外其滄州青縣靜海三州縣并天津三衛河道與夫重空漕船一併分與天津同知專管修防挑浚催儧至青縣河道二百餘里主簿一員不能兼顧應於該縣興濟鎮巡檢分管料理又直隸故城縣河道夾在山東武城恩縣兩縣之中江南沛縣河道夾在山東魚臺滕縣兩縣之中故城見隸河間府管河通判專轄逺住泊頭沛縣見隸徐屬同知專轄逺住徐州俱不能兼顧應照直隸清河縣例將故城改隸山東東昌府下河通判兼轄將沛縣改隸山東泇河通判兼轄至凡有河道州縣俱有管河丞簿以專司之今山東博平一縣直隸之香河南皮吳橋故城清河五縣俱無專員乃係典史帶管夫典史有城社捕盜之責不能兼管河道查鄰近地僻之縣可以不設縣丞並有丞簿兼設之縣如山東之冠縣直隸之魏縣南樂清豐東眀元城滑縣等縣俱可通融裁併應將冠縣縣丞裁去改為博平縣管河縣丞將魏縣縣丞裁去改為吳橋縣管河縣丞將南樂縣縣丞裁去改為故城縣管河縣丞將清豐縣縣丞裁去改為清河縣管河縣丞再查大名府元城滑縣各有縣丞主簿兩員應將元城縣主簿裁去改為香河縣管河主簿將滑縣主簿裁去改為南皮縣管河主簿所遺元城滑縣衛河河道并長垣縣新經黃河徙至境內創築堤工俱應歸併各縣縣丞又大名縣亦有衛河並無專責應將東眀縣縣丞裁去改為大名縣衛河縣丞專管而責成之並濬縣內黃二縣管河縣丞俱令大名府通判管轄至於河南丹衛兩河每年春夏之交資其束河濟運而修武湯隂兩縣並無專設河員應將尉氏縣縣丞裁去改為修武縣丹河縣丞並河內武陟管河縣丞令懷慶府通判管轄再將永城縣縣丞裁去改為湯隂縣衛河縣丞又安陽縣洹水流入衛河濟運應令該縣縣丞專管疏浚一併交與彰德府通判管轄又衛輝府汲縣新鄉獲嘉淇縣管河縣丞輝縣管河主簿相應交與該府通判管轄再江南揚州府管河通判管轄髙寶江儀四州縣之運河事務頗繁更兼興泰如通四州縣之下河地方遼闊一員不能兼顧且下河已設立運河減水壩又且建閘疏通一切溝洫渠堰必得專員豈可置之不問應將下河興泰如通并范公堤串場河等處分與揚州府管糧通判兼管移駐泰州至泰州幅􅊷甚廣州判一員亦難總理應於該州州同酌量分管以期無誤若夫如臯縣亦無管河專員查泰興縣偏僻空間亦應將縣丞裁去改為如臯縣管河縣丞其通州興化鹽城海州四州縣河道俱應責成該州縣州同州判縣丞管理而今廟灣同知兼轄鹽城海州知州兼轄州同等因具題前來查通判縣丞主簿等官俱各照事設立之員倘若更調各官職務以致廢弛亦未可定且黃運兩河俱設專員責成分管巳經年久若照所題更調事屬繁多相應將原任總河靳輔所題之處毋庸議奉旨管河官員更調設立之處俱著照該督所題行河南管河道治河檔案行水金鑑卷一百六十六
