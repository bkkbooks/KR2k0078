body:
  text: 行水金鑑卷一百七十江南按察使傅澤洪撰夫役宋元以前不録斷自勝國以其近而可倣也運河夫役在各泉閘原額頗多後或議裁革或改停役停役夫候大挑調用或徵銀一兩六錢為銀差或改折徵折徵每名歲徵銀六兩貯庫沿革不常今斷自萬厯四年為則新舊額數備載焉以下俱明會典宛平縣青龍等閘五共夫七十五名大興縣慶豐等閘三共夫四十七名通州普濟等閘五共夫九十三名淺鋪十小甲十名夫一百名修堤小甲八名夫七十五名通州左衛淺鋪二小甲二名夫二十名修堤小甲三名夫二十六名通州右衛淺鋪四小甲四名夫四十名修堤小甲四名夫三十六名定邊衛淺鋪二小甲二名夫二十名修堤總甲一名小甲四名夫四十五名神武中衛淺鋪三小甲三名夫三十名修堤小甲五名夫四十五名寶坻縣修堤小甲四名夫四十六名東安縣修堤總甲一名小甲六名夫七十名漷縣淺鋪四小甲四名夫四十名修堤總甲二名小甲八名夫九十名香河縣淺鋪六小甲六名舊用老人夫六十名修堤總甲一名小甲三名夫四十名營州前屯衛淺鋪四小甲四名夫四十名修堤總甲一名小甲二名夫二十四名看淺夫三名武清縣淺鋪十一小甲十一名夫一百一十名看守耍兒渡口等堤五處總甲一名小甲五名夫五十名修堤老人一名總甲二名小甲九名夫九十二名武清衛淺鋪四小甲四名夫四十名修堤總甲一名小甲一名夫九十九名天津衛淺鋪十二舊十一小甲十二名夫一百八名今存二十四名軍夫六十名修堤小甲五名夫四十五名天津左衛淺鋪二十四小甲二十四名夫二百十六名今存四十八名軍夫一百八十名修堤小甲五名夫四十五名天津右衛淺鋪十小甲十名夫九十名今存二十名軍夫五十名修堤小甲五名夫四十五名霸州蘇家等淺鋪十一舊十老人十一名夫一百十名修堤夫二百六十名靜海縣淺鋪九老人九名夫九十名修堤夫六百名青縣淺鋪六老人六名夫六十名修堤夫六百十六名興濟縣淺鋪七老人七名夫七十名內軍夫二十名民夫五十名滄州淺鋪七老人七名夫七十名交河縣淺鋪五老人五名夫五十名修堤夫三百名南皮縣淺鋪五老人五名夫五十名修堤夫三百五十名景州淺鋪四老人四名夫四十名修堤夫二百名吳橋縣淺鋪十老人十名夫一百名修堤夫四百五十名故城縣淺鋪三老人三名夫三十名修堤夫八十名東光縣淺鋪七老人七名夫七十名德州上八里等淺鋪七舊六老人七名夫一百四十名後折徵七十名今存七十名以上俱明會典濟南府德州自衛河東岸德州衛之張家口至恩縣之四女樹四十一里又自西岸左衛之鄭家口至德州衛之楊烏屯二十里置淺鋪六下八里屯淺四里屯淺耿家灣淺劉皮口淺蔡張成口六人夫六十人州上八里堂淺六鋪老人判官一人山東通志德州衛張家灣等淺鋪十舊八小甲十名軍夫一百名舊每鋪九名以下俱明會典德州左衛鄭家口等淺鋪六小甲六名軍夫六十名舊每鋪九名恩縣白馬廟等淺鋪七舊五老人七名夫七十名今存三十五名撈淺夫二十八名今存十四名沙灣修堤大户夫七十五名以上俱明會典恩縣衛河之東岸自四女樹至武城之白馬廟七十里置淺鋪五新開淺回龍廟淺滕家口淺髙師姑淺白馬廟淺五鋪老人五人夫五十人守口夫七十五人山東通志武城縣桑園口等淺鋪二十九舊二十六老人二十九名夫二百六十一名後折徵八十七名今存一百七十四名沙灣修堤守口大户夫二十五名明會典武城縣衛河東一里始恩縣之白馬廟南至夏津之桑園一百四十四里西岸始故城之鄭家口南至夏津之王家莊一百十四里置淺鋪二十有六王家口淺孟家莊淺小流口淺北釣口淺南釣口淺西關口淺初家道口淺周家道口淺劉家道口淺方遷口淺陳家橋淺何家堤口淺陳家林淺髙家圈淺大還河淺耿家林淺灣頭口淺大隴頭口淺白家圈口淺白隴口淺吕家道口淺徐家道口淺侯家道口淺商家道口淺桑園口淺二十六鋪老人二十六人夫二百六十人守口夫二十五人縣設主簿一人山東通志夏津縣趙貨郎口等淺鋪八老人八名夫八十名後折徴四十名今存四十名撈淺夫二十名今存十名沙灣修堤夫六名明會典夏津縣衛河之東岸自桑園南至臨清之趙貨郎口四十六里西岸北自武城之劉家道口南至清河之渡口七里置淺鋪八黃河口淺大口子淺小口子淺郝家圈淺草廟兒淺新開口淺裴家圈淺趙貨郎口淺八鋪老人八人夫八十人守口夫六人縣設主簿一人山東通志清河縣二哥營等淺鋪八老人八名夫八十名後折徵三十二名今存四十八名明會典臨清州南板閘夫四十名溜夫一百十五名新開上閘夫四十名溜夫七十五名今一閘共夫八十四名溜夫共存四十名潘家橋等淺鋪十一老人十一名夫一百七十一名後折徵七十六名今存九十五名撈淺夫九十名今存三十九名橋夫二十八名今存二十名明會典臨清州會通河之東岸趙貨郎口南至板閘三十四里西岸北自清河之二哥營南至板閘三十一里汶河北岸板閘口東至潘家橋二十里南岸板閘東至趙家口二十五里置淺鋪十上仗栁圈淺下仗栁圈淺丁家馬頭淺上口厰淺北土門淺破閘淺潘家屯淺陳家莊淺沙灣淺潘家橋淺十鋪老人十人夫一百人守口夫九十人置閘二新開上閘南接清平之戴家閘三十里閘官一人夫四十人溜夫七十五人南板閘南至新開上閘五里四十八步夫四十人溜夫一百一十五人治漕艎厰二十有八臨清平山濟寧東昌兖州護衛濮州所天津天津左天津右通州左通州右神武中定邊德州德州左應天龍江左龍江右水軍左水軍右橫海江隂廣洋長淮淮安髙郵大河揚州等衛厰俱治州城西北其事