body:
  text: 行水金鑑卷一百七十二江南按察使傅澤洪撰夫役東平州泉源三十八處原設泉壩夫七十八名每名歲食銀十兩一錢六分三釐八毫共銀七百九十二兩七錢七分八釐二毫以下俱山東全河備考平隂縣泉源二處原設泉夫十名每名歲食銀十二兩共銀一百二十兩汶上縣泉源七處原設泉壩夫四十三名每名歲食銀十一兩六錢四分共銀五百兩五錢二分滋陽縣泉源十四處原設泉壩夫二十九名每名歲食銀十二兩共銀三百四十八兩寧陽縣泉源十五處原設泉夫九十三名每名歲食銀九兩五錢四分八釐共銀八百八十七兩八錢入分堽城壩壩夫一名歲食銀三兩曲阜縣泉源二十八處原設泉夫二十六名每名歲食銀一十一兩八錢六分共銀三百八兩四錢泗水縣泉源七十九處原設泉夫六十名每名歲食銀一十一兩八錢八分共銀七百一十二兩九錢二分鄒縣泉源十五處原設泉夫二十四名每名歲食銀十二兩共銀二百八十八兩滕縣泉源三十一處原設泉夫二十九名每名歲食銀九兩八錢七分三釐共銀二百八十六兩三錢二分嶧縣泉源十處原設泉夫五名每名歲食銀九兩七錢八毫共銀四十八兩五錢四釐魚臺縣泉源二十處原設泉夫十一名每名歲食銀十二兩共銀一百三十二兩濟寧州泉源四處原設泉夫九名每名歲食銀十兩九錢七分三釐共銀九十八兩七錢六分以上俱兖州府屬泰安州泉源六十五處原設泉夫一百二十一名每名歲食銀九兩五錢一分六釐共銀一千一百五十一兩五錢五分萊蕪縣泉源四十六處原設泉夫九十名每名歲食銀一十八兩三分八釐五毫共銀一千六十五兩四錢八分新泰縣泉源三十六處原設泉夫七十五名每名歲食銀一十一兩八錢五分六釐共銀八百八十九兩二錢肥城縣泉源十三處原設泉夫三十五名每名歲食銀十二兩共銀四百二十兩以上濟南府屬已上各州縣泉夫工食於康熙十五年奉文全裁蒙隂縣泉源四處原設泉夫十六名役食向例該縣設措不動正項青州府屬按額設泉夫挑濬渠道栽種柳株使無枯竭阻塞以濟運道原係通力合作如一泉阻塞則衆夫齊集應役互相幫助是以夫額少而工無誤自裁食之後夫役渙散挑渠栽柳諸務廢弛恆於康熙十七年查勘諸泉各州縣設法民夫挑濬每多草率將來必致淤塞遂進諸長吏而商之咸謂工食既裁勢不得不於泉源左右就近起夫而近泉之民祗能自應其地之役若源長河逺原額夫數力不能贍者豈能令别泉之民裹糧以襄厥事於是量泉之大小度渠之逺近添設民夫免其雜差用酬勞苦除東平平隂寧陽魚臺肥城各州縣仍照舊額泰安萊蕪二州縣未奉裁食之先巳經添設義夫外其滋陽縣議添夫八名曲阜縣議添夫十六名泗水縣議添夫二十九名鄒縣議添夫二十八名滕縣議添夫二十三名嶧縣議添夫二名濟寧州議添夫八名新泰縣添夫七十五名汶上縣添夫二十名東平滋陽鄒縣魚臺濟寧寧陽新泰平隂肥城汶上各州縣每夫議免地五頃雜差泗水嶧縣每夫議免地四頃雜差曲阜縣每夫議免地三頃雜差泰安萊蕪每夫議免地二頃雜差各設老人總甲小甲董率稽查泉源得以無恙此雖一時權宜之術而於漕運未必無小補云然以言乎經久可垂之策則惟復額夫以專其責庶幾無弊歟曹州黃河徭夫一百二十六名每名歲食銀十二兩共銀一千五百一十二兩曹縣黃河徭夫三百六十四名每名歲食銀十二兩共銀四千三百六十八兩鋪夫一百四十五名除衝決鋪夫三十九名止存一百零六名每名歲食銀四兩一錢四分共銀四百三十八兩八錢四分定陶縣黃河徭夫八十名每名歲食銀十二兩共銀九百六十兩單縣黃河徭夫三百二十一名每名歲食銀十二兩共銀三千八百五十二兩鋪夫三十九名每名歲食銀七兩共銀二百七十三兩金鄉縣黃河徭夫一百八十四名每名歲食銀十二兩共銀二千二百零八兩城武縣黃河徭夫二百三十三名每名歲食銀十二兩共銀二千七百九十六兩鋪夫二名每名歲食銀七兩共銀十四兩以上俱山東全河備考兩河工程莫大於淮揚徐邳間其險工最多又地方遼逺故題設江南河兵八營凡七千二百名專司挑築防守捲掃種柳之事若河南自滎澤以至儀封河道不過五百餘里但設堡夫一千三百零六名山東河道不過曹單等六縣二百餘里但設額夫一千二百零八名至如直𨽻之淺夫專以浚運江南之閘夫專以司閘亦并志之以下俱靳文襄公治河書徐屬河營額兵一千一百七十二名內戰兵二十名守兵一千一百五十二名邳睢靈河營額兵九百四十七名內戰兵十七名守兵九百三十名薈蕞云營兵專司挑築防守捲掃種柳之事自靳公以後挑浚之一字竟不講矣宿虹河營額兵八百八十一名內戰兵十六名守兵八百六十五名又於桃源廳詳添兵四名桃源河營額兵七百一十七名內戰兵十二名守兵七百五名又於前詳撥歸宿虹營兵四名山清外河營額兵一千零三十九名內戰兵十七名守兵一千二十二名山清盱眙河營額兵七百六十九名內戰兵十四名守兵七百五十五名揚屬河營額兵六百一十三名內戰兵十一名守兵六百二名山安河營額兵一千零六十二名內戰兵十九名守兵一千四十三名八營兵共七千二百名內戰兵一百二十六名守兵七千七十四名河南管河道轄開封府屬滎澤縣堡夫二十八名中牟縣堡夫三十八名陽武縣堡夫一十八名徭夫三十六名陳留縣堡夫十六名祥符縣堡夫五十六名徭夫一百七十二名原武縣堡夫四十名徭夫四十八名儀封縣徭堡夫一百七十二名封邱縣徭堡夫七十八名鄭州鄉夫六名蘭陽縣徭堡夫一百二十名歸德府屬考城縣流通看堤堡夫五十名商丘縣看堤堡夫四十名虞城縣