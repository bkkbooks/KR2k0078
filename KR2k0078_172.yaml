僅四五名耳其何能濟夫以百餘里之堤猶以七百名為少河南兩堤所云夫多者又可類推矣隆萬年間該省歲修夫數大概如此不知何時更變五百里內亦止一例徵銀計通省歲額共八萬八千餘兩本朝來除荒缺額不及三萬此外止察出新增銀一千有竒河工歲修仍沿明季之制每年估計準工鳩夫計夫給食堤工以土方論掃工以日期論在官曰募其實在民不得不計畞而派總以河夫之役倍苦日給之食本廉若慿空號召縱懸金市門誰則肯應若欲概從民間平價則河帑雖裕勢亦不敷據萬厯時黃河全書內河臣劉士忠有云貧者不肯應募富者論地派夫即翁大立疏內既稱河夫每名工食銀三兩而亦不免曰編者是募夫之法又必兼派而行不特今時為然也若以黃河巳決為有事歲修為安瀾衡量夫數則前河臣曾如春曹時聘蒙牆之役兩請帑金至二百萬用夫三十萬者一決口也去歲雷家集柴溝姚家蕩用夫不過數百名者亦一決口也由前言之則積數十年歲修而有餘由後言之則苐較歲修一工且不足是又未可執一而論即所云安瀾之義正以為河本湍激未至橫流謂之曰安然其湍激之性固無分於已決未決也伏秋水漲數里之岸呼吸而至一當掃灣迎溜之所非掃護之縱有重障如穿縞葭其防之也一里之堤非三萬餘工不成髙一丈長十丈之掃非千人數百人不任推挽今歲之堤歷再歲而風雨之所淋卸車道獾穴之所毁蝕髙者已卑厚者已薄加以濁流無定倐南倐北縷堤不支棄而守月月堤之內不得不又議土工是故朝廷設官無不以愛民節財為職獨治河一事以勞民者保民費財者經國歲修之制載在敕書豈不欲與民休息哉河之所在勢固無如何耳見在河南夫數屢經諸臣條陳未免以夫多為疑臣惟該省瘡痍雖經新復洪流寧異昔時今雖不必逺照隆萬舊例若徒一意減縮勢必馴致坐斃之患案查臣於去年十一月內題覆河南按臣李及秀河夫之徵派當更一疏據司道府廳僉議通省夫數巳經部覆行臣會同河南撫臣覆議奉有俞旨但臣職掌所關河道情形得於目擊夫役規則亦屬司存任其責而不究事體原委與事體有干典守而緘默不以入告皆溺職也除前疏容臣會同河南撫臣賈漢復覆議具題另候部覆外所有河道夫役事宜覆議疏內不便備述謹特專疏陳明伏乞睿鑒敕部施行奉旨工部議奏部覆奉旨依議同日又題為酌議淮工夫役事竊照江淮河濟謂之四瀆自明迄今挽河資運會淮注海是以一淮而受兩瀆之全故桃源之上但一黃河為害清河之下內則淮河宣泄維艱外則黃淮相濟為暴每遇泛濫其患尤烈查得前代南河志河防一覽內載淮揚一帶自平江伯陳瑄經理之後萬厯三年河決崔鎮而北淮決髙堰而東運道梗阻民生昏墊特遣河臣潘季馴大行葺理請帑六十萬金分委管工自司道而下共一百八十餘員徵調徭募等夫八萬名經營數載兩河之流始還故道未幾而十四年外河范家口天妃壩又以決溢告矣二十一年以後髙堰裏河連歲報決河臣楊一魁又有分黃導淮減水各閘等工天啓元年髙堰並裏外兩河一時共決十餘處自後漫決時有難以悉述計今距潘季馴時又將七十餘載如淮湖髙堰外河南岸桞浦灣堤桃清兩岸遙堤崔鎮四減水壩日漸月纍風雨剝蝕廢弛過半即楊一魁所開分水黃壩新河亦久淤塞本朝來河決上流南河賴以無事自順治十三年全黃歸故之後去歲水患巳見端倪矣夫疇昔之戒毖甚周猶不免昏墊之害今日之河淮如故乃欲安敝壞之餘其萬萬無幸固不待智者而知也但欲議工作須先計錢糧頃者司農告匱搜括為難無論請太府之金為未雨之策未敢輕出而歲額河銀昔時二十有七萬本朝除荒缺額裁減歸併僅十七萬有竒又於此內撥出九千餘兩解司充餉加之通惠河道從不取給河帑者連年撥解動至數萬常例歲修巳不勝捉襟露肘之苦矣臣去歲在淮即與司道多方商𣙜雖不能如前人大舉若髙堰塌卸損動石堤不下數里五險掃工太行老堤三工似皆難緩五險遙堤宫家營引河尚在勘議查得蘇建堤工在前明時民修官修屢經更變我朝初年猶官出料物山陽髙郵寶應興化泰州鹽城泰興七州縣協濟人夫赴工修築河帑所費亦自無幾自順治九年該省按臣有題改之議始設募夫歲計工食銀一萬四千四百兩勘估料物不在此數至於太行老堤民築民修司道報文確確可據良以前明河帑之設總為運道起見山清黃河南岸自草灣以下關民生為多關運道為少朝廷為民賦計百姓固亦自為身家計也國家愛養民力損上益下恩非不渥然今者帑詘工繁使盡照估計支給河銀則黃運兩河各數千里顧此失彼萬一運道梗阻所憂又恐不止淮揚一隅耳為今之計除五險掃工照舊募夫仍以餘力幫堤髙堰石工酌量估計其太行老堤似應仍責山陽莊民若更有應舉工程時迫夫少山陽獨立難支合無暫派下河七州縣民夫分工報竣或照舊自修或酌給食米事關地方力役除臣見在移咨漕撫臣亢得時會議按臣俟入境日移會外但恐光隂如駛轉盼桃花水汛容臣議確具題一面通行司道起派儧做庶國計民生可恃無虞而運道河帑亦賴以兼濟矣相應具題伏乞睿鑒敕部議覆施行奉旨工部議奏部覆奉旨依議朱之錫河防疏略美公之寒香館河防疏略所載諸疏言言碩畫不勝載如題河夫之徵派當更逺近之地方宜酌一疏有云夫黃河自昔稱為神河局外視之若嵗修若決工若下掃若築堤壩似乎皆可以人意為之身在事中黃河千里水勢排山倒海各州縣呼應不靈安危爭在頃刻比及人夫湊集申詳得報而事之不測已不可知乃欲一一奉成法以集夫使絲毫不紊皆未登掃臨河之論而已勢之不得不然一語本部院非親厯河工安所得深悉其苦如此且立法不難行法為難立法之時至公至溥至詳至慎何得為難所以難者推行之際易生扞格衆欲撓之二三有司豈能行之是行之之難難在有人扞格非立法不善也故曰行之難也行之既難而曰立法不善思更法以善之即百易法未見其可耳如河夫之弊多起於有司奉行之不均使勢豪有力者坐收土之利而多以力役委窮民窮民地少差重家貧力單不能不吃啞苦不能無怨是不均之怨非盡役之於河之怨也特以役從河起故歸怨無著不得不然其實皆不均之怨也近如通許縣及尉氏等縣夫不逃而樂趨事細詢之皆縣官調理得法不專苦窮民之所致也然後知古語有治人無治法之為不易之論也若使有司人人如通許縣及尉氏則何法之不可行故行法之人能直致法於人而不用權術不假通變者上古之世或然也至於後世行法能行者與婉轉能行者未有不以權術通變與之推移者也故曰立法之意也明其意是能使勢豪有力不之撓而無所扞格者也又請更番河夫以節國計事一疏有云運河自董口至天津延長二千餘里額設夫役除議抽議減并橋閘夫晝夜啓開打放空重船隻絶流之日仍同淺夫用工無容再議外實在徭淺等夫五千九百七十八名今科臣條議分為兩班誠為上省帑金下寬民力起見臣遵即檄行司道妥議據稱南北地勢不一工程修濬亦殊人夫多寡原各因河道險易而設其間有湖河相聨水沒縴道者有清黃相接淤漲不常者甚有地形窪下水勢陡峻一派流沙隨水噴湧者故旱則患淺潦則易漲惟賴此額夫終歲畚鍤隨時挑濬築護以濟漕運倘遇河道多故即全夫著役尚往往有不足之憂今議分為兩班夫力減少捉襟見肘勢必廢弛雖曰遇有急工不妨臨時全調但天時水旱無歲不有夫役徵集倉卒難齊萬一然眉當前呼應不及誠有如科臣所云一旦有事耽誤重計者不容不慎也又治河必資夫力一疏專為印官玩誤河工而言有云邇來姑息之議日多觀望之情滋起河屬各官掣肘難行有非一端可盡夫無米不能為炊空拳不能格獸此必然之理也河官責任在躬惟恐一覆難收方恨不得重門以待暴投鞭以斷流而局外者絶不知誤河之為害徒自見恤民之為名以省夫為循良以急公為苛刻不思民固在朝廷之民河亦河朝廷之河無故而勞民則所重民不得已而治則所重又在河人情好逸惡勞雖大聲疾呼尚不免秦越相視今臣方望之以保河之功而人反責之以佚民之説然則為河官者將勞其民以保河之為盡職乎抑佚其民以誤河者之為盡職乎長此不已竊恐百姓藉口遷延莫肯效力河官戒心瞻顧不敢督催馴至大弊極壞而後追咎誤夫者之失計亦何及哉伏乞皇上天語特賜申飭地方各官共殫公忠保全運道所屬卬官違例抗夫容臣衙門據實特參從重議處庶全漕血脈無憂梗阻而直省地方亦藉以免淪胥之患則勞民之利上固在國而下亦未嘗不在民也三疏所言何其痛快如此節録之以備當事者之鑑戒十二月二十四日工部覆河工國之大政修防民之命脈等事據總河朱之錫疏稱塞大王廟決工河南初時每起四十五頃派夫一名久後不足故為二十二頃五十畞派夫一名此外歲修用夫不在大王廟工數內况此一萬二千五百餘名不過通省虛額量工調用足用而止原非一槩全役堡夫一項僅有八百餘名以供瞭望等項惟日不給萬萬難濟捲掃築堤其盧氏固始縣離河原逺預估工程每歲皆以本府為主本府不足然後漸次調協倘數年之間近府俱經調過然後間調逺府以寬近河民力等因具題前來查得部臣調議與河南前任按臣李及秀所陳欵事同一體既經總河會同河南撫按酌妥除衝決大工外至於歲修分為三分數年之間始一輪流調用庶民有餘力勞逸得均相應如議永為定例仍請敕下總河臣與河南巡撫嚴飭道府嗣後凡遇修築照議調用徭役既平而河工可以無誤如未調之先有司於額數之外擅行加派該督撫按指名參處可也奉旨依議河南管河道治河檔案行水金鑑卷一百七十二
