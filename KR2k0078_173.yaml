body:
  text: 行水金鑑卷一百七十三江南按察使傅澤洪撰夫役聖祖仁皇帝康熙十二年三月日工部為豫省平定有年等事議得河南巡撫佟鳳彩疏稱河夫之偏累宜通變也臣察修築黃河每歲用夫或至萬餘名或至七八千名自二三月起直至十月終止俱按地畆起派似乎公矣其實弊竇有不可罄言者如狡猾之徒將自已田土飛灑於人豪勢之家將他人地畆包攬於己甚至紳衿衙役借題優免如有不肖有司或礙於情面不能秉公持正以致懦弱鄉愚者愈累愈貧每月或三四兩不等方能僱夫一名即以初僱每月三四兩而言以一歲萬夫計之每年費至三四十萬矣在廟堂之上知河有歲修而不知歲修之夫如許即知有歲修之夫更不知費百姓如許之金銀為今之計莫若官僱一策查舊例河工夫役管河道每歲預估用人夫若干方行各州縣按地起派今若官僱每夫每月僱價二兩足矣每歲上工九個月每夫止用僱價一十八兩即以萬夫計之止用一十八萬較百姓之自僱每歲三四十萬不啻天淵矣其每歲估夫若干該銀若干除歲徵河銀外不足者於河南八府一州地畆分别等則每畆派銀若干算眀刋於由單内出納亦照地丁錢糧年終河臣奏銷倘有餘剰留為下年之用如是則民知有定額不但狡猾之徒勢豪之家紳衿衙役不能影射倖免即河棍夫頭管工官役輩亦無所施其巧矣臣入境時體訪輿情無不以官僱稱便倘謂我朝制度凡錢糧俱照萬厯年間則例徵收此項銀兩似屬加派不知派銀派夫均出於民而派夫較之派銀所費不啻數倍曷若稍一更變每畆不過加之釐毫俾得安心於畎畆併不知有河夫之擾不亦大有便於民乎等因應准其所議具題奉㫖九卿科道㑹議具奏九卿等㑹議當日歲修派夫供役原動河銀支給於順治十八年停其支給銀兩今若仍行派夫修理似屬累民應將豫省河夫停其僉派如遇歲修工程仍動河道錢糧僱覓夫役若錢糧不敷該撫應動某項錢糧具題可也等因奉㫖依議河南管河道治河檔案聖祖仁皇帝康熈十六年七月初八日總河靳輔題為敬陳經理河工第八疏内稱六營共設兵五千八百六十名毎兵每月支銀一兩米三斗每歲共需銀四萬六千三百二十兩共需米一萬三千八百九十六石連守備千把總等官之俸薪馬乾等項毎歲約需銀四萬九千餘兩應將淮揚徐三府州屬并靈璧一縣舊設之募淺等夫查明全裁即以夫工而充兵餉其不敷者容臣於河庫錢糧内通融撥給歲需米石亦於河庫内動銀買給一并容臣於年終報銷等因奉㫖㑹議議覆允行靳文襄公疏畧南河志覈夫役一欵淺閘停溜等夫專屬河道邇來各衙門或私自占役或别為調用殊壞漕規今議管河官員須要督率各夫常川應役不得仍前恣縱其河夫曠役之罰禁革巳久陰雨空閒時實使然河官止宜不時㸃察偷惰不在工者量行責警逃去日久者以法䋲之自無虛曠又給工食一欵河夫有三一曰徭夫一曰白夫一曰募夫徭夫者編定淺舗之夫即淺夫也相沿巳久官民俱安白夫者州縣借派之夫民貼安家官給糧食擾民而復損官募夫者僱募窮貧之夫官給僱工民樂趨事損官而不擾民除白夫題革永不用外凡遇工作募夫行各該沿河衙門出示召募每工給銀四分調發百里之外每日添行糧一分五日一給印河官時時親勘面散不得假手於吏胥致滋弊端前朝淺夫工食支領艱難各里私貼毎名二十四兩挑河撈淺仍責里民則是徒出工食迄無實用新奉憲例一概僱夫不用里民實實奉行則民患以除漕事以整髙郵州志淺録此以見當時募夫夫之所自來也按歲修夫清河舊設共三百一名每年額給工食銀四千三百三十四兩雖派地丁實同召募也自康熈十七年裁去歲夫將工食銀改給河營兵餉二十年復歲夫不復工食又累加至八百名分工南北三河力役檄於本邑地丁錢糧起派是以枵腹之民責其驅公赴事矣田少役重曾不加之恤旣白役之而又逺調之竭十餘里之民力應數千金之夫差在民之負痛而不敢疾呼者懼違憲也隱忍茍延計一歲之夫費强半於正供鼛鼓聲聞未有不張皇失措者且近役在縣尚得寢食便安隔河逺調則宿露飯沙之不免乃其中有名在籍而人不在工者亦未必不徒滋中飽耳康熈三十四年奉行分月減派自正月起至四月十月起至十二月派夫四百名其五月至九月仍照八百名全𣲖以防水漲但夏秋水漲之時更係農忙之時計田起夫而奪其耕耨勢難兩全或者土兵亦王民也旣奪歲夫之食亦可均歳夫之差况土兵原為河防而設無農事之勞暫借協役以寛民力正情理之允當者否則改照舊額仍復三百一名之工食俾供役之夫得沾贍養是則清民日所冀望者也清河縣志可録此以見清河民困如此以例其餘矣聖祖仁皇帝康熈十七年六月日為請復河夫官僱之舊制以免按地派夫之苦累事總河靳輔題稱河水消漲無定河道變遷靡常稍有疎虞攸闗國計民生誠非渺小是以向來設有夫役疏防修補隨時用工惟是工食無多各夫不足糊口往往潜逃貽悞故定有按地僉派土著之例行之巳久今臺臣傅廷俊以旣徵其賦稅又徵其力役未免有重累之苦請照前任河南撫臣佟鳳彩題定之例將額徵銀兩改解河官僱覓等語部覆請敕臣衙門會同各撫臣查明確議具題等因奉有依議之㫖欽遵移咨前來查前任河南撫臣題定之例係每夫一名月給工食銀二兩較之見在額夫計多一倍有竒當此需餉之時未便比例其江南淮揚徐鳳等處額夫臣已於敬陳經理河工事宜第八疏内條議全裁改議官兵防守修葺並浙省原無河夫俱無庸查議外今據山東直隸各司道詳稱皆以河工闗係重大若令河官僱覓應役微員應難專任恐應募之軰多係貧窮無藉之徒欲令先役而後給食彼不能枵腹從事勢必先給銀而後用工及至工程嚴𦂳逃避不前坐悞河工皆由於此况夫食又已裁半充餉官僱之說更屬難行等語臣職掌河務闗係漕運反覆籌維難以更張貽悞不若仍照舊例按地分派土著照數實給工食嚴禁扣尅之為妥便也至遇有修築大工動支河道錢糧僱覓夫役原無派夫累民處無庸再議者也臣謹㑹同直隸山東河南江寧安徽浙江撫臣合詞具題伏乞敇部議覆施行河南管河道治河檔案聖祖仁皇帝康熈二十二年五月初九日總河靳輔題為請修上流隄岸以保運道萬全事奉㫖河工闗係運道民生最為𦂳要下流旣巳築塞上流隄岸自應堅固修築嚴加防䕶以免潰決這本内事情該部速行確議具奏工部議查山東調額設人夫並酌撥附近州縣民夫竭力飛儹以求保固惟河南開封歸德兩府隄工通長一千餘里南來附近州縣原有歲修人夫毎年加修頗稱鞏固前撫佟鳳彩具題歸官僱募修理之後民旣膜視罔顧而官復畏難不勤行修理以致工程漸壊自康熈二十一年以前江南決口未堵上流不致十分壅滯今江南決口全堵除核減水壩之外更無旁洩之途江南費過如許金錢甫有頭緒設或河南一有疎失則前功盡棄而阻運殃民更無底止伏乞敕下廵撫将開封府歸德府兩岸隄工遍勘某處髙厚堅寛可以不修某處卑矮窄薄斷須加修某處極險或仍照往例撥歳修人夫興築或照近例動帑興築上流旣可保無虞而下流河道得以刷深方為以保運道民生萬全之計等因具題前來查康熈十二年二月内原任河南廵撫佟鳳彩將河南省河夫應停止僉派等因具題經九卿㑹議修理河隄若仍行派夫修理似屬累民停止派夫如遇歳修工程動支河道錢糧僱夫若錢糧不敷應動何項錢糧之處該撫具題等因具題在案應將撥夫興築之處毋庸議再查康熈十七年三月内總河靳輔以江南大工方興斷不能逺離豫省河務責成河南廵撫就近料理等因具題臣部議覆暫交豫省料理俟江南大工告峻之日照舊或遇衝決疎防之處將該督撫一併處分等因亦具題在案河道關係運道民生𦂳要且係總河專責不便止交河南廵撫相應敕下總河河南廵撫如果有卑矮窄薄極險應修之處會同詳定一面估題一面動歲修河庫錢糧務須該省盡心鼓勵各官修理堅固永保無虞若借此將堅固不應修之處揑報修理或修不堅固將該督撫並督修官員俱各從重議處可也奉㫖河工關係𦂳要蕭家渡決口築塞方完河南隄岸工程專令河南廵撫暫行料理如有應㑹同總河事情仍移文商確勿致貽悞河南管河道治河檔案聖祖仁皇帝康熈二十四年九月初二日總河靳輔題為再請豁免堡夫課程桞料以甦苦累以固河防事奉㫖該部議奏工部議得先經河南廵撫王日藻疏稱豫省黃河滎澤至虞城額設堡夫九百餘名所給伊等工食甚少而每夫每年納桞一百束􅐨十斤芟三十套䌫二十條計其所納課程之費過倍於工食之數因之相率逃亡河務廢弛乞將堡夫課程槩行蠲免專令守防隄岸餘閒栽桞灌漑倘遇埽工令協採隄園官桞需用等因具題臣部以桞蔴等物關係河工應行總河靳輔將堡夫課程應否豁免及免此課程而豫省河務有無貽悞之處㑹同詳確定議具題到日再議續據總河靳輔㑹同河南廵撫王日藻疏稱各夫盡力所備物料久收朽壊别工忽然取用不得不從新叧賠於是苦累至極勢必相率逃亡反將本等力役廢弛乞將課程豁免庶豫省實有禆益而又並無貽悞等因具題行文在案該臣等查得總河靳輔疏稱河南額設堡夫工食每名每歲止給工食銀三兩八錢有竒論其力役則灌漑隄園官桞修補隄工殘缺實不能閒自辦納課程而堡夫苦累不堪矣將桞貯於隄旁日見損失蹂躪此桞一日不交工堡夫一日不能釋負久貯之桞多年不用變成灰土無益於工反將修補殘缺等力役盡行廢弛臣因桞束久貯變成灰土僱船運來江南為歲修工用桞價盡為水脚尚苦不足亦甚非計臣于康熈二十二年内曾經題請豁免部議不准究竟有課程之虛名而無用桞之實濟反弛堡夫實在力役伏乞自康熈二十四年為始槩予除免庶夫力稍甦修防不廢有禆河道民生良非淺鮮等因㑹同河南廵撫具題前來查順治十三年原任管河道方大猷條奏責令各夫每年種植桞蔴等項於各縣河衙公收入厰毋致浥爛等因在案應行該督將此桞蔴等項於河南隄工處毎年應用之數餘剰之數查明具題到日再議可也奉㫖這本内事情爾部即議結具奏工部議應如所題奉㫖依議河南管河道治河檔案聖祖仁皇帝康熈三十八年五月日總河于成龍等題為歲夫徒滋苦累等事奉㫖該部議奏工部議得總河于成龍疏稱江南黃河運河額設河營修防兵夫外每年徐州所屬邳州睢寧宿遷桃源清河山陽安東寳應各州縣每年照數分出修理民夫共六千九百五十名幇助河兵共修民夫每名一年大概出銀二十兩往修工處之人皆老少充數一到即逃查此情由俱河工光棍代應將銀入己所致每年修理民夫空勞終年不得實惠急當整飭請將徐州所屬各州縣每年修理民夫六千九百五十名竟行裁去每年每夫酌量出銀五兩入正項地丁錢糧内照河銀追取送入修河處每年裁去修理民夫添設戰守兵三千三十名遊擊一員守備二員千總二員把總四員管河秋夏水漲之時酌量緩急分調疾速扶救即將裁去夫銀充作俸餉則小民亦情願輸納河工亦得實濟又查海州山陽等處官地所出蘆葦每年或派夫去割或派官去取此特為運至兩河以資平常𦂳要修理之用不意日乆成弊或運至違限或借端遭水浸朽或借端被火燒燬或借端被海潮漂没所以多致欠少今查各官地畆所得額數蘆葦一百一十八萬束有餘將此即交與遊擊等專管每年九月霜降之後派兵去割計日照數割完運至河口收貯撥各營浚船交與該守備運至各修理處收用每年蘆葦銀可得二萬六千兩有餘銀兩除凑合給官兵俸餉外尚剰減省銀一萬五千二百兩等語查該督等將徐州所屬每年盡裁去修理民夫每夫出銀五兩以充正項地丁錢糧照河銀追取送入修河去處裁去每年修理人夫添設戰守兵逰擊等官管轄水漲之時分條疾速扶救將裁去人夫銀兩充入俸餉之用則小民亦情願輸納修河去處亦得實濟又海州山陽等處官地畆所得額數蘆葦每年大概一百一十八萬束有餘交與該逰擊等官專管每年照數去割運至河口收用此蘆葦價銀可得二萬六千兩有餘凑合官兵俸餉外尚剰減省銀一萬五千二百兩有餘等語應如該督所題奉㫖依議淮揚道治河檔案聖祖仁皇帝康熈六十年正月日淮揚道傅澤洪詳河營兵餉遅延借扣之弊事河工需兵力役河兵賴餉資生定例兵餉每月㕔營公同唱名照數給發取具各兵領狀㕔營具結由道轉呈憲核逹部稍有遅延侵餉即干叅處功令森嚴不惟憲䑓屡經嚴飭即本道等亦遵照通行飭禁真不啻三令五申矣詎各該屬賢愚不等其中竟有應給兵餉遅至三五個月或半年不行給發者究其弊源皆因各該管官將兵餉那移别用無項給發任意稽遅或亦有正項不足放餉應請撥補支給者該管官復漫不經心早為詳請以致各河兵枵腹力役窮苦難支不得已而出於借貸一途因而不肖員弁乘其窘急滚剥橫加巧託夫人公子管家各名色抽放利債有七八折及對折不等甚有各上司衙門及勢要豪强之人販賣不堪米麥勒令營汛借領時價之外加倍作價威尊命賤各兵飲恨遵依及至放餉之時先將前項利債竝米麥價銀盡數扣清其河兵實領之餉十分中不及二三且甚有整月餉銀全扣河兵未得分毫者有餉之名無餉之實河兵安得不累又安得不怨乎竊思河兵終歲在工力作胼手胝足沐雨櫛風寒暑不辭軀命不顧原指月領額餉贍家飬生今違例遅延不發致令各兵餬口無資乃復乗機滚砌取盡錙銖兵受苦中之苦彼獲利上之利王法奚存天理何在興言及此真不得不為之太息痛恨矣夫兵必實力做工工程始固餉必實發到兵兵力方舒本道等職任監司稔悉河兵苦累用敢㑹詳仰請本部院嚴加飭禁嗣後河營兵餉務遵定例按月給發㕔營公同唱散取領具結送轉毋許巧借各名色借債滚扣以及壓領米麥擡價剥兵如敢仍前朘剥遅延或經訪聞或被告發嚴叅按律治罪追贓給兵其有正項不足應請撥發者該管官早為詳請務使每月兵沾實餉毋致忍饑銜恨則兵心咸恱力作益勤有裨河工匪淺鮮矣又河營兵餉請飭勒榜事河兵苦役藉餉資生定例每月給領豈容絲毫借扣上年十一月間本道㑹同淮徐道詳陳河營兵餉遅延借扣之苦弊仰請憲飭嚴禁蒙憲嚴批轉行禁飭在案兹山安營去年八九十三個月兵餉縁王丞題補赴京引見未經給發延至歲暮該營守備宋可鳳詳請憲臺飭行本道嚴催去後據王丞之子王師鳯禀稱已扵十二月二十二日赴河庫領銀賫交該營守備給放矣隨據該守備呈稱王丞向有支借之項於中扣除僅將找給餉銀照數包封給兵領訖本道即檄行該備查明王丞支借之項是否實數實借及取到借支原領内有上河把總寗繩祖於五十九年三月内借米二百二十石每石價銀一兩三錢五分一紙夫兵餉從無給米之例况去年三月間米價亦不致騰貴至此其為擡價勒領不問可知無怪乎兵丁陸標等有尅扣兵餉冐派官米之控也䝉憲批准山安㕔詳飭查到道隨據該守備詳開前後情詞呈請銷結前來本道逐一查核陳元等所控汛書王宴賓果係葦營責革之犯豈可夤充字識結搆生非至每兵只給京錢三百文及扣銀一兩作為官事之用情弊顯然殊難寛貸至於張化魁等訴稱透支庫餉銀五十七兩零餉簿欠領可據又稱道庫米銀並王太爺庫銀俱經除去現有守府發帳為憑是以無銀找給試思該營兵餉如果按月給發安有借領若非重利滚扣及擡價壓領安有透支米銀庫銀盡皆扣除以致無銀找給嗟此窮兵枵腹其何以使之在工力作終無怨咨也耶本應遵提目兵人等徹底根查按律究擬姑念時值春初桃汛將届正衆兵盡力汛防之候既據伍汛効用百隊焦彛昌等禀稱五個月餉銀帳目一并公同筭清並無尅扣苛派情弊兩情俱已輸服合無詳請憲臺𢎞開祝網其復充之王宴賓多事之楊士昇似應分别責革把總黃良臣不遵會放記過一次從寛發落以結斯案𢎞㤙出自憲臺非本道所敢擅便至於前㑹詳請禁巧立名色借債滚扣以及壓領米麥擡價剥兵及不遵定例每月㕔營公同唱名照數給領等事宜還祈憲臺再行嚴飭勒榜㕔營各衙門取具遵依永逺恪守庶窮兵得霑憲惠而於河工亦大有禆益矣嚼梅軒偶存聖祖仁皇帝康熈六十年五月日淮揚道傅澤洪詳請查河兵力作事河營設立兵丁按工汛之短長定兵數之多寡原期名名在工力作稍有閒曠即屬悞工乃近年該管各衙門全不以河工為重虛兵冐餉巧立名色坐佔太多每當伏秋水長工程險急河兵寥寥不足供用㕔官呼應不靈不得不重價僱覓人夫濟急有兵之名無兵之實及至放餉之時則又照額支領其坐佔之兵餉盡飽私槖做工無人蝕餉無厭貽悞修防深可痛恨按以新例更在不赦之條姑念積弊相沿從前概請免究嗣後每營酌量守備議留跟役四名字識四名千把總議留跟役二名字識二名其餘水火夫馬夫守門人役等名色盡行清出發工力作如敢仍前坐佔本道等查實揭詳仰請憲臺嚴叅治罪再有請者奉憲准充効力把總因其著有勞績給以紙上虛銜原係憲臺鼓勵人材之至意但其中有自本汛兵丁効力勤勞㤙賞者尚在本汛力作其餘從不到工力作之人旣已得授銜名實領糧餉即應一例到工力作倘有仍前避勞就逸不親身到工力作者該管㕔營查明呈報本道等據實詳憲追繳委牌革除糧名驅逐回籍務使兵無冐佔餉不虛糜則河工力作有人而修防得以無悞整頓營制慎重河防其禆益實非淺鮮矣嚼梅軒偶存聖祖仁皇帝康熈六十一年四月日王家營居民桂蕃等禀為氷夫一免㤙澤萬民事竊惟三冬氷結漕艘難行勢必敲氷以接新運雖肌膚凍裂何敢辭勞但苦樂不均敢匍匐上告伏查直隸山東等州縣俱有額設淺夫供應此役從不勞民獨江南淮屬臨河州縣皆起民夫而我清河更甚從前設有歲夫伏秋二時力作河工隆冬氷凍打開河渠䝉前部院軫恤民艱題將歲夫改折有田一頃納夫價若干充作河兵之餉食此餉者即代民修築打凌之役蓋歲莫祁寒河工無事修防兵目束手宴閒用彼敲氷急公報効上有益於漕運下有利於窮民此改折之初心也迄今日乆事弛時方立冬縣胥出票要備榔頭未及冬至住宿河干候氷結實風吹雨灑十人九病受凍躭飢命䘮溝渠差票齊集鳴鑼催夫㸃邜查責老幼悲啼男婦號泣殷實者折酒折飯折夫無力者受笞受鏖受鎻吞聲忍泣萬狀艱苦幸逄特簡大老爺總督河篆剔弊釐奸痌瘝民瘼害除利興美德善政童叟福星身等得見堯天冐將茹苦下情公籲憲轅伏乞天恩普濟仁德遍施豁免凌夫永脫苛派則臨河百姓得以完聚室家不致流離鞭比簮纓世世哀切上呈批行淮揚道查議議上前總河陳批開歲夫旣經里民折價解㕔召募河兵充餉則敲氷之役自應責之河兵况冬時又無力作工程何得尚派民夫仰即通飭免累仍先出示曉諭繳裏河等㕔營復㑹詳院飭兩道會議九月間㑹看得河道攸關漕運冬月氷凍回空漕艘不能遄往赴次節䝉憲檄行令沿河印河各官親駐河干催儧則是地方河員均應協同設法料理以期無悞運行者也查淮揚二屬上自臺兒莊起下至𤓰洲閘止沿河地方官僱夫㕔營河兵協力打凍歴今遵行巳乆今各㕔營公詳五十年氷凌凍積部議以地方官不早為設法打通前淮安姚知府清河凃知縣議處有例等情備查原案縁因五十年十一月十九日氷湧風狂漕艘難進該縣含糊具報淮府率轉本日夜半風息凌開該縣又未具報故奉查參有案可據康熈五十四年間前淮揚道呉僉事備具詳飭捐備以速漕運事一詳該道捐造堅實雜木壓凌船六隻安清中河外河二㕔各捐船二隻裏河㕔捐船三隻揚河㕔捐船三隻江防㕔捐船二隻清河山陽二縣各捐船三隻寳髙江儀四州縣各捐船二隻并多備敲氷器具遇有氷阻即便往來壓凌敲氷該道所捐之船交給裏外中揚四營著令河兵管駕遇寒冬時伺候壓凌閒時令其駕運工料各㕔營州縣捐備之船聽其僱人管駕又該道捐鑄大鐡硪二十一副各發山清寶髙四州縣各四副江邑三副儀邑二副以備該州縣僱夫敲打力大勢雄堅氷立剖凍阻無虞縁由詳明前河憲趙當䝉批開據詳捐造堅船以壓氷凌捐鑄鐡硪以開凍結俾回空得免凍阻之虞殊可嘉尚所議分造捐修之處俱如議舉行仰即立速轉飭勒限造完具報如有觀望遅延揑稱捐備仍撥民船擾累者該道據實揭報叅處仍候總漕部院批示録報繳又詳䝉前漕憲施批開如詳行仍候河部院批示繳等因遵奉通飭遵行在案又於康熙五十五年内奉前河憲趙檄行本道飛飭沿河州縣印官打造壓凌船隻并多備器具打氷使回空漕船遄行是壓凌打凍原係沿河印河各官協同設法料理之事淮揚二屬奉行已乆兹奉憲批㑹議詳覆相應仍照前道呉僉事議令地方官僱夫并㕔營河兵協同打凍以速運行者也擬合㑹詳伏候憲裁批示遵行總河陳批仰即通飭沿河地方官僱夫㕔營河兵協同打凍毋得派累里民並抄詳行知遵照繳淮揚道檔案善薈蕞云批免氷夫乃滄洲先生第一政後㕔道復詳亦不得巳通變之計但僱夫每日給工食銀四分載在會典當此農人務閒之候獲四分現給之銀以餬其八口無不欣欣然子來恐後者第恐官役扣尅有名無實仍為窮民之苦累上下有司當極為留意斯為國為民之道兼得之矣設立河兵專供力役按程計里每汛分派修防各在本管境内桃伏秋汛不時廵查遇有險要竭力搶䕶以保無虞至霜降後水勢漸落量撥堤園刈草其廵堤遞送之兵常川往來從不外撥漕河涵洞應歸此軰專責何必又設洞頭看守所謂洞頭者不獨不諳修防反藉此以科派小民需索工食近奉禁革可謂善政但復委之地保夫地保自有地方之責豈能顧及涵洞勢必更名替役仍屬向日之洞頭擾累終無巳時頃見㕔詳地保無幾涵洞甚多不無顧此失彼乃議每洞著一老人看守令其搭篷備料守洞防䕶嗚呼計愈出而愈奇矣按明初里編老人得參議民間利害及政事得失太祖謂之方巾御史每里一人專以教民勸俗如漢三老故事予童丱時猶見有七八十歲人手持朩鐸口宣聖諭所稱摇鐸老人者是也若今之老人即叨沐皇恩衣帛食肉之軰含哺鼓腹咏歌太平乃其本事而顧令之看守涵洞禮云五十不從力役又云五十不為甸徒其謂之何哉雖明㑹典開載河工夫役之内每每有老人執事此乃當時之敝政不可為訓者今聞髙堰以及清河等處大小壩洞皆屬汛兵專司啟閉現有成例裏河事同一轍旣有廵堤遞送之兵即令其乗便管守何用累及老人此事雖小亦河政之必當留意者也今水學行水金鑑卷一百七十三
