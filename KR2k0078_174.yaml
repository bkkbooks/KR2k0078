body:
  text: 行水金鑑卷一百七十四江南按察使傅澤洪撰河道錢糧通惠河郎中所屬通州東安等七州縣樁草銀五百三兩六錢五分通州左右神武等九衛樁草銀六百十六兩以下俱明會典北河郎中所屬兖州府屬州縣并衛所石灰十三萬八千斤􅐨麻九十六斤樁草􅐨麻銀五千五百三十五兩六錢八分副甎銀二百五十七兩七錢六分安山南旺等湖租銀三千三百三十五兩二錢四釐八毫各州縣裁革折徵撈淺淺鋪等夫二千二百八十名每名歲徵銀十一兩渡夫二名每名歲徵八兩共該銀二萬七千三百七十六兩萬厯四年議定每名連樁草歲徵銀六兩著為例每歲共該銀一萬三千六百九十二兩東昌府屬州縣并帶管德州德州左二衛及清河縣副甎一萬六千九百九十三箇石灰九千二百斤樁草􅐨麻甎灰銀二千四百八十兩六錢四分各州縣裁革折徵撈淺淺鋪夫八百六十二名萬厯四年議定每名連樁草歲徵銀六兩每歲共該銀五千一百七十八兩河間府屬州縣并衛所樁草銀二百五十八兩五錢六分葦草銀二百三十五兩三錢六分􅐨麻副甎銀各五十三兩四分石灰銀二十六兩五錢二分南河郎中所屬今天妃閘以北改屬中河郎中以南仍屬南河郎中淮安府屬天妃閘以北邳州清桃睢宿五州縣并邳州衛樁草甎灰銀四百六十九兩八分廬鳳二府并滁和二州徵解邳州河堤防守夫銀一萬二千九十六兩徐州并屬縣樁草甎灰銀八百七十九兩八分廬鳳二府并揚州府屬州縣徵解徐州停役夫協助河工銀一千三百九十九兩二錢徐州庫收支徐州洪稅協濟河工錢糧歲徵無定額約萬餘兩不等管泉主事所屬濟兖二府有泉州縣額徵泉壩錢糧樁草銀四百五十三兩一錢二分壩夫銀二百十一兩二錢裁革泉夫折徵銀九千二十四兩裁革壩夫折徵銀一千五百四十四兩裁革洸濟河淺夫折徵銀二百八十八兩萬厯四年議定每名連樁草歲徵銀六兩以上俱運河錢糧明會典山東管河道副使所屬兖州府屬州縣堤鋪夫銀九千八百六十兩明會典河南管河道副使所屬開封等八府并汝州河堡夫銀三萬二千八百五十三兩以上黃河錢糧明會典黃運兩河需用錢糧由直省徵解河道總督及各分司支用年終稽核完缺分别奏銷以下俱大清會典直隸所屬河銀一萬一千五百七十七兩六錢七分零江南安徽布政司所屬河銀二萬三千四百四十六兩九分零江南江蘇布政司所屬河銀八萬二千一百四十八兩五錢五分零浙江布政司所屬河銀一萬五百二十五兩二錢四分零山東布政司所屬河銀四萬五百三十八兩二錢四分零河南布政司所屬河銀九萬九百八十三兩一錢八分零通惠河分司所轄通州武清等州縣衛河道錢糧額徵銀八千三百一兩三錢五分零又木稅銀七千一百兩北河分司所轄兖州東昌河間三府河道錢糧額徵銀一萬五千八百九十八兩五錢七分零􅐨麻一萬二千八百七十八斤八兩康熙十七年裁分司歸併濟寧天津二道南旺分司所轄濟南兖州二府河道錢糧額徵銀二千九百三十六兩八錢七分零康熙十五年裁分司歸併濟寧道夏鎮分司所轄廬州鳯陽揚州兖州徐州河道錢糧額徵銀一千五百一十四兩三錢五分零康熙十五年裁分司滕嶧二縣歸東兖道沛縣歸淮徐道十七年滕嶧改歸濟寧道中河分司所轄淮安廬州鳳陽徐州和州滁州河道錢糧額徵銀二萬八千一百三十八兩九錢八釐零兼徵鈔銀五千二百五十兩又石價銀六百五十兩遇閏月加徵銀五十四兩二錢順治十五年加徵六百兩康熙五年歸淮海道徵收七年歸徐屬河務同知徵收八年仍歸本司十一年兼徵徐州稅契銀三千六百兩二十年加三千兩康熙十七年裁分司分歸淮揚淮徐二道南河分司所轄揚州廬州鳳陽江寧徐州并江防㕔河道錢糧額徵銀三萬四千五百三十一兩四錢二分零又由閘稅銀六千六百六十六兩零康熙二十年增銀一千兩康熙十七年裁分司分歸淮揚淮徐二道以上俱大清會典直隸守道所屬原額河銀一萬一千五百七十七兩六錢七分零除荒實徵銀一萬一千五百四十五兩四分零內除霸州故城等州縣衛裁半樁草銀二百七十六兩三錢八分零止實徵銀一萬一千二百六十八兩六錢五分零計缺額銀三百九兩零二分零外有故城東光等四縣樁橛銀九十三兩八錢四分零徵解河間府庫於十八年造入考成不係原額之數以下俱靳文襄公治河書江南江蘇布政司所屬原額河道項下銀八萬二千八十六兩六錢一分零內除存留支給夫食水腳解費等項并裁減夏鎮分司項下河夫工食共銀一萬一千八百七十八兩九錢七分零應聽各州縣自行分别起解外止實該起解河道銀七萬二百七兩六錢四分零除荒實徵銀六萬六千五百一十三兩七錢四分零計缺額銀三千六百九十三兩九錢零江南安徽布政司所屬原額河銀并帶閏二萬三千四百四十六兩九分零除荒實徵并新升撥補二萬二千八百八十四兩七錢六分零計缺額銀五百六十一兩三錢三分零山東布政司所屬原額河銀四萬二百一十二兩二分零除荒實徵銀二萬二千三十四兩八錢七分零計缺額銀一萬八千一百七十七兩一錢五分零山東都司所屬原額河銀三百二十六兩二錢二分零除荒實徵銀三百一十三兩四錢四分零計缺額銀一十二兩七錢八分零河南布政司所屬原額河銀九萬九百八十三兩一錢八分零除荒實徵銀四萬二千一百八十一兩七錢九分零計缺額銀四萬八千八百一兩三錢九分零浙江布政司所屬原額河銀一萬五百二十五兩二錢四分零並無除荒江寧府屬水腳解費銀三百七兩二錢八分零蘇州府屬解費銀一百四十四兩二錢七分零松江府屬解費銀五十六兩五錢一分零常州府