body:
  text: 行水金鑑卷一百七十五江南按察使傅澤洪撰閘壩涵洞彚考防水之功莫大於隄然水之消長不時過障之虞其溢也閘壩以減之然閘壩之為費也鉅非最要弗建也次之以涵洞其減之用㣲矣然其為減一也保隄之道三者略備他或平疇繡錯河潤是需或下土沮洳停淤成沃功亦大矣哉以下俱靳文襄公治河書黃河南岸碭山縣毛城鋪減水壩一座毛城鋪減水閘一座二閘壩水俱減入小神湖歴靈芝孟山等湖從歸仁隄五堡減壩便民閘滙洪澤湖助淮徐州王家山天然減水閘一座十八里屯天然減水閘二座三閘水俱減入馬厰湖經永堌湖歸靈芝孟山等湖由歸仁隄減壩入洪澤湖助淮睢寧縣峰山龍虎山天然減水閘四座四閘水俱減入馬淺湖由靈芝孟山等湖越歸仁隄減壩入洪澤湖助淮宿遷縣歸仁隄便民閘一座五堡閘一座二閘水俱減入洪澤湖助淮桃源縣龍窩涵洞三座建以淤窪山陽縣柳園頭閘一座所減水由運料小河沿縷隄出雲梯關掌家港注黃入海專為各險工運料而建黃河北岸徐州大谷山減水壩一座蘇家山天然減水壩一座鎮口閘一座三壩閘水俱減由荆山口出彭家河口㑹入北運河邳州羊山寺涵洞十二座青墩營涵洞十座直河涵洞二座張家莊涵洞十座奶奶廟涵洞十二座俱建以淤窪宿遷縣攔馬河減水壩六座朱家堂減水壩一座此壩係淤窪而設若蕭家渡楊家莊七里溝新莊口諸卑窪處悉淤髙此壩可以不用各壩水俱減入中河清河縣仲家莊閘一座王家營大壩一座二閘壩水俱減入中河由平旺河入海山陽縣武家墩減水壩一座武家涵洞髙家堰髙良澗減水壩一座小王莊涵洞周橋涵洞古溝減水壩一座茒家圍減水壩一座夏家橋減水壩一座唐埂北減水壩一座唐埂中減水壩一座唐埂南減水壩一座以上髙堰各閘壩涵洞所減之水俱從髙寶等湖出髙寶各減壩入下河南運河清河縣太平閘一座金門寛二丈一尺所以約全淮之水止令爛泥淺一水分十之二由此閘以進運河今宜移置新閘運道從草壩出入太平閘涵洞七里閘一座與新莊閘南北并行以備挑淺而平水勢山陽縣鳳陽厰減水石壩一座壩門寛八尺四寸壩長十八丈較龍汪閘頂並各隄頂約低五尺專為分龍汪閘上流水勢以保清江浦淮安城而建所減之水由運料新河歴楊家廟入山陽運河狀元墩涵洞楊家廟單家口涵洞五十座寶應縣北𢎞濟閘一座南𢎞濟閘一座子嬰溝減水壩一座長十二丈洩水之地六丈所減之水由子嬰溝入下河永平閘壩一座所減之水俱入下河髙郵州東岸減水壩一座洩水之地長四十丈壩底髙於髙郵城南磚壩底二尺有奇止以洩異漲所洩之水入下河每年六月初一日開放東岸南關減水磚壩一座洩水之地計長四十八丈二尺其所洩之水亦入下河每年六月初一日開放東岸五里鋪減水石壩一座洩水之地寛十一丈底低於磚壩者二尺有奇每年四月初一日開放東岸八里鋪減水石壩一座洩水之地計長十丈六尺底低於磚壩者二尺有奇每年四月初一日開放東岸柏家墩減水磚壩一座洩水之地計長五十一丈四尺每年六月初一日開放東岸車邏減水石壩一座洩水之地計長十一丈每年四月初一日開放江都縣東岸鰍魚減水壩一座洩水之地計長十一丈所洩之水亦入下河東岸金灣三閘壩一座其水減入人字河歸芒稻河入江髙寶諸湖下於洪澤湖而運河又下於髙寶諸湖諸湖西南受滁泗天長之水由下河入海故東隄舊有閘座涵洞以洩之而西北周橋六壩洩下之水亦由諸湖以入下河故臣復於舊閘壩涵洞之外增建改建減水壩八座以向來原有之閘壩涵洞抵洩運河下注及天泗等處山溪之水而以新建八壩抵洩周橋六壩之水而後因入為出節宣有度旱不致於涸運澇不致於傷隄也北運河邳州猫兒窩減水壩一座減入駱馬湖㑹歸中河馬莊集減水壩一座萬家莊減水壩一座二壩水俱減入駱馬湖㑹歸中河宿遷縣免車頭涵洞張八莊涵洞晁家溝涵洞皁河石磡一座閘之底深於岸其寛不過二丈四尺至三丈而止壩之寛為丈者可以百而其底則與岸平若洞之徑僅三尺而已其減水之用大小不同而其為減則一也夫束水莫如隄然隄有常而水之消長無常故隄以束之又為之閘壩涵洞以減之而後隄可保也今使上流河身其廣數里而下流河身或為山岡郡邑所逼限其廣也僅得其半更或僅得其十之一二勢必滂薄奔駛怒極而思逞加以伏秋暴漲非時霪雨其不致於敗壊城郭漂淌室廬溺人民而淹田畆者㡬希矣今於黃河兩岸及運河上下髙堰一帶凡遇河道險隘及水勢激蕩之處相度地形建置閘壩涵洞共若干座其詳分載各考下務令隨地分洩上旣有以殺之於未溢之先下復有以消之於將溢之後故自建閘壩以來各隄得以保固而無衝決也乃不知河道者與懷怨而尋釁者嘖有煩言夫閘壩髙卑各有規畫原以洩異漲非以洩平漕水且以隄禦河以閘壩保隄誠以河不他潰則河底日深河底日深則河水亦日低行且置閘壩於不用矣即黃河土鬆而水悍不無損傷修葺之費然較之隄工漲潰普面漫溢敗壞城郭漂蕩廬室溺人民而淹田畆塞決挑淤經年累月為費不貲其利害之大小何如乎不唯是也耕種之區資減水而得以灌溉窪下之地藉減黃而得以淤髙久之而磽瘠沮洳且悉變而為沃壤一事而數利興故既有隄堰必不可無閘壩涵洞也涵洞之用有三一減水二淤窪三溉田固矣然神而明之更以之擋水以之衛閘其用微妙非久於河者不知也夫閘壩所過之水大抵伏秋異漲澎湃之勢旣足以撼閘之基傾跌之力又足以䧟閘之底而我以涵洞之水透入閘後使之旋瀾湧波以䕶其基而承其底則閘反若有所慿以固而澎湃之勢平傾跌之力衰矣閘之於壩也亦然顧置洞必與隄内地面相等前所建涵洞正值河身墊髙之時故所置皆髙今河底日深前建涵洞非夏秋水發之時希復過水必須因河底之髙下而髙下之方得涵洞之用焉以上俱靳文襄公治河書聖祖仁皇帝康熈二十四年十一月十三日准工部咨請循河工定例以便遵守以固河防事内開搶修工程隄岸閘壩偶被傷損稍遅則工程漸損是以該員一靣詳明臣衙門一面運料修防或費帑數兩或數十兩或二三百餘兩臣衙門確核造入歲報冊内彚題開銷者謂之搶修每嵗不下一二百件若亦照歲修之例一估一銷則每歲應添本章三四百件等語查從前搶修工程該督冊内止有總數並未分晰細數無憑查核屢次駁查在案嗣後如有搶修工程五百兩以内者令該督詳開各工細數造冊彚銷等因奉㫖依議淮揚道治河檔案漕規宿桃木價尺一木一錢四分尺二木一錢八分尺三木二錢三分尺四木三錢一分五釐尺五木四錢零五釐尺六木四錢五分五釐尺七木五錢三分尺八木六錢七分尺九木八錢三分二尺木九錢八分邳睢木價尺三木二錢七分餘與宿同以下俱靳文襄公治河書徐屬木價尺三木二錢七分尺五木四錢二分五釐尺六木四錢七分餘與宿桃同寶應木價一尺木九分二釐尺一木一錢零九釐尺二木一錢二分六釐尺三木一錢四分三釐尺四木一錢六分尺五木一錢七分七釐尺六木二錢五分五釐尺七木三錢三分二釐尺八木三錢九分一釐尺九木四錢六分八釐二尺木五錢四分四釐二尺一木六錢二分二釐二尺二木七錢二分四釐二尺三木七錢八分四釐二尺四木八錢六分八釐二尺五木九錢五分四釐江都木價一尺木九分尺一木一錢零七釐尺二木一錢二分四釐尺三木一錢四分一釐尺四木一錢五分八釐尺五木一錢七分五釐尺六木二錢五分三釐尺七木三錢三分尺八木三錢八分九釐尺九木四錢六分六釐二尺木五錢四分二釐二尺一木六錢三分一釐二尺二木七錢一分一釐二尺三木六錢八分四釐二尺四木八錢六分八釐二尺五木九錢五分四釐山清木價一尺木一錢一分尺一木一錢四分尺二木一錢八分尺三木二錢三分尺四木二錢七分尺五木三錢四分尺六木四錢三分尺七木五錢三分尺八木六錢七分尺九木八錢三分二尺木九錢八分三尺一木一兩二錢一分二尺二木一兩四錢七分二尺三木一兩七錢三分二尺四木二兩零二分二尺五木二兩三錢二分二尺六木二兩七錢二尺七木三兩一錢二分二尺八木三兩五錢七分二尺九木四兩五錢三尺木四兩五錢六分三尺一木五兩一錢三尺二木五兩六錢七分三尺三木六兩二錢七分三尺四木六兩九錢三尺五木七兩五錢六分三尺六木八兩二錢五分三尺七木八兩九錢七分三尺八木九兩七錢二分三尺九木十兩五錢四尺木十一兩三錢一分四尺一木十二兩一錢五分四尺二木十三兩零二分四尺三木十三兩九錢二分四尺四木十四兩八錢五分四尺五木十五兩八錢二分四尺六木十六兩八錢四尺七木十七兩八錢二分四尺八木十八兩八錢七分四尺九木十九兩九錢五分五尺木二十一兩六錢徐屬㕔各色料價雜草每束六斤價銀三釐葦每束二十斤價銀一分􅐨麻一斤價銀一分六釐草繩每套九斤價銀一分邳睢㕔各色料價草每束六斤價銀二釐六毫餘與徐屬同揚河㕔各色料價紅草每束二十五斤價銀一分五釐稻草每束二十五斤價銀一分二釐五毫江柴每束百斤價銀八分黃麻每斤價銀一分二釐白麻每斤價銀一分八釐石灰每石價銀二錢糯米每石價銀一兩纜柴每石價銀一錢稻草䌁每条重五斤價銀二釐五毫每砌舊石一丈工價銀三分每砌磚百塊工價銀三分每灰一石用糯米五升每磚一塊用石灰二升每砌石一丈用石灰口口釘每斤價銀三分煤炭一石價銀三錢每磚一塊價銀一分三釐灰篩一面價銀二分灰籮一隻價銀五分木匠每名每日食米一升五合石匠同山盱山清山安三㕔各色料價埽柴每束三十斤價銀二分二釐紅草每束十斤價銀六釐纜柴每束三十斤價銀二分七釐􅐨麻每斤價銀一分四釐劉淳蕩柴山陽産柴每束三十斤價銀一分七釐劉淳採運各工紅草每束十斤價銀三釐樢樟葉每百斤價銀五錢三分九釐二毫六絲石灰每石價銀一錢四分四釐芬草每斤價銀三釐釘每斤價銀三分蘆蓆每片價銀一分灰篩每面價銀四分木掀每把價銀六分埽箒每把價銀六釐宿桃二㕔各色料價草每束六斤價銀二釐六毫餘與徐屬同修造大栁船三年小修銀二十兩五年大修銀三十兩八年拆造銀五十兩大浚船三年小修銀八兩五年大修銀十二兩八年拆造銀十八兩中浚船減十之一五小浚船減十分之三未到年限損壞著船頭賠修如遇真正暴風漂没本船頭賠十分之三通幇賠十分之七山盱㕔各減壩大河磚每塊銀一分六釐單料面石每丈銀九錢五分料半青面石每丈銀一兩四錢二分五釐石灰每石銀一錢四分四釐石匠鑿錠眼每個給銀五釐鋦眼每個銀三釐石匠鑿光石連砌每面石一丈給銀一錢五分每石一丈不論雙單料半牽用石灰一石每磚一塊用灰五升釘每斤三分生鐵錠每斤銀一分四釐熟鐵鋦每斤五分竹篾每斤銀一分二釐黃麻每斤銀二分醬每斤銀一分五釐硪肘每副銀八分煤炭每石銀三錢五分油灰每斤銀一分桐油每斤銀五分五釐真火灰每石銀二錢八分八釐山清外河㕔減壩楊桃藤每斤銀六釐做三和土每方用火灰三十石黃土一百筐楊桃藤六十斤餘料與山盱㕔同宿桃大工料價雙料青面石每丈銀一兩八錢大磚每塊銀一分二釐石灰每石銀一錢六分熬汁荒柴每石銀二分生鐵錠每斤銀一分二釐鐵鋦每斤銀五分釘每斤銀三分