body:
  text: 行水金鑑巻一江南按察使傅澤洪撰河水導河積石至於龍門禹貢釋水云河千里一曲一直則河從積石北行又東乃南行至於龍門漢書西域傳云河有兩源一出蔥嶺一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤又云于闐之西水皆西流注西海其東水東流注鹽澤河源出焉去玉門陽闗三百餘里廣袤三百里其水停居冬夏不増減皆以為潛行地下南出於積石為中國河孔穎達尚書疏漢孔氏曰施功發於積石或鑿山或穿地或通流此説不然使自積石而下龍門而上果有鑿山穿地之迹則經無縁畧而不載也林之竒尚書全解禹不言河源惟記積石吾第論其所記不必求其所不言也龍門而上積石而下地髙而水不為患禹功所不加故不言也傅寅禹貢集解導者循行之謂先儒皆以為施功故其説多誤洪水為帝都切近之災龍門未闢而先從事於積石舍近圖逺無是理也漢志金城郡河關縣下云積石山在西南羌中河水行塞外東北入塞内漢河關縣在今陜西西寧衞西南塞外西域傳云鹽澤水潛行地下南出於積石為中國河後漢縣屬隴西郡志云積石山在西南河水出此禹貢之積石也段熲𫝊自張掖追西羌且鬬且行四十餘日至河首積石山出塞二千餘里唐書侯君集等追吐谷渾王伏允至星宿川又達柏海北望積石山觀河源之所出是皆河關縣西南羌中之積石自隋大業二年平吐谷渾於赤水城置河源郡以境有積石山名唐儀鳳二年改置河源軍在鄯州西百二十里鄯州即西平郡治湟水縣今為西寧衛治又於澆河故城置積石軍在廓州西南百五十里廓州治化城縣其故城在今西寧衛南百八十里唐元和志云積石軍西臨大澗北據黄河即隋澆河郡所治而積石之名遂移於塞内杜氏通典云積石山在今西平郡龍支縣南即禹貢導河積石蔡傳承其誤曰地志積石在金城郡河關縣西南羌中今鄯州龍支縣界也閻百詩為之辯曰漢河關縣宣帝神爵二年置後凉吕光龍飛二年克河關凡四百五十七年為郡縣後没入吐谷渾遂不復况積石又在其西南羌中乎當在漢西海郡之外是真當日大禹導河處龍支縣近在今西寧衛東南八十里本漢金城允吾音鉛牙縣地後漢為龍耆音支城元和志積石山在龍支縣西九十八里南與河州枹音孚罕縣分界枹罕今臨洮府之河州積石山在州西北七十里積石關則又在西北百二十里所謂兩山如削河流經其中是較禹所導之積石河隔千有餘里豈在其縣界者乎縣界之積石乃小積石山即酈注之唐述山耳大小積石之名莫明辨於唐人魏王泰曰大積石山在吐谷渾界小積石山在枹罕縣西北張守節曰河自鹽澤潛行入吐谷渾界大積石山又東北流至小積石山李吉甫曰河出積石山西南羌中今人目彼為大積石此為小積石然則蔡傳當云何曰引地志下當云今鄯州西南塞外山也漢在羌中唐在吐谷渾界今河州枹罕縣鄯州龍支縣界有積石山雖河所經非禹所導者按吐谷渾本遼東鮮卑種也東晉初徙居枹罕宋景平中其子孫有阿豺者升西疆山觀墊江源則其地南至西傾矣又數傳為夸吕始自號可汗治伏俟城在青海西十五里據有甘松之南洮水之西南極於白蘭其地東西三千里南北千餘里党項羌在北析支之地漢時燒當羌亦嘗居之白蘭者羌之别種也其地皆與吐谷渾接吐谷渾在河湟之間即先零燒當諸羌故地積石在其西南南枕賜支河曲禹導河自此始渭按應劭云析支東去河關千餘里河首積石南枕析支則縣距此山亦千餘里可知矣自東晉後縣為吐谷渾所據遂以枹罕為華戎之界故唐初太子賢注後漢書誤認龍支之積石為禹貢之積石後漢桓帝紀延熹二年燒當等八種羌叛冦隴右䕶羌校尉段熲追擊於羅亭破之注云東觀記曰追到積石山即與羅亭相近今鄯州三年燒當羌叛段熲追擊於積石大破之注云積石山在今鄯州龍支縣南即禹貢導河積石是也而中葉巳知其非獨杜佑不審耳宋咸平四年真宗指甘沙伊凉等州圖謂輔臣曰此圖載黄河所出之山乃在積石外與禹貢所述異葢亦以龍支之積石為禹迹也蔡氏承誤以釋經學者宗之故元都實窮河源仍以廓州西南之積石州為積石州即唐積石軍而至正中修宋史河渠志亦云黄河自貴徳西寧之境至積石經河州昔郭景純注山海經曰名實相亂莫矯其失習非勝是終古不悟此之謂矣漢志馮翊夏陽縣下云禹貢龍門山在北劉昭注補郡國志云太史公曰遷生龍門韋昭謂在縣北也水經注引魏土地記曰梁山北有龍門山後魏志夏陽縣有龍門山隋改縣曰韓城今陜西西安府韓城縣也故括地志云龍門山在韓城縣北五十里此河西之山東與壺口隔水相望通典云同州韓城絳州龍門二縣有龍門山即禹所鑿是河東亦有龍門山矣然經所謂龍門在雍域不在冀域孔疏謂積石在龍支又據釋水之文故云至龍門三千餘里然其實不止於此約計有四千三百餘里若禹貢之積石更在龍支縣西南塞外一千二百餘里則自積石至於龍門當有五千五百餘里也龍門以下記河行方向甚詳而其上絶不言方向蔡傳云荒逺其所畧也今按龍門以上禹功所不加故數千里之河總括為一句河自積石東北流至寧夏折而北至廢豐州折而東至東受降城折而南方向不一難於屬辭故畧之非為荒逺也河自積石至於龍門所行皆雍州之域不可謂荒逺宋人見朔方西凉不入其版圖遂以荒逺目之胡渭禹貢錐指河水東入塞過敦煌酒泉張掖郡南水經河自蒲昌有隠淪之證重源出於積石之山山海經曰積石之山其下有石門河水冒以西流是山也萬物莫不有禹貢所謂導河自積石也山在西羌之中司馬彪曰西羌者自析支以西濱於河首左右居也河水屈而東北流徑於析支之地是為河曲矣應劭曰禹貢析支屬雍州在河關之西東去河關千餘里羌人所居謂之河曲羌也東北逕歴敦煌酒泉張掖南地理風俗記曰敦煌酒泉其水甘若酒味故也張掖言張國臂掖以威羌狄酈注里敦煌今肅州西八百廢沙州衛酒泉今肅州衛張掖今甘州衛又自河曲東逕西海郡南水經漢平帝時王莽秉政欲耀威徳以服逺方諷羌獻西海之地置西海郡築五縣周海亭燧相望莽簒政紛亂郡亦棄廢酈注鹽漢志金城臨羌縣西北塞外有僊海池古音西與僊同僊海即西海也一名卑禾羌海亦曰青海又曰鮮水海趙充國請治湟陿以西道橋令可至鮮水左右王莽誘塞外羌獻鮮水海允谷鹽池是也郡治龍夷城在臨羌新縣西三百十里元和志云鄯州西至西海三百七十里龍夷城即今西北三百五十里威戎城也今為西寧衛西塞外地臨羌故城在衛西二百八十里浩亹河南見錐指後倣此又東逕允川而歴大榆小榆谷北水經羌迷唐鍾存所居也永元五年貫友代聶尚為䕶羌校尉攻迷唐斬獲八百餘級收其熟麥數萬斛於逢留河上築城以盛麥其作大船於河峽作橋渡兵迷唐遂逺依河曲永元八年迷唐復與鍾存東冦而還十年謁者王信耿譚西擊迷唐降之詔聽還大小榆谷迷唐種人以漢造河橋兵來無時故地不可居復叛居河曲與羌為讎種人與官兵擊之允川去迷唐數十里營止遣輕兵挑戰因引還迷唐追之至營因戰迷唐敗走於是西海及大小榆無復聚落隃糜相曹鳳上言建武以來西戎數犯法常從燒當種起所以然者以其居大小榆谷土地肥美又近塞内與諸種相傍南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利縁山濱水以廣田畜故能强大常雄諸種今黨援壊沮親屬離叛其餘勝兵不過數百宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路殖榖富邉省輸轉之役上拜鳳為金城西部都尉遂開田二十七部夾河與建威相首尾後羌反遂罷酈注即允川在西寧衛西南塞外大小榆谷唐之九曲也東去積石軍三百里水甘草良宜畜牧睿宗時楊矩為鄯州都督奏請黄河九曲之地以為金城公主湯沐之所吐蕃既得頓兵畜牧又與唐境接近自是復叛天寶中哥舒翰為隴右節度使復收九曲置澆河洮陽二郡髙適作九曲詞以美其功又東過隴西河關縣北洮水從東南來流注之水經今隴西臨洮府河關縣在今河州西河水又逕沙州北段國曰澆河段國沙州記云洮水與墊江水俱出嵹臺山而此注説澆水知洮字乃傳冩之誤耳西南一百七十里有黄沙沙南北一百二十里東西七十里都不生草朩周廻數百里沙州於是取號焉地理志曰漢宣帝神爵二年置河關縣盖取河之關塞也酈注又東北流入西平經誤作卑郡界左合二川南流入河又東北濟川水注之水經水西南出濫瀆東北流入大谷謂之大谷水北逕澆河城西南北流注於河酈注羌後漢建安中析金城郡臨等縣置西平郡治西都縣後魏置鄯州隋改縣曰湟水其故城即今西寧衛治元和志云湟水縣本漢破羌縣地東又逕澆河故城北水經有二城東西角掎東北去西平二百二十里酈注秃南凉髪烏孤以河南地為澆河郡治此城唐於此復置澆河郡其東為積石軍又東逕石城南左合北谷水水經昔段熲擊羌於石城投河墜坑而死者八百餘人即於此也酈注治後魏石城縣廢帝改化隆唐改化城廓州焉元和志云黄河在縣南八十里又東北逕黄河城南水經西北去西平二百一十七里酈注在黄河廣違二城俱廓州境内又東北逕廣違城北又合烏頭川水水經水發逺川引納支津北逕城東而北流注於河酈注又東逕邯川城南水經城之左右歴谷有三水導自北山南逕邯亭注於河酈注髪廢廓州城東南有邯川城秃傉檀所置邯川䕶軍也又東臨津谿水注之水經水自南山北逕臨津城西而北流注於河酈注又東逕臨津城北白土城南水經十三州志曰左南津西六十里白土城城在大河之北而為縁河濟度之處北魏凉州刺史郭淮破羌遮寒魏志作塞於白土即此處矣酈注一臨津城在今河州西北百二十里隋曰臨津關大業五年自将伐吐谷渾出臨津關渡黄河至西平即此城也白土城在今西寧衛南又東左㑹白土川水水經水出白土城西北下東南流逕白土城北又東南注於河酈注又東北㑹兩川右合二水水經參差夾岸連壤負險相望河北有層山山甚靈秀山峯之上立石數百丈亭亭桀竪競勢争髙逺望嵾嵾若攢圖之托霄上其下層巖峭舉壁岸無階縣巖之中多石室焉室中若有積巻矣而世士罕有津逮者因謂之積書巖巖堂之内毎時見神人往還矣葢鴻衣羽裳之士練精餌食之夫耳俗人不悟其仙者乃謂之神鬼彼羌目鬼曰唐述復因名之唐述山下崖有水導自是山谿水南注河謂之唐述水酈注東西寧衛南八十里有龍支故城本漢允吾縣地後漢置龍耆城和帝以曹鳳為金城西部都尉屯龍耆是也後魏於此置北金城縣西魏改曰龍支元和志積石一名唐述山今名小積石山在鄯州龍支縣西九十八里河州枹罕縣北七十里黄河在龍支縣西南六十里枹罕縣北五十里又東得野亭南水經又東北流得研川謂之研川水又東北注於河謂之野城口酈注又東歴鳳林北水經鳳林山名五巒俱峙秦州記曰枹罕原北名鳳林川川中則黄河東流也酈注縣鳳林在今河州北隋志枹罕有鳳林山元和志云在縣北三十五里又東與灕水合水經水導源塞外羌中又東北逕石門口山髙嶮絶對㟁若門疑即臯蘭山門也漢武帝元狩三年驃騎霍去病出隴西至臯蘭應謂是山之關塞也又東逕白石縣故城南又東逕白石山又東逕枹罕縣故城南又東北出峽北流注於河地理志曰灕水出白石縣西塞外東至枹罕入河酈注二元和志石門山在鳳林縣北十八里灕水西去縣二百步枹罕故城即今河州治白石故城在州西又逕左南城南水經十三州志曰石城西一百四十里有左南城酈注城左南今在西寧衛東南又東逕赤岸北水經即河夾岸也秦州記曰枹罕有河夾岸岸廣四十丈義熙中乞佛於此河上作飛橋橋髙五十丈三年乃就酈注州河夾岸即今臨洮府河西北赤岸戍是又東洮水注之水經地理志曰水出塞外羌中沙州記曰洮水與墊江水俱出嵹臺山山南即墊江源山東則洮水源也嵹臺西傾之異名也洮水東北流吐谷渾中吐谷渾者始是東燕慕容之枝庶因氏其字以為首𩔖之種號也洮水又東北流逕曽城北又東逕臨洮縣故城北又西北逕降狄道故城東有濫水馬援為隴西太守為狄道開渠引水種秔稻而郡中樂業即此水也濫水又西北流逕注於洮水洮水右合二水右㑹大夏川水水出西山二源合舍而亂又東逕大夏縣故城南又東北出山注於洮水又北翼帶三水亂流北入河地理志曰洮水北至枹罕東入河是也酈注潭曽城即臨故城在今洮州衛西南七十里元和志云城東北二面並枕洮水臨洮縣故城即今岷州衛治降狄道故城即今臨洮府西南狄道故城也元和志大夏縣西北至河州七十里大夏川水經縣南去縣十步近志云大夏河即灕水謬也又東過金城允吾縣北水經金城郡治也南有湟水出塞外東南流逕龍夷城故西零之地也又東南逕卑禾羌海世謂之青海東去西平二百五十里湟水東流逕湟中城北故小月氐之地也又東逕臨羌縣故城北又東逕臨羌新縣故城南又逕西平城北又東逕樂都城南東流又合來谷乞斤流二水左㑹陽非流谿細谷三水東逕破羌縣故城南又東與閤門河合即浩亹河也又東逕允吾縣北又東逕允街縣故城南又東逕枝陽縣逆水注之逆水又東逕枝陽縣故城南東南入於湟水地理志曰逆水允吾東至枝陽入湟河又東流注於金城河即積石之黄河也酈注一金城漢縣即今蘭州州西百二十里有允吾故城元和志湟水名湟河亦謂之樂都水出青海東北亂山中東南流至蘭州西南入黄河今蘭州本漢金城縣允街枝陽今皆在蘭州境又東逕石城南水經謂之石城津闞駰曰在金城西北矣又東南逕金城縣故城北十三州志曰大河在金城北門東流有梁泉注之酈注縣石城在今蘭州西金城故城即今蘭州治又東過榆中縣北水經昔䝉恬為秦北逐戎人開榆中之地地理志曰金城郡之屬縣也酈注榆中在今蘭州東北又東過天水北界水經菀川水出勇士縣之子城南山東北流歴此城川世謂之子城川又北逕牧師菀故漢牧菀之地也有東西二菀城相去七里西城即乞佛所都也又北入於河也酈注流今靖逺衛西有菀川城黄河自蘭州界東北越亂山中二百餘里入衛界始㵼落巨川如瀑布然土人沿山引水灌田甚廣衛西二百里有勇士縣故城又北過武威媪圍縣東北水經河水逕其界東北流縣西南有泉源東逕其縣南又東北入河酈注河今寧夏中衛西南有温圍水下流入黄通鑑晉咸寧五年馬隆討凉州鮮卑度温圍水胡三省曰漢武威郡有媪圍縣此水或因以名媪訛温也又莊浪所本漢武威郡地宋元嘉十六年魏主燾議伐凉州李順等請自温圍水以西至姑臧則此水當出媪圍縣界縣在河西莊浪之東南中衛之西南也又東北過天水勇士縣北水經地理志曰蒲福也屬國都尉治蒲福當作滿福前漢地志勇士縣注云屬國都尉治滿福水出縣山世謂之二十八渡水東北流谿澗縈曲途出其中逕二十八渡行者勤於溯涉故因名焉北逕其縣而下注河酈注又東北過安定北界麥田山河水東北流逕安定祖厲縣故城西北水經漢武帝元鼎五年幸雍遂踰隴登空同西臨祖厲祖厲音嗟賴河而還即於此也又東北祖厲川水注之水出祖厲南山北流逕祖厲縣而西北流注於河酈注故祖厲城在今靖逺衛西南一百三十里又東北逕麥田城西又北與麥田泉水合水經水出城西北西南流注於河酈注靖麥田城在今逺衛北又東北逕麥田山西水經在安定西北六百四十里酈注又東北逕於黑城北又東北髙平川水注之水經即若水也水出髙平大壟山若水谷建武八年世祖征隗囂漢從髙平第一城若水谷入即是谷也東北流逕髙平縣故城東又北出秦長城又北逕亷城東又北逕三水縣西西南去安定郡三百四十里髙平川水又北入於河酈注里元和志秦長城在髙平縣北十今平凉府莊浪縣西二十里有若水川自靖寧州流入又北入鎮原縣界為髙平川髙平故城在今平凉府固原州西二里又東北逕眴巻縣故城西水經地理志曰河水别出為河溝東至富平北入河河水於此有上河之名也酈注中眴巻音旬箘故城在今寧夏衛東唐為靈州鳴沙縣地又北過北地富平縣西水經河側有兩山相對水出其間即上河峽世謂之為青山河水歴峽北注枝分東出酈注地富平縣即今靈州所上河峽即寧夏衛西南一百四十里峽口山是又北逕富平縣故城西水經秦置北地都尉治縣城酈注富今靈州所西南有平縣故城又北薄骨律鎮城水經城在河渚上赫連果城也桑果餘林仍列洲上酈注薄骨鎮城在今蘭州所境唐朔方節度治所元和志靈州理廻樂縣本漢富平縣縣枕黄河後魏刁雍為薄骨律鎮將上表請開富平西三十里艾山舊渠通河水溉公私田四萬餘頃人大獲其利又薄骨律渠在縣南六十里溉田千餘頃靈武縣東南至靈州十八里黄河自廻樂縣界流入漢渠在縣南五十里從漢渠北流四十餘里始為千金大陂其左右又有胡渠御史百家等八渠溉田五百餘頃按五代唐長興中朔方帥張希崇亦引河渠興屯田以省漕運民夷愛之今靈州所境田多沃饒恒無暵涸之患賴黄河之灌溉也又逕典農城東又逕北典農城東水經都二城皆上河典農尉馮參所治也在今靈州所界又東北逕亷縣故城東水經當亷縣漢屬北地郡其故城在今靈州所西南又北與枝津合水經水受大河東北逕富平城所在分裂以溉田圃北流入河今無水酈注又東北逕渾懐鄣西水經地理志曰渾懐都尉治塞外者也太和初三齊平徙歴下民居此遂有歴地之名矣酈注靈元和志懐逺縣在州東北隔河一百二十里廢靈武城在縣東北隔河一百里其城本䝉恬所築古謂之渾懐鄣又東北歴石崖山西水經山石之上自然有文盡若戰馬之狀亦謂之畫石山酈注平石崖山在今羅所東又北過朔方臨戎縣西又北逕臨戎縣故城西水經河水東北逕三封縣故城東十三州志曰在臨戎縣西一百三十里臨戎縣舊朔方郡治酈注郡三封屬朔方其故城在今榆林衛界廢夏州西南長澤縣北二十里又北有枝渠東出謂之銅口東逕沃野故城南水經枝渠東注以灌田所謂智通在我矣酈注故元和志沃野城在天徳軍城北六十里即後魏六鎮從西第一鎮也刁雍上表云臣鎮去沃野鎮八百里道多深沙輕車往來猶以為難又北屈為南河出焉又北迤西溢於窳渾縣故城東水經西部都尉治有道自縣西北出雞鹿塞酈注年漢甘露三董忠送韓邪單于出雞鹿塞後漢永元初竇憲出雞北鹿塞伐匈奴是也窳渾縣故城今在廢夏州西又屈而東流為北河水經河漢元朔二年衛青絶梓嶺梁北杜佑曰河經靈武郡西南便北流凡千餘里過九原郡乃東流漢人謂之西河自九原以東漢人謂之北河然北河之名秦已有之史記惠文王後五年游北河昭襄王十八年又之上郡北河是也東逕髙闕南水經史記趙武靈王自代並隂山下至髙闕為塞山下有長城長城之際連山刺天其山中斷兩岸䨇闕善能雲氣望若闕焉節狀表目故有髙闕之名自闕北出荒中闕口有城跨山結局謂之髙闕戍上古迄今常置重捍以防塞道漢元朔四年衛青將十萬人敗右賢王於髙闕即此處也又東逕臨河縣故城北酈注髙闕在廢豐州城西黄河外劉昫曰髙闕北距大磧口三百里臨河故城在今榆林衛西北自臨河縣東逕陽山南水經漢書注陽山在河北指此山也南屈逕河目縣左北假地名自髙闕以東夾山帶河陽山以西皆北假也史記秦使䝉恬將十萬人北擊胡度河所髙闕據陽山北假中是也北河又南合南河上承西河東逕臨戎縣故城北又東逕臨河縣南又東逕廣牧縣故城北流二百許里東流入河酈注西臨河故城在今榆林衛北陽山即隂山也山在中國之極北故名隂山水北曰陽山在河水之北故亦謂之陽山徐廣云隂山在河南陽山在河北非也漢書侯應曰北邉塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冒頓依阻其中治作弓矢求出為冦是其苑囿也孝武出師征伐斥奪此地攘之於幕北建塞徼起亭隧築外城列屯戌以守之然後邉境得用少安計隂山緜亘千餘里直扺遼東非河南所能容益信徐説之謬括地志云五原郡河目縣故城在北假中北假在河北属勝州銀城縣漢書王莽傳云五原北假膏壤殖榖臨戎縣見前廣牧縣故城在榆林衛地界又東逕馬隂山西水經史記音義曰五原安陽縣北有馬隂山酈注今安陽縣在山西蔚州界又東南逕朔方縣故城東北水經詩所謂城彼朔方也漢元朔二年大將軍衛青取河南地為朔方郡使校尉蘇建築朔方城即此酈注方漢朔郡治元和志什賁故城在夏州朔方縣理北即朔方縣之故城自漢至今常為闗中根植什賁之號葢蕃語也自朔方東轉逕渠搜縣故城北水經地理志曰朔方有渠搜縣中部都尉治又逕西安陽故城又東逕田辟城南酈注州朔方中部都尉治在廢夏北此非禹貢之渠搜安陽故城在廢豐州東北漢志五原郡成宜縣下云中部都尉治原亭西部都尉治田辟辟讀曰壁原亭田辟葢皆縣界之地名又東逕成宜縣故城南水經宜廢豐州界有成縣故城又東逕原亭城南水經十三州志曰中部都尉治酈注行水金鑑巻一
