body:
  text: 行水金鑑巻三江南按察使傅澤洪撰河水東至於厎柱禹貢作按厎史記砥厎柱山名在西虢之界孔氏傳柱西虢今河南府之陜州厎在州東四十里黄河中河自南行至華隂自華隂東行至厎柱則東字連華隂而言禹貢集解河水自華隂潼闗又東北玉澗水注之水經河水自潼關東北流水側有黄巻阪傍絶澗涉此阪以升潼關所謂泝黄巻以濟潼闗矣歴北出東㟓通謂之函谷闗闗之直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之所謂風塠者也九域志云女媧墓在今潼闗口河灘上屹然介河有木數株雖暴漲不漂沒也寰宇記云河東縣三里風陵是女媧之墓南則河濵玉澗水南出玉溪北流逕皇天原西有漢武帝思子臺又北逕閿鄉城西北流注於河酈注在函谷闗今河南靈寳縣南十一里黄巻潘岳西征賦作黄巷又東逕閿鄉城南東與全鳩澗水合水經水出南山北逕皇天原東述征記曰全節地名圖經云全節即漢書全鳩里戾太子死處其西名桃原古之桃林晉太康地記曰桃林在閿鄉南谷中其水入河北注於河河北葢謂河北縣也酈注鄉全節在今河南南陽府閿縣東十里鳩澗西又東過河北縣南水經縣與湖縣分河蓼水出襄山蓼谷西南流於河酈注河北今山西平陽府芮城縣湖縣今河南南陽府閿鄉縣又東永樂澗水注之水經水北出薄山南流逕河北縣故城西又南入於河封禪書稱華山以西名山七薄山其一焉酈注北今芮城縣有河北故城薄山在今縣北一十五里河水自河北城南東逕芮城水經二城之中有段干朩冢魏文侯過其門式其廬所謂徳尊萬古芳越來今矣酈主又㑹槃澗水經水出湖縣夸父山北逕漢武帝思子宫歸來望子臺東又北流入於河酈注鄉湖縣故城在今閿縣東四十里又東逕湖縣故城北水經湖水出桃林塞之夸父山廣員三百仞武王伐紂天下既定王及岳濵放馬華陽散牛桃林即此處也山海經曰夸父之山其北有林焉名曰桃林其中多馬湖水出焉北流注於河酈注又東合柏谷水水經水出𢎞農縣兩石堤山北流入於河酈注又東右合門水水經門水即洛水之枝流也東北歴陽華山山海經所謂陽華之山門水出焉者也又北逕𢎞農縣故城東城即故函谷闗校尉舊治終軍棄繻於此又東得七里澗澗在陜縣七里故名又東合譙水二源雙導同注於壑而西北流注於河酈注澗元和志曹陽墟俗名七里在陜縣西南七里黄河自靈寳界流入後漢獻帝歸至陜議者欲天子浮河東下太尉楊彪曰從此以東有三十六灘非萬乗所當從也乃止又東過陜縣北又西逕陜縣故城南水經河北對茅城津河南即陜城昔周召分伯以此城為東西之别戴延之云城南倚山原北臨黄河縣水百餘仞臨之者咸悚惕焉西北帶河水湧起方數十丈斯水之所以濤波者葢史記所云魏文侯二十六年虢山崩壅河所致耳酈注國今陜州治即陜縣故城古焦也茅津亦謂之大陽津與虢山俱在州西北三里又東過大陽縣南又東逕大陽縣故城南水經地理志曰北虢也應劭記城南大河之陽也酈注陸今平縣東北有大陽縣故城又東沙澗水注之水經北出虞山東南逕傅巖孔安國傳傅説隠於虞虢之間即此處巖東北十餘里即巔軨坂春秋左傳所謂入自巔軨者也有東西絶澗左右幽空窮深地壑中則築以成道指南北之路謂之為軨橋也傅説傭隠止息於此髙宗求夢得之是矣又東南左右合積石土柱二溪並北發大陽之山南流入於河是山也亦通謂之為薄山矣酈注又東過砥柱間水經砥柱山名也山在虢城東北大陽城東也酈注砥元和志柱山俗名三門山在硤石縣東北五十里黄河中硤石本陜縣地河之右則崤水注之水經出河南盤崤山歴澗水東北流與石崤水合水出石崤山山有二陵南陵夏后臯之墓也北陵文王所避風雨矣又北左右合西水亂流注於河酈注又東千崤之水注焉水經水南導於千崤之山北流注於河河水翼岸夾山巍峰岐舉羣山疊秀重嶺干霄康成按地説河水東流貫砥柱觸閼流今世所謂砥柱者蓋乃閼流也砥柱當在西河未詳也余按鄭説非是西河當無山以礙之自砥柱以下五戸以上其間一百二十里河水竦石桀出勢連襄陸蓋亦禹鑿以通河疑此閼流也其山雖闢尚梗湍流激石雲洄澴波怒溢合有一十九灘水流迅急勢同三峽破害舟船自古所患五户灘名也酈注東崤在今河南府永寧縣北六十里元和志自崤至西崤長三十五里在秦闗之東漢闗之西崤與殽同今河南府陜州東一百六十里有五户灘在河中為湍激之處自此而東河流稍為寛衍河自西華隂遂折而東流以至厎柱亦謂之三門山山在虢城東北大陽城東也按道元謂厎柱是禹之所鑿其説是也至謂破山以通河此則過論河之至厎柱蓋舊有可通之道禹嫌其狹於是疏而廣之故有三門非是先鑿厎柱山以為三門然後導河而過之也漢鴻嘉中楊焉上言厎柱狹隘可鐫廣之夫禹之治水未嘗不為萬世之慮使厎柱尚有可鐫之理則禹鐫之矣禹所不能鐫而焉欲鐫之何其不思之甚也蓋河自龍門至於華隂東折以及厎柱夾於兩山之間其勢最為狹隘故古語云龍門之下河流駛於竹箭惟其為髙山所束其勢不得盤還則其漂悍湍激覆溺舟船是乃萬世之患也豈人力之所能勝哉道元謂水流峻急勢同三峽破壊舟船自古所患此説是也頃歳建劍大興役功鑿治衆灘其費不貲某嘗詢於舟人云灘患不减於昔日以是知天地山川之險蓋有出於勢之自然者未易以人力争也厎柱舟船之患雖禹無如之何而况於楊焉輩乎尚書全解河不能决於厎柱之上者河由兩山中行也出厎柱則平原廣野又并受闗東諸山之水水流益多水勢益大地形益卑水勢益急虞夏以前皆都在厎柱之上商初都亳亦在諸山中書所謂適於山降凶徳是也以後就水利反受其害以故殷數遷都至周之衰井田漸廢侯國争水利者築堤以包沃饒之利避水患者亦築堤以鄰國為壑隄日多水日束日失其性而致怒決溢之害不小然決而南奪淮而行害郡邑為少決而北則無復九河故道原野被害逺矣鄭曉古言以今輿地言之河自潼闗衛北折而東逕閿鄉縣北又東逕靈寳縣北其北岸則芮城縣閿鄉在河南陜州西少北一百三十里黄河南去縣七里靈寳在州西六十里黄河南去縣十里芮城在山西解州西南七十里黄河在縣南二十里芮伯萬之故畺也盖芮城與閿鄉分河二縣俱在河之北岸又東逕陜州北其北岸則平陸縣又東過厎柱陜州在河南府西三百里平陸在解州東南九十里厎柱山在黄河中西去陜州四十里西北去平陸五十里唐趙冬曦三門賦序曰厎柱之六峰者皆生河之中流盖夏后之所開鑿其最北有兩柱相對距崖而立即所謂三門也次於其南有孤峰掲起峰頂平闊夏禹之廟在焉西有孤石數丈圓如削成復次其南有三峰東曰金門中曰三堆西曰天柱河水從黄老神前東流湍激蹙於蝦石折流而南潄於三門苞於廟山乃分為四流淙於三峰之下抵於曲隈㑹流東注加以兩崖夾水盤紆激射天下罕比都穆曰厎柱在陜州東五十里黄河之中循河至三門集津三門者中曰神門南曰鬼門北曰人門水行其間聲激如雷而鬼門尤為險惡舟筏一入鮮有得脱三門之廣約二十丈其東百五十步即厎柱山崇約三丈周數丈蔡氏書傳以三門為厎柱州志亦謂厎柱即三門山皆未嘗親履其地故謬誤若此按此説與趙賦小異要之諸峰在當時總為一巨石禹析之以通河三門亦厎柱也後人强生分别耳此河水東至厎柱之所經也禹貢錐指又東至於孟津禹貢孟津在洛北都道所凑古今以為津孔氏傳府今河南懐慶孟縣西南三十里即孟津非河南府之孟津縣也孟地名津是渡處在洛陽城北孔氏疏林少穎云河自華隂至於厎柱夾兩山之間其流皆湍悍至於孟津然後其勢稍緩可以横舟而渡也渭按大陽縣南有茅津秦穆公封殽尸自此濟河不待至河陽始可渡林説非是大河津濟處甚多唯孟津以都道所湊四通五達之衢故其名古今特著禹貢錐指河水自厎柱山東五戸灘又東過平隂縣北又東至鄧清水從西北來注之水經平今孟津縣有隂故城清水出清亷山之西嶺東南流逕垣縣故城北又東南逕陽壺城東即垣縣之壺丘亭又東南流注於河酈注里今垣曲縣西四十有垣縣故城又東與教水合水經出垣縣北教山南逕平山其水南流歴鼓鐘上峽懸洪五丈飛流注壑夾岸深髙壁立直上經崖秀舉百有餘丈峰次青松巖懸赬石於中歴落有翠柏生焉丹青綺分望若圖繡矣山海經曰教山教水出焉又南流注於河是水冬乾夏流實唯乾河也今世人猶謂之乾澗矣酈注又與畛水合水經水出新安縣青要山北流入於河酈注又東合庸庸之水水經水出河南垣縣宜蘇山北流分為二水一水北入河一水又東北流注於河酈注又東逕平隂縣北水經地理風俗記曰河南平隂縣故晉隂地隂戎之所居又曰在平城之南故曰平隂三老董公説髙祖處魏文帝改曰河隂酈注西㑹濝水水經水出垣縣王屋西山濝谿歴軹關南逕苖亭西亭東流注於河酈注有今濟源縣西濝水又東過平隂縣北湛水從北來注之水經出湛水篇云湛水河内軹縣西北山東南流當平隂縣之東北南入於河今濟源縣西南有湛水又東逕河陽縣故城南水經春秋經書天王狩於河陽酈注十今懐慶府孟縣西南三里有河陽故城相傳潘安仁種花滿縣今其地皆斥鹵矣又逕臨平亭北水經帝王世紀曰光武𦵏臨平亭南西望平隂者也酈注後漢明帝紀原陵注云臨平亭南去洛陽十五里又東逕洛陽縣北水經河之南岸有一碑北面題云洛陽北界酈注漢洛陽故城河南郡治在今洛陽縣東北二十里又東逕平縣故城北水經俗謂之小平也河北側岸有二城相對置北中郎府河水南對首陽山春秋所謂首戴也夷齊之歌所矣上有夷齊之廟河南有鈎陳壘世傳武王伐紂八百諸侯所㑹處河水至斯有盟津之目論衡曰武王伐紂與八百諸侯咸同此盟故孟津亦曰盟津尚書所謂東至於孟津者也又曰富平津晉陽秋曰杜預造橋於富平津所謂造舟為梁也又謂之陶河魏尚書僕射杜畿以帝將幸許試樓船覆於陶河謂此也酈注城漢河南郡有平縣即今孟津縣西北小平也杜佑曰在鞏縣西北有津曰小平津以今輿地言之河水自陜州又東逕澠池縣北其北岸則垣曲縣澠池在河南河南府西少北一百六十里垣曲在山西絳州西南二百十里黄河在縣南五里與澠池分水又東逕新安縣北又東逕洛陽縣北又東逕孟津縣北新安在河南府西北七十里黄河去縣七十里洛陽河南府治黄河去縣二十里繞北邙山之麓孟津縣在府東北五十里黄河去縣五里有陶渚其西有峽石馬渚髙渚委粟津皆大河津濟處縣西北十五里有羅家灘又西為楊家灘栁灘杏灘及耕子馬墳二灘皆在大河中其北岸則濟源縣孟縣濟源在懐慶府西七十里黄河在縣南七十里與新安洛陽分水孟縣在府南少西五十五里黄河在縣南二十里南對小平津廣二里有南城北城中潬城河陽三城記曰北城南臨大河長橋架水南城三面臨河屹立水濵中潬表裏二城南北相望黄河兩𣲖貫於三城之間毎秋泛溢南北二城皆有濡足之患而中潬屹然如故此河水又東至孟津之所經也自古論河患者皆云孟津而下地平土疏移徙不常失禹故道然吾觀孟津以上亦不能無患自杜預建浮梁之後更三百餘年不聞為水所毁至唐貞觀十一年河溢壊中潬城始見於史逮宋而其患彌甚史不絶書嘉祐八年大水馮襄中潬之城遂廢推原其故蓋隋唐以來厎柱閼流之害倍於曩時延及孟津河身亦淺水暴至不能容故也宋世北河淤澱水不通行今南岸灘渚更多非止一中潬矣潘季馴兩河經畧疏曰黄河經行之地唯河南之土最鬆禹導河入海一經河南其水未必如今之濁今去禹導河之時復三千餘年流日久土日鬆土愈鬆水愈濁故平時之水以斗計之沙居其六一入伏秋則居其八矣以二升之水載八分之沙非極湍急即至停滯故水分則流緩流緩則沙停勢所必至也其所以不至逺氾濫者徒以夾河之山脈未盡地髙土堅耳然上流之怒不泄則害必鍾於下流漢明帝詔曰左隄彊則右隄傷左右皆彊則下方傷孟津之隄所謂左右皆彊則下方傷者也至滎陽則左隄彊而右隄傷矣治河者欲使洛汭以東永無溢決其可置孟津厎柱於度外乎禹貢錐指東過洛汭至於大伾禹貢洛汭洛入河處至於大伾北行孔氏傳水水經洛水篇云洛出京兆上洛縣讙舉山又東户水注之又東得乳水又東㑹於龍餘之水又東門水出焉又東逕熊耳山北東北過盧氏縣南逕陽渠闗北又東逕盧氏縣故城南東與髙門水合又東松楊谿水注之又東庫谷水注之又東北過蠡城邑之南父邑之南又東渠谷過陽市邑南又東北過於又東北過宜陽縣南又東逕宜陽縣故城南又東北出散闗南又東枝瀆左出焉又東北過河南縣南又東過洛陽縣南伊水從西來注之又東過偃師縣南又北陽渠水注之又東逕訾城北又東羅水注之又東北過鞏縣東又北入於河又東北流入於河大伾漢書音義以為今黎陽縣山臨河是孔氏疏府今大名濬縣東北有黎陽故城大伾山在縣東南二里洛既北入河河之南洛之北其兩間為汭汭之為言在洛水之内也渭水入河之間亦名渭汭正其義也程大昌書譜自華山東行為嵩山伊洛瀍澗合為一川北流入於河是為山川一都㑹周人卜洛蓋自古以為令居矣導河南至華隂折而東行至大伾折而北行所謂千里而一曲也黄度尚書説黎陽山一名黎山晉灼曰黎山在其南河水經其東其山上碑云縣取山之名取水在其陽以為名也劉楨黎陽山賦曰南䕃黄河左覆金城青壇承祀髙碑頌靈隋志黎陽縣有大伾山括地志云大伾山今名黎陽東山又名青壇山山在衛州黎陽縣南七里顧炎武肇域記云爾雅山一成曰伾孔安國曰山再成曰伾今觀山形當以安國為是山上有青壇漢光武平王郎還至黎陽築壇祭告天地百神劉楨賦所謂青壇承祀髙碑頌靈者也禹貢錐指河水自平縣故城北又東過鞏縣北水經河水於此有五社津縣北有山臨城謂之崟㟶丘其下有穴謂之鞏穴直穴有渚謂之鮪渚吕氏春秋稱武王伐紂至鮪水紂使膠鬲候周師即是酈注府今河南鞏縣北五里有五社津崟㟶丘在縣西北三十里洛水從縣西北流注之水經洛水於鞏縣而東洛汭北對琅邪渚入於河謂之洛口自縣西來而北流注洛清濁異流皦焉殊别酈注又東過成臯縣北濟水從北來注之水經河水自洛口又東左逕平臯縣南又東逕懐縣南濟水故道之所入與成臯分河水酈注慶平臯廢縣在今懐府温縣東懐縣故城在今懐慶府武陟縣西南又逕黄馬坂北水經謂之黄馬關酈注十今開封府汜水縣西五里有黄馬闗又東逕旋門坂北水經今成臯西大坂昇陟此坂東趣成臯曹大家東征賦曰望河洛之交流㸔成臯之旋門者也酈注汜今開封府水縣西南十里有旋門坂東逕成臯大伾山下水經成臯縣故城縈帶伾阜絶岸峻周髙四十許丈城張翕嶮﨑而不平春秋傳曰制巖邑也虢叔死焉即東虢也魯襄公二年晉成公與諸侯㑹於戚遂城虎牢秦以為闗酈注一大伾山在汜水縣西一里有大澗九曲名九曲山上有成臯舊城吕布嘗據此山之東盡於玉門山為汜水入河處西去洛口裁四十里非禹貢之大伾山也南對玉門水經昔漢祖與滕公潛出濟於是處也門東對臨河酈注又東合汜水水經水南出浮戲山世謂之方山北逕虎牢城東又北流注於河酈注南方山在汜水縣四十里又東逕板城北水經有津謂之板城渚口酈注渚汜水縣東北二十里即板城隋大業初開通濟渠自板渚引河歴滎陽入汴又東過滎陽縣蒗蕩渠出焉水經漢平帝世河汴決壊未及得修永平十二年議治汴渠詔王景與將作謁者王昊共築堤修堨起自滎陽東至千乘海口千有餘里陽嘉中又自汴口以東縁河積石為堰通古淮口咸曰金堤建寧中又増修石門以遏淮口水盛則通注津耗則輟流酈注為古滎陽今滎澤河隂二縣地蒗蕩渠首受河處即今河隂縣西二十里之石門渠是也河渠書言滎陽下引河東南為鴻溝亦即其處班志河南滎陽縣下云有浪湯渠首受泲泲即可也漢人謂濟水截河而南故曰首受泲京相璠所謂出河之濟宋張洎云即鴻溝也蒗蕩渠東南流為滎瀆濟水為官度水為隂溝汳水浚儀渠其在大梁城南者為鴻溝鴻溝南流兼沙水之目沙水枝津又為睢水渦水名稱不一要皆河隂石門河水為之委别而源同也志家不曉繫鴻溝於今滎陽縣漢京縣地繫蒗蕩於滎澤縣繫石門渠於河隂縣似各為一水原委不相貫者而又以河隂石門與滎口石門混為一處故詳辨之若隋煬引板渚口水入汴則在汜水縣東北二十里漢成臯縣地其非古滎陽引河處亦明矣又按今河隂縣西有石門渠滎瀆受河之處即禹貢導滎水之道亦曰滎口蘇代曰決滎口魏無大梁信陵君亦云決滎澤而水大梁其後秦王賁果斷故渠引水東南灌大梁亦兼邲之稱晉楚之戰楚軍於邲即此水也建寧中於敖城西北壘石為門以遏浚儀渠口水門廣十餘丈西去河三里水盛則通水耗輟流即酈注所云是也魏黄初中河濟泛溢鄧艾議開石門以通之晉武帝時復壊傅祗為滎陽太守造沉菜堰於是兖豫無水患桓温伐燕欲開石門以通水運而不能既而燕率騎屯石門斷溫糧道劉裕伐秦遣水軍出石門自汴入河乃於北十里更鑿故渠通之周齊之間名汴口堰隋使梁睿増築漢古堰遏河入汴自是又名梁公堰又開通濟渠自板渚引河歴滎澤入汴唐河南尹李傑奏浚梁公堰以通漕公私便利未幾洛陽人劉宗器請塞氾水舊汴河於梁公堰置斗門通淮汴明年新漕填塞乃命疏鑿舊河旬日而畢及劉晏為轉運使騐視梁公堰通津渠及李傑新隄盡得其利轉輸無壅後周浚汴口導河達於淮江舟楫始通復命王朴如河隂按行河堤立斗門於汴口既又令韓令坤導汴入蔡以通陳頴之漕胡三省曰自漢築滎陽石門而濟與河合流入海不入滎澤又東北逕巻之扈亭北水經左傳文公七年晉趙盾與諸侯盟於扈竹書紀年晉出公二十二年河絶於扈即於是也酈注地杜預云扈鄭在滎陽巻縣西北今原武縣西北有扈亭又東逕八激堤北水經漢永初七年令謁者太山于岑於石門東積石八所皆如小山以捍衝波謂之八激堤酈注又東逕巻縣北水經晉楚之戰晉軍争濟舟中之指可掬楚莊祀河告成而還即是處酈注有巻縣故城在原武縣西北七里城東濟隧濟水上承河水於巻縣北河南與出河之濟㑹又東北逕赤岸固北而東北注之又東北過武徳縣東沁水從之水經云武徳縣故城在今懐慶府武陟縣沁水篇沁水出上黨湼縣謁戾山東南流逕武徳縣南又東南至滎陽縣北東入於河東至酸棗縣西濮水東出焉水經漢孝文時河決酸棗東潰金堤大發卒塞之故班固曰文堙棗野武作瓠歌謂斷此口也今無水酈注故酸棗城在今開封府延津縣北十五里濟水注云濮水受河於酸棗縣漢世塞之即此河水又東北通謂之延津水經是處有靈昌津昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威刼操劒斬蛟蛟死波休乃投璧於河三投而輒躍出乃毁璧而去示無恡意趙建武中造浮橋於津上採石為中濟石無大小下輒流去用功百萬經年不就石虎親閲作工沉璧於河明日璧流渚上波蕩上岸遂斬匠而還酈注津元和志云滑州靈昌縣有延津即靈昌在縣東北二十二里今滑縣西南有靈昌廢縣津在白馬津之西南又東逕燕縣故城北濟水自北來注之水經河水於是有棘津之名亦謂之濟津故南津也春秋僖公二十一年晉將伐曹曹在縣東假道於衛衛人不許還自南河即此濟也酈注東今胙城縣東有燕故城又東淇水入焉又東逕遮害亭南水經漢書溝洫志曰在淇水口東十八里有金堤自淇口東地稍下堤稍髙至遮害亭四五丈又有宿胥口舊河水北入也酈注注水經淇水出河内隆慮縣西大號山云淇水南歴枋堰舊淇水南東流逕黎陽縣界南入河淇水口亦名清河口以淇清二水合流入河故互受其名也宿胥口在今大名府濬縣西南遮害亭東以今輿地言之河水自孟津縣北又東逕鞏縣北洛水入焉其北岸則温縣濟水入焉鞏縣在河南府東少北一百三十里黄河南去縣十里洛水舊於此入河今又東過汜水縣至滿家溝入河温縣在懐慶府東南五十里黄河在縣南新志云河舊離城二十里今漸徙而北逼近城隈矣濟水古於武陟縣東入河後徙流逕温縣南至平臯入河今故道盡陷河中又東逕氾水縣北又東逕滎陽縣北其北岸則武陟縣沁水入焉汜水在開封府鄭州西一百一十里黄河南去縣二十五里武陟在懐慶府東一百里黄河在縣南十五里沁水在縣東一里入河名南賈口又東逕河隂縣北又東逕滎澤縣北其北岸則獲嘉縣河隂在鄭州西北五十里滎澤在州北五十里獲嘉在衛輝府西南九十里又東逕原武縣北原武在開封府西一百二十里又東逕陽武縣北陽武在府西北九十里又東逕延津縣北又東逕胙城縣北其北岸則新鄉汲縣延津在府西北九十里胙城在衛輝府東南三十五里新鄉在府西南五十里汲縣衛輝府治黄河在縣東南十七里又東北至濬縣西南古宿胥口大伾山在其東北其南岸則滑縣濬縣在大名府西南一百八十里滑縣在府西南二百里黄河舊在濬縣東南滑縣西北自金明昌中河離汲縣而濬滑之流遂絶此河水東過洛汭至於大伾之所經也凡二水並行一盛則一㣲自然之勢也宋元祐初蘇轍上疏有云黄河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理此格言也蓋上流宜合而不宜分合則流急而沙去分則流緩而沙停矣周之衰也王政不修水官失職諸侯各擅其山川以為已利於是有滎陽下引河為鴻溝者自是以後日漸穿通枝津交絡宋鄭陳蔡曹衛之郊無所不達至定王五年河遂南徙無他河水之入鴻溝者多則經流遲貯不能衝刷泥沙故也宿胥之塞實鴻溝致之不然禹功歴千餘歳而不敝何獨至春秋一旦變遷也哉河自孟津以下出險就平兼㑹濟沁伊洛漸有奔放之勢然南岸鞏至滎澤山脈不斷瀕河地形髙卬河不能決而南故廣武以東無河患禹但豬滎播而其事畢矣自鴻溝既開不惟害及禹河而豫之東境亦被其災漢平帝世河侵汴渠歳月逾甚滎澤塞為平地陶丘不辨壤墳後雖修治而決溢時有邉韶滎口石門碑云一有決溢彌原淹野蟻孔之潰害起不測此鴻溝之遺患也故黄文叔曰蒗蕩出河斷非禹迹後世之人妄鑿河為瀆或不順地阞或附屬不理孫故其勢易決盖非獨蒗蕩也其下濮水通河而酸棗決瓠水通河而瓠子決汴渠亦屢決至王景治汴鑿山開澗十里置門使水更相回注紊亂渠脈而禹迹益壊矣且所謂通淮泗者以舟楫之利也河已通矣而何更用通蒗蕩哉其曰禹塞淫水而鑿之者春秋戰國之世商𣙜功利而忽逺圖並植私徇欲而不顧大經策謀之士託其名於禹而世不察也河渠書云滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗㑹其在春秋戰國之際明矣偉哉此論善發禹貢之藴并可以證徐州達於河之誤昔漢武帝云河乃大禹之所導也聖人作事為萬世功通於神明恐難改更唯英主能為是言周衰列國之君不明斯義茍欲便轉輸資灌溉則妄引河流貫注境内狃於一時之小利而不顧萬世之大害穿渠之禍甚於曲防真夏王之罪人也禹貢錐指行水金鑑巻三
