body:
  text: 行水金鑑巻九江南按察使傅澤洪撰河水河自底柱以下五户已上其間一百二十里有一十九灘魏景初二年二月帝遣都督沙丘部監運諫議大夫寇谷帥工五千人嵗常修治平河岨厎柱一十九灘水流迅急勢同三峽晉泰始三年五月武帝遣監運大中大夫趙國當有姓氏原闕都匠中郎將河東樂世帥衆五千餘人修治河灘事見五户祠銘雖世代加功水流漰渀濤波尚屯及其商舟是次鮮不踟蹰難濟故有衆峽諸灘之言水經注晉泰始七年六月大霖雨河洛伊沁皆溢晉書年後又載六事並同宋書亦載之未知孰是是年沒民舍千九百餘家秋稼千三百餘頃河南通志華嶠奏浚導河渠巡禹之舊迹置都水官事多施行晉書華嶠本傳傅祗為滎陽太守自魏黄初大水之後河濟汎溢鄧艾常著濟河論開石門而通之至是復浸壊祗乃造沉菜堰至今兖豫無水患百姓為立碑頌焉晉書傅祗本傳河自龍門東注横被中國每漂決所漸害重災深隄築之功勞役天下且闗洛髙嵦地少川源是故鎬酆潦潏咸入禮典漳滏鄭白之饒溝渠沾溉之利皆民命所祖國以為天溝洫立志亦其宜也世殊事改於今可得而略宋書宋元嘉十八年夏五月甲申河水泛溢害居人南史冀定數州頻遭水患楷上疏曰比定冀水潦無嵗不饑幽瀛川河頻年汎溢豈是陽九厄㑹百六鍾期故以人事而然非為運極昔魏國鹹舄史起哂之兹地荒蕪臣實為恥不揆愚瞽輒敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一準古法皆循舊隄阿者河決瓠子梁楚幾危宣房既建水還舊迹十數年間户口豐衍又決屯氏兩川分流東北數郡之地僅得支存及下通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毁滅良由水大渠狹更不開瀉衆流壅塞曲直乗之所致也至若量其逶迤穿鑿涓澮分立隄堨所在疏通預決其路令無停蹙隨其髙下必得地形土木參功務從便省使地有金隄之堅水有非常之備鈎連相注多置水口從河入海逺邇逕缺瀉泄此波澤九月農罷量役計功十月昏正立匠表度縣遣能工麾畫形勢郡發明使籌察可否審地推岸辨其脈流樹板分崖練厥從往别使案檢分部是非瞰睇川原明審通塞當境修理不勞役逺終春自罷未須乆功即以髙下營田因於水陸水種秔稻陸藝桑麻必使室有乆儲門豐餘積其實上葉禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢洿下雲雨隂霖動彌旬月遙途逺運唯用舟艫南畝畬葘微事耒耜而衆庶未為饉色黔首罕有饑顔豈天徳不均致地偏罰故是地勢異圖有兹豐餒臣既鄉居水際目覩荒殘每思鄭白屢想王李夙宵不寐言念皇家愚臣丹欵實希効力有心螢爝乞暫施行使數州士女無廢耕桑之業聖世洪恩有賑饑荒之土鄴宰深笑息自一朝臣之至誠申於今日詔曰頻年水旱為患黎民阻饑靜言念之昃不遑食鑒此事條深協在慮但計畫功廣非朝夕可合宜付外量聞事遂施行楷用功未就詔還追罷魏書崔楷傳刺楷明帝孝昌中以殷州史死節北齊河清元年四月河溢河南通志唐髙祖武徳七年治中雲得臣自龍門引河溉田六千餘頃唐書唐太宗貞觀十一年九月丁亥河溢壊陜州河北縣毁河陽中潬幸白司馬坂觀之賜瀕河遭水家粟帛唐書河陽即今懐慶府孟縣地後魏太和中築北中城東魏元象元年又築南城及中潬城是為三城中有河橋晉杜預造魏爾朱榮之亂及爾朱世隆再亂與髙歡宇文泰相持皆以三城河橋為拒守攻戰要津唐襲王世充河陽城焚河橋又以舟師襲世充囘洛城斷河陽橋又九節度之師潰於相州郭子儀以朔方軍斷河陽橋其險要如此金大定中州治以河患因於故城北十五里築新城徙治焉曰上孟津故城曰下孟州予於已亥客懐孟從下州放棹南歸問所謂三城河橋無有也其故迹亦不可得而見矣唐髙宗永徽五年六月河北大水十月齊州黄河溢唐書五行志唐髙宗永淳二年七月已已河溢壊河陽橋唐書五行志舊唐書云溺河陽城唐武后如意元年八月甲戌河溢壊河陽縣唐書五行志唐書稱𢎞道二年誤五行志又稱長壽元年重見唐武后長壽二年五月癸丑棣州河溢壊居民二千餘家唐書五行志唐武后聖歴元年秋黄河溢唐書十河南通志作中宗嗣聖六年即是年也嗣聖無十六年唐𤣥宗開元五年六月壬午鞏縣暴雨連月山水泛溢毁郭邑廬舍七百餘家人死者七十二汜水同日漂壊近河百姓二百餘家舊唐書𤣥宗本紀唐𤣥宗開元十年六月博州棣州河決唐書五行志八月丙申博棣等州黄河隄破漂損田稼舊唐書𤣥宗本紀唐𤣥宗開元十四年秋大水河南河北尤甚河及支川皆溢懐衛鄭滑汴濮人或巢或舟以居死者千計唐書五行志八月河決衛州唐書𤣥宗本紀唐代宗大歴十二年秋大雨水河南尤甚平地深五尺河溢唐書五行志唐徳宗建中元年冬黄河溢唐書徳宗本紀唐徳宗貞元二年六月河溢唐書五行志唐憲宗元和七年正月振武河溢毁東受降城唐書五行志唐憲宗元和八年十二月丙午以河溢浸滑州羊馬城之半滑州薛平魏博田𢎞正徴役萬人於黎陽界開古黄河道南北長十四里東西濶六十步深一丈七尺決舊河水勢滑人遂無水患舊唐書憲宗本紀薛平田𢎞正鑿河十四里經黎陽山東㑹於故瀆名曰新河唐㑹要薛平授鄭滑節度使始河溢瓠子東泛滑距城纔二里許平按求故道出黎陽西南因命其佐裴𢎞泰往請魏博節度使田𢎞正𢎞正許之乃籍民田所當者易以它地疏導二十里以釃水悍還壖田七百頃於河南自是滑人無患入為左金吾衛大將軍唐書薛平傳衛州汲郡黎陽縣有白馬津一名黎陽闗有大岯山一名黎陽山有新河元和八年觀察使田𢎞正及鄭滑節度使薛平開長十四里濶六十步深丈有七尺決河注故道滑州遂無水患唐書地理志唐時黄河不聞有決溢之患薛平治河一事此外史無所紀蓋河朔地天寳後乆屬藩臣而事不聞朝廷汴河亦不聞有疏通之事唯鄭畋集載為相時汴河淀塞請令河陽節度使於汴口開導仍令宣武感化節度使嚴帖州縣封閉公私斗門感化即徐州也宋敏求春明退朝録蕭倣拜義成軍節度使滑州瀕河累嵗水壊西北防倣徙其流逺去樹隄自固人得以安唐書簫倣傳魏晉南北朝河之利害不可得聞而唐少河患閻百詩云其説有二一程子曰漢火徳多水災唐土徳少河患一宋敏求曰唐河朔地天寶後乆屬藩臣縱有河事不聞朝廷故一部唐書所載者僅滑帥薛平蕭倣二事耳渭按伊川之意欲明宋多河患以火徳故然東漢亦火徳而河患絶少何也且禹功既壊河行未乆輒復徙逺者數百年近者或百餘年或數十年獨東漢之河垂千嵗而後變則王景之功不可誣也豈皆徳運為之哉肅代以後强藩跋扈並帝制自為次道云縱有河事不聞朝廷是也而愚更有説焉河災羨溢首尾亘千里之外非一方可治當四分五裂之際爾詐我虞唯魏滑同患故田𢎞正從薛平之請協力共治否則動多掣肘縱有溢決亦遷城邑以避之而巳此河功所以罕紀也據史所書謂唐少河患亦未為篤論禹貢錐指唐文宗太和二年夏河決壊棣州城唐書五行志唐文宗開成三年夏河決浸鄭滑外城唐書五行志唐宣宗大中十二年大水汎徐兖青鄆而滄地積卑中立自按行引御水入之毛河東注海州無水災唐書杜中立傳唐僖宗乾符五年秋大霖雨河溢唐書五行志唐昭宗大順二年二月辛已河陽河溢壊人廬舍舊唐書景福二年河徙從勃海北至無棣縣入海唐書五行志唐昭宗乾寧三年四月河圮於滑州朱全忠決其隄因為二河散漫千餘里唐書五行志梁朱友貞龍徳三年段凝以唐兵漸逼乃自酸棗決河東注於鄆以限唐兵謂之䕶駕水決口日大屢為曹濮患唐同光二年命婁繼英塞之未㡬復壊五代史補華温琪夏邑人仕梁歴綘棣二州刺史時棣州苦河水為患温琪徙新州以避之民賴全活者甚衆河南通志唐李存勗同光二年八月河溢五代史是年七月壬寅梁所決河連年為曹濮患甲辰命右監門上將軍婁繼英督汴滑兵塞之未㡬復壊同光三年春正月庚戌詔平盧節度使符習治酸棗遙隄以禦決河是年自六月甲午雨罕見日星江河川皆溢凡七十五日乃霽通鑑唐李嗣源天成四年十二月庚申修治河北岸宣差左衛上將軍李承約祭之張敬詢為滑州節度使長興初敬詢以河水連年溢乃自酸棗縣界至濮州廣隄防一丈五尺東西二百里通鑑晉石敬塘天福四年八月巳亥朔河決博平五代史晉天福六年九月辛酉滑州言河決考異曰薛史紀載九月辛酉滑州河決而不載庚午濮州決髙祖實録載庚午濮州奏而不載辛酉滑州決五代㑹要及志皆云天福六年九月決滑州兖濮州界皆為水漂溺史匡翰傳亦云天福六年白馬河決按卒酉滑州河已決則下流皆涸濮州無庚午再決之理蓋滑州河決漂浸及濮州耳通鑑晉石敬塘天福六年九月丁丑河決中都入於沓河十月河決滑濮鄆澶州五代史是年河決滑州東汎濮州民為水所漂溺詔所在發舟救之山東通志是年河決濮陽之觀城界楚里村隄閻詠目遊四海記晉石敬塘天福七年三月歸徳軍節度使安彦威塞決河於滑州五代史錢河決滑州命彦威塞之彦威出私募民治隄見彦威本傳是年三月已未梁州節度使安彦威奏到滑州修河隄時以瓠子河漲溢詔彦威督諸道運民自豕韋之北築堰數十里給私財以犒民民無散者竟止其害以功加邠國公詔於河決之地建碑立廟通鑑晉石重貴開運元年六月丙辰河決滑州環梁山入於汶濟五代史是年六月丙辰滑州河決詔大發數道丁夫塞之既塞帝欲刻碑紀其事中書舍人楊昭儉諌曰陛下刻石紀功不若降哀痛之詔梁翰頌美不若頒罪已之文帝善其言而止通鑑滑州河決侵汴曹濮單鄆五州之境環梁山合於汶水此全河南徙之始也梁山在今夀張東平之間汶水自東北來與濟水㑹於梁山之北而決河水瀰浸潰溢環梁山㑹於汶則宋之梁山濼矣榖山筆麈羊使君晉開運二年守博州河溢城沒使君祝天冀免生民墊溺願以身代山東通志晉石重貴開運三年夏六月已丑河決魚池秋七月河決楊劉朝城八月辛酉河溢歴亭九月河決澶滑懐州癸卯河決臨黄冬十月河決衛州丙寅河決原武五代史開運三年秋七月河決楊劉西入莘縣四十餘里自朝城北流莘縣在魏州之東朝城在魏州東南相去四十里九月丙辰河決澶州臨黄臨黄春秋衛河上之邑漢為東郡觀縣後魏置臨黄縣唐屬澶州宋端拱元年省臨黄入觀城縣通鑑梁晉河上之師徳勝楊劉各有南北二城跨河而守皆河津要地也晉人初據徳勝為梁人所敗東守楊劉王彦章段凝以十萬之師百道進攻迄不能拔而大河之險已入於晉矣徳勝在濮州境内晉史云徳勝口澶州地也澶州舊治頓丘天福中徙州跨徳勝津已而又作浮梁於上是為澶州河橋矣楊劉在東阿北境可六十里黄河舊隄隠隠可見墟里人煙乆成聚落而二城之迹則不可考矣夫合兩國之衆集百萬之師一旦化為榛莽平蕪蒼茫無迹盛衰興亡皆如幻化亦足慨矣榖山筆麈漢劉承祐乾祐元年夏四月戊子河決原武五月乙亥河決滑州魚池五代史之通鑑注魚池地名河決後謂之魚池口漢劉承祐乾祐三年六月癸卯河決原武五代史五代漢河決鄭州盧振請修汴河兩岸立斗門以備旱澇目遊四海記屬史云河決原武原武鄭州周廣順二年十二月丙戌河決鄭滑遣使行視修塞通鑑周廣順三年春正月庚午帝以河決為憂王峻自請往行視許之九月已亥義成節度使白重贊奏塞決河通鑑周郭威廣順中重贊為義成軍節