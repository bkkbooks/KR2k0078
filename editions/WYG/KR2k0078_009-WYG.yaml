上距李吉甫撰志之年約六十餘嵗以今輿地言之濬縣清豐觀城聊城平原陵縣商河齊東武定蒲臺利津南接滑縣開州濮州范縣陽榖茌平平隂長清臨邑濟陽後徙經濵州海豐不入蒲臺利津諸州縣界中皆唐歴五代以迄宋初黄河之所行也自王莽始建國三年辛未河徙由千乗入海後五十九嵗為後漢明帝永平十三年庚午王景治河功成下逮宋仁宗景祐元年甲戌有横隴之決又十四嵗為慶歴八年戊子復決於商胡而漢唐之河遂廢凡九百七十七嵗禹貢錐指黄河今西蕃朶甘斯南鄙曰星宿海者其源也四山之間有泉近百泓滙而為海登髙望之若星宿布列故名流出復瀦曰哈喇海東出曰齊賔河合呼喇雅爾楚二河東北流為九渡河其水猶清騎可涉也貫山中行出西戎之都㑹曰庫濟曰庫徳者合納琳河所謂細黄河也水流已濁繞昆侖之南折而東注合竒爾穆蘓河復繞昆侖之北自貴徳西寧之境至積石經河州此處有誤見巻首禹貢錐指過臨洮合洮河東北流至蘭州始入中國北繞朔方北地上郡而東經三受降城豐東勝州折而南出龍門過河中抵潼闗東出三門集津為孟津過虎牢而後奔放平壤吞納小水以百數勢益雄放無崇山巨磯以防閑之旁激奔潰不遵禹蹟故虎牢迤東距海口三二千里恒被其害宋為特甚始自滑臺大伾甞兩經汎溢復禹蹟矣一時姦臣建議必欲囘之俾復故流竭天下之力以塞之屢塞屢決至南渡後貽其禍於金源氏由不能順其就下之性以導之故也河入中國行太行西曲折山間不能為大患既出大伾東走赴海更平地二千餘里禹迹既湮河并為一特以隄防為之限夏秋霖潦百川衆流所㑹不免決溢之憂然有司所以備河者亦益工矣黄河隨時漲落故舉物候為水勢之名自立春後東風解凍河邊人候水初至凡一寸則夏秋當至一尺頗為信驗故謂之信水二月三月桃華始開冰泮雨積川流猥集波瀾盛長謂之桃華水春末蕪菁華開謂之菜華水四月末壟麥結秀擢芒變色謂之麥黄水五月𤓰實延蔓謂之𤓰蔓水朔野之地深山窮谷固隂沍寒冰堅晚泮逮乎盛夏消釋方盡而沃蕩山石水帶礬腥併流於河故六月終旬後謂之礬山水七月菽豆方秀謂之豆華水八月菼薍華謂之荻苗水九月以重陽紀節謂之登髙水十月水落安流復其故道謂之復槽水十一月十二月斷冰雜流乗寒復結謂之蹙凌水水信有常率以為準非時暴漲謂之客水其水勢凡移欲横注岸如刺毁謂之劄岸漲溢踰防謂之抹岸埽岸故朽潛流潄其下謂之塌岸浪勢旋激岸土上潰謂之淪捲水侵岸逆漲謂之上展順漲謂之下展或水乍落直流之中忽屈曲横射謂之徑䆗音叫張衡西京賦曰望䆗窱以徑廷水猛驟移其將澄處望之明白謂之拽白亦謂之明灘湍怒略渟勢稍汩起行舟值之多溺謂之薦浪水水退淤澱夏則膠土肥腴初秋則黄滅土頗為疏壤深秋則白滅土霜降後皆沙也舊制嵗虞河決有司常以孟秋預調塞治之物梢芟薪柴楗橛竹石茭索竹索凡千餘萬謂之春料詔下瀕河諸州所産之地仍遣使㑹河渠官吏乗農隙率丁夫水工收采備用凡伐蘆荻謂之芟伐山木榆柳枝葉謂之梢辮竹糾芟為索以竹為巨索長十尺至百尺有數等先擇寛平之所為埽場埽之制密布芟索鋪梢梢芟相重壓之以土雜以碎石以巨竹索横貫其中謂之心索巻而束之復以大芟索繫其兩端别以竹索自内旁出其髙至數丈其長倍之凡用丁夫數百或千人雜唱齊挽積置於卑薄之處謂之埽岸既下以橛臬閡之復以長木貫之其竹索皆埋巨木於岸以維之遇河之横決則復増之以補其缺凡埽下非積數叠亦不能遏其迅湍又為馬頭鋸牙木岸者以蹙水勢䕶隄焉凡縁河諸州孟州有河南北凡二埽開封府有陽武埽滑州有韓房二村憑管石堰州西魚迎陽凡七埽舊有七里曲埽復廢通利軍有齊賈蘇村凡二埽澶州有濮陽大韓大吳商胡王楚横隴曹村依仁北岡孫陳大固明公王八凡十三埽大名府有孫村侯村二埽濮州有任村東西北凡四埽鄆州有博陵張秋闗山子路王陵竹口凡六埽齊州有采金山史家渦二埽濵州有平河安定二埽棣州有聶家梭隄鋸牙陽成四埽所費皆有司嵗計而無闕焉宋史河渠志及志中所言孟秋預備春料㑹官吏乗農隙率丁夫收采何其仁至而義盡也其捲埽之法亦甚周密宋太祖建隆元年十月壬午棣州河決壊厭次商河二縣居民廬舍田疇宋史五行志是年河決公乗渡口壊臨邑城三年移治孫耿鎮宋史地理志宋太祖建隆二年孟州河決河南通志宋太祖建隆四年八月齊州河決宋史五行志宋太祖乾徳元年春正月丁巳修畿内河隄宋史太祖本紀宋太祖乾徳二年遣使案行將治古隄議者以舊河不可卒復力役且大遂止但詔民治遙隄以禦衝注之患其後赤河決東平之竹村七州之地復罹水災宋史河渠志宋太祖乾徳三年七月開封府河決溢陽武河中府孟州並河水漲孟州壊中潬軍營民舍數百區河壊隄岸石又溢於鄆州壊民田淄州濟州並河溢害鄒平髙苑縣民田宋史五行志八月癸卯河決陽武縣已未鄆州河水溢没田九月辛巳河決澶州宋史太祖本紀是年秋河決澶州州命重贇督丁壯數十萬塞之宋史韓重贇傳乾徳三年秋大雨霖開封府河決陽武又孟州水漲壊中潬橋梁澶鄆亦言河決詔發兵治之宋史河渠志時諸國尚未一統正用兵之際不遣丁夫而以兵治河宋之重農惜民有可嘉者河志宋太祖乾徳四年六月甲午東阿縣河溢損民田甲辰觀城縣河決壊居民廬舍注大名又靈河縣隄壊水東注衞南縣境及南華縣城七月滎澤縣河南北隄壊八月淄州清河水溢壊髙苑縣城溺數百家及鄒平縣田舍宋史五行志閏月乙丑河溢入南華縣宋史太祖本紀八月丙辰滑州河決壊靈河縣大隄詔殿前都指揮使韓重贇馬步軍都軍頭王廷義等督士卒丁夫數萬人治之被泛者蠲其秋租宋史河渠志此合兵民而同治之者是年潘美方用兵南漢或以兵之不足而始用丁夫歟河志宋太祖乾徳五年正月帝以河隄屢決分遣使行視發畿甸丁夫繕治自是嵗以為常皆以正月首事季春而畢是月詔開封大名府鄆澶滑孟濮齊淄滄棣濵徳博懐衞鄭等州長吏並兼本州河隄使蓋以謹力役而重水患也宋史河渠志八月甲申河溢入衞州城民溺死者數百宋史太祖本紀宋太祖開寶元年六月河溢壊民田廬舍宋史五行志宋太祖開寶二年七月下邑縣河決宋史五行志宋太祖開寶三年春正月癸丑増河堤十二月癸巳増河隄宋史太祖本紀宋太祖開寶四年六月乙酉河決原武汴決穀熟七月癸亥汴決宋城宋史太祖本紀六月鄆州河及汶清河皆溢注東阿縣及陳闕鎮壊倉庫民舍鄭州河決原武縣宋史五行志十一月河決澶淵泛數州官守不時上言通判司封郎中姚恕棄市知州杜審肇坐免宋史河渠志杜審肇出知澶州太祖以審肇未甞歴郡務乃命司封郎中姚恕通判州事以左右之未㡬河大決東滙於鄆濮數郡民田罹水患太祖怒其不即時上言遣使案鞫遂論恕棄市審肇免官歸宋史杜審肇傳開寶初河決澶州命守忠副潁州團練使曹翰䕶役河決遂塞宋史安守忠傳宋太祖開寶五年正月詔曰應縁黄汴清御等河州縣除準舊制種蓺桑棗外委長吏課民别樹榆柳及土地所宜之木仍案户籍髙下定為五等第一等嵗樹五十本第二等以下遞減十本民欲廣樹蓺者聽其孤寡惸獨者免是月澶州修河卒賜以錢鞵役夫給以茶三月詔曰朕每念河渠潰決頗為民患故署使職以總領焉宜委官聯佐治其事自今開封等十七州府各置河隄判官一員以本州通判充如通判闕員即以本州官充五月河大決濮陽又決陽武詔發諸州兵及丁夫凡五萬人遣潁川團練使曹翰䕶其役翰辭太祖謂曰霖雨不止又聞河決朕信宿以來焚香上禱於天若天災流行願在朕躬勿延於民也翰頓首對曰昔宋景公諸侯耳一發善言災星退舍今陛下憂及兆庶懇禱如是固當上感天心必不為災六月下詔曰近者澶濮等數州霖兩荐降洪河為患朕以屢經決溢重困黎元每閱前書詳究經瀆至若夏后所載但言導河至海隨山濬川未聞力制湍流廣營髙岸自戰國專利堙塞故道小以妨大私而害公九河之制遂隳歴代之患弗弭凡搢紳多士草澤之倫有素習河渠之書深知疏導之策若為經乆可免重勞並許詣闕上書附驛條奏朕當親覽用其所長勉副詢求當示甄奬時東魯逸人田告者纂禹元經十二篇帝聞之詔至闕下詢以治水之道善其言將授以官以親老固辭歸養從之翰至河上親督工徒未㡬河決皆塞宋史河渠志五月丁亥河南北淫雨澶滑濟鄆曹濮六州大水六月已丑河決陽武八月衞州河溢宋史太祖本紀五月河決澶州六月河又決開封府陽武縣之小劉村宋史五行志宋祖之言千載下猶見其敬天憂民之忱詢得治河之本者曹翰之言雖近於䛕原非虛美其後河決皆塞果如翰言逸人之書未經赴闕上陳而帝自聞之其時朝廷訪賢求言廣咨博詢可謂無微不周矣書雖不傳然帝善其言必與詔書導河濬川未聞力制湍流之㫖相合授官力辭真逸人也河志宋太祖開寶六年春正月癸酉修魏縣河宋史太祖本紀鄆州河決楊劉口懐州河決獲嘉縣宋史五行志宋太祖開寶七年六月壬寅安陽河溢壊民居宋史太祖本紀宋太祖開寶八年五月濮州河決郭龍村六月辛亥澶州河決頓丘縣宋史五行志行水金鑑巻九
