body:
  text: 行水金鑑巻十江南按察使傅澤洪撰河水宋太宗太平興國二年六月孟州河溢壊温縣隄七十餘步鄭州壊滎澤縣寧王村隄三十餘步又漲於澶州壊英公村隄三十步宋史五行志七月癸未河決滎澤頓丘白馬温縣閏月已酉河溢開封等八縣害稼宋史太宗本紀秋七月河決孟州之温縣鄭州之滎澤澶州之頓丘皆發縁河諸州丁夫塞之又遣左衛大將軍李崇矩騎置自陜西至滄棣案行水勢視隄岸之缺亟繕治之民被水災者悉蠲其租宋史河渠志宋太宗太平興國三年正月命使十七人分治黄河隄以備水患宋史河渠志正月辛丑浚廣濟恵民及蔡三河治黄河隄宋史太宗本紀五月懐州河決獲嘉縣北注宋史五行志是年夏河決滎陽詔守素發鄭之丁夫千五百人與卒千人領䕶塞之宋史翟守素傳十月滑州靈河縣河塞復決命西上閤門使郭守文率卒塞之宋史河渠志宋太宗太平興國四年八月甲戌宋州河決宋城縣九月已卯衛州河決汲縣壊新場隄九月澶州河漲宋史五行志九月已卯河決汲縣宋史太宗本紀宋太宗太平興國五年五月徐州白溝河溢入州城宋史五行志是年懐州河決河南通志宋太宗太平興國六年河中府河漲陷連隄溢入城壊軍營民舍鄜延寧三州並河水漲溢入州城壊軍營倉庫廬舍宋史五行志李神祐為南作坊副使太平興國六年滑州治河防材葦未具命神祐馳往垣曲伐薪蒸四百萬以濟其用宋史李神祐傳宋太宗太平興國七年六月河決臨邑縣十月河決懐州武陟縣害民田宋史五行志作本紀以臨邑作臨濟武陟武徳並誤七月河決范濟口宋史太宗本紀是年河大漲蹙清河凌鄆州城將陷塞其門急奏以聞詔殿前承㫖劉吉馳往固之宋史河渠志袁廓知鄆州㑹河決溢入城浸居人廬舍至冬月結為冰廓大發民鑿取以竹輿輿出城散積之使者至謂其有略致水不入城乃以狀聞拜監察御史宋史袁廓傳宋太宗太平興國八年五月河大決滑州韓村泛澶濮曹濟諸州民田壊居人廬舍東南流至彭城界入於淮詔發丁夫塞之隄乆不成乃命使者按視遙隄舊址使囘條奏以為治遙隄不如分水勢自孟抵鄆雖有隄防唯滑與澶最為隘狹於此二州之地可立分水之制宜於南北岸各開其一北入王莽河以通於海南入靈河以通於淮節減暴流一如汴口之法其分水河量其逺邇作為斗門啓閉隨時務乎均濟通舟運溉農田此富庶之資也不報時多隂雨河乆未塞帝憂之遣樞密直學士張齊賢乗傳詣白馬津用太牢加璧以祭十二月滑州言決河塞羣臣稱賀宋史河渠志六月陜州河漲壊浮梁鄜州河水漲溢入城壊官寺民舍八月徐州清河漲丈七尺溢出塞州三面門以禦之是年自夏及秋開封浚儀酸棗陽武封丘長垣中牟尉氏襄邑雍丘等縣河水害民田宋史五行志蟠知京城陸路發運司事㑹河決韓村大發丁夫塞之命蟠調給其餉未㡬河塞宋史劉蟠傳先是盧多遜貶趙普罷相其夏河決韓村尋復塞旦獻河平頌曰天祚我宋以君兆民配天成休惟堯與隣粤有大水昏墊下人非曰聖祚孰究孰度蔽賢者退壅澤者罪我防大患河豈云敗逆遜逺役姦普屏外聖道如隄崇崇海内帝曰守文是塞是親調爾衞兵程是蒸民民以盡力臣以勤職役云其終河以之塞唐堯懐山實警神徳漢武宣房實彰令式我塞長河融流恵澤明明聖功萬代成則太宗覽之有逆遜姦普之語召宰相謂曰胡旦獻頌詞意悖戾朕自擢於甲科歴試外任所至無善狀知海州日為部下所訟獄已具㑹大赦朕録其材而捨其過尚令在近列又領史職乃敢恣胸臆狂躁如此其亟逐之即貶殿中丞商州團練副使宋史胡旦傳宋太宗太平興國九年春滑州復言房村河決帝曰近以河決韓村發民治隄不成安可重困吾民當以諸軍代之乃發卒五萬以侍衞步軍都指揮使田重進領其役又命翰林學士宋白祭白馬津沉以太牢加璧未幾役成宋史河渠志三月丁已滑州河決既塞帝作平河歌賜近臣蠲水所入州縣今年租宋史太宗本紀八月延州南北兩河漲溢入東西兩城壊官寺民舍孟州河漲壊浮梁損民田宋史五行志是年河決壊民田命監察御史索湘與户部推官元玘同按行宋史索湘傳宋太宗淳化元年孟州河漲宋史五行志宋太宗淳化二年三月詔長吏以下及巡河主埽使臣經度行視河隄勿致壊隳違者當寘於法宋史河渠志閏月河水溢四月河水溢六月河水汴水溢宋史太宗本紀京兆府河漲陜州河漲壊大隄六月乙酉河溢於浚儀縣壊連隄浸民田上親臨視督衞士塞之辛卯又決於宋城縣博州河漲壊民廬舍亳州河溢東流汎民田廬舍泗州招信縣河漲宋史五行志是年宋州河決成務上言河水所經地肥澱願免其租税勸民種藝從之宋史柴成務傳趙孚知開封府司録參軍事受詔與殿中侍御史柴成務供奉官葛彦恭殿直郭載行視黄河分南北岸按行復遥隄以紓湍決孚言治遥隄不如分水勢於是建議於澶滑二州立分水之制時決河未平重惜民力而寢焉宋史趙孚傳宋太宗淳化三年十月上津縣河水溢壊民舍宋史五行志罕知霸州會河溢壊城壘罕以私錢募築民咸徳之宋史丁罕傳宋太宗淳化四年九月澶州河漲衝陷北城壊民舎官署倉庫民溺死者甚衆十月澶州河決水西北流入御河浸大名府城宋史五行志十月河決澶州陷北城壊廬舍七千餘區詔發卒代民治之是歳巡河供奉官梁睿上言滑州土脈疏岸善隤每嵗河決南岸害民田請於迎陽鑿渠引水凡四十里至黎陽合大河以防暴漲帝許之宋史河渠志郭贄超拜工部侍郎淳化中知澶州坐河決免所居官宋史郭贄傳髙弁為邢州鹽鐵判官河決澶州請弛隄防縱水所之可省民力且以扼契丹南向議寢知陜州宋史髙弁傳淳化中昌言復知天雄軍大河貫境豪民峙芻茭圖利誘姦人潛穴隄防歳仍決溢昌言知之一日隄吏告急命徑取豪家廥積以給用自是無敢為姦利者屬澶州河決流入御河漲溢浸府城昌言籍府兵負土増隄數不及千乃索禁卒佐役皆偃蹇不進昌言怒曰府城將墊人民且溺汝輩食厚禄欲坐視耶敢不從命斬衆股慄赴役不浹旬城完太宗手詔褒諭之召拜給事中參知政事宋史趙昌言傳年愚按宰輔表趙昌言於淳化四十月丁丑自知大名府加給事中參知政事趙賀補臨朐主簿賀有幹才知州㓂準具知賀淳化中調丁壯塞澶州決河衆多逸去獨賀全所部而歸臨朐父老張樂迎賀準使由譙門過曰旌賀之能也改大理評事宋史賀傳趙淳化中守正擢髙陽闗副都明年䕶浚惠民河塞澶州決河就命知州軍宋史孔守正傳宋太宗淳化五年正月滑州言新渠成帝又案圖命昭宣使羅州刺史杜彦鈞率兵夫計功十七萬鑿河開渠自韓村埽至州西鐵狗廟凡十五餘里復合於河以分水勢宋史河渠志右領軍衞上將軍周景歴事唐漢周習水利嘗浚汴口導鄭州郭西水入中牟渠修滑州河隄累遷至是官宋史周瑩傳嗣宗以秘書丞通判澶州並河東西植樹萬株以固隄防宋史王嗣宗傳宋太宗至道二年七月鄆州河漲壊連隄四處閏七月陜州河漲宋史五行志三年四月河決鄆州詔徙州城太宗本紀宋真宗咸平元年七月齊州黄河泛溢壊田廬宋史五行志宋真宗咸平三年五月河決鄆州王陵埽浮鉅野入淮泗水勢悍激侵迫州城命使率諸州丁男二萬人塞之踰月而畢始赤河決擁濟泗鄆州城中常苦水患至是霖雨彌月積潦益甚乃遣工部郎中陳若拙經度徙城若拙請徙於東南十五里陽鄉之髙原詔可是年詔縁河官吏雖秩滿須水落受代知州通判兩月一巡隄縣令佐迭巡隄防轉運使勿委以他職又申嚴盜伐河上榆栁之禁宋史河渠志是年河決鄆州王陵埽遣承翰䕶塞時議徙鄆州以避河患又詔承翰與工部郎中陳若拙乗傳規度徙於舊治之東南宋史閻承翰傳宋真宗咸平五年六月恵民河漲溢軍營宋史五行志王濟改鹽鐵判官車駕巡師大名調丁夫十五萬修黄汴河濟以為勞民詔濟馳往經度還奏省十六七張齊賢時為相以河決為憂因對并召濟見齊賢請令濟署狀保河不決濟曰河決亦隂陽災沴宰相茍能和隂陽弭災沴為國家致太平河之不決臣亦可保齊賢曰若是則今非太平耶濟曰北有契丹西有繼遷兩河闗右嵗被侵擾以陛下神武英略茍得其人可以馴致今則未也上動容獨留濟問邊事宋史王濟傳宋真宗景徳元年九月澶州言河決横隴埽四年七月又壊王八埽又見五行志並詔發兵夫完治之宋史河渠志九月乙已河決澶州遣使具舟濟民給以粮餉宋史真宗本紀石知顒掌親王諸宫事景徳中自京抵泗遣徒治河隄命總其役初計工累月及是浹日而畢上面加褒諭授入内都知宋史石知顒傳李遵勗出知澶州會河水溢將壊浮梁遵朂督工徒七日而隄成遷昭徳軍節度觀察留後宋史李遵勗傳宋真宗大中祥符三年九月河決河中府白浮梁村宋史五行志十月判河中府陳堯叟言白浮圖村河水決溢為南風激還故道明年遣使滑州經度西岸開減水河九月棣州河決聶家口宋史河渠志宋真宗大中祥符四年八月河決通利軍大名府御河溢合流壊府城害田人多溺死九月河溢於孟州溫縣宋史五行志宋真宗大中祥符五年正月河決棣州聶家口宋史五行志棣州請徙城帝曰城去決河尚十數里居民重遷命使完塞既成又決於州東南李民灣環城數十里民舍多壊又請徙於商河役興踰年雖扞䕶完築裁免決溢而湍流益暴壖地益削河勢髙民屋殆踰丈矣民苦乆役而終憂水患八年乃詔徙州於陽信之八方寺著作佐郎李垂上導河形勝書三篇并圖其略曰臣請自汲郡東推禹故道挾御河較其水勢出大伾上陽太行三山之間復西河故瀆北注大名西館陶南東北合赤河而至於海因於魏縣北析一渠正北稍西逕衡漳直北下出邢洺於夏書過洚水稍東注易水合百濟㑹朝河而至於海大伾而下黄御混流薄山障隄勢不能逺如是則載之髙地而北行百姓獲利而契丹不能南侵矣禹貢所謂夾右碣石入於海孔安國曰河逆上此州界其始作自大伾西八十里曹公所開運渠東五里引河水正北稍東十里破伯禹古隄逕牧馬陂從禹故道又東三十里轉大伾西通利軍北挾白溝復西大河北逕清豐大名西歴洹水魏縣東暨館陶南入屯氏故瀆合赤河而北至於海既而自大伾西新發故瀆西岸析一渠正北稍西五里廣深與汴等合御河道逼大伾北即堅壤析一渠東西二十里廣深與汴等復東大河兩渠分流則三四分水猶得注澶淵舊渠矣大都河水從西大河故瀆東北合赤河而達於海然後於魏縣北發御河西岸析一渠正北稍西六十里廣深與御河等合衡漳水又冀州北界深州西南三十里決衡漳西岸限水為門西北注滹沱潦則塞之使東漸勃海旱則決之使西灌屯田此中國禦邊之利也兩漢而下言水利者屢欲求九河故道而疏之今考圖志九河並在平原而北且河壊澶滑未至平原而上已決矣則九河奚利哉漢武捨大伾之故道發頓丘之暴衝則濫兖汎齊流患中土使河朔平田膏腴千里縱容邊寇劫掠其間今大河盡東全燕陷北而禦邊之計莫大於河不然則趙魏百城富庻萬億所謂誨盜而招寇矣一日伺我饑饉乗虛入寇臨時用計者實難不如因人足財豐之時成之為易詔樞密直學士任中正龍圖閣直學士陳彭年知制誥王曽詳定中正等上言詳垂所述頗為周悉所言起滑臺而下派之為六則縁流就下湍急難制恐水勢聚而為一不能各依所導設或必成六派則是更増六處河口悠乆難於隄防亦慮入滹沱漳河漸至二水淤塞益為民患又築隄七百里役夫二十一萬七千工至四十日侵占民田頗為煩費其議遂寢宋史河渠志咸垂字舜工聊城人平進士是年春河決棣州聶家口詔免棣州民物入城市者税一年免棣州租十之三山東通志宋真宗大中祥符六年六月保安軍積雨河溢浸城壘壊廬舍判官趙震溺死又兵民溺死凡六百五十人八月河決澶州十月濵州河溢於定鎮宋史五行志宋真宗大中祥符七年詔罷葺遙隄以養民力八月甲戌河決澶州大吴埽役徒數千築新隄亘二百四十步水乃順道宋史河渠志十一月乙酉濵州河溢於定鎮宋史五行志是年詔棣州經水流民歸業者給復三年山東通志宋真宗大中祥符八年京西轉運使陳堯佐議開滑州小河分水勢遣使視利害以聞及還請規度自三迎楊村北治之復開河於上游以泄其壅溢詔可宋史河渠志七月坊州河溢民有溺死者宋史五行志宋真宗大中祥符九年九月癸卯雄霸河溢宋史真宗本紀禹珪移澶州㑹河隄決溢禹珪率徒塞之宰相王旦使兖州還言其狀優詔褒之宋史張禹珪傳年按宋史宰輔表王旦自景徳三為相至天禧元年七月免旦傳天禧初進位太保為兖州太極觀奉上寶册使則禹珪治河當在是年間宋真宗天禧元年􅂱為右正言會嵗饑河決滑州大興力役饑殍相望􅂱請策免宰相以應天變宋史劉􅂱傳宋真宗天禧三年六月河決滑州城西南漂沒公私廬舍歴澶州濮鄆濟單至徐州與清河合浸城壁不沒者四版明年既塞六月復決於西北隅宋史五行志六月乙未夜滑州河溢城西北天臺山旁俄復潰於城西南岸摧七百步漫溢州城歴澶濮曹鄆注梁山泊又合清水古汴渠東入於淮州邑罹患者三十二即遣使賦諸州薪石楗橛芟竹之數千六百萬發兵夫九萬人治之宋史河渠志滑州河決泛澶濮鄆齊徐境遣使救被溺者䘏八月丁亥滑州又決宋史真宗本紀張惟吉為殿頭髙陽闗路走馬承授公事䕶塞滑州天臺埽役遷西頭供奉官宋史張惟吉傳是年守恩為入内押班河決滑州命為修河鈐轄郊祀召為行宫使復還本任四年春河復故道遷文思院使宋史鄧守恩傳王貽永知徐州河決滑州徐大水貽永作隄城南以禦之改衛州團練使宋使王貽永傳瑊為河北轉運使天禧中河決澶淵瑊視役河上隄墊數里衆皆奔潰而瑊獨留自若須臾水為析去衆頗異之遷工部郎中瑊復右諫議大夫會河決徙知滑州總領修河既而以嵗饑罷役瑊言病民者特楗芻耳幸調率已集若積之經年則朽腐為棄物後復興工斂之是重困也乃再詔塞河河平擢樞密直學士宋史寇瑊傳何芻楗經年朽腐重斂困民之言其痌瘝閭閻之至也今之治水者當三復斯言宋真宗天禧四年二月癸未滑州決河塞宋史真宗本紀羣臣入賀上親為文刻石紀功是年祠部貟外郎李垂又言疏河利害命垂至大名府滑衛徳貝州通利軍與長吏計度垂上言臣所至並稱黄河水入王莽沙河與西河故瀆注金赤河必慮水勢浩大蕩浸民田難於隄備臣亦以為河水所經不無為害今者決河而南為害既多而又陽武埽東石堰埽西地形汙下東河泄水又艱或者云今決處漕底坑深舊渠逆上若塞之旁必復壊如是則議塞河者誠以為難若決河而北為害雖少一旦河水注御河蕩易水逕乾寧軍入獨流口遂及契丹之境或者云因此搖動邊鄙如是則議疏河者又益為難臣於兩難之間輒畫一計請自上流引北載之髙地東至大伾瀉復於澶淵舊道使南不至滑州北不出通利軍界何以計之臣請自衞州東界曹公所開運渠東五里河北岸凸處就岸實土堅引之正北稍東十三里破伯禹故隄注裴家潭逕牧馬陂又正東稍北四十里鑿大伾西山釃為二渠一逼大伾南足決古隄正東八里復澶淵舊道一逼通利軍城北曲河口至大禹所導西河故瀆正北稍東五里開南北大隄又東七里入澶淵舊道與南渠合夫如是則北載之髙地大伾二山脽股之間分酌其勢浚瀉兩渠滙注東北不逺三十里復合於澶淵舊道而滑州不治自涸矣臣請以兵夫二萬自來嵗二月興作除三伏半功外至十月而成其均厚埤薄俟次年可也疏奏朝議慮其煩擾罷之初滑州以天臺決口去水稍逺聊興葺之及西南隄成乃於天臺口旁築月隄六月望河復決天臺下走衞南浮徐濟害如三年而益甚帝以新經賦率慮殫困民力即詔京東西河北路經水災州軍勿復科調丁夫其守扞隄防役兵仍令長吏存恤而番休之宋史河渠志宋真宗天禧五年正月知滑州陳堯佐以西北水壊城無外禦築大隄又叠埽於城北䕶州中居民復就鑿横木下垂木數條置水旁以䕶岸謂之木龍當時賴焉復並舊河開枝流以分導水勢有詔嘉奨宋史河渠志天禧中河決起知滑州造木龍以殺水勢又築長隄人呼為陳公隄宋史陳堯佐傳李若谷為京東轉運使會河決白馬調取芻楗同列盧士倫協三司意趣刻擾州縣而若谷寛之士倫不悦搆於朝徙知陜州天聖初判三司户部勾院累遷太常少卿集賢殿修撰知滑州河齧朝村隄夜馳往督兵為大埽至旦隄完以右諫議大夫知延州州有東西兩城夾河秋夏水溢岸輒圮役費不可勝紀若谷乃制石版為岸押以巨朩後雖暴水不復壊轉給事中參知政事以太子少傅致仕宋史李若谷傳士若谷字子淵豐縣人舉進補縣尉歴知連州真宗朝累遷度攴員外郎出為轉運宋仁宗天聖元年五月甲戌命魯宗道按視滑州決河八月乙未募民輸芟塞滑決河宋史仁宗本紀髙繼勲以建雄軍節度使知滑州河水暴溢齧隄岸繼勲雖老弱自督役露坐河上暮夜猶不輟水乃殺怒滑人徳之宋史髙繼勲傳天聖初議塞滑州決河以君平習知河事命以左侍禁簽書滑州事兼修河都監既而河未塞召同提㸃開封府界縣鎮公事以甞䕶滑州隄有功特遷内殿崇班君平以京師數罹水災請委官疏鑿近畿諸州古溝洫乆之稍完遂詔畿内及近畿州縣長吏皆兼管勾溝洫河道復為滑州修河都監君平有吏材尤明於水利自議塞河朝廷每訪以利害河平君平且死論者惜之宋史張君平傳李渭官太常博士㑹河決滑州天聖初上治河十策參知政事魯宗道奉詔行河奏渭換北作坊副使與張君平並為修河都監未幾皆罷宋史李渭傳沖遷太常博士河決棣州知天雄軍寇準請徙州治河命沖往按視還言徙州動民亦未免治隄不若塞河為便遂以沖知棣州自秋至春凡四決沖皆塞之就除殿中侍御史準為樞密使卒從州信陽而沖坐守護河隄過嚴民輸送往來隄上者輒榜之為使者論奏徙知襄州沖復上疏論徙州非便著河書以獻為京西轉運塞滑州決河權知滑州參知政事魯宗道總河事用太常博士李渭策欲盛夏興役沖言徒費薪楗困人力雖塞必決遂罷知河陽宋史孫沖傳是年以滑州決河未塞詔募京東河北陜西淮南民輸薪蒭調兵伐瀕河榆柳賙溺死之家二年遣使詣滑衞行視河勢宋史河渠志梅摯進龍圖閣學士知滑州州歲備河調丁壯伐灘葦摯以疲民奏用州兵代之河大漲將決夜率官屬督工徒完隄水不為患詔奨其勞宋史梅摯傳崔立通判許州會滑州塞決河調民出芻楗命立提舉受納立計其用有餘而下户未輸者尚二百萬悉奏弛之知江隂軍屬縣有利民港乆廢立教民復治既成溉田數千頃及開横河六十里通運漕累遷太常少卿宋史崔立傳宋仁宗天聖五年七月丙辰發丁夫三萬八千卒二萬一千緡錢五十萬塞滑州河決十月丙申滑州言河平宋史仁宗本紀是年塞決河轉運使五日一奏河事十月丙申塞河成以其近天臺山麓名曰天臺埽宰臣王曽率百官入賀十二月濬魚池歸減水河宋史河渠志郭諮知濟隂縣建言澶滑隄狹無以殺大河之怒故漢以來河決多在澶滑且黎陽九河之原今若引河出沒子山下穿金隄與横隴合以達於海則害可息詔本道使者共議弗合宋史郭諮傳當諮知濟隂史不記其年當在此時諮之議甚善惜時未及舉行以致澶滑之患弗息自天臺既塞之後滑州之患大抵移於澶州矣又按諮傳康定西征諮上戰略擢通判鎮戎軍知諫院歐陽修言諮方田法簡而易行詔諮均蔡州上蔡縣稅以母憂去官用丞相呂夷簡薦起為崇儀副使提舉黄御河隄岸時富弼使契丹諮入對陳大水禦戎之要詔與楊懐敏鄧保信行河其議決黎陽大河下與胡盧滹沱後唐河以注塘泊混界河使東北抵於海上溢鸛鵲陂下注北當城南視塘泊界截燕疆東至海口西接保塞唯保塞正西四十里水不可到請立堡砦以兵戍之詔儲用興役會契丹約和而止宋仁宗天聖六年八月乙亥河決澶州王楚埽凡三十步宋史河渠志宋仁宗天聖七年六月河北大水壊澶州浮橋宋史五行志張觀以資政殿學士尚書禮部侍郎知相州徙澶州河壊孫陳埽及浮梁州人大恐或請趨北原以避水患觀曰太守獨去如州民何乃躬率卒徒増築之隄完水亦退徙鄆州宋史張觀傳姚仲孫權知澶州河壊明公埽絕浮橋仲孫親總河役隄上埽一夕復完權知大名府夜領禁兵塞金隄決河是嵗澶魏雖大水民不及患進禮部郎中宋史姚仲孫傳韓綜通判鄧州天雄軍會河溢金隄民依丘塚者數百家綜令曰能濟一人予千錢民爭操舟栰以救已而丘塚多潰呂夷簡自北京入相薦為集賢校理宋史韓綜傳宋乾徳至淳化中屢疏黄河運道天聖七年髙弁髙繼密等上黄河諸埽圖玉海宋仁宗天聖八年始詔河北轉運司計塞河之備良山令陳曜請疏鄆滑界糜丘河以分水勢遂遣使行視遙隄宋史河渠志康徳輿為閤門祇候河齧陽武埽詔徳輿完築歴開封府西路都巡檢兼領埽事改巡護開封府等六州黄河隄岸天聖中使夏州遷内殿崇班河隂兵馬都監建沿汴斗門以節水㑹積雨汴水將溢徳輿請自京西導水入䕶龍河水不得溢歴知原州宋史康徳輿傳宋仁宗明道二年徙大名之朝城縣於杜婆村廢鄆州之王橋渡淄州之臨河鎮以避水宋史河渠志宋仁宗景祐元年七月甲寅河決澶州横隴埽宋史仁宗本紀肅之監大名軍資庫大河溢府檄修冠氏隄功就弗擾民悅之請為宰為御河催綱横隴之決使者檄䕶金隄滿嵗無河患通判澶州宋史李肅之傳宋仁宗康定元年九月甲寅滑州大河泛溢壊民廬舍宋史五行志宋仁宗慶歴元年詔權停修決河自此乆不復塞而議開分水河以殺其暴未興工而河流自分有司以聞遣使特祠之三月命築隄於澶以扞城宋史河渠志陳執中拜集慶軍節度使同平章事判大名府河決商胡走大名程琳欲為隄不果成而去執中乗年豐調丁夫増築二百里以障横潰以吏部尚書復拜同平章事宋史陳執中傳章按陳執中同平事在慶歴五年宋仁宗慶歴八年六月癸酉本紀丙子河決澶州商胡埽決口廣五百五十七步乃命使行視河隄宋史河渠志張燾提㸃河北刑獄攝領澶州七日而商胡決燾拯溺救饑所全活者十餘萬猶坐免數年復提舉河東又為陜西都轉運使蒲津浮橋壊鎮牛皆沒水中燾以策列巨木於岸以為衡縋石其杪挽出之橋復其初加龍圖閣學士知成都府宋史張燾傳李璋知澶州䕶塞商胡會河漲訛言水且至璋據㕔事自若人心乃安河亦不溢徙曹州觀察使仁宗製忠孝李璋字賜之宋史李璋傳惟吉為入内都知商胡決為澶州修河都鈐轄轉運使施昌言請亟塞崔嶧以為嵗災民困役宜緩命惟吉按視言河可塞而民誠困財用不足宜少待之從其議遷如京使宋史張惟吉傳賈昌期判大名兼河北安撫使時河決商胡埽昌期請復故道不從語在河渠志六塔功敗濵棣徳博民多水患昌期振救之甚力内侍劉恢往視還言河決趙征村與帝名嫌為不祥時皆謂昌期使之以搖當國者宋史賈昌期傳沈立簽書益州判官提舉商胡埽采摭大河事迹古今利病為書曰河防通議治河者悉守為法歴京西北轉運使都水方興六塔河召與議立請止修五股等河及漳河分殺水勢以省役從之加集賢修撰知滄州宋史沈立傳慶歴中決北都商河乆之未塞三司度支副使郭申錫親往董作凡塞河決垂合中間一埽謂之合龍門功全在此是時屢塞不合時合龍門埽長六十步有水工髙超者獻議謂埽身太長人力不能壓埽不至水厎故河流不斷而繩纜多絕今當以六十步為三節每節埽長二十步中間以索連屬之先下第一節待其至厎穴壓第二第三舊工爭之以為不可云二十步埽不能斷漏徒用三節所費當倍而決不塞超曰第一節水信未斷然勢必殺半壓第二節止用半力水縱未斷不過小漏耳第三節乃平地施功足以盡人力處置三節既定即上二節自為濁泥所淤不煩人功申錫主前議不聽超説是時賈魏公帥北門獨以超之言為然隂遣數千人於下流收漉流埽既定而埽果流而河決愈甚申錫坐謫卒用超計商河方定沈适夢溪筆談宋仁宗皇祐元年二月甲戌河北黄御二河決並注於乾寧軍宋史五行志是年移滑州㑹河溢魚池埽且決希亮悉召河上使者發禁兵捍之廬於所當決吏民涕泣更諫希亮堅卧不動人比之王尊宋史陳希亮傳宋仁宗皇祐三年七月辛酉河復決大名府館陶縣之郭固口五行志同四年正月乙亥塞郭固而河勢猶壅議者請開六塔以披其勢宋史河渠志周沆擢天章閣待制河北轉運使李仲昌建六塔河之議以為費省而功倍詔沆行視沆言近計塞商胡本度五百八十萬工用薪芻千六百萬束纔用功一萬薪芻三百萬均一河也而功力不相侔如是蓋仲昌先為小計以來興役爾況所䂓新渠視河廣不能五之一安能容受此役若成何必汎溢齊博濵棣之民其魚矣既而從初議河塞復決如沆言又徙河東轉運使宋史周沆傳蔡挺為開封府推官提㸃府界公事部修六塔河用李仲昌議塞北流入於六塔一夕復決兵夫茭楗漂溺不可計降知滁州言者以為輕乃貶秩停官宋史蔡魏挺傳委瓘知廣州召還糾察在京刑獄議者請開六塔河塞商湖北流宰相主其説命瓘按視還奏以為不可塞宋史魏瓘傳燕度知滑州滑與黎陽對境河埽下臨魏都霖潦暴至薪芻不屬度曰魏實為河朔根本不可坐視成敗悉以所儲茭楗禦之埽賴以不潰復為户部判官宋史燕度傳張擇行為大理寺丞初石亭縣掾檄將陵塞決河衆或登舟以濟擇行獨以為不可皆笑其怯既而舟果覆擇行坐隄上董役埽卒不潰宋史張擇行傳行水金鑑巻十
