body:
  text: 行水金鑑巻十六江南按察使傅澤洪撰河水河源古無所見禹貢導河止自積石漢張騫持節道西域度玉門見二水交流發蔥嶺趍于闐滙鹽澤伏流千里至積石再出唐薛元鼎使吐蕃訪河源得之於穆穆哩山然皆歴嵗月涉艱難所得不過如此世之論河源者皆推本二家其説怪迂總其實皆非本真元有天下薄海内外人迹所及皆置驛傳使驛往來如行國中至元十七年命都實為招討使佩金虎符往求河源都實既受命是嵗至河州州東六十里有寧河驛驛西南六十里有山曰殺馬闗林麓窄隘舉足浸髙行一日至巔西去愈髙四閲月始抵河源是冬還報并圖其城𫝊位置以聞其後翰林學士潘昂霄從齊都實之弟庫庫楚得其説撰為河源志臨川朱思本又從巴爾濟蘇家得帝師所藏梵字圖書而以華文譯之與昂霄所志互有詳略今取二家之書考定其説有不同者附注於下按河源在吐蕃朶甘斯西鄙有泉百餘泓沮洳散渙弗可逼視方可七八十里履髙山下瞰燦若列星以故名鄂端諾爾鄂端譯言星宿也思本曰河源在中州西南直四川馬湖蠻部之正西三千餘里雲南麗江宣撫司之西北一千五百餘里帝師薩斯嘉地之西南二千餘里水從地湧出如井其井百餘東北流百餘里滙為大澤曰鄂端諾爾羣流奔輳近五七里滙二巨澤名鄂楞諾爾自西而東連屬吞噬行一日迤邐東騖成川號齊必勒河又二三日水西南來名伊爾齊與齊必勒河合又三四日水南來名呼蘭又水東南來名伊拉齊合流入齊必勒其流浸大始名黄河然水猶清人可涉思本曰呼蘭河源出自南山其地大山峻嶺綿亘千里水流五百餘里注伊爾齊河伊爾齊河源亦出自南山西北流五百餘里始與黄河合又一二日岐為八九股名伊遜鄂羅木譯言九渡通廣五七里可度馬又四五日水渾濁土人抱革囊騎過之聚落糾木幹象舟傅髦革以濟僅容兩人自是兩山峽束廣可一里二里或半里其深叵測朶甘斯東北有大雪山名伊拉瑪博囉其山最高譯言騰格哩哈達即崑崙也山腹至頂皆雪冬夏不消土人言逺年成冰時六月見之自八九股水至崑崙行二十日思本曰自渾水東北流二百餘里與和囉海圖河合和囉海圖河源自南山水正北偏西流八百餘里與黄河合又東北流一百餘里過瑪拉噶地又正北流一百餘里乃折而西北流二百餘里又折而正北流一百餘里又折而東流過崑崙山下番名伊拉瑪博囉其山髙峻非常山麓綿亘五百餘里河随山足東流過薩斯嘉庫濟克特地河行崑崙南半日又四五日至地名庫濟及克特二地相屬又三日地名哈喇伯勒齊爾四達之衝也多寇盜有官兵鎮之近北二日河水過之思本曰河過克特與伊實巴薩沁河合伊實巴薩沁河源自鐡豹嶺之北正北流凡五百餘里而與黄河合崑崙以西人簡少多處山南山皆不穹峻水亦散漫獸有髦牛野馬狼狍羱羊之類其東山益髙地益漸下岸狹隘有狐可一躍而越之處行五六日有水西南來名納琳哈喇譯言細黄河也思本曰哈喇河自白狗嶺之北水西北流五百餘里與黄河合又兩日水南來名竒爾穆蘓二水合流入河思本曰自哈喇河與黄河合正北流二百餘里過鄂勒博站折而西北流經崑崙之北二百餘里與奇爾穆蘇河合奇爾穆蘇河源自威茂州之西北岷山之北水北流即古當州境正北流四百餘里折而西北流又五百餘里與黄河合河水北行轉西流過崑崙北一向東北流約行半月至奎騰州地名必齊勒始有州治官府州𨽻吐蕃等處宣慰司司治河州又四五日至積石州即禹貢積石此處有誤見首巻禹貢錐指五日至河州安鄉闗一日至打羅坑東北行一日洮河水南來入河思本曰自奇爾穆蘇河與黄河合又西北流與彭賛河合彭賛河源自彭賛山之折西北水正西流七百餘里過扎薩克逹實地與黄河合而西北流三百餘里又折而東北流過西寧州奎騰州馬嶺凡八百餘里與邈水合邈水源自青唐宿軍谷正東流五百餘里過阿勒巴站與黄河合又東北流過土橋站古積石州來羌城廓州果宻站界都城凡五百餘里過河州與頁彭河合頁彭河源自西傾山之北水東北流凡五百餘里與黄河合又東北流一百餘里過塔布城銀川站與湟水浩亹河合湟水源自祁連山下正東流一千餘里注浩亹河浩亹河源自刪丹州之南刪丹山下水東南流七百餘里注湟水然後與黄河合又東北流一百餘里與洮河合洮河源自羊撒嶺北東北流過臨洮府凡八百餘里與黄河合又一日至蘭州過北卜渡至鳴沙河過應吉理州正東行至寧夏府南東行即東勝州𨽻大同路自發源至漢地南北澗溪細流傍貫莫知紀極山皆草石至積石方林木暢茂世言河九折彼地有二折葢奇爾穆蘇及奎騰必齊勒也思本曰自洮水與河合凡又東北流過逹勒逹地八百餘里過豐州西受降城折而正東流過達勒逹地古天徳軍中受降城東受降城凡七百餘里折而正南流過大同路雲内州東勝州與黒河合黒河源自漁陽嶺之南水正西流凡五百餘里與黄河合又正南流過保徳州葭州及興州境又過臨州凡一千餘里與察納河合察納河源自古宥州東南流過陜西綏徳州凡七百餘里與黄河合又南流三百里與延安河合延安河源自陜西蘆子闗亂山中南流三百餘里過延安府折而正東流三百里與黄河合又南流三百里與汾河合汾河源自河東朔武州南亂山中西南流過管州冀寧路汾州霍州晉寧路絳州西流至龍門凡一千二百餘里始與黄河合又南流二百里過河中府遇潼闗與太華大山綿亘水勢不可復南乃折而東流大槩河源東北流所歴皆西番地至蘭州凡四千五百餘里始入中國又東北流過逹勤逹地凡二千五百餘里始入河東境内又南流至河中凡一千八百餘里通計九千餘里元史地理志河自爾雅山海經淮南子水經皆言出崑崙漢書西域傳云河有兩源一出葱嶺山一出于闐唐薛元鼎使吐蕃得河源於們磨哩山鄭樵謂河有三源一出葱嶺一出于闐南山而正源自出崑崙山元太祖過黄河九度九度在崑崙西南憲宗命弟實喇征西域拓地四萬里而河源在域内至元庚辰世祖命招討使都實往通互市自河州行五千里抵河源還圖以聞又使其弟庫庫楚馳奏庫庫楚授其説翰林學士潘昻霄撰河源志可謂詳矣而王文恪鏊辨之以為張騫所歴諸國甚乆且長東漢之世大秦條支安息至於海濵四萬里外重譯貢獻甘英甞窮臨西海而還皆未覩所謂崑崙元使行不及五千里云已踰之何崑崙之近乎方中履古今釋疑夫潤下水之性也而欲為之防以殺其怒遏其衝不亦甚難矣哉惟能因其勢而道之可蓄則儲水以備旱暵之災可洩則㵼水以防水潦之溢則水之患息而于是葢有無窮之利焉元史河渠志台哈布哈陞禮部尚書兼㑹同館事黄河決奉詔以珪玉白馬致祭河神竣事上言淮安以東河入海處宜倣宋置撩清夫混江龍鐵掃撼蕩沙泥隨潮入海朝廷從之㑹用夫屯田其事中廢而止元史台哈布哈傳元世祖至元九年七月衛輝路新鄉縣廣盈倉南河北岸決委都水監丞馬良弼與本路官同詣相視差丁夫併力修完之元史河渠志是年新鄉廣盈倉南河北岸決五十餘步尋又崩一百八十三步其後河徙自原武出陽武南而新鄉之流遂絶禹貢錐指元世祖至元九年九月南陽懐孟衛輝順天等郡洺磁泰安通灤等州淫雨河水並溢圮田廬害稼元史五行志元世祖至元二十年六月太原懐孟河南等路沁河水涌溢壊民田一千六百七十餘頃衛輝路清河溢損稼南陽府唐鄧裕嵩四州河水溢損稼元史五行志程思廉為河北河南道按察副使至元二十年間衛輝懐孟大水思㢘臨視賑貸全活甚衆水及城不沒者數版即修隄防露宿督役水不為患衛人徳之遷陜西按察使元史程思㢘傳元世祖至元二十二年秋南京彰徳大名河間順徳濟南等路河水壊田三千頃元史五行志元世祖至元二十三年三月甲戌雄霸二州及保定諸縣水泛溢冒官民田發軍民築河隄禦之冬十月辛亥河決開封祥符陳留杞太康通許鄢陵扶溝洧川尉氏陽武延津中牟原武睢州十五處調南京民夫二十萬四千三百二十三人分築堤防元史世祖本紀元世祖至元二十四年三月乙卯汴梁河水泛溢役夫七千修完故堤元史世祖本紀元世祖至元二十五年五月已丑汴梁大霖雨河決襄邑漂麥禾癸丑河決汴梁太康通許杞三縣陳潁二州皆被害六月壬申睢陽霖雨河溢害稼免其租乙亥以考城陳留通許杞太康五縣大水及河溢沒民田蠲其租元史世祖本紀汴梁路陽武縣諸處河決二十二所漂蕩麥禾房舍委宣慰司督本路差夫修治元史河渠志十二月太康汴梁二路河溢害稼元史五行志先是至元九年河決新鄉縣廣盈倉岸時河猶在新鄉陽武間也不知何年徙出陽武縣南而新鄉之流遂絶據史至元二十三年河決衝突河南郡縣凡十五處二十五年汴梁路陽武等縣河決二十二所水道一變蓋在此時矣元大一統志殘缺僅存十之一二河之所經不可得詳大抵初由渦至懐逺入淮如明正統十三年決河所行之道後三十餘嵗為泰定元年始行汴渠至徐城東北合泗入淮謹摭近志各州縣界中見行之河銓次如左黄河自武陟縣南武陟在懐慶府東一百里河去縣一十里黄河自武陟縣以至安東入海至今無異東逕滎澤縣北其北岸則獲嘉縣滎澤在鄭州北五十里黄河舊去縣十里近時河益南侵直逼縣城獲嘉在衛輝府西南九十里黄河在縣南六十里東逕原武縣南原武在開封府西北一百二十里河去縣二十里又東逕陽武縣南陽武在開封府西北九十里河舊去縣二十十三里與新鄉分水至元中河徙出陽武縣南而縣北之流絕新鄉之流亦絶自北至徐州城東北黄河所行大抵皆汴水故道也又東逕延津縣南延津在開封府西北九十里又東逕祥符縣北祥符即今開封府治河去城四十里其北岸則封丘縣封丘在開封府北六十里河舊在縣西北四十餘里元時徙經縣南去縣五十一里又東逕陳留縣北陳留在府東少南五十里河去縣三十里又東逕蘭陽縣北蘭陽在開封府東北九十里河去縣十五里金時河始流經縣界又東逕儀封縣北儀封在開封府東北一百十五里河去縣二十里黄陵岡在縣東北五十里賈魯治河功始於此按蘭陽儀封之河舊出其縣北與長垣東明分水金大定十二年尚書省奏請増築隄岸東明亦在其中二十七年令沿河州縣官結銜並帶河防而長垣與焉可證也元至元中河屢決汴梁路遂出蘭陽儀封之南而長垣東明界中無河矣又東南逕睢州北睢州在歸徳府西一百七十里河去州七十里又東南逕考城縣北考城在睢州東北九十里河去縣三里賈魯河在縣北三十里又東南逕商丘縣北其北岸則曹縣商丘即歸徳府治河在城北三十里賈魯河在城北四十里曹縣在山東兖州府東南一百二十里河在縣南四十里黄陵岡在縣西南六十里賈魯河在縣西北四十里自黄陵岡至楊青村皆元至正中賈魯所開也又東逕虞城縣北虞城在歸徳府東北六十里河去縣十五里又東逕夏邑縣北夏邑在歸徳府東一百二十里河去縣二十二里其北岸則單縣單縣在山東兖州府西南二百十里河去縣四十里又東逕碭山縣北碭山在今江南徐州西北一百七十里河在縣北三十里又東逕豐縣南豐縣在徐州西北一百五十里河去縣三十里又東逕沛縣南其南岸則蕭縣沛縣在今徐州西北一百十里蕭縣在徐州西五十里河在蕭縣北五十里去沛甚近又東逕徐州北與泗水合徐州在今江南布政司西北一千里河自州北東南流至城東北合于泗