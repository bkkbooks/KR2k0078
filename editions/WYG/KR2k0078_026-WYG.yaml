body:
  text: 行水金鑑巻二十六江南按察使傅澤洪撰河水明世宗嘉靖四十五年六月癸酉河決馬家橋等處新隄總理河道尚書朱衡都御史潘季馴以聞工部議覆請令衡等亟為經理仍及水盛之時親詣黄河上流督率有司視某處故道可復某處新河可開務圖上䇿以弭後患從之十一月壬午總理河道都御史潘季馴以憂去吏部言治河尚書朱衡心計精明足當大任今河業巳有緒宜即以河道事使衡兼之待其遷轉之日仍舊復設河道都御史報可明世宗實録是年黄河復決沛縣飛雲橋二三等鋪東流衝運河亦由湖陵城口入湖坡平地水盈丈許上下百里漕渠無迹九月馬家橋隄成障水使之南趨秦溝冬沛縣水斷流續文獻通考時河盡北徙決沛之飛雲橋横截逆流東行踰漕入昭陽湖泛濫而東平地水丈餘散漫徐州從沙河至二洪浩渺無際而河變極矣明紀事本末乙丑公以久次擢南京刑部尚書㑹河決徐方運道湮塞上憂之改工部尚書兼右副都御史總理河漕公日夜馳至徐方率四部人吏行視河所決道漲為平陸浚之沙隨水壅淖不可足其旁横流汗漫舟行樹杪力無所施則下令吏民父老有能以河事獻者立召見口對久乃得新渠䂓度焉于慎行作鎮山朱公行狀公名衡字士南萬安人嘉靖壬辰進士新渠詳見運河公晉都察院右僉都御史總理河道乙丑河決沛縣破三沽閘漕道為梗議者言欲徙閘夏鎮従南陽至留城出茶城口就高卬避漫流便天子以為然命大司空衡督理以公副公分工受事躬行畚鍤間十旬竣事省原估三之一尋丁内艱河工成詔褒録公晉右副都御史申時行撰宫保尚書潘公季馴傳黄決沛縣之飛雲橋榖亭沙河留城境山一帶河渠盡塞公遡流而西問故道扵土老篙師喟然歎曰漢瓠子之役沉璧投馬不過曰復江南舊跡而巳其後賈魯亦一切以復故為主宜仍三沽故道便而夏鎮業有成議遂躬行督相不三旬告成王錫爵撰印川潘公墓志乙丑補工科給事中先是河決曹縣防河使者疏請開趙皮寨孫家渡以殺水勢特遣侍郎吳鵬都御史曽鈞董其役公上書極陳闗係祖陵周藩至急乃不果開至是當事者仍議徐沛運道淤平宜亟開汴河以疏黄水漫流公援證往事反覆辨其不可大略謂汴河肇開自隋下通宿泗而達廣陵數百年來湮没殆盡即欲開鑿糜費不貲使開之水即行勢必南走泗州寢園可虞使開之水不至匪徒無益誤奪時日運道之治反後已時韙其言開汴之議竟寢晉尚寳司少卿程紹作徐公𫝊辛按公名自得雍丘人嘉靖丑進士明穆宗隆慶元年正月甲申先是河決沛縣議者請修復運河故道乃勘議新集郭貫樓等處上源巳而總理河道尚書朱衡言古之治河惟欲避害而今之治河又欲資其利故河流出境山以北則閘河淤出徐州以南則二洪涸惟出自境山至徐州小浮橋四十餘里間乃兩利而無害自黄河横流碭山郭貫樓支河皆巳淤塞改從華山分為南北二支南出秦溝正在境山以南五里許此誠運河之利也惟北出沛縣西及飛雲橋逆上魚臺為患甚大聖慈不忍沛縣魚臺之民横罹水災拳拳欲開故道臣等仰體聖心亦有勘議上源之請但考之地形參之輿論其不可者有五自新集至兩河口皆平原高阜無寸尺故道可因即欲濬深無異穿井郭貫樓至龍溝一帶頗有河形又係新􅌎無可駐足譬諸取飴扵􅎆隨取隨滿其不可一也黄河所經鮮不為患由新集則商虞夏邑受之由郭貫樓則蕭碭受之今改復故道則魚沛之禍復移蕭碭其不可二也黄河西注華山勢若建瓴又無涯涘欲従中鑿渠挽水南向必當築壩横截遏其東奔於狂瀾巨浸之中築數里之壩為力甚難其不可三也役夫三十三萬曠日持久勞民扵旣疲之餘徼功於難必之地騷動三省其不可四也大役踵興工費以數百萬計匱乏之後措置無䇿一有不繼前功盡隳其不可五也臣以為上源之議可罷惟開廣秦溝使下流通行修築南長隄以防奔潰可以甦魚沛昏墊之民工部請従衡議上曰可二月甲午總理河道工部尚書兼都察院右都御史朱衡奉詔自陳乞休不允十一月丁卯陞刑部浙江司郎中方良曙為河南按察使副使治河明穆宗實録明穆宗隆慶二年六月乙酉總理河道漕運工部尚書兼都察院右副都御史朱衡以疾乞休不允九月已已命總河尚書朱衡回部庚午起服闋都察院右副都御史翁大立以原職總理河道十月戊戌詔以兩淮運司挑河銀三千兩發徐吕二洪協濟河夫之費従總理屯鹽都御史龎尚鵬奏也明穆宗實録明穆宗隆慶三年二月庚子總河都御史翁大立奏言國家張官置吏為治河計至詳密矣然往往能收臨患焦爛之功而未有先事徙薪之䇿以懲怠擊惰之法大疎也稽之律令凡失時不修隄防者罪止笞杖是以當事者率漫然視之請自今更令隄防不効者府佐及州縣正官俱以差降級并管河副使與職專守巡者俱治罪工部覆行其言因陳漕渠視黄河以為通塞黄河變遷自古不常乞并敕大立及時疏濬下流建築遥隄以備之報可七月壬午河決沛縣自考城虞城曹單豐沛抵徐俱罹其害漂没田廬不可勝數漕舟二千餘皆阻邳州不得進總理河道都御史翁大立以聞工部尚書朱衡覆奏茶城淤塞宜俟水退乃可疏濬獨徐沛災民流移困苦宜令户部亟議賑濟以安人心户部覆如衡言請以淮揚商稅及撫按贓贖備賑倉糧賑䘏貧民仍敕河道諸臣設法疏濬支渠或置船盤剥勿令漕舟阻滯上是之庚寅工科都給事中嚴用和言黄河再溢震蕩徐沛運道為梗宜飭所司塞決口挑濬􅌎沙以紓目前之急其治河經久之䇿宜行河道及撫按官悉心計處扵是工部言今河流稍平漕舟以次而進其諸隄堰閘壩可以漸修無足為慮惟沛縣黄水之横溢倐去倐來則民命不堪秦濁河口之􅌎沙隨疏隨壅則運道終阻誠宜及時講求為一勞永逸之計然臣以為黄河為患自周漢至今未有能久治而不決之術要在因勢利導隨敝修補而巳今沛縣東隄巳完而縣城南至境山西隄未及舉修宜亟加興築以遏沛河之溢其秦濁二河易􅌎難疏宜扵梁山之南别開一渠逺避黄水以免沙􅌎之患計無便扵此者至欲多開故道以殺河勢則臣以為不可夫漢武力罷扵瓠子之工宋人禍基扵回河之役即嘉靖中開濬孫家渡等處費出不貲旋即壅塞未有能出竒䇿使河受約束者也上是其言已亥總河翁大立奏洪水為患在北則廣大河間在南則淮揚徐沛在河南則開歸彰衛在山東則兖濟東昌人民嗸嗸愁苦萬狀宜令户部轉行漕司以最後漕糧收貯徐州廣運倉平價出糶以救災民及他州郡咸議蠲䘏則可以活數百萬之命時工科都給事中嚴用和亦以為言户部覆請留漕糧三萬石賑濟工部請行河道諸臣及時繕修隄閘壩堰其茶城西岸曹單河隄以屬大立南直隸淮河口等處山東臨清徳州等處河南虞城夏邑等處決口屬各巡撫經理務刻期竣事上皆從之八月丁已總理河道都御史翁大立請發河南山東淮揚河夫樁草銀一萬兩預糴粟麥貯之倉庾以備明年河工及賑濟之用従之庚申以洪水為患命總河翁大立祭大河大濟之神巡撫鳯陽侍郎趙孔昭祭大江大淮之神九月丙子總河翁大立言陛下念濵河之民重罹水災特下蠲租之令更發内帑以賑之不勝大幸顧閭閻窮苦之狀宫禁䆳逺有不盡見聞者臣謹繪圖十二以獻一曰水次兊軍二曰漕河築隄三曰黄河驟漲四曰昏夜守隄五曰糧船過洪六曰黄河捲埽七曰茶城撈淺八曰洪水衝城九曰風雨異常十曰海潮嘯溢十一曰災民避水十二曰糧船漂没險阻艱難備載之矣陛下惠然省覽知大官之膳餼皆軍民膏血必有惻然傷之者且今時事可深慮者五東南財賦之藪而江海泛濫粒米不登鞭撻雖加徒隕民命此京儲可慮一也邊鎭闗隘洪水衝激墩堡傾頽何恃以守此外患可慮二也直𨽻山東河南皆股肱之郡霖雨既久城郭不完積貯空虚振貸無䇿卒有宼盜何以備之此内地可慮三也海徼之間􅄓風鼓浪兵船戰士悉被漂沉此海防可慮四也淮浙産鹽之場鹹泥盡衝團竈盡廢此國課可慮五也願陛下以此五患十二圖召公卿輔弼之臣與共計之求所以消弭變異者無為文具上以圖留覽下其章扵所司明穆宗實録是年七月河水溢自清河抵淮安城西淤者三十餘里決方信二壩出海平地水深丈餘寳應湖隄崩壞山東莒郯諸處水溢従沂河直河入邳州人民溺焉明紀事本末是年黄河及南直𨽻山東河南俱大漲秋復海嘯徐邳豐沛一望無際尚書朱衡開回回墓河上通昭陽湖湖陵城河口以洩坡水凡二千六百餘丈河道都御史翁大立奏開鴻溝廢渠自昭陽湖中以達鴻溝自鴻溝以達李家口自李家口以達回回墓而東出留城閘河計長六十餘里墾民田數千頃三閱月告成滕沛利之按沽沛舊河湮塞朱公奏開新河比舊河徙東三十餘里然新河餘流舊河積水猶浸昭陽湖至是開鴻溝廢渠則新舊河俱得宣洩鴻溝廢渠在新河以西昭陽以東乃往年沙薛二水従此以入舊河者自舊河淤而此渠亦淤其半故廢今所開即此南河全考明穆宗隆慶四年三月丁酉直𨽻巡按御史張問明奏留蘇松常鎮四府罰贖銀一萬兩濟河工用兼賑饑民許之四月乙已以兵科都給事中温純言更命河道都御史加提督軍務職銜以南直𨽻之淮揚頴徐北直隸之大名天津河南之睢陳山東之臨沂及添設曹濮道各兵備官屬焉七月壬辰時山東沙薛汶泗諸水驟溢決仲家淺等處而黄河暴至茶城復淤扵是侍郎翁大立言今山水甚盛由梁山之下張孤山之東内花山之西南出戚家港合於黄河宜逐加開濬依山築隄以避秦溝濁河歲歲漲淤之患此所謂因勢而利導不與黄河争尺寸之地者也工部是其議請令大立督所司相度舉行従之癸已改工部右侍郎翁大立為兵部左侍郎八月丁酉起原任都察院右副都御史潘季馴總理河道提督軍務此再任總河也九月甲戌河決邳州自睢寧白浪淺至宿遷小河口淤百八十里運船千餘不得進侍郎翁大立言邇來黄河之患不在河南山東豐沛而專在徐邳故先欲開泇口河以逺河勢開蕭縣河以殺河流者正為浮沙擁聚河面増髙為異日慮耳今秋水洊至横溢為災臣以為權宜之計在棄故道而就新衝經久之䇿在開泇河以避洪水議無出此兩者惟上決擇扵是都給事中龍光御史孫裔興等皆以為言請罰治河道諸臣責以後效令及時疏塞以通漕舟工部覆奏往時黄河自劉大夏設官布置而河南之患息自嘉靖初曹單築長隄而山東之患息自近年改成新河而豐沛之患息非必河自順軌由人力勝也今既不能引他水以濟漕而新衝之渠卒未可就惟築塞決口如曩時房村方略則故道宜可通至於泇口之議雖工費不貲而一勞永逸比歲歲疏鑿費亦自省宜令大立躬自相度條其利害以聞其管河官員俱令戴罪任事俟河通奏請上是之十月庚申總河侍郎翁大立言臣竊計治邳閼阻之䇿有三一開泇口一就新衝一復故道然三者利害恒相參焉從馬家橋經利國監入泇口出邳州則可以避秦溝河徐河徐吕二洪之險引薛河鴻溝之水灌河水陸通行諸驛遞分司略可併省而徐邳東鄙之民亦漸復業其便者五然而山水驟發則須多張水門廣開水櫃利國監多伏石須紆回避之即河巳成猶當勞費數年而後可久其為不便者三此開泇口之利害也従曲頭集抵莊官樓河所衝刷久自成渠勞費不多而道理更近且河入睢寧必不南決又無徐邳横射之患匙頭灣之險而平野築隄可免齧蝕其便者五然曲頭集截河大壩費亦不貲新隄難固水至復決又當廢睢寧一縣併扵邳州其為不便者三此就新衝之利害也復故道則二總漕粮得水可濟漕舟九百有餘即出可以還百年運道可以振業徐州而存睢寧便者四然而百數十里之淤視房村工費尤鉅置沙兩涯勢易崩塞埽灣築隄雖築不固且河流所棄多不能復不便者四此復故道之利害也請以臣三䇿下工部定議行河道漕司撫按諸臣協同舉事以責成功又言河工以錢糧為本以得人任事為要復條上計處工費借留漕銀議留漕米查理船稅起調夫役選用官員奬勵才賢監督工程八事疏下工部仍請復故道以濟目前之急其開鑿泇口之議令大立熟計以聞無持兩可其所陳八事多可采用上皆允行十一月癸亥工部郎中張純議以徐吕二洪之間漸成塡淤河隄寢薄假令來年水溢必有衝決之患請自徐邳至淮繕治兩涯増髙倍薄仍築遥堤以防不測工部是其議請命都御史潘季馴勘詳以聞巳而季馴言築隄之法有二近者所以束湍悍之流逺者所以待衝決之患皆為上䇿顧工費不貲動以巨萬當此財殫力疲之㑹安所措其手足耶宜以見築縷水壩増益髙厚曲加保護姑為目前之計従之十二月乙未總督漕運户部左侍郎趙孔昭上疏自劾孔昭已得旨還部而代者未至㑹河決運阻乃引罪乞罷不許壬子户部覆河道都御史潘季馴奏請量留漕糧三萬石漕庫銀一萬二千兩以河工船稅銀抵還太倉其舊任河道都御史今陞兵部侍郎翁大立業巳交代難復行事宜令赴京供職明穆宗實録是年又決邳州注睢寧出小河口自曹家口至直河淤百餘里命官濬之復故渠盡塞諸決口明㑹典是年七月黄河暴漲決縣治之曲頭集王家口馬家淺等處淤墊一百餘里俱為平陸睢寧縣志庚午河稍南徙決睢寧瀦其陸百五十里皆為平野公復以故節來蒞事而廢址盡復其所浚築深厚再倍扵故河而費半之出官民之舟扵積淤者以萬數王錫爵撰潘公季馴墓志公塞決時滛雨連旬水驟至幾没公趾不為避萬衆野處公往來拊慰不憚劬勞嘗乗小艇行河風雷大作震撼波濤中幾覆絓樹杪乃脫父老神之為潘公再生識其處申時行撰潘公季馴𫝊明穆宗隆慶五年三月乙亥以河工免山東布政司及淮揚徐頴三道各派夫人户雜繇一年従河道都御史潘季馴奏也四月甲午河復決邳州自曲頭集至王家口新隄多壞五月丙戌總河都御史潘季馴議保邳河新隄條陳分委監督議委官員議處人夫議設鋪舍預備物料五事工部覆請従之八月辛丑總理河道工部右侍郎兼右僉都御史陳大賔卒賜祭𦵏如例壬寅命總理河道都御史潘季馴速治吕梁雙溝決隄八月已酉工部尚書朱衡言國家初置漕運悉資泉流自景泰以後黄河入運奪漕為河縁是河身浸廣淤沙歲積不得不藉黄河以行故今徐邳之漕河即黄河也歴考往代河趨濟博則決曹單魚沛而沽頭上下諸閘盡廢趨邳遷則決野雞岡口下亳泗而徐吕二洪頓涸今沛邑新河既成縦決曹魚可保無恙而茶城以南猶屬黄河非盡斥逺之無以善後乞將議開泇河之說下諸臣熟計報可甲寅命禮科左給事中雒遵往邳州等處查勘河工先是總督河道都御史潘季馴奏邳河工成乞録効勞諸臣上曰今歲漕運比常更遲何為輙報工完且敘功太濫該部覈實以聞於是尚書朱衡覆言河道通塞專以糧運遲速為驗非謂築口導流便可塞責乞遣官就彼覆勘仍命季馴戴罪管事報可戊午改工部營繕司郎中張純仍為都水司郎中以總理河道都御史潘季馴言其治河有效特諸久任故也十月已亥以河南山東大水命工部申飭管河官經理上流河防以備衝決辛丑先是問刑條例有盜決故決河防之律在河南山東者俱問發充軍而南直隸徐邳一帶罪止徒配至是河道都御史潘季馴言徐邳每嵗河決之由河流衝射居十之四而居民盜決居十之六皆以法輕易犯故也請著令自徐邳上下為河流所經行處凡有貪水利避水患盜決故決河防者一如山東河南例俱發充軍仍増入條例中刑部覆従其議癸卯命總理河道都御史潘季馴速治茶城之淤淺者以巡按御史張守約言運船阻塞故也十二月辛亥罷總理河道都御史潘季馴同原任漕運都御史陳炌俱冠帶閒住時禮科左給事中雒遵自邳河勘工還為上言運船漂没之故始扵漕司缺船併糧太重故一遇水發相隨而敗又官旗侵冐者多度不能償輙妄引船壞自解此則漕臣陳炌等之罪也至於王家口初決之時黄水盡從漫坡經流南出小河口藉令季馴稍緩築隄一月則漕船可以盡出漫坡避新生之險乃計不出此反驅舟以就新溜坐視陷没方復騰章報功罪滋大矣今炌雖回籍未盡其辜而季馴尤不宜獨免乞并賜罷工部覆従其言故有是命明穆宗實録是年八月總督漕運都御史陳炌上疏報邳州河決漕船淹没户部覆今歲漕船過淮獨早而入閘者十不及二三雖河流為梗然諸臣怠誤之罪亦不容辭乞遣風力憲臣督視以重國計㑹科臣宋良佐御史唐鍊亦以為言得㫖炌與總兵陳王謨參將顧承勲俱停俸戴罪管事命御史張憲翔沿河督􅃐之續文獻通考是年河決油房等十一口都御史潘季馴役丁夫五萬開匙頭灣塞十一口築縷隄三萬丈挑淤八十里故道漸復南河全考是年河決雙溝先是河漲徐州上下茶城至吕梁兩厓東山不得下又不得決至是乃自雙溝而下北決油房曹家青羊諸口南決闗家口曲頭集馬家淺閻家口張擺渡王家白糧淺諸口凡十一枝流既散幹流遂㣲乃淤自匙頭灣八十里而河變又極矣趙孔昭翁大立前後治之無功議者欲棄幹河而行舟於曲頭集大枝間冬初水落則幹巳平沙而枝復阻淺又議棄黄河運而膠河泇河海運分沓莫可歸一扵是即家起都御史潘季馴治之季馴之治水惟求復故道而巳乃上言老河故道自新集歴趙家圈出小浮橋安流無患後因河南水患别開一道出小河口本河漸被沙淺嘉靖間河北徙故道遂成陸地臣奉命由夏鎮歴豐沛至崔家口由崔家口歴河南歸徳虞城夏邑商丘諸縣至新集則見黄河大勢巳直趨潘家口矣父老言去此十餘里自丁家道口以下二百二十里舊河形迹見在可開臣即自潘家口歴丁家道口馬牧集韓家道口司家道口牛黄堌趙家圈至蕭縣一帶皆有河形中間淤平者四分之一河底皆滂沙見水即可衝刷臣以為莫若修而復之河之復其利有五従潘家口出小浮橋則新集迤東河道俱為平陸曹單豐沛永無昏墊一利也河身深廣每歲免泛溢之患虞夏豐沛得以安居二利也河従南行去㑹通河甚逺閘渠無虞三利也來流既深建瓴之勢導滌自易則徐州以下河身亦因而深刷四利也小浮橋來流既逺則秦溝可免復衝而茶城永無淤塞之患五利也既報可乃役丁夫五萬開匙頭灣塞十一口大疏八十里故道漸復巳而以漕舟壞季馴閒住明紀事本末明穆宗隆慶六年正月丁卯禮科左給事中雒遵條治運河五事前三條並見運河一自茶城以西至開封府界為黄河之上源南北兩岸長隄多缺北徙則新河有妨南徙則二洪告竭且虞陵寢宜於北岸接築古長隄以遏豐沛之衝南岸續舊隄以絶南射之路一自清河至安東海口為黄河下流雖有沙洲不足滯礙不必濬導以費工力工部覆奏上皆允行之戊辰命工部尚書朱衡兼都察院左副都御史經理河工時閱視河道左給事中雒遵言衡當先帝時嘗奉命治河有效當今廷臣可使治水無出衡右者宜暫命總理俟功有次第仍召還視部事部覆従之辛未工部尚書朱衡疏請修築徐州至宿遷長隄凡三百七十里并繕治豐沛大黄隄従之丁丑起兵部左侍郎兼都察院右僉都御史萬恭以原官總理河道提督軍務二月已丑巡按直𨽻御史張守約陳言治河緩急大略謂全河旣復故道修治之䇿在増築隄岸以束漫流以防奔潰其地勢最下者如徐州青田淺吕梁達曲頭集六十里直河至宿遷小河口七十里皆宜修築大隄工最急自小河口至桃源清河一百四十里宜築縷水隄清河草灣決口宜塞工次之徐州至茶城四十里宜接補小隄茶城而上接曹縣界北隄二百六十里宜築縷隄工又次之誠量其緩急次第修治使河流直下停淤漫決可免而牽挽可施此治河之較也夫與其開不可必成之新河孰若修治巳通之舊河為力甚易與其費數百萬開河孰若以數十萬修河為費甚省疏入工部請従其議上然之三月辛亥詔祠沿河敕建水神諸廟以工部尚書朱衡請也明穆宗實録是年河決栲栳灣工部尚書朱衡河道侍郎萬恭題請創築徐吕起至宿遷縣張林鋪止兩岸隄各長三百七十里又徐州北至茶城築兩岸隄各長三十里漕運都御史王宗沭奏黄河遷徙不常請行河道踏勘凡係陵寢當黄河南岸地方單薄之處務増加防捍以保無虞南河全考是年七月二十七日黄河驟漲自徐碭至淮揚一夕丈餘下流悉成巨浸清河山陽安東鹽城邳桃宿睢被災尤甚兩淮鹽場各衛所俱同淮安府志徐邳河決漂没官船八百餘艘上遣給事中雒遵往視還奏河流易治然必大司空往乃可圖也上又以公兼右都御史經理徐邳等河悉心經畫疏汶濟之淺築徐邳之隄塞豐沛之決鑴海門之壅數月告成㑹穆考升遐山陵工作乃􅃐召公還部于慎行撰公行狀行水金鑑巻二十六
