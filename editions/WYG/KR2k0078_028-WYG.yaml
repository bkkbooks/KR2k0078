body:
  text: 行水金鑑巻二十八江南按察使傅澤洪撰河水河防十四要其一河南原武縣胡村鋪崔家莊封丘縣于家店祥符縣劉獸醫口陶家店馬家口蘭陽縣銅瓦廂儀封縣穵泥河煉城口榮華樹考城縣芝麻莊李秀厰滎澤縣小院村賈魯河隄俱屬要害而陶家店銅瓦廂更為喫𦂳開歸府佐總管而州縣管河官分治之其二山東曹縣武家壩曹單北岸縷水隄俱要害而武家壩尤為喫𦂳兖州府佐總管而二縣管河官分治之其三汶河新創坎河石灘夏秋之發任其灘上漫流以殺其勢或損或増抽添諸石汶上管河官兼管而老人分理之其四南直𨽻徐邳之間新隄曲頭集棃林鋪房村雙溝閆家口王家口白浪淺俱要害而曲頭集埽灣直射内有舊決河身尤喫𦂳焉司河者宜役全神扵此其五南岸天字鋪起列字止北岸趙字鋪起鄭字止徐州判官分守委官協之其六南岸張字鋪起成字止北岸王字鋪起沈字止靈璧主簿分守委官協之其七南岸歲字鋪起金字止北岸韓字鋪起嚴字止睢寧主簿分守委官協之其八南岸生字鋪起果字止北岸華字鋪起竇字止邳州同知分守委官協之其九南岸珎字鋪起火字止宿遷主簿分守然離河稍逺且北岸無隄原不當衝水發之候宜令總巡直河以上至境山屬淮安同知總管直河以下通判總管然直河以下河寛水平防守為易直河以上河勢陡峻防守為難水發之候宜令協而守之其十境山赤龍潭大壩茶城大壩併縷水隄徐州管河官掌之其十一豐沛碭黄河北岸地勢卑下新縷水隄屬要害三縣典史平時則分而理有警則共守之其十二豐沛蕭碭黄河南岸地形髙仰水發出岸無憂不必堵遏盖上流少漫須臾則暴怒之性漸消東注之勢漸緩徐邳下流可無虞也須權利害重輕急緩圖之其十三淮安通濟閘外淮黄交㑹易􅌎萬歴元年建天妃閘春運五日而過四千艘出河之捷徑也新河及通濟閘可勿用之矣其十四髙寳諸湖山陽黄浦平河間伏秋浩渺無從宣洩官隄民廬苦之司河者有二十三平水閘以待而又以𤓰儀二閘通漕入扵江夫洩之者多則蓄之者薄湖水不能使之災矣黄河盛發照飛報邊情擺設塘馬上自潼闗下至宿遷每三十里為一節一日夜馳五百里其行速扵水汛凡患害急緩隄防善敗聲息消長總督者必先知之而後血脈通貫可従而理也凡黄水消長必有先幾如水先泡則方盛泡先水則將衰及占初候而知一年之長消觀始勢而知全河之髙下舊曰識水髙手者唯黄河之濵有之防河請以戰喻夫敵以秋髙跋扈出没無常防之不嚴則内地荼毒河以伏秋迅烈消長叵測守之不固則隄岸横衝然暴猛雖有其時而衰弱亦有其候防河者伏秋戰守數合以防其銳逮至秋深氣降河勢自倦不戰而屈之矣故防敵者喫𦂳止在八九十月餘月小入不足慮也防河者喫𦂳止在五六七月餘月小漲不足慮也而三月之中又止戰守數合來則厲兵躍馬去則解甲息兵是在我者執常勝之樞在彼者無必勝之勢夫黄河非持久之水也與江水異每年發不過五六次每次發不過三四日故五六月是其一鼓作氣之時也七月則再鼓而盛八月則三鼓而竭且衰矣萬一河勢虛驕銳不可當我且避其銳氣固守要害如河南之銅瓦廂山東之武家壩徐州之曲頭集布陣嚴整二守四防以待而姑以不要害之隄委而嘗之以分弱其勢以全吾要害持至水勢漸落却將所委之隄隨缺而隨補之刻期髙厚勿令後水再由漸成河身致墊舊河如此則河之攻我也有限我之守河也無窮以無窮防有限蔑不勝矣校之而索其情河事畢矣余往殺諳達扵鴈門闗外無他長也不過審盛衰之機委之持之而已矣故善委則敵易疲善持則敵易竭是我常為主彼常為客復有不可守之河不可破之敵哉故善戰者莫妙扵持尤莫妙扵委四防中風防尤宜慎之房村決風濤鼓擊不巳黄吕梁以巨舟數十障於決口風濤遽浄亦竒事然河隄千里舟不及也古有黄河風防之法如遇水漲濤擊下風隄岸則以秫秸粟藳及樹枝草蒿之𩔖束成綑把徧浮下風之岸而繫以繩隨風髙下巨浪止能排擊綑把且以柔物堅濤遇之足殺其勢隄且晏然扵内排擊弗及丁夫却扵隄外幫工此風防之要訣也綑把仍可貯為捲埽之需盖有所備而無所費云河決口之患二如上有所決下無所洩者曰隘決不必鬭水搶築俟漲落水出直塞之耳若上決而下洩者曰通決此不可少需搶築可也否則流衝勢洩恐成河身則正河流緩而􅌎矣余扵房村以搶築法施之正河即安黄河為中國患久矣神禹以來或言於三代或言扵漢唐宋時固不同或言扵秦晉或言於宋鄭徐淮地固不同今治河者動泥古說則以三代治河之法用之漢唐宋可乎又以秦晉治河之法用之宋鄭徐淮可乎特以數事拘儒牢不可破者列扵左一多穿漕渠以殺水勢此漢人之言也特可言之秦晉峽中之河耳若入河南水匯土疎大穿則全河由渠而舊河􅌎小穿則水性不趨水過則平陸耳夫水專則急分則緩河急則通緩則􅌎治正河可使分而緩之道之使淤哉今治河者第幸其合勢急如奔馬吾従而順其勢隄防之約束之範我馳驅以入扵海淤安可得停􅌎不得停則河深河深則永不溢亦不舍其下而趨其髙河乃不決故曰黄河合流國家之福也一我朝之運不賴黄河此先臣之言也盖欲黄河由禹故道而以為山東汶水三分流入徐吕二洪為可以濟運遂倡為不賴黄河之說耳夫徐吕至清河入淮五百四十里嘉靖中河身直趨河南孫家渡趙皮寨或南㑹扵淮或出小河口而二洪幾斷漕事大困則以失黄河之助也今欲不賴之而欲由禹故道則弱汶三分之水曾不足以濕徐吕二洪之沙是覆杯水扵積灰之上者也焉能盪舟二洪而下經徐邳歴宿桃河身皆廣百餘丈皆深二丈有竒汶河勺水能流若是之逺乎能濟運否乎故曰我朝之運半賴黄河也一黄河北徙國家之利此先臣之言堪輿家者流之說也不知三代以上都冀州黄河若張弓然其時大江以南多未貢賦故山東之運東而至西秦之運西而至原不藉南運也若河南徙則東運既不便而黄河之水従太行而望之勢若反而挑王氣乃㣲方今貢賦全給扵江南而又都燕據上㳺以臨南服黄河南徙則萬艘度長江穿淮揚入黄河而直達扵閘河浮衛貫白河抵扵京且王㑹萬國其便若是茍北徙則徐邳五百里之運道絶矣故曰黄河南徙國家之福也一黄河不能復禹故道必使復河南故道此近臣之議也蓋懲徐邳連歲水患激而云然耳不知徐邳之患由邳河之淤邳河之􅌎又由先年河行房村口近年曲頭集口旁流旣急而盛正流必緩而􅌎而徐邳之水患博矣然河患不在徐邳必在河南不在河南必在徐邳嘉靖以前河經河南河南大患九重拊膺百工蹙額思與河南圖一旦之命策力畢舉竟莫支吾而河南適有天幸河併行徐邳而後河南息二百年之大患居平土者僅二十餘年今若復河南之故道豈惟人力不勝即勝之是又移徐邳之患於河南而又生二洪乾涸阻運之患也第隄徐邳三百里有竒河不泛濫而徐邳之患消故河由徐邳則民稍患而運利由河南則民與運兩患之姑毋論王土王民鄰國為壑之大義也又况隄固水深即碭徐之患直河秋一季耳利害豈不章章明甚故曰河南故道不必復也一黄河清聖人生此史臣之言也彼蓋謂五百年王者興說也非河渠說也夫王者興非臣所當言而今拘儒每以黄河清為上瑞誤哉夫黄河濁者常也清者變也欲其常濁而不清彼濁者盡沙泥水急則滚沙泥晝夜不得停息而入扵海而後黄河常深常通而不決清則水澄水泥不復行不能入海徒積墊河身與岸平耳夫身與岸平河乃益弱欲衝泥沙則勢不得去欲入扵海則積滯不得疏飽悶偪迫然後擇下地一決以快其勢此豈待上智而後知哉夫河決矣餉道敗矣猶賀曰上瑞非迂則愚故河清則治河者當被髪纓冠而救之不爾憂方大耳故曰黄河清變也非常也災也非瑞也治水筌蹄明神宗萬歴三年四月甲午淮徐等處大水直隸巡按御史舒鼇議以為海口􅌎塞横絶下流故淮揚徐邳諸處頻年水害郡邑幾廢宜開草灣浚澤麻港口石䃮諸口以備淮黄之沖事下户工二部覆議命河漕及勘科諸臣議定以聞六月乙未工科都給事中侯于趙等覆議淮揚地方頻年水災惟在下流壅滯宜通草灣以分河流入海之路開魚溝老黄河以疏淮揚湧激之勢浚新洋石䃮諸口以濟興鹽墊溺之危築安東縣隄以為水趨該縣之備其開浚先後則欲先草灣石䃮而後魚溝度緩急以舒民力俱報可八月丁丑河決髙郵碭山及邵家口曹家莊韓登家等處總理都御史傅希摯議以髙郵決口當急築碭山決口當改築月隄其餘三口宜留以為洩水之路工部覆議是不得已而為權宜之術耳安能必三口之不愈決愈深而奪正河宜隨機相度近河縷隄有當修築以廣容納或上流有可分殺以減水勢皆當従長計議無得因循奉㫖是十月壬辰兵科給事中蕭彦上言治河大約言近日諸議俱在徐邳以下於上流似未之及但以運道為急不以淮泗為念宜令河道大臣帶同熟於河道司屬二三人下沿淮安上遡潼闗逐處相視孰可分其流孰可殺其勢計畫停妥貼圖立說具奏施行部覆如議十二月辛未總理河道傅希摯疏言邵家等三決口向因伏秋之際水勢盛漲堵塞不易故議權留以資分洩今秋深水耗支流少緩業築塞竣事其縷隄應否展築上源應否分殺容另勘報章下工部明神宗實録是年河従崔鎮等口北決淮水從髙家堰東決徐邳以下至淮南北漂没千里南河全考是年六月霖雨不止風霾大作河淮並漲千里共成一湖居民結筏浮箔採蘆心草根以食淮安府志明神宗萬歴四年二月壬午總理河道傅希摯言漕河相資為利乃徐淮當衆流朝宗赴海之委而一切夫料曽不足擬河南什百之一何怪年年沖決哉除借河道銀三萬兩修築外再議原設隄夫三千七百名定為長夫畫地修守仍照舊規樁朩栁梢繩草各料每年先期責辦俾知為歲額必用而留折耗折兊二項銀五萬一千五百既扵治河有濟亦免加派民間下部覆内惟折耗銀不得輕議折兊則漕臣吳桂芳已題為新設永利用餘如議癸未總督吳桂芳言淮揚二郡洪潦奔沖災民號泣所在凄然蓋濵海􅆜港歲久道堙入海止恃雲梯一徑致海擁横沙河流泛溢而鹽安髙寳不復可收拾矣國家轉運惟知急漕而不暇急民故朝廷設官亦主治河而不知治海臣請另設水利僉事一員專疏海道而以淮安管河通判改為水利同知令其審度地宜講求捷徑如草灣及老黄河俱可趨海何必專事雲梯并乞留後帮漕糧五萬石及輕齎内河工銀二萬五千四百三十餘兩以備鳩工庶淮河各得其所歸運道亦還其故下吏户二部議悉如其請乃優詔答之曰淮揚積年水患朕切隠憂奈無實心幹理之人吳桂芳素有才望所陳治河當先治海尤切事理即令悉心經畫舉行若能力踐其言事先底績當重加陞賞以酬其功乙酉陞營繕司署員外即事主事黄猷吉為河南僉事駐淮安治水三月辛丑以總理河道右副都御史潘季馴巡撫江西四月庚午漕運侍郎呉桂芳言黄河自徐邳而來至清河與淮水合流經清江浦外河東至草灣又折而西南經淮安新城外河轉入安東縣前直至雲梯闗入海近年雲梯闗海口沙壅水勢泝洄河流漸淺淮安新城外河深不過五七尺惟清江浦相對草灣地方地形低下黄河屢向沖決欲奪安東縣後迤􅆔下海以縣治攸闗屢決屢塞致近年淮黄交溢去嵗草灣迤東自決一口宜扵決口之西王家山之東開挑新口以迎埽灣之溜量長五百一十八丈四尺計土十萬四千九十一方共工銀七千二百八十餘兩糧米二千八十一石準銀一千二百四十餘兩總約銀八千五百三十餘兩其全不通河及河身窄狹之處逐段佑計通長九千七百二十三丈計用六萬八千一百五十餘兩又兩處用管工官一百九十一員口糧銀共一百五十餘兩又用水車四十部共銀八十八兩又金城至挂甲墩五港岸地勢低窪應築束水隄岸一通合用銀四千四百四十餘兩應築決口一十八處約用銀五百兩通計該銀一萬八千八百七十餘兩查截留河工輕賫折席等銀及正耗糧米共銀七萬二千四百餘兩未足九千四百餘兩應扵鹽商修河銀内支用語云救一路哭不當復計一家哭今淮揚鳯泗邳徐不啻一路矣安東自衆流滙圍以來獨文廟縣衙僅存椽瓦巳不成邑即使全河趨之亦不過一家哭耳况勢又不得不然耶創始為作事所難獨任乃人情共忌乞下所司議工部覆言委一垂陷之安東以拯全淮之胥溺漕臣言可聴報曰可辛已總督漕運侍郎吳桂芳言淮揚水患在下流海口之塞上㳺河身之髙欲浚河身先闢海口臣前開草灣入海漸有次第至扵河身之髙不過積􅌎不浚曽見前輩文集中有以混江龍浚河者其制用檀朩造軸沉水入泥隨船行走船行龍轉積泥隨起大約一回可浚積􅌎二尺日逐推淌務深三尺而止但遇桃花伏秋水發即行推浚每嵗將浚過河身丈尺年終奏報其清河以上邳徐茶城則責在河臣浚否惟命下工部言疏浚兼施治河長䇿冝令總河衙門一體推浚従之五月癸已工部言河道銀兩專備修河遂不報部致偶有奏請無憑酌議乞行河南山東各布政司并南直隸各府州盡數查出置循環二簿明開舊管新收開除實在每半年赴部遞換庶本部有籍可稽而河臣推調難施従之丙申兵部尚書劉應節以河工罷上書自劾乞休上温詔留之乙已改工部右侍郎兼右僉都御史徐栻為兵部右侍郎兼管如故提督軍務巡撫浙江栻以河工未竟上疏乞罷不允七月辛亥以草灣工成立河海淮三神廟賜名顯佑庚申工部覆御史陳功漕政五事一議溜夫黄河綿亘五六百里中間隨地轉曲牽挽最難各船有限之夫前後安能調集查徐吕二洪設有洪夫約二千名二洪今􅌎為平流洪夫多用之修築宜扵糧運經行時酌派沿河溜處隨宜調用此則宜如御史言權宜借調候糧船過盡仍歸二洪者也上然之八月乙丑工部覆直隸巡按御史舒鼇奏草灣河工告成計河身長一萬一千一百四十八丈九尺塞過大小決口二十二處募過人夫四萬四千名實用銀三萬九千六百六十兩糧四萬六千一百七十一石準銀二萬七千七百兩以二月二十日起工本年六月十二日報完因叙總督吳桂芳副使舒應龍僉事黄猷吉淮安知府邵元哲及同知劉順之通判蔡玠等并府縣各官分理功上曰海口開浚水患漸平各官功實可嘉先賞吳桂芳銀幣舒應龍以下各賞銀有差仍用心修舉功成另敘乙酉巡按直隸御史邵陛言淮徐揚自海口沙横河身􅌎墊桑田盡成湖泊錢糧逋負獨多頃開草灣河導黄淮赴海雖當大漲旋漲旋消不復停積數十年魚鼈之淵幸有平土但荒田初墾收穫為難乞將二府一州所屬州縣漕糧分别改折三年其一切起存錢糧料價亦命停徴扵三年後帶補以示寛䘏下户部覆謂河水之來漸平則剥膚之災自逺豈可預為三年之請槩冀非常之㤙惟萬歴元年二年拖欠若果係災疲勘實奏豁従之九月壬寅總理河道右僉都御史傅希摯奏報河決常家樓約三里餘又決沛縣縷水隄二處一長一百三十一丈二尺一長九十五丈七尺又豐縣決長隄二處一長五十餘丈一長六十餘丈曹縣決長隄七千餘丈約三里餘下所司十月乙亥鳯陽巡撫吳桂芳等以河決豐沛徐州睢寧四州縣居民漂溺災沴異常請發各庫倉貯積銀糧及留徐州南稅銀三千六百兩有竒備賑各項起解錢糧分别被災輕重緩征㑹山東巡撫李世達亦以金鄉魚臺單曹等縣田廬盡没請蠲漕米站銀并動庫貯官銀備賑俱下户部議可従之丙寅鳯陽巡撫吳桂芳等以宿遷縣為黄河掃嚙請遷縣治築土城以避之前基去縣不數百步不必移民而儒學亦稍俟豐盈另議户部覆言遷縣治以避水患正急則避之之權也雖時詘未暇舉嬴顧無宫牆何以羣弟子無閭閻何以保百姓政有大體寧惜小費則儒學當與縣治并興移民當與遷縣同舉查輕賫有限而撫按道府州縣紙贖尚可通融併巡鹽鍰金即數千宜無難扵取足况工作原救災之一政淮揚一帶昏墊巳極藉此以聚失業之人豈徒寓賑䘏之仁亦將弭飢寒之變扵以興教化䘏流離胥此舉矣然之十一月丁亥以黄水衝淹詔山東曹單金魚四縣徭編淺鋪閘備河夫等銀及存留永豐廣盈等倉米銀暫與蠲免其臨徳二倉小麥亦令停徴有司官仍動支倉庫賑䘏俟水落地出招撫復業量給牛種務使均沾丁酉工科都給事中劉鉉等疏議漕河語侵總漕吳桂芳大約謂草灣既開河復大漲漕臣言已不驗而八月迄今一字不報為桂芳咎扵是桂芳乃言河道通理南北此百餘年來成䂓自科臣侯于趙建白而天妃閘以南屬漕閘以北屬河道矣今歲河決者三一為曹縣縷水隄一為徐州棃林鋪一為桃源崔鎮各有司存恐難越爼至扵草灣之開祗以去春髙寳水患沖嚙淮安西橋諸市且及新城疏以洩之非謂即可制水之命使上㳺亦不復漲也今西橋新城皆為平地山陽以南諸州縣水落稻佈每斗米銀四分臣之草灣亦既效矣若以山東徐邳之漲決不報臣誠何敢報惟其決經扵臣屬之豐沛睢寧四州縣始一面踏勘一面議請賑䘏不惟臣一人言之且㑹按鹽二臣公言之祈將臣早賜罷斥以為人臣愚扵任事者之戒上以漕河原分地責成詔桂芳視事如初癸卯工部言黄淮交漲沖決太多請將天妃閘以北行傅希摯修決浚􅌎迤南行吳桂芳増備隄岸毋誤明年漕輓然之丁未巡按直隸御史邵陛言今日大政莫重漕河頃以吳桂芳督漕傅希摯總河廟堂之上旣圖其所重矣桂芳風飡水宿九閱月而草灣全通隄工半就臣親履其地見入海之口勢如奔馬即九月間淮水陡發黄河建瓴之勢適與之㑹河强淮弱不能争趨草灣入海之道而髙寳間溢冲數口大者十餘丈小僅二三丈今補築且竣矣說者致以河漲責下草灣不無沮任事之氣至扵徐吕墊髙河勢已沮不聞希摯畫一䇿以疏浚之七月以來決徐州決豐縣大者二百餘丈小亦四五十丈曹單決至一百餘丈而崔鎮之決至分正河十之二三趨諸湖下金城㑹草灣入海將來恐奪全河之流如雲梯闗故轍而顧乃諉之氣數托疾髙卧恐工拙以混吹無辨牛驥以並駕俱疲乞勉桂芳益殫任事之忠毋以憂讒畏譏隳厥績戒希摯弗曠司空之職急以疏􅌎塞決贖前愆庶乎新運可濟工部亦以為言上然其說命兩臣加意經理亟圖修築無悮新運明神宗實録行水金鑑巻二十八
