body:
  text: 行水金鑑巻三十四江南按察使傅澤洪撰河水明神宗萬歴二十年正月甲戌工科都給事中楊其休言河臣潘季馴勛茂勞乆嘔血骨立被言請告當允其歸且泗城㑹勘議既枘鑿工亦旁午老成諳練如舒應龍精心任事如吕坤二臣用一可以集事上命吏部知之二月戊申改南京兵部尚書舒應龍為工部尚書總督河道管理軍務三月庚辰南京兵部尚書舒應龍疏辭總河新命上以黄河為梗淮水積涅著即赴任㑹科臣勘議不允辭四月已亥總理河道工部尚書潘季馴奏臣領河事凡四任矣壯老於斯朝暮於斯耳聞目擊稽往驗來總之水性不可拂河防不可弛地形不可強治理不可鑿人欲棄舊以更新而臣謂故道必不可失也人欲支分以殺勢而臣謂濁流必不可分也去秋霖霪雨漲物議遂騰寜知漲必有消乎謹述人言之惑衆病河者詳解於後一謂黄水暴漲何不多濬支渠以殺之臣曰分流誠能殺勢然可行於清水耳黄水沙居其六分則勢緩沙停河不兩行自古記之藉勢行沙合之所以殺之也又議水漲暫開決口水落復塞豈曰無見但塞決難而費浩築減水石壩於桃源壩與地平水浮則洩與開決無異而水不能嚙石更無塞決之費不須另開矣亦謂舊河沙墊底髙不若别覔新河為得臣曰沙易停亦易刷即一河中溜處深緩處淺水合沙刷必無俱墊之理此淺彼深亦無妨運之事倘果底髙則冬春水落當膠舟矣全棄故道即使得地鑿河力能濶二百丈深三四丈如故河否況數年而新者亦舊豈舊淤而新不淤乎禹治水曰疏瀹決排亦第去其壅塞耳徐邳故泗沂道也禹貢導淮東㑹泗沂宋神宗時河決澶州合南清河㑹於淮南清即泗沂行之六七百年謂非黄河故道不可矣一謂禹治水以導而今治水以障臣曰逆水性以壑鄰謂之障順水性以閑其溢謂之防水漲無隄必泛溢不循軌隄者正導之以入於海也禹貢九澤既陂四海㑹同何嘗不以隄哉或疑水愈髙則隄愈増不知水雖漲亦止丈許且無旬日不消者則隄之髙不過踰丈而已一謂昔年徐吕二洪怪石浮水面湍激如雷今皆無聲得非沙掩臣曰二洪體甚髙沙能掩之是無徐州矣徐洪為主事郭昇吕洪為主事陳洪範剷石志記具存其時黄河決而二洪涸實天假以成諸臣之功也若云石平而水不能刷沙則河長幾二千里豈盡二洪激水所刷耶甚為諸臣寃耳一謂海口沙塞以致河蓄不流臣曰黄河萬里别無分洩滔滔迅溜何嘗少停大約伏秋長多消少冬春長少消多上源雨多則長雨霽則消今海口塞則消於何往耶臣委勘親閱並無淤梗一謂黄髙於徐淮髙於泗可不為之所乎臣曰自開歸以至安東地皆卑於河不獨徐泗湯遷亳仲丁遷囂亶甲遷相祖乙遷耿盤庚遷殷以避黄也豈不憚煩宋景祐中泗州張守曽築䕶城隄三丈三尺以捍淮矣河之不能使卑如是去國之臣心猶在河亦自盡其犬馬之忱而已工部言季馴乆熟河事極源委析利害言當不謬但運道民生所關宜行勘河科臣張貞觀及督河撫按舒應龍陳于陛等從公勘議以聞毋徒兩可調停以悞大計從之五月庚辰南京河南道御史陳邦科題黄淮水患隄不可恃水不可障欲除淮害須開瓦埠河以殺上流欲除黄害須多遥隄縷隄諸埠口以殺下流欲禦髙寳諸湖患須挑濬灣頭廟灣等處三工以歸之江海成大工者不惜費乞發帑銀濟用庶平成之績可奏工部言御史原官湖邑近復經行亷訪必真如挑濬修復先後科臣原有條議其開瓦埠河曽經覆勘中止而遥縷二隄多開閘口則諸臣所未及者乞行勘河科臣㑹同河漕部院確勘併覈工費以聞報可庚寅總督漕運兵部侍郎陳于陛以御史王明論其濬河共䇿具疏乞罷工部言㑹勘河工于陛與總河尚書舒應龍俱屬首事大臣以國事為急豈可因言求退負任使宜命與鹽臣虚心共濟無拘小嫌從之七月乙丑原任兵部左侍郎兼右僉都御史萬恭卒恭新建人由進士授南京吏部主事光祿太僕大理兵部左侍郎巡撫山西總理河道考滿被言回籍卒於家禮部請照遞減例與祭一壇半葬從之八月乙未以河道鉅任命改總理河道提督軍務職銜丁酉勘河給事中張貞觀題㑹總河尚書舒應龍總漕陳于陛巡按御史髙舉彭應參王明勘得淮黄同趨者惟海而淮之繇河達海者惟清口自海沙開濬無期因而河身日髙自河流倒灌無已因而清口日塞以致淮水停蓄於時泗水上浸祖陵下墊民社近且漫及髙寳興泰運隄亦苦衝決矣今據司道等議一闢清口之沙計費二萬有奇一分黄河之流計費三十四萬有奇清口有大挑之工又議常浚之後使不復淤也分黄於淮之上流先殺其勢也上流必於清口上十里去口不逺不致為運道梗即少梗而力易圖也分於上復合於下衝海之力專也合必於草灣之下恐其復衝正河為淮城患也鮑家口王家營必塞者二決横衝新河恐散溢無歸也兩岸俱隄以地勢東北下恐潰決則清沭海安之民不得即業也是役也費固煩而效亦廣若海口淺塞欲求浚治之䇿即潮汐莫窺其涯況可弛畚鍤哉惟全淮合黄東下或河身滌而漸深海口刷而漸闊亦事理所可必者工部覆議勘臣籌畫鑿鑿其工費通計三十六萬七千有奇議支兩淮餘鹽兖州東昌河道銀南京蘆課等銀不足則撫按設處本月興工限明年六月報完命如議行九月壬戌總漕侍郎陳于陛以時值倭警議將右布政司張允濟專理海防不必兼攝河務工科給事中劉𢎞寶等謂允濟昨已陞任特為河工請留今工完之奏未聞調移之章已上防河不效去而防海復不效將安去乎工部覆稱允濟河工依限完否正屬分别功罪之時似當移咨總河尚書舒應龍確議以聞詔可明神宗實錄是年河決狼旋磨臍二口䝉隂馬陵山水俱發邳宿安東悉沈釡底淮安府志是年張朝端為濟寜兵使者兼治河時有議鑿性義嶺者公相度川原謂鑿空而勞數十萬人之力損大司農金錢非便慨然建議有三當謀八可已二可患之說與總河大臣意忤杜門求去因調金衢道焦竑撰鴻臚寺卿張公墓表潘季馴字時良烏程人嘉靖二十九年進士四十四年由大理寺左少卿進右僉都御史總理河道與朱衡共開新河加右副都御史尋以憂去隆慶四年河決邳州睢寜起故官再理河道塞決口明年工竣坐驅運船入新溜漂没多為勘河給事中雒遵劾罷萬歴四年夏再起原官巡撫江西明年冬召為刑部右侍郎時河決崔鎮黄水北流清河口淤澱全淮南徙髙堰湖隄大壞淮揚髙郵寳應間皆為巨浸河漕尚書吳桂芳議復老黄河故道而總河都御史傅希摯欲塞決口束水歸漕兩人議不合㑹桂芳卒六年春命季馴以右都御史兼工部左侍郎代之季馴以故道乆湮雖濬復其深廣必不能如今河議築崔鎮以塞決口築遥隄以防潰決又淮清河濁淮弱河強河水一斗沙居其六伏秋則居其八非極湍急必至停滯當藉淮之清以刷河之濁築髙堰束淮出清口以敵河之強使二水並流則海口自濬即桂芳所開草灣亦可不復修治遂條上六事詔如議明年冬兩河工成又明年春加太子太保進工部尚書兼左副都御史季馴初至河上歴虞城夏邑商丘相度地勢黄河上流自新集經趙家圈蕭縣出徐州小浮橋極深廣自嘉靖中北徙河身旣淺遷徙不常曹單豐沛常苦昏墊上疏請復故河給事中王道成以方築崔鎮髙堰役難並舉河南撫按亦陳三難乃止遷南京兵部尚書十一年正月召改刑部季馴之再起也以張居正援居正殁家屬盡幽繫子敬修自縊死季馴言居正母逾八旬乞降特恩宥釋先是御史李植江東之輩與大臣申時行楊巍相訐季馴力右時行巍痛詆言者言者交怒植遂劾季馴黨庇居正落職為民十三年御史李棟上疏訟曰隆慶間河決崔鎮為運道梗數年以來民居既奠河水安流咸曰此潘尚書功也昔先臣宋禮治㑹通河至於今是頼陛下允督臣萬恭之請予之諡廕今季馴功不在禮下乃當身存之日使與編户齒寜不隳諸臣任事之心失朝廷報功之典哉御史董子行亦言季馴罪輕責重詔俱奪其俸其後論薦者不已十六年給事中梅國樓復薦遂起季馴右都御史總督河道自吳桂芳後河漕皆總理至是復設專官明年黄水暴漲衝入夏鎮壞田廬居民多溺死季馴復築塞之十九年冬加太子太保工部尚書兼右都御史季馴凡四奉治河命前後二十七年習知地形險易増築設防置官建閘下及朩石樁埽綜理纖悉積勞成病三疏乞休不允二十年泗州大水城中水三尺患及祖陵議者或欲開傅寜湖至六合入江或欲濬周家橋入髙寳諸湖或欲開夀州瓦埠河以分淮水上流或欲弛張福隄以洩淮口季馴謂祖陵王氣不宜輕洩而巡撫周寀陳于陛巡按髙舉謂周家橋在祖陵後百里可疏濬議不合都給事中楊其休請允季馴去歸三年卒年七十五明史稿是年總河潘季馴上隄防告成疏略云竊惟防河如防敵自古記之矣防敵則曰邉防防河則曰隄防邉防者防敵之内入也隄防者防水之外出也欲水之無出而不戒於隄是猶欲敵之無入而忘備於邊者矣且自古稱治水者莫過於禹而考之禹貢曰九澤既陂四海㑹同先臣蔡沈釋之曰九州之澤已有陂障而無決潰四海之水無不㑹同而各有所歸陂障即隄也神聖如禹而尤不免致力於隄則舍隄之外别無所以防河者矣臣於萬歴六年奉命治河即請築遥隄以防其潰築縷隄以束其流八九年間河流順軌故道晏然業有成效矣而嵗乆官更弊滋法弛以河防為末務視隄工為贅疣一簣莫加萬夫閑曠而車馬之蹂躪風雨之剝蝕河流之汕刷髙者日卑厚者日薄又何怪其東潰西決哉荷䝉我皇上授臣以總理之權責臣以修復之事臣襪線㣲才固不能别為新奇之䇿而管窺小見尤不敢為僥倖之圖惓惓以隄防陳乞謬承俞命畢力仰承督率南直隷河南山東司道等官將濱河一帶地方躬親荒度周爰諮諏舊有而今圮者則議加幇舊無而宜有者則議剏築遥隄約攔水勢取其易守也而遥隄之内復築格隄蓋慮決水順遥而下亦可成河故欲其遇格即止也縷隄拘束河流取其衝刷也而縷隄之内復築月隄蓋恐縷逼河流難免衝決故欲其遇月即止也防禦之法頗稱周備較之巳卯告成之功更為詳密而夏鎮河南山東往嵗原未經理者皆一體増建矣倘能嵗守不失則河流自無衝決之患河不衝決則故道晏然翕由順軌而運艘自無阻滯之虞矣但畚土成隄原非鐵石稍不修葺便至傾頽嵗嵗修之嵗嵗此河也世世守之世世此河也故嵗修錢糧之設徭編僱募額夫凡以為河也而可置之虚糜閑曠之地哉臣是以諄諄為申明修守之請也伏望天語叮嚀嚴諭地方司道等官查照臣愚節次題奉欽依事理每嵗務將各隄頂加髙五寸兩傍汕刷及卑薄處所一體幇厚五寸年終管河官呈報各該司道要見本隄原髙闊若干今加幇共髙闊若干司道官躬親驗覈開報總河衙門覆覈年終造冊奏繳不如式者指名叅究庶河防永固而國計民生俱有頼矣又河工易惑浮言疏云臣潦倒無知乆甘􅅵畆誤䝉我皇上拔之既棄之餘授以總理之任二三年間殫竭心力一應事體請自聖裁種種俱有成畫試有小效矣尚有一二事宜理本如此而人言必不如此工本難為而人情必欲强為若不早為勘議浮言不免蝟興全河之工未必不由此而決裂也敢敬陳之夫鎮口閘内為汶泗清流鎮口閘外為黄沁濁流平時清濁相當内水外出頗順惟黄水一發則黄强清弱倒灌入漕而河渠淤澱此理勢之必然者上源山陜以西雨少則黄水易消而内水之出速上源雨多則黄水難消而内水之出遲此又理勢之必然者自用河為運以來灌塞之患無嵗無之其年逺無巻及旋淤旋通者無論矣臣姑以嘉靖末年尚有巻簿可查者言之查得嘉靖四十一二年黄水由大小溜溝㑹漕於夾溝驛南黄漲漕淤糧艘阻滯該總河都御史王士翹行徐州領夫挑通嘉靖四十四年大小溜溝淤㫁該總河陳堯行徐州一面挑濬一面起剝前進隆慶元年黄河南徙秦溝㑹漕於梁山之北淤塞無異溜溝該總河尚書朱衡行徐州洪分司督夫挑濬隆慶二年黄河衝塞濁河改至茶城與漕交㑹茶城之稱自此始隆慶三年茶城淤閣重運該總河都御史翁大立具題要從馬家橋經地浜溝至徐州子房山下另開新河以避茶城之淤續因黄落漕通前議隨寢隆慶四年茶城填塞八里内水漫由張孤山東衝出翁大立具題就與張孤山開河本年冬本河復塞仍將茶城挑通原議隨寢隆慶五年茶城淤淺該臣先任總河行委經歴韓柏部夫常川撈濬運艘賴以無阻隆慶六年茶城淤阻該總河萬恭行司道疏濬通行萬歴元年八月茶城淤塞該工部題行總河衙門設法挑濬萬歴二年黄水倒灌淤漕三十餘里該總河傅希摯集夫挑濬前給事中吳文佳題將翁都御史原議馬家橋出子房山開河一道行傅都御史勘得子房山前蝦蟇山西俱有伏石馬家橋一帶俱係水占難以議開前議遂止萬歴三年十一月内黄水大發茶城淤塞十里調夫挑通萬歴四年茶城淤淺糧運艱阻復開張孤山東以冀此塞彼通至萬歴五年二河俱淤復開茶城正河通運萬歴六年茶城淤淺徐州道叅政游季勲築過順水丁頭壩一十六道束水衝刷萬歴七八九十等年淤塞尤甚至十一年間該中河郎中陳瑛議呈漕撫尚書凌雲翼改漕河於古洪出口即今之鎮口閘河也剏建内華古洪二閘遞互啓閉淤難深入而去黄河口僅一里挑濬甚易人頗便之萬歴十五年秋黄水大發河與閘平而棍徒段守金私受民船重賄將牛角灣掘開黄水迸入淤塞甚逺議者欲復歸徳府丁家道口故道使黄水盡出小浮橋以免濁河内灌該勘工都給事中常居敬看得閘河出口無往而不㑹黄則無往而不受淤豈從濁河則淤而出小浮橋則否耶具疏題寢請於古洪閘外添設鎮口一閘去河僅八十丈縱有沙淤挑濬尤易蓋深知清黄交接之處難免淤灌故不得已而為易濬之計良有以也今之議者不察水勢不鑒徃昔偶見淤墊議論風生如臣昏庸無足論矣向來總河諸臣豈無一人髙才朗識者乎而卒無如之何也大小溜溝淤矣改而為梁山北淤亦如之梁山北淤矣改而為茶城淤亦如之茶城淤矣改而為張孤山東淤亦如之張孤山東淤矣復改而為茶城淤亦如之茶城復淤矣改而為古洪淤亦如之勞民傷財畢竟無益所幸郎中陳洪都給事中常居敬先後剏築三閘遞互啓閉而挑濬始易計無出於此矣臣又查得萬歴十六年閏六月内該臣題為清黄交接處所濁流倒灌易淤懇乞特降綸音以嚴閘禁事要將古洪等閘每遇黄水暴發即下板以遏濁流之横黄水消落則啓板以縱泉水之出比照清江浦三閘啟閉之法刻石金書竪立各閘俾知畏忌等因題奉聖旨是各閘啓閉嚴約俱依擬有勢豪人等阻撓的照淮安閘壩事例即便拏問枷號干碍職官指名叅奏欽此倘如所題何至淤澱而王程難稽客心難挽閘上官牌力難阻遏每照常居敬原題三閘遞互啟閉之法通放船隻縱有淤淺不過八十丈旋濬旋放亦無難者至於運艘入口大約俱在孟夏以前水未大發淤亦不乆或少加撈濬之工必無阻滯舍此之外别無他䇿如謂鎮口逼近濁河故易灌塞要得别尋一道則邳州之直河離濁河二百里矣而何其淤也宿遷縣之小河口去濁河三百餘里矣而何其淤也清河縣之清口去濁河五百餘里矣全淮之力十倍於漕何以黄發即澀而每嵗初伏通濟閘外捲築輭壩以防其倒灌也要之黄强清弱随處相接則随處倒灌隨處淤塞總之不出科臣常居敬所云無徃而不㑹黄則無徃而不受淤兩言盡之矣似不必過為紛更也但人情不見其形未信其影必湏勘議以杜後言此其一矣臣又查得濱河州縣河髙扵地者在南直𨽻則有徐邳泗三州宿遷桃源清河三縣在山東則有曹單金鄉武城四縣在河南則有虞城夏邑永城三縣而河南省城則河髙於地丈餘矣惟宿遷一縣已於萬歴七年改遷山麓其餘州縣則全恃䕶城一隄以為保障各處久巳相安並無他説惟徐州則議論稍多其故有二一以山陜乆旱之後連嵗雨水頗多伏秋不免加漲觀者不考其源而惟歸罪於河固無怪其然矣一以前歲十一月間知州張世美初任未諳為義民官盧泰所愚開隄放水遂忘築塞消凌水發黄水灌入内濠侵及街衢地方官民不歸罪於知州張世美與義官盧泰而惟歸罪於河至有謂䕶隄與城平者有謂泉從地湧者夫護城石隄自昔有之非一二年間所築者則河之原髙於地可知矣且隄髙不過丈餘遂謂與城相平城何若是其卑耶徐州為邳睢上游徐州而水平隄隄平城也則迤南一帶州縣皆陸沉矣有是理哉且黄河入伏始漲秋杪漸消冬春則涸隄外露有沙灘非經年淹浸者近該徐州扵去年十一月間揭稱河水已消再過數日内水可放臣近又令人視水將及址矣今稱入冬黄水尚與隄平則伏秋又將何如耶至於隄内之水蓋因盧泰灌放頗多兼之去歲雨雪甚頻徐民不善車戽一時難於消涸若謂泉從地湧則城中之水宜乎與外河相平即䕶隄無所用之矣何待盧泰放灌之後方有水耶非臣所能觧也然臣有治河之責凡可圖維即宜曲處不必問其人言之有無也臣已行徐州道將城中窪地用土墊髙仍一面撥夫車戽復查最低之處開洩自去年九月以來向在料理不敢弛堕但為今之計惟有戽城濠之水使内水可洩固䕶城之隄使外水不入正盧泰之罪以警將來或加髙徐城數尺以防不虞此則事理之所當為而人力之所可為者也舍此惟有比照宿遷縣事例遷城而已蓋所患者惟徐城之積水於運道原無阻碍若必欲卑黄河伏秋之水以就徐城之地則天地氣候之自然恐非人力所能强遏者勞民傷財之事或從此起矣人情厭舊喜新臣言終不盡信臣在自當力諍必不依違第今衰病已劇死有日矣獨念臣從事此河已歴三朝犬馬戀主之情豈肯以將去而遂置此河於度外耶伏望敕下該部轉行該地方廵撫及各差御史㑹同總河衙門督行徐州道副使陳文燧或添委海潁二道中河夏鎭二分司逐一勘議如有别䇿使漕黄交接之處可免淤灌之患徐州城外之水可免暴漲之虞不妨從長計議如必不可當仍舊貫毋狥人情毋拘成説務求經久可行之道不為勞費無益之工則事體畫一而浮言可息矣河防一覧行水金鑑巻三十四
