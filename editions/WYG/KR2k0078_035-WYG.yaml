body:
  text: 行水金鑑巻三十五江南按察使傅澤洪撰河水萬歴二十年總河潘季馴上併勘河情疏云臣自嘉靖四十四年至今以河事君父者凡四任矣壯於斯老於斯朝於斯暮於斯或采之輿情或得之目擊或稽之已徃或騐之將來水有性拂之不可河有防弛之不可地有定形强之不可治有正理鑿之不可故厭常者毎欲棄舊以更新而臣則以為祖宗二百餘年之故道必不可失也泥成説者每欲支分以殺勢而臣則以為黄河之濁流必不可分也臣執此以治河者前後一十二年矣而不意去秋霪霖連月河水滔天物議遂騰牢不可破夫當伏秋暴漲之時兩河並髙人言無足怪也而寧知漲之必有消乎以方漲之河而律之旋消之後不可也人見其水盈及隄輙謂隄可棄也而寧知防潰則水泛外洩則中乾不數日而水落岸出河安如故固隄所以存河乎行者止見其漲而不見其消談者不聞其消而惟聞其漲一人言之百人從而和之若謂水之有漲無消而冬春之河猶然伏秋之河也不知其大有不侔者耳倘覩其漲復覩其消則全河之形勢皆在目中自無臆度之説矣臣巳去矣墓朩拱矣何敢以筆舌與人争曲直哉且議者原無怪臣之心見者言其所見聞者言其所聞凡以為國也臣器局拘攣才識短淺非兩河之故道不敢循非先哲之成規不敢蹈曽不能别輸一籌以新天下之耳目臣亦自憎其無當矣而况於人乎但慮天下之事議論多者成功或毁興作侈者工費自煩支離勝者正道必廢有宋竭天下之財力以事河而國以大敝卒之横潰決裂不可収拾者職此故耳故敢備述人言之最易惑衆最能病河者逐一詳觧於後伏望我皇上俯垂鑒照一議者謂水勢宜殺黄水暴漲何不多濬支渠以殺之乎臣曰此分合之説正所當辯也分流誠能殺勢然可行於清水之河非所行於黄河也黄河斗水沙居其六以四升之水載六升之沙非極迅溜湍急則必淤阻分則勢緩勢緩則沙停沙停則河飽飽則奪河河不兩行自古記之藉勢行沙合之者乃所以殺之也又謂水漲之時暫開決口以分其流水落復塞此言誠似有見但塞決如升天之難費亦不貲臣扵萬歴八年築有崔鎭徐昇季太三義肆減水石壩於桃源縣遥隄中壩與地平水浮則洩此與開決之説無異而水遇石止難於深刷可無奪河之虞水落歸漕壩復如故可免塞決之費此外不須另開決矣一議者謂舊河沙墊底髙不若另覔新河之為得也臣曰沙固易停亦易刷即一河之中溜處則深緩處則淺水合沙刷必無俱墊之理此淺彼深亦無妨運之事人見伏秋水髙輙歸罪於沙墊殊不知此水髙於面非沙髙於底也如使河底果為沙墊則冬春水落岸出之時舟膠不能行矣且去秋蘇松報稱水溢入城七尺湖廣報稱公安等處隄為深淵亦豈以沙墊底髙而然乎藉令因此而欲棄故道别鑿新河無論其無所也即得便宜之地而鑿之人力能使闊百丈以至二百丈深二丈以至三四丈如故河乎即使能之將置黄河於何地乎如不可置則行之數年新者舊矣河何擇於新舊舊則淤新則不淤非臣之所能觧也且禹之治水九河曰疏濟漯曰瀹汝漢曰決淮泗曰排傳者曰疏通也瀹亦疏通之意排決皆去其壅塞也蓋天地開闢之初即有百川四瀆原自朝宗於海禹但去其壅塞以復天地之故道耳凡民知識不逮神禹逺甚乃欲棄故從新乎議者又謂徐邳非黄河之故道也然獨非泗沂之故道乎禹貢所謂導淮自桐柏東㑹於泗沂即此河也志稱宋神宗十年河大決於澶州合南清河而㑹於淮南清河者即泗沂也行之六七百年是亦黄河之故道也一議者謂賈讓有云土之有川猶人之有口也治土而防其川猶之兒啼而塞其口故禹之治水以導而今之治水以障何也臣曰昔白圭逆水之性以鄰為壑是謂之障若順水之性以隄防溢則謂之防河水盛漲之時無隄則必傍溢傍溢則必汎濫而不循軌豈能以海為壑耶故隄之者欲其不溢而循軌以入於海正所以導之也考之禹貢云九澤既陂四海㑹同𫝊曰九州之澤已有陂障而無決潰四海之水無不㑹同而各有所歸則禹之導水何嘗不以隄哉議者又謂水愈髙則隄愈増不將隆隄於天乎臣則曰若謂河水有長無消耶亦豈以隄外即水耶隄外為灘灘外為河平時水不及灘隄若贅疣伏秋異常之水亦止丈許始逾灘而及隄然或三日或五日或七日或旬日即復歸落於漕隄之髙者不過踰丈何能隆之於天也至如俯闞城郭之説有目者所共覩不必辨矣一議者向謂昔年徐呂二洪怪石嶙峋上浮水面湍激之聲如雷如霆舟觸之必敗今皆無聲得非沙掩其上而然乎臣曰二洪本體甚髙沙能掩之是無徐州矣徐州洪為主事郭昇戴鼇陳穆先後剷鑿志所謂翻舟等石悉去無餘又云盤距横突隠見於波濤之間激飛湍而鳴雷霆者剗削殆盡是也呂梁洪為主事陳洪範所鑿先臣大學士徐階記中所稱獰利如劒㦸之相向虎豹獅象之相攫犬牙交而蛇蚓蟠者怪石盡去舟行如出坦途是也自諸臣鑿平之後徃來更無覆溺之患厥功甚大蓋此時偶因黄河他決二洪為涸天假之便以成諸臣之功而不知者遂謂洪為沙掩耳又有病其剷鑿之後水不潄石故不能刷沙則誤矣夫水之激石止在水面豈能刷及河底之沙且自河南至雲梯關海口幾二千里惟徐呂五十里内有此二洪縱能刷沙豈能刷及二千里耶不以諸臣為功而以為罪寃哉一議者謂雲梯關海口沙塞以致兩河停蓄不流有之乎臣曰黄河自星宿海經崑崙山萬里而來俱從雲梯關出海並無他處分洩海口果塞兩河豈有不停之理但自春徂冬自朝及暮滔滔東下迅溜湍激何嘗有一息停蓄如其停也則水當有長無消矣乃朝而長暮而消或今日長明日消消有多寡有遲速然必無長至旬日而不消者而大分則伏秋長多消少冬春長少消多上源雨多則長雨霽則消此一定而不可易者海口既塞則所消之水何徃耶臣徃歲嘗親至雲梯關閲視海口深闊人言付之一笑萬歴十九年十月臣復行府親徃海口踏勘勘得雲梯關以下自夾套至十一套面闊三五七八里及十里不等水深一丈五六尺及二三丈不等滔滔迅駛原無隘窄至云對口有横沙一段在四十里之外望之不見潮長上可行舟潮退尚深三四尺人言自來如此並無淤梗及又查得各套俱不通海等因在巻料想之語未足深聽一議者謂黄髙扵徐淮髙於泗可不為之處乎臣曰不能也非不為也自河南開歸以至淮安之安東其地皆卑於河不獨徐泗為然也如黄而可卑則湯遷於亳仲丁遷囂河亶甲遷相祖乙遷耿盤庚遷殷凡以避河也而何其不惮煩如此也淮而可卑則宋景祐三年泗州張守不必築護城隄三丈三尺以捍之矣此載在志傳中可考也如有能卑河以就地者臣當其辜何敢辭哉以上數端言若有理而聽之不覺其深信事若可從而行之必至於病河臣身雖已去國臣心猶在此河故敢不避煩𤨏而復為嘵嘵如此亦自盡其犬馬之心耳不敢必其見亮於人否也伏乞聖裁奉旨工部知道此疏已略見實錄以其芟節未當故詳載於此以上奏疏或有問於馴曰沙墊底髙之説何如馴應之曰河底甚深沙墊則髙然以論於旁決之時則可非所論於河水歸漕之後也蓋旁決則水去沙停其厎自髙歸漕則沙隨水刷自難墊厎但沙最易停亦易刷即一河之中溜頭趨處則深平緩處則淺此淺彼深總不出我範圍此挽水歸漕之䇿必不可緩而欲挽水者非塞決築隄不可也宋臣蘇軾呂梁詩云坐觀入市巷閭井吏民走盡餘王尊歲寒霜重水歸壑但見屋瓦留沙㾗則彼時黄河之水固嘗入市而河流之沙髙於屋矣自宋迄今墊而疏疏而墊者不知其幾豈可以此而遂欲棄故河哉故沙墊厎髙者乃故道難復之根而故道難復者乃别尋他道之根此説最為膏肓之疾治河者宜審之或有問於馴曰河以海為壑自海嘯之後沙塞其口以致上流遲滯必須疏濬或别尋一路另鑿海口之為得也馴應之曰海嘯之説未之前聞但縱有沙塞使兩河之水順軌東下水行沙刷海能逆之不通乎蓋上決而後下壅非下壅而後上決也馴嘗親徃海口閲視寛者十四五里最窄者五六百丈茫茫萬頃此身若浮早暮兩潮疏濬者何處駐足若欲另鑿一口不知何等人力遂能使之深廣如舊假令鑿之易矣又安保其海之不復嘯嘯之不復塞乎舊則塞新鑿者則不塞非馴之所解也或有問於馴曰河由草灣入海何如馴應之曰河由淮城北西橋地方入海此故道也嘉靖三十年間河忽衝開草灣而西橋正河遂塞連都御史塞之不得未幾自塞河復歸故道今於萬歴十六年河水仍歸草灣而故河復淤淮城之民恃以安枕矣查草灣六十里至赤晏廟復歸正河似亦無碍但正河之面三百餘丈草灣闊僅三分之一譬之咽喉狹小吞嚥不及則徐邳之水消洩未免遲滯此則可慮耳今欲挽歸正河人力亦可施者而青江浦一帶居民方恃正河之塞為安人情難於重拂而以水勢度之二三年間恐當復歸正河姑俟之可也或有問於馴曰黄淮原為二瀆今合而為一矣而自崑崙千溪萬派如涇渭沁汴諸河與山東諸泉復合之又何怪其溢也為今之計莫如多穿支河以殺其勢何如馴應之曰黄流最濁以斗計之沙居其六若至伏秋則水居其二矣以二升之水載八升之沙非極汛溜必致停滯蓋水分則勢緩勢緩則沙停沙停則河塞河不兩行自古記之支河一開正河必奪故草灣開而西橋故道遂淤崔鎭決而桃清以下遂塞崔家口決而秦溝遂為平陸近事固可鑒也問者曰禹疏九河何如馴曰九河非禹所鑿特疏之耳蓋九河乃黄河必經之地勢不能避故仍疏之而禹仍合之同為逆河入於海其意蓋可想也然則如賈讓所云多穿漕渠使民得以溉田分殺水怒可乎馴曰此法行於上源河清之處或可若蘭州以下水少沙多一灌田中禾為沙壓尚可食乎然則淮清其可分矣馴曰引淮而西其勢必與黄㑹引淮而東則與決髙堰而病淮揚無異也蓋河水經行之處未有不病民者向有欲自盱眙鑿通天長六合出𤓰埠入江者無論中亘山麓必不可開而天長六合之民非我赤子哉且所藉以敵黄而刷清口者全淮也淮若中潰清口必塞運艘將從何處經行弗之思耳或有問於馴曰治河之法凡三疏築濬是也濬者挑去其沙之謂也疏之不可奚不以濬而惟以築乎馴應之曰河厎深者六七丈淺者三四丈闊者一二里隘者一百七八十丈沙飽其中不知其幾千萬斛即以十里計之不知用夫若干萬名為工若干月日所挑之沙不知安頓何處縱使其能挑而盡也隄之不築水復旁隘則沙復停塞可勝挑乎以水刷沙如湯沃雪刷之云難挑之云易何其愚何其抝也問者曰昔人方舟之法不可行乎馴曰湍溜之中舟難維繫而如飴之流遇坎復盈何窮已耶此但可施於閘河而非所論於黄河也或有問於馴曰淮不敵黄故決髙堰避而東也今馴復合之無乃非䇿乎馴應之曰禹貢云導淮自桐柏東㑹於泗沂東入於海按泗沂即山東汶河諸水也歴徐邳至清口而與淮㑹自宋神宗十年七月黄河大決於澶州北流斷絶河遂南徙合泗沂而與淮㑹矣自神宗迄今六百餘年黄淮合流無恙乃今遂有避黄之説耶夫淮避黄而東矣而黄亦尋決崔鎭亦豈避淮而北乎蓋髙堰決而後淮水東崔鎭決而後黄水北隄決而水分非水合而隄決也問者曰兹固然矣數年以來兩河分流小潦即溢今復合之溢將奈何馴曰水分則勢緩勢緩則沙停沙停則河飽尺寸之水皆由沙面止見其髙水合則勢猛勢猛則沙刷沙刷則河深尋丈之水皆由河厎止見其卑築隄束水以水攻沙水不奔溢於兩旁則必直刷乎河厎一定之理必然之勢此合之所以愈於分也或有問於馴曰隄以遥言何也馴應之曰縷隄即近河濵束水太急怒濤湍溜必至傷隄遥隄離河頗逺或一里餘或二三里伏秋暴漲之時難保水不至隄然出岸之水必淺既逺且淺其勢必緩緩則隄自易保也或曰然則縷可棄乎馴曰縷誠不能為有無也宿遷而下原無縷隄未嘗為遥病也假令盡削縷隄伏秋黄水出岸淤留岸髙積之數年水雖漲不能出岸矣第已成之業不忍言棄而如雙溝辛安等處縷隄之内頗有民居安土重遷姑行司道官諭民五月移住遥隄九月仍歸故址從否固難强之然至危急之時彼亦不得不以遥隄為家也問者曰縷不去則兩隄相夾中間積潦之水或縷隄決入黄流何處宣泄馴曰決可入水亦可出水水落之後放水歸漕無難也縱有積澇秋冬之間特開一缺放之旋即塡補亦易易耳若無格隄處所積水順隄直下仍歸大河猶不足慮矣或有問於馴曰遥隄之築是矣而直河至古城一帶何以不築馴應之曰此地俱𨽻宿遷内有駱馬侍丘等湖湖外髙岡環繞乃天然遥隄也黄水暴漲則灌入諸湖黄水消落則諸湖之水隨之而出已經題覆如後不敢贅也問者曰桃清二縣之北亦有諸湖聨絡何以築之馴曰湖與宿同而湖外皆係窪地水從五港灌口出海故崔鎭一決而桃清遂涸此則與宿異耳問者曰止築北岸而南岸自馬厰坡而下何以不築馴曰此處岸外即係淮河勢能敵黄黄水泛濫未免灌入黄落仍歸故渠不能奪河故不築也或有問於馴曰兩隄並峙重門禦暴又何需於減水壩也與其多費以築減水之壩寧若留決之為愈乎且與支河何異也馴應之曰防之不可不周慮之不可不深異常暴漲之水則任其宣泄少殺河伯之怒則隄可保也決口虚沙水衝則深故掣全河之水以奪河壩面有石水不能汕故止減盈溢之水水落則河身如故也俱建於北岸者欲其從灌口入海也問者曰今四壩何以不洩水也無怪乎議者之欲毁也馴曰初創之時伏秋水洩喧聲若雷日久河深深則可容異常之水何嘗不洩特不常也且所謂減水壩者減其盈溢之水也不溢則已何必減為留之以待異常之水可也今將常給事勘覆原題附載一停拆三壩以保成功查得萬歴七年該總督潘經畧兩河塞決固隄慮縷隄束水太急恐有奔潰也逺創遥隄以廣容納又慮遥隄涓滴不洩恐有嚙刷也剏建滚水壩以便宣洩崔鎭徐昇季太等壩皆因地勢卑下使水易趨原以防異常之漲非以減平漕之水也數年以來束水歸漕河身漸深水不盈壩隄不被衝此正河道之利也議者欲將三壩拆落用心良苦職量得崔鎭壩石頂去地僅二尺八寸視遥隄低七尺徐昇壩石頂去地僅二尺五寸視遥隄低七尺三寸季太壩石頂去地僅二尺視遥隄低八尺三壩臨水河岸離水面各八九尺一丈不等較之三壩各髙三四尺不等是河岸甚髙石壩原低每遇伏秋水髙於岸即從各壩滚出其不得出壩者乃不得出岸者也欲分水勢壩可拆矣一帶河岸可盡削耶據鄉民畢九臯馮吉趙倫等訴稱壩外水鄉漸成膏腴逃徙之民近方歸業若欲將壩改拆二層是為無壩先年河從此決又可虞矣酌之事勢仍舊為便已經工部覆奉欽依以上河議辨惑淮南險要清江浦内外河相隔僅得一線之地最為喫𦂳况黄河自清河縣出口由西射東勢甚湍急然埽灣迎溜之處不過一百五十丈止是捲築鷄觜六道每道相去二三十丈不等阻隔來流復於鷄觜中間捲埽䕶岸即可支持然倉卒措辦未免張皇莫若於冬春之間捲築大埽幇䕶老隄埽外深下密椿内用兩笆兩蓆以䕶埽亦如歲防髙堰之法自可無虞瀆清河而下黄淮二賣交疏注海越五十里一大折於淮郡之西橋又三十餘里一大折於徐家壩其衝激怒號之勢無異西橋前此治者屢壩屢壞為與水争尺寸耳今議棄舊址只營月壩去水稍逺令無湍激外護樁埽用實壩基事省功倍良得䇿也每歲派撥官夫預備物料伏秋將届專責山陽令督管河主簿不時廵視少有圮壞輒先綜理年復如斯斯永頼也自清江浦起由栁浦灣至髙嶺止共隄一萬六千九十一丈近又加至戴百戸營止共隄八千一百五十六丈向來置之若棄萬歴十三年范家口一決淮城幾為魚鼈工費不貲復還故物今已増設大使一員夫五百名專守一帶隄岸乃淮安城北外捍殊為喫𦂳如有汕刷隨宜修補倘遇大有損動即於隄内有産之家量起夫役相幇修築伏秋之時選撥省祭陰醫等官畫地分守仍須預備樁草繩葦之𩔖各安置要害處所以待不時之需每歲冬春之交即預行申飭山陽縣掌印官可也目今河由草灣正河俱淤殊不足慮然河性不常一旦忽歸正道修守之法仍須志之以上河防險要淮北險要碭山縣舊縷隄原因傍隄取土以致隄根成河每上流劉霄等口漫溢則直灌隄河壅激衝撞縷隄坐此不支今棄此隄於不用而另幇近年所築月隄巳為得䇿又慮縷隄決則月隄亦危且碭山居豐沛上游碭隄乃豐沛外户外戸失守則堂奥隨之故復彷黄河順水壩之意於單碭接界處築斜長大壩一道長千餘丈使上流漫溢之水循壩徑歸大河不得廹縷隄以危月隄試有成效宜加意此壩冬春撥夫幇培伏秋倍夫防守此保全碭豐沛一帶隄防關鍵也豐縣邵家大壩乃斷絶秦溝舊路最為喫𦂳今已倍幇髙厚又接長數百丈每歲宜摘調徐北隄夫赴此加修加守若日後夫役錢糧有餘再於華山斜築大壩直至樓子集將秦溝濁河二口俱斷則全勝之䇿也但壩須髙大斜向東南勿令兜水乃可經乆姑識之以竢將來徐州東岸南去十餘里有狼矢溝又東十五里許有磨臍溝每歲黄水暴漲則從狼矢溝直下至磨臍溝洩出赤龍潭經蟃蛤諸湖駱馬湖出宿遷董陳二溝嘉靖年間全河俱從此出而兩洪正河俱為之奪萬歴七年已於本溝築遥隄一道而地形甚卑水入囊厎隨復衝決遂議築減水石壩一座余郎中親徃視之不可而止今此議尚存馴躬率中河沈郎中徃視之地形較之河口卑數丈黄河暴漲之時必至逾隄漫流豈肯循軌入壩徐州之房村牛市口棃林鋪李家井靈璧之雙溝曲頭集栲栳灣睢寧之馬家淺王家口白浪淺何字鋪邳州之匙頭灣張林鋪沙坊等處皆係埽灣急溜先年屢經衝決最為要害今雙溝一帶已議棄縷守遥矣其餘每歲冬春間務及時詳加勘議應䕶埽者急䕶應築磯觜壩者急築若水既發則難施工矣水發之後尤須倍嚴防守司道府官俱當不時廵閲矧濵河田地每利於黄河出岸淤塡肥美奸民徃徃盗決蓋勢既埽溜止須掘一蟻穴而數十丈立潰矣凡此等處夜防尤不可懈識之慎之雙溝棄縷守遥固為得䇿但恐漲水直至峰山未免分流今於邳州對河羊山龜山土山相接處創築横隄長四百八十丈縱有順隄之水遇格即返仍歸正漕自無奪河之患此隄雖係睢寧縣地方然去邳州不逺專責該府掌印管河官時加督閲培築之工勿怠勿忽防禦之法格隄甚妙格即横也蓋縷隄既不可恃萬一決縷而入横流遇格而止可免泛濫水退本格之水仍復歸漕淤溜地髙最為便益今於南岸房村單家口雙溝馬家淺新安峰山等處俱築格隄一道併羊山横隄共七道倘歲歲増修髙厚可永無分流奪河之患矣俟工力有暇再為増築北岸亦倣而行之多多益善也歸仁集隄所以捍禦黄水睢水湖水使不得南射泗州并攻髙堰而又遏睢水湖水使之併入黄河益助衝刷關係最為重大每歲三月間即當撥洪夫二百餘名協同本隄夫併力修䕶隄下宜密栽茭栁以搪風浪其水浸隄根稍深處即預下護埽一二層椿笆欹朽者務逐一掘換塡築内四鋪以至九鋪尤為危險工宜倍之每歲冬春宜多運樁􅐨繩草分貯各鋪其管河主簿督令專駐本隄以便督率然其槖籥則又在小河口之通塞蓋小河通則睢水徑入黄河而歸仁之水減半其藩籬則又在耿車時兒灘一帶之隄蓋此隄髙厚堅固則睢水不能漫入埠子等湖而小河常通矣故上自髙阜下至時灘皆當接築長隄歲加修守且密栽茭葦等以䕶之蓋修守此隄即所以修守歸仁也况小河常通則靈睢宿遷積水得泄而沮洳漸成膏腴舟行徑直免犯湖險而小民便於販易為地方利又非淺鮮也司河者宜加意促成之桃源縣地方有馬厰披横隄長七百四十六丈蓋慮黄水大漲則從此入淮而淮為之淤淮水大漲則從此洩出而清口流弱故特築横隄一道以遏之使黄不得入淮不得出最為𦂳關宜慎修之遥縷夾中居民及濵河居民俱當諭以移居髙阜處所或即結廬於遥隄之上蓋黄河伏秋盛漲之時縷隄逼水必難恃以為安若水至而後避則無及矣此亦徙民當水衝者之遺意也即小民安土重遷亦須諭以四月暫移至九月復還故址每歳春杪司道即嚴行各州縣家諭而戸曉之乆之而民知遥隄之外皆樂土自有不待驅廹而相率移居者矣以上河防險要河防一覽行水金鑑卷三十五
