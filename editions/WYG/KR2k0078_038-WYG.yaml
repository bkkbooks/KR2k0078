body:
  text: 行水金鑑巻三十八江南按察使傅澤洪撰河水萬歴二十三年九月二十四日工部題為𨗳淮分黄議論未一仰乞聖裁速決大計亟責成功事工科都給事中林熙春等題稱臣等辦事該科於本月初五日接得總漕戸部尚書禇鈇一本為直言災民艱苦之狀河工緩急之宜懇乞聖明酌議以祛祖陵積患以消地方隠憂事奉㫖工部知道又於本月初九日接得總河工部尚書楊一魁勘河禮科左給事中張企程各一本為祖陵水患日深國脈關係匪細懇祈聖明鑒照亟敕當事臣工早決治水長䇿以圖保安大計事俱奉㫖該部知道又於本月十一日接得四川道監察御史牛應元一本為河工㑹勘平成有期當事諸臣意見稍異敬陳致一之畫以決萬全之效事奉㫖工部知道臣等竊惟天下有大興作亦有大議論使議論而合也人得持定見而奏膚功議論而不合也人將憚異謀而隳成績今讀漕臣之疏則謂時有重歉𨗳淮宜先矣讀河臣之疏則謂患有相因而分黄宜急矣讀臺臣之疏則謂分黄導淮折衷宜慎矣大都誼切奉公何嫌彼此心在為國焉問異同惟是旁觀者身在委任之外而持議也易當局者身在付託之中而任事也難臣等請以淮河關係及疏濬稗議為皇上陳之河自崑崙歴數千餘里而至徐邳淮自桐柏挾七十二溪而至泗眙而祖陵王氣屹然中峙蓋聖子神孫億萬年鍾祥矣漢唐若宋都秦都汴歳漕粟不過數十萬三十萬二十萬石而巳國家定鼎北平非四百萬石無以恃命亦非浮江絶淮挽河越濟無以通達京師矣且邊陲半倚鹺餉亡論六十萬金場竈星布淮揚即林林總總之生齒髙寳興鹽通泰等處者亦不可勝算矣以故我朝經理漕河之臣最稱隆重其經理漕河之費亦最稱毁繁而不虞其今日之昏墊至是也為今之計倘亦一併分黄乎則珠米桂薪之地何堪大興九死一生之民何當重役萬一外變激發禍不在祖陵而且在地方此漕臣之所以有酌議之請也倘亦一意𨗳淮乎則淮勢既分强河不無倒灌河勢益振弱淮豈能相容萬一祖陵再淪禍不止運道而且移郡邑此河臣之所以有並舉之請也臣等私心以為天下事當論利害亦當論利害之重輕蓋利害在人者人猶得而握其權利害在天者人不得而操其柄則治人治地之别也治人無法則有河工亂無河工亦亂治地有法則無災不亂即災亦不亂顧其機則又在人而不在天耳今河臣楊一魁業已奉有重託科臣張企程業已奉有特遣上流分黄一併勘議具奏業巳奉有明㫖是淮河大役悉以付河臣矣在河臣之疏一則曰效有可必一則曰利亦甚多是淮河大役亦悉以身肩之矣河臣既以身肩淮河則據其原疏所請亦不過六十八萬金而止也國家雖甚稱詘措處亦可茍完倘此時猶泄泄未決恐日甚一日如根本重地何獨不可及今責成令其得以便宜從事乎如其只𨗳淮而可也則周家橋武家墩髙良澗金家灣芒稻河子嬰溝涇河之一一疏洩也惟河臣如其必分黄而可也則黄家壩毛家溝漁溝五港口之一一疏洩及娘子莊鮑王口之當有待也亦惟河臣如其𨗳淮分黄即折衷而可也則金家灣芒稻河之當從省黄家壩之當略濬鮑王口之當盡挑髙良澗之當建閘淮安城北之當益廣也亦惟河臣大率以數十萬兩而聴其設施以數萬餘衆而任其調度自是而某處當増也不得為虚冒自是而某處當減也不得為刻削務求一勞永逸無負朝廷任使乃為快耳不然而糜費金錢粉飾功績臣等且以白簡從之矣惟是勞民動衆容有意外他虞臣等所以處之者則諸臣疏中猶未及焉永樂中宋禮原武之役發丁夫十有六萬而無怨言者以蠲租百十萬石也景泰中徐有貞張秋之役發丁夫五萬八千而無怨言者以蠲瀕河民牧馬庸也况今大祲何妨破格是蠲免不可不議也董率官員惟亷生威惟能集事倘得正官解印専理庶為上䇿即不可得就擇佐領懸以旌書而省義原非受祿果効有勤勞省祭咨吏部超選義民亦給扁冠帶有差是勸賚不可不議也海口郎中樊兆程曽有河防末議謂十六年開裏河丈報二錢其實未給毫末十六年開魁山日報四分其實只給一半合無僉派之夫仍就丁免差召募之夫只就工算值其工食毋經胥吏牌長有司不妨煩瑣逐名包封唱名給散是禁尅不可不議也聚衆數萬豈盡一心謂宜定以界限編以字號以一約十以十約百庶免諠譁亦杜强竊是紀律不可不議也誠如是則興作之中即沾帝賑災罷之衆豈惮子來將見應協神人靈效山岳即書所稱地平天成何以加焉伏乞敕下該部覆議速行河道諸臣分猷共念刻期舉行至於犒工之惠恩出自天并乞俯允河臣之請以鼓億姓之心臣等無任悚息待命之至奉㫖工部知道先該四川道監察御史牛應元題為河工㑹勘平成有期當事諸臣意見稍異敬陳致一之畫以決萬全之效事頃臣巡按江北目擊祖陵水患於是繪圖為說及條陳疏𨗳方略上聞荷䝉聖明嘉納特遣科臣張企程㑹勘節據本官同總河工部尚書楊一魁奏報疏洩要宜及陵園水消尺寸不獨聖心喜慰滿朝臣工莫不快稱二十年醖釀之患從此可以解除且冀旦夕確有成畫速奏厎績也不謂近接邸報該巡按御史崔邦亮題請治河臺臣期臻實效等因聞者莫不訝異臣以邦亮素有才名豈詎孟浪多事若此近又接總漕戸部尚書禇鈇揭帖為直陳災民艱苦之狀河工緩急之宜懇乞聖明酌議以祛祖陵積患以消地方隠憂事大都謂地方災傷九死一生之民不能供極大難成之役欲先將髙良澗建壩及周家橋金家灣芒稻河子嬰溝涇河等處各亟議疏通以為目前𨗳淮之計可以計日成功而黄家壩分黄之役工力重大姑在所緩等因則其意似與楊一魁張企程奏稱已勘定自黄家壩為分黄之計者若少相左然後知邦亮之疏蓋有激乎其言之也今照添差非宜業經科臣林熙春等建白該部具覆無容别議惟是事在為公何嫌異同而斟酌萬全總歸一致則諸臣之見正所以相濟而非所以相左也臣嘗躬歴其地體察頗真敢忘固陋再以諸臣之見折衷論之蓋治水猶治病然病有的證善醫者對證投劑而尤分君臣佐使以為緩急先後則其術周詳穏妥而病無不治矣若持一偏之見舉一而廢一昧標本之宜百藥而難試豈所以語國手也哉臣請先言黄淮的證而後及今日治病之方則標本當分而功難偏廢也夫黄淮的證何在乎初因草灣之開宣洩不利遂致黄流上壅繼因黄流之壅遇漲逼阻遂致淮流下決尋因淮流下決清口空隙黄水乗而上演遂致有門限沙之墊至於沙墊隄防淮壅而潰為患遂滋甚矣此則千百年主受之海口向未告阻數百年交㑹之黄淮向未告逆而獨二十年來醖釀之患所由致也謂非黄淮之的證歟的證在此今誠欲為治標之圖則如督臣言𨗳淮南下曲防大破諸潰俱洩其勢誠便而其工誠甚易者但旁溢之積浮可期盡祛而岸内之正流終難倒行若清口之壅如故則病根固自在也豈完計乎此河臣之不敢専力於彼者良非無見巳誠欲為治本之圖則如河臣言分黄他避淮流無侵百病盡郤其功誠大而其利誠甚逺者但水勢之通塞難盡預定而交㑹之風脈不可有妨若歳月之效莫必則受病殆無巳也豈急務乎此督臣之不欲首議乎此者良非無見已督臣有見則司道偏主分黄而將髙良澗通不議估者非也其必周家橋雖云衝開而伏落以後之淺阻仍加疏濬可也武家墩雖已開放而涇河子嬰溝之下流仍加挑闢可也至若髙良澗之建壩讓水猶或有限曷若抽厎建閘所洩更屬無滯乎如是則出口儘多自可以助清口宣洩之所不及而淮流泛溢之病將無不除矣其金灣芒稻二河既稱洩水甚快則再闊十丈之工姑從省焉可也少竢前工報完再看水勢緩急而為之圖可也無巳先將三閘中間隔砌拆去令其全口廣利常常通流亦可也何者水一落岸即旁堰諸洩口終歸涸斷又何必過需逺際之河道虚令空闊為乎則節其財力以充正項急用似為計之得耳是則以河臣之見酌行督臣之䇿乃所以相濟而非以相左矣河臣有見則司道専主𨗳淮而於五港等工槩不之急者亦非也其必清口沙雖云見闢而伏落水厎之板泥期於盡挑之可也鮑王口雖已衝決而運河五港之下流期於盡疏之可也至若淮安城北之故道商民向願疏通以便船貨徃來曷若量與准行益廣分流乎如是則下流迅利自可以助草灣宣洩之所不及而黄流逼阻之病將無不除矣其黄家壩分黄工力既稱浩大即小估四十餘萬之費姑從省焉可矣稍竢前工報完再看水勢緩急而為之圖可也無已先順決口以下凡有淺阻去處略加疏濬拆去入口原壩或更置稍寛使水漲則分洩以殺清口强逼之勢水落則順流以保清口交㑹之脈兩利而俱存之亦可也何者清口一通則黄淮相附而行原自順軌又何必過為上流之强挽虚糜金錢為乎則節其財力以充正項急用似為計之得耳是則以督臣之見酌行河臣之䇿亦所以相濟而非以相左矣蓋良醫治病期於病除斯已故不可使方外有餘證亦不可使證外有餘方臣愚所謂標本宜分而功難偏廢者此也其財力之省而易就無竢言也伏祈敕下該部行令㑹勘諸臣再加采擇施行未必非合異為同終奏厎績之一助矣他如黄堌口之果否可無節制小河口之果否可無開通歸仁隄之果否可恃永頼誠恐早不為所萬一涓涓不塞流成江河他日引全黄而南徙不但地方淪溺可虞而關係祖陵利害尤不啻淮溢之患止於漫衍浸漬巳也此臣業已備陳曩者原題疏中而部覆未之及者伏乞天語并加叮嚀申飭當事臣工通一勘議漸次修舉則尤萬全無弊之術也縁臣犬馬愚悃欲始終少禆大計兼恐諸臣意見稍持亦不無耽延誤事之憂故敢不厭喋喋徒避馮婦之誚乃爾統惟聖明鑒照臣不勝瞻仰屏營之至奉㫖工部知道通抄到部送司案呈該部看得今日治河要務不越𨗳淮分黄二者而已故督臣禇鈇之欲先𨗳淮者謂時詘難以舉嬴也河臣楊一魁之欲併分黄者謂一勞可以永逸也已經本部覆請舉行無容别議外兹臺臣牛應元之條陳則又折衷二臣之疏總為一致之論謂如督臣之欲先𨗳淮當酌以河臣之見濟其所不及如河臣之欲併分黄當叅以督臣之議助其所不逮庶彼此相濟而績用可成然又為祖陵萬年慮也則謂黄堌口之決當制小河口之淤當挑與夫歸仁隄之恃頼當培蓋臺臣原歴地方得於聞見之真故其所以酌量區畫者若此其深且逺也而科臣林熙春等之具奏則又權衡臺臣之論而専重於責成謂或先治標以洩淮壅或併治本以殺黄勢責在河臣或髙良之當建閘或金家灣等處之當從省或鮑王等處之當盡闢亦責在河臣庶責任既専而功效易就然又為勞民動衆計也謂宜急蠲免以恤災民厚勸賚以鼓衆志禁侵尅以恵夫役嚴紀律以肅人心蓋科臣看閱奏章得於叅考之詳故其所以決筴定謀者若此其周且悉也總而論之大要誼切為國而非所以為私志期相成而非所以相戾其為今日河工之禆益也豈淺𣺌哉恭候命下備行河道諸臣將二臣所奏各項事宜遵照逐一舉行惟黄堌口等處應否處置再加勘議俟工費稍有餘剰次第修舉其蠲免一節再俟撫按衙門酌議具奏定奪縁係𨗳淮分黄議論未一仰乞聖裁速決大計亟責成功謹題請㫖奉㫖是題覆河工奏議明神宗萬歴二十四年正月甲申工部覆工科都給事中林熙春題河工疏竊念𨗳淮分黄兩役並舉至為重鉅而分黄之工比之𨗳淮分數尤多在事諸臣矢心協力業有成效但今漕船過淮在邇淮鳳播種届期春夏雨水多少尤難預度若不趁此春和刻期儹完將來國計民力何能兼濟科臣林熙春題議及此誠為有見乞敕各官將𨗳淮分黄一應工程各照分管地方責令夫役晝夜兼工依期完報若有怠玩悞事許該督與勘河科臣指實叅奏庶祖陵永安河患永弭而運道農時兩無妨碍矣詔如議行辛卯工部覆工科都給事中林熙春題河工乗時報完等事上命便行與管河各官嚴督工程毋致延緩二月甲子直𨽻巡按况上進題河工已無遺䇿運道切有後艱宜將不急之工停止一面竭力分黄一靣併力清口庶分𨗳諸務方收實效部覆如議工部題秋冬河防已竣經管各官羅大奎等十一員髙郵等州知州等官許一誠等五十三員嘉奬髙郵等州判官等官施奉等五十五員優奬徐州等州同知等官丁偕等四十四員量奬睢州等州判官等官都鍾等十二員戒飭斥逐提問從之三月丙申工部覆御史蔣春芳題分黄𨗳淮之說真是石畫第分黄即所以𨗳淮而分黄之工未就則清河口之闢沙髙良澗武家墩之建閘周家橋之疏河撫臣之議亦確乎其不可易者蓋所以避時下泛漲之水紓祖陵眉睫之急也若分黄大工就緒門限淤沙盡闢祖陵無恙黄淮順軌則此數處不妨堵塞使淮水専由清口而出亦無不可今二瀆春流無恙各工漸次厎績乃喜事異論叢爾多口泥堪輿者曰分黄之工遂成則淮黄不交有傷王氣拘區見者曰髙堰不拆則淮流泛濫終淹祖陵不知武家墩髙良澗周家橋即所稱髙家堰也髙良澗其中而武家墩周家橋其首尾也開此三處即拆髙家堰矣必如何方謂之拆也而堪輿之說尤無根據蓋二流之合始於武廟初年祖陵之葬肇於勝國末造我國家熙運過卜原不係此况分黄工程毋論淮黄依合且有重添一合襟者而論者特未之思耳信如彼拆堰之說水直南射與黄風馬牛不相及合襟安在風氣安在信口而談其於國事若秦越人之視肥瘠不足聴也徒使當事者聞之囂然灰其任事之心唯是分黄與闢清口沙為第一要務但徃者黄流未分一時積淮宣洩未及故不得不開周家橋武家墩等處以洩泛漲之水權為急救祖陵之計若髙家堰之不當拆則固無容議者乞禁浮言庶便責成議論既定而膚功可奏疏入從之四月甲辰戸部覆總督禇鈇奏摘陳𦂳要河工上曰河工重大夫役待哺錢糧不敷準借與鹽銀五萬兩令工部作速補還仍截留漕米六十萬石濟用八月辛丑禮科左給事中張企程題祖陵防患宜固河流分洩當亟乞將前勘應開下流諸工俟秋冬農隙集夫興舉其一應開洩入海白駒塲等處河道都俟再勘不妨暫停以省勞費章下工部壬寅工部題覆總督河道工部尚書楊一魁條議分黄𨗳淮事宜十事一議展河岸以固隄防蓋舊河身闊二百餘丈尚有縷隄遙隄以束之而新河靣窄土鬆伏秋之防不可不慮宜於新渠中堅處所再闢二十丈以廣容納兩岸傚遙隄之制另築厚隄一道以固衝擊其王家口周莊為運道經由之地令加浚鑿并築堅隄以便牽輓工期三載費約八萬於大工餘剰數内支用一議長夫以時修守蓋黄壩至五港口約三百餘里河隄始創勢易潰決議設夫一千七百名以待修救之用而州縣之加派果難乃於鎮口閘原設夫内裒四百名并髙家堰隄夫八百名盡調新河防守於山陽長夫裒撥髙堰清江浦諸處分守又以折鹽引銀歳募五百名責令遇有淺阻亟為挑浚則夫不増而用足一議設専官以便責成蓋修浚雖以夫役而督率要在専官其娘子莊以下應以府同知張兆元専為督察仍管清軍馬政而以總捕巡鹽二事改委通判其舊用巡檢者改設主簿二員各有信地則管理可以無虞一議裁新隄以免壅淮一議修祖陵以培國脈一議立河官以理淮泗俱入淮河一議設官兵以嚴稽察蓋五港口淮口地界四鄰河海既通奸兇出没應添設五港巡檢司安東縣提調官吏弓兵俸糧於鹽課募夫數内動支専司稽察一議放湖水以疏漕渠入運河一議建廟宇以答靈貺蓋河之有神所從來矣而自建功以至竣役河伯效順酬報宜隆除坌廟及五港口立廟外議於黄壩周莊處所各建廟祀請賜廟額以示崇報一議備錢糧以儲歳用蓋守救之官既立則物料亦宜并儲宜於𤓰洲通濟鎮口諸閘如儀真事例量取船稅以濟河工之用一議闢清口以𨗳淮流一議浚海口以免内漲俱入淮河疏上如議行九月戊戌工部奏河工告成宜加叙錄以酬積勩如楊一魁禇鈇李戴沈思孝徐作吕鳴珂張天秩樂元聲張企程蔣春芳楊俊民荆州玉張允濟楊光訓等及有司官共效贊襄俱應分别陞錄廕叙即一手一足槩當酬賚以竣通漕護陵分黄𨗳淮之績甲辰總督漕運禇鈇奏再議分𨗳未盡事宜條陳塞黄堌口等事章下工部十月丙寅工部覆直𨽻監察御史蔣春芳題河工告成善後事宜條為一十六款乞敕河漕部院等官遵照施行一築邊隄以障潰決一砌新河以禦衝刷一裁張福隄以縱淮流一歳浚清口以防壅塞一疏籍家河以分横流一闢五港口以助宣洩一建減水壩以分暴漲一積物料以濟緩急一設鋪舍以處夫區一議修閘以杜陵害一復淺船以疏河身一填泗城以護陵寢一治溝渠以興水利一塞黄堌口以防河徙一固王公隄以保漕渠一専責成以臻實效其說與漕臣合部覆如議議詳見後而後復有㑹勘之議工科署科事刑科給事中李應䇿奏河漕意見稍分乞敕協謀以急國患事部議黄堌口之決而南也在肅碭睢宿則病於淹没在徐州至宿遷三百三十餘里運道頗艱故漕臣禇鈇謂黄堌旁淺太多徐邳之河幾奪以塞黄堌口為一義河臣楊一魁謂決口至一千二百餘丈深三丈兩岸浮沙堅築固難措手雖下楗捲築猶之無益河性趨下勢不可回况徃年全河盡注徐邳下流壅塞鎮口張秋每患灌淤今年黄堌分流暴漲得洩既於鎮口有補又於運道無傷唯當於水澀地靣築草壩制朩閘引諸湖之水以濟目前浚小河口増築邊隄通睢宿一路之墊護鳳泗萬年之脈蓋漕臣主運河臣主工各自為見而方經賞賚之餘遽為異同之見故不得不再行析議者也丁卯河道尚書楊一魁漕運總督禇鈇各奏辭廕上以治河厎績加恩巳有成命不允所辭辛未吏題河工諸臣楊一魁禇鈇徐作等各陞敘廕錄如工部議報可乙亥工部題漕河黄堌口應塞應止公同㑹勘十一月巳亥吏部題原任郎中黄承𤣥駐劄徐睢兼管吕梁洪徐州洪事務報可已未工部覆總督禇鈇黄堌口速行疏浚報可十二月巳巳工科給事中楊應文奏勉留漕臣禇鈇與河臣楊一魁同心協理章下工部丁丑河道尚書楊一魁奏酌復漕河舊制謂黄堌口一股由虞城夏邑接碭山蕭縣宿州至宿遷出白洋河一小股分蕭縣兩河口出徐州小浮橋相去不滿四十里且係先年河經故道所當疏浚與正河㑹接濟運道夫役之用集山東河南徐邳徭夫二萬限止兩月更於鎮口閘以裏諸湖之水通放與小浮橋二水㑹則黄堌口不必塞而運道益無阻滯之患部覆如議行明神宗實錄是年黄堌口決經年寸草不生睢寧縣志按黄堌口地屬山東單縣𦂳接河南虞城界由夏邑永城及南直隸蕭碭宿睢地方至小河口白洋河復入運河此口南射歸仁集石隄關係祖陵最稱要害本口初決時闊一千二百五十丈深二丈七八尺萬歴二十五年間復勘止闊六百餘丈内有沙渚二水中分各闊四五十丈經虞城孔家樓接碭山縣劉家集至王家橋九十餘里俱有河形口闊三百餘丈水深七八尺自王家橋至狐父橋十里係黄河故道口闊一百餘丈水深一丈四尺自狐父橋至蕭縣界三十里有大河形口闊一百三十餘丈水深二丈二三尺自蕭縣界起入盤岔河至兩河口七十三里亦有河形口闊一百二三十丈水深一丈五六尺自兩河口由山西坡瓦子口入永堌湖至宿州地方徐溪口七十餘里俱坡水散漫深七八尺自徐溪口至符離橋時村一百一十里闊六十餘丈深一丈七八尺自時村由靈璧縣地方孟山睢寧縣地方廟灣口宿遷縣地方耿車至小河口俱三十里小河口迤南有白鹿湖邸家湖二湖雖係瀦水湖靣闊逺一遇北風則怒濤奔逸勢必南侵慮為祖陵之患近自歸仁集起至孫家灣特築遙隄一道捍禦之名曰歸仁隄計長七千六百八十二丈八尺况今黄堌決口之水復經其下則其關係於祖陵也更甚而其防範於先事也宜周當事者須急堵黄堌口俾黄水盡入徐邳正河以濟運道仍堅守歸仁隄使横流不致衝突盱泗以保祖陵此正今日第一要務特表而出之以告後之任斯責者張兆元黄堌口歸仁隄考行水金鑑巻三十八
