body:
  text: 行水金鑑巻三十九江南按察使傅澤洪撰河水萬歴二十四年正月日勘議河道禮科左給事中張企程題為河工大興浮言當杜以為黄在今日之不得不分也以其壅淮為害也分黄之必於黄家壩也以其決口迎溜既有為下之勢更以其去清口稍逺非若腰鋪地方逼近淮水為可慮也分而必合於周復莊也以鮑王決口原自滔滔東下由周復莊經陳溪五港等處入海也此為淮黄交㑹乎不交㑹乎此為二水合襟乎不合襟乎且名曰分之實以疏之而已若至全奪則益永利而未能取必也臣前疏所謂重重合襟者也即淮之大勢由雲梯關入海黄可奪之由灌口入海雲梯與灌口俱在安東地方相去止三十餘里耳同歸東海又何嘗不㑹耶且清口淮黄交㑹之說原無的據淮黄之或分或合原無定在臣備查大明㑹典並未載有黄㑹清口之文但云至河南始散漫浮溢至山東勢益峻急計其所決之處或由中牟至潁州東入於淮或由亳州渦河㑹於淮或至泗州㑹淮入海此班班可考者萬歴六年間該淮揚巡按御史邵陛疏云正徳以前黄河從開封以上分為四股㑹淮同行循潁亳夀鳳下清河入海邇年上流盡塞全出徐州獨行千有餘里至清河始與淮㑹夫曰同行下清河亦非至清口始㑹也又查得淮安府舊志乃正徳十二年間纂修者内載諸水止云淮泗環帶於西北湖海設險於東南並未載有黄河也其志清河縣亦止云大清河由治東北入於淮小清河由治東南入淮亦並未載有黄由清河合淮也據土人云正徳以前黄由老黄河故道入海縁武宗皇帝南幸挽水行舟黄始逹於清口繇此言之黄淮之不合於清口也其來乆矣臣今分黄之路尚循老黄河故道舊河形迹强半尚存夫前之分流既無所妨則今之分黄亦何必盡泥况皇家大風水非士庶家丘壑可比黄不東南而東北總為還遶同入東海即為㑹合豈在區區一清口哉清口交㑹乃近年事壅塞者創為水㑹天心之說以聳人聽也不國計民生是重而牽泥於形家幻妄之譚不㑹典郡志是考而唼􅊱於人子須知一書何為者哉且彼議者論黄水則欲其由清口以合淮至論淮水則又欲其舍清口而南洩瑣詞屑語盛稱髙堰可開開之而足以了河上事言何背馳至是臣督工暇時每與道府諸臣計議相度淮之不可使南洩也其理章章甚明蓋淮由泗之東北境出清口歸雲梯關海口以入於海此亘古不易之故道故雲梯關海口名曰淮子口也清口者廣闊二百餘丈乃諸湖水滙出之處正當運河通濟閘之交淮水必由此出庶湖水可合勢以通流運艘可藉水以接濟若欲舍清口而洩之使南且毋論其横決旁溢為害於髙寳淮揚有妨於運道究竟從出之路安在乎欲洩之出海查得興鹽一帶至通泰從來無淮水出海正道去年為武家墩之開議濬涇河議開子嬰溝俱闊不過十丈耳縱使可以𨗳淮使行而射陽湖反髙墊於内河石䃮口止二丈八尺之閘口廟灣入海之道若匣子等港俱甚淺窄安能受洚洞之淮水使之滔滔入海乎即不惜工力開濬而東南地勢每亢於東北故自宋迄今捍海范公隄屹然一百四十里前此並未有穿破𨗳淮者其故可知也欲洩之出江查得江岸反髙於諸湖萬歴五年以前淮水南注髙寳告急不得巳闢儀揚通江諸路乃髙郵之水僅減二尺而揚州徃來船隻阻淺者幾三十里地勢髙下迴然可知若必欲掘深𤓰儀諸口盡廢閘壩以縱其出第恐全淮諸湖之水未必傾㵼而長江盈漲内灌之患何以當之即近日金家灣芒稻河之開竟不能大洩湖水出江其故可知也南入海不得南入江不可則惟有分黄於淮之上流俾淮循清口正道直出入海縱雲梯海口稍有沙墊猶可㑹黄入灌口也淮竟不可南洩則髙家堰之開竟屬何益臣竊考髙堰之築非始於近日乃漢陳登剏之我朝平江伯陳瑄稍為増築前河臣不過復加修砌於萬歴七年方成今度堰之地厎髙下不等惟周家橋稍下積歳通流髙良澗武家墩稍亢而髙家堰最卑湖淮滙射於此若姑狥拆堰則淮水日東黄水且躡其後濁流西入清口日湮其為患於祖陵運道又何可勝言者故臣視事以來廣詢細度不敢議拆髙堰上議於周家橋量開小河一道建壩於髙良澗建閘於武家墩但令稍加宣洩總之消泛漲之水非敢盡決而東之也然臣等尚恐奪清口正流迄今次第興舉惟欲俟黄流既分之後盡闢清口之沙俾淮由故道通流不須他洩此臣與河臣楊一魁苦心籌度即部司道府諸臣僉以為然敢自謂必無遺䇿哉事關陵寢運道縱不能必盡利實不敢貽害也又巡按直隸監察御史蔣春芳題為覆勘分黄𨗳淮大工條上善後事宜一十六款一築遙隄以障潰決照得防河之法莫善於遙隄河性湍悍數年來徐邳之民幸不為魚則遙隄是恃也蓋水本勁而末弱縷隄傍岸或潰而入至於數百歩而遙物或障之則力弱而返矣新河形勢自西而東地漸窪下水若建瓴但縷隄相去不逺故有余家莊安娘城南湖窪張家窪諸決口即今雖土牛廂護築塞極堅然決而塞塞而寧必無他潰故亟宜傚正河遙隄之制其兩岸泥重老土則取土番築鬆解不堪者另覔老土夯杵堅厚去河身必一二百丈而遙隄堅則可守而水不能攻逺則有容而水不能溢則河身永永無患矣一砌新河口以禦衝刷照得黄壩新河上口闊四十丈入裏河身闊三十丈蓋酌量水勢足以容納不至泛溢為患縁近口之處原係淤沙以故開放之後不數日間衝闊七八十丈業經委官捲埽廂護矣但迎溜水勢湍急樁埽不免摺䧟調夫運料日事増修此以救目前之急則可恐非長乆之計也今議宜倣照清口惠濟祠基為之將新河自東南衝激處所包砌石岸二百丈其正當迎溜之處堅砌石磯觜如雞胷之狀狂流觸此即分可免震撼崩塌之患應用石塊頗多一時難以卒辦若待委官採買恐緩不濟事就便即拆黄家滚水壩移用如有不足併餘料工價於大工存剰銀内動支應用務在九月興工明春完報此亦新河之急務也一裁張福隄以縱淮流一歳濬清口以防壅塞二條並入淮河一疏藉家河以分横流照得徃年鮑王口水㑹於周三莊經由娘子莊袁家社等處總歸五港口下海中間河衝不止數道藉家河陳溪岔廟兩處其最大而深者也去冬海口郎中樊兆程詳勘水道西自王口至袁家莊以東又分二支一支由陳溪岔廟出三岔墩一支由藉家河亦㑹三岔墩總下掛甲墩歸五港口二支水勢相等今既濬陳溪岔廟一支以順黄水之性又當濬藉家河一支以廣入海之路原牘具在可覆而驗也比因伏秋霪雨河漲衝開張愛鄭學二口水入藉家河滔滔東注因勢利𨗳委應仍存此河止將上口新淤除去下流曲折之處挑取徑直俾於陳溪岔廟正河分𨗳横流併歸五港仍堅築南岸遙隄遮護安東縣北鄉庶乎疏洩途廣新河亦無壅淤之患矣一闢五港口以助宣洩照得水性就下以海為壑五港為衆流㑹歸出口之處乃入海之門戸也若非闊大難免停蓄下流阻則上源必壅去路澀則來流必滯淤河潰隄皆原扵此所關係非尠小矣查勘近五港之處河靣不過二十丈港口舊有石閘雖已拆去其閘基處河止闊十丈縱渠深流駛終屬窄狹欲就本港展闊而兩傍居民房屋逼近河崖遽難盡毁議於南岸擇低窪之處另開支河一道分洩來流遶出閘外與五港口之水並道而馳同入潮河歸海庶於宣洩尤利倘亦今日分𨗳之要圖耶一建減水壩以分暴漲照得新河初成河身不盈三十餘丈而水流洶湧有百丈之勢兩岸束水太急新隄稀鬆不能捍禦固宜其衝決也今除安娘城等處小口應築塞者即時堵塞至於蔣家窪髙家溝二口與魚溝相連塞之則有屢決之患闢之恐奪新河之路欲分殺急流以固隄勢莫如建減水壩於其處長二十五丈壩身連跌水闊七丈五尺比河岸約髙一尺萬一水與隄平即任其從壩滚出分流入海則隄以内蕩蕩安流即有伏秋霪霖必無驟漲而隄外乃通海舊渠亦不至漫溢而為災此保固新運之一䇿也諸所朩石工價皆於大工銀内支用伏秋之後與隄工併力並建可垂永利一積物料以濟緩急照得黄河衝突隄防汩没陵谷乃其常性而伏秋景象轉變呼吸非積蓄素裕何以取濟然眉合於新河百餘里之間若黄壩口周三莊張家窪掛甲墩等處無非要害即於秋後増築棚厰每厰設厰老一人厰夫四人守之所分屬管河官許領官銀買備草三十萬束繩四萬套蘆三萬樁朩三萬麻二萬斤分堆各厰酌量水勢緩急裹頭未堅則下重掃而楗之蟻穴稍漏則銜朩石而填之稍有疎失司道以詰府佐府佐以督下吏州縣佐領以責各夫有一名詭冒侵匿者坐以法其物料按季循環造送司道一設鋪舍以處夫匠照得河隄既築官夫亦備然數千人荷鍤守隄勢不能招翅於風雨烈日之下則鋪舍之建必不可緩查新河口至掛甲墩一百二十八里每三里一鋪合兩隄當鋪八十四座每鋪朩石坯料約用銀四兩五錢通衆鋪當用銀三百八十兩宜及此時責令各該管河官照數辦料隄完鋪完毋令後時仍照南北縷隄之制鋪立幟標編列字號若隊伍之足以相認伏秋各該鋪老率夫役於五月中旬上隄九月下隄徃來擊柝於涘涯之間一處衝壊即鳴器鳩工併力護衛管河官務以身督之府同知時以躬巡之習怠而弗肅於事者處究此自修守常事然今大工之後錢榖各有司存則此節亦所宜論及之也一議修閘以杜陵患不錄一復淺船以疏河身照得治河原有淺船淺夫今淺船湮廢日乆淺夫之設派在郡縣夫以淺為名非謂防河之淺而挑穵使深乎今自周三莊至五港口乃全河入海之末下流之處也此段常深則上無所不深此段少淺則上當無所不淺深則百病全瘳淺則衆症立見謂宜修復昔者疏淺之法查廟灣餉稅加曩時數倍兵不益額而稅加廣安所用之謂宜裁處為造淺船二三十隻調廟灣餘兵百餘名統以衛職移鎮其地以時駕船撈淺或用長柄杏葉杓鐵扒之類疏之季稽淺之多寡以定功罪海口同知攝其事蓋水本能滌沙少藉人力自相蕩而去乆之河身不復有淺而入海之力益迅誠便計也一填泗城以護陵寢不錄一治溝渠以興水利入水利一塞黄堌口以防河徙照得碭山之上有黄堌口黄水決之而出經蕭宿靈睢由宿遷小河口復入正河諸州縣歳遭淹没民不聊生徃時屢議堵塞而卒不果當事者為工力艱鉅且以黄河勢大方為鎮口徐邳之患幸有岐流稍殺其勢故姑聴其決耳今黄分而流疾徐邳之間幾於無河伏秋若此冬春可知萬一全河徙去無論運道梗阻其於祖陵皇陵大有可慮者又安可幸目前之安而不亟為逺大之計今宜委官查勘斟酌堵塞庶為二陵萬年之利而運道民生亦胥有攸頼矣一固王公隄以保漕渠照得清江浦之王公隄外捍黄淮内護漕渠其海神廟至火星廟一帶最為險要每遇伏秋水發岌岌欲壊加埽填土勞費無益幸近年鮑王口衝開水趨北岸清浦居民稍得安枕今議王口建閘通連此隄正當其衝伏秋之間若王口閘閉則水勢南趨潰囓可慮若王口閘開則黄流倒滚衝射尤危無一可者也未雨綢繆不妨預先計議將前額歳修之銀委官領買徐州雜石用荆筐包絡僱船裝運交付該縣管河官查收量本隄水勢深淺鱗次實排不出一二年隄外盡皆石砌即有王口衝囓之患可恃無恐保固漕渠而全一方之民命斯為利亦大矣一專責成以臻實效照得有司各有専職河務尤為艱鉅必得其人而専任之斯可責其成功今黄壩新河畫地設官各司防守業已有成議矣至其善後之工目前所當亟為舉行者不過築新河遙隄建王口周莊閘歳闢清口門限沙此數者其要也然須得人以任之臣於工部分司得二人焉李元齡樊兆程是也於府佐得四人焉劉不息張兆元趙坰馮學易是也之數人者或慷慨明逹或沉潜細宻資性不同然均之實心任事深諳河務者也臣以為清口闢沙應委之同知馮學易専管而以南河郎中李元齡督理之五港一帶河工見䝉欽依同知張兆元管理黄壩至娘子莊築隄應委之運同趙坰專管王口至周三莊建閘濬渠修築縴道應委之同知劉不息專管而以海口郎中樊兆程督理之三年之内果有成績破格超陞先期申飭臨事考成庶乎人心競奮而實效可臻矣至於州縣管河之官亦必擇强壯有才幹者充之不次陞賞河工之外不得委以别事致招物議全官固所以全河也噫天下有治人無治法詳於議河而尤専於任人新河庶幾可保百年無事哉部議覆奉㫖依擬行題覆河工奏議明神宗萬歴二十五年正月壬寅時河決黄堌口有言宜塞者有言不可塞不易塞不必塞者議無畫一於是議濬小浮橋沂河築口以濟徐邳運道以洩碭蕭瀰漫砌歸仁隄以護陵寢而總漕尚書禇鈇上疏極言堌口宜塞縱不能盡塞亦宜量為節制不則全河南徙害將立見續行巡鹽巡漕御史親詣一勘工科給事中楊應文言堌口旁洩害大浮橋引水利微一濬誠為永頼則口可無塞如僅為一時權宜則塞口宜急請敕令酌議的確部覆從之三月庚子贈管河主事袁光宇太僕寺少卿以其治河積勞也戊午自河決南徙徐邳復見清泗議者謂全河水微不利運道決口不塞貽害地方且恐下齧歸仁為二陵患獨總河尚書楊一魁謂堌口深闊難塞議濬小浮橋沂河口小河口至是工程報竣運道通利奏言河徙無妨運道今日已有明驗惟是議者尚以祖陵為慮請徵徃事洪武二十四年決原武黒陽山經開封城北又東南經項城太和潁州潁上至夀州正陽鎮入淮行之二十餘年至永樂九年河稍北入魚臺塌場等口未幾復南決繇渦河經懐逺縣入淮時兩河合流經鳳陽歴泗州以出清口若患及陵寢祖宗當何如為慮者而卒未聞計及也嗣後又行之四十餘年至正統十三年間河復北決衝張秋至景泰初先臣徐有貞塞之河乃復渦河東入淮亦不聞病及祖陵也嗣後又行之二十餘年至𢎞治二年河復北決衝張秋先臣白昻劉大夏相繼塞之復𨗳河流一繇中牟至潁夀一繇亳州渦河入淮一繇宿遷小河口㑹泗時則全河大勢縱横於潁亳鳳泗之交而下且漫溢於符離睢宿之境矣然卒不聞虞及祖陵亦不聞隄及歸仁也惟正徳三年以後河漸北徙或繇小浮橋入漕或繇飛雲橋入漕或繇榖亭入漕全河大勢始盡趨徐邳出二洪運道雖稍資其接濟之利而亦受其泛溢之害矣至嘉靖十一年而河臣建議分𨗳者始有渦河一支中經鳯陽祖陵未敢輕舉之說夫當全河南徙之時不聞為祖陵患及全河北徙後僅議分𨗳一支乃反足為患乎然當時間有濬祥符之董盆口寧陵之五里鋪滎澤之孫家渡蘭陽之趙皮寨又或決睢州之地丘店界牌口野雞岡寧陵之楊村鋪俱入舊河從亳州鳳陽等處入淮南流尚未絶也亦何嘗聞祖陵之被患乎至嘉靖二十五年以後南流故道始盡塞或繇秦溝入漕或繇濁河入漕五十年來全河盡出徐邳奪泗入淮而當事者方認客作主日築隄而窘之以致河流日壅淮不敵黄退而内瀦遂貽今日祖陵之患此實繇於内水之停壅不繇於外水之衝射也萬歴七年先臣潘季馴始慮黄流倒灌小河白洋等口挾諸河水之衝射祖陵乃作歸仁隄為保障計而復張大其說以為祖陵命脈全頼此隄無怪乎議者習聞其說而遂疑黄堌之決或下齧歸仁也不知自黄堌一決下流易洩必無上灌之虞况今小河不日工完引河歸復故道去歸仁益逺何煩過計哉部覆報可四月已丑自河決黄堌總河尚書楊一魁議開小浮橋築義安山濬小河口引武沂泉以濟運及是以乆旱不雨上源水枯又復衝開義安束水黄壩二十餘丈小浮橋來水微細運河淺澀於是一魁議挑堌口迤上埽灣淤觜二處仰受黄流救小浮橋以上數十里之堌并乞寛過洪原限部覆報可八月丁卯先是以黄堌塞口衆議未定下漕鹽御史㑹同河漕大臣詳勘議妥具奏至是總河楊一魁仍主前議疏言今黄河南徙至韓家道盤坌河丁家莊俱兩岸闊百丈深踰二丈名曰銅幇鐵厎故道也劉家窪始强半南流得山西坡水涸湖以為壑出溪口入符離河亦故道也惟徐邳運道淺涸誠為可虞所以首議疏小浮橋實因其勢而圖資其利乃小試頗有效驗若將小浮橋再加挑闢未必不為運道之利計不出此而欲自黄堌挽回全河必須挑四百里淤髙之河身築三百里南岸之長隄不惟所費不貲還恐後患無已御史楊光訓周盤馬從聘亦議止挑埽灣直渠展濟濁河及築山西坡歸仁隄以濟運護陵費省功倍與總河合獨總漕禇鈇意見不同部請再行㑹勘工科給事中徐觀瀾言堌口之勘三臣既同善均從衆不必再勘請專任河臣以責成功上是其言令該部行河臣悉心經畫應與漕臣㑹議者不妨從長計處毋得各持異議九月丁已總河尚書楊一魁言今歳春間吕梁二洪淺涸皆歸咎於黄河南徙臣等設法疏𨗳河渠流通漕艘既濟漕臣褚鈇謂黄堌未塞全河不來非一勞永逸之計臣沗當局豈慮不及此臣入秋以來自鎮口涉浮橋繇小河歴歸仁上泗陵浮睢水下徐溪過夏虞抵黄堌及碭山詳觀形勢看得歸仁在西北泗州在東南相距一百九十里中隔重岡疊嶂髙踰歸仁不啻數仞况歸仁之北有白洋河朱家溝周家溝胡家溝小河口洩入運河勢如建瓴即無歸仁祖陵萬無足虞也濁河泥沙淤墊髙出地上潦則溢旱則淺分曹單河身闊一二百丈深二三丈尚不免於横流徐邳河身闊不滿百丈深不過丈餘徐州以西深者六七尺淺者二三尺而夏永韓家道口同家道口宿州徐溪口符離河等處闊百丈餘深二三丈避髙就下水之本性河流巳棄自古難復且徃歳河水充盈見稍利矣而風波漂溺鎮口病淤不可謂之非害今歳河水微澀見稍害矣而安流無恙歳運全完不可謂之非利乃議者在徃年隠害言利在今日隠利言害無怪乎道謀之紛起也查得正統年間參將湯節議於徐吕洪南口各建閘座節水通舟行之有效嘉靖二十年間督治漕河侍郎王以旂復請建置蓋運河原不資黄河之水山東諸泉實運河命脈是閘河乃先朝巳試成規今日濟時要務也宜仍復舊制於鎮口之下大浮橋之上吕梁之下洪邳州之沙坊建石閘一座以節宣汶泗之水况濟兖泉源巳濬用之不竭而小浮橋沂河口二水又足以助之更於鎮口以西築壩以截黄河之水開唐家口而注之龍溝㑹小浮橋入運以杜灌淤口閘之害過漲則聴從繇王山滚水壩分洩入姬村湖蓋資其利而去其害實萬全永頼之計也部覆報可十月癸亥先是總漕尚書禇鈇逐徐州管河判官程潮沛縣主簿强性寛總河尚書楊一魁稱其功有可錄乞行按臣查勘并自乞休部覆行勘命一魁照舊供職已鈇言與一魁素同心共徳止縁黄淮遷徙不常害及運道一魁決意分黄不欲𨗳淮意見不同偏執自是臣叨領漕撫斥革貪贓誤事二小官輙為一魁挾制㢲懦不職甚矣尚可􅌤顔在位乎乞賜罷斥不報十二月丁丑吏科左給事中楊廷蘭奏淮河為梗墊及祖陵諸臣創分黄𨗳淮之議豈不鑿鑿可行哉顧當黄堌決口初開之時不能見形察微以遏其奔駛之漸今滔滔下注力無所施矣然自黄堌決而始有小浮橋之疏淤而復有李吉口之濬夫一歳疏濬僅濟一歳之運道倘今年李吉口改挑未已而明年復淤今年二十萬之煩費未巳而明年復然恐歳塞歳開終無巳時為今之計果河自南徙故道可復即自宿遷一帶築隄建閘設壩穿渠以一勞圖永逸說者謂泇河北承汶泗南逹黄淮果可開鑿即一靣估計不撓於浮議可也河臣楊一魁拘攣之見未破所當從長經理以責成功者也明神宗實録是年河道尚書楊一魁奏恭進繪河圖說以備聖覽以定長䇿按黄河自古為中國患近自分黄𨗳淮工成鳯泗淮揚免昏墊之災已有明驗矣又自黄堌一決全河南徙兖豫徐邳得免河患而其餘波出於義安者又𨗳之入小浮橋足以濟二洪之堌則今日之河既有合於決隄放水之議而又不足為運道之虞但以増隄塞口為良圖以堙水防川為上䇿臣竊不知其解矣夫道傍之議不過曰運道有淺澀之虞祖陵有意外之患地方有淹没之苦耳不知我國家運道原不資於河全河初出亳夀之郊以不治治之故歳無治河之費其後全河漸決入運因遂資其灌輸五十餘年以乆假不歸認客作主又日築垣而居之涓滴不容外洩於是濁沙日澱河身日髙上遏汶泗則鎮口受淤魚滕被浸下壅清淮則退而内瀦盱泗為魚以至瀕河没溺歳運飄流甚至衝截運道牽輓莫施而當事者猥以運道所資勢不能却之他徙遂付之無可奈何以致水浸祖陵厪皇上隠憂臣欽遵明命改弦易轍首開武墩涇河等河次疏具壩周莊等河又次挑小浮橋小河口沂河口故道幸小浮橋股引之水李吉口未斷之流已足濟運矣以汶泗沂兖之水建閘節宣運道自在固不必殫力塞決以回全河蓋決河所經有山西阜子諸坡湖以為之滙又有小河白洋周朱等河溝以為之委更免漂溢之虞况祖陵雄據上游有崇岡疊嶂諒可無慮即歸仁一隄見謂險要亦非受水衝萬一失守亦不過下浸桃清由洪澤諸湖以下清口勢不能逆流倒灌上及泗盱何必過為杞人之憂也南流汎濫雖不免為下邑民生之害碭山水道當衝南流北流俱不得免必須遷城以避河患其以堌口被災者惟有蕭宿靈睢四州縣再照全河未徙之時豐沛魚滕徐邳等州縣不歳被淹没乎近庚寅癸已之秋衝城灌邑徐邳二州赤子不幾為魚鼈乎較之今日蕭宿靈睢孰多孰寡孰重孰輕况宿南水患非自今日蓋𢎞治二年之秋河決中牟下歸徳至宿州瀰漫四出疲民半溺侍郎白昻治之至宿遷小河口浚而西抵歸徳飲馬池諸口又開符離月河而患始平翰林學士李東陽碑記可鏡也從來如此無分土亦無分民何獨厚於蕭宿靈睢而薄於豐沛徐邳也故臣始終自信以為止就巳成之功稍終未完之緒則自不至為運道之虞亦不能為陵寢生民之患矣抑臣又有說焉蓋禹之𨗳河自大伾以下析二渠播九河隨水之所向不與争利故能奏平成之績今河南山東江北州縣棊布星列在在隄防水不及汴梁矣又恐決張秋也不及張秋矣又恐淤鎮口也不及鎮口矣又恐淹宿州也凡禹之所空以與水者今皆為我所占吾無容水之地固宜其有衝決之患也今若空碭山一邑之地北𨗳李吉口下濁河南存徐溪口下符離中存盤岔河下小浮橋三河並存南北相去約五十里任水遊蕩以不治治之量蠲一邑千金之賦歳省修河萬金之費不勞民力河患可平此一時之省事亦萬世之良圖也謹繪圖貼說以進伏祈皇上留神省覽敕下該部毋惑浮言定為長䇿徐俟智者以善成之俾我朝河渠一書足繼禹貢臣之願也奉㫖圖留覽這所奏工部看議來說續文獻通考是年河復決單縣之黄堌口溢於河南之夏邑永城界經宿州之符離橋出宿遷新河口入大河半由徐州入舊河濟運而二洪告涸於是總河尚書楊一魁大挑李吉口以挽黄流河成尋淤接管總河尚書劉東星復開李吉口疏徐邳運河然黄堌未塞河流未暢漕艘終屬濡滯按黄堌口乃賈魯舊開處也先是河決事聞朝廷奪總河大司空舒應龍官而以楊一魁代之一魁以河雖南出符離淹没民田無幾而河水一半由舊河下徐州足以濟運議不治又二年一魁入掌部事代之者為大司空劉東星亦守舊議但河日益南而黄堌之下李吉口澱淤益髙北流遂絶東星每至冬即其地開一小河春夏則引水以下徐州濟運然亦至秋即淤不能乆也若是者三年而彭城吕梁之間古所謂懸水三十仞者可褰裳而渉矣於是江淮當事者建六閘於河中節宣山東汶濟之水聊以通漕而漕舟至京徃徃後期南河全考行水金鑑巻三十九
