body:
  text: 行水金鑑巻四十八江南按察使傅澤洪撰河水靳輔敬陳經理河工事宜第一疏畧云臣竊見今日治河之最宜先者無過扵挑清江浦以下歴雲梯闗至海口一帶河身之土以築兩岸之堤也查清江浦以下河身原闊一二里至四五里者今則止寛一二十丈原深二三丈至五六丈者今則止深數尺當日之大溜寛河今皆淤成陸地已經十年矣兹欲令黄淮之水盡從此故道入海必須畧開去路導之使行盖築堤堵絶用水刷沙雖為治河不易之䇿然河身淤土有新乆之不同三年以内之新淤外雖板土而其中淤泥未乾衝刷最易五年以前之乆淤其間淤泥已乾與板沙結成一塊衝刷甚難故必須設法疏浚也今自清江浦至海口一帶河身之淤既經十載如臣不從萬全立議而貿貿以治新淤之法治之恐決口盡堵黄淮齊下之際因河身淺窄一時衝刷不開又生他變則臣一身受溺職之罪固不足惜其如己費之錢糧將來之國賦民生之昏墊何哉况用水刷沙即曰不必挑浚而束水歸漕則又必須築隄既築堤矣與其取土扵他處何如取土扵河身寓浚於築而為一舉兩得之計也今臣擬扵河身兩傍近水之處離水三丈下鍬掘土各挑引水河一道掘面闊八丈底闊二丈深一丈二尺以待黄淮之下注盖黄淮下注之日中央既有一二丈舊有之河左右又各有八丈新鑿之河其所存兩旁之地雖屬堅土而薄僅三丈一經三面之夾攻順流之衝洗不待多時即可盡行刷去將舊有并新鑿之河俱合而為一矣又兩旁既各挑深一丈二尺則中央河心自可刷至二丈之外河至深二丈寛四十丈便不窄淺從此日洗日刷日深日寛自可免意外之變而漸復當日之舊矣其所浚丈尺計毎地一丈掘土六十方即以之挑築兩岸之堤底闊七丈面闊三丈髙一丈二尺毎丈亦用土六十方也查工部尚書臣冀如錫等條奏内開堤底以八丈為度面以五丈為凖髙以一丈五尺為凴等語計毎隄一丈應用土九十七方半誠為防河至堅之䇿今臣所議髙闊之數俱減毎堤一丈止科用土六十方者盖以物力艱難姑暫從減省擬議俾其足以扺當河水而止仍俟物力稍寛之時再行量撥人夫協同議設守堤之兵加髙加厚仍如部臣等條議丈尺之數可也至部臣等原疏内開南岸自白洋河至雲梯闗止北岸自清河縣至雲梯闗止務須一律修築等語俱應照議興築查白洋河至雲梯闗約長三百三十里清河縣至雲梯闗約長二百里以毎里一百八十丈科之共約長九萬五千四百丈毎丈用土六十方共計用土五百七十二萬四千方其九萬五千四百丈之内有原未有堤者有原有堤而今全無土者有原有堤而今更缺窪須増填者有堤根存土髙一二尺至六七尺不等寛三四尺至一丈五六尺不等者合有無多寡而計之牽約存舊土髙三尺寛八尺毎堤一丈計牽約存舊土二方四分通共約存舊土二十二萬八千九百六十方實須増土五百四十九萬五千四十方至於取土之處雖以離水三丈為度然河身有在中央者有折流在南岸及北岸者逺近不齊必須隨地科算總之離堤三十丈之内不許取土其三十丈以外取土者毎土一方用夫三工一百二十丈以外取土者毎土一方用夫四工二百四十丈以外取土者用夫五工合逺近而牽算之大約毎土一方用夫四工兩岸之堤共用土五百四十九萬五千四十方應用夫二千一百九十八萬一百六十工毎工照例給銀四分通共需銀八十七萬九千二百六兩四錢又自雲梯闗外以至海口尚有百里之遙除近海二十里潮大土濕之處無容置議外其餘八十里之河身情形俱與雲梯闗内無異若不量挑浚以導之量築堤以束之則黄淮合流出闗之際河身既窄而淺兩旁又堅而厚大水驟至不能承受歸漕勢必四處漫溢雖闗外漫溢與運道民生無涉然一經漫溢則正河之流必緩流緩則沙必停沙停則底必墊闗外之底既墊則闗内之底必淤不過數年當復見今日之患矣臣聞治水者必先從下流治起下流疏通則上流自不飽漲故臣又切切以雲梯闗外為重而力請築堤束水用保萬全不敢泄泄從事以貽後此之大害也惟是近海之堤止期足以攔水可以不必過扵髙厚堤底止須寛五丈面亦須寛三丈髙止須六尺亦一體照取河心之土築之兩岸共堤一百六十里計長二萬八千八百丈毎丈用土二十四方計用土六十九萬一千二百方用夫二百七十六萬四千八百工毎工照例給銀四分通共需銀一十一萬五百九十二兩二共需銀九十八萬九千七百九十八兩四錢統扵臣第六疏内設措錢糧以給之其需用人夫共計二千四百七十餘萬工應限二百日完工計毎日需夫十二萬三千七百餘名念淮揚附近人民尚須供臣後疏挑浚幇堤堵決等各工之用斷斷不能更有如許多夫前來應募臣查康熈九年前河臣羅多興修黄河各處之工除調用各處泉淺等夫外曽經令山東江南鄰郡地方協募赴工在案今此工之大數倍扵前不得不循例而行臣擬令江南之鳯陽府屬募夫一萬五千名江寕府屬募夫一萬名蘇常二府屬各募夫八千名鎮太二府屬各募夫四千名徐州并屬募夫五千名滁州和州并屬各募夫二千名山東兖州府屬募夫一萬四千名濟南府屬募夫九千名東昌青州二府屬各募夫五千名河南開封府屬募夫一萬三千名歸徳府屬募夫八千名尚少夫一萬一千七百餘名應扵淮屬之邳海雎宿贛沭六州縣地方召募其募夫之法各該府州就所屬州縣之大小近便酌量派募務募二十嵗以外四十嵗以内精壯强健之夫赴工常川供役不許以老弱塞責及往來更換以致曠悞工程即扵該府屬首領州縣佐貳雜職等官内遴選能幹之員専管驗募限部文行到該省半月之内募齊人夫各帶土車鍬担等器飛星押赴工所董率料理依限挑築至於地廣夫多其間恐有偷安茍且情弊必須用畫段丈驗之法以釐之其法容臣預督各監理官量取土之逺近按工畫段毎用夫五千工為一段編定字號插牌標識其中有原係平地者有更有缺窪須填者有存舊地之土多寡不等者并堤段長短丈尺之數逐一書明標識之上仍立簿一本一體登記交各監理官收存各監理官即按各州縣協募人夫多寡之數照工撥給堤段令其如式挑築臣仍親臨工所用部臣冀如錫等條議鐡杵杵隙盛水不漏之法不時查驗以别其夯杵之堅否臣更請立懲勸之典以鼔舞而警䇿之凡各州縣協募人夫有老弱病廢及奸滑逃逸一名至五名免議外六名至二十名者各該州縣罰俸半年所委専管官罰俸一年二十一名至五十名者州縣官罰俸一年専管官降一級調用五十一名至一百名者州縣官降一級留任専管官降二級調用一百名以上者州縣官降一級調用専管官革職其所築堤段如有一處夯杵不堅盛水即漏并底面丈尺雖合而面上兩旁低窪有三四丈者將専管官降二級調用三處以上夯杵不堅盛水即漏并底面丈尺雖合而面上兩旁低窪至五丈以上者將耑管官革職如所募之夫盡皆壯健并無一人逃逸所築之堤隨驗俱堅堤面兩旁豐滿處處合式者該州縣官不論俸滿即陞耑管官如係正途照依應陞之缺加二級即陞如非正途俱准照正途注册一體加二級即陞更請責成道府州并監理各官如各該道府州所屬有一官議處者將該道府州罰俸半年兩官議處者將該道府州罰俸一年三四官議處者將該道府州降一級調用五六官以上議處者將該道府州降二級調用所屬委官督工勤幹築堤堅固如式依期早早告竣者將該道府州亦不論俸滿即陞其各監理官除募夫一項與伊無渉不議外凡伊所管各州縣委官之内有因夯杵不堅築隄不豐滿一員議處者將監理官罰俸一年二三員議處者將監理官降一級調用四五員議處者將監理官降二級調用六員以上議處者將監理官革職如議處議叙相同者准與抵算如監理官揭㕘者准免連坐若並無議處止有議叙者將監理官照伊原任應陞之缺加二級從優即陞如此則各官俱知勉勵可無闒茸貽悞之虞矣伏候睿裁第二疏云竊照臣請挑清江浦而下至海口一帶河身之土以築兩岸之堤乃先治下流以導黄淮歸海之計也然下流雖治上面有淤墊之處不行急早疏通則髙家堰等一帶決口盡堵淮水直下之時難免阻滯散漫之虞查洪澤湖下流髙家堰以西至清口約長二十里原係汪洋巨浸為全淮㑹黄之所自淮流東決黄水逆灌之後將此一帶河身漸漸淤成平陸向之汪洋巨浸者今止存寛十餘丈深五六尺至一二尺不等之小河一道矣查工部尚書冀如錫等條議内開清口一帶沙淤之處速行挑浚等語然淤沙萬頃挑浚實難臣再四思維惟有倣照挑浚清江浦以下河身之意扵小河兩旁離水二十丈之地各挑引水河一道俾其分頭衝洗庶可漸漸刷開至扵挑清江浦引水河臣止擬離河身三丈而此處議離河身二十丈者盖清江浦以下係十年乆淤之堅土而此乃三年之内之新淤臣曽帶領夫役掘土試驗浮土一層板土深有二尺下則係淤泥尺許淤泥之下又屬板土板土之下又屬淤泥掘深六尺有竒而尚不能到當日之湖底且面層板土雖極堅硬而第二層板土因在淤泥之下反潤而鬆故雖離河身二十丈之逺而易扵衝刷不乆便可合而為一也惟是此處淤沙既易衝刷而臣亦議開引水河者盖臣目擊面層板土之堅硬恐一時衝刷不開又扵他處生變亦未可定因思此番工程錢糧人力無不浩繁若有一處慮不周到恐致差之毫釐失之千里之悔是以不敢不畧議導引之䇿以圖萬全耳其所挑引水河應面寛六丈底寛二丈深五尺毎淤地一丈掘土二十方逺傾於引水河六十丈之外兩岸共計七千二百丈共掘土一十四萬四千方毎方用夫三工共用夫四十三萬二千工照例毎工給銀四分共需銀一萬七千二百八十兩亦扵臣第六疏内措設錢糧給用此工一治庶淮河下注之時可以衝闢淤泥徑奔清口㑹黄刷沙而無阻滯散漫之虞矣伏候睿裁第三疏第四疏第五疏俱淮運兩河事宜分見淮水運河水下第六疏設處錢糧一議淮揚被淹田畝補納修河之費一運河經過之貨物宜令加納剥淺之資一開廣武生納監之事例三欵并令各直省州縣預徵錢粮十分之一第七疏裁併官員及議叙處分俱見後第八疏畧云保全河道之䇿全在能盡人力而不可諉之天數至於隄岸衝決之由則官民夫役均有罪焉官之罪有二一在備員闒茸不知河道為何物其於運道民生不啻秦越人之視肥瘠雖有以未雨綢繆之䇿告之者而茫然不能也一在利扵多事希圖乘機侵蝕故薄者不填而缺者不補以致潰決廢壊不可收拾也民之罪有三或與近堤之人有讐而盜決以淹之或因己田乾旱而盜洩以溉之至扵周橋翟壩奸民知商販畏淮闗之税重而樂扵趨其地也於是盜決以俟之堤決而商至商至而伊得遂其乘機取利之謀矣若夫夫役之罪則總在利扵動而不利扵静樂扵有事而苦於無事是以百計隂壊之耳他如髙良澗等處板工上年大水衝決除決口二十六處之外其餘一帶殘堤貼樁之土悉皆卸塌樁朩無土擁䕶易扵竊取被湖内小船及水淹災民乘夜盜鋸者不一而足又聞向來有等壊事夫役當大埽方下未合龍門之時暗藏刀斧乘夜割斷楸頭繩以致所下之埽隨即衝淌諸如此𩔖是以殘壊至此臣再四籌維欲圖將來乆逺之計莫妙於多設専心保全河道之人則設兵以守而立勸懲之法使之知利之當趨而害之當避誠為不易之䇿也臣愚以為今既大費財力髙築堅堤必按里設兵使之住於堤上逐日看守并將疏浚修葺事宜一切責成之外河自雲梯闗而下至扵海口為兩河朝宗要道毎堤一里必須設兵六名毎兵一名管堤三十丈堤根栽栁務活堤旁畜草務茂堤内則乘暇添土逐漸幇寛毎二里半一墩令十五兵居扵墩側毎墩給浚船一隻各繫鐵埽箒二個於船尾繫繩以五丈為度毎月之初一十一二十一日兩岸墩兵一齊各乘浚船或布帆或鼔棹或䌫錨下鐵埽箒扵水底溯流刷沙往來上下殆五丈之繫繩不能到底懸鐵埽箒扵水中方止兩岸共堤一百六十里設兵九百六十名給船六十四隻再設兵二百四十名給船十二隻耑令浚隄外至海口一帶之淤沙自雲梯闗至海口應共設兵一千二百名應設守備一員千總二員把總四員給浚船七十六隻各分汛地而責成之自雲梯闗而上南岸至清口北岸至清河縣各長三百里毎里設兵三名毎兵管堤六十丈五里建一墩亦令十五兵住扵墩側毎墩亦各給浚船一隻鐵埽箒繫繩以四丈為度應共設兵一千二百名守備一員千總二員把總四員浚船八十隻亦照前法責成之自清河縣至宿遷縣兩岸各長二百里毎里亦設兵三名毎兵亦管堤六十丈五里建一墩亦令十五兵住扵墩側毎墩亦各給浚船一隻鐡埽箒繫繩以三丈五尺為度通共設兵一千二百名守備一員千總二員把總四員浚船八十隻亦照前法責成之自宿遷縣至徐州西兩岸約各長三百里毎里設兵二名毎兵管堤九十丈五里建一墩令十兵住扵墩側毎二墩給浚船一隻鐵埽箒繫繩以三丈為度通共設兵一千二百名守備一員千總二員把總四員浚船六十隻亦照前法責成之内河自清口西南至翟家壩南共長一萬八千餘丈應共設兵四百名毎兵管堤四十五丈五里建一墩令二十兵住墩側於堤根栽密栁坦坡畜茂草坦坡之外二十丈俱密種茭荷蒲葦菱芡之屬為永逺䕶堤之策應設守備一員千總一員把總三員運河由清口至邵伯鎮南約長三百三十里毎里設兵二名毎兵管兩岸堤各九十丈五里建一墩扵西堤令十兵住墩側其栽栁畜草等項俱照翟壩一帶之法責成之應共設兵六百六十名守備一員千總二員把總四員以上六營通共設兵五千八百六十名俱設步兵而無容設馬内以一分為百總管隊凖支步戰兵糧餉其餘九分俱支步守兵糧餉如各弁兵所管地方堤坡堅實日漸幇寛并無浪窩殘缺之處栁密草茂外河之水果深五丈四丈及三丈五尺三丈不等内河坦坡之外茭葦荷蒲盛長如是三年無異將該管守兵㧞為戰兵戰兵拔為把總把總拔為千總千總拔為守備有缺即題陞無缺即報部照依應陞之缺遇缺即陞如各弁兵所管地方堤破不堅或并不幇寛反有浪窩殘缺之處并栁稀多枯草被芟割外河之水不及五丈四丈三丈五尺三丈等深内湖茭葦蒲荷廢弛不種兵責四十板枷號一月穿耳徧逰示衆仍革去糧餉另行遴補千把總革職守備降二級調用若各弁兵該管地方因循闒茸以致衝決隄岸者官革職挐問兵從重處死至扵一例河道而臣議設兵船有多寡之殊者盖下流既通則上流可無意外之滯是以外河獨重扵雲梯闗以下也又慮水底之事目不能及設有意外驟淤之處其本汛浚船不能即疏則又當立調各汛船兵協力疏浚各疏本汛以守其常通融協助以防其變而黄河無慮矣黄河無意外淤淺之事則淮河自是安流淮河安流則運河亦可無恙其翟壩一帶之兵倍扵運河者翟壩一帶當淮河之衝為上流最要之地也八疏俱扵七月初八日題初九日奉㫖河道闗係重大這所奏經理河工事宜各本著九卿詹事科道㑹同逐一詳議具奏八月十三日工部等衙門㑹議具題十六日奉㫖議政王貝勒大臣九卿詹事科道掌印不掌印各官㑹同詳確議奏二十六日廷議酌量修築具題二十九日奉㫖河道闗係重大應否緩修并㑹議各本内事情著總河靳輔再行確議具奏總河靳輔覆題疏畧云夫黄河發源崑崙其流最逺自歴龍門合陜豫之水而益見奔騰又東至駱馬湖口更加東省運河山泉諸流而勢愈難捍又東南至扵清口㑹合全淮而瀰瀿滔天矣似此滔天瀰瀿之水非海無歸然自清口歴清江浦雲梯闗以至海口尚有三百三十里之遙其中非得寛深廣大之渠受其來而聽其去安能使之暢然無阻也臣聞順治年間河道未壊之時清江浦以下之河身深二三丈至五六丈不等寛二三百丈至六七百丈不等寛大如此是以雖遇伏秋水漲足以有容而不至扵泛濫乃今日清江浦以下之河身深二三尺至五六尺不等寛十二三丈至十八九丈不等逼窄如此是以即使霜降水消亦難承載而毎至扵潰衝也臣請將今昔寛深之數牽算而合較之深二三丈至五六丈牽算計深四丈深二三尺至五六尺牽算計深四尺昔四丈而今四尺是前此河水之深十倍於今日也寛二三百丈至六七百丈牽算計寛四百五十丈寛十二三丈至十八九丈牽算計寛十五丈昔四百五十丈而今止十五丈是前此河身之寛三十倍於今日也以上十倍與三十倍合算之是今日受水之河身僅有前此三百分中之一分耳夫黄淮之水自若也伏秋之漲仍然也而其入海之路竟淤去三百分中之二百九十九僅存一線其何能容於以知各處之漫衝潰溢誠勢所必至者也不惟是也自臣於本年四月初六日到任之後目擊清江浦以下三百里河身淺窄情形而清江浦以上深雖不過丈餘寛則尚有百餘丈及二三百丈不等也乃自七月十八夜楊家莊遙堤潰決之後一路漸漸淤淺臣親乘小艇徧閲河中自清江浦以上歴清口并清河桃源兩縣以至楊家莊前通計一百七十餘里其向之深丈餘者今則止深二三尺至五六尺不等矣向之寛百餘丈今則止寛十餘丈至二三十丈不等矣雖此係新淤之土不難刷開然下流不通將令刷歸何處耶今臣若欲照廷臣先將緊要之處酌量修築則必以急堵楊家莊決口為首務以其為漕艘必經之地現在淤淺難行也殊不知清江浦以下三百里乆淤之河未經疏通即使楊家莊閉合龍門不旋踵而他處又必告潰況清江浦以上至楊家莊業已盡行淤淺如將下流河身及早挑濬疏通然後竭力堵塞楊家莊決口則龍門閉合之後河流入海有途一百七十里新淤可以漸漸刷開故道可復漕運亦可無悞若不挑浚下流而但議堵決則水至無歸不特徒費錢糧徒勞民力此一百七十里新淤斷斷不能刷去必且更於楊家莊以上徐邳雎靈地方另行潰決決口移上一里則河身多淤一里將見東豫二省頻告水災而駱馬湖以下勢必全無運道矣此臣之所以力請大為修治也况及早興修約費銀二百餘萬倘荷皇上齊天之福數年之間或得告竣則田土盡出賦税可増民生可望其樂業安居糧運亦可使之遄行無阻若不急為大修則年年堵塞嵗嵗挑河恐數年之費亦不下二百餘萬而河道愈壊漕運愈阻臣受溺職之罪固不足惜其如民生國計何哉此臣之所以力請修治而斷斷不敢議緩也臣前題八疏原止就原任工部尚書冀如錫等條議疏内所開工程定議修築其臣疏較部臣等疏内増估者惟雲梯闗外挑河築堤一工耳至扵南岸白洋河以上北岸清河縣以上則原未議及也今臣親加詳勘南岸遙堤自白洋河宿遷縣境起上歴邳州雎寧靈璧以至徐州共計程二百八十里其堤内田地較之堤工俱低九尺一丈及一丈一二尺不等而堤外淤灘則較之堤工止低三四五六七尺不等甚有淤灘與堤頂相去僅尺許及竟與堤頂平者今嵗伏秋水漲直至堤頂雖㕔印河官竭力扵堤頂之上督夫挑土暫為搪䕶然不過加四五尺寛一二尺髙之子堤一段萬不能恃以捍禦洪流又有堤外乆停積水堪敵黄水黄水不能浸入未經淤髙之處則又一派汪洋清波千頃毎遇大風鼓浪將舊堤積漸撞擊莫不剥落坍殘僅存數尺北岸遙堤自清河縣起上歴桃源宿遷邳州雎寧以達徐州共計程四百里内清河至宿遷一百六十里係漕艘經行驛遞飛馳之地堤工尚寛及至駱馬湖而上除近山之處原未築堤外凡見在之堤悉皆殘缺不堪其中雖無堤頂與河灘相平之處然堤頂較之内地俱髙八九尺一丈不等而較之外灘不過髙四五六七尺不等且必有積水浸堤甚至兩面皆水日受汕擊之患者内如徐州之花山張家樓一帶原係岡阜之地近因河底墊髙士民條議創築堤工攔水乃工程未竣而洪流驟至業已衝成大缺其水從北東直注出駱馬湖之後將運河猫兒河一帶漸漸淤墊以上情形俱臣親身經歴竚立徘徊往來相視目擊危險之狀真不禁心膽皆悸是以不得不併請急修雖駱馬湖以上非漕艘經行之地殊不知南岸一決其水必由邸家白鹿等湖漫過歸仁堤助洪澤湖滔天之勢撼擊髙家堰髙良澗等一帶堤工各堤勢不能支必至決裂即或堤工堅固如鐵不即潰決亦必從頂漫過直衝運河之堤由清水潭下淹髙寳等七州縣田畝嗣此淮流仍舊旁洩仍不助黄刷沙清口以下黄運兩河仍必淤墊此駱馬湖以上南岸不治必壊運道之情形也北岸一決其水必由駱馬湖之後横衝邳宿運河將河底并駱馬湖底積漸淤髙嗣此東省山泉諸流不能暢行一遇伏秋淤漲則濟寧魚臺嘉祥鉅野滕嶧等州縣之田畝必至淹没運河堤工亦必至於潰衝此駱馬湖以上北岸不治必壊運道之情形也至於黄河上流有決則下流必淤故駱馬湖以下至清口一帶攸闗運道之黄河必得駱馬湖以上無旁洩之事方能深通是以凡此兩岸危險情形均當逐一修治也合而計之清江浦以下之河身不挑堤岸不築不用鐵掃箒等器設法加浚河身并浚海口則黄淮無歸黄運兩河并髙家堰一帶之各岸堤處處皆可衝漫見在決口雖大費錢糧堵塞堅固而此塞彼衝終歸無益下流既挑浚疏通矣而清口以上爛泥淺一帶不挑引河則淮流不暢湖水不能速下髙堰一帶之堤岸尚屬堪虞爛泥淺一帶既挑引河矣而下自清口武家墩歴髙家堰髙良澗以至周橋閘一帶殘缺之堤不行加幇髙厚并不築翟家壩之堤堵塞大小三十四處決口及成河九道之處則淮水旁分刷沙不力黄水必仍内灌而兩河必仍淤墊是以今日治河之道疏下流幇堤岸堵決口皆屬至緊之工誠緩一不可者也至於山清髙寳一帶運河必須深挑以通重運此又不待言者矣總之下流既疏殘堤既幇決口既堵則淮水可使徑直趨海然後併堵楊家莊決口急挽黄流使之赴清口㑹淮則故道可復河道既可復故而并將駱馬湖以上兩岸卑薄殘缺之處逐一修治再行設兵看守之法庶幾可保乆逺而不致扵徒費錢糧徒勞民力也臣謹將各本内事宜逐一詳加確議分疏題覆靳文襄公經理八疏摘鈔行水金鑑巻四十八
