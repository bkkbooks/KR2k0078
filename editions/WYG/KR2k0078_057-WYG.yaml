body:
  text: 行水金鑑巻五十七江南按察使傅澤洪撰河水考城縣臨河堤上自儀封縣交界起下至商邱縣交界止計長五十四里第一段自儀封縣交界起至石家樓後止長六百三十丈康熙七年幇接壩堤坐落二堡北第二段自石家樓後起至小顔家集西歳修工頭止長六千九百六十丈又康熙二十四年加幇五千四百二十七丈坐落秦家集西第三段自小顔家集西起至商丘縣交界止長二千二百丈康熙二十二年幇接坐落小顔家集北月堤自儀封縣交界起至壩堤中間止長二百丈康熙八年創築重堤坐落一堡月堤自一堡重堤起至石家樓後止長四百丈康熙十一年創築坐落三堡商邱縣臨河堤上自考城縣交界起下至虞城縣交界止計長三十六里第一段自考城交界起至傅樓止長一千四百丈係逺年老堤坐落一堡北第二段自髙家莊迤東起至河夫營止長六百一十二丈康熙二十三年幇接坐落蘇家樓西北第三段自河夫營西加幇工尾起至清水河西止長一百三十八丈係逺年老堤坐落河夫營東第四段自傅家莊西河夫營起至李家鹽店止長一千五十丈康熙二十二年創築坐落九堡第五段自九堡堤東起至老堤中身止長六百四十丈康熙二十四年幇接坐落李家鹽店北第六段自蔚家閣壩頭起至二十三年加幇工頭止長四百一十丈係逺年老堤坐落蔚家閣東第七段自邵家莊起至薛家莊後止長七百二十丈康熙二十三年幇接坐落十五堡第八段自二十三年加幇堤起至二十三年加幇八段工頭止長四百五十五丈係逺年老堤坐落蒙墻寺後第九段自閻家莊後起至崔家樓後止長二百四十二丈康熙二十三年幇接坐落崔家樓後第十段自二十三年加幇堤起至虞城交界止長九百四十丈係逺年老堤坐落二十堡徐家莊月堤自考城交界起至周家莊止長一千三百五十丈康熙二十三年幇接坐落楊家堂西楊家堂創築月堤自楊家堂北頭起至髙家莊南北老堤中身止長一千五十丈康熙十八年創築坐落楊家堂東傅家莊創築月堤自河夫營迤西埠口起至李家莊後止長一千一百三十丈康熙二十六年創築坐落李家莊西北祖師廟後月堤自祖師廟後起至老壩臺止長一百八十丈係逺年老堤坐落祖師廟後老壩臺自小壩堡房基起至小大王廟止長八百二十丈坐落小大王廟西舊堤自小大王廟起至蔚家閣後壩頭止長一百四十丈係逺年老堤坐落小大王廟東舊堤自蔚家閣西老堤起至康熙二十三年加幇隄止長四百二十丈係逺年老堤坐落蔚家閣北舊壩自本壩堤岔起至康熙二十三年加幇堤止長七百五十丈康熙十二年幇築坐落十六堡西北舊月堤自康熙二十四年堤工起至邵家莊後康熙二十三年幇築堤止長四百八十丈係逺年老堤坐落潘侯集北舊月堤自小壩堡房基起至崔家樓東北老堤止長三千二百四十丈係逺年老堤坐落崔家樓南舊月堤自雙廟西邊起至南老月堤止長三百四十丈係逺年老堤坐落邵家莊南虞城縣臨河堤上自商丘縣交界起下至江南碭山縣交界止計長八十三里第一段自商丘縣堤界起至土樓止長三千二十二丈康熙二十三年幇接坐落徐家莊東第二段自土樓起至韓家樓止長三千一十五丈康熙十九年幇修坐落周家樓北第三段自韓家樓起至大王廟止長一千二百二十丈康熙二十四年幇修坐落韓家樓東第四段自大王廟起至田家廟止長一千六百三十二丈康熙十九年幇修坐落田家廟西第五段自田家廟起至牛頭堌寺止長一千一十丈康熙十八年幇修坐落田家廟東第六段自牛頭堌寺起至彭家集後止長一千三百八十一丈係康熙二十四年新收山東單縣堤工坐落牛頭堌寺北第七段自彭家集後起至盧家廟止長三千三百四丈康熙十九年幇接坐落馬家坊前第八段自盧家廟起至尹家集後止長五百二十二丈係康熙二十四年新收山東單縣堤工坐落尹家集北第九段自尹家集後起至張家集西止長一百一十二丈康熙十九年幇修坐落尹家集東第十段自張家集西起至張家集東止長四百一十八丈係康煕二十四年新收山東單縣堤工坐落張家集北第十一段自張家集東起至小喬家集東江南碭山堤界止長一千三百四十丈康熙十九年幇接坐落小喬家集西月堤自蕭家莊前大堤起至周家樓後大堤止長一千三百五十丈順治六年創築坐落周家樓西月堤自賀家莊大堤起至劉家莊後重堤止長七百五十丈康熙九年創築坐落劉家莊北月堤自劉家莊西起至歸鴻集後重堤止長五百六十丈康熙十二年幇築坐落劉家莊後月堤自大王廟大堤起至大賓寺大堤止長一千三百丈康熙五年創築坐落歸鴻集後月堤自甄家樓西大堤起至彭家集後大堤止長一千一百五十丈順治十二年創築坐落彭家集西北月堤自薛家樓後大堤起至杜家樓東大堤止長一千五十丈康熙三十四年創築坐落薛家樓東黄河北岸滎澤縣臨河堤上自武陟縣交界起下至原武縣交界止計長八里五分零西自武陟縣隄界起東至原武縣堤界止長一千五百三十七丈康熙二十三年大修加幇坐落五禄店前原武縣臨河堤上自滎澤縣交界起下至陽武縣交界止計長四十里第一段西自滎澤堤界起東至孟家莊西止長二千四百三十四丈康熙二十三年大修加幇坐落胡唐家莊前第二段西自孟家莊西起東至馬家莊前止長五百一十二丈係逺年老堤坐落車家莊前第三段西自馬家莊前起東至陽武縣堤界止長四千二百五十四丈康熙二十三年大修加幇坐落張家寨前月堤西自王村正南大堤根起東至孔家莊後月堤根止長九百九十丈係逺年老堤坐落胡唐家莊後月堤西自吳家莊西大堤根起東至董家莊東大堤根止長九百九十丈係逺年老堤坐落孟家莊後月堤西自胡村鋪西大堤根起東至黄家寺東大堤根止長四百九十八丈係逺年老堤坐落胡村鋪黄家寺後陽武縣臨河堤上自原武縣交界起下至封丘縣交界止計長三十八里第一段西自原武隄界起東至張家寨迤東堤頭止長一千九百九十丈康熙二十五年歲修加幇坐落奶奶廟前第二段西自張家寨迤東堤頭起東至雁李家西止長二千一百丈康熙二十三年創築坐落大賓前第三段西自雁李家西起東至封丘縣堤界止長二千七百八十四丈康熙二十五年歲修加幇坐落水牛趙家莊前月堤西自黑洋山起東至雁李家西大堤根止長七千二百丈係逺年老堤坐落本縣南封邱縣臨河堤上自陽武縣交界起下至祥符縣交界止計長三十四里第一段西自陽武堤界起東至三李家門前止長一千八百七十二丈康熙二十三年大修加幇坐落東姜家寨前第二段西自三李家門前起東至中鑾城西頭埠口止長一千三百一十六丈係逺年老堤坐落于家店前第三段西自中鑾城西頭埠口起東至中鑾城東頭止長一百四十七丈康熙二十三年大修加幇坐落中鑾城前第四段西自中鑾城東頭起東至荆隆口正南止長八百一十三丈係逺年老堤坐落荆隆口前第五段西自荆隆口正南起東至荆隆口東頭止長八十八丈康熙二十三年大修加幇坐落荆隆口東第六段西自荆隆口東頭起東至祥符縣堤界李七寨止長二千零三十八丈内龍門口一處長一百五十三丈康熙二十四年下埽加幇坐落桑園神馬前月堤西自蘿蔔鄭家門前大埠口起東至祥符縣堤界止長四千三百四十二丈係逺年老堤坐落楊家樓後格堤西自三李家西堤根起東至于家店寺西堤根止長二百九十丈係逺年老堤坐落三李家前縷水堤西自于家店迤東舊堤根起東至中鑾城迤西舊堤根止長五百五十丈係逺年老堤坐落于家店東舊月堤西自劉家樓正南舊堤根起東至中鑾城迤西舊堤根止長八百五十丈係逺年老堤坐落劉家樓東月堤西自于家店西頭舊堤根起東至十七堡止長五百七十丈康熙元年建築坐落于家店後月堤西自神馬後舊堤根起東至祥符縣李七寨門前堤根止長六百一十丈康熙六年建築坐落李七寨西月堤西自温家樓後迤東舊堤根起東至闗王廟迤東舊堤根止長三百三十丈康熙二十五年建築坐落闗王廟後格堤南自荆隆口東渡頭臨河堤根起北至月堤根止長四百二十丈康熙八年歲修加幇坐落荆隆口東北祥符縣臨河堤上自封丘縣交界起下至陳留縣交界止計長五十里第一段西自封丘縣李七寨前堤界起東至北堡東止長一千二百七十丈康熙九年加幇坐落新店前第二段西自五堡東起東至八堡東堤頭止長一千五十丈係逺年老堤坐落陳橋西第三段西自八堡東頭起東至十堡西堤灣止長三百七十丈係逺年老堤坐落陳橋前第四段西自十堡西堤灣起東至大王廟大埠口止長五十丈係逺年老堤坐落陳橋正南第五段西自大王廟大埠口起東至魁星樓止長一百六十丈係逺年老堤坐落陳橋東南第六段西自魁星樓起東至十一堡東堤頭止長四百四十丈係逺年老堤坐落三府莊西第七段西自十一堡東堤頭起東至十二堡止長十五丈康熙二十四年加幇坐落蔣家寒西第八段西自十二堡起東至十五堡東止長九百九十九丈順治七年加幇坐落馬坊前第九段西自十五堡東起東至賈家堂東止長五百丈順治十八年加幇坐落厰門口西南第十段西自賈家堂東起東至十八堡西止長四百二十五丈順治十八年加幇坐落厰門口前第十一段西自十八堡西起東至十九堡東堤頭止長四百三十丈係逺年老堤坐落邵王寨正南第十二段西自十九堡東堤頭起東至大王廟東堤頭止長一百七十丈係逺年老堤坐落邵王寨東南第十三段西自大王廟東堤頭起東至二十堡止長四十五丈係逺年老堤坐落邵王寨東南第十四段西自二十堡起東至二十一堡止長五百六十丈康熙元年加幇坐落邵王寨東第十五段西自二十一堡起東至二十二堡止長三百二十丈康熙四年加幇坐落清河集西第十六段西自二十二堡起東至常家寨西大王廟止長四百丈係逺年老堤坐落常家寨西第十七段西自常家寨西大王廟起東至二十四堡止長二百二十丈康熙二十四年加幇坐落常家寨東第十八段西自二十四堡起東至陳留堤界止長一千六百八十丈康熙十九年加幇坐落韓羅灣前陳橋西月堤西自張新莊前牛角哨起東至十堡西止長一千一百三十七丈係逺年老堤坐落陳橋西陳橋後月堤西自封丘堤界起東至王盧集東頭止長五千零七十丈康熙八年加幇坐落陳橋北陳橋前夾堤西自魁星樓東起東至十二堡堤頭止長三百八十丈係逺年老堤坐落陳橋東南王盧集前月堤西自王盧集東南堤根起東至王盧集東北堤岔止長六百零二丈係逺年老堤坐落王盧集東馬房後月堤西自王盧集東起東至馬房東埠口止長五百二十丈係逺年老堤坐落馬房後邵王寨後重堤西自馬房東堤根起東至邵王寨東大堤根止長七百五十三丈係逺年老堤坐落厰門口後厰門口後月堤西自十八堡起東至大王廟止長五百七十丈係逺年老堤坐落厰門口東厰門口東月堤西自厰門口西起東至邵王寨東止長五百八十丈係逺年老堤坐落邵王寨後張家寨後月堤西自丁家莊前岔堤起東至常家寨西堤岔止長一千一百三十七丈康熙三年創築坐落張家寨後張家寨斜月堤南自大堤起北至月堤止長二百五十丈係逺年老堤坐落張家寨東清河集後重堤西自堤岔起東至常家寨後月堤止長六百四十丈康熙元年創築坐落清河集後清河集後月堤西自二十二堡起東至新寨止長九百九十丈係逺年老堤坐落