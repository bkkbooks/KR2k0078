body:
  text: 行水金鑑巻五十八江南按察使傅澤洪撰河水山東曹單二縣俱在黄河北岸薈蕞云曹縣在山東兖州府曹州南一百里南有曹山西南有黄陵岡元賈魯開黄河故道始此明𢎞治中河決亦於此南有黄河嘉靖河決梁靖口隆慶築迎溜埽灣逼近老堤最為險要而武家壩尤甚此壩潰決則城武金鄉皆成沮洳且東鄰閘河遏防尤要西北有賈魯河嘉靖前尤為運道自黄陵岡塞而此河遂填其南為大河洪流矣北有古汜水黄河之在縣境者百二十餘里其渡口有六曰武家口曰曹家口曰王李口曰蔚邢口曰劉家口曰李家口皆津要也舊月堤十有七府本朝増共二十有二又壩十有四單縣在兖州西南二百十里南有黄河自曹縣流入東入豐縣岸長七十里要本朝順治初決栁河口康熙九年決瞧龍寺單境害瞧龍寺石家樓第一鄧家董家兩水口次之順治六年築瞧龍寺月堤一道禦曹境滿河之水今沙淤加髙石家樓攔水壩堤臨河埽塌故加厚攔水壩大堤外黄家營莊河岸低窪黄水暴發先從此出􅈇故於本莊迤東横築縷水堤一道以防河患鄧家水口有老堤堤根單薄故於堤北加幇戧一道是為單境急務單河南岸與河南虞城交錯有遙堤二千四百餘丈久殘缺康熙十九年合曹州曹縣定陶單縣城武金鄉六處徭夫加幇髙厚又加兩月河引水殺流河患始弭然積久傾圮當未兩綢繆也上自河南儀封縣交界起由考城縣境三十里而入曹縣一百四十里而入單縣又六十里出單境而達於江南碭山縣共計二百三十里屬兖州府黄河同知一員管轄曹縣黄河自河南考城縣東界入境康熙二十五年以考城北岸堤工三十里與曹境相連應歸曹縣就近修防故今所管堤工上自河南儀封縣交界起下至單縣交界止計長一百七十里設有縣丞主簿巡檢各一員分管河務安陵巡檢分管堤工五十里内歸併考城縣臨河堤自儀封縣交界起至戴家樓後止計長三十里又自戴家樓後起至主簿分管交界止計長二十里歴年歲修内有黄家莊西臨河堤一段長二百六十五丈馮家厰西臨河堤長一百二十二丈康熙四十一年加幇上自張官營後界石起下至臨河堤止格堤一道長三百九十六丈康熙三十五年創築上自儀封縣交界起下至黄家水口前裏河堤止遙月堤一道長一千二百五十五丈康熙三十八年創築上自儀封縣界石起下至備堤止月堤一道長一千二百丈歴年歲修上自月堤起下至裏河堤止備堤一道長一百二十八丈康熙二十七年創築上自臨河堤起下至備堤止戧堤一道長二百九十三丈上自臨河堤起下至裏河堤止小戧堤一道長一百一十三丈上自黄家水口前起下至大王廟西止裏河隄一道長九百三十八丈上自裏河堤起下至天齊廟西止月堤一道長九百四十五丈上自天齊廟西起下至楊家道口止月堤一道長一千五百一十八丈上自關王廟起下至臨河堤止月堤一道長五百六十丈上自尹家墳起下至天齊廟西止月堤一道長四百七十五丈上自唐家水口西起下至囘龍王廟西止䕶堤一道長六百九十丈上自囘龍王廟後起下至崔家莊東止月堤一道長三百七十丈上自楊家道口起下至流通集西止月堤長五百五十五丈以上堤工俱歴年歲修上自臨河堤起下至主簿分管止月堤康熙四十一年修築主簿分管堤工上自巡檢分管交界髙家莊後起下至縣丞分管交界李家樓東止計長七十里臨河堤歴年歲修青山廟前月堤上自十字堤起下至埽壩止長一千二十丈康熙三年創築銅奶奶廟北新補月隄上自青山廟前月堤起下至新月堤止長一千五百五十八丈康熙三十九年修築銅奶奶廟北遙月堤上自青山廟前月堤起下至草樓西新月堤止長二千七百四十丈康熙四十年創築四十一年又加幇銅奶奶廟向稱極險雖經添築月堤猶不足恃且劉信莊坍卸㡬至堤根去此切近危迫尤甚故又添築此堤劉信莊月堤上自臨河劉滿莊堤起下至臨河舊老堤止長三百五十五丈歴年歲修趙家集西月堤上自新月堤起下至劉信莊月堤止長一千一百八丈内二百九十五丈康熙四十一年加幇草樓前新月堤上自臨河堤起下至臨河新月堤止長二千八十八丈内五百三十丈康熙四十一年加幇魚鱗月堤上自臨河備堤起下至遙月堤止長八百六十丈康熙二十六年創築曹巴莊廟後遙月堤上自魚鱗月堤起下至楊釗口月堤止長二千九百三十丈康熙二十五年創築楊釗口月堤上自謝家集南縷水堤起下至楊釗口縷水堤止長七百九十二丈歴年歲修黄家奶奶廟後月堤上自楊釗口月堤起下至李家樓東臨河堤止長九百四丈歴年歲修縣丞分管堤工上自主簿分管李家樓東交界起下至單縣交界止計長五十里臨河堤歴年歲修梁家樓西月堤上自臨河堤起下至大大王廟西止長一千三百二十丈内六百三十丈康熙四十一年加幇大大王廟東䕶堤上自大大王廟起下至臨河堤止長二百九十三丈歴年歲修韋家樓後月堤上自安家莊東起下至孫家莊東堤岔止長一千九百八十三丈内五百六十四丈康熙四十一年加幇單縣黄河上自曹縣交界起下至江南碭山縣交界止計長六十里設有主簿一員專管河務臨河堤從前原係攔水壩斷續不一惟是險要之處添設以䕶縷水堤者後因縷堤之外攔壩之内村莊漸稠防禦愈急遂將各壩接連築成長堤名攔水堤自明季相沿已久今改名臨河堤俗又稱三堤離河三四五六里不等隨河蜿蜒計長六十里上自曹縣交界起由瞧龍寺基而下至頭鋪止長一百五丈係舊堤康熙三十一年修築南北月堤自頭鋪起至峨􅖭殿止長六百六十丈此隄專防曹縣上流直下之衝溜最為緊要康熙四十一年於歲修案内估修峨嵋殿後斜月堤係老堤長四百二十三丈未經加修孫家集後臨河堤自峨􅖭殿起至鄭家樓前止長七百丈康熙三十一二三年修築石家樓前臨河堤自鄭家樓前起至董家小莊後止長一千一百四十六丈康熙三十五三十八兩年修築石家樓臨河堤後月堤自鄭家樓前起至石家樓東臨河堤止係老堤未經加修石家樓後臨河堤自董家小莊後起至董家營月堤西頭止長一百八十五丈康熙四十一年修築董家水口即董家營後臨河堤自董家營起至趙家樓前止長一千四百八十丈康熙三十三三十七兩年修築董家營臨河堤後備䕶月堤自石家樓西起至鄧家林止長九百二丈康熙三十三年創築三十四年加幇趙家樓東南北格堤南自臨河堤起北至縷水堤止長三百二十五丈康熙二十五年創築歴年歲修格堤迤東臨河堤自格堤頭起至黄家莊前止長五百五十三丈康熙三十八三十九兩年修築火星廟後九鋪迤東臨河堤自本堤起至郭家莊前止長二百一丈康熙四十一年修築桑堌寺後臨河堤自黄家莊起至鄧家莊止長七百六十五丈康熙三十七三十八兩年修築鄧家水口迤東臨河堤自本堤起至郭家莊後止長一千八百一十六丈歴年歲修孟家樓臨河堤後月堤自孟家樓西起至孟家樓東止係逺年老堤未經加修朱王口北臨河堤後舊月堤自朱家莊迤西臨河堤起至許家莊東止係逺年老堤未經加修包家瓦房前臨河隄自十四鋪起至月堤頭止長五百一十丈康熙四十一年修築許家莊前臨河堤自許家莊前起至姜家莊西止長六百五丈康熙四十一年修築楊家樓前臨河堤後修䕶月堤自楊家樓前起至鄭家店西止長五百二十丈康熙三十五年創築三十六年加幇鄭家店前臨河堤自鄭家店前起至朱王六壩西頭止長三百五丈歴年歲修朱王大壩臨河隄自大壩西頭起至大壩東頭止長四百一十五丈康熙三十二年修築朱王大壩東臨河隄自朱王大壩東頭起至黑龍潭西頭止長九百九十三丈康熙三十二三十九兩年修築黑龍潭臨河堤長五十丈係逺年老堤未經加修黑龍潭東臨河堤自黑龍潭東起至江南碭山縣交界止長三百一十丈康熙三十九年修築縷水堤俗名二堤離臨河堤十里上自曹縣交界起下至江南豐縣交界止計長五十四里明時所築嚮為河防首重之堤嗣將攔水壩築成臨河長堤則門戸之捍禦巳在臨河為重而縷堤次之矣然邇年以來修守不敢稍懈一有殘缺即督令補築屹然仍為重門之障云太行堤離縷堤十里上自曹縣交界起下至江南豐縣交界止計長六十九里明𢎞治十年河決黄陵岡大傷張秋運道始築此堤曹單二邑堤工舊例不動帑金惟資額設之夫為數有限而汛險工長顧此失彼且正月集夫二月興工三月間工未就而桃汛至五六月而伏水發七八月而秋水溢時時可慮在在須防固工程而嚴守禦司事者所當加意者也江南徐州黄河薈蕞云黄河入河南與沁汴或分或合明初分六道出滎陽者至夀張入淮出祥符者至懷逺入淮出長垣者至陽榖入漕出歸徳者至宿遷入􅈇出儀封者由新集趙家圈經蕭北至徐小浮橋入漕此河流經徐之始也治水筌蹄云嘉靖六年以前黄河分為六道其兩道由河南鳳泗入淮其四道由小浮橋飛雲橋大小溜溝入河時則開歸徐沛利害相當今開歸沛諸流俱湮全河悉經徐州一道則開歸沛之患紓而徐邳之患博其不兩利亦不能兩害者勢也河在徐州土人呼為汴河又名沁河又名小黄河按􅈇河志河居中汴居南沁居北河南徙則與汴合北徙則與沁合故此河之名有三今沁水久不達唯河合於汴爾汴由西來勢甚湍悍迤州城之東北與泗水合故稱汴泗交流而河徙西北出秦溝流至州城東南而下則其名亦不可混矣黄樓在州城東門上宋蘇軾建按蘇轍黄樓賦序曰熙寧十年七月乙丑河決於澶淵東流鉅野北溢於濟南溢於泗八月戊戌水及彭城余兄子瞻適為彭城守水未至使民具畚鍤蓄土石積芻茭完窒隙穴以為備自戊戌至九月戊辰水及城下者二丈八尺雨晝夜不止子瞻衣䙝履屨廬於城上調急走發禁卒以從事令民毋得竊出以身率之城得不潰水既涸乃請増築徐城相水之衝以隄防之于是即城之東門為大樓堊以黄土曰土能勝水徐人相勸成之今城之東角尚有黄樓葢後人踵而為之然非其舊矣徐吕二洪古稱最險自永樂中陳瑄鑿洪通漕各設分司官治洪事至嘉靖間分司主事陳穆陳洪範相繼鑿石平之行者遂若履坦道矣南岸上自河南虞城縣交界起下至靈璧縣交界止計程二百六十里北岸上自山東單縣交界起下至邳州交界止計程二百七十一里設徐屬河務同知管里修防其汛六在南岸曰碭山縣汛蕭縣汛薈蕞云碭山縣在江南徐州西北一百七十里縣治在芒碭山之陽山在河南永城縣界黄河繞縣西北五十里東北二十里與虞城縣接界南郭外有新滙澤河徙而成南北可二十里東西四十餘里經冬不竭明隆慶二年知縣戴偉鑿渠疏洩尋湮六年知縣王廷卿更開新渠以蘇昏墊有陳霜口河由虞城縣至汪家口分為二汗漫若湖明嘉靖二十六年知縣王紹元於汪家口築堤一道又為月堤順水堤然碭山地勢窪仰低下屢經水患地浮淤沙雖節經疏鑿遇漲率易故河渠之名變遷不常蕭縣在徐州西三十里縣治在三台山之陽黄河自碭山縣楊村口始入縣東百里許至於州界遷徙無常水患頻仍康熙十七年總河靳創建沿河遙堤格堤及迎水壩甚有利益其遙堤由楊村口入縣之邵家套及徐州順河集復至縣之大栁樹田家樓郝家集及北城楊家莊接徐界而東其格堤南自東鎮店舊長堤起北至舊縷堤止障水南下毛城鋪入閘蕭無水患全賴此堤其迎水一壩在田家樓縷水歸河又利導之宜也誠能修防堅固不獨蕭無水患而下流亦無波及之虞矣徐州郭工汛徐州小店汛在北岸曰豐碭汛薈蕞云豐縣在徐州西北百五十里南至碭山縣七十里至蕭縣六十里黄河在縣南五里許土人呼為濁河一名白羊明嘉靖五年河決城䧟蕩然無存知縣髙禄遂遷縣治於東南華山居焉三十一年知縣徐蓂復還舊治萬歴三十年河決朱旺口縣當正衝洚澗殷流幾與堤平知縣戴一松防守維勤益修繕舊堤加濶而髙至今賴以捍禦徐州大壩汛碭山縣汛自虞城縣交界起至蕭縣交界止縷堤長一萬四千四百一十七丈計程八十里自虞城縣交界起至毛城鋪止舊有縷堤長一萬五百六十丈八尺内近毛城鋪山石閘一段長一千五百四十丈康熙二十三年修築自毛城鋪石閘起至蕭縣界止縷堤長三千八百五十六丈康熙二十三年修築毛城鋪小石閘一座大石壩一座俱康熙三十三年建伏秋黄漲由此出小神湖康熙三十九四十年河身漸深水不過閘惟四十一年異漲之水出閘定國寺舊險工今因河勢北徙停修定國寺月堤長一千九十丈康熙三十八年創築蕭縣汛自碭山縣交界起至徐州交界止縷堤長一萬一千六百八十九丈計程六十五里康熙二十三年修築内有卑薄處三十八年又加幇東鎮口格堤長八百六十四丈康熙十九年創築格堤北有大横堤格堤南有小横堤皆舊廢堤河防雜説云黄河南岸上自碭山縣毛城鋪起下至徐州城止雖原有遙堤一道然近者離河五七里逺者離河二三十里其間地勢髙窪不等毎於伏秋異漲之時河水必從窪處出􅈇直灌堤根自順治初豫省荆隆口潰決全黄北瀉之後下流河身處處墊髙彼時雖竭力堵塞而河底之深究不能復前此之舊又黄河消長無定長則出漕消則歸􅈇方其出漕之時挾沙而漫迨水落歸漕而沙留於岸是以近河灘地每為淤墊較之二三十里外原舊築堤之地竟髙五七尺或丈餘不等故直灌堤根之水不一二日而水髙於堤少窪之處漫溢成缺歲歲然也不知此水下注不特鳳徐淮属州縣毎被漫淹而其水全歸洪澤湖撼擊髙家堰髙堰一有不支則全淮東瀉黄躡其後而清口淤運河墊清水潭等工皆不可保矣是徐州以上碭蕭黄河南岸堤工雖與運道隔逺而實與運道相闗甚切也康熙十九年於近河髙灘之上已築縷堤一道約長一萬八千餘丈固可免十一州縣之水災但属卑矮不足以禦非常異漲更須幇築髙厚務期堅實又於蕭縣東鎮店地方築格堤一道約長八百餘丈有此一堤雖遇異漲自有重門之障潰決之患永可免矣徐州郭工汛自蕭縣交界起至徐州三山頭止計程六十六里自蕭縣交界起至徐州王家山止縷堤長三千四百五十八丈康熙二十三年修築内有單薄處三十八年又加幇王家山天然石閘一座康熙二十三年建以洩黄漲自三十九年至今河底漸深水不過閘十八里屯東西兩頭各天然石閘一座康熙二十三年修築自苖家山起至冰雹山止縷堤長一千五十丈康熙三十八年創築自韓家山起至段家莊西頭止舊有民修堤長四百九十三丈康熙三十八年加幇韓家山南山溝中舊有民築土堰長七十三丈康熙三十八年加幇韓家山堤工因黄河上灣溜水南射逼近堤根内鄰石狗湖地勢卑下最闗𦂳要康熙三十九年創築月堤自楊家樓起至段家莊止長四百五丈以為重門之障段家莊舊險工康熙三十九年於對岸沙觜挑穵引河大溜下徙郭家觜險工因黄水自西南直射北岸蘇家山觸激山根折奔南岸以致郭家觜奶奶廟一帶正當大溜頂衝歴年以來大溜或由奶奶廟之上或由奶奶廟之下忽東忽西遷徙無常康熙三十九年臣鵬翮勘閱形勢逼近徐城最為緊要題請建修石岸長五百三十九丈三尺現在修砌四十年置鐵犀一座於堤上以鎮水自雲龍山黄茆岡起至徐州西關街柵欄門止蘇堤長六百三十八丈康熙三十八年修築徐州志載蘇軾禦水築東南長堤起戲馬臺属於城天啓甲子河決城潰堤僅存一線今土人所稱蘇堤又在城西南自黄茒岡属城西闗與志不同意當日水消之後軾又嘗築堤為備而志考之未詳與戲馬臺在城南里許髙數十仞廣袤數百步昔項羽因山築臺以觀戲馬宋武帝為宋公時在彭城九月九日出遊戲馬臺是也徐州舊有䕶城石岸長五百一十五丈康熙三十六年加髙三尺六寸又攩軍墻南渡口長一十二丈九尺三十六年創砌河防雜説云徐州州城以上碭豐蕭徐四州縣黄河南北兩岸雖經新築縷堤然自河底墊髙以來徐州治城卑如釡底而人烟凑集緊貼河邉河身寛不過六七十丈束水至急若不於上流稍留宣洩之地則一逢異漲勢必灌淹州城民社倉庫俱為澤國矣今於碭山縣南岸毛城鋪地方建三十丈寛減水石壩一座又於徐州北岸大谷山地方建三十丈寛減水石壩一座使上流雖遇十分異漲而先於南岸毛城鋪減去半分再於北岸大谷山減去半分方可少殺其勢而徐城可保無虞矣其所減之水先貯碭山縣南岸之小神湖内逐漸流入濉河由歸仁堤減水壩歸入洪澤湖此係逐漸宣洩之水與漫決奔騰之勢不同不足為髙堰各工之患也若欲盡善又須於蕭縣黄河南岸北自舊縷堤起南至東鎮口止築格堤一道約長八百六十餘丈所以束毛城鋪減下之水并上流各處匯歸雨水亦使暫住小神湖内其小神湖乃係堤裏窪地雨多則積水成湖亢旱則乾涸成地今貯減下之水分流南洩既殺其奔騰之勢亦無害於小神湖自可永無衝決之虞矣下洪奎山店堤一道長一百二十七丈嚮係民修其戧堤康熙三十七年幇築此堤外臨黄河内傍支河最為險要三十八年改挑支河二百丈以保隄工自七里溝接奎山店堤起至三山頭止遙堤長一千四百九十丈内接奎山店堤長二百二丈康熙三十七年加幇又接奎山店堤戧堤長二十九丈三十八年築又卑薄處三十八年加幇徐州小店汛自三山頭起至靈璧縣交界止縷堤長八千八百六十丈計程四十九里康熙二十三年修築潘家馬路歲修險工長六十四丈康熙四十年間因對岸新生雞心灘大溜埽灣崖岸坍塌遂成險工楊横莊歲修險工長四百三十五丈埽臺長四百一十四丈康熙三十七年加幇楊横莊挑水壩西雁翅歲修險工長四十二丈楊横莊月堤長三千四百三十六丈康熙三十一年修築曹家莊搶修險工長八十六丈曹家莊月堤長四百六丈康熙三十八年創築潘家馬路楊横莊曹家莊三險工相連北岸沙觜逼溜頂衝康熙四十年内遵㫖取直於北岸開穵引河一道長一千八十丈引水東下以殺其勢楊家窪歲修險工長三百二十三丈埽臺長三百五丈康熙三十六年加幇楊家窪月堤長七百二十丈康熙三十八年創築韓壩舊險工月堤長三百五十六丈康熙三十八年修築小店歲修險工長三百一十丈河防雜説云小店受頂衝大溜葢其水受長樊大壩折而來南者也下埽修防歴年已久幸河勢不變故得無恙小店月堤二道一長三百九十丈康熙三十六年修築一長三百六十丈三十六年因河勢下徙創築自小店迤東起至靈璧縣界止有民築臨河子堤長四千五十三丈豐碭汛自單縣交界起至徐州李道華家樓止縷堤長一萬三千一百九十三丈二尺計程七十三里河防雜説云黄河北岸有原有舊遙堤者有原無舊遙堤者無堤之處固不待言而有堤之處俱離河三四十里不足以資束水故於單縣界起下至徐州李道華樓止築縷隄一道此足以障意外之水矣其李道華樓以下地勢稍髙可以不必築堤設遇百分異漲之年雖有毛城鋪大谷山兩壩宣洩倘去不及又藉此無隄之地以宣洩之庶一切堤工與徐州治城俱可永保無患矣自單縣交界起至吳家寨止舊有民修縷堤長一千丈康熙三十八年加幇自呉家寨起至李道華家樓止縷堤長一萬二千一百九十三丈康熙二十三年修築卑薄處三十八年加幇吳家莊搶修險工長一百二十五丈五尺此工向係歲修因康熙三十九年於上壩頭築迎水壩一座迎挑水勢使大溜向南又於對岸穵去灘觜以順其流險工漸平四十年遂改為搶修谷家莊歲修險工長一百八十五丈谷家莊即在吳家莊之下康熙三十九年九月閒全黄直射此工堤岸坍塌一百七十餘丈危險異常將此工題入歲修吳家莊谷家莊險工相連康熙三十九年加幇埽臺長二百四十八丈又築月堤長九百四十三丈徐州大壩汛自李道華家樓起至邳州交界止計程一百九十八里自李道華家樓至蘇家山無堤之處計九十里蓋因黄河上游寛濶而徐城以下窄狹一遇大漲即難容受故從來不議築使漫溢之水從岡頭湖荆山口輾轉入於運河也自大谷山起至蘇家山止堤長四百四十七丈康熙三十八年修築内有大谷山石壩一座蘇家山石閘一座俱二十三年建以洩黄水異漲自陡山起至子房山止縷堤長一千三百一十五丈康熙三十八年修築内有鎮口閘一座今沙淤黄山口民修小堰長九十丈康熙三十八年加幇自華家樓起至長山頭止民修隄長一千九百六十丈康熙三十八年加幇卑薄處内狼矢溝歲修險工長二百五丈狼矢溝月堤長八百丈康熙二十五年修築自闗王廟起至大壩上壩頭止民修堤長五百九十五丈長樊大壩歲修險工一段長三百二十丈大壩險工舊有月堤長四百九十丈自大壩尾起至王家山止民修隄長九百八十丈自王家山起至出頭山止天生土壩長九十六丈自九山起至出頭山止遙堤長一千六百八十九丈為大壩險工重門之障康熙三十八年修築河防雜説云黄河過徐州二十里折而往北遂成長樊大壩險工四百五十五丈此工内係窪區大溜頂衝最為險急設有疎失則滕嶧邳宿運河俱成平陸矣雖歲歲下埽未嘗少弛然非久逺之計須於九山出頭山之中創築遙堤一道以防意外之虞此為重門之障不可不加意也自董家山起至盧家山止遙堤長一百八十二丈康熙十九年創築自盧家山起至邳州界止遙堤長一千四百八十二丈康熙十九年創築以上俱張文端治河書以靳文襄公治河書云自徐邳至海口千有餘里險工甚多有昔險而今平者亦有昔平而今險者蓋河道變遷衝刷不常之所致也前代河患在北其險多在開封大名河間東兖間今河患在南開封所属唯滎澤北門一險當歲加埽土以防之東省唯曹縣傅家集一險向挑引河尚未成此河一成便可變險為平若江南則自徐州以下險工不可屈指詳記之冀後此司河者加之意焉處徐州南岸險工三曰郭家觜乃治西南䕶城隄盡曰楊家窪在長樊大壩南曰小莊在楊家窪東其北岸險工曰長樊大壩河防雜説云徐州城東黄河北岸狄家山向有涵洞小閘一座併兩頭廢堤今議欲築堤一道不知此係山岡老土黄河異漲之時聼其漫流由山後小河經邳州彭家河入運河諒不至成患若一經築堤則束水不洩邳州一帶工程未免擔險愚意不復築堤聼其為天然減水壩可也徐州北岸花山一帶原属卑窪之區向來漫水自康熙十六年引動大溜㡬至奪河其水漫淹邳宿兩處田地由駱馬湖仍入黄河迨至十九年春夏之間下埽堵築斷流又於董家山起歴龎家山至邳州工界止動帑創築遙堤一千六百六十餘丈以為經久保障年來宿民稍稍受益兩邳地亦涸出甚多矣行水金鑑巻五十八
