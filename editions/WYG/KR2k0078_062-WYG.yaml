body:
  text: 行水金鑑巻六十二江南按察使傅澤洪撰淮水漢桓帝永興二年六月彭城泗水増長逆流後漢書五行志壽春每嵗雨潦淮水溢常淹城邑干寶晉紀不所紀事在晉世知在於何年宋明帝泰始季年淮水竭南史明僧紹傳洛其時紹竊謂其弟曰昔伊竭而夏亡河竭而商亡三川竭而周亡夫有國必依山川以為固山川作變不亡何待竟如其言梁武帝天監六年三月春水生淮水暴長六七尺梁書曹景宗傳梁武帝天監十三年作浮山堰梁書武帝本紀魏降人王足陳計求堰淮水以灌壽陽高祖然之發徐揚人率二十戸取五丁以築之假絢節都督淮上諸軍事并䕶堰作役人及戰士有衆二十萬於鍾離南起浮山北抵巉石依岸以築土合脊於中流天監十四年堰將合淮水漂疾復決潰用鐵數千萬斤沈於堰所伐樹為井幹填以巨石加土其上士卒死者十七八明年四月堰乃成其長九里下闊百四十丈天監十五年九月淮堰壞死者十餘萬口梁書康絢𫝊梁堰淮水以灌壽陽於鍾離南起浮山北抵巉石堰將合淮水漂疾復決潰衆患之或謂江淮多蛟能乗風雨決壞崖岸其性惡鐵乃引東西二冶鐵器數千萬斤沈於堰所仍伐樹為幹填以巨石踰年堰成其長九里軍人列居其上其水清潔俯視邑居墳墓公然皆在其下或謂絢曰四瀆天所以節宣其氣不可久塞既而昏霧不解其秋淮水暴長堰壞奔流於海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊𩔖詭狀不可勝名北史今梁典浮山堰號為荆山堰渦口東岸東是梁武帝普通元年秋七月淮海並溢梁書武帝本紀唐徳宗貞元八年六月淮水溢平地七尺没泗州城唐書五行志唐徳宗貞元十三年七月淮水溢亳州唐書五行志唐憲宗元和十三年六月辛未淮水溢唐書五行志大中十二年淮南大水發自徐州流没數萬家淮安府志中和三年汴水入於淮水鬭壞船數艘江南通志後周顯徳中淮水漲溢宋史趙賛𫝊宋太祖乾徳四年泗州淮水溢宋史五行志宋太祖開寶四年六月蔡州淮及白露舒汝廬潁五水並漲壞廬舍民田宋史五行志宋太祖開寶六年潁川淮渒水溢淹民舍田疇甚衆宋史五行志宋太祖開寶七年四月泗州淮水暴漲入城壞民舍五百家宋史五行志六月已亥淮水溢入泗州城壞民居宋史太祖本紀宋太宗太平興國三年六月泗州淮漲入南城汴水又漲一丈塞州北門宋史五行志宋咸平四年淮水溢天聖四年又溢景祐三年作外隄以備淮水江南通志宋太宗太平興國五年五月潁州潁水溢壞隄及民舍宋史太宗本紀徐州白溝河溢入州城宋史五行志宋太宗太平興國七年秋七月淮水溢九月睢溢浸田六十里宋史太宗本紀宋真宗大中祥符七年六月泗州水害民田宋史五行志宋仁宗景祐元年閏六月甲子泗州淮汴溢宋史五行志宋仁宗嘉祐二年三月戊戌淮水溢宋史仁宗本紀七月淮水自夏秋暴漲環浸泗州城宋史五行志泗州南去淮一里屢遭水患宋開寶七年淮水溢入泗城厯咸平至祥符無嵗不溢迨至景祐三年作外隄以備淮水高三十三尺自是水患少弭歐陽公云泗州之患莫暴於淮是也禹貢錐指宋仁宗嘉祐六年七月乙酉泗州淮水溢宋史五行志三年既作外隄猶不足以禦患可見淮水之暴宋神宗熙寧四年十一月開洪澤湖達於淮宋史神宗本紀宋神宗元豐四年五月淮水泛漲宋史五行志是年命發運副使史公弼修泗州洪澤湖玉海軾以龍圖閣學士出知潁州先是開府諸縣多水患吏不究本末決其陂澤注之惠民河河不能勝致陳亦多水又將鑿鄧艾溝與潁河並且鑿黄堆欲注之於淮軾始至潁遣吏以水平準之淮之漲水高於新溝㡬一丈若鑿黄堆淮水顧流潁地為患軾言於朝從之宋史蘇軾𫝊宋徽宗重和元年夏江淮諸路大水民流移溺者衆分遣使者振濟宋史五行志霍端友知陳州陳地汙下疏新河千里徹於淮水患遂去宋史霍端友𫝊宋高宗紹興三十二年春淮水溢中有赤氣如凝血江南通志載在紹興四年四月淮溢數百里漂民田廬死者尤衆宋史五行志宋孝宗淳熙十五年五月淮水溢廬濠楚州無為安豐高郵盱眙軍皆漂廬舍田稼宋史五行志宋寧宗開禧元年九月丙戌淮水溢淮東郡國楚州盱眙軍為甚宋史五行志水按元史安塔哈傳世祖至元九年五月淮溢是為度宗咸淳七年也元仁宗延祐七年四月安豐廬州淮水溢損禾麥一萬頃元史五行志元順帝元統二年六月戊午淮河漲淮安路山陽縣滿浦清岡等處民畜房舍多漂溺元史順帝本紀元順帝至元五年七月沂州沂沭二河暴漲決隄害田稼元史五行志元順帝至正四年冬十月乙酉議修淮河隄堰元史順帝本紀明太祖洪武八年九月壬子上閲輿地書得濠梁古跡一巻命内臣馳驛以賜東宫且題其外令濂詢訪隨處言之皇太子至池河驛得上所賜書大喜以示濂濂因啓曰臨濠古蹟惟塗荆二山最著塗山在昔鍾離縣西九十五里荆山亦在縣西八十三里二山本相聨屬而淮水繞荆山之隂神禹鑿之水始流二山間民獲免阻脩之難禹之功也明太祖實録明太祖洪武二十七年九月濬淮安山陽縣支家河水南入淮北通安東海州明太祖實録明太宗永樂七年六月乙丑鳯陽府壽州言淮水決州城命以時修築丁夘中都留守司言夏雨不止淮河水溢壩口見發軍夫晝夜築塞命工部亟遣人督視明太宗實録明太宗永樂八年三月丁夘工部言淮安府淮河南岸坍圮延及倉厫牆垣宜令有司修築皇太子從之五月戊子工部啓修淮安府淮河隄岸以固大河衞城池皇太子從之明太宗實録明宣宗宣徳七年八月已丑直隸壽州衞奏近城西有湖與淮相通比雨潦暴漲壞城二百四十餘丈乞𤼵附近軍民修理從之明宣宗實録明英宗正統元年十二月癸亥直隸壽州衞奏七月間淮水泛漲壞西北城垣請修治從之明英宗實録明英宗正統二年八月戊辰掌直隸清河縣事知州李信圭奏本縣四月終霖雨壞麥五月終淮水泛溢漂流房屋孳畜甚衆民不堪命乞賜賑貸其嵗凡買辦物料等項軍匠㕑役濬河人夫俱乞暫免其額辦商税課鈔乞暫存本縣給用上命有司覈實從之九月戊申直隸大河衞奏舊置軍器局以軍餘造器械供用近因淮水泛漲決隄漂屋請停造從之明英宗實録明英宗正統三年四月庚午直隸鳯陽府泗州淮安府清河等縣各奏去嵗天雨連綿淮水漲漫沙淤地畝不能布種今年夏税無從辦納上命行在戸部遣官覆視除之明英宗實録明英宗天順四年七月辛夘直隸鳯陽府自五月連雨抵七月淮水溢決壩埂敗城垣没軍民田廬甚多至是事聞命巡按御史中都留守司各遣官於被災軍民加意存䘏衝決城壩逐漸築之明英宗實録明英宗天順七年閏七月戊辰修鳯陽衞土城及䕶城隄以久雨淮水衝決故也明英宗實録明憲宗成化十三年九月丙寅淮水溢淮安所屬諸州縣壞官民屋舍淹没人畜甚衆明憲宗實録明武宗正徳十二年七月辛丑總督漕運都御史叢蘭奏淫雨為災淮水泛漲衝決漕隄淹没人畜禾稼乞免坐派工部料價部議巳徵者解部未徵者視災分數奏請仍以所在樁草銀修理決隄從之明武宗實録明世宗嘉靖二十九年四月丁未總督漕運右副都御史龔輝巡按直隸御史史載徳各奏泗州逼近淮河地勢低下今黄河水決入淮下流壅塞其勢必且上溢為陵寢之憂乞亟開直河口以通下流築二陳莊劉家溝二口以防衝決仍命欽天監官一員相度祖陵地脈擇日興工工部議覆報可明世宗實録嘉靖三十年淮水大溢田地俱沙淤淮安府志應檟總漕於淮以淮水唯資黄河易涸而多淤嵗糜挑浚之費而泗水西流寶應南注大江可以入淮於是因五里溝鑿之不費不勞河迄通利未旬月巡撫兩廣去唐汝楫撰兵部右侍郎應公墓志檟遂昌人嘉靖三十年任總漕嘉靖三十一年淮河大溢田地俱沙淤淮安府志嘉靖三十四年淮水溢淮安府志明穆宗隆慶三年九月丙子時淮水漲溢自清河縣至通濟閘及淮安府城西淤者三十餘里決方信二壩出海平地水深丈餘寶應湖堤往往崩壞明穆宗實録明穆宗隆慶四年六月丙辰河道都御史翁大立報疏濬淮河及鴻溝境山等處工完上從部議録管工同知章時鸞等賞賚有差九月壬申侍郎翁大立言今淮河自泰山廟至七里溝淤十餘里而水從朱家溝傍出至清河縣河南鎮以合於黄河聞者無不駭異然臣以為宜開新莊閘以通回船復平江時故道則淮河可以無慮臣所患獨在黄河睢宿之間遷徙未知所定泗州陵寢甚有可虞臣請濬古睢河繇宿遷厯宿州出徐州小浮橋以洩徐吕二洪之水又規復清河魚溝分河一道以下草灣免衝射之患南北運道庶幾可保都給事中龍光亦請下所司勘議或尋復故道或分洩二洪及倣先年置鋪設夫開溝建閘之法以為久計工部覆行新任都御史潘季馴如議區畫從之明穆宗實録是年高家堰大潰時淮水東趨諸州縣匯為巨浸淮城民不聊生黄河亦決崔鎮等處而桃清河塞運道梗阻者數年江南通志高家堰者郡志云後漢建安中太守陳登所築閻百詩曰此堰不見於史籍考三國志登嘗為典農校尉巡土田之宜盡鑿溉之利登固精於水利者又嘗為廣陵太守虞溥江表傳云治射陽則此堰距治所甚邇登築隄以障淮水理勢宜然也由是觀之漢世河未合淮尚不聽其南奔況今欲藉此清湍以刷沙乎茍非以隄束水使淮并力東注則自清口以至海口終不能無壅也禹貢錐指高家堰今府志稱高加堰注云高加者為䕶運道邑井宜加高而名之蓋益加而益高耳按高堰去寶應高一丈八尺去高郵高二丈二尺高寶堤去興化泰州田高丈許或八九尺其去堰不啻高三丈有奇見潘宫保兩河議自明迄今又不知高幾許一有叵測而淮揚兩府之城郭田廬皆在水底吁可畏哉今水學萬厯元年五月十八日夜淮水暴發千里汪洋没室淹田瀕河民多溺死淮安府志萬厯二年秋七月二十四日辰刻微雨而風入戌風大雨如注次日夜益猛拔樹撤屋東海大嘯淮河並溢漂蕩山清安鹽等邑官民廬舍一萬二千五百餘間溺死男婦鄭江等一千六百餘名口崩鹽邑城垣百餘丈餘邑同揚州府志是年淮河並溢淮安府志是年七月二十四日淮河並溢漂官民廬舍溺死男婦不計其數清河縣志萬厯三年淮河並漲淮安府志是年泗水南下衝決清水潭等處南河全考是年六月霖雨不止風霾大作淮河並漲千里共成一湖揚州府志是年河從崔鎮等口北決淮水從高家堰東決徐邳以下至淮南北漂没千里奉祀朱宗唐請行南京工部委主事郭子章㑹潁州道勘視水勢衝激崖岸恐侵柏林議估石砌泗陵堤二百二十六丈至五年工完時御史邵陛亦行泗州將䕶城隄用石包砌堅固至今賴之稱為邵公堤都御史王宗沭知府邵元哲亦修高家堰并開菊花潭以洩三城之水東方米芻舟楫皆通南河全考明神宗萬厯五年六月甲戌總督漕運侍郎吳桂芳奏淮水向經清河㑹合黄河趨海自去秋河決崔鎮清江一帶正河淤墊淮口梗塞於是淮弱河强不能奪草灣入海之途而全淮南徙灌山陽高寶之間向來湖水不逾五尺堤僅七尺今堤加至一丈二尺而水更過之此從來所未有也議䕶湖堤以殺水勢部言堤雖可䕶而不能必水之不漲欲水之不漲必俾淮有所歸而後可宜令漕運衙門嚴督司道熟計其便報可閏八月辛丑時山陽高寶淮水瀰漫禮科左給事中湯聘尹議導淮入江於𤓰洲入江之口分流増閘以殺其勢巳漕運侍郎吳桂芳稱黄水向老黄河故道而去下奔如駛淮遂乗虛湧入清口故道淮揚水勢漸消部覆二議不同奏請行勘上以河淮既合命寢其議九月丁夘管理南河工部郎中施天麟言淮泗之水原從清口㑹黄河入海今不下清口而下山陽從黄浦口入海浦口不能盡洩浸淫漸及於高寶邵伯諸湖而湖隄盡没則以淮泗本不入湖而今入湖故也淮泗之入湖者又緣清口向未淤塞而今淤塞故也清口之淤塞者又緣黄河淤澱日高淮水不得不讓河而南徙也蓋淮水併力敵黄勝負或亦相半自高家堰廢壞而清口之内傍通濟閘又開朱家等口引淮水内灌於是淮泗之力分而黄河得以全力制其敝此清口所以獨淤於今嵗也下流既淤則上流不得不決每嵗糧艘以四五月盡運堤以六七月壞水發之時不能為力水落之後方圖堵塞甫及春初運事忽至僅完堤工於河身無與河身不挑則來年益高上流之決必及於徐吕而不止於邳遷下流之涸將盡乎邳遷而不止於清桃須不惜一年糧運不惜百萬帑藏開挑正河寛限責成乃為一勞永逸至高家堰朱家等口宜乗時築塞使淮泗併力足以敵黄則淮水之故道可復高寶之大患可減若於興化鹽城地方海口湮塞之處大加疏浚而湖堤多建減水大閘堤下多開支河以行各閘之水庶乎不致汗漫總之未有不先黄河而可以治淮亦未有不疏通淮水而可以固堤者也部覆河内疏浚苦無良法惟先臣劉天和用平底方舟横排河中為一層四維拴繫以長柄鐵爬浚之浚深數尺移舟再浚後數丈復為一層如前法則水中與陸地施工略同興工停運宜行河道等衙門㑹議具奏定奪報可十二月已丑先是淮水南徙泛濫淮揚間巳而漕運侍郎吳桂芳報稱草灣開通淮水消落至是淤墊如故給事中劉鉉言治淮以開通海口為䇿宜簡方略大臣一員㑹同河漕諸臣相踏咨度為新運計上令吏部推有才望實心任事者以聞於是吏部請以總督漕運兵部左侍郎吳桂芳為工部尚書總理河漕得㫖近來當事諸臣意見不同動多掣肘以至日久無功今以此事專屬吳桂芳經理河道都御史暫行裁革李世達改推别用其選任部司處置錢糧俱許以便宜奏請若明嵗運道有梗戸部查先年海運事宜行明神宗實録吳侍郎所奏向來湖水不逾五尺堤僅七尺今堤加至一丈二尺而水更過之此從來所未有也可見高堰益加益高當時巳有然矣施郎中所言淮泗本不入湖而今入湖淮泗之入湖者又緣清口向未淤塞而今淤塞故也清口之淤塞者又緣黄河淤墊日高淮水不得不讓河而南徙也迨至今日而更甚矣可為歎息是年三月至五月恒雨西河水發由高家堰一槩東漫鹽城水災特甚張宗仁賣兒詩云攜兒去賣向兒哭賣兒買米供晨粥粥熟呼兒兒不來剜心忍食孩兒肉淮安府志是年漕撫王宗沭築高家堰淮郡二堤記萬厯六年九月總河侍郎潘季馴題准命郎中張譽海防道龔大器揚州府同知韓相等築高堰堤長六十里内砌大澗口等處石堤三千一百一十丈栁浦灣堤東三十餘里西四十餘里先是萬厯三年淮決高堰寶應而山陽高寶興鹽等處匯為巨浸運道梗阻總河侍郎潘季馴行相視築堰起武家墩經大小澗至阜寧湖以捍淮東侵築堤起清江浦沿鉢池山栁浦灣迤東以制河南溢于是淮畢趨清口㑹大河入海海口不濬而通南河全考萬厯七年五月淮水溢平地高三丈淮郡二堤記隆慶辛未河大溢壞漕舟以千數天子念大計不以沭為不肖授璽書使董漕計拔自藩轄異數也踰年淮父老詣余而泣曰郡地專受淮故稱淮安勢自西南厯清河而東與湖南僅隔拳土故高家堰有堤不治而淮輒入海㡬受其半淮揚兩郡皆困終不治則且妨漕余惕焉按之信然乃檄守陳文燭以軍餉六千餘金致鄉先生周君胡君築焉又明年癸酉五月淮水溢平地高三丈餘而以堤故不溢入湖郡之南鄉與揚皆無恙然勢掠郡西合黄河折而經北城下安東則洶湧㡬嚙西橋奪漕河而出余為之不寢者三夕幸而勢稍殺則又以其泛濫四溢數道出禮信壩及鉢池山民在巨浸中至八月而始涸余以災請幸天子仁聖捐米八萬石賑之而又允折漕糧是時幸淮獨漲使稍遲半月與黄河并發則事不可支矣是年冬余再檄于同知時保以賑之餘米一萬石募夫築郡西長堤焉高家堰堤北自武家墩起至石家莊止計三十里而遥為丈五千四百堤面廣五丈底廣三之而其高則沿地形高下大都俱不下一丈許而又於大澗小澗具溝舊漕河六安溝諸處築龍尾埽以遏奔衝堤内自澗口以達張家莊濬舊河以洩湖水使不侵嚙工凡五十日而畢郡西長堤自清江浦藥王廟起東厯大花巷由西橋相家灣直抵新城過金神廟至栁鋪灣六十里而近為丈八千七百九十八堤面廣四丈底廣三之高可七尺餘蜿蜒如長虹以障郡城之北工凡三月而畢余按淮安郡三城在淮與漕河夾中自嘉靖中年以來無嵗不被水而其最甚則已巳癸酉極矣鞠為大澤不見水端民之棲樹巢冢以救旦夕即余疏中所道蓋其十之三四也而今二堤並峙高家堰獨抗淮於西南而西長堤又障淮於西北蓋至是而居者田者皆有寧處可望生全無苦昏墊矣余不才且旦夕乞去然使來者慎守而時䕶視之無至壞以永為障使吾民得粒食育子抱孫則大幸也顧淮水高於郡勢若建瓴而下使其發時與河並則為慮尤巨且西長堤能障溢水而其從下嚙而崩者不能却河故去城數十里而今乃在城下是其大勢漸侵而南可覩也開草灣以分河勢通澗河以防溢流余心耿耿焉而力巳詘民亦告病姑少休之以待文燭楚之沔陽人時保浙之嘉興人而是時同相二役者郭同知大綸王通判𢎞化諸推官大綸山陽縣縣丞談嘉謨也江南通志所此即王公宗沐作淮郡二堤記也明神宗萬厯八年三月乙巳工科給事中尹瑾陳河工善後七欵一高家堰近巳築塞成堤體制高厚既有樁板以䕶其外復設官府以嚴其防然終不若石堤更為永恃宜於中間二十里低窪處用石包砌令徐潁海防三道均分道里各派所屬而董其成六月戊午先是鳯陽等處雨澇淮溢水薄泗城且至祖陵墀中御史陳用賔以聞給事中王道成四疏言黄河未漲淮泗之間霖雨偶集而清河口巳不能容洩萬一震驚陵寢誠非細故宜令河臣設法疏導堵塞之總理河漕潘季馴謂黄淮合流東注勢甚迅駛止因霪雨連綿而泗州岡阜盤折宣洩不及遂至漲溢若欲更求疏浚則下流巳深浚無可施欲更事截塞則上流之水勢難逆堵該部亦以為然覆議令季馴親詣相度從之十一月乙酉高家堰石工將興鄉官常三省等倡言有妨祖陵具揭欲阻之河臣潘季馴疏陳其舛謬不經具請再行勘議上命修築以終前功而革常三省職為民十二月戊申以泗州等處連災詔免萬厯六年以前改折漕糧一十三萬三千七百九十兩有奇從總理漕河兵部尚書凌雲翼請也明神宗實録淮入海由清口入江由大澗達湖自高堰築而江路塞自黄河決而海道阻所受七十二河水積為泗患州人常魯軒先生謝政里居畫分黄導淮策忤當路意坐阻撓奪官竄之編戸巳泗嵗受水先生復請開黄河浚清口河以導淮入海開周家橋武家墩以導淮入湖開芒稻河𤓰儀閘以導湖入江侍御史牛公繪圖以聞上震怒治諸行河者罪而後司空楊公給事張公卒以先生策從事泗得無水李維楨撰㕘議常三省墓誌銘憂三省字希曽泗州人萬厯丙辰進士厯湖廣㕘議居河患起公身操畚鍤塞壅城得無潰既遘謗無愠言㑹有恩詔復官而楊司空疏言河工就緒多㕘議常三省功宜増秩録用先後撫按臣南北臺省薦者凡三十人而公題其署曰久分生涯偕朩石勉將道術付桑榆踰數年卒是年姜璧巡按兩淮鹽法時黄水入淮淮大溢總河大臣與撫臣相掣肘而有司行河者率委之倅貳又有議罷范公舊堤勿修而别開支河者公疏言倅貳權輕不如專任守令大臣事權不一難責成功宜罷總河以其事歸撫臣便又河口外高内下開支河則引倒流之潮闢私販之路不若修范公廢堤使内水不出外水不入外不損鹽竈之地内不傷耕植之田疏凡數百言皆鑿鑿可行部覆如公言事竣有白金之賚余繼登撰僉都御史蒲汀姜公墓誌范按璧字元卿文安人隆慶辛未進士公言修公堤誠善而言總河宜罷殊傷國體而罷總河在潘公去任以後行水金鑑巻六十二
