body:
  text: 行水金鑑巻六十四江南按察使傅澤洪撰淮水明神宗萬厯二十年正月癸酉先是泗州大水州治至深三尺民苦蕩析患及祖陵疏洩之議父老有謂繇傅寧湖開至六合入江者有謂濬施家溝周家橋入高寶諸湖者有謂弛張福隄以廣洩淮之口者又有謂開壽州瓦埠河以分上流之水者總督漕運巡撫鳯陽周寀陳於陛巡按御史高舉合疏以聞工部覆請咨行河漕撫按勘議河道都御史潘季馴謂祖陵切近王氣攸關與三臣議左俱下工部尚書曽同亨以為河臣閱厯多年宜悉河事而撫按二臣又謂周家橋在祖陵後百里之外主於疏濬查先年緊急河工例遣科臣往勘況泗州水患既關陵寢又關運道微直一方生靈攸係宜命風力科臣一人往㑹河漕撫按官從長計畫具奏從之辛巳遣工科右給事中張貞觀往勘泗州水患開浚工程戊子總河尚書潘季馴疏稱去秋霪雨連綿淮水暴漲邵伯湖隄衝塌非磚石築砌不可久區畫故總河事經理則各官司之本道張允濟報轉宜俟工竣離任毋貽後艱通判張文璧劉汝大宜照工程督理揚州知府吳秀江都知縣武之望受事方新鳩集宜預毋使臨期缺乏庶可不誤河防工部覆請得㫖如議行二月丙申遣欽天監監副楊汝常往泗州祖陵審看水口三月壬戌御史王明奏臣巡鹽兩淮兼有河漕地方之責目覩淮為泗患漕撫陳于陛欲開周家橋以疏之使遂開則六州縣生靈為魚四百萬漕糧俱梗而三十六鹽場其沼矣宜令河臣上尋舊支而殺其勢下瀹舊口而廣其途勿茍且目前貽後日患戸科給事中耿隨龍亦言泗州苦水議疏周家橋施家溝以高寶二湖為壑將運道民業立盡臣曽令寶應聞見頗真夫黄河自徐邳直下東折入海淮亦東北趨㑹之無所壅遏故不病泗也自黄奪通濟閘横於南淮遂不得東因瀦泗州為祖陵患又黄之奪閘南也寶湖受淤淮無所洩運道遂不可守欲弭河患非復通濟閘不可工部覆議上請上曰河道衆論紛持張貞觀著先勘泗州其餘河患仍與地方官詣勘務圖永利毋徒目前塞責仍改給勘議河道關防四月丁亥勘河給事中張貞觀奏祖陵為國家根本即運道民生莫與較重然嵗漕四百萬賴一線以給京師鳯泗淮揚又湯沐襟喉重地則運道民生所關亦非細也臣展謁祖陵見淮水一望無際泗城如水上浮盂而盂中之水􅂧滿氣象愁􅃤不忍覩聞雖祖陵元宫高聳乃自神路至三橋并諸儀衞丹墀無一不被水矣且高堰一堤危如累卵倘潰則裏河之民生運道立盡此又高寶意外隠禍也今欲洩淮當以闢海口積沙為第一義然洩淮不若殺黄而殺黄於淮流之既合不若殺於未合但殺於既合者與運無妨殺於未合者與運稍礙别標本究利害必當殺於未合之先至於廣入海之途則治鮑家口王家營至魚溝金城一帶地勢頗下因而利導之似當并議者工部覆稱科臣親厯地方擬議詳確皆前諸臣所未及者惟是黄河殺於未合運道仍宜計處若挑浚淮口停沙及利導鮑家口一帶當即如議措費興工以紓聖明南顧未盡事宜通候酌請其移州治開周家橋瓦埠河既稱不便即應停止從之八月乙卯工部覆直𨽻巡按御史彭應參疏稱巡厯稽查工程小民紛紛訴僉派剋價罰曠之苦而管河通判胡傳尤為極貪巳行提問今西苦賊東備倭淮揚一帶添將招兵日且多事頃據泗州報淮水自決張福隄巳退二尺七寸祖陵或可無虞竊謂河工可暫停也應令科臣河臣熟計行止上是其言十一月庚申總河尚書舒應龍勘河給事中張貞觀題稱治河之議欲拯陵患偶值時艱據司道查稱泗水今秋發遲消速雖足為張福隄開放之驗然為祖陵計久逺則支河實必不容巳之工乞勅部覆議將淮口置船濬沙事宜聽河臣於原估工銀支給先行開濬以導淮水之出其腰鋪支河之上候明春倭警寧息照議畫地舉行部覆從之十二月庚寅工部覆勘河科臣張貞觀題稱泗城䕶陵大隄向因裏口未添幇石致多損壞議行添砌勒限興工計費一千二百五十有奇即於該州庫貯賑濟餘銀動支從之明神宗實録萬厯二十一年淮水大漲湖河泛溢髙郵南北中堤衝決魏家舍等處大小二十八口共長五百餘丈又西老石堤洪水漫過衝決東堤又寶應決六淺潭堤二十九丈又高良澗決二十二口民罹昏墊田皆淹没郎中沈季文詹在泮分調官夫疏水運料於二十二年盡行築塞又照段酌量加修磚石樁板廂䕶其西老石堤呈詳總河舒應龍批允加砌磚石二層南河全考萬厯二十二年六月黄水大漲清口沙墊阻遏淮水不能東下於是挾上源阜陵諸湖與山溪之水暴侵祖陵泗城淹没南河全考明神宗萬厯二十三年四月戊辰時泗陵水患日急而議者迄無成畫上既有㫖選老成風力科臣往勘俾立限回奏又以從前地方官因循坐視勘官竟成虛文令工部查名具奏於是工部沈思孝奏言勘科常居敬之委始於萬厯十五年斯時以河溢開封等處慮梗運道耳初未嘗議及祖陵自科臣王士性有祖陵當䕶之説與開老黄河之圖始命河漕臣與勘科㑹勘而居敬與漕臣舒應龍河臣潘季馴共為條議亦不過築堤防運之舊論迨皇上允總漕周寀所奏有泗州積水可虞之㫖再遣科臣張貞觀往勘而闢清口開腰鋪之議始出河臣舒應龍方欲舉行而按臣彭應參科臣陳洪烈劉𢎞寶以倭警嵗祲請暫停止蓋亦天時人事適然未必盡諸臣之過疏入上怒甚詔以河工嵗糜金錢百萬而侵没滋甚總督河漕官故爾遷延希圖糜費舒應龍著革職為民陳洪烈劉𢎞寶扶同停寢降極邊方雜職張貞觀彭應參以既為民免究潘季馴令吏工二部查明來説勘臣張企程立限五月作速前去勘議具奏五月庚子御史高舉疏稱黄河為患自古記之未聞淮水之為患也淮之患起於高堰之築張福之堤臣往祇役江北曽議疏周家橋以殺淮裁張福隄闢門限沙以洩淮至高堰束捍高寶淮揚未可盡去唯當於周家橋大澗口小澗口武家墩緑楊溝及前所挑㑹通河諸處詳擇要地建滚水石壩各於壩外浚河築岸使行地中由白馬汜光等湖㑹入邵伯水入邵伯慮害高寶開河塘埂舊建十二閘閘外疏成十二河皆洩湖水而注之海者宜改前閘為壩闢入海之途入灣頭而下舊有芒稻河揚州而南設有𤓰儀二閘皆洩湖水而注之江者宜將芒稻河大加疏掘濵江處多建水閘以廣入江之途然而海口日壅則河泥日積河身日高欲二瀆安流不得也顧海口沆漭不能為力有灌口者視諸口頗大而近日所決蔣家鮑家吳家三口直射此口若挑浚成河俾經由灌口入海似為上策有謂自三義口駱家營魚線口等處修復老黄河故道又是一策然而有治人無治法委任責成則惟天語勅屬耳巳而南京工部主事樊兆程上言欲導淮先疏黄欲疏黄先闢海口然而舊海口決不可浚當自鮑家營至五港口挑浚成河令從灌口入海俱下工部議部臣沈思孝覆言御史巡厯其地見聞既真議論既鑿鑿可行至治人責成之説尤探本之論今科臣奉命往勘宜將此疏及兆程之奏并行勘議以圖永久詔行勘河科臣并總理河漕及御史將各疏條議與疏中未盡事宜一一商確具奏六月壬子御史夏之臣疏請決高堰其略曰高堰者即臺臣高舉所云大澗口淮水所由以直趨東注之處也築之自舊河臣潘季馴始臣嘗讀其治河之疏矣謂海口無可浚之理惟當導河以歸之海又非可以人力導也欲順其性先懼其溢惟當繕治堤防俾無傍溢此其大指也毋論海口終塞無嵗不有浚黄之役即淮水之舊自西而東稍折而北由清口㑹黄入海此故道也而强弱不敵清口漸淤今所稱門限沙是矣淮水欲出清口㑹黄既不可得則就下順流取道大澗口而滔滔東注非其性則然哉而奈何阻之彼一淮也既為黄遏而不得入海又為堰阻而不得入湖瀰漫泛漲固其所矣三祖真穴名舊龍觜其地冬夏草色常青壯氣所鍾者也萬厯初年堰成而金水河壅而不行節年河流日増元宫之上水且盈丈議者既不敢言又不能救初建堤以障之而隄内之水自若也尋又建子堤以障之而子堤内之水自若也尋又設水車於子堤以撤之而隨撤隨盈舊龍觜之淹自若也前勘河使者亦明知之第以高堰糜帑巳至百萬一旦破之則前功盡棄於首事諸臣不便遂決意庇之而以治黄為請有欲開海口者有欲劈横河者有欲開草子湖者有欲開草灣河者有欲開腰鋪者有欲開雲梯關者不惟無救於淮亦無救於黄何則海口之決不可開也横河下為軟板沙上為柔沙人力莫施其不可闢行道之人皆知之草子湖在高堰之東今非不流草灣河在清河之南即黄河見流之處皆無俟開也唯腰鋪議開新河至周家莊四十里其地洩水不多開之徒費財力雲梯關又在安東之下隔黄甚逺更為迂闊就令各路可開亦當責效數年之後近者按臣欲開施家溝周家橋使淮由高寶湖而出即開高堰之意但二處各數百里費出不貲即開亦以年計急救祖陵非開高堰不可臣請舉不開高堰之説一一破之彼以堤東水以水刷沙之説數千年無一效無容借口矣有託形勝之説以存高堰者必曰淮黄合襟形勝在焉然當淮黄㑹合篤生聖祖之時未有高堰者也相傳舊龍嘴𤣥宫也較合襟孰重今沈水底有年矣且諱而不言而力爭合襟門哆言形勝乎又有謂運道及危高寶之説以存高堰者然而高堰之築纔二十餘年而國家轉餉二百餘年矣未有高堰之先豈遂無運乎且運道經黄入閘固不畏黄也寧畏淮乎縱可畏尚可移高堰石堤之費以修湖堤也奈何藉口湖堤强存高堰也如曰髙寶受害則盱泗未嘗不害況髙寶之害不在淮水之去而在淮水之未洩髙堰雖障上流實為危竇厯年以來土隄之在髙良澗者每遇伏秋即遭衝決石堤之在大澗口者每遇洶湧即見崩潰使厯年愈久能保其不頽而無傷乎然則高堰在為高寶之利小而高堰決則高寶之害非大也孰若明議而明開之使知趨避乎聞科臣張貞觀勘議之時高寶之民鬨如聚訟然試引高寶士民有識者至祖陵一寓目之則孰輕孰重有人心者宜於此為變也疏上工部覆奏以事難懸度今既遣科臣㑹勘并行酌議上從之甲子戸科給事中黄運泰言治河之策當治下流今日欲安祖陵不得不洩淮水欲洩淮水不得不浚黄河下流以殺其奪淮之勢倘黄河下流未洩而遽開高堰周橋以洩淮水則淮流南下黄必乗之無論高寶數州縣盡為池沼運道月河勢必衝潰即淮水且終為黄所遏抑而壅如故大指欲别尋五港口浚之達灌口門入於海工部覆請詔令勘河管河各官悉心㑹議七月丁丑時泗州水患遣科臣張企程往勘企程具奏欲遣使致祭祖陵兼折漕糧蠲馬價且欲勘臣與河臣和衷共濟無致參商上報可八月辛丑朔勒原任浙江巡撫常居敬閑住以科臣勘河失䕶祖陵罪也甲辰勘河給事中張企程奏兼程抵泗州展謁祖陵見長淮激湍洪波汩流誠有如御史牛應元所圖上者前此河不為陵患自隆慶末年高寶淮揚告急當事狃於目前清口既淤又築高堰以遏之堤張福以束之障全淮之水與黄角勝不虞其勢不敵也迨後甃石加築堙塞愈堅舉七十二溪之水匯於泗者僅留數丈之口出之出者什一停者什九河身日髙流日壅淮日益不得出而瀦畜日益深安得不倒流旁溢為陵泗患乎今論疏淮以安陵有謂清口當闢有謂高堰當決有謂周家橋武家墩當開有謂高良澗施家溝當浚論疏黄以導淮有謂腰鋪可仍有謂老黄河故道可復有謂鮑王二口可因有謂王家壩五港口可尋顧淮水之漲雖由高堰之築而工程浩巨未可議廢且以屏翰高寶淮揚亦不可少周家橋北去高堰五十里有支河下接草子湖若棄未挑三十餘里大加開浚一由金家灣入芒稻河注之江一由子嬰溝入廣洋湖達之海則淮水上流半有宣洩矣武家墩南去髙堰十五里逼鄰永濟河引水由窯灣閘出口直達涇河從射陽湖入海則淮水下流半有歸宿矣此急救祖陵第一議也工部覆議詔作速疏浚毋得推諉觀望九月已夘以直隷清河盱眙桃源高郵寶應興化六州縣淮水為患其嵗還漕糧暫准改折一年明神宗實録顧雲鳯開施家溝周家橋議略曰淮由清口以至安東雲梯關入海即禹貢所謂導淮自桐柏東㑹于泗沂東入于海故道也自神禹以來未有改者孟氏誤以為排淮泗而注之江則朱注巳辨之矣夫淮之趨高寶似便其東流入海似稍迂迴神禹之智豈其不出此與而漢陳登又築高堰以防之迄今治河能臣守其舊而不變抑又何説也蓋水以海為歸者也高寶信下也其東南濵江濵海之處則曰廣陵曰海陵曰蜀岡又曰阜曰嶺不可殫述皆以高亢得名水無所出即有所出而江潮海嘯互為吞吐故𤓰儀之有四閘者非徒節其出抑亦制其入而通泰興鹽諸郡縣尸祝范希文無巳者以范公堤之建為能防其倒灌逆流而拯民於魚鼈耳以此思之則江湖之水勢可知宣洩之難易又可知淮非由清口安東以入於海别無可為歸宿之地矣而後之人又虞其泛濫而四出也故又遏之以堰語曰障百川而東之高家堰者障之之説也譬之人焉徇一時之便而養之癰不若審血脈之宜而周其適不待智者而後辨也武墩諸閘之水夏秋則流冬春則涸髙寶湖堤猶得乗其稍涸之時而施其補葺之計今施家溝當水涸之時巳與武墩諸閘同其用矣若更從而闢之是使淮泗無餘蓄而高寶無餘地矣水無時不滿湖無時不漲堤之坍卸即欲修築無所措手況髙寶諸湖不過盈溢而止耳平時先巳盈溢又何以容暴發之水乎蓋嘗譬之淮泗百石之甕也髙寶諸湖升斗之罌也芒稻河杯勺之斟也以罌之腹而欲受甕腹之所受其數不勝也以罌之口而欲出甕口之所出其數又不勝也滿則溢溢則傾傾則散漫旁流不可收拾即欲復歸之甕而宣洩由我不可得巳好事者倡為濬闢武家墩高良澗周家橋諸閘之議先實諸湖之腹水無所受故一雨而即盈耳向使施家溝之議早定則此時湖巳出於隄上即錮之鐵豈能無崩崩則運道安在無問民矣是病民未嘗不病運也而猶未也此一淮水耳入湖之分數多則入海之分數少而淮弱矣淮弱則黄躡其後而清口淤矣異日者入湖而湖不能容入海而海不能入將瀠迴泛濫合盱泗高寶而為一此其滔天之勢為害不更烈乎雖曰杞人過慮萬不至此然涓涓不塞將成江河而況滔滔不止何難陸沈哉昔白馬汜光甓社邵伯諸湖始何嘗不分而今安辨其為某某湖也則泛濫之明騐也古今治水莫如禹禹所治莫大於江淮河漢其萬古不變者則萬古無患惟齊桓公塞九河為一河淤八流以自廣遂為萬世無窮之害所幸江淮尚仍禹舊奈之何輕變古而更生一患哉王介甫欲泄梁山泊之水以為田而憂水無所貯劉貢父曰别穿一梁山泊則足貯此水矣介甫大笑而止今者必欲使洪澤阜陵化為桑田高寶興泰化為魚鼈而其究且復病運是齊桓之過計而貢父之所姍笑也議者不察輒文其名曰導淮夫導人者當導之於正而不當導之於邪導淮者當導之入海而不可導之入湖湖非民田乎又嘗譬之淮為泗患淮即泗之寇也為泗計者宜逐之出境而誘之四出使抄掠内地可乎黄為淮患黄即淮之寇也為淮計者宜堅壁以待而預自退縮使黄得乗勝長驅可乎況今淮黄且合從而至也上不圖守之於要害下不圖洩之於尾閭而今日曰撤堰明日曰開溝是不知割地之難於自完而滅虢之終於取虞也置淮黄於泗傍而欲使泗無恙非策矣南河志明神宗萬厯二十四年四月丁酉朔工科給事中楊應文題頃者河高淮壅祖陵沮洳皇上惻然動念遣科臣往勘俯允分黄導淮之請詎謂福建右㕘政錢拱辰又有拆高堰之揭夫高堰一開淮揚高寶為壑利害較然彼一則曰高堰築而淮水不能歸湖黄河不能兼受一則曰導淮無藉於分黄一則曰決堰即所以導淮此説一倡便成掣肘將令擔事者灰心勘議者眩見趨役幸敗惡成固理所必然者按臣蔣春芳曰河工垂成乞勅河漕大臣勘河科臣無畏浮言安心料理并禁中外不得阻撓三者是當機之㫁也伏乞俯采臣言勿惑錢拱辰之謬説趁春和日暖分黄導淮奏平成以答聖懷部議陵泗受害委因淮壅所致然淮之壅非盡由高堰所致以黄强灌清口淤沙日積使淮不能縱之而出耳若黄流既分清口沙盡闢則淮得由故道雖周橋武墩等處建設閘壩及疏浚子嬰涇河等工似亦在可緩矣又何必以開高堰為哉應從科道兩臣之議以圖竣事四月辛丑工部覆河道總督楊一魁題泗陵水患巳平上曰祖陵積水盡平朕心巳慰各樣工程總督河官便議修舉務早報完戸部銀兩准借用仍照數抵還在工人役久勞委宜蠲賞優恤八月壬寅部覆總督河道工部尚書楊一魁條議分黄導淮事宜十事前三條入黄一議裁新堤以免壅潰蓋築堤所以障淮而恐以泗為壑新堤可以議裁而恐裁去太多或貽後悔且應量裁數段以洩淮漲仍開𤓰儀二閘以分髙寶之害庶上有洩而下有歸也一議修祖陵以培國脈蓋以二十五年為始查閲應修所在估料工費於糧漕衙門移文南京工部動支以憑開銷𩔖繳一議分河官以理淮泗蓋以鳯陽府同知兼管淮河泗州同知盱眙縣縣丞加管河名色專屬南河分司遇有修築前呈管河衙門料估起工嵗終告成甄别一議闢清口以導淮流蓋清口為淮出之門而苦為黄壅今雖挑浚猶恐水分勢緩泥沙復入合議嵗修以圖永利一議浚海口以免内漲蓋以黄水倒灌正以海口為阻即分黄工就而伏秋水漲勢恐復淤則石䃮口廖家港白駒場諸處海口金灣芒稻諸河宜乗時開刷以為預圖酌量工程修舉者也明神宗實録先是萬厯二十三年決高家堰髙良澗郎中詹在泮等嚴督官夫築塞仍又加石甃砌是年三月總河楊一魁㑹禮科給事中張企程并撫按㑹題分黄導淮至是行委郎中詹在泮等開桃源黄壩新河自黄家觜起至五港灌口止分洩黄水入海以抑黄强導淮闢清口沙七里建武家墩涇河閘洩淮水由永濟河達涇河下射陽湖入海又建高良澗減水石閘子嬰溝周家橋減水石閘洩淮水一由岔河下涇河一由草子湖寶應湖下子嬰溝俱通廣洋湖入海仍恐淮水宣洩不及南注各湖為患又挑高郵茆塘港通邵伯湖開金家灣下芒稻河入江以疏淮漲按金家灣在邵伯南五里許迺通芒稻河入江之捷徑也是年既開一十四里以至芒稻河復建減水石閘三座由芒稻河通江一十八里亦建石閘一座于是河淮有所宣泄云南河全考萬厯二十三年上發帑金五十萬役山東河南江北丁夫二十萬諸役畢大舉其明年秋工告成淮果出清口而水患以寧是役也當潘公季馴導治未久淮黄尚由故道特黄以暴漲侵淮稍分之足以殺其勢功不在導淮也而周橋之開遂為後世厲階焉揚州府志明神宗萬厯二十五年八月甲申山東樂安小清河水逆湧流臨清磚板二閘無風起大浪明神宗實録是年臨淮知縣陳民性建議㑹同指揮趙允昌申請錢糧於濵淮一帶創石隄以捍淮水至萬厯二十七年知縣蕭如蕙隄始告成東西三百一十餘丈亘如長虹全城賴以無恙鳯陽府志是年淮水大漲浸及泗陵總河楊方興建閘以洩一時暴流稍平即閉自是至啟禎之末四十年間雖堰常漫溢然或霪雨為災或川源暴漲變生靡常容非人力所能盡及矣揚州府志云薈蕞云予嘗聞之閻百詩先生高家堰相傳漢廣陵太守陳登築明永樂間平江伯陳瑄嘗修之又一百四十餘年宫保潘季馴復大修之其意專以堅築高堰束淮水出清口以敵黄濟運自此以迄國亡淮不大為患而運道常通今平江伯既有專祠吾意欲上合元龍下逮宫保立祠於高堰之上而合祠焉惜未有能行之者予因笑語先生曰高堰一線之隄包藏七十二道山河之水萬一有失淮揚二府其魚固不足惜其如運道何先生瞿然曰善問哉善問哉吾嘗慨元人海運危矣即膠萊新河亦不能成若由江南之儀真縣西至六合又北至天長又西至盱眙又北至泗州以達懷逺又北至宿州又北至蕭縣又北至沛縣又北至山東魚臺縣入運河既可以避黄河之險又可涸出洪澤湖而成數十萬頃膏腴之田則淮揚二郡永無昏墊之虞矣予深喜先生之精於地理而能得通變之道而又能闡揚前人之遺烈思有以爼豆三公於不朽其説甚善為亟録之以貽後人天啓元年淮安淫雨連旬淮黄暴漲數尺決高堰武家墩等處總河陳道亨躬規課工照段拆修浪窩盡塞至明年工竣南河全考是年五月淫雨淮河交溢清河縣志明熹宗天啓六年九月辛夘總督河道工部尚書李從心奏淮水驟發以淮刷黄閼沙盡析運道復通報聞明熹宗實録是年夏淮水涸黄漲河口沙淤數里運道阻艱總漕蘇率屬禱於神期以五日乃七月朔後淮水暴湧黄沙洗刷數十里艘鼓枻競渡七月初一初二兩晝夜狂風暴雨壞屋拔朩損舟各河水驟長丈許淮安府志崇禎元年十月庚戌命修葺泗州祖陵從河道李若星奏也崇禎長編崇禎四年十月丁未刑科給事中常自裕上言今嵗災異叠見淮泗洪水滔蕩浸及陵寢崇禎長編是年六月淮黄交漲海口壅塞總河朱光祚方議開高堰三閘淮揚在朝者合疏言建義諸口未塞民田盡沈水底三閘一開高寶諸邑蕩為湖海而漕糧鹽課皆害矣高堰建閘始於萬厯二十三年未幾全塞今高堰日壞方當急議修築可輕言開浚乎帝是其言事遂寢明史稿是年淮水秋漲入城人多流散泗州志崇禎五年十一月癸丑直隸巡按饒京疏奏祖陵地繞淮黄㑹合諸水實王氣所鍾然厯年既久河形之遷徙無定以致沙水之流止非初況當水患泛濫後所宜講求者不一事敬陳䕶陵八議一議二陳莊之決口一議高家堰之三閘一議添守閘之官一議祖陵對照之山一議大覺寺之㙮一議再申祖陵之禁一議恤附陵之州縣一議設䕶陵之衞章下所司崇禎長編崇禎六年三月已未工部尚書周士樸疏言歸仁一隄長六十餘里内障祖陵外捍淮水關係最鉅臺臣吳振纓憂深思逺為歸仁外捍計欲修宿寧上下西北舊隄蓋舊隄原捍淮水向因久不修葺余堡諸口一時并決致黄水直射歸仁與淮河流沖突震蕩不特歸仁受其薄蝕祖陵亦浸浸有震驚之患矣蓋黄淮之合在清河入海之處今以決口内注故道全失河逐淮之流而淮愈驕淮挾黄之勢而禍愈烈民生運道并遭其厄不止祖陵之可憂也則修歸仁以衞祖陵并修舊隄以衞歸仁河安其流淮循其故可與河臣分黄導淮之議并行以加惠此元元也臣前復臺臣吳甡一疏内築建議二決口曽勒限三月報竣議處諸臣政於此程功罪毋借口新代有人隳心末路而置民生於度外也故因議歸仁等隄而并及之帝從其議四月癸未大理寺左寺丞吳甡翰林院編修夏曰瑚廣東道御史金光宸中書科中書舍人喬可聘疏言祖陵形勢龍脈來自萬里蜿蜒盤結拱山帶江滙五十二湖七十二溪之水而淮與泗合襟交㑹以成朝宗之勢衆水滙於洪澤諸湖障以髙家等堰所稱朝水諸口不開而自開闕水諸口不塞而自塞蓋天生此靈阜奥區開億萬年有道之長非人力所能為也第泗州地形窪下間有泛濫之時而衆水瀠迴王氣所鍾説者以為靈秀㑹聚實在於此況此水僅繞於明堂之前而陵寢從未有積水難消之患也按臣饒京雖有八議之疏而必請詳察地脈者亦慎之也惟是高家堰三閘所關利害又有不得不言者按高家堰北當淮泗之衝南扼漕湖之吭地形最為高峻而淮揚兩郡及髙寶興泰山鹽各州縣地居下流所謂懸水數仞建瓴之勢也東北保障全藉此堰是豈可輕議開洩者近日建義諸口踰期未塞民田盡沈水底僅存災黎方且泣對重淵束手待斃而三閘一開勢必以淮揚為壑行見淮泗諸水滔滔東注將高寶漕隄蕩為湖海運船縴挽無路則數百萬糧何由而達京師各鹽場盡被淹没煮海無策則百餘萬鹽課其問諸水濵乎郡邑城池必致衝壞田廬漂蕩數百萬生靈悉為魚鼈則數百萬糧稅誰為供輸乎況開濬諸費業委水衡於逝波若淮揚水患頻仍不可收拾之後勢不得不議築塞又不知費朝廷幾百萬金錢矣嗟乎今天下脊脊多事司農仰屋竊歎者數矣國家財賦半在東南今一舉而阻運道廢鹽課棄兩郡數十州縣生靈之害備焉是何可不深長思也議者必曰高堰既不可開則三閘何以設也不知高堰自明興以來從未建閘建之自萬厯二十三年始然未幾旋以湮塞夫厯二百六十餘年開者一時而塞者永久固為運道民生關係匪細亦抑審形家聚洩之理有利於蓄而不利於開為祖陵地脈計者未嘗不深逺也今高堰日就圮壞識者岌岌乎抱宣房瓠子之憂有地方之責者方急議修築以求鞏固之不暇而可輕言開濬乎臣等生長淮泗之鄉習知地方利害之原乞廣集衆論熟計利害陵寢國計民生胥賴之矣帝是其議事遂寢崇禎長編崇禎十五年八月戊申泗州水患巳及陵牆詔有司保䕶崇禎長編崇禎十六年黄河溢由渦入淮漂没廬舍鳯陽府志行水金鑑巻六十四
