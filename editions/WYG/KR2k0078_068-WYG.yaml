body:
  text: 行水金鑑巻六十八江南按察使傅澤洪撰淮水聖祖仁皇帝康熈三十九年十一月初一日總河張鵬翮題奏臣遵㫖督修髙堰堤壩將六壩已閉其五夏家橋堵閉過半今惟留口門三十丈待宿州衛糧船過湖曾經題報在案今於十月十九日臣親往髙堰六壩一帶催工見湖水長至三尺臣由陸路至老子山觀淮水出洪澤湖之處一望汪洋無際通湖水長三尺詢之土人云因閉壩故爾水長若再加長堤工單薄可虞臣一面令夏家橋口門緩緩進埽以便分修官上緊臨湖鑲柴仍催尅期竣工足禦風浪即合龍門於二十一日馳至清口見引河水勢加長臣令河兵新穵之三􅆜河及疏通河口引水入爛泥淺帥家莊等河身俱已有水而張福口裴家場二引河水長盈滿測量水平引河水髙於黄仍將張福等河口之水匯入裴家場引河一處俟其水聚力强足以敵黄於二十四日西南風起引河水驟長比黄水髙一尺一寸臣率道㕔等官親放引河之水暢流入於運河臣擬俟回空糧船過完將運河頭壩堵塞逼清水出黄另疏題報但夏家橋口門堵閉後六壩水勢較今更為加長平漕之水足以敵黄溢漕之水應行宣洩因三滚壩尚未修成轉盼冰凌桃汛之水又至設遇西風鼓浪無處宣洩何以保固堤岸公議於翟家壩原有天然滚水壩之處地亢土堅仍留天然滚水壩寛百十餘丈用埽裹住兩頭平漕之水蓄以濟運溢漕之水聽其滚去出唐曹河入白馬湖若伏秋水大再於蔣家壩盡頭處原有之清水溝河以及涵洞酌量開放若水小仍然閉塞總以臨期相機而行務期有禆堤防再查六壩口寛二百八十丈今清口引河共寛三十餘丈不足以宣洩全湖之水應發帑再開寛闊使水暢流敵黄至於運河伏秋水漲應由涇河澗河洩出射陽湖入於海此二河見在挑浚應將涇澗二閘動帑修補以資啟閉臣親行相度形勢博采衆論一得之愚未敢擅便恭請皇上聖裁指示方略俾臣欽奉遵行奉㫖九卿詹事科道㑹同速議具奏九卿議准具題奉㫖依議速行初十日總河張鵬翮題奏臣凛遵聖訓指授方略明晰周詳先疏海口水有歸路今歳黄水不出岸矣繼挑芒稻河引湖水入江髙寶一帶水由地中行矣再闢清口開張福口裴家塲等引河淮水有出路矣又加修髙堰堵塞六壩逼清水復歸故道於十月二十四日引張福口等河㑹入裴家塲引河開放清水流入運河曾經具摺奏報臣一面將湖頭再加疏浚深闊以迎洪澤湖大溜又將張福口引水入裴家塲之處再挑寛深水大勢旺迅流暢沛今於十一月初三日直敵黄水暢流入運河矣運河之中純係清水已無黄水灌入臣於初九日自下河回至清口見水勢暢流大半入黄少半入運一水兩分若有神助官民快覩淮黄交㑹歡聲若雷皆感頌我皇上軫念國計民生宵旰憂勤精誠上孚天心河神效靈之所致也伏惟我皇上睿慮周詳聖謨獨斷邁神禹之峻烈貽萬世之平成臣愚不勝懽忻踴躍謹恭疏題報十三日總河張鵬翮題奏我皇上洪福齊天聖謨獨斷指授治河方略以至淮黄交㑹國計民生兩有禆益萬姓懽忻感頌無已但善後之計尚應次第講求者謹先就濟運言之臣觀見在諸引河之水勢聚而力强故足以敵黄而直出運口但大半出黄少半濟運一水兩分當伏秋黄長之時恐清水之力稍微臣率河官部員親行相度應於張福口裴家塲二引河空地中間迎湖大溜之處再挑引河一道面寛二十丈底深一丈㑹入一河出口敵黄俾清水之勢常强而禦黄有力將爛泥淺㑹入三􅆜河從七里河出文華寺運河專以濟運衆議僉同實屬可行所需銀兩於捐銀節省二項内動用不另請正帑理合具題奉㫖九卿詹事科道㑹同速議具奏㑹議具題奉㫖依議速行以上俱張文端治河書聖祖仁皇帝康熈四十年二月二十四日總河張鵬翮題稱武家墩至運口一帶堤工捍禦湖水風浪最闗緊要前河臣于成龍等題請大修髙堰堤工案内失於估計以彼時湖水未出故也今六壩堵閉全完洪澤湖水勢盛出遶流武家墩一帶堤根而舊堤卑矮單薄難資捍禦必須作速加幇髙厚簽釘排樁與髙堰堤工一律相平又新大墩至裴家塲從前未有堤工應創築攔湖壩一道方可束水禦浪敵黄濟運兹據淮揚道王謙詳稱武家墩至運口一帶堤工計長一千一百七十二丈約需工料土方銀二萬一千餘兩此工原屬髙堰工程應動髙堰大工銀兩作速興工蚤竣以資捍禦等因前來臣親勘委屬緊要一面動支髙堰大工銀兩委官作速辦料興工仍一面估計造冊另疏具題外所有急修緊要工程理合恭疏題明奉㫖該部速議具奏部議准覆奉㫖依議速行三月初九日總河張鵬翮題臣欽奉聖訓指授治河方略堵閉六壩大闢清口引清水暢流出口㑹黄入海濟運通行今三月初二初三初四三日桃汛已至黄淮並長清水盛出敵黄有餘時西南風大作髙堰一帶水長浪湧如龍門大壩髙堰大壩堤工卑矮水從月壩漫過與石工之頂相平臣親率河官搶修並六壩一帶堤工俱皆平穏但部臣范承勲等估計加幇時六壩未閉未得水勢髙下確實情形今六壩閉後全湖蓄水堤岸卑矮者離水面二三尺髙者離水面五六尺不等西風鼓浪危險堪虞應將卑矮之處再行加幇臣令河官作速估計動大工節省銀兩興修另疏具題其天然滚水壩尚未開放欲其蓄水敵黄若湖水再長相機開放以保堤工初八日臣查清口形勢武家墩三汊河爛泥淺裴家塲張家莊湖頭水勢相連沛然而出面寛數百丈直繞大墩其流至運口也三汊河裴家塲張福口張家莊四引河匯為一河寛九十丈流出二座攔黄壩壩基淤沙如湯沃雪自然消化至頭座攔黄壩刷寛四十六丈兩壩臺亦係淤沙見在蟄裂若清水再長勢必刷開自難存住詢之土人云當年黄淮交㑹時此係河心若刷去壩臺口門寛闊則清流益暢方足以洩全湖盛大之勢臣觀口闊水溜糧艘揚帆安流而過則土人之言不誣也但桃汛湖水已大伏汛勢必加長大墩一帶堤工禦河水而保運道闗係緊要令河官作速臨湖下埽加幇堤工髙厚以資捍禦其黄河因㑹淮合流桃汛水大馬家港難以合龍以致走埽口門寛二十丈目前水長不能進埽留此口門以洩溢漕之水亦可保固堤岸運河之水半長中河之水亦大糧船通行快利黄運中三河堤岸見在俱屬平穏除髙堰堤工間有浪窩及龍門大壩髙堰大壩西坎捐工漫水之處令各官上緊修補並查明髙堰石工間有塌卸段落照例於桃汛情形另疏具題外謹將清水盛出情形先行奏報奉㫖該部知道二十二日總河張鵬翮題稱髙堰一帶堤工前部臣范承勲等估計加幇時因六壩未閉未得水勢確實情形不過約略估計今六壩巳閉淮水復由故道㑹黄入海水勢加長全湖形勢可得其真今三月初二初三初四等日桃汛水長風暴大作臣見沿湖鑲柴卑者初浪掣土再浪掣柴惟髙者風浪不能撼越則是加髙工程實有禆益臣委員丈量自出水面至頂髙者五六尺不等卑者二三尺不等桃汛初至水勢已如此之大將來伏秋二汛勢必更長臣集新舊河官公議修防之法僉云通共加鑲柴工以七尺為度如六尺者加一尺五尺者加二尺以次第加髙出水面七尺庶可捍禦風浪准分修馬世濟宫夢仁金鋐等咨稱鑲柴加髙前來復咨商分修董訥王起元線一信陳汝器李應薦等衆議相同隨委効力知縣陳鵬年同該汛通判朱廷植等逐一按工確估自武家墩起至棠棃樹止計長一萬四千九百八十一丈二尺三寸需用工料土方銀二萬九千餘兩隨行淮徐道施世綸照數動支髙堰大工銀兩交原修官照段作速辦料加鑲以資捍禦其六壩與王家口新閉俱係埽工石堤未能即成公議於臨湖宻釘排樁以抵風浪而固堤身需用銀九千三百餘兩亦照數動髙堰大工銀兩交原修官速行辦料簽釘蓋蓄清敵黄全恃髙堰堤工堅固闗係最為緊要刻不容緩臣照例一面動帑交原修官作速興修估冊送部外理合恭疏題明奉㫖該部知道部議准覆奉㫖依議速行二十八日題六壩自棠棃樹迤南至秦家岡一帶堤工前河臣于成龍等因彼時六壩未閉水勢東注此處地勢稍髙未經估計加幇今據淮徐道副使施世綸等詳稱今六壩全堵湖水驟長通堤俱經加髙此處反覺卑矮一遇西風鼓浪危險堪虞必須照六壩一律臨湖丁頭鑲柴以資捍禦計工長八百九十四丈需用銀一萬九百六十三兩零動用髙堰大工銀兩交各分修鑲柴仍責令該汛㕔員協修以期速竣等因前來臣覆親勘無異相應題估奉㫖該部速議具奏部議覆奉㫖依議速行四月初四日工部郎中王進楫傳奉上諭對總河張鵬翮説保守髙家堰第一要緊初八日總河張鵬翮題今六壩全閉淮水初復故道水勢蓄長止由清口一路㑹黄入海一切堤工俱係新築湖寛水盛風浪易發最為險要加謹保守誠如聖諭臣等公議保守之法一在分地巡防自清口歴髙家堰至六壩每五里派官二員不分風雨晝夜巡防發帑委能員備料運貯工所備用其臨湖鑲柴預防浪掣武家墩至髙家堰今原修㕔員住工防守自小黄莊至周家橋令分修諸臣住工防守自周橋至六壩令分修諸臣及接修學道河員住工防守臣仍不時親往髙堰適中之地分頭督催一在修理險要工程查龍門大壩部臣范承勲等原估鑲柴二路後止鑲一路將一路節省不鑲今湖水盛大止鑲一路堤身單薄不足禦浪應將節省一路仍發帑令分修宫夢仁作速購料加鑲其髙澗大壩地勢低窪内有積水深潭係分修撫臣髙承爵所修之工裏戧旋修旋蟄舊堤頂寛不滿三尺一遇風浪甚屬危險臣相度形勢應於裏口築越堤一道以為重門之障委効力學道王式榖領帑承築該汛官協修其内戧蟄䧟之處仍令髙承爵之弟髙䕃爵照原估下埽鑲填堅實至於宣洩之方因三滚壩尚未修成從權暫設天然滚壩遇淮黄並長之時清水由天然滚壩洩出黄水由王家營減壩洩入鹽河下海已經題明奉㫖允行在案如此則巡防嚴密堤工可免汕刷宣洩以時堤工可保無虞似亦保守之一端也理合題明奉㫖該部知道部議准覆奉㫖依議速行髙澗大壩裏戧蟄䧟之處著髙承爵自往河工作速修補十一日總河張鵬翮題六壩全閉髙堰一帶堤工闗係最為緊要龍門壩石工係革職管河道馮佑領帑修砌原估九層較之臨湖一帶石工卑矮四五尺不等積水淹没石頂危險堪虞必須加砌五層髙出水面方資捍禦行據淮揚道叅議王謙詳稱工長二百一十丈加髙五層共需工料銀五千五百餘兩屢催馮佑遷延不修若仍令馮佑修理勢必遲誤此係緊要工程應照例動髙堰大工帑銀委該汛署主簿事許瑜等辦料乘時修砌所用銀兩於馮佑名下照追還項等因前來臣覆覈無異除原冊送部查核外臣謹具題奉㫖該部速議具奏部議准覆奉㫖依議速行二十一日總河張鵬翮題髙堰清水潭工程最為險要臣率道㕔等官親往勘驗原係積水深潭南一半長二十丈係督修尚書臣范承勲等委分修原任貴州巡撫衞既齊承築之工估用埽料銀四千九百餘兩已經領帑修築工程將完遽爾蟄䧟埽工無存又北一半亦長二十丈係委分修原任廣東巡撫江有良承築之工估用埽料銀四千九百餘兩亦經領帑修築工未及半今亦蟄䧟臣等公同相度此工臨湖舊堤面寛二丈三尺及三丈不等雖有石工尚虞卑薄而内裏潭形如釡底水深底淤樁埽難施幇築裏戧土工難於存立公議於内裏加築月堤一道以為重門之障此工最闗緊要又值伏汛伊邇奉有保守髙家堰第一緊要之㫖若責令原任巡撫衞既齊江有良賠修誠恐一時無措緩不濟急應照例動支髙堰大工銀兩令衞既齊及江有良之孫江夢筆作速修築月堤以資捍禦用過銀兩仍將衞既齊江有良名下照數追取還項庶要工不致貽誤矣所有需用錢糧除委該道㕔確估造冊另行咨部外理合具疏題明奉㫖該部速議具奏部議准覆奉㫖依議速行二十六日工部議得河道總督張鵬翮疏稱六壩閉後河水已退行據淮揚道叅議王謙詳草子河築堤長四千八百九十五丈唐曹河築堤長三千三百一十五丈又天然壩二座各口寛六十丈兩頭用埽裹䕶並築攔湖越壩二道以便相機開放又臨湖釘鎖口樁二路以防壩底刷深共估計土方工料銀一萬二千四百餘兩因係緊要工程臣照部文一面動帑委官修理等因前來查先經該督將髙堰滚壩下就原有之草子河唐曹河開為引河并築順水堤又翟家壩留天然滚水壩寛百十餘丈以洩洪湖溢漕之水等因具題經九卿㑹議覆令一面興工一面將需用銀兩確估具題行文在案今既經該督估計具題應令其速行修築完工覈減造冊題銷可也奉㫖依議速行五月二十一日大學士伊桑阿馬奇王熈吳琠熊賜履張英學士法良辛保傅紳范承烈王九齡曹鑑倫奉㫖髙承爵奏報泗州盱眙地方水災著總河張鵬翮㑹同兩江總督阿山親行察勘具奏前髙家堰閉塞六壩時朕謂六壩塞完後泗州盱眙等處必被水淹曾向九卿降有諭㫖今六壩方經閉完洪澤湖水長泛溢泗州盱眙等處城郭田畆果被水災髙家堰堤益覺危險朕為此時厪於懐且天災靡定萬一有異常風暴及地動雷震之事亦未可知倘若髙家堰至於危險則揚州淮安等處皆被災矣朕為此日夜甚切憂懼髙家堰堤作何保守堅固或另有修治善策著張鵬翮陳奏著差爾衙門中書一員前往六月初八日總河張鵬翮摺奏康熈四十年五月二十九日接内閣中書李保住奉㫖到臣内開云云臣跪誦之下仰見我皇上軫念民生注意河工無時不厪聖懐凡河工之事洞照於未然之前應驗於已然之後此皆我皇上大智如神臣查泗州水災自古已然即六壩全開之時泗州亦被水淹臣於四月二十八日前往泗州查勘水勢情形詢據土人云明季時有水災於康熈十九年泗州城被水淹没官民移徙堤上等語且康熈三十八年李柄題報水災揭云泗居山河聚匯之區連年積水為殃災困頻仍歴䝉皇恩等語則泗州水災不全係六壩之閉也按泗州志載宋臣歐陽修泗州先春亭記云問民所素病而治其尤暴者莫大於淮則知淮之為暴於泗自古而已然矣臣觀形勢盱眙在山之腰泗州在山之下淮水繞泗州而流三十里有龜山屹立河中又十五里流過老子山出洪澤湖乃汪洋暢沛一遇水發奔濤遏鬱水流不及勢必助長又有歸仁堤諸湖之水奔泓而下入於泗州此其所以多水災也桃汛水長淹没職此之故今四五兩月清口水流甚暢洪澤湖水漸消泗州水勢亦漸消且六壩既閉之後水不東注髙郵寶應興化泰州山陽鹽城江都等州縣田地涸出人居平土田可耕種到處感頌皇仁歡聲如雷且今嵗漕艘運河揚帆遄行於四月十二日盡數過淮較往年甚速此皆由六壩之閉也其保守髙堰之法派員備料防守修理髙良澗等險要工程若遇水大開天然壩宣洩已經前疏題明奉㫖俞允在案今捧讀綸音臣雖卧病傳聚衆河官講求另有修治善策咸稱清口暢流㑹黄流過惠濟祠達大茭陵一帶皆係清水今五月已過湖水較桃汛時消落二尺餘堤岸平穏此清口引動湖水大溜之所致也若倣古制於翟家壩建閘以資宣洩但石工不能即成不若馬家港口門仍留不堵以分洩黄河之水辛家蕩修滚水壩以洩黄河異漲之水下流益暢則淮水之出清口亦暢淮水之出清口既暢則泗州之淮流不壅况馬家港在雲梯闗之下辛家蕩在大通口之下皆地處海套並無民田不闗運道且欽奉上諭開歸仁堤引湖水出黄則泗州上源之水又無所入上無所入下有所疏將來泗州水患庶幾可減等語衆河官之議與臣相同但係一得之愚未知當否伏候聖裁指示臣觀天意人心可保其成五月初四五等日髙堰微雨下河一帶則大雨五日兩次風暴片刻轉風浪不逾堤河工効力人員踴躍捐資疏浚湖頭引水流暢趨事赴工引領而樂觀河工之成臣等加意防守過此六七八三箇月水落歸槽則具疏題報成功仰慰睿懐總之黄運中三河俱復故道東南萬姓咸慶河工之成皆仰賴皇上區畫周詳聖謨獨斷精誠感孚天心順應河伯効靈所致也再照五月二十四日臣在髙堰六壩巡查督催感冒風寒於二十七日回清江行署服藥調理不能即往泗州㑹勘隨咨商兩江督臣阿山或俟病愈訂期㑹勘抑或督臣先往查勘准督臣覆稱先往蕪湖常州秋審等語今臣病稍愈移咨督臣擬於本月往泗州等處㑹勘另疏具題外所有髙堰目前平穏及水勢情形理合先行奏報臣謹具摺付中書李保住賫捧謹奏請㫖九卿詹事科道㑹議具題奉㫖這堤岸修築防䕶著照議行前總河于成龍具疏欲將髙堰六壩堵塞蓄湖水以敵黄水疏通清口九卿覆奏時朕以為髙堰六壩若行堵塞湖水泛漲泗州等州縣必被水淹没曾諭九卿速遣范承勲等堵塞六壩此非張鵬翮到任之後始行堵塞頃因巡撫髙承爵題報泗州盱眙水災朕勅張鵬翮㑹同江南總督阿山踏勘情形將泗州盱眙泛溢之水設法修治作何賑濟蠲租令其奏聞又以洪澤湖水泛漲髙家堰堤工以致危險朕於此事時切躊躇若髙家堰至於危險揚州淮安等處州縣皆被淹没朕為此日夜殊切憂懼髙家堰堤作何保守堅固更有何修治善策著張鵬翮陳奏曾遣人勅諭張鵬翮稱病未往泗州盱眙今具疏稱泗州盱眙水災自古已然即六壩全開泗州亦被水災臣往泗州查勘水勢情形詢據土人云明季時有水災則泗州之水不係六壩之閉按泗州志載宋臣歐陽修先春亭記云民所素病而治其尤暴者莫大於淮則知淮之為暴於泗自古而已然矣今清口水流甚暢洪澤湖水漸消泗州水勢亦漸消且六壩既閉之後水不東流髙郵寶應興化泰州山陽鹽城江都等州縣田地涸出民得耕種皆河伯效靈之所致等語朕著張鵬翮㑹同阿山將泗州盱眙泛漲之水作何設法築堤幇修或賑或蠲俱有益於災黎並非欲開髙堰六壩救泗州盱眙之民而令淮揚百姓罹於水患也朕念黄河運河闗係國計民生三次看閱河工屢行簡任河臣修築堤岸每嵗不惜數百萬帑金解發夏月雨水時晝夜憂慮不時遣人看視凡被水災截留漕米盡出倉糧賑濟者總為拯救災民並非賑救泗州盱眙百姓之災而淮安揚州等處百姓聽其罹災之意也據張鵬翮謂泗州旴眙水災自古已然而淮揚水災亦素有也張鵬翮奏稱六壩既閉淮安揚州百姓俱免水災是但知淮揚地方豈獨不知有泗州盱眙天下之大亦并不知其為愚昧已至於極朕念四海一家凡有來朝見者必細詢雨澤田禾見有居住賀蘭山後公允木春來見問陜省河西田禾雨澤黄河水勢據允木春奏稱今嵗自正月至六月滴雨未降黄河水消二丈有餘西地賴黄河水引入田畝耕種今年因黄河水小不但田禾即莖草亦未生發朕以陜省河西百姓作何拯救雖督撫未經具題已晝夜籌度張鵬翮與衆河官乃謂清口水出皆賴河伯效靈伊等効力所致此實因黄河水小清口之水倖而得出并非伊等効力之所致也統一天下之主坐視災黎不為拯救張鵬翮既係讀書之人此果載之何記何書耶至張鵬翮題請議敘河員疏内明知朕有諭㫖故稱九卿未晰今覽此奏又含怒具題意謂必有人阻撓果如此懸擬昏憒之極未有如張鵬翮者這事情又似鹽犯大賊孔文泰之案希圖好勝冒昧不顧將取罪戾著將朕諭㫖及張鵬翮所奏一并刋刻於淮安揚州泗州盱眙等處徧行張挂令衆人觀看天下之人自有公論以上俱張文端治河書行水金鑑卷六十八
