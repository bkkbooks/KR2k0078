body:
  text: 行水金鑑巻七十四江南按察使傅澤洪撰江水岷山導江東别為沱禹貢岷山江所出在梁州沱江别名孔氏傳漢地理志云南郡支江縣江沱在西此荆州之沱也蜀郡郫縣江沱在西此梁州之沱也蓋自江水溢出别為支派者皆名為沱故梁荆二州皆有沱也此言東别為沱接於岷山導江之下則自江水始出而别流者也意其指梁州之沱也尚書全觧易氏曰岷山漢志在蜀郡湔氐道西徼外考唐志岷山近在茂州而江源逺出西徼松州交川縣古西羌地江源鎮在縣西北三十里江南流二百四十里至冀州冀水縣二百歩又六十里至茂州汶山縣汶山即岷山禹導江始此又經蜀州之青城縣彭州之導江縣後以二縣治永康軍又三百七十里至成都縣南七里縣有沱江鎮以沱水名即東别為沱者也書纂言十四川總志成都縣附郭沱江一在新繁治西北一五里源出岷江禹貢岷山導江東别為沱即此一在灌縣南一十五里俱流入府界舊說江出岷山在今茂州汶山縣發源不一而亦甚微水經注曰其源若甕口可以濫觴四川總志曰岷山在茂羌之列鵞村一名鴻濛即隴山之南首故稱隴蜀又名沃焦山江水所出水利志曰蜀諸水咸出岷江江源在羌地之列鵞村名羊膊嶺者分為二派一西南流為大渡河一正南入溢村至石紐過汶川歴今灌縣境又有湔水出焉灌之上流西北十數里有水出尤溪口又數十里有水出白沙口同會於灌經灌西南流者為之南江即禹所導岷江正流江源志曰岷江發源於臨洮之朩塔山山頂分東西流由甘松嶺八百里至漳臘其水漸大復經䥥刀灣達松潘於下水闗入紅花屯達壘溪至穆肅堡黑水從南合之入深溝經茂州南至於威汶轉銀嶺合草坡河至蠶巖入灌口分道而下由威至玉壘山為玊輪江至汶為皂江至灌為沫江一云洮河發源岷山北流入陜為臨洮府南入川為大川之祖范成大曰江源自西戎中來由岷山澗壑出而會於都江世云江出岷山者自中國所見言之也陸游曰常登嶓冢之山有泉㳙㳙出山間是為漢水之源事與經合及西游岷山欲窮江源而不可得蓋自蜀境之西大川廣谷谽谺起復西南走蠻箐中皆岷山也則江所從來尤荒逺難知履按雲南志謂金沙江之源出於吐蕃之犁石南流漸廣至於武定之金沙廵司經麗江鶴慶又東過四川之會州建昌等衛以達於馬湖敘南然後合於大江趨於荆吳又緬甸宣慰司志謂其地勢廣衍有金沙江闊五里水勢甚盛緬人恃以為險其源之逺且大也明矣何為言江源者止於岷山耶蓋江出犁石即崑崙之南河出朶甘思即崑崙之西二源實前人所未詳也方中履古今釋疑川西自岷峨北流為洮入黄河南流入川為大江此知岷峨總是一山只横障西南二處為異耳今江水果随岷峨至嘉眉直下中間如嶲州之大渡沫水夾江之青衣犍為之漢水無不凑集至嘉定為一都聚合之禹貢岷山導江一語地勢愜合蔣鳴玊漢水記考岷山廣逺江水所出必有定處近世無能窮其源者隋經籍志有尋江源記一巻今不傳未知其說云何據漢志言江水出湔氐道西徼外則當以酈注所引益州記為正自晉以下說江源者皆云出羊膊嶺與益州記同羊膊嶺一名鐵豹嶺按益州記江水𤼵源自羊膊嶺東南下二百餘里至西陵又南下二百四十里至汶山故郡即今茂州是也然則江源在茂州之西北去州四百四十餘里亦可謂逺矣而范至能陸務觀乃云江源出西戎不可窮極蓋以唐人言江源自松州甘松嶺始元和志松州治嘉成縣南至翼州一百八十里甘松嶺在縣西南十五里交川縣北至州三十四里江源鎮在縣西北三十里而當時又有謂羊膊嶺在茂州列鵞村者其地太近故為是說非謂江源更在羊膊之外也近志引江源記云岷江發源於臨洮木墖山山頂分東西流南流八百里經甘松嶺又南經漳臘堡西其水漸大復經䥥刀灣達松潘下水闗臨洮今陜西洮州衛也在松潘之東北江源果𤼵此則又自東北而來與氐道西徼外之岷山相去懸絶為此說者蓋因隋志云岷山在臨洮郡臨洮縣括地志云岷山在岷州溢樂縣見有一水自木塔山來入江者遂以為江水發源彼中明與漢志相背無稽之言不可從也古今言岷山者凡四處一在今四川松潘衛衛東南去布政司七百六十里史記作汶山封禪書云自華以西名山七有瀆山蜀之汶山也漢書地理志云岷山在湔氐道西徼外江水所出蜀志秦宓曰蜀有汶阜之山江出其腹華陽國志云岷山一名沃焦山其跗曰羊膊江水所出任豫益州記云大江泉源始發羊膊嶺下東南下百餘里至白馬嶺而歴天彭闕水經注云岷山在蜀郡氐道縣即瀆山也又謂汶阜山在徼外江水所導隋志汶山在汶山郡左封縣唐悉州治東至翼州一百九十里今叠溪營西有廢翼州此皆謂在松潘者也一在今成都府之茂州州本冉駹國漢以其地置汶山郡治汶江縣晉改曰廣陽隋又改曰汶山山海經注云岷山在廣陽縣水經注云汶水出汶江道徼外㟭山玉輪坂下元和志云汶山縣有汶山即岷山去青城山百里天色晴明望見成都即隴山之南首張栻西岳碑云岷山在茂州列鵞村其跗曰羊膊也輿地廣記云岷山在汶山縣西北俗謂之鐵豹嶺王氏地理通釋云太渡河一名羊山江源出鐵豹嶺嶺即羊膊之異名也此皆謂在茂州者也一在成都府之灌縣縣夲漢緜虒郫江原三縣地周武帝分江源置青城縣因山為名元和志云青城山在蜀州青城縣西北三十二里杜光庭成都記云岷山連峯接岫千里不絶灌縣青城山乃其第一峯也縣志云汶山在縣北三十里蓋即青城矣一在今陜西岷州衛衛本漢隴西郡地西魏置溢樂縣今衛治即其故城括地志云岷山在岷州溢樂縣南連緜至蜀幾二千里皆名岷山元和志云山在溢樂縣南一里此皆謂在岷州衛者也然則岷山最大志家各就其所在言之陸游曰自蜀郡之西大山廣谷谽谺起伏西南走蠻箐中皆岷山也薛季宣曰今自岷洮松疉以南其大山峻嶺班班可考者皆岷山之隨地立名者耳此說是也觀漢志云山在徼外則固不可以湔氐一縣限之矣大抵岷山北起于溢樂實跨古雍州之境而南則訖于青城緜地千餘里與太行伯仲或專指在松潘亦非篤論然大江所出則必直氐道西徼外者也沱謂梁之郫江荆之夷水也東别為沱者謂江水東流而别為沱以大勢言之江自梁而荆皆東也傳云江東南流沱東行非是正義云以上云浮於江沱潛漢其次自南而北江在沱南知江東南流而沱東行是專以荆州之沱釋傅也蔡傳云沱江之别流於梁者則又遺却荆州之沱東至於澧相去不太闊絶乎唯林氏兼二州言之確不可易禹貢錐指爾梁州之沱雅音義云沱水自蜀郡都安縣湔山與江别而東流地理志禹貢江沱在蜀郡郫縣西東入大江此即今之郫江爾雅所謂沱也今成都府灌縣東有都安故城詩召南曰江有沱荆州之沱也一在江北寰宇記江自枝江縣百里洲首受别北為内江者是一在江南水經注夷水出魚復縣江至夷道縣北東入江者是今湖廣荆州府宜都縣西有夷道故城岷山在蜀郡氐道縣大江所出東南過其縣北水經岷山即瀆山也水曰瀆水矣益州記曰大江泉源即今所聞始發羊膊嶺下縁崖散漫小大百數殆未濫觴矣東南下百餘里至白馬嶺而歴天彭闕亦謂之為天谷也秦昭王以李氷為蜀守氷見氐道縣有天彭山兩山相對其形如闕謂之天彭門亦曰天彭闕江水自此已上至微弱所謂發源濫觴者也漢延平中岷山崩壅江水三日不流酈注曰氐道即湔氐道蜀漢氐道晉改名升遷今四川松潘衛治是也通典彭州導江縣西有天彭闕兩山相對如闕州名取此導江即今灌縣西北去松潘六百餘里非益州記之所謂天彭闕也江水自天彭闕東逕汶闗而歴氐道縣北水經漢武帝分蜀郡北部置汶山郡以統之縣本秦置後為升遷縣也益州記曰自白馬嶺囬行二千餘里至龍涸又八十里至西陵縣又南下六十里至石鏡又六十餘里而至北部始百許步又西百二十餘里至汶山故郡乃廣二百餘步又西南百八十里至濕坂江稍大矣故其精則井絡纒曜江漢昞靈河圖括地象曰岷山之精上為井絡帝以會昌神以建福故書曰岷山導江泉流深逺盛為四瀆之首廣雅曰江貢也風俗通曰出珍物可貢獻釋名曰江共也小水流入其中所公共也東北百四十里崍山中江所出東注於大江又東百五十里曰崌山北江所出東注於大江江水又逕汶江道汶出徼外㟭山西玊輪坂下而南行又東逕其縣而東注於大江故蘇代告楚曰蜀地之甲浮船於汶乗夏水而下江五日而至郢謂是水也酈注改升遷縣後魏時陷於吐谷渾周天和元年置龍涸郡嘉誠縣龍涸亦曰龍鶴華陽國志云蜀時以汶山險要自汶江龍鶴冉䮾白馬匡明皆置戌守元和志雪山在松州嘉誠縣東八十里春夏常有積雪甘松嶺在縣西南十五里龍凅故城俗名防渾城在翼州衞山縣北十一里城之北境舊為吐谷渾所居故曰防渾笮橋在縣北三十七里架北江水元和志翼水縣北至翼州六十里石鏡山在縣東南九里大江水經縣西二百步汶江為蜀郡北部都尉治故謂之北部漢元鼎六年以冉䮾地置汶山郡治汶江縣地節三年郡廢縣屬蜀郡建安中先主定蜀復分置汶山郡治汶江縣今茂州是也其故城在州北三里晉移郡於緜虒縣界改汶江曰廣陽屬焉在今州南二百里故謂漢所置曰汶山故郡即宣帝所廢為蜀郡北部也隋改廣陽曰汶山縣復置汶山郡元和志云有汶山即岷山去青城百里元和志濕坂在茂州汶川縣南一百三十七里嶺上樹木森沉嘗有水滴未嘗暫燥故曰濕坂汶水亦名玉輪江方輿勝覽云在汶川縣北三里玉壘山元和志云在汶川縣東北四里也縣北去茂州百里本漢緜虒縣地今為保縣又有湔水入焉水經水出緜道亦曰綿虒縣之玊壘山呂忱云一曰半浣水也下注江酈注所地理志蜀郡緜虒縣玊壘山湔水出緜虒即今成都府汶川縣又東别為沱水經郭景純所謂玊壘作東别之標者也渡江有笮橋酈注又歴都安縣水經李氷作大堰於此堰於江作塴塴有左右口謂之湔塴江入郫江撿江以行舟益州記曰江至都安堰其右撿其左流遂東郫江之右也因山頺水坐致竹朩以溉諸郡蜀人旱則藉以為溉雨則不遏其流故記曰水旱從人不知饑饉沃野千里世號陸海謂之天府也諸葛亮北征以此堰農本國之所資以征丁千二百人主䕶之有堰官江水又逕臨邛縣縣有火井鹽水昏夜之時光興上照又逕江鄉縣􅗪江水出焉又東北逕郫縣又東逕成都縣縣有二江雙流郡下故揚子雲蜀都賦曰兩江珥其前者也風俗通曰秦昭王使李氷為蜀守開成都兩江溉田萬頃兩江有七橋直西門郫江沖里橋西南石牛門曰市橋吳漢入蜀自廣都令輕騎先往焚之橋下謂之石犀淵李氷昔作石犀五頭以厭水精穿石犀渠於南江命之曰犀牛里後轉犀牛二頭在府中一頭在市橋一頭沉之於淵也大城南門曰江橋橋南曰萬里橋西上曰夸橋下曰莋橋南岸道東有文學始文翁為蜀守立講堂作石室於南城後學堂火後守更增二石室後州學奪郡學移夸里道西故錦官也言錦工織錦則濯之江流而錦至鮮明濯以沱江則錦色弱矣遂命之為錦里也江北則左對繁田文翁又穿湔㳛以溉灌繁田一千七百頃又東絶綿洛逕五城界至廣都北岸南入於江謂之五城水口斯為北江水又東至南安為碧玊津故左思云東越玊津也酈注漢都安本緜虒郫江原三縣也蜀漢分置都安縣屬汶山郡唐改導江屬成都府明為灌縣都安故城在縣東都安堰在縣西華陽國志曰李氷壅江作塴穿郫江撿江别支流雙過郡下以行舟船蓋以郫撿為二江撿江即任豫之所謂流江也又有揵尾堰元和志云在導江縣西南二十五里李氷作之以防江决破竹為籠圓徑三尺長十丈以石實中累而壅水臨邛縣漢屬蜀郡今卭州是江鄉今為崇慶州漢志江鄉縣􅗪水首受江南至武陽入江武陽今眉州及新津仁夀井研三縣地故郫城元和志在縣北五十步成都故城即今縣治蜀王開明故都也秦置成都縣舊有大城少城羅城羊馬城漢蜀郡有廣都縣其故城在今成都縣東南新津縣東北繁繁縣之田今為新繁也又東南過犍為武陽縣青衣水沫水從西南來合而注之水經縣故大夜郎國漢武帝開道置以為縣有􅗪江入焉出江鄉縣首受大江東南流至武陽縣注於江縣下注上舊有大橋廣一里半謂之安漢橋水盛嵗壊民苦治功後太守李嚴鑿大杜山尋江通道此橋遂廢縣有赤水下注江此縣藉江為大堰開六水門用灌郡下北山江水又與文井江會李氷所導也文井水又東逕江都縣縣濱文井江江上有長堤堤跨四十里有朱亭又東至武陽縣天社山下入江江水自武陽東至彭亡聚曰外水又東南逕南安縣西有熊耳峽連山競險接嶺爭髙有灘名壘坻亦曰鹽溉李氷所平也縣治青衣江會衿帶二水矣即蜀王開明故治也縣南有峨眉山有濛水即大渡水也水發濛溪東南流與涐水合南至南安入大渡水大渡水又東入江酈注雅犍為郡有南安縣今嘉定州及夾江犍為洪等縣皆其地武陽己見前水經青衣水出青衣縣西䝉山東與沫水合也至犍為南安縣入於江沫水出廣柔徼外東南過旄牛縣北又東至越嶲靈道縣出蒙山南東北與青衣水合東入於江又東南過僰道縣北若水淹水合從西來注之又東注水北流注水經下注水疑誤北流注當有之字縣本僰人居之地理風俗記曰夷中最仁有人道故字從人秦紀謂僰僮之富者也漢武帝感相如之言使縣令南通僰道費功無成唐蒙南入斬之乃鑿石開閣以通南中迄於建寧二千餘里山道廣丈餘深三四丈其鏨之跡猶存江中崖峻岨險不可穿鑿李氷乃積薪燒之故其處懸巖猶有赤白𤣥黄五色焉酈注出僰道屬揵為部今為宜賓縣叙州府治水經若水蜀郡旄牛徼外東南至故闗為若水也南過越嶲卭都縣西直南至會無縣淹水東南流注之又東北至朱提縣西為瀘江水又東北至僰道縣入於江淹水出越嶲遂久縣徼外東南蜻蛉縣又東過姑復縣南東入於若水又與符里水合水經水出寧州南廣郡南廣縣縣故犍為之屬縣也導源汾闗山北流有大步水注之出南廣縣北流至符里水又北逕僰道入江謂之南廣口酈注州故符縣在今叙府合江縣西又東過江陽縣南洛水從三危山東過廣魏洛縣南東南注之水經洛水出洛縣漳山南逕洛縣故城南廣漢郡治也又南逕新都縣蜀有三都謂成都廣都此其一焉與緜水合水西出緜竹縣又與湔水合亦謂之郫江也又逕犍為牛鞞水又東逕資中縣又逕安漢縣謂之綿水也自上諸縣咸以溉灌故語曰綿洛為没沃也綿水至江陽縣方山下入江謂之綿水口曰中江江陽縣枕帶雙流據江洛會也酈注府江陽屬犍為郡今叙州富順縣及瀘州納溪江安皆其地漢志廣漢郡雒縣章山雒水所出南至新都北入湔緜竹縣紫岩山緜水所出東至新都北入雒緜洛會湔以湔為主故緜虒縣下云湔水東南至江陽入江過郡三行千八百九十里酈注言湔水至廣都北岸入江蓋特其枝津相通耳正流則固合綿洛至江陽入江也湔水與郫江通波故曰緜洛與湔水合亦謂之郫江四川總志新都縣在成都府北六十五里本漢舊縣屬漢廣郡後置新都郡治雒縣雒縣即今漢州資中即今資縣内江地安漢縣在今富順縣界逕安漢縣北水經縣雖廹山川土地特美蠶魚鹽家有焉江陽郡治也故犍為岐江都尉建安十八年劉璋立酈注東逕樊石灘又逕大附灘水經頻歴二險也酈注又東過符縣北邪東南鰼部水從符闗東北注之水經漢志有邪龍縣縣故巴夷之地漢武帝建初六年以唐蒙為中郎將從萬人出巴符闗者也其鰼部之水所未聞矣或是水之殊目非所究也酈注府故符縣在今叙州合江縣西又東北至巴郡江州縣東强水涪水漢水白水宕渠水五水合南流注之水經强水即羌水也宕渠水即潛水渝水矣巴水出晉昌郡宣漢縣巴嶺山西南流歴巴中逕巴郡故城南西南入江庾仲邕所謂江州縣對二水口右則涪内水左則蜀外水即是水也江州縣故巴子之都也秦置巴郡漢初平元年分巴為三郡於江州則永寧郡治也酈注水江州即今巴縣江津綦江二縣亦其地水經羌出羌中參谷又東南至廣魏白水縣與漢水合又東南過巴郡閬中縣又南至墊江縣東南入於江涪水出廣魏涪縣西北南至小廣魏與梓潼合梓潼水出其縣北界西南入於涪又西南至小廣魏縣南入於墊江墊江今合州也漢水即嘉陵水巴水一名北水其下流為宕渠水水經潛水出巴郡宕渠縣注潛水蓋漢水支分潛出故受其稱劉澄之稱白水入潛然白水與羌水合入漢是猶漢水也縣以延熙中分巴立宕渠郡蓋古賨國也今有賨城縣有渝水夾水上下皆賨民所居又水經白水出朝陽縣西注云蓋邑郭淪移川渠狀改故名舊𫝊遺稱在今也又東至枳縣西延江從牂牁郡北流西屈注之水經東逕陽闗巴子梁江之兩岸猶有梁處巴之三闗斯為一也江水又東右逕黄葛峽又左逕明月峽東至梨鄉歴雞鳴峽江之南岸有枳縣治華陽記曰枳縣在江州巴郡東四百里治涪陵水會庾仲邕所謂有别江出武陵者也水乃延江之枝津分水北注逕涪陵入江故亦云涪陵水也江水又東逕涪陵故郡北又東逕漢平二百餘里左自涪陵東出百餘里而屇於積石東為桐柱灘酈注巴陽闗在今巴縣東漢枳縣屬郡今重慶之涪州及長壽酆都二縣皆其地涪陵亦屬巴郡今黔州彭水武隆三縣是也水經延江水出犍為南廣縣又東至牂牁鄨縣東屈北流至巴郡涪陵縣注更始水又東南至武陵西陽縣入於酉水酉水東南至沅陵縣入於沅沅水見後又逕東望峽東歴平都水經峽對豐民洲舊巴子别都也華陽記曰巴子雖都江平州又治平都即此處酈注今後漢析枳縣地置平都縣重慶府酆都是也又逕虎䰅灘水經灘水廣大夏斷行旅酈注十今忠州西二里有石梁亘三餘丈横截江中俗呼倒䰅灘即此又東逕臨江縣南水經華陽記曰縣在枳東四百里東接朐忍縣酈注屬漢臨江巴郡今為忠州及墊江縣朐忍漢縣屬巴郡朐音劬今夔州府雲陽萬縣開縣梁山地忍漢書作䏰又東得黄華水口水經江浦也酈注左逕石城南水經庾仲邕曰臨江至石城黄華口一百里酈注又東至平洲水經洲上多居民酈注又東逕壤塗而歴和灘又東逕界壇水經是地巴東之西界益州之東境故得是名酈注又東右得將龜谿口水經華陽記曰朐忍縣出靈龜自此谿也酈注又東會南北集渠水經二谿水涪陵縣界謂之于陽谿谿水北流注於江謂之南集渠口亦曰于陽谿口又南一百里入朐忍縣南入於江謂之北集渠口别名班口又曰分水口酈注又右逕池谿口水經蓋江汜決入也酈注又東逕石龍水經水至於博陽二村之間有盤石廣四百丈長六里而復殆於岨塞江川夏没冬出基亘通渚酈江又東逕羊腸虎臂灘水經楊亮為益州至此舟覆懲其波瀾蜀人至今猶名之曰使君灘酈江又東彭水注之水經水出巴渠羣獠中東南流逕漢豐縣東而西注彭谿謂之清水口彭谿又入逕朐忍縣西六十里南流至於江謂之彭谿口酈注開漢豐縣即今夔州府縣朐忍見前又東右逕朐忍縣故城南水經常璩曰縣在巴東郡西二百九十里縣治故城跨其山坂南臨大江江南岸有方山枕側江濆酈注又東逕瞿巫灘水經即下瞿灘也乂謂之博望灘左則湯谿水注之水源出縣六百餘里上庸界南流歴其縣翼帶鹽井一百所巴川資以自給粒大者方寸中央隆起形如張傘故因名之曰傘子鹽有不成者形亦必方異於常鹽矣湯谿下與檀谿水合上承巴渠水巴渠南歴檀井谿之檀井水下入湯水湯水又南入於江名曰湯口酈注又逕東陽灘水經常璩曰水道有東陽下瞿數灘山有大小石城靈壽朩及橘圃也酈注又逕魚復縣之故陵又東為落牛灘逕故陵北水經江側有六大墳庾仲邕曰楚都丹陽所葬亦猶枳之巴陵矣故以故陵為名酈注節魚復漢縣屬巴郡今為奉縣故陵在縣西接雲陽縣界界北三里有赤甲城即故城也又右逕夜清而東歴朝陽道口又東左逕新市里南水經常璩曰巴舊立市於江上今新市里是也酈注又東右合陽元水口水經水口出陽縣西南高陽山東東北流逕其縣南丙水注之水發縣東南柏枝山山下有丙穴穴中有嘉魚亦襃漢丙穴之𩔖也其水北流入髙陽谿谿水又東北流注於江謂之陽元水口酈注節陽縣在今奉縣界又東逕南鄉峽東逕永安宫南水經昭烈終諸葛亮受遺處其間平地可二十許里江山迥闊入峽所無酈注奉永安宮城即今節縣治又東逕諸葛亮圖壘南水經石磧平曠望兼川陸有亮所造八陣圖東跨故里皆累細石為之自壘西去聚石八行行間相去二丈因曰八陣既成自今行師庶不覆敗皆圖兵勢行蔵之權自後深識者所不能了酈注八今奉節縣南有陣圖磧又東南逕赤岬西水經是公孫述所造因山據勢周迴七里一百四十步東高二百丈西北高一千丈南連基白帝山甚高大不生樹朩其土悉赤土人云如人袒胛故謂之赤岬山酈注節赤岬一作赤甲在奉縣東十五里又東逕魚復縣故城南水經故魚國也地理志江闗都尉治公孫述名之為白帝章武二年蜀漢改白帝為永安巴東郡治也白帝城周迴二百八十歩北縁馬嶺接赤岬山西南臨大江闞之眩目江中有孤石為淫預石冬出水二十餘丈夏則没亦有裁出矣縣有夷谿即狼山清江也經所謂夷水出焉酈注州白帝山在縣東元和志云即城所據與赤岬山相接行水金鑑巻七十四
