地理之定名乎此不可通之妄說也若曰旁計横入小江之數則自岷山以東入於海處不知其當為㡬千百江矣此又不可通之妄說也且經文言九江孔殷正以見其吐吞壯盛浩無津涯之勢決非尋常分派小江之可當又繼此而後及夫沱潛雲夢則又見其決非今日江州甚逺之下流此又可以證前二說者為不可通之妄說也九江即洞庭既有山水二經為根據而又得朱子此辨其不在潯陽亦明矣曽氏說九江一曰沅出牂牁且蘭縣東北注洞庭湖入江二曰漸一名澹水出武陵索縣東入沅三曰無出牂牁且蘭縣東南入沅按說文無本古舞字故無水或加水作潕又作㵲四曰辰出武陵辰陽縣東入沅五曰敘一作序出武陵義陵縣西北入沅六曰酉出武陵充縣東南入沅七曰湘出零陵始安縣東北入沅八曰資一作澬出零陵都梁縣東北入沅九曰澧出武陵充縣東北注洞庭湖入江朱子考定九江去無澧二水而易以瀟蒸一曰瀟江亦名營水出營陽冷道縣留山北流注湘水二曰湘江三曰蒸江漢志作承後漢作烝出邵陵縣界至陵承縣北東注於湘四曰澬江五曰沅江六曰漸江七曰叙江八曰辰江九曰酉江按朱子據導江文江先合澧而後過九江故不數澧然澧實會南江以東注洞庭非上流自入江也安得而不數無字誤作元朱子以為亡是水故置之古無瀟水酈道元云瀟者水清深也湘中記曰湘川清照五六丈下見厎石如樗蒲是納瀟湘之名矣然則瀟湘猶言清湘非别有瀟源隋唐以後始謂瀟水出九疑山北合湘水是曰瀟湘耳武陵零陵長沙之水皆入沅湘如蒸水者頗多金吉甫云郴水亦入湘舊不列九江未知與漸叙二水大小若何然則朱子所更定亦未有以見其為必然也善乎林少穎之言曰九江之名與其地勢久逺不可强通然各自别源而下流入江則可以意曉也斯真通人之見傅同叔云九江不必求其有九如太湖一湖而得名五湖昭餘祁一澤而得名九澤皆不可以數求也此說本程泰之恐又不然當時必實有九水㑹同故以為名但水道通塞離合古今不常自戰國時唯知有湘沅資㣲澧而名之五渚矣况後世乎與其出此入彼不若闕疑之為得耳禹貢錐指江水自夷道縣北又東逕上明城北水經江水自夷道縣北合夷水又東過枝江縣南沮水從北來注之晉太元中苻堅㓂荆州刺史桓沖徙渡江南使劉波築之移州治城也其地夷敞北據大江江沱枝分東入大江縣治洲上故以枝江為稱地理志曰江沱出西南東入江是也盛𢎞之曰縣舊治沮中後移出百里洲西去郡一百六十里縣左右有數十洲槃布江中其百里洲最為大也其中桑田甘果映江依洲自縣西至上明東及江津有九十九洲酈注松上明城在今滋縣界今枝江縣東有枝江故城百里洲在縣東北六十里寰宇記引荆州圖曰百里洲其上寛廣土沃人豐洲首派别南為外江北為内江嘉靖初為江水衝斷今為上百里洲下百里洲沮水篇沮水出漢中房陵縣東南流經沮陽縣東南又東南逕汶陽郡北又東南逕當陽縣北又南逕麥城西又東南過枝江縣東南入於江又東㑹沮口水經楚昭所謂江漢沮漳楚之望也酈注又南過江陵縣南水經縣江有洲號曰枚回洲江水自此兩分而為南北江也酈注西枚回洲在江陵縣南六十里又東逕鷰尾洲水經北合靈溪水水無泉源上承散水合成大溪南流注江酈注東得馬牧口水經江水斷洲通㑹酈注又東逕江陵縣故城南水經故楚也今城楚船官地也春秋之渚宮矣秦置南郡漢景帝改為江陵縣北對大岸謂之江津口故洲亦取名焉江大自此始也家語曰江水至江津非方舟避風不可渉也故郭景純云濟江津以起漲言其深廣也酈注回江陵故城即今荆州府治江自枚洲分流至此復合勢益大又東逕郢城南水經地理志曰楚别邑故郢矣酈注三今江陵縣東北里有郢城又東得豫章口水經夏水所通也西北有豫章岡蓋因岡而得名矣酈注又東至華容縣西夏水出焉水經江水左迤為中夏水右則中郎浦出焉江浦右迤南派曲而極水曲之地勢世謂之江曲者也酈注郡漢志南華容縣夏水首受江東入沔行五百里華容故城在今監利縣界水經夏水出江流於江陵縣東南注之江津豫章口東有中夏口是夏水之首江之汜也屈原所謂過夏首而西浮顧龍門而不見也龍門即郢城之東門也又東南當華容縣南涌水出焉又東涌水注之水經水自夏水南通于江謂之涌口春秋所謂閻敖游涌而逸于二水之間者也酈注利涌水在今監縣南又逕南平郡孱陵縣之樂鄉城北又東南油水從東南來注之又東右合油口水經松樂鄉城在今滋縣東又東逕公安縣北左㑹髙口水經江浦也對黄州酈注五今公安縣東北五十里有公安故城又東得故市口水經水與髙水通也酈注又右逕楊岐山北水經山枕大江山東有城故華容縣尉舊治酈注又東左合子夏口水經江水左迤北出通於夏水故曰子夏口也酈注又東左得侯臺水口水經江浦也酈注右得龍穴水口水經江浦右迤也北對虎洲又洲北有龍巢地名也昔禹南濟江黄龍夾舟舟人五色無主禹笑曰吾受命于天竭力養民生死命也何憂龍哉于是二龍弭鱗掉尾而去故水地取名矣酈注自龍巢而東俞口水經夏水泛盛則有冬無之江水北岸上有小城故監利縣尉治也酈注又東得清揚土塢二口水經江浦也酈注右逕石首山北又東逕赭要水經赭要洲名在大江中酈注宗石首山在今石首縣西北孫鑑曰自竟陵南至大江並無㐀陵之阻渡江至石首始有淺山石首者石自此而首也左得飯筐上口水經秋夏水通下口間相距三十餘里赭要下即楊子洲在大江中二洲之間常苦蛟害昔荆佽飛濟此遇兩蛟斬之自後罕有所患矣江之右岸則溝水口口上即錢官也水自牛皮山東北通江北對清水洲洲下接生江洲南即生江口水南通澧浦江水右㑹飯筐上口江浦所入也酈注又右得上檀浦水經江溠也酈注在溠音詐水名說文水漢南荆州浸行水金鑑巻七十五
