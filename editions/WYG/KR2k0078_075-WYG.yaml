body:
  text: 行水金鑑巻七十五江南按察使傅澤洪撰江水又東逕廣谿峽水經斯乃三峽之首也其間三十里頺巖倚朩厥勢殆交北岸山上有神淵淵北有白鹽崖髙可千餘丈俯臨神淵土人見其髙白因名之天旱燃朩岸上推其灰燼下穢淵中尋則降雨峽中有瞿塘黄龍二灘夏水迴復沿泝所忌蓋自昔禹鑿以通江郭景純所謂巴東之峽夏后疏鑿者又東出江闗入南郡界酈注山白鹽在奉節縣東隔江十里又東有黄龍灘虎鬚灘後漢岑彭傳注江闗舊在赤甲城後移在江南岸對白帝城在今魚復縣南自闗東逕弱闗捍闗水經捍闗廪君浮夷水所置也弱闗在建平秭歸界昔巴楚數相攻伐藉險置闗以相防捍秦兼天下置立南郡自巫山皆其城也又東過巫縣南鹽水從縣東南流注之酈注秭捍闗在今長陽縣南歸今歸州是也又東烏飛水注之水經水在天門郡漊中縣界北流逕巫縣南西北歴山道三百七十里注於江謂之烏飛口酈注又東逕巫縣故城南水經縣故楚之巫郡也秦省郡立縣以𨽻南郡吳孫休分建平郡治巫城城縁山為墉南臨大江故謂之夔國酈注記巫縣故城在今夔州府巫山縣東北寰宇云晉移今治在夔州東南七十二里又東巫溪水注之水經溪水導源梁州晉興郡之宣漢縣東又南逕建平郡泰昌縣又逕北井縣西有鹽井井在縣北故縣名北井建平一郡之所資也鹽水下通巫溪溪水是兼鹽水之稱矣鹽水又南屈逕巫縣東有聖泉下注谿水谿水又南入於大江酈注又東逕巫峽水經杜宇所鑿以通江水也郭仲産云按地理志巫山在縣西南而今縣東有巫山將郡縣居治無恒故也酈注陵四川總志巫峽在巫治東三十里即巫山也與西峽歸峽並稱三峽連山七百里畧無斷處有十二峯曰望霞翠屏朝雲松巒集仙聚鶴浄壇上昇起雲飛鳳登龍聖泉沿峽首尾一百六十里歴峽東逕新崩灘水經此山漢永元十三年崩晉太元二年又崩當崩之日水逆流百餘里湧起數十丈今灘上有石或圓如簞或方如屋若此者甚衆皆崩崖所隕致怒湍流故謂之新崩灘其頺巖所餘比之諸嶺尚為竦桀其下十餘里有大巫山非唯三峽所無乃當抗峯岷峨偕嶺衡疑其翼附羣山並槩青雲更就霄漢首尾一百六十里謂之巫峽自三峽七百里中兩岸連山畧無闕處重巖疉障隠天蔽日自非停午夜分不見曦月至于夏水襄陵沿泝阻絶王命急宣有時朝發白帝暮到江陵其間千二百里雖乗奔御風不以疾也春冬之時則素湍緑潭迴清倒影絶巘多生檉柏懸泉瀑布飛潄其間清滎峻茂良多趣味每至晴初霜旦林寒澗肅常有髙猿長嘯屢引凄異空谷傳響哀轉久絶故漁者歌曰巴東三峽巫峽長猨鳴三聲淚沾裳酈注又東逕石門灘水經灘北岸有山山上合下開洞達東西緣江步路所由昭烈為陸遜所破是逕此門遂𤼵憤而薨矣酈注廣今湖荆州府巴東縣東北有石門山又東過秭歸縣南水經縣故歸鄉地理志曰歸子國也袁崧曰屈原有賢姊聞原放逐亦來歸喻令自寛全鄉人冀其見從因名曰秭歸即離騷所謂女嬃嬋媛以詈余也縣東北數十里有屈原舊田宅雖畦堰縻漫猶保屈田之稱也縣北一百六十里有屈原故宅酈注即今荆州府歸州治秭歸故城又東逕城北水經其城憑嶺作固夾溪臨谷據山枕江北對丹陽城南枕大江嶮峭壁立信天固也楚子熊繹始封丹陽之所都酈注丹今歸州東有陽城又東南逕夔城南水經跨據川阜西北皆枕深谷東帶鄉谿南側大江熊摰始治巫城後疾移此蓋夔徙也春秋左傳僖公二十六年楚令尹子玉城夔者也服䖍曰在巫之陽秭歸歸鄉矣酈注有今歸州東南夔城又東逕歸鄉縣故城北水經袁崧曰父老傳言原既流放忽然暫歸鄉人喜恱因名歸鄉酈注南今歸州東南大江岸有故城又東逕信陵縣南水經臨大江東傍深溪溪源北𤼵梁州上庸縣界南流逕縣下而注大江酈注信今歸州東有陵廢縣又東過夷陵縣南水經江水自建平至空泠峽即宜都建平二郡界也酈注夷陵漢南郡都尉治空泠峽在歸州東南三十里歴峽東逕宜昌縣之埵竈下水經江之左岸絶岸壁立數百丈飛鳥所不能棲有一火爐埵在崖間父老傳言昔洪水時人薄舟崖側以餘燼埵之巖側至今猶存酈注一洽聞記云空冷峽絶壁有火燼長數尺名曰插竈相傳堯時洪水行者泊舟崖側炊㸑以餘燼插之鄭常蓋亦據此注耳記稱鄭常據此注鄭不知是何人也又東流頭灘水經其水並峻激奔暴魚龞所不能游行者常苦之其歌曰灘頭白勃堅相持倐忽淪没别無期袁崧曰自蜀至此五千餘里下水五日上水百日也酈注今流頭灘在夷陵州界又東逕宜昌縣北水經分夷道狼山所立也縣治江之南岸北枕大江與夷陵對界酈注宜今夷陵州西有昌故城又東逕狼尾灘而歴人灘水經袁崧曰二灘相去二里人灘水至峻峭南岸有青石夏没冬出其石嶔崟數十步中悉作人面形或大或小其分明者鬚髮皆具因名人灘也酈注又東逕黄牛山水經下有灘名曰黄牛灘南岸重嶺叠起最外髙崖間有石如人負刀牽牛人黑牛黄成就分明此巖既高加江湍紆迴雖途逕信宿猶望見此物故行者謡曰朝𤼵黄牛暮宿黄牛言水路行深迴望如一矣酈注山黄牛在􅂜陵州西又東逕西陵峽水經宜都記曰自黄牛灘東入西陵界至峽口一百許里山水紆曲而兩岸髙山重障非日中夜半不見日月絶壁或千許丈其石彩色形容多所像𩔖林朩髙茂略盡冬春猿鳴至清山谷傳響泠泠不絶所謂三峽此其一也崧言峽中叠崿秀峯竒構異形固難以詞敘林朩蕭森離離蔚蔚乃在霞氣之表仰矚俯映彌習彌佳流連信宿不覺忘返目所履歴未嘗有也既自欣得此竒觀山水有靈亦當驚知已於千古矣酈注州西陵峽在夷陵西北二十里歴禹斷江水經南峽北有北谷村兩山間有水清深潭而不流耆舊傳言昔是大江及禹治水此江小不足㵼水禹更開今峽口水勢并衝此江遂絶於今謂之斷江也酈注夷陵州西南有斷江山出峽東南流逕故城洲水經洲附北岸上有步闡故城方圓稱洲周迴畧滿吳西陵督步隲所築也酈注州今為夷陵治又東逕故城北水經所謂陸抗城也城即山為墉四面大險江南岸有山孤秀從江中仰望壁立峻絶袁崧為郡嘗登之矚望焉酈注南故城在夷陵州東大江南岸又東逕白鹿巖又東歴荆門虎牙之間水經荆門在南上合下開闇徹山南有門像虎牙在北石壁色紅間有白文𩔖牙形並以物象受名此二山楚之西塞也水勢急峻故郭景純江賦曰虎牙桀􅆆以屹崒荆門鬬竦而盤薄圖淵九迴以懸騰溢流雷呴而電激者也酈注里夷陵新志云虎牙山在州東南五十磯石大小蹲踞隐見正如虎牙㦸列舟人望而避之乃由荆門而上是虎牙更險於荆門也又東南過夷道縣北夷水從佷山縣南東北注之水經漢武帝伐西南夷路由此出故曰夷道酈注城夷道縣故在今宜都縣西佷山故城在今長楊縣西夷水篇云夷水出巴郡魚復縣東南過佷山縣南又東過夷道縣北東入於江夷水首出魚復江尾入宜都江行五百餘里是亦荆州之沱也古時自巴入楚避三峽之險皆由此路禹岷山導江東别為沱之所經以今輿地言之江水出四川松潘衛徼外岷山流逕衛北衞本禹貢梁州之域後為氐羌地漢置湔氐道屬蜀郡唐為嘉誠縣松州治明置松潘衛屬四川都司在成都城西北七百六十里又東南逕疊溪營西營在茂州西北一百二十里夲漢屬郡蠶陵縣唐為翼州元和志大江經翼州城西又逕翼水縣西二百步今廢翼州在營西翼水廢縣在營南又東南逕茂州西茂州在成都俯西北四百十五里本漢汶江縣後周改汶山縣唐為茂州治元和志汶江北自翼州流逕汶山縣西二里又西南逕威州西玉輪江注之威州在府西北四百五十里本漢廣柔縣唐為薛城縣維州治其故城在今州北髙碉山上亦曰姜維城州西北有滴博嶺玉輪江即汶水又西南逕保縣西保縣在茂州西南四十里本漢緜虒縣後周為汶川縣江源記岷江南入溢村逕石紐至汶川轉銀嶺合草坡河至蠶崖入灌口括地志石紐山在汶川縣西七十三里又東南逕灌縣西沱水出焉灌縣在成都府西少北一百五十二里唐為導江縣元和志大江西自茂州界流入逕青城縣北二里寰宇記大皁江自灌口流逕青城縣北入温江縣界青城廢縣在今灌縣西南玉壘山在縣西北離堆在縣西南或曰即灌口山宋河渠志皁江支流迤北曰都江口置大堰疏北流為三東曰外應口溉導江新繁新都達於金堂東北曰三石洞口溉導江崇寧九隴濛陽達於漢之洛東南曰馬騎口溉導江崇寧郫温江成都華陽灌縣舊志大江經縣西三十三里分為二派其一東南經崇慶州至新津者今謂之南江其一東循灌城者今謂之北江北江又分為三派其一東南逕温江過府城南入新津合大江者為流江其一自縣寳瓶口直東入五斗口東北經郫新繁過府城北折而南合流江者謂之郫江其一自寶瓶口東北穿三泊洞又東北經新繁新都至漢州入雒者為湔水参考諸說大皁江即􅗪水實岷江之正流有元和寰宇九域等書可証郫江即禹貢梁州之沱流江乃李氷所穿與郫江為二江者郫江號北江唯東合湔洛又東南至江陽入江者為禹貢之江沱餘皆後人所穿鑿或以郫江創自李氷且指流江為岷江之正道大誤江水又東南逕温江縣西崇慶州東温江在府西少南五十里本漢郫江原二縣地元和志大江俗謂之温江南流經縣西一里寰宇記􅗪江一名皁里水自青城縣南流經温江縣入江源縣界成都新志云大皁江本岷江正流自離堆鑿後乃以流江為正流而以此為南江崇慶州在府西南九十里本漢江原縣又東南逕新津縣東北流江注之新津在崇慶州東南七十里本漢武陽縣地又東南逕眉州東眉州本漢武陽縣元和志大江亦名導江在彭山縣東七里又經通義青神二縣東皆去縣三里今州北有武陽故城隋改武陽曰通義唐為眉州治彭山故城在州北青神故城在州南本朝康熈六年併入又南逕嘉定州東嘉定本漢南安縣地後周分置平羌縣隋改曰青衣又改曰龍㳺為嘉州治寰宇記導江水在平羌縣西二十步又云大江自平羌流入龍游縣界平羌即今峨眉縣在州西六十里又東南逕犍為縣北犍為在州東南一百二十里亦漢南安縣地寰宇記導江水在玊津縣西五里又在犍為縣東二十步玉津唐屬嘉州其廢址在今縣北又東南逕宜賔縣東北合馬湖江宜賔為敘州府治本漢僰道縣犍為郡治元和志汶江流逕僰道縣東北去縣十步馬湖戌在縣西二十一里按馬湖江在縣南門外即若水下流亦曰瀘水自馬湖戌東北流入至城西南一里為蠻津口又東合於大江又東南逕南溪縣南南溪在府東南一百二十里本漢僰道縣地又東逕江安縣北江安在瀘州西南本漢江陽縣地又東逕納溪縣北納溪在州西南四十里亦漢江陽縣地又東北逕瀘州東南沱水合湔雒諸水從西北來注之瀘州夲漢江陽縣今州治即其故城隋改縣曰瀘川唐為瀘州治華陽國志江陽江中有大闕小闕季春黄龍堆没闕即平元和志汶江水經瀘川縣南三十步寰宇記謂之瀘江按雒江在州北亦曰湔水亦曰緜水互受通稱漢志云湔水出玉壘山東南至江陽入江水經注云雒水與緜水合又與湔水合亦謂之郫江郫江即沱水也沱水自灌縣西南首受大江東逕郫縣北郫縣在成都府西四十五里漢志蜀郡郫縣禹貢江沱在西東入大江元和志郫江一名成都江經郫縣北三十一里又東逕新繁縣南新繁在府西北五十六里夲漢繁縣括地志縣有繁江首受郫江即禹貢江沱也元和志郫江在新繁縣南十一里九域志新繁有都