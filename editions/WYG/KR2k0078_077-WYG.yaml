body:
  text: 行水金鑑巻七十七江南按察使傅澤洪撰江水漢髙皇后三年夏江水漢水溢流民四千餘家漢書髙后本紀漢髙皇后八年夏江水漢水溢流萬餘家漢書髙后本紀四川總志載七年江漢水溢後五年江漢水又溢即此二年之事云七年者三年也是年南陽沔水溢今随州襄陽地理湖廣通志江書傳漢上曰沔地通釋漢入處謂之沔志云沔水溢即本紀所云江水漢水溢也漢成帝河平三年春二月犍為地震山崩雍江水水逆流雍同壅下同漢書成帝本紀是年二月犍為柏江山崩捐江山崩皆廱江水江水逆流壊城殺十三人漢書五行志漢成帝元延三年春正月蜀郡岷山崩雍江三日江水竭漢書成帝本紀是年正月丙寅岷山崩壅江江水逆流三日乃通漢書五行志漢獻帝建安二年九月漢水溢流害民人是時天下大亂後漢書五行志漢獻帝建安二十四年八月漢水溢流害民人後漢書五行志魏曹叡太和四年九月大雨漢水溢三國志吴孫權太元元年秋八月朔大風江海涌溢平地水深八尺宋書五行志晉懐帝永嘉三年江漢皆竭可涉晉書懐帝本紀晉穆帝永和七年七月甲辰夜濤水入石頭死者數百人晉書穆帝本紀晉簡文帝咸安元年十二月壬午濤水入石頭晉書五行志晉孝武帝太元十三年十二月戊子濤水入石頭毁大桁殺人晉書孝武帝本紀晉孝武帝太元十七年六月甲寅濤水入石頭毁大航漂船舫有死者京口西浦亦濤入殺人晉書五行志晉安帝元興三年二月已丑朔夜濤水入石頭漂沒殺人大航流敗庚寅夜濤水入石頭商旅方舟萬計漂敗流􅓟骸胔相望江左雖頻有濤變未有若斯之甚晉書五行志晉安帝義熙元年十二月己未濤水入石頭晉書五行志晉安帝義熙二年十二月已未夜濤水入石頭晉書五行志晉安帝義熙四年十二月戊寅濤水入石頭晉書五行志宋文帝元嘉十八年夏五月沔水泛溢遣使循行賑贍宋書文帝本紀是年五月江水泛溢沒居民害苗稼宋書五行志宋順帝昇明二年七月丙午濤水入石頭居民皆漂沒宋書五行志齊東昏侯永元元年七月濤水入石頭漂殺縁淮居民齊書五行志梁武帝天監六年八月建康大水濤上御道七尺隋史五行志是年荆州江溢隄壊刺史始興王憺親率府將吏冒雨賦丈尺築治之雨甚水壯衆皆恐或請憺避焉憺曰王尊尚欲身塞河隄我獨何心以免乃刑白馬祭江神俄而水退隄立邴州在南㟁數百家見水長驚走登屋緣樹憺募人救之一口賞一萬估客數十人應募救焉州民乃以免又分遣行諸郡遭水死者給棺槥失田者與糧種梁書始興王憺傳天監末耒陽江水暴漲湖廣通志梁武帝普通元年秋七月江海並溢梁書武帝夲紀唐高祖武徳七年七月雟州地震山摧壅江水噎流唐書五行志柬之罷政事願還襄州乃授襄州刺史㑹漢水漲齧城郭柬之因壘為隄以遏湍怒闔境賴之唐書張東之傳按宰相表柬之罷相在神龍元年景龍三年七月澧水害稼湖廣通志唐明皇開元十五年八月八日沔池縣夜有暴雨潤水榖水漲合毁郭邑百餘家舊唐書五行志唐代宗大歴七年二月江州江溢唐書五行志唐徳宗貞元二年六月荆南江溢唐書五行志唐徳宗貞元三年五月揚州江溢唐書徳宗夲紀二江南通志云貞元年揚州江溢唐徳宗貞元四年正月江溢唐書徳宗夲紀是月京師地震金房二州尤甚江溢山裂屋宇多壊人皆露處唐書五行志唐徳宗貞元十一年十月朗蜀二州江溢唐書五行志貞元二十一年朗州江漲流萬餘家是年夏朗州水鬬湖廣通志唐順宗永貞元年秋武陵龍陽二縣江水溢漂萬餘家晉書五行志唐穆宗長慶四年敬宗即位夏六月漢水溢決唐書敬宗夲紀是年夏襄均復郢四州漢水溢決唐書五行志唐文宗大和四年夏舒州江溢唐書文宗夲紀是年夏江水溢沒舒州太湖宿松望江三縣民田數百户唐書五行志唐文宗大和五年六月甲午𤣥武江漲髙二丈溢入梓州羅城唐書五行志唐文宗開成三年夏江漢漲溢壊房均荆襄等州民居及田産殆盡唐書五行志唐武宗㑹昌元年七月壬辰漢水溢唐書武宗夲紀是年七月襄州漢水暴溢壊州郭均州亦然舊唐書五行志漢水溢壊城郭僧孺坐不謹防下遷太子少保唐書牛僧孺傳㑹昌中漢水害襄陽拜鈞山南東道節度使築隄六千步以障漢暴唐書盧鈞傳後周廣順三年襄州漢水漲溢湖廣通志宋太祖建隆二年襄州漢水漲溢數丈宋史五行志元湖廣通志作年恐即此也宋太祖乾徳二年四月廣陵揚子等縣潮水害民田宋史五行志宋太祖開寳元年六月江水泛溢壊民田廬舍八月集州江漲壊民廬舍及城壁公署宋史五行志宋太祖開寳五年六月忠州江水漲二百尺宋史五行志宋太宗太平興􅀦二年六月忠州江漲二十五丈興州江漲毁棧道四百餘間七月復州蜀漢江漲壊城及民田廬舍集州江漲汎嘉川縣宋史五行志是年九月興州江水溢宋史太宗夲紀宋太宗太平興國四年八月梓州江漲壊閣道營舍宋史五行志宋太宗太平興國五年七月復州江水漲毁民舍隄塘皆壊宋史五行志宋太宗太平興國七年六月均州溳水均水漢江並漲壊民舍人畜死者甚衆漢陽軍江水漲五丈七月南劍州江水漲壊民居舍宋史五行志是年秋七月漢水溢宋史太宗夲紀宋太宗太平興國八年七月江漢皆溢為患宋史太宗夲紀宋太宗太平興國九年七月嘉州江水暴漲壊官署民舍溺者千餘人雅州江水漲九丈壊民廬舍新州江漲入南砦壊軍營宋史五行志宋太宗雍熙二年七月朗江溢害稼宋史五行志宋太宗雍熙三年秋七月癸已階州福津縣有大山飛來自龍帝峽壅江水逆流壊民田數百里宋史太宗夲紀山崩而壅江水漢書屢書之兹曰大山飛來恐猶是吾浙西湖飛來峰之訛傳也小谷口薈蕞宋太宗淳化元年六月吉州江漲漂壊民田廬舍黄梅縣江水漲二丈八尺洪州江漲壊州城三十堵民廬舍二千餘區漂二千餘户宋史五行志宋太宗淳化二年七月嘉州江漲溢入州城毁民舍復州蜀漢二江水漲壊民田廬舍八月藤州江漲十餘丈入州城壊官署民田是秋荆湖北路江水注溢漫田􅅕甚衆宋史五行志宋太宗淳化四年九月江溢陷涪州詔溺死者給歛具鐵錢三千宋史太宗夲紀宋太宗至道元年五月䖍州江水漲二丈九尺壊城流入深八尺毁城門宋史五行志宋真宗咸平三年三月梓州江水漲壊民田七月洋州漢水溢民有溺死者宋史五行志宋真宗景徳四年六月鄧州江水暴漲八月横州江漲壊營舍宋史五行志宋真宗大中祥符三年六月吉州臨江軍並江水泛溢害稼宋史五行志宋真宗大中祥符四年七月洪筠袁州江漲害民田壊州城宋史五行志是嵗吉州臨江軍江水溢害民田宗史真宗夲紀宋真宗大中祥符九年九月利州水漂棧閣萬二千八百間宋史五行志宋仁宗天聖三年十一月辛卯襄州漢水壊民田宋史五行志宋仁宗天聖六年七月壬子江寧府揚真潤州江水溢壊官民廬舍遣使安撫賑恤宋史仁宗夲紀宋仁宗景祐三年六月壬申䖍吉州水溢壊城郭廬舍賜被溺家錢有差宋史仁宗夲紀五行志畧同宋仁宗嘉祐元年四月大雨水注安上門門闗折諸路言江河决溢河北尤甚宋史仁宗夲紀大五行志載二年河决自五月雨不止水冒安工門門闗折諸路江河决溢河北尤甚疑即元年之事夲紀與志紀年月不同必有一誤姚煥知峽州大江漲溢煥前戒民徙儲積遷高阜及城沒無溺者因相地形築子城埽臺為朩岸七十丈繚以長隄揵以薪石厥後江漲不為害民徳之徙知涪州宋史姚渙傳孝基通判閬州閬州江水齧城幾沒郡吏多引避孝基率其下决水歸旁谷城賴以全宋史李孝基傳沈起知海門縣縣負海地卑間嵗海潮至冒民田舍民徙以避棄其業起為築隄百里引江水灌溉其中田益闢民相率以歸至立祠以報御史中丞包拯舉為監察御史宋史沈起𫝊宋神宗熙寕八年夏四月壬午湖南江水溢宋史神宗本紀是年四月潭衡邵道諸州江水溢壊官私廬舍宋史五行志師孟為度支判官知洪州積石為江隄浚章溝掲北閘以節水升降後無水患歴集賢殿修撰判都水監宋史程師孟傳宋徽宗大觀三年七月階州久雨江溢宋史五行志宋徽宗大觀四年蘷州江水溢宋史徽宗本紀紹興三年五月武昌江漲累月不洩湖廣通志陳桷知襄陽府明年漢水决溢漂蕩廬舍躬率兵民捍築隄㟁賴以無虞以疾乞祠除秘閣修撰提舉江州宋史陳桷傳興桷知襄陽在紹十五年宋高宗紹興十六年潼川府東南江溢水入城浸民廬宋史五行志宋高宗紹興二十三年潼川府江溢浸城内外民廬宋史五行志楊政守漢中十八年六堰久壊失灌溉之利政為修復漢江水决為害政築長隄捍之凡利于民者不敢以軍旅廢也宋史楊政傳宋孝宗淳熙十一年五月階州白江水溢决隄圯城浸民廬壘舍祠廟甚多宋史五行志宋孝宗淳熙十五年荆江溢宋史五行志宋孝宗淳熙十六年五月丁巳階州白江水溢浸城市民廬六月辛卯潼川府東南二江溢決隄毁橋浸民廬涪城中江射洪通泉郪縣沒田廬宋史五行志張孝祥知荆南湖北路安撫使築守金隄自是荆州無水患請祠以疾卒孝宗惜之有用才不盡之歎宋史張孝祥傳宋光宗紹熙二年五月庚午利州東江溢壊隄田廬舍辛未潼川府東南江溢六月戊寅又溢再壊隄橋水入城沒廬舍七百四十餘家郪涪射洪通泉縣滙田為江者千餘畆七月癸亥嘉陵江暴溢興州圯城門郡獄官舍凡十七所漂民居三千四百九十餘潼川崇慶府緜果合金龍漢州懐安石泉大安軍魚闗皆水時上流西番界古松州江水暴溢龍州敗橋閣五百餘區江油縣溺死者衆宋史五行志是年七月襄陽大雨連旬漢水溢害稼壊隄防民舍殆盡湖廣通志宋光宗紹熙三年五月乙未潼川府東南江溢後六日又溢浸城外民廬人徙于山七月襄陽江陵府大雨水漢江溢敗隄防圯民廬沒田稼者逾旬復州荆門軍水亦如之鎮江府三縣水損下地之稼宋史五行志宋光宗紹熙五年秋武陵縣江溢圯田廬甚衆宋史五行志慶元二年馬湖夷界山崩八十里江水不通四川總志宋寧宗開禧元年九月丙戌漢水溢宋史五行志寧宗登位樞以右文殿修撰知江陵府江陵瀕大江嵗壊為巨浸民無所託楚故城楚觀在焉為室廬徙民居之以備不虞種朩數萬以為捍蔽民徳之宋史袁樞傳宋寧宗嘉定十年蜀漢二州江沒城郭宋史五行志宋寧宗嘉定十六年五月鄂州江湖合漲城市沈沒累月不泄是秋江溢圯民廬宋史五行志宋理宗端平三年襄漢江溢皆大水宋史五行志宋理宗淳祐七年五月重慶府江水泛溢者三漂城壁壊樓櫓宋史五行志宋度宗咸淳六年六月漢水溢宋史李庭芝傳宋度宗咸淳七年七月壬午四川制置使朱禩孫言夏五以來江水凡三泛溢自嘉而渝漂蕩城壁樓櫓圯壊宋史度宗本紀元世祖至元二十四年九月辛卯江水溢沒民田元史世祖本紀元世祖至元二十七年七月江水溢免江夏田租元史世祖本紀元成宗大徳元年六月和州歴陽縣江漲漂沒廬舍萬八千五百餘家元史成宗夲紀是年六月和州歴陽縣江水溢漂廬舍萬八千五百區元史五行志是年十月廬州路無為州江漲泛溢漂沒廬舍元史成宗夲紀元成宗大徳五年七月江水暴風大溢高四五丈連崇明通泰真州定江之地漂沒廬舍被灾者三萬四千八百餘户元史五行志元成宗大徳九年六月甲午潼川霖雨江溢漂沒民居溺死者衆飭有司給糧一月免其田租元史成宗夲紀是年六月潼川郪縣雨綿江中江溢水決入城元史五行志是年七月沔陽玊沙縣江溢元史