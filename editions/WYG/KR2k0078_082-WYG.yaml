body:
  text: 行水金鑑巻八十二江南按察使傅澤洪撰濟水東出于陶丘北又東至于菏禹貢再成為陶丘李巡曰再成其形再重也郭璞云今濟陰定陶城中有陶丘地理志云定陶縣西南有陶丘亭孔氏疏西今山東兖州府定陶縣南有定陶故城出者言在平地自下面而涌非有上流如某水至某處之至書纂言菏即菏澤謂之至者濟隂縣自有菏派濟流至其地爾陳櫟書集傳纂疏定地理志濟隂郡下云禹貢菏澤在定陶東唐省陶入濟隂故通典濟隂縣下云菏澤在縣東北九十里溢者無上源亦無下流頗與阿井相似出者源在地中流在地上如趵突泉之流而為濼水濟自此不更伏矣禹貢錐指濟水又東過定陶縣南又東北菏水東出焉又東逕秦相魏冉冢南又東北逕定陶恭王陵南水經冉秦宣太后弟也定陶恭王漢哀帝父也酈注云日知録今曹縣有冉堌為秦相穰侯魏冉之冢史記穰侯卒于陶因葬焉又東北逕定陶縣故城南水經周武王封弟叔振鐸之邑也故曹國漢宣帝甘露二年更濟陰為定陶國戰國之世范蠡既雪㑹稽之恥乃變姓名寓之於陶為朱公以陶天下之中諸侯四通貨物之所交易也治産致千金富行好德子孫修業遂致巨萬故言富者皆曰陶朱公也酈注又屈從縣東北流水經又東逕陶丘北墨子以為釡丘竹書紀年魏襄王十九年薛侯來㑹王于釡丘者也尚書所謂導河水自陶丘北謂此也酈注當漢志陶丘在定陶縣西南則濟水先逕陶丘而後至故城此經不合恐是錯簡又東北逕定陶縣故城南十字當在引竹書語之下按自滎口至陶丘皆後世滎瀆之所經非禹迹也今曹州定陶界中並有濟水故道禹時則濟水伏流涌自陶丘之北而東注于菏澤無上源也陶丘漢志云在定陶縣西南而郭璞言在城中盖其時郡徙西南包陶丘而為城耳今縣則又徙於東北故陶丘與漢城皆在西南也菏澤在陶丘之東北相去不逺濟水伏流至陶丘北上奮馳波跳沫東北滙于菏澤又東北絶鉅野至琅槐入海者為濟瀆其一枝東南流至湖陵入泗者後人目之曰菏水漢志湖陵縣下云菏水在南者是湖陵今為魚臺縣地也許慎云菏澤水在湖陵謂澤之下流入泗者亦未為誤自孔傳襲其文曰菏澤在湖陵而遺一水字則在湖陵者為澤矣釋此至于菏又増一水字曰菏澤之水則定陶之菏澤與湖陵之菏水無别矣酈道元時孔傳巳盛行故宗其說言尚書有導菏澤之說自陶丘北東至於菏水又以湖陵入泗為澤水所鍾而不知此特菏澤之下流其所鍾則在定陶也且豫州導菏澤被孟豬乃導澤水之餘波南入于孟豬非謂東南至湖陵入泗之菏水酈乃混而為一種種紕繆皆為孔傳所誤說禹貢者當以漢志為正經文三菏字皆以澤言在定陶與湖陵無涉也菏之為澤也濟貫其中大半是濟水所滙酈注云即泲水之所包注以成湖澤是也然亦必有旁源酈注云濟水自定陶故城南又東北右合菏水水上承濟水於濟陽縣東世謂之五丈溝又東北出定陶縣北屈左合汜水汜水西分濟瀆東北逕濟隂郡南又東合於菏又東北逕定陶縣南又東北右合黄水枝渠而北注濟瀆是汜水與五丈溝之㑹於澤者亦皆濟水之分流也寰宇記云菏水亦名南濟水近志以北清河為北濟南清河為南濟誤由於此俗謂之五丈河西自考城縣界來程大昌曰樂史寰宇書云濟隂有山是為菏山菏水西自考城來考城在濟隂西濟之正流未嘗經考城可見菏水自為一派而濟來㑹之甚明也水經以此水為五丈溝即近世命為五丈河者此正菏水首末也渭按曹州志菏山在州東南三十里以近菏澤而言盖澤本名菏後人因澤以名其山也說者謂菏水出菏山非是據酈注菏水分濟於定陶東北此即經所謂濟水東至乘氏縣西分為二南為菏水北為濟瀆者也乘氏故城在今鉅野縣西南漢置然曹州之東境亦兼得乗氏地州東南與定陶接界菏澤在焉注所謂定陶東北即經所謂乗氏縣西也但不言菏澤為疎漏耳菏水只自菏澤分流酈以濟陽所出之五丈溝為菏水盖雜採他說而有此繆元和志因目魚臺之菏水曰五丈溝而程氏據以為菏水之首末正當如此皆非地志水經之菏水起乗氏訖湖陵之本意也濟水有三伏三見之說或謂出於近世之俗學殊不可信王綱振云如時以東流為濟溢為滎為見則瀁東流為漢滙為彭蠡亦可為見乎又若以入於河為伏則渭入於河洛入於河亦可為伏乎况經明言浮于濟漯達于河河濟本通而此曰流曰溢曰入曰出曰至曰㑹亦並無間斷不知三伏三見何據但沿襲既乆為之曲解非本注也渭按伏見之說二孔無之然有所自來泰澤一伏東丘一見本水經注武德入河再伏滎陽軼出再見本地理志滎東又洑為三伏出曹濮間為三見本唐書許敬宗傳此豈創自近世但以入河為伏義有未安耳滎澤自周以前已導為滎川與陶丘復出之濟相接故漢志於軼出滎陽地中下即繼之曰又東至琅槐入海而定陶縣下亦止云禹貢陶丘在西南不引東出之文盖三見之迹不可得見乆矣鴻溝既開滎瀆為濁河所亂陶丘之竇日就填淤而滎澤之澄泓如故其後滎澤亦塞則河南由是無濟水而再見之迹亦亡水經以河濟合流分入滎瀆者為濟水京相璠謂之出河之濟酈道元宗之而班固之所謂軼出地中者絶口不談矣孔安國以為河中截流而過蔡沈以為河厎穴地而來孔穎達以為河濟相亂南出還清程大昌以為適㑹河滿溢出南岸各持所見終非定論余竊謂河南之濟即奮自河南之地中未必與入河之濟為一脈譬如人之鼻息總出丹田氣海中呼者豈必其吸者之復出邪沈括云厯下凡發地皆是流水世傳濟水經過其下東阿之井乃濟水所為曽鞏云泰山諸谷之水自渴馬崖潜流地中至厯城西復出為趵突旁溢十數泉蔡傳引以證濟之伏見重源顯發所在多有元和志云鄭州管城縣京水出縣南平地新鄭縣溱水出縣西北三十里平地二處並在河南密邇滎澤尤為明驗盖濟瀆所經之地其下皆有伏流遇空竇即便涌出故一見於滎澤再見於陶丘不必以入河之濟為上源亦不必并泰澤東丘數之為三伏三見也草廬之說雖聖人復作無以易之矣禹貢錐指又東北㑹于汶禹貢濟與汶合孔氏傳地理志云汶水出泰山萊蕪縣原山西南入濟孔氏疏水經汶水出太山萊蕪縣原山西南過嬴縣南又東南流過奉髙縣北屈從縣西南流過博縣西北又西南過虵丘縣南又西南過岡縣北又西南過平章縣南又西南過無鹽縣南又西南過壽張縣北又西南至安民亭入於濟濟水自定陶縣東北又東至乗氏縣西分為二水經春秋左傳僖三十一年分曹地東傅于濟濟水自是東北流出巨澤酈注南為菏水北為濟瀆水經其一水東南流其一水從縣東北流入鉅野澤酈注北濟自滎澤東逕卷縣之武修亭又東逕陽武縣故城北又東逕酸􅀥縣之烏巢澤北又東逕平丘縣南又東逕濟陽縣故城北又東北逕寃朐縣故城北水經又東北逕呂都縣故城南又東北逕定陶縣故城北酈注又東北與濮水㑹水經濮水上承濟水于封丘縣闞駰曰首受别濟即北濟也其故瀆自東北流左迤為髙梁陂濮水又東逕匡城北孔子去衞適陳遇難於匡者也又東北左會别濮水受河於酸棗縣故杜預曰濮水出酸棗縣首受河竹書紀年曰魏襄王十年十月大霖雨疾風河水溢酸棗郛漢世塞之故班固曰大堙酸棗也今無水其故瀆東北逕南北二棣城間酸棗以棘名邦故曰酸棗也漢官儀曰舊河隄謁者居之濮水又東與句瀆首受濮水枝渠於句陽縣東南逕句陽縣故城南春秋之縠上也左傳以為句瀆之止矣又東入乗氏縣左會濮水與濟同入鉅野故地理志曰濮水自濮陽南入鉅野亦經所謂濟水自乗氏縣南分東北入於鉅野也酈注濟水故瀆又北右合洪水水經上承鉅野嶭訓渚厯澤西北渚又北逕闞鄉城西又北濟瀆合自渚迄于北口一百二十里名曰洪水桓温以太和四年率衆北入掘渠通濟至義熙十三年劉武帝西入長安又廣其功自洪口已上又謂之桓公瀆濟自是北注也酈注又東北過壽張縣西界安民亭南汶水從東北來注之水經濟水又北汶水注之戴延之所謂清口也郭縁生述征記曰清河首受洪水北流濟或謂清則濟也禹貢濟東北會于汶今枯渠注巨澤巨澤北則清水清水與汶會也酈注壽今東平州西南有壽張故城西北去今張縣五十里州西南十里有安山鎮即古安民亭齊乗云東平城西即安山閘閘下泥河口有亭子店即安民亭遺址濟汶合處濟水自菏澤東北流絶鉅野澤而北合洪水以至安民亭南者禹之舊迹也其後不知何年改從澤西之清水而繞澤北以㑹汶謂之清口其澤中之道自洪口至清口者則無水故水經謂之故瀆述征記謂之枯渠漢元光中河決瓠子東南注於鉅野濟水改道疑當在此時今會通河逕鉅野縣東北七十里去故城巳逺并清水㑹汶之故道亦湮没而不可考况禹之舊迹乎以今輿地言之汶水自萊蕪厯泰安肥城寜陽至東平入濟合流以注於海此禹迹也迨元人引汶絶濟為會通河明永樂中又築戴村壩遏汶水盡出南旺以資運而安山入濟之故道填淤乆矣禹貢錐指又北東入于海禹貢北折而東孔氏傳濟水自壽張縣西合汶水又北逕梁山東袁宏北征賦曰背梁山截汶波即此處也酈注南括地志梁山在鄆州壽張縣二十五里今在東平州西南五十里接汶上縣界梁山濼在今壽張縣東梁山之南濟汶既合東北滙而成濼日知録云宋史宦者傳梁山濼古鉅野澤綿亘數百里濟鄆數州賴其蒲魚之利金史食貨志黄河已移故道梁山濼水退地甚廣遣使安置屯田自此以後鉅野壽張諸邑古時瀦水之地無尺寸不耕而忘其昔日之為川浸矣又北逕須胊城西水經城臨側濟水故須國風姓也春秋僖公二十一年子魚曰任宿須朐顓臾風姓也實司太皥與有濟之祀地理志曰壽張縣西北有朐城者是也濟水西有安民亭亭北對安民山東臨濟水水東即無鹽縣界也酈注西東平州本漢無鹽縣州南有須朐故城又逕微鄉東水經春秋莊公二十八年經書冬築郿公羊傳謂之微在東平壽張縣西北三十里有故微鄉魯邑也杜預曰有微子冢濟水又北分為二水其枝津西北出謂之馬頰水酈注又北過須昌縣西水經京相璠曰須胊一國二城兩名盖遷都須昌胊是其本秦以為縣濟水於縣趙溝水注之酈注有今東平州西須昌故城元和志須昌縣濟水在縣西二里又北逕魚山東左合馬頰水水經水首受濟西北流厯安民山北又西流趙溝出焉東北注于濟馬頰水又逕桃城東又東北流逕魚山南山即吾山漢武帝瓠子歌所謂吾山平者也其水又東注于清濟謂之馬頰口酈注東元和志魚山在東阿縣南二十里近志云在縣西以宋初縣治東移故也山東通志吾山一名魚山在東阿縣西八里大清河西岸五代史梁太祖與兖鄆兵大戰於此濟水自魚山北逕清亭東水經春秋隠公四年公及宋公遇于清京相璠曰今濟北東阿縣東北四十里有故清亭即春秋所謂清也是濟水通得清之目焉亦水色清深用兼厥稱矣是故燕王曰吾聞齊有清濟即此水也酈注公春秋莊三十年及齊侯遇于魯濟杜預曰濟水厯齊魯界在齊界為齊濟在魯界為魯濟濟水自清亭又北則為榖城齊地矣濟之為齊為魯當分於此間又北過榖城縣西水經濟水側岸有尹夘壘南去魚山四十餘里是榖城縣界春秋之小榖城也縣有榖城山陽榖之地春秋齊侯宋公會於陽榖者也酈注縣後漢分東阿置榖城今為東阿縣治又北逕周首亭西水經春秋左丘明云襄公二年王子成父獲長狄僑如弟榮如薶其首於周首之北門即是邑也今世謂之盧子城濟北郡治也酈注又北過臨邑縣東水經地理志曰縣有濟水祠也水有石門故濟水之門也春秋隠五年齊鄭會于石門鄭車僨濟即於此也京相璠曰石門齊地今濟北盧縣故城西南六十里有故石門去水三百步盖水瀆流移故側岸也酈注故臨邑城在今茌平縣又北逕平隂城西水經春秋襄十八年晉侯沈玉濟河㑹于魯濟尋湨梁之盟同伐齊齊侯禦諸平陰者也京相璠曰平陰齊地在濟北盧縣故城西南十里平隂城南有長城東至海西至濟河道所由名防門去平隂三里齊侯塹防門即此巫山在平隂東北巫山之上有石室世謂之孝子堂濟水右迤過為湄湖方四十餘里酈注今平隂即平隂縣盧縣故城在今長清縣西南二十五里又東北至垣苗城西水經故洛當城也伏韜北征記曰濟水又與清河合流至洛當者也河水自泗瀆口東北流而為蒲魏土地記曰盟津河别流十里與清水合亂流而東逕洛當城北黒白異流涇渭殊别而東南流注也酈注今垣苗城在長清縣西南元和志長清縣濟水在北去縣十里即今大清河也對岸則齊河縣大清橋跨其上為南北通衢又東北過盧縣北氷經濟水東北與湄溝合水上承湄湖北流注濟酈注隠左傳三年齊鄭尋盧之盟即此又逕盧縣故城北水經濟北郡治也酈注里元和志盧縣濟水在縣東二十七臨邑縣濟水西去縣四十里又東北與中川水合水經水東南出山茌縣之分水嶺谿一源兩分泉流半解亦謂之分流交半水南出太山入汶半水出山茌縣西北流東逕太原郡南郡治山茌西北與漢賓谷水合水出南格馬山漢賓谿北逕盧縣故城北陳敦戍南西北流與中川合謂之格馬口其水又北逕盧縣故城東而北流入濟俗謂之為沙溝水酈注在山茌故城今長清縣東北元和志豐齊縣濟水東去縣二十六里豐齊屬齊州故山茌天寳二年改名又東北右會玉水水經導源太山朗公谷西北逕獵山東又西北枕祝阿縣故城東野井亭西俗謂是水為祝阿澗水北流注於濟酈注長祝阿故城亦在清縣東北又東北濼水出焉水經濼音洛濼水出厯縣故城西南泉源上奮水涌若輪春秋桓十八年公㑹齊侯于濼是也俗謂之為娥姜水也以泉源有舜妃娥英廟故也其水北為大明湖湖西即大明寺寺東北兩面側湖此水便成浄池也池上有客亭左右楸桐負日俯仰目對魚鳥極望水木明瑟可謂濠梁之性物我無違矣湖水引瀆東入西廓東至厯城西而側城北注湖水上承東城厯祠下泉源競發其水北流逕厯城東又北引水為流柸池州僚賓燕公私多萃其上分為二水右水北出左水西逕厯城北西北為陂謂之厯水與濼水㑹自水枝津合水首受厯水於厯城東東北逕東城西而北出郭又北注濼水又北聽水出焉濼水又北流注於濟謂之濼口也酈注節寰宇記濼水在厯城西南二百步元和志全縣濟水在縣北四十里今濟南府治厯城縣東有東平陵故城漢縣唐貞觀中改名全節屬齊州曽鞏齊州二堂記曰泰山之北與齊東南諸谷之水西北合於黒水之灣又西北㑹於柏崖之灣而至於渴馬之崖盖水之來也衆其北折而西也悍疾尤甚及至於崖下則泊然而止而自崖以北至於厯城之西盖五十里而有泉涌出高或至數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄糠於黒水之灣者而見之於此盖泉自渴馬之崖潜流地中而至此復出也其注而北則謂之濼水達于清河以入于海舟之通於濟者皆於是乎達也齊多甘泉其顯名者十數而色味皆同以余驗之盖皆濼水之旁出者也齊乗曰今府城西平地泉源觱涌聲如隠雷旁合馬跑金線諸泉周可數畝北出又合密脂五龍衆泉並城北流屈而東至城北水門大明湖水出注也又曰濟南名泉碑論七十二泉逺至中宫靈巖諸泉具載而華不注之華泉明水鎮之明泉皆失不取况其名亦未雅稱盖殘金俗筆也又東北逕華不注山水經單椒秀澤不縁丘陵以自髙虎牙桀立孤峰特拔以刺天青崖翠發望同㸃黛山下有華泉故京相璠曰春秋土地名曰華泉華不注山下泉水也左傳成二年齊頃公與晉郤克戰于鞍齊師敗績逐之三周華不注逢丑父與公易位將及華泉驂絓於木而止即華水也北絶聽瀆二十里注於濟酈注一元和志華不注名華山在厯城縣東北十五里不讀如字又東北過臺縣北水經巨合水南出雞山西北逕巨合故城又北合關盧水關盧水導源馬耳山北逕博亭城西西北流至平陸城與武原水合水北逕譚城東又北逕巨合城東合關盧水而出注巨合水西北逕臺縣故城南西北流白野泉水注之又北聽水注之水上承濼水東流北屈又東北流注於巨合水亂流又北入於濟酈注城今厯縣東北有臺縣故城又東北合芹溝水水經水出臺縣故城東南西北流逕臺城東又西北入於濟水酈注又東北過菅縣南水經濟水東逕縣故城南納百脈水水出土鼓縣故城西源方百步百泉俱出故謂之百脈水其水西北流注於濟酈注屬今章丘縣西北有菅縣故城隋改置臨濟唐齊州元和志臨濟縣濟水在縣南二十里章丘縣濟水在縣西去縣十七里舊志云小清河在章丘縣北三十里土鼓縣漢屬濟南郡與梁鄒菅縣相毘在今章丘鄒平之間其故城不知所在又東過梁鄒縣北水經瀧水南出長城中北流至般陽縣故城西南與般水㑹瀧水又西北至梁鄒東南與魚子溝水合瀧水即古袁水也故京相璠曰濟南梁鄒縣有袁水者也瀧水又西北逕梁鄒縣故城南又北屈逕其城西而北注濟其城之東北又有時水西北注焉酈注陽元和志濟縣濟水在縣南長山縣濟水在西北去縣三十五里鄒平縣濟水在北去縣三十五里梁鄒故城唐置濟陽縣屬淄州今為鄒平縣治其唐之鄒平縣城則割入今齊東縣界金志長山新城二縣西北並有小清河新城本漢高苑其故城在今縣東又東北過臨濟縣南水經縣故狄邑也漢永初二年改名臨濟晏謨齊記曰有南北二城隔濟水酈注和今髙苑城西南冇臨濟故城元志髙苑縣濟水在北去縣七十步又東北迤為淵渚謂之平州水經地理志千乗郡有平安縣侯國也應劭曰博昌縣西南三十里有安平亭故縣也世尚存平州之名矣濟水又東北逕髙昌縣故城西又經薄姑城北城在臨菑縣西北五十里近濟水又東北逕狼牙固西酈注今髙苑縣東南十里有麻大泊一名魚龍灣周五六十里盖即古濟水所滙之平州也高昌縣故城在今博興縣西南薄姑城在今博興縣東北蒲姑城是也狼牙固無考又東北過利縣西水經王莽之利治也晏謨曰縣在濟城北五十里酈注興今博縣東有利縣故城又東北逕樂安縣故城南水經班固曰千乗郡有東安縣應劭曰取休令之名矣酈注樂安故城在今博興縣東北隋改樂安曰博昌五代唐改曰博興元和志博昌縣濟水在北去縣百步此經舊在髙昌下今據薄姑利縣俱南直臨淄而樂安故城在博昌縣東北則此經乃錯簡故移置於此又東北過甲下邑水經濟水東北至甲下邑南東厯琅槐縣故城北地理風俗記曰博昌東北八十里有琅槐鄉故縣也山海經曰濟水絶鉅野注渤海入齊琅槐東北者也又東北河水枝津注之水經以為入河非也斯乃河水注濟非濟入河酈注冇今青州府樂安縣東北一百十里琅槐故城漢縣屬千乗郡又東北入海水經郭景純曰濟自滎陽至樂安博昌入海今河竭濟水仍流不絶經言入河二說並失然河水於濟漯之北别流注海今所輟流者唯漯水耳郭或以為濟注之事實非也尋經脈水不如山經之為密矣酈注今渤海在樂安縣東北一百三十里東接壽光縣界北接利津縣界樂安本漢廣饒鉅定二縣屬齊郡其故城並在今縣東北後漢省琅槐人博昌故杜預郭璞皆言濟水至博昌入海以今輿地言之自東平㑹汶以下東阿平隂並屬山東兖州府長清齊河厯城章丘鄒平長山新城並屬濟南府髙苑博興樂安並屬青州府諸縣界中皆禹貢濟水入海之所經也濟水自東平以下唐人謂之清河按戰國策燕王謂蘇代曰齊有清濟濁河以為固郭縁生曰清河首受洪水北流濟或謂清則濟也酈道元曰濟水通得清之目此清河之名所自來也至宋又有南北清河之名河渠志云熙寜十年河決澶州徙而南東滙於梁山張澤濼分為二派一合南清河入於淮一合北清河入於海南清河即泗水北清河即濟瀆也南渡後北清河又有大小之分盖自劉豫導濼東行始齊乗以大清河為古濟水小清河為豫所創志家皆沿其說黄子鴻非之曰以水經注元和志寰宇記諸書考之濟水最南漯水在中河水最北今者小清所經自厯城以東如章丘鄒平長山新城髙苑博興樂安諸縣皆古濟水所行而大清所經自厯城以上至東阿固皆濟水故道而自厯城東北如濟陽齊東青城諸縣則皆古漯水所行蒲臺以北則故河水所經盖宋時河嘗行漯瀆及河去則大清兼行河漯二瀆其小清所行則斷為濟水故道也渭按子鴻此言正三百餘年積傳之謬盖清河所行本濟瀆不知何時從厯城東北決而北入濟陽縣界與漯水合而清河之名遂被於漯據水經漯水逕著縣故城南著即今濟陽而縣南有大清河是知大清即漯其水自厯城入濟陽乃近世之所決非唐清河入海之故道也濟陽之流日盛則章丘之流日微故劉豫堰濼水使東以益之齊乗云大清河自齊河縣又北經厯城上濼橋北濼水分響河入焉又東北逕華不注山隂又東逕下濼堰濼水舊入濟處堰南即小清河按響河即聽水也此大清河猶是濟之故瀆其所行者實濟水故道而志家反以濟陽之大清河為古濟舛錯殊甚不有子鴻其誰正之然大清自厯城入濟陽及濱州以東入海之道不知決於何年意者宋熙寜時河嘗合北清河入海始開此道其後金明昌五年河復由此入海乆而後去流益深廣此大清之所以浩浩而小清之所以屢濬屢塞也與水經叙濟水自滎陽以下原委甚悉杜預春秋釋例曰濟自滎陽巻縣東經陳留至濟隂北經高平東經濟北東北經濟南至樂安博昌縣入海郭璞注山海經畧同酈道元依水經以立注出河之濟又加詳焉是由東漢以迄後魏濟未嘗一日絶也唐人則據司馬彪之言以為自王莽後河南不復有濟水太子賢注後漢循吏傳曰濟水東流逕温縣入河度河東南入鄭州又東入滑曹鄆濟靑等州入海王莽末旱則枯涸但入河内而巳杜佑通典曰濟水因王莽末旱渠涸不復截河過今東平濟南淄川北海界中有水流入於海謂之清河實菏澤汶水合流而曰濟河盖因舊名非本濟水也元和郡縣志曰濟水自王莽末入河同流於海知河南之地無濟水矣自後所說皆襲舊名如鄆州之須昌濟州之長清盧縣齊州之臨邑豐齊全節臨濟章丘淄川之濟陽長山鄒平高苑青州之博昌諸縣界中並有濟水其後則不經博昌而改從棣州之蒲臺入海是皆襲舊名而實非濟也渭按鴻溝既開河水與滎濟相亂及滎澤塞為平地則河南無涓滴之濟矣水經之所謂濟者皆滎陽下所引之河水也而杜預京相璠郭璞酈道元輩皆莫能辨唐人始知之所見逺過於前但以為河南之濟由王莽末旱枯而絶則非以余考之旱枯之事郡國志繫河内温下酈注亦於温縣濟水故瀆下言之其所云枯後復通津渠勢改者謂濟水自温縣入河不復東至武德耳而滎陽以下絶無一字道及殆與河南之濟無涉釋例自巻縣博昌而外畧舉郡名故與水經不同孔穎達以為水流之道今古或殊杜據當時所見言之與水經乖異非也晉時濟水之道實與漢世不殊文有詳畧非枯後復通津渠勢改也若夫唐之清河自須昌以下所受唯菏汶則又有其故矣盖天寶後汴水堙廢濟渠亦無所受菏澤以西竞成斷港故元和志云濟自須昌始而通典云濟河實菏汶之合流其所謂菏者即五丈溝之水西自考城來者也迨元人開㑹通河引汶絶濟以資運道明永樂中又於古四汶口之地築戴村壩遏汶使西南流汶水自是盡出於汶上西南至南旺入漕四分南流出上閘接沂泗六分北流出下閘抵漳衞惟小鹽河一綫洩入清河小鹽河在今東阿縣西南二十里即運河所洩汶水支流也清河賴諸山泉溝澤以成其川并無菏汶之可言矣而志家猶執清河以為禹貢之濟水不亦過乎或又云山左諸泉實皆濟水溢為大小清河濟雖絶而不絶也然此等指為濟水則可以是為滎澤陶丘之遺跡可乎哉東漢後河南無濟水斯為定論紛紛筆舌徒滋來學之惑無為也濟瀆之水自周以來凡數變初為濟及導滎為川則滎與濟合鴻溝既開滎瀆為河所亂及滎澤又塞則所行者惟河水矣汴渠不通則鉅野以北所行惟菏汶戴村巳築則東阿以下所行唯山泉溝澤之水其號為濟者襲舊名而已濟瀆入海之道自唐以來亦數變初經髙苑縣北又東北至博昌入海其後則不由博昌通典云舊濟合在今博昌縣界今無元和志蒲臺縣下云海在縣東一百四十里海畔有一沙阜俗呼為鬬口淀是濟水入河處海潮與濟相觸故名盖其時濟水改道從蒲臺東北與河渾濤而入海也宋南渡後劉豫導濼水東行入濟水故道為小清河仍經高苑縣北至樂安縣入海及金皇統中縣令髙通改由縣南長沙溝至博興合時水又東北至樂安由馬車瀆入海瀆在縣東北五十里今為高家港其後小清之上流堙塞鄒平長清新城界中故瀆皆為漯河所行漯河即楊渚溝水寰宇記所稱獺河者也厯城新志云小清河自明永樂後漸至堙塞成化九年嘗濬治之嘉靖十二年又塞乃復濬博興以西達於厯城幾三百里乆之復淤盖小清惟恃濼水為源堰東有阻則濼水仍自華不注東北入大清河屢濬屢塞職是故也水經所叙瀆同而水異水異故李𢎞憲云河南無濟水瀆同故黄文叔云禹迹賴此而猶存言非一端各有所當今與人論濟水茍以為無則羣指七十二泉大小清河以相難若以為有則又據杜佑之說詆水經不當襲舊名為濟明道謂與公言如扶醉人扶得一邊起又倒却一邊真可笑又可憎也禹貢錐指有問濟水枯而復通畢竟在何時予曰考王景傳曰初平帝時河汴決壊未及得修建武十年陽武令張汜上言河決積乆日月侵毁濟渠所漂數十許縣逮後三十五年汴渠成明帝巡行下詔曰河汴分流復其舊迹陶丘之北漸就壤墳此汴壊而濟亦壊汴治而濟亦治之徵也又考晉書傅祇傳武帝時為滎陽太守自魏黄初大水後河濟汎濫鄧艾常著濟河論開石門而通之至是復侵壊祇乃造沈菜堰兖豫無水患郄超傳太和中桓温將伐慕容氏引軍自濟入河超諫曰清水入河無通運理毛穆之傳温使穆之鑿鉅野百餘里引汶㑹於濟此豈竟枯絶者哉大抵王莽世天災雖甚然皆不逺而復如王横言天嘗連雨東北風海水溢西南出寖數百里九河地巳為海所漸矣今九河故迹故具在酈氏言濟當王莽之世川瀆枯竭後水流逕通予謂此班氏注於垣縣云王屋山沇水出東南至武德入河軼出滎陽北地中又東至琅槐入海過郡九行千八百四十里蓋以目驗者言也祇縁司馬彪下語太重若改遂枯絶為曽枯絶則是矣大清一統志大清河在厯城縣北自齊河縣流入又東北入濟陽縣界其上流即古濟水也小清河在厯城縣北即古濼水也臣按自漢至隋唐惟有濟水杜佑始有清河之名宋南渡後始有大小清河之分今者小清所經自厯城以東如章丘鄒平長山新城高苑博興樂安諸縣皆古濟水所行而大清所經自厯城以上至東阿固皆濟水故道而自厯城東北如濟陽齊東青城諸縣則皆古漯水所行蒲臺以北則古河水所經盖唐宋時河行濼川其後大清兼行河漯二川其小清所行則斷為濟水故道也潛丘劄記行水金鑑巻八十二
