body:
  text: 行水金鑑卷八十九江南按察使傅澤洪撰運河水荆及衡陽惟荆州浮于江沱潛漢逾于洛至于南河禹貢北據荆山南及衡山之陽逾越也河在冀州南東流故越洛而至南河孔氏傳此州北界至荆山之北故言據也南及衡山之陽其境過衡山也以衡是大山其南無復有名山大川可以為記故言陽見其南至山南也浮此四水乃得至洛孔氏疏西荆山在今湖廣襄陽府南漳縣北八十里本漢臨沮地荆山襄陽南漳縣衡山即南岳也荆州之貢由江沱潛漢者各從所便至豫州境陸行踰洛乃至于河曰南河者在冀州南猶其西為西河也書古文訓在荆山有三一雍域褱德北條之荆大禹鑄鼎處也一在荆豫界臨沮南條之荆卞和得玉處也一在豫域唐志虢州湖城縣有覆釡山一名荆山湖城元省入閿鄉縣山在今縣南三十五里韓愈詩曰荆山已去華山來日照潼闗四扇開李商隱詩曰楊僕移闗三百里可能全是為荆山即此山也而豫之荆山與禹貢無涉湖廣通志云衡山在衡山縣西三十里岷山之脉盡於洞庭之西其山周環八百里為五岳之一南方之幹也上應璣衡故言衡山羅列七十二峯曰祝融峯高九千七百八十丈為七十二峯最高䖏曰廻雁峯相傳雁不過衡陽至此而廻或曰峯形如雁之廻南南岳廻雁為首岳麓為足云曰岣嶁峯大禹嘗登之上有岣嶁碑曰巨庇峯高數百仞頂有池曰天池冬夏不涸相傳夜有火燈燭之曰紫蓋峯在祝融峯下高四千五百丈形如紫蓋諸峯皆拱向祝融此獨南向曰天柱峯即雙柱峯也兩山端聳其形如柱曰石廩峯與紫蓋相接形如倉廩有二户一開一閤湘中記曰閉則嵗豐開則嵗儉曰芙蓉峯荆州記云衡山三峯極秀一紫蓋一石廩一芙蓉非晴不見曰赤帝峯一名煉玉峯曰朱明峯相傳與羅浮朱明洞通曰煙霞曰軫宿曰華蓋曰蓮花曰金簡曰石囷曰崱屴曰雷祖曰巾紫不可悉數金簡峯相傳禹夢水使者於此獲金簡玉書知治水之要禹貢有兩荆山導岍及岐至于荆山孔氏云在雍州導嶓冢至于荆山孔氏云在荆州惟此二山皆名荆故班孟堅有二條之說謂南條荆山在南郡臨沮縣東北此則荆州之荆山也謂北條荆山在馮翊懐德縣南此則雍州之荆山也以此二荆山名相亂蘇氏謂自南條荆山至于衡山之陽謂荆州自北條荆山至于河為豫州者其意蓋謂荆州之言荆者南荆也豫州之言荆者北荆也雖以此二山分配二州然而以地理志考之其實不然此荆與河相去不甚逺茍以荆州為北荆之荆則豫州之境界不應如是之狹也曾氏曰臨沮之荆其隂為豫州其陽為荆州此說是也蓋荆之與豫亦猶岱之分青徐也浮于江沱潛漢浮舟于此四水也江沱潛漢其相通之始末不可得而見矣逾于洛至于南河蘇氏曰江無逹河之道舍舟行陸以達于洛故曰逾于洛自洛則達于河矣河在冀州之南故曰南河曾氏以為漢與洛不相通故曰逾于洛自洛以至豫州之河故曰至於南河此二說皆相合然而蘇氏謂自江而逾洛曾氏謂自漢而逾洛此蓋為差異然而以文勢考之當從曾氏之說尚書全解荆州北界荆山南踰衡山尚書家謂之南條荆山揚紀陽鳥荆界至衡陽今衡岳南峯為廻鴈峯其號名猶有然歟貢道獨言沱潛則不及東境獨言江漢則不及西境故兼稱之荆州初水運泝江漢而上乃舍舟陸運出汝葉至洛陽西逾洛不復渡河至孟津而止故曰至于南河不復冒厎柱之險也東南貢道入河者皆不過厎柱尚書說爾雅曰水自江出為沱自漢出為潛江漢源發梁州流經荆州故梁荆皆有沱潛此則荆州江漢之出者也江沱潛漢其水道出入不可詳大勢則自江沱而入潛漢也程氏曰不徑浮江漢兼浮沱潛者隨其貢物所出之便或由經流或循支派也書纂言漢志云周改禹徐梁二州合之於雍青顔注謂省徐以入青併梁以合雍諸儒皆從其說而林少潁獨疑之曰職方氏於青州其山鎮曰沂山其川淮泗其浸沂沭則徐合於青無足疑者若夫雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛梁州之山川無一存者果何所據而謂梁合于雍乎荆州其川江漢據江漢之水發源于梁由荆而東至揚然後入於海今以江漢為荆之川則禹貢之梁州其無合于職方氏之荆州乎按林氏此言發前人所未發荆州之建國春秋時可考者楚夔耼權䢵與鄖同州左傳桓十一年州蓼伐楚師杜注云州國在南郡華容縣東南今為監利縣地羅貳軫凡九國戰國時屬楚而韓秦亦少得其地秦并天下置南郡黔中長沙南陽東境是漢復置荆州領郡國八後漢魏晉並因之晉領郡十九唐為山南東道之江陵荆州竟陵復富水郢齊安黄漢陽沔夷陵峽巴東歸等郡江南西道之江夏鄂巴陵岳長沙潭衡陽衡零陵永江華道桂陽郴邵陽邵武陵朗澧陽澧等郡黔中道之黔中黔寧夷思涪川費盧溪辰盧陽錦靈溪溪潭陽巫清江施播川播夜郎珍義泉夷龍標業溱溪溱等郡又淮南道之安陸安義陽申及嶺南道之連山連等郡按以上通典所列連山郡當出隸古南越騎田嶺北為桂陽嶺南為連山連山亦古南越地不當入荆域黔中寧夷涪川播川夜郎義泉溱溪七郡皆梁南徼外蠻夷非古黔中地不在九州之限元和志云黔州本漢涪陵縣理晉永嘉後地没蠻夷經二百五十六年至周保定四年涪陵蠻帥田恩鶴以地内附因置奉州建德三年改為黔州大業三年又改為黔安郡因周隋州郡之名遂與秦漢黔中地犬牙難辨其秦黔中郡所理在今辰州西二十里黔中故郡城是漢改黔中為武陵郡移理義陵即今辰州叙浦縣是後魏移治陵沅即今州是今辰錦叙奬溪澧朗施等州實秦漢黔中之地而今黔中及夷費思播隔越峻嶺東有沅江水及諸溪並合東注洞庭湖西有延江水一名涪陵江自牂牱北歴播費思黔等州北注岷江以山川言之巴郡之涪陵與黔中故地炳然分矣然則此五州及珍臻二州皆梁南徼外蠻夷今叙瀘重夔之江南諸縣及遵義府是也其東有峻嶺為限荆不當越此而西斗入六七百里総因黔中名亂嶺東嶺西諸州混而為一道杜氏遂有此誤叙州即巫州奬州即業州也又有當來屬者豫域襄陽之南漳漢東之光化及南越始安郡全義縣嶺北之地是也全義今為興安縣属廣西桂林府文獻通考云自荔浦以北為楚以南為越今靜江有中州清淑之氣荔浦相距纔百餘里遂入瘴鄉是天所以限楚越也此蓋就當時風氣言之近志遂以桂林平樂二府為禹貢荆州之域恐未必然杜氏以始安平樂属古南越為是唯全義縣嶺北之地當入荆域以今輿地言之湖廣武昌漢陽安陸荆州岳州長沙衡州常德辰州寳慶永州十一府郴靖二州施州衛其襄陽府則唯南漳縣德安府則安陸雲夢孝感應城應山及隨州之南境廢光化縣地黄州府則黄岡麻城黄陂黄安四川則夔州府之建始廣西則桂林府之全州本漢零陵縣属零陵郡隋改置湘源縣唐属永州五代晉改曰清湘於縣置全州明省縣入又改属桂林及興安縣嶺北之地縣在府東北一百二十里越城嶺在縣北三里皆古荆州域也荆之北界判自南漳縣之荆山山在縣西北八十里漳水所出其西為逺安興山北與梁接界荆山之西百餘里為景山水經沮水出漢中房陵縣注云出沮陽縣西北景山即荆山首也故淮南子曰沮出荆山元和志云沮水出房州永清縣西南景山永清本漢房陵縣地也縣南一百一十三里有建鼓馬騣二山並髙峻又竹山縣西南三十五里有白馬塞山孟達歎為金城千里蓋皆景山之餘脈矣南漳以東為荆門鍾祥京山元和志大洪山在京山縣西北二百里孤秀為衆山之傑及隨州之南境廢光化縣地光化故城在今隨州東南三十餘里唐隨州管縣四通典云唯光化為荆域餘皆属豫又東為應山縣縣北有義陽三關見齊書州郡志義陽唐申州治也一曰平靖關元和志云在安州應山縣北六十五里北至申州九十里東至百雁關一百六十里申州今汝寧州之信陽州也一曰黄峴關又名百雁關元和志云在應山縣北九十里北至申州九十里東至澧山關一百里一曰武陽關又名澧山闗元和志云在應山縣東北一百三十里北至申州一百五十里即古之大隧直轅冥阨也左傳定四年吳伐楚自淮涉漢楚左司馬戍請還塞大隧直轅冥阨自後擊之大隧即武陽直轅即黄峴𠖇阨即平靖也三闗又總名曰城口楚史皇所謂塞城口而入也𠖇亦作黽又作鄳皆讀若盲又東為黄安縣有大活闗白沙關本唐黄岡麻城黄陂三縣地明嘉靖四十二年析置黄安縣元和志云大活闗在黄州黄陂縣北二百里東北至光州二百八里西至安州澧山闗一百里白沙闗西至大活闗六十里在州北二百四十里北至光州界二十五里又東為麻城縣有穆陵關隂山闗元和志穆陵關西至白沙關八十里在麻城縣西北一百里北至光州一百四十九里隂山關西至穆陵闗一百里在縣東北一百一里北至光州殷城縣二百里按穆陵闗在穆陵山上或曰齊之四履南至穆陵即此也定四年吳楚戰于柏舉亦在縣界諸關依山為阻與荆山東西準望相直皆荆豫接界處荆之南界越衡山之陽大抵及嶺而止史記曰秦有五嶺之戍晉地理志曰自北徂南入越之道必由嶺嶠時有五處故曰五嶺據水經志五嶺大庾最東為第一嶺在揚域餘皆屬荆第二騎田嶺在郴州南即黄岑山亦名黄箱山今謂之臘嶺郴水所出高千餘丈南接廣東陽山縣界北寒南燠氣候頓殊第三都龐嶺在衡州府藍山縣南亦稱都龐嶠即黄檗山龐音龍水經注作部龍南接廣東連州界鄧德明謂都龐在九真大謬第四萌渚嶺在永州府江華縣南亦稱萌渚嶠即古臨賀嶺又名白芒嶺今名桂嶺高三千餘丈南接廣西平樂府賀富川二縣界第五越城嶺在桂林府興安縣北五嶺之最西嶺也亦稱越城嶠又名始安嶠嶺北一百三十里接寳慶府城步縣界經曰衡陽未知所極然酈氏有言古人云五嶺者天地以隔内外韓退之曰衡之南八九百里地益高山益峻水清而益駛其最高而横絶南北者嶺中州清淑之氣於是焉窮藉此表界差為近理耳荆之東界準揚約略言之蓋自麻城黄岡踰江而南為武昌縣又西南為通山咸寧崇陽通城又南為瀏陽醴陵攸縣茶陵又東南為興寧桂東桂陽又西南為宜章皆與揚分界處也荆之西界經無可見今據戰國時巴楚分地約畧言之蓋自巴東踰江而南為建始施州麻陽沅州又東南為黔陽靖州通道以訖於興安與貴州廣西接界漢水北距洛水六七百里欲自漢逾洛則必泝山源而上其惟丹水乎漢志𢎞農郡丹水縣下云水出上雒冢領山東至析入鈞師古曰鈞亦水名按今南陽府内鄉縣西南百二十里有丹水故城南去丹水二百步縣西有淅陽故城本漢析縣也上雒縣下云禹貢雒水出冢領山東北至鞏入河今陜西西安府商州治即漢上洛縣也洛南縣亦上洛地鞏縣今属河南府水經注丹水出京兆上洛縣西北冢領山商州志秦嶺在州西八十里其地有澗曰息邪澗丹水所出東南流與清池水合水出東北清池山又東南逕其縣南楚水注之水出縣西南楚山昔四皓隠于此丹水自倉野又東歴菟和山左傳哀四年楚人謀北方司馬起豐析以臨上洛左師軍於莬和右師軍於倉野杜預曰上洛縣東有菟和山今商州南百四十里有倉野聚又東南逕商縣南歴少習出武關應劭曰秦之南關也通南陽郡左傳哀四年楚左司馬使謂晉隂地大夫曰將通於少習以聽命京相璠曰楚通上洛阨道也漢祖下析酈攻武闗文穎曰武闗在析縣西一百七十里按今商州東有商洛廢縣即漢商縣也商南山陽鎮安三縣亦商縣地武闗在州東一百八十里又東南流入臼口歴其戍下又東南淅水注之水出析縣西北盧氏縣大蒿山南流逕修陽故城北又東逕析縣故城北春秋之白羽也又歴其縣東南流至丹水縣注于丹水又東南逕三户城又逕丹水縣故城西南縣有宻陽鄉古商密之地楚申息之師所戌春秋之三户也今内鄉縣西南有三户城又東南流至其縣南水南有丹崖山頳壁霞舉又南逕南鄉縣故城東北城在今南陽縣西南百里本漢析縣地又東歴於中之北所謂商於者也張儀說楚絶齊許以商於之地六百里即此裴駰曰有商城在於中故曰商於杜佑曰今内鄉西七里有於村亦曰於中丹水又南合汋水汋音市若切蓋汮字之誤汮與均同謂之淅口均水注云均水出盧氏縣熊耳山東南流逕其縣下南逕南鄉縣又南與丹水合又南逕順陽縣西有石山南臨汋水汋水又南流注於沔水謂之汋口按今南陽府淅川縣東北三十里有順陽故城本漢淅縣之順陽鄉也此注汮亦誤為汋按沔水注云沔水自武當縣城東城即今襄陽府均州治又東南逕涉都縣東北本筑陽縣之涉都鄉均水於此入沔謂之均口在今穀城縣界均鈞同或从水作汮韻㑹均字下云隋置均州取汮水名之是均即汮也史承水經之誤曰汋口晉桓温伐秦水軍自襄陽入汋口至南鄉是也或又曰汋均口齊陳顯達攻魏馬圈軍入汋均口是也楚通少習漢入武關皆在丹水之旁而南朝北伐其舟師必由均口而進可見為南北水陸之孔道商州西北諸山皆秦嶺也冢領亦秦嶺之别名丹水出其東南洛水出其東北中隔一嶺陸行當不甚逺禹貢逾洛之道計無便於此者以今輿地言之浮漢水至榖城縣東北入均口泝丹水而上經淅川南陽内鄉抵商州導源之處越冢領而北浮洛水經盧氏永寧冝陽洛陽偃師至鞏縣以達于南河此荆州之貢道也自漢逾洛之道黄文叔云舍舟陸運出汝葉金吉甫云自漢入丹河白水河即踰山路入洛今按陸行出汝葉則必更天息女几嵩少轘轅諸山中﨑嶇二三百里貢道必不由此丹河即丹水白水河蓋謂淯水是兩道淯水出盧氏縣熊耳山泝此水而上亦可逾于洛然洛水在縣南五里淯源北去縣百五十里宋元嘉中伐魏龎季明栁元景皆從山谷中度軍出盧氏不聞有水道淯洛之間陸運百五十里殊費民力唯丹水為自楚入秦之㨗徑水多陸少逾洛從此無疑唐書崔湜建言山南可引丹水通漕至商州自商纔山出石門北抵藍田可通輓道以湜充使開大昌闗役徒數萬竟不通按此亦用丹水而欲鑿山為輓道直抵藍田即令其道得通而傷財害民與逾洛之事大不侔矣或問厎柱三門之險古今所同患荆豫及兖青徐揚與冀之東北境貢入帝都必由南河經厎柱將若之何曰唐裴耀卿於三門東西置倉開山十八里為陸運以避其險疑禹時亦用此法貢物輕約易齎與漕榖不同避險從陸而改舟以達平陽無難也然厎柱初析閼流之害除或不若後世之險絶亦未可知禹貢錐指荆河惟豫州浮于洛達于河禹貢豫州南荆山北界河貢道由洛入河書古文訓此州界南至於荆山荆山之南則荆州也北距河水河水之北則冀州也豫州去帝都甚近浮舟于洛則達于河達于河則達于帝都矣尚書全解豫州居天下之中四方道理適均湯之亳今河南偃師成王之洛邑今河南洛陽縣其地北距河南抵荆山東抵徐西抵雍梁今為河南府虢陜鄭汝陳蔡唐鄧汴宋等州之地熊禾書說傳曰西南至荆山北距河水曾氏曰臨沮之荆山其陰為豫州其陽為荆州渭按荆山已見荆州河南河也後同其不言南者蒙上至于南河省文而可知也荆山主南言傳不當兼西亦猶青之岱主南言不當兼西也豫州有古太皥祝融之虚及帝嚳成湯所都虞舜後即少康所奔戈邳封葛三鬷諸國皆在焉春秋時可考者管蔡郜曹鄭東虢西虢凡蔣祭把宋焦申許蓼左傳哀十七年楚子穀曰武王克州蓼即此一作廖漢志南陽縣故廖國密隨厲唐戴沈息房周語内史過曰昭王娶于房後漢志汝南吳房縣故房國楚靈王所滅滑鄶鄀榖鄧賴項頓胡江黄道柏州來絞蠻陸渾凡四十一國戰國時屬宋魏韓而秦楚亦兼得其地秦并天下置三川碭郡潁川南陽東境北境是南郡北境是漢復置豫州領郡國五其今河南府陜郡𢎞農之地則屬司隸陳留濟隂之地則属兖州後漢為司隸治河陽豫州治譙領郡國六魏因之晉分置司州領郡十一豫州領郡國十唐為都畿之河南府洛州陜郡陜南境臨汝汝滎陽鄭等郡河南道之陳留汴睢陽宋濟隂曹譙郡亳潁川許淮陽陳汝潁潁汝南豫等郡山南東道之淮安唐南陽鄧襄陽襄漢東隨武當均等郡及河東道之𢎞農郡虢按以上通典所列濟隂之乘氏當往屬兖襄陽之南漳漢東之光化當往屬荆又有當來屬者兖域靈昌之匡城梁域上洛之上津東境廢長利縣地是也以今輿地言之河南則河南開封歸德南陽汝寜五府及汝州直𨽻則大名府之東明長垣山東兖州府之定陶曹縣城武單縣江南則鳳陽府之潁州潁上太和亳州蒙城湖廣則襄陽府之襄陽光化宜城棗陽榖城均州鄖陽府之鄖縣保康及鄖西之東境德安府隨州之北境皆古豫州域也豫之南界亦判自南漳縣之荆山西起保康歴宜城棗陽及隨州之北境故隨縣地州之南境廢光化縣地入荆域又東為信陽羅山皆與荆接界處豫北濵冀之南河其西與華隂接界華隂雍域也按職方豫州山鎭曰華山通典云即今華隂郡山連延東出故屬豫州九域志云華山四州之際東北冀東南豫西南梁西北雍十字分之四隅為四州也豫之北界由華山而東為閿鄉靈寳陜州澠池新安洛陽孟津鞏縣汜水河隂滎陽滎澤又東北為陽武延津皆在南河之南陽武自元時河從原武决而東南流始為河北地又東北抵濬縣大伾山冀兖豫三州之交也豫東接兖徐揚三州之界自封丘而東為長垣長明又東為考城定陶曹縣城武單縣與兖接界又南為夏邑永城亳州潁州又東為潁上䝉城皆在淮北與徐接界自潁州以西為商城息縣真陽踰淮而南為信陽與揚接界豫西自閿鄉以南為盧氏鄖縣及鄖西之東境故鄖縣地與雍梁接界豫居中央為輻輳之地接界者七州唯青為兖徐所隔與豫不相接云蔡氏曰豫之東境徑自入河豫之西境則浮于洛而後至河也蔡氏此例諸州畧同但豫東之水禹時概不通河先儒以鴻溝為禹跡故其說如此然鴻溝禹時實未嘗有滎川始見於周官濟隧亦僅見春秋傳𩔖皆非禹迹其通河者唯汜水耳汜水出浮戯山北流逕虎牢城東而北注于河源委頗短鄭地之舟或當由此入河而宋許陳蔡之郊自南而北其浮于汝潁不可鴻溝未開汝潁皆不與河通舟行不知從何處入河今按酈道元云汝水出魯陽縣之大盂山其西即盧氏界也大盂山在今汝州魯陽縣西南七十里而伊水出河南盧氏縣之巒山一名悶頓嶺者在縣東南百里伊汝二源相去甚近其間必有可逾之地陸行若千里浮伊入洛度亦不多也然則經遏不書逾曰貢道亦紀其大畧州境廣逺間有小小絶水處若欲書逾何可勝書且豫之西境無所逾不得言逾于伊浮于洛故畧而不書此等當以意㑹也禹貢錐指行水金鑑卷八十九
