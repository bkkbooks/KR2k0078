body:
  text: 行水金鑑卷九十江南按察使傅澤洪撰運河水華陽黒水惟梁州浮于潛逾于沔入于渭亂于河禹貢漢上曰沔越沔而北入渭浮東渡河正絶流曰亂孔氏傳華山在豫州界内此梁州境東㨿華山之南不得其山故言陽山之西則雍境也孔氏疏梁州北界華山南距黒水黒水今瀘水也酈道元說黒水亦曰瀘水若水馬湖江出姚州徼外吐番界中東北至叙州宜賔縣入江書古文訓乆姚州本漢弄棟青蛉遂三縣地弄棟属益州部青蛉遂久属越嶲郡今為雲南之姚安府宜賔本漢僰道縣属犍為郡今為四川叙州府治雲南通志姚州有金沙江注云源出吐番為府大川即黒水也四川總志叙州府有馬湖江在府城南源出沈黎實大渡之支流亦名瀘水一名金沙江諸葛亮五月渡瀘即此江之上流孔氏謂東據華山之陽西距黒水謂東據華山之陽者當是跨而越之也此說不然河流導自積石至于龍門南至華陰東至于底柱是河入華山之陰始折而東也雍州言黒水西河唯雍州黒水之西蓋雍州之境梁州不應跨越華山而至於北也曾氏曰華山之陰為雍州其陽為梁州則梁州之北雍州之南以華為畿而梁實在雍州之南矣此說雖是然其謂梁之北雍之南以華為畿則其說未盡據華山在雍梁之東若謂梁之東北雍之東南以華為畿則得之矣尚書全解之陜西通志云華山在華隂縣南十里山海經太華山削成而四方其高五千仞其廣十里鳥獸莫居是山為三峯南曰松檜峯一曰落雁峯李白登落雁峯嘆曰呼吸之氣可通帝座恨不擕謝眺驚人句來搔首問青天耳東曰明星玉女峯西曰蓮華峯一曰芙容峰其上有太上全真崖避詔崖即陳摶卧處仰天池八卦池太乙池菖蒲池黒龍潭二十八宿潭明星玉女祠玉女洗頭盆石馬玉龜仙人掌石日月鎮嶽宮玉井即韓愈詩所稱花開十丈藕如船者博臺即秦昭王令工施鉤梯處又有石拆為唐明皇投簡處山腹有總仙洞天洞口有石如丹青畫像冠帔衣服無不周備先儒以浮潛頂因桓是來只說西傾一路之貢非也浮潛逾沔入渭亂河乃是梁州一州之貢道西土梁雍皆逺而梁尤逺禹時劍門金牛之道未鑿梁州之通於中州者梯縁蜀道之險而北行逺至漢上而浮潛逾沔然後能入渭亂河以達帝都則其險逺可知凡漢水分支可以容舟處皆潛也不言浮漢而言浮潛者隨其支流徑便不必至漢乃浮也桑欽叙漢自西樂城以上為沔度水口以下為漢大率漢之支流皆名潛漢之上流皆名沔此潛以達漢也沔在山南屬梁州渭在山北屬雍州水不可通自沔而北陸行度隴至於渭濵乃用舟順流而不可逾越渭口而遂渡河也文當曰入於沔逾于渭蓋二文互也書纂言黒水諸家遵孔傳謂出雍歴梁入南海為二州之西界故其說穿鑿支離不可得通蓋古之若水即禹貢梁州之黒水漢時名瀘水唐以後名金沙江而黒水之名遂隠然古記間有存者地理志滇池縣有黒水祠一也山海經黒水之間有若水二也水經注自朱提音殊時至僰蒲北反道有黒水三也輿地志黒水至僰道入江四也今瀘水西連若水南界滇池東經朱提僰道其為梁州之黒水無疑矣故斷從薛氏以南北易孔傳之東西亦甚明確也漢志若水出蜀郡旄牛縣徼外南至大莋入繩今黎大所南有旄牛故城即漢縣師古曰西南之徼猶北方塞也徼工釣反繩水出越巂郡遂乆縣徼外東至僰道入江行千四百里巂先蕊反今建昌衛治即漢越巂郡邛都縣也遂夊蜀漢改属雲南水經注若水出蜀郡旄牛徼外東南至故關為若水司馬相如傳曰畧定西南夷邊闗益斥西至沫若水又曰闗沫若是若水故有闗也山海經曰南海之内黒水之間有朩名曰若朩若水出焉若水㳂流間闗蜀土黄帝長子昌意降居斯水為諸侯娶蜀山氏女生顓頊於若水之野若水東南流鮮水注之一名州江大渡漢志鮮水出旄牛徼外南入若水又南逕越巂邛都縣西有巂水漢武帝置越巂郡治卭都縣言越此水以章休盛也縣故卭都國越巂水即繩若矣又有温水冬夏常熱昔李驤敗李流于温水是也按此温水源流不逺非漢志牂牱鐔封縣下之温水東至廣􅉱入􅉱者金吉甫謂漢志以瀘為温字從省誤非也卭都唐為巂州越嶲縣今建昌衛四川行都司治領營四㑹川鹽井冕山越巂又南逕大莋縣入繩繩水出徼外山海經曰巴遂之山繩水出焉東南流逕髦牛道至大莋與若水合自下亦通謂之繩水又南逕㑹無縣元和志㑹川縣北至嶲州三百七十里本漢㑹無縣也今為㑹川營地與孫水合孫水出臺登縣一名白沙江南流逕卭都縣司馬相如定西夷橋孫水即此又南至㑹無入若水也漢志臺登縣孫水南至㑹無入若行七百五十里元和志嶲州臺登縣正南微西至州一百七十里念諾水本名繩水流入瀘水在縣西北七百里自羗戎界流入長江水本名孫水出縣西北胡浪山下今冕山營東北有孫水繩水南逕雲南郡之遂久縣蜻蛉水入焉縣本属越嶲蜀漢建興三年分益州永昌置雲南郡以遂久來属蜻蛉水出蜻蛉縣西東逕其縣下又東注于繩水漢志青蛉縣禺同山有金馬碧雞又逕三絳縣西三絳一日小㑹無又逕姑復縣北對三絳縣淹水注之淹水出遂久徼外東南至蜻蛉縣又東過姑復縣南東入于若水按漢志㑹無臺登遂久蜻蛉三絳姑復並属越嶲郡又東與毋血水合漢志益州郡弄棟縣東農山毋血水出北至三綘南入繩行五百一十里毋音無又東涂水注之漢志牧靡縣南臘涂水所出西北至越嶲入繩過郡二行千二十里靡音麻涂音途又東北至犍為朱提縣西為瀘江水後漢書建武十九年武威將軍劉尚擊西夷反者棟蠶度瀘水入益州郡注云瀘水一名若水出旄牛徼外經朱提至僰道入江在今嶲州南朱提山名應劭曰在縣西南以氏焉犍為屬國也在郡南千八百許里建安二十年立朱提郡治縣故城尋廢諸葛亮南征復置自梁陳已來不復賔屬隋開置㳟州唐改為曲州元和志云曲州南北四百里東西七百里窮年密霧未嘗覩日月輝光樹木皆衣毛深厚時時多水濕晝夜沾洒上無飛鳥下絶走獸唯夏月頗有蝮蛇土人呼為漏天也郡西南二百里得所綰堂琅縣西北行上高山羊膓繩屈八十餘里或攀木而升或繩索相牽而上縁陟者若將階天按後漢志無堂琅蓋省入朱提也劉昭曰朱提縣西南有堂琅山多毒草盛夏之月飛鳥過之不能得去有瀘津東去縣八十里水廣六七百歩深十數丈晉明帝大寧二年李驤等侵越嶲攻臺登縣寧州刺史王遜遣將軍姚岳擊之戰於堂琅驤軍大敗追之至瀘水赴水死者千餘人兩岸皆山髙數百丈瀘峰最為髙秀孤髙三千餘丈是山晉太康中崩震動郡邑水之左右馬歩之逕裁通而時有瘴氣三月四月經之必死非此時猶令人悶吐五月以後行者差得無害故諸葛亮表言五月渡瀘也自朱提至僰道有水歩道有黒水羊官水三津之阻行者苦之又有牛叩頭馬搏頰坂其艱嶮如此也若水逕越嶲之馬湖縣又謂之馬湖江馬湖縣今為四川之馬湖府繩水瀘水孫水淹水大渡水隨決入而納通稱是以諸書錄記羣水或言入若又言注繩亦咸言至僰道入江華陽國志云僰道治馬湖江㑹水通越嶲正是異水沿注通為一津更無别川可以當之今按府縣圖志若水在建昌衛俗名打沖河自冕山營西徼外營故寧畨衛在建昌衛東北東南流至衛西鹽井營東南與雲南金沙江合營在衛西元和志嶲州昆明縣東北至州三百里本漢定笮縣也出鹽鐡夷皆用之漢將張嶷殺其豪率遂獲鹽鐡之利鹽井在縣城中取鹽先積柴燒之以水洗上即成黒鹽凡言笮者夷人於大江水上置藤橋謂之笮其定笮大笮皆是近水置笮橋處笮與筰同金沙江源出吐藩界至共龍山犛牛石下南流漸廣本名犛水後訛為麗水東南流經麗江府北又東經姚安府北即鹽井衛東南合打沖河又東合瀘水又東經㑹川營南通典㑹川縣有瀘水五月渡瀘即此元和志嶲州南至瀘渡四百五十里又東至東川府西折而東北經烏䝉府西北又東北經馬湖府南又東經叙州府南而北入大江雲南無水路行者以為艱唯由蜀浮金沙江可以直達南中明正統嘉靖隆慶時屢議開通而不果行至天啟時安酋倡亂貴陽道阻復議開通按察使莊祖誥議云自金沙江廵檢司開由白馬口歴普隆紅巖石刺鮓至廣翅塘皆禄勸州地其下有三灘水溢没石乃可放舟涸則躋岸䌫空舟以行又歴直勒村罵剌土色皆㑹禮州地其下有雞心石石如堆者三纍纍江中舟者相水勢緩急可行又歴踏照亂得頭峽刺鮓至粉壁灘甚駛皆東川地又歴驛馬河新灘至虎跳灘隂溝洞皆巧家地虎跳湍瀉陡石不可容舟隂溝二山頽集水行山腹中皆從陸過灘易舟而下又歴大小流灘為蠻夷司地又歴黄郎木鋪貴溪寨業灘至南江口為烏䝉府地始安流自廣翅塘至南江朩商行之可十日又至文溪鐡索江邊數灘歴麻栁灣教化巖為馬湖府地又歴洩灘蓮花三灘㑹溪石角灘至叙州府其說甚詳晰然是時明運將終救敗不暇徒託諸空言而已鹽井營東南蓋即漢大莋縣界繩若合流處若為建昌衛西之打沖河繩則姚安府北之金沙江也此水禹無所致力不用循行故所𨗳唯雍州之黒水瀘本作盧如盧弓盧矢盧橘之𩔖皆訓黒劉熙釋名土黒曰盧沈括筆談云夷人謂黒為盧漢中山盧奴縣有盧水酈道元云水黒曰盧不流曰奴尤盧水為黒水之切證也牧誓八國有盧人疑即居盧水上者其字後加水作瀘章懷太子注後漢書云瀘水一名若水則瀘若似非異源而道元引益州記曰瀘水源出曲羅舊下三百里曰瀘水兩峰有殺氣暑月舊不行故武侯以夏渡為艱瀘水又下合諸水而總其目焉故有瀘江之名矣據此則瀘水自出曲羅舊其地當在若水之東下流合若水故若水兼瀘水之目所謂隨決入而納通稱者也元和志云嶲州西瀘縣東北至州二十七里本漢邛都縣地瀘水在縣西一百十二里水峻急而多石土人以牛皮作船而渡一船勝七八人蓋即曲羅舊出之瀘水也考其源流不出漢越嶲犍為二郡界而杜氏通典云吐蕃有可䟦海去赤嶺百里方圓七十里東南流入西洱河合流而東號漾濞水又東南出㑹川為瀘水瀘水即黒水也程大昌金履祥之說皆出於此漾濞水見唐書在今大理府西百里西洱河即葉榆河也出大理鄧川州㸃蒼山匯為巨湖周三百里亦曰西洱海今按水經注葉榆河出益州郡葉榆縣縣東有葉榆澤葉榆水之所鍾也其水自縣南枝分東北流逕遂久縣東姑復縣西與淹水合淹水雖合繩若入蜀江而葉榆初無黒水之名也何以知為黒水之源其經流則自邪龍縣東南流逕滇池縣南又東與盤江合又東南至交趾麋泠縣入海此與會川相去懸絶並不合繩若入蜀江安得謂漾濞水東南出會川為瀘水即滇池縣北所祠之黒水哉杜說非是又按水經注永昌郡有蘭倉水出博南縣漢武帝時通博南山道渡蘭倉津土地絶逺行者苦之歌曰漢德廣開不賓度博南越倉津其水東北流逕不偉縣與𩔖水合又東與禁水合又北注瀘津水然則此蘭倉水仍東北合瀘水入蜀江也若今之所謂䦨滄江元人指以為禹貢之黒水者則東南流至交趾入海與梁州絶無交渉影響附會之談殊不足信漢志滇池澤在滇池縣西北有黒水祠後漢志縣北有黒水祠或以為武帝開置益州郡始立之非也使帝知郡界有黒水而立此祠則班史必知其所在而能言之矣竊謂此祠蓋彼中相承已久黒水即金沙江東經㑹無縣南南直滇池縣縣故滇王國於其北立祠祭之宜矣自周衰以迄漢初聲教阻絶故尚書家莫能言梁州黒水之所在千載而下尚頼有此祠可以推測而得之語云天子失官學在四夷又云禮失而求之野此亦其一端也杜佑以漾濞水經㑹川縣者為黒水樊綽以麗水合瀰渃江者為黒水程大昌以西洱河貫葉榆澤者為黒水元人則以䦨滄江至交趾入海者為黒水而明李元陽引張立道之事以為證此皆轉相附㑹以求合於入南海之文非實有所騐也以是為雍界之黒水吾不敢知如謂梁界之黒水亦即斯川則梁州奄有雲南極於交趾以一州而兼數州之地何至若是之廣遠此可以理斷之而信其必不然者也梁州之黒水自繩若而外又有五黒水焉漢志符黒水出犍為南廣縣汾關山北至僰道入江一也符黒水者符縣之黒水也一名南廣水水經注黒水出漢中南鄭縣北山南流入漢諸葛亮牋云朝發南鄭暮宿黒水二也又黒水出羗中西南入白水通典扶州尚安縣有黒水元和志云出縣西北素嶺山三也在今陜西文縣近志疊溪營城西北有黒水即古翼水源出黒水生番東南經茂州至安縣入于羅江四也又崇慶州西北有黒水入江元大一統志云源出常樂山溪石皆黒五也此皆水之小小者非禹貢之黒水也杜氏云顧野王撰輿地志言黒水至僰道入江與禹貢不合蓋謂其不入南海是為異耳而薛士龍以為野王指符黒水言之今顧書不傳未知然否按南廣水在叙州府城東十餘里出西南夷吕郜蠻部自豕蛾夷囤過慶符縣東北至南廣洞入江源短而流狹野王之所指豈謂是與韓汝節謂梁州别自有黒水千古卓識而乃以疊溪黒水當之將以界南北乎抑以界東西乎吾不意韓氏復舛謬至此也梁州有古蜀山氏蠶叢氏之國又𤣥囂昌意所封及牧誓所稱庸蜀羌髳微盧彭濮諸國皆在焉春秋時可考者庸巴濮麇襃凡五國戰國時屬秦而楚亦兼得其地秦并天下置漢中巴郡蜀郡隴西南境是内史南境是漢改置益州領郡八漢志云改梁曰益魏分置梁州晉初因之益梁二州並領郡八後又分益州南境置寧州領郡四唐為山南西道之漢中梁州洋川洋通川通潾山渠南平渝清化巴始寧壁咸安蓬符陽集巴川合河池鳯順政興益昌利等郡山南東道之房陵房南賔忠南浦萬雲安夔等郡劒南道之蜀郡益唐安蜀濛陽彭徳陽漢通義眉梓潼梓巴西綿普安劒閬中閬資陽資臨邛邛通化茂交川松越嶲嶲南溪戎遂寧遂仁壽陵犍為嘉盧山雅瀘川瀘陽安簡安岳普江源當隂平文同昌扶油江龍臨翼翼歸誠悉静川静蓬山柘恭化恭維川維雲山奉和義榮盛山開南充果洪源黎雲南姚等郡又京畿之上洛商安康金隴右道之武都武同谷成懷道宕合川疊黔中道之涪陵涪南川南等郡按以上通典所列雲南涪陵南川三郡乃梁南徼外蠻夷不在九州之限其雲安之建始縣當往屬荆上洛之上津東境廢長利縣地當往屬豫而黔中寧夷涪川播川夜郎義泉溱溪七郡列在荆域者雖附近蜀江之南亦係徼外蠻夷不在九州之限以今輿地言之陜西漢中府興安州及西安府之商州洛南山陽鎮安商南鞏昌府之鳯縣兩當徽州成縣階州文縣湖廣鄖陽府之房縣竹山竹溪及鄖西縣之西境四川則成都保寧順慶龍安馬湖五府潼川嘉定邛眉雅五州及叙州瀘州重慶夔州之江北諸州縣松潘衛疊溪營天全六番招討司黎大所建昌衛皆古梁州域也其遵義府永寧衛及東川烏䝉鎮雄故烏撒三府並在瀘水之外雲南郡唐於昆明之弄棟川置即今姚安府其非梁域又不待言矣梁北自洛南商州鎮安並屬西安府以西為洋縣城固褒城鳯縣並屬漢中府兩當徽州成縣並屬鞏昌府及唐宕疊二州之地北與今岷州洮州二衛接界衛屬臨洮府又西為西傾山南唐松州徼外羈縻之地貞觀二年於松州置都督府督羈縻二十五州其後多至百有四州悉生羌部落皆與雍接界其間大山長谷遠者或數百里終南山東連二華竦峙長安之南有子午道直達漢中岡巒綿亘歴盩厔音周質至武功郿縣為太一山亦名太白山駱谷斜谷之口皆當其地又西過寳雞訖於隴首山之深處高而長大者曰秦嶺西京記云長安正南山名秦嶺東起商洛西盡汧隴東西八百里是也關中指此為南山漢中指此為北山斯實雍梁之大限矣寳雞西南為鳯縣即漢故道縣屬武都郡縣東北大散嶺與寳雞分界嶺上有大散關當秦隴之㑹扼南北之交雍梁有事在所必争又西為徽州州東南有鐵山懸崖萬仞劉子羽曰蜀口有鐵山棧道之隘是也州西有朩皮嶺甚髙險唐黄巢之亂王鐸置關於此以遮秦隴又西為成縣縣有鷲峽羊頭峽龍門戍皆在仇池山北北兵攻仇池必由此入又西為洮州衛之西傾山山東北去衛四百餘里屬雍州其南則屬梁州所謂西傾因桓是來者也以上諸山皆隴蜀之阸塞西傾與華陽東西準望相直曽彦和云梁北雍南以華為畿不兼言東最得經旨而林少頴以為華山在梁雍之東當云梁之東北雍之東南以華為畿夫兼言東則不足以該其西是謂欲密而反疎林氏蓋習聞西南距岱之說而不知其非故有此論梁東自洛南商南以南二縣並屬西安府為鄖西之西境故上津縣地上津唐屬商州其故城在今鄖西縣西北一百十里又南為房縣鄖西房縣並屬鄖陽府與豫接界又南為竹山縣屬鄖陽府又南為巫山縣屬䕫州府與荆接界梁南自宜賔以西至㑹川諸州縣凡在瀘水馬湖江之北者皆梁域宜賔以東至巫山諸州縣凡在大江之北者皆梁域蓋大江既合瀘水亦得互受通稱故隋改江陽縣曰瀘川置瀘州治焉其縣南大江寰宇記謂之瀘江瀘水即黒水則梁左之南鄙亦當以此水表界也或曰梁州之水莫大於江經曷不界以江曰江自岷山導源大勢皆南行至叙州始折而東茍界以江則江右之地悉遺之域外矣故言黒水可以見左界而言江則不可以該右界也梁西自西傾山歴唐羈縻州以南為當州奉州柘州又西南為始陽鎮又南為雅州黎州又西南為嶲州皆與蠻夷接界今松潘衛威州天全六番招討司雅州黎大所及越嶲冕山營之北境鹽井營之西境是也唐當州在今松潘衛西南三百里州治通軌縣隋志縣有甘松山元和志云甘松嶺在嘉誠縣西南十五里唐開元十九年吐蕃請互市於甘松宰相裴光庭曰甘松嶺中國之阻不如許赤嶺即此也赤嶺在今陜西西寧衛界奉柘二州在今疊溪威州之西奉州西七十里有的一作滴博嶺韋臯嘗分兵出此圍維州柘州西北百里有大雪山一名蓬婆山杜甫詩已收滴博雲間戍欲奪蓬婆雪外城是蓬婆又在滴博之西也威州北有高碉山山上有薛城廢縣唐維州治亦曰姜維城邊略云自松達茂不三百里夷碉棊布山巖如蜂房宋史有碉門元有碉門宣撫司即今天全六番招討司也蓋夷碉起自松州訖於始陽故謂之碉門矣廣韻無碉字不知其音今按後漢書冉駹夷皆依山居止累石為室高者至十餘丈為邛籠注云今彼土夷人呼為彫也蓋碉本作彫後改从石作碉耳音當與彫同唐雅州治嚴道縣領羈縻吐蕃四十六州黎州治漢源縣管羈縻州五十七並蠻夷部落寰宇記云雅州西去大渡河五日程羌蠻混雜連山接野鳥路㳂空不知里數黎州西至廓清縣一百八十里其城西臨大渡河河西則生羌蠻界髙山萬重更無郡縣今黎大所北有邛來山九折坂後漢永平中白狼槃木唐菆等百餘國舉種奉貢越山坂繦負而至皆旄牛徼外蠻夷也嶲州即今建昌衛通典云南至姚州界五百六十里西至磨迷生蠻六百六十里昔司馬相如略定西南夷關沫若徼牂柯鏤靈山橋孫水蓋皆在此地矣水經注以襃斜二水為自沔入渭之道曰歴漢川至南鄭屬於襃水遡襃暨衙嶺之南溪水支灌於斜川届武功而北達於渭水道相貫與經文符合而考諸漢史則猶有可疑者河渠書云武帝時有上書欲通襃斜道及漕事下御史大夫張湯湯問之言抵蜀從故道縣屬武都郡即今漢中府之鳯縣也故道多阪回遠今穿襃斜道少阪近四百里而襃水通沔斜水通渭皆可以行船漕漕從南陽上沔入襃襃絶水至斜間百餘里以車轉從斜下渭如此漢中穀可致而山東從沔無限便於底柱之漕上以為然拜湯子卬為漢中守發數萬人作襃斜道五百餘里道果便近而水多湍石不可漕溝洫志同蘓氏據此以說經曰沔無入渭之道漢人所言襃斜則其道也然襃斜之間絶水百餘里故曰逾于沔蓋禹時通謂襃為沔也傅同叔為之辨曰據唐孔氏言越沔陸行而北入渭則是以漢為即沔自浮潛至沔即舍舟陸行而北入渭也然經言浮于潛逾于沔則是自潛逾沔非謂自沔逾渭也若以逾于沔為逾于渭則以逾于洛為逾于河可乎蘇氏求襃斜之道得之矣然亦以漢為即沔以禹時通謂襃為沔而說逾字與頴逹無異吾固質之經而莫敢信也渭按襃斜之間絶水百餘里則渭不言逾而言入誠有可疑即通謂襃為沔亦無解於百餘里之阻隔傅同叔云上文既言逾沔可以該下而省文此說亦未當襃斜之間若更有一逾安得以逾沔該之愚竊謂襃斜二水禹時必有相通之道如水經注所云衙嶺之南溪水支灌於斜川者及夏殷之際梁俗變為蠻夷貢職不修貢道遂廢周武王牧野之師八國雖嘗來㑹其後巴蜀恃險復不與中國通逾沔入渭之道其誰知之嘗觀江河之枝流日久亦多陻塞如夷水首受魚復江戰國時巴楚相攻舟師常出此路洎乎隋唐遂成斷港汴水引河為轉運之通渠宋南渡後廢而不用日就淺澀今水道斷續幾不可問而况深山窮谷之中溪流一線裁得通舟自禹至漢多歴年所豈能長存而不變襃斜二水相通之道禹時自有漢時自無不得據漢史而疑聖經亦不得據酈注而疑漢史也禹貢錐指行水金鑑巻九十
