body:
  text: 行水金鑑巻九十七江南按察使傅澤洪撰運河水宋神宗元豐五年三月癸亥罷廣濟輦運司移上供物自淮揚軍界入汴以清河輦運司為名命張士澄都大提舉七月御史王植言廣濟安流而上與清河泝流入汴逺近險易較然廢之非是詔監司詳議提舉河北黄河隄防司言御河狹隘隄防不固不足容大河分水乞令綱運轉入大河而閉截徐曲既從之矣明年戸部侍郎蹇周輔復請開撥以通漕運及令商旅舟船至邊是時每有一議朝廷輒下水官相度或作或輟迄莫能定大抵自小呉埽決大河北流御河數為漲水所冒亦或湮没金水河透水槽阻礙上下汴舟遣宋用臣按視請自板橋别為一河引水北入于汴後卒不行乃由副隄河入于蔡以源流深逺與永安青龍河相合故賜名曰天源先是舟至啟槽頗滯舟行既𨗳洛通汴遂自城西超字坊引洛水由咸豐門立堤凡三千三十歩水遂入禁中而槽廢三月宋用臣言金水河透水槽阻礙上下汴舟宜廢撒從之十月狹河工畢宋史河渠志神宗𨗳洛通汴而主者遏絶洛水不使入城中洛人頗患苦之彦博因中使劉惟簡至洛語其故惟簡以聞詔令通行如初遂為洛城無窮之利宋史文彦博傳王存元豐五年遷龍圖閣直學士知開封府京師並河居人盗鑿汴隄以自廣或請令培築復故又按民廬侵官道者使撤之二謀出自中人既有詔矣存曰此吾職也入言之即日弛其役都人驩呼相慶進樞宻直學士宋史王存傳宋神宗元豐六年正月戊辰開龜山運河二月乙未告成長五十七里闊十五丈深一丈五尺初發運使許元自淮隂開新河屬之洪澤避長淮之險凡四十九里久而淺澀熈寧四年皮公弼請復濬治起十一月壬寅盡明年正月丁酉而畢人便之至是發運使羅拯復欲自洪澤而上鑿龜山裏河以達於淮帝深然之㑹發運使蔣之竒入對建言上有清汴下有洪澤而風浪之險止百里淮邇歲溺公私之載不可計凡諸道轉輸涉湖行江巳數千里而覆敗於此百里間良為可惜宜自龜山蛇浦下屬洪澤鑿左肋為複河取淮為源不置堰牐可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年田棐任淮南提刑嘗言開河之利其後淮隂至洪澤竟開新河獨洪澤以上未克興役今既不用牐蓄水惟隨淮面髙下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦博矣祐甫曰異時淮中歲失百七十艘若捐數年所損之費足濟此役帝曰損費尚小如人命何乃調夫十萬開治既成命之竒撰記刻石龜山後至建中靖國初之竒同知樞宻院奏淮水浸淫衝刷隄岸漸成墊缺請下發運司及時修築自是歲以為常八月范子淵又請于武濟山麓至河岸并嫩灘上修隄及壓埽隄又新河南岸築新隄計役兵六千人二百日成開一直河長六十三里廣一百尺深一丈役兵四萬二千人期五月成從之十月都提舉司言汴水増漲京西四斗門不能分減致開決隄岸今近京惟孔固斗門可以泄水下入黄河若孫賈斗門雖可泄入廣濟然下尾窄狹不能盡吞宜於萬勝鎭舊減水河汴河北岸修立斗門開淘舊河創開生河一道下合入刁馬河役夫一萬三千六百四十三人一月畢工詔從其請仍作二年開修宋史河渠志閏月丙戌汴水溢宋史神宗本紀蔣之竒字頴叔宜興人擢江淮荆浙發運副使元豐六年漕粟至京比常歲溢六百二十萬石錫服三品請鑿龜山左肘至洪澤為新河以避淮險自是無覆溺之患詔置二秩加直龍圖閣升發運使宋史蔣之竒傳宋神宗元豐七年四月武濟河潰八月詔罷營閉縱其分流止護廣武三埽都大提舉汴河隄岸司言京東地富榖粟可漕獨患河澀若因修京城令役兵近汴穴土使之成渠就引河水注之廣濟則漕舟可通是一舉而兩利也從之宋史河渠志是年七月甲辰伊洛溢十月浚真楚運河宋史神宗本紀元豐間彧先公為右史神考遣使治楚州新河戒之曰東南不慣興大役卿且為朕優恤兵民朱彧蘋州可談先公謂朱服也宋哲宗元祐元年閏二月辛亥右司諫蘇轍言近歲京城外創置水磨因此汴水淺澀阻隔官私舟船其東門外水磨下流汗漫無歸浸損民田一二百里幾敗漢髙祖墳頼陛下仁聖惻怛親發德音令執政共議營救尋詔畿縣於黄河春夫外更調夫四萬開自盟河以疏洩水患計一月畢工然以水磨供給京城内外食茶等其水止得五月閉斷以此工役重大民間每夫日顧二百錢一月之費計二百四十萬貫而汴水渾濁易至填淤明年又須開淘民間歲歲不免此費聞水磨歲入不過四十萬貫前戸部侍郎李定以此課利惑誤朝聽依舊存留且水磨興置未久自前未有此錢國計何闕而小人淺陋妄有靳惜傷民辱國不以為愧况今水患近在國門而恬不為怪甚非陛下勤䘏民物之意而又減耗汴水行船不便乞廢罷官磨任民磨茶三月轍又乞令汴口以東州縣各具水匱所占頃畆每歲有無除放二稅仍具水匱可與不可廢罷如決不可廢當如何給還民田以免怨望八月辛亥轍又言昨朝㫖令都水監差官具括中牟管城等縣水匱元浸壓者幾何見今積水所占幾何退出頃畆幾何凡退出之地皆還本主水占者以官地還之無田可還即給元直聖恩深厚棄利與民所存甚逺然臣聞水所占地至今無可對還而退出之田亦以廹近水匱為雨水浸淫未得耕鑿知鄭州岑象求近奏稱自宋用臣興置水匱以來元未曽取以灌注清汴水流自足不廢漕運乞仍廢水匱以便失業之民十月遂罷水匱詔斥祥符霧澤陂募民承佃増置水匱又即宣澤門外仍舊引京索源河置槽架水流入咸豐門皆以為廣濟淺澀之備三月三省言廣濟河輦運近因言者廢罷改置清河輦運迂逺不便詔知棣州王諤措置興復都水監亦言廣濟河以京索河為源轉漕京東歲計今欲依舊即令於宣澤門外置槽架水流入咸豐門裏由舊河道復廣濟河源以通漕運從之宋史河渠志三月已卯復廣濟河輦運冬始閉汴口宋史哲宗本紀宋哲宗元祐四年十二月京東轉運司言清河與江浙淮南諸路相通因徐州呂梁百歩兩洪湍淺險惡多壞舟楫由是水手牛驢撁戸盤剥人等邀阻百端商賈不行朝廷巳委齊州通判滕希靖知常州晉陵縣趙竦度地勢穿鑿今若開修月河石隄上下置牐以時開閉通放舟船實為長利乞遣使監督興修從之知潤州林希奏復呂城堰置上下牐以時啟閉其後京口𤓰洲犇牛皆置牐是年冬御史中丞梁燾言嘗求世務之急得𨗳洛通汴之實始聞其說則善及考其事則可懼竊以廣武山之北即大河故道河常往來其間夏秋漲溢每抵山下舊來洛水至此流入於河後欲𨗳以趨汴渠乃乘河未漲就嫩灘之上峻起東西隄闢大河於隄北攘其地以引洛水中間缺為斗門名通舟楫其實盜河以助洛之淺涸也洛水本清而今汴常黄流是洛不足以行汴而所以能行者附大河之餘波也増廣武三埽之備竭京西所有不足以為支費其失無慮數百萬計從來上下習為欺罔朝廷惑於安流之說稅屋之利恬不為慮而不知新沙疎弱力不能制悍河水勢一薄則濫漫潰散將使怒流循洛而下直冒京師是甘以數百萬日増之費養異時萬一之患亦巳誤矣夫歲傾重費以坐待其患何若折其奔衝以終除其害哉為今之計宜復為汴口仍因大河一支啟閉以時還祖宗百年以來潤國養民之賜誠為得䇿汴口復成則免廣武傾注以長為京師之安省數百萬之費以紓京西生靈之困牽大河水勢以解河北決溢之災便東南漕運以蠲重載留滯之弊時節啟閉以除蹙凌打凌之苦通江淮八路商賈大舶以供京師之饒為甚大之利者六此不可忽也惟拆去兩岸舎屋盡廢僦錢為害者一而甚小所謂損小費而成大利也臣之所言特其大略爾至於考究本末措置纎悉在朝廷擇通習之臣付之無牽浮議責其成功又言臣聞開汴之時大河曠歲不決蓋汴口析其三分之水河流常行七分也自𨗳洛而後頻年屢決雖洛口竊取其水率不過一分上下是河流常九分也猶幸流勢卧北故潰溢北出自去歲以來稍稍卧南此其可憂而洛口之作理須早計竊以開洛之役其功甚小不比大河之上但闢百餘歩即可以通水三分既永為京師之福又減河北屢決之害兼水勢既巳牽動在於回河尤為順便非獨孫村之功可成澶州故道亦有自然可復之理望出臣前章面詔大臣與本監及知水事者按地形水勢具圖以聞不報至五年十月癸已乃詔𨗳河水入汴宋史河渠志汴河舊厎有石板石人以記其地里每歲興夫開𨗳至石板石人以為則歲有常役民未嘗病之而水行地中京師内外有八水口泄水入汴故京師雖大雨無復水患昔人之畫善矣偶張君平論京畿南京宿亳陳潁蔡等州積水以南京言之自南門二隄直抵東西二橋左右皆瀦澤也漁舠鳴榔如江湖君平請權借汴夫三年通泄積水於是諸郡守令等始帶溝洫河道三年而奏功凡瀦積之地為良田自是汴河夫借充他役而不復開𨗳至元祐五年實七十年又舊河並以木岸後人止用土筏棧子謂之外添裏補河身奔兊即外補之故河日加淺而水行地上矣宋王鞏聞見近録臨安運河在城中者日納潮水沙泥渾濁一汛一淤比屋之民委棄草壤因循填塞元祐中守臣蘇軾奏謂熙寧中通判杭州時父老皆云苦運河淤塞率三五年常一開濬不特勞役兵民而運河自州前至北郭穿闤闠中蓋十四五里每將興工市肆洶動公私騷然自胥吏壕砦兵級等皆能恐喝人戸或云當於某處置土某處過泥水則居者皆有失業之憂既得重賂又轉而之他及工役既畢則房廊邸舎作踐狼籍園圃隙地例成丘阜積雨蕩濯復入河中居民患厭未易悉數若三五年失開則公私壅滯以尺寸水行數百斛舟人牛力盡跬歩千里雖監司使命有數日不能出郭者詢其所以頻開屢塞之由皆云龍山浙江兩間泥沙渾濁積日稍久便及四五尺其勢當然不足怪也尋剗刷捍江兵士及諸色廂軍得一千人七月之間開濬茅山鹽橋二河各十餘里皆有水八尺自是公私舟船通利三十年以來開河未有若此深快者然潮水日至淤塞猶昔則三五年間前功復棄今於鈐轄司前置一牐每遇潮上則暫閉此牐候潮平水清復開則河過闤闠中者永無潮水淤塞開淘騷擾之患詔從其請民甚便之宋史河渠志軾徙揚州舊發運司主東南漕法聽操舟者私載貨物征商不得留難故操舟者輒富厚以官舟為家補其弊漏且周船夫之乏故所載率皆速達無虞近歲一切禁而不許故舟弊人困多盜所載以濟饑寒公私皆病軾請復舊從之宋史蘇軾傳時元祐七年宋哲宗紹聖元年帝親政復召宋用臣赴闕七月辛丑廣武埽危急壬寅帝語輔臣埽去洛河不逺須防漲溢下灌京師明日乃詔都水監丞馮忱之相度築攔水簽堤丁已帝諭執政曰河埽久不修昨日報洛水又大溢注於河若廣武埽壞河洛為一則清汴不通矣京都漕運殊可憂宜亟命呉安持王宗望同力督作茍得不壞過此須圖久計丙寅呉安持言廣武第一埽危急決口與清汴絶近縁洛河之南去廣武山千餘歩地形稍髙自鞏縣東七里店至今洛口不滿十里可以别開新河𨗳洛水近南行流地里至少用功甚微詔安持等再按視之十一月李偉言清汴𨗳温洛貫京都下通淮泗為萬世利自元祐以來屢危急而今嵗特甚臣相視武濟山以下二十里名神尾山乃廣武埽首所起約置刺堰三里餘就武濟河下尾廢堤枯河基址増修疏𨗳回截河勢東北行留舊埽作遥堤可以紓清汴下注京城之患詔宋用臣陳祐甫覆按以聞十二月甲午戸部尚書蔡京言本部歲計皆藉東南漕運今年上供物至者十無二三而汴口巳閉臣責問提舉汴河堤岸司楊琰乃稱自元豐二年至元祐初八年之間未嘗塞也詔依元豐條例明年正月庚戌用臣言元豐間四月𨗳洛通汴六月放水四時行流不絶遇冬有凍即督沿河官吏伐冰通流自元祐二年冬深輙閉塞致河流涸竭殊失開𨗳清汴本意今欲卜日伐冰放水歸河永不閉塞及凍解止將京西五斗門減放以節水勢如惠民河行流自無壅遏之患從之宋史河渠志是年洛水溢宋史哲宗本紀宋哲宗紹聖二年詔武進丹陽丹徒縣界沿河堤岸及石䃮石木溝並委令佐檢察修䕶勸誘食利人戸修葺任滿稽其勤惰而賞罸之從工部之請也宋史河渠志宋哲宗紹聖三年正月戊申詔提舉河北西路常平李仲罷歸吏部仲在元祐中提舉氾水輦運建言西京鞏縣河縣氾水河隂縣界乃沿黄河地分北有太行南有廣武二山自古河流兩山之間乃緣禹跡昨自宋用臣創置𨗳洛清汴於黄河沙灘上節次創置廣雄武等堤埽到今十餘年間屢經危急况諸埽在京城之上若不别為之計患起不測思之寒心今如棄去諸埽開展河道講究興復元豐二年以前防河事不惟省歲費寛民力河流且無壅遏決溢之患望遣諳河事官相視施行又乞復置汴口依舊以黄河水為節約之限罷去清汴牐口四月河北都轉運使呉安持奏大河東流御河復出詔委前都水丞李仲提舉開導宋史河渠志宋哲宗紹聖四年閏二月楊琰乞依元豐例減放洛水入京西界大白龍坑及三十六陂充水匱以助汴河行運詔賈種民同琰相度合占頃畆及所用功力以聞四月水部員外郎趙竦請濬十八里河令賈種民相度吕梁百歩洪添移水磨詔發運并轉運司同視利害以聞五月乙亥都提舉汴河堤岸賈種民言元豐改汴口為洛口名汴河為清汴者凡以取水於洛也復匱清水以備淺澀而助行流元祐間却於黄河撥口分引渾水令自澾上流入洛口比之清洛難以調節乞依元豐已修狹河身丈尺深淺檢計物力以復清汴立限修濬通放洛水及依舊置洛斗門通放西河官私舟船從之帝嘗謂知樞宻院事曽布曰先帝作清汴又為天源河蓋有深意元祐中幾廢近賈種民奏若盡復清汴不用濁流乃當世靈長之慶布對曰先帝以天源河為國姓福地此衆人所知何可廢也十二月詔京城内汴河兩岸各留堤面丈有五尺禁公私侵牟宋史河渠志曽孝藴紹聖中管幹發運司糶糴事建言揚之𤓰洲潤之京口常之犇牛易堰為牐以便漕運商賈既成公私便之提舉兩浙常平徙江淮荆湖發運泗州議開直河以避漲溢沙石之害孝藴以淮汴不相接不可成既而工役大集竟成之䇿勲第賞辭不受未幾河果塞召為戸部侍郎宋史曽孝藴傳蘇京紹聖中令丹陽募民重浚練湖易置斗門十數江南通志宋哲宗元符元年正月知潤州王愈建言吕城牐當宜單水入澳灌注牐身以濟舟若舟沓至而力不給許量差牽駕兵卒併力為之監官任滿水無走泄者賞水未應而輙開牐者罸守貳令佐常覺察之詔可二月詔蘇湖秀州凡開治運河港浦溝瀆修疊堤岸開置斗門水堰等許役開江兵卒三月甲寅工部言淮南開河所開修楚州支家河𨗳漣水與淮通賜名通漣河宋史河渠志丙子築熈河通㑹閘宋史哲宗本紀王宗望為江淮發運使楚州沿淮至漣州風濤險舟多溺議者謂開支氏渠引水入運河歲久不決宗望始成之為公私利代呉安持為都水使者宋史王宗望傳宋哲宗元符二年閏九月潤州京口常州犇牛澳牐畢工先是兩浙轉運判官曽孝藴獻澳牐利害因命孝藴提舉興修仍相度立啟閉日限之法宋史河渠志呉居厚為江淮發運使疏支家河道通漕楚海之間賴其利召拜戸部尚書宋史呉居厚傳鄭驤知溧陽縣時議自建康鑿漕渠𨗳太湖以通大江將破數州民田調江浙二十五州丁夫所費百萬計朝廷遣官視可否驤條析利病力止之宋史鄭驤傳宋徽宗崇寧元年二月都水監言惠民河修簽河次下硬堰畢工詔立捕獲盜泄賞是年冬詔侯臨同北外都水丞司開臨清縣壩子口増修御河西堤髙三尺并計度西堤開置斗門決北京恩冀滄州永靜軍積水入御河枯源明年秋黄河漲入御河行流浸大名府館陶縣敗廬舎復用夫七千役二十一萬餘工修西堤三月始畢漲水復壞之宋史河渠志宋徽宗崇寧二年十二月詔淮南開修遇明河自真州宣化鎮江口至泗州淮河口五年畢工宋史河渠志宋徽宗大觀元年夏京畿大水詔工部都水監疏𨗳至於八角鎮宋史五行志秋七月乙酉朔伊洛溢宋史徽宗本紀十二月詔開潩河入蔡河從京畿都轉運使呉擇仁之請也宋史河渠志宋徽宗大觀二年八月詔常潤歲旱河淺留滯運船監司督責濬治徽宗即位以來無大改作汴渠稍湮則浚之大觀中言者論胡師文昨為發運使創開泗州直河及築簽堤阻遏汴水尋復淤澱遂行廢拆然後併役數郡兵夫其間疾苦竄殁無慮數千費錢穀累百萬計狂妄生事誣奏罔功官員冒賞至四十五人師文由是自知州降充宫觀宋史河渠志宋徽宗政和元年十月巳酉詔差水官同京畿監司視蔡河隄防及淤淺者來春併工治之是年知陳州霍端友言陳地汙下久雨則積潦害稼比疏新河八百里而去淮尚逺水不時洩請益開二百里起西華循宛丘入項城以達於淮從之宋史河渠志宋徽宗政和二年七月兵部尚書張閣言錢塘江東距仁和監止及三里北趨赤岸􅝕口二十里運河正出臨平下塘西入蘇秀若失障禦恐他日數十里膏腴平陸皆潰於江下塘田廬莫能自保運河中絶有害漕運詔亟修築之十月都水監丞孟昌齡言開濬含暉門外白溝河開堰放水仍舊通流容佐請於七里河開月河一道分減此水灌溉内中花竹命宋昇措置𨗳引四年十一月畢工宋史河渠志宋徽宗政和四年二月工部言前太平州判官盧宗原請開修自江州至真州古來河道湮塞者凡七處以成運河入浙西一百五十里可避一千六百里大江風濤之患又可就土興築自古江水浸没膏腴田自三百頃至萬頃者凡九所計四萬二千餘頃其三百頃以下者又過之乞依宗原任太平州判官日巳興政和圩田例召人戸自備財力興修詔沈鏻等相度措置宋史河渠志宋徽宗政和五年閏正月詔於恩州北増修御河東堤為治水隄防令京西路差借來年分溝河夫千人赴役於是都水使者孟揆移撥十八埽官兵分地歩修築又取棗强上埽水口以下舊堤所管榆栁為樁木宋史河渠志宋徽宗政和六年八月詔鎮江府傍臨大江無港澳以容舟楫三年間覆溺五百餘艘聞西有舊河可避風濤歲久湮廢宜令發運使濬治宋史河渠志宋徽宗政和十年四月已未尚書省言盧宗原濬江慮成騷擾詔權罷其役趙霖别與差遣宋史河渠志任諒為江淮發運使蔡京破東南轉般漕運法為直達綱應募者率游手亡賴盜用乾没漫不可核人莫敢言諒入對首論之京怒㑹汴泗大水泗州城不没者兩版諒親部卒築堤徙民就髙賑以米粟水退人獲全京誣以為漂溺千計坐削籍歸田里執政或言水災守臣職發運使何罪帝亦知其枉復右文殿修撰陜西都轉運使宋史任諒傳淮向子諲言河髙江淮數丈而京行直達綱以致江運河身髙迄今猶受其害甚矣京之貽禍不淺也行水金鑑巻九十七
