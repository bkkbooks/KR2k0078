body:
  text: 行水金鑑巻一百九江南按察使傅澤洪撰運河水明景帝景泰四年八月辛夘河南按察使僉事劉清奏東南漕舟水淺弗能進可自淮入黄河至滎澤轉入沁河經武陟縣馬曲灣装載岡頭濬一百十九里以通衞河張秋之決由沁水合黄河遂成奔急之勢若引沁水入衞河則張秋無衝決之患矣行人王晏亦言開岡頭置閘分沁水使南入黄河北達衞河水漲即閉閘如此漕運可永無患衞輝稅糧十四萬餘每一石令民出石一尺可得一萬四千餘尺糧一石令挑河二尺可挑一百六十餘里今所濬地不過百三十里免衞輝一府糧可成其事何恤此小費而棄莫大之利也章上詔令總督漕運右僉都御史王竑等覆奏以聞丙午太子太保兼工部尚書石璞得請歸省給事中國盛等劾奏璞奉命往治沙灣未有成效正宜日夜勤勞求副上意乃詐以母老詭辭請去於三過其門不入者異矣宜下法司治罪詔工部移文令璞速赴沙灣毋致誤事九月庚申常州府江隂縣民言本處順塘河長十里許東接永利倉運河西通夏港及揚子江可通舟楫灌溉田畝近為沙土淤塞乞勅巡撫侍郎李敏勘實開通以為民利從之乙丑沙灣之決尚書石璞等鑿一河長三里以避決口上下與運河通其決口亦築攔截今新河運河俱可行船至是以畢工聞工部欲取璞回帝恐不能經久令璞且留處置十月乙酉吏部言太子太保兼工部尚書石璞奏保東昌府推官田峻魚臺縣典史彭旭俱有才能乞各陞一級俾專理修河縁近河府縣已増管河官員難從所保帝曰璞整理河道未見成功惟務濫保官員本當究問但無他故姑恕之十月甲午陞右春坊右諭徳兼翰林院侍講徐有貞為都察院左僉都御史往治沙灣明英宗實録通石尚書以沙灣之決鑿新河以運河俱可行船矣乃奏保一推官一典史各陞一級而不可得奉嚴㫖責其濫保可見當時之慎重名器若此是年二月築沙灣決口功成五月復大決北馬頭河岸四十餘丈運道絶復遣石璞往十月命都御史徐有貞治之始塞乃於開封金龍口筩瓦箱開渠三十里引黄河水東北入漕河以濟運北河續記是年塞沙灣決口更作九堰八閘以制水勢通漕𩔖編先是河溢滎陽自開封城北經曺濮以入運河至兖州沙灣之東隄大洪口而決濟汶諸水皆從之入海㑹通河遂淤漕運艱阻工部尚書石璞侍郎王永和都御史王文相繼治之凡七年皆績弗成乃集廷臣議於文淵閣舉可治水者以有貞名上乃進有貞都察院左僉都御史治之河以決故涸而有貞至方冬月水暴漲公私之艘畢達治河卒踰數萬人悉與之期而遣之乃乗輕航究河源遂踰濟汶至衞沚循大河道濮范還上疏曰臣聞平水土要在知天時地理人事而己盖河自雍而豫出險即平水勢既肆又由豫而兖土益疎水益肆沙灣之東所謂大洪口者適當其衝于是決而奪濟汶入海之路以去諸水從之而洩隄潰渠淤澇則溢旱則涸此漕途所由阻然欲驟堰則潰者益潰淤者益淤今請先疏下流水勢平乃治決決止乃濬淤多為之方以時節宣俾無溢涸必如是而後有成上從之明紀事本末明景帝景泰五年七月癸丑白溝河漲決保定杜村口隄詔有司俟水降修築已已直𨽻揚州府奏六月大風雨湖水泛溢決髙郵寶應隄岸命左副都御史王竑督有司修築之八月戊戌湖南巡按御史張瀾奏先於原武縣黄河東岸開二河合黒洋山舊河道引水濟徐吕二洪今黄河改決而北其新開二河淤塞不通臣恐徐吕乏水有妨漕運請於黒洋山北黄河紆迴之處自其缺口改挑一河以接舊道用灌徐吕其工可二萬人其期可一月完從之九月辛亥先是沁河決武陟馬曲灣隄五百九十餘丈漫流新鄉獲嘉入衞河没民田廬甚衆至是詔有司修築之庚午總督漕運都督徐恭左副都御史王竑言運河膠淺南北軍民糧船蟻聚臨清閘上下者不下萬數盖因黄河上源水塞亦以沙灣缺口未塞而修治者之弗克事也臣唯治理之要有經有權經者常行不易之道權者一時通變之宜以沙灣闕口不可合留之以洩大水之勢經也姑塞沙灣闕口引水注運河以通漕舟權也茍唯常道是執臣見糧船淺凍不惟有誤今嵗之糧来年之計亦必誤矣請敕左僉都御史徐有貞將闕口趂今水小急督工築塞庶不敗事詔是之敕有貞務博詢衆策毋僻守已見有貞言臨清河淺自昔已然非為缺口未塞也亦非臣僻守已見而固欲不塞也竑等不察而以塞闕口為急殊不知秋冬雖僅能閉明年春夏亦必復決勞費徒施而無用此臣所以不敢邀近功也如塞而無患臣雖至愚寧不早為之詔從有貞言糧運亦無阻焉戊寅戸科右給事中何陞言臣往年使河南見衞輝南沁河有漏港今年水溢決已成河商船皆由之往来其臨清屯聚膠淺之舟若令其從漏港出沁河入黄河順流而下不二十日可至淮乞遣官往勘果如臣言即令以卸糧空船從漏港試其險易庶事有變通船無阻滯章入詔不必遣官其令都御史王竑徐有貞理之十月丁亥工部奏近聞儀真𤓰洲二壩每遇冬春潮水退縮之時往来舟船膠淺難行宜於二壩下各置閘於潮水漲時閉閘蓄水用通舟船從之辛夘先是行人王晏請疏沁河漕運詔以其事㢘問於有司及鄰河故老皆言弗利至是晏復備陳地勢水性之宜以質㢘報之非帝命工部㑹文武臣議少傅兼太子太師吏部尚書王直等言地形水勢非可遥度宜遣官往彼相度利害詢知衆議必惬乎公無患於後或如晏言或外有長策奏報區處詔是之命工部右侍郎趙榮同晏往既而榮亦言弗利請治晏罪詔宥之十一月辛亥詔修南京河口隄岸丙子左僉都御史徐有貞言沙灣治河三策一置造水門臣聞水之性可使之通流不可使之堙塞昔禹鑿龍門闢伊闕無非為疏導計故漢武之堙瓠子終弗成功漢明之疏汴渠逾年著績此其明驗也世之言治水者雖多獨樂浪王景所述著水門之法可取盖沙灣地土皆沙易致坍決故作壩作閘皆非善計臣請依景法為之而加損益於其間置門於水而實其底令髙長水五尺水小則可拘之以濟運河水大則疏之使趨於海如是則有流通之利無堙塞之患矣一開分水河凡水勢大者宜分小者宜合分以去其害合以取其利今黄河之勢大故恒衝決運河之勢小故恒乾淺必分黄河水合運河則可去其害而取其利請相黄河地形水勢於可分之處開成廣濟河一道下穿濮陽博陵二泊及舊沙河二十餘里上連東西影牆及小嶺等地又數十餘里其内則有古大金隄可倚以為固其外則有八百里梁山泊可恃以為泄至於新置二閘亦堅牢可以宣節之使黄河水大不至泛溢為害小亦不至乾淺以阻漕運一挑浚運河臣唯水行地中避髙趨卑勢莫能遏故河道深則能蓄水淺則弗能今運河自永樂間尚書宋禮即㑹通河浚之其深三丈其水丈餘但以流沙恒多淤塞後平江伯陳瑄為設淺舖又督軍丁兼挑故常疏通久乃廢弛而河沙益淤不已漸至淺狹今之河底乃與昔之岸平其視鹽河上下固懸絶上比黄河来處亦差丈餘下比衞河接處亦差數尺所以取水則難走水則易誠宜浚之如舊章入詔工部移文詣有貞使即如其言行之明英宗實録治河時有撓其議者曰不能塞河令不為患而開之令為患耶上遣中使問有貞貞出二壺一竅五竅者各一注水而並瀉之五竅者先涸於是使者曉然知疏策之為良也歸報命而議決於是有貞作治水閘疏水渠渠起張秋金隄西南行九里至濮陽濼經博陵夀張沙河至東西影堂渠成賜名廣濟凡河流之旁有不順者堰之堰有九長袤皆至萬丈架濤截流柵朩落竹以石實之而鍵以鐵曰合土朩石金平水性也又作放水閘於東昌龍灣魏灣閘有八度水盈過丈則洩皆通古河以入海上制其原下放其流既節且宣用平水道當是時蠲瀕河民牧馬庸役以專力河防役丁夫五萬八千決口始塞復於開封金龍口銅瓦箱等處開渠二十里引河水濟運事不中制役以有成南河全考景泰五年甲戌陳泰遷左僉都御史疏理徐州吕梁二洪及運河明史稿明景帝景泰六年二月壬午工部右侍郎趙榮奏先奉敕㑹山東河南三司相度河道榮發身不由科目衆或慢之榮含怒以山東三司正官不親至委官後期辱詈之又以其委官不即遣人探河水淺深自攝衣涉水探之以所過有司供需稍不謹輒杖之山東三司都指揮王信左布政使龔理按察使劉孜及其委官署都指揮陳忠參議梅森僉事胡鼎等因各上章言榮單馬馳走軍民驚疑杖傷縣官鬻廩米於民多取直等狀巡撫尚書薛希璉巡按御史張琛亦以聞帝命左僉都御史徐有貞覆之具得其情事下法司議榮辱詈三司自探河水雖若失大體然終為急於國事鬻米乃辦事官為之榮失於鈐束信等輒敢侮榮如兒戯誣榮為風顛搆造危言抗拒敇㫖宜命錦衣衞執之明正其罪希璉及琛符同信等奏榮亦宜附過奏入帝曰此輩以私忿相訐奏本當究問但時方用工河道恐益稽慢榮置不問信等令巡按御史責取招状俾悉心修理務期成功若再誤事不宥壬寅湖廣華容縣醫學訓科王正中言本縣民嵗運京儲皆經行洞庭湖春夏水漲人多被溺秋冬水涸舟復不通往返搬運勞苦萬狀臣見附近有河一道昔晉杜預所開者但淤淺少水乞敇有司於農間之日督率工役如舊疏浚使運船悉由此達大江之京倉實為民便帝命工部移文有司視其果利無害而後為之三月已已先是帝諭工部臣曰國家重務在漕運今裏河自沙灣抵臨清皆淤塞不通爾工部其集文武議其疏治方畧以聞於是太子少師工部尚書江淵㑹同五府六部官議言運河之阻在疏浚之而已但今山東河南人力巳罷且農事伊始難起夫役請将在京存操步隊官軍五萬人敇内臣及文武大臣各一人往同僉都御史徐有貞計度疏浚期明年二月興工四月可畢其器具乞量給銀兩令自置之仍先敇河南山東有司預積物料蓄軍糧以待帝遂敇有貞集河南山東殷實餘夫民壯各一萬人先治之有貞言宜以漸疏浚工力相繼若官軍一動糧儲銀兩輒有千萬之費遇水漲則復坐費無所施智今泄口已合決隄已堅挑河者已如命用工臣請仍舊例置撈淺夫唯用沿河州縣之民免其徭役牧養之事使專事於此付管河官督領役小則量數起之役大則舉戸皆行其非近河之人皆休放使力農如此將逺者得安生業近者甘事河道不久利無弊者吾未之信也帝以為然工部之議遂寢五月辛亥左僉都御史徐有貞奏運河疏濬功成帝謂工部曰河雖暫通恐不能久其移文有貞尚宜督沿河夫役以時挑浚勿致阻滯舟船七月乙亥築沙灣決口成沙灣之決垂十年至是㑹黄河南流入淮左僉都御史徐有貞始克奏功凡費朩鐵竹石等物累數萬計工五百五十五日帝以河道雖完尚恐未堅命有貞明年春仍往視之丙戌命修直𨽻容城縣白溝河杜村口及固安縣楊家等口決隄八月丁已管河主事李蕃奏初為徐吕二洪水淺鑿陽武脾沙岡引黄河之水然後舟楫流通近又見起夫浚封丘縣新集等處分脾沙岡水以濟沙灣縁脾沙岡水微細不能兼濟二處恐沙灣得水而徐吕乾澀得一失一非計之善况新集地髙費用頗多乞敇左僉都御史徐有貞等量度處置從之九月戊子右僉都御史陳泰奉敇督浚儀真𤓰洲江都髙郵寶應及淮安一帶河道至是以工完上聞凡浚河一百八十里築決口九處壩三座役人夫六萬餘十二月甲寅復命左僉都御史徐有貞巡視沙灣戊午免徵沿河濟寧等十三州縣修河民所負官馬并雜科役以左僉都御史徐有貞奏力役方勤不宜并取故也丁夘挑通濟河西岸沙灘及築東岸缺隄明英宗實録陸瑜為山東右布政河決張秋朝命僉都御史徐有貞塞之委公督其役時工匠集者數萬為設方畧編荆為筐實以土石沈而築之水患遂息尋轉左何喬新撰刑部尚書康僖陸公神道碑明景帝景泰七年九月戊辰朔以右僉都御史陳泰巡撫南直𨽻蘇松等處時在揚州疏濬河道巡撫鄒来學卒戸部以聞故命泰代之辛已左僉都御史徐有貞奏京畿及山東自七月大雨至八月諸河水溢雖髙阜亦有丈餘隄岸衝決民田廬淹没商船漂溺者無算幸新造水門一帶隄堰無患其衝決不甚害者臣已率有司督工修理唯感應祠舊隄所決既大所係尤要必置禦水埽如水門埽堰之制仍於濟寧抵臨清増置減水閘始可經久其修築人夫乞免他徭仍人給口糧庶易成績帝是之仍敕有貞等督軍衛有司措置物料務在堅完勿遺後患十二月癸夘陞徐有貞為左副都御史有貞以修河竣事回京入見帝顧問良久奨勞甚至因命吏部特陞之明英宗實録是年僉都御史徐有貞治河功成先是有貞疏上既報可乃鳩工而前所遣卒亦依期至乃為渠以疏之中置閘以節宣之渠起金隄張秋之首西南行九里至濮陽濼又九里至博陵坡又六里至夀張沙河又八里至東西影塘又十有五里至白嶺灣又三里至李􅕞由李􅕞而上又二十里至蓮花池又三十里至大瀦潭乃踰范暨濮又上而西凡數百里經澶淵以接河沁有貞曰河沁之水過則害微則利乃節其過而導其微用平水勢既成渠名廣濟閘名通源渠有分合而閘有上下凡河流之旁出而不順者則堰之堰有九長各萬丈九堰既設水遂不東衝沙灣而更北出濟漕渠阿西鄄東曹南鄆北出沮洳而資灌溉者為田百數千萬頃凡堰楗以水門繚以虹隄堰之崇三十餘尺其厚什之長百之門之廣三十六丈厚倍之隄之厚如門崇如堰長倍之架濤截流柵朩絡竹實之石而楗以鐵盖合五行用平水性而導汶泗之原出諸山滙澶濮之流納諸澤又濬漕渠出沙灣北至臨清凡二百四十里南至濟寧凡三百一十里復建閘於東昌之龍灣魏灣者八積水過丈則開而洩之皆道古河以入於海用平水道初議者欲棄渠勿治而由河沁及海以漕又欲出京軍疏河有貞因奏蠲瀕河民馬牧庸役專力河防以省軍費紓民力工部請如有貞言不中制以是得有功盖三年而告成進副都御史明紀事本末徐有貞字元玉初名珵吳人宣徳八年進士景泰三年遷右諭徳河決沙灣七載前後治者皆無功廷臣共舉有貞乃擢左僉都御史治之至張秋相度水勢條上三策一置水門一開支河一濬運河議既定督漕都御史王竑以漕渠淤淺滯運艘請急塞決口帝敇有貞如竑議有貞守便宜言臨清河淺舊矣非因決口未塞也漕臣但知塞決口為急不知秋冬雖塞来春必復決徒勞無益臣不敢邀近功詔從其言有貞於是大集民夫躬親督率閱五百五十日而工成方工之未成也帝以轉漕為急命廷臣議方畧工部尚書江淵等請遣中官偕文武大臣督京軍五萬人往助役期三月畢工有貞言京軍一出日費不貲遇漲則束手坐視無所施力今泄口已合決隄已堅但用沿河民夫自足集事廷議遂寝事竣召還佐院事帝厚勞之復出巡視漕河濟寧十三州縣河夫多負官馬及他襍辦所司趣之亟有貞為言免之七年秋山東大水河隄多壊惟有貞所築如故有貞乃修舊隄決口自臨清抵濟寧各置減水閘水患悉平還朝帝召見奬勞有加進左副都御史明史稿武功在張秋治水久未就功問於王尚書来尚書曰分水勢尋水源武功於是先開數渠引水散為各支流去而時或泛濫其害終在再三求源發處不得乃投以物使人離數十里候之物復浮出如是者數處武功曰水流則不受物源不在是再投之一處不浮曰此乃真水源也以百計塞之皆莫效下以土石若無者聞一僧有道武功就往謁之問術僧不肯言强之但曰聖人無欲武功歸思而不得數日忽悟曰此下殆有龍窟龍所欲者珠也吾能使之去於是鑄長鐵柱洞釡底貫而下焉水始受塞不踰時遂成平陸盖鐵汁能蝕珠龍愛珠故去也武功時時為人道之楊循吉蘇談明英宗天順元年十二月丁已尚寶司少卿凌信奏江南運糧者泛大江至𤓰洲壩有風浪之險宜從鎮江府裏河而裏河自新港至奔牛一百六十餘里河道淺狹又有三壩大船不利車盤七里港口又有金山横阻江水不得入以故糧船多冒險損壊宜通七里港口引江水灌入濬新港至奔牛一帶為便奏下工部覆奏宜令管理糧儲河道官僉都御史李秉及郎中沈彬提調附近有司通濬從之明英宗實録是年令總兵官兼理河道明㑹典明英宗天順二年三月癸丑管河主事陳湊奏濟寧州濟安閘水勢陡峻損壊船隻可移入二十餘步其舊閘岸改砌月様以順水性令不得撞激上命所司勘實移之十二月已已先是直𨽻大河衞百戸閔恭奏南京並直𨽻各衞嵗運薊州等衞倉糧三十萬石駕船三百五十隻用旗軍六千三百人越大海七十餘里風濤險惡滯流旬月及有順風開船行至中途忽爾又值風變人船糧米多被沈溺實非漕運之便臣見新開沽河北望薊州正與水套沽河相對止有四十餘里河徑水深堪行舟楫但其間十里之地阻隔若挑通之由此儹運則海濤之患可免雖勞人力於一時實千百年之計也事下工部請移文鎮守薊州總兵巡按直𨽻御史勘其利否至是都督僉事宗勝監察御史李敏皆報恭言善其河應挑闊五丈深一丈五尺於附近天津永平薊州寶坻等衞府州縣發一萬人夫委官督領俟明年春和農暇之日興工然各處軍民艱辛者多宜一月人與行糧三斗仍官給器具庶無勞損而功易成從之明英宗實録崔恭天順二年遷右副都御史巡撫蘇松諸府與都督徐公浚儀真􅈇河又浚常鎮河避江險已大治吳淞江起崑山夏界口至上海白鶴江又自白鶴江至嘉定卞家渡迄荘家涇凡浚萬四千二百餘丈又浚曺家港蒲匯塘新涇諸水民賴其利明史稿林鶚天順初知鎮江府漕故經孟瀆險甚巡撫崔恭議鑿河自七里港引金山上流通丹陽避之鶚言道里逺多石且壊民廬墓請按京口閘甘露壩故迹浚之令通舟春夏啓閘秋冬度壩功力省便恭從其議遂為永利明史稿明英宗天順三年四月辛已工部奏國家大計莫先於糧運今聞自通州以南直抵揚州河道膠淺糧運難行宜馳文於管河道官令量起附近衞所府州縣軍民設法疏濬其水塘泉源亦宜疏通以濟運河從之明英宗實録天順三年戸部尚書楊鼎上言阿拉齊住牧河套數入冦掠費用浩繁凡銀兩引鹽收馬徵運之法盡行尚為未足又起預徵之例民困財竭所不忍言惟黄河乃漢唐漕運河即今鹽船朩筏往来不絶其間雖有三門析津之險而古人倒倉之法為當三門之上有小河徑通延綏如以所運糧草各貯水次遡流儹運庶幾軍餉可足民力亦蘇或摘漕糧數千石赴陜就令教習山西陜西河南之人待舟楫通後乃許迴運且可順帶解鹽數十萬以充淮課則國利有増矣詔從之後阻不行然倪岳許論嘗欲通舟河漕渭轉􅈇邊鎮要皆經史所載非鑿空之說也陜西通志行水金鑑巻一百九
