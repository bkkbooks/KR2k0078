body:
  text: 行水金鑑巻一百十三江南按察使傅澤洪撰運河水明世宗嘉靖二年三月庚戌御史向信言大通橋至張家灣舊有廣利等八閘今宜修復以紓民陸輓之苦又濟寧至臨清在在有淺而長溝靳家口尤甚宜於兩處建閘以時蓄洩工部議行河道侍郎相度以聞從之五月丁亥總理河道侍郎李瓚以天旱水澀漕舟不通自劾乞休不允庚寅儀真江都二縣有官塘五區築閘蓄水以溉民田後豪民規以為業古蹟廢壞真揚之間運道梗阻御史秦鉞請浚之部覆得旨命總理河道侍郎及管河郎中相視修築占種盜決者處以重法仍追地租入官十二月辛丑裁革湖陵沽頭金溝謝溝新興黄家等八閘官吏量存溜夫添設長溝淺靳家口閘明世宗實録明世宗嘉靖三年春正月戊子把總運糧指揮使劉翺乞挑濬海口新河以便漕運工部覆議從之十二月壬寅總理河道侍郎李瓚言前年河決安平故開北河以殺水勢中間建閘四淺舖二十設閘官四員閘夫二百二十名淺舖夫二百名今河歸故漕前項官夫並宜裁省工部覆議從之明世宗實錄士瓚字宗器濮州人𢎞治丙辰進厯户部尚書提督倉塲明世宗嘉靖五年六月丁夘工部郎中陳毓賢言揚州寳應縣汜光湖為糧運必由之路湖四面甚廣水勢瀰漫僅以三尺之隄障之一旦積雨水發則横奔衝決不惟阻糧運而河隄以東田土俱成巨浸此第一患也臣以為障水固所當先洩水亦不可緩請於河隄以東修築月河以分水勢如工費浩繁財力有限則請自淮安而下自寳應至髙郵建平閘數處以洩其流亦中䇿也得旨令治河都御史章拯督漕都御史髙友璣會議相度果開築月河有益即定計為之毋惜小費明世宗實錄是年御史戴金請濬隄下久壅河道按子嬰溝接潼河下廣洋湖長沙溝通官莊亦入廣洋湖劉家溝通瓦溝溪望直溝出官河三里溝通七里溝出葛頭溝寳應縣東門外起至流星溝君師廟起至章思蕩葛頭溝起至射陽湖以便泄水以通舟楫南河全考子嬰溝在寳應縣南六十里子嬰舖北西通運河北接潼河潼河在縣東南六十里西南接子嬰溝東北入廣洋湖廣洋湖在縣東南五十里射陽湖在縣東六十里即射陂也自固晉至喻口白沙入海湖西至固晉屬山陽東至上射陽屬寳應明世宗嘉靖六年三月庚辰漕運都御史髙友璣疏言徐邳下至清河乃運道所經實北南喉襟要地頃年以來黄河泛溢地方遭患民不聊生近日沛縣官河流沙壅漲船隻難通該御史等官戴金等奏稱黄河入淮之道有三渦河白河二道為上源年久陻塞其水併入汴河是以徐州之南獨受其患若小壩至宿遷小河一帶并賈魯河鴛鴦口文家集壅塞去處逐一挑浚則趨進之水不止而徐州水患可以少殺十月戊午御史呉仲言通州運河元時郭守敬創建已有明效先朝漕運名臣平江伯陳鋭等亦累以為請今通流等八閘遺跡尚存原設官夫具在因而成之為力甚易而權勢罔利之家從中撓之或倡風水之說或謂絶灣民之利皆不足信誠令閘運歳可省脚價二十餘萬又漢唐宋時漕皆從汴渭直達京師未有貯國儲於五十里之外者今令京軍支糧通州率稱不便而密雲諸處皆有間道可通設敵因鄉導輕騎疾馳旋日可至燒燬倉庾則國儲一空京師坐困此非細故請以臣言下户工二部定議修浚僦舟夫畧運百萬試之與陸運兼行竢次第就渠徑達京倉此興無窮之利而杜不測之虞於計便上曰疏濬閘河誠轉漕便計自永樂以來屢議修復因大小臣工不肯實心任事以致因循至今為奸人嗜利者所阻今轉輸日煩軍民交敝茍有息肩之䇿何憚紛更户工二部其各委堂上官一員會通運官及御史吳仲等親行相度地形計處工力以聞若大事可成則勞費不足計國計有補則浮言不足恤如有奸豪阻議之人聼厰衛緝治如律因命户部侍郎王軏工部侍郎何詔及御史吳仲等董其事至是軏等言地形從大通橋至白河髙可六丈若大興工浚之深至七丈通引白河則漕船可直達京城諸閘可盡罷此永久之利然未易議也為今之計惟應修浚河閘然從通流閘經二水門南浦土橋廣利三閘皆衢市闤闠中不便轉般從温泥河濱舊小河廢壩西不一里至堰水小壩誠修築之令通普濟閘則徑易可省四閘兩闗轉般之難閘壩皆宜添設官吏人夫守視臣等竊計修閘浚渠築壩之費當用銀一萬五閘置船各六十一船日運糧萬石造船之費可一萬五百通漕糧二百三十萬石歳脚價可十萬三千五百若糧多船少聽以車轉水陸并進通運事易竣亦可早還宜令户工二部各舉屬官一人兵部推都指揮一人充叅將專司修理轉運諸務會同巡倉御史各奉敕行事募軍餘萬人作之務在堅久毎閘壩合置公廨其費取之修倉餘銀巡倉贓罰及所省脚價其朩石等取之各厰又言通州京輔重地軍民坌集亦當積蓄以安人心不宜過慮自起驚疑河源自西山經流大内至大通橋或旱澇乾溢啓閉通塞亦非外人所能與候上裁擇時上意已決命户工二部亟如所擬舉行即於今冬具儲工料以來春興工仍敕諸臣協心共事勿偏執異同致妨經國大計壬寅總理河道侍郎章拯言西水支流原自豐縣漫溢至沛横貫運河衝決隄岸其勢徑趨昭陽湖以此運河南流勢緩停淤沙泥㡬與岸平今故道疏築已通而東岸勢卑土疏善崩秋水泛漲恐復淤決乞僉復蕭碭原額淺夫專令在沛時常防守仍令徐州管河判官督同沛縣主簿閘官往來閱視隨宜疏築凡遇秋水時至徐州管洪主事量調徐吕二洪夫役協力修濬其管河等官有能平治得宜三年無患者超格賞擢工部覆奏從之十一月乙亥朔禮部尚書桂萼上疏稱修通惠河不便請改修三里河上以其疏下大學士楊一清張璁擬票一清言通惠河因舊閘行轉搬之法可以省運軍之力宜斷行之勿為浮言所阻璁亦言通州河道經元郭守敬修濬今閘壩俱存臣聞京城至通州五十里地形髙下纔五十尺以五十里之逺近攤五十尺之髙下無所不可誠濬甕山源以蓄諸山水引神山泉以合下流之歸迂回以順其地形因時以謹其濬治此一勞永逸計也成化十二年平江伯陳銳建議開修此河憲宗皇帝命大臣督理而河道已通運船已至城外適有黒眚之異惑於訛言遂止識者恨之今欲開修此河因仍舊道誠易易耳況一舟之運約當十車每年運船已到則令剥運新糧未到則令剥運通州積糧庶京師充實永無意外之患矣至桂萼所論開修三里河則費廣而見効難非直有地理之忌而已也上深然璁言因諭一清曰覽卿疏具見忠愛朕居深宫外面事情何由得知卿輔導元臣正當直説庶不失政事萼所奏必有惑言伊輒聼信不但誤了朝廷之事亦失了大臣謀國之意彼疏朕看數遍亦知不可欲直拒之非待大臣之禮故諭卿等票來行意在其中矣我孝宗伯考時巳命整理開修此河不意當時黑眚為異夫黑眚之起非為修河蓋灣裏住的鄉民正恐失利乘此為言俗叫為嘛唬卒被破事當時若有一識事剛正之臣告我伯考曰黑眚之異原非修河道所招奸詐之徒乘機營利惑及愚民不可墮其詐計伏惟剛斷而行之如此伯考豈無聰察哉前日勘官回奏停當已有旨待春暖興工朕亦恐有言者左說破事而萼即為首也夫萼與璁替臣有所不逮功為等也若論識時利達事體則萼以十不及璁二三也朕欲降一密旨與萼云昨卿奏開河一疏足見謀國至意但前已有旨了況先朝亦有成算不必改議恐起營利者擾事卿疏朕留覽未知可否復與卿計一清言聖裁允當遂命如前旨𫝊行濬天津海口新河明世宗實錄是年漕運都御史髙友璣於𤓰洲西江嘴置𤓰口閘時監工者不慎致工人受賂築砌不如法鎮人復倡為泄水之説閘竟不用南河全考濟寧河溢公總埋河道欲疏支流殺悍猛築長隄防衝潰然後浚曹沛自無淤阻費十萬緍可足考據精詳與喜事臣議弗協天旱公禱泰山既降甘雨寧陽泉忽湧數尺南旺膠舟乃行工部請别遣重臣特陞公本部右侍郎兼僉都御史於是白河孫家渡工始興明年夏潦驟發公以人言乞罷廷推盛公應期代之迎合無成復代潘公希曽如公議乃厎績王大用撰工部尚書朴菴章公墓志章公拯也明世宗嘉靖七年正月乙酉河道都御史盛應期言沛縣迤北河道地形庫下泥沙易集以故累濬累塞今詢之官民盛稱昭陽河東自北進汪家口南出留城口約長一百四十餘里可改運河北引運河之水東引山下之泉内設蓄水閘旁設通水門及減水壩以時節縮較之挑濬舊河勞逸逺近且可為永久之利計用夫六萬五千人於山東南北直隸相近府分徵調仍量行僱募用銀二十萬兩有奇取之兩淮鹽價而以山東官帑所貯佐之期六月而畢章下廷臣雜議皆言應期議是上乃命應期及春和督官興事且誡各巡撫等官同心協力共成大功應期請乞管河郎中柯維熊員外王大化於趙皮寨孫家渡南北溜溝等處役工挑濬以殺上流之勢武城迤西至沛縣迤南修築長堤以防北潰之虞俱從之四月庚午吏部等衙門尚書桂蕚等以修省會議條陳十二事一言近以運河淤塞邊報嚴急議遣大臣提督勞費特甚宜並取還邊墻諸務止令守邊官計處俟年豐舉行新河夫盡數歸農而以河南山東京操班軍暫借一季免其赴京分遣修築六月乙已御史吳仲郎中何棟尹嗣忠都指揮陳璠奉敕開濬通惠河成仲等因疏五事一時疏濬以通運道言大通橋起至通州石壩四十里地勢髙下四丈有餘中設慶豐等五閘蓄水今巳通運然地勢􅈝峻土皆流沙夏秋大雨河流暴漲衝決淤塞所宜預處請行管閘主事坐守閘壩往來巡視一遇衝塞隨即挑築晝夜撥守毋致盜決仍將閘運扣省脚價銀内毎歳量支千兩寄通州庫隨便興工如不足仍聽奏討一專委任以責成效言大通閘河止設主事一員又兼他務不無妨廢請令住劄通州專理河道通州添設管河同知或判官一員所管起大通橋盡鮮魚閘合用錢糧歳支扣省脚價凡應行事宜及委用官員悉聼管閘主事處分仍敕户部歳三月初旬遣郎中或員外一員奉敕住通州㑹巡倉御史沿河往來催儹天津以北糧運驗算輕賫銀兩待運完日造冊奏繳一改閘座以防水患言夏秋久雨西山水發皆由閘河東流閘門隘小水泄不及遂至泛漲衝決堤壩此出不測非人可為原議障水石壩今巳修成又通流閘在通州城中市井環繞積水丈餘又西水闗久浸水中俱非長便舊有慶豐上閘平津中閘今已不用拆運通州西水闗外創造石閘一座將前石壩南移二十餘丈改造石閘一座平時閉板水落啟洩疏入上以運河先朝屢經勘議未得成功仲等僅四閱月而就緒嘉其勤勞命科道官查驗行賞所條事宜部議亦稱便上悉從其所言壬子御史吳仲言通惠閘河成功不易持久為難請留原差工部郎中何棟督理三歳一更聽動支餘銀扣省脚費僱倩軍民夫役挑濬上流改造閘座嚴防山水泛漲法禁盜決河防隨船帶石包岸逐年栽栁䕶堤填墊橋道補蓋厰房修艌剥船及兼理天津一帶河道又各河道俱設有司水利官請於近地所屬勤敏者改陞一人或同知或判官填註通州專管河道其督運户部郎中尹嗣忠請如侍郎王軏疏仍留坐守催督終始其事以後不必專設率歳二月請差郎中或員外一人奉敕前去會同工部郎中巡倉御史督運完日回京及將來剥船編入漕司必須設官專管方為久計疏下戸工二部覆如其議上曰然河工方就計非親其事者不可責成何棟令住劄通州往來督理及天津一帶軍衛有司官事干河道俱聼委用毋得阻撓歳滿勞著陞改職銜照舊行事吳仲仍提督京通等倉兼督理通惠河與何棟尹嗣忠陳璠等協心共濟尹嗣忠督運糧回部歳差如議改軍自運及添設專官俟漕運會議具奏七月庚辰總理河道都御史盛應期疏濬昭陽湖東一帶新河工已及半會旱災修省言者多謂新河之開非計詔罷其役併罷諸治河官應期請俟秋深果舊河通流則巳如仍有阻礙須終新河之功為經久利户部請從之且言河道總理官不可罷得旨應期回京别用另選忠誠才望大臣代之竟罷新河之役九月庚午朔罷總督河道右都御史盛應期管河郎中柯維熊俱冠帶閒住初應期奏開新河維熊賛之甚力朝議罷役應期請緩一月毋停工保其終事維熊復甚言其不便應期亦上疏自理部議兩罷之應期果毅任事旣奏開新河因謬議紛起欲急於成功以杜衆口遂以嚴急興怨功未成而罷然其所開新河後三十餘年卒循其遺跡疏之運道至今蒙利不淺也已夘刑部尚書胡世寧疏言新河之議首倡自臣既而盛應期先因僉事江良材具疏偶與臣合遂爾奏報為國家興莫大之利第初議限以六月而應期勇於集事功僅四月巳十成八九遂致官吏嚴急怨讟煩興朝議以安人心為重亟止其事尋命應期與維熊同罷彼維熊之反覆變詐陰陷大臣私誤國事其罪當不止此至於應期平日執性過嚴所至物情不協非遇寛大之朝不止罷黜之罪今得此非不幸也但自古國家毎僨大事必追責首議之人應期祗因臣妄言新河之謬得罪以去則是不惟誤彼徒費工力而使後任事之臣盡以應期為戒皆臣一言之所致也請與應期同罷或更加重擬或薄示降調使天下後世皆知我皇上馭臣賞罰之公愚臣死不敢欺之義上報曰覽卿所奏巳悉至情但應期受命治河委任非人督責過嚴以致怨聲載道不能無罪業已處分矣卿宜安心供事不必引咎自責明世宗實錄是年春正月鑿新漕不成先是河決曹單城武陽家口梁靖口吳士舉庄衝雞鳴臺沛北皆為巨浸東溢逾漕入昭陽湖沙泥聚壅運道大阻刑部尚書胡世寧上言運道之塞河流致之也請先述治河之説河自經汴以來南分二道其一出滎澤經中牟陳潁至壽州入淮其一出祥符經陳留雎亳至懷逺入淮其東道一道自歸徳宿虹出宿遷其分北新舊五道一自長垣曹鄆出陽榖一自曹州雙河口出魚臺塌塲一自儀封出徐州小浮橋一出沛縣飛雲橋一出徐沛之間境山之北溜溝此六者皆入漕渠而南匯於淮而今且湮塞矣止存沛縣一河勢合岸狹不得不隘所以豐沛徐州漫為巨浸溢入沛北之昭陽湖以致運道壅􅌎然壅淤既久勢必復決決而東南有山限隔其禍小決而東北前宋澶州之決郡縣數十皆灌禍不可言矣故今治河當因故道而分其勢也其陽榖魚臺二道勢近東北不可復開而汴西滎澤孫家渡至壽州一道決宜常濬以分上流之勢自汴東南源出懐逺宿遷小浮橋溜溝四道宜擇其便利者開濬一道以分下流之勢或恐豐沛漫流久而北徙欲修武城以南廢隄至於沛縣之北廟道口以塞新決而防其北流此亦一計也至於運道臣與李承勲同行擬議莫若於昭陽河左滕沛魚臺之中地名獨山新安社諸處别開一河南接留城北接沙口濶五六丈以通二舟之交來冬冰結船止更加濬濶以為運道此其上䇿也至是河道都御史盛應期上言宜於昭陽湖左别開新渠北起姜家口南至留城一百四十餘里以通漕舟其説與世寧合工部尚書童瑞覆議從之乃集民夫萬人分標開鑿已而其地居河上流土皆沙淤功弗就應期日夜止宿水次益卒數萬治之百姓滋怨言者謂糜財用勞民力功必不可成上怒奪應期官歸田里而新渠之議寢焉以侍郎潘希曾往代踰年豐沛單三縣隄成明紀事本末河世寧請開新疏具載山東全河備考者為詳為錄之疏曰臣聞河流遷徙不常厯周至今未有久治而不決之術國家救災恤民亦未有聼其決而不治之理今日之事開運道最急治河次之夫自古言河流者曰分則勢小合則勢大言河身者曰寛則勢緩狹則勢急大而急則難治小而緩則易防理固然也其言治河者曰順其性則易遏其性則難又曰不與水争地此其大法也河自經汴以來南分二道一自汴城西滎澤縣經中牟陳潁等處至夀州入淮一自汴城東祥符縣經陳留亳等處至懐逺入淮其東南一道自歸徳宿州經虹縣睢寧至宿遷出其東分新舊五道一自長垣曹鄆等縣陽榖出一自曹州雙河至魚臺塌場口出一由沛縣之南飛雲橋出一在徐沛之中境山之北溜溝出今諸道皆塞止存沛縣一道此正所謂河流合則勢大者而河身又狹則又所謂狹則勢急者所以不得不泛濫横溢於豐沛二縣徐之半州漫為巨浸近又溢入沛縣之北漫入昭陽湖以致運道舊河流緩沙壅漸至淤塞也或恐沙壅積久其地漸髙水髙趨下其勢必決決而東南有山限隔其禍猶小決而東北則往年張秋之潰運道以竭前宋澶州之決灌數十郡縣禍不可言故言治河當因故道而分疏之故道雖六其前出陽榖魚臺二道恐其決而東北㫁不可開其在汴西滎澤近開孫家渡至夀州一道決宜常濬以分疏上流之勢勿使壅也其自汴東南原出懷逺宿遷三道及正東如徐州小浮橋溜溝二道各宜擇使開濬一道以分疏其下流或恐曹沛漫流久而北徙宜修城武以南廢堤一帶至於曹單等縣黄徳賀固楊明等集地方至沛縣之北廟道口築堤一道以塞新決河口并防其北徙此治河急務也若開運道尤在所急然今止塞沛縣以北三十里而不能逆開者以方秋水溢塞處半為流沙所壅撈沙水中沙隨水勢隨掘隨壅甚難成功或謂乗今冬初水退昭陽湖暫可通船之時預備工力截其上流乾其下土并土排築旬月可開或謂此暫挑沙開築終不可永杜來歳之再淹則宜趂冬水涸冰涷船阻照南旺開湖式於昭陽湖中間開河一帶兩岸築堤以通運道比之今塞舊道不増十里之逺而來歳通漕可與舊道二處隨便行舟或又慮河水入湖亦能衝沙填塞即今昭陽南口全溝舊閘處所漸淤可驗臣等再三計議莫若於湖東岸滕沛魚鄒之中地名獨山新安社等處擇其土堅無石處另開新河一道南接留城北接沙河口二處舊河其間應開不過百十餘里更或隨勢利便各尋近道工力猶省其河新開深則各隨地勢闊則先止五六丈以通二舟之交行就取其土厚築西岸為河東堤且防河之漫山水之洩而隔出昭陽湖在外以為河流漫散之區是則所謂不與水争地者來冬冰結船停更加濬濶仍于彼立一夫厰量撥山東人夫接逓暫寛豐沛之民以稍息咽喉之氣此上䇿也應期吴江人以薦起為都御史總理河道工部郎中柯維熊與之偕時趙皮寨為上流其地視河髙數尺而其土又皆沙也隨疏隨淤久之功弗成坐論免歸河南通志盛都御史新河之役不可全謂其無功也顧其喜功無漸程役太嚴又忤安仁故爾中止今猶可復也或於汴西濬孫家渡一道汴東南原出懐逺宿遷二道正東出徐州小浮橋溜溝二道擇濬一道以少殺其勢少分其流可也或修武城以南廢堤以防豐沛漫流或修築沛北廟道口堤以防新決河口可也鄭曉吾學編餘應期役丁夫九萬八千開渠自南陽經三河口過夏村抵留城百四十里已閱四月怨讟上聞禠職停工自是四十年無敢言改河者乃終嘉靖之世河之入漕為梗者六其決口厯厯在榖亭孟陽湖陵廟道口間而其害惟庚寅北徙為大漕之寄於河而受梗者屢見莫大於辛亥房村之決大決亦大費小決亦小費為漕故無所惜特患工之不能久耳中丞劉天和濬漕河上流使漫流就下以濟二洪為利垂十年辛亥壬子間復專治徐淮下流為漕利亦垂十餘年而上流積漸受淤迫而縱横衝射如乙丑之全河逆行為從來河患所未有事窮則變於是有思成公新河之績者矣全河備考何棟字伯直巢縣人正徳辛已進士嘉靖七年上命修通惠河棟升工部郎中疏鑿故道蓄瀦上流建閘築堤務圖久逺甫五月告成自是糧運直抵大通橋歳省輸費十二萬緡上心嘉恱升俸一級賜白金綵幣升右通政仍督河務王用賔撰都察院右都御史何公墓志嘉靖七年漕運都御史唐龍奏乞於三􅆜河口儀真上游之地置閘以盡漕利南河全考明世宗嘉靖九年正月甲辰敕通政司右通政何棟專理通惠河道棟先任都水司郎中修濬通惠河閘工成陞通政工部言棟治河有成績宜專任之以究其用故有是命明世宗實録是年秋境山河忽西徙三百歩亂石絶河湍射下數仞雖虚舟不得上有冐險而下者十覆三四逺近駭懼舟戒弗行公命穿故河廣十步以通水稍截徙河逼之東兩涯下埽以漸相屬及兩埽逼河流激盪乃決入故河奔放衝滌一夕河廣一倍二三日盡復其舊是役也有風公終新河之緒者有謂當條新河之害以聞者公一弗從蓋公之功成上乃詔加公尚書俸級仍總理之十年改兵部右侍郎潘公希曾傳行水金鑑巻一百十三
