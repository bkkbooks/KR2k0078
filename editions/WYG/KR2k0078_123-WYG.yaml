body:
  text: 行水金鑑巻一百二十三江南按察使傅澤洪撰運河水眀神宗萬歴六年正月庚子户科給事中李淶條陳治河五事一曰多浚海口入黄河二曰勤塞決口以濟糧運夫自徐邳以至𤓰儀皆為運河而皆頼堤以蓄水但自清口而濬至安東雲梯等地方多踰一二百里自徐吕至清河又不下三四百里山陽髙寳諸湖必由多閘始洩而採辦閘石轉運亦難浚導之功旦夕未竟其不涸漕而妨運者幾希必多貯樁草相度水勢而急為之備然後可以無患三曰宜以江北全力治漕河不當以瀕河窮困州縣治漕河臣甞濫役寳應見其地道重傷而又有衝路之供應有飬馬之煩費及觀揚州所屬或有地稍豐收而又無驛地飬馬之累夫常賦之經各有定額未敢輕議若淺夫則因時増設且皆國事耳可無裒益以恤疲民四曰歳報錢糧以核疏鑿之功夫疏河浚海建閘築堤非百餘萬以上則難與輕費非五年七年之久則無以成功總理大臣每歳終將用過錢糧修過工程逐一奏報其築塞決水必視水勢注海之機以為消息但能勤於補塞不妨飛輓者即為成功此於稽核錢糧之中而寓考成河渠之意也五曰優恤夫役以鼓勞人夫河工之苦胼胝狂瀾之中跋涉淤淖之上且地皆荒野濱海凡饔飱等需有費二錢不得一錢之濟者今宜從實估勘稍優其值以蘇小民之苦至應得工銀必須委亷能官依時早給仍察督小官不許假以别事剥削夫役章下所司二月庚寅初河淮泛溢漕糧甚艱科道官及總河諸臣建議或謂海運甚便或謂河道無虞紛紛不一至是户部覆議謂先年海運事宜一一規畫停妥如每歳河道不梗仍從河運不然即照海運舊規成法酌量舉行不報三月壬子朔刑部主事管志道上言七事六曰定河漕之䇿今京師專倚江南四百萬石而驅之冒不測於海運之中其軍若民之稍愛身家者必復轉倩海濱亡命以應役何異借㓂兵以齎盜糧且示人以從海窺燕之路矣臣謂河縱決溢梗運不過一二年而今西北尚寧京儲可支數歳曷若乗此機㑹暫停一年糧運約以若干資河工以若干賑餓莩存留若干以興三吳水利蠲豁若干以蘇息窮民倘次年尚未通漕則量徵什伍暫行轉搬有何不可然臣惟國家都燕不宜專倚南税即使漕運愆期而北方亦足自贍乃無後虞則屯田水利未可以為迂而不講也五月辛酉以髙郵湖堤告成贈䘏原任工部侍郎吳桂芳如例淮揚海防副使程學博等十員陞賞有差七月乙亥總督河漕都御史潘季馴等題寳應湖於本年六月内陡起暴風驟雨將本工復行衝決蓋由河上諸臣期以茍且了事而但為目前之謀憚任勞者莫親版築之務巧避怨者不嚴程督之功錢糧虛糜而冒破之覈不行功築弛壞而僨事之罪不加稍有一簣之功便侈大以競賞脱有潰決之誤則遮䕶以托逃若不因此重加究治何以示懲上是其議着河漕衙門着實叅奏八月癸未開朱輝港鑰匙河清江等處為糧船灣泊其工費即扵兩淮􅂍罰及河工銀兩動支乙已巡撫浙江兵部右侍郎徐栻題澉浦所至秦駐山一帶河道去海塘迤南聨屬縣治國初舊有土塘為之屏捍内河為之洩流以致石塘可保而田畝歳登稱為沃土商旅輻輳頼有生業向者淤塞坍塌旱澇無備舟楫不通糧運甚難乙亥潮災該所軍民被災特甚而石塘衝塌殆盡者職此之由臣目擊時艱建議開濬荷䝉俞㫖允行臣嚴督各官興舉今果能矢心協力督率勸相萬夫子來月餘告竣臣親詣閲視考成見新河深廣土塘髙厚内外相維石塘益固永保異潮無衝突之患田疇得灌溉之資而糧運直達利益無窮所據効勞諸臣與臣終始塘河共事胼胝者臣不敢蔽如嘉興水利同知黄清等及海寧備倭把總王三錫等所當紀録以俟優叙議下所司明神宗實録是年九月總河侍郎潘季馴題准命官砌寳應八淺石堤共長八十五丈六尺修復淮安新舊閘壩遷通濟閘於淮安甘羅城南以納淮水故道盡復漕運通行山寳髙興鹽等處沮洳之地盡為稼穡之塲南河全考明神宗萬歴七年三月戊申直隸巡按御史陳世寳條陳治河䇿約一添設新堤堰夫役河工雖巳垂成但遙縷二堤巳逾千里髙家堰之堤凡六十里栁浦灣補舊増新將百餘里而黄浦八淺地雖咫尺反稱𦂳要若非集夫密守則盜決可虞宜増夫額畫地築居乃為勝算一添設管堤官吏髙家堰栁浦灣於淮安最稱𦂳要今修築告竣但二堤俱屬荒僻奸商漏税利其直達揚州每行盜決宜増設大使官一員專督衆役使之同居堤上密訪七月戊申贈兩淮鹽運司同知黄清為陜西行太僕寺少卿以河工効勞死事也庚戌總理河道潘季馴總督漕運江一麟題稱淮安一帶黄淮灌入運渠髙墊且閘水湍發唘閉甚難查照平江伯陳瑄所建清江福興新莊等閘逓互唘閉以防黄水之淤又於水發之時閘外暫築土壩遏水頭以便唘閉水退即去壩用閘如常議欲修復舊規并請特㫖垂示各閘使勢豪人員不敢任情阻撓部覆從之壬戌工部奏叙開便河工次先是巡漕御史陳世寳議鑿𤓰洲屯塢通浙直運船今又議開儀真便河以通江西湖廣等糧運欽命嚴督開挑至是總理河漕潘季馴管理糧儲道陳文燭查原督揚州府知府虞德華淮安府通判况于梧儀真知縣侯應徵挑完便河工程將所挑河渠勘足丈尺所支錢糧開報數目㑹同漕運巡撫侍郎江一麟僉謂陳世寳功當優叙如陳文燭等四員官有崇卑勞無軒輊議行吏部叙録其餘行漕院分别奬賞以示激勸從之八月乙酉户部題覆密雲漕糧俱屬額餉往時自通州水運僅止牛欄山又自牛欄山陸運抵鎮歳費脚價繁多居民騷擾因潮白二河可以通漕節經督臣修治二水㑹合河流巳盛又因同知衞重鑑建議自通州徑運至密鎮無倒卸起剥之煩挿和偷盜之弊主事曹維新議􅄈扁淺船二百一十隻新舊共船四百隻俱令經紀承管撐駕所運糧一十五萬自牛欄山至鎮城每石四分内扣八釐抵作船價計年扣價還官以備十年一次更造之費計所給經紀脚價止一萬二千七百餘兩而每年省什物行糧等費共銀二千二百餘兩而十五萬漕糧僅以三月通完費省而上下便之經乆可行既經督撫梁夢龍張夢鯉具題宜着為成規仍請紀録各効勞官運務者俱依議明神宗實録黄清上饒人起吏員清勤積官嘉興同知加四品服俸築海塘有功後以運同治髙寳河堤積勞死於寳應之寧國寺葢上官忌而擠之水以没也清在寳應築土石二堤支河工銀四萬餘兩錙銖磨算上下皆不得欺冒嫉之甚時巳積勞得嘔血病水次謁所司令人密蹴其板墜下救起死矣尋復甦掖入城凡二日氣絶葢萬歴七年六月初二日也年五十八奏聞有良工苦心難以名言之語湧幢小品明神宗萬歴八年三月乙巳工科給事中尹瑾陳河工善後七欵一浚閘河以利運艘淮河一帶先年平江伯陳瑄開鑿時原恐阻淺剏立裏河歳一挑浚今狂流既息積沙未除外河日深内河日淺宜照南旺事例三年兩挑挑期俱在通濟閘築壩之後動支歳修錢糧多募夫役限一月通完至於揚儀河道亦應時常撈淺以專責成以防衝決河水暴決勢在速治今後遇有水漲暴發非司道駐劄地方該掌印官竟自派募人夫動支物料多方防守如水勢異常夫料不足聽其借支貯庫别項銀兩一面通詳司道一面便宜築塞不必拘泥闗白而後行事五月丙子命挑浚白溝河以便運船從科臣王道成請也丁亥總理河漕潘季馴奏復漕河舊規六月初旬於通濟閘築壩九月初旬開壩下所司知之庚寅工部奏請復舊規以清街道列為六欵一疏河渠以通水道京城北有海子南接玉河橋東有泡子河西有河漕各街俱有長溝中城有臭水塘此皆各通脈絡今多壅塞且有侵占者乞逐一清查給銀開浚明神宗實録是年總理河漕潘季馴題河工未盡事宜疏云又㑹議得淮南水患其源在淮黄其重在運道而民生利病實相闗焉往年髙堰不塞閘禁不嚴而淮水始南黄水又從天妃閘灌入以致淮揚一帶浸及城市興鹽等處之田廬盡成昏墊清口遂淤海口因塞羣議紛紛計將無出矣幸頼廟謨主持部院殫心經畫築髙家堰改天妃閘復三壩嚴唘閉而淮黄二水竝免南奔之患塞黄浦八淺修復寳應土石堤而興鹽一帶俱有可耕之田清口因淮水衝刷而日深海口得淮黄合流而大闢運計民生殊為永頼矣所據未盡事宜止有髙寳江都山陽年例歳修之堤向縁錢糧缺乏工力不敷每歳止是支吾目前未能加幇髙厚及興鹽髙泰以裏洩水舊渠向因黄浦八淺潰決濁流浸灌淤墊頗多誠今日所當議者以湖堤言之除寳應大工堤岸俱各修砌完固惟當率夫防守無容别議外其卑薄殘缺之堤宜加土工樁朩以減水閘言之除髙寳江都新舊増置閘座可以宣洩者無容别議外髙郵南門舊橋口應改建減水壩一座寳應子嬰溝舊閘及㤗山廟後甎閘九淺石閘應改建減水壩三座并江都邵伯湖加髙閘石九座錢糧俱應於見請歳修積貯銀兩動支如有不敷即於大工餘剰銀内支補者也然減水閘僅可以洩尋常盈溢之水至於伏秋霪澇與天長六合諸山之水陡發共注於湖止憑𤓰儀二閘宣洩不及查得揚州灣頭原有運鹽官河一道内由芒稻白塔二河直達大江勢甚通便年乆淤淺先年刑部侍郎王恕曽議挑濬計長三百四十里道里遼逺工費不貲且議者又謂私販船隻潛度難防遂致中寢殊不知洩水之期每年止是五六七八四箇月喫𦂳若從壩口宻佈樁柵就令白塔巡司防守自可禁絶其餘月分任從照舊築壩實為兩利而無害也但慮錢糧不敷今止議先從灣頭濬起至泰州南門止計長九十七里挑深四尺面闊四丈厎闊三丈併打壩合用夫工銀一萬零八百兩相應於巡鹽衙門挑河銀内動支又查得髙寳江都堤内田地及興㤗山鹽州縣地方外受各減水閘之餘􅅹而内蓄時伏連綿之積雨皆由射陽湖經朦朧喻口出廟灣以入海廼其故道也渠道見存止宜疏濬先䝉總督兩部院據鹽城知縣楊瑞雲估勘挑濬淺處計長一萬二千六百丈合用夫役工費銀七千五百六十兩巳經覆勘明確相應於原議大工扣存巡鹽衙門挑濬支河銀内動支者也以上數事俱係歳修及原議未舉事宜亟應興舉務在明歳伏前報完方克有濟但道里遼隔時日不多必須分任責成庶可速就今議得髙寳江都一帶湖堤及修建減水壩等工相應俱屬南河分司管理疏濬灣頭鹽河分屬海防兵備道管理疏濬射陽湖諸淺及清江浦外河堤岸分屬徐州兵備道管理庶事有專責而工可速成矣再照鹽城知縣楊瑞雲寳應知縣李贄揭内開稱寳應堤内重剏月河一節委與髙郵康濟河事體相同節經部院題請勘議舉行但計工費不貲當此勞費之餘災傷之日恐有不堪相應暫停姑候時和年豐再圖興舉者也職等㑹勘無異理合呈報等因該臣㑹同兵部尚書凌雲翼虛心講求逐細查覈除中河司道管轄地方自清及徐五百餘里黄河經行之處委巳順流入海運道無梗居民頗安惟在查照部科題准事例防守不懈即為永頼之䇿無容别議外其寳應迤南諸湖聨絡清江浦外湍溜不多而闗係内河不小各該堤岸雖係大工之所未及實亦運道之所必資循例歳修殊屬虛應尋常僅可支持暴漲不免衝塌葢人力固自有限錢糧亦所不敷無怪其然也所據司道勘議加幇堤岸修改閘壩濬灣頭河之淤淺以殺外湖之横流疏射陽湖之故道以洩内地之積潦工費不煩於請發分任尤便於責成似應依擬以終前功伏乞敕下工部查議上請備行總督衙門悉照前議督行各司道查照動支前項銀兩嚴督各該掌印管河官務趂今冬天氣晴和分投修理併乞轉行兩淮巡鹽衙門將挑河銀兩查發濟用定限來歳三月中通行完報以備伏秋如有惰誤及茍且塞責不堪永頼者指名叅奏庶未盡之功區畫周備而運道民生端有攸頼矣奉㫖工部知道河防一覽是年決髙郵城南敵樓之北堤南上河田廬皆沒郎中張譽督塞之寳應決黄浦譽率夫堵塞堤下窟得龍骨建脱龍亭南河全考肅薈蕞云此印川公河上軼事也王文撰公墓志云黄浦下隂雨輒聞雞鳴聲居民曰此蛟龍宅毋動堰成忽中夜雷電交作挾以厲風望見黒焰排空而去比曉土窟白骨爛然在焉就視之鉅􅫈獨角其顱骨似牛而長廣倍之其角似龍之火帶而稍參差䑛之輒粘舌時以為孽龍避公而尸解云浮喬萊寳應新志云予昔修明史為潘公作𫝊蛟龍蜕之語本之王文肅所撰志銘中予以説近荒唐未入正史今歸田里知有碑在黄浦廟中明神宗萬歴九年五月戊子吏科給事中顧問言臣前待罪任丘目擊滹沱河每遇夏秋水漲漂流廬舍渰沒民田不可勝紀而額糧現存百姓歳苦賠墊大半逃亡前撫按官計議疏浚或欲開故道或欲開新河未免此利彼害以隣國為壑終非長計莫若將饒陽河間以下水占之地悉讓為河動支該府節省并賍罰銀兩召募夫役挑鑿河身使水有所容剏築堤岸使水有所束以圖永乆之規毋争目前之利其額征錢糧若必不可缺即於府屬州縣每石量加分釐或有現淤沃壤清查照畝起科通融攤派部是其言請行撫按查看具奏從之六月丙辰巡倉御史顧爾行條議水次三事一謂小灘水次向因河南糧户賫銀至彼買米致奸棍營求包攬挿和不堪宜行禁戢一謂遮洋海船年乆損壞宜行修葺一謂運官率多衰老不堪宜加慎選部覆如議因言浙江杭嘉湖漕糧本部舊差主事一員監兊後因科臣建議停差以巡鹽御史事簡議令兼攝而御史不能親臨致糧米粗惡係乎國儲查有先差舊例相應議復得㫖允行七月壬戌總督漕運凌雲翼奏稱儀真閘税宜酌水勢不必拘泥取盈其𤓰儀各閘壩應歸併南河郎中管理不必添設主事部覆如議因言河道歳修錢糧宜敕督臣照各邉軍餉事例歳費若干存留若干悉解工部貯庫遇河工缺乏通融請給從之雲翼又言茶城至留城一帶運道咽喉節因黄水倒灌停淤漸髙運船率多淺阻臣巳督行司道興工挑浚乞照往年事例暫停進貢船隻支用錢糧俟工完覈實具奏章下所司明神宗實録明神宗萬歴十年三月已未朔増築保定府雄縣横堤八里工食取諸修城餘銀造河間府任丘縣東堤自滿堂村至呂公堡二十里工食取之裁省淺夫銀以滹沱水患撫按辛自修敖蜫請也辛巳先是河漕總督凌雲翼言清江浦河堤夾隣黄河邇來水勢南趨淤沙日被衝刷恐黄河決嚙運道可虞欲於城南窰灣自馬家觜歴龍江至楊家澗出武家墩另開新河以通運道在司道張譽等初議則從武家墩折而東仍合通濟閘出口扵是兵科給事中尹瑾議清浦之河其來巳乆河堤之外一望平田并無岡阜遮隔雖楊家澗新開河渠相拒亦不過十餘里必清浦之堤無虞而後淮安無虞一河兩岸無虞而後楊家澗之新河無虞設清浦一決其害不止清浦而巳且糧船經由淮城則夾帶違禁易以稽查若經由窰灣入馬家觜則中有一河之隔又有大湖之遥脱有頑軍梗悍作奸犯科失誤糧運咎將誰歸至武家墩出口尤為可虞葢本墩地勢髙亢天將設之以屏籓淮河者墩内地髙難為挑穵墩外湖濶難以灣泊冬春之交糧運𦂳急則苦洩涸伏秋之候淮水泛濫又苦奔冲且武家墩與髙家堰共為一堤相去甚近開武家墩是即開髙家堰則又害全河矣無已則通濟閘合流之議為可從耳已而雲翼請遣官往勘給事中李廷儀吳倌言今日治河之事宜開新河以避黄流守舊堤以固清浦武家墩不可開新壩不可築事勢昭然遣官覆勘徒滋道旁議耳部覆給事中言皆是上令雲翼計永利以聞四月戊戌户部題漕糧逺者六七千里近亦四五千里往河道阻塞運糧多虞荷皇上軫念國儲歸併河漕督臣專責各省巡撫及添設御史通行巡察各兵備畫地分修故邇年道路疏通不踰春月俱達天津北至白河咫尺京師反不能依期抵壩何也一則起剥甚難一則濬河不力葢剥船僅八百每船不過百餘石每剥往返須兩日三百餘萬之糧必欲盡用剥船巳盡河漲無期轉盼秋雨時行陸運既阻於泥濘入倉又難於晒揚雖捐輕賫而盡用之亦安望米色乾潔無浥爛耶宜令倉漕各衙門嚴行沿河承委州縣官令其晝夜駐劄臨河各分信地督催堤夫淺夫挑浚白河一帶平河漫流淺阻務期深闊無滯如原設夫役不敷許量動官銀雇募協助俟糧運完日報部議補仍將各官勤怠酌議題請以示勸懲報可六月壬子新開永濟河成長四十五里建閘三座費銀六萬餘兩總督尚書凌雲翼以聞上以其費省而工速賞銀幣有差七月辛未直隸巡按楊楫題入夏以來雨澤愆期濟寧臨清一帶閘河淺澀提督泉源工部主事馬玉麟將南旺迤北開座閉塞借水南流致北流之水糧船淺閣兖州府管河通判詹諮一籌莫措阻誤糧運且本官物議沸騰官守有玷應分别罰處仍行各管河分司官將南旺馬塲安山諸湖逐一清查原界集募人夫開浚深廣其減水閘壩查有損壞即行修葺務要以時蓄洩永保運道如道府等官因循故套茍且了事聴其指實叅奏疏入下部覆奪馬玉麟俸三月降詹諮閒散其修湖儲水係濟漕要務共依議申飭行十一月戊午維揚古稱沃壤而地形髙下大海環其東諸湖遶扵西所頼堤厚支河通斯田地可耕民竈俱利自范堤坍壞髙寳堤亦衝決不守其中大小支河所在淤塞於是以髙寳興㤗四州縣為壑而洩水無路民竈罷扵昏墊矣河道尚書凌雲翼言臣等躬親勘視度地形探水勢其治之之道有二惟疏上流使入江洩下流使入海沿漕堤一帶之水為上流沿范堤一帶之水為下流如西引邵伯湖之水轉南至新安湖復東入運河至芒稻河入江有餘則聴其直㵼不足則引以濟漕則上流疏矣如牛灣河姜家堰廟灣為三大海口引各支河東㑹扵串塲河北㑹扵射陽湖俱入海則下流洩矣而興化之堂子鎮戴家窰海溝河白駒三十團竈則牛灣河之支河也黄土溝皂角樹至岡門登瀛橋河則姜堰之支河也安豐鎮至清備灌鋪則廟灣之支河也其何垜塲至白駒塲一帶阻淺尤甚又河東一帶舊係糧鹽大河洪水衝決河身與岸相平故水軌道而淤溪秦漳艾陵葑子諸湖之水北淹民田億千萬頃處處俱當挑浚俱費經營惟是工有後先勢有緩急今將范堤數十里先行修築使外潮不得入串塲支河六七道盡行疏浚使内外有所出果蓄洩利便積水可消則海口不開亦可如支河既通之後水患如故即并開海口置閘以備蓄洩其修築范堤該銀四萬二千四百餘兩浚支河六道該銀二萬一千四百四十餘兩俱於鹽價門租浚河存剰銀等支用部覆河臣䇿是定限今年十二月初興工明年十月報完務須費省工堅詔從所請明神宗實録行水金鑑巻一百二十三
