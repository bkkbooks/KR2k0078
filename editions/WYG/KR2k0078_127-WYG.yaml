body:
  text: 行水金鑑巻一百二十七江南按察使傅澤洪撰運河水明神宗萬厯二十一年五月丁邜工部題覆漕河防守向在伏秋今不意春雨異常自濟寧暨淮湖一帶堤岸衝決闗係非細近該河臣舒應龍奏在濟寧上下湖水漲溢則議築堽城閘壩以遏汶水之南開馬踏湖月河口以導汶河之北在淮揚之間則議開通濟閘旁月河土壩以及文華寺前一壩以殺水勢且欲幇築湖隄開洩涵洞廣募夫役早派委官及責成府州縣掌印官俱目前事勢所不容巳者而科臣劉𢎞寳一疏尤有深慮疏内原擬各欵逐一舉行以圖萬全從之明神宗實錄明神宗萬厯二十二年正月丙午給事中桂有根言河工雇額月給銀一兩足以供事者少倘増額廣募自可計日告成至如性義嶺當兖徐之交河臣舒應龍議開渠洩昭陽等湖以免金魚各縣之淪漲杜運河隄岸之衝決令撫按速行勘報以數萬金量増雇直則興工隨以寓賑部覆從之二月癸亥直隸廵按綦才奏稱淮安通濟閘乃漕運咽喉請濬閘左舊河更開閘右新河三閘並出獲利而免害又請加培左畔大堤部議行總河相度從之九月戊戌韓莊新河成總督河道工部尚書舒應龍加太子少保賞銀幣管閘主事尹從教管河叅政海淳叅議邵以仁同知羅大奎等各陞賞紀錄有差明神宗實錄舒應龍字時見全州人嘉靖戊辰進士萬厯二十年以工部尚書兼右副都御史總理河道河決汶上灌徐邳潰漕堤㡬二百里應龍求通洩之途於微山湖東得韓家莊其地在性義嶺南不經葛墟嶺可引湖水由彭湖注之泇乃疏請開支渠四十餘里凡五閱月工成此開泇之首功也二十二年以河工成加太子少保山東全河備考明神宗萬厯二十三年二月庚戍工部覆奏河防工竣經管各官㑹覈勤惰既明今將揚州等府同知等官劉不息等髙郵等州正官許一誠等山陽等縣正官何際可等各優叙紀錄其各州縣佐領武職另行奬賞并失事應戒者俱請㫖舉行従之明神宗實錄是年決髙郵中堤七顆栁郎中詹在泮等嚴督官夫築塞南河全考明神宗萬厯二十四年八月丁酉命管理河北郎中黄承𤣥挑浚南旺等處運河壬寅部覆總督河道工部尚書楊一魁條議分黄導淮事宜十事前後九條俱入河淮一議放湖水以疏漕渠蓋髙寳諸湖原係沃壤自淮黄逆擁衝決汪洋即歳加堤障猶多昏墊今入江入海之路既浚分黄導淮之功已成應於涇河子嬰溝金灣河諸閘并𤓰儀二閘並為開治大啓湖水就湖疏渠與髙寳越河相接既避運道風波之險而水涸成田給民菽種漸議起科以充河費九月癸邜廵視盧溝橋御史蔣汝瑚奏東西河商稅查閱地圖分别疆界謂陜商從小直沽河入者應報東河而山西商自五臺山運朩由新落河至趙堡口謂之西河與小直沽相去遼逺而前㫖併入東河則西河之稅虛而御史可以不設與管河郎中格不報明神宗實錄陸化淳字居復號湛源常熟人萬厯壬辰進士除工部郎中治濟上諸泉諸泉當漕渠淺則由鎮口奔注入漕漕仰泉給當漕渠溢則泛濫反涌入鎮口㫄決不下時累歳適當其溢諸水櫃水壑所以備涸者多為豪右所侵甚至鞠為榛莽諸治泉夫皆供他調發公計河之盈縮不可期一值其縮則運艘何藉而北達具議於總河楊公一魁亟是之令行如議公昕夕乗橇攆周視決壅導流不惜胼胝引繩批根不憚豪右諸泉畢理丙申工竣而徐吕以下多患漕梗濟上轉輸如故楊公大器公且議乆任㑹己有代者遂寢諸閘夫苦於中官虐使公悉詳為條教啓閉送迎皆有恒度約曰闌而出吾度者吾治之如吾教若不以聞吾而私笞掠人者吾治之當如所奉敕於是上下凛凛三年如一日也丁酉冬報命厯䖍州知州瞿汝稷撰陸公化淳𫝊萬厯二十五年四月江都運河南門二里橋一帶水勢直洩無蓄為鹽漕梗該廵鹽御史楊光訓題請檄揚州府知府郭光復開自二里橋河口起入西折而東從姚家溝以入舊河自四月興工八月告竣名寶帶新河民漕便焉南河全考萬厯丁酉歲二十五年當糧運盛行之期漕河乾涸自桃宿而上至鎮口黄㡬斷流三尺童子可攝衣而渡糧船膠澀不前探水稍深處則移舟就之河官乃築攔河壩横亘河中蓄水濟舟以緩須臾之急少頃又涸命去其船上竹朩貨物又涸命運其米於兩堤又涸舟且漸裂乃以繩繫其頭尾至是人情洶洶晝夜不得休息有議僱車陸運者有議易米納銀者計無所從運官羣聚告急旗甲接踵潛逃比時廵漕直指馬公駐節宿遷親為督促無如之何也乃上疏論劾自總河司道以下皆被重㕘時倭信且急慮者謂從旅順口直祗廟灣薄淮城據糧為餉扼吭而拊背則京師危矣總河楊公及司道諸公皆倉皇莫措手足先以萬人委州判程潮濬境山引瀦水濟漕不二日而水告竭矣又移夫至梁家口開挑支河引微山湖水以灌漕施工㡬半業費千金忽飛騎召余約三日抵鎮口余如期赴召覩公憂形於色仰天歎曰今年運事大壊疏導諸水十無一濟子素習河渠且出余特簡當以何䇿寛我耶因言見委程州判濬微山湖事余啓公須往視可否乃能定計耳公許之辭出至微山口細觀形勢幅圓約二十餘里令人探水淺深僅二三尺許及詢之土人皆曰此湖係四面積水並無源泉余曰此正所謂雨集皆盈涸可立待者豈足充六百里河身耶從此止工可省銀萬計轉之别圖不可乎隨回鎮口一一復公公曰子言良是據子所見孰可加工者余曰職昨趨召時由小浮橋渉河中有渾水一綫涓涓不息此黄流也聞上源一決于黄堌再決于義安山上流既分則下流自淺浮橋水勢微細宜然也黄堌工力浩繁未易輕舉若調微山之夫堵義安之口再扵小浮橋出口處闢開數十丈則黄水盡歸小浮橋沛達正河濟漕之䇿無逾此也公曰善悉以微山之夫應之而廩糧樁埽令取辦於徐州是日辭總河返徐州謁見道尊中菴徐公備道所以公曰此口趙運同曽知州塞之久矣屢塞屢決徒費貲耳余曰凡築決口塞而復潰者以下流隘窄水不能洩必滿而逆行上下搏激勢必中潰若上塞下闢則隨來隨洩奚潰之有如人飲食下咽而水穀道閉塞小則腹臌大則嘔逆自然之勢也公始頷之而尚在猶豫間余復進曰事急矣再遲數日則船裂米爛縱治之無益也請以千人闢小浮橋以萬人築義安口半月不效願以身當公方委心任之時五月二日也余正率夫興工徐公忽奉總漕褚公命往閱海州鹽城廟灣一帶城池兵馬次日啓行嗟嗟漕事艱阻勢如然眉徐道業有専責重比丘山總漕公顧以不可必之倭而易此不容緩之役其意可概見矣越三日河工所需物料甚亟而曽守靳而不發衆夫嗷嗷㡬致脫巾奮呼余親馳曽所面折之曰君有治河責今河壊漕阻已被漕臺疏叅余此役為君捄焚耳不假一杯水是自速禍也請三思之曽始悟乃給發衆夫始定曽因道尊行且迎合總漕公意乃泄泄漫事如此施工甫五日水勢日漸東趨再五日水増三尺再四日義安口合河水頓髙丈許盡從小浮橋衝入運河前所築攔河壩數十處頃刻衝刷如洗數千金之費付之烏有余前力言築非䇿弗聽今果驗矣漕水既盈旗甲將前所貯堤上糧米及前所撇竹木貨物仍裝置船上且連日南風大作揚帆銜尾而進七日夜四百萬漕糧盡入鎮口歡聲雷動咸相慶曰寔更生我也其他南北徃來縉紳士大夫得水而濟者不可勝紀𫝊聞兩都諸大老移書相勞漕臺馬公特疏薦之當漕事岌岌時徐道徐公日侍總河公經營邳宿間分司樊公亦相從後先區畫大拂總漕公意故徐有海州閱視之命總漕甚且上疏自避舉徐以代徐益不自安遂稱疾挂冠南歸公清操亮節世方倚重無故而去衆共惜之兆元素愚戅觸忌旋亦罷職人謂以功為過奈公論何樊公閱邸報喟然歎曰無罪而殺士則大夫可以去乃上數千言為余力辨於當道隨自乞休不允至京察公亦挂名黜列矣一時任事者解去殆盡蓋亦理勢之必然也兆元曰士君子出處有命存焉行止非人可尼也忠直之迕扵時獨立之負於俗自古記之矣晉李生有言曰身可抑而道不可屈位可排而名不可奪此則吾人所宜自信者耳併書之以告後之安義命者張兆元濟運始末明神宗萬厯二十六年三月庚子工部題覆工科給事中楊應文議開泇河之疏大畧謂頃自堌口一決黄河南徙徐吕而下㡬於斷流於是開李吉小浮橋等處及鎮口以下建閘引水以通漕目前似無可虞矣然非永乆之計也泇河北接汶泗諸水東受沂䝉諸泉其源本不易竭而岸髙土堅又能束其流而使之不漫即有湖也而涯涘可循即有石也而罅漏可鑿隆慶間河臣翁大立萬厯間河臣傅希摰嘗議開而不果若以河道歳修之費而用之於此事半功倍一勞永逸臣固以為泇河宜議也科臣之言良有深見但事在彼中難以遥度宜咨河臣及廵漕等各御史勘議可否以為行止報可明神宗實錄明神宗萬厯二十八年九月辛丑朔工科都給事中王德完條上漳流北徙二變二患三策言河決小屯東經魏縣元城抵館陶入衛為一變其害小河決髙家口厮二流於臨漳之南地俱至城安縣東吕彪河合流經廣平肥鄉永年至曲州入滏水同流至青縣口方入運河為再變其害大滏水不勝漳而今納漳則狹小不足収束巨浪病溢而患在民衛水昔仰漳而今舍漳則細緩不能掃捲沙泥病痼而患在運塞髙家河口導入小屯河費少利多為上策仍廻龍鎮至小灘入衛費鉅害少為中䇿築吕彪河口岸隄漳水運道固不資利地方亦不罹害為下䇿中雜引漢事為證而末復力薦原任知縣劉宇郎中樊兆程章下所司覆議三䇿總治漳之建畫與利害之更端容資漕河部院逐一從長計議務使國計民生一舉有賴報可十二月辛邜工部覆直𨽻廵按佴祺所奏三議其白塔河之復漕船回南既免風波之險又與鹽政闗稅無妨復之誠便泇河之開蓋用黄河為漕有利有害用泇河為漕有利無害但泇河之外若繇微山吕孟周栁諸湖伏秋水發不無風波之險冬春水涸未免淺阻之虞必須上下另鑿漕渠建閘節水庶㡬通漕悠利漳河之引巳經具題奉㫖咨河漕督臣㑹同保定河南撫臣督率司道查議具覆相應并催務期引漳㑹衛以圖永濟允之明神宗實錄是年正月總督河漕尚書劉東星檄郎中顧雲鳯署道事揚州府知府楊洵督夫開挑邵伯越河長一十八里闊一十餘丈十一月又挑界首鎮越河長一千八百八十九丈七尺各建南北金門石閘二座其邵伯越河又建減水石閘一座迄今官民船隻永避湖險南河全考明神宗萬厯二十九年正月乙酉武英殿中書舍人管理山東礦務程守訓疏請改易漕渠繇髙郵州達淮安府廟灣入海經數百里達山東膠州麻灣入新河至海倉復入海又經千餘里達天津省㑹通之勞而避海運之險工科給事中張問達劾其蠧國殃民且假稱明㫖嚇騙􅂍數十萬乞亟為罷斥并發諸臣論劾諸疏一一追究不報四月甲申工部尚書楊一魁等言今歳經月不雨徐邳一帶糧運淺阻乞敇河道官員講求長策務期克濟從之九月乙未朔工科左給事中張問達言漕運之期兊支過淮過洪各有定期抵壩抵灣不逾五月而回空之船亦無凍阻自黄堌口之決而南徙也徐邳三百里之間㡬至斷流河臣乃議開趙家圈以黄河故道不及四十里接引黄流下通三仙臺支渠出小浮橋以入運河趙家圈告竣復採舊議開泇河舍黄流引汶泗山川泉源之水以為運道便宜經乆之謀心亦良苦然地多沙石工尚未就而趙家圈日就淤塞因而斷流徐邳間三百里河水尺餘糧船停閣不行者㡬一月矣及入閘河又多淺阻臨清以北河流甚細此一萬二百七十有餘之艘相與争一線之水而不能速進之故也夫糧船抵壩遲故交納遲交納遲故回空又遲入秋徂冬不可不及時治以為明年接運之計也伏乞敕下該部設法起剥早令南還而河臣劉東星宜問其病之果否酌議去留則河道可通而漕務有賴矣章下所司己未直隸廵按張養志言治河之䇿不越理黄河開泇河之兩端而黄河之説有四泇河之説亦有四一曰塞黄堌口以杜洩水之隙蓋運道河身原淺故蓄水不深全賴黄水接濟方可通運自堌口一決全河勢巳南徙見今口闊八十餘丈水深二丈四五尺三丈不等以致東河微細濁河乾涸徐邳一帶年年淺澀前年開趙家圈三仙臺今歳開李吉口旋亦淤塞職此之故須將此口預為堵塞使水不南洩盡向東注庶運河之水常盈而糧艘可免阻滯一曰濬李吉口以通引水之源自趙家圈既淤所賴以引導黄水接濟運道惟此口耳黄堌口衝決日乆勢巳深闊須將此口大加挑穵深闊相等始得分奪其勢但此口至運河長三百里工力浩繁合於每歳運畢之日自李吉口至堅城集隸山東自堅城集至鎮口隸徐屬併力興工大加疏濬近口處闊二十丈以下闊十餘丈俱深一丈四五尺庶可引水一半東注而宿邳之間可免淺涸之患一曰濬邳徐漕河以為受水之地自邳宿以至徐吕地髙河淺難以蓄水每至春夏之交率多淺澀合于初冬以後將北自珠梅閘南自宿邳一帶探勘淺處即以額設撈淺二夫大加疏濬三五尺務禆深通更于大浮橋迤北劉家灣建閘一座鎮口閘迤北至玉皇廟建閘一座以時啓閉庶停蓄自深節宣有具一曰築永夏堤以防決水之虞此堤束水歸漕關係甚重先年原係土民接築禦水後因黄河南徙水漲沙淤前堤低矮單薄去歳馬家溜何家集衝決數口水盡南奔不惟徐邳運道淺涸即永夏田廬亦被淹沒今雖堵塞尚未完工近又衝決申家營三四十丈若不上𦂳加幇恐難捍禦合于此堤幇修髙厚夯杵堅實更接築大堤一道直至大石山頭俾南岸一帶俱有堤禦以上四款皆運道之不可缺者也一曰開黄泥灣以通入泇之徑邳州沂河口入泇河之門戸也進口六七里有湖名連二汪其水淺而且闊下多淤泥糧船至此沾滯難行欲為挑濬則無岸可修欲為埽壩則無根可據查得湖外有黄泥灣離湖不逺地亦頗低自沂口至湖之北崖約二十餘里合於此處穵河一道以接泇口不必拘定丈尺惟以可通運艘為度湖水引以灌河湖身棄而不用所費不多成功亦易運舟從此可以直達泇口一曰鑿萬家莊以接泇口之源泇口遞北有地名萬家莊以及臺家莊侯家灣梁城等處原係山岡髙阜之地且多砂礓石塊極難為工河臣劉東星併力疏鑿業已成河今嵗輕小糧船巳通行三五十隻但河身尚淺水止二三尺不等江浙湖廣糧船重大難以通行合於此處更加鑿削三五尺俾韓莊之水下接泇口並蓄水五六尺深庶糧船不論大小輕重沛然可達矣一曰濬支河以避微口之險韓莊之西有湖曰微口上下三十餘里水深丈餘必測水勢深淺揷立標竿以為向導遇風掲帆頃刻可過偶遇暴風不免漂流今已於湖邊開支河一道下接韓莊上通西栁莊四十五里不由湖中挽拽有路合將此河再加疏濬庶可免漂沒之患一曰建閘座以為蓄洩之具地勢原有髙下則水自有淺深萬莊一帶地勢原髙雖所開河身一二丈四五尺不等較之泇河以南猶為髙峻北來之水至此南下必速合於此處比照濟寕在城等處或三五里或十數里相其地勢建閘三五座以時蓄洩庶節宣有具水可常盈無淺澀之患矣以上四款皆泇河之不可缺者也夫黄堌口先是河臣以為不可塞而臣以為可塞者蓋彼時徐吕二洪不患淺涸而患衝決故留之洩水以防衝運之患此時二洪不患衝決而患乾涸故塞之借水以成濟運之功泇河先此河臣以為不可開而臣以為可開者蓋前此疏鑿未至砂石已鑿深通頗易故謂其可開者惜成功之不可棄也此二役也理黄河乃萬世不易之經開泇河乃一時濟變之權譬之用兵黄河為正泇河為竒理黄河而並修泇河此竒正並用萬全之謀也若修泇河而遂棄黄河此舍正而用竒非長勝之道也非臣之所知也工部覆奏請命河道諸臣勘議得㫖這河議著作速㑹勘來行毋得遷延推諉以誤漕計十一月辛亥河南道御史髙舉疏言我朝奠鼎燕京數百萬衆待命漕渠乃今倉廩空虚漕河淺澀治河之人杳乎未有明年歳運可為寒心臣試以治河之䇿與用治河之人言之夫漕艘北來出清口入古洪中間三百餘里實藉力黄流比因河臣溺職黄堌口開濁流南徙浮沙北壅厯徐邳抵宿遷昔之洪濤㡬為陸地以故糧艘至宿停閣彌月所幸大雨時行汙潦暴集僅完運事尚有糧二十餘萬迄未入倉即入倉較之往年已遲㡬月轉瞬冬殘水淺氷合回空何時赴兊何時過淮洪而輸倉亦又何時臣用抱杞憂廣詢衆口大約其䇿有三如新口大決黄堌口業淤其半宜乗此半淤大濬黄堌以下舊河務使深廣始引黄水而注之東遂塞黄堌而遏其南竢舊河之衝刷既深則南旋之水勢必殺方并新口而塞之來歳之運庶其有濟又如泇河之役費累巨萬而未奏成功聞近日糧運空船輕小貨船間有往來而竟難濟運者縁所挑河身狹而且淺又中有山一叚攻鑿為難故爾中棄似宜大加疏鑿而底於成臣又查國初曽用海運南北無虞獨其中經黒水大洋内有礁石觸舟多覆迨淮揚漕河既成此河遂廢嘉靖間漕河氾濫復議及之此時王獻委崔引禮董治其事㡬有成績故道見存東由麻灣海口入河北折蜿蜒僅四百里道經膠州髙密出海倉口一日可抵天津既脫風濤亦復徑捷據土人僉云每遇秋水溢糶販貿易之舟見在通行今但疏其壅去其塞事半功倍至便計也引禮之子同知崔淳曽與其事能道其詳且謂約其經費不至虚糜止須數萬夫不煩征調但借班軍假之二年可告成事事成當與河運遞相為用彼塞則此通此塞則彼通兩利並存此亦一勞永逸之䇿也至先臣劉應節之旋開而旋罷者非河之罪以舍故道而鑿黄埠嶺膠人圖便之口誤之耳以上三䇿願當事熟計其便而審用之然欲奏河功宜先分職掌往年總河總漕設兩大臣分曹而理二百年來鮮有敗事往效可覩也頃因倭警防海責之廵撫乃以漕河兩事并之一人詎不省費第未思昔之漕運河道𦂳要事務總在淮揚并奚不可今則漕運於江北而河決於中州二事並亟勢必不能騎墻而兩顧今即不並設亦宜以漕務付鳯陽廵撫以河務付總河大臣姑待事完另議庶人有專責事有專功可不致顧左失右推諉誤事也夫職掌既分㑹推宜慎職聞㑹推之日此推之彼甲諉於乙有德者疑于受德有怨者嫌於受怨舉有微疵者懼人之議其後舉有盛名者慚巳之狃於狥此必無德無怨無咎無譽之人而後可於國家事未必濟也且今之㑹推三次推者七人雖俱一時之選第人各有能事難槩任如云人人有當于治河不敢信也且推而見用或出都在道任意遷延履任養尊置身清邃欲行一事先㑹稿各臺及㑹成一稿復分委各道各道委各府各府委各州縣而始行勘議即勘有肯綮議有次第又須㑹文申各府各府申各道各道申各臺間有未妥者必一再批駁而議始畫一即議已妥矣必各臺詳允而事始舉行動經數月少亦不下數旬如此推諉玩愒何日而可有治河之人何時而可底治河之績㢤臣謂㑹推臣工各宜計國務秉公心無分朝野略彼生平但期於國事有濟才品俱優者為上果才優而品非衆服者亦在不遺唯顧其人之精神力量足勝河任以赤心行實事念為公家身甘勞瘁者舉而用之奉㫖後責之即日登途勿躭時日到任之後更責之遍厯河濱所至詢之父老叅之輿論以配已見一面踏勘一面議估作速處置錢糧鳩集夫役刻期興事計日省勞仍復與以便宜寛其文法斯則人當其事事宜於人可屈指而奏效也功成而兊運如期則超擢示勸并及舉者祈敕該部查議速行治河之臣早賜簡用得㫖往年河漕設兩大臣今以兩事并於一官應否並設該部院㸔議來說這本言多可採該部便㸔議來行甲寅大學士沈一貫言臣接御史髙舉掲帖内言河漕利害竊謂其言可採蓋京師受天下轉輸歳以巨萬計第恃一線漕河耳今年春夏間徐州一阻而二十萬糧遂不入倉若不急圖妨害明年運事不小三輔内地所在告荒太倉之米不支一年至于銀庫罄竭如掃倘有脫巾而呼者何以弭之總河大臣已經屢推伏承皇上垂問黄河事情臣聞黄河謂之神河衝徙不常最難測度先年所決之處似難一一責問今第宜及早命官不惜財力以收後效今日廷臣即推河南鳯陽二廵撫正因二臣見在地方易於到任故耳唯望聖明加意簡擇原票臣難輕改時上以黄河南決責問往日河臣故一貫囬奏云明神宗實錄東星奉詔開泇河泇界滕嶧間南通淮海引漕甚便前總督翁大立首議開浚後尚書朱衡都御史傅希摰復言之朝廷數遣官行視迄無成畫河臣舒應龍嘗鑿韓莊工亦中輟東星力任其役初議費百二十萬及工起費止七萬而渠巳成十之三㑹有疾求去屢㫖慰留卒官後李化龍循其遺跡與李三才共成之漕永利焉明史稿行水金鑑巻一百二十七
