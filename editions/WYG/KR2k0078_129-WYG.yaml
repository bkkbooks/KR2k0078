body:
  text: 行水金鑑巻一百二十九江南按察使傅澤洪撰運河水明神宗萬厯三十四年二月壬寅廣西道御史史弼言國家水患惟河為急上闗陵寢下闗運道况今之河又非昔比漸徙漸北愈壅愈決陵患難寧運道日梗所在生靈廬舍沉淵浮苴棲朩治河者迄無成功臣按先朝宋禮經營㑹通寢處河上始終數載揣髙度低集思廣益兼以國初物力豐盛法令必行是以工成一舉利垂數世今則不然大役已興而議未決丁夫方集而料巳窮驅饑疲之民於嚴寒之後枵腹墮指累累而是此不能慎始之故濱河守令半集河上沿河赤子悉赴工所徴發太煩期㑹太促洶洶生心憂在瓦解此不能防微之故昔挑王家口費金錢百餘萬今挑朱旺口又需金錢八十萬竭澤可虞勞薪難繼此不能長慮之過泇河之役亦一時權宜但河塞而後議泇則泇成宜必可以代河今導河而河流愈漫浚泇而泇河日枯二役並興一役莫竟此不能圖終之過為今之計固當廣集方畧而其要務則莫急於措處錢糧綏懐衆庶二者蓋集三省之衆於一方春深則濕氣蒸疫厲作宜析處分屯每屯相去里許於其中分任老壯多置居所分銀斗粟務沾實惠則應募者必衆應募者衆則可免調鄉丁彼鄉丁裹糧而赴千里之役去家而失農桑之期豈若應募就食者得斗粟分文之惠免流離饑凍之苦哉至於錢糧内帑可捐外帑可借而漕糧必不可留蓋漕河固國家咽喉而漕糧尤國家命脉臣竊計每省協助不過三四萬則數十萬金錢一朝可集然金錢不可食必變為粟米臣聞山東河南江北地方頗稔誠厚值以募米商而捐其稅米商必集米價自平轉三省粟以供數萬之衆何憂不及又臣觀今日諸臣人持一心山東諸臣利河南流河南諸臣利河東下兩議相持阻撓四出敗乃公事莫甚此曹乞亟選賢能同心戮力以㡬平成之功不報八月辛酉河道總督曹時聘言國家二百餘年自徐而下大都以河為運邇來遷徙不常數失其利非二洪告涸則諸溜難前内外臣工蒿目腐心莫不以無漕為慮幸泇河一線先河臣舒應龍剏開韓家莊以洩湖水而路始通繼則劉東星大開梁城候行莊以試行運而路漸廣比至三十二年李化龍上開李家港鑿都水石下開直河口挑田家莊殫力經營行運過半而路始闢至三十三年二月内該臣接管見得改挑經始運艘將臨立限嚴催多方鼓舞莫春首夏接踵告完是年行運者八千二十二隻今年糧艘七千七百六十五隻盡數渡泇則泇之可賴豈不昭昭在人耳目哉然漕渠成矣河官未設閘座建矣官夫未定轉輸通矣置郵未改萑苻警矣司捕未立兼之閘禁未嚴節宣失度水利一洩立覩膠舟臣不敢虧一簣之功廣集衆思謬畫善後六事以聞一議以兖東道加管河二字於原領敕書内管滕嶧二縣河務兖州府馬捕通判及嶧縣縣丞俱令兼管泇務以便責成一議以黄家閘官夫移之韓莊留城閘官夫移之臺莊馬家橋官夫移之頓莊專司啟閉一議趙村為邳宿適中之地萬家莊為邳嶧適中之地各添設一驛以便應付一議於嶧縣臺家莊地方添設廵簡司置廵簡一員弓兵四十名以備干掫一議禁勢要人員不得恃强阻撓閘務以節水利一議補築殘隄截削灣觜展闢陿岸疏浚淺沙以収全功皆從之九月辛未河道總督曹時聘以朱旺決口既塞疏聞因條議十事一移置專道一増設河官一剏築隄防一建立舖厰一分别賞罰一乆任責成一申明職掌一嚴禁那借一議處河夫一除豁占田工部覆如議上諭部臣連歳公帑民力俱竭於河上役不可再宜懐永圖既稱大壩已成全河東注必使盡出中路方保無虞趂此秋涸將一應南北隄岸儘力修築屹如山峙自然水得所歸方堪永賴所議十事俱依擬朝廷不惜􅅷賞亦不事姑息可即行與河上諸臣知之十月辛亥廕原任總漕工部尚書劉東星一子入監讀書以議開泇河功成故也明神宗實錄明神宗萬厯三十五年二月癸邜工部覆議泇河善後六事俱依議行從總河曹時聘之請也去歳漕河再決蕭碭之間以巨浸為憂自楊村集而下黄堌口而上再築再塞凡用夫二十萬人金錢八十萬緡至是乃言全河既已就軌泇河委應厚終開泇於梗漕之日固不可因泇而廢黄漕利於泇成之後亦不可因黄而廢泇兩利俱存庶緩急可賴如謂南陽之患巳去而徐邳之險可乗異時有失誰司其咎乎因議築郗山之隄削頓莊之觜平大泛口之溜浚猫兒渦等處之淺建鉅梁首衝之閘増三市徐塘之壩以終泇河未就之功又議設河官置官夫建驛遞立廵司嚴閘禁加裁展以成新渠其後之務大率皆切近無甚糜耗然亦自去歳冬月三請乃下四月戊申河道總督曹時聘疏言夏鎮分司原管閘河上自株梅下抵黄家運渠地方不過百里自梁境以下俱屬中河故責任差輕自萬厯十六年黄河盛漲倒灌鎭口遂議將梁境鎮口並丁家集縷隄盡屬夏鎮責任巳倍矣然此不過百五十里之河耳今泇河既開自李家巷至劉昌莊則係沛縣自劉昌下抵黄林則入滕嶧之境延長一百六十餘里悉係漕艘使官仍主事則品秩未崇敕諭未頒則事權不重宜將夏鎮主事改為郎中頒給敕書照中河事例庶事權重而臂指相聨漕渠永賴矣章下所司七月壬寅查核通灣所失糧艘自閏月甲申以前戊寅以後屢有漂溺凡損船三十三隻米八千三百六十石渰死運軍二十六名其沿河民戸漂沒者不復能稽畿輔通志祥異志考中是年並不紀及水災乃通灣漂沒人船糧米如此之多甚至沿河民戸被害者不復能稽而考不之及甚矣志乗之失載者多也十二月甲子總河曹時聘以泇渠告成核實工費再請錄効勞官員事下工部明神宗實錄明神宗萬厯三十六年二月乙丑工部再請覆覈泇河工費及効勞官員㫖命廵漕御史查勘分别以憑激勸明神宗實錄明神宗萬厯三十七年十月乙丑廵漕御史顔思忠條議申飭漕規一建閘壩以竟前工徐塘猫窩等處流沙為患先河臣議於閻家集田家口呉家冲建閘三座以備蓄積於徐塘河王文溝王市溝建石壩以備分洩於張村長旺等口各築截河二壩以遏流沙至泇河之水全藉南旺蜀山安山諸泉須大加疏通令泉脈湧注又滄浪水改從針溝口入泇自源槩委亦濟運之上䇿也一設官建驛以保萬全泇河南北二百六十里人舍稀少盗賊公行議將徐州水驛移之泇溝邳州水驛移之田家口以兖州泇河通判移駐臺莊徐州管河同知移駐王市口邳州管河同知移駐直河每春夏行運之時以徐州叅將移駐猫窩沙溝守備移駐韓莊鄒山地方聲勢相倚河溝為之肅清矣餘覈造船以資輓運修潞河以濟起納嚴法令以肅漕政章下部戊辰廵漕御史顔思忠直陳新河可開之狀先是議者以國家漕運専恃㑹通一河欲更開膠河以防不虞㑹以人情不調報罷思忠言膠萊新河南自麻灣通南海北自海倉通北海地之相距計三百四十里除麻灣南抵淮揚七百里海倉北抵直沽六百里商賈通行無容别議中間河寛水深工力省便者麻灣至抱浪廟等處約共百九十里河窄水淺及金未挖修者抱浪至陳村閘等處約共百五十里分水嶺地形頗髙尤宜深浚約畧其費可不及十五萬大都小沽河可以灌中叚大沽河以灌陳村之南白河以灌分水嶺南旺山河以灌新店之北以及中間諸河泊之水以濟助之凡有水來必挾沙至黄泇二河豈無衝沙焉得一一躱避唯當倣臨清濟寧事例建閘設夫時常修浚於大小沽河上源修蓋土壩以障沙來或建造斗門以防水漲因勢利導隨機曲防在臨時酌量行之耳此一役也沿岸而行萬無一失既非有黒海開洋之險又非有黄河遷徙之虞居恒則兩路兼行遇變則此或有滯緩彼尚可來國計民生無便於此下工部議明神宗實錄明神宗萬歴三十八年七月甲子河道總督劉士忠奏糧船六月初十日盡數過洪報聞九月丁已直隸廵按蘇惟霖疏陳黄泇利害請專力於泇其畧言黄河自清河縣經桃源北達直河口長二百四十里此在泇下流水平身廣極力推運舟止日行十里然以别無所經故必用之自直河口而上厯邳徐二州達鎮口長二百八十餘里是謂黄河又一百二十里方抵夏鎮東自猫窩泇溝達夏鎮止長二百六十餘里是謂泇河東西相對舍此則彼黄河水在三四月則淺與泇同若正月初旬後洶流自天而下一歩難行又其水挾沙而來河口日髙一日七月初輙淺涸十倍無一時可繇者繇之溺人損儲害甚劇泇河一水安流歳修有例既無溺溜終鮮風波率而繇之計日可達即河身稍狹則水不若鋪灘而淺其猫窩諸淺亦不必浚蓋自河流至則閘水積山泉之脈止有此數河身髙則髙受低則低受深淺相隨非云水深則深水淺則淺水之多寡不係河身深淺也或有稍宜拓而浚者但得實心任事之河官嚴其稽覈因利乗便不三五年缺畧悉補可成數百年之利唯於泇下流諸口謹嚴防禁而夏鎮之吕公堂邳州之沂河口更甚庶所藉䝉獨諸泉洸泗濟諸流不至隨到隨涸伏乞敕下工部詳酌利害一意修泇以濟新運留中十月壬申朔工部給事中何士晉等言運道最稱險阻人力難施者無如黄河先年水出昭陽湖夏鎮以南運道衡阻於是開泇之議始決入直河口經猫窩抵夏鎮長二百六十里較黄為近避淺澀急溜二洪之險建閘置壩聚諸泉河之水以時啓閉用之六年通行無滯今歳忽有舍泇繇黄之議卒致倉皇損傷糧艘且有淪溺以死者費人工牽輓有至大浮橋以閼塞復還繇泇者以故今運抵灣甚遲汲汲有守凍之虞由此言之黄之害大畧可見然泇亦未竟之功也河面濶八丈底闊三丈深一丈三尺至一丈六尺不等節年雖有増修大槩止此地近湖山戽泉引水易盈易涸全藉人工深厚使有容受瀦蓄之勢若河身太隘伏秋則山水暴漲旱乾則枯竭無餘非䇿也謂宜挑廣浚深令與㑹通河相等重運回空徃來不相礙廻旋不相避即時有亢潤地有髙下而水常充盈舟無留滯計歲捐水衡數萬金督以亷能之吏為期三年可以竣工然後循駱馬湖北岸東達宿遷大興畚鍤盡避黄河之險則泇河之事訖矣或謂泉脈細微太闊太深水不能有不知泇源逺自䝉沂近挾徐塘許池文武諸泉大率視濟寧泉河畧相等吕公堂口既塞則山東諸水總合全收加以閘壩隄防何憂不足或謂直抵宿遷此功迂而難竟是又不然夫昔年不估以二百六十萬乎不慮山水暴漲河水泛溢乎不慮石硼山礓難鑿沙淤奔潰乎王市壩不再築再圮乎夫荒度誠難不無錯愕及任用得人綜理有法功成晏如此難與衆人慮始也然近日繇黄之説蓋因泇河二百六十里曠野新闢人跡荒凉萬艘蟻泊公私旅困恐生意外之虞且計徐州一大都㑹貿遷化居者一旦有折閱之恨然此害之小者唯是飭郵傳設機防繇之既乆漸成樂郊何必徐土此亦破紛紜之一説也不報十一月丙午廵按直隸御史畢􅅷康議請修保定清河閘座其畧言保定清河源發於滿城抵府而南十里則湯家口為上閘又十里許則青陽為下閘順流而東直抵天津細遡長流一帶舟楫由玊河而北亦入於天津又迎水面西三百里至紫澱三岔口其一派通定興易州等處一派通新安雄縣安州等處中流至府清苑完唐滿慶五處此皆舟楫所到之地小民獲利之所查二閘剏建於成祖定鼎初補修於世廟三十九年日乆頺弛今上之三十二年曽一議及以物力殫耗報罷臣詢之彼中士民咸謂此閘之興有五利焉夫陸地轉輸一牛車運米粟不過十石而人牛又自齎食復費十之一二今以淺船裝載二人撑之可運七八十石是淺船一可當牛車之十力半功倍其利一滿城完唐等縣所出𩔖多朩石柴炭天津河間等處又饒蘆葦鹽米南貨種種若河道流通商販往來農末相資有無相濟地方即不幸而遭水旱之災猶可仰給鄰封不致束手待斃其利二此中居民𩔖窳媮相習不復知有江南水利灌溉之事自去歲大旱今歲自春徂夏不雨閘壩決裂蓄洩無資若此閘誠修則濱水斥鹵可為沃壤其利三嘗考京東密雲京北昌平自萬厯元年總督劉斯㓗楊兆議建疏通潮白二河陵泉諸水歳漕山東河南粟米二十萬石以贍密鎮歲漕江北粳米二十萬石以贍昌平兩鎮軍士從兹免於脫巾之虞今若比例通州穵運之例自清河閘抵河間一帶多設閘座廣造剥船總其事於天津部屬歲於臨德兩倉粟米内漕二十萬石以給保定易州紫荆各闗軍士即有水旱之災可以不苦軍國用饒士馬騰飽其利四凡民可與樂成難與慮始矧年來物力空匱庫藏殫耗倘䂓模大閎庸衆駭聽莫若先建此閘二座石柱朩橋二座以觀河道流通居民利渉啇賈往來之效倘公私上下曉然知此役之興有益無損有利無害然後次第議及穵運之事他日足食足兵之政實始基之矣其利五章下部部覆除穵運事隸戸部聽該部議覆外所稱修閘事鑿鑿可行宜着該管地方從長措處次第興工完日將用過夫匠物料工價造册奏繳清册送部查考施行報可明神宗實錄明神宗萬厯三十九年二月乙酉工部題覆總理河道右僉都御史劉士忠泇黄便宜疏言泇梁厯春而夏沂武京河山水衝發有沙淤潰決歲終當如南旺例修治其水將置何所乎勢不得不塞泇河壩令水復歸黄臣議每年三月初則開泇河壩令糧運官民船繇直河口而進以便利往至九月初則塞之每年九月初則開吕公壩入黄所以便回空與官民船往來至次年二月中則塞之半年由泇半年由黄此兩利之道也乃黄河四驛而泇止一驛甚屬不均今地方勢難加設惟四驛止應付半年頗為空閒於内裁革一驛移至趙村以便供億又泇河通判相應移至萬家驛左右以便查閱修築通泇二百五十里設兩驛一廵檢司又置一府㕔行見成聚成都官民船當赴之如歸誠一勞永逸之計報可四月壬申工部侍郎劉元霖御史蘇惟霖言泇河之在直隸者有猫窩一淺為沂下流河廣沙深不可以閘最為泇患今觀河沙口門兩讓箭許掘一月河洄流即清宜於此下二里許仍西掘一月河以通沂口之月河凡水挾沙來河性直走有月河以分之則洄伏之處沙所必儲就此二里特加撈刷比歲修十五丈之河難易較然而泇患可減矣又邳宿同知所管左黄右泇歲費三萬兩貯邳乆之弊滋移貯淮庫而闗支往返耗廢悮工議將此項經解總河收發附近藏積每季河官先期赴領便宜給發季有報歲有稽則費不虚而工早集矣依議行十一月辛酉工部給事中馬從龍言今歲阻凍皆以水涸為辭當令管河衙門預為挑淺其山東地方泉源預加疏浚留中明神宗實錄明神宗萬厯四十年六月庚辰以通惠河衝決奪指揮馬鴻功等俸三月仍行河臣嚴飭挑浚修築八月已丑河道總督劉士忠言泇黄並用每歲三月開直河口壩及彭家壩閉呂公堂壩俾汶泗諸泉之水繇泇專行重運及袍服鮮貢等船至八月終則塞之每年九月開呂公堂壩閉彭直二壩俾諸泉河入黄以利回空及官民船至次年二月終則塞之半年繇泇半年繇黄相資兩利章下所司部覆如河臣言上是之明神宗實錄明神宗萬厯四十一年十一月戊午廵按直隸御史潘之祥言臣廵厯燕趙梁宋之區日視滹沱漳河之水洪流洶湧隄岸潰拆民居頺圮行旅蕭條臣心憂之已自大雄駕小艇入齊魯之境夾岸悲號愁聲滿耳則皆濵海之竈民為海水所漂溺逃竄者也今朔風戒嚴祁寒怨咨災傷之民無衣無食野棲露處可為寒心伏乞皇上垂憐賑恤不報明神宗實錄是年十一月内該帶管河道漕撫陳薦檄郎中何慶元揚州道熊尚文開寳應縣𢎞濟河北月河一道長一百三十丈南月河一道長一百五十丈又建近湖西隄九淺七淺滚水石壩二座于明年工完按𢎞濟河南北二閘毎遇夏秋淮水漲發二閘不及吞吐行舟覆溺至是開挑月河剏建滚水二壩分殺河怒水溜遂平南河全考明神宗萬厯四十四年三月丙申戸科給事中商周祚言今歳漕糧除改折截留外亦宜如期輸運而水淺舟膠大為運梗所需河臣料理其勢倍切乞速用總河大臣仍促其星夜赴任以理漕事不報五月已邜廵漕御史朱堦言漕政一修浚泉湖國家歳漕由江河抵邳水常虞溢由泇入閘厯閘抵衛水常虞涸此其大較也自夏鎮而北别無運道不過賴閘河以利渉耳此河半屬枯澀先臣宋禮築壩戴村奪二汶入海之路灌此成河復導洙泗汴沂諸水以佐之汶雖率衆流出全力以奉漕然行逺而竭巳自難支至南旺復分其四以南迎淮六以北赴衛無崑崙之源多尾閭之洩能無疲於奔命哉况此泉遇夏秋而漲遇春冬而涸遇雨而漲遇無雨即夏秋亦涸先臣逆慮其不可恃也乃於沿岸陂澤如所謂昭陽南旺馬踏蜀山安山諸湖設立斗門名曰水櫃漕河水漲聽其溢而瀦之湖漕河水稍決其蓄而注之漕積泄有法盗決有罪夫然後旱澇俱有恃而無恐無奈法乆禁弛湖多曠土人遂垂涎其間昭陽一湖巳作藩田其餘諸湖髙亢處半為勢豪占種其最窪下者或有行潦閘壩坍塌地勢淤淺蓄得㡬許所謂溝澮之盈涸耳曽何濟於運哉而職司儹餉者不過受事之初督令修浚下亦以空文應之頃山東半年不雨泉流㡬斷職按圖而索水櫃管河府佐茫然也乞敕總河撫臣躬親踏驗凡係先年濟運各湖清查歸官隄壩斗門亟時修築處處蓄瀦有餘漕臣不至遇旱而束手矣從之十月丁已廵漕御史梁州彦上漕河事宜一修治黄泇自泇渠告成歳避徐沛之險而不虞黄河之近廢不復修廷臣以為漕利而不知漕終以此受病也年來一決狼矢再決三山復決塔山璧馬空沈此塞彼潰今歳狼矢又見告矣以洑流漲發髙與隄齊俯矙徐城如累卵決於南則靈睢為壑而泇虞徑㵼決於北則以泇為尾閭運隄宛在水中漕舟不能飛渡也為今之計宜議經乆使徐城不憂建翎泇岸不為黄據或于徐靈一帶䕶城舊隄増卑培薄繕治堅完庶㡬不逄其害或于直口遞北運道剏築隄岸迤西縷河而止此隄既成有禆牽輓兼足為田廬屏障不然旋塞旋決民勞已甚且濁流歳齧泇底告淤將無泇矣一修治東省以北漕河漕艘過洪必按例具報而過此則否豈非以一入東省便可順流北趨耶乃如汶如濟如衛昨歳既苦膠淺而今歳白河更甚矣謂宜覈泉河之舊址而勿為豪右所侵疏衛河之淤塞而勿為私閘所閉浚白河之壅沙而勿為淺夫所冒破夏鎮以北其通行無礙乎明神宗實錄萬厯四十五年七月帶管總河陳薦檄郎中李之藻督揚州府通判馮乗雲築黄浦閘下南岸一帶至射暢湖止長五十里其明年郎中徐待聘復督淮安府同知劉天惠築北岸一帶長五千九百七丈至次年告成南河全考行水金鑑巻一百二十九
