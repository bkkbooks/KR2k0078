body:
  text: 行水金鑑巻一百三十七江南按察使傅澤洪撰運河水聖祖仁皇帝康熙二十八年正月二十九日駐蹕𤓰洲陳家灣地方奉上諭髙郵州南北一帶殘缺甎石工程著修理二月二十五日工部議修理下河具題一案桑格捧出原疏轉𫝊上諭著扈從諸臣議奏㑹議得先經工部具題内開侍郎凱音布疏稱挑浚串塲河並丁溪草堰白駒石䃮及車兒埠下滔子河起至苦水洋之處俱照凱音布所題令其挑浚等語查近差侍郎徐廷璽巡撫于成龍㸔閲下河具奏之處工部議自丁溪至白駒有通海之口三處計三十七里應令商人挑濬其餘地方及石䃮俱行停止等因繕寫摺子具奏應將串塲河石䃮無容再議外其丁溪草堰白駒等河先經于成龍孫在豐俱稱應挑其凱音布亦題請挑濬應將此河仍令挑浚又自滔子竈挑至苦水洋之處詢問侍郎徐廷璽巡撫于成龍據稱河垜場河水流入苦水洋丁溪河水亦流入苦水洋且滔子竈上有歸入丁溪場之馮家壩小河一道相隔七里餘如將此處挑濬則河垜之水可由丁溪流入苦水洋等語應將凱音布自滔子竈挑至苦水洋三十二里之處停止將近丁溪之馮家壩河道令其挑濬其餘俱照凱音布所題再查上河為下河之本源互有相闗之處若令交與侍郎凱音布挑濬恐各籌所司之事反致誤工亦未可定今責成一人總理督修則上下河道可以兼顧相應將下河事務交與總河王新命務期速行挑浚完工以仰副皇上愛民至意其凱音布挑河見用錢糧令交明王新命後回京可也奉㫖依議三月初三日奉上諭朕前閲中河初疑其狹隘今行經丹陽閲視河道亦復狹隘又聞衆官民俱言中河挑濬有益所闗甚大爾等㑹同總河總漕確議具奏初八日該臣等㑹議得從前挑浚中河原避黄河一百八十里之險且收束散漫之水使不致淹沒民田㸔河諸臣亦疏稱若行中河則一百八十里之險可避止因黄河逼近不便挑寛等語今我皇上南巡省視民生經過丹陽又見與中河寛窄相等詢訪官員百姓命臣等㑹同總河總漕確議具奏仰惟皇上從前諭㫖原欲收束漫溢之水拯救被災之民使淹沒田地得以涸出故前任總河靳輔挑浚中河今水勢業巳收束且避險就易於民生漕運甚有禆益應將中河無容另議其駱馬湖口先經尚書張玉書等㸔河之時題修減水壩二座今王新命稱丈量水深二丈有餘難以建壩且需錢糧甚多應停其建築編竹簍以盛石塊髙出水面二尺成造堵塞若水大可以浮面洩出等語又支河口先經張玉書等疏稱建造板閘一座應令隨時啓閉今王新命稱若建閘水大之時必致衝決應停其建閘留出水之口於南隄下埽堵塞等語此二處建閘修壩用竹簍下埽減洩溢水與㸔河諸臣所題其理無異但照總河王新命議建造修理所需錢糧減少應照王新命所議建造又駱馬湖減水三壩先張玉書等疏稱將二壩之水令流入中河其一壩之水留在遙隄之外令流入海今據王新命亦復稱善應照張玉書所題又張玉書等稱裏運河駱馬湖之水俱入中河河窄難以容納應於北隄建修減水壩三座今王新命稱若欲建壩所費錢糧必多應停其建壩亦用竹簍以盛石塊堵水若有大水可以減洩等語先張玊書等欲建壩減水今王新命用竹簍盛石減水俱係洩水之意亦照王新命所議修造可也奉㫖依議八月十五日工部題覆總河王新命疏稱儀真四閘䝉皇上聖明洞照加意運道民生行令修理臣查新河口之北新洲原係江心長成之沙今欲挑穵成河從來未經試驗之事可否挑成難以預必即挑成之後果否不復淤長尤難逆料且糧船皆由一閘經行未見阻滯所有一切重運似應仍照歴年由𤓰洲閘入運河其儀真挑洲開河并修理四閘俱應暫停飭令量為修葺以利回空船隻俟沙洲變遷可以通漕之日再行興修等因前來查先經原任總漕慕天顔將𤓰儀二閘題請大修臣部議行新任總河親詣確勘作速具題到日再議等因具題奉㫖朕前巡行江南經過儀真地方見水淺閘壊行船艱難俱宜修理著再議具奏欽此臣部議行河臣王新命將儀真𤓰洲二閘作速修理等因具題行文在案今該督雖稱北新洲原係江心長成之沙今欲挑穵未經試驗糧艘皆由一閘經行未見沮滯儀真河路并四閘暫停使各省漕船盡由𤓰洲一閘進口勢必長江内漕船頂阻守候以致遲誤亦未可定應請勅下總河總漕江南江西總督㑹同確勘定議具題到日再議可也奉㫖儀真河閘關係運道著河道總督㑹同江南江西總督漕運總督詳閲定議具奏今據總河王新命㑹同江南江西總督傅臘塔漕運總督董訥疏稱儀真牐外江口北新洲一帶俱係乾涸而北新洲之外又有沙漫洲過水不過二捺餘横亘二三百丈難以築壩若自沙漫洲尾從北新洲腹内向東北斜開引河以通四閘不能保無坍淤似應仍挑北新洲舊河身直通四閘一切糧艘令循沙漫洲尾轉入新河口可以通行其日乆或有淤阻之處聴河臣酌量挑濬所有應挑土方并修閘工料銀兩聴河臣確估等因前來查儀真河口闗係運道民生今河道總督等㑹同詳閲仍挑北新洲舊河身直通四閘一切糧艘令循沙漫洲尾轉入新河口可以通行等語應如該督等所題交與總河挑濬修理其挑河修閘所需工料銀兩應令總河確估具題可也奉㫖依議河防志聖祖仁皇帝康熙二十九年總河王新命奉上諭河道闗係最為重要巳前一二年雨水鮮少河道官員必將河務視以為常事今年景象雨水似多應行文總河著嚴行曉示所屬官員無分晝夜防守務使河道不致有危山東兖寧道册十一月十一日總河王新命題奏丹衛河道情形竊照臨清以北一帶運河每嵗重運經臨厯多淺阻因考有河南小丹河可以通流入衛濟運曾經題明親往看驗在案臣於十月初七日自清江浦起行循河而至河南懐慶府河内縣細閲丹河發源太行山至丹河口分渠九道大丹一河直歸懐慶沁河其餘六渠民間引水種竹溉田約計一千四百餘頃止小丹河上秦河二渠灌溉所餘之水涓流通衛臣仰體皇上漕運民田均闗緊要之至意諭令所在紳士耆民於每嵗三月初用竹絡裝石横塞八河渠使水歸小丹河入衛以濟漕留涓涓之水以溉地至五月盡重運過完則開八河渠用竹絡裝石塞小丹河口以防山水漫溢士民咸為稱便其小丹河經修武獲嘉以達合河鎮之處若有淺阻責令印河各官量為疏濬至輝縣搠刀泉在縣西北五里蘇門山下清水一泓約二十餘畆泉珠上湧難以數計即詩經所詠毖彼泉水也民間設立五閘蓄水灌田約三百頃往例於五月初一日封板放水濟運唯是五月正當農人需水之時未免有妨農務臣親行看驗閉板始可通渠灌田啓板則泉流直瀉各渠立涸應亦用竹絡裝石量渠口之髙下堵塞使各渠之水常盈而所餘之水晝夜長流以濟運其萬金渠出自彰德府安陽縣西南六十里善應村山下約二十餘里至髙平村昔人建牐開渠引水溉彰德府西南東三面地約計百頃仍由彰德府東北五里許入安陽河其牐二門閘門髙不過三尺寛不過一丈臣親行啓驗一啓板渠即斷流未免有妨農務亦應照五閘之法用竹絡裝石塞閘通渠漕民兩便士民莫不懽欣頂頌皇仁再今重運不由黄河俱由中河以上較昔甚早五月封板之議相應停止臣復循衛河至臨清由水路抵甲馬營等處節節查驗凡有淤淺處所俱經責令地方官大加疏浚所有㣲臣查看過丹衛河道各情形理合題報河防志聖祖仁皇帝康熙三十年四月初七日工部㑹議得河南巡撫閆興邦疏稱衛河并丹河萬金渠閘作何開塞有益漕運民田奉㫖行臣確定到日再議臣隨親查丹河源發晉省流入黄河因百姓開渠灌田外又開大渠直達運河始有小丹河之名也前河臣王議用竹絡裝石塞渠濟漕留涓涓之水溉地誠為得計但今重運俱由中河北上較昔甚早如雨水勻足照河臣所議用竹絡裝石塞口濟運灌田倘遇亢旱請每年三月初一日起至五月十五日止令三日放水濟漕一日塞口灌田以後聴民便用再搠刀泉乃衛河之源建立五閘蓄水灌田每年五月初一日封板濟運但五月正民間需水之候應照河臣所議用竹絡裝石堵塞使泉水直流濟運餘水灌田至萬金渠水自髙平村建閘門渠灌田之後仍歸洹河暢入衛濟運亦應照河臣所議用竹絡裝石塞閘通渠以便民漕等因前來查該撫既將衛河丹河萬金渠親詣勘明確議具題應如該撫所題將丹河如遇雨水勻足之年用竹絡裝石塞口濟運灌田倘遇亢旱之年每年自三月初一日起至五月十五日止令其三日放水濟漕一日塞口灌田以後聴民便用至衛河五閘萬金渠閘亦應如所題用竹絡裝石塞口濟運灌田俟命下之日知㑹總河可也奉㫖依議河南管河道治河檔案重凡天下河道通塞闗乎水利唯獨江南漕渠在行運則不能兼濟民生至康熙二十三年翠華臨幸見下河昏墊多方拯救今讀其恩綸猶令人感激涕零閆中丞疏言丹衛萬金渠閘而以濟運灌田並行不悖俞㫖允行君都臣俞何啻唐虞聖世哉聖祖仁皇帝康熙三十一年二月初二日工部題奏臣等議得户部侍郎博濟等疏稱髙郵州等處減水壩九座内有八里舖車邏鎮二壩底石被水衝損其古溝東減水壩底并北二壩底衝損之處均應令堅固修理髙郵州以南五壩應仍照原定限期開放永安隄改下竹絡尚有未完應速行修完瓜洲閘二座月河一道儀真閘四座運河一道俱係新工北運河東隄舊減水壩三座新修竹絡減水小壩六座俱係建造以防異漲東隄兩面所下之埽朽爛西隄殘缺單薄取土甚難且於運河無害似應暫緩東隄迎受河水闗係運道應於隄岸排樁之間下埽修葺駱馬湖所建竹絡壩中段被水衝壊若於湖口上流百丈許東挑月河一千餘丈西挑月河一千餘丈分殺湖水於中河似有禆益支河口束水壩迅流無阻中河北岸減水壩二座攔馬河減水壩六座俱係建造以防異漲中河見今漕船經由甚便禹王臺所建竹絡壩一段土隄一段堵塞入駱馬湖之水今由沭河下海於中河有益下河丁溪草堰白駒新建閘座始行興工車路引河尚未挑完應速行修建其岡門河水迅流無阻等因前來查侍郎博濟等公同確勘既稱𤓰儀閘河俱係新工北運河攔馬河中河減壩俱係建造以防異漲支河口束水壩并岡門河水迅流無阻中河見今漕船經由甚便等語俱毋容議外其餘應行培築修造閘壩隄工并挑月河之處均應如所題行令總河於嵗修内動支錢糧作速堅固修理工完造册題銷再疏内稱運河西隄殘缺單薄又稱取土甚難且於運道無害似應暫緩等語但運河闗係重要應否暫緩之處應令總河靳輔親詣確勘定議具題到日再議可也十一月二十四日奉㫖中河張莊運口築隄建閘等情著河臣將工費估計題到再議具奏河防志聖祖仁皇帝康熙三十三年築中河兩岸束水隄是年修廣濟閘在治西仲家莊舊名仲家閘至是修之改今名清河縣志聖祖仁皇帝康熙三十四年建永濟閘在甘羅城南太山墩北與惠濟閘相望亦通漕運又建康濟閘在治東陶家莊右又建雙金門閘在廣濟閘北鹽河内又建小閘在雙金門閘北清河縣志聖祖仁皇帝康熙三十五年正月内河撫李國亮題為恭請改復等事奉㫖該部議奏部臣等查得河南巡撫李疏稱豫省漕厰水次舊設衛輝府北門外嗣因監兌部員駐劄直𨽻大名府小灘鎮隨將漕厰移於彼地相沿至今上年十一月間臣親詣視漕確勘細探衛河一帶舊為行漕故道直抵通州見今商賈船隻往來不絶漕艘亦無阻滯合無仰籲皇仁允賜改復衛輝兌運水次以本省之銀買本省之米就近盤剝實為至便但老鸛嘴地方有大石二塊相去五里横卧河邊中間率多碎石平常水勢本自無妨偶遇最淺之時應仍就小灘鎮購買庶民便通融而糧無貽誤查該撫既稱小灘鎮水次改於衛河水次以本省之銀買本省之米就近盤剝實為至便應如該撫所題改於衛輝府水次毋致阻滯兊運可也奉㫖依議河南管河道治河檔案聖祖仁皇帝康熙三十六年十月十五日大學士伊桑阿等面奉上諭下河地方乆罹水患朕心時切軫念前命挑濬白駒岡門等口原欲使水盡通流田皆涸出見今興化泰州等州縣積水尚多田仍淹沒民生甚屬苦累著行文總漕總河親往㑹勘將下河積水何故壅塞不能迅流應作何盡令歸海涸出民田之處一一詳閲議奏十一月初三日總漕桑格等㑹題該臣等看得下河為洩水入海之區自淮安以至邵伯鎮計運河東岸共有涵洞三十處閘十座滚水壩八座此皆運河及髙郵邵伯等湖之水由諸涵洞閘壩等口歸入射陽廣洋等湖就下流以至白駒岡門等口入海總由下河受水之處甚多而洩水入海之口猶少是以水勢汪洋易於停蓄在雨𤾉時若之年水循故道田猶無恙唯去嵗及今兩年夏秋霪雨異常諸河泛漲以致水勢洶湧通流不及瀰漫四散而下河之髙郵寶應泰州興化鹽城廟灣等處地皆窪下均受其災興化地方更低積水猶甚䝉我皇上念切民生特頒俞㫖令臣等詳閲下河情形將積水壅塞不能迅流之處作何盡令入海涸出民田真我皇上巳饑巳溺之懐而百姓無不共仰如天之徳者也臣謹欽遵沿河踏勘詳閲洩水諸口除廟灣岡門白駒三口水頗暢流無庸置議及興化通丁溪草堰白駒之車路白塗海溝引河三道并射陽湖下海之蝦溝鬚溝䑃朧院道港又髙郵湖通邵伯湖之曹家灣湯家絆七節橋目今水未全消不分隄岸無由勘明必須水落確勘再將應行疏浚情形另疏請㫖外今將臣等閲明亟宜疏浚各口及應建閘之處為我皇上陳之一髙郵湖之水勢宜分也查邵伯鎮南有金灣三閘閘南有金灣滚水壩一座三閘之水由人字河入芒稻河下江其金灣壩外原無引河今議於壩外挑引河五里通人字河將髙郵湖之水引入邵伯湖由金灣閘壩同歸人字河入芒稻河下江其人字河計長十八里見今淺窄應加挑浚又芒稻河原有舊閘二座西閘六門東閘三門今俱損壊應加修建如是不但邵伯湖水不至下河髙郵湖水亦可分洩而下河受益矣一車兒埠入海之口宜開也查泰州河垜塲有車兒埠口其上流乃髙郵漫漲之水及興化梓新河之水均至河垜塲之老壩滙流於車兒埠口以至不能宣洩今議將車兒埠口至姚子竈四十里河身淤淺應加挑浚姚子竈至苦水洋三十餘里間有河形應加開導入海其車兒埠口老壩兩處各應建閘一座以備啓閉而泰州之民田受益矣一丁溪入海之口宜通也查丁溪閘口至撈魚港六十餘里河勢深通無容疏浚自撈魚港至苦水洋七十餘里河身淤澱若循舊河挑浚其河勢甚平不能迅流費帑無益今相度情形議於撈魚港之北就近直挑十四里即入王家港下海而丁溪入海之水疏通矣一小海塲入海之口宜開也查小海塲有一河形原係洩水入海故道年乆淤塞今議於小海河口建雙金門石閘一座自牐口起至鄧家窰計長四十里應照舊河再加挑深自鄧家窰起至姚子口計長二十里雖舊有河形然地勢紆迴宣洩不暢今相度情形自舊河北岸鄧家窰起向姚子口就近直挑十里以入舊河再自姚子口以下將舊河挑浚十餘里㑹入鬭龍港下海而興化又增一洩水之道矣一草堰塲洩水之閘宜增也查草堰入海之道雖暢但因只有閘口一座兼之窄小上流水大不能一時宣洩常至漫溢今議於舊閘之上添建一閘下挑月河七十丈則上流無壅阻之患矣一運河之水勢宜分也查淮安城南運河東岸有興文小閘一座此閘係分洩運河泛漲之水流入澗河由射陽湖下海見今澗河淤淺兼之閘門窄狹水不暢流今議將閘門改濶并將澗河八十餘里再加深浚以洩運河之水則運河之水不至髙郵而興化等處更有禆益矣以上各條皆臣等詳閱被災州縣積水壅滯不能迅流情形妄抒愚見以為分洩各水入海涸出民田之䇿是否有當伏乞皇上睿鑒施行奉㫖工部議奏部議奉㫖九卿詹事科道㑹同速行確議具奏淮揚道治河檔案行水金鑑巻一百三十七
