body:
  text: 行水金鑑巻一百三十八江南按察使傅澤洪撰運河水聖祖仁皇帝康熙三十七年六月十四日户部為欽奉上諭事㑹議得協運河南省漕糧任城等八衛運丁張文安等叩閽狀内河南漕糧原在直𨽻大名府小灘鎮交兌每漕糧百石給盤剝銀一兩五錢於康熙二十二年河南漕糧改折停運後於三十二年復運漕項錢糧俱照舊例支給其盤剝銀兩亦照舊例應給發濟運經今五年並未支給遇淺俱係各丁血賠苦累已極今水次改遷河南衛輝府不惟路逺千里更有﨑嶇山河盤淺過溜較之江南倍加苦累而江南漕糧每石給耗米四斗三斗不等及至牴壩俱是二五起交身等升兊升交伏乞皇上軫念窮軍積苦討給盤剝銀兩照江南定例分别逺近加耗等語又呈稱河南漕糧原在直𨽻大名府小灘鎮兌運後原任巡撫李題準改在衛輝府路途遙逺山河﨑嶇輓運甚屬苦累請將水次仍改歸小灘鎮等語查豫省盤剝銀兩於康熙十六年間因軍需浩繁裁減充餉二十二年豫漕改折停運後於二十九年經原任倉場侍郎凱等題請復運九卿㑹議漕船各項錢糧俱照舊例遵行等因具題行文在案今旗丁張文安等既稱盤剝銀兩厯經五年並未支給遇淺俱係各丁血賠苦累巳極等語應將前項銀兩準其復舊將通濟庫銀兩支給俟運糧之時將該省應支原欵動給再查康熙二十五年三月内原任巡撫李以衛河一帶為行漕故道直抵通州現今商船往來不絶漕艘亦無阻滯請將水次改復衛輝府但老鸛觜地方有大石二塊相去五里横卧河邊中間率多碎石平常水勢本自無妨偶遇淺時仍應在小灘購辦等因具題臣部覆準應如該撫所題改於衛輝府水次毋致阻滯兌運等因行文在案今旗丁張文安等既稱漕米自衛輝府運送路途遙逺山河﨑嶇輓運甚屬苦累應仍改小灘兌運如此照舊改運路途近便應將所請照江南例加給耗米之處毋容議可也奉㫖依議河南管河道治河檔案是年七月二十六日九卿詹事科道㑹議得先據總漕桑格㑹同總河董安國疏稱邵伯鎮南金灣壩下挑引河直通芒稻河閘曹家灣湯家絆七節橋挑浚車兒埠口至朱家竈挑河小海場至王家港挑河興文閘至流均溝挑河草堰建草壩挑月河車兒埠口小海口二處各建草壩并修建芒河閘興文閘共估銀一十九萬二千兩等因又據總漕桑格疏稱白塗河横挑三十餘里并入車路河其車路河自唐子鎮起至新莊止淤塞十餘里海溝河自鮑家莊起至白駒口淤塞七十餘里海陵溪自禹王廟起至仲家寨淤塞四十餘里蝦鬚二溝戛梁河共淤六十餘里朦朧西首之射陽湖淤塞四十餘里挑浚通共約計銀二十五萬餘兩所費甚繁不敢輕議動帑臣欲倣直𨽻挑河之例開一事例令其挑浚等因前來查下河岡門丁溪草堰白駒等處康熙二十六年經原任侍郎孫在豐挑浚二十八年又經原任總河王新命挑浚積水並未入海徒費錢糧或係海口髙阜而内河低窪以致積水不能出海亦未可定應行總漕總河㑹同江南總督江寧安徽巡撫如照此挑浚下河積水果能入海田地果能涸出有益民生江海有無倒灌之處逐一確勘定議具題到日再議可也十月十一日總漕等㑹勘得下河各州縣地方厯被水災嵗無寧土者皆由上源受水之處甚多而洩水入海之處甚少兼之各邑通水故道俱多淤澱以致泛濫横溢成此積水之患也今欲救此巨災舍開浚故道多分水勢之法别無善䇿是以前疏内議修芒稻河者欲分髙郵邵伯兩湖之水入江使不至下河也議挑曹家灣湯家絆七節橋者係開通髙郵邵伯兩湖淤塞之水路使通芒稻河以下江也議挑車兒埠之滔子河者欲使泰州所受之水由苦水洋入海也議挑澗河者欲分運河之水流入澗河由射陽湖下海使不至髙郵也議挑海陵溪者欲使髙郵所受之水通岡門下海也議挑車路白塗海溝三河欲使興化所受之水由丁溪草堰白駒入海也議挑蝦鬚二溝戛梁河并朦朧西首淤塞之射陽湖者欲使髙寶興泰鹽山等處之水俱由廟灣下海此海口為下河最窪最寛之地洩各處上流之水尤為宣暢也今臣等逐一細加覆勘與前無異毋容更議唯是九卿㑹議所云江海有無倒灌之處臣等細察各處海口以及江口皆係厯年洩水之舊跡而臣等所議挑建諸工皆内地淤阻之河道照舊開通使水得達於口瀉之江海並非新開江海之口自無倒灌之虞至於㑹議所云或係海口髙阜内河低窪以致積水不能出海如照此挑浚下河積水果能入海田地果能涸出有益民生等語臣等閲厯形勢海口較之内河終屬低窪見在洩水而目今水勢尚在汪洋民間被淹田地多未涸出者皆由諸河水道澱塞不通之故若使前議挑浚之工一舉水得循其故道自必下流歸海田地自當涸出實為大有益於民生十一月初七日該部議覆奉㫖挑下河事闗係民生朕軫念民生先經交與凱音布孫在豐于成龍王新命等挑過伊等已俱挑完大有益於民生等因具題檔案俱在部可查人俱在可問今看來俱徒糜費錢糧並無水涸田出有益於民之處今桑格等又稱應行挑浚具題九卿不問明先經挑過之人不查檔案即議準行如果此番挑浚果能水涸田出有益民生朕不惜錢糧即發庫銀興工捐納事例斷不可行見在山西捐納銀米事例尚未明白桑格等如果將下河照伊等所題挑濬即能水涸田出有益於民將伊本身家産出具保結即準挑浚此事監察御史吳甫生亦經條奏將吳甫生條奏事宜一并發還九卿問明先經挑過之人閲查檔案確議具奏二十六日九卿議覆奉㫖朕於南巡詳閲黄運兩河形勢凡疏濬修築事宜俱面為指示河道總督于成龍等令其遵行已有㫖了聖祖仁皇帝康熙三十八年三月初二日上諭户部朕君臨天下期於黎民樂業各獲其所凡興利除害之事靡不舉行蠲免賑濟之恩靡不下逮比年以來因淮揚所屬地方疊罹水患業巳嵗蠲額賦賙䘏頻施又動支數百萬帑金責令在河諸臣於應挑應築之處酌量修理務使氾濫之水滙歸入海被淹之廬舎田畆盡皆涸出用底幹寧乃錢糧竟爾虚費卒不能使積潦有歸田廬未涸民生未遂朕聞之惻然軫懐值茲四方無事之時欲將一切修舉事宜詳閲指示用是躬親臨幸沿途審視黄河水勢咨訪地方父老比至歸仁隄髙家堰量度地形髙下應挑應築之處巳經一一明示河臣惟是被淹地方米價翔湧生計維艱朕目擊民依深用厪念著將漕糧截留十萬石於髙郵寳應興化泰州鹽城山陽江都受災七州縣各留一萬石悉較時價減發糶餘米三萬石著於邳州留八千石宿遷桃源清河安東四縣各留五千五百石亦照時價減糶此各州縣發糶之米著就近交與漕運總督邳州著遣司官一員前往監視再截留米十萬石於揚州淮安各收貯五萬石這應留漕糧不論何處米石著就近截留爾部即遵諭行特諭初三日聖駕看閲黄河隄岸𫝊上諭王公隄甚屬險要務須加幇髙寛修築堅固初六日奉上諭諭河道總督于成龍朕初五日自淮安起行沿途細閲河隄除河底巳髙東邊甚窪毋庸置議外朕所駐蹕界首鎮前湖邊用水平測算河水比湖水髙五尺八寸揆此湖水似不能越此隄而入運河前往髙郵未知若何但當湖之石隄雖被水汕壊朕公同細閲被人搬去損壊之處亦復不少此固屬要工修築亦不甚難爾差賢員作速查驗應即儧工修築嗣後查閲工程有應修築之處照此頒㫖特諭十一日嵗貢馬泰轉𫝊上諭朕自淮南一路詳閲河道測算髙郵以上河水比湖水髙四尺八寸自髙郵至邵伯河水湖水始見平等應將髙郵以上當湖隄岸修築堅固髙郵以下河之東隄亦應修築堅固有月隄之處照舊存留有應修隄岸仍照舊隄修築堅固至於邵伯地方因無當湖隄岸而河湖合而為一矣不必修築隄岸聴其流行高郵東岸之滚水壩涵洞俱不必留用將湖水河水俱由芒稻河人字河引出歸江入江之河口如有淺處責令挑深如此條治則湖水河水俱歸大江各河之水既不歸下河下河不必挑修爾馬泰速行前去將朕㫖轉𫝊于成龍令其具本啓奏四月初二日總河于成龍等奉上諭山東采辦河工應用石塊爾即行文總河于成龍作速預運沿河兩岸俟回空糧船至日帶赴河工應用二十二日河道總督于成龍等奉上諭著將運河東岸隄工凡有石工殘缺者仍補修石工其土工隄内有水之處下埽幇築減水壩俱堵塞堅固用心防䕶越壩更屬緊要亦著加幇防䕶淮安府涇澗兩河必須挑浚深通毋任淤墊又奉上諭如有漫頂隄内積水之處即釘排樁幇築減水各壩各著堵塞堅固隄防要緊凡有懶惰河官不留心防範者輕則即行懲處重則處後斥逐切不可姑容従事致誤河工又奉上諭人字河若有窄狹處可以相機挑穵凡有需水舊口修砌涵洞令民灌田隄岸單薄處亦酌量加幇二十四日總河于成龍等奉上諭這運河東岸再加髙寛再不必開減水壩其涵洞與金灣滚壩舊有河身民間用水灌田仍照例開放減水壩著河官堵塞堅固用心防守要緊至新加隄岸亦著爾帶來官員内選擇或五十丈或六十丈責令加意防守西隄土石各工亦上𦂳儧修髙家堰亦速速修完下河田地不過一二年可以見出又奉上諭東岸有一段隄工修得甚好朕巳給箭一枝執箭説與爾知此等官若不奬勵何以服衆二十八日奉上諭于成龍爾回去即看歸仁隄高家堰清口甚屬緊要徐廷璽著往揚州去往回查勘永安各石工并東西岸各工與堵塞減水壩要𦂳將京中帶來各官每員或五十丈六十丈逐名交給用心防守毋得疎虞五月初一初二等日􅈝起西風將髙郵城北陸漫閘西隄一帶土工打通以致東隄新工浪汕殘缺至䕶城通湖各口東隄亦被浪汕坍卸又城南車邏鎮起至江都露筋止以及三溝閘至邵伯鎮止原無西隄其東隄新土浪汕入裏二三四五尺不等蕪城墩迤南一帶東隄未完之處俱皆漫水以上並河防志是月十二日河撫李題為豫省漕糧等事一疏奉㫖該部議奏部臣等查得河南巡撫李疏稱河南省漕糧原在衛河交兌後改小灘經臣視漕由衛登舟查勘河流寛深従不淺澀此臣目擊親訪最確最真惟是河南漕糧每嵗起運二十三萬餘石承辦各官擁集於隔屬小灘一隅數多期迫因而囤户商牙百般勒掯抬價騰貴且豫省産米本多今概赴外省辦運而本地之米反致壅塞衛河夙為行漕故道距小灘雖有五百餘里而漕艘赴衛裝運係空船而上受載開幇係順水而下輓運易於為力且三十五六兩年漕糧在衛兌運並無阻滯貽誤若就近小灘兌運官民均有未便今旗丁盤剝銀兩俱已支給有何苦累仍復衛輝兌運豫省官民更永沐皇仁浩蕩矣部議應如該撫所題仍復衛輝府水次毋致阻滯兌運奉㫖依議河南管河道治河檔案是月二十九日總河于成龍等看得湖河水勢唯揚屬長發隄工危險情形協理河臣徐廷璽専駐督催原派人員并臣于成龍續委各員辦料募夫協力防䕶縁由業經臣等題報在案今據淮揚道薛晉詳稱髙江境内湖河水長六尺餘寸值今五月以來每日長水寸餘不等尚未平定西岸土隄多被風浪打通東隄新築未完之處俱皆過水臣等隨行令該道親勘督防外唯是揚屬運河減壩原與髙堰唐埂徐壩相為表裏盖淮居上源而揚居下流所以兩處閘壩定例同時啓閉前因揚屬各閘壩奉㫖盡閉而唐埂等處各壩未便全堵所以揚屬之水有長無落臣等再三籌畫若髙堰小黄莊迤南一帶石工工程盡行儧修一律完竣即將唐埂等壩亦俱閉塞竭力防守或可免無他虞揚屬水勢自可消落但目今髙堰各工因錢糧不繼尚多未完若令各壩全閉不但徐壩汛内受危即髙堰髙粱澗小黄莊等處亦為可虞倘有疎失所闗真匪渺小是以準令暫開二壩實閉四壩在案至揚屬東隄雖至危急尚有金灣等壩為之宣洩即邵伯迤南東隄漫水俱歸入江與下河無碍又查東隄危險漫水處所亟應簽釘排樁行據委員估計前來臣徐廷璽見在親督各員照估修築務期速竣以資保固伏秋外所有揚屬水勢情形并見今修防縁由臣等具疏題報部議覆奉㫖依議速行今年運河滚水壩既經堵塞水勢洪大勢所必然該督著遵前㫖不時謹慎防備務使隄岸堅固六月十八日桑格轉傳上諭運河黄河闗係甚要今值夏季水漲之時應挑選賢能官員各處分守于成龍係有年之人來往巡查恐其不能現隨于成龍効力官員甚多將此内賢能大臣官員令于成龍酌量揀選㡬員具題將髙堰隄工運河隄工湖隄引河黄河危險之處俱照徐廷璽一様將各處分給在工所住遇雨水之時不時巡查看守著差出工部賢能善跑章京一員明日即行速去交與于成龍並將水勢情形看明回來本日尚書薩穆哈侍郎羅察差去員外郎費揚古具奏奉㫖好著前去閏七月十一日總河于成龍等疏稱羅溝河即名羅口發源東省雲䝉諸山各澗滙流而成沂河由沂郯而入邳境水從羅口分流出徐塘口而入運河其正河至隅頭集經入駱馬湖凡遇水發瀰漫兩岸淹沒田廬沂河兩岸應築隄一萬八千一百八十丈羅口寛八十丈應建閘座以資啓閉則邳州兩岸之民可免沂河漲漫之患而此水之由羅口分汛者仍入運河以濟運誠為兩利無害等因部議具題奉㫖依議河防志是年八月内總河于成龍等於欽奉上諭事案内具題將清江大閘加髙四層又將大閘北岸下雁翅倒卸十丈並越河閘東雁翅酥碎磚工十二丈一併改砌石工又將板閘闗口埽工一百二十丈改建石工又將盤糧㕔前埽工五十五丈淮城西門外䕶城樁埽隄工三百六十丈改建石工又估挑澗河自興文閘起至劉均溝止長一萬四千零三十二丈八尺并涇河自閘下起至射陽湖邊止長八千二百五十丈頭石工頭磚工長三十丈中石工長一百五十七丈頭石工尾磚工長一百三十一丈二尺石工磚工長一百五十八丈磚工仍修砌磚工石工加髙二層裏河㕔冊是年九月初八日總河于成龍題奏竊照南運河乃糧船經由要津又居下河七邑上游更兼髙堰六壩減出之水盡由草字河厯寶應髙郵諸河而入於此水勢浩大河窄難容是以前河臣靳輔在於髙郵南北建設大小減水壩五座題明開放定例頻年以來依期開放雖隄岸保固無虞而下河諸邑均受其患今春恭遇聖駕南巡軫念下河災黎諭令臣等大修隄岸堅閉減壩下河麥禾幸得收穫一遇伏汛水發盈隄溢岸以致髙郵九里邵伯更樓閆家涵洞皆被漫缺臣等於特疏題明等事案内酌開壩兩座上下隄岸方得保全總緣髙郵河身與山陽寳應河身相等驟受髙寶諸湖滔天之水開壩則有害於民田閉壩則有傷於隄岸欲其隄岸民田兩相保固難矣臣等往來查勘再四思維唯將洩水減壩俱改為滚水石壩水長聴其自漫而保隄工水小聽其涵蓄以濟運道較之開壩水盡東流閉壩徒費錢糧者相去不啻什伯也臣等身膺督河重任敢不殫心竭慮仰副睿懐倘䝉俞允改建則運道民生均有裨益九卿詹事科道議覆奉㫖依議十月二十日總河于成龍等題奏邵伯更樓髙郵九里等處漫決例應經管防守并承修各官賠修但需料浩繁若令賠修恐各官綿力一時不能設措難以驟告成功又致有悞重運所闗非小臣今再三籌畫莫若先借動帑銀刻期堵築勒限告竣俟工完之日容臣核實照數追補還項不過先後轉移之間而工可速竣帑仍有著也臣再有請者除髙郵九里缺口一工先行責令該管各官賠修堵築外其邵伯更樓決口一工隄下原係舊有涵洞隄内原有河形在平日隄工完整每嵗水發之時西岸一片汪洋東岸淹沒甚屬危險是以今嵗水漲以致漫缺即堵築完固恐難保守今臣等親詣斟酌估計工料若興工堵塞需銀甚多不若就此決口之下將舊引河疏挑寛深在於河東築做土隄東水南下入江可洩運河驟漲之水以固東西兩岸隄根較之諸決為費甚省不特無碍運行且將來水發可免漫漲之虞而邵伯一鎮居民永為樂土矣總河于成龍等覆題除酌改運口已經欽差侍郎常綬㑹勘議覆請㫖在案所有邵伯更樓河道乃行運要津今夏被水衝決見今水深四丈難以堵塞且費帑甚多經臣于成龍具奏將決口之下舊引河疏挑寛深河東築隄束水入江部議應如所奏令其挑築等因奉㫖準行在案行據䕶理淮揚道裏河同知常維楨詳稱督同該㕔等親勘決口迤東被水衝乆河底太深難以越過即使水内築隄工程亦難驟起况新運在即若不急議堵塞恐洩水太過有碍運道今議將決口西岸繞挑月河築隄并打攔河壩使水由月河改行而見在之決口日後自必掛口另議堵築不特省費亦可以濟目下運道之急共估用料物土方夫匠等銀四萬三千兩零俱係實工實料委無浮冒經臣徐廷璽親勘核明無異當經發帑委員照估儧挑俟工完報銷既據該道詳估前來除原册送部查核外理合具疏題估部議奉㫖依議河防志行水金鑑巻一百三十八
