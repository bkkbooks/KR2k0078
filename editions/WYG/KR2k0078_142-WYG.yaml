body:
  text: 行水金鑑巻一百四十二江南按察使傅澤洪撰運河水聖祖仁皇帝康熙四十五年正月内奉㫖於髙堰三滚壩之下挑河築隄束水入髙郵邵伯諸湖其髙郵減水壩下亦挑河束水由串場河入白駒等河入海泗州一帶受水之地酌量築隄毋令泛濫則所全於淮安鳯陽揚州三郡民生多矣揚河㕔册是年總河張鵬翮於欽奉上諭事案内題建文華寺洩水閘一座原因運河水勢大長兩岸隄土難以容受有關運道民生奉上諭特遣大人孫督令分修承造石閘一座金門寛一丈五尺六寸南岸閘墻共長十六丈北岸閘墻共長十四丈砌髙二丈四尺閘下挑引河一道由楊家廟單楊口至白馬湖一遇桃伏秋汛運河水漲隨即開放宣洩水下白馬湖水涸堵閉並將澗河挑浚深通又挑穵青溝河使澗河水勢歸海裏河㕔册是年二月初一日濟寧道張伯行為請引漳河之水入衛以利漕運事竊查衛河之水發源於河南輝縣之百門泉源逺而流長及至臨清其流漸細以故北河一帶每遇天道亢旱糧船不無淺阻查清河縣東北漳河去衛河僅十餘里康熙四十一二年大水時曾由此入衛河後被武城縣堵塞若將此河疏通將漳河之水由武城縣引入衛河則北河一帶永無淺阻之患矣若慮伏秋之時二水交發其勢太大查恩縣四女祠北減水閘下原有引河一道再加䟽通寛深使水由古河下海則運道民生均受其利矣但清河縣係直𨽻地方祈憲移咨直撫查明開浚使清河武城二縣㑹同興工此運河萬世之利也詳院批委下河通判同清河武城二縣令勘明確議即飭㕔督同清河武城二令確查查得漳河發源雖有清漳濁漳之分然東支西派總合流扵河南彰德府之合彰村由合彰而下注於東省之邱縣城濠分為二股其一自城北分流經廣宗鉅鹿諸邑向西北至寜晉之大陸澤㑹滹沱釡陽諸水由天津入海其勢浩大即不長水亦可舟楫通行今勿論也其一自城東分流經威縣南宮清河武城各村莊向東北亦由天津入海名清陽江又名黄路河對清河之沙土村有蔡河一道接黄路河之水可以入衛濟運即憲臺詳請引漳入衛之處也惟是蔡河雖有河形現今無水地勢髙於黄路河五六尺不等自張寛村而東俱係民間承糧之地延袤二十餘里至武城之北三官廟方可引入運河若將蔡河穵掘深通引之濟運無論壊民田無數萬難開穵即使開穵成河則黄路河現今水小之時尚寛至二三丈五六丈之處不等一經水發汹湧浩瀚其勢莫當恐一綫之運河不能承受反有衝決之患也從此引漳入衛似不可也然更有説者即使無虞亦止可濟武城以北之淺而武城以南之淺處尚多亦必不能使水逆流而上以濟之也今憲臺欲分漳濟運為萬世利而漳河原有入衛之處查直𨽻之成安縣柏寺營有通漳河之新河一道直至山東館陶之沙河即古之所名馬頰河者綿長一百二十餘里寛自一丈七八尺至二丈四五尺不等深自一丈七八尺至二尺四五寸不等獨至沙河因其淤成一片沙坡故接新河之水止有涓涓一滴入衛惟無河身不能束水所以不暢若轉詳河撫兩院移咨直撫飭令成安諸縣將各管河道力為疏浚深通并檄館陶縣將沙河挑穵使有河身束水則漳河之水混混而暢流入衛矣漳水入衛既暢則衛水盛衛水盛則外河之水面自髙閘河之水亦不致建瓴而下而臨清迤北各州縣古淺之處不事疏浚而自無阻滯之慮矣且漳水既分入衛則直屬成安廣平諸邑沿河村莊禆益正復不淺運道民生均為有益呈詳到道該本道查㸔得引漳入衛一案蓋縁外河並無旁流接濟每遇春夏之交天道亢晹重運經臨多有膠滯不前本道是以尋覓河流引水接濟無非為漕運起見查直𨽻清河縣東北漳河去衛河十有餘里出武城之北入運適值南旺大挑清河縣典史部夫於此詢其河形繪有草圖一紙所以詳請開浚奉憲批飭查勘隨行下河㕔督同武清二令勘議繪圖去後兹據詳稱引漳入衛之河即蔡河也雖有河形地勢髙於黄路河五六尺不等黄路河者即漳河也縱使開挑成河止濟武城以北之淺不能濟武城以南之淺今議直𨽻之成安縣柏寺營有通漳河之新河一道經丘縣廣平縣魏縣元城縣館陶縣地方入衛共長一百二十里其丘縣廣平魏縣元城諸邑地方河形深寛各自不等獨至館陶縣地方沙河接連之處淤成一片沙坡水不能下將此段開通水即沛流入衛而館陶臨清清河武城恩縣一帶河路自無淺阻之慮矣而於清河武城引漳入衛者其功更大既據該㕔議覆繪圖前來擬合呈詳候憲移咨直撫飭令成安諸邑各將新河再加疏浚深通并飭舘陶縣將沙河淤澱之處大加挑穵務接上源新河一律深通俾漳水沛達於衛庶於運道大有禆益矣又為請引沁水入運以利漕艘以惠啇賈以救民生事切照國家嵗漕數百萬糧以實京師全賴㑹通一河而㑹通一河又藉汶河之水至南旺分流濟運南旺迤南尚有馬場數湖接濟南旺以北止有安山一湖而今已報租佃種矣所以毎逄天旱之年東昌一帶處處淺阻以至糧艘稽遲非一日矣厯來司河務者非不多方籌畫而卒無如之何也今查得沁河發源於山西由河南武陟縣東四十里朩欒店往東南㑹入黄河若將此河改来入南旺濟運則南北俱無淺阻之患矣但沁河之水微則利大則害須於引河頭建閘一座水小時開放濟運水大時下板閉閘使不為害仍宜于十月以後開閘放水至五月初一日即行閉閘仍於閘外建築土壩使水不至閘則下源永無泛濫之虞此河由武陟獲嘉原武陽武至封丘劉廣挑通六里至王㐱莊即入荆隆口舊河由祥符長垣蘭陽東明曹縣定陶曹州至雙河集往東由鉅野縣安興墓廵檢司至鄆城縣東由宋家窪入南旺湖又由南旺湖北流出兼濟閘濟運又於上源北岸封丘縣劉廣分支河一道由長垣東明曹州開州濮州范縣夀張至東阿出沙河濟運又於曹州雙河集分支河一道由鄆城汶上夀張陽穀東阿入棗林河出小閘濟運又於上源南岸長垣白茅集分支河一道由曹縣單縣金鄉栁溝河入魚臺南陽湖又於鄆城東分支河一道由鉅野嘉祥小黄河入濟寧牛頭河至魚臺亦歸南陽湖又由南陽湖至沛縣昭陽湖微山湖由徐州荆山口下邳州猫兒窩出彭家河口過運河入駱馬湖又由宿遷西寧橋厯桃源清河安東沭陽海州頭圖口大伊山下海但徐州荆山口已被黄水淤墊即使挑穵隨挑隨淤必無善法須接沛縣太行隄建築攔黄隄一道由張谷山藺家山荆山口南至子房山使徐州以上黄河之水出黄河者仍由子房山下歸入黄河不惟荆山口之淤墊可以挑穵而邳州一帶之湖不致淹沒俱可為膏腴之田矣此河一成若慮張秋水大又可於大感應廟東建閘一座使水由曹家單薄入鹽河下海若於此處挑深成河而鹽船及商民船隻俱可以徃來且濮州范縣亦免淹沒民田之患矣此河既成又可於戴村壩倣堽城壩制建石閘一座將戴村壩下汶河築壩堵塞使水由閘入運冬春水小又係清水則放入濟運伏秋水大恐有沙淤則堅閉石閘開坎河口使水由鹽河下海則南旺塘河免致淤墊而亦可省嵗嵗挑穵之費矣自注云引沁入運條陳河院䝉委筆帖式察夀確查明白又䝉委北河㕔鄧之琮丈量估計銀十四萬兩後以陞任江南臬司未經具題沁河在武陟之東四里許朩欒店為入黄河之路其水勢由西北而東南至黄河交㑹處尚有二十五里宜於朩欒店南沁河之東挑引河一道使之由東南而西北逆流而上河頭建草壩一座中留丈餘寛口門徃西北每里許建草壩一座須用四座重重闗鎻則水自不至於泛濫而為害又於四座草壩之中建石閘一座若遇山水泛漲則將石閘下板謹閉毋使東行若水十分大漲石閘恐不足恃則將四座草壩擇其易堵者下埽築堵使水全不能過則自不至為下源之害矣蓋以沁氷之性微則利大則害不可不防也沁河由朩欒店入黄河夫黄河之水至大而加以沁河之水尤大是以其害為最甚與其入黄河而為黄河之害何如入運河而為運河之利查陳橋至張秋原有舊河一道名為棗林河即金龍口舊河也可以穿運河至濟南府雒口下海不煩大為挑浚而朩欒店至張秋亦有沙河一道但乆經淤淺若由朩欒店挑浚至陳橋分為二河一由沙河入運一由棗林河入運而於張秋運河東岸建閘以備蓄洩水大則啓板放水入海水小則閉板蓄水濟運而又於棗林河之雙河集建閘二座南運水小則閉北閘使之由小黄河牛頭河以濟南運至沭陽下海若北運水小則閉南閘放水北行以濟北運又於曹州之白茂建閘二座可以分水由曹縣城武單縣金鄉魚臺入南陽湖又於宋家窪開河一道冬月使水由小黄河入南旺湖蓄之以濟春運是此河一開既可以除黄河之害又可以資運河之利可以使河南開封漕米由陳橋上船歸德之漕米由東明杜勝集上船可以不至衛輝府亦可不至小灘矣並可以興西北之水利使河南山東北直江南俱為水田其利真無窮也此區區一得之見不能無望於後之君子力為舉行耳居濟一得常桉沁水本濁且横暴非入漕恐反為害語詳萬厯十六年工部覆奏及常黄門勘理沁衛二河疏中但張公中州土著侃侃指陳事似可行曽先經以此面奏時遂寧公遂尼不行皇帝垂問冡宰是年河南廵撫汪顥題為估計賈魯河建閘設壩等事一䟽奉㫖該部議奏圖併發部臣等㑹議得河南廵撫汪顥疏稱賈魯河建閘設壩濬河一案臣親詣查勘自賈魯河起由舊河身至黄河涯口止南北共計十里其緊接賈魯河之地名曰東趙由舊河身行七里有大堤一道名曰大隄頭自此而北再三里至黄河涯口其東南名為新莊應於迤新莊之黄河涯口築草壩一座至舊河既開勢必將大堤挑斷始可通水入黄此處最為緊要應於隄根設石閘一座既資防患兼備疏蓄至引賈魯河入舊河身則東趙為受水之口少不堅壯則山水衝至既淹民田且壞河身應于東趙地方建石閘一座引受河水束之入黄二閘一壩以時啓閉可使賈魯河舟楫由黄入洛矣以上建閘設壩濬河并穵隄共估銀二萬九千七百一十六兩零應於前題准俸工建倉餘剰銀内動用查賈魯河建閘築壩濬河穵隄等工程先經九卿覆准在案今該撫既經估計具題應如所題令其作速興工堅固建築所需工料銀兩于所捐俸工建造倉厫餘剰銀兩動用工完核減造册題銷聽工部核覆可也奉㫖依議河南管河道治河檔案餘薈蕞云賈魯治河當時頗費經營至今三百年後猶䝉其利濟誠百世之永賴也作大河志者誤信石人一隻眼之語謂賈魯治河以速元之亡不學無術此亦妄人也歟聖祖仁皇帝康熙四十六年總河張鵬翮奉上諭朕㸔微山湖水據土人云比四十四年大五尺著諭河官放去三尺止留二尺濟運朕所諭亦係活法如或水大六尺總以留二尺濟運為主餘俱放去若只為濟運不預為宣洩恐秋間雨多時即渰及民田今預作宣洩之法不致水勢甚大則有利民間田地山東兖寧道册是年總河張鵬翮奉上諭指授將大墩分水處西岸草壩再加寛大挑清水多出黄水一分少入運河一分不致運河東壩受險鵬翮即行題估于四十七年修築加寛二丈週圍長二十九丈分挑水勢敵黄濟運裏河㕔册聖祖仁皇帝康熙六十年正月十八日山東廵撫李樹德題為奉㫖事查得河道漕運闗係甚重今嵗東省西三府雨澤稀少以致運河水勢微弱回空糧艘壅滯難行臣嚴飭沿河文武官弁竭力催儧方幸無誤今准總河趙咨稱東省運河乃糧艘經由之要津本部院親詣查閱見河道湖隄岸閘率多淤淺傾圮設遇旱暵之年勢必阻誤運行所闗匪小東省河道工程乆奉俞㫖歸并東撫管理為此咨明希即設法料理等因又據濟寧道宋基業詳稱汶河年乆沙積水不滿尺若遇旱乾之年一日僅可積一閘之水不能通漕暢流倘值暴水泛溢則東平汶上等處田禾叠見衝沒每嵗有大挑小挑而額費無多不能有濟相應亟請興工將汶河開濬俾可蓄水深流以濟漕運再查彭口一帶有昭陽微山西湖噴沙積於三洞橋内屢開屢塞糧艘至此耽延時日相應亟請興工改挑新河一道躱避噴沙以䟽運道又滕嶧二縣朱姬莊呉家橋隄岸三百里外臨衛水大湖西風鼓浪土石打坍重運衝入千夫推挽單曹二縣之太行隄為兖西保障康熙四十九年隄殘走洩單縣㡬遭沈溺倘一疎虞不特單曹二縣人民廬舍即附近之金鄉魚臺鄆城濟寧等處亦皆受害相應亟請修築以固隄岸以上各處修濬工費浩繁節省估計必得五六十萬金方能敷用相應詳請設法興修等情前來奏請借動積貯或量開事例捐補請㫖批示二月初三日九卿議覆東撫李樹德請開彭口新河事奉㫖朕屢次閱河南廵于山東運道知之甚悉始山東之民請欲開河後以不便復行堵塞其欲開欲塞皆有縁故今李樹德請開新河九卿議遣大臣徃㸔須將從前何年開過何年堵塞所以閉塞之故查明則開河之有利與否便知若此時不知詳察即行開濬兩三年後仍欲堵塞則虚費國帑何益運道爾等將此㫖𫝊與九卿知道初四日大學士馬竒等議覆工部東撫李樹德折本啓奏奉㫖這事情九卿遣堂官甚是朕屢次南廵曽細閱河道留心于此是以扵河道情形知之甚悉此處不讓他人雖欲不言而不得如山東運河自西河之水流入此河從前百姓以為宜開通具呈亦曽開過後又具呈亦曽堵過開者何意堵者又何意務使悉此等縁故方可以定其應開與否不然則虚耗錢糧矣山東運河俱係引入滕縣嶧縣等湖之水以為糧運之助歴年來運河之水至於淺少者皆因沿河傍湖一帶添開于山東地方水田雖覺有益而未必有益於他處朕屢次往河道㸔來汶河之水自修分水龍王廟分流之後七分南流三分北流南流之水有一閘將此閘堵塞水俱北流古人相地方之形勢就其髙下隨其水性而能為此者實屬善䇿再洪澤湖有民之村莊墳墓田宅甚多修髙家堰隄以聚水使其自上流下以拒洪澤湖之水更為神妙此處即朕躬亦不能承當即如暢春園一帶之河水俱入田内是以流至京城者甚少永定河之水亦俱引入田内是以每年四五月間水乾流絶河身沙壅偶有大水流入被壅沙堵塞以致泛溢為此廵查得奔牛河將清水引入永定河内此水長流不絶不但不致沙壅即大水來時亦不致泛溢此處廵撫不知即九卿大臣亦俱不知或張鵬翮大畧曉得將此㫖爾等𫝊與九卿四月十七日内閣九卿等奉上諭朕於河務留心最切經厯最深往年屢次閱河時精力尚强親乗小舟不避水險各處周覧凡水泉源委知之甚悉山東運河全賴衆泉流蓄微山諸湖以濟漕運今山東多開稻田截湖水上流之泉以資灌溉上流既截湖水自然無所蓄瀦安能濟運譬如治病者或吐或㵼必因其人尚有精神若中無所有又焉能吐㵼乎地方官未明水之源流一任民間放水灌田以為愛惜百姓不知漕運實因此而誤也若不許民間偷截水泉則湖水易足湖水既足自能濟運矣今不講䆒本源但見湖水日少湖身日淺徒事開浚假使湖身日深泉水不繼雖費百萬帑金終何利益且將古人所置南北諸閘將如之何古人置閘其逺近疎密皆因地形髙下水勢緩急以為蓄洩或一地二閘或一二十里一閘確有一定丈尺不可更易分水龍王廟閘座最闗緊要當時宋禮用白英老人之䇿築戴村壩以遏汶水導之出鵝湖口入南旺湖然後分流南北以分水口為水脊蓋山東登萊諸山之脈自關東來結為泰山是北幹分支之一在黄河之東而黄河之西山脈自終南太乙南屆淮汝為中幹分支之一黄河行乎兩支之中故昔時由天津入海以後漸徙而南至淮安入海而登州以上馬谷山以下從無黄河入海之跡者山脈限之也分水口之水脊又為泰山分支之分脊處白英積數十年心思確有所見決為此議宋禮從之因勢均導南得七分北得三分増修水閘以時啓閉漕運隨通此等胆識後人斷斷不敢實亦不能得水平如是之準也今此二閘最宜斟酌啓閉若洩於南則當閉北閘使分北之水亦歸於南洩于北則當閉南閘使分南之水亦歸于北湖泉並注南北合流雖有旱暵靡不有濟矣豈若從事開浚勞費而無功乎往年山東百姓欲開新河朕恐其下流泛濫禁而弗許今廵撫請開彭口新河此地一靣為微山湖一面為嶧縣諸山更從何處開鑿耶張鵬翮到山東將朕此㫖詳諭廵撫申飭地方官令其相度泉源蓄積湖水俾漕運無誤正易易耳黄河關係最大自元至明嵗有衝決未有安瀾二十餘年如今日者然圖治巳治保安巳安河工雖巳告成尤當時加廵視不可疎忽今春多風而少雨恐秋間雨水必多地方官宜加意隄防張鵬翮去㸔山東運河由臨清至韓莊閘離邳州不逺併去㸔邳州低窪之水曽否洩出太行隄曹縣至單縣止亦當往㸔有好司官多帶兩員去彼地有用著之處即留彼料理京抄蓋聞儆余咨切迄今猶頌堯仁厎定功髙自昔獨推禹智欽惟我聖祖仁皇帝亶聰作后至誠如神湛恩與江漢並深睿哲本源泉時出固已膏流率土澤洽海隅矣而河工一事獨厪聖懐區畫精詳䂓模乆逺微特中外臣工罔能仰賛髙深即依古以來英明神睿之主亦罕有洞悉機宜審度形勢如此之盡善盡羙者也竊按東南漕運最關國計民生江河淮濟一不順軌輒與漕梗故治江治河治淮治濟總皆所以治運元明以來兩河嵗有衝決逮我皇朝洪湯數警自黄水南徙入淮攝沙倒灌清流變為濁流輓輸㡬困縻金耗帑徒貽築舍之譏後海先河誰解祭川之義恭逄鑾輅六幸南工指授方畧闢海口修髙堰改運口使清水暢流刷黄二十餘年安瀾無恙屢頒諭㫖叮嚀誥誡深切著明蓋作哲作謀實由天縱之聖故㑹極歸極自爾地效其靈此誠曠代所無實屬生民未有乃漕運久經奠定而宫廷倍切綢繆復降圖治巳治保安巳安之上諭尤見我聖祖淵鑑焦勞永懐善後凡兹臣庶茍能恪遵天語仰體宸𠂻無怠無荒常心為防而身為障是彞是訓惟帝有典而王有謨從此滄海波平無慮桃花春漲宣房築罷奚煩瓠子秋唫千百世永樂平成億萬禩咸歌清晏敷土濬川之績誠哉先後同揆呈疇錫洛之祥允矣古今並峙又豈特二十餘年之利賴巳也臣澤洪世受國恩捐縻難報自維揚罷守以後効力河干浮湛於海防宿虹外河諸㕔量移監司仍専理河務㡬三十載雖於睿算精微不敢自詡窺測惟是辛劬畚鍤宵夜靡寧遑恤胼胝之勞時凛曠瘝之恥幸賴遭逄聖世坐享休明聆大哉之王言如綸如綍遡巍乎之帝業式玊式金臣澤洪敢效賡颺自忘微陋謹拜手稽首恭紀於尾行水金鑑巻一百四十二
