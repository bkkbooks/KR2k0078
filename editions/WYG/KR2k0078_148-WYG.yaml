body:
  text: 行水金鑑巻一百四十八江南按察使傅澤洪撰運河水府河一曰濟河即泗水之支河也穿兖州府城西流至濟舊由林家橋繞濟寧州城北西入馬場湖後因伏秋水大河小不能暢達致有漫溢於康熙三十四年開通楊家壩建減水閘以時啓閉由天井閘入運河泗河發源於陪尾山與沂水合西南流由金口壩至魯橋入運洸河起自寧陽縣南有兩道一則上承九山口諸處山水與滋陽縣之三岔河合流而南一則汶水分流出寧陽縣之堽城壩經滋陽縣之髙呉橋南流至八龍橋兩道㑹合由洸河大厰至州城東北與府河合一南流入楊家壩一西流入馬場湖以上河渠三道俱在運河東岸又牛頭河在濟寧州城南舊通南旺由永通閘下連魚臺縣之穀亭即舊運河也自改運河之後將永通閘築隄閉塞惟諸窪之水彚入河中然下源巳淤皆於運河不通故不載河防志府河所以引泗水濟運者也舊例南旺大挑之後即挑府河近數十年來府河竟不挑矣故有淤至五六尺者有淤至七八尺者府河淤淺不能容水兩岸又無隄工一經水發兩岸民田盡被渰沒故以大加挑浚即以挑河之土築兩岸隄工則河既寛深即能容水而民田不至淹沒也然須從黒風口内即大挑寛深庶泗水之入府河也易不致由金口壩南泄矣府河舊有丈餘深年久淤墊深者不過二三尺淺者不過數寸以故泗河不能濟運畢輔國原引泗水至濟寧濟運今楊家壩既堵築泗河之水不由濟寧入運乃由濟寧北闗入馬場湖查馬場湖原受汶河之水由蜀山湖東馮家滚水壩而來者也故今一大挑府河並挑馮家壩下至引河仍將馮家壩建閘一座又將馮家壩築隔隄一道以堵蜀山湖之水却將馮家壩西開引河一道使水由十字河北入運再將獲麟古渡建閘一座獲麟古渡即今之大長溝渡口是也居濟一得金口壩在兖州府城東五里元至元中為滚水石壩引泗入運即隋文帝時薛胄於泗沂之交積石為堰決令西注陂澤以溉良田者延祐中疏為三洞以洩水勢明初堰壩以土旋築旋廢成化間築石堰東西長五十丈下闊三丈六尺上闊二丈八尺自地平石計五層髙七尺湫口三處眎水消長時其啓閉横巨石為橋以便往來堰北復作分水二雁翅以殺水勢堰南北跌水石直五尺横四十丈以固堰基後歳久土淤舊堰獨低水消泗不入洸毎春築土壩髙一尺七寸以障之水漲土潰勞費無益嘉靖三十七年主事陳南金易以石髙亦如之仍為金口三添閘板以時啓閉歳省前費水亦賴以節宣張純守壩論畧曰金口壩以遏泗之南趨閘以導泗之西流盖元人遺智也夫泗之趨於南猶汶之放於海遏泗者以金口猶遏汶以戴村也國初壩因元舊時圮時修勞費無已成化中主事張君盛始易以石視昔善矣然猶石之上歳益以土髙可一二尺土歳壞則歳増之迄嘉靖中主事陳君南金以石易土髙亦如之而制始大備泗盛則勢突而壩當其衝寧無漸入圯壞者乎果有之則補葺之功杜其㣲焉可也茍且因循俟既壞而後修之焦頭爛額之功也泗消則㣲入濟之勢緩矣矧自黒風口而之府河自府河而之濟河凡幾十里而始至天井水過沙積寧無壅而未通者乎果有之則挑濬之功或一歳而一見或三歳而再見焉可也廢之不講而歸咎於天井之淺澀是不揣其本之論也其視張陳二公何如人哉萬厯二十五年大水衝決無遺主事胡瓉重修山東全河備考明臣劉珝金口堰記畧云堰距兖州東五里許以其障沂泗二水入金口閘西達濟寧㑹通河因號今名考之後魏及隋元以來皆嘗修築以通漕運都之建不一堰之興廢亦不一暨我太祖髙皇帝定鼎金陵無事乎堰太宗文皇帝駐驆北京復通漕運而堰多事矣前此堰築以土毎夏秋之交波濤洶湧即圯無餘萬夫之役不貲之費為之蕩然自永樂以迄於成化朝廷雖數命官修固卒莫能厎定歳庚寅都水主事宜興張公克謙祗承是任乃曰與其屢廢以病民孰若一勞而永逸乃易土以石自地平石計五層髙七尺湫口三處眎水之消長時其啓閉横巨石爲橋以便往來愚按金口堰即金口壩也原障沂泗二水入金口閘西達濟寧㑹通河自府河淤塞而二水不能濟運矣今宜大挑府河引水至長溝入運而汶河口移北十里則南旺大挑既易而東昌一帶不至於淺阻夏鎮一帶不至於湖河相連矣此運河萬世之利也是在後之君子留心運河者力舉而行之耳金口壩遇冬月挑河煞壩之期即將此壩嚴閉使泗河之水盡歸金口閘入馬場湖以濟運沂河之水原合泗水由黒風口入府河濟運者也數十年來舊制不修河失故道沂河之水不合泗水入黒風口竟由金口壩下直趨魯橋矣今議照舊修理使沂河之水合泗河之水仍入黒風口由府河濟運庶水無旁洩而於運道大有禆益宜於大長溝擺渡口建石閘一座以界泗水使泗水不得北行則以泗河之水專濟南運而濟寧以南一帶運河可無淺阻之患矣此閘亦宜下板十八塊積水使由十字河入南旺湖中居濟一得魚臺縣河道北自濟寧州四里灣交界起南至江南沛縣界辛莊橋王家口止計長八十五里閘三座曰南陽曰利建曰邢莊河防志漷水在縣東五十里運河東畔春秋取邾田以漷水爲界即此源出滕縣述山西南麓受諸泉水至滄溝折而西過沙河店至黄甫壩轉趨趙溝西㑹南梁水入漕漷水即沙河水在滕為二水至境内合為一水舊志不詳原委祗載漷河郡志竟以漷專入滕縣因正之硯瓦溝在縣東北三十五里亦運河東畔之水也納黄山下諸泉水徑獨山湖入運沙河在縣東南五十里逕沙河鎮過雙龍橋流入昭陽湖盖運河故道也昔與滕縣沙河為一故名自夏鎮開運河改昭陽東畔此河不與滕通郡志猶載水從滕縣西南流入境仍故蹟耳新開河在縣西北二十里上接曹定城武單金諸邑之水自金鄉交界北田寺起東至柳溝村入釣鈎觜下穀亭舊運河達東南沛縣安家口凡一百有六里又釣鈎觜直北為故廣運閘即牛頭河下流接引耐牢坡之水同注穀亭直達沛縣安家口安家口者昭陽湖之下口塔具湖之上口也自白鼠寺至安家口約十里長三里寛泥草壅塞水流㣲弱不能洩入塔具河以入圍河支渠下至李家口又有横石壩一道約長六里許亦土沙壅塞不能洩水㣲山湖東入韓莊閘以濟運自康熙二十九年疏浚西自北田寺至柳溝村皆口寛五丈深五尺舊運河如舊制至安家口接連昭陽湖計程八里則深廣倍之自此宣洩無患按舊運河在昭陽湖西岸由沛縣城東至孟陽泊入境孟陽泊亦巨滙也湖陵故城在焉瀠洄十餘里渠貫其中又北二十里至於穀亭穀亭者水經所謂穀庭城古濟泗合流之地也一云寗母亭即齊桓公盟于􅑔母處上為菏河下為秦梁自㑹通河開歴為漕渠要鎮明工部管河主事駐之河橋水驛在焉南自湖陵北至南陽相距五十里又北二十里為廣運閘明初所開牛頭河也地名塌場口嘉靖四十三年河決飛雲橋運道告阻及開夏鎮新河以達南陽此渠不復行舟既而曹單決口塞河水亦絶惟牛頭河下流運渠暴漲則溢而入也又牛頭河由濟寧西二十里首受永通閘洩出漕渠之水注之耐牢坡至塌場口開廣運閘而出入於舊渠盖黄河故道也明初用兵梁晉開通此渠以資運道故建永通閘於北正統以後防塌場口之潰故建廣運閘於南漕渠水盛由此行舟黄河自曹州雙河口來亦由此入運後運渠東徙河水南流此河與故渠同塞河患庶有瘳歟陽城湖在縣東南七十里諸山泊泉自寨兖二山南流㑹滕縣大烏泉水滙而為湖别為小河自雞鳴臺以東溢而入運河防志獨山湖即南陽湖南陽之東有獨山山下有坡厥地平衍卑窪舊為滕魚諸泉所滙自新河開坡始蓄為湖以資灌注毎遇伏秋水發則奔濤傷隄水溢河漲非有以節宣之必潰隆慶二年建石隄三十餘里各留口引水入運河闊不過十餘丈有減水閘十四座大者二各三洞小者十有二壩一淺二十一自北而南從一起數至二十一止是為水櫃山東全河備考獨山湖在縣東北三十里滕縣沙河諸水由京章支河西南灌輸逕湖入運魚臺黄寨諸泉水亦由硯瓦溝逕湖入運隆慶六年夏水泛溢乃於南陽北岸為石隄三十餘里減水閘十四座自是水無潰決漕運無阻歳久漸圯應亟請修築河防志昭陽湖在縣東南六十里一名刁陽故為運河東岸受滕縣諸泉滙為巨浸溢水沽頭閘入運嘉靖末黄河東決由運趨湖漕渠阻塞尚書朱衡改新渠於湖東以避河水隆慶六年又於其南築土隄二百五十餘丈又築東西決口二隄以防河患自是河益南徙不復趨湖滕諸泉水西流入運亦阻漕隄不入湖内於是淤填日積居民樹藝承糧謂之淤地然西境隣邑諸山泊水自髙趨下毎遇淫霖滙為巨浸下流阻塞渰沒為災隄防宣洩之方所當講求者也河防志㑹典云昭陽湖周圍八十餘里在滕沛魚臺三縣界内舊設減水閘十四座遇河泛漲啓閘洩水下達㣲山等湖以濟韓莊閘東泇河運道愚按減水閘所以節宣運河之水使常平者也今查減水閘所存者僅四座耳數年以來運河水大不能宣洩以致衝決隄岸淹沒民田其害不可勝言皆由減水閘不復之故也今若將舊閘照舊修復運道民生庶兩益矣居濟一得泇河歴沛滕嶧三縣薈蕞云沛縣在江南徐州西北五十五里東至山東滕縣界五十里北至山東魚臺縣界一百二十里縣東北有漷水出山東滕縣流入昭陽湖東有昭陽湖亘四十里泉穴甚多流甚逺東北自鄒滕六十餘里發源而來滙於此有閘積水若運河水淺則開閘洩水經金溝過薛河達於泗以濟運薛河即古漷水出滕薛境西流㑹昭陽湖水至金溝口達於泗後開新河築石壩横截其流南注㣲山諸湖其自北而東為泗水由濟寧至沛城東南與泡水合運道因之嘉靖乙丑河溢塞運尚書朱衡開新河自是泗水亦隨東矣新河在縣東北四十里嘉靖甲申河溢塞運戊子河道都御史盛應期開新河自南陽經三河口抵留城一百四十里功垂成被劾去後河復溢運道又塞工部尚書朱衡因應期之舊而浚是河乃名新河貼滕縣在山東兖州府東南一百四十里所屬運河近㣲山湖北接沛縣南接嶧縣計程五十里而彭口要害大沙河一道上自費縣發源由彭口山河入運山水暴發沙隨水湧毎致運道淤淺歳事挑浚山嶧縣在兖州府東南二百六十里縣東南有葛嶧南有新運河明萬厯間河決汶上壤漕隄幾二百里總河舒應龍相度韓家莊在信義嶺南可引湖水由彭湖注泇乃開前渠四十餘里猶未通漕後總河劉東星舉未竟之功泇可漸通漕最後總河李化龍定計開泇棄王市以下三十里泇河徑從王市取直向紀家集南至河以避連注周柳四湖之險再由嵎頭引水經駱馬湖北岸至宿遷以盡避黄河之險以二百六十里之泇河避三百三十里之黄河是鑿嶺避河用湖避黄而運道賴之計程一百九十六里共閘十一座沛縣屬江南而其河則俱隸兖州府設有兖州府泇河通判管理泇河跨山東江南二省實長二百六十里在沛滕嶧三縣境長一百六十里其一百里在邳州境泇河自夏鎮稍南李家港起歴八閘以至黄林莊實一百六十里而泇河通判所轄河道則北自王家口起至黄林莊計一百九十六里泇河以嶧縣東西泇水得名西泇自抱犢山東南流與東泇合又南合武河入泗謂之泇口縣南有中心溝復受衆水下流東㑹氶水入泇隆慶丁夘庚午間徐邳淤御史大夫翁大立屢疏請開河自馬家橋經利國監入泇口出邳州以避秦溝徐吕之險科臣駱遵言河出馬家橋葛墟嶺髙出河底五丈餘侯家灣梁城多伏石周柳諸湖直達河口須築隄水中功費無算議遂寢萬厯癸已雨潦大作河決汶上灌徐邳潰漕隄二百里總河舒應龍求通洩之途於㣲湖東得韓家莊其地在性義嶺南不經葛墟嶺而可引湖水由彭河注之泇乃疏請開支渠四十餘里凡閲五月工成猶未能通漕也自黄堌口決鎮口淤數年間專用力於分黄導淮接引黄流出小浮橋濟運而開挑未久淤塞隨之已亥秋御史大夫劉東星來治河屬夏鎮分司梅守相議舉韓莊未竟河工淺者深之狹者廣之併鑿侯家灣梁城通泇口使可行舟以水溢暫輟辛丑春上疏請竟河工得報可於是不問淺狹難易一切修浚建鉅梁橋石閘一徳勝萬年萬家莊各草閘一是年漕艘由泇河行者十之三矣癸夘霖雨水漲河決黄莊入昭陽湖穿李家口逆行從鎮口出御史大夫李化龍定計開泇乃議棄王市以下三十里之泇河逕從王市取直達紀家集南當河深處以避鑿郗山及周柳諸湖百里之險通計挑河建閘壩凡工費二十萬八千一百有奇乃上疏言今之稱治河難者謂河由宿遷入運則徐邳涸而無以載舟是以無水難也河由豐沛入運則漕隄壞而無以維縴是以有水難也泇河開而運不借河有水無水第任之耳疏瀹決排皆無庸矣善一又以二百六十里之泇河避三百三十里之黄河二洪自險鎮口自淤不相闗也善二運借河則河為政河為政則河得以困我運不借河則我爲政我為政則我得以熟察機宜而治之其利害較然睹矣善三糧艘過洪毎為河漲所阻運入泇而安流無患過洪之禁可弛􅄁罰之累可免善四廷議韙之遂改挑直河之支渠修砌王市之石壩平治大泛口之湍溜撈濬彭家口之淺沙以及建閘設壩次第畢舉而運道實賴之矣顧糧艘既盡趨泇徐邳人情不便使客亦苦郵傳之遥怨咨流傳謂黄不可廢於是總河疏請專用泇以通運兼用黄以回空言泇渠歴春夏伏秋多沙淤當如南旺例以寒沍暫塞一大修治計以毎年三月初開泇壩九月初則塞之九月初開吕壩次年二月終則塞之通計開泇二百六十里内分邳屬一百里隸中河而夏鎮所隸自李家港口東至黄林莊共一百六十里挑浚之法本朝則定於冬十二月春正月止兩月挑浚道臣經理其事貢使之往來商旅之稱便數十年于兹矣河防志沛縣河道北自魚臺縣界王家口起南至滕縣界劉昌莊止計長四十八里閘座三曰珠梅曰楊莊曰夏鎮沛地低窪河道四十八里係漕運要地與山東諸山接近一遇水發即患衝決所賴吕壩一道時當水涸則蓄水以濟漕時當水溢則洩水以便民洩蓄得宜庶可無患其如下流彭口因流沙衝塞毎年回空糧艘過畢例應挑濬則閉彭而開吕工竣則閉吕而開彭此吕壩在冬則開在春則閉歳事修築所費不貲況開閉一年一次修築未幾而秋水暴發壩仍衝決及搶修方畢又值閉彭開吕之期民力如是其僕僕也又每開一次水勢湍急其口愈寛愈深今吕壩之口寛至三四十丈深至二三丈不等田廬盡遭淹沒將來水患愈大修築愈難而所費亦愈多將何厎止且一年之間時方水涸而欲蓄水或彭口之工未完則築壩有待時方水溢而欲洩水或挑濬之工未起則開壩又不能今吕壩之口日加深廣倘或山水非時􅈝發再有衝決將有急不及治之虞運道民生所闗非小今籌一勞永逸之圖莫若建立石閘則蓄洩為便然吕壩之口難以築閘其吕壩之下舊有滿閘一座廢棄已久若仍於此處建築石閘遇彭口挑濬則開滿閉彭挑濬工完則開彭閉滿凡遇水涸水溢隨時啟閉蓄洩可免非時衝決之患可省歳歳修築之勞上有益於漕運下有利於民生計誠莫善於此但工費浩繁現在㑹勘所當斟酌施行者也河防志施㑹勘之後不知行與否未詳珠梅閘上為山東邢莊閘舊例兩閘不相聞問竝無㑹牌盖以成䂓久廢獨山湖與運河相連水大時獨山湖水可以接濟故上源之水不至膠舟一遇天旱棗林邢莊處處淺阻皆由珠梅閘放船無節洩水太過之所致也予己將獨山湖築隄界出故此二閘須用㑹牌照例啟閉庶水不至於大洩若遇水小則開獨山湖口放水以助之若水太小船隻難行須珠梅閘一啓板放船五六百或七八百然後珠梅閘再啓板灌放則水不大洩而船自易過矣居濟一得彭口積沙毎年如阜歳終挑淺百倍艱難盖滕邑薛沙彚諸泉水出沛之三河口以入運河自明萬厯中開東西泇河乃築東邵壩於薛河中遏水使盡入沙河由彭口入運而水挾沙以行故及冬挑浚歳不可少挑浚之法其初必築大壩於兩頭以攔河水又必逐段築土壩十餘道以隔兩旁之水又必就岸築龍溝百餘丈以戽挑浚時流聚之水及其竣事又必一一去之然後水可通行毎歳浚河其勞且費如此今應照康熙三十七年改挑新引河一道自柳園迤西起至仲家樓後大壩以上止使山河水總歸吕壩以入湖自此水有去路而畚鍤之功稍易云河防志毎年彭口大挑宜于上源築壩使水由三河口入運河又於運河彭口之上築攔河大壩一道使運河之水由吕壩入㣲山湖則彭口上下内外俱可以挑穵矣既挑完彭口運河俟開壩之後即將彭口内石壩上石壩下盡挑穵深通俟五六月伏水將發之時然後將三河口上源築壩將彭口上源之壩開放使水由彭口而入運然後將三河口石壩上下挑穵深通以便大挑之時使水仍由此入運若以築壩不便即輪年遞挑亦可今年挑三河口即使水由彭口出明年挑彭口即使水由三河口出以一年之力挑河而河有不深通者乎河官樂於簡便止挑正河而石壩上下置之不問不知挑石壩上下而正河必不淤淺不挑石壩上下而正河勢必淤淺此必然之理也今彭口毎年止挑正河一遇水漲河身即為淤塞糧船既被阻滯撈穵倍費人力此予之所目睹者也其如人情難於更始何哉居濟一得滕縣河道北自江南沛縣界劉昌莊起南至嶧縣界朱姬莊止計長五十里河防志百中河在縣南八十里源出百中社南流十里受三里灣折而西流入運又黄家泉距縣東南七十里出臨城社由百中河㑹黄溝龍灣温水三泉及鄒縣許由温水泉又西㑹三界灣至留城今自泇河開後泉無入百中河者又前新河諸泉在薛河南者或由王家口豸裏溝支河入吕孟湖或由東邵壩支河出佃户屯減水閘在沙河北者滙於南陽閘泇河開後運道益東諸泉直逕俱入泇河濟運界河即白水河在縣北三十五里出龍山西麓㑹鄒縣界白水故名西流五里稍折而南逕梁山前西南瀦為郁郎淵一名温水湖又西受聖母池水至橋頭入漕北沙河在縣北十五里出鄒縣嶧山南經龍山後繞出其左至周林㑹七里泉至洪疃分流一出休城南西至望塜南至馬家口入漕一趨休城北受大烏泉西受北石橋泉又西㑹白水河同至橋頭入漕南梁河在縣東北十五里右趵突左荆溝合為一流西南至洪村折而南三里餘復轉而過濟西橋北經舊城北西南流折為九曲西南受絞溝泉又西㑹漷水入漕漷水即南沙河在縣南十五里出寶峯山南經空同山鳳凰嶺東過祝其城㑹黄約山諸泉折而南過麞山西鳳凰山東納龜步水龜步源發連珠山過歐家谷來入之又南至華盖山折而西受石溝水石溝源自巉山瀑布東南至寶峯山馬山經石溝來入之又西至梁山村折而南過滄浪淵納明河水明河出馬山前繞樓山過靈丘城來入之又南至倉溝折而西至沙河店為黄甫壩所遏稍北轉趨趙溝㑹南梁水入漕南明河即白河俗呼捉白河出嶧縣黒風口諸山泉西經梁山奚公山受薛河支流同為明河又西至永豐村西南經白山入㣲山湖石橋泉河在縣南三十里源出官橋東北平地西過薛城北又遶其南西流從三河口入漕按石橋河本與漷薛為三河漷既遏而北薛又遏而南今獨石橋泉河入口薛河在縣南四十里源本西江水出寶峯山南過青蓮步將軍步左過髙山西折過山亭而永豐鳳凰二泉出薛河南岸山麓者流入之又西至薛山受悟真巖茶泉水循悟真巖南過雲龍山㑹東江水東江出湖陵山西至呉戩山下伏不見過鐵脚山至柳泉湧出至觀山前滙為濯筆淵亦至雲龍山㑹西江水同為薛河其地即靴頭城也南至斬蛟臺折而西經昌慮城南陶山下瀦為刁潭西納玉花義河三山三泉南經豐山東過官橋經薛城至東邵為壩遏入㣲山湖舊經山陽湖從金溝入泗自新河開漕東徙恐沙為漕害故築石壩於東邵遏之又恐水為壩害開支河於奚公山西導入南明河開泇河以後仍由新河故道入漕山東全河備考㣲山在滕縣南一百里石山戴土上有張子房墓或曰㣲子之山未詳其下有㣲山湖江南通志㣲山湖所以濟運河之不足者也故常宜閉板蓄水至八閘下板水猶不足然後酌量啟板以接濟之盖湖水小則八閘宜下板湖水大則八閘不宜下板若湖水盛大則八閘不下板仍宜開八閘月河以放之但此湖南岸宜築隄以障黄水自沛縣太行隄接築由荆山口南至子房山下若不築此隄或數年後或數十年後㣲山湖勢必如堽頭湖淤為平陸不特無水濟運而黄水勢必灌入運河運河又必淤塞矣夫舊運河原在南因黄水淤塞改開泇河矣若泇河再淤又從何處改挑乎此不可不早為之計者也㣲山湖南宜築攔黄堤一道上接沛縣太行隄下至徐州荆山口黄水泛漲時使由隄南東行入彭家河至猫兒窩㣲山湖清水使由舊河出荆山口合彭家河亦至猫兒窩盖堽頭湖俱經淤平㣲山湖已淤其大半南岸若不築隄不數十年黄水屢灌㣲山湖勢必淤平不惟㣲山湖不能蓄水濟運恐泇河亦受其淤所闗運道良非淺鮮也居濟一得泥溝河在縣東南一百十里源出白馬山西南流過沙溝八吕孟湖山東全河備考嶧縣河道北自滕縣界朱姬莊起南至江南邳州黄林莊止計長九十八里閘座八曰韓莊曰徳勝曰張莊曰萬年曰丁廟曰頓莊曰侯遷曰臺莊河防志氶水出縣北六十里花盤山之車箱峪其源滄浪淵水尚㣲南合許池泉始巨又南經嶧縣城西門又西南納金注河入泇又東㑹武河南入於泗又義河在縣東北三十里亦入氶水東泇水出費縣之山經沂州合芙蓉河流至三河口西泇水出縣東北抱犢山東南流至三合村與東泇河水合南貫四湖溉田數千頃又南合武河入於泗謂之泇口通淮泗舟楫今用之為運河新河一名中心溝在縣南五十里源出白茅山後受衆水下流為彭河又東㑹氶河入泇土人相傳為舊氶縣及彭城所置鐵官運鐵之河萬厯三十二年始開運道以避徐吕二洪巨龍河在縣西北六十里源出東暨村靈泉西遶西暨集南流入㣲山湖山東全河備考魚臺沛滕嶧縣接境諸湖共十有四曰昭陽曰棗莊曰李家曰郗山曰㣲山曰吕孟曰張莊曰韓莊曰獨山曰馬場坡曰常阜曰平山曰白山曰白浴總以昭陽為統領昭陽湖有大小二在新河下流自泇河通資㣲吕諸湖以濟韓莊東之運道則又據上游所受獨山諸流從棗莊湖出李家口其東即棗莊湖又東為李家湖其在郗山之南者為郗山湖又南為㣲山湖又東南為吕孟湖又東為張莊湖又東為韓莊湖名雖不同實無限隔自東北南陽壩至西南徐境利國監瀰漫幾二百里俱隔在運河西岸運道自韓莊閘至夏鎮計程七十里皆逼臨諸湖僅隔土隄一道寛窄不齊最稱危險其韓莊之北建有郗山減水閘韓莊湖口閘及䕶閘石隄一道以障諸湖之水並資蓄洩濟運固歳因修治而㣲山湖之西南切近黄河毎慮有漫瀉之患茍不堅禦濁流一入不獨滕嶧為巨浸而運道必梗保運者所宜加意也若獨山馬場坡二湖皆自南陽横截新河以入昭陽湖在新河上遊最為漕利其餘小湖徒梗縴道與漕無益山東全河備考臺莊等八閘月河皆宜挑挖寛深使㣲山湖之水有所洩則濟寧南鄉及魚臺沛縣徐州之田地自不至淹沒矣盖八閘月河盡皆淤塞㣲山湖向出荆山口由彭家河洩今則荆山口已經淤平不能宣洩若將月河挑挖深通則湖水可洩必不至泛濫於濟寧魚臺一帶矣此今日最急之務也倘㣲山湖水小自宜蓄之濟運八閘仍宜下板嚴閉不可輕洩居濟一得行水金鑑巻一百四十八
