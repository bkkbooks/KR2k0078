body:
  text: 行水金鑑巻一百五十一江南按察使傅澤洪撰運河水揚河上自山陽縣交界黄浦起下至江都縣三坌河止歴寶應髙郵江都薈蕞云寶應縣在江南髙郵州北一百二十里南至髙郵州界六十里北至山陽縣界二十里縣臨運河廟髙郵州在揚州府北一百二十里南至江都露筋三十里北至寶應縣界六十里州臨運河髙江都縣即揚州府治南至𤓰州鎮四十五里北至郵州九十里臨運河應河防雜説云運河西隄外在寶應則有白馬湖寶湖汜水湖在髙郵則有界首湖髙郵湖在江則有邵伯湖皆𦂳貼運河惟恃西岸石隄障禦各湖風浪然後運艘得以通行於運河之中若夫東岸長隄則不特為江南浙閩三省驛路通衢而運河之水更賴此東隄攔束否則立刻東瀉河成陸地不可行舟矣但運河地勢甚窪較之髙家堰外洪澤湖底更低丈餘方髙堰隄外之水深至一丈二三尺之時其水面比髙寶諸湖之底約髙二丈四五尺而髙寶諸湖西岸石隄其髙不過丈餘是以上流堰隄一有疎失其水不過一二日間即從髙寶諸湖西岸隄頂平漫而過西隄過水則東隄亦不能支東隄一開則西隄石工雖堅而尾土先被洗去未有不隨之而傾者兩隄俱決則大溜横冲河身跌深堵塞最難矣今髙堰一帶雖有減水壩六座共寛一百七十丈二尺以減淮漲然必淮流髙過壩底方始減下其間宣洩有節不俟決口之水徹底奔騰無窮無盡者比也第上流既有此减下之水歸入髙寶諸湖若不導之出路則逐漸擁髙亦必漫過西隄終成決口況髙寶諸湖除受堰隄各壩減洩之水更有天長盱眙等縣各山澗之水亦復不小乎今於寶髙江三州縣東隄之上除向來原有減水閘壩涵洞之外又増建改建減水壩共八座計其洩水之地共長一百八十九丈二尺是三州縣減壩比堰隄減壩加長十九丈凡向來原有之閘壩涵洞以之抵洩運河下注并天盱等處山澗歸湖之水其新建減壩一百八十九丈二尺以之抵洩堰隄一百七十丈二尺減下之水如此則因入為出宣洩有序是以康熈二十二年夏秋之間雖湖河之水漲極而不致壅積傷隄今值冬月各水大消而河仍盈滿漕亦不致淺涸至從前未建減壩之時湖水一漲先淹湖西田畆迨積長不休漫隄成決復淹下河今則止淹下河窪地而湖西之田並不淹及連歳豐收俱此減水各壩之益也惟是運河𦂳貼減壩當水大溜急之際過往船隻稍不謹慎即便撞斷橋脚撤入壩内雖隨即修好然亦不免有耽遲之慮須於髙郵南門外私鹽港地方起於運河西岸另挑越河一道俾一切船隻俱由於越河超過各壩而行以避撤船傷橋之患其人夫應調附近歳修人夫量給食米則所費無幾而有益於漕運民生不小也三州縣計程二百六十里設有揚河通判一真管理修防其汛五曰寶應汛氾水汛屬寶應縣永安汛髙郵汛屬髙郵州江都汛屬揚州府防以下俱河志寶應縣河道自山陽縣交界起至髙郵州交界止計程七十五里設閘三曰北𢎞濟大閘南𢎞濟大閘即瓦甸大閘七里閘東隄閘壩涵洞共二十曰黄浦雙閘二久壞今閉喬家涵洞儒學涵洞孫家小閘躍龍闗杜楊涵洞朱馬灣閘邱家涵洞范家涵洞從家涵洞狼兒閘張成涵洞胡成涵洞永安小閘喬家涵洞軍王涵洞子嬰滚壩子嬰雙閘二西隄閘壩三曰竹絡壩通湖小閘減水壩寶應縣河自山陽縣交界起至界首止長一萬二千一百八十一丈康熈三十九年題准挑浚深通東岸自寶應縣黄浦起至江都縣壁虎橋止計程二百三十三里康熈三十八年加髙三尺底寛四丈頂寛二丈臨河簽釘排椿至康熈四十年排椿損壞改修坦坡自寶應縣寶林菴起至江都壁虎橋止又加修埽灣迎溜處排椿及加鑲石工柴土共長一萬八千七百三十五丈七尺五淺西隄稱鈎灣創建石工一段長二百二十八丈四淺西隄宋家尖創建石工一段長九十六丈康熈三十八年興砌六淺五淺四淺一淺西隄舊石工殘缺四十二段三淺東隄舊石工殘缺一段共長六百六十九丈又加髙石二層長一千八百九十八丈五尺康熈三十五年興修南𢎞濟攔河大閘一座康熙四十一年題准重建子嬰壩下胭脂溝洩運河暴漲之水入射陽湖嚮年淤墊康熙四十一年題准挑穵自胭脂溝起至老河口止長三百丈自老河口起至姚子港止長三百丈俱已深通以丄俱河防志運河即古之䢴溝也宋山陽志雲南接廣陵北流入海左傳哀公九年呉築䢴溝通江淮杜預注云呉於䢴江築城穿溝東北通山陽西北至末口入淮呉越春秋云呉將伐齊自廣陵䢴江通淮運糧之水路也隋大業元年煬帝幸江都發淮南諸州丁夫十餘萬開䢴溝自山陽至揚子入江渠廣四十步旁築御道植以楊柳盖前此揚州西北自末口達六合入江東北自射陽湖入海是時始自揚子達六合自山陽瀆入淮矣𢎞濟河初稱越河始於宋陳損之之疏繼以明白侍郎昂築髙郵越河寶應令聞人公詮上其事屢議屢停迨萬厯十年狂飈大作覆舟無算死者甚衆於是都御史李世達王廷瞻相繼題請而圈田靠隄兩論不決吏科給事中陳大科上疏陳利害工部尚書楊兆主靠隄之議帝從之發南京户部帑銀十萬兩撫按贓罰五萬兩萬厯十二年九月興工東築新隄一道西仍舊隄南北建石閘二以資出入明年五月告成賜名𢎞濟河運河隄自黄浦至界首長八十里即唐李吉甫所築平津堰也宋天禧中發運使張綸増築重和元年發運使楊廷俊言真揚楚泗髙郵運隄舊有斗門閘十七座宜修復詔從之明洪武九年詔修髙郵寶應湖隄六十餘里以捍風濤復以老人栢叢桂奏發淮揚丁夫五萬六千人令知州趙原督甃磚隄永樂七年平江伯陳瑄築髙郵寶應汜光白馬諸湖長隄以度牽道𢎞治間揚州同知葉元又多積土以廣之萬厯七年詔修石隄自南門至槐樓二十里僉事史邦直董其役寶應縣志明初太祖都金陵江以北不事漕洪武九年用寶應老人栢叢桂言發淮揚丁夫五萬令有司督甃髙寶湖隄六十餘里以捍風浪此河隄之始也叢桂又言寶應自槐樓抵界首鋪沿湖隄屢修屢圯民苦役無已時開直渠便從之由是就湖外直南北穿渠四十里築隄長與渠等此内外河隄始此外舟内行得免湛溺之患且紓民力焉揚州府志髙郵州河道自寶應縣交界起至江都縣交界止計程九十里設閘二曰陸漫閘裹頭金門閘裹頭東隄閘壩涵洞共十六曰界首小閘永平大壩長十四丈今閉看花涵洞二閘頭閘三里橋閘今閉通湖橋涵洞久壞今閉琵琶閘久壞今閉城南滚水大壩長六十六丈五里滚水壩長十丈今閉五里小閘久壞今閉八里滚水壩長十丈今閉八里涵洞久壞今閉柏家墩滚水大壩長五十四丈車邏滚水壩長六十四丈火燒閘久壞今閉西隄閘口三曰枕家觜通湖閘窰港口以下俱河防志自泥甸橋起至永安南裹頭止河道計長四千九百七十五丈康熙四十一年題明開濬深通界首西隄石工長一千七十五丈七尺康熙三十八年興砌陸漫閘西隄石工長一千六百二十五丈五尺康熙四十年奉㫖修建永安西隄石工九百七十丈康熙四十一年完工永安東隄草大王廟裏口埽工長一百五十丈又龍門南北灣裏口埽工長二百二十六丈俱於康熙四十年題准修築以上俱河防志也永安河即清水潭清水潭之決歴楊茂勲羅多王光裕三河臣經營堵塞十有餘年前後費帑金五十餘萬隨築隨圯終難底績其故何也盖髙寶諸湖西南受泗盱天六諸山溪澗之水西北又值髙堰大潰黄淮東注南北交滙洶湧滔天方以下河為壑而清水潭尤屬卑窪其勢莫禦一難也屢塞屢決其勢愈盛寛至三百餘丈深至七八丈旋瀾飛沫如雷如霆一遇風飈乍起輒怒濤山湧漕艘商船至此者皆徘徊而不敢進雖有樁杙人力無所施二難也捲埽築隄全藉真正老土然後工程堅固可以永久而決口地方前後左右數百里内非一望汪洋即蘆洲沮洳之區無從取土三難也康熙十五年尚書冀如鍚等勘閲所司估帑五十七萬而夫柳仍𣲖之民間猶未敢必其成功臣受事後同行閲視曰是未可治也清水潭以髙寶諸湖為上源諸湖西南所受泗盱天六之水本等之水也西北所受髙堰東潰黄淮之水無妄之水也本等者不可去但去其無妄者而上流建瓴之水其力必大殺而後決可塞也於是先堵髙堰凡三十四決口築隄建壩令全淮盡出清口然後專力以治清水潭但決口既深闊異常若徒下埽填土則隨下隨溜以有限之金錢委無窮之巨壑是復蹈前人之轍也竊計決口不患其闊也而患其深然決口雖深而決口之上下五六十丈之外未嘗加深其法當避深就淺於決口上下退離五六十丈為偃月形抱決口兩端而築之計所築之隄其長必數倍於決口然較其淺深必減七八九倍不止況湖底平坦則樁埽易施湖面寛緩則衝淌無患因命於決口之上測之果深不過六七尺也然工程既大老土難得乃移咨漕督令大江以南空漕艘隨便帶老土若干方赴工交納選亷能官司之計方給價大抵梁王城之土居半盖土性膠而凝絶勝他處之土然去工所六百餘里非回空莫能運也於是立標授工就湖中越築之中下埽個内釘排樁外填坦坡身宿工處調度董率築成西隄一道長九百二十一丈五尺東隄一道長六百零五丈更挑繞西越河一道長八百四十丈凡一百八十有五日而工竣改清水潭曰永安新河連夫柳為費九萬兩有奇省帑金四十八萬餘兩至今十餘年屹然鞏固運艘民船永絶漂溺之告焉靳文襄公治河書清水潭隸揚之髙郵州連接運河而東西夾隄所以障湖流護田畆且束運河之水以濟漕艘孔道之郵傳車馬以通往來者也自髙堰潰決之後潭隄亦潰數百丈陸道永絶於是水連髙郵湖而黄復躡之下淹田畆勢浩瀚如海以綆測之淵深不可究且激湍瀠澓毎􅄓風作輒摧楫覆溺莫敢方舟前此司事者費帑至五十餘萬率隨築隨圯方冀尚書驗勘時所司估興築費五十七萬迨靳公之治之也相度既定飭夫肩土就湖中越築之僚屬疑無垠之湖難以填土成也莫不相視股慄長跪泣阻公笑曰以見定故不移耳豈漫嘗耶脫不效余承咎不爾累也於是歡躍雷動尅晷而竣且費僅九萬餘節帑者十之八人驚問故公又曰向之議築者率循潭畔故隄之址相因塞築耳詎知故址瀕深土草不可恃今就湖坦淺之處而越築之淺則需帑也約坦則無跛欹之虞且測淺深以衡土計土方以程工又何患期之難尅而費之難節耶聞者莫不歎服於是水用利涉陸用康莊而淹畆之涸出者先慶粒食矣盖潭雖不隸於淮而於淮之唇齒為至鉅故備誌之以表安淮之一助云淮安府志九里漫缺工長二十四丈康熈三十八年堵築以下俱河防志護城隄自攩軍樓北石工頭起至華嚴寺磚工頭止長一千六百五十丈康熙三十九年題准修築於舊石工上鑲柴壓土髙五尺南闗減水壩一座嚮年衝壞康熙三十九年題准改建滚水石壩長六十六丈水大從壩上滚出平漕蓄以濟運車邏減水壩一座嚮年衝壞康熙三十九年題准改建滚水石壩長六十四丈水大從壩上滚出平漕蓄以濟運南闗壩下康熙四十年題准開穵引河一道長三百九十一丈至朱三家橋與二溝河㑹合經興化縣海溝河入海滚出之水不致淹没民田車邏壩下康熙四十年題准開穵引河一道長三百三十丈至齊家莊與二溝河㑹合經興化縣海溝河入海滚出之水不致淹沒民田朱家田頭埽二長四十八丈康熙四十年題準修築西隄自城北陸漫閘裹頭起至城西窰港口南土地廟止加髙舊石工磚工共長五千三百九十九丈康熙三十八年興砌以上俱河防志運河即䢴溝也亦名官河西受七十二澗之水由甓社等湖經金門姚港口二閘而入是名髙郵漕河南至露筋三十里江都界由𤓰儀二處入江又由邵伯芒稻河白塔河二處東南入江北至界首鎮六十里寶應界接天妃閘淮水入渠與湖水合流為漕河濵湖曰西隄明平江伯陳瑄所造以捍湖水傍城曰中隄自城東古漕河廢東隄圯壞今亦槩稱東隄運河在西隄中隄之間本州境内中隄長一百二十里閘凡若干座水大則開閘以洩水水小則閉閘以濟運宋真宗時淮南轉運副使呉遵路於髙郵等處置斗門九十以蓄泄水利重和元年柳庭俊請修復髙郵運河隄岸斗門水閘迨元大徳十年浚髙郵等處漕河明洪武九年令揚州修髙郵寶應湖隄六十餘里以捍風濤永樂七年平江伯陳瑄築髙郵諸湖長隄以度縴道𢎞治二年户部侍郎白昂奏開複河於髙郵隄東賜名康濟隆萬間淮水東注漕隄壞總河潘季馴大修之河道乃復高郵之地西南接連揚州滁泗天長諸山其間危岡斷隴纍纍相屬地勢為髙東北與淮安寶應鹽城相連地形俱為最下濵於海故也髙者水之所出其源有七十二澗下者水之所歸凡七十二澗之水皆滙於三十六湖而後入海也境有三十六湖以受西山之暴流而為諸水之滙汪洋浩蕩方二三百里循湖而東有河焉曰運河其隄曰平津堰凡田地在堰之西者曰西上河在堰之東者曰南下河曰北下河以西髙於東故也南下河北下河之間有河焉曰運鹽河其隄曰東河塘凡田地在塘之南者曰南上河在塘之北者曰北下河南髙於北也故又曰上河也堰之在郵境者南北長九十里有閘數座塘之在郵境者東西長八十里各有斗門石䃮涵洞數十處水則西河藉南河北河以為之洩旱則南河北河藉西河以為之溉此古髙郵之水利也舊志曰國初之制平津堰設立二十三淺東河塘分為十塘淺有淺夫使之不時撈濬塘有塘夫塘夫即田鄰夫也使之相宜培補既又設管河判官一人主之是以二河深下運河運鹽河隄岸堅固蓄洩有則水旱無虞民未告病也自後黄河之道頻為淤塞而淮水不得入海千流萬派畢㑹於郵而髙郵遂成巨浸矣況境内治水之成䂓又廢棄而不講哉淺夫塘老徒具虚名平時不復撈濬一遇水發惟取客土培隄以障之隄日益髙水日益長田日益下而西上河巳坐受其害矣及時雨大作然後役人傳箭搖鈴晝夜集隄下以防其或決而其勢又不能使之不決也然其決也不出於南則出於北堰決於北則北下河受其害堰決於南則南上河受其害而其勢又必及於北下河是堰之未決害在於西堰之既決害在南北此盖歴歳之故轍也故治西河之水以撈淺建平水閘為主生員王儆之議悉之議曰竊見髙郵寶應一帶漕河南至𤓰儀北抵淮安誠南北往來之要津也國家之利害生民之休戚皆係於此最為要害𢎞治間平江伯督理漕運置平水閘蓄水三尺五寸乃為定制俟其水長聴其自洩縱有大水亦無大患仍置淺船編設淺夫以時撈淺再無壅塞但遇旱年運船過盡仍放洞水救濟下河是以上下田禾不知旱澇歳獲豐收家給人足國用以充民生以遂良法美意萬古不磨夫河近年以來法久寖敝閘猶見在制不如前雖有淺夫之名而無淺夫之實所置淺船並無影響只知修理塘岸不知撈濬河泥且帶客土專事修培塘岸日益加髙河底日益壅塞以至平水之閘廢而為減水之閘矣顧將以為漕河之利而更不知其實為漕河之害也盖河底積髙而塘岸轉或弗固水蓄太多而舒洩時或不及必待時水泛漲然後纔開閘洞毎值久隂恒悲苦雨況連三十六湖又通七十二澗水勢騰湧難免淹沒郡城内外陸路舟行公堂之下悉為池沼沿門比屋沉竈産蛙人人跣足在在褰裳晨昏厲涉多生疾病傾屋頽垣致傷非命今歳𤓰儀城牆浸倒殃及居民是其驗矣況乎上流被患之地閭閻疾苦莫能罄述動則七八十丈或至百十餘丈至於稽遲漕運損壞漕隄直將運河洩乾而後修理始固多則經年少亦屢月工料糜費至數千數萬金勞民傷財莫此為甚上河先沒下河繼淹遂使膏腴之地盡為魚蟹之區哭聲動地水患滔天直至興化鹽城等處地方並各場分靡不受害屋宇車朩咸至漂流牛畜雞豚盡罹災厄億萬生靈無一卒歳一應糧差致勞催迫拆蕩賣鬻何所不至父母凍餒妻子離散四野一望十室九空甚至民窮盜起或生意外之變況我淮揚之民多以力田為業若不亟為之所則將何以為生也哉為今之計尚有可圖抑亦所謂猶有七年之病而求三年之艾也茍為不蓄終身不得自今蓄之則猶或可及耳查照先年䂓格添修平水閘座酌為一定之制恒存六尺之水水但過格自然下流無晝無夜無時無刻以漸而長以漸而去永無淹沒之虞亦無衝決之患責令淺夫常川撈淺計照淺鋪一所仍置淺船四隻編定淺夫八名審立淺長一人毎夫二名領船一隻更置竹䈒朩掀篙棹等物一人艤棹一人攬泥朝䈒一船暮䈒一船俱令發於岸上盡數幇在裏邊只許幇闊不許加髙䈒過船數淺長督報管河衙門以時稽考撈得寸泥可蓄寸水撈得尺泥可蓄尺水幇闊一尺有一尺之益幇闊一丈有一丈之益日計不足月計有餘塘岸日益堅固河底日益濬深便遇旱乾亦不壅塞必俟運船過盡仍放各洞之水急救下河之旱夫然則上河之水蓄洩有常下河之水長落以漸水年不至於淹漫旱年不至於乾涸田可長熟歳可常登國用以之而裕民命以之而全此我國家萬世之利也此我淮揚萬世之福也但造船隻恐乏錢糧合無請發鹽場枯樹地租等項餘積官銀坐委廉幹人員督造務在堅緻不得茍簡淺船所受只在二十石計算工料不過五金或於民田糧上帶徴些須𩔖解協濟民亦樂從此狂穉千慮一得之愚也按撈淺平水閘二䇿百年以前言之在今日亦為長䇿也盖河身髙則礙運艘一患也漕隄髙則易崩潰二患也撈淺之制久廢十年以前尚不時挑濬漕隄未常加髙康熙元年治河非人平時開放周家橋諸湖盈溢又值淮水大漲漫下翟壩二十五里而害愈甚乃嚴督居民毎家十土包加築子隄緩則處死隄上漸髙三尺之土民間已沒三尺之田且隄髙愈危閘復不整故常致潰決禍延至今溺死人民糜費國帑職是咎也近議建滚水壩即古人之議建平水閘也但必廣為之制與翟壩二十五里相應然後可髙郵州志今日運道自儀真直抵潞河其間最險者有二所髙郵湖隄及徐吕二洪是也然二洪之險地也地有定形人可以用其力湖隄之險則天也天無常變雖若非人力可為然人力勝天亦有此理惟今髙郵之湖南起杭家觜北至張家溝共三十餘里唐李吉甫為淮南節度使始於湖之東面亘南北築平津堰以防水患即今牽路在宋時又有斗門水牐迨我朝洪武九年知州趙原者始甃以甎永樂十九年加以甎之大者景泰五年又護以朩樁實以甎土以備風浪綱運之上下舟楫之往來皆沿隄行人以牽百丈方其天色晴霽風恬浪靜如行鏡中然一遇西風驟起波濤洶湧頃刻之間檣楫傾沉人物淪亡不可勝計建計者往往欲於舊隄之外湖泊之旁别為長隄一帶約去舊隄一二十丈許下覆鐵釡以定其基旁樹朩樁以固其勢就浚其中之土以實之用甎包砌一如舊隄其中舊有減水牐三座就用改作通水橋洞引湖水於内以行舟楫仍於外隄造減水牐以節水勢如此則人力足以勝天天雖有迅歘之變人則有持循之方省官物之失陷免人命之死亡其為利益實非小矣潘游龍康濟論隄論中所言二險二洪不必慮矣唯髙郵湖其險如故也司河者當未雨而綢繆之行水金鑑巻一百五十一
