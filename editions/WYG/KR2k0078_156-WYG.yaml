body:
  text: 行水金鑑卷一百五十六江南按察使傅澤洪撰兩河總説此自明至今兩河總説也博採諸書其中或有事蹟相同之處祗取其文理之條貫亦不嫌其語言之重複也國初都金陵漕舟於江其餉遼卒則自海運即元人故道永樂中改都於燕歳漕東南粟四百萬石由大江渉髙郵寳應諸湖絶淮入黄河經㑹通河出衞河白河遡大通河以達於京師設爲諸洪泉壩閘蓋南北之喉咽天下之大命也淮泗水相廹泗州祖陵在焉河決而南則逼祖陵抑而北則妨運道引而東河淮交注又慮有清口海口之壅順之則水直洩而漕竭逆而隄之則此塞彼決而漫散爲禍蓋二百四十餘年智臣謀士彼善於此者則有之未有能使横流奠安永爲百世之畫者也請按黄河之原委及諸運道海道與當代治河之得失諸家之謀議而叅以管見俟治河者財擇焉考郭璞稱黄河之源起崑崙山潛行伏地至于闐國乃分流岐出合而東注鹽澤復由積石入于中國逕湟中至寧夏靈州復入虜中曲折行二千餘里名曰河套即我故東勝等地淪於虜者至山西之老牛灣河始入中國套故沃壤而寧夏阻河歴秦漢唐鑿渠引水灌種河爲中國患獨此受其利自河套不守民苦虜掠不得耕耨而地亦荒蕪矣河既合秦晉諸川其流始大至河南遂散漫泛溢至山東勢益峻急衝突考之三代以前河東北入海未甞與淮合也自漢徙頓丘隋煬帝引汴而河始入淮濫觴於宋熙寧澶淵之決至於今日全河入淮矣一自蘭陽東南流由杞縣睢州寧陵歸徳符離橋宿遷小河口入一自寧陵南入渦經亳州蒙城懐逺荆山口入一自儀封北折經黄陵岡蔡家口梁靖口出徐州小浮橋清河縣入此河之三道也按輿地河由三門七津而上有鳴沙嶺寧夏太行諸山夾之相盤束不爲患澠池孟津而下岸無山矣即河南有北邙山河隂有廣武山亦僅障南岸一面北岸無所夾束至武陟又合以伊洛沁氾之水故其下益汎濫者必然之勢也按禹𨗳河自積石至龍門南至華隂東至底柱及孟津又東過洛汭至于大伾北過洚水至于大陸播爲九河同爲逆河以入于海而水患始平至殷盤庚乃數遷都以避河汜猶未徙也周定王五年河徙矣猶未決也漢文帝時決酸棗自武帝築宣房於瓠子館陶分爲屯氏後入千乘德棣之河又播爲八水有所洩而力分故由東京迄唐鮮有河患宋穿六塔開二股識者病焉而借河禦敵抑又謬矣明洪武二十四年河決原武淤安山湖而元會通河故迹遂湮時以海運遼餉故獨議河無議漕成祖北遷始猶海運實燕京巳復㑹通河海運遂罷時河歳爲變平江伯陳瑄建壩置閘周慮力圖至今頼焉正統十三年治滎陽縣自開封城北經曹濮二州陽榖縣以入運河至兖州沙灣之東決大洪口諸水從之入海景泰四年徐有貞乃更作九堰八閘以制水勢復於開封金龍口等處開渠二十里引河水自蘭陽至徐與清河合而河入漕自此始𢎞治二年復決金龍口趨張秋出中牟下尉氏溢蘭陽儀封考城歸徳至宿州瀰漫四出不可禁白昻婁性築隄鑿渠南北分而主疏五年復決金龍口未幾又潰張秋隄奪汶水入海東昌臨清流幾絶而漕舟遂阻羣議洶洶謂河不可復當復海運而朝議弗是也命平江伯陳鋭都御史劉大夏治之發丁夫數萬於黄陵岡南濬賈魯河一帶分殺水勢下由梁靖口至丁家道口㑹黄河出徐州流入運河又從黄河南濬孫家渡口别開新河一道𨗳水南行由中牟至潁州東入於淮又濬四府營淤河由陳留縣至歸徳州分爲二派一由宿遷縣小河口一由亳縣濄河㑹於淮又從黄陵岡至楊家口築壩堰十餘并築大名府三尖口等處長隄二百餘里及修南岸于家店筒瓦箱等處隄一百六十里始塞張秋決口更名曰安平鎮又於河東置減水石壩分五洞以洩水勢正德四年溢皮狐營決曹縣之温家口馮家口等處又北徙至儀封縣小宋集而決衝黄陵岡埽壩溢入賈魯河敗張家口等處縷水小隄循運河大隄東南行而賈魯河下流淤塞亦出張家口合而南注遂決楊家口道曹單二縣城下直趨豐沛命官塞之十二年溢武城縣壞城廓田廬命官修濬嘉靖五年上流驟溢東北至沛縣廟道口截運河至雞鳴臺口入昭陽湖汶泗南下之水從而東而河之出飛雲橋者漫而北泥沙塡淤亘數十里管河官力濬之僅通舟楫六年復塞老和尚寺八里屯張家莊等處命官發丁夫數萬於昭陽湖東北起汪家口南抵留城口改鑿新河以避黄河衝塞之患㝷以災異罷役命官即故道濬之修築單縣林臺至沛縣舊城隄百四十餘里以塞入湖之道又濬趙皮寨孫家渡口殺上流之勢沛漕復通九年自沛北徙横流金鄉魚臺出榖亭口命官濬趙皮寨抵寧陵故道及築睢州張見口至歸德州長隄百餘里以禦泛漲尋以河流改遷罷役十四年築岔河口縷水隄一道長三里又於曹縣八里灣抵單縣侯家林築長隄八十里十六年鑿地丘店野雞岡等上流支河四十餘里十九年濬睢州孫繼口至丁家道口淤河五十里二十一年又鑿野雞岡上流李景髙等口支河三𨗳河東注以濟二洪二十四年由野雞岡決而南注泗州合淮入海遂溢蒙城五河臨淮等縣二十五年又決曹縣溢入武城金鄉魚臺單縣漂溺甚衆命總理河道都御史㑹同南北直𨽻山東河南撫按官議築曹縣等處不果三十一年又決房村至曲頭集凡決四處淤四十餘里命官濬之役夫五萬餘三閱月而成三十七年淤新集趨叚家口析爲六支入運河又由碭山趨郭貫樓析爲五支出小浮橋㑹徐州洪四十四年郭貫樓淤遂決華山出飛雲橋截沛以入昭陽湖北泛湖陵城孟陽泊至榖亭南溢於徐命官往治乃接六年所鑿故迹役夫濬之爲南陽新河又疏舊河自留城至境山又隄馬家橋遏河流之出飛雲橋者使盡歸秦溝魚沛横流始絶惟茶城時有淺阻隆慶四年又決邳州注睢寧出小河口自曹家口至直河淤百餘里命官濬之復故渠盡塞諸決口六年築隄自徐邳至宿遷三百七十里萬歴元年茶城復淤修建境山閘并䕶房村等處隄岸及築遥隄四年開草灣𨗳河自安東縣後至金城五港入海然泛濫如故曹豐徐邳之間隨塞隨決五年秦溝復淤自崔家口歴北陳鴈門集等處至九里山出小浮橋其一支自九里溝詣安山歴符離出小河口而崔鎮大決散漫湖泊間桃源以下故渠多淺入海之路大阻淮安墊焉議者又開支河濬海口督漕都御史潘季馴巡行相視築堰以捍淮東侵築隄以制河南溢嚴五壩啟閉使河内不得衝閘而蝕漕諸縷隄廹河者畢展築兩崖地窪者各増築原隄短蹙防䕶未周者連接築以爲即有異常泛溢縷隄不支至遥隄而極可恃以無恐矣然隄堰雖堅而疏濬無法以致流沙日壅清口日淤泗陵水患實基於此十四年河決范口十五年決祥符劉獸醫口決蘭陽銅瓦廂決封丘原武長垣之大社集毛家口茶城又報淤矣十六年諸決口皆已塞淤者漸疏通十七年復決雙溝單家口於是專議築趙皮寨至李景髙口遥隄將軍廟至塔山長隄築羊山至土山横隄河防幸無事至二十一年河復大爲患決汶上決魚臺决濟寧決鉅野決邳州宿遷髙郵泛漲泗州幾成魚鱉之鄉祖陵松栢槁於水者過半皇上震怒急遣科臣荒度之至冬水涸時河臣力主分黄開桃源縣之黄家壩三十里下五港口入海漕臣禇鈇按臣牛應元議廣疏入海之途盡闢清口之沙以𨗳淮正流上開周家橋下通金家灣以洩淮積浮固無事過爲分黄者而河臣必欲分之也乃黄不之所分之路而之黄堌數十萬金錢置烏有矣漕臣曰黄堌不塞必爲祖陵憂爲運道梗按臣亦云當乘伏落以挑淺塞黄堌節制黄流依然東注而河臣弗聽也置黄身之髙於不究黄堌之決於不塞比晉大司空假手代事者挑三山台趙家圈旋即告阻數十萬金錢又置烏有矣鬱鬱祖陵蛟龍將騁徐邳中流翦焉幾斷河臣劉東星以憂死皇上又赫然震怒斥大司空簡河臣李頤往視事條利便以聞又以憂勞病殞再簡曽如春時議以爲治有標有本在因其緩急曩祖陵所恃歸仁隄以爲捍蔽未嘗不完且堅也今蒙墻衝決黄水漫入五河與淮㑹合經泗州下洪澤至秋水發深爲可虞爰議接築汴隄遏絶黄流自歸德至永城築隄二百三十里自宿州界首舗至東關築隄三十餘里障水東行俾由符離橋出宿遷白洋河無爲陵患又慮徐沛一帶河道淺澀議自鎮口以裏至宿遷縣磨兒荘倣閘河䂓制建大閘七座中閘二座并挑濬河身廣蓄泗汶泉流以濟重運又有謂開潘家樓口接徐家口矣有謂開小股河接孫家灣矣有謂開何家營從趙家圈復賈魯河故道矣有謂開艮河矣又有謂水之力大不宜與争姑捐東方之地徐觀其勢之所歸因而𨗳之力寡而利永矣而力主開王家口者總河也按王家口下達李吉口經唐家口小浮橋入徐邳宿遷其間應挑應築應塞計四百里有竒夫埽料約銀一百四十萬派夫一十二萬餘或髙築隄岸以防南逸或堅築截河隄壩令逼向東流或多築滚水石壩𨗳餘流歸白河以減新河之漲或於王家口一河之外别求支流以殺其勢約以兩朞告成蓋將使陵運永無水患而中州之民不爲魚也獨計蒙墻口其奔逸之河也王家口其未成之河也河已南而挽之使東其勢非東方之盡下不可且王家口地視黄河水面髙者至丈餘少亦不下五六尺所開新河闊不過二十丈深不過一丈五尺此與黄河比大絜深其不可同年語也明矣新河髙而舊河下則水不奔趨新口小而舊口大則水不吞入引之而流不來刷之而衝不去鑿者不勝淤築者不勝潰開河而實無河也且所勘者止徐州九里溝以上而徐邳一帶全河門户運道襟喉先因黄堌口決分奪全河之水嗣因䝉墙口決盡奪全河之水致一望平壤所在膠舟不聞一勘焉議者又曰自大浮橋以至邳州河身深闊不減昔日呂梁洪水面以上尚髙二丈餘其間磨兒莊雖稍有淤灘全河俱在畧加修濬黄河一到可無阻碍誠大加展闊未有不順流而東者又一説也然總河議纔兩月王家口巳無迎溜之勢旋開郭遂莊以逹下劉口矣或謂賈魯一河䝉墻黄堌二決口之水俱入其中爲下必因川澤力半功倍焉而議者又以復賈魯河不便於河南開王家口便於河南不便於山東噫茍有利於社稷安問其河南與山東也第恐水勢難强南隄不能束其溢石壩不能攢其流灌城郭漂人民山東之水災頻仍河南之阽危轉甚矧其禍又不獨在河南山東而中於陵運也昔宋熙寧河決恩州司馬光請於二股西置上約擗水令東流既深即塞北流放御河胡盧獨下以紓恩冀深嬴以西之患帝曰東流北流孰輕孰重光曰兩地皆王民無輕重真仁人之言哉今奈何爲一方擇便也矧開河易塞河難塞決河易塞千百年之黄河難今王家口在蒙墻決口之上十五里其河則黄河也不辨牛馬望洋向若即汲郭王延世之徒猶且却歩而不敢前顧欲捧土而塞孟津可乎夫新河既成不塞黄河則水勢有所專趨新河終爲淤澱是棄前功也塞之又難爲力也無論全塞即稍壅之其上流銅瓦廂芝蔴莊黄陵岡諸處水決裂四出若黄陵岡一決則水渰漕河奪汶濟入海之路以去如永樂景㤗故事是漕舟不通而咽喉盡塞視今日黄河雖南而小股河李吉口涓涓之流猶可下通徐州建閘濟運其事勢不侔矣且夫李吉口淤而黄堌口決黄堌口半塞而䝉墻口決下決未通而傍決復塞則愈決愈上此往事之明鑒以下俱明副書大通河即潞河舊爲通惠河其源出昌平州白浮村神山泉過榆河㑹一畝馬眼諸泉滙爲七里濼東貫都城由大通橋而下至通州髙麗荘入白河長一百六十餘里元初所鑿賜名通惠每十里爲一閘蓄水通舟以免漕運陸輓之勞國朝永樂以來諸閘猶多存者仍設官夫守視然不以轉漕河流漸淤成化正徳間累疏功不果就嘉靖六年自大通橋起至通州石壩四十里地勢髙下四文中間設慶豐等五閘以蓄水每閘各設官吏共編夫一百八十名造剥船三百隻分置各閘使製布􅇸盛米雇役逓相轉輸白河南去通州二百里其源出胡地經密雲縣合大通榆渾諸河凡三百六十里至直沽㑹衛河入海源逺流迅河皆溜沙每夏秋暴漲最易衝決每決輙發丁夫修築屢築屢決正統三年官相視地勢自河西務徑二十里改鑿順下河遂安流每於淺處設鋪舍置夫甲專管挑濬舟過則招呼使避淺而行自此而南運河淺鋪以次而設衛河舊名御河源出河南之輝縣蘇門山東北流㑹淇漳諸水過臨漳分爲二其一北出經大名至武邑以入滹沱其一東流經大名東北出臨清至直沽㑹白河入海長二千餘里今爲運河此河自徳州而下漸與海近河狹地卑易於衝決㑹通河自臨清迤南至濟寧州元初由任城開渠至安民山一百五十里復自安民山之西南開渠由壽張西北至東昌又西北至臨清凡二百五十里引汶絶濟直歸漳衛洪武二十四年河決原武縣黑陽山由舊曹州鄆城縣兩河口漫過安山湖而㑹通漸淤永樂九年因海運艱阻疏鑿元人故道乃於東平州戴村汶水入海處築一土壩横亘五里遏汶水使西流盡出南旺分流四分往南接濟徐呂六分往北以達臨清自後添設新閘修築舊岸大爲漕運之利汶河一出新泰縣宮山之下曰小汶河一出泰安州仙臺嶺一出萊蕪縣原山一出縣寨子村俱至州之静封鎮合流曰大汶河出徂徠山之陽而小汶來㑹經寧陽縣北堽城歴汶上東平東阿又東北流入海元於堽城之左築壩遏汶入洸南流至濟寧合沂泗二水以達於淮自永樂間築戴村壩汶水盡出南旺於是洸沂泗自㑹濟而汶不復通洸今沂州亦有汶河一出䝉山東澗谷一出沂水縣南山谷俱入邳州淮河洸河乃汶水之支流出寧陽縣北三十里堽城西南流又循縣南流三十里㑹寧陽諸泉又六十里經濟寧城東與泗合出天井閘河沂河源出曲阜縣尼山西南分流爲二一西流至金口壩上即與泗㑹一南流亦與泗㑹出塂里河乂有出沂水縣艾山者㑹蒙隂沂水諸泉與沂山之汶合流至邳州入淮泗河源出泗水縣陪尾山四泉並發西流至兖州府城東又南流經横河與沂水合元時於兖州東門外五里金口作壩建閘遏泗之南趨國朝因而修築每夏秋水長則啟閘放使南流㑹沂水由塂里河出師家莊閘冬春水微則閉閘令由黒風口東經兖城入濟又南流㑹洸水至濟寧出天井閘濟河出王屋山至河南濟源縣二源合流其水或伏或見東出于陶丘北又東北㑹于汶今在汶上縣北一名大清河元人作金口壩旁有河西通濟流並入㑹通河沁河出山西沁源縣綿山東谷由太行山麓至河南原武縣黑陽山與河汴合流至徐州入運河以濟徐呂二洪每年水勢淺深尺寸管洪官按季奏報前代甞引沁以通衞正統以前其支流猶自武陟山原村東北由紅荆口經衞輝凡六十里與衞通天順七年河趨陳潁入淮乃開沁以達徐復引河以合泗而入衞之故道始湮新河在昭陽湖之東起南陽至留城一百四十一里八十八歩嘉靖六年以河決命官開濬垂成而止四十四年復決乃因舊跡疏鑿又起留城至境山濬復舊河五十三里凡役夫九萬一千有竒八閲月而成隆慶元年山水衝決復淤新河之三河口乃經理沙薛上流各開支流築黄家口豸裹溝等壩引薛河由呂孟湖出地浜溝築宋家壩引沙河由尹家湖出鮎魚口築黄甫壩引沙河由滿家湖入南陽湖次年工成又爲三河口石壩一座南陽湖石隄三十餘里凡建閘九築壩十三減水閘二十開支河九十六里三年又於昭陽湖以東沙薛二水所從入舊河處開鴻溝廢渠達李家口回回墓而東出留城閘計六十餘里積水俱有宣洩滕沛利之泇河自邳州抵夏鎮凡二百三十里中微湖沂河兖東汶泗沂費滕嶧諸山水鍾焉爲徐邳槖鑰引泉水以達呂湖引湖水以入泇河由宿遷出口與淮流接可避黄河之險隆慶中朱衡建議下羣臣熟計嗣是言官屢請舒應龍創開韓莊渠分洩湖流續劉東星分委諸臣併力疏闢又開黄泥灣支渠節縮湖流築塞舊漕使水專一而不分建竪壩閘使水瀦蓄而不洩然河狹微有土山第便輕舟其下版石人力難施而説者以開韓荘之山礓不過數十里鑿梁城之山渠不過十數里費金錢不過數萬憚此數十里之艱而日與黄河争數千里之利惜此數萬之費而歳置十百萬於洪濤漭瀁之中孰難孰易況設閘必須用石則開鑿亦非虚糜矣海運起於元巴延其議三變終元之世頼之京師即元故都北以居庸巫閭爲城南以大海爲池轉運之路淮安爲中樞河運爲左翼海運爲右翼永樂中尚循元之故道以㑹通河成遂罷丘濬甞極言海運之利而羅洪先訪其道里島嶼若風雨雲日之占驗載之輿圗中所以屢議屢格者不過動色於風濤耳不知海人行海亦猶陸人行陸其習知島嶼以灣泊審潮迅颶之期以爲趨避自可無患且元人海運所以有失者起太倉嘉定逓而北茫洋萬里風濤叵測無山可避若自淮安而東由登萊泊天津中多島嶼可以避風而登州有海市云是石與水氣相搏映日而成則水淺之証海運必通膠萊輿地圖云登萊本海運故道稽之往蹟平度州東南有南北新河源出密縣至膠州分爲二流北流西河入萊之海倉口以其自膠抵萊故名膠萊元時所濬可避迤東海運數千里之險今壩閘遺址尚在嘉靖十一年御史方逺宜廵膠萊訪其遺跡爲圗表之副使王獻力主其說遂有膠萊之役自南口起麻灣北口至海倉口相距三百三十五里兩口舊貯潮水不假濬者二百餘里濬者一百三十餘里中有分水嶺開鑿雖難止三十里耳河成漕由淮安清江浦歴新壩口馬家壕麻灣口海倉口徑抵天津直沽凡一千六百里半從河行即海行止由海套不泛大洋歴劉家蓬萊島沙門黒水成山諸險功垂成㑹獻去官中罷今故老猶能道其詳且謂糈不過數萬役可借班軍不煩他勞費二年可告成功與河運逓用此塞則彼運彼塞則此運仍設重兵屯守膠萊海次衞漕防倭亦一巨鎮也難者謂隆慶中王宗沭甞行之誹刺藉藉㑹再運三百艘壊而罷然河勢湍悍適逢其怒不啻海波之惡閘河中兩舟難並魚貫逆遡一夫大呼萬櫓俱停一舟連觸數舟並壊較之海運利害亦相當矣抑霍韜有云古黄河自孟河至懐慶東北入海今衞河自衞輝汲縣至臨清天津入於海則猶古黄河故道莫若於河隂原武之間審視形便𨗳河入衞以達於臨清天津不惟徐沛之流可殺其半而京師形勝所壯百倍冬夏水平則由江入淮沂流至於河隂順流達衞夏秋水迅仍由徐沛以達臨清是一舉而得兩運道也黄綰又云漕河發源皆自山東不資於河南旺馬塲樊村安山諸湖但封浚泉源修築隄岸疏河中積沙以深蓄湖水則湖外長溝馬房南至鈎兒口北至安山即宋之梁山泊也地形窪下較諸湖水低改漕經焉可免濟寧髙源淺澀之艱又一說也淮安之東南有髙家堰永樂間通淮河爲運道築隄堰上以防淮水東侵又自府北鑿河蓄諸湖水南接清口凡六十里建閘逓爲啓閉而築壩以殺水勢自清口引淮爲清江浦至烏沙河匯管家白馬二湖隄黄浦八淺及寳應縣槐角樓南諸湖相接西抵泗州盱眙縣界皆運道所經湖東有隄長三十餘里其南髙郵邵伯等湖皆有石隄運船觸隄多敗溺𢎞治三年於髙郵迤東開新河以避其險曰康濟河嘉靖五年於汜光湖東開新河三十里康濟河遂棄萬歴十二年又於隄東開新河三十餘里以避槐角樓一帶之險曰𢎞濟河蓋寳應諸湖隄岸相接其有溝可通注於海者置水閘以防其洩又南則爲儀眞之上下江口及𤓰洲便河皆由江達淮之運道也黄河爲運道之最險曰徐州洪亂石峭立幾百餘歩故又名百歩洪去徐州東南六十里有呂梁洪上下二洪相距七里亦運道要害萬歴十一年議由昭靈祠南黄河出口歴羊山内華山梁山接境山開河設閘以避戚港之溜士竒曰河源起北紀之首曰北河江源起南紀之首曰南河江始岷山浸至楚荆波濤洶湧奔流赴海河源雖長未若江廣而爲患最大治無善䇿何哉夫河能爲災亦能爲利者也故不知河之利者則不能抑河之害禹平水土亦盡力溝洫而稷成之東南無不耕之土分畦列畛畆自爲澮頃共爲渠疏而成川窪而成淵漏者坊塞者濬四野溝洫皆治水之處三時耕歛皆治水之日家家自力本業皆治水之人試觀沿江圩田重重連隄即有衝決距至百損故能束横流而注之海而利九害一西北多荒土種亦黍麥水不爲利遂反爲害稍暘則傾㵼而無所停淫雨則肆溢而無所約桑海時變聽之河伯而曰神不可以人謀則寧夏之沿河套地最號沃壤神何獨庇此一方乎又謂西北不可以稻則三代之盛都於冀雍曷甞仰給東南夫天人互勝損益相生利害旋轉者也墾田受一分之利即治河減一分之患使方千里之水各有所用而不至助河爲暴此十全之利也使方千里之民各因其利而不煩官府之鳩此執要之理也土著之民各識其水性因以順爲功其與不習之吏驟而甞試逆施而倒行者又相萬也海運之法以爲海波甚險而閩粤鏡澳全以航海致富以爲島夷足虞而當元季世猶能什達六七嗟夫非常之原世之所驚也即十全之墾田猶病阻格况海運利害㕘焉者乎然海運不可復而膠萊故道宜備緩急墾田不可興而沿河諸邑亦宜廣疏通遺派治河派壅而河終潰舍河議漕河決而漕并壊故分支𨗳河因河爲漕此必然之勢亦自然之利也計今獨泗陵不得不嚴爲隄其他無分河南山東第相河必下之勢以成其必由之道亦如南江庻幾一方病而諸郡猶不爲魚乎若夫彼此顧忌首尾牽制較利害於毫毛而不權重大取旦夕之茍安而不計乆逺石坻强鑿而罔功漏巵旋塞而隨裂此無異於捧土爲戲者也余前過徐相水之勢必決入城語分廵公急移民出而以愚民不可與慮始請公以身先之公以予爲迂憚弗徙也未踰年而河夜決盈城半爲魚矣公舍居髙與居髙之民得以舟濟以上俱明副書行水金鑑巻一百五十六
