body:
  text: 行水金鑑巻一百五十九江南按察使傅澤洪撰两河總説漕河南盡𤓰儀北通燕冀其間自昌平州神山泉等水由西山貫都城過大通橋東至通州入白河者大通河也自通州而南至直沽㑹衞河入海者白河也自臨清而北至直沽㑹白河入海者衞水也自汶上縣南旺分水河口其分而北流經張秋至臨清以㑹衞河其分而南流至濟寧天井閘上㑹泗沂洸三水者汶水也自濟寧州城東北以上㑹流而來出天井閘與汶水合南流至南陽出夏鎭每年俱於三月開彭壩入泇河出直口入黄以濟重運入泇至九月閉彭壩由呂公堂濟回空由徐州大浮橋入黄南下者泗洸沂并山東泉水也自直河口至清口者黄河水也自清口通淮南至儀眞𤓰洲者淮湖諸水也國家歳漕四百萬粟以實京師餉各邉勢必由河以濟是治河即所以治漕但兌運之先後漕輓之遲速而閘壩之啟閉水勢之蓄洩恒必因之是漕治而河亦治南河全考國家漕輓之政凡三四變云洪武間定鼎金陵則漕於江餽餉遼卒則因元舊漕於海自永樂北都海運由直沽達京師者未改其自河運者則由江入淮由淮入黄河水運至陽武縣由陽武陸運至衞輝府入衛河抵北京及㑹通河開則始漕於裏河而海運罷矣裏河者即今南盡𤓰儀北通幽冀者是也其間自昌平神山泉等水由西山貫都城過大通橋東至通州入白河者大通河也自通州而南至直沽㑹衛河入海者白水也自臨清而北至直沽㑹白河入海者衛水也自汶上縣南旺分水河口其分而北流經張秋至臨清以㑹衞河其分而南流至濟南天井閘㑹泗沂洸三水者汶水也自濟寧州城東北以上合流而來出天井閘與汶水合南流至今新河出茶城以㑹河淮者泗洸小沂河水也自茶城秦溝南流歴徐呂二洪至邳州㑹大沂河至清河縣入淮者沁水黄河水也自清江浦通淮南至儀眞𤓰洲者髙郵寳應諸湖之水也過此則大江矣然臨清而北衞水盛自徐而南黄流盛唯自臨清南歷張秋南旺濟寧以至茶城數百里之渠全賴汶泗沂洸諸泉以爲用夏秋漲則懼潦冬春微則病澁漕河襟喉獨此稱最要矣然閘河雖至要猶可以人力爲也徐州以南運河㑹黄河而利害大矣工部尚書朱公衡以黄河侵嚙沛縣切近運河乃徙運河而東五十里以上接於濟而下通於徐其意主於逺黄河也可不謂知耶然愚以爲當以黄河逺運河不當以運河逺黄河以運河逺黄河則凡黄河之所能至者皆當逺而避之此不東走海南走山耳故以起膠萊之議而有泇口之役也矧所避者止沛縣數十里耳而徐邳四百里之河患固在也以黄河逺運河則上流歸徳蘭陽趙皮寨口原係河流入渦淮故道去其淤積排決之耳無有泇口之斬山焚石也順其去路利導之耳無有膠萊之穿渠亂海也計不出此而亟亟於壘堤以障河吾恐盡徐淮之土亦無益於河且所築之堤基廣二丈崇七尺勢不加矣徐沛每至伏秋之時白浪如山拔地數仞則丈堤尺土實以激其怒而濟其暴也夫河性至湍悍必有以瀦之則緩其性而不爲暴有以分之則殺其勢而不爲暴古今治河無出此二者漢人有言河南岸强則攻北岸北岸强則攻南岸南北俱强則下流受傷今日之治河正犯此戒𢎞治間懼黄河之北犯張秋也故强北岸而障河使南嘉靖間以黄河之南徙歸宿也故塞南岸而障河使東今南北俱强矣所以淮邳上下毒遭全河之害而爲運道憂也夫曹單鄆濟之間如鉅野梁山泊等處汙澤窪下昔人於此以瀦河也自荆隆等口重堤以障之則河水不得上溢於鉅野梁山之間而無所瀦矣孫家渡及蘭陽趙皮寨昔人於此以分河也自決口填閼棄而不治則河水不得南入於渦淮而無所分矣既無所瀦又無所分洪河萬里又㑹番漢川澤之流而迫束於二洪之間以激其怒此不盡吞邳睢化而爲溟渤焉未已也故今日治河唯開趙皮寨口濬亳泗歸宿舊渠而已而議者有欲分沁水入衛以殺河患者有欲於陽武上下開一河引河入衛者夫河於四瀆中爲最大分沁若牛之一毛折一支而欲以殺河是猶以掌堙也若白河非黄河比也而底多淤沙衝決遷改頗與黄河同或謂令每運舟自擁兜杓三四五具遇淺即濬此亦省費之一䇿要之白河甚廣沙故漫漲以堅堤束之沙亦可以隨水而去有爲建閘之説者謬矣若徐呂二洪之險自昔記之乃今則有異焉全河東注深且二三丈水平石隐舟行不爲害以故两洪主事先後裁省去而統督於河北一郎中然是洪東連齊魯北界魏趙南通江淮西接梁楚固敵國必爭之地師行必據之險也况漕渠㑹通於此則係國用者尤鉅又不當以水平石隠而易之矣然民唯邦本今所治在運河而徐淮萬姓之墊溺中州千里之汙萊将聽之耶曰運道原不煩治能疏導河流使民得宅土處業則運道自安流也是故治黄河即所以保運河保運河即所以治黄河而或惡黄河之害也拂而障之是白圭以鄰為壑而今且以吾中原為壑當事者可無戒哉議疇耳剽河渠書曰大禹𨗳九河灑九澤功施於三代厥後滎陽下引河東南為鴻溝以通宋衛諸國與淮泗㑹於楚則河之合流於淮所從來矣漢興漕渠議數舉廢河徙則渠不利也及瓠子決汎州郡築宣房其上乃復禹舊跡焉宋元徙溢不常明金純𨗳河經二洪南入淮漕事乃定隆慶間髙家堰決淮水東注入髙寳諸湖河躡淮後濁流西泝清口遂淤而崔鎭等處河亦潰淮分則河不利也潘季馴大築歸仁隄翟家壩約淮水入清口乃闢則淮之能亂河亦能治河所從來矣語曰鏡已事者智不屈何必神禹之後更有神禹乎髙郵于漕渠僅處百里乃漕渠者髙郵之大利大害也髙郵者又漕渠之大利大害也黄河在山陽以北由雲梯關入海不在州境之内自前朝末年治河非人天妃閘口時有黄水過界首髙郵漕河遂淤阻碍運艘又或上流蔡家樓三义及歸仁堤等處黄河決入洪澤湖衝入周橋翟壩入髙郵湖漕堤必潰其害極大必使淮黄合流淮在南河在北淮可敵河河水不得南侵天妃閘内止有清水灌入運河周橋翟壩總無渾水下注始利於漕髙郵州志河之循太行而北入海也非自禹疏鑿始也岐伯靈樞經以水配諸經絡而河位在丑屬足太隂脾經則大陸逆河從古定勢特汩陳於鯀而禹始釐正耳漢武瓠子之塞竹楗石菑功費鉅萬光武時復決廷議謂河不當塞游波往來将復九河故道後河果析爲八以北而千餘年陽侯不驚塞與不塞其效昭昭矣特漢時河徙不過破民廬舍而今爲輸輓要津百萬仰哺泗陵東北淮河合襟溢則嚙陵涸則妨運顧此失彼掣肘可知故治河者當熟察利害知其勢相因而又知其本末不相渉使陵自為陵運自為運則河不言治而治矣夫運河上資洸汶下資淮泗不藉河力自河水決入而長慮者有狼兵除㓂之喻泗陵淹迫亦淮之溢而非河咎也夫地有髙卑水有源委髙寳汎光淮之委也往者潘公議築髙堰固借清淮以滌濁河之沙而減水諸壩通流如故泗陵無虞比來層堤累建勺水不通源委隔絶遂成横流倘追倣初制稍裁隄防限以斗門使洪流不至下決而清流歸其故則雖有百河不能侵泗陵矣夫蠱之難療也與雜病俱也良醫洞識標本先已其旁疾而後專理元氣庸醫一劑之内攻補雜施且左右騖而不支也袁儼續備考歴代建都於西北者皆仰給東南之漕都長安者阻塞陜之險漕運極難所資者江淮河渭都洛陽汴梁者兼資汴洛汝蔡而已惟我朝建都幽燕東至於海西暨於河南盡於江北至大漠水涓滴皆為我國家用其用最大其功最鉅者其運河由江而入䢴溝由䢴溝逹淮而渡上清口經徐呂二洪泝沁泗水至濟寧濟寧居運道之中所謂天井牐者即元史所謂㑹元牐也泗沂洸汶諸水畢㑹於此而分流於南北北至安民山入於新河地降九十尺為牐十有七而達於漳御南至沽頭地降百十有六尺為牐二十有一而達於河淮此蓋居两京之間南北分中之處自是而南至於河淮順流也河淮東流至清口而入於海亂流而渡由䢴溝渡江而達於南京自是而北至於漳御順流也御河北流至直沽而入於海泝流而上由白河抵潞而達於北京迤南接濟之水有自武陟來之沁有自琅邪來之沂迤北接濟之水有自金龍口之河有分滹沱河之水通論諸牐天井居其中臨清總其㑹居中者如人身之有腰脊總㑹者如人身之有咽喉腰脊損則四肢莫運咽喉閉則五臟不通國家都北而仰給於南恃此運河以為命脉濟寧居腹裏之地州縣櫛比居民鱗次而又多有旁出之途惟臨清乃㑹通河之極處諸牐於此乎盡衆流於此乎㑹且居髙臨下水勢泄易而涸速是凡三千七百里之漕路此其要害也東控青齊北臨燕趙且去邉關不遠疾馳之騎不浹旬可到爲國家深長之思者寧有而棄毋無而悔屯兵以爲防守是亦思患豫防之一事也黄河發源於星宿海繞崑崙歴積石越西域踰關陜山西河南經豐碭出徐州始爲運道㑹泗沂之水蟺蜿而至清河縣之清口又名南河口㑹淮而東經安東縣以入於海此黄河之大較也以運河言之由浙江至張家灣凡三千七百餘里自浙至蘓則資苕霅諸溪之水常州則資宜溧諸山之水至丹陽而山水絶則資京口所入江潮之水水之盈涸視潮之大小故裏河每患淺澁云自𤓰儀至淮安則南資天長諸山所瀦髙寳諸湖之水西資清口所入淮黄二河之水俱由𤓰儀出江故裏河之深淺亦視两河之盈縮焉由清口至鎭江閘則資黄河與山東汶泗之水由鎭口閘以至臨清則資汶泗之水即泰安萊蕪徂徠諸泉也然汶河由南旺南北分流並濟故天旱泉微每苦不足由臨清至天津則資汶河與漳衛之水由直沽入海而自天津至張家灣則資潞河白河桑乾諸水矣此運河之大略也若江西湖廣運艘俱由長江入儀眞閘止有風波之險而無淺澁之虞此又在運道之外矣康濟論刑科彭之鳯河工關係最重疏曰今河決黄家嘴而北淮由翟家壩髙良澗周家橋而南淮黄相背分馳以致清口淤淺天妃閘底淤墊臣近見河臣河淮分流不交一疏内云清口河淤淮水不與黄合先行挑掘乃淮水隨挑隨縮直入湖裏致回空糧船阻集目今急務當思淮之所以退而入湖者受病根源的在何處且天妃閘爲運道咽喉不容不力爲疏通之計乃不講求實著而惟於天妃閘外另開新河引水接濟又以進口維艱乃於清河縣南腰舖地方其支河之連張福口者疏濬通舟由周家閘行是猶人受病在喉而始穿咽於脇可乎况河防考開載云張福口若決洩入黄河則淮水分而清口淤且黄水漲亦能倒灌入淮故於王簡口張福口等地築堤扞截務使淮無所出黄無所入則清口之力專等語今謂張福口支河相連可以疏濬通舟如止目前權宜則可倘即以此爲運道萬一淮黄並漲淮水奔注長湖黄水又復倒灌尾淮水而入以滔天之水四溢於髙寳諸湖其為淮揚隠憂又非僅如前此之沖決焉沙河淹傷數百千人命而巳臣反復思維與其茍安目前别開攴河爲引水之計不如速固決口堅築隄防㑹合衆水以爲刷壅洗淤之爲便也國朝康熈七年部覆總河楊茂勲黄河底墊疏言天妃閘外黄河淮河㑹流宜築磯嘴長壩逼黄而引淮水等語應如該督所題繼因大臣㑹閲漕河覆疏云臣等看得清口爲淮黄交㑹處所漕船行走要路黄水漲發勢必越過淮河淮水返退湖内黄沙逆入運河以致塞滯查得總河楊茂勛題清口添築攔黄磯嘴長壩但所費錢糧甚多此處暫停興工将黄河北岸對直河灣有挑挖引河之處可以分引黄河之水黄勢力減淮水足以相抵則沙逐水流運道似無滯悞若黄水不由引河而行總河再具疏題請仍築磯嘴長壩可也􅆿科彭之鳯前疏又曰十年七月總河王光裕两河情形一疏内稱修救之要在於分黄及議復崔鎭等三壩移季太一壩分黄入海等語臣惟從來治河者每云宜合而不宜分蓋水分則流緩流緩則沙停沙停則河塞必然之理必嚴築堤岸使水不旁溢則勢合而力全方能直刷河底此力主分黄之説猶有未盡也若復崔鎭等三壩及移季太壩於黄家嘴舊河地面而分殺黄勢先令淮水出口有路是亦𨗳淮濟運之一法但前人設此四壩支河於北岸者蓋因黄水悍激堵禦清口淮水無由入河故於清口數十里之上先殺河勢使淮流得并力以入河然黄水雖由遥堤適中之地分流而北而究之仍令由東而南仍入黄河與淮㑹合并力齊驅由海口之雲梯關而後入海是清口以上之黄流雖分而清口以下之黄流則仍合也今據河臣疏云離堤約一百二十里即令入海是各堤所分之水竟令入海不復廻顧黄流将見黄河自崔鎭以下其流愈緩淤沙愈停則黄河愈爲淤塞矣清口淮流又何由入河以濟運乎臣謂必須相度形勢将四壩所洩之水仍令由東南以入黄河使之㑹合淮黄同爲逆河入海之勢此分之終所以合之而力主分黄之説猶有未盡也揚州府志戰國時東呉夫差北伐齊開淮河以運糧給軍而無漕名秦始皇用兵於邉使天下飛芻輓粟轉輸河北漢蕭何輓漕滎陽以援髙祖軍後運山東以給中都唐朝水陸互運開元時罷陜陸運置倉河口漕舟至河口輸於倉而去縣官僱船分入河洛代宗時劉晏置倉轉相授受隨江汴河渭所宜江船不入汴汴船不入河河船不入渭歳轉百萬無升斗之溺宋有汴河黄河惠民河廣濟河四運黄河後淺仁宗罷之變其法而漕壊元初運浙糧至淮由黄河至中灤陸運入御河達於京後開濟泗至利津入海朱清張瑄始主海運迨安山開河北至臨清引汶絶濟直屬御河建閘三十有一名曰㑹通河歳運不及海運矣明成祖建都北平初水陸河海並濟濟寧同知潘叔正疏開㑹通舊河増築水閘以時啟閉平江伯陳瑄請疏清江浦以避淮險鑿徐之呂梁石以平水怒於昭陽南旺髙寳諸湖築長堤以蓄水開泰州白塔河以通大江鑿髙郵渠四十里以便舟楫自淮抵臨清増閘四十有餘以便蓄洩此漕務河道始末也浙西两江湖廣之運船掛長帆而渉長江風波之險難避一也淮之平河橋從前水勢滔天糧船到此多溺覆正徳間始作石堰至今過淮無虞二也過淮必從清江龍汪天妃二閘入河閘門一開淮黄二水爭入閘門外髙内下勢如建瓴運船直􅆆而上且船重水汹傾覆可虞此時運糧官丁不寒而栗又恐船不堅固難敵出閘水勢用竹棕二䌫束縛船身新船縛一道舊船縛二道一船用千夫力以蝦鬚纜縴之均人力也又設絞關於两岸助夫力之不及水緩一日夜出船二三十隻水急一日夜出船七八隻出閘之險又險於風波出閘而入黄河若河水瀰漫一望無際灘亦成河船易閣岸僱小船盤剥三也河水若發淜湃如山篙漿難施挽牽無路皇清總河靳公輔髙築堤岡蜿蜒千里牽夫不致望洋出閘河而至御河流沙或東或西運船遇之淺阻僱船起剝費倍於黄河四也此漕船險阻始末也淮安府志康熙二十二年聖祖仁皇帝南廵過髙郵生員葛天祚孫晉獻海口圖䝉召問對云髙郵地形窪下水從滚閘流入下河因無去路一望汪洋東有海口原係洩水要道若開海口洩水甚速民田得復耕芸又云往年淮水力弱淮不能敵黄黄水從天妃口灌入漕河黄水俱是沙泥從下河流至海口海口閘門甚小水緩沙停日久淤塞並閘口外之海河亦皆淤塞今開海口宜造大閘與滚閘相對然開海口必開引河若引河不開水則散漫開引河務照漕河制度将所挑之泥做成隄岸兼造閘座水大則束水歸海水小則啟閘灌溉民田康熈二十八年聖祖仁皇帝南廵過髙郵召問生員葛天祚孫晉海口形勢對云髙郵南有馬飲塘歴二溝三垜至興化入場北有子嬰溝歴臨澤時堡入場此二河者滚壩下之引河也其入場水道一名車輅河達丁溪閘口一名白途河達小海草堰閘口一名海溝河達白駒閘口一名舊官河由北宋荘達天妃石䃮閘口至於山陽寳應之涇河黄浦二閘從射陽湖下廟灣海口其挑濬之法務從海口自下而上由天妃石䃮至北宋荘爲第一工白駒草堰丁溪諸河爲第二工車駱白途等河接髙郵南滚壩之水臨澤時堡接髙郵北滚壩之水射陽湖接山陽寳應衆閘之水爲第三工若夫馬橋七節橋引湖水下江又在各工告竣之後髙郵州新志總河張鵬翮題爲謹陳節宣之法仰祈聖裁事案查康熈四十年二月二十九日准工部咨開九卿㑹議河道總督張鵬翮疏稱張福口裴家場中間開引河一道㑹張福裴場等引河之水並力敵黄但黄水㑹合衆流勢大而力强淮水方出清口一半敵黄一半濟運終虞力分而勢弱故蓄髙堰之水以助其勢幸而黄水不大發亦足以敵之若遇黄水大發在糧船過完後仍遵㫖堵閉攔黄壩使不得倒灌在糧船正行之際遇黄水大發将裴家場引河口門暫閉引清水由三􅆜河至文華寺入運河以濟運倘運河水大山陽一帶由涇澗二河洩水入射陽湖下海寳應一帶由子嬰溝洩水入射陽湖下海髙郵一帶由城南柏家墩二大壩洩水江都一帶由人字河鳯凰橋等河洩水入江若遇黄淮並漲清水由翟家壩天然滚壩洩出黄水由王家營減水壩洩入鹽河至平旺河下海應如該督所題等因奉㫖依議速行欽此欽遵鈔出到部移咨到臣准此該臣看得黄水漲發由王家營減水壩入鹽河至平旺河下海經臣具題九卿㑹覆應如所題等因奉㫖依議速行欽遵在案今時家馬頭堵閉之後漫水已涸臣率河官親往丈勘鹽河淤塞一千九百一十丈堤工衝去四千一百八十一丈則前河臣時刷寛一千二百餘丈因水大未得􅃀實故也又查两岸殘缺堤工長一萬九百一十九丈九尺俱係緊要工程復委員估計挑河築堤約需銀六萬四千七百五十八兩零檢查舊案此河原係商人運鹽之河康熙二十六年正月内前河臣靳輔令商人捐銀八萬餘兩挑濬曽經題准在案相應仍照往例令商人捐助銀六萬四千七百五十八兩零以爲挑河築堤之需且兩淮商人蒙皇上南巡時沛浩蕩之恩蠲免加増錁銀禁止鹽院派取嬴餘督撫等衙門陋規不下數十萬萬商力已裕况捐鹽商之資以挑運鹽之河當亦衆商所樂從者也但桃汛巳過伏秋繼至減水壩開放爲期已迫恐衆商捐解緩不濟急先照數動加捐及節省銀兩委海州知州張建烈安東縣知縣彭銘等作速乘時挑河築堤用過銀兩行令兩淮運使照數於各商名下催解補項此河一通不特有利於商又能宣洩黄河減下之水兼利河道且上游一帶田畝受益不小所謂一舉而三善備焉者矣除估冊另行咨送工部外臣謹具題伏乞皇上睿鑒敕部議覆施行等因康熙四十年三月二十六日題四月十二日奉㫖該部議奏部議覆奉㫖依議速行河防志行水金鑑巻一百五十九
