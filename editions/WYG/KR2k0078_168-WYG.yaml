body:
  text: 行水金鑑巻一百六十八江南按察使傅澤洪撰官司直隸專兼管河官以下俱河防志直隸守河道一員兼管通省河道通永道一員兼管通州起至天津止運河河道工程通州知州一員兼管本州運河工程州同一員專管本州運河工程州判一員專管本州運河工程楊村管河通判一員專管自通州起至天津止運河河道工程此員今縉紳無之武清縣知縣一員兼管本縣運河工程管河縣丞一員住劄楊村今縉紳有之主簿一員專管本縣運河工程寳坻縣知縣一員兼管本縣河夫挑浚運河淤淺工程主簿一員專管本縣河夫挑浚運河淤淺工程霸昌道一員兼管霸州香河二州縣運河工程霸州知州一員兼管本州運河工程州判一員專管本州運河工程淺夫三名香河縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程天津道一員兼管河間府屬各州縣衛運河工程河間府知府一員兼管府屬各州縣運河工程河間府天津海防河務同知一員專管滄州青縣静海三州縣天津衛運河工程天津衛守備一員兼管本衛并左右二衛運河工程千總一員專管本衛運河工程淺夫五十名兼管左衛運河淺夫七十名右衛運河淺夫二十五名滄州知州一員專管本州運河工程淺夫三十名州判一員專管本州運河工程淺夫三十名青縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程淺夫六十三名半興濟鎮巡檢一員專管本縣運河工程静海縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程淺夫三十名河間府管河通判一員專管交河景州呉橋東光南皮五州縣運河工程住劄泊頭交河縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程淺夫二十名帶管河間衛淺夫五名半景州知州一員兼管本州運河工程州判一員專管本州運河工程淺夫一十七名半吳橋縣知縣一員兼管本縣運河工程縣丞一員專管本縣運河工程淺夫四十五名東光縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程淺夫四十名半南皮縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程淺夫二十名大名道一員兼管大名府屬衛河黄河工程大名府知府一員兼管府屬衞河黄河工程河捕通判一員專管府屬衞河黄河工程元城縣知縣一員兼管本縣衞河縣丞一員專管本縣衞河大名縣知縣一員兼管本縣衞河縣丞一員專管本縣衞河内黄縣知縣一員兼管本縣衞河縣丞一員專管本縣衞河濬縣知縣一員兼管本縣衞河縣丞一員專管本縣衞河滑縣知縣一員兼管本縣衞河縣丞一員專管本縣衞河長垣縣知縣一員兼管本縣黄河工程縣丞一員專管本縣黄河工程今縉紳有主簿無縣丞山東專兼管河官濟寜道一員專管濟南兖州東昌三府屬黄運二河河隄閘座泉源薈蕞云按山東全河備考國初南旺分司移駐濟寜州臨清閘務歸併張秋郎中康熙十五年以總河王光裕議栽南旺夏鎮分司將南旺所管泉閘事務歸併濟寜道其夏鎮所管河道閘座在江南沛縣者歸併徐淮道在山東滕嶧二縣者歸併東兖道康熈十七年又以總河靳輔議將東兖道所併夏鎮原管山東滕嶧二縣河道閘座亦併濟寜道併將張秋郎中所管河道閘座事務盡併濟寜道於是南自黄林莊北至桑園驛一千二百里之運道專責之濟寜道矣夫濟寜道有分巡之專責庶務孔多且駐劄濟寜去臨清張秋甚逺二處所有河道閘座鞭長不及殊難照瞭周到且州縣泉閘數百十處常恐其湮塞不能濟運漕艘毎有淺阻之虞濟寜一道任誠重矣又云濟寜道設於明隆慶間謂之管河兵巡道其責實專運務而兼職兵巡又有防禦之責焉設標兵二百名由來舊矣順治間以兖屬九邑民事隸之盖治河不無勞民使濱河百姓疾苦得以控陳康熈六年以省官裁去至九年總河疏請復設專管通省河道十五年歸併泉務十七年並併南北閘務謂之分巡濟寜河道今又將濟寜東兖二道併為兖寜道所屬河道閘座泉源歸於一道管轄較前任尤重焉東兖道一員兼管東昌兖州二府屬河道并江南徐州屬沛縣河道隄工濟東道一員兼管濟南東昌二府屬河道并直隸廣平府屬清河縣河間府屬故城縣河道隄工東昌府知府一員兼管東昌上河通判屬聊城堂邑博平清平臨清館陶六州縣下河通判屬恩縣夏津武城三縣運河河道隄工東昌上河通判一員專管東昌府屬聊城堂邑博平清平臨清館陶六州縣并東昌衞并平山衞運河閘座堤河工程聊城縣知縣一員兼管本縣運河工程主簿一員專管本縣運河隄工淺鋪溜夫九十七名周家店閘閘官一員專管周家店李海務二閘閘夫十六名通濟閘閘官一員專管閘夫三十七名永通閘閘官一員專管閘夫二十八名東昌衞守備一員兼管收并平山衞運河工程平山衞管河千總一員專管本衞河道淺夫七名半堂邑縣知縣一員兼管本縣運河工程主簿一員專管本縣運河隄工淺鋪溜夫五十一名梁家郷閘閘官一員專管梁家郷土橋二閘閘夫五十六名博平縣知縣一員兼管本縣運河工程縣丞一員專管本縣運河工程淺鋪夫四十名半北河續記云河道東西俱有十東岸南接聊城梭隄起北接清平减水閘止共二七里西岸南接清平魏家灣起北接清平丁家口止共四十里屬典史管河清平縣知縣一員兼管本縣運河工程主簿一員專管本縣運河工程淺鋪夫四十七名戴家灣閘閘官一員專管閘夫二十八名徳州衞守備一員兼管收併左衛運河工程左衞管河千總一員專管本衞南河淺夫二十名河南管河道治河檔案云康熈三十二年總河于成龍等疏稱徳州左衞南河既在上河通判界内應歸上河通判管轄奉依議㫖臨清州知州一員兼管本州運河工程州判一員專管本州運河衞河工程淺鋪