body:
  text: 行水金鑑巻一百六十九江南按察使傅澤洪撰官司徐屬河營守備一員管轄徐屬河道工程上自河南山東交界起下至邳睢二州縣界止戰守兵一千八十八名薈蕞云康熈十七年總河靳公題設江南河兵八營罷淮揚徐靈璧等州縣堤淺夫此河營所自昉也淮徐道属諸營此後不知有無更改無案可稽悉依而錄之碭山縣黄河南岸把總一員専管汛地上自虞城縣界起下至毛城鋪止又自小石閘起至蕭縣界止一帶工程蕭縣黄河南岸把總一員専管汛地上自碭山縣界起下至北城集三官廟止一帶工程徐州黄河南岸千總一員専管汛地上自蕭縣北城集三官廟起下至王家山止又自韓家山起至徐城郭家觜上壩頭止又自郭家觜上壩頭起由徐城石岸至青田三山頭止一帶工程徐州黄河南岸把總一員専管汛地上自青田三山頭起下至靈璧縣界止一帶工程碭山縣黄河北岸兼豐縣黄河把總一員専管汛地上自山東單縣界起下至徐州李家樓止一帶工程徐州黄河北岸千總一員専管汛地上自大谷山起下至邳州界止一帶工程邳睢靈璧河營守備一員管轄邳睢靈璧三州縣黄運兩河工程戰守兵九百四十七名睢靈二縣黄河南岸把總一員専管汛地上自徐州界起下至睢寧縣余堂埽工止一帶工程睢寧縣黄河南岸千總一員専管汛地上自余家堂起下至宿遷縣古堤頭止一帶工程邳州黄河北岸千總一員専管汛地上自徐州界起下至邳州馬船幇止一帶工程邳州黄河北岸把總一員専管汛地上自邳州馬船幇起下至宿遷縣界止一帶工程邳州運河把總一員専管汛地上自徐塘口起下至宿遷縣止并唐宋山一帶工程宿虹河營守備一員管轄宿虹二縣黄運隄壩工程戰守兵七百八十六名宿遷縣運河把總一員専管汛地上自邳州磘灣口交界起下至石磡止一帶工程宿遷縣黄河南岸把總一員専管汛地上自睢寧縣界谷堆頭起下至徐家灣西張王廟前止一帶工程宿遷縣黄河南岸井歸仁堤千總一員専管汛地上自張王廟前起下至白洋河鈔闗口桃源縣界止又歸仁隄自烏鴉嶺起至石工頭止一帶工程宿遷縣黄河北岸千總一員専管汛地上自邳州直河交界起下至皁河石磡止又新運河上自皁河口石磡對過起下至支河口下口止一帶工程宿遷縣黄河北岸把總一員専管汛地上自宿遷縣西門外呉家墩起下至大古城桃源縣交界止一帶工程桃源河營守備一員管轄黄河工程戰守兵七百一十三名桃源縣黄河南岸把總一員専管汛地上自宿遷白洋河鈔闗口起下至煙墩厰東止一帶工程桃源縣黄河南岸千總一員専管汛地上自煙墩起下至清河縣界止一帶工程桃源縣黄河北岸千總一員専管汛地上自古城宿遷縣界起下至河北鎮止一帶工程桃源縣黄河北岸把總一員専管汛地上自河北鎮起下至清河縣界止一帶工程山清外河營守備一員管轄山清二縣黄河工程戰守兵一千三十九名外河㕔冊云山清外河營守備係康熈十七年䝉前總河靳輔題請分設清河縣外河北岸千總一員専管汛地上自桃源縣界起下至山安營界止一帶工程清河縣外河南岸把總一員専管汛地上自呉城接桃源縣界起下至季家淺接山陽縣界止一帶工程山陽縣外河南岸千總一員専管汛地上自季家淺起下至三坌堤止一帶工程山陽縣外河上河把總一員専管汛地上自三坌交界起下至葉家營馬頭止又上自朱家觜起下至大茭陵廟巷止一帶工程山陽縣外河下河把總一員専管汛地上自葉家營起下至陳家社接山安營界止一帶工程山安河營守備一員管轄山陽安東二縣工程戰守兵八百七名山陽縣黄河南岸把總一員専管汛地上自陳家社起下至陸家社止一帶工程山安二縣外河北岸千總一員専管汛地上自泗鋪溝起下至安東縣東門止一帶工程安東縣黄河上河把總一員専管汛地上自安東縣東門起下至彭家灘止一帶工程安東縣黄河下河把總一員専管汛地上自彭家灘起下至雲梯闗止一帶工程山陽縣黄河北岸把總一員専管汛地上自雲梯闗起下至泗汾港止一帶工程山清裏河營守備一員管轄山陽裏河工程戰守兵三百九十八名裏河㕔冊云裏河營守備康熈十七年總河靳輔題設為山清盱眙河營守備康熙三十八年總河于成龍題分設山盱高堰河營遂改為山清裏河營守備山陽縣裏河千總一員専管汛地上自清河縣界起下至山陽縣界西南角樓止一帶工程清河縣裏河運口把總一員専管汛地上自甘羅城西南角樓起下至山陽縣界横隄頭止一帶工程山陽縣裏河把總一員専管汛地上自府城西南角樓起下至寳應縣界止一帶工程山盱高堰營守備一員管轄高堰湖堰工程戰守兵三百五十名高堰㕔冊云山盱高堰河營守備係康熙三十八年内於遵㫖保題等事案内前院于成龍等題請添設管轄山陽縣山清交界起至盱眙縣秦家高岡止修防湖隄工程山陽縣高堰千總一員専管汛地上自清河横隄起下至石工盡頭止一帶工程山陽縣高良澗把總一員専管汛地上自石工頭起下至周家橋止一帶工程山盱二縣把總一員専管汛地上自周家橋起下至翟家壩止一帶工程揚屬河營守備一員管轄高寳江三州縣工程戰守兵六百一十三名揚河㕔冊云揚河營守備係康熙十七年四月内奉總河靳輔題請設立督率五汛千把等弁井河兵修防寳高江三州縣河道隄工寳應縣運河把總一員専管汛地上自寳應縣黄浦起下至劉家堡止一帶工程寳應縣運河千總一員専管汛地上自劉家堡起下至界首鎮止一帶工程高郵州運河千總一員専管汛地上自界首鎮起下至永安河尾止一帶工程高郵州運河把總一員専管汛地上自永安河尾起下至江都縣界止一帶